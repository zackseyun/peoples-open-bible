lexical_decisions:
- source_word: ἐν ταῖς ἡμέραις ἐκείναις
  english_pob_choice: In those days
  chosen_spanish: En aquellos días
  alternatives_spanish:
  - En esos días
  - Por aquellos días
  lexicon: LSJ
  rationale: Es una fórmula temporal narrativa natural en español y mantiene el valor idiomático del griego sin sobretraducir.
- source_word: ἐγενήθη
  english_pob_choice: came about
  chosen_spanish: hubo
  alternatives_spanish:
  - sucedió
  - aconteció
  - se produjo
  lexicon: LSJ
  rationale: El verbo griego marca acontecimiento; en español, 'hubo' comunica de forma breve y sobria la irrupción del hecho sin sonar forzado.
- source_word: λιμὸς μεγάλη σφόδρα
  english_pob_choice: a very great famine
  chosen_spanish: una hambre muy grande
  alternatives_spanish:
  - una hambruna muy severa
  - un hambre extremadamente grande
  - una gran hambre
  lexicon: LSJ
  rationale: λιμός es 'hambre' en sentido de escasez grave; 'hambre muy grande' conserva la intensidad de μεγάλη σφόδρα. Se evita 'hambruna' porque puede sonar más interpretativo, aunque sería una alternativa natural.
- source_word: αὐτομόλησεν
  english_pob_choice: went over
  chosen_spanish: se pasó
  alternatives_spanish:
  - desertó
  - se pasó al otro bando
  - defectó
  lexicon: LSJ
  rationale: El verbo expresa cambio de lealtad o paso a otra parte. 'Se pasó' es idiomático en español y conserva la idea de alineación sin imponer de antemano una lectura militar demasiado específica.
- source_word: ἡ χώρα
  english_pob_choice: the land
  chosen_spanish: la tierra
  alternatives_spanish:
  - el país
  - la región
  - el territorio
  lexicon: LSJ
  rationale: '''χώρα'' puede abarcar tierra/territorio/campo. ''La tierra'' preserva la amplitud del término y suena natural en español bíblico moderno.'
- source_word: μετʼ αὐτῶν
  english_pob_choice: with them
  chosen_spanish: a ellos
  alternatives_spanish:
  - con ellos
  - a su lado
  - a favor de ellos
  lexicon: LSJ
  rationale: La preposición con valor de compañía o alineación se vierte de manera flexible en español. Aquí 'se pasó a ellos' integra el matiz direccional y relacional del conjunto, sin duplicarlo de forma redundante.
theological_decisions:
- issue: Si αὐτομόλησεν debe leerse como simple movimiento o como deserción política/militar
  english_pob_reading: The Greek verb indicates defection or desertion to another party.
  chosen_spanish_reading: '''Se pasó'' deja abierta la idea de cambio de bando, sin añadir una carga interpretativa explícita que el contexto inmediato no exige.'
  alternative_spanish_readings:
  - desertó
  - defeccionó
  - se fue con ellos
  rationale: El contexto histórico puede implicar deserción, pero el texto griego y la auditoría inglesa permiten una formulación amplia. En español, 'se pasó' mantiene la tensión semántica entre movimiento y lealtad cambiada.
  doctrine_reference: Ninguna; decisión histórico-lexical.
translation_notes:
  revision_awareness: La auditoría inglesa pasó de 'defected with them' a 'went over to them' para reflejar mejor la dirección y el cambio de partido. La versión española sigue esa revisión con 'se pasó a ellos', que conserva la orientación del movimiento y evita una traducción demasiado literal o demasiado explícita.
  spanish_consistency_notes:
  - Se usa 'aquellos días' para la fórmula temporal narrativa.
  - Se prefirió 'la tierra' para χώρα, manteniendo la amplitud semántica del término.
  - La nota mantiene la alternativa de lectura sobre cambio de lealtad, coherente con la observación lexical del griego.
