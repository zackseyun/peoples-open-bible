translation:
  language: es
  text: 'Y pondré una señal[a] entre ellos, y de ellos enviaré sobrevivientes a las naciones: a Tarsis, Pul y Lud, los que tensan el arco[b]; a Tubal y Javán; a las costas lejanas[c] que no han oído mi noticia[d] ni han visto mi gloria, y ellos anunciarán mi gloria entre las naciones.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «en ellos» o «sobre ellos»; la preposición hebrea permite varios matices.
    reason: lexical_alternative
  - marker: b
    text: «Los que tensan el arco» puede entenderse como una descripción de Lud específicamente; también puede traducirse más ampliamente «arqueros».
    reason: lexical_alternative
  - marker: c
    text: O «las islas lejanas»; el término hebreo puede referirse a islas o regiones costeras distantes.
    reason: lexical_alternative
  - marker: d
    text: O «mi informe» o «mi reporte»; el hebreo alude a lo que se oye acerca de Dios, no sólo al acto de oír.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְשַׂמְתִּי
  english_pob_choice: And I will set
  chosen_spanish: Y pondré
  alternatives_spanish:
  - Y colocaré
  - Y estableceré
  lexicon: HALOT
  rationale: שׂים expresa poner/colocar/establecer. En español, «poner» comunica bien la acción deliberada y mantiene naturalidad sin perder el matiz de decisión divina.
- source_word: בָהֶם
  english_pob_choice: among them
  chosen_spanish: entre ellos
  alternatives_spanish:
  - en ellos
  - sobre ellos
  lexicon: HALOT
  rationale: La preposición admite más de un matiz. «Entre ellos» preserva el sentido colectivo y evita fijar indebidamente si la señal está interna o físicamente sobre el grupo.
- source_word: אוֹת
  english_pob_choice: a sign
  chosen_spanish: una señal
  alternatives_spanish:
  - una marca
  - un signo
  lexicon: HALOT
  rationale: «Señal» es el equivalente más natural y bíblicamente amplio en español, manteniendo la ambigüedad sobre su forma exacta.
- source_word: וְשִׁלַּחְתִּי
  english_pob_choice: and ... I will send
  chosen_spanish: y ... enviaré
  alternatives_spanish:
  - y ... despacharé
  - y ... mandaré
  lexicon: HALOT
  rationale: El verbo indica enviar. «Enviaré» es claro y sobrio en español, sin añadir connotaciones burocráticas.
- source_word: מֵהֶם
  english_pob_choice: from them
  chosen_spanish: de ellos
  alternatives_spanish:
  - desde ellos
  - de entre ellos
  lexicon: HALOT
  rationale: La preposición señala procedencia. «De ellos» es directo y fiel; en contexto puede leerse como salida de ese mismo grupo.
- source_word: פְּלֵיטִים
  english_pob_choice: survivors
  chosen_spanish: sobrevivientes
  alternatives_spanish:
  - escapados
  - los que escapan
  - remanentes
  lexicon: HALOT
  rationale: El término designa personas que han quedado con vida o han escapado. «Sobrevivientes» conserva ese valor sin cargar el texto con una teología del remanente que el hebreo aquí no explicita.
- source_word: אֶל הַגּוֹיִם
  english_pob_choice: to the nations
  chosen_spanish: a las naciones
  alternatives_spanish:
  - a los pueblos
  - a los gentiles
  lexicon: HALOT
  rationale: En este contexto, גּוֹיִם se refiere a naciones extranjeras. «Naciones» mantiene el alcance geográfico-político y evita introducir un contraste técnico con «gentiles».
- source_word: תַּרְשִׁישׁ פּוּל וְל֛וּד ... תֻּבַל וְיָוָן
  english_pob_choice: Tarshish, Pul, and Lud ... Tubal and Javan
  chosen_spanish: Tarsis, Pul y Lud ... Tubal y Javán
  alternatives_spanish:
  - Tarshish, Pul y Lud ... Tubal y Javán
  - Tarsis, Pul, Lud ... Tubal, y Javán
  lexicon: HALOT
  rationale: Son nombres propios de lugares o pueblos; por eso se transliteran. Se mantiene la forma usual en español bíblico para legibilidad y reconocimiento.
- source_word: מֹשְׁכֵי קֶשֶׁת
  english_pob_choice: who draw the bow
  chosen_spanish: tiradores de arco
  alternatives_spanish:
  - los que tensan el arco
  - arqueros
  - los que tiran del arco
  lexicon: HALOT
  rationale: La imagen hebrea es literalmente «los que tiran/draw the bow». «Tiradores de arco» conserva el rasgo descriptivo y resulta más transparente que un término más condensado como «arqueros».
- source_word: הָאִיִּים הָרְחֹקִים
  english_pob_choice: the distant coastlands
  chosen_spanish: las costas lejanas
  alternatives_spanish:
  - las islas lejanas
  - los litorales distantes
  - las costas remotas
  lexicon: HALOT
  rationale: אִיִּים puede abarcar islas o regiones costeras lejanas. «Costas lejanas» conserva esa amplitud marítima y la distancia expresada por el adjetivo.
- source_word: אֲשֶׁר לֹא שָׁמְעוּ אֶת שִׁמְעִי
  english_pob_choice: that have not heard my report
  chosen_spanish: que no han oído mi informe
  alternatives_spanish:
  - que no han oído mi reporte
  - que no han oído mi noticia
  - que no han oído mi fama
  lexicon: HALOT
  rationale: שִׁמְעִי aquí es lo oído acerca de Dios, es decir, su noticia/informe. «Informe» conserva cercanía léxica con la revisión inglesa reciente y evita reducirlo a «fama».
- source_word: וְלֹא רָאוּ אֶת כְּבוֹדִי
  english_pob_choice: and have not seen my glory
  chosen_spanish: ni han visto mi gloria
  alternatives_spanish:
  - y no han visto mi gloria
  - ni han contemplado mi gloria
  lexicon: HALOT
  rationale: כָּבוֹד se rinde de modo constante como «gloria» en el contexto divino. «Ni» coordina naturalmente con la negación anterior en español.
- source_word: וְהִגִּידוּ
  english_pob_choice: and they will declare
  chosen_spanish: y ellos anunciarán
  alternatives_spanish:
  - y ellos declararán
  - y ellos proclamarán
  - y contarán
  lexicon: HALOT
  rationale: נגד en hifil significa decir, declarar, anunciar. «Anunciarán» funciona bien en un contexto de proclamación pública y sigue siendo solemnemente formal.
- source_word: אֶת כְּבוֹדִי בַּגּוֹיִם
  english_pob_choice: my glory among the nations
  chosen_spanish: mi gloria entre las naciones
  alternatives_spanish:
  - mi gloria a las naciones
  - mi gloria entre los gentiles
  lexicon: HALOT
  rationale: ב aquí expresa ámbito o localización de la proclamación. «Entre las naciones» conserva esa idea de difusión dentro de los pueblos, no sólo hacia ellos.
theological_decisions:
- issue: Naturaleza de la señal puesta entre ellos
  english_pob_reading: Retain the generic 'a sign' without specifying whether it is a miraculous token, a mark on persons, or a banner-like sign.
  chosen_spanish_reading: Mantener «una señal» sin definir su forma concreta.
  alternative_spanish_readings:
  - una marca
  - un estandarte
  - una señal sobre ellos
  rationale: El hebreo no determina qué clase de señal es. La traducción española conserva esa ambigüedad para no resolver interpretativamente algo que el texto deja abierto.
  doctrine_reference: 'Principio POB: preservar la tensión o ambigüedad donde el original no la resuelve.'
- issue: Alcance del grupo al que se envían los sobrevivientes
  english_pob_reading: Translate neutrally without identifying the group beyond the pronoun.
  chosen_spanish_reading: Traducir de manera neutral con los pronombres «ellos / de ellos».
  alternative_spanish_readings:
  - de Israel
  - de Judá
  - de los adoradores
  rationale: El contexto inmediato sugiere un grupo previo, pero este versículo no lo nombra otra vez. La versión española no debe estrechar el referente más allá del hebreo.
  doctrine_reference: Primacía del texto original y preservación de ambigüedad legítima.
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión inglesa más reciente que prefirió 'report' frente a 'fame' para שִׁמְעִי. En español se reflejó esa precisión con «mi informe», manteniendo la alternativa semántica de «noticia/reporte» en nota. También se conservó la decisión de no especificar la forma de la 'señal' y de tratar los nombres propios como transliteraciones.
  spanish_consistency_notes:
  - Se mantuvo «gloria» para כָּבוֹד en ambas ocurrencias.
  - Se tradujeron גּוֹיִם de forma uniforme como «naciones».
  - Se preservó la distinción entre la señal, los sobrevivientes y la proclamación final.
  - Se evitó el uso de «SEÑOR» como sustituto de Yahvé, pero este versículo no contiene el nombre divino explícito en el texto base.
