    rationale: El hebreo permite inferir claramente que muere el esclavo, y el POB inglés ya revisó este punto para evitar ambigüedad. En español, el sujeto tácito puede referirse erróneamente al hombre.
  - severity: medium
    issue: Formulación algo opaca de «será sin duda vengado»
    rationale: Aunque es léxicamente defendible, en español suena menos claro como fórmula legal. Una redacción como «deberá ser vengado sin falta» mantiene la voz pasiva y la fuerza enfática sin introducir una pena específica.
  - severity: low
    issue: Nota [a] innecesaria en «esclavo»
    rationale: El texto principal ya distingue «esclavo ... esclava»; la nota sobre «esclavo varón» no añade una alternativa necesaria y puede recargar el verso.
  revised_spanish_text: Y si un hombre golpea a su esclavo o a su esclava con una vara[a], y el esclavo muere bajo su mano, deberá ser vengado sin falta[b].
