translation:
  language: es
  text: Ten cuidado, no sea que resbales en ella[a], no sea que caigas delante de alguien que está al acecho.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El pronombre es femenino en griego y remite a un antecedente femenino del contexto inmediato; este versículo por sí solo no vuelve a nombrarlo.
    reason: cross_reference
lexical_decisions:
- source_word: πρόσεχε
  english_pob_choice: Take care
  chosen_spanish: Presta atención
  alternatives_spanish:
  - Ten cuidado
  - Estate atento
  lexicon: LSJ
  rationale: El imperativo pide vigilancia y cautela. «Presta atención» comunica bien la advertencia en español actual sin sonar rígido ni demasiado coloquial.
- source_word: μὴ πῶς
  english_pob_choice: lest
  chosen_spanish: para que no
  alternatives_spanish:
  - no sea que
  - lest
  lexicon: LSJ
  rationale: En español, «para que no» expresa con naturalidad el matiz de advertencia/prevención del griego, conservando la relación de propósito negativo que el POB inglés resumió con «lest».
- source_word: ὀλισθήσῃς
  english_pob_choice: you slip
  chosen_spanish: resbales
  alternatives_spanish:
  - tropieces
  - te deslices
  lexicon: LSJ
  rationale: «Resbalar» reproduce con fidelidad la imagen física de perder pie y evita moralizar demasiado pronto el verbo.
- source_word: ἐν αὐτῇ
  english_pob_choice: in it
  chosen_spanish: en ello
  alternatives_spanish:
  - en ella
  - en eso
  lexicon: LSJ
  rationale: El pronombre remite a un antecedente femenino del contexto, pero el versículo aislado no lo nombra. «En ello» conserva la referencia contextual sin forzar un antecedente explícito en español.
- source_word: πέσῃς
  english_pob_choice: you fall
  chosen_spanish: caigas
  alternatives_spanish:
  - caigas al suelo
  - caigas
  lexicon: LSJ
  rationale: «Caigas» mantiene la advertencia en forma breve y directa, adecuada al paralelo con el primer verbo.
- source_word: κατέναντι
  english_pob_choice: before
  chosen_spanish: delante de
  alternatives_spanish:
  - frente a
  - ante
  lexicon: LSJ
  rationale: «Delante de» expresa de modo natural la idea espacial de quedar expuesto ante alguien.
- source_word: ἐνεδρεύοντος
  english_pob_choice: one lying in wait
  chosen_spanish: uno que está al acecho
  alternatives_spanish:
  - un emboscador
  - uno que acecha
  lexicon: LSJ
  rationale: La forma participial conserva mejor la acción continua de acechar/emboscar que un sustantivo más cerrado como «emboscador».
translation_notes:
  revision_awareness: El inglés POB pasó de «by it» a «in it» para reflejar con más precisión ἐν αὐτῇ. La versión española sigue esa corrección con «en ello», manteniendo el referente contextual implícito sin añadir un sustantivo no presente en el versículo.
  spanish_consistency_notes:
  - Se mantiene el tono admonitorio breve y paralelo del griego con dos cláusulas finales.
  - No se explicita el antecedente femenino en el texto principal para no sobretraducir el pronombre contextual.
  - «Uno que está al acecho» conserva la fuerza verbal del participio griego y evita un sustantivo demasiado técnico.
