theological_decisions:
- issue: Referent of the feminine pronoun αὐτῆς/αὐτὴν
  chosen_reading: The pronouns refer to the earth/ground from the surrounding creation context, rendered with feminine English pronouns for transparency.
  alternative_readings:
  - Render neutrally as 'its surface ... to it is their return'
  - Translate more interpretively as 'the earth's surface ... to the earth they return'
  rationale: The Greek verse uses feminine pronouns without an explicit noun in this line, likely referring back to the earth in the immediate context. Retaining 'her' makes the anaphora visible, while 'surface' clarifies the idiom. A fully explicit 'earth' would aid readability but adds a noun not present in this clause.
  doctrine_reference: 'Translation philosophy: original-language primacy; preserve ambiguity/tension where possible'
