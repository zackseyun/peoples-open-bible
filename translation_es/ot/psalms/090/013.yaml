lexical_decisions:
- source_word: שׁוּבָה
  english_pob_choice: Return
  chosen_spanish: Vuelve
  alternatives_spanish:
  - Regresa
  - Vuélvete
  - Vuelve atrás
  lexicon: HALOT
  rationale: El imperativo de שוב dirigido a Yahvé expresa una petición directa de retorno o intervención. "Vuelve" conserva la fuerza breve y urgente del lamento en un español natural, sin importar una paráfrasis explicativa.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: El Tetragrámaton se traduce con el nombre divino propio, no con una sustitución titulada. "Yahvé" preserva el referente personal del nombre revelado y sigue el estándar del proyecto.
- source_word: עַד מָתָי
  english_pob_choice: how long?
  chosen_spanish: ¿hasta cuándo?
  alternatives_spanish:
  - ¿hasta cuándo será esto?
  - ¿por cuánto tiempo?
  lexicon: HALOT
  rationale: La fórmula de lamento hebrea se expresa de forma idiomática en español con "¿hasta cuándo?", que mantiene la urgencia y la brevedad interrogativa del original.
- source_word: וְהִנָּחֵם
  english_pob_choice: have compassion
  chosen_spanish: ten compasión
  alternatives_spanish:
  - muéstrate compasivo
  - reléntate
  - ten piedad
  lexicon: HALOT
  rationale: נחם en este contexto puede implicar ser movido a compasión o a un cambio de trato. "Ten compasión" comunica bien el valor afectivo de la súplica sin introducir "arrepentirse" aplicado a Dios. La alternativa "reléntate" se conserva como posibilidad semántica, pero no se impone en el texto principal.
- source_word: עַל עֲבָדֶיךָ
  english_pob_choice: on your servants
  chosen_spanish: de tus siervos
  alternatives_spanish:
  - sobre tus siervos
  - por tus siervos
  - con respecto a tus siervos
  lexicon: HALOT
  rationale: En una oración dirigida a Dios, עַל con נחם puede señalar el objeto de la compasión o del cambio de disposición. En español, "de tus siervos" integra naturalmente el complemento de la súplica y conserva el vínculo posesivo y personal con el pueblo de Dios. Se usa "siervos" por la convención del proyecto para עבד en contexto devocional, donde el matiz de pertenencia y servicio es claro.
theological_decisions:
- issue: Cómo renderizar נחם cuando se predica de Yahvé
  english_pob_reading: have compassion, with a footnoted alternative 'relent concerning your servants'
  chosen_spanish_reading: 'ten compasión, con nota alternativa ''o: reléntate respecto de tus siervos'''
  alternative_spanish_readings:
  - reléntate
  - muéstrate compasivo
  - ten piedad
  rationale: El hebreo permite tanto la idea de compasión como la de un cambio de acción o disposición. En español, "arrepentirse" sería engañoso para Dios, así que se evita. La nota mantiene la tensión léxica del original sin resolverla de forma dogmática o excesivamente libre.
  doctrine_reference: Preservar la tensión exegética; evitar antropomorfismo moral impropio en español moderno.
translation_notes:
  revision_awareness: Revisado a la luz del paquete hebreo y del audit trail inglés; la formulación principal sigue la equivalencia óptima del POB, manteniendo la tensión de נחם en una nota sin usar el lenguaje de 'arrepentirse' aplicado a Dios.
  spanish_consistency_notes:
  - Se mantiene Yahvé para יהוה, conforme al estándar del proyecto.
  - Se usa 'siervos' en un contexto de oración a Dios, consistente con el tratamiento lexical de עבד en este registro.
  - La puntuación con guion largo reproduce el quiebre retórico del lamento.
  - La nota alternativa evita 'arrepentirse' y usa 'reléntate' para conservar el matiz de cambio de curso sin cargar con una connotación moral impropia.
