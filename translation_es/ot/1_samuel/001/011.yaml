  text: She made a vow and said[a], “O Yahweh of hosts, if you will indeed look on the affliction of your female servant, and remember me, and not forget your female servant, but give your female servant a male child, then I will give him to Yahweh all the days of his life[b], and no razor shall come upon his head.”
  footnotes:
