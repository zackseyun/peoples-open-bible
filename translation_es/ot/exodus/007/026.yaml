translation:
  language: es
  text: 'Yahvé dijo a Moisés: «Ve ante Faraón y dile: “Así dice Yahvé: Deja ir a mi pueblo, para que me sirvan[a]”».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «me adoren». El verbo hebreo puede denotar servicio rendido a Dios, incluido el culto.
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  - SEÑOR
  lexicon: HALOT
  rationale: El texto hebreo usa el nombre propio divino, no un título. En español se conserva como «Yahvé» para reflejar el Tetragrámaton con transparencia, siguiendo la decisión POB de no sustituirlo por «SEÑOR».
- source_word: וַיֹּאמֶר
  english_pob_choice: And ... said
  chosen_spanish: dijo
  alternatives_spanish:
  - y dijo
  - entonces dijo
  lexicon: HALOT
  rationale: El perfecto narrativo con waw avanza la secuencia. En español, «dijo» es natural y suficiente; el valor conjuntivo se mantiene por el flujo del relato sin forzar la sintaxis.
- source_word: בֹּא אֶל פַּרְעֹה
  english_pob_choice: Go in to Pharaoh
  chosen_spanish: Entra ante Faraón
  alternatives_spanish:
  - Ve a Faraón
  - Entra a Faraón
  lexicon: HALOT
  rationale: La idea no es solo desplazamiento, sino entrar en la presencia del rey. «Entra ante Faraón» conserva esa fuerza de acceso cortesano mejor que un simple «ve a».
- source_word: וְאָמַרְתָּ אֵלָיו
  english_pob_choice: and say to him
  chosen_spanish: y dile
  alternatives_spanish:
  - y dirás a él
  - y le dirás
  lexicon: HALOT
  rationale: En español, el mandato indirecto queda más natural como «y dile». Mantiene el sentido secuencial e imperativo del hebreo sin añadir contenido.
- source_word: שַׁלַּח אֶת עַמִּי
  english_pob_choice: Let my people go
  chosen_spanish: Deja ir a mi pueblo
  alternatives_spanish:
  - Suelta a mi pueblo
  - Libera a mi pueblo
  lexicon: HALOT
  rationale: La expresión idiomática hebrea demanda liberación. «Deja ir» reproduce bien la fuerza del mandato y preserva el tono conocido del pasaje sin perder la base verbal de שׁלח.
- source_word: עַמִּי
  english_pob_choice: my people
  chosen_spanish: mi pueblo
  alternatives_spanish:
  - mi gente
  lexicon: HALOT
  rationale: El sufijo posesivo expresa pertenencia pactual. «Mi pueblo» es la opción más fiel y natural en español bíblico.
- source_word: וְיַעַבְדֻנִי
  english_pob_choice: so that they may serve me
  chosen_spanish: para que me sirvan
  alternatives_spanish:
  - para que me adoren
  - para que me rindan servicio
  lexicon: HALOT
  rationale: עבד puede abarcar servicio rendido a Dios, incluido el culto. «Me sirvan» conserva esa amplitud léxica mejor que limitarlo a «adoren», pero en español sigue siendo claro y digno. Se evita estrechar el verbo a una sola dimensión cultual.
theological_decisions:
- issue: Renderización del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Jehová
  - SEÑOR
  rationale: La versión base identifica el nombre del pacto con una transliteración, no con una sustitución honorífica. «Yahvé» mantiene la transparencia del nombre revelado y evita ocultarlo bajo un título.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH'
- issue: Sentido de וְיַעַבְדֻנִי respecto del propósito de liberación
  english_pob_reading: so that they may serve me
  chosen_spanish_reading: para que me sirvan
  alternative_spanish_readings:
  - para que me adoren
  - y me sirvan
  rationale: 'El verbo hebreo admite un campo semántico amplio que incluye servicio y culto. «Para que me sirvan» preserva esa amplitud y deja intacta la tensión teológica: Israel pasa del servicio a Faraón al servicio de Yahvé, sin reducir el texto a una sola práctica litúrgica.'
  doctrine_reference: 'DOCTRINE.md: Preserve theological tension rather than resolve it'
translation_notes:
  revision_awareness: 'Coincide con la revisión más reciente: no se registran cambios aplicados y el cotejo cruzado reporta alto acuerdo. Se conserva la decisión central de traducir el Nombre divino como «Yahvé» y de mantener la amplitud de עבד con «servir».'
  spanish_consistency_notes:
  - Se mantiene el nombre divino como «Yahvé» en lugar de una sustitución por título.
  - Se conserva el valor imperativo del discurso directo con un español natural y publicable.
  - «Faraón» se usa como transliteración tradicional y clara en español bíblico.
  - La nota sobre «me sirvan» preserva la alternativa cultual sin imponerla en el texto principal.
