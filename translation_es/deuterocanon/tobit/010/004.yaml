translation:
  language: es
  text: 'Entonces su esposa le dijo: «El hijo ha perecido, porque se ha demorado». Y comenzó a lamentarse por él[a] y dijo:'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El griego repite αὐτόν («por él, él»), probablemente por énfasis o por repetición textual; el español lo expresa de manera idiomática con una sola mención.
    reason: textual_variant
lexical_decisions:
- source_word: Ἀπώλετο
  english_pob_choice: has perished
  chosen_spanish: ha perecido
  alternatives_spanish:
  - está perdido
  - ha sido destruido
  lexicon: LSJ
  rationale: ἀπόλλυμι en este contexto expresa la triste conclusión de que el niño ha muerto o está arruinado. «Ha perecido» conserva esa gravedad sin precisar de más el modo de la muerte.
- source_word: τὸ παιδίον
  english_pob_choice: the child
  chosen_spanish: el niño
  alternatives_spanish:
  - el hijo
  - el pequeño
  lexicon: LSJ
  rationale: παιδίον puede significar «niño» o «hijo». Aquí la madre habla de su propio hijo, y en español «el niño» suena natural y fiel al griego.
- source_word: κεχρόνικεν
  english_pob_choice: has delayed
  chosen_spanish: se ha demorado
  alternatives_spanish:
  - ha tardado
  - se ha retrasado
  - ha estado ausente por mucho tiempo
  lexicon: LSJ
  rationale: El perfecto de χρονίζω comunica una demora prolongada. «Se ha demorado» refleja bien el matiz de tardanza sin forzar una construcción pasiva poco natural en español.
- source_word: ἤρξατο θρηνεῖν
  english_pob_choice: began to mourn
  chosen_spanish: comenzó a llorar
  alternatives_spanish:
  - comenzó a lamentarse
  - empezó a hacer duelo
  - comenzó a gemir por él
  lexicon: LSJ
  rationale: θρηνεῖν implica lamentación o duelo; en español, en este contexto, «comenzó a llorar» comunica el inicio del lamento de forma idiomática y emotiva. Se mantiene la idea de duelo en el contexto inmediato.
- source_word: αὐτὸν αὐτὸν
  english_pob_choice: for him
  chosen_spanish: por él[a]
  alternatives_spanish:
  - por él, por él
  - por él mismo
  lexicon: LSJ
  rationale: El griego repite αὐτόν. La POB inglesa lo trató como repetición enfática/textual y lo suavizó a una sola expresión. En español se conserva el sentido idiomático con una sola mención y se documenta la repetición en nota.
translation_notes:
  revision_awareness: 'La versión española sigue la lectura griega de Swete y refleja la corrección de la revisión inglesa: κεχρόνικεν se entiende como «se ha demorado» / «ha tardado», no como una acción transitiva de él. También conserva el efecto de la repetición de αὐτόν mediante nota textual, como hizo la auditoría inglesa.'
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando el texto lo exija; aquí no aparece el nombre divino.
  - Se evita «Cristo» porque no hay terminología mesiánica en este versículo.
  - «Perecido» se eligió para mantener el tono grave del original sin introducir una interpretación más específica.
  - La repetición griega se documenta como nota textual en vez de forzar una duplicación extraña en español.
