base_translation:
  language: en
  yaml_path: translation/ot/judges/006/025.yaml
  text: And it happened that night that Yahweh said to him[a], “Take your father’s bull and the second bull, seven years old, and tear down the altar of Baal that belongs to your father[b], and cut down the Asherah that is upon it.”
  footnotes:
  - marker: a
    text: Or 'the Asherah pole' or 'the sacred pole.' The Hebrew term can denote a cultic object associated with Asherah.
    reason: lexical_alternative
  - marker: b
    text: Literally 'that is upon it.' The phrase may indicate the Asherah stood on, over, or in close association with the altar.
    reason: lexical_alternative
