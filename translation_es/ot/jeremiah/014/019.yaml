    text: Or, 'Or does your soul loathe Zion?' The Hebrew particle can introduce the second question in a disjunctive sense.
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'your soul,' a vivid expression for the inner self or whole person.
    reason: lexical_alternative
