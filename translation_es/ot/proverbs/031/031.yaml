    reason: lexical_alternative
  - marker: c
    text: O 'en las puertas de la ciudad'; las puertas eran el lugar público de reconocimiento, juicio y honor en la sociedad israelita antigua.
    reason: cultural_note
  revision_rationale: Se corrige una construcción poco natural en español ('de fruto' -> 'del fruto') para reflejar fielmente מִפְּרִי sin perder la imagen hebrea. Se conservan y adaptan al español las notas del rastro inglés sobre la personificación de 'sus obras' y el sentido cultural de 'las puertas'.
