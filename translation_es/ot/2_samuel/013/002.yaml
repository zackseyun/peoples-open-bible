translation:
  language: es
  text: Amnón estaba tan angustiado que se puso enfermo[a] por Tamar su hermana, porque ella era virgen, y a Amnón le parecía imposible[b] hacerle algo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Amnón estaba angustiado hasta enfermarse por Tamar su hermana». La expresión hebrea puede entenderse de forma reflexiva («se puso enfermo») o como resultado («enfermó»).'
    reason: lexical_alternative
  - marker: b
    text: La frase «le parecía imposible» traduce un modismo hebreo que significa que Amnón no veía ninguna manera factible de actuar.
    reason: cultural_note
lexical_decisions:
- source_word: וַיֵּצֶר
  english_pob_choice: was so distressed
  chosen_spanish: estaba tan angustiado
  alternatives_spanish:
  - estaba angustiado
  - estaba tan afligido
  - estaba tan atormentado
  lexicon: HALOT
  rationale: El verbo expresa presión interna, estrechez o angustia emocional. «Estaba tan angustiado» comunica bien esa constricción interior y prepara la consecuencia siguiente sin exagerar ni suavizar el estado de Amnón.
- source_word: לְהִתְחַלּוֹת
  english_pob_choice: that he made himself sick
  chosen_spanish: se enfermó
  alternatives_spanish:
  - se hizo enfermo
  - se hizo daño
  - llegó a enfermarse
  lexicon: HALOT
  rationale: 'El hitpael permite entender una acción reflexiva o un resultado: enfermarse. En español, «se enfermó» mantiene la tensión interpretativa sin forzar una construcción poco natural como «se hizo enfermo».'
- source_word: בַּעֲבוּר
  english_pob_choice: because of
  chosen_spanish: a causa de
  alternatives_spanish:
  - por
  - debido a
  - a causa de
  lexicon: HALOT
  rationale: Aquí la relación es causal. «A causa de» es natural en español y conserva el valor explicativo del hebreo.
- source_word: אֲחֹתוֹ
  english_pob_choice: his sister
  chosen_spanish: su hermana
  alternatives_spanish:
  - su hermana
  - la hermana de él
  lexicon: HALOT
  rationale: El vínculo familiar es esencial para la fuerza narrativa y moral del pasaje. «Su hermana» lo expresa de forma directa y clara.
- source_word: בְתוּלָה
  english_pob_choice: a virgin
  chosen_spanish: virgen
  alternatives_spanish:
  - una virgen
  - doncella
  - joven virgen
  lexicon: HALOT
  rationale: El término hebreo señala virginidad. En español, «virgen» es la equivalencia más directa y precisa; se mantiene sin sustituirla por un término más vago o arcaico.
- source_word: וַיִּפָּלֵא בְּעֵינֵי אַמְנוֹן
  english_pob_choice: it seemed impossible in Amnon’s eyes
  chosen_spanish: le parecía imposible a Amnón
  alternatives_spanish:
  - le parecía irrealizable a Amnón
  - le resultaba imposible a Amnón
  - Amnón lo veía imposible
  lexicon: HALOT
  rationale: 'El hebreo usa un modismo de perspectiva: algo aparece como imposible desde el punto de vista del sujeto. «Le parecía imposible a Amnón» conserva ese sentido idiomático en español de manera natural.'
- source_word: לַעֲשׂוֹת לָהּ מְאֽוּמָה
  english_pob_choice: to do anything to her
  chosen_spanish: hacerle algo
  alternatives_spanish:
  - hacerle nada
  - hacerle cualquier cosa
  - hacerle el menor daño
  lexicon: HALOT
  rationale: מְאוּמָה significa «algo / nada / cualquier cosa» según contexto. Aquí el giro se refiere de modo amplio a actuar sobre ella. «Hacerle algo» conserva esa generalidad y evita especificar de antemano una acción concreta.
theological_decisions:
- issue: Conservación del modismo de imposibilidad en la perspectiva de Amnón
  english_pob_reading: it seemed impossible in Amnon’s eyes means Amnon saw no feasible way to act.
  chosen_spanish_reading: le parecía imposible a Amnón
  alternative_spanish_readings:
  - Amnón no veía manera de actuar
  - le parecía irrealizable a Amnón
  rationale: El pasaje no afirma imposibilidad objetiva, sino percepción subjetiva. La redacción escogida conserva esa tensión y deja claro que se trata de la perspectiva de Amnón.
  doctrine_reference: Lectura semántica del modismo; no implica una doctrina específica.
translation_notes:
  revision_awareness: 'El texto sigue de cerca el packet hebreo y el audit trail inglés: conserva la ambigüedad del hitpael de חלה con una formulación natural en español, mantiene el modismo de פלא como imposibilidad percibida, y evita introducir detalles no presentes en el versículo. No se registran revisiones previas pendientes en el contexto proporcionado.'
  spanish_consistency_notes:
  - Se usa «Amnón» y «Tamar» de forma consistente con los nombres propios del contexto.
  - Se prefiere «virgen» por precisión léxica, no por fórmula eclesiástica.
  - Se evita «SEÑOR» u otras sustituciones porque el versículo no contiene el nombre divino.
  - «Le parecía imposible» preserva el punto de vista del hebreo sin volverlo más interpretativo de lo necesario.
