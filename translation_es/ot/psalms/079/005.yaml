translation:
  language: es
  text: ¿Hasta cuándo, Yahvé? ¿Te enojarás para siempre? ¿Arderán tus celos[a] como fuego?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «tu celo». El hebreo קִנְאָה puede significar «celos» o «celo».
    reason: lexical_alternative
lexical_decisions:
- source_word: עַד מָה
  english_pob_choice: How long
  chosen_spanish: ¿Hasta cuándo
  alternatives_spanish:
  - ¿Hasta cuándo será esto?
  - ¿Por cuánto tiempo?
  lexicon: HALOT
  rationale: La fórmula de lamento pide duración y en español bíblico actual «¿Hasta cuándo?» es natural, urgente y fiel al valor idiomático del hebreo.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  lexicon: HALOT
  rationale: Se conserva el nombre propio divino del tetragrámaton, siguiendo la convención del proyecto en español. «Yahvé» mantiene el valor de nombre personal y evita la sustitución por un título.
- source_word: תֶּאֱנַף
  english_pob_choice: be angry
  chosen_spanish: te enojarás
  alternatives_spanish:
  - estarás airado
  - te enfurecerás
  lexicon: HALOT
  rationale: El verbo expresa ira; «te enojarás» comunica bien la acción en español moderno sin intensificarla más allá del hebreo. Se evita una paraphrasis teológica.
- source_word: לָנֶצַח
  english_pob_choice: forever
  chosen_spanish: para siempre
  alternatives_spanish:
  - eternamente
  - sin fin
  lexicon: HALOT
  rationale: En este lamento, la pregunta es si la ira continuará sin terminar. «Para siempre» es la opción más natural y conserva la fuerza de permanencia.
- source_word: תִּבְעַר
  english_pob_choice: burn
  chosen_spanish: arderá
  alternatives_spanish:
  - quemará
  - flameará
  lexicon: HALOT
  rationale: El verbo denota arder. «Arderá» encaja con la imagen de fuego sin añadir el matiz de destrucción que tendría «consumirá».
- source_word: כְּמוֹ אֵשׁ
  english_pob_choice: like fire
  chosen_spanish: como fuego
  alternatives_spanish:
  - como un fuego
  - cual fuego
  lexicon: HALOT
  rationale: Se mantiene la comparación directa. En español, «como fuego» es idiomático y preserva la imagen sin sobrecargarla.
- source_word: קִנְאָתֶךָ
  english_pob_choice: your jealousy
  chosen_spanish: tu celo
  alternatives_spanish:
  - tu celosía
  - tu envidia
  lexicon: HALOT
  rationale: El hebreo קִנְאָה admite «celo» o «celos/jealousy». Aquí se privilegia «celo» para conservar la amplitud semántica y evitar que «celos» suene excesivamente humano o negativo en español; la nota preserva la alternativa «celos»/«jealousy» implícita en el término hebreo.
theological_decisions:
- issue: Nombre divino del tetragrámaton
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Jehová
  rationale: El texto hebreo usa יְהוָה directamente. En el español del proyecto se conserva el nombre divino como «Yahvé» para no sustituirlo por un título y mantener la transparencia frente al original.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: קִנְאָה aplicado a Dios
  english_pob_reading: jealousy
  chosen_spanish_reading: celo
  alternative_spanish_readings:
  - celos
  - jealousy
  rationale: El término puede expresar celo o celos/jealousy. Dado que en relación con Dios la palabra puede sonar más positiva y menos antropomórfica en español, «celo» preserva el campo semántico sin resolver la tensión teológica entre celo y celos. La nota mantiene visible la alternativa semántica del hebreo.
  doctrine_reference: DOCTRINE.md §3 Preserve theological tension rather than resolve it; §5 Consistency of key terms, or documented exception
translation_notes:
  revision_awareness: 'El pasaje coincide sustancialmente con la revisión más reciente: no se requieren cambios textuales adicionales respecto del audit trail inglés; la única decisión sensible en español es si קִנְאָה se vierte como «celo» o «celos/jealousy». Se optó por «celo» para el texto principal y se preservó la alternativa en nota.'
  spanish_consistency_notes:
  - Se conserva «Yahvé» conforme a la convención del proyecto para יְהוָה.
  - Se mantiene una sintaxis de lamento breve y directa, adecuada al hebreo.
  - «Arderá tu celo» conserva la imagen y evita debilitar el paralelismo con «como fuego».
  - La nota a pie de página deja visible la ambigüedad léxica de קִנְאָה sin eliminarla.
