translation:
  language: es
  text: Y Simón escogió hombres y los envió a Demetrio el rey para obtener remisión para la tierra[a], porque todos los actos de Trifón eran actos de saqueo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «para conceder remisión a la tierra»; el término griego puede denotar liberación o remisión, probablemente en sentido administrativo o fiscal aquí.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐπελέξατο
  english_pob_choice: chose
  chosen_spanish: escogió
  alternatives_spanish:
  - eligió
  - seleccionó
  lexicon: LSJ
  rationale: El medio ἐπελέξατο expresa una elección deliberada. «Escogió» comunica bien la decisión de forma natural en español y conserva el matiz activo de selección.
- source_word: ἄνδρας
  english_pob_choice: men
  chosen_spanish: hombres
  alternatives_spanish:
  - varones
  - personas
  lexicon: LSJ
  rationale: El griego usa el plural masculino para adultos varones. «Hombres» preserva esa referencia sin neutralizarla innecesariamente.
- source_word: ἀπέστειλεν πρὸς Δημήτριον τὸν βασιλέα
  english_pob_choice: sent them to Demetrius the king
  chosen_spanish: los envió a Demetrio el rey
  alternatives_spanish:
  - los envió a Demetrio, el rey
  - los despachó a Demetrio el rey
  lexicon: LSJ
  rationale: Se mantiene el orden cercano al griego y el objeto implícito «los» queda explícito en español. «El rey» traduce τὸν βασιλέα sin cargar el texto con una formulación más solemne de lo que exige el verso.
- source_word: τοῦ ποιῆσαι ἄφεσιν τῇ χώρᾳ
  english_pob_choice: to grant remission to the land
  chosen_spanish: para que concediera remisión a la tierra
  alternatives_spanish:
  - para conceder remisión a la tierra
  - para que otorgara remisión al territorio
  - para que concediera alivio a la tierra
  lexicon: LSJ
  rationale: ἄφεσις puede significar remisión, liberación o perdón. Aquí el contexto político-administrativo apunta a exención o alivio de cargas, y la revisión inglesa decidió «remission»; «remisión» conserva esa precisión sin añadir un tecnicismo no explicitado.
- source_word: χώρᾳ
  english_pob_choice: the land
  chosen_spanish: la tierra
  alternatives_spanish:
  - la tierra
  - el territorio
  - el país
  lexicon: LSJ
  rationale: χώρα denota tierra/territorio. «La tierra» es natural en español bíblico y conserva el sentido geopolítico amplio mejor que «el país».
- source_word: πᾶσαι αἱ πράξεις Τρύφωνος
  english_pob_choice: all the acts of Tryphon
  chosen_spanish: todas las acciones de Trifón
  alternatives_spanish:
  - todos los actos de Trifón
  - todas las obras de Trifón
  lexicon: LSJ
  rationale: πράξεις significa acciones, hechos o actos. «Acciones» es idiomático en español y mantiene la idea de conjunto de conductas, sin imponer un matiz moral inexistente en el sustantivo.
- source_word: ἦσαν ἁρπασίαι
  english_pob_choice: were acts of plundering
  chosen_spanish: eran actos de saqueo
  alternatives_spanish:
  - eran actos de pillaje
  - eran robos
  - eran actos de despojo
  lexicon: LSJ
  rationale: ἁρπασίαι expresa violencia de apropiación, robo o pillaje. «Saqueo» transmite con fuerza el carácter depredador y funciona bien con el predicado plural del verso.
theological_decisions:
- issue: 'ἄφεσις en un contexto político-económico: remisión vs. liberación general'
  english_pob_reading: grant remission to the land
  chosen_spanish_reading: concediera remisión a la tierra
  alternative_spanish_readings:
  - concediera alivio a la tierra
  - otorgara exención a la tierra
  - concediera liberación a la tierra
  rationale: El pasaje no trata de perdón moral sino de una gestión ante el rey para aliviar cargas sobre la χώρα. «Remisión» conserva la amplitud del término griego y la decisión del audit trail inglés, sin estrecharlo indebidamente a una sola medida fiscal.
  doctrine_reference: No doctrinal issue; administrative terminology in 1 Maccabees.
translation_notes:
  revision_awareness: La redacción sigue la revisión inglesa más reciente, que sustituyó «relief» por «remission» para ajustar mejor ἄφεσις en este contexto. También respeta la valoración moderadamente concordante del control cruzado, sin suavizar el tono de saqueo de ἁρπασίαι.
  spanish_consistency_notes:
  - Se usa «Yahvé» como norma general del proyecto solo cuando el texto fuente lo exige; en este versículo no aparece.
  - Se conserva «Trifón» como forma española habitual del nombre propio.
  - Se evita «Señor» o cualquier sustitución devocional porque el verso es narrativo e ისტორico-político.
  - «Tierra» traduce χώρα de manera amplia y mantiene coherencia con el uso bíblico de territorio nacional.
