theological_decisions:
- issue: Divergence between the surviving Hebrew and the Greek parallel for Sirach 8:19
  chosen_reading: Translate the extant Hebrew as the primary witness for this verse, while preserving the Greek as an alternative reading in a footnote.
  alternative_readings:
  - 'Greek: ''Do not reveal your heart to every man, and do not let him repay you with favor.'''
  rationale: For Sirach, where Hebrew survives, the project translates from the Hebrew witness as primary. This verse shows a substantial mismatch between the Cairo Geniza Hebrew and the Greek tradition, not merely a stylistic difference. Because the Hebrew witness is present and marked high confidence, the main text follows it; because the Greek is materially different and may reflect another Vorlage or textual development, it should be preserved in a footnote for transparency.
  doctrine_reference: 'PHILOSOPHY.md: translate from Hebrew where it survives; preserve source uncertainty honestly'
