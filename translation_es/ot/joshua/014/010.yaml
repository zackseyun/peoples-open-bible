translation:
  language: es
  text: Y ahora[a], he aquí, Yahvé me ha mantenido con vida, tal como él dijo, estos cuarenta y cinco años desde que Yahvé habló esta palabra[b] a Moisés, mientras Israel andaba[c] por el desierto. Y ahora, he aquí, hoy tengo ochenta y cinco años.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «me ha preservado con vida».'
    reason: lexical_alternative
  - marker: b
    text: «Esta palabra» también puede traducirse «este asunto» o, de manera más interpretativa, «esta promesa».
    reason: lexical_alternative
  - marker: c
    text: 'O: «mientras Israel viajaba por el desierto».'
    reason: lexical_alternative
lexical_decisions:
- source_word: הֶחֱיָה
  english_pob_choice: has kept me alive
  chosen_spanish: me ha mantenido con vida
  alternatives_spanish:
  - me ha preservado con vida
  - me ha dejado con vida
  - me ha dado vida
  lexicon: HALOT
  rationale: El hifil de חיה expresa aquí preservación/causación de vida en un sentido sostenido, no el dar la vida por primera vez. «Me ha mantenido con vida» conserva esa fuerza y suena natural en español bíblico contemporáneo.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: El texto hebreo usa el nombre propio divino. Conforme al criterio del proyecto, se translitera como «Yahvé» en lugar de sustituirlo por un título.
- source_word: כַּאֲשֶׁר דִּבֵּר
  english_pob_choice: just as he said
  chosen_spanish: tal como él dijo
  alternatives_spanish:
  - como él habló
  - según él dijo
  - tal como prometió
  lexicon: HALOT
  rationale: La frase remite a la declaración previa de Yahvé. «Tal como él dijo» preserva la relación verbal sin convertirla de manera innecesaria en una fórmula explícita de promesa.
- source_word: זֶה אַרְבָּעִים וְחָמֵשׁ שָׁנָה
  english_pob_choice: these forty-five years
  chosen_spanish: estos cuarenta y cinco años
  alternatives_spanish:
  - por cuarenta y cinco años
  - estos cuarenta y cinco años ya
  lexicon: HALOT
  rationale: El demostrativo hebreo da un matiz deíctico temporal. «Estos cuarenta y cinco años» conserva esa referencia al lapso transcurrido hasta el presente.
- source_word: מֵאָז
  english_pob_choice: since
  chosen_spanish: desde que
  alternatives_spanish:
  - desde el tiempo en que
  - desde entonces que
  lexicon: HALOT
  rationale: La construcción introduce el punto de partida del período transcurrido. «Desde que» expresa con claridad ese inicio temporal.
- source_word: הַדָּבָר הַזֶּה
  english_pob_choice: this word
  chosen_spanish: esta palabra
  alternatives_spanish:
  - esta cosa
  - este asunto
  - esta promesa
  lexicon: HALOT
  rationale: דָּבָר puede significar palabra, asunto o cosa. Aquí se refiere a la declaración concreta de Yahvé a Moisés, por lo que «esta palabra» sigue de cerca el hebreo y mantiene la posibilidad de lectura literal.
- source_word: אֲשֶׁר הָלַךְ יִשְׂרָאֵל בַּמִּדְבָּר
  english_pob_choice: while Israel walked in the wilderness
  chosen_spanish: mientras Israel andaba por el desierto
  alternatives_spanish:
  - cuando Israel caminaba por el desierto
  - mientras Israel viajaba por el desierto
  - durante el andar de Israel por el desierto
  lexicon: HALOT
  rationale: הָלַךְ conserva el verbo de movimiento/andar. «Andaba por el desierto» mantiene la imagen hebrea sin perder naturalidad en español.
- source_word: הִנֵּה
  english_pob_choice: behold
  chosen_spanish: mira
  alternatives_spanish:
  - he aquí
  - mira bien
  - mira, pues
  lexicon: HALOT
  rationale: La partícula introduce énfasis y llama la atención. En español, «mira» transmite ese valor exhortativo y resulta más natural que un calco más solemne.
- source_word: אָנֹכִי הַיּוֹם
  english_pob_choice: today I am
  chosen_spanish: hoy tengo
  alternatives_spanish:
  - hoy soy
  - hoy estoy
  lexicon: HALOT
  rationale: En el contexto de la edad, el español expresa de forma idiomática la declaración con «hoy tengo», equivalente funcional de la afirmación hebrea de edad presente.
- source_word: בֶּן חָמֵשׁ וּשְׁמוֹנִים שָׁנָה
  english_pob_choice: eighty-five years old
  chosen_spanish: ochenta y cinco años
  alternatives_spanish:
  - de ochenta y cinco años
  - ochenta y cinco años de edad
  lexicon: HALOT
  rationale: El hebreo usa un modismo de edad («hijo de»). En español la forma natural y precisa es simplemente «ochenta y cinco años».
theological_decisions:
- issue: Nombre divino en la cita de YHWH
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - Jehová
  rationale: La lectura del POB en inglés conserva el nombre propio divino. La edición española hace lo mismo con la forma estándar del proyecto, «Yahvé», para no ocultar el Tetragrámaton detrás de un título.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה / YHWH → Yahvé'
- issue: Sentido de הַדָּבָר הַזֶּה
  english_pob_reading: this word
  chosen_spanish_reading: esta palabra
  alternative_spanish_readings:
  - este asunto
  - esta promesa
  rationale: El hebreo permite varias lecturas, pero el auditable inglés optó por «this word». En español se conserva la misma decisión para no sobreinterpretar el término como «promesa» sin necesidad textual.
  doctrine_reference: Lexical policy for דָּבָר in context
translation_notes:
  revision_awareness: Se siguió el contexto auditado en inglés y no hubo revisiones posteriores con cambios de sentido; el acuerdo de revisión indica alta concordancia y ausencia de ajustes necesarios.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» para el nombre divino, conforme al estándar del proyecto.
  - Se conservó la repetición enfática de «Y ahora, mira» al inicio y antes de la afirmación de edad.
  - «Esta palabra» se dejó literal para respetar la ambigüedad controlada de דָּבָר.
  - La edad se expresó idiomáticamente en español, sin perder el sentido del hebreo de edad presente.
