  from: within the heart
  to: in me
  rationale: ⲛ̄ϩⲏⲧ is the preposition ϩⲛ- (in) with the first-person singular suffix
    pronoun (-ⲧ). It means 'in me,' not 'within the heart' (which would require the
    noun ⲡϩⲏⲧ). This perfectly parallels ⲛ̄ⲙⲙⲁⲉⲓ ('with me') in the previous line.
