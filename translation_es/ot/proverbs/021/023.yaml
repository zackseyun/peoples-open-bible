review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien la estructura y el sentido básico del hebreo: repite «guarda» para שֹׁמֵר, conserva «boca»/«lengua», y traduce נַפְשׁוֹ correctamente como «su vida» en este contexto sapiencial. Sin embargo, «de las angustias» suena menos natural con «guardar su vida» que una formulación con «de problemas» o «de desgracias», y la nota al pie necesita pulirse para español natural y puntuación normal.'
  spanish_quality_summary: La frase es clara y fiel, pero «guarda su vida de las angustias» resulta algo rígida y menos idiomática en español contemporáneo. «Guarda su vida de problemas» lee con mayor naturalidad y mantiene el alcance semántico amplio de צָרוֹת sin sobredramatizar. La nota actual tiene comillas y puntuación torpes por el uso de comillas simples externas.
  glossary_alignment: No hay términos del glosario maestro especialmente disputados en este versículo. La decisión «su vida» para נֶפֶשׁ concuerda con la justificación auditada y evita una lectura doctrinal de «alma». «Lengua» preserva correctamente la imagen hebrea. Se recomienda ajustar solo la elección de צָרוֹת a un español más natural en contexto.
  issues:
  - severity: medium
    issue: «de las angustias» es poco idiomático en esta construcción
    rationale: Aunque semánticamente posible para צָרוֹת, en español «guardar su vida de las angustias» suena forzado. «De problemas» o «de desgracias» encaja mejor con «guardar su vida» y transmite adversidad general como en el original.
  - severity: low
    issue: Redacción poco natural de la nota al pie
    rationale: La nota usa comillas simples externas y la frase «guarda a sí mismo» no es la forma más natural; «se guarda a sí mismo» o «se protege a sí mismo» sería mejor español.
  revised_spanish_text: Quien guarda su boca y su lengua guarda su vida[a] de problemas.
  revised_footnotes:
  - marker: a
    text: 'O «se guarda a sí mismo de las angustias»; hebreo: «guarda su nefesh de las angustias».'
    reason: lexical_alternative
