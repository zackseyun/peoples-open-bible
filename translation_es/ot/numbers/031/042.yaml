review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la sintaxis básica del hebreo: conjunción + preposición («Y de»), «la mitad», «los hijos de Israel», la relativa con «que», y «Moisés había separado de los hombres». Sin embargo, el anclaje de la nota al pie está mal colocado: la nota inglesa documenta alternativas para הַצֹּבְאִים («los que servían en el ejército / estaban en campaña / salían a la guerra»), no para «Israel». También conviene ajustar la tercera alternativa de la nota, porque «fueron a la guerra» cambia el aspecto del participio/contexto y no corresponde tan bien como «salieron a la guerra».'
  spanish_quality_summary: 'El español es claro y natural. «Y de la mitad de los hijos de Israel, que Moisés había separado de los hombres que iban a la guerra—» suena digno y legible. El único problema real es técnico-editorial: la nota debe anclarse en la frase militar, no en «Israel».'
  glossary_alignment: No hay términos del glosario mayor en juego salvo la preservación de «hijos de Israel», que está bien alineada con la política del proyecto y con la decisión inglesa auditada. «Hombres» para אֲנָשִׁים también está bien. La elección «iban a la guerra» es aceptable como texto principal, con alternativas preservadas en nota.
  issues:
  - severity: medium
    issue: La nota al pie [a] está anclada a «Israel» en vez de a la frase «que iban a la guerra».
    rationale: La nota documenta alternativas léxicas para הַצֹּבְאִים, no para בְּנֵי יִשְׂרָאֵל. Debe aparecer en el lugar correspondiente del texto español.
  - severity: low
    issue: La alternativa «fueron a la guerra» en la nota no reproduce tan bien el valor del participio/contexto como «salieron a la guerra».
    rationale: El inglés auditado preserva «went out to war», que en español bíblico y natural se refleja mejor como «salieron a la guerra» que como el perfecto simple «fueron».
  revised_spanish_text: Y de la mitad de los hijos de Israel, que Moisés había separado de los hombres que iban a la guerra[a]—
  revised_footnotes:
  - marker: a
    text: O «de los hombres que estaban en campaña» / «de los hombres que salieron a la guerra».
    reason: lexical_alternative
  revision_rationale: Se conserva el sentido del borrador, pero se corrige la ubicación de la nota para que corresponda al término hebreo הַצֹּבְאִים y se mejora una alternativa de la nota para alinearla mejor con el audit trail inglés y el valor participial del hebreo.
