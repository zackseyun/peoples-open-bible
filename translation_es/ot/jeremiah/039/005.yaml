  to: Pero el ejército de los caldeos los persiguió y alcanzó a Sedequías en las llanuras de Jericó. Lo capturaron y lo llevaron a Nabucodonosor, rey de Babilonia, en Ribla[a], en la tierra de Hamat, y Nabucodonosor dictó sentencia contra él.
