translation:
  language: es
  text: Sus palabras son razonamientos falsos[a] para llevar a cabo el deseo de los hombres injustos[b][c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «Sus palabras son falacias» o «Sus palabras son engaños».
    reason: lexical_alternative
  - marker: b
    text: O «para la práctica del deseo de los malvados».
    reason: lexical_alternative
  - marker: c
    text: O «el deseo de los malvados».
    reason: previous_rendering
lexical_decisions:
- source_word: λόγοι
  english_pob_choice: words
  chosen_spanish: palabras
  alternatives_spanish:
  - palabras dichas
  - dichos
  lexicon: LSJ
  rationale: «Palabras» conserva el foco concreto en lo que él dice, sin volverlo más abstracto de lo que permite el griego.
- source_word: παραλογισμοί
  english_pob_choice: false reasonings
  chosen_spanish: razonamientos falsos
  alternatives_spanish:
  - falacias
  - engaños
  - sofismas
  lexicon: LSJ
  rationale: La expresión mantiene la fuerza intelectual y moral del término, y suena natural en español sin perder la idea de razonamiento torcido o engañoso.
- source_word: εἰς πρᾶξιν
  english_pob_choice: for carrying out
  chosen_spanish: para llevar a cabo
  alternatives_spanish:
  - para practicar
  - para hacer
  - con el fin de ejecutar
  lexicon: LSJ
  rationale: La construcción expresa propósito; «para llevar a cabo» comunica bien que las palabras sirven para pasar a la acción.
- source_word: ἐπιθυμίας
  english_pob_choice: the desire
  chosen_spanish: el deseo
  alternatives_spanish:
  - la codicia
  - el anhelo
  - la concupiscencia
  lexicon: LSJ
  rationale: «Deseo» conserva el sentido amplio de ἐπιθυμία sin restringirlo innecesariamente a un solo ámbito moral o corporal.
- source_word: ἀδίκων
  english_pob_choice: of unjust men
  chosen_spanish: de los hombres injustos
  alternatives_spanish:
  - de los injustos
  - de gente injusta
  - de los impíos
  lexicon: LSJ
  rationale: La revisión inglesa más reciente tomó ἀδίκων como referencia a personas; en español, «hombres injustos» refleja esa lectura y conserva el matiz moral de ἄδικος.
translation_notes:
  revision_awareness: La versión española sigue la lectura revisada más reciente del expediente inglés, que entiende ἀδίκων como referencia a personas injustas y no como cosas injustas. Por eso se traduce «de los hombres injustos» y no «de cosas injustas» o una formulación semejante. También se evita introducir una coma innecesaria, en paralelo con la revisión auditada.
  spanish_consistency_notes:
  - Se mantuvo un registro sobrio y bíblico, sin calcos excesivos.
  - No se añadió nota al pie porque la redacción final puede expresar la lectura revisada sin ambigüedad.
  - Se conservó el plural «palabras» para λόγοι, en línea con el inglés auditado.
  - «Razonamientos falsos» reproduce el valor de παραλογισμοί sin tecnicismo excesivo.
