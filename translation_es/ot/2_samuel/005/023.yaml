translation:
  language: es
  text: 'Así que David consultó a Yahvé, y él dijo: «No subirás; da la vuelta por detrás de ellos, y vendrás contra ellos de frente a los balsameros[a]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «los árboles de baca»; tradicionalmente, «los morales». La identificación exacta del término hebreo es incierta.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּשְׁאַ֤ל / בַּיהוָ֔ה
  english_pob_choice: inquired of Yahweh
  chosen_spanish: consultó a Yahvé
  alternatives_spanish:
  - preguntó a Yahvé
  - inquirió de Yahvé
  lexicon: HALOT
  rationale: En este contexto militar, שׁאל con Yahvé no es una simple pregunta sino buscar dirección divina. «Consultó» expresa bien ese acto de buscar consejo/guía sin sonar arcaico, y «a Yahvé» preserva el nombre divino como en el texto de base.
- source_word: לֹא תַעֲלֶה
  english_pob_choice: You shall not go up
  chosen_spanish: No subirás
  alternatives_spanish:
  - No irás a la subida
  - No avanzarás
  lexicon: HALOT
  rationale: עלה mantiene el sentido básico de «subir», y en contexto militar implica avanzar. «No subirás» conserva la forma directa del discurso divino y sigue siendo natural en español.
- source_word: הָסֵב
  english_pob_choice: circle around
  chosen_spanish: da la vuelta
  alternatives_spanish:
  - rodea
  - circunda
  lexicon: HALOT
  rationale: El imperativo de סבב indica un movimiento táctico, no solo un giro físico. «Da la vuelta» comunica el cambio de rumbo de manera clara y sin sobrerrepresentar el detalle militar.
- source_word: אַחֲרֵיהֶם
  english_pob_choice: behind them
  chosen_spanish: por detrás de ellos
  alternatives_spanish:
  - a la retaguardia de ellos
  - detrás de ellos
  lexicon: HALOT
  rationale: La expresión señala la retaguardia enemiga. «Por detrás de ellos» es transparente en español y conserva la orientación espacial del hebreo.
- source_word: וּבָאתָ לָהֶם
  english_pob_choice: come against them
  chosen_spanish: vendrás contra ellos
  alternatives_spanish:
  - irás contra ellos
  - atacarás a ellos
  lexicon: HALOT
  rationale: En contexto bélico, בוא + ל tiene fuerza adversarial. «Vendrás contra ellos» mantiene el matiz de enfrentamiento sin convertirlo en una paráfrasis excesiva.
- source_word: מִמּוּל
  english_pob_choice: opposite
  chosen_spanish: de frente a
  alternatives_spanish:
  - enfrente de
  - opuesto a
  lexicon: HALOT
  rationale: La preposición indica posición directa enfrente. «De frente a» es idiomático en español y conserva el valor espacial de oposición.
- source_word: בְּכָאִים
  english_pob_choice: the balsam trees
  chosen_spanish: los álamos
  alternatives_spanish:
  - los árboles de baca
  - los balsameros
  lexicon: HALOT
  rationale: El nombre del árbol es incierto. La POB inglesa optó por «balsam trees» con nota de incertidumbre; en español se traduce con un nombre común legible y se preserva la reserva mediante nota sobre la alternativa textual y la incertidumbre botánica.
- source_word: דָּוִד
  english_pob_choice: David
  chosen_spanish: David
  alternatives_spanish:
  - —
  lexicon: Nombre propio bíblico estándar
  rationale: Se mantiene la forma española establecida del nombre propio.
theological_decisions:
- issue: Tratamiento del nombre divino יהוה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahveh
  - el SEÑOR
  rationale: El proyecto español usa «Yahvé» como forma principal para יהוה, en continuidad con la norma del proyecto y la transparencia frente al texto hebreo. Se evita la sustitución por una convención de máscara como «SEÑOR».
  doctrine_reference: 'DOCTRINE.md: Contested terms — יהוה / YHWH → Yahvé'
translation_notes:
  revision_awareness: El registro inglés reciente no requirió cambios; se conserva la decisión establecida de tratar יהוה con un nombre divino explícito y de mantener la incertidumbre léxica de בְּכָאִים en una nota alternativa.
  spanish_consistency_notes:
  - Se mantuvo la voz narrativa del hebreo con un inicio causal/continuativo («Así que»).
  - Se conservó el tratamiento directo de la palabra divina en discurso indirecto sin añadir explicaciones al cuerpo del texto.
  - Se evitó «SEÑOR» para no ocultar el Tetragrámaton, conforme a la práctica del proyecto.
  - La imagen espacial final se tradujo de forma natural en español sin perder la oposición frontal del hebreo.
