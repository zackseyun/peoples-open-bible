translation:
  language: es
  text: y todo su pueblo y sus fuerzas le obedecen[a]. Además de esto, él mismo se reclina y come y bebe y duerme[b];
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «fuerzas» puede entenderse también como «ejércitos», porque δυνάμεις en un contexto real puede designar fuerzas militares.
    reason: lexical_alternative
  - marker: b
    text: «se reclina» puede también rendirse «descansa» o «se recuesta»; aquí se conserva la imagen de la postura al comer, sugerida por la secuencia «come y bebe».
    reason: lexical_alternative
lexical_decisions:
- source_word: πᾶς ὁ λαὸς αὐτοῦ
  english_pob_choice: all his people
  chosen_spanish: todo su pueblo
  alternatives_spanish:
  - todo su gente
  - todo su pueblo entero
  lexicon: LSJ
  rationale: λαός designa aquí al conjunto de personas vinculadas al rey; en español, «pueblo» conserva bien ese valor colectivo sin imponer un matiz político más fuerte que el griego.
- source_word: αἱ δυνάμεις αὐτοῦ
  english_pob_choice: his forces
  chosen_spanish: sus fuerzas
  alternatives_spanish:
  - sus ejércitos
  - sus tropas
  - su poder
  lexicon: LSJ
  rationale: δυνάμεις en contexto real puede referir a fuerzas armadas o de poder. «Fuerzas» mantiene la amplitud del término, como en el inglés POB, sin estrecharlo prematuramente a «ejércitos».
- source_word: ἐνακούουσιν
  english_pob_choice: obey
  chosen_spanish: le obedecen
  alternatives_spanish:
  - le hacen caso
  - le escuchan
  - le acatan
  lexicon: LSJ
  rationale: Aunque el verbo se relaciona etimológicamente con oír, el contexto de subordinación real exige «obedecer» como equivalente funcional más natural en español.
- source_word: πρὸς δὲ τούτοις
  english_pob_choice: Besides this
  chosen_spanish: Además de esto
  alternatives_spanish:
  - Además
  - Por otra parte
  - Encima de esto
  lexicon: LSJ
  rationale: La frase añade un dato adicional en la argumentación; «Además de esto» conserva el valor aditivo de manera clara y sobria.
- source_word: ἀνάκειται
  english_pob_choice: reclines
  chosen_spanish: se reclina
  alternatives_spanish:
  - descansa
  - se recuesta
  - yace
  lexicon: LSJ
  rationale: El verbo puede significar «reclinarse» o «acostarse/descansar». Dado que sigue una serie con «come y bebe», «se reclina» preserva la imagen de postura a la mesa que la nota inglesa también destacó.
- source_word: ἐσθίει καὶ πίνει καὶ καθεύδει
  english_pob_choice: eats and drinks and sleeps
  chosen_spanish: come y bebe y duerme
  alternatives_spanish:
  - come y bebe y se duerme
  - come, bebe y duerme
  - está comiendo, bebiendo y durmiendo
  lexicon: LSJ
  rationale: La secuencia verbal simple del griego se refleja mejor con una coordinación directa en español; «duerme» mantiene el paralelismo y la naturalidad del registro.
translation_notes:
  revision_awareness: La redacción sigue de cerca la revisión inglesa más reciente al omitir la coma tras «se reclina», manteniendo una coordinación fluida de los verbos. También conserva la decisión auditada de entender δυνάμεις como «forces», por lo que «fuerzas» se usa en el texto principal con nota alternativa a «ejércitos».
  spanish_consistency_notes:
  - Se emplea «Yahvé» solo cuando el texto fuente lo requiera explícitamente; este versículo no contiene el nombre divino.
  - Se mantiene el paralelismo verbal simple del griego sin introducir tiempos compuestos o perífrasis innecesarias.
  - «Pueblo» y «fuerzas» respetan el contraste colectivo del texto sin añadir detalles no presentes en la fuente.
