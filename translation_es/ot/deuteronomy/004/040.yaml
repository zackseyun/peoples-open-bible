base_translation:
  language: en
  yaml_path: translation/ot/deuteronomy/004/040.yaml
  text: So you shall keep his statutes and his commandments that I am commanding you today[a], so that it may go well with you and with your children after you[c][b], and so that you may prolong your days on the land that Yahweh your God is giving you for all your days.
  footnotes:
  - marker: a
    text: Or 'that it may be good for you.' The Hebrew idiom means that things will go well for you.
    reason: lexical_alternative
  - marker: b
    text: '''Your children'' may also be rendered ''your sons'' or more broadly ''your descendants,'' depending on how specifically the term is taken in context.'
    reason: lexical_alternative
  - marker: c
    text: Or 'in the land.' The Hebrew preposition is literally 'on,' but English often says 'in the land' for this idiom.
    reason: lexical_alternative
