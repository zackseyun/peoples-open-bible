review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador capta bien el sentido general del hebreo y sigue de cerca la auditoría inglesa: el contraste enfático («Pero tú»), la intensificación de הֵיטֵב אֵיטִיב, el valor colectivo de זַרְעֲךָ y la cláusula de incontabilidad están mayormente preservados. Sin embargo, hay dos fallas importantes de fidelidad editorial: el marcador [a] se reutiliza para dos notas distintas en el texto, y «pondré tu descendencia como la arena del mar» no refleja tan bien como «haré tu descendencia como la arena del mar» el uso contextual de וְשַׂמְתִּי en una promesa de multiplicación.'
  spanish_quality_summary: El español es claro y digno, pero «pondré tu descendencia como la arena del mar» suena menos natural y menos preciso en este contexto que «haré tu descendencia como la arena del mar». Además, la gestión de notas al pie incumple el formato requerido al repetir el mismo marcador para contenidos distintos. Con un ajuste menor, el texto queda plenamente legible y fiel.
  glossary_alignment: No hay conflictos con la terminología teológica principal del proyecto. «Descendencia» es una buena solución para זרע como singular colectivo. «Ciertamente te haré bien» funciona bien para el infinitivo absoluto intensivo. La revisión propuesta alinea mejor וְשַׂמְתִּי con la decisión inglesa documentada («I will make») y corrige la disciplina de notas.
  issues:
  - severity: high
    issue: Se reutiliza el marcador [a] para dos notas distintas en el mismo versículo.
    rationale: Las instrucciones exigen marcadores únicos y en orden; el texto actual ancla [a] en «dijiste» y otra vez en «pondré», pero solo existe una nota [a], lo que vuelve ambigua la referencia y no cumple el formato del proyecto.
  - severity: medium
    issue: «Pondré» para וְשַׂמְתִּי es menos fiel al sentido contextual que «haré».
    rationale: En este contexto de descendencia innumerable, שׂים funciona idiomáticamente como ‘hacer’ más que ‘poner’. «Pondré tu descendencia como la arena del mar» suena poco idiomático en español y debilita la relación con la promesa de multiplicación.
  - severity: low
    issue: La nota sobre la intensificación verbal está anclada en «dijiste» en vez de la expresión intensiva de la promesa.
    rationale: La nota explica הֵיטֵב אֵיטִיב, no אָמַרְתָּ. Conviene anclarla en «Ciertamente te haré bien» para mayor precisión editorial.
  revised_spanish_text: 'Pero tú dijiste: «Ciertamente[a] te haré bien, y haré tu descendencia[b] como la arena del mar, que no se podrá contar[c] por su multitud».'
