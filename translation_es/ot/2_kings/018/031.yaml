translation:
  language: es
  text: 'No escuchen a Ezequías[a], porque así dice el rey de Asiria: Hagan paz conmigo y salgan, y vengan a mí; y coma cada hombre de su propia vid y cada hombre de su propia higuera, y beba cada hombre el agua de su propia cisterna.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo literalmente: «Hagan conmigo una bendición», un modismo para hacer la paz o llegar a un acuerdo.'
    reason: lexical_alternative
lexical_decisions:
- source_word: תִּשְׁמְעוּ אֶל
  english_pob_choice: listen to
  chosen_spanish: escuchen a
  alternatives_spanish:
  - oigan a
  - hagan caso a
  lexicon: HALOT
  rationale: שמע con אֶל expresa escuchar/atender. En español, «escuchen a» conserva la advertencia directa sin sobretraducirlo como obediencia explícita, aunque esa implicación esté presente en el contexto.
- source_word: חִזְקִיָּהוּ
  english_pob_choice: Hezekiah
  chosen_spanish: Ezequías
  alternatives_spanish:
  - Ezequías rey de Judá
  lexicon: Convención bíblica española
  rationale: Nombre propio bíblico normalizado en español.
- source_word: כִּי כֹה אָמַר
  english_pob_choice: for this is what ... says
  chosen_spanish: porque así dice
  alternatives_spanish:
  - porque así ha dicho
  - pues así dice
  lexicon: HALOT
  rationale: La fórmula introductoria en discurso directo queda natural y fiel con «porque así dice»; mantiene el carácter de oráculo/declara­ción inmediata.
- source_word: מֶלֶךְ אַשּׁוּר
  english_pob_choice: the king of Assyria
  chosen_spanish: el rey de Asiria
  alternatives_spanish:
  - el rey asirio
  lexicon: Referencia histórica estándar
  rationale: La construcción posesiva se conserva de manera transparente en español.
- source_word: עֲשׂוּ אִתִּי בְרָכָה
  english_pob_choice: Make peace with me
  chosen_spanish: Hagan paz conmigo
  alternatives_spanish:
  - Hagan un pacto conmigo
  - Hagan amistad conmigo
  - Hagan bendición conmigo
  lexicon: HALOT
  rationale: El hebreo literalmente dice «hagan conmigo bendición», pero el sentido idiomático en este contexto político es entrar en términos favorables/cesar la hostilidad. «Hagan paz conmigo» comunica la fuerza del ruego sin perder la tensión lexical; la literalidad se conserva en la nota.
- source_word: וּצְאוּ אֵלַי
  english_pob_choice: and come out to me
  chosen_spanish: y salgan a mí
  alternatives_spanish:
  - y salgan hacia mí
  - y vengan a mí
  - y salgan para entregarse a mí
  lexicon: HALOT
  rationale: יצא conserva su valor concreto de salir; en el contexto del asedio implica ir hacia el invasor. «Salgan a mí» mantiene la imagen verbal y la ambigüedad del hebreo, sin añadir la interpretación de rendición al cuerpo del texto.
- source_word: וְאִכְלוּ
  english_pob_choice: and let ... eat
  chosen_spanish: y coma
  alternatives_spanish:
  - y coma cada uno
  - y coman
  lexicon: HALOT
  rationale: El plural distributivo hebreo se expresa en español con singular genérico después de la secuencia de mandato, manteniendo el estilo de oferta individualizada.
- source_word: אִישׁ גַּפְנוֹ
  english_pob_choice: each man eat from his own vine
  chosen_spanish: cada hombre de su propia vid
  alternatives_spanish:
  - cada uno de su propia vid
  - cada hombre de su vid
  lexicon: HALOT
  rationale: אִישׁ es distributivo; «cada hombre» preserva la fuerza genérica masculina del hebreo. «De su propia vid» conserva la referencia a la posesión individual y la imagen de seguridad agrícola.
- source_word: תְּאֵנָתוֹ
  english_pob_choice: his own fig tree
  chosen_spanish: de su propia higuera
  alternatives_spanish:
  - de su higuera
  - de su propio árbol de higos
  lexicon: HALOT
  rationale: La higuera es el equivalente natural de תְאֵנָה en español bíblico contemporáneo.
- source_word: וּשְׁתוּ אִישׁ מֵי בוֹרוֹ
  english_pob_choice: and let each man drink the water of his own cistern
  chosen_spanish: y beba cada hombre el agua de su propio estanque
  alternatives_spanish:
  - y beba cada uno el agua de su propia cisterna
  - y beba cada hombre el agua de su propio aljibe
  lexicon: HALOT
  rationale: בּוֹר designa aquí un depósito excavado para agua, no un manantial; «estanque» comunica el recipiente de agua en un español más natural, aunque «cisterna» se mantiene como alternativa semánticamente más precisa.
- source_word: אִישׁ
  english_pob_choice: each man
  chosen_spanish: cada hombre
  alternatives_spanish:
  - cada uno
  - cada persona
  lexicon: HALOT
  rationale: Se conserva el distributivo masculino singular del hebreo con valor genérico, tal como refleja la decisión inglesa.
theological_decisions:
- issue: Valor idiomático de עֲשׂוּ אִתִּי בְרָכָה
  english_pob_reading: Make peace with me
  chosen_spanish_reading: Hagan paz conmigo
  alternative_spanish_readings:
  - Hagan bendición conmigo
  - Hagan un acuerdo conmigo
  - Entren en paz conmigo
  rationale: No es una fórmula doctrinal, pero sí una expresión políticamente cargada. Se mantiene el sentido contextual de negociación/sometimiento pacífico, sin borrar la rareza del hebreo, que queda documentada en la nota.
  doctrine_reference: Translation philosophy §1, §3
- issue: Uso distributivo de אִישׁ
  english_pob_reading: each man
  chosen_spanish_reading: cada hombre
  alternative_spanish_readings:
  - cada uno
  - todos
  rationale: Se preserva el singular masculino distributivo del hebreo para reflejar con precisión la forma del texto fuente. En español funciona como genérico inclusivo dentro del contexto de la proclama.
  doctrine_reference: Translation philosophy §4
translation_notes:
  revision_awareness: El último pase de revisión indicó que no había cambios necesarios y la concordancia con el texto fuente fue alta; esta propuesta mantiene esa lectura, con ajustes mínimos para una redacción española publicable y auditable.
  spanish_consistency_notes:
  - Se mantiene «Asiria» y no se sustituye por «el asirio» para conservar la construcción de fuente y la transparencia histórica.
  - Se evita «SEÑOR» porque no aparece el Tetragrámaton en este versículo.
  - Se conserva el paralelismo distributivo de אִישׁ con «cada hombre» en las tres cláusulas.
  - La nota[a] documenta la literalidad hebrea de בְרָכָה sin introducirla en el cuerpo principal, siguiendo la práctica POB de mantener claridad y auditabilidad.
