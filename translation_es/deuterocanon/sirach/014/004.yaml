translation:
  language: es
  text: El que se priva a sí mismo acumula para otro, y un extraño[a] se deleitará en sus bienes.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El hebreo tiene el singular «extraño»; el paralelo griego expresa la idea en plural («otros»). Se conserva aquí el singular por la base hebrea, con valor genérico.
    reason: alternative_reading
lexical_decisions:
- source_word: מוֹנֵעַ לְנַפְשׁוֹ
  english_pob_choice: deprives himself
  chosen_spanish: se priva a sí mismo
  alternatives_spanish:
  - se niega a sí mismo
  - se quita de sí
  lexicon: HALOT
  rationale: El hebreo expresa una privación dirigida a la propia persona, no solo una retención abstracta. «Se priva a sí mismo» conserva la fuerza reflexiva y evita una paráfrasis excesiva.
- source_word: יִקְבֹּץ לְאַחֵר
  english_pob_choice: will gather for another
  chosen_spanish: para otro acumula
  alternatives_spanish:
  - guardará para otro
  - reunirá para otro
  lexicon: HALOT
  rationale: קבץ es «juntar/reunir/recoger». En este contexto económico, «acumula» comunica bien la idea de reunir bienes, y «para otro» preserva el giro irónico del hebreo y del griego.
- source_word: וּבְטוֹבָתוֹ
  english_pob_choice: in his goods
  chosen_spanish: en sus bienes
  alternatives_spanish:
  - en sus cosas buenas
  - en su prosperidad
  - en sus posesiones
  lexicon: HALOT
  rationale: טובה aquí se entiende concretamente como bienes o posesiones. «Bienes» es natural en español y corresponde al paralelo griego ἐν τοῖς ἀγαθοῖς αὐτοῦ.
- source_word: זָר
  english_pob_choice: a stranger
  chosen_spanish: un extraño
  alternatives_spanish:
  - un forastero
  - un extranjero
  - un outsider
  lexicon: HALOT
  rationale: Aunque el hebreo es singular, funciona de modo genérico; el griego pluraliza la idea como «otros». «Un extraño» mantiene el singular base y su valor genérico en español.
- source_word: τρυφήσουσιν ἕτεροι
  english_pob_choice: a stranger will revel
  chosen_spanish: se deleitará
  alternatives_spanish:
  - gozará
  - vivirá en lujo
  - se regocijará
  lexicon: LSJ
  rationale: El griego τρυφάω apunta a vivir con deleite o lujo. «Se deleitará» transmite disfrute intenso sin volver el verso demasiado coloquial o rígidamente lujoso.
translation_notes:
  revision_awareness: El borrador sigue la revisión que restituyó el singular de זָר como «a stranger» en el inglés auditado, pero en español se conserva el singular genérico «un extraño» y se mantiene la correspondencia con el griego mediante una nota de alternativa lectora.
  spanish_consistency_notes:
  - Se evitó «Señor» o lenguaje cultual no presente en el versículo; no hay términos divinos aquí.
  - «Un extraño» mantiene el singular hebreo, mientras la nota aclara el apoyo del griego plural «otros».
  - «Bienes» funciona mejor que una calca de «cosas buenas» y respeta el paralelismo semántico con la versión griega.
