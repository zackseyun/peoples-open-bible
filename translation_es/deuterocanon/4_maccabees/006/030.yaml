revisions:
- from: Y después de decir estas cosas[a], el hombre santo noblemente se entregó a los tormentos, y se mantuvo firme por la razón para la ley, hasta los tormentos de la muerte.
  to: Y después de decir estas cosas[a], el hombre santo noblemente se entregó a las torturas, y se mantuvo firme por medio de la razón por la ley, hasta las torturas de la muerte.
  rationale: Se ajustó 'tormentos' a 'torturas' para reflejar mejor βάσανοι en un contexto de martirio y alinearse con la decisión léxica del POB inglés. Se cambió 'para la ley' por 'por la ley' para representar con fidelidad διὰ τὸν νόμον como motivo o causa. Se refinó 'por la razón' a 'por medio de la razón' para expresar más naturalmente en español el valor de τῷ λογισμῷ como principio o facultad instrumental. Se mantuvo la nota léxica sobre el verbo raro ἐναντεθάνει.
