translation:
  language: es
  text: 'Y Yahvé le dijo: «Esta es la tierra que juré a Abraham, a Isaac y a Jacob, diciendo: “A tu descendencia[a] se la daré”. Te la hice ver con tus propios ojos, pero no cruzarás allá».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «tu simiente». El hebreo usa un sustantivo colectivo singular.
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  - el SEÑOR
  lexicon: HALOT
  rationale: Se mantiene el nombre divino propio del texto hebreo, conforme al criterio del proyecto. En español, «Yahvé» es la forma reverente y reconocible que preserva el nombre del pacto sin sustituirlo por un título genérico.
- source_word: זֹאת הָאָרֶץ
  english_pob_choice: This is the land
  chosen_spanish: Esta es la tierra
  alternatives_spanish:
  - Esta es la tierra/país
  - Ésta es la tierra
  lexicon: HALOT
  rationale: «Tierra» reproduce bien el campo semántico de la promesa territorial en Deuteronomio. «País» sonaría menos natural aquí y podría debilitar la referencia al territorio prometido.
- source_word: נִשְׁבַּעְתִּי
  english_pob_choice: I swore
  chosen_spanish: juré
  alternatives_spanish:
  - lo juré
  - hice un juramento
  lexicon: HALOT
  rationale: El verbo expresa juramento solemne. «Juré» es directo y natural en español, y conserva la fuerza del compromiso divino.
- source_word: לְאַבְרָהָם לְיִצְחָק וּלְיַעֲקֹב
  english_pob_choice: to Abraham, to Isaac, and to Jacob
  chosen_spanish: a Abraham, a Isaac y a Jacob
  alternatives_spanish:
  - a Abraham, Isaac y Jacob
  - a Abraham, a Isaac, y a Jacob
  lexicon: HALOT
  rationale: Se conserva la repetición preposicional con buena fluidez en español, manteniendo el ritmo enfático del hebreo sin forzar la sintaxis.
- source_word: לֵאמֹר
  english_pob_choice: saying
  chosen_spanish: diciendo
  alternatives_spanish:
  - con estas palabras
  - y dijo
  lexicon: HALOT
  rationale: Es la fórmula estándar para introducir el contenido citado. «Diciendo» mantiene la relación directa con la cita siguiente.
- source_word: לְזַרְעֲךָ
  english_pob_choice: to your offspring
  chosen_spanish: A tu descendencia[b]
  alternatives_spanish:
  - A tu simiente[b]
  - A tus descendientes
  lexicon: HALOT
  rationale: «Descendencia» preserva el valor colectivo singular del hebreo זרע. Se evita «semilla» por resultar poco idiomático en español bíblico actual, aunque la nota conserva la alternativa léxica.
- source_word: אֶתְּנֶנָּה
  english_pob_choice: I will give it
  chosen_spanish: se la daré
  alternatives_spanish:
  - te la daré
  - la daré
  lexicon: HALOT
  rationale: La combinación pronominal reproduce el hebreo con naturalidad en español y mantiene el referente femenino de «la tierra».
- source_word: הֶרְאִיתִיךָ
  english_pob_choice: I have let you see it
  chosen_spanish: Te la hice ver
  alternatives_spanish:
  - Te la mostré
  - Te dejé verla
  lexicon: HALOT
  rationale: Se conserva el matiz causativo del hifil de ראה. «Te la hice ver» refleja mejor esa causación que un simple «te mostré».
- source_word: בְּעֵינֶיךָ
  english_pob_choice: with your own eyes
  chosen_spanish: con tus propios ojos
  alternatives_spanish:
  - con tus ojos
  - ante tus propios ojos
  lexicon: HALOT
  rationale: La expresión española reproduce el énfasis idiomático de visión directa y personal.
- source_word: וְשָׁמָּה לֹא תַעֲבֹר
  english_pob_choice: but you will not cross over there
  chosen_spanish: pero allí no cruzarás
  alternatives_spanish:
  - pero no pasarás allí
  - pero no entrarás allí
  - y allí no cruzarás
  lexicon: HALOT
  rationale: «Cruzar» conserva la imagen espacial del verbo עבר, asociada al paso hacia la tierra. «Allí» sigue el valor locativo del hebreo, y «pero» hace explícito el contraste implícito del contexto.
theological_decisions:
- issue: Nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Jehová
  - el SEÑOR
  rationale: El texto hebreo usa el Tetragrámaton de manera directa. La forma «Yahvé» mantiene el nombre del pacto y evita el reemplazo por un título genérico, en coherencia con la política del proyecto.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Valor colectivo de זרע en la promesa patriarcal
  english_pob_reading: offspring
  chosen_spanish_reading: descendencia
  alternative_spanish_readings:
  - simiente
  - descendientes
  rationale: El hebreo emplea un singular colectivo. «Descendencia» conserva ese valor colectivo sin obligar al español a decidir prematuramente entre singular o plural, y mantiene el sentido pactual de continuidad genealógica.
  doctrine_reference: DOCTRINE.md Translation philosophy §5 (consistency of key terms, or documented exception)
translation_notes:
  revision_awareness: 'El borrador sigue de cerca la edición inglesa auditada y conserva sus decisiones principales: el nombre divino en forma plena, el sustantivo colectivo de זרע, el matiz causativo de הֶרְאִיתִיךָ y la imagen espacial de עבר. No se introdujeron cambios textuales respecto del sentido base; solo se ajustó la sintaxis al español natural y se documentó la alternativa léxica de זרע.'
  spanish_consistency_notes:
  - Se usa «Yahvé» para יְהוָה, coherente con el estándar del proyecto.
  - Se traduce זרע como «descendencia» en el texto principal para conservar el singular colectivo.
  - Se mantiene «tierra» para הארץ en contexto de promesa territorial.
  - «Cruzar» conserva la imagen de מעבר/עבר sin sustituirla por «entrar».
  - La puntuación de cita respeta el estilo editorial español con comillas angulares y cita interna anidada de manera legible.
