translation:
  language: es
  text: Comerán aquellas cosas por las cuales se hizo expiación[b], para ordenarlos[a] y para consagrarlos; pero un extraño no las comerá[c], porque son santas.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literalmente, 'llenar su mano', un modismo hebreo para la ordenación o investidura sacerdotal.
    reason: lexical_alternative
  - marker: b
    text: O 'con las cuales se hizo expiación por ellos'.
    reason: lexical_alternative
  - marker: c
    text: '''Extraño'' aquí significa alguien no autorizado para participar en el rito sacerdotal, no necesariamente un extranjero por etnia.'
    reason: cultural_note
lexical_decisions:
- source_word: וְאָכְלוּ
  english_pob_choice: They shall eat
  chosen_spanish: Comerán
  alternatives_spanish:
  - Y comerán
  - Habrá de comer
  lexicon: HALOT
  rationale: El imperfecto con waw expresa aquí instrucción prescriptiva dentro del rito; en español, el futuro simple comunica bien ese valor normativo sin sobrecargar con perífrasis.
- source_word: אֹתָם
  english_pob_choice: those things
  chosen_spanish: aquellas cosas
  alternatives_spanish:
  - ellas
  - aquellas
  lexicon: HALOT
  rationale: El pronombre retoma las porciones sacrificiales del contexto previo. 'Aquellas cosas' aclara el referente en español y mantiene la distancia anafórica.
- source_word: אֲשֶׁר כֻּפַּר בָּהֶם
  english_pob_choice: by which atonement was made
  chosen_spanish: por las cuales se hizo expiación
  alternatives_spanish:
  - por medio de las cuales se hizo expiación
  - con las cuales se hizo expiación
  - por las cuales se hizo expiación para ellos
  lexicon: HALOT
  rationale: El pasivo de כפר con ב expresa el medio asociado a la expiación. 'Se hizo expiación' conserva la fuerza cultual; 'por las cuales' refleja el valor instrumental de 'en/con ellas' sin añadir un destinatario no explicitado en el hebreo de esta cláusula.
- source_word: לְמַלֵּא אֶת יָדָם
  english_pob_choice: to ordain them
  chosen_spanish: para ordenarlos
  alternatives_spanish:
  - para llenarles la mano
  - para instalarlos
  - para investirlos
  lexicon: HALOT
  rationale: Es un modismo técnico de instalación sacerdotal. 'Ordenarlos' comunica de manera natural el acto ritual; se evita una traducción literalmente calcaica en el texto principal, aunque la imagen hebrea queda documentada en la nota.
- source_word: לְקַדֵּשׁ אֹתָם
  english_pob_choice: to consecrate them
  chosen_spanish: para consagrarlos
  alternatives_spanish:
  - para santificarlos
  - para hacerlos santos
  lexicon: HALOT
  rationale: En contexto sacerdotal, קדשׁ apunta a poner aparte para servicio sagrado. 'Consagrarlos' es un equivalente moderno y digno que conserva el sentido ritual.
- source_word: וְזָר
  english_pob_choice: but an outsider
  chosen_spanish: pero un extraño
  alternatives_spanish:
  - pero un forastero
  - pero un no autorizado
  - pero un ajeno
  lexicon: HALOT
  rationale: En la ley cultual, זר no designa principalmente una etnia extranjera, sino a quien no pertenece al grupo sacerdotal autorizado. 'Extraño' comunica esa exclusión ritual; se mantiene la ambigüedad necesaria, como en el texto de base.
- source_word: לֹא יֹאכַל
  english_pob_choice: shall not eat them
  chosen_spanish: no las comerá
  alternatives_spanish:
  - no debe comerlas
  - no podrá comerlas
  lexicon: HALOT
  rationale: La prohibición es directa y legal. El objeto femenino plural concuerda con 'aquellas cosas' en español y evita ambigüedad.
- source_word: כִּי קֹדֶשׁ הֵם
  english_pob_choice: because they are holy
  chosen_spanish: porque son santas
  alternatives_spanish:
  - porque son santas/cosas santas
  - porque son sagradas
  lexicon: HALOT
  rationale: '''Santas'' preserva el registro cultual del hebreo קֹדֶשׁ. Se eligió la concordancia femenina plural por el referente inmediato ''aquellas cosas''.'
theological_decisions:
- issue: כפר en contexto sacrificial
  english_pob_reading: atonement was made
  chosen_spanish_reading: se hizo expiación
  alternative_spanish_readings:
  - se hizo atonamiento
  - se hizo propiciación
  - se hizo expiación/atonamiento
  rationale: En este rito sacerdotal, la acción de כפר pertenece al campo sacrificial. 'Expiación' es claro y fiel; 'atonamiento' no es idiomático en español. Se evita reducirlo a 'perdón' para no borrar la dimensión cultual del acto.
  doctrine_reference: Translation philosophy §6
- issue: Modismo sacerdotal לְמַלֵּא אֶת יָדָם
  english_pob_reading: to ordain them
  chosen_spanish_reading: para ordenarlos
  alternative_spanish_readings:
  - para llenarles la mano
  - para investirlos
  - para instalarlos
  rationale: El modismo significa la investidura u ordenación sacerdotal, no una acción literal sobre las manos. 'Ordenarlos' preserva la función ritual sin imponer terminología denominacional posterior.
  doctrine_reference: Translation philosophy §1, §6
- issue: זר en ley cultual
  english_pob_reading: an outsider
  chosen_spanish_reading: un extraño
  alternative_spanish_readings:
  - un forastero
  - un profano
  - una persona no autorizada
  rationale: La exclusión aquí es cultual, no étnica. 'Extraño' reproduce la categoría funcional de alguien fuera del círculo autorizado para comer de estas porciones sagradas.
  doctrine_reference: Translation philosophy §6
translation_notes:
  revision_awareness: 'La redacción sigue de cerca el hebreo y el expediente inglés revisado: se conserva la estructura prescriptiva, se mantiene la relación instrumental de כפר sin añadir ''para ellos'', y se refleja el modismo sacerdotal de לְמַלֵּא אֶת יָדָם mediante una equivalencia funcional en el texto con apoyo de nota. También se preserva la distinción cultual de זר como ''extraño''.'
  spanish_consistency_notes:
  - Se usa 'Yahvé' en este proyecto cuando el Tetragrámaton aparece; en este versículo no aparece.
  - '''Consagrar'' se reserva para el acto de apartar para servicio sagrado, coherente con el léxico de la serie sacerdotal.'
  - '''Expiación'' mantiene el peso sacrificial del contexto y evita una simplificación devocional.'
  - '''Extraño'' se entiende en sentido cultual, no como comentario sobre etnicidad.'
