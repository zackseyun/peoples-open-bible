translation:
  language: es
  text: Entonces él lo llevó a su casa y alimentó a los asnos[a]. Luego se lavaron los pies[b] y comieron y bebieron.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, más literalmente, «mezcló alimento para los asnos».
    reason: lexical_alternative
  - marker: b
    text: Lavarse los pies era un acto habitual de hospitalidad en el antiguo Cercano Oriente.
    reason: cultural_note
lexical_decisions:
- source_word: וַיְבִיאֵהוּ
  english_pob_choice: he brought him
  chosen_spanish: lo llevó
  alternatives_spanish:
  - lo trajo
  - lo llevó consigo
  lexicon: HALOT
  rationale: El hebreo causativo expresa que hizo venir a la otra persona; en español, 'lo llevó' comunica naturalmente el movimiento hacia la casa sin forzar una calca.
- source_word: לְבֵיתוֹ
  english_pob_choice: into his house
  chosen_spanish: a su casa
  alternatives_spanish:
  - dentro de su casa
  - a su hogar
  lexicon: HALOT
  rationale: La construcción con ל después de un verbo de movimiento admite 'a'. En español suena más natural que 'dentro de', y conserva la llegada a la casa del anfitrión.
- source_word: וַיָּבָול
  english_pob_choice: fed
  chosen_spanish: alimentó
  alternatives_spanish:
  - dio forraje a
  - preparó alimento para
  lexicon: HALOT
  rationale: El verbo hebreo se usa idiomáticamente para preparar o mezclar alimento para animales. 'Alimentó' conserva el sentido general con dignidad y claridad en español, sin perder que el objeto son los animales.
- source_word: לַחֲמוֹרִים
  english_pob_choice: the donkeys
  chosen_spanish: a los asnos
  alternatives_spanish:
  - a los burros
  - a los pollinos
  lexicon: HALOT
  rationale: '''חמור'' es ''donkey''. ''Asnos'' es una equivalencia precisa y natural en español bíblico; mantiene mejor el registro que ''burros''.'
- source_word: וַיִּרְחֲצוּ רַגְלֵיהֶם
  english_pob_choice: they washed their feet
  chosen_spanish: lavaron sus pies
  alternatives_spanish:
  - se lavaron los pies
  - les lavaron los pies
  lexicon: HALOT
  rationale: La acción de lavar los pies es un gesto de hospitalidad en el antiguo Cercano Oriente. 'Lavaron sus pies' conserva la formulación directa del hebreo y deja abierta la referencia natural al grupo hospedado.
- source_word: וַיֹּאכְלוּ וַיִּשְׁתּוּ
  english_pob_choice: ate and drank
  chosen_spanish: comieron y bebieron
  alternatives_spanish:
  - cenaron y bebieron
  - comieron y tomaron
  lexicon: HALOT
  rationale: La secuencia verbal breve del hebreo se refleja bien con 'comieron y bebieron', que es idiomático y fiel al ritmo narrativo.
theological_decisions:
- issue: Hospitalidad expresada por el lavado de pies
  english_pob_reading: Foot-washing was a customary act of hospitality in the ancient Near East.
  chosen_spanish_reading: Lavarse los pies se presenta como un gesto habitual de hospitalidad en el antiguo Cercano Oriente.
  alternative_spanish_readings:
  - Era una costumbre de cortesía.
  - Era un rito de purificación.
  rationale: El contexto no exige un sentido ritual; la nota debe preservar el valor cultural-hospitalario documentado por el POB inglés sin añadir una interpretación litúrgica.
  doctrine_reference: Costumbre cultural del antiguo Cercano Oriente; cf. Génesis 18:4; 19:2; Lucas 7:44.
translation_notes:
  revision_awareness: El texto inglés POB no muestra revisiones aplicadas y el estado más reciente indica sin cambios. La versión española sigue ese estado estable, manteniendo la misma decisión léxica central y las dos notas del audit trail.
  spanish_consistency_notes:
  - Se conservó 'Yahvé' donde no aplica en este versículo, por lo que no se introduce ninguna sustitución innecesaria.
  - '''Asnos'' mantiene el registro bíblico y evita el arcaísmo de ''asnas/eses''; ''burros'' quedó descartado por menor precisión de registro.'
  - No se añadió puntuación exegética extra; la segmentación sigue la narrativa simple del hebreo.
