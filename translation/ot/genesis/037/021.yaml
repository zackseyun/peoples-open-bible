id: GEN.37.21
reference: Genesis 37:21
source:
  edition: WLC
  text: וַ/יִּשְׁמַ֣ע רְאוּבֵ֔ן וַ/יַּצִּלֵ֖/הוּ מִ/יָּדָ֑/ם וַ/יֹּ֕אמֶר לֹ֥א נַכֶּ֖/נּוּ נָֽפֶשׁ׃
translation:
  text: But when Reuben heard it[a], he rescued him from their hand and said, “Let us not take his life.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, “Let us not kill him.” The Hebrew literally says, “Let us not strike him as to life,” an idiom for dealing a fatal blow.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּשְׁמַע
  chosen: when ... heard it
  alternatives:
  - heard
  - found out
  lexicon: HALOT
  rationale: שׁמע basically means 'hear.' In context Reuben is hearing the brothers' plan or speech from the previous verse, so English idiom benefits from supplying 'it.' Rendering with 'when' captures the narrative-temporal force of the waw-consecutive in smooth English.
- source_word: רְאוּבֵן
  chosen: Reuben
  rationale: 'Personal name is transliterated according to the translation philosophy: translate titles, transliterate names.'
- source_word: וַיַּצִּלֵהוּ
  chosen: rescued him
  alternatives:
  - delivered him
  - saved him
  lexicon: HALOT
  rationale: נצל in the Hiphil commonly means 'deliver, rescue.' 'Rescued him' is natural modern English and fits the immediate danger from his brothers.
- source_word: מִיָּדָם
  chosen: from their hand
  alternatives:
  - out of their hand
  - from them
  lexicon: HALOT
  rationale: The idiom 'from their hand' preserves the Hebrew image of power/control better than flattening to merely 'from them.' Singular 'hand' with plural suffix is a standard Hebrew idiom.
- source_word: וַיֹּאמֶר
  chosen: and said
  alternatives:
  - saying
  lexicon: HALOT
  rationale: Standard narrative introduction to direct speech; 'and said' is the clearest English rendering.
- source_word: לֹא נַכֶּנּוּ
  chosen: Let us not strike him down
  alternatives:
  - Let us not kill him
  - We must not strike him
  lexicon: HALOT
  rationale: נכה literally means 'strike, smite,' but in this context with נֶפֶשׁ it refers to a lethal blow. 'Strike him down' preserves the verbal imagery while making the intended result clear.
- source_word: נָפֶשׁ
  chosen: (implicit in 'strike him down')
  alternatives:
  - to death
  - fatally
  - as to life
  lexicon: HALOT
  rationale: Here נֶפֶשׁ functions adverbially/intensively in the idiom לֹא נַכֶּנּוּ נָפֶשׁ, meaning not to take his life / not fatally. Rather than a wooden 'in life' or 'as to life,' the sense is carried idiomatically by 'strike him down.'
