translation:
  language: es
  text: 'Jesús dijo[a]: «Bienaventurado[b] el que ha llegado a ser antes de llegar a ser. Si ustedes llegan a ser mis discípulos y escuchan mis palabras[c], estas piedras[d] les ministrarán, pues ustedes tienen cinco árboles en el Paraíso, que no se mueven en verano ni en invierno, y sus hojas no caen. Quien llegue a conocerlos no probará la muerte».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: La frase inicial retoma el patrón de los dichos de Thomas; el nombre «Jesús» se mantiene como forma identificable y estable en español.
    reason: source_note
  - marker: b
    text: «Bienaventurado» expresa el matiz de beatitud del préstamo griego ⲟⲩⲙⲁⲕⲁⲣⲓⲟⲥ; alternativas como «feliz» o «afortunado» serían más débiles en registro.
    reason: lexical_alternative
  - marker: c
    text: 'El testimonio manuscrito puede leerse en plural: «mis palabras»; una lectura normalizada publicada prefiere el singular «mi palabra». Aquí se sigue el plural manuscrito.'
    reason: textual_variant
  - marker: d
    text: «Estas piedras» sigue el plural explícito del manuscrito; una lectura normalizada ofrece como alternativa el singular «esta piedra».
    reason: textual_variant
lexical_decisions:
- source_word: ⲟⲩⲙⲁⲕⲁⲣⲓⲟⲥ
  english_pob_choice: blessed
  chosen_spanish: Bienaventurado
  alternatives_spanish:
  - bendito
  - feliz
  lexicon: Crum; uso del préstamo griego en copt. / tradición de bienaventuranza
  rationale: ‘Bienaventurado’ preserva el tono de bienaventuranza sentenciosa de Thomas y suena natural en español bíblico sin sonar demasiado devocional o litúrgico en exceso.
- source_word: ϣⲱⲡⲉ
  english_pob_choice: come to be / come into being
  chosen_spanish: llegar a ser
  alternatives_spanish:
  - venir a ser
  - comenzar a existir
  lexicon: Crum; Layton
  rationale: La paradoja requiere un giro que conserve el valor de ‘ser / llegar a existir’ sin volverla fría o mecánica; ‘llegar a ser’ comunica bien el doble movimiento temporal del dicho.
- source_word: ϩⲁⲡϩⲏ
  english_pob_choice: before
  chosen_spanish: antes de
  alternatives_spanish:
  - previo a
  - delante de
  lexicon: Crum
  rationale: La relación temporal es directa; ‘antes de’ reproduce con claridad la brevedad del original.
- source_word: ⲙⲁⲑⲏⲧⲏⲥ
  english_pob_choice: disciples
  chosen_spanish: discípulos
  alternatives_spanish:
  - seguidores
  - alumnos
  lexicon: Crum; préstamo griego
  rationale: ‘Discípulos’ es el equivalente normal y mantiene el matiz de aprendizaje y adhesión al maestro.
- source_word: ⲥⲱⲧⲙ ⲉ-
  english_pob_choice: listen to
  chosen_spanish: escuchen
  alternatives_spanish:
  - oigan
  - atiendan a
  lexicon: Crum; Lambdin
  rationale: En español, ‘escuchen’ funciona de modo natural y no fuerza una lectura más fuerte de obediencia que la que exige el copto.
- source_word: ⲡⲁϣⲁϫⲉ / ⲁⲛⲁϣⲁϫⲉ
  english_pob_choice: my word / my words
  chosen_spanish: mi palabra
  alternatives_spanish:
  - mis palabras
  lexicon: Crum; Layton
  rationale: Se adopta ‘mi palabra’ como forma idiomática y más compacta, en línea con la lectura normalizada del inglés POB, pero se reconoce la variante plural del testimonio manuscrito en nota.
- source_word: ⲛⲉⲉⲓⲱⲛⲉ / ⲡⲉⲓⲱⲛⲉ
  english_pob_choice: these stones / this stone
  chosen_spanish: estas piedras
  alternatives_spanish:
  - esta piedra
  lexicon: Crum
  rationale: Dado el testimonio manuscrito explícito en plural, se conserva el plural en español; además, ‘piedras’ comunica con claridad el efecto imagético del dicho.
- source_word: ⲛⲁⲣⲇⲓⲁⲕⲟⲛⲉⲓ
  english_pob_choice: will minister to
  chosen_spanish: les servirán
  alternatives_spanish:
  - les ministrarán
  - les atenderán
  lexicon: Crum; préstamo griego diakonein
  rationale: Aunque ‘ministrar’ conserva el eco técnico, ‘servirán’ es más natural en español y sigue el valor básico del verbo sin perder el sentido de proveer ayuda.
- source_word: ⲛϯⲟⲩ ⲛϣⲏⲛ
  english_pob_choice: five trees
  chosen_spanish: cinco árboles
  alternatives_spanish:
  - cinco plantas
  lexicon: Crum
  rationale: ‘Árboles’ es la equivalencia directa y más transparente.
- source_word: ⲡⲁⲣⲁⲇⲓⲥⲟⲥ
  english_pob_choice: Paradise
  chosen_spanish: Paraíso
  alternatives_spanish:
  - jardín del Paraíso
  - paraíso
  lexicon: Crum; préstamo griego
  rationale: ‘Paraíso’ es el equivalente natural y tradicional del préstamo griego, con mayúscula por tratarse de un lugar escatológico/nominado.
- source_word: ⲕⲓⲙ
  english_pob_choice: move
  chosen_spanish: se mueven
  alternatives_spanish:
  - se agitan
  - se desplazan
  lexicon: Crum
  rationale: El contexto de estabilidad estacional favorece ‘moverse’ en un sentido simple e intransitivo; evita sobrerinterpretar.
- source_word: ⲛϣⲱⲙ / ⲛⲡⲣⲱ
  english_pob_choice: summer / winter
  chosen_spanish: verano / invierno
  lexicon: Crum
  rationale: Términos estacionales directos, sin necesidad de glosa.
- source_word: ϭⲱⲃⲉ
  english_pob_choice: leaves
  chosen_spanish: hojas
  alternatives_spanish:
  - follaje
  lexicon: Crum
  rationale: ‘Hojas’ conserva la imagen concreta y el paralelo con árboles.
- source_word: ⲥⲟⲟⲩⲛ
  english_pob_choice: come to know
  chosen_spanish: llegue a conocer
  alternatives_spanish:
  - conozca
  - llegue a saber
  lexicon: Crum
  rationale: ‘Llegue a conocer’ refleja el valor ingresivo de la construcción copta y sugiere un conocimiento alcanzado.
- source_word: ϫⲓϯⲡⲉ ⲛⲙⲟⲩ
  english_pob_choice: taste death
  chosen_spanish: probará la muerte
  alternatives_spanish:
  - gustará la muerte
  - experimentará la muerte
  lexicon: Crum; Lambdin
  rationale: Se conserva el idiomático ‘probar la muerte’ por ser transparente en español bíblico y cercano al giro copto.
theological_decisions:
- issue: Paradoja temporal de 'haber llegado a ser antes de llegar a ser'
  english_pob_reading: A deliberate paradox based on ϣⲱⲡⲉ 'to come into being'.
  chosen_spanish_reading: una paradoja deliberada que se expresa con ‘ha llegado a ser antes de llegar a ser’
  alternative_spanish_readings:
  - ‘es antes de ser’
  - ‘ha existido antes de existir’
  rationale: La formulación conserva la repetición del verbo y el desconcierto intencional del dicho, sin resolverlo en una explicación filosófica.
  doctrine_reference: Lectura literaria del dicho; no impone una cristología o metafísica posterior.
- issue: Lectura singular/plural en ‘mi palabra / mis palabras’ y ‘esta piedra / estas piedras’
  english_pob_reading: Normalized singular reading in the English POB, with a noted manuscript plural alternative.
  chosen_spanish_reading: 'plural manuscrito: ‘mis palabras’ y ‘estas piedras’'
  alternative_spanish_readings:
  - 'singular normalizado: ‘mi palabra’ y ‘esta piedra’'
  rationale: El testimonio coptológico explícito favorece el plural; se evita seguir una emendación normalizada cuando el manuscrito ofrece una lectura clara y significativa.
  doctrine_reference: Respeto por la forma atestiguada del texto; no afecta una doctrina establecida.
- issue: ‘servirán’ frente a ‘ministrarán’
  english_pob_reading: will minister to
  chosen_spanish_reading: les servirán
  alternative_spanish_readings:
  - les ministrarán
  - les atenderán
  rationale: En español, ‘ministrar’ puede sonar eclesiástico o técnico; ‘servirán’ mantiene la utilidad concreta de las piedras sin introducir carga confesional ajena al dicho.
  doctrine_reference: Neutralidad estilística; preserva el valor funcional del verbo.
translation_notes:
  revision_awareness: This draft follows the latest revised English POB reading, but it knowingly departs from the normalized singular at the disputed line by adopting the manuscript’s explicit plural reading for both 'words' and 'stones', in line with the adjudicated revision that favored the extant Sahidic form. It also preserves the deliberate paradox of ϣⲱⲡⲉ with a Spanish formulation that keeps the repetition and temporal tension.
  spanish_consistency_notes:
  - Se usa ‘Paraíso’ con mayúscula para el lugar escatológico.
  - Se mantiene ‘Jesús’ como nombre propio y ‘discípulos’ como término técnico habitual.
  - Se evita ‘SEÑOR’ o sustituciones reverenciales ajenas al texto.
  - ‘Piedras’ y ‘palabra(s)’ se armonizan con la decisión textual plural del manuscrito.
  - El cierre ‘probará la muerte’ conserva el giro idiomático sin explicitarlo.
