  to: Hazor se convertirá en una guarida de chacales[a], una desolación para siempre; no habitará allí ningún hombre[b], y ningún hijo de Adán morará como forastero en ella.
  rationale: Se conserva la fidelidad al hebreo y a la auditoría inglesa, pero se ajusta el español para mayor naturalidad y precisión semántica. 'Hijo de Adán' reproduce de forma más idiomática la expresión hebrea בֶּן אָדָם en español bíblico, y 'morará como forastero' mantiene mejor el matiz de גוּר que 'se hospedará'.
