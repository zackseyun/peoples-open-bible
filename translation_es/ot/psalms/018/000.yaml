    text: O «esclavo de Yahvé». El término hebreo puede significar «siervo» o «esclavo»; aquí se traduce «siervo» porque el encabezamiento lo usa como título honorífico para David.
    reason: lexical_alternative
  - marker: b
    text: Hebreo «de la mano de», un modismo para liberación del poder o control de alguien.
    reason: cultural_note
  revision_rationale: 'El texto principal es sustancialmente fiel y natural, así que solo requiere una reparación menor del aparato de notas para alinearse con la evidencia fuente y la auditoría inglesa: mover la nota léxica a «siervo» y añadir la nota cultural para «de la mano de».'
