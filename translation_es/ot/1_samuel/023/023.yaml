translation:
  language: es
  text: Vean, pues, y averigüen acerca de todos los escondites donde él se oculta; luego vuelvan a mí con certeza, y yo iré con ustedes. Y si está en la tierra, yo lo buscaré entre todos los clanes[a] de Judá.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «todos los millares de Judá»; probablemente alude a clanes o subdivisiones familiares dentro de Judá.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וּרְאוּ
  english_pob_choice: See
  chosen_spanish: Ve, pues,
  alternatives_spanish:
  - Miren
  - Vean
  lexicon: HALOT
  rationale: El imperativo plural de ראה aquí introduce una instrucción para investigar; en español, «Ve, pues,» refleja bien la fuerza consecutiva de וּ/ y de la partícula lógica sin sonar forzado. Mantiene el tono directivo y natural.
- source_word: וּדְעוּ
  english_pob_choice: learn about
  chosen_spanish: averigua[a]
  alternatives_spanish:
  - conoce
  - entérate
  lexicon: HALOT
  rationale: En este contexto judicial/de exploración, דעה no es solo 'saber' abstracto sino obtener información. «Averigua» transmite la acción de investigar y obtener datos de manera idiomática en español.
- source_word: מִכֹּל הַמַּחֲבֹאִים
  english_pob_choice: from all the hiding places
  chosen_spanish: de entre todos los escondites
  alternatives_spanish:
  - de todos los lugares de escondite
  - de entre todos los lugares ocultos
  lexicon: HALOT
  rationale: מַחֲבֹאִים son 'escondites' o lugares de ocultamiento. «De entre» ayuda a reproducir el valor distributivo de מִן con כֹּל sin volver la frase pesada. No se espiritualiza ni se generaliza más de lo que permite el hebreo.
- source_word: אֲשֶׁר יִתְחַבֵּא שָׁם
  english_pob_choice: where he hides himself
  chosen_spanish: donde él se oculta
  alternatives_spanish:
  - donde se esconde
  - donde él se esconda
  lexicon: HALOT
  rationale: El verbo es reflexivo/intensivo en hebreo. «Se oculta» conserva el matiz de ocultarse a propósito y suena más sobrio que «se esconde» en este contexto de búsqueda.
- source_word: וְשַׁבְתֶּם אֵלַי
  english_pob_choice: return to me
  chosen_spanish: luego vuelvan a mí
  alternatives_spanish:
  - y vuelvan a mí
  - entonces regresen a mí
  lexicon: HALOT
  rationale: El waw secuencial en contexto da continuidad y consecuencia. «Luego» ayuda a ordenar la secuencia en español sin añadir una explicación ajena al texto.
- source_word: אֶל נָכוֹן
  english_pob_choice: with certainty
  chosen_spanish: con certeza
  alternatives_spanish:
  - con seguridad
  - ciertamente
  lexicon: HALOT
  rationale: נָכוֹן aquí funciona adverbialmente como firmeza/seguridad de información. «Con certeza» comunica bien la idea de volver con datos confirmados, sin sobretraducir.
- source_word: וְהָלַכְתִּי אִתְּכֶם
  english_pob_choice: I will go with you
  chosen_spanish: yo iré con ustedes
  alternatives_spanish:
  - iré con ustedes
  - y caminaré con ustedes
  lexicon: HALOT
  rationale: El verbo הלך se traduce de forma simple por «ir»; en español, «caminar» sería demasiado concreto. «Con ustedes» mantiene la pluralidad del interlocutor.
- source_word: וְהָיָה אִם יֶשְׁנוֹ בָאָרֶץ
  english_pob_choice: And if he is in the land
  chosen_spanish: Y si está en la tierra
  alternatives_spanish:
  - Y si se encuentra en la tierra
  - Y si está en el país
  lexicon: HALOT
  rationale: La construcción condicional se vuelve natural en español con «Y si». «La tierra» conserva la amplitud del hebreo; «el país» sería interpretativo y más estrecho.
- source_word: וְחִפַּשְׂתִּי אֹתוֹ
  english_pob_choice: I will search him out
  chosen_spanish: yo lo buscaré
  alternatives_spanish:
  - lo buscaré con diligencia
  - lo rastrearé
  lexicon: HALOT
  rationale: חפשׂ implica buscar cuidadosamente. En español, «buscaré» es la forma más natural; el contexto ya aporta la intensidad de la búsqueda. Se evita «rastrear» por su registro más moderno y técnico.
- source_word: בְּכֹל אַלְפֵי יְהוּדָה
  english_pob_choice: among all the clans of Judah
  chosen_spanish: entre todos los millares de Judá
  alternatives_spanish:
  - entre todas las tribus de Judá
  - entre todas las divisiones de Judá
  lexicon: HALOT
  rationale: אַלְפֵי significa literalmente «millares», y el POB inglés preserva esa tensión con una nota sobre posible unidad clánica. En el texto principal se conserva «millares» para no borrar la forma hebrea, y el contexto hace clara la referencia a subdivisiones sociales de Judá.
theological_decisions:
- issue: 'El sentido de אַלְפֵי יְהוּדָה: traducción literal vs. interpretación social'
  english_pob_reading: among all the clans of Judah
  chosen_spanish_reading: entre todos los millares de Judá
  alternative_spanish_readings:
  - entre todos los clanes de Judá
  - entre todas las divisiones de Judá
  rationale: El inglés POB opta por una equivalencia interpretativa («clans») pero preserva la literalidad en nota. En español se eligió «millares» para no ocultar la palabra hebrea, dejando que la nota explique la posible referencia a clanes o subdivisiones. Así se mantiene la tensión documental entre forma y sentido.
  doctrine_reference: Lexical transparency / equivalence with audit trail
translation_notes:
  revision_awareness: Tomé en cuenta la revisión inglesa más reciente, que prefirió una formulación más natural para el valor de דעו («learn about») y eliminó la redundancia de «there». En español, eso llevó a una expresión idiomática de investigación («averigua») y a omitir cualquier equivalente redundante de lugar, sin perder el matiz reflexivo de יתחבא.
  spanish_consistency_notes:
  - Se usó «Yahvé» según la pauta del proyecto, pero este versículo no contiene el tetragrámaton en el texto base.
  - Se mantuvo un registro reverente y claro, sin arcaísmos innecesarios.
  - «La tierra» se conserva por fidelidad al hebreo; no se interpretó como «el país» porque el contexto permite una referencia amplia.
