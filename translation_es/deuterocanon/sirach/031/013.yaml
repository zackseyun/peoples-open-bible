translation:
  language: es
  text: Hijo mío, si te sientas a una mesa grande, no abras tu garganta[a] sobre ella.[b]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El hebreo «no abras tu garganta sobre ella» es un modismo que advierte contra la codicia o el apetito voraz ante la mesa de un anfitrión rico; también puede entenderse en sentido más interpretativo como «no seas glotón con ella».
    reason: lexical_alternative
  - marker: b
    text: El paralelo griego conservado para esta referencia no corresponde a este versículo hebreo y parece estar desajustado; por eso la traducción se basa en el testimonio hebreo.
    reason: textual_variant
lexical_decisions:
- source_word: בני
  english_pob_choice: My son
  chosen_spanish: Hijo mío
  alternatives_spanish:
  - Hijo
  - Muchacho
  lexicon: HALOT
  rationale: Mantiene el vocativo paternal propio de la sabiduría bíblica y refleja el sufijo posesivo de primera persona. 'Hijo' solo perdería esa cercanía explícita; 'Muchacho' introduciría un matiz no presente en el hebreo.
- source_word: אם
  english_pob_choice: if
  chosen_spanish: si
  alternatives_spanish:
  - cuando
  lexicon: HALOT
  rationale: Es la equivalencia directa de la partícula condicional y conserva el carácter exhortativo general de la instrucción.
- source_word: על שלחן גדול
  english_pob_choice: at a great table
  chosen_spanish: a una mesa grande
  alternatives_spanish:
  - a una mesa rica
  - a una mesa importante
  - a una mesa lujosa
  lexicon: HALOT
  rationale: '''Mesa grande'' conserva la imagen compacta del hebreo y evita decidir prematuramente si גדול alude a tamaño, prestigio o abundancia. En español, ''mesa grande'' es natural y mantiene abierta la ambigüedad semántica.'
- source_word: ישבת
  english_pob_choice: you sit
  chosen_spanish: te sientas
  alternatives_spanish:
  - te has sentado
  - estás sentado
  lexicon: HALOT
  rationale: Aunque la forma hebrea es perfectiva, aquí funciona como condición general; el presente de subjuntivo en español transmite bien la situación hipotética y la instrucción sapiencial.
- source_word: אל תפתח
  english_pob_choice: do not open
  chosen_spanish: no abras
  alternatives_spanish:
  - no abres
  - no abras de par en par
  lexicon: HALOT
  rationale: Se conserva el verbo básico de la prohibición. Añadir ampliaciones idiomáticas no necesarias podría oscurecer el paralelismo con el hebreo.
- source_word: גרנך
  english_pob_choice: your throat
  chosen_spanish: tu garganta
  alternatives_spanish:
  - tu garganta / garganta
  - tu gaznate
  - tu apetito
  lexicon: HALOT
  rationale: '''Garganta'' es el equivalente natural y digno en español para גרון/גרנך. En este contexto figurado puede sugerir la idea de tragón o glotonería sin sustituir la imagen corporal por una abstracción como ''apetito''.'
translation_notes:
  revision_awareness: El contexto auditado marca una discrepancia fuerte con el paralelo griego proporcionado; por ello la redacción española sigue el testimonio hebreo anclado en el expediente de POB y no intenta armonizarlo con el griego aquí añadido.
  spanish_consistency_notes:
  - Se conserva el vocativo 'Hijo mío' como fórmula sapiencial estable.
  - Se evita 'SEÑOR' o cualquier terminología no pertinente, porque el versículo no contiene el nombre divino.
  - '''Mesa grande'' y ''tu garganta'' preservan la imaginería corporal y social del hebreo sin paráfrasis interpretativa excesiva.'
