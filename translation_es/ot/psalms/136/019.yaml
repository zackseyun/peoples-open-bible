translation:
  language: es
  text: a Sihón, rey de los amorreos[a], porque su amor leal permanece para siempre[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «el amorreo»; en español bíblico suele decirse «rey de los amorreos» como expresión colectiva.'
    reason: lexical_alternative
  - marker: b
    text: O «su fidelidad del pacto permanece para siempre».
    reason: lexical_alternative
lexical_decisions:
- source_word: לְסִיחוֹן
  english_pob_choice: Sihon / to Sihon
  chosen_spanish: a Sihón
  alternatives_spanish:
  - para Sihón
  - contra Sihón
  lexicon: HALOT
  rationale: La preposición לְ aquí conserva la relación poética con el contexto inmediato y puede marcar al destinatario/afectado por la acción previa. En español, la forma más natural y fiel al enlace sintáctico es «a Sihón»; «para» o «contra» introducirían una interpretación más marcada de la que el hebreo exige por sí solo.
- source_word: מֶלֶךְ
  english_pob_choice: king
  chosen_spanish: rey
  alternatives_spanish:
  - monarca
  lexicon: HALOT
  rationale: מֶלֶךְ es el título real normal. «Rey» es el equivalente directo, natural y estilísticamente adecuado en español bíblico contemporáneo.
- source_word: הָאֱמֹרִי
  english_pob_choice: the Amorites / the Amorite
  chosen_spanish: los amorreos
  alternatives_spanish:
  - el amorreo
  lexicon: HALOT
  rationale: Aunque la forma hebrea es singular/gentílica, el uso bíblico y la idiomática del español favorecen el colectivo plural «los amorreos» en la expresión «rey de los amorreos». Se mantiene así la referencia étnica colectiva que el inglés POB también documenta.
- source_word: כִּי
  english_pob_choice: for
  chosen_spanish: porque
  alternatives_spanish:
  - pues
  - ya que
  lexicon: HALOT
  rationale: En esta línea del salmo, כִּי introduce la base de la aclamación refránica. En español, «porque» expresa de modo claro la relación de fundamento sin volver la frase pesada o artificial.
- source_word: לְעוֹלָם
  english_pob_choice: endures forever
  chosen_spanish: permanece para siempre
  alternatives_spanish:
  - es para siempre
  - permanece eternamente
  lexicon: HALOT
  rationale: El hebreo no incluye un verbo explícito; por eso se requiere una solución verbal en español. «Permanece para siempre» conserva la duración continua del refrán sin imponer una expansión interpretativa mayor.
- source_word: חַסְדּוֹ
  english_pob_choice: his steadfast love
  chosen_spanish: su amor leal
  alternatives_spanish:
  - su fidelidad amorosa
  - su misericordia
  - su amor constante
  lexicon: HALOT
  rationale: חֶסֶד expresa amor leal, relacional y pactal. «Amor leal» preserva bien esa tensión entre afecto y fidelidad sin reemplazarla por un término eclesiástico más tradicional que podría estrechar el sentido.
theological_decisions:
- issue: Valor de חֶסֶד en el refrán de Salmo 136
  english_pob_reading: his steadfast love endures forever
  chosen_spanish_reading: su amor leal permanece para siempre
  alternative_spanish_readings:
  - su misericordia permanece para siempre
  - su fidelidad del pacto permanece para siempre
  rationale: El refrán celebra la lealtad amorosa de Yahvé manifestada en actos de liberación y juicio. «Amor leal» mantiene juntos el componente afectivo y el covenantal sin reducirlo solo a misericordia ni volverlo demasiado técnico con «fidelidad del pacto».
  doctrine_reference: Translation philosophy §§5–6
- issue: Relación del refrán con el nombre divino implícito en el salmo
  english_pob_reading: his steadfast love endures forever
  chosen_spanish_reading: su amor leal permanece para siempre
  alternative_spanish_readings:
  - el amor leal de Yahvé permanece para siempre
  rationale: Aunque el versículo no menciona explícitamente el nombre divino, el contexto del salmo y la serie refránica lo presupone. En español se conserva el pronombre posesivo tal como en el hebreo, evitando introducir un sujeto explícito que el texto no formula aquí.
  doctrine_reference: 'Terminology defaults: YHWH -> Yahvé'
translation_notes:
  revision_awareness: 'El inglés POB pasó por una revisión que suavizó una construcción inglesa demasiado literal («to Sihon») hacia una forma más idiomática, sin cambiar el valor de fondo. La versión española sigue esa misma línea: conserva el enlace hebreo con לְ, pero lo expresa con una sintaxis natural en español y mantiene el refrán de חֶסֶד con una opción semánticamente rica.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como forma normal para el nombre divino en el proyecto, aunque este versículo no lo enuncie de manera explícita.
  - Se usa «amor leal» como equivalente consistente para חֶסֶד cuando el contexto refránico requiere una expresión compacta y digna.
  - La capitalización y puntuación siguen el uso moderno en español; el verso funciona como parte de una cadena litúrgica repetitiva, por lo que la cadencia breve se preserva.
