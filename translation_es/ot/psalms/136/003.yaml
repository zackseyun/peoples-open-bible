translation:
  language: es
  text: Den gracias al Señor de señores,[a] porque su amor fiel permanece para siempre.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «su fidelidad de pacto permanece para siempre». El hebreo חֶסֶד puede denotar amor leal, de pacto, así como bondad o misericordia.'
    reason: lexical_alternative
lexical_decisions:
- source_word: הוֹדוּ
  english_pob_choice: Give thanks
  chosen_spanish: Den gracias
  alternatives_spanish:
  - Alaben
  - Confiesen/acknowledzcan
  lexicon: HALOT
  rationale: El imperativo plural de ידה en piel suele convocar a la comunidad a expresar gratitud o alabanza. «Den gracias» reproduce bien el refrán de Salmos 136 en español y conserva el valor litúrgico sin sobreparafrasear.
- source_word: לַאֲדֹנֵי הָאֲדֹנִים
  english_pob_choice: the Lord of lords
  chosen_spanish: el Señor de señores
  alternatives_spanish:
  - el dueño de los dueños
  - el maestro de maestros
  lexicon: HALOT
  rationale: La construcción hebrea es un título superlativo de soberanía. En español, «Señor de señores» mantiene la fuerza titulativa y la resonancia bíblica, mientras que «dueño» o «maestro» suenan más sociales y menos teológicos.
- source_word: כִּי
  english_pob_choice: for
  chosen_spanish: porque
  alternatives_spanish:
  - pues
  - ya que
  - en verdad
  lexicon: HALOT
  rationale: Aquí introduce la razón del imperativo del estribillo. «Porque» es natural en español y conserva la relación causal del hebreo sin añadir énfasis extra.
- source_word: לְעוֹלָם
  english_pob_choice: endures forever
  chosen_spanish: para siempre
  alternatives_spanish:
  - por siempre
  - eternamente
  - siempre
  lexicon: HALOT
  rationale: El hebreo funciona como expresión adverbial de duración indefinida. En español, la forma más natural aquí es «para siempre»; el verbo de permanencia está implícito por el contexto poético y por la frase completa.
- source_word: חַסְדּוֹ
  english_pob_choice: his steadfast love
  chosen_spanish: su amor constante
  alternatives_spanish:
  - su misericordia
  - su bondad
  - su amor fiel
  - su fidelidad de pacto
  lexicon: HALOT
  rationale: חֶסֶד abarca lealtad, bondad y amor de pacto. «Amor constante» comunica bien la permanencia y la dimensión leal en español, sin reducirlo a «misericordia» ni convertirlo en una glosa más técnica como «fidelidad de pacto».
theological_decisions:
- issue: Título divino אֲדֹנֵי הָאֲדֹנִים
  english_pob_reading: the Lord of lords
  chosen_spanish_reading: el Señor de señores
  alternative_spanish_readings:
  - el dueño de los dueños
  - el soberano de los soberanos
  rationale: La expresión es un título de supremacía para Dios. «Señor» conserva el valor titular y evita rebajar la frase a una mera jerarquía humana; además, armoniza con el uso bíblico tradicional en español sin ocultar que el hebreo nombra al Señor supremo sobre todos.
  doctrine_reference: 'DOCTRINE.md: Translate titles; Contested terms table for κύριος/Kyrios → Lord'
- issue: Sentido de חֶסֶד
  english_pob_reading: his steadfast love endures forever
  chosen_spanish_reading: para siempre es su amor constante
  alternative_spanish_readings:
  - para siempre es su misericordia
  - para siempre es su bondad
  - para siempre es su amor fiel
  rationale: El POB inglés preserva la tensión entre amor leal, bondad y permanencia. «Amor constante» mantiene el matiz de continuidad y fidelidad del pacto, y en español resulta más natural que una formulación demasiado técnica; la elección no niega la alternativa de «amor fiel», que queda implícita en el fondo semántico.
  doctrine_reference: Salmos 136 refrán litúrgico; חסד como amor leal/covenantal en HALOT
translation_notes:
  revision_awareness: Se siguió el pasaje del WLC y el auditor inglés sin cambios de revisión pendientes. La versión inglesa reciente permanece estable y el verificador de revisión indicó acuerdo total, así que no se introdujeron ajustes textuales adicionales.
  spanish_consistency_notes:
  - Se mantuvo «Señor» para el título divino según la convención del proyecto y la equivalencia con el inglés POB.
  - Se evitó traducir mecánicamente «for» como «pues» o «ya que»; «porque» conserva la relación causal de forma natural.
  - «Amor constante» se usa como solución estilística para חֶסֶד en este contexto, con la alternativa técnica indicada en nota.
  - El estribillo queda en una frase breve y litúrgica, adecuada para lectura pública y repetición en el salmo.
