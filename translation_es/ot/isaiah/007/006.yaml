translation:
  language: es
  text: Subamos contra Judá[a], y aterroricémosla, y abramos brecha en ella[b] para nosotros, y pongamos por rey en medio de ella al hijo de Tabeel.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «Subamos hacia Judá» o «Subamos para atacar a Judá». El hebreo admite el matiz de movimiento militar; la forma principal preserva el giro hostil de la expresión.
    reason: lexical_alternative
  - marker: b
    text: O «y la partamos para nosotros» o «y la abramos para nosotros». El verbo hebreo es difícil; la imagen principal conserva la idea de abrir una brecha violenta.
    reason: lexical_alternative
lexical_decisions:
- source_word: נַעֲלֶה בִּיהוּדָה
  english_pob_choice: Let us go up against Judah
  chosen_spanish: Subamos contra Judá
  alternatives_spanish:
  - Subamos hacia Judá
  - Subamos para atacar a Judá
  lexicon: HALOT
  rationale: עלה en contexto militar expresa avanzar o subir en campaña contra un territorio; en español, «subamos contra» conserva el valor idiomático hostil sin volverlo innecesariamente explícito.
- source_word: וּנְקִיצֶנָּה
  english_pob_choice: and terrorize her
  chosen_spanish: y aterroricémosla
  alternatives_spanish:
  - y hagámosla temer
  - y la llenemos de pavor
  - y la vexemos
  lexicon: HALOT
  rationale: El verbo hebreo es difícil, pero el contexto bélico pide una acción de causar miedo o pánico. «Aterroricémosla» mantiene la fuerza causal que la POB inglesa documenta.
- source_word: וְנַבְקִעֶנָּה אֵלֵינוּ
  english_pob_choice: and break her open for ourselves
  chosen_spanish: y abramos brecha en ella para nosotros
  alternatives_spanish:
  - y la partamos para nosotros
  - y la atravesemos para nosotros
  - y la rompamos para nosotros
  lexicon: HALOT
  rationale: בקע sugiere abrir, partir o hacer una brecha. «Abramos brecha» comunica la imagen militar de penetración violenta y permite conservar el complemento de ventaja «para nosotros».
- source_word: וְנַמְלִיךְ מֶלֶךְ
  english_pob_choice: and make ... king
  chosen_spanish: y pongamos por rey
  alternatives_spanish:
  - y hagamos rey
  - y instalemos como rey
  - y hagamos que reine
  lexicon: HALOT
  rationale: 'El hifil es causativo: nombrar o instalar a alguien como rey. «Pongamos por rey» es natural en español y refleja el acto de entronizar.'
- source_word: בְּתוֹכָהּ
  english_pob_choice: in the midst of it
  chosen_spanish: en medio de ella
  alternatives_spanish:
  - dentro de ella
  - en su interior
  lexicon: HALOT
  rationale: El sufijo femenino conserva la referencia a Judá como entidad personificada; «en medio de ella» mantiene esa concordancia sin perder claridad.
- source_word: בֶּן טָבְאַל
  english_pob_choice: the son of Tabeel
  chosen_spanish: al hijo de Tabeel
  alternatives_spanish:
  - al hijo de Tabeel
  - al ben de Tabeel
  lexicon: HALOT
  rationale: בֶּן es el sustantivo común «hijo de», no un nombre fusionado en este contexto. Se translitera טָבְאַל como «Tabeel» siguiendo la norma del proyecto para nombres propios.
theological_decisions:
- issue: Pronombre femenino para Judá
  english_pob_reading: Render Judah with feminine pronouns ('her')
  chosen_spanish_reading: Mantener la referencia femenina con «ella»
  alternative_spanish_readings:
  - neutralizar con «eso»
  - usar solo «Judá» sin retomarla
  rationale: El hebreo usa sufijos femeninos para Judá/ciudad; conservar «ella» respeta la gramática del texto fuente y la personificación sin introducir interpretación adicional.
  doctrine_reference: Translation philosophy §4 (gender-accurate over gender-neutral)
translation_notes:
  revision_awareness: La redacción sigue la última revisión inglesa que ajustó el valor de terrorize, break through it e in the midst of it para mayor precisión léxica. La versión española refleja esas decisiones con un lenguaje natural y conserva la tensión del hebreo sin suavizarla.
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando el texto hebreo contiene el nombre divino; este versículo no lo contiene.
  - «Judá» se mantiene como nombre propio con tratamiento femenino por la concordancia del hebreo.
  - Se traduce el causativo de מלך con una fórmula entronizadora natural en español («pongamos por rey»).
  - Se evita reemplazar la imaginería militar por paráfrasis genéricas, para no borrar la intensidad del original.
