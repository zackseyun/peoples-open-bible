    text: Or 'They will ascend acceptably on my altar.' The Hebrew phrase combines 'go up' with the idea of favorable acceptance.
    reason: lexical_alternative
  - marker: b
    text: '''My glorious house'' refers to the temple, literally ''the house of my beauty/glory.'''
    reason: lexical_alternative
