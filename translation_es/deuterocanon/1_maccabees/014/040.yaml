translation:
  language: es
  text: Porque se supo que los judíos son llamados por los romanos amigos, aliados y hermanos, y que recibieron a los enviados de Simón con honor[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «recibieron a los embajadores de Simón con honor». El verbo griego significa literalmente «se encontraron», pero en este contexto se refiere a una recepción diplomática oficial.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἠκούσθη
  english_pob_choice: it was heard
  chosen_spanish: se supo
  alternatives_spanish:
  - se oyó
  - se escuchó
  lexicon: LSJ
  rationale: La forma impersonal pasiva indica que la noticia llegó a ser conocida públicamente. «Se supo» conserva ese valor informativo sin forzar una fuente concreta del informe.
- source_word: προσηγορεῦνται
  english_pob_choice: are called
  chosen_spanish: son llamados
  alternatives_spanish:
  - son designados
  - son saludados como
  lexicon: LSJ
  rationale: El verbo expresa una denominación o reconocimiento formal. «Son llamados» refleja bien la formulación diplomática del griego.
- source_word: φίλοι
  english_pob_choice: friends
  chosen_spanish: amigos
  alternatives_spanish:
  - amigos cercanos
  - amigos políticos
  lexicon: LSJ
  rationale: En este contexto helenístico, «amigos» funciona como título relacional casi técnico; la traducción directa conserva ese matiz sin añadir explicación interpretativa al texto principal.
- source_word: σύμμαχοι
  english_pob_choice: allies
  chosen_spanish: aliados
  alternatives_spanish:
  - confederados
  - socios de alianza
  lexicon: LSJ
  rationale: Es el término político-militar estándar de alianza. «Aliados» es el equivalente moderno natural y preciso.
- source_word: οἱ ἀδελφοί
  english_pob_choice: brothers
  chosen_spanish: hermanos
  alternatives_spanish:
  - parientes
  - hermanos de alianza
  lexicon: LSJ
  rationale: Se mantiene el masculino plural explícito del griego y el valor relacional de la fórmula diplomática, sin neutralizarlo ni sustituirlo por un término más amplio.
- source_word: ἀπήντησαν
  english_pob_choice: received
  chosen_spanish: recibieron
  alternatives_spanish:
  - saludaron
  - se encontraron con
  lexicon: LSJ
  rationale: Aunque literalmente significa «se encontraron / fueron al encuentro», en el contexto de embajadores la acción es una recepción oficial; «recibieron» comunica naturalmente ese sentido diplomático.
- source_word: πρεσβευταῖς
  english_pob_choice: envoys
  chosen_spanish: enviados
  alternatives_spanish:
  - embajadores
  - delegados
  lexicon: LSJ
  rationale: «Enviados» expresa la función representativa sin imponer un rango diplomático más específico de lo que el griego exige.
- source_word: ἐνδόξως
  english_pob_choice: honorably
  chosen_spanish: con honor
  alternatives_spanish:
  - honorablemente
  - de manera honorable
  lexicon: LSJ
  rationale: La idea es un trato distinguido o honorable; «con honor» es idiomático en español y conserva la cualidad del recibimiento.
theological_decisions:
- issue: La fórmula diplomática «amigos, aliados y hermanos» aplicada a los judíos
  english_pob_reading: friends and allies and brothers
  chosen_spanish_reading: amigos, aliados y hermanos
  alternative_spanish_readings:
  - amigos y aliados y hermanos
  - amigos, aliados y parientes
  rationale: Se conserva la triple serie del griego y la lectura de la POB inglesa porque pertenece al registro diplomático helenístico. No se atenúa la fuerza relacional de «hermanos», que aquí es parte del título público, no una generalización inclusiva.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4
translation_notes:
  revision_awareness: 'Se siguió la lectura inglesa auditada sin cambios sustantivos, en concordancia con el informe de revisión más reciente: no se detectaron modificaciones necesarias y el nivel de acuerdo general es alto.'
  spanish_consistency_notes:
  - Se prefirió «Yahvé» solo cuando corresponda a יהוה; aquí no aparece.
  - Se mantuvo el término relacional masculino plural «hermanos» por fidelidad al griego y al formulario diplomático.
  - Se usó «enviados» en el texto principal y se dejó «embajadores» en nota como alternativa más formal, siguiendo el valor contextual de πρεσβευταῖς.
