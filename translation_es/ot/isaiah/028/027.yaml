translation:
  language: es
  text: Porque el comino negro no se trilla con un trillo[a], ni se hace rodar sobre el comino la rueda de un carro; más bien, el comino negro se bate con un bastón, y el comino con una vara[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O posiblemente "eneldo" o el arcaico inglés "fitches" para קֶצַח (qetsaḥ).
    reason: lexical_alternative
  - marker: b
    text: O posiblemente "alcaravea" para כַּמּוֹן (kammon).
    reason: lexical_alternative
lexical_decisions:
- source_word: חָרוּץ
  english_pob_choice: sledge
  chosen_spanish: trillo
  alternatives_spanish:
  - trillo de trillar
  - instrumento de trillar
  lexicon: HALOT
  rationale: El contexto agrícola pide un implemento de trilla, no solo algo 'afilado'. En español, 'trillo' comunica de forma natural la imagen del instrumento de trillar, y evita un anglicismo técnico innecesario.
- source_word: יוּדַשׁ
  english_pob_choice: is threshed
  chosen_spanish: se trilla
  alternatives_spanish:
  - se desgrana
  - se pisa
  lexicon: HALOT
  rationale: El verbo hebreo refiere a trillar/ser trillado. 'Se trilla' mantiene la acción agrícola y conserva el contraste con el golpeo más suave de la segunda mitad del versículo.
- source_word: קֶצַח
  english_pob_choice: black cumin
  chosen_spanish: alcaravea negra
  alternatives_spanish:
  - comino negro
  - nigela
  lexicon: HALOT
  rationale: La identificación botánica no es totalmente segura. El inglés POB preserva la tensión textual con una nota; en español, 'alcaravea negra' es una designación comprensible que mantiene la referencia a una semilla pequeña y oscura, sin afirmar con demasiada rigidez una identificación absoluta.
- source_word: אוֹפַן עֲגָלָה
  english_pob_choice: a cart wheel
  chosen_spanish: la rueda de un carro
  alternatives_spanish:
  - una rueda de carreta
  - la rueda del carro
  lexicon: HALOT
  rationale: La construcción hebrea es literalmente 'rueda de un carro/carreta'. 'La rueda de un carro' suena natural en español y conserva la imagen concreta del texto.
- source_word: יוּסָּב
  english_pob_choice: is rolled over
  chosen_spanish: se pasa sobre
  alternatives_spanish:
  - se rueda sobre
  - se hace pasar sobre
  lexicon: HALOT
  rationale: El verbo expresa movimiento circular/causado sobre la semilla. 'Se pasa sobre' comunica la acción con naturalidad en español sin perder la imagen de la rueda que gira sobre el grano.
- source_word: כִּי ... כִּי
  english_pob_choice: For ... rather
  chosen_spanish: Porque ... más bien
  alternatives_spanish:
  - Pues ... sino
  - Ya que ... más bien
  lexicon: HALOT
  rationale: El primer כִּי introduce explicación causal y el segundo marca contraste. 'Porque ... más bien' reproduce bien la lógica del pasaje en español. La coma y la adversativa destacan el cambio de procedimiento.
- source_word: מַטֶּה
  english_pob_choice: staff
  chosen_spanish: palo
  alternatives_spanish:
  - vara
  - bastón
  lexicon: HALOT
  rationale: En este contexto el instrumento es un objeto de golpeo simple. 'Palo' es más directo para el lector actual; se mantiene el contraste con 'vara' en la segunda mitad para reflejar la variación del hebreo.
- source_word: יֵחָבֶט
  english_pob_choice: is beaten out
  chosen_spanish: se golpea
  alternatives_spanish:
  - se bate
  - se sacude
  lexicon: HALOT
  rationale: El verbo hebreo alude a golpear para desprender el grano. 'Se golpea' es suficientemente fiel y, en combinación con el contexto, comunica la acción sin sobreexplicar.
- source_word: שָּׁבֶט
  english_pob_choice: rod
  chosen_spanish: vara
  alternatives_spanish:
  - bastón
  - cetro
  lexicon: HALOT
  rationale: Aquí se trata de un implemento más ligero que מַטֶּה. 'Vara' preserva la diferencia semántica y suena natural en español bíblico contemporáneo.
translation_notes:
  revision_awareness: La revisión inglesa más reciente no modificó el contenido del versículo; se mantuvo el acuerdo alto con la fuente hebrea y la decisión óptima de equivalencia. La versión española sigue esa misma línea, preservando el paralelismo agrícola y las incertidumbres léxicas documentadas.
  spanish_consistency_notes:
  - Se conserva la distinción entre el instrumento de trilla y el golpeo manual.
  - Se mantiene la duplicación causal/contrastiva de כִּי con 'Porque ... más bien'.
  - Se preserva la incertidumbre botánica de קֶצַח y כַמֹּן mediante notas.
  - Se evita el calco rígido de 'ser trillado' donde 'se trilla' resulta más idiomático en español.
