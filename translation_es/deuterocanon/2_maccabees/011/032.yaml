    issue: «anime» reduce el alcance de παρακαλέσοντα
    rationale: El participio futuro de παρακαλέω en este contexto epistolar/diplomático no se limita a «dar ánimo»; puede incluir exhortar o apelar. La auditoría inglesa conserva esa amplitud con nota.
  - severity: low
    issue: El pronombre «los» es correcto, pero «a ustedes» suena más explícito y armoniza mejor con la nota
    rationale: Dado que la nota ya usa «a ustedes», la redacción principal puede evitar una referencia pronominal menos explícita y mantener mejor la dignidad epistolar.
