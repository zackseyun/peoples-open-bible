revisions:
- from: 'Después de decir estas cosas, se fue. Pero los sacerdotes, con las manos extendidas hacia el cielo, invocaban al que siempre es el[a] campeón de nuestra nación, diciendo estas cosas:'
  to: 'Después de decir estas cosas, se fue. Pero los sacerdotes, extendiendo las manos hacia el cielo, invocaban al que siempre lucha en defensa de nuestra nación[a], diciendo estas cosas:'
  rationale: Se revisa únicamente la expresión de ὑπέρμαχον para evitar una construcción española poco idiomática (‘el campeón de nuestra nación’) y para expresar con claridad el matiz combativo-protector del griego. También se ajusta el participio a ‘extendiendo las manos’, que sigue más de cerca la forma griega y suena natural. No se requiere adjudicación adicional, porque la corrección es local, clara y bien sustentada por el expediente léxico.
