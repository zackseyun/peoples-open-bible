translation:
  language: es
  text: 'Y dijo a Judá[a]: «Edifiquemos estas ciudades y cerquémoslas con muro y torres, puertas y cerrojos, mientras el país aún está delante de nosotros, porque hemos buscado a Yahvé nuestro Dios. Lo hemos buscado, y él nos ha dado reposo por todas partes». Así edificaron y prosperaron.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «porque el país aún está delante de nosotros», es decir, la oportunidad sigue abierta o el territorio permanece sin amenaza inmediata ante ellos.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמֶר לִיהוּדָה
  english_pob_choice: And he said to Judah
  chosen_spanish: Y dijo a Judá
  alternatives_spanish:
  - Y dijo al pueblo de Judá
  - Y dijo a los judíos de Judá
  lexicon: HALOT
  rationale: לִיהוּדָה funciona aquí como destinatario metonímico (la entidad/pueblo de Judá). En español, «a Judá» conserva la forma breve del hebreo y suena natural; añadir «pueblo» explicaría de más lo que el texto no explicita.
- source_word: נִבְנֶה
  english_pob_choice: Let us build
  chosen_spanish: Edifiquemos
  alternatives_spanish:
  - Construyamos
  - Levantemos
  lexicon: HALOT
  rationale: El cohortativo expresa exhortación/resolución colectiva. «Edifiquemos» mantiene ese impulso y es adecuado para un contexto de fortificación; «construyamos» es posible, pero menos solemne.
- source_word: הֶעָרִים הָאֵלֶּה
  english_pob_choice: these cities
  chosen_spanish: estas ciudades
  alternatives_spanish:
  - estos pueblos
  - estas villas
  lexicon: HALOT
  rationale: עָרִים designa asentamientos urbanos; «ciudades» es la equivalencia normal y encaja con el contexto militar-defensivo.
- source_word: וְנָסֵב
  english_pob_choice: and surround them with
  chosen_spanish: y cerquémoslas con
  alternatives_spanish:
  - y rodeémoslas con
  - y hagamos un cerco alrededor de
  lexicon: HALOT
  rationale: El hiphil de סבב expresa rodear/circundar. «Cerquémoslas con» reproduce bien la idea de envolverlas con fortificaciones y mantiene el tono exhortativo.
- source_word: חוֹמָה וּמִגְדָּלִים דְּלָתַיִם וּבְרִיחִים
  english_pob_choice: walls and towers, gates and bars
  chosen_spanish: muro y torres, puertas y cerrojos
  alternatives_spanish:
  - muralla y torres, puertas y barrotes
  - muro y torres, portones y cerrojos
  lexicon: HALOT
  rationale: La lista nombra defensas urbanas. «Muro» conserva el singular colectivo de חוֹמָה; «torres» es directo; «puertas» funciona mejor que «portones» como equivalente amplio para דְּלָתַיִם en este contexto; «cerrojos» comunica el sentido de בריחים sin exigir una imagen demasiado técnica.
- source_word: עוֹדֶנּוּ הָאָרֶץ לְפָנֵינוּ
  english_pob_choice: while the land is still before us
  chosen_spanish: mientras la tierra aún está delante de nosotros
  alternatives_spanish:
  - porque la tierra todavía está delante de nosotros
  - ya que la tierra aún está ante nosotros
  lexicon: HALOT
  rationale: 'Se conserva la ambigüedad temporal/espacial del hebreo: el país sigue «delante de nosotros», es decir, la oportunidad o la situación aún no está cerrada. «Tierra» respeta el sustantivo hebreo; «delante de nosotros» mantiene la imagen idiomática.'
- source_word: כִּי דָרַשְׁנוּ אֶת יְהוָה אֱלֹהֵינוּ
  english_pob_choice: because we have sought Yahweh our God
  chosen_spanish: porque hemos buscado a Yahvé, nuestro Dios
  alternatives_spanish:
  - porque hemos buscado a Yahvé nuestro Dios
  - porque hemos consultado a Yahvé, nuestro Dios
  lexicon: HALOT
  rationale: דרשׁ con Dios aquí expresa buscarlo en dependencia y devoción, no solo pedir información. «Hemos buscado» conserva esa fuerza espiritual; el nombre divino se rinde como «Yahvé» según el criterio del proyecto.
- source_word: דָּרַשְׁנוּ
  english_pob_choice: We have sought him
  chosen_spanish: Lo hemos buscado
  alternatives_spanish:
  - Lo hemos consultado
  - Hemos buscado a él
  lexicon: HALOT
  rationale: La repetición intensifica la afirmación. En español, la elipsis del objeto en el primer miembro se resuelve naturalmente con «lo», y «buscado» mantiene la continuidad léxica del hebreo.
- source_word: וַיָּנַח לָנוּ מִסָּבִיב
  english_pob_choice: and he has given us rest on every side
  chosen_spanish: y él nos ha dado reposo por todos lados
  alternatives_spanish:
  - y nos ha dado descanso por todas partes
  - y nos ha concedido reposo alrededor
  lexicon: HALOT
  rationale: נוח aquí tiene el sentido de dar reposo/quietud. «Reposo» es idiomático y digno en español bíblico; «por todos lados» transmite el hebraísmo מִסָּבִיב sin introducir enemigos explícitos que el verso no menciona.
- source_word: וַיִּבְנוּ וַיַּצְלִיחוּ
  english_pob_choice: So they built and prospered
  chosen_spanish: Así edificaron y prosperaron
  alternatives_spanish:
  - Y edificaron y tuvieron éxito
  - Y construyeron y les fue bien
  lexicon: HALOT
  rationale: El cierre presenta resultado exitoso. «Prosperaron» conserva el matiz de éxito bendecido y es una equivalencia natural en español bíblico; «edificaron» mantiene el verbo de construcción ya iniciado.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahveh
  - Jehová
  lexicon: HALOT
  rationale: 'Se sigue la terminología del proyecto para el nombre divino: «Yahvé» como transliteración de יְהוָה, en vez de sustituirlo por un título.'
theological_decisions:
- issue: Nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahveh
  - Jehová
  rationale: El texto hebreo usa el Tetragrama directamente. La política del proyecto pide conservar el nombre divino como «Yahvé» en el texto principal, evitando la sustitución por «SEÑOR» o por un título genérico.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Sentido de דָרַשׁ con Dios
  english_pob_reading: we have sought
  chosen_spanish_reading: hemos buscado
  alternative_spanish_readings:
  - hemos consultado
  - hemos inquirido de
  rationale: 'En este contexto el verbo no es mera consulta intelectual. El tono del verso es devocional y covenantal: buscar a Yahvé como acto de dependencia, motivo por el cual «hemos buscado» preserva mejor la fuerza teológica.'
  doctrine_reference: HALOT; uso contextual del verbo דרשׁ en textos de dependencia religiosa
- issue: Valor de עוֹדֶנּוּ הָאָרֶץ לְפָנֵינוּ
  english_pob_reading: while the land is still before us
  chosen_spanish_reading: mientras la tierra aún está delante de nosotros
  alternative_spanish_readings:
  - porque la tierra aún está delante de nosotros
  - la tierra sigue delante de nosotros
  rationale: El hebreo puede leerse como motivación temporal («mientras aún...») y como imagen de oportunidad no cerrada. Se preserva esa tensión sin reducirla a una sola explicación interpretativa.
  doctrine_reference: Lexical ambiguity preserved per source
translation_notes:
  revision_awareness: 'El pasaje coincide con el audit trail inglés vigente: no hubo revisiones aplicadas en la última pasada, y la concordancia general fue alta. La redacción española sigue las decisiones léxicas principales del inglés auditado, preservando la ambigüedad de עוֹדֶנּוּ הָאָרֶץ לְפָנֵינוּ y el valor devocional de דָרַשׁ, además de reflejar el nombre divino como Yahvé.'
  spanish_consistency_notes:
  - Se mantuvo el paralelismo verbal entre «hemos buscado» y «Lo hemos buscado», como en el hebreo repetido.
  - Se eligió «muro» en singular colectivo para חוֹמָה, conservando la imagen de fortificación sin forzar una pluralidad que el hebreo no exige.
  - «Cerrojos» expresa בריחים con naturalidad en español bíblico y mantiene el registro de defensa urbana.
  - No se sustituyó «Yahvé» por «SEÑOR», conforme a la terminología del proyecto.
  - La frase final «edificaron y prosperaron» conserva el cierre breve y resultativo del hebreo.
