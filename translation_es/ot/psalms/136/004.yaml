translation:
  language: es
  text: al que solo hace grandes maravillas[a], porque su amor leal[b] permanece para siempre.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Maravillas» también puede entenderse como «prodigios» u «obras maravillosas».
    reason: lexical_alternative
  - marker: b
    text: «Amor leal» traduce aquí hebreo ḥesed, un término que suele incluir amor constante, lealtad de pacto y benevolencia fiel; también puede expresarse como «misericordia» o «fidelidad de pacto» según el contexto.
    reason: lexical_alternative
lexical_decisions:
- source_word: לְ/עֹשֵׂה
  english_pob_choice: to him who does
  chosen_spanish: al que hace
  alternatives_spanish:
  - al que realiza
  - al que obra
  lexicon: HALOT
  rationale: El participio funciona de modo sustantivo en la fórmula litúrgica; en español, «al que hace» conserva la acción continua y el valor de destinatario sin volver la frase pesada.
- source_word: נִפְלָאוֹת
  english_pob_choice: wonders
  chosen_spanish: maravillas
  alternatives_spanish:
  - prodigios
  - cosas maravillosas
  lexicon: HALOT
  rationale: «Maravillas» es un equivalente natural en español para actos extraordinarios de Dios y mantiene el tono doxológico del texto. También preserva bien la ambigüedad entre hechos portentosos y obras admirables.
- source_word: גְּדֹלוֹת
  english_pob_choice: great
  chosen_spanish: grandes
  alternatives_spanish:
  - poderosas
  - magnas
  lexicon: HALOT
  rationale: El adjetivo modifica a «maravillas»; «grandes» es el correlato directo y más idiomático en español.
- source_word: לְבַדּוֹ
  english_pob_choice: alone
  chosen_spanish: solo
  alternatives_spanish:
  - solamente él
  - por sí solo
  lexicon: HALOT
  rationale: 'La idea central es exclusividad: nadie más realiza estas obras. «Solo» conserva esa restricción de manera breve y natural en la línea poética.'
- source_word: לְעוֹלָם
  english_pob_choice: endures forever
  chosen_spanish: para siempre
  alternatives_spanish:
  - eternamente
  - por los siglos
  lexicon: HALOT
  rationale: El hebreo expresa duración ilimitada en un refrán sin verbo explícito; en español, «para siempre» reproduce bien esa permanencia sin añadir una formulación innecesaria.
- source_word: חַסְדּוֹ
  english_pob_choice: his steadfast love
  chosen_spanish: su misericordia
  alternatives_spanish:
  - su amor leal
  - su bondad constante
  - su fidelidad de pacto
  lexicon: HALOT
  rationale: Aunque «ḥesed» puede abarcar lealtad, amor de pacto y bondad, en esta línea refránica «misericordia» es una traducción española tradicional y comprensible. Mantiene la cualidad benevolente del término, aunque no agota su fuerza de lealtad pactal; esa tensión se documenta en la decisión teológica.
theological_decisions:
- issue: Cómo rendir חַסְדּוֹ en el refrán
  english_pob_reading: for his steadfast love endures forever
  chosen_spanish_reading: porque para siempre es su misericordia
  alternative_spanish_readings:
  - porque para siempre es su amor leal
  - porque para siempre es su fidelidad de pacto
  - porque para siempre es su bondad constante
  rationale: El inglés POB elige «steadfast love» para conservar la densidad de חֶסֶד. En español, «misericordia» es natural y reverente, pero puede ser más estrecha que el término hebreo. Por eso se documentan alternativas que expresan mejor la lealtad pactal; aun así, se adopta «misericordia» por su uso litúrgico amplio y su claridad en un refrán repetido.
  doctrine_reference: Translation philosophy §§5–6
translation_notes:
  revision_awareness: El pasaje coincide plenamente con el texto fuente recibido y con el audit trail inglés; no se documentan revisiones textuales adicionales en el paquete de trabajo.
  spanish_consistency_notes:
  - Se mantiene el paralelismo del refrán con una sintaxis breve y litúrgica.
  - No se usa «SEÑOR»; el verso no contiene el nombre divino explícito, pero la elección de «misericordia» evita introducir terminología eclesiástica ajena al hebreo.
  - La nota de ḥesed preserva la tensión semántica entre misericordia y amor leal, siguiendo el rastro del inglés POB.
