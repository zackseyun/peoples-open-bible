review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador transmite bien la estructura general del hebreo: propósito de saqueo, ataque contra ruinas repobladas, contra un pueblo reunido de entre las naciones, y la cláusula final sobre su ubicación central. Sin embargo, hay varios desajustes de fidelidad y naturalidad. «Despojar despojo» suena poco idiomático y no refleja tan bien el valor de בוז/בז como una formulación de saqueo/plunder más natural en español. Además, el relativo «que ha adquirido… que habita…» queda en singular aunque el antecedente inmediato es «las naciones»/«un pueblo», pero en español el último relativo se percibe mejor si concuerda con «pueblo» o si se reestructura con plural implícito; conviene afinar la sintaxis. También es preferible mantener el paralelismo con formas más naturales: «tomar botín y saquear despojos» o similar.'
  spanish_quality_summary: 'El texto es mayormente legible, pero contiene giros poco naturales: «despojar despojo» es tosco; «volver tu mano» puede entenderse, pero «volver tu mano contra» suena algo rígido, aunque aceptable por conservar la metáfora. La nota al pie está bien orientada. La frase final funciona, pero el anclaje de la nota conviene ir sobre «centro de la tierra[a]» sin alterar el sentido. En conjunto, requiere una reparación menor para sonar bíblico-natural sin perder la textura hebrea.'
  glossary_alignment: No hay términos del glosario principal en juego salvo topoi generales. «Ganado» y «posesiones» están bien alineados con מִקְנֶה y קִנְיָן. La decisión idiomática «centro de la tierra» concuerda con la auditoría inglesa y la nota preserva la alternativa literal «ombligo».
  issues:
  - severity: medium
    issue: «despojar despojo» es poco idiomático en español
    rationale: Aunque intenta conservar el acusativo cognado, en español resulta forzado y distrae. Una formulación como «saquear despojos» o «tomar despojos» preserva mejor el paralelismo sin sonar antinatural.
  - severity: low
    issue: «saquear botín» y «despojar despojo» no mantienen un paralelismo español óptimo
    rationale: La primera frase suena relativamente natural, la segunda no. Conviene equilibrarlas con dos expresiones de saqueo comprensibles y distintas.
  - severity: low
    issue: Ubicación de la nota al pie
    rationale: La nota se refiere específicamente a «el centro de la tierra», por lo que debe anclarse directamente en esa frase en el texto revisado.
  revised_spanish_text: para tomar botín y para saquear despojos, para volver tu mano contra ruinas ahora habitadas y contra un pueblo reunido de entre las naciones, que ha adquirido ganado y posesiones, que habita en el centro de la tierra[a].
  revised_footnotes:
  - marker: a
    text: Literalmente, «el ombligo de la tierra», un modismo para el centro o medio de la tierra o del mundo.
    reason: lexical_alternative
  revision_rationale: Se ajustó una expresión española más natural para el segundo par cognado, preservando la idea de saqueo intensificado sin calco torpe. También se mantuvo la metáfora de «volver tu mano» y la nota léxica sobre «ombligo de la tierra», con anclaje claro. Los cambios son menores y no requieren adjudicación adicional.
