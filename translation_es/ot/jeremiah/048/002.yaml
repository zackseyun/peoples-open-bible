translation:
  language: es
  text: 'No hay más alabanza de Moab. En Hesbón[a] han ideado mal contra ella: «Venid, cortémosla para que deje de ser nación». Tú también, Madmen[b], serás silenciada; la espada irá tras de ti.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El hebreo hace juego entre Hesbón (חֶשְׁבּוֹן) y «han ideado» (חָשְׁבוּ), una paronomasia que refuerza el anuncio de juicio.
    reason: lexical_alternative
  - marker: b
    text: Madmen es probablemente un nombre de lugar. El hebreo también puede sonar a «callar» o «ser puesto en silencio», intensificando el juicio mediante un juego de palabras.
    reason: cultural_note
lexical_decisions:
- source_word: אֵין עוֹד
  english_pob_choice: There is no more
  chosen_spanish: No hay más
  alternatives_spanish:
  - Ya no hay
  - No existe ya
  lexicon: HALOT
  rationale: La locución hebrea marca cese o desaparición. «No hay más» suena natural en español y conserva la fuerza de terminación del enunciado.
- source_word: תְּהִלַּת
  english_pob_choice: praise
  chosen_spanish: alabanza
  alternatives_spanish:
  - gloria
  - renombre
  - elogio
  lexicon: HALOT
  rationale: En este contexto de juicio, el sustantivo apunta a la fama celebrada de Moab. «Alabanza» mantiene el valor léxico de תְּהִלָּה sin imponer «gloria» como término más teológico o abstracto.
- source_word: בְּחֶשְׁבּוֹן
  english_pob_choice: In Heshbon
  chosen_spanish: En Hesbón
  alternatives_spanish:
  - En Heshbon
  - En la ciudad de Hesbón
  lexicon: HALOT
  rationale: 'La preposición ב es locativa: la trama sucede en Hesbón. Se conserva el topónimo en forma española usual «Hesbón» y se mantiene el juego sonoro con חָשְׁבוּ.'
- source_word: חָשְׁבוּ
  english_pob_choice: they have devised
  chosen_spanish: han ideado
  alternatives_spanish:
  - han planeado
  - han pensado
  - han tramado
  lexicon: HALOT
  rationale: חשׁב puede significar pensar, planear o idear. «Han ideado» comunica el acto deliberado y preserva de modo natural la cercanía sonora con «Hesbón».
- source_word: רָעָה
  english_pob_choice: evil
  chosen_spanish: mal
  alternatives_spanish:
  - maldad
  - calamidad
  - daño
  lexicon: HALOT
  rationale: La POB inglesa optó por «evil» tras una revisión léxica; en español «mal» reproduce el mismo campo semántico y evita suavizar la intención hostil del pasaje. Dado el paralelismo con el oráculo de juicio, «mal» es suficientemente literal y claro.
- source_word: לְכוּ וְנַכְרִיתֶנָּה מִגּוֹי
  english_pob_choice: Come, let us cut her off from being a nation
  chosen_spanish: «Venid, cortémosla para que deje de ser nación»
  alternatives_spanish:
  - «Venid, destruyámosla para que deje de ser nación»
  - «Venid, borrémosla como nación»
  lexicon: HALOT
  rationale: Se conserva el valor de כרת como «cortar» y el sentido idiomático de extinción nacional con «deje de ser nación». «Cortémosla» refleja el hebreo mejor que una paráfrasis con «destruir».
- source_word: מַדְמֵן
  english_pob_choice: Madmen
  chosen_spanish: Madmen
  alternatives_spanish:
  - Madmén
  - Madmán
  lexicon: HALOT
  rationale: Se preserva el topónimo como nombre de lugar. La forma sin adaptación excesiva mantiene la identidad geográfica y la posible alusión sonora con el verbo siguiente.
- source_word: תִּדֹּמִּי
  english_pob_choice: will be silenced
  chosen_spanish: quedarás en silencio
  alternatives_spanish:
  - serás silenciada
  - callarás
  - serás reducida al silencio
  lexicon: HALOT
  rationale: La raíz דמם admite la idea de callar, quedar mudo o ser silenciado. «Quedarás en silencio» conserva la ambigüedad entre estado impuesto y resultado de juicio, y suena natural en español.
- source_word: אַחֲרַיִךְ תֵּלֶךְ חָרֶב
  english_pob_choice: the sword will go after you
  chosen_spanish: la espada irá tras de ti
  alternatives_spanish:
  - la espada te perseguirá
  - la espada irá detrás de ti
  lexicon: HALOT
  rationale: Se sigue de cerca la imagen hebrea de la espada personificada que va detrás de la destinataria. «Irá tras de ti» mantiene la sintaxis y el carácter ominoso del original.
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión inglesa que cambió «disaster» por «evil» para acercarse más a רָעָה; por eso se eligió «mal» en lugar de «calamidad» o «desastre», sin perder el tono profético de juicio. También se conservó la decisión auditada de mantener el juego de palabras en nota y de tratar Madmen como topónimo.
  spanish_consistency_notes:
  - Se usa «Yahvé» como forma predeterminada cuando el nombre divino aparece, pero en este versículo no se requiere.
  - Se mantiene un registro bíblico digno y contemporáneo, evitando arcaísmos innecesarios.
  - Se conserva la personificación de la espada y el paralelismo del oráculo sin añadir interpretaciones doctrinales ajenas al texto.
