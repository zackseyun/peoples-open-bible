translation:
  language: es
  text: 'Entonces Nahás el amonita subió y acampó contra Jabés de Galaad. Y todos los hombres de Jabés dijeron a Nahás: «Haz un pacto[a] con nosotros, y te serviremos».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebreo literalmente, «corta un pacto con nosotros».
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּעַל
  english_pob_choice: went up
  chosen_spanish: subió
  alternatives_spanish:
  - subió
  - vino
  - avanzó
  lexicon: HALOT
  rationale: עלה en narración suele indicar movimiento ascendente o de avance; en español, «subió» conserva esa imagen básica sin añadir dirección específica que el texto no explicita.
- source_word: נָחָשׁ הָעַמּוֹנִי
  english_pob_choice: Nahash the Ammonite
  chosen_spanish: Nahás el amonita
  alternatives_spanish:
  - Nahás de Amón
  - Nahás el amonita
  lexicon: HALOT
  rationale: Se translitera el nombre propio y se traduce el gentilicio con el equivalente natural en español, manteniendo la identificación étnica del hebreo.
- source_word: וַיִּחַן עַל
  english_pob_choice: encamped against
  chosen_spanish: acampó frente a
  alternatives_spanish:
  - acampó contra
  - se instaló frente a
  - acampó contra
  lexicon: HALOT
  rationale: חנה con עַל en contexto militar puede expresar acampar frente a un objetivo. «Frente a» conserva la relación hostil sin forzar la idea más precisa de «asedió» que el verbo por sí solo no exige.
- source_word: יָבֵשׁ גִּלְעָד
  english_pob_choice: Jabesh-gilead
  chosen_spanish: Jabés de Galaad
  alternatives_spanish:
  - Jabés-Galaad
  - Jabés de Galaad
  lexicon: HALOT
  rationale: Se adapta el topónimo a una forma clara y publicable en español, conservando el compuesto geográfico con la preposición «de».
- source_word: כָּל אַנְשֵׁי יָבֵישׁ
  english_pob_choice: all the men of Jabesh
  chosen_spanish: todos los hombres de Jabés
  alternatives_spanish:
  - todos los hombres de Jabés
  - toda la gente de Jabés
  lexicon: HALOT
  rationale: אַנְשֵׁי significa literalmente «hombres de». Se mantiene el valor masculino explícito, coherente con el contexto cívico-militar.
- source_word: כְּרָת לָנוּ בְרִית
  english_pob_choice: Make a covenant with us
  chosen_spanish: Haz un pacto con nosotros
  alternatives_spanish:
  - Haz un pacto con nosotros
  - Corta un pacto con nosotros
  - Haz una alianza con nosotros
  lexicon: HALOT
  rationale: El hebreo dice literalmente «corta un pacto». En español, «haz un pacto» comunica el acto pactal sin sonar artificial; «alianza» podría diluir el vínculo léxico con ברית.
- source_word: וְנַעַבְדֶךָּ
  english_pob_choice: and we will serve you
  chosen_spanish: te serviremos
  alternatives_spanish:
  - te serviremos
  - seremos tus siervos
  - te obedeceremos
  lexicon: HALOT
  rationale: עבד con objeto personal se traduce de modo directo como «servir». La forma verbal española expresa bien la sumisión solicitada sin introducir el sustantivo «siervos» innecesariamente.
translation_notes:
  revision_awareness: Corregido para eliminar la nota sin anclaje en el texto. La versión previa incluía una nota sobre la literalidad de ברית, pero el marcador [a] no aparecía en el cuerpo; ahora se integra la idea sin nota para cumplir la validación.
  spanish_consistency_notes:
  - Se mantiene «Nahás» como transliteración consistente del nombre propio.
  - Se usa «Jabés de Galaad» para un topónimo natural en español y congruente con el compuesto hebreo.
  - Se conserva el registro de pacto con «pacto» y el verbo «servir» para reflejar ברית y עבד sin sobretraducir.
