    text: O «los redimidos de Yahvé» o «los redimidos por Yahvé».
    reason: lexical_alternative
  - marker: b
    text: También puede traducirse «Buscada con afán» o «Indagada».
    reason: lexical_alternative
  - marker: c
    text: O «ciudad no abandonada».
    reason: lexical_alternative
  revision_rationale: Se corrigieron y alinearon las notas al lugar semántico correspondiente en el texto, y se cambió 'abandonada' por 'desamparada' para reflejar mejor la decisión léxica documentada sobre נֶעֱזָבָה y su eco temático en Isaías. También se ajustó la nota de 'Buscada' para evitar una expansión interpretativa innecesaria.
