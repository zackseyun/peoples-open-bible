translation:
  language: es
  text: Después volverán los hijos de Israel y buscarán a Yahvé su Dios y a David, su rey[b][a]; y vendrán con temor a Yahvé y a su bondad en los últimos días[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «vendrán temblando»; el verbo hebreo puede traducirse «temer» o, en esta construcción, «acercarse temblando hacia».'
    reason: lexical_alternative
  - marker: b
    text: «David, su rey» puede referirse al David histórico como figura representativa o a un futuro gobernante davídico; el hebreo no desarrolla la expresión.
    reason: alternative_reading
  - marker: c
    text: «En los últimos días» es una expresión profética que también puede verterse «en los postreros días» o «en días venideros».
    reason: lexical_alternative
lexical_decisions:
- source_word: אַחַר
  english_pob_choice: Afterward
  chosen_spanish: Después
  alternatives_spanish:
  - Luego
  - Más adelante
  lexicon: HALOT
  rationale: Marca secuencia temporal futura. «Después» es natural en español y conserva la relación con lo precedente sin añadir un matiz interpretativo extra.
- source_word: יָשֻׁבוּ
  english_pob_choice: will return
  chosen_spanish: volverán
  alternatives_spanish:
  - regresarán
  - se volverán
  lexicon: HALOT
  rationale: שׁוּב expresa volver/retornar. «Volverán» es idiomático y mantiene tanto el retorno físico como la idea de restauración, sin explicitar «arrepentirse».
- source_word: בְּנֵי יִשְׂרָאֵל
  english_pob_choice: the children of Israel
  chosen_spanish: los hijos de Israel
  alternatives_spanish:
  - el pueblo de Israel
  - los hijos de Israel
  lexicon: HALOT
  rationale: Se conserva el idiomatismo de parentesco pactal. «Hijos» es más fiel al hebreo que «pueblo» y más claro en español que una literalidad rígida.
- source_word: וּבִקְשׁוּ
  english_pob_choice: and seek
  chosen_spanish: buscarán
  alternatives_spanish:
  - y buscarán
  - y consultarán
  lexicon: HALOT
  rationale: בקשׁ implica buscar con intención y empeño. «Buscarán» transmite bien esa búsqueda activa; el futuro está expresado por el contexto verbal español.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahvé
  - Jehová
  lexicon: HALOT
  rationale: 'Se sigue el principio del proyecto para el Tetragrámaton: «Yahvé», no la sustitución por «Señor». Esto preserva el nombre divino personal.'
- source_word: אֱלֹהֵיהֶם
  english_pob_choice: their God
  chosen_spanish: su Dios
  alternatives_spanish:
  - su Dios
  - su Dios de ellos
  lexicon: HALOT
  rationale: La sufijación posesiva expresa relación de pacto. En español, «su Dios» comunica la pertenencia sin sobrecargar la frase.
- source_word: וְאֵת דָּוִד מַלְכָּם
  english_pob_choice: and David their king
  chosen_spanish: y a David, su rey
  alternatives_spanish:
  - y a David, su rey
  - y al rey David
  lexicon: HALOT
  rationale: Se mantiene el nombre «David» sin expandir el referente. La duplicación de objeto con «a» respeta el acusativo hebreo y la referencia real.
- source_word: וּפָחֲדוּ
  english_pob_choice: they will come in fear
  chosen_spanish: vendrán con temor
  alternatives_spanish:
  - vendrán con temor reverente
  - vendrán temblando
  lexicon: HALOT
  rationale: פחדו con אֶל sugiere acercamiento reverente y temeroso. «Vendrán con temor» conserva la idea de movimiento hacia Yahvé sin hacer negativa la emoción ni resolverla en un solo valor.
- source_word: אֶל יְהוָה
  english_pob_choice: to Yahweh
  chosen_spanish: a Yahvé
  alternatives_spanish:
  - hacia Yahvé
  - a Yahvé
  lexicon: HALOT
  rationale: La preposición אֶל indica dirección hacia. «A Yahvé» es natural y conserva la orientación del movimiento.
- source_word: וְאֶל טוּבוֹ
  english_pob_choice: and to his goodness
  chosen_spanish: y a su bondad
  alternatives_spanish:
  - y a su bondad
  - y a su bien
  lexicon: HALOT
  rationale: טוּב puede ser bondad, bien o beneficencia. «Bondad» permite leer tanto el carácter de Dios como su beneficencia sin cerrarlo a un solo matiz.
- source_word: בְּאַחֲרִית הַיָּמִים
  english_pob_choice: in the latter days
  chosen_spanish: en los últimos días
  alternatives_spanish:
  - en los postreros días
  - en los últimos días
  - en días venideros
  lexicon: HALOT
  rationale: Es una expresión profética estable. «En los últimos días» es clara en español y conserva el peso escatológico sin imponer un esquema más específico.
theological_decisions:
- issue: Identidad de «David, su rey»
  english_pob_reading: Retained as 'David their king' in the main text without interpretive expansion.
  chosen_spanish_reading: Se mantiene «David, su rey» sin ampliarlo a «mesías» o «descendiente de David» en el texto principal.
  alternative_spanish_readings:
  - David, su rey
  - su rey davídico
  - el Mesías, su rey
  rationale: El hebreo nombra a David directamente y el texto no explicita el referente. En español conviene conservar la tensión profética sin resolverla en una identificación más específica que el versículo no formula.
  doctrine_reference: Preserve theological tension rather than resolve it.
- issue: Fuerza de פחדו אל יהוה ואל טובו
  english_pob_reading: Rendered as movement in reverent trembling toward the LORD and his goodness.
  chosen_spanish_reading: Se traduce como acercamiento con temor hacia Yahvé y su bondad.
  alternative_spanish_readings:
  - vendrán con temor a Yahvé y a su bondad
  - vendrán temblando hacia Yahvé y su bondad
  - vendrán en temor reverente a Yahvé y a su bondad
  rationale: La combinación de פחד con אֶל incluye miedo/reverencia y movimiento hacia el objeto. «Con temor» evita que la bondad de Dios parezca amenazante y mantiene la ambivalencia reverente del hebreo.
  doctrine_reference: Preserve theological tension rather than resolve it.
translation_notes:
  revision_awareness: El texto español sigue la revisión más reciente del audit trail al preferir una forma más directa de פחדו con «vendrán con temor», manteniendo el resto de la línea conforme al consenso del proceso de revisión. También preserva la decisión del proyecto para YHWH como «Yahvé» y conserva sin expansión interpretativa la frase «David, su rey».
  spanish_consistency_notes:
  - Se usa «Yahvé» de manera consistente para יְהוָה, conforme al estándar del proyecto.
  - Se conserva «bondad» para טוּב, evitando sustituirlo por «bien» o «buenas obras», que estrecharían el sentido.
  - Se mantiene la tensión profética de «David, su rey» sin identificarlo explícitamente en el cuerpo del versículo.
  - 'El orden español respeta la progresión del hebreo: retorno, búsqueda, temor reverente y horizonte escatológico.'
