base_translation:
  language: en
  yaml_path: translation/ot/judges/008/027.yaml
  text: Gideon made it into an ephod and set it up in his city[a], in Ophrah. And all Israel prostituted themselves after it there[b], and it became a snare to Gideon and to his house.
  footnotes:
  - marker: a
    text: Or 'played the prostitute after it'; the Hebrew uses sexual-infidelity imagery for Israel's idolatry.
    reason: lexical_alternative
  - marker: b
    text: An 'ephod' was a cultic object associated with priestly use; here the exact form or function is not fully specified by the text.
    reason: cultural_note
