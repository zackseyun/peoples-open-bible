revisions:
- from: ¡Yahvé[a], Dios de Israel, tú eres justo, porque hemos quedado como un remanente, como en este día. Aquí estamos delante de ti, en nuestra culpa[b], porque no hay quien pueda mantenerse en pie delante de ti por causa de esto[c].
  to: ¡Yahvé, Dios de Israel, tú eres justo[a], porque hemos quedado como un remanente[b], tal como estamos hoy. Aquí estamos delante de ti, en nuestra culpa, porque nadie puede mantenerse en pie delante de ti por causa de esto[c].
  rationale: Se corrige la nota [a] para que preserve la alternativa léxica documentada en el POB inglés para צַדִּיק, se añade la alternativa correspondiente al 'remanente' preservado, y se mejora כְּהַיּוֹם הַזֶּה con una expresión española más natural y fiel al sentido presente ('tal como estamos hoy'). También se pule la cláusula final y la nota idiomática para mayor naturalidad en español sin perder el valor judicial del hebreo.
  reviewer_model: gpt-5.4
