translation:
  language: es
  text: 'Y el pueblo riñó con Moisés y dijeron[a]: «¡Ojalá hubiéramos perecido cuando perecieron nuestros hermanos delante de Yahvé!»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «¡Ojalá hubiéramos muerto cuando murieron nuestros hermanos delante de Yahvé!»'
    reason: alternative_reading
lexical_decisions:
- source_word: וַיָּרֶב
  english_pob_choice: quarreled
  chosen_spanish: riñó
  alternatives_spanish:
  - contendió
  - discutió
  - se enfrentó
  lexicon: HALOT
  rationale: ריב expresa disputa o contienda. «Riñó» transmite en español actual el tono hostil y confrontativo del verbo sin suavizarlo con «comenzó a quejarse».
- source_word: הָעָם
  english_pob_choice: the people
  chosen_spanish: el pueblo
  alternatives_spanish:
  - la gente
  - la congregación
  lexicon: HALOT
  rationale: עַם aquí designa al colectivo israelita. «El pueblo» es natural y conserva el referente comunitario.
- source_word: עִם מֹשֶׁה
  english_pob_choice: with Moses
  chosen_spanish: con Moisés
  alternatives_spanish:
  - contra Moisés
  lexicon: HALOT
  rationale: עִם es «con». En español, «riñó con Moisés» comunica bien la hostilidad sin convertir la preposición en un equivalente más interpretativo.
- source_word: וַיֹּאמְרוּ לֵאמֹר
  english_pob_choice: and said
  chosen_spanish: y dijo
  alternatives_spanish:
  - y les dijo
  - y hablaron, diciendo
  lexicon: HALOT
  rationale: La fórmula de introducción del discurso se rinde de manera idiomática como «y dijo», suficiente para el español publicado y fiel al valor introductorio del hebreo.
- source_word: וְלוּ
  english_pob_choice: If only
  chosen_spanish: ¡Ojalá
  alternatives_spanish:
  - Si tan solo
  - ¡Quién hubiera
  lexicon: HALOT
  rationale: La partícula expresa deseo lamentoso. «¡Ojalá» reproduce bien ese matiz volitivo y exclamativo en español.
- source_word: גָוַעְנוּ
  english_pob_choice: we had perished
  chosen_spanish: hubiéramos perecido
  alternatives_spanish:
  - hubiéramos muerto
  - hubiéramos expirado
  lexicon: HALOT
  rationale: גוע denota morir/perder la vida, y la revisión inglesa favoreció «perished» para preservar la repetición léxica. «Hubiéramos perecido» mantiene esa consistencia y suena natural en español.
- source_word: בִּגְוַע
  english_pob_choice: when ... perished
  chosen_spanish: cuando perecieron
  alternatives_spanish:
  - como perecieron
  - al perecer
  lexicon: HALOT
  rationale: El infinitivo constructo con ב marca el marco temporal/circunstancial. «Cuando perecieron» expresa con claridad el tiempo de la acción y preserva la repetición del verbo.
- source_word: אַחֵינוּ
  english_pob_choice: our brothers
  chosen_spanish: nuestros hermanos
  alternatives_spanish:
  - nuestros parientes
  - nuestros hermanos y hermanas
  lexicon: HALOT
  rationale: El plural masculino del hebreo se conserva como «hermanos», siguiendo la decisión de precisión de género documentada en el audit trail inglés.
- source_word: לִפְנֵי יְהוָה
  english_pob_choice: before Yahweh
  chosen_spanish: delante de Yahvé
  alternatives_spanish:
  - en presencia de Yahvé
  - ante Yahvé
  lexicon: HALOT
  rationale: לִפְנֵי significa «delante de / en presencia de». Se usa «Yahvé» conforme al criterio del proyecto para el Tetragrámaton.
theological_decisions:
- issue: Nombre divino YHWH
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - SEÑOR
  rationale: El hebreo contiene יְהוָה directamente; el criterio del proyecto pide verterlo como «Yahvé» en el texto principal. Se evita «SEÑOR» porque funcionaría como sustitución de máscara y no como transliteración transparente.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Matiz de גוע en paralelo repetido
  english_pob_reading: we had perished ... our brothers perished
  chosen_spanish_reading: hubiéramos perecido ... perecieron
  alternative_spanish_readings:
  - hubiéramos muerto ... murieron
  - hubiéramos fallecido ... fallecieron
  rationale: La repetición del mismo campo verbal es parte de la fuerza del versículo. «Perecido/perecieron» conserva la correspondencia léxica y el tono lamentoso sin atenuarlo.
  doctrine_reference: 'DOCTRINE.md Translation philosophy §3: Preserve lexical/theological tensions'
translation_notes:
  revision_awareness: La base inglesa fue revisada de «died» a «perished» en ambos miembros para reflejar con mayor consistencia el hebreo גוע. La redacción española sigue esa revisión y también conserva la repetición verbal.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» en el cuerpo del texto según la norma del proyecto.
  - Se conserva la repetición de perecer/perecieron para reflejar la simetría del hebreo.
  - El tono de lamento se expresa con «¡Ojalá», que es natural en español y equivalente al valor desiderativo de וְלוּ.
  - «Riñó con Moisés» preserva la adversatividad sin introducir una glosa interpretativa adicional.
