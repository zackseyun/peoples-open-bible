review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador conserva bien la estructura del hebreo: Josué convoca a «todo Israel» y luego especifica a sus ancianos, cabezas, jueces y oficiales; también mantiene correctamente la doble autodescripción de vejez. Sin embargo, dos elecciones españolas no preservan bien el sentido ni la legibilidad: «sus cabezas» es una conservación demasiado literal de ראשׁ que en español suena extraña y poco inteligible en el texto principal, y «Yo estoy viejo» resulta coloquial y menos digno que el tono requerido. Además, la nota [c] está mal anclada: explica «he avanzado en años», pero el marcador aparece solo en «viejo».'
  spanish_quality_summary: La redacción general es clara, pero necesita pulirse para un español eclesial natural y digno. «a sus cabezas» debe pasar al sentido administrativo claro («a sus jefes») con nota que preserve el literal hebreo. «Yo estoy viejo» conviene cambiarlo por «Yo soy viejo» o mejor «Yo he envejecido»; dada la línea inglesa, «Yo soy viejo» expresa el estado presente con mejor registro. También conviene ajustar la puntuación para mantener la frase fluida sin rigidez.
  glossary_alignment: 'No hay problemas con términos del glosario mayor. Los cargos «ancianos», «jueces» y «oficiales» están bien. La excepción importante es ראשׁ: aunque la auditoría inglesa preservó «heads», en español el equivalente literal «cabezas» no funciona bien en texto principal; debe trasladarse al pie de nota y usar «jefes» en el cuerpo, explicando la literalidad hebrea.'
  issues:
  - severity: high
    issue: «a sus cabezas» en el texto principal
    rationale: Aunque refleja literalmente ראשׁ, en español contemporáneo eclesial suena antinatural y distrae del sentido. La propia nota ya aclara que significa «jefes o principales». Para fidelidad funcional y legibilidad, el texto principal debe decir «a sus jefes», conservando «cabezas» en la nota.
  - severity: medium
    issue: «Yo estoy viejo» tiene registro demasiado coloquial
    rationale: El hebreo expresa el estado presente resultante («I am old»). En español bíblico digno, «soy viejo» o «he envejecido» funciona mejor que «estoy viejo», que suena más conversacional y menos estable como autodescripción solemne.
  - severity: medium
    issue: La nota [c] está anclada de manera imprecisa
    rationale: La nota explica el hebraísmo «he entrado en días» = «he avanzado en años», pero el marcador aparece tras «viejo». Debe anclarse en la frase que traduce בָּאתִי בַּיָּמִים, es decir, junto a «he avanzado en años».
