revisions:
- from: Ven[a], embriaguemos a nuestro padre con vino, y acostémonos con él[b], para que preservemos descendencia de nuestro padre.
  to: Ven, hagamos beber vino a nuestro padre, y acostémonos con él[a], para que preservemos descendencia[b] por medio de nuestro padre.
  rationale: Se reemplaza «embriaguemos» por «hagamos beber vino a nuestro padre» para reflejar con precisión el causativo hebreo sin añadir el resultado de embriaguez. Se mueve la nota de «simiente» a «descendencia», donde realmente corresponde al hebreo זָרַע. También se ajusta «de nuestro padre» a «por medio de nuestro padre» para representar mejor la mediación/origen expresada en el cierre del verso y alinearse con la resolución final del POB inglés. Se conserva «acostémonos con él» por su fidelidad al eufemismo hebreo y buena naturalidad en español.
