lexical_decisions:
- source_word: וְ/יַהְצָה
  english_pob_choice: and Jahaz
  chosen_spanish: y Yahaz
  alternatives_spanish:
  - y Yahzah
  lexicon: HALOT
  rationale: Es un nombre propio de lugar en una lista geográfica, así que se translitera. Se conserva la forma española más natural ‘Yahaz’, que refleja la convención inglesa principal ‘Jahaz’; se deja como alternativa ‘Yahzah’ por la variación tradicional señalada en el audit trail y por una conservación consonántica más cercana.
- source_word: וּ/קְדֵמֹת
  english_pob_choice: and Kedemoth
  chosen_spanish: y Quedemot
  alternatives_spanish:
  - y Kedemot
  lexicon: HALOT
  rationale: Aunque el término hebreo puede evocar ‘oriente’ o ‘antiguo’, aquí funciona como topónimo. En español se mantiene como nombre propio transliterado. ‘Quedemot’ sigue la adaptación gráfica española común con Q para el valor /k/ ante e; ‘Kedemot’ queda como alternativa.
- source_word: וּ/מֵפָעַת
  english_pob_choice: and Mephaath
  chosen_spanish: y Mefaat
  alternatives_spanish:
  - y Mofaat
  lexicon: HALOT
  rationale: También es un nombre propio de lugar, por lo que se translitera sin traducir. Se opta por ‘Mefaat’ como forma española natural y breve, manteniendo la variación tradicional indicada por el inglés (‘Mophaath’) como ‘Mofaat’.
translation_notes:
  revision_awareness: El pasaje muestra alta concordancia con el texto base hebreo y con el registro auditado en inglés; no hubo revisiones aplicadas en el pasaje de referencia. La opción española sigue esa estabilidad textual y solo ajusta la transliteración a una forma natural en español.
  spanish_consistency_notes:
  - Se mantuvo la estructura enumerativa con repetición de ‘y’ para reflejar la coordinación simple del hebreo.
  - Se evitó traducir semánticamente los topónimos, porque el contexto es una lista de ciudades/ asentamientos y no un uso léxico común.
  - Se usó puntuación y mayúsculas propias del español moderno, conservando los nombres propios como formas adaptadas pero reconocibles.
