translation:
  language: es
  text: Y al cuarto día, Holofernes dio un banquete para sus esclavos[a] solamente, y no invitó a ninguno de los que estaban de servicio[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «siervos». El griego usa δοῦλοι, término que puede significar «esclavos» o «siervos» según el contexto; aquí se eligió «esclavos» para preservar el sentido de dependencia vinculada que sugiere el término.
    reason: lexical_alternative
  - marker: b
    text: La última cláusula probablemente se refiere a los que estaban ocupados en servicios prácticos o deberes oficiales; la expresión griega es algo idiomática.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐγένετο ἐν τῇ ἡμέρᾳ τῇ τετάρτῃ
  english_pob_choice: on the fourth day
  chosen_spanish: en el cuarto día
  alternatives_spanish:
  - al cuarto día
  - cuando llegó el cuarto día
  lexicon: LSJ
  rationale: La expresión introduce un marcador temporal narrativo. «En el cuarto día» conserva la referencia temporal directa con un español natural y sobrio.
- source_word: ἐποίησεν ... πότον
  english_pob_choice: gave a banquet
  chosen_spanish: hizo un banquete
  alternatives_spanish:
  - dio un banquete
  - celebró un banquete
  - hizo un festín
  lexicon: LSJ
  rationale: πότος puede designar un banquete de bebida o festín. «Hizo un banquete» sigue de cerca la imagen verbal del griego y es comprensible en español, sin perder el carácter de reunión festiva.
- source_word: τοῖς δούλοις αὐτοῦ
  english_pob_choice: for his slaves
  chosen_spanish: para sus esclavos
  alternatives_spanish:
  - para sus siervos
  - para sus servidores
  lexicon: BDAG
  rationale: Se conserva «esclavos» porque δοῦλοι apunta al estatus de dependencia vinculada, y el audit trail inglés mantuvo esa fuerza lexical para preservar la realidad social del texto.
- source_word: μόνοις
  english_pob_choice: alone
  chosen_spanish: solamente
  alternatives_spanish:
  - solos
  - únicamente
  lexicon: LSJ
  rationale: El adverbio restrictivo expresa exclusión de los demás; «solamente» comunica bien la restricción en español, en coordinación con «para sus esclavos».
- source_word: οὐκ ἐκάλεσεν
  english_pob_choice: he did not invite
  chosen_spanish: no llamó
  alternatives_spanish:
  - no invitó
  - no convocó
  lexicon: BDAG
  rationale: Aunque en un contexto de banquete «invitar» sería posible, el griego usa «llamar» y la formulación española conserva mejor esa base verbal sin perder el sentido pragmático.
- source_word: εἰς τὴν χρῆσιν
  english_pob_choice: to the banquet
  chosen_spanish: al servicio
  alternatives_spanish:
  - al banquete
  - a la ocasión
  - para el servicio
  lexicon: LSJ
  rationale: La expresión es idiomática y se relaciona con una función/uso. «Al servicio» mantiene la idea de ocupación o desempeño vinculado al evento, sin sobreatribuir el matiz de la frase.
- source_word: οὐδένα τῶν πρὸς ταῖς χρείαις
  english_pob_choice: any of those in attendance
  chosen_spanish: a ninguno de los que estaban al servicio
  alternatives_spanish:
  - a ninguno de los asistentes
  - a ninguno de los que servían
  - a ninguno de los encargados de las tareas
  lexicon: LSJ
  rationale: La frase final alude a personas ocupadas en deberes prácticos o de oficio. «Los que estaban al servicio» mantiene la conexión semántica con χρεία y evita fijar con demasiada precisión una función que el griego deja algo abierta.
translation_notes:
  revision_awareness: 'El texto español sigue el estado más reciente del audit trail: se preservó la opción fuerte «esclavos» para δοῦλοις y se entendió la cláusula final como una referencia idiomática a quienes estaban ocupados en servicio o deberes. También se tuvo en cuenta la revisión que prefirió una formulación más natural para la segunda mitad de la frase.'
  spanish_consistency_notes:
  - Se mantuvo «Holofernes» como nombre propio transliterado de forma estándar.
  - Se usó «Y» al inicio por norma ortográfica española.
  - Se conservó la terminología vinculada al estatus social con «esclavos», en armonía con la política del proyecto sobre δοῦλος.
  - La clausula final se vertió de manera flexible para respetar la ambigüedad idiomática del griego sin cerrar indebidamente el sentido.
