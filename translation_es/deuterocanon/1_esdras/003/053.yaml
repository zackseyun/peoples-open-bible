translation:
  language: es
  text: y ella le quitaría la diadema de la cabeza del rey y se la pondría[a]; y golpearía[b] al rey con la mano izquierda.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: ‘Diadema’ traduce con más precisión el griego διάδημα; ‘corona’ es una alternativa más general, pero menos específica.
    reason: lexical_alternative
  - marker: b
    text: El verbo griego puede sugerir de manera específica una bofetada o golpe con la mano; ‘golpearía’ mantiene el sentido amplio adoptado en inglés.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀφαιροῦσαν
  english_pob_choice: would take ... from
  chosen_spanish: le quitaría ... de
  alternatives_spanish:
  - tomaría ... de
  - removería ... de
  lexicon: LSJ
  rationale: El participio imperfectivo describe una acción repetida o característica; en español, el condicional con valor descriptivo comunica bien esa escena habitual o representativa.
- source_word: τὸ διάδημα
  english_pob_choice: the crown
  chosen_spanish: la diadema
  alternatives_spanish:
  - la corona
  - el diadema real
  lexicon: LSJ
  rationale: διάδημα designa propiamente la diadema o corona real. Aquí se conserva ‘diadema’ para reflejar con más precisión el término griego y la alternativa textual indicada por el POB en inglés.
- source_word: ἐπιτιθοῦσαν αὐτῇ
  english_pob_choice: put it on herself
  chosen_spanish: se la pondría
  alternatives_spanish:
  - la pondría sobre sí
  - se la colocaría
  lexicon: LSJ
  rationale: El pronombre dativo αὐτῇ señala a la misma mujer; el reflexivo español ‘se la pondría’ transmite naturalmente que se la colocaba a sí misma.
- source_word: ἐράπιζεν
  english_pob_choice: would strike
  chosen_spanish: golpearía
  alternatives_spanish:
  - abofetearía
  - daría un golpe
  lexicon: LSJ
  rationale: ῥαπίζω suele implicar un golpe dado con la mano, a menudo una bofetada. ‘Golpearía’ conserva el sentido amplio que eligió el POB en inglés sin fijar más de lo que permite el griego.
- source_word: τῇ ἀριστερᾷ
  english_pob_choice: with her left hand
  chosen_spanish: con la mano izquierda
  alternatives_spanish:
  - con la izquierda
  - con su mano izquierda
  lexicon: LSJ
  rationale: El dativo femenino instrumental implica la mano izquierda; en español, explicitar ‘mano’ evita ambigüedad y mantiene la naturalidad.
- source_word: καὶ ... καὶ
  english_pob_choice: and ... and
  chosen_spanish: y ... y
  alternatives_spanish:
  - y ... también
  - tanto ... como
  lexicon: LSJ
  rationale: La coordinación simple reproduce fielmente la sucesión de acciones del griego.
translation_notes:
  revision_awareness: Se corrigió la validación anterior anclando explícitamente ambos marcadores de nota en el texto español mediante [a] y [b], sin introducir notas sueltas ni cambiar el sentido del verso.
  spanish_consistency_notes:
  - Se mantiene ‘diadema’ conforme a la opción léxica más precisa para διάδημα.
  - Se conserva el valor descriptivo del imperfectivo griego con ‘le quitaría’, ‘se la pondría’ y ‘golpearía’.
  - El texto evita una formulación demasiado interpretativa y sigue de cerca la secuencia verbal del original.
