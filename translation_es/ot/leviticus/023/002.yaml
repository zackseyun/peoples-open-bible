review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura general del hebreo: mandato doble («Habla… y diles»), preserva «los hijos de Israel», mantiene «Yahvé» y la cláusula final enfática «estas son mis…». Sin embargo, el punto principal de desalineación es מוֹעֲדֵי / מוֹעֲדָי: el inglés auditado y la evidencia contextual de Levítico 23 requieren un término amplio como «tiempos señalados» o «fechas señaladas», no «fiestas señaladas», ya que el capítulo incluye el sábado y el propio expediente lexical rechaza estrecharlo a fiestas. También sobra la nota b («Hebreo: ‘Yahvé’»), porque el nombre divino ya está correctamente traducido y no añade una alternativa significativa.'
  spanish_quality_summary: 'El español es claro y digno, pero mezcla registros: «proclamaréis» es peninsular y menos neutral para el objetivo latinoamericano; «proclamarán» tampoco serviría por la segunda persona del hebreo. Una opción más natural y ampliamente legible es «proclamarán» solo si se reestructura, pero aquí conviene mantener la segunda persona con «proclamarán» no corresponde. Mejor: «que proclamarán» tampoco coincide. Para conservar fidelidad y legibilidad panhispánica, «proclamarán» no es viable; en este contexto, aun así «proclamaréis» puede tolerarse, pero el mayor problema de calidad sigue siendo «fiestas señaladas», que suena más estrecho de lo debido. «Convocaciones santas» es aceptable, aunque «santas convocaciones» o «asambleas sagradas» serían alternativas idiomáticas. El texto revisado mejora naturalidad y consistencia semántica.'
  glossary_alignment: 'Alineación parcial con el glosario del proyecto. Correcto: יְהוָה → «Yahvé»; בְּנֵי יִשְׂרָאֵל preservado como «los hijos de Israel». Desalineado: מוֹעֲדֵי no debe reducirse a «fiestas» cuando la decisión inglesa documentada es «appointed times». Se recomienda «tiempos señalados» en ambas ocurrencias para mantener coherencia lexical y teológica.'
  issues:
  - severity: high
    issue: «Fiestas señaladas» estrecha indebidamente מוֹעֲדֵי / מוֹעֲדָי
    rationale: La evidencia fuente y la decisión auditada insisten en un término amplio porque Levítico 23 incluye el sábado. «Fiestas» introduce una limitación semántica que el hebreo no exige aquí.
  - severity: medium
    issue: La nota sobre «Yahvé» es innecesaria
    rationale: No preserva una alternativa relevante ni resuelve una ambigüedad creada en español; solo repite el texto traducido.
  - severity: low
    issue: Registro verbal menos neutral en «proclamaréis»
    rationale: Es comprensible y fiel a la segunda persona plural, pero su color peninsular no es ideal para un español latinoamericano amplio. No obstante, es un problema menor frente a la cuestión lexical principal.
  revised_spanish_text: 'Habla a los hijos de Israel y diles: Los tiempos señalados[a] de Yahvé, que proclamaréis como convocaciones santas[b]—estos son mis tiempos señalados.'
  revised_footnotes:
