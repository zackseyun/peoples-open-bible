  yaml_path: translation/ot/numbers/026/059.yaml
  text: The name of Amram’s wife was Jochebed[a], the daughter of Levi, who was born to Levi in Egypt. She bore to Amram Aaron and Moses[b], and Miriam their sister.
  footnotes:
