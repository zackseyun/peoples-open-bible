translation:
  language: es
  text: Entonces Jehoacaz buscó el favor de Yahvé[a], y Yahvé lo escuchó, porque vio la opresión de Israel[b], ya que el rey de Aram los oprimía.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'suplicó a Yahvé'; literalmente, 'apaciguó el rostro de Yahvé', un modismo para buscar su favor.
    reason: lexical_alternative
  - marker: b
    text: Aram es el nombre hebreo que en traducciones antiguas a veces aparece como 'Siria'.
    reason: alternative_reading
lexical_decisions:
- source_word: וַיְחַל
  english_pob_choice: sought the favor of
  chosen_spanish: buscó el favor de
  alternatives_spanish:
  - imploró
  - suplicó
  - entretuvo el rostro de
  lexicon: HALOT
  rationale: La construcción חלה את־פני funciona idiomáticamente como buscar favor o hacer una súplica. En español, 'buscó el favor de' conserva el matiz relacional y evita una traducción demasiado literal que sonaría extraña.
- source_word: פְּנֵי יְהוָה
  english_pob_choice: the LORD
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el rostro de Yahvé
  - el Señor
  lexicon: HALOT
  rationale: El hebreo dice literalmente 'el rostro de Yahvé', pero en este modismo el objeto de la súplica es Yahvé mismo. Se mantiene el nombre divino 'Yahvé' según la norma del proyecto, sin sustituirlo por una forma de máscara.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  - el SEÑOR
  lexicon: HALOT
  rationale: El Tetragrámaton se vierte como 'Yahvé' por la política terminológica del proyecto. Es una transliteración del nombre divino y preserva la referencia al nombre propio del pacto.
- source_word: וַיִּשְׁמַע אֵלָיו
  english_pob_choice: listened to him
  chosen_spanish: lo escuchó
  alternatives_spanish:
  - escuchó su ruego
  - oyó su clamor
  lexicon: HALOT
  rationale: שׁמע con אֶל puede significar escuchar o atender. 'Lo escuchó' es natural en español y conserva la idea de respuesta atenta, no solo percepción auditiva.
- source_word: לַחַץ
  english_pob_choice: the oppression
  chosen_spanish: la opresión
  alternatives_spanish:
  - la aflicción
  - la presión
  lexicon: HALOT
  rationale: En este contexto militar-político, לַחַץ expresa opresión causada por un poder hostil. 'Opresión' mantiene bien ese sentido y enlaza con el verbo siguiente.
- source_word: לָחַץ
  english_pob_choice: oppressed
  chosen_spanish: oprimía
  alternatives_spanish:
  - apretaba
  - presionaba duramente
  lexicon: HALOT
  rationale: El verbo del mismo lexema refuerza la idea de presión violenta o dominación. 'Oprimía' es la correspondencia más clara y mantiene el vínculo léxico con 'opresión'.
- source_word: מֶלֶךְ אֲרָם
  english_pob_choice: the king of Aram
  chosen_spanish: el rey de Aram
  alternatives_spanish:
  - el rey de Siria
  lexicon: HALOT
  rationale: Se conserva 'Aram' como nombre hebreo propio, en vez de reemplazarlo por 'Siria', de acuerdo con la primacía de la fuente original y la práctica del proyecto.
theological_decisions:
- issue: Nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Jehová
  - el Señor
  rationale: El texto hebreo usa directamente el Nombre divino. La forma adoptada en español es 'Yahvé', que preserva el nombre personal de Dios en vez de una sustitución honorífica.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Modismo de búsqueda de favor ante Dios
  english_pob_reading: sought the favor of the LORD
  chosen_spanish_reading: buscó el favor de Yahvé
  alternative_spanish_readings:
  - suplicó a Yahvé
  - buscó el rostro de Yahvé
  rationale: El hebreo expresa una súplica dirigida a Dios con un modismo de audiencia/favor. 'Buscó el favor de Yahvé' conserva el sentido sin endurecerlo ni volverlo demasiado literal.
  doctrine_reference: 'DOCTRINE.md Translation philosophy: optimal equivalence; preserve source plain sense over tradition'
translation_notes:
  revision_awareness: 'El borrador sigue de cerca el texto hebreo y coincide con la decisión inglesa auditada: usar el nombre divino ''Yahvé'', mantener el paralelismo léxico entre ''opresión/oprimía'' y verter el modismo de חלה את־פני como búsqueda de favor. No se registran revisiones aplicadas en la fuente inglesa, y la concordancia de revisión es alta.'
  spanish_consistency_notes:
  - Se mantuvo 'Yahvé' de manera consistente para יְהוָה.
  - Se conservó 'Aram' en lugar de 'Siria' para respetar el nombre hebreo.
  - '''Lo escuchó'' se eligió por naturalidad en español, sin perder el matiz de respuesta divina.'
  - La pareja 'opresión/oprimía' preserva el juego léxico del hebreo.
  - Se evitó 'rostro' en el texto principal por claridad idiomática en español, pero se explicó en nota como alternativa literal.
