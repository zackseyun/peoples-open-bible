revisions:
- from: Y antes de morir[a], oyó la destrucción de Nínive, que Nabucodonosor y Asuero habían cautivado; antes de morir, se alegró por Nínive. Amén.
  to: Y antes de morir[a], oyó hablar de la destrucción de Nínive, que Nabucodonosor y Asuero habían tomado cautiva; antes de morir, se alegró por Nínive. Amén.
  rationale: Se ajusta «oyó» a la expresión más idiomática «oyó hablar de» para reflejar que recibió noticia del hecho. Se reemplaza «habían cautivado» por «habían tomado cautiva» para preservar claramente el sentido de tomar en cautiverio/capturar, evitando la ambigüedad moderna de «cautivar». Se mantiene la nota y la tensión histórica del griego sin armonización.
