base_translation:
  language: en
  yaml_path: translation/ot/zephaniah/001/012.yaml
  text: 'And it will happen at that time: I will search Jerusalem with lamps[a], and I will punish the men who are settled on their dregs, who say in their hearts, ''Yahweh will not do good, nor will he do harm.'''
  footnotes:
  - marker: a
    text: Or, more traditionally, 'who are settled on their lees.' The Hebrew uses wine imagery for people left undisturbed and spiritually complacent.
