translation:
  language: es
  text: Los reyes de la tierra se levantan[a], y los gobernantes se reúnen juntos[b] contra Yahvé y contra su Ungido.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: "toman posición" o "se plantan". El hebreo expresa una postura adoptada deliberadamente, con fuerza de oposición.'
    reason: lexical_alternative
  - marker: b
    text: 'O: "se juntan" o "toman consejo juntos". La expresión hebrea denota acción coordinada y unida en oposición.'
    reason: lexical_alternative
lexical_decisions:
- source_word: יִתְיַצְּבוּ
  english_pob_choice: take their stand
  chosen_spanish: se ponen en pie
  alternatives_spanish:
  - toman su lugar
  - se presentan firmes
  - se plantan
  lexicon: HALOT
  rationale: El hitpael de יצב expresa colocarse deliberadamente en una posición; en español, 'se ponen en pie' comunica la acción intencional y visible sin sonar demasiado literal o rígido. Mantiene la idea de postura adoptada en oposición.
- source_word: מַלְכֵי אֶרֶץ
  english_pob_choice: the kings of the earth
  chosen_spanish: los reyes de la tierra
  alternatives_spanish:
  - los reyes del mundo
  - los reyes terrenales
  lexicon: HALOT
  rationale: '''La tierra'' reproduce bien el constructo hebreo y conserva el alcance universal del salmo. ''Del mundo'' sería más interpretativo; ''terrenales'' suena menos natural.'
- source_word: רוֹזְנִים
  english_pob_choice: rulers
  chosen_spanish: los gobernantes
  alternatives_spanish:
  - los príncipes
  - los dignatarios
  - los caudillos
  lexicon: HALOT
  rationale: El término designa autoridades de alto rango. 'Gobernantes' es claro, amplio y suficientemente formal en español contemporáneo, sin forzar un arcaísmo.
- source_word: נֽוֹסְדוּ יָחַד
  english_pob_choice: gather together
  chosen_spanish: se reúnen
  alternatives_spanish:
  - se juntan
  - se congregan
  - se ponen de acuerdo
  lexicon: HALOT
  rationale: En el contexto, la forma niphal y el adverbio 'juntos' expresan acción coordinada. 'Se reúnen' preserva la unión de la acción sin introducir 'conspirar' en el texto principal.
- source_word: עַל
  english_pob_choice: against
  chosen_spanish: contra
  alternatives_spanish:
  - sobre
  - frente a
  lexicon: HALOT
  rationale: Aquí la preposición es claramente adversativa. 'Contra' transmite la oposición hostil de manera directa y natural.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: Se sigue el criterio del proyecto de verter el Tetragrámaton como 'Yahvé'. Esto preserva el nombre divino revelado, en lugar de sustituirlo por un título.
- source_word: מְשִׁיחוֹ
  english_pob_choice: his Anointed
  chosen_spanish: su Ungido
  alternatives_spanish:
  - su Mesías
  - su Cristo
  - su consagrado
  lexicon: HALOT
  rationale: En este salmo, el hebreo apunta al rey ungido por Dios; 'Ungido' refleja con precisión el valor básico de מָשִׁיחַ sin importar un título más interpretativo en el cuerpo del texto. En español, 'su Ungido' mantiene la referencia real y también deja abierta la lectura mesiánica.
theological_decisions:
- issue: Cómo rendir el Tetragrámaton en un salmo de oposición universal
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: El proyecto exige traducir el nombre divino como 'Yahvé'. Esto evita la sustitución por un título y conserva la transparencia del texto fuente.
  doctrine_reference: 'DOCTRINE.md: representar יְהוָה con el nombre divino transliterado, no con una máscara titulada.'
- issue: Alcance de מְשִׁיחוֹ en el contexto del Salmo 2
  english_pob_reading: his Anointed
  chosen_spanish_reading: su Ungido
  alternative_spanish_readings:
  - su Mesías
  - su Cristo
  - su consagrado
  rationale: Aunque el salmo tiene una trayectoria mesiánica, el verso inmediato habla del rey ungido de Yahvé. 'Ungido' mantiene la referencia inmediata y no borra la tensión entre el sentido real y la lectura canónica posterior.
  doctrine_reference: 'DOCTRINE.md: traducir títulos con su valor semántico base; preservar la lectura mesiánica sin sobreinterpretar el verso.'
translation_notes:
  revision_awareness: El borrador sigue la revisión más reciente del contexto inglés, que prefirió 'his Anointed' frente a 'Messiah' para reflejar más directamente מְשִׁיחוֹ en este versículo. En español, esa decisión se resolvió como 'su Ungido', manteniendo el nivel formal y la referencia al rey ungido sin importar un título más interpretativo en el cuerpo del texto.
  spanish_consistency_notes:
  - Se mantuvo 'Yahvé' como forma estándar para יְהוָה, coherente con el proyecto.
  - '''Ungido'' se prefirió a ''Mesías'' para este verso porque el contexto inmediato es el de un rey instalado por Dios, aunque el salmo tenga resonancia mesiánica canónica.'
  - 'El paralelismo de dos miembros se conservó con una construcción fluida en español: sujetos plurales + verbos coordinados + dos complementos introducidos por ''contra''.'
