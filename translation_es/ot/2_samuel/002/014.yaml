translation:
  language: es
  text: 'Entonces Abner dijo a Joab: «Por favor, que los jóvenes se levanten y midan sus fuerzas[a] delante de nosotros». Y Joab dijo: «Que se levanten».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literalmente, «jueguen». El hebreo שׂחק suele significar «jugar» o «divertirse», pero aquí introduce una contienda formal que desemboca en violencia en el versículo siguiente.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמֶר / וַיֹּאמֶר
  english_pob_choice: Then Abner said ... And Joab said
  chosen_spanish: Entonces Abner dijo ... Y Joab dijo
  alternatives_spanish:
  - Y Abner dijo ... Y Joab dijo
  - Entonces Abner habló ... Y Joab habló
  lexicon: WLC / narrative waw-consecutive
  rationale: La secuencia narrativa con וַיֹּאמֶר se vierte naturalmente con marcadores discursivos que conserven el avance del relato. «Entonces» y «Y» mantienen el flujo sin volverlo mecánico.
- source_word: יָק֤וּמוּ / יָקֻֽמוּ
  english_pob_choice: let ... arise
  chosen_spanish: que se levanten
  alternatives_spanish:
  - que se pongan de pie
  - que se alcen
  lexicon: HALOT
  rationale: El jussivo de קום expresa una petición o permiso. En español, «que se levanten» preserva bien el valor exhortativo y el paralelo entre la petición de Abner y la respuesta de Joab.
- source_word: נָא
  english_pob_choice: please
  chosen_spanish: por favor
  alternatives_spanish:
  - te ruego
  - ahora
  lexicon: HALOT
  rationale: נָא suaviza la solicitud. «Por favor» transmite con naturalidad esa cortesía en español contemporáneo y evita el tono arcaico de «te ruego».
- source_word: הַנְּעָרִים
  english_pob_choice: the young men
  chosen_spanish: los jóvenes
  alternatives_spanish:
  - los muchachos
  - los muchachos jóvenes
  - los servidores
  lexicon: HALOT
  rationale: En este contexto militar, נְעָרִים se refiere a combatientes jóvenes o hombres jóvenes. «Los jóvenes» es natural y no introduce la idea de niños ni de sirvientes domésticos.
- source_word: וִישַׂחֲקוּ
  english_pob_choice: play
  chosen_spanish: jueguen
  alternatives_spanish:
  - jueguen delante de nosotros
  - compitan
  - bromeen
  lexicon: HALOT
  rationale: Sigo la decisión inglesa de reflejar más directamente שׂחק con «play/jueguen». Aunque el contexto anticipa un desenlace violento, el verbo en sí conserva el sentido básico de juego/representación/escena pública, y no conviene adelantar «peleen» o «compitan» más allá del texto.
- source_word: לְפָנֵינוּ
  english_pob_choice: before us
  chosen_spanish: delante de nosotros
  alternatives_spanish:
  - en nuestra presencia
  - ante nosotros
  lexicon: HALOT
  rationale: La expresión literal alude a estar frente a la vista/presencia de alguien. «Delante de nosotros» es idiomático en español y conserva el sentido espacial y público.
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión inglesa que volvió de 'compete' a 'play' para reflejar más directamente וִישַׂחֲקוּ, manteniendo el tono formal y la estructura del diálogo.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» como norma general del proyecto, pero este versículo no contiene el tetragrámaton.
  - Se usó «los jóvenes» para נְעָרִים por el contexto militar, evitando «siervos» o «muchachos» como opciones menos precisas.
  - El mandato jussivo se preservó con subjuntivo exhortativo («que se levanten»), coherente con el valor de petición del hebreo.
