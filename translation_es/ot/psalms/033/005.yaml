translation:
  language: es
  text: Ama la justicia y el derecho; la tierra está llena del amor fiel[a] de Yahvé.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'amor leal' para חֶסֶד, destacando la lealtad de pacto de Yahvé.
    reason: lexical_alternative
lexical_decisions:
- source_word: אֹהֵב
  english_pob_choice: He loves
  chosen_spanish: Ama
  alternatives_spanish:
  - Él ama
  - Ama de continuo
  lexicon: HALOT
  rationale: El participio qal masculino singular funciona aquí de manera descriptiva y habitual para Yahvé; en español, un presente simple sin sujeto explícito expresa naturalmente esa idea continua. Se evita un giro más pesado como 'Él ama' salvo que se quiera enfatizar el sujeto.
- source_word: צְדָקָה
  english_pob_choice: righteousness
  chosen_spanish: la justicia
  alternatives_spanish:
  - la rectitud
  - lo justo
  lexicon: HALOT
  rationale: En el paralelo con מִשְׁפָּט, el término puede expresar una cualidad ética/covenantal más amplia. 'Justicia' es idiomático en español bíblico y permite mantener el contraste con 'el derecho' sin perder la fuerza moral del término.
- source_word: מִשְׁפָּט
  english_pob_choice: justice
  chosen_spanish: el derecho
  alternatives_spanish:
  - la justicia
  - el juicio
  lexicon: HALOT
  rationale: Aunque el inglés POB usa 'justice', en español 'justicia y justicia' resultaría redundante. 'Derecho' conserva la dimensión de orden justo, decisión recta y norma/juzgamiento, y respeta la distinción del paralelismo hebreo.
- source_word: חֶסֶד
  english_pob_choice: steadfast love
  chosen_spanish: amor firme
  alternatives_spanish:
  - amor leal
  - amor constante
  - amor fiel
  lexicon: HALOT
  rationale: חֶסֶד abarca lealtad pactal, misericordia y amor duradero. 'Amor firme' comunica bien la permanencia y fidelidad sin recurrir a una fórmula demasiado técnica o arcaica; se mantiene la nota de covenantal loyalty del audit trail inglés.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  - Jehová
  lexicon: HALOT
  rationale: 'Se sigue el estándar del proyecto para el Tetragrama: ''Yahvé''. Es la forma castellana habitual de la transliteración del nombre divino y preserva el nombre propio frente a una sustitución por título.'
- source_word: מָלְאָה
  english_pob_choice: is full of
  chosen_spanish: está llena de
  alternatives_spanish:
  - ha sido llena de
  - está colmada de
  lexicon: HALOT
  rationale: El perfecto femenino singular con הָאָרֶץ expresa aquí un estado resultante/presente. 'Está llena de' reproduce con naturalidad el valor estativo sin sobrecargar la frase con una pasiva perifrática.
- source_word: הָאָרֶץ
  english_pob_choice: the earth
  chosen_spanish: la tierra
  alternatives_spanish:
  - la tierra
  - el mundo
  lexicon: HALOT
  rationale: En el contexto cósmico del salmo, 'la tierra' comunica el alcance global del enunciado de forma natural en español. 'El mundo' sería posible, pero 'la tierra' conserva mejor la imagen bíblica concreta.
theological_decisions:
- issue: Cómo renderizar el Nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - Jehová
  rationale: La lectura inglesa del POB translitera el Nombre divino y rechaza el reemplazo por un título. En español, 'Yahvé' es la forma de uso más estable y reconocible para preservar el Nombre revelado sin ocultarlo.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Mantener la fuerza del paralelismo ético hebreo en צְדָקָה / מִשְׁפָּט
  english_pob_reading: righteousness and justice
  chosen_spanish_reading: justicia y el derecho
  alternative_spanish_readings:
  - rectitud y justicia
  - justicia y justicia
  - rectitud y derecho
  rationale: El paralelo hebreo distingue dos términos afines pero no idénticos. En español, 'justicia y el derecho' conserva la pareja conceptual sin caer en una repetición plana; 'derecho' aporta la idea de orden/juzgamiento justo que corresponde a מִשְׁפָּט.
  doctrine_reference: Principio poético-semántico del paralelismo hebreo en el salterio
- issue: Traducir חֶסֶד sin perder su peso pactal
  english_pob_reading: steadfast love
  chosen_spanish_reading: amor firme
  alternative_spanish_readings:
  - amor leal
  - amor fiel
  - amor constante
  rationale: La expresión española debe sugerir tanto constancia como lealtad de pacto. 'Amor firme' logra un equilibrio claro y publicable en español, manteniendo la tensión entre afecto, fidelidad y continuidad que el audit trail inglés subraya.
  doctrine_reference: 'DOCTRINE.md: Contested terms — חֶסֶד (hesed)'
translation_notes:
  revision_awareness: El pasaje presenta alto acuerdo entre revisiones y no registra cambios aplicados. La redacción española conserva el paralelismo poético, el Nombre divino transliterado y la tensión semántica de חֶסֶד sin suavizarla en un término meramente afectivo.
  spanish_consistency_notes:
  - Se mantuvo 'Yahvé' para יְהוָה conforme al criterio del proyecto.
  - Se evitó 'SEÑOR' como sustituto del Nombre divino.
  - '''La tierra'' se eligió por naturalidad y amplitud cósmica en el salmo.'
  - '''El derecho'' se usa para diferenciar מִשְׁפָּט de צְדָקָה sin redundancia.'
  - La nota textual/lexical de חֶסֶד se ancló en el término marcado con [a].
