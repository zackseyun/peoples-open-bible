translation:
  language: es
  text: Mantente alerta contra el malhechor[a], porque trama el mal, no sea que te acarree deshonra para siempre.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «Cuídate de un malhechor, porque maquina cosas malas; no sea que te cause reproche para siempre»
    reason: lexical_alternative
lexical_decisions:
- source_word: πρόσεχε
  english_pob_choice: Be on guard
  chosen_spanish: Mantente alerta
  alternatives_spanish:
  - Estate en guardia
  - Vigila
  lexicon: LSJ
  rationale: El imperativo pide vigilancia cautelosa ante una persona peligrosa. «Mantente alerta» comunica bien la advertencia sin sonar mecánico en español.
- source_word: ἀπὸ κακούργου
  english_pob_choice: against an evildoer
  chosen_spanish: contra el malhechor
  alternatives_spanish:
  - contra el malvado
  - contra el delincuente
  - contra el que hace el mal
  lexicon: LSJ
  rationale: κακοῦργος designa a alguien que obra mal. «Malhechor» conserva la fuerza moral del término y funciona mejor que «delincuente», que sería más estrecho y legalista.
- source_word: πονηρὰ
  english_pob_choice: evil
  chosen_spanish: el mal
  alternatives_spanish:
  - cosas malas
  - cosas perversas
  - maldades
  lexicon: LSJ
  rationale: El neutro plural sustantivado apunta a lo que la persona maquina. «El mal» mantiene la concisión y la carga moral del original.
- source_word: τεκταίνεται
  english_pob_choice: devises
  chosen_spanish: trama
  alternatives_spanish:
  - maquina
  - planea
  - conspira
  lexicon: LSJ
  rationale: El verbo sugiere una acción intencional y hábil de elaborar planes. «Trama» reproduce bien esa idea de maquinación sin añadir más de lo necesario.
- source_word: μῶμον
  english_pob_choice: disgrace
  chosen_spanish: deshonra
  alternatives_spanish:
  - reproche
  - vergüenza
  - mancha
  lexicon: LSJ
  rationale: μῶμος puede ser reproche, oprobio o deshonra pública. «Deshonra» comunica de forma natural el daño de reputación que el contexto describe.
- source_word: εἰς τὸν αἰῶνα
  english_pob_choice: forever
  chosen_spanish: para siempre
  alternatives_spanish:
  - por siempre
  - eternamente
  lexicon: LSJ
  rationale: La frase intensifica la duración del efecto. «Para siempre» es la equivalencia española más clara y conserva el énfasis duradero del griego.
- source_word: δῷ σοι
  english_pob_choice: bring upon you
  chosen_spanish: te acarree
  alternatives_spanish:
  - te traiga
  - te cause
  - te produzca
  lexicon: LSJ
  rationale: Aunque literalmente significa «dé a ti», con μῶμον el sentido idiomático es causar o acarrear oprobio. «Te acarree» conserva esa relación causal en español.
translation_notes:
  revision_awareness: Se tomó como base la lectura revisada del audit trail en la que el término inglés se ajusta a un valor más cercano de κακούργου/πονηρά y se mantiene el matiz temporal fuerte de εἰς τὸν αἰῶνα. La versión española refleja esa cautela léxica y el desenlace duradero del reproche.
  spanish_consistency_notes:
  - Se evitó «SEÑOR» o vocabulario litúrgico ajeno porque el pasaje no contiene el Tetragrámaton ni un nombre divino.
  - «El mal» se mantuvo en singular para preservar el sustantivo neutro plural griego sin sobrecargarlo con una lista de acciones.
  - «Deshonra» se eligió como equivalente público y relacional de μῶμος, en línea con el sentido de reproche durable del contexto.
