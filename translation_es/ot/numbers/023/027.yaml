revisions:
- from: 'Entonces Balac dijo a Balaam[a]: «Ven, por favor; te llevaré a otro lugar. Quizá será recto[b] a los ojos de Dios, y desde allí me lo maldecirás».'
  to: 'Entonces Balac dijo a Balaam[a]: «Ven, por favor; déjame llevarte a otro lugar. Quizá le parezca bien[b] a Dios, y me lo maldecirás desde allí».'
  rationale: Se ajustó «te llevaré» a «déjame llevarte» para reflejar mejor el matiz volitivo de אֶקָּחֲךָ en contexto. Se reemplazó «será recto a los ojos de Dios» por «le parezca bien a Dios», que comunica de forma idiomática y fiel el sentido de יִישַׁר בְּעֵינֵי הָאֱלֹהִים en español. También se mejoró el orden de «desde allí» para mayor naturalidad.
