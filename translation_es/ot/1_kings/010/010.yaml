translation:
  language: es
  text: Y dio al rey ciento veinte talentos de oro[a], y muchísimas especias, y piedras preciosas. Nunca volvió a llegar tal abundancia de especias como la que dio la reina de Saba al rey Salomón.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El hebreo usa un sustantivo singular en la cláusula de comparación ('como aquella especia'), pero probablemente funciona de manera colectiva; por eso aquí se traduce en plural.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַתִּתֵּן
  english_pob_choice: And she gave
  chosen_spanish: Y ella dio
  alternatives_spanish:
  - Entonces dio
  - Y dio
  lexicon: HALOT
  rationale: El wayyiqtol avanza la narración; en español, 'Y ella dio' conserva la secuencia narrativa sin añadir una conclusión que el hebreo no exige. Se explicita el sujeto para claridad, aunque el verbo ya lo marca.
- source_word: לַמֶּלֶךְ
  english_pob_choice: the king
  chosen_spanish: al rey
  alternatives_spanish:
  - al rey
  lexicon: HALOT
  rationale: El dativo se expresa naturalmente con 'al rey' después de 'dio'. No se añade repetición innecesaria.
- source_word: מֵאָה וְעֶשְׂרִים כִּכַּר זָהָב
  english_pob_choice: one hundred and twenty talents of gold
  chosen_spanish: ciento veinte talentos de oro
  alternatives_spanish:
  - 120 talentos de oro
  lexicon: HALOT
  rationale: כִּכָּר es una medida antigua de peso, adecuadamente vertida como 'talentos'. Se mantiene la unidad antigua por transparencia y fidelidad, en vez de convertirla a una medida moderna.
- source_word: וּבְשָׂמִים הַרְבֵּה מְאֹד
  english_pob_choice: and a very great quantity of spices
  chosen_spanish: y muchísimas especias
  alternatives_spanish:
  - y una cantidad muy grande de especias
  - y especias en gran abundancia
  lexicon: HALOT
  rationale: El hebreo intensifica la cantidad; 'muchísimas especias' comunica bien esa abundancia en español sin perder el carácter de bienes aromáticos. 'Especias' sigue la decisión léxica inglesa y la naturalidad del español bíblico contemporáneo.
- source_word: וְאֶבֶן יְקָרָה
  english_pob_choice: and precious stones
  chosen_spanish: y piedras preciosas
  alternatives_spanish:
  - y piedra preciosa
  - y piedras costosas
  lexicon: HALOT
  rationale: Aunque el hebreo usa singular, aquí funciona de modo colectivo en una lista de dones. El plural español 'piedras preciosas' expresa mejor el conjunto de objetos valiosos.
- source_word: לֹא בָא ... עוֹד
  english_pob_choice: Never again did ... come
  chosen_spanish: Nunca volvió a venir
  alternatives_spanish:
  - No volvió a venir jamás
  - Nunca vino otra vez
  lexicon: HALOT
  rationale: La negación con עוֹד transmite idea de repetición cancelada. 'Nunca volvió a venir' reproduce la fuerza de 'never again' en español natural.
- source_word: כַבֹּשֶׂם הַהוּא
  english_pob_choice: such ... spices
  chosen_spanish: tal abundancia de especias
  alternatives_spanish:
  - esas especias
  - esas mismas especias
  lexicon: HALOT
  rationale: El hebreo singular comparativo ('como aquella especia') probablemente funciona de manera colectiva. En español, 'tal abundancia de especias' conserva la comparación y resuelve la tensión entre singular y plural sin ocultarla.
- source_word: לָרֹב
  english_pob_choice: an abundance
  chosen_spanish: abundancia
  alternatives_spanish:
  - gran abundancia
  - mucho
  lexicon: HALOT
  rationale: El sustantivo español 'abundancia' expresa la idea de cantidad sobrada y mantiene el tono nominal del hebreo.
- source_word: אֲשֶׁר נָתְנָה מַלְכַּת שְׁבָא
  english_pob_choice: as those that the queen of Sheba gave
  chosen_spanish: como la que dio la reina de Saba
  alternatives_spanish:
  - como las que dio la reina de Saba
  - que la reina de Saba dio
  lexicon: HALOT
  rationale: El relativo marca el criterio de comparación. En español, el singular 'la que' recoge el antecedente colectivo implícito de 'especias' sin forzar una pluralidad que el hebreo no formula explícitamente.
- source_word: לַמֶּלֶךְ שְׁלֹמֹה
  english_pob_choice: to King Solomon
  chosen_spanish: al rey Salomón
  alternatives_spanish:
  - al rey, Salomón
  - al rey Salomón
  lexicon: HALOT
  rationale: La combinación título + nombre propio se vierte de manera natural y reverente como 'el rey Salomón'. Se conserva la dignidad del original sin introducir una fórmula litúrgica ajena.
theological_decisions:
- issue: Tratamiento de la medida antigua y de la cuantificación del regalo
  english_pob_reading: one hundred and twenty talents of gold
  chosen_spanish_reading: ciento veinte talentos de oro
  alternative_spanish_readings:
  - ciento veinte toneladas de oro
  - un gran peso de oro
  rationale: No se moderniza la medida porque el texto destaca la magnitud del presente con una unidad antigua. Mantener 'talentos' preserva la transparencia histórica y evita imponer una equivalencia moderna incierta.
  doctrine_reference: Transparencia textual / fidelidad histórica
- issue: Fuerza comparativa de 'especia' singular frente a la abundancia plural
  english_pob_reading: Hebrew 'spice' is singular in the comparison clause ('like that spice') but likely functions collectively, hence 'such an abundance of spices.'
  chosen_spanish_reading: tal abundancia de especias
  alternative_spanish_readings:
  - como aquella especia
  - tal especia
  rationale: 'Se conserva la tensión documentada: el hebreo usa singular, pero la función es colectiva. El español plural evita una traducción engañosamente literal y mantiene el sentido comparativo registrado en la nota inglesa.'
  doctrine_reference: Principio de equivalencia controlada / observación semántica
translation_notes:
  revision_awareness: Se siguió el estado más reciente sin cambios sustantivos (high_agreement; revisión marcada unchanged=true). La draft española respeta el texto base y la nota auditada sobre la lectura colectiva de בֹּשֶׂם.
  spanish_consistency_notes:
  - Se mantiene 'Dios'/'Yahvé' fuera de este versículo porque no aparecen en el texto.
  - '''Talentos'' conserva la unidad antigua, coherente con el estilo POB de no sustituir por equivalencias modernas cuando la fuente no las ofrece.'
  - Se usa 'reina de Saba' y 'rey Salomón' con forma natural y estable en español.
  - El tono es sobrio y bíblico, sin arcaísmos innecesarios ni paráfrasis extensiva.
