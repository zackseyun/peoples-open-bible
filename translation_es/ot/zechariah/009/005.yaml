translation:
  language: es
  text: Ascalón verá y temerá; Gaza también se retorcerá mucho, y Ecrón, porque su esperanza ha quedado avergonzada[a]. Un rey perecerá de Gaza[b], y Ascalón no será habitada.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'porque su expectativa ha sido defraudada'.
    reason: lexical_alternative
  - marker: b
    text: O 'Gaza se retorcerá mucho'; la secuencia hebrea puede leerse con Gaza como sujeto de 'se retorcerá mucho'.
    reason: alternative_reading
lexical_decisions:
- source_word: תֵּרֶא
  english_pob_choice: will see
  chosen_spanish: verá
  alternatives_spanish:
  - verá eso
  - verá
  lexicon: HALOT
  rationale: El verbo hebreo está en imperfecto femenino singular con Ascalón como sujeto implícito; en español, 'verá' comunica la acción sin añadir objeto explícito no presente en el hebreo.
- source_word: וְתִירָא
  english_pob_choice: and fear
  chosen_spanish: y temerá
  alternatives_spanish:
  - y tendrá miedo
  - y temerá
  lexicon: HALOT
  rationale: '''Temerá'' conserva el valor verbal breve y profético del hebreo y mantiene el paralelismo con ''verá''.'
- source_word: וְתָחִיל מְאֹד
  english_pob_choice: also will writhe greatly
  chosen_spanish: también se retorcerá mucho
  alternatives_spanish:
  - también temblará mucho
  - también se retorcerá de angustia
  lexicon: HALOT
  rationale: El verbo de חול/חיל puede expresar retorcerse, temblar o angustiarse; 'se retorcerá mucho' preserva la fuerza visceral de la imagen mejor que un simple 'temblará'.
- source_word: מֶבָּטָהּ
  english_pob_choice: her hope
  chosen_spanish: su esperanza
  alternatives_spanish:
  - su expectativa
  - aquello que esperaba
  lexicon: HALOT
  rationale: '''Esperanza'' es una forma natural en español y mantiene la referencia al objeto de 기대/expectación de Ecrón. No se introduce una paráfrasis más amplia que debilite la tensión del texto.'
- source_word: הֹבִישׁ
  english_pob_choice: has been put to shame
  chosen_spanish: ha sido avergonzada
  alternatives_spanish:
  - ha sido puesta en vergüenza
  - ha sido defraudada
  lexicon: HALOT
  rationale: El hiphil de בוש implica causar vergüenza o frustración de expectativa; 'ha sido avergonzada' conserva la conexión semántica con 'vergüenza' sin perder naturalidad en español.
- source_word: וְאָבַד מֶלֶךְ מֵעַזָּה
  english_pob_choice: A king will perish from Gaza
  chosen_spanish: Un rey perecerá de Gaza
  alternatives_spanish:
  - El rey perecerá de Gaza
  - Un rey desaparecerá de Gaza
  lexicon: HALOT
  rationale: '''Perecerá'' traduce אָבַד con fuerza y solemnidad. ''De Gaza'' refleja el מן hebreo como procedencia/origen, manteniendo la lectura del POB de que Gaza perderá a su rey.'
- source_word: לֹא תֵשֵׁב
  english_pob_choice: will not be inhabited
  chosen_spanish: no será habitada
  alternatives_spanish:
  - no estará habitada
  - no será poblada
  lexicon: HALOT
  rationale: En contexto de ciudad, ישב en qal imperfecto se expresa naturalmente como 'ser habitada'; se evita el calco 'no se sentará/dwelling' por ser ajeno al sentido idiomático del hebreo.
- source_word: אַשְׁקְלֹן / עַזָּה / עֶקְרוֹן
  english_pob_choice: Ashkelon / Gaza / Ekron
  chosen_spanish: Ascalón / Gaza / Ecrón
  alternatives_spanish:
  - Asquelón / Gaza / Ecrón
  lexicon: HALOT
  rationale: Se transliteran los topónimos con una forma española reconocible y consistente con uso bíblico en español, sin traducirlos.
theological_decisions:
- issue: Ambigüedad de sujeto en 'Gaza también se retorcerá mucho'
  english_pob_reading: the Hebrew sequence may be read with Gaza as the subject of 'will writhe greatly'
  chosen_spanish_reading: Gaza también se retorcerá mucho
  alternative_spanish_readings:
  - también Gaza se retorcerá mucho
  - Gaza también temblará mucho
  rationale: Se conserva la lectura preferida por el POB, que toma 'Gaza' como sujeto de la cláusula siguiente. La redacción en español mantiene la ambigüedad mínima del hebreo sin forzar una aclaración inexistente.
  doctrine_reference: No aplica; cuestión sintáctico-gramatical.
translation_notes:
  revision_awareness: 'La redacción sigue la revisión más reciente del POB en inglés: se omitió el objeto explícito después de ''verá'' por no estar presente en el hebreo. También se conservó la lectura revisada de la cláusula sobre Gaza como sujeto posible de ''se retorcerá mucho''.'
  spanish_consistency_notes:
  - Se mantiene 'Ascalón', 'Gaza' y 'Ecrón' de forma consistente con la transliteración española bíblica.
  - Se evita 'SEÑOR' porque no aparece el tetragrámaton en este versículo.
  - '''Esperanza'' se usa como equivalente natural de מֶבָּטָהּ, sin anular la alternativa textual de ''expectativa''.'
