translation:
  language: es
  text: 'Y Moisés tomó consigo los huesos de José, porque José había hecho jurar solemnemente a los hijos de Israel, diciendo: «Dios ciertamente los atenderá[a], y ustedes sacarán mis huesos de aquí con ustedes».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Dios ciertamente los visitará». El hebreo expresa una intervención decisiva de Dios a favor de su pueblo.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּקַּח
  english_pob_choice: took
  chosen_spanish: tomó
  alternatives_spanish:
  - llevó
  - se llevó
  lexicon: HALOT
  rationale: El verbo narrativo básico לקח se expresa naturalmente en español con «tomó». Mantiene la acción simple y directa sin añadir matices de desplazamiento que el hebreo no exige.
- source_word: עַצְמוֹת
  english_pob_choice: bones
  chosen_spanish: huesos
  alternatives_spanish:
  - restos
  - despojos
  lexicon: HALOT
  rationale: «Huesos» reproduce de manera literal y concreta עַצְמוֹת. «Restos» sería interpretativo y más general que el hebreo.
- source_word: עִמּוֹ
  english_pob_choice: with him
  chosen_spanish: consigo
  alternatives_spanish:
  - con él
  - junto con él
  lexicon: HALOT
  rationale: «Consigo» es un español natural y compacto para la idea de acompañamiento pronominal; evita la repetición pesada de «con él» en una frase narrativa.
- source_word: הַשְׁבֵּעַ הִשְׁבִּיעַ
  english_pob_choice: had made ... solemnly swear
  chosen_spanish: había hecho jurar solemnemente
  alternatives_spanish:
  - había puesto bajo juramento
  - había obligado con juramento
  lexicon: HALOT
  rationale: La construcción enfática intensifica la obligación del juramento. «Había hecho jurar solemnemente» conserva el valor causativo y la fuerza enfática sin perder claridad en español.
- source_word: בְּנֵי יִשְׂרָאֵל
  english_pob_choice: the sons of Israel
  chosen_spanish: los hijos de Israel
  alternatives_spanish:
  - los israelitas
  - los hijos de Jacob
  lexicon: HALOT
  rationale: Se mantiene la expresión familiar del hebreo. «Hijos de Israel» es comprensible y conserva mejor la forma del original que una neutralización a «israelitas».
- source_word: לֵאמֹר
  english_pob_choice: saying
  chosen_spanish: diciendo
  alternatives_spanish:
  - al decir
  - con estas palabras
  lexicon: HALOT
  rationale: Es la fórmula quotativa estándar en español y refleja directamente la introducción del discurso citado.
- source_word: פָּקֹד יִפְקֹד
  english_pob_choice: will surely attend to
  chosen_spanish: ciertamente se acordará de ustedes
  alternatives_spanish:
  - seguramente los visitará
  - ciertamente los atenderá
  lexicon: HALOT
  rationale: El hebreo idiomático comunica una intervención segura y favorable de Dios. En español, «se acordará de ustedes» reproduce bien la idea bíblica de recordar con acción, y el adverbio «ciertamente» conserva la fuerza enfática del infinitivo absoluto y el verbo finito.
- source_word: אֱלֹהִים
  english_pob_choice: God
  chosen_spanish: Dios
  alternatives_spanish:
  - el Dios
  - Dios mismo
  lexicon: HALOT
  rationale: Es la equivalencia directa y adecuada para el referente singular del texto.
- source_word: וְהַעֲלִיתֶם
  english_pob_choice: and you shall bring up
  chosen_spanish: y ustedes llevarán
  alternatives_spanish:
  - y ustedes subirán
  - y ustedes traerán arriba
  lexicon: HALOT
  rationale: En español, la dirección implícita de עלה desde Egipto puede expresarse de forma natural con «llevarán» en este contexto de traslado de restos. La opción mantiene la obligación futura del juramento; «subirán» sonaría menos idiomático aquí.
- source_word: עַצְמֹתַי
  english_pob_choice: my bones
  chosen_spanish: mis huesos
  alternatives_spanish:
  - mis restos
  - mis osamentas
  lexicon: HALOT
  rationale: Se conserva la concreción del hebreo y la repetición léxica con «huesos».
- source_word: מִזֶּה
  english_pob_choice: from here
  chosen_spanish: de aquí
  alternatives_spanish:
  - desde aquí
  - de este lugar
  lexicon: HALOT
  rationale: «De aquí» es la forma más natural en español para el deíctico del texto y conserva el contraste espacial con el lugar de salida.
- source_word: אִתְּכֶם
  english_pob_choice: with you
  chosen_spanish: con ustedes
  alternatives_spanish:
  - junto con ustedes
  - con vosotros
  lexicon: HALOT
  rationale: Se mantiene el plural de segunda persona en un español latinoamericano neutral y claro.
theological_decisions:
- issue: Sentido de פָּקֹד יִפְקֹד אֱלֹהִים אֶתְכֶם
  english_pob_reading: God will surely attend to you
  chosen_spanish_reading: Dios ciertamente se acordará de ustedes
  alternative_spanish_readings:
  - Dios ciertamente los visitará
  - Dios ciertamente los atenderá
  rationale: La tradición de traducción suele oscilar entre «visitar», «acordarse» y «atender». En español, «se acordará de ustedes» conserva la fuerza de intervención divina prometida sin introducir el arcaísmo o la ambigüedad de «visitar».
  doctrine_reference: DOCTRINE.md §Translation philosophy 6
- issue: Marcación de בְּנֵי יִשְׂרָאֵל
  english_pob_reading: the sons of Israel
  chosen_spanish_reading: los hijos de Israel
  alternative_spanish_readings:
  - los israelitas
  - los hijos de Jacob
  rationale: Se preserva la forma concreta y familiar del hebreo. No se neutraliza a «israelitas» para no perder la huella del original y su valor corporativo-genealógico.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4
- issue: Moisés llevando los huesos de José
  english_pob_reading: Moses took Joseph’s bones with him
  chosen_spanish_reading: Moisés tomó consigo los huesos de José
  alternative_spanish_readings:
  - Moisés llevó consigo los huesos de José
  - Moisés se llevó los huesos de José
  rationale: «Tomó consigo» mantiene la narración sobria y el sentido de traslado deliberado sin sobreinterpretar el movimiento ni cambiar el foco del texto.
  doctrine_reference: DOCTRINE.md §Translation philosophy 1
translation_notes:
  revision_awareness: Coincide con el estado más reciente del inglés POB sin revisiones aplicadas; no se reportan cambios pendientes y la concordancia de revisión es alta.
  spanish_consistency_notes:
  - Se mantuvo «Dios» para אֱלֹהִים y no se introdujo «SEÑOR», ya que el texto no contiene el nombre divino.
  - Se preservó la repetición de «huesos» para עַצְמוֹת / עַצְמֹתַי, siguiendo la literalidad concreta del hebreo.
  - Se eligió español latinoamericano neutral con «ustedes» para la segunda persona plural.
  - La fórmula citada se mantuvo en estilo directo con puntuación estándar de cita en español.
