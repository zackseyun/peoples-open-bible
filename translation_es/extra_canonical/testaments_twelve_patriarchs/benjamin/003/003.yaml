base_translation:
  language: en
  yaml_path: translation/extra_canonical/testaments_twelve_patriarchs/benjamin/003/003.yaml
  text: Fear the Lord and love your neighbor; and if the spirits of Beliar should drive you into every evil affliction, they will certainly not rule over you, just as they did not over Joseph my brother.
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T14:54:05Z'
    unchanged: false
    changes_summary: Revised 'every wickedness of affliction' to 'every evil affliction' for more natural English while preserving the sense of πᾶσαν πονηρίαν θλίψεως. Kept the rest substantially unchanged.
translation:
  language: es
  text: Teman a Yahvé y amen al prójimo; y si los espíritus de Beliar los empujan a toda aflicción mala, ciertamente no los dominarán, así como no dominaron a José mi hermano.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: Φοβεῖσθε Κύριον
  english_pob_choice: Fear the Lord
  chosen_spanish: Temed al Señor
  alternatives_spanish:
  - Reverenciad al Señor
  lexicon: BDAG
  rationale: Imperativo plural estándar; 'temer al Señor' es el lenguaje sapiencial bíblico clásico.
- source_word: ἀγαπᾶτε τὸν πλησίον
  english_pob_choice: love your neighbor
  chosen_spanish: amad al prójimo
  alternatives_spanish:
  - amad a vuestro prójimo
  lexicon: BDAG
  rationale: Mandamiento clásico; 'al prójimo' es traducción establecida con resonancia escritural.
- source_word: τὰ πνεύματα τοῦ Βελίαρ
  english_pob_choice: the spirits of Beliar
  chosen_spanish: los espíritus de Beliar
  alternatives_spanish:
  - los espíritus de Belial
  lexicon: BDAG
  rationale: El testimonio griego tiene Βελίαρ; transcripción consistente.
- source_word: πᾶσαν πονηρίαν θλίψεως
  english_pob_choice: every evil affliction
  chosen_spanish: toda aflicción mala
  alternatives_spanish:
  - toda maldad de aflicción
  - toda tribulación malvada
  lexicon: LSJ
  rationale: Sigue la revisión POB que ajustó 'every wickedness of affliction' a 'every evil affliction' por naturalidad. 'Aflicción mala' es legible y conserva el sentido.
- source_word: ἐκστήσωσι
  english_pob_choice: drive
  chosen_spanish: empujan
  alternatives_spanish:
  - arrojan
  - trastornan
  lexicon: LSJ
  rationale: Sentido coercitivo de presión espiritual hacia la maldad.
- source_word: κατακυριεύσωσιν
  english_pob_choice: rule over
  chosen_spanish: dominarán
  alternatives_spanish:
  - sojuzgarán
  lexicon: BDAG
  rationale: Negación enfática 'ciertamente no'.
