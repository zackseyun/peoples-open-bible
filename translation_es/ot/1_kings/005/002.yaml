review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien el sentido básico del hebreo: la provisión diaria de Salomón y las dos cantidades medidas en cors. También conserva correctamente la nota léxica sobre לֶחֶם como ''pan'' usado en sentido amplio y la nota cultural sobre כֹּר. Sin embargo, no mantiene con suficiente claridad la distinción léxica documentada entre סֹלֶת (''fine flour'') y קָמַח (''meal''), porque ''flor de harina y ... harina'' suena demasiado cercano y poco natural en español moderno.'
  spanish_quality_summary: El texto es legible, pero 'era de treinta cors...' resulta un poco pesado, y 'flor de harina' puede entenderse, aunque en registro amplio actual suena menos natural que 'harina fina'. Además, traducir קָמַח simplemente como 'harina' debilita la distinción con סֹלֶת. Una leve revisión mejora naturalidad y precisión sin apartarse del original.
  glossary_alignment: 'No hay términos teológicos de proyecto implicados. La transliteración ''cors'' sigue la decisión auditada y es aceptable. La nota sobre ''pan'' está bien orientada. La principal corrección necesaria es léxica: distinguir mejor סֹלֶת de קָמַח en español, idealmente con ''harina fina'' frente a ''harina común'' o equivalente.'
  issues:
  - severity: medium
    issue: Distinción insuficiente entre סֹלֶת y קָמַח
    rationale: El inglés auditado preserva el contraste 'fine flour' / 'meal'. El borrador usa 'flor de harina' y luego 'harina', pero en español eso no comunica con suficiente nitidez dos calidades o tipos distintos de producto molido.
  - severity: low
    issue: Expresión algo rígida en 'era de treinta cors'
    rationale: Aunque comprensible, en español suena más natural 'era treinta cors...' o 'consistía en treinta cors...'. Un ajuste leve mejora la fluidez sin cambiar el sentido.
  - severity: low
    issue: '''Flor de harina'' es válido pero menos claro para lectores amplios'
    rationale: En español bíblico es tradicional, pero 'harina fina' comunica con más transparencia moderna el valor de סֹלֶת y armoniza mejor con la distinción frente a קָמַח.
  revised_spanish_text: La provisión[a] de Salomón para un día era treinta cors de harina fina y sesenta cors de harina común[b].
  revised_footnotes:
