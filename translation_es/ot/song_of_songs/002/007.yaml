review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura del hebreo y el audit trail inglés: mantiene la fórmula de adjuración, «hijas de Jerusalén», los animales como sentido llano y la doble advertencia verbal. Sin embargo, falta la nota alternativa correspondiente a la cláusula final/prohibitiva preservada en el inglés POB, y «hasta que le plazca» introduce un dativo ambiguo que no reproduce con suficiente claridad el antecedente femenino de הָאַהֲבָה en español.'
  spanish_quality_summary: El español es generalmente claro, digno y natural. «Yo les conjuro» funciona bien. No obstante, «no despierten ni exciten el amor» suena algo menos idiomático que una combinación más cercana al paralelismo hebreo, y «hasta que le plazca» puede hacer pensar en un referente externo no expresado. Conviene ajustar la redacción para mantener claridad poética sin perder naturalidad.
  glossary_alignment: No hay conflictos con la terminología global del proyecto. Las decisiones «conjuro», «hijas de Jerusalén», «gacelas», «ciervas» y «amor» concuerdan con el audit trail. La principal corrección necesaria es conservar en español la nota de lectura alternativa del inglés POB sobre «que no despierten... hasta que ella/ello quiera/plazca».
  issues:
  - severity: medium
    issue: Falta una nota equivalente a la footnote c del inglés POB.
    rationale: El audit trail inglés preserva una alternativa de lectura significativa para la cláusula prohibitiva/final. El español debe conservar esa alternativa, y actualmente solo incluye las notas a y b.
  - severity: medium
    issue: «hasta que le plazca» deja ambiguo el referente.
    rationale: El hebreo usa un verbo 3fs que apunta a «amor» como antecedente. En español, el dativo «le» sin referente explícito puede entenderse como ‘a alguien’. Una formulación como «hasta que quiera» o una nota aclaratoria resuelve mejor la ambigüedad.
  - severity: low
    issue: «exciten el amor» es menos fiel al matiz de intensificación paralela que una opción como «aviven».
    rationale: Los dos verbos hebreos son casi sinónimos de despertar/estimular. «Excitar» en español puede cargar matices modernos más estrechos; «avivar» conserva mejor el sentido amplio y poético.
  revised_spanish_text: 'Yo les conjuro[a], hijas de Jerusalén[b][c], por las gacelas o por las ciervas del campo: no despierten ni aviven el amor hasta que quiera.'
