id: 1SA.9.12
reference: 1 Samuel 9:12
source:
  edition: WLC
  text: וַ/תַּעֲנֶ֧ינָה אוֹתָ֛/ם וַ/תֹּאמַ֥רְנָה יֵּ֖שׁ הִנֵּ֣ה לְ/פָנֶ֑י/ךָ מַהֵ֣ר עַתָּ֗ה כִּ֤י הַ/יּוֹם֙ בָּ֣א לָ/עִ֔יר כִּ֣י זֶ֧בַח הַ/יּ֛וֹם לָ/עָ֖ם בַּ/בָּמָֽה׀׃
translation:
  text: They answered them and said[a], “Yes, look—he is just ahead of you. Hurry now, because he came to the city today[b], because today there is a sacrifice for the people at the high place.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'There he is before you'; the Hebrew uses an affirmative particle plus a deictic expression.
    reason: lexical_alternative
  - marker: b
    text: '''High place'' refers to an elevated local worship site.'
    reason: cultural_note
lexical_decisions:
- source_word: וַתַּעֲנֶינָה
  chosen: They answered
  alternatives:
  - They replied
  lexicon: HALOT
  rationale: ענה in this stem and context introduces a response in dialogue. 'Answered' preserves the Hebrew discourse pattern; 'replied' is possible but slightly freer.
- source_word: וַתֹּאמַרְנָה
  chosen: and said
  alternatives:
  - saying
  lexicon: HALOT
  rationale: The common Hebrew narrative pairing 'answered and said' is retained in natural English as 'answered ... and said,' preserving the formal dialogue structure.
- source_word: יֵשׁ
  chosen: 'Yes'
  alternatives:
  - There is
  lexicon: HALOT
  rationale: 'Although literally ''there is,'' in answer to the prior question it functions idiomatically as an affirmative response: ''Yes.'' This best reflects the discourse sense in English.'
- source_word: הִנֵּה
  chosen: look
  alternatives:
  - behold
  - see
  lexicon: HALOT
  rationale: הִנֵּה draws attention. 'Look' is readable modern English and preserves the deictic force without archaic tone; 'behold' is too archaic for the stated philosophy.
- source_word: לְפָנֶיךָ
  chosen: just ahead of you
  alternatives:
  - before you
  - in front of you
  lexicon: HALOT
  rationale: Literally 'before you.' In this travel/search context, 'just ahead of you' communicates spatial immediacy naturally in English.
- source_word: מַהֵר
  chosen: Hurry
  alternatives:
  - Make haste
  lexicon: HALOT
  rationale: Imperative addressed to Saul's party. 'Hurry' is natural modern English; 'make haste' is accurate but archaic.
- source_word: עַתָּה
  chosen: now
  alternatives:
  - at once
  lexicon: HALOT
  rationale: Temporal adverb reinforcing urgency. 'Now' is concise and idiomatic with 'Hurry.'
- source_word: כִּי הַיּוֹם בָּא לָעִיר
  chosen: because he came to the city today
  alternatives:
  - for he has come to the city today
  - because today he came to the city
  lexicon: HALOT
  rationale: The clause explains the urgency. Perfect בא refers to Samuel's arrival on that day. English simple past fits the narrative well; present perfect is also possible.
- source_word: זֶבַח
  chosen: a sacrifice
  alternatives:
  - a sacrificial feast
  lexicon: HALOT
  rationale: The noun denotes a sacrifice. Since the immediate Hebrew says 'sacrifice' and the meal aspect is not explicit in this verse alone, the simpler rendering is preferred; the communal context may imply a feast but that is better left implicit or footnoted.
- source_word: לָעָם
  chosen: for the people
  alternatives:
  - for the troops
  - for the populace
  lexicon: HALOT
  rationale: עם here refers to the people/community participating in the sacrificial event. 'For the people' is the most straightforward rendering.
- source_word: בַּבָּמָה
  chosen: at the high place
  alternatives:
  - on the high place
  lexicon: HALOT
  rationale: במה refers to a cultic high place. 'At the high place' is idiomatic English for location and preserves the technical cultic term.
