    changes_summary: Changed “swallowed her up” to “swallowed you up” for consistency with the second-person address in the verse and the Hebrew suffix.
translation:
  language: es
  text: 'Todos tus enemigos abren la boca contra ti; silban[a] y rechinan los dientes. Dicen: «¡Te hemos devorado![b] Ciertamente este es el día que esperábamos; lo hemos hallado, lo hemos visto».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El hebreo también puede traducirse «silban» o «sisean»; aquí expresa burla hostil de parte de los enemigos.
    reason: lexical_alternative
  - marker: b
    text: O «Te hemos tragado» o «Te hemos engullido». El hebreo «tragar/engullir» funciona como metáfora vívida de destrucción total.
    reason: lexical_alternative
lexical_decisions:
- source_word: פָּצוּ
  english_pob_choice: open
  chosen_spanish: abren
  alternatives_spanish:
  - abren de par en par
  - abren ampliamente
  lexicon: HALOT
  rationale: El verbo expresa abrir ampliamente la boca; en español, «abren la boca» conserva la imagen natural sin volverla forzada. La frase completa mantiene la hostilidad del gesto.
- source_word: עָלַיִךְ
  english_pob_choice: against you
  chosen_spanish: contra ti
  alternatives_spanish:
  - sobre ti
  - a ti
  lexicon: HALOT
  rationale: El contexto es de agresión y burla, por lo que «contra ti» transmite mejor la oposición hostil que un simple movimiento espacial.
- source_word: פִּיהֶם
  english_pob_choice: their mouths
  chosen_spanish: la boca
  alternatives_spanish:
  - sus bocas
  - la boca de ellos
  lexicon: HALOT
  rationale: En español, el singular colectivo en «abren la boca» suena más natural y conserva el sentido idiomático del hebreo sin perder la referencia plural ya dada por «todos tus enemigos».
- source_word: כָּל אֹיְבַיִךְ
  english_pob_choice: all your enemies
  chosen_spanish: todos tus enemigos
  alternatives_spanish:
  - cada uno de tus enemigos
  - todos los enemigos tuyos
  lexicon: HALOT
  rationale: La expresión colectiva total se vierte de modo directo y transparente con «todos tus enemigos».
- source_word: שָׁרְקוּ
  english_pob_choice: hiss
  chosen_spanish: silban
  alternatives_spanish:
  - silban con desprecio
  - chistan
  lexicon: HALOT
  rationale: El hebreo puede significar silbar como señal de burla o desprecio. «Silban» conserva la posibilidad semántica sin imponer un valor más estrecho; el contexto hostil ya orienta la lectura derisoria.
- source_word: וַיַּחַרְקוּ שֵׁן
  english_pob_choice: gnash their teeth
  chosen_spanish: crujen los dientes
  alternatives_spanish:
  - rechinan los dientes
  - hacen rechinar los dientes
  lexicon: HALOT
  rationale: En español, «crujen los dientes» comunica el ruido y la tensión de la imagen. «Rechinan» sería igualmente posible, pero «crujen» suena más natural junto a la escena de burla y furor.
- source_word: בִּלָּעְנוּ
  english_pob_choice: We have swallowed you up
  chosen_spanish: ¡Te hemos devorado!
  alternatives_spanish:
  - ¡Te hemos tragado!
  - ¡Te hemos engullido!
  lexicon: HALOT
  rationale: Aunque el hebreo usa la imagen de «tragar/engullir», en español «devorar» reproduce bien la fuerza metafórica de destrucción total. Se conserva el carácter vívido de triunfo violento del hablante.
- source_word: אַךְ
  english_pob_choice: Surely
  chosen_spanish: Ciertamente
  alternatives_spanish:
  - De veras
  - Seguro
  lexicon: HALOT
  rationale: La partícula intensifica con afirmación enfática. «Ciertamente» expresa bien la seguridad orgullosa de los enemigos.
- source_word: זֶה הַיּוֹם
  english_pob_choice: this is the day
  chosen_spanish: este es el día
  alternatives_spanish:
  - hoy es el día
  - éste es el día
  lexicon: HALOT
  rationale: La construcción directa mantiene la frase de la cita sin añadir matices ajenos.
- source_word: שֶׁקִּוִּינֻהוּ
  english_pob_choice: we hoped for
  chosen_spanish: que esperábamos
  alternatives_spanish:
  - que anhelábamos
  - por el que esperábamos
  lexicon: HALOT
  rationale: קוה combina espera y esperanza. En este contexto de expectativa hostil, «esperábamos» comunica la anticipación con mayor naturalidad en español y evita una lectura demasiado devocional de «esperar en».
- source_word: מָצָאנוּ
  english_pob_choice: we have found it
  chosen_spanish: lo hemos hallado
  alternatives_spanish:
  - lo hemos encontrado
  - lo hemos conseguido
  lexicon: HALOT
  rationale: «Hallar» preserva el tono algo más formal de la pareja paralela y corresponde bien a la secuencia de logro del texto.
- source_word: רָאִינוּ
  english_pob_choice: we have seen it
  chosen_spanish: lo hemos visto
  alternatives_spanish:
  - lo hemos contemplado
  - lo vimos
  lexicon: HALOT
  rationale: La forma perfecta española mantiene la culminación de la paremia verbal. El pronombre neutro «lo» recoge el referente implícito del hebreo y del contexto.
translation_notes:
  revision_awareness: Se sigue la revisión auditada del inglés POB que ajustó el objeto implícito de «swallowed her up» a «swallowed you up» para concordar con el sufijo de segunda persona del hebreo. En español se reflejó esa concordancia con «te hemos devorado».
  spanish_consistency_notes:
  - 'Se mantiene el tratamiento de segunda persona singular en todo el verso: «tus», «ti», «te».'
  - 'Se conserva el paralelismo verbal final con dos perfectos: «lo hemos hallado, lo hemos visto».'
  - Se evita el calco de «señalar con desprecio» para respetar la fuerza auditiva de שָׁרְקוּ.
  - No se usa «Señor» ni terminología teológica ajena al verso; el texto se limita a la escena de burla enemiga.
