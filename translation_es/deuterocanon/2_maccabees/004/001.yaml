review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien el sentido general del griego: Simón, ya mencionado antes, actúa como denunciante hostil, sigue hablando contra Onías, y lo presenta como quien incitó a Heliodoro y resultó responsable de los males. Sin embargo, ''delator contra los fondos y la patria'' suena poco natural en español y puede oscurecer la relación genitiva de ἐνδείκτης con τῶν χρημάτων καὶ τῆς πατρίδος. También conviene evitar la aposición algo trabada ''Simón, el ya mencionado[a]''.'
  spanish_quality_summary: 'El español es generalmente claro y digno, pero hay dos roces de naturalidad: ''el ya mencionado'' en esa posición suena rígido, y ''delator contra los fondos y la patria'' no es una construcción idiomática; en español fluye mejor ''delator de...''. El resto del versículo es legible y fiel, aunque ''se hubiera hecho autor'' puede pulirse a ''hubiera llegado a ser el autor'' para mayor naturalidad sin perder sentido.'
  glossary_alignment: No hay términos teológicos sensibles aquí. Los nombres propios están bien. 'Males' para τῶν κακῶν es una buena elección y preserva la amplitud semántica mejor que una paráfrasis. La revisión propuesta mantiene la orientación léxica documentada del POB mientras mejora la idiomaticidad del español.
  issues:
  - severity: medium
    issue: 'Construcción poco natural: ''Simón, el ya mencionado[a]'''
    rationale: Aunque comunica προειρημένος, en español suena más natural 'el ya mencionado Simón' o 'Simón, ya mencionado antes'. La forma actual es gramaticalmente torpe.
  - severity: high
    issue: '''delator contra los fondos y la patria'' no es idiomático en español'
    rationale: Para ἐνδείκτης con estos genitivos, 'delator de' o 'denunciante de' comunica mejor la idea de haber denunciado/traicionado los fondos y la patria. 'Contra' aquí suena calcado y poco claro.
  - severity: low
    issue: '''se hubiera hecho autor'' es menos natural que otras opciones'
    rationale: No es infiel, pero 'hubiera llegado a ser el autor' o 'hubiera sido el autor' suena mejor en español culto y preserva καθεστηκώς con mayor fluidez.
  revised_spanish_text: Pero el ya mencionado Simón[a], que se había convertido en delator de los fondos y de la patria, seguía difamando a Onías, como si este hubiera incitado a Heliodoro y hubiera llegado a ser el autor de estos males[b].
  revised_footnotes:
  - marker: a
    text: O ‘el antes mencionado’. El griego mira hacia atrás a Simón ya presentado en el contexto.
    reason: lexical_alternative
  - marker: b
    text: O ‘la causa de estos males’. La expresión griega puede referirse en sentido amplio a hechos dañinos o desgracias, no solo al mal moral.
    reason: lexical_alternative
