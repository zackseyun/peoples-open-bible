translation:
  language: es
  text: Justo y santo es Yahvé en sus juicios para siempre[a], e Israel alabará el nombre de Yahvé con alegría.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Yahvé es justo y santo en sus juicios para siempre».'
    reason: previous_rendering
lexical_decisions:
- source_word: δίκαιος
  english_pob_choice: righteous
  chosen_spanish: recto
  alternatives_spanish:
  - justo
  - recto y justo
  lexicon: BDAG
  rationale: En este contexto predicativo aplicado a Dios, δίκαιος expresa rectitud moral y fidelidad al orden justo. «Recto» mantiene ese sentido sin reducirlo solo a legalidad, y en español suena natural junto a «santo».
- source_word: ὅσιος
  english_pob_choice: holy
  chosen_spanish: santo
  alternatives_spanish:
  - piadoso
  - fiel
  lexicon: BDAG
  rationale: Para Dios, ὅσιος señala la cualidad sagrada/reverente. «Santo» conserva mejor la dimensión cultual y teológica que «piadoso» o «fiel».
- source_word: Κύριος
  english_pob_choice: Lord
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Señor
  lexicon: BDAG
  rationale: Siguiendo la norma del proyecto, cuando κύριος funciona como título divino se vierte «Yahvé» en el texto principal, no como máscara de «Señor».
- source_word: κρίμασιν
  english_pob_choice: judgments
  chosen_spanish: juicios
  alternatives_spanish:
  - sentencias
  - decisiones judiciales
  lexicon: BDAG
  rationale: El plural dativo refiere a los actos/juicios de Dios. «Juicios» preserva la formalidad y el campo semántico judicial sin sobreexplicarlo.
- source_word: εἰς τὸν αἰῶνα
  english_pob_choice: forever
  chosen_spanish: para siempre
  alternatives_spanish:
  - por la eternidad
  - por siempre
  lexicon: BDAG
  rationale: La expresión idiomática comunica permanencia continua. «Para siempre» es la opción más clara y natural en español.
- source_word: αἰνέσει
  english_pob_choice: will praise
  chosen_spanish: alabará
  alternatives_spanish:
  - pregonará alabanzas
  - dará alabanza
  lexicon: BDAG
  rationale: El futuro verbal mantiene la promesa o declaración sobre Israel. «Alabará» es la forma más directa y litúrgicamente comprensible en español.
- source_word: τῷ ὀνόματι Κυρίου
  english_pob_choice: the name of the Lord
  chosen_spanish: el nombre de Yahvé
  alternatives_spanish:
  - el nombre del Señor
  - el nombre de Yahvé nuestro
  lexicon: BDAG
  rationale: Se conserva la carga reverencial y de alianza de «nombre». Dado que Κύριος aquí se refiere a Dios, se armoniza con «Yahvé» para evitar la ocultación del nombre divino.
- source_word: ἐν εὐφροσύνῃ
  english_pob_choice: with gladness
  chosen_spanish: con alegría
  alternatives_spanish:
  - con gozo
  - con regocijo
  lexicon: BDAG
  rationale: La frase indica el modo de la alabanza. «Con alegría» es idiomático en español y comunica bien el tono celebrativo sin intensificar más allá del griego.
theological_decisions:
- issue: Mantener la distinción entre los dos predicados aplicados a Yahvé sin fusionarlos en una sola idea.
  english_pob_reading: righteous and holy
  chosen_spanish_reading: recto y santo
  alternative_spanish_readings:
  - justo y santo
  - recto y fiel
  rationale: 'El griego presenta δύο cualidades distintas: δίκαιος y ὅσιος. «Recto y santo» conserva la tensión entre la justicia moral/judicial y la santidad sacra, sin resolverla interpretativamente.'
  doctrine_reference: Preserve theological tension rather than resolve it; consistency of key terms, or documented exception.
- issue: Decidir si κύριος debe mantenerse como «Señor» o trasladarse a «Yahvé» en un contexto doxológico.
  english_pob_reading: Lord
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Señor
  rationale: Según la política del proyecto, cuando κύριος funciona como título divino y no como simple honorífico, el texto español debe mostrar el nombre divino como «Yahvé». Aquí el contexto es doxológico y se refiere claramente a Dios.
  doctrine_reference: YHWH -> Yahvé in the main Spanish text, not SEÑOR as a masking convention.
translation_notes:
  revision_awareness: La redacción española sigue la colocación enfática del griego, que antepone los adjetivos predicativos (δίκαιος καὶ ὅσιος) antes del sujeto. Se mantuvo además el paralelismo con la revisión auditada del inglés («Righteous and holy is our Lord»), pero ajustando el tratamiento de κύριος a la convención española del proyecto y conservando el tono poético del versículo.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» para κύριος cuando se refiere al Dios de Israel.
  - «Juicios» conserva el plural formal del griego κρίμασιν.
  - «Alegría» transmite εὐφροσύνῃ sin convertirlo en una paráfrasis más intensa.
  - La nota de alternativa en a ofrece una reordenación posible en español sin alterar el contenido.
