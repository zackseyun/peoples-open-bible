translation:
  language: es
  text: Para mí es preferible caer en sus manos sin hacerlo, antes que pecar delante del Señor[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literalmente, «sin haberlo hecho». El griego deja implícito el acto, en referencia a la exigencia de los ancianos.
    reason: lexical_alternative
lexical_decisions:
- source_word: αἱρετόν
  english_pob_choice: preferable
  chosen_spanish: preferible
  alternatives_spanish:
  - mejor
  - digno de elección
  lexicon: LSJ
  rationale: El adjetivo expresa algo “preferible” o “escogible”. «Preferible» conserva la comparación implícita sin sonar forzado en español.
- source_word: μοί ἐστιν
  english_pob_choice: for me
  chosen_spanish: para mí
  alternatives_spanish:
  - a mí
  - en mi juicio
  lexicon: BDAG
  rationale: La construcción con dativo y verbo copulativo expresa una evaluación personal. «Para mí» comunica naturalmente esa valoración subjetiva.
- source_word: μὴ πράξασαν
  english_pob_choice: without doing it
  chosen_spanish: sin haberlo hecho
  alternatives_spanish:
  - sin hacerlo
  - si no lo hago
  lexicon: BDAG
  rationale: El participio aoristo queda implícito respecto del acto exigido por los ancianos. «Sin haberlo hecho» conserva ese valor retrospectivo sin introducir un objeto explícito que el griego no enuncia.
- source_word: ἐμπεσεῖν εἰς τὰς χεῖρας ὑμῶν
  english_pob_choice: to fall into your hands
  chosen_spanish: caer en vuestras manos
  alternatives_spanish:
  - caer en sus manos
  - venir a vuestras manos
  lexicon: LSJ
  rationale: Es un modismo de sometimiento o de sufrir poder ajeno. «Caer en vuestras manos» mantiene la metáfora con buena naturalidad bíblica en español.
- source_word: ἢ
  english_pob_choice: rather than
  chosen_spanish: antes que
  alternatives_spanish:
  - más que
  - en vez de
  lexicon: BDAG
  rationale: En este contraste comparativo, «antes que» expresa bien la preferencia entre dos males.
- source_word: ἁμαρτεῖν
  english_pob_choice: to sin
  chosen_spanish: pecar
  alternatives_spanish:
  - cometer pecado
  - transgredir
  lexicon: BDAG
  rationale: «Pecar» es el equivalente directo y teológicamente apropiado. Mantiene la fuerza moral del verbo sin sobreexplicar.
- source_word: ἐνώπιον Κυρίου
  english_pob_choice: before the Lord
  chosen_spanish: delante del Señor
  alternatives_spanish:
  - ante el Señor
  - en presencia del Señor
  lexicon: BDAG
  rationale: La expresión indica responsabilidad en la presencia de Dios. En español, «delante del Señor» conserva esa idea con estilo bíblico claro. Aunque el texto griego dice Κυρίου, aquí el referente es divino; la forma «Señor» respeta la convención del contexto de cita bíblica.
theological_decisions:
- issue: Cómo renderizar Κυρίου en un contexto griego que alude al Dios de Israel
  english_pob_reading: before the Lord
  chosen_spanish_reading: delante del Señor
  alternative_spanish_readings:
  - delante de Yahvé
  - ante el Señor Dios
  rationale: El griego usa κύριος, y el POB inglés lo vierte como “Lord”. En este versículo, la frase funciona como fórmula de rendición de cuentas ante Dios; en español, «Señor» mantiene esa referencia reverente y evita introducir una expansión no presente en el texto inmediato. No se opta por «Yahvé» aquí porque el griego no escribe el nombre divino, sino κύριος.
  doctrine_reference: 'Principio POB sobre κύριος: distinguir entre el nombre divino y el título según el testimonio del texto fuente.'
- issue: Si conviene explicitar el acto implícito que las ancianas demandan
  english_pob_reading: Keep the object implicit in the main text, with minimal English supplementation as 'do it' only for grammatical clarity
  chosen_spanish_reading: Mantenerlo implícito con «sin haberlo hecho»
  alternative_spanish_readings:
  - sin hacerlo
  - sin cometerlo
  rationale: El griego deja tácito el acto referido. En español, «sin haberlo hecho» es la mínima aclaración necesaria para que la oración sea comprensible sin añadir una interpretación más amplia que el texto no formula.
  doctrine_reference: No paraphrase beyond source warrants; preserve textual restraint where the original is elliptical.
translation_notes:
  revision_awareness: 'La redacción sigue la última revisión inglesa, que prefirió «without doing it» por su cercanía al participio griego μὴ πράξασαν. En español se preserva esa misma economía: la cláusula queda breve, con el acto implícito y sin expandir el contenido más allá de lo que exige la sintaxis.'
  spanish_consistency_notes:
  - Se mantiene «Señor» para κύριος en este contexto de referencia divina, coherente con el tratamiento reverente del término en la tradición POB.
  - Se conserva el modismo de movimiento/caída («caer en vuestras manos») para reflejar la metáfora griega.
  - «Sin haberlo hecho» evita introducir un objeto explícito no presente en el griego, a la vez que permite una lectura fluida en español.
  - Se usa «pecar» para ἁμαρτεῖν por su precisión moral y su naturalidad en registro bíblico.
