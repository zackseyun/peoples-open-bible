base_translation:
  language: en
  yaml_path: translation/ot/numbers/024/024.yaml
  text: But ships shall come from the coast of Kittim[a], and they shall afflict Asshur, and they shall afflict Eber[d][c][b]; and he too shall come to destruction.
  footnotes:
  - marker: a
    text: Kittim may refer specifically to Cyprus or more broadly to western maritime peoples.
    reason: alternative_reading
  - marker: b
    text: Asshur can also be rendered 'Assyria.'
    reason: lexical_alternative
  - marker: c
    text: Eber may refer to Eber as a people-name, to the Hebrews, or to peoples 'beyond' a boundary such as the Euphrates.
    reason: alternative_reading
  - marker: d
    text: The Hebrew reads 'and he too'; the antecedent is uncertain, and some understand it more collectively as 'it too' or as a ruler representing the power from Kittim.
    reason: alternative_reading
