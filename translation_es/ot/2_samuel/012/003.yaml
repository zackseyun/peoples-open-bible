base_translation:
  language: en
  yaml_path: translation/ot/2_samuel/012/003.yaml
  text: But the poor man had nothing except one little ewe lamb[a], which he had bought. He kept it alive, and it grew up with him and with his children together; it would eat from his morsel and drink from his cup and lie in his bosom[c][b], and it was like a daughter to him.
