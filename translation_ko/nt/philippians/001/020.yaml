id: PHP.1.20
reference: Philippians 1:20
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: κατὰ τὴν ἀποκαραδοκίαν καὶ ἐλπίδα μου ὅτι ἐν οὐδενὶ αἰσχυνθήσομαι, ἀλλ’ ἐν πάσῃ παρρησίᾳ ὡς πάντοτε καὶ νῦν μεγαλυνθήσεται Χριστὸς ἐν τῷ σώματί μου, εἴτε διὰ ζωῆς εἴτε διὰ θανάτου.
base_translation:
  language: en
  yaml_path: translation/nt/philippians/001/020.yaml
  text: in keeping with my eager expectation and hope that I will not be put to shame in anything, but that with all boldness, as always, even now Messiah will be magnified in my body, whether through life or through death.
translation:
  language: ko
  text: 이는 나의 간절한 기대와 소망에 부합하는 것이니, 곧 내가 어떤 일에서도 부끄러움을 당하지 않고[a] 도리어 온전한 담대함으로, 언제나처럼 지금도, 메시아가 나의 몸에서 크게 드러나시는 것입니다 — 살든지 죽든지.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 또는 「내가 부끄러워하지 않고」. 헬라어 αἰσχύνομαι는 공적 변호와 신원의 문맥에서 「수치를 당하다」의 함의가 강하다.
    reason: lexical_alternative
lexical_decisions:
- source_word: κατὰ
  english_pob_choice: in keeping with
  chosen_korean: ~에 부합하는
  alternatives_korean:
  - ~을 따라
  - ~에 따라
  lexicon: BDAG
  rationale: κατά + 대격이 바울의 기대·소망에 대한 부합을 표현하므로, 「~에 부합하는」이 그 일치의 함의를 자연스럽게 담는다.
- source_word: ἀποκαραδοκίαν
  english_pob_choice: eager expectation
  chosen_korean: 간절한 기대
  alternatives_korean:
  - 열렬한 기다림
  - 목 늘여 바라봄
  lexicon: BDAG
  rationale: ἀποκαραδοκία는 「머리를 내밀어 바라봄」의 강렬한 형상이다. 「간절한 기대」가 그 강도를 자연스럽게 담는다.
- source_word: ἐλπίδα
  english_pob_choice: hope
  chosen_korean: 소망
  alternatives_korean:
  - 희망
  lexicon: BDAG
  rationale: 바울의 신학적 「소망」을 「소망」으로 옮긴다. 「희망」보다 종말론적 무게가 더 자연스럽다.
- source_word: ἐν οὐδενὶ
  english_pob_choice: in anything
  chosen_korean: 어떤 일에서도
  alternatives_korean:
  - 아무 일에도
  - 어떤 점에서도
  lexicon: BDAG
  rationale: 부정문과 결합되는 οὐδενί를 「어떤 ~에서도」 부정으로 옮긴다.
- source_word: αἰσχυνθήσομαι
  english_pob_choice: I will not be put to shame
  chosen_korean: 부끄러움을 당하지 않고
  alternatives_korean:
  - 수치를 당하지 않고
  - 부끄러워하지 않고
  lexicon: BDAG
  rationale: 수동·중간형으로 공적 신원·법정의 함의를 가진다. 「부끄러움을 당하지 않고」가 수동성을 살린다.
- source_word: παρρησίᾳ
  english_pob_choice: boldness
  chosen_korean: 담대함
  alternatives_korean:
  - 솔직함
  - 거리낌없음
  lexicon: BDAG
  rationale: παρρησία는 공적 증언의 담대함을 가리킨다. 「담대함」이 그 무게를 자연스럽게 담는다.
- source_word: μεγαλυνθήσεται
  english_pob_choice: will be magnified
  chosen_korean: 크게 드러나시는
  alternatives_korean:
  - 높임을 받으시는
  - 위대하심이 나타나시는
  lexicon: BDAG
  rationale: μεγαλύνω는 「크게 하다·높이 드러내다」를 의미한다. 「크게 드러나시는」이 비유와 의미를 자연스럽게 담는다.
- source_word: Χριστὸς
  english_pob_choice: Messiah
  chosen_korean: 메시아
  alternatives_korean:
  - 그리스도
  lexicon: BDAG
  rationale: 본 번역의 원칙에 따라 칭호 Χριστός를 「메시아」로 옮긴다.
- source_word: ἐν τῷ σώματί μου
  english_pob_choice: in my body
  chosen_korean: 나의 몸에서
  alternatives_korean:
  - 내 몸을 통하여
  lexicon: BDAG
  rationale: 문자적 「몸에서」를 보존하여 살든지 죽든지 바울의 육체적 증언의 자리임을 분명히 한다.
- source_word: διὰ ζωῆς … διὰ θανάτου
  english_pob_choice: through life or through death
  chosen_korean: 살든지 죽든지
  alternatives_korean:
  - 생명으로든 죽음으로든
  - 삶을 통해서나 죽음을 통해서나
  lexicon: BDAG
  rationale: 한국어 정형 표현 「살든지 죽든지」가 간결하고 강력하게 두 가능성을 대조시킨다.
