translation:
  language: es
  text: No inclines mi corazón a ninguna cosa mala[a], al practicar obras perversas con hombres que obran iniquidad[b]; y no me dejes comer de sus manjares[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «a una cosa mala» o «a una palabra mala»; דָבָר puede significar «cosa», «asunto» o «palabra».
    reason: lexical_alternative
  - marker: b
    text: O «con malhechores». Literalmente, «con hombres que obran iniquidad».
    reason: lexical_alternative
  - marker: c
    text: Esto es, de sus alimentos selectos o cosas agradables; la frase también puede insinuar compartir sus placeres pecaminosos.
    reason: lexical_alternative
lexical_decisions:
- source_word: תַּט
  english_pob_choice: incline
  chosen_spanish: inclines
  alternatives_spanish:
  - gires
  - vuelvas
  - dobles
  lexicon: HALOT
  rationale: Con לִבִּי como objeto, la imagen es de causar una orientación interior. «Inclines» conserva la metáfora de dirección del corazón y su tono de petición, sin volverla demasiado mecánica.
- source_word: לִבִּי
  english_pob_choice: my heart
  chosen_spanish: mi corazón
  alternatives_spanish:
  - mi mente
  - mi voluntad
  - mi interior
  lexicon: HALOT
  rationale: «Corazón» mantiene la antropología bíblica del centro de deseos, pensamiento y voluntad; evita reducir el sentido a solo facultad mental o emocional.
- source_word: לְדָבָר רָע
  english_pob_choice: to any evil thing
  chosen_spanish: a ninguna cosa mala
  alternatives_spanish:
  - a ninguna palabra mala
  - a ningún asunto malo
  - a ningún mal
  lexicon: HALOT
  rationale: דָבָר puede significar «cosa», «asunto» o «palabra». En este contexto, donde sigue la práctica de actos perversos, «cosa mala» preserva la amplitud semántica sin estrecharla a habla o discurso.
- source_word: לְהִתְעוֹלֵל
  english_pob_choice: to practice
  chosen_spanish: para practicar
  alternatives_spanish:
  - para hacer
  - para entregarme a
  - para actuar
  lexicon: HALOT
  rationale: El valor verbal sugiere involucrarse deliberadamente en una conducta; «practicar» comunica una participación reiterada o asumida en ese obrar.
- source_word: עֲלִל֨וֹת
  english_pob_choice: deeds
  chosen_spanish: hechos
  alternatives_spanish:
  - obras
  - acciones
  - actos
  lexicon: HALOT
  rationale: Se refiere a acciones concretas. «Hechos» suena natural en español y conserva la concreción del plural hebreo.
- source_word: בְּרֶשַׁע
  english_pob_choice: wicked
  chosen_spanish: perversos
  alternatives_spanish:
  - malvados
  - impíos
  - malos
  lexicon: HALOT
  rationale: El hebreo funciona adverbialmente/modificativamente con las acciones. «Hechos perversos» expresa el carácter moralmente torcido de esas acciones sin perder fuerza ni volverse arcaico.
- source_word: אִישִׁים פֹּעֲלֵי אָוֶן
  english_pob_choice: with men who work iniquity
  chosen_spanish: con hombres que hacen iniquidad
  alternatives_spanish:
  - con hombres que obran maldad
  - con malhechores
  - con hombres que hacen mal
  lexicon: HALOT
  rationale: La construcción hebrea caracteriza a un grupo por su obrar. «Hombres que hacen iniquidad» conserva la imagen verbal de פֹּעֲלֵי אָוֶן y mantiene el peso ético de אָוֶן; «hombres» refleja el plural masculino del hebreo.
- source_word: אָוֶן
  english_pob_choice: iniquity
  chosen_spanish: iniquidad
  alternatives_spanish:
  - maldad
  - maldad grave
  - perversidad
  lexicon: HALOT
  rationale: «Iniquidad» reproduce bien el valor moral fuerte y el registro bíblico del término, manteniendo la gravedad ética que el hebreo transmite.
- source_word: וּבַל
  english_pob_choice: and let me not
  chosen_spanish: y no me dejes
  alternatives_spanish:
  - ni me dejes
  - y no permitas que
  - ni permitas que
  lexicon: HALOT
  rationale: La forma de petición negativa se vierte de manera natural en español como una súplica dirigida a Dios. «No me dejes» conserva la dependencia implícita en el ruego.
- source_word: אֶלְחַם
  english_pob_choice: eat
  chosen_spanish: comer
  alternatives_spanish:
  - probar
  - participar de
  - alimentarme
  lexicon: HALOT
  rationale: El verbo es literalmente «comer». Mantenerlo evita suavizar la imagen y deja abierta la posible dimensión participativa/metafórica que el contexto sugiere.
- source_word: בְּמַנְעַמֵּיהֶם
  english_pob_choice: of their delicacies
  chosen_spanish: de sus manjares
  alternatives_spanish:
  - de sus delicias
  - de sus manjares agradables
  - de sus cosas agradables
  lexicon: HALOT
  rationale: El sustantivo apunta a cosas agradables o exquisitas, especialmente alimentos selectos. «Manjares» es una opción digna y clara en español, y permite insinuar tanto el sentido literal como el posible trasfondo de participación en placeres pecaminosos.
theological_decisions:
- issue: Agencia divina en la súplica 'No inclines mi corazón'
  english_pob_reading: Retain the prayer as addressed to God without softening the causative wording.
  chosen_spanish_reading: 'Mantener la súplica dirigida a Dios con la fuerza causativa: «No inclines mi corazón».'
  alternative_spanish_readings:
  - No permitas que mi corazón se incline
  - No dejes que mi corazón se vuelva
  rationale: El hebreo presenta una petición directa sobre la orientación del corazón del orante. La versión española conserva esa tensión teológica en lugar de resolverla convirtiéndola en una simple autocorrección humana.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: La redacción sigue de cerca el texto hebreo y el audit trail en inglés. Se incorporó la idea de indefinición de לְדָבָר רָע con «ninguna cosa mala», equivalente al ajuste revisado en inglés («any evil thing»). Se mantuvo la imagen corporal de «corazón», la asociación con «hombres que hacen iniquidad» y la clausula final de comer de sus manjares, preservando la posible doble lectura literal y participativa.
  spanish_consistency_notes:
  - Se usó «Yahvé» solo cuando el texto no lo requería; aquí no aparece el Tetragrámaton, así que no se añadió terminología divina explícita.
  - «Iniquidad» se mantuvo para אָוֶן por coherencia con el POB en inglés y por su peso moral.
  - Se prefirió «manjares» como equivalente digno y comprensible de «delicacies», sin perder la referencia a alimentos selectos.
  - Los marcadores de nota al pie se colocaron solo donde la ambigüedad léxica merece alternativa explícita.
