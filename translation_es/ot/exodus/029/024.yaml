- from: Pondrás todo sobre las palmas de Aarón y sobre las palmas de sus hijos[a], y lo mecerás como ofrenda mecida delante de Yahvé.
  to: Pondrás todo sobre las palmas de Aarón y sobre las palmas de sus hijos[a], y los mecerás como ofrenda mecida delante de Yahvé.
  rationale: Se corrigió el pronombre singular «lo» a plural «los» para reflejar fielmente אֹתָם y el inglés auditado «them», manteniendo el resto de las decisiones bien alineadas con el hebreo y con la terminología del proyecto.
