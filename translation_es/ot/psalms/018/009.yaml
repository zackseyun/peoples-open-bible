translation:
  language: es
  text: El humo subió de sus narices[a], y el fuego de su boca consumió; brasas ardieron de él.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «de su ira». Hebreo אַף puede significar «nariz/narices» o, idiomáticamente, «ira». Aquí el paralelismo con «de su boca» favorece la imagen corporal concreta.
    reason: lexical_alternative
lexical_decisions:
- source_word: עָלָה
  english_pob_choice: rose
  chosen_spanish: subió
  alternatives_spanish:
  - ascendió
  - se elevó
  lexicon: HALOT
  rationale: עלה en qal expresa movimiento hacia arriba. En español, «subió» comunica con naturalidad el ascenso del humo y conserva la imagen poética sin añadir explicación.
- source_word: עָשָׁן
  english_pob_choice: smoke
  chosen_spanish: humo
  alternatives_spanish:
  - humo espeso
  - humo
  lexicon: HALOT
  rationale: El sustantivo básico es «humo». Se evita ampliar con adjetivos no requeridos por el hebreo.
- source_word: בְּאַפּוֹ
  english_pob_choice: from his nostrils
  chosen_spanish: de sus narices
  alternatives_spanish:
  - de su nariz
  - desde su nariz
  - de su ira
  lexicon: HALOT
  rationale: אַף puede significar «nariz/narices» o, idiomáticamente, «ira». Aquí el paralelismo con «de su boca» favorece la imagen corporal concreta; en español, el plural «narices» conserva el antropomorfismo y suena natural en poesía.
- source_word: וְאֵשׁ
  english_pob_choice: and ... fire
  chosen_spanish: y el fuego
  alternatives_spanish:
  - y fuego
  lexicon: HALOT
  rationale: Se mantiene el sustantivo simple «fuego» con el artículo por fluidez española, sin perder el paralelismo con la primera cola.
- source_word: מִפִּיו
  english_pob_choice: from his mouth
  chosen_spanish: de su boca
  alternatives_spanish:
  - desde su boca
  lexicon: HALOT
  rationale: Equivalente directo del complemento preposicional, conservando la imaginería antropomórfica de la teofanía.
- source_word: תֹּאכֵל
  english_pob_choice: consumed
  chosen_spanish: consumió
  alternatives_spanish:
  - devoró
  - consumía
  lexicon: HALOT
  rationale: El verbo אכל aplicado al fuego indica consumir/devorar. «Consumió» refleja el valor verbal con naturalidad en español y sigue la revisión inglesa que hizo más explícito el verbo.
- source_word: גֶּחָלִים
  english_pob_choice: coals
  chosen_spanish: brasas
  alternatives_spanish:
  - carbones
  - brasas encendidas
  lexicon: HALOT
  rationale: El término puede abarcar carbones encendidos o brasas. «Brasas» comunica mejor el elemento ardiente en español poético, sin sobreexplicar.
- source_word: בָּעֲר֥וּ
  english_pob_choice: blazed
  chosen_spanish: ardieron
  alternatives_spanish:
  - ardían
  - se encendieron
  lexicon: HALOT
  rationale: בער expresa arder/encenderse. «Ardieron» mantiene el perfecto narrativo-poético y evita un calco forzado.
- source_word: מִמֶּנּוּ
  english_pob_choice: from him
  chosen_spanish: desde él
  alternatives_spanish:
  - de él
  - a partir de él
  lexicon: HALOT
  rationale: La preposición מן con pronombre conserva la idea de procedencia. «Desde él» reproduce el movimiento de emanación del fuego y las brasas desde la presencia divina.
theological_decisions:
- issue: Antropomorfismo divino en una teofanía poética
  english_pob_reading: Retain the bodily imagery literally ('nostrils,' 'mouth')
  chosen_spanish_reading: Conservar la imagen corporal literal («narices», «boca»), sin sustituirla por una abstracción como «ira».
  alternative_spanish_readings:
  - Interpretar «narices» como «ira»
  - suavizar la imagen con una paráfrasis impersonal
  rationale: El salmo presenta una manifestación divina deliberadamente imagística. Mantener el antropomorfismo preserva la tensión teológica y la fuerza poética del hebreo; la ambigüedad de אַף se resuelve a favor de la imagen concreta por el paralelismo inmediato.
  doctrine_reference: Principio de primacía del texto original y preservación de la tensión teológica; ver también teofanías poéticas en los Salmos.
translation_notes:
  revision_awareness: La redacción sigue la revisión más reciente del inglés POB, que pasó de una frase nominal tipo «fuego consumidor» a una verbal más directa («el fuego de su boca consumió»). En español se reflejó esa precisión con «el fuego de su boca consumió», manteniendo el orden poético y el movimiento de emanación del texto hebreo.
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando aparece el nombre divino; este versículo no lo contiene.
  - Se mantiene el tono poético y antropomórfico sin convertir la imagen en explicación doctrinal.
  - «Narices» se emplea aquí como plural poético natural para אַף, en coherencia con la decisión inglesa de retener el sentido corporal concreto.
