translation:
  language: es
  text: Y hubo de nuevo guerra en Gob contra los filisteos[a], y Elhanán, hijo de Jaare-oregim[b], el betlemita, derribó a Goliat el geteo, y el asta de su lanza era como el rodillo de un telar.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: '1 Crónicas 20:5 lee de otro modo: allí se dice que Elhanán mató a Lahmi, hermano de Goliat. Muchos entienden que el texto de Samuel conserva aquí una lectura difícil o corrompida, y la armonizan en consecuencia.'
    reason: textual_variant
  - marker: b
    text: El patronímico hebreo 'Jaare-oregim' es difícil; algunos piensan que 'oregim' ('tejedores') se repitió accidentalmente desde el final del versículo.
    reason: textual_variant
lexical_decisions:
- source_word: בְּ/ג֖וֹב
  english_pob_choice: at Gob
  chosen_spanish: en Gob
  alternatives_spanish:
  - en la localidad de Gob
  - en Gob contra los filisteos
  lexicon: HALOT
  rationale: La preposición בְ con nombre de lugar se rinde naturalmente en español como 'en'. Mantengo 'Gob' como topónimo transliterado, con sintaxis natural para una escena de combate.
- source_word: וַ/יַּ֡ךְ
  english_pob_choice: struck down
  chosen_spanish: hirió
  alternatives_spanish:
  - derribó
  - mató
  lexicon: HALOT
  rationale: נכה puede significar golpear, herir o matar según el contexto. Dado que el texto presenta la acción guerrera con un objeto directo personal, 'hirió' conserva la fuerza del golpe sin forzar una especificación adicional en español.
- source_word: יַעְרֵ֨י אֹרְגִ֜ים
  english_pob_choice: Jaare-oregim
  chosen_spanish: Jaare-oregim
  alternatives_spanish:
  - Jair
  - Jaare
  lexicon: HALOT
  rationale: Conservo la forma compuesta del texto masorético, porque el hebreo transmitido integra אֹרְגִים en la secuencia patronímica. No se armoniza silenciosamente con Crónicas; la dificultad textual queda preservada.
- source_word: בֵּ֣ית הַלַּחְמִ֗י
  english_pob_choice: the Bethlehemite
  chosen_spanish: el betlemita
  alternatives_spanish:
  - el de Belén
  - el bethlehemita
  lexicon: HALOT
  rationale: El gentilicio se expresa de forma natural en español como 'betlemita'. Esta opción comunica el valor étnico/toponímico del hebreo sin calco innecesario.
- source_word: אֵ֚ת גָּלְיָ֣ת הַ/גִּתִּ֔י
  english_pob_choice: Goliath the Gittite
  chosen_spanish: a Goliat el geteo
  alternatives_spanish:
  - a Goliat el guitita
  - a Goliat de Gat
  lexicon: HALOT
  rationale: La estructura del hebreo con אֵת más el nombre propio da en el texto masorético 'Goliat el geteo'. 'Geteo' reproduce el gentilicio de Gat en español bíblico contemporáneo y mantiene la lectura transmitida.
- source_word: וְ/עֵ֣ץ חֲנִית֔/וֹ
  english_pob_choice: the shaft of his spear
  chosen_spanish: el asta de su lanza
  alternatives_spanish:
  - el palo de su lanza
  - el madero de su lanza
  lexicon: HALOT
  rationale: עֵץ literalmente es 'madera/árbol', pero en esta colocación describe la parte larga de la lanza. 'Asta' es español claro y preciso para el mástil o asta de un arma.
- source_word: כִּ/מְנ֖וֹר אֹרְגִֽים
  english_pob_choice: like a weaver’s beam
  chosen_spanish: como el enjullo de un telar
  alternatives_spanish:
  - como un enjullo de telar
  - como una viga de tejedor
  lexicon: HALOT
  rationale: '''Enjullo'' expresa la pieza cilíndrica del telar a la que se asemeja el asta por grosor, y evita una imagen demasiado libre. Aunque ''viga de tejedor'' sería más literal, ''enjullo de un telar'' comunica mejor la comparación técnica en español.'
theological_decisions:
- issue: Tensión textual entre 2 Samuel 21:19 y 1 Crónicas 20:5, además del relato conocido de 1 Samuel 17
  english_pob_reading: 'Retain the Masoretic wording of 2 Samuel 21:19 in the main text: Elhanan struck down Goliath the Gittite.'
  chosen_spanish_reading: 'Conservar en el texto principal: Elhanán hirió a Goliat el geteo.'
  alternative_spanish_readings:
  - Elhanán hirió a Lahmi, hermano de Goliat el geteo
  rationale: Siguiendo la primacía del texto original, no se resuelve la tensión por armonización en el cuerpo del versículo. La lectura masorética transmitida nombra a Goliat como objeto directo; la alternativa conciliadora se preserva solo como nota.
  doctrine_reference: Translation philosophy §§1, 3, 5
translation_notes:
  revision_awareness: La traducción sigue el texto hebreo masorético provisto y coincide con la última revisión auditada, que no introdujo cambios. Se mantiene la lectura difícil en el cuerpo principal y se documenta la variante armonizada en nota, conforme al expediente inglés.
  spanish_consistency_notes:
  - Se usa 'Yahvé' como norma general, pero este versículo no contiene el nombre divino.
  - Se mantiene 'Goliat' como nombre propio tradicionalmente reconocible en español, coherente con la transliteración del hebreo.
  - '''Geteo'' se usa para גִּתִּי en lugar de ''guitita'' por claridad bíblica y consistencia con un gentilicio español formado a partir de Gat.'
  - '''Lanza'' y ''asta'' distinguen el arma y su parte larga, preservando el matiz del hebreo עֵץ en contexto.'
