  text: All of them come for violence[a]; the set of their faces is forward[c][b], and they gather captives like sand.
  footnotes:
  - marker: a
    text: 'Or ''the intent of their faces is eastward.'' The Hebrew expression is difficult: קָדִימָה can denote ''forward'' or ''eastward,'' and מְגַמַּת may mean ''set,'' ''intent,'' or ''direction.'''
    reason: lexical_alternative
  - marker: b
    text: Hebrew has a singular verb, 'and he gathers,' treating the invading force as a collective unit.
    reason: lexical_alternative
  - marker: c
    text: Or 'gathers captivity like sand,' if שֶׁבִי is taken abstractly rather than personally.
    reason: lexical_alternative
