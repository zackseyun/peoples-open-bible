translation:
  language: es
  text: Y harás un altar para quemar incienso[a]; lo harás de madera de acacia.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, de forma más compacta: «un altar de incienso» o «un altar para incienso». El hebreo dice más literalmente: «un altar para quemar incienso».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְעָשִׂיתָ
  english_pob_choice: And you shall make
  chosen_spanish: Y harás
  alternatives_spanish:
  - Y harás tú
  - Entonces harás
  lexicon: HALOT
  rationale: El perfecto con waw en esta instrucción funciona como mandato secuencial. En español, «harás» conserva la fuerza directiva sin volverlo una paráfrasis más libre; la conjunción «Y» reproduce la continuidad del encargo.
- source_word: מִזְבֵּחַ
  english_pob_choice: an altar
  chosen_spanish: un altar
  alternatives_spanish:
  - un altar de sacrificio
  - un altar
  lexicon: HALOT
  rationale: «Altar» es el equivalente directo y normal en español para el sustantivo cultual hebreo. El artículo indefinido mantiene el valor introductorio del objeto en el pasaje.
- source_word: מִקְטַר קְטֹרֶת
  english_pob_choice: for burning incense
  chosen_spanish: para quemar incienso
  alternatives_spanish:
  - de incienso
  - para ofrecer incienso
  - un altar de incienso
  lexicon: HALOT
  rationale: La construcción hebrea describe la función del altar más literalmente que un título fijo. «Para quemar incienso» preserva esa función y evita comprimir prematuramente la frase en un nombre técnico.
- source_word: עֲצֵי שִׁטִּים
  english_pob_choice: acacia wood
  chosen_spanish: de madera de acacia
  alternatives_spanish:
  - de acacia
  - de madera de acacias
  - de madera de acacia
  lexicon: HALOT
  rationale: El hebreo expresa material por medio de una construcción nominal plural idiomática. «De madera de acacia» es natural en español y mantiene el sentido material sin perder la referencia al tipo de madera.
- source_word: תַּעֲשֶׂה אֹתוֹ
  english_pob_choice: you shall make it
  chosen_spanish: lo harás
  alternatives_spanish:
  - lo harás tú
  - lo fabricarás
  lexicon: HALOT
  rationale: La repetición verbal refuerza la instrucción y retoma el objeto directo. «Lo harás» conserva la economía del hebreo y evita introducir «fabricarás», que desplazaría el matiz cultual de la orden.
translation_notes:
  revision_awareness: El borrador sigue de cerca la decisión inglesa de traducir la construcción מִקְטַר קְטֹרֶת de forma funcional («for burning incense») en vez de comprimirla a un título fijo. No se observan revisiones textuales que obliguen a alterar el sentido base.
  spanish_consistency_notes:
  - Se mantiene «altar» como término cultual estándar, sin reemplazarlo por un equivalente más interpretativo.
  - La nota al pie conserva la alternativa compacta, siguiendo la auditoría inglesa.
  - «Acacia» se conserva como nombre común botánico en español, coherente con el valor material del hebreo.
