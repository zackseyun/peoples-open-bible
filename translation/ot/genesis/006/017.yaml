id: GEN.6.17
reference: Genesis 6:17
source:
  edition: WLC
  text: וַ/אֲנִ֗י הִנְ/נִי֩ מֵבִ֨יא אֶת הַ/מַּבּ֥וּל מַ֨יִם֙ עַל הָ/אָ֔רֶץ לְ/שַׁחֵ֣ת כָּל בָּשָׂ֗ר אֲשֶׁר בּ/וֹ֙ ר֣וּחַ חַיִּ֔ים מִ/תַּ֖חַת הַ/שָּׁמָ֑יִם כֹּ֥ל אֲשֶׁר בָּ/אָ֖רֶץ יִגְוָֽע־־־־־׃
translation:
  text: And I—behold[a], I am bringing the flood of waters upon the earth to destroy all flesh in which is the breath of life from under heaven. Everything that is on the earth will perish.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or "spirit of life." The Hebrew word רוּחַ can mean "breath," "wind," or "spirit."
    reason: lexical_alternative
lexical_decisions:
- source_word: וַאֲנִי
  chosen: And I
  alternatives:
  - As for me
  lexicon: HALOT
  rationale: The conjunction plus independent pronoun marks emphatic subject contrast. 'And I' preserves the discourse force without over-paraphrasing.
- source_word: הִנְנִי
  chosen: behold, I am
  alternatives:
  - look, I am
  - here I am
  lexicon: HALOT
  rationale: This particle + pronoun construction heightens solemn emphasis and immediacy. 'Behold, I am' preserves the rhetorical force in elevated but still intelligible English.
- source_word: מֵבִיא
  chosen: am bringing
  alternatives:
  - am about to bring
  - bring
  lexicon: HALOT
  rationale: The participle conveys imminent or ongoing action from the speaker's perspective. 'Am bringing' best reflects the form without adding the stronger inferential nuance of 'about to'.
- source_word: הַמַּבּוּל מַיִם
  chosen: the floodwaters
  alternatives:
  - the flood of waters
  - the deluge of waters
  lexicon: HALOT
  rationale: The Hebrew combines the technical term for the deluge with 'waters.' 'Floodwaters' is natural modern English and preserves that the destructive agent is water, not merely a generic catastrophe.
- source_word: עַל הָאָרֶץ
  chosen: upon the earth
  alternatives:
  - on the earth
  - upon the land
  lexicon: HALOT
  rationale: '''Earth'' fits the cosmic scope of the flood narrative better than the more localized ''land.'' ''Upon'' matches the elevated register of the announcement.'
- source_word: לְשַׁחֵת
  chosen: to destroy
  alternatives:
  - to ruin
  - to wipe out
  lexicon: HALOT
  rationale: The infinitive expresses purpose. 'Destroy' is the most direct and contextually fitting rendering for the comprehensive judgment described.
- source_word: כָּל בָּשָׂר
  chosen: all flesh
  alternatives:
  - every living creature
  - all living beings
  lexicon: HALOT
  rationale: '''All flesh'' is a key biblical expression and should be preserved where intelligible. It retains the text''s broad reference to embodied living creatures without interpretive narrowing.'
- source_word: אֲשֶׁר בּוֹ רוּחַ חַיִּים
  chosen: in which is the breath of life
  alternatives:
  - that has the breath of life in it
  - in whom is the spirit of life
  lexicon: HALOT
  rationale: רוּחַ can mean breath, wind, or spirit. In this flood context, paired with 'life,' 'breath of life' best matches the life-principle of animate creatures and echoes Genesis creation language. 'In which' agrees with the collective 'all flesh' without forcing personal language.
- source_word: מִתַּחַת הַשָּׁמָיִם
  chosen: from under heaven
  alternatives:
  - from under the heavens
  - under heaven
  lexicon: HALOT
  rationale: This idiom denotes the realm beneath the sky. 'From under heaven' is a natural English equivalent that preserves the comprehensive scope.
- source_word: כֹּל אֲשֶׁר בָּאָרֶץ
  chosen: Everything that is on the earth
  alternatives:
  - All that is on the earth
  - Everything on the earth
  lexicon: HALOT
  rationale: The phrase sums up the judgment comprehensively. 'Everything that is on the earth' is clear and preserves the totalizing force.
- source_word: יִגְוָע
  chosen: will perish
  alternatives:
  - will die
  - will expire
  lexicon: HALOT
  rationale: The verb often denotes dying or breathing one's last. 'Will perish' fits the solemn judgment context and avoids awkward literalism while still communicating death.
