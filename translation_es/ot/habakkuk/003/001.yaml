translation:
  language: es
  text: Oración de Habacuc, el profeta, según Shigiónot[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «con/sobre shigiónot»; probablemente un término musical o litúrgico que indica un estilo, una melodía o un canto apasionado.'
    reason: lexical_alternative
lexical_decisions:
- source_word: תְּפִלָּה
  english_pob_choice: A prayer
  chosen_spanish: Oración
  alternatives_spanish:
  - Una oración
  - Un salmo-oración
  lexicon: HALOT
  rationale: El sustantivo puede designar una oración o canto de oración; en español, en un encabezado breve, «Oración» suena natural y fiel sin añadir información que el hebreo no da.
- source_word: לַחֲבַקּוּק
  english_pob_choice: of Habakkuk
  chosen_spanish: de Habacuc
  alternatives_spanish:
  - para Habacuc
  - perteneciente a Habacuc
  lexicon: HALOT
  rationale: En un superscrito, la preposición ל suele expresar asociación o autoría. «De Habacuc» reproduce bien esa relación en español de encabezado.
- source_word: הַנָּבִיא
  english_pob_choice: the prophet
  chosen_spanish: el profeta
  alternatives_spanish:
  - el profeta Habacuc
  lexicon: HALOT
  rationale: La aposición identifica a Habacuc por su oficio. Mantener «el profeta» conserva el estilo formal del encabezado y la función explicativa del hebreo.
- source_word: עַל
  english_pob_choice: according to
  chosen_spanish: según
  alternatives_spanish:
  - con
  - sobre
  - al ritmo de
  lexicon: HALOT
  rationale: En encabezados musicales o litúrgicos, עַל puede indicar estilo, tono o indicación de ejecución. «Según» evita precisar indebidamente y conserva esa función de referencia.
- source_word: שִׁגְיֹנוֹת
  english_pob_choice: Shigionoth
  chosen_spanish: Shigiónot
  alternatives_spanish:
  - Shigionot
  - Shigionoth
  lexicon: HALOT
  rationale: El término es raro y de sentido incierto; la transliteración preserva la opacidad del original. Se adapta la forma al español con acento gráfico para lectura natural, sin fingir certeza sobre su significado.
translation_notes:
  revision_awareness: 'El borrador sigue la lectura ya consolidada en el audit trail inglés: encabezado nominal breve, lְ de asociación/autoria como «de», עַל como marcador de indicación musical/litúrgica, y transliteración de שִׁגְיֹנוֹת por su incertidumbre léxica. No se introdujeron cambios respecto al consenso del paso más reciente.'
  spanish_consistency_notes:
  - Se usa «Habacuc» con la grafía habitual en español bíblico, manteniendo el nombre propio reconocible.
  - Se optó por «según» en lugar de «con/sobre» para reflejar la función de encabezado sin cerrar el sentido técnico de la partícula.
  - La nota conserva la alternativa interpretativa porque el hebreo y el audit trail inglés reconocen la ambigüedad musical/litúrgica del término.
