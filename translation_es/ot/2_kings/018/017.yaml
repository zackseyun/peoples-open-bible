translation:
  language: es
  text: Entonces el rey de Asiria envió al Tartán[a], al Rabsaris y al Rabsaqué desde Laquis al rey Ezequías en Jerusalén con un gran ejército[b]. Subieron y llegaron a Jerusalén; subieron y llegaron y se detuvieron junto al conducto[c] del estanque superior, que está en el camino del campo del lavador[d].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Los títulos «Tartán», «Rabsaris» y «Rabsaqué» probablemente designan cargos asirios y no nombres personales; posibles traducciones funcionales serían «comandante en jefe», «jefe de los eunucos/alto funcionario» y «copero mayor» u otro alto oficial.
    reason: cultural_note
  - marker: b
    text: 'O: «con una gran fuerza militar» o «con un ejército numeroso».'
    reason: lexical_alternative
  - marker: c
    text: 'O: «canal» o «acueducto».'
    reason: lexical_alternative
  - marker: d
    text: 'Tradicionalmente: «el campo del batanero»; aquí se mantiene «lavador» para reflejar el sentido ocupacional de כוֹבֵס.'
    reason: lexical_alternative
lexical_decisions:
- source_word: תַּרְתָּן
  english_pob_choice: the Tartan
  chosen_spanish: el Tartán
  alternatives_spanish:
  - el comandante en jefe
  lexicon: HALOT
  rationale: La forma es un título asirio probable, no un nombre propio seguro. Mantengo la transliteración en español para no sobreinterpretar el cargo y para preservar la misma cautela auditada por la POB en inglés.
- source_word: רַב סָרִיס
  english_pob_choice: the Rab-saris
  chosen_spanish: el Rabsaris
  alternatives_spanish:
  - el jefe de los eunucos
  - el alto funcionario
  lexicon: HALOT
  rationale: También parece un título de corte asirio. Conservé la transliteración porque סָרִיס puede referirse a un eunuco literal o a un funcionario de palacio, y el español no debería fijar sin necesidad una de esas lecturas.
- source_word: רַב שָׁקֵה
  english_pob_choice: the Rab-shakeh
  chosen_spanish: el Rabsaqué
  alternatives_spanish:
  - el copero mayor
  - el jefe de campo
  lexicon: HALOT
  rationale: Sigo la transliteración tradicional para este título asirio. Las equivalencias funcionales son posibles, pero demasiado específicas para el texto principal sin una identificación segura del cargo.
- source_word: בְּחֵיל כָּבֵד
  english_pob_choice: with a great army
  chosen_spanish: con un gran ejército
  alternatives_spanish:
  - con una gran fuerza militar
  - con un ejército numeroso
  lexicon: HALOT
  rationale: ‘חֵיל’ aquí denota fuerza militar, y ‘כָּבֵד’ intensifica la magnitud. ‘Gran ejército’ reproduce bien el sentido natural y sigue la revisión inglesa que prefirió una formulación más idiomática.
- source_word: וַיַּעֲלוּ ... וַיָּבֹאוּ יְרוּשָׁלִַם
  english_pob_choice: They went up and came to Jerusalem
  chosen_spanish: Subieron y llegaron a Jerusalén
  alternatives_spanish:
  - Subieron y vinieron a Jerusalén
  - Subieron y entraron en Jerusalén
  lexicon: HALOT
  rationale: Conservé la secuencia hebrea de ‘subir’ y ‘llegar’ porque Jerusalén es un destino de ascenso geográfico y narrativo. ‘Llegaron’ es más natural en español que repetir ‘vinieron’ sin necesidad.
- source_word: וַיַּעֲלוּ וַיָּבֹאוּ וַיַּעַמְדוּ
  english_pob_choice: they went up and came and stood
  chosen_spanish: subieron y llegaron y se detuvieron
  alternatives_spanish:
  - subieron y llegaron y se pusieron de pie
  - subieron y llegaron y permanecieron
  lexicon: HALOT
  rationale: ‘וַיַּעַמְדוּ’ puede expresarse como ‘se detuvieron’ en este contexto narrativo, porque describe que tomaron posición en un lugar concreto. Así evito una literalidad rígida que suena extraña en español.
- source_word: תְעָלַת
  english_pob_choice: conduit
  chosen_spanish: conducto
  alternatives_spanish:
  - canal
  - acueducto
  lexicon: HALOT
  rationale: ‘Conducto’ mantiene el sentido de canalización o pasaje de agua y suena natural en español. ‘Acueducto’ sería demasiado arquitectónico; ‘canal’ es posible, pero menos preciso para este pasaje topográfico.
- source_word: הַבְּרֵכָה הָעֶלְיוֹנָה
  english_pob_choice: the upper pool
  chosen_spanish: el estanque superior
  alternatives_spanish:
  - la alberca superior
  - el reservorio superior
  lexicon: HALOT
  rationale: ‘בְּרֵכָה’ suele ser ‘estanque’ o ‘piscina/pool’. Elegí ‘estanque’ para un español bíblico claro y digno, y ‘superior’ conserva la referencia topográfica.
- source_word: מְסִלַּת
  english_pob_choice: the highway
  chosen_spanish: el camino
  alternatives_spanish:
  - la calzada
  - la carretera
  lexicon: HALOT
  rationale: Aunque la POB inglesa usa ‘highway’, en español ‘camino’ comunica mejor la ruta de acceso sin sonar anacrónico. ‘Calzada’ es posible, pero más técnico; ‘carretera’ sería demasiado moderna.
- source_word: שְׂדֵה כוֹבֵס
  english_pob_choice: the washer’s field
  chosen_spanish: el campo del lavador
  alternatives_spanish:
  - el campo del batanero
  - el campo del lavador de ropa
  lexicon: HALOT
  rationale: ‘כּוֹבֵס’ es quien lava o blanquea telas; ‘lavador’ preserva el sentido ocupacional con claridad. Mantengo la misma decisión de la POB inglesa de no imponer ‘fuller’ como término técnico tradicional.
theological_decisions:
- issue: Títulos asirios transliterados en lugar de traducidos funcionalmente
  english_pob_reading: The titles 'Tartan,' 'Rab-saris,' and 'Rab-shakeh' are likely Assyrian official titles rather than personal names; possible functional renderings include 'commander-in-chief,' 'chief official/eunuch,' and 'chief cupbearer' or another high officer.
  chosen_spanish_reading: 'Se conservan como títulos transliterados: Tartán, Rabsaris y Rabsaqué.'
  alternative_spanish_readings:
  - comandante en jefe, jefe de los eunucos, copero mayor
  - otros equivalentes funcionales según el cargo
  rationale: La POB documenta que se trata probablemente de títulos oficiales y no nombres personales. Como el valor exacto de cada cargo es incierto, la transliteración en el texto principal evita cerrar indebidamente una identificación que el propio material auditado mantiene abierta.
  doctrine_reference: Principio de cautela exegética y transparencia textual; no aplica una doctrina particular.
translation_notes:
  revision_awareness: La redacción española sigue la revisión inglesa más reciente al preferir una expresión más natural para בְּחֵיל כָּבֵד (‘con un gran ejército’) en vez de una traducción demasiado literal. También conserva la repetición narrativa de ‘subieron y llegaron... subieron y llegaron y se detuvieron’ y mantiene los títulos asirios transliterados, como en la POB inglesa, para respetar la cautela exegética del expediente.
  spanish_consistency_notes:
  - Se usa ‘Yahvé’ solo cuando el texto lo requiera explícitamente; aquí no aparece.
  - ‘Jerusalén’ y los títulos se mantienen con mayúscula por norma española y por tratarse de nombres/títulos propios.
  - ‘lavador’ se usa como equivalente neutro de עֹבֵס/כוֹבֵס, evitando ‘batanero’ como término más técnico y menos transparente para el lector general.
