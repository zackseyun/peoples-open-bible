  source_alignment_summary: 'El borrador español refleja bien la estructura y el sentido general del hebreo: el doble símil inicial, el hallazgo favorable de Israel, la referencia a los padres/antepasados, la llegada a Baal-peor, la consagración irónica a la vergüenza y el resultado de hacerse abominables como el objeto amado. Sin embargo, omite dos elementos auditados en el POB inglés que conviene preservar en español: la nota alternativa sobre ''vuestros padres/antepasados'' y la aclaración de que ''la vergüenza'' probablemente alude polémicamente al ídolo asociado con Baal-peor, además de la referencia cruzada a Números 25:1–5.'
