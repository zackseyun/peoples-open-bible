    text: O «consagrándolas en una estela»; el participio griego también puede expresar la idea de dedicar o establecer públicamente una inscripción con carácter conmemorativo.
    reason: lexical_alternative
  - marker: b
    text: O «siendo preservados a salvo a través de tierra, mar y ríos». El participio griego subraya la preservación segura durante el viaje.
    reason: lexical_alternative
  revision_rationale: 'Se revisa el texto para seguir la decisión principal documentada para ἀνιερώσαντες: en contexto con στήλῃ, el sentido básico en el texto principal debe reflejar la inscripción pública, no la consagración como primera opción. También se mejora ἀνασωζόμενοι con una formulación más idiomática en español (''siendo llevados a salvo''), manteniendo la nota alternativa de preservación segura. ''Por mandato del rey'' suena más natural y autoritativo que ''por la orden del rey''.'
