translation:
  language: es
  text: Pero el hombre justo[a], si muere antes de tiempo, estará en reposo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, más literalmente: «si llega a morir»; el giro griego probablemente significa «si muere antes de tiempo» o «si muere antes de su tiempo».'
    reason: lexical_alternative
lexical_decisions:
- source_word: δίκαιος
  english_pob_choice: the righteous man
  chosen_spanish: el hombre justo
  alternatives_spanish:
  - el justo
  - el hombre recto
  lexicon: BDAG
  rationale: El griego funciona de manera sustantiva para una persona singular caracterizada por la justicia. En español, «el hombre justo» conserva ese valor representativo y la forma masculina singular del POB inglés, mientras que «el justo» sería más abreviado y menos explícito.
- source_word: ἐὰν
  english_pob_choice: if
  chosen_spanish: si
  alternatives_spanish:
  - aunque
  - aun si
  lexicon: BDAG
  rationale: Introduce una cláusula condicional. «Si» es la correspondencia más natural y fiel; la fuerza concesiva queda sugerida por el sentido global, como en el inglés auditado.
- source_word: φθάσῃ τελευτῆσαι
  english_pob_choice: dies early
  chosen_spanish: muere antes de tiempo
  alternatives_spanish:
  - llega a morir
  - se adelanta a la muerte
  - muere prematuramente
  lexicon: BDAG
  rationale: La combinación verbal es idiomática y no conviene traducirla de forma mecánica. «Muere antes de tiempo» comunica que la muerte ocurre antes de lo esperado, preservando la fuerza idiomática y la nota del POB sobre la posibilidad de muerte prematura.
- source_word: ἐν ἀναπαύσει
  english_pob_choice: at rest
  chosen_spanish: en descanso
  alternatives_spanish:
  - en reposo
  - en paz
  lexicon: BDAG
  rationale: Se mantiene el sustantivo «descanso» para reflejar la frase griega sin imponer una doctrina más específica. «En descanso» suena natural en español y conserva el tono sereno del pasaje.
- source_word: ἔσται
  english_pob_choice: will be
  chosen_spanish: estará
  alternatives_spanish:
  - será
  - va a estar
  lexicon: BDAG
  rationale: Futuro simple natural en español para el verbo de ser/estar en esta construcción. «Estará» reproduce el valor futurivo de manera clara y digna.
theological_decisions:
- issue: Cómo renderizar ἐν ἀναπαύσει sin fijar indebidamente la naturaleza del descanso
  english_pob_reading: at rest
  chosen_spanish_reading: en descanso
  alternative_spanish_readings:
  - en paz
  - en reposo
  rationale: El texto griego afirma un estado de descanso, pero no explicita aquí su mecánica o localización. «En descanso» preserva esa amplitud y evita resolver prematuramente la tensión teológica del pasaje.
  doctrine_reference: Preservar la tensión textual sin precisar más allá del griego.
- issue: Cómo entender la secuencia φθάσῃ τελευτῆσαι
  english_pob_reading: dies early
  chosen_spanish_reading: muere antes de tiempo
  alternative_spanish_readings:
  - si llega a morir
  - si muere joven
  - si muere prematuramente
  rationale: La construcción idiomática apunta a una muerte anterior a lo esperado, no simplemente al hecho de morir. «Antes de tiempo» comunica esa carga sin forzar una formulación técnica innecesaria.
  doctrine_reference: Mantener el sentido idiomático y la posible implicación de muerte prematura.
translation_notes:
  revision_awareness: 'La versión coincide con el audit trail inglés de alta concordancia: mantiene δίκαιος como sustantivo singular masculino, reproduce la condicional simple de ἐὰν, conserva el giro idiomático de φθάσῃ τελευτῆσαι como muerte anticipada, y deja ἐν ἀναπαύσει sin especificar más allá de un estado de descanso.'
  spanish_consistency_notes:
  - Se usó «Dios» no aplica en este versículo; no hay términos divinos directos.
  - Se prefirió «hombre justo» en lugar de «el justo» para conservar la singularidad representativa del griego y la decisión inglesa auditada.
  - «Descanso» evita tanto un lenguaje litúrgico más cargado como una traducción demasiado abstracta de ἀνάπαυσις.
  - El marcador de nota [a] se colocó en el sintagma nominal para señalar la alternativa más literal del giro griego.
