revisions:
- from: No te alegres[a], Israel, con exultación como los pueblos, porque te has prostituido[b] alejándote de tu Dios; has amado el pago de prostituta sobre todas las eras de trillar de grano.
  to: No te alegres, Israel, con exultación como los pueblos[a], porque te has prostituido lejos de tu Dios; has amado el pago de una prostituta[b] en toda era de grano.
  rationale: La revisión corrige una expansión interpretativa desaconsejada por el audit trail, mejora la naturalidad del español, reubica la nota de alternativa donde realmente corresponde y restaura la nota cultural sobre אֶתְנָן, manteniendo intacta la metáfora profética de prostitución y el sentido del hebreo.
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T22:42:15Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien el sentido básico del hebreo y del POB inglés: mantiene la prohibición, la comparación con los pueblos, la metáfora sexual para la apostasía y la referencia al pago de prostitución en las eras. Sin embargo, introduce una expansión no deseada en «alejándote de tu Dios», cuando la revisión inglesa auditada prefirió una formulación más directa equivalente a «lejos de tu Dios / apartándote de tu Dios» sin convertirlo en gerundio explicativo. También «sobre todas las eras de trillar de grano» suena poco natural en español y puede ajustarse sin perder precisión.'
  spanish_quality_summary: 'El español es mayormente comprensible, pero hay varios puntos mejorables: la nota [a] está anclada en «alegres» aunque la alternativa afecta a la frase siguiente; la nota [b] no corresponde al patrón del POB auditado, que explica «pago de prostituta» más que la metáfora general; «el pago de prostituta» necesita artículo posesivo/genitivo más natural en español («el pago de una prostituta»); y «eras de trillar de grano» resulta rígido. Una redacción más natural y fiel sería «No te alegres, Israel, con exultación como los pueblos[a], porque te has prostituido lejos de tu Dios; has amado el pago de una prostituta[b] en toda era de grano».'
  glossary_alignment: No hay conflicto con la terminología principal del proyecto. «Dios» está bien. La imagen de זָנִיתָ se conserva adecuadamente con «te has prostituido». No aparecen términos como Yahvé/Mesías que requieran control especial. La revisión propuesta también preserva la decisión POB de no suavizar la metáfora sexual.
  issues:
  - severity: medium
    issue: «alejándote de tu Dios» añade una forma verbal explicativa no reflejada directamente en la revisión inglesa auditada.
    rationale: El hebreo מֵעַל אֱלֹהֶיךָ expresa separación/apostasía respecto de Dios, pero el historial POB quitó explícitamente «turning away from» para evitar expansión interpretativa. En español conviene algo más directo como «lejos de tu Dios» o «apartándote de tu Dios»; la primera refleja mejor la restricción del audit trail.
  - severity: medium
    issue: La nota [a] está anclada en el lugar equivocado y su redacción no presenta bien la alternativa.
    rationale: La alternativa documentada afecta a «con exultación como los pueblos» / «exultar como las naciones», no a «No te alegres». El marcador debe ir en la frase relevante.
  - severity: medium
    issue: La nota [b] no preserva la razón léxica/cultural del POB sobre אֶתְנָן.
    rationale: El audit trail inglés usa la nota para explicar «a prostitute’s payment», no para glosar de nuevo toda la metáfora teológica de la prostitución. En español debe conservarse esa explicación cultural en el término correspondiente.
  - severity: low
    issue: «el pago de prostituta» suena incompleto o poco idiomático en español.
    rationale: En español general es más natural «el pago de una prostituta» o «la paga de una prostituta». Esto mantiene el valor concreto de אֶתְנָן.
  - severity: low
    issue: «sobre todas las eras de trillar de grano» es poco natural.
    rationale: «Sobre» no es la mejor preposición aquí, y «eras de trillar de grano» es pesado. «En toda era de grano» o «en todas las eras de grano» comunica mejor el sentido agrícola y la legibilidad.
  revised_spanish_text: No te alegres, Israel, con exultación como los pueblos[a], porque te has prostituido lejos de tu Dios; has amado el pago de una prostituta[b] en toda era de grano.
  revised_footnotes:
  - marker: a
    text: 'O también: «para exultar como las naciones». La frase hebrea es condensada y puede expresarse de más de una manera natural.'
    reason: lexical_alternative
  - marker: b
    text: «El pago de una prostituta» se refiere a la paga o salario asociado con la prostitución, aquí usado metafóricamente para la ganancia idolátrica de Israel.
    reason: cultural_note
  revision_rationale: La revisión corrige una expansión interpretativa desaconsejada por el audit trail, mejora la naturalidad del español, reubica la nota de alternativa donde realmente corresponde y restaura la nota cultural sobre אֶתְנָן, manteniendo intacta la metáfora profética de prostitución y el sentido del hebreo.
