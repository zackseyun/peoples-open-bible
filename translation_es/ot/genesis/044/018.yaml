translation:
  language: es
  text: 'Entonces Judá se acercó a él y dijo[a]: «Por favor, mi señor, permita que su esclavo hable una palabra para que mi señor oiga[b], y no se encienda[c] su enojo contra su esclavo, porque usted es como Faraón».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Perdóneme, mi señor». El hebreo inicial es una súplica deferente.'
    reason: lexical_alternative
  - marker: b
    text: Literalmente, «en los oídos de mi señor», un modismo hebreo que significa «para que mi señor oiga».
    reason: cultural_note
  - marker: c
    text: 'O: «no se enoje con su esclavo». Literalmente, «no se encienda su enojo contra su esclavo».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּגַּשׁ
  english_pob_choice: came near
  chosen_spanish: se acercó
  alternatives_spanish:
  - se aproximó
  - se acercó hasta él
  lexicon: HALOT
  rationale: El hebreo expresa un acercamiento físico y solemne. «Se acercó» mantiene la concreción y suena natural en español sin debilitar la escena.
- source_word: אֵלָיו
  english_pob_choice: to him
  chosen_spanish: a él
  alternatives_spanish:
  - hasta él
  - hacia él
  lexicon: HALOT
  rationale: Es la referencia directa a José; «a él» reproduce de manera simple el complemento direccional.
- source_word: בִּי
  english_pob_choice: Please
  chosen_spanish: Por favor
  alternatives_spanish:
  - Pardoneme
  - Le ruego
  lexicon: HALOT
  rationale: Es una súplica deferente. «Por favor» conserva la cortesía en español moderno sin forzar un giro arcaico.
- source_word: אֲדֹנִי
  english_pob_choice: my lord
  chosen_spanish: mi señor
  alternatives_spanish:
  - señor mío
  - mi amo
  lexicon: HALOT
  rationale: En este contexto cortesano, el tratamiento honorífico es mejor en español como «mi señor». «Mi amo» sonaría más servil y más fuerte de lo que pide el pasaje.
- source_word: יְדַבֶּר נָא עַבְדְּךָ
  english_pob_choice: let your servant speak
  chosen_spanish: permita que su esclavo hable
  alternatives_spanish:
  - deje hablar a su siervo
  - permita que su servidor hable
  lexicon: HALOT
  rationale: POB suele conservar la fuerza léxica de עבד como «esclavo» cuando el contexto lo exige. Aquí Judá adopta lenguaje de sumisión; «permita que su esclavo hable» mantiene esa carga y el tono de ruego.
- source_word: דָבָר
  english_pob_choice: a word
  chosen_spanish: una palabra
  alternatives_spanish:
  - un asunto
  - algo
  lexicon: HALOT
  rationale: El singular concreto funciona bien en español. «Una palabra» refleja el valor directo y formal del hebreo sin ampliar el sentido.
- source_word: בְּאָזְנֵי אֲדֹנִי
  english_pob_choice: in my lord’s hearing
  chosen_spanish: a oídos de mi señor
  alternatives_spanish:
  - en el oído de mi señor
  - para que mi señor oiga
  lexicon: HALOT
  rationale: La imagen hebrea literal es «en los oídos de». Aquí se conserva la metáfora de recepción auditiva con una construcción natural en español.
- source_word: וְאַל יִחַר אַפְּךָ
  english_pob_choice: do not let your anger burn
  chosen_spanish: no se encienda su enojo
  alternatives_spanish:
  - no se irrite
  - no arda su ira
  lexicon: HALOT
  rationale: El hebreo usa la imagen del enojo que se enciende o arde. «No se encienda su enojo» preserva la metáfora sin sonar torpe en español.
- source_word: בְּעַבְדֶּךָ
  english_pob_choice: against your servant
  chosen_spanish: contra su esclavo
  alternatives_spanish:
  - con su esclavo
  - sobre su esclavo
  lexicon: HALOT
  rationale: 'Con la expresión de ira, el sentido es direccional: la ira recaería sobre él. «Contra su esclavo» lo expresa con claridad.'
- source_word: כִּי כָמוֹךָ כְּפַרְעֹה
  english_pob_choice: for you are like Pharaoh
  chosen_spanish: porque usted es como Faraón
  alternatives_spanish:
  - pues es como Faraón
  - porque es igual a Faraón
  lexicon: HALOT
  rationale: La comparación refleja la autoridad de José desde la perspectiva de Judá. «Como Faraón» es la forma más directa y fiel; «igual a Faraón» sería más fuerte de lo que el hebreo exige.
theological_decisions:
- issue: Título honorífico para José en contexto egipcio
  english_pob_reading: my lord
  chosen_spanish_reading: mi señor
  alternative_spanish_readings:
  - señor mío
  - mi amo
  rationale: No hay una cuestión doctrinal compleja, pero sí una elección de registro y jerarquía social. «Mi señor» preserva el honorífico sin convertirlo en un término de propiedad más duro como «mi amo».
  doctrine_reference: No aplica; decisión sociolectal y de cortesía textual.
translation_notes:
  revision_awareness: Se mantuvo la lectura de alta concordancia con el texto hebreo y el audit trail en inglés. No se introdujeron revisiones textuales ni cambios de sentido; solo se ajustó el registro al español natural, preservando la metáfora de «oídos» y de la ira que se enciende.
  spanish_consistency_notes:
  - Se conservó Yahvé no aplicable en este versículo.
  - Se mantuvo «esclavo» para עבד, en coherencia con el criterio POB de fuerza léxica.
  - Se tradujo el honorífico אֲדֹנִי como «mi señor» para unificar el tratamiento cortesano.
  - La comparación final con Faraón se dejó sin intensificación adicional.
