    rationale: El borrador español muestra «Yahweh» en el versículo, pero las decisiones léxicas y la política del proyecto exigen «Yahvé». Esto afecta la terminología central del proyecto.
  - severity: medium
    issue: «mi oración es para ti» es menos idiomático que una formulación más natural
    rationale: Aunque comprensible, «para ti» suena menos natural en español para el destinatario de una oración. Dado que לְךָ marca destinatario/dirección, «a ti» expresa mejor el sentido sin perder fidelidad.
  - severity: low
    issue: El vocativo puede pulirse para lectura española
    rationale: «oh Dios» es aceptable, pero «oh, Dios» o «Dios» según estilo sería más natural. No es error grave; se mantiene una forma sencilla y legible.
