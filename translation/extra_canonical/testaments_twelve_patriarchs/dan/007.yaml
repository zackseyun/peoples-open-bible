translation:
  text: |-
    And when he had said these things, he kissed them affectionately and fell asleep in a good sleep.
    2 And his sons buried him. And after this they carried up his bones to the place where Abraham and Isaac and Jacob were.
    3 Nevertheless, Dan prophesied to them that they would forget their God and would be estranged from the land of their inheritance and from the race of Israel and from the family of their offspring.
