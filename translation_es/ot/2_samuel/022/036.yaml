translation:
  language: es
  text: Tú me diste el escudo de tu salvación, y tu bondad[a] me engrandeció.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'tu humildad', 'tu condescendencia' o 'tu ayuda'; el hebreo es difícil y puede referirse a que Dios se inclina con gracia para exaltar al orante.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַתִּתֶּן
  english_pob_choice: You gave
  chosen_spanish: Tú me diste
  alternatives_spanish:
  - Tú me has dado
  - Tú me otorgaste
  lexicon: HALOT
  rationale: 'El wayyiqtol expresa una acción pasada simple; en español, el pretérito perfecto simple comunica de manera natural el acto de dar dirigido a Dios. Se conserva el objeto indirecto en forma natural: ''me diste''.'
- source_word: לִי
  english_pob_choice: me
  chosen_spanish: me
  alternatives_spanish:
  - a mí
  lexicon: HALOT
  rationale: El dativo hebreo se expresa con el clítico español 'me', que es más natural que 'a mí' en esta construcción.
- source_word: מָגֵן
  english_pob_choice: shield
  chosen_spanish: escudo
  alternatives_spanish:
  - broquel
  - protección
  lexicon: HALOT
  rationale: Se preserva la imagen militar concreta. 'Escudo' es el equivalente más claro y natural en español.
- source_word: יִשְׁעֶךָ
  english_pob_choice: your salvation
  chosen_spanish: tu salvación
  alternatives_spanish:
  - tu liberación
  - tu victoria
  lexicon: HALOT
  rationale: ישׁע expresa salvación/liberación; 'tu salvación' mantiene el sentido teológico y la construcción posesiva sin reducirla a una mera victoria militar.
- source_word: וַעֲנֹתְךָ
  english_pob_choice: your gentleness
  chosen_spanish: tu gentileza
  alternatives_spanish:
  - tu humildad
  - tu condescendencia
  - tu mansedumbre
  lexicon: HALOT
  rationale: El hebreo es difícil y admite varias lecturas. 'Gentileza' comunica el matiz de Dios que se inclina con benevolencia sin imponer una solución demasiado interpretativa. Se preserva la tensión textual con alternativas en nota.
- source_word: תַּרְבֵּנִי
  english_pob_choice: made me great
  chosen_spanish: me engrandeció
  alternatives_spanish:
  - me hizo grande
  - me aumentó
  - me exaltó
  lexicon: HALOT
  rationale: El hifil de רבה puede significar hacer grande o aumentar. 'Me engrandeció' reproduce bien el sentido resultativo de exaltación/realce en contexto de rescate divino.
theological_decisions:
- issue: Sentido de וַעֲנֹתְךָ aplicado a Dios
  english_pob_reading: your gentleness
  chosen_spanish_reading: tu gentileza
  alternative_spanish_readings:
  - tu humildad
  - tu condescendencia
  - tu ayuda
  rationale: La expresión es debatida y no debe suavizarse como si fuera inequívoca. 'Gentileza' conserva la idea de Dios que se inclina con gracia para elevar al hablante, sin negar la dificultad lexical. Se mantiene abierta la posibilidad de otras lecturas en nota.
  doctrine_reference: Preservar la tensión léxica y teológica sin resolverla artificialmente.
translation_notes:
  revision_awareness: El audit trail inglés muestra una revisión reciente de 'humility' a 'gentleness' para mejorar la precisión léxica y la naturalidad. La versión española sigue esa línea, pero mantiene abierta la dificultad del hebreo וַעֲנֹתְךָ mediante una nota con alternativas, evitando fijar una sola interpretación como definitiva.
  spanish_consistency_notes:
  - Se usa 'Dios' implícito por el contexto del poema y la segunda persona singular.
  - Se prefiere 'escudo' para preservar la metáfora concreta del hebreo.
  - Se evita 'SEÑOR' porque el verso no contiene el Tetragrámaton en la forma base; el contexto dirige la referencia a Yahvé en la sección poética.
  - '''Me engrandeció'' conserva el matiz de elevación/exaltación sin perder la forma causativa del verbo hebreo.'
