translation:
  language: es
  text: De él el tirano tuvo compasión, aunque había sido cruelmente maltratado por sus hermanos, al verlo ya con las cadenas puestas[a],
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «con las cadenas alrededor de él» o «atado con cadenas». El griego describe literalmente las cadenas colocadas alrededor de su cuerpo.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ὁ τύραννος
  english_pob_choice: the tyrant
  chosen_spanish: el tirano
  alternatives_spanish:
  - el rey
  - el gobernante
  lexicon: LSJ
  rationale: τύραννος es un título evaluativo y cargado moralmente en el contexto; ‘tirano’ conserva esa fuerza en español mejor que un término neutral como ‘rey’ o ‘gobernante’.
- source_word: κατοικτειρήσας
  english_pob_choice: pitied
  chosen_spanish: tuvo compasión
  alternatives_spanish:
  - se compadeció
  - le tuvo piedad
  lexicon: LSJ
  rationale: El participio expresa sentir piedad o compasión. En español, ‘tuvo compasión’ comunica bien el acto interno sin sonar demasiado coloquial, y mantiene el valor afectivo del griego.
- source_word: καίπερ
  english_pob_choice: even though
  chosen_spanish: aunque
  alternatives_spanish:
  - a pesar de que
  - si bien
  lexicon: LSJ
  rationale: Introduce una concesión fuerte; ‘aunque’ es la equivalencia natural y clara en español.
- source_word: δεινῶς
  english_pob_choice: cruelly
  chosen_spanish: cruelmente
  alternatives_spanish:
  - gravemente
  - severamente
  lexicon: LSJ
  rationale: El adverbio intensifica el maltrato. ‘Cruelmente’ preserva el matiz moral y encaja con el contexto de abuso.
- source_word: ὑπὸ τῶν ἀδελφῶν αὐτοῦ
  english_pob_choice: by his brothers
  chosen_spanish: por sus hermanos
  alternatives_spanish:
  - por sus hermanos varones
  - por sus hermanos de sangre
  lexicon: LSJ
  rationale: El griego habla literalmente de ‘sus hermanos’; en este relato se trata de hermanos varones, y el español lo expresa de forma natural sin neutralizar la referencia.
- source_word: κακισθείς
  english_pob_choice: had been cruelly mistreated
  chosen_spanish: había sido cruelmente maltratado
  alternatives_spanish:
  - había sido cruelmente abusado
  - había sido severamente tratado
  lexicon: LSJ
  rationale: El pasivo indica haber recibido trato duro y abusivo. ‘Maltratado’ es un equivalente amplio y formal que no especifica más de lo que el verbo griego garantiza.
- source_word: ὁρῶν
  english_pob_choice: seeing
  chosen_spanish: al verlo
  alternatives_spanish:
  - viendo
  - cuando lo vio
  lexicon: LSJ
  rationale: La construcción participial funciona aquí con sentido circunstancial; ‘al verlo’ fluye con naturalidad en español y conserva la relación inmediata con la compasión del tirano.
- source_word: ἤδη
  english_pob_choice: already
  chosen_spanish: ya
  alternatives_spanish:
  - ya para entonces
  - todavía
  lexicon: LSJ
  rationale: Marca un estado ya establecido; ‘ya’ es la forma más directa y natural en español.
- source_word: τὰ δεσμὰ περικείμενον
  english_pob_choice: wearing the chains
  chosen_spanish: con las cadenas puestas
  alternatives_spanish:
  - con las cadenas alrededor
  - atado con cadenas
  lexicon: LSJ
  rationale: La imagen literal es la de cadenas alrededor del cuerpo. ‘Con las cadenas puestas’ conserva la concreción visual del griego sin sonar forzado; la alternativa ‘atado con cadenas’ podría sugerir más de lo que el texto afirma.
theological_decisions:
- issue: Título moralmente cargado para el gobernante
  english_pob_reading: the tyrant
  chosen_spanish_reading: el tirano
  alternative_spanish_readings:
  - el rey
  - el gobernante
  rationale: El texto no usa un título neutral, sino uno que juzga al opresor. Mantener ‘tirano’ preserva la valoración literaria y ética del pasaje.
  doctrine_reference: DOCTRINE.md §Translation philosophy 1, 6
- issue: Relación de parentesco ἀδελφῶν
  english_pob_reading: brothers
  chosen_spanish_reading: hermanos
  alternative_spanish_readings:
  - hermanxs
  - hermanos y hermanas
  - parientes
  rationale: La narración se refiere a hermanos varones; el español debe conservar esa precisión. No hay base textual para neutralizarlo.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4
- issue: Estado de las cadenas descrito por περικείμενον
  english_pob_reading: wearing the chains
  chosen_spanish_reading: con las cadenas puestas
  alternative_spanish_readings:
  - atado con cadenas
  - con las cadenas alrededor de él
  rationale: La imagen del griego describe las cadenas rodeando el cuerpo. ‘Con las cadenas puestas’ mantiene la tensión entre literalidad y naturalidad sin borrar la visualidad del original.
  doctrine_reference: DOCTRINE.md §Translation philosophy 1
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión del texto inglés que prefirió ‘mistreated’ frente a ‘abused’; por eso se eligió ‘maltratado’, que suena formal en español y evita sobreespecificar la forma del daño. También se mantuvo la valoración de τύραννος como ‘tirano’ y la imagen concreta de las cadenas, conforme al audit trail inglés.
  spanish_consistency_notes:
  - Se mantuvo un registro formal y publicable, sin calcos innecesarios del inglés.
  - ‘Tirano’ preserva la carga evaluativa del griego y del POB inglés.
  - ‘Maltratado’ comunica la amplitud de κακισθείς sin añadir detalles no garantizados por el griego.
  - La construcción ‘con las cadenas puestas’ busca transparencia de imagen; la nota ofrece la alternativa literal del griego.
  - No se usó puntuación doctrinal o eclesiástica ajena al texto; se siguió el flujo sintáctico del participio griego con español natural.
