translation:
  language: es
  text: 'Entonces Absalón dijo a Ahitofel[a]: «Den su consejo. ¿Qué debemos hacer?»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Den consejo entre ustedes: ¿qué debemos hacer?». El plural hebreo puede reflejar que se habla a Ahitofel junto con otros presentes, aunque Ahitofel es el destinatario nombrado.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמֶר
  english_pob_choice: Then ... said
  chosen_spanish: Entonces ... dijo
  alternatives_spanish:
  - Y ... dijo
  lexicon: HALOT
  rationale: La waw consecutiva avanza la narración; «entonces» comunica bien la secuencia en español actual sin perder el valor narrativo.
- source_word: אַבְשָׁלוֹם
  english_pob_choice: Absalom
  chosen_spanish: Absalón
  alternatives_spanish:
  - Absalom
  lexicon: Transliteración estándar en español bíblico
  rationale: En español es más natural y reconocible la forma «Absalón», manteniendo el nombre propio sin alterar el referente.
- source_word: אֶל
  english_pob_choice: to
  chosen_spanish: a
  alternatives_spanish:
  - para
  lexicon: HALOT
  rationale: La preposición introduce al destinatario del habla; «a» es la forma natural en español.
- source_word: אֲחִיתֹפֶל
  english_pob_choice: Ahithophel
  chosen_spanish: Ahitofel
  alternatives_spanish:
  - Ahitófel
  lexicon: Transliteración estándar en español bíblico
  rationale: Se adapta al uso habitual en español, conservando la identificación del personaje.
- source_word: הָבוּ
  english_pob_choice: Give
  chosen_spanish: Den ...
  alternatives_spanish:
  - Dad ...
  - Ofrezcan ...
  lexicon: HALOT
  rationale: El imperativo plural de הָבוּ pide una acción de proveer/emitir consejo; «den» conserva la fuerza directiva con un tono natural en español. El sujeto implícito se expresa por el contexto plural del verbo y el marcador siguiente.
- source_word: לָכֶם
  english_pob_choice: your / among yourselves
  chosen_spanish: ustedes
  alternatives_spanish:
  - entre ustedes
  - para ustedes mismos
  lexicon: HALOT
  rationale: El hebreo puede incluir a Ahitofel con otros presentes. Para no decidir prematuramente por un posesivo singular/plural de segunda persona, el español se explicita como destinatario plural en el verbo y en la nota textual.
- source_word: עֵצָה
  english_pob_choice: counsel
  chosen_spanish: consejo
  alternatives_spanish:
  - counsel
  - consulta
  lexicon: HALOT
  rationale: «Consejo» es la opción natural y fiel en español; mantiene el campo semántico de deliberación sin volverlo demasiado jurídico o eclesiástico.
- source_word: מַה
  english_pob_choice: What
  chosen_spanish: ¿Qué
  alternatives_spanish:
  - ¿Cuál
  lexicon: HALOT
  rationale: Interrogativo directo para introducir la pregunta deliberativa.
- source_word: נַּעֲשֶׂה
  english_pob_choice: should we do
  chosen_spanish: haremos
  alternatives_spanish:
  - debemos hacer
  - vamos a hacer
  lexicon: HALOT
  rationale: En español, la pregunta deliberativa suena más natural en primera persona plural futura/voluntativa («¿qué haremos?»), que conserva la idea de consulta sobre la acción a emprender.
translation_notes:
  revision_awareness: El inglés POB pasó de «advice» a «counsel» para reflejar mejor עֵצָה y mantener un registro más formal. En español se optó por «consejo», que conserva ese registro sin sonar forzado. También se atendió la nota inglesa sobre la posible lectura plural de הָבוּ/לָכֶם, dejando la alternativa en nota para no borrar la ambigüedad del hebreo.
  spanish_consistency_notes:
  - 'Se mantiene la traducción de nombres propios bíblicos con formas españolas habituales: Absalón, Ahitofel.'
  - Se evita el calco «dar tu consejo» porque el plural hebreo y la nota auditada favorecen una formulación abierta al grupo presente.
  - «Entonces» preserva la progresión narrativa del waw consecutivo sin recurrir a una conjunción meramente literal.
