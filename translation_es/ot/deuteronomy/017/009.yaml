  to: Y acudirás a los sacerdotes levitas y al juez que esté en funciones en aquellos días[a], e inquirirás, y ellos te declararán la decisión en el caso.
  rationale: 'Se hicieron dos ajustes menores: «acudirás» reemplaza «llegarás» para expresar mejor la comparecencia ante la autoridad judicial, y «la decisión en el caso» alinea con mayor naturalidad el español con el sentido forense de דְּבַר הַמִּשְׁפָּט y con la auditoría inglesa revisada.'
