translation:
  text: They said to him[a], "Say to us who you are, so that we may believe in you."
    He said to them, "You test the face of the sky and the earth, and the one who
    is before you you do not recognize[e][d][c][b]; and this kairos you do not know
    how to test."
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: “Face” can mean “appearance”; the Coptic phrase is literally “the face of
      the sky and the earth.”
    reason: cultural_note
  - marker: b
    text: Kairos is a Greek loan meaning an appointed/critical time or season; left
      untranslated to retain its nuance.
    reason: cultural_note
  - marker: c
    text: The verb for “believe” is a Greek loan (from pisteuein) and can also mean
      “trust.”
    reason: lexical_alternative
  - marker: d
    text: 'The clause can also be read “what is before you,” but the following pronoun
      (“him”) favors a personal reference: “the one who is before you.”'
    reason: textual_variant
  - marker: e
    text: Printed has ϫⲟⲟⲥ ⲉⲣⲟⲛ; normalized reads ϫⲱⲛⲧⲟⲥ ⲉⲁⲛⲟⲛ. Both mean “tell us.”
    reason: textual_variant
lexical_decisions:
- source_word: ϫⲟⲟⲥ / ϫⲱⲛⲧⲟⲥ ⲉⲁⲛⲟⲛ (printed/normalized)
  chosen: say/tell (to us)
  alternatives:
  - declare to us
  lexicon: Crum, s.v. ϫⲟⲟⲥ; Layton (Grammar) on object complements
  rationale: 'Formulaic request in Thomas: "say/tell us". Printed has ϫⲟⲟⲥ ⲉⲣⲟⲛ; normalization
    reads ϫⲱⲛⲧⲟⲥ ⲉⲁⲛⲟⲛ. Both convey imperatival "tell us"; translated with simple
    English imperative.'
- source_word: ⲛⲧⲕ ⲛⲓⲙ
  chosen: who are you
  alternatives:
  - what are you
  lexicon: Layton (Grammar) § on interrogatives; Crum, s.v. ⲛⲓⲙ
  rationale: Idiomatic Coptic question phrase for personal identity; "who are you"
    best matches the dialogic context.
- source_word: ⲣⲡⲓⲥⲧⲉⲩⲉ
  chosen: believe
  alternatives:
  - trust
  lexicon: Lambdin (Grammar) on Greek loan-verbs; Crum, s.v. πιστεύω (loan)
  rationale: Greek loan from πιστεύειν; primary sense "believe" suits Thomasine usage;
    "trust" noted as nuance.
- source_word: ⲣⲡⲓⲣⲁⲍⲉ
  chosen: test
  alternatives:
  - try
  - examine
  lexicon: Crum, s.v. πειράζω (loan); Lambdin on Greek infinitives
  rationale: Loan from Gk πειράζειν; "test" preserves the sharper sense versus softer
    "examine" and echoes the repeated verb in the saying.
- source_word: ⲡϩⲟ
  chosen: face
  alternatives:
  - appearance
  lexicon: Crum, s.v. ϩⲟ
  rationale: Literal "face" keeps Thomas’ striking diction; footnote notes the idiomatic
    sense "appearance".
- source_word: ⲡⲡⲉ (ⲧⲡⲉ)
  chosen: sky
  alternatives:
  - heaven
  lexicon: Crum, s.v. ⲡⲉ/ⲧⲡⲉ
  rationale: In this observational context (paired with earth), "sky" avoids importing
    theological connotations of "heaven".
- source_word: ⲡⲕⲁϩ
  chosen: earth
  alternatives:
  - ground
  - land
  lexicon: Crum, s.v. ⲕⲁϩ
  rationale: Common term for the earth/ground; here paired with sky as the visible
    world.
- source_word: ⲡⲉⲧⲛⲙⲧⲟ ⲉⲃⲟⲗ
  chosen: the one who is before you
  alternatives:
  - what is before you
  - the one in your presence
  lexicon: Crum, s.v. ⲙⲧⲟ; Layton (Grammar) on relative ⲡⲉⲧ-
  rationale: Relative construction with ⲙⲧⲟ ⲉⲃⲟⲗ (‘in front, before’). Singular personal
    reference likely given the ensuing object pronoun (ⲥⲟⲩⲱⲛϥ).
- source_word: ⲥⲟⲟⲩⲛ
  chosen: know/recognize
  alternatives:
  - understand
  lexicon: Crum, s.v. ⲥⲟⲟⲩⲛ
  rationale: Here conveys failure to recognize the one present; "recognize" makes
    the relational nuance explicit.
- source_word: ⲕⲁⲓⲣⲟⲥ
  chosen: kairos
  alternatives:
  - season
  - appointed time
  - opportune moment
  lexicon: Lambdin on Greek loans; Crum, s.v. καιρός
  rationale: Leaving the Greek loanword preserves its charged nuance in Thomas; alternatives
    noted in footnote.
- source_word: ⲥⲟⲟⲩⲛ ⲛⲧⲉ ⲣⲡⲓⲣⲁⲍⲉ
  chosen: know how to test
  alternatives:
  - be able to examine
  lexicon: Layton (Grammar) on ⲥⲟⲟⲩⲛ ⲛⲧⲉ + infinitive
  rationale: Construction expresses competence/know-how; hence "know how to test"
    rather than a simple "know to test".
textual_note: 'NH II, 48 has no lacunae in this saying. Printed reads ϫⲟⲟⲥ ⲉⲣⲟⲛ (“say
  to us”), while Dilley’s normalization gives ϫⲱⲛⲧⲟⲥ ⲉⲁⲛⲟⲛ; both function as an imperative
  “tell us,” with different object-pronoun realization. Person/number morphology varies
  between ⲧⲉⲧⲛ- and ⲛⲧⲱⲧⲛ- (2pl), a common Sahidic/Lycopolitan alternation without
  semantic effect. Greek loans are present: ⲣⲡⲓⲣⲁⲍⲉ (from πειράζειν) and ⲕⲁⲓⲣⲟⲥ; spelling
  reflects the manuscript. The phrase ⲡϩⲟ ⲛⲧⲡⲉ ⲙⲛ ⲡⲕⲁϩ is literally “the face of the
  sky and the earth,” an idiom for their appearance; this is retained. The relative
  ⲡⲉⲧⲛⲙⲧⲟ ⲉⲃⲟⲗ is rendered “the one who is before you,” taking the singular personal
  sense, supported by the following object pronoun (ⲥⲟⲩⲱⲛϥ). No POxy Greek fragments
  overlap Saying 91.'
