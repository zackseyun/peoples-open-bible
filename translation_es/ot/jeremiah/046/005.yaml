revisions:
- from: ¿Por qué he visto esto? Están aterrados[a], volviéndose atrás; sus guerreros son derribados, y han huido apresuradamente y no se han vuelto. Terror por todas partes, declara Yahvé.
  to: ¿Por qué he visto esto? Están aterrados, retrocediendo; sus guerreros son derribados[a], y han huido apresuradamente y no volvieron atrás. Hay terror por todas partes, declara Yahvé.
  rationale: Se reubica la nota para que corresponda a la cláusula de 'sus guerreros', que es donde encaja la alternativa documentada en el inglés. También se aclara la retirada final con 'no volvieron atrás' y se suaviza el español con 'retrocediendo' y 'Hay terror por todas partes', manteniendo fielmente el sentido del hebreo y la línea del POB.
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T22:21:45Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura general del hebreo: pregunta profética, pánico, retirada, derrota de los guerreros, huida total y fórmula final con Yahvé. Sin embargo, hay dos desajustes importantes: la nota [a] está anclada a ''aterrados'' pero su contenido (''sus hombres poderosos son derribados'') en realidad corresponde a la cláusula de los guerreros derrotados, no a חַתִּים; además, ''y no se han vuelto'' es menos claro y menos fiel al sentido militar de ''no volvieron atrás / no se volvieron'' que una formulación más explícita.'
  spanish_quality_summary: El español es generalmente natural y digno. '¿Por qué he visto esto?' funciona, aunque '¿Por qué veo esto?' o '¿Por qué he visto esto?' ambas son defendibles. 'Volviéndose atrás' suena algo forzado; 'retrocediendo' o 'dando marcha atrás' sería más fluido, pero no es imprescindible. 'Terror por todas partes' es comprensible, aunque en español bíblico claro resulta más idiomático 'Hay terror por todas partes' o 'Terror por todos lados'. El problema principal de calidad es la nota mal ubicada, que confunde al lector.
  glossary_alignment: Se mantiene correctamente 'Yahvé' para יְהוָה. No hay conflicto con terminología doctrinal principal. 'Guerreros' para גִּבּוֹרִים está bien. 'Derribados' es aceptable para יֻכַּתּוּ, aunque 'abatidos' o 'aplastados' podrían reflejar mejor la derrota decisiva. La fórmula profética 'declara Yahvé' concuerda con el proyecto.
  issues:
  - severity: high
    issue: La nota [a] está anclada a la palabra equivocada.
    rationale: El contenido de la nota ('sus hombres poderosos son derribados') corresponde a la cláusula וְגִבּוֹרֵיהֶם יֻכַּתּוּ, no a חַתִּים ('aterrados'). Tal como está, induce una alternativa léxica falsa para 'aterrados'.
  - severity: medium
    issue: '''y no se han vuelto'' es ambiguo en español.'
    rationale: Puede entenderse como un simple regreso, pero en contexto militar el hebreo expresa que no se volvieron atrás ni se volvieron para hacer frente. 'No volvieron atrás' es más claro y más idiomático.
  - severity: low
    issue: La cláusula final queda algo elíptica en español.
    rationale: Aunque 'Terror por todas partes' reproduce bien la fórmula, añadir 'Hay' mejora la naturalidad sin perder concisión ni fuerza profética.
  revised_spanish_text: ¿Por qué he visto esto? Están aterrados, retrocediendo; sus guerreros son derribados[a], y han huido apresuradamente y no volvieron atrás. Hay terror por todas partes, declara Yahvé.
  revised_footnotes:
  - marker: a
    text: O ‘sus hombres poderosos son abatidos’.
    reason: lexical_alternative
  revision_rationale: Se reubica la nota para que corresponda a la cláusula de 'sus guerreros', que es donde encaja la alternativa documentada en el inglés. También se aclara la retirada final con 'no volvieron atrás' y se suaviza el español con 'retrocediendo' y 'Hay terror por todas partes', manteniendo fielmente el sentido del hebreo y la línea del POB.
