revisions:
- from: 'Así que el pueblo contendió con Moisés y dijo[a]: «Denos agua para que bebamos». Y Moisés les dijo[b]: «¿Por qué contienden conmigo? ¿Por qué ponen a prueba a Yahvé?»'
  to: 'Así que el pueblo contendió con Moisés y dijo: «Dennos agua para que bebamos». Y Moisés les dijo: «¿Por qué contienden conmigo? ¿Por qué ponen a prueba[a] a Yahvé?»'
  rationale: Se corrige la nota para que refleje una alternativa léxica real y se reubica en la frase correspondiente. También se mejora la naturalidad ortográfica de «Dennos agua». El resto del versículo puede mantenerse, pues preserva fielmente el sentido del hebreo y la terminología POB.
