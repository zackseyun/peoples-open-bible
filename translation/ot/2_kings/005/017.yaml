id: 2KI.5.17
reference: 2 Kings 5:17
source:
  edition: WLC
  text: וַ/יֹּאמֶר֮ נַעֲמָן֒ וָ/לֹ֕א יֻתַּן נָ֣א לְ/עַבְדְּ/ךָ֔ מַשָּׂ֥א צֶֽמֶד פְּרָדִ֖ים אֲדָמָ֑ה כִּ֡י לֽוֹא יַעֲשֶׂה֩ ע֨וֹד עַבְדְּ/ךָ֜ עֹלָ֤ה וָ/זֶ֨בַח֙ לֵ/אלֹהִ֣ים אֲחֵרִ֔ים כִּ֖י אִם לַ/יהוָֽה־־־־׃
translation:
  text: Then Naaman said[a], “If not, please let your servant be given a load of soil, a pair of mules' burden; for your servant will no longer offer burnt offering or sacrifice to other gods[c][b], but only to Yahweh.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “the load of a pair of mules” or “two mules’ load.” The Hebrew phrase refers to as much soil as a pair of mules could carry.
    reason: lexical_alternative
  - marker: b
    text: Hebrew “the LORD” represents the divine name YHWH; alternatively transliterated “Yahweh.”
    reason: alternative_reading
  - marker: c
    text: Naaman’s request for Israelite soil may reflect the ancient association of a deity with a land, or a desire to worship the LORD on Israelite earth; the text does not state the reason explicitly.
    reason: cultural_note
lexical_decisions:
- source_word: וָלֹא
  chosen: If not
  alternatives:
  - And not
  - Then not
  lexicon: HALOT
  rationale: In context Naaman is responding to Elisha’s refusal of gifts in the previous verse. The sequence וָלֹא here functions idiomatically as a polite conditional/elliptical response, best represented in English as 'If not,' rather than a bare adversative 'and not.' This preserves discourse sense rather than wooden form.
- source_word: יֻתַּן נָא לְעַבְדְּךָ
  chosen: please let your servant be given
  alternatives:
  - please let there be given to your servant
  - please give to your servant
  lexicon: HALOT
  rationale: The verb is passive/jussive-like in form ('let ... be given'), with נָא marking politeness. Rendering with 'let your servant be given' preserves both the deferential tone and the passive nuance better than a simple active imperative.
- source_word: מַשָּׂא
  chosen: a load
  alternatives:
  - a burden
  - a carrying-load
  lexicon: HALOT
  rationale: The noun denotes what is carried. 'Load' is natural modern English and fits the following specification involving mules.
- source_word: צֶמֶד פְּרָדִים
  chosen: a pair of mules’ burden
  alternatives:
  - the load of a pair of mules
  - two mules' load
  lexicon: HALOT
  rationale: צֶמֶד denotes a pair/yoke, here qualifying the mules. The phrase describes the amount that a pair of mules can carry. 'A pair of mules’ burden' is slightly formal but compact and faithful.
- source_word: אֲדָמָה
  chosen: soil
  alternatives:
  - earth
  - ground
  - dirt
  lexicon: HALOT
  rationale: Naaman requests actual earth from Israel. 'Soil' communicates transported earth more naturally than 'ground,' while avoiding the overly colloquial 'dirt.'
- source_word: כִּי לֹא יַעֲשֶׂה עוֹד עַבְדְּךָ
  chosen: for your servant will no longer offer up
  alternatives:
  - for your servant will no longer make
  - for your servant will no longer present
  lexicon: HALOT
  rationale: עשה literally means 'do/make,' but with sacrificial objects it idiomatically means to offer/present a sacrifice. 'Offer up' makes the sacrificial sense explicit in idiomatic English.
- source_word: עֹלָה
  chosen: burnt offering
  alternatives:
  - whole burnt offering
  lexicon: HALOT
  rationale: Standard and precise rendering for the sacrificial term.
- source_word: זֶבַח
  chosen: sacrifice
  alternatives:
  - slaughter offering
  lexicon: HALOT
  rationale: A broad sacrificial term. 'Sacrifice' is the clearest general rendering in this context.
- source_word: לֵאלֹהִים אֲחֵרִים
  chosen: to other gods
  alternatives:
  - for other gods
  lexicon: HALOT
  rationale: The preposition marks the recipient/deity to whom the offerings are made. 'To other gods' is straightforward and idiomatic.
- source_word: כִּי אִם לַיהוָה
  chosen: but only to the LORD
  alternatives:
  - except to the LORD
  - but to the LORD alone
  lexicon: HALOT
  rationale: כִּי אִם marks a strong exception/contrast. 'But only to' communicates exclusivity clearly in modern English. Per doctrine, יהוה is rendered 'the LORD' rather than 'Yahweh' in the main text.
- source_word: יהוה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Follows the project's stated default for the divine name, preserving Jewish reverence tradition and established English convention while signaling the covenant name.
