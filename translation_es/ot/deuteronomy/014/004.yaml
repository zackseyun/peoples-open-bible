translation:
  language: es
  text: 'Estos son los animales[a] que podrán comer: el buey, la oveja y la cabra.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo literalmente: «Este es el animal que ustedes podrán comer», usando formas singulares para introducir una categoría colectiva antes de enumerar ejemplos.'
    reason: lexical_alternative
lexical_decisions:
- source_word: זֹאת
  english_pob_choice: These are
  chosen_spanish: Estos son
  alternatives_spanish:
  - Este es
  lexicon: HALOT
  rationale: Aunque la forma hebrea es singular femenina, introduce de manera colectiva la lista que sigue. En español, «Estos son» comunica con naturalidad esa función introductoria plural, como hizo el inglés POB.
- source_word: הַבְּהֵמָה
  english_pob_choice: the animals
  chosen_spanish: los animales
  alternatives_spanish:
  - el animal
  - la bestia
  - el ganado
  lexicon: HALOT
  rationale: El hebreo usa el singular con artículo con valor colectivo. «Los animales» preserva ese sentido de clase general y suena natural en español moderno; «el animal» sería demasiado literal y «ganado» estrecha el campo semántico.
- source_word: אֲשֶׁר תֹּאכֵלוּ
  english_pob_choice: that you may eat
  chosen_spanish: que podrán comer
  alternatives_spanish:
  - que comerán
  - que ustedes pueden comer
  - que podrán ustedes comer
  lexicon: HALOT
  rationale: El contexto es permisivo, no mandatorio. «Podrán comer» mantiene la idea de autorización y usa una forma impersonal/plural adecuada para el registro legal del texto; evita el tono de obligación de «comerán».
- source_word: שׁוֹר
  english_pob_choice: the ox
  chosen_spanish: el buey
  alternatives_spanish:
  - el toro
  - la res
  - el ganado vacuno
  lexicon: HALOT
  rationale: Para español bíblico amplio, «buey» es una equivalencia natural del bovino singular en listas legales. «Toro» sería más específico por sexo, y «res» o «ganado vacuno» suenan más técnicos o colectivos.
- source_word: שֵׂה כְשָׂבִים
  english_pob_choice: the sheep
  chosen_spanish: la oveja
  alternatives_spanish:
  - la oveja del rebaño
  - el cordero
  - las ovejas
  lexicon: HALOT
  rationale: El hebreo designa un animal ovino de la categoría de las ovejas; «la oveja» conserva el valor de especie/categoría sin añadir la restricción de edad de «cordero». Aunque el inglés usa plural genérico, en español la serie enumerativa funciona bien con singular de clase.
- source_word: וְשֵׂה עִזִּים
  english_pob_choice: and the goat
  chosen_spanish: y la cabra
  alternatives_spanish:
  - y un cabrito
  - y la oveja cabruna
  lexicon: HALOT
  rationale: «Cabra» es la contraparte natural de «oveja» en la lista de animales permitidos. «Cabrito» introduciría una edad no presente en el hebreo.
theological_decisions:
- issue: Introducción singular colectiva de categoría y lista de animales permitidos
  english_pob_reading: Hebrew literally, 'This is the animal that you may eat,' using singular forms to introduce a collective category before listing examples.
  chosen_spanish_reading: «Estos son los animales...» con nota explicativa sobre el singular colectivo hebreo.
  alternative_spanish_readings:
  - «Este es el animal...»
  - «Este es el ganado...»
  rationale: El hebreo presenta una forma singular femenina con sentido colectivo para abrir una lista. En español, la pluralización introductoria comunica mejor el valor de la enumeración sin ocultar la tensión formal, que se conserva en la nota.
  doctrine_reference: N/A
- issue: Valor permisivo de la cláusula relativa
  english_pob_reading: that you may eat
  chosen_spanish_reading: que podrán comer
  alternative_spanish_readings:
  - que pueden comer
  - que deben comer
  rationale: La frase expresa permiso alimentario, no obligación. La traducción debe mantener ese matiz legal y no convertirlo en mandato.
  doctrine_reference: N/A
translation_notes:
  revision_awareness: Se siguió el audit trail inglés sin cambios relevantes; la solución española conserva la estructura legal-lista y la nota sobre el singular colectivo hebreo, ajustando únicamente la naturalidad del español.
  spanish_consistency_notes:
  - Se mantiene «Dios/Yahvé/Cristo» sin incidencia en este versículo.
  - Se evita «SEÑOR» porque no aparece ningún tetragrámaton ni κύριος en el texto fuente.
  - La lista de animales se traduce con nombres corrientes y dignos, sin tecnicismos innecesarios.
