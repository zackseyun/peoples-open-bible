  yaml_path: translation/ot/jeremiah/023/005.yaml
  text: Behold[a], days are coming, declares Yahweh, when I will raise up for David a righteous Branch, and he will reign as king and act wisely[b], and he will do justice and righteousness in the land.
  footnotes:
