theological_decisions:
- issue: Rendering the mythic creature term in an apocalyptic cosmology
  chosen_reading: the two monsters
  alternative_readings:
  - the two beasts
  - the two creatures
  rationale: The verse depicts primordial cosmic beings assigned distinct domains. 'Monsters' preserves the strangeness and mythic scale without importing later doctrinal interpretation beyond the text.
  doctrine_reference: 'Translation philosophy: preserve apocalyptic imagery; do not flatten cosmic imagery into generic prose.'
- issue: Form of the proper name לִוְיָתָן as mediated through Ge'ez
  chosen_reading: Lewyatan
  alternative_readings:
  - Leviathan
  rationale: Project policy prefers transliterating names. Because this workflow is anchored in the Ge'ez witness, the main text reflects the Ethiopic form, while a footnote preserves the familiar English equivalent.
  doctrine_reference: 'Translation philosophy: translate titles; transliterate names.'
