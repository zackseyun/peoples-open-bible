  rationale: Se corrige el condicional a futuro para reflejar mejor el imperfecto hebreo y la decisión documentada de la POB inglesa. Se recoloca la nota sobre el término correspondiente y se mejora la naturalidad de la pregunta retórica con «he de esforzarme», manteniendo la futilidad de «en vano».
