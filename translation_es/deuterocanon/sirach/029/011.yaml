    issue: La nota al pie [a] es redundante y no aporta una alternativa léxica real.
    rationale: El texto principal ya dice «mandamientos». La nota dice que el griego literalmente tiene «según los mandamientos del Altísimo» y que el plural se conserva aquí, lo cual no añade información útil ni preserva una variante necesaria. Según las instrucciones, no debe crearse nota si no hay una ambigüedad real o una alternativa significativa que conservar.
  revised_spanish_text: Acumula tu tesoro conforme a los mandamientos del Altísimo, y te será más provechoso que el oro.
  revision_rationale: 'Se aprueba el texto base con una reparación menor: eliminar la nota redundante, porque el español ya refleja de forma explícita y fiel el plural griego «mandamientos» y no existe aquí una alternativa que requiera nota.'
