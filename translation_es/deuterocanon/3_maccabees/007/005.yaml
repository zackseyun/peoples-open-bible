translation:
  language: es
  text: Ellos, después de hacerlos bajar encadenados con maltrato[a], como esclavos —o más bien, como conspiradores[b]—, intentaron destruirlos sin ninguna audiencia ni examen, revestidos de una crueldad más feroz que la ley de los escitas[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «con ultraje»; la frase griega denota un trato abusivo y degradante.
    reason: lexical_alternative
  - marker: b
    text: Literalmente, «como esclavos —o más bien, como conspiradores—», lo que intensifica la acusación desde la mera sujeción hasta la de una hostilidad maquinadora.
    reason: lexical_alternative
  - marker: c
    text: La expresión griega «revestidos de una crueldad más feroz que la ley de los escitas» es muy vívida; «ley de los escitas» probablemente alude a la costumbre escita como proverbio de extrema crueldad.
    reason: cultural_note
lexical_decisions:
- source_word: δεσμίους
  english_pob_choice: in chains
  chosen_spanish: encadenados
  alternatives_spanish:
  - en cadenas
  - atados
  lexicon: LSJ
  rationale: El griego expresa condición de sujeción o ligaduras. «Encadenados» conserva la imagen concreta y el carácter humillante del trato sin volverla innecesariamente técnica.
- source_word: καταγαγόντες
  english_pob_choice: after bringing them down
  chosen_spanish: después de bajarlos
  alternatives_spanish:
  - después de traerlos abajo
  - después de conducirlos
  lexicon: LSJ
  rationale: El participio de κατάγω conserva fuerza direccional. «Después de bajarlos» mantiene la secuencia participial y la idea de traslado/custodia sin añadir destino no explicitado.
- source_word: μετὰ σκυλμῶν
  english_pob_choice: with abuse
  chosen_spanish: con abuso
  alternatives_spanish:
  - con maltrato
  - con ultraje
  lexicon: LSJ
  rationale: La frase indica trato vejatorio y degradante. «Con abuso» es natural en español actual y conserva el sentido de maltrato infamante.
- source_word: ὡς ἀνδράποδα
  english_pob_choice: as slaves
  chosen_spanish: como esclavos
  alternatives_spanish:
  - como cautivos
  - como botín humano
  lexicon: LSJ
  rationale: ἀνδράποδον denota una persona reducida a servidumbre, a menudo como botín. «Como esclavos» preserva la deshumanización y el valor social del término mejor que opciones más suaves.
- source_word: μᾶλλον δὲ ὡς ἐπιβούλους
  english_pob_choice: or rather, as conspirators
  chosen_spanish: o más bien, como conspiradores
  alternatives_spanish:
  - o más bien, como complotadores
  - o más bien, como enemigos al acecho
  lexicon: LSJ
  rationale: 'La corrección μᾶλλον δέ intensifica la comparación: no solo como esclavos, sino como amenaza hostil. «Conspiradores» comunica bien el matiz de maquinación enemiga.'
- source_word: ἄνευ πάσης ἀνακρίσεως καὶ ἐξετάσεως
  english_pob_choice: without any hearing or examination
  chosen_spanish: sin ninguna audiencia ni examen
  alternatives_spanish:
  - sin ninguna indagación ni investigación
  - sin ningún juicio ni examen
  lexicon: LSJ
  rationale: Los dos sustantivos griegos tienen peso jurídico y procesal. «Audiencia» traduce bien el sentido de debido proceso de ἀνάκρισις, y «examen» conserva ἐξέτασις sin sobretraducirla.
- source_word: ἐπεχείρησαν ἀνελεῖν
  english_pob_choice: attempted to destroy them
  chosen_spanish: intentaron destruirlos
  alternatives_spanish:
  - intentaron matarlos
  - se propusieron aniquilarlos
  lexicon: LSJ
  rationale: ἀναιρέω puede implicar matar o eliminar violentamente. «Destruirlos» conserva la severidad retórica del pasaje y evita precisar más de lo que el contexto exige.
- source_word: νόμου Σκυθῶν ἀγριοτέραν
  english_pob_choice: more brutal than the law of the Scythians
  chosen_spanish: más feroz que la ley de los escitas
  alternatives_spanish:
  - más cruel que la ley de los escitas
  - más salvaje que la costumbre de los escitas
  lexicon: LSJ
  rationale: El texto compara su crueldad con la de los escitas como proverbio de barbarie. «Más feroz» y «ley de los escitas» mantienen la imagen literal sin suavizarla, y «escitas» es la forma española habitual del etnónimo.
- source_word: ἐνπεπηρμένοι ὠμότητα
  english_pob_choice: having clothed themselves in a savagery
  chosen_spanish: revestidos de una crueldad
  alternatives_spanish:
  - imbuidos de crueldad
  - vestidos de crueldad
  lexicon: LSJ
  rationale: El participio es difícil y metafórico. «Revestidos de» reproduce la imagen de asumirse o ceñirse con una cualidad moral extrema; «crueldad» hace explícito el sustantivo final ὠμότητα.
theological_decisions:
- issue: Preservación del lenguaje deshumanizante aplicado a las víctimas
  english_pob_reading: as slaves
  chosen_spanish_reading: como esclavos
  alternative_spanish_readings:
  - como cautivos
  - como botín humano
  rationale: Aunque ἀνδράποδα no es idéntico a δοῦλοι, el pasaje reduce violentamente a las personas a condición servil. «Esclavos» conserva esa deshumanización y evita suavizar el agravio.
  doctrine_reference: 'DOCTRINE.md: Original-language primacy; contested terms table on bonded-status language'
- issue: Matiz del giro legal sin añadir formalismo ajeno al español
  english_pob_reading: without any hearing or examination
  chosen_spanish_reading: sin ninguna audiencia ni examen
  alternative_spanish_readings:
  - sin ninguna indagación ni investigación
  - sin ningún juicio ni examen
  rationale: El contexto es de ausencia total de debido proceso. «Audiencia» y «examen» trasladan el doble término jurídico sin convertirlo en una formulación más técnica de lo que el griego requiere.
  doctrine_reference: 'DOCTRINE.md: procedural/legal terminology handled by context'
- issue: Comparación cultural con los escitas como emblema de barbarie
  english_pob_reading: more brutal than the law of the Scythians
  chosen_spanish_reading: más feroz que la ley de los escitas
  alternative_spanish_readings:
  - más cruel que la ley de los escitas
  - más salvaje que la costumbre de los escitas
  rationale: La expresión conserva el referente cultural y el contraste retórico. Aunque «ley» puede rozar «costumbre», mantener «ley de los escitas» respeta la literalidad del griego y la fuerza proverbial del comparativo.
  doctrine_reference: 'DOCTRINE.md: preserve rhetorical/cultural force'
translation_notes:
  revision_awareness: 'La redacción sigue de cerca el texto griego de Swete y refleja el mismo juicio del POB inglés: mantiene el intensificador μᾶλλον δέ, conserva el matiz jurídico de ἀνάκρισις/ἐξέτασις y reproduce la metáfora final con una imagen de revestimiento, sin suavizar la violencia del pasaje. No se requieren revisiones adicionales frente al audio de auditoría inglés.'
  spanish_consistency_notes:
  - Se ha usado «esclavos» para mantener la fuerza deshumanizante, en línea con el tratamiento POB de términos de servidumbre.
  - Se prefirió «audiencia» para ἀνάκρισις por su naturalidad jurídica en español, sin perder el sentido de ausencia de debido proceso.
  - «Escitas» se usa como etnónimo estándar en español para Σκυθῶν.
  - Se mantuvo la alternancia correctiva «o más bien» para μᾶλλον δέ.
  - La puntuación con rayas reproduce la aclaración enfática del original y del texto inglés auditado.
