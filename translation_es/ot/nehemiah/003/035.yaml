  yaml_path: translation/ot/nehemiah/003/035.yaml
  text: And Tobiah the Ammonite was beside him[a], and he said, “Even what they are building—if a fox climbs up on it[b], he will break through their stone wall!”
  footnotes:
  - marker: a
    text: Or, “he will break down their wall of stones.” The Hebrew verb can suggest breaching or breaking down, and the phrase is part of Tobiah’s mockery of the wall’s weakness.
    reason: lexical_alternative
  - marker: b
    text: The Hebrew word for “fox” can in some contexts refer more broadly to a fox-like canid, though “fox” is the standard rendering here.
    reason: lexical_alternative
