translation:
  language: es
  text: Entonces me sacó al atrio exterior y me llevó a las cuatro esquinas del atrio[a], y he aquí, en cada esquina del atrio había un atrio.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'El hebreo repite literalmente: «un atrio en la esquina del atrio, un atrio en la esquina del atrio» después de mencionar las cuatro esquinas; el sentido es distributivo: un atrio en cada una de las cuatro esquinas.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיּוֹצִיאֵנִי
  english_pob_choice: Then he brought me out
  chosen_spanish: Entonces me sacó
  alternatives_spanish:
  - Y me sacó
  - Entonces me hizo salir
  lexicon: יצא / Hiphil
  rationale: El causativo de יצא expresa que alguien provoca la salida; en español, «me sacó» transmite bien esa acción sin forzar un calco. «Entonces» conserva el valor narrativo de la waw secuencial.
- source_word: הֶחָצֵר הַחִיצֹנָה
  english_pob_choice: the outer court
  chosen_spanish: el patio exterior
  alternatives_spanish:
  - el atrio exterior
  - el patio de afuera
  lexicon: חָצֵר
  rationale: «Patio» mantiene el sentido arquitectónico básico de חָצֵר y resulta natural en español. «Exterior» comunica הַחִיצֹנָה con claridad. «Atrio» es posible, pero suele sonar más eclesiástico y menos descriptivo.
- source_word: וַיַּעֲבִירֵנִי
  english_pob_choice: led me to
  chosen_spanish: me llevó
  alternatives_spanish:
  - me condujo
  - me hizo pasar
  lexicon: עבר / Hiphil
  rationale: Aquí el verbo describe un movimiento guiado hacia un punto específico. «Me llevó» expresa esa dirección de modo claro y fiel, sin añadir la idea de pasar más allá que no exige el contexto.
- source_word: אַרְבַּעַת מִקְצוֹעֵי הֶחָצֵר
  english_pob_choice: the four corners of the court
  chosen_spanish: las cuatro esquinas del patio
  alternatives_spanish:
  - los cuatro ángulos del patio
  - las cuatro esquinas del atrio
  lexicon: מִקְצוֹעַ
  rationale: מִקְצוֹעַ designa esquina o ángulo; «esquinas» es el equivalente más natural en español y preserva la imagen arquitectónica.
- source_word: וְהִנֵּה
  english_pob_choice: and behold
  chosen_spanish: y he aquí
  alternatives_spanish:
  - y miré
  - y he aquí que
  lexicon: הִנֵּה
  rationale: «Y he aquí» reproduce bien el giro de atención súbita y el tono visionario del pasaje, sin volverlo arcaizante en exceso.
- source_word: חָצֵר בְּמִקְצֹעַ הֶחָצֵר חָצֵר בְּמִקְצֹעַ הֶחָצֵר
  english_pob_choice: there was a court in each corner of the court
  chosen_spanish: en cada esquina del patio había un patio
  alternatives_spanish:
  - había un patio en cada esquina del patio
  - un patio estaba en la esquina del patio, un patio estaba en la esquina del patio
  lexicon: חָצֵר / מִקְצוֹעַ
  rationale: 'El hebreo repite la frase para expresar distribución: un patio en cada una de las cuatro esquinas. El español puede rendir esa repetición de forma idiomática sin perder el valor distributivo ni la rareza de la escena.'
theological_decisions:
- issue: Interpretación de la repetición final como distribución, no como simple duplicación literal
  english_pob_reading: 'The sense is distributive: a court in each of the four corners.'
  chosen_spanish_reading: 'La repetición se entiende distributivamente: un patio en cada una de las esquinas.'
  alternative_spanish_readings:
  - 'Mantener la repetición casi literal: «un patio en la esquina del patio, un patio en la esquina del patio»'
  - 'Simplificar demasiado: «había patios en las esquinas»'
  rationale: La sintaxis hebrea repite para enfatizar la presencia de una estructura en cada esquina. El español debe conservar esa distribución; una repetición mecánica sería áspera, y una simplificación excesiva borraría el detalle visionario.
  doctrine_reference: No doctrinal issue; architectural visionary description.
translation_notes:
  revision_awareness: El texto inglés auditado fue afinado de «past» a «to» para expresar con más precisión el movimiento hacia las cuatro esquinas. La versión española sigue esa lectura direccional y mantiene la conclusión distributiva final sin trasladar de modo mecánico la repetición hebrea.
  spanish_consistency_notes:
  - Se mantuvo «patio» para חָצֵר en todo el versículo, en coherencia con un lenguaje arquitectónico claro.
  - «Y he aquí» preserva el tono visionario de Ezekiel sin recurrir a un registro excesivamente arcaico.
  - La nota al pie explica la repetición hebrea para que el lector no la confunda con una redundancia accidental.
