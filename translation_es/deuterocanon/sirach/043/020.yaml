translation:
  language: es
  text: El frío del viento del norte vuelve; y como escarcha[a] congela su manantial. Sobre toda acumulación de agua se posa[b], y el estanque se viste de armadura, como de coraza.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'El hebreo dice literalmente algo como ‘como podredumbre, congela su manantial’, una imagen difícil. El paralelo griego lee más claramente: ‘hielo/cristal se congela a partir del agua’. El texto principal mantiene la prioridad del hebreo para Sirácida donde se conserva, mientras deja ver aquí el sentido apoyado por el griego.'
    reason: alternative_reading
  - marker: b
    text: La redacción hebrea de esta cláusula es textualmente difícil. El paralelo griego apoya el sentido de hielo que se asienta sobre toda agua reunida.
    reason: textual_variant
lexical_decisions:
- source_word: צִנַּת / ψυχρὸς
  english_pob_choice: the cold
  chosen_spanish: el frío
  alternatives_spanish:
  - el frío de
  - la frialdad
  - el hielo
  lexicon: HALOT; LXX ψυχρός
  rationale: ‘Frío’ reproduce de manera natural la idea de temperatura baja y funciona bien con la construcción española. No se fuerza una imagen más concreta que el texto no exige.
- source_word: רוּחַ צָפוֹן / βορέης
  english_pob_choice: the north wind
  chosen_spanish: el viento del norte
  alternatives_spanish:
  - el viento norte
  - el viento del septentrión
  - el espíritu del norte
  lexicon: HALOT; LXX βορέης
  rationale: El contexto meteorológico exige ‘viento’, no ‘espíritu’. ‘Del norte’ conserva el referente direccional y es idiomático en español.
- source_word: יָשִׁיב / πνεύσει
  english_pob_choice: returns
  chosen_spanish: vuelve
  alternatives_spanish:
  - regresa
  - retorna
  - sopla
  lexicon: HALOT; LXX πνεύσει
  rationale: ‘Vuelve’ mantiene la idea de recurrencia o reaparición del frío en un español natural, sin introducir un objeto explícito que el hebreo no da de forma clara.
- source_word: וְכָרָקָב / κρύσταλλος
  english_pob_choice: like frost
  chosen_spanish: como escarcha
  alternatives_spanish:
  - como hielo
  - como cristal
  - como granizo
  lexicon: HALOT; LXX κρύσταλλος
  rationale: Se sigue aquí la decisión del POB inglés de privilegiar la lectura griega más transparente. ‘Escarcha’ comunica bien el efecto de congelación y evita la imagen difícil de ‘podredumbre’ del hebreo.
- source_word: מְקוֹרוֹ / ἀφʼ ὕδατος
  english_pob_choice: its watersource
  chosen_spanish: su manantial
  alternatives_spanish:
  - su fuente
  - su origen de agua
  - su nacimiento
  lexicon: HALOT; LXX ἀφʼ ὕδατος
  rationale: ‘Manantial’ preserva la imagen acuática concreta y expresa con claridad la fuente de agua que queda congelada. Es una opción más natural en español que ‘fuente de agua’ sin perder precisión.
- source_word: מַעֲמַד מַיִם / συναγωγὴν ὕδατος
  english_pob_choice: standing body of water
  chosen_spanish: acumulación de agua
  alternatives_spanish:
  - masa de agua
  - cuerpo de agua reunida
  - estanque de agua
  lexicon: HALOT; LXX συναγωγὴν ὕδατος
  rationale: La expresión hebrea es difícil; la imagen griega apunta a agua reunida o acumulada. ‘Acumulación de agua’ es suficientemente literal y permite que la línea siguiente despliegue la metáfora del hielo como vestidura.
- source_word: יְקָרִים / καταλύσει
  english_pob_choice: it settles
  chosen_spanish: se posa
  alternatives_spanish:
  - se asienta
  - se extiende
  - cubre
  lexicon: HALOT; LXX καταλύσει
  rationale: ‘Se posa’ reproduce la idea de asentarse sobre algo con sencillez y sin sobretraducir. También deja abierta la imagen de una capa de hielo sobre el agua.
- source_word: מִקְוֶה / τὸ ὕδωρ
  english_pob_choice: the pool
  chosen_spanish: la alberca
  alternatives_spanish:
  - el estanque
  - la laguna
  - el estanque de agua
  lexicon: HALOT; LXX τὸ ὕδωρ
  rationale: ‘Alberca’ comunica un cuerpo de agua contenido y sirve para el paralelo con ‘pool’ del inglés POB. Se evita ‘piscina’, demasiado moderno y potencialmente anacrónico.
- source_word: וּכְשִׁרְיוֹן / ὡς θώρακα
  english_pob_choice: like armor / like a breastplate
  chosen_spanish: como de coraza
  alternatives_spanish:
  - como una coraza
  - como armadura
  - como un peto
  lexicon: HALOT; LXX θώρακα
  rationale: ‘Coraza’ conserva la imagen concreta de una pieza de armadura, en línea con θώρακα. La forma ‘como de coraza’ refleja el matiz comparativo del hebreo y el griego sin volver torpe la sintaxis.
translation_notes:
  revision_awareness: 'Se revisó la línea para corregir el anclaje de nota: el marcador [a] ahora aparece explícitamente en ‘vuelve[a]’. También se ajustó el resto del verso para seguir la preferencia del POB inglés por la lectura griega en las imágenes más difíciles, sin perder el trasfondo hebreo donde es inteligible.'
  spanish_consistency_notes:
  - Se mantuvo ‘Yahvé’ fuera del texto porque este versículo no contiene el nombre divino.
  - Se evitó ‘Cristo/Mesías’ y vocabulario doctrinal no pertinente, dado que el pasaje es sapiencial y meteorológico.
  - ‘Coraza’ se usa de manera consistente con la imagen de θώρακα y no como equivalencia genérica de armadura en todo contexto.
  - La puntuación separa los dos miembros del paralelismo con punto y coma, acorde con el ritmo del original.
