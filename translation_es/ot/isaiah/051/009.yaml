translation:
  language: es
  text: Despierta, despierta, vístete de poder, brazo de Yahvé; despierta, como en los días de antaño, generaciones de tiempos remotos. ¿No fuiste tú la que despedazó a Rahab, la que traspasó al dragón[a]?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «al monstruo marino».
    reason: lexical_alternative
lexical_decisions:
- source_word: עוּרִי
  english_pob_choice: Awake
  chosen_spanish: Despierta
  alternatives_spanish:
  - Levántate
  - Despiértate
  lexicon: HALOT
  rationale: La forma es un imperativo femenino singular dirigido al brazo de Yahvé personificado. «Despierta» conserva la repetición solemne y el tono poético, sin volverse tan coloquial como «despiértate».
- source_word: לִבְשִׁי עֹז
  english_pob_choice: put on strength
  chosen_spanish: vístete de poder
  alternatives_spanish:
  - cíñete de fuerza
  - revístete de fuerza
  lexicon: HALOT
  rationale: El hebreo usa la imagen de vestirse/cloquearse con fuerza. En español, «vístete de poder» mantiene la metáfora y suena natural; «fuerza» también sería posible, pero «poder» refleja bien la capacidad eficaz del brazo de Yahvé en este contexto.
- source_word: זְרֹועַ יְהוָה
  english_pob_choice: arm of Yahweh
  chosen_spanish: brazo de Yahvé
  alternatives_spanish:
  - brazo de Yahvéh
  - brazo del SEÑOR
  lexicon: terminología POB para el nombre divino y metáfora corporal
  rationale: Se conserva la metáfora directa «brazo» y se traduce el tetragrámaton por «Yahvé», conforme al criterio del proyecto. No se suaviza a una fórmula más tradicional como «brazo del SEÑOR» porque eso ocultaría el nombre divino explícito del hebreo.
- source_word: כִּימֵי קֶדֶם
  english_pob_choice: as in days of old
  chosen_spanish: como en los días de antaño
  alternatives_spanish:
  - como en los días de ayer
  - como en los días antiguos
  lexicon: HALOT
  rationale: La expresión apunta a tiempos remotos y solemnes. «Días de antaño» es idiomático en español y conserva el matiz poético sin precisar innecesariamente si se trata de antigüedad histórica o primordial.
- source_word: דֹּרוֹת עוֹלָמִים
  english_pob_choice: generations of long ago
  chosen_spanish: generaciones de tiempos remotos
  alternatives_spanish:
  - generaciones de edades pasadas
  - generaciones de eternidad
  lexicon: HALOT
  rationale: La frase intensifica la remota antigüedad. «Tiempos remotos» comunica bien esa distancia temporal; se evita «eternidad» porque aquí el énfasis es cronológico, no metafísico.
- source_word: הֲלוֹא אַתְּ הִיא
  english_pob_choice: Was it not you
  chosen_spanish: ¿No eras tú la que
  alternatives_spanish:
  - ¿No fuiste tú la que
  - ¿No eres tú la que
  lexicon: HALOT
  rationale: La pregunta retórica vuelve al pasado para recordar actos previos de Yahvé. En español, la forma con imperfecto («eras») ayuda a mantener ese tono retrospectivo y la concordancia natural con la personificación femenina.
- source_word: הַמַּחְצֶבֶת רַהַב
  english_pob_choice: who cut Rahab in pieces
  chosen_spanish: la que despedazó a Rahab
  alternatives_spanish:
  - la que cortó en piezas a Rahab
  - la que hincó a Rahab
  lexicon: HALOT
  rationale: El verbo hebreo expresa golpear/cortar con violencia. «Despedazó» reproduce mejor en español la idea de derrota contundente que una traducción más literal y mantiene el vigor poético del original.
- source_word: רַהַב
  english_pob_choice: Rahab
  chosen_spanish: Rahab
  alternatives_spanish:
  - el soberbio
  - Egipto
  lexicon: HALOT
  rationale: Se conserva el nombre poético para no borrar la ambigüedad literaria. El término puede aludir a Egipto como poder orgulloso, pero el texto lo presenta también como figura poética; mantener «Rahab» preserva esa tensión.
- source_word: מְחוֹלֶלֶת תַּנִּין
  english_pob_choice: who pierced the dragon
  chosen_spanish: la que traspasó al dragón
  alternatives_spanish:
  - la que hirió al monstruo marino
  - la que perforó al monstruo
  lexicon: HALOT
  rationale: El participio transmite una acción violenta de herir o atravesar. «Traspasó» conserva la fuerza física y la imagen de combate caótico; «dragón» mantiene el tono poético y mítico que la traducción inglesa también preservó.
theological_decisions:
- issue: Nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Yahweh
  rationale: El texto hebreo contiene el Tetragrámaton, por lo que se usa el nombre divino de forma explícita en español. «Yahvé» es la forma adoptada por el proyecto para evitar el reemplazo por un título enmascarador.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Rahab y el dragón como imaginería poética
  english_pob_reading: Retain the poetic imagery as 'Rahab' and 'the dragon' rather than flattening both into 'Egypt' or purely mythological language
  chosen_spanish_reading: Mantener «Rahab» y «el dragón»
  alternative_spanish_readings:
  - identificar a Rahab directamente como Egipto
  - reducir el dragón a «monstruo marino»
  rationale: La frase preserva una victoria histórica de Yahvé y, al mismo tiempo, usa imaginería cósmica o mítica. Traducir demasiado explicativamente resolvería la tensión que el hebreo deja abierta.
  doctrine_reference: DOCTRINE.md Translation philosophy §3 Preserve theological tension rather than resolve it
translation_notes:
  revision_awareness: 'Se siguió la revisión más reciente del contexto inglés, que solo añadió una coma después del segundo «awake» para reflejar mejor la repetición imperativa. En español se reproduce con la misma pausa: «Despierta, despierta…» y se mantuvo sin cambios léxicos de fondo.'
  spanish_consistency_notes:
  - Se preservó el nombre divino como «Yahvé» conforme al estándar del proyecto, evitando «SEÑOR».
  - Se mantuvo «Rahab» como nombre poético para conservar la ambigüedad entre poder histórico y figura caótica.
  - Se eligió «dragón» para sostener la imaginería del combate cósmico sin diluirla en una explicación interpretativa.
  - El tono general es elevado y bíblico, pero con español actual y sintaxis natural.
