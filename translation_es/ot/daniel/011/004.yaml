translation:
  language: es
  text: Y en cuanto se haya levantado, su reino será quebrado y dividido hacia los cuatro vientos del cielo[b], pero no para su posteridad[a], ni según el dominio con que gobernó; porque su reino será arrancado y dado a otros, además de estos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «descendientes». El hebreo «no para su posterioridad» aquí se refiere a quienes vendrían después de él en la sucesión dinástica.
    reason: lexical_alternative
  - marker: b
    text: «Hacia los cuatro vientos del cielo» es un modismo hebreo para indicar división en todas direcciones, es decir, hacia los cuatro puntos cardinales.
    reason: cultural_note
lexical_decisions:
- source_word: וּכְעָמְדוֹ
  english_pob_choice: And as soon as he has arisen
  chosen_spanish: Y cuando se haya levantado
  alternatives_spanish:
  - Y cuando se haya puesto en pie
  - Y en cuanto se haya levantado
  lexicon: HALOT
  rationale: El hebreo expresa una secuencia temporal ligada al hecho de que él asciende o se levanta a ejercer poder. En español, «cuando se haya levantado» conserva ese valor idiomático sin reducirlo a un acto meramente físico.
- source_word: תִּשָּׁבֵר
  english_pob_choice: will be broken
  chosen_spanish: será quebrado
  alternatives_spanish:
  - será roto
  - será quebrantado
  lexicon: HALOT
  rationale: El nifal de שבר indica que el reino sufre una ruptura. «Quebrado» es fiel y natural en español bíblico contemporáneo; «quebrantado» suena más interpretativo y «roto» más coloquial.
- source_word: מַלְכוּתוֹ
  english_pob_choice: his kingdom
  chosen_spanish: su reino
  alternatives_spanish:
  - su reino real
  - su realeza
  lexicon: HALOT
  rationale: Aquí מַלְכוּת se refiere al dominio político que será dividido. «Reino» comunica mejor ese campo semántico que «realeza» o «reinado» en este contexto.
- source_word: וְתֵחָץ
  english_pob_choice: and divided
  chosen_spanish: y dividido
  alternatives_spanish:
  - y repartido
  - y partido
  lexicon: HALOT
  rationale: El verbo señala una división del reino en varias partes. «Dividido» sigue de cerca el valor del hebreo y encaja con la imagen del reparto posterior.
- source_word: לְאַרְבַּע רוּחוֹת הַשָּׁמַיִם
  english_pob_choice: toward the four winds of heaven
  chosen_spanish: hacia los cuatro vientos del cielo
  alternatives_spanish:
  - hacia los cuatro puntos del cielo
  - hacia los cuatro vientos de los cielos
  lexicon: HALOT
  rationale: Se conserva el hebraísmo direccional. «Vientos del cielo» mantiene la imagen original sin explicitar en el texto principal la glosa interpretativa de los puntos cardinales, aunque esa idea queda implícita.
- source_word: וְלֹא לְאַחֲרִיתוֹ
  english_pob_choice: but not to his posterity
  chosen_spanish: pero no para su posteridad
  alternatives_spanish:
  - pero no para su descendencia
  - pero no para su sucesión
  lexicon: HALOT
  rationale: En este contexto dinástico, אַחֲרִיתוֹ apunta a los que vendrán después de él. «Posteridad» preserva ese matiz genealógico y sucesorio mejor que una traducción más abstracta como «fin».
- source_word: וְלֹא כְמָשְׁלוֹ אֲשֶׁר מָשָׁל
  english_pob_choice: and not according to the dominion with which he ruled
  chosen_spanish: ni según el dominio con que gobernó
  alternatives_spanish:
  - ni conforme al dominio con que ejerció su mando
  - ni según el gobierno con que gobernó
  lexicon: HALOT
  rationale: El hebreo usa un sustantivo y un verbo cognados para resaltar la clase de dominio que ejerció. «Dominio» conserva la fuerza política del término, y «gobernó» mantiene la relación cognada sin una repetición torpe en español.
- source_word: תִנָּתֵשׁ
  english_pob_choice: will be uprooted
  chosen_spanish: será arrancado
  alternatives_spanish:
  - será desarraigado
  - será arrancado de raíz
  lexicon: HALOT
  rationale: El verbo transmite una remoción violenta. «Arrancado» es una opción fiel y comprensible; «desarraigado» añade una metáfora más vegetal que el contexto permite, pero no exige en la línea principal.
- source_word: וְלַאֲחֵרִים
  english_pob_choice: and given to others
  chosen_spanish: y dado a otros
  alternatives_spanish:
  - y entregado a otros
  - y para otros
  lexicon: HALOT
  rationale: Aunque el hebreo omite aquí un verbo explícito de «dar», el contexto lo aporta con claridad. «Dado a otros» es una expansión mínima y auditada, necesaria para una frase española fluida y fiel.
- source_word: מִלְּבַד אֵלֶּה
  english_pob_choice: besides these
  chosen_spanish: fuera de estos
  alternatives_spanish:
  - además de estos
  - aparte de estos
  lexicon: HALOT
  rationale: La expresión final marca exclusión o contraste respecto de los mencionados. «Fuera de estos» mantiene esa separación de manera sobria; «aparte de estos» también sería válido, pero algo más explicativo.
theological_decisions:
- issue: Evitar identificación histórica explícita en la traducción principal
  english_pob_reading: Render the verse as a description of the breakup and redistribution of a king's kingdom without specifying identities in the translation.
  chosen_spanish_reading: Presentar el versículo como una descripción del quiebre y la redistribución de un reino, sin identificar al rey en el texto principal.
  alternative_spanish_readings:
  - Identificar en la traducción principal al rey y su partición histórica
  - Aclarar en la línea principal la referencia dinástica concreta
  rationale: El hebreo describe un proceso político-dinástico; la traducción no debe importar identificaciones históricas que pertenecen mejor a la nota o al comentario. Así se preserva la neutralidad del texto bíblico sin perder su sentido.
  doctrine_reference: Principio POB de primacía del texto original sobre la interpretación tradicional; no importar afirmaciones históricas que el versículo no explicita.
translation_notes:
  revision_awareness: El contexto del audit trail en inglés fue revisado y presenta acuerdo alto; no hubo cambios aplicados en la última pasada, por lo que el borrador español sigue de cerca la lectura óptima ya validada. Se preservó el modismo direccional de «los cuatro vientos» y la interpretación dinástica de אַחֲרִיתוֹ, sin introducir identidades históricas en el cuerpo del texto.
  spanish_consistency_notes:
  - Se mantuvo «reino» para מַלְכוּת y no «reinado», por tratarse del dominio político dividido.
  - Se conservó la imagen de «vientos del cielo» en el texto principal, con glosa explicativa en nota.
  - «Posteridad» se usó de forma consistente con el valor sucesorio del término en este contexto.
  - La coordinación verbal española busca reproducir la cadencia del hebreo sin forzar un calco sintáctico excesivo.
