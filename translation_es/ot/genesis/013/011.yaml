translation:
  language: es
  text: Así Lot escogió para sí toda la llanura del Jordán[a], y Lot partió hacia el oriente; y se separaron cada uno de su hermano.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «desde el oriente». La frase hebrea puede indicar tanto la dirección del viaje como el punto de origen.'
    reason: alternative_reading
lexical_decisions:
- source_word: וַיִּבְחַר לּוֹ
  english_pob_choice: chose for himself
  chosen_spanish: escogió para sí
  alternatives_spanish:
  - eligió para sí
  - escogió
  lexicon: HALOT
  rationale: בחר expresa la acción de elegir; el dativo לוֹ se conserva naturalmente con «para sí», destacando que la decisión recae personalmente en Lot.
- source_word: כָּל כִּכַּר הַיַּרְדֵּן
  english_pob_choice: all the plain of the Jordan
  chosen_spanish: toda la llanura del Jordán
  alternatives_spanish:
  - todo el valle del Jordán
  - toda la planicie del Jordán
  lexicon: HALOT
  rationale: כִּכָּר tiene un sentido geográfico de región llana o distrito circular. En español, «llanura» comunica bien el área fértil y abierta sin forzar un calco como «círculo».
- source_word: וַיִּסַּע
  english_pob_choice: journeyed
  chosen_spanish: se fue
  alternatives_spanish:
  - viajó
  - partió
  - se puso en marcha
  lexicon: HALOT
  rationale: נסע puede describir el acto de ponerse en camino o desplazar el campamento. «Se fue» es breve y natural en español narrativo; mantiene el movimiento sin sobrecargar el verso.
- source_word: מִקֶּדֶם
  english_pob_choice: eastward
  chosen_spanish: hacia el oriente
  alternatives_spanish:
  - al oriente
  - desde el oriente
  lexicon: HALOT
  rationale: El hebreo admite una ambigüedad direccional u originaria. En el cuerpo del texto, «hacia el oriente» refleja la lectura direccional adoptada por la POB inglesa, mientras que la alternativa de origen queda preservada en la nota.
- source_word: וַיִּפָּרְדוּ
  english_pob_choice: they separated
  chosen_spanish: se separaron
  alternatives_spanish:
  - se apartaron
  - se dividieron
  lexicon: HALOT
  rationale: El nifal de פרד indica separación mutua. «Se separaron» es la forma más directa y fiel en español.
- source_word: אִישׁ מֵעַל אָחִיו
  english_pob_choice: from each other
  chosen_spanish: el uno del otro
  alternatives_spanish:
  - cada uno del otro
  - de su hermano
  lexicon: HALOT
  rationale: La construcción hebrea es distributiva y conserva un matiz de parentesco. «El uno del otro» expresa bien la separación recíproca en español sin perder la relación interpersonal implícita.
theological_decisions:
- issue: Ambigüedad de מִקֶּדֶם
  english_pob_reading: eastward, with footnote allowing from the east
  chosen_spanish_reading: hacia el oriente, con nota que permite «desde el oriente»
  alternative_spanish_readings:
  - desde el oriente
  - al oriente
  rationale: La frase hebrea puede indicar dirección o procedencia. Mantener «hacia el oriente» en el texto principal y ofrecer la alternativa en nota preserva la transparencia textual sin exagerar la certeza.
  doctrine_reference: DOCTRINE.md §Translation philosophy 3
- issue: Lenguaje de parentesco en la separación
  english_pob_reading: from each other
  chosen_spanish_reading: el uno del otro
  alternative_spanish_readings:
  - cada uno del otro
  - entre sí
  rationale: Aunque el inglés POB simplifica la referencia distributiva, el hebreo conserva el sustantivo «hermano». La redacción española retiene la reciprocidad sin neutralizar del todo la relación familiar del original.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4
translation_notes:
  revision_awareness: Se siguió la última revisión inglesa que favorece un verbo de desplazamiento más directo y una separación recíproca natural; en español se mantuvo esa fluidez, pero se preservó la ambigüedad de מִקֶּדֶם mediante nota, y se evitó un calco rígido de la estructura distributiva hebrea.
  spanish_consistency_notes:
  - Se usa «Jordán» con artículo y construcción geográfica natural en español.
  - «Oriente» se emplea como equivalente bíblico claro de la dirección este.
  - El verso mantiene un tono narrativo sobrio y publicable, sin añadir contenido interpretativo ajeno al hebreo.
