translation:
  language: es
  text: 'Yahvé, el Dios del cielo, que me tomó de la casa de mi padre y de la tierra de mi nacimiento, y que me habló y me juró, diciendo: «A tu descendencia le daré esta tierra»; él enviará su ángel[a] delante de ti, y tomarás una esposa para mi hijo de allí.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «su mensajero». El hebreo מַלְאָךְ puede significar «mensajero» o «ángel»; en este contexto, un mensajero celestial es el sentido más probable.
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahveh
  - el SEÑOR
  lexicon: HALOT
  rationale: Se conserva el nombre divino del tetragrámaton como nombre propio en español, siguiendo el principio de no sustituirlo por una titulación. «Yahvé» es la forma estándar y readable en español bíblico para este proyecto.
- source_word: אֱלֹהֵי הַשָּׁמַיִם
  english_pob_choice: the God of heaven
  chosen_spanish: el Dios del cielo
  alternatives_spanish:
  - el Dios de los cielos
  lexicon: HALOT
  rationale: 'La construcción posesiva se expresa de manera natural en español con singular: «el cielo». Se mantiene el sentido relacional del hebreo sin volverlo más explícito de lo que el texto exige.'
- source_word: לְקָחַנִי
  english_pob_choice: took me
  chosen_spanish: me tomó
  alternatives_spanish:
  - me llevó
  - me sacó
  lexicon: HALOT
  rationale: לקח expresa la acción de tomar/retirar. «Me tomó» conserva la relación verbal directa y evita introducir la noción de traslado que el verbo no especifica por sí mismo.
- source_word: מִבֵּית אָבִי
  english_pob_choice: from my father's house
  chosen_spanish: de la casa de mi padre
  alternatives_spanish:
  - de la casa paterna
  - de la casa de mi padre
  lexicon: HALOT
  rationale: Se mantiene la expresión familiar-covenantal del hebreo. «Casa de mi padre» reproduce la frase fija sin paraphrasearla como «hogar» o «familia».
- source_word: וּמֵאֶרֶץ מוֹלַדְתִּי
  english_pob_choice: and from the land of my birth
  chosen_spanish: y de la tierra de mi nacimiento
  alternatives_spanish:
  - y de mi tierra natal
  - y de la tierra en que nací
  lexicon: HALOT
  rationale: «Tierra de mi nacimiento» conserva la forma nominal del hebreo y la relación con el lugar de origen, sin mover el sentido hacia «parentela» o «patria» más allá de lo necesario.
- source_word: דִּבֶּר לִי
  english_pob_choice: spoke to me
  chosen_spanish: me habló
  alternatives_spanish:
  - me dijo
  - me habló
  lexicon: HALOT
  rationale: Se traduce el verbo de hablar sin colapsarlo en una idea de promesa. La promesa queda expresada en la cláusula siguiente.
- source_word: נִשְׁבַּע לִי
  english_pob_choice: swore to me
  chosen_spanish: me juró
  alternatives_spanish:
  - me hizo juramento
  - me juró
  lexicon: HALOT
  rationale: «Juró» es la forma breve y natural en español para el acto de prestar juramento. Mantiene la solemnidad del pacto sin introducir una perífrasis innecesaria.
- source_word: לְזַרְעֲךָ
  english_pob_choice: to your offspring
  chosen_spanish: a tu descendencia
  alternatives_spanish:
  - a tu simiente
  - a tus descendientes
  lexicon: HALOT
  rationale: «Descendencia» preserva bien la fuerza colectiva del sustantivo hebreo en español moderno. «Simiente» sería más técnico pero menos transparente para lectura eclesial amplia.
- source_word: אֶתֵּן אֶת הָאָרֶץ הַזֹּאת
  english_pob_choice: I will give this land
  chosen_spanish: le daré esta tierra
  alternatives_spanish:
  - daré esta tierra
  - le entregaré esta tierra
  lexicon: HALOT
  rationale: Se conserva el futuro promisorio y se usa «dar» como equivalente natural de נתן. El dativo («le») hace explícita la relación con la descendencia mencionada antes.
- source_word: הוּא
  english_pob_choice: he
  chosen_spanish: él
  alternatives_spanish:
  - él mismo
  lexicon: HALOT
  rationale: El pronombre enfático se mantiene con una simple reafirmación en español. No se añade «mismo» porque el contexto ya marca la fuerza deíctica suficiente.
- source_word: יִשְׁלַח מַלְאָכ/וֹ
  english_pob_choice: he will send his angel
  chosen_spanish: enviará su ángel
  alternatives_spanish:
  - enviará su mensajero
  - mandará su ángel
  lexicon: HALOT
  rationale: En este contexto de guía providencial, «ángel» es la lectura más probable y coincide con la decisión inglesa; se conserva la ambigüedad léxica en nota. «Mensajero» sigue siendo posible, pero menos preciso para el trasfondo narrativo.
- source_word: לְפָנֶיךָ
  english_pob_choice: before you
  chosen_spanish: delante de ti
  alternatives_spanish:
  - antes que tú
  - ante ti
  lexicon: HALOT
  rationale: «Delante de ti» reproduce el valor espacial/directivo del hebreo en un español natural. Mantiene la imagen de guía previa al viaje.
- source_word: וְלָקַחְתָּ אִשָּׁה לִבְנִי
  english_pob_choice: and you shall take a wife for my son
  chosen_spanish: y tú tomarás para mi hijo una mujer
  alternatives_spanish:
  - y tomarás una esposa para mi hijo
  - y conseguirás para mi hijo una mujer
  lexicon: HALOT
  rationale: Se preserva la forma verbal de la comisión. «Tomarás» reproduce el hebreo y «una mujer» evita introducir «esposa» si bien el sentido referencial es matrimonial; se mantiene la literalidad necesaria sin oscurecer la función narrativa.
- source_word: מִשָּׁם
  english_pob_choice: from there
  chosen_spanish: de allí
  alternatives_spanish:
  - de ese lugar
  - de allí mismo
  lexicon: HALOT
  rationale: «De allí» es la expresión más natural y fiel para el adverbio locativo.
theological_decisions:
- issue: Renderización del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahveh
  - el SEÑOR
  rationale: El texto hebreo usa explícitamente el nombre del pacto. En español se opta por «Yahvé» para conservar el nombre propio y evitar la sustitución reverencial por un título.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Sentido de מַלְאָךְ en la promesa de guía
  english_pob_reading: his angel
  chosen_spanish_reading: su ángel
  alternative_spanish_readings:
  - su mensajero
  rationale: La escena habla de la conducción providencial de Yahvé; por eso «ángel» es la lectura más probable y se mantiene en el cuerpo del texto. La alternativa léxica se preserva en nota porque la ambigüedad del término es real.
  doctrine_reference: DOCTRINE.md Translation philosophy §3, preserve theological tension where ambiguity is genuine
translation_notes:
  revision_awareness: 'Se siguió el estado más reciente de revisión, que no introdujo cambios al texto inglés auditado (unchanged=true), y se mantuvo la misma resolución léxica principal: YHWH como nombre propio, מַלְאָךְ como «ángel» con alternativa preservada.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» de manera consistente para יְהוָה, conforme al estándar del proyecto.
  - Se usa «ángel» en el texto principal y «mensajero» en la nota para preservar la tensión léxica de מַלְאָךְ.
  - «Tierra» se conserva para ארץ en el sentido de promesa territorial, no «país» ni «territorio», para no desplazar el registro bíblico.
  - La puntuación con punto y coma y comillas angulares ayuda a reflejar la cadencia del hebreo y la estructura de la cita directa.
