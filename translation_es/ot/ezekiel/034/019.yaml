translation:
  language: es
  text: Y mis ovejas[a] pastarán en lo que vuestros pies han pisoteado[b], y beberán lo que vuestros pies han enturbiado.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «mi rebaño» para «mis ovejas».
    reason: lexical_alternative
  - marker: b
    text: 'Literalmente: «pastarán de lo pisoteado por vuestros pies... beberán de lo enturbiado o removido por vuestros pies».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְצֹאנִי
  english_pob_choice: And my flock
  chosen_spanish: Y mi rebaño
  alternatives_spanish:
  - Y mis ovejas
  - Y mi flanco
  lexicon: HALOT
  rationale: צֹאן designa ganado menor en conjunto, especialmente ovejas; en español, «rebaño» conserva el valor colectivo y la imagen pastoral con naturalidad. «Mis ovejas» es posible, pero estrecha el matiz colectivo del hebreo.
- source_word: מִרְמַס רַגְלֵיכֶם
  english_pob_choice: on what your feet have trampled
  chosen_spanish: en lo que vuestros pies han pisoteado
  alternatives_spanish:
  - de lo pisoteado por vuestros pies
  - de la pisada de vuestros pies
  lexicon: HALOT
  rationale: 'מִרְמַס expresa algo pisoteado o un lugar pisoteado. Como el verbo siguiente es «pastorear», el español gana claridad con una construcción de objeto: «en lo que... han pisoteado». «Pisotear» comunica bien el daño al pasto sin perder la imagen.'
- source_word: תִּרְעֶינָה
  english_pob_choice: must graze
  chosen_spanish: pastará
  alternatives_spanish:
  - tendrá que pastar
  - pastoreará
  - alimentará
  lexicon: HALOT
  rationale: El verbo רעה aquí es «pacer/pastar» en sentido pastoral. En español, el futuro simple comunica el resultado inevitable de la acción previa, sin forzar un modal explícito que el hebreo no marca de manera directa.
- source_word: וּמִרְפַּשׂ רַגְלֵיכֶם
  english_pob_choice: what your feet have muddied
  chosen_spanish: lo que vuestros pies han enturbiado
  alternatives_spanish:
  - lo que vuestros pies han ensuciado
  - el agua revuelta por vuestros pies
  - lo que vuestros pies han befoulado
  lexicon: HALOT
  rationale: מִרְפָּשׂ se refiere a algo removido, enturbiado o ensuciado, especialmente en agua. «Enturbiado» conserva con precisión la imagen acuática necesaria para el paralelo con «beberá».
- source_word: תִּשְׁתֶּינָה
  english_pob_choice: and drink
  chosen_spanish: y beberá
  alternatives_spanish:
  - y beberán
  - y beberá de ella
  lexicon: HALOT
  rationale: El verbo שׁתה significa «beber». En español, el singular colectivo «mi rebaño» permite concordar con «beberá» para una lectura fluida y natural, manteniendo el sentido grupal del hebreo.
translation_notes:
  revision_awareness: Se revisó el contexto inmediato y el audit trail inglés; no se detectaron cambios textuales recientes que alteren la decisión de fondo. La formulación española busca conservar el paralelismo hebreo entre pastar y beber, con una sola línea natural y publicable.
  spanish_consistency_notes:
  - Se mantuvo «vuestros» para reflejar el plural del hebreo y la dirección acusatoria del pasaje.
  - Se prefirió «rebaño» por su valor colectivo, evitando una lectura individualizante.
  - Se conservó el paralelismo semántico entre pastar/pisaroteado y beber/enturbiado.
