translation:
  language: es
  text: Muchos dolores son para el impío[a], pero el amor fiel[b] rodea al que confía en Yahvé.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: “Muchos dolores le tocan al impío”. El hebreo puede expresar dolores, penas o sufrimientos.'
    reason: lexical_alternative
  - marker: b
    text: Hebreo חֶסֶד, término que también puede traducirse como “amor constante”, “misericordia” o “lealtad amorosa”, según el contexto.
    reason: lexical_alternative
lexical_decisions:
- source_word: רַבִּים
  english_pob_choice: Many
  chosen_spanish: Muchos
  alternatives_spanish:
  - Numerosos
  lexicon: HALOT
  rationale: La palabra expresa cantidad abundante; “Muchos” es natural en español y conserva el énfasis inicial del hebreo.
- source_word: מַכְאוֹבִים
  english_pob_choice: pains
  chosen_spanish: dolores
  alternatives_spanish:
  - penas
  - sufrimientos
  - tormentos
  lexicon: HALOT
  rationale: El sustantivo puede denotar dolores físicos, sufrimientos o penas. “Dolores” mantiene la fuerza concreta de la imagen y funciona bien en español bíblico moderno.
- source_word: לָרָשָׁע
  english_pob_choice: belong to the wicked
  chosen_spanish: le aguardan al impío
  alternatives_spanish:
  - son para el impío
  - pertenecen al impío
  - vienen sobre el impío
  lexicon: HALOT
  rationale: El ל marca relación/dativo; en español, “le aguardan” expresa de forma natural que los dolores están destinados o reservados para el impío sin forzar causalidad. “Impío” preserva el matiz moral del hebreo.
- source_word: וְהַבּוֹטֵחַ
  english_pob_choice: but the one who trusts
  chosen_spanish: pero el que confía
  alternatives_spanish:
  - y el que confía
  - pero quien confía
  - pero el confiado
  lexicon: HALOT
  rationale: 'El participio funciona sustantivamente: “el que confía”. Se mantiene el valor adversativo de la conjunción, porque el versículo contrasta al impío con el que confía en Yahvé.'
- source_word: בַּיהוָה
  english_pob_choice: in Yahweh
  chosen_spanish: en Yahvé
  alternatives_spanish:
  - en Yahweh
  lexicon: HALOT
  rationale: 'Se sigue la terminología del proyecto para el nombre divino: “Yahvé”. La preposición con בטח se rinde naturalmente como “confiar en”.'
- source_word: חֶסֶד
  english_pob_choice: steadfast love
  chosen_spanish: la misericordia
  alternatives_spanish:
  - el amor constante
  - la lealtad amorosa
  - el amor fiel
  lexicon: HALOT
  rationale: חֶסֶד es un término teológicamente rico; aunque puede abarcar fidelidad amorosa o amor de pacto, en este contexto la imagen de protección envolvente se expresa con naturalidad mediante “misericordia”. Se conserva en nota la alternativa interpretativa.
- source_word: יְסוֹבְבֶנּוּ
  english_pob_choice: surrounds
  chosen_spanish: rodea
  alternatives_spanish:
  - lo cerca
  - lo circunda
  - lo envuelve
  lexicon: HALOT
  rationale: El verbo significa rodear o circundar. “Rodea” es claro, idiomático y fiel a la imagen espacial del hebreo.
theological_decisions:
- issue: Renderizado del nombre divino יהוה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  rationale: El texto hebreo contiene el Tetragrámaton. En la norma del proyecto, se traduce de manera auditable como “Yahvé”, conservando el nombre propio del pacto en vez de sustituirlo por un título genérico.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Sentido de חֶסֶד
  english_pob_reading: steadfast love
  chosen_spanish_reading: misericordia
  alternative_spanish_readings:
  - amor constante
  - amor fiel
  - lealtad amorosa
  rationale: El hebreo puede abarcar misericordia, amor fiel y lealtad de pacto. En este versículo, como cualidad que rodea y protege, “misericordia” es una opción natural y bíblicamente reconocible en español, sin negar las demás posibilidades lexicales.
  doctrine_reference: HALOT; uso contextual de חֶסֶד en poesía hebrea
translation_notes:
  revision_awareness: Coincide con la última revisión inglesa sin cambios sustantivos; la única adaptación relevante es la normalización del nombre divino según la terminología española del proyecto y la elección contextual de “misericordia” para חֶסֶד, manteniendo la imagen de rodear/proteger.
  spanish_consistency_notes:
  - Se mantuvo el contraste adversativo entre el impío y el que confía en Yahvé.
  - Se preservó la imagen espacial de rodear/encerrar con un verbo natural en español.
  - 'No se suavizó el valor lexical de מַכְאוֹבִים: se tradujo con un término concreto y se dejó la alternativa en nota.'
  - Se usó “impío” para reflejar el carácter moral del singular hebreo representativo.
  - La puntuación refleja una sola línea poética con pausa medial equivalente al contraste del hebreo.
