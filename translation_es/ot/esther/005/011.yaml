  glossary_alignment: No hay términos teológicos de proyecto en juego. La principal desalineación editorial es el nombre «Haman», que en español bíblico estándar debe ser «Hamán». Las notas léxicas b–d son útiles y coherentes con el audit trail inglés; la nota a sobre transliteración no debe mantenerse.
  issues:
  - severity: medium
    issue: Uso de «Haman» en el texto principal
    rationale: En español bíblico y lectura eclesial general, «Hamán» es la forma natural y esperable. La nota que justifica «Haman» responde a consistencia editorial interna del borrador, no a fidelidad fuente ni a claridad en español.
  - severity: low
    issue: Construcción poco natural «contó ... a ellos»
    rationale: Aunque comprensible, suena forzada en español. «Les contó» conserva el mismo sentido con mejor legibilidad.
  - severity: low
