    text: O, más literalmente, «aceite de unción».
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: «santo»; no «santísimo».'
    reason: alternative_reading
  revision_rationale: Se corrigieron los anclajes de las notas para que correspondan a las palabras comentadas en la fuente y en el POB inglés. También se eliminó 'junto con', que añadía un matiz no requerido por el hebreo, y se simplificó la puntuación. Se mantuvo 'santo' sin intensificarlo, conforme a קֹדֶשׁ.
