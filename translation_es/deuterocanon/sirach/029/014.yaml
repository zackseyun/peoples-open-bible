translation:
  language: es
  text: Un buen hombre será fiador de su prójimo, pero el que ha perdido la vergüenza[a] lo abandonará.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O ‘el desvergonzado lo abandonará’. El griego dice literalmente ‘el que ha perdido vergüenza’.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀνὴρ ἀγαθός
  english_pob_choice: a good man
  chosen_spanish: un hombre bueno
  alternatives_spanish:
  - un buen hombre
  - una persona buena
  lexicon: LSJ
  rationale: ἀνήρ es masculino singular, por lo que conviene conservar ‘hombre’ en español. ἀγαθός aquí expresa bondad moral o rectitud; ‘bueno’ comunica esa cualidad sin añadir matices ajenos.
- source_word: ἐγγυήσεται
  english_pob_choice: will stand surety for
  chosen_spanish: será fiador de
  alternatives_spanish:
  - saldrá fiador de
  - garantizará por
  lexicon: LSJ
  rationale: El verbo remite a asumir responsabilidad legal o financiera por otro. ‘Ser fiador de’ expresa bien esa función en español y mantiene el tono jurídico del dicho.
- source_word: τὸν πλησίον
  english_pob_choice: his neighbor
  chosen_spanish: su prójimo
  alternatives_spanish:
  - su vecino
  - el que está cerca de él
  lexicon: LSJ
  rationale: En contexto ético y sapiencial, πλησίον equivale a ‘prójimo’. ‘Su prójimo’ es idiomático en español y conserva la relación social implícita.
- source_word: ὁ ἀπολωλεκὼς αἰσχύνην
  english_pob_choice: one who has lost shame
  chosen_spanish: el que ha perdido la vergüenza
  alternatives_spanish:
  - el hombre desvergonzado
  - el que ha perdido todo sentido de vergüenza
  - el que ha perdido la modestia
  lexicon: LSJ
  rationale: La construcción griega es literalmente ‘el que ha perdido vergüenza’. ‘Ha perdido la vergüenza’ conserva la imagen de pérdida moral sin reducirla de inmediato al adjetivo ‘desvergonzado’.
- source_word: καταλείψει αὐτόν
  english_pob_choice: will abandon him
  chosen_spanish: lo abandonará
  alternatives_spanish:
  - lo dejará
  - lo dejará atrás
  - lo forsitará
  lexicon: LSJ
  rationale: καταλείπω aquí significa dejar atrás o abandonar. ‘Lo abandonará’ transmite la ruptura de lealtad que el contexto exige.
theological_decisions:
- issue: Singular masculino en instrucción sapiencial
  english_pob_reading: a good man
  chosen_spanish_reading: un hombre bueno
  alternative_spanish_readings:
  - una persona buena
  - un buen hombre
  rationale: El griego usa ἀνήρ, masculino singular. En un proverbio puede tener valor representativo, pero no hay base suficiente para neutralizarlo en la traducción principal; por eso se mantiene ‘hombre’.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4
translation_notes:
  revision_awareness: El texto griego presentado coincide sustancialmente con la traducción inglesa auditada; no se registran revisiones aplicadas ni cambios pendientes en el pass más reciente.
  spanish_consistency_notes:
  - Se mantuvo el registro sapiencial y sobrio del pasaje.
  - ‘Fiador de’ preserva la fuerza legal de ἐγγυήσεται sin volverlo técnico en exceso.
  - Se conservó ‘prójimo’ para πλησίον por ser la opción más natural y estable en español bíblico con este sentido ético.
