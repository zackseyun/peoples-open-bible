translation:
  language: es
  text: Quédate conmigo; no tengas miedo, porque el que busca mi vida busca también tu vida, porque estás bajo mi protección[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literalmente, «porque una custodia/protección eres conmigo», es decir, «porque estás conmigo bajo resguardo».
    reason: lexical_alternative
lexical_decisions:
- source_word: שְׁבָה
  english_pob_choice: Stay
  chosen_spanish: Quédate
  alternatives_spanish:
  - Permanece
  - Quédate aquí
  lexicon: HALOT
  rationale: El imperativo de ישב aquí expresa permanecer en la compañía de David, no sentarse literalmente. «Quédate» es natural en español y conserva la invitación de permanecer con él.
- source_word: אִתִּי
  english_pob_choice: with me
  chosen_spanish: conmigo
  alternatives_spanish:
  - conmigo mismo
  - junto a mí
  lexicon: HALOT
  rationale: La preposición indica cercanía y asociación personal con David; «conmigo» es la forma natural y precisa en español.
- source_word: אַל תִּירָא
  english_pob_choice: do not be afraid
  chosen_spanish: no tengas miedo
  alternatives_spanish:
  - no temas
  lexicon: HALOT
  rationale: La prohibición negativa se expresa de manera idiomática en español con «no tengas miedo»; «no temas» sería más solemne, pero menos natural para este registro.
- source_word: כִּי
  english_pob_choice: for
  chosen_spanish: porque
  alternatives_spanish:
  - pues
  - ya que
  lexicon: HALOT
  rationale: Introduce la razón de la exhortación anterior; «porque» comunica claramente la relación causal en español.
- source_word: אֲשֶׁר יְבַקֵּשׁ אֶת נַפְשִׁי
  english_pob_choice: he who seeks my life
  chosen_spanish: el que busca mi vida
  alternatives_spanish:
  - el que intenta quitarme la vida
  - quien busca mi vida
  lexicon: HALOT
  rationale: La construcción relativa tiene valor genérico; «el que» conserva bien la singularidad formal del hebreo, como hizo la revisión inglesa al preferir «he who». «Buscar mi vida» reproduce el modismo hebreo sin suavizarlo indebidamente.
- source_word: נֶפֶשׁ
  english_pob_choice: life
  chosen_spanish: vida
  alternatives_spanish:
  - alma
  lexicon: HALOT
  rationale: En este modismo, נֶפֶשׁ significa la vida de una persona en peligro, incluso muerte violenta. «Vida» evita la falsa lectura espiritual de «alma».
- source_word: יְבַקֵּשׁ אֶת נַפְשֶׁךָ
  english_pob_choice: seeks your life also
  chosen_spanish: busca también tu vida
  alternatives_spanish:
  - busca tu vida también
  - busca igualmente tu vida
  lexicon: HALOT
  rationale: Se mantiene el paralelismo con la primera cláusula y la fuerza del hebreo. «También» deja explícita la correspondencia que el contexto implica.
- source_word: מִשְׁמֶרֶת
  english_pob_choice: under my protection
  chosen_spanish: bajo mi protección
  alternatives_spanish:
  - en mi custodia
  - bajo mi resguardo
  - bajo mi cuidado
  lexicon: HALOT
  rationale: El sustantivo puede abarcar custodia, resguardo o protección. En este contexto David promete seguridad a Abiatar; «bajo mi protección» sigue de cerca la decisión inglesa y su sentido contextual.
- source_word: עִמָּדִי
  english_pob_choice: with me
  chosen_spanish: conmigo
  alternatives_spanish:
  - conmigo, en mi compañía
  lexicon: HALOT
  rationale: Aunque literalmente significa «conmigo», en español la expresión con מִשְׁמֶרֶת funciona mejor de forma posesiva/relacional. La idea queda incluida en «bajo mi protección» y en la cercanía de «quédate conmigo».
theological_decisions:
- issue: Sentido de נֶפֶשׁ en el modismo «buscar la vida»
  english_pob_reading: life, not soul
  chosen_spanish_reading: vida, no alma
  alternative_spanish_readings:
  - alma
  - persona
  rationale: En el hebreo, el giro apunta a atentar contra la vida de alguien. Traducir «alma» sería engañoso en español porque sugiere una dimensión inmortal o interior que no está en foco aquí.
  doctrine_reference: Uso léxico bíblico de נֶפֶשׁ; distinción semántica entre vida, persona y alma
- issue: Sentido de מִשְׁמֶרֶת en la frase final
  english_pob_reading: under my protection
  chosen_spanish_reading: bajo mi protección
  alternative_spanish_readings:
  - en mi custodia
  - bajo mi guarda
  - en mi resguardo
  rationale: La frase no describe una vigilancia policial sino la promesa de seguridad y amparo de David. «Protección» comunica mejor ese matiz en español contemporáneo sin perder el valor de custodia.
  doctrine_reference: Léxico contextual de protección/custodia en narrativa histórica
- issue: Valor de la construcción relativa inicial
  english_pob_reading: he who seeks...
  chosen_spanish_reading: el que busca...
  alternative_spanish_readings:
  - quien busca...
  - el quequiera que busca...
  rationale: La referencia es genérica y singular a la vez. «El que» conserva la forma cercana al hebreo y evita diluir el efecto de una amenaza concreta en la escena.
  doctrine_reference: Sintaxis relativa genérica en hebreo bíblico
translation_notes:
  revision_awareness: La decisión inglesa revisada de cambiar 'whoever' por 'he who' se reflejó en español con «el que», para mantener un referente genérico-singular más cercano al hebreo. También se conservaron las elecciones revisadas de «under my protection» → «bajo mi protección», y la duplicación de «tu vida» en paralelo con «mi vida».
  spanish_consistency_notes:
  - Se mantiene «vida» para נֶפֶשׁ de manera consistente con el modismo hebreo y con la decisión inglesa de evitar «soul».
  - Se usa «conmigo» de forma natural al inicio y en el valor relacional de עִמָּדִי, sin forzar un calco.
  - Se preserva un registro sobrio y bíblico, pero con sintaxis española fluida y publicable.
  - No se introduce «SEÑOR» ni otras sustituciones devocionales porque el versículo no contiene el Tetragrámaton.
