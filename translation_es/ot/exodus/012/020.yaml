translation:
  language: es
  text: No comerán nada leudado[a]; en todos los lugares donde habitan[b] comerán panes sin levadura.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «ninguna cosa leudada». El hebreo es más amplio que «pan» y abarca cualquier cosa hecha con levadura o leudada.
    reason: lexical_alternative
  - marker: b
    text: O «en todas sus moradas» o «por todas sus poblaciones». La frase se refiere a todo lugar donde habiten.
    reason: lexical_alternative
lexical_decisions:
- source_word: כָּל / anything
  english_pob_choice: anything
  chosen_spanish: nada
  alternatives_spanish:
  - ninguna cosa
  - algo
  lexicon: HALOT
  rationale: El hebreo con כָּל + sustantivo singular en una prohibición expresa una totalidad absoluta. En español, «nada» transmite con naturalidad la fuerza totalizadora de la negación sin estrechar el sentido a «pan» ni a un solo tipo de alimento.
- source_word: מַחְמֶצֶת
  english_pob_choice: anything leavened
  chosen_spanish: leudado
  alternatives_spanish:
  - fermentado
  - con levadura
  - pan leudado
  lexicon: HALOT
  rationale: El término designa algo leudado o fermentado, no solo un ingrediente. «Leudado» conserva la amplitud del vocablo y evita reducir el mandato a «pan leudado» cuando el hebreo prohíbe cualquier cosa leudada.
- source_word: לֹא תֹאכֵלוּ
  english_pob_choice: you shall not eat
  chosen_spanish: No comerán
  alternatives_spanish:
  - No comeréis
  - No deben comer
  lexicon: HALOT
  rationale: 'La forma legal/instructiva se vierte bien con una prohibición directa en futuro: «No comerán». Mantiene el tono normativo del mandato y resulta natural en español bíblico contemporáneo.'
- source_word: בְּכֹל מוֹשְׁבֹתֵיכֶם
  english_pob_choice: in all your dwellings
  chosen_spanish: en todas sus moradas
  alternatives_spanish:
  - en todos sus asentamientos
  - dondequiera que habiten
  - en todas sus casas
  lexicon: HALOT
  rationale: מוֹשָׁב puede referirse a lugar de residencia o asentamiento. «Moradas» conserva el alcance geográfico del mandato y suena digno en español, sin limitarlo a casas particulares.
- source_word: תֹּאכְלוּ
  english_pob_choice: you shall eat
  chosen_spanish: comerán
  alternatives_spanish:
  - deben comer
  - comerán ustedes
  lexicon: HALOT
  rationale: El imperfecto positivo aquí funciona como mandato correspondiente al negativo. «Comerán» preserva el paralelismo con la primera cláusula y mantiene el registro legal.
- source_word: מַצּוֹת
  english_pob_choice: unleavened bread
  chosen_spanish: panes sin levadura
  alternatives_spanish:
  - pan ázimo
  - azimos
  - pan sin levadura
  lexicon: HALOT
  rationale: El plural hebreo pide plural en español. «Panes sin levadura» comunica con claridad el tipo de alimento y evita una transliteración innecesaria; «sin levadura» mantiene la oposición con lo leudado.
translation_notes:
  revision_awareness: 'El texto base en inglés coincide plenamente con el hebreo en el sentido general: prohibición total de comer algo leudado y obligación de comer panes sin levadura en todos los lugares de residencia. No se detectan revisiones sustantivas pendientes; se conserva la amplitud del sustantivo hebreo y la distribución geográfica de la cláusula final.'
  spanish_consistency_notes:
  - Se prefirió «leudado» para mantener la amplitud del hebreo מַחְמֶצֶת y no restringir el mandato a «pan» en la primera cláusula.
  - Se mantuvo el plural «panes» para reflejar el plural hebreo מַצּוֹת.
  - «Moradas» traduce el alcance locativo de מוֹשְׁבֹתֵיכֶם sin introducir una domesticación excesiva.
  - La puntuación separa claramente la prohibición y el mandato positivo, como en el hebreo.
