review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura y el sentido básico del hebreo: la minjá acompañando la ofrenda previa, la repetición distributiva «mañana por mañana», las medidas, el aceite para humedecer la harina fina, y la mención explícita de Yahvé. Sin embargo, «estatutos perpetuos, continuamente» suena poco natural y no expresa bien el valor idiomático de חֻקּוֹת עוֹלָם תָּמִיד, que en este contexto apunta a un requisito duradero y regular. Además, la nota inglesa sobre ese modismo no fue preservada.'
  spanish_quality_summary: El español es en general claro y digno, pero hay una aspereza sintáctica al inicio («Y prepararás...») y, sobre todo, una frase final poco idiomática. «Flor de harina» es aceptable y tradicional; «ofrenda vegetal» también funciona, aunque «ofrenda de cereal» sería otra opción válida. La revisión propuesta mejora naturalidad sin apartarse del hebreo.
  glossary_alignment: Se alinea bien con la terminología del proyecto en «Yahvé». No hay conflictos con otros términos clave. La decisión «ofrenda vegetal» para מִנְחָה es defendible en contexto sacrificial. Conviene añadir la nota sobre el modismo de permanencia/regularidad, ya documentada en el POB inglés.
  issues:
  - severity: medium
    issue: La cláusula final «estatutos perpetuos, continuamente» es poco natural en español y transmite torpemente el modismo hebreo.
    rationale: חֻקּוֹת עוֹלָם תָּמִיד no se entiende mejor como dos fragmentos yuxtapuestos en español, sino como una exigencia permanente y regular. La traducción actual suena fragmentaria.
  - severity: medium
    issue: Falta una nota para el modismo final preservado en el POB inglés.
    rationale: El inglés documenta que el hebreo literalmente dice algo como «estatutos de perpetuidad continuamente», y esa información debe preservarse, especialmente si en español se suaviza para mayor naturalidad.
  - severity: low
    issue: «Y prepararás» al inicio es algo rígido en español.
    rationale: No es incorrecto, pero «Prepararás también» integra mejor el ו inicial y la conexión con el versículo previo sin sonar tan calcado.
