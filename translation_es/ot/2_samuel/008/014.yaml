    text: 'O: «todos los edomitas quedaron sometidos a David». El hebreo dice literalmente «todo Edom», usando el nombre de la nación de manera colectiva para referirse a su pueblo.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «Yahvé salvó o libró a David dondequiera que fue». En este contexto militar, «dio a David la victoria» expresa el sentido de liberación y triunfo.'
    reason: lexical_alternative
  revision_rationale: Se corrigió el modismo final para reflejar con fidelidad y naturalidad el hebreo בְּכֹל אֲשֶׁר הָלָךְ. También se rehízo la nota [a] para que preserve la alternativa colectiva documentada en el English POB y se ancle al lugar pertinente. Se mantuvo «quedó sometido a David» como solución española publicable para עֲבָדִים en contexto político, reforzada por la nota colectiva.
