base_translation:
  language: en
  yaml_path: translation/deuterocanon/wisdom_of_solomon/003/016.yaml
  text: But the children of adulterers will be imperfect[b][a], and the offspring of an unlawful union will perish.
  footnotes:
  - marker: a
    text: Or 'unfinished,' 'unfulfilled,' or 'without full development' for 'incomplete.' The Greek term can suggest lack of completion rather than specifying the exact form that deficiency takes.
    reason: lexical_alternative
  - marker: b
    text: Literally 'seed of an unlawful bed.' 'Bed' is a Greek idiom for sexual union or marriage bed.
    reason: lexical_alternative
