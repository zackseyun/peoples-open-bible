base_translation:
  language: en
  yaml_path: translation/ot/2_chronicles/028/023.yaml
  text: And he sacrificed to the gods of Damascus that had struck him[a], and he said, “Because the gods of the kings of Aram help them, I will sacrifice to them[c][b], that they may help me.” But they became his downfall and the downfall of all Israel.
  footnotes:
  - marker: a
    text: Or 'that were defeating him.' The Hebrew participle may be rendered as ongoing or characteristic action.
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'the gods of the kings of Aram,' preserving the plural 'kings.'
    reason: lexical_alternative
  - marker: c
    text: Or 'and they were for his ruin and for all Israel.' The Hebrew literally says 'they were to him for causing him to stumble, and to all Israel.'
    reason: lexical_alternative
