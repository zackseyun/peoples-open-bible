    rationale: El POB inglés preserva una nota explicando el modismo «for thus and thus the sword devours». La revisión española debe conservar esa alternativa/documentación, especialmente porque el texto español ya interpreta el sentido idiomático.
  - severity: low
    issue: Orden poco natural en «porque a uno y a otro devora la espada»
    rationale: Aunque no es incorrecto, en español bíblico legible resulta más natural y claro «porque la espada devora tanto a uno como a otro», que además preserva mejor la metáfora verbal con sujeto explícito.
  - severity: low
    issue: La numeración de notas debe quedar secuencial y completa tras añadir la nota omitida
    rationale: Si se añade la nota del modismo, los marcadores deben quedar únicos y en orden en el texto y en el arreglo de notas.
