revisions:
- from: Ahora, sea dado a conocer al rey que, si esta ciudad es reedificada y sus muros son terminados, no darán tributo, impuesto ni peaje, y al final dañará los ingresos de los reyes.
  to: Ahora, sepa el rey que, si esta ciudad es reconstruida y sus muros quedan terminados, no pagarán tributo, impuesto ni peaje, y al final dañará los ingresos de los reyes.[a]
  rationale: Se ajusta la fórmula oficial a un español más natural («sepa el rey»), se corrige el verbo fiscal a «no pagarán» para reflejar el uso idiomático en contexto tributario, se mejora la fluidez de la cláusula sobre los muros, y se añade la nota léxica alternativa preservada por la auditoría inglesa sobre la concisión de la expresión final aramea.
