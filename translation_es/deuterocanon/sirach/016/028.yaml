review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien el griego en sus componentes principales: ἕκαστος = «Cada uno», οὐκ ἔθλιψεν = «no oprimió», y οὐκ ἀπειθήσουσι τοῦ ῥήματος αὐτοῦ = «no desobedecerán su palabra». También mantiene correctamente el posesivo abierto de «su palabra». Sin embargo, la colocación de «nunca» en «y nunca desobedecerán su palabra» suena menos natural en español bíblico fluido que «y no desobedecerán jamás su palabra» o «y jamás desobedecerán su palabra», y la secuencia «Cada uno no oprimió» es comprensible pero algo calcada; en español más natural conviene «Ninguno oprimió a su prójimo» o «Cada uno no oprimió a su prójimo» con ajuste estilístico. Dado que el griego usa ἕκαστος distributivo, conviene conservarlo, pero con sintaxis más idiomática.'
  spanish_quality_summary: 'La calidad general es buena y fiel, pero hay dos detalles de legibilidad. Primero, «Cada uno no oprimió» suena rígido; en español es más natural anteponer el negativo al verbo o reformular distributivamente. Segundo, el pie de nota con «su prójimo[a]» es innecesario: «prójimo» ya es la mejor opción y la alternativa «vecino» no aporta una ambigüedad relevante en el texto principal. El resto del verso es claro, digno y adecuado para un registro eclesial moderno.'
  glossary_alignment: No hay conflictos con la terminología del proyecto. «Prójimo» representa bien πλησίον en contexto ético, «oprimió» representa bien θλίβω, y «su palabra» preserva con acierto la amplitud de ῥῆμα y la referencia implícita a Dios sin sobreexplicitarla.
  issues:
  - severity: medium
    issue: «Cada uno no oprimió» es una construcción poco idiomática en español.
    rationale: Aunque calca aceptablemente el distributivo griego, en español suena forzada. Una reformulación como «Ninguno oprimió a su prójimo» conserva el sentido distributivo-colectivo con mejor fluidez.
  - severity: low
    issue: La colocación de «nunca» resulta algo menos natural que alternativas españolas más fluidas.
    rationale: En este contexto, «jamás» o «no ... jamás» suena más natural y solemne sin alterar el sentido de ἕως αἰῶνος en construcción negativa.
  - severity: low
    issue: La nota sobre «prójimo»/«vecino» no es necesaria.
    rationale: La elección principal ya es correcta y no se percibe una ambigüedad nueva en español que requiera nota; mantenerla recarga innecesariamente el versículo.
  revised_spanish_text: Ninguno oprimió a su prójimo, y jamás desobedecerán su palabra.
  revision_rationale: 'Se ajustó la sintaxis para un español más natural y digno: «Ninguno oprimió» expresa con claridad el sentido distributivo de ἕκαστος sin rigidez calcada. Se cambió «nunca» por «jamás» para una cadencia más idiomática y literaria en esta construcción negativa. Se eliminó la nota sobre «prójimo» por innecesaria.'
