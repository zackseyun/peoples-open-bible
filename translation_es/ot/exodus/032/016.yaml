translation:
  language: es
  text: Y las tablas eran la obra de Dios[a], y la escritura era la escritura de Dios, grabada sobre las tablas.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «la hechura de Dios ... la inscripción de Dios». El hebreo repite «obra» y «escritura» para dar énfasis.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְ/הַ֨/לֻּחֹ֔ת
  english_pob_choice: the tablets
  chosen_spanish: las tablas
  alternatives_spanish:
  - las tablas de piedra
  - las tablas de la ley
  lexicon: HALOT
  rationale: לֻחֹת designa tablas o planchas; aquí el contexto ya las identifica como las tablas del pacto. En español, «tablas» es natural y fiel. No se añade «de piedra» porque el hebreo de este verso no lo dice explícitamente.
- source_word: מַעֲשֵׂ֥ה אֱלֹהִ֖ים
  english_pob_choice: the work of God
  chosen_spanish: la obra de Dios
  alternatives_spanish:
  - el trabajo de Dios
  - la hechura de Dios
  - hechas por Dios
  lexicon: HALOT
  rationale: La construcción nominal conserva mejor el énfasis hebreo que una paráfrasis verbal. «Obra de Dios» refleja el sustantivo מַעֲשֶׂה y mantiene la atribución directa a Dios.
- source_word: הֵ֑מָּה
  english_pob_choice: were
  chosen_spanish: eran
  alternatives_spanish:
  - ellos eran
  - éstas eran
  lexicon: HALOT
  rationale: El pronombre independiente aporta énfasis en hebreo. En español, el verbo copulativo basta para expresar el sentido sin forzar una repetición pronominal innecesaria.
- source_word: וְ/הַ/מִּכְתָּ֗ב
  english_pob_choice: the writing
  chosen_spanish: la escritura
  alternatives_spanish:
  - la inscripción
  - lo escrito
  lexicon: HALOT
  rationale: מִכְתָּב puede referirse a la escritura misma o a lo escrito. «La escritura» preserva la repetición con la frase siguiente y suena natural en español bíblico moderno.
- source_word: מִכְתַּ֤ב אֱלֹהִים֙
  english_pob_choice: the writing of God
  chosen_spanish: la escritura de Dios
  alternatives_spanish:
  - la escritura divina
  - escritura de Dios
  lexicon: HALOT
  rationale: 'Se conserva la repetición retórica del hebreo: no solo el acto, sino la escritura misma se identifica como de Dios. «La escritura de Dios» mantiene esa fuerza.'
- source_word: ה֔וּא
  english_pob_choice: was
  chosen_spanish: era
  alternatives_spanish:
  - era ello
  - era esto
  lexicon: HALOT
  rationale: El pronombre resuntivo es enfático, pero en español la cópula simple transmite el predicado con naturalidad. «Era» mantiene la continuidad del sujeto implícito.
- source_word: חָר֖וּת
  english_pob_choice: engraved
  chosen_spanish: grabada
  alternatives_spanish:
  - grabado
  - inscrita
  - esculpida
  lexicon: HALOT
  rationale: חָרוּת describe algo cortado o grabado. En español, «grabada» es claro y preciso para escritura sobre piedra; «inscrita» también sería posible, pero «grabada» conserva mejor la imagen de incisión.
- source_word: עַל הַ/לֻּחֹֽת
  english_pob_choice: on the tablets
  chosen_spanish: sobre las tablas
  alternatives_spanish:
  - en las tablas
  - en las tablas de piedra
  lexicon: HALOT
  rationale: עַל aquí es locativo. «Sobre» reproduce bien la posición del grabado y suena natural; «tablas» mantiene el término coherente con la primera mitad del verso.
theological_decisions:
- issue: Atribución de la obra y la escritura a Dios
  english_pob_reading: Both the tablets themselves and the writing on them are presented as directly God's work.
  chosen_spanish_reading: Tanto las tablas como la escritura en ellas quedan presentadas como obra y escritura directas de Dios.
  alternative_spanish_readings:
  - Las tablas fueron hechas por Dios y la escritura fue escrita por Dios.
  - Las tablas eran una obra divina y la escritura era divina.
  rationale: El hebreo usa sintagmas nominales, no verbos finitos, para atribuir ambas realidades a Dios. La traducción española conserva esa estructura para no diluir el énfasis teológico ni introducir una paráfrasis más interpretativa.
  doctrine_reference: Translation philosophy §1, §3, §5
translation_notes:
  revision_awareness: 'La revisión más reciente no introdujo cambios: el texto fue confirmado como de alto acuerdo y sin observaciones pendientes. Se mantiene la equivalencia óptima con conservación de la repetición retórica hebrea.'
  spanish_consistency_notes:
  - Se usa «Dios» de modo consistente para אֱלֹהִים, sin agregar «SEÑOR» porque aquí no aparece el Nombre divino.
  - Se mantiene «tablas» en ambas mitades del verso para reflejar la repetición del hebreo.
  - Se evita una traducción verbalizante como «hechas por Dios» para respetar la construcción nominal del original.
  - «Grabada» conserva el sentido de חָרוּת como incisión sobre piedra, sin sobretraducir a «esculpida».
