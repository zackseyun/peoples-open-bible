translation:
  language: es
  text: Y por cuanto amó a tus padres y escogió a su descendencia después de ellos[a], te sacó de Egipto mediante su presencia[b], por su gran poder.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «a su descendencia después de él». El hebreo usa sufijos singulares, probablemente tratando «tus padres» como un colectivo.
    reason: lexical_alternative
  - marker: b
    text: Literalmente, «por su rostro» o «delante de él»; aquí la expresión comunica la presencia misma de Dios en la liberación.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְתַחַת כִּי
  english_pob_choice: And because
  chosen_spanish: Y por cuanto
  alternatives_spanish:
  - Y porque
  - Y ya que
  lexicon: HALOT
  rationale: La expresión introduce la base o razón de lo afirmado antes. «Por cuanto» conserva bien el valor causal y resulta natural en español bíblico contemporáneo sin sonar mecánico.
- source_word: אָהַב
  english_pob_choice: loved
  chosen_spanish: amó
  alternatives_spanish:
  - amaba
  - tuvo amor por
  lexicon: HALOT
  rationale: El verbo expresa amor directo. «Amó» es conciso, fiel y apropiado para el contexto de elección pactal.
- source_word: אֲבֹתֶיךָ
  english_pob_choice: your fathers
  chosen_spanish: tus padres
  alternatives_spanish:
  - tus antepasados
  - tus padres ancestrales
  lexicon: HALOT
  rationale: El hebreo usa un plural masculino con sufijo de segunda persona singular. En español, «padres» conserva el paralelo familiar y pactal; «antepasados» sería posible, pero menos cercano a la forma fuente.
- source_word: וַיִּבְחַר
  english_pob_choice: chose
  chosen_spanish: escogió
  alternatives_spanish:
  - eligió
  - seleccionó
  lexicon: HALOT
  rationale: «Escogió» comunica la elección divina con claridad y mantiene el tono bíblico sin cargar el término con tecnicismos posteriores.
- source_word: בְּזַרְעוֹ אַחֲרָיו
  english_pob_choice: their offspring after them
  chosen_spanish: a su descendencia después de ellos
  alternatives_spanish:
  - a su descendencia tras ellos
  - a sus descendientes después de ellos
  lexicon: HALOT
  rationale: El texto hebreo presenta sufijos singulares, pero el referente inmediato es colectivo («tus padres»). En español, el plural «ellos» expresa esa colectividad de manera natural, y «descendencia» conserva el sentido colectivo de זרע. Se mantiene la tensión gramatical sin forzar una lectura singular inapropiada.
- source_word: וַיּוֹצִאֲךָ
  english_pob_choice: he brought you out
  chosen_spanish: te sacó
  alternatives_spanish:
  - te hizo salir
  - te llevó afuera
  lexicon: HALOT
  rationale: El hifil de יצא expresa hacer salir. En español, «te sacó» es la formulación exódica más natural y directa.
- source_word: בְּפָנָיו
  english_pob_choice: by his presence
  chosen_spanish: con su presencia
  alternatives_spanish:
  - por su presencia
  - ante su rostro
  lexicon: HALOT
  rationale: Literalmente la frase dice «por/mediante su rostro». En este contexto la idea es que Yahvé mismo actuó en la liberación. «Con su presencia» transmite esa fuerza teológica de modo claro en español y evita una literalidad opaca.
- source_word: בְּכֹחוֹ הַגָּדֹל
  english_pob_choice: by his great power
  chosen_spanish: con su gran poder
  alternatives_spanish:
  - con su gran fuerza
  - por su gran poder
  lexicon: HALOT
  rationale: כֹּחַ denota fuerza o poder. «Gran poder» reproduce bien el valor del adjetivo y mantiene el paralelismo con la frase anterior.
- source_word: מִמִּצְרָיִם
  english_pob_choice: out of Egypt
  chosen_spanish: de Egipto
  alternatives_spanish:
  - fuera de Egipto
  - desde Egipto
  lexicon: HALOT
  rationale: Con el verbo de sacar, el sentido resulta claramente exódico. En español, «de Egipto» comunica la procedencia de la liberación de forma natural y sobria.
theological_decisions:
- issue: Alcance de בְּפָנָיו en la liberación de Egipto
  english_pob_reading: by his presence
  chosen_spanish_reading: con su presencia
  alternative_spanish_readings:
  - por su presencia
  - personalmente
  rationale: La frase no debe reducirse a un mero instrumental impersonal. El punto es que Yahvé mismo acompañó y realizó la salida de Egipto. «Con su presencia» preserva ese énfasis en la acción inmediata de Dios.
  doctrine_reference: Presencia activa de Yahvé en el éxodo
- issue: Sujeto colectivo y sufijos singulares en «su descendencia después de ellos»
  english_pob_reading: their offspring after them
  chosen_spanish_reading: a su descendencia después de ellos
  alternative_spanish_readings:
  - a su descendencia después de él
  - a su descendencia tras ellos
  rationale: El hebreo conserva sufijos singulares, probablemente tratando a «tus padres» como colectivo. El español necesita decidir entre el singular formal y el plural de sentido. Se opta por el plural natural para no oscurecer el referente colectivo, manteniendo visible la tensión textual.
  doctrine_reference: Criterio gramatical-contextual, no harmonización doctrinal
translation_notes:
  revision_awareness: El borrador sigue de cerca el texto hebreo y el análisis auditado en inglés. Se conserva la estructura causal, la elección divina, el sujeto colectivo con sufijos singulares, la imagen de la presencia divina y el paralelismo final con el gran poder. No se introducen ajustes doctrinales ajenos al testimonio textual.
  spanish_consistency_notes:
  - Se usa «Yahvé» para el nombre divino según la norma del proyecto; en este versículo el texto hebreo no contiene יהוה explícito, pero la referencia contextual sigue siendo el Dios del éxodo.
  - Se mantiene un registro bíblico moderno y sobrio, evitando arcaísmos innecesarios.
  - «Descendencia» se usa como término colectivo para זרע, mientras que el plural de sentido en el sufijo se refleja en «ellos» según el contexto.
