translation:
  language: es
  text: Entonces quedaron reducidos y abatidos[a] por la opresión, la calamidad y la aflicción.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Entonces disminuyeron y fueron abatidos por la opresión, el mal y el pesar».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּמְעֲטוּ
  english_pob_choice: they were diminished
  chosen_spanish: fueron disminuidos
  alternatives_spanish:
  - se redujeron
  - se hicieron pocos
  - fueron reducidos
  lexicon: HALOT
  rationale: מעט en este waw consecutivo expresa volverse menor en número o en condición. «Fueron disminuidos» conserva el sentido resultativo y suena natural en español bíblico contemporáneo.
- source_word: וַיָּשֹׁחוּ
  english_pob_choice: brought low
  chosen_spanish: abatidos
  alternatives_spanish:
  - doblegados
  - humillados
  - hundidos
  lexicon: HALOT
  rationale: שׁחח comunica ser bajado, encorvado o puesto en condición inferior. «Abatidos» mantiene la idea de humillación y postración sin forzar una imagen corporal demasiado concreta.
- source_word: מֵעֹצֶר
  english_pob_choice: through oppression
  chosen_spanish: por la opresión
  alternatives_spanish:
  - por la constricción
  - por la aflicción
  - a causa de la opresión
  lexicon: HALOT
  rationale: עֹצֶר puede abarcar presión, restricción u opresión. Dado el contexto causal del verso, «por la opresión» expresa bien la fuerza que los llevó a esa condición.
- source_word: רָעָה
  english_pob_choice: calamity
  chosen_spanish: calamidad
  alternatives_spanish:
  - desgracia
  - adversidad
  - maldad
  lexicon: HALOT
  rationale: Aquí רָעָה no señala mal moral, sino desgracia o adversidad. «Calamidad» preserva la gravedad del término y armoniza con la serie poética del verso.
- source_word: וְיָגוֹן
  english_pob_choice: and sorrow
  chosen_spanish: y dolor
  alternatives_spanish:
  - y tristeza
  - y pesar
  - y duelo
  lexicon: HALOT
  rationale: יָגוֹן denota tristeza, pena o dolor. «Dolor» es claro en español y mantiene el componente afectivo del paralelo poético.
translation_notes:
  revision_awareness: El borrador sigue de cerca el hebreo y el audio trail inglés, sin cambios revisionales indicados; se conserva el paralelismo poético y la tríada causal/adversativa del versículo.
  spanish_consistency_notes:
  - Se evitó «SEÑOR» y cualquier sustitución teológica no presente en el verso.
  - «Opresión» traduce el valor causal de מֵעֹצֶר de forma más transparente para el lector español.
  - Se mantuvo un registro bíblico contemporáneo, sin calco excesivo del inglés.
