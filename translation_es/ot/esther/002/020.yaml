base_translation:
  language: en
  yaml_path: translation/ot/esther/002/020.yaml
  text: Esther had not made known her kindred or her people[a], just as Mordecai had commanded her; and Esther did what Mordecai said[b], as when she was under his care.
  footnotes:
  - marker: a
    text: Or 'her ancestry' for 'her family line.' The Hebrew term can refer to birth, lineage, or kindred.
    reason: lexical_alternative
  - marker: b
    text: Or 'as when she was being brought up by him.' The Hebrew recalls Esther's earlier life under Mordecai's guardianship.
    reason: lexical_alternative
