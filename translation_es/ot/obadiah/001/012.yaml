base_translation:
  language: en
  yaml_path: translation/ot/obadiah/001/012.yaml
  text: Do not look on your brother in the day of his misfortune[a], and do not rejoice over the sons of Judah in the day of their destruction[c][b]; and do not make your mouth great in the day of distress.
  footnotes:
  - marker: a
    text: Or 'look on'—the Hebrew verb is literally 'see,' but here carries the sense of looking on with malicious satisfaction, hence 'gloat over.'
    reason: lexical_alternative
  - marker: b
    text: Or 'the day of his calamity' or possibly 'the day he became a stranger/foreigner.'
    reason: lexical_alternative
  - marker: c
    text: Hebrew 'make your mouth great,' that is, speak boastfully or arrogantly.
    reason: lexical_alternative
