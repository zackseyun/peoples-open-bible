    issue: 'Expresión poco natural: ''cuando es casada'''
    rationale: Aunque intenta reflejar el pasivo del inglés auditado, en español esta construcción suena torpe y menos inteligible que 'cuando se casa', que preserva adecuadamente el cambio de estado del nifal.
  - severity: medium
    issue: Nota al pie defectuosa y autorreferencial
    rationale: 'La nota dice ''O: «cuando es casada»'' aunque esa misma forma ya está en el texto. Debe invertirse: si el texto se corrige a ''se casa'', la nota puede preservar ''es casada'' como alternativa más formal.'
