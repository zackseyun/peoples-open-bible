translation:
  language: es
  text: 'Ahora bien, esta es la parábola: la semilla es la palabra de Dios[a].'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «este es el significado de la parábola». El griego dice más literalmente: «esta es la parábola».'
    reason: lexical_alternative
lexical_decisions:
- source_word: Ἔστιν
  english_pob_choice: is
  chosen_spanish: es
  alternatives_spanish:
  - significa
  lexicon: BDAG
  rationale: La cópula griega introduce directamente la explicación de Jesús. «Es» conserva la estructura del original y evita añadir una interpretación no expresada por el texto.
- source_word: δὲ
  english_pob_choice: Now
  chosen_spanish: Ahora bien
  alternatives_spanish:
  - Y
  - Entonces
  - Ahora
  lexicon: BDAG
  rationale: δέ marca una transición suave. «Ahora bien» suena natural en español y mantiene el giro discursivo sin exagerar la secuencia.
- source_word: αὕτη ἡ παραβολή
  english_pob_choice: this is the parable
  chosen_spanish: esta es la parábola
  alternatives_spanish:
  - este es el significado de la parábola
  - esta es la explicación de la parábola
  lexicon: BDAG
  rationale: El griego dice literalmente «esta es la parábola». En español, «esta es la parábola» conserva la formulación directa, sin resolver interpretivamente el sentido como «significado» o «explicación».
- source_word: σπόρος
  english_pob_choice: seed
  chosen_spanish: semilla
  alternatives_spanish:
  - semilla sembrada
  lexicon: BDAG
  rationale: Aunque el sustantivo griego es masculino («el grano/la semilla» en uso figurado), en español «semilla» comunica con claridad la imagen agrícola y la metáfora del pasaje.
- source_word: λόγος
  english_pob_choice: word
  chosen_spanish: palabra
  alternatives_spanish:
  - mensaje
  lexicon: BDAG
  rationale: «Palabra» preserva la dicción bíblica y el paralelismo con el texto griego. «Mensaje» sería una glosa interpretativa más explicativa, pero menos cercana al término fuente.
- source_word: τοῦ θεοῦ
  english_pob_choice: of God
  chosen_spanish: de Dios
  alternatives_spanish:
  - procedente de Dios
  lexicon: BDAG
  rationale: El genitivo se traduce de manera directa como «de Dios». No hay necesidad de ampliar a «procedente de», porque el griego no lo exige.
theological_decisions:
- issue: Si traducir παραβολή como «parábola» o expandirlo a «significado/explicación de la parábola»
  english_pob_reading: parable
  chosen_spanish_reading: parábola
  alternative_spanish_readings:
  - significado de la parábola
  - explicación de la parábola
  rationale: Siguiendo el texto griego y la práctica auditada de la POB, se mantiene la forma literal. El contexto sí es explicativo, pero el verso no dice explícitamente «significado»; por eso la traducción no lo inserta en el cuerpo principal.
  doctrine_reference: Translation philosophy §§1, 3, 6
translation_notes:
  revision_awareness: No se registran revisiones aplicadas en el paquete fuente; el texto inglés auditado permanece sin cambios y con acuerdo alto entre revisiones. La versión española sigue ese mismo criterio de estabilidad textual.
  spanish_consistency_notes:
  - Se usa «Dios» para θεοῦ conforme al criterio del proyecto.
  - Se evita «Cristo» porque no aparece en el versículo.
  - Se mantiene un registro bíblico natural en español, sin convertir la explicación de Jesús en paráfrasis interpretativa.
