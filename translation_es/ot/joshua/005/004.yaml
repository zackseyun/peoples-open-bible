  yaml_path: translation/ot/joshua/005/004.yaml
  text: 'And this is the reason why Joshua circumcised them: all the people who came out of Egypt[a], the males, all the men of war[b], had died in the wilderness on the way after they came out of Egypt.'
  footnotes:
