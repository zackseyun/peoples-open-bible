translation:
  language: es
  text: Y si el profeta es engañado[a] y dice una palabra, yo, Yahvé, he engañado a ese profeta; y extenderé mi mano contra él y lo destruiré de en medio de mi pueblo Israel.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «seducido»; algunos entienden el sentido de modo más permisivo como «he permitido que ese profeta fuese engañado».
    reason: alternative_reading
lexical_decisions:
- source_word: יְפֻתֶּה
  english_pob_choice: is deceived
  chosen_spanish: es engañado
  alternatives_spanish:
  - es seducido
  - es persuadido
  lexicon: HALOT
  rationale: El pual pasivo de פתה indica que el profeta sufre la acción; en español, «es engañado» comunica con claridad el resultado en un contexto judicial. «Es seducido» o «es persuadido» son posibles, pero en este contexto pueden sonar menos precisos o demasiado suaves.
- source_word: וְדִבֶּר דָּבָר
  english_pob_choice: and speaks a word
  chosen_spanish: y dice una palabra
  alternatives_spanish:
  - y dice un mensaje
  - y pronuncia una palabra
  lexicon: HALOT
  rationale: La expresión hebrea es breve y literal, «y habla/dice una palabra». «Dice una palabra» conserva la concisión profética y la cercanía al original sin volverlo artificial en español.
- source_word: אֲנִי יְהוָה
  english_pob_choice: I, the LORD
  chosen_spanish: yo, Yahvé
  alternatives_spanish:
  - yo, el Señor
  lexicon: HALOT
  rationale: Se mantiene el nombre divino con la forma editorial de la POB en español, «Yahvé», para no enmascarar el tetragrámaton. El pronombre explícito queda reflejado con fuerza enfática en «yo».
- source_word: פִּתֵּיתִי
  english_pob_choice: have deceived
  chosen_spanish: he engañado
  alternatives_spanish:
  - he seducido
  - he permitido que fuese engañado
  lexicon: HALOT
  rationale: El piel de פתה en primera persona expresa acción divina directa. «He engañado» preserva la tensión teológica del hebreo y el paralelismo con la pasiva anterior; «he permitido que fuese engañado» suaviza más allá de lo explicitado.
- source_word: וְנָטִיתִי אֶת יָדִי עָלָיו
  english_pob_choice: and I will stretch out my hand against him
  chosen_spanish: y extenderé mi mano contra él
  alternatives_spanish:
  - y alargaré mi mano contra él
  - y extenderé mi mano sobre él
  lexicon: HALOT
  rationale: La imagen idiomática de juicio divino se conserva con «extenderé mi mano contra él». «Contra él» refleja adecuadamente la dirección hostil implícita en עָלָיו.
- source_word: וְהִשְׁמַדְתִּיו
  english_pob_choice: and destroy him
  chosen_spanish: y lo destruiré
  alternatives_spanish:
  - y lo aniquilaré
  - y lo exterminaré
  lexicon: HALOT
  rationale: El hifil de שׁמד denota destrucción fuerte. «Lo destruiré» es fiel y suficientemente solemne en español, sin cargar la línea con un término más técnico o excesivo.
- source_word: מִתּוֹךְ עַמִּי יִשְׂרָאֵל
  english_pob_choice: from the midst of my people Israel
  chosen_spanish: de en medio de mi pueblo Israel
  alternatives_spanish:
  - de entre mi pueblo Israel
  - del seno de mi pueblo Israel
  lexicon: HALOT
  rationale: «De en medio de» reproduce la imagen espacial hebrea y comunica expulsión o remoción de la comunidad del pacto. «De entre» sería más idiomático, pero menos cercano a la fórmula del texto.
theological_decisions:
- issue: Agencia divina en el engaño del profeta
  english_pob_reading: Retain the direct statement 'I, the LORD, have deceived that prophet' in the main text.
  chosen_spanish_reading: Mantener «yo, Yahvé, he engañado a ese profeta» en el texto principal.
  alternative_spanish_readings:
  - he permitido que ese profeta fuese engañado
  - he seducido a ese profeta
  rationale: El hebreo atribuye directamente la acción a Yahvé con el mismo verbo-raíz que describe el estado del profeta. La traducción conserva esa tensión teológica en vez de resolverla por paráfrasis; las alternativas quedan solo como posibilidades interpretativas.
  doctrine_reference: Translation philosophy §3 (Preserve theological tension rather than resolve it); Contested terms table for יְהוָה
translation_notes:
  revision_awareness: La revisión más reciente indicó alta concordancia y no introdujo cambios; esta propuesta sigue la decisión establecida de conservar el lenguaje directo sobre el engaño divino y la imagen de juicio sin suavizarlas.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como forma editorial para el tetragrámaton, en línea con los criterios del proyecto.
  - Se conserva el paralelismo verbal entre el engaño del profeta y la acción de Yahvé.
  - «De en medio de mi pueblo Israel» refleja la fórmula hebrea sin sustituirla por una equivalencia más libre.
