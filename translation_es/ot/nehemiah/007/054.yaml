  spanish_consistency_notes:
  - Se mantiene el patrón repetido de «los hijos de» para conservar la estructura del hebreo y la simetría del listado.
  - Se preservan los nombres propios como transliteraciones estables y publicables en español.
  - El guion largo final reproduce la suspensión del original y del inglés POB, sin añadir puntuación conclusiva.
