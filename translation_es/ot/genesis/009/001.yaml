translation:
  language: es
  text: 'Y Dios bendijo a Noé y a sus hijos, y les dijo: «Sean fecundos, multiplíquense y llenen la tierra[a]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «la tierra» en el sentido de «el país»; sin embargo, aquí «la tierra» con alcance mundial encaja mejor en el contexto posdiluviano y mantiene el eco de Génesis 1:28.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְבָרֶךְ
  english_pob_choice: blessed
  chosen_spanish: bendijo
  alternatives_spanish:
  - pronunció una bendición sobre
  - otorgó su bendición a
  lexicon: HALOT
  rationale: El piel de ברך expresa impartir bendición, no solo hablar bien. «Bendijo» es la forma natural y fiel en español para este acto divino en contexto de pacto.
- source_word: אֱלֹהִים
  english_pob_choice: God
  chosen_spanish: Dios
  lexicon: HALOT
  rationale: En este contexto narrativo, אֱלֹהִים se refiere al Dios verdadero; «Dios» comunica correctamente el referente sin añadir marcado confesional innecesario.
- source_word: נֹחַ
  english_pob_choice: Noah
  chosen_spanish: Noé
  lexicon: convención onomástica
  rationale: Los nombres propios bíblicos se transliteran según la convención natural del español bíblico; «Noé» es la forma estable y reconocible.
- source_word: בָּנָיו
  english_pob_choice: his sons
  chosen_spanish: a sus hijos
  alternatives_spanish:
  - a sus hijos varones
  - a sus hijos, los varones
  lexicon: HALOT
  rationale: El hebreo dice literalmente «sus hijos» y el contexto inmediato se refiere a los descendientes masculinos presentes en la escena. En español, «hijos» conserva la referencia natural sin introducir una repetición pesada de «varones».
- source_word: וַיֹּאמֶר לָהֶם
  english_pob_choice: and said to them
  chosen_spanish: y les dijo
  alternatives_spanish:
  - y habló con ellos
  - y les habló
  lexicon: HALOT
  rationale: La fórmula narrativa se expresa de manera directa y natural en español con «les dijo», sin añadir matices interpretativos.
- source_word: פְּרוּ
  english_pob_choice: Be fruitful
  chosen_spanish: Fructificad
  alternatives_spanish:
  - Sed fecundos
  - Dad fruto
  lexicon: HALOT
  rationale: El imperativo hebreo mantiene el eco de Génesis 1:28. «Fructificad» conserva esa relación verbal y es suficientemente claro en registro bíblico; «sed fecundos» es una alternativa válida pero menos ligada al eco léxico.
- source_word: וּרְבוּ
  english_pob_choice: and multiply
  chosen_spanish: multiplicaos
  alternatives_spanish:
  - aumentad
  - creced
  lexicon: HALOT
  rationale: «Multiplicaos» reproduce bien la idea de aumento numérico y mantiene la correspondencia tradicional con el par verbal de Génesis 1:28.
- source_word: וּמִלְאוּ
  english_pob_choice: and fill
  chosen_spanish: llenad
  alternatives_spanish:
  - repletad
  - poblad
  lexicon: HALOT
  rationale: El verbo significa «llenar». «Llenad» es la forma directa y evita la ambigüedad de «replenish», que sugeriría reponer algo agotado.
- source_word: הָאָרֶץ
  english_pob_choice: the earth
  chosen_spanish: la tierra
  alternatives_spanish:
  - la tierra habitada
  - el mundo
  lexicon: HALOT
  rationale: Aunque en inglés POB se eligió «the earth» por el contexto posdiluviano y el eco de Génesis 1:28, en español «la tierra» es la equivalencia natural y amplia para הָאָרֶץ, conservando ese mismo alcance sin forzar una expresión más interpretativa.
theological_decisions:
- issue: Eco deliberado de la comisión creacional de Génesis 1:28
  english_pob_reading: Retain the traditional phrasing 'Be fruitful and multiply and fill the earth' to preserve the deliberate verbal echo.
  chosen_spanish_reading: Conservar la secuencia «Fructificad, multiplicaos y llenad la tierra» para mantener el eco verbal con Génesis 1:28.
  alternative_spanish_readings:
  - «Tengan hijos, multiplíquense y llenen la tierra»
  - «Sean fecundos y crezcan hasta llenar la tierra»
  rationale: El hebreo repite la misma cadena imperativa de Génesis 1:28. La traducción conserva esa intertextualidad sin resolverla con paráfrasis, para no perder la conexión teológica entre creación y posdiluvio.
  doctrine_reference: Preservar la tensión y la continuidad teológica del texto fuente; equivalencia óptima con sensibilidad intertextual.
translation_notes:
  revision_awareness: Se corrigió la validación anterior integrando el marcador de nota [a] en el texto principal junto a la frase correspondiente. No se añadieron notas sin ancla y se mantuvo la decisión léxica sobre הָאָרֶץ en consonancia con el contexto y el eco de Génesis 1:28.
  spanish_consistency_notes:
  - Se usó «bendijo» para ברך en lugar de una perífrasis más larga, por naturalidad y fidelidad.
  - 'Se mantuvo el paralelismo imperativo con formas breves: «Fructificad, multiplicaos y llenad».'
  - Se eligió «la tierra» como término principal por transparencia y amplitud semántica, con nota alternativa para reflejar la opción contextual del inglés POB.
  - Se prefirió «Noé» y «hijos» como formas bíblicas estándar en español, coherentes con el registro público del texto.
