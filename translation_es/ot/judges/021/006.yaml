translation:
  language: es
  text: 'Y los hijos de Israel se entristecieron por su hermano Benjamín[a], y dijeron: «Hoy ha sido cortada una tribu de Israel».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «tuvieron compasión de su hermano Benjamín» o «lamentaron a su hermano Benjamín». El verbo hebreo puede expresar dolor, compasión o cambio de actitud según el contexto.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּנָּחֲמוּ
  english_pob_choice: grieved over
  chosen_spanish: se dolieron por
  alternatives_spanish:
  - tuvieron compasión por
  - se lamentaron por
  - se arrepintieron de
  lexicon: HALOT
  rationale: El verbo nifal de נחם puede expresar dolor, compasión o relented según el contexto. Aquí el sentido narrativo es el de aflicción por la casi destrucción de Benjamín; «se dolieron por» mantiene ese matiz emocional sin volverlo teológico ni demasiado interpretativo.
- source_word: בְּנֵי יִשְׂרָאֵל
  english_pob_choice: the sons of Israel
  chosen_spanish: los hijos de Israel
  alternatives_spanish:
  - los israelitas
  - el pueblo de Israel
  lexicon: HALOT
  rationale: «Hijos de Israel» conserva la expresión familiar/corporativa del hebreo y sigue la decisión formal del POB en inglés. «Israelitas» sería más idiomático, pero atenúa la forma del original.
- source_word: אֶל
  english_pob_choice: over
  chosen_spanish: por
  alternatives_spanish:
  - acerca de
  - por causa de
  - sobre
  lexicon: HALOT
  rationale: Con נחם, la preposición funciona como complemento del dolor o la compasión. En español, «por» comunica con naturalidad el objeto del sentimiento, evitando un calco como «sobre».
- source_word: בִּנְיָמִן אָחִיו
  english_pob_choice: Benjamin their brother
  chosen_spanish: Benjamín, su hermano
  alternatives_spanish:
  - Benjamín, el hermano de ellos
  - Benjamín, hermano de ellos
  - Benjamín, su hermano en común
  lexicon: HALOT
  rationale: El sufijo singular del hebreo se entiende colectivamente con el sujeto plural. «Su hermano» mantiene la relación de parentesco tribal y, con la puntuación, preserva la referencia sin forzar la sintaxis española.
- source_word: נִגְדַּע
  english_pob_choice: has been cut off
  chosen_spanish: ha sido cortada
  alternatives_spanish:
  - ha sido arrancada
  - ha sido destruida
  - ha sido segada
  lexicon: HALOT
  rationale: גדע conserva la imagen de cortar/cortar de raíz. En español, «ha sido cortada» reproduce la metáfora con claridad; el sujeto implícito «una tribu» hace que el femenino concuerde naturalmente.
- source_word: הַיּוֹם
  english_pob_choice: Today
  chosen_spanish: Hoy
  alternatives_spanish:
  - Este día
  lexicon: HALOT
  rationale: «Hoy» es el equivalente natural y solemne en español, preservando la inmediatez del lamento.
- source_word: שֵׁבֶט אֶחָד
  english_pob_choice: one tribe
  chosen_spanish: una tribu
  alternatives_spanish:
  - una sola tribu
  - una tribu sola
  lexicon: HALOT
  rationale: La expresión designa una unidad tribal dentro de Israel. En español, «una tribu» transmite directamente el número y la unidad sin sobrecargar el estilo.
- source_word: מִיִּשְׂרָאֵל
  english_pob_choice: from Israel
  chosen_spanish: de Israel
  alternatives_spanish:
  - de entre Israel
  - fuera de Israel
  lexicon: HALOT
  rationale: La preposición separativa se expresa de manera natural como «de» en español cuando indica retirada del conjunto nacional. «De Israel» conserva la relación de pertenencia y la pérdida desde el cuerpo de Israel.
translation_notes:
  revision_awareness: La revisión más reciente indica que no hubo cambios adicionales; este borrador sigue el acuerdo alto del cotejo y mantiene la metáfora de «cortada» para נִגְדַּע y el valor afectivo de נחם sin suavizarlo hacia una lectura puramente judicial o litúrgica.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como forma base del proyecto, pero este versículo no contiene el nombre divino.
  - Se conserva el tono narrativo sobrio y formal, con vocabulario común pero no coloquial.
  - La nota[a] se ancla en «se dolieron» para reflejar la ambigüedad lexical del verbo hebreo.
