translation:
  language: es
  text: Y los dirigentes trajeron las piedras de ónice[a] y las piedras para engaste, para el efod y para el pectoral[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O posiblemente «las piedras shoham»; la identificación exacta de esta gema es incierta, aunque «ónice» es la traducción tradicional.
    reason: lexical_alternative
  - marker: b
    text: O «coraza del pecho». El hebreo se refiere al adorno sacerdotal que se llevaba en el pecho, no a una armadura.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהַנְּשִׂאִם
  english_pob_choice: the leaders
  chosen_spanish: los dirigentes
  alternatives_spanish:
  - los líderes
  - los jefes
  - los príncipes
  lexicon: HALOT
  rationale: נְשִׂיאִים designa a personas de rango o autoridad dentro del pueblo; en español, 'dirigentes' comunica esa función sin sugerir monarquía como podría ocurrir con 'príncipes'. Mantuve el plural definido por el contexto narrativo.
- source_word: הֵבִיאוּ
  english_pob_choice: brought
  chosen_spanish: trajeron
  alternatives_spanish:
  - llevaron
  - presentaron
  - trajeron consigo
  lexicon: HALOT
  rationale: El Hifil de בוא aquí expresa aportar o llevar algo a la ocasión. 'Trajeron' es natural en español y conserva la idea de aportar materiales a la obra.
- source_word: אַבְנֵי הַשֹּׁהַם
  english_pob_choice: the onyx stones
  chosen_spanish: las piedras de ónice
  alternatives_spanish:
  - las piedras shoham
  - las piedras de ónix
  lexicon: HALOT
  rationale: La tradición de traducción bíblica suele ver שֹׁהַם como 'ónice'; en español, 'ónice' es el equivalente habitual y claro. 'Ónix' es una alternativa moderna posible, pero 'ónice' conserva mejor la forma tradicional asociada a contextos sacerdotales.
- source_word: אַבְנֵי הַמִּלֻּאִים
  english_pob_choice: the stones for setting
  chosen_spanish: las piedras para engaste
  alternatives_spanish:
  - las piedras de engaste
  - las piedras de montura
  - las piedras de relleno
  lexicon: HALOT
  rationale: מִלֻּאִים en este contexto cultual alude al modo en que las piedras quedan montadas en su soporte. 'Para engaste' comunica la función con naturalidad y evita la literalidad opaca de 'piedras de llenado'.
- source_word: לָאֵפֹד
  english_pob_choice: for the ephod
  chosen_spanish: para el efod
  alternatives_spanish:
  - para el efod sacerdotal
  lexicon: HALOT
  rationale: אֵפֹד es un término técnico del vestuario sacerdotal sin equivalente exacto. Se conserva por transliteración como 'efod', como en la tradición auditada.
- source_word: וְלַחֹשֶׁן
  english_pob_choice: and for the breastpiece
  chosen_spanish: para el pectoral
  alternatives_spanish:
  - para el pectoral sacerdotal
  - para el pecho
  - para el broche de pecho
  lexicon: HALOT
  rationale: חֹשֶׁן se refiere al ornamento sacerdotal del pecho; 'pectoral' es preciso y menos equívoco que 'coraza' o 'placa del pecho'. Evita el sentido militar de 'breastplate' y mantiene la función cultual.
translation_notes:
  revision_awareness: 'El texto inglés auditado mantiene ''onyx stones'' y ''stones for setting'' con notas alternativas, y distingue ''breastpiece'' de ''breastplate''. La versión española conserva esa misma tensión lexical: usa ''ónice'' y ''pectoral'', con notas que preservan las alternativas y la incertidumbre del término hebreo.'
  spanish_consistency_notes:
  - Se mantuvo el paralelismo de la lista de materiales con 'para el efod y para el pectoral'.
  - Se evitó 'SEÑOR' u otra sustitución no presente en el versículo.
  - No se introdujo explicación doctrinal porque el versículo es inventarial y no presenta un punto teológico disputado.
