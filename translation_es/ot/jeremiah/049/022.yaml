  to: He aquí[a], como un águila subirá, volará y extenderá sus alas sobre Bosra, y el corazón de los guerreros de Edom en aquel día será como el corazón de una mujer con dolores de parto.
  rationale: Se ajusta 'se elevará' a 'volará' para reflejar mejor el segundo verbo hebreo tras 'subirá'. Se suaviza la puntuación para un español más natural y se cambia 'mujer en parto' por 'mujer con dolores de parto' para expresar con mayor claridad el matiz de angustia/labor del participio hebreo.
