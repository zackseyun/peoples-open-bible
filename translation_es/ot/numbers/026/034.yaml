    rationale: En este censo tribal, מִשְׁפְּחֹת se refiere a subdivisiones de clan, no simplemente a unidades domésticas. «Clanes» preserva mejor la precisión social del hebreo y la decisión léxica auditada en inglés.
  - severity: high
    issue: «los contados de ellas» es poco natural
    rationale: Aunque intenta ser literal, la construcción no suena española y puede confundir. La fórmula censal de פקד aquí apunta a los registrados/contados en el censo; «los inscritos en el censo de ellos» comunica eso con claridad y fidelidad.
  - severity: medium
    issue: Nota al pie con «musterados»
    rationale: «Musterados» no es una opción natural ni ampliamente inteligible en español eclesial general. Debe sustituirse por alternativas españolas como «los registrados» o «los contados».
