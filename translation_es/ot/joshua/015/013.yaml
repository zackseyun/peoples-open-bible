translation:
  language: es
  text: 'Y a Caleb hijo de Jefone le dio una porción entre los hijos de Judá, conforme al mandato de Yahvé[a] a Josué: Quiriat-arba (Arba fue el padre de Anac), es decir[b], Hebrón.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O ‘conforme a la palabra de Yahvé’. El hebreo dice literalmente ‘según la boca de Yahvé’.
    reason: lexical_alternative
  - marker: b
    text: ‘Padre de Anac’ también puede significar ‘antepasado’ o ‘fundador’ de Anac.
    reason: lexical_alternative
lexical_decisions:
- source_word: וּ/לְ/כָלֵב
  english_pob_choice: And to Caleb
  chosen_spanish: Y a Caleb
  alternatives_spanish:
  - Ahora a Caleb
  - Pero a Caleb
  lexicon: HALOT
  rationale: El prefijo conjuntivo y la preposición se vierten naturalmente como una coordinación con dativo en español. ‘Y a Caleb’ conserva el enlace del hebreo sin sobrecargar el arranque de la cláusula.
- source_word: בֶּן יְפֻנֶּה
  english_pob_choice: son of Jephunneh
  chosen_spanish: hijo de Jefone
  alternatives_spanish:
  - hijo de Jephunneh
  lexicon: HALOT
  rationale: Se mantiene la relación filial estándar. ‘Jefone’ es la forma castellana más natural y reconocible del nombre propio en contexto bíblico.
- source_word: נָתַן חֵלֶק
  english_pob_choice: he gave a portion
  chosen_spanish: le dio una porción
  alternatives_spanish:
  - le asignó una porción
  - le concedió una porción
  lexicon: HALOT
  rationale: El binomio verbal expresa la entrega de una heredad/porción. ‘Le dio una porción’ preserva la acción verbal sin introducir un tecnicismo administrativo no exigido por el hebreo.
- source_word: בְּ/ת֣וֹךְ בְּנֵֽי יְהוּדָה
  english_pob_choice: among the sons of Judah
  chosen_spanish: entre los hijos de Judá
  alternatives_spanish:
  - en medio de los hijos de Judá
  - entre el pueblo de Judá
  lexicon: HALOT
  rationale: ‘Entre’ comunica bien el valor locativo-relacional de בְּתוֹךְ. ‘Hijos de Judá’ conserva la designación tribal transparente del hebreo.
- source_word: אֶל פִּי יְהוָה
  english_pob_choice: according to the command of Yahweh
  chosen_spanish: conforme a la boca de Yahvé
  alternatives_spanish:
  - según la palabra de Yahvé
  - conforme al mandato de Yahvé
  lexicon: HALOT
  rationale: Se conserva la imagen idiomática literal ‘boca de Yahvé’ porque el hebreo la usa de forma estable y el POB inglés la documenta como alternativa. En español, ‘conforme a la boca de’ resulta comprensible en registro bíblico y mantiene la tensión entre literalidad e idiomatismo.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: 'Se sigue la política del proyecto para el Tetragrámaton: transliteración del nombre divino en lugar de sustitución por un título.'
- source_word: לִֽ/יהוֹשֻׁעַ
  english_pob_choice: to Joshua
  chosen_spanish: a Josué
  alternatives_spanish:
  - para Josué
  - por medio de Josué
  lexicon: HALOT
  rationale: El לamed marca el destinatario/relación indirecta del dicho divino. ‘A Josué’ reproduce con naturalidad esa función en español.
- source_word: קִרְיַת אַרְבַּע
  english_pob_choice: Kiriath-arba
  chosen_spanish: Quiriat-arba
  alternatives_spanish:
  - Kiriat-arba
  - la ciudad de Arba
  lexicon: HALOT
  rationale: Nombre propio de lugar transliterado al español de forma usual y legible.
- source_word: אֲבִי הָ/עֲנָק
  english_pob_choice: the father of Anak
  chosen_spanish: el padre de Anac
  alternatives_spanish:
  - el antepasado de Anac
  - el fundador de Anac
  lexicon: HALOT
  rationale: Se conserva la expresión genealógica tradicional del hebreo. ‘Padre’ mantiene la metáfora relacional y la nota histórica del texto; ‘Anac’ sigue la forma española del nombre.
- source_word: הִ֥יא חֶבְרֽוֹן
  english_pob_choice: that is, Hebron
  chosen_spanish: es decir, Hebrón
  alternatives_spanish:
  - o sea, Hebrón
  - esto es, Hebrón
  lexicon: HALOT
  rationale: La secuencia identifica Kiriat-arba con Hebrón. ‘Es decir’ es una equivalencia clara y natural para la apposición explicativa.
theological_decisions:
- issue: Sujeto implícito de ‘dio una porción’
  english_pob_reading: Left implicit in English as 'he gave,' with the following phrase clarifying that the allotment was in accordance with the LORD's command to Joshua.
  chosen_spanish_reading: Se deja implícito en español como ‘le dio’, sin explicitar si el sujeto es Josué o Yahvé.
  alternative_spanish_readings:
  - Josué le dio una porción
  - Yahvé le dio una porción
  rationale: El hebreo no nombra el sujeto en esta cláusula. Mantener la ambigüedad evita resolver interpretivamente una relación que el texto conserva condensada, y respeta la tensión auditada por el POB inglés.
  doctrine_reference: Preservar la ambigüedad textual donde el original no la resuelve.
- issue: Alcance de ‘la boca de Yahvé’
  english_pob_reading: according to the command of Yahweh
  chosen_spanish_reading: conforme a la boca de Yahvé
  alternative_spanish_readings:
  - según la palabra de Yahvé
  - conforme al mandato de Yahvé
  rationale: La frase hebrea es idiomática y puede entenderse como ‘según el mandato/la palabra’. Se conserva la metáfora literal porque el inglés POB registra esa alternativa y el español puede soportarla sin perder inteligibilidad.
  doctrine_reference: Respetar la formulación idiomática del texto fuente sin borrar su fuerza semítica.
translation_notes:
  revision_awareness: Se siguió la revisión auditada que aclaró que Arba, y no Quiriat-arba, es identificado como el padre de Anac/Anak; por eso la apposición queda entre paréntesis y la identificación final se reserva para Hebrón. También se conservó la alternativa idiomática del ‘mouth of Yahweh’ como nota, en línea con el registro de revisión del POB inglés.
  spanish_consistency_notes:
  - Se usa ‘Yahvé’ consistentemente para יְהוָה.
  - Se mantiene ‘hijos de Judá’ para la designación tribal, siguiendo el paralelismo del hebreo.
  - ‘Anac’ se adopta como forma española del nombre, con nota alternativa sobre el valor de אָב.
  - 'La puntuación reproduce la relación apposicional del original: nombre del lugar, inciso explicativo, identificación final.'
  - No se explicita el sujeto del verbo principal para conservar la ambigüedad del hebreo.
