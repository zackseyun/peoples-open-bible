  rationale: Se ajusta la nota [b] para reflejar la alternativa y la rationale documentadas en el POB inglés, se mejora la fluidez de la primera cláusula con «vástagos», y se sustituye «endecha» por «lamentación» para mayor claridad y mejor alineación con la decisión principal auditada.
