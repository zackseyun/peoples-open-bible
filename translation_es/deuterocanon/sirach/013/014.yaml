translation:
  language: es
  text: Toda carne ama a su propia especie[a], y toda persona al que es como ella.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Griego: «y todo hombre a su prójimo». El hebreo dice más literalmente: «el que es semejante a él».'
    reason: alternative_reading
lexical_decisions:
- source_word: כָּל הַבָּשָׂר / πᾶν ζῷον
  english_pob_choice: All flesh
  chosen_spanish: Toda carne
  alternatives_spanish:
  - Todas las criaturas
  - Todo ser viviente
  lexicon: HALOT; LXX concordancia
  rationale: '"Carne" conserva el registro concreto y proverbial del hebreo, y sigue de cerca la formulación del POB en inglés. Aunque el griego paralelo usa ζῷον, el hebreo ofrece la base principal; por eso se mantiene una traducción que preserve el matiz corporal y general de la sentencia.'
- source_word: מִינוֹ
  english_pob_choice: its own kind
  chosen_spanish: a los de su misma especie
  alternatives_spanish:
  - a los de su propio tipo
  - a los de su misma clase
  lexicon: HALOT
  rationale: מִין expresa especie, clase o tipo. En español, "su misma especie" comunica con naturalidad la idea de afinidad entre seres semejantes, sin volver la frase demasiado técnica ni perder el alcance proverbial.
- source_word: וְכָל אָדָם
  english_pob_choice: and every person
  chosen_spanish: y toda persona
  alternatives_spanish:
  - y todo ser humano
  - y todo hombre
  lexicon: HALOT
  rationale: Se sigue la revisión inglesa que prefirió "person" por naturalidad e inclusión. En español, "persona" expresa bien אָדָם como humano genérico y evita una marcación de género innecesaria.
- source_word: אֶת הַדּוֹמֶה לוֹ
  english_pob_choice: the one like himself
  chosen_spanish: al que es semejante a ella
  alternatives_spanish:
  - al que se le parece
  - al semejante a él
  lexicon: HALOT
  rationale: הַדּוֹמֶה לוֹ significa literalmente "el semejante a él / el que se parece a él". En español, "al que es semejante a ella" mantiene el sentido comparativo y coordina con "persona" sin introducir el término interpretativo "prójimo" en el texto principal.
theological_decisions:
- issue: Hebreo frente a griego en el segundo hemistiquio
  english_pob_reading: The Hebrew reads more literally, 'the one like him.' The Greek footnote offers 'his neighbor.'
  chosen_spanish_reading: Seguir "al que es semejante a ella" en el texto principal, con nota sobre "su prójimo" como testimonio griego alterno.
  alternative_spanish_readings:
  - su prójimo
  - el que es como él
  rationale: Como el hebreo conservado es la base primaria cuando existe, el texto principal debe reflejar la semejanza y no expandir prematuramente a la idea ética de "prójimo". La lectura griega sigue siendo un testimonio antiguo importante y merece quedar preservada en nota.
  doctrine_reference: 'PHILOSOPHY.md: translate from Hebrew where Sirach Hebrew survives; use Greek parallel as actual input/consistency check'
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión inglesa que cambió "man" por "person" para אָדָם. La versión española adopta ese ajuste con "persona" y conserva la tensión fuente principal hebrea / paralelo griego en una nota breve.
  spanish_consistency_notes:
  - Se evita "SEÑOR" y otras máscaras no pertinentes; no aplica aquí.
  - '"Carne" mantiene el registro sapiencial concreto del hebreo.'
  - '"Persona" se usa para אָדָם en sentido genérico, coherente con la revisión auditada.'
  - La nota conserva la alternativa griega sin desplazar el sentido hebreo del texto principal.
