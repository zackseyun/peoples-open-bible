translation:
  language: es
  text: Velen con cuidado[a] y guárdenlos hasta que los pesen delante de los principales sacerdotes, y los levitas, y los jefes de las casas paternas[b] de Israel, en Jerusalén, en las cámaras[c] de la casa de Yahvé[d].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «Velen con cuidado y guárdenlos». Los imperativos hebreos enfatizan una vigilancia cuidadosa sobre los objetos confiados.
    reason: lexical_alternative
  - marker: b
    text: Lit. «casas paternas»; se refiere a jefaturas de clan o de linaje.
    reason: cultural_note
  - marker: c
    text: Las «cámaras» son salas o aposentos del complejo del templo.
    reason: lexical_alternative
  - marker: d
    text: Heb. «la casa de Yahvé», es decir, el templo.
    reason: lexical_alternative
lexical_decisions:
- source_word: שִׁקְדוּ
  english_pob_choice: Be watchful
  chosen_spanish: Velen con cuidado
  alternatives_spanish:
  - Estén vigilantes
  - Manténganse alertas
  lexicon: HALOT
  rationale: El imperativo pide vigilancia atenta sobre los objetos confiados; en español, «velen con cuidado» conserva el matiz de vigilancia sostenida sin sonar rígido.
- source_word: וְשִׁמְרוּ
  english_pob_choice: and guard them
  chosen_spanish: y guárdenlos
  alternatives_spanish:
  - y cuídenlos
  - y préservenlos
  lexicon: HALOT
  rationale: שׁמר expresa guardar/proteger; «guárdenlos» mantiene la fuerza protectora y la referencia implícita a los bienes ya mencionados en el contexto inmediato.
- source_word: עַד תִּשְׁקְלוּ
  english_pob_choice: until you weigh them out
  chosen_spanish: hasta que los pesen
  alternatives_spanish:
  - hasta que los pesen y entreguen
  - hasta que sean pesados
  lexicon: HALOT
  rationale: El verbo se refiere al acto de pesar para rendición de cuentas; en español, la construcción directa «los pesen» comunica el procedimiento sin añadir elementos no presentes en el hebreo.
- source_word: לִפְנֵי
  english_pob_choice: before
  chosen_spanish: delante de
  alternatives_spanish:
  - en presencia de
  lexicon: HALOT
  rationale: «Delante de» es natural en español y conserva la idea de comparecer ante autoridades presentes.
- source_word: שָׂרֵי הַכֹּהֲנִים
  english_pob_choice: the chief priests
  chosen_spanish: los jefes de los sacerdotes
  alternatives_spanish:
  - los principales sacerdotes
  - los dirigentes de los sacerdotes
  lexicon: HALOT
  rationale: Prefiero una traducción descriptiva que refleje la estructura hebrea sin importar un término técnico posterior del NT; «jefes de los sacerdotes» es fiel y claro.
- source_word: וְהַלְוִיִּם
  english_pob_choice: and the Levites
  chosen_spanish: de los levitas
  alternatives_spanish:
  - y de los levitas
  lexicon: HALOT
  rationale: Mantiene la lista de autoridades y la fluidez castellana; el caso genitivo en español ayuda a enlazar los grupos convocados ante quienes se hará el pesaje.
- source_word: וְשָׂרֵי הָאָבוֹת לְיִשְׂרָאֵל
  english_pob_choice: and the heads of the fathers’ houses of Israel
  chosen_spanish: y de los jefes de las casas paternas de Israel
  alternatives_spanish:
  - y de los jefes de las casas ancestrales de Israel
  - y de los cabezas de las casas paternas de Israel
  lexicon: HALOT
  rationale: Conservo la expresión formal del hebreo para no perder el matiz clan/linaje; «casas paternas» refleja el modismo bíblico mejor que «familias».
- source_word: בִּירוּשָׁלָם
  english_pob_choice: in Jerusalem
  chosen_spanish: en Jerusalén
  lexicon: HALOT
  rationale: Topónimo convencional en español.
- source_word: הַלִּשְׁכוֹת
  english_pob_choice: the chambers
  chosen_spanish: en las cámaras
  alternatives_spanish:
  - en los aposentos
  - en las salas
  lexicon: HALOT
  rationale: «Cámaras» preserva el sentido arquitectónico/cultual del recinto del templo mejor que una palabra más genérica.
- source_word: בֵּית יְהוָה
  english_pob_choice: the house of Yahweh
  chosen_spanish: la casa de Yahvé
  alternatives_spanish:
  - el templo de Yahvé
  - la casa del Señor
  lexicon: HALOT
  rationale: Se mantiene el nombre divino «Yahvé» según el criterio del proyecto, y la imagen literal de «casa» para בית; «templo» sería contextual pero menos formalmente equivalente.
theological_decisions:
- issue: Rendering of the divine name יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: El texto hebreo contiene el Tetragrámaton; en el español del proyecto se usa «Yahvé» para preservar el nombre del pacto y evitar la sustitución litúrgica por un título.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Nature of the officials before whom the weighing occurs
  english_pob_reading: the chief priests and the Levites and the heads of the fathers’ houses of Israel
  chosen_spanish_reading: los jefes de los sacerdotes, de los levitas y de los jefes de las casas paternas de Israel
  alternative_spanish_readings:
  - los principales sacerdotes
  - los líderes de las casas familiares de Israel
  rationale: La lista hebrea reúne cargos y jefaturas clanales; la redacción elegida conserva esa estratificación institucional sin nivelarla a un solo término genérico.
  doctrine_reference: EZRA 8:29 contextual governance structure
translation_notes:
  revision_awareness: La versión inglesa revisada cambió «Be diligent» por «Be watchful» para reflejar mejor la vigilancia implicada en שִׁקְדוּ. La redacción española adopta directamente ese matiz con «Velen con cuidado», manteniendo además la secuencia procedural de pesar los bienes ante las autoridades nombradas y la referencia explícita a la casa de Yahvé.
  spanish_consistency_notes:
  - Se usó «Yahvé» de manera consistente para יְהוָה.
  - Se evitó «Cristo»/«Señor» por no corresponder al hebreo del versículo.
  - Se preservó la estructura formal de la lista de autoridades y el modismo «casas paternas».
  - «Cámaras» conserva el registro cultual del espacio del templo.
