translation:
  language: es
  text: Lo observaban, y Apame, la hija de Bartaco[a] el admirable[b], la concubina del rey, sentada a la derecha del rey,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El nombre propio puede transcribirse también como «Bartakes».
    reason: lexical_alternative
  - marker: b
    text: El epíteto traducido «el admirable» también puede verterse como «el ilustre» o «el famoso».
