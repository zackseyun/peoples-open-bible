  spanish_quality_summary: El texto es claro y legible, pero «nos alegró su llegada» cambia una construcción verbal personal por una impersonal-causativa. Además, «mandados» suena menos natural y menos digno en este contexto diplomático que «enviados». Conviene también evitar «vuestra» para mantener un español neutral latinoamericano; «su» funciona bien aquí sin pérdida de número ni registro.
  glossary_alignment: No hay términos teológicos sensibles en el versículo. El tratamiento de οἱ πρεσβεῖαι con nota alternativa está bien alineado con el audit trail inglés. Se recomienda ajustar οἱ ἀποσταλέντες a «habían sido enviados» y mantener un registro diplomático natural en español.
  issues:
  - severity: medium
    issue: «nos alegró su llegada» no reproduce fielmente ηὐφράνθημεν
    rationale: El griego expresa una reacción en primera persona plural («nos regocijamos / nos alegramos»). La redacción actual convierte la idea en una construcción causativa con otro sujeto, lo cual altera levemente la forma y el énfasis del original.
  - severity: low
    issue: «mandados» es menos natural que «enviados» en contexto diplomático
    rationale: Aunque no es incorrecto, «mandados» puede sonar más coloquial o menos preciso. «Enviados» enlaza mejor con πρεσβεῖαι y con el registro del pasaje.
  - severity: low
    issue: «vuestra» desentona con el objetivo de español neutral latinoamericano
    rationale: El uso de «vuestra» no es necesario para reflejar el plural y puede sonar peninsular o arcaizante para muchos lectores. «Su gloria y honor» mantiene claridad y dignidad.
