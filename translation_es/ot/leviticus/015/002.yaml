review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien la estructura y el sentido del hebreo: mandato de hablar a los hijos de Israel, fórmula casuística con ''Cuando'', referencia masculina específica, y distinción ritual de טָמֵא. También preserva adecuadamente la alternativa de מִבְּשָׂרוֹ como ''de su carne''. Sin embargo, hay un problema importante de concordancia y de foco semántico en la primera cláusula verbal.'
  spanish_quality_summary: El español es mayormente claro y digno, pero 'Habla ... y diles' cambia el mandato plural hebreo a singular sin apoyo contextual suficiente en este registro. Además, 'emisión' suena menos natural y menos preciso que 'flujo' en este contexto levítico de secreción corporal anormal. La frase final 'su emisión es inmunda' es comprensible, pero en español legal-bíblico suena más natural como 'su flujo es inmundo'.
  glossary_alignment: 'No hay conflicto con los términos teológicos globales del proyecto. La decisión sobre טָמֵא como ''inmundo'' es defendible en Levítico. La principal desviación es gramatical: דַּבְּרוּ ... וַאֲמַרְתֶּם son plurales y el borrador los singulariza. También conviene mejorar la consistencia léxica de זָב / זוֹבוֹ con ''flujo''.'
  issues:
  - severity: high
    issue: 'El imperativo plural hebreo fue cambiado a singular: ''Habla ... y diles''.'
    rationale: 'דַּבְּרוּ y וַאֲמַרְתֶּם son formas plurales masculinas. Sin evidencia contextual adicional en el registro proporcionado, el español debe conservar el plural: ''Hablen ... y díganles''.'
  - severity: medium
    issue: '''Emisión'' para זָב / זוֹבוֹ es menos natural y menos claro en este contexto de pureza ritual.'
    rationale: Aunque posible, 'emisión' en español puede sonar eufemística o demasiado asociada a un evento puntual. 'Flujo' comunica mejor una secreción corporal continua o anormal y funciona bien en lenguaje bíblico-jurídico.
  - severity: low
    issue: La nota al pie 'O "descarga"' no conserva la mejor alternativa española principal una vez revisado el texto.
    rationale: Si el texto principal usa 'flujo', la alternativa más directa y útil sigue siendo 'emisión' o 'descarga'; conviene alinear la nota con la nueva elección léxica.
  revised_spanish_text: 'Hablen a los hijos de Israel y díganles: Cuando algún hombre tenga un flujo[a] de su cuerpo[b], su flujo es inmundo.'
  revised_footnotes:
