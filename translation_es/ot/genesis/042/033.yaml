translation:
  language: es
  text: 'Entonces el hombre[a], el señor de la tierra, nos dijo: «Por esto sabré que ustedes son honestos: dejen conmigo a uno de sus hermanos, tomen provisiones para el hambre de sus hogares, y váyanse.»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo literalmente: «tomen el hambre de sus casas». El sentido es que tomen provisiones, especialmente grano, para la hambruna que afectaba a sus hogares.'
    reason: lexical_alternative
lexical_decisions:
- source_word: הָאִישׁ אֲדֹנֵי הָאָרֶץ
  english_pob_choice: the man, the lord of the land
  chosen_spanish: el hombre, el señor de la tierra
  alternatives_spanish:
  - el hombre, el dueño de la tierra
  - el hombre, el soberano de la tierra
  lexicon: HALOT
  rationale: 'Se conserva la apposición simple del hebreo: primero ''el hombre'' y luego el título de autoridad. ''Señor de la tierra'' comunica bien el rango sin introducir la idea de posesión absoluta que tendría ''dueño''.'
- source_word: בְּזֹאת
  english_pob_choice: By this
  chosen_spanish: Por esto
  alternatives_spanish:
  - Con esto
  - En esto
  lexicon: HALOT
  rationale: La fórmula expresa el criterio o prueba mediante la cual se conocerá su condición. 'Por esto' es natural en español y mantiene el valor instrumental/criteriológico.
- source_word: אֵדַע
  english_pob_choice: I will know
  chosen_spanish: sabré
  alternatives_spanish:
  - conoceré
  - llegaré a saber
  lexicon: HALOT
  rationale: El yiqtol en discurso directo tiene valor futuro resultativo. 'Sabré' expresa de forma directa ese conocimiento que depende de la prueba.
- source_word: כֵנִים
  english_pob_choice: honest
  chosen_spanish: sinceros
  alternatives_spanish:
  - honestos
  - rectos
  - verdaderos
  lexicon: HALOT
  rationale: En este contexto narrativo el término describe a hombres comprobables, no espías ni engañadores. 'Sinceros' comunica la integridad y franqueza del grupo con naturalidad en español, sin reducirlo solo a una categoría legal.
- source_word: אֲחִיכֶם הָאֶחָד
  english_pob_choice: one of your brothers
  chosen_spanish: uno de sus hermanos
  alternatives_spanish:
  - su hermano, el uno
  - uno entre sus hermanos
  lexicon: HALOT
  rationale: El hebreo identifica a un solo hermano dentro del grupo. En español, 'uno de sus hermanos' es idiomático y preserva esa selección individual.
- source_word: הַנִּיחוּ אִתִּי
  english_pob_choice: leave one of your brothers with me
  chosen_spanish: dejen conmigo a uno de sus hermanos
  alternatives_spanish:
  - dejen a uno de sus hermanos conmigo
  - déjenlo conmigo
  lexicon: HALOT
  rationale: הניח en este contexto significa dejar o permitir que permanezca. 'Dejen conmigo' reproduce la idea de retener a uno con la autoridad hablante.
- source_word: רַעֲבוֹן בָּתֵּיכֶם
  english_pob_choice: grain for the famine of your households
  chosen_spanish: provisiones para el hambre de sus casas
  alternatives_spanish:
  - grano para el hambre de sus casas
  - alimento para la hambruna de sus casas
  lexicon: HALOT
  rationale: El hebreo dice literalmente algo como 'el hambre de sus casas', pero el contexto inmediato es la compra de alimento en Egipto. 'Provisiones' permite incluir el suministro necesario sin fijar demasiado en una sola mercancía, aunque el sentido contextual apunta especialmente a grano.
- source_word: קְחוּ וָלֵכוּ
  english_pob_choice: take ... and go
  chosen_spanish: tomen ... y váyanse
  alternatives_spanish:
  - tomen ... y vayan
  - llévense ... y váyanse
  lexicon: HALOT
  rationale: Se conservan dos imperativos simples y secuenciales. 'Váyanse' da en español la idea de partir o irse, conforme al cierre abrupto del mandato.
theological_decisions:
- issue: Valor de כֵנִים en el juicio narrativo
  english_pob_reading: honest
  chosen_spanish_reading: sinceros
  alternative_spanish_readings:
  - honestos
  - rectos
  rationale: No se trata de una afirmación abstracta de virtud moral en general, sino de una prueba narrativa de integridad frente a la sospecha. 'Sinceros' mantiene esa tensión entre veracidad e integridad relacional sin sobrerreligiosizar el término.
  doctrine_reference: Ética bíblica del testimonio veraz y la integridad (cf. Pr 12:22, en sentido general)
translation_notes:
  revision_awareness: Se siguió el texto hebreo masorético (WLC) y el audit trail inglés existente. No hubo revisiones aplicadas en el registro inglés; por tanto, la redacción española se elaboró directamente a partir del hebreo y de las decisiones léxicas auditadas, manteniendo el sentido contextual de la escena de compra de alimento en Egipto.
  spanish_consistency_notes:
  - Se mantuvo 'Yahvé' fuera del versículo porque no aparece ninguna forma del nombre divino en el hebreo de este pasaje.
  - Se evitó 'Cristo/Mesías' por no ser pertinente.
  - Se preservó la referencia espacial 'la tierra' como traducción de הָאָרֶץ, sin convertirla en 'país' para no estrechar indebidamente el alcance del término.
  - El texto usa comillas españolas y puntuación natural para diálogo directo, conforme al estilo de publicación en español.
