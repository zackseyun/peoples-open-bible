translation:
  language: es
  text: Y Dios se acordó de su pueblo[a], y vindicó su heredad.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'lo justificó' o 'hizo justicia a su heredad'. El verbo griego puede llevar fuerza legal o vindicatoria; aquí se vierte en sentido corporativo, como defensa pública de su pueblo.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐμνήσθη
  english_pob_choice: remembered
  chosen_spanish: se acordó
  alternatives_spanish:
  - recordó
  - se recordó de
  lexicon: BDAG
  rationale: El griego μιμνῄσκομαι en esta forma suele expresar 'recordar' en sentido bíblico, con matiz de actuar favorablemente. En español, 'se acordó de' comunica ese recuerdo relacional de modo natural sin perder el trasfondo covenantal.
- source_word: ὁ θεός
  english_pob_choice: God
  chosen_spanish: Dios
  alternatives_spanish:
  - el Dios
  lexicon: BDAG
  rationale: θεός se vierte de manera directa como 'Dios'. Aquí no hay razón para introducir una perífrasis; la construcción española mantiene la claridad y la reverencia del original.
- source_word: τοῦ λαοῦ αὐτοῦ
  english_pob_choice: his people
  chosen_spanish: su pueblo
  alternatives_spanish:
  - su gente
  - su nación
  lexicon: BDAG
  rationale: λαός en contexto bíblico designa al pueblo de pertenencia pactal. 'Su pueblo' conserva esa relación y es más natural en español que 'su nación'.
- source_word: ἐδικαίωσεν
  english_pob_choice: vindicated
  chosen_spanish: vindicó
  alternatives_spanish:
  - justificó
  - hizo justicia a
  lexicon: BDAG
  rationale: δικαιόω aquí no apunta primariamente al uso paulino de 'justificar', sino a defender públicamente y restablecer el derecho del pueblo. 'Vindicó' mantiene esa fuerza jurídica y defensiva sin resolver la tensión semántica en una sola equivalencia doctrinal.
- source_word: τὴν κληρονομίαν ἑαυτοῦ
  english_pob_choice: his inheritance
  chosen_spanish: su heredad
  alternatives_spanish:
  - su herencia
  - su posesión
  lexicon: BDAG
  rationale: κληρονομία puede significar 'herencia' o 'heredad'. 'Heredad' conserva en español el valor corporativo y posesivo del lenguaje bíblico para el pueblo de Dios, y evita reducirlo a una herencia individual.
theological_decisions:
- issue: Sentido de δικαιόω en un contexto de liberación corporativa
  english_pob_reading: vindicated
  chosen_spanish_reading: vindicó
  alternative_spanish_readings:
  - justificó
  - hizo justicia a
  rationale: El contexto describe la intervención pública de Dios a favor de su pueblo como su heredad; por eso 'vindicó' es la mejor forma de expresar la defensa/restauración del honor y del derecho del pueblo. Se conserva la tensión entre el sentido jurídico y el vindicativo sin desplazarlo a categorías paulinas posteriores.
  doctrine_reference: 'DOCTRINE.md: Preservar la tensión teológica en lugar de resolverla; consistencia de términos clave o excepción documentada.'
translation_notes:
  revision_awareness: 'El texto sigue de cerca el griego de Swete y coincide con la lectura inglesa auditada: ἐμνήσθη -> ''se acordó'' y ἐδικαίωσεν -> ''vindicó''. No se aplicaron revisiones posteriores; el estado más reciente del contexto indica que no hubo cambios necesarios.'
  spanish_consistency_notes:
  - Se usa 'Dios' para θεός y 'pueblo' para λαός, manteniendo una formulación bíblica natural en español.
  - '''Heredad'' preserva mejor que ''herencia'' el tono corporativo y posesivo del pasaje en español eclesial amplio.'
  - Se evita 'SEÑOR' porque el texto griego no contiene κύριος ni una cita del nombre divino que requiera esa sustitución.
