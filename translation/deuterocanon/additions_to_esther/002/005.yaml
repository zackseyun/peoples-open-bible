theological_decisions:
- issue: Hostile royal characterization of the Jewish people
  chosen_reading: Retained the rhetoric as accusation rather than softening it into neutral description.
  alternative_readings:
  - A more interpretive rendering that distances the narrator from the speaker's claims
  rationale: This verse is part of a royal letter and reflects the speaker's hostile perspective. The translation preserves the accusatory tone without endorsing its truth.
  doctrine_reference: Preserve theological tension rather than resolve it; original-language primacy over translation tradition.
