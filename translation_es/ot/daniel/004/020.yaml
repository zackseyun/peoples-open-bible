  text: וְ/דִ֣י חֲזָ֣ה מַלְכָּ֡/א עִ֣יר וְ/קַדִּ֣ישׁ נָחִ֣ת מִן שְׁמַיָּ֡/א וְ/אָמַר֩ גֹּ֨דּוּ אִֽילָנָ֜/א וְ/חַבְּל֗וּ/הִי בְּרַ֨ם עִקַּ֤ר שָׁרְשׁ֨וֹ/הִי֙ בְּ/אַרְעָ֣/א שְׁבֻ֔קוּ וּ/בֶ/אֱסוּר֙ דִּֽי פַרְזֶ֣ל וּ/נְחָ֔שׁ בְּ/דִתְאָ֖/א דִּ֣י בָרָ֑/א וּ/בְ/טַ֧ל שְׁמַיָּ֣/א יִצְטַבַּ֗ע וְ/עִם חֵיוַ֤ת בָּרָ/א֙ חֲלָקֵ֔/הּ עַ֛ד דִּֽי שִׁבְעָ֥ה עִדָּנִ֖ין יַחְלְפ֥וּן עֲלֽוֹ/הִי׀־־־־׃
base_translation:
  language: en
  yaml_path: translation/ot/daniel/004/020.yaml
  text: And because the king saw a watcher[a], a holy one, coming down from heaven and saying, ‘Cut down the tree and destroy it, but leave the stump of its roots in the earth, with a band of iron and bronze, in the grass of the field, and let him be drenched with the dew of heaven[c][b], and let his portion be with the beasts of the field until seven times pass over him’—
  footnotes:
  - marker: a
    text: Or 'sentinel'; the Aramaic term denotes a heavenly being characterized as watchful.
    reason: lexical_alternative
  - marker: b
    text: Or 'with a fetter of iron and bronze.'
    reason: lexical_alternative
  - marker: c
    text: '''Seven times'' may mean seven periods of time; the text does not specify the exact unit.'
    reason: alternative_reading
