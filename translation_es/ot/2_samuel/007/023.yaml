translation:
  language: es
  text: ¿Y quién como tu pueblo, como Israel, la única nación en la tierra por quien Dios fue a redimir para sí como pueblo, para hacerse un nombre, y para hacer cosas grandes y temibles para tu tierra delante de tu pueblo, al cual redimiste para ti de Egipto, de las naciones y sus dioses[a]?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'La cláusula final es difícil en hebreo; también puede entenderse: «de Egipto, las naciones y su dios» o «de Egipto, naciones y dioses».'
    reason: alternative_reading
lexical_decisions:
- source_word: וּמִי
  english_pob_choice: And who is like
  chosen_spanish: ¿Y quién como
  alternatives_spanish:
  - ¿Y quién es como
  - ¿Y quién hay como
  lexicon: HALOT
  rationale: La pregunta retórica expresa incomparabilidad. En español, «¿Y quién como…?» es natural y conserva la fuerza idiomática sin añadir elementos ajenos.
- source_word: כְעַמְּךָ כְיִשְׂרָאֵל
  english_pob_choice: your people, like Israel
  chosen_spanish: tu pueblo, como Israel
  alternatives_spanish:
  - tu pueblo, Israel
  - tu pueblo, tal como Israel
  lexicon: HALOT
  rationale: 'La construcción comparativa se mantiene para no borrar el énfasis de identificación: Israel es el pueblo del destinatario de manera singular.'
- source_word: גּוֹי אֶחָד בָּאָרֶץ
  english_pob_choice: the one nation on the earth
  chosen_spanish: la única nación en la tierra
  alternatives_spanish:
  - una nación única en la tierra
  - la sola nación sobre la tierra
  lexicon: HALOT
  rationale: «Única» transmite mejor la exclusividad del hebreo que una simple cardinalidad. «En la tierra» conserva el marco universal del contraste con las demás naciones.
- source_word: אֱלֹהִים
  english_pob_choice: God
  chosen_spanish: Dios
  alternatives_spanish:
  - dioses
  lexicon: HALOT
  rationale: Aquí el referente es singular y se refiere al Dios de Israel, según el audit trail inglés y el contexto monoteísta del pasaje.
- source_word: לִפְדּוֹת לוֹ לְעָם
  english_pob_choice: to redeem for himself as a people
  chosen_spanish: para redimirla para sí como pueblo
  alternatives_spanish:
  - para rescatarla para sí como pueblo
  - para redimirlo para sí como pueblo
  lexicon: HALOT
  rationale: «Redimir» reproduce el valor teológico de פדה. El objeto pronominal se resuelve de forma natural en español con referencia colectiva a «tu pueblo».
- source_word: וְלָשׂוּם לוֹ שֵׁם
  english_pob_choice: and to make a name for himself
  chosen_spanish: para hacerse un nombre
  alternatives_spanish:
  - para ponerse un nombre
  - para establecerse un nombre
  lexicon: HALOT
  rationale: La idiomática española «hacerse un nombre» conserva el sentido de renombre adquirido por actos poderosos, sin perder el matiz del hebreo.
- source_word: וְלַעֲשׂוֹת
  english_pob_choice: and to do
  chosen_spanish: y para hacer
  alternatives_spanish:
  - y para realizar
  - y para obrar
  lexicon: HALOT
  rationale: Se conserva la repetición del infinitivo final y su valor de propósito. «Hacer» es suficientemente amplio para abarcar las obras poderosas del contexto.
- source_word: הַגְּדוּלָּה וְנֹרָאוֹת
  english_pob_choice: great and fearsome things
  chosen_spanish: cosas grandes y temibles
  alternatives_spanish:
  - cosas grandes y asombrosas
  - grandes y temibles hechos
  lexicon: HALOT
  rationale: «Temibles» preserva el componente de temor/dread del hebreo נוראות, que el audit trail inglés también intentó retener con «fearsome». «Cosas» sigue el sustantivo implícito y mantiene la amplitud semántica.
- source_word: לְאַרְצֶךָ
  english_pob_choice: for your land
  chosen_spanish: para tu tierra
  alternatives_spanish:
  - en favor de tu tierra
  - para la tierra tuya
  lexicon: HALOT
  rationale: «Tierra» es la equivalencia contextual natural para אֶרֶץ en este marco de promesa y acción histórica.
- source_word: מִפְּנֵי עַמְּךָ
  english_pob_choice: before your people
  chosen_spanish: delante de tu pueblo
  alternatives_spanish:
  - ante tu pueblo
  - frente a tu pueblo
  lexicon: HALOT
  rationale: «Delante de» conserva el matiz espacial de presencia/expulsión de los pueblos anteriores, y funciona bien con el flujo de la oración en español.
- source_word: אֲשֶׁר פָּדִיתָ לְּךָ מִמִּצְרַיִם
  english_pob_choice: whom you redeemed for yourself from Egypt
  chosen_spanish: al cual redimiste para ti desde Egipto
  alternatives_spanish:
  - a quien redimiste para ti de Egipto
  - que redimiste para ti desde Egipto
  lexicon: HALOT
  rationale: Se mantiene la repetición de פדה con «redimiste». «Desde Egipto» reproduce la preposición del hebreo y evita introducir una interpretación más fuerte que la del texto base.
- source_word: גּוֹיִם וֵאלֹהָיו
  english_pob_choice: from nations and their gods
  chosen_spanish: desde las naciones y sus dioses
  alternatives_spanish:
  - de las naciones y sus dioses
  - desde las naciones y sus ídolos
  lexicon: HALOT
  rationale: Se conserva la dificultad del cierre sin resolverla demasiado. El plural posesivo en español naturaliza el hebreo comprimido y mantiene la tensión textual que el audit trail inglés preservó.
theological_decisions:
- issue: Número y referente de אֱלֹהִים
  english_pob_reading: singular 'God' referring to Israel's God
  chosen_spanish_reading: «Dios» en singular
  alternative_spanish_readings:
  - «dioses»
  rationale: El contexto narrativo y la lectura auditada en inglés exigen singular para el sujeto divino. Traducirlo en plural rompería la afirmación monoteísta del pasaje.
  doctrine_reference: Monoteísmo bíblico; coherencia contextual del sujeto divino
- issue: 'Clausula final comprimida y difícil: גּוֹיִם וֵאלֹהָיו'
  english_pob_reading: '''from nations and their gods'' as the objects displaced before Israel'
  chosen_spanish_reading: «desde las naciones y sus dioses»
  alternative_spanish_readings:
  - «desde Egipto, las naciones y sus dioses»
  - «desde Egipto, de las naciones y de sus dioses»
  rationale: La traducción principal mantiene la dificultad sintáctica sin sobre-explicarla. El hebreo permite una cláusula final comprimida; el español debe dejar visible esa tensión en lugar de resolverla artificialmente.
  doctrine_reference: Preservar la tensión textual y la economía del hebreo
- issue: Valor de נֹרָאוֹת
  english_pob_reading: great and fearsome things
  chosen_spanish_reading: cosas grandes y temibles
  alternative_spanish_readings:
  - cosas grandes y asombrosas
  - grandes y temibles hechos
  rationale: «Temibles» conserva el rango semántico de asombro y temor, en continuidad con la decisión inglesa de no suavizar el término a un mero 'asombrosas'.
  doctrine_reference: Teofanía / actos divinos que inspiran temor reverente
translation_notes:
  revision_awareness: La versión inglesa más reciente eliminó un segundo «for you» no sustentado por el hebreo y conservó la estructura de propósito. La redacción española sigue esa revisión, evita duplicaciones no atestiguadas y conserva la clausula final difícil con una nota alternativa.
  spanish_consistency_notes:
  - Se usa «Dios» para אֱלֹהִים en singular, conforme al contexto y al audit trail inglés.
  - Se mantiene «redimir» para פדה en ambos lugares para conservar la repetición léxica.
  - «Temibles» traduce נֹרָאוֹת con mayor fuerza que «asombrosas», alineado con la decisión inglesa de preservar temor reverente.
  - La cláusula final se deja intencionalmente comprimida y se acompaña de nota para no borrar la ambigüedad del hebreo.
