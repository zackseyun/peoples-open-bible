translation:
  language: es
  text: Bet-arabá[a], Zemaraim y Betel.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Topónimos hebreos: ''Bet-arabá'' puede entenderse más literalmente como ''casa del Arabá'', y ''Betel'' como ''casa de Dios''; pero el texto principal conserva formas de nombre propio para reflejar el género de la lista.'
    reason: lexical_alternative
lexical_decisions:
- source_word: בֵית הָעֲרָבָה
  english_pob_choice: Beth-arabah
  chosen_spanish: Bet-arabá
  alternatives_spanish:
  - casa del Arabá
  - Bet Arabá
  lexicon: HALOT
  rationale: En una lista de localidades fronterizas, el término funciona como topónimo. Por eso se conserva como nombre propio en español. Se mantiene la raíz de la forma tradicional, pero con adaptación gráfica española ('Bet-' y acento final) para una lectura natural.
- source_word: צְמָרַיִם
  english_pob_choice: Zemaraim
  chosen_spanish: Zemaraim
  alternatives_spanish:
  - Zemarim
  - Cemaraim
  lexicon: HALOT
  rationale: Es un nombre de lugar propio y se translitera. Se conserva la forma más cercana a la hebrea con el final -aim, que refleja mejor la forma consonántica y la apariencia dual/plural del hebreo.
- source_word: בֵית אֵל
  english_pob_choice: Bethel
  chosen_spanish: Betel
  alternatives_spanish:
  - Bet-el
  - casa de Dios
  lexicon: HALOT
  rationale: Es un topónimo muy establecido. En español bíblico, 'Betel' es la forma más natural y reconocible. Se evita traducirlo como 'casa de Dios' en el texto principal porque la lista presenta nombres de lugares, no explicaciones semánticas.
- source_word: וּ
  english_pob_choice: and
  chosen_spanish: y
  alternatives_spanish:
  - e
  lexicon: HALOT
  rationale: La conjunción hebrea coordina los tres nombres de la lista. En español se rinde con 'y'; no hace falta 'e' porque 'y' precede sin problema a 'Zemaraim'.
translation_notes:
  revision_awareness: 'El testimonio hebreo y la auditoría inglesa están en alto acuerdo: se trata de una simple lista de tres topónimos unidos por conjunción, sin variantes textuales ni decisiones teológicas adicionales. La versión española sigue esa misma estructura y mantiene la transparencia toponímica.'
  spanish_consistency_notes:
  - Se usa 'Betel' con una sola palabra, conforme al uso bíblico español habitual.
  - Se conserva 'Zemaraim' sin adaptar a una forma castellana diferente para no perder la señal de nombre propio hebreo.
  - La puntuación con comas y 'y' reproduce naturalmente la coordinación de la lista.
  - No se introduce 'SEÑOR' ni otra terminología teológica, porque el versículo no contiene vocabulario divino explícito.
