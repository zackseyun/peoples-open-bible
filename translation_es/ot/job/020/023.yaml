translation:
  language: es
  text: Cuando esté por llenar su vientre[a], enviará contra él el ardor de su ira y hará llover eso sobre él como su alimento.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «y hará llover eso sobre él como su comida». El final del hebreo es difícil; puede entenderse como una relación más directa entre la lluvia del juicio y su alimento.'
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהִי
  english_pob_choice: When he is about to
  chosen_spanish: Cuando esté por
  alternatives_spanish:
  - Cuando vaya a
  - Cuando esté a punto de
  - Al estar por
  lexicon: HALOT
  rationale: En este contexto, la forma verbal introduce una circunstancia temporal inminente más que un simple deseo. «Cuando esté por» conserva esa inminencia en español sin volverlo una paráfrasis excesiva.
- source_word: לְמַלֵּא
  english_pob_choice: to fill
  chosen_spanish: llenar
  alternatives_spanish:
  - satisfacer
  - colmar
  - llenarse
  lexicon: HALOT
  rationale: El verbo mantiene la imagen concreta de llenar, que en el contexto de apetito y exceso conserva mejor la fuerza corporal del hebreo que una abstracción como «satisfacer».
- source_word: בִטְנוֹ
  english_pob_choice: his belly
  chosen_spanish: su vientre
  alternatives_spanish:
  - su barriga
  - su estómago
  - su apetito
  lexicon: HALOT
  rationale: «Vientre» comunica el sentido corporal del hebreo בטן y su tono vívido. «Estómago» suena más clínico; «apetito» es demasiado abstracto.
- source_word: יְשַׁלַּח
  english_pob_choice: he will send
  chosen_spanish: enviará
  alternatives_spanish:
  - soltará
  - desatará
  - mandará
  lexicon: HALOT
  rationale: El sentido básico de שלח es «enviar». En español, «enviará» conserva la relación verbal directa con el hebreo sin introducir una metáfora más interpretativa como «desatará».
- source_word: בּוֹ
  english_pob_choice: against him
  chosen_spanish: contra él
  alternatives_spanish:
  - sobre él
  - a él
  - en él
  lexicon: HALOT
  rationale: La preposición expresa dirección hostil. «Contra él» transmite con naturalidad esa fuerza adversativa en español.
- source_word: חֲרוֹן אַפּוֹ
  english_pob_choice: the burning of his anger
  chosen_spanish: el ardor de su ira
  alternatives_spanish:
  - el ardor de su enojo
  - la calentura de su ira
  - el calor de su ira
  lexicon: HALOT
  rationale: La construcción hebrea combina la idea de ardor/quemazón con ira. «Ardor de su ira» preserva la imagen sin sonar forzado, y mantiene el paralelismo conceptual del original.
- source_word: וְיַמְטֵר
  english_pob_choice: and rain
  chosen_spanish: y lo hará llover
  alternatives_spanish:
  - y lloverá
  - y hará llover
  - y lo derramará
  lexicon: HALOT
  rationale: El hiphil de מטר expresa «hacer llover/rain down». «Lo hará llover» conserva la imagen meteorológica de juicio mejor que un verbo genérico como «derrama».},{
theological_decisions:
- issue: Sujeto implícito de los verbos de juicio
  english_pob_reading: The subject is God, expressed with masculine singular pronouns ('he will send ... and rain').
  chosen_spanish_reading: El sujeto queda implícito, pero el contexto sigue apuntando a Dios como quien envía el castigo.
  alternative_spanish_readings:
  - Él enviará...
  - Dios enviará...
  - Se enviará...
  rationale: En español, no es necesario explicitar el sujeto si el contexto ya lo identifica. Mantenerlo implícito evita añadir una explicitación no presente en el hebreo, pero la referencia sigue siendo teológicamente la misma en el marco del discurso de retribución divina.
  doctrine_reference: Translation philosophy §1, §3
translation_notes:
  revision_awareness: Se siguió la revisión más reciente del inglés POB que reemplaza una lectura temporal demasiado interpretativa del tramo final por una conexión más cercana con בִּלְחוּמוֹ. En español se optó por mantener esa relación con «como su alimento», sin convertirla en una explicación extensa en el cuerpo del texto.
  spanish_consistency_notes:
  - Se usó «Yahvé» como norma solo cuando el texto base lo requiera; en este versículo el sujeto de juicio no está explícito en el hebreo, así que no se añadió un nombre divino inexistente en la línea.
  - Se prefirió «ira» sobre «enojo» por el registro bíblico y para conservar la fuerza del constructo hebreo.
  - Se evitó «siervo» para δοῦλος porque no aplica a este versículo; no se introdujo terminología eclesiástica ajena al pasaje.
  - La nota conserva la ambigüedad del segmento final sin resolverla de modo dogmático.
