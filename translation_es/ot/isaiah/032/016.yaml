translation:
  language: es
  text: Entonces la justicia habitará en el desierto, y la rectitud permanecerá en el campo fértil[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «en Carmelo». El hebreo karmel puede referirse tanto a tierra fértil y cultivada como, en algunos contextos, al nombre geográfico Carmelo.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְשָׁכַן
  english_pob_choice: Then ... will dwell
  chosen_spanish: Entonces ... habitará
  alternatives_spanish:
  - Y ... habitará
  - Entonces ... morará
  lexicon: HALOT
  rationale: El hebreo permite un valor profético/futuro; «habitará» conserva la idea de residencia estable y funciona bien con el marcador inferencial «Entonces» del POB inglés. «Morará» sería posible, pero suena más marcado/arcaizante en español.
- source_word: בַּמִּדְבָּר
  english_pob_choice: in the wilderness
  chosen_spanish: en el desierto
  alternatives_spanish:
  - en el desierto árido
  - en la soledad
  lexicon: HALOT
  rationale: «מִדְבָּר» puede abarcar desierto/tierras incultas. En español, «desierto» comunica con naturalidad el contraste con «campo fértil» sin introducir una tonalidad demasiado literaria; además evita restringir el sentido a una mera región geográfica.
- source_word: מִשְׁפָּט
  english_pob_choice: justice
  chosen_spanish: la justicia
  alternatives_spanish:
  - el juicio
  - la sentencia
  lexicon: HALOT
  rationale: Aquí el sustantivo expresa el establecimiento de orden justo, no un acto judicial puntual. «Justicia» es el equivalente más claro y mantiene el paralelismo semántico con «rectitud» sin colapsar ambos términos.
- source_word: וּצְדָקָה
  english_pob_choice: righteousness
  chosen_spanish: la rectitud
  alternatives_spanish:
  - la justicia
  - la justicia recta
  - la justicia/rectitud
  lexicon: HALOT
  rationale: Se eligió «rectitud» para conservar la distinción con מִשְׁפָּט («justicia»). En español, «rectitud» expresa mejor la cualidad de lo derecho/upright y evita repetir «justicia», preservando la tensión poética y conceptual del pareado.
- source_word: בַּכַּרְמֶל
  english_pob_choice: in the fruitful field
  chosen_spanish: en el campo fértil
  alternatives_spanish:
  - en el Carmelo
  - en la tierra fértil
  - en el campo fructífero
  lexicon: HALOT
  rationale: כַּרְמֶל puede ser nombre propio o sustantivo común para tierra/campo productivo. Dado el contraste con «desierto», «campo fértil» comunica la imagen de tierra cultivada y productiva, sin cerrar indebidamente la ambigüedad del hebreo.
- source_word: תֵּשֵׁב
  english_pob_choice: will abide
  chosen_spanish: permanecerá
  alternatives_spanish:
  - se sentará
  - habitará
  - morará
  lexicon: HALOT
  rationale: El verbo literalmente significa «sentarse», pero en contexto personifica a la rectitud como establecida y asentada. «Permanecerá» suena natural y formal en español, y transmite la idea de residencia estable que el POB inglés resuelve con «abide».
theological_decisions:
- issue: Distinción poética y teológica entre מִשְׁפָּט y צְדָקָה
  english_pob_reading: justice ... and righteousness
  chosen_spanish_reading: justicia ... y rectitud
  alternative_spanish_readings:
  - justicia ... y justicia
  - juicio ... y justicia
  - justicia ... y justicia/rectitud
  rationale: Se mantiene la diferencia entre el orden justo (מִשְׁפָּט) y la cualidad de rectitud/uprightness (צְדָקָה). Traducir ambos como «justicia» borraría una tensión importante del paralelo hebreo; «rectitud» preserva mejor la distinción y la imagen profética de restauración.
  doctrine_reference: 'DOCTRINE.md: Preserve theological tension rather than resolve it; mantener paralelismo semántico en poesía profética.'
- issue: Personificación de la rectitud como sujeto que «se sienta/permanece»
  english_pob_reading: righteousness will abide
  chosen_spanish_reading: la rectitud permanecerá
  alternative_spanish_readings:
  - la rectitud se sentará
  - la rectitud habitará
  - la rectitud se asentará
  rationale: El hebreo usa un verbo de sentarse para una personificación. «Permanecerá» conserva la idea de estabilidad sin sonar forzado en español, y evita una literalidad corporal que podría oscurecer la figura retórica.
  doctrine_reference: 'POB revision awareness: the English audit trail moved from ''sit'' to ''abide'' for naturalness while preserving personified settled residence.'
translation_notes:
  revision_awareness: El audit trail inglés revisó la segunda cola de «sit» a «abide» para mayor naturalidad formal; la versión española sigue esa decisión con «permanecerá», manteniendo la personificación de la rectitud como presencia estable. También se preservó la ambigüedad de כַּרְמֶל mediante una nota alternativa, tal como el POB inglés dejó abierta la posibilidad de «Carmel».
  spanish_consistency_notes:
  - Se usa «Yahvé» como convención general del proyecto cuando aparece el nombre divino; este versículo no lo contiene.
  - Se evita «SEÑOR» como sustituto no solicitado.
  - «Justicia» y «rectitud» se distinguen deliberadamente para no aplanar el paralelismo hebreo.
  - Se prefieren formas modernas y claras («permanecerá», «campo fértil») sobre calcos más duros, sin perder la literalidad de fondo.
