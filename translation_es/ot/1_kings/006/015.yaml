base_translation:
  language: en
  yaml_path: translation/ot/1_kings/006/015.yaml
  text: He built the walls of the house on the inside with cedar boards[a]; from the floor of the house to the walls of the ceiling he covered them with wood on the inside[b], and he overlaid the floor of the house with boards of cypress.
  footnotes:
  - marker: a
    text: Or 'with cypress planks'; traditionally, 'with fir boards.' The Hebrew tree name may refer to a conifer such as cypress or juniper.
    reason: lexical_alternative
  - marker: b
    text: The phrase 'to the walls of the ceiling' likely means up to the interior ceiling or roof lining.
    reason: cultural_note
