review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien la estructura condicional, el paralelismo vertical y la afirmación central del hebreo: solo bajo una condición imposible Yahvé rechazaría a toda la descendencia de Israel. Sin embargo, dos elecciones léxicas no son las más fieles al matiz documentado: ''investigados'' suaviza el sentido de búsqueda exhaustiva de וְיֵחָקְרוּ, y ''linaje'' introduce un matiz genealógico-social menos directo que el colectivo básico de זֶרַע. También conviene afinar la sintaxis española para mayor naturalidad.'
  spanish_quality_summary: El texto es claro y solemne, pero puede sonar más natural y preciso en español bíblico moderno con 'pueden medirse' y 'pueden ser escudriñados'/'pueden escudriñarse', y con 'toda la descendencia de Israel' en vez de 'todo el linaje de Israel'. La redacción revisada mejora fluidez y evita una nota innecesaria creada por una elección menos óptima.
  glossary_alignment: Se mantiene correctamente 'Yahvé' para יהוה. No hay conflictos con otros términos del glosario del proyecto. La revisión propuesta alinea mejor זֶרַע con un colectivo español natural ('descendencia') y conserva el registro formal del pasaje.
  issues:
  - severity: medium
    issue: '''linaje'' para זֶרַע'
    rationale: Aunque posible, 'linaje' añade un matiz de estirpe o casa familiar y suena algo menos directo que el colectivo básico 'descendencia'. El inglés auditado privilegia la fuerza colectiva de 'offspring'; en español, 'descendencia' la preserva mejor y con más naturalidad.
  - severity: medium
    issue: '''investigados'' para וְיֵחָקְרוּ'
    rationale: '''Investigar'' en español moderno puede sonar demasiado técnico o forense. El hebreo y la auditoría inglesa apuntan a una búsqueda exhaustiva o sondeo profundo; ''escudriñados'' transmite mejor ese matiz en registro bíblico legible.'
  - severity: low
    issue: Pasiva perifrástica algo pesada
    rationale: '''Pueden ser medidos'' es fiel, pero ''pueden medirse'' suena más natural en español sin pérdida de sentido. Lo mismo aplica al segundo verbo si se usa forma pronominal o una pasiva más idiomática.'
  revised_spanish_text: 'Así dice Yahvé: Si los cielos de arriba pueden medirse, y los cimientos de la tierra de abajo pueden ser escudriñados, entonces yo también rechazaré a toda la descendencia de Israel por todo lo que han hecho, declara Yahvé.'
  revision_rationale: 'Se ajustan dos elecciones léxicas para reflejar mejor el hebreo y la auditoría inglesa: ''descendencia'' reproduce mejor el colectivo זֶרַע que ''linaje'', y ''escudriñados'' expresa mejor la idea de búsqueda exhaustiva de חקר que ''investigados''. Además, ''pueden medirse'' mejora la naturalidad del español manteniendo la posibilidad hipotética del nifal.'
