translation:
  language: es
  text: Evítalo[a]; no pases por él. Desvíate de él[b] y sigue adelante.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «Apártate de él». El verbo hebreo es raro y comunica mantenerse lejos del camino perverso.
    reason: lexical_alternative
  - marker: b
    text: Literalmente, «desvíate de sobre él y pasa».
    reason: lexical_alternative
lexical_decisions:
- source_word: פְּרָעֵהוּ
  english_pob_choice: Avoid it
  chosen_spanish: Apártate de él
  alternatives_spanish:
  - Evítalo
  - Aléjate de él
  - Escóndete de él
  lexicon: HALOT
  rationale: El verbo hebreo es raro y, en este contexto, expresa mantenerse claramente lejos del camino malo. «Apártate de él» conserva la idea de separación deliberada sin sonar tan marcado como «evítalo» ni tan libre como «escóndete de él».
- source_word: אַל
  english_pob_choice: do not
  chosen_spanish: 'no'
  alternatives_spanish:
  - no debes
  - nunca
  lexicon: HALOT
  rationale: La partícula prohibitiva se traduce naturalmente con «no» en español, manteniendo el tono de prohibición directa del hebreo.
- source_word: תַּעֲבָר בּוֹ
  english_pob_choice: pass through it
  chosen_spanish: pases por él
  alternatives_spanish:
  - vayas por él
  - lo recorras
  - entres en él
  lexicon: HALOT
  rationale: «Pasar por él» preserva la metáfora espacial del camino. En español, la construcción con subjuntivo prohibitivo es más natural que un calco más rígido.
- source_word: שְׂטֵה
  english_pob_choice: Turn away
  chosen_spanish: Aléjate de él
  alternatives_spanish:
  - Desvíate
  - Vuélvete aparte
  - Apártate
  lexicon: HALOT
  rationale: El imperativo expresa desviarse deliberadamente. «Aléjate de él» comunica bien la intención de apartarse del mal camino y evita una repetición demasiado técnica con el primer mandato.
- source_word: מֵעָלָיו
  english_pob_choice: from it
  chosen_spanish: de él
  alternatives_spanish:
  - de sobre él
  - de encima de él
  - de ello
  lexicon: HALOT
  rationale: Literalmente sería «de sobre él», pero en español eso resulta forzado. «De él» mantiene la separación respecto al camino sin perder claridad.
- source_word: וַעֲבוֹר
  english_pob_choice: and pass on
  chosen_spanish: y sigue adelante
  alternatives_spanish:
  - y pasa de largo
  - y continúa
  - y pasa
  lexicon: HALOT
  rationale: El cierre exhorta a seguir avanzando sin detenerse en el camino malo. «Sigue adelante» comunica el movimiento continuo y suena natural en español contemporáneo.
translation_notes:
  revision_awareness: Se mantuvo la lectura ya auditada del hebreo como una serie de prohibiciones/imperativos de evitación del camino malo. No se introdujeron cambios textuales; la adaptación principal fue estilística para lograr un español natural y fiel a la metáfora espacial.
  spanish_consistency_notes:
  - Se preserva el antecedente implícito del camino/vía del contexto inmediato con los pronombres de tercera persona singular («él»).
  - 'Se mantiene la progresión del hebreo: apartarse, no transitar, alejarse, continuar.'
  - La traducción evita «SEÑOR» u otras sustituciones no pertinentes, ya que no aparece el tetragrámaton en este versículo.
