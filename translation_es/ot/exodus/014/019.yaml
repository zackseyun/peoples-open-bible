translation:
  language: es
  text: Entonces el ángel de Dios[a], que iba delante del campamento de Israel, se movió y fue detrás de ellos; y la columna de nube se movió de delante de ellos y se quedó detrás de ellos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «el mensajero de Dios». La palabra hebrea puede significar tanto «ángel» como «mensajero».
    reason: lexical_alternative
lexical_decisions:
- source_word: מַלְאַךְ הָאֱלֹהִים
  english_pob_choice: the angel of God
  chosen_spanish: el ángel de Dios
  alternatives_spanish:
  - el mensajero de Dios
  lexicon: HALOT
  rationale: מַלְאָךְ puede significar 'mensajero' o 'ángel'. En este contexto narrativo, con la guía divina ligada a la nube, 'ángel' es la opción más natural y la que mejor coincide con la decisión inglesa de no definir más la identidad del personaje.
- source_word: וַיִּסַּע
  english_pob_choice: moved
  chosen_spanish: se movió
  alternatives_spanish:
  - partió
  - se puso en marcha
  - levantó el campamento
  lexicon: HALOT
  rationale: El verbo נסע puede aludir a partir o levantar el campamento, pero aquí la referencia es al cambio de posición espacial del ángel y de la columna. 'Se movió' conserva la concreción del acto sin añadir una idea de viaje que el contexto inmediato no exige.
- source_word: הַהֹלֵךְ לִפְנֵי מַחֲנֵה יִשְׂרָאֵל
  english_pob_choice: who had been going before the camp of Israel
  chosen_spanish: que había ido delante del campamento de Israel
  alternatives_spanish:
  - que iba delante del campamento de Israel
  - que había caminado delante del campamento de Israel
  lexicon: HALOT
  rationale: El participio con valor durativo y la secuencia narrativa justifican un pasado anterior en español. 'Había ido delante' expresa bien la acción previa y mantiene la relación espacial de לִפְנֵי como 'delante de'.
- source_word: וַיֵּלֶךְ מֵאַחֲרֵיהֶם
  english_pob_choice: went behind them
  chosen_spanish: pasó detrás de ellos
  alternatives_spanish:
  - fue detrás de ellos
  - se fue a su retaguardia
  lexicon: HALOT
  rationale: מֵאַחֲרֵי señala posición en la retaguardia, no persecución. 'Pasó detrás de ellos' comunica el cambio de ubicación con naturalidad en español y evita una lectura de persecución.
- source_word: עַמּוּד הֶעָנָן
  english_pob_choice: the pillar of cloud
  chosen_spanish: la columna de nube
  alternatives_spanish:
  - el pilar de nube
  - la columna de la nube
  lexicon: HALOT
  rationale: La imagen concreta del guía visible se preserva con 'columna de nube', una formulación clara y ampliamente inteligible en español. 'Pilar' es posible, pero 'columna' es más natural y tradicionalmente transparente.
- source_word: מִפְּנֵיהֶם
  english_pob_choice: from before them
  chosen_spanish: desde delante de ellos
  alternatives_spanish:
  - de delante de ellos
  - desde su frente
  lexicon: HALOT
  rationale: La frase espacial se mantiene paralela a לִפְנֵי. 'Desde delante de ellos' reproduce la relación de procedencia y dirección sin perder naturalidad en español.
- source_word: וַיַּעֲמֹד
  english_pob_choice: stood
  chosen_spanish: se puso
  alternatives_spanish:
  - se quedó
  - se detuvo
  lexicon: HALOT
  rationale: Aquí עמד marca una posición fija adquirida por la columna. 'Se puso detrás de ellos' funciona en español para expresar asentamiento en un lugar, aunque el verbo sea más idiomático que literal.
theological_decisions:
- issue: Identidad de מַלְאַךְ הָאֱלֹהִים
  english_pob_reading: Render as 'the angel of God' without specifying whether this is a created angel, a manifestation of God, or a christophany.
  chosen_spanish_reading: Traducir 'el ángel de Dios' sin definir si se trata de un ángel creado, una manifestación divina o una cristofanía.
  alternative_spanish_readings:
  - el mensajero de Dios
  - una manifestación de Dios
  rationale: El hebreo nombra la figura, pero no fija explícitamente su ontología. La traducción española conserva esa tensión teológica y evita resolverla con una formulación doctrinal no obligada por el texto.
  doctrine_reference: Preservar la tensión teológica en vez de resolverla.
translation_notes:
  revision_awareness: 'Coincide con la última pasada de revisión: no se registran cambios requeridos y el acuerdo de revisión es alto, por lo que se mantiene la solución de fondo sin ajustes sustantivos.'
  spanish_consistency_notes:
  - Se mantiene 'Dios' para אֱלֹהִים y no se introduce 'SEÑOR', conforme al criterio del proyecto.
  - 'Se conserva la imagen espacial de delante/detrás con expresiones paralelas: ''delante de ellos'' / ''detrás de ellos''.'
  - '''Ángel'' se usa como término principal, con nota léxica sobre la alternativa ''mensajero''.'
  - La elección de tiempos verbales intenta reflejar el valor durativo del participio hebreo y la secuencia narrativa de los wayyiqtol.
