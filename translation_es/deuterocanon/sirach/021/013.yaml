review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien el sentido básico del griego: γνῶσις = conocimiento, σοφοῦ = singular representativo, πληθυνθήσεται = aumentará, βουλή = consejo. La segunda imagen también está bien preservada. Sin embargo, hay una desalineación en las notas: en el texto inglés auditado la nota [b] corresponde a la alternativa de πηγή (''fountain/spring'') y [a] a la alternativa singular/plural de σοφοῦ; en español los marcadores quedaron invertidos respecto de los puntos anotados en el texto. Además, ''como un diluvio'' es posible, pero ''como una inundación'' se ajusta mejor al valor léxico de κατακλυσμός y evita la resonancia excesivamente técnica del Diluvio bíblico en español.'
  spanish_quality_summary: El español es claro y digno. 'El conocimiento de un hombre sabio' suena natural, aunque algo pesado; sigue fielmente la decisión del POB sobre el singular masculino. 'Fuente de vida' es muy idiomático. La principal reparación necesaria es corregir la colocación de los marcadores de nota para que anclen la palabra o frase pertinente. También conviene afinar 'diluvio' a 'inundación' para mayor precisión y naturalidad.
  glossary_alignment: No hay términos del glosario mayor en juego. Se respeta la decisión documentada de σοφοῦ como singular masculino representativo. 'Consejo' para βουλή y 'fuente de vida' para πηγή ζωῆς están alineados con la racionalidad del proyecto. Se mantiene 'conocimiento' para γνῶσις de manera apropiada.
  issues:
  - severity: medium
    issue: Los marcadores de notas [a] y [b] están anclados a los lugares equivocados en el texto español.
    rationale: La nota sobre la alternativa singular/plural de σοφοῦ debe ir con 'un hombre sabio', mientras que la nota sobre πηγή como 'manantial/fuente' debe ir con 'fuente de vida'. En el borrador actual [a] aparece tras 'diluvio' y [b] tras 'vida', lo que no corresponde al contenido de las notas.
  - severity: low
    issue: '''Diluvio'' es menos preciso que ''inundación'' para κατακλυσμός en este contexto.'
    rationale: Aunque 'diluvio' puede funcionar, en español evoca con fuerza el Diluvio de Noé. 'Inundación' conserva mejor la idea de desborde/crecida abundante sin introducir una asociación innecesariamente específica.
  revised_spanish_text: El conocimiento de un hombre sabio[a] aumentará como una inundación, y su consejo es como una fuente de vida[b].
  revised_footnotes:
  - marker: a
    text: 'O: "el conocimiento de los sabios aumentará como una inundación"; el griego σοφοῦ está en singular, pero algunas traducciones lo generalizan al plural.'
    reason: lexical_alternative
  - marker: b
    text: 'O: "un manantial de vida".'
    reason: lexical_alternative
  revision_rationale: Se corrigieron los marcadores de notas para que correspondan exactamente a las palabras o frases a las que aluden, y se ajustó 'diluvio' a 'inundación' por mayor precisión léxica y mejor naturalidad en español bíblico contemporáneo. El resto del versículo se mantiene porque es fiel al griego y al audit trail inglés.
