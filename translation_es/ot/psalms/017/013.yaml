translation:
  language: es
  text: ¡Levántate, oh Yahvé; afróntalo, derríbalo; libra mi vida del malvado con tu espada[a]!
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «libra mi vida del malvado, que es tu espada». El hebreo también puede presentar al malvado como un instrumento en la mano de Yahvé.'
    reason: alternative_reading
lexical_decisions:
- source_word: קוּמָה
  english_pob_choice: Rise up
  chosen_spanish: ¡Levántate
  alternatives_spanish:
  - ¡Álzate
  - ¡Despierta
  lexicon: HALOT
  rationale: El imperativo dirigido a Yahvé pide una intervención activa e inmediata. «Levántate» conserva el impulso urgente del hebreo sin sonar arcaico en español.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  - el SEÑOR
  lexicon: HALOT
  rationale: Se mantiene la transliteración del nombre divino según la pauta del proyecto, en vez de sustituirla por un título.
- source_word: קַדְּמָה פָנָיו
  english_pob_choice: confront him
  chosen_spanish: sal al encuentro de él
  alternatives_spanish:
  - confróntalo
  - ve delante de su rostro
  lexicon: HALOT
  rationale: La imagen hebrea es literalmente «ir delante de su rostro». En español, «sal al encuentro de él» comunica el sentido de enfrentarlo sin endurecer el registro.
- source_word: הַכְרִיעֵהוּ
  english_pob_choice: bring him low
  chosen_spanish: humíllalo
  alternatives_spanish:
  - derríbalo
  - hazlo inclinarse
  lexicon: HALOT
  rationale: El verbo causativo transmite la idea de hacer caer o quedar abatido. «Humíllalo» conserva la noción de abatimiento en un español natural y solemne, acorde con la revisión inglesa que prefirió «bring him low».
- source_word: פַּלְּטָה
  english_pob_choice: deliver
  chosen_spanish: libra
  alternatives_spanish:
  - rescata
  - sálvame
  lexicon: HALOT
  rationale: El imperativo de פלט expresa liberación o rescate. «Libra» mantiene el registro bíblico y la fuerza de petición.
- source_word: נַפְשִׁי
  english_pob_choice: my life
  chosen_spanish: mi vida
  alternatives_spanish:
  - mi alma
  - a mí
  lexicon: HALOT
  rationale: En el contexto de peligro mortal, נֶפֶשׁ apunta a la vida o al ser mismo. «Mi vida» es la equivalencia más clara y concreta en español.
- source_word: מֵרָשָׁע
  english_pob_choice: from the wicked
  chosen_spanish: del malvado
  alternatives_spanish:
  - del impío
  - del perverso
  lexicon: HALOT
  rationale: El singular hebreo puede funcionar de manera colectiva o individual. «Malvado» preserva la referencia a una persona hostil sin forzar una abstracción colectiva.
- source_word: חַרְבֶּךָ
  english_pob_choice: by your sword
  chosen_spanish: con tu espada
  alternatives_spanish:
  - por tu espada
  - mediante tu espada
  lexicon: HALOT
  rationale: La construcción hebrea es compacta y admite relación instrumental. «Con tu espada» expresa el medio de intervención divina de forma natural en español.
theological_decisions:
- issue: Relación entre «del malvado» y «tu espada»
  english_pob_reading: 'instrumental: God delivers the psalmist by means of God''s sword'
  chosen_spanish_reading: El salmista pide ser librado del malvado mediante la espada de Yahvé.
  alternative_spanish_readings:
  - El malvado es la espada de Yahvé, es decir, un instrumento de juicio divino.
  - Líbrame del malvado, que es tu espada.
  rationale: La secuencia hebrea es compacta y permite más de una lectura. El texto principal conserva el sentido más directo de medio de liberación, mientras la alternativa teológica de instrumento de juicio se preserva en la nota para no resolver artificialmente la tensión.
  doctrine_reference: 'Translation philosophy §3: preservar la tensión teológica cuando el hebreo permite más de una constricción plausible.'
translation_notes:
  revision_awareness: La redacción española sigue la última revisión inglesa, que prefirió «bring him low» frente a «bring him down», y mantiene la decisión auditada de traducir el nombre divino como Yahvé. También conserva el valor concreto de נֶפֶשׁ como «vida» y la ambigüedad de חַרְבֶּךָ como medio instrumental o imagen de juicio.
  spanish_consistency_notes:
  - Se preserva Yahvé para יְהוָה conforme al estándar del proyecto.
  - «Mi vida» mantiene el matiz concreto de נַפְשִׁי en contexto de amenaza física.
  - «Del malvado» conserva el singular hebreo sin imponer una lectura exclusivamente colectiva.
  - «Con tu espada» deja abierta la relación instrumental sin neutralizar la imaginería bélica.
