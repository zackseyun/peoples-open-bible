translation:
  language: es
  text: Moisés contó a su suegro todo lo que Yahvé había hecho a Faraón y a Egipto por causa de Israel[a], todas las dificultades[b] que les habían sobrevenido en el camino, y cómo Yahvé los había librado.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «por Israel» o «debido a Israel».
    reason: lexical_alternative
  - marker: b
    text: O «toda la adversidad» o «toda la aflicción» que les había sobrevenido en el camino.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְסַפֵּר
  english_pob_choice: told
  chosen_spanish: contó
  alternatives_spanish:
  - relató
  - narró
  lexicon: HALOT
  rationale: ספר en piel significa contar o relatar. «Contó» es natural en español y conserva la idea de comunicar con detalle lo sucedido sin sobretraducir.
- source_word: חֹתְנוֹ
  english_pob_choice: his father-in-law
  chosen_spanish: su suegro
  alternatives_spanish:
  - su pariente por matrimonio
  lexicon: HALOT
  rationale: El término de parentesco aquí designa al suegro de Moisés, Jetró. «Suegro» comunica de forma directa y fiel el sentido contextual.
- source_word: אֵת כָּל אֲשֶׁר עָשָׂה יְהוָה לְפַרְעֹה וּלְמִצְרַיִם
  english_pob_choice: all that Yahweh had done to Pharaoh and to Egypt
  chosen_spanish: todo lo que Yahvé había hecho a Faraón y a Egipto
  alternatives_spanish:
  - todo lo que Yahvé había hecho contra Faraón y contra Egipto
  lexicon: HALOT
  rationale: La frase presenta las acciones de Yahvé en los eventos del éxodo. «A Faraón y a Egipto» sigue de cerca el hebreo; «contra» es posible, pero introduce una interpretación más marcada.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  lexicon: HALOT
  rationale: Se conserva el nombre divino del Tetragrámaton como «Yahvé», siguiendo la decisión doctrinal del POB en español y evitando la sustitución por un título.
- source_word: עַל אוֹדֹת יִשְׂרָאֵל
  english_pob_choice: for Israel’s sake
  chosen_spanish: por causa de Israel
  alternatives_spanish:
  - a favor de Israel
  - por Israel
  lexicon: HALOT
  rationale: El idiomatismo עַל אוֹדֹת expresa referencia causal o motivación. «Por causa de Israel» mantiene esa relación de motivo/beneficio sin agregar matices ajenos al hebreo.
- source_word: הַתְּלָאָה
  english_pob_choice: the hardship
  chosen_spanish: toda la calamidad
  alternatives_spanish:
  - toda la dificultad
  - toda la aflicción
  - todo el sufrimiento
  lexicon: HALOT
  rationale: El sustantivo cubre ideas de aflicción, angustia o calamidad. «Calamidad» conserva el peso adverso del término en un español digno; otras opciones serían más suaves o más abstractas.
- source_word: מְצָאָתַם
  english_pob_choice: had come upon them
  chosen_spanish: les había sobrevenido
  alternatives_spanish:
  - les había ocurrido
  - les había alcanzado
  - les había acontecido
  lexicon: HALOT
  rationale: El hebreo personifica la calamidad como algo que «encuentra» a alguien. «Sobrevenido» expresa bien la irrupción no buscada del mal y refleja la revisión inglesa más natural.
- source_word: בַּדֶּרֶךְ
  english_pob_choice: on the way
  chosen_spanish: en el camino
  alternatives_spanish:
  - en la jornada
  - durante el viaje
  lexicon: HALOT
  rationale: La expresión se refiere al trayecto de Israel. «En el camino» es idiomático en español y mantiene la sencillez del hebreo.
- source_word: וַיַּצִּלֵם
  english_pob_choice: had delivered them
  chosen_spanish: los había librado
  alternatives_spanish:
  - los había rescatado
  - los había salvado
  lexicon: HALOT
  rationale: נצל suele significar librar o rescatar de peligro. «Librado» conserva el tono bíblico y evita cargar el verbo con asociaciones soteriológicas más amplias que aquí no son necesarias.
theological_decisions:
- issue: Rendering of the divine name יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Jehová
  rationale: El texto hebreo usa directamente el Tetragrámaton. En la línea doctrinal del POB, se preserva el nombre propio divino como «Yahvé» en lugar de sustituirlo por un título genérico.
  doctrine_reference: 'DOCTRINE.md: contested terms — יְהוָה / YHWH → Yahvé'
translation_notes:
  revision_awareness: 'La versión española sigue la revisión inglesa más reciente en la cláusula de la calamidad: se evita una traducción literal de «had found them» y se prefiere «les había sobrevenido», que reproduce mejor la idea hebrea de una desgracia que les acontece en el trayecto. También se conserva la decisión estable del proyecto de usar «Yahvé» para יְהוָה.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» para el Tetragrámaton, coherente con el estándar del proyecto.
  - «Faraón» conserva la forma histórica usual en español, alineada con el referente egipcio del texto.
  - «Suegro» es la opción contextual adecuada para חֹתְנוֹ en este versículo.
  - Se usa pretérito pluscuamperfecto («había hecho», «había sobrevenido», «había librado») para reflejar la secuencia narrativa pasada del hebreo en español natural.
