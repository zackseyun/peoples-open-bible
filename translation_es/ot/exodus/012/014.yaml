    issue: La nota al pie [a] está colocada en ‘memoria’, pero el contenido de la nota trata sobre ‘חֻקַּת עוֹלָם / estatuto perpetuo’.
    rationale: Las notas deben anclarse exactamente en la palabra o frase pertinente. Tal como está, induce a pensar que la alternativa afecta ‘memoria’ cuando en realidad afecta la cláusula final.
  - severity: low
    issue: ‘para memoria’ es menos idiomático que ‘como memorial’ en este contexto cultual.
    rationale: Ambas opciones son defendibles, pero ‘como memorial’ comunica mejor לְזִכָּרוֹן en español bíblico moderno sin sonar forzado ni ambiguo.
