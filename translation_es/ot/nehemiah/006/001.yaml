revisions:
- from: Entonces, cuando Sanbalat[a], Tobías, Gesem el árabe[b] y el resto de nuestros enemigos oyeron que yo había reconstruido la muralla y que no había quedado en ella ninguna brecha—aunque hasta entonces no había puesto las puertas en los portones—
  to: Entonces, cuando Sanbalat[a], Tobías, Gesem el árabe[b] y el resto de nuestros enemigos oyeron que yo había reconstruido la muralla y que no había quedado en ella ninguna brecha —aunque hasta entonces no había puesto las puertas en las puertas de la ciudad—
  rationale: Se corrige una nota al pie defectuosa («arabio») y se mejora la claridad arquitectónica de שְׁעָרִים evitando «portones». Se conserva la distinción entre דְּלָתוֹת y שְׁעָרִים con «las puertas» y «las puertas de la ciudad». También se normaliza la puntuación del inciso.
