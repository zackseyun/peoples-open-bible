revisions:
- from: Y los hijos de Rubén y los hijos de Gad llamaron al altar Testigo[a], porque él es testigo[b] entre nosotros de que Yahvé es Dios.
  to: Y los hijos de Rubén y los hijos de Gad llamaron al altar Testigo[a], porque es testigo entre nosotros de que Yahvé es Dios.
  rationale: Se conserva la traducción principal porque es fiel al hebreo y al POB inglés, pero se corrige la expresión pronominal para que el español suene natural con un referente inanimado y se elimina una nota secundaria no necesaria. También se depura la única nota para reflejar con más claridad la alternativa documentada de un nombre expandido del altar.
  reviewer_model: gpt-5.4
