translation:
  language: es
  text: Cuando trabajes la tierra[a], no volverá a darte su fuerza[b]. Serás errante y fugitivo[c] en la tierra[d].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Porque trabajas la tierra» o «Si trabajas la tierra». La conjunción hebrea puede expresarse de varias maneras según se entienda la cláusula como causal, temporal o condicional.'
    reason: lexical_alternative
  - marker: b
    text: 'Lit.: «no seguirá dando su fuerza»; es decir, cesará su productividad para ti.'
    reason: lexical_alternative
  - marker: c
    text: 'O: «inquieto errante». Los dos términos hebreos se traslapan y refuerzan la idea de una condición sin reposo ni asentamiento.'
    reason: lexical_alternative
  - marker: d
    text: 'O: «sobre la tierra».'
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  english_pob_choice: When
  chosen_spanish: Cuando
  alternatives_spanish:
  - Porque
  - Si
  lexicon: HALOT
  rationale: En este contexto, כִּי introduce la circunstancia bajo la cual se cumple el juicio; «Cuando» reproduce bien el valor temporal/condicional sin forzar un causal exclusivo.
- source_word: תַעֲבֹד
  english_pob_choice: you work
  chosen_spanish: trabajes
  alternatives_spanish:
  - cultives
  - labores
  lexicon: HALOT
  rationale: עבד aquí se refiere a laborar la tierra. «Trabajes» es natural en español y conserva la idea amplia de trabajo agrícola sin estrecharla demasiado.
- source_word: הָאֲדָמָה
  english_pob_choice: the ground
  chosen_spanish: la tierra
  alternatives_spanish:
  - el suelo
  - la tierra cultivable
  lexicon: HALOT
  rationale: אֲדָמָה en Génesis apunta a la tierra/terreno cultivado. «La tierra» mantiene la conexión narrativa con el suelo maldito y suena natural en español.
- source_word: לֹא תֹסֵף תֵּת
  english_pob_choice: it will no longer yield
  chosen_spanish: no volverá a darte
  alternatives_spanish:
  - no seguirá dándote
  - ya no te dará
  lexicon: HALOT
  rationale: La construcción expresa cesación de la acción de dar. «No volverá a darte» transmite bien la idea de que cesa la provisión/productividad, de modo idiomático en español.
- source_word: כֹּחָהּ
  english_pob_choice: its strength
  chosen_spanish: su fuerza
  alternatives_spanish:
  - su vigor
  - su productividad
  lexicon: HALOT
  rationale: Literalmente es «su fuerza». Conservamos esa metáfora para no diluir el paralelo con la capacidad productiva de la tierra.
- source_word: נָע
  english_pob_choice: wanderer
  chosen_spanish: errante
  alternatives_spanish:
  - vagabundo
  - andariego
  lexicon: HALOT
  rationale: נָע denota alguien que se mueve sin reposo ni asentamiento fijo. «Errante» es claro, digno y mantiene la idea de inestabilidad.
- source_word: וָנָד
  english_pob_choice: fugitive
  chosen_spanish: fugitivo
  alternatives_spanish:
  - desterrado
  - nómada
  lexicon: HALOT
  rationale: נָד añade el matiz de desplazamiento forzado o expulsión. «Fugitivo» conserva la pareja tradicional y deja visible la intensidad del doble término.
- source_word: בָאָרֶץ
  english_pob_choice: on the earth
  chosen_spanish: sobre la tierra
  alternatives_spanish:
  - en la tierra
  - por la tierra
  lexicon: HALOT
  rationale: En el contexto primeval de Génesis, «tierra» comunica bien el ámbito amplio del juicio; «sobre» refleja la condición de deambular sin asentamiento.
theological_decisions:
- issue: Alcance del juicio sobre Caín
  english_pob_reading: A concrete curse of agricultural frustration and social instability, without importing later doctrinal categories beyond the text.
  chosen_spanish_reading: Una maldición concreta de frustración agrícola e inestabilidad social, sin importar categorías doctrinales posteriores que el texto no explicita.
  alternative_spanish_readings:
  - Solo una inquietud interior o psicológica
  - Solo un exilio geográfico limitado
  rationale: 'La frase conserva ambos elementos: la tierra ya no responde con su fuerza y Caín queda definido por una condición móvil y no asentada. No se reduce el juicio a una sola dimensión.'
  doctrine_reference: Preservar la tensión teológica del texto sin resolverla artificialmente.
translation_notes:
  revision_awareness: Se revisó el valor de כִּי, la metáfora agrícola de כֹּחַ y la pareja נָע וָנָד conforme al texto hebreo y al registro auditado de la POB en inglés; no se hicieron cambios sustantivos respecto del sentido base.
  spanish_consistency_notes:
  - Se usa «tierra» para אֲדָמָה/אָרֶץ según el contexto, evitando un calco rígido de «campo» o «país».
  - «Errante y fugitivo» mantiene la tensión doble de נָע וָנָד sin fusionar indebidamente los dos términos.
  - La nota de a se ancla en la conjunción inicial porque en español también admite lectura temporal, causal o condicional.
