translation:
  language: es
  text: Las palabras de los impíos son una emboscada para derramar sangre[a], pero la boca de los rectos los libra[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «están al acecho de sangre». El hebreo presenta la imagen de las palabras de los impíos como una emboscada mortal.'
    reason: lexical_alternative
  - marker: b
    text: '«Los» se entiende de manera general: las personas amenazadas por esa violencia. Algunos interpretan el sentido de forma más reflexiva: «la boca de los rectos se libra a sí misma», o simplemente «libra».'
    reason: lexical_alternative
lexical_decisions:
- source_word: דִּבְרֵי
  english_pob_choice: the words of
  chosen_spanish: las palabras de
  alternatives_spanish:
  - la խոսa de
  - el hablar de
  lexicon: HALOT
  rationale: El plural constructo de דָּבָר aquí se entiende como palabras/discurso. «Las palabras de» es natural en español y conserva la relación posesiva del hebreo sin perder el tono proverbial.
- source_word: רְשָׁעִים
  english_pob_choice: the wicked
  chosen_spanish: los impíos
  alternatives_spanish:
  - los malvados
  - los perversos
  lexicon: HALOT
  rationale: El sustantivo adjetival se refiere a personas moralmente torcidas. «Impíos» mantiene el contraste ético tradicional de Proverbios y suena más breve y elevado en español.
- source_word: אֱרָב
  english_pob_choice: are an ambush for
  chosen_spanish: son una emboscada para
  alternatives_spanish:
  - acechan para
  - están al acecho de
  lexicon: HALOT
  rationale: Se conserva la metáfora de emboscada/acecho en vez de suavizarla a una paráfrasis. «Son una emboscada para» refleja con fidelidad la imagen del hebreo y el valor nominal/predicativo del término.
- source_word: דָּם
  english_pob_choice: blood
  chosen_spanish: sangre
  alternatives_spanish:
  - derramamiento de sangre
  - muerte violenta
  lexicon: HALOT
  rationale: «Sangre» conserva la brevedad y la fuerza metonímica del hebreo, que apunta a violencia mortal o derramamiento de sangre sin explicitarlo en el texto principal.
- source_word: וּפִי
  english_pob_choice: but the mouth of
  chosen_spanish: pero la boca de
  alternatives_spanish:
  - pero la palabra de
  - pero el hablar de
  lexicon: HALOT
  rationale: Se mantiene la imagen corporal de «boca» para preservar el paralelismo con «palabras» en el primer hemistiquio y el contraste poético del proverbio.
- source_word: יְשָׁרִים
  english_pob_choice: the upright
  chosen_spanish: los rectos
  alternatives_spanish:
  - los justos
  - los íntegros
  lexicon: HALOT
  rationale: «Rectos» traduce con transparencia el sentido moral de יְשָׁרִים y conserva la simetría con «impíos» en español.
- source_word: יַצִּילֵם
  english_pob_choice: delivers them
  chosen_spanish: los libra
  alternatives_spanish:
  - los rescata
  - los salva
  lexicon: HALOT
  rationale: El verbo hifil de נצל expresa librar/rescatar. «Los libra» reproduce bien el valor de liberación y permite el objeto explícito con una dicción natural en español. Mantiene también la ambigüedad leve del referente del sufijo, como en el inglés POB.
translation_notes:
  revision_awareness: El pasaje coincide con el texto hebreo WLC y con la traducción inglesa auditada; no se registran revisiones aplicadas ni conflictos textuales relevantes. Se conservan la metáfora de emboscada y la ambigüedad del sufijo pronominal en יַצִּילֵם.
  spanish_consistency_notes:
  - Se usó «impíos» para רְשָׁעִים y «rectos» para יְשָרִים, en línea con un registro bíblico sobrio y consistente.
  - Se prefirió «boca» frente a una paráfrasis como «palabra» para conservar el paralelismo del proverbio.
  - «Sangre» se mantuvo sin expansión explicativa en el texto principal para respetar la concisión poética del hebreo.
