base_translation:
  language: en
  yaml_path: translation/extra_canonical/testaments_twelve_patriarchs/dan/004/007.yaml
  text: And anger with falsehood is a two-faced evil, and they join with one another in order to trouble the heart; and when the soul is continually troubled, the Lord departs from it, and Beliar rules over it.
  revision_pass:
