  source_alignment_summary: 'El borrador conserva bien la estructura del hebreo: presentación desde el sacrificio de los sacrificios de paz, destinatario explícito a Yahvé, y la doble referencia a la grasa que cubre y a toda la grasa sobre las entrañas. Sin embargo, se aparta innecesariamente de la decisión auditada de la POB para אִשֶּׁה, que aquí se documentó como ''food offering'' con alternativas de fuego en nota. En español, ''ofrenda ígnea'' no refleja esa decisión y además suena menos natural y menos transparente.'
  spanish_quality_summary: El español es claro y mayormente natural. 'Del sacrificio de las ofrendas de paz' es comprensible, aunque algo pesado por la repetición cultual; no obstante, sigue fielmente el hebreo. El principal problema de legibilidad y fidelidad auditada es 'ofrenda ígnea', que es cultista y menos claro que 'ofrenda de alimento'. El resto ('grasa', 'entrañas', 'que cubre', 'está sobre') funciona bien.
  glossary_alignment: 'Alinea correctamente יהוה como ''Yahvé'' y mantiene la terminología sacrificial básica. No obstante, no sigue la racionalidad léxica documentada para אִשֶּׁה: la POB inglesa eligió el sentido de ''food offering'' y reservó las opciones ''offering by fire''/''fire offering'' para nota. En español corresponde reflejar esa misma prioridad semántica.'
  issues:
