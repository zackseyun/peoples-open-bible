revisions:
- from: Pero tú, Yahvé[a], me conoces; me ves, y examinas mi corazón hacia ti. Sácalos[b] como ovejas para la matanza[c], y conságralos para el día de la matanza.
  to: Pero tú, Yahvé, me conoces; me ves, y examinas mi corazón hacia ti[a]. Sácalos como ovejas para la matanza, y apártalos[b] para el día de la matanza[c].
  rationale: Se corrige el anclaje de la nota sobre אִתָּךְ, que debía ir con 'hacia ti'. Se cambia 'conságralos' por 'apártalos' para seguir la decisión lexical de la POB y evitar una connotación positiva indebida en contexto de juicio. Se conserva 'matanza' por legibilidad española, pero se explicita en nota la alternativa más literal correspondiente al rastro inglés. No hace falta adjudicación adicional porque los ajustes son claros y de bajo riesgo doctrinal.
