    text: Hebrew final clause uncertain. The Cairo Geniza Hebrew reads literally something like 'whose פי of two is its poverty,' which is difficult to construe. The Greek parallel reads, 'Do not rejoice in much luxury, nor be bound to its expense,' supporting the sense that indulgence ends in financial loss.
    reason: textual_variant
  - marker: b
    text: Or 'Do not delight in even a little pleasure.' The Hebrew שֶׁמֶץ can mean a small fragment or trace.
    reason: lexical_alternative
