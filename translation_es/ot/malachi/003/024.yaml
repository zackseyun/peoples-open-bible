    issue: «el corazón» está en singular donde el hebreo y el POB auditado favorecen plural distributivo
    rationale: לֵב con sujetos plurales paralelos se expresó en inglés como «hearts». En español, «los corazones» conserva mejor la reciprocidad distributiva y suena más natural en esta construcción.
  - severity: medium
    issue: «la tierra» no refleja con suficiente precisión la decisión auditada de הָאָרֶץ como «the land»
    rationale: El expediente inglés justificó un sentido territorial-covenantal, no cósmico. «La tierra» en español puede entenderse como planeta o tierra en general; conviene una redacción que mantenga el referente territorial del juicio.
  - severity: medium
    issue: «anatema de destrucción» puede inducir lecturas eclesiásticas o de simple maldición para חֵרֶם
    rationale: Aunque intenta preservar el peso técnico, «anatema» en español suele asociarse a excomunión o condena formal. El hebreo apunta a algo puesto bajo interdicto y destinado a destrucción; la nota debe explicarlo y el texto principal no debería crear una falsa asociación dominante.
