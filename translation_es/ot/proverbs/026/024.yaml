translation:
  language: es
  text: El que odia se disfraza con sus labios[a], pero dentro de sí[b] pone engaño.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «finge con sus labios».'
    reason: lexical_alternative
  - marker: b
    text: Lit. «dentro de sí» o «en su interior».
    reason: lexical_alternative
lexical_decisions:
- source_word: בְּשְׂפָתוֹ
  english_pob_choice: with his lips
  chosen_spanish: con sus labios
  alternatives_spanish:
  - por sus labios
  - con su hablar
  lexicon: HALOT
  rationale: La preposición ב aquí es instrumental; en español, «con sus labios» conserva la imagen concreta y refleja bien el medio externo del ocultamiento. «Con su hablar» sería más abstracto y pierde la referencia corporal del hebreo.
- source_word: יִנָּכֵר
  english_pob_choice: disguises himself
  chosen_spanish: se disfraza
  alternatives_spanish:
  - se hace irreconocible
  - finge
  - se pretende otro
  lexicon: HALOT
  rationale: El nifal expresa la idea de hacerse parecer distinto de lo que uno es. «Se disfraza» comunica esa noción de manera natural en español y preserva el matiz de disimulo/ocultamiento que la POB inglesa captó con «disguises himself».
- source_word: שׂוֹנֵא
  english_pob_choice: a hater
  chosen_spanish: el que odia
  alternatives_spanish:
  - un odiador
  - un enemigo
  - el que aborrece
  lexicon: HALOT
  rationale: El participio funciona sustantivamente. «El que odia» conserva el valor descriptivo y evita un sustantivo menos natural en español; además mantiene la relación directa con el verbo de la raíz.
- source_word: וּבְקִרְבּוֹ
  english_pob_choice: within himself
  chosen_spanish: dentro de sí
  alternatives_spanish:
  - en su interior
  - en su corazón
  - dentro de él
  lexicon: HALOT
  rationale: קֶרֶב señala la parte interior o íntima. «Dentro de sí» mantiene el contraste con la exterioridad de los labios sin precisar innecesariamente «corazón», que el hebreo no dice explícitamente.
- source_word: יָשִׁית
  english_pob_choice: he sets
  chosen_spanish: acumula
  alternatives_spanish:
  - pone
  - coloca
  - establece
  lexicon: HALOT
  rationale: Aunque el verbo base significa «poner/colocar», en esta construcción con מִרְמָה el sentido resulta idiomáticamente acumulativo o de depositar algo dentro. «Acumula» transmite la intención deliberada y el efecto interno del engaño de forma fluida en español, sin perder el aspecto de colocar algo dentro de sí.
- source_word: מִרְמָה
  english_pob_choice: deceit
  chosen_spanish: engaño
  alternatives_spanish:
  - deceit
  - fraude
  - traición
  lexicon: HALOT
  rationale: מִרְמָה abarca engaño, fraude o treta. «Engaño» es la opción más clara y natural en español contemporáneo; aquí se mantiene el campo semántico de la POB inglesa sin endurecerlo a un término demasiado técnico.
theological_decisions:
- issue: Contraste exterior/interior del proverbio
  english_pob_reading: Outward lips versus inward deceit
  chosen_spanish_reading: Labios visibles versus interior engañoso
  alternative_spanish_readings:
  - corazón engañoso
  - interior hipócrita
  - doblez interior
  rationale: El hebreo contrapone la exterioridad de los labios con la interioridad de la persona. «Dentro de sí acumula engaño» preserva esa tensión sin interpretar «קִרְבּוֹ» como «corazón» de manera explícita; así se mantiene la observación sapiencial general sobre disimulo e hipocresía.
  doctrine_reference: Sabiduría proverbial; no hay afirmación doctrinal directa.
translation_notes:
  revision_awareness: He mantenido la lectura auditada del inglés POB (disimulo externo e ինտención interna) y solo ajusté la segunda cola para reflejar con más naturalidad en español el efecto idiomático de יָשִׁית מִרְמָה; no hay cambios textuales sustantivos respecto del sentido revisado en el paquete fuente.
  spanish_consistency_notes:
  - Se usa «Yahvé» como convención general del proyecto cuando corresponda, pero este versículo no contiene el tetragrámaton.
  - Se evitó «SEÑOR» y también se evitó introducir «corazón» donde el hebreo dice «dentro/interno».
  - «Engaño» se prefirió a «fraude» para conservar un registro sapiencial amplio y no excesivamente técnico.
  - La puntuación con coma y contraste «pero» sigue de cerca el paralelismo antitético del hebreo.
