  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: ὅτι ἐν πολλῇ δοκιμῇ θλίψεως ἡ περισσεία τῆς χαρᾶς αὐτῶν καὶ ἡ κατὰ βάθους πτωχεία αὐτῶν ἐπερίσσευσεν εἰς ⸂τὸ πλοῦτος⸃ τῆς ἁπλότητος αὐτῶν·
base_translation:
  language: en
  yaml_path: translation/nt/2_corinthians/008/002.yaml
  text: that in a severe test of affliction[b][a], the abundance of their joy and their deep poverty overflowed into the wealth of their generosity.
translation:
  language: ko
  text: 환난의 심한 시험 가운데서도 그들의 넘치는 기쁨과 깊은 가난[a]이 그들의 후한 베풂[b]의 풍성함으로 흘러넘쳤습니다.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 또는 「극심한 가난」. 헬라어 κατὰ βάθους는 깊이를 강조하는 관용 표현이다.
    reason: lexical_alternative
  - marker: b
    text: 헬라어 ἁπλότης는 본래 「단순함」이지만, 헌금 문맥에서는 「관대한 베풂」을 가리킨다.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἁπλότης
  english_pob_choice: generosity
  chosen_korean: 후한 베풂
  lexicon: BDAG
  rationale: 본래 「단순함」이지만 바울이 헌금을 다루는 문맥에서는 「관대한 베풂」의 함의로 사용된다. 8장 헌금 흐름에서 영어 POB의 「generosity」와 동일하게 「후한 베풂」으로 옮긴다.
  alternatives_korean:
  - 단순함
  - 순전함
  - 관대함
- source_word: ἐπερίσσευσεν
  english_pob_choice: overflowed
  chosen_korean: 흘러넘쳤습니다
  lexicon: BDAG
  rationale: 아오리스트 περισσεύω는 결과를 향해 넘쳐 흐르는 이미지를 담는다. 「흘러넘치다」가 뒤이어 오는 εἰς 구절과 자연스럽게 호응한다.
  alternatives_korean:
  - 풍성하였습니다
