translation:
  language: es
  text: Sepan que Yahvé[a] es Dios. Él nos hizo, y no nosotros mismos; somos su pueblo y las ovejas de su pasto.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, siguiendo la lectura marginal tradicional: «Él nos hizo, y somos suyos».'
    reason: alternative_reading
lexical_decisions:
- source_word: דְּעוּ
  english_pob_choice: Know
  chosen_spanish: Sepan
  alternatives_spanish:
  - Conozcan
  - Reconozcan
  lexicon: HALOT
  rationale: El imperativo plural de ידע convoca a la asamblea a un conocimiento reconocedor y confesional. En español, «Sepan» mantiene el llamado directo y suena natural en un contexto litúrgico sin perder la fuerza exhortativa.
- source_word: כִּי
  english_pob_choice: that
  chosen_spanish: que
  alternatives_spanish:
  - porque
  - pues
  lexicon: HALOT
  rationale: Introduce el contenido de lo que debe saberse. «Que» reproduce con naturalidad la subordinación declarativa en español.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  lexicon: HALOT
  rationale: Se sigue la convención del proyecto para el Tetragrámaton. «Yahvé» conserva el nombre divino en lugar de sustituirlo por un título.
- source_word: הוּא אֱלֹהִים
  english_pob_choice: he is God
  chosen_spanish: es Dios
  alternatives_spanish:
  - él es Dios
  - él es el único Dios
  lexicon: HALOT
  rationale: El hebreo añade el pronombre enfático. En español, el sujeto explícito en la primera oración hace innecesario repetir «él»; «es Dios» conserva la afirmación enfática sin añadir exclusividad no explícita.
- source_word: הוּא עָשָׂנוּ
  english_pob_choice: He made us
  chosen_spanish: Él nos hizo
  alternatives_spanish:
  - Él nos ha hecho
  - Él nos formó
  lexicon: HALOT
  rationale: עָשָׂה se refiere aquí a la acción creadora o constitutiva de Dios respecto de su pueblo. «Nos hizo» es breve, fiel y natural en español bíblico contemporáneo.
- source_word: וְלֹא אֲנַחְנוּ
  english_pob_choice: and not we ourselves
  chosen_spanish: y no nosotros a nosotros mismos
  alternatives_spanish:
  - y no nosotros mismos
  - y no fuimos nosotros
  lexicon: HALOT
  rationale: 'Se conserva la lectura consonántica/ketiv de negación: Dios nos hizo, y no nosotros a nosotros mismos. La formulación española intenta reflejar esa tensión textual sin suavizarla hacia la lectura alternativa.'
- source_word: עַמּוֹ
  english_pob_choice: his people
  chosen_spanish: pueblo suyo
  alternatives_spanish:
  - su pueblo
  - su gente
  lexicon: HALOT
  rationale: El posesivo hebreo expresa pertenencia covenantal. «Pueblo suyo» mantiene la relación de pertenencia y suena más idiomático en español que una repetición rígida de «su pueblo» tras la cláusula anterior.
- source_word: וְצֹאן מַרְעִיתוֹ
  english_pob_choice: and the sheep of his pasture
  chosen_spanish: y ovejas de su prado
  alternatives_spanish:
  - y el rebaño de su pasto
  - y las ovejas de su pastizal
  lexicon: HALOT
  rationale: Se preserva la metáfora pastoral. «Prado» es una opción natural en español para מַרְעִית en este contexto y evita la dureza de «pastura» sin perder la imagen del lugar de alimentación y cuidado.
theological_decisions:
- issue: Lectura ketiv/qere en la segunda mitad del versículo
  english_pob_reading: 'Main text follows the ketiv sense: ''He made us, and not we ourselves.'' The qere/traditional alternative is preserved in a footnote.'
  chosen_spanish_reading: 'El texto principal sigue la lectura del ketiv: «Él nos hizo, y no nosotros a nosotros mismos».'
  alternative_spanish_readings:
  - «Él nos hizo, y somos suyos»
  - «Él nos hizo, y no a nosotros mismos»
  rationale: El hebreo escrito con לֹא favorece la negación; por fidelidad al texto consonántico se mantiene esa lectura en el cuerpo principal. La alternativa tradicional de pertenencia es legítima, pero se deja para nota en vez de reemplazarla.
  doctrine_reference: Translation philosophy §§1, 3, 5
translation_notes:
  revision_awareness: La revisión más reciente no introdujo cambios; el consenso de control cruzado indica acuerdo alto con una sola observación menor, por lo que se mantiene la lectura principal del ketiv y se conserva la alternativa tradicional en nota.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» para el nombre divino, conforme al estándar del proyecto.
  - Se conserva la tensión textual entre la lectura negativa del ketiv y la lectura tradicional de pertenencia mediante nota.
  - «Pueblo suyo» y «ovejas de su prado» mantienen el paralelismo posesivo y pastoral del hebreo sin introducir términos eclesiásticos ajenos al texto.
