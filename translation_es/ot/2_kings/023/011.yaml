translation:
  language: es
  text: Quitó los caballos que los reyes de Judá habían dedicado al sol, desde la entrada de la casa de Yahvé hasta la cámara de Nétan-melec, el oficial de la corte[a], que estaba en los recintos[b]; y quemó los carros del sol con fuego.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «el eunuco»; el término hebreo puede referirse tanto a un eunuco como a un oficial real o de la corte.
    reason: lexical_alternative
  - marker: b
    text: El término hebreo es raro y puede referirse a una zona periférica del complejo del templo; alternativas incluyen «suburbios» o «columnatas».
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּשְׁבֵּת
  english_pob_choice: removed
  chosen_spanish: quitó
  alternatives_spanish:
  - removió
  - hizo cesar
  - apartó
  lexicon: HALOT
  rationale: El hifil de שׁבת aquí expresa hacer cesar o retirar de uso. En español, «quitó» comunica bien la acción concreta de sacar de servicio los caballos cultuales sin volverla demasiado abstracta.
- source_word: הַסּוּסִים
  english_pob_choice: the horses
  chosen_spanish: los caballos
  alternatives_spanish:
  - los caballos
  - los equinos
  lexicon: HALOT
  rationale: Es el sustantivo directo y natural en español. «Caballos» preserva el referente animal sin añadir matices.
- source_word: אֲשֶׁר נָתְנוּ מַלְכֵי יְהוּדָה לַשֶּׁמֶשׁ
  english_pob_choice: that the kings of Judah had dedicated to the sun
  chosen_spanish: que los reyes de Judá habían dedicado al sol
  alternatives_spanish:
  - que los reyes de Judá habían dado al sol
  - que los reyes de Judá habían apartado para el sol
  lexicon: HALOT
  rationale: «Dedicar» refleja mejor que una simple entrega la función cultual implícita en el contexto de idolatría solar. «Al sol» conserva el valor del sustantivo común con sentido cultual por el contexto.
- source_word: מִבֹּא בֵית יְהוָה
  english_pob_choice: from the entrance of the house of Yahweh
  chosen_spanish: desde la entrada de la casa de Yahvé
  alternatives_spanish:
  - desde el acceso de la casa de Yahvé
  - desde la entrada del templo de Yahvé
  lexicon: HALOT
  rationale: La preposición y el sustantivo marcan el tramo espacial de ubicación; «desde la entrada» sigue la revisión auditada del inglés y sugiere el punto de inicio de esa localización.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: 'Se sigue el estándar del proyecto para el Tetragrámaton: transliteración del nombre divino, no sustitución por un título.'
- source_word: לִשְׁכַּת
  english_pob_choice: by the chamber of
  chosen_spanish: hasta la cámara de
  alternatives_spanish:
  - a la cámara de
  - junto a la cámara de
  lexicon: HALOT
  rationale: La secuencia espacial hebrea indica extensión de un tramo «desde... hasta...». «Cámara» es el equivalente natural de לשכה en un contexto palacial/templario.
- source_word: נְתַן מֶלֶךְ
  english_pob_choice: Nethan-melech
  chosen_spanish: Nétan-melec
  alternatives_spanish:
  - Nethan-melec
  - Natán-melec
  lexicon: BDB/HALOT
  rationale: Es un nombre propio que se translitera. Se conserva su forma hebrea aproximada en español, sin traducir sus elementos.
- source_word: הַסָּרִיס
  english_pob_choice: the court official
  chosen_spanish: el oficial de la corte
  alternatives_spanish:
  - el eunuco
  - el funcionario de la corte
  lexicon: HALOT
  rationale: El hebreo puede significar eunuco u oficial real. Como el inglés auditado opta por una lectura funcional, en español «oficial de la corte» evita imponer el dato físico y mantiene la ambigüedad histórica.
- source_word: בַּפַּרְוָרִים
  english_pob_choice: in the precincts
  chosen_spanish: en los recintos
  alternatives_spanish:
  - en los alrededores
  - en los suburbios
  - en las dependencias
  lexicon: HALOT
  rationale: Es un término raro y topográfico. «Recintos» comunica la idea de un área periférica o de extensión del complejo sin afirmar demasiado sobre su forma exacta.
- source_word: מַרְכְּבוֹת הַשֶּׁמֶשׁ
  english_pob_choice: the chariots of the sun
  chosen_spanish: los carros del sol
  alternatives_spanish:
  - los carros solares
  - los carros del sol
  lexicon: HALOT
  rationale: «Carros» es un equivalente natural para מַרְכְּבוֹת. Se mantiene el genitivo literal «del sol» para conservar la imaginería cultual.
- source_word: שָׂרַף בָּאֵשׁ
  english_pob_choice: he burned with fire
  chosen_spanish: quemó con fuego
  alternatives_spanish:
  - los quemó
  - los incendió
  - los quemó en el fuego
  lexicon: HALOT
  rationale: La fórmula hebrea incluye explícitamente el medio del fuego. «Quemó con fuego» mantiene esa fuerza, aunque en español la combinación puede sonar enfática.
theological_decisions:
- issue: Tratamiento del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: Se conserva el nombre propio divino en transliteración, conforme a la política del proyecto y a la transparencia con el texto hebreo. No se usa una sustitución titular que oculte el Tetragrámaton.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Ambigüedad de הַסָּרִיס
  english_pob_reading: court official, with eunuch as alternative
  chosen_spanish_reading: oficial de la corte, con eunuco como alternativa
  alternative_spanish_readings:
  - eunuco
  - funcionario de la corte
  rationale: El término admite más de una lectura. Se prioriza la función administrativa porque el contexto no exige afirmar castración; la alternativa se conserva para no borrar la tensión lexical.
  doctrine_reference: Lexical ambiguity in royal-administrative terminology
translation_notes:
  revision_awareness: Se incorporó la revisión auditada que ajusta la relación espacial a «desde la entrada ... hasta la cámara», en lugar de una fórmula más vaga. También se conservó la solución del inglés para la rareza de פַּרְוָרִים mediante una nota de ambigüedad lexical.
  spanish_consistency_notes:
  - Se usa «Yahvé» de manera consistente para יְהוָה.
  - Se mantiene «sol» en minúscula por tratarse del sustantivo común con sentido cultual contextual.
  - «Cámara» se usa para לִשְׁכָּה como término arquitectónico neutro.
  - Los nombres propios se transliteran sin traducirse.
