revisions:
- from: En ti, Yahvé[a], me he refugiado; no me pongas en vergüenza jamás.
  to: En ti, Yahvé[a], he buscado refugio; que jamás sea avergonzado.
  rationale: Se corrige la cláusula final para representar con naturalidad y fidelidad אַל אֵבֹשָׁה לְעוֹלָם, evitando el poco idiomático «no me pongas en vergüenza». También se mejora la fluidez de חָסִיתִי con «he buscado refugio». La nota se mantiene solo como explicación de política de traducción del nombre divino, no como alternativa textual.
  reviewer_model: gpt-5.4
