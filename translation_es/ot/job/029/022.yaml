translation:
  language: es
  text: Después de mis palabras, ellos no volvieron a hablar[a], y mi palabra[b] goteaba sobre ellos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'También puede entenderse: «no respondieron de nuevo»; el hebreo puede sugerir que, después de hablar Job, no continuaron o no replicaron.'
    reason: alternative_reading
  - marker: b
    text: 'Literalmente: «mi palabra goteaba sobre ellos»; es una imagen poética de la palabra que cae con suavidad, pero con peso y autoridad, sobre los oyentes.'
    reason: lexical_alternative
lexical_decisions:
- source_word: אַחֲרֵי
  english_pob_choice: After
  chosen_spanish: Después de
  alternatives_spanish:
  - Después
  - Tras
  lexicon: HALOT
  rationale: La preposición temporal introduce lo que ocurrió una vez que Job habló. «Después de» comunica con naturalidad la relación temporal sin perder el orden del hebreo.
- source_word: דְבָרִי
  english_pob_choice: my words
  chosen_spanish: mis palabras
  alternatives_spanish:
  - mis palabras dichas
  - mi discurso
  lexicon: HALOT
  rationale: El hebreo usa plural con sufijo de primera persona. «Mis palabras» conserva ese plural concreto mejor que una abstracción como «mi discurso».
- source_word: לֹא יִשְׁנוּ
  english_pob_choice: they did not speak again
  chosen_spanish: no volvieron a hablar
  alternatives_spanish:
  - no respondieron de nuevo
  - no repitieron
  - no hablaron otra vez
  lexicon: HALOT
  rationale: El verbo puede sugerir no repetir o no responder tras la intervención de Job. En español, «no volvieron a hablar» mantiene la idea discursiva del contexto y la alternancia de habla sin forzar una sola acepción.
- source_word: וְעָלֵימוֹ
  english_pob_choice: upon them
  chosen_spanish: sobre ellos
  alternatives_spanish:
  - encima de ellos
  - sobre los oyentes
  lexicon: HALOT
  rationale: La preposición עַל con sufijo plural se expresa de forma natural con «sobre ellos» y conserva el movimiento metafórico hacia los oyentes.
- source_word: תִּטֹּף
  english_pob_choice: dripped
  chosen_spanish: caía
  alternatives_spanish:
  - goteaba
  - destilaba
  - caía gota a gota
  lexicon: HALOT
  rationale: El verbo evoca un fluir o goteo poético de la palabra. «Caía» mantiene la imagen de descenso continuo en un español fluido; se evita una literalidad demasiado técnica que sonarían extraña en este contexto.
- source_word: מִלָּתִי
  english_pob_choice: my word
  chosen_spanish: mi palabra
  alternatives_spanish:
  - mi dicho
  - mi dicho hablaba
  - mi palabra dicha
  lexicon: HALOT
  rationale: Aunque el sustantivo es singular, en poesía puede referirse a la declaración pronunciada. «Mi palabra» sigue de cerca la revisión inglesa y conserva la unidad del término sin perder el sentido discursivo.
translation_notes:
  revision_awareness: La revisión inglesa reciente cambió «speech» por «word» para acercarse más al singular hebreo מִלָּתִי y mantener coherencia con «my words» al inicio del versículo. La redacción española sigue esa revisión con «mi palabra», mientras preserva el contraste con «mis palabras» al comienzo.
  spanish_consistency_notes:
  - Se mantuvo «palabras» en plural para דְבָרִי y «palabra» en singular para מִלָּתִי, reflejando la distinción del hebreo y de la revisión inglesa.
  - Se prefirió una solución verbal natural («no volvieron a hablar») antes que una calca rígida, pero sin perder la posible lectura alternativa de respuesta o repetición.
  - Se conservó la imagen poética de descenso en la nota de pie, ya que el español «caía» puede funcionar como equivalente estilístico de תִּטֹּף en contexto figurado.
