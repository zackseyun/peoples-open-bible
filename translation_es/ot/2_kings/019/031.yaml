review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador conserva bien el sentido básico del hebreo: procedencia paralela («de Jerusalén … del/desde el monte Sion»), «remanente», «sobrevivientes» y «El celo de Yahvé hará esto». Sin embargo, añade una nota al pie no sustentada por el expediente inglés ni necesaria por el hebreo, y contiene un problema gramatical en español («de el monte»).'
  spanish_quality_summary: 'El texto es mayormente claro y digno, pero «de el monte Sion» es incorrecto; debe ser «del monte Sion». Además, la nota [a] no aclara una ambigüedad real y termina repitiendo prácticamente la misma lectura, lo que entorpece la presentación. La sintaxis revisada queda natural y fiel: «Porque de Jerusalén saldrá un remanente, y del monte Sion, sobrevivientes. El celo de Yahvé hará esto.»'
  glossary_alignment: 'Buena alineación con la terminología del proyecto: יהוה -> «Yahvé» correctamente; שְׁאֵרִית -> «remanente» bien; וּפְלֵיטָה -> «sobrevivientes» bien; קִנְאַת -> «celo» bien. La única desalineación relevante es formal: el texto dice «de el monte» mientras la decisión léxica interna ya reconoce correctamente «del monte Sion». No hace falta nota para «celo», ya que la nota inglesa es opcional y el sentido principal queda bien expresado en español.'
  issues:
  - severity: medium
    issue: 'Error gramatical: «de el monte Sion»'
    rationale: En español estándar debe contraerse a «del monte Sion». La forma actual afecta la calidad y contradice la propia decisión léxica documentada en el borrador.
  - severity: medium
    issue: Nota al pie [a] innecesaria y mal justificada
    rationale: El hebreo no presenta aquí una alternativa textual o semántica significativa que requiera nota en español. La nota repite básicamente la misma estructura y no corresponde a la nota del expediente inglés, que estaba ligada a «zeal/jealousy», no a «will go out».
  - severity: low
    issue: Puntuación mejorable en el segundo miembro paralelo
    rationale: 'Una coma después de «Sion» ayuda a marcar el paralelismo y la elipsis poética en español: «y del monte Sion, sobrevivientes».'
  revised_spanish_text: Porque de Jerusalén saldrá un remanente, y del monte Sion, sobrevivientes. El celo de Yahvé hará esto.
  revision_rationale: Se corrige la contracción obligatoria «del», se elimina una nota al pie no respaldada por la evidencia ni necesaria para el lector, y se ajusta levemente la puntuación para reflejar mejor el paralelismo hebreo sin añadir interpretación.
