review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español sigue bien la secuencia del hebreo: cruce del Jordán, llegada a Jericó, hostilidad de Jericó y de los pueblos listados, y atribución divina de la victoria. Sin embargo, la nota al pie ya no concuerda bien con la decisión principal revisada en el audit trail inglés, que cambió de una lectura de liderazgo a ''men of Jericho''. Además, ''gergeseos'' no corresponde al etnónimo hebreo גִּרְגָּשִׁי, que en español debe reflejarse como ''gergeseos/gergaseos'' solo si se tratara de otra tradición; aquí lo más fiel es ''girgaseos''.'
  spanish_quality_summary: El texto es claro y digno, pero puede sonar más natural con puntuación española sin la coma después de la raya de cierre. 'Combatieron contra ustedes' es aceptable, aunque 'pelearon/lucharon' sería más común; no es necesario cambiarlo. La expresión final 'en manos de ustedes' es comprensible, pero 'en su mano' o 'en manos de ustedes' ambas sirven; la actual es aceptable.
  glossary_alignment: No hay conflicto con términos troncales del proyecto. El principal ajuste lexical es el etnónimo 'girgaseos'. La nota sobre בַּעֲלֵי יְרִיחוֹ debe alinearse con la opción principal 'los hombres de Jericó' y presentar 'los dueños/señores de Jericó' como alternativa literal, sin volver a privilegiar 'gobernantes' como si fuera la lectura principal establecida.
  issues:
  - severity: medium
    issue: La nota al pie desalineada con la traducción principal y el audit trail
    rationale: El texto principal traduce בַּעֲלֵי יְרִיחוֹ como 'los hombres de Jericó', pero la nota explica la expresión como si la opción preferida siguiera siendo 'amos/poseedores... gobernantes'. Debe dejar claro que esa es una alternativa literal/posible, no el sentido principal adoptado.
  - severity: medium
    issue: Etnónimo 'gergeseos' no refleja bien גִּרְגָּשִׁי
    rationale: El hebreo corresponde a los Girgashites; en español bíblico estándar es 'girgaseos'. 'Gergeseos' acerca el término a otra forma tradicional y puede confundir la identificación del pueblo.
  - severity: low
    issue: Puntuación alrededor de la raya
    rationale: La secuencia '—...—, y yo...' resulta menos natural en español. Es preferible cerrar la aposición con raya y seguir sin coma adicional antes de 'y yo'.
