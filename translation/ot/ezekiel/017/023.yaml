theological_decisions:
- issue: Scope of the bird imagery
  chosen_reading: Retain the broad image 'every bird of every wing' without specifying nations or peoples in the main text.
  alternative_readings:
  - Interpret the birds explicitly as the nations sheltered under the restored kingdom
  rationale: The wider chapter and prophetic imagery may suggest international scope, but the verse itself states the arboreal image rather than its interpretation. To avoid importing doctrinal or interpretive conclusions beyond the text, the translation preserves the metaphor in the main text.
  doctrine_reference: Translation philosophy §§1, 3
