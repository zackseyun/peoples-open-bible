lexical_decisions:
- source_word: ⲁⲛⲟⲕ
  chosen: I am
  alternatives:
  - I
  lexicon: Layton, Coptic Grammar; Crum, Coptic Dictionary (s.v. ⲁⲛⲟⲕ)
  rationale: Standard first-person self-identification formula in Thunder; preserving
    the recurring “I am” cadence is essential.
- source_word: ϩⲱⲱⲧ
  chosen: face
  alternatives:
  - presence
  - front
  lexicon: 'Crum, Coptic Dictionary (ϩⲱⲱⲧ: head, face, presence)'
  rationale: The idiom “before the face of” conveys presence vividly; ‘presence’ is
    a smooth alternative but ‘face’ keeps the concrete, paradox-sharp tone.
- source_word: ⲉ ⲧⲟⲟⲧϥ
  chosen: before (someone)
  alternatives:
  - in the presence of (him)
  - in front of (him)
  lexicon: Layton, Coptic Grammar (prepositional phrase ⲉ ⲧⲟⲟⲧⲥ/ϥ)
  rationale: Idiomatic prepositional phrase indicating being ‘before/in front of’
    a person. Rendered as ‘before’ to pair naturally with ‘face/presence’.
- source_word: ⲙⲛⲧⲁⲧ… (here read as shamelessness)
  chosen: without shame
  alternatives:
  - shamelessly
  lexicon: Crum, Coptic Dictionary (privative ⲁⲧ-; nominalizer ⲙⲛⲧ- forming abstract
    noun ‘shamelessness’)
  rationale: Adverbial sense fits the antithesis. ‘Without shame’ keeps the starkness;
    ‘shamelessly’ is acceptable but slightly more interpretive.
- source_word: ⲁⲩⲉⲓ … ⲃⲟⲗ (with ⲁⲛⲧⲉⲧⲛ)
  chosen: you were ashamed
  alternatives:
  - you went out
  - you withdrew
  lexicon: Context-driven; cf. parallel line in Thunder; morphological segmentation
    uncertain
  rationale: Given the established antithetical pair ‘ashamed/shameless’ in this speech,
    the most coherent reading for this cluster is a shame-verb; the ‘out/go out’ sense
    of ⲉⲓⲃⲟⲗ is likely not literal here.
- source_word: ⲙⲙⲟⲉⲓ (obj. pronoun context)
  chosen: toward me
  alternatives:
  - against me
  - with respect to me
  lexicon: General Coptic pronominal object usage
  rationale: Second hemistich contrasts orientation toward the speaker; ‘toward me’
    preserves ambiguity between relational and oppositional stance.
parallelism_check: 'The line preserves a clear binary antithesis: ‘ashamed’ vs ‘without
  shame,’ both oriented to ‘me.’ The parallel prepositional frames (‘before whose
  face’ // ‘toward me’) keep the chiastic feel without collapsing the contradiction.'
voice_check: Maintains the first-person declarative ‘I am’ voice characteristic of
  Thunder’s speeches, addressing a second-person plural audience with direct, paradoxical
  indictment.
