    text: 'O bien: «prensó el vellón» / «lo exprimió». El hebreo usa dos verbos en secuencia para describir la compresión del vellón y la extracción del rocío.'
    reason: lexical_alternative
  revision_rationale: 'Se ajusta la última cláusula para reflejar mejor el hebreo y el audit trail inglés: se conserva la doble acción verbal con una coordinación más natural en español, y se reemplaza «vasija» por «cuenco», que representa mejor הַסֵּפֶל como recipiente tipo bowl. También se pule la nota léxica para español más natural sin cambiar su función.'
