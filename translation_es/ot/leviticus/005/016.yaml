  to: Restituirá por lo que pecó en relación con lo santo[a], y le añadirá una quinta parte y la dará al sacerdote. Entonces el sacerdote hará expiación por él con el carnero del sacrificio por la culpa[b], y le será perdonado.
  rationale: Se ajusta 'lo sagrado' a 'lo santo' para reflejar mejor הַקֹּדֶשׁ y la formulación auditada 'holy thing', y se mejora la naturalidad de 'añadirá a ello' a 'le añadirá'. Se conserva el resto porque es fiel al hebreo y a las decisiones léxicas/teológicas documentadas.
