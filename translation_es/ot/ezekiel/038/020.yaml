  language: en
  yaml_path: translation/ot/ezekiel/038/020.yaml
  text: The fish of the sea[a], the birds of the heavens, the beasts of the field, every creeping thing that creeps on the ground, and every human being who is on the face of the earth will quake at my presence; the mountains will be thrown down, the steep places will fall, and every wall will fall to the ground.
  footnotes:
