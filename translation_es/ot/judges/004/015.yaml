    issue: 'Se añadió un posesivo no presente en הָרֶכֶב: «todos sus carros».'
    rationale: El hebreo dice «todo el carro/charrería» con artículo definido, no posesivo. El rastro inglés incluso fue revisado para quitar «his». En español conviene reflejarlo como «todos los carros» o equivalente colectivo.
  - severity: medium
    issue: Falta una nota para לְפִי חֶרֶב.
    rationale: 'El POB inglés preserva una nota léxica importante: literalmente «por la boca/filo de la espada». El borrador español afirma en sus decisiones que conserva esa literalidad en nota, pero la nota no aparece.'
  - severity: low
