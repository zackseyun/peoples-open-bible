translation:
  language: es
  text: Ella es más preciosa que las gemas[a], y nada de lo que deseas puede compararse con ella.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «rubíes»; el término hebreo probablemente se refiere de manera más general a gemas o piedras preciosas, y su identificación exacta es incierta.
    reason: lexical_alternative
lexical_decisions:
- source_word: יְקָרָה
  english_pob_choice: more precious
  chosen_spanish: más preciosa
  alternatives_spanish:
  - preciosa
  - costosa
  - valiosa
  lexicon: HALOT
  rationale: El adjetivo expresa alto valor. En español, al aparecer el comparativo implícito por la construcción hebrea, «más preciosa» comunica con naturalidad la comparación de valor.
- source_word: הִיא
  english_pob_choice: she
  chosen_spanish: ella
  alternatives_spanish:
  - eso
  - ello
  lexicon: HALOT
  rationale: El pronombre femenino singular conserva la personificación de la sabiduría en el contexto inmediato.
- source_word: מִפְּנִינִים
  english_pob_choice: than jewels
  chosen_spanish: que las gemas
  alternatives_spanish:
  - que los rubíes
  - que las joyas
  - que las perlas
  lexicon: HALOT
  rationale: פְּנִינִים designa piedras preciosas o gemas, pero su identificación exacta es incierta. «Gemas» preserva la incertidumbre léxica mejor que una identificación específica.
- source_word: וְכָל
  english_pob_choice: and all of
  chosen_spanish: y todos
  alternatives_spanish:
  - y ninguno de
  - y todas
  lexicon: HALOT
  rationale: Aunque literalmente dice «y todo», la idea distributiva se expresa naturalmente en español con «todos tus deseos» unido al verbo negado siguiente.
- source_word: חֲפָצֶיךָ
  english_pob_choice: your desires
  chosen_spanish: tus deseos
  alternatives_spanish:
  - tus delicias
  - tus placeres
  - tus cosas deseadas
  lexicon: HALOT
  rationale: El término puede referirse a lo que se desea o en lo que uno se deleita. «Tus deseos» sigue la decisión inglesa y mantiene la amplitud semántica sin sobreespecificar.
- source_word: לֹא יִשְׁווּ
  english_pob_choice: cannot compare
  chosen_spanish: no se pueden comparar
  alternatives_spanish:
  - no igualan
  - no son iguales
  - no pueden compararse
  lexicon: HALOT
  rationale: El verbo שוה expresa igualdad o comparabilidad. La forma impersonal en español reproduce bien la idea de que nada de eso alcanza su valor.
- source_word: בָּהּ
  english_pob_choice: with her
  chosen_spanish: con ella
  alternatives_spanish:
  - a ella
  - frente a ella
  lexicon: HALOT
  rationale: La preposición marca el objeto de comparación. «Con ella» es la forma idiomática en español para expresar comparación.
translation_notes:
  revision_awareness: El texto inglés auditado pasó de «none of your delights» a «all your desires» para reflejar mejor el hebreo. La redacción española sigue esa revisión al usar «todos tus deseos» y mantiene la lectura comparativa con un verbo negado, sin reducir el alcance del hebreo.
  spanish_consistency_notes:
  - Se mantuvo «ella» para la sabiduría personificada, en coherencia con el contexto sapiencial.
  - Se evitó «Cristo» o cualquier terminología cristológica porque el versículo no lo requiere.
  - «Gemas» preserva la incertidumbre léxica del término hebreo, en línea con la nota inglesa sobre la posible equivalencia tradicional «rubíes».
