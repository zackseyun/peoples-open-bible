translation:
  language: es
  text: Hizo la pila de bronce y su base de bronce de los espejos[b] de las mujeres que servían[a] a la entrada de la tienda de reunión.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «las mujeres que se reunían». El hebreo puede destacar tanto una reunión organizada como un servicio en ese lugar.'
    reason: alternative_reading
  - marker: b
    text: 'O: «de los espejos pulidos de metal». En la antigüedad, los espejos solían ser de bronce pulido, no de vidrio.'
    reason: cultural_note
lexical_decisions:
- source_word: כִּיּוֹר
  english_pob_choice: basin
  chosen_spanish: pila
  alternatives_spanish:
  - lavatorio
  - pileta
  lexicon: HALOT
  rationale: En este contexto de tabernáculo, el objeto es el recipiente para lavarse; «pila» comunica de forma natural la función cultual sin sonar tan arqueizante como «laver» y sin volverlo doméstico en exceso.
- source_word: כַּן
  english_pob_choice: stand
  chosen_spanish: base
  alternatives_spanish:
  - soporte
  - pedestal
  lexicon: HALOT
  rationale: El término designa la pieza que sostiene la pila. «Base» es claro en español y conserva la relación estructural sin añadir forma específica no indicada por el hebreo.
- source_word: נְחֹשֶׁת
  english_pob_choice: bronze
  chosen_spanish: bronce
  alternatives_spanish:
  - cobre
  lexicon: HALOT
  rationale: En el mobiliario del santuario, «bronce» es la equivalencia tradicional y adecuada para este metal en español; refleja el valor contextual del material sin forzar el sentido técnico más estrecho de «cobre».
- source_word: בְּמַרְאֹת
  english_pob_choice: from the mirrors
  chosen_spanish: con los espejos
  alternatives_spanish:
  - de los espejos
  - a partir de los espejos
  lexicon: HALOT
  rationale: La preposición hebrea puede leerse como material/fuente, pero en español «con» permite expresar que esos espejos fueron el material empleado para fabricar los objetos sin sonar pesado. La nota aclara la lectura de origen/material.
- source_word: הַצֹּבְאֹת אֲשֶׁר צָבְאוּ
  english_pob_choice: the women who served
  chosen_spanish: las mujeres que servían
  alternatives_spanish:
  - las mujeres que se reunían
  - las mujeres que acudían para servir
  lexicon: HALOT
  rationale: El participio y el verbo de צבא pueden implicar congregarse con propósito o prestar servicio. «Servían» mantiene esa tensión de actividad organizada sin resolverla hacia un oficio cultual más definido de lo que el verso afirma.
- source_word: פֶּתַח אֹהֶל מוֹעֵד
  english_pob_choice: at the entrance to the tent of meeting
  chosen_spanish: a la entrada de la tienda de reunión
  alternatives_spanish:
  - en la entrada de la tienda de reunión
  - a la puerta de la tienda de reunión
  lexicon: HALOT
  rationale: «Tienda de reunión» es la fórmula española fiel y ampliamente inteligible para אֹהֶל מוֹעֵד. «A la entrada» reproduce la relación locativa sin rigidizarla con una forma más estrecha como «puerta».
- source_word: וַיַּעַשׂ
  english_pob_choice: He made
  chosen_spanish: Hizo
  alternatives_spanish:
  - Y hizo
  - Hicieron
  lexicon: HALOT
  rationale: El perfecto narrativo se vierte de manera natural con el pretérito simple. El singular se conserva por fidelidad al sujeto gramatical del hebreo.
theological_decisions:
- issue: Identidad y función de הַצֹּבְאֹת אֲשֶׁר צָבְאוּ
  english_pob_reading: women who served at the entrance to the tent of meeting
  chosen_spanish_reading: las mujeres que servían a la entrada de la tienda de reunión
  alternative_spanish_readings:
  - las mujeres que se reunían a la entrada de la tienda de reunión
  - las mujeres que ministraban a la entrada de la tienda de reunión
  rationale: El hebreo permite tanto la idea de congregarse como la de servir en una atención ordenada. «Servían» preserva la lectura funcional de la POB inglesa sin convertir el texto en una afirmación más específica sobre ministerio sacerdotal o litúrgico femenino.
  doctrine_reference: Preservar la tensión léxica y no resolverla dogmáticamente más allá del verso.
translation_notes:
  revision_awareness: El texto sigue de cerca la traducción inglesa auditada y el hebreo subyacente; no hubo revisiones aplicadas en la pasada más reciente, y el consenso de control fue de alta concordancia.
  spanish_consistency_notes:
  - Se mantiene «tienda de reunión» como equivalente estable de אֹהֶל מוֹעֵד.
  - Se usa «Yahvé» por defecto en el proyecto, pero este versículo no contiene el nombre divino.
  - «Bronce» se conserva de forma consistente para נְחֹשֶׁת en contexto tabernacular.
  - La elección de «servían» mantiene abierta la posible lectura de reunión/servicio señalada por la fuente inglesa y por la raíz hebrea.
