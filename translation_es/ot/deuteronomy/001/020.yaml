translation:
  language: es
  text: 'Y les dije[a]: «Han llegado a la región montañosa de los amorreos, la cual Yahvé nuestro Dios nos está dando».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «la montaña de los amorreos». El hebreo puede referirse tanto a una sola montaña como, más ampliamente, a una región montañosa.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וָאֹמַר
  english_pob_choice: And I said
  chosen_spanish: Y yo les dije
  alternatives_spanish:
  - Entonces les dije
  - Y les dije
  lexicon: HALOT
  rationale: El wayyiqtol introduce la siguiente acción en la narración. En español, «Y yo les dije» conserva la secuencia narrativa y hace explícito el destinatario plural del verbo siguiente.
- source_word: אֲלֵכֶם
  english_pob_choice: to you
  chosen_spanish: les
  alternatives_spanish:
  - a ustedes
  - a vosotros
  lexicon: HALOT
  rationale: El pronombre plural de segunda persona se expresa de forma natural en español con «les» en el marco del discurso directo. «A ustedes» también sería posible, pero «les» evita pesadez y mantiene el tono bíblico.
- source_word: בָּאתֶם
  english_pob_choice: You have come
  chosen_spanish: Han llegado
  alternatives_spanish:
  - Han venido
  - Llegaron
  lexicon: HALOT
  rationale: El perfecto hebreo comunica una llegada ya cumplida con relevancia presente. «Han llegado» reproduce bien ese valor aspectual en español actual.
- source_word: עַד
  english_pob_choice: to
  chosen_spanish: hasta
  alternatives_spanish:
  - a
  - al
  lexicon: HALOT
  rationale: Con verbos de movimiento, עַד marca el punto alcanzado. «Hasta» expresa con claridad el límite o destino llegado.
- source_word: הַר הָאֱמֹרִי
  english_pob_choice: the hill country of the Amorites
  chosen_spanish: la región montañosa de los amorreos
  alternatives_spanish:
  - la montaña de los amorreos
  - el país montañoso de los amorreos
  lexicon: HALOT
  rationale: El sustantivo הַר puede referirse a una zona montañosa o de colinas, no solo a una montaña aislada. «Región montañosa» conserva ese alcance geográfico y evita una lectura demasiado literal.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  - el SEÑOR
  lexicon: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
  rationale: Se conserva el nombre divino propio, según la convención del proyecto en español, en lugar de sustituirlo por un título.
- source_word: אֱלֹהֵינוּ
  english_pob_choice: our God
  chosen_spanish: nuestro Dios
  alternatives_spanish:
  - nuestro Dios
  - el Dios nuestro
  lexicon: HALOT
  rationale: La construcción de estado constructo con sufijo plural se vierte de manera directa y natural como «nuestro Dios».
- source_word: נֹתֵן
  english_pob_choice: is giving
  chosen_spanish: está dando
  alternatives_spanish:
  - da
  - nos da
  - está entregando
  lexicon: HALOT
  rationale: El participio expresa acción en curso o inminente. «Está dando» preserva ese valor progresivo sin convertirlo en perfecto ni en un presente gnómico.
- source_word: לָנוּ
  english_pob_choice: us
  chosen_spanish: nos
  alternatives_spanish:
  - a nosotros
  - para nosotros
  lexicon: HALOT
  rationale: 'El dativo se integra naturalmente en español como objeto indirecto con pronombre enclítico/átono: «nos». En la frase verbal, «nos está dando» mantiene la relación beneficiaria sin añadir elementos innecesarios.'
theological_decisions:
- issue: Nombre divino del Tetragrámaton
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - el SEÑOR
  rationale: El hebreo contiene יְהוָה directamente; la traducción en español conserva el nombre propio revelado, no una sustitución titulativa. «Yahvé» es la forma establecida para este proyecto en español.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Sentido geográfico de הַר הָאֱמֹרִי
  english_pob_reading: the hill country of the Amorites
  chosen_spanish_reading: la región montañosa de los amorreos
  alternative_spanish_readings:
  - la montaña de los amorreos
  - la tierra montañosa de los amorreos
  rationale: 'Se preserva la tensión lexical: הַר puede significar una montaña concreta o una zona montañosa. La opción elegida comunica el valor geográfico sin cerrar indebidamente el alcance del hebreo.'
  doctrine_reference: HALOT on הַר; English POB footnote a lexical alternative
- issue: Aspecto del participio נֹתֵן
  english_pob_reading: is giving
  chosen_spanish_reading: está dando
  alternative_spanish_readings:
  - da
  - nos da
  - está entregando
  rationale: El participio hebreo señala acción en progreso o vigente. «Está dando» conserva el aspecto continuo y el matiz de don en proceso, coherente con la inminente entrada a la tierra.
  doctrine_reference: HALOT on participial aspect
translation_notes:
  revision_awareness: Se corrigió la pérdida del anclaje de nota para que el marcador [a] aparezca exactamente en el texto español. La redacción principal mantiene la decisión del POB inglés de reflejar הַר como una designación geográfica amplia, y conserva el nombre divino como Yahvé según la terminología del proyecto.
  spanish_consistency_notes:
  - Se usó «Yahvé» de forma consistente para יְהוָה.
  - Se evitó «SEÑOR» para no enmascarar el nombre divino.
  - Se mantuvo el plural de segunda persona implícito en «les».
  - 'Se optó por una formulación natural de llegada y aspecto progresivo: «Han llegado… está dando».'
  - La nota [a] está anclada en «región montañosa» y ofrece la alternativa lexical necesaria.
