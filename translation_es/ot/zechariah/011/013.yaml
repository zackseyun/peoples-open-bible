translation:
  language: es
  text: 'Entonces Yahvé me dijo: «Échalo al alfarero[a], el magnífico precio[b] en que fui valorado por ellos». Y tomé las treinta piezas de plata y las arrojé en la casa de Yahvé, al alfarero.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: ''el alfarero''. Algunos intérpretes proponen ''el tesorero'' por el contexto difícil y por el uso de este pasaje en el Nuevo Testamento, pero el Texto Masorético lee ''alfarero'' en ambos lugares.'
    reason: alternative_reading
  - marker: b
    text: 'O ''el magnífico precio'', probablemente con tono irónico: la frase se burla de la tasación insultantemente baja de treinta piezas de plata.'
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - SEÑOR
  - Jehová
  lexicon: uso consistente del nombre divino en la POB; correspondencia directa con el tetragrámaton
  rationale: La fuente hebrea tiene el nombre propio divino, no un título genérico. La política del proyecto pide 'Yahvé' en el texto principal para mantener transparencia y audibilidad textual.
- source_word: הַשְׁלִיכֵהוּ
  english_pob_choice: Throw it
  chosen_spanish: Échalo
  alternatives_spanish:
  - Tíralo
  - Lánzalo
  - Échalo fuera
  lexicon: HALOT 7993
  rationale: El imperativo de השליך admite 'echar' con objeto clítico en español natural y solemne. 'Échalo' preserva la acción directa sin calco rígido.
- source_word: הַיּוֹצֵר
  english_pob_choice: the potter
  chosen_spanish: el alfarero
  alternatives_spanish:
  - el pottero
  - el formador
  - el tesorero
  lexicon: HALOT 3335
  rationale: El sustantivo de יצר designa ordinariamente al alfarero. 'Alfarero' es el equivalente español más claro y fiel, y conserva la tensión del texto masorético, aun cuando existan propuestas alternativas.
- source_word: אֶדֶר הַיְקָר
  english_pob_choice: the magnificent price
  chosen_spanish: la magnífica suma
  alternatives_spanish:
  - el precio magnífico
  - el precio noble
  - la suma espléndida
  - el precio magnífico
  lexicon: HALOT 145 + HALOT 3366
  rationale: La expresión es difícil e irónica. 'Suma' comunica bien que se trata de una cantidad monetaria implícita, y 'magnífica' conserva el tono elevado/sarcástico que el inglés POB quiso reflejar con 'magnificent'.
- source_word: יָקַרְתִּי
  english_pob_choice: I was valued
  chosen_spanish: fui valorado
  alternatives_spanish:
  - fui tasado
  - me valoraron
  - fui apreciado
  lexicon: HALOT 3365
  rationale: El verbo tiene sentido pasivo/reflexivo en el contexto. 'Fui valorado' mantiene el matiz de tasación y la ironía del pasaje.
- source_word: מֵעֲלֵיהֶם
  english_pob_choice: by them
  chosen_spanish: por ellos
  alternatives_spanish:
  - de parte de ellos
  - por su parte
  - de ellos
  lexicon: HALOT 5921
  rationale: La frase marca agencia. 'Por ellos' es el equivalente español más directo y natural.
- source_word: שְׁלֹשִׁים הַכֶּסֶף
  english_pob_choice: the thirty pieces of silver
  chosen_spanish: las treinta piezas de plata
  alternatives_spanish:
  - treinta monedas de plata
  - treinta siclos de plata
  lexicon: HALOT 7970 + HALOT 3701
  rationale: '''Piezas de plata'' reproduce la expresión idiomática reconocible sin introducir ''siclos'', que el hebreo no explicita. El artículo y la pluralidad se conservan de forma natural en español.'
- source_word: בֵּית יְהוָה
  english_pob_choice: the house of Yahweh
  chosen_spanish: la casa de Yahvé
  alternatives_spanish:
  - el templo de Yahvé
  - la casa del Señor
  lexicon: HALOT 1004
  rationale: Se conserva 'casa' para reflejar el hebreo literal. 'Templo' sería interpretativo; 'casa de Yahvé' mantiene la transparencia textual.
- source_word: אֶל הַיּוֹצֵר
  english_pob_choice: to the potter
  chosen_spanish: al alfarero
  alternatives_spanish:
  - para el alfarero
  - hacia el alfarero
  - al tesorero
  lexicon: HALOT 3335
  rationale: La repetición final de 'al alfarero' sigue el texto masorético y evita armonizarlo con conjeturas que el audit trail no adoptó como lectura principal.
theological_decisions:
- issue: Cómo preservar la ironía de la valoración y la lectura masorética de 'alfarero'
  english_pob_reading: 'Retain the Masoretic Text''s ''potter'' and render the valuation phrase with evident irony: ''the magnificent price at which I was valued by them.'''
  chosen_spanish_reading: 'Conservar ''alfarero'' y una expresión irónica: ''la magnífica suma en que fui valorado por ellos''.'
  alternative_spanish_readings:
  - '''el tesorero'''
  - '''el precio magnífico en que me tasaron'''
  - '''la magnífica suma en que me apreciaron'''
  rationale: No hay base doctrinal para reemplazar la repetición de 'alfarero' con una emendación. La fórmula elegida mantiene la tensión sarcástica del hebreo y del audit trail inglés, sin suavizarla ni resolverla artificialmente.
  doctrine_reference: Principios de primacía de la fuente y preservación de tensiones textuales
translation_notes:
  revision_awareness: El inglés POB pasó de 'lordly price' a 'magnificent price' para captar mejor la ironía; la versión española sigue esa última decisión con 'la magnífica suma'. Se mantuvo la repetición masorética de 'alfarero' y la referencia a la casa de Yahvé, sin armonizar con lecturas conjeturales.
  spanish_consistency_notes:
  - Se usó 'Yahvé' de forma consistente con la política del proyecto para el tetragrámaton.
  - Se prefirió 'alfarero' a 'tesorero' para reflejar el Texto Masorético y la decisión auditada del POB.
  - '''Piezas de plata'' mantiene el valor idiomático sin sobreespecificar la unidad monetaria.'
  - La puntuación busca conservar el contraste entre el mandato y la ironía del comentario evaluativo.
