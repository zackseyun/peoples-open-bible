  text: θεωρεῖτε δὲ πῶς πολυπλόκος ἐστὶν ἡ τῆς φιλοτεκνίας στοργή, ἕλκουσα πάντα πρὸς τὴν τῶν σπλάγχνων συμπάθειαν.
