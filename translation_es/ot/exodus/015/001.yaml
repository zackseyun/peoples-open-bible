base_translation:
  language: en
  yaml_path: translation/ot/exodus/015/001.yaml
  text: 'Then Moses and the sons of Israel sang this song to Yahweh[a], and they said: “I will sing to Yahweh, for he has triumphed gloriously[b]; horse and its rider he has thrown into the sea.”'
  footnotes:
  - marker: a
    text: 'Hebrew: ''YHWH'' (traditionally rendered ''the LORD''; alternatively ''Yahweh'').'
    reason: alternative_reading
  - marker: b
    text: Or 'he is highly exalted'; the Hebrew intensifies the verb with a repeated form.
    reason: lexical_alternative
