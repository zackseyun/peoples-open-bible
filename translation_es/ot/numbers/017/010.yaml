revisions:
- from: ¡Levántense de en medio de esta congregación[a], para que yo los consuma en un momento[b]! Y se postraron sobre sus rostros.
  to: ¡Levántense de en medio de esta congregación[a], para que yo los consuma en un momento[b]! Y cayeron rostro en tierra.
  rationale: Se conserva la estructura y las decisiones léxicas principales del borrador, pero se corrige la última cláusula para lograr un español más natural y fiel al modismo hebreo de postración. «Y cayeron rostro en tierra» comunica claramente la acción de humillarse o interceder sin la combinación poco idiomática «se postraron sobre sus rostros».
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T21:45:29Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue de cerca el hebreo y el rastro auditado en inglés: mantiene el imperativo de separación, la referencia a la congregación, la intención divina de consumirlos rápidamente y la reacción de Moisés y Aarón. Sin embargo, «Y se postraron sobre sus rostros» suena poco natural en español y además combina una interpretación del gesto («se postraron») con un complemento demasiado literal. El hebreo dice literalmente «y cayeron sobre sus rostros», un modismo que en español se expresa mejor como «cayeron rostro en tierra» o «cayeron sobre sus rostros».'
  spanish_quality_summary: La redacción es en general clara y digna. «Levántense de en medio de esta congregación» es aceptable aunque algo tensa en español; no requiere cambio porque preserva bien la decisión del POB. El punto principal a reparar es la última cláusula, donde la mezcla de «se postraron» con «sobre sus rostros» produce una frase poco idiomática. «Cayeron rostro en tierra» es más natural y conserva la fuerza del modismo bíblico.
  glossary_alignment: No hay conflictos con la terminología del proyecto. «Congregación» corresponde bien a עֵדָה. No aparecen términos sensibles como Yahvé/Mesías. La decisión de mantener «consuma» para וַאֲכַלֶּה concuerda con la justificación lexical del POB. La nota alternativa sobre «asamblea» y la de «destruirlos en un instante» están bien planteadas.
  issues:
  - severity: medium
    issue: 'Expresión poco natural: «Y se postraron sobre sus rostros».'
    rationale: El hebreo usa el modismo «cayeron sobre sus rostros». El borrador interpreta bien el gesto con «se postraron», pero el complemento «sobre sus rostros» resulta forzado en español. Conviene usar una formulación idiomática como «cayeron rostro en tierra», que mantiene el sentido sin rigidez.
  revised_spanish_text: ¡Levántense de en medio de esta congregación[a], para que yo los consuma en un momento[b]! Y cayeron rostro en tierra.
