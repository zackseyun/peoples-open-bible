lexical_decisions:
- source_word: וַתֵּלֶד
  english_pob_choice: And she bore
  chosen_spanish: Y ella le dio a luz
  alternatives_spanish:
  - Y ella dio a luz
  - Y ella le parió
  lexicon: HALOT
  rationale: El hebreo indica el inicio de una nueva acción narrativa mediante wayyiqtol de ילד. En español, «dio a luz» conserva el sentido de alumbrar sin volverlo demasiado literal o áspero; se mantiene el sujeto femenino y la relación verbal con el siguiente complemento.
- source_word: לוֹ
  english_pob_choice: him
  chosen_spanish: le
  alternatives_spanish:
  - a él
  - para él
  lexicon: HALOT
  rationale: El ל con sufijo pronominal en esta fórmula de nacimiento señala al padre como destinatario relacional. En español, el dativo «le» reproduce con naturalidad esa función sin añadir peso explicativo.
- source_word: בָּנִים
  english_pob_choice: sons
  chosen_spanish: hijos
  alternatives_spanish:
  - varones
  - hijos varones
  lexicon: HALOT
  rationale: Aunque el hebreo dice literalmente «hijos/varones» en plural masculino, en español genealógico «hijos» comunica con claridad la descendencia masculina sin sonar redundante en una lista nominal. Se conserva la referencia masculina por el contexto de los nombres propios masculinos.
- source_word: יְע֥וּשׁ
  english_pob_choice: Jeush
  chosen_spanish: Jeús
  alternatives_spanish:
  - Yeús
  - Jeush
  lexicon: HALOT
  rationale: Se adapta el nombre al español bíblico común con acento gráfico para reflejar la pronunciación hispana natural. La forma mantiene la transliteración del nombre sin traducirlo.
- source_word: שְׁמַרְיָ֖ה
  english_pob_choice: Shemariah
  chosen_spanish: Semarías
  alternatives_spanish:
  - Shemarías
  - Shemaría
  lexicon: HALOT
  rationale: Se hispaniza el nombre para una lectura más fluida en español, manteniendo su forma onomástica reconocible. La terminación en -ías es una adaptación habitual y transparente en nombres bíblicos españoles.
- source_word: זָהַם
  english_pob_choice: Zaham
  chosen_spanish: Zaham
  alternatives_spanish:
  - Zajam
  lexicon: HALOT
  rationale: Se conserva la transliteración convencional del nombre propio, sin intentar normalizarlo ni reinterpretarlo.
translation_notes:
  revision_awareness: El pasaje está en alto acuerdo entre la fuente hebrea y el audit trail inglés; no se observan revisiones aplicadas en el último pase. La versión española sigue el mismo contenido referencial y la misma lista nominal, con hispanización leve de nombres para legibilidad.
  spanish_consistency_notes:
  - 'Se mantiene la estructura genealógica breve del hebreo y del POB inglés: fórmula de nacimiento + lista de tres nombres.'
  - No se introduce puntuación explicativa adicional más allá de dos puntos, que reflejan bien la transición a la enumeración.
  - Los nombres propios se hispanizan solo en la medida necesaria para lectura natural en español, sin alterar la identificación de los personajes.
