translation:
  language: es
  text: Y su oración, y cómo fue escuchado, y todo su pecado y su infidelidad, y los lugares donde edificó lugares altos y puso los asherim[a] y las imágenes talladas antes de humillarse—he aquí, están escritos en los registros de los videntes[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O ‘los postes de Asera’. El hebreo puede referirse a objetos cultuales asociados con Asera.
    reason: lexical_alternative
  - marker: b
    text: O ‘en las palabras de Hozai’. La frase final puede conservar un nombre propio en lugar de significar ‘los videntes’.
    reason: alternative_reading
lexical_decisions:
- source_word: תְפִלָּתוֹ
  english_pob_choice: his prayer
  chosen_spanish: su oración
  alternatives_spanish:
  - su plegaria
  lexicon: HALOT
  rationale: תְפִלָּה se traduce de manera natural y fiel como ‘oración’. ‘Plegaria’ es posible, pero ‘oración’ preserva mejor el término general y es el registro más transparente para lectura pública.
- source_word: וְהֵעָתֶר לוֹ
  english_pob_choice: how he was entreated
  chosen_spanish: cómo fue escuchado
  alternatives_spanish:
  - cómo le fue concedida respuesta
  - cómo se le respondió favorablemente
  lexicon: HALOT
  rationale: La construcción pasiva comunica que la oración recibió respuesta favorable. En español, ‘fue escuchado’ conserva esa pasividad sin introducir un sujeto explícito que el hebreo no expresa.
- source_word: כָל חַטָּאתוֹ
  english_pob_choice: all his sin
  chosen_spanish: todo su pecado
  alternatives_spanish:
  - todos sus pecados
  - toda su culpa
  lexicon: HALOT
  rationale: El singular hebreo funciona de manera colectiva. ‘Todo su pecado’ preserva esa forma y el alcance total del término sin forzar el plural español.
- source_word: וּמַעְלוֹ
  english_pob_choice: his unfaithfulness
  chosen_spanish: su infidelidad
  alternatives_spanish:
  - su deslealtad
  - su quebrantamiento de fidelidad
  lexicon: HALOT
  rationale: מַעַל tiene fuerza de quebranto de lealtad o fidelidad, con matiz relacional/covenantal. ‘Infidelidad’ comunica bien esa ruptura moral y relacional en español moderno.
- source_word: הַמְּקֹמֹת
  english_pob_choice: the places
  chosen_spanish: los lugares
  alternatives_spanish:
  - los sitios
  lexicon: HALOT
  rationale: ‘Lugares’ es el equivalente directo y natural. El contexto posterior aclara que se trata de espacios de culto, sin necesidad de recargar el sustantivo.
- source_word: בָּמוֹת
  english_pob_choice: high places
  chosen_spanish: lugares altos
  alternatives_spanish:
  - altos santuarios
  - santuarios de altura
  lexicon: HALOT
  rationale: Aunque el uso técnico suele ser ‘lugares altos’, aquí conviene repetir la expresión para evitar una traducción demasiado libre y conservar el referente cultual del texto.
- source_word: וְהֶעֱמִיד
  english_pob_choice: set up
  chosen_spanish: puso
  alternatives_spanish:
  - erigió
  - instaló
  lexicon: HALOT
  rationale: ‘Puso’ es una forma natural en español para objetos de culto colocados/instalados. Mantiene el sentido sin sonoridad rígida.
- source_word: הָאֲשֵׁרִים
  english_pob_choice: the Asherim
  chosen_spanish: los asherim
  alternatives_spanish:
  - las Aserás
  - los postes de Asera
  lexicon: HALOT
  rationale: Se conserva el término transliterado ‘asherim’ porque el hebreo designa objetos cultuales específicos asociados con Asherá, y la POB inglesa también evita reducirlo sin matiz. Se mantiene la referencia lexical sin reemplazarla por una formulación interpretativa en el texto principal.
- source_word: וְהַפְּסִלִים
  english_pob_choice: the carved images
  chosen_spanish: las imágenes talladas
  alternatives_spanish:
  - los ídolos tallados
  - las esculturas
  lexicon: HALOT
  rationale: פְּסִילִים son imágenes cultuales talladas. ‘Imágenes talladas’ es preciso y comprensible, y conserva el carácter concreto del sustantivo mejor que ‘ídolos’.
- source_word: לִפְנֵי הִכָּנְעוֹ
  english_pob_choice: before he humbled himself
  chosen_spanish: antes de humillarse
  alternatives_spanish:
  - antes de que se humillara
  - antes de ser humillado
  lexicon: HALOT
  rationale: La construcción temporal exige anterioridad, y el infinitivo con prefijo permite un reflexivo natural en español. ‘Humillarse’ preserva la respuesta interior de Manasés sin resolver la tensión entre humillación voluntaria y pasiva.
- source_word: הִנָּם
  english_pob_choice: behold, they are
  chosen_spanish: he aquí, están
  alternatives_spanish:
  - mira, están
  - en verdad, están
  lexicon: HALOT
  rationale: ‘He aquí’ mantiene el valor presentativo y solemne del hebreo. ‘Están’ refleja directamente el verbo de existencia/presencia en el enlace final.
- source_word: כְּתוּבִים
  english_pob_choice: written
  chosen_spanish: escritos
  alternatives_spanish:
  - registrados
  lexicon: HALOT
  rationale: ‘Escritos’ sigue de cerca el participio hebreo y funciona bien en español, sin perder la idea de registro documental.
- source_word: עַל דִּבְרֵי חוֹזָי
  english_pob_choice: in the records of the seers
  chosen_spanish: en las crónicas de Hozai
  alternatives_spanish:
  - en las crónicas de los videntes
  - en las palabras de Hozai
  lexicon: HALOT
  rationale: ‘דברי’ en fórmulas de archivo puede significar ‘anales/crónicas/actas’. Dado el cierre documental del versículo, ‘crónicas’ expresa bien esa función. Se conserva ‘Hozai’ como posible nombre propio, siguiendo la alternativa textual preservada en la auditoría inglesa.
theological_decisions:
- issue: Alcance de la respuesta a la oración de Manasés
  english_pob_reading: how he was entreated
  chosen_spanish_reading: cómo fue escuchado
  alternative_spanish_readings:
  - cómo le fue concedida respuesta
  - cómo fue atendida su oración
  rationale: La frase hebrea no desarrolla el agente de la respuesta; solo afirma que hubo una respuesta favorable. ‘Fue escuchado’ mantiene esa reserva y evita sobreexplicar la acción divina, conservando la tensión narrativa del cronista.
  doctrine_reference: Preservar el alcance mínimo del texto y no resolver más de lo que el hebreo afirma.
- issue: Naturaleza de la humillación de Manasés
  english_pob_reading: before he humbled himself
  chosen_spanish_reading: antes de humillarse
  alternative_spanish_readings:
  - antes de que se humillara
  - antes de ser humillado
  rationale: El hebreo permite un sentido reflexivo/intransitivo, y la traducción debe dejar abierta esa lectura sin imponer una interpretación doctrinal cerrada sobre el modo exacto de su humillación.
  doctrine_reference: Mantener la tensión textual sobre arrepentimiento/humillación en Manasés.
translation_notes:
  revision_awareness: Texto revisado a la luz del audit trail inglés y del hebreo, manteniendo la línea de la POB en equivalencia óptima y evitando calcos innecesarios. Se preservó la ambigüedad de הִכָּנְעוֹ y la doble posibilidad de עַל דִּבְרֵי חוֹזָי sin forzar una resolución.
  spanish_consistency_notes:
  - Yahvé no aparece en este versículo.
  - Se conserva el término transliterado ‘asherim’ en el texto principal, con nota alternativa para la lectura interpretativa.
  - ‘Crónicas’ se usa para transmitir la función documental de דִבְרֵי en este cierre, en línea con el registro archivístico del contexto.
  - Se mantuvo el tono sobrio y público, sin arcaísmos excesivos.
