revisions:
- from: 'Porque Yahvé había hecho que el campamento de Aram oyera el sonido de carros[a], el sonido de caballos, el sonido de un gran ejército, y se dijeron unos a otros: «Miren, el rey de Israel ha alquilado contra nosotros a los reyes de los hititas y a los reyes de Egipto[b][c], para venir contra nosotros».'
  to: 'Porque el Señor hizo que el campamento de Aram[a] oyera el sonido de carros, el sonido de caballos, el sonido de un gran ejército[b], y se dijeron unos a otros[c]: «Miren, el rey de Israel ha contratado a los reyes de los hititas y a los reyes de Egipto contra nosotros, para venir contra nosotros».'
  rationale: Se revisa «Yahvé» a «el Señor» para reflejar con mayor fidelidad el término hebreo אֲדֹנָי en este versículo; se cambia «alquilado» por «contratado» por naturalidad y precisión contextual en español; y se ajustan las notas para conservar las alternativas relevantes del rastro inglés, eliminando la nota redundante sobre «los reyes de Egipto».
