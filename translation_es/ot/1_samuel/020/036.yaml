revisions:
- from: 'Y dijo a su joven[a]: «Corre, por favor, encuentra las flechas que yo estoy lanzando». El joven corrió, y él lanzó la flecha más allá de él.'
  to: 'Y dijo a su muchacho[a]: «Corre, por favor, encuentra las flechas que yo estoy lanzando». El muchacho corrió, y lanzó la flecha más allá de él[b].'
  rationale: Se reemplaza «joven» por «muchacho» para lograr un español natural y fiel al valor contextual de נַעַר como ayudante juvenil. Se elimina el pronombre expreso «él» en la segunda cláusula por fluidez española. Se conserva «más allá de él» en el texto para reflejar el hebreo y el POB, pero se añade una nota aclaratoria porque en español esa referencia puede sonar ambigua.
