base_translation:
  language: en
  yaml_path: translation/ot/leviticus/016/028.yaml
  text: The one who burns them shall wash his clothes and bathe his body in water[b][a], and afterward he may come into the camp.
  footnotes:
  - marker: a
    text: Or 'he shall come into the camp.' The Hebrew verb can be read as a simple future, but here it likely expresses permitted reentry after purification.
    reason: alternative_reading
  - marker: b
    text: Literally 'his flesh.' In this washing idiom, the sense is 'his body.'
    reason: lexical_alternative
