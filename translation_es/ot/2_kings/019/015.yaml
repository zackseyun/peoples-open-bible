translation:
  language: es
  text: 'Y Ezequías oró ante Yahvé y dijo: “Yahvé, Dios de Israel, entronizado sobre los querubines[a], tú solo eres Dios sobre todos los reinos de la tierra. Tú hiciste los cielos y la tierra.”'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «que está entronizado sobre los querubines»; el hebreo dice literalmente «sentado/morando [entre/sobre] los querubines», una imagen real-cúltica de la entronización de Yahvé.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּתְפַּלֵּל
  english_pob_choice: prayed
  chosen_spanish: oró
  alternatives_spanish:
  - pró
  - rogó
  lexicon: HALOT
  rationale: El verbo básico indica hacer una oración. En español, “oró” es natural, digno y fiel al acto de dirigirse a Dios en oración.
- source_word: לִפְנֵי יְהוָה
  english_pob_choice: before Yahweh
  chosen_spanish: ante Yahvé
  alternatives_spanish:
  - delante de Yahvé
  - en presencia de Yahvé
  lexicon: HALOT
  rationale: La preposición expresa estar delante o en presencia de Dios. “Ante Yahvé” conserva esa relación espacial y reverente sin volverla mecánica.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  - el SEÑOR
  lexicon: HALOT
  rationale: Se mantiene el nombre propio divino revelado en el texto hebreo. “Yahvé” sigue el criterio POB y evita la sustitución por un título.
- source_word: אֱלֹהֵי יִשְׂרָאֵל
  english_pob_choice: God of Israel
  chosen_spanish: Dios de Israel
  alternatives_spanish:
  - el Dios de Israel
  - Dios, el Dios de Israel
  lexicon: HALOT
  rationale: La construcción de estado constructo se expresa de forma directa y natural en español como “Dios de Israel”.
- source_word: יֹשֵׁב הַכְּרֻבִים
  english_pob_choice: enthroned above the cherubim
  chosen_spanish: entronizado sobre los querubines
  alternatives_spanish:
  - que se sienta sobre los querubines
  - que habita entre los querubines
  lexicon: HALOT
  rationale: El participio describe una imagen real-cúltica de entronización, no solo el acto de sentarse. “Entronizado sobre los querubines” preserva esa fuerza y encaja bien en español.
- source_word: אַתָּה הוּא הָאֱלֹהִים לְבַדְּךָ
  english_pob_choice: you alone are God
  chosen_spanish: tú solo eres Dios
  alternatives_spanish:
  - tú eres el único Dios
  - tú solo eres el Dios
  lexicon: HALOT
  rationale: La combinación enfatiza exclusividad. “Tú solo eres Dios” expresa con claridad la fuerza monoteísta sin añadir formulación doctrinal externa.
- source_word: לְכֹל מַמְלְכוֹת הָאָרֶץ
  english_pob_choice: over all the kingdoms of the earth
  chosen_spanish: sobre todos los reinos de la tierra
  alternatives_spanish:
  - para todos los reinos de la tierra
  - entre todos los reinos de la tierra
  lexicon: HALOT
  rationale: El hebreo comunica soberanía respecto de todos los reinos. “Sobre” transmite dominio de manera más natural en español.
- source_word: עָשִׂיתָ
  english_pob_choice: made
  chosen_spanish: hiciste
  alternatives_spanish:
  - creaste
  - formaste
  lexicon: HALOT
  rationale: El verbo עשה es más general que “crear”. “Hiciste” mantiene la equivalencia directa y deja intacto el matiz del texto, que no usa ברא.
- source_word: הַשָּׁמַיִם וְאֶת הָאָרֶץ
  english_pob_choice: the heavens and the earth
  chosen_spanish: los cielos y la tierra
  alternatives_spanish:
  - el cielo y la tierra
  - los cielos y el mundo
  lexicon: HALOT
  rationale: El hebreo usa la forma plural “los cielos”. En español, “los cielos y la tierra” preserva la fórmula creadora bíblica con naturalidad.
theological_decisions:
- issue: Nombre divino יְהוָה en la traducción
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: Se sigue el criterio POB de transliterar el Tetragrámaton con el nombre divino, en vez de sustituirlo por un título litúrgico.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Imagen de entronización sobre los querubines
  english_pob_reading: enthroned above the cherubim
  chosen_spanish_reading: entronizado sobre los querubines
  alternative_spanish_readings:
  - que se sienta sobre los querubines
  - que habita entre los querubines
  rationale: La frase conserva la imagen real-cúltica y evita resolver de antemano una localización espacial precisa que el hebreo no explicita de forma única.
  doctrine_reference: 'POB Translation philosophy #3: Preserve theological tension rather than resolve it'
- issue: Afirmación de exclusividad divina
  english_pob_reading: you alone are God over all the kingdoms of the earth
  chosen_spanish_reading: tú solo eres Dios sobre todos los reinos de la tierra
  alternative_spanish_readings:
  - tú eres Dios, y solo tú, sobre todos los reinos de la tierra
  - tú solo eres el Dios de todos los reinos de la tierra
  rationale: La oración afirma la unicidad de Yahvé y su soberanía universal. La formulación elegida conserva ambas ideas sin sobreexplicar el monoteísmo del pasaje.
  doctrine_reference: 'POB Translation philosophy #3: Preserve theological tension rather than resolve it'
translation_notes:
  revision_awareness: El inglés POB mantiene una nota alternativa en torno a יֹשֵׁב הַכְּרֻבִים; la versión española conserva esa tensión con «entronizado sobre los querubines» y una nota que refleja la alternativa interpretativa sin fijarla más de lo que permite el hebreo.
  spanish_consistency_notes:
  - Se usa «Yahvé» de manera consistente para יְהוָה.
  - Se mantiene «Dios» para אֱלֹהִים en contexto singular y vocativo.
  - Se evita «SEÑOR» como sustituto del nombre divino.
  - «los cielos y la tierra» conserva la fórmula creadora del hebreo.
  - La nota al pie está anclada en «dijo[a]» para corresponder al detalle lexical del participio y su alternativa interpretativa.
