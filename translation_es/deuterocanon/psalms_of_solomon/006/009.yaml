translation:
  language: es
  text: Bendito es el Señor[a], que muestra misericordia a los que lo aman en verdad.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «verdaderamente», «con sinceridad» o «fielmente».
    reason: lexical_alternative
lexical_decisions:
- source_word: εὐλογητὸς
  english_pob_choice: Blessed
  chosen_spanish: Bendito
  alternatives_spanish:
  - Alabado
  lexicon: BDAG
  rationale: En una fórmula doxológica, «Bendito» conserva con naturalidad el valor de alabanza y el registro bíblico; «Alabado» sería posible, pero menos directo como equivalente de la fórmula fija.
- source_word: Κύριος
  english_pob_choice: Lord
  chosen_spanish: Señor
  alternatives_spanish:
  - Maestro
  lexicon: BDAG
  rationale: Se mantiene la equivalencia habitual para κύριος en un contexto de alabanza dirigida a Dios. «Señor» es el término español natural y reverente aquí.
- source_word: ὁ ποιῶν
  english_pob_choice: who shows
  chosen_spanish: que muestra
  alternatives_spanish:
  - que hace
  - que realiza
  lexicon: BDAG
  rationale: Con ἔλεος, ποιέω funciona idiomáticamente; «que muestra» comunica el sentido en español sin volverlo torpe o excesivamente literal.
- source_word: ἔλεος
  english_pob_choice: mercy
  chosen_spanish: misericordia
  alternatives_spanish:
  - misericordia fiel
  - bondad
  lexicon: BDAG
  rationale: «Misericordia» es la opción española más transparente y estándar para ἔλεος, conservando el matiz compasivo y relacional del término.
- source_word: τοῖς ἀγαπῶσιν αὐτὸν
  english_pob_choice: to those who love him
  chosen_spanish: a los que lo aman
  alternatives_spanish:
  - a los que le aman
  lexicon: BDAG
  rationale: La cláusula participial se naturaliza como relativa en español. «Lo aman» sigue el uso moderno directo; «le aman» también es posible, pero menos común en la variedad neutral buscada.
- source_word: ἐν ἀληθείᾳ
  english_pob_choice: in truth
  chosen_spanish: en verdad
  alternatives_spanish:
  - con sinceridad
  - fielmente
  - verdaderamente
  lexicon: BDAG
  rationale: Se conserva la ambigüedad de ἀληθείᾳ entre verdad, sinceridad y fidelidad. «En verdad» es formal y permite esas lecturas sin decidir una sola.
translation_notes:
  revision_awareness: La revisión más reciente no introdujo cambios y el cotejo final reporta alta concordancia; por eso se mantiene una traducción breve y estable, con la ambigüedad de ἐν ἀληθείᾳ preservada en nota.
  spanish_consistency_notes:
  - Se usa «Señor» como equivalente de κύριος en este contexto doxológico.
  - Se evita sobreinterpretar ἐν ἀληθείᾳ; la nota conserva las alternativas semánticas reconocidas por el POB en inglés.
  - La sintaxis sigue el tono litúrgico breve del original griego y de la traducción inglesa auditada.
