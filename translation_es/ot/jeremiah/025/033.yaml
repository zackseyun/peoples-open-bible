revisions:
- from: Y habrá los muertos de Yahvé[a] en aquel día desde un extremo de la tierra hasta el otro extremo de la tierra[b]. No serán lamentados, ni recogidos, ni sepultados[c]; serán como estiércol sobre la superficie del suelo.
  to: Las víctimas de Yahvé[a] en aquel día estarán desde un extremo de la tierra hasta el otro extremo de la tierra[b]. No serán lamentadas, ni recogidas, ni sepultadas; serán como estiércol sobre la superficie del suelo[c].
  rationale: Se corrigió la apertura para evitar un calco no idiomático («habrá los muertos») y expresar naturalmente el futuro/resultado del hebreo. Se reemplazó «los muertos de Yahvé» por «las víctimas de Yahvé» para preservar mejor la fuerza judicial de חַלְלֵי יְהוָה en español claro. También se ajustó la colocación de la nota literal para que ancle correctamente a «sobre la superficie del suelo», y se mejoró la redacción de la nota alternativa sobre la agencia divina.
  reviewer_model: gpt-5.4
