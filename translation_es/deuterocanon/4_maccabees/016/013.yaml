revisions:
- from: Pero, teniendo un ánimo[a] como de adamante, y encaminando hacia la inmortalidad el número de sus hijos, tanto más los exhortaba a la muerte por causa de la piedad, suplicándoles.
  to: Pero, teniendo una mente como de adamante, y encaminando[a] a sus hijos hacia la inmortalidad, tanto más los exhortaba a la muerte por la devoción a Dios, suplicándoles.
  rationale: La revisión corrige «ánimo» a «mente» para reflejar mejor νοῦν, traslada la nota a la cláusula realmente difícil (ἀντικτυποῦσα), suaviza una construcción española rígida, y hace más explícita la orientación teológica de εὐσεβείας con «devoción a Dios». Son ajustes menores y seguros; no requieren adjudicación adicional.
