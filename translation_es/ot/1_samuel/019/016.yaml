base_translation:
  language: en
  yaml_path: translation/ot/1_samuel/019/016.yaml
  text: When the messengers came in[a], behold, the teraphim was in the bed[b], with the quilt of goats’ hair at its head.
  footnotes:
  - marker: a
    text: Or, “the household idol” or “the idol image.” Hebrew teraphim refers to a cultic household image.
    reason: lexical_alternative
  - marker: b
    text: The Hebrew term rendered “quilt” is rare and may refer more generally to a woven covering; “quilt of goats’ hair” reflects its likely function here.
    reason: lexical_alternative
