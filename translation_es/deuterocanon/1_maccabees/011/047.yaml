translation:
  language: es
  text: Y el rey llamó a los judíos para que le ayudaran[a], y todos se reunieron con él, todos juntos; y se dispersaron en la ciudad; y aquel día mataron en la ciudad a diez mil.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El griego dice literalmente «fueron dispersados en la ciudad»; «se dispersaron en la ciudad» conserva el dato léxico sin forzar una lectura militar más específica de la necesaria.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐκάλεσεν
  english_pob_choice: called
  chosen_spanish: llamó
  alternatives_spanish:
  - convocó
  - mandó llamar
  lexicon: LSJ
  rationale: El aoristo de καλέω aquí expresa una llamada/convocatoria directa. «Llamó» es natural en español y mantiene la sencillez narrativa; «convocó» o «mandó llamar» serían posibles, pero añaden un matiz más formal o explicativo que el griego no exige.
- source_word: εἰς βοήθειαν
  english_pob_choice: to his aid
  chosen_spanish: para que le ayudaran
  alternatives_spanish:
  - para su ayuda
  - en su auxilio
  lexicon: LSJ
  rationale: 'La frase indica finalidad: el rey llama a los judíos como ayuda para él. «Para que le ayudaran» conserva el beneficiario personal implícito en αὐτόν y suena natural en español; «en su auxilio» es posible, pero algo más literario.'
- source_word: ἐπισυνήχθησαν
  english_pob_choice: gathered
  chosen_spanish: se reunieron
  alternatives_spanish:
  - se congregaron
  - se juntaron
  lexicon: LSJ
  rationale: El verbo pasivo/medio señala que acudieron y se juntaron con él. «Se reunieron» comunica bien la idea de acercarse y juntarse; «se congregaron» sería más eclesiástico y menos directo.
- source_word: πάντες ἅμα
  english_pob_choice: they all gathered to him together
  chosen_spanish: todos ... a una sola vez
  alternatives_spanish:
  - todos juntos
  - todos al mismo tiempo
  lexicon: LSJ
  rationale: La combinación intensifica totalidad y simultaneidad. «Todos ... a una sola vez» intenta preservar ambos matices sin sobrecargar el ritmo; «todos juntos» puede sonar más natural, pero pierde con mayor facilidad la idea temporal de ἅμα.
- source_word: διεσπάρησαν
  english_pob_choice: spread out in the city
  chosen_spanish: se dispersaron en la ciudad
  alternatives_spanish:
  - se esparcieron en la ciudad
  - se extendieron por la ciudad
  lexicon: LSJ
  rationale: El verbo literalmente implica dispersión/esparcimiento. Dado que el contexto es militar, la idea de dispersarse dentro de la ciudad puede ser el sentido; «se dispersaron en la ciudad» mantiene ese matiz sin introducir conjeturas tácticas más fuertes que el texto griego.
- source_word: ἀπέκτειναν
  english_pob_choice: killed
  chosen_spanish: mataron
  alternatives_spanish:
  - dieron muerte a
  - asesinaron
  lexicon: LSJ
  rationale: «Mataron» es el equivalente moderno más directo. «Dieron muerte a» es más solemne, pero menos fluido; «asesinaron» sería demasiado interpretativo y añadiría una valoración moral no explicitada por el verbo.
- source_word: εἰς μυριάδας δέκα
  english_pob_choice: ten thousand
  chosen_spanish: diez mil
  alternatives_spanish:
  - hasta diez mil
  - a diez mil
  lexicon: LSJ
  rationale: La expresión idiomática con μυριάς denota el número diez mil. «Diez mil» es la forma natural y precisa en español; no se necesita perífrasis numérica.
translation_notes:
  revision_awareness: La versión inglesa auditada cambió «through the city» por «in the city» para alinearse mejor con ἐν τῇ πόλει. La redacción española sigue esa corrección y evita añadir «por» o «a través de». También conserva la repetición intensiva de «todos ... a una sola vez» y el número exacto «diez mil».
  spanish_consistency_notes:
  - Se usa «judíos» como etnónimo del texto base, sin reinterpretarlo.
  - Se evita «SEÑOR» u այլ equivalentes, pues no aparece el nombre divino en este versículo.
  - «Mataron» mantiene el registro narrativo directo del relato histórico, sin intensificarlo a lenguaje judicial o moral.
