lexical_decisions:
- source_word: מַה
  english_pob_choice: How
  chosen_spanish: ¡Cuán
  alternatives_spanish:
  - Cómo
  - ¡Qué
  lexicon: HALOT
  rationale: La partícula exclamativa introduce admiración, no pregunta. «Cuán» comunica mejor la exclamación poética en español y mantiene el tono de asombro del hebreo.
- source_word: גָּדְלוּ
  english_pob_choice: are great
  chosen_spanish: grandiosas
  alternatives_spanish:
  - grandes
  - magníficas
  - son grandes
  lexicon: HALOT
  rationale: El perfecto qal funciona aquí de manera estática. «Grandiosas» conserva la idea de grandeza admirativa en un español natural y solemne, sin perder fuerza poética.
- source_word: מַעֲשֶׂיךָ
  english_pob_choice: your works
  chosen_spanish: tus obras
  alternatives_spanish:
  - tus hechos
  - tus actos
  lexicon: HALOT
  rationale: «Obras» es el equivalente más amplio y natural para מַעֲשֶׂה en este contexto de alabanza, y puede abarcar tanto actos creadores como providenciales.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  lexicon: HALOT
  rationale: Se conserva el nombre divino con la forma española «Yahvé», conforme al criterio del proyecto para יְהוָה, en lugar de sustituirlo por un título.
- source_word: מְאֹד
  english_pob_choice: very
  chosen_spanish: muy
  alternatives_spanish:
  - sumamente
  - extremadamente
  lexicon: HALOT
  rationale: «Muy» reproduce la intensificación de manera clara y actual, sin elevar innecesariamente el registro.
- source_word: עָמְקוּ
  english_pob_choice: are deep
  chosen_spanish: profundos
  alternatives_spanish:
  - hondos
  - muy profundos
  lexicon: HALOT
  rationale: El predicado hebreo es estativo. «Profundos» mantiene la imagen de profundidad aplicada al pensamiento divino; con «muy» se preserva la intensificación del verso.
- source_word: מַחְשְׁבֹתֶיךָ
  english_pob_choice: your thoughts
  chosen_spanish: tus pensamientos
  alternatives_spanish:
  - tus planes
  - tus propósitos
  lexicon: HALOT
  rationale: «Pensamientos» es el equivalente más transparente para מַחְשָׁבָה y deja abierta la amplitud semántica entre pensamiento, plan y propósito. En español, «pensamientos» suena natural sin restringir la idea a un solo matiz.
theological_decisions:
- issue: Renderización del nombre divino יהוה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - el SEÑOR
  rationale: El hebreo usa directamente el Tetragrama. La tradición del POB evita la sustitución por un título y preserva el nombre divino; en español, «Yahvé» es la forma más reconocible y reverente para ese nombre.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יהוה / YHWH → Yahvé'
- issue: Valor de מַחְשְׁבֹתֶיךָ en paralelo poético
  english_pob_reading: your thoughts
  chosen_spanish_reading: tus pensamientos
  alternative_spanish_readings:
  - tus planes
  - tus propósitos
  rationale: El paralelismo con «obras» muestra una afirmación sobre la profundidad del consejo/mente divina. «Pensamientos» conserva la tensión entre cognición y diseño sin fijar prematuramente una sola glosa.
  doctrine_reference: Lexical/theological note on preserving semantic breadth in poetic parallelism
translation_notes:
  revision_awareness: El control de revisión informado indica que no se requirieron cambios adicionales y que el pasaje quedó en acuerdo alto con la auditoría inglesa; por tanto, la propuesta española sigue de cerca la decisión léxica y teológica ya validada.
  spanish_consistency_notes:
  - Se mantiene el nombre divino como «Yahvé» de forma consistente con el estándar del proyecto.
  - Se conserva el paralelismo poético entre «obras» y «pensamientos» sin añadir explicaciones al cuerpo del verso.
  - El exclamativo inicial se resuelve con «¡Cuán» para reflejar admiración, no interrogación.
  - «Muy profundos» respeta la intensificación del hebreo y suena natural en español bíblico contemporáneo.
