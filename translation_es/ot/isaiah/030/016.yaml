translation:
  language: es
  text: 'Pero ustedes dijeron: “No, porque huiremos en caballos”; por tanto, ustedes huirán. Y: “Montaremos en caballos veloces”[a]; por tanto, sus perseguidores serán veloces.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O “monturas veloces”. El hebreo dice simplemente “veloces”, con el sustantivo implícito por el contexto.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַתֹּאמְרוּ
  english_pob_choice: But you said
  chosen_spanish: Pero ustedes dijeron
  alternatives_spanish:
  - Y ustedes dijeron
  lexicon: HALOT
  rationale: El waw consecutivo avanza el discurso y aquí tiene fuerza adversativa frente a la advertencia divina previa; 'Pero' comunica bien ese contraste sin perder el sentido básico de decir.
- source_word: לֹא כִּי
  english_pob_choice: No, for
  chosen_spanish: No, porque
  alternatives_spanish:
  - No, pues
  - No, sino que
  lexicon: HALOT
  rationale: La combinación expresa rechazo enfático seguido de explicación. En español, 'No, porque' conserva la negación y la relación justificativa introducida por כִּי.
- source_word: עַל סוּס
  english_pob_choice: on horses
  chosen_spanish: en caballos
  alternatives_spanish:
  - sobre caballos
  - montados en caballos
  lexicon: HALOT
  rationale: Aunque el hebreo usa singular colectivo, en español natural se expresa en plural. 'En caballos' mantiene la imagen de huir montados sin añadir una paráfrasis mayor.
- source_word: נָנוּס
  english_pob_choice: we will flee
  chosen_spanish: huiremos
  alternatives_spanish:
  - vamos a huir
  - escaparemos
  lexicon: HALOT
  rationale: נוּס significa huir / tomar la fuga. 'Huiremos' es natural y conserva el paralelismo con la segunda forma verbal de la versículo.
- source_word: עַל כֵּן
  english_pob_choice: therefore
  chosen_spanish: por tanto
  alternatives_spanish:
  - por eso
  - así que
  lexicon: HALOT
  rationale: La expresión marca consecuencia judicial e ironía profética. 'Por tanto' mantiene ese valor conclusivo con registro bíblico claro.
- source_word: תְּנוּסוּן
  english_pob_choice: you will flee
  chosen_spanish: huirán
  alternatives_spanish:
  - escaparán
  - terminarán huyendo
  lexicon: HALOT
  rationale: La forma plural de segunda persona responde al clamor del pueblo con inversión de destino. 'Huirán' evita una repetición excesiva y conserva la amenaza de juicio.
- source_word: עַל קַל
  english_pob_choice: on swift horses
  chosen_spanish: caballos veloces
  alternatives_spanish:
  - caballos rápidos
  - monturas veloces
  lexicon: HALOT
  rationale: El hebreo dice literalmente 'sobre veloces', con el sustantivo implícito. El español necesita completar el nombre para quedar idiomático; 'caballos veloces' sigue de cerca el sentido y la aclaración auditada de la POB inglesa.
- source_word: נִרְכָּב
  english_pob_choice: we will ride
  chosen_spanish: montaremos
  alternatives_spanish:
  - iremos montados
  - cabalgaremos
  lexicon: HALOT
  rationale: רכב aquí refiere a montar/ir montado. 'Montaremos' transmite la intención con concisión y encaja con el paralelismo poético.
- source_word: יִקַּלּוּ
  english_pob_choice: will be swift
  chosen_spanish: serán veloces
  alternatives_spanish:
  - serán rápidos
  - irán más ligeros
  lexicon: HALOT
  rationale: El campo semántico de קל es 'ligero' y por extensión 'rápido, veloz'. 'Serán veloces' preserva el efecto irónico de que los perseguidores igualarán o superarán esa rapidez.
- source_word: רֹדְפֵיכֶם
  english_pob_choice: your pursuers
  chosen_spanish: sus perseguidores
  alternatives_spanish:
  - los que los persiguen
  - quienes los persiguen
  lexicon: HALOT
  rationale: El participio funciona como sustantivo. 'Sus perseguidores' es natural en español y mantiene el carácter amenazante del agente perseguidor.
translation_notes:
  revision_awareness: Se incorporó la nota sobre el hebreo elíptico de קַל con un anclaje visible en el texto ('caballos veloces[a]') para corregir la validación anterior y preservar la alternativa lexical documentada por la POB inglesa.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' no pertinente en este versículo.
  - Se tradujo de manera directa y poética, evitando calcos innecesarios pero conservando la inversión irónica del hebreo.
  - '''Caballos veloces'' resuelve la elipsis de קַל sin introducir interpretación doctrinal o expansiva.'
