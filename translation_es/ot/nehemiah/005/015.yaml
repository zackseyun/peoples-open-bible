revisions:
- from: Pero los gobernadores anteriores, los que estuvieron antes de mí, cargaron pesadamente sobre el pueblo[a], y tomaron de ellos pan y vino, además de cuarenta siclos de plata. También sus servidores dominaban sobre el pueblo[b]. Pero yo no hice así[c], por temor de Dios.
  to: Pero los gobernadores anteriores, los que estuvieron antes de mí, impusieron pesadas cargas sobre el pueblo y les quitaban pan y vino, además de cuarenta siclos de plata[a]. Incluso sus sirvientes[b] ejercían autoridad sobre el pueblo. Pero yo no actué así, por temor de Dios[c].
  rationale: 'Se hicieron ajustes de estilo y fidelidad idiomática al español: «impusieron pesadas cargas» representa mejor el hebreo que «cargaron pesadamente»; «les quitaban» evita un calco rígido; «ejercían autoridad» comunica mejor שׁלט; y «no actué así» suena más natural que «no hice así». Se conservaron las decisiones teológicas y léxicas principales del POB, especialmente «temor de Dios».'
  reviewer_model: gpt-5.4
