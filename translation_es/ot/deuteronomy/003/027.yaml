review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien el hebreo en su estructura imperativa, las cuatro direcciones, la repetición enfática de ''ojos'' y la razón final de que Moisés no cruzará el Jordán. Sin embargo, hay dos ajustes necesarios: la nota [a] está anclada en ''Pisgá'' cuando en realidad explica יָמָּה (''hacia el mar'' = ''hacia el occidente''), y la nota [b] está mal formulada, porque ''este Jordán río'' no es español natural para la alternativa inglesa ''this Jordan River''.'
  spanish_quality_summary: El español es claro y digno, pero conviene mejorar la consistencia direccional y la naturalidad de la nota léxica. 'Hacia el occidente, el norte, el sur y el oriente' se entiende, pero queda más equilibrado y fiel al hebreo repetir 'hacia' en toda la serie. El texto principal por lo demás suena bien y conserva el tono bíblico sin caer en arcaísmo.
  glossary_alignment: No hay conflictos con la terminología base del proyecto. Los topónimos y términos clave están bien manejados. La elección 'Pisgá' es aceptable en este contexto. 'Este Jordán' preserva correctamente el demostrativo hebreo.
  issues:
  - severity: high
    issue: La nota [a] está anclada en el lugar equivocado.
    rationale: La nota explica יָמָּה, es decir, la dirección 'hacia el mar' > 'occidente', no el topónimo 'Pisgá'. Debe moverse al término direccional correspondiente en el texto.
  - severity: medium
    issue: 'La nota [b] usa una alternativa no idiomática: ''este Jordán río''.'
    rationale: En español natural la alternativa debe ser 'este río Jordán' o 'este río, el Jordán'. La forma actual parece un calco incorrecto.
  - severity: low
    issue: La serie de direcciones queda algo desigual.
    rationale: '''Hacia el occidente, el norte, el sur y el oriente'' es comprensible, pero repetir ''hacia'' en cada miembro representa mejor la serie direccional hebrea y mejora la fluidez formal.'
  revised_spanish_text: Sube a la cumbre de Pisgá, y alza tus ojos hacia el occidente[a], hacia el norte, hacia el sur y hacia el oriente, y mira con tus propios ojos;[b] porque no pasarás este Jordán.
  revised_footnotes:
  - marker: a
    text: Hebreo literalmente «hacia el mar», una manera convencional de decir «hacia el occidente».
    reason: cultural_note
  - marker: b
    text: O «este río Jordán». El hebreo dice simplemente «este Jordán».
    reason: lexical_alternative
  revision_rationale: Se reubica la nota cultural al término que realmente explica ('occidente'), se corrige la alternativa de la nota léxica a un español idiomático ('este río Jordán'), y se regulariza la serie de direcciones con 'hacia' repetido. También se ancla [b] a la cláusula final, donde corresponde la nota sobre 'este Jordán'.
