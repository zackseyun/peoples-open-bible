translation:
  language: es
  text: Pero los impíos de corazón[b] acumulan ira; no claman por ayuda cuando[a] él los ata.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «porque él los ata». El hebreo puede leerse de manera causal más que temporal.
    reason: alternative_reading
  - marker: b
    text: «Los impíos de corazón» también puede verterse «los hipócritas de corazón» o «los impíos en su corazón».
    reason: lexical_alternative
lexical_decisions:
- source_word: חַנְפֵי לֵב
  english_pob_choice: the godless in heart
  chosen_spanish: los impíos de corazón
  alternatives_spanish:
  - los hipócritas de corazón
  - los impíos en corazón
  - los irreverentes de corazón
  lexicon: HALOT
  rationale: חנף puede expresar impiedad, irreverencia o hipocresía. En este contexto de Job, la POB inglesa privilegia la impiedad/irreverencia más que la mera insinceridad social. En español, «impíos de corazón» conserva esa fuerza y evita una formulación más interpretativa que «hipócritas».
- source_word: יָשִׂימוּ אָף
  english_pob_choice: store up anger
  chosen_spanish: almacenan ira
  alternatives_spanish:
  - guardan ira
  - acumulan ira
  - atesoran ira
  - cargan con ira
  lexicon: HALOT
  rationale: La imagen hebrea de «poner/poner aparte ira» se expresa con naturalidad en español como «almacenan ira». Mantiene la idea de retener o acumular ira sin suavizar el verbo ni convertirlo en una explicación abstracta.
- source_word: לֹא יְשַׁוְּעוּ
  english_pob_choice: they do not cry for help
  chosen_spanish: no claman por ayuda
  alternatives_spanish:
  - no gritan por ayuda
  - no claman
  - no piden ayuda
  lexicon: HALOT
  rationale: שׁוע en piel suele referirse a clamar por auxilio. «Claman por ayuda» comunica la urgencia implícita y conserva el sentido de socorro que la forma verbal sugiere.
- source_word: כִּי
  english_pob_choice: when
  chosen_spanish: cuando
  alternatives_spanish:
  - porque
  - pues
  - ya que
  lexicon: HALOT
  rationale: La POB inglesa tomó כִּי en sentido temporal aquí, y «cuando» conserva esa lectura natural en el flujo del verso. La lectura causal queda preservada en la nota.
- source_word: אֲסָרָם
  english_pob_choice: he binds them
  chosen_spanish: él los ata
  alternatives_spanish:
  - él los encadena
  - él los aprisiona
  - él los sujeta
  lexicon: HALOT
  rationale: אָסַר significa atar, sujetar, prender o encarcelar. «Él los ata» es directo y suficientemente amplio para reflejar la acción de restricción o aflicción sin añadir más de lo que el hebreo dice.
theological_decisions:
- issue: Referente del sujeto singular en «él los ata»
  english_pob_reading: The subject is left as 'he,' referring contextually to God without replacing the pronoun with 'God.'
  chosen_spanish_reading: Se mantiene «él», con referencia contextual a Dios sin explicitar «Dios».
  alternative_spanish_readings:
  - Dios los ata
  - Yahvé los ata
  rationale: El hebreo usa una forma verbal singular con sufijo pronominal; el contexto inmediato habla de la acción divina, pero el texto no nombra explícitamente al sujeto. Mantener «él» preserva esa primacía del original y evita resolver por traducción una tensión que el texto deja implícita.
  doctrine_reference: Primacía del texto original; conservar el referente contextual sin sobreexplicitarlo en la traducción.
translation_notes:
  revision_awareness: 'Coincide con el control de revisión más reciente: no se registran cambios necesarios y hay alta concordancia con el seguimiento comparativo. La redacción española conserva las decisiones principales del audit trail en inglés y traslada la ambigüedad de כִּי y de חַנְפֵי לֵב mediante nota.'
  spanish_consistency_notes:
  - Se usa «Yahvé» como forma habitual del proyecto cuando el texto explícitamente lo requiera; en este verso no aparece el nombre divino, pero el referente implícito del sujeto singular se mantiene como «él».
  - Se evitó «SEÑOR» como sustituto no presente en el hebreo.
  - «Impíos de corazón» mantiene el matiz de disposición interior que aporta לֵב.
  - La puntuación con punto y coma refleja bien el contraste entre la cualidad interna y la falta de clamor por ayuda.
