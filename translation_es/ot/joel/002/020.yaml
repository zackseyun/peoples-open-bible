revisions:
- from: Y quitaré de sobre ustedes al nortista[a], y lo arrojaré a una tierra árida y desolada; su frente hacia el mar oriental y su parte posterior hacia el mar occidental; subirá su hedor, y subirá su peste[b], porque ha hecho grandes cosas[c].
  to: Y alejaré de ustedes al del norte[a], y lo arrojaré a una tierra árida y desolada; su frente hacia el mar oriental y su parte posterior hacia el mar occidental[b]. Subirá su hedor, y subirá su fetidez, porque ha hecho grandes cosas[c].
  rationale: Se corrigen los anclajes de notas para que coincidan con el expediente inglés y con sus lugares en el texto, se reemplaza «su peste» por «su fetidez» para preservar el campo semántico de mal olor, y se mejora la naturalidad de dos expresiones («el nortista» > «al del norte»; «quitaré de sobre ustedes» > «alejaré de ustedes») sin perder la personificación ni la fuerza del hebreo.
