review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien la secuencia del hebreo y conserva los elementos principales: los hombres fueron, atravesaron la tierra, la registraron por ciudades, en siete porciones, y vinieron a Josué en Silo. También preserva adecuadamente las dos notas del rastro inglés. Sin embargo, hay un par de puntos donde el español puede alinearse mejor con el sentido documentado: «la escribieron» suena poco natural para registrar la tierra y puede entenderse de forma demasiado literal; «la describieron por escrito» o «la pusieron por escrito» expresa mejor ויכתבוהָ. Además, «al campamento en Silo» resulta menos idiomático que «al campamento de Silo» o «al campamento en Siló», y la grafía toponímica preferible en español bíblico moderno es «Siló».'
  spanish_quality_summary: 'El texto es generalmente claro y digno, pero contiene dos giros poco naturales: «la escribieron» y «al campamento en Silo». Una leve revisión mejora notablemente la legibilidad sin apartarse del original. La puntuación funciona, aunque una coma menos alrededor de «en siete porciones» da una lectura más fluida.'
  glossary_alignment: No hay términos de glosario mayor implicados como Yahvé, Mesías o esclavo. «Josué» y «tierra» están bien. Se recomienda «Siló» como forma española más estándar del topónimo שִׁלֹה en este contexto.
  issues:
  - severity: medium
    issue: «la escribieron» es una formulación poco idiomática en español para וַיִּכְתְּבוּהָ
    rationale: Aunque formalmente posible, en español normal no se dice que «escribieron la tierra». El sentido contextual, apoyado por la nota inglesa, es registrar/describirla por escrito. Una formulación como «la describieron por escrito» preserva el objeto femenino y el acto de consignar el reconocimiento.
  - severity: low
    issue: «al campamento en Silo» suena menos natural que otras opciones españolas
    rationale: La construcción refleja de cerca el inglés, pero en español bíblico fluye mejor «al campamento de Siló» o «al campamento en Siló». Dado que אֶל ... אֶל puede expresarse con soltura en español, conviene evitar una frase algo rígida.
  - severity: low
    issue: Topónimo «Silo»
    rationale: La forma «Siló» es una adaptación española bíblica ampliamente reconocible y más usual para שִׁלֹה. No es un error grave, pero mejora la naturalidad y la identificación del lugar.
