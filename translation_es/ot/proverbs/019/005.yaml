translation:
  language: es
  text: El testigo falso no quedará sin castigo[a], y el que exhala mentiras[b] no escapará.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'También: «no será absuelto» / «no será tenido por inocente».'
    reason: lexical_alternative
  - marker: b
    text: 'Imagen hebrea: «exhala mentiras», es decir, habla mentiras de manera continua o libremente; también: «profiere mentiras».'
    reason: lexical_alternative
lexical_decisions:
- source_word: עֵד שְׁקָרִים
  english_pob_choice: a false witness
  chosen_spanish: el testigo falso
  alternatives_spanish:
  - un testigo de mentiras
  - un testigo mentiroso
  lexicon: HALOT
  rationale: La frase hebrea describe a un testigo caracterizado por la falsedad en un marco judicial. «Testigo falso» conserva el sentido legal y es natural en español; «testigo de mentiras» suena más literal pero menos idiomático.
- source_word: יִנָּקֶה
  english_pob_choice: will not go unpunished
  chosen_spanish: no quedará sin castigo
  alternatives_spanish:
  - no será absuelto
  - no será tenido por inocente
  lexicon: HALOT
  rationale: El nifal de נקה puede expresar quedar libre de culpa o de castigo. En este proverbio, el paralelo con la retribución moral favorece «no quedará sin castigo», que comunica con claridad la consecuencia judicial sin volver el español demasiado técnico.
- source_word: וְיָפִיחַ כְּזָבִים
  english_pob_choice: and one who breathes out lies
  chosen_spanish: y el que exhala mentiras
  alternatives_spanish:
  - y el que profiere mentiras
  - y el que suelta mentiras
  lexicon: HALOT
  rationale: Se conserva la imagen verbal hebrea de «respirar/exhalar» como forma figurada de hablar. «Exhala mentiras» mantiene esa fuerza imagética; «profiere mentiras» aclara el sentido, pero pierde parte de la figura.
- source_word: כְּזָבִים
  english_pob_choice: lies
  chosen_spanish: mentiras
  alternatives_spanish:
  - falsedades
  - engaños
  lexicon: HALOT
  rationale: «Mentiras» es la equivalencia más directa y viva para el plural hebreo de afirmaciones falsas, en paralelismo con «testigo falso».
- source_word: יִמָּלֵט
  english_pob_choice: will not escape
  chosen_spanish: no escapará
  alternatives_spanish:
  - no podrá escapar
  - no se librará
  lexicon: HALOT
  rationale: El verbo en nifal expresa escapar o evadirse. «No escapará» es la forma más breve y fiel para el cierre paralelo del proverbio.
translation_notes:
  revision_awareness: Redacción ajustada para conservar el paralelismo hebreo y la imagen vívida de «exhala mentiras», siguiendo el audit trail inglés de POB y el texto hebreo base. No se registraron revisiones posteriores con cambios sustantivos.
  spanish_consistency_notes:
  - Se evitó «SEÑOR» u այլ terminología confesional porque el versículo no contiene el tetragrámaton ni un título divino.
  - 'Se mantuvo un registro judicial-moral coherente en ambos miembros del proverbio: castigo / escape.'
  - Se prefirió «mentiras» sobre opciones más abstractas para conservar el paralelismo con «testigo falso».
