  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien la estructura y el sentido general del hebreo: Samaria llega a su fin y su rey es comparado con algo inestable sobre las aguas. Sin embargo, «es cortada» suena poco idiomático en español para una ciudad/reino en este contexto profético; transmite demasiado la imagen física de cortar y menos la idea de ser eliminada o arrasada que el nifal de דמה permite aquí. Además, la nota b usa el anglicismo «chip», que no preserva bien la alternativa léxica del inglés ni resulta natural en español bíblico.'
  spanish_quality_summary: La redacción es mayormente clara y digna, pero necesita una reparación menor para sonar natural y fiel en español. «Samaria es destruida» o «Samaria es arrasada» funcionan mejor que «es cortada». La frase restante, «su rey como espuma sobre la superficie de las aguas», es legible y fiel. La nota con «chip» debe reemplazarse por una alternativa española natural como «astilla» o «fragmento».
  glossary_alignment: No hay conflictos con la terminología doctrinal principal del proyecto. «Samaria», «rey», «espuma» y «las aguas» están bien alineados. El ajuste principal es estilístico-lexical en נִדְמֶה y en la alternativa de כְּקֶצֶף en nota.
  issues:
  - severity: medium
    issue: «es cortada» para נִדְמֶה
    rationale: Aunque calca bastante bien «is cut off», en español aplicado a Samaria suena poco idiomático y sugiere un corte físico más que ruina política o destrucción. El contexto y la nota léxica favorecen una formulación natural como «es destruida», con la alternativa preservada en nota.
  - severity: medium
    issue: Anglicismo «chip» en la nota b
    rationale: «Chip» no es una opción natural ni clara en español para la imagen de un pequeño trozo flotando. Debe sustituirse por «astilla» o «fragmento», preservando la alternativa interpretativa documentada.
  revised_spanish_text: Samaria es destruida[a], su rey como espuma[b] sobre la superficie de las aguas.
