translation:
  language: es
  text: Porque hemos oído cómo Yahvé secó las aguas del Mar Rojo[a] delante de ustedes cuando salieron de Egipto, y lo que hicieron a los dos reyes amorreos que estaban al otro lado del Jordán, a Sihón y a Og, a quienes dedicaron al exterminio.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebreo Yam Suf, tradicionalmente «Mar Rojo»; más literalmente, «Mar de Juncos».
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Ya que
  lexicon: HALOT
  rationale: Introduce la explicación de Rahab en relación con el miedo mencionado en el contexto. «Porque» expresa bien la causa o motivo sin sonar forzado en español.
- source_word: שָׁמַעְנוּ
  english_pob_choice: we have heard
  chosen_spanish: hemos oído
  alternatives_spanish:
  - oímos
  lexicon: HALOT
  rationale: El perfecto hebreo mantiene relevancia presente; el presente perfecto español («hemos oído») comunica que esa noticia sigue vigente para los hablantes.
- source_word: הוֹבִישׁ
  english_pob_choice: dried up
  chosen_spanish: secó
  alternatives_spanish:
  - hizo secar
  - secó por completo
  lexicon: HALOT
  rationale: El hifil de יבש significa hacer secar. En español, «secó» es natural y conserva la acción milagrosa sobre las aguas sin añadir exceso interpretativo.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  lexicon: HALOT
  rationale: Se sigue el criterio del proyecto para el nombre divino. «Yahvé» preserva el nombre del pacto en vez de ocultarlo con un sustituto como «SEÑOR».
- source_word: מֵי יַם סוּף
  english_pob_choice: the water of the Red Sea
  chosen_spanish: las aguas del Mar Rojo
  alternatives_spanish:
  - las aguas del Mar de Juncos
  - las aguas del Mar de los Juncos
  lexicon: HALOT
  rationale: El inglés POB conserva «Red Sea» en el texto principal y anota «Sea of Reeds» como alternativa literal. En español, «Mar Rojo» es la forma establecida y readable; la alternativa literal se reserva para nota.
- source_word: מִפְּנֵיכֶם
  english_pob_choice: before you
  chosen_spanish: delante de ustedes
  alternatives_spanish:
  - ante ustedes
  - de su presencia
  lexicon: HALOT
  rationale: La frase indica que las aguas fueron retiradas de su frente o presencia al pasar. «Delante de ustedes» es claro y natural en español contemporáneo.
- source_word: בְּצֵאתְכֶם מִמִּצְרַיִם
  english_pob_choice: when you came out of Egypt
  chosen_spanish: cuando salieron de Egipto
  alternatives_spanish:
  - cuando ustedes salieron de Egipto
  - al salir de Egipto
  lexicon: HALOT
  rationale: La construcción temporal se expresa con naturalidad mediante «cuando salieron de Egipto», sin perder el valor de evento pasado con referencia temporal.
- source_word: עֲשִׂיתֶם
  english_pob_choice: you did
  chosen_spanish: hicieron
  alternatives_spanish:
  - ustedes hicieron
  - trataron
  lexicon: HALOT
  rationale: El verbo es amplio y su objeto se precisa después. «Hicieron» conserva la apertura del hebreo y enlaza bien con la enumeración subsiguiente.
- source_word: לִשְׁנֵי מַלְכֵי הָאֱמֹרִי
  english_pob_choice: to the two kings of the Amorites
  chosen_spanish: a los dos reyes amorreos
  alternatives_spanish:
  - a los dos reyes de los amorreos
  - a los dos reyes amoritas
  lexicon: HALOT
  rationale: El constructo hebreo se vierte de forma natural como «a los dos reyes amorreos», manteniendo el referente étnico y la fluidez castellana.
- source_word: בְּעֵבֶר הַיַּרְדֵּן
  english_pob_choice: who were beyond the Jordan
  chosen_spanish: que estaban al otro lado del Jordán
  alternatives_spanish:
  - que estaban más allá del Jordán
  - que estaban del lado oriental del Jordán
  lexicon: HALOT
  rationale: La ubicación se entiende desde la perspectiva de los hablantes. «Al otro lado del Jordán» reproduce el sentido relacional sin sobreexplicar.
- source_word: לְסִיחֹן וּלְעוֹג
  english_pob_choice: to Sihon and Og
  chosen_spanish: a Sihón y a Og
  alternatives_spanish:
  - a Sijón y a Og
  lexicon: HALOT
  rationale: Se conservan los nombres propios en la forma más reconocible para lectores bíblicos en español, con la transliteración usual «Sihón».
- source_word: הֶחֱרַמְתֶּם
  english_pob_choice: you devoted to destruction
  chosen_spanish: consagraron a la destrucción
  alternatives_spanish:
  - dedicaron a la destrucción
  - pusieron bajo anatema
  lexicon: HALOT
  rationale: El hebreo חרם conserva la idea técnica de poner bajo ḥerem. En español, «consagraron a la destrucción» preserva la tensión entre consagración y eliminación, evitando reducirlo a simple derrota militar.
- source_word: אוֹתָם
  english_pob_choice: whom
  chosen_spanish: a quienes
  alternatives_spanish:
  - a los cuales
  - a ellos
  lexicon: HALOT
  rationale: La forma relativa en español mantiene la relación sintáctica con el antecedente humano y suena natural en registro bíblico contemporáneo.
theological_decisions:
- issue: Nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - Jehová
  rationale: Se mantiene el nombre propio divino en lugar de sustituirlo por una designación funcional. Esto sigue la práctica del proyecto y preserva la identidad del pacto del texto hebreo.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Lenguaje de חֵרֶם / הֶחֱרַמְתֶּם
  english_pob_reading: you devoted to destruction
  chosen_spanish_reading: consagraron a la destrucción
  alternative_spanish_readings:
  - destruyeron por completo
  - los pusieron bajo anatema
  rationale: El término no se reduce bien a «destruyeron», porque el hebreo expresa una acción de consagración bajo prohibición y juicio. La formulación elegida conserva esa densidad y el vínculo entre lo consagrado y la destrucción resultante.
  doctrine_reference: DOCTRINE.md Translation philosophy §1, §5
translation_notes:
  revision_awareness: 'Coincide con el último pase revisado del contexto inglés: no se reportaron cambios necesarios y el consenso fue de alta concordancia. La versión española sigue ese mismo perfil de estabilidad, conservando el valor lexical de Yam Suf y de חרם sin alisar las tensiones semánticas.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» para el nombre divino, conforme al estándar del proyecto.
  - Se conserva «Mar Rojo» en el texto principal y la alternativa literal solo en nota.
  - «Consagraron a la destrucción» busca preservar el peso técnico de חרם sin caer en una simplificación.
  - 'Los nombres propios se presentan en formas usuales en español bíblico: Sihón y Og.'
