  yaml_path: translation/extra_canonical/1_enoch/078/004.yaml
  text: In the disk of the sun there are seven portions of light which are added to it beyond the moon[e][d][c][b][a], and in measure they are added until the seventh portion of the sun is completed.
  footnotes:
