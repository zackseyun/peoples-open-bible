source:
  edition: SBLGNT
  text: ὧδε ἡ σοφία ἐστίν· ὁ ἔχων νοῦν ψηφισάτω τὸν ἀριθμὸν τοῦ θηρίου, ἀριθμὸς γὰρ ἀνθρώπου ἐστίν· καὶ ὁ ἀριθμὸς ⸀αὐτοῦ ⸂ἑξακόσιοι ἑξήκοντα ἕξ⸃.
base_translation:
  language: en
  yaml_path: translation/nt/revelation/013/018.yaml
  text: 'Here is wisdom: let the one who has understanding calculate the number of the beast[a], for it is the number of a man[b], and its number is six hundred sixty-six.'
  footnotes:
  - marker: a
    text: Or, 'for it is the number of a man'; alternatively, 'for it is a human number.'
    reason: alternative_reading
  - marker: b
    text: Some manuscripts read 616 instead of 666.
    reason: textual_variant
translation:
  language: ko
  text: 여기에 지혜가 있습니다. 총명이 있는 자는 그 짐승의 수를 셈하여 보십시오. 그것은 사람의 수[a]이며, 그 수는 육백육십육(666)[b]입니다.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: '또는 「한 인간의 수」 또는 「인간을 가리키는 수」. 헬라어 ἀριθμὸς ἀνθρώπου는 모호하다.'
    reason: lexical_alternative
  - marker: b
    text: '다른 사본들(특히 P115 및 일부 라틴/아르메니아 사본 전통)은 「육백십육(616)」으로 읽는다. SBLGNT와 다수의 헬라어 사본 전통은 666을 지지한다.'
    reason: textual_variant
