  spanish_quality_summary: El texto es comprensible, pero «por confesión, por abierta declaración» resulta algo rígido y menos natural de lo deseable en español neutral eclesial. «Por confesión[a], por reconocimiento abierto[b]» suena más claro, digno y fiel. También conviene mover la nota [a] a «de los pecados» para que el lector entienda que la alternativa literal afecta a esa frase.
  glossary_alignment: 'No hay conflictos con la terminología base del proyecto. «Alma» para ψυχή y «confesión» para ἐξομολόγησις están bien. El ajuste principal es estilístico-lexical para ἐξαγορίαις: «reconocimiento abierto» se alinea mejor con la decisión inglesa «open acknowledgment» que «abierta declaración».'
  issues:
