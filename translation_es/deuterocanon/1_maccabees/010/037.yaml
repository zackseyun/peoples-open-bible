revisions:
- from: Y algunos de ellos serán puestos[a] en las grandes fortalezas del rey, y de entre estos algunos serán puestos sobre las necesidades del reino, siendo dignos de confianza; y los que estén sobre ellos y los gobernantes sean de entre ellos, y vivan según sus propias leyes[b], tal como también el rey mandó en la tierra de Judá.
  to: Y algunos de ellos serán nombrados[a] en las grandes fortalezas del rey, y de entre ellos algunos serán nombrados para los asuntos del reino, siendo dignos de confianza; y sus superiores y los gobernantes sean de entre ellos, y vivan según sus propias leyes[b], tal como también el rey mandó en la tierra de Judá.
  rationale: 'La revisión mantiene el contenido del borrador pero mejora tres puntos: (1) usa «serán nombrados» para reflejar mejor el valor administrativo de κατασταθήσεται; (2) cambia «sobre las necesidades del reino» por «para los asuntos del reino», que es más natural y sigue una alternativa documentada en el audit trail inglés para χρεῖαι; y (3) reemplaza «los que estén sobre ellos» por «sus superiores», que conserva el sentido jerárquico de οἱ ἐπʼ αὐτῶν con mejor español. El resto del versículo está bien encaminado y no requiere adjudicación especial.'
