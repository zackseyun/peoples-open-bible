translation:
  language: es
  text: Tú abres tu mano y sacias el deseo de todo ser viviente[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'sacias a todo ser viviente con favor' o 'con buena voluntad'. El sustantivo hebreo puede significar 'deseo', 'favor' o 'buena voluntad'; aquí 'deseo' encaja mejor con el contexto de la provisión de Dios para todas las criaturas.
    reason: lexical_alternative
lexical_decisions:
- source_word: פּוֹתֵחַ
  english_pob_choice: open
  chosen_spanish: abres
  alternatives_spanish:
  - abres continuamente
  - abres tu mano
  lexicon: HALOT
  rationale: El participio qal describe una acción continua o habitual; en español, el presente simple expresa bien esa acción duradera de Dios sin forzar una perífrasis. Mantengo el sujeto explícito para que el verso suene natural en español.
- source_word: יָדֶךָ
  english_pob_choice: your hand
  chosen_spanish: tu mano
  alternatives_spanish:
  - tu palma
  lexicon: HALOT
  rationale: Conservo la imagen corporal literal del hebreo. 'Mano' es la forma más natural y directa en español; 'palma' estrecha innecesariamente la imagen.
- source_word: וּמַשְׂבִּיעַ
  english_pob_choice: and satisfy
  chosen_spanish: y sacias
  alternatives_spanish:
  - y satisfaces
  - y llenas
  lexicon: HALOT
  rationale: 'El hiphil de שׂבע tiene valor causativo: hacer que otro quede satisfecho o lleno. ''Saciar'' comunica mejor esa fuerza en español bíblico y evita una formulación más abstracta.'
- source_word: לְכָל
  english_pob_choice: of every
  chosen_spanish: de todo
  alternatives_spanish:
  - para todo
  - a todo
  lexicon: HALOT
  rationale: Después de 'sacias', la construcción española más natural para expresar la totalidad es 'de todo'. Refleja el alcance universal del hebreo sin rigidizar la sintaxis.
- source_word: חַי
  english_pob_choice: living thing
  chosen_spanish: ser viviente
  alternatives_spanish:
  - criatura viviente
  - ser vivo
  lexicon: HALOT
  rationale: El sustantivo/adjetivo substantivado abarca toda vida animada. 'Ser viviente' preserva amplitud y solemnidad, y funciona bien en español contemporáneo.
- source_word: רָצוֹן
  english_pob_choice: desire
  chosen_spanish: deseo
  alternatives_spanish:
  - favor
  - buena voluntad
  - voluntad
  lexicon: HALOT
  rationale: 'Sigo la decisión contextual del POB inglés: aquí el sustantivo se refiere a lo que las criaturas desean o necesitan, no al favor de Dios. ''Deseo'' es la equivalencia más directa y clara en español.'
theological_decisions:
- issue: Imagen antropomórfica de la mano de Dios
  english_pob_reading: Retain the literal image 'your hand' rather than paraphrasing it as providential giving.
  chosen_spanish_reading: Conservar 'tu mano' como imagen literal, no sustituirla por una paráfrasis como 'provees generosamente'.
  alternative_spanish_readings:
  - provees generosamente
  - abres generosamente tu provisión
  rationale: El hebreo usa lenguaje concreto para describir el cuidado sustentador de Dios. Mantener la imagen respeta la forma del texto original y su fuerza poética, sin convertirla en una explicación doctrinal.
  doctrine_reference: Principio de primacía del texto original; preservación de la imaginería poética sin sobreexplicación.
translation_notes:
  revision_awareness: No hay revisiones aplicadas en el expediente inglés; el texto inglés más reciente se mantuvo sin cambios, con alto grado de acuerdo en la revisión cruzada.
  spanish_consistency_notes:
  - Se mantuvo 'mano' en sentido literal, en coherencia con la imagen antropomórfica preservada por el POB inglés.
  - '''Saciar'' conserva la fuerza causativa de שׂבע y es coherente con el valor de ''satisfy'' en el texto base.'
  - '''Ser viviente'' amplia la referencia a toda vida animada, evitando restringir innecesariamente el alcance universal del verso.'
  - La nota al pie conserva la alternativa semántica documentada para רָצוֹן sin desplazar la lectura principal.
