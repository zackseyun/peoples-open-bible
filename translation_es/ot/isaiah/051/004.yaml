base_translation:
  language: en
  yaml_path: translation/ot/isaiah/051/004.yaml
  text: Pay attention to me[a], my people, and give ear to me, my nation; for instruction will go out from me[c][b], and I will set my justice as a light for the peoples.
  footnotes:
