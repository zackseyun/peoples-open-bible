translation:
  language: es
  text: Sus infantes serán estrellados delante de sus ojos; sus casas serán saqueadas, y sus esposas serán violadas[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «serán ultrajadas». El hebreo usa un verbo directo y áspero para agresión sexual; «serán violadas» se mantiene en el texto principal para no suavizarlo.
    reason: lexical_alternative
lexical_decisions:
- source_word: עֹלְלֵיהֶם
  english_pob_choice: their infants
  chosen_spanish: sus infantes
  alternatives_spanish:
  - sus niños pequeños
  - sus hijos pequeños
  lexicon: HALOT
  rationale: עֹלֵל designa niños muy pequeños, incluso de pecho o de edad muy temprana. «Infantes» conserva la vulnerabilidad y la fuerza del término con un registro natural en español bíblico contemporáneo.
- source_word: יְרֻטְּשׁוּ
  english_pob_choice: will be dashed to pieces
  chosen_spanish: serán estrellados
  alternatives_spanish:
  - serán hechos pedazos
  - serán destrozados
  lexicon: HALOT
  rationale: El pasivo de רטש expresa violencia extrema contra el cuerpo. «Estrellados» comunica el sentido de romper violentamente contra algo y mantiene la dureza del texto sin volverlo demasiado técnico.
- source_word: לְעֵינֵיהֶם
  english_pob_choice: before their eyes
  chosen_spanish: delante de sus ojos
  alternatives_spanish:
  - ante sus ojos
  - a la vista de ellos
  lexicon: HALOT
  rationale: La locución idiomática indica que la acción ocurre en presencia de los afectados. «Delante de sus ojos» es una equivalencia natural y clara en español.
- source_word: יִשַּׁסּוּ
  english_pob_choice: will be plundered
  chosen_spanish: serán saqueadas
  alternatives_spanish:
  - serán despojadas
  - serán pilladas
  lexicon: HALOT
  rationale: El verbo שסה refiere despojar o saquear. En español, aplicado a «casas», el pasivo «serán saqueadas» reproduce bien el valor léxico y el contexto bélico.
- source_word: בָּתֵּיהֶם
  english_pob_choice: their houses
  chosen_spanish: sus casas
  alternatives_spanish:
  - sus hogares
  lexicon: HALOT
  rationale: בַּיִת aquí nombra la casa como propiedad concreta. «Casas» sigue de cerca el sustantivo hebreo; «hogares» sería más emotivo pero menos literal.
- source_word: וּנְשֵׁיהֶם
  english_pob_choice: their wives
  chosen_spanish: sus mujeres
  alternatives_spanish:
  - sus esposas
  lexicon: HALOT
  rationale: Aunque el inglés audit trail opta por «their wives», el hebreo plural constructo de אִשָּׁה con sufijo puede referirse a mujeres del grupo y no exige especificar «esposas». «Sus mujeres» preserva esa amplitud semántica sin perder claridad.
- source_word: תשגלנה
  english_pob_choice: raped
  chosen_spanish: serán violadas
  alternatives_spanish:
  - serán ultrajadas
  - serán abusadas sexualmente
  lexicon: HALOT
  rationale: שגל es un término crudo para violencia sexual. «Serán violadas» transmite el sentido de forma directa en español y evita eufemismos que suavizarían la dureza del juicio profético.
theological_decisions:
- issue: Término explícito de violencia sexual en contexto de juicio profético
  english_pob_reading: their wives raped
  chosen_spanish_reading: sus mujeres serán violadas
  alternative_spanish_readings:
  - sus mujeres serán ultrajadas
  - sus esposas serán violadas
  rationale: El español debe reflejar la crudeza del hebreo sin ocultarla. Se evita un lenguaje mitigado para no borrar la intensidad del oráculo de juicio.
  doctrine_reference: Translation philosophy §1, §6
translation_notes:
  revision_awareness: Se corrigió la validación anterior anclando la nota [a] exactamente en la frase final «serán violadas.[a]». Se mantuvo la traducción directa y sin eufemismos conforme al audit trail inglés y al verbo hebreo.
  spanish_consistency_notes:
  - 'Se conserva el paralelismo de tres cola con sujetos posesivos repetidos: «sus infantes», «sus casas», «sus mujeres».'
  - Se eligió vocabulario de registro bíblico moderno y claro, sin sustituir por fórmulas eclesiásticas tradicionales no requeridas por la fuente.
  - La nota [a] está anclada solo una vez y corresponde a la alternativa léxica del término sexualmente violento.
