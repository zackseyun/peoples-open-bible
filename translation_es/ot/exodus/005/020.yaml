translation:
  language: es
  text: Ellos se encontraron con Moisés y Aarón[a], que estaban allí para encontrarse con ellos cuando salieron de la presencia de Faraón.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Se toparon con Moisés y Aarón»; el verbo también puede llevar en algunos contextos el matiz de «los confrontaron», pero el texto principal conserva el sentido más amplio de encuentro.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּפְגְּעוּ
  english_pob_choice: They met
  chosen_spanish: se encontraron con
  alternatives_spanish:
  - se toparon con
  - se encontraron
  - se encontraron con ellos
  lexicon: HALOT
  rationale: פגע puede expresar 'encontrarse/ir al encuentro' y, en algunos contextos, tener matiz hostil. Aquí el verbo por sí solo no obliga a traducir 'confrontar'. 'Se encontraron con' conserva el sentido básico y deja que el contexto inmediato determine cualquier tensión.
- source_word: אֶת מֹשֶׁה וְאֶת אַהֲרֹן
  english_pob_choice: Moses and Aaron
  chosen_spanish: Moisés y Aarón
  alternatives_spanish:
  - a Moisés y a Aarón
  - Moisés y Aarón
  lexicon: uso gramatical español
  rationale: Los marcadores de objeto directo hebreos no se reflejan necesariamente en español. Los nombres propios se mantienen en forma usual en español, y el contexto ya identifica claramente a los personajes.
- source_word: נִצָּבִים
  english_pob_choice: who were standing
  chosen_spanish: que estaban de pie
  alternatives_spanish:
  - que estaban parados
  - que se hallaban de pie
  - de pie
  lexicon: HALOT
  rationale: El participio expresa una postura continua. 'Estaban de pie' es natural en español y comunica la escena sin añadir una interpretación más técnica como 'estacionados'.
- source_word: לִקְרָאתָם
  english_pob_choice: to meet them
  chosen_spanish: para recibirlos
  alternatives_spanish:
  - para encontrarse con ellos
  - para salirles al encuentro
  - para ir a su encuentro
  lexicon: HALOT
  rationale: La construcción indica orientación hacia su llegada. En español, 'para recibirlos' comunica bien la disposición de Aarón y Moisés al encuentro; la alternativa más literal 'salirles al encuentro' también sería posible, pero 'recibirlos' resulta más fluido en este contexto.
- source_word: בְּצֵאתָם
  english_pob_choice: when they came out
  chosen_spanish: cuando salían
  alternatives_spanish:
  - cuando salieron
  - al salir
  - mientras salían
  lexicon: HALOT
  rationale: El infinitivo con ב expresa circunstancia temporal. 'Cuando salían' preserva el trasfondo narrativo en curso; 'cuando salieron' sería posible, pero puede sonar más puntual de lo que el hebreo exige.
- source_word: מֵאֵת פַּרְעֹה
  english_pob_choice: from Pharaoh
  chosen_spanish: de parte de Faraón
  alternatives_spanish:
  - de Faraón
  - desde Faraón
  - de la presencia de Faraón
  lexicon: HALOT
  rationale: מֵאֵת puede marcar alejamiento desde una persona o desde su presencia. 'De parte de Faraón' comunica con claridad el punto de partida relacional en español y evita reducir demasiado el matiz de procedencia.
translation_notes:
  revision_awareness: La versión sigue el sentido general del texto hebreo y del audit trail inglés. Se resolvió la ambigüedad de פגע con un verbo español de encuentro, manteniendo abierta la posibilidad de matiz hostil en la nota. También se optó por una solución idiomática para לִקְרָאתָם y מֵאֵת פַּרְעֹה, evitando calcos excesivos.
  spanish_consistency_notes:
  - Se usa 'Moisés' y 'Aarón' conforme al estándar español bíblico.
  - Se conserva 'Faraón' como nombre/título propio habitual en español.
  - La puntuación y la sintaxis buscan una lectura pública fluida sin perder la estructura relacional del hebreo.
