translation:
  language: es
  text: Pero por un corto tiempo fueron perturbados como advertencia[a], teniendo un signo de salvación, como recordatorio del mandamiento de tu ley;
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «un símbolo de salvación» o «una señal de liberación».
    reason: lexical_alternative
lexical_decisions:
- source_word: εἰς νουθεσίαν
  english_pob_choice: as a warning
  chosen_spanish: como una advertencia
  alternatives_spanish:
  - para amonestación
  - para instrucción
  lexicon: BDAG
  rationale: νουθεσία expresa una acción correctiva de advertencia o amonestación. «Como una advertencia» conserva ese valor exhortativo y suena natural en español sin diluir el sentido de corrección.
- source_word: πρὸς ὀλίγον
  english_pob_choice: for a short time
  chosen_spanish: por un corto tiempo
  alternatives_spanish:
  - brevemente
  - por un poco de tiempo
  lexicon: LSJ
  rationale: La frase indica duración limitada. «Por un corto tiempo» reproduce de manera clara ese límite temporal y mantiene el tono sobrio del contexto.
- source_word: ἐταράχθησαν
  english_pob_choice: they were troubled
  chosen_spanish: fueron turbados
  alternatives_spanish:
  - fueron inquietados
  - fueron perturbados
  lexicon: BDAG
  rationale: El pasivo de ταράσσω puede expresar turbación, inquietud o perturbación. «Fueron turbados» conserva el matiz de aflicción y mantiene un registro bíblico inteligible en español.
- source_word: σύμβολον
  english_pob_choice: a sign
  chosen_spanish: un signo
  alternatives_spanish:
  - un símbolo
  - una señal
  - un token
  lexicon: LSJ
  rationale: En este contexto el objeto funciona como indicio visible de la intervención salvadora de Dios. «Un signo» preserva esa función referencial mejor que «símbolo», que en español puede sonar más abstracto.
- source_word: σωτηρίας
  english_pob_choice: of salvation
  chosen_spanish: de salvación
  alternatives_spanish:
  - de liberación
  - de rescate
  lexicon: BDAG
  rationale: Aquí la idea inmediata es la salvación/liberación de una muerte real, con resonancia teológica. «De salvación» mantiene esa densidad sin restringirla a un mero rescate físico.
- source_word: εἰς ἀνάμνησιν
  english_pob_choice: as a reminder
  chosen_spanish: como un recordatorio
  alternatives_spanish:
  - para memoria
  - como memorial
  lexicon: BDAG
  rationale: 'La construcción expresa finalidad: el signo estaba destinado a traer a la memoria lo mandado. «Como un recordatorio» comunica bien esa finalidad en español moderno y corresponde al ajuste de la POB inglesa.'
- source_word: ἐντολῆς νόμου σου
  english_pob_choice: the commandment of your law
  chosen_spanish: del mandamiento de tu ley
  alternatives_spanish:
  - de la orden de tu ley
  - del precepto de tu ley
  lexicon: LSJ
  rationale: La construcción griega conserva tanto la singularidad de ἐντολή como la referencia a νόμος. «Del mandamiento de tu ley» refleja ambas piezas sin sobreexplicar cuál mandamiento particular se tiene en vista.
theological_decisions:
- issue: Valor de σωτηρίας en un episodio de liberación física con peso teológico
  english_pob_reading: of salvation
  chosen_spanish_reading: de salvación
  alternative_spanish_readings:
  - de liberación
  - de rescate
  rationale: En Sabiduría, el evento apunta a una liberación concreta que también figura la acción salvadora de Dios. «De salvación» preserva ambos niveles y no reduce el texto a mera sobrevivencia física.
  doctrine_reference: 'DOCTRINE.md: consistencia terminológica y preservación de la tensión teológica'
- issue: Función de σύμβολον respecto de la serpiente de bronce
  english_pob_reading: a sign of salvation
  chosen_spanish_reading: un signo de salvación
  alternative_spanish_readings:
  - un símbolo de salvación
  - una señal de salvación
  rationale: «Signo» mantiene la función representativa del objeto sin convertirlo en un símbolo meramente abstracto. Así se conserva la relación entre el objeto visible y la salvación divina que mediatiza.
  doctrine_reference: 'DOCTRINE.md: primacía del idioma original y conservación de matices tipológicos'
translation_notes:
  revision_awareness: 'La redacción sigue de cerca la sintaxis del griego y del texto inglés revisado: mantiene la secuencia temporal, el valor instrumental/propósito de εἰς y el paralelismo entre el signo salvador y el recordatorio del mandamiento. La revisión inglesa que pasó de «for a reminder» a «as a reminder» se refleja en «como un recordatorio».'
  spanish_consistency_notes:
  - Se usa «Dios» implícito en el contexto, pero aquí el texto no lo nombra explícitamente.
  - «Ley» conserva νόμος de forma clara y bíblica; no se sustituye por «Torá» porque el contexto español de lectura eclesial general favorece «ley».
  - «Signo» se prefiere a «símbolo» en el texto principal, pero se registra la alternativa por la tensión lexical del griego.
