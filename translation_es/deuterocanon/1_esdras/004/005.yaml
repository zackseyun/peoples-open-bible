translation:
  language: es
  text: Digamos cada uno una palabra que prevalezca[a]; y aquel cuya declaración aparezca más sabia que la del otro, Darío el rey le dará grandes dones y grandes honores de victoria[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «una declaración» para λόγον; el griego es breve y puede referirse a una proposición o argumento en el concurso.
    reason: lexical_alternative
  - marker: b
    text: «Honores de victoria» refleja ἐπινίκια, honores o recompensas dados por ganar.
    reason: lexical_alternative
lexical_decisions:
- source_word: Εἴπωμεν
  english_pob_choice: Let ... speak
  chosen_spanish: Que hable
  alternatives_spanish:
  - Digamos
  - Que cada uno diga
  lexicon: LSJ
  rationale: Es un subjuntivo exhortativo de πρώτη persona plural. En español, «Que hable» transmite naturalmente la invitación o exhortación colectiva sin perder la fuerza hortatoria.
- source_word: ἕκαστος ἡμῶν
  english_pob_choice: each of us
  chosen_spanish: cada uno de nosotros
  alternatives_spanish:
  - cada cual de nosotros
  - todos nosotros, cada uno
  lexicon: LSJ
  rationale: Es la equivalencia más idiomática y clara en español para el distributivo griego.
- source_word: ἕνα λόγον
  english_pob_choice: one word
  chosen_spanish: una palabra
  alternatives_spanish:
  - una declaración
  - un dicho
  lexicon: LSJ
  rationale: Conserva la concisión de λόγον. «Palabra» mantiene el paralelo breve del griego; el contexto competitivo permite entenderla como una propuesta o argumento.
- source_word: ὃς ὑπερισχύσει
  english_pob_choice: that will prevail
  chosen_spanish: que prevalezca
  alternatives_spanish:
  - que venza
  - que resulte más fuerte
  lexicon: LSJ
  rationale: ὑπερισχύω expresa prevalecer o imponerse. «Prevalezca» conserva el matiz de superioridad en un concurso de discursos.
- source_word: τὸ ῥῆμα αὐτοῦ
  english_pob_choice: his statement
  chosen_spanish: su dicho
  alternatives_spanish:
  - su declaración
  - su palabra
  lexicon: LSJ
  rationale: ῥῆμα aquí se refiere a lo dicho por el contendiente. «Dicho» evita repetir «palabra» y es más natural que una traducción demasiado técnica.
- source_word: σοφώτερον τοῦ ἑτέρου
  english_pob_choice: wiser than the other’s
  chosen_spanish: más sabio que el del otro
  alternatives_spanish:
  - más sabio que el otro
  - más prudente que el del otro
  lexicon: LSJ
  rationale: Mantiene el comparativo de σοφώτερον y conserva la referencia elíptica al dicho rival. «Sabio» es la correspondencia más directa y amplia en español.
- source_word: Δαρεῖος ὁ βασιλεύς
  english_pob_choice: Darius the king
  chosen_spanish: Darío, el rey
  alternatives_spanish:
  - el rey Darío
  - Darío el rey
  lexicon: LSJ
  rationale: Respeta el orden natural del español y el valor identificador del nombre propio con aposición.
- source_word: δωρεὰς μεγάλας
  english_pob_choice: great gifts
  chosen_spanish: grandes dones
  alternatives_spanish:
  - grandes regalos
  - grandes presentes
  lexicon: LSJ
  rationale: δωρεά es don o regalo; «dones» suena más amplio y digno en español bíblico, y evita reducirlo a un simple obsequio material.
- source_word: ἐπινίκια μεγάλα
  english_pob_choice: great honors of victory
  chosen_spanish: grandes honores de victoria
  alternatives_spanish:
  - grandes premios de victoria
  - grandes honores triunfales
  lexicon: LSJ
  rationale: ἐπινίκια designa honores o recompensas vinculados con la victoria. «Honores de victoria» preserva la relación semántica sin forzar una especificación que el griego no detalla.
translation_notes:
  revision_awareness: La redacción sigue el testimonio griego de Swete y toma en cuenta la lectura auditada en inglés, especialmente la equivalencia de λόγον y ἐπινίκια. Se conserva la estructura competitiva de un dicho que ha de prevalecer y el premio ofrecido por Darío.
  spanish_consistency_notes:
  - Se usó «Yahvé» como norma general del proyecto, pero este versículo no contiene el nombre divino.
  - Se prefirió «Darío, el rey» para mantener la aposición natural en español y la referencia histórica clara.
  - Se evitó «Cristo», «SEÑOR» y otras fórmulas no pertinentes al texto.
  - Se conservó la tensión entre λόγον y ῥῆμα mediante «palabra» y «dicho» para no borrar el matiz lexical del griego.
