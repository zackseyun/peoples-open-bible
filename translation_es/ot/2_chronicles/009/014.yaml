translation:
  language: es
  text: Además de lo que traían[a] los comerciantes y mercaderes, todos los reyes de Arabia y los gobernadores de la tierra traían oro y plata a Salomón.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «los comerciantes itinerantes» para «los comerciantes»; la expresión hebrea es algo difícil y puede distinguir entre comerciantes viajeros y mercaderes en general.
    reason: lexical_alternative
lexical_decisions:
- source_word: לְבַד
  english_pob_choice: Besides
  chosen_spanish: Además de
  alternatives_spanish:
  - Aparte de
  - Fuera de
  lexicon: HALOT
  rationale: La idea es aditiva y exceptiva respecto de lo ya mencionado; «Además de» suena natural en español y conserva la función del hebreo sin sobrerretórica.
- source_word: מֵאַנְשֵׁי הַתָּרִים
  english_pob_choice: the traders
  chosen_spanish: los comerciantes
  alternatives_spanish:
  - los viajeros comerciantes
  - los mercaderes itinerantes
  lexicon: HALOT
  rationale: La expresión hebrea es difícil. En este contexto comercial, «comerciantes» comunica el sentido económico de manera clara; en la nota se conserva la alternativa de lectura más literal/itinerante.
- source_word: וְהַסֹּחֲרִים
  english_pob_choice: and merchants
  chosen_spanish: y mercaderes
  alternatives_spanish:
  - y comerciantes
  lexicon: HALOT
  rationale: סֹחֵר apunta a comercio y mercadería. Mantengo un segundo término distinto para reflejar que el hebreo parece distinguir dos grupos comerciales, aunque en español haya solapamiento semántico.
- source_word: מְבִיאִים
  english_pob_choice: were bringing
  chosen_spanish: traían
  alternatives_spanish:
  - iban trayendo
  - estaban trayendo
  lexicon: HALOT
  rationale: El participio hebreo expresa acción repetida o habitual. «Traían» reproduce bien ese valor iterativo en español bíblico actual sin volverse pesado.
- source_word: כָל מַלְכֵי עֲרַב
  english_pob_choice: all the kings of Arabia
  chosen_spanish: todos los reyes de Arabia
  alternatives_spanish:
  - todos los reyes de los árabes
  - todos los reyes de Arab
  lexicon: HALOT
  rationale: «Arabia» es la equivalencia geográfica estándar y más inteligible en español para עֲרַב en este pasaje.
- source_word: וּפַחוֹת הָאָרֶץ
  english_pob_choice: and the governors of the land
  chosen_spanish: y los gobernadores de la tierra
  alternatives_spanish:
  - y los gobernadores del país
  - y los gobernadores provinciales de la tierra
  lexicon: HALOT
  rationale: פַּחוֹת son funcionarios gobernantes o gobernadores. «De la tierra» sigue de cerca el hebreo; «gobernadores» preserva la función sin imponer una estructura administrativa más específica de la que ofrece el texto.
- source_word: זָהָב וָכֶסֶף
  english_pob_choice: gold and silver
  chosen_spanish: oro y plata
  lexicon: HALOT
  rationale: Correspondencia literal estándar para los bienes tributarios mencionados.
- source_word: לִשְׁלֹמֹה
  english_pob_choice: to Solomon
  chosen_spanish: para Salomón
  alternatives_spanish:
  - a Salomón
  lexicon: HALOT
  rationale: La preposición marca destinatario; «para» suena natural en español cuando se habla de tributo o entrega dirigida a una persona.
translation_notes:
  revision_awareness: El borrador sigue de cerca el hebreo, manteniendo el paralelismo de dos participios iterativos con un español natural («traían»). También conserva la ambigüedad reconocida en el audit trail sobre מֵאַנְשֵׁי הַתָּרִים mediante una nota alternativa, sin forzar una solución más precisa de la que el texto y la tradición de trabajo permiten.
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando el hebreo lo exige; este versículo no lo contiene.
  - Se mantiene «Salomón» como nombre propio establecido.
  - «Gobernadores de la tierra» conserva el tono del hebreo sin modernizarlo a una categoría administrativa más técnica.
  - La frase final «para Salomón» se eligió por naturalidad española en contexto de tributo, aunque «a Salomón» sigue siendo una alternativa válida.
