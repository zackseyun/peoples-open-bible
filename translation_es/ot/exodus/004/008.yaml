review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura condicional del hebreo y conserva decisiones clave del POB: «te creen» para יַאֲמִינוּ לָךְ, «escuchan» para יִשְׁמְעוּ, «voz de» para לְקוֹל, «señal» para אוֹת, y «posterior» para אַחֲרוֹן evitando una finalidad indebida. Sin embargo, el marcador de nota [a] está anclado en «Y sucederá», cuando la nota explica «posterior», y por tanto no cumple la disciplina de anclaje. Además, en español suena más natural explicitar la segunda «señal» también en «la voz de la primera señal», en paralelo con la última frase.'
  spanish_quality_summary: El español es claro, digno y legible. «Y sucederá que» funciona, aunque es algo formular; sigue siendo aceptable por fidelidad estructural. La principal reparación necesaria es reubicar la nota al término pertinente y mejorar levemente el paralelismo sintáctico para mayor naturalidad y claridad.
  glossary_alignment: No hay conflictos con la terminología del proyecto. «Señal» corresponde bien a אוֹת; no aparecen términos sensibles del glosario principal. La elección «posterior» concuerda con la justificación léxica auditada frente a «última».
  issues:
  - severity: medium
    issue: La nota [a] está anclada en «Y sucederá» pero su contenido explica «posterior».
    rationale: Las instrucciones exigen que cada nota aparezca en el punto pertinente del texto. Tal como está, el anclaje induce a error y no corresponde al término comentado.
  - severity: low
    issue: Falta paralelismo completo en «la voz de la primera señal».
    rationale: El hebreo dice literalmente «la voz de la señal, la primera». En español, «la voz de la primera señal» es comprensible, pero «la voz de la señal primera» suena menos natural; la mejor solución idiomática es mantener «de la primera señal» y repetir «señal» en ambos miembros para claridad.
  revised_spanish_text: Y sucederá que, si no te creen y no escuchan la voz de la primera señal, creerán la voz de la señal posterior[a].
  revised_footnotes:
  - marker: a
    text: «Posterior» refleja el hebreo אַחֲרוֹן sin implicar necesariamente que no pueda haber otra señal después.
    reason: lexical_alternative
