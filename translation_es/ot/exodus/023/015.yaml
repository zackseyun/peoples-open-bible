revisions:
- from: Guardarás la Fiesta de los Panes sin levadura[a]. Durante siete días comerás panes sin levadura, como te lo he mandado, en el tiempo señalado del mes de Abib, porque en él saliste de Egipto[b]. Y nadie se presentará delante de mí en vano.
  to: Guardarás la Fiesta de los Panes sin levadura. Durante siete días comerás panes sin levadura, como te mandé, en el tiempo señalado del mes de Abib, porque en él saliste de Egipto. Y nadie se presentará delante de mí con las manos vacías[a].
  rationale: Se corrige la cláusula final para reflejar fielmente רֵיקָם como carencia material/cultual ('con las manos vacías'), en vez de 'en vano'. También se simplifica 'como te lo he mandado' a 'como te mandé' para seguir mejor el perfecto hebreo en estilo natural español. Se eliminan notas innecesarias y se reubica la nota pertinente al cambio de persona en la cláusula final, donde realmente ocurre.
  reviewer_model: gpt-5.4
