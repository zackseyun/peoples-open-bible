translation:
  language: es
  text: Y el lado sur era desde el extremo de Quiriat-jearim[a], y el límite se extendía hacia el oeste[b] y se extendía hasta el manantial de las aguas de Nephtoa[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Transliteración del nombre propio; en español también podría escribirse «Kiriat-jearim».
    reason: source_note
  - marker: b
    text: Hebreo literalmente, «hacia el mar»; en este contexto geográfico significa «hacia el oeste».
    reason: lexical_alternative
  - marker: c
    text: O «el manantial de Nephtoa»; algunas traducciones simplifican la construcción hebrea «manantial de las aguas de Nephtoa».
    reason: lexical_alternative
lexical_decisions:
- source_word: וּפְאַת
  english_pob_choice: And the side
  chosen_spanish: Y el lado
  alternatives_spanish:
  - Y la parte
  - Y el costado
  - Y el borde
  lexicon: HALOT
  rationale: פֵאָה designa un lado, borde o extremo. En español, «lado» comunica con naturalidad la idea espacial sin introducir «límite» demasiado pronto, ya que el hebreo lo expresa después con הַגְּבוּל.
- source_word: נֶגְבָּה
  english_pob_choice: southern
  chosen_spanish: sur
  alternatives_spanish:
  - meridional
  - hacia el sur
  - del sur
  lexicon: HALOT
  rationale: La forma funciona direccionalmente con פְאַת para indicar el lado sur. «Sur» es más natural en español bíblico actual que «meridional».
- source_word: מִקְצֵה
  english_pob_choice: from the edge of
  chosen_spanish: desde el extremo de
  alternatives_spanish:
  - desde el borde de
  - desde el fin de
  - desde el límite de
  lexicon: HALOT
  rationale: קָצֶה puede ser extremo, borde o fin. «Extremo» conserva bien la imagen espacial de partida en una descripción de fronteras.
- source_word: קִרְיַת יְעָרִים
  english_pob_choice: Kiriath-jearim
  chosen_spanish: Quiriat-jearim
  alternatives_spanish:
  - Quiryat-jearim
  - Kiriat-jearim
  lexicon: HALOT
  rationale: Se translitera el topónimo conforme a la política del proyecto. En español, «Quiriat» es una adaptación legible y estable para este nombre propio.
- source_word: וְיָצָא
  english_pob_choice: went out
  chosen_spanish: se extendía
  alternatives_spanish:
  - salía
  - iba
  - proseguía
  lexicon: HALOT
  rationale: En fórmulas de frontera, יָצָא describe la línea que avanza desde un punto. «Se extendía» expresa la función geográfica en español con claridad, sin perder la idea de continuidad.
- source_word: הַגְּבוּל
  english_pob_choice: the border
  chosen_spanish: el límite
  alternatives_spanish:
  - la frontera
  - el borde
  lexicon: HALOT
  rationale: גְּבוּל en estos pasajes de reparto territorial es la línea fronteriza. «Límite» suena natural en español y mantiene el valor topográfico sin personificar la línea.
- source_word: יָמָּה
  english_pob_choice: westward
  chosen_spanish: hacia el oeste
  alternatives_spanish:
  - al mar
  - hacia el mar
  - occidentalmente
  lexicon: HALOT
  rationale: Aunque el hebreo literalmente alude al mar, en este contexto geográfico significa dirección occidental. «Hacia el oeste» hace explícito el sentido direccional para el lector moderno.
- source_word: אֶל
  english_pob_choice: to
  chosen_spanish: hasta
  alternatives_spanish:
  - a
  - hacia
  - para
  lexicon: HALOT
  rationale: Con un movimiento de frontera, «hasta» expresa mejor el punto de llegada que un simple «a».
- source_word: מַעְיַן
  english_pob_choice: the spring
  chosen_spanish: la fuente
  alternatives_spanish:
  - el manantial
  - la fuente de agua
  - el ojo de agua
  lexicon: HALOT
  rationale: מַעְיָן puede ser spring/fountain. «Fuente» es idiomática y comprensible en español; en nota se conserva la alternativa de «manantial» como posible matiz.
- source_word: מֵי
  english_pob_choice: of the waters of
  chosen_spanish: de las aguas de
  alternatives_spanish:
  - de
  - de las aguas
  - junto a las aguas de
  lexicon: HALOT
  rationale: El hebreo encadena genitivos de manera formal. «De las aguas de» refleja esa estructura sin exagerar la literalidad hasta volverla opaca.
- source_word: נֶפְתּוֹחַ
  english_pob_choice: Nephtoah
  chosen_spanish: Nephtoaj
  alternatives_spanish:
  - Nephtoa
  - Neftoaj
  lexicon: HALOT
  rationale: Se translitera el topónimo. «Nephtoaj» conserva una adaptación española más fluida del final gutural, sin alterar la identidad del nombre.
translation_notes:
  revision_awareness: El pasaje coincide ampliamente con la edición fuente y no presenta revisiones sustantivas en el expediente inglés; la redacción española sigue de cerca la estructura hebrea en la fórmula de lindero, manteniendo las decisiones auditadas sobre dirección occidental y la cadena genitiva de «la fuente de las aguas de Nephtoaj».
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma del proyecto, pero este versículo no contiene el nombre divino.
  - Se conserva «Quiriat-jearim» y «Nephtoaj» como transliteraciones consistentes con el tratamiento de topónimos.
  - Se evita «SEÑOR» o «mar» como traducción directa de יָמָּה, porque aquí el valor es direccional y no nominal.
