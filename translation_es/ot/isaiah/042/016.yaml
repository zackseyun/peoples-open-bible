review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien la estructura y el sentido general del hebreo: guía divina para los ciegos por caminos desconocidos, transformación de oscuridad en luz y de lo torcido en terreno llano, y cierre con perfectos que expresan certeza profética. Sin embargo, hay dos puntos mejorables frente al texto fuente y al rastro POB: (1) «que no conocían» suena más pasado narrativo que estado de desconocimiento vigente; «que no han conocido» preserva mejor el matiz perfectivo de לֹא יָדָעוּ. (2) «haré de la oscuridad delante de ellos luz» es comprensible pero menos natural y algo rígido; «convertiré la oscuridad delante de ellos en luz» expresa con más claridad la transformación resultativa de לָאוֹר. Además, «abandonado» es aceptable, pero «desamparado» conserva mejor la resonancia de no dejar/forsake sin sonar demasiado arcaico.'
  spanish_quality_summary: El español es claro y digno, pero admite un pequeño pulido para mayor naturalidad y precisión. «Por un camino... por sendas...» funciona bien, así como «conduciré... los guiaré». La cláusula de transformación mejora con una sintaxis más idiomática en español. El cierre con «Estas son las cosas que he hecho» es fiel, aunque ligeramente más natural en contexto con «no los he desamparado» que con «no los he abandonado».
  glossary_alignment: 'No hay conflictos con la terminología de proyecto. No aparece el nombre divino ni otros términos sensibles del glosario. Las decisiones léxicas principales están alineadas con el POB inglés: guía/lead, ciegos/blind, sendas/paths, luz/light, terreno llano/level ground. La excepción sugerida es cambiar «abandonado» por «desamparado» para acercarse mejor al valor de עזב y a la elección inglesa «forsaken».'
  issues:
  - severity: medium
    issue: «que no conocían» debilita el matiz de desconocimiento perfectivo de לֹא יָדָעוּ
    rationale: El inglés POB preserva present perfect («have not known»). En español, «no conocían» puede leerse como trasfondo narrativo pasado; «no han conocido» comunica mejor la falta de familiaridad hasta ese momento.
  - severity: medium
    issue: «Haré de la oscuridad delante de ellos luz» suena poco idiomático
    rationale: Aunque semánticamente defendible, la construcción es más forzada en español. «Convertiré la oscuridad delante de ellos en luz» o «Haré que la oscuridad... sea luz» expresa mejor la transformación de oscuridad a luz.
  - severity: low
    issue: «abandonado» es menos cercano a la resonancia de «forsaken» que «desamparado»
    rationale: עזב incluye dejar/forsake. «Desamparado» conserva mejor el matiz de no dejar sin cuidado o apoyo, con buena inteligibilidad eclesial en español neutral.
  revised_spanish_text: Y conduciré a los ciegos por un camino que no han conocido; por sendas que no han conocido los guiaré. Convertiré la oscuridad delante de ellos en luz[a], y los lugares torcidos en terreno llano. Estas son las cosas que he hecho, y no los he desamparado.
  revised_footnotes:
