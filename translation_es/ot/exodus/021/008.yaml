translation:
  language: es
  text: Si no le agrada a los ojos de su amo[a], quien no la ha designado para sí, entonces permitirá que sea redimida. No tiene derecho a venderla a un pueblo extranjero[b], porque ha obrado con engaño contra ella.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «quien la ha designado/desposado para sí». La cláusula hebrea es difícil textual e interpretativamente.'
    reason: textual_variant
  - marker: b
    text: 'O: «puesto que ha obrado traidoramente contra ella».'
    reason: lexical_alternative
lexical_decisions:
- source_word: רָעָה בְּעֵינֵי
  english_pob_choice: is displeasing in the eyes of
  chosen_spanish: le parece malo a los ojos de
  alternatives_spanish:
  - no le agrada
  - es desagradable a los ojos de
  lexicon: HALOT
  rationale: La locución hebrea expresa desagrado o falta de aceptación, no necesariamente mal moral absoluto. Mantener «a los ojos de» conserva el giro idiomático hebreo con naturalidad en español.
- source_word: אֲדֹנֶיהָ
  english_pob_choice: her master
  chosen_spanish: su amo
  alternatives_spanish:
  - su señor
  - su dueño
  lexicon: HALOT
  rationale: En este contexto legal, el término apunta al varón con autoridad jurídica sobre ella. «Amo» refleja esa relación social y legal sin introducir la carga teológica de «Señor».
- source_word: יְעָדָהּ
  english_pob_choice: has designated her for himself
  chosen_spanish: la ha designado para sí
  alternatives_spanish:
  - la ha desposado para sí
  - la ha destinado para sí
  lexicon: HALOT
  rationale: «Designar» mantiene la amplitud léxica del verbo sin forzar un sentido más específico que el hebreo permite en este punto. «Para sí» preserva el matiz reflexivo del texto.
- source_word: וְהֶפְדָּהּ
  english_pob_choice: he shall let her be redeemed
  chosen_spanish: la dejará ser redimida
  alternatives_spanish:
  - permitirá que sea redimida
  - deberá dejar que la rediman
  lexicon: HALOT
  rationale: La forma causativa aquí comunica que el amo debe permitir la redención. «Dejará ser redimida» reproduce esa fuerza jurídica sin implicar necesariamente que él mismo pague el rescate.
- source_word: לְעַם נָכְרִי
  english_pob_choice: to a foreign people
  chosen_spanish: a un pueblo extranjero
  alternatives_spanish:
  - a una nación extranjera
  - a extranjeros
  lexicon: HALOT
  rationale: El hebreo tiene un valor colectivo; «pueblo extranjero» conserva mejor ese carácter que una referencia solo individual.
- source_word: לֹא יִמְשֹׁל לְמָכְרָהּ
  english_pob_choice: He has no right to sell her
  chosen_spanish: No tiene derecho a venderla
  alternatives_spanish:
  - No puede venderla
  - No ejercerá poder para venderla
  lexicon: HALOT
  rationale: El verbo expresa autoridad o poder legal. «No tiene derecho» comunica con claridad la fuerza jurídica del hebreo en español actual.
- source_word: בְּבִגְדוֹ בָהּ
  english_pob_choice: since he has dealt deceitfully with her
  chosen_spanish: porque ha obrado con engaño contra ella
  alternatives_spanish:
  - porque ha actuado con traición contra ella
  - porque le ha sido infiel
  lexicon: HALOT
  rationale: El verbo בגד denota actuar traicioneramente o con deslealtad. «Obrado con engaño» es una forma clara y sobria de expresar la culpa relacional y legal del pasaje.
theological_decisions:
- issue: Ambigüedad interpretativa de יְעָדָהּ
  english_pob_reading: who has not designated her for himself
  chosen_spanish_reading: quien no la ha designado para sí
  alternative_spanish_readings:
  - quien la ha designado para sí
  - quien no la ha desposado
  rationale: Se conserva en el texto principal la lectura que sigue al paquete fuente dado y al inglés POB, pero sin cerrar la dificultad textual e interpretativa. La nota permite la alternativa matrimonial, que encaja con el contexto legal, sin resolver artificialmente la tensión.
  doctrine_reference: 'Principio de la POB: preservar la tensión textual y teológica cuando el hebreo es difícil'
translation_notes:
  revision_awareness: El borrador sigue el pasaje hebreo WLC y el audit trail inglés sin cambios aplicados en la última revisión; conserva la ambigüedad de יְעָדָהּ y el matiz jurídico de la redención y la venta prohibida.
  spanish_consistency_notes:
  - Se usa «Yahvé» como convención general del proyecto, pero este versículo no contiene el nombre divino.
  - Se mantuvo «amo» en vez de «señor» para evitar ambigüedad con el título divino y por la relación jurídico-social del contexto.
  - «Redimida» conserva el campo léxico legal del rescate/liberación, coherente con la terminología del proyecto.
  - «Pueblo extranjero» refleja el colectivo נָכְרִי sin convertirlo en una referencia meramente individual.
