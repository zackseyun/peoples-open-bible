translation:
  language: es
  text: 'Entonces Dios dijo a Jacob[a]: «Levántate, sube a Betel y habita allí, y haz allí un altar al Dios que se te apareció cuando huías de la presencia de Esaú, tu hermano».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O más idiomáticamente: «cuando huías de Esaú, tu hermano». El hebreo dice literalmente: «de la presencia de Esaú, tu hermano».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמֶר
  english_pob_choice: Then ... said
  chosen_spanish: Entonces ... dijo
  alternatives_spanish:
  - Y ... dijo
  lexicon: HALOT
  rationale: El waw consecutivo avanza la narración; «Entonces» conserva la progresión temporal con un registro natural en español.
- source_word: אֱלֹהִים
  english_pob_choice: God
  chosen_spanish: Dios
  alternatives_spanish:
  - dioses
  lexicon: HALOT
  rationale: Aunque la forma es plural morfológica, el verbo singular y el contexto narrativo señalan al único Dios de Israel.
- source_word: קוּם
  english_pob_choice: Arise
  chosen_spanish: Levántate
  alternatives_spanish:
  - Ponte de pie
  - Alzate
  lexicon: HALOT
  rationale: El imperativo expresa ponerse en marcha; «Levántate» mantiene el tono imperativo elevado sin sonar forzado.
- source_word: עֲלֵה
  english_pob_choice: go up
  chosen_spanish: sube
  alternatives_spanish:
  - asciende
  lexicon: HALOT
  rationale: «Sube» reproduce el valor direccional/geográfico del verbo de modo natural en español.
- source_word: בֵּית אֵל
  english_pob_choice: Bethel
  chosen_spanish: Betel
  alternatives_spanish:
  - Casa de Dios
  lexicon: HALOT
  rationale: Se conserva el topónimo tradicional transliterado; traducirlo como «Casa de Dios» explicaría el nombre, pero no es la opción principal del POB.
- source_word: וְשֶׁב שָׁם
  english_pob_choice: and dwell there
  chosen_spanish: habita allí
  alternatives_spanish:
  - vive allí
  - permanece allí
  lexicon: HALOT
  rationale: ישב aquí implica residir; «habita» conserva la idea de permanencia ordenada y solemne.
- source_word: וַעֲשֵׂה שָׁם מִזְבֵּחַ
  english_pob_choice: and make there an altar
  chosen_spanish: haz allí un altar
  alternatives_spanish:
  - construye allí un altar
  - edifica allí un altar
  lexicon: HALOT
  rationale: עָשָׂה con altar puede sonar como «hacer» o «construir»; «haz» sigue más de cerca el hebreo y resulta idiomático.
- source_word: לָאֵל
  english_pob_choice: to the God
  chosen_spanish: al Dios
  alternatives_spanish:
  - para Dios
  - al dios
  lexicon: HALOT
  rationale: La preposición ל marca dedicación/dirección; «al Dios» refleja bien la construcción, unida al relativo siguiente.
- source_word: הַנִּרְאֶה אֵלֶיךָ
  english_pob_choice: who appeared to you
  chosen_spanish: que se te apareció
  alternatives_spanish:
  - que fue visto por ti
  - que se manifestó a ti
  lexicon: HALOT
  rationale: El participio niphal de ראה en contextos de teofanía se vierte naturalmente como «aparecerse».
- source_word: בְּבָרְחֲךָ
  english_pob_choice: when you fled
  chosen_spanish: cuando huías
  alternatives_spanish:
  - al huir
  - mientras huías
  lexicon: HALOT
  rationale: La construcción temporal expresa el contexto de la acción; «cuando huías» comunica de forma clara y fiel.
- source_word: מִפְּנֵי
  english_pob_choice: from the presence of
  chosen_spanish: de la presencia de
  alternatives_spanish:
  - de delante de
  - de la faz de
  lexicon: HALOT
  rationale: Se evita el calco rígido «de la cara de» y se conserva el sentido idiomático de presencia/superficie relacional.
- source_word: עֵשָׂו אָחִיךָ
  english_pob_choice: Esau your brother
  chosen_spanish: Esaú, tu hermano
  alternatives_spanish:
  - tu hermano Esaú
  lexicon: HALOT
  rationale: El orden hebreo puede mantenerse, pero en español la aposición con coma es clara y natural.
theological_decisions:
- issue: Referencia de אֱלֹהִים
  english_pob_reading: The one true God speaks to Jacob
  chosen_spanish_reading: Dios le habla a Jacob
  alternative_spanish_readings:
  - dioses le hablan a Jacob
  - un ser divino le habla a Jacob
  rationale: La forma verbal singular y el contexto narrativo obligan a entender al Dios único de Israel, no a «dioses» ni a un ser del consejo divino.
  doctrine_reference: Affirmations; Translation philosophy §1
- issue: Tratamiento de Betel
  english_pob_reading: Transliterate the place name as 'Bethel' rather than translate its meaning
  chosen_spanish_reading: Transliterar el nombre como Betel
  alternative_spanish_readings:
  - Casa de Dios
  rationale: Como topónimo establecido, se conserva la forma tradicional transliterada; la traducción explicativa no es necesaria en el texto base.
  doctrine_reference: Translation philosophy §2
- issue: Expresión de מִפְּנֵי
  english_pob_reading: from the presence of Esau your brother
  chosen_spanish_reading: de la presencia de Esaú, tu hermano
  alternative_spanish_readings:
  - de delante de Esaú, tu hermano
  - de la faz de Esaú, tu hermano
  rationale: Se preserva el valor idiomático de la expresión hebrea sin forzar un calco semánticamente extraño en español.
  doctrine_reference: Lexical transparency; idiom handling
- issue: Verbo de teofanía הַנִּרְאֶה
  english_pob_reading: who appeared to you
  chosen_spanish_reading: que se te apareció
  alternative_spanish_readings:
  - que fue visto por ti
  - que se manifestó a ti
  rationale: En contextos de aparición divina, «aparecerse» transmite el matiz teofánico de forma fiel y comprensible.
  doctrine_reference: Theophany terminology
translation_notes:
  revision_awareness: Se atendió la corrección del pasaje inglés auditado, que pasó de «from the face of» a «from the presence of» para reflejar mejor el hebreo מִפְּנֵי. En español se resolvió con «de la presencia de» en el texto principal y se dejó la alternativa idiomática en nota.
  spanish_consistency_notes:
  - Se mantiene «Dios» para אֱלֹהִים con verbo singular implícito en el contexto.
  - Se conserva «Betel» como topónimo transliterado, consistente con el estándar del proyecto.
  - Se usa «apareció»/«se apareció» para el participio niphal de ראה en contexto teofánico.
  - Se mantiene la relación familiar «tu hermano» como aposición final, con puntuación natural en español.
  - La nota [a] está anclada en «Jacob[a]» y no se crean notas sin ancla en el texto.
