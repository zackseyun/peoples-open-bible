    reason: cross_reference
  - marker: c
    text: O «holocaustos». El término griego puede designar ofrendas totalmente consumidas por el fuego.
    reason: lexical_alternative
  revision_rationale: Se ajusta el español para mayor naturalidad («se unieron a ellos», «de entre»), se corrige la localización para no rebajar el sentido del griego («en el altar, en su lugar» en vez de «junto al altar»), y se alinea el término divino con la preferencia del proyecto («Yahvé») en este contexto sacrificial israelita. Se mantienen las notas esenciales y el contenido del testimonio griego más pleno.
