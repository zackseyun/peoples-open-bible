translation:
  language: es
  text: ¿Respondería un hombre sabio con conocimiento vano[a], y llenaría su vientre con el viento del oriente?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Lit. «conocimiento del viento», es decir, conocimiento vacío o insustancial.
    reason: lexical_alternative
lexical_decisions:
- source_word: הֶחָכָם
  english_pob_choice: a wise man
  chosen_spanish: un hombre sabio
  alternatives_spanish:
  - el hombre sabio
  - una persona sabia
  lexicon: HALOT
  rationale: La pregunta retórica del hebreo usa el masculino singular con sentido genérico. En español, «un hombre sabio» conserva ese valor genérico y mantiene la referencia masculina gramatical sin volverlo un individuo concreto.
- source_word: יַעֲנֶה
  english_pob_choice: should ... answer
  chosen_spanish: ¿Respondería... ?
  alternatives_spanish:
  - ¿debería responder... ?
  - ¿responde... ?
  lexicon: HALOT
  rationale: El imperfecto en una pregunta retórica puede expresar lo que sería apropiado o esperable. «Respondería» reproduce bien ese matiz de reproche sin forzar una afirmación simple de presente.
- source_word: דַעַת רוּחַ
  english_pob_choice: windy knowledge
  chosen_spanish: con conocimiento de viento[a]
  alternatives_spanish:
  - con conocimiento ventoso
  - con conocimiento del viento
  - con conocimiento vacío
  lexicon: HALOT
  rationale: El hebreo dice literalmente «conocimiento de espíritu/viento». Aquí רוּחַ se entiende como «viento» por el contraste de insustancialidad en el contexto. En español, «conocimiento de viento» conserva la metáfora y la tensión semántica mejor que una abstracción como «vacío».
- source_word: וִימַלֵּא
  english_pob_choice: and fill
  chosen_spanish: y llenaría
  alternatives_spanish:
  - y llenara
  - y llenase
  - y colmaría
  lexicon: HALOT
  rationale: El verbo continúa la pregunta retórica. «Llenaría» mantiene el valor hipotético/retórico y el paralelismo con el hebreo.
- source_word: קָדִים
  english_pob_choice: the east wind
  chosen_spanish: el viento del oriente
  alternatives_spanish:
  - el viento de oriente
  - el viento oriental
  - el austro
  lexicon: HALOT
  rationale: En español, «viento del oriente» comunica de forma natural el idiomático קָדִים y preserva la imagen concreta del viento oriental asociado con dureza.
- source_word: בִּטְנוֹ
  english_pob_choice: his belly
  chosen_spanish: su vientre
  alternatives_spanish:
  - su barriga
  - su estómago
  - sus entrañas
  lexicon: HALOT
  rationale: «Vientre» es una equivalencia digna y directa para בֶּטֶן en este contexto corporal. Mantiene la imagen vívida de ser llenado por el viento, sin suavizarla excesivamente.
translation_notes:
  revision_awareness: 'La versión inglesa auditada mantiene la metáfora de «windy knowledge» y la pregunta retórica con «should». Esta propuesta española conserva ambas decisiones: el tono de reprensión y la imagen de insustancialidad, evitando una paráfrasis explicativa en el texto principal.'
  spanish_consistency_notes:
  - Se mantiene «viento» para רוּחַ en la expresión metafórica, pero se traduce «Espíritu» o «espíritu» según el contexto en otras secciones del proyecto.
  - «Viento del oriente» es preferido frente a una fórmula más interpretativa porque aquí el hebreo aporta una imagen concreta y no solo una cualidad abstracta.
  - La puntuación interrogativa se ajusta al español para reflejar correctamente la retórica del hebreo.
