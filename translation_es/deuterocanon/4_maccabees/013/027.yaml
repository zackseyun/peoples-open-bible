revisions:
- from: Pero igualmente[a], aunque la naturaleza y la costumbre y los rasgos de la virtud estaban uniendo para ellos los lazos de la fraternidad, los que habían quedado[b] resistieron, por la piedad, al ver a sus hermanos, que estaban siendo dignos de compasión, torturados hasta la muerte.
  to: Pero igualmente, aunque la naturaleza y la costumbre y los rasgos de la virtud estaban estrechando para ellos los lazos de la fraternidad[a], los que habían quedado[b] soportaron, por la piedad, al ver a sus hermanos, compadecidos, torturados hasta la muerte.
  rationale: Se corrigió el anclaje de la nota [a] para que corresponda a «los lazos de la fraternidad». Se ajustó «resistieron» a «soportaron» para reflejar mejor ἀνέσχοντο en un contexto de aguante martirial. Se sustituyó la construcción poco natural «que estaban siendo dignos de compasión» por «compadecidos», que conserva mejor el valor pasivo de κατοικτιζομένους. También se suavizó «estaban uniendo para ellos» a «estaban estrechando para ellos» para un español más natural y fiel al sentido de vínculos fraternos intensificados.
