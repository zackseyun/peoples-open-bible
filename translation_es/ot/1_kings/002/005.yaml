  rationale: La revisión corrige la ubicación de las notas al pie para que coincidan con las frases que explican y mejora levemente la naturalidad de la cláusula del cinturón sin apartarse del hebreo ni del POB inglés. Se conserva la rareza deliberada de 'puso la sangre de guerra en paz' y la repetición de 'puso' como decisión lexical auditada.
