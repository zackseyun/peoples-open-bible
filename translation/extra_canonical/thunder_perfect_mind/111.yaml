translation:
  text: 'to him who created me[a].

    I am the one who will cry out his name.

    Look then at his words,

    and all the writings that have been completed.

    Listen therefore, you hearers,

    and you yourselves also[c][b], the angels'
  philosophy: optimal-equivalence
  footnotes:
