lexical_decisions:
- source_word: ἐτηρείδετο
  english_pob_choice: was kept under watch
  chosen_spanish: la mantenían bajo vigilancia
  alternatives_spanish:
  - la guardaban
  - la vigilaban
  - la mantenían
  lexicon: τηρέω
  rationale: El imperfecto pasivo expresa una acción continua de custodia o vigilancia. «Bajo vigilancia» conserva el matiz de control sin decidir si es protectivo o restrictivo; «mantenían» refleja el trasfondo pasivo de la forma griega en una construcción natural para el español.
- source_word: τρυφερευομένη
  english_pob_choice: being pampered
  chosen_spanish: como a una que estaba siendo mimada
  alternatives_spanish:
  - como a una tratada con lujo
  - como a una criada delicadamente
  - como a una que vivía con lujo
  lexicon: τρυφερεύομαι
  rationale: El participio describe ser tratada con suavidad o lujo. «Mimada» comunica bien la idea de trato indulgente en español moderno, sin perder la pasividad del participio; la comparación con «como a una» conserva el valor de ὡς.
- source_word: καὶ τῇ μὲν μιᾷ ... ἡ δὲ
  english_pob_choice: and one ... but the other—
  chosen_spanish: y a una ... pero la otra—
  alternatives_spanish:
  - y una ... pero la otra—
  - y a la una ... pero la otra—
  lexicon: correlative construction
  rationale: La construcción correlativa presenta contraste entre dos sujetos o grupos. El español necesita completar la relación con «a una» para sonar natural, pero se conserva el quiebre final con raya porque el griego transmitido termina de manera incompleta en este punto.
