  - all fears
  lexicon: Crum (ϣⲟϫⲛⲉ ‘to fear; be afraid’); Layton (relative present ⲛⲉⲧⲛ- + stative)
  rationale: 'ⲛⲉⲧⲛ- marks the relative present (‘those who are …’). While some render
    the abstract ‘fears,’ the morphology points to persons: ‘those who are afraid.’'
- source_word: ϯⲛⲁⲕⲣⲣⲱ
  chosen: is found
