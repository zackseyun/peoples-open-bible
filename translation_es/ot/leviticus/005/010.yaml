translation:
  language: es
  text: Y ofrecerá el segundo como holocausto, según el procedimiento prescrito[a], y el sacerdote hará expiación por él por el pecado que ha cometido, y se le perdonará[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «conforme a lo prescrito».'
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: «y le será perdonado», una fórmula pasiva que deja implícito al agente divino que perdona.'
    reason: lexical_alternative
lexical_decisions:
- source_word: הַשֵּׁנִי
  english_pob_choice: the second
  chosen_spanish: el segundo
  alternatives_spanish:
  - el otro
  lexicon: HALOT
  rationale: Es un ordinal que retoma el segundo animal del contexto inmediato; «el segundo» conserva la referencia precisa y natural en español.
- source_word: יַעֲשֶׂה
  english_pob_choice: shall offer
  chosen_spanish: ofrecerá
  alternatives_spanish:
  - hará
  - presentará
  lexicon: HALOT
  rationale: En el contexto sacrificial, el verbo amplio עשה se entiende ritualmente como la acción de presentar/ofrecer la víctima. «Ofrecerá» comunica bien esa acción sin forzar más de lo que dice el hebreo.
- source_word: עֹלָה
  english_pob_choice: burnt offering
  chosen_spanish: holocausto
  alternatives_spanish:
  - ofrenda quemada
  - ofrenda ascendente
  lexicon: HALOT
  rationale: «Holocausto» es el término español tradicional y claro para la ofrenda totalmente consumida por fuego; mantiene la categoría cultual del hebreo עֹלָה.
- source_word: כַּמִּשְׁפָּט
  english_pob_choice: according to the ordinance
  chosen_spanish: conforme al orden prescrito
  alternatives_spanish:
  - según el ordenamiento
  - conforme al reglamento
  - según lo prescrito
  lexicon: HALOT
  rationale: מִשְׁפָּט aquí apunta a la norma/procedimiento establecido del rito. «Orden prescrito» conserva la idea de procedimiento autorizado y evita una lectura demasiado general de «ley».
- source_word: וְכִפֶּר עָלָיו
  english_pob_choice: shall make atonement for him
  chosen_spanish: hará expiación por él
  alternatives_spanish:
  - hará expiación en favor de él
  - hará expiación por él mismo
  lexicon: HALOT
  rationale: «Expiación» preserva el lenguaje sacrificial sacerdotal de כפר. Se evita sustituirlo por términos más doctrinalizados o por una paráfrasis que diluya su peso técnico.
- source_word: מֵחַטָּאתוֹ אֲשֶׁר חָטָא
  english_pob_choice: for the sin that he has committed
  chosen_spanish: por el pecado que ha cometido
  alternatives_spanish:
  - por el pecado que cometió
  - a causa del pecado que ha cometido
  lexicon: HALOT
  rationale: El hebreo nombra el pecado como el motivo de la expiación. «Pecado» refleja bien חטאת en este contexto; «ha cometido» mantiene el aspecto de acción consumada sin sonar arcaico.
- source_word: וְנִסְלַח לוֹ
  english_pob_choice: and he shall be forgiven
  chosen_spanish: y le será perdonado
  alternatives_spanish:
  - y será perdonado
  - y se le perdonará
  lexicon: HALOT
  rationale: La pasiva impersonal del hebreo deja implícito al agente perdonador. «Le será perdonado» conserva esa reserva y suena natural en español.
theological_decisions:
- issue: Lenguaje sacerdotal de expiación sin explicitar el agente divino
  english_pob_reading: make atonement for him
  chosen_spanish_reading: hará expiación por él
  alternative_spanish_readings:
  - purificará por él
  - obtendrá perdón para él
  rationale: El texto usa la terminología ritual de כפר; traducirla con «expiación» mantiene la categoría cultual y evita reducirla a una sola explicación teológica posterior. La voz pasiva del perdón queda también respetada al final.
  doctrine_reference: Translation philosophy §3, §6
- issue: Fórmula pasiva de perdón en Levítico
  english_pob_reading: he shall be forgiven
  chosen_spanish_reading: le será perdonado
  alternative_spanish_readings:
  - será perdonado
  - se le perdonará
  rationale: El hebreo presenta una fórmula pasiva que no nombra explícitamente a Dios como sujeto. La traducción conserva esa forma reverente y abierta, sin volver explícito al agente en el texto principal.
  doctrine_reference: Translation philosophy §3
translation_notes:
  revision_awareness: 'La versión inglesa auditada pasó de «prepare» a «offer» por mayor precisión cultual, y de «committed» a «has committed» por naturalidad aspectual. La presente redacción española sigue esa misma decisión: usa un verbo sacrificial directo («ofrecerá») y un pasado perfecto compuesto natural («ha cometido»), manteniendo la estructura del hebreo y la reserva de la fórmula final pasiva.'
  spanish_consistency_notes:
  - Se mantiene el término técnico «expiación» para כפר, coherente con el registro sacerdotal del pasaje.
  - Se eligió «holocausto» como equivalente estable de עֹלָה, en lugar de una paráfrasis explicativa.
  - La pasiva final «le será perdonado» conserva la impersonalidad del hebreo y evita nombrar explícitamente al perdonador en el texto principal.
  - «Conforme al orden prescrito» reproduce el matiz normativo de כַּמִּשְׁפָּט sin volverlo demasiado jurídico en español.
