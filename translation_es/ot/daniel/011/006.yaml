base_translation:
  language: en
  yaml_path: translation/ot/daniel/011/006.yaml
  text: At the end of years they will join together[a], and the daughter of the king of the South will come to the king of the North to make an agreement. But she will not retain the strength of her arm, and he and his arm will not stand; and she will be given up, along with those who brought her, and the one who fathered her[b], and the one who supported her in those times.
  footnotes:
  - marker: a
    text: Or 'to make equitable terms' or 'to bring about an upright settlement.' The Hebrew literally speaks of 'making uprightnesses/equities.'
    reason: lexical_alternative
  - marker: b
    text: '''The one who fathered her'' follows the masculine form of the Hebrew participle. Some translations render this as ''child'' or understand a different referent.'
    reason: lexical_alternative
