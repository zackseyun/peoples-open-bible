translation:
  language: es
  text: Me apresuraría hacia un refugio para mí mismo[a], del viento impetuoso, de la tormenta.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Refugio» sigue de cerca el sentido de מִפְלָט. También puede entenderse como «escape» o «lugar de escape». La expresión inicial también puede traducirse «me daría prisa» o «que yo me apresure», ya que el hebreo expresa resolución o deseo urgente.
    reason: lexical_alternative
lexical_decisions:
- source_word: אָחִישָׁה
  english_pob_choice: I would hasten
  chosen_spanish: Me apresuraría
  alternatives_spanish:
  - me apresuraría
  - apresuraría mi huida
  - me daría prisa
  lexicon: HALOT
  rationale: La forma verbal expresa urgencia con matiz volitivo o deseoso. «Me apresuraría» conserva esa resolución personal sin convertirla en una afirmación meramente futura ni añadir información no explícita.
- source_word: מִפְלָט
  english_pob_choice: a refuge
  chosen_spanish: un refugio
  alternatives_spanish:
  - un escape
  - un lugar de escape
  - amparo
  lexicon: HALOT
  rationale: El sustantivo denota un lugar o medio de escape. «Refugio» es natural en español bíblico y conserva la idea de resguardo/escape sin perder claridad.
- source_word: לִי
  english_pob_choice: for myself
  chosen_spanish: para mí
  alternatives_spanish:
  - por mí
  - para mí mismo
  lexicon: HALOT
  rationale: El sufijo de primera persona marca beneficio o interés personal. «Para mí» es la forma natural en español; el matiz reflexivo queda suficientemente sugerido por el contexto y por el movimiento hacia el refugio.
- source_word: מֵרוּחַ
  english_pob_choice: from the rushing wind
  chosen_spanish: lejos del viento impetuoso
  alternatives_spanish:
  - del viento arremolinado
  - del viento que arremete
  - del viento
  lexicon: HALOT
  rationale: רוח aquí es meteorológico, no «espíritu», por el paralelismo con «tormenta». «Lejos de» expresa con naturalidad la idea de apartarse de la amenaza que introduce el prefijo מִן en este contexto poético, y «impetuoso» comunica el dinamismo de סֹעָה sin redundar con «tormenta».
- source_word: סֹעָה
  english_pob_choice: rushing
  chosen_spanish: impetuoso
  alternatives_spanish:
  - furioso
  - arremolinado
  - tempestuoso
  lexicon: HALOT
  rationale: El participio describe movimiento violento o arremetida del viento. «Impetuoso» es idiomático en español y preserva la energía y violencia del cuadro poético.
- source_word: מִסָּעַר
  english_pob_choice: from the storm
  chosen_spanish: de la tormenta
  alternatives_spanish:
  - del vendaval
  - de la tempestad
  - del huracán
  lexicon: HALOT
  rationale: סַעַר nombra tormenta/tempestad. «Tormenta» es la equivalencia más clara y ampliamente inteligible en español moderno.
translation_notes:
  revision_awareness: 'El inglés POB pasó de «to find a refuge» a «to a refuge» para evitar añadir la idea de «encontrar». En español se evitó igualmente ese añadido; se mantuvo el movimiento directo hacia el refugio. También se respetó la paralelismo hebreo repitiendo la idea preposicional con dos complementos: «lejos del viento impetuoso, lejos de la tormenta».'
  spanish_consistency_notes:
  - Se evitó «SEÑOR» o cualquier sustitución reverencial, porque no aparece el nombre divino en este versículo.
  - Se eligió «viento» y no «espíritu», dado el contexto meteorológico inmediato.
  - Se prefirió «tormenta» como equivalente básico de סַעַר, manteniendo un registro bíblico claro y moderno.
