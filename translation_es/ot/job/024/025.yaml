translation:
  language: es
  text: Y si no es así[a], entonces ¿quién podrá demostrar que miento y podrá dejar mi palabra en nada?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «si no, entonces, ¿quién podrá refutarme y dejar mi palabra en nada?»
    reason: lexical_alternative
lexical_decisions:
- source_word: וְאִם לֹא
  english_pob_choice: And if it is not so
  chosen_spanish: Y si no es así
  alternatives_spanish:
  - Si no
  - Y si no
  lexicon: HALOT
  rationale: La construcción introduce una condición de desafío. Añadir «es así» da fluidez natural en español sin perder la referencia al estado de cosas discutido.
- source_word: אֵפוֹ
  english_pob_choice: then
  chosen_spanish: entonces
  alternatives_spanish:
  - ahora
  - ciertamente
  lexicon: HALOT
  rationale: La partícula añade fuerza inferencial al reto retórico; «entonces» reproduce bien el paso lógico del hebreo y el inglés POB.
- source_word: מִי
  english_pob_choice: who
  chosen_spanish: ¿quién
  alternatives_spanish:
  - ¿quién es el que
  lexicon: HALOT
  rationale: Interrogativo directo y natural en español para conservar el tono retórico.
- source_word: יַכְזִיבֵנִי
  english_pob_choice: can prove me a liar
  chosen_spanish: podrá demostrar que miento
  alternatives_spanish:
  - podrá refutarme
  - podrá mostrarme falso
  - podrá probarme mentiroso
  lexicon: HALOT
  rationale: El verbo hifil de כזב implica hacer resultar falso o mentiroso. En español, «demostrar que miento» comunica la carga forense y la acusación sin sonar artificial; mantiene la tensión entre refutación y falsedad personal.
- source_word: וְיָשֵׂם
  english_pob_choice: and make
  chosen_spanish: y reducir
  alternatives_spanish:
  - y poner
  - y hacer
  lexicon: HALOT
  rationale: El verbo «poner/poner en» funciona idiomáticamente con la frase final, pero en español «reducir ... a nada» expresa mejor el efecto de nulificar lo dicho, equivalente al inglés auditado.
- source_word: לְאַל
  english_pob_choice: into nothing
  chosen_spanish: a nada
  alternatives_spanish:
  - en nada
  - hasta nada
  lexicon: HALOT
  rationale: La expresión hebrea denota anulación o vaciamiento. «A nada» es una forma natural y compacta en español para conservar ese resultado.
- source_word: מִלָּתִי
  english_pob_choice: my word
  chosen_spanish: mi palabra
  alternatives_spanish:
  - mi dicho
  - mi declaración
  - mi discurso
  lexicon: HALOT
  rationale: «מִלָּה» es «palabra/expresión». En español, «mi palabra» conserva la concisión y la fuerza retórica de la autoafirmación de Job; «mi discurso» sería más amplio de lo que permite el singular hebreo.
translation_notes:
  revision_awareness: Se ha seguido de cerca el sentido del hebreo y el juicio ya auditado del inglés POB, manteniendo el paralelismo retórico y la ambigüedad entre refutación forense y anulación de la palabra. No se detectaron revisiones pendientes en el paquete inglés.
  spanish_consistency_notes:
  - Se evitó «Señor»/«Cristo»/terminología no pertinente; el versículo no contiene vocabulario teológico de ese tipo.
  - «palabra» se usa para מִלָּתִי conforme al valor singular del hebreo.
  - La nota alternativa preserva la tensión lexical entre «demostrar que miento» y «refutarme», como en el audit trail inglés.
