translation:
  language: es
  text: para Esdras[a], Meshullam; para Amarías, Jehohanan[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «de Esdras». El hebreo con ל puede expresarse más literalmente así, pero en esta lista probablemente señala al representante correspondiente de la casa sacerdotal.'
