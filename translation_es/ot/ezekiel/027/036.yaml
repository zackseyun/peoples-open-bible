translation:
  language: es
  text: Los mercaderes entre los pueblos silban contra ti[a]; te has vuelto un espanto[b], y no serás más para siempre.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «chiflan contra ti» o «sisean contra ti». El verbo hebreo puede indicar silbidos o siseos; aquí comunica una reacción de burla, asombro o desprecio.
    reason: lexical_alternative
  - marker: b
    text: O «te has vuelto espantos» / «un objeto de terror». El sustantivo hebreo está en plural, pero puede funcionar de manera colectiva.
    reason: lexical_alternative
lexical_decisions:
- source_word: סֹחֲרִים
  english_pob_choice: Merchants
  chosen_spanish: mercaderes
  alternatives_spanish:
  - comerciantes
  - traficantes
  lexicon: HALOT
  rationale: El participio designa personas dedicadas al comercio. En español, "mercaderes" conserva el matiz comercial y suena natural en un lamento profético sobre Tiro; "comerciantes" sería válido, pero algo más general.
- source_word: בָּעַמִּים
  english_pob_choice: among the peoples
  chosen_spanish: entre los pueblos
  alternatives_spanish:
  - entre las naciones
  - entre los pueblos y las naciones
  lexicon: HALOT
  rationale: עַמִּים es plural y alude a distintos pueblos en sentido internacional. "Entre los pueblos" preserva esa amplitud sin imponer una lectura político-estatal más específica.
- source_word: שָׁרְקוּ
  english_pob_choice: hiss
  chosen_spanish: silban
  alternatives_spanish:
  - silban con desprecio
  - silban contra ti
  - chiflan
  lexicon: HALOT
  rationale: El verbo puede significar silbar o sisear. En este contexto profético expresa burla o asombro despectivo; "silban" mantiene la ambigüedad básica del hebreo y la nota explica la opción semántica.
- source_word: עָלָיִךְ
  english_pob_choice: at you
  chosen_spanish: contra ti
  alternatives_spanish:
  - hacia ti
  - sobre ti
  lexicon: HALOT
  rationale: Con שׁרק, עַל marca el blanco de la reacción. En español, "contra ti" transmite mejor el tono hostil/derisorio que un simple "a ti".
- source_word: בַּלָּהוֹת
  english_pob_choice: a horror
  chosen_spanish: un espanto
  alternatives_spanish:
  - un horror
  - unos espantos
  - un objeto de terror
  lexicon: HALOT
  rationale: El plural hebreo puede funcionar colectivamente. "Un espanto" suena natural en español y conserva el sentido de algo que produce temor y horror; la nota permite la alternativa plural del hebreo.
- source_word: הָיִית
  english_pob_choice: you have become
  chosen_spanish: te has vuelto
  alternatives_spanish:
  - has llegado a ser
  - te hiciste
  lexicon: HALOT
  rationale: El qatal describe el estado resultante tras el juicio. "Te has vuelto" comunica bien el cambio de estado sin forzar un pretérito meramente narrativo.
- source_word: וְאֵינֵךְ
  english_pob_choice: you will be no more
  chosen_spanish: dejarás de existir
  alternatives_spanish:
  - ya no serás
  - no existirás más
  lexicon: HALOT
  rationale: La negación existencial seguida de עַד עוֹלָם expresa desaparición irreversible. "Dejarás de existir" conserva la fuerza del desenlace profético en un español claro y digno.
- source_word: עַד עוֹלָם
  english_pob_choice: forever
  chosen_spanish: para siempre
  alternatives_spanish:
  - por siempre
  - para toda la eternidad
  lexicon: HALOT
  rationale: El modismo expresa perpetuidad. "Para siempre" es la equivalencia más natural y transparente en español.
theological_decisions:
- issue: Fuerza del final profético de destrucción permanente
  english_pob_reading: Permanent obliteration is expressed as 'you will be no more forever.'
  chosen_spanish_reading: La desaparición irreversible se expresa como "dejarás de existir para siempre".
  alternative_spanish_readings:
  - ya no serás para siempre
  - no existirás más para siempre
  rationale: El hebreo no añade una afirmación metafísica, sino el cierre total del oráculo de juicio. La formulación española conserva esa severidad sin sobreinterpretar el alcance ontológico.
  doctrine_reference: Translation philosophy §1, §3, §6
translation_notes:
  revision_awareness: El inglés POB reciente mantiene la lectura óptima sin cambios, con alta concordancia entre revisores; no se requieren revisiones adicionales para esta muestra.
  spanish_consistency_notes:
  - Se siguió el uso POB de "Yahvé" solo cuando el texto fuente lo exija explícitamente; este versículo no contiene el tetragrámaton.
  - Se prefirió "mercaderes" para conservar el registro comercial del hebreo סֹחֲרִים y la cadencia profética del pasaje.
  - La nota sobre שָׁרְקוּ preserva la tensión entre silbar y sisear, sin cerrarla artificialmente en una sola imagen.
  - Se mantuvo la fuerza del cierre temporal con "para siempre" para reflejar עַד עוֹלָם sin añadir matices doctrinales ajenos al oráculo.
