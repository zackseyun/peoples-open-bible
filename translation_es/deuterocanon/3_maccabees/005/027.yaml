translation:
  language: es
  text: Pero cuando lo recibió y quedó atónito ante el desenlace ilegal[a], dominado en todo por la ignorancia, seguía preguntando si lo decretado se había llevado a cabo para él con urgencia.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: La expresión griega puede entenderse literalmente como «salida», pero en este contexto también puede referirse al «desenlace», «resultado» o «resultado ilegal» de los hechos. Se traduce «desenlace ilegal» para conservar el sentido narrativo en español claro.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀποδεξαμένου
  english_pob_choice: received it
  chosen_spanish: lo recibió
  alternatives_spanish:
  - lo aceptó
  - lo acogió
  lexicon: LSJ
  rationale: El participio aoristo medio de ἀποδέχομαι aquí se ajusta mejor a una recepción de la noticia o del informe que a una aprobación formal. «Lo recibió» conserva la inmediatez narrativa y evita añadir la idea de consentimiento que no exige el griego.
- source_word: καταπλαγέντος
  english_pob_choice: was struck with astonishment
  chosen_spanish: quedó atónito
  alternatives_spanish:
  - quedó asombrado
  - quedó pasmado
  lexicon: LSJ
  rationale: El verbo expresa quedar sobrecogido por sorpresa o estupor. «Quedó atónito» transmite bien ese impacto pasivo en español contemporáneo, con dignidad literaria y sin debilitar el tono.
- source_word: ἀνόμῳ ἐξόδῳ
  english_pob_choice: lawless departure
  chosen_spanish: salida ilegal
  alternatives_spanish:
  - salida sin ley
  - resultado ilegal
  - desenlace ilegal
  lexicon: LSJ
  rationale: La combinación admite un matiz de «salida» literal, aunque en el contexto puede sonar a desenlace. La POB inglesa conservó «departure» en la revisión más literal; en español «salida ilegal» mantiene esa literalidad básica sin oscurecer el sentido y sin forzar un giro idiomático extrañamente abstracto.
- source_word: κατὰ πάντα
  english_pob_choice: in every way
  chosen_spanish: en todo
  alternatives_spanish:
  - en todos los aspectos
  - completamente
  lexicon: LSJ
  rationale: La frase distributiva pide una equivalencia amplia. «En todo» es natural en español y conserva la totalidad del alcance sin sobrecargar el estilo.
- source_word: ἀγνωσίᾳ κεκρατημένος
  english_pob_choice: overcome by ignorance
  chosen_spanish: dominado en todo por la ignorancia
  alternatives_spanish:
  - aferrado por la ignorancia
  - vencido por la ignorancia
  - presa de la ignorancia
  lexicon: LSJ
  rationale: El perfecto pasivo de κρατέω con dativo indica ser controlado o dominado por ignorancia/falta de conocimiento. «Dominado en todo por la ignorancia» refleja el valor intensivo de κατὰ πάντα y mantiene la tensión de un estado de desconcierto real, no solo una simple falta de datos.
- source_word: ἐπυνθάνετο
  english_pob_choice: he kept asking
  chosen_spanish: seguía preguntando
  alternatives_spanish:
  - iba preguntando
  - continuaba preguntando
  - preguntaba insistentemente
  lexicon: LSJ
  rationale: El imperfecto medio sugiere acción repetida o sostenida. «Seguía preguntando» reproduce bien esa iteración en español sin añadir una intensidad no explicitada por el texto.
- source_word: τὸ διαγραμμένον
  english_pob_choice: what had been decreed
  chosen_spanish: lo decretado
  alternatives_spanish:
  - lo escrito
  - la orden emitida
  - lo prescrito
  lexicon: LSJ
  rationale: El participio perfecto neutro de διαγράφω puede referir a algo puesto por escrito, especialmente un decreto. En un marco administrativo, «lo decretado» conserva la fuerza normativa y evita introducir de manera demasiado específica la imagen de una sola «orden».
- source_word: ἔτι
  english_pob_choice: indeed
  chosen_spanish: se
  alternatives_spanish:
  - todavía
  - aún
  - en efecto
  lexicon: LSJ
  rationale: Aquí el valor no es principalmente temporal sino enfático dentro de la pregunta indirecta. En español, ese matiz se expresa de forma más natural integrándolo en la cláusula como «se había llevado a cabo», sin una partícula explícita que sonaría forzada.
- source_word: μετὰ σπουδῆς
  english_pob_choice: with urgency
  chosen_spanish: con urgencia
  alternatives_spanish:
  - con prisa
  - con diligencia
  - con premura
  lexicon: LSJ
  rationale: σπουδή puede significar prisa, diligencia o empeño. «Con urgencia» capta bien la rapidez en la ejecución del decreto y su carácter apremiante en español actual.
- source_word: τετέλεσται
  english_pob_choice: had indeed been carried out
  chosen_spanish: se había llevado a cabo
  alternatives_spanish:
  - se había ejecutado
  - se había cumplido
  - se había realizado
  lexicon: LSJ
  rationale: El perfecto pasivo de τελέω expresa llevar a término o ejecutar. «Se había llevado a cabo» es fiel y evita el posible equívoco de «ejecutado» como pena capital.
translation_notes:
  revision_awareness: He tenido en cuenta la revisión más literal del inglés POB, que cambió 'outcome' por 'departure' para reflejar ἐξόδῳ con mayor proximidad semántica. Por eso la versión española conserva 'salida' y no la sustituye por un equivalente más interpretativo como 'desenlace', aunque este último sería natural en contexto.
  spanish_consistency_notes:
  - Se mantiene «lo decretado» para preservar el tono administrativo del griego y del audit trail inglés.
  - No se usa «SEÑOR» ni lenguaje de nombre divino, porque este versículo no lo contiene.
  - Se evita «Cristo/Mesías» porque no aparecen en el texto.
  - La puntuación busca reflejar la larga sintaxis del original sin volverla opaca en español.
