  spanish_quality_summary: 'El español es claro y de buen registro, pero hay un pequeño problema de puntuación y naturalidad en la ubicación de la nota [a]: tal como está, parece anclar solo «él» más que toda la acción «combatir junto a él». Además, «para que combatieran» funciona, pero «para combatir junto a él» es más directo y más cercano al infinitivo griego. Las notas están bien orientadas, aunque conviene quitar las comillas superfluas iniciales para un estilo más limpio.'
  glossary_alignment: No hay conflictos con la terminología base del proyecto. «Escogidos» para ἐκλεκτούς, «plata» y «oro» para ἀργύριον/χρυσίον, y «pertrechos» para σκεύη ἱκανά son opciones defendibles y fieles. «Pertrechos» es un poco más específico que el término griego amplio, pero la nota [b] preserva la alternativa «suministros».
  issues:
