translation:
  language: es
  text: Pero Trifón subió a una nave y huyó a Ortosia.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: Τρύφων
  english_pob_choice: Tryphon
  chosen_spanish: Trifón
  alternatives_spanish:
  - Tryfón
  lexicon: convención onomástica griega
  rationale: Se translitera el nombre propio al español con grafía natural y reconocible. «Trifón» conserva la forma histórica del nombre sin cargarlo innecesariamente con la ortografía inglesa.
- source_word: δὲ
  english_pob_choice: But
  chosen_spanish: Pero
  alternatives_spanish:
  - Y
  - Ahora bien
  lexicon: LSJ
  rationale: La partícula δέ introduce una transición narrativa con matiz leve de contraste. «Pero» reproduce mejor ese giro que un simple «Y».
- source_word: ἐμβὰς
  english_pob_choice: boarded
  chosen_spanish: subió a
  alternatives_spanish:
  - embar c ó
  - habiendo subido a
  lexicon: LSJ
  rationale: El participio aoristo de ἐμβαίνω con εἰς πλοῖον expresa la acción concreta de subir a bordo. En español, «subió a» es natural y comunica la misma acción sin forzar una perífrasis más pesada.
- source_word: εἰς πλοῖον
  english_pob_choice: a ship
  chosen_spanish: una nave
  alternatives_spanish:
  - un barco
  - un navío
  lexicon: LSJ
  rationale: «Πλοῖον» designa una embarcación; «nave» es una opción digna y amplia en español, apta para un contexto antiguo. «Barco» sería más coloquial y «navío» más marcado por tamaño militar o literario.
- source_word: ἔφυγεν
  english_pob_choice: fled
  chosen_spanish: huyó
  alternatives_spanish:
  - escapó
  - se fugó
  lexicon: LSJ
  rationale: «Huyó» preserva el sentido de salida apresurada y de retirada ante peligro. «Escapó» enfatiza el resultado más que el movimiento, y «se fugó» suena menos neutro.
- source_word: εἰς Ὀρθωσίαν
  english_pob_choice: to Orthosia
  chosen_spanish: a Ortosia
  alternatives_spanish:
  - hacia Ortosia
  - a Orthosia
  lexicon: topónimo transliterado
  rationale: El nombre geográfico se adapta a la grafía española «Ortosia». La preposición «a» expresa bien el movimiento hacia el destino, como en el griego con εἰς.
