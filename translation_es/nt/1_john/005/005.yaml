translation:
  language: es
  text: ¿Y quién es el que vence al mundo, sino el que cree que Jesús es el Hijo de Dios?[a]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, más literalmente: «el que vence ... el que cree». El griego usa participios masculinos singulares con fuerza representativa.'
    reason: lexical_alternative
lexical_decisions:
- source_word: τίς
  english_pob_choice: who
  chosen_spanish: ¿Y quién
  alternatives_spanish:
  - ¿Quién
  - ¿Y quién es
  lexicon: BDAG
  rationale: Interrogativo retórico. «¿Y quién» conserva la conexión discursiva de δέ y suena natural en español.
- source_word: δέ
  english_pob_choice: And
  chosen_spanish: Y
  alternatives_spanish:
  - Pero
  - Ahora
  lexicon: BDAG
  rationale: Aquí δέ enlaza suavemente con el contexto previo; «Y» reproduce la continuidad sin introducir contraste fuerte.
- source_word: ὁ νικῶν
  english_pob_choice: the one who overcomes
  chosen_spanish: el que vence
  alternatives_spanish:
  - el que sobrevence
  - el vencedor
  lexicon: BDAG
  rationale: El participio sustantivado expresa una acción/característica continua. «El que vence» es natural en español y conserva el sentido verbal mejor que un sustantivo estático.
- source_word: κόσμον
  english_pob_choice: the world
  chosen_spanish: al mundo
  alternatives_spanish:
  - el mundo
  - al sistema del mundo
  lexicon: BDAG
  rationale: Se mantiene «mundo» sin ampliar a «sistema del mundo», pues el texto griego dice simplemente κόσμον. El objeto directo en español pide la preposición «a» ante persona/entidad animada en este uso figurado.
- source_word: εἰ μὴ
  english_pob_choice: except
  chosen_spanish: sino
  alternatives_spanish:
  - excepto
  - salvo
  lexicon: BDAG
  rationale: En esta construcción retórica, «sino» expresa la exclusión con fluidez natural en español y conserva la estructura de oposición exclusiva.
- source_word: ὁ πιστεύων
  english_pob_choice: the one who believes
  chosen_spanish: el que cree
  alternatives_spanish:
  - el que confía
  - el creyente
  lexicon: BDAG
  rationale: El participio sustantivado se vierte con una forma verbal que preserve el acto continuo de creer. «Cree» es más directo que el nominal «creyente».
- source_word: ὅτι
  english_pob_choice: that
  chosen_spanish: que
  alternatives_spanish:
  - porque
  lexicon: BDAG
  rationale: Introduce el contenido de la creencia, no una causa. «Que» es la equivalencia directa y más clara en español.
- source_word: Ἰησοῦς
  english_pob_choice: Jesus
  chosen_spanish: Jesús
  alternatives_spanish:
  - Jesucristo
  lexicon: BDAG
  rationale: Nombre propio transliterado de forma estándar al español.
- source_word: ὁ υἱὸς τοῦ θεοῦ
  english_pob_choice: the Son of God
  chosen_spanish: el Hijo de Dios
  alternatives_spanish:
  - Hijo de Dios
  - el Hijo de Dios
  lexicon: BDAG
  rationale: Se conserva el título cristológico con artículo, manteniendo su peso confesional y la formulación directa del griego.
theological_decisions:
- issue: Participios sustantivados masculinos singulares con fuerza representativa
  english_pob_reading: the one who overcomes / the one who believes
  chosen_spanish_reading: el que vence / el que cree
  alternative_spanish_readings:
  - quien vence / quien cree
  - el vencedor / el creyente
  rationale: El griego usa participios masculinos singulares con valor genérico o representativo. En español, «el que...» conserva ese valor sin forzar un masculino exclusivamente masculino ni perder el matiz verbal progresivo.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4
- issue: Confesión cristológica en 'ὁ υἱὸς τοῦ θεοῦ'
  english_pob_reading: the Son of God
  chosen_spanish_reading: el Hijo de Dios
  alternative_spanish_readings:
  - Hijo de Dios
  - el Hijo de Dios
  rationale: La frase funciona como título confesional y se traduce de forma directa, sin expandir ni atenuar su contenido teológico.
  doctrine_reference: DOCTRINE.md §Affirmations; §Translation philosophy 1, 3
translation_notes:
  revision_awareness: Se revisó el versículo con alta concordancia respecto del audit trail inglés; no se requirieron cambios sustantivos. La versión española mantiene la estructura retórica interrogativa y la equivalencia de los participios sustantivados con una solución idiomática en español.
  spanish_consistency_notes:
  - Se usó «Yahvé» como norma general del proyecto cuando corresponda; aquí no aparece el nombre divino, sino «Dios».
  - Se prefirió «el que» para preservar el valor representativo de los participios griegos, coherente con la política del proyecto.
  - Se conservó «Hijo de Dios» como título cristológico fijo, sin parafrasearlo.
