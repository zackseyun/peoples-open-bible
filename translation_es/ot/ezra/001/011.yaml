translation:
  language: es
  text: Todos los artículos[a] de oro y de plata sumaron cinco mil cuatrocientos en total. Sesbasar los subió[b] con los exiliados[c], cuando fueron subidos[b] de Babilonia a Jerusalén.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «vasijas» o «utensilios» para «artículos». El término hebreo puede referirse ampliamente a objetos, vasijas o utensilios, especialmente objetos del templo.
    reason: lexical_alternative
  - marker: b
    text: El hebreo usa «subir / hacer subir» dos veces en este versículo, reflejando la expresión habitual de subir a Jerusalén.
    reason: cultural_note
  - marker: c
    text: O «la comunidad del exilio» o «los deportados» para «los exiliados».
    reason: lexical_alternative
lexical_decisions:
- source_word: כָּל כֵּלִים
  english_pob_choice: All the articles
  chosen_spanish: Todos los artículos
  alternatives_spanish:
  - Todos los vasos
  - Todos los utensilios
  lexicon: HALOT
  rationale: כֵּלִים es un término amplio para objetos, utensilios o vasos. En el contexto del tesoro del templo, «artículos» conserva bien la amplitud semántica sin restringirlo solo a recipientes.
- source_word: לַזָּהָב וְלַכֶּסֶף
  english_pob_choice: of gold and silver
  chosen_spanish: de oro y de plata
  alternatives_spanish:
  - de oro y plata
  - hechos de oro y plata
  lexicon: HALOT
  rationale: El prefijo ל aquí clasifica los objetos por su material. En español, «de oro y de plata» es natural y fiel al valor clasificatorio del hebreo.
- source_word: חֲמֵשֶׁת אֲלָפִים וְאַרְבַּע מֵאוֹת
  english_pob_choice: five thousand four hundred
  chosen_spanish: cinco mil cuatrocientos
  alternatives_spanish:
  - '5.400'
  lexicon: HALOT
  rationale: Se conserva el número en palabras para mantener el registro bíblico formal y la fluidez en la prosa.
- source_word: הַכֹּל
  english_pob_choice: in all
  chosen_spanish: en total
  alternatives_spanish:
  - el total
  - en conjunto
  lexicon: HALOT
  rationale: «En total» expresa de manera idiomática la suma final sin perder el valor resumidor del hebreo.
- source_word: הֶעֱלָה
  english_pob_choice: brought ... up
  chosen_spanish: los trajo[a]
  alternatives_spanish:
  - los subió
  - los hizo subir
  lexicon: HALOT
  rationale: El hebreo repite la idea de «subir» hacia Jerusalén. En el cuerpo principal, «los trajo» evita una dureza innecesaria en español, pero la nota conserva explícitamente la imagen de ascenso que el POB inglés retuvo.
- source_word: שֵׁשְׁבַּצַּר
  english_pob_choice: Sheshbazzar
  chosen_spanish: Sesbasar
  alternatives_spanish:
  - Sesbazar
  - Sheshbazzar
  lexicon: Convención de transliteración adaptada al español
  rationale: Se adopta una transliteración española legible y cercana a la pronunciación habitual, manteniendo el nombre propio sin traducirlo.
- source_word: עִם
  english_pob_choice: with
  chosen_spanish: con
  alternatives_spanish:
  - junto con
  lexicon: HALOT
  rationale: Indica acompañamiento simple y directo entre Sesbasar y los exiliados.
- source_word: הֵעָלוֹת הַגּוֹלָה
  english_pob_choice: when they were brought up with the exiles
  chosen_spanish: cuando fueron traídos
  alternatives_spanish:
  - cuando subieron los exiliados
  - cuando los exiliados fueron traídos
  lexicon: HALOT
  rationale: La construcción temporal del infinitivo se vierte como cláusula temporal natural en español. Se mantiene el valor de movimiento/retorno sin sobrecargar la frase.
- source_word: הַגּוֹלָה
  english_pob_choice: the exiles
  chosen_spanish: los exiliados
  alternatives_spanish:
  - la comunidad de los exiliados
  - los deportados
  lexicon: HALOT
  rationale: En este contexto se refiere al grupo de personas que retorna desde Babilonia, por lo que «los exiliados» es claro y exacto.
- source_word: מִבָּבֶל לִירוּשָׁלִָם
  english_pob_choice: from Babylon to Jerusalem
  chosen_spanish: de Babilonia a Jerusalén
  lexicon: HALOT
  rationale: Se traduce de forma directa los topónimos y la dirección del movimiento.
theological_decisions:
- issue: Imagen de ascenso hacia Jerusalén en עלה
  english_pob_reading: Retain 'brought up' rather than flattening to 'brought'
  chosen_spanish_reading: Conservar la nota de ascenso en la nota textual/lexical, aunque el texto principal diga «los trajo»
  alternative_spanish_readings:
  - los subió
  - los hizo subir
  rationale: El hebreo usa עלה dos veces para mantener el idioma convencional de subir a Jerusalén. En español, una versión plenamente literal («los subió») puede sonar rígida; por eso el texto fluye mejor con «los trajo», pero la nota preserva la imagen fuente para no perder la tensión lexical documentada.
  doctrine_reference: Translation philosophy §1, §5
- issue: Referencia de הַגּוֹלָה
  english_pob_reading: Render as 'the exiles' (people)
  chosen_spanish_reading: Renderizar como «los exiliados»
  alternative_spanish_readings:
  - la cautividad
  - la comunidad del exilio
  rationale: Aquí el referente son las personas que vuelven de Babilonia, no la condición abstracta del exilio. «Los exiliados» evita arcaísmos y refleja con precisión el sentido contextual.
  doctrine_reference: Translation philosophy §6
translation_notes:
  revision_awareness: La versión española sigue el texto hebreo directamente y toma como referencia la decisión inglesa auditada de mantener la imagen de 'subir' hacia Jerusalén. Se ha ajustado la sintaxis para español natural, pero sin borrar la doble referencia al ascenso ni la amplitud semántica de כֵּלִים. No se detectaron cambios de revisión recientes que obliguen a modificar el contenido base.
  spanish_consistency_notes:
  - Se usa «Dios» y no aplica aquí terminología divina adicional.
  - «Sesbasar» es una adaptación española del nombre propio, consistente con un registro bíblico readable.
  - Se evita «SEÑOR» porque no aparece el Tetragrámaton en este versículo.
  - La numeración cardinal se escribe con palabras para mantener el tono escritural.
  - La nota [a] queda anclada en «trajo» para señalar la imagen de ascenso del hebreo, y [b] en «fueron traídos» para la repetición verbal documentada.
