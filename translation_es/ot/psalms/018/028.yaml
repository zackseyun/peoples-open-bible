translation:
  language: es
  text: Porque tú salvas al pueblo afligido[a], pero humillas los ojos altivos[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «pobre» o «humilde». El término hebreo puede denotar pobreza económica, aflicción o bajeza/humildad.
    reason: lexical_alternative
  - marker: b
    text: Literalmente, «ojos que están altos». Es un modismo hebreo para orgullo o arrogancia.
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Ya que
  lexicon: HALOT
  rationale: La partícula introduce aquí una explicación o fundamento. «Porque» conserva esa relación causal/explanatoria de manera natural en español y encaja con el flujo poético del salmo.
- source_word: אַתָּה
  english_pob_choice: you
  chosen_spanish: tú
  alternatives_spanish:
  - tú mismo
  lexicon: HALOT
  rationale: Se trata del pronombre de segunda persona singular referido a Dios. En español la fuerza enfática se conserva suficientemente por el orden y el contexto, sin necesidad de añadir un refuerzo explícito.
- source_word: עַם
  english_pob_choice: people
  chosen_spanish: pueblo
  alternatives_spanish:
  - gente
  - nación
  lexicon: HALOT
  rationale: El sustantivo colectivo hebreo puede expresarse como «pueblo» en español para mantener el sentido de un grupo corporativo. «Nación» resultaría demasiado político; «gente» sería más genérico y menos preciso.
- source_word: עָנִי
  english_pob_choice: afflicted
  chosen_spanish: afligido
  alternatives_spanish:
  - pobre
  - humilde
  - necesitado
  lexicon: HALOT
  rationale: El término puede abarcar pobreza, aflicción o bajeza/humildad. «Afligido» preserva la idea de sufrimiento o opresión, que armoniza con el verbo de salvar y evita reducir el término a una sola dimensión económica.
- source_word: תוֹשִׁיעַ
  english_pob_choice: save
  chosen_spanish: salvas
  alternatives_spanish:
  - liberas
  - rescatas
  lexicon: HALOT
  rationale: El hilo verbal de ישׁע en hiphil suele significar «salvar» o «librar». «Salvas» es breve, natural y mantiene el alcance teológico del rescate divino.
- source_word: וְעֵינַיִם
  english_pob_choice: but haughty eyes
  chosen_spanish: pero humillas los ojos altivos
  alternatives_spanish:
  - y humillas los ojos altivos
  - pero humillas a los altivos
  lexicon: HALOT
  rationale: El hebreo dice literalmente «y ojos» dentro de un paralelismo antitético. En español, «pero» expresa mejor el contraste. Se mantiene la imagen de «ojos» porque es un hebraísmo que comunica orgullo/arrogancia; no se lo reemplaza por una paráfrasis interpretativa.
- source_word: רָמוֹת
  english_pob_choice: haughty
  chosen_spanish: altivos
  alternatives_spanish:
  - altaneros
  - orgullosos
  - soberbios
  lexicon: HALOT
  rationale: El adjetivo hebreo describe elevación/presunción. «Altivos» conserva el matiz moral de orgullo con un registro digno y bíblico en español, sin volverse demasiado coloquial.
- source_word: תַּשְׁפִּיל
  english_pob_choice: you bring low
  chosen_spanish: humillas
  alternatives_spanish:
  - abatirás
  - rebajas
  - pones en bajo
  lexicon: HALOT
  rationale: El hiphil de שׁפל significa hacer bajar, humillar o abatir. «Humillas» comunica bien la acción de rebajar al orgulloso en un español claro y natural; la imagen de «bajar» queda implícita en el verbo.
theological_decisions:
- issue: Valor de עָנִי en contraste con el orgullo
  english_pob_reading: afflicted people
  chosen_spanish_reading: pueblo afligido
  alternative_spanish_readings:
  - pueblo pobre
  - pueblo humilde
  rationale: La línea contrasta a quienes Dios rescata con quienes son humillados por su orgullo. «Afligido» preserva la amplitud semántica del hebreo y evita restringir el verso a la pobreza material o a una virtud interior no explicitada.
  doctrine_reference: 'Principio de sentido llano: mantener la amplitud semántica del texto sin importar una interpretación doctrinal ajena al contexto.'
- issue: Mantenimiento del hebraísmo 'ojos altivos'
  english_pob_reading: haughty eyes
  chosen_spanish_reading: ojos altivos
  alternative_spanish_readings:
  - mirada altiva
  - ojos soberbios
  rationale: El POB inglés conserva la imagen corporal literal porque es un modismo hebreo para soberbia. En español, «ojos altivos» preserva esa tensión entre literalidad e idiomatismo; evita diluir la metáfora en una paráfrasis como «los orgullosos».
  doctrine_reference: 'Principio de equivalencia auditable: conservar las imágenes del original cuando son parte del efecto poético y teológico del verso.'
translation_notes:
  revision_awareness: 'El texto sigue de cerca la lectura auditada del POB en inglés y conserva sus dos decisiones léxicas clave: עָנִי como un término amplio de aflicción/condición baja, y עֵינַיִם רָמוֹת como un hebraísmo de orgullo expresado literalmente en español para mantener el efecto poético.'
  spanish_consistency_notes:
  - Se usó «Yahvé» como norma del proyecto solo cuando aparezca el Tetragrámaton; en este verso no aparece.
  - «Salvar» se mantuvo para תוֹשִׁיעַ por consistencia con el valor teológico habitual en los Salmos.
  - Se evitó «SEÑOR» porque no hay sustitución del nombre divino en este hebreo.
  - «Altivos» conserva el tono bíblico y es comprensible en español contemporáneo.
  - La puntuación sigue el paralelismo hebreo con coma antes del contraste adversativo.
