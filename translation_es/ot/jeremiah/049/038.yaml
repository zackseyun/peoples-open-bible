translation:
  language: es
  text: Y pondré mi trono en Elam[a], y destruiré de allí al rey y a los oficiales[b], declara Yahvé.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «colocaré» o «estableceré». El verbo hebreo también puede significar «poner», «colocar» o «establecer».'
    reason: lexical_alternative
  - marker: b
    text: 'O: «príncipes». El término hebreo para «oficiales» también puede referirse a gobernantes o nobles.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְשַׂמְתִּי
  english_pob_choice: And I will set
  chosen_spanish: Y pondré
  alternatives_spanish:
  - Y estableceré
  - Y colocaré
  lexicon: HALOT
  rationale: שׂוּם admite 'poner', 'colocar' y, según contexto, 'establecer'. 'Pondré' es natural en español y conserva la acción directa sin forzar una idea más técnica de entronización que el hebreo no explicita con un verbo distinto.
- source_word: כִסְאִי
  english_pob_choice: my throne
  chosen_spanish: mi trono
  alternatives_spanish:
  - mi asiento
  lexicon: HALOT
  rationale: כִּסֵּא en contexto real/judicial se refiere a un trono. 'Trono' preserva la imagen de soberanía y juicio divina mejor que 'asiento', que sería demasiado general.
- source_word: בְּעֵילָם
  english_pob_choice: in Elam
  chosen_spanish: en Elam
  alternatives_spanish:
  - contra Elam
  lexicon: HALOT
  rationale: La preposición ב señala ubicación, no oposición. 'En Elam' respeta la localización del trono; 'contra Elam' introduciría una fuerza adversativa no marcada por el hebreo.
- source_word: וְהַאֲבַדְתִּי
  english_pob_choice: and I will destroy
  chosen_spanish: y destruiré
  alternatives_spanish:
  - y haré perecer
  - y borraré
  lexicon: HALOT
  rationale: El hiphil de אבד expresa causar perecer o destruir. 'Destruiré' es claro, sobrio y adecuado al lenguaje profético de juicio.
- source_word: מִשָּׁם
  english_pob_choice: from there
  chosen_spanish: de allí
  alternatives_spanish:
  - desde allí
  lexicon: HALOT
  rationale: '''De allí'' reproduce bien la remoción locativa y suena natural en español; ''desde allí'' es posible, pero un poco más marcado.'
- source_word: מֶלֶךְ
  english_pob_choice: king
  chosen_spanish: rey
  alternatives_spanish:
  - el rey
  lexicon: HALOT
  rationale: El sustantivo hebreo es no determinado; en español, el artículo puede omitirse para conservar el valor genérico o representativo. 'Rey' mantiene la concisión del hebreo.
- source_word: וְשָׂרִים
  english_pob_choice: officials
  chosen_spanish: oficiales
  alternatives_spanish:
  - príncipes
  - gobernantes
  - jefes
  lexicon: HALOT
  rationale: שָׂרִים designa líderes de alto rango, funcionarios o nobles. 'Oficiales' comunica bien el sentido de élites gobernantes en español moderno sin cargarlo con el matiz cortesano arcaico de 'príncipes'.
- source_word: נְאֻם יְהוָה
  english_pob_choice: declares Yahweh
  chosen_spanish: dice Yahvé
  alternatives_spanish:
  - declara Yahvé
  - oráculo de Yahvé
  lexicon: HALOT
  rationale: נְאֻם es fórmula profética de enunciación solemne. 'Dice Yahvé' es fiel, breve y idiomático en español bíblico moderno; conserva el nombre divino según la pauta del proyecto.
theological_decisions:
- issue: Representación del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Jehová
  - el SEÑOR
  rationale: El texto hebreo usa el Tetragrama. La pauta del proyecto pide 'Yahvé' como forma principal en español, evitando el ocultamiento tras 'SEÑOR' y manteniendo la transparencia respecto del nombre del pacto.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Imagen de soberanía en 'mi trono'
  english_pob_reading: retain the concrete royal image 'my throne' without interpretive expansion
  chosen_spanish_reading: conservar la imagen concreta de 'mi trono'
  alternative_spanish_readings:
  - mi gobierno
  - mi tribunal
  - mi asiento real
  rationale: El hebreo presenta una imagen de entronización/juicio sin explicarla. 'Mi trono' conserva esa tensión teológica y la fuerza simbólica de la soberanía divina sobre Elam.
  doctrine_reference: DOCTRINE.md Translation philosophy §3, §6
translation_notes:
  revision_awareness: 'La comparación con el antecedente inglés muestra acuerdo alto y sin revisiones aplicadas en el pase más reciente; la redacción española sigue la misma lectura del hebreo, manteniendo las dos alternativas léxicas documentadas: el verbo de colocación/establecimiento y el sustantivo para los líderes de élite.'
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' para יְהוָה conforme al estándar del proyecto.
  - Se conserva la imagen de 'mi trono' sin convertirla en paráfrasis de 'mi gobierno' o 'mi tribunal'.
  - '''Oficiales'' traduce שָׂרִים con un registro moderno y claro, en paralelo al valor de ''rulers/nobles'' documentado en la auditoría inglesa.'
  - Las notas al pie preservan las alternativas léxicas relevantes sin añadir interpretaciones no atestiguadas.
