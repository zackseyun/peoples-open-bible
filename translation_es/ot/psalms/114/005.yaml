translation:
  language: es
  text: ¿Qué te pasa[a], mar, que huyes; Jordán, que retrocedes?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «¿Qué hay contigo?». El hebreo usa un modismo de asombro en una interpelación directa.'
    reason: lexical_alternative
lexical_decisions:
- source_word: מַה לְּךָ
  english_pob_choice: What is with you
  chosen_spanish: ¿Qué te pasa[a]?
  alternatives_spanish:
  - ¿Qué te sucede?
  - ¿Qué te ocurre?
  - ¿Qué hay contigo?
  lexicon: HALOT
  rationale: El hebreo es un modismo de asombro o reprensión, no una simple pregunta causal. En español, «¿Qué te pasa?» comunica de manera natural esa interpelación directa y mantiene el matiz idiomático sin volverlo demasiado interpretativo.
- source_word: הַיָּם
  english_pob_choice: O sea
  chosen_spanish: mar
  alternatives_spanish:
  - ¡oh, mar!
  - el mar
  lexicon: HALOT
  rationale: El sustantivo designa el mar y aquí funciona como vocativo poético. En español, el vocativo se comunica mejor con la entonación y la puntuación; por eso se usa «mar» dentro de la pregunta, con la interpelación implícita por el contexto y el cierre retórico.
- source_word: כִּי
  english_pob_choice: that
  chosen_spanish: que
  alternatives_spanish:
  - porque
  - pues
  lexicon: HALOT
  rationale: Aquí introduce el contenido de la pregunta retórica, así que «que» es la conjunción española más natural para reproducir la estructura.
- source_word: תָנוּס
  english_pob_choice: you flee
  chosen_spanish: huyes
  alternatives_spanish:
  - escapas
  - sales huyendo
  lexicon: HALOT
  rationale: El verbo נוּס significa huir; «huyes» conserva la fuerza verbal y la personificación del mar con una equivalencia directa y natural.
- source_word: הַיַּרְדֵּן
  english_pob_choice: O Jordan
  chosen_spanish: Jordán
  alternatives_spanish:
  - el Jordán
  lexicon: HALOT
  rationale: Es nombre propio geográfico; en español bíblico y moderno, «Jordán» es claro y natural. La vocación se expresa por la sintaxis y la puntuación.
- source_word: תִּסֹּב
  english_pob_choice: you turn back
  chosen_spanish: te vuelves atrás
  alternatives_spanish:
  - retrocedes
  - te regresas
  lexicon: HALOT
  rationale: El verbo סבב aquí indica girar o volver atrás. «Te vuelves atrás» conserva el movimiento inverso y la imagen poética del texto.
- source_word: לְאָחוֹר
  english_pob_choice: back
  chosen_spanish: atrás
  alternatives_spanish:
  - hacia atrás
  - al retroceso
  lexicon: HALOT
  rationale: El adverbio apunta a dirección posterior; «atrás» es la opción más natural en español junto con «volver(se) atrás».
translation_notes:
  revision_awareness: Se corrigió la validación anterior asegurando que el marcador de nota [a] aparezca exactamente en el texto español. No se añadieron notas sin anclaje.
  spanish_consistency_notes:
  - Se mantuvo el estilo poético directo y la personificación del mar y del Jordán.
  - Se evitó introducir terminología eclesiástica innecesaria.
  - «Te vuelves atrás» conserva el movimiento reversible del hebreo sin añadir explicaciones ajenas al verso.
