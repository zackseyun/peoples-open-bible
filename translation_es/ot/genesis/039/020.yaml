translation:
  language: es
  text: Así que el amo de José lo tomó y lo puso en la cárcel[a], el lugar donde estaban confinados los prisioneros[b] del rey. Y estaba allí en la cárcel.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebreo literalmente, «la casa del sohar», un término egipcio para una prisión o casa de detención.
    reason: cultural_note
  - marker: b
    text: 'El hebreo repite la raíz de «atar/encarcelar»: literalmente, «donde los prisioneros del rey estaban encarcelados».'
    reason: lexical_alternative
lexical_decisions:
- source_word: אֲדֹנֵי יוֹסֵף
  english_pob_choice: Joseph’s master
  chosen_spanish: el amo de José
  alternatives_spanish:
  - el señor de José
  - el dueño de José
  lexicon: HALOT
  rationale: אדון en este contexto narra una relación de autoridad humana sobre José; en español, «amo» mantiene con claridad la relación de dominio/posesión sin adoptar un título religioso ni sonar excesivamente arcaico. «Señor» podría confundirse con un tratamiento honorífico o teológico.
- source_word: וַיִּקַּח
  english_pob_choice: took
  chosen_spanish: lo tomó
  alternatives_spanish:
  - lo agarró
  - lo llevó
  lexicon: HALOT
  rationale: לקח aquí introduce la acción de tomar a José para su traslado; «tomó» conserva el valor básico del verbo sin intensificarlo innecesariamente con «agarró».
- source_word: וַיִּתְּנֵהוּ אֶל
  english_pob_choice: put him into
  chosen_spanish: lo puso en
  alternatives_spanish:
  - lo metió en
  - lo entregó a
  lexicon: HALOT
  rationale: נתן con אֶל expresa colocación en un lugar; «lo puso en» es natural en español y mantiene la idea concreta de introducción en un espacio cerrado.
- source_word: בֵּית הַסֹּהַר
  english_pob_choice: the prison
  chosen_spanish: la cárcel
  alternatives_spanish:
  - el prisión
  - la prisión
  lexicon: HALOT
  rationale: Aunque literalmente es «la casa del sohar», el contexto indica un lugar de detención. «Cárcel» es una equivalencia idiomática clara en español; se conserva la explicación cultural en nota.
- source_word: מְקוֹם אֲשֶׁר
  english_pob_choice: the place where
  chosen_spanish: el lugar donde
  alternatives_spanish:
  - el lugar en que
  lexicon: HALOT
  rationale: La apposición explicativa del hebreo se preserva con «el lugar donde», sin comprimirla a un simple relativo.
- source_word: אֲסוּרֵי הַמֶּלֶךְ אֲסוּרִים
  english_pob_choice: the king’s prisoners were confined
  chosen_spanish: estaban presos los prisioneros del rey
  alternatives_spanish:
  - estaban encarcelados los presos del rey
  - estaban encadenados los prisioneros del rey
  lexicon: HALOT
  rationale: El hebreo repite la raíz אסר con fuerza de confinamiento. «Estaban presos» refleja el estado pasivo sin sonar artificial; «prisioneros del rey» conserva la referencia al grupo, y la repetición queda parcialmente visible en español mediante «presos/prisioneros».
- source_word: וַיְהִי שָׁם
  english_pob_choice: And he was there
  chosen_spanish: Y él estuvo allí
  alternatives_spanish:
  - Y permaneció allí
  - Y se quedó allí
  lexicon: HALOT
  rationale: היה con שם señala su presencia resultante. «Estuvo allí» comunica presencia real sin añadir una duración que el hebreo no explicita directamente.
- source_word: בְּבֵית הַסֹּהַר
  english_pob_choice: in the prison
  chosen_spanish: en la cárcel
  alternatives_spanish:
  - en la prisión
  - en esa cárcel
  lexicon: HALOT
  rationale: La repetición final retoma el mismo lugar para énfasis. «En la cárcel» mantiene la repetición natural en español y evita borrar el eco del hebreo.
translation_notes:
  revision_awareness: 'La redacción sigue de cerca el texto hebreo y la solución auditada en inglés: mantiene la doble mención del lugar de confinamiento, refleja la repetición de la raíz אסר en una forma idiomática española, y conserva la explicación cultural del término egipcio para la prisión mediante nota.'
  spanish_consistency_notes:
  - Se usa «José» como forma estándar del nombre en español, en consonancia con la revisión inglesa que normalizó Joseph.
  - Se evita «SEÑOR» para אדון, porque aquí no es un título divino sino una relación humana de dominio.
  - Se elige «cárcel»/«presos» por claridad natural; la nota conserva el dato literal de la «casa del sohar» y la reiteración verbal del hebreo.
