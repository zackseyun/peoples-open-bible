translation:
  language: es
  text: Un salmo. Canten a Yahvé un canto nuevo, porque ha hecho maravillas; su mano derecha y su brazo santo le han traído salvación[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «lo han salvado» o «le han conseguido salvación». La expresión hebrea puede traducirse de manera más literal, pero aquí comunica que el propio poder de Yahvé ha realizado liberación/victoria para él.'
    reason: lexical_alternative
lexical_decisions:
- source_word: מִזְמוֹר
  english_pob_choice: A psalm
  chosen_spanish: Un salmo
  alternatives_spanish:
  - Un poema
  - Una composición musical
  lexicon: HALOT
  rationale: La palabra funciona como rótulo de encabezado; «salmo» es el equivalente español claro y natural, y conserva la función de superscripción.
- source_word: שִׁירוּ
  english_pob_choice: Sing
  chosen_spanish: Canten
  alternatives_spanish:
  - Canten alabanza
  - Entonen
  lexicon: HALOT
  rationale: Imperativo plural directo. «Canten» mantiene la orden explícita sin añadir el contenido interpretativo de «alabanza».
- source_word: לַיהוָה
  english_pob_choice: to Yahweh
  chosen_spanish: a Yahvé
  alternatives_spanish:
  - para Yahvé
  - al SEÑOR
  lexicon: HALOT
  rationale: 'Se sigue el default del proyecto para יהוה: «Yahvé». La preposición con el verbo de canto se expresa naturalmente en español con «a».'
- source_word: שִׁיר חָדָשׁ
  english_pob_choice: a new song
  chosen_spanish: un canto nuevo
  alternatives_spanish:
  - un cántico nuevo
  - una nueva canción
  lexicon: HALOT
  rationale: «Canto nuevo» transmite el valor poético y litúrgico del hebreo sin sonar forzado; «cántico» es posible, pero «canto» resulta más transparente en español moderno.
- source_word: נִפְלָאוֹת
  english_pob_choice: wondrous things
  chosen_spanish: maravillas
  alternatives_spanish:
  - cosas portentosas
  - obras maravillosas
  lexicon: HALOT
  rationale: El plural hebreo apunta a obras que suscitan asombro. «Maravillas» es compacto, digno y semánticamente fiel.
- source_word: עָשָׂה
  english_pob_choice: he has done
  chosen_spanish: ha hecho
  alternatives_spanish:
  - ha obrado
  - hizo
  lexicon: HALOT
  rationale: Perfecto hebreo expresado con presente perfecto español, adecuado para acciones cumplidas con vigencia en la alabanza.
- source_word: הוֹשִׁיעָה לּוֹ
  english_pob_choice: have worked salvation for him
  chosen_spanish: han obrado salvación para él
  alternatives_spanish:
  - han logrado salvación para él
  - han dado victoria para él
  lexicon: HALOT
  rationale: La construcción verbal se refleja con una expresión que conserva el objeto indirecto «para él» y el componente de salvación. Se evita forzar el verso hacia «victoria» como lectura exclusiva, ya que el POB revisado subraya más directamente la idea de salvación/deliverance.
- source_word: יְמִינוֹ
  english_pob_choice: his right hand
  chosen_spanish: su mano derecha
  alternatives_spanish:
  - su diestra
  lexicon: HALOT
  rationale: La imagen antropomórfica se conserva literalmente. «Su mano derecha» es más natural y ampliamente inteligible que «su diestra» en español contemporáneo.
- source_word: וּזְרֹעַ קָדְשׁוֹ
  english_pob_choice: and his holy arm
  chosen_spanish: y su brazo santo
  alternatives_spanish:
  - y el brazo de su santidad
  lexicon: HALOT
  rationale: Se mantiene el paralelismo corporal y la cualidad de santidad. «Brazo santo» suena más natural que una construcción nominal pesada como «el brazo de su santidad».
theological_decisions:
- issue: Renderización del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - Jehová
  rationale: El proyecto pide usar «Yahvé» en el texto principal como reflejo transparente del nombre divino, evitando el ocultamiento convencional por mayúsculas. Se preserva la identifiabilidad reverente sin recurrir a la sustitución litúrgica.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Sentido de הוֹשִׁיעָה לּוֹ en relación con la mano derecha y el brazo santo de Yahvé
  english_pob_reading: have worked salvation for him
  chosen_spanish_reading: han obrado salvación para él
  alternative_spanish_readings:
  - le han dado salvación
  - han logrado su salvación
  rationale: Se conserva el lenguaje de salvación sin transformar el resultado en una sola categoría interpretativa de «victoria». El hebreo permite una formulación activa que enfatiza que el poder de Yahvé ha producido rescate/obra salvífica.
  doctrine_reference: Poética hebrea sobre la acción salvadora de Yahvé
translation_notes:
  revision_awareness: El audit trail inglés pasó de una lectura más interpretativa de «victory» a una formulación más cercana a «worked salvation for him». La versión española sigue ese ajuste, manteniendo el paralelismo poético y el sentido salvífico sin imponer una glosa demasiado interpretativa.
  spanish_consistency_notes:
  - Se usa «Yahvé» conforme al estándar del proyecto para el nombre divino.
  - Se conserva el tono poético formal con verbos en perfecto y paralelismo corporal.
  - «Maravillas» y «salvación» reflejan el léxico de asombro y rescate del hebreo sin sobreexplicar.
  - La puntuación sigue una cadencia de salmo breve y publicable.
