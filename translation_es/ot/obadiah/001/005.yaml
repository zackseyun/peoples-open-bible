base_translation:
  language: en
  yaml_path: translation/ot/obadiah/001/005.yaml
  text: If thieves came to you[a], if robbers by night—how you have been destroyed!—would they not steal only enough for themselves? If grape gatherers came to you[b], would they not leave gleanings?
  footnotes:
  - marker: a
    text: Or, 'how you are cut off' / 'how you have been ruined.' The Hebrew verb can be rendered in several closely related ways in this context of devastation.
    reason: lexical_alternative
  - marker: b
    text: Literally, 'would they not steal their sufficiency?'—that is, only as much as was enough for them.
    reason: lexical_alternative
