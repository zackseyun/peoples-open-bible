translation:
  language: es
  text: 'Quien diga al impío[a]: «Tú eres justo», los pueblos lo maldecirán; las naciones lo denunciarán.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «El que dice al impío: “Tú estás en lo correcto”, los pueblos lo maldecirán; las naciones se indignarán contra él».'
    reason: lexical_alternative
lexical_decisions:
- source_word: אֹמֵר
  english_pob_choice: Whoever says
  chosen_spanish: Quien diga
  alternatives_spanish:
  - El que diga
  - Quien dice
  lexicon: HALOT
  rationale: El participio hebreo funciona de manera proverbial e indefinida. «Quien diga» conserva ese valor general y suena natural en español, sin volverlo demasiado mecánico.
- source_word: לְרָשָׁע
  english_pob_choice: to the wicked
  chosen_spanish: al impío
  alternatives_spanish:
  - al malvado
  - al malhechor
  - al culpable
  lexicon: HALOT
  rationale: רָשָׁע designa una persona impía o malvada en sentido moral. «Impío» mantiene la categoría ética y evita reducirlo a una noción meramente legal de culpabilidad.
- source_word: צַדִּיק
  english_pob_choice: righteous
  chosen_spanish: justo
  alternatives_spanish:
  - recto
  - en lo correcto
  - inocente
  lexicon: HALOT
  rationale: En este contraste sapiencial, צַדִּיק expresa rectitud moral. «Justo» reproduce bien el paralelismo con «impío» y es una equivalencia directa y comprensible en español.
- source_word: יִקְּבֻהוּ
  english_pob_choice: will curse him
  chosen_spanish: lo maldecirán
  alternatives_spanish:
  - lo maldirán
  - lo execrarán
  - lo condenarán
  lexicon: HALOT
  rationale: El verbo tiene fuerza de maldición explícita. «Maldecirán» preserva ese peso imprecatorio con claridad contemporánea; las otras opciones son más elevadas o atenúan la fuerza.
- source_word: עַמִּים
  english_pob_choice: peoples
  chosen_spanish: los pueblos
  alternatives_spanish:
  - las gentes
  - los pueblos de la tierra
  - las naciones
  lexicon: HALOT
  rationale: El plural עַמִּים se distingue de לְאֻמִּים en el segundo hemistiquio. «Los pueblos» conserva ese plural colectivo sin colapsarlo con «naciones».
- source_word: יִזְעָמ֥וּ/הוּ
  english_pob_choice: will denounce him
  chosen_spanish: lo repudiarán
  alternatives_spanish:
  - lo denunciarán
  - se indignarán contra él
  - lo aborrecerán
  lexicon: HALOT
  rationale: El verbo expresa indignación hostil o rechazo público. «Repudiarán» capta bien la reprobación social fuerte que el contexto requiere, y diferencia el segundo cola del primero.
- source_word: לְאֻמִּים
  english_pob_choice: nations
  chosen_spanish: las naciones
  alternatives_spanish:
  - los pueblos
  - las etnias
  - las comunidades
  lexicon: HALOT
  rationale: Como término paralelo de עַמִּים, «naciones» mantiene la distinción léxica y el paralelismo poético, tal como en la traducción inglesa auditada.
translation_notes:
  revision_awareness: La redacción sigue de cerca la decisión inglesa de mantener el proverbio en forma general («Whoever says»), preservar el contraste moral entre רָשָׁע y צַדִּיק, y distinguir entre עַמִּים y לְאֻמִּים. Se adoptó una equivalencia idiomática en español sin introducir interpretaciones adicionales.
  spanish_consistency_notes:
  - 'Se conservó el paralelismo poético con dos cola distintos: «los pueblos» / «las naciones».'
  - «Impío» se usa para רָשָׁע según el valor moral del término en sabiduría, coherente con el contraste de este versículo.
  - 'La nota [a] recoge la alternativa semántica que el audit trail inglés preserva para צַדִּיק: «justo» frente a «en lo correcto».'
