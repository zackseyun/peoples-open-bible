id: 1CLEM.22
reference: 1 Clement 22
unit: chapter
book: 1 Clement
source:
  edition: Funk 1901 (normalized OCR)
  text: Ταῦτα δὲ πάντα βεβαιοῖ ἡ ἐν Χριστῷ πίστις· καὶ γὰρ αὐτὸς διὰ τοῦ πνεύματος τοῦ ἁγίου οὕτως προσκαλεῖται ἡμᾶς· Δεῦτε, τέκνα, ἀκούσατέ μου, φόβον κυρίου διδάξω ὑμᾶς. 2. τίς ἐστιν ἄνθρωπος ὁ θέλων ζωὴν, ἀγαπῶν ἡμέρας ἰδεῖν ἀγαθάς; . παῦσον τὴν γλῶσσάν σου ἀπὸ κακοῦ, καὶ χείλη σου τοῦ μὴ λαλῆσαι δόλον. 4. ἔκκλινον ἀπὸ κακοῦ καὶ ποίησον ἀγαθόν. 5. ζήτησον εἰρήνην καὶ δίωξον αὐτήν. 6. ὀφθαλμοὶ κυρίου ἐπὶ δικαίους, καὶ ὦτα αὐτοῦ πρὸς δέησιν αὐτῶν, πρόσωπον δὲ κυρίου ἐπὶ ποιοῦντας κακά, τοῦ ἐξολεθρεῦσαι ἐκ γῆς τὸ μνημόσυνον αὐτῶν. 7. ἐκέκραξεν ὁ δίκαιος, καὶ ὁ κύριος εἰσήκουσεν αὐτοῦ καὶ ἐκ πασῶν τῶν θλίψεων αὐτοῦ ἐῤῥύσατο αὐτόν. 8. πολλαὶ αἱ θλίψεις τοῦ δικαίου, καὶ ἐκ πασῶν αὐτῶν ῥύσεται αὐτὸν ὁ κύριος. 9. εἶτα· Πολλαὶ αἱ μάστιγες τοῦ ἁμαρτωλοῦ, τοὺς δὲ ἐλπίζοντας ἐπὶ κύριον ἔλεος κυκλώσει.
  language: Greek
  pages:
  - 291
  - 293
  note: This chapter comes from the normalized Funk 1901 OCR layer.
translation:
  text: 'And the faith that is in Messiah confirms all these things[a]. For he himself also, through the Holy Spirit, thus calls us: “Come, children, listen to me; I will teach you the fear of the Lord. Who is the man who desires life, loving to see good days? Keep your tongue from evil, and your lips from speaking deceit. Turn away from evil and do good. Seek peace and pursue it. The eyes of the Lord are upon the righteous, and his ears are toward their petition; but the face of the Lord is against those who do evil, to wipe out their memory from the earth. The righteous cried out, and the Lord heard him and delivered him from all his afflictions. Many are the afflictions of the righteous, and from all of them the Lord will deliver him.” Then: “Many are the blows of the sinner[b][c][d][e][a], but mercy will surround those who hope in the Lord.”'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The wording from this point is a citation of Psalm 34:11–17, with the final sentence echoing Psalm 32:10 in the Greek tradition.
    reason: cross_reference
    anchor_ref: '22:1'
  - marker: a
    text: Or possibly, 'faith in the Messiah confirms all these things.' The Greek phrase can be rendered more explicitly, but the main text keeps the source's compact form.
    reason: lexical_alternative
    anchor_ref: '22:1'
  - marker: e
    text: '''Man'' renders Greek ἄνθρωπος in a representative singular sense, not as excluding women.'
    reason: cultural_note
    anchor_ref: '22:2'
  - marker: d
    text: '''Blows'' could also be rendered ''scourges'' or ''lashes,'' but the Greek can denote severe strokes or punishments more generally.'
    reason: lexical_alternative
    anchor_ref: '22:9'
  - marker: c
    text: Or 'And the faith that is in the Messiah confirms'.
    reason: previous_rendering
  - marker: b
    text: Or 'Stop your tongue from evil'.
    reason: previous_rendering
lexical_decisions:
- source_word: βεβαιοῖ
  chosen: confirms
  alternatives:
  - establishes
  - makes certain
  lexicon: LSJ
  rationale: 'Conveys strengthening or validating force in context: faith in the Messiah gives firm confirmation to the preceding exhortation.'
- source_word: πίστις
  chosen: faith
  alternatives:
  - faithfulness
  - trust
  lexicon: BDAG
  rationale: Here the phrase ἡ ἐν Χριστῷ πίστις most naturally refers to faith centered in the Messiah rather than his own faithfulness; 'faith' preserves the likely sense while keeping the theological weight.
- source_word: ἐν Χριστῷ
  chosen: in the Messiah
  alternatives:
  - in Christ
  lexicon: BDAG
  rationale: Title is translated rather than merely transliterated, following project policy; the phrase retains its christological force.
- source_word: προσκαλεῖται
  chosen: calls to us
  alternatives:
  - invites us
  - summons us
  lexicon: LSJ
  rationale: Keeps the direct hortatory tone of the citation introduction without overformalizing it.
- source_word: φόβον κυρίου
  chosen: the fear of the Lord
  alternatives:
  - reverence for the Lord
  lexicon: BDAG
  rationale: Traditional biblical phrase with theological density; 'fear' should be preserved rather than softened.
- source_word: ἄνθρωπος
  chosen: man
  alternatives:
  - person
  - human being
  lexicon: BDAG
  rationale: Gender-accurate singular representative usage is retained per project philosophy, especially in a scriptural quotation.
- source_word: παῦσον
  chosen: Stop
  alternatives:
  - keep back
  - restrain
  lexicon: LSJ
  rationale: Direct imperative with clear paraenetic force in contemporary English.
- source_word: δόλον
  chosen: deceit
  alternatives:
  - guile
  - treachery
  lexicon: BDAG
  rationale: Readable modern English that preserves moral seriousness; 'guile' is possible but less current.
- source_word: ἔκκλινον
  chosen: Turn away
  alternatives:
  - depart
  - avoid
  lexicon: LSJ
  rationale: Captures decisive moral turning rather than mere avoidance.
- source_word: ζήτησον εἰρήνην καὶ δίωξον αὐτήν
  chosen: Seek peace and pursue it
  alternatives:
  - strive for peace and chase after it
  lexicon: BDAG
  rationale: Preserves the memorable cadence of the scriptural line and the active force of δίωξον.
- source_word: δέησιν
  chosen: petition
  alternatives:
  - supplication
  - prayer
  lexicon: BDAG
  rationale: More specific than 'prayer' and more readable than 'supplication'; reflects earnest appeal.
- source_word: τοῦ ἐξολεθρεῦσαι
  chosen: to wipe out
  alternatives:
  - to destroy utterly
  - to blot out
  lexicon: LSJ
  rationale: Expresses the infinitive of purpose/result with strong judgment language in accessible English.
- source_word: μνημόσυνον
  chosen: memory
  alternatives:
  - remembrance
  - memorial
  lexicon: BDAG
  rationale: '''Memory'' is idiomatic in English for the enduring remembrance of a person or name.'
- source_word: ἐκέκραξεν
  chosen: cried out
  alternatives:
  - called out
  lexicon: BDAG
  rationale: Retains the intensity of the aorist verb in the psalm citation.
- source_word: ἐῤῥύσατο
  chosen: delivered
  alternatives:
  - rescued
  - saved
  lexicon: BDAG
  rationale: A standard biblical rendering that fits both immediate distress and broader theological resonance.
- source_word: θλίψεων
  chosen: afflictions
  alternatives:
  - troubles
  - distresses
  lexicon: BDAG
  rationale: Preserves the gravity of suffering without narrowing it to persecution alone.
- source_word: μάστιγες
  chosen: blows
  alternatives:
  - scourges
  - lashes
  - plagues
  lexicon: LSJ
  rationale: '''Blows'' is broad enough to cover punitive strokes or severe sufferings without over-specifying corporal scourging.'
- source_word: ἁμαρτωλοῦ
  chosen: the sinner
  alternatives:
  - the wicked person
  lexicon: BDAG
  rationale: Matches the singular moral type in the citation and preserves biblical diction.
- source_word: ἐλπίζοντας ἐπὶ κύριον
  chosen: those who hope in the Lord
  alternatives:
  - those who trust in the Lord
  lexicon: BDAG
  rationale: Keeps the explicit hope-language of the Greek rather than assimilating it to generic trust.
- source_word: ἔλεος κυκλώσει
  chosen: mercy will surround
  alternatives:
  - steadfast love will encircle
  - mercy will encompass
  lexicon: BDAG
  rationale: Preserves the vivid image of divine mercy encircling the faithful.
theological_decisions:
- issue: Rendering Χριστῷ
  chosen_reading: Messiah
  alternative_readings:
  - Christ
  rationale: Used as a title rather than a name-like form in this context; translating it preserves meaning and aligns with project policy.
  doctrine_reference: 'DOCTRINE.md: Translate titles; transliterate names.'
- issue: Sense of ἡ ἐν Χριστῷ πίστις
  chosen_reading: the faith that is in the Messiah
  alternative_readings:
  - faith in the Messiah
  - the Messiah's faithfulness
  rationale: The construction is not pressed into a more interpretive English phrase than necessary. The chosen wording preserves the Greek's theological texture while allowing later review of whether objective or more locative nuance is primary.
  doctrine_reference: 'DOCTRINE.md: Preserve theological tension rather than resolve it.'
