translation:
  language: es
  text: Las aguas te vieron, oh Dios; las aguas te vieron y se retorcieron[a]; aun los abismos[b] temblaron.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «estuvieron en angustia», «se agitaron convulsamente» o «temblaron» para «se retorcieron». El verbo hebreo puede denotar sacudida convulsiva o retorcimiento semejante al dolor de parto.
    reason: lexical_alternative
  - marker: b
    text: O «las profundidades». El hebreo se refiere a las aguas profundas o a las honduras del mar.
    reason: lexical_alternative
lexical_decisions:
- source_word: רָאוּךָ
  english_pob_choice: saw you
  chosen_spanish: te vieron
  alternatives_spanish:
  - te miraron
  - te contemplaron
  lexicon: HALOT
  rationale: El qal perfecto de ראה con sufijo de 2ª masc. sing. expresa percepción visual directa. «Te vieron» conserva la repetición enfática del hebreo sin añadir matices no sustentados.
- source_word: מַיִם
  english_pob_choice: the waters
  chosen_spanish: las aguas
  alternatives_spanish:
  - aguas
  - las aguas del mar
  lexicon: HALOT
  rationale: «Las aguas» reproduce el valor colectivo y personificado del sustantivo en el paralelismo poético. En español es más natural que un simple «aguas» y mantiene el tono cósmico del verso.
- source_word: אֱלֹהִים
  english_pob_choice: O God
  chosen_spanish: oh Dios
  alternatives_spanish:
  - Dios
  - ¡Dios!
  lexicon: HALOT
  rationale: Aquí hay vocativo directo; «oh Dios» hace explícita la llamada sin transformar el verso en una afirmación nominal. Se evita «Yahvé» porque el hebreo presenta אֱלֹהִים, no el nombre divino.
- source_word: יָחִילוּ
  english_pob_choice: writhed
  chosen_spanish: se retorcieron
  alternatives_spanish:
  - estuvieron en angustia
  - temblaron
  - se agitaron convulsamente
  lexicon: HALOT
  rationale: El verbo puede expresar agitación convulsiva, retorcimiento o angustia laboriosa. «Se retorcieron» preserva la vividez corporal de la imagen y distingue este verbo del siguiente «temblaron».
- source_word: אַף
  english_pob_choice: even
  chosen_spanish: aun
  alternatives_spanish:
  - también
  - incluso
  lexicon: HALOT
  rationale: 'Funciona como intensificador aditivo: no solo las aguas, sino aun los abismos respondieron. «Aun» conserva esa escalada retórica con buena fluidez en español.'
- source_word: יִרְגְּזוּ
  english_pob_choice: trembled
  chosen_spanish: temblaron
  alternatives_spanish:
  - se estremecieron
  - se sacudieron
  - tremieron
  lexicon: HALOT
  rationale: רגז denota temblor o conmoción. «Temblaron» es claro y natural, y permite mantener la diferencia con «se retorcieron» en la línea paralela.
- source_word: תְהֹמוֹת
  english_pob_choice: the depths
  chosen_spanish: los abismos
  alternatives_spanish:
  - las profundidades
  - los océanos profundos
  - los deeps
  lexicon: HALOT
  rationale: Aunque «las profundidades» es posible, «los abismos» comunica mejor en español la hondura primordial y personificada de תְהֹמוֹת. La pluralidad se mantiene en el artículo y el sustantivo.
theological_decisions:
- issue: Personificación cósmica de aguas y abismos ante la presencia divina
  english_pob_reading: Retain the poetic personification of waters and depths reacting to God's presence without over-interpreting mythological background.
  chosen_spanish_reading: 'Mantener la personificación poética: las aguas y los abismos reaccionan ante Dios como realidad creada estremecida por su presencia.'
  alternative_spanish_readings:
  - Ver el verso solo como alusión a la travesía del mar Rojo
  - Leerlo como combate directo con poderes míticos del mar
  rationale: La traducción conserva la imagen poética sin resolverla en una sola explicación histórica o mitológica. Así se respeta la tensión literaria del hebreo y se deja espacio para la interpretación.
  doctrine_reference: 'Principio POB: preservar la tensión teológica sin sobreexplicar ni domesticar la imaginería bíblica.'
translation_notes:
  revision_awareness: 'El pasaje coincide con el audit trail inglés en las decisiones centrales: repetición de «las aguas», vocativo directo a Dios, primer verbo con imagen intensa de retorcimiento y segundo verbo con temblor, sin forzar una lectura histórica o mitológica única. No se aplicaron revisiones posteriores en el paquete fuente.'
  spanish_consistency_notes:
  - Se mantiene «Dios» para אֱלֹהִים, coherente con el vocativo del hebreo.
  - Se evita «SEÑOR» o «Yahvé» porque este verso no contiene el tetragrámaton ni una cita explícita de él.
  - «Los abismos» se usa como equivalente poético de תְהֹמוֹת, pero la nota conserva la alternativa «las profundidades» para lectores que prefieran un registro más literal.
  - La puntuación conserva la paralelismo hebreo con dos miembros principales y un intensificador final.
