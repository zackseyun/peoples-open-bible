  yaml_path: translation/deuterocanon/1_esdras/008/028.yaml
  text: And these are the leaders according to their fathers’ houses and their divisions[b][a], who went up with me from Babylon in the reign of Artaxerxes the king.
  footnotes:
  - marker: a
