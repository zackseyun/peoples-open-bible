id: 1PE.2.25
reference: 1 Peter 2:25
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: ἦτε γὰρ ὡς πρόβατα πλανώμενοι, ἀλλὰ ἐπεστράφητε νῦν ἐπὶ τὸν ποιμένα καὶ ἐπίσκοπον τῶν ψυχῶν ὑμῶν.
base_translation:
  language: en
  yaml_path: translation/nt/1_peter/002/025.yaml
  text: 'For you were like sheep going astray, but now you have returned to the Shepherd and Overseer of your souls.'
translation:
  language: ko
  text: '여러분은 전에 길 잃은 양과 같더니[a], 이제는 여러분의 영혼의 목자이시며 감독자이신 분께 돌아왔습니다.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 이사야 53:6 인유. 사 53장 「고난받는 종」 노래의 메아리.
    reason: cross_reference
lexical_decisions:
- source_word: ὡς πρόβατα πλανώμενοι
  english_pob_choice: like sheep going astray
  chosen_korean: 길 잃은 양과 같더니
  alternatives_korean:
  - 양같이 헤매더니
  - 흩어진 양같더니
  lexicon: BDAG
  rationale: 사 53:6 LXX의 「우리는 다 양같이 길을 잃었다」 메아리. 「길 잃은 양」으로 자연스럽게 옮긴다.
- source_word: ἐπεστράφητε
  english_pob_choice: have returned
  chosen_korean: 돌아왔습니다
  alternatives_korean:
  - 돌이켰습니다
  - 회복되었습니다
  lexicon: BDAG
  rationale: ἐπιστρέφω의 회개·회귀 어감을 「돌아오다」로 평이하게 옮긴다.
- source_word: τὸν ποιμένα καὶ ἐπίσκοπον τῶν ψυχῶν ὑμῶν
  english_pob_choice: the Shepherd and Overseer of your souls
  chosen_korean: 여러분의 영혼의 목자이시며 감독자이신 분
  alternatives_korean:
  - 너희 영혼의 목자와 감독
  - 너희 영혼의 목자이며 돌보시는 자
  lexicon: BDAG
  rationale: ποιμήν(목자), ἐπίσκοπος(감독자) 둘 다 보존. 5:4의 ἀρχιποίμην(목자장)과 어휘 연속성 유지.
