translation:
  language: es
  text: Y circuncidaron a los muchachos incircuncisos, a cuantos encontraron dentro de los límites de Israel[a], por la fuerza[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «en el territorio / las regiones de Israel».
    reason: lexical_alternative
  - marker: b
    text: Lit. «con fuerza»; aquí el sentido es coercitivo, por eso se traduce «por la fuerza».
    reason: lexical_alternative
lexical_decisions:
- source_word: περιέτεμον
  english_pob_choice: they circumcised
  chosen_spanish: circuncidaron
  alternatives_spanish:
  - les practicaron la circuncisión
  - circuncidaron a
  lexicon: LSJ
  rationale: El aoristo de περιτέμνω es el verbo normal para circuncidar. En español, «circuncidaron» conserva la acción concreta y directa sin añadir explicaciones innecesarias.
- source_word: τὰ παιδάρια
  english_pob_choice: the ... boys
  chosen_spanish: los muchachos
  alternatives_spanish:
  - los niños
  - los muchachos pequeños
  - los jóvenes
  lexicon: LSJ
  rationale: παιδάρια puede referirse a niños o muchachos. En este contexto, unido a «incircuncisos» y al acto de circuncisión, «muchachos» es natural en español y evita precisar más de lo que el texto dice.
- source_word: τὰ ἀπερίτμητα
  english_pob_choice: uncircumcised
  chosen_spanish: incircuncisos
  alternatives_spanish:
  - no circuncidados
  lexicon: LSJ
  rationale: El adjetivo describe el estado covenantal de los muchachos. «Incircuncisos» es el equivalente más directo y usual en español bíblico, sin suavizar el término.
- source_word: ὅσα εὗρεν
  english_pob_choice: as many as they found
  chosen_spanish: a cuantos encontraron
  alternatives_spanish:
  - a todos los que encontraron
  - cuantos hallaron
  lexicon: LSJ
  rationale: La construcción neutra plural es distributiva/colectiva. «A cuantos encontraron» reproduce bien ese sentido en español y suena más natural que una traducción demasiado literal.
- source_word: ἐν ὁρίοις Ἰσραήλ
  english_pob_choice: within the borders of Israel
  chosen_spanish: dentro de los límites de Israel
  alternatives_spanish:
  - en el territorio de Israel
  - en las regiones de Israel
  lexicon: LSJ
  rationale: ὁρία puede significar límites, fronteras o territorios. «Dentro de los límites de Israel» preserva la referencia territorial y mantiene un registro claro y digno.
- source_word: ἐν ἰσχύϊ
  english_pob_choice: by force
  chosen_spanish: por la fuerza
  alternatives_spanish:
  - con fuerza
  - mediante la fuerza
  - con poder
  lexicon: LSJ
  rationale: Aquí ἐν ἰσχύϊ expresa coerción, no solo vigor. «Por la fuerza» comunica de manera natural y precisa que se trató de una imposición.
theological_decisions:
- issue: Valence moral de la acción descrita
  english_pob_reading: 'Render the action descriptively without softening or justifying it: ''by force.'''
  chosen_spanish_reading: 'Traducir la acción de manera descriptiva, sin suavizarla ni justificarla: «por la fuerza».'
  alternative_spanish_readings:
  - con celo
  - fuertemente
  - con poder
  rationale: El griego indica coerción. La traducción española debe conservar esa severidad sin introducir una valoración moral que el texto no explicita.
  doctrine_reference: Translation philosophy §§1, 3, 6
translation_notes:
  revision_awareness: El pasaje coincide con el texto griego de Swete 1909 y con el auditoría inglesa POB sin requerir cambios; se conservó el sentido distributivo de ὅσα εὗρεν y el matiz coercitivo de ἐν ἰσχύϊ.
  spanish_consistency_notes:
  - Se mantiene «incircuncisos» para τὰ ἀπερίτμητα, en línea con el vocabulario bíblico estándar y la decisión inglesa.
  - «Dentro de los límites de Israel» conserva el valor territorial de ἐν ὁρίοις Ἰσραήλ sin forzar una sola opción entre territorio, regiones o fronteras.
  - «Por la fuerza» preserva el tono coercitivo del original y evita suavizar la escena.
