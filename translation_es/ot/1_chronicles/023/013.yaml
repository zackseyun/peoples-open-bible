translation:
  language: es
  text: 'Los hijos de Amram: Aarón y Moisés. Y Aarón fue apartado, él y sus hijos para siempre, para santificarlo como santísimo[a], para quemar incienso delante de Yahvé, para ministrarle y para bendecir en su nombre para siempre.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O “santo de los santos”. La expresión hebrea es literalmente “santidad de santidades”, un superlativo que significa “santísimo”.
    reason: lexical_alternative
lexical_decisions:
- source_word: בְּנֵי עַמְרָם
  english_pob_choice: The sons of Amram
  chosen_spanish: Los hijos de Amram
  alternatives_spanish:
  - Los descendientes de Amram
  lexicon: HALOT
  rationale: En contexto genealógico, בְּנֵי puede abarcar descendencia, pero la mención inmediata de Aarón y Moisés favorece el sentido literal y directo “hijos”.
- source_word: וַיִּבָּדֵל
  english_pob_choice: was set apart
  chosen_spanish: fue apartado
  alternatives_spanish:
  - fue separado
  - fue distinguido
  lexicon: HALOT
  rationale: El nifal de בדל expresa separación para un propósito especial. “Fue apartado” comunica bien la idea consagratoria sin perder la distinción ritual.
- source_word: לְהַקְדִּישׁוֹ
  english_pob_choice: to sanctify him
  chosen_spanish: para santificarlo
  alternatives_spanish:
  - para consagrarlo
  - para hacerlo santo
  lexicon: HALOT
  rationale: El hifil de קדש admite la idea de santificar/consagrar. En español, “santificarlo” conserva la relación con lo sagrado y sigue de cerca la revisión inglesa más reciente.
- source_word: קֹדֶשׁ קָדָשִׁים
  english_pob_choice: most holy
  chosen_spanish: santísimo
  alternatives_spanish:
  - santo de los santos
  - lo más santo
  lexicon: HALOT
  rationale: La expresión es superlativa. En español, “santísimo” comunica mejor el valor adjetival aplicado a Aarón que “santo de los santos”, que suena como nombre de lugar.
- source_word: הוּא וּבָנָיו
  english_pob_choice: he and his sons
  chosen_spanish: él y sus hijos
  alternatives_spanish:
  - él y sus descendientes
  lexicon: HALOT
  rationale: Se conserva la forma explícita del hebreo y la línea sacerdotal de Aarón. “Hijos” mantiene la concreción genealógica.
- source_word: עַד עוֹלָם
  english_pob_choice: forever
  chosen_spanish: para siempre
  alternatives_spanish:
  - perpetuamente
  - por siempre
  lexicon: HALOT
  rationale: En este contexto de institución sacerdotal, expresa duración continua. “Para siempre” es idiomático y solemne.
- source_word: לְהַקְטִיר
  english_pob_choice: to burn incense
  chosen_spanish: para quemar incienso
  alternatives_spanish:
  - para ofrecer incienso
  - para hacer subir incienso
  lexicon: HALOT
  rationale: En contexto sacerdotal, קטר se refiere a quemar incienso. La formulación española es natural y fiel al valor cultual del verbo.
- source_word: לִפְנֵי יְהוָה
  english_pob_choice: before Yahweh
  chosen_spanish: delante de Yahvé
  alternatives_spanish:
  - en presencia de Yahvé
  lexicon: HALOT
  rationale: Se mantiene el nombre divino según la norma del proyecto. “Delante de” reproduce bien el valor espacial y cultual de לִפְנֵי.
- source_word: לְשָׁרְתוֹ
  english_pob_choice: to minister to him
  chosen_spanish: para ministrarle
  alternatives_spanish:
  - para servirle
  lexicon: HALOT
  rationale: שרת en contexto levítico-sacerdotal tiene sentido ministerial. “Ministrarle” preserva ese matiz técnico mejor que el más general “servirle”.
- source_word: וּלְבָרֵךְ בִּשְׁמוֹ
  english_pob_choice: and to bless in his name
  chosen_spanish: y para bendecir en su nombre
  alternatives_spanish:
  - y para bendecir por su nombre
  - y para pronunciar bendición en su nombre
  lexicon: HALOT
  rationale: La frase puede implicar autoridad o invocación del nombre. “En su nombre” mantiene la ambigüedad sin explicitar más de lo que el texto permite.
theological_decisions:
- issue: Referente de los sufijos singulares en “santificarlo” y “ministrarle”
  english_pob_reading: '''to consecrate him'' refers to Aaron; ''to minister to him'' refers to the LORD'
  chosen_spanish_reading: “santificarlo” se refiere a Aarón; “ministrarle” se refiere a Yahvé
  alternative_spanish_readings:
  - santificarlo impersonalmente
  - ministrarle a Aarón
  rationale: La sintaxis inmediata favorece a Aarón como objeto de santificación, mientras que el marco cultual de “delante de Yahvé” hace natural que el ministerio sea dirigido a Yahvé. Se conserva así la tensión gramatical del hebreo sin resolverla artificialmente.
  doctrine_reference: Preservar ambigüedad genuina del texto cuando la sintaxis la exige.
- issue: Valor de קֹדֶשׁ קָדָשִׁים aplicado a Aarón
  english_pob_reading: '''most holy'' rather than ''holy of holies'''
  chosen_spanish_reading: “santísimo” como superlativo aplicado a Aarón
  alternative_spanish_readings:
  - “santo de los santos”
  - “sumamente santo”
  rationale: El hebreo expresa una superlación de santidad sobre la persona de Aarón, no el nombre de un espacio sagrado. “Santísimo” evita confundir el atributo con el lugar y conserva el tono culto.
  doctrine_reference: Evitar trasladar automáticamente fórmulas locales de santidad a nombres de recinto cuando el contexto no lo exige.
translation_notes:
  revision_awareness: La versión inglesa revisada cambió “consecrate” por “sanctify” para reflejar con más precisión לְהַקְדִּישׁוֹ. La redacción española sigue esa revisión con “santificarlo”, manteniendo también la lectura singular de los sufijos y el valor superlativo de קֹדֶשׁ קָדָשִׁים.
  spanish_consistency_notes:
  - Se mantuvo Yahvé en el texto principal conforme a la terminología del proyecto.
  - Se prefirió “hijos” para בְּנֵי por el contexto genealógico inmediato.
  - “Ministrarle” conserva el registro técnico sacerdotal sin caer en una paráfrasis amplia.
  - La nota al pie se ancla en “apartado” para recoger la alternativa léxica “separado”.
