  to: 'Entonces el rey de Jericó envió a Rahab, diciendo: «Saca a los hombres que vinieron a ti, que entraron en tu casa, porque han venido a reconocer[a] toda la región».'
  rationale: Se corrige la nota para que preserve la alternativa léxica documentada en el expediente inglés para חפר, y se ajusta «toda la tierra» a «toda la región» para expresar mejor הָאָרֶץ en su contexto narrativo. El resto del texto se mantiene por ser fiel y claro.
