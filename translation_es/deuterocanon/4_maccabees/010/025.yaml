translation:
  language: es
  text: ¿O no te parece malo que adoremos al Creador de todo y vivamos conforme a su ley virtuosa?[a]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, más literalmente, «¿O no parece malo...?». La pregunta retórica griega puede entenderse como un desafío al juicio moral del adversario.
    reason: lexical_alternative
lexical_decisions:
- source_word: κακὸν
  english_pob_choice: evil
  chosen_spanish: malo
  alternatives_spanish:
  - malvado
  - malo moralmente
  - evil
  lexicon: BDAG
  rationale: En español, «malo» mantiene el juicio moral negativo sin sonar tan abstracto como «mal» ni tan cargado como «malvado». Dado que el griego plantea una valoración polémica en una pregunta retórica, «malo» conserva la acusación sin sobrerretraducirla.
- source_word: οὐ δοκεῖ
  english_pob_choice: does it not seem
  chosen_spanish: no te parece
  alternatives_spanish:
  - no parece
  - no te parece que
  - no se considera
  lexicon: BDAG
  rationale: δοκέω expresa percepción o juicio; «no te parece» reproduce bien la fuerza retórica dirigida al interlocutor implícito, de manera natural en español. Se introduce «te» porque el contexto polémico presupone un destinatario, como en el inglés POB con «to you».
- source_word: τὸν πάντων κτίστην
  english_pob_choice: the Creator of all
  chosen_spanish: al Creador de todo
  alternatives_spanish:
  - al Creador de todas las cosas
  - al creador de todo
  lexicon: BDAG
  rationale: «Creador de todo» conserva la amplitud de πάντων y suena natural en español. Se usa mayúscula reverencial por tratarse de un título divino en contexto de adoración.
- source_word: εὐσεβοῦμεν
  english_pob_choice: we worship
  chosen_spanish: veneremos
  alternatives_spanish:
  - adoramos
  - reverenciemos
  - mostremos reverencia
  lexicon: BDAG
  rationale: El verbo puede abarcar piedad, reverencia y culto. En español, «veneremos» conserva el matiz de reverencia religiosa sin forzar una equivalencia exclusivamente litúrgica; además encaja con la pregunta retórica que cuestiona si tal acto puede llamarse malo.
- source_word: κατὰ
  english_pob_choice: according to
  chosen_spanish: conforme a
  alternatives_spanish:
  - según
  - de acuerdo con
  - en conformidad con
  lexicon: BDAG
  rationale: Con acusativo, κατά indica norma o estándar. «Conforme a» es claro, sobrio y fiel, y evita la rigidez de un calco demasiado literal.
- source_word: τὸν ἔναρετον αὐτοῦ νόμον
  english_pob_choice: his virtuous law
  chosen_spanish: su ley virtuosa
  alternatives_spanish:
  - su ley excelente
  - su ley noble
  - su ley moral
  lexicon: LSJ
  rationale: ἔναρετος significa moralmente excelente o virtuoso. «Virtuosa» conserva el juicio ético explícito del adjetivo griego aplicado a νόμος. «Ley» mantiene el valor normativo del sustantivo sin sustituirlo por formulaciones más interpretativas.
- source_word: ζῶμεν
  english_pob_choice: live
  chosen_spanish: vivamos
  alternatives_spanish:
  - vivimos
  - llevemos nuestra vida
  - continuemos viviendo
  lexicon: BDAG
  rationale: El presente subjuntivo/indicativo en la pregunta retórica admite una formulación que mantenga el paralelo con el verbo de culto. «Vivamos» en español conserva el valor de modo de vida conforme a la ley, sin perder la primera persona plural del griego.
theological_decisions:
- issue: Forza de la pregunta retórica y destinatario implícito
  english_pob_reading: The speaker asks whether worshiping the Creator and living by his law should be considered evil.
  chosen_spanish_reading: 'La hablante interpela a un oponente implícito: ¿puede considerarse malo venerar al Creador y vivir conforme a su ley?'
  alternative_spanish_readings:
  - ¿O no parece malo...?
  - ¿No te parece malo...?
  rationale: El griego presenta una pregunta retórica sin pronombre explícito; el inglés POB hace explícito el destinatario con «to you». En español, «no te parece» conserva esa confrontación directa sin añadir más contenido doctrinal del que el texto exige.
  doctrine_reference: Retener la fuerza polémica de la acusación moral; no suavizar la oposición entre culto a Dios y obediencia a su ley.
translation_notes:
  revision_awareness: 'Se siguió el sentido y la revisión estable del POB inglés (sin cambios recientes), con atención al dato griego: la pregunta retórica, el objeto de culto («Creador de todo») y el valor moral de ἔναρετος en relación con νόμος. No se dependió mecánicamente del inglés: se ajustó la segunda persona implícita al español y se eligió «veneremos» para mantener la reverencia cultual sin perder naturalidad.'
  spanish_consistency_notes:
  - Se mantiene Yahvé como forma estándar solo cuando el texto fuente lo requiera; aquí no aparece el tetragrama, así que no se usa.
  - «Venerar» y «veneremos» se emplean aquí para εὐσεβοῦμεν, preservando el matiz de devoción reverente; no se reemplaza por «servir» porque el objeto es el Creador en un contexto de culto.
  - «Ley virtuosa» sigue el valor moral explícito de ἔναρετος y evita neutralizar el calificativo ético.
  - La puntuación mantiene la pregunta retórica abierta y la nota a pie conserva la alternativa literal del inglés POB.
