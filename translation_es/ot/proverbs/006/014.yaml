review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura y el sentido general del hebreo: תַּהְפֻּכוֹת בְּלִבּוֹ = disposición perversa interior; חֹרֵשׁ רָע = tramar/maquinar el mal; בְּכָל עֵת = de manera continua. El punto principal a corregir es el último colon: יְשַׁלֵּחַ מְדָנִים significa literalmente ''envía/suelta contiendas'' y el English POB decidió conservar esa cercanía en el texto principal, dejando ''stirs up'' como alternativa en nota. El español ''provoca contiendas'' comunica el efecto, pero se aleja más de la forma y de la decisión auditada de optimal-equivalence.'
  spanish_quality_summary: 'El español es claro, natural y de registro bíblico moderno. ''La perversidad está en su corazón'' y ''maquina el mal en todo tiempo'' funcionan bien. Hay un pequeño problema formal: la nota [a] está anclada tras ''corazón'', pero su contenido explica la cláusula final, no esa palabra. Conviene mover el anclaje a la expresión final correspondiente.'
  glossary_alignment: 'No hay conflictos con la terminología proyectual. Las decisiones léxicas principales son adecuadas: ''perversidad'', ''corazón'', ''maquina'', ''mal'', ''contiendas''. La única desalineación relevante es que para יְשַׁלֵּחַ el borrador privilegia una paráfrasis (''provoca'') donde la auditoría inglesa prefirió mantener el verbo más cercano (''sends out'') con nota explicativa. En español, ''suelta contiendas'' o ''envía contiendas'' preserva mejor esa racionalidad; ''suelta'' suena más idiomático que ''envía''.'
  issues:
  - severity: medium
    issue: El verbo principal final se volvió demasiado interpretativo
    rationale: El hebreo יְשַׁלֵּחַ y el English POB conservan la imagen de 'enviar/sacar/soltar' contiendas. 'Provoca' traduce el resultado, pero reduce la fuerza léxica y se aparta de la filosofía documentada.
  - severity: medium
    issue: La nota al pie está anclada en el lugar equivocado
    rationale: El marcador [a] aparece después de 'corazón', pero la nota explica 'provoca contiendas' / 'envía contiendas'. Eso crea confusión para el lector y no sigue la disciplina de anclar la nota donde corresponde.
  - severity: low
    issue: La nota dice 'envía/suelta' como si fueran dos literales equivalentes
    rationale: Solo una forma debe presentarse como alternativa principal. 'Suelta' funciona bien en español como representación cercana del modismo, mientras que la nota puede explicar el sentido de causar o esparcir conflicto.
  revised_spanish_text: La perversidad está en su corazón; maquina el mal en todo tiempo; suelta contiendas.[a]
  revised_footnotes:
  - marker: a
    text: O «provoca contiendas». El hebreo dice literalmente «suelta contiendas», un modismo para causar o esparcir conflicto.
    reason: lexical_alternative
  revision_rationale: Se revisa la cláusula final para alinearla mejor con el hebreo y con la decisión documentada del English POB de mantener la imagen verbal principal en el texto y dejar la interpretación más idiomática en nota. También se corrige la ubicación del marcador de nota para que corresponda a la frase explicada. El resto del versículo puede mantenerse sin cambios.
