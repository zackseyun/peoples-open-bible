- from: Bendecid al Señor, oh cielos; cantadle alabanzas y exaltadlo grandemente para siempre.
  to: Bendigan al Señor, oh, cielos; cántenle alabanzas y exáltenlo en gran manera para siempre.
  rationale: Se actualizan los imperativos a formas naturales para español neutral («Bendigan», «cántenle», «exáltenlo») y se reemplaza «grandemente» por «en gran manera», que conserva mejor la intensificación hímnica con mayor naturalidad. Se ajusta también la puntuación del vocativo.
  reviewer_model: gpt-5.4
