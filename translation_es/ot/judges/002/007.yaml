translation:
  language: es
  text: Y el pueblo sirvió a Yahvé todos los días de Josué, y todos los días de los ancianos que vivieron después de Josué, que habían visto toda la gran obra[a] de Yahvé que él había hecho por Israel.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «la gran obra» también puede traducirse «la gran hazaña», «el gran hecho» o «el gran acto».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּעַבְדוּ
  english_pob_choice: served
  chosen_spanish: sirvió
  alternatives_spanish:
  - adoró
  - prestó servicio a
  lexicon: HALOT
  rationale: עבד con Yahvé como objeto expresa servicio de fidelidad de pacto, no solo acto cultual. En español, «sirvió» conserva esa amplitud mejor que «adoró», que estrecharía el sentido.
- source_word: הָעָם
  english_pob_choice: the people
  chosen_spanish: el pueblo
  alternatives_spanish:
  - la gente
  - la nación
  lexicon: HALOT
  rationale: Aquí עם designa a la comunidad de Israel en conjunto. «El pueblo» es natural en español y mantiene el matiz colectivo de la fuente.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: Se conserva el nombre divino del Tetragrámaton como «Yahvé», siguiendo la convención del proyecto en español y evitando la sustitución por un título.
- source_word: כֹּל יְמֵי
  english_pob_choice: all the days of
  chosen_spanish: todos los días de
  alternatives_spanish:
  - durante todos los días de
  - a lo largo de todos los días de
  lexicon: HALOT
  rationale: La locución temporal se vierte de modo idiomático y transparente como «todos los días de», sin perder el sentido de duración total.
- source_word: הַזְּקֵנִים
  english_pob_choice: the elders
  chosen_spanish: los ancianos
  alternatives_spanish:
  - los viejos
  - los líderes
  lexicon: HALOT
  rationale: Aunque el término tiene base etaria, en este contexto señala a los dirigentes reconocidos de Israel. «Los ancianos» conserva la forma léxica y el rol social.
- source_word: הֶאֱרִיכוּ יָמִים אַחֲרֵי
  english_pob_choice: lived on after
  chosen_spanish: vivieron después de
  alternatives_spanish:
  - prolongaron sus días después de
  - sobrevivieron a
  lexicon: HALOT
  rationale: El modismo hebreo indica que continuaron viviendo más allá de Josué. «Vivieron después de» es claro en español y no añade matices ajenos.
- source_word: רָאוּ
  english_pob_choice: had seen
  chosen_spanish: habían visto
  alternatives_spanish:
  - vieron
  lexicon: HALOT
  rationale: 'El pluscuamperfecto español reproduce la relación temporal: la experiencia de ver precede y explica la fidelidad de esos ancianos.'
- source_word: מַעֲשֵׂה
  english_pob_choice: work
  chosen_spanish: obra
  alternatives_spanish:
  - hecho
  - acto
  - obra hecha
  lexicon: HALOT
  rationale: Aunque el inglés POB usa «work», en español «obra» comunica con naturalidad el conjunto de acciones realizadas por Yahvé a favor de Israel. Evita un calco poco idiomático sin perder el sentido colectivo.
- source_word: הַגָּדוֹל
  english_pob_choice: great
  chosen_spanish: grande
  alternatives_spanish:
  - mighty
  - poderosa
  lexicon: HALOT
  rationale: El adjetivo describe la magnitud de la obra de Yahvé. «Grande» refleja directamente el hebreo y se integra bien con «obra».
- source_word: עָשָׂה לְיִשְׂרָאֵל
  english_pob_choice: he had done for Israel
  chosen_spanish: que él había hecho por Israel
  alternatives_spanish:
  - que había hecho para Israel
  - que hizo por Israel
  lexicon: HALOT
  rationale: 'La preposición ל es benefactiva: lo hecho fue en favor de Israel. «Por Israel» conserva ese valor y mantiene la referencia a la acción divina en beneficio del pueblo.'
theological_decisions:
- issue: Nombre divino del Tetragrámaton
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: Se preserva el nombre personal de Dios revelado a Israel, en lugar de sustituirlo por un título. Esto sigue la línea doctrinal del proyecto y evita ocultar el nombre presente en el hebreo.
  doctrine_reference: 'DOCTRINE.md — contested terms: יְהוָה / YHWH'
- issue: Sentido de la acción del pueblo hacia Yahvé
  english_pob_reading: served
  chosen_spanish_reading: sirvió
  alternative_spanish_readings:
  - adoró
  - rindió culto
  rationale: En este versículo, עבד aplicado a Yahvé expresa lealtad y servicio de pacto, con posible trasfondo de adoración, pero no limitado a un acto litúrgico. «Sirvió» preserva esa amplitud semántica.
  doctrine_reference: HALOT; English POB lexical note on עבד
translation_notes:
  revision_awareness: 'Concordancia alta con la revisión inglesa más reciente: no se requirieron ajustes de fondo respecto al audit trail; la única adaptación relevante fue la naturalización de מַעֲשֶׂה como «obra» en español, manteniendo la nota alternativa para no borrar la ambigüedad léxica documentada.'
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» de forma consistente para יְהוָה.
  - Se prefirió el pasado perfecto («habían visto», «había hecho») para reflejar la secuencia temporal del hebreo y del inglés auditado.
  - «Los ancianos» se conserva como término técnico narrativo para הַזְּקֵנִים.
  - La nota de pie marca la única alternativa léxica significativa documentada en el audit trail, sin introducir otras no atestiguadas.
