- from: y que hacer mal a los que habían confiado en la santidad del lugar[a], y en la majestad y la inviolabilidad del templo honrado en todo el mundo, era totalmente imposible.
  to: y que agraviar a los que habían confiado en la santidad del lugar, y en la majestad y la inviolabilidad[a] del templo honrado en todo el mundo, era totalmente imposible.
  rationale: Se reemplaza 'hacer mal a' por 'agraviar' para reflejar mejor la fuerza moral y jurídica de ἀδικήσαί en un español más natural y digno. También se reubica la nota sobre 'inviolabilidad' en el término relevante y se elimina el anglicismo 'estatus de asilo', conservando de forma clara la alternativa léxica documentada en el POB inglés.
