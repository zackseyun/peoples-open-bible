  to: Ellos también actuaron con astucia, y fueron y se aprovisionaron[a], y tomaron sacos gastados para sus asnos, y odres de vino gastados[b], rajados y remendados.
  rationale: Se corrigió el principal problema de fidelidad trasladando la nota al verbo difícil וַיִּצְטַיָּרוּ y ajustando su traducción a «se aprovisionaron», que preserva mejor la decisión auditada inglesa «made provisions» que el previo «se prepararon». Se mantuvo «con astucia» para בְּעָרְמָה. También se refinó «rotos» a «rajados» para reflejar mejor «split open», conservando «remendados» con nota alternativa sobre «atados/amarrados».
