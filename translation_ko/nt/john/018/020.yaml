source:
  edition: SBLGNT
  text: ἀπεκρίθη ⸀αὐτῷ Ἰησοῦς· Ἐγὼ παρρησίᾳ ⸀λελάληκα τῷ κόσμῳ· ἐγὼ πάντοτε ἐδίδαξα ἐν συναγωγῇ καὶ ἐν τῷ ἱερῷ, ὅπου ⸀πάντες οἱ Ἰουδαῖοι συνέρχονται, καὶ ἐν κρυπτῷ ἐλάλησα οὐδέν·
base_translation:
  language: en
  yaml_path: translation/nt/john/018/020.yaml
  text: Jesus answered him[a], “I have spoken openly to the world. I always taught in the synagogue and in the temple, where all the Jews gather[b], and I said nothing in secret.”
  footnotes:
  - marker: a
    text: Or 'in the temple courts' or 'in the temple precincts'; the Greek ἱερόν refers to the temple complex, not specifically the inner sanctuary.
    reason: lexical_alternative
  - marker: b
    text: Or 'all the Jewish people' or, in some contexts in John, 'all the Judeans.' The Greek Ἰουδαῖοι is context-sensitive.
    reason: lexical_alternative
translation:
  language: ko
  text: 예수께서 그에게 대답하셨습니다. 「나는 세상에 공개적으로 말하였습니다. 나는 항상 모든 유대인이 모이는 회당과 성전에서 가르쳤고, 은밀히는 아무것도 말하지 않았습니다.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 또는 「성전 뜰에서」, 「성전 구역에서」. 헬라어 ἱερόν은 성전 전체를 가리키며 내전(內殿)에 한정되지 않는다.
    reason: lexical_alternative
  - marker: b
    text: 또는 「모든 유대 백성」, 또는 요한복음의 어떤 문맥에서는 「모든 유대 사람」. 헬라어 Ἰουδαῖοι는 문맥에 따라 다양하게 옮긴다.
    reason: lexical_alternative
