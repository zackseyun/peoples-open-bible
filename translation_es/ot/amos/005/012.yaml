  glossary_alignment: No hay conflicto con la terminología principal del proyecto. «Justo» para צַדִּיק es aceptable en español. «Soborno» para כֹפֶר está bien contextualizado. «Puerta» conserva la imagen bíblica y puede mantenerse con nota cultural, pero conviene explicitar mejor la acción legal de הִטּוּ en español.
