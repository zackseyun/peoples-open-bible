translation:
  language: es
  text: 'Y tú, hijo de hombre, profetiza y di: «Así dice el Señor Dios, Yahvé, acerca de los hijos de Amón y acerca de sus burlas[a]». Y dirás: «Una espada, una espada, desenvainada para la matanza, bruñida para devorar, para que relumbre como un relámpago[b]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «su reproche» o «su escarnio».
    reason: lexical_alternative
  - marker: b
    text: O «desenvainada para la matanza, bruñida para devorar, para brillar como un relámpago».
    reason: lexical_alternative
lexical_decisions:
- source_word: בֶן אָדָם
  english_pob_choice: son of man
  chosen_spanish: hijo de hombre
  alternatives_spanish:
  - ser humano
  - mortal
  lexicon: HALOT
  rationale: En Ezequiel, la fórmula es el vocativo fijo con fuerza literaria y profética. «Hijo de hombre» conserva el idiomatismo hebreo mejor que una paráfrasis interpretativa.
- source_word: אֲדֹנָי יְהוִה
  english_pob_choice: the Lord GOD
  chosen_spanish: Señor Yahvé
  alternatives_spanish:
  - Señor Dios
  - Soberano Yahvé
  lexicon: HALOT
  rationale: 'Se conserva el nombre divino según la convención del proyecto: יְהוָה se traduce «Yahvé». En español, «Señor Yahvé» mantiene ambos elementos del hebreo compuesto sin duplicar artificialmente «Señor».'
- source_word: בְּנֵי עַמּוֹן
  english_pob_choice: the sons of Ammon
  chosen_spanish: los hijos de Amón
  alternatives_spanish:
  - los amonitas
  - el pueblo de Amón
  lexicon: HALOT
  rationale: «Hijos de Amón» sigue de cerca la expresión filial del hebreo y es comprensible en español. Se evita reemplazarla por el etnónimo más idiomático para no perder la forma fuente.
- source_word: חֶרְפָּתָם
  english_pob_choice: their reproach
  chosen_spanish: su afrenta
  alternatives_spanish:
  - su oprobio
  - su burla
  - su reproche
  lexicon: HALOT
  rationale: El sustantivo puede implicar reproche, insulto o escarnio. «Afrenta» comunica bien el sentido de desprecio ofensivo y funciona naturalmente en español bíblico contemporáneo.
- source_word: חֶרֶב חֶרֶב
  english_pob_choice: A sword, a sword
  chosen_spanish: una espada, una espada
  alternatives_spanish:
  - ¡Espada, espada!
  - Espada, espada
  lexicon: HALOT
  rationale: La repetición enfática se conserva tal cual para reflejar el énfasis del hebreo. El artículo indefinido suena natural en español y mantiene la dureza del anuncio.
- source_word: פְּתוּחָה
  english_pob_choice: drawn
  chosen_spanish: desenvainada
  alternatives_spanish:
  - sacada
  - abierta
  lexicon: HALOT
  rationale: En la imaginería bélica, el participio describe la espada sacada de la vaina. «Desenvainada» es la opción más precisa y natural para el castellano.
- source_word: לְטֶבַח
  english_pob_choice: for slaughter
  chosen_spanish: para la matanza
  alternatives_spanish:
  - para el sacrificio
  - para degollar
  lexicon: HALOT
  rationale: Se mantiene el valor violento y directo del término. «Matanza» es claro en español y evita suavizar el brutal propósito del arma.
- source_word: מְרוּטָה
  english_pob_choice: polished
  chosen_spanish: bruñida
  alternatives_spanish:
  - pulida
  - abrillantada
  - burnida
  lexicon: HALOT
  rationale: El contexto sugiere una espada pulida o bruñida para reflejar luz. «Bruñida» conserva mejor la imagen de brillo metálico que «pulida» en este pasaje.
- source_word: לְהָכִיל
  english_pob_choice: for devouring
  chosen_spanish: para devorar
  alternatives_spanish:
  - para consumir
  - para tragarse
  lexicon: HALOT
  rationale: La revisión inglesa más reciente entendió el verbo en sentido destructivo. «Para devorar» reproduce con fuerza la acción depredadora que el contexto exige.
- source_word: לְמַעַן בָּרָק
  english_pob_choice: so that it flashes like lightning
  chosen_spanish: para que relumbre como un rayo
  alternatives_spanish:
  - para que destelle como relámpago
  - a fin de que brille como un rayo
  lexicon: HALOT
  rationale: La frase final es telegráfica y alude al fulgor de una espada bruñida. «Relumbre como un rayo» conserva la conexión entre brillo y relámpago sin sobreexplicar.
theological_decisions:
- issue: Representación del nombre divino יְהוָה
  english_pob_reading: the Lord GOD / Yahweh in doctrine
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Señor
  - Señor Dios
  rationale: El proyecto español debe reflejar explícitamente el Tetragrámaton en el texto principal. Por eso se usa «Yahvé» en lugar de una máscara tradicional como «SEÑOR».
  doctrine_reference: 'DOCTRINE.md: Contested terms — יהוה / YHWH → Yahvé'
translation_notes:
  revision_awareness: La versión inglesa revisada ajustó לְהָכִיל de «to consume» a «for devouring». La redacción española sigue esa revisión con «para devorar», y mantiene sin suavizar la imagen bélica ni la repetición enfática del verso.
  spanish_consistency_notes:
  - Se mantuvo el vocativo profético «hijo de hombre» por consistencia con Ezequiel.
  - Se usó «Yahvé» conforme al estándar del proyecto para יְהוָה.
  - Se evitó «Cristo» y otros términos no presentes en el verso.
  - La construcción «Señor Yahvé» refleja el compuesto אֲדֹנָי יְהוִה sin ocultar el nombre divino.
