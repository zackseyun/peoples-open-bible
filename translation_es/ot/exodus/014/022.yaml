translation:
  language: es
  text: Y entraron los hijos de Israel[a] en medio del mar sobre la tierra seca, y las aguas eran un muro para ellos a su derecha y a su izquierda.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «los israelitas». El hebreo es literalmente «los hijos de Israel».
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּבֹאוּ
  english_pob_choice: went into
  chosen_spanish: entraron
  alternatives_spanish:
  - fueron
  - pasaron
  - se metieron
  lexicon: HALOT
  rationale: El verbo de movimiento בוא en este contexto narrativo expresa entrar o ir hacia dentro de un lugar. «Entraron» mantiene el valor direccional con español natural y sobrio.
- source_word: בְנֵי יִשְׂרָאֵל
  english_pob_choice: the sons of Israel
  chosen_spanish: los hijos de Israel
  alternatives_spanish:
  - los israelitas
  - los hijos de Jacob
  lexicon: HALOT
  rationale: La frase hebrea es literalmente «los hijos de Israel». Se conserva esta forma transparente; «israelitas» es más idiomático, pero borra la correspondencia formal del hebreo.
- source_word: בְּתוֹךְ הַיָּם
  english_pob_choice: into the midst of the sea
  chosen_spanish: en medio del mar
  alternatives_spanish:
  - en medio del mar
  - en el centro del mar
  - a través del mar
  lexicon: HALOT
  rationale: בְּתוֹךְ significa «en medio / en el interior». En español, «en medio del mar» comunica con naturalidad la imagen de estar dentro del espacio abierto del mar; «a través» introduciría un matiz más interpretativo.
- source_word: בַּיַּבָּשָׁה
  english_pob_choice: on the dry ground
  chosen_spanish: sobre tierra seca
  alternatives_spanish:
  - sobre terreno seco
  - en tierra seca
  - sobre suelo seco
  lexicon: HALOT
  rationale: El hebreo refiere el lecho seco contrastado con el agua. «Tierra seca» conserva la imagen concreta; «sobre» refleja adecuadamente la idea de pisar un camino firme.
- source_word: וְהַמַּיִם
  english_pob_choice: and the waters
  chosen_spanish: y las aguas
  alternatives_spanish:
  - y el agua
  - y las aguas del mar
  lexicon: HALOT
  rationale: Se conserva el plural hebreo vividísimo «las aguas», que en esta escena tiene fuerza literaria y evita aplanarlo en un singular genérico.
- source_word: חֹמָה
  english_pob_choice: a wall
  chosen_spanish: como muro
  alternatives_spanish:
  - como una muralla
  - como una pared
  - como barrera
  lexicon: HALOT
  rationale: Aunque el hebreo no lleva marcador comparativo explícito, en español «fueron como muro» comunica con fidelidad la función y la imagen. «Muro» mantiene el impacto concreto mejor que «barrera».
- source_word: מִימִינָם
  english_pob_choice: on their right
  chosen_spanish: a su derecha
  alternatives_spanish:
  - a su lado derecho
  - a su mano derecha
  - a la derecha de ellos
  lexicon: HALOT
  rationale: La preposición indica posición al lado derecho. «A su derecha» es la forma más natural y breve en español.
- source_word: וּמִשְּׂמֹאלָם
  english_pob_choice: on their left
  chosen_spanish: a su izquierda
  alternatives_spanish:
  - a su lado izquierdo
  - a su mano izquierda
  - a la izquierda de ellos
  lexicon: HALOT
  rationale: Paralela a la frase anterior, esta expresión conserva la simetría espacial del hebreo con español claro y directo.
translation_notes:
  revision_awareness: Se revisó la redacción a la luz del texto hebreo masorético y del audit trail inglés; no se detectaron cambios sustantivos necesarios respecto del sentido básico del versículo. Se mantuvo la imagen concreta del paso por el mar, la doble referencia espacial derecha/izquierda y la literalidad transparente de «hijos de Israel».
  spanish_consistency_notes:
  - Se preservó el plural «las aguas» para reflejar el hebreo y el carácter narrativo del pasaje.
  - Se evitó la fórmula eclesiástica «el mar Rojo» porque este versículo en sí no la menciona; solo aparece «el mar».
  - Se optó por «muro» en la comparación implícita para conservar la imagen física fuerte del hebreo.
  - El registro es bíblico y sobrio, con sintaxis natural para lectura pública en español.
