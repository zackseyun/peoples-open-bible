revisions:
- from: 'Y Moab dijo a los ancianos de Madián: «Ahora esta multitud [a] lamerá todo lo que nos rodea [b], como lame el buey la hierba del campo». Balac hijo de Sipor era rey de Moab en aquel tiempo.'
  to: 'Y Moab dijo a los ancianos de Madián: «Ahora esta multitud lamerá[a] todo lo que nos rodea, como lame el buey la hierba del campo[b]». Balac hijo de Sipor era rey de Moab en aquel tiempo.'
  rationale: Se conservó el texto base casi intacto porque es fiel y natural, pero se corrigieron los anclajes de las notas para que correspondan al lugar exacto en el texto y se ajustó la nota [a] para que refleje con precisión la alternativa léxica documentada. También se afinó la nota [b] para expresar mejor que יֶרֶק puede ser más amplio que «hierba».
