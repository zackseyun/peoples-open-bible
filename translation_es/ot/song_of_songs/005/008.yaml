revisions:
- from: 'Os conjuro, hijas de Jerusalén[a]: si encontráis a mi amado, ¿qué le diréis? Que estoy enferma de amor.'
  to: 'Les conjuro, hijas de Jerusalén: si encuentran a mi amado, ¿qué le dirán? Que estoy enferma de amor[a].'
  rationale: Se cambian las formas peninsulares por un español neutral de amplio alcance («les», «encuentran», «dirán»). Se mantiene la literalidad poética del hebreo en «estoy enferma de amor» y se corrige la nota para que aporte una alternativa real, en lugar de repetir el texto principal.
  reviewer_model: gpt-5.4
