- from: 'Se comprará el campo en esta tierra, de la cual ustedes dicen: «Es una desolación, sin hombre ni bestia; ha sido entregada en mano de los caldeos».'
  to: 'Se comprarán campos en esta tierra, de la cual ustedes dicen[a]: «Es una desolación, sin hombre ni bestia[b]; ha sido entregada en manos de los caldeos[c]».'
  rationale: Se corrige «el campo» a «campos» para reflejar el uso colectivo contextual de הַשָּׂדֶה en un pasaje sobre compraventas de terrenos. Se ajusta «en mano de» a «en manos de» por naturalidad idiomática en español. Se añaden notas léxicas paralelas a las del audit trail inglés para preservar alternativas significativas sin alterar el texto principal.
