translation:
  language: es
  text: quien también extendió su amor constante hacia mí[a] delante del rey, de sus consejeros y de todos los poderosos oficiales del rey. Y yo me fortalecí[b], porque la mano de Yahvé mi Dios estaba sobre mí, y reuní de Israel a jefes[c] para subir conmigo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «mostró favor hacia mí»; el hebreo חֶסֶד conserva un matiz de lealtad bondadosa, aunque aquí aparece en contexto cortesano.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «me armé de valor»; el hebreo también puede entenderse como «me fortalecí» en respuesta a la ayuda divina que sigue.'
    reason: lexical_alternative
  - marker: c
    text: Lit. «cabezas»; es decir, hombres principales o dirigentes de Israel.
    reason: lexical_alternative
lexical_decisions:
- source_word: הִטָּה חֶסֶד
  english_pob_choice: extended steadfast love
  chosen_spanish: inclinó su favor hacia mí
  alternatives_spanish:
  - extendió su amor constante hacia mí
  - extendió su misericordia hacia mí
  - mostró favor hacia mí
  lexicon: HALOT
  rationale: El hebreo combina el verbo de ‘inclinar/estirar’ con חֶסֶד; en español, ‘inclinó su favor’ conserva la idea de un movimiento de benevolencia sin forzar una frase poco natural. ‘Favor’ preserva el beneficio cortesano recibido por Ezra, mientras que ‘amor constante’ o ‘misericordia’ serían posibles pero desplazarían el matiz relacional/cortesano del contexto.
- source_word: חֶסֶד
  english_pob_choice: steadfast love
  chosen_spanish: favor
  alternatives_spanish:
  - amor constante
  - misericordia
  - bondad leal
  lexicon: HALOT
  rationale: En este verso la acción se experimenta en la corte persa; ‘favor’ funciona bien en español para el resultado inmediato. No obstante, se mantiene en nota la alternativa con matiz de lealtad pactal porque el POB inglés subraya la carga de חֶסֶד y el texto atribuye la benevolencia última a Dios.
- source_word: לִפְנֵי
  english_pob_choice: before
  chosen_spanish: delante de
  alternatives_spanish:
  - en presencia de
  - a la vista de
  lexicon: HALOT
  rationale: ‘Delante de’ reproduce de modo natural la relación de audiencia/corte y evita una formulación demasiado formal o abstracta.
- source_word: יֹעֲצָיו
  english_pob_choice: his counselors
  chosen_spanish: sus consejeros
  alternatives_spanish:
  - sus consejeros
  - sus asesores
  lexicon: HALOT
  rationale: ‘Consejeros’ es claro y digno en registro cortesano; ‘asesores’ sería posible, pero menos tradicional en este contexto bíblico.
- source_word: שָׂרֵי הַמֶּלֶךְ הַגִּבֹּרִים
  english_pob_choice: the king’s mighty officials
  chosen_spanish: los poderosos oficiales del rey
  alternatives_spanish:
  - los príncipes poderosos del rey
  - los oficiales valientes del rey
  - los grandes oficiales del rey
  lexicon: HALOT
  rationale: ‘שָׂרִים’ apunta a altos oficiales, y ‘הַגִּבֹּרִים’ añade fuerza/estatus. ‘Poderosos oficiales’ conserva ambas ideas sin recurrir a ‘príncipes’, que en español puede sonar menos administrativo y más monárquico/hereditario de lo debido.
- source_word: הִתְחַזַּקְתִּי
  english_pob_choice: I took courage
  chosen_spanish: yo me fortalecí
  alternatives_spanish:
  - tomé ánimo
  - cobré valor
  - me armé de valor
  lexicon: HALOT
  rationale: El hitpael comunica fortalecimiento/embotamiento de ánimo. ‘Me fortalecí’ mantiene la correspondencia léxica con el verbo hebreo y deja abierta la idea de que la fortaleza proviene del apoyo divino en la cláusula siguiente; ‘tomé ánimo’ sería idiomático, pero menos cercano al verbo.
- source_word: כְּיַד ... עָלַי
  english_pob_choice: because the hand of the LORD my God was upon me
  chosen_spanish: porque la mano de Yahvé mi Dios estaba sobre mí
  alternatives_spanish:
  - porque la mano de Yahvé mi Dios estaba sobre mí
  - según la mano de Yahvé mi Dios sobre mí
  - como la mano de Yahvé mi Dios estaba sobre mí
  lexicon: HALOT
  rationale: Se prefiere una causalidad explícita en español, como en la lectura inglesa revisada. ‘La mano de Yahvé ... estaba sobre mí’ preserva la metáfora de presencia/empoderamiento divino sin neutralizarla con una paráfrasis excesiva.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahvé
  - el SEÑOR
  lexicon: HALOT
  rationale: 'Se sigue la norma del proyecto para el Tetragrámaton: transliteración del nombre divino y no sustitución por un título.'
- source_word: וָאֶקְבְּצָה
  english_pob_choice: I gathered
  chosen_spanish: reuní
  alternatives_spanish:
  - junté
  - congregué
  - reuní
  lexicon: HALOT
  rationale: ‘Reuní’ suena natural en español y preserva el sentido de convocar/recoger a un grupo para un propósito concreto.
- source_word: רָאשִׁים
  english_pob_choice: leading men
  chosen_spanish: jefes
  alternatives_spanish:
  - cabezas
  - líderes
  - principales
  lexicon: HALOT
  rationale: El hebreo literalmente dice ‘cabezas’. El POB inglés opta por ‘leading men’ para aclarar que se trata de dirigentes; en español ‘jefes’ conserva esa función de liderazgo sin alargar demasiado la frase. La nota preserva la alternativa literal.
- source_word: לַעֲלוֹת
  english_pob_choice: to go up
  chosen_spanish: para subir
  alternatives_spanish:
  - para subir
  - para ir a Jerusalén
  - para ascender
  lexicon: HALOT
  rationale: ‘Subir’ conserva el idioma bíblico de peregrinación hacia Jerusalén. Aunque el lugar no se nombra aquí, el giro es suficientemente establecido en el libro de Esdras.
- source_word: עִמִּי
  english_pob_choice: with me
  chosen_spanish: conmigo
  alternatives_spanish:
  - conmigo
  lexicon: HALOT
  rationale: Forma pronominal natural y directa en español.
theological_decisions:
- issue: 'Nombre divino: יְהוָה'
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: Se mantiene la transliteración del nombre propio divino conforme al criterio del proyecto y al auditable POB inglés. Esto evita sustituir el nombre por un título genérico y conserva la referencia personal del pacto.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Relación entre la benevolencia cortesana y la acción divina implícita en חֶסֶד
  english_pob_reading: extended steadfast love
  chosen_spanish_reading: inclinó su favor hacia mí
  alternative_spanish_readings:
  - extendió su amor constante hacia mí
  - mostró su favor hacia mí
  rationale: El hebreo permite ver la benevolencia recibida en la corte como resultado de la acción de Dios. ‘Favor’ comunica bien el efecto visible ante el rey, sin borrar la densidad pactal de חֶסֶד, que queda apoyada por la lectura auditada del inglés y por la nota.
  doctrine_reference: Lexical theology of חֶסֶד in HALOT and POB audit trail
- issue: La mano de Yahvé sobre Ezra como lenguaje de apoyo y empoderamiento
  english_pob_reading: because the hand of the LORD my God was upon me
  chosen_spanish_reading: porque la mano de Yahvé mi Dios estaba sobre mí
  alternative_spanish_readings:
  - porque la mano de Yahvé mi Dios estaba sobre mí
  - según la mano de Yahvé mi Dios sobre mí
  rationale: Se preserva la metáfora hebrea de ‘la mano’ como indicio de presencia activa de Dios, sin convertirla en una explicación abstracta. La causalidad explícita en español recoge el sentido del POB revisado.
  doctrine_reference: Biblical idiom of divine empowerment
translation_notes:
  revision_awareness: La redacción sigue de cerca la revisión final del POB inglés, especialmente al evitar una segunda repetición innecesaria de la idea de 'delante de' antes de 'todos los poderosos oficiales'. También conserva la relación causal entre la mano de Dios y el fortalecimiento de Ezra, reflejando la lectura revisada y el dictamen de alta concordancia del audit trail.
  spanish_consistency_notes:
  - Se usa 'Yahvé' para el Tetragrámaton, conforme al criterio del proyecto.
  - Se conserva 'favor' en el cuerpo del texto, con nota que explicita la alternativa de matiz pactal para חֶסֶד.
  - '''Subir'' mantiene el idioma bíblico de ascenso a Jerusalén sin añadir información no presente en el verso.'
  - La secuencia de cargos de corte se traduce con registro administrativo/cortesano ('consejeros', 'oficiales') para evitar un tono medievalizante.
  - Los marcadores de nota aparecen exactamente en el texto donde corresponde, sin reutilización.
