translation:
  language: es
  text: 'Pero ustedes dicen: «¿Por qué?». Porque Yahvé ha sido testigo entre tú y la esposa de tu juventud, a quien le has sido infiel[a], aunque ella es tu compañera y la esposa de tu pacto[b].'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «con quien has actuado deslealmente». El verbo hebreo puede expresar traición, ruptura de lealtad o trato infiel, especialmente en contextos de pacto.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «tu esposa de pacto» o «la esposa de tu pacto».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַאֲמַרְתֶּם
  english_pob_choice: But you say
  chosen_spanish: Pero ustedes dicen
  alternatives_spanish:
  - Y ustedes dicen
  - Mas ustedes dicen
  lexicon: WLC/HALOT
  rationale: El waw adversativo introduce la objeción del pueblo; «Pero» conserva bien ese giro polémico en español y mantiene el diálogo directo.
- source_word: עַל־מָה
  english_pob_choice: Why?
  chosen_spanish: ¿Por qué?
  alternatives_spanish:
  - ¿Por qué razón?
  - ¿Con qué motivo?
  lexicon: WLC/HALOT
  rationale: Es el equivalente idiomático natural del interrogativo de objeción.
- source_word: עַל כִּי
  english_pob_choice: Because
  chosen_spanish: Porque
  alternatives_spanish:
  - Puesto que
  - Ya que
  lexicon: WLC/HALOT
  rationale: Introduce la respuesta causal de manera directa y natural en español.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahveh
  lexicon: WLC/HALOT
  rationale: Se sigue el criterio del proyecto para el nombre divino, transliterando el Tetragrámaton como «Yahvé» en el texto principal.
- source_word: הֵעִיד
  english_pob_choice: has been a witness
  chosen_spanish: ha sido testigo
  alternatives_spanish:
  - ha testificado
  - ha dado testimonio
  lexicon: WLC/HALOT
  rationale: En el contexto jurídico-covenantal, la idea principal es la de testigo entre dos partes; «ha sido testigo» comunica bien esa función.
- source_word: בֵּינְךָ וּבֵין
  english_pob_choice: between you and
  chosen_spanish: entre tú y
  alternatives_spanish:
  - entre ti y
  - entre usted y
  lexicon: WLC/HALOT
  rationale: El hebreo establece dos partes entre las cuales actúa Yahvé como testigo. «Tú» conserva la segunda persona singular del texto hebreo.
- source_word: אֵשֶׁת נְעוּרֶיךָ
  english_pob_choice: the wife of your youth
  chosen_spanish: la esposa de tu juventud
  alternatives_spanish:
  - la mujer de tu juventud
  - la esposa que tuviste en tu juventud
  lexicon: WLC/HALOT
  rationale: Es una traducción directa del idiom. «Esposa» funciona bien en español bíblico contemporáneo y mantiene la relación matrimonial.
- source_word: בָּגַדְתָּה בָּהּ
  english_pob_choice: to whom you have been unfaithful
  chosen_spanish: a quien has sido infiel
  alternatives_spanish:
  - con quien has actuado con deslealtad
  - a quien has traicionado
  lexicon: WLC/HALOT
  rationale: El verbo בגד expresa infidelidad/traición en contexto de pacto. «Has sido infiel» preserva el sentido y suena natural en español; otras opciones quedan como matices posibles.
- source_word: וְהִיא
  english_pob_choice: though she is
  chosen_spanish: aunque ella es
  alternatives_spanish:
  - y ella es
  - sin embargo, ella es
  lexicon: WLC/HALOT
  rationale: Se conserva el matiz concesivo que el inglés POB marca con «though».
- source_word: חֲבֶרְתְּךָ
  english_pob_choice: your companion
  chosen_spanish: tu compañera
  alternatives_spanish:
  - tu compañera de vida
  - tu aliada
  lexicon: WLC/HALOT
  rationale: El término expresa cercanía y asociación; «compañera» es fiel y natural en el contexto conyugal.
- source_word: אֵשֶׁת בְּרִיתֶךָ
  english_pob_choice: your wife by covenant
  chosen_spanish: la esposa de tu pacto
  alternatives_spanish:
  - tu esposa de pacto
  - tu esposa por pacto
  lexicon: WLC/HALOT
  rationale: Se preserva la fuerza de בְּרִית como lenguaje de pacto. «De tu pacto» mantiene la construcción nominal y el peso teológico del texto.
theological_decisions:
- issue: Covenantal marriage language
  english_pob_reading: The verse emphasizes that Yahweh witnesses a covenant bond in marriage and condemns the man's treachery.
  chosen_spanish_reading: El versículo enfatiza que Yahvé actúa como testigo de un vínculo matrimonial de pacto y condena la infidelidad del marido.
  alternative_spanish_readings:
  - Reducirlo a mera deslealtad interpersonal sin énfasis en pacto
  - Suavizar el lenguaje con una formulación menos jurídica
  rationale: La combinación de «testigo» y «pacto» debe mantenerse visible en español, porque el hebreo une claramente el marco relacional con el marco legal-covenantal.
  doctrine_reference: Translation philosophy §§1, 3, 5
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión más reciente del POB inglés, que prefirió «to whom you have been unfaithful» sobre una formulación más dura como «acted treacherously», para mantener naturalidad sin perder el sentido de בגד. La versión española sigue esa decisión con «has sido infiel», y conserva el tono concesivo y el énfasis de pacto del pasaje.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» conforme al estándar del proyecto para el Tetragrámaton.
  - Se tradujo בגד con «ser infiel», que comunica bien la deslealtad matrimonial sin perder la carga de pacto.
  - «Esposa de tu pacto» conserva la relación nominal del hebreo y evita reemplazarla por una formulación eclesiástica no requerida por el texto.
