translation:
  language: es
  text: para construir altares, santuarios e ídolos[a], y sacrificar cerdos y animales impuros,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'animales comunes'; el adjetivo griego puede significar 'común', pero aquí probablemente lleva el sentido de impuro ritual en un contexto de pureza judía.
    reason: lexical_alternative
lexical_decisions:
- source_word: οἰκοδομῆσαι
  english_pob_choice: to build
  chosen_spanish: construir
  alternatives_spanish:
  - edificar
  - levantar
  lexicon: LSJ
  rationale: El infinitivo aoristo mantiene la idea de una acción ordenada. En español, 'construir' comunica bien la instalación de estructuras cultuales y suena natural en la lista paralela de objetos.
- source_word: βωμοὺς
  english_pob_choice: altars
  chosen_spanish: altares
  alternatives_spanish:
  - altares de sacrificio
  - ara
  lexicon: LSJ
  rationale: '''Altares'' es la equivalencia directa y contextualmente precisa para βωμοί en un marco de culto sacrificial.'
- source_word: τεμένη
  english_pob_choice: shrines
  chosen_spanish: santuarios
  alternatives_spanish:
  - recintos sagrados
  - lugares sagrados
  lexicon: LSJ
  rationale: τέμενος puede designar un lugar consagrado o recinto sagrado. 'Santuarios' conserva el sentido cultual sin volverse demasiado técnico y encaja mejor que un calco excesivo.
- source_word: εἴδωλα
  english_pob_choice: idols
  chosen_spanish: ídolos
  alternatives_spanish:
  - imágenes
  lexicon: LSJ
  rationale: En contexto judío polémico y de culto pagano, 'ídolos' reproduce la carga religiosa negativa que requiere el pasaje.
- source_word: θύειν
  english_pob_choice: to sacrifice
  chosen_spanish: sacrificar
  alternatives_spanish:
  - ofrecer sacrificios
  lexicon: LSJ
  rationale: El infinitivo continua la serie de acciones exigidas. 'Sacrificar' es breve, idiomático y preserva el tono cultual.
- source_word: ὕεια
  english_pob_choice: swine
  chosen_spanish: cerdos
  alternatives_spanish:
  - puercos
  - jabalíes
  lexicon: LSJ
  rationale: El término se refiere a cerdos/puercos. 'Cerdos' es claro y natural en español, con el mismo referente léxico básico que el inglés 'swine'.
- source_word: κτῆνη κοινά
  english_pob_choice: unclean animals
  chosen_spanish: animales impuros
  alternatives_spanish:
  - animales comunes
  - ganado impuro
  lexicon: LSJ
  rationale: Aunque κοινός puede significar 'común', en un contexto de pureza judía suele tener fuerza ritual de 'profano/impuro'. 'Animales impuros' comunica esa tensión semántica y el agravio cultual sin depender de una glosa literal que en español podría resultar engañosa.
theological_decisions:
- issue: Valor ritual de κοινά en un contexto de pureza judía
  english_pob_reading: unclean animals
  chosen_spanish_reading: animales impuros
  alternative_spanish_readings:
  - animales comunes
  rationale: La lectura de la POB en inglés opta por explicitar la fuerza ritual del término. En español, 'impuros' transmite mejor la oposición entre lo santo y lo profano en un contexto judío, mientras que 'comunes' podría sonar meramente ordinario y ocultar la transgresión religiosa.
  doctrine_reference: Pureza ritual en la Ley de Moisés; traducción basada en el valor semántico contextual, no en un calco etimológico.
translation_notes:
  revision_awareness: Texto alineado con el pasaje griego de 1 Macabeos 1:47 y con la solución auditada de la POB en inglés; se mantiene la decisión contextual para κοινά como 'impuro' y se conserva una nota alternativa porque el griego admite la acepción literal 'común'.
  spanish_consistency_notes:
  - Se usa 'Yahvé' solo cuando el texto fuente lo requiera; aquí no aparece el nombre divino.
  - Se mantiene 'ídolos' en sentido polémico-cultual, no 'imágenes'.
  - '''Animales impuros'' preserva la tensión terminológica documentada para κοινά y evita la ambigüedad de ''comunes''.'
