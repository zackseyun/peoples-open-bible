  glossary_alignment: No hay conflictos con la terminología base del proyecto. La decisión sobre מַמְזֵר como colectivo está bien alineada con el POB inglés. «Asdod» y «filisteos» son correctos. La única mejora recomendada es ajustar la representación de הִכְרַתִּי para un español más idiomático conservando el valor fuerte del hebreo.
