base_translation:
  language: en
  yaml_path: translation/ot/proverbs/022/003.yaml
  text: A prudent man sees danger and hides himself[b][a], but the simple pass on and suffer for it.
  footnotes:
  - marker: a
    text: Or 'evil,' 'harm,' or 'trouble' for 'danger.' The Hebrew term can denote moral evil or calamity; here it refers to a threatening circumstance the prudent recognizes.
    reason: lexical_alternative
  - marker: b
    text: Or 'are punished.' The Hebrew may emphasize penalty, but in wisdom literature it can also describe suffering the consequences of one's course.
    reason: lexical_alternative
