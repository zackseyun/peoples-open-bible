- from: Entonces harán sonar un cuerno[a] de toque[b] en el mes séptimo, el día diez del mes[c]. En el Día de la Expiación harán sonar el cuerno por toda su tierra.
  to: Entonces harás sonar un cuerno[a] con toque resonante[b] en el mes séptimo, el día diez del mes. En el Día de la Expiación[c] harán sonar el cuerno por toda la tierra de ustedes.
  rationale: Se corrige la persona verbal inicial para reflejar el singular hebreo, se mejora la naturalidad de la expresión para תְּרוּעָה, se aclara el posesivo final en español y se restaura la nota auditada sobre el plural literal de הַכִּפֻּרִים.
