base_translation:
  language: en
  yaml_path: translation/ot/2_samuel/012/031.yaml
  text: And he brought out the people who were in it and put them to work with saws[a], iron picks, and iron axes, and made them labor at the brick kiln. Thus he did to all the cities of the Ammonites[c][b]. Then David and all the people returned to Jerusalem.
  footnotes:
  - marker: a
    text: Or 'put them at the saw, and at iron sharp tools, and at iron cutting instruments.' The exact names of the implements are uncertain.
    reason: lexical_alternative
  - marker: b
    text: Hebrew is difficult; traditionally, 'made them pass through the brick kiln,' and some understand this as execution rather than forced labor.
    reason: alternative_reading
  - marker: c
    text: Compare 1 Chronicles 20:3, a parallel account with similarly difficult wording.
    reason: cross_reference
