lexical_decisions:
- source_word: σὺ δέ
  english_pob_choice: But you
  chosen_spanish: Pero tú
  alternatives_spanish:
  - Y tú
  - Mas tú
  - Ahora tú
  lexicon: LSJ
  rationale: δέ expresa contraste; en español, «Pero tú» conserva la oposición directa y mantiene el énfasis en el interlocutor sin sonar forzado.
- source_word: μοι
  english_pob_choice: to me
  chosen_spanish: me
  alternatives_spanish:
  - a mí
  - en mi opinión
  - para mí
  lexicon: LSJ
  rationale: El dativo con δοκεῖς marca la perspectiva personal del hablante; «me» reproduce esa valoración de manera natural en español.
- source_word: ἀνοητότερον
  english_pob_choice: more foolishly
  chosen_spanish: más insensato
  alternatives_spanish:
  - más neciamente
  - más neciamente aún
  - más irracionalmente
  lexicon: LSJ
  rationale: El comparativo comunica una acción hecha con menos entendimiento; «insensato» conserva la fuerza evaluativa sin el matiz demasiado coloquial de «tonto» o «estúpido».
- source_word: ποιήσειν
  english_pob_choice: to be acting
  chosen_spanish: pareces comportarte
  alternatives_spanish:
  - pareces actuar
  - pareces hacer
  - pareces obrar
  lexicon: LSJ
  rationale: Con δοκεῖς, el infinitivo expresa lo que el destinatario aparenta estar haciendo. «Comportarte» comunica la acción en curso de forma idiomática en español y evita un calco excesivo.
- source_word: δοκεῖς
  english_pob_choice: you seem
  chosen_spanish: me pareces
  alternatives_spanish:
  - pareces
  - me aparentas
  - me das la impresión
  lexicon: LSJ
  rationale: «Me pareces» preserva el valor de apariencia o juicio del hablante, y junto con «Pero tú» mantiene la estructura directa del griego.
translation_notes:
  revision_awareness: 'El griego breve σὺ δέ μοι καὶ ἀνοητότερον ποιήσειν δοκεῖς, fue verificado con la versión inglesa auditada, que entiende δοκεῖς como «you seem» y ποιήσειν como una acción en curso. La redacción española evita traducir mecánicamente desde el inglés: conserva el contraste de δέ, el juicio personal de μοι y el comparativo de ἀνοητότερον. Se eligió una formulación idiomática («me pareces incluso más insensato») que mantiene el sentido sin perder el matiz de observación del hablante.'
  spanish_consistency_notes:
  - Se usó «Pero» para δέ, en vez de «Y» o «Mas», por su claridad contemporánea.
  - Se evitó «Cristo», «SEÑOR» u otros términos no presentes en el versículo.
  - La nota alternativa conserva la posibilidad más literal con infinitivo, porque el inglés audit trail también marcó una opción formal.
