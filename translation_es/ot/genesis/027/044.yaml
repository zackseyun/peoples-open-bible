translation:
  language: es
  text: Y quédate con él unos pocos días[a], hasta que se calme la furia de tu hermano.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «hasta que la furia de tu hermano vuelva atrás». El verbo hebreo dice literalmente «volver/retornar», y aquí se usa de manera idiomática para indicar que la ira disminuye.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְיָשַׁבְתָּ
  english_pob_choice: And stay
  chosen_spanish: Y habita
  alternatives_spanish:
  - Y permanece
  - Y quédate
  - Y reside
  lexicon: HALOT
  rationale: ישׁב abarca 'sentarse, morar, permanecer, quedarse'. En este contexto Jacob debe residir temporalmente fuera de casa; 'habita' conserva el matiz de permanencia sin sonar tan coloquial como 'quédate' ni tan rígido como 'reside'.
- source_word: עִמּוֹ
  english_pob_choice: with him
  chosen_spanish: con él
  alternatives_spanish:
  - junto a él
  - con Laban
  lexicon: HALOT
  rationale: La preposición con sufijo de tercera persona masculina se refiere naturalmente a Labán; 'con él' es la forma directa y fiel en español.
- source_word: יָמִים אֲחָדִים
  english_pob_choice: for a few days
  chosen_spanish: unos pocos días
  alternatives_spanish:
  - algunos días
  - unos días
  - por unos cuantos días
  lexicon: HALOT
  rationale: La expresión hebrea es literalmente 'días, pocos'. 'Unos pocos días' transmite el carácter breve e indefinido del lapso sin exagerar ni convertirlo en una duración precisa.
- source_word: תָּשׁוּב
  english_pob_choice: turns away
  chosen_spanish: se calme
  alternatives_spanish:
  - se vuelva
  - retorne
  - se aplace
  lexicon: HALOT
  rationale: שׁוב significa literalmente 'volver/retroceder'. Con un sujeto abstracto como la ira, en español la idea idiomática se expresa mejor como 'se calme'; aun así, esta versión conserva el sentido de que la furia disminuye y deja de estar activa.
- source_word: חֲמַת
  english_pob_choice: fury
  chosen_spanish: la furia
  alternatives_spanish:
  - la ira
  - el enojo
  - el furor
  lexicon: HALOT
  rationale: חֵמָה/חֲמָה designa una ira ardiente. 'Furia' reproduce mejor la intensidad que 'ira' o 'enojo' y mantiene la fuerza del contexto narrativo.
- source_word: אָחִיךָ
  english_pob_choice: your brother's
  chosen_spanish: de tu hermano
  alternatives_spanish:
  - de tu hermano mayor
  - de tu hermano Esaú
  lexicon: HALOT
  rationale: La cadena constructa se expresa naturalmente en español con 'de tu hermano'. No se nombra a Esaú en el verso hebreo; por fidelidad al texto, se conserva la referencia genérica y contextual.
translation_notes:
  revision_awareness: La revisión inglesa más reciente no introdujo cambios; el texto sigue la lectura aprobada, manteniendo la misma solución idiomática para תָּשׁוּב y la misma temporalidad breve de יָמִים אֲחָדִים.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' como terminología por defecto cuando el nombre divino aparece; este versículo no lo contiene.
  - Se evita 'SEÑOR' porque no hay sustento textual para una sustitución aquí.
  - La traducción conserva el contraste entre la brevedad sugerida por 'unos pocos días' y la intensidad de la furia, sin suavizar el conflicto narrativo.
