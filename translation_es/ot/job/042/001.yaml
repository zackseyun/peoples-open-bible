translation:
  language: es
  text: Entonces Job respondió a Yahvé y dijo:[a]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «YHWH»; tradicionalmente se vierte «el SEÑOR». Entre las alternativas están «Yahvé» y «Jehová».'
    reason: alternative_reading
lexical_decisions:
- source_word: וַיַּעַן
  english_pob_choice: answered
  chosen_spanish: respondió
  alternatives_spanish:
  - contestó
  - respondió
  lexicon: HALOT
  rationale: El hebreo formulaico וַיַּעַן en narrativa suele introducir una réplica; en español, «respondió» mantiene el valor de contestación y fluye de manera natural en un diálogo solemne. «Contestó» también sería posible, pero «respondió» conserva mejor el paralelismo con el registro literario del libro.
- source_word: אִיּוֹב
  english_pob_choice: Job
  chosen_spanish: Job
  alternatives_spanish:
  - —
  lexicon: nombre propio
  rationale: Se conserva el nombre propio tradicional en español, sin transliteración adicional.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  - Jehová
  lexicon: HALOT / tradición de transliteración del nombre divino
  rationale: El proyecto en español usa «Yahvé» como forma principal para el Tetragrámaton, preservando el nombre personal divino del texto hebreo. «Jehová» es una alternativa histórica, pero no es la forma preferida aquí; «Yahweh» refleja la transliteración inglesa del audit trail, pero en español la forma asentada y pronunciable es «Yahvé».
theological_decisions:
- issue: Renderizado del Tetragrámaton יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - Jehová
  - SEÑOR
  rationale: Se mantiene el nombre propio divino en lugar de sustituirlo por un título. Esto preserva la decisión doctrinal del POB de no ocultar el Tetragrámaton. En español, «Yahvé» es la forma principal del proyecto y comunica la misma distinción covenantal que «Yahweh» en inglés.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
translation_notes:
  revision_awareness: El pasaje está en alto acuerdo con el audit trail inglés y no requiere revisión adicional; se conserva la estructura narrativa breve y la única decisión sensible es la traducción del nombre divino.
  spanish_consistency_notes:
  - Se evitó la sustitución por «SEÑOR» para conservar el nombre personal divino, conforme al criterio del proyecto.
  - Se prefirió «respondió» sobre «contestó» por su registro bíblico-literario más estable en español.
  - El pie de nota aclara la tradición de traducción del Tetragrámaton y mantiene visibles las alternativas relevantes.
