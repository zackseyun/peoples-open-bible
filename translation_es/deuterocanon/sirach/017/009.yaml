translation:
  language: es
  text: para que narren los hechos poderosos de sus obras[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'las grandes cosas de sus obras' o 'las grandezas de sus obras'. El griego τὰ μεγαλεῖα puede expresar las grandes cosas o hechos poderosos que manifiestan sus obras.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἵνα
  english_pob_choice: so that
  chosen_spanish: para que
  alternatives_spanish:
  - a fin de que
  - de modo que
  lexicon: BDAG
  rationale: ἵνα expresa finalidad; en español bíblico actual, 'para que' comunica bien el propósito sin sonar forzado.
- source_word: διηγῶνται
  english_pob_choice: they might recount
  chosen_spanish: narren
  alternatives_spanish:
  - recuenten
  - relaten
  - cuenten
  lexicon: BDAG
  rationale: '''Narrar'' conserva el valor de relatar o contar de forma ordenada y pública. ''Recuenten'' sería más cercano al inglés auditado, pero en español ''narren'' suena más natural en este contexto.'
- source_word: τὰ μεγαλεῖα
  english_pob_choice: the mighty deeds
  chosen_spanish: las obras magníficas
  alternatives_spanish:
  - las grandes cosas
  - las hazañas poderosas
  - los grandes hechos
  lexicon: LSJ
  rationale: El plural neutro puede referirse a grandes/magníficas obras o hechos. 'Obras magníficas' evita la redundancia de 'obras... de sus obras' y refleja el matiz de grandeza señalado por la auditoría inglesa.
- source_word: τῶν ἔργων
  english_pob_choice: of his works
  chosen_spanish: de él
  alternatives_spanish:
  - de sus obras
  - de sus hechos
  - de sus obras poderosas
  lexicon: BDAG
  rationale: Para evitar una repetición poco natural en español ('las obras... de sus obras'), se expresa el posesivo mediante 'de él', manteniendo el referente divino sin añadir un sustantivo no presente en la frase griega.
- source_word: αὐτοῦ
  english_pob_choice: his
  chosen_spanish: de él
  alternatives_spanish:
  - su
  - de Dios
  lexicon: BDAG
  rationale: El pronombre se refiere a Dios en el contexto inmediato. En español, 'de él' preserva la referencia sin introducir una glosa interpretativa en el texto principal.
theological_decisions:
- issue: Referencia del posesivo final
  english_pob_reading: God is the referent, yielding 'his works.'
  chosen_spanish_reading: El posesivo se entiende como referencia a Dios, expresada en español como 'de él'.
  alternative_spanish_readings:
  - de Dios
  - sus
  rationale: El contexto de Sirácides 17 atribuye las obras a Dios. 'De él' mantiene la referencia divina sin convertir el versículo en una paráfrasis explicativa; 'de Dios' sería más explícito, pero añade una repetición no exigida por el griego.
  doctrine_reference: Providencia y obras de Dios en la creación y el trato con la humanidad
translation_notes:
  revision_awareness: La revisión inglesa pasó de una abstracción ('the greatness') a una lectura más concreta ('the mighty deeds'). Por eso el español evita una abstracción equivalente y opta por un plural concreto ('obras magníficas'), manteniendo el empuje de acción grande/magnífica del griego.
  spanish_consistency_notes:
  - Se evita 'SEÑOR' porque el versículo no contiene el tetragrámaton ni una cita explícita de κύριος.
  - Se evita 'Cristo' y cualquier terminología cristológica porque el pasaje habla de las obras de Dios en general.
  - Se mantiene un registro reverente pero moderno, apto para lectura pública.
