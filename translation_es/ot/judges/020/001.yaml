revisions:
- from: Entonces salieron todos los hijos de Israel[a], y la congregación se reunió como un solo hombre, desde Dan hasta Beerseba, y desde la tierra de Galaad[c][b], a Yahvé en Mizpa.
  to: Entonces salieron todos los hijos de Israel[a], y la congregación se reunió como un solo hombre[b], desde Dan hasta Beerseba, y desde la tierra de Galaad, ante Yahvé[c], en Mizpa.
  rationale: Se ajusta únicamente la frase final para que el español sea natural y fiel al sentido contextual del hebreo auditado. «Ante Yahvé, en Mizpa» evita una construcción torpe en español, mantiene el nombre divino según el proyecto y deja la opción más literal en nota.
