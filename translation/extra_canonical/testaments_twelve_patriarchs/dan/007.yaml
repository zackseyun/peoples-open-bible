translation:
  text: 'And when he had said these things[a], he kissed them and fell asleep in a good sleep.

    2 And his sons buried him. And after this they carried his bones to the place where Abraham and Isaac and Jacob were.

    3 Nevertheless[b][c], Dan prophesied to them that they would forget their God and would be estranged from the land of their inheritance and from the race of Israel and from the family of their offspring.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The Greek says literally, 'fell asleep in a good sleep,' a reverent euphemism for death.
    reason: lexical_alternative
    anchor_ref: '7:1'
  - marker: c
    text: '''Carried up his bones'' likely refers to later reinterment with the patriarchs.'
    reason: cultural_note
    anchor_ref: '7:2'
  - marker: b
    text: The Greek witness is truncated in this line; the translation follows the recoverable sense that Dan foretold Israel's forgetting God and becoming estranged from inheritance and kin.
    reason: textual_variant
    anchor_ref: '7:3'
lexical_decisions:
- source_word: καταφιλήσας
  chosen: kissed ... affectionately
  alternatives:
  - kissed repeatedly
  - embraced with kisses
  lexicon: LSJ
  rationale: The compound verb intensifies φιλέω/φιλέω-based kissing; 'kissed ... affectionately' preserves warmth without over-specifying repetition in English.
- source_word: ὕπνωσεν ὕπνῳ καλῷ
  chosen: fell asleep in a good sleep
  alternatives:
  - slept a good sleep
  - fell asleep peacefully
  lexicon: LSJ
  rationale: The doubled sleep expression is idiomatic and euphemistic for death in testamentary literature. 'Fell asleep in a good sleep' keeps the rhetorical texture and the euphemistic force better than a flat 'died.'
- source_word: ἀπήνεγκαν τὰ ὀστᾶ αὐτοῦ
  chosen: carried up his bones
  alternatives:
  - brought his bones up
  - transported his bones
  lexicon: LSJ
  rationale: ἀνα-/ἀπο-φέρω language here refers to removal/reinterment of remains. 'Carried up' preserves the concrete action and echoes ancestral-burial formulae.
- source_word: ἔνθα ἦν
  chosen: to the place where ... were
  alternatives:
  - where ... were
  - there where ... were
  lexicon: LSJ
  rationale: A natural English rendering that still reflects the locative force introducing the patriarchal burial place.
- source_word: προεφήτευσεν
  chosen: prophesied
  alternatives:
  - foretold
  - spoke beforehand
  lexicon: LSJ
  rationale: The testament closes with predictive speech; 'prophesied' preserves the elevated register and literary character.
- source_word: ἐπιλά-
  chosen: would forget
  alternatives:
  - would neglect
  - would lose remembrance of
  lexicon: LSJ
  rationale: The broken OCR almost certainly reflects a form of ἐπιλανθάνομαι. 'Would forget' is the most direct and idiomatic rendering in covenantal warning context.
- source_word: ἀλλοτριωθήσονται
  chosen: would be estranged
  alternatives:
  - would become alienated
  - would be made foreigners
  lexicon: LSJ
  rationale: This term carries both separation and alienation. 'Estranged' preserves relational and covenantal distance without forcing a purely ethnic sense.
- source_word: γῆς κληρονομίας
  chosen: land of their inheritance
  alternatives:
  - inheritance-land
  - their allotted land
  lexicon: LSJ
  rationale: This phrase is covenantally charged; 'land of their inheritance' keeps the biblical resonance.
- source_word: γένους Ἰσραήλ
  chosen: race of Israel
  alternatives:
  - people of Israel
  - stock of Israel
  lexicon: LSJ
  rationale: Given the paired genealogical terms in the line, 'race' here preserves descent language more closely than the broader 'people,' though it may later merit revision depending on house style.
- source_word: πατριᾶς τοῦ σπέρματος αὐτῶν
  chosen: family of their offspring
  alternatives:
  - clan of their seed
  - lineage of their descendants
  lexicon: LSJ
  rationale: πατριά denotes family/clan grouping, and σπέρμα here is genealogical. 'Family of their offspring' is readable while retaining descent language.
