base_translation:
  language: en
  yaml_path: translation/ot/isaiah/029/020.yaml
  text: For the ruthless one will come to nothing[a], the scoffer will be finished[b], and all who watch for wrongdoing will be cut off.
  footnotes:
  - marker: a
    text: Or 'the tyrant' for 'the ruthless one.' The Hebrew עָרִיץ can denote an oppressive or violent person.
    reason: lexical_alternative
  - marker: b
    text: Or 'all who are intent on evil' or 'all who lie in wait for iniquity.' The Hebrew participle suggests vigilant, deliberate attention to wrongdoing.
    reason: lexical_alternative
