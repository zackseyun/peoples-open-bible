review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura temporal y el sentido general del hebreo: enseñar el contenido del pacto a la descendencia y hablar de ello en todas las circunstancias cotidianas. Sin embargo, hay dos desajustes importantes con la evidencia fuente y el rastro POB: (1) el cambio de persona de segunda plural/segunda singular a tercera plural en «las enseñarán a sus hijos» no corresponde al hebreo ni al patrón del versículo; debe dirigirse a «ustedes/sus» o, más naturalmente en español bíblico, mantener un imperativo/futuro de segunda persona plural con complementos de segunda persona; (2) «sus hijos» y la nota «sus hijos e hijas» no siguen la decisión auditada de POB, que prefiere un equivalente inclusivo principal (‘children’) y deja ‘sons’ como alternativa. En español, «sus hijos» estrecha indebidamente el alcance principal.'
  spanish_quality_summary: 'La redacción es generalmente clara, pero el arranque «Y las enseñarán a sus hijos» suena inconsistente por el cambio brusco de persona con el resto del versículo («te sientes… te acuestes… te levantes»). Además, «por el camino» es posible, pero «por el camino» puede mantenerse o mejorarse a «por el camino»/«por la carretera»; en contexto bíblico, «por el camino» es aceptable. La mejor reparación mínima es unificar la persona y usar «sus hijos» -> «sus hijos»? No: para fidelidad al POB y al sentido representativo conviene «sus hijos» cambiarlo a «sus hijos[a]» only if preserving Hebrew form, but project audit trail favors broad main text. En español natural, «a sus hijos» también choca con la segunda persona singular restante. Conviene «Y se las enseñarán a sus hijos»? No, sigue el mismo problema. Debe quedar «Se las enseñarán a sus hijos»? Tampoco. Lo correcto y legible es «Se las enseñarán a sus hijos» only if the whole verse were recast, which it is not. Mejor:
    «Les enseñarán estas cosas a sus hijos»? Adds specification. Minimal faithful repair: «Y las enseñarás a tus hijos[a]...» if singular, but Hebrew starts 2mp. Spanish normalmente usa plural exhortativo con singular distributivo en los circunstanciales; sin embargo aquí ya está el patrón del español draft en singular para los infinitivos. La opción más natural es plural en la cláusula principal y singular distributivo después? Aún suena mezclado. Conviene unificar en singular representativo en todo el versículo: «Y las enseñarás a tus hijos[a], hablando de ellas cuando te sientes...»'
  glossary_alignment: 'No hay términos de glosario mayor en disputa, pero sí una desviación respecto a la decisión de género para בְּנֵיכֶם. El audit trail inglés eligió ‘children’ en el texto principal y ‘sons’ en nota alternativa. El español debe reflejar esa rationale: principal «hijos e hijas» sería demasiado expansivo; principal «hijos» es demasiado estrecho. La mejor equivalencia natural y amplia es «hijos[a]» solo si la nota aclara «O ‘tus hijos’»? No reproduce el patrón POB. En español, «hijos» no funciona tan naturalmente como genérico inclusivo contemporáneo. Mejor principal «hijos e hijas» sería más interpretativo que el inglés. La solución más alineada es «tus hijos[a]» con nota «O ‘tus hijos’; el hebreo usa un plural masculino que puede funcionar representativamente para los hijos en general», pero esto invierte la prioridad inglesa. Para preservar la decisión auditada y la legibilidad española, es preferible «tus hijos[a]»? No ideal, pero aceptable con nota. Aun así el problema
    principal a corregir sin rehacer la política es la persona gramatical.'
  issues:
  - severity: high
    issue: Cambio incorrecto de persona gramatical en «las enseñarán a sus hijos»
    rationale: El hebreo comienza con segunda persona plural («ustedes enseñarán») y luego usa formas singulares distributivas («cuando te sientes…»). El borrador pasa a tercera persona plural («enseñarán») con posesivo de tercera persona («sus»), lo cual altera el destinatario del mandato.
  - severity: medium
    issue: La decisión principal «sus hijos» no refleja bien la decisión auditada de POB para בְּנֵיכֶם
    rationale: El inglés POB eligió ‘children’ en el texto principal por valor representativo. «Hijos» en español tiende a oírse más estrecho que el inglés ‘children’, por lo que la elección española necesita al menos reconsideración o mejor justificación.
  - severity: low
    issue: Nota al pie no paralela al audit trail inglés
    rationale: La nota propone «sus hijos e hijas» como alternativa, pero el inglés POB conserva como alternativa ‘your sons’. La nota española debería explicar el valor representativo del masculino sin desplazar la alternativa documentada.
  revised_spanish_text: Y las enseñarás a tus hijos[a], hablando de ellas cuando te sientes en tu casa, cuando camines por el camino, cuando te acuestes y cuando te levantes.
  revised_footnotes:
  - marker: a
    text: O ‘tus hijos’. El hebreo usa un plural masculino que puede funcionar de manera representativa para los hijos en general.
    reason: lexical_alternative
  revision_rationale: Se corrige el cambio erróneo a tercera persona y se unifica la referencia en segunda persona para conservar el sentido exhortativo del hebreo en español natural. También se ajusta la nota para explicar el valor representativo del masculino hebreo sin introducir una expansión principal no documentada en el audit trail.
