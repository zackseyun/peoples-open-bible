base_translation:
  language: en
  yaml_path: translation/ot/1_kings/008/054.yaml
  text: And when Solomon had finished praying to Yahweh all this prayer and plea[a], he rose from before the altar of Yahweh[b], from kneeling on his knees with his hands spread out toward heaven.
  footnotes:
  - marker: a
    text: Or 'supplication' for 'plea for favor.' The Hebrew term denotes an earnest plea for mercy or favor.
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'with his palms spread out toward heaven'; many translations render more generally, 'with his hands spread out to heaven.'
    reason: lexical_alternative
