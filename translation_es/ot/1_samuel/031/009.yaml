review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español sigue bien la secuencia verbal hebrea: cortar la cabeza, despojar el equipo, enviar mensajeros y anunciar la noticia. Conserva correctamente «sus ídolos» para עֲצַבֵּיהֶם y «al pueblo» para וְאֶת הָעָם. Sin embargo, «por toda la tierra de los filisteos, alrededor» es poco natural en español y no representa con buena legibilidad el valor distributivo de סָבִיב; además, la nota [b] está mal anclada porque ofrece como alternativa «y al pueblo», pero el marcador aparece sobre «alrededor».'
  spanish_quality_summary: El texto es generalmente claro, pero presenta una torpeza importante de estilo y de anclaje de nota. «Le quitaron su armadura» es aceptable, aunque «le despojaron de su armadura» o «le quitaron la armadura» sería algo más preciso; no exige cambio. La reparación principal es rehacer la frase territorial para que suene natural en español bíblico moderno y eliminar la nota defectuosa.
  glossary_alignment: No hay conflictos con la terminología base del proyecto. «Ídolos», «buena noticia» y «mensajeros» están alineados con las decisiones auditadas. No aparece ningún término del glosario principal que requiera ajuste adicional.
  issues:
  - severity: medium
    issue: Expresión poco natural de סָבִיב
    rationale: «Por toda la tierra de los filisteos, alrededor» suena forzado en español. El hebreo expresa difusión por todo el territorio; «por toda la tierra de los filisteos» o «por toda la tierra de los filisteos, por todas partes» comunica mejor el sentido.
  - severity: high
    issue: Nota [b] mal vinculada al texto
    rationale: La nota [b] dice «O “y al pueblo”», pero el marcador está colocado tras «alrededor». Esto crea una incoherencia formal y semántica. Debe eliminarse o reubicarse con una alternativa real del segmento anotado.
  revised_spanish_text: Le cortaron la cabeza y le quitaron su armadura[a], y enviaron mensajeros por toda la tierra de los filisteos para dar la buena noticia a la casa de sus ídolos y al pueblo.
  revised_footnotes:
  - marker: a
    text: O «su equipo».
    reason: lexical_alternative
