translation:
  language: es
  text: 'Yo dije: “Ustedes son dioses[a], y todos ustedes son hijos del Altísimo[b].”'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'seres divinos'. El hebreo אֱלֹהִים aquí puede denotar 'dioses' en sentido plural; los intérpretes difieren sobre si el referente son jueces humanos o seres celestiales.
    reason: lexical_alternative
  - marker: b
    text: '''Hijos del Altísimo'' es una expresión hebrea de estatus o afiliación; algunas traducciones la vierten más ampliamente como ''hijos del Altísimo'' en sentido general o ''hijos/as del Altísimo''.'
    reason: lexical_alternative
lexical_decisions:
- source_word: אֲנִי
  english_pob_choice: I
  chosen_spanish: Yo
  alternatives_spanish:
  - Yo mismo
  - Yo
  lexicon: HALOT
  rationale: Se conserva el pronombre independiente para reflejar el énfasis del hebreo y la claridad en español. Aunque puede omitirse en español, aquí se mantiene por fidelidad retórica.
- source_word: אָמַרְתִּי
  english_pob_choice: said
  chosen_spanish: dije
  alternatives_spanish:
  - he dicho
  - hablé
  lexicon: HALOT
  rationale: 'El perfecto qal de 1cs se vierte naturalmente como pasado simple en este contexto poético: ''dije''.'
- source_word: אֱלֹהִים
  english_pob_choice: gods
  chosen_spanish: dioses
  alternatives_spanish:
  - seres divinos
  - Dios
  lexicon: HALOT
  rationale: Aquí אֱלֹהִים se predica del grupo interpelado y funciona en plural; 'dioses' conserva la fuerza léxica directa y la tensión interpretativa del texto.
- source_word: אַתֶּם
  english_pob_choice: you are
  chosen_spanish: ustedes son
  alternatives_spanish:
  - ustedes
  - son
  lexicon: HALOT
  rationale: El pronombre plural de segunda persona se expresa en español con 'ustedes'; la cópula se hace explícita para una lectura natural, aunque el hebreo sea más elíptico.
- source_word: וּבְנֵי
  english_pob_choice: and sons of
  chosen_spanish: y hijos de
  alternatives_spanish:
  - y hijos
  - y descendientes de
  lexicon: HALOT
  rationale: '''Hijos de'' reproduce el paralelismo y el lenguaje de afiliación/status del hebreo con precisión formal. Se prefiere ''hijos'' a ''hijos/as'' o ''descendientes'' por fidelidad idiomática.'
- source_word: עֶלְיוֹן
  english_pob_choice: the Most High
  chosen_spanish: el Altísimo
  alternatives_spanish:
  - Altísimo
  - el Supremo
  lexicon: HALOT
  rationale: Título divino establecido en español. Se mantiene el artículo por tratarse de un apelativo titular, no de un adjetivo común.
- source_word: כֻּלְּכֶם
  english_pob_choice: all of you
  chosen_spanish: todos ustedes
  alternatives_spanish:
  - todos ustedes mismos
  - cada uno de ustedes
  lexicon: HALOT
  rationale: El cuantificador expresa totalidad del grupo. 'Todos ustedes' es la forma más natural y transparente en español.
theological_decisions:
- issue: Sentido de אֱלֹהִים en Psalm 82:6
  english_pob_reading: Retain the direct rendering 'gods' without narrowing the referent in translation.
  chosen_spanish_reading: Mantener 'dioses' sin resolver en la traducción si se refiere a jueces humanos, seres celestiales o una categoría retórica mixta.
  alternative_spanish_readings:
  - seres divinos
  - jueces
  - seres celestiales
  rationale: El hebreo no especifica de manera explícita el referente. En línea con la POB, la traducción preserva la ambigüedad teológica y el filo retórico del pasaje en vez de imponer una interpretación.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
- issue: Paralelismo entre 'gods' y 'sons of the Most High'
  english_pob_reading: '''Sons of the Most High'' is a Hebrew expression of status or affiliation.'
  chosen_spanish_reading: '''Hijos del Altísimo'' se entiende como expresión hebrea de pertenencia o estatus, no como afirmación de filiación biológica.'
  alternative_spanish_readings:
  - hijos del Altísimo
  - hijos del Dios Altísimo
  - descendientes del Altísimo
  rationale: En español, 'hijos de' puede sonar literal; por eso conviene reconocer en nota que el valor es relacional/estatus. La traducción principal conserva la fórmula del hebreo.
  doctrine_reference: Psalm 82:6 lexical/theological note; status language in construct phrases.
translation_notes:
  revision_awareness: La versión inglesa más reciente eliminó 'and ... are' para reflejar mejor la estructura verbal elíptica; en español se optó por una solución igualmente concisa ('ustedes son' / 'todos ustedes') que mantiene el paralelismo poético y la fluidez natural.
  spanish_consistency_notes:
  - Se mantiene 'Altísimo' como título divino fijo, con artículo definido cuando corresponde al español idiomático.
  - Se conserva 'dioses' en minúscula por tratarse del sustantivo común de la predicación, no del nombre divino.
  - La puntuación reproduce un estilo poético solemne con comillas de apertura y cierre en español.
  - No se sustituye 'hijos' por 'hijos/as' para no introducir género ajeno al hebreo y para mantener la fórmula idiomática del constructo.
