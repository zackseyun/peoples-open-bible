    issue: La nota [a] está anclada a «arcilla» pero debería documentar la ambigüedad de «la simiente de los hombres».
    rationale: El rastro de auditoría inglés preserva explícitamente la alternativa «with human seed» y menciona la interpretación «intermarry». La nota española actual introduce un comentario distinto sobre el material, perdiendo una decisión textual importante.
  - severity: medium
    issue: «Barro» al final no refleja suficientemente la especificidad de חַסְפָּא como material de alfarería/carácter cerámico.
    rationale: La decisión inglesa auditada prefirió «clay pottery» para distinguir el término final de la mención previa de arcilla. En español, «barro» solo borra esa distinción; «cerámica de barro» o «alfarería de barro» la preserva mejor.
  - severity: low
