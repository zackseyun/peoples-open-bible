translation:
  language: es
  text: 'y Yirón, Migdal-el[a], Horem, Bet-anat[b] y Bet-semes[b]: diecinueve ciudades, con sus aldeas.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Migdal-el es un nombre de lugar; literalmente, sus componentes pueden significar «torre de Dios/El».
    reason: lexical_alternative
  - marker: b
    text: Bet-anat y Bet-semes son nombres de lugar transliterados; literalmente, «casa de Anat» y «casa del sol».
    reason: lexical_alternative
lexical_decisions:
- source_word: וְ/יִרְאוֹן
  english_pob_choice: and Yiron
  chosen_spanish: y Yirón
  alternatives_spanish:
  - y Irión
  lexicon: HALOT
  rationale: Es un topónimo propio; se translitera en lugar de traducirse. Mantengo la conjunción inicial y adapto la forma al español con acento prosódico natural en la penúltima sílaba.
- source_word: וּ/מִגְדַּל אֵל
  english_pob_choice: Migdal-el
  chosen_spanish: Migdal-el
  alternatives_spanish:
  - Torre de Dios/El
  lexicon: HALOT
  rationale: Como nombre de lugar compuesto, se conserva transliterado. La traducción literal se reserva para nota, porque el texto trata un topónimo ya fijado.
- source_word: חֳרֵם
  english_pob_choice: Horem
  chosen_spanish: Horem
  lexicon: HALOT
  rationale: Nombre propio de lugar; se translitera directamente sin explicar su etimología en el cuerpo del texto.
- source_word: וּ/בֵית עֲנָת
  english_pob_choice: and Beth-anath
  chosen_spanish: Bet-anat
  alternatives_spanish:
  - Bet Anat
  - Casa de Anat
  lexicon: HALOT
  rationale: Se conserva como topónimo compuesto. En español, 'Bet-' reproduce de manera clara el elemento toponímico y evita una traducción literal que desdibujaría el nombre propio.
- source_word: וּ/בֵית שָׁמֶשׁ
  english_pob_choice: and Beth-shemesh
  chosen_spanish: Bet-semes
  alternatives_spanish:
  - Bet Shemesh
  - Casa del sol
  lexicon: HALOT
  rationale: Se mantiene la forma de nombre de lugar. 'Bet-semes' es una transliteración española natural y transparente, sin convertir el topónimo en frase descriptiva.
- source_word: עָרִים
  english_pob_choice: cities
  chosen_spanish: ciudades
  alternatives_spanish:
  - poblaciones
  - aldeas
  lexicon: HALOT
  rationale: En listas territoriales, עָרִים se vierte normalmente como 'ciudades'. En español es la opción más estable y comunicativa, aun cuando el tamaño moderno de una ciudad no coincida con el antiguo.
- source_word: תְּשַׁע עֶשְׂרֵה
  english_pob_choice: nineteen
  chosen_spanish: diecinueve
  alternatives_spanish:
  - diecinueve en total
  lexicon: HALOT
  rationale: El sintagma numeral se expresa idiomáticamente en español como un cardinal simple.
- source_word: וְ/חַצְרֵי/הֶן
  english_pob_choice: with their villages
  chosen_spanish: con sus aldeas
  alternatives_spanish:
  - con sus poblados
  - con sus asentamientos
  lexicon: HALOT
  rationale: En fórmulas de repartición territorial, חַצְרֵי designa dependencias rurales asociadas a las ciudades enumeradas. 'Aldeas' comunica esa relación sin forzar un equivalente demasiado técnico.
translation_notes:
  revision_awareness: 'No se requieren revisiones respecto del paquete fuente: el hebreo presenta una lista de topónimos con recuento total y dependencia rural, y la versión española sigue esa estructura de manera directa.'
  spanish_consistency_notes:
  - Se preserva la transliteración de los topónimos para mantener coherencia con la política POB de nombres de lugar.
  - Se evita traducir Beth-anat y Beth-shemesh como frases descriptivas en el texto principal para no perder su condición de nombres propios.
  - Se usa 'ciudades' y 'aldeas' como equivalentes territoriales estables en listas de heredad, sin añadir información no presente en el hebreo.
