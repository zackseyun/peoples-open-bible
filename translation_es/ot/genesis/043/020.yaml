translation:
  language: es
  text: 'Y dijeron[a]: «Por favor, mi señor[b], bajamos por primera vez para comprar alimento».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «ciertamente bajamos por primera vez para comprar alimento». El hebreo usa un infinitivo absoluto con el verbo finito para dar énfasis.'
    reason: lexical_alternative
  - marker: b
    text: «Mi señor» aquí es un trato respetuoso dirigido a un superior humano, no un título divino.
    reason: cultural_note
lexical_decisions:
- source_word: וַיֹּאמְרוּ
  english_pob_choice: And they said
  chosen_spanish: Y ellos dijeron
  alternatives_spanish:
  - Entonces dijeron
  lexicon: HALOT
  rationale: La forma narrativa con waw consecutiva introduce discurso directo. ‘Y ellos dijeron’ conserva el flujo narrativo hebreo sin forzar una secuencia más interpretativa.
- source_word: בִּי
  english_pob_choice: Please
  chosen_spanish: Por favor
  alternatives_spanish:
  - Te ruego
  - Perdona
  lexicon: HALOT
  rationale: Es una súplica cortés, no el sentido literal de la preposición. ‘Por favor’ expresa la deferencia de manera natural en español actual.
- source_word: אֲדֹנִי
  english_pob_choice: my lord
  chosen_spanish: mi señor
  alternatives_spanish:
  - señor mío
  - mi amo
  lexicon: HALOT
  rationale: Es un tratamiento respetuoso a un superior humano. ‘Mi señor’ conserva el registro elevado sin introducir connotaciones litúrgicas o divinas.
- source_word: יָרֹד יָרַדְנוּ
  english_pob_choice: we came down
  chosen_spanish: hemos bajado
  alternatives_spanish:
  - bajamos
  - sí que bajamos
  lexicon: HALOT
  rationale: El infinitivo absoluto con verbo finito intensifica la acción. En español, el perfecto compuesto transmite adecuadamente el hecho realizado y mantiene una lectura natural; la fuerza enfática queda reflejada de forma sobria en la traducción principal.
- source_word: בַּתְּחִלָּה
  english_pob_choice: the first time
  chosen_spanish: la primera vez
  alternatives_spanish:
  - al principio
  - inicialmente
  lexicon: HALOT
  rationale: En este contexto narrativo se refiere a una visita anterior, no a un comienzo abstracto. ‘La primera vez’ es la equivalencia más clara y fiel.
- source_word: לִשְׁבָּר
  english_pob_choice: to buy
  chosen_spanish: para comprar
  alternatives_spanish:
  - para adquirir
  - para comprar grano
  lexicon: HALOT
  rationale: El verbo alude a procurarse alimentos por compra. ‘Para comprar’ sigue de cerca la función del infinitivo sin añadir más de lo que el verso dice.
- source_word: אֹכֶל
  english_pob_choice: food
  chosen_spanish: alimento
  alternatives_spanish:
  - comida
  - provisiones
  lexicon: HALOT
  rationale: Aunque el contexto amplio trata de grano, el sustantivo aquí es general. ‘Alimento’ conserva esa amplitud y suena digno en español bíblico moderno.
theological_decisions:
- issue: Tratamiento respetuoso a un superior humano en אֲדֹנִי
  english_pob_reading: “my lord” here is a respectful address to a human superior, not a divine title.
  chosen_spanish_reading: “mi señor” aquí es un trato respetuoso dirigido a un superior humano, no un título divino.
  alternative_spanish_readings:
  - “Señor” podría sonar ambiguo en español religioso
  - “mi amo” sería demasiado duro o esclavista
  rationale: Conviene mantener la distinción entre un saludo honorífico humano y los usos teológicos de ‘Señor’. El contexto narrativo y la nota inglesa desaconsejan cualquier lectura divina.
  doctrine_reference: Distinción entre título honorífico humano y lenguaje reverencial aplicado a Dios
- issue: Intensificación hebrea en יָרֹד יָרַדְנוּ
  english_pob_reading: The Hebrew uses an infinitive absolute with the finite verb for emphasis.
  chosen_spanish_reading: El hebreo usa un infinitivo absoluto con verbo finito para dar énfasis, reflejado en español de manera sobria.
  alternative_spanish_readings:
  - reproducirlo con un adverbio explícito como ‘de veras’
  - omitir por completo el énfasis
  rationale: La tensión entre literalidad y fluidez se resuelve manteniendo el sentido enfático sin sobrecargar el español ni perder la forma hebrea subyacente.
  doctrine_reference: N/A
translation_notes:
  revision_awareness: La redacción sigue de cerca el sentido revisado del POB inglés, que mantiene la frase simple ‘we came down the first time to buy food’ sin añadir ‘indeed’. En español se optó por ‘hemos bajado’ para una lectura natural y por ‘alimento’ para conservar la amplitud semántica de אֹכֶל.
  spanish_consistency_notes:
  - Se conserva ‘Yahvé’ como norma del proyecto, aunque este verso no contiene el nombre divino.
  - ‘Mi señor’ se usa solo como tratamiento humano respetuoso en este contexto.
  - ‘Alimento’ evita estrechar indebidamente el término hebreo a ‘grano’.
