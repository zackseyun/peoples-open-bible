  glossary_alignment: «Yahvé» sigue correctamente la norma del proyecto para יְהוָה. «el Dios de nuestros padres», «aflicción» y «opresión» están bien alineados con la documentación. La elección «clamamos» para וַנִּצְעַק es adecuada. El término para עֲמָלֵנוּ conviene ajustarlo a «labor» para reflejar mejor el esfuerzo penoso y evitar un registro demasiado cotidiano.
