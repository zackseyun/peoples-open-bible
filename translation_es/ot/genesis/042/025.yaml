translation:
  language: es
  text: Entonces José dio órdenes de llenar sus recipientes con grano[a], de devolver la plata de cada hombre a su saco[b], y de darles provisiones para el camino. Y así se hizo para ellos[d][c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «sus vasijas»; el término hebreo es más amplio que «saco», que aparece después en el versículo como una palabra distinta.
    reason: lexical_alternative
  - marker: b
    text: «Plata» también puede significar «dinero» en este contexto.
    reason: lexical_alternative
  - marker: c
    text: O «Y él hizo así para ellos». El hebreo no enfatiza tanto al agente como suele hacerlo el español.
    reason: lexical_alternative
  - marker: d
    text: O «Y se hizo para ellos de esa manera».
    reason: previous_rendering
lexical_decisions:
- source_word: וַיְצַו
  english_pob_choice: gave orders
  chosen_spanish: dio órdenes
  alternatives_spanish:
  - mandó
  - ordenó
  lexicon: HALOT
  rationale: צוה expresa impartir una orden. En español, «dio órdenes» conserva el matiz de instrucción oficial y suena natural en registro narrativo.
- source_word: כְּלֵיהֶם
  english_pob_choice: their containers
  chosen_spanish: sus recipientes
  alternatives_spanish:
  - sus vasijas
  - sus contenedores
  - sus vasijas o recipientes
  lexicon: HALOT
  rationale: כְּלִי es un término amplio para utensilio/recipiente. «Recipientes» preserva esa amplitud y evita identificar prematuramente el objeto como «saco», que aparece después con שַׂק.
- source_word: בָּר
  english_pob_choice: grain
  chosen_spanish: grano
  alternatives_spanish:
  - cereal
  - trigo
  lexicon: HALOT
  rationale: En este contexto de escasez y almacenamiento, בָּר se refiere a grano en general. «Grano» es claro y no estrecha indebidamente el referente.
- source_word: וּלְהָשִׁיב כַּסְפֵּיהֶם
  english_pob_choice: to return their silver
  chosen_spanish: de devolver el dinero
  alternatives_spanish:
  - de devolver su plata
  - de devolver su dinero
  lexicon: HALOT
  rationale: כֶּסֶף puede significar «plata» o «dinero» según contexto. Aquí, como el relato enfatiza la devolución del pago, «dinero» comunica la función monetaria en español sin perder el trasfondo literal.
- source_word: אִישׁ אֶל שַׂקּוֹ
  english_pob_choice: each man's silver to his sack
  chosen_spanish: de cada hombre a su saco
  alternatives_spanish:
  - de cada uno a su saco
  - de cada hombre a su costal
  lexicon: HALOT
  rationale: 'אִישׁ tiene fuerza distributiva: «cada hombre». שַׂק es un saco/costal. Se eligió «saco» por ser la correspondencia directa y distinguirlo de כְּלִי.'
- source_word: וְלָתֵת לָהֶם צֵדָה לַדָּרֶךְ
  english_pob_choice: and to give them provisions for the journey
  chosen_spanish: y de darles provisiones para el camino
  alternatives_spanish:
  - y de darles provisiones para el viaje
  - y de darles alimento para el camino
  - y de darles suministros para el camino
  lexicon: HALOT
  rationale: צֵדָה son provisiones o suministros para viajar. «Provisiones para el camino» conserva el sentido de abastecimiento para el trayecto con naturalidad en español.
- source_word: וַיַּעַשׂ לָהֶם כֵּן
  english_pob_choice: And so it was done for them
  chosen_spanish: Y así se hizo con ellos
  alternatives_spanish:
  - Y se hizo así para ellos
  - Y así se hizo para ellos
  - Y fue hecho así con ellos
  lexicon: HALOT
  rationale: El hebreo usa una forma verbal singular con sujeto no explícito. «Se hizo» preserva la impersonalidad y evita sobreespecificar el agente, tal como refleja el audit trail inglés.
translation_notes:
  revision_awareness: 'La redacción sigue de cerca el hebreo y el audit trail en inglés: mantiene la distinción entre כְּלִי y שַׂק, conserva el valor distributivo de אִישׁ y refleja la clausula final impersonal de וַיַּעַשׂ. También incorpora la revisión inglesa más concisa de la fórmula final, expresándola naturalmente en español con «Y así se hizo con ellos».'
  spanish_consistency_notes:
  - Se usó «Y así se hizo con ellos» para mantener la clausula impersonal y concluir con fluidez narrativa.
  - Se mantuvo «grano» para בָּר y «saco» para שַׂק, preservando la distinción léxica del hebreo.
  - «Recipientes» traduce כְּלִי de modo amplio, evitando confundirlo con el término posterior para saco.
  - «Dinero» se usó como equivalente funcional de כֶּסֶף, con nota para la posibilidad literal de «plata».
