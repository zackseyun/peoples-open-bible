    text: Or 'the nation and the kingdom'; the Hebrew pairs two political terms in a distributive warning against any realm that refuses Babylon's rule.
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'put its neck under the yoke,' an image of submitting to Babylonian domination.
    reason: cultural_note
  - marker: c
    text: Or 'until I have consumed them by his hand.'
    reason: alternative_reading
