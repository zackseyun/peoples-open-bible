translation:
  language: es
  text: 'Y cuando llegaron hasta ella, todos a una la bendijeron y le dijeron: «Tú eres la gloria[a] de Jerusalén, tú eres el gran motivo de orgullo de Israel[b], tú eres el gran orgullo[c] de nuestro pueblo».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «la altura de Jerusalén» o «la exaltación de Jerusalén»; el término griego evoca ser levantada en alto.
    reason: lexical_alternative
  - marker: b
    text: O «la gran jactancia de Israel»; el término griego puede entenderse también como aquello en lo que Israel se jacta o se enorgullece.
    reason: lexical_alternative
  - marker: c
    text: O «el gran motivo de orgullo de nuestro pueblo»; el término griego también puede significar «causa de jactancia» o «motivo de gloriarse».
    reason: lexical_alternative
lexical_decisions:
- source_word: εἰσῆλθον πρὸς αὐτήν
  english_pob_choice: came to her
  chosen_spanish: entraron a ella
  alternatives_spanish:
  - vinieron a ella
  - se acercaron a ella
  - entraron en su presencia
  lexicon: LSJ
  rationale: El griego expresa movimiento hacia su presencia con πρὸς y luego acceso real a ella. En español, «entraron a ella» conserva la dirección y la solemnidad sin volverse artificioso; «entraron en su presencia» aclara, pero añade una explicación que el texto no dice explícitamente.
- source_word: εὐλόγησαν
  english_pob_choice: blessed
  chosen_spanish: la bendijeron
  alternatives_spanish:
  - la alabaron
  - hablaron bien de ella
  - la proclamaron dichosa
  lexicon: LSJ
  rationale: En este contexto de aclamación pública, «bendijeron» preserva el registro formal y la fuerza honorífica del verbo. «Alabaron» sería posible, pero pierde el matiz benedictivo que la secuencia de elogios sugiere.
- source_word: πάντες ὁμοθυμαδόν
  english_pob_choice: they all with one accord
  chosen_spanish: todos a una
  alternatives_spanish:
  - todos de común acuerdo
  - todos unánimes
  - todos con un mismo sentir
  lexicon: LSJ
  rationale: «Todos a una» es una fórmula natural en español que comunica unanimidad y acción conjunta. Mantiene el énfasis colectivo de πάντες ὁμοθυμαδόν sin sonar pesado.
- source_word: ὕψωμα
  english_pob_choice: the glory / the exaltation
  chosen_spanish: la gloria
  alternatives_spanish:
  - la exaltación
  - la altura
  - el encumbramiento
  lexicon: LSJ
  rationale: Aunque el valor literal apunta a altura o elevación, el contexto de exclamación pública pide una expresión honorífica. «Gloria» recoge la idea de exaltación sin forzar una construcción poco natural en español; la alternativa literal se reserva en nota.
- source_word: γαυρίαμα
  english_pob_choice: the great boast
  chosen_spanish: el gran motivo de orgullo
  alternatives_spanish:
  - el gran motivo de jactancia
  - el gran orgullo
  - el gran motivo de gloria
  lexicon: LSJ
  rationale: El término remite a aquello de lo que uno se gloría o se jacta. En español, «motivo de orgullo» comunica bien el valor laudatorio sin inducir a una jactancia negativa; conserva el matiz de algo en lo que Israel se honra.
- source_word: καύχημα
  english_pob_choice: the great pride
  chosen_spanish: el gran honor
  alternatives_spanish:
  - el gran motivo de gloria
  - el gran motivo de orgullo
  - la gran jactancia
  lexicon: LSJ
  rationale: Para no repetir exactamente el campo de γαυρίαμα, «honor» expresa la culminación encomiástica del paralelismo. La opción conserva la dignidad del título y evita que el texto suene redundante en español.
- source_word: τοῦ γένους ἡμῶν
  english_pob_choice: of our people
  chosen_spanish: de nuestro pueblo
  alternatives_spanish:
  - de nuestro linaje
  - de nuestra raza
  - de nuestro linaje familiar
  lexicon: LSJ
  rationale: γένος puede referirse a estirpe, grupo étnico o pueblo. «Pueblo» es la equivalencia más natural y menos problemática en español moderno, conservando la referencia colectiva sin introducir connotaciones ajenas.
theological_decisions:
- issue: Títulos honoríficos aplicados a Judith en una proclamación pública
  english_pob_reading: Render the titles straightforwardly as communal praise without softening them into mere compliments.
  chosen_spanish_reading: Traducir los tres predicados como elogio solemne de la comunidad, sin rebajarlos a simples cumplidos.
  alternative_spanish_readings:
  - You are the glory of Jerusalem / la gloria de Jerusalén
  - You are the great boast of Israel / la gran jactancia de Israel
  rationale: El griego presenta tres miembros paralelos de exaltación pública. La traducción mantiene ese tono ceremonial y comunitario, y evita suavizar el pasaje con lenguaje íntimo o meramente decorativo.
  doctrine_reference: Translation philosophy §§1, 6
translation_notes:
  revision_awareness: 'El inglés POB revisó una lectura más literal («entered to her») hacia una forma más natural («came to her») y ajustó el final entre «glory» y «pride». Esta versión española sigue la misma línea de naturalidad controlada: conserva la dirección del griego en «entraron a ella», mantiene el elogio público y vierte ὕψωμα con «gloria» y καύχημα con «honor» para preservar la variedad retórica sin perder el tono elevado.'
  spanish_consistency_notes:
  - Se usa «bendijeron» para εὐλόγησαν en sentido honorífico, coherente con el registro solemne del pasaje.
  - Se evita traducir γένος por «raza» para no introducir una carga moderna ajena al contexto bíblico.
  - Se mantiene la tercera persona singular femenina «la» para Judith en todo el versículo.
  - Las dos notas recogen las alternativas léxicas más relevantes sin sobrecargar el texto principal.
