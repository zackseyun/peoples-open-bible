translation:
  language: es
  text: Tomen mi instrucción[a] en lugar de plata, y conocimiento más que oro selecto[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O también: «mi disciplina»; el hebreo puede llevar un matiz correctivo además de instrucción.'
    reason: lexical_alternative
  - marker: b
    text: 'O también: «oro fino» o «oro escogido».'
    reason: lexical_alternative
lexical_decisions:
- source_word: קְחוּ
  english_pob_choice: Take
  chosen_spanish: Tomad
  alternatives_spanish:
  - Recibid
  - Tomad para vosotros
  lexicon: HALOT
  rationale: El imperativo plural de לקח pide una exhortación directa. «Tomad» conserva la fuerza del mandato y suena natural en español bíblico-digno.
- source_word: מוּסָרִי
  english_pob_choice: my instruction
  chosen_spanish: mi instrucción
  alternatives_spanish:
  - mi disciplina
  - mi corrección
  lexicon: HALOT
  rationale: מוּסָר puede incluir corrección disciplinaria, pero en el paralelo sapiencial con «conocimiento» el matiz pedagógico de «instrucción» comunica mejor la función del texto sin perder la seriedad formativa.
- source_word: וְאַל כָּסֶף
  english_pob_choice: instead of silver
  chosen_spanish: en lugar de plata
  alternatives_spanish:
  - y no plata
  - más bien que plata
  lexicon: HALOT
  rationale: Aunque la forma hebrea usa אַל, aquí funciona idiomáticamente como contraste/preferencia tras el imperativo. «En lugar de plata» expresa esa relación comparativa de manera clara en español.
- source_word: דַעַת
  english_pob_choice: knowledge
  chosen_spanish: conocimiento
  alternatives_spanish:
  - entendimiento
  - saber
  lexicon: HALOT
  rationale: En la literatura sapiencial, דַעַת se refiere al conocimiento valioso y formado por la sabiduría. «Conocimiento» mantiene el paralelo con «instrucción» y el contraste con las riquezas.
- source_word: מֵחָרוּץ נִבְחָר
  english_pob_choice: choice gold
  chosen_spanish: oro escogido
  alternatives_spanish:
  - oro fino
  - oro selecto
  - oro refinado
  lexicon: HALOT
  rationale: La combinación de חָרוּץ con נִבְחָר expresa oro de gran valor, seleccionado o de primera calidad. «Oro escogido» conserva el sentido de algo especialmente valioso sin cargar el verso con un tecnicismo.
translation_notes:
  revision_awareness: El texto base y la auditoría inglesa muestran alta concordancia y no requieren revisión sustantiva; la traducción española sigue la misma decisión de preferencia comparativa entre sabiduría y riqueza.
  spanish_consistency_notes:
  - Se mantiene «instrucción» para מוּסָר, en línea con el contexto sapiencial y sin borrar el posible matiz disciplinario.
  - Se traduce el contraste hebreo con una construcción natural en español («en lugar de» / «más que») para evitar una calca rígida.
  - «Plata» y «oro escogido» conservan el valor material del contraste sin introducir interpretaciones adicionales.
