  glossary_alignment: 'No hay conflictos con la terminología base del proyecto. Los nombres propios están bien en español. ‘Hijos de Israel’ coincide con la decisión documentada. La única mejora recomendada es ajustar הַקְרֵב אֵלֶיךָ a un español más fiel y natural: ‘haz que se acerquen a ti’ o ‘acerca a ti’.'
