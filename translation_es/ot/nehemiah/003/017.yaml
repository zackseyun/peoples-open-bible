translation:
  language: es
  text: 'Después de él, los levitas realizaron trabajos de reparación[a]: Rehum, hijo de Bani. Junto a él[b], Hashabías, gobernador de la mitad del distrito de Queila[c], realizó trabajos de reparación para su distrito.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «repararon»; el verbo hebreo literalmente significa «hacer fuerte», pero en Nehemías 3 se refiere al trabajo de reparación del muro.
    reason: lexical_alternative
  - marker: b
    text: Literalmente «a su mano»; es un modismo que aquí significa «junto a él» o «a su lado».
    reason: lexical_alternative
  - marker: c
    text: O «para su sección». El hebreo puede referirse tanto al distrito bajo su autoridad como a la porción asignada para él.
    reason: lexical_alternative
lexical_decisions:
- source_word: הֶחֱזִיקוּ / הֶחֱזִיק
  english_pob_choice: carried out repairs
  chosen_spanish: hicieron las reparaciones
  alternatives_spanish:
  - repararon
  - fortalecieron
  lexicon: HALOT
  rationale: En Nehemías 3 el verbo hiphil de חזק funciona como fórmula idiomática para la obra de reconstrucción del muro. En español, 'hicieron las reparaciones' conserva ese valor de trabajo material sin forzar un calco como 'fortalecieron'.
- source_word: הַלְוִיִּם
  english_pob_choice: the Levites
  chosen_spanish: los levitas
  alternatives_spanish:
  - los levíticos
  lexicon: HALOT
  rationale: El término designa al grupo tribal/religioso conocido en español como 'levitas'. Mantenerlo evita una paráfrasis innecesaria y preserva la identidad del grupo.
- source_word: רְחוּם בֶּן־בָּנִי
  english_pob_choice: Rehum son de Bani
  chosen_spanish: Rehum, hijo de Bani
  alternatives_spanish:
  - Rehum, hijo de Bani
  lexicon: HALOT
  rationale: Los nombres propios se transliteran y el hebreo genealógico בן se vierte de forma natural como 'hijo de'. Se mantiene la identificación personal sin añadir información.
- source_word: עַל יָדוֹ
  english_pob_choice: Next to him
  chosen_spanish: Junto a él
  alternatives_spanish:
  - Al lado de él
  - A su lado
  lexicon: HALOT
  rationale: La expresión literalmente es 'a su mano', pero en esta lista de trabajo significa ubicación contigua. 'Junto a él' conserva la relación espacial y suena natural en español.
- source_word: שַׂר חֲצִי פֶלֶךְ קְעִילָה
  english_pob_choice: ruler of half the district of Keilah
  chosen_spanish: gobernador de la mitad del distrito de Queila
  alternatives_spanish:
  - jefe de la mitad del distrito de Queila
  - ruler of half the district of Queila
  lexicon: HALOT
  rationale: שַׂר señala una autoridad gobernante; 'gobernador' comunica bien esa función en español sin debilitarla. פֶלֶךְ aquí es una unidad administrativa, por lo que 'distrito' refleja el sentido contextual.
- source_word: לְפִלְכּוֹ
  english_pob_choice: for his district
  chosen_spanish: para su distrito
  alternatives_spanish:
  - en su distrito
  - por su distrito
  lexicon: HALOT
  rationale: El prefijo ל expresa aquí esfera de responsabilidad o referencia administrativa. 'Para su distrito' conserva la ambigüedad útil entre trabajo realizado en esa jurisdicción y trabajo hecho en nombre de ella.
theological_decisions:
- issue: Tratamiento de YHWH ausente en el versículo
  english_pob_reading: No aparece una forma divina en el texto; no hay decisión de sustitución.
  chosen_spanish_reading: No se introduce ninguna referencia divina artificial.
  alternative_spanish_readings:
  - Incluir una mención implícita de Dios
  rationale: El hebreo de este versículo es puramente administrativo y narrativo. Para respetar el texto fuente, no se añade vocabulario teológico donde no está presente.
  doctrine_reference: Fidelidad textual / no adición
- issue: Valor del verbo hifil de חזק en contexto de muro
  english_pob_reading: carried out repairs
  chosen_spanish_reading: hizo las reparaciones
  alternative_spanish_readings:
  - reparó
  - fortaleció
  rationale: La forma verbal conserva una tensión entre 'fortalecer' y 'reparar'. En este contexto de muro, la lectura práctica es la de obra de reparación; el español mantiene esa decisión sin borrar la base semántica de 'fortalecer'.
  doctrine_reference: Semántica contextual del trabajo de reconstrucción
- issue: Posible alcance de לְפִלְכּוֹ
  english_pob_reading: for his district
  chosen_spanish_reading: para su distrito
  alternative_spanish_readings:
  - en su distrito
  - por su distrito
  rationale: El hebreo puede referir la jurisdicción bajo su autoridad o la porción asignada para reparar. El español mantiene esa misma amplitud sin resolverla artificialmente.
  doctrine_reference: Ambigüedad administrativa respetada
translation_notes:
  revision_awareness: Se revisó el patrón recurrente de Nehemías 3 y se mantuvo la fórmula de reparación con terminología española natural, conservando la ambigüedad administrativa del hebreo y la relación espacial de עַל יָדוֹ. No se requirieron cambios respecto al pasaje base auditado.
  spanish_consistency_notes:
  - Se usa 'levitas' para הַלְוִיִּם, consistente con el término bíblico estándar en español.
  - Se conserva 'Queila' como transliteración de קְעִילָה, alineada con el nombre propio del contexto bíblico.
  - Se mantiene la fórmula repetida 'hizo las reparaciones' para reflejar la estructura iterativa de Nehemías 3.
  - Se evita 'SEÑOR' u otra sustitución teológica, ya que el versículo no contiene el nombre divino.
