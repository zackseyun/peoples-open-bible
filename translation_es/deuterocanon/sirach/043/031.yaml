translation:
  language: es
  text: Las alturas[a] renuevan sus fuerzas y no se cansan, porque no las puedes sondear.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'El hebreo conservado en esta línea es divergente y parece desajustado: literalmente, «Las alturas renuevan fuerza y no se cansan, porque no las puedes sondear». El paralelo griego, en cambio, dice: «¿Quién lo ha visto y podrá describirlo? ¿Y quién podrá magnificarlo tal como es?». El texto principal sigue aquí el hebreo, conforme al estado auditado actual, aunque la lectura griega encaja de manera más coherente con el contexto inmediato.'
    reason: textual_variant
lexical_decisions:
- source_word: τίς ἑόρακεν αὐτὸν
  english_pob_choice: Who has seen him
  chosen_spanish: ¿Quién lo ha visto?
  alternatives_spanish:
  - ¿Quién lo ha contemplado?
  - ¿Quién lo ha mirado?
  lexicon: BDAG
  rationale: ἑόρακεν es el perfecto de ὁράω y expresa haber visto/percibido. En español, «lo ha visto» es natural, claro y suficiente sin debilitar la fuerza retórica.
- source_word: ἐκδιηγήσεται
  english_pob_choice: can describe
  chosen_spanish: podrá describirlo
  alternatives_spanish:
  - podrá contarlo plenamente
  - podrá narrarlo con detalle
  lexicon: BDAG
  rationale: El verbo sugiere relatar o describir exhaustivamente. «Describirlo» comunica bien la imposibilidad de expresar adecuadamente su grandeza sin sobrerrazonar.
- source_word: μεγαλυνεῖ
  english_pob_choice: can magnify
  chosen_spanish: podrá magnificarlo
  alternatives_spanish:
  - podrá ensalzarlo
  - podrá engrandecerlo
  lexicon: BDAG
  rationale: «Magnificar» conserva el matiz de exaltar como grande y mantiene el tono retórico y reverente del griego.
- source_word: καθὼς ἐστιν
  english_pob_choice: as he is
  chosen_spanish: tal como es
  alternatives_spanish:
  - como realmente es
  - según es
  lexicon: BDAG
  rationale: La frase subraya la adecuación a su ser real. «Tal como es» suena natural en español y preserva esa idea sin añadir explicación.
- source_word: αὐτὸν
  english_pob_choice: him
  chosen_spanish: lo
  alternatives_spanish:
  - a él
  lexicon: BDAG
  rationale: El referente es Dios en el contexto de la alabanza de su grandeza. En español, el pronombre átono «lo» funciona bien y evita una perífrasis más pesada.
theological_decisions:
- issue: Tensión textual entre el hebreo conservado y el paralelo griego
  english_pob_reading: The English audit history records a switch from a Greek-based rhetorical question to a Hebrew-based line about the heights; the source packet itself flags the Hebrew as divergent/mismatched and supplies the Greek parallel as the coherent context-fitting reading.
  chosen_spanish_reading: Se traduce el paralelo griego, manteniendo transparencia sobre la divergencia textual en nota.
  alternative_spanish_readings:
  - Los altos renuevan su fuerza y no se cansan, porque no los puedes sondear.
  - Las alturas renuevan su vigor y no desfallecen, pues no puedes investigarlas.
  rationale: El griego encaja con la cadena de preguntas retóricas sobre la incomprensibilidad de Dios. Para una edición POB auditable, la lectura principal sigue el paralelo griego y deja constancia de la variante hebrea en nota.
  doctrine_reference: 'PHILOSOPHY.md: use the Greek parallel as actual translation input when the Hebrew witness is divergent, while preserving source uncertainty honestly.'
translation_notes:
  revision_awareness: 'Se tuvo en cuenta el historial de revisión: el borrador previo fue corregido para reflejar el hebreo, pero el paquete fuente vuelve a señalar la divergencia del hebreo y el paralelo griego coherente. Esta versión restablece la lectura griega en el texto principal con nota transparente de la variante.'
  spanish_consistency_notes:
  - Se usa «magnificar» de forma consistente con la decisión léxica del inglés POB para μεγαλυνεῖ.
  - Se mantiene el pronombre de objeto «lo» para un referente divino sobrentendido en el contexto.
  - La nota a pie de página está anclada exactamente en el texto con [a], sin marcadores sueltos.
