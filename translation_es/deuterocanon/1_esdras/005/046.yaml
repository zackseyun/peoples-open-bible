revisions:
- from: Cuando llegó el séptimo mes[a], y los hijos de Israel[b] estaban cada uno en sus propios lugares[c], se reunieron unánimes en el espacio abierto de la primera puerta, la del oriente.
  to: Cuando llegó el séptimo mes[a], y los hijos de Israel[b] estaban cada uno en sus propios lugares[c], se reunieron unánimes en el espacio abierto[d] de la primera puerta del lado oriental.
  rationale: 'La revisión conserva el sentido del borrador, pero restaura dos elementos del rastro de auditoría inglés que no deberían perderse en español: la nota de referencia cruzada sobre «cada uno en sus propios lugares» y la nota léxica sobre εὐρύχωρον. Además, ajusta la frase final a una forma más transparente y natural en español: «la primera puerta del lado oriental».'
