translation:
  language: es
  text: Un Maskil de David[a], cuando estaba en la cueva[b]. Una oración.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebreo Maskil, término técnico en los títulos de salmos; puede indicar una composición de meditación o de instrucción.
    reason: lexical_alternative
  - marker: b
    text: O ‘para David’ o ‘por David’; el encabezado hebreo puede indicar autoría, dedicación o asociación.
    reason: alternative_reading
lexical_decisions:
- source_word: מַשְׂכִּיל
  english_pob_choice: Maskil
  chosen_spanish: Maskil
  alternatives_spanish:
  - contemplación
  - instrucción
  - canto sapiencial
  lexicon: HALOT
  rationale: Conservo la transliteración del término técnico del encabezamiento para no imponer un sentido interpretativo único donde el hebreo tiene fuerza de etiqueta literaria y su alcance preciso es debatido.
- source_word: לְדָוִד
  english_pob_choice: of David
  chosen_spanish: de David
  alternatives_spanish:
  - para David
  - por David
  - perteneciente a David
  lexicon: HALOT
  rationale: '‘De David’ mantiene en español la misma ambigüedad del hebreo ל: puede señalar autoría, dedicación o asociación, sin cerrar indebidamente la relación.'
- source_word: בִּהְיוֹתוֹ
  english_pob_choice: when he was
  chosen_spanish: cuando estaba
  alternatives_spanish:
  - mientras estaba
  - al estar
  - cuando él era
  lexicon: HALOT
  rationale: La construcción temporal se expresa naturalmente en español con ‘cuando estaba’, manteniendo el valor temporal del infinitivo con prefijo ב sin volverlo artificial.
- source_word: בַמְּעָרָה
  english_pob_choice: in the cave
  chosen_spanish: en la cueva
  alternatives_spanish:
  - en una cueva
  - en la caverna
  lexicon: HALOT
  rationale: El artículo definido hebreo justifica ‘la cueva’. ‘Cueva’ es el equivalente natural en español, más común y claro que ‘caverna’ para este contexto.
- source_word: תְפִלָּה
  english_pob_choice: A prayer
  chosen_spanish: Una oración
  alternatives_spanish:
  - Oración
  - Un salmo de oración
  - Una plegaria
  lexicon: HALOT
  rationale: El sustantivo final funciona como rótulo de género o encabezado apposicional. ‘Una oración’ conserva la brevedad nominal del hebreo y su valor titular sin añadir interpretación.
translation_notes:
  revision_awareness: 'Se revisó el encabezado hebreo junto con el texto auditado en inglés. No hubo cambios en la valoración general: se mantiene la ambigüedad de לְדָוִד y el carácter técnico de מַשְׂכִּיל, con una formulación española natural y publicable.'
  spanish_consistency_notes:
  - Se usó ‘Dios’/‘Yahvé’ según no aplicaba aquí; no hay sustituciones teológicas en este versículo.
  - Se mantuvo el estilo de encabezado poético con dos oraciones breves, reflejando la segmentación del inglés auditado y el hebreo.
  - Se prefirió ‘cueva’ en lugar de un término más culto para conservar claridad y cercanía al registro del salmo.
