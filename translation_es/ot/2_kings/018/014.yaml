translation:
  language: es
  text: 'Entonces Ezequías, rey de Judá, envió al rey de Asiria, que estaba en Laquis[a], diciendo: «He pecado. Retírate de mí. Todo lo que me impongas[b], lo soportaré». Y el rey de Asiria impuso a Ezequías, rey de Judá, trescientos talentos de plata y treinta talentos de oro.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «a Laquis»; la forma hebrea puede indicar movimiento hacia Laquis, aunque aquí probablemente identifica el lugar donde estaba el rey de Asiria.
    reason: lexical_alternative
  - marker: b
    text: O «Todo lo que pongas sobre mí, lo llevaré». El hebreo habla de soportar o cargar con cualquier peso u obligación impuesta.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּשְׁלַח
  english_pob_choice: sent
  chosen_spanish: envió
  alternatives_spanish:
  - mandó
  - despachó
  lexicon: HALOT
  rationale: En este contexto narrativo, שׁלח expresa el envío de un mensaje o delegados. «Envió» es natural en español y conserva la brevedad del hebreo sin perder el sentido comunicativo implícito.
- source_word: לָכִישָׁה
  english_pob_choice: at Lachish
  chosen_spanish: en Lachis
  alternatives_spanish:
  - a Lachis
  - hacia Lachis
  lexicon: HALOT
  rationale: La terminación direccional puede leerse como movimiento hacia Lachis, pero el contexto histórico sugiere la ubicación del rey de Asiria. «En Lachis» refleja esa lectura contextual en español con fluidez.
- source_word: חָטָאתִי
  english_pob_choice: I have offended
  chosen_spanish: He pecado
  alternatives_spanish:
  - He ofendido
  - He hecho mal
  lexicon: HALOT
  rationale: Aunque el contexto es diplomático, el hebreo usa el verbo normal para «pecar». «He pecado» preserva la fuerza moral/religiosa del término mejor que una formulación suavizada.
- source_word: שׁוּב מֵעָלַי
  english_pob_choice: Withdraw from me
  chosen_spanish: Retírate de mí
  alternatives_spanish:
  - Vuélvete de mí
  - Aléjate de mí
  lexicon: HALOT
  rationale: שׁוב con מעל expresa volver atrás o apartarse de una presión hostil. «Retírate de mí» comunica bien la retirada militar/política en español actual.
- source_word: אֵת אֲשֶׁר תִּתֵּן עָלַי
  english_pob_choice: Whatever you impose on me
  chosen_spanish: Todo lo que me impongas
  alternatives_spanish:
  - Lo que pongas sobre mí
  - Cualquier carga que pongas sobre mí
  lexicon: HALOT
  rationale: נתן על indica colocar una carga, obligación o gravamen. «Impon-» mantiene el valor de tributo o carga sin especificarlo en exceso en el texto principal.
- source_word: אֶשָּׂא
  english_pob_choice: I will bear
  chosen_spanish: lo soportaré
  alternatives_spanish:
  - lo llevaré
  - lo pagaré
  lexicon: HALOT
  rationale: נשא aquí conserva la imagen de cargar un peso o imposición. «Lo soportaré» es idiomático en español y mantiene la idea de cargar con la obligación.
- source_word: וַיָּשֶׂם ... עַל
  english_pob_choice: imposed on
  chosen_spanish: impuso a
  alternatives_spanish:
  - puso sobre
  - cargó sobre
  - tasó a
  lexicon: HALOT
  rationale: שׂים על se usa para establecer una obligación o tributo. «Impuso a» enlaza coherentemente con «me impongas» y sugiere una carga fiscal/política real.
- source_word: כִּכַּר
  english_pob_choice: talents
  chosen_spanish: talentos
  alternatives_spanish:
  - talentos de peso
  - unidades de talento
  lexicon: HALOT
  rationale: כִּכַּר es la medida antigua de peso normalmente vertida como «talento». Es la opción española estándar y suficientemente transparente para el lector.
- source_word: כֶּסֶף
  english_pob_choice: silver
  chosen_spanish: plata
  alternatives_spanish:
  - plata (metal)
  - argento
  lexicon: HALOT
  rationale: En español bíblico, «plata» es el equivalente natural de כֶּסֶף cuando se trata de tributo medido por peso.
- source_word: זָהָב
  english_pob_choice: gold
  chosen_spanish: oro
  alternatives_spanish:
  - oro fino
  - oro amarillo
  lexicon: HALOT
  rationale: El sentido léxico directo es «oro», y la unidad de peso ya indica que se trata de una carga valiosa tributaria.
theological_decisions:
- issue: Tono moral de la confesión de Ezequías
  english_pob_reading: Rendered חָטָאתִי as 'I have offended'
  chosen_spanish_reading: He pecado
  alternative_spanish_readings:
  - He ofendido
  - He errado
  rationale: Aunque la situación es política, el hebreo usa el verbo estándar para pecado. La traducción conserva la carga moral y religiosa del término en lugar de reducirla a una simple descortesía diplomática.
  doctrine_reference: Translation philosophy §1, §6
- issue: Grado de explicitación en la carga impuesta
  english_pob_reading: Whatever you impose on me, I will bear
  chosen_spanish_reading: Todo lo que me impongas, lo soportaré
  alternative_spanish_readings:
  - Cualquier tributo que me impongas, lo pagaré
  - Todo lo que pongas sobre mí, lo llevaré
  rationale: Se mantiene el alcance amplio del hebreo sin cerrar prematuramente la expresión en «tributo» o «multa» en la línea principal. El contexto siguiente aclara que la imposición es monetaria.
  doctrine_reference: Translation philosophy §1, §5
translation_notes:
  revision_awareness: La revisión más reciente del audit trail cambió la primera traducción inglesa de «I have sinned» a «I have offended» por mayor naturalidad en el contexto diplomático; para el español, se evaluó esa tensión, pero se conservó «He pecado» porque el hebreo usa el verbo estándar חָטָא y así se preserva mejor su fuerza moral. El resto del versículo sigue de cerca la lectura revisada y la decisión léxica sobre la carga impuesta.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma del proyecto, pero este versículo no contiene el tetragrámaton.
  - «Lachis» se escribe con la grafía española usual para el topónimo bíblico; la nota aclara la ambigüedad direccional.
  - «Talentos» se conserva como medida de peso tradicional en español bíblico.
  - Se evita «siervo» o vocabulario interpretativo no presente en el hebreo.
  - La concordancia verbal y los pronombres se ajustan a un español natural y reverente, sin calco innecesario.
