review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien la estructura y la fuerza directiva del hebreo: contraste inicial, serie de acciones destructivas concretas, y mantenimiento de la distinción entre altares, piedras/pilares cultuales, objetos de Asera y imágenes talladas. Sin embargo, hay un desajuste de anclaje de notas heredado del inglés: la nota [a] está colocada sobre «altares», pero en la evidencia inglesa y en el hebreo la alternativa léxica corresponde a מַצֵּבֹתָם («pilares/piedras erguidas»), no a «altares».'
  spanish_quality_summary: El español es claro, digno y generalmente natural. No obstante, «Aseras» puede entenderse como plural de la diosa más que como objetos cultuales; «postes de Asera» comunica mejor el referente documentado por el POB y combina mejor con «cortarán». Además, la nota cultural debe reflejar «Aserim»/«Asherim» con referencia a postes u objetos cultuales, no dejar ambigüedad. «En el fuego» es aceptable, aunque «con fuego» sería más literal; no requiere cambio.
  glossary_alignment: Sin términos de glosario mayores en juego como Yahvé/Mesías. La decisión clave documentada es אֲשֵׁרִים = «Asherah poles»; el borrador se aparta innecesariamente con «Aseras». «Imágenes talladas» alinea bien con פְסִילֵיהֶם. «Columnas» es comprensible, pero «pilares» armoniza mejor con la nota léxica ya documentada.
  issues:
  - severity: high
    issue: La nota [a] está anclada a «altares», pero pertenece a «pilares».
    rationale: El inglés auditado preserva la alternativa léxica para מַצֵּבֹתָם, no para מִזְבְּחֹתֵיהֶם. Así como está, la nota induce una lectura incorrecta del hebreo.
  - severity: medium
    issue: «Aseras» no refleja tan claramente como el audit trail el sentido de objeto cultual de אֲשֵׁרִים.
    rationale: La decisión inglesa y teológica favorece «Asherah poles». En español, «Aseras» puede sonar a nombre propio o a imágenes de la diosa; «postes de Asera» preserva mejor el referente y encaja semánticamente con «cortar».
  - severity: low
    issue: «Columnas» es menos preciso que «pilares» para מַצֵּבֹתָם en este contexto cultual.
    rationale: «Pilares» conecta mejor con la decisión léxica inglesa y con las alternativas de nota («pilares sagrados», «piedras erguidas»), evitando resonancias arquitectónicas excesivas de «columnas».
  revised_spanish_text: 'Pero esto es lo que ustedes harán con ellos: derribarán sus altares, quebrarán sus pilares[a], cortarán sus postes de Asera[b] y quemarán sus imágenes talladas[c] en el fuego.'
  revised_footnotes:
