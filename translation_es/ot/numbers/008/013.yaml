revisions:
- from: Y harás que los levitas se pongan delante de Aarón y delante de sus hijos[a], y los presentarás como ofrenda mecida a Yahvé.
  to: Y pondrás a los levitas delante de Aarón y delante de sus hijos varones, y los presentarás[a] como ofrenda mecida a Yahvé.
  rationale: Se ajusta בָנָיו a una forma inequívocamente masculina conforme a la auditoría lexical del POB; se mejora la naturalidad de וְהַעֲמַדְתָּ con «pondrás»; y se reubica la nota para que explique la alternativa literal del verbo ritual donde realmente corresponde.
