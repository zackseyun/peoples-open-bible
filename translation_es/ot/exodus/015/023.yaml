- from: Entonces llegaron a Mará[a], pero no pudieron beber el agua de Mará, porque era amarga. Por eso se le puso por nombre Mará.
  to: Entonces llegaron a Marah[a], pero no pudieron beber el agua de Marah, porque era amarga. Por eso fue llamado Marah.
  rationale: Se ajusta el topónimo a «Marah» para conservar la transliteración documentada y el vínculo con el juego de palabras del hebreo. También se simplifica la cláusula de nombramiento con una pasiva natural en español y se afina la nota para reflejar mejor la explicación léxica sin forzar la concordancia de género española.
