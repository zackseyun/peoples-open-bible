review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien la estructura y el sentido general del hebreo: Rahab explica el temor porque han oído del secamiento del Yam Suf por Yahvé al salir Israel de Egipto, y de lo que Israel hizo a Sihón y a Og. También mantiene correctamente «Yahvé» y conserva en nota la alternativa literal de Yam Suf. Sin embargo, la redacción de חרם como «consagraron a la destrucción» suena menos idiomática y más ambigua en español eclesial general que una formulación más directa como «los dedicaron al exterminio», que preserva mejor la fuerza técnico-teológica de ḥerem sin sonar artificial.'
  spanish_quality_summary: El español es claro y ampliamente legible. «Porque hemos oído» y «delante de ustedes» funcionan bien. «A los dos reyes amorreos» y «al otro lado del Jordán» son naturales. El único problema importante de estilo y precisión es «consagraron a la destrucción», que en español puede sugerir una consagración cultual poco clara; «dedicaron al exterminio» comunica mejor el valor de ḥerem. Además, conviene armonizar la nota con la transliteración española usual «Yam Suf».
  glossary_alignment: 'El borrador cumple bien con los términos del proyecto en «Yahvé». No hay conflicto con Mesías/Cristo ni otros términos programáticos. Para חרם, la intención del POB se mantiene, pero la elección española puede mejorarse para conservar la fuerza léxica con mayor naturalidad: «dedicaron al exterminio» o «entregaron a la destrucción» funcionan mejor que «consagraron a la destrucción».'
  issues:
  - severity: medium
    issue: «consagraron a la destrucción» para הֶחֱרַמְתֶּם
    rationale: Aunque intenta preservar el matiz de ḥerem, en español suena forzado y puede sugerir una consagración cultual ambigua. Una formulación como «los dedicaron al exterminio» comunica mejor la idea de poner bajo ḥerem con resultado destructivo.
  - severity: low
    issue: 'Nota léxica: «Yam Suf» frente a la forma inglesa/hebrea variada'
    rationale: 'La nota ya cumple su función, pero conviene mantener una transliteración española consistente en todo el registro: «Yam Suf», tradicionalmente «Mar Rojo»; más literalmente, «Mar de Juncos».'
  revised_spanish_text: Porque hemos oído cómo Yahvé secó las aguas del Mar Rojo[a] delante de ustedes cuando salieron de Egipto, y lo que hicieron a los dos reyes amorreos que estaban al otro lado del Jordán, a Sihón y a Og, a quienes dedicaron al exterminio.
  revised_footnotes:
  - marker: a
    text: Hebreo Yam Suf, tradicionalmente «Mar Rojo»; más literalmente, «Mar de Juncos».
    reason: lexical_alternative
  revision_rationale: 'Se hace un ajuste léxico menor pero importante: «dedicaron al exterminio» preserva mejor el sentido de חרם en español natural y claro. También se suaviza la puntuación de la enumeración para que fluya mejor en español, y se mantiene la nota léxica sobre Yam Suf con transliteración consistente.'
