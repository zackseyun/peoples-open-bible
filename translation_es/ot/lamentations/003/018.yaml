revisions:
- from: 'Entonces dije[a]: «Mi resistencia[b] se ha perdido, y mi esperanza en Yahvé».'
  to: 'Entonces dije: «Mi aguante[a] ha perecido, y mi esperanza de Yahvé[b]».'
  rationale: Se corrige el principal desajuste con la fuente al restaurar la preposición «de» en lugar de «en», preservando la elipsis hebrea documentada por el POB inglés. Se reubican y rehacen las notas para que sus marcadores correspondan exactamente a los términos explicados. También se fortalece אָבַד con «ha perecido» y se añade la alternativa léxica de נִצְחִי. «Mi aguante» comunica bien la idea de capacidad de continuar en español natural; si se prefiriera un registro algo más formal, «mi resistencia» también sería viable, pero la revisión propuesta suena menos técnica y más lamentativa.
