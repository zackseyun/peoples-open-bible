translation:
  language: es
  text: El corazón de su marido confía en ella[a], y no le faltará botín.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «despojo» o «botín»; el sustantivo hebreo suele referirse a botín tomado en guerra, aquí usado figuradamente para ganancia o provecho material.
    reason: lexical_alternative
lexical_decisions:
- source_word: בָּטַח
  english_pob_choice: trusts
  chosen_spanish: confía
  alternatives_spanish:
  - pone su confianza en
  - está confiado en
  lexicon: HALOT
  rationale: El verbo expresa confianza plena o seguridad depositada en alguien. «Confía en ella» mantiene el valor relacional y proverbial del hebreo con naturalidad en español.
- source_word: לֵב
  english_pob_choice: the heart of
  chosen_spanish: el corazón de
  alternatives_spanish:
  - la mente de
  - el interior de
  lexicon: HALOT
  rationale: «Corazón» conserva la imagen hebrea del centro de la persona, incluyendo voluntad y confianza, sin forzar una explicación abstracta.
- source_word: בַּעְלָהּ
  english_pob_choice: her husband
  chosen_spanish: su marido
  alternatives_spanish:
  - su esposo
  lexicon: HALOT
  rationale: En este contexto doméstico, el término designa al marido. «Marido» es claro y natural en español; «esposo» sería también posible, pero un poco más formal o técnico.
- source_word: שָׁלָל
  english_pob_choice: spoil
  chosen_spanish: despojo
  alternatives_spanish:
  - botín
  - ganancia
  lexicon: HALOT
  rationale: El sustantivo suele significar botín o despojo de guerra. Como el inglés POB preserva «spoil», en español «despojo» conserva la imagen bélica sin reducirla prematuramente a «ganancia».
- source_word: יֶחְסָר
  english_pob_choice: he will lack no
  chosen_spanish: no le faltará
  alternatives_spanish:
  - no carecerá de
  - no le faltará ningún
  lexicon: HALOT
  rationale: La forma expresa carencia o falta. En español, «no le faltará» comunica bien el futuro proverbial y mantiene el sujeto implícito con referencia al marido.
translation_notes:
  revision_awareness: Se tomó en cuenta la revisión del inglés POB que prefirió «spoil» sobre «gain». Para el español se conservó esa mayor cercanía léxica al hebreo mediante «despojo», evitando diluir la imagen en una equivalencia demasiado interpretativa.
  spanish_consistency_notes:
  - Se mantuvo el paralelismo proverbial con un presente de valor general en la primera cola y un futuro proverbial en la segunda.
  - Se evitó traducir Yahvé, Mesías o términos teológicos no presentes en este versículo.
  - La nota de pie preserva la alternativa semántica entre botín/despojo y la lectura figurada de provecho material.
