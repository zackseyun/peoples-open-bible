    rationale: Preserva la idea, pero la secuencia nominal + complemento resulta menos natural que «sin gobernante» o «que no tienen gobernante». La fuerza nominal de מֹשֵׁל puede mantenerse sin «sobre ellos», ya implícito por el contexto.
