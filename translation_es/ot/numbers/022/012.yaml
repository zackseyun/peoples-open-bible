revisions:
- from: 'Y Dios dijo a Balaam: «No irás con ellos. No maldecirás al pueblo, porque bendito es».'
  to: 'Y Dios dijo a Balaam[a]: «No irás con ellos. No maldecirás al pueblo, porque es un pueblo bendito[b]»'
  rationale: Se mantiene el contenido y tono del original, pero se reemplaza la formulación final por una opción española natural que expresa claramente el referente colectivo. Se añade nota para preservar el dato importante del singular hebreo documentado en el expediente inglés. También se conserva la nota onomástica del POB sobre Balaam/Bileam, ya que aparece en la traducción inglesa auditada.
