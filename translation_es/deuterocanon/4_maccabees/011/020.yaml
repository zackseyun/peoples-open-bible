translation:
  language: es
  text: 'Pero mientras era torturado[a], como hombre de una época santa, decía: «Por causa de la piedad, cuando tantos hermanos fueron llamados a un certamen de sufrimientos, no fuimos vencidos».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «como hombre de una vida santa» o «como uno perteneciente a una vida santa». La expresión griega es inusual y puede describir un modo de vida consagrado más que una «época» en sentido temporal.
    reason: lexical_alternative
lexical_decisions:
- source_word: βασανιζόμενος
  english_pob_choice: while he was being tortured
  chosen_spanish: era torturado
  alternatives_spanish:
  - estaba siendo torturado
  - era atormentado
  - era puesto a prueba
  lexicon: BDAG
  rationale: En este contexto de martirio, βασανίζω se refiere a tortura física concreta. «Era torturado» conserva el durativo del participio y la violencia explícita sin volverlo más interpretativo.
- source_word: ἱεροπρεποῦς αἰῶνος
  english_pob_choice: as one of a holy age
  chosen_spanish: como uno de una edad santa
  alternatives_spanish:
  - como uno de un modo de vida santo
  - como uno de una vida santa
  - como uno de una era sagrada
  lexicon: LSJ
  rationale: La expresión griega es inusual y conserva tensión semántica entre «edad/era» y «modo de vida». «Edad santa» mantiene esa rareza de manera auditable y cercana al griego, sin resolverla de forma excesiva.
- source_word: εὐσέβειαν
  english_pob_choice: godliness
  chosen_spanish: la piedad
  alternatives_spanish:
  - la devoción a Dios
  - la reverencia
  - la piedad para con Dios
  lexicon: BDAG
  rationale: En 4 Macabeos εὐσέβεια es lealtad piadosa a Dios expresada en fidelidad. «Piedad» es la opción española más natural y suficientemente amplia; se evita «religiosidad» por su matiz moderno menos positivo.
- source_word: γυμνασίαν πόνων
  english_pob_choice: a contest of sufferings
  chosen_spanish: un entrenamiento de sufrimientos
  alternatives_spanish:
  - un concurso de sufrimientos
  - una disciplina de sufrimientos
  - un ejercicio de dolores
  lexicon: LSJ
  rationale: γυμνασία conserva el campo de entrenamiento/ejercicio; πόνων apunta a dolores o sufrimientos. «Entrenamiento de sufrimientos» retiene el giro atlético sin añadir un elemento competitivo que el español exigiría para sonar natural.
- source_word: ἀδελφοὶ
  english_pob_choice: brothers
  chosen_spanish: hermanos
  alternatives_spanish:
  - hermanos varones
  - hermanos y hermanas
  lexicon: BDAG
  rationale: El referente narrativo son los hermanos del mártir; en español «hermanos» reproduce con claridad el dato masculino y la relación familiar.
- source_word: κληθέντες
  english_pob_choice: were called
  chosen_spanish: fueron llamados
  alternatives_spanish:
  - fueron convocados
  - fueron llamados para
  - fueron designados
  lexicon: BDAG
  rationale: El pasivo mantiene la idea de ser llamados/sometidos a la prueba. «Fueron llamados» permite conservar el eco vocacional sin imponer una interpretación más fuerte.
- source_word: οὐκ ἐνικήθημεν
  english_pob_choice: we were not conquered
  chosen_spanish: no fuimos vencidos
  alternatives_spanish:
  - no fuimos conquistados
  - no fuimos derrotados
  - no cedimos
  lexicon: BDAG
  rationale: Aunque el inglés POB prefirió la imaginería de conquista, en español «no fuimos vencidos» expresa con naturalidad el pasivo de νικάω y preserva el contraste victoria/derrota.
theological_decisions:
- issue: Interpretación de ἱεροπρεποῦς αἰῶνος
  english_pob_reading: A compressed, unusual phrase describing a consecrated mode of existence rather than a mere chronological age.
  chosen_spanish_reading: Una expresión comprimida que conserva la ambigüedad entre «edad»/«era» y una cualidad santa del modo de vida.
  alternative_spanish_readings:
  - una vida santa
  - un modo de vida santo
  - una era sagrada
  rationale: No se resuelve la ambigüedad del griego. Se mantiene una formulación rara en español para que el lector perciba la tensión lexical y no la pierda en una paráfrasis suave.
  doctrine_reference: Preservar la tensión textual sin simplificarla interpretativamente.
- issue: Metáfora de γυμνασία πόνων
  english_pob_reading: An athletic-training metaphor for martyrdom and endurance.
  chosen_spanish_reading: Una metáfora de entrenamiento aplicada al sufrimiento.
  alternative_spanish_readings:
  - una metáfora de ejercicio
  - una metáfora de disciplina
  - un lenguaje de competencia
  rationale: El texto usa imaginería atlética para describir la prueba. «Entrenamiento de sufrimientos» conserva la metáfora sin convertirla en una explicación doctrinal ajena al texto.
  doctrine_reference: Retener la imaginería retórica del martirio como prueba de fidelidad.
translation_notes:
  revision_awareness: 'La redacción sigue el ajuste más reciente del auditor inglés: se prefirió una formulación más natural para ἱεροπρεποῦς αἰῶνος y se mantuvo el alcance de εἰς γυμνασίαν πόνων sin expandirlo. La versión española intenta reflejar esa misma cautela, conservando la rareza de la primera cláusula y una imagen de entrenamiento sin sobreinterpretarla.'
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando aparezca el nombre divino explícito; aquí no aparece.
  - Se evita «Cristo» porque el pasaje no lo requiere.
  - Se usa «piedad» para εὐσέβεια como equivalente funcional de godliness en este contexto.
  - Se usa el pasado perifrástico simple «era torturado» para mantener el aspecto durativo del participio sin sobrecargar el estilo.
  - Se conserva la voz pasiva final «no fuimos vencidos» para reflejar el valor retórico de νικάω.
