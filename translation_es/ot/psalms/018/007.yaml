translation:
  language: es
  text: En mi angustia invoco a Yahvé[a], y a mi Dios clamo pidiendo ayuda. Él oye mi voz desde su templo[b], y mi clamor delante de él llega a sus oídos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Él oirá mi voz desde su templo ... mi clamor delante de él llegará a sus oídos». Los imperfectos hebreos también pueden leerse con fuerza futura.'
    reason: alternative_reading
  - marker: b
    text: «Templo» también puede verterse «palacio» o «santuario»; el hebreo הֵיכָל puede designar la morada de un rey o la de Dios.
    reason: lexical_alternative
lexical_decisions:
- source_word: בַּצַּר / בַּצַּר לִי
  english_pob_choice: In my distress
  chosen_spanish: En mi angustia
  alternatives_spanish:
  - En mi aflicción
  - En mi apuro
  - En mi tribulación
  lexicon: HALOT
  rationale: צַר expresa la idea de angustia, estrechez o aflicción. En español, «angustia» comunica bien la presión personal implícita en לִי sin sonar forzado, y conserva el tono de oración urgente del verso.
- source_word: אֶקְרָא
  english_pob_choice: I call on
  chosen_spanish: invoco
  alternatives_spanish:
  - llamo a
  - clamo a
  - invoco a
  lexicon: HALOT
  rationale: Con el nombre divino como objeto, el valor es invocatorio, no meramente verbal. «Invoco» es la opción española más precisa y digna para expresar el llamado dirigido a Yahvé.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  - Jehová
  lexicon: HALOT
  rationale: Se conserva el nombre propio divino del texto hebreo en la forma española establecida por el proyecto, en lugar de sustituirlo por un título. «Yahvé» mantiene la decisión doctrinal del POB y es idiomático en español.
- source_word: אֱלֹהַי
  english_pob_choice: to my God
  chosen_spanish: a mi Dios
  alternatives_spanish:
  - a Dios, mi Dios
  - para mi Dios
  lexicon: HALOT
  rationale: אֶל marca dirección hacia la persona invocada. «A mi Dios» reproduce con naturalidad el movimiento del verbo de clamor en español.
- source_word: אֲשַׁוֵּעַ
  english_pob_choice: I cry for help
  chosen_spanish: clamo pidiendo ayuda
  alternatives_spanish:
  - grito pidiendo ayuda
  - clamo por auxilio
  - grito de auxilio
  lexicon: HALOT
  rationale: El verbo שׁוע en piel tiene el sentido de clamar por socorro. «Clamo pidiendo ayuda» preserva el sentido de súplica intensa sin convertirlo en simple grito emocional.
- source_word: יִשְׁמַע
  english_pob_choice: He hears
  chosen_spanish: oye
  alternatives_spanish:
  - escucha
  - oirá
  - oye y responde
  lexicon: HALOT
  rationale: El imperfecto poético puede leerse con fuerza presente, como en el inglés auditado. «Oye» mantiene la inmediatez del testimonio sin forzar una lectura futura.
- source_word: מֵהֵיכָלוֹ
  english_pob_choice: from his temple
  chosen_spanish: desde su templo
  alternatives_spanish:
  - desde su palacio
  - desde su santuario
  lexicon: HALOT
  rationale: הֵיכָל puede significar palacio, templo o santuario. Aquí, por el contexto de la respuesta divina, «templo» es la opción más clara y sigue la decisión POB auditada, sin cerrar del todo el trasfondo de morada real de Dios.
- source_word: קוֹלִי
  english_pob_choice: my voice
  chosen_spanish: mi voz
  alternatives_spanish:
  - mi sonido
  - mi voz al orar
  lexicon: HALOT
  rationale: קוֹל en contexto de oración se entiende naturalmente como «voz». La forma breve conserva paralelismo con el miembro siguiente.
- source_word: שַׁוְעָתִי
  english_pob_choice: my cry
  chosen_spanish: mi clamor
  alternatives_spanish:
  - mi grito
  - mi súplica
  - mi clamor de auxilio
  lexicon: HALOT
  rationale: El sustantivo expresa el clamor de quien pide socorro. «Clamor» mantiene la fuerza poética y evita repetir mecánicamente «ayuda» del miembro anterior.
- source_word: לְפָנָיו
  english_pob_choice: before him
  chosen_spanish: delante de él
  alternatives_spanish:
  - ante él
  - en su presencia
  lexicon: HALOT
  rationale: La expresión indica posición relacional «ante/delante de». «Delante de él» es natural en español y conserva la imagen de oración presentada ante Dios.
- source_word: תָּבוֹא
  english_pob_choice: comes
  chosen_spanish: llega
  alternatives_spanish:
  - viene
  - entrará
  - llega a
  lexicon: HALOT
  rationale: El imperfecto poético puede expresar presente vívido. «Llega» encaja con el paralelismo de oír/venir y refleja bien la idea de que el clamor alcanza a Dios.
- source_word: בְאָזְנָיו
  english_pob_choice: into his ears
  chosen_spanish: a sus oídos
  alternatives_spanish:
  - en sus oídos
  - hasta sus oídos
  - dentro de sus oídos
  lexicon: HALOT
  rationale: El hebreo es literalmente «en/sus oídos». En español, «a sus oídos» suena más natural que «en sus oídos» y comunica adecuadamente la metáfora de acceso efectivo al oído divino.
theological_decisions:
- issue: Rendering of the divine name יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - Jehová
  rationale: El verso usa el Tetragramatón directamente. Siguiendo la práctica doctrinal del POB, se preserva el nombre divino en español como «Yahvé», evitando la sustitución por un título y manteniendo la distinción entre nombre propio y apelación común.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Aspecto verbal en los imperfectos poéticos
  english_pob_reading: He hears ... comes
  chosen_spanish_reading: oye ... llega
  alternative_spanish_readings:
  - oirá ... vendrá
  - oye ... vendrá
  - escucha ... llega
  rationale: Como en el audit trail inglés, los imperfectos pueden leerse con valor presente vívido. El español usa presente simple para sostener el tono testimonial de la estrofa sin obligar a una lectura exclusivamente futura.
  doctrine_reference: Hebrew poetry aspect / verbal nuance
translation_notes:
  revision_awareness: El control cruzado indicó acuerdo mayoritario con observaciones menores; se mantuvo la decisión auditada para יְהוָה como nombre propio y se reforzó la claridad española en el paralelo verbal. No hubo revisiones sustanciales en el último pase.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como forma estándar del proyecto para יְהוָה.
  - 'Se conserva el paralelismo semántico del verso: invocación, clamor, respuesta divina y llegada del clamor.'
  - Se evita «SEÑOR» para no ocultar el nombre propio divino.
  - «Templo» se usa con nota para sostener la alternativa léxica «palacio/santuario».
