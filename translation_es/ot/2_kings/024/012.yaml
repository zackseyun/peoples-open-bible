translation:
  language: es
  text: Entonces Joaquín, rey de Judá, salió [a] al rey de Babilonia, él, su madre, sus siervos, sus oficiales y sus eunucos; y el rey de Babilonia lo tomó en el octavo año de su reinado.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'contra el rey de Babilonia'. El hebreo con עַל puede indicar dirección hacia alguien; el sentido no es necesariamente hostil en esta construcción.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֵּצֵא
  english_pob_choice: went out
  chosen_spanish: salió
  alternatives_spanish:
  - fue
  - se presentó
  lexicon: HALOT
  rationale: יצא significa literalmente salir/ir afuera. En este contexto de sitio y rendición, 'salió' conserva la forma hebrea sin convertirla de manera interpretativa en 'se rindió'.
- source_word: עַל מֶלֶךְ בָּבֶל
  english_pob_choice: to the king of Babylon
  chosen_spanish: al rey de Babilonia
  alternatives_spanish:
  - contra el rey de Babilonia
  - hacia el rey de Babilonia
  lexicon: HALOT
  rationale: Con יצא, עַל indica dirección hacia una persona. En español, 'al rey de Babilonia' expresa naturalmente esa dirección sin perder el valor relacional del hebreo.
- source_word: הוּא וְאִמּוֹ
  english_pob_choice: he and his mother
  chosen_spanish: él, su madre
  alternatives_spanish:
  - él y su madre
  - él con su madre
  lexicon: HALOT
  rationale: El pronombre retoma explícitamente al sujeto y encabeza la lista de acompañantes. 'Él, su madre' mantiene el orden del hebreo y la acumulación narrativa.
- source_word: עֲבָדָיו
  english_pob_choice: his servants
  chosen_spanish: sus siervos
  alternatives_spanish:
  - sus servidores
  - sus servidores de palacio
  lexicon: HALOT
  rationale: עבד puede ser 'siervo' o 'servidor', pero aquí el término conserva mejor su fuerza de dependencia/corte si se traduce como 'siervos'.
- source_word: שָׂרָיו
  english_pob_choice: his officials
  chosen_spanish: sus oficiales
  alternatives_spanish:
  - sus príncipes
  - sus jefes
  lexicon: HALOT
  rationale: שׂרים designa altos cargos de la corte; 'oficiales' es claro y evita el arcaísmo de 'príncipes'.
- source_word: וְסָרִיסָיו
  english_pob_choice: his eunuchs
  chosen_spanish: sus eunucos
  alternatives_spanish:
  - sus oficiales de palacio
  - sus cortesanos
  lexicon: HALOT
  rationale: El audit trail inglés retuvo 'eunuchs' para no ocultar el término distintivo. En español, 'eunucos' es la correspondencia más directa y auditable; el contexto de corte también permite esa lectura sin necesidad de suavizarla.
- source_word: וַיִּקַּח אֹתוֹ
  english_pob_choice: took him
  chosen_spanish: lo tomó
  alternatives_spanish:
  - lo capturó
  - lo llevó consigo
  lexicon: HALOT
  rationale: לקח es 'tomar'. Aquí el contexto da la fuerza de captura/custodia, pero 'lo tomó' permanece pegado al hebreo y deja que el relato complete el matiz.
- source_word: בִּשְׁנַת שְׁמֹנֶה לְמָלְכֽוֹ
  english_pob_choice: in the eighth year of his reign
  chosen_spanish: en el octavo año de su reinado
  alternatives_spanish:
  - en el octavo año de su reino
  - en el octavo año de su gobierno
  lexicon: HALOT
  rationale: En esta fórmula cronológica, 'reinado' es el equivalente natural de מלך. 'Su' se entiende con referencia al rey de Babilonia, conforme al análisis sintáctico del texto base.
theological_decisions:
- issue: Referencia de 'su reinado' al final del versículo
  english_pob_reading: the reign of the king of Babylon
  chosen_spanish_reading: el reinado del rey de Babilonia
  alternative_spanish_readings:
  - el reinado de Joaquín
  rationale: La referencia más próxima y el marco histórico apuntan al rey de Babilonia, no a Joaquín. Es una decisión histórico-gramatical que evita ambigüedad en la fecha.
  doctrine_reference: No aplica una doctrina específica; se trata de cronología narrativa e ինտérprete textual.
translation_notes:
  revision_awareness: 'Se siguió el audit trail inglés, pero se ajustó la terminología al español con preferencia por correspondencias directas y naturales: ''salió'' para יצא, ''eunucos'' para סָרִיסָיו, y ''octavo año de su reinado'' para la fórmula cronológica. Se evitó suavizar el término cortesano y se mantuvo la posible tensión del movimiento ''al rey de Babilonia'' mediante nota.'
  spanish_consistency_notes:
  - Se usó 'Yahvé' como término por defecto en otros contextos, pero este versículo no lo contiene.
  - Se tradujo δοῦλος/עבד con 'siervo' aquí según el matiz cortesano del pasaje y la práctica del proyecto.
  - Se mantuvo la distinción entre 'oficiales' y 'eunucos' para no colapsar dos términos hebreos diferentes.
  - La puntuación española separa la lista con comas y punto y coma para reflejar la estructura enumerativa del hebreo.
