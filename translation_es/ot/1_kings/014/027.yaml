base_translation:
  language: en
  yaml_path: translation/ot/1_kings/014/027.yaml
  text: So King Rehoboam made bronze shields in their place and committed them into the hand of the commanders of the runners[b][a], who guarded the entrance of the king’s house.
  footnotes:
  - marker: a
    text: Or, more interpretively, 'the captains of the guard'; the Hebrew is literally 'the commanders of the runners,' likely a royal bodyguard or courier corps.
    reason: lexical_alternative
  - marker: b
    text: '''The king’s house'' refers to the royal palace.'
    reason: cultural_note
