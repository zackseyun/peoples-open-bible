translation:
  language: es
  text: 'Y supliqué a Yahvé[a] en aquel tiempo, diciendo:'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: יהוה (YHWH). Tradicionalmente se vierte «SEÑOR»; alternativamente, «Yahvé».'
    reason: alternative_reading
lexical_decisions:
- source_word: וָאֶתְחַנַּן
  english_pob_choice: And I pleaded
  chosen_spanish: Y supliqué
  alternatives_spanish:
  - Y le imploré
  - Y le rogué
  - Y pedí con insistencia
  lexicon: HALOT
  rationale: El hitpael de חנן expresa ruego intenso por favor o misericordia. En español, «supliqué» conserva esa intensidad y mantiene un registro natural y digno. Se evita «pedí» por ser demasiado débil, y «entretré» por sonar más arcaico.
- source_word: אֶל
  english_pob_choice: with
  chosen_spanish: a
  alternatives_spanish:
  - con
  - ante
  lexicon: HALOT
  rationale: La construcción española más directa y fiel al movimiento del ruego hacia Yahvé es «supliqué a». Aunque el inglés POB opta por «with» por idiomatismo, en español «a» expresa correctamente la dirección del acto de súplica sin perder el matiz relacional.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  - SEÑOR
  lexicon: HALOT
  rationale: 'Se sigue el estándar del proyecto para el Tetragrámaton: «Yahvé». Es la forma establecida en español para preservar el nombre divino revelado, sin sustituirlo por un título como «SEÑOR».'
- source_word: בָּעֵת הַהִוא
  english_pob_choice: at that time
  chosen_spanish: en aquel tiempo
  alternatives_spanish:
  - en ese tiempo
  - en aquel momento
  lexicon: HALOT
  rationale: La expresión temporal se vierte de manera idiomática en español como «en aquel tiempo», manteniendo el marco narrativo sin precisar más de lo que dice el hebreo.
- source_word: לֵאמֹר
  english_pob_choice: saying
  chosen_spanish: diciendo
  alternatives_spanish:
  - y dijo
  - 'así:'
  - 'en estos términos:'
  lexicon: HALOT
  rationale: La fórmula introductoria de discurso directo se conserva con «diciendo», que mantiene la conexión formal con la cita que continúa en el versículo siguiente.
theological_decisions:
- issue: Renderización del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - SEÑOR
  rationale: El hebreo usa explícitamente el Tetragrámaton. En español, «Yahvé» preserva el nombre propio divino en una forma ampliamente reconocible y coherente con la política del proyecto, evitando la sustitución litúrgica por un título.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
translation_notes:
  revision_awareness: 'Coincide con el tramo fuente y el audit trail inglés: el verbo de súplica, la referencia temporal y la introducción del discurso directo se mantienen sin añadir contenido. La única decisión notable es el tratamiento del nombre divino, siguiendo la norma del proyecto para יְהוָה.'
  spanish_consistency_notes:
  - «Yahvé» se usa de manera consistente para יְהוָה, en lugar de la sustitución tradicional «SEÑOR».
  - «Supliqué» comunica mejor la fuerza del hitpael que un simple «pedí».
  - La preposición «a» en español refleja naturalmente la dirección del ruego hacia Dios.
  - «En aquel tiempo» y «diciendo» reproducen la estructura temporal y discursiva del hebreo sin sobreinterpretación.
