  source_alignment_summary: 'El borrador español preserva fielmente el sentido del hebreo, que en este versículo consiste en tres nombres propios en una lista de firmantes: חָרִיף, עֲנָתוֹת, נובי. La decisión de tratarlos como transliteraciones, no como términos traducibles, concuerda con la evidencia fuente y con la auditoría inglesa. La nota sobre «Anatot» conserva correctamente la aclaración de que en otros contextos puede ser un topónimo, pero aquí funciona como designación personal.'
