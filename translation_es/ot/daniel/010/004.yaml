translation:
  language: es
  text: En el día veinticuatro del primer mes[a], yo estaba junto al gran río, es decir, el Tigris.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: Hiddekel, el nombre hebreo estándar del Tigris.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וּבְיוֹם
  english_pob_choice: On the ... day
  chosen_spanish: El día ...
  alternatives_spanish:
  - Y en el ... día
  - En el ... día
  lexicon: HALOT
  rationale: La expresión hebrea introduce una referencia temporal. En español, para esta fórmula cronológica, «El día veinticuatro...» resulta natural y conserva el valor dativo-temporal sin forzar una repetición innecesaria de la conjunción.
- source_word: עֶשְׂרִים וְאַרְבָּעָה
  english_pob_choice: twenty-fourth
  chosen_spanish: veinticuatro
  alternatives_spanish:
  - vigésimo cuarto
  lexicon: HALOT
  rationale: En fórmulas de fecha, el hebreo usa construcción cardinal; en español, el número cardinal dentro de una fecha es idiomático y claro. Se evita sobredeterminar con ordinal cuando el contexto calendárico ya lo provee.
- source_word: לַחֹדֶשׁ הָרִאשׁוֹן
  english_pob_choice: of the first month
  chosen_spanish: del primer mes
  alternatives_spanish:
  - en el primer mes
  - del mes primero
  lexicon: HALOT
  rationale: «Del primer mes» preserva la relación genitiva y es la forma más natural en español para una fecha hebrea.
- source_word: וַאֲנִי הָיִיתִי
  english_pob_choice: I was
  chosen_spanish: yo estaba
  alternatives_spanish:
  - yo era
  - yo me hallaba
  lexicon: HALOT
  rationale: Aquí היה sitúa a Daniel en un lugar en un momento dado. «Yo estaba» comunica adecuadamente la ubicación temporal y espacial sin añadir matices inexistentes.
- source_word: עַל יַד
  english_pob_choice: by the side of
  chosen_spanish: junto a
  alternatives_spanish:
  - al lado de
  - a la orilla de
  - junto al
  lexicon: HALOT
  rationale: El modismo עַל יַד indica cercanía espacial. «Junto a» es una equivalencia natural en español y mantiene la amplitud del hebreo, sin restringirlo excesivamente a «orilla».
- source_word: הַנָּהָר הַגָּדוֹל
  english_pob_choice: the great river
  chosen_spanish: el gran río
  alternatives_spanish:
  - el gran río
  - el río grande
  - el poderoso río
  lexicon: HALOT
  rationale: «Gran río» reproduce el valor descriptivo del adjetivo con un orden normal en español. Se conserva la referencia amplia sin introducir un matiz de fuerza que el hebreo no exige.
- source_word: הוּא חִדָּקֶל
  english_pob_choice: that is, the Tigris
  chosen_spanish: es decir, el Tigris
  alternatives_spanish:
  - a saber, el Tigris
  - o sea, el Tigris
  - es decir, Hiddequel
  lexicon: HALOT
  rationale: El pronombre explicativo הוּא introduce una identificación. En español, «es decir» expresa con claridad la equivalencia entre el nombre hebreo Hiddekel y el nombre reconocido en español para el río, Tigris.
theological_decisions:
- issue: Identificación del río Hiddekel con el Tigris
  english_pob_reading: that is, the Tigris
  chosen_spanish_reading: es decir, el Tigris
  alternative_spanish_readings:
  - es decir, Hiddequel
  - o sea, el Tigris
  rationale: La POB inglesa conserva el nombre hebreo en nota y lo identifica con el nombre común del río. En español se mantiene la identificación explícita para el lector, sin perder el anclaje del nombre hebreo en la nota.
  doctrine_reference: Geografía bíblica / topónimos bíblicos
- issue: Tratamiento del artículo en la fecha
  english_pob_reading: On the twenty-fourth day of the first month
  chosen_spanish_reading: El día veinticuatro del primer mes
  alternative_spanish_readings:
  - El veinticuatro del primer mes
  - En el día veinticuatro del primer mes
  rationale: No hay decisión doctrinal, pero sí de fidelidad al formato de fecha. Se evita la ambigüedad de un inciso demasiado literal que suene ajeno al español.
  doctrine_reference: N/A
translation_notes:
  revision_awareness: 'El borrador sigue de cerca el contexto auditado en inglés: fecha ordinal/calendárica, modismo espacial עַל יַד, y la identificación explicativa final del nombre del río. No se registraron revisiones posteriores en el paquete fuente, y el estado de concordancia del control cruzado fue alto.'
  spanish_consistency_notes:
  - Se mantiene «Tigris» como topónimo habitual en español, con la nota que preserva el nombre hebreo Hiddekel.
  - Se usa «gran río» en lugar de «río grande» para un orden más natural y solemne en español.
  - La construcción temporal se presenta en forma fluida, sin calcar la conjunción hebrea inicial de manera visible.
