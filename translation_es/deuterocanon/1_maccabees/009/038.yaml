  verdict: revise
  source_alignment_summary: 'El borrador sigue bien el griego en la secuencia verbal y en los referentes: ἐμνήσθησαν = «se acordaron de», Ἰωάνου τοῦ ἀδελφοῦ αὐτῶν = «Juan su hermano», ἀνέβησαν = «subieron», ἐκρύβησαν = «se escondieron», τοῦ ὄρους = «del monte». El único punto a ajustar es ὑπὸ τὴν σκέπην: «bajo la cobertura» es semánticamente posible, pero en español bíblico y general suena menos natural y más técnico que «bajo el cobijo», que preserva mejor la idea de cubierta/resguardo sin sobreinterpretar.'
  spanish_quality_summary: La oración es clara y fiel, pero «bajo la cobertura del monte» suena algo rígido e incluso eclesial-administrativo en español contemporáneo. «Bajo el cobijo del monte» o «bajo el amparo del monte» leen mejor; «cobijo» mantiene el matiz concreto de resguardo y resulta más idiomático. La nota sobre «Juan» no es necesaria, porque no preserva una alternativa viva en español para el lector del texto.
  glossary_alignment: No hay conflictos con la terminología del proyecto. «Juan» es correcto para Ἰωάνου; «monte» es aceptable para ὄρος. No hay términos teológicos sensibles aquí. La revisión propuesta mejora la naturalidad sin alterar la decisión léxica central documentada para σκέπη.
  issues:
  - severity: medium
    issue: «bajo la cobertura del monte» suena poco idiomático en español
    rationale: Aunque «cobertura» puede reflejar σκέπη, en este contexto narrativo español suena técnico o abstracto. «Cobijo» reproduce mejor la imagen de resguardo/cubierta y conserva la fidelidad al griego y a la revisión inglesa «cover».
  - severity: low
    issue: La nota [a] sobre «Juan» es innecesaria
    rationale: No hay ambigüedad relevante para el lector español ni una alternativa que deba preservarse en nota; la forma «Juan» es la equivalencia estándar y suficiente.
  revised_spanish_text: Y se acordaron de Juan, su hermano, y subieron y se escondieron bajo el cobijo[a] del monte.
