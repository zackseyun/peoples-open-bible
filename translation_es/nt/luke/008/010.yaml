source:
  edition: SBLGNT
  text: ὁ δὲ εἶπεν· Ὑμῖν δέδοται γνῶναι τὰ μυστήρια τῆς βασιλείας τοῦ θεοῦ, τοῖς δὲ λοιποῖς ἐν παραβολαῖς, ἵνα βλέποντες μὴ βλέπωσιν καὶ ἀκούοντες μὴ συνιῶσιν.
base_translation:
  language: en
  yaml_path: translation/nt/luke/008/010.yaml
  text: And he said[a], “To you it has been given to know the mysteries of the kingdom of God, but to the rest in parables, so that seeing they may not see[c][b], and hearing they may not understand.”
  footnotes:
  - marker: a
    text: Or 'secrets.' The Greek 'mysteries' refers to truths of God's kingdom hidden from some and disclosed to others.
    reason: lexical_alternative
  - marker: b
    text: The clause 'so that though seeing they may not see, and though hearing they may not understand' echoes Isaiah 6:9–10 and can be understood as expressing divine purpose, judicial result, or both.
    reason: cross_reference
  - marker: c
    text: Or 'but to the rest in parables'.
    reason: previous_rendering
