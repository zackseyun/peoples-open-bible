lexical_decisions:
- source_word: אַךְ
  english_pob_choice: alone
  chosen_spanish: Sólo
  alternatives_spanish:
  - únicamente
  - solamente
  - ciertamente
  lexicon: HALOT
  rationale: אַךְ expresa exclusividad y énfasis. En español, «Sólo él» reproduce de forma natural ese valor exclusivo sin perder la fuerza retórica del hebreo.
- source_word: הוּא
  english_pob_choice: He
  chosen_spanish: él
  alternatives_spanish:
  - Él
  - él mismo
  lexicon: HALOT
  rationale: 'El pronombre masculino singular apunta a Dios en el contexto inmediato. En español se conserva como sujeto explícito: «él».'
- source_word: צוּרִי
  english_pob_choice: my rock
  chosen_spanish: mi roca
  alternatives_spanish:
  - mi peña
  - mi peñón
  lexicon: HALOT
  rationale: צוּר funciona aquí como metáfora de estabilidad y protección divina. «Roca» es el equivalente más natural y fiel en español bíblico contemporáneo.
- source_word: וִישׁוּעָתִי
  english_pob_choice: and my salvation
  chosen_spanish: y mi salvación
  alternatives_spanish:
  - y mi liberación
  - y mi rescate
  lexicon: HALOT
  rationale: יְשׁוּעָה abarca salvación y rescate; «salvación» conserva el alcance más amplio, como en la elección inglesa.
- source_word: מִשְׂגַּבִּי
  english_pob_choice: my stronghold
  chosen_spanish: mi baluarte
  alternatives_spanish:
  - mi refugio
  - mi fortaleza elevada
  - mi altura segura
  lexicon: HALOT
  rationale: מִשְׂגָּב señala un lugar alto y seguro de protección. «Baluarte» comunica bien la idea defensiva en español y mantiene la imagen de seguridad.
- source_word: לֹא אֶמּוֹט
  english_pob_choice: I will not be shaken
  chosen_spanish: no seré sacudido
  alternatives_spanish:
  - no seré movido
  - no vacilaré
  - no tambalearé
  lexicon: HALOT
  rationale: El nifal de מוֹט expresa ser movido, sacudido o hecho tambalear. «No seré sacudido» conserva la metáfora de estabilidad; también deja abierta la alternativa tradicional «no seré movido».
theological_decisions:
- issue: Intensidad de la afirmación final de estabilidad
  english_pob_reading: I will not be shaken
  chosen_spanish_reading: no seré sacudido
  alternative_spanish_readings:
  - no seré movido
  - no vacilaré
  rationale: El hebreo expresa confianza firme en Dios como protección segura, no una invulnerabilidad abstracta. «No seré sacudido» conserva la imagen física de inestabilidad sin endurecerla más allá del texto.
  doctrine_reference: Translation philosophy §§5–6
translation_notes:
  revision_awareness: El texto inglés auditado mantiene una equivalencia óptima con una nota alternativa en la clausula final; el hebreo confirma la metáfora de estabilidad y la exclusividad de אַךְ. La versión española preserva ambas sin introducir elementos ajenos al verso.
  spanish_consistency_notes:
  - Se mantiene «salvación» para יְשׁוּעָה, coherente con el tratamiento del término en el proyecto.
  - Se evita «SEÑOR» y no hay necesidad de reemplazar el nombre divino en este verso.
  - «Sólo él» conserva el énfasis exclusivo de אַךְ sin volverlo explicativo.
  - «Baluarte» funciona como equivalente de imagen defensiva para מִשְׂגָּב en español bíblico moderno.
