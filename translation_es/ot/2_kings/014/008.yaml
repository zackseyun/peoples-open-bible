base_translation:
  language: en
  yaml_path: translation/ot/2_kings/014/008.yaml
  text: Then Amaziah sent messengers to Jehoash son of Jehoahaz[a], son of Jehu, king of Israel, saying, “Come[b], let us look one another in the face.”
  footnotes:
