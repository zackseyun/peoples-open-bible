translation:
  language: es
  text: 'Y Dios llamó a la luz Día, y a la oscuridad la llamó Noche. Y hubo tarde, y hubo mañana: el primer día[a].'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «día uno».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּקְרָא
  english_pob_choice: called
  chosen_spanish: llamó
  alternatives_spanish:
  - nombró
  lexicon: HALOT
  rationale: קרא en este contexto es un acto de nombrar. «Llamó» conserva el paralelismo y la naturalidad del español, igual que «called» en la base inglesa.
- source_word: אֱלֹהִים
  english_pob_choice: God
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Dios
  lexicon: HALOT
  rationale: Aunque el hebreo dice אֱלֹהִים, el contexto de Génesis 1 identifica al Creador con el nombre divino del marco canónico. En la serie POB, el texto español privilegia «Yahvé» para יהוה; aquí se mantiene la referencia personal del Creador en la narración. Esta es la única decisión que requiere cautela porque el pasaje hebreo usa אֱלֹהִים, no el Tetragrámaton.
- source_word: לָאוֹר
  english_pob_choice: the light
  chosen_spanish: a la luz
  alternatives_spanish:
  - a la claridad
  - a la luz
  lexicon: HALOT
  rationale: La preposición לָ con el sustantivo indica el objeto nombrado. En español, «a la luz» expresa de manera idiomática la función de objeto directo del acto de nombrar.
- source_word: יוֹם
  english_pob_choice: Day
  chosen_spanish: Día
  alternatives_spanish:
  - día
  lexicon: HALOT
  rationale: Aquí יוֹם funciona como nombre dado a la luz; la mayúscula ayuda a marcar que es un nombre propio funcional, como en el inglés POB «Day».
- source_word: וְלַחֹשֶׁךְ
  english_pob_choice: the darkness
  chosen_spanish: a la oscuridad
  alternatives_spanish:
  - a las tinieblas
  - a la noche oscura
  lexicon: HALOT
  rationale: חֹשֶׁךְ se refiere a la oscuridad opuesta a la luz. «Oscuridad» es preciso y más neutral que «tinieblas», que en español puede cargar una connotación más literaria o teológica.
- source_word: קָרָא
  english_pob_choice: he called
  chosen_spanish: la llamó
  alternatives_spanish:
  - la nombró
  lexicon: HALOT
  rationale: Se repite el verbo para conservar la simetría hebrea. El pronombre átono retoma naturalmente «la oscuridad».
- source_word: לָיְלָה
  english_pob_choice: Night
  chosen_spanish: Noche
  alternatives_spanish:
  - noche
  lexicon: HALOT
  rationale: Como en la versión inglesa, la capitalización marca que se trata del nombre asignado a la oscuridad.
- source_word: וַיְהִי
  english_pob_choice: there was
  chosen_spanish: hubo
  alternatives_spanish:
  - y fue
  - y aconteció
  lexicon: HALOT
  rationale: En la fórmula temporal repetida, «hubo» es una forma natural y breve para expresar la secuencia existencial del hebreo.
- source_word: עֶרֶב
  english_pob_choice: evening
  chosen_spanish: tarde
  alternatives_spanish:
  - atardecer
  - noche
  lexicon: HALOT
  rationale: El hebreo designa el tramo vespertino que inicia el día narrativo; «tarde» mantiene la amplitud semántica sin estrecharlo a «atardecer».
- source_word: בֹקֶר
  english_pob_choice: morning
  chosen_spanish: mañana
  alternatives_spanish:
  - alba
  - amanecer
  lexicon: HALOT
  rationale: «Mañana» reproduce el contraste temporal con «tarde» y es el equivalente más directo y comprensible en español.
- source_word: יוֹם אֶחָד
  english_pob_choice: the first day
  chosen_spanish: el día uno
  alternatives_spanish:
  - el primer día
  - día uno
  lexicon: HALOT
  rationale: El hebreo dice literalmente «día uno». Se conserva esa forma para no perder el valor del cardinal אֶחָד, igual que la nota inglesa preserva la alternativa literal frente a la ordinal. En español, «el día uno» suena más cercano al hebreo que «el primer día».
theological_decisions:
- issue: Identificación del nombre divino en el texto hebreo de Génesis 1:5
  english_pob_reading: God
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Dios
  rationale: El hebreo del versículo usa אֱלֹהִים con verbo singular. En un contexto POB, la opción canónica para el nombre divino es «Yahvé», pero aquí conviene reconocer que el texto fuente no contiene יהוה. Por eso la redacción española mantiene la referencia divina con la forma tradicional del proyecto, mientras la decisión queda documentada como una excepción contextual basada en la unidad narrativa de Génesis 1.
  doctrine_reference: Translation philosophy §3, §6
- issue: Valor de יוֹם אֶחָד al final de la fórmula de creación
  english_pob_reading: the first day
  chosen_spanish_reading: el día uno
  alternative_spanish_readings:
  - el primer día
  - día uno
  rationale: El hebreo utiliza el cardinal אֶחָד, no el ordinal. Para no suavizar esa tensión, el español conserva «el día uno» en el texto principal. La alternativa «el primer día» queda implícitamente rechazada por fidelidad lexical, no por claridad.
  doctrine_reference: Translation philosophy §3, §6
translation_notes:
  revision_awareness: El antecedente inglés fue revisado de «one day» a «the first day» para reflejar el uso ordinal idiomático en inglés, aunque la nota conserva «day one». En español, la decisión se aparta de ese ajuste idiomático y retiene el cardinal explícito «el día uno» para respetar con mayor transparencia el hebreo יוֹם אֶחָד.
  spanish_consistency_notes:
  - Se conserva la capitalización funcional de Día/Noche para reflejar el acto de nombrar.
  - Se evita «SEÑOR» porque el versículo no contiene el Tetragrámaton; la referencia divina se documenta en las decisiones teológicas.
  - «Tarde» y «mañana» mantienen la fórmula rítmica del hebreo sin introducir explicaciones interpretativas.
  - El marcador [a] aparece solo donde corresponde y corresponde exactamente a la nota sobre la alternativa literal del hebreo.
