revisions:
- from: Tú eres la hija de tu madre[a], que aborrecía a su esposo y a sus hijos; y eres la hermana de tus hermanas, que aborrecían a sus esposos y a sus hijos. Tu madre era hitita, y tu padre amorreo.
  to: Tú eres la hija de tu madre[a], que aborrecía a su esposo y a sus hijos e hijas; y eres la hermana de tus hermanas, que aborrecían a sus esposos y a sus hijos e hijas. Tu madre era hitita, y tu padre era amorreo.
  rationale: Se conserva el sentido y la estructura del original, pero se corrige 'hijos' a 'hijos e hijas' para reflejar mejor la decisión documentada del POB de no restringir בנים a varones. También se explicita 'era' en la segunda cláusula final para mejorar la naturalidad del español sin afectar la fuerza del texto.
