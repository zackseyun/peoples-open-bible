  text: And[a] the scripture was fulfilled that says, "And he was numbered with the transgressors."
  footnotes:
  - marker: a
    text: This verse is absent from the earliest Greek manuscripts (including 4th-century Sinaiticus and Vaticanus) and early Coptic translations, but is preserved in the Byzantine majority tradition and the Latin tradition. It was likely added by later scribes as a harmonization to Luke 22:37, which quotes Isaiah 53:12.
    reason: textual_critical
translation:
  language: ko
  text: '[그리고 「그가 범죄자들과 함께 헤아려졌다」 하는 성경 말씀이 이루어졌습니다.]'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 이 절은 가장 오래된 헬라어 사본에는 나타나지 않으며, 후대에 누가복음 22:37의 영향으로 첨가된 것으로 보입니다. 본문의 흐름을 위해 대괄호 안에 보존합니다.
    reason: textual_variant
theological_decisions:
- issue: 15:28의 본문 비평적 위상
  chosen_reading: 본문에서 대괄호로 표시하되 본체에 보존
  alternative_readings:
  - 본체에서 제외
  - 각주로 옮김
  rationale: 15:28은 시내, 바티칸, 알렉산드리아 등 주요 사본에서 누락되며, NA28/SBLGNT는 의심스러운 본문으로 본다. 영어 POB가 본문에 포함하였으므로 일관성을 위해 대괄호 표시로 보존하되, 후대 첨가일 가능성을 각주에서 명시한다.
