  yaml_path: translation/ot/ezekiel/037/023.yaml
  text: They will no longer defile themselves with their idols[a], with their detestable things, or with any of their transgressions. I will save them from all their apostasies by which they have sinned, and I will cleanse them. Then they will be my people[b], and I will be their God.
  footnotes:
