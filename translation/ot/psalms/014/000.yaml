translation:
  text: 'For the choir director[a]. Of David.


    The fool says in his heart, “There is no God.”

    They are corrupt; they do abominable deeds[c][b].

    There is none who does good.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'For the music director' or 'For the choirmaster.'
    reason: lexical_alternative
  - marker: b
    text: '''Of David'' may also mean ''by David'' or ''for David'' in the psalm heading.'
    reason: lexical_alternative
  - marker: c
    text: The Hebrew shifts from singular ('the fool') to plural ('they are corrupt'), moving from a representative individual to the class he represents.
    reason: lexical_alternative
