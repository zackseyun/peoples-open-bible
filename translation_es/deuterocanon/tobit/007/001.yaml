revisions:
- from: Y llegó a Ecbátana y se presentó en la casa de Ragüel[a]; y Sara también lo encontró. Ella lo saludó, y él los saludó[b], y los introdujo en la casa.
  to: Y vino a Ecbátana y llegó a la casa de Ragüel, y Sara también salió a su encuentro[a]. Ella lo saludó, y él los saludó[b], y los introdujo en la casa.
  rationale: Se ajusta el español para reflejar mejor la distinción griega entre encuentro (ὑπήντησεν) y saludo (ἐχαιρέτισεν), se hace más natural la progresión verbal inicial («vino ... llegó»), y se corrigen las notas para que coincidan con el audit trail inglés, especialmente la observación sobre el sujeto implícito de la cláusula final.
