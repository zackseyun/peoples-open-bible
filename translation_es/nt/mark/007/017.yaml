translation:
  language: es
  text: Y cuando entró en una casa, lejos de la multitud, sus discípulos le preguntaban acerca de la parábola.
  philosophy: optimal-equivalence
  footnotes: []
lexical_decisions:
- source_word: Καὶ
  english_pob_choice: And
  chosen_spanish: Y
  alternatives_spanish:
  - Ahora
  - Entonces
  lexicon: BDAG
  rationale: Se conserva el conector narrativo simple para reflejar el flujo del relato de Marcos sin añadir matiz no presente en el griego.
- source_word: ὅτε
  english_pob_choice: when
  chosen_spanish: cuando
  alternatives_spanish:
  - después de que
  - al
  lexicon: BDAG
  rationale: Introduce la circunstancia temporal de manera natural en español y mantiene la relación temporal del original.
- source_word: εἰσῆλθεν εἰς οἶκον
  english_pob_choice: he entered a house
  chosen_spanish: entró en una casa
  alternatives_spanish:
  - entró en la casa
  - se metió en una casa
  lexicon: BDAG
  rationale: El griego carece de artículo ante οἶκον; por eso 'una casa' refleja mejor la forma anartrosa que 'la casa'. 'Entró' preserva el valor verbal de εἰσῆλθεν.
- source_word: ἀπὸ τοῦ ὄχλου
  english_pob_choice: away from the crowd
  chosen_spanish: separado de la multitud
  alternatives_spanish:
  - lejos de la multitud
  - apartado de la multitud
  lexicon: BDAG
  rationale: La frase modifica el entorno del ingreso y expresa separación del grupo. 'Separado de' comunica esa distancia de modo natural en español sin cambiar el sentido.
- source_word: ἐπηρώτων
  english_pob_choice: asked
  chosen_spanish: le preguntaban
  alternatives_spanish:
  - le preguntaron
  - lo interrogaban
  lexicon: BDAG
  rationale: El imperfecto sugiere acción continua o repetida; 'le preguntaban' conserva ese valor aspectual mejor que un simple pretérito puntual.
- source_word: οἱ μαθηταὶ αὐτοῦ
  english_pob_choice: his disciples
  chosen_spanish: sus discípulos
  alternatives_spanish:
  - los discípulos de él
  lexicon: BDAG
  rationale: Es la forma natural en español y mantiene la referencia posesiva explícita del griego.
- source_word: τὴν παραβολήν
  english_pob_choice: the parable
  chosen_spanish: la parábola
  alternatives_spanish:
  - la dicha
  - la ilustración
  lexicon: BDAG
  rationale: '''Parábola'' es el equivalente directo y más habitual para παραβολή en este contexto. Aunque la expresión podría entenderse de manera más amplia, el término específico debe conservarse.'
theological_decisions:
- issue: Cómo rendir παραβολή cuando el contexto podría abarcar un dicho breve o figurativo más amplio
  english_pob_reading: the parable
  chosen_spanish_reading: la parábola
  alternative_spanish_readings:
  - el dicho
  - la ilustración
  rationale: No hay tensión doctrinal, pero sí una decisión interpretativa. Mantener 'parábola' sigue de cerca el término griego y preserva la categoría narrativa usada por Marcos sin diluirla en una paráfrasis más amplia.
  doctrine_reference: Translation philosophy §1, §5
translation_notes:
  revision_awareness: La revisión más reciente no introdujo cambios; el texto griego y la pauta inglesa permanecen estables, con una única nota léxica sobre παραβολή. La propuesta española conserva esa misma decisión interpretativa y refleja además la anartrosis de οἶκον.
  spanish_consistency_notes:
  - Se mantiene 'discípulos' para μαθηταί en concordancia con el uso estándar del POB.
  - Se conserva el tono narrativo sobrio y directo, sin ampliar el contenido más allá del griego.
  - '''Parábola'' se usa de manera consistente con la elección inglesa y con el préstamo bíblico ya asentado en español.'
  - La nota al pie marca la alternativa de 'apartado de la multitud' para transparentar la decisión sobre ἀπὸ τοῦ ὄχλου.
