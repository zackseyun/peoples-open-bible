translation:
  language: es
  text: Escucha[a], hija, y mira; inclina tu oído, y olvida tu pueblo y la casa de tu padre.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «Oye, hija, y mira».
    reason: lexical_alternative
lexical_decisions:
- source_word: שִׁמְעִי
  english_pob_choice: Listen
  chosen_spanish: Escucha
  alternatives_spanish:
  - Oye
  - Escucha atentamente
  lexicon: HALOT
  rationale: El imperativo femenino singular de שׁמע pide atención auditiva. «Escucha» es natural en español moderno y conserva mejor la fuerza exhortativa que un «oye» más coloquial o una expansión como «escucha atentamente».
- source_word: בַת
  english_pob_choice: daughter
  chosen_spanish: hija
  alternatives_spanish:
  - oh hija
  - hija mía
  lexicon: HALOT
  rationale: El vocativo femenino directo se expresa con naturalidad como «hija». Se evita añadir partículas o posesivos que no están en el hebreo.
- source_word: וּרְאִי
  english_pob_choice: and see
  chosen_spanish: y mira
  alternatives_spanish:
  - y ve
  - y contempla
  lexicon: HALOT
  rationale: El imperativo de ראה permite «mira» en español, que suena directo y mantiene la secuencia de mandatos. «Ve» puede sonar más abstracto; «contempla» sería demasiado interpretativo.
- source_word: וְהַטִּי אָזְנֵךְ
  english_pob_choice: incline your ear
  chosen_spanish: inclina tu oído
  alternatives_spanish:
  - tiende tu oído
  - presta oído
  lexicon: HALOT
  rationale: La imagen hebrea de inclinar el oído se conserva bien con «inclina tu oído». «Presta oído» sería una equivalencia idiomática válida, pero pierde la metáfora corporal que el texto presenta.
- source_word: וְשִׁכְחִי
  english_pob_choice: and forget
  chosen_spanish: y olvida
  alternatives_spanish:
  - y deja atrás
  - y abandona
  lexicon: HALOT
  rationale: שׁכח significa «olvidar». Se mantiene la forma simple para no atenuar la demanda de reorientación que sigue en el verso.
- source_word: עַמֵּךְ
  english_pob_choice: your people
  chosen_spanish: tu pueblo
  alternatives_spanish:
  - tu gente
  - tu comunidad
  lexicon: HALOT
  rationale: «Pueblo» reproduce el valor colectivo de עַם y conserva mejor el peso identitario del término que «gente».
- source_word: וּבֵית אָבִיךְ
  english_pob_choice: and your father's house
  chosen_spanish: y la casa de tu padre
  alternatives_spanish:
  - y el hogar de tu padre
  - y la casa paterna
  lexicon: HALOT
  rationale: La expresión hebrea idiomática se traduce de manera transparente como «la casa de tu padre», que preserva el paralelismo con «tu pueblo» y el matiz de linaje/hogar ancestral.
theological_decisions:
- issue: Alcance de la exhortación nupcial
  english_pob_reading: A direct exhortation to the bride to transfer primary allegiance from her natal family to the royal marriage.
  chosen_spanish_reading: Una exhortación directa a la novia para que reoriente su lealtad principal desde su familia de origen hacia su nueva unión matrimonial.
  alternative_spanish_readings:
  - Una llamada general a la atención sin énfasis en cambio de lealtad
  - Una exhortación puramente ceremonial sin implicación relacional
  rationale: La secuencia de imperativos culmina en «olvida a tu pueblo y la casa de tu padre», lo que en contexto matrimonial indica un reordenamiento real de lealtades. La redacción española conserva esa tensión sin añadir desarrollos doctrinales ajenos al verso.
  doctrine_reference: Preservar la tensión textual y el sentido contextual; primacía del hebreo sobre la tradición de traducción.
translation_notes:
  revision_awareness: 'El pasaje coincide con el estado de revisión más reciente: no se registran cambios aplicados y el consenso de auditoría es alto. La versión española sigue la misma decisión léxica básica del POB inglés, con ajuste natural de imperativos al español.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como convención general del proyecto, pero este verso no contiene el nombre divino.
  - Se conserva el paralelismo de imperativos en español sin suavizar la carga relacional del cierre.
  - La nota textual alternativa se ancla en el primer imperativo para reflejar el margen entre «escucha» y «oye» en español.
