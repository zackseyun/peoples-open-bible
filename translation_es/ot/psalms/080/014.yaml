translation:
  language: es
  text: Un jabalí del bosque la destroza[a], y las bestias salvajes del campo pastan en ella[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «la devasta»; el verbo hebreo es raro y sugiere daño por mordida o desgarro destructivo.
    reason: lexical_alternative
  - marker: b
    text: O «se alimentan de ella».
    reason: lexical_alternative
lexical_decisions:
- source_word: יְכַרְסְמֶנָּה
  english_pob_choice: tears it down
  chosen_spanish: lo destroza
  alternatives_spanish:
  - lo devasta
  - lo destruye
  - lo desgarra
  lexicon: HALOT
  rationale: El verbo raro כרסם expresa daño por mordedura o desgarro destructivo. En español, «lo destroza» comunica mejor la acción violenta y el efecto de ruina, sin suavizar el matiz animal del término.
- source_word: חֲזִיר
  english_pob_choice: boar
  chosen_spanish: jabalí
  alternatives_spanish:
  - cerdo
  - cerdo salvaje
  lexicon: HALOT
  rationale: El contexto «del bosque» indica un animal salvaje. «Jabalí» es la forma natural y precisa en español para este referente, y evita la ambigüedad de «cerdo».
- source_word: מִיָּעַר
  english_pob_choice: from the forest
  chosen_spanish: del bosque
  alternatives_spanish:
  - del bosque
  - del monte
  lexicon: HALOT
  rationale: «יער» es «bosque»; en español «del bosque» reproduce de forma directa el origen indicado por la preposición מן y suena natural en esta imagen poética.
- source_word: וְזִיז שָׂדַי
  english_pob_choice: the wild animals of the field
  chosen_spanish: las bestias salvajes del campo
  alternatives_spanish:
  - los animales salvajes del campo
  - las fieras del campo
  - las bestias del campo
  lexicon: HALOT
  rationale: La expresión rara זיז שדי fue interpretada en la POB inglesa como animales salvajes del campo. En español, «bestias salvajes del campo» conserva el tono bíblico y la referencia a fauna salvaje sin perder naturalidad.
- source_word: יִרְעֶנָּה
  english_pob_choice: feed on it
  chosen_spanish: se alimentan de él
  alternatives_spanish:
  - la pastan
  - la devoran
  - se alimentan de ella
  lexicon: HALOT
  rationale: רעה en este contexto describe alimentarse/pastar. «Se alimentan de él» transmite la idea de consumo por animales y mantiene una construcción fluida en español, con antecedente implícito masculino compatible con «el viñedo/la vid» en el contexto poético.
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión inglesa más reciente, que ajustó la segunda mitad de la línea a «wild animals of the field» para reflejar mejor וְזִיז שָׂדַי. La versión española sigue esa decisión y evita una traducción más literal pero menos clara como «criaturas móviles».
  spanish_consistency_notes:
  - Se mantiene «jabalí» para חֲזִיר, en línea con el valor de animal salvaje y con el matiz ya fijado por la POB inglesa.
  - Se usa «bestias salvajes del campo» para conservar el paralelismo poético y el carácter tradicional de la imagen.
  - La referencia pronominal «lo/él» sigue la economía del hebreo y la imagen vegetal implícita del contexto.
  - No se introdujo lenguaje eclesiástico interpretativo; la línea conserva el cuadro agrícola-animal del original.
