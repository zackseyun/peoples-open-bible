translation:
  language: es
  text: los hijos de Dedda[a], los hijos de Bachous, los hijos de Serar, los hijos de Thomthei, los hijos de Nasei[b], los hijos de Hatepha.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El texto griego enumera seis nombres de familia —Dedda, Bachous, Serar, Thomthei, Nasei y Hatepha—, mientras que el paralelo hebreo aproximado presenta tres nombres distintos. Como 1 Esdras se traduce aquí desde el testimonio griego, se conservan los nombres griegos en lugar de armonizarlos con el paralelo hebreo.
    reason: textual_variant
  - marker: b
    text: Varios nombres de este versículo son raros y pueden reflejar inestabilidad textual o diferencias de transliteración en la tradición griega; la traducción sigue de manera conservadora el texto griego proporcionado.
    reason: textual_variant
lexical_decisions:
- source_word: υἱοὶ
  english_pob_choice: the sons of
  chosen_spanish: los hijos de
  alternatives_spanish:
  - los hijos de
  lexicon: LSJ
  rationale: En esta lista genealógica, υἱοὶ funciona como fórmula de pertenencia familiar o de clan. En español, «los hijos de» conserva la estructura repetida del griego y sigue el uso transparente de la POB inglesa.
- source_word: Δεδδά
  english_pob_choice: Dedda
  chosen_spanish: Dedda
  alternatives_spanish:
  - Lebanah
  - Lébana
  lexicon: transliteración directa del griego
  rationale: Se conserva la forma propia del testimonio griego primario, sin armonizarla con el paralelo hebreo aproximado. La lista de 1 Esdras presenta aquí nombres distintos del paralelo MT, por lo que la transliteración directa es la opción más auditable.
- source_word: Βαχούς
  english_pob_choice: Bachous
  chosen_spanish: Bachous
  alternatives_spanish:
  - Hagaba
  lexicon: transliteración directa del griego
  rationale: Se mantiene la forma griega como nombre propio. El paralelo hebreo aproximado ofrece otro nombre, pero el texto base de esta traducción es el griego.
- source_word: Σεράρ
  english_pob_choice: Serar
  chosen_spanish: Serar
  alternatives_spanish:
  - Akkub
  lexicon: transliteración directa del griego
  rationale: La transliteración reproduce de manera conservadora la forma griega recibida, sin intentar normalizarla según el paralelo hebreo.
- source_word: Θόμθει
  english_pob_choice: Thomthei
  chosen_spanish: Thomthei
  alternatives_spanish:
  - Tomtei
  lexicon: transliteración directa del griego
  rationale: Nombre raro y textualmente inestable; se opta por una transliteración cercana al griego para no introducir una normalización no sustentada por las fuentes dadas.
- source_word: Νασεί
  english_pob_choice: Nasei
  chosen_spanish: Nasei
  alternatives_spanish:
  - Nasey
  lexicon: transliteración directa del griego
  rationale: Se conserva la forma griega sin emenda. La evidencia proporcionada no justifica una adaptación distinta.
- source_word: Ἁτεφά
  english_pob_choice: Hatepha
  chosen_spanish: Hatepha
  alternatives_spanish:
  - Atipha
  lexicon: transliteración directa del griego
  rationale: Se refleja el espíritu áspero inicial con H para transparentar la forma griega. Aunque «Atipha» sería una opción más suave en español, «Hatepha» sigue más de cerca el testimonio fuente.
translation_notes:
  revision_awareness: No se aplicaron revisiones posteriores; el pase más reciente indicó que no hubo cambios necesarios. La presente redacción mantiene la línea del audit trail inglés y la prioridad del testimonio griego.
  spanish_consistency_notes:
  - Se mantuvo la fórmula repetida «los hijos de» para conservar la cadencia genealógica del original.
  - Se optó por transliteraciones directas de los nombres propios, sin harmonizarlos con el paralelo hebreo aproximado.
  - No se introdujo terminología teológica ajena al versículo, que es una enumeración nominal sin contenido doctrinal explícito.
