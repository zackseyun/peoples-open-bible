translation:
  language: es
  text: Y ese día se eleva con exactamente siete partes, y sale.
  philosophy: optimal-equivalence
  footnotes: []
lexical_decisions:
- source_word: ይሠርቅ
  english_pob_choice: it rises
  chosen_spanish: sale
  alternatives_spanish:
  - se levanta
  - asciende
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El verbo ge'ez, aplicado a cuerpos celestes, indica el salir/ascender de un astro. En español, «sale» comunica ese movimiento astronómico de manera natural sin perder el carácter técnico del pasaje.
- source_word: በይእቲ ዕለት
  english_pob_choice: on that day
  chosen_spanish: en ese día
  alternatives_spanish:
  - en aquel día
  - aquel día
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La frase temporal sitúa la acción dentro de una secuencia calendárica. «En ese día» conserva la referencia demostrativa y es fluido en español.
- source_word: ሳብዐተ እደ
  english_pob_choice: exactly seven parts
  chosen_spanish: exactamente siete partes
  alternatives_spanish:
  - siete porciones
  - siete partes
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El sustantivo plural expresa porciones o partes de medida. «Exactamente siete partes» sigue la corrección revisada del texto y mantiene la precisión cuantitativa.
- source_word: ጥንቁቀ
  english_pob_choice: exactly
  chosen_spanish: exactamente
  alternatives_spanish:
  - precisamente
  - con exactitud
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La adverbialidad del término refuerza la idea de medida precisa. «Exactamente» es la opción más transparente en español moderno.
- source_word: ይወፅእ
  english_pob_choice: it comes out
  chosen_spanish: sale
  alternatives_spanish:
  - sale afuera
  - sale de allí
  - sale por
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El verbo de salida repetido al final describe el tránsito del astro fuera de la abertura/horizonte. «Sale» preserva la repetición y la sencillez del original.
theological_decisions:
- issue: Personificación del astro con verbo singular masculino en el ge'ez
  english_pob_reading: Render with singular masculine 'he,' referring to the luminary described in context (the moon in this section's sequence).
  chosen_spanish_reading: Traducir sin forzar una personificación explícita en español; el sujeto queda implícito en la sintaxis verbal.
  alternative_spanish_readings:
  - él sale
  - ella sale
  - sale él
  rationale: El original usa formas verbales masculinas singulares, pero el español puede expresar el movimiento celeste sin pronombre expreso. Así se conserva el estilo apocalíptico-cosmológico sin introducir una personificación innecesaria o poco natural.
  doctrine_reference: Preservar la imaginería apocalíptica y astronómica sin aplanarla en prosa moderna.
translation_notes:
  revision_awareness: 'La revisión reciente corrigió un error grave: ይሠርቅ no significa «turns back», በይእቲ ዕለት es «on that day», y ሳብዐተ እደ ጥንቁቀ expresa «exactamente siete partes». La traducción española sigue esa revisión y evita la lectura anterior sobre puerta/portal oriental.'
  spanish_consistency_notes:
  - Se usa un español sobrio y publicable, evitando calcos innecesarios.
  - «Sale» se mantiene para ambos verbos ge'ez, porque el original repite la idea de salida/movimiento astronómico.
  - No se introduce «Cristo», «SEÑOR» ni otras sustituciones terminológicas ajenas al texto.
  - La nota al pie sólo acompaña el punto donde el texto puede insinuar una lectura alternativa de precisión/abertura, pero la línea principal sigue la corrección textual revisada.
