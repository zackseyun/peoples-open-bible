translation:
  language: es
  text: Yahvé determinó destruir el muro de la hija de Sion; extendió un cordel de medir; no retiró su mano de devorar[b], e hizo que el baluarte y el muro se lamentaran; juntos languidecen.
  philosophy: optimal-equivalence
  footnotes:
  - marker: b
    text: O «no hizo volver su mano de consumir». El hebreo literalmente dice «de tragar/devorar», una imagen vívida de destrucción total.
    reason: lexical_alternative
lexical_decisions:
- source_word: חָשַׁב / determined
  english_pob_choice: determined
  chosen_spanish: determinó
  alternatives_spanish:
  - planeó
  - dispuso
  - resolvió
  lexicon: HALOT
  rationale: El verbo expresa una intención deliberada y decidida de Yahvé en juicio. «Determinó» conserva esa fuerza de decisión sin sonar forzado en español.
- source_word: יְהוָה / Yahweh
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  - el SEÑOR
  lexicon: HALOT
  rationale: 'Se sigue la directriz del proyecto para el Tetragrámaton: usar «Yahvé» como nombre divino, manteniendo el valor propio del nombre de pacto y no una sustitución titulada.'
- source_word: לְהַשְׁחִית / to destroy
  english_pob_choice: to destroy
  chosen_spanish: destruir
  alternatives_spanish:
  - arruinar
  - llevar a ruina
  lexicon: HALOT
  rationale: El infinitivo hifil comunica destrucción activa. «Destruir» es directo y fiel al sentido de juicio.
- source_word: חוֹמַת בַּת צִיּוֹן / the wall of daughter Zion
  english_pob_choice: the wall of daughter Zion
  chosen_spanish: el muro de la hija de Sion
  alternatives_spanish:
  - el muro de la hija de Jerusalén
  - el muro de la hija de Sion
  lexicon: HALOT
  rationale: Se conserva la personificación poética «hija de Sion» y el sustantivo «muro» para mantener la imagen del hebreo sin paraprasear a «Jerusalén».
- source_word: נָטָה קָו / stretched out a measuring line
  english_pob_choice: stretched out a measuring line
  chosen_spanish: extendió un cordel de medir
  alternatives_spanish:
  - tendió una línea de medir
  - extendió una línea de medida
  lexicon: HALOT
  rationale: «Cordel de medir» hace explícita la imagen de medición con un equivalente natural en español, conservando el carácter deliberado del acto.
- source_word: לֹא הֵשִׁיב יָדוֹ מִבַּלֵּעַ / he did not hold back his hand from swallowing up
  english_pob_choice: he did not hold back his hand from swallowing up
  chosen_spanish: no retiró su mano de devorar
  alternatives_spanish:
  - no apartó su mano de tragar
  - no volvió atrás su mano de consumir
  lexicon: HALOT
  rationale: La expresión idiomática de «no volver/retirar la mano» se traduce de manera natural. «Devorar» conserva la imagen vívida de בלע, aunque en español el matiz de destrucción total queda implícito más que literal.
- source_word: וַיַּאֲבֶל חֵל וְחוֹמָה / he made rampart and wall mourn
  english_pob_choice: he made rampart and wall mourn
  chosen_spanish: hizo que el baluarte y el muro lamentaran
  alternatives_spanish:
  - hizo llorar al baluarte y al muro
  - hizo que la muralla y el baluarte se lamentaran
  lexicon: HALOT
  rationale: El causativo se expresa con «hizo que». «Baluarte» comunica el componente fortificado de חֵל mejor que un término más genérico, y «lamentaran» mantiene la personificación poética.
- source_word: יַחְדָּו / together
  english_pob_choice: together
  chosen_spanish: juntos
  alternatives_spanish:
  - juntamente
  - a la vez
  lexicon: HALOT
  rationale: «Juntos» es el equivalente más natural y reproduce la idea de condición compartida de ambos elementos.
- source_word: אֻמְלָלוּ / they languish
  english_pob_choice: they languish
  chosen_spanish: languidecen
  alternatives_spanish:
  - se marchitan
  - desfallecen
  - se consumen
  lexicon: HALOT
  rationale: Se adopta «languidecen» por ser sobrio, poético y próximo al registro de lamento, siguiendo la revisión inglesa que prefirió «languish» por sobre una versión más fuerte o menos natural.
theological_decisions:
- issue: Renderización del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - el SEÑOR
  rationale: Se preserva el nombre propio de Dios según la norma del proyecto. Esto evita la sustitución litúrgica y mantiene auditable la presencia del Tetragrámaton en el texto.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Personificación de Sion y de las fortificaciones
  english_pob_reading: the wall of daughter Zion; he made rampart and wall mourn
  chosen_spanish_reading: el muro de la hija de Sion; hizo que el baluarte y el muro lamentaran
  alternative_spanish_readings:
  - el muro de la hija de Sion; hizo llorar al baluarte y al muro
  - el muro de la hija de Sion; hizo que la muralla y el baluarte se lamentaran
  rationale: Se conserva la personificación poética y la tensión retórica del hebreo, donde estructuras defensivas aparecen como dolientes. No se neutraliza a una mera descripción arquitectónica.
  doctrine_reference: Poética hebrea y lamento profético
translation_notes:
  revision_awareness: La redacción sigue la revisión inglesa más reciente al preferir «languidecen» para אֻמְלָלוּ, manteniendo el paralelismo con «lamentaran» y evitando una solución demasiado fuerte o poco natural. También conserva la decisión auditada de traducir el Tetragrámaton como nombre propio de Dios.
  spanish_consistency_notes:
  - Se usa «Yahvé» de forma consistente para יְהוָה, conforme a la política del proyecto.
  - Se mantiene «hija de Sion» para la personificación poética, sin sustituirla por «Jerusalén».
  - «Baluarte» traduce חֵל para distinguirlo de «muro» y preservar la pareja poética.
  - El registro es formal y bíblico, pero con sintaxis natural en español contemporáneo.
