base_translation:
  language: en
  yaml_path: translation/ot/2_kings/018/018.yaml
  text: And they called to the king[a], and Eliakim son of Hilkiah, who was over the household, came out to them, along with Shebna the scribe and Joah son of Asaph[c][b], the recorder.
