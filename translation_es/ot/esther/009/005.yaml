translation:
  language: es
  text: Así los judíos hirieron a todos sus enemigos con el golpe de la espada[a], y con matanza y destrucción, e hicieron a los que los aborrecían conforme a su voluntad[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «con el golpe de la espada». La expresión hebrea es literalmente «el golpe de la espada».'
    reason: lexical_alternative
  - marker: b
    text: 'O: «según su voluntad».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּכּוּ
  english_pob_choice: struck
  chosen_spanish: hirieron
  alternatives_spanish:
  - golpearon
  - hirieron de muerte
  - mataron
  lexicon: HALOT
  rationale: הכה expresa la acción de golpear o herir. 'Hirieron' mantiene el verbo de acción sin convertirlo prematuramente en 'mataron', porque el verso ya acumula sustantivos que especifican el resultado violento.
- source_word: הַיְּהוּדִים
  english_pob_choice: the Jews
  chosen_spanish: los judíos
  alternatives_spanish:
  - los judeanos
  lexicon: HALOT
  rationale: En Ester, el término designa al pueblo judío en el contexto de la diáspora persa. 'Los judíos' es la opción natural y fiel al uso contextual.
- source_word: בְּכָל אֹיְבֵיהֶם
  english_pob_choice: all their enemies
  chosen_spanish: a todos sus enemigos
  alternatives_spanish:
  - contra todos sus enemigos
  - a cada uno de sus enemigos
  lexicon: HALOT
  rationale: La construcción con כל marca totalidad. 'A todos sus enemigos' conserva el alcance completo y suena natural en español.
- source_word: מַכַּת חֶרֶב
  english_pob_choice: the stroke of the sword
  chosen_spanish: con el golpe de la espada
  alternatives_spanish:
  - con el golpe de la espada
  - con el golpe de la espada[a]
  lexicon: HALOT
  rationale: La frase hebrea es literalmente 'golpe de espada'. 'Golpe de la espada' preserva la imagen concreta y el valor enfático de la construcción nominal.
- source_word: וְהֶרֶג
  english_pob_choice: with slaughter
  chosen_spanish: matanza
  alternatives_spanish:
  - y matanza
  - y matadero
  lexicon: HALOT
  rationale: הרג como sustantivo denota matanza o degüello. 'Matanza' comunica bien la violencia del texto sin exceso interpretativo.
- source_word: וְאַבְדָן
  english_pob_choice: destruction
  chosen_spanish: destrucción
  alternatives_spanish:
  - aniquilación
  - ruina
  lexicon: HALOT
  rationale: אבדן significa destrucción o perdición. 'Destrucción' es fuerte, claro y suficientemente literal.
- source_word: וַיַּעֲשׂוּ
  english_pob_choice: they did
  chosen_spanish: hicieron
  alternatives_spanish:
  - actuaron
  - procedieron
  lexicon: HALOT
  rationale: עשה es amplio y aquí debe mantenerse como verbo general. 'Hicieron' deja que la frase siguiente precise el contenido de la acción.
- source_word: בְשֹׂנְאֵיהֶם
  english_pob_choice: to those who hated them
  chosen_spanish: a los que los aborrecían
  alternatives_spanish:
  - contra los que los aborrecían
  - a sus odiadores
  lexicon: HALOT
  rationale: El participio de שׂנא subraya una relación activa de odio, más específica que 'enemigos'. 'Aborrecían' transmite con claridad esa relación personal de hostilidad.
- source_word: כִּרְצוֹנָם
  english_pob_choice: as they pleased
  chosen_spanish: conforme a su voluntad
  alternatives_spanish:
  - como quisieron
  - según su voluntad
  lexicon: HALOT
  rationale: La expresión significa literalmente 'según su voluntad/deseo'. 'Conforme a su voluntad' preserva la idea de libre disposición y mantiene una dignidad formal adecuada.
theological_decisions:
- issue: Mantener la secuencia violenta del verso sin atenuarla ni amplificarla
  english_pob_reading: Retain the verse's stark description of lethal action in straightforward English
  chosen_spanish_reading: Conservar la descripción directa y acumulativa de la violencia
  alternative_spanish_readings:
  - Suavizar con 'derrotaron' o 'vencieron'
  - Intensificar con 'aniquilaron' en toda la línea
  rationale: 'El hebreo acumula términos de violencia: ''golpe de la espada'', ''matanza'' y ''destrucción''. La traducción debe reflejar esa densidad sin sustituirla por lenguaje más interpretativo que el texto no exige.'
  doctrine_reference: Principio de primacía del texto original y de no paraphrasear más allá de lo que warrant el hebreo.
translation_notes:
  revision_awareness: He seguido la revisión que prefirió «stroke of the sword» sobre «blow of the sword» y que añadió la coordinación explícita antes de «slaughter and destruction». En español, eso se refleja con «golpe de la espada» y con la coordinación «y con matanza y destrucción».
  spanish_consistency_notes:
  - Se conservó la distinción entre «enemigos» y «los que los aborrecían», como en el hebreo entre אֹיְבֵיהֶם y שֹׂנְאֵיהֶם.
  - Se mantuvo el valor verbal general de עשה con «hicieron», sin convertirlo en una traducción interpretativa.
  - Se eligió un español formal y claro, evitando arcaísmos innecesarios pero preservando la contundencia del texto.
