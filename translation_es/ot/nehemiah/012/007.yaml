translation:
  language: es
  text: Sallú, Amoc, Hilquías, Jedaías—estos eran los jefes[a] de los sacerdotes y sus hermanos[b] en los días de Jesúa[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «líderes de los sacerdotes». El hebreo dice literalmente «cabezas de los sacerdotes».
    reason: lexical_alternative
  - marker: b
    text: O «sus parientes» o «sus compañeros sacerdotes». El hebreo dice «sus hermanos».
    reason: lexical_alternative
  - marker: c
    text: «Jesúa» es la forma postexílica del nombre, relacionada también con «Josué».
    reason: cultural_note
lexical_decisions:
- source_word: סַלּוּ
  english_pob_choice: Sallu
  chosen_spanish: Salu
  alternatives_spanish:
  - Sallu
  lexicon: HALOT
  rationale: Es un nombre propio; se translitera al español de forma natural y legible. Se conserva la secuencia consonántica principal del hebreo sin intentar traducirlo.
- source_word: עָמוֹק
  english_pob_choice: Amok
  chosen_spanish: Amoc
  alternatives_spanish:
  - Amok
  lexicon: HALOT
  rationale: Nombre propio en lista genealógica. En español, la -k final se adapta normalmente como -c para una grafía más natural, manteniendo la transliteración del nombre.
- source_word: חִלְקִיָּה
  english_pob_choice: Hilkiah
  chosen_spanish: Hilquías
  alternatives_spanish:
  - Hilkías
  - Hilkiah
  lexicon: HALOT
  rationale: Nombre propio conocido en castellano bíblico; 'Hilquías' conserva la pronunciación aproximada y evita un calco inglés innecesario.
- source_word: יְדַעְיָה
  english_pob_choice: Jedaiah
  chosen_spanish: Jedaías
  alternatives_spanish:
  - Yedaías
  - Jedaiah
  lexicon: HALOT
  rationale: Nombre propio hebreo transliterado al español con terminación -ías, que refleja bien la forma onomástica bíblica y resulta más natural que la forma inglesa.
- source_word: אֵלֶּה
  english_pob_choice: these
  chosen_spanish: estos
  alternatives_spanish:
  - estos hombres
  - éstos
  lexicon: HALOT
  rationale: Demostrativo plural que refiere a las personas nombradas. 'Estos' es suficiente en español sin añadir un sustantivo no explícito en el hebreo.
- source_word: רָאשֵׁי
  english_pob_choice: heads of
  chosen_spanish: jefes de
  alternatives_spanish:
  - cabezas de
  - líderes de
  lexicon: HALOT
  rationale: El hebreo usa una imagen de 'cabezas' para indicar autoridad. En español, 'jefes de' comunica bien la función de liderazgo sin sonar forzado ni introducir una denominación técnica posterior.
- source_word: הַכֹּהֲנִים
  english_pob_choice: the priests
  chosen_spanish: los sacerdotes
  alternatives_spanish:
  - los sacerdotes
  - los presbíteros
  lexicon: HALOT
  rationale: '''Sacerdotes'' es el equivalente natural en español para הַכֹּהֲנִים. Se evita ''presbíteros'', que sería anacrónico en este contexto del AT.'
- source_word: וַאֲחֵיהֶם
  english_pob_choice: and their brothers
  chosen_spanish: y sus hermanos
  alternatives_spanish:
  - y sus parientes
  - y sus compañeros sacerdotes
  lexicon: HALOT
  rationale: Se mantiene el término literal 'hermanos', que preserva la tensión lexical del hebreo. En este contexto puede abarcar a miembros de la misma familia o del mismo cuerpo sacerdotal, pero el texto no explicita más.
- source_word: בִּימֵי
  english_pob_choice: in the days of
  chosen_spanish: en los días de
  alternatives_spanish:
  - durante el tiempo de
  lexicon: HALOT
  rationale: Idiomático y fiel al hebreo temporal. 'En los días de' conserva el giro bíblico sin perder naturalidad en español.
- source_word: יֵשׁוּעַ
  english_pob_choice: Jeshua
  chosen_spanish: Jesúa
  alternatives_spanish:
  - Jeshúa
  - Josué
  lexicon: HALOT
  rationale: Se usa la forma española habitual para el nombre postexílico en Esdras-Nehemías. Se distingue de 'Josué', que remite a la forma más plena y a otras tradiciones onomásticas.
theological_decisions:
- issue: Título relacional de רָאשֵׁי הַכֹּהֲנִים
  english_pob_reading: heads of the priests
  chosen_spanish_reading: jefes de los sacerdotes
  alternative_spanish_readings:
  - líderes de los sacerdotes
  - cabezas de los sacerdotes
  rationale: No se adopta un título técnico eclesiástico posterior. 'Jefes de los sacerdotes' refleja la estructura hebrea y la función de liderazgo sin sobrecargar el pasaje con connotaciones ajenas al contexto.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4
- issue: Alcance de וַאֲחֵיהֶם
  english_pob_reading: their brothers
  chosen_spanish_reading: sus hermanos
  alternative_spanish_readings:
  - sus parientes
  - sus compañeros sacerdotes
  rationale: Se conserva el término masculino plural del hebreo, tal como hace la POB inglesa. Aunque el contexto puede sugerir miembros afines del grupo sacerdotal, la traducción no debe borrar la forma literal ni resolver de antemano la ambigüedad.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4
translation_notes:
  revision_awareness: 'El pasaje coincide con la revisión más reciente: no se requieren cambios respecto del texto base auditado. Se mantuvo la lista nominal breve, la estructura copulativa y el orden general del hebreo, con adaptación española natural en nombres propios y sintaxis.'
  spanish_consistency_notes:
  - Se conservó el demostrativo plural sin añadir sustantivos no expresos.
  - '''Jeshua'' se normalizó como ''Jesúa'' para lectura española, siguiendo el uso onomástico bíblico del español.'
  - Se evitó 'SEÑOR' u otras sustituciones reverenciales porque el versículo no contiene el Tetragrámaton.
  - Se mantuvo 'sus hermanos' para preservar la tensión lexical documentada en el hebreo y en la POB inglesa.
