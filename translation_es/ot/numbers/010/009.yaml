revisions:
- from: Y cuando vayan a la guerra en su tierra contra el enemigo que los oprime[a], tocarán la alarma con las trompetas, y serán recordados delante de Yahvé su Dios[b][c], y serán salvados de sus enemigos.
  to: Y cuando vayan a la guerra en su tierra contra el enemigo que los oprime[a], harán sonar una alarma con las trompetas, y serán recordados delante de Yahvé su Dios[b][c], y serán librados de sus enemigos.
  rationale: 'Se hicieron dos reparaciones menores: 1) «harán sonar una alarma con las trompetas» expresa de forma más natural y precisa la función de señal militar del hebreo וַהֲרֵעֹתֶם בַּחֲצֹצְרֹת; 2) «serán librados» suena más idiomático en el contexto bélico para וְנוֹשַׁעְתֶּם, manteniendo el sentido de liberación divina. Se conservaron «Y cuando», «su tierra», «serán recordados» y «Yahvé» por su buena alineación con el texto fuente y la política terminológica del proyecto.'
