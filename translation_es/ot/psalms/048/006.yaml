translation:
  language: es
  text: Ellos vieron[a], y así quedaron asombrados; quedaron aterrados; huyeron apresuradamente.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «miraron». El hebreo expresa simplemente el hecho de ver; el contexto inmediato explica la reacción que sigue.'
    reason: lexical_alternative
lexical_decisions:
- source_word: הֵמָּה
  english_pob_choice: They
  chosen_spanish: Ellos
  alternatives_spanish:
  - Esos
  - Ellos mismos
  lexicon: HALOT
  rationale: El pronombre independiente hebreo añade énfasis. En español, "Ellos" conserva la referencia y el tono enfático sin volver la frase pesada o artificial.
- source_word: רָאוּ
  english_pob_choice: saw
  chosen_spanish: vieron
  alternatives_spanish:
  - miraron
  - percibieron
  lexicon: HALOT
  rationale: El verbo base es simplemente "ver". "Vieron" es natural y directo en español, manteniendo el valor aspectual del perfecto.
- source_word: כֵּן
  english_pob_choice: and so
  chosen_spanish: y así
  alternatives_spanish:
  - así
  - entonces
  - por eso
  lexicon: HALOT
  rationale: La partícula introduce consecuencia o resultado de lo visto. "Y así" reproduce esa relación de manera fluida y no excesivamente interpretativa.
- source_word: תָּמָהוּ
  english_pob_choice: were astonished
  chosen_spanish: quedaron asombrados
  alternatives_spanish:
  - se asombraron
  - quedaron maravillados
  - quedaron atónitos
  lexicon: HALOT
  rationale: El hebreo expresa sorpresa súbita. "Quedaron asombrados" mantiene el impacto del estado resultante y evita cargar el matiz hacia admiración positiva o horror negativo.
- source_word: נִבְהֲלוּ
  english_pob_choice: were terrified
  chosen_spanish: fueron aterrados
  alternatives_spanish:
  - se aterrorizaron
  - quedaron aterrados
  - fueron alarmados
  lexicon: HALOT
  rationale: La raíz puede expresar alarma intensa o terror. Dado la escalada emocional del versículo, "fueron aterrados" conserva la fuerza del pasivo/resultativo sin introducir un sujeto agente inexistente.
- source_word: נֶחְפָּזוּ
  english_pob_choice: fled in haste
  chosen_spanish: huyeron apresuradamente
  alternatives_spanish:
  - huyeron a toda prisa
  - se apresuraron a huir
  - fueron puestos en fuga
  lexicon: HALOT
  rationale: El verbo denota prisa urgente, a menudo por pánico. "Huyeron apresuradamente" refleja esa idea y sigue de cerca la revisión inglesa final que corrigió la interpretación hacia la rapidez más que hacia el pánico explícito.
translation_notes:
  revision_awareness: La versión inglesa auditada fue revisada de «fled in panic» a «fled in haste» para ajustarse más de cerca a נֶחְפָּזוּ. La redacción española sigue esa revisión con «huyeron apresuradamente», evitando añadir una glosa emocional que el último pase inglés dejó de explicitar.
  spanish_consistency_notes:
  - 'Se conservó el orden retórico breve del hebreo: sujeto, visión, resultado emocional, huida.'
  - Se evitó «SEÑOR» u otra convención de sustitución porque este versículo no contiene el nombre divino.
  - «Asombrados» y «aterrados» mantienen dos reacciones distintas y escalonadas, sin fusionarlas en un solo término.
  - El adverbio final expresa velocidad urgente sin sobretraducir a «pánico», en línea con la revisión auditada.
