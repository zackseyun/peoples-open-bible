translation:
  language: es
  text: entonces, que mi hombro caiga desde el omóplato[a], y que mi brazo sea quebrado desde el hueso[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'desde el hombro'. El hebreo probablemente describe el hombro desprendiéndose de su lugar; la revisión inglesa optó por una referencia más anatómica, 'shoulder blade'.
    reason: lexical_alternative
  - marker: b
    text: O 'desde la articulación'. El término hebreo es raro y puede referirse al hueso del brazo o a su estructura de unión.
    reason: lexical_alternative
lexical_decisions:
- source_word: כְּתֵפִי
  english_pob_choice: my shoulder
  chosen_spanish: mi hombro
  alternatives_spanish:
  - mi hombro
  - mi costado
  - mi parte del hombro
  lexicon: HALOT
  rationale: כָּתֵף designa normalmente el hombro o lado del cuerpo. En español, 'hombro' es la equivalencia natural y mantiene el paralelismo con 'brazo'.
- source_word: מִשִּׁכְמָה
  english_pob_choice: from the shoulder blade
  chosen_spanish: de la escápula
  alternatives_spanish:
  - del omóplato
  - del hombro
  - de la espalda
  lexicon: HALOT
  rationale: La revisión inglesa prefirió una designación anatómica más precisa para שִׁכְמָה. 'Escápula' conserva esa precisión en español sin añadir una paráfrasis interpretativa como 'fuera de su sitio'.
- source_word: תִפּוֹל
  english_pob_choice: fall
  chosen_spanish: caiga
  alternatives_spanish:
  - caiga
  - se desprenda
  - se disloque
  lexicon: HALOT
  rationale: El hebreo dice literalmente 'caer'. En español, 'caiga' preserva la imagen verbal y encaja con el tono imprecatorio del pasaje.
- source_word: וְאֶזְרֹעִי
  english_pob_choice: and my arm
  chosen_spanish: mi brazo
  alternatives_spanish:
  - mi brazo
  - mi antebrazo
  lexicon: HALOT
  rationale: זְרוֹעַ se traduce de manera directa por 'brazo'. 'Brazo' es más fiel al uso bíblico amplio que un término anatómico más estrecho.
- source_word: מִקָּנָה
  english_pob_choice: from the bone
  chosen_spanish: del hueso
  alternatives_spanish:
  - de la articulación
  - del hueso
  - del encaje
  lexicon: HALOT
  rationale: El término hebreo es raro y la POB inglesa lo trató como una referencia anatómica concreta. 'Del hueso' reproduce la concreción sin forzar una identificación más específica que el texto no asegura.
- source_word: תִשָּׁבֵר
  english_pob_choice: be broken
  chosen_spanish: sea quebrado
  alternatives_spanish:
  - sea quebrado
  - sea roto
  lexicon: HALOT
  rationale: 'El nifal de שׁבר expresa pasividad: ''ser quebrado/roto''. ''Quebrado'' mantiene un registro bíblico y evita el matiz demasiado coloquial de ''roto''.'
translation_notes:
  revision_awareness: 'La redacción española toma en cuenta la revisión inglesa más reciente: se evita ''socket'' como explicación añadida y se adopta una forma anatómica más precisa para שִׁכְמָה, mientras que מִקָּנָה se conserva como referencia corporal general compatible con la ambigüedad documentada.'
  spanish_consistency_notes:
  - Se mantuvo el registro imprecatorio con subjuntivo exhortativo ('que... caiga', 'que... sea quebrado').
  - '''Hombro'' y ''brazo'' preservan el paralelismo corporal del hebreo y de la POB inglesa.'
  - Se evitó 'SEÑOR' u otra sustitución teológica, ya que no aparece el tetragrámaton en este versículo.
