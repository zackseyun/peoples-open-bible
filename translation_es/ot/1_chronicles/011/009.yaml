translation:
  language: es
  text: Y David se hacía cada vez más grande[a], y Yahvé de los Ejércitos estaba con él.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «David iba, yendo y haciéndose grande», un modismo que significa que se hacía progresivamente más grande.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֵּלֶךְ
  english_pob_choice: became
  chosen_spanish: iba creciendo
  alternatives_spanish:
  - crecía
  - se iba haciendo
  lexicon: HALOT
  rationale: El hebreo en la expresión וילך הלוך וגדול no describe movimiento literal, sino incremento progresivo. En español, 'iba creciendo' comunica de modo natural esa intensificación continua sin añadir causalidad ni cambiar el sentido.
- source_word: הָלוֹךְ וְגָדוֹל
  english_pob_choice: greater and greater
  chosen_spanish: cada vez más
  alternatives_spanish:
  - más y más grande
  - creciendo continuamente
  - cada vez mayor
  lexicon: HALOT
  rationale: La construcción infinitivo absoluto + adjetivo expresa progreso sostenido. 'Cada vez más' preserva ese avance gradual en español actual, y se deja 'creciendo' para reflejar el aspecto verbal del hebreo.
- source_word: דָּוִיד
  english_pob_choice: David
  chosen_spanish: David
  alternatives_spanish:
  - Dávid
  lexicon: Nombre propio bíblico estándar
  rationale: Se mantiene la forma española usual del nombre propio, plenamente reconocible y fiel al מקור hebreo.
- source_word: וַיהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  - SEÑOR
  lexicon: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
  rationale: La línea editorial del proyecto para el Tetragrámaton es 'Yahvé' en el texto principal. Se evita el reemplazo por 'SEÑOR' para conservar el nombre divino explícito del hebreo.
- source_word: צְבָאוֹת
  english_pob_choice: of hosts
  chosen_spanish: de los ejércitos
  alternatives_spanish:
  - de los huestes
  - de los ejércitos celestiales
  lexicon: HALOT
  rationale: '''צבאות'' con el nombre divino funciona como título fijo. En español, ''de los ejércitos'' conserva la imagen de fuerzas organizadas y suena más natural y claro que un calco como ''de los hosts''.'
- source_word: עִמּוֹ
  english_pob_choice: with him
  chosen_spanish: estaba con él
  alternatives_spanish:
  - estaba junto a él
  - lo acompañaba
  lexicon: HALOT
  rationale: El valor básico de עם + sufijo es presencia/acompañamiento. 'Estaba con él' reproduce la idea sin sobreinterpretar 'on his side' ni introducir matices ausentes.
theological_decisions:
- issue: Rendering of the divine name יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - SEÑOR
  rationale: El texto hebreo usa directamente el Tetragrámaton. Dado el estándar terminológico del proyecto, se vierte como 'Yahvé' para preservar la identidad del nombre de pacto y evitar la sustitución litúrgica por un título.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Idiomatic progression in וילך הלוך וגדול
  english_pob_reading: And David became greater and greater
  chosen_spanish_reading: Y David iba creciendo cada vez más
  alternative_spanish_readings:
  - Y David crecía cada vez más
  - Y David se iba haciendo cada vez más grande
  rationale: La fuerza del hebreo es progresiva e idiomática; no se trata de desplazamiento físico. 'Iba creciendo cada vez más' conserva el aspecto de incremento continuo y evita una lectura causal añadida que no está en el texto.
  doctrine_reference: HALOT; idiom of progressive increase
translation_notes:
  revision_awareness: 'La versión inglesa auditada pasó de ''for'' a ''and'' para reflejar con mayor precisión la conjunción hebrea. En español se mantiene ''y'' sin valor causal añadido. También se ajustó el nombre divino según la política terminológica del proyecto: en lugar de la convención inglesa ''the LORD'', se usa ''Yahvé''.'
  spanish_consistency_notes:
  - Se conserva el paralelismo progresivo del hebreo con una construcción natural en español.
  - '''Yahvé de los ejércitos'' mantiene el título divino completo sin neutralizar el nombre propio.'
  - No se introduce una causalidad implícita entre las dos cláusulas.
  - La nota explica el modismo hebreo sin sobretraducirlo de manera mecánica.
