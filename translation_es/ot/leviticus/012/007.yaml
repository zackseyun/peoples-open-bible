revisions:
- from: Y él lo presentará delante de Yahvé y hará expiación por ella, y ella será purificada del manantial[a] de su sangre. Esta es la ley de la mujer que da a luz, sea varón o hembra.
  to: Y lo presentará delante de Yahvé y hará expiación por ella, y ella será purificada del manantial[a] de su sangre. Esta es la ley de la mujer que da a luz, ya sea a un varón o a una hembra.
  rationale: Se quitó el pronombre explícito inicial para un español más natural y se corrigió la cláusula final para reflejar claramente que 'varón o hembra' se refiere al hijo que la mujer da a luz, no a la mujer misma. Se conserva la nota léxica sobre 'manantial/fuente'.
  reviewer_model: gpt-5.4
