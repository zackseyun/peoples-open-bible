translation:
  language: es
  text: Pero si[a], el día que su marido se entera, se opone a ella y anula su voto que está sobre ella, o la expresión apresurada de sus labios, por la cual se obligó a sí misma, Yahvé la perdonará.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «la expresión de sus labios» o «la expresión vinculante de sus labios».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְאִם
  english_pob_choice: But if
  chosen_spanish: Pero si
  alternatives_spanish:
  - Y si
  - Pero en caso de que
  lexicon: HALOT
  rationale: La construcción introduce un caso condicional con matiz de contraste respecto del caso anterior; «Pero si» conserva la fuerza adversativa y la naturalidad del español.
- source_word: בְּיוֹם שְׁמֹעַ
  english_pob_choice: on the day ... hears of it
  chosen_spanish: el día que ... lo oye
  alternatives_spanish:
  - cuando ... lo oye
  - en el día de oírlo
  lexicon: HALOT
  rationale: El infinitivo con בְּיוֹם marca el tiempo en que el marido llega a saberlo. «El día que ... lo oye» preserva el marco temporal legal sin sonar forzado en español.
- source_word: אִישָׁהּ
  english_pob_choice: her husband
  chosen_spanish: su marido
  alternatives_spanish:
  - su esposo
  - su hombre
  lexicon: HALOT
  rationale: En este contexto legal, אִישׁ con sufijo femenino refiere al marido. «Marido» es preciso y natural; «esposo» es posible, pero menos directo en este registro.
- source_word: יָנִיא אוֹתָהּ
  english_pob_choice: he forbids her
  chosen_spanish: la prohíbe
  alternatives_spanish:
  - la restringe
  - la disuade
  lexicon: HALOT
  rationale: El hiphil de נוא en contextos de votos expresa impedir o invalidar la obligación. «La prohíbe» comunica la acción jurídica de impedirle cumplir o quedar obligada por el voto.
- source_word: וְהֵפֵר
  english_pob_choice: and annuls
  chosen_spanish: y anula
  alternatives_spanish:
  - y deja sin efecto
  - y invalida
  lexicon: HALOT
  rationale: En lenguaje legal, הפר significa invalidar formalmente. «Anula» es el equivalente español más directo para una cancelación jurídica.
- source_word: נִדְרָהּ
  english_pob_choice: her vow
  chosen_spanish: su voto
  alternatives_spanish:
  - su voto votivo
  - su promesa
  lexicon: HALOT
  rationale: En español bíblico «voto» comunica bien נדר como promesa obligatoria hecha a Dios. «Voto» es más natural en este capítulo que «voto votivo» o «promesa».
- source_word: אֲשֶׁר עָלֶיהָ
  english_pob_choice: that is upon her
  chosen_spanish: que está sobre ella
  alternatives_spanish:
  - que pesa sobre ella
  - que recae sobre ella
  lexicon: HALOT
  rationale: La imagen hebrea de una obligación que «está sobre» alguien se conserva de forma transparente. «Está sobre ella» resulta claro en español y mantiene la metáfora jurídica.
- source_word: מִבְטָא שְׂפָתֶיהָ
  english_pob_choice: the rash utterance of her lips
  chosen_spanish: la expresión apresurada de sus labios[a]
  alternatives_spanish:
  - la expresión de sus labios
  - la palabra obligante de sus labios
  lexicon: HALOT
  rationale: מִבְטָא es una expresión verbal; en este contexto de votos, el POB inglés toma la idea como una formulación impulsiva o apresurada. «Expresión apresurada» preserva esa tensión sin convertirla en una interpretación demasiado libre.
- source_word: אֲשֶׁר אָסְרָה עַל נַפְשָׁהּ
  english_pob_choice: by which she bound herself
  chosen_spanish: por la cual se obligó a sí misma
  alternatives_spanish:
  - con la que se ató a sí misma
  - por la que se comprometió
  lexicon: HALOT
  rationale: אָסַר עַל נֶפֶשׁ es un modismo de autoobligación. «Se obligó a sí misma» reproduce la fuerza reflexiva y legal sin introducir una metáfora ajena al español.
- source_word: וַיהוָה
  english_pob_choice: the LORD
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: Siguiendo el estándar del proyecto para יְהוָה, se usa «Yahvé» y no una sustitución devocional. Esto mantiene visible el nombre divino del original hebreo.
- source_word: יִסְלַח לָהּ
  english_pob_choice: will forgive her
  chosen_spanish: la perdonará
  alternatives_spanish:
  - le concederá perdón
  - la absolverá
  lexicon: HALOT
  rationale: סלח en este marco legal-covenantal se traduce mejor como «perdonar». «La perdonará» conserva el sentido de remisión de culpa o carga legal.
theological_decisions:
- issue: Nombre divino en el texto hebreo
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: El texto hebreo usa el Tetragrámaton, no un título genérico. En coherencia con la política del proyecto, se mantiene el nombre propio divino visible en español.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יהוה / YHWH → Yahvé'
- issue: Sentido de la cláusula sobre la expresión de los labios
  english_pob_reading: the rash utterance of her lips
  chosen_spanish_reading: la expresión apresurada de sus labios
  alternative_spanish_readings:
  - la expresión de sus labios
  - la palabra obligante de sus labios
  rationale: El hebreo permite entender una formulación verbal que la mujer pronunció bajo autoobligación; el inglés POB preserva una posible nuance de imprudencia. El español mantiene esa tensión con «apresurada» sin cerrar indebidamente la opción más neutral.
  doctrine_reference: Numbers 30:9 lexical/theological audit trail
translation_notes:
  revision_awareness: Se siguió el texto hebreo WLC y el rastro auditado en inglés POB. No hubo revisiones posteriores aplicadas; la redacción española conserva la ambigüedad lexical documentada en מִבְטָא שְׂפָתֶיהָ mediante una nota alternativa.
  spanish_consistency_notes:
  - Se usó «Yahvé» para יְהוָה conforme al estándar del proyecto.
  - Se prefirió «voto» para נדר por ser el término bíblico natural en español en este contexto legal.
  - Se mantuvo la imagen de obligación «sobre ella» para reflejar el hebreo sin sobreexplicar.
  - Se evitó «SEÑOR» como sustituto del nombre divino, porque aquí el original hebreo es explícito.
