translation:
  language: es
  text: Un salmo de David. Yahvé, escucha mi oración; presta oído a mis súplicas de misericordia[a]. En tu fidelidad[b], respóndeme, en tu justicia[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O ‘mis súplicas’.
    reason: lexical_alternative
  - marker: b
    text: O ‘por tu fidelidad’; el hebreo también puede entenderse como una apelación fundada en la fidelidad de Dios.
    reason: lexical_alternative
  - marker: c
    text: O ‘en tu rectitud’ o ‘por tu justicia’.
    reason: lexical_alternative
lexical_decisions:
- source_word: מִזְמוֹר
  english_pob_choice: A psalm
  chosen_spanish: Un salmo
  alternatives_spanish:
  - Un canto
  - Una melodía
  lexicon: HALOT
  rationale: El término de superscripción es el género habitual ‘salmo’; en español conserva con naturalidad la forma tradicional y precisa del encabezamiento.
- source_word: לְדָוִד
  english_pob_choice: of David
  chosen_spanish: de David
  alternatives_spanish:
  - por David
  - para David
  lexicon: HALOT
  rationale: La preposición lamed en las superscripciones admite asociación, autoría o dedicación. ‘De David’ preserva esa amplitud sin cerrar la relación.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  lexicon: HALOT
  rationale: La edición española usa ‘Yahvé’ para el Tetragrámaton, preservando el nombre divino en lugar de sustituirlo por un título. Se evita ‘Jehová’ por ser una forma tradicional menos ajustada a esta línea textual.
- source_word: שְׁמַע
  english_pob_choice: hear
  chosen_spanish: escucha
  alternatives_spanish:
  - oye
  - atiende
  lexicon: HALOT
  rationale: En contexto de oración, ‘escucha’ comunica la petición de atención efectiva sin perder el valor básico del imperativo.
- source_word: תְּפִלָּתִי
  english_pob_choice: my prayer
  chosen_spanish: mi oración
  alternatives_spanish:
  - mi plegaria
  lexicon: HALOT
  rationale: Equivale de forma directa a la expresión con sufijo de primera persona; ‘oración’ es claro y natural en español.
- source_word: הַאֲזִינָה
  english_pob_choice: give ear
  chosen_spanish: presta oído
  alternatives_spanish:
  - inclina tu oído
  - escucha atentamente
  lexicon: HALOT
  rationale: La segunda imperativa intensifica la anterior. ‘Presta oído’ mantiene el paralelismo poético y la idiomaticidad española.
- source_word: אֶל
  english_pob_choice: to
  chosen_spanish: a
  alternatives_spanish:
  - hacia
  lexicon: HALOT
  rationale: Preposición natural en español para el complemento de ‘prestar oído’.
- source_word: תַּחֲנוּנַי
  english_pob_choice: my pleas for mercy
  chosen_spanish: mis súplicas de misericordia
  alternatives_spanish:
  - mis súplicas
  - mis ruegos de misericordia
  lexicon: HALOT
  rationale: El sustantivo expresa ruegos insistentes que buscan favor/misericordia; ‘súplicas de misericordia’ conserva esa carga semántica sin recurrir a un tecnicismo rígido.
- source_word: בֶּאֱמֻנָתְךָ
  english_pob_choice: In your faithfulness
  chosen_spanish: En tu fidelidad
  alternatives_spanish:
  - Por tu fidelidad
  - Con tu fidelidad
  lexicon: HALOT
  rationale: אֱמוּנָה en este contexto apunta a la confiabilidad de Dios. ‘Fidelidad’ es la opción española más precisa y estable; la relación preposicional queda en nota al pie.
- source_word: עֲנֵנִי
  english_pob_choice: answer me
  chosen_spanish: respóndeme
  alternatives_spanish:
  - contéstame
  - respóndeme favorablemente
  lexicon: HALOT
  rationale: El verbo de respuesta en súplica puede traducirse naturalmente como ‘respóndeme’; es más idiomático que ‘contéstame’ en registro bíblico y mantiene la petición directa.
- source_word: בְּצִדְקָתֶךָ
  english_pob_choice: in your righteousness
  chosen_spanish: en tu justicia
  alternatives_spanish:
  - en tu rectitud
  - por tu justicia
  lexicon: HALOT
  rationale: צְדָקָה puede implicar justicia o rectitud. Dado el paralelismo con la apelación a la fidelidad, ‘justicia’ preserva el campo jurídico-covenantal y la fuerza de la base en el carácter divino.
theological_decisions:
- issue: Render the divine name יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Jehová
  rationale: Se conserva el nombre propio del pacto en la forma establecida por la política española del proyecto, evitando el sustituto reverencial ‘SEÑOR’ para no ocultar el Tetragrámaton presente en el hebreo.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: 'בֶּאֱמֻנָתְךָ: preposition + noun'
  english_pob_reading: In your faithfulness
  chosen_spanish_reading: En tu fidelidad
  alternative_spanish_readings:
  - Por tu fidelidad
  - Con tu fidelidad
  rationale: La frase puede entenderse como local/relacional (‘en tu fidelidad’) o instrumental/causal (‘por tu fidelidad’). El texto principal preserva la ambigüedad poética mientras mantiene una lectura clara en español; la nota recoge la posibilidad alternativa.
  doctrine_reference: Psalmic prayer language and divine attributes
- issue: 'בְּצִדְקָתֶךָ: righteousness/justice'
  english_pob_reading: in your righteousness
  chosen_spanish_reading: en tu justicia
  alternative_spanish_readings:
  - en tu rectitud
  - por tu justicia
  rationale: ‘Justicia’ conserva la dimensión de actuación recta y judicial de Dios. La alternativa ‘rectitud’ queda disponible en la nota si se desea enfatizar cualidad moral más que acto judicial.
  doctrine_reference: Biblical justice / covenant faithfulness
translation_notes:
  revision_awareness: Se tuvo en cuenta el último pase revisado, que no introdujo cambios y mantuvo alto acuerdo con el texto inglés auditado; por ello la versión española sigue de cerca la solución léxica ya validada, especialmente en el nombre divino, la fidelidad divina y la justicia.
  spanish_consistency_notes:
  - Se mantuvo ‘Yahvé’ para יְהוָה, conforme a la terminología base del proyecto.
  - Se prefirió ‘justicia’ para צְדָקָה por coherencia con el campo jurídico-covenantal del verso.
  - Se conservó el paralelismo verbal ‘escucha / presta oído / respóndeme’ para reflejar la intensidad poética del hebreo.
  - Las notas al pie preservan las alternativas semánticas documentadas sin introducir paráfrasis adicionales.
