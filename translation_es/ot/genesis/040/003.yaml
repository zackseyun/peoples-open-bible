    text: Or 'into the prison,' or more formally 'into the house of confinement.'
    reason: lexical_alternative
  - marker: b
    text: The title 'captain of the guard' translates a Hebrew expression that could more literally be rendered 'chief of the executioners' or 'chief slaughterer.'
    reason: lexical_alternative
  - marker: c
    text: Or 'in the house of the captain of the guard, into the prison house'.
    reason: previous_rendering
