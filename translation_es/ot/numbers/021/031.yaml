translation:
  language: es
  text: Así Israel vivió en la tierra de los amorreos[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, de manera más formal: «Así Israel habitó en la tierra de los amorreos».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֵּשֶׁב
  english_pob_choice: lived
  chosen_spanish: habitó
  alternatives_spanish:
  - vivió
  - se estableció
  - moró
  lexicon: HALOT
  rationale: El verbo ישׁב puede significar 'sentarse', 'habitar', 'vivir' o 'establecerse'. En este resumen narrativo, 'habitó' conserva bien el sentido de residencia en una tierra y mantiene un tono bíblico natural en español; 'vivió' sería más llano pero menos preciso para ubicación territorial, 'se estableció' sugiere más énfasis en instalación permanente, y 'moró' es más tradicional.
- source_word: יִשְׂרָאֵל
  english_pob_choice: Israel
  chosen_spanish: Israel
  lexicon: nombre propio
  rationale: Se conserva el nombre propio del pueblo del pacto sin traducirlo.
- source_word: בְּאֶרֶץ
  english_pob_choice: in the land
  chosen_spanish: en la tierra
  alternatives_spanish:
  - en el territorio
  - en el país
  lexicon: HALOT
  rationale: אֶרֶץ puede abarcar 'tierra', 'territorio' o 'país'. Aquí el contexto es posesión/ocupación territorial, y 'tierra' es la opción más bíblica e idiomática en español.
- source_word: הָאֱמֹרִי
  english_pob_choice: the Amorites
  chosen_spanish: de los amorreos
  alternatives_spanish:
  - del amorreo
  lexicon: HALOT
  rationale: El hebreo tiene forma singular gentilicia con artículo, pero en español, al referirse a un pueblo, la forma colectiva plural 'amorreos' es la más natural y coincide con el contexto territorial. Se evita 'amorreo' por sonar menos natural en este uso colectivo.
translation_notes:
  revision_awareness: Se corrigió la validación anterior incorporando el marcador [a] directamente en el texto español, para que la nota quede anclada a la frase correspondiente. No hubo cambios de fondo respecto al sentido del versículo.
  spanish_consistency_notes:
  - Se mantuvo un estilo bíblico claro y moderno, sin recurrir a una perífrasis más interpretativa que altere la simplicidad del hebreo.
  - Se eligió 'habitó' para reflejar residencia en una tierra concreta con un registro natural en español.
  - Se usó 'tierra' en lugar de 'territorio' por consistencia con el uso bíblico habitual y porque el contexto habla de ocupación de una región.
  - Se pluralizó 'amorreos' para expresar de forma natural el colectivo étnico al que se refiere el hebreo.
