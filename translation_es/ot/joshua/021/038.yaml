base_translation:
  language: en
  yaml_path: translation/ot/joshua/021/038.yaml
  text: 'And from the tribe of Gad: Ramoth in Gilead[a], the city of refuge for the manslayer, with its pasturelands[c][b], and Mahanaim with its pasturelands.'
  footnotes:
  - marker: a
    text: Or 'the killer' or 'the slayer.' In this legal context, 'manslayer' reflects the asylum setting of the city of refuge more precisely than 'murderer.'
    reason: lexical_alternative
  - marker: b
    text: Or 'Ramoth-gilead.' The Hebrew can be represented either as 'Ramoth in Gilead' or as the conventional compound place name.
    reason: alternative_reading
  - marker: c
    text: '''Pasturelands'' refers to the land surrounding the city assigned for use with it.'
    reason: cultural_note
