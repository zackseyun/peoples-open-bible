base_translation:
  language: en
  yaml_path: translation/ot/jeremiah/042/005.yaml
  text: And they said to Jeremiah[b][a], “May Yahweh be a true and faithful witness against us if we do not act according to all the word that Yahweh your God sends to us through you.”
  footnotes:
  - marker: a
    text: Or 'May the LORD be among us a true and faithful witness.' The Hebrew phrase can be taken more literally as 'in/among us,' but in this oath context it likely carries the sense of witness against the speakers if they fail to obey.
    reason: lexical_alternative
  - marker: b
    text: Literally, 'that the LORD your God sends you to us.' The English 'sends to us through you' makes explicit the implied message-bearing sense.
    reason: lexical_alternative
