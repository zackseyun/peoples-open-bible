translation:
  language: es
  text: Estos eran los llamados de la congregación[a], los líderes de las tribus de sus padres, los jefes de los millares[b] de Israel.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «los convocados de la congregación». El participio hebreo puede indicar llamados, convocados o designados.'
    reason: lexical_alternative
  - marker: b
    text: «Millares de Israel» puede referirse literalmente a grupos de mil, o más ampliamente a subdivisiones de clan o militares dentro de Israel.
    reason: lexical_alternative
lexical_decisions:
- source_word: אֵלֶּה
  english_pob_choice: These
  chosen_spanish: Estos eran
  alternatives_spanish:
  - Estos son
  - Estos
  lexicon: HALOT
  rationale: El demostrativo plural introduce a los varones identificados; en español conviene explicitar la cópula para una frase natural y completa, sin alterar el valor identificador del hebreo.
- source_word: קריאי
  english_pob_choice: the called ones
  chosen_spanish: los llamados
  alternatives_spanish:
  - los convocados
  - los convocados por llamado
  - los designados
  lexicon: HALOT
  rationale: El participio pasivo de קרא conserva la idea de quienes fueron llamados o convocados. 'Llamados' mantiene la fuerza participial y deja abierta la posibilidad de convocatoria o designación, como en el audit trail inglés.
- source_word: הָעֵדָה
  english_pob_choice: the congregation
  chosen_spanish: la congregación
  alternatives_spanish:
  - la asamblea
  - la comunidad
  lexicon: HALOT
  rationale: En contextos de censo y organización de Israel, 'congregación' es fiel y reconocible en español bíblico sin reducir el matiz corporativo del término.
- source_word: נְשִׂיאֵי
  english_pob_choice: the leaders
  chosen_spanish: los líderes
  alternatives_spanish:
  - los jefes
  - los príncipes
  lexicon: HALOT
  rationale: נָשִׂיא aquí designa a dirigentes tribales; 'líderes' comunica el valor funcional en español moderno mejor que 'príncipes', que sería más tradicional pero menos preciso para este contexto administrativo.
- source_word: מַטּוֹת אֲבוֹתָם
  english_pob_choice: the tribes of their fathers
  chosen_spanish: las tribus de sus padres
  alternatives_spanish:
  - las tribus de sus antepasados
  - sus tribus patriarcales
  lexicon: HALOT
  rationale: La construcción hebrea vincula las tribus con los padres/ascendencia. 'De sus padres' preserva la relación posesiva y la referencia paterno-ancestral sin imponer una glosa interpretativa más amplia.
- source_word: רָאשֵׁי
  english_pob_choice: the heads
  chosen_spanish: los jefes
  alternatives_spanish:
  - las cabezas
  - los principales
  lexicon: HALOT
  rationale: Aunque literalmente es 'cabezas', en español 'jefes' transmite el sentido idiomático de personas principales o cabecillas y evita una literalidad poco natural.
- source_word: אַלְפֵי יִשְׂרָאֵל
  english_pob_choice: the thousands of Israel
  chosen_spanish: los millares de Israel
  alternatives_spanish:
  - los millares de Israel
  - los grupos de mil de Israel
  - los millares/clanes de Israel
  lexicon: HALOT
  rationale: אֶלֶף puede significar 'mil' y, por extensión, subdivisión social o militar. 'Millares' conserva el término-base y, como en el inglés POB, evita cerrar el sentido a 'clanes' o 'unidades militares' sin evidencia suficiente para esa fijación.
- source_word: הֵם
  english_pob_choice: were
  chosen_spanish: eran
  alternatives_spanish:
  - fueron
  - ellos eran
  lexicon: HALOT
  rationale: El pronombre independiente final funciona como énfasis identificador. En español se refleja naturalmente en la cópula de cierre ('eran') sin añadir un pronombre innecesario.
translation_notes:
  revision_awareness: 'La redacción sigue de cerca el pasaje revisado del texto inglés POB: mantiene el valor participial de קריאי, reproduce la relación constructa de מַטּוֹת אֲבוֹתָם como vínculo con los padres, y conserva la ambigüedad de אַלְפֵי יִשְׂרָאֵל sin interpretarla como ''clanes'' o ''unidades militares''.'
  spanish_consistency_notes:
  - Se emplea 'congregación' para עֵדָה, coherente con el uso pentateucal.
  - Se usa 'líderes' para נְשִׂיאִים en un contexto tribal/administrativo.
  - Se evita traducir automáticamente 'אלף' como 'clan' para no cerrar una tensión lexical que el POB inglés dejó abierta.
  - No se introducen fórmulas eclesiásticas posteriores; el texto permanece descriptivo y censal.
