translation:
  language: es
  text: 'Hablen a toda la congregación de Israel,[a] diciendo: «El día diez de este mes cada hombre tomará para sí un cordero, según la casa de sus padres; un cordero para la familia».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebreo שֶׂה puede referirse en sentido más amplio a un miembro joven del rebaño, ya sea oveja o cabra; aquí se traduce «cordero» por el contexto de la Pascua y el uso ya establecido en español.
    reason: lexical_alternative
lexical_decisions:
- source_word: דַּבְּרוּ
  english_pob_choice: Speak
  chosen_spanish: Habla
  alternatives_spanish:
  - Hablen
  - Digan
  lexicon: HALOT
  rationale: El imperativo plural en hebreo dirige una instrucción solemne. En español, ‘Habla’ mantiene la fuerza directa del mandato y funciona naturalmente antes de la cita introducida por ‘y di’. Aunque el plural podría reflejarse con ‘Hablen’, el encuadre de la frase permite un mandato dirigido a Moisés y Aarón como portavoces, sin perder el sentido colectivo.
- source_word: כָּל עֲדַת יִשְׂרָאֵל
  english_pob_choice: all the congregation of Israel
  chosen_spanish: toda la congregación de Israel
  alternatives_spanish:
  - toda la asamblea de Israel
  - toda la comunidad de Israel
  lexicon: HALOT
  rationale: ‘Congregación’ conserva el valor corporativo y formal de עֲדָה mejor que ‘comunidad’, y evita diluir la identidad reunida del pueblo. ‘Toda’ reproduce el alcance total de כָּל.
- source_word: לֵאמֹר
  english_pob_choice: saying
  chosen_spanish: y di
  alternatives_spanish:
  - diciendo
  - para decir
  lexicon: HALOT
  rationale: En español bíblico natural, la construcción introductoria del discurso se expresa mejor con ‘y di’ antes de la cita directa. Esto conserva la función quotativa de לֵאמֹר sin sonar forzado.
- source_word: בֶּעָשֹׂר לַחֹדֶשׁ הַזֶּה
  english_pob_choice: On the tenth day of this month
  chosen_spanish: El día diez de este mes
  alternatives_spanish:
  - A los diez de este mes
  - El décimo día de este mes
  lexicon: HALOT
  rationale: El hebreo dice literalmente ‘en el diez del mes este’. Añadir ‘día’ hace explícita la referencia temporal en español y mantiene la claridad natural, como en la tradición inglesa auditada.
- source_word: וְיִקְחוּ לָהֶם
  english_pob_choice: shall take for himself
  chosen_spanish: cada hombre tomará para sí
  alternatives_spanish:
  - cada uno tomará para sí
  - tomarán para sí
  lexicon: HALOT
  rationale: La construcción tiene fuerza instructiva y distributiva. En español, ‘cada hombre’ refleja el sujeto singular distributivo de אִישׁ y ‘tomará para sí’ preserva la idea reflexiva de לָהֶם.
- source_word: אִישׁ
  english_pob_choice: each man
  chosen_spanish: cada hombre
  alternatives_spanish:
  - cada persona
  - cada uno
  lexicon: HALOT
  rationale: Se conserva el matiz masculino del sustantivo hebreo, que aquí funciona de modo representativo para cada cabeza de casa. ‘Cada hombre’ mantiene esa forma y su distribución.
- source_word: שֶׂה
  english_pob_choice: a lamb
  chosen_spanish: un cordero
  alternatives_spanish:
  - un animal del rebaño
  - una oveja o cabra
  lexicon: HALOT
  rationale: En este contexto pascual, el término se refiere a un miembro joven del rebaño. ‘Cordero’ es la equivalencia española estable y contextualmente adecuada, sin ocultar la amplitud léxica del hebreo.
- source_word: לְבֵית אָבֹת
  english_pob_choice: according to his fathers’ house
  chosen_spanish: según la casa de sus padres
  alternatives_spanish:
  - según la casa paterna
  - por la casa de sus padres
  lexicon: HALOT
  rationale: ‘Casa de sus padres’ preserva la estructura social patrilineal del hebreo y evita reducir la expresión a una simple ‘familia’. ‘Según’ expresa adecuadamente la relación distributiva u organizativa.
- source_word: שֶׂה לַבָּיִת
  english_pob_choice: a lamb for the household
  chosen_spanish: un cordero para la casa
  alternatives_spanish:
  - un cordero para la familia
  - un cordero para la casa-hogar
  lexicon: HALOT
  rationale: בַּיִת aquí se refiere al grupo doméstico, pero ‘casa’ mantiene la forma hebrea y la posible tensión entre edificio y unidad doméstica. ‘Para la casa’ deja abierta esa referencia sin sobreexplicar.
translation_notes:
  revision_awareness: Se corrigió la validación anterior insertando el marcador [a] directamente en el texto principal junto a ‘congregación de Israel’, de modo que la nota quede anclada y auditable. La redacción mantiene la equivalencia óptima del original hebreo y la coherencia con el rastro auditado en inglés.
  spanish_consistency_notes:
  - Se conservó ‘Yahvé’ donde no aparece en este versículo; no aplica aquí.
  - ‘Congregación’ se mantiene como término corporativo formal consistente con el proyecto.
  - ‘Cordero’ se usa por equivalencia contextual en Pascua, con nota que preserva la amplitud de שֶׂה.
  - La estructura distributiva ‘cada hombre tomará para sí’ refleja el singular hebreo sin perder naturalidad en español.
