translation:
  language: es
  text: Pero una mujer arrojó la piedra superior del molino[a] sobre la cabeza de Abimélec y le aplastó el cráneo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «una pieza de la piedra superior del molino»; el hebreo puede enfatizar una sección o fragmento de la piedra superior.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַתַּשְׁלֵךְ
  english_pob_choice: threw
  chosen_spanish: arrojó
  alternatives_spanish:
  - tiró
  - lanzó
  lexicon: HALOT
  rationale: שׁלך en la narrativa expresa el acto de arrojar o lanzar con fuerza; «arrojó» conserva la acción directa y suena natural en español.
- source_word: אִשָּׁה אַחַת
  english_pob_choice: a certain woman
  chosen_spanish: una mujer
  alternatives_spanish:
  - una cierta mujer
  - una mujer determinada
  lexicon: HALOT
  rationale: La frase hebrea funciona aquí como un indefinido narrativo. En español, «una mujer» comunica mejor el valor de indefinición sin sonar forzado; la especificación de que es no identificada queda implícita por el contexto.
- source_word: פֶּלַח רֶכֶב
  english_pob_choice: an upper millstone
  chosen_spanish: una piedra de molino superior
  alternatives_spanish:
  - una pieza de la piedra de molino superior
  - la muela superior
  lexicon: HALOT
  rationale: פֶּלַח puede señalar una sección o fragmento, mientras que רֶכֶב designa la piedra superior del molino. «Piedra de molino superior» mantiene la referencia funcional y permite reflejar el matiz del objeto concreto; se conserva la alternativa fragmentaria en la nota.
- source_word: עַל רֹאשׁ
  english_pob_choice: on ... head
  chosen_spanish: sobre la cabeza
  alternatives_spanish:
  - encima de la cabeza
  lexicon: HALOT
  rationale: La preposición expresa impacto sobre la parte superior de la cabeza; «sobre la cabeza» es idiomático y claro.
- source_word: אֲבִימֶלֶךְ
  english_pob_choice: Abimelech
  chosen_spanish: Abimélec
  alternatives_spanish:
  - Abimelec
  lexicon: Convención bíblica española
  rationale: Se usa la forma tradicional y legible en español, con acento gráfico por adaptación fonológica.
- source_word: וַתָּרִץ
  english_pob_choice: crushed
  chosen_spanish: aplastó
  alternatives_spanish:
  - trituró
  - deshizo
  lexicon: HALOT
  rationale: רצץ denota triturar, aplastar o quebrantar con violencia. «Aplastó» conserva fuerza y evita sobreespecificar el modo físico más allá de lo que el hebreo asegura.
- source_word: גֻּלְגָּלְתּוֹ
  english_pob_choice: his skull
  chosen_spanish: el cráneo
  alternatives_spanish:
  - su cráneo
  - su cabeza
  lexicon: HALOT
  rationale: El término señala el cráneo de manera precisa. «El cráneo» en español mantiene esa precisión anatómica y el impacto narrativo.
translation_notes:
  revision_awareness: La versión inglesa auditada pasó de «one woman» a «a certain woman» por idiomática; en español se optó por «una mujer» porque ya expresa adecuadamente la indefinición narrativa sin añadir una perífrasis innecesaria. También se siguió la revisión estándar de Abimelech/Abimelech en una forma española legible.
  spanish_consistency_notes:
  - 'Se mantuvo el paralelismo verbal de la escena: arrojar + impactar/aplastar.'
  - Se prefirió un léxico anatómico preciso («cráneo») acorde con el hebreo גֻּלְגָּלְתּוֹ.
  - La nota textual/lexical está anclada en el sintagma «piedra de molino superior[a]» para que el marcador aparezca explícitamente en el texto.
