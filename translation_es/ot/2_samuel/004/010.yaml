revisions:
- from: 'Porque el que me lo informó, diciendo: «Mira, Saúl ha muerto», en sus propios ojos era como uno que trae buenas nuevas[b], y yo lo agarré y lo maté en Ziclag; esa fue la recompensa que le di por su noticia.'
  to: 'Cuando alguien me avisó, diciendo: «Mira, Saúl ha muerto», y él pensaba que traía buenas noticias, yo lo agarré y lo maté en Ziclag; esa fue la recompensa[a] que le di por su noticia.'
  rationale: Se corrige 'Porque' a 'Cuando' para ajustarse al valor contextual de כִּי documentado por POB. Se reemplaza el calco 'en sus propios ojos era como uno que trae buenas nuevas' por la expresión idiomática y clara 'él pensaba que traía buenas noticias', que preserva el sentido de autoevaluación del mensajero. También se mueve la nota a 'recompensa', donde realmente recae la elipsis irónica del hebreo. El resto del contenido se conserva cercano al original.
