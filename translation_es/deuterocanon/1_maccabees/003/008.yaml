translation:
  language: es
  text: Y pasó por las ciudades[a] de Judá, y destruyó a los impíos[b] de ella, y apartó la ira[c] de Israel.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «las poblaciones»; «ciudades» reproduce de modo más directo πόλεσιν.
    reason: lexical_alternative
  - marker: b
    text: O «los irreverentes» o «los malvados»; «los impíos» preserva mejor el matiz religioso-moral del término griego.
    reason: lexical_alternative
  - marker: c
    text: «Ira» probablemente se refiere a la ira divina en este contexto, aunque el versículo no menciona explícitamente a Dios.
    reason: alternative_reading
lexical_decisions:
- source_word: διῆλθεν
  english_pob_choice: went through
  chosen_spanish: pasó por
  alternatives_spanish:
  - atravesó
  - recorrió
  lexicon: BDAG
  rationale: El verbo expresa tránsito por un territorio o conjunto de lugares. «Pasó por» conserva el movimiento sin añadir matices ajenos al griego y suena natural en español.
- source_word: πόλεσιν Ἰούδα
  english_pob_choice: the cities of Judah
  chosen_spanish: las ciudades de Judá
  alternatives_spanish:
  - las urbes de Judá
  - las poblaciones de Judá
  lexicon: BDAG
  rationale: «πόλις» puede abarcar ciudad o población, pero «ciudades» es la correspondencia más directa y clara. El genitivo señala pertenencia territorial a Judá.
- source_word: ἐξωλόθρευσεν
  english_pob_choice: destroyed
  chosen_spanish: destruyó
  alternatives_spanish:
  - exterminó
  - desarraigó
  lexicon: BDAG
  rationale: El verbo es fuerte y denota destrucción total o eliminación severa. «Destruyó» preserva esa fuerza sin cargar el texto con una especificación moderna como «exterminó».
- source_word: ἀσεβεῖς
  english_pob_choice: the ungodly
  chosen_spanish: los impíos
  alternatives_spanish:
  - los irreligiosos
  - los malvados
  lexicon: BDAG
  rationale: «ἀσεβής» designa a quienes carecen de piedad o reverencia ante Dios y el orden del pacto. «Impíos» transmite mejor ese matiz religioso-moral que «malvados».
- source_word: ἐπʼ αὐτῆς
  english_pob_choice: from it
  chosen_spanish: de ella
  alternatives_spanish:
  - de ella misma
  - de Judá
  lexicon: BDAG
  rationale: El pronombre remite con naturalidad a Judá como territorio. «De ella» conserva la referencia pronominal del griego sin introducir un sustantivo no presente.
- source_word: ἀπέστρεψεν ὀργὴν
  english_pob_choice: turned away wrath
  chosen_spanish: apartó la ira
  alternatives_spanish:
  - desvió la ira
  - alejó la ira
  lexicon: BDAG
  rationale: La expresión idiomática comunica que la ira fue retirada o apartada. «Apartó la ira» es directo y fiel al valor de la construcción.
- source_word: ἀπὸ Ἰσραήλ
  english_pob_choice: from Israel
  chosen_spanish: de Israel
  alternatives_spanish:
  - lejos de Israel
  - de parte de Israel
  lexicon: BDAG
  rationale: La frase marca a Israel como el pueblo del cual fue removida la ira. «De Israel» mantiene la relación más directa y sobria.
theological_decisions:
- issue: Sentido de «ira» en relación con Israel
  english_pob_reading: The verse states that Judas's actions turned away wrath from Israel without specifying whether the wrath is explicitly divine or simply covenantal/judicial in a broader sense.
  chosen_spanish_reading: El texto dice que sus acciones apartaron la ira de Israel, sin explicitar aquí si se trata de ira divina o de una calamidad/juicio en sentido más amplio.
  alternative_spanish_readings:
  - ira divina
  - castigo o furor contra Israel
  rationale: «ὀργή» en este contexto judío sugiere naturalmente la ira divina, pero el versículo no nombra a Dios. La traducción mantiene «ira» sin resolver la tensión teológica que el texto no resuelve.
  doctrine_reference: Preservar la tensión teológica sin sobreespecificar.
translation_notes:
  revision_awareness: Se mantuvo la lectura del griego de Swete 1909 junto con el audit trail inglés; no se siguieron de manera mecánica las opciones inglesas cuando el español exigía una formulación más natural, pero se conservaron las mismas decisiones semánticas centrales. No hubo revisiones aplicadas en el antecedente inglés, y el veredicto de control fue de concordancia mayor con observaciones menores.
  spanish_consistency_notes:
  - Se usa «Judá» y no «Judea» para mantener la forma territorial del texto bíblico en este contexto.
  - Se conserva «ira» en lugar de explicitar «ira divina» en el texto principal para no resolver una ambigüedad que el original deja abierta.
  - «Impíos» se alinea con la carga religiosa de ἀσεβεῖς y con la opción inglesa «the ungodly».
