translation:
  language: es
  text: 'Y sucedió al día siguiente, cuando Pasjur sacó a Jeremías de los cepos, que Jeremías le dijo: «Yahvé no te ha puesto por nombre Pasjur, sino Terror por todas partes[a]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «Magor-missabib», un juego de palabras que significa «terror por todas partes» o «terror alrededor».'
    reason: lexical_alternative
lexical_decisions:
- source_word: מִמָּחֳרָת
  english_pob_choice: the next day
  chosen_spanish: al día siguiente
  alternatives_spanish:
  - el día siguiente
  - al siguiente día
  lexicon: HALOT
  rationale: La expresión temporal señala el día posterior; «al día siguiente» es natural en español y conserva la secuencia exacta del hebreo.
- source_word: וַיֹּצֵא ... אֶת יִרְמְיָהוּ מִן הַמַּהְפָּכֶת
  english_pob_choice: when Pashhur brought Jeremiah out of the stocks
  chosen_spanish: cuando Pasjur sacó a Jeremías de los cepos
  alternatives_spanish:
  - cuando Pasjur lo sacó de los cepos
  - cuando Pasjur liberó a Jeremías de los cepos
  lexicon: HALOT
  rationale: El hifil de יצא es causativo, «hacer salir»; en español, «sacar de» transmite bien esa acción. «Cepos» reproduce el instrumento de sujeción/punición con un término claro y bíblicamente reconocible.
- source_word: הַמַּהְפָּכֶת
  english_pob_choice: the stocks
  chosen_spanish: los cepos
  alternatives_spanish:
  - la cepa
  - el cepo
  - la prisión de sujeción
  lexicon: HALOT
  rationale: El término designa un aparato de restricción para un reo. «Cepos» es un equivalente español natural y suficientemente preciso sin forzar una construcción técnica opaca.
- source_word: קָרָא ... שְׁמֶךָ
  english_pob_choice: has not called your name
  chosen_spanish: no ha llamado tu nombre
  alternatives_spanish:
  - no te ha llamado
  - no te ha puesto por nombre
  lexicon: HALOT
  rationale: Se conserva la estructura idiomática del hebreo, importante porque se trata de una imposición de nombre con valor profético. En español, «llamar tu nombre» suena algo más literal, pero sigue siendo inteligible y auditablesource-grounded.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  - Jehová
  lexicon: HALOT
  rationale: La norma del proyecto pide «Yahvé» para el Tetragrámaton. Se evita la sustitución por «Señor» para no ocultar el nombre divino revelado al texto.
- source_word: כִּי אִם
  english_pob_choice: but
  chosen_spanish: sino
  alternatives_spanish:
  - pero
  - más bien
  lexicon: HALOT
  rationale: Después de una negación, la construcción contrastiva se expresa naturalmente con «sino», que refleja mejor el valor correctivo de כִּי אִם que un simple «pero».
- source_word: מָגוֹר מִסָּבִיב
  english_pob_choice: Terror on Every Side
  chosen_spanish: Terror por todas partes
  alternatives_spanish:
  - terror por todos lados
  - terror alrededor
  - Terror por todos lados
  lexicon: HALOT
  rationale: Se preserva el efecto de renombramiento y el juego de palabras jeremiano. «Por todas partes» comunica el sentido idiomático de cerco/amenaza envolvente y mantiene la mayúscula por ser un nombre-título.
- source_word: פַשְׁחוּר
  english_pob_choice: Pashhur
  chosen_spanish: Pasjur
  alternatives_spanish:
  - Pasjur
  - Pashur
  lexicon: HALOT
  rationale: Se translitera el nombre propio con una forma española fluida. «Pasjur» evita la secuencia inglesa sh y resulta más natural en lectura hispana.
theological_decisions:
- issue: Renderización del nombre divino YHWH
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Señor
  - Jehová
  rationale: El texto hebreo contiene explícitamente יהוה. Para mantener transparencia textual y consistencia con el proyecto, se usa el nombre divino en vez de un sustituto titulado.
  doctrine_reference: 'DOCTRINE.md Contested terms: יהוה YHWH'
- issue: Función del nuevo nombre «Magor-missabib»
  english_pob_reading: Terror on Every Side
  chosen_spanish_reading: Terror por todas partes
  alternative_spanish_readings:
  - terror por todos lados
  - terror alrededor
  rationale: No se trata solo de una descripción emocional, sino de un nombre impuesto por Yahvé con valor profético y de juicio. La mayúscula ayuda a señalar esa función nominal.
  doctrine_reference: Jeremiah 20:3 naming formula / prophetic renaming
- issue: Valor de כִּי אִם tras negación
  english_pob_reading: but
  chosen_spanish_reading: sino
  alternative_spanish_readings:
  - pero
  - más bien
  rationale: La secuencia negativa exige una corrección exclusiva o contrastiva. «Sino» expresa mejor la estructura lógica que una coordinación simple.
  doctrine_reference: Hebrew contrastive construction after negation
translation_notes:
  revision_awareness: Se corrigió el problema de validación asegurando que el marcador de nota [a] aparezca explícitamente en el texto español. La redacción sigue el audit trail inglés actualizado, incluyendo «brought Jeremiah out of the stocks» como «sacó a Jeremías de los cepos», y mantiene la decisión doctrinal de traducir el Tetragrámaton como «Yahvé».
  spanish_consistency_notes:
  - Se mantiene «Yahvé» para יהוה conforme a la norma del proyecto.
  - «Pasjur» se usa de forma consistente como transliteración hispana del nombre propio.
  - Se conserva el valor de renombramiento profético con mayúscula en «Terror por todas partes».
  - «Cepos» traduce el instrumento de castigo de manera clara y natural en español.
  - La nota [a] está anclada directamente en el término renombrado dentro del texto.
