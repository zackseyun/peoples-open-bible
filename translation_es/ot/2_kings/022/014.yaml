    reason: lexical_alternative
  - marker: c
    text: O «hablaron con ella».
    reason: lexical_alternative
  revision_rationale: 'Se conserva casi todo el texto principal porque es fiel y natural. Se corrigen los anclajes de las notas para que coincidan con las expresiones pertinentes: [a] en «Segundo Barrio», [b] en el cargo de Shallum, y [c] en «le hablaron». También se ajusta la nota [c] para reflejar la alternativa real documentada en el audit trail inglés.'
