translation:
  language: es
  text: Por tanto, hemos instruido a los que les escriben en los documentos redactados por Amán[a], quien fue encargado de los asuntos y fue nuestro segundo padre[b], a destruirlos a todos —junto con mujeres y niños—, de raíz, con las espadas de sus enemigos, sin ninguna piedad ni clemencia, el día catorce de Adar, el mes duodécimo, de este año presente.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «a los que están redactando para ustedes por dictado». El participio griego puede referirse a funcionarios que redactan o dictan la formulación del documento.'
    reason: lexical_alternative
  - marker: b
    text: 'Expresión honorífica de corte: literalmente, «nuestro segundo padre».'
    reason: cultural_note
lexical_decisions:
- source_word: ὑποστεῖλαιμεν
  english_pob_choice: we have instructed
  chosen_spanish: hemos instruido
  alternatives_spanish:
  - hemos enviado instrucciones
  - hemos dado órdenes
  - hemos comisionado
  lexicon: LSJ
  rationale: La forma griega es difícil, pero en este contexto epistolar-administrativo expresa una acción de autoridad que transmite instrucciones. «Hemos instruido» conserva el sentido de mandato sin volverlo demasiado técnico o forzado en español.
- source_word: τοῖς ὑπαγρευομένοις ὑμῖν
  english_pob_choice: those writing to you
  chosen_spanish: a los que les escriben
  alternatives_spanish:
  - a los que les dictan
  - a sus secretarios
  - a los que redactan para ustedes
  lexicon: LSJ
  rationale: El POB inglés revisado entiende el participio en un sentido de redacción/escritura del documento. En español, «los que les escriben» mantiene la referencia a quienes producen el texto oficial sin sobreespecificar su cargo.
- source_word: ἐν τοῖς γεγραμμένοις
  english_pob_choice: in the documents written
  chosen_spanish: en los documentos redactados
  alternatives_spanish:
  - en lo escrito
  - en las cartas redactadas
  - en los escritos
  lexicon: LSJ
  rationale: «Documentos redactados» comunica con claridad el ámbito oficial y literario del griego, y funciona mejor que una simple calca de «escritos» en este contexto cortesano.
- source_word: τοῦ τεταγμένου ἐπὶ τῶν πραγμάτων
  english_pob_choice: who was appointed over affairs
  chosen_spanish: quien fue puesto sobre los asuntos
  alternatives_spanish:
  - quien fue puesto al frente de los asuntos
  - quien fue nombrado sobre los asuntos
  - quien fue encargado de los asuntos
  lexicon: LSJ
  rationale: La frase indica investidura administrativa. «Puesto sobre los asuntos» conserva la preposición y la idea de encargo oficial, sin sustituirla por un equivalente más interpretativo.
- source_word: δευτέρου πατρὸς ἡμῶν
  english_pob_choice: our second father
  chosen_spanish: nuestro segundo padre
  alternatives_spanish:
  - nuestro padre segundo
  - nuestro segundo padre honorario
  - nuestro padre principal
  lexicon: LSJ
  rationale: Se preserva la expresión honorífica inusual sin suavizarla, porque el griego mantiene la hipérbole cortesana de manera explícita.
- source_word: ἀπολέσαι
  english_pob_choice: to destroy
  chosen_spanish: a destruirlos a todos
  alternatives_spanish:
  - a matarlos
  - a aniquilarlos
  - a exterminarlos
  lexicon: LSJ
  rationale: «Destruir» es suficientemente amplio para el verbo griego y evita tanto debilitar como intensificar indebidamente la orden. El pronombre «los» recoge el referente colectivo del pasaje.
- source_word: ὁλορριζεί
  english_pob_choice: root and branch
  chosen_spanish: de raíz
  alternatives_spanish:
  - por completo
  - desde la raíz
  - hasta la última raíz
  lexicon: LSJ
  rationale: La expresión idiomática inglesa se traduce con una frase natural en español que conserva la imagen de extirpación total. «De raíz» es breve, idiomático y fiel al valor adverbial intensificador.
- source_word: ταῖς τῶν ἐχθρῶν μαχαίραις
  english_pob_choice: by the swords of their enemies
  chosen_spanish: por las espadas de sus enemigos
  alternatives_spanish:
  - con las espadas de sus enemigos
  - por espadas enemigas
  - a manos de sus enemigos
  lexicon: LSJ
  rationale: La dative instrumental se refleja con «por», que en español puede expresar medio o instrumento en un contexto narrativo-formal. Se mantiene «sus enemigos» para conservar el vínculo posesivo del griego.
- source_word: ἄνευ παντὸς οἴκτου καὶ φειδοῦς
  english_pob_choice: without any pity or sparing
  chosen_spanish: sin ninguna compasión ni indulgencia
  alternatives_spanish:
  - sin ninguna piedad ni clemencia
  - sin compasión ni reserva
  - sin ningún perdón ni ahorro
  lexicon: LSJ
  rationale: El griego duplica la idea de ausencia de clemencia con dos sustantivos. «Compasión» y «indulgencia» mantienen el paralelismo, aunque en español «indulgencia» traslada mejor la idea de no reservar ni conceder tregua.
- source_word: τῇ τεσσαρεσκαιδεκάτῃ τοῦ δωδεκάτου μηνὸς Ἀδὰρ
  english_pob_choice: on the fourteenth day of Adar, the twelfth month
  chosen_spanish: el catorce del mes duodécimo, Adar
  alternatives_spanish:
  - el catorce de Adar, el mes duodécimo
  - el día catorce del duodécimo mes, Adar
  lexicon: LSJ
  rationale: Se conserva el nombre del mes «Adar» y también su identificación como mes duodécimo. El orden se adapta al español para sonar natural sin perder la información calendárica.
- source_word: τοῦ ἐνεστῶτος ἔτους
  english_pob_choice: of this present year
  chosen_spanish: de este año presente
  alternatives_spanish:
  - de este año actual
  - del año presente
  - de este año
  lexicon: LSJ
  rationale: «Año presente» reproduce el tono formal y administrativo del griego, mientras que «de este» mantiene la referencia temporal inmediata.
theological_decisions:
- issue: Orden de destrucción total contra mujeres y niños
  english_pob_reading: Translate the exterminatory command directly without softening
  chosen_spanish_reading: Traducir la orden de destrucción total sin suavizarla
  alternative_spanish_readings:
  - Usar un verbo más vago como «eliminar» o «quitar»
  - Atenuar la referencia a mujeres y niños
  rationale: El griego expresa con claridad la amplitud y severidad de la orden, incluyendo mujeres y niños, además de la idea de extirpación total. La traducción debe conservar esa dureza moral e histórica sin eufemismos.
  doctrine_reference: Translation philosophy §§1, 6
translation_notes:
  revision_awareness: Se siguió la revisión más reciente del POB inglés, que prefirió «those writing to you» sobre «those who are dictating to you» y «women» sobre «wives». La redacción española adopta esa misma resolución, manteniendo el valor administrativo de la frase y el referente directo a γυναιξί sin convertirlo en «esposas».
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma del proyecto, aunque este versículo no contiene el nombre divino.
  - Se usa «Mesías» solo cuando el griego lo exige; aquí no aparece terminología mesiánica.
  - «Espadas de sus enemigos» preserva el instrumento y el posesivo del original.
  - La sintaxis española evita calcos innecesarios, pero conserva el tono formal de carta real.
