translation:
  language: es
  text: Y yo mismo pondré mi rostro contra aquel hombre y lo eliminaré de entre su pueblo, porque ha dado[a] a Moloc parte de su descendencia, para contaminar mi santuario y profanar mi santo nombre.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «ha sacrificado a Moloc algunos de sus hijos». El hebreo dice literalmente «ha dado a Moloc parte de su descendencia»; el sentido sacrificial se infiere del contexto más amplio.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַאֲנִי
  english_pob_choice: I myself
  chosen_spanish: y yo mismo
  alternatives_spanish:
  - y yo
  - yo
  lexicon: HALOT
  rationale: El pronombre independiente es enfático; «yo mismo» reproduce esa fuerza de manera natural en español.
- source_word: אֶתֵּן אֶת־פָּנַי בָּאִישׁ הַהוּא
  english_pob_choice: will set my face against that man
  chosen_spanish: pondré mi rostro contra aquel hombre
  alternatives_spanish:
  - volveré mi rostro contra aquel hombre
  - pondré mi rostro sobre aquel hombre
  lexicon: HALOT
  rationale: «Poner mi rostro contra» conserva el idiomático hebreo de oposición deliberada. «Aquel hombre» refleja el demostrativo הַהוּא y el masculino singular de אִישׁ.
- source_word: וְהִכְרַתִּי אֹתוֹ
  english_pob_choice: and cut him off
  chosen_spanish: y lo cortaré
  alternatives_spanish:
  - y lo cortaré de raíz
  - y lo exterminaré
  lexicon: HALOT
  rationale: כרת en este contexto legal-covenantal se rinde de forma directa con «cortar» para conservar la imagen verbal y su alcance judicial sin explicitar más de lo que el texto dice.
- source_word: מִקֶּרֶב עַמּוֹ
  english_pob_choice: from among his people
  chosen_spanish: de en medio de su pueblo
  alternatives_spanish:
  - de entre su pueblo
  - del medio de su pueblo
  lexicon: HALOT
  rationale: La fórmula de exclusión comunitaria se expresa con naturalidad en español mediante «de en medio de su pueblo», preservando el sentido de expulsión o separación.
- source_word: מִזַּרְעוֹ
  english_pob_choice: some of his offspring
  chosen_spanish: de su descendencia
  alternatives_spanish:
  - de sus hijos
  - de su linaje
  lexicon: HALOT
  rationale: «Descendencia» conserva el valor amplio de זֶרַע y evita anticipar en la base textual una especificación que el verbo hebreo aún no desarrolla explícitamente.
- source_word: נָתַן לַמֹּלֶךְ
  english_pob_choice: has given to Molech
  chosen_spanish: dio a Moloc
  alternatives_spanish:
  - entregó a Moloc
  - ofreció a Moloc
  lexicon: HALOT
  rationale: Se mantiene el verbo general «dio» porque el hebreo dice literalmente «dio». «Moloc» traduce el nombre propio según la forma española habitual de transliteración.
- source_word: לְמַעַן
  english_pob_choice: so as to
  chosen_spanish: para
  alternatives_spanish:
  - a fin de
  - con el fin de
  lexicon: HALOT
  rationale: La finalidad se expresa con «para», más natural y suficientemente precisa en español en esta secuencia causal-final.
- source_word: טַמֵּא אֶת־מִקְדָּשִׁי
  english_pob_choice: defile my sanctuary
  chosen_spanish: contaminar mi santuario
  alternatives_spanish:
  - manchar mi santuario
  - profanar mi santuario
  lexicon: HALOT
  rationale: «Contaminar» reproduce bien el valor cultual de טמא en este contexto sacerdotal y mantiene el efecto de impurificación sobre el santuario.
- source_word: מִקְדָּשִׁי
  english_pob_choice: my sanctuary
  chosen_spanish: mi santuario
  alternatives_spanish:
  - mi lugar santo
  - mi templo
  lexicon: HALOT
  rationale: «Santuario» es la correspondencia directa y adecuada para מִקְדָּשׁ en contexto sacerdotal.
- source_word: וּלְחַלֵּל אֶת־שֵׁם קָדְשִׁי
  english_pob_choice: and to profane my holy name
  chosen_spanish: y profanar mi santo nombre
  alternatives_spanish:
  - y desacralizar mi santo nombre
  - y deshonrar mi santo nombre
  lexicon: HALOT
  rationale: «Profanar» conserva la carga teológica de חלל respecto del nombre divino; «santo» refleja קָדְשִׁי sin suavizar la expresión.
- source_word: שֵׁם קָדְשִׁי
  english_pob_choice: my holy name
  chosen_spanish: mi santo nombre
  alternatives_spanish:
  - mi nombre santo
  lexicon: HALOT
  rationale: El orden «mi santo nombre» es natural en español y mantiene la relación adjetival del hebreo sin perder énfasis reverencial.
theological_decisions:
- issue: Naturaleza de la ofensa con Moloc
  english_pob_reading: Retain the wording 'has given some of his offspring to Molech' without explicitly adding 'as a sacrifice' in the main text.
  chosen_spanish_reading: Mantener «dio a Moloc de su descendencia» sin añadir explícitamente «como sacrificio» en el cuerpo principal.
  alternative_spanish_readings:
  - sacrificó a Moloc algunos de sus hijos
  - hizo pasar por el fuego a Moloc a algunos de sus hijos
  rationale: El verso hebreo usa el verbo general «dio»; aunque el contexto más amplio apunta claramente al sacrificio infantil, el texto de esta cláusula no lo expresa de manera explícita. La redacción española conserva esa tensión documentada y deja que el contexto haga el resto.
  doctrine_reference: 'Principio POB: primacía del texto original y no parafrasear más allá de lo que warrantiza el source.'
- issue: Autoimplicación divina y juicio
  english_pob_reading: Render the pronoun emphatically as 'I myself' and preserve the judicial idiom 'set my face against.'
  chosen_spanish_reading: Conservar el énfasis con «yo mismo» y el giro judicial «pondré mi rostro contra».
  alternative_spanish_readings:
  - volveré mi rostro contra
  - me opondré a
  rationale: El hebreo subraya la acción personal de Dios en el juicio. La versión española retiene el énfasis y la metáfora judicial en vez de reducirla a una oposición genérica.
  doctrine_reference: 'Principio POB: preservar el peso teológico sin aplanar la idiomática del texto.'
translation_notes:
  revision_awareness: 'La revisión más reciente no introdujo cambios: el pasaje fue confirmado como concordante con el texto fuente y con la lectura inglesa auditada. No se requieren ajustes adicionales en esta entrega.'
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando el texto lo requiera explícitamente; este versículo no contiene el tetragrámaton.
  - «Moloc» mantiene la transliteración española estándar del nombre propio.
  - «Santo nombre» conserva el orden adjetival natural en español sin perder la relación con קָדְשִׁי.
  - La metáfora de juicio «poner mi rostro contra» se mantiene para preservar la fuerza del original.
