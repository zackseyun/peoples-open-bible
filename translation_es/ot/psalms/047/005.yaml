translation:
  language: es
  text: Él escoge para nosotros nuestra heredad[a], la gloria de Jacob, a quien ama[c][b]. Selah
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Él escogerá para nosotros nuestra heredad, la gloria de Jacob, a quien ama».'
    reason: lexical_alternative
  - marker: b
    text: 'La cláusula «a quien ama» puede entenderse también como referida a la heredad: «la gloria de Jacob, que ama».'
    reason: alternative_reading
  - marker: c
    text: Selah es un término hebreo litúrgico o musical de significado incierto, tradicionalmente dejado sin traducir.
    reason: cultural_note
lexical_decisions:
- source_word: יִבְחַר
  english_pob_choice: He chooses
  chosen_spanish: Él nos escogerá
  alternatives_spanish:
  - Él nos escoge
  - Él escogerá para nosotros
  lexicon: HALOT
  rationale: El imperfecto qal de בחר puede leerse con valor imperfectivo o futuro. En español, aquí el futuro conserva bien la apertura verbal del hebreo y mantiene la fuerza deliberativa/profética sin volver la frase artificial.
- source_word: לָנוּ
  english_pob_choice: for us
  chosen_spanish: nos
  alternatives_spanish:
  - para nosotros
  - en nuestro favor
  lexicon: HALOT
  rationale: El dativo de ventaja se expresa de forma natural en español con pronombre átono en la construcción verbal, sin perder el sentido de beneficio para el pueblo.
- source_word: נַחֲלָתֵנוּ
  english_pob_choice: our inheritance
  chosen_spanish: nuestra heredad
  alternatives_spanish:
  - nuestra herencia
  - nuestra posesión
  lexicon: HALOT
  rationale: '"Heredad" comunica mejor el trasfondo de porción asignada/covenantal del hebreo נחלה y encaja con el registro bíblico en español. Se evita "herencia" por ser más amplia y menos concreta en este contexto.'
- source_word: גְּאוֹן
  english_pob_choice: the pride
  chosen_spanish: la gloria
  alternatives_spanish:
  - el orgullo
  - la majestad
  - la excelencia
  lexicon: HALOT
  rationale: Aunque el inglés POB retuvo "pride" por la expresión fija "the pride of Jacob", en español "orgullo" resultaría demasiado negativo. "Gloria" preserva el valor positivo de exaltación/esplendor que la nota inglesa reconoce como posible y produce una frase bíblica inteligible.
- source_word: יַעֲקֹב
  english_pob_choice: Jacob
  chosen_spanish: Jacob
  alternatives_spanish:
  - Israel
  lexicon: HALOT
  rationale: Se conserva el nombre propio hebreo como en el original. No se sustituye por "Israel" porque el texto masorético dice Jacob y el audit trail no justifica una reinterpretación.
- source_word: אֲשֶׁר אָהֵב
  english_pob_choice: whom he loves
  chosen_spanish: a quien ama
  alternatives_spanish:
  - que ama
  - a la cual ama
  lexicon: HALOT
  rationale: La cláusula relativa se entiende naturalmente como referida a Jacob, y el presente "ama" comunica bien el valor estativo del perfecto hebreo en español. Se evita forzar un pasado no indicado por el texto.
- source_word: סֶלָה
  english_pob_choice: Selah
  chosen_spanish: Selah
  alternatives_spanish:
  - (selah)
  lexicon: HALOT
  rationale: Se translitera el término litúrgico/musical por ser de sentido incierto y porque la práctica POB documentada es dejarlo sin traducir.
theological_decisions:
- issue: Referente de la cláusula relativa "a quien ama"
  english_pob_reading: The clause modifies 'Jacob' rather than 'inheritance.'
  chosen_spanish_reading: La cláusula modifica a "Jacob", no a "heredad".
  alternative_spanish_readings:
  - 'La cláusula podría referirse a la heredad: "la gloria de Jacob, que ama".'
  rationale: En español, como en el audit trail inglés, la forma masculina singular concuerda mejor con "Jacob" que con "heredad". Se mantiene la tensión documentada sin resolverla de modo artificial.
  doctrine_reference: Preservar la ambigüedad documentada; no imponer una lectura interpretativa no necesaria.
translation_notes:
  revision_awareness: El inglés POB optó por un presente ('He chooses') con nota alternativa futura; en español se eligió el futuro ('escogerá') para reflejar con naturalidad el imperfectivo hebreo sin perder la posibilidad aspectual. También se ajustó גְּאוֹן a 'gloria' para evitar el falso matiz negativo de 'orgullo' en español, preservando el sentido positivo reconocido por el propio audit trail.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' para el nombre divino cuando aparezca; este versículo no lo contiene.
  - Se preserva el nombre 'Jacob' en lugar de 'Israel' conforme al texto fuente.
  - Se deja 'Selah' sin traducir siguiendo la práctica POB documentada.
  - Se usa 'heredad' para נחלה por su valor de porción asignada y herencia covenantal.
