translation:
  language: es
  text: Y se mantuvo cerca de él, para entregárselo, para que reinara en lugar de su padre. Y le informaron todo lo que Demetrio había hecho, y la hostilidad con la que sus fuerzas le eran hostiles[a]; y permaneció allí muchos días.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'El griego es repetitivo y algo torpe aquí: literalmente, «la hostilidad con la que sus fuerzas le son hostiles». La traducción conserva la idea de que las propias fuerzas de Demetrio actuaban con hostilidad contra él.'
    reason: lexical_alternative
lexical_decisions:
- source_word: προσήδρευσεν
  english_pob_choice: stayed close to
  chosen_spanish: se mantuvo cerca de él
  alternatives_spanish:
  - estuvo cerca de él
  - se quedó junto a él
  - lo acompañó de cerca
  lexicon: LSJ
  rationale: El verbo sugiere una permanencia cercana o adhesión junto a alguien. «Se mantuvo cerca de él» conserva la proximidad política/personal sin añadir una motivación que el griego no explicita.
- source_word: παραδοῖ
  english_pob_choice: might hand him over
  chosen_spanish: para entregarlo en sus manos
  alternatives_spanish:
  - para entregarlo
  - para ponerlo en sus manos
  - para entregarlo al otro
  lexicon: BDAG
  rationale: El valor de παραδίδωμι aquí es de entregar/poner en manos ajenas. «En sus manos» hace explícito el matiz de transferencia de control y suena natural en español.
- source_word: βασιλεύσῃ ἀντὶ τοῦ πατρὸς αὐτοῦ
  english_pob_choice: might reign in place of his father
  chosen_spanish: para que reinara en lugar de su padre
  alternatives_spanish:
  - para que fuera rey en lugar de su padre
  - para que gobernara después de su padre
  - para que reinara en vez de su padre
  lexicon: LSJ
  rationale: La frase expresa sucesión real. «Reinara en lugar de su padre» conserva el sentido de sustitución de ἀντί y el lenguaje monárquico del pasaje.
- source_word: ἀπήγγειλαν
  english_pob_choice: reported
  chosen_spanish: le informaron
  alternatives_spanish:
  - le reportaron
  - le comunicaron
  - le dijeron
  lexicon: BDAG
  rationale: El verbo marca el acto de llevar un informe. «Le informaron» es formal y adecuado al contexto político-militar.
- source_word: συνετέλεσεν
  english_pob_choice: had done
  chosen_spanish: había hecho
  alternatives_spanish:
  - había realizado
  - había llevado a cabo
  - había ejecutado
  lexicon: LSJ
  rationale: Aquí el objeto es el conjunto de acciones de Demetrio. «Había hecho» es amplio y no fuerza una idea de logro o aprobación que el griego no exige.
- source_word: ἔχθραν
  english_pob_choice: hostility
  chosen_spanish: la hostilidad
  alternatives_spanish:
  - la enemistad
  - el odio
  - la animosidad
  lexicon: BDAG
  rationale: «Hostilidad» refleja mejor la oposición activa en un contexto político y militar que un término más emocional como «odio».
- source_word: ἣν ἐχθραίνονσιν αὐτῷ αἱ δυνάμεις αὐτοῦ
  english_pob_choice: with which his forces were hostile to him
  chosen_spanish: con la que sus fuerzas le eran hostiles
  alternatives_spanish:
  - con que sus fuerzas se le oponían
  - que sus fuerzas mostraban contra él
  - con la que sus tropas le hacían guerra
  lexicon: LSJ
  rationale: 'El griego es repetitivo y algo torpe: sustantivo y verbo cognados para la misma idea de enemistad. El español conserva esa redundancia relativa sin suavizarla demasiado, y mantiene que son «sus fuerzas» las que actúan hostilmente.'
- source_word: αἱ δυνάμεις αὐτοῦ
  english_pob_choice: his forces
  chosen_spanish: sus fuerzas
  alternatives_spanish:
  - sus tropas
  - su ejército
  - sus huestes
  lexicon: LSJ
  rationale: δυνάμεις en narrativa militar puede referirse a tropas o fuerzas armadas. «Sus fuerzas» preserva amplitud y el plural del original.
- source_word: ἔμεινεν ἐκεῖ ἡμέρας πολλάς
  english_pob_choice: he remained there many days
  chosen_spanish: permaneció allí muchos días
  alternatives_spanish:
  - se quedó allí muchos días
  - estuvo allí muchos días
  - permaneció allí por muchos días
  lexicon: BDAG
  rationale: Es una observación temporal directa. «Permaneció allí muchos días» sigue de cerca el griego y es idiomático en español.
translation_notes:
  revision_awareness: El texto sigue la lectura revisada del inglés auditado («stayed close to him») y conserva el cierre temporal simple («many days»). También mantiene la repetición del original griego en la cláusula sobre la hostilidad de sus fuerzas, en línea con la nota auditada.
  spanish_consistency_notes:
  - Se usó «Yahvé» solo cuando el texto lo requiera; este versículo no contiene el nombre divino.
  - Se prefirió «sus fuerzas» para δυνάμεις por coherencia con el registro militar del pasaje.
  - «Le informaron» mantiene el tono formal del informe político del original.
  - La redundancia de «la hostilidad con la que sus fuerzas le eran hostiles» es intencional y está anotada; no se suavizó a una formulación más libre.
