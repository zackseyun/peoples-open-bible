    rationale: Añadir «uno» en «que uno de la lengua» ayuda al paralelismo y a la inteligibilidad en español, dado que el griego es elíptico pero el español necesita algo más de explicitación para sonar natural.
  revised_spanish_text: Un resbalón del suelo es mejor que uno de la lengua[a]; así la caída de los malvados vendrá pronto.
