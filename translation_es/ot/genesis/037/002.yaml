translation:
  language: es
  text: 'Estas son las generaciones[a] de Jacob: José, de diecisiete años, pastoreaba el rebaño con sus hermanos. Era un joven con los hijos de Bilha y con los hijos de Zilpa, las esposas de su padre; y José llevó un mal informe[b] acerca de ellos a su padre[c].'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «relato» o «historia familiar». תּוֹלְדוֹת suele introducir una nueva sección en Génesis y puede referirse a lo que procede de una persona, no solo a su descendencia biológica.
    reason: lexical_alternative
  - marker: b
    text: O «un informe desfavorable acerca de ellos».
    reason: lexical_alternative
  - marker: c
    text: 'Hebreo: «a su padre de ellos»; el texto usa posesivo plural, refiriéndose a Jacob como el padre compartido por José y sus hermanos.'
    reason: lexical_alternative
lexical_decisions:
- source_word: תֹּלְדוֹת
  english_pob_choice: generations
  chosen_spanish: generaciones
  alternatives_spanish:
  - relato
  - historia familiar
  - descendencia
  lexicon: HALOT
  rationale: En Génesis, תֹּלְדוֹת funciona como encabezado estructural y puede introducir lo que procede de una persona, no solo sus descendientes biológicos. «Generaciones» conserva ese valor técnico y sigue el rastro auditado de la POB en inglés.
- source_word: הָיָה רֹעֶה
  english_pob_choice: was shepherding
  chosen_spanish: pastoreaba
  alternatives_spanish:
  - estaba pastoreando
  - apacentaba
  - cuidaba
  lexicon: HALOT
  rationale: El participio expresa una acción continua. «Pastoreaba» mantiene el verbo concreto de pastoreo y suena natural en español sin diluir la imagen pastoral.
- source_word: אֶת אֶחָיו בַּצֹּאן
  english_pob_choice: the flock with his brothers
  chosen_spanish: el rebaño con sus hermanos
  alternatives_spanish:
  - el rebaño junto con sus hermanos
  - el rebaño entre sus hermanos
  - el ganado con sus hermanos
  lexicon: HALOT
  rationale: El hebreo indica que José estaba trabajando con el rebaño en compañía de sus hermanos; no que pastoreara a sus hermanos. «El rebaño con sus hermanos» preserva la relación sin volverla forzada en español.
- source_word: נַעַר
  english_pob_choice: young man
  chosen_spanish: joven
  alternatives_spanish:
  - muchacho
  - muchacho joven
  - joven hombre
  lexicon: HALOT
  rationale: Como José ya tiene diecisiete años, «joven» comunica bien el matiz de edad y evita sugerir niñez. También conserva la ambigüedad del término hebreo sin hacerlo más estrecho de lo que exige el contexto.
- source_word: אֶת בְּנֵי בִלְהָה וְאֶת בְּנֵי זִלְפָּה
  english_pob_choice: with the sons of Bilhah and with the sons of Zilpah
  chosen_spanish: con los hijos de Bilha y con los hijos de Zilpa
  alternatives_spanish:
  - junto con los hijos de Bilha y de Zilpa
  - entre los hijos de Bilha y de Zilpa
  - al lado de los hijos de Bilha y de Zilpa
  lexicon: HALOT
  rationale: La repetición de אֶת tras נַעַר es sintácticamente difícil. La lectura circunstancial/apositiva seguida por la POB inglesa se conserva con «con», que en español es la solución más clara y menos interpretativa.
- source_word: נְשֵׁי אָבִיו
  english_pob_choice: his father's wives
  chosen_spanish: las esposas de su padre
  alternatives_spanish:
  - las mujeres de su padre
  - las mujeres-esposas de su padre
  lexicon: HALOT
  rationale: Es la equivalencia natural y precisa del hebreo en este contexto. «Esposas» identifica sin rodeos a Bilha y Zilpa como mujeres de Jacob.
- source_word: דִּבָּתָם רָעָה
  english_pob_choice: a bad report about them
  chosen_spanish: un mal informe acerca de ellos
  alternatives_spanish:
  - un informe malo sobre ellos
  - un informe desfavorable acerca de ellos
  - una mala noticia acerca de ellos
  lexicon: HALOT
  rationale: La expresión hebrea denota un reporte desfavorable. «Mal informe» conserva la fuerza semántica y se adapta bien al registro bíblico en español.
- source_word: אֶל אֲבִיהֶם
  english_pob_choice: to their father
  chosen_spanish: a su padre
  alternatives_spanish:
  - a su padre de ellos
  - a su padre común
  - a su padre, de ellos
  lexicon: HALOT
  rationale: Aunque el hebreo tiene sufijo plural («su padre de ellos»), en español «a su padre» comunica naturalmente el referente compartido. La distinción plural queda implícita por el contexto, sin romper la fluidez del verso.
theological_decisions:
- issue: Valor estructural de תֹּלְדוֹת en Génesis
  english_pob_reading: '''These are the generations of Jacob'' preserves the technical Genesis heading while acknowledging a possible broader sense in a footnote.'
  chosen_spanish_reading: «Estas son las generaciones de Jacob»
  alternative_spanish_readings:
  - «Este es el relato de Jacob»
  - «Esta es la historia familiar de Jacob»
  rationale: No hay necesidad de suavizar el encabezado; el español puede conservar el término técnico «generaciones» y, si se desea, una nota puede recordar que introduce la sección y puede abarcar más que descendencia biológica.
  doctrine_reference: Génesis 2:4; 5:1; 6:9; 10:1; 11:10
- issue: Referencia plural de «su padre» en el cierre
  english_pob_reading: the Hebrew explicitly uses the plural possessive, referring to Jacob as the father shared by Joseph and the brothers.
  chosen_spanish_reading: «a su padre»
  alternative_spanish_readings:
  - «a su padre de ellos»
  - «a su padre común»
  rationale: El hebreo marca pluralidad posesiva, pero en español la posesión compartida está clara por el contexto narrativo. No conviene forzar una construcción poco natural en el texto principal; la nota puede preservar la observación filológica.
  doctrine_reference: Génesis 37:4; 37:14
- issue: Tratamiento del matiz de edad en נַעַר
  english_pob_reading: young man
  chosen_spanish_reading: «joven»
  alternative_spanish_readings:
  - «muchacho»
  - «muchacho joven»
  rationale: «Joven» respeta el dato de que José tiene diecisiete años y evita una lectura infantilizante. También mantiene abierta la posibilidad de que נַעַר funcione aquí como designación de estatus/edad más que como «sirviente».
  doctrine_reference: Génesis 37:2
translation_notes:
  revision_awareness: 'El inglés POB pasó por una revisión para mejorar la fluidez y mantener juntas las dos cláusulas iniciales. La versión española sigue esa estructura: un encabezado de sección con תֹּלְדוֹת, luego la descripción continua de José, y finalmente el informe desfavorable. También se conservó la observación sobre el sufijo plural de «su padre», aunque en español el texto principal usa una forma natural y la nota aclara el detalle.'
  spanish_consistency_notes:
  - Se usa «Yahvé» como forma por defecto cuando aparezca el nombre divino; en este versículo no aparece.
  - Se ha preferido «generaciones» para תֹּלְדוֹת por consistencia con el uso técnico en Génesis.
  - Se mantiene «esposas» para נְשֵׁי אָבִיו, evitando la generalización a «mujeres».
  - «Mal informe» conserva el valor negativo del hebreo y la elección auditada en inglés.
  - La puntuación separa claramente el encabezado y las acciones narrativas para facilitar la lectura en español.
