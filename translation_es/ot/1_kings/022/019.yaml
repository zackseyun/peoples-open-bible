translation:
  language: es
  text: 'Entonces dijo: «Por tanto, oye la palabra de Yahvé: Vi a Yahvé sentado en su trono, y toda la hueste del cielo estaba de pie junto a él[a], a su derecha y a su izquierda».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «estaba de pie sobre él»; en este contexto, probablemente significa que estaban junto a él, en actitud de servicio, como aclara la referencia a su derecha y a su izquierda.'
    reason: lexical_alternative
lexical_decisions:
- source_word: לָכֵן
  english_pob_choice: Therefore
  chosen_spanish: Por tanto
  alternatives_spanish:
  - Por eso
  - Así que
  lexicon: HALOT
  rationale: La partícula introduce una conclusión o consecuencia respecto del intercambio anterior. «Por tanto» conserva el enlace lógico y el tono solemne del discurso profético, más que una fórmula conversacional como «así que».
- source_word: שְׁמַע
  english_pob_choice: hear
  chosen_spanish: oye
  alternatives_spanish:
  - escucha
  - oye atentamente
  lexicon: HALOT
  rationale: El imperativo singular requiere una apelación directa. «Oye» es natural en español y mantiene la concisión profética del original sin añadir explicación.
- source_word: דְּבַר יְהוָה
  english_pob_choice: the word of Yahweh
  chosen_spanish: la palabra de Yahvé
  alternatives_spanish:
  - el mensaje de Yahvé
  - la palabra del SEÑOR
  lexicon: HALOT
  rationale: Se preserva la fórmula profética estándar. «Palabra» mantiene el peso canónico de la expresión, y «Yahvé» sigue la terminología POB para el nombre divino sin sustituirlo por un título.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  lexicon: HALOT
  rationale: El Tetragrámaton se vierte como el nombre divino transliterado. «Yahvé» es la forma establecida en este proyecto y evita la sustitución por «el SEÑOR».
- source_word: רָאִיתִי
  english_pob_choice: I saw
  chosen_spanish: Vi
  alternatives_spanish:
  - He visto
  - Yo vi
  lexicon: HALOT
  rationale: El pretérito simple expresa bien el relato visionario en español y reproduce la inmediatez del testimonio.
- source_word: יֹשֵׁב עַל כִּסְאוֹ
  english_pob_choice: sitting on his throne
  chosen_spanish: sentado en su trono
  alternatives_spanish:
  - entronizado en su trono
  - sentado sobre su trono
  lexicon: HALOT
  rationale: El participio describe una postura continua en la escena de corte. «Sentado en su trono» es claro y fiel; «entronizado» añade interpretación que el hebreo no exige.
- source_word: כִּסְאוֹ
  english_pob_choice: his throne
  chosen_spanish: su trono
  alternatives_spanish:
  - el trono suyo
  lexicon: HALOT
  rationale: La referencia posesiva es directa y el sustantivo «trono» conserva la imaginería real del pasaje.
- source_word: כָל צְבָא הַשָּׁמַיִם
  english_pob_choice: all the host of heaven
  chosen_spanish: todo el ejército de los cielos
  alternatives_spanish:
  - todo el hoste celestial
  - todo el ejército del cielo
  - toda la hueste celestial
  lexicon: HALOT
  rationale: La expresión puede aludir a la hueste/corte celestial con matiz militar. «Ejército de los cielos» preserva el sentido colectivo y la posible fuerza bélica de צְבָא sin reducirlo simplemente a «ángeles».
- source_word: עֹמֵד
  english_pob_choice: standing
  chosen_spanish: estaba de pie
  alternatives_spanish:
  - estaban de pie
  - estando de pie
  lexicon: HALOT
  rationale: Aunque el hebreo presenta un participio, en español la escena se expresa con mayor naturalidad mediante una perífrasis de estado. «Estaba de pie» comunica la postura continuada.
- source_word: עָלָיו
  english_pob_choice: by him
  chosen_spanish: junto a él
  alternatives_spanish:
  - a su lado
  - cerca de él
  - sobre él
  lexicon: HALOT
  rationale: En el contexto de sala del trono, la idea es de presencia de servicio cerca del rey. «Junto a él» evita la lectura física de superioridad («sobre él») y conserva la escena de asistencia cercana.
- source_word: מִימִינוֹ וּמִשְּׂמֹאלוֹ
  english_pob_choice: on his right and on his left
  chosen_spanish: a su derecha y a su izquierda
  alternatives_spanish:
  - a su mano derecha y a su mano izquierda
  - a la derecha y a la izquierda de él
  lexicon: HALOT
  rationale: La simetría espacial del hebreo se mantiene con una formulación natural en español. Se evita «mano derecha» por ser más idiomática en algunos contextos, pero no necesaria aquí.
theological_decisions:
- issue: Nombre divino יְהוָה en el contexto de visión del trono celestial
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: El texto hebreo usa directamente el Nombre. La traducción conserva el nombre propio divino para no ocultar el dato del original ni la continuidad entre la palabra profética y la visión celestial.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: «Todo el ejército de los cielos» y la tensión entre hueste, corte y seres celestiales
  english_pob_reading: all the host of heaven
  chosen_spanish_reading: todo el ejército de los cielos
  alternative_spanish_readings:
  - toda la hueste celestial
  - todos los ángeles del cielo
  rationale: La frase hebrea admite un campo semántico amplio. Se conserva la ambigüedad significativa del texto, sin estrecharla prematuramente a «ángeles», porque la escena funciona como consejo/corte divina con lenguaje de hueste.
  doctrine_reference: 'DOCTRINE.md Translation philosophy §3: Preserve theological tension rather than resolve it'
translation_notes:
  revision_awareness: La redacción sigue el último estado del audit trail inglés, que ajustó «beside him» a «by him» para reflejar de manera más directa el hebreo sin perder naturalidad. En español se optó por «junto a él», equivalente cercano y más idiomático que conserva la proximidad de servicio en la escena. También se mantuvo la decisión revisada de no traducir la hueste celestial con un término más explicativo que borre su amplitud semántica.
  spanish_consistency_notes:
  - Se usa «Yahvé» de forma consistente para יְהוָה, conforme al estándar del proyecto.
  - Se preserva la expresión solemne «la palabra de Yahvé» para el giro profético.
  - «Ejército de los cielos» conserva el valor colectivo y permite la lectura de corte/hueste celestial sin resolverla de antemano.
  - La puntuación en español sigue la convención de comillas angulares no obligatorias; aquí se usan comillas latinas y cierre de cita estándar para legibilidad.
