id: ISA.26.5
reference: Isaiah 26:5
source:
  edition: WLC
  text: כִּ֤י הֵשַׁח֙ יֹשְׁבֵ֣י מָר֔וֹם קִרְיָ֖ה נִשְׂגָּבָ֑ה יַשְׁפִּילֶ֤/נָּה יַשְׁפִּילָ/הּ֙ עַד אֶ֔רֶץ יַגִּיעֶ֖/נָּה עַד עָפָֽר־־׃
translation:
  text: For he has brought down those who dwell on high[a], the lofty city; he lays it low, he lays it low to the earth; he brings it down to the dust.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the exalted city' or 'the city set on high.' The Hebrew does not identify the city by name.
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  chosen: For
  alternatives:
  - Indeed
  - Because
  lexicon: HALOT
  rationale: Introduces the reason for the praise in the surrounding context. 'For' fits the explanatory force naturally in English.
- source_word: הֵשַׁח
  chosen: has brought down
  alternatives:
  - has humbled
  - has cast down
  lexicon: HALOT
  rationale: The Hiphil of שׁחח conveys causing to be low/humbled. 'Has brought down' preserves the concrete image and matches the judgment context.
- source_word: יֹשְׁבֵי מָרוֹם
  chosen: those who dwell on high
  alternatives:
  - the inhabitants of the height
  - those living in a high place
  lexicon: HALOT
  rationale: The participial phrase refers to exalted dwellers, likely metaphorically proud or secure powers. 'Those who dwell on high' keeps both the spatial and figurative sense without over-interpreting.
- source_word: קִרְיָה נִשְׂגָּבָה
  chosen: the lofty city
  alternatives:
  - the exalted city
  - the fortified city on high
  lexicon: HALOT
  rationale: קִרְיָה is 'city'; נִשְׂגָּבָה denotes being set high/exalted. 'Lofty city' is concise and preserves the elevated imagery. The phrase stands in apposition to the preceding clause.
- source_word: יַשְׁפִּילֶנָּה
  chosen: he lays it low
  alternatives:
  - he humbles it
  - he brings it low
  lexicon: HALOT
  rationale: The Hiphil of שׁפל means to make low. 'Lays it low' is idiomatic English for overthrowing a city and preserves the repeated verbal force.
- source_word: יַשְׁפִּילָהּ
  chosen: he lays it low
  alternatives:
  - he humbles it
  - he brings it low
  lexicon: HALOT
  rationale: The repetition is retained rather than smoothed out, since the Hebrew repeats the verb for emphasis and poetic intensification.
- source_word: עַד אֶרֶץ
  chosen: to the ground
  alternatives:
  - to the earth
  - down to the land
  lexicon: HALOT
  rationale: Although אֶרֶץ is often 'earth/land,' here in parallel with 'dust' it denotes the ground. 'To the ground' is the most natural English equivalent in this poetic image.
- source_word: יַגִּיעֶנָּה
  chosen: he brings it down
  alternatives:
  - he makes it reach
  - he causes it to touch
  lexicon: HALOT
  rationale: The Hiphil of נגע literally means 'cause to reach/touch.' In context of a city being lowered to dust, 'he brings it down' expresses the result clearly while preserving the causative sense.
- source_word: עַד עָפָר
  chosen: to the dust
  alternatives:
  - to the dirt
  - down to dust
  lexicon: HALOT
  rationale: עָפָר is 'dust,' a common biblical image of humiliation and complete abasement. 'To the dust' preserves the poetic and theological resonance.
