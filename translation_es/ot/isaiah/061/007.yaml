translation:
  language: es
  text: En lugar de vuestra vergüenza[a], habrá una porción doble; y en lugar de la afrenta, gritarán de alegría[b] por su porción. Por tanto, en su tierra heredarán una porción doble[c]; el gozo perpetuo será de ellos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El hebreo cambia de «vuestra vergüenza» a expresiones en tercera persona («su porción», «su tierra», «heredarán»). Algunas traducciones nivelan la persona para mayor fluidez.
    reason: alternative_reading
  - marker: b
    text: O «cantarán de alegría». El verbo hebreo puede expresar un clamor o canto gozoso y exuberante.
    reason: lexical_alternative
  - marker: c
    text: O «poseerán una porción doble». El verbo hebreo también puede traducirse como «poseerán», aunque aquí «heredarán» conserva bien el matiz de herencia.
    reason: lexical_alternative
lexical_decisions:
- source_word: תַּחַת
  english_pob_choice: Instead of
  chosen_spanish: En lugar de
  alternatives_spanish:
  - en vez de
  - en lugar de
  lexicon: HALOT
  rationale: Aquí la preposición expresa reemplazo o intercambio, no ubicación espacial. «En lugar de» comunica bien la inversión de la situación en español sin perder la fuerza del contraste.
- source_word: בָּשְׁתְּכֶם
  english_pob_choice: your shame
  chosen_spanish: su vergüenza
  alternatives_spanish:
  - su vergüenza
  - su deshonra
  lexicon: HALOT
  rationale: Se mantiene el sentido básico de vergüenza/honor-rechazo. En español, «vergüenza» conserva la correspondencia directa y la tensión de honra-deshonra del versículo.
- source_word: מִשְׁנֶה
  english_pob_choice: a double portion
  chosen_spanish: una porción doble
  alternatives_spanish:
  - doble porción
  - el doble
  lexicon: HALOT
  rationale: El sustantivo apunta a una porción duplicada, especialmente en contexto de herencia/restauración. «Una porción doble» preserva el motivo de herencia y evita reducirlo a un mero adjetivo.
- source_word: וּכְלִמָּה
  english_pob_choice: and instead of disgrace
  chosen_spanish: y en lugar de la afrenta
  alternatives_spanish:
  - y en lugar de la deshonra
  - y en lugar de la vergüenza pública
  lexicon: HALOT
  rationale: Se distingue de בֹּשֶׁת con un término que puede expresar deshonra pública o afrenta. «Afrenta» conserva esa carga social y la diferencia respecto de «vergüenza».
- source_word: יָרֹנּוּ
  english_pob_choice: they will shout for joy
  chosen_spanish: gritarán de alegría
  alternatives_spanish:
  - clamarán de alegría
  - cantarán con júbilo
  lexicon: HALOT
  rationale: El verbo implica exclamación gozosa y audible. «Gritarán de alegría» mantiene la energía expresiva mejor que un verbo más neutro como «alegrarse».
- source_word: חֶלְקָם
  english_pob_choice: their portion
  chosen_spanish: su porción
  alternatives_spanish:
  - su parte
  - su heredad
  lexicon: HALOT
  rationale: El término remite a la porción asignada, con trasfondo de reparto/herencia. «Porción» preserva la repetición del versículo y el vínculo con la idea de heredar.
- source_word: לָכֵן
  english_pob_choice: Therefore
  chosen_spanish: Por tanto
  alternatives_spanish:
  - por eso
  - así que
  lexicon: HALOT
  rationale: Marca consecuencia lógica. «Por tanto» es natural y formal en español bíblico contemporáneo.
- source_word: בְּאַרְצָם
  english_pob_choice: in their land
  chosen_spanish: en su tierra
  alternatives_spanish:
  - en su país
  - en su tierra
  lexicon: HALOT
  rationale: En este contexto de restauración, אֶרֶץ conserva resonancia territorial y de promesa. «Tierra» comunica mejor ese valor que «país».
- source_word: יִירָשׁוּ
  english_pob_choice: they will possess
  chosen_spanish: heredarán
  alternatives_spanish:
  - poseerán
  - tomarán posesión de
  lexicon: HALOT
  rationale: El verbo puede significar heredar/poseer. Dado el campo semántico de porción y reparto, «heredarán» da en español la asociación natural con una porción otorgada.
- source_word: שִׂמְחַת עוֹלָם
  english_pob_choice: everlasting joy
  chosen_spanish: el gozo perpetuo
  alternatives_spanish:
  - gozo eterno
  - alegría perpetua
  lexicon: HALOT
  rationale: La frase expresa alegría duradera. «Gozo perpetuo» conserva el tono elevado y evita una repetición menos idiomática de «eterno».
- source_word: תִּהְיֶה לָהֶם
  english_pob_choice: will be theirs
  chosen_spanish: será de ellos
  alternatives_spanish:
  - les pertenecerá
  - será suyo
  lexicon: HALOT
  rationale: La construcción indica posesión o pertenencia. «Será de ellos» es claro, bíblico y evita forzar una formulación posesiva demasiado moderna.
theological_decisions:
- issue: 'Cambio de persona: del «su vergüenza» al «heredarán / de ellos»'
  english_pob_reading: Preserve the shift in translation rather than harmonize all pronouns to one person
  chosen_spanish_reading: Conservar el cambio de persona tal como está en el hebreo, sin armonizarlo artificialmente
  alternative_spanish_readings:
  - 'armonizar todo a segunda persona: «en vez de tu vergüenza… en tu tierra poseerás…»'
  - 'homogeneizar todo a tercera persona: «en vez de su vergüenza… en su tierra heredarán…»'
  rationale: El texto hebreo conserva un giro real de segunda a tercera persona. La traducción española mantiene ese rasgo para ser transparente al original, aunque resulte algo abrupto, porque la abrupticidad misma es parte del perfil textual.
  doctrine_reference: Principios de transparencia textual y fidelidad al hebreo del proyecto POB
- issue: «Porción doble» como eco de restauración hereditaria
  english_pob_reading: a double portion / they will inherit a double portion
  chosen_spanish_reading: una porción doble / heredarán una porción doble
  alternative_spanish_readings:
  - doble porción
  - recibirán el doble
  rationale: La repetición de מִשְׁנֶה refuerza el motivo de restauración y herencia. Se conserva en español la misma idea repetida para no diluir el énfasis del versículo.
  doctrine_reference: Isaías 61:7; patrón semántico de restauración e herencia
translation_notes:
  revision_awareness: Se siguió el estado más reciente del audit trail inglés, que unificó «share» a «portion» para mantener consistencia con מִשְׁנֶה. En español, esa consistencia se refleja con «porción» en ambos lugares. También se preservó el cambio pronominal documentado en el hebreo, tal como indica la nota de auditoría inglesa.
  spanish_consistency_notes:
  - Se mantuvo «porción» en ambos casos para reflejar la repetición de מִשְׁנֶה.
  - Se eligió «tierra» para אֶרֶץ por su resonancia territorial y de promesa.
  - Se evitó «SEÑOR» porque este versículo no contiene el Tetragrámaton ni una cita directa del nombre divino.
  - Se mantuvo un estilo bíblico moderno y digno, sin arcaísmos innecesarios.
