  verdict: revise
  source_alignment_summary: 'El borrador refleja bien el sentido del hebreo: כִּי como explicación, קִנְאָה como celos maritales, חֲמַת como furor, גָּבֶר mantenido literalmente como «un hombre», y נָקָם como «venganza». También conserva correctamente la nota contextual sobre el marido ofendido. La principal desalineación está en la ubicación de las notas: ambas aparecen al final del versículo, pero una debe anclarse a «un hombre» y la otra a la expresión verbal de חמל.'
  spanish_quality_summary: El español es claro y digno. Sin embargo, «Porque» al inicio funciona, pero «Pues» suena algo más proverbial y fluido en este contexto. Además, «no tendrá compasión» es comprensible, pero «no tendrá misericordia» encaja mejor con el registro bíblico y con la alternativa inglesa principal «show no mercy», mientras que las notas pueden preservar «no se apiadará» y «no perdonará/no lo perdonará» como opciones.
  glossary_alignment: No hay conflictos con la terminología base del proyecto. La elección «celos» es correcta; «de un hombre» respeta la decisión auditada de no explicitar «marido» en el texto; «venganza» corresponde bien a נָקָם. Se recomienda ajustar חמל a «no tendrá misericordia» por mayor cercanía al POB inglés y mejor tono eclesial en español.
  issues:
  - severity: medium
    issue: Los marcadores de nota están mal anclados en el texto.
    rationale: La nota cultural sobre «de un hombre» debe ir junto a esa frase, y la nota léxica sobre חמל debe ir junto a «no tendrá misericordia/no tendrá compasión», no ambas al final del versículo.
  - severity: low
    issue: «No tendrá compasión» es válido, pero menos cercano al POB inglés que «no tendrá misericordia».
    rationale: El inglés auditado eligió «he will show no mercy». En español bíblico general, «no tendrá misericordia» mantiene mejor esa correspondencia y el registro solemne, sin perder naturalidad.
  - severity: low
    issue: «Porque» es aceptable, pero «Pues» puede sonar más natural en estilo proverbial.
    rationale: Ambas opciones son fieles a כִּי. Aquí el cambio es estilístico menor, no una corrección obligatoria de sentido.
  revised_spanish_text: Pues los celos son el furor de un hombre[a], y no tendrá misericordia[b] en el día de la venganza.
