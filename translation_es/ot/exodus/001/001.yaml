translation:
  language: es
  text: Ahora bien, estos son los nombres de los hijos de Israel que vinieron a Egipto con Jacob[a], cada uno con los de su casa.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Y estos son los nombres». La conjunción hebrea abre el texto enlazándolo con la narración anterior de Génesis.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְ/אֵלֶּה
  english_pob_choice: Now these
  chosen_spanish: Ahora bien, estos
  alternatives_spanish:
  - Y estos
  - Estos
  lexicon: HALOT
  rationale: La conjunción inicial enlaza el libro con la narración previa y a la vez introduce una nueva sección. «Ahora bien» conserva ese valor discursivo en español sin sonar rígido; «estos» mantiene el demostrativo del hebreo.
- source_word: שְׁמוֹת
  english_pob_choice: names
  chosen_spanish: nombres
  alternatives_spanish:
  - nombres propios
  lexicon: HALOT
  rationale: Es el equivalente directo y preserva el encabezado temático del versículo.
- source_word: בְּנֵי יִשְׂרָאֵל
  english_pob_choice: the sons of Israel
  chosen_spanish: los hijos de Israel
  alternatives_spanish:
  - los descendientes de Israel
  - los hijos de Jacob
  lexicon: HALOT
  rationale: «Hijos» refleja de manera más literal el hebreo que «descendientes», y es natural en español bíblico sin ocultar el matiz genealógico masculino del pasaje.
- source_word: הַבָּאִים
  english_pob_choice: who came
  chosen_spanish: que vinieron
  alternatives_spanish:
  - que llegaron
  - los que vinieron
  lexicon: HALOT
  rationale: El participio funciona aquí como rasgo identificador del grupo. «Que vinieron» expresa el movimiento histórico de forma natural en español.
- source_word: מִצְרָיְמָה
  english_pob_choice: to Egypt
  chosen_spanish: a Egipto
  alternatives_spanish:
  - hacia Egipto
  - hasta Egipto
  lexicon: HALOT
  rationale: El sufijo direccional indica movimiento hacia Egipto; «a Egipto» es la forma más idiomática y suficiente en español.
- source_word: אֵת יַעֲקֹב
  english_pob_choice: with Jacob
  chosen_spanish: con Jacob
  alternatives_spanish:
  - junto con Jacob
  - acompañando a Jacob
  lexicon: HALOT
  rationale: Aquí אֵת marca acompañamiento, no objeto directo. «Con Jacob» reproduce correctamente la relación sintáctica.
- source_word: אִישׁ וּבֵיתוֹ
  english_pob_choice: each man with his household
  chosen_spanish: cada uno con su casa
  alternatives_spanish:
  - cada hombre con su familia
  - cada uno con su hogar
  lexicon: HALOT
  rationale: El singular distributivo de אִישׁ pide una traducción distributiva en español. «Casa» conserva la amplitud semántica de בַּיִת como unidad doméstica/familiar, aunque en español pueda sonar algo más concreto que «household».
translation_notes:
  revision_awareness: Se ajustó la redacción para evitar dependencia mecánica del inglés y para asegurar que toda nota aparezca anclada en el texto. En particular, la nota de alternativa se vinculó explícitamente al arranque del versículo con [a].
  spanish_consistency_notes:
  - Se mantiene «hijos de Israel» de forma consistente con el valor genealógico del hebreo en este contexto.
  - Se usa «Egipto» con preposición simple para reflejar la dirección del movimiento sin forzar un calco.
  - «Casa» se emplea para בַּיִת por fidelidad al campo semántico doméstico; en este versículo no hace falta expandir a «familia» porque el paralelo distributivo ya aclara el sentido.
