translation:
  language: es
  text: 'Para los hijos de Gershom: Joel, el jefe[a], y 130 de sus hermanos[b].'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «Gersón», siguiendo una forma tradicional más familiar en español; el hebreo aquí dice Gershom.
    reason: alternative_reading
  - marker: b
    text: «Hermanos» aquí se refiere a varones del mismo grupo familiar levítico, no necesariamente a hermanos carnales de Joel.
    reason: lexical_alternative
lexical_decisions:
- source_word: לִ/בְנֵי
  english_pob_choice: For the sons of
  chosen_spanish: Para los hijos de
  alternatives_spanish:
  - De los hijos de
  - Para los descendientes de
  lexicon: HALOT
  rationale: El prefijo ל aquí introduce el grupo dentro de una lista; en español, 'Para los hijos de' conserva bien esa función distributiva y de encabezamiento. 'Hijos' mantiene la forma genealógica del hebreo mejor que 'descendientes', que sería más interpretativo.
- source_word: גֵּרְשׁוֹם
  english_pob_choice: Gershom
  chosen_spanish: Gershom
  alternatives_spanish:
  - Gersón
  lexicon: HALOT
  rationale: La forma consonántica hebrea es Gershom, por lo que se translitera así. Se evita la forma tradicional 'Gersón' porque no refleja con precisión esta grafía del texto base.
- source_word: יוֹאֵל
  english_pob_choice: Joel
  chosen_spanish: Joel
  lexicon: HALOT
  rationale: Nombre propio con transliteración estándar al español.
- source_word: הַ/שָּׂר
  english_pob_choice: the chief
  chosen_spanish: el jefe
  alternatives_spanish:
  - el líder
  - el príncipe
  lexicon: HALOT
  rationale: שַׂר puede significar jefe, líder, oficial o príncipe según el contexto. En una lista administrativa/genealógica, 'el jefe' comunica bien la idea de cabeza del grupo sin sugerir rango real.
- source_word: וְ/אֶחָי/ו
  english_pob_choice: and his brothers
  chosen_spanish: y sus hermanos
  alternatives_spanish:
  - y sus parientes
  - y sus compañeros de clan
  lexicon: HALOT
  rationale: Se conserva 'hermanos' porque es el sentido básico del término y el contexto de clan levítico permite entenderlo como miembros varones del mismo grupo familiar, no necesariamente hermanos inmediatos.
- source_word: מֵאָה וּ/שְׁלֹשִׁים
  english_pob_choice: '130'
  chosen_spanish: '130'
  alternatives_spanish:
  - ciento treinta
  lexicon: HALOT
  rationale: El numeral se mantiene en dígitos, como en la versión inglesa POB, por claridad en una lista. No se pierde contenido semántico al no escribirlo en palabras.
translation_notes:
  revision_awareness: El texto hebreo y el audit trail inglés están en alto acuerdo; no se registran revisiones sustantivas. La draft española sigue esa lectura sin añadir matices no atestiguados.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' como norma del proyecto cuando aparezca el nombre divino; este versículo no lo contiene.
  - '''Joel'' y ''Gershom'' se transliteran de forma consistente con nombres propios hebreos.'
  - '''Hermano(s)'' se reserva para el valor de parentesco ampliado cuando el contexto de clan lo exige, como aquí.'
