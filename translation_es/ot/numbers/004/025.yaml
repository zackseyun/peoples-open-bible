translation:
  language: es
  text: Llevarán las cortinas del tabernáculo, y la tienda de reunión con su cubierta, y la cubierta de piel fina[a] que está encima de ella, y la cortina de la entrada de la tienda de reunión,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebreo תַּחַשׁ designa un material o piel de animal inciertos; las traducciones tradicionales incluyen «pieles de tejón», mientras que otras transliteran «tahas».
    reason: lexical_alternative
lexical_decisions:
- source_word: וְנָשְׂאוּ
  english_pob_choice: They shall carry
  chosen_spanish: Ellos llevarán
  alternatives_spanish:
  - Ellos cargarán
  - Ellos llevarán consigo
  lexicon: HALOT
  rationale: נשא en este contexto describe transportar piezas del santuario; «llevarán» conserva el sentido de traslado sin sonar rígido en español.
- source_word: יְרִיעֹת הַמִּשְׁכָּן
  english_pob_choice: the curtains of the tabernacle
  chosen_spanish: las cortinas del tabernáculo
  alternatives_spanish:
  - las telas del tabernáculo
  - los paños del tabernáculo
  lexicon: HALOT
  rationale: יְרִיעֹת son piezas de tela colgantes; «cortinas» es la correspondencia natural y ya establecida para el contexto del tabernáculo.
- source_word: אֹהֶל מוֹעֵד
  english_pob_choice: the tent of meeting
  chosen_spanish: la tienda de reunión
  alternatives_spanish:
  - el tabernáculo de reunión
  - la tienda del encuentro
  lexicon: HALOT
  rationale: «Tienda de reunión» conserva la forma literal del título y evita sustituirlo por un término más interpretativo; «tienda» funciona de modo más natural que «tabernáculo» en esta expresión específica, sin perder el referente sagrado.
- source_word: מִכְסֵהוּ
  english_pob_choice: its covering
  chosen_spanish: su cubierta
  alternatives_spanish:
  - su cobertura
  - su cubierta exterior
  lexicon: HALOT
  rationale: El sufijo remite a la tienda de reunión; «cubierta» mantiene la referencia simple y no adelanta una especificación que el hebreo no da aquí.
- source_word: מִכְסֵה הַתַּחַשׁ
  english_pob_choice: the covering of fine leather
  chosen_spanish: la cubierta de piel fina
  alternatives_spanish:
  - la cubierta de piel de tahash
  - la cubierta de cuero fino
  lexicon: HALOT
  rationale: תַּחַשׁ es zoológicamente incierto; siguiendo la decisión inglesa de no precisar la especie, «piel fina» comunica un material de calidad sin fingir certeza sobre el animal o el tipo exacto de cuero.
- source_word: אֲשֶׁר עָלָיו מִלְמָעְלָה
  english_pob_choice: that is over it above
  chosen_spanish: que está sobre ella por encima
  alternatives_spanish:
  - que está encima de ella
  - que está sobre ella arriba
  lexicon: HALOT
  rationale: La frase hebrea subraya la posición superior de esta cubierta; en español, «por encima» conserva ese énfasis sin sonar torpe.
- source_word: מָסַךְ פֶּתַח
  english_pob_choice: the screen for the entrance
  chosen_spanish: la cortina de la entrada
  alternatives_spanish:
  - la pantalla de la entrada
  - el velo de la entrada
  lexicon: HALOT
  rationale: En contexto del tabernáculo, מָסַךְ es una pieza colgante funcionalmente equivalente a una cortina o pantalla; «cortina» es más clara y bíblicamente inteligible en español.
translation_notes:
  revision_awareness: El texto inglés auditado no requirió cambios en la última revisión; el español sigue la misma lectura y conserva la incertidumbre léxica de תַּחַשׁ sin especificarla indebidamente.
  spanish_consistency_notes:
  - Se mantuvo la secuencia sintáctica del hebreo con coordinación repetida para reflejar la enumeración de objetos.
  - Se evitó «SEÑOR» u otras sustituciones no presentes aquí; el versículo no contiene el nombre divino.
  - «Tienda de reunión» y «tabernáculo» se distribuyen para conservar el valor titular de אֹהֶל מוֹעֵד y el referente estructural de מִשְׁכָּן sin redundancia innecesaria.
  - La nota sobre תַּחַשׁ se ancla en el término «piel fina» para señalar la incertidumbre léxica sin sobrecargar el texto principal.
