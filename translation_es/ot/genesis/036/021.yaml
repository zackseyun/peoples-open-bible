translation:
  language: es
  text: y Dishón, y Ézer, y Dishán. Estos son los jefes[a] de los horeos, los hijos de Seír, en la tierra de Edom.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'caudillos' para אַלּוּפִים, subrayando la función de cabeza de grupo o clan más que la idea de una persona prominente solamente.
    reason: lexical_alternative
lexical_decisions:
- source_word: דִשׁוֹן
  english_pob_choice: Dishon
  chosen_spanish: Disón
  alternatives_spanish:
  - Dishón
  - Dishon
  lexicon: HALOT
  rationale: Nombre propio; se translitera al español conservando la forma breve y la acentuación natural en español.
- source_word: אֵצֶר
  english_pob_choice: Ezer
  chosen_spanish: Ézer
  alternatives_spanish:
  - Ezer
  lexicon: HALOT
  rationale: Nombre propio; el acento gráfico ayuda a la lectura en español sin alterar el nombre.
- source_word: דִישָׁן
  english_pob_choice: Dishan
  chosen_spanish: Disán
  alternatives_spanish:
  - Dishán
  - Dishan
  lexicon: HALOT
  rationale: Nombre propio; se translitera de modo consistente con el resto de los nombres y con acento español.
- source_word: אֵלֶּה
  english_pob_choice: These are
  chosen_spanish: Estos son
  alternatives_spanish:
  - Estos
  lexicon: HALOT
  rationale: La fórmula demostrativa introduce una identificación; en español, la cópula resulta natural y fiel al sentido de presentación.
- source_word: אַלּוּפֵי
  english_pob_choice: chiefs
  chosen_spanish: jefes
  alternatives_spanish:
  - caudillos
  - líderes de clan
  - príncipes
  lexicon: HALOT
  rationale: אַלּוּף en Génesis 36 designa cabezas de grupo o clan; 'jefes' comunica bien la función social-política sin cargar con un tono arcaico.
- source_word: הַחֹרִי
  english_pob_choice: the Horites
  chosen_spanish: los horeos
  alternatives_spanish:
  - los horitas
  - los horeos
  lexicon: HALOT
  rationale: Ethnónimo colectivo; 'horeos' es la forma española más natural y tradicionalmente reconocible para este pueblo.
- source_word: בְּנֵי שֵׂעִיר
  english_pob_choice: the sons of Seir
  chosen_spanish: los hijos de Seír
  alternatives_spanish:
  - los descendientes de Seír
  lexicon: HALOT
  rationale: Se conserva la expresión genealógica literal, que mantiene la relación de linaje del texto fuente.
- source_word: בְּאֶרֶץ אֱדוֹם
  english_pob_choice: in the land of Edom
  chosen_spanish: en la tierra de Edom
  alternatives_spanish:
  - en Edom
  lexicon: HALOT
  rationale: Se mantiene la frase completa con 'tierra', como en el hebreo y en la POB inglesa, para conservar la precisión geográfica.
translation_notes:
  revision_awareness: El texto hebreo y la POB inglesa coinciden de forma alta; no se aplicaron revisiones textuales relevantes. La decisión principal en español fue la elección de equivalentes naturales para los nombres propios y para אַלּוּפִים.
  spanish_consistency_notes:
  - Se mantuvo el nombre divino ausente en este versículo, sin introducir convenciones de sustitución.
  - Se prefirió 'jefes' por coherencia con el valor funcional de אַלּוּפִים en Génesis 36.
  - Los nombres propios se adaptaron a ortografía española con acento gráfico cuando ayuda a la pronunciación.
  - El orden y la estructura siguen de cerca el hebreo y la POB inglesa, sin añadir información interpretativa.
