translation:
  language: es
  text: 'Entonces Labán y Betuel respondieron y dijeron: «El asunto ha venido de Yahvé; no podemos decirte[a] ni malo ni bueno».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «hablarte malo o bueno», un modismo que significa que no podían oponerse ni alterar lo que Yahvé había determinado.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּעַן
  english_pob_choice: answered
  chosen_spanish: respondieron
  alternatives_spanish:
  - contestaron
  - respondieron
  lexicon: HALOT
  rationale: ענה introduce una réplica en diálogo; en español, «respondieron» comunica con naturalidad la función discursiva sin perder el valor de respuesta.
- source_word: וַיֹּאמְרוּ
  english_pob_choice: and said
  chosen_spanish: y dijeron
  alternatives_spanish:
  - y hablaron
  - y dijeron
  lexicon: HALOT
  rationale: La fórmula doble de narración de habla se conserva con «respondieron y dijeron», manteniendo la textura del hebreo.
- source_word: מֵיְהוָה
  english_pob_choice: from Yahweh
  chosen_spanish: de Yahvé
  alternatives_spanish:
  - de Yahvé
  - procedente de Yahvé
  lexicon: HALOT
  rationale: La preposición מִן expresa origen/procedencia. Se traduce con «de» para preservar la idea de que el asunto procede de Yahvé, siguiendo la terminología española del proyecto.
- source_word: יָצָא
  english_pob_choice: has come
  chosen_spanish: ha salido
  alternatives_spanish:
  - ha venido
  - ha procedido
  lexicon: HALOT
  rationale: יצא significa literalmente «salir/venir fuera». En este giro con «la cosa», «ha salido» refleja mejor el origen del asunto y preserva el valor de salida desde una fuente.
- source_word: הַדָּבָר
  english_pob_choice: the matter
  chosen_spanish: la cosa
  alternatives_spanish:
  - el asunto
  - la cuestión
  - la cosa
  lexicon: HALOT
  rationale: דבר aquí se refiere a la negociación o decisión en curso. «La cosa» conserva la amplitud semántica del hebreo y deja abierta la referencia al asunto tratado; «asunto» es una alternativa más interpretativa.
- source_word: לֹא נוּכַל
  english_pob_choice: we cannot
  chosen_spanish: no podemos
  alternatives_spanish:
  - no somos capaces de
  - no podemos
  lexicon: HALOT
  rationale: יכל expresa capacidad. «No podemos» es la forma breve y natural en español, equivalente al sentido de incapacidad para intervenir.
- source_word: דַּבֵּר אֵלֶיךָ
  english_pob_choice: speak to you
  chosen_spanish: hablarte
  alternatives_spanish:
  - hablarte
  - decirte
  lexicon: HALOT
  rationale: El infinitivo con אֵלֶיךָ indica discurso dirigido al interlocutor. «Hablarte» conserva el verbo de habla sin introducir matices ajenos.
- source_word: רַע אוֹ טוֹב
  english_pob_choice: bad or good
  chosen_spanish: malo ni bueno
  alternatives_spanish:
  - malo ni bueno
  - bueno ni malo
  - malo o bueno
  lexicon: HALOT
  rationale: Se mantiene el par polar del hebreo como merismo. En español, «malo ni bueno» expresa que no pueden oponerse ni intervenir favorable o desfavorablemente; se evita una paráfrasis más explicativa dentro del texto principal.
theological_decisions:
- issue: Nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahvé
  - el SEÑOR
  rationale: El hebreo usa directamente el Tetragrámaton. Se mantiene la forma del nombre divino como «Yahvé» conforme a la convención del proyecto, evitando ocultarlo tras una sustitución devocional.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Idiomático 'bad or good'
  english_pob_reading: we cannot speak to you bad or good
  chosen_spanish_reading: no podemos hablarte malo ni bueno
  alternative_spanish_readings:
  - no podemos hablarte malo ni bueno
  - no podemos hablarte ni malo ni bueno
  - no podemos oponernos a ti
  rationale: El hebreo usa una pareja polar que expresa imposibilidad de intervenir o alterar el asunto decidido. Se conserva la tensión idiomática sin explicarla dentro del verso, para no borrar el color semántico del original.
  doctrine_reference: Notas léxicas de merismo y polaridad semítica
translation_notes:
  revision_awareness: La redacción española sigue de cerca el texto hebreo y el audit trail en inglés, pero adapta la sintaxis para sonar natural en español. Se evitó calcar «hablarte malo o bueno» porque en español resultaría más extraño que la forma hebrea; aun así, se conservó el merismo con la polaridad negativa «malo ni bueno», y se dejó la explicación en nota. También se optó por «la cosa» para reflejar el alcance amplio de הַדָּבָר sin restringirlo prematuramente a «asunto» o «cuestión».
  spanish_consistency_notes:
  - Se usa «Yahvé» como forma estable del nombre divino en el texto principal.
  - Se mantiene el doble verbo narrativo «respondieron y dijeron» por coherencia con la fórmula hebrea.
  - Se conserva el merismo hebreo en forma suficientemente transparente para lectores de español, con apoyo de nota.
  - No se introduce terminología eclesiástica tradicional que oscurezca la procedencia del texto.
