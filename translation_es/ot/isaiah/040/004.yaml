revisions:
- from: Todo valle[a] será elevado, y todo monte y collado será rebajado; lo escabroso[b] se volverá llano, y las alturas, llanura.
  to: Todo valle será elevado, y todo monte y colina serán rebajados; lo torcido[a] se volverá llano, y las crestas[b] se convertirán en llanura.
  rationale: La revisión corrige la ubicación de la nota textual para que corresponda al término hebreo correcto, refuerza la concreción topográfica de הָרְכָסִים con «crestas», mejora la naturalidad del español al explicitar el verbo final, y usa «colina» como opción más clara y ampliamente comprensible que «collado» sin perder la distinción con «monte».
  reviewer_model: gpt-5.4
