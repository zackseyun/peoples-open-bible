revisions:
- from: Pero en cuanto al sustento, al trabajo y al éxito de sus manos[a][b], pide fuerza a aquello que es lo más inactivo con sus manos.
  to: Pero en cuanto al sustento, al trabajo y al éxito de sus manos[b], pide fuerza a lo más inerte[a] con sus manos.
