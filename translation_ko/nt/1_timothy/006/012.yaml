id: 1TI.6.12
reference: 1 Timothy 6:12
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: ἀγωνίζου τὸν καλὸν ἀγῶνα τῆς πίστεως, ἐπιλαβοῦ τῆς αἰωνίου ζωῆς, εἰς ἣν ἐκλήθης καὶ ὡμολόγησας τὴν καλὴν ὁμολογίαν ἐνώπιον πολλῶν μαρτύρων.
base_translation:
  language: en
  yaml_path: translation/nt/1_timothy/006/012.yaml
  text: Fight the good fight of the faith[b][a]; take hold of the eternal life to which you were called and about which you made the good confession before many witnesses.
  footnotes:
  - marker: a
    text: Or 'Fight the good fight of faith.' The Greek phrase can be understood either as the struggle characterized by faith or as the struggle for the Christian faith.
    reason: alternative_reading
  - marker: b
    text: Or simply 'and you made the good confession before many witnesses.' The Greek does not explicitly state the content of the confession, though it is closely linked to the calling to eternal life.
    reason: alternative_reading
translation:
  language: ko
  text: 믿음의 선한 싸움을 싸우십시오[a]. 그대가 부르심을 받아 들어간 영생을 굳게 붙드십시오. 그대는 많은 증인 앞에서 그 선한 고백을 하였습니다[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 또는 「믿음으로 행하는 선한 싸움」. 헬라어 구문은 믿음으로 특징지어진 싸움 또는 그리스도교 신앙을 위한 싸움 두 가지로 이해될 수 있다.
    reason: alternative_reading
  - marker: b
    text: 또는 단순히 「많은 증인 앞에서 그대가 선한 고백을 하였다」. 헬라어 본문은 그 고백의 구체적 내용을 명시하지 않으나, 영생으로의 부르심과 긴밀히 결부되어 있다.
    reason: alternative_reading
lexical_decisions:
- source_word: ἀγωνίζου τὸν καλὸν ἀγῶνα τῆς πίστεως
  english_pob_choice: Fight the good fight of the faith
  chosen_korean: 믿음의 선한 싸움을 싸우십시오
  alternatives_korean:
  - 그 믿음의 선한 경기를 치르십시오
  - 신앙의 선한 분투를 행하십시오
  lexicon: BDAG
  rationale: 1:18 στρατεύῃ τὴν καλὴν στρατείαν와 동일 비유. 동족 어휘 결합(ἀγωνίζομαι + ἀγών)을 한국어 「싸움을 싸우다」 동족 결합으로 보존.
- source_word: ἐπιλαβοῦ τῆς αἰωνίου ζωῆς
  english_pob_choice: take hold of the eternal life
  chosen_korean: 영생을 굳게 붙드십시오
  alternatives_korean:
  - 영원한 생명을 붙잡으십시오
  lexicon: BDAG
  rationale: ἐπιλαμβάνομαι의 「굳게 붙듬」.
- source_word: εἰς ἣν ἐκλήθης
  english_pob_choice: to which you were called
  chosen_korean: 그대가 부르심을 받아 들어간
  alternatives_korean:
  - 그대가 부르심을 받은
  lexicon: BDAG
  rationale: εἰς의 방향성을 「들어간」으로 살려 영생에 「이르도록 부름받음」을 표현.
- source_word: ὡμολόγησας τὴν καλὴν ὁμολογίαν
  english_pob_choice: you made the good confession
  chosen_korean: 그 선한 고백을 하였습니다
  alternatives_korean:
  - 선한 신앙고백을 행하였습니다
  lexicon: BDAG
  rationale: 동족 어휘(ὁμολογέω + ὁμολογία)를 한국어 「고백을 하다」로 자연스럽게.
