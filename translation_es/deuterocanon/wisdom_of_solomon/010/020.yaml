review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien el sentido global del griego: inferencia causal, categorías morales genéricas (''los justos'' / ''los impíos''), botín tomado del enemigo vencido, alabanza cantada al nombre santo, y la metáfora de la mano divina que actúa a favor de su pueblo. Sin embargo, hay un desajuste importante con la terminología del proyecto en Κύριε: el borrador usa ''oh Señor'' donde la política por defecto exige ''Yahvé'' para el nombre divino en el texto principal, y la justificación dada no supera esa preferencia del proyecto. Además, la nota [b] está anclada a ''Señor'' aunque su contenido explica ''tu mano que pelea...'', por lo que el anclaje de la nota es incorrecto respecto del audit trail inglés.'
  spanish_quality_summary: El español es claro, natural y digno. 'Por eso', 'los justos', 'despojaron', 'cantaron alabanzas' y 'tu mano defensora' son legibles y fieles. 'Unánimes' funciona, aunque 'a una' o 'de común acuerdo' serían alternativas; no es necesario cambiarlo. El principal problema de calidad editorial es la nota mal anclada y la inconsistencia terminológica con el proyecto.
  glossary_alignment: Buena alineación en 'impíos', 'mano defensora' y preservación de la metáfora. Pero falla la directriz principal יהוה/YHWH -> 'Yahvé' en el texto español cuando κύριε funciona como tratamiento directo al Dios de Israel; aquí no hay motivo suficientemente documentado para mantener 'Señor' como excepción. También debe corregirse la ubicación de la nota [b] para que acompañe a 'mano defensora'.
  issues:
