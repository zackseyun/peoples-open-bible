translation:
  language: es
  text: Y todos sus fugitivos entre todas sus tropas caerán por la espada[a], y los que queden serán dispersados a todos los vientos. Entonces sabrán que yo, Yahvé[b], he hablado.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «sus fugitivos»; algunas versiones antiguas y traducciones entienden el término como «sus hombres escogidos» o similar.'
    reason: alternative_reading
  - marker: b
    text: Literalmente «sus alas», una imagen militar hebrea para divisiones o tropas.
    reason: lexical_alternative
lexical_decisions:
- source_word: מברחו
  english_pob_choice: his fugitives
  chosen_spanish: sus fugitivos
  alternatives_spanish:
  - sus fugitivos/escapados
  - sus hombres escogidos
  lexicon: HALOT
  rationale: La forma hebrea derivada de ברח comunica primariamente a los que huyen o buscan escapar. «Sus fugitivos» conserva ese valor léxico y sigue la decisión auditada en inglés, sin imponer la lectura alternativa de «hombres escogidos» que depende de versiones antiguas y del contexto militar.
- source_word: אֲגַפָּיו
  english_pob_choice: his troops
  chosen_spanish: sus tropas
  alternatives_spanish:
  - sus alas
  - sus bandas
  - sus compañías
  lexicon: HALOT
  rationale: El hebreo dice literalmente «sus alas», pero en contexto militar funciona como metáfora de divisiones o fuerzas. «Sus tropas» expresa la referencia militar con claridad en español y mantiene el sentido figurado reconocido por la POB inglesa.
- source_word: בַּחֶרֶב
  english_pob_choice: by the sword
  chosen_spanish: a espada
  alternatives_spanish:
  - por la espada
  - con la espada
  lexicon: HALOT
  rationale: En español bíblico contemporáneo, «caer a espada» comunica bien la idea idiomática de muerte violenta en combate. Se conserva el valor de instrumento/jucio del hebreo sin sonar forzado.
- source_word: הַנִּשְׁאָרִים
  english_pob_choice: those who remain
  chosen_spanish: los que queden
  alternatives_spanish:
  - los sobrevivientes
  - el remanente
  lexicon: HALOT
  rationale: El contexto es de juicio y dispersión, no de un «remanente» teológicamente cargado. «Los que queden» reproduce el valor simple de los que permanecen tras la caída, en línea con la cautela auditada en inglés.
- source_word: לְכָל רוּחַ
  english_pob_choice: to every wind
  chosen_spanish: a todo viento
  alternatives_spanish:
  - en toda dirección
  - a todos los vientos
  lexicon: HALOT
  rationale: La imagen hebrea es idiomática y vívida; «a todo viento» preserva esa metáfora de dispersión en todas direcciones. «En toda dirección» explicaría el sentido, pero perdería algo de la fuerza imagística del original.
- source_word: יִפָּרֵשׂוּ
  english_pob_choice: will be scattered
  chosen_spanish: serán dispersados
  alternatives_spanish:
  - serán esparcidos
  - se dispersarán
  lexicon: HALOT
  rationale: El nifal expresa dispersión pasiva. «Serán dispersados» mantiene la acción sufrida por el sujeto y corresponde bien al juicio anunciado.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahveh
  - SEÑOR
  lexicon: HALOT
  rationale: La POB distingue el nombre propio divino del título «Señor». En español se usa «Yahvé» como forma estable y reverente para el Tetragrámaton, preservando la decisión teológica de no sustituir el nombre por un título.
- source_word: דִּבַּרְתִּי
  english_pob_choice: have spoken
  chosen_spanish: he hablado
  alternatives_spanish:
  - he dicho
  - he declarado
  lexicon: HALOT
  rationale: «He hablado» conserva la fórmula profética solemne de declaración divina, equivalente natural en español y coherente con el registro de Ezequiel.
theological_decisions:
- issue: Tratamiento del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - Yahveh
  rationale: La política de la POB es transparentar el Tetragrámaton en lugar de ocultarlo bajo un sustituto. «Yahvé» mantiene esa visibilidad en español y evita perder la referencia al nombre covenantal de Dios.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Posible carga teológica de הַנִּשְׁאָרִים
  english_pob_reading: those who remain
  chosen_spanish_reading: los que queden
  alternative_spanish_readings:
  - los sobrevivientes
  - el remanente
  rationale: En esta profecía el énfasis es el destino judicial de los que quedan tras la caída. «El remanente» podría sugerir una lectura técnica positiva que el hebreo aquí no exige; por eso se prefiere una formulación neutral.
  doctrine_reference: DOCTRINE.md Translation philosophy §1, §3
- issue: Imagen de dispersión en לְכָל רוּחַ
  english_pob_reading: to every wind
  chosen_spanish_reading: a todo viento
  alternative_spanish_readings:
  - en toda dirección
  - a todos los vientos
  rationale: La metáfora mantiene su fuerza poética y profética en español sin necesidad de explicitarla. No se convierte en lenguaje puramente abstracto para no borrar la imagen bíblica.
  doctrine_reference: DOCTRINE.md Translation philosophy §2
translation_notes:
  revision_awareness: El contexto auditado en inglés fue de alta concordancia y la última revisión indicó que no se requerían cambios. La redacción española sigue esa lectura estable, trasladando las mismas decisiones léxicas y teológicas al español con equivalentes naturales y reverentes.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» para יְהוָה de forma consistente con el estándar del proyecto.
  - Se evitó «remanente» para no introducir una carga teológica no exigida por el contexto de juicio.
  - «Sus tropas» conserva la metáfora militar de «sus alas» sin calco opaco.
  - La puntuación y el orden sintáctico buscan una lectura publicable en español sin alejarse del hebreo.
