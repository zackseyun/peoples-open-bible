review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien el sentido básico del griego: conexión narrativa simple, grupo indefinido, gesto de levantarse, testimonio hostil contra Jesús, y la introducción al contenido de la acusación. También conserva adecuadamente el valor imperfectivo de ἐψευδομαρτύρουν con «daban».'
  spanish_quality_summary: 'El texto es claro y natural en español. Sin embargo, la nota al pie no preserva correctamente la alternativa documentada en el inglés: actualmente repite prácticamente la misma expresión del texto principal en vez de ofrecer la alternativa tradicional equivalente a «bearing false witness». Conviene ajustar esa nota para reflejar la distinción léxica real en español.'
  glossary_alignment: No hay conflictos con la terminología base del proyecto en este versículo. «Contra él» y «daban falso testimonio» son adecuados. La alternativa tradicional apropiada en español sería «daban falso testimonio/falso testimonio» solo si contrasta con otra opción, pero aquí para reproducir el matiz del inglés auditado es mejor «levantaban falso testimonio contra él» o «daban falso testimonio contra él» frente a un texto principal más explicativo. Dado que el texto principal ya usa «daban falso testimonio», la nota debe cambiar a una formulación tradicional distinta.
  issues:
  - severity: medium
    issue: La nota léxica alternativa no ofrece una verdadera alternativa.
    rationale: 'El inglés auditado conserva una alternativa tradicional: «were bearing false witness against him». La nota española actual dice «daban falso testimonio contra él», que es prácticamente idéntica al texto principal y no transmite la diferencia estilística/lexical preservada por la auditoría.'
  revised_spanish_text: 'Y algunos se pusieron de pie y daban falso testimonio contra él[a], diciendo:'
