  text: כִּ֤י הִנֵּ֪ה אָֽרְב֡וּ לְ/נַפְשִׁ֗/י יָג֣וּרוּ עָלַ֣/י עַזִ֑ים לֹא פִשְׁעִ֖/י וְ/לֹא חַטָּאתִ֣/י יְהוָֽה־־׃
base_translation:
  language: en
  yaml_path: translation/ot/psalms/059/004.yaml
  text: For behold[a], they lie in wait for my life; fierce men gather against me, though there is no transgression or sin of mine[c][b], O Yahweh.
  footnotes:
