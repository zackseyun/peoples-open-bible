translation:
  language: es
  text: Por tanto[a], si tienen necesidad, envíen a los que se los traerán a ustedes.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El griego transmitido presenta ἐὰν ... ἐὰν («si ... si»), probablemente una irregularidad textual o una dittografía; la traducción expresa el sentido previsto con una sola condicional.
    reason: textual_variant
lexical_decisions:
- source_word: ἐὰν οὖν ἐὰν χρείαν ἔχητε
  english_pob_choice: therefore, if you have need
  chosen_spanish: Por tanto, si tienen necesidad
  alternatives_spanish:
  - Así que, si necesitan
  - Por eso, si tienen necesidad
  lexicon: LSJ
  rationale: χρείαν ἔχειν expresa la idea idiomática de ‘tener necesidad’; en español, ‘tener necesidad’ mantiene esa estructura con naturalidad. Por tanto conserva el valor inferencial de οὖν, mientras que la repetición de ἐὰν se entiende como irregularidad textual y no se reproduce mecánicamente.
- source_word: τοὺς ἀποκομιούντας
  english_pob_choice: those who will bring them
  chosen_spanish: a los que se lo llevarán hasta ustedes
  alternatives_spanish:
  - a los que se lo traerán
  - a los que lo entregarán a ustedes
  lexicon: LSJ
  rationale: ἀποκομίζω aquí denota llevar o transportar algo de un lugar a otro; el contexto sugiere objetos previamente mencionados en las líneas anteriores. En español, ‘llevarán hasta ustedes’ conserva el movimiento hacia los destinatarios y evita una literalidad torpe.
- source_word: ὑμῖν
  english_pob_choice: to you
  chosen_spanish: hasta ustedes
  alternatives_spanish:
  - a ustedes
  - para ustedes
  lexicon: LSJ
  rationale: Con un verbo de traslado, el dativo se expresa naturalmente con dirección o destino. ‘Hasta ustedes’ refuerza el movimiento hacia el receptor sin añadir un matiz ajeno al texto.
- source_word: ἀποστείλατε
  english_pob_choice: send
  chosen_spanish: envíen
  alternatives_spanish:
  - manden
  - despachen
  lexicon: LSJ
  rationale: El imperativo aoristo pide una acción concreta y directa. ‘Envíen’ es claro, sobrio y adecuado al registro epistolar del pasaje.
translation_notes:
  revision_awareness: La redacción sigue el sentido revisado del inglés auditado (‘bring them to you’) y lo adapta al español con un verbo de traslado más natural (‘se lo llevarán hasta ustedes’), manteniendo el carácter condicional e inferencial del griego.
  spanish_consistency_notes:
  - Se conserva el tratamiento de segunda persona plural de cortesía (‘ustedes’) para armonizar con el registro epistolar.
  - No se introduce ‘Cristo’, ‘SEÑOR’ ni otras equivalencias doctrinales no presentes en el texto.
  - La nota textual se ancla en el marcador [a] junto a la cláusula inicial, donde recae la irregularidad del griego.
