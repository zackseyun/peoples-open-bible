translation:
  language: es
  text: Si las nubes están llenas de lluvia[a], la derraman sobre la tierra; y si un árbol cae al sur o al norte, en el lugar donde cae el árbol, allí quedará.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, más literalmente, «la derraman». El hebreo usa un verbo sencillo de «ser/estar» al final; «quedará» expresa de forma natural el estado de un árbol caído en español.
    reason: lexical_alternative
lexical_decisions:
- source_word: יִמָּלְאוּ / are full
  english_pob_choice: are full
  chosen_spanish: están llenas
  alternatives_spanish:
  - se llenan
  - están colmadas
  lexicon: HALOT
  rationale: El nifal de מלא expresa llegar a estar lleno o ser llenado. En español, «están llenas» conserva el estado resultante de las nubes y suena natural en una oración proverbial.
- source_word: הֶעָבִים / the clouds
  english_pob_choice: the clouds
  chosen_spanish: las nubes
  alternatives_spanish:
  - las nubies
  - las nubes del cielo
  lexicon: HALOT
  rationale: Término meteorológico directo y transparente; no requiere ajuste idiomático.
- source_word: גֶּשֶׁם / rain
  english_pob_choice: rain
  chosen_spanish: lluvia
  alternatives_spanish:
  - de lluvia
  - con lluvia
  lexicon: HALOT
  rationale: En español, «lluvia» funciona mejor que un giro como «de lluvia» dentro de la imagen de plenitud. Se mantiene el contenido de la sustancia que llena las nubes.
- source_word: יָרִיקוּ / pour it out
  english_pob_choice: pour it out
  chosen_spanish: la derraman
  alternatives_spanish:
  - la vacían
  - la vierten
  lexicon: HALOT
  rationale: El hifil de ריק tiene la idea de vaciar o derramar. «La derraman» conserva la imagen de descarga natural y en español permite explicitar el objeto implícito («la» = lluvia) sin forzar la sintaxis.
- source_word: עַל הָאָרֶץ / on the earth
  english_pob_choice: on the earth
  chosen_spanish: sobre la tierra
  alternatives_spanish:
  - sobre la הארץ
  - en la tierra
  lexicon: HALOT
  rationale: «Sobre la tierra» reproduce bien la preposición de caída/vertido y es una formulación bíblica clara en español, sin introducir un matiz más geográfico que el hebreo.
- source_word: יִפּוֹל עֵץ / a tree falls
  english_pob_choice: a tree falls
  chosen_spanish: un árbol cae
  alternatives_spanish:
  - un árbol se cae
  - cayere un árbol
  lexicon: HALOT
  rationale: El imperfecto proverbial se expresa de forma natural con presente en español. «Cae» mantiene la generalidad proverbial y la simpleza del hebreo.
- source_word: בַּדָּרוֹם / to the south
  english_pob_choice: to the south
  chosen_spanish: al sur
  alternatives_spanish:
  - hacia el sur
  - en el sur
  lexicon: HALOT
  rationale: La dirección con נפל se expresa naturalmente con «al sur».
- source_word: בַּצָּפוֹן / to the north
  english_pob_choice: to the north
  chosen_spanish: al norte
  alternatives_spanish:
  - hacia el norte
  - en el norte
  lexicon: HALOT
  rationale: Paralelo exacto de «al sur»; conserva la orientación direccional.
- source_word: מְקוֹם שֶׁיִּפּוֹל הָעֵץ / in the place where the tree falls
  english_pob_choice: in the place where the tree falls
  chosen_spanish: en el lugar donde cae el árbol
  alternatives_spanish:
  - donde cae el árbol
  - en el sitio donde cae el árbol
  lexicon: HALOT
  rationale: Se conserva el sustantivo «lugar» del hebreo, como en el inglés POB, para mantener la estructura sentenciosa y la observación concreta.
- source_word: שָׁם יְהוּא / there it will be
  english_pob_choice: there it will lie
  chosen_spanish: allí quedará
  alternatives_spanish:
  - allí será
  - allí permanecerá
  lexicon: HALOT
  rationale: El verbo hebreo es simplemente «ser/estar». En el contexto de un árbol caído, «quedará» comunica el estado resultante de manera natural en español, sin perder la tensión lexical documentada entre «ser» y la adaptación idiomática.
theological_decisions:
- issue: El verbo final hebreo es simplemente «ser/estar» (יְהוּא), mientras que el inglés POB opta por «will lie» por idiomática contextual.
  english_pob_reading: there it will lie
  chosen_spanish_reading: allí quedará
  alternative_spanish_readings:
  - allí estará
  - allí será
  rationale: No se traduce mecánicamente el verbo hebreo como «será», porque en español eso suena demasiado abstracto para un árbol caído. «Quedará» preserva el resultado duradero indicado por el contexto y deja visible, en la decisión léxica, que el hebreo subyacente es más simple.
  doctrine_reference: Eclesiastés 11:3; nota lexical del POB sobre יְהוּא
translation_notes:
  revision_awareness: 'Se siguió el estado más reciente del POB inglés sin cambios: la estructura condicional y la solución idiomática para el verbo final se mantienen, con adaptación natural al español y sin añadir explicaciones ajenas al verso.'
  spanish_consistency_notes:
  - Se usó «Yahvé» en lugar de formas de ocultamiento divino solo cuando corresponde; aquí no aparece el Nombre.
  - Se mantuvo «árbol» y «nubes» con registro bíblico claro, evitando arcaísmos innecesarios.
  - Se evitó «SEÑOR» y otras sustituciones no presentes en el hebreo de este versículo.
  - La puntuación refleja dos miembros condicionales paralelos, como en el hebreo.
