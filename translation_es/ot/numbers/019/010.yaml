translation:
  language: es
  text: Y el que recoge las cenizas de la novilla lavará su ropa, y quedará impuro hasta la tarde. Y esto será para los hijos de Israel[a] y para el forastero que habita entre ellos, como estatuto perpetuo[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «para los israelitas» / «para el pueblo de Israel». El hebreo dice «para los hijos de Israel», una expresión corporativa pactal.
    reason: lexical_alternative
  - marker: b
    text: O «como estatuto permanente».
    reason: lexical_alternative
lexical_decisions:
- source_word: הָאֹסֵף
  english_pob_choice: the one who gathers
  chosen_spanish: el que recoge
  alternatives_spanish:
  - el que junta
  - el recogedor
  lexicon: HALOT
  rationale: El participio con artículo funciona como sustantivo; en español, «el que recoge» conserva bien esa fuerza participial y suena natural en un contexto legal. «Recoge» expresa la acción concreta sin convertirla en una descripción demasiado técnica.
- source_word: אֵפֶר הַפָּרָה
  english_pob_choice: the ashes of the heifer
  chosen_spanish: las cenizas de la novilla
  alternatives_spanish:
  - las cenizas de la vaca
  - la ceniza de la novilla
  lexicon: HALOT
  rationale: אֵפֶר admite valor colectivo; «cenizas» comunica adecuadamente el material ritual en español. פָּרָה designa una hembra bovina; «novilla» preserva el rasgo específico mejor que «vaca», aunque el término puede ser algo más técnico. Mantengo el plural porque el material ritual se entiende naturalmente así en español.
- source_word: כִבֶּס ... אֶת בְּגָדָיו
  english_pob_choice: shall wash his clothes
  chosen_spanish: lavará sus vestidos
  alternatives_spanish:
  - lavará sus ropas
  - deberá lavar sus vestidos
  lexicon: HALOT
  rationale: En lenguaje sacerdotal, כִבֵּס se refiere al lavado de la vestimenta ritual o personal. «Vestidos» es una formulación bíblica digna y comprensible; «lavará sus ropas» sería más idiomático, pero «vestidos» mantiene mejor el registro legal tradicional sin caer en una calca pesada.
- source_word: וְטָמֵא
  english_pob_choice: and he shall be unclean
  chosen_spanish: quedará impuro
  alternatives_spanish:
  - será impuro
  - quedará ritualmente impuro
  lexicon: HALOT
  rationale: Tָמֵא expresa un estado ritual, no moral. «Quedará impuro» transmite el resultado legal del acto de contacto/servicio y evita una lectura ética indebida. «Ritualmente impuro» sería más explícito, pero el contexto ya fija el sentido.
- source_word: עַד הָעָרֶב
  english_pob_choice: until the evening
  chosen_spanish: hasta la tarde
  alternatives_spanish:
  - hasta el atardecer
  - hasta la noche
  lexicon: HALOT
  rationale: «La tarde» es una solución natural en español para el momento del día designado por el hebreo, sin forzar una equivalencia demasiado técnica. «Atardecer» puede sonar más preciso, pero «tarde» es más estable y sobrio en un texto legal.
- source_word: וְהָיְתָה
  english_pob_choice: this shall be
  chosen_spanish: Y esto será
  alternatives_spanish:
  - Y será
  - Y esto quedará
  lexicon: HALOT
  rationale: El verbo femenino singular se refiere al estatuto implícito en la norma precedente. «Esto» hace claro el referente en español, como en la decisión inglesa, y «será» preserva la formulación normativa.
- source_word: לִבְנֵי יִשְׂרָאֵל
  english_pob_choice: for the sons of Israel
  chosen_spanish: para los hijos de Israel
  alternatives_spanish:
  - para los israelitas
  - para el pueblo de Israel
  lexicon: HALOT
  rationale: Se conserva la expresión corporativa masculina del hebreo. «Hijos de Israel» es una fórmula bíblica bien asentada en español y preserva la forma del original sin neutralizarla.
- source_word: וְלַגֵּר הַגָּר בְּתוֹכָם
  english_pob_choice: and for the sojourner who sojourns among them
  chosen_spanish: y para el forastero que habita entre ellos
  alternatives_spanish:
  - y para el extranjero residente entre ellos
  - y para el forastero que mora entre ellos
  lexicon: HALOT
  rationale: גֵּר nombra al no nativo residente dentro de la comunidad; «forastero» comunica bien esa alteridad sin cargar el texto con asociaciones modernas de estatus legal ajenas al pasaje. הַגָּר se refleja con «que habita» para conservar la repetición del hebreo en un español natural.
- source_word: לְחֻקַּת עוֹלָם
  english_pob_choice: as a permanent statute
  chosen_spanish: como estatuto perpetuo
  alternatives_spanish:
  - como estatuto permanente
  - como ordenanza perpetua
  lexicon: HALOT
  rationale: חֻקָּה se refiere a una disposición normativa fija; «estatuto» es adecuado en español jurídico-bíblico. עוֹלָם en fórmulas legales suele indicar duración indefinida o perdurable; «perpetuo» preserva esa fuerza mejor que «permanente» en este registro.
theological_decisions:
- issue: Estado ritual de טָמֵא
  english_pob_reading: unclean
  chosen_spanish_reading: impuro
  alternative_spanish_readings:
  - ritualmente impuro
  - inmundo
  rationale: La norma trata de impureza ceremonial, no de corrupción moral. «Impuro» es fiel y claro en español; aunque «ritualmente impuro» explicita el matiz, la adición no es necesaria porque el contexto sacerdotal ya lo determina.
  doctrine_reference: 'Levítico/ Números: pureza ritual en la legislación sacerdotal'
- issue: Expresión corporativa בְּנֵי יִשְׂרָאֵל
  english_pob_reading: the sons of Israel
  chosen_spanish_reading: los hijos de Israel
  alternative_spanish_readings:
  - los israelitas
  - el pueblo de Israel
  rationale: Se mantiene la forma masculina plural del hebreo como expresión corporativa pactal. Esta decisión conserva la tensión documental entre forma y referente colectivo, en vez de sustituirla por una neutralización interpretativa.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4
- issue: Duración de לְחֻקַּת עוֹלָם
  english_pob_reading: as a permanent statute
  chosen_spanish_reading: como estatuto perpetuo
  alternative_spanish_readings:
  - como estatuto permanente
  - como estatuto para siempre
  rationale: עוֹלָם en fórmulas legales bíblicas denota permanencia dentro del marco del pacto. «Perpetuo» mantiene esa fuerza jurídica y litúrgica sin exagerar ni suavizar el alcance temporal.
  doctrine_reference: 'Éxodo/Números: fórmulas de estatuto perpetuo'
- issue: Traducción de גֵּר
  english_pob_reading: sojourner
  chosen_spanish_reading: forastero
  alternative_spanish_readings:
  - residente extranjero
  - extranjero residente
  rationale: El término designa a quien vive entre Israel sin ser miembro nativo del pueblo. «Forastero» conserva la idea de no pertenencia originaria, mientras que «que habita entre ellos» aclara su integración residencial.
  doctrine_reference: Levítico 19; Números 15:15-16
translation_notes:
  revision_awareness: 'Concordancia alta con el texto fuente y con el audit trail inglés. Se mantuvieron las decisiones clave: participio sustantivado en español, lenguaje de pureza ritual, expresión corporativa «hijos de Israel», y fórmula legal de estatuto duradero. No se identificaron revisiones previas aplicadas en el expediente, y esta versión sigue la lectura estable del pasaje.'
  spanish_consistency_notes:
  - Se mantuvo «impuro» como estado ritual, no moral.
  - Se conservó la expresión bíblica «hijos de Israel» para reflejar la forma hebrea.
  - «Forastero» se usó para גֵּר con una glosa interna («que habita entre ellos») para evitar ambigüedad.
  - «Estatuto perpetuo» preserva la fuerza jurídica de לְחֻקַּת עוֹלָם.
  - Se prefirió «novilla» para פָּרָה por precisión lexical en el rito de la novilla roja.
