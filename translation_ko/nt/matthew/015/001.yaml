id: MAT.15.1
reference: Matthew 15:1
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: Τότε προσέρχονται τῷ ⸀Ἰησοῦ ἀπὸ Ἱεροσολύμων ⸂Φαρισαῖοι καὶ γραμματεῖς⸃ λέγοντες
base_translation:
  language: en
  yaml_path: translation/nt/matthew/015/001.yaml
  text: 'Then Pharisees and scribes from Jerusalem come to Jesus[a], saying[b],'
translation:
  language: ko
  text: '그때에 예루살렘에서 온 바리새인들과 서기관들이 예수께 나아와 말합니다,'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: Τότε
  english_pob_choice: Then
  chosen_korean: 그때에
  alternatives_korean:
  - 그 무렵
  lexicon: BDAG
  rationale: 마태가 다음 장면을 도입하는 시간 담화 표지로 사용한다. 「그때에」가 자연스럽고 간결하게 서사 전환을 보존한다.
- source_word: προσέρχονται
  english_pob_choice: come to
  chosen_korean: 나아와
  alternatives_korean:
  - 다가와
  - 찾아와
  lexicon: BDAG
  rationale: 헬라어 역사적 현재시제. 「나아와」는 권위자에게 다가가는 동작의 격식을 보존하면서도 현대 한국어로 자연스럽다.
- source_word: τῷ Ἰησοῦ
  english_pob_choice: to Jesus
  chosen_korean: 예수께
  alternatives_korean:
  - 예수에게
  lexicon: BDAG
  rationale: 여격 + 예수의 이름. 한국어 경어 조사 「께」로 자연스럽게 옮긴다.
- source_word: ἀπὸ Ἱεροσολύμων
  english_pob_choice: from Jerusalem
  chosen_korean: 예루살렘에서 온
  alternatives_korean:
  - 예루살렘으로부터
  lexicon: BDAG
  rationale: ἀπό의 기원 의미를 한국어 관형절로 자연스럽게 옮긴다.
- source_word: Φαρισαῖοι
  english_pob_choice: Pharisees
  chosen_korean: 바리새인들
  lexicon: BDAG
  rationale: 한국어 성경 전통의 정착된 음역.
- source_word: γραμματεῖς
  english_pob_choice: scribes
  chosen_korean: 서기관들
  alternatives_korean:
  - 율법학자들
  lexicon: BDAG
  rationale: 「서기관」은 한국 성경 전통의 정착어로 율법 전문가를 가리킨다. 「율법학자」도 가능하나 본문의 어휘 형태를 더 직접 보존하기 위해 「서기관」을 채택한다.
- source_word: λέγοντες
  english_pob_choice: saying
  chosen_korean: 말합니다
  alternatives_korean:
  - 이르되
  - 말하기를
  lexicon: BDAG
  rationale: 다음 절의 직접화법을 도입하는 현재분사. 합쇼체 서사 현재형으로 자연스럽게 옮긴다.
