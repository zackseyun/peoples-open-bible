base_translation:
  language: en
  yaml_path: translation/ot/job/006/004.yaml
  text: For the arrows of the Almighty are in me[a]; my spirit drinks their poison[c][b]; the terrors of God array themselves against me.
  footnotes:
  - marker: a
    text: Or 'are with me.' The Hebrew preposition can be read more literally that way, but the context of arrows and poison suggests the sense 'are in me.'
    reason: lexical_alternative
  - marker: b
    text: Or 'their venom'; some take the noun more abstractly as 'their wrath.'
    reason: lexical_alternative
  - marker: c
    text: Literally 'set themselves in order against me,' a military image.
    reason: cultural_note
