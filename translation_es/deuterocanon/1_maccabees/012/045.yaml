base_translation:
  language: en
  yaml_path: translation/deuterocanon/1_maccabees/012/045.yaml
  text: And now send them to their homes[a], but choose for yourself a few men who will be with you; and come with me to Ptolemais, and I will hand it over to you, along with the rest of the strongholds and the large forces and all those in charge of affairs, and then I will depart after returning[b]; for this is why I have come.
  footnotes:
  - marker: a
    text: Or 'all the officials' for 'all those in charge of affairs'; the Greek literally refers to those set over the needs or business.
    reason: lexical_alternative
  - marker: b
    text: The clause 'I will depart after turning back' is somewhat compressed in Greek; it indicates that the speaker will first turn back/return and then leave, without specifying the destination.
    reason: lexical_alternative
