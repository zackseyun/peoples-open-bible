review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español conserva bien la estructura y el sentido general del hebreo: finalidad («para que»), longevidad en la tierra, juramento de Yahvé a los padres, promesa para ellos y su descendencia, y la fórmula de abundancia. Sin embargo, hay dos problemas de fidelidad idiomática y de apoyo documental: «sobre la tierra» suena menos natural aquí que «en la tierra» para territorio habitado, y «tierra que fluye leche y miel» omite la preposición esperable en español y no reproduce bien la locución establecida; además faltan las notas léxicas que el rastro inglés preserva para «padres» y «descendencia/simiente».'
  spanish_quality_summary: El texto es comprensible, pero presenta giros poco naturales para español bíblico contemporáneo. «Prolonguen sus días» es aceptable, aunque «vivan muchos días» o «tengan larga vida» sería más idiomático; no obstante, puede mantenerse por cercanía formal. En cambio, «tierra que fluye leche y miel» resulta deficiente; «tierra que fluye con leche y miel» sería posible, pero la formulación española bíblica más clara y digna es «tierra que mana leche y miel». También conviene añadir «una» en la aposición final para mejorar la fluidez.
  glossary_alignment: Se mantiene correctamente «Yahvé» para יְהוָה. «Padres» respeta לַאֲבֹתֵיכֶם y debe conservarse con nota alternativa «antepasados». «Descendencia» es una buena opción para זֶרַע, con nota alternativa «simiente» para preservar la alternativa documentada por el POB inglés. No hay conflictos teológicos mayores.
  issues:
  - severity: medium
    issue: 'Expresión poco natural: «sobre la tierra»'
    rationale: Aunque refleja literalmente עַל, en Deuteronomio referido al territorio prometido el español natural y claro suele ser «en la tierra». La fidelidad semántica mejora al evitar un calco extraño.
  - severity: high
    issue: 'Frase deficiente: «tierra que fluye leche y miel»'
    rationale: En español falta una construcción idiomática adecuada. La fórmula bíblica establecida es «tierra que mana leche y miel», que reproduce el sentido de abundancia sin sonar antinatural.
  - severity: medium
    issue: Faltan notas léxicas para «padres» y «descendencia»
    rationale: El audit trail inglés preserva alternativas significativas para לַאֲבֹתֵיכֶם y זַרְעָם. Deben mantenerse en español con marcadores anclados en el texto.
  - severity: low
    issue: 'Aposición final sin artículo: «tierra»'
    rationale: «Una tierra que mana leche y miel» fluye mejor en español como aposición explicativa tras la cláusula previa.
