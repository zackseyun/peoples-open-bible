    text: 'Hebreo: «ha entregado a sus enemigos, Moab, en manos de ustedes»; «Moab» funciona en aposición con «sus enemigos».'
    reason: lexical_alternative
  - marker: c
    text: 'O: «los lugares de paso del Jordán hacia Moab».'
    reason: lexical_alternative
  revision_rationale: 'Se corrigen dos problemas menores pero reales de español y de presentación del sentido fuente: «les dijo» sustituye la construcción poco natural «le dijo a ellos», y se reordena la frase verbal para que la aposición «sus enemigos, Moab» quede clara y fluida en español. Se conservan «Yahvé», «vados», «hacia Moab» y las notas, porque siguen razonablemente el expediente léxico y la ambigüedad documentada.'
