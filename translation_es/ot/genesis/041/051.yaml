translation:
  language: es
  text: José llamó al primogénito Manasés[a], porque Dios me ha hecho olvidar toda mi penuria[b] y toda la casa de mi padre[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Manasés suena al hebreo relacionado con 'hacer olvidar' o 'causar olvido'.
    reason: lexical_alternative
  - marker: b
    text: O 'todo mi sufrimiento' / 'toda mi fatiga' para 'toda mi penuria'.
    reason: lexical_alternative
  - marker: c
    text: '''La casa de mi padre'' es una expresión hebrea para la familia o el hogar paterno.'
    reason: cultural_note
lexical_decisions:
- source_word: וַיִּקְרָא
  english_pob_choice: called
  chosen_spanish: llamó
  alternatives_spanish:
  - nombró
  - llamó al nombre de
  lexicon: HALOT
  rationale: El verbo קרא con 'nombre' introduce el acto de dar nombre; en español, 'llamó' expresa de forma natural ese gesto y conserva la relación con el nombre dado.
- source_word: אֶת שֵׁם הַבְּכוֹר
  english_pob_choice: the name of the firstborn
  chosen_spanish: el nombre del primogénito
  alternatives_spanish:
  - el nombre de su primogénito
  - a su primogénito
  lexicon: HALOT
  rationale: Se conserva la construcción de 'nombre' más 'primogénito' para reflejar el énfasis del hebreo en la designación del hijo mayor, sin volverla innecesariamente rígida.
- source_word: מְנַשֶּׁה
  english_pob_choice: Manasseh
  chosen_spanish: Manasés
  alternatives_spanish:
  - Manasé
  lexicon: HALOT
  rationale: Nombre propio transmitido por la forma española usual. La ortografía 'Manasés' es la más reconocible y establecida en español bíblico.
- source_word: נַשַּׁנִי
  english_pob_choice: has made me forget
  chosen_spanish: me ha hecho olvidar
  alternatives_spanish:
  - me ha causado olvidar
  - me ha hecho olvidar del todo
  lexicon: HALOT
  rationale: El verbo causativo de la raíz נשׁה se vierte con naturalidad como 'me ha hecho olvidar', manteniendo el vínculo con el nombre Manasés y la explicación del relato.
- source_word: אֱלֹהִים
  english_pob_choice: God
  chosen_spanish: Dios
  alternatives_spanish:
  - el Dios
  lexicon: HALOT
  rationale: Aquí אֱלֹהִים funciona con sentido singular y se traduce de manera directa por 'Dios', como en el texto inglés y conforme al contexto.
- source_word: כָּל עֲמָלִי
  english_pob_choice: all my hardship
  chosen_spanish: todo mi trabajo
  alternatives_spanish:
  - toda mi aflicción
  - todo mi padecer
  - toda mi fatiga
  lexicon: HALOT
  rationale: עָמָל abarca esfuerzo, fatiga y penuria. En español, 'trabajo' comunica bien la carga y el esfuerzo sufridos, aunque no agota la posible dureza del término; se preserva así la amplitud semántica sin sonar forzado.
- source_word: וְאֵת כָּל בֵּית אָבִי
  english_pob_choice: and all my father’s house
  chosen_spanish: y toda la casa de mi padre
  alternatives_spanish:
  - y toda la familia de mi padre
  - y todo el hogar de mi padre
  lexicon: HALOT
  rationale: Se mantiene la expresión hebrea 'casa de mi padre' para conservar su valor de parentesco y hogar familiar, en lugar de sustituirla por una explicación más interpretativa.
theological_decisions:
- issue: Posible tensión en 'olvidar' la casa de su padre
  english_pob_reading: Render the statement straightforwardly as Joseph's own explanation of the name, without softening or theological harmonization.
  chosen_spanish_reading: Traducir la afirmación de manera directa, sin suavizarla ni convertirla en una paráfrasis interpretativa.
  alternative_spanish_readings:
  - Dios me ha aliviado del dolor ligado a la casa de mi padre
  - Dios ha hecho que el recuerdo de la casa de mi padre se desdibuje
  rationale: El hebreo presenta con claridad que Dios hizo a José olvidar 'todo mi trabajo y toda la casa de mi padre'. La versión española conserva esa tensión narrativa y no la resuelve artificialmente.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: No se aplicaron revisiones en la última pasada; el borrador mantiene el consenso alto del control cruzado y conserva la tensión semántica y teológica señalada en el audit trail.
  spanish_consistency_notes:
  - Se usa 'Dios' para אֱלֹהִים en sentido singular, coherente con el contexto narrativo.
  - Se conserva 'casa de mi padre' como hebraísmo explicable, en lugar de sustituirlo por una equivalencia más interpretativa.
  - El nombre propio aparece como 'Manasés', forma estándar y legible en español bíblico.
  - La puntuación y la colocación de comillas siguen un registro bíblico moderno y publicable.
