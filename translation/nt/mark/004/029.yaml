theological_decisions:
- issue: Metaphorical readiness of the crop in a kingdom parable
  chosen_reading: Render παραδοῖ in a way that preserves the image of the crop becoming ready without over-interpreting the parable's theological referent.
  alternative_readings:
  - translate more interpretively as 'is ripe'
  - translate more literally as 'hands itself over'
  rationale: The verse is part of a parable about the kingdom's growth. The translation should preserve the agricultural metaphor and not force a specific theological explanation (judgment, mission, consummation) into the wording. 'Permits it' keeps the metaphorical tension and unusual Greek expression visible.
  doctrine_reference: Preserve theological tension rather than resolve it.
