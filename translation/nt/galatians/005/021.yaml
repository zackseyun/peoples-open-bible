  alternative_readings:
  - those who do such things
  - those who keep doing such things
  rationale: The present participle in a vice-list warning most naturally denotes characteristic practice. This preserves the text's moral seriousness without importing a doctrinal claim about every single lapse.
  doctrine_reference: Preserve theological tension rather than resolve it.
