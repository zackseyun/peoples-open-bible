translation:
  language: es
  text: Y habrá suficiente leche de cabras para tu alimento, para el alimento de tu hogar[b], y sustento[a] para tus sirvientas.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «y vida para tus sirvientas». El hebreo literalmente dice «y vidas/vida para tus jóvenes mujeres/sirvientas», usando «vida» en el sentido de lo que sostiene la vida.
    reason: lexical_alternative
  - marker: b
    text: Hebreo «pan» en ambos lugares, probablemente con el sentido más amplio de alimento o provisión, no solo pan literal.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְדֵי
  english_pob_choice: And there will be enough
  chosen_spanish: Y habrá suficiente
  alternatives_spanish:
  - Y bastará
  - Y habrá bastante
  lexicon: HALOT
  rationale: דַּי expresa suficiencia. En español, «habrá suficiente» comunica con naturalidad la idea de abundancia suficiente sin introducir una paráfrasis más amplia que el hebreo.
- source_word: חֲלֵב עִזִּים
  english_pob_choice: goats’ milk
  chosen_spanish: leche de cabras
  alternatives_spanish:
  - leche de cabra
  - leche de cabras
  lexicon: HALOT
  rationale: El hebreo especifica leche procedente de cabras. «Leche de cabras» conserva esa relación de procedencia y suena natural en español; «leche de cabra» también es posible, pero la forma plural refleja mejor el plural hebreo עִזִּים.
- source_word: לְלַחְמְךָ
  english_pob_choice: for your food
  chosen_spanish: para tu alimento
  alternatives_spanish:
  - para tu pan
  - para tu comida
  - para tu sustento
  lexicon: HALOT
  rationale: לֶחֶם puede significar «pan» literalmente, pero aquí funciona de modo amplio como provisión alimentaria. «Alimento» preserva ese alcance sin restringirlo a pan solamente.
- source_word: לְלֶחֶם בֵּיתֶךָ
  english_pob_choice: for the food of your household
  chosen_spanish: para el alimento de tu casa
  alternatives_spanish:
  - para el pan de tu casa
  - para el alimento de tu hogar
  - para la provisión de tu casa
  lexicon: HALOT
  rationale: Aquí בַּיִת refiere a la casa como unidad doméstica. «Tu casa» mantiene el paralelismo con el hebreo, y «alimento» reproduce el valor amplio de לֶחֶם como provisión.
- source_word: וְחַיִּים
  english_pob_choice: and sustenance
  chosen_spanish: y sustento
  alternatives_spanish:
  - y vida
  - y sustento vital
  - y alimento
  lexicon: HALOT
  rationale: חַיִּים literalmente es «vidas/vida», pero en este contexto de provisión denota aquello que mantiene la vida. «Sustento» conserva la fuerza práctica sin borrar la tensión semántica de «vida».
- source_word: לְנַעֲרוֹתֶיךָ
  english_pob_choice: for your servant girls
  chosen_spanish: para tus siervas
  alternatives_spanish:
  - para tus servidoras
  - para tus muchachas
  - para tus jóvenes mujeres
  lexicon: HALOT
  rationale: נַעֲרָה puede significar joven mujer o sirvienta según el contexto. En una lista doméstica de provisión, «siervas» mantiene la función servil y evita neutralizar indebidamente el matiz social del hebreo.
theological_decisions:
- issue: Sentido de חַיִּים como «vida» frente a «sustento»
  english_pob_reading: and sustenance
  chosen_spanish_reading: y sustento
  alternative_spanish_readings:
  - y vida
  - y alimento
  rationale: 'La línea hebrea usa «vida» en un sentido metonímico: lo que sostiene la vida. Traducirlo como «sustento» hace explícita esa función sin eliminar la imagen original. No se trata de una afirmación doctrinal distinta, sino de cómo expresar la provisión doméstica.'
  doctrine_reference: Prov. 27:27; uso semántico de חַיִּים en contextos de provisión
- issue: Alcance de לֶחֶם como comida/provisión, no solo pan
  english_pob_reading: for your food / for the food of your household
  chosen_spanish_reading: para tu alimento / para el alimento de tu casa
  alternative_spanish_readings:
  - para tu pan / para el pan de tu casa
  - para tu comida / para la comida de tu casa
  rationale: El hebreo repite לֶחֶם en una estructura de provisión. En español, «alimento» comunica mejor el sentido amplio de provisión alimentaria sin restringirlo a pan literal. Esto conserva la decisión auditada de la POB inglesa.
  doctrine_reference: Prov. 27:27; léxico de לֶחֶם
- issue: Referencia social de נַעֲרוֹתֶיךָ
  english_pob_reading: your servant girls
  chosen_spanish_reading: tus siervas
  alternative_spanish_readings:
  - tus muchachas
  - tus jóvenes mujeres
  - tus servidoras
  rationale: El hebreo permite varias lecturas, pero el contexto de bienes domésticos favorece dependientes femeninas dentro de la casa. «Siervas» mantiene el matiz funcional y no suaviza el aspecto social que el texto presenta.
  doctrine_reference: Prov. 27:27; léxico de נַעֲרָה
translation_notes:
  revision_awareness: 'El texto sigue de cerca el audit trail inglés: conserva la idea de suficiencia, el valor amplio de לֶחֶם como provisión, y la lectura de חַיִּים como sustento. Se ajustó el registro al español bíblico moderno y se mantuvo la ambigüedad semántica donde el hebreo la tiene, especialmente en ‘siervas’ y en la nota sobre ‘pan/alimento’.'
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando el hebreo contiene el nombre divino; este versículo no lo incluye.
  - Se mantuvo un tono sobrio y bíblico, evitando «hogar» en favor de «casa» por la correspondencia más directa con בַּיִת.
  - «Suficiente» y «sustento» preservan la estructura de provisión doméstica del proverbio sin sobreinterpretar el verso.
