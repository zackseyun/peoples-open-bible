    text: Or, 'the firstborn according to his birth order and the youngest according to his youthfulness.' The Hebrew pairs firstborn status and youth in describing the seating arrangement.
    reason: lexical_alternative
  - marker: b
    text: Or, 'the men marveled at one another.' The Hebrew verb denotes astonishment; the translation makes explicit the reciprocal reaction implied by 'each to his companion.'
