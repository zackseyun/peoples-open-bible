    reason: lexical_alternative
  - marker: b
    text: O 'por su abdomen'. El hebreo se refiere de manera específica al vientre o cavidad abdominal.
    reason: lexical_alternative
  - marker: c
    text: 'Hebreo: ''los hijos de Israel'', expresión pactual masculina estándar para el pueblo de Israel.'
    reason: lexical_alternative
  revision_rationale: Se corrigió la última cláusula para expresar fielmente el sentido de מֵעַל ('de sobre') y evitar una lectura engañosa en español. También se ajustó la colocación del marcador de nota [a] para no interrumpir artificialmente la frase. Se mantuvieron 'cuarto', 'atravesó', 'vientre' e 'hijos de Israel' por ser aceptables y alineados con las decisiones documentadas.
