review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien el griego y el rastro inglés en los elementos principales: πεσόντες = acción física previa de reverencia, προσεκύνησαν = adoración dirigida a Dios, ἐβόησαν = clamor, λέγοντες = introducción a la cita siguiente. Sin embargo, hay una discordancia gramatical importante: el sujeto colectivo singular «el pueblo» se combina con verbos en singular («cayó», «adoró») y luego con plural («clamaron»), cuando el griego usa formas plurales con sujeto colectivo. En español, para mantener naturalidad y coherencia, conviene pluralizar los verbos.'
  spanish_quality_summary: 'La frase es clara y digna, pero la mezcla de número verbal suena descuidada. «Cayó de rodillas» es idiomático, aunque «de rodillas» añade una especificación no explícita en el griego; aun así, sigue dentro del campo semántico de reverencia. Para una reparación mínima y más fiel al patrón verbal del original, basta ajustar los verbos a plural: «cayeron ... adoraron ... clamaron».'
  glossary_alignment: 'No hay conflictos con la terminología base del proyecto: θεῷ se vierte correctamente como «Dios»; no aparecen YHWH, Mesías/Cristo, Espíritu, esclavo, etc. «Adoraron» refleja adecuadamente προσεκύνησαν en contexto religioso.'
  issues:
  - severity: medium
    issue: Discordancia de número verbal con «el pueblo»
    rationale: El borrador dice «el pueblo cayó ... adoró ..., y clamaron». Esta mezcla de singular y plural es poco natural en español y no refleja bien que el griego usa verbos plurales con ὁ λαός entendido colectivamente.
  - severity: low
    issue: Ligera explicitación en «de rodillas»
    rationale: πεσόντες significa «habiendo caído / cayendo / postrándose»; «de rodillas» no está explícito en el texto griego. No es una distorsión grave, pero conviene conservarlo solo si se busca idiomaticidad. Puede mantenerse en una revisión mínima.
  revised_spanish_text: Y el pueblo cayeron de rodillas y adoraron a Dios, y clamaron diciendo,
  revision_rationale: Se corrige la inconsistencia verbal pasando a plural los verbos principales para concordar con el valor colectivo de «el pueblo» y con las formas plurales del griego. No se requieren notas.
