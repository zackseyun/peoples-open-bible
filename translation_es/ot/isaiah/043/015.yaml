review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura y el sentido del hebreo: אֲנִי enfático como «Yo soy», יְהוָה como «Yahvé», y los tres títulos en aposición («tu Santo / el Creador de Israel / tu Rey»). Sin embargo, el uso de «tu» no preserva con naturalidad ni precisión el sufijo plural 2mp en un discurso dirigido a Israel/pueblo; en español bíblico neutral conviene «su» para referente colectivo o «de ustedes», y aquí «su» suena más digno y fluido.'
  spanish_quality_summary: La redacción es clara y digna, pero «tu Santo... tu Rey» suena innecesariamente singular e individualizante. «Su Santo... su Rey» mejora la legibilidad eclesial y representa mejor al destinatario colectivo sin forzar «de ustedes». También la nota al pie actual es impropia, porque presenta «Yahvé» como lectura alternativa cuando en realidad es la lectura principal; debe reformularse como nota explicativa del nombre divino.
  glossary_alignment: 'Alineado en lo principal con el glosario del proyecto: יְהוָה → «Yahvé», בּוֹרֵא → «Creador», y capitalización de títulos divinos. La única desalineación relevante es el tratamiento del sufijo plural en קְדוֹשְׁכֶם y מַלְכְּכֶם, donde «tu» no refleja bien el plural del hebreo.'
  issues:
  - severity: medium
    issue: Pronombre posesivo singular «tu» para sufijos hebreos plurales
    rationale: Tanto קְדוֹשְׁכֶם como מַלְכְּכֶם llevan sufijo 2mp. Aunque Israel puede tratarse como entidad colectiva, «tu Santo... tu Rey» en español tiende a oírse como singular individual. «Su Santo... su Rey» conserva mejor el referente colectivo con buena naturalidad.
  - severity: medium
    issue: Nota al pie mal formulada como si «Yahvé» fuera alternativa
    rationale: El texto principal ya usa «Yahvé» conforme al proyecto. La nota «O «Yahvé»» no aporta una alternativa real y resulta incoherente. Debe convertirse en nota explicativa sobre el Tetragrámaton.
  revised_spanish_text: Yo soy Yahvé[a], su Santo, el Creador de Israel, su Rey.
  revised_footnotes:
  - marker: a
    text: 'Hebreo: «Yahvé», el nombre divino יְהוָה.'
    reason: lexical_explanation
  revision_rationale: Se ajusta el posesivo a «su» para representar mejor los sufijos plurales hebreos en referencia al pueblo de Israel, manteniendo un español natural y digno. También se corrige la nota al pie para que explique el nombre divino en lugar de presentar erróneamente «Yahvé» como lectura alternativa.
