translation:
  language: es
  text: Ajaz reunió los utensilios de la casa de Dios e hizo pedazos los utensilios de la casa de Dios[a], cerró las puertas de la casa de Yahvé y se hizo altares en cada esquina de Jerusalén.
  philosophy: formal
  footnotes:
  - marker: a
    text: 'O: «cortó en pedazos los utensilios de la casa de Dios».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֶּאֱסֹף
  english_pob_choice: gathered
  chosen_spanish: reunió
  alternatives_spanish:
  - juntó
  - recogió
  lexicon: HALOT
  rationale: El verbo hebreo expresa reunir o juntar objetos; «reunió» conserva la acción concreta y funciona con naturalidad en español bíblico moderno.
- source_word: כְּלֵי בֵית הָאֱלֹהִים
  english_pob_choice: the vessels of the house of God
  chosen_spanish: los utensilios de la casa de Dios
  alternatives_spanish:
  - los vasos de la casa de Dios
  - los artículos de la casa de Dios
  lexicon: HALOT
  rationale: כְּלִי es amplio y puede referirse a utensilios u objetos de servicio. «Utensilios» comunica bien la referencia cultual sin forzar «vasos», que en español suena más restringido.
- source_word: וַיְקַצֵּץ
  english_pob_choice: cut in pieces
  chosen_spanish: los cortó en piezas
  alternatives_spanish:
  - los partió en piezas
  - los cortó en trozos
  lexicon: HALOT
  rationale: La forma intensiva comunica una acción violenta de cortar en partes. «Los cortó en piezas» preserva esa fuerza sin sonar demasiado coloquial.
- source_word: וַיִּסְגֹּר אֶת דַּלְתוֹת
  english_pob_choice: shut the doors
  chosen_spanish: cerró las puertas
  alternatives_spanish:
  - cerró de golpe las puertas
  - tapó las puertas
  lexicon: HALOT
  rationale: סגר significa cerrar o encerrar. «Cerró las puertas» es fiel y claro; «shut» no exige añadir la dureza de «de golpe».
- source_word: בֵּית יְהוָה
  english_pob_choice: the house of Yahweh
  chosen_spanish: la casa de Yahvé
  alternatives_spanish:
  - el templo de Yahvé
  - la casa del Señor
  lexicon: HALOT
  rationale: Se mantiene la terminología del proyecto para יְהוָה como «Yahvé». «Casa» reproduce el hebreo בית sin sustituirlo por «templo», que es más interpretativo.
- source_word: וַיַּעַשׂ ל֧וֹ
  english_pob_choice: made for himself
  chosen_spanish: se hizo
  alternatives_spanish:
  - hizo para sí
  - se construyó
  lexicon: HALOT
  rationale: El pronombre לוֹ señala beneficio o apropiación personal. «Se hizo» recoge bien el matiz reflexivo y evita una paráfrasis más larga.
- source_word: מִזְבְּח֛וֹת
  english_pob_choice: altars
  chosen_spanish: altares
  alternatives_spanish:
  - lugares de sacrificio
  lexicon: HALOT
  rationale: Término estándar en español para מזבחות; mantiene la referencia al culto ilícito sin necesidad de explicación adicional en el texto.
- source_word: בְּכָל פִּנָּה
  english_pob_choice: in every corner
  chosen_spanish: en cada esquina
  alternatives_spanish:
  - en todo rincón
  - en cada rincón
  lexicon: HALOT
  rationale: פִּנָּה es literalmente «esquina» o «rincón». «En cada esquina» conserva la imagen espacial amplia y resulta idiomático en español.
- source_word: בִּירוּשָׁלִָם
  english_pob_choice: of Jerusalem
  chosen_spanish: de Jerusalén
  alternatives_spanish:
  - en Jerusalén
  lexicon: HALOT
  rationale: Con «cada esquina», el español natural es «de Jerusalén» para expresar la extensión por toda la ciudad.
theological_decisions:
- issue: Renderización del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - el Señor
  rationale: El proyecto español usa «Yahvé» para el Tetragrámaton. Esto preserva el nombre pactual divino y evita la sustitución por un título genérico.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Relación entre la acción de cortar y la destrucción de los utensilios sagrados
  english_pob_reading: cut in pieces
  chosen_spanish_reading: los cortó en piezas
  alternative_spanish_readings:
  - los partió
  - los destruyó
  rationale: El hebreo implica una destrucción violenta por corte, no mera desinstalación. «Los cortó en piezas» mantiene la tensión verbal y evita suavizar el acto.
  doctrine_reference: DOCTRINE.md Translation philosophy §1, §5
translation_notes:
  revision_awareness: La redacción sigue la revisión del inglés POB que precisó el verbo como «cut in pieces». En español se conservó esa precisión con una construcción verbal directa y formal, manteniendo también la distinción entre «casa de Dios» y «casa de Yahvé» según aparecen en el hebreo.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» para יְהוָה, conforme al criterio del proyecto.
  - Se evitó «templo» para בֵּית, preservando «casa» como reflejo más cercano del hebreo.
  - «Utensilios» se eligió por amplitud semántica y porque encaja mejor que «vasos» con objetos del culto.
  - La puntuación separa las dos acciones principales con punto y coma, reflejando la sucesión narrativa del hebreo.
