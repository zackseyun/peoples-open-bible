revisions:
- from: Porque no he habitado en una casa desde el día en que saqué a los hijos de Israel de Egipto hasta hoy; sino que he andado en una tienda y en un tabernáculo.
  to: Porque no he habitado en una casa desde el día en que saqué a los hijos de Israel de Egipto hasta hoy, sino que he estado moviéndome en una tienda y en un tabernáculo.
  rationale: Se ajusta 'he andado' a 'he estado moviéndome' para reflejar mejor el valor continuo e itinerante de וָאֶהְיֶה מִתְהַלֵּךְ en contraste con 'habitar en una casa'. Se suaviza también la puntuación para una lectura más natural sin alterar el sentido. El resto del borrador es fiel al hebreo y a las decisiones léxicas documentadas.
