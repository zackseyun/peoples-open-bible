translation:
  language: es
  text: Tal como está escrito en la Ley de Moisés, toda esta calamidad[a] ha venido sobre nosotros, y no hemos buscado el favor de Yahvé nuestro Dios, apartándonos de nuestras iniquidades y adquiriendo entendimiento en tu verdad[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'todo este desastre' o 'todo este mal'. El término hebreo puede expresar calamidad o desastre en contexto de juicio.
    reason: lexical_alternative
  - marker: b
    text: También puede entenderse como 'por tu verdad' o 'en tu fidelidad'. El hebreo permite matices de verdad, fidelidad o medio por el cual se llega al entendimiento.
    reason: lexical_alternative
lexical_decisions:
- source_word: כַּאֲשֶׁר כָּתוּב
  english_pob_choice: Just as it is written
  chosen_spanish: Tal como está escrito
  alternatives_spanish:
  - Como está escrito
  - Así como está escrito
  lexicon: HALOT
  rationale: Expresa la correspondencia con lo ya escrito sin sonar rígido; 'tal como' conserva bien la fuerza comparativa del hebreo.
- source_word: בְּתוֹרַת מֹשֶׁה
  english_pob_choice: in the Law of Moses
  chosen_spanish: en la Ley de Moisés
  alternatives_spanish:
  - en la instrucción de Moisés
  - en la ley de Moisés
  lexicon: HALOT
  rationale: En este contexto torá es el cuerpo normativo mosaico; 'Ley de Moisés' es claro y fiel al uso jurídico-covenantal.
- source_word: הָרָעָה הַזֹּאת
  english_pob_choice: all this calamity
  chosen_spanish: todo este calamidad
  alternatives_spanish:
  - toda esta calamidad
  - todo este desastre
  - todo este mal
  lexicon: HALOT
  rationale: El término denota desastre/juicio, no mal moral. La forma más natural en español es 'toda esta calamidad'; la redacción principal quedó corregida conceptualmente en torno a calamidad como sentido léxico.
- source_word: בָּאָה עָלֵינוּ
  english_pob_choice: has come upon us
  chosen_spanish: ha venido sobre nosotros
  alternatives_spanish:
  - ha venido encima de nosotros
  - nos ha sobrevenido
  lexicon: HALOT
  rationale: '''Venir sobre'' reproduce el modismo de juicio que cae sobre el pueblo y suena natural en español bíblico contemporáneo.'
- source_word: וְלֹא חִלִּינוּ אֶת פְּנֵי
  english_pob_choice: yet we have not sought the favor of
  chosen_spanish: y no hemos buscado el favor de
  alternatives_spanish:
  - y no hemos implorado la presencia de
  - y no hemos suplicado el favor de
  lexicon: HALOT
  rationale: La idiomática hebrea 'entretener el rostro' se vierte de manera clara como buscar favor; preserva el sentido relacional sin calcado opaco.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  lexicon: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
  rationale: Se sigue el estándar español del proyecto para el nombre divino; 'Yahvé' mantiene la convención bíblica hispana sin ocultar el Tetragrámaton.
- source_word: אֱלֹהֵינוּ
  english_pob_choice: our God
  chosen_spanish: nuestro Dios
  alternatives_spanish:
  - nuestro Dios
  lexicon: HALOT
  rationale: Designación pactual directa, conservada con el posesivo de primera persona plural.
- source_word: לָשׁוּב מֵעֲוֺנֵנוּ
  english_pob_choice: by turning from our iniquities
  chosen_spanish: volviéndonos de nuestras iniquidades
  alternatives_spanish:
  - al volvernos de nuestras iniquidades
  - apartándonos de nuestras iniquidades
  - volviendo de nuestros pecados
  lexicon: HALOT
  rationale: El infinitivo expresa el medio de buscar el favor divino; 'volverse de' conserva la imagen de apartamiento moral. 'Iniquidades' preserva el peso moral de עָוֹן.
- source_word: וּלְהַשְׂכִּיל
  english_pob_choice: and by gaining insight
  chosen_spanish: y adquiriendo entendimiento
  alternatives_spanish:
  - y obteniendo entendimiento
  - y obrando con prudencia
  - y teniendo discernimiento
  lexicon: HALOT
  rationale: El causativo de שׂכל aquí apunta a entendimiento prudente/moral; 'adquiriendo entendimiento' es idiomático y mantiene la idea de comprensión reflexiva.
- source_word: בַּאֲמִתֶּךָ
  english_pob_choice: in your truth
  chosen_spanish: en tu verdad
  alternatives_spanish:
  - por tu verdad
  - con tu verdad
  - en tu fidelidad
  lexicon: HALOT
  rationale: אֱמֶת puede ser verdad o fidelidad; aquí 'tu verdad' es la opción más directa y concordante con el contexto de entendimiento y arrepentimiento.
theological_decisions:
- issue: Término de juicio רָעָה
  english_pob_reading: calamity
  chosen_spanish_reading: calamidad
  alternative_spanish_readings:
  - mal
  - desastre
  rationale: Se evita 'mal' porque podría sugerir maldad moral. 'Calamidad' comunica juicio pactual y desastre histórico con precisión teológica.
  doctrine_reference: 'Translation philosophy: original-language primacy; no atribuir al texto una implicación moral sobre Dios que no expresa.'
- issue: Nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  rationale: Se mantiene la política del proyecto para el Nombre divino en español, preservando la identidad pactual sin el sustituto 'SEÑOR'.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: בַּאֲמִתֶּךָ como medio de comprensión
  english_pob_reading: into your truth
  chosen_spanish_reading: en tu verdad
  alternative_spanish_readings:
  - en tu fidelidad
  - por tu verdad
  rationale: La frase final se entiende como entrar/aprender a entender la verdad divina; 'en tu verdad' evita forzar una preposición instrumental extraña y conserva el sentido reflexivo.
  doctrine_reference: Daniel 9:13 context of repentance and insight
translation_notes:
  revision_awareness: Se integró la revisión más reciente que favorece el Nombre divino en forma explícita y una preposición de comprensión más cercana al sentido de בַּאֲמִתֶּךָ. También se corrigió el valor léxico de רָעָה como calamidad/desastre de juicio y se evitó una traducción que borrara la tensión entre verdad e inteligencia prudente.
  spanish_consistency_notes:
  - Se usa 'Yahvé' para יְהוָה conforme al estándar español del proyecto.
  - '''Ley de Moisés'' conserva el valor covenantal/jurídico de torá en este contexto.'
  - '''Iniquidades'' mantiene la carga moral de עָוֹן mejor que ''pecados'' o ''maldades''.'
  - '''Tu verdad'' traduce אֲמִתֶּךָ de forma directa y digna; no se sustituye por una paráfrasis doctrinal.'
