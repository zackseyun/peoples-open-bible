    rationale: 'La nota dice: «O “los hijos de Israel” o “los israelitas”», pero «los hijos de Israel» ya está en el texto principal. Debe reflejar las alternativas reales al texto principal, como «los hijos de Israel»/«los hijos de Israel» no tiene sentido como variante; lo adecuado es ofrecer «los hijos de Israel» como literal si el texto principal cambia, o aquí, dado que el texto principal ya es literal, ofrecer «los hijos de Israel» no corresponde. Debe decir «O “los israelitas”. El hebreo dice literalmente “los hijos de Israel”», o bien ajustarse más estrechamente al audit trail.'
