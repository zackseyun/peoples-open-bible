translation:
  language: es
  text: Pero desde que dejamos de quemar incienso a la Reina del Cielo[a] y de derramarle libaciones, nos ha faltado todo[c][b], y hemos sido consumidos por la espada y por el hambre.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «desde que».
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: «Reina del Cielo», título de la diosa adorada por el pueblo en este pasaje.'
    reason: cultural_note
  - marker: c
    text: O «hemos perecido» / «hemos llegado a nuestro fin».
    reason: lexical_alternative
lexical_decisions:
- source_word: וּמִן אָז
  english_pob_choice: But from the time
  chosen_spanish: Pero desde que
  alternatives_spanish:
  - Y desde entonces
  - Pero desde el tiempo en que
  lexicon: HALOT
  rationale: La expresión introduce un punto temporal de inicio con valor discursivo adversativo. «Desde que» comunica con naturalidad el comienzo de la acción; «pero» conserva el giro de contraste del contexto, como en la elección inglesa.
- source_word: חָדַלְנוּ
  english_pob_choice: we stopped
  chosen_spanish: dejamos de
  alternatives_spanish:
  - cesamos de
  - paramos de
  lexicon: HALOT
  rationale: El verbo significa cesar o detenerse. «Dejamos de» suena natural en español moderno y mantiene el sentido de interrupción de la acción cultual.
- source_word: לְקַטֵּר
  english_pob_choice: burning incense
  chosen_spanish: quemar incienso
  alternatives_spanish:
  - ofrecer incienso
  - hacer humear incienso
  lexicon: HALOT
  rationale: En contexto cultual, קטר se refiere a quemar incienso o hacer una ofrenda de humo. «Quemar incienso» es la forma más clara y fiel en español.
- source_word: לִמְלֶכֶת הַשָּׁמַיִם
  english_pob_choice: to the Queen of Heaven
  chosen_spanish: a la Reina del Cielo
  alternatives_spanish:
  - a la reina de los cielos
  - a la Reina de los cielos
  lexicon: HALOT
  rationale: Se preserva el título tradicional del ídolo/diosa del pasaje. «Reina del Cielo» corresponde al título establecido y evita introducir una interpretación ajena al hebreo.
- source_word: וְהַסֵּךְ לָהּ נְסָכִים
  english_pob_choice: and pouring out drink offerings to her
  chosen_spanish: y de derramarle libaciones
  alternatives_spanish:
  - y de derramarle ofrendas de libación
  - y de ofrecerle libaciones
  lexicon: HALOT
  rationale: La construcción denota el acto ritual de verter libaciones. «Derramarle libaciones» es conciso, culto y conserva el objeto indirecto femenino del original.
- source_word: חָסַרְנוּ כֹל
  english_pob_choice: we have lacked everything
  chosen_spanish: nos ha faltado todo
  alternatives_spanish:
  - hemos carecido de todo
  - nos ha faltado absolutamente todo
  lexicon: HALOT
  rationale: El verbo expresa carecer o faltar, y כֹל intensifica el alcance total. «Nos ha faltado todo» reproduce bien la amplitud de la carencia en español natural.
- source_word: וּבַחֶרֶב וּבָרָעָב
  english_pob_choice: by the sword and by famine
  chosen_spanish: por la espada y por el hambre
  alternatives_spanish:
  - por la espada y por el hambre
  - a causa de la espada y del hambre
  lexicon: HALOT
  rationale: La preposición puede indicar medio o circunstancia de ruina. «Por la espada y por el hambre» mantiene el paralelismo bíblico y el carácter de instrumento/jucio.
- source_word: תָּמְנוּ
  english_pob_choice: we have been consumed
  chosen_spanish: hemos sido consumidos
  alternatives_spanish:
  - hemos perecido
  - hemos llegado a nuestro fin
  lexicon: HALOT
  rationale: La forma comunica quedar acabados, consumidos o llevados a término. «Hemos sido consumidos» preserva la imagen de ruina y el paralelismo con espada y hambre.
theological_decisions:
- issue: Título idolátrico מְלֶכֶת הַשָּׁמַיִם
  english_pob_reading: Queen of Heaven
  chosen_spanish_reading: Reina del Cielo
  alternative_spanish_readings:
  - Reina de los cielos
  - Reina del Cielo
  rationale: Se mantiene el título del culto pagano sin cristianizarlo ni suavizarlo. La traducción conserva el sentido histórico y religioso del pasaje y evita asociaciones posteriores no presentes en el texto.
  doctrine_reference: Principio de primacía del texto original; no importar desarrollos doctrinales ajenos al pasaje.
translation_notes:
  revision_awareness: 'Coincide con el audit trail inglés en filosofía y decisiones principales: temporalidad adversativa de וּמִן אָז, acción cultual de קטר y נסך, título idolátrico fijo «Reina del Cielo», y el cierre de ruina/consunción. Se optó por una formulación española natural («dejamos de», «nos ha faltado todo», «hemos sido consumidos») sin perder el paralelismo hebreo.'
  spanish_consistency_notes:
  - Se preserva «Reina del Cielo» como título fijo, coherente con el criterio POB para מְלֶכֶת הַשָּׁמַיִם.
  - «Libaciones» mantiene el registro bíblico y el valor cultual de נְסָכִים.
  - «Consumidos» refleja mejor la ruina total que una simple traducción de «murieron», coherente con el audit trail inglés.
  - La puntuación reproduce la pausa causal-temporal del hebreo con una sola frase compuesta.
