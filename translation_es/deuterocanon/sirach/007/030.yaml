translation:
  language: es
  text: Con toda tu fuerza[a], ama a tu Hacedor, y no abandones a sus ministros[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «con toda tu fortaleza» o «con todo tu poder».'
    reason: lexical_alternative
  - marker: b
    text: «Sus ministros» puede referirse más específicamente a quienes sirven a Dios en un servicio sagrado o del templo; alternativamente, «sus siervos».
    reason: alternative_reading
lexical_decisions:
- source_word: בְּכָל מְאֹדְךָ / ἐν ὅλῃ δυνάμει
  english_pob_choice: with all your strength
  chosen_spanish: con toda tu fuerza
  alternatives_spanish:
  - con todo tu poder
  - con toda tu fortaleza
  lexicon: HALOT; LXX δυνάμει
  rationale: La expresión hebrea y su paralelo griego comunican entrega total de capacidad o vigor. 'Fuerza' es natural en español y conserva el sentido de totalidad sin sonar técnico o arcaico.
- source_word: אֱהוֹב / ἀγάπησον
  english_pob_choice: love
  chosen_spanish: ama
  alternatives_spanish:
  - ama con amor
  - quiero
  lexicon: HALOT; LSJ
  rationale: El imperativo de אהב y ἀγαπάω se expresa directamente con 'amar'. En español, el imperativo 'ama' es breve, claro y fiel al mandato.
- source_word: עוֹשֶׂךָ / τὸν ποιήσαντά σε
  english_pob_choice: your Maker
  chosen_spanish: tu Hacedor
  alternatives_spanish:
  - tu creador
  - el que te hizo
  lexicon: HALOT; LSJ
  rationale: '''Hacedor'' conserva el valor personal del participio ''el que te hizo'' y mantiene el matiz reverente que POB documenta en inglés con ''Maker''. ''Creador'' sería correcto pero más interpretativo en registro teológico.'
- source_word: מְשָׁרְתָיו / λειτουργοὺς αὐτοῦ
  english_pob_choice: his ministers
  chosen_spanish: sus ministros
  alternatives_spanish:
  - sus servidores
  - los que le sirven
  - sus asistentes
  lexicon: HALOT; LSJ
  rationale: '''Ministros'' conserva la probable esfera de servicio sagrado o cultual indicada por el hebreo y el griego, sin reducirlo a ''siervos'' ni especificar indebidamente ''sacerdotes''.'
- source_word: לֹא תַעֲזֹב / μὴ ἐγκαταλίπῃς
  english_pob_choice: do not forsake
  chosen_spanish: no abandones
  alternatives_spanish:
  - no dejes
  - no desampares
  - no abandones ni descuides
  lexicon: HALOT; LSJ
  rationale: '''Abandonar'' reproduce bien la fuerza de ''forsake'' y de ἐγκαταλείπω, y resulta natural en español. ''Desamparar'' es más afectivo y menos exacto aquí.'
theological_decisions:
- issue: Referencia divina de 'tu Hacedor'
  english_pob_reading: Maker
  chosen_spanish_reading: Hacedor con mayúscula implícita por el contexto
  alternative_spanish_readings:
  - creador
  - el que te hizo
  rationale: El verso dirige amor y obediencia a Dios como creador. En español, 'Hacedor' comunica esa referencia personal y digna sin añadir una glosa doctrinal extra.
  doctrine_reference: Creación; deber de amor exclusivo a Dios
- issue: Naturaleza de 'sus ministros'
  english_pob_reading: ministers may refer more specifically to those who serve God in sacred or temple service; alternatively, servants
  chosen_spanish_reading: sus ministros
  alternative_spanish_readings:
  - sus siervos
  - los que sirven en su servicio sagrado
  rationale: '''Ministros'' deja abierta la tensión entre servicio general y servicio sagrado/cultual, reflejando tanto el hebreo מְשָׁרְתָיו como el griego λειτουργούς αὐτοῦ sin estrechar el alcance.'
  doctrine_reference: Servicio a Dios; posible trasfondo cultual/temple
translation_notes:
  revision_awareness: El inglés POB presenta la misma lectura base y las mismas tensiones léxicas clave (כָּל־מְאֹד / δύναμις; עוֹשֶׂךָ / ποιήσαντά σε; מְשָׁרְתָיו / λειτουργούς). No se registraron revisiones posteriores; la concordancia del control cruzado es alta y sin objeciones.
  spanish_consistency_notes:
  - Se evita 'SEÑOR' porque el texto no usa el Tetragrámaton ni una cita directa de κύριος en este verso.
  - '''Hacedor'' se mantiene como término reverente y bíblico, coherente con el tratamiento de Maker en la POB inglesa.'
  - '''Ministros'' conserva el matiz de servicio oficial/sagrado sin traducirlo automáticamente por ''sacerdotes''.'
  - '''No abandones'' sigue el valor moral de עזב/ἐγκαταλείπω y suena natural en español contemporáneo.'
