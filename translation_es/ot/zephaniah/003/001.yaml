translation:
  language: es
  text: ¡Ay de la ciudad rebelde y contaminada[a], la opresora[b]!
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «y polluida».
    reason: lexical_alternative
  - marker: b
    text: Hebreo הַיּוֹנָה puede leerse más literalmente como «la paloma», pero en contexto suele entenderse como una descripción figurada de la ciudad como opresora.
