translation:
  language: es
  text: Y sucedió en el mes de Nisán, en el año vigésimo del rey Artajerjes, cuando el vino estaba delante de él, que yo tomé el vino y se lo di al rey. Y no había estado triste[a] en su presencia.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, de manera más formal, «y no estaba triste delante de él». Más literalmente, el hebreo dice «no estaba malo delante de él», un modismo para parecer triste o disgustado en presencia del rey.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְהִי
  english_pob_choice: And it happened
  chosen_spanish: Y sucedió
  alternatives_spanish:
  - Y aconteció
  - Y pasó
  lexicon: HALOT
  rationale: La fórmula narrativa hebrea introduce la secuencia de manera sobria; «Y sucedió» conserva el valor de marco narrativo sin caer en arcaísmo excesivo.
- source_word: בְּחֹדֶשׁ נִיסָן
  english_pob_choice: in the month of Nisan
  chosen_spanish: en el mes de Nisán
  alternatives_spanish:
  - en Nisán
  - en el mes Nisán
  lexicon: HALOT
  rationale: Se mantiene la datación formal y el nombre del mes transliterado como nombre propio, con acento gráfico según uso español.
- source_word: שְׁנַת עֶשְׂרִים
  english_pob_choice: in the twentieth year
  chosen_spanish: en el año vigésimo
  alternatives_spanish:
  - en el año veinte
  - en el vigésimo año
  lexicon: HALOT
  rationale: El valor regnal se expresa de manera natural en español con «año vigésimo», preservando la estructura cronológica del hebreo.
- source_word: לְאַרְתַּחְשַׁסְתְּא הַמֶּלֶךְ
  english_pob_choice: of King Artaxerxes
  chosen_spanish: del rey Artajerjes
  alternatives_spanish:
  - de Artajerjes el rey
  - del rey Artajerjes
  lexicon: HALOT
  rationale: El lamed regnal se vierte de forma idiomática como pertenencia o referencia al reinado; el nombre propio se translitera de manera estable en español.
- source_word: יַיִן לְפָנָיו
  english_pob_choice: when wine was before him
  chosen_spanish: cuando había vino delante de él
  alternatives_spanish:
  - cuando el vino estaba delante de él
  - mientras había vino delante de él
  lexicon: HALOT
  rationale: La cláusula sin verbo se vuelve natural en español con «había vino delante de él», conservando la escena cortesana y la expresión espacial «delante de él».
- source_word: וָאֶשָּׂא אֶת הַיַּיִן
  english_pob_choice: I took up the wine
  chosen_spanish: yo tomé el vino
  alternatives_spanish:
  - yo alcé el vino
  - yo levanté el vino
  lexicon: HALOT
  rationale: En este contexto, נשא describe la acción de tomar para servir; «tomé el vino» evita introducir «copa» que no está explícita en el hebreo, y suena natural en español.
- source_word: וָאֶתְּנָה לַמֶּלֶךְ
  english_pob_choice: and gave it to the king
  chosen_spanish: y se lo di al rey
  alternatives_spanish:
  - y lo di al rey
  - y se lo presenté al rey
  lexicon: HALOT
  rationale: Se conserva el objeto implícito del vino con un clítico natural en español. «Di» sigue de cerca נתן sin sobrecargar el contexto ceremonial.
- source_word: וְלֹא הָיִיתִי רַע לְפָנָיו
  english_pob_choice: Now I had not been sad in his presence
  chosen_spanish: Y no había estado triste en su presencia
  alternatives_spanish:
  - Y no había estado mal en su presencia
  - Y no había estado afligido en su presencia
  lexicon: HALOT
  rationale: Se respeta la tensión lexical de רַע (“malo/bad”) que en este contexto idiomático alude al semblante triste o abatido. «Triste» comunica la fuerza contextual en español sin perder la rareza del hebreo detrás de la expresión.
theological_decisions:
- issue: Interpretación idiomática de רַע en contexto cortesano
  english_pob_reading: The Hebrew literally says 'I was not bad before him,' an idiom for appearing sad or displeased in the king's presence.
  chosen_spanish_reading: «No había estado triste en su presencia» mantiene el sentido idiomático sin endurecer la frase como juicio moral.
  alternative_spanish_readings:
  - «No había estado malo en su presencia»
  - «No había estado afligido en su presencia»
  rationale: El hebreo literal “malo” resultaría engañoso para el lector español, porque el contexto describe el semblante ante el rey. «Triste» refleja la lectura contextual del POB y conserva la tensión entre la literalidad y el uso idiomático.
  doctrine_reference: Lexical/idiomatic rendering; no doctrinal issue.
translation_notes:
  revision_awareness: El inglés POB revisó la última cláusula de «had never been sad» a «had not been sad» para reflejar con más precisión la forma hebrea sin intensificar el sentido. La versión española sigue esa precisión con «no había estado triste», evitando cualquier valor absoluto de frecuencia como «nunca» y manteniendo el matiz idiomático documentado.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma general del proyecto, pero este versículo no contiene el nombre divino.
  - «Artajerjes» se usa como forma estable del nombre propio en español.
  - «Nisán» se conserva como transliteración del mes hebreo.
  - La expresión «delante de él / en su presencia» preserva el valor espacial-cortesano de לְפָנָיו.
