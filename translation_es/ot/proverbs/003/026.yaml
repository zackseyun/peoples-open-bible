translation:
  language: es
  text: Porque Yahvé será tu confianza[a], y guardará tu pie para que no caiga en la trampa.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «tu seguridad»; la expresión hebrea también puede entenderse más literalmente como «a tu lado», aunque aquí probablemente es figurada y expresa confianza o seguridad.
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Ya que
  lexicon: HALOT
  rationale: Introduce la razón o fundamento de la afirmación precedente. «Porque» conserva bien la relación explicativa y suena natural en español bíblico moderno.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: Se mantiene el nombre propio divino del Tetragrámaton, conforme al criterio del proyecto, en vez de sustituirlo por un título.
- source_word: יִהְיֶה
  english_pob_choice: will be
  chosen_spanish: será
  alternatives_spanish:
  - estará
  - vendrá a ser
  lexicon: HALOT
  rationale: El futuro simple transmite la promesa de manera clara y directa en español.
- source_word: בְּכִסְלֶךָ
  english_pob_choice: your confidence
  chosen_spanish: tu confianza
  alternatives_spanish:
  - tu seguridad
  - a tu lado
  - en tus lomos
  lexicon: HALOT
  rationale: La expresión hebrea admite un valor literal («lomos/costado») y uno figurado. En este contexto sapiencial, la lectura figurada de seguridad/confianza está bien sustentada por el paralelo con la protección contra la trampa. «Tu confianza» mantiene la idea relacional y evita forzar una imagen anatómica poco natural.
- source_word: וְשָׁמַר
  english_pob_choice: and he will keep
  chosen_spanish: y guardará
  alternatives_spanish:
  - y cuidará
  - y vigilará
  lexicon: HALOT
  rationale: «Guardar» recoge el campo semántico de proteger, vigilar y preservar, y funciona bien con el complemento siguiente.
- source_word: רַגְלְךָ
  english_pob_choice: your foot
  chosen_spanish: tu pie
  alternatives_spanish:
  - tus pies
  lexicon: HALOT
  rationale: Se conserva el singular hebreo, que puede funcionar colectivamente en español sin necesidad de pluralizar.
- source_word: מִלָּכֶד
  english_pob_choice: from being caught
  chosen_spanish: de ser atrapado
  alternatives_spanish:
  - de quedar preso
  - de caer en la trampa
  - de ser cazado
  lexicon: HALOT
  rationale: La forma expresa la idea de ser capturado o tomado. «De ser atrapado» comunica esa pasiva de manera clara y evita introducir explícitamente una «trampa» que el hebreo no nombra en esta forma breve.
theological_decisions:
- issue: Tratamiento del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - Jehová
  rationale: El texto hebreo usa el Nombre divino directamente. Se preserva como «Yahvé» para mantener la referencia al nombre pactual de Dios sin sustituirlo por un título genérico.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Valor de בְּכִסְלֶךָ
  english_pob_reading: your confidence
  chosen_spanish_reading: tu confianza
  alternative_spanish_readings:
  - tu seguridad
  - a tu lado
  rationale: La POB inglesa opta por una lectura figurada, no meramente locativa. En español, «tu confianza» conserva la ambigüedad productiva entre apoyo y seguridad, mientras que el contexto de protección contra el tropiezo respalda esa interpretación.
  doctrine_reference: HALOT; contexto sapiencial de Prov 3:26
translation_notes:
  revision_awareness: El texto base inglés y la revisión más reciente coinciden en la lectura figurada de בְּכִסְלֶךָ como «your confidence», sin cambios pendientes; la versión española sigue esa decisión y conserva la nota alternativa donde el hebreo permite una lectura más literal.
  spanish_consistency_notes:
  - Se usa «Yahvé» de forma consistente para יְהוָה, conforme a la terminología del proyecto.
  - Se mantiene el singular «tu pie» siguiendo el hebreo y la decisión inglesa.
  - «De ser atrapado» refleja la pasiva implícita del hebreo sin añadir un objeto explícito.
  - El registro es bíblico moderno y sobrio, evitando calcos duros pero sin paraphrasear el sentido del verso.
