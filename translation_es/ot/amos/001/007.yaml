translation:
  language: es
  text: Así que enviaré fuego sobre el muro de Gaza[a], y consumirá sus fortalezas.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «palacios». El término hebreo puede referirse a edificios palaciales, a menudo con sentido fortificado o de élite.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְשִׁלַּחְתִּי
  english_pob_choice: So I will send
  chosen_spanish: Así que enviaré
  alternatives_spanish:
  - Y enviaré
  - Enviaré
  lexicon: HALOT
  rationale: El verbo expresa la acción directa de YHWH en un anuncio profético de juicio. «Así que» reproduce el valor discursivo de secuencia/resultado que el POB inglés resolvió con «So», sin perder la naturalidad del español.
- source_word: אֵשׁ
  english_pob_choice: fire
  chosen_spanish: fuego
  alternatives_spanish:
  - llama
  - incendio
  lexicon: HALOT
  rationale: «Fuego» conserva el sentido literal y la imaginería de juicio sin añadir matices no presentes en el hebreo.
- source_word: בְּחוֹמַת
  english_pob_choice: upon the wall of
  chosen_spanish: sobre el muro de
  alternatives_spanish:
  - contra el muro de
  - en el muro de
  lexicon: HALOT
  rationale: El hebreo usa ב con «muro» en un contexto de fuego enviado; «sobre» mantiene la relación espacial y la formulación formal adoptada en la revisión inglesa, mientras que «contra» enfatizaría más la hostilidad que el texto exige de forma explícita.
- source_word: עַזָּה
  english_pob_choice: Gaza
  chosen_spanish: Gaza
  alternatives_spanish:
  - la ciudad de Gaza
  lexicon: HALOT
  rationale: Se conserva el topónimo estándar en español.
- source_word: וְאָכְלָה
  english_pob_choice: and it will consume
  chosen_spanish: y consumirá
  alternatives_spanish:
  - y devorará
  - y se comerá
  lexicon: HALOT
  rationale: El sujeto es «fuego», femenino singular en hebreo, y el sentido es de destrucción por combustión. «Consumirá» comunica ese resultado con claridad y dignidad en español.
- source_word: אַרְמְנֹתֶיהָ
  english_pob_choice: her citadels
  chosen_spanish: sus ciudadelas
  alternatives_spanish:
  - sus palacios
  - sus fortalezas
  lexicon: HALOT
  rationale: אַרְמוֹן puede aludir a edificios palaciales con sentido fortificado. «Ciudadelas» preserva el matiz defensivo que el POB inglés quiso mantener con «citadels», sin reducirlo a una simple residencia real.
theological_decisions:
- issue: Tratamiento de la personificación femenina de Gaza
  english_pob_reading: her citadels
  chosen_spanish_reading: sus ciudadelas
  alternative_spanish_readings:
  - sus ciudadelas
  - sus palacios
  - sus fortalezas
  rationale: Se conserva la referencia a Gaza como ciudad gramaticalmente femenina en hebreo sin forzar una aclaración posesiva en español. El posesivo plural «sus» evita una personificación innecesaria en castellano, aunque el trasfondo hebreo sigue siendo femenino en la gramática del sujeto.
  doctrine_reference: Translation philosophy §4 (gender-accurate over gender-neutral)
translation_notes:
  revision_awareness: La redacción sigue la revisión más reciente del inglés POB, que prefirió «upon the wall» por mayor naturalidad formal; por eso se refleja con «sobre el muro». También se mantiene la opción léxica auditada de «citadels» mediante «ciudadelas», evitando suavizar el sentido fortificado del término hebreo.
  spanish_consistency_notes:
  - Se usa «Yahvé» como forma predeterminada del Tetragrámaton en el proyecto, pero en este versículo no aparece explícitamente en el texto hebreo.
  - Se mantiene el tono profético de juicio, con verbo en futuro español para reflejar el valor prospectivo del perfecto/participio profético hebreo.
  - «Gaza» se conserva sin artículo, conforme al uso habitual en español y al topónimo del texto fuente.
