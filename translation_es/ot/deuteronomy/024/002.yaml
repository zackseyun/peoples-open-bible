translation:
  language: es
  text: y ella sale de la casa de él, va y llega a ser esposa de otro hombre[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literalmente, «para otro hombre». El hebreo idiomático significa que entra en matrimonio con otro hombre.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְיָצְאָה
  english_pob_choice: and she goes out from his house
  chosen_spanish: y ella sale de su casa
  alternatives_spanish:
  - y ella va afuera de su casa
  - y ella se va de su casa
  lexicon: HALOT
  rationale: יצא en este encadenamiento legal expresa la acción de salir. «Sale de su casa» reproduce con naturalidad el movimiento de salida y mantiene el tono casuístico sin añadir interpretación.
- source_word: מִבֵּיתוֹ
  english_pob_choice: from his house
  chosen_spanish: de su casa
  alternatives_spanish:
  - desde su casa
  - de la casa de él
  lexicon: HALOT
  rationale: El hebreo dice literalmente «de su casa». En español, «sale de su casa» integra de forma natural la idea de procedencia sin perder el sentido.
- source_word: וְהָלְכָה
  english_pob_choice: and goes
  chosen_spanish: va
  alternatives_spanish:
  - y camina
  - y se va
  lexicon: HALOT
  rationale: הלך aquí continúa la secuencia de acciones. «Va» conserva la progresión narrativa/legal sin sobreespecificar la manera del desplazamiento.
- source_word: וְהָיְתָה
  english_pob_choice: and becomes
  chosen_spanish: llega a ser
  alternatives_spanish:
  - y es
  - y pasa a ser
  lexicon: HALOT
  rationale: היה con ל señala ingreso en una relación o estado. «Llega a ser» comunica bien el cambio de condición matrimonial en español.
- source_word: לְאִישׁ אַחֵר
  english_pob_choice: another man's wife
  chosen_spanish: esposa de otro hombre
  alternatives_spanish:
  - mujer de otro hombre
  - para otro hombre
  lexicon: HALOT
  rationale: El hebreo dice literalmente «para otro hombre», pero en este contexto idiomático se refiere a entrar en matrimonio con otro hombre. «Esposa de otro hombre» hace explícita la relación sin apartarse del valor contextual.
theological_decisions:
- issue: Alcance del hebreo idiomático לְאִישׁ אַחֵר en un contexto de divorcio y nuevo matrimonio
  english_pob_reading: Literally, 'to another man.' The Hebrew idiom means that she enters marriage with another man.
  chosen_spanish_reading: «Esposa de otro hombre» expresa el sentido idiomático de que entra en matrimonio con otro hombre.
  alternative_spanish_readings:
  - «para otro hombre»
  - «a otro hombre»
  rationale: No se trata solo de destino o movimiento hacia un hombre, sino de una nueva relación conyugal. Mantener el sentido relacional evita oscurecer la fuerza legal del pasaje.
  doctrine_reference: Deuteronomio 24:1-4; ley matrimonial y de divorcio en la Torá
translation_notes:
  revision_awareness: La versión inglesa más reciente ajustó וְיָצְאָה מִבֵּיתוֹ de «leaves his house» a «goes out from his house» para reflejar mejor la preposición. En español, «sale de su casa» ya incorpora de manera natural ese matiz, por lo que no se requiere una expansión adicional.
  spanish_consistency_notes:
  - Se mantiene «casa» para בַּיִת siguiendo la lectura simple y directa del contexto legal.
  - «Esposa» se usa para explicitar el valor relacional de לְאִישׁ אַחֵר, en línea con el audit trail inglés.
  - Se evita «SEÑOR» u otras sustituciones no pertinentes, pues no aparece el nombre divino en este versículo.
