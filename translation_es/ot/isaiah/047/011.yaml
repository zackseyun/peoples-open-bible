  text: וּ/בָ֧א עָלַ֣יִ/ךְ רָעָ֗ה לֹ֤א תֵדְעִי֙ שַׁחְרָ֔/הּ וְ/תִפֹּ֤ל עָלַ֨יִ/ךְ֙ הֹוָ֔ה לֹ֥א תוּכְלִ֖י כַּפְּרָ֑/הּ וְ/תָבֹ֨א עָלַ֧יִ/ךְ פִּתְאֹ֛ם שׁוֹאָ֖ה לֹ֥א תֵדָֽעִי׃
base_translation:
  language: en
  yaml_path: translation/ot/isaiah/047/011.yaml
  text: But evil will come upon you[a]; you will not know how to charm it away. And disaster will fall upon you; you will not be able to avert it. And ruin will come upon you suddenly[b], which you do not know.
  footnotes:
  - marker: a
    text: Or 'you will not know its dawning' or 'you will not know how to avert it.' The Hebrew of this clause is difficult; the main text follows the sense that Babylon will be unable to use her occult arts to dispel the coming evil.
    reason: lexical_alternative
  - marker: b
    text: 'Or ''you will not be able to ward it off'' / ''appease it.'' Hebrew: ''make atonement for it.'''
    reason: lexical_alternative
