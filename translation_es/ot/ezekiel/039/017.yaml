review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura del hebreo: mantiene «hijo de hombre», el triple llamado imperativo, la repetición sacrificial «sacrificio... sacrificando», «los montes de Israel» y la imagen fuerte de «comer carne y beber sangre». También conserva apropiadamente las notas sobre «toda ave de toda ala» y sobre la construcción cognada de זבח. Sin embargo, el tratamiento de אֲדֹנָי יְהֹוִה como solo «Yahvé» omite el componente אֲדֹנָי presente en la fuente; debe representarse de algún modo en español.'
  spanish_quality_summary: 'El español es claro y de buen registro bíblico, pero hay dos ajustes de naturalidad y fidelidad: 1) «así dice Yahvé» debe incluir también «Señor» para no perder un elemento del original; 2) la combinación «Juntaos... congregaos» suena algo peninsular/eclesiástica por el voseo plural, aunque sigue siendo comprensible. Dado que el borrador ya usa «vosotros», no hace falta rehacer todo el sistema pronominal; basta con reparar el título divino. El resto es legible y digno.'
  glossary_alignment: 'Alinea bien con varias pautas del proyecto: YHWH se representa como «Yahvé»; בֶן אָדָם como «hijo de hombre»; בָּשָׂר como «carne»; זֶבַח como «sacrificio». La desviación principal es que אֲדֹנָי יְהֹוִה no debe reducirse a «Yahvé» solamente; una forma como «el Señor Yahvé» preserva ambos elementos y sigue usando «Yahvé» para el nombre divino.'
  issues:
  - severity: high
    issue: Omisión de אֲדֹנָי en «así dice Yahvé»
    rationale: La fuente hebrea tiene el título compuesto אֲדֹנָי יְהֹוִה. Traducir solo «Yahvé» pierde un componente semántico explícito del original. «El Señor Yahvé» preserva ambos elementos y cumple la pauta del proyecto sobre YHWH.
  - severity: low
    issue: Registro pronominal mixto respecto al objetivo latinoamericano
    rationale: El texto usa «juntaos, venid, congregaos, vosotros», que es entendible pero no neutral latinoamericano. No es un error de fidelidad, y dado que el borrador es internamente consistente, no exige una revisión completa aquí.
