base_translation:
  language: en
  yaml_path: translation/ot/genesis/024/014.yaml
  text: And let it be that the young woman to whom I say[a], ‘Please lower your jar so that I may drink,’ and who says, ‘Drink, and I will also water your camels’—let her be the one you have appointed for your servant Isaac[c][b]. By this I will know that you have shown steadfast love to my master.
  footnotes:
  - marker: a
    text: Or, 'for your servant Isaac.' The Hebrew may be read appositionally, but the main text takes 'your servant' as the praying speaker and 'for Isaac' as a separate phrase.
    reason: alternative_reading
  - marker: b
    text: Or, 'By this I will know.' The Hebrew literally says 'by her,' referring to the young woman as the sign.
    reason: lexical_alternative
  - marker: c
    text: Or 'And let it be that the young woman to whom I say, ‘Please lower your jar so that I may drink,’ and who says, ‘Drink, and I will also water your camels’—let her be the one you have appointed for your servant, for Isaac.'.
