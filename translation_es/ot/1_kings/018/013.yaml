translation:
  language: es
  text: '¿No se le ha dicho a mi señor lo que hice cuando Jezabel estaba matando a los profetas de Yahvé: cómo escondí a cien de los profetas de Yahvé, cincuenta hombres en cada cueva[a], y les di pan y agua?'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «cincuenta hombres, cada grupo en una cueva» o «en dos grupos de cincuenta en cuevas». El hebreo expresa una distribución por grupos de cincuenta.'
    reason: lexical_alternative
lexical_decisions:
- source_word: הֲלֹא
  english_pob_choice: Has it not
  chosen_spanish: ¿No se le ha dicho...?
  alternatives_spanish:
  - ¿Acaso no se le ha dicho...?
  - ¿No se le informó...?
  lexicon: HALOT
  rationale: La partícula introduce una pregunta retórica que espera afirmación. En español, «¿No se le ha dicho...?» conserva ese matiz sin sonar antinatural.
- source_word: הֻגַּד
  english_pob_choice: been told
  chosen_spanish: se le ha dicho
  alternatives_spanish:
  - se le ha informado
  - se le ha comunicado
  lexicon: HALOT
  rationale: El pasivo de נגד expresa que la información fue comunicada a alguien. «Se le ha dicho» es natural y mantiene el valor pasivo.
- source_word: לַאדֹנִי
  english_pob_choice: to my lord
  chosen_spanish: a mi señor
  alternatives_spanish:
  - a mi amo
  lexicon: HALOT
  rationale: Aquí אדון es un tratamiento respetuoso dirigido a Elías, no un título divino. «Mi señor» conserva la deferencia y la relación jerárquica del texto.
- source_word: אֲשֶׁר עָשִׂיתִי
  english_pob_choice: what I did
  chosen_spanish: lo que hice
  alternatives_spanish:
  - lo que yo hice
  - aquello que hice
  lexicon: HALOT
  rationale: La cláusula relativa funciona como objeto de «dicho». «Lo que hice» es idiomático y fiel al sentido narrativo.
- source_word: בַּהֲרֹג אִיזֶבֶל
  english_pob_choice: when Jezebel was killing
  chosen_spanish: cuando Jezabel estaba matando
  alternatives_spanish:
  - cuando Jezabel mataba
  - al matar Jezabel
  lexicon: HALOT
  rationale: La preposición con infinitivo marca circunstancia temporal. El progresivo español comunica bien la acción en curso durante la cual Obadías actuó.
- source_word: נְבִיאֵי יְהוָה
  english_pob_choice: the prophets of Yahweh
  chosen_spanish: los profetas de Yahvé
  alternatives_spanish:
  - los profetas de Yahweh
  - los profetas de Yahvé
  lexicon: HALOT
  rationale: 'Se sigue la norma del proyecto para יְהוָה: «Yahvé». En plural constructo, «los profetas de Yahvé» es claro y transparente.'
- source_word: וָאַחְבִּא
  english_pob_choice: how I hid
  chosen_spanish: cómo escondí
  alternatives_spanish:
  - cómo oculté
  - y escondí
  lexicon: HALOT
  rationale: Tras «lo que hice», el contenido se introduce naturalmente con «cómo». «Escondí» es la opción más directa; «oculté» es válida pero menos natural aquí.
- source_word: מִנְּבִיאֵי יְהוָה מֵאָה אִישׁ
  english_pob_choice: a hundred of the prophets of Yahweh
  chosen_spanish: a cien de los profetas de Yahvé
  alternatives_spanish:
  - a un centenar de los profetas de Yahvé
  - a cien hombres de entre los profetas de Yahvé
  lexicon: HALOT
  rationale: El מן partitivo indica extracción de un grupo. En español, «cien de los profetas de Yahvé» conserva ese valor sin añadir más que el hebreo.
- source_word: חֲמִשִּׁים חֲמִשִּׁים אִישׁ בַּמְּעָרָה
  english_pob_choice: fifty men in each cave
  chosen_spanish: cincuenta hombres en cada cueva
  alternatives_spanish:
  - cincuenta hombres por cueva
  - cincuenta hombres, cincuenta por cueva
  lexicon: HALOT
  rationale: La repetición distributiva en hebreo expresa grupos de cincuenta. «En cada cueva» refleja esa distribución con claridad en español. Se evita forzar una sola cueva para los cien.
- source_word: וָאֲכַלְכְּלֵם
  english_pob_choice: provided them with
  chosen_spanish: y les di
  alternatives_spanish:
  - y los sustenté con
  - y los alimenté con
  lexicon: HALOT
  rationale: El verbo significa sostener/proveer. Como el objeto concreto sigue inmediatamente, «les di» transmite la provisión de manera natural; se entiende que fue con alimento y agua.
- source_word: לֶחֶם וָמָיִם
  english_pob_choice: bread and water
  chosen_spanish: pan y agua
  alternatives_spanish:
  - alimento y agua
  - pan y agua
  lexicon: HALOT
  rationale: La expresión concreta del hebreo se mantiene. «Pan y agua» conserva la sencillez y el tono de subsistencia mínima.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  - Jehová
  lexicon: HALOT
  rationale: Se adopta la forma española del nombre divino conforme al estándar del proyecto. Esto preserva el nombre propio del pacto, no un sustituto titulado.
theological_decisions:
- issue: Tratamiento del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - Jehová
  rationale: El texto hebreo usa directamente el Tetragrámaton. La forma española «Yahvé» comunica el nombre propio sin sustituirlo por un título como «Señor».
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Sentido de אדוני en boca de Abdías
  english_pob_reading: my lord
  chosen_spanish_reading: mi señor
  alternative_spanish_readings:
  - mi amo
  rationale: El interlocutor es Elías; el vocativo expresa respeto y subordinación, no divinidad. «Mi señor» mantiene esa deferencia sin cargar el texto con una terminología más dura de la necesaria.
  doctrine_reference: HALOT / contexto narrativo de 1 Reyes 18:13
translation_notes:
  revision_awareness: 'La redacción sigue de cerca el texto hebreo y la última revisión inglesa: se mantiene la pregunta retórica, el partitivo de «cien de los profetas», y la construcción distributiva de «cincuenta hombres en cada cueva». También se preserva la decisión doctrinal del POB de traducir יְהוָה como un nombre propio en lugar de un título sustituido.'
  spanish_consistency_notes:
  - Se usa «Yahvé» de manera uniforme para יְהוָה.
  - Se mantiene «mi señor» para el tratamiento reverencial dirigido a Elías, evitando una traducción mecánica con «amo».
  - La fórmula «cien de los profetas» conserva el valor partitivo del hebreo sin sobreexplicar.
  - «Pan y agua» reproduce la sobriedad concreta del cierre hebreo.
