translation:
  language: es
  text: ¡Canta de gozo[a], hija de Sión; da gritos de júbilo, Israel! ¡Regocíjate y exulta con todo tu corazón, hija de Jerusalén!
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: También puede leerse «Hija de Sión» y «Hija de Jerusalén». El hebreo usa una expresión personificada de la ciudad.
    reason: lexical_alternative
lexical_decisions:
- source_word: רָנִּי
  english_pob_choice: Sing for joy
  chosen_spanish: Canta de gozo
  alternatives_spanish:
  - Canta con gozo
  - Grita de gozo
  lexicon: HALOT
  rationale: El imperativo femenino singular expresa júbilo vocal; 'canta de gozo' conserva el componente de canto y alegría, sin reducirlo a un simple 'canta' ni intensificarlo innecesariamente a 'grita'.
- source_word: בַּת צִיּוֹן
  english_pob_choice: daughter Zion
  chosen_spanish: hija de Sión
  alternatives_spanish:
  - hija de Sión
  - hija de Sion
  - hija de la hija de Sión
  lexicon: HALOT
  rationale: La fórmula personifica a la ciudad y funciona como vocativo poético. 'Hija de Sión' es la equivalencia natural en español y preserva la personificación sin añadir elementos no explícitos.
- source_word: הָרִיעוּ
  english_pob_choice: shout aloud
  chosen_spanish: da gritos de júbilo
  alternatives_spanish:
  - alzad un grito
  - gritad con júbilo
  lexicon: HALOT
  rationale: El Hifil de רוע/ריע pide un clamor jubiloso y público. 'Da gritos de júbilo' comunica bien el sonido exuberante y mantiene el paralelismo poético con el primer mandato.
- source_word: יִשְׂרָאֵל
  english_pob_choice: Israel
  chosen_spanish: Israel
  alternatives_spanish:
  - Israel
  lexicon: HALOT
  rationale: Nombre propio vocativo conservado sin cambio. La referencia es directa al pueblo en paralelo con las personificaciones de Sión y Jerusalén.
- source_word: שִׂמְחִי
  english_pob_choice: Rejoice
  chosen_spanish: Regocíjate
  alternatives_spanish:
  - Alégrate
  - Rebosa de gozo
  lexicon: HALOT
  rationale: El imperativo de שמח pide alegría expresada activamente. 'Regocíjate' eleva el registro y evita repetir exactamente el matiz del primer mandato.
- source_word: וְעָלְזִי
  english_pob_choice: and exult
  chosen_spanish: y alégrate
  alternatives_spanish:
  - y exulta
  - y júbila
  lexicon: HALOT
  rationale: עלז añade exuberancia jubilosa. En español, 'alégrate' mantiene la exhortación positiva y suele leerse con fuerza poética; 'exulta' sería más literal pero menos transparente para lectura pública.
- source_word: בְּכָל לֵב
  english_pob_choice: with all your heart
  chosen_spanish: con todo tu corazón
  alternatives_spanish:
  - con todo el corazón
  - de todo corazón
  lexicon: HALOT
  rationale: La expresión idiomática hebrea denota entrega total interior. 'Con todo tu corazón' conserva la imagen y el sentido de totalidad afectiva y volitiva.
- source_word: בַּת יְרוּשָׁלִָם
  english_pob_choice: daughter Jerusalem
  chosen_spanish: hija de Jerusalén
  alternatives_spanish:
  - hija de Jerusalén
  - hija de la ciudad de Jerusalén
  lexicon: HALOT
  rationale: Se mantiene el paralelismo con 'hija de Sión' y la personificación de la ciudad. La forma breve es la más fiel al estilo profético y adecuada en español.
translation_notes:
  revision_awareness: 'El texto coincide con el sentido del hebreo masorético y con la línea de la POB en inglés: mantiene los cuatro imperativos jubilatorios, la personificación vocativa de Sión y Jerusalén, y el paralelismo entre ambas mitades del verso. No se detectan revisiones textuales relevantes en el paquete de auditoría.'
  spanish_consistency_notes:
  - Se conserva el estilo profético exhortativo con cuatro imperativos en serie.
  - Se mantiene la personificación de las ciudades como vocativos, no como títulos eclesiásticos.
  - '''Sión'' y ''Jerusalén'' se dejan como nombres propios, con estructura paralela uniforme.'
  - La nota al pie marca la alternativa lexical documentada sin sobrecargar el texto principal.
