translation:
  language: es
  text: El rencor y la ira[a] también son abominaciones, y un hombre pecador se apegará[b] a ellas.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «ira vengativa y ira»; Μῆνις puede llevar el sentido de una ira profunda, sostenida o vengativa, mientras que ὀργή es un término más general para la ira.
    reason: lexical_alternative
  - marker: b
    text: Lit., «un hombre pecador será ἐγκρατής de ellas». La expresión es difícil; aquí se entiende en el sentido de que se apega a esos vicios o los retiene.
    reason: alternative_reading
lexical_decisions:
- source_word: Μῆνις
  english_pob_choice: resentment
  chosen_spanish: rencilla
  alternatives_spanish:
  - resentimiento
  - rencor
  - ira profunda
  - ira vengativa
  lexicon: LSJ
  rationale: Μῆνις puede expresar una ira duradera, resentida o vengativa, no solo un estallido momentáneo. En español, 'rencilla' o 'rencor' puede reflejar mejor esa hostilidad persistente que 'ira' sola, y evita duplicar exactamente el valor de ὀργή.
- source_word: ὀργή
  english_pob_choice: anger
  chosen_spanish: ira
  alternatives_spanish:
  - enojo
  - cólera
  - furor
  - rabia
  lexicon: LSJ
  rationale: '''Ira'' preserva el peso moral y literario del término, y funciona bien junto a ''rencilla'' para mantener la distinción con Μῆνις.'
- source_word: βδελύγματα
  english_pob_choice: abominations
  chosen_spanish: abominaciones
  alternatives_spanish:
  - cosas detestables
  - cosas odiosas
  - detestaciones
  lexicon: LSJ
  rationale: '''Abominaciones'' conserva la fuerza moral y religiosa del término griego y coincide con el registro bíblico tradicional sin perder claridad en español.'
- source_word: ἀνὴρ
  english_pob_choice: man
  chosen_spanish: un hombre
  alternatives_spanish:
  - una persona
  - alguien
  - un varón
  lexicon: LSJ
  rationale: El griego es masculino singular. Se mantiene 'un hombre' para reflejar con precisión la forma del original y la decisión de no neutralizar el sustantivo.
- source_word: ἁμαρτωλὸς
  english_pob_choice: sinful
  chosen_spanish: pecador
  alternatives_spanish:
  - pecaminoso
  - que peca
  - impo
  lexicon: LSJ
  rationale: Como adjetivo atributivo con ἀνήρ, 'pecador' suena natural en español bíblico y conserva el matiz de una persona marcada por el pecado.
- source_word: ἐγκρατὴς ἔσται αὐτῶν
  english_pob_choice: will cling to them
  chosen_spanish: se apegará a ellas
  alternatives_spanish:
  - se aferrará a ellas
  - las retendrá
  - se mantendrá dominado por ellas
  lexicon: LSJ
  rationale: 'ἐγκρατής normalmente significa ''dominado de sí'' o ''continente'', pero aquí, con el genitivo αὐτῶν, la lectura del POB entiende una relación idiomática negativa: el hombre pecador permanece adherido a estos vicios. ''Se apegará a ellas'' reproduce esa idea en español sin forzar una equivalencia literal confusa.'
theological_decisions:
- issue: Distinción entre dos términos de ira/hostilidad
  english_pob_reading: Resentment and anger
  chosen_spanish_reading: La rencilla y la ira
  alternative_spanish_readings:
  - El resentimiento y la ira
  - El rencor y la ira
  - La ira vengativa y la ira
  rationale: El griego presenta dos sustantivos distintos, Μῆνις y ὀργή, y el POB procura no colapsarlos. 'Rencilla' aproxima la hostilidad persistente de Μῆνις, mientras 'ira' representa ὀργή con naturalidad en español.
  doctrine_reference: DOCTRINE.md §Translation philosophy 1, 3, 6
- issue: Interpretación negativa de ἐγκρατής con genitivo
  english_pob_reading: a sinful man will cling to them
  chosen_spanish_reading: un hombre pecador se apegará a ellas
  alternative_spanish_readings:
  - un hombre pecador se aferrará a ellas
  - un hombre pecador las retendrá
  - un hombre pecador será dominado por ellas
  rationale: 'La construcción es difícil y no debe traducirse de manera mecánica como una virtud de autocontrol. La versión española sigue la lectura contextual adoptada por el POB: el pecador permanece unido a esos vicios.'
  doctrine_reference: DOCTRINE.md §Translation philosophy 1, 3, 6
- issue: Mantenimiento del masculino singular de ἀνήρ
  english_pob_reading: a sinful man
  chosen_spanish_reading: un hombre pecador
  alternative_spanish_readings:
  - una persona pecadora
  - alguien pecador
  rationale: La forma griega es explícitamente masculina. Se conserva en español para respetar la precisión gramatical y la política de traducir con exactitud los marcadores de género cuando están presentes.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4
translation_notes:
  revision_awareness: La redacción española sigue de cerca la última revisión inglesa aprobada, que optó por 'cling to them' como la forma más natural de expresar ἐγκρατής ἔσται αὐτῶν. La traducción española conserva esa decisión interpretativa y mantiene la distinción lexical entre Μῆνις y ὀργή con un par equivalente en español.
  spanish_consistency_notes:
  - Se mantiene 'abominaciones' para βδελύγματα por consistencia con el registro bíblico y la carga moral del término.
  - Se evita 'SEÑOR' u otros sustitutos porque este versículo no contiene el nombre divino.
  - Se conserva el masculino singular 'un hombre' porque el original lo exige explícitamente.
  - La nota sobre Μῆνις ofrece una alternativa válida sin borrar la tensión lexical entre los dos términos de ira.
