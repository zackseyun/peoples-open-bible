translation:
  language: es
  text: Ahora, el resto de los hechos[a] de Salomón, desde el principio hasta el fin, ¿no están escritos en los registros de Natán el profeta, y en la profecía de Ahías el silonita, y en las visiones de Iddo el vidente, acerca de Jeroboam hijo de Nabat[b]?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'las palabras' o 'el relato' de Salomón. El hebreo דִּבְרֵי puede referirse tanto a palabras dichas como a un documento o relación escrita; aquí el contexto favorece una fuente historiográfica.
    reason: lexical_alternative
  - marker: b
    text: O 'sobre' o incluso 'contra Jeroboam hijo de Nabat'. La preposición hebrea admite varios matices relacionados; 'acerca de' conserva mejor el contexto de referencia documental.
    reason: lexical_alternative
lexical_decisions:
- source_word: וּשְׁאָר
  english_pob_choice: Now the rest of
  chosen_spanish: Ahora, el resto de
  alternatives_spanish:
  - Y el resto de
  - Así mismo, el resto de
  lexicon: HALOT
  rationale: שְׁאָר expresa 'resto' o 'lo que queda'. En español, 'Ahora' sirve para dar fluidez a la fórmula conclusiva sin añadir contenido, y 'el resto de' conserva el valor de remanente.
- source_word: דִּבְרֵי שְׁלֹמֹה
  english_pob_choice: the acts of Solomon
  chosen_spanish: los hechos de Salomón
  alternatives_spanish:
  - las palabras de Salomón
  - los asuntos de Salomón
  - las acciones de Salomón
  lexicon: HALOT
  rationale: En fórmulas historiográficas, דִּבְרֵי abarca hechos, asuntos o relatos, no solo palabras pronunciadas. 'Hechos' preserva el sentido amplio y evita restringir indebidamente el término a discurso verbal.
- source_word: הָרִאשֹׁנִים וְהָאֲחֲרוֹנִים
  english_pob_choice: from first to last
  chosen_spanish: desde el primero hasta el último
  alternatives_spanish:
  - los primeros y los últimos
  - de principio a fin
  lexicon: HALOT
  rationale: El modismo expresa la totalidad del período o de la historia de Salomón. 'Desde el primero hasta el último' reproduce ese alcance totalizante en un español natural.
- source_word: הֲלֹא הֵם כְּתוּבִים
  english_pob_choice: are they not written
  chosen_spanish: ¿no están escritos
  alternatives_spanish:
  - ¿no se hallan escritos
  - ¿acaso no están escritos
  lexicon: HALOT
  rationale: La pregunta retórica se conserva con estructura natural en español. 'Están escritos' mantiene el tono formal de referencia documental.
- source_word: עַל דִּבְרֵי נָתָן הַנָּבִיא
  english_pob_choice: in the records of Nathan the prophet
  chosen_spanish: en los registros de Natán el profeta
  alternatives_spanish:
  - en las palabras de Natán el profeta
  - en el relato de Natán el profeta
  lexicon: HALOT
  rationale: El contexto de cita documental favorece un sentido de fuente escrita. 'Registros' comunica bien esa dimensión archivística sin forzar una traducción demasiado interpretativa.
- source_word: נְבוּאַת אֲחִיָּה הַשִּׁילוֹנִי
  english_pob_choice: the prophecy of Ahijah the Shilonite
  chosen_spanish: la profecía de Ahías el silonita
  alternatives_spanish:
  - el oráculo de Ahías el silonita
  - la declaración profética de Ahías el silonita
  lexicon: HALOT
  rationale: נְבוּאָה se traduce de forma directa por 'profecía'. 'Silonita' conserva la gentilicia y la identificación tradicional del personaje.
- source_word: וּבַחֲזוֹת יֶעְדּוֹ הַחֹזֶה
  english_pob_choice: and in the visions of Iddo the seer
  chosen_spanish: y en las visiones de Iddo el vidente
  alternatives_spanish:
  - y en las visiones de Jedo el vidente
  - y en los escritos visionarios de Iddo el vidente
  lexicon: HALOT
  rationale: חֲזוֹת alude a visiones reveladas; 'visiones' preserva ese matiz. חֹזֶה es un título profético distinto de נָבִיא, y 'vidente' lo distingue adecuadamente en español.
- source_word: עַל יָרָבְעָם בֶּן נְבָט
  english_pob_choice: concerning Jeroboam son of Nebat
  chosen_spanish: acerca de Jeroboam hijo de Nabat
  alternatives_spanish:
  - sobre Jeroboam hijo de Nabat
  - contra Jeroboam hijo de Nabat
  lexicon: HALOT
  rationale: עַל puede significar 'acerca de', 'sobre' o, en ciertos contextos, 'contra'. En una lista de fuentes, el valor documental más natural es 'acerca de', sin borrar la posible tensión semántica.
translation_notes:
  revision_awareness: 'La traducción sigue de cerca el texto hebreo de WLC y armoniza con el criterio auditado de la POB inglesa: entender דִּבְרֵי como ''hechos/registros'' en un cierre historiográfico, y עַל como relación temática de fuente. No se aplicaron revisiones posteriores.'
  spanish_consistency_notes:
  - Se mantuvo 'Yahvé' fuera del versículo porque no aparece en el hebreo.
  - '''Natán'', ''Ahías'', ''Iddo'', ''Jeroboam'' y ''Nabat'' conservan formas españolas comunes y reconocibles.'
  - Se preservó la diferencia entre 'profeta' y 'vidente' para reflejar נָבִיא frente a חֹזֶה.
  - La puntuación reproduce la pregunta retórica y la enumeración de fuentes de modo claro y publicable.
