  yaml_path: translation/ot/isaiah/051/011.yaml
  text: And the redeemed of Yahweh will return and come to Zion with singing[a]; everlasting joy will be upon their heads; gladness and joy will overtake them[b]; sorrow and sighing will flee away.
  footnotes:
