translation:
  language: es
  text: Junto a ellos hizo reparaciones Jedaías hijo de Harumaf, frente a su casa[a], y junto a él hizo reparaciones Hatús hijo de Hasabnías.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «delante de su casa» para «frente a su casa».
    reason: lexical_alternative
lexical_decisions:
- source_word: וְעַל יָדָם
  english_pob_choice: Next to them
  chosen_spanish: Junto a ellos
  alternatives_spanish:
  - Y junto a ellos
  - Al lado de ellos
  lexicon: HALOT
  rationale: La expresión idiomática con עַל יָד aquí marca ubicación contigua en la lista de reconstrucción. «Junto a ellos» conserva la relación espacial y suena natural en español sin volver opaco el giro hebreo.
- source_word: הֶחֱזִיק
  english_pob_choice: made repairs
  chosen_spanish: trabajó
  alternatives_spanish:
  - hizo reparaciones
  - reparó
  - fortaleció
  lexicon: HALOT
  rationale: En Nehemías 3 el verbo es una fórmula repetida para la participación en la obra del muro. En español, «trabajó» mantiene el sentido funcional de participación en la reconstrucción; «hizo reparaciones» sería más explícito, pero menos fluido en esta cadena repetitiva.
- source_word: יְדָיָה
  english_pob_choice: Jedaiah
  chosen_spanish: Jedaías
  alternatives_spanish:
  - Yedaías
  lexicon: Transliteración estándar
  rationale: Se usa una forma española habitual de transliteración para el nombre propio, conservando la identificación del personaje sin castellanizarlo excesivamente.
- source_word: בֶן חֲרוּמַף
  english_pob_choice: son of Harumaph
  chosen_spanish: hijo de Harumaf
  alternatives_spanish:
  - hijo de Harumaph
  lexicon: Transliteración estándar
  rationale: Se mantiene la construcción genealógica directa. La forma «Harumaf» adapta la transliteración al uso español; la final f aspirada del hebreo se representa con una grafía natural para el lector hispanohablante.
- source_word: וְנֶגֶד בֵּיתוֹ
  english_pob_choice: opposite his house
  chosen_spanish: frente a su casa
  alternatives_spanish:
  - en frente de su casa
  - opuesto a su casa
  lexicon: HALOT
  rationale: נֶגֶד expresa lo que queda delante o enfrente. «Frente a su casa» conserva la relación espacial y es idiomático en español; además, mantiene abierta la posibilidad del matiz alternativo documentado en el texto fuente.
- source_word: וְעַל יָדוֹ
  english_pob_choice: and next to him
  chosen_spanish: y junto a él
  alternatives_spanish:
  - y al lado de él
  - y junto a su lado
  lexicon: HALOT
  rationale: Se conserva la misma idea de contigüidad que en la primera mitad del verso, ahora con referencia singular. «Y junto a él» es natural y reproduce el encadenamiento del listado.
- source_word: חַטּוּשׁ
  english_pob_choice: Hattush
  chosen_spanish: Hatús
  alternatives_spanish:
  - Jatús
  lexicon: Transliteración estándar
  rationale: Nombre propio transliterado en forma legible para el español.
- source_word: חֲשַׁבְנְיָה
  english_pob_choice: Hashabneiah
  chosen_spanish: Hasabnías
  alternatives_spanish:
  - Jasabnías
  lexicon: Transliteración estándar
  rationale: Se adapta el nombre propio al español con una transliteración estable y pronunciable, manteniendo la identidad del nombre sin introducir una forma litúrgica ajena al hebreo.
translation_notes:
  revision_awareness: 'El texto sigue de cerca el hebreo de WLC y el patrón formulístico de Nehemías 3. Se adopta una equivalencia óptima: se preserva la secuencia topográfica de la lista y la repetición del verbo de obra, evitando un calco poco natural de la expresión idiomática hebrea.'
  spanish_consistency_notes:
  - Se mantiene «Junto a ellos / y junto a él» para reflejar la repetición estructural del hebreo.
  - Se traduce הֶחֱזִיק en sentido de participación en la obra, no como simple «fortaleció».
  - Los nombres propios se transliteran de forma consistente y legible para español.
  - Se conserva la ambigüedad espacial de נֶגֶד mediante una nota de alternativa aceptada.
