translation:
  language: es
  text: Antes de enfermarte, humíllate y, cuando haya pecados, muestra arrepentimiento[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «muestra un volverse atrás» / «muestra tu regreso». El griego ἐπιστροφή puede denotar un giro o regreso; aquí se traduce «arrepentimiento» por la referencia inmediata a los pecados.
    reason: lexical_alternative
lexical_decisions:
- source_word: πρὶν
  english_pob_choice: Before
  chosen_spanish: Antes de
  alternatives_spanish:
  - Antes que
  - Antes de que
  lexicon: LSJ
  rationale: Marca temporal de anterioridad; «Antes de» es natural en español y conserva la relación de prioridad del mandamiento.
- source_word: ἀρρωστῆσαί
  english_pob_choice: become sick
  chosen_spanish: enfermarte
  alternatives_spanish:
  - ponerte enfermo
  - caer enfermo
  - llegar a enfermar
  lexicon: LSJ
  rationale: El infinitivo aoristo indica el ingreso a la enfermedad; «enfermarte» comunica bien ese comienzo del estado sin sonar forzado.
- source_word: ταπεινώθητι
  english_pob_choice: humble yourself
  chosen_spanish: humíllate
  alternatives_spanish:
  - humíllate a ti mismo
  - sé humillado
  - sométete
  lexicon: LSJ
  rationale: Aunque formalmente pasivo, el imperativo exhortativo tiene fuerza reflexiva; «humíllate» preserva la apelación moral y evita reducirlo a mera humillación externa.
- source_word: ἐν καιρῷ
  english_pob_choice: in the time of
  chosen_spanish: en el tiempo de
  alternatives_spanish:
  - cuando
  - en la ocasión de
  - al tiempo de
  lexicon: LSJ
  rationale: «καιρός» sugiere tiempo oportuno o determinado; «en el tiempo de» mantiene la relación temporal sin perder claridad.
- source_word: ἁμαρτημάτων
  english_pob_choice: sins
  chosen_spanish: los pecados
  alternatives_spanish:
  - los pecados cometidos
  - las transgresiones
  - las faltas
  lexicon: LSJ
  rationale: El genitivo plural apunta a actos/ocasiones de pecado; «los pecados» es la forma más directa y natural en español, con fuerza moral concreta.
- source_word: δεῖξον
  english_pob_choice: show
  chosen_spanish: muestra
  alternatives_spanish:
  - demuestra
  - manifiesta
  - haz evidente
  lexicon: LSJ
  rationale: Aoristo imperativo de δείκνυμι; «muestra» es la equivalencia más simple y mantiene la orden exhortativa.
- source_word: ἐπιστροφήν
  english_pob_choice: repentance
  chosen_spanish: arrepentimiento
  alternatives_spanish:
  - vuelta atrás
  - retorno
  - conversión
  lexicon: LSJ
  rationale: En contexto moral con referencia inmediata a los pecados, el sentido es un volver atrás del pecado. «Arrepentimiento» expresa de forma clara esa orientación ética/religiosa en español.
theological_decisions:
- issue: Sentido de ἐπιστροφήν junto a ἁμαρτημάτων
  english_pob_reading: repentance
  chosen_spanish_reading: arrepentimiento
  alternative_spanish_readings:
  - vuelta atrás
  - retorno
  - conversión
  rationale: La cercanía de «los pecados» orienta el término hacia una respuesta moral, no solo un regreso espacial o genérico. «Arrepentimiento» comunica el volver del mal en lenguaje bíblico natural para español sin añadir tecnicismos posteriores.
  doctrine_reference: Translation philosophy §§1, 3, 6
- issue: Fuerza de ταπεινώθητι en exhortación sapiencial
  english_pob_reading: humble yourself
  chosen_spanish_reading: humíllate
  alternative_spanish_readings:
  - sé humillado
  - sométete
  rationale: Aunque la forma verbal es pasiva, en este contexto sapiencial la exhortación apunta a una actitud voluntaria de humildad previa a la aflicción. «Humíllate» conserva esa responsabilidad personal.
  doctrine_reference: Translation philosophy §§1, 6
translation_notes:
  revision_awareness: El borrador sigue la última revisión inglesa, manteniendo la temporalidad más natural de ἐν καιρῷ como «en el tiempo de» y conservando la decisión auditada de leer ἐπιστροφήν como una respuesta moral de arrepentimiento. La frase verbal se ajusta al español sin perder la fuerza exhortativa del original.
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando corresponda al tetragrámaton; este versículo no lo contiene.
  - Se evita «Cristo/Mesías» porque no aparece en el texto.
  - «Arrepentimiento» conserva el valor ético de ἐπιστροφήν frente a alternativas más literales como «vuelta atrás».
  - «Humíllate» traduce la exhortación reflexiva del imperativo pasivo sin introducir una pasividad meramente externa.
