translation:
  language: es
  text: a menos que nos hayas rechazado del todo y estés muy airado con nosotros[a][b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Porque si nos has rechazado del todo y estás muy airado con nosotros», tomando la línea como una afirmación más autónoma que una excepción al ruego del versículo anterior.'
    reason: alternative_reading
  - marker: b
    text: 'O: «contra nosotros» o «sobre nosotros».'
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי אִם
  english_pob_choice: unless
  chosen_spanish: a menos que
  alternatives_spanish:
  - si no
  - salvo que
  - a no ser que
  lexicon: HALOT
  rationale: La locución hebrea funciona aquí como cláusula exceptiva o restrictiva. «A menos que» expresa en español esa apertura de excepción de manera natural y mantiene la relación con la súplica previa sin resolverla demasiado.
- source_word: מָאֹס מְאַסְתָּנוּ
  english_pob_choice: you have utterly rejected us
  chosen_spanish: nos hayas rechazado del todo
  alternatives_spanish:
  - nos hayas rechazado por completo
  - nos hayas desechado del todo
  - nos hayas despreciado del todo
  lexicon: HALOT
  rationale: El infinitivo absoluto con el verbo finito intensifica la idea. «Del todo» comunica la fuerza enfática sin volver el español artificial. «Rechazado» conserva mejor el sentido del contexto de lamentación que «despreciado», aunque este también sea posible léxicamente.
- source_word: קָצַפְתָּ
  english_pob_choice: are angry
  chosen_spanish: estés sumamente airado
  alternatives_spanish:
  - estés muy enojado
  - estés airado
  - hayas estado airado
  lexicon: HALOT
  rationale: Aunque el hebreo está en perfecto, el español puede reflejar aquí una condición actual vinculada al cierre poético del lamento. «Sumamente airado» preserva el tono elevado y la intensidad del verbo mejor que un simple «enojado».
- source_word: עָלֵינוּ
  english_pob_choice: with us
  chosen_spanish: con nosotros
  alternatives_spanish:
  - contra nosotros
  - sobre nosotros
  lexicon: HALOT
  rationale: El inglés POB preserva la tensión entre el valor literal de על y el uso idiomático con la ira. En español, «airado con nosotros» es más natural, pero el matiz hostil de «contra nosotros» queda implícito sin necesidad de añadir una construcción dura que podría sobrecargar el verso.
- source_word: עַד מְאֹד
  english_pob_choice: exceedingly
  chosen_spanish: sumamente
  alternatives_spanish:
  - en gran manera
  - muchísimo
  - muy
  lexicon: HALOT
  rationale: La expresión intensifica fuertemente la ira. «Sumamente» conserva el registro elevado y la intensidad del hebreo mejor que «muy», que sería demasiado débil.
theological_decisions:
- issue: Si la cláusula debe leerse como excepción al ruego anterior o como afirmación independiente
  english_pob_reading: 'An exception clause: ''unless you have utterly rejected us...,'''' continuing the thought of v. 21'
  chosen_spanish_reading: 'Una cláusula exceptiva: «a menos que nos hayas rechazado del todo...»'
  alternative_spanish_readings:
  - 'Una afirmación independiente: «porque nos has rechazado del todo...»'
  - «si es que nos has rechazado del todo...»
  rationale: Se conserva la lectura exceptiva porque el hebreo כִּי אִם la permite de forma natural y porque el cierre del libro debe mantener abierta la tensión del lamento. El español «a menos que» comunica esa dependencia de la petición anterior sin convertir el verso en una conclusión cerrada.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: 'El pasaje coincide con la última revisión auditada: no se registraron cambios pendientes y el veredicto de control cruzado fue de alta concordancia. Se mantuvo la misma decisión de lectura exceptiva y la intensificación verbal, ajustando únicamente la formulación española para que suene natural y publi­cable sin perder la tensión teológica del hebreo.'
  spanish_consistency_notes:
  - Se conservó «Yahvé» como nombre divino por norma del proyecto, aunque en este versículo no aparece.
  - Se prefirió «rechazado» frente a «despreciado» para mantener la fuerza covenantal del verbo מאס en un lamento comunitario.
  - Se evitó traducir mecánicamente «con nosotros» por «contra nosotros» en el cuerpo principal, reservando esa posibilidad para la nota porque el español idiomático con ira exige una construcción distinta.
  - Se mantuvo un nivel de registro sobrio y bíblico, pero con sintaxis española natural, acorde con el estilo POB en castellano.
