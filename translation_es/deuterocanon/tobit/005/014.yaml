revisions:
- from: 'Y le dijo: «Que vengas sano, hermano; y no te enojes conmigo porque quise conocer tu tribu y tu familia. Y tú resultaste ser mi hermano, de una genealogía buena y noble. Porque yo conocía a Ananías y a Jatán, los hijos de Semeí el grande, cuando íbamos juntos a Jerusalén para adorar, llevando los primogénitos y los diezmos de los productos; y no se extraviaron en el error de nuestros hermanos[b]. De buena raíz eres, hermano[a]».'
  to: 'Y le dijo: «Que vengas sano, hermano; y no te enojes conmigo porque quise conocer tu tribu y tu familia. Y tú resultaste ser mi hermano, de buen y noble linaje. Porque yo conocía a Ananías y a Jatán, los hijos de Semeí el grande, como solíamos ir juntos a Jerusalén para adorar, llevando los primogénitos y los diezmos de los productos; y no se extraviaron en el error de nuestros hermanos[a]. De buena raíz[b] eres, hermano».'
  rationale: Se corrigen los marcadores de notas para que coincidan con sus anclas y sigan el orden normal. Se reemplaza 'genealogía' por 'linaje' para reflejar mejor γενεᾶς y mejorar la naturalidad del español. También se ajusta la cláusula de viaje compartido a 'como solíamos ir juntos' para representar mejor el matiz habitual del griego y del audit trail inglés, sin cambiar el sentido general del borrador.
