translation:
  language: es
  text: Y le envió vasijas de oro[a] y servicio de mesa[b], y le dio autorización para beber de vasijas de oro[a], y para vestir púrpura y llevar un broche de oro[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «objetos de oro» o «vajilla de oro» para el término griego repetido χρυσώματα.
    reason: lexical_alternative
  - marker: b
    text: La expresión traducida «servicio de mesa» también puede significar equipo de servicio o, menos probablemente, asistentes para servir.
    reason: lexical_alternative
  - marker: c
    text: O «un broche de oro» o «un prendedor de oro»; el término griego se refiere a un cierre ornamental para la vestidura.
    reason: lexical_alternative
lexical_decisions:
- source_word: χρυσώματα
  english_pob_choice: gold vessels
  chosen_spanish: objetos de oro
  alternatives_spanish:
  - vasos de oro
  - utensilios de oro
  - vajilla de oro
  lexicon: LSJ
  rationale: El griego plural nombra artículos hechos de oro; en este contexto cortesano no conviene restringirlo a vasos solamente. «Objetos de oro» conserva amplitud y sigue la nota auditada de que puede referirse a objetos/placa de oro.
- source_word: διακονίαν
  english_pob_choice: table service
  chosen_spanish: servicio de mesa
  alternatives_spanish:
  - servicio
  - enseres de servicio
  - servicio doméstico
  lexicon: LSJ
  rationale: La coordinación con χρυσώματα sugiere equipo o servicio para la mesa, no el ministerio abstracto. «Servicio de mesa» es natural en español y mantiene el contexto de regalo regio.
- source_word: ἐξουσίαν
  english_pob_choice: authority
  chosen_spanish: autorización
  alternatives_spanish:
  - autoridad
  - permiso
  - privilegio
  lexicon: BDAG
  rationale: Aquí la idea es un derecho concedido por un rey para hacer algo en la corte. «Autorización» expresa bien la concesión práctica; «autoridad» también sería posible, pero en español puede sonar más abstracta.
- source_word: πίνειν ἐν χρυσώμασιν
  english_pob_choice: to drink from gold vessels
  chosen_spanish: beber en objetos de oro
  alternatives_spanish:
  - beber de vasos de oro
  - beber en vasos de oro
  - beber de vajilla de oro
  lexicon: LSJ
  rationale: El giro indica usar recipientes de oro para beber. «En objetos de oro» sigue de cerca la amplitud del término griego y evita precisar demasiado el tipo exacto de recipiente.
- source_word: εἶναι ἐν πορφύρᾳ
  english_pob_choice: to be clothed in purple
  chosen_spanish: vestir púrpura
  alternatives_spanish:
  - ir vestido de púrpura
  - estar vestido de púrpura
  - ser revestido de púrpura
  lexicon: LSJ
  rationale: La frase denota el uso de vestiduras púrpuras de rango real. «Vestir púrpura» es conciso, digno y idiomático en español, sin perder el valor ceremonial.
- source_word: πόρπην χρυσῆν
  english_pob_choice: a gold clasp
  chosen_spanish: broche de oro
  alternatives_spanish:
  - clasp de oro
  - hebilla de oro
  - broche dorado
  lexicon: LSJ
  rationale: πόρπη es un adorno o cierre para la vestidura; en español «broche» comunica mejor el valor ornamental y de estatus que «hebilla». Mantiene la observación revisada en el audit trail de que clasp es la mejor equivalencia.
translation_notes:
  revision_awareness: 'El texto sigue el audit trail inglés: se mantiene la amplitud de χρυσώματα y la función cortesana de διακονίαν; se refleja la revisión final sobre πόρπη como adorno de cierre, traducido aquí como «broche de oro». No se añaden notas porque el español no introduce una ambigüedad significativa que el texto principal no pueda sostener con claridad.'
  spanish_consistency_notes:
  - Se evita «SEÑOR» y terminología teológica no pertinente porque el versículo es descriptivo y cortesano.
  - 'Se conserva la secuencia coordinada del griego: envío de regalos, concesión de autorización y tres privilegios consecutivos.'
  - «Púrpura» se usa como sustantivo de vestidura de rango, no como color abstracto.
