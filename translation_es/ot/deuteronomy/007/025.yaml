review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador capta en general el sentido del hebreo: quemar las imágenes de sus dioses, no codiciar ni tomar el metal precioso adherido a ellas, para no quedar atrapado, porque eso es abominación para Yahvé. Sin embargo, introduce una expansión no sustentada por la fuente al duplicar ''imágenes talladas'' con ''las imágenes de sus dioses'', como si fueran dos elementos en aposición explícita. El hebreo simplemente dice ''las imágenes talladas de sus dioses''. También la nota a no corresponde al rastro inglés, que preserva una alternativa sobre ''plata y oro'' vs. ''plata o oro'', no sobre una supuesta aposición inicial.'
  spanish_quality_summary: El español es mayormente claro y digno, pero la frase inicial suena redundante y artificial por la duplicación. 'Para que no quedes atrapado' funciona, aunque 'no sea que quedes atrapado' refleja mejor פֶּן en advertencia. 'Por ello' y 'ello' son comprensibles, pero conviene una redacción más fluida. El resto mantiene buena legibilidad eclesial.
  glossary_alignment: Alinea bien con la terminología del proyecto en 'Yahvé', 'abominación' y el sentido concreto de פְּסִילֵי como 'imágenes talladas'. No hay conflictos mayores de glosario. Sí debe ajustarse la gestión de notas para reflejar las alternativas documentadas en el POB inglés.
  issues:
  - severity: high
    issue: 'La frase inicial duplica indebidamente el objeto: ''Sus imágenes talladas, las imágenes de sus dioses'''
    rationale: 'פְּסִילֵי אֱלֹהֵיהֶם es una sola construcción nominal en estado constructo: ''las imágenes talladas de sus dioses''. La duplicación añade una aposición que no está exigida por la fuente y vuelve la frase menos natural.'
  - severity: high
    issue: La nota [a] no corresponde a la evidencia ni al rastro de auditoría inglés
    rationale: La nota inglesa a registra una alternativa para 'silver and gold' con 'or' en inglés, no una lectura alternativa de la frase inicial. La nota española actual documenta una posibilidad exegética no respaldada aquí y omite la alternativa relevante.
  - severity: medium
    issue: '''para que no quedes atrapado'' expresa finalidad más que advertencia'
    rationale: פֶּן introduce prevención/advertencia ('no sea que', 'para que no ...' puede funcionar), pero en este contexto 'no sea que' refleja mejor el matiz y suena más natural unido a una prohibición.
  - severity: low
