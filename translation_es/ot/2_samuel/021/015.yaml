translation:
  language: es
  text: Y hubo otra vez guerra entre los filisteos e Israel[a], y David descendió con sus siervos con él, y pelearon contra los filisteos, y David se fatigó.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «sus hombres». El hebreo dice «sus siervos», una expresión común para quienes estaban al servicio del rey, incluidos hombres de su séquito militar.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַתְּהִי
  english_pob_choice: there was
  chosen_spanish: hubo
  alternatives_spanish:
  - y hubo
  - y existió
  - y aconteció
  lexicon: HALOT
  rationale: La construcción narrativa introduce un nuevo hecho; «hubo» preserva el sentido existencial de forma natural en español.
- source_word: ע֧וֹד
  english_pob_choice: again
  chosen_spanish: otra vez
  alternatives_spanish:
  - de nuevo
  - todavía
  - aún
  lexicon: HALOT
  rationale: Aquí expresa recurrencia de la guerra; «otra vez» comunica repetición con claridad y sin forzar el registro.
- source_word: מִלְחָמָה
  english_pob_choice: war
  chosen_spanish: guerra
  alternatives_spanish:
  - batalla
  - combate
  - lucha
  lexicon: HALOT
  rationale: El sustantivo denota conflicto bélico amplio; «guerra» conserva mejor el alcance colectivo que «batalla».
- source_word: לַפְּלִשְׁתִּים אֶת יִשְׂרָאֵל
  english_pob_choice: between the Philistines and Israel
  chosen_spanish: entre los filisteos e Israel
  alternatives_spanish:
  - para los filisteos contra Israel
  - con los filisteos contra Israel
  lexicon: HALOT
  rationale: Aunque el hebreo usa una construcción de oposición, en español la relación se expresa con naturalidad como «entre ... e ...» para reflejar dos bandos enfrentados.
- source_word: וַיֵּרֶד
  english_pob_choice: went down
  chosen_spanish: descendió
  alternatives_spanish:
  - bajó
  - fue hacia abajo
  - marchó hacia abajo
  lexicon: HALOT
  rationale: «Descendió» conserva la imagen direccional del verbo hebreo y funciona bien en español bíblico contemporáneo.
- source_word: וַעֲבָדָיו
  english_pob_choice: his servants
  chosen_spanish: sus siervos
  alternatives_spanish:
  - sus servidores
  - sus hombres
  - sus retenedores
  lexicon: HALOT
  rationale: Se mantiene «siervos» para preservar la forma léxica del hebreo y el matiz de servicio real/militar documentado en la nota inglesa.
- source_word: עִמּוֹ
  english_pob_choice: with him
  chosen_spanish: con él
  alternatives_spanish:
  - junto con él
  - con él mismo
  lexicon: HALOT
  rationale: Equivale directamente al sintagma preposicional y evita redundancia excesiva en español; la repetición enfática del texto se conserva en la estructura general.
- source_word: וַיִּלָּחֲמוּ אֶת־פְּלִשְׁתִּים
  english_pob_choice: they fought against the Philistines
  chosen_spanish: pelearon contra los filisteos
  alternatives_spanish:
  - combatieron contra los filisteos
  - lucharon contra los filisteos
  - hicieron guerra contra los filisteos
  lexicon: HALOT
  rationale: «Pelearon contra» refleja adecuadamente el valor de combatir en contexto de guerra y mantiene la oposición explícita expresada en la revisión inglesa.
- source_word: וַיָּעַף
  english_pob_choice: grew weary
  chosen_spanish: se cansó
  alternatives_spanish:
  - se fatigó
  - quedó agotado
  - desfalleció
  lexicon: HALOT
  rationale: El verbo expresa volverse débil o cansado; «se cansó» es claro y natural en español, y no añade una intensidad mayor que la atestiguada por el hebreo.
translation_notes:
  revision_awareness: La redacción inglesa revisada añadió «against» en la cláusula de combate para reflejar con mayor naturalidad la construcción verbal. En español se reprodujo ese matiz con «contra», manteniendo sin cambios la referencia a los filisteos y el resto de la línea narrativa.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» solo cuando el hebreo lo exigiera; este versículo no contiene el nombre divino.
  - «filisteos» se escribió en minúscula por tratarse de un gentilicio en español.
  - Se conservó el paralelismo narrativo de acciones sucesivas con una sola cadena coordinada.
  - «siervos» se usó como equivalente de עֲבָדָיו, conforme al contexto real-militar señalado por la nota de auditoría inglesa.
