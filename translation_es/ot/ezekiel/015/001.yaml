lexical_decisions:
- source_word: וַיְהִי
  english_pob_choice: came
  chosen_spanish: vino
  alternatives_spanish:
  - llegó
  - fue
  lexicon: HALOT
  rationale: En la fórmula profética דְבַר יְהוָה ... אֵלַי, el español natural y fiel es «vino»; conserva el movimiento de la palabra divina hacia el profeta sin volver la frase rígida o impersonal.
- source_word: דְבַר
  english_pob_choice: the word
  chosen_spanish: la palabra
  alternatives_spanish:
  - el mensaje
  - la comunicación
  lexicon: HALOT
  rationale: «La palabra» preserva la fórmula profética recurrente y su fuerza teológica mejor que una paráfrasis interpretativa como «mensaje».
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: Se conserva el nombre propio divino como «Yahvé», siguiendo la decisión del proyecto para יְהוָה y evitando la sustitución por un título.
- source_word: אֵלַי
  english_pob_choice: to me
  chosen_spanish: a mí
  alternatives_spanish:
  - para mí
  - hacia mí
  lexicon: HALOT
  rationale: La preposición con sufijo de primera persona se expresa de manera directa como «a mí»; es la opción más transparente y idiomática en español.
- source_word: לֵאמֹר
  english_pob_choice: saying
  chosen_spanish: diciendo
  alternatives_spanish:
  - y dijo
  - 'así:'
  - para decir
  lexicon: HALOT
  rationale: «Diciendo» reproduce la función introductoria de לֵאמֹר en la fórmula narrativa y prepara la cita que continúa en el versículo siguiente.
theological_decisions:
- issue: Renderizado del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - Jehová
  rationale: El texto hebreo contiene explícitamente el Tetragrámaton. En español se mantiene la transliteración del nombre propio para no ocultar la referencia al pacto y para armonizar con la política terminológica del proyecto.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Fórmula profética de introducción
  english_pob_reading: And the word of Yahweh came to me, saying,
  chosen_spanish_reading: 'Y vino la palabra de Yahvé a mí, diciendo:'
  alternative_spanish_readings:
  - 'La palabra de Yahvé vino a mí, diciendo:'
  - 'Y la palabra de Yahvé llegó a mí, diciendo:'
  rationale: La fórmula hebrea estándar admite en español una construcción verbal de movimiento («vino») que conserva el valor formular y la naturalidad sintáctica, sin perder el matiz de revelación dirigida al profeta.
  doctrine_reference: Uso profético recurrente en los libros proféticos; coherente con el patrón narrativo del hebreo bíblico
translation_notes:
  revision_awareness: 'Se corrigió el problema de validación anterior: el marcador [a] ahora aparece en el texto español exactamente donde corresponde, y no hay notas huérfanas. La redacción sigue de cerca la fórmula hebrea y el audit trail inglés, manteniendo la decisión terminológica para el nombre divino.'
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» como renderización uniforme de יְהוָה, según la política del proyecto.
  - «Palabra» se conservó para reflejar la fórmula profética y evitar una paráfrasis más débil como «mensaje».
  - La sintaxis española usa una apertura natural («Y vino...») que preserva el orden formular hebreo sin resultar forzada.
