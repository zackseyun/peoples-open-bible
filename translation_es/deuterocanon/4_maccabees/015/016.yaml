lexical_decisions:
- source_word: σάρκας
  english_pob_choice: flesh
  chosen_spanish: carnes
  alternatives_spanish:
  - carne
  - cuerpos
  - trozos de carne
  lexicon: LSJ
  rationale: El plural griego σάρκας pide un plural español. «Carnes» conserva el sentido corpóreo y desgarrado del contexto martirial, sin suavizarlo a «cuerpos» ni volverlo demasiado literal con «trozos de carne».
- source_word: ὥσπερ
  english_pob_choice: like
  chosen_spanish: como
  alternatives_spanish:
  - igual que
  - tal como
  lexicon: LSJ
  rationale: Introduce una comparación directa; «como» es la equivalencia natural y sobria en español.
- source_word: προσωπεῖα
  english_pob_choice: masks
  chosen_spanish: máscaras
  alternatives_spanish:
  - rostros
  - caretas
  - viseras
  lexicon: LSJ
  rationale: El término griego designa máscaras, no rostros literales. «Máscaras» preserva la imagen teatral y el extrañamiento de la comparación.
- source_word: προκειμένας
  english_pob_choice: laid out before them
  chosen_spanish: puestas delante de ellos
  alternatives_spanish:
  - colocadas delante de ellos
  - puestas ante ellos
  - extendidas delante de ellos
  lexicon: LSJ
  rationale: El participio expresa algo puesto o dispuesto delante. «Puestas delante de ellos» mantiene la idea de disposición visible sin cargar el español con una calca rígida.
translation_notes:
  revision_awareness: El texto griego es breve y descriptivo; la versión inglesa revisó ‘lying before them’ por ‘laid out before them’ para reflejar mejor προκειμένας. La traducción española sigue ese ajuste con una construcción de disposición visible («puestas delante de ellos»), y conserva la imagen de máscaras con una nota cultural.
  spanish_consistency_notes:
  - Se mantiene «máscaras» para προσωπεῖα, coherente con el valor teatral indicado por la auditoría inglesa.
  - Se evita introducir vocabulario interpretativo adicional; la frase queda deliberadamente compacta como en el griego.
  - Se usa puntuación española natural con coma tras el sustantivo principal y antes del símil.
