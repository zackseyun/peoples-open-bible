translation:
  language: es
  text: Maldito será el fruto de tu vientre, y el fruto de tu tierra[a], las crías de tu ganado[b] y las crías de tus rebaños[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'el producto de tu tierra'. El hebreo dice literalmente 'el fruto de tu tierra', conservando el paralelismo con 'el fruto de tu vientre'.
    reason: lexical_alternative
  - marker: b
    text: 'Las expresiones hebreas aquí se refieren específicamente a las crías o al aumento del ganado: ganado mayor y rebaños de ovejas o cabras.'
    reason: cultural_note
lexical_decisions:
- source_word: אָרוּר
  english_pob_choice: Cursed shall be
  chosen_spanish: Maldito será
  alternatives_spanish:
  - Cursed será
  - Acurrado será
  lexicon: HALOT
  rationale: En español, la forma natural y solemne para una fórmula de maldición es 'maldito será'. Mantiene el valor predicativo del hebreo en un tono de pacto/castigo sin introducir una paráfrasis.
- source_word: פְּרִי בִטְנְךָ
  english_pob_choice: the fruit of your womb
  chosen_spanish: el fruto de tu vientre
  alternatives_spanish:
  - el fruto de tu matriz
  - la descendencia de tu vientre
  lexicon: HALOT
  rationale: Conservo el paralelismo metafórico del hebreo ('fruto') y el sentido idiomático de progenie. 'Vientre' comunica el cuerpo materno de forma natural en español y corresponde al uso bíblico.
- source_word: וּפְרִי אַדְמָתֶךָ
  english_pob_choice: the fruit of your ground
  chosen_spanish: el fruto de tu tierra
  alternatives_spanish:
  - el fruto de tu suelo
  - el producto de tu tierra
  lexicon: HALOT
  rationale: '''Adamah'' puede significar tierra cultivable o suelo. ''Tierra'' es claro en español y preserva el paralelismo con ''fruto de tu vientre''. ''Producto'' explicita el sentido pero debilita la imagen del texto.'
- source_word: שְׁגַר
  english_pob_choice: the offspring of
  chosen_spanish: el producto de
  alternatives_spanish:
  - la cría de
  - la descendencia de
  lexicon: HALOT
  rationale: Este sustantivo se refiere a la cría o progenie de animales. En español, 'producto de' funciona como sustantivo colectivo para el aumento de ganado sin forzar un término demasiado técnico o arcaico. La alternativa 'cría de' se reserva más naturalmente para animales individuales.
- source_word: אֲלָפֶיךָ
  english_pob_choice: your herds
  chosen_spanish: tus rebaños
  alternatives_spanish:
  - tu ganado
  - tus hatos
  lexicon: HALOT
  rationale: Aunque el hebreo puede referirse específicamente al ganado bovino, 'rebaños' conserva el sentido colectivo de animales domésticos en un registro bíblico comprensible. 'Ganado' también sería posible, pero 'rebaños' enlaza mejor con la mitad final del verso.
- source_word: וְעַשְׁתְּרֹת צֹאנֶךָ
  english_pob_choice: and the young of your flocks
  chosen_spanish: y las crías de tus ovejas
  alternatives_spanish:
  - y los aumentos de tus flocks
  - y la cría de tus rebaños
  lexicon: HALOT
  rationale: El hebreo apunta a la cría/incremento del ganado menor. 'Crías' expresa con claridad el sentido biológico. 'Ovejas' es una simplificación aceptable en español para el colectivo de צאן, aunque el término puede abarcar ovejas y cabras; aquí se elige por inteligibilidad y naturalidad.
translation_notes:
  revision_awareness: 'Alineado con el tramo más reciente del audit trail: se mantiene el paralelismo metafórico del hebreo y la lectura de ''young/offspring'' para la ganadería, evitando cualquier confusión con el nombre de una deidad. No se reportan revisiones aplicadas en el pass más reciente, y el estado de concordancia es alto.'
  spanish_consistency_notes:
  - Se mantiene 'fruto de...' para conservar el paralelismo hebreo entre descendencia humana y producción agrícola.
  - Se evita 'SEÑOR' o sustitutos teológicos porque el versículo no contiene el nombre divino.
  - '''Ovejas'' se usa como término representativo de צאן; en este contexto bíblico puede abarcar el rebaño menor en general.'
