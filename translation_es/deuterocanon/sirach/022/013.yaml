translation:
  language: es
  text: No multipliques palabras con un necio, y no te acerques a un hombre insensato. Aléjate de él, para que no tengas fatiga y no quedes contaminado por su arrebato[a]. Apártate de él, y hallarás descanso, y no te cansarás a causa de su locura.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El griego ἐν τῷ ἐντιναγμῷ αὐτοῦ es raro y de sentido incierto; puede aludir al arrebato, sacudida o conducta disruptiva del necio. Se conserva una traducción interpretativa sobria para no exagerar la certeza del matiz.
    reason: lexical_alternative
lexical_decisions:
- source_word: μετὰ ἄφρονος
  english_pob_choice: with a fool
  chosen_spanish: con un necio
  alternatives_spanish:
  - con un insensato
  - con un hombre necio
  lexicon: BDAG
  rationale: ἄφρων designa en literatura sapiencial a una persona necia o falta de sensatez. «Necio» conserva bien la categoría moral del proverbio y suena natural en español bíblico sin suavizar el juicio del texto.
- source_word: μὴ πληθύνῃς λόγον
  english_pob_choice: do not multiply words
  chosen_spanish: No multipliques palabras
  alternatives_spanish:
  - No hables demasiado
  - No prolongues la conversación
  lexicon: BDAG
  rationale: La imagen literal de «multiplicar palabras» se mantiene porque el griego expresa un giro proverbial muy directo. En español suena comprensible y conserva la advertencia de no extender el habla inútilmente.
- source_word: πρὸς ἀσύνετον μὴ πορεύου
  english_pob_choice: do not go near an unintelligent man
  chosen_spanish: no vayas cerca de un hombre insensato
  alternatives_spanish:
  - no te acerques a un hombre sin entendimiento
  - no vayas con un hombre falto de discernimiento
  lexicon: BDAG
  rationale: ἀσύνετος apunta a alguien sin entendimiento o discernimiento. «Insensato» encaja mejor que un tecnicismo moderno como «inteligente» y, junto con «vayas cerca», refleja con naturalidad el valor direccional de πορεύου.
- source_word: φύλαξαι ἀπʼ αὐτοῦ
  english_pob_choice: keep away from him
  chosen_spanish: Aléjate de él
  alternatives_spanish:
  - Guárdate de él
  - Mantente lejos de él
  lexicon: BDAG
  rationale: El imperativo medio pide distancia preventiva y autocuidado. «Aléjate de él» es idiomático en español y comunica bien la advertencia práctica del proverbio.
- source_word: κόπον ἔχῃς
  english_pob_choice: have trouble
  chosen_spanish: tengas fatiga
  alternatives_spanish:
  - tengas molestia
  - sufras dificultad
  lexicon: BDAG
  rationale: κόπος puede ser «fatiga», «trabajo penoso» o «dificultad». Aquí, en el marco de la relación con el necio, «fatiga» preserva el sentido de carga penosa que agota al que se expone a él.
- source_word: μολυνθῇς
  english_pob_choice: be defiled
  chosen_spanish: quedes contaminado
  alternatives_spanish:
  - quedes manchado
  - quedes impuro
  lexicon: BDAG
  rationale: μολύνω puede expresar contaminación moral o ritual. «Quedes contaminado» mantiene la fuerza de impureza/contagio sin imponer una terminología litúrgica que el contexto no desarrolla explícitamente.
- source_word: ἐν τῷ ἐντιναγμῷ αὐτοῦ
  english_pob_choice: by his outburst
  chosen_spanish: por su arrebato
  alternatives_spanish:
  - por su sacudida
  - por su estallido
  lexicon: LSJ
  rationale: ἐντιναγμός es raro y difícil; el audit trail inglés lo trató como un comportamiento disruptivo, y la revisión prefirió «outburst». «Arrebato» conserva la idea de una explosión o manifestación brusca, sin fingir certeza sobre el matiz exacto del término griego.
- source_word: ἔκκλινον ἀπʼ αὐτοῦ
  english_pob_choice: turn aside from him
  chosen_spanish: Apártate de él
  alternatives_spanish:
  - Desvíate de él
  - Vuélvete de él
  lexicon: BDAG
  rationale: ἔκκλινον expresa apartarse o desviarse. «Apártate de él» es claro, natural y mantiene el movimiento de separación aconsejado por la sabiduría del texto.
- source_word: ἀνάπαυσιν
  english_pob_choice: rest
  chosen_spanish: descanso
  alternatives_spanish:
  - reposo
  - alivio
  lexicon: BDAG
  rationale: ἀνάπαυσις significa descanso o reposo. «Descanso» es la opción más natural y comunicativa en español, y conserva bien el contraste con la fatiga del verso.
- source_word: οὐ μὴ ἀκηδιάσῃς
  english_pob_choice: you will not be wearied
  chosen_spanish: no te cansarás
  alternatives_spanish:
  - no desfallecerás
  - no te agobiarás
  lexicon: LSJ
  rationale: ἀκηδιάω puede implicar cansancio, hastío o desánimo. Dado el contexto de carga relacional, «no te cansarás» comunica con claridad el resultado buscado por el proverbio.
- source_word: ἐν τῇ ἀπονοίᾳ αὐτοῦ
  english_pob_choice: because of his madness
  chosen_spanish: a causa de su locura
  alternatives_spanish:
  - a causa de su insensatez
  - por su demencia
  lexicon: LSJ
  rationale: ἀπόνοια puede referirse a locura, insensatez o desvarío. «Locura» conserva la fuerza del término griego y permite reflejar la severidad del diagnóstico sin suavizarlo.
theological_decisions:
- issue: Término moral sapiencial para el necio
  english_pob_reading: fool / unintelligent man
  chosen_spanish_reading: necio / insensato
  alternative_spanish_readings:
  - falto de entendimiento
  - sin discernimiento
  rationale: El verso no describe capacidad intelectual en sentido moderno, sino falta de sensatez moral y discernimiento. «Necio» e «insensato» mantienen esa dimensión sapiencial sin psicologizar el texto.
  doctrine_reference: Sabiduría bíblica / literatura sapiencial
- issue: Contaminación moral o ritual por asociación
  english_pob_reading: be defiled
  chosen_spanish_reading: quedes contaminado
  alternative_spanish_readings:
  - quedes impuro
  - quedes manchado
  rationale: El griego permite una contaminación más amplia que la meramente física. «Contaminado» deja abierta la fuerza moral y social del término, coherente con la advertencia sapiencial.
  doctrine_reference: Pureza moral y separación del mal
- issue: Madness as strong wisdom-judgment language
  english_pob_reading: his madness
  chosen_spanish_reading: su locura
  alternative_spanish_readings:
  - su insensatez
  - su desvarío
  rationale: «Locura» conserva la gravedad del juicio final del verso. Aunque «insensatez» sería viable, la elección mantiene la intensidad del cierre del proverbio, sin convertirlo en una mera falta de prudencia.
  doctrine_reference: Diagnóstico sapiencial del necio
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión más reciente del audit trail inglés, que ajustó el movimiento de πορεύου a un valor más natural de cercanía («go near»), reemplazó la literalidad poco idiomática de ἐντιναγμός por una lectura de comportamiento disruptivo («outburst»), y prefirió una formulación formal de ἀκηδιάσῃς como «be wearied by». La redacción española refleja esas decisiones con «vayas cerca», «arrebato» y «no te cansarás», manteniendo además la literalidad proverbial donde el español lo permite.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» por coherencia POB general, pero este versículo no contiene el nombre divino.
  - «Necio» e «insensato» se usaron como pareja funcional para ἄφρων / ἀσύνετος sin uniformarlos artificialmente.
  - Se evitó «siervo» o vocabulario eclesiástico tradicional, porque el pasaje es sapiencial y no requiere terminología confesional.
  - 'La secuencia verbal conserva el paralelismo del griego: advertencia, distancia, efecto, y resultado de descanso.'
