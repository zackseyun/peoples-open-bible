review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la fórmula territorial hebrea: «junto al/límite de Aser, desde el lado oriental hasta el lado occidental, Neftalí, una porción». También preserva correctamente el valor elíptico de אֶחָד con «una porción». Sin embargo, hay una inconsistencia onomástica importante: el texto español dice «Asher» mientras el propio análisis léxico reconoce «Aser» como forma española natural, y la justificación de mantener «Asher» por seguir el inglés no concuerda con el encargo de español legible y no mecánicamente dependiente del inglés.'
  spanish_quality_summary: 'La redacción es clara y digna. «Y junto al límite de Aser» y «desde el lado oriental hasta el lado occidental» suenan naturales. La nota al pie es útil, pero su español puede pulirse ligeramente eliminando comillas y artículo innecesarios para mayor fluidez. El principal ajuste necesario es normalizar el nombre tribal al español habitual: «Aser».'
  glossary_alignment: No hay términos teológicos sensibles aquí. El manejo de nombres propios está mayormente bien con «Neftalí», pero «Asher» desentona con el estilo español neutral y con la práctica bíblica estándar; debe ser «Aser». La suplencia contextual de «porción» concuerda con la auditoría inglesa y con el hebreo elíptico.
  issues:
  - severity: medium
    issue: Uso de «Asher» en lugar de «Aser»
    rationale: El proyecto pide español natural y no una transliteración dependiente del inglés cuando no haga falta. En español bíblico general la tribu se conoce como «Aser». Mantener «Asher» reduce legibilidad y contradice la propia nota léxica que reconoce «Aser» como adaptación española.
  - severity: low
    issue: Anclaje de la nota al pie en «una porción»
    rationale: La nota explica la suplencia de «porción», por lo que conviene anclarla exactamente en esa expresión, no dejarla parecer pospuesta a toda la oración. El borrador ya la coloca al final de la frase; mantenerla tras «porción» conserva claridad.
  - severity: low
    issue: Redacción mejorable de la nota
    rationale: '«Hebreo literalmente» sin artículo ni comillas externas innecesarias suena más natural: «Hebreo literal: “Neftalí, uno”». También conviene decir «del contexto de distribución de la tierra» o «de distribución territorial».'
  revised_spanish_text: Y junto al límite de Aser, desde el lado oriental hasta el lado occidental, Neftalí, una porción[a].
  revised_footnotes:
  - marker: a
    text: 'Hebreo literal: «Neftalí, uno». «Porción» se añade por claridad a partir del contexto de distribución de la tierra en este capítulo.'
    reason: lexical_alternative
