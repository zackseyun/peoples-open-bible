  source_alignment_summary: 'El borrador sigue en general el sentido del hebreo y del audit trail inglés: לָכֵן = «Por tanto», שִׁמְעוּ = llamado imperativo a las naciones, עֵדָה como vocativo colectivo, y אֶת אֲשֶׁר בָּם con la idea de «lo que hay entre/en». Sin embargo, altera indebidamente la segunda cláusula al pluralizar «y conozcan», cuando el audit trail inglés decidió preservar el singular femenino/vocativo colectivo con «and know, O congregation». También falta la nota sobre la ambigüedad de «entre ellos / en ellos», mientras que se añadió una nota en «naciones» que no está respaldada por el POB inglés ni es necesaria aquí.'
