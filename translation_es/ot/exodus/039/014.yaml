  text: וְ֠/הָ/אֲבָנִים עַל שְׁמֹ֨ת בְּנֵי יִשְׂרָאֵ֥ל הֵ֛נָּה שְׁתֵּ֥ים עֶשְׂרֵ֖ה עַל שְׁמֹתָ֑/ם פִּתּוּחֵ֤י חֹתָם֙ אִ֣ישׁ עַל שְׁמ֔/וֹ לִ/שְׁנֵ֥ים עָשָׂ֖ר שָֽׁבֶט־־־־׃
base_translation:
  language: en
  yaml_path: translation/ot/exodus/039/014.yaml
  text: And the stones corresponded to the names of the sons of Israel[a], twelve according to their names, engraved like a signet, each according to its name[c][b], for the twelve tribes.
  footnotes:
  - marker: a
    text: Or 'bearing the names of the sons of Israel.' The Hebrew preposition can express close association or correspondence.
    reason: lexical_alternative
  - marker: b
    text: Or 'engravings of a seal' / 'signet engravings.' The phrase refers to the manner of carving, like seal-cut inscriptions.
    reason: lexical_alternative
  - marker: c
    text: Hebrew 'sons of Israel,' a traditional covenantal designation for the people descended from Israel.
    reason: cultural_note
