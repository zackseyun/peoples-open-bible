    rationale: La nota inglesa indica una traducción previa (previous_rendering), no una variante textual. Además, usar «el SEÑOR» dentro de la nota entra en tensión con la política del proyecto de verter יהוה como «Yahvé», salvo que se explique como forma histórica previa.
  - severity: low
