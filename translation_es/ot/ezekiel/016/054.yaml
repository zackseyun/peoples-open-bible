review_pass:
  verdict: approve
  source_alignment_summary: 'El borrador español preserva fielmente el sentido del hebreo y sigue bien la trayectoria auditada en inglés: finalidad con «para que», la doble idea de cargar con la deshonra y avergonzarse, la relación causal «a causa de todo lo que has hecho», y la construcción final/circunstancial de בְּנַחֲמֵךְ אֹתָן como «llegando a ser consuelo para ellas». La nota también conserva adecuadamente las alternativas cercanas documentadas.'
  spanish_quality_summary: El español es claro, natural y digno. «Lleves tu vergüenza» y «te avergüences» suenan idiomáticos en contexto bíblico. «Llegando a ser consuelo para ellas» comunica bien la lectura preferida sin forzar una paráfrasis explicativa. La puntuación y el registro son apropiados.
  glossary_alignment: No hay conflictos con la terminología base del proyecto. Las decisiones léxicas están bien justificadas. Aunque «deshonra» podría reflejar con algo más de precisión el matiz público de כְּלִמָּה, «vergüenza» sigue siendo una opción fiel, especialmente al ir emparejada con el verbo distinto «te avergüences».
  issues:
  - severity: low
    issue: Posible repetición semántica entre «vergüenza» y «te avergüences».
    rationale: El hebreo también usa un sustantivo de deshonra y luego un verbo de avergonzarse; por tanto, la repetición no es un error, sino una manera legítima de reflejar la doble formulación del original.
