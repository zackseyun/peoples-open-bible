    issue: La cláusula principal nominaliza donde la auditoría inglesa explicitó una acción verbal.
    rationale: El POB inglés eligió «far be it from God to do wickedness ... to do wrong» y explicó que el hebreo se completa verbalmente para expresar el sentido idiomático. El español «lejos esté de Dios la maldad» puede entenderse como una afirmación abstracta sobre la distancia moral de la maldad, pero pierde la fuerza de «hacer/obrar» que la auditoría consideró importante.
  - severity: low
