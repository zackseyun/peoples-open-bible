    reason: alternative_reading
  revision_rationale: 'La revisión conserva el sentido del borrador pero corrige la coherencia entre texto y decisiones léxicas: נחה se refleja como ''has llevado'' y נהל como ''has guiado'', manteniendo una distinción natural en español. También se cambia ''hasta'' por ''a'' para ajustarse mejor a אֶל sin sobreinterpretar, y se pule el orden ''tu santa morada'' por mayor naturalidad.'
