base_translation:
  language: en
  yaml_path: translation/ot/2_chronicles/030/024.yaml
  text: For Hezekiah king of Judah gave to the assembly one thousand bulls and seven thousand sheep[a], and the officials gave to the assembly one thousand bulls and ten thousand sheep[b]; and priests consecrated themselves in great numbers.
  footnotes:
  - marker: a
    text: Or 'for the assembly' instead of 'to the assembly'; the Hebrew preposition can be understood either way in this context of providing animals for communal worship.
    reason: lexical_alternative
  - marker: b
    text: '''Sheep'' renders Hebrew צֹאן, a broader term that can refer to flock animals generally, including sheep and goats.'
    reason: lexical_alternative
