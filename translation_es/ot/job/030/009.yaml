    rationale: El dativo hebreo indica cómo Job es tenido por ellos. «Soy para ellos un dicho» suena aceptable, pero «he sido... y he llegado a ser para ellos un dicho» o «soy para ellos tema de dicho» sería más natural. En una revisión mínima, puede mantenerse con el sustantivo corregido.
