review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien el sentido básico del hebreo: el justo goza de estabilidad duradera y los malvados no permanecerán en la tierra/el país. También preserva la nota sobre אֶרֶץ. Sin embargo, la combinación hebrea לְעוֹלָם + בַּל está bien representada por una negación enfática, pero en español suena más natural mantener el orden verbal con ''jamás'' antes del participio verbal, y la nota actual no ofrece una alternativa distinta, pues repite ''la tierra''.'
  spanish_quality_summary: El español es claro y digno, pero 'no será jamás sacudido' suena algo menos natural y más pesado que 'jamás será sacudido'. Además, la nota al pie necesita reparar la alternativa para evitar tautología y reflejar correctamente la distinción 'la tierra/el mundo' o 'el país/la tierra'.
  glossary_alignment: No hay términos del glosario mayor en juego como Yahvé, Mesías o esclavo. 'El justo', 'los malvados', 'habitarán' y 'la tierra' son compatibles con las decisiones auditadas. La elección de 'la tierra' es defendible en español porque preserva la ambigüedad de אָרֶץ, pero la nota debe expresarla mejor.
  issues:
  - severity: medium
    issue: Orden poco natural de la negación enfática
    rationale: Aunque 'no será jamás sacudido' es comprensible, 'jamás será sacudido' suena más idiomático y mantiene mejor la fuerza de לְעוֹלָם + בַּל en español bíblico moderno.
  - severity: medium
    issue: Nota al pie tautológica y poco precisa
    rationale: La nota dice 'O «la tierra» en sentido más amplio', pero el texto principal ya dice 'la tierra'. No presenta una alternativa léxica real. Debe distinguir mejor entre 'la tierra', 'la tierra entera/el mundo' o 'el país' para reflejar la ambigüedad de אֶרֶץ.
  revised_spanish_text: El justo jamás será sacudido[a], pero los malvados no habitarán la tierra.
  revised_footnotes:
  - marker: a
    text: O «la tierra entera» o «el mundo». El hebreo אֶרֶץ puede referirse a una tierra concreta o a la tierra en general.
    reason: lexical_alternative
  revision_rationale: Se hace un ajuste menor de estilo para mejorar la naturalidad del español sin alterar el sentido, y se corrige la nota al pie para que ofrezca una alternativa léxica real y preserve con mayor claridad la ambigüedad de אֶרֶץ documentada en la auditoría inglesa.
