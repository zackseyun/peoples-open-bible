translation:
  language: es
  text: Y reunieron a toda la asamblea el primer día del segundo mes, y se registraron[a] por sus clanes, por las casas de sus padres, según el número de nombres, de veinte años en adelante, cabeza por cabeza[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'declararon su ascendencia' o 'se inscribieron por genealogía'; el verbo hebreo es una expresión genealógica poco común que indica registro con base en la descendencia.
    reason: lexical_alternative
  - marker: b
    text: Literalmente, 'por sus cabezas' o 'por sus cráneos'; un modismo que significa contar a cada uno individualmente.
    reason: lexical_alternative
lexical_decisions:
- source_word: הִקְהִילוּ
  english_pob_choice: assembled
  chosen_spanish: reunieron
  alternatives_spanish:
  - convocaron
  - juntaron
  lexicon: HALOT
  rationale: El hifil de קהל expresa hacer que la comunidad se congregue. En español, 'reunieron' comunica con naturalidad la acción colectiva sin perder el valor de convocatoria del texto.
- source_word: כָּל הָעֵדָה
  english_pob_choice: all the congregation
  chosen_spanish: toda la asamblea
  alternatives_spanish:
  - toda la congregación
  - toda la comunidad
  lexicon: HALOT
  rationale: ‘עֵדָה’ designa el cuerpo reunido de Israel. 'Asamblea' mantiene el sentido corporativo y evita imponer un registro eclesiástico más fuerte que el hebreo.
- source_word: בְּאֶחָד לַחֹדֶשׁ הַשֵּׁנִי
  english_pob_choice: on the first day of the second month
  chosen_spanish: el primer día del segundo mes
  alternatives_spanish:
  - el día uno del segundo mes
  lexicon: HALOT
  rationale: La expresión hebrea es idiomática; en español conviene explicitarla como fecha natural. 'Primer día' preserva el valor calendárico que el POB inglés ya resolvió idiomáticamente.
- source_word: וַיִּתְיַלְדוּ
  english_pob_choice: registered themselves
  chosen_spanish: se registraron
  alternatives_spanish:
  - declararon su genealogía
  - se inscribieron por genealogía
  lexicon: HALOT
  rationale: El verbo es una forma rara de registro genealógico. 'Se registraron' refleja el acto administrativo; el matiz de descendencia queda sostenido por las frases siguientes 'por sus clanes' y 'por las casas de sus padres'.
- source_word: עַל מִשְׁפְּחֹתָם
  english_pob_choice: by clans
  chosen_spanish: por sus clanes
  alternatives_spanish:
  - según sus familias
  - por sus familias
  lexicon: HALOT
  rationale: ‘מִשְׁפָּחָה’ en contextos censales apunta a una unidad de parentesco mayor que la familia nuclear. 'Clanes' conserva mejor esa precisión social.
- source_word: לְבֵית אֲבֹתָם
  english_pob_choice: by their fathers’ houses
  chosen_spanish: por las casas de sus padres
  alternatives_spanish:
  - según las casas de sus padres
  - por sus casas paternas
  lexicon: HALOT
  rationale: La fórmula técnica hebrea se mantiene de modo bastante literal para conservar su estructura de organización tribal y doméstica.
- source_word: בְּמִסְפַּר שֵׁמוֹת
  english_pob_choice: according to the number of names
  chosen_spanish: según el número de nombres
  alternatives_spanish:
  - por el número de nombres
  - contados por nombre
  lexicon: HALOT
  rationale: La frase enfatiza el conteo nominal de individuos. 'Según el número de nombres' reproduce con claridad la forma y el efecto censal del hebreo.
- source_word: מִבֶּן עֶשְׂרִים שָׁנָה וָמַעְלָה
  english_pob_choice: from twenty years old and upward
  chosen_spanish: desde los veinte años de edad y más
  alternatives_spanish:
  - desde los veinte años y en adelante
  - a partir de los veinte años
  lexicon: HALOT
  rationale: Es una fórmula de umbral etario. 'Y más' mantiene el valor inclusivo de וָמַעְלָה sin sonar demasiado técnico en español.
- source_word: לְגֻלְגְּלֹתָם
  english_pob_choice: head by head
  chosen_spanish: cabeza por cabeza
  alternatives_spanish:
  - persona por persona
  - una por una
  lexicon: HALOT
  rationale: El hebreo usa literalmente 'por sus cabezas/cráneos'. 'Cabeza por cabeza' conserva la imagen concreta y la idea de conteo individual.
translation_notes:
  revision_awareness: La redacción sigue de cerca el texto hebreo y la solución inglesa auditada, preservando el carácter censal y genealógico de la sección. No se detectaron revisiones anteriores que exigieran ajuste adicional.
  spanish_consistency_notes:
  - Se usa 'Yahvé' solo cuando el texto lo requiera explícitamente; este versículo no contiene el nombre divino.
  - '''Asamblea'' se emplea para עֵדָה en coherencia con el valor corporativo del pasaje.'
  - '''Clanes'' y ''casas de sus padres'' mantienen la terminología de organización tribal sin modernizarla en exceso.'
  - La expresión 'cabeza por cabeza' conserva el modismo hebreo y su valor contable individual.
