  to: 'y todo está mezclado: sangre y homicidio[a], robo y engaño, corrupción, deslealtad, tumulto, perjurio y confusión acerca de lo bueno[b],'
  rationale: Se reemplaza «infidelidad» por «deslealtad» para representar mejor ἀπιστία en este catálogo de desorden moral y social. El cambio preserva la lectura relacional amplia de la auditoría inglesa (‘faithlessness’) y evita la asociación estrecha, frecuente en español, con la infidelidad conyugal. No se requieren más cambios.
