translation:
  language: es
  text: No mantendrá con vida al malvado[a], pero dará justicia a los afligidos[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «no dejará vivir al malvado».'
    reason: lexical_alternative
  - marker: b
    text: 'O: «los pobres»; el hebreo «los afligidos/pobres» puede denotar a quienes están abatidos, oprimidos o empobrecidos.'
    reason: lexical_alternative
lexical_decisions:
- source_word: יְחַיֶּה
  english_pob_choice: keep alive
  chosen_spanish: dejará vivir
  alternatives_spanish:
  - mantendrá con vida
  - preservará con vida
  - hará vivir
  lexicon: HALOT
  rationale: El piel de חיה aquí expresa preservar la vida o permitir que continúe viviendo. En español, 'dejará vivir' comunica bien la idea de no sostener la vida del malvado, sin sugerir resurrección ni una vida concedida en sentido teológico más amplio.
- source_word: רָשָׁע
  english_pob_choice: the wicked
  chosen_spanish: al malvado
  alternatives_spanish:
  - al impío
  - al perverso
  - al malvado hombre
  lexicon: HALOT
  rationale: Aunque el sustantivo está en singular, funciona de modo genérico. 'Malvado' es claro y natural en español, y preserva el valor representativo sin forzar una forma plural que el hebreo no usa.
- source_word: מִשְׁפַּט
  english_pob_choice: justice
  chosen_spanish: justicia
  alternatives_spanish:
  - juicio
  - derecho
  - causa
  lexicon: HALOT
  rationale: En este contexto, מִשְׁפָּט no se refiere solo al acto de juzgar, sino al resultado justo que corresponde a los afligidos. 'Justicia' reproduce esa fuerza mejor que 'juicio' o 'derecho' en español.
- source_word: עֲנִיִּים
  english_pob_choice: the afflicted
  chosen_spanish: los afligidos
  alternatives_spanish:
  - los pobres
  - los humildes
  - los oprimidos
  lexicon: HALOT
  rationale: עָנִי puede abarcar pobreza material, aflicción y opresión. 'Afligidos' conserva ese campo semántico amplio y evita reducir el término solo a una condición económica.
- source_word: יִתֵּן
  english_pob_choice: gives
  chosen_spanish: dará
  alternatives_spanish:
  - concederá
  - otorgará
  - dará como justo
  lexicon: HALOT
  rationale: נתן es un verbo básico de dar. 'Dará justicia' mantiene la construcción hebrea con naturalidad en español y conserva la idea de conceder o impartir lo que corresponde.
- source_word: וּ
  english_pob_choice: but
  chosen_spanish: pero
  alternatives_spanish:
  - y
  - mas
  lexicon: HALOT
  rationale: Aunque la conjunción es formalmente 'y', la relación discursiva es de contraste entre negar vida al malvado y conceder justicia a los afligidos. 'Pero' expresa mejor ese contraste en español.
theological_decisions:
- issue: 'Alcance de יְחַיֶּה: preservación temporal frente a vida en sentido soteriológico o resurreccional'
  english_pob_reading: He does not keep the wicked alive.
  chosen_spanish_reading: No dejará vivir al malvado.
  alternative_spanish_readings:
  - No hará vivir al malvado.
  - No preservará con vida al malvado.
  rationale: El verso trata del gobierno justo de Dios en el presente, no de resurrección ni de dar vida en sentido redentor. La formulación elegida evita introducir una lectura doctrinal no exigida por el paralelo poético.
  doctrine_reference: 'Translation philosophy: primacía del hebreo original; no importar afirmaciones doctrinales que el texto no formula.'
translation_notes:
  revision_awareness: El borrador sigue de cerca el estado más reciente del texto fuente en inglés, que fue revisado y dejado sin cambios tras la verificación cruzada de alta concordancia. No hay revisiones adicionales que incorporar.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' solo cuando el texto fuente lo exija explícitamente; este versículo no lo contiene.
  - Se conserva 'justicia' para מִשְׁפָּט conforme al uso auditado del POB en inglés.
  - '''Afligidos'' se usa como término amplio, coherente con el alcance semántico documentado de עֲנִיִּים.'
  - La estructura antitética en español sigue el contraste del hebreo mediante 'pero'.
