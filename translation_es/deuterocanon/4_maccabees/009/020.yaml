base_translation:
  language: en
  yaml_path: translation/deuterocanon/4_maccabees/009/020.yaml
  text: And the wheel was stained all around with blood[a], and the heap of coals was being quenched by the drops of bodily fluids[c][b], and the flesh was flowing around the axles of the instrument.
  footnotes:
  - marker: a
    text: Or 'was stained all around with blood.' The Greek verb can denote staining, but here likely carries the stronger sense of defilement or contamination.
    reason: lexical_alternative
  - marker: b
    text: Literally 'the drops of the ichors.' The Greek term refers to fluid flowing from wounds; 'bodily fluids' is used for clarity in modern English.
    reason: lexical_alternative
  - marker: c
    text: Or 'of the instrument/apparatus.' The Greek word denotes the torture device as an implement.
    reason: lexical_alternative
