id: COL.1.11
reference: Colossians 1:11
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: ἐν πάσῃ δυνάμει δυναμούμενοι κατὰ τὸ κράτος τῆς δόξης αὐτοῦ εἰς πᾶσαν ὑπομονὴν καὶ μακροθυμίαν μετὰ χαρᾶς,
base_translation:
  language: en
  yaml_path: translation/nt/colossians/001/011.yaml
  text: being strengthened with all power, according to the might of his glory, for all endurance and patience with joy,
translation:
  language: ko
  text: 그분의 영광의 위력을 따라 모든 능력으로 강건하게 되어, 기쁨으로 모든 인내와 오래 참음에 이르고,
  philosophy: optimal-equivalence
  footnotes: []
lexical_decisions:
- source_word: ἐν πάσῃ δυνάμει
  english_pob_choice: with all power
  chosen_korean: 모든 능력으로
  alternatives_korean:
  - 모든 권능으로
  - 모든 힘으로
  lexicon: BDAG
  rationale: ἐν + 여격을 수단·영역으로 본다. 「모든 능력으로」는 한국 교회 정립 표현이며, δύναμις의 신적 능력 어감을 살린다.
- source_word: δυναμούμενοι
  english_pob_choice: being strengthened
  chosen_korean: 강건하게 되어
  alternatives_korean:
  - 강하게 되어
  - 힘을 얻어
  lexicon: BDAG
  rationale: 현재 수동 분사. 하나님이 함의된 행위자임을 보존하기 위해 「~되어」 수동 어형을 유지한다.
- source_word: κατὰ τὸ κράτος τῆς δόξης αὐτοῦ
  english_pob_choice: according to the might of his glory
  chosen_korean: 그분의 영광의 위력을 따라
  alternatives_korean:
  - 그분의 영광의 힘을 따라
  - 그분의 영광스러운 권능을 따라
  lexicon: BDAG
  rationale: 영어 POB의 결정에 따라 「영광의 위력」 구조를 풀지 않고 보존한다. κράτος를 「위력」으로 옮겨 δύναμις(능력)와 구분한다.
- source_word: εἰς πᾶσαν ὑπομονὴν καὶ μακροθυμίαν
  english_pob_choice: for all endurance and patience
  chosen_korean: 모든 인내와 오래 참음에 이르고
  alternatives_korean:
  - 모든 인내와 관용에 이르도록
  - 어떠한 인내와 오래 참음으로
  lexicon: BDAG
  rationale: ὑπομονή(견딤)와 μακροθυμία(타인에 대한 오래 참음)를 「인내」와 「오래 참음」으로 구분한다. εἰς는 목적·결과로 「~에 이르고」로 옮긴다.
- source_word: μετὰ χαρᾶς
  english_pob_choice: with joy
  chosen_korean: 기쁨으로
  alternatives_korean:
  - 즐거이
  - 기뻐하며
  lexicon: BDAG
  rationale: μετά + 속격은 동반·방식을 가리킨다. 「기쁨으로」가 한국어에서 가장 자연스럽다.
