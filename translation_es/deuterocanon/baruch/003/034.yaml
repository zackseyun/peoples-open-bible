translation:
  language: es
  text: Y las estrellas brillaron en sus vigilias[a] y se alegraron;
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «en sus estaciones», «en sus cursos» o «en sus puestos». La frase griega usa φυλακαί, literalmente «vigilias» o «puestos de vigilancia», en referencia poética a los lugares o tiempos asignados a las estrellas.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀστέρες
  english_pob_choice: stars
  chosen_spanish: estrellas
  alternatives_spanish:
  - astros
  - luceros
  lexicon: BDAG
  rationale: El griego se refiere de manera directa a los cuerpos celestes; en español, «estrellas» es el equivalente natural y transparente, y mantiene el paralelismo poético del pasaje.
- source_word: ἔλαμψαν
  english_pob_choice: shone
  chosen_spanish: brillaron
  alternatives_spanish:
  - resplandecieron
  - dieron luz
  lexicon: BDAG
  rationale: El verbo expresa emisión de luz. «Brillaron» comunica bien la acción en español moderno y conserva la sencillez narrativa y el tono poético del original.
- source_word: ἐν ταῖς φυλακαῖς αὐτῶν
  english_pob_choice: in their watches
  chosen_spanish: en sus guardias
  alternatives_spanish:
  - en sus estaciones
  - en sus turnos
  - en sus puestos
  lexicon: BDAG
  rationale: φυλακαί puede significar «vigilias», «guardias», «puestos de guardia» o, en sentido figurado, lugares o tiempos asignados. «Guardias» conserva la imagen básica de una función o turno asignado sin forzar una interpretación astronómica más específica que el griego no exige.
- source_word: εὐφράνθησαν
  english_pob_choice: rejoiced
  chosen_spanish: se alegraron
  alternatives_spanish:
  - se regocijaron
  - se deleitaron
  lexicon: BDAG
  rationale: La forma comunica alegría o regocijo. «Se alegraron» es natural en español y mantiene la personificación poética de las estrellas sin añadir matiz más fuerte del necesario.
theological_decisions:
- issue: Personificación poética de las estrellas
  english_pob_reading: Retain the personified language directly ('the stars shone... and rejoiced')
  chosen_spanish_reading: 'Mantener la personificación: «las estrellas brillaron... y se alegraron»'
  alternative_spanish_readings:
  - Despersonalizarlo como simple descripción astronómica
  - Suavizar la alegría como mera imagen literaria sin verbo afectivo
  rationale: El griego atribuye explícitamente alegría a las estrellas. La traducción debe conservar ese efecto literario-teológico, porque forma parte de la alabanza cósmica del pasaje y no conviene aplanarlo a una descripción impersonal.
  doctrine_reference: DOCTRINE.md §Translation philosophy 1, 3, 6
translation_notes:
  revision_awareness: 'El texto sigue de cerca el griego de Swete y coincide con el sentido confirmado por la auditoría inglesa: estrellas + brillo + ubicación asignada + alegría personificada. No se requirieron revisiones respecto del marco adjudicado.'
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando el texto lo requiera; aquí no aparece el nombre divino.
  - Se mantiene el registro poético y solemne sin arcaísmos innecesarios.
  - «Guardias» preserva la ambigüedad funcional de φυλακαί sin convertirla en terminología técnica astronómica.
