translation:
  language: es
  text: Señor[a], tú eres nuestro Rey por siempre y para siempre; porque en ti, nuestro Dios, nuestra alma se gloriará[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'para siempre' o, más literalmente, 'por la era y más allá'.
    reason: lexical_alternative
  - marker: b
    text: También puede traducirse 'se jactará', 'se exaltará' o 'se gloriará en ti'.
    reason: lexical_alternative
lexical_decisions:
- source_word: Κύριε
  english_pob_choice: O Lord
  chosen_spanish: Oh Yahvé
  alternatives_spanish:
  - Señor
  - Oh Señor
  lexicon: BDAG
  rationale: El vocativo griego se dirige directamente a Dios. En esta serie se privilegia Yahvé para el nombre divino, y 'Oh' conserva el valor de llamada directa que en inglés expresa 'O'.
- source_word: Βασιλεὺς ἡμῶν
  english_pob_choice: King
  chosen_spanish: nuestro Rey
  alternatives_spanish:
  - nuestro Rey soberano
  - nuestro gobernante
  lexicon: BDAG
  rationale: '''Rey'' reproduce el título real de forma directa y natural en español, manteniendo la confesión del gobierno de Dios sin recurrir a un término más abstracto.'
- source_word: εἰς τὸν αἰῶνα καὶ ἔτι
  english_pob_choice: forever and ever
  chosen_spanish: por los siglos y todavía más
  alternatives_spanish:
  - para siempre y siempre más
  - por siempre y para siempre
  - por la era y más
  lexicon: BDAG
  rationale: La expresión intensifica la duración; 'por los siglos y todavía más' conserva el doble énfasis y evita una simplificación que borre el valor de καὶ ἔτι.
- source_word: καυχήσεται
  english_pob_choice: will boast
  chosen_spanish: se gloriará
  alternatives_spanish:
  - se jactará
  - se alabará
  - se vanagloriará
  lexicon: BDAG
  rationale: '''Gloriarse'' comunica en español el matiz positivo y religioso de ''boast'' en este contexto, sin la connotación excesivamente negativa de ''jactarse''.'
- source_word: ἡ ψυχὴ ἡμῶν
  english_pob_choice: our soul
  chosen_spanish: nuestra alma
  alternatives_spanish:
  - nuestro ser
  - nuestra vida
  - nuestro interior
  lexicon: BDAG
  rationale: '''Alma'' conserva la imagen del singular griego con posesivo plural. Aunque el español exige concordancia femenina, la referencia colectiva queda intacta.'
theological_decisions:
- issue: Tratamiento del nombre divino en el vocativo Κύριε
  english_pob_reading: O Lord
  chosen_spanish_reading: Oh Yahvé
  alternative_spanish_readings:
  - Oh Señor
  - Señor
  rationale: El griego usa un vocativo dirigido a Dios. Dado el estándar del proyecto para יהוה/YHWH, se explicita Yahvé en lugar de ocultarlo bajo 'Señor'.
  doctrine_reference: Nombre del pacto / Tetragrámaton
- issue: Valor de la doxología final sobre el alma que se gloría
  english_pob_reading: our soul will boast
  chosen_spanish_reading: se gloriará nuestra alma
  alternative_spanish_readings:
  - nuestra alma se jactará
  - nuestra alma se gozará
  rationale: '''Gloriará'' mantiene el sentido positivo de confianza/boast sin convertirlo en orgullo vano. Se evita ''gozará'' porque desplaza el matiz verbal de καυχήσεται.'
  doctrine_reference: Lenguaje bíblico de gloria/confianza en Dios
translation_notes:
  revision_awareness: La versión inglesa auditada fue revisada de 'because' a 'for' y de coma a punto y coma para un registro más formal. En español se refleja con 'porque' en una cláusula explicativa subordinada y con punto y coma para separar con claridad la confesión de realeza de su fundamento.
  spanish_consistency_notes:
  - Se mantuvo 'Yahvé' para el nombre divino, conforme al estándar del proyecto.
  - '''Rey'' se usó para Βασιλεὺς, sin sustituirlo por ''soberano'' para preservar el título real explícito.'
  - '''Alma'' reproduce el singular colectivo de ἡ ψυχὴ ἡμῶν sin normalizarlo a ''nosotros''.'
  - La puntuación usa punto y coma para reflejar la estructura formal del verso y su relación causal.
