base_translation:
  language: en
  yaml_path: translation/ot/1_chronicles/004/010.yaml
  text: And Jabez called on the God of Israel[a], saying, “If you would indeed bless me and enlarge my territory, and let your hand be with me[b], and keep me from harm so that I may not suffer pain!” And God granted what he asked.
  footnotes:
  - marker: a
    text: Or “keep me from evil.” The Hebrew רָעָה can mean moral evil or harmful calamity; here the context favors protection from harm.
    reason: lexical_alternative
  - marker: b
    text: The wording “so that I may not suffer pain” echoes the explanation of Jabez’s name in the previous verse.
    reason: cross_reference
