    issue: «fajas» para אַבְנֵט
    rationale: Aunque posible, «fajas» puede sonar moderno o ambiguo en español general. «Ceñidores» expresa mejor una banda textil ceñida a la cintura en contexto sacerdotal y conserva el matiz de וַיַּחְגֹּר.
  - severity: medium
    issue: «gorros» para מִגְבָּעוֹת
    rationale: «Gorros» es demasiado cotidiano y rebaja el registro ceremonial. El hebreo designa un tocado sacerdotal distintivo; «turbantes» en el texto con nota alternativa «tocados» comunica mejor la prenda sin confundirla con el turbante del sumo sacerdote, especialmente si se aclara la distinción en nota.
  - severity: low
