revisions:
- from: Cuando está presente[a], la imitan, y la anhelan cuando se ha ido; y por el siglo marcha en triunfo, llevando una corona de vencedor, después de haber ganado la competencia de los premios incorruptibles.
  to: Cuando está presente, la imitan, y la anhelan cuando se ha ido; y a través del siglo[a] marcha en triunfo, llevando una corona de vencedor, después de haber ganado el certamen de los premios incontaminados.
  rationale: Se reubica la nota [a] para anclarla correctamente a ἐν τῷ αἰῶνι. Se sustituye «por el siglo» por «a través del siglo» para mayor claridad sin perder la tensión semántica del griego. Se cambia «incorruptibles» por «incontaminados» para reflejar mejor ἀμιάντων («undefiled»), y «competencia» por «certamen» para una imagen atlética más natural y digna en español.
