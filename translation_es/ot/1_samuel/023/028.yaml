  to: Así Saúl volvió de perseguir a David y fue al encuentro de los filisteos. Por eso a ese lugar lo llamaron la Roca de la División[a].
  rationale: Se ajusta el topónimo principal para alinearlo con la decisión léxica principal del POB inglés («Division»), dejando las alternativas en la nota. También se corrige la nota al pie para que esté íntegramente en español y se suaviza la cláusula de nombramiento con una construcción más natural en español.
