    text: 'Literalmente: «no me cuente culpa/iniquidad»; el hebreo tiene una forma forense idiomática.'
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: «ponerlo en su corazón»; es un modismo que significa tomar algo en serio o tenerlo contra alguien.'
    reason: lexical_alternative
  revision_rationale: Se elimina «para que» para evitar una lectura de propósito que distorsiona el hebreo y el audit trail inglés. «Ni lo tome a pecho» integra el modismo final de manera natural y fiel en español, manteniendo la súplica de no retener la ofensa contra Simei. Se conserva la nota literal sobre el corazón para preservar la imagen hebrea.
