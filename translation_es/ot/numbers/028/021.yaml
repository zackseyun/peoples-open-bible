translation:
  language: es
  text: Una décima parte[a] prepararás para cada cordero, para los siete corderos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo literalmente: «una décima, una décima prepararás para el un cordero, para los siete corderos». La repetición expresa un sentido distributivo: una décima parte para cada cordero.'
    reason: lexical_alternative
lexical_decisions:
- source_word: עִשָּׂר֤וֹן עִשָּׂרוֹן֙
  english_pob_choice: A tenth
  chosen_spanish: Una décima
  alternatives_spanish:
  - Una décima parte
  - Un décimo
  lexicon: HALOT
  rationale: El hebreo repite el sustantivo en forma distributiva; en español, «una décima» comunica brevedad y mantiene el carácter fraccionario. No se añade «de un efa» porque no está en el texto fuente de este versículo.
- source_word: תַּעֲשֶׂ֔ה
  english_pob_choice: you shall prepare
  chosen_spanish: prepararás
  alternatives_spanish:
  - harás
  - ofrecerás
  lexicon: HALOT
  rationale: El verbo hebreo es amplio («hacer»), pero en contexto sacrificial español «prepararás» conserva el sentido de disposición ritual sin sobretraducirlo como «ofrecerás».
- source_word: לַ/כֶּ֖בֶשׂ הָ/אֶחָ֑ד
  english_pob_choice: for each lamb
  chosen_spanish: para cada cordero
  alternatives_spanish:
  - para el cordero único
  - para un cordero
  lexicon: HALOT
  rationale: La repetición distributiva del hebreo se expresa naturalmente como «para cada cordero». «Cordero» es el equivalente español más claro y bíblicamente comprensible para כֶּבֶשׂ en este contexto sacrificial.
- source_word: לְ/שִׁבְעַ֖ת הַ/כְּבָשִֽׂים
  english_pob_choice: for the seven lambs
  chosen_spanish: para los siete corderos
  alternatives_spanish:
  - para los siete corderos en total
  - para los siete corderos
  lexicon: HALOT
  rationale: Se conserva la referencia totalizadora a los siete animales con una formulación natural en español. La reiteración de «corderos» refleja el hebreo y enlaza con el reparto distributivo del primer miembro.
translation_notes:
  revision_awareness: La versión inglesa revisada eliminó una aclaración sobre «of an ephah» porque no está presente en el hebreo de este versículo. Por eso la versión española evita añadir esa especificación y mantiene una equivalencia literal con el reparto distributivo del texto.
  spanish_consistency_notes:
  - Se evita «SEÑOR» o «Yahvé» porque este versículo no contiene el tetragrámaton ni una referencia divina explícita.
  - Se conserva el registro ritual sobrio y directo, apto para lectura pública.
  - «Cordero» traduce consistentemente כֶּבֶשׂ en este contexto sacrificial.
  - La nota a pie de página se vincula al tramo distributivo «Una décima» para reflejar la repetición hebrea sin recargar el cuerpo principal.
