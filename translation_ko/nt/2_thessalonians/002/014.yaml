id: 2TH.2.14
reference: 2 Thessalonians 2:14
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: εἰς ⸀ὃ ἐκάλεσεν ὑμᾶς διὰ τοῦ εὐαγγελίου ἡμῶν, εἰς περιποίησιν δόξης τοῦ κυρίου ἡμῶν Ἰησοῦ Χριστοῦ.
base_translation:
  language: en
  yaml_path: translation/nt/2_thessalonians/002/014.yaml
  text: to which he called you through our gospel[b][a], for obtaining the glory of our Lord Jesus Messiah.
translation:
  language: ko
  text: 이 일을 위해서 그분이 우리의 복음을 통하여 여러분을 부르셨으니, 곧 우리 주 예수 메시아[a]의 영광을 얻게 하시기 위함입니다.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 또는, 더 전통적으로는 「예수 그리스도」. 본 번역은 칭호 Χριστός를 「메시아」로 옮긴다.
    reason: alternative_reading
lexical_decisions:
- source_word: εἰς ὃ
  english_pob_choice: to which
  chosen_korean: 이 일을 위해서
  alternatives_korean:
  - 그것을 위해
  - 이를 위해
  lexicon: BDAG
  rationale: 앞의 구원/거룩하게 하심 일체를 가리키는 목적 표현. 한국어 흐름상 「이 일을 위해서」가 자연스럽다.
- source_word: ἐκάλεσεν
  english_pob_choice: he called
  chosen_korean: 부르셨으니
  alternatives_korean:
  - 부르셨고
  - 초대하셨고
  lexicon: BDAG
  rationale: 바울 용법의 효력 있는 부르심을 「부르시다」로 표준 표현한다.
- source_word: διὰ τοῦ εὐαγγελίου ἡμῶν
  english_pob_choice: through our gospel
  chosen_korean: 우리의 복음을 통하여
  alternatives_korean:
  - 우리 복음을 통해
  - 우리가 전한 복음으로
  lexicon: BDAG
  rationale: 도구적 διά를 「통하여」로 자연스럽게 옮긴다.
- source_word: εἰς περιποίησιν
  english_pob_choice: for obtaining
  chosen_korean: 얻게 하시기 위함입니다
  alternatives_korean:
  - 소유하게 하시기 위함
  - 차지하게 하시기 위함
  lexicon: BDAG
  rationale: περιποίησις의 「획득·소유」 의미를 「얻게 하다」로 자연스럽게 표현한다.
- source_word: δόξης
  english_pob_choice: the glory
  chosen_korean: 영광을
  alternatives_korean:
  - 그 영광을
  lexicon: BDAG
  rationale: 종말론적 영광을 표준 어휘로 옮긴다.
- source_word: τοῦ κυρίου ἡμῶν Ἰησοῦ Χριστοῦ
  english_pob_choice: of our Lord Jesus Messiah
  chosen_korean: 우리 주 예수 메시아의
  alternatives_korean:
  - 우리 주 예수 그리스도의
  lexicon: BDAG
  rationale: 표준 글로서리 + 칭호 정책.
theological_decisions:
- issue: 부르심의 신학적 함의
  chosen_reading: 「부르셨다」 — 좁히지 않는 단순 직역
  alternative_readings:
  - 「효과적으로 부르셨다」
  - 「초대하셨다」
  rationale: 본문은 사도적 복음을 통한 부르심을 진술할 뿐 특정 교파적 선택론을 단언하지 않는다.
  doctrine_reference: 'Preserve theological tension'
- issue: Χριστοῦ 번역
  chosen_reading: 메시아
  alternative_readings:
  - 그리스도
  rationale: 칭호 정책 일관.
  doctrine_reference: 'Contested terms — Χριστός'
