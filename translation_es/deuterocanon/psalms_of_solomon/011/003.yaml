translation:
  language: es
  text: Ponte de pie, Jerusalén, en una altura,[a] y ve a tus hijos reunidos[b] juntos desde oriente y occidente por el Señor.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «en alto».
    reason: lexical_alternative
  - marker: b
    text: O «congregados» o «juntados»; la frase griega también puede sugerir «a la vez».
    reason: alternative_reading
lexical_decisions:
- source_word: στῆθι
  english_pob_choice: Stand
  chosen_spanish: Ponte
  alternatives_spanish:
  - Estate de pie
  - Levántate
  - Toma tu puesto
  lexicon: LSJ
  rationale: El imperativo exhorta a Jerusalén a colocarse en una posición para mirar; en español, «ponte» expresa con naturalidad la idea de ponerse de pie o situarse en un lugar. Se evita un calco rígido y se conserva el tono exhortativo del mandato.
- source_word: ἐφʼ ὑψηλοῦ
  english_pob_choice: on high
  chosen_spanish: en un alto
  alternatives_spanish:
  - en alto
  - sobre una altura
  - en un lugar alto
  lexicon: LSJ
  rationale: La frase apunta a una elevación física, no a una abstracción celestial. «En un alto» comunica bien el punto de observación elevado y mantiene la concreción espacial del griego.
- source_word: τέκνα
  english_pob_choice: children
  chosen_spanish: hijos
  alternatives_spanish:
  - niños
  - descendientes
  - hijos e hijas
  lexicon: LSJ
  rationale: Aunque τέκνα puede abarcar descendencia en general, en este contexto poético y personificado «hijos» es natural en español y conserva la relación de Jerusalén con su pueblo. No se expande a «hijos e hijas» porque el griego no lo explicita.
- source_word: ἀπὸ ἀνατολῶν καὶ δυσμῶν
  english_pob_choice: from east and west
  chosen_spanish: desde oriente y occidente
  alternatives_spanish:
  - desde el oriente y el occidente
  - del este y del oeste
  - desde los extremos del oriente y del occidente
  lexicon: LSJ
  rationale: Los plurales griegos funcionan como direcciones o regiones. «Oriente y occidente» es una fórmula natural y digna en español bíblico, y evita una literalidad geográfica menos elegante.
- source_word: συνηγμένα
  english_pob_choice: gathered
  chosen_spanish: reunidos
  alternatives_spanish:
  - juntados
  - congregados
  - recogidos
  lexicon: LSJ
  rationale: El participio indica ser llevados a una sola compañía. «Reunidos» es claro, fluido y suficientemente cercano al sentido de congregación sin introducir un matiz eclesiástico más fuerte que el griego no exige.
- source_word: εἰς ἅπαξ
  english_pob_choice: all at once
  chosen_spanish: juntos
  alternatives_spanish:
  - a la vez
  - al mismo tiempo
  - de una vez
  lexicon: LSJ
  rationale: La expresión comprimida puede señalar simultaneidad o unidad de reunión. «Juntos» preserva esa idea de reunión conjunta en español sin sugerir la brusca repentinidad que podría insinuar «de una vez».
- source_word: Κυρίου
  english_pob_choice: the Lord
  chosen_spanish: el Señor
  alternatives_spanish:
  - Señor
  lexicon: LSJ
  rationale: El griego usa κύριος como título divino; en español, «el Señor» es la forma natural para expresar la fuente/agencia del reunir. Se mantiene la referencia a Dios sin sustituir el nombre divino por un calco innecesario en esta construcción.
theological_decisions:
- issue: 'Valor de εἰς ἅπαξ: simultaneidad o unidad de reunión'
  english_pob_reading: all at once
  chosen_spanish_reading: juntos
  alternative_spanish_readings:
  - a la vez
  - al mismo tiempo
  - de una vez
  rationale: El contexto destaca que los hijos vienen de oriente y occidente como una sola reunión. «Juntos» preserva la tensión entre simultaneidad y unidad sin imponer una lectura temporal demasiado fuerte.
  doctrine_reference: Poetic restoration imagery; no doctrinal claim beyond the gathering of the people.
- issue: κύριος como agente del reunir
  english_pob_reading: by the Lord
  chosen_spanish_reading: por el Señor
  alternative_spanish_readings:
  - del Señor
  - por Yahvé
  rationale: La preposición expresa agencia/origen del reunir. «Por el Señor» mantiene esa relación causal. No se introduce «Yahvé» en el texto principal porque el griego aquí cita κύριος y el POB inglés también lo trató como título divino funcional.
  doctrine_reference: Divine agency in restoration imagery; no mask substitution required from the Greek source.
translation_notes:
  revision_awareness: El inglés POB pasó por ajustes para evitar la connotación abstracta de 'on high' y la impresión de 'all at once' como repentinidad. La versión española sigue esa corrección al concretar ἐφʼ ὑψηλοῦ como «en un alto» y εἰς ἅπαξ como «juntos», manteniendo la reunión visible de los hijos de Jerusalén desde oriente y occidente.
  spanish_consistency_notes:
  - Se conserva el tratamiento directo de Jerusalén como personaje femenino singular, acorde con el griego.
  - «Señor» se usa como título divino en una construcción de agencia; no se introduce mayúscula forzada distinta de la convención normal.
  - La puntuación divide de forma natural la orden de mirar y la cláusula de la reunión.
  - 'No se traduce mecánicamente desde el inglés: se consulta el griego para resolver el valor espacial de ἐφʼ ὑψηλοῦ y el sentido de εἰς ἅπαξ.'
