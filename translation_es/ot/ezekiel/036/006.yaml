translation:
  language: es
  text: 'Por tanto, profetiza acerca de la tierra de Israel, y di a los montes y a las colinas, a los barrancos y a los valles: «Así dice el Señor Yahvé: He aquí, he hablado en mis celos[a] y en mi ira, porque ustedes han llevado la vergüenza de las naciones[b]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O ‘en mi celo’. El hebreo קִנְאָה puede expresar celos o celo, especialmente en contextos de pacto y vindicación divina.
    reason: lexical_alternative
  - marker: b
    text: O ‘el oprobio de las naciones’ o ‘el reproche de las naciones’.
    reason: lexical_alternative
lexical_decisions:
- source_word: אַדְמַת יִשְׂרָאֵל
  english_pob_choice: the land of Israel
  chosen_spanish: la tierra de Israel
  alternatives_spanish:
  - el suelo de Israel
  - el terreno de Israel
  lexicon: HALOT
  rationale: אַדְמָה puede referirse a tierra como territorio, suelo o terreno. En este contexto profético y geográfico, 'la tierra de Israel' conserva el sentido territorial natural en español y corresponde bien al uso de la POB inglesa.
- source_word: לֶהָרִים ... לַגְּבָעוֹת ... לָאֲפִיקִים ... וְלַגֵּאָיוֹת
  english_pob_choice: to the mountains and the hills, to the ravines and the valleys
  chosen_spanish: a los montes y a las colinas, a los barrancos y a los valles
  alternatives_spanish:
  - a los montes y a las colinas, a los cauces y a los valles
  - a los montes y a las colinas, a los torrentes y a los valles
  lexicon: HALOT
  rationale: La lista personifica el relieve de Israel. הָרִים y גְּבָעוֹת se expresan naturalmente como 'montes' y 'colinas'. אֲפִיקִים puede denotar cauces, barrancos o lechos de arroyo; 'barrancos' funciona bien en una lista topográfica natural y mantiene el carácter concreto del término. גֵּאָיוֹת se traduce como 'valles'.
- source_word: אֲדֹנָי יְהוִה
  english_pob_choice: the Lord GOD
  chosen_spanish: Adonai Yahvé
  alternatives_spanish:
  - el Señor Yahvé
  - el Señor Dios
  lexicon: HALOT
  rationale: La POB inglesa usa 'the Lord GOD' para preservar ambos elementos del título. En español, 'Adonai Yahvé' mantiene explícitamente el nombre divino Yahvé según la norma del proyecto y evita la combinación pesada 'Señor Yahvé' o la ocultación del nombre tras 'SEÑOR'.
- source_word: הִנְנִי
  english_pob_choice: Behold
  chosen_spanish: He aquí
  alternatives_spanish:
  - Miren
  - Vean
  lexicon: HALOT
  rationale: הִנְנִי introduce una auto-presentación enfática divina. 'He aquí' es la equivalencia española más formal y bíblica, y conserva mejor el tono profético que 'Miren' o 'Vean'.
- source_word: בְקִנְאָתִי
  english_pob_choice: in my jealousy
  chosen_spanish: en mi celo
  alternatives_spanish:
  - en mi celosía
  - en mi celos
  lexicon: HALOT
  rationale: קִנְאָה puede significar 'celos' o 'celo'. En discurso divino de vindicación y lealtad pactual, 'celo' preserva la fuerza relacional sin sugerir una emoción humana desordenada; la alternativa 'celos' sería menos natural y más restrictiva.
- source_word: וּבַחֲמָתִי
  english_pob_choice: and in my wrath
  chosen_spanish: y en mi ira
  alternatives_spanish:
  - y en mi furor
  - y en mi enojo
  lexicon: HALOT
  rationale: חֵמָה admite 'ira', 'furor' o 'enojo'. 'Ira' es solemne, natural y suficientemente fuerte para el lenguaje profético de juicio.
- source_word: דִּבַּרְתִּי
  english_pob_choice: I have spoken
  chosen_spanish: he hablado
  alternatives_spanish:
  - he declarado
  - hablé
  lexicon: HALOT
  rationale: El perfecto verbal presenta la acción como una declaración ya pronunciada y con fuerza vigente. 'He hablado' conserva ese matiz de palabra ya emitida y autorizada.
- source_word: יַעַן
  english_pob_choice: because
  chosen_spanish: porque
  alternatives_spanish:
  - ya que
  - puesto que
  lexicon: HALOT
  rationale: '''Porque'' expresa de forma clara la cláusula causal en español y mantiene la relación lógica del reproche.'
- source_word: כְּלִמַּת גּוֹיִם
  english_pob_choice: the disgrace of the nations
  chosen_spanish: la vergüenza de las naciones
  alternatives_spanish:
  - el oprobio de las naciones
  - el reproche de las naciones
  lexicon: HALOT
  rationale: כְּלִמָּה incluye la idea de vergüenza, deshonra o reproche. 'Vergüenza' comunica bien el peso de la humillación sufrida y se adapta al español bíblico moderno.
- source_word: נְשָׂאתֶם
  english_pob_choice: you have borne
  chosen_spanish: han llevado
  alternatives_spanish:
  - han soportado
  - han cargado
  lexicon: HALOT
  rationale: נָשָׂא en este giro puede significar llevar o cargar una carga/afrenta. 'Han llevado' conserva la imagen verbal sin sonar forzado en español.
theological_decisions:
- issue: Tratamiento del Tetragrámaton en el título אֲדֹנָי יְהוִה
  english_pob_reading: the Lord GOD
  chosen_spanish_reading: Adonai Yahvé
  alternative_spanish_readings:
  - el Señor Yahvé
  - el Señor Dios
  rationale: La POB en inglés mantiene la solemnidad del título, y la guía del proyecto exige Yahvé para יְהוָה. 'Adonai Yahvé' preserva ambos componentes del hebreo y evita ocultar el nombre divino.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Valor semántico de קִנְאָה en referencia a Dios
  english_pob_reading: in my jealousy
  chosen_spanish_reading: en mi celo
  alternative_spanish_readings:
  - en mi celo ardiente
  - en mi celos
  rationale: En un contexto pactual y profético, 'celo' comunica mejor la lealtad apasionada de Dios y evita una lectura antropomórfica negativa que 'celos' podría sugerir en español.
  doctrine_reference: Lexical-theological note on divine קִנְאָה / zeal-jealousy
- issue: Traducción de כְּלִמָּה en la cláusula final
  english_pob_reading: the disgrace of the nations
  chosen_spanish_reading: la vergüenza de las naciones
  alternative_spanish_readings:
  - el oprobio de las naciones
  - el reproche de las naciones
  rationale: El hebreo puede apuntar a deshonra o reproche. 'Vergüenza' conserva la fuerza afectiva y social del término sin perder la carga de humillación pública.
  doctrine_reference: Lexical-theological note on shame/reproach language
translation_notes:
  revision_awareness: La revisión inglesa reciente reemplazó 'Look' por 'Behold' para un registro más formal en הִנְנִי. La versión española sigue esa misma dirección con 'He aquí'. No se adoptaron otras alteraciones sustantivas del sentido; se mantuvo la estructura y el contenido del texto base con equivalencias naturales en español.
  spanish_consistency_notes:
  - Se mantiene Yahvé para יְהוָה según la norma del proyecto.
  - Se conserva la fórmula profética solemne 'Adonai Yahvé' para אֲדֹנָי יְהוִה.
  - Se traduce הִנְנִי con 'He aquí' para preservar el tono deíctico y formal.
  - Se evita 'SEÑOR' como máscara tipográfica del nombre divino.
  - 'El paralelismo topográfico se conserva con una serie de cuatro sustantivos en plural: montes, colinas, barrancos y valles.'
  - Se mantiene un registro bíblico moderno, sin arcaísmos innecesarios, pero respetando la solemnidad profética.
