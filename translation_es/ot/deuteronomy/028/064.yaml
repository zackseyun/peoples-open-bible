base_translation:
  language: en
  yaml_path: translation/ot/deuteronomy/028/064.yaml
  text: And Yahweh will scatter you among all the peoples[a], from one end of the earth to the other end of the earth[b], and there you will serve other gods that neither you nor your fathers have known—wood and stone.
  footnotes:
  - marker: a
    text: Or 'from one end of the land to the other end of the land.' Hebrew אֶרֶץ can mean either 'land' or 'earth'; here 'earth' is preferred because the context speaks of scattering among all peoples.
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'wood and stone,' referring to idols made from these materials.
    reason: cultural_note
