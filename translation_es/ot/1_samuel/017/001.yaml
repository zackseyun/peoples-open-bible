  text: וַ/יַּאַסְפ֨וּ פְלִשְׁתִּ֤ים אֶת מַֽחֲנֵי/הֶם֙ לַ/מִּלְחָמָ֔ה וַ/יֵּאָ֣סְפ֔וּ שֹׂכֹ֖ה אֲשֶׁ֣ר לִ/יהוּדָ֑ה וַֽ/יַּחֲנ֛וּ בֵּין שׂוֹכֹ֥ה וּ/בֵין עֲזֵקָ֖ה בְּ/אֶ֥פֶס דַּמִּֽים־־־׃
base_translation:
  language: en
  yaml_path: translation/ot/1_samuel/017/001.yaml
  text: Now the Philistines gathered their armies for battle[a], and they assembled at Socoh, which belongs to Judah, and camped between Socoh and Azekah[b], at Ephes-dammim.
  footnotes:
  - marker: a
    text: Or 'their forces' for 'their camps'; the Hebrew term can refer to military camps or armies.
    reason: lexical_alternative
  - marker: b
    text: Socoh was a town in the territory of Judah.
    reason: cultural_note
