review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien el sentido general del griego y el hilo argumental de 4 Macabeos: la ley contiene al individuo mediante la razón, y el ejemplo agrícola desemboca en la afirmación de que la razón gobierna las pasiones. Sin embargo, hay dos ajustes importantes. Primero, κρατεῖται se acerca mejor a ''es refrenado'' o ''queda contenido'' que a ''está dominado'', porque el sujeto es la persona contenida por la ley, no vencida por ella en sentido fuerte. Segundo, la nota al pie actual invierte la relación principal/alterna de φειδωλός: el texto español usa ''avaro'', pero la nota dice ''más literalmente, tacaño'', cuando el inglés auditado preserva como alternativa la rareza agrícola del verbo de las viñas, no una alternativa para φειδωλός.'
  spanish_quality_summary: El español es claro y generalmente natural. 'Avaro' funciona, aunque 'tacaño' también sería posible; 'avaro' mantiene mejor el matiz ético. La frase agrícola suena bien, pero 'sin recoger los restos de la cosecha' puede sugerir residuos ya cosechados más que 'lo no cosechado'. 'Sin aprovechar lo que quedó sin cosechar' o 'sin recoger lo que quedó sin cosechar' refleja mejor el valor de ἀμήτους. También conviene trasladar la nota al verbo de las viñas, donde el inglés POB documenta la alternativa léxica.
  glossary_alignment: 'No hay conflictos con la terminología base del proyecto. ''La razón'' para λογισμός y ''las pasiones'' para πάθη están bien alineadas con las decisiones documentadas. La principal desalineación está en la gestión de la nota léxica: debe anclarse en ''volver a pasar por las viñas'' y no en ''avaro''.'
  issues:
  - severity: medium
    issue: κρατεῖται traducido como 'está dominado'
    rationale: El griego pasivo aquí expresa ser contenido o refrenado por la ley mediante la razón. 'Está dominado' puede sonar demasiado fuerte o cambiar el foco hacia una subyugación total, mientras que 'es refrenado' o 'queda contenido' conserva mejor el matiz ético-legal.
  - severity: medium
    issue: La nota al pie está anclada al término equivocado
    rationale: El rastro de auditoría inglés conserva la alternativa léxica para ἐπιρρωγολογούμενος ('picking over the vineyards'), no para φειδωλός. La nota española actual introduce una alternativa no documentada como si fuera la principal y omite la alternativa agrícola que sí debe preservarse.
  - severity: low
    issue: '''los restos de la cosecha'' puede desviar el sentido de ἀμήτους'
    rationale: ἀμήτους apunta a lo no cosechado/no segado, no tanto a residuos después de cosechar. Una redacción como 'lo que quedó sin cosechar' es más precisa y sigue siendo natural en español.
  revised_spanish_text: 'Y aun si alguien es avaro, es refrenado por la ley por medio de la razón, sin recoger lo que quedó sin cosechar ni volver a pasar por las viñas[a]. Y también en las demás cosas se puede reconocer esto: que la razón domina sobre las pasiones.'
  revised_footnotes:
  - marker: a
    text: O, más literalmente, «repasar las viñas»; es decir, recoger lo que queda después de la primera pasada de la cosecha.
    reason: lexical_alternative
  revision_rationale: Se ajusta el verbo principal para reflejar mejor el pasivo κρατεῖται ('es refrenado'), se precisa la imagen agrícola de ἀμήτους como 'lo que quedó sin cosechar', y se reubica la nota léxica al verbo raro de las viñas, en línea con la auditoría inglesa.
