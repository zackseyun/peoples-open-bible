translation:
  language: es
  text: Antes de que mueras[a], haz bien a quien amas, y según lo que alcanza tu mano[b], dale.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «a tu amigo»; el paralelo griego dice «haz bien a un amigo».
    reason: alternative_reading
  - marker: b
    text: Literalmente, «lo que alcanza tu mano»; es decir, según tus medios o tu capacidad.
    reason: lexical_alternative
lexical_decisions:
- source_word: בְּטֶרֶם / πρὶν
  english_pob_choice: Before
  chosen_spanish: Antes de que
  alternatives_spanish:
  - Antes
  - Antes de
  lexicon: HALOT; LXX πίρν
  rationale: La idea temporal exige una forma natural en español que introduzca una acción previa a la muerte. «Antes de que» conserva la anterioridad sin sonar mecánico.
- source_word: תָּמוּת / τελευτῆσαι
  english_pob_choice: you die
  chosen_spanish: mueras
  alternatives_spanish:
  - muertes
  - fallezcas
  - llegues a morir
  lexicon: HALOT; LSJ
  rationale: El verbo expresa morir de manera directa. «Mueras» mantiene la sencillez y la fuerza de la exhortación, sin añadir matices no presentes en el texto.
- source_word: הֵיטִב / εὖ ποίει
  english_pob_choice: do good
  chosen_spanish: haz bien
  alternatives_spanish:
  - haz el bien
  - trata bien
  - haz el bien a
  lexicon: HALOT; LSJ
  rationale: La construcción imperativa pide beneficiar activamente a otro. «Haz bien» es breve, idiomático y conserva el sentido benefactivo sin explicarlo de más.
- source_word: לְאוֹהֵב / φίλῳ
  english_pob_choice: to one you love
  chosen_spanish: a un ser amado
  alternatives_spanish:
  - a un amigo
  - a uno que amas
  - a un amado
  lexicon: HALOT; LSJ
  rationale: El hebreo permite un sentido relacional amplio; el griego puede inclinarse hacia «amigo». «Ser amado» preserva esa amplitud y evita fijar innecesariamente la relación en «amigo».
- source_word: וְהַשִּׂיגַת יָדְךָ / κατὰ τὴν ἰσχύν σου
  english_pob_choice: according to what your hand attains
  chosen_spanish: según lo que alcanza tu mano
  alternatives_spanish:
  - según tus medios
  - de acuerdo con tu capacidad
  - según la fuerza de tu mano
  lexicon: HALOT; LSJ
  rationale: La imagen de la «mano» con el sentido de alcance/capacidad debe mantenerse, porque tanto el hebreo como el griego apuntan a recursos o poder efectivo. «Alcanza tu mano» preserva la metáfora y resulta comprensible en español.
- source_word: תֶּן לוֹ / δὸς αὐτῷ
  english_pob_choice: give to him
  chosen_spanish: dale a él
  alternatives_spanish:
  - dáselo
  - dale
  - entrégaselo
  lexicon: HALOT; LSJ
  rationale: Se mantiene el destinatario explícito. Aunque «dale» sería más natural, «dale a él» conserva la estructura directa del original y evita confundir el objeto con un clítico de complemento distinto.
theological_decisions:
- issue: Relational term for the recipient (beloved/friend)
  english_pob_reading: one you love
  chosen_spanish_reading: un ser amado
  alternative_spanish_readings:
  - tu amigo
  - a quien amas
  - un amado
  rationale: La tradición hebrea primaria es más amplia que una mera amistad; el griego sí sugiere amistad, pero no obliga a estrechar el término. «Ser amado» mantiene la tensión documental entre ambas fuentes y evita resolverla demasiado pronto.
  doctrine_reference: 'POB translation policy: preserve source tension when Hebrew and Greek differ slightly; do not collapse a relational term into a narrower traditional gloss without warrant.'
- issue: Meaning of 'your hand attains' as ability/resources
  english_pob_reading: according to what your hand attains ... according to your means or ability
  chosen_spanish_reading: según lo que alcanza tu mano
  alternative_spanish_readings:
  - según tus medios
  - según tu capacidad
  - según tus recursos
  rationale: La imagen corporal de la mano es parte del sentido del texto y corresponde al griego 'según tu fuerza'. La traducción elegida conserva la metáfora y, al mismo tiempo, comunica la idea de capacidad real o recursos disponibles.
  doctrine_reference: 'Translation principle: maintain concrete biblical imagery where it carries meaning, adding explanatory notes only if needed.'
translation_notes:
  revision_awareness: La redacción sigue la revisión más reciente del inglés POB, que ajustó la expresión equivalente a «your hand attains» para reflejar con más directitud el hebreo. En español se preserva esa misma decisión con una frase que mantiene la metáfora de la mano y el sentido de capacidad.
  spanish_consistency_notes:
  - Se usa «mano» para reproducir la imagen semítica de alcance/capacidad.
  - Se evita «Cristo», «SEÑOR» u otras sustituciones no pertinentes; el versículo no contiene nombres divinos.
  - Se mantiene un registro sobrio y bíblico, pero con español natural y publicable.
  - La nota [a] preserva la tensión entre el hebreo más amplio y el paralelo griego más estrecho.
