translation:
  language: es
  text: 'El rey le dijo: «¿Dónde está él?». Y Ziba dijo al rey: «He aquí, está en la casa de Macir[a] hijo de Amiel, en Lo-debar»[b].'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: La forma hebrea del nombre es מָכִיר; se translitera aquí como «Macir» para representar la pronunciación española sin cambiar el referente.
    reason: source_note
  - marker: b
    text: 'O: «en la casa de Macir hijo de Amiel, en Lo-debar». La preposición hebrea también puede expresarse con un matiz locativo equivalente a «en/por Lo-debar», no de dirección.'
    reason: lexical_alternative
lexical_decisions:
- source_word: הַמֶּלֶךְ
  english_pob_choice: The king
  chosen_spanish: el rey
  alternatives_spanish:
  - el monarca
  lexicon: HALOT
  rationale: El título definido se mantiene como sustantivo común en español para conservar el referente de David sin sustituirlo por el nombre propio, como hace el texto fuente.
- source_word: אֵיפֹה
  english_pob_choice: Where
  chosen_spanish: ¿Dónde?
  alternatives_spanish:
  - ¿En qué lugar?
  - ¿Dónde ahora?
  lexicon: HALOT
  rationale: Interrogativa de ubicación; en español «¿Dónde?» es natural y fiel sin añadir matices discursivos no exigidos por el hebreo.
- source_word: הִנֵּה
  english_pob_choice: Behold
  chosen_spanish: Mira
  alternatives_spanish:
  - He aquí
  - Mira, pues
  - He aquí que
  lexicon: HALOT
  rationale: La partícula presentativa pide una forma que atraiga la atención. «Mira» comunica ese gesto deíctico en español moderno; se preserva la fuerza presentacional sin caer en rigidez arcaica.
- source_word: בֵּית
  english_pob_choice: the house of
  chosen_spanish: casa de
  alternatives_spanish:
  - la casa de
  - el hogar de
  - la familia de
  lexicon: HALOT
  rationale: En este contexto la frase señala ubicación/residencia. «Casa de» reproduce el valor locativo más directo y corresponde al español natural para un lugar habitado.
- source_word: מָכִיר בֶּן עַמִּיאֵל
  english_pob_choice: Machir son of Ammiel
  chosen_spanish: Macir hijo de Amiel
  alternatives_spanish:
  - Machir hijo de Ammiel
  - Makhir hijo de Amiel
  lexicon: transliteration
  rationale: Se transliteran los nombres propios al español siguiendo la práctica del proyecto; «Macir» refleja el nombre hebreo מָכִיר y «Amiel» conserva la forma usual del patronímico.
- source_word: בְּלוֹ דְבָר
  english_pob_choice: in Lo-debar
  chosen_spanish: en Lo-debar
  alternatives_spanish:
  - en Lo-Debar
  - a Lo-debar
  lexicon: HALOT
  rationale: La preposición בְּ indica localización. «En Lo-debar» es la solución más idiomática en español y mantiene el valor locativo de la forma hebrea.
- source_word: וַיֹּאמֶר ... וַיֹּאמֶר
  english_pob_choice: said ... said
  chosen_spanish: dijo ... dijo
  alternatives_spanish:
  - preguntó ... respondió
  - dijo ... respondió
  lexicon: HALOT
  rationale: Se conserva la repetición verbal del hebreo, aunque en español podría suavizarse con «preguntó/respondió». Mantener «dijo» en ambos casos preserva la estructura discursiva del original.
translation_notes:
  revision_awareness: La versión inglesa auditada mantuvo la estructura básica del hebreo y pasó de «Look» a «Behold» para הִנֵּה, reforzando el tono presentacional. La redacción española adopta una solución equivalente con «Mira» para conservar esa función deíctica sin perder naturalidad. También se conserva la repetición de «dijo» para reflejar la simplicidad del relato, y se mantiene la lectura locativa de בְּלוֹ דְבָר.
  spanish_consistency_notes:
  - Se usa «Yahvé» como forma preferida en el proyecto, pero este versículo no contiene el nombre divino.
  - Se mantiene «rey» como título definido sin sustituirlo por el nombre propio, en paralelo al texto fuente.
  - Los nombres propios se transliteran de manera consistente y sin adaptar el sentido.
  - La frase «casa de» se conserva por su valor locativo, no como referencia a un linaje o clan en este versículo.
