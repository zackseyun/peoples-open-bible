translation:
  language: es
  text: He aquí, yo traigo terror sobre ti de todas partes a tu alrededor, declara Yahvé Dios de los ejércitos, y serán expulsados, cada hombre delante de sí[a]; no habrá quien reúna al fugitivo[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «cada uno recto hacia adelante» / «cada hombre delante de sí». La frase hebrea es tersa y puede describir una huida en pánico, en la que cada uno corre sin atender a los demás.
    reason: lexical_alternative
  - marker: b
    text: O «al errante» o «al que huye».
    reason: alternative_reading
lexical_decisions:
- source_word: הִנְנִי
  english_pob_choice: Behold
  chosen_spanish: He aquí
  alternatives_spanish:
  - Mira
  - He aquí, yo
  lexicon: HALOT
  rationale: La fórmula profética introduce una घोषणा solemne e inmediata. «He aquí» conserva el tono exhortativo/solemne mejor que opciones más coloquiales, y puede combinarse naturalmente con la primera persona implícita del hebreo.
- source_word: מֵבִיא
  english_pob_choice: I am bringing
  chosen_spanish: traigo
  alternatives_spanish:
  - estoy trayendo
  - voy a traer
  lexicon: HALOT
  rationale: El participio con הִנְנִי expresa acción inminente y enfática. En español, el presente simple «traigo» comunica esa inmediatez con más naturalidad que una perífrasis, sin perder el sentido de acción divina en curso.
- source_word: פַּחַד
  english_pob_choice: terror
  chosen_spanish: terror
  alternatives_spanish:
  - miedo
  - temor
  - espanto
  lexicon: HALOT
  rationale: En contexto de juicio divino, «terror» refleja mejor el impacto de pánico y consternación que Dios trae sobre la ciudad. «Miedo» o «temor» son posibles, pero suenan más débiles.
- source_word: נְאֻם אֲדֹנָי יְהוִה צְבָאוֹת
  english_pob_choice: declares the Lord GOD of hosts
  chosen_spanish: declara Yahvé Dios de los ejércitos
  alternatives_spanish:
  - declara el Señor Yahvé de los ejércitos
  - declara Yahvé, Dios de los ejércitos
  lexicon: HALOT
  rationale: Se conserva la fórmula profética «declara» para נְאֻם. El Tetragrámaton se vierte según la pauta del proyecto como «Yahvé», no como máscara litúrgica. «Dios de los ejércitos» traduce צְבָאוֹת de forma transparente y reconocible en español bíblico.
- source_word: מִכָּל סְבִיבַיִךְ
  english_pob_choice: from all around you
  chosen_spanish: desde todos tus alrededores
  alternatives_spanish:
  - de todos tus alrededores
  - desde todos lados a tu alrededor
  lexicon: HALOT
  rationale: La locución idiomática expresa amenaza circundante. «Desde todos tus alrededores» conserva la imagen de cerco y resulta natural en español; «alrededores» mantiene el sustantivo relacional del hebreo sin calco rígido.
- source_word: וְנִדַּחְתֶּם
  english_pob_choice: will be driven out
  chosen_spanish: será dispersado
  alternatives_spanish:
  - serán dispersados
  - será echado
  - serán arrojados
  lexicon: HALOT
  rationale: El hebreo Niphal de נדח puede implicar ser arrojado/expulsado o quedar disperso. Aquí el contexto inmediato desarrolla la dispersión individual, por lo que «será dispersado» integra mejor el efecto del juicio que una mera expulsión.
- source_word: אִישׁ לְפָנָיו
  english_pob_choice: each man before him
  chosen_spanish: cada hombre delante de él
  alternatives_spanish:
  - cada uno recto hacia adelante
  - cada hombre en línea delante de él
  - cada hombre antes de sí
  lexicon: HALOT
  rationale: La frase es breve y tensa; puede describir huida caótica «delante de él» o «recto hacia adelante». Se conserva la imagen espacial y el distributivo masculino singular del hebreo, sin neutralizarlo.
- source_word: וְאֵין מְקַבֵּץ
  english_pob_choice: with no one to gather
  chosen_spanish: no habrá quien reúna
  alternatives_spanish:
  - y no habrá quien junte
  - sin nadie que reúna
  - y no habrá quien recobre
  lexicon: HALOT
  rationale: El participio expresa ausencia de alguien que recoja/regroupe a los dispersos. «No habrá quien reúna» es idiomático y mantiene la idea de restauración frustrada.
- source_word: לַנֹּדֵד
  english_pob_choice: the fugitive
  chosen_spanish: al fugitivo
  alternatives_spanish:
  - al errante
  - al que huye
  - al vagabundo
  lexicon: HALOT
  rationale: En este contexto de huida forzada, «fugitivo» capta mejor el matiz de uno que se ve obligado a escapar. «Errante» sería posible, pero suaviza el juicio y puede sugerir vagabundeo más general.
theological_decisions:
- issue: Nombre divino יְהוָה (YHWH)
  english_pob_reading: the Lord GOD of hosts
  chosen_spanish_reading: Yahvé Dios de los ejércitos
  alternative_spanish_readings:
  - el Señor Dios de los ejércitos
  - Yahvé, el Dios de los ejércitos
  rationale: Siguiendo la pauta del proyecto, el nombre del pacto se vierte como «Yahvé» de forma explícita. Se evita la sustitución por «Señor» como convención de ocultamiento, y se mantiene el título militar-divino «Dios de los ejércitos».
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Valor distributivo de אִישׁ
  english_pob_reading: each man
  chosen_spanish_reading: cada hombre
  alternative_spanish_readings:
  - cada uno
  - cada persona
  rationale: El hebreo usa un singular masculino distributivo. Se conserva «cada hombre» para reflejar esa forma sin borrar el matiz gramatical; no se neutraliza porque el texto subraya la dispersión de cada varón individualmente.
  doctrine_reference: DOCTRINE.md Translation philosophy §4
- issue: Tensión semántica de נִדַּח / מְקַבֵּץ
  english_pob_reading: will be driven out ... with no one to gather the fugitive
  chosen_spanish_reading: será dispersado ... no habrá quien reúna al fugitivo
  alternative_spanish_readings:
  - será expulsado ... no habrá quien junte al fugitivo
  - será arrojado ... no habrá quien recupere al fugitivo
  rationale: 'El hebreo combina expulsión/dispersion con la ausencia de quien recupere al disperso. Se mantiene esa tensión con dos verbos distintos: «dispersado» y «reúna», evitando reducir el verso a un solo matiz.'
  doctrine_reference: HALOT / contexto inmediato de juicio y dispersión
translation_notes:
  revision_awareness: 'Se tuvo en cuenta el audit trail inglés y la revisión más reciente sin cambios. El español conserva las decisiones centrales: fórmula profética, nombre divino explícito «Yahvé», valor distributivo masculino de אִישׁ, y la tensión entre dispersión y ausencia de quien reúna.'
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» para יְהוָה conforme al estándar del proyecto.
  - Se evitó «Señor» como sustituto principal del nombre divino.
  - Se conservó el tono de anuncio profético con «He aquí» y «declara».
  - Se preservó la imagen de juicio circundante con «desde todos tus alrededores».
  - Se mantuvo el masculino distributivo «cada hombre» por fidelidad al hebreo.
