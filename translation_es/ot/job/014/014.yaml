  text: אִם יָמ֥וּת גֶּ֗בֶר הֲ/יִ֫חְיֶ֥ה כָּל יְמֵ֣י צְבָאִ֣/י אֲיַחֵ֑ל עַד בּ֝֗וֹא חֲלִיפָתִֽ/י־־־׃
