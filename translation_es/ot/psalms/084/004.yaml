    text: 'O: «donde ha puesto sus polluelos». El verbo hebreo puede entenderse como una acción ya realizada, no solo como una descripción general del propósito del nido.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «cerca de tus altares» o «al lado de tus altares». La construcción hebrea es compacta y puede expresar proximidad más que colocación literal sobre los altares.'
    reason: lexical_alternative
  revision_rationale: 'Se corrigen los anclajes de notas para que coincidan con las alternativas documentadas en la POB inglesa y con la evidencia hebrea: la nota de aspecto verbal pasa a «donde ponga», y la nota locativa se ancla a «tus altares». Además, «ha encontrado un hogar» mejora la naturalidad y refleja mejor el sentido de מָצְאָה בַיִת sin apartarse del original.'
