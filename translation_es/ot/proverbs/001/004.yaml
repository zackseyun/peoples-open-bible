translation:
  language: es
  text: para dar prudencia a los simples[a], conocimiento y discreción al joven.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'a un joven' o 'a una persona joven'. El hebreo es masculino singular ('joven') y puede funcionar de modo representativo en la instrucción sapiencial.
    reason: lexical_alternative
lexical_decisions:
- source_word: לָתֵת
  english_pob_choice: to give
  chosen_spanish: dar
  alternatives_spanish:
  - para dar
  - para otorgar
  lexicon: HALOT
  rationale: El infinitivo constructo con ל expresa finalidad y continúa la frase de propósito del versículo anterior. En español, 'para dar' conserva esa función de manera natural; 'dar' mantiene la relación semántica básica con el inglés auditado.
- source_word: לִפְתָאיִם
  english_pob_choice: to the simple
  chosen_spanish: a los simples
  alternatives_spanish:
  - a los ingenuos
  - a los inexpertos
  lexicon: HALOT
  rationale: En la literatura sapiencial, פְּתָאִים designa a los simples o ingenuos, especialmente los fácilmente influenciables. 'Simples' es el término tradicional y funcional en español para ese grupo moral-pedagógico, sin cargarlo de un sentido intelectual indebido.
- source_word: עָרְמָה
  english_pob_choice: prudence
  chosen_spanish: prudencia
  alternatives_spanish:
  - astucia
  - discreción
  lexicon: HALOT
  rationale: Aunque la palabra hebrea puede oscilar hacia la astucia en otros contextos, aquí el paralelo sapiencial es positivo. 'Prudencia' preserva ese valor favorable y evita el matiz negativo de 'astucia'.
- source_word: לְנַעַר
  english_pob_choice: to the young man
  chosen_spanish: al joven
  alternatives_spanish:
  - al muchacho
  - a un joven
  lexicon: HALOT
  rationale: El hebreo es masculino singular. En español, 'al joven' conserva esa forma sin sonar tan rígido como 'joven varón' o tan amplio como una neutralización. Mantiene también la posibilidad representativa que nota el audit trail inglés.
- source_word: דַּעַת
  english_pob_choice: knowledge
  chosen_spanish: conocimiento
  alternatives_spanish:
  - conocimiento
  - saber
  lexicon: HALOT
  rationale: דַּעַת denota conocimiento en el marco sapiencial. 'Conocimiento' es la equivalencia más directa y mantiene la pareja semántica con 'discreción'.
- source_word: וּמְזִמָּה
  english_pob_choice: and discretion
  chosen_spanish: y discreción
  alternatives_spanish:
  - y buen juicio
  - y sensatez
  lexicon: HALOT
  rationale: מְזִמָּה puede referirse a plan prudente, discreción o reflexión atenta. 'Discreción' encaja bien con el tono formativo del proverbio y conserva el equilibrio con 'conocimiento'.
theological_decisions:
- issue: Referencia masculina singular en la instrucción sapiencial
  english_pob_reading: young man
  chosen_spanish_reading: el joven
  alternative_spanish_readings:
  - la juventud
  - una persona joven
  rationale: El hebreo usa el singular masculino נַעַר. Se conserva esa forma en español para no borrar el rasgo gramatical documentado. Al mismo tiempo, en el contexto sapiencial puede entenderse de manera representativa, como nota el texto inglés.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4
translation_notes:
  revision_awareness: 'El pasaje coincide con el audit trail inglés: no hay revisiones aplicadas y el control cruzado reporta acuerdo alto. La redacción española sigue de cerca la estructura de finalidad del hebreo y conserva la elección positiva de ''prudencia'' y la singularidad masculina de נַעַר.'
  spanish_consistency_notes:
  - Se mantiene el registro sapiencial con vocabulario claro y digno.
  - '''Prudencia'' y ''discreción'' forman una pareja natural en español para los términos de sabiduría del hebreo.'
  - La nota al pie preserva la alternativa representativa del singular masculino sin neutralizar la forma principal del texto.
