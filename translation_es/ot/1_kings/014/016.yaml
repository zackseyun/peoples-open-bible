translation:
  language: es
  text: Y entregará[a] a Israel por causa de los pecados de Jeroboam, que él cometió y por los cuales hizo pecar a Israel.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: "lo entregará". El verbo hebreo significa literalmente "dar", pero aquí se usa en un contexto de juicio para entregar a un pueblo al desastre o a enemigos.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְיִתֵּן
  english_pob_choice: and he will give up
  chosen_spanish: y entregará
  alternatives_spanish:
  - y lo dará
  - y lo entregará
  - y lo pondrá en manos de
  lexicon: HALOT
  rationale: נתן en este contexto judicial no significa simplemente “dar”, sino entregar a alguien a juicio, desastre o enemigos. “Entregará” conserva ese valor sin añadir un instrumento histórico que el hebreo no especifica en esta cláusula.
- source_word: אֶת יִשְׂרָאֵל
  english_pob_choice: Israel
  chosen_spanish: a Israel
  alternatives_spanish:
  - Israel
  - al pueblo de Israel
  lexicon: HALOT
  rationale: El objeto directo es la nación Israel, es decir, el reino del norte como colectividad. En español, “a Israel” expresa naturalmente el destinatario de la entrega.
- source_word: בִּגְלַל
  english_pob_choice: because of
  chosen_spanish: por causa de
  alternatives_spanish:
  - a causa de
  - debido a
  lexicon: HALOT
  rationale: La preposición marca causa o motivo. “Por causa de” es clara, sobria y fiel al sentido causal.
- source_word: חַטֹּאות
  english_pob_choice: the sins
  chosen_spanish: los pecados
  alternatives_spanish:
  - las faltas
  - las ofensas
  lexicon: HALOT
  rationale: El sustantivo plural pide plural en español. “Pecados” es el equivalente directo y mantiene la fuerza moral y religiosa del término.
- source_word: יָרָבְעָם
  english_pob_choice: Jeroboam
  chosen_spanish: Jeroboam
  alternatives_spanish:
  - Yeroboam
  lexicon: HALOT
  rationale: Nombre propio transliterado conforme al uso editorial del proyecto.
- source_word: אֲשֶׁר חָטָא
  english_pob_choice: which he committed
  chosen_spanish: que él cometió
  alternatives_spanish:
  - que pecó
  - que había cometido
  lexicon: HALOT
  rationale: El relativo describe los pecados de Jeroboam. “Cometió” comunica en español la acción concreta sin perder la referencia a su culpa personal.
- source_word: וַאֲשֶׁר הֶחֱטִיא
  english_pob_choice: and by which he caused Israel to sin
  chosen_spanish: y por los cuales hizo pecar a Israel
  alternatives_spanish:
  - y con los cuales hizo pecar a Israel
  - y por medio de los cuales indujo a Israel a pecar
  lexicon: HALOT
  rationale: 'El hifil de חטא es causativo: “hacer pecar”. En español, “hizo pecar” preserva esa causalidad directa. “Por los cuales” hace que el relativo vuelva a los pecados/prácticas de Jeroboam, como en el hebreo y en la lectura inglesa auditada.'
- source_word: אֶת יִשְׂרָאֵל
  english_pob_choice: Israel
  chosen_spanish: a Israel
  alternatives_spanish:
  - Israel
  lexicon: HALOT
  rationale: 'Se mantiene el mismo referente colectivo: la nación que fue inducida al pecado.'
theological_decisions:
- issue: Fuerza judicial de וְיִתֵּן
  english_pob_reading: he will give up Israel
  chosen_spanish_reading: entregará a Israel
  alternative_spanish_readings:
  - dará a Israel
  - entregará Israel
  rationale: La frase debe reflejar que se trata de un acto de juicio divino. “Entregará” conserva la solemnidad judicial sin convertir el verbo en una expresión excesivamente interpretativa.
  doctrine_reference: Translation philosophy §1, §6
- issue: Causalidad del hifil en הֶחֱטִיא
  english_pob_reading: by which he caused Israel to sin
  chosen_spanish_reading: por los cuales hizo pecar a Israel
  alternative_spanish_readings:
  - con los cuales hizo pecar a Israel
  - por medio de los cuales indujo a Israel a pecar
  rationale: El hebreo afirma tanto el pecado personal de Jeroboam como su responsabilidad al hacer pecar a Israel. La traducción debe mantener esa doble culpabilidad sin suavizar la voz causativa.
  doctrine_reference: Translation philosophy §3, §5
translation_notes:
  revision_awareness: El texto español sigue de cerca el acuerdo alto entre la traducción inglesa auditada y el hebreo masorético, sin introducir revisiones adicionales; se mantuvo la lectura causal y la fuerza judicial del verbo principal.
  spanish_consistency_notes:
  - Se conserva “Jeroboam” como nombre propio transliterado, en consonancia con el estándar del proyecto.
  - Se usa “pecados” en plural para reflejar חַטֹּאות.
  - Se mantiene “hacer pecar” para el hifil causativo, evitando debilitar la responsabilidad moral de Jeroboam.
  - El referente colectivo “Israel” se entiende como el reino/nación del norte, sin añadir explicaciones no presentes en el texto.
