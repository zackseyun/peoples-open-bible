translation:
  language: es
  text: Cuando llegaron a la era de Kidón, Uza extendió su mano para sujetar el arca, porque los bueyes[a] tropezaron.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «resbalaron». El verbo hebreo puede describir un deslizamiento o una pérdida de estabilidad; aquí señala el movimiento desestabilizador de los bueyes.'
    reason: lexical_alternative
lexical_decisions:
- source_word: גֹּרֶן כִּידֹן
  english_pob_choice: the threshing floor of Kidon
  chosen_spanish: la era de Quidón
  alternatives_spanish:
  - la era de Kidón
  - la era en Quidón
  lexicon: HALOT
  rationale: גֹּרֶן designa una era o sitio de trilla; en español bíblico claro, 'era' comunica bien la imagen agrícola. כִּידֹן es un nombre propio transliterado como Quidón para conservar el referente toponímico sin interpretarlo.
- source_word: וַיִּשְׁלַח ... אֶת יָדוֹ
  english_pob_choice: reached out his hand
  chosen_spanish: extendió su mano
  alternatives_spanish:
  - alargó su mano
  - tendió su mano
  lexicon: HALOT
  rationale: El giro hebreo expresa el gesto de extender la mano. 'Extendió su mano' es natural en español y mantiene el movimiento físico sin añadir matices ajenos.
- source_word: לֶאֱחֹז
  english_pob_choice: to take hold of
  chosen_spanish: para tomar
  alternatives_spanish:
  - para sujetar
  - para asir
  lexicon: HALOT
  rationale: אחז implica agarrar o tomar con la mano. En este contexto, 'tomar' transmite la intención inmediata de sujetar el arca con claridad y fluidez, sin sugerir violencia.
- source_word: הָאָרוֹן
  english_pob_choice: the ark
  chosen_spanish: el arca
  alternatives_spanish:
  - el arca de Dios
  lexicon: HALOT
  rationale: El hebreo dice simplemente 'el arca'. Se mantiene esa concisión, evitando importar una expansión contextual que no está presente en esta frase.
- source_word: כִּי
  english_pob_choice: because
  chosen_spanish: porque
  alternatives_spanish:
  - pues
  lexicon: HALOT
  rationale: כִּי introduce la causa de la acción de Uza. 'Porque' es la opción más directa y transparente en español contemporáneo.
- source_word: שָׁמְטוּ
  english_pob_choice: stumbled
  chosen_spanish: tropezaban
  alternatives_spanish:
  - resbalaban
  - iban a resbalar
  lexicon: HALOT
  rationale: El verbo puede referir a deslizarse o perder estabilidad. Con los bueyes como sujeto, 'tropezaban' comunica bien el movimiento inestable que motivó la reacción de Uza, manteniendo la tensión semántica del hebreo.
- source_word: הַבָּקָר
  english_pob_choice: the oxen
  chosen_spanish: los bueyes
  alternatives_spanish:
  - el ganado
  - los animales de tiro
  lexicon: HALOT
  rationale: En este contexto de transporte, בָּקָר se refiere a animales de tiro; 'bueyes' es preciso y natural en español. Se evita un término demasiado general como 'ganado'.
translation_notes:
  revision_awareness: La revisión más reciente no introdujo cambios sustantivos; el estado de alta concordancia con la fuente se mantiene, por lo que esta propuesta sigue la lectura ya validada sin ajustes textuales nuevos.
  spanish_consistency_notes:
  - 'Se conserva el nombre propio transliterado de forma uniforme: Quidón.'
  - Se mantiene un registro bíblico moderno y sobrio, evitando arcaísmos innecesarios.
  - No se amplía 'el arca' a 'el arca de Dios', en coherencia con el hebreo de esta frase.
  - El valor verbal de שָׁמְטוּ queda reflejado con una alternativa en nota para preservar la ambigüedad lexical documentada.
