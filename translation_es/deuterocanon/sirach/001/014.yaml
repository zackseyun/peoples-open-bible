translation:
  language: es
  text: El principio de la sabiduría es el temor de Yahvé[a][b], y con los fieles fue formada en el vientre.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'El griego dice de manera bastante distinta: «Entre los hombres anidó como fundamento eterno, y con su descendencia será confiada». Los testigos hebreo y griego divergen de forma sustancial aquí.'
    reason: alternative_reading
  - marker: b
    text: O posiblemente «fue preservada en el vientre», si el verbo hebreo se entiende desde una raíz con el sentido de «guardar» más que en un sentido de formación o nacimiento.
    reason: lexical_alternative
lexical_decisions:
- source_word: רֵאשִׁית
  english_pob_choice: the beginning of
  chosen_spanish: el principio de
  alternatives_spanish:
  - la primera parte de
  - la parte principal de
  lexicon: HALOT
  rationale: En construcciones sapienciales, רֵאשִׁית suele expresar origen o comienzo. «El principio de» es la forma más natural y fiel en español para esta relación.
- source_word: חָכְמָה
  english_pob_choice: wisdom
  chosen_spanish: sabiduría
  alternatives_spanish:
  - prudencia
  - sapiencia
  lexicon: HALOT
  rationale: En la literatura sapiencial, el sentido estándar es «sabiduría». Es el equivalente más claro y estable en español bíblico moderno.
- source_word: יִרְאַת יְהֹוָה
  english_pob_choice: the fear of Yahweh
  chosen_spanish: el temor de Yahvé
  alternatives_spanish:
  - el temor de Yahweh
  - la reverencia por Yahvé
  lexicon: HALOT
  rationale: Se conserva la fuerza lexical de יִרְאָה como «temor», que en esta expresión fija de sabiduría no debe suavizarse a «reverencia». Se usa «Yahvé» según la terminología del proyecto para el nombre divino.
- source_word: יְהֹוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  - Jehová
  lexicon: HALOT
  rationale: El nombre del pacto se traslada como «Yahvé», conforme al criterio español del proyecto para יְהוָה.
- source_word: וְעִם
  english_pob_choice: and with
  chosen_spanish: y con
  alternatives_spanish:
  - y entre
  - y junto con
  lexicon: HALOT
  rationale: La preposición básica es relacional; «y con» reproduce de forma directa y natural la unión con los «fieles».
- source_word: נֶאֱמָנִים
  english_pob_choice: the faithful
  chosen_spanish: los fieles
  alternatives_spanish:
  - los fieles y confiables
  - los confiables
  lexicon: HALOT
  rationale: Como sustantivo/adjetivo colectivo, designa a personas fieles. «Los fieles» es idiomático en español y mantiene el matiz moral-religioso.
- source_word: נוֹצְרָה
  english_pob_choice: was formed
  chosen_spanish: fue formada
  alternatives_spanish:
  - fue guardada
  - fue preservada
  lexicon: HALOT
  rationale: Aunque el hebreo permite una lectura ligada a «guardar/preservar», el contexto del «seno» favorece una imagen de formación/nacimiento. «Fue formada» conserva esa decisión y la tensión documentada.
- source_word: בַבָּטֶן
  english_pob_choice: in the womb
  chosen_spanish: en el seno
  alternatives_spanish:
  - en el vientre
  - en el vientre materno
  lexicon: HALOT
  rationale: «Seno» ofrece un registro bíblico y natural en español para el ámbito prenatal. También evita una literalidad torpe, sin perder la imagen corporal del texto.
theological_decisions:
- issue: Nombre divino (יְהֹוָה)
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - Jehová
  rationale: Se mantiene el nombre propio divino y no se lo sustituye por una máscara litúrgica. «Yahvé» es la forma española adoptada por el proyecto para preservar la referencia explícita al Tetragrámaton.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Divergencia hebreo-griego en Sirach 1:14
  english_pob_reading: Translate the extant Hebrew as the primary witness while preserving the substantially different Greek in a footnote.
  chosen_spanish_reading: Traducir el hebreo conservado como texto principal y registrar la lectura griega divergente en nota.
  alternative_spanish_readings:
  - 'Traducir el griego como texto principal: «Entre los hombres se asentó como fundamento eterno, y con su descendencia será confiada».'
  - Fusionar ambas tradiciones en una sola redacción.
  rationale: El hebreo transmitido es el testigo principal disponible, pero el griego ofrece una formulación sustancialmente distinta. Para no borrar esa tensión, se traduce el hebreo y se documenta la diferencia textual en nota.
  doctrine_reference: 'PHILOSOPHY.md: translate from Hebrew where it survives; preserve source uncertainty honestly'
translation_notes:
  revision_awareness: Se siguió el pasaje vigente sin cambios editoriales adicionales; la decisión de mantener el hebreo como texto principal y documentar la divergencia griega coincide con la revisión más reciente, que no indicó modificaciones necesarias.
  spanish_consistency_notes:
  - Se usó «Yahvé» de manera consistente para יְהֹוָה, conforme al estándar del proyecto.
  - Se mantuvo «sabiduría» para חָכְמָה y «temor» para יִרְאַת, preservando la expresión sapiencial fija.
  - «Los fieles» conserva el matiz colectivo de נֶאֱמָנִים sin introducir una paráfrasis interpretativa.
  - La nota sobre «fue formada» conserva la tensión documentada entre formación y preservación, en vez de resolverla artificialmente.
  - «En el seno» mantiene la imagen prenatal con registro bíblico natural en español.
