base_translation:
  language: en
  yaml_path: translation/ot/jeremiah/016/016.yaml
  text: Look[a], I am sending for many fishermen, declares Yahweh, and they will catch them; and after that I will send for many hunters[b], and they will hunt them from every mountain and from every hill and from the clefts of the rocks.
  footnotes:
