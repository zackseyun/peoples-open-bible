id: ISA.5.23
reference: Isaiah 5:23
source:
  edition: WLC
  text: מַצְדִּיקֵ֥י רָשָׁ֖ע עֵ֣קֶב שֹׁ֑חַד וְ/צִדְקַ֥ת צַדִּיקִ֖ים יָסִ֥ירוּ מִמֶּֽ/נּוּ׃ס
translation:
  text: who acquit the wicked for a bribe[a], and take away the righteousness of the righteous from him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'who justify the wicked because of a bribe, and remove the justice of the righteous from him.'
    reason: lexical_alternative
lexical_decisions:
- source_word: מַצְדִּיקֵי
  chosen: who acquit
  alternatives:
  - who justify
  - those declaring righteous
  lexicon: HALOT
  rationale: Hiphil participle of צדק in a judicial context means to declare righteous or acquit, not to make morally righteous. 'Acquit' best captures the forensic sense in natural English.
- source_word: רָשָׁע
  chosen: the wicked
  alternatives:
  - a wicked man
  - the guilty
  lexicon: HALOT
  rationale: The singular adjective functions substantivally. 'The wicked' preserves the class-like force while remaining idiomatic.
- source_word: עֵקֶב
  chosen: for
  alternatives:
  - because of
  - on account of
  - as a consequence of
  lexicon: HALOT
  rationale: 'In the collocation עֵקֶב שֹׁחַד, the sense is causative: acquitting because of a bribe. ''For a bribe'' is concise and idiomatic in English legal/moral discourse.'
- source_word: שֹׁחַד
  chosen: a bribe
  alternatives:
  - bribery
  - a payoff
  lexicon: HALOT
  rationale: The noun denotes a bribe. The singular indefinite fits the Hebrew and English idiom.
- source_word: וְצִדְקַת
  chosen: and ... the righteousness
  alternatives:
  - and ... the justice
  - and ... the right
  lexicon: HALOT
  rationale: The noun from צדק can denote righteousness or justice. Here it refers to the just claim or right standing due to righteous people in a legal setting. 'Righteousness' preserves lexical continuity with the root and avoids over-narrowing, while the legal nuance is reflected by the verb 'take away.'
- source_word: צַדִּיקִים
  chosen: the righteous
  alternatives:
  - righteous people
  - the innocent
  - the just
  lexicon: HALOT
  rationale: Plural substantive adjective. 'The righteous' is the most direct and preserves the moral-legal contrast with 'the wicked.'
- source_word: יָסִירוּ
  chosen: take away
  alternatives:
  - remove
  - deprive of
  lexicon: HALOT
  rationale: Hiphil of סור commonly means remove or take away. 'Take away' is clear, direct, and fits the legal deprivation in context.
- source_word: מִמֶּנּוּ
  chosen: from him
  alternatives:
  - from them
  - from each one
  - from the righteous man
  lexicon: HALOT
  rationale: The suffix is 3ms singular. Although the antecedent is the plural 'the righteous,' Hebrew can use a singular pronominal suffix distributively. 'From him' preserves the Masoretic form most closely; the distributive sense is understood.
