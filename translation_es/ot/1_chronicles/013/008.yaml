translation:
  language: es
  text: Y David y todo Israel celebraban[a] delante de Dios con todas sus fuerzas, con cantos, liras, arpas, panderos, címbalos y trompetas.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «jugaban» o «se regocijaban delante de Dios»; el verbo hebreo puede denotar una actividad festiva y gozosa.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְדָוִיד וְכָל יִשְׂרָאֵל
  english_pob_choice: And David and all Israel
  chosen_spanish: Y David y todo Israel
  alternatives_spanish:
  - David y todo Israel
  lexicon: WLC/HALOT
  rationale: Se conserva la coordinación narrativa con «Y». «Todo Israel» expresa naturalmente el colectivo nacional sin añadir matices ausentes del hebreo.
- source_word: מְשַׂחֲקִים
  english_pob_choice: were celebrating
  chosen_spanish: se estaban celebrando
  alternatives_spanish:
  - estaban celebrando
  - estaban jugando
  - se estaban alegrando
  lexicon: HALOT
  rationale: El verbo puede abarcar actividad festiva y gozosa, no solo «jugar» en sentido lúdico. En este contexto procesional y musical, «se estaban celebrando» comunica mejor la acción festiva sin reducirla a mera diversión. Se mantiene la tensión semántica entre jugar/alegrarse/celebrar.
- source_word: לִפְנֵי הָאֱלֹהִים
  english_pob_choice: before God
  chosen_spanish: delante de Dios
  alternatives_spanish:
  - en la presencia de Dios
  - ante Dios
  lexicon: HALOT
  rationale: «Delante de Dios» es natural en español y conserva el sentido cultual y relacional del hebreo sin volverlo excesivamente abstracto.
- source_word: בְּכָל עֹז
  english_pob_choice: with all their might
  chosen_spanish: con todo su vigor
  alternatives_spanish:
  - con todas sus fuerzas
  - con toda su fuerza
  - con todo su poder
  lexicon: HALOT
  rationale: עֹז denota fuerza, vigor o poder. «Con todo su vigor» suena natural en español para una celebración intensa y mantiene la idea de plenitud energética. «Fuerzas» también sería viable, pero «vigor» evita una repetición demasiado dura y conserva el tono festivo.
- source_word: שִׁירִים
  english_pob_choice: songs
  chosen_spanish: cantos
  alternatives_spanish:
  - canciones
  - cánticos
  lexicon: HALOT
  rationale: El sustantivo plural nombra piezas cantadas. «Cantos» es más amplio y litúrgicamente apto en español, sin forzar una equivalencia técnica no explicitada por el texto.
- source_word: כִנֹּרוֹת
  english_pob_choice: lyres
  chosen_spanish: liras
  alternatives_spanish:
  - arpas
  - cítaras
  lexicon: HALOT
  rationale: «Liras» conserva con precisión el tipo de instrumento de cuerda identificado por el hebreo כִּנּוֹר, y distingue este término de נְבָלִים. Se prefiere a «arpa» por mayor cercanía lexical.
- source_word: נְבָלִים
  english_pob_choice: harps
  chosen_spanish: arpas
  alternatives_spanish:
  - salterios
  - ludes
  lexicon: HALOT
  rationale: Aunque el instrumento exacto no es totalmente seguro, «arpas» es el equivalente moderno más reconocible y mantiene la distinción con «liras». Se evita el arcaísmo «salterios».
- source_word: תֻפִּים
  english_pob_choice: tambourines
  chosen_spanish: tamboriles
  alternatives_spanish:
  - panderos
  - tambores de mano
  lexicon: HALOT
  rationale: תֹּף designa un tambor de marco o instrumento de percusión semejante a una pandereta/tamboril. «Tamboriles» es una opción bíblica y comprensible en español, acorde con el conjunto instrumental del versículo.
- source_word: מְצִלְתַּיִם
  english_pob_choice: cymbals
  chosen_spanish: címbalos
  alternatives_spanish:
  - cymbales
  lexicon: HALOT
  rationale: «Címbalos» es el término establecido en español para este instrumento de percusión y mantiene la referencia tradicional sin perder claridad.
- source_word: חֲצֹצְרֽוֹת
  english_pob_choice: trumpets
  chosen_spanish: trompetas
  alternatives_spanish:
  - trompetas ceremoniales
  lexicon: HALOT
  rationale: El hebreo nombra trompetas; «trompetas» es suficiente y fiel. No se añade «de plata» ni otra especificación ausente del verso.
theological_decisions:
- issue: Referencia a הָאֱלֹהִים
  english_pob_reading: God
  chosen_spanish_reading: Dios
  alternative_spanish_readings:
  - el Dios
  rationale: En este contexto, el artículo hebreo funciona como designación habitual del Dios verdadero de Israel. En español, «Dios» es la forma natural y reverente; «el Dios» sonaría forzado.
  doctrine_reference: Monoteísmo bíblico; uso reverente del nombre divino en contexto narrativo/cultual.
translation_notes:
  revision_awareness: 'El pasaje mantiene alta concordancia con el texto hebreo y con el audit trail inglés: la única nota relevante es la amplitud semántica de מְשַׂחֲקִים, que en español queda reflejada con una opción festiva sin perder la posibilidad de ''jugar'' o ''regocijarse''. No se introducen lecturas textuales alternativas.'
  spanish_consistency_notes:
  - Se usa «Dios» para הָאֱלֹהִים conforme al patrón POB en este contexto.
  - 'Se conserva la distinción instrumental: «liras» para כִנּוֹרוֹת y «arpas» para נְבָלִים.'
  - No se emplea «SEÑOR» porque el verso no contiene el Tetragrámaton ni una cita del nombre divino.
