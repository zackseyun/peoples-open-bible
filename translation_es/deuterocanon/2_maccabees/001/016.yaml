revisions:
- from: Después de abrir la puerta oculta de la cámara de humo[a], arrojaron piedras y derribaron al jefe; y, después de hacerlo pedazos[b], lanzaron las cabezas a los de afuera.
  to: Después de abrir la puerta oculta de la cámara de humo[a], arrojaron piedras y derribaron[b] al líder; y, después de hacerlo pedazos, lanzaron las cabezas a los que estaban afuera.
  rationale: La revisión corrige la colocación de la nota léxica para que corresponda a συνεκεραύνωσαν, como en la auditoría inglesa. También ajusta «jefe» a «líder» para reflejar mejor ἡγεμών y suaviza «a los de afuera» a «a los que estaban afuera» para mayor naturalidad y claridad en español.
