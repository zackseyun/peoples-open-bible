translation:
  language: es
  text: Así murió Saúl por su infidelidad, pues fue infiel a Yahvé[a], por la palabra de Yahvé, que no guardó, y también porque consultó a una médium[b], para consultar.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «por la ruptura de fidelidad con que quebrantó la fidelidad contra Yahvé».'
    reason: lexical_alternative
  - marker: b
    text: «Médium» designa aquí a una persona que busca información de los muertos o de espíritus; compárese 1 Samuel 28:7.
    reason: cultural_note
lexical_decisions:
- source_word: וַיָּמָת
  english_pob_choice: So ... died
  chosen_spanish: Así murió
  alternatives_spanish:
  - Y murió entonces
  - Entonces murió
  lexicon: HALOT
  rationale: El waw consecutivo expresa avance narrativo y consecuencia; «Así murió» mantiene esa relación causal/narrativa en un español natural y solemne.
- source_word: בְּמַעֲלוֹ / מָעַל
  english_pob_choice: for his unfaithfulness by which he was unfaithful
  chosen_spanish: por su infidelidad con que fue infiel
  alternatives_spanish:
  - por su deslealtad con que fue desleal
  - por su quebrantamiento de fe con que quebrantó la fe
  lexicon: HALOT
  rationale: El sustantivo y el verbo afines resaltan la misma raíz y la idea de infidelidad de pacto; «infidelidad / fue infiel» conserva ese juego léxico sin volverlo demasiado arcaico.
- source_word: בַּיהוָה
  english_pob_choice: to Yahweh
  chosen_spanish: a Yahvé
  alternatives_spanish:
  - contra Yahvé
  - respecto de Yahvé
  lexicon: HALOT
  rationale: Con מעל, la preposición marca el objeto contra quien se comete la infidelidad. «A Yahvé» es la forma española más directa y idiomática para este valor relacional.
- source_word: עַל דְּבַר יְהוָה
  english_pob_choice: because of the word of Yahweh
  chosen_spanish: por la palabra de Yahvé
  alternatives_spanish:
  - a causa de la palabra de Yahvé
  - con respecto a la palabra de Yahvé
  lexicon: HALOT
  rationale: La frase introduce la base o esfera del acto de Saúl; «por la palabra de Yahvé» reproduce el sentido causal sin sobreexplicar el hebreo.
- source_word: שָׁמָר
  english_pob_choice: keep
  chosen_spanish: guardó
  alternatives_spanish:
  - observó
  - cumplió
  lexicon: HALOT
  rationale: Aquí «guardar» mantiene el matiz de observar fielmente la palabra dada por Dios, una fórmula bíblica clara y precisa en español.
- source_word: וְגַם
  english_pob_choice: and also because
  chosen_spanish: y también porque
  alternatives_spanish:
  - y además porque
  - también porque
  lexicon: HALOT
  rationale: La conjunción añade un segundo fundamento causal para su muerte; «y también porque» hace explícita esa relación en español.
- source_word: לִשְׁאוֹל
  english_pob_choice: asked counsel
  chosen_spanish: consultó
  alternatives_spanish:
  - inquirió
  - pidió consejo
  lexicon: HALOT
  rationale: En contexto, el verbo introduce la acción de buscar orientación mediante consulta prohibida; «consultó» es formal, breve y fiel al acto descrito.
- source_word: בָּאוֹב
  english_pob_choice: from a medium
  chosen_spanish: a un médium
  alternatives_spanish:
  - a una médium
  - a un espiritista
  lexicon: HALOT
  rationale: אוֹב designa a una médium/mediero de consulta con los muertos o espíritus; «médium» comunica el referente cultural de forma clara en español contemporáneo.
- source_word: לִדְרֹשׁ
  english_pob_choice: to inquire
  chosen_spanish: para inquirir
  alternatives_spanish:
  - para consultar
  - para buscar respuesta
  lexicon: HALOT
  rationale: El infinitivo final expresa el propósito de la consulta; «inquirir» preserva el registro formal y el sentido de buscar información.
theological_decisions:
- issue: Nombre divino יהוה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - Jehová
  rationale: El texto hebreo usa directamente el Tetragrámaton. Conforme al estándar del proyecto, se translitera como «Yahvé» para preservar el nombre de pacto en el texto principal.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Caracterización del pecado de Saúl
  english_pob_reading: unfaithfulness
  chosen_spanish_reading: infidelidad
  alternative_spanish_readings:
  - deslealtad
  - quebrantamiento de fe
  rationale: El verso enfatiza infidelidad de pacto, reforzada por el verbo cognado. «Infidelidad» comunica ese peso teológico de manera natural en español.
  doctrine_reference: DOCTRINE.md Translation philosophy §6; consistency of key terms §5
translation_notes:
  revision_awareness: La versión inglesa revisada sustituyó dos puntos por coma para suavizar la sintaxis y cambió la formulación de la consulta al médium. La presente redacción sigue esa lectura revisada, manteniendo el paralelismo causal y el registro formal, mientras conserva el juego léxico hebreo entre el sustantivo y el verbo de raíz מעל.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» conforme al estándar del proyecto para יהוה.
  - Se usa «infidelidad / fue infiel» para reflejar el paralelismo nominal-verbal del hebreo.
  - «Consultó a un médium» conserva el matiz cultural sin caer en una paráfrasis excesiva.
  - «Inquirir» se deja en registro elevado, acorde con el tono bíblico y con el propósito del infinitivo final.
