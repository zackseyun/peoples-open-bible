translation:
  language: es
  text: 'Entonces los clanes de Judá dirán en sus corazones[a]: «Los habitantes de Jerusalén son mi fuerza en Yahvé de los Ejércitos[b], su Dios».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «los líderes de Judá» o «los jefes de Judá». El hebreo אַלֻּפֵי puede referirse tanto a clanes como a sus jefes.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «Los habitantes de Jerusalén son mi fuerza por medio de Yahvé de los Ejércitos, su Dios». La preposición puede entenderse como esfera («en») o como medio/fundamento («por medio de»).'
    reason: alternative_reading
lexical_decisions:
- source_word: וְאָמְרוּ
  english_pob_choice: Then ... will say
  chosen_spanish: Entonces ... dirán
  alternatives_spanish:
  - Y ... dirán
  - Y dirán
  lexicon: HALOT
  rationale: El consecutivo profético y el valor discursivo de la secuencia se expresan naturalmente con «entonces» en español, manteniendo el avance del oráculo sin volverlo mecánico.
- source_word: אַלֻּפֵי יְהוּדָה
  english_pob_choice: the clans of Judah
  chosen_spanish: los clanes de Judá
  alternatives_spanish:
  - los líderes de Judá
  - los jefes de Judá
  lexicon: HALOT
  rationale: «אַלּוּף» puede designar unidades/clanes o jefes. En este contexto corporativo, «clanes» conserva mejor la estructura social representativa que solo «líderes» o «jefes».
- source_word: בְּלִבָּם
  english_pob_choice: in their hearts
  chosen_spanish: en su corazón
  alternatives_spanish:
  - dentro de sí
  - en sus corazones
  lexicon: HALOT
  rationale: Es un hebraísmo de habla interior. En español, el singular colectivo «su corazón» suena natural con el sujeto plural y mantiene la interioridad del pensamiento.
- source_word: אַמְצָה
  english_pob_choice: strength
  chosen_spanish: fuerza
  alternatives_spanish:
  - fortaleza
  - apoyo fuerte
  - fortalecimiento
  lexicon: HALOT
  rationale: El sustantivo expresa fuerza o apoyo fuerte; «fuerza» es la opción más transparente y conserva la concisión del hebreo.
- source_word: לִי
  english_pob_choice: my
  chosen_spanish: mi
  alternatives_spanish:
  - para mí
  - a mí
  lexicon: HALOT
  rationale: La primera persona singular debe mantenerse. «Mi fuerza» refleja bien la relación posesiva/relacional y evita suavizar el valor del pronombre.
- source_word: יֹשְׁבֵי יְרוּשָׁלַם
  english_pob_choice: the inhabitants of Jerusalem
  chosen_spanish: los habitantes de Jerusalén
  alternatives_spanish:
  - los que habitan en Jerusalén
  - los residentes de Jerusalén
  lexicon: HALOT
  rationale: Es la equivalencia estándar para el participio que designa a quienes viven en la ciudad.
- source_word: בַּיהוָה צְבָאוֹת
  english_pob_choice: in Yahweh of Armies
  chosen_spanish: en Yahvé de los Ejércitos
  alternatives_spanish:
  - por Yahvé de los Ejércitos
  - mediante Yahvé de los Ejércitos
  lexicon: HALOT
  rationale: Se conserva el nombre divino «Yahvé» según la norma del proyecto y se vierte צְבָאוֹת como «los Ejércitos» para mantener la transparencia del título. La preposición ב puede entenderse como esfera/ámbito; «en» refleja esa lectura y sigue la revisión inglesa más reciente.
- source_word: אֱלֹהֵיהֶם
  english_pob_choice: their God
  chosen_spanish: su Dios
  alternatives_spanish:
  - el Dios de ellos
  lexicon: HALOT
  rationale: La forma posesiva es la más natural en español y conserva el referente a los habitantes de Jerusalén.
theological_decisions:
- issue: Traducción del nombre divino יהוה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - el SEÑOR
  rationale: El texto hebreo usa directamente el Tetragrámaton. En este proyecto se traduce como «Yahvé» para preservar el nombre propio del pacto, no como un sustituto en mayúsculas.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Sentido de בַּיהוָה צְבָאוֹת
  english_pob_reading: in Yahweh of Armies
  chosen_spanish_reading: en Yahvé de los Ejércitos
  alternative_spanish_readings:
  - por Yahvé de los Ejércitos
  - mediante Yahvé de los Ejércitos
  rationale: La preposición puede leerse como esfera o como medio/base. «En» deja abierta esa relación sin imponer una paráfrasis más interpretativa, y «los Ejércitos» conserva el peso militar del título divino.
  doctrine_reference: DOCTRINE.md Translation philosophy §6
translation_notes:
  revision_awareness: La redacción sigue el último pase de revisión del inglés, que prefirió una formulación más natural para אַמְצָה לִי ... בַּיהוָה sin perder los elementos del original. También se mantuvo la decisión auditada de traducir el nombre divino como «Yahvé» y צְבָאוֹת como «los Ejércitos».
  spanish_consistency_notes:
  - Se mantuvo la distinción entre el nombre divino propio «Yahvé» y el título «los Ejércitos».
  - «Clanes» conserva la lectura corporativa de אַלֻּפֵי y evita restringir indebidamente el término a cargos individuales.
  - El singular «su corazón» es idiomático en español y representa bien el hebreo plural distributivo.
  - La frase final conserva la ambigüedad de la preposición hebrea con una nota de lectura alternativa.
