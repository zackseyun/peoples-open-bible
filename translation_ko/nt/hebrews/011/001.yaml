  text: Ἔστιν δὲ πίστις ἐλπιζομένων ὑπόστασις, πραγμάτων ἔλεγχος οὐ βλεπομένων·
base_translation:
  language: en
  yaml_path: translation/nt/hebrews/011/001.yaml
  text: Now faith is the assurance of things hoped for[b][a], the proof of things not seen.
