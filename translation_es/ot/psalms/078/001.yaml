translation:
  language: es
  text: Un Maskil[a] de Asaf. Presta oído, pueblo mío, a mi instrucción; inclinen sus oídos a las palabras de mi boca.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Maskil» es un término técnico en los encabezados de los salmos; puede designar una composición instructiva o contemplativa.
    reason: lexical_alternative
lexical_decisions:
- source_word: מַשְׂכִּיל
  english_pob_choice: A Maskil
  chosen_spanish: Un Maskil
  alternatives_spanish:
  - Un salmo instructivo
  - Un salmo contemplativo
  - Un canto de instrucción
  lexicon: HALOT
  rationale: El término funciona como encabezado técnico del salmo y su sentido preciso es debatido. Mantener la transliteración conserva la etiqueta genérica sin forzar una interpretación particular.
- source_word: לְאָסָף
  english_pob_choice: of Asaph
  chosen_spanish: de Asaf
  alternatives_spanish:
  - para Asaf
  - perteneciente a Asaf
  lexicon: HALOT
  rationale: En un superscrito, ל puede señalar asociación, atribución o dedicación. «De Asaf» es la forma más natural en español y sigue la prudencia del inglés POB.
- source_word: הַאֲזִינָה
  english_pob_choice: Give ear
  chosen_spanish: Escuchen
  alternatives_spanish:
  - Oigan
  - Presten oído
  lexicon: HALOT
  rationale: La forma hebrea convoca a una escucha atenta. En español, «escuchen» comunica la fuerza imperativa de manera clara y digna; la imagen de «dar oído» queda reforzada por la frase siguiente.
- source_word: עַמִּי
  english_pob_choice: my people
  chosen_spanish: pueblo mío
  alternatives_spanish:
  - mi pueblo
  - oh, pueblo mío
  lexicon: HALOT
  rationale: El posesivo es explícito. «Pueblo mío» suena natural en español bíblico y mantiene el llamado directo sin añadir una partícula vocativa que el hebreo no tiene.
- source_word: תּוֹרָתִי
  english_pob_choice: my instruction
  chosen_spanish: mi instrucción
  alternatives_spanish:
  - mi ley
  - mi enseñanza
  lexicon: HALOT
  rationale: תּוֹרָה no debe reducirse automáticamente a «ley». En este contexto sapiencial e instructivo, «instrucción» preserva mejor el alcance de enseñanza autoritativa que el hebreo sugiere.
- source_word: הַטּוּ
  english_pob_choice: incline
  chosen_spanish: inclinen
  alternatives_spanish:
  - doblen
  - vuelvan
  lexicon: HALOT
  rationale: El verbo mantiene la imagen corporal de orientar el oído hacia la voz. «Inclinen» conserva esa metáfora y su tono poético.
- source_word: אָזְנְכֶם
  english_pob_choice: your ears
  chosen_spanish: sus oídos
  alternatives_spanish:
  - sus orejas
  - el oído de ustedes
  lexicon: HALOT
  rationale: El hebreo es plural; «sus oídos» mantiene esa pluralidad y evita un calco demasiado rígido. En español, «oídos» resulta más idiomático que «orejas» en este registro.
- source_word: לְאִמְרֵי
  english_pob_choice: to the words
  chosen_spanish: a las palabras
  alternatives_spanish:
  - a los dichos
  - a los dichos de
  lexicon: HALOT
  rationale: «Palabras» es la equivalencia más clara y natural. «Dichos» sería posible, pero suena menos directo y más proverbial de lo que exige el verso.
- source_word: פִי
  english_pob_choice: of my mouth
  chosen_spanish: de mi boca
  alternatives_spanish:
  - que sale de mi boca
  - de mi hablar
  lexicon: HALOT
  rationale: La expresión es concreta y paralela con los oídos. «De mi boca» conserva la imagen física y el paralelismo poético sin explicación añadida.
theological_decisions:
- issue: Sentido de תּוֹרָה en un salmo de instrucción
  english_pob_reading: my instruction
  chosen_spanish_reading: mi instrucción
  alternative_spanish_readings:
  - mi ley
  - mi enseñanza
  rationale: La decisión evita estrechar el término a un código legal. El verso introduce una enseñanza exhortativa e histórica; por eso «instrucción» mantiene el valor pedagógico y autoritativo del hebreo.
  doctrine_reference: Sabiduría e instrucción en los Salmos; uso amplio de תּוֹרָה en sentido didáctico.
translation_notes:
  revision_awareness: El texto sigue de cerca el hebreo y el criterio auditado del POB en inglés. Se conservó la transliteración de מַשְׂכִּיל como término técnico, y se evitó traducir תּוֹרָה por «ley» para no perder el matiz de instrucción sapiencial. No se registran revisiones posteriores que alteren esta decisión.
  spanish_consistency_notes:
  - Se usa «Asaf» para mantener la forma española usual del nombre propio sin alterar el referente.
  - Se prefirió «oídos» en plural para reflejar el hebreo y sonar natural junto al imperativo plural.
  - Se mantuvo la imagen corporal de escuchar/inclinar el oído, en lugar de una paráfrasis más abstracta.
