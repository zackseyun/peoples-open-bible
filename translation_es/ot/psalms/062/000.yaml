translation:
  language: es
  text: 'Para el director del coro: según Jedutún[a]. Salmo de David[b].'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O posiblemente «sobre Jedutún» o «para Jedutún»; la frase puede referirse a un estilo musical, una melodía o una indicación de ejecución asociada con Jedutún.
    reason: alternative_reading
  - marker: b
    text: La expresión «de David» puede indicar autoría, dedicación o asociación con David.
    reason: lexical_alternative
lexical_decisions:
- source_word: לַמְנַצֵּחַ
  english_pob_choice: For the choir director
  chosen_spanish: Para el director del coro
  alternatives_spanish:
  - Para el maestro de música
  - Para el jefe de coro
  lexicon: HALOT
  rationale: En los encabezados de salmos, el término indica al responsable de la ejecución musical. «Director del coro» comunica bien esa función en español moderno sin perder el sentido litúrgico.
- source_word: עַל
  english_pob_choice: according to
  chosen_spanish: según
  alternatives_spanish:
  - sobre
  - para
  lexicon: HALOT
  rationale: En esta clase de superscripción, la preposición puede indicar melodía, estilo o instrucción de interpretación. «Según» conserva mejor esa apertura que una opción más concreta.
- source_word: יְדוּתוּן
  english_pob_choice: Jeduthun
  chosen_spanish: Jedutún
  alternatives_spanish:
  - Jedutún
  - Yedutún
  lexicon: HALOT
  rationale: Es un nombre propio y se translitera. Se prefiere la forma española habitual con acento para facilitar la lectura, sin cambiar el referente del texto.
- source_word: מִזְמוֹר
  english_pob_choice: A psalm
  chosen_spanish: Salmo
  alternatives_spanish:
  - Cántico
  - Poema
  lexicon: HALOT
  rationale: En los encabezados bíblicos, el género מִזְמוֹר se rinde de forma natural por «Salmo», que preserva la clasificación literaria reconocible en español.
- source_word: לְדָוִד
  english_pob_choice: of David
  chosen_spanish: de David
  alternatives_spanish:
  - por David
  - para David
  - perteneciente a David
  lexicon: HALOT
  rationale: «De David» mantiene la ambigüedad del hebreo entre autoría, dedicación o asociación, sin resolver una cuestión histórica que el texto no cierra.
theological_decisions:
- issue: Ambigüedad de לְדָוִד en la superscripción
  english_pob_reading: of David
  chosen_spanish_reading: de David
  alternative_spanish_readings:
  - por David
  - para David
  rationale: La construcción hebrea permite más de una relación entre David y el salmo. «De David» preserva esa tensión interpretativa y evita imponer una lectura única.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: La versión inglesa auditada ya corrigió la colocación de las notas para que [a] explique Jedutún y [b] explique «de David». La presente propuesta sigue esa distribución y conserva la ambigüedad interpretativa del encabezado.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma general del proyecto, pero este versículo no contiene el tetragrámaton.
  - «Salmo» se usa como término de género, no como paráfrasis musical.
  - La puntuación con dos puntos tras «director del coro» imita la función de encabezado del original y la disposición de la traducción auditada.
