theological_decisions:
- issue: Counterfactual force of the verse in relation to the preceding context
  chosen_reading: Render the whole statement as unrealized result ('would have been ... would not have been cut off')
  alternative_readings:
  - Render as simple future/past without explicit counterfactual force
  rationale: Verse 19 is the continuation of the wish/conditional lament begun in v. 18 ('If only you had paid attention...'). English needs the counterfactual form to make the logic explicit and avoid implying that these blessings actually occurred as stated.
  doctrine_reference: Translation philosophy §1, §3
- issue: Referent and number of שְׁמוֹ
  chosen_reading: Keep singular 'his name' in the main text
  alternative_readings:
  - '''their name'' to reflect the collective offspring'
  - '''its name'' for the line/seed as a collective'
  rationale: The Hebrew text uses a singular masculine suffix. Retaining singular best reflects the source form and preserves the personified collective sense, while the alternatives are worth noting because English readers may expect a plural after 'offspring' and 'descendants.'
  doctrine_reference: Translation philosophy §4, §5
