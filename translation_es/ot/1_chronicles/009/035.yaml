translation:
  language: es
  text: En Gabaón vivía Jeiel[a], el padre de Gabaón[b], y el nombre de su esposa era Maacá.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: También puede entenderse como 'Jeuel', según una variante de forma del nombre conservada en otros testigos y en el paralelo de 1 Crónicas 8:29.
    reason: textual_variant
  - marker: b
    text: O 'el fundador de Gabaón' o 'el jefe de Gabaón'; la expresión hebrea dice literalmente 'el padre de Gabaón'.
    reason: lexical_alternative
lexical_decisions:
- source_word: וּ/בְ/גִבְע֛וֹן
  english_pob_choice: In Gibeon
  chosen_spanish: En Gabaón
  alternatives_spanish:
  - Y en Gabaón
  lexicon: HALOT
  rationale: La forma hebrea combina conjunción y preposición; en español, abrir con una locución locativa simple es natural y conserva el valor espacial. Se omite la conjunción explícita porque la frase funciona como encabezado de residencia genealógica.
- source_word: יָשְׁב֥וּ
  english_pob_choice: lived
  chosen_spanish: vivía
  alternatives_spanish:
  - habitaba
  - residía
  lexicon: HALOT
  rationale: El verbo indica residencia estable. 'Vivía' es claro y digno en español actual; aunque el hebreo está en plural, la construcción presenta un sujeto nominal único, por lo que el español puede ajustarse al flujo natural sin perder el sentido.
- source_word: אֲבִֽי גִבְע֖וֹן
  english_pob_choice: the father of Gibeon
  chosen_spanish: el padre de Gabaón
  alternatives_spanish:
  - el fundador de Gabaón
  - el jefe de Gabaón
  lexicon: HALOT
  rationale: Conservo la literalidad 'padre de' porque así aparece la expresión hebrea y mantiene la transparencia auditada. El contexto permite la idea de fundador o figura principal, pero esa matización se reserva para la nota.
- source_word: יעואל
  english_pob_choice: Jeiel
  chosen_spanish: Jeiel
  alternatives_spanish:
  - Jeuel
  lexicon: HALOT
  rationale: Sigo la forma principal del testimonio auditado en inglés. La variante de escritura 'Jeuel' se conserva en nota como alternativa textual/nominal, ya que la tradición hebrea y el paralelo cercano la respaldan.
- source_word: וְ/שֵׁ֥ם אִשְׁתּ֖/וֹ
  english_pob_choice: and his wife's name was
  chosen_spanish: y el nombre de su esposa era
  alternatives_spanish:
  - y se llamaba su esposa
  - y el nombre de su mujer era
  lexicon: HALOT
  rationale: La estructura nominal hebrea se vierte de manera directa y natural. 'Esposa' reproduce con dignidad el vínculo posesivo; 'mujer' sería posible, pero en español puede sonar menos preciso o más ambiguo en un registro genealógico.
- source_word: מַעֲכָֽה
  english_pob_choice: Maacah
  chosen_spanish: Maacá
  alternatives_spanish:
  - Maacah
  lexicon: HALOT
  rationale: Translitero el nombre propio con acento gráfico español para facilitar lectura y pronunciación, sin alterar la forma del antropónimo.
translation_notes:
  revision_awareness: El texto inglés auditado mantiene un consenso alto y no requiere revisión sustantiva. La principal decisión para el español fue conservar la literalidad de 'padre de Gabaón' y resolver la forma del nombre propio con transliteración naturalizada; también se adaptó la apertura locativa para que suene idiomática en español sin perder la estructura del hebreo.
  spanish_consistency_notes:
  - Se mantiene 'Gabaón' de forma uniforme para el topónimo.
  - Se usa 'esposa' en lugar de 'mujer' para evitar ambigüedad en un registro genealógico.
  - La nota del nombre propio se vincula a Jeiel con el marcador [a], y la nota del valor de 'padre de Gabaón' con el marcador [b].
