revisions:
- from: 'Así que Samuel hizo lo que Yahvé había hablado y vino a Belén. Los ancianos de la ciudad se estremecieron[a] al verlo y dijeron: «¿Vienes en paz?»'
  to: 'Entonces Samuel hizo lo que Yahvé había hablado y vino a Belén. Los ancianos de la ciudad se estremecieron ante su llegada[a] y dijeron: «¿Vienes en paz?»'
