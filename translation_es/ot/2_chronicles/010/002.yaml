base_translation:
  language: en
  yaml_path: translation/ot/2_chronicles/010/002.yaml
  text: And when Jeroboam son of Nebat heard it (for he was in Egypt[a], where he had fled from before King Solomon)[b], Jeroboam returned from Egypt.
