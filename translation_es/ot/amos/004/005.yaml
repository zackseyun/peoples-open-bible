source:
  edition: WLC
  text: וְ/קַטֵּ֤ר מֵֽ/חָמֵץ֙ תּוֹדָ֔ה וְ/קִרְא֥וּ נְדָב֖וֹת הַשְׁמִ֑יעוּ כִּ֣י כֵ֤ן אֲהַבְתֶּם֙ בְּנֵ֣י יִשְׂרָאֵ֔ל נְאֻ֖ם אֲדֹנָ֥/י יְהוִֽה׃
base_translation:
  language: en
  yaml_path: translation/ot/amos/004/005.yaml
  text: And burn a thank offering of leavened bread[a], and proclaim freewill offerings; announce them! For so you have loved, O sons of Israel[b], declares the Lord GOD.
  footnotes:
  - marker: a
    text: Or 'with leaven' or 'of leavened bread'; the Hebrew phrase links leavened material with the thank offering.
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'sons of Israel.'
    reason: lexical_alternative
  ai_draft:
