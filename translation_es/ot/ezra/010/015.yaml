translation:
  language: es
  text: Solo Jonatán hijo de Asael y Jazeías hijo de Tikvá[a] se opusieron a esto; y Mesulán y Shabetai el levita los apoyaron[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «Jahazías hijo de Tikvá».
    reason: lexical_alternative
  - marker: b
    text: O «los ayudaron» o «los asistieron».
    reason: lexical_alternative
lexical_decisions:
- source_word: אַךְ
  english_pob_choice: Only
  chosen_spanish: Solo
  alternatives_spanish:
  - Solo que
  - Sin embargo
  - Únicamente
  lexicon: HALOT
  rationale: אַךְ introduce restricción/excepción respecto del grupo mayor mencionado en el contexto. «Solo» conserva esa limitación de manera natural en español sin añadir contraste más fuerte del que exige el hebreo.
- source_word: יוֹנָתָן בֶּן עֲשָׂהאֵל
  english_pob_choice: Jonathan son of Asahel
  chosen_spanish: Jonatán hijo de Asael
  alternatives_spanish:
  - Jonathan hijo de Asael
  lexicon: Convención bíblica onomástica
  rationale: Se translitera el nombre propio al uso bíblico español y se mantiene la relación genealógica con «hijo de», que corresponde a בֶּן.
- source_word: וְיַחְזְיָה בֶן תִּקְוָה
  english_pob_choice: Jahzeiah son of Tikvah
  chosen_spanish: Jazeías hijo de Tikvá
  alternatives_spanish:
  - Jahazías hijo de Tikvá
  - Jahzeías hijo de Tikvá
  lexicon: Convención bíblica onomástica
  rationale: El hebreo consonántico admite una vocalización/trascripción cercana a «Jazeías»; se conserva además la alternativa tradicional en nota porque la forma inglesa documenta la vacilación onomástica.
- source_word: עָמְדוּ עַל זֹאת
  english_pob_choice: stood against this
  chosen_spanish: se pusieron de parte de esto
  alternatives_spanish:
  - se opusieron a esto
  - tomaron postura contra esto
  - se mantuvieron firmes respecto de esto
  lexicon: HALOT
  rationale: El inglés POB opta por el sentido de oposición, pero el español «se pusieron de parte de esto» refleja de manera más natural la construcción de tomar postura en el conflicto. La frase conserva la idea de alinearse/ponerse en una posición definida frente a la propuesta, sin añadir un objeto implícito no expresado explícitamente en hebreo.
- source_word: וּמְשֻׁלָּם וְשַׁבְּתַי הַלֵּוִי
  english_pob_choice: and Meshullam and Shabbethai the Levite
  chosen_spanish: y Mesulán y Sabahtai el levita
  alternatives_spanish:
  - y Mesulán y Shabatái el levita
  - y Mesulán y Sabahtai, el levita
  lexicon: Convención bíblica onomástica
  rationale: Se transliteran los nombres propios al español de forma coherente y se mantiene «el levita» como apposición referida a Shabbethai, siguiendo la observación sintáctica del texto fuente.
- source_word: עֲזָרֻם
  english_pob_choice: supported them
  chosen_spanish: los apoyaron
  alternatives_spanish:
  - los ayudaron
  - los asistieron
  lexicon: HALOT
  rationale: El verbo עזר con sufijo pronominal expresa ayuda/soporte. «Los apoyaron» comunica bien el respaldo procesal o de postura que se describe en el contexto.
theological_decisions:
- issue: Naturaleza de la oposición expresada por עָמְדוּ עַל זֹאת
  english_pob_reading: stood against this
  chosen_spanish_reading: se pusieron de parte de esto
  alternative_spanish_readings:
  - se opusieron a esto
  - se mantuvieron firmes respecto de esto
  rationale: No se formula una doctrina particular aquí; la decisión es sintáctico-semántica. Se conserva la tensión entre la imagen concreta de «ponerse de pie» y el valor contextual de tomar postura frente a una propuesta del grupo.
  doctrine_reference: No aplica; decisión de sentido léxico-contextual.
translation_notes:
  revision_awareness: El audit trail inglés no registró revisiones aplicadas y el último pase indicó acuerdo alto y sin cambios necesarios; por tanto, la redacción española sigue de cerca la decisión inglesa y solo ajusta la formulación para naturalidad y claridad en español.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como convención del proyecto, pero en este versículo no aparece el nombre divino.
  - Se preserva la distinción onomástica y la apposición «el levita» sólo con Shabbethai, no con ambos nombres.
  - Las notas alternativas se restringen a la vacilación del nombre de Jahzeiah/Jahaziah y al matiz de «apoyaron/ayudaron/asistieron».
