translation:
  language: es
  text: Como una sombra cuando se alarga[a], desaparezco[b]; soy sacudido como una langosta[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: “Se alarga” refleja la posibilidad del hebreo de sugerir que la sombra se extiende o se inclina/declina hacia el atardecer.
    reason: lexical_alternative
  - marker: b
    text: 'También puede entenderse: “me voy” o “paso”; el verbo hebreo dice literalmente “ir/caminar”, pero aquí expresa la idea de desaparecer o desvanecerse.'
    reason: lexical_alternative
  - marker: c
    text: “Langosta” es el sentido usual del hebreo; algunas traducciones ponen “saltamontes”.
    reason: lexical_alternative
lexical_decisions:
- source_word: כְּצֵל
  english_pob_choice: Like a shadow
  chosen_spanish: Como una sombra
  alternatives_spanish:
  - Como sombra
  lexicon: HALOT
  rationale: La preposición כ marca comparación, y צֵל significa “sombra”. En español, “como una sombra” conserva la imagen poética con naturalidad.
- source_word: כִּנְטוֹתוֹ
  english_pob_choice: when it lengthens
  chosen_spanish: cuando se alarga
  alternatives_spanish:
  - cuando declina
  - cuando se extiende
  - cuando se inclina
  lexicon: HALOT
  rationale: נטה puede expresar extenderse, inclinarse o apartarse. En el cuadro de una sombra, “cuando se alarga” transmite bien la imagen temporal-poética de una sombra al final del día.
- source_word: נֶהֱלָכְתִּי
  english_pob_choice: I am gone
  chosen_spanish: yo me voy
  alternatives_spanish:
  - yo desaparezco
  - yo paso
  - yo me alejo
  lexicon: HALOT
  rationale: El nifal de הלך aquí comunica irse, desaparecer o pasar. “Yo me voy” es idiomático en español y mantiene el sentido de partida/desaparición sin sobrerrepresentar el verbo.
- source_word: נִנְעַרְתִּי
  english_pob_choice: I am shaken off
  chosen_spanish: soy sacudido
  alternatives_spanish:
  - soy sacudido y arrojado
  - soy sacudido fuera
  - me sacuden
  lexicon: HALOT
  rationale: El nifal de נער expresa ser sacudido o sacudido fuera. “Soy sacudido” preserva la pasiva y la imagen de algo fácilmente desprendido; el complemento comparativo en la línea siguiente completa el cuadro.
- source_word: כָּאַרְבֶּה
  english_pob_choice: like a locust
  chosen_spanish: como una langosta
  alternatives_spanish:
  - como un saltamontes
  lexicon: HALOT
  rationale: אַרְבֶּה denota ordinariamente “langosta”. Mantener ese término preserva la imagen bíblica estándar y la fuerza de la comparación.
translation_notes:
  revision_awareness: Se tomó en cuenta la revisión más reciente del POB inglés, que prefirió “I am gone” frente a “I fade away” para reflejar con mayor directitud el valor de הלך en este contexto de desaparición, sin perder la naturalidad poética.
  spanish_consistency_notes:
  - Se conservó el paralelismo de dos miembros con una primera imagen de sombra y una segunda de locusta/langosta.
  - Se evitó “SEÑOR” u այլ terminología no presente en el versículo; no hay aquí lenguaje divino explícito.
  - Se eligió “langosta” como término principal por su valor léxico más normal; se deja constancia de la alternativa tradicional “saltamontes” en nota.
