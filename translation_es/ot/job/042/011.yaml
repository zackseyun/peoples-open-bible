translation:
  language: es
  text: Entonces vinieron a él todos sus hermanos, todas sus hermanas y todos los que lo habían conocido antes; y comieron pan[a] con él en su casa. Le expresaron condolencia y lo consolaron por toda la calamidad que Yahvé había traído sobre él. Y cada uno le dio una qesitá[b] y un anillo de oro[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebreo 'comieron pan', una expresión común para compartir una comida.
    reason: cultural_note
  - marker: b
    text: La qesitá es una unidad o pieza antigua de valor; su equivalente exacto es incierto.
    reason: cultural_note
  - marker: c
    text: 'O: ''un anillo de nariz de oro''; el término hebreo puede referirse a un anillo llevado en la nariz o en la oreja.'
    reason: lexical_alternative
lexical_decisions:
- source_word: כָּל אֶחָיו וְכָל אֲחִיתָיו
  english_pob_choice: all his brothers, all his sisters
  chosen_spanish: todos sus hermanos, todas sus hermanas
  alternatives_spanish:
  - todos sus hermanos y hermanas
  lexicon: HALOT
  rationale: Mantiene la repetición enfática de כָּל y conserva la distinción de género plural del hebreo, como hace la versión inglesa auditada.
- source_word: וְכָל יֹדְעָיו לְפָנִים
  english_pob_choice: and all who had known him before
  chosen_spanish: y todos los que lo habían conocido antes
  alternatives_spanish:
  - y todos sus antiguos conocidos
  - y todos los que lo conocían de antes
  lexicon: HALOT
  rationale: ‘יֹדְעָיו’ señala personas que lo conocían, y ‘לְפָנִים’ marca anterioridad temporal. La redacción española conserva esa relación sin volverla demasiado libre.
- source_word: וַיֹּאכְלוּ עִמּוֹ לֶחֶם
  english_pob_choice: they ate bread with him
  chosen_spanish: comieron pan con él
  alternatives_spanish:
  - comieron con él
  - compartieron una comida con él
  lexicon: HALOT
  rationale: Se conserva la imagen idiomática concreta de ‘comer pan’ para expresar la comunión de mesa, siguiendo la decisión inglesa de no neutralizarla del todo.
- source_word: בְּבֵיתוֹ
  english_pob_choice: in his house
  chosen_spanish: en su casa
  alternatives_spanish:
  - en su hogar
  - en su vivienda
  lexicon: HALOT
  rationale: ‘בית’ es literalmente ‘casa’; ‘en su casa’ es natural y fiel en español.
- source_word: וַיָּנֻדוּ לוֹ
  english_pob_choice: They showed him sympathy
  chosen_spanish: Le mostraron simpatía
  alternatives_spanish:
  - Se compadecieron de él
  - Le expresaron su condolencia
  lexicon: HALOT
  rationale: ‘נוד’ aquí expresa duelo o compasión mediante gestos/actitudes. ‘Simpatía’ comunica bien la acción social en español sin cargarla con un matiz demasiado técnico.
- source_word: וַיְנַחֲמוּ אֹתוֹ
  english_pob_choice: comforted him
  chosen_spanish: lo consolaron
  alternatives_spanish:
  - lo confortaron
  - le dieron consuelo
  lexicon: HALOT
  rationale: ‘נחם’ en este contexto es el acto estándar de consolar a alguien que sufre; ‘lo consolaron’ es el equivalente más natural.
- source_word: עַל כָּל הָרָעָה
  english_pob_choice: for all the calamity
  chosen_spanish: por toda la calamidad
  alternatives_spanish:
  - por todo el mal
  - por toda la desgracia
  - por todo el desastre
  lexicon: HALOT
  rationale: ‘רָעָה’ aquí apunta a desgracia/aflicción, no a maldad moral. ‘Calamidad’ preserva la fuerza del término y evita suavizarla.
- source_word: אֲשֶׁר הֵבִיא יְהוָה עָלָיו
  english_pob_choice: that Yahweh had brought upon him
  chosen_spanish: que Yahvé había traído sobre él
  alternatives_spanish:
  - que Yahvé le había traído encima
  - que Yahvé había causado que le viniera
  lexicon: HALOT
  rationale: Se conserva la atribución directa al acto de Yahvé, manteniendo la tensión teológica del hebreo sin atenuarla.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - SEÑOR
  lexicon: HALOT
  rationale: El texto español sigue la terminología doctrinal del proyecto para el nombre divino, en lugar de ocultarlo bajo un equivalente funcional.
- source_word: אִישׁ קְשִׂיטָה אֶחָת
  english_pob_choice: one qesitah
  chosen_spanish: una qesitá
  alternatives_spanish:
  - una pieza de valor
  - una moneda antigua
  lexicon: HALOT
  rationale: Se translitera el término técnico para conservar la especificidad léxica y la incertidumbre de su equivalente exacto, en línea con la decisión inglesa.
- source_word: וְאִישׁ נֶזֶם זָהָב אֶחָד
  english_pob_choice: one gold ring
  chosen_spanish: un anillo de oro
  alternatives_spanish:
  - un aro de oro
  - un anillo de nariz de oro
  lexicon: HALOT
  rationale: ‘נֶזֶם’ puede ser un anillo para la nariz o la oreja, pero el hebreo no precisa el lugar aquí. ‘Anillo de oro’ evita sobreespecificar; la alternativa más concreta queda reflejada en la nota.
theological_decisions:
- issue: Agencia divina en la aflicción de Job
  english_pob_reading: that the LORD had brought upon him
  chosen_spanish_reading: que Yahvé había traído sobre él
  alternative_spanish_readings:
  - que Yahvé había permitido que le sobreviniera
  - que Yahvé le había dejado caer encima
  rationale: El hebreo atribuye la calamidad a la acción de Yahvé; la traducción española mantiene esa atribución sin suavizarla con una lectura de mera अनुमति/permiso. Así se preserva la tensión teológica del pasaje.
  doctrine_reference: Translation philosophy §3; término contestado יְהוָה → Yahvé
translation_notes:
  revision_awareness: La versión inglesa auditada se mantuvo estable en la última revisión y recibió verificación de alta concordancia; no se registraron cambios textuales posteriores que afecten la base de trabajo. La presente propuesta sigue esa lectura sin introducir ajustes no motivados.
  spanish_consistency_notes:
  - Se mantiene ‘Yahvé’ para el nombre divino, conforme al estándar del proyecto.
  - Se conserva la concretud idiomática de ‘comer pan’ en lugar de neutralizarla como simple ‘comer’.
  - ‘Qesitá’ se translitera para preservar la indeterminación del valor antiguo.
  - ‘Anillo de oro’ evita imponer nariz u oreja en el texto principal; esa posibilidad queda en nota.
  - ‘Calamidad’ refleja la aflicción objetiva del hebreo, no una maldad moral.
