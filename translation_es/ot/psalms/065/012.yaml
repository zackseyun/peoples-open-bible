    rationale: En el POB inglés, la nota de literalidad sobre «fatness» califica «abundance», no «your goodness». Dejarla en «bondad» mezcla dos lexemas distintos (טוֹבָתֶךָ y דָּשֶׁן) y debilita la trazabilidad del análisis léxico.
  - severity: low
