base_translation:
  language: en
  yaml_path: translation/ot/jeremiah/014/017.yaml
  text: 'And you shall say to them this word: ‘Let my eyes run down with tears night and day[a], and let them not cease, for the virgin daughter of my people is broken with a great breaking[c][b], with a very grievous wound.’'
  footnotes:
  - marker: a
    text: Or 'and let them not be silent' / 'and let them not rest'; the Hebrew verb can carry the sense of becoming still or ceasing.
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'the virgin daughter of my people,' a poetic personification of the people as a young woman.
    reason: cultural_note
  - marker: c
    text: Hebrew literally uses a cognate expression, 'a great breaking is broken,' for emphasis.
    reason: lexical_alternative
