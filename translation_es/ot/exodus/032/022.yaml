translation:
  language: es
  text: 'Y Aarón dijo: «No se encienda la ira de mi señor. Tú conoces al pueblo, que está dado[a] al mal».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «está inclinado al mal» o «está entregado al mal». La expresión hebrea es idiomática y describe al pueblo como caracterizado por el mal.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמֶר
  english_pob_choice: And ... said
  chosen_spanish: Y ... dijo
  alternatives_spanish:
  - Entonces ... dijo
  - Así que ... dijo
  lexicon: HALOT
  rationale: La waw narrativa introduce la respuesta de Aarón; «Y ... dijo» conserva el flujo narrativo sin cargar el sentido con una relación causal o temporal más fuerte que la del hebreo.
- source_word: אַהֲרֹן
  english_pob_choice: Aaron
  chosen_spanish: Aarón
  alternatives_spanish:
  - Aharón
  lexicon: Convención bíblica española
  rationale: Nombre propio transliterado según la convención española estándar y de lectura eclesial amplia.
- source_word: אַל יִחַר אַף
  english_pob_choice: Do not let ... anger burn hot
  chosen_spanish: No se encienda la ira
  alternatives_spanish:
  - No se enoje
  - No arda la ira
  lexicon: HALOT
  rationale: El hebreo conserva la imagen de la ira que se enciende/arda. «No se encienda la ira» preserva esa metáfora con español natural; «no se enoje» sería más llano pero menos cercano al giro idiomático.
- source_word: אֲדֹנִי
  english_pob_choice: my lord
  chosen_spanish: mi señor
  alternatives_spanish:
  - mi señoría
  - señor
  lexicon: HALOT
  rationale: Aquí es un tratamiento humano dirigido a Moisés, no el título divino. «Mi señor» refleja deferencia sin confundirlo con el uso teológico de «Señor».
- source_word: אַתָּה יָדַעְתָּ
  english_pob_choice: You know
  chosen_spanish: Tú conoces
  alternatives_spanish:
  - Tú sabes
  - Tú bien conoces
  lexicon: HALOT
  rationale: El pronombre explícito hebreo da énfasis, pero en español no requiere el equivalente «tú» duplicado; «Tú conoces» mantiene la fuerza directa y natural.
- source_word: הָעָם
  english_pob_choice: the people
  chosen_spanish: el pueblo
  alternatives_spanish:
  - la gente
  - el pueblo de Israel
  lexicon: HALOT
  rationale: El sustantivo colectivo en español se expresa con naturalidad como «el pueblo»; aquí mantiene la referencia colectiva de Israel sin añadir especificación no presente.
- source_word: כִּי
  english_pob_choice: that
  chosen_spanish: que
  alternatives_spanish:
  - pues
  - porque
  lexicon: HALOT
  rationale: Introduce el contenido de lo que Moisés sabe. «Que» conserva la subordinación explicativa del hebreo y funciona fluidamente en español.
- source_word: בְרָע הוּא
  english_pob_choice: they are set on evil
  chosen_spanish: está dado al mal
  alternatives_spanish:
  - está inclinado al mal
  - está entregado al mal
  - están dados al mal
  lexicon: HALOT
  rationale: La expresión hebrea es idiomática y describe una disposición característica al mal. En español, «está dado al mal» reproduce esa idea establecida; el singular verbal concuerda con «el pueblo» como colectivo.
theological_decisions:
- issue: Tratamiento de אֲדֹנִי en un contexto humano
  english_pob_reading: my lord
  chosen_spanish_reading: mi señor
  alternative_spanish_readings:
  - Señor
  - mi maestro
  rationale: El destinatario es Moisés, por lo que no debe sonar como un título divino. «Mi señor» preserva la deferencia sin borrar la distinción teológica entre un tratamiento humano y el nombre/título divino.
  doctrine_reference: 'DOCTRINE.md: distinguir títulos humanos de títulos divinos; nombres y títulos no deben confundirse.'
- issue: Metáfora de la ira que se enciende
  english_pob_reading: Do not let ... anger burn hot
  chosen_spanish_reading: No se encienda la ira
  alternative_spanish_readings:
  - No arda la ira
  - No se caliente la ira
  rationale: La formulación española debe conservar el valor idiomático del hebreo sin volverse rígida. «No se encienda la ira» mantiene la metáfora de combustión/ardor y su sentido exhortativo.
  doctrine_reference: 'DOCTRINE.md: preservar imágenes semíticas cuando son teológicamente y literariamente significativas.'
translation_notes:
  revision_awareness: 'Se tuvo en cuenta la revisión más reciente del POB en inglés: se eliminó el añadido explicativo equivalente a «yourself» porque no está explícito en el hebreo. La traducción española no añade ningún refuerzo pronominal inexistente y conserva el resto de las decisiones auditadas, incluida la lectura idiomática de בְרָע הוּא.'
  spanish_consistency_notes:
  - Se usa «Yahvé» como norma general en el proyecto, pero este versículo no contiene el Tetragrámaton ni un equivalente directo.
  - Se mantiene «mi señor» para אֲדֹנִי porque el contexto es un trato humano a Moisés.
  - Se conserva una construcción idiomática para בְרָע הוּא en lugar de una traducción palabra por palabra que sonaría antinatural en español.
  - La nota al pie está anclada exactamente en la frase «dado al mal» para evitar marcadores huérfanos.
