revisions:
- from: ¡Oh Yahvé, nuestro Dios[a], todo este abundante conjunto[b] que hemos preparado para edificarte una casa para tu santo nombre proviene de tu mano[c], y todo es tuyo.
  to: Yahvé, nuestro Dios[a], toda esta abundancia[b] que hemos preparado para edificarte una casa para tu santo nombre es de tu mano[c], y todo es tuyo.
  rationale: Se revisa «todo este abundante conjunto» a «toda esta abundancia» por fidelidad léxica y mejor español, se ajusta «proviene de tu mano» a «es de tu mano» para reflejar más de cerca el hebreo y la revisión inglesa final, se mejora la nota léxica de הֶהָמוֹן con alternativas más naturales, y se elimina «¡Oh» para un registro más sobrio y natural en español eclesial contemporáneo.
