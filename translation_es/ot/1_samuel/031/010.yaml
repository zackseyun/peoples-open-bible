translation:
  language: es
  text: Pusieron su armadura[a] en la casa de las Ashtarot[b], y fijaron[c] su cuerpo a la muralla de Bet-seán.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: También puede entenderse «sus armas» o, en sentido más general, «su equipo»; el término hebreo puede referirse ampliamente al equipo militar.
    reason: lexical_alternative
  - marker: b
    text: O «el templo de las Ashtarot». Literalmente, «la casa de las Ashtarot».
    reason: lexical_alternative
  - marker: c
    text: O «lo impalaron» o «lo clavaron». El verbo hebreo puede significar «clavar», «fijar» o «introducir con fuerza», sin precisar con exactitud el modo de exhibición.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּשִׂמוּ
  english_pob_choice: They put
  chosen_spanish: Pusieron
  alternatives_spanish:
  - Colocaron
  - Pusieron allí
  lexicon: HALOT
  rationale: שׂוּם expresa poner/colocar/poner en su lugar. En español, «pusieron» conserva la sencillez narrativa del hebreo y del POB en inglés sin sobretraducir.
- source_word: כֵּלָיו
  english_pob_choice: his armor
  chosen_spanish: su armadura
  alternatives_spanish:
  - sus armas
  - su equipo militar
  - sus pertrechos
  lexicon: HALOT
  rationale: כְּלִי puede abarcar implementos, armas o equipo. En este contexto de despojos militares de un guerrero muerto, «armadura» es una opción natural y suficientemente concreta; mantiene el sentido bélico sin forzar «armas» cuando el término hebreo es más amplio.
- source_word: בֵּית עַשְׁתָּרוֹת
  english_pob_choice: the house of the Ashtaroths
  chosen_spanish: la casa de las Ashtarot
  alternatives_spanish:
  - el templo de las Ashtarot
  - la casa de Astarot
  lexicon: HALOT
  rationale: בֵּית es literalmente «casa», y en contexto cultual puede referirse a un santuario o templo. Se conserva la transliteración plural del nombre para reflejar la forma hebrea y la decisión del POB inglés de mantener transparencia, evitando sustituirla por un equivalente tradicional no atestiguado aquí.
- source_word: גְּוִיָּתוֹ
  english_pob_choice: his body
  chosen_spanish: su cuerpo
  alternatives_spanish:
  - su cadáver
  - su cuerpo muerto
  lexicon: HALOT
  rationale: גְּוִיָּה designa un cuerpo, a menudo un cadáver. «Su cuerpo» es claro en español y sigue la opción del POB de no endurecer innecesariamente el término con «cadáver».
- source_word: תָּקְעוּ
  english_pob_choice: they fastened
  chosen_spanish: colgaron
  alternatives_spanish:
  - lo fijaron
  - lo clavaron
  - lo sujetaron
  lexicon: HALOT
  rationale: תקע puede significar clavar, fijar o hacer entrar con fuerza. En español, «colgaron» comunica el resultado de una exhibición del cuerpo en la muralla de manera natural; se evita precisar más que el hebreo, que no describe con exactitud el método.
- source_word: בְּחוֹמַת
  english_pob_choice: to the wall of
  chosen_spanish: en la muralla de
  alternatives_spanish:
  - sobre la muralla de
  - a la muralla de
  lexicon: HALOT
  rationale: חוֹמָה es «muralla» o «muro fortificado». «En la muralla de» refleja bien la colocación del cuerpo y sugiere el acto de exhibición sin imponer una preposición demasiado técnica.
- source_word: בֵּית שָׁן
  english_pob_choice: Beth-shan
  chosen_spanish: Bet-seán
  alternatives_spanish:
  - Bet-shán
  - Bet-sán
  lexicon: HALOT
  rationale: Se usa una transliteración española habitual y legible para el topónimo. «Bet-seán» conserva el nombre propio bíblico de forma reconocible en español.
translation_notes:
  revision_awareness: El inglés POB revisó Ashtaroth para reflejar mejor el plural hebreo; esta decisión se conserva en español con «las Ashtarot». También se mantiene la cautela del POB respecto del verbo תָּקְעוּ, evitando una precisión excesiva sobre el modo de exposición del cuerpo.
  spanish_consistency_notes:
  - Se preserva la transparencia del nombre divino y de los topónimos según la práctica del proyecto, sin usar equivalentes tradicionales que oculten la forma hebrea.
  - Se mantiene un registro sobrio y narrativo, acorde con la prosa histórica breve del versículo.
  - La decisión de «armadura» refleja el rango militar del hebreo כֵּלִים sin cerrar indebidamente otras posibilidades semánticas.
