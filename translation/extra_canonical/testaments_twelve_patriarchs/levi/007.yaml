theological_decisions:
- issue: Covenantal promise language in Levi's speech to Jacob
  chosen_reading: Retain 'seed' and the Lord's gift of the land as explicit promise language
  alternative_readings:
  - Use 'descendants' for contemporary clarity
  - Soften the statement into a general prediction of victory
  rationale: The Greek is framed in covenantal terms resonant with patriarchal promise traditions. Preserving that diction maintains the theological texture of land and seed without importing later doctrinal harmonization.
  doctrine_reference: 'DOCTRINE.md: Original-language primacy; consistency of key terms'
- issue: Moral characterization of the Shechemites' act
  chosen_reading: 'Translate ἀφροσύνην and μιάναντες with explicitly moral language: ''folly'' and ''defiling'''
  alternative_readings:
  - Use more purely social language such as 'outrage' or 'dishonoring'
  - Use more explicit sexual language not directly present in the Greek
  rationale: The Greek frames the offense as moral-religious pollution within Israel. The chosen wording preserves that theological register while avoiding embellishment beyond the text.
  doctrine_reference: 'DOCTRINE.md: Preserve theological tension rather than resolve it'
