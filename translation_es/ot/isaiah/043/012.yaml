translation:
  language: es
  text: Yo mismo declaré, salvé y anuncié[a]; y no había entre ustedes ningún dios extranjero; y ustedes son mis testigos, dice Yahvé, y yo soy Dios.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «no había entre ustedes ningún extraño». El hebreo זָר puede significar «extraño/foráneo», pero en este contexto probablemente se refiere a un dios extranjero.'
    reason: alternative_reading
lexical_decisions:
- source_word: אָנֹכִי
  english_pob_choice: I myself
  chosen_spanish: Yo mismo
  alternatives_spanish:
  - Yo
  - Yo solo
  lexicon: HALOT
  rationale: El pronombre independiente es enfático. «Yo mismo» preserva esa fuerza en español sin añadir una exclusividad que el hebreo no explicita por sí sola.
- source_word: הִגַּדְתִּי
  english_pob_choice: declared
  chosen_spanish: declaré
  alternatives_spanish:
  - dije
  - anuncié
  lexicon: HALOT
  rationale: El verbo en hiphil de נגד tiene el sentido de declarar o hacer saber. «Declaré» mantiene el tono solemne y jurídico del pasaje.
- source_word: וְהוֹשַׁעְתִּי
  english_pob_choice: saved
  chosen_spanish: salvé
  alternatives_spanish:
  - libré
  - liberté
  lexicon: HALOT
  rationale: El hiphil de ישׁע normalmente significa salvar o librar. «Salvé» conserva la fuerza teológica de la salvación divina y corresponde a la elección inglesa.
- source_word: וְהִשְׁמַעְתִּי
  english_pob_choice: announced
  chosen_spanish: anuncié
  alternatives_spanish:
  - proclamé
  - hice saber
  lexicon: HALOT
  rationale: Aquí el hiphil de שׁמע tiene el valor de «hacer oír / dar a conocer». «Anuncié» distingue esta acción de «declaré» y conserva la secuencia de revelación divina.
- source_word: וְאֵין בָּכֶם זָר
  english_pob_choice: there was no foreign god among you
  chosen_spanish: no había entre ustedes ningún dios extranjero
  alternatives_spanish:
  - no había entre ustedes ningún extraño
  - no había entre ustedes ningún forastero
  lexicon: HALOT
  rationale: En este contexto, זָר apunta a una deidad extranjera, no a una persona forastera. En español, añadir «dios» expresa con claridad la referencia implícita que exige el contexto y sigue la decisión auditada de la POB inglesa.
- source_word: עֵדַי
  english_pob_choice: my witnesses
  chosen_spanish: mis testigos
  alternatives_spanish:
  - testigos para mí
  lexicon: HALOT
  rationale: La construcción con sufijo de primera persona es posesiva. «Mis testigos» reproduce la relación directa entre Yahvé e Israel.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahveh
  lexicon: HALOT
  rationale: 'Se sigue el criterio del proyecto para el nombre divino: «Yahvé», preservando el nombre del pacto sin sustituirlo por una máscara como «SEÑOR».'
- source_word: אֵל
  english_pob_choice: God
  chosen_spanish: Dios
  alternatives_spanish:
  - El
  lexicon: HALOT
  rationale: Aquí אֵל funciona como título común y no como nombre propio. «Dios» es la equivalencia natural y fiel en español, manteniendo el cierre enfático del verso.
theological_decisions:
- issue: Sentido de זָר en la cláusula וְאֵין בָכֶם זָר
  english_pob_reading: foreign god
  chosen_spanish_reading: ningún dios extranjero
  alternative_spanish_readings:
  - ningún extraño
  - ningún forastero
  rationale: El contexto inmediato trata de la unicidad de Yahvé al declarar, salvar y anunciar. Por eso, la lectura polémica sobre una deidad extranjera se expresa mejor en español con «dios extranjero»; las otras opciones quedan como alternativas léxicas posibles pero menos probables.
  doctrine_reference: 'DOCTRINE.md: preservar la tensión léxica cuando el contexto la resuelve de forma razonable; aquí la referencia a una deidad extranjera está apoyada por el marco del versículo.'
- issue: Renderización del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Jehová
  rationale: El texto hebreo contiene el Tetragrama. Conforme al criterio del proyecto, se traduce como «Yahvé» para preservar el nombre de pacto revelado y evitar el sustituto litúrgico tradicional.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
translation_notes:
  revision_awareness: Se tuvo en cuenta el paquete fuente hebreo, la traducción auditada al inglés y sus decisiones léxicas y teológicas. No se detectaron cambios de revisión aplicados en la pasada más reciente; el borrador español sigue la lectura de alta concordancia y conserva la ambigüedad léxica relevante mediante nota.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» de forma consistente para יְהוָה, conforme al estándar del proyecto.
  - Se usa «Dios» para אֵל y no «El», por claridad y fidelidad al valor nominal común en este contexto.
  - 'Se preserva el contraste verbal: «declaré / salvé / anuncié», siguiendo la secuencia del hebreo.'
  - Se optó por «ningún dios extranjero» para reflejar la lectura contextual del POB inglés y evitar una traducción demasiado genérica de זָר.
  - La puntuación con punto y coma refleja adecuadamente las unidades del verso en español formal.
