  to: 'Yahvé de los Ejércitos ha revelado en mis oídos: «Ciertamente, esta iniquidad no será expiada[a] hasta que ustedes mueran», dice el Señor Dios, Yahvé de los Ejércitos[b].'
  rationale: Se corrige la fórmula divina final para reflejar con más fidelidad y naturalidad la combinación אֲדֹנָי יְהוִה צְבָאוֹת, manteniendo a la vez la política del proyecto de traducir יהוה como 'Yahvé'. Se actualiza la nota correspondiente para que sus alternativas no repitan la formulación problemática.
