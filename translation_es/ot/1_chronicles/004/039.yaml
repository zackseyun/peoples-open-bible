  glossary_alignment: No hay términos del glosario teológico principal en juego. El topónimo «Gedor» está bien conservado. «Rebaños» alinea bien con צֹאן. La nota a sobre «aproximación» es aceptable como alternativa léxica, aunque «acceso» o «entrada» son más idiomáticos en español.
