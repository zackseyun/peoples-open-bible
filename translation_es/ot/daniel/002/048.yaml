translation:
  language: es
  text: Entonces el rey engrandeció a Daniel y le dio muchos grandes regalos[b][a], y lo hizo gobernador de toda la provincia de Babilonia y jefe de los prefectos sobre todos los sabios de Babilonia.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «promovió a Daniel». El verbo arameo literalmente significa «lo hizo grande» y, en este contexto, expresa exaltación real.'
    reason: lexical_alternative
  - marker: b
    text: El título traducido «jefe de los prefectos» se refiere a un funcionario de alto rango puesto sobre otros oficiales o administradores de la corte.
    reason: cultural_note
lexical_decisions:
- source_word: אֱדַיִן
  english_pob_choice: Then
  chosen_spanish: Entonces
  alternatives_spanish:
  - Luego
  - Por entonces
  lexicon: HALOT
  rationale: Adverbio temporal/secuencial que introduce la acción siguiente en el relato. "Entonces" mantiene la fluidez narrativa natural en español sin añadir matiz interpretativo indebido.
- source_word: מַלְכָּא
  english_pob_choice: the king
  chosen_spanish: el rey
  alternatives_spanish:
  - el monarca
  lexicon: HALOT
  rationale: Forma definida normal en español para el sujeto real; conserva el referente concreto y el registro narrativo.
- source_word: רַבִּי
  english_pob_choice: made Daniel great
  chosen_spanish: engrandeció a Daniel
  alternatives_spanish:
  - promovió a Daniel
  - lo hizo grande
  lexicon: HALOT
  rationale: El verbo arameo expresa hacer grande/exaltar. "Engrandeció" preserva el sentido léxico y la elevación de estatus sin reducirlo solo a un ascenso administrativo.
- source_word: וּמַתְּנָן רַבְרְבָן שַׂגִּיאָן
  english_pob_choice: many great gifts
  chosen_spanish: muchos dones grandes
  alternatives_spanish:
  - muchos regalos grandes
  - dones muy grandes y abundantes
  lexicon: HALOT
  rationale: '"מַתְּנָן" son dones/regalos; los adjetivos intensifican cantidad e importancia. "Dones grandes" conserva la acumulación retórica del arameo, aunque en español suene menos natural que "regalos"; se prefiere "dones" por su dignidad y por el contexto cortesano.'
- source_word: יְהַב לֵהּ
  english_pob_choice: gave him
  chosen_spanish: le dio
  alternatives_spanish:
  - se los dio
  - le entregó
  lexicon: HALOT
  rationale: Verbo simple con objeto indirecto; "le dio" es la correspondencia directa y natural.
- source_word: וְהַשְׁלְטֵהּ
  english_pob_choice: and he made him ruler
  chosen_spanish: y lo hizo gobernador
  alternatives_spanish:
  - y lo estableció como gobernante
  - y le dio autoridad
  lexicon: HALOT
  rationale: El causativo de שלט indica poner en autoridad. "Gobernador" expresa con claridad el cargo administrativo en español. Aunque el inglés POB usa "made him ruler", aquí se elige un término funcionalmente equivalente para la provincia.
- source_word: עַל כָּל מְדִינַת בָּבֶל
  english_pob_choice: over the whole province of Babylon
  chosen_spanish: de toda la provincia de Babilonia
  alternatives_spanish:
  - sobre toda la provincia de Babilonia
  - en toda la provincia de Babilonia
  lexicon: HALOT
  rationale: La preposición aramea exige relación de dominio/administración; en español, con "gobernador" resulta más natural "de toda la provincia". Se conserva la totalidad de la jurisdicción y el término imperial "provincia".
- source_word: וְרַב סִגְנִין
  english_pob_choice: chief prefect
  chosen_spanish: jefe de los prefectos
  alternatives_spanish:
  - prefecto principal
  - jefe de los administradores
  lexicon: HALOT
  rationale: Se mantiene el valor de רַב como "jefe" y de סִגְנִין como un cuerpo de oficiales/prefectos. Esta opción comunica la jerarquía administrativa sin imponer un título demasiado técnico o ajeno al español bíblico.
- source_word: עַל כָּל חַכִּימֵי בָבֶל
  english_pob_choice: over all the wise men of Babylon
  chosen_spanish: sobre todos los sabios de Babilonia
  alternatives_spanish:
  - sobre todos los hombres sabios de Babilonia
  - sobre todos los consejeros sabios de Babilonia
  lexicon: HALOT
  rationale: '"חַכִּימֵי" designa a los sabios/cortesanos expertos. "Sabios" es la equivalencia estable en Daniel y preserva el grupo profesional de la corte babilónica.'
translation_notes:
  revision_awareness: La revisión más reciente indica que no se requieren cambios; el borrador español mantiene el acuerdo alto con el texto fuente y con la lectura auditada en inglés.
  spanish_consistency_notes:
  - Se conserva «Babilonia» como topónimo estable y «provincia» para מְדִינָה en contexto imperial.
  - Se evita «SEÑOR» o recursos de sustitución no presentes en el verso.
  - Se mantiene la distinción entre título administrativo («jefe de los prefectos») y el grupo al que gobierna («sabios»).
  - Se prioriza un español natural, pero con suficiente literalidad para reflejar la acumulación de honor y regalos del arameo.
