translation:
  language: es
  text: Para Shuppim y Hosah[a], la suerte cayó al oeste, con la puerta de Shallecheth en la calzada ascendente, puesto de guardia correspondiente a puesto de guardia.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O posiblemente «la puerta de la Expulsión»; «Shallecheth» probablemente es un nombre propio de puerta derivado de un verbo que significa «arrojar» o «derribar».
    reason: lexical_alternative
lexical_decisions:
- source_word: לְשֻׁפִּים
  english_pob_choice: For Shuppim
  chosen_spanish: Para Shuppim
  alternatives_spanish:
  - A Shuppim
  - En favor de Shuppim
  lexicon: HALOT
  rationale: El ל prefijado expresa asignación por sorteo en este contexto. En español, «para» comunica de modo natural esa distribución sin perder el sentido dativo de asignación.
- source_word: וּלְחֹסָה
  english_pob_choice: and Hosah
  chosen_spanish: y Hosah
  alternatives_spanish:
  - y para Hosah
  - y en favor de Hosah
  lexicon: HALOT
  rationale: Se mantiene la coordinación del reparto por sorteo. El español puede omitir la repetición de «para» después de la conjunción sin perder el matiz de asignación ya establecido.
- source_word: לַמַּעֲרָב
  english_pob_choice: to the west
  chosen_spanish: al oeste
  alternatives_spanish:
  - hacia el occidente
  - para el lado occidental
  lexicon: HALOT
  rationale: La referencia es topográfica y direccional. «Al oeste» es la forma más natural y precisa en español contemporáneo.
- source_word: עִם
  english_pob_choice: with
  chosen_spanish: con
  alternatives_spanish:
  - junto con
  - al lado de
  lexicon: HALOT
  rationale: 'Introduce un rasgo asociado del emplazamiento: la puerta. «Con» preserva la relación simple del hebreo sin sobreinterpretarla.'
- source_word: שַׁעַר שַׁלֶּכֶת
  english_pob_choice: the Gate of Shallecheth
  chosen_spanish: la puerta de Shallecheth[a]
  alternatives_spanish:
  - la puerta de la Expulsión
  - la puerta de Arrojo
  lexicon: HALOT
  rationale: Se conserva el nombre propio transliterado en el texto principal, siguiendo el criterio de no traducir automáticamente un topónimo cuya etimología es incierta. La nota preserva la alternativa léxica posible a partir del verbo asociado.
- source_word: בַּמְסִלָּה הָעוֹלָה
  english_pob_choice: on the ascending highway
  chosen_spanish: en la calzada ascendente
  alternatives_spanish:
  - en la vía que sube
  - sobre el camino de subida
  lexicon: HALOT
  rationale: מְסִלָּה designa una vía elevada o calzada, no simplemente un camino. «Calzada ascendente» conserva el valor topográfico y la idea de subida del participio.
- source_word: מִשְׁמָר לְעֻמַּת מִשְׁמָר
  english_pob_choice: guard corresponding to guard
  chosen_spanish: guardia correspondiente a guardia
  alternatives_spanish:
  - vigilancia correspondiente a vigilancia
  - guardia frente a guardia
  lexicon: HALOT
  rationale: La expresión es terse y describe puestos de guardia emparejados o correspondientes. «Correspondiente a» evita la idea de oposición hostil que podría sugerir «frente a» o «opuesto a», y conserva la simetría del hebreo.
translation_notes:
  revision_awareness: La versión inglesa auditada mantuvo la lectura final «guard corresponding to guard» en lugar de «opposite», afinando el valor relacional de מִשְׁמָר לְעֻמַּת מִשְׁמָר. La redacción española sigue esa revisión y evita una idea de antagonismo no presente en el contexto.
  spanish_consistency_notes:
  - Se conserva «Yahvé» como norma del proyecto cuando aparezca el tetragrámaton; aquí no aparece.
  - Se mantiene «Shuppim» y «Hosah» como nombres propios transliterados.
  - «Puerta» se usa para שַׁעַר en un sentido arquitectónico concreto; no se sustituye por terminología eclesial.
  - «Guardia» y no «vigilancia» en el cuerpo del texto, para reflejar el paralelismo breve y concreto del hebreo.
  - La nota a queda anclada en «Shallecheth», que en el texto principal aparece con el marcador [a].
