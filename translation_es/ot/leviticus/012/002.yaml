base_translation:
  language: en
  yaml_path: translation/ot/leviticus/012/002.yaml
  text: 'Speak to the sons of Israel[a], saying: If a woman conceives and gives birth to a male child, then she shall be unclean seven days[c][b]; she shall be unclean as in the days of her menstrual impurity.'
  footnotes:
  - marker: a
    text: Or 'when a woman conceives.' The Hebrew case-law particle can be rendered either 'if' or 'when' in context.
    reason: lexical_alternative
  - marker: b
    text: Literally 'gives birth to a male.'
    reason: lexical_alternative
  - marker: c
    text: That is, ritual impurity associated with menstruation.
    reason: cultural_note
