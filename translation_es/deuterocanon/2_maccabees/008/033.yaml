review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien la estructura general del griego: celebración de la victoria en la patria, castigo por haber incendiado las puertas sagradas, referencia a Calístenes y cierre con la retribución merecida por su impiedad. Sin embargo, hay dos desajustes importantes: la nota [a] está anclada en «patria» cuando en realidad corresponde a la frase oscura εἰς ἐνοίκιον πεφευγότα, y «un cierto alojamiento» suena poco natural y algo impreciso para el contexto narrativo, donde el sentido es más bien ‘una casa/vivienda/alojamiento’ como lugar de refugio.'
  spanish_quality_summary: El español es mayormente claro y digno, pero presenta una falla formal grave de notas y una expresión algo torpe en «a un cierto alojamiento para refugiarse». Además, «salario digno de su impiedad» es comprensible, pero en español bíblico y literario «recompensa» o «pago merecido» suena más natural para μισθός en contexto de juicio.
  glossary_alignment: No hay conflicto con la terminología doctrinal principal del proyecto. «Puertas sagradas» e «impiedad» están bien. El nombre propio conviene adaptarlo a la forma española corriente «Calístenes», salvo que exista una política local explícita de transliteración griega cruda; dado el objetivo de legibilidad eclesial en español, «Calístenes» es preferible aquí.
  issues:
  - severity: high
    issue: La nota [a] está colocada en «patria» en vez de en la frase correspondiente a εἰς ἐνοίκιον πεφευγότα.
    rationale: La nota explica una dificultad léxica sobre el lugar de refugio, no sobre ἐν τῇ πατρίδι. Esto desinforma al lector y rompe la trazabilidad con el audit trail inglés.
  - severity: medium
    issue: «A un cierto alojamiento para refugiarse» es poco idiomático en español.
    rationale: Aunque intenta preservar la vaguedad de ἐνοίκιον, la combinación resulta forzada. «A una casa[a] para refugiarse» o «a una vivienda[a] para refugiarse» comunica mejor el sentido sin exceder la evidencia.
  - severity: medium
    issue: «Kallisthenes» es menos natural que «Calístenes» en español.
    rationale: Para lectura bíblica en español, la forma hispanizada es más legible y digna, y no altera el referente.
  - severity: low
    issue: «Salario digno de su impiedad» suena menos natural en contexto judicial.
    rationale: μισθός aquí funciona como retribución o recompensa merecida. «La recompensa merecida por su impiedad» expresa mejor el español natural y mantiene la ironía judicial del original.
