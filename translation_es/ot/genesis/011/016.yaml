lexical_decisions:
- source_word: וַיְחִי
  english_pob_choice: lived
  chosen_spanish: vivió
  alternatives_spanish:
  - vivió
  - estuvo vivo
  lexicon: HALOT
  rationale: En las fórmulas genealógicas hebreas, חיה indica el lapso de vida hasta el siguiente acontecimiento. «Vivió» conserva ese valor idiomático de manera natural en español.
- source_word: עֵבֶר
  english_pob_choice: Eber
  chosen_spanish: Eber
  alternatives_spanish:
  - Heber
  lexicon: convención onomástica bíblica
  rationale: El nombre propio se translitera como «Eber», en continuidad con la convención moderna y con la forma auditada en inglés.
- source_word: אַרְבַּע וּשְׁלֹשִׁים שָׁנָה
  english_pob_choice: thirty-four years
  chosen_spanish: treinta y cuatro años
  alternatives_spanish:
  - cuatro y treinta años
  - treinta y cuatro años
  lexicon: HALOT
  rationale: La construcción hebrea literalmente dice «cuatro y treinta», pero en español la forma natural y exacta es «treinta y cuatro años».
- source_word: וַיּוֹלֶד
  english_pob_choice: fathered
  chosen_spanish: engendró
  alternatives_spanish:
  - engendró
  - fue padre de
  - engendró a
  lexicon: HALOT
  rationale: En contextos genealógicos, ילד con sujeto masculino expresa beget/father. «Engendró» conserva la fuerza lexical y el registro bíblico sin caer en arcaísmo excesivo.
- source_word: אֶת
  english_pob_choice: '[not separately translated]'
  chosen_spanish: '[no se traduce aparte]'
  alternatives_spanish:
  - —
  lexicon: marcador de objeto directo
  rationale: Como marcador hebreo de objeto directo, no tiene equivalente independiente en español; su función queda absorbida por la sintaxis normal de la frase.
- source_word: פָּלֶג
  english_pob_choice: Peleg
  chosen_spanish: Peleg
  alternatives_spanish:
  - Peleg
  lexicon: convención onomástica bíblica
  rationale: Nombre propio transliterado directamente del hebreo, conforme a la convención bíblica estándar.
translation_notes:
  revision_awareness: El texto sigue de cerca el valor genealógico del hebreo, sin cambios respecto al sentido auditado en inglés; se preserva la secuencia cronológica y el acto de paternidad/engendramiento.
  spanish_consistency_notes:
  - Se mantiene «Eber» y «Peleg» como nombres propios transliterados.
  - Se usa pretérito perfecto simple («vivió», «engendró») para reproducir la fórmula narrativa genealógica.
  - No se añade puntuación interpretativa ni elementos no presentes en el hebreo.
