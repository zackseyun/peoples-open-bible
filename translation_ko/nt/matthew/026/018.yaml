  text: 그가 말씀하셨습니다, 「성안 아무개에게 가서 그에게 이르라, ʻ선생님이 말씀하시기를, 내 때가 가까이 왔으니, 내가 내 제자들과 함께 너의 집에서 유월절을 지키겠다 하신다.ʼ」
