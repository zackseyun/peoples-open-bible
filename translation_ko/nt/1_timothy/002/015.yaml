id: 1TI.2.15
reference: 1 Timothy 2:15
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: σωθήσεται δὲ διὰ τῆς τεκνογονίας, ἐὰν μείνωσιν ἐν πίστει καὶ ἀγάπῃ καὶ ἁγιασμῷ μετὰ σωφροσύνης.
base_translation:
  language: en
  yaml_path: translation/nt/1_timothy/002/015.yaml
  text: Yet she will be saved through childbearing[c][b][a], if they continue in faith and love and holiness with self-control.
  footnotes:
  - marker: a
    text: Or 'through the childbirth'; some understand this as a reference to a specific birth, possibly the Messiah's, though the phrase can also be read generically as 'through childbearing.'
    reason: alternative_reading
  - marker: b
    text: '''Faith'' may also be understood as ''faithfulness'' here.'
    reason: lexical_alternative
  - marker: c
    text: The Greek shifts from singular ('she will be saved') to plural ('if they continue').
    reason: lexical_alternative
translation:
  language: ko
  text: 그러나 그 여자는 출산을 통하여[a] 구원을 받을 것입니다—만일 그들이 자제함 가운데 믿음[b]과 사랑과 거룩함에 머무른다면 말입니다[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 또는 「그 출산을 통하여」. 일부는 이를 특정한 출산—메시아의 탄생—을 가리키는 것으로 이해하나, 보다 일반적으로 「자녀를 낳는 일」로 읽을 수도 있다.
    reason: alternative_reading
  - marker: b
    text: 「믿음」은 본 구절에서 「신실함」으로도 이해될 수 있다.
    reason: lexical_alternative
  - marker: c
    text: 헬라어 본문은 단수(「그 여자는 구원받을 것이다」)에서 복수(「만일 그들이 머무른다면」)로 주어가 바뀐다.
    reason: lexical_alternative
lexical_decisions:
- source_word: σωθήσεται
  english_pob_choice: she will be saved
  chosen_korean: 그 여자는 ~ 구원을 받을 것입니다
  alternatives_korean:
  - 구원받을 것입니다
  - 구원에 이를 것입니다
  lexicon: BDAG
  rationale: 단수 주어를 명시하기 위해 「그 여자」 부가. 14절 「여자」를 받는다.
- source_word: διὰ τῆς τεκνογονίας
  english_pob_choice: through childbearing
  chosen_korean: 출산을 통하여
  alternatives_korean:
  - 그 출산을 통하여
  - 자녀를 낳음으로
  lexicon: BDAG
  rationale: τεκνογονία는 「출산·자녀 낳음」. 정관사가 있어 「그 출산」으로 메시아 탄생을 가리키는 해석도 가능하나, 본문은 일반적 의미로도 읽을 수 있어 본문은 절제된 「출산」, 해석 폭은 각주에 둔다.
- source_word: ἐὰν μείνωσιν
  english_pob_choice: if they continue
  chosen_korean: 만일 그들이 머무른다면
  alternatives_korean:
  - 만일 그들이 거한다면
  - 만일 그들이 지속한다면
  lexicon: BDAG
  rationale: 복수 주어로의 전환. 「그 여자」에서 「그들」(여자들 전체 또는 자녀까지)로 시야가 넓어진다.
- source_word: ἐν πίστει καὶ ἀγάπῃ καὶ ἁγιασμῷ μετὰ σωφροσύνης
  english_pob_choice: in faith and love and holiness with self-control
  chosen_korean: 자제함 가운데 믿음과 사랑과 거룩함에
  alternatives_korean:
  - 분별 가운데 믿음과 사랑과 성결 안에
  - 정숙함과 함께 믿음·사랑·거룩 안에
  lexicon: BDAG
  rationale: σωφροσύνη는 9절과 동일 어휘. 일관되게 「자제함」으로 옮긴다. ἁγιασμός는 「거룩함」(과정·상태).
theological_decisions:
- issue: 2:15 - 「출산을 통해 구원받음」과 단수→복수 전환
  chosen_reading: 「그러나 그 여자는 출산을 통하여 구원을 받을 것입니다—만일 그들이 자제함 가운데 믿음과 사랑과 거룩함에 머무른다면 말입니다.」
  alternative_readings:
  - 「그러나 여자는 그 출산을 통하여(메시아 탄생) 구원을 받을 것입니다…」
  - 「그러나 여자는 자녀를 낳음으로 구원에 이를 것입니다—만일 그녀(들)이 …에 머무른다면」
  rationale: '본 절은 신약에서 가장 어려운 구절 중 하나로, 약화하거나 강화하지 않고 본문의 핵심 특징을 모두 보존한다: (1) διὰ τῆς τεκνογονίας의 정관사를 살려 「출산을 통하여」로 옮기되, 특정한 출산(메시아 탄생) 해석 가능성은 각주에 둔다. (2) 단수(σωθήσεται)에서 복수(μείνωσιν)로의 주어 전환을 「그 여자는 ~ 그들이」로 본문에서 직접 드러낸다. (3) πίστις는 「믿음」이 본문, 「신실함」은 각주. 한 가지 해석으로 좁히지 않는 것이 본 절에 대한 본 번역의 입장이다.'
  doctrine_reference: 'DOCTRINE.md: preserve theological tension; do not resolve interpretive disputes the text leaves open'
