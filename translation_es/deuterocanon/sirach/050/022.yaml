revisions:
- from: Y ahora[a], bendigan a Yahvé, el Dios de Israel, que hace cosas maravillosas en la tierra, que engrandece al hombre desde el vientre y actúa con él conforme a su voluntad.
  to: Y ahora[a], por favor bendigan a Yahvé, el Dios de Israel, que hace cosas maravillosas en la tierra, que engrandece a una persona desde el vientre y actúa con ella conforme a su voluntad.
  rationale: Se añade «por favor» para reflejar נָא, se cambia «el hombre» por «una persona» para seguir la revisión auditada y representar mejor אָדָם en español actual, y se ajusta el pronombre a «ella» para concordancia natural con «persona». Se conserva la nota sobre la variante griega porque la tensión textual sigue siendo significativa.
