translation:
  language: es
  text: 'Y Judith le dijo: «Recibe las palabras de tu esclava[a], y que tu sirvienta[b] hable ante ti, y no mentiré a mi señor esta noche».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «tu servidora» para τῆς δούλης σου. Se usa «esclava» para conservar la fuerza de estatus del término griego en el habla sumisa de Judith.
    reason: lexical_alternative
  - marker: b
    text: O «tu criada» o «tu muchacha» para ἡ παιδίσκη σου. «Sirvienta» mantiene el tono humilde y femenino sin volverse demasiado áspero.
    reason: lexical_alternative
lexical_decisions:
- source_word: Δέξαι
  english_pob_choice: Receive
  chosen_spanish: Recibe
  alternatives_spanish:
  - Acepta
  - Escucha
  lexicon: LSJ
  rationale: El imperativo aoristo de δέχομαι pide que el interlocutor acoja o reciba lo que ella va a decir. «Recibe» conserva mejor esa fuerza directa que «escucha».
- source_word: τὰ ῥήματα
  english_pob_choice: the words
  chosen_spanish: las palabras
  alternatives_spanish:
  - las cosas dichas
  - el mensaje
  lexicon: LSJ
  rationale: ῥήματα aquí designa palabras pronunciadas o dicho verbal. «Las palabras» es natural en español y sigue de cerca el plural griego.
- source_word: τῆς δούλης σου
  english_pob_choice: your slave
  chosen_spanish: tu esclava
  alternatives_spanish:
  - tu servidora
  - tu sierva
  lexicon: LSJ
  rationale: δοῦλη es femenino de δοῦλος y en este contexto cortesano mantiene la relación de sujeción y humillación de Judith. «Esclava» preserva esa carga de estatus que el POB inglés documenta como lexicalmente importante.
- source_word: λαλησάτω
  english_pob_choice: let ... speak
  chosen_spanish: hable
  alternatives_spanish:
  - que hable
  - déjese hablar
  lexicon: LSJ
  rationale: El tercer singular imperativo de λαλέω expresa permiso o petición. En español, «que ... hable» o simplemente «hable» comunica bien esa petición; se elige una forma breve y reverente.
- source_word: ἡ παιδίσκη σου
  english_pob_choice: your servant girl
  chosen_spanish: tu sirvienta
  alternatives_spanish:
  - tu criada
  - tu muchacha
  - tu esclavita
  lexicon: LSJ
  rationale: παιδίσκη puede ser una muchacha/servidora joven. «Sirvienta» mantiene el registro humilde y femenino sin sonar excesivamente arcaico; aunque el inglés POB usa un término distinto, en español conviene evitar un giro redundante junto a «esclava».
- source_word: κατὰ πρόσωπόν σου
  english_pob_choice: before you
  chosen_spanish: delante de ti
  alternatives_spanish:
  - en tu presencia
  - ante ti
  - a tu vista
  lexicon: LSJ
  rationale: La locución idiomática expresa hablar en presencia de alguien. «Delante de ti» es natural y fiel al valor espacial-relacional del griego.
- source_word: οὐκ ἀναγγελῶ
  english_pob_choice: I will not tell
  chosen_spanish: no diré
  alternatives_spanish:
  - no anunciaré
  - no comunicaré
  - no contaré
  lexicon: LSJ
  rationale: ἀναγγέλλω puede significar declarar, anunciar o comunicar. Unido a ψεῦδος, en español resulta más natural «no diré» que una construcción más técnica como «no anunciaré».
- source_word: ψεῦδος
  english_pob_choice: a lie
  chosen_spanish: mentira
  alternatives_spanish:
  - falsedad
  - engaño
  - algo falso
  lexicon: LSJ
  rationale: ψεῦδος denota falsedad o mentira. «Mentira» es la equivalencia más directa y clara en esta confesión solemne.
- source_word: τῷ κυρίῳ μου
  english_pob_choice: my lord
  chosen_spanish: mi señor
  alternatives_spanish:
  - mi señor
  - mi amo
  lexicon: LSJ
  rationale: Aquí κύριος se refiere a un superior humano, no a Dios. «Mi señor» transmite cortesía y subordinación sin adoptar una formulación eclesiástica.
- source_word: ἐν τῇ νυκτὶ ταύτῃ
  english_pob_choice: this night
  chosen_spanish: esta noche
  alternatives_spanish:
  - en esta noche
  - hoy por la noche
  lexicon: LSJ
  rationale: La expresión temporal se vierte con la locución natural y sobria «esta noche».
theological_decisions:
- issue: 'Distinción entre dos autodesignaciones humildes de Judith: δοῦλη y παιδίσκη'
  english_pob_reading: The English POB distinguishes 'your slave' and 'your servant girl' to preserve the Greek rhetoric of self-humbling.
  chosen_spanish_reading: «tu esclava» y «tu sirvienta»
  alternative_spanish_readings:
  - «tu esclava» y «tu criada»
  - «tu servidora» y «tu muchacha»
  rationale: El griego usa dos términos distintos para reforzar la deferencia de Judith. En español conviene mantener la diferencia, pero sin volver el verso torpe. «Esclava» preserva el valor fuerte de δοῦλη; «sirvienta» conserva la segunda autodesignación femenina y subordinada de παιδίσκη.
  doctrine_reference: 'DOCTRINE.md: términos de esclavitud/servicio; mantener la fuerza léxica cuando el contexto de humillación es explícito'
- issue: κύριος aplicado a un superior humano
  english_pob_reading: The English POB uses 'my lord' because the referent is a human superior, not God.
  chosen_spanish_reading: «mi señor»
  alternative_spanish_readings:
  - «mi amo»
  - «mi señor»
  rationale: Como el referente es Holofernes, un superior humano, no corresponde capitalizar ni usar un término reservado para Yahvé. «Mi señor» conserva el trato reverente y la ambigüedad cortesana sin teologizar el vocablo.
  doctrine_reference: 'DOCTRINE.md: κύριος como «Lord» por defecto, con excepción contextual para seres humanos'
translation_notes:
  revision_awareness: El antecedente inglés pasó por una revisión que osciló entre 'slave' y 'servant' para δοῦλη, y entre 'maidservant' y 'servant girl' para παιδίσκη, además de ajustar 'report a lie' a 'tell a lie'. La presente redacción española sigue el principio final de conservar la fuerza de estatus de δοῦλη y preservar la naturalidad del verbo con ψεῦδος, manteniendo la distinción de los dos términos humildes sin copiar mecánicamente el último estado del inglés.
  spanish_consistency_notes:
  - Se preserva la distinción léxica entre δοῦλη y παιδίσκη mediante dos términos femeninos de subordinación.
  - Se evita usar «Señor» con mayúscula para κύριος porque aquí no se refiere a Dios.
  - «Mentira» se prefiere sobre una traducción más abstracta de ψεῦδος por claridad y fidelidad.
  - La puntuación de comillas y el uso de dos puntos siguen un estilo bíblico moderno y legible en español.
