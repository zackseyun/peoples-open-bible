base_translation:
  language: en
  yaml_path: translation/ot/psalms/141/005.yaml
  text: Let a righteous man strike me—it is a kindness[a]; let him rebuke me—it is oil for the head; let my head not refuse it[d][c][b]. For still my prayer is against their evils.
  footnotes:
  - marker: a
    text: Or, 'Let a righteous man strike me in faithful love,' with חֶסֶד taken more strongly as covenantal loyalty or mercy.
    reason: lexical_alternative
  - marker: b
    text: 'Hebrew is difficult: ''let my head not refuse it'' may also be understood along the lines of ''let not my head reject/decline it.'''
    reason: lexical_alternative
  - marker: c
    text: The final clause is uncertain. It may also mean, 'for still my prayer is in their calamities,' or 'for even then my prayer is for them in their troubles.'
    reason: alternative_reading
  - marker: d
    text: Or 'it is kindness'.
    reason: previous_rendering
