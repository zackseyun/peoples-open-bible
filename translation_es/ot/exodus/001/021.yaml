  spanish_quality_summary: El español es natural y claro, pero la nota actual duplica el texto principal en vez de preservar la alternativa correcta. «Hogares» o «familias» comunica mejor el sentido idiomático en español; «hogares» conserva además cercanía con la metáfora de «casa».
  glossary_alignment: 'No hay conflicto con la terminología base del proyecto: «Dios» y «temieron» están bien. La principal desalineación es semántica/lexical respecto de בָּתִּים y la decisión documentada de priorizar «households».'
