translation:
  language: es
  text: Así David se quedó con Aquis en Gat[a], él y sus hombres, cada hombre con su familia[b]; David con sus dos esposas, Ahinoam la jezreelita y Abigail, la esposa de Nabal la carmelita.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «vivió con Aquis en Gat». El verbo hebreo puede denotar morar o permanecer por un tiempo.'
    reason: lexical_alternative
  - marker: b
    text: Literalmente, «cada hombre y su casa», una expresión distributiva que significa cada uno con los de su casa.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֵּשֶׁב
  english_pob_choice: stayed
  chosen_spanish: se quedó
  alternatives_spanish:
  - habitó
  - vivió
  - residió
  lexicon: HALOT
  rationale: El verbo hebreo puede significar sentarse, morar, permanecer o quedarse. En este contexto narrativo indica una estancia con Aquis en Gat por un tiempo; 'se quedó' comunica esa permanencia temporal de forma natural en español sin afirmar una residencia definitiva.
- source_word: עִם
  english_pob_choice: with
  chosen_spanish: con
  alternatives_spanish:
  - junto con
  - al lado de
  lexicon: HALOT
  rationale: La preposición expresa acompañamiento o asociación; 'con' es la equivalencia más directa y idiomática.
- source_word: בְּגַת
  english_pob_choice: in Gath
  chosen_spanish: en Gat
  alternatives_spanish:
  - en la ciudad de Gat
  - a Gat
  lexicon: HALOT
  rationale: La preposición con nombre de ciudad se traduce naturalmente con 'en' para ubicación.
- source_word: הוּא וַאֲנָשָׁיו
  english_pob_choice: he and his men
  chosen_spanish: él y sus hombres
  alternatives_spanish:
  - él y sus seguidores
  - él y sus guerreros
  lexicon: HALOT
  rationale: אֲנָשָׁיו significa literalmente 'sus hombres'. En el contexto de David puede implicar sus acompañantes armados, pero 'sus hombres' conserva el sentido y el registro narrativo.
- source_word: אִישׁ וּבֵיתוֹ
  english_pob_choice: each man with his household
  chosen_spanish: cada hombre con su casa
  alternatives_spanish:
  - cada hombre con su familia
  - cada uno con los suyos
  lexicon: HALOT
  rationale: La expresión distributiva hebrea está marcada por 'cada hombre'. בַּיִת puede referirse al grupo doméstico o casa; se mantiene 'casa' para conservar la imagen concreta y la amplitud del término, aunque en español puede insinuar 'hogar' o 'familia'.
- source_word: וּשְׁתֵּי נָשָׁיו
  english_pob_choice: with his two wives
  chosen_spanish: con sus dos esposas
  alternatives_spanish:
  - y sus dos esposas
  lexicon: HALOT
  rationale: El hebreo retoma y especifica la casa de David; 'con sus dos esposas' refleja esa aposición explicativa de modo claro y fiel.
- source_word: הַיִּזְרְעֵאלִית
  english_pob_choice: the Jezreelite
  chosen_spanish: la de Jezreel
  alternatives_spanish:
  - la jezreelita
  - la jezreelense
  lexicon: HALOT
  rationale: El gentilicio femenino identifica el origen de Ahinoam. En español 'la de Jezreel' evita un gentilicio poco natural y conserva la referencia geográfica sin sobrecargar el verso.
- source_word: אֵשֶׁת נָבָל
  english_pob_choice: the wife of Nabal
  chosen_spanish: la esposa de Nabal
  alternatives_spanish:
  - la mujer de Nabal
  lexicon: HALOT
  rationale: El constructo significa literalmente 'esposa de Nabal'. 'Esposa' mantiene el tono formal y narrativo; 'mujer de' sería posible, pero menos preciso en este contexto.
- source_word: הַכַּרְמְלִית
  english_pob_choice: the Carmelite
  chosen_spanish: la carmelita
  alternatives_spanish:
  - la de Carmel
  - la carmelitense
  lexicon: HALOT
  rationale: El gentilicio indica procedencia de Carmel, no la orden religiosa posterior. 'La carmelita' es la forma española más natural y fiel en este contexto bíblico.
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión inglesa que prefirió 'the Jezreelite' frente a 'Jezreelitess'; por eso se evitó un gentilicio artificial y se optó por una construcción española natural. No se detectaron otras revisiones que exigieran ajuste adicional.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' para el nombre divino cuando aparezca; aquí no figura.
  - Se conserva un registro narrativo sobrio y bíblico, evitando tanto arcaísmos excesivos como paráfrasis libres.
  - '''Casa'' se usa en sentido de unidad doméstica, coherente con el hebreo בַּיִת en esta expresión distributiva.'
