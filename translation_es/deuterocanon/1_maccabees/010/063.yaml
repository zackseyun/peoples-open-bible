  glossary_alignment: No hay términos teológicos o glosario de proyecto especialmente implicados aquí. Las decisiones léxicas principales están bien alineadas con el expediente inglés, salvo la elección de 'palabra' para λόγος, que debe ajustarse al valor contextual de 'motivo/causa/asunto'.
