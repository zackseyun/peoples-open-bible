translation:
  language: es
  text: Y le dio a su criada un pellejo de vino y un frasco de aceite, y llenó una bolsa con harina de cebada y tortas de higos prensados y panes puros[a]; luego envolvió todos sus recipientes y los colocó sobre ella.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: También podría entenderse como 'panes ritualmente puros'. El griego puede insinuar comida preparada conforme a preocupaciones de pureza.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἅβρᾳ
  english_pob_choice: maid
  chosen_spanish: criada
  alternatives_spanish:
  - sirvienta
  - doncella
  - sierva
  lexicon: LSJ
  rationale: El contexto narrativo presenta a la asistente femenina de Judit; 'criada' es natural en español, comunica función doméstica/asistencial y evita cargar el término con una noción más fuerte de esclavitud que el griego no exige aquí.
- source_word: ἀσκοπυτίνην οἶνον
  english_pob_choice: a skin of wine
  chosen_spanish: un pellejo de vino
  alternatives_spanish:
  - un odre de vino
  - vino en un pellejo
  lexicon: LSJ
  rationale: '''Pellejo'' conserva la imagen del recipiente de cuero y suena idiomático en español bíblico moderno. ''Odre'' también es posible, pero ''pellejo'' refleja bien el contenedor sin volverlo demasiado técnico.'
- source_word: καψάκην ἐλαίου
  english_pob_choice: a flask of oil
  chosen_spanish: un frasco de aceite
  alternatives_spanish:
  - un pequeño recipiente de aceite
  - una jarra de aceite
  lexicon: LSJ
  rationale: El diminutivo griego sugiere un recipiente pequeño y portátil. 'Frasco' comunica bien ese matiz en español contemporáneo y mantiene la sencillez del texto.
- source_word: πῆραν
  english_pob_choice: a bag
  chosen_spanish: una bolsa
  alternatives_spanish:
  - un zurrón
  - una alforja
  - una bolsa de provisiones
  lexicon: LSJ
  rationale: '''Bolsa'' es la forma más clara y natural hoy; ''zurrón'' o ''alforja'' serían más regionales o más marcados. El contexto de provisiones permite esta equivalencia general.'
- source_word: ἀλφίτων
  english_pob_choice: barley meal
  chosen_spanish: harina de cebada
  alternatives_spanish:
  - sémola de cebada
  - grano molido de cebada
  - gachas de cebada
  lexicon: LSJ
  rationale: Sigo la corrección del audit trail inglés que ajusta el sentido a harina/meal, no a grano entero. 'Harina de cebada' es la manera más transparente y comprensible de expresar ese alimento preparado.
- source_word: παλάθης
  english_pob_choice: cakes of pressed figs
  chosen_spanish: tortas de higos prensados
  alternatives_spanish:
  - pasteles de higos prensados
  - tortas de higos
  - figas prensadas
  lexicon: LSJ
  rationale: La expresión española reproduce la idea de un alimento compactado a base de higos. 'Tortas' suena natural y suficientemente amplio para el producto alimenticio descrito.
- source_word: ἄρτων καθαρῶν
  english_pob_choice: clean loaves
  chosen_spanish: panes limpios[a]
  alternatives_spanish:
  - panes puros
  - panes ritualmente puros
  - panes puros rituales
  lexicon: LSJ
  rationale: '''Limpios'' conserva la apertura del inglés POB y no fuerza de entrada una lectura técnica. En español, la frase puede sugerir pureza ritual o alimento adecuado/preparado con cuidado, y por eso se mantiene la ambigüedad documentada.'
- source_word: περιεδίπλωσε
  english_pob_choice: wrapped up
  chosen_spanish: envolvió
  alternatives_spanish:
  - empaquetó
  - recogió
  - envolvió cuidadosamente
  lexicon: LSJ
  rationale: '''Envolvió'' es el equivalente directo y natural en español para la acción de doblar o cubrir los objetos de viaje.'
- source_word: τὰ ἄγγη αὐτῆς
  english_pob_choice: her vessels
  chosen_spanish: sus recipientes
  alternatives_spanish:
  - sus vasijas
  - sus envases
  - sus utensilios
  lexicon: LSJ
  rationale: '''Recipientes'' es más claro para lectores modernos que ''vasijas'', y conserva el sentido amplio del término griego sin especificar material ni forma.'
- source_word: ἐπέθηκε αὐτῇ
  english_pob_choice: placed them on her
  chosen_spanish: se los puso encima
  alternatives_spanish:
  - los puso sobre ella
  - los cargó sobre ella
  - se los colocó encima
  lexicon: LSJ
  rationale: El español requiere resolver claramente el dativo/pronombre; 'se los puso encima' transmite que colocó los objetos sobre la criada sin añadir detalles no presentes como hombros o espalda.
theological_decisions:
- issue: Sentido de ἄρτων καθαρῶν
  english_pob_reading: clean loaves
  chosen_spanish_reading: panes limpios
  alternative_spanish_readings:
  - panes puros
  - panes ritualmente puros
  - panes de pureza ritual
  rationale: El griego puede apuntar a pureza ritual o a alimento preparado en conformidad con una norma de limpieza. Mantener 'limpios' preserva esa tensión sin cerrarla prematuramente, en línea con el POB inglés.
  doctrine_reference: Translation philosophy §§1, 3, 6
- issue: Relación entre los recipientes y la criada en ἐπέθηκε αὐτῇ
  english_pob_reading: placed them on her
  chosen_spanish_reading: se los puso encima
  alternative_spanish_readings:
  - los puso sobre ella
  - los cargó sobre ella
  rationale: La construcción española debe dejar claro que los objetos fueron puestos sobre la asistente. Se evita añadir una localización anatómica específica, porque el texto no la da y la precisión excedería la evidencia.
  doctrine_reference: Translation philosophy §§1, 2
translation_notes:
  revision_awareness: Tomé en cuenta la última revisión inglesa que corrigió ἀλφίτων de 'roasted grain' a 'barley meal'; por eso traduje ese elemento como 'harina de cebada'. Conservé la nota de ambigüedad sobre ἄρτων καθαρῶν, ya que el audit trail inglés mantiene abierta la lectura de pureza ritual. También resolví el cierre de la frase con una forma española natural ('se los puso encima') para reflejar fielmente el dativo final sin sobreespecificarlo.
  spanish_consistency_notes:
  - Mantengo 'Yahvé' solo cuando el texto lo exija; aquí no aparece.
  - Uso 'criada' para ἅβρᾳ, coherente con un tono narrativo sobrio y no esclavizante.
  - '''Panes limpios'' conserva la ambigüedad ritual documentada por el POB inglés.'
  - He preferido vocabulario general y transparente ('pellejo', 'frasco', 'bolsa', 'recipientes') para que el versículo sea legible en español moderno sin perder el color del original.
