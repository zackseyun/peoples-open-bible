revisions:
- from: 'Mientras aún estaba hablando con ellos[a], he aquí, el mensajero descendía hacia él y dijo: «He aquí, este mal viene de Yahvé. ¿Por qué habría de esperar todavía a Yahvé?»'
  to: 'Mientras aún estaba hablando con ellos, he aquí, el mensajero bajó adonde él y dijo: «He aquí, este mal viene de Yahvé. ¿Por qué habría de seguir esperando a Yahvé[a]?»'
  rationale: Se revisa mínimamente para mejorar la naturalidad del español narrativo y para preservar con más fidelidad la alternativa léxica de יחל documentada en la auditoría inglesa. Se mantiene «Yahvé», «mensajero», «he aquí» y «este mal», que están bien alineados con fuente y proyecto.
