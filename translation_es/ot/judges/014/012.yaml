revisions:
- from: 'Y Sansón les dijo: «Por favor, les propongo[a] un enigma. Si me lo dicen[b] dentro de los siete días del banquete, y lo descubren[c], entonces yo les daré treinta prendas de lino y treinta mudas de ropa».'
  to: 'Y Sansón les dijo: «Por favor, voy a plantearles[a] un acertijo. Si de veras me lo dicen dentro de los siete días del banquete, y lo resuelven[b], entonces yo les daré treinta prendas de lino y treinta mudas de ropa[c]».'
  rationale: 'Se ajustó el texto para reflejar mejor el sentido contextual del hebreo y la auditoría POB: «acertijo» en vez de «enigma», «lo resuelven» en vez de «lo descubren», una formulación más natural para la propuesta cortés de Sansón, y la conservación de la nota cultural sobre la incertidumbre de las prendas.'
