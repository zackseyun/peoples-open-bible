review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la secuencia narrativa básica del hebreo: después de la partida de los otros, ellos salieron del pozo, fueron a informar al rey David y le urgieron a cruzar el agua con rapidez porque Ahitofel había aconsejado contra él/ellos. Sin embargo, hay dos desajustes importantes con la fuente: (1) los imperativos hebreos קוּמוּ / וְעִבְרוּ son plurales, pero el español los singulariza (''Levántate y cruza''); (2) הַמַּיִם es singular colectivo idiomático en inglés auditado (''the water'') y en contexto apunta al Jordán; ''las aguas'' no es imposible, pero aquí suena menos preciso y se aparta de la decisión auditada. Además, la nota [a] está mal anclada y no corresponde al lugar de la ambigüedad documentada.'
  spanish_quality_summary: El texto es generalmente legible, pero 'fueron y lo dieron a conocer' suena algo pesado y además el pronombre 'lo' no tiene antecedente claro. 'Se lo dijeron al rey David' o 'informaron al rey David' es más natural. La mezcla de destinatario singular ('Levántate', 'cruza') con complemento plural ('contra ustedes') crea incoherencia interna. También conviene evitar la nota [a] sobre 'se fueron', porque no corresponde al dato lexical discutido en el expediente inglés.
  glossary_alignment: 'No hay problemas de glosario teológico mayor. El nombre ''Ahitofel'' es adecuado. La mayor desviación es sintáctica/semántica: deben mantenerse los imperativos en plural. También conviene seguir más de cerca la decisión POB para וַיַּגִּדוּ con un verbo simple y natural (''dijeron'' / ''informaron'') en vez de la perífrasis ''lo dieron a conocer''.'
  issues:
  - severity: high
    issue: Los imperativos hebreos plurales fueron cambiados a singular ('Levántate y cruza').
    rationale: קוּמוּ y וְעִבְרוּ son 2mp; el texto exhorta a David y a su grupo. Singularizarlo altera el referente gramatical y además choca con 'contra ustedes'.
  - severity: high
    issue: La nota [a] está colocada sobre 'se fueron', pero el expediente inglés sitúa la alternativa léxica en la cláusula final sobre el consejo de Ahitofel.
    rationale: La nota actual introduce una explicación ajena al segmento anotado y confunde al lector. Debe eliminarse o reubicarse correctamente; en este caso, no hace falta mantenerla porque la alternativa inglesa además parece estar desalineada.
  - severity: medium
    issue: '''Lo dieron a conocer al rey David'' suena menos natural y tiene antecedente pronominal difuso.'
    rationale: וַיַּגִּדוּ significa 'dijeron / informaron / reportaron'. En español narrativo bíblico moderno, 'se lo dijeron al rey David' o 'informaron al rey David' transmite mejor la acción.
  - severity: medium
    issue: '''Las aguas'' se aparta de la decisión auditada y suena menos preciso en este contexto.'
    rationale: אֶת־הַמַּיִם se refiere a cruzar el agua, probablemente el Jordán. 'El agua' o mejor 'el río' con nota podría aclarar, pero para seguir el expediente conviene 'el agua' con la nota contextual.
