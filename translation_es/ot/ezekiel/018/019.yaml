  to: 'Sin embargo, ustedes dicen[a]: “¿Por qué el hijo no lleva la iniquidad del padre?” Porque el hijo ha hecho justicia y rectitud, ha guardado todos mis estatutos y los ha puesto por obra; ciertamente vivirá.'
  rationale: Se conserva el borrador casi por completo, pero se cambia 'los ha cumplido' por 'los ha puesto por obra' para reflejar mejor la distinción hebrea entre guardar los estatutos y efectivamente hacerlos, en línea con la decisión auditada del English POB.
