translation:
  language: es
  text: Un hombre que no tiene dominio sobre su espíritu[a] es como una ciudad derribada, sin muralla.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «un hombre que no tiene control sobre su temperamento» o «...sobre sí mismo». El hebreo dice «su espíritu», que puede referirse a la disposición interior o al temperamento.
    reason: lexical_alternative
lexical_decisions:
- source_word: עִיר
  english_pob_choice: city
  chosen_spanish: ciudad
  alternatives_spanish:
  - pueblo
  - villa
  lexicon: HALOT
  rationale: עִיר designa un asentamiento urbano; «ciudad» es el equivalente natural en español y conserva la imagen proverbial de una comunidad defendida.
- source_word: פְּרוּצָה
  english_pob_choice: broken into
  chosen_spanish: abierta
  alternatives_spanish:
  - abierta por una brecha
  - violentada
  - asaltada
  lexicon: HALOT
  rationale: El verbo implica una ruptura o abertura en las defensas. En español, «abierta» comunica la condición resultante de manera clara y directa; las opciones más explícitas sonarían más interpretativas o más marcadas que el hebreo en este dicho breve.
- source_word: אֵין חוֹמָה
  english_pob_choice: without a wall
  chosen_spanish: sin muro
  alternatives_spanish:
  - sin muralla
  - sin pared
  lexicon: HALOT
  rationale: La frase expresa ausencia de defensa. «Sin muro» reproduce bien el contraste imagético y mantiene el paralelismo breve del proverbio; «muralla» sería posible, pero «muro» es más neutro y amplio en español.
- source_word: אִישׁ
  english_pob_choice: a man
  chosen_spanish: un hombre
  alternatives_spanish:
  - una persona
  - uno
  lexicon: HALOT
  rationale: El hebreo usa אִישׁ en forma masculina singular con valor proverbial representativo. Se conserva «un hombre» para reflejar esa forma sin neutralizarla.
- source_word: מַעְצָר
  english_pob_choice: restraint
  chosen_spanish: restricción
  alternatives_spanish:
  - control
  - dominio
  - autocontrol
  lexicon: HALOT
  rationale: El sustantivo denota contención o restricción. «Restricción» conserva el valor de freno/limitación sin añadir explícitamente la idea reflexiva de autocontrol que no está en el sustantivo hebreo.
- source_word: לְרוּחוֹ
  english_pob_choice: over his spirit
  chosen_spanish: sobre su espíritu
  alternatives_spanish:
  - sobre su temperamento
  - sobre sí mismo
  - sobre su aliento
  lexicon: HALOT
  rationale: רוּחַ puede significar espíritu, disposición interior o temperamento. «Espíritu» preserva el término hebreo y su amplitud antropológica; la nota ofrece lecturas interpretativas sin desplazarlas al texto principal.
theological_decisions:
- issue: Lenguaje representativo masculino en el proverbio
  english_pob_reading: a man
  chosen_spanish_reading: un hombre
  alternative_spanish_readings:
  - una persona
  - uno
  rationale: El proverbio emplea אִישׁ en singular masculino como figura representativa. Se mantiene «un hombre» para respetar la forma fuente y la convención del POB de no neutralizar el género cuando el texto original lo presenta así.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4
translation_notes:
  revision_awareness: El audit trail inglés indica alta concordancia y ningún cambio en la última pasada de revisión; esta versión española sigue esa lectura estable, conservando la metáfora de la ciudad vulnerada y la ambigüedad semántica de רוּחַ mediante nota.
  spanish_consistency_notes:
  - Se usó «Yahvé» como norma del proyecto solo cuando corresponda; este versículo no contiene el nombre divino.
  - Se mantuvo «espíritu» en el texto principal por fidelidad al término רוּחַ y se dejó en nota la alternativa interpretativa «temperamento».
  - «Sin muro» conserva la imagen breve del hebreo y evita una expansión excesiva como «sin muralla» o «sin defensa».
