translation:
  language: es
  text: Que me pese en balanzas de justicia,[a] y conozca Dios mi integridad.[b]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «en balanzas justas» o «en balanzas de rectitud».
    reason: lexical_alternative
  - marker: b
    text: O «mi inocencia» o «mi irreprochabilidad»; «integridad» preserva mejor la ambigüedad moral del hebreo.
    reason: lexical_alternative
lexical_decisions:
- source_word: יִשְׁקְלֵנִי
  english_pob_choice: Let him weigh me
  chosen_spanish: Pésenme
  alternatives_spanish:
  - Que me pese
  - Péselo sobre mí
  lexicon: HALOT
  rationale: El imperfecto qal con sufijo de 1cs funciona aquí con valor voluntativo/jussivo en el contexto de la petición de examen. En español, el imperativo/jusivo plural respetuoso «Pésenme» conserva mejor esa fuerza volitiva y la imagen forense que una perífrasis más interpretativa.
- source_word: בְּמֹאזְנֵי צֶדֶק
  english_pob_choice: in righteous scales
  chosen_spanish: en balanzas de justicia
  alternatives_spanish:
  - en balanzas justas
  - en balanzas rectas
  - en balanzas de rectitud
  lexicon: HALOT
  rationale: מוֹאזְנַיִם significa «balanzas» o «pesas». צֶדֶק puede expresar justicia, rectitud o equidad en este contexto comercial-jurídico. «Balanzas de justicia» mantiene el color literal y comunica naturalmente la idea de balanzas justas sin perder el sustantivo abstracto del hebreo.
- source_word: וְיֵדַע
  english_pob_choice: and let God know
  chosen_spanish: y conozca
  alternatives_spanish:
  - y sepa
  - y que conozca
  lexicon: HALOT
  rationale: El waw más el imperfecto continúa la fuerza voluntativa del primer verbo. «Y conozca» preserva esa continuidad en español sin introducir un futuro menos preciso.
- source_word: אֱלוֹהַּ
  english_pob_choice: God
  chosen_spanish: Dios
  alternatives_spanish:
  - Dios poderoso
  - el Dios
  lexicon: HALOT
  rationale: אֱלוֹהַּ es la forma poética singular «Dios» frecuente en Job. No hay en este verso una razón textual para expandirlo; «Dios» es la opción natural y fiel.
- source_word: תֻּמָּתִי
  english_pob_choice: my integrity
  chosen_spanish: mi integridad
  alternatives_spanish:
  - mi blamelessness
  - mi inocencia
  lexicon: HALOT
  rationale: תֻּמָּה denota integridad, completitud o irreprochabilidad. «Integridad» refleja bien la autodefensa moral de Job sin resolver la tensión teológica hacia una afirmación absoluta de sin pecado. Es la forma más clara y fiel en español.
theological_decisions:
- issue: Fuerza moral de la autoafirmación de Job
  english_pob_reading: my integrity
  chosen_spanish_reading: mi integridad
  alternative_spanish_readings:
  - mi inocencia
  - mi blamelessness
  rationale: El verso pide una evaluación justa delante de Dios; no conviene convertirlo en una proclamación doctrinal de impecabilidad. «Mi integridad» preserva la tensión literaria y teológica del texto, igual que el audit trail inglés.
  doctrine_reference: Translation philosophy §3 (preserve theological tension rather than resolve it)
- issue: Imagen forense de las balanzas
  english_pob_reading: righteous scales
  chosen_spanish_reading: balanzas de justicia
  alternative_spanish_readings:
  - balanzas justas
  - balanzas de rectitud
  rationale: La imagen es judicial/comercial y debe conservarse como metáfora de evaluación imparcial. «De justicia» expresa bien צֶדֶק y evita domesticar el lenguaje a una mera idea abstracta de honestidad.
  doctrine_reference: Lexical fidelity in wisdom literature; preserve metaphor where warranted
translation_notes:
  revision_awareness: La versión inglesa revisada cambió «honest scales» por «righteous scales» para reflejar más directamente צֶדֶק. En español, «balanzas de justicia» sigue esa revisión, conserva el registro formal y mantiene la metáfora forense sin sonar artificial. También se conservó el paralelo volitivo de ambos verbos, evitando convertirlos en simples futuros.
  spanish_consistency_notes:
  - Se mantiene «Dios» para אֱלוֹהַּ, conforme al estándar del proyecto cuando el contexto no exige expansión.
  - Se evitó «Señor» y cualquier sustitución litúrgica para no ocultar el término hebreo.
  - Se eligió «integridad» sobre «inocencia» para no eliminar la tensión reconocida por el audit trail inglés.
  - Se usó «balanzas de justicia» como equivalente idiomático y fiel de «righteous scales», preservando la metáfora y la referencia a צֶדֶק.
