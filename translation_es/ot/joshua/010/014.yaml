revisions:
- from: Y no hubo día como aquel, ni antes de él ni después de él[a], al escuchar Yahvé la voz de un hombre, porque Yahvé peleaba por Israel.
  to: Y no hubo día como aquel, ni antes de él ni después de él[a], cuando Yahvé escuchó la voz de un hombre, porque Yahvé peleó por Israel.
  rationale: Se ajusta la cláusula de לִשְׁמֹעַ יְהוָה a una forma española más natural y más cercana a la decisión principal auditada (‘cuando Yahvé escuchó’), dejando en nota la alternativa interpretativa ‘atendió la petición’. También se cambia ‘peleaba’ por ‘peleó’ para reflejar mejor el valor narrativo resumitivo del hebreo y del inglés POB. Se conserva ‘Yahvé’ y la referencia pronominal al ‘día’.
