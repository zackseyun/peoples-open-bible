revisions:
- from: El que anda en integridad será librado[a], pero el torcido en sus caminos caerá en un solo momento[b].
  to: El que anda en integridad será librado[a], pero el torcido en sus caminos caerá de inmediato[b].
  rationale: Se mantiene la fidelidad general del borrador, pero se corrige la expresión final para reflejar mejor el hebreo בְאֶחָת y la revisión inglesa auditada 'at once' sin intensificación innecesaria. 'De inmediato' es más natural en español y deja la explicación más literal o debatida en la nota.
