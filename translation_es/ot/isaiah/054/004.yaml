translation:
  language: es
  text: No temas[a], porque no serás avergonzada[b]; y no seas humillada, porque no serás deshonrada. Porque olvidarás la vergüenza de tu juventud, y no recordarás más el oprobio de tu viudez.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «No tengas miedo».'
    reason: lexical_alternative
  - marker: b
    text: 'O: «no serás avergonzada». El hebreo de este versículo superpone varios verbos de vergüenza y deshonra, subrayando el fin de la afrenta pública de Sion.'
    reason: lexical_alternative
lexical_decisions:
- source_word: אַל תִּירְאִי
  english_pob_choice: Do not fear
  chosen_spanish: No temas
  alternatives_spanish:
  - No tengas miedo
  - No te asustes
  lexicon: HALOT
  rationale: El imperativo negativo en segunda persona femenina singular pide una prohibición directa y natural en español. «Temas» conserva la fuerza breve de «Do not fear» sin volverlo explicativo.
- source_word: תֵבֹשִׁי
  english_pob_choice: you will not be put to shame
  chosen_spanish: no serás avergonzada
  alternatives_spanish:
  - no serás puesta en vergüenza
  - no te avergonzarás
  lexicon: HALOT
  rationale: בושׁ expresa vergüenza pública o deshonra resultante. «No serás avergonzada» mantiene esa pasividad/resultante mejor que un simple estado interior.
- source_word: תִּכָּלְמִי
  english_pob_choice: do not be humiliated
  chosen_spanish: no te humilles
  alternatives_spanish:
  - no seas humillada
  - no te deshonres
  lexicon: HALOT
  rationale: 'El paralelo exige distinguir este verbo del anterior. En español, «humillarte» puede funcionar como pasivo/medio y conserva la diferencia semántica sin perder naturalidad, aunque también deja oír una tensión: la forma verbal puede sonar reflexiva mientras el hebreo apunta a padecer humillación.'
- source_word: תַחְפִּירִי
  english_pob_choice: you will not be disgraced
  chosen_spanish: no serás deshonrada
  alternatives_spanish:
  - no serás avergonzada
  - no quedarás en vergüenza
  lexicon: HALOT
  rationale: חפר en este contexto señala deshonra o quedar en vergüenza. «Deshonrada» preserva el movimiento de degradación social y evita repetir exactamente la misma solución de בושׁ.
- source_word: בֹשֶׁת עֲלוּמַיִךְ
  english_pob_choice: the shame of your youth
  chosen_spanish: la vergüenza de tu juventud
  alternatives_spanish:
  - el oprobio de tu juventud
  - la deshonra de tu juventud
  lexicon: HALOT
  rationale: עֲלוּמִים se refiere a la juventud/los años jóvenes. «Vergüenza de tu juventud» es claro y fiel al alcance semántico; mantiene el valor social de la vergüenza sin interpretar el sintagma.
- source_word: תִּשְׁכָּחִי
  english_pob_choice: you will forget
  chosen_spanish: olvidarás
  alternatives_spanish:
  - dejarás de recordar
  - no te acordarás más
  lexicon: HALOT
  rationale: El futuro simple en español reproduce bien la promesa de cese memorial. No se necesita una perífrasis más pesada.
- source_word: חֶרְפַּת אַלְמְנוּתַיִךְ
  english_pob_choice: the reproach of your widowhood
  chosen_spanish: el oprobio de tu viudez
  alternatives_spanish:
  - la vergüenza de tu viudez
  - el reproche de tu viudez
  lexicon: HALOT
  rationale: חֶרְפָּה abarca reproche, escarnio u oprobio. «Oprobio» conserva la carga de afrenta pública y encaja con el paralelismo de deshonra. «Viudez» preserva la metáfora matrimonial sin suavizarla.
- source_word: לֹא תִזְכְּרִי עוֹד
  english_pob_choice: you will remember ... no more
  chosen_spanish: no recordarás más
  alternatives_spanish:
  - ya no recordarás
  - no volverás a recordar
  lexicon: HALOT
  rationale: La construcción expresa cese definitivo. «No recordarás más» mantiene la cadencia profética y el valor de עוֹד como continuidad interrumpida.
theological_decisions:
- issue: Referente femenino singular de Sion/Jerusalén personificada
  english_pob_reading: The verse addresses Zion/Jerusalem personified as a woman.
  chosen_spanish_reading: El texto se dirige a Sion/Jerusalén personificada como mujer.
  alternative_spanish_readings:
  - una mujer individual
  - una comunidad femenina literal
  rationale: La personificación es estructural en el contexto de Isaías 54 y queda conservada en la segunda persona femenina singular sin explicitarla en el cuerpo del verso.
  doctrine_reference: Contexto inmediato de Isaías 54; personificación profética
- issue: Metáfora matrimonial en 'viudez'
  english_pob_reading: Retain the metaphor literally as 'widowhood' rather than interpret it away.
  chosen_spanish_reading: Conservar literalmente la metáfora como «viudez».
  alternative_spanish_readings:
  - abandono
  - desolación
  rationale: La viudez es parte del lenguaje profético de ruptura y restauración; traducirla literalmente preserva la tensión teológica y narrativa del pasaje.
  doctrine_reference: Poética profética y metáfora de pacto matrimonial
translation_notes:
  revision_awareness: 'Coincide con la última revisión: no se registran cambios aplicados; el texto mantiene la equivalencia óptima y conserva el paralelismo de vergüenza/deshonra sin resolverlo demasiado.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma del proyecto, pero este versículo no contiene el nombre divino.
  - Se conserva la segunda persona femenina singular en todo el verso para reflejar el hebreo.
  - 'Se diferencia la serie de términos de vergüenza con soluciones cercanas pero no idénticas: avergonzada / humilles / deshonrada / vergüenza / oprobio.'
  - «Viudez» se preserva literalmente para mantener la metáfora matrimonial-covenantal.
