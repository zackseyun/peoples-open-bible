translation:
  text: And Esther the queen fled to the Lord[a], seized by a struggle of death[b],
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'took refuge in the Lord.' The Greek verb can denote fleeing to someone for refuge.
    reason: lexical_alternative
  - marker: b
    text: Or 'gripped by a mortal struggle' or 'in agony of death.' The Greek expression combines the ideas of struggle and impending death.
    reason: lexical_alternative
lexical_decisions:
- source_word: κατέφυγεν
  chosen: fled to
  alternatives:
  - took refuge in
  - resorted to
  lexicon: BDAG
  rationale: The verb commonly means to flee for refuge. With ἐπὶ τὸν κύριον, the sense is not mere physical flight but turning for refuge to the Lord. 'Fled to' preserves the vividness of the Greek while remaining natural English; 'took refuge in' is possible but slightly smoother than the source's force.
- source_word: κύριον
  chosen: Lord
  alternatives:
  - the LORD
  - Master
  lexicon: BDAG
  rationale: Per project doctrine, κύριος defaults to 'Lord.' In this prayer context it refers to God, but the Greek has κύριον, not an explicit tetragrammaton equivalent, so 'Lord' is preferred over 'the LORD'.
- source_word: ἐν ἀγῶνι
  chosen: by a struggle
  alternatives:
  - in anguish
  - in agony
  - in a contest/struggle
  lexicon: LSJ
  rationale: ἀγών denotes struggle, contest, or severe conflict. In context of mortal peril, it carries the sense of intense inner and existential struggle. 'By a struggle' reflects its concrete force while fitting the participial phrase that follows. 'In anguish' captures effect but loses the underlying struggle imagery.
- source_word: θανάτου
  chosen: of death
  alternatives:
  - unto death
  - mortal
  - deadly
  lexicon: BDAG
  rationale: 'The genitive is best kept fairly literal here: Esther is in a death-struggle, i.e., a struggle bound up with impending death. ''Of death'' preserves the compact Greek expression and avoids over-interpreting the exact nuance.'
- source_word: κατειλημμένη
  chosen: seized by
  alternatives:
  - overtaken by
  - gripped by
  - being in the grip of
  lexicon: BDAG
  rationale: The participle conveys being overtaken or seized by a condition. 'Seized by' is vivid and concise, matching the Greek's passive sense and the intensity of Esther's situation.
