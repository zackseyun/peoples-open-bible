translation:
  language: es
  text: Y cuando terminaron su canto de lamentación profundamente doloroso, retomaron el canto de sus padres[a], alabando a Dios, el salvador de Israel y hacedor de maravillas; y, habiendo desechado todo clamor de dolor y lamento, formaron danzas[b] como señal de pacífica alegría.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O ‘su canto ancestral’. El adjetivo πάτριον denota lo que pertenece a los padres o a la tradición heredada.
    reason: lexical_alternative
  - marker: b
    text: O ‘organizaron coros’. El griego χοροὺς puede referirse a grupos que danzan o a coros; aquí el contexto favorece la danza festiva.
    reason: lexical_alternative
lexical_decisions:
- source_word: καταλήξαντες
  english_pob_choice: when they had ended
  chosen_spanish: cuando terminaron
  alternatives_spanish:
  - habiendo terminado
  - después de terminar
  lexicon: LSJ
  rationale: El participio aoristo marca una acción anterior a la principal; en español, 'cuando terminaron' conserva bien la secuencia temporal y suena natural en registro bíblico actual.
- source_word: θρήνων πανόδυρτον μέλος
  english_pob_choice: their utterly mournful song of lamentation
  chosen_spanish: su canto de lamento sumamente doliente
  alternatives_spanish:
  - su canto totalmente lamentoso
  - su lamento enteramente doloroso
  lexicon: LSJ
  rationale: Se conserva la imagen de 'canto' para μέλος y la intensidad de πανόδυρτον con 'sumamente doliente', evitando aplanar la expresión a un mero 'lamento'.
- source_word: ἀνέλαβον
  english_pob_choice: they took up
  chosen_spanish: tomaron
  alternatives_spanish:
  - retomaron
  - alzaron
  lexicon: LSJ
  rationale: En contexto de canto, 'tomaron' reproduce con sobriedad el giro idiomático de empezar o reanudar un canto sin forzar una expresión ajena al español.
- source_word: ᾠδὴν πάτριον
  english_pob_choice: the song of their fathers
  chosen_spanish: el canto de sus padres
  alternatives_spanish:
  - su canto ancestral
  - el canto heredado de sus padres
  lexicon: LSJ
  rationale: '''De sus padres'' preserva el sentido de lo ancestral/tradicional que el audit trail inglés decidió destacar, sin perder la referencia histórica y familiar de πάτριον.'
- source_word: σωτῆρα
  english_pob_choice: savior
  chosen_spanish: salvador
  alternatives_spanish:
  - libertador
  lexicon: BDAG
  rationale: '''Salvador'' es la equivalencia directa y natural para σωτήρ en una doxología; mantiene el tono de alabanza sin introducir una paráfrasis interpretativa.'
- source_word: τερατοποιὸν
  english_pob_choice: worker of wonders
  chosen_spanish: hacedor de maravillas
  alternatives_spanish:
  - obrador de prodigios
  - hacedor de prodigios
  lexicon: LSJ
  rationale: El compuesto nombra a quien realiza maravillas; 'hacedor de maravillas' comunica con claridad el valor de agente sin sonar excesivamente técnico.
- source_word: αἰνοῦντες
  english_pob_choice: praising
  chosen_spanish: alabando
  alternatives_spanish:
  - loando
  - exaltando
  lexicon: BDAG
  rationale: '''Alabando'' es el verbo doxológico más natural y transparente en español para αἰνοῦντες.'
- source_word: οἰμωγὴν δὲ πᾶσαν καὶ κωκυτὸν
  english_pob_choice: every cry of grief and wailing
  chosen_spanish: todo clamor de dolor y de lamento
  alternatives_spanish:
  - todo gemido y llanto
  - todo grito de pena y de duelo
  lexicon: LSJ
  rationale: La pareja léxica expresa manifestaciones audibles de aflicción; 'clamor de dolor y de lamento' conserva el paralelismo y la fuerza emocional sin exagerar el nivel poético.
- source_word: ἀπωσάμενοι
  english_pob_choice: having cast off
  chosen_spanish: después de apartar de sí
  alternatives_spanish:
  - habiendo rechazado
  - tras desechar
  lexicon: LSJ
  rationale: El medio sugiere apartar/rechazar decididamente; 'apartar de sí' expresa la renuncia activa al duelo de modo idiomático en español.
- source_word: χοροὺς συνίσταντο
  english_pob_choice: they formed dances
  chosen_spanish: organizaban danzas
  alternatives_spanish:
  - formaban coros
  - establecían coros
  lexicon: LSJ
  rationale: χορός puede ser danza o coro; aquí el contexto festivo favorece 'danzas'. συνίσταντο sugiere dar forma u organizar, de ahí 'organizaban'.
- source_word: εὐφροσύνης εἰρηνικῆς σημεῖον
  english_pob_choice: as a sign of peaceful rejoicing
  chosen_spanish: como señal de gozoso regocijo pacífico
  alternatives_spanish:
  - como señal de alegría pacífica
  - como muestra de júbilo en paz
  lexicon: LSJ
  rationale: 'Se mantienen los tres elementos: señal, gozo/regocijo y paz. ''Gozoso regocijo pacífico'' suena solemne en español y conserva la doble cualidad del sustantivo y su adjetivo.'
theological_decisions:
- issue: Identidad del ‘salvador de Israel y hacedor de maravillas’
  english_pob_reading: These titles refer to God and are rendered directly as praise addressed about him.
  chosen_spanish_reading: Los títulos se refieren a Dios y se traducen directamente como alabanza dirigida sobre él.
  alternative_spanish_readings:
  - podría leerse como una alabanza más general a Dios sin explicitud titulativa
  - podría suavizarse a 'Dios, que salva a Israel y hace maravillas'
  rationale: 'El griego identifica a Dios mediante aposición: ''a Dios, el salvador de Israel y hacedor de maravillas''. La versión española mantiene esa estructura y no introduce una expansión doctrinal ajena.'
  doctrine_reference: 'DOCTRINE.md: Original-language primacy over translation tradition'
translation_notes:
  revision_awareness: 'Se tuvo en cuenta la revisión del texto inglés: la intensidad de πανόδυρτον μέλος se mantuvo con una expresión española natural (''sumamente doliente'') en lugar de una formulación más plana. También se preservó la opción interpretativa de χοροὺς como danzas festivas, coherente con el contexto.'
  spanish_consistency_notes:
  - Se usa 'Dios' para θεόν y no 'Señor', porque el texto griego lo identifica explícitamente como objeto de la alabanza.
  - Se mantiene 'salvador' para σωτῆρα, en línea con el audit trail inglés y con el tono doxológico.
  - Se eligió 'hacedor de maravillas' para τερατοποιὸν, manteniendo el valor de agente activo sin tecnicismos.
  - La frase final conserva la ambigüedad controlada de χοροὺς con una nota, pero el texto principal prioriza 'danzas' por el contexto festivo.
