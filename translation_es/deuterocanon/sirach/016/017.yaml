revisions:
- from: 'No digas: “Estoy oculto[a] de Dios, y desde lo alto, ¿quién se acordará de mí? Entre un pueblo numeroso no seré conocido; ¿y qué es mi alma[b] entre toda la creación, como los confines de los vientos?”'
  to: 'No digas: “Estoy escondido de Dios; y desde lo alto, ¿quién se acordará de mí? Entre un pueblo numeroso no seré conocido; ¿y qué es mi alma entre todos los seres humanos, como los confines de los vientos?[a]”'
  rationale: 'Se corrige el texto principal para seguir el hebreo extante y el dictamen del POB inglés: la referencia principal es a ''todos los seres humanos'', mientras que ''en la creación inmensurable'' queda solo como variante griega en nota. También se reubica la nota en la cláusula correcta y se mejora la naturalidad de la primera frase en español.'
  reviewer_model: gpt-5.4
