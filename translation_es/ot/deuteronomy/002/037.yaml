revisions:
- from: Solo no te acercaste a la tierra de los hijos de Amón[a], por todo el lado del torrente Jaboc[b], y las ciudades de la región montañosa, y todo lo que Yahvé nuestro Dios había mandado[c].
  to: Excepto que no te acercaste a la tierra de los hijos de Amón[a], a lo largo de toda la orilla del torrente Jaboc[b], ni a las ciudades de la región montañosa, ni a nada de lo que Yahvé nuestro Dios había mandado[c].
  rationale: Se ajusta la apertura para reflejar mejor la función exceptiva de רַק en español natural; se mejora el modismo geográfico del Jaboc con una expresión más idiomática; y se corrige la coordinación negativa para que la frase final se entienda como continuación de lo que no se debía tocar o acercar, en línea con el contexto y la elipsis hebrea. También se repara la nota c para que sea una alternativa auténtica y no una repetición del texto principal.
