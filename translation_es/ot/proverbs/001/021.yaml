translation:
  language: es
  text: 'En lo más concurrido[a] de las calles ruidosas, ella clama; en las entradas de las puertas[b] de la ciudad dice sus palabras[c]:'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: "en lo más alto de los lugares tumultuosos". La expresión hebrea puede destacar tanto el lugar más prominente como un punto elevado o principal dentro del bullicio público.'
    reason: lexical_alternative
  - marker: b
    text: Las puertas de la ciudad eran los principales lugares públicos de reunión, donde se realizaban el comercio, los asuntos legales y la vida cívica.
    reason: cultural_note
  - marker: c
    text: 'O: "dice sus palabras". El hebreo dice literalmente "dice sus palabras", una expresión idiomática para hablar en público.'
    reason: lexical_alternative
lexical_decisions:
- source_word: בְּ/רֹאשׁ
  english_pob_choice: At the head of
  chosen_spanish: Al comienzo de
  alternatives_spanish:
  - En la cima de
  - En el punto principal de
  - En la parte más visible de
  lexicon: HALOT
  rationale: ראֹשׁ puede indicar cabeza, inicio o lugar prominente. En español, 'Al comienzo de' conserva la idea de punto principal o inicial del espacio público sin sugerir una elevación física que el contexto no exige.
- source_word: הֹמִיּוֹת
  english_pob_choice: the noisy streets
  chosen_spanish: los lugares tumultuosos
  alternatives_spanish:
  - las calles ruidosas
  - los sitios de bullicio
  - las plazas tumultuosas
  lexicon: HALOT
  rationale: El término describe lugares marcados por ruido, agitación o tumulto. 'Lugares tumultuosos' mantiene el carácter público y convulso sin restringir indebidamente el hebreo a 'calles'.
- source_word: תִּקְרָא
  english_pob_choice: she cries out
  chosen_spanish: ella clama
  alternatives_spanish:
  - ella grita
  - ella llama
  - ella proclama
  lexicon: HALOT
  rationale: קרא aquí expresa una llamada fuerte y pública. 'Clama' preserva la fuerza retórica y funciona bien en español literario.
- source_word: בְּ/פִתְחֵי
  english_pob_choice: at the entrances of
  chosen_spanish: a las entradas de
  alternatives_spanish:
  - en las bocas de
  - junto a las entradas de
  - en los accesos de
  lexicon: HALOT
  rationale: פֶּתַח es 'entrada' o 'apertura'. 'A las entradas de' refleja con naturalidad la función locativa del hebreo.
- source_word: שְׁעָרִים
  english_pob_choice: the gates
  chosen_spanish: las puertas
  alternatives_spanish:
  - los portones
  - las puertas de acceso
  - las puertas de la ciudad
  lexicon: HALOT
  rationale: En el español actual, 'puertas de la ciudad' comunica la imagen de los שערים urbanos y sigue siendo claro para lectores eclesiales. En contextos bíblicos, 'puertas' conserva el sentido institucional del hebreo.
- source_word: בָּ/עִיר
  english_pob_choice: in the city
  chosen_spanish: de la ciudad
  alternatives_spanish:
  - en la ciudad
  - dentro de la ciudad
  lexicon: HALOT
  rationale: La construcción hebrea ubica las puertas como pertenecientes a la esfera urbana. 'De la ciudad' integra naturalmente con 'puertas' en español y no añade más de lo que el texto afirma.
- source_word: אֲמָרֶי/הָ
  english_pob_choice: her words
  chosen_spanish: sus palabras
  alternatives_spanish:
  - sus dichos
  - sus expresiones
  - lo que dice
  lexicon: HALOT
  rationale: El plural constructo de אמר con sufijo significa 'sus palabras' o 'sus dichos'. 'Sus palabras' es la opción más directa y natural en español.
- source_word: תֹאמֵר
  english_pob_choice: she speaks
  chosen_spanish: dice
  alternatives_spanish:
  - habla
  - declara
  - expresa
  lexicon: HALOT
  rationale: אמר en este cierre se traduce con un verbo común de habla. 'Dice sus palabras' evita una redundancia dura y conserva el paralelismo con el primer miembro.
theological_decisions:
- issue: Personificación femenina de la Sabiduría
  english_pob_reading: Retain feminine personal language ('she') for Wisdom
  chosen_spanish_reading: Mantener el pronombre femenino 'ella'
  alternative_spanish_readings:
  - usar lenguaje impersonal ('eso clama')
  - neutralizar el sujeto ('clama')
  rationale: El hebreo usa formas femeninas singulares, continuando la personificación de la Sabiduría. Mantener 'ella' respeta la gramática del original y no borra esa figura literaria.
  doctrine_reference: Translation philosophy §4 (gender-accurate over gender-neutral)
translation_notes:
  revision_awareness: Se corrigió la validación anterior asegurando que todos los marcadores de nota aparezcan exactamente en el texto español. El texto mantiene la lectura femenina y el campo semántico de tumulto/puertas/voz pública conforme al hebreo y al audit trail inglés.
  spanish_consistency_notes:
  - Se mantiene 'ella' para la Sabiduría, concordando con las formas verbales femeninas del hebreo.
  - '''Puertas de la ciudad'' conserva el valor institucional de שערים sin introducir terminología eclesiástica.'
  - '''Clama'' y ''dice sus palabras'' preservan el paralelismo entre llamado público y discurso explícito.'
  - Las notas a, b y c están ancladas en el texto exactamente una vez cada una.
