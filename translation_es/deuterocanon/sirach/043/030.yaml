review_pass:
  verdict: revise
  source_alignment_summary: El borrador sigue bien el hebreo breve de מגדלי ה' הרימו קול, בכל תוכלו כי יש עוד y conserva la nota del griego como lectura explicativa alternativa. Sin embargo, 'Como exaltan al Señor' no refleja bien el valor exhortativo/participial documentado por el POB inglés ('As you exalt...') y suena indicativo en español; además, el proyecto español prefiere 'Yahvé' para ה' en el texto principal, y no hay razón suficientemente fuerte aquí para apartarse de esa norma.
  spanish_quality_summary: 'La mayor parte del verso es clara y natural: ''levanten la voz tanto como puedan, porque aún hay más'' funciona bien. El problema principal de legibilidad y sentido está en el inicio ''Como exaltan'', que en español suena extraño y puede leerse causal o comparativamente en vez de exhortativo. ''Al exaltar a Yahvé'' o ''Mientras exaltan a Yahvé'' fluye mejor y conserva el sentido.'
  glossary_alignment: 'Desalineado en el nombre divino: el borrador usa ''el Señor'' pese a la directriz general de usar ''Yahvé'' en el texto principal para ה''/YHWH. El resto de las decisiones léxicas está básicamente alineado con el expediente inglés y con el hebreo.'
  issues:
  - severity: high
    issue: Uso de 'el Señor' en lugar de 'Yahvé' para ה'
    rationale: La política del proyecto en español indica usar 'Yahvé' en el texto principal, no 'SEÑOR' ni 'el Señor' como convención enmascaradora. La justificación del borrador apela al POB inglés, pero el encargo español exige revisar desde la fuente y aplicar la terminología española del proyecto.
  - severity: medium
    issue: '''Como exaltan'' no comunica bien el sentido exhortativo/participial de מגדלי'
    rationale: En español, 'como exaltan' se oye más como indicativo ('puesto que exaltan' / 'de la manera que exaltan') que como marco exhortativo. 'Al exaltar' o 'mientras exaltan' preserva mejor el valor adverbial y la naturalidad.
  - severity: low
    issue: La nota al pie mantiene 'el Señor'
    rationale: Si el texto principal se corrige a 'Yahvé', la nota también debe armonizarse para evitar inconsistencia terminológica interna.
  revised_spanish_text: Al exaltar a Yahvé[a], levanten la voz tanto como puedan, porque aún hay más.
  revised_footnotes:
  - marker: a
    text: 'Griego: "porque él todavía supera más", haciendo explícito que Yahvé excede toda alabanza. El hebreo es más breve: "porque aún hay más".'
    reason: alternative_reading
  revision_rationale: Se corrige el inicio para que suene natural y fiel al valor exhortativo/adverbial de מגדלי, y se restituye 'Yahvé' conforme a la terminología base del proyecto para el nombre divino. Se conserva la brevedad del hebreo en la cláusula final y la explicitación griega en nota.
