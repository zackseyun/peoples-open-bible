translation:
  language: es
  text: Entonces Mical tomó el ídolo doméstico[a] y lo puso sobre la cama, y colocó un cojín[b] de pelo de cabra a su cabecera y lo cubrió con la prenda.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'los terafines', 'los dioses domésticos' o 'la imagen'. El término hebreo se refiere a objetos cultuales domésticos; aquí funciona como una sola figura en la cama.
    reason: lexical_alternative
  - marker: b
    text: El sentido exacto de la expresión hebrea es incierto; puede referirse a una cubierta tejida de pelo de cabra, una red, una almohada o un objeto similar colocado a la cabecera.
    reason: lexical_alternative
lexical_decisions:
- source_word: הַתְּרָפִים
  english_pob_choice: the household idol
  chosen_spanish: el ídolo doméstico
  alternatives_spanish:
  - los terafines
  - los dioses domésticos
  - la imagen
  lexicon: HALOT
  rationale: תרפים designa objetos cultuales domésticos; en español, 'ídolo doméstico' comunica el sentido sin exigir transliteración. Aunque la forma hebrea es plural, el contexto narra un solo objeto colocado en la cama, por lo que el singular español sigue la función referencial del pasaje.
- source_word: אֶל הַמִּטָּה
  english_pob_choice: on the bed
  chosen_spanish: sobre la cama
  alternatives_spanish:
  - en la cama
  - encima de la cama
  - en el lecho
  lexicon: HALOT
  rationale: Con שׂוּם, la idea es de colocación en la superficie de la cama; 'sobre la cama' conserva el valor locativo natural en español y evita una lectura demasiado direccional de 'a/ hacia la cama'.
- source_word: כְּבִיר הָעִזִּים
  english_pob_choice: a cushion of goats’ hair
  chosen_spanish: una almohada de pelo de cabra
  alternatives_spanish:
  - un cojín de pelo de cabra
  - una funda de pelo de cabra
  - un relleno de pelo de cabra
  lexicon: HALOT
  rationale: El hebreo es difícil y el objeto exacto es incierto; el audit trail inglés opta por 'cushion' para un apoyo de cabeza. 'Almohada' transmite bien en español esa función sin sobreafirmar la forma exacta del objeto, y conserva la idea de algo hecho de pelo de cabra.
- source_word: מְרַאֲשֹׁתָיו
  english_pob_choice: at its head
  chosen_spanish: a su cabecera
  alternatives_spanish:
  - junto a su cabeza
  - a la cabecera
  - en el lugar de la cabeza
  lexicon: HALOT
  rationale: La expresión apunta al lugar de la cabeza/cabecera. 'A su cabecera' es idiomático en español y mantiene la relación espacial con el objeto en la cama.
- source_word: בַּבָּגֶד
  english_pob_choice: with the garment
  chosen_spanish: con la ropa
  alternatives_spanish:
  - con el vestido
  - con el manto
  - con la prenda
  lexicon: HALOT
  rationale: בגד es un término general para ropa/vestidura. En este contexto, 'la ropa' funciona de modo natural en español y no fuerza una especificación no asegurada como 'manto' o 'vestido'.
- source_word: וַתְּכַס
  english_pob_choice: covered
  chosen_spanish: lo cubrió
  alternatives_spanish:
  - la cubrió
  - lo tapó
  - lo ocultó
  lexicon: HALOT
  rationale: כסה significa de manera directa 'cubrir'. Dado que el antecedente inmediato se ha narrado como un solo objeto en la escena, el pronombre masculino singular en español sigue la referencia funcional del texto.
translation_notes:
  revision_awareness: El borrador inglés más reciente cambió 'quilt' por 'cushion' para reflejar mejor un objeto de apoyo para la cabeza; el español sigue esa revisión con 'almohada' y mantiene la incertidumbre léxica en nota.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' como norma del proyecto, pero este versículo no contiene el nombre divino.
  - Se conserva el singular referencial para el objeto cultual, coherente con el uso narrativo del pasaje y con la decisión inglesa auditada.
  - '''Cabecera'' y ''sobre la cama'' evitan arcaísmos y preservan la escena concreta sin ampliar el sentido.'
  - No se introduce terminología eclesiástica tradicional no sustentada por el hebreo.
