translation:
  language: es
  text: Los guio con una nube de día[a], y toda la noche con la luz del fuego.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Los condujo con una nube de día, y toda la noche a la luz del fuego».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּנְחֵם
  english_pob_choice: He led them
  chosen_spanish: Los guiaba
  alternatives_spanish:
  - Los conducía
  - Los llevaba
  lexicon: HALOT
  rationale: El verbo hebreo נחה en hifil expresa dirigir/guionar en el desierto. «Guiaba» conserva la idea de dirección continua y natural en español; «conducía» es posible, pero «guiaba» comunica mejor la función de guía sin perder el movimiento histórico.
- source_word: בֶּעָנָן
  english_pob_choice: with a cloud
  chosen_spanish: con una nube
  alternatives_spanish:
  - por medio de una nube
  - en una nube
  lexicon: HALOT
  rationale: La preposición ב aquí es instrumental o asociativa. «Con una nube» mantiene la imagen concreta sin imponer una explicación más técnica como «por medio de».
- source_word: יוֹמָם
  english_pob_choice: by day
  chosen_spanish: de día
  alternatives_spanish:
  - en el día
  - durante el día
  lexicon: HALOT
  rationale: יוֹמָם funciona adverbialmente. «De día» es una equivalencia natural y breve en español, equivalente funcional de «by day».
- source_word: וְכָל הַלַּיְלָה
  english_pob_choice: and all the night
  chosen_spanish: y toda la noche
  alternatives_spanish:
  - y toda la noche entera
  - y durante toda la noche
  lexicon: HALOT
  rationale: «Toda la noche» preserva la totalidad distributiva del hebreo y suena idiomático en español. Se evita «toda la noche entera» por redundante.
- source_word: בְּאוֹר אֵשׁ
  english_pob_choice: with the light of fire
  chosen_spanish: con la luz de fuego
  alternatives_spanish:
  - con la luz del fuego
  - por la luz de fuego
  lexicon: HALOT
  rationale: La frase hebrea une «luz» y «fuego» de forma concreta. «Luz de fuego» conserva ambas unidades léxicas sin convertirla de inmediato en una paráfrasis más interpretativa. Se mantiene «fuego» sin suavizarlo a «lámpara» o «antorcha» porque el texto no especifica ese objeto.
theological_decisions:
- issue: Imagen de guía divina en el desierto
  english_pob_reading: Render the verse as describing God's historical guidance of Israel by the cloud and fire without expanding it into explicit theological interpretation.
  chosen_spanish_reading: El versículo se traduce como relato histórico de la conducción divina de Israel mediante la nube y el fuego, sin añadir tipología ni explicación doctrinal en el texto principal.
  alternative_spanish_readings:
  - Interpretarlo tipológicamente en el texto principal
  - Expandir la imagen a una explicación de la presencia divina
  rationale: El hebreo narra la guía concreta de Israel. La traducción debe preservar esa tensión narrativa sin introducir una lectura teológica adicional que el verso no formula explícitamente.
  doctrine_reference: 'Translation philosophy: preservar el sentido histórico y no importar afirmaciones doctrinales que el texto no dice.'
translation_notes:
  revision_awareness: La revisión más reciente indicó que no hacía falta cambio sustantivo; esta redacción mantiene el sentido del hebreo y la preferencia inglesa por una formulación directa y sobria.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» fuera del versículo porque el hebreo aquí no contiene el nombre divino explícito; el sujeto queda implícito en el contexto del salmo.
  - Se evita «Mesías», «Cristo» u otra terminología no presente en el verso.
  - «Nube» y «fuego» se conservan como imágenes concretas, sin convertirlas en glosas interpretativas.
  - La nota al pie marca una alternativa léxica real en español, paralela a la nota inglesa sobre «guided».
