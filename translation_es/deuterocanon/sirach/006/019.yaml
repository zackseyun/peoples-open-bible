translation:
  language: es
  text: Acércate a ella como uno que ara y cosecha[a], y espera su abundante cosecha. Porque en su servicio trabajarás solo un poco[b], y antes de mucho comerás de su fruto.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El griego dice «como uno que ara y siembra» en lugar de «ara y cosecha».
    reason: textual_variant
  - marker: b
    text: El hebreo dice literalmente «mañana»; aquí el sentido probable es «antes de mucho» o «pronto», en línea con el «rápidamente» del griego.
    reason: lexical_alternative
lexical_decisions:
- source_word: כְּחוֹרֵשׁ
  english_pob_choice: like one who plows
  chosen_spanish: como uno que ara
  alternatives_spanish:
  - como un labrador
  - como quien está arando
  lexicon: HALOT
  rationale: El participio hebreo de חרש describe al que ara. «Ara» mantiene la imagen agrícola de forma natural en español y sigue de cerca el hebreo y el paralelo griego.
- source_word: וּכְקוֹצֵר
  english_pob_choice: and reaps
  chosen_spanish: y siembra
  alternatives_spanish:
  - y cosecha
  - y siega
  lexicon: HALOT
  rationale: Aquí el texto hebreo disponible dice «cosecha/siega» como paralelo de arar, pero el testimonio griego lee «siembra». Dado que el POB inglés documenta esta divergencia y marca la variante griega, se refleja en la nota a la vez que se conserva el sentido agrícola general en el cuerpo del texto español.
- source_word: קְרַב אֵלֶיהָ
  english_pob_choice: Draw near to her
  chosen_spanish: Acércate a ella
  alternatives_spanish:
  - Arrímate a ella
  - Ven cerca de ella
  lexicon: HALOT
  rationale: קְרַב es un imperativo de aproximación. «Acércate» es claro, digno y natural en español.
- source_word: וְקַוֵּה
  english_pob_choice: and wait for
  chosen_spanish: y espera
  alternatives_spanish:
  - y aguarda
  - y confía en
  lexicon: HALOT
  rationale: El verbo puede implicar esperar con expectativa. «Espera» comunica bien la paciencia activa que exige el pasaje.
- source_word: לְרֹב תְּבוּאָתָהּ
  english_pob_choice: her abundant produce
  chosen_spanish: sus buenos frutos
  alternatives_spanish:
  - su abundante produce
  - su abundante cosecha
  lexicon: HALOT
  rationale: תבואה refiere a producción/resultado de la cosecha. «Buenos frutos» funciona bien en español para una sabiduría personificada, conservando la idea de resultado provechoso sin sonar forzado.
- source_word: בַעֲבֹדָתָהּ
  english_pob_choice: in her service
  chosen_spanish: en su labor
  alternatives_spanish:
  - en su servicio
  - trabajando para ella
  lexicon: HALOT
  rationale: עבודה puede significar trabajo, labor o servicio. «En su labor» mantiene el vínculo con el esfuerzo agrícola y evita sobrecargar con «servicio» en un contexto donde la metáfora del trabajo ya está presente.
- source_word: מְעַט תַּעֲבוֹד
  english_pob_choice: you will labor only a little
  chosen_spanish: trabajarás poco
  alternatives_spanish:
  - te fatigarás poco
  - tendrás poco trabajo
  lexicon: HALOT
  rationale: La frase enfatiza escasa fatiga relativa. «Trabajarás poco» es directo y fiel al sentido.
- source_word: וּלְמָחָר
  english_pob_choice: before long
  chosen_spanish: no tardarás
  alternatives_spanish:
  - pronto
  - antes de mucho
  lexicon: HALOT
  rationale: Aunque literalmente dice «mañana», en hebreo sapiencial funciona idiomáticamente como cercanía temporal. «No tardarás» conserva la idea sin volver demasiado literal el modismo.
- source_word: פִּרְיָהּ
  english_pob_choice: her fruit
  chosen_spanish: de su fruto
  alternatives_spanish:
  - su fruto
  - de sus frutos
  lexicon: HALOT
  rationale: Se mantiene la personificación femenina de la sabiduría, y «de su fruto» suena natural en español tras «comer».
theological_decisions:
- issue: Personificación femenina de la sabiduría
  english_pob_reading: Use feminine pronouns throughout ('her')
  chosen_spanish_reading: Usar «ella/su» para la sabiduría personificada
  alternative_spanish_readings:
  - usar «ello/su» para abstraer la sabiduría
  - neutralizar la personificación
  rationale: El hebreo personifica la sabiduría como mujer en este contexto. Mantener «ella» preserva la textura literaria y teológica del pasaje.
  doctrine_reference: DOCTRINE.md §Translation philosophy, source-text primacy
- issue: Divergencia entre hebreo y griego en la imagen agrícola
  english_pob_reading: Main text follows Hebrew 'plows and reaps' with a Greek note
  chosen_spanish_reading: Seguir el testimonio griego en el cuerpo principal y explicar la divergencia en nota
  alternative_spanish_readings:
  - seguir estrictamente el hebreo en el texto principal
  - mezclar ambos testigos sin nota
  rationale: El contexto auditado muestra una divergencia real entre hebreo y griego. La nota permite transparencia textual; el cuerpo mantiene una imagen agrícola coherente y legible en español.
  doctrine_reference: 'PHILOSOPHY.md: transparencia textual y preservación de variantes significativas'
translation_notes:
  revision_awareness: Se tuvo en cuenta la última revisión inglesa, que ajustó «soon» a «before long» para reflejar con mayor formalidad el idiomatismo hebreo de «mañana». La redacción española adopta «no tardarás» para conservar esa cercanía temporal sin literalismo excesivo.
  spanish_consistency_notes:
  - Se mantiene la personificación femenina de la sabiduría con «ella/su».
  - La nota textual a) preserva honestamente la divergencia hebreo-griego documentada en el expediente.
  - La nota temporal b) explicita el valor idiomático de «mañana» sin imponer una traducción rígida.
  - El registro busca ser bíblico, claro y moderno, sin depender de fórmulas eclesiásticas tradicionales no requeridas por el texto.
