revisions:
- from: 'Entonces Nabucodonosor respondió y dijo: «Bendito sea el Dios de Sadrac, Mesac y Abed-nego, que envió a su ángel y libró a sus siervos, que confiaron en él, y desoyeron el mandato del rey, y entregaron sus cuerpos[a], para no servir ni adorar a ningún dios sino a su propio Dios».'
  to: 'Entonces Nabucodonosor respondió y dijo: «Bendito sea el Dios de Sadrac, Mesac y Abed-nego, que envió a su ángel[a] y libró a sus siervos, que confiaron en él, y dejaron de lado el mandato del rey[b], y entregaron sus cuerpos, para no servir ni adorar[c] a ningún dios sino a su propio Dios».'
  rationale: Se elimina una nota redundante y se restauran las alternativas léxicas significativas preservadas por la auditoría inglesa. También se ajusta «desoyeron» a «dejaron de lado» para reflejar mejor el matiz del arameo y la revisión inglesa final («set aside the king’s command»). El resto del texto se mantiene por ser fiel, claro y bien formulado en español.
