translation:
  language: es
  text: 'Si dije[a]: «Mi pie resbala», tu amor fiel, Yahvé[b], me sostuvo.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O «Cuando dije: “Mi pie resbala”». El hebreo אִם suele significar «si», pero en poesía también puede introducir una situación recordada.'
    reason: alternative_reading
  - marker: b
    text: «Yahvé» representa el nombre divino יהוה. La tradición del proyecto en español evita sustituirlo por un título como «Señor».
    reason: theological_note
lexical_decisions:
- source_word: אִם
  english_pob_choice: If
  chosen_spanish: Si
  alternatives_spanish:
  - Cuando
  lexicon: HALOT
  rationale: La partícula condicional se conserva como condición directa en español. Aunque en poesía puede tener matiz retrospectivo, la lectura base del audit trail es condicional; por eso «Si» mantiene mejor la estructura del hebreo y su tensión interpretativa.
- source_word: אָמַרְתִּי
  english_pob_choice: I said
  chosen_spanish: yo dijera
  alternatives_spanish:
  - yo dije
  - yo pensara
  lexicon: HALOT
  rationale: El hebreo usa una forma perfecta dentro de la cláusula condicional. En español, «yo dijera» transmite bien la referencia a una situación dicha o supuesta en estilo indirecto y evita forzar un pasado simple que suene menos natural en este encuadre condicional.
- source_word: מָטָה
  english_pob_choice: is slipping
  chosen_spanish: resbala
  alternatives_spanish:
  - está resbalando
  - se desliza
  - vacila
  lexicon: HALOT
  rationale: El verbo expresa la imagen de perder firmeza o deslizarse. «Resbala» reproduce con naturalidad la metáfora corporal del pie y conserva el sentido de inestabilidad sin añadir explicación interpretativa.
- source_word: רַגְלִי
  english_pob_choice: my foot
  chosen_spanish: Mi pie
  alternatives_spanish:
  - Mis pies
  - Mi paso
  lexicon: HALOT
  rationale: El sustantivo está en singular, así que se mantiene «mi pie» para preservar la imagen idiomática de estabilidad personal. «Mi paso» sería más interpretativo.
- source_word: חַסְדְּךָ
  english_pob_choice: your steadfast love
  chosen_spanish: tu fiel amor
  alternatives_spanish:
  - tu amor constante
  - tu misericordia
  - tu amor de pacto
  lexicon: HALOT
  rationale: חֶסֶד en este contexto expresa amor leal y constante. «Fiel amor» comunica la idea de lealtad y permanencia con un registro natural en español, sin reducir el término a «misericordia» ni volverlo demasiado técnico.
- source_word: יְהוָה
  english_pob_choice: O Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - SEÑOR
  - Yahveh
  lexicon: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
  rationale: Se conserva el nombre divino personal según la convención del proyecto. En español, «Yahvé» es la forma adoptada para reflejar directamente el Tetragrámaton, evitando la sustitución por un título.
- source_word: יִסְעָדֵנִי
  english_pob_choice: upheld me
  chosen_spanish: me sostuvo
  alternatives_spanish:
  - me sostuvo firmemente
  - me apoyó
  - me sustentó
  lexicon: HALOT
  rationale: El verbo significa apoyar, sostener o sustentar. «Me sostuvo» es breve, idiomático y preserva la imagen de ayuda estabilizadora frente al pie que resbala.
theological_decisions:
- issue: Divine name in the verse
  english_pob_reading: O Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - Yahveh
  rationale: El verso usa explícitamente el Tetragrámaton. La tradición POB para español sigue la transliteración del nombre divino, por lo que «Yahvé» mantiene la referencia personal del texto fuente y evita la sustitución litúrgica por un título.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Force of חֶסֶד
  english_pob_reading: steadfast love / mercy / covenant love
  chosen_spanish_reading: fiel amor
  alternative_spanish_readings:
  - amor constante
  - misericordia
  - amor de pacto
  rationale: La palabra hebrea no se reduce bien a una sola equivalencia. «Fiel amor» conserva el vínculo entre amor y lealtad que el audit trail destaca, sin imponer una explicación doctrinal más estrecha que la del hebreo.
  doctrine_reference: HALOT; lexical note on חֶסֶד
translation_notes:
  revision_awareness: 'El audit trail inglés muestra una revisión importante en la primera cláusula: de una lectura retrospectiva («When») a una condicional más directa («If»). La redacción española sigue esa decisión con «Si» y mantiene el paralelismo del verso. También conserva la nota léxica sobre חֶסֶד, traducida de forma que exprese lealtad y amor constante sin borrar la tensión semántica del término.'
  spanish_consistency_notes:
  - Se mantiene Yahvé para יְהוָה conforme a la convención española del proyecto.
  - Se conserva el singular «mi pie» para reflejar la metáfora hebrea.
  - «Fiel amor» busca equilibrio entre naturalidad en español y la carga de lealtad de חֶסֶד.
  - La puntuación abre la cita directa de forma natural en español y respeta el tono poético del versículo.
