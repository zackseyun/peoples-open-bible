- from: Después de él, los tecoítas[a] repararon otra sección, enfrente de la gran torre saliente, y hasta el muro de Opel.
  to: Después de él, los tecoítas[a] repararon otra sección, enfrente de la gran torre saliente, hasta la muralla de Ofel.
  rationale: Se corrige el topónimo a «Ofel» para reflejar fielmente הָעֹפֶל / Ophel en español, y se mejora la naturalidad suprimiendo «y» antes de «hasta». También se prefiere «muralla» por adecuación contextual al pasaje sobre reconstrucción defensiva. La nota léxica existente se conserva porque representa bien la alternativa del original.
