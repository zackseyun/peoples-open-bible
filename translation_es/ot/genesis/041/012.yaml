  text: וְ/שָׁ֨ם אִתָּ֜/נוּ נַ֣עַר עִבְרִ֗י עֶ֚בֶד לְ/שַׂ֣ר הַ/טַּבָּחִ֔ים וַ/נְּ֨סַפֶּר ל֔/וֹ וַ/יִּפְתָּר לָ֖/נוּ אֶת חֲלֹמֹתֵ֑י/נוּ אִ֥ישׁ כַּ/חֲלֹמ֖/וֹ פָּתָֽר־־־׃
base_translation:
  language: en
  yaml_path: translation/ot/genesis/041/012.yaml
  text: And there with us was a young Hebrew man[a], a slave of the captain of the guard, and we told him, and he interpreted our dreams for us[c][b]; he interpreted each man's dream according to his dream.
