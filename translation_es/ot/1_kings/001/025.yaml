translation:
  language: es
  text: 'Porque hoy ha bajado y ha sacrificado bueyes[a], terneros cebados y ovejas en abundancia, y ha invitado a todos los hijos del rey, a los comandantes del ejército y al sacerdote Abiatar. Y he aquí, están comiendo y bebiendo delante de él, y dicen[b]: «¡Viva el rey Adonías!»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Más formalmente: «ha bajado hoy». El verbo hebreo conserva la idea direccional de «bajar/descender».'
    reason: lexical_alternative
  - marker: b
    text: «¡Viva el rey Adonías!» es la forma idiomática de la aclamación hebrea, equivalente a «¡Que viva el rey, Adonías!».
    reason: lexical_alternative
lexical_decisions:
- source_word: יָרַד הַיּוֹם
  english_pob_choice: he has gone down today
  chosen_spanish: ha bajado hoy
  alternatives_spanish:
  - bajó hoy
  - ha ido bajando hoy
  lexicon: HALOT
  rationale: שמירה del verbo direccional יָרַד mediante «bajado»; el perfecto compuesto español comunica un hecho reciente con relevancia inmediata, coherente con el valor narrativo que la POB marcó en inglés.
- source_word: וַיִּזְבַּח
  english_pob_choice: and sacrificed
  chosen_spanish: ha sacrificado
  alternatives_spanish:
  - y sacrificó
  - y degolló
  - y ofreció sacrificios
  lexicon: HALOT
  rationale: En este contexto de banquete sacrificial, «sacrificado» preserva el sentido cultual de זבח sin reducirlo a mera matanza culinaria.
- source_word: שׁוֹר
  english_pob_choice: oxen
  chosen_spanish: bueyes
  alternatives_spanish:
  - toros
  - ganado vacuno
  lexicon: HALOT
  rationale: «Bueyes» mantiene el valor de animal grande de sacrificio y funciona de manera natural en español bíblico contemporáneo.
- source_word: מְרִיא
  english_pob_choice: fattened calves
  chosen_spanish: terneros cebados
  alternatives_spanish:
  - becerros cebados
  - terneros engordados
  - reses cebadas
  lexicon: HALOT
  rationale: La POB revisada precisó la idea de animal cebado. «Terneros cebados» refleja el estado del animal sin imponer una especie más amplia de la necesaria; conserva la tensión entre precisión zoológica y fluidez.
- source_word: וְצֹאן לָרֹב
  english_pob_choice: and sheep in abundance
  chosen_spanish: y ovejas en abundancia
  alternatives_spanish:
  - y ganado menor en abundancia
  - y rebaños en abundancia
  lexicon: HALOT
  rationale: צֹאן puede abarcar ovejas y cabras; aquí, como en la POB inglesa, «ovejas» es una equivalencia breve y reconocible para la lista sacrificial. «En abundancia» reproduce לָרֹב como idiomático de gran cantidad.
- source_word: וַיִּקְרָא לְכָל
  english_pob_choice: and he has invited all
  chosen_spanish: ha convidado a todos
  alternatives_spanish:
  - ha invitado a todos
  - llamó a todos
  lexicon: HALOT
  rationale: קרא con ל expresa convocatoria/invitación. «Convidado» mantiene el matiz de llamado a un banquete y evita la posible rigidez de «llamado».
- source_word: בְּנֵי הַמֶּלֶךְ
  english_pob_choice: all the king’s sons
  chosen_spanish: a todos los hijos del rey
  alternatives_spanish:
  - a todos los hijos del monarca
  - a todos los príncipes
  lexicon: HALOT
  rationale: «Hijos del rey» sigue de cerca el hebreo y evita cargar el texto con un título político no explícito.
- source_word: שָׂרֵי הַצָּבָא
  english_pob_choice: the commanders of the army
  chosen_spanish: a los comandantes del ejército
  alternatives_spanish:
  - a los jefes del ejército
  - a los capitanes del ejército
  lexicon: HALOT
  rationale: «Comandantes del ejército» conserva el sentido de liderazgo militar de שָׂרִים y resulta claro en español moderno.
- source_word: אֶבְיָתָר הַכֹּהֵן
  english_pob_choice: Abiathar the priest
  chosen_spanish: al sacerdote Abiatar
  alternatives_spanish:
  - a Abiatar el sacerdote
  - al sacerdote Abiar
  lexicon: HALOT
  rationale: El nombre propio se adapta a la forma española habitual «Abiatar». «Sacerdote» traduce הַכֹּהֵן sin recurrir a una fórmula más eclesial que el hebreo no exige.
- source_word: וְהִנָּם
  english_pob_choice: And look
  chosen_spanish: Y miren
  alternatives_spanish:
  - Y he aquí
  - Y vean
  lexicon: HALOT
  rationale: La interjección deíctica introduce la escena presente. «Miren» es natural en español actual y preserva la función de llamar la atención.
- source_word: אֹכְלִים וְשֹׁתִים
  english_pob_choice: they are eating and drinking
  chosen_spanish: están comiendo y bebiendo
  alternatives_spanish:
  - comen y beben
  - están festejando
  lexicon: HALOT
  rationale: Los participios describen acción en curso; «están comiendo y bebiendo» preserva esa inmediatez y evita resumir con «festejando».
- source_word: לְפָנָיו
  english_pob_choice: before him
  chosen_spanish: delante de él
  alternatives_spanish:
  - en su presencia
  - ante él
  lexicon: HALOT
  rationale: «Delante de él» comunica la disposición espacial-relacional del hebreo y es claro en español.
- source_word: יְחִי הַמֶּלֶךְ
  english_pob_choice: Long live King
  chosen_spanish: ¡Viva el rey!
  alternatives_spanish:
  - ¡Que viva el rey!
  - ¡Larga vida al rey!
  lexicon: HALOT
  rationale: La fórmula hebrea es una aclamación jussiva; en español, «¡Viva el rey!» conserva el valor idiomático y la energía de la exclamación.
- source_word: אֲדֹנִיָּהוּ
  english_pob_choice: Adonijah
  chosen_spanish: Adonías
  alternatives_spanish:
  - Adoníashu
  - Adoníasu
  lexicon: HALOT
  rationale: Se adopta la forma española usual del nombre bíblico.
theological_decisions:
- issue: Aclamación real con posible ambigüedad de titularidad
  english_pob_reading: '''Long live King Adonijah!'' is the idiomatic rendering of the Hebrew acclamation ''May the king live, Adonijah.'''
  chosen_spanish_reading: «¡Viva el rey Adonías!»
  alternative_spanish_readings:
  - «¡Que viva el rey, Adonías!»
  - «¡Viva Adonías, el rey!»
  rationale: 'El hebreo permite leer una aclamación al rey nombrado Adonías; la POB inglesa decidió una formulación idiomática equivalente. El español mantiene esa lectura sin suavizar la tensión política implícita: el personaje es aclamado como rey, no solo mencionado como individuo.'
  doctrine_reference: 1 Reyes 1:25; POB footnote b
translation_notes:
  revision_awareness: 'Seguí la revisión inglesa más reciente al preferir «terneros cebados» para מְרִיא en lugar de una forma más general como «ganado/cattle». También mantuve la alta concordancia del audit trail: lista sacrificial, convocatoria, escena de banquete y aclamación real quedan alineadas con la POB inglesa revisada.'
  spanish_consistency_notes:
  - Se usó «Yahvé» como término por defecto solo cuando aparezca el Tetragrámaton; este versículo no lo contiene.
  - Se mantuvo un registro verbal compuesto en la primera mitad para reflejar la reciente acción narrativa, pero sin forzar un aspecto ajeno al español.
  - Se eligió «adolescentes»? no; no aplica. Se evitó «siervo»/«señor» porque los títulos presentes son concretamente políticos y sacerdotales.
  - La puntuación y las comillas siguen norma española, con exclamación de apertura en la aclamación final.
