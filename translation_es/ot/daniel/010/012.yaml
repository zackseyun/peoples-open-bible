translation:
  language: es
  text: 'Entonces me dijo: «No temas, Daniel, porque desde el primer día en que pusiste tu corazón para entender y para humillarte[a] delante de tu Dios, tus palabras fueron oídas, y yo he venido a causa de tus palabras».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «afligirte». El hebreo puede denotar autoaflicción o autohumillación en un contexto devocional.
    reason: lexical_alternative
lexical_decisions:
- source_word: אַֽל תִּירָא
  english_pob_choice: Do not fear
  chosen_spanish: No temas
  alternatives_spanish:
  - No tengas miedo
  - No te asustes
  lexicon: HALOT
  rationale: La prohibición verbal directa expresa mejor el tono de ánimo celestial. «No temas» es natural en español bíblico y no añade una intensidad distinta a la del hebreo.
- source_word: מִן הַיּוֹם הָרִאשׁוֹן
  english_pob_choice: from the first day
  chosen_spanish: desde el primer día
  alternatives_spanish:
  - desde el día primero
  - a partir del primer día
  lexicon: HALOT
  rationale: «Desde» conserva el valor temporal de inicio y reproduce con claridad la secuencia hebrea sin volverla más interpretativa.
- source_word: נָתַתָּ אֶת לִבְּךָ
  english_pob_choice: you set your heart
  chosen_spanish: diste tu corazón
  alternatives_spanish:
  - aplicaste tu corazón
  - pusiste tu corazón
  lexicon: HALOT
  rationale: El hebreo idiomático habla de dirigir el corazón hacia algo. En español, «dar el corazón» mantiene esa imagen y su fuerza volitiva; «poner/aplicar tu corazón» sería más explicativo, pero menos fluido.
- source_word: לְהָבִין
  english_pob_choice: to understand
  chosen_spanish: para entender
  alternatives_spanish:
  - para comprender
  - para discernir
  lexicon: HALOT
  rationale: «Entender» reproduce de forma directa la idea de comprensión intelectual y perceptiva que el verbo demanda aquí.
- source_word: וּלְהִתְעַנּוֹת
  english_pob_choice: to humble yourself
  chosen_spanish: para humillarte
  alternatives_spanish:
  - para afligirte
  - para negarte a ti mismo
  lexicon: HALOT
  rationale: La forma hitpael puede abarcar autoaflicción o auto-humillación en contexto devocional. «Humillarte» preserva el sentido religioso general sin obligar al lector a una práctica ascética más específica; la alternativa más literal queda implícita por el contexto.
- source_word: לִפְנֵי אֱלֹהֶיךָ
  english_pob_choice: before your God
  chosen_spanish: delante de tu Dios
  alternatives_spanish:
  - en presencia de tu Dios
  - ante tu Dios
  lexicon: HALOT
  rationale: «Delante de» conserva la relación de comparecencia/presencia expresada por לִפְנֵי y suena natural en español bíblico contemporáneo.
- source_word: נִשְׁמְעוּ דְבָרֶיךָ
  english_pob_choice: your words were heard
  chosen_spanish: tus palabras fueron oídas
  alternatives_spanish:
  - tus palabras fueron escuchadas
  - tu oración fue oída
  lexicon: HALOT
  rationale: «Fueron oídas» sigue de cerca el pasivo hebreo y evita convertir «palabras» en «oración», algo posible por contexto pero no explicitado por el texto.
- source_word: וַאֲנִי בָאתִי בִּדְבָרֶיךָ
  english_pob_choice: and I have come because of your words
  chosen_spanish: y yo he venido a causa de tus palabras
  alternatives_spanish:
  - y he venido en respuesta a tus palabras
  - y vine a causa de tus palabras
  lexicon: HALOT
  rationale: La preposición בְּ con דְּבָרֶיךָ expresa aquí una causa u ocasión. «A causa de» conserva la relación causal sin sobreespecificar el mecanismo; «en respuesta a» es posible, pero más interpretativa.
theological_decisions:
- issue: Sentido de וּלְהִתְעַנּוֹת en un contexto devocional
  english_pob_reading: to humble yourself
  chosen_spanish_reading: humillarte
  alternative_spanish_readings:
  - afligirte
  - negarte a ti mismo
  rationale: El texto presenta la postura de Daniel delante de Dios como un acto de abatimiento devoto. «Humillarte» mantiene esa dimensión espiritual sin reducirla a una técnica de mortificación corporal.
  doctrine_reference: Translation philosophy §3, §6
- issue: Fuerza de בִּדְבָרֶיךָ al final del versículo
  english_pob_reading: because of your words
  chosen_spanish_reading: a causa de tus palabras
  alternative_spanish_readings:
  - en respuesta a tus palabras
  - por tus palabras
  rationale: La idea principal es que la llegada del mensajero fue ocasionada por las palabras de Daniel. «A causa de» preserva la relación causal con precisión y sin añadir elementos no afirmados explícitamente.
  doctrine_reference: Translation philosophy §1, §3
translation_notes:
  revision_awareness: 'Se tuvo en cuenta el estado de revisión más reciente: el texto inglés quedó sin cambios tras la última pasada, con acuerdo alto (1.0) y sin observaciones. Por ello, la redacción española sigue de cerca el auditable sentido del hebreo y del POB inglés, sin introducir ajustes de contenido no sustentados por la fuente.'
  spanish_consistency_notes:
  - Se mantuvo «Dios» para אֱלֹהֶיךָ, en coherencia con el estándar del proyecto.
  - Se conservó la primera persona enfática «yo» en «y yo he venido» para reflejar el contraste hebreo וַאֲנִי.
  - 'Se prefirió un español bíblico moderno y claro: «No temas», «desde el primer día», «delante de tu Dios».'
  - Se ancló solo una nota al verso, en «humillarte», porque esa es la única ambigüedad léxica que el español necesita señalar explícitamente en este registro.
