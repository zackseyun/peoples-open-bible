translation:
  language: es
  text: 'Y dijo[a]: «Acércalo hacia mí, y comeré de la caza de mi hijo, para que mi alma te bendiga». Entonces se lo acercó, y comió; y le trajo vino, y bebió.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, más idiomáticamente: «para que yo te bendiga»; el hebreo dice literalmente: «para que mi alma te bendiga».'
    reason: lexical_alternative
lexical_decisions:
- source_word: הַגִּשָׁה
  english_pob_choice: Bring it near
  chosen_spanish: Acércamelo
  alternatives_spanish:
  - Tráemelo cerca
  - Acércamelo aquí
  lexicon: HALOT
  rationale: El imperativo causativo pide acercar el alimento a Isaac; «acércamelo» preserva la idea concreta de movimiento hacia el hablante y suena natural en español.
- source_word: וְאֹכְלָה
  english_pob_choice: and I will eat
  chosen_spanish: y comeré
  alternatives_spanish:
  - para que coma
  - y comeré de ello
  lexicon: HALOT
  rationale: La forma cohortativa expresa intención; en español, «y comeré» comunica esa intención sin forzar una subordinación final que el hebreo no exige aquí.
- source_word: מִצֵּיד בְּנִי
  english_pob_choice: of my son’s game
  chosen_spanish: de la caza de mi hijo
  alternatives_spanish:
  - de la presa de mi hijo
  - de la caza de mi hijo
  lexicon: HALOT
  rationale: צַיִד puede ser caza/presa/venado según contexto. «Caza» mantiene el sentido general del término sin restringirlo indebidamente a una especie concreta.
- source_word: לְמַעַן
  english_pob_choice: so that
  chosen_spanish: para que
  alternatives_spanish:
  - a fin de que
  - con el fin de que
  lexicon: HALOT
  rationale: Expresa propósito. «Para que» es la forma más natural y directa en español para esta relación final.
- source_word: תְּבָרֶכְךָ נַפְשִׁי
  english_pob_choice: my soul may bless you
  chosen_spanish: mi alma te bendiga
  alternatives_spanish:
  - mi alma pueda bendecirte
  - yo te bendiga
  lexicon: HALOT
  rationale: Se conserva la expresión hebrea «mi alma», porque el texto la formula así y la POB la mantiene como una tensión/idioma a no aplanar. En español, «te bendiga» preserva el valor jussivo/potencial.
- source_word: וַיַּגֶּשׁ לוֹ
  english_pob_choice: So he brought it near to him
  chosen_spanish: Entonces se lo acercó
  alternatives_spanish:
  - Entonces lo acercó a él
  - Y se lo presentó
  lexicon: HALOT
  rationale: Repite el verbo de acercar; «se lo acercó» mantiene la referencia del objeto implícito y la relación espacial sin sobrecargar la frase.
- source_word: יַיִן
  english_pob_choice: wine
  chosen_spanish: vino
  alternatives_spanish:
  - vino
  lexicon: HALOT
  rationale: Correspondencia directa y estable del sustantivo.
- source_word: וַיֵּשְׁתְּ
  english_pob_choice: and he drank
  chosen_spanish: y bebió
  alternatives_spanish:
  - y lo bebió
  lexicon: HALOT
  rationale: Verbo narrativo simple; «bebió» es natural y fiel al aspecto sucesivo de la narración.
theological_decisions:
- issue: La expresión «mi alma» como sujeto de bendición
  english_pob_reading: my soul may bless you
  chosen_spanish_reading: mi alma te bendiga
  alternative_spanish_readings:
  - yo te bendiga
  - mi vida te bendiga
  rationale: Se mantiene la formulación antropológica concreta del hebreo. No se sustituye por «yo» para no borrar el giro idiomático del texto fuente.
  doctrine_reference: Antropología bíblica; preservación del idioma del original.
translation_notes:
  revision_awareness: Se ajustó la frase para que el marcador de nota [a] aparezca explícitamente en el texto español, corrigiendo la validación anterior. Se conservó la elección de mantener «mi alma» por fidelidad al hebreo y a la audibilidad del giro idiomático.
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando el texto lo requiera; este versículo no lo contiene.
  - Se mantuvo un español neutro y publicable, evitando calcos innecesarios, pero conservando el idioma hebreo relevante.
  - La secuencia narrativa refleja la repetición del verbo de acercar mediante «acércamelo» / «se lo acercó».
