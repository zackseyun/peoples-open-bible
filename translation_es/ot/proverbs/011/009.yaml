  to: Con su boca el hombre impío destruye a su prójimo[a]; pero mediante el conocimiento los justos son librados[b].
  rationale: El borrador es básicamente fiel, pero conviene pulir la expresión instrumental del segundo colon para un español más natural y preciso. «Mediante el conocimiento» mantiene la semántica de דַּעַת y del ב instrumental, y la supresión de la coma inicial mejora el flujo sin cambiar el sentido. Las notas se ajustan para corresponder exactamente al texto revisado.
