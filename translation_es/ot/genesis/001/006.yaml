  to: 'Y Dios dijo: «Haya una expansión[a] en medio de las aguas[b], y que separe las aguas de las aguas».'
  rationale: Se reemplaza 'espacio abierto' por 'expansión' para reflejar mejor רָקִיעַ y la decisión lexical auditada en inglés ('expanse') sin caer en el arcaísmo 'firmamento' ni fijar una cosmología más concreta. Se mueve la nota [a] al término correcto y se normaliza 'domo' en español. Se conserva 'en medio de las aguas' y 'que separe las aguas de las aguas' por su fidelidad y buena legibilidad.
