review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español transmite correctamente la relación causal de ἀνθʼ ὧν, el acto idolátrico de ἐδοξάσαμεν τοὺς θεοὺς αὐτῶν, y la confesión final dirigida a Dios. Sin embargo, la nota [a] no preserva una alternativa real, ya que repite exactamente el texto principal en vez de reflejar la alternativa auditada («dimos gloria a sus dioses»). También la nota [b] se desvía del rastro auditado: el inglés preserva «just» como alternativa a «righteous», mientras que en español el texto principal ya usa «justo», por lo que la alternativa adecuada debe ir hacia «recto» en el texto principal o, más naturalmente, mantener «justo» en el texto y ofrecer «Tú eres recto, Señor» como alternativa bien formada.'
  spanish_quality_summary: 'El español es claro, natural y digno. «Porque glorificamos a sus dioses. Tú eres justo, Señor» suena bien en español eclesial contemporáneo. La reparación necesaria es menor pero importante: ajustar las notas para que sean idiomáticas, completas y realmente alternativas, y no una repetición mecánica ni una frase truncada.'
  glossary_alignment: No hay conflicto serio con la terminología del proyecto. κύριε → «Señor» está bien en este contexto. δίκαιος → «justo» es una decisión aceptable y bien motivada para español, con «recto» como alternativa preservable en nota. No aplica aquí una sustitución por «Yahvé», ya que el texto fuente usa vocativo κύριε en oración y no el tetragrámaton explícito.
  issues:
  - severity: medium
    issue: La nota [a] repite exactamente el texto principal
    rationale: La nota inglesa documenta una alternativa léxica real entre «we glorified» y «we gave glory to». En español, la nota debería reflejar una alternativa como «dimos gloria a sus dioses», no repetir «glorificamos a sus dioses».
  - severity: medium
    issue: La nota [b] está incompleta y no está bien anclada al contraste auditado
    rationale: '«O «recto, Señor»» no constituye una alternativa completa al enunciado principal. Debe conservar la cláusula entera: «Tú eres recto, Señor». Así preserva de manera natural en español la alternativa relevante a δίκαιος.'
  revised_spanish_text: porque glorificamos a sus dioses[a]. Tú eres justo[b], Señor.
  revised_footnotes:
  - marker: a
    text: O «dimos gloria a sus dioses».
    reason: lexical_alternative
  - marker: b
    text: O «Tú eres recto, Señor».
    reason: alternative_reading
  revision_rationale: Se conserva el texto principal, que es fiel y natural, y se corrigen únicamente las notas para que preserven alternativas reales, completas e idiomáticas conforme al rastro auditado en inglés y al sentido griego.
