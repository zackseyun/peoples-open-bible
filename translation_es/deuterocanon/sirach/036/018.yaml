    text: 'O: «que tus profetas sean creídos» o «que tus profetas resulten confiables». El griego es compacto y puede referirse tanto a que los profetas reciban confianza como a que se muestre su fiabilidad.'
    reason: alternative_reading
  revision_rationale: Se revisa la cláusula sobre los profetas para reflejar mejor el pasivo de ἐμπιστευθήτωσαν y alinearla con la auditoría inglesa final («be trusted»). «Que se confíe en tus profetas» es más natural en español y preserva mejor el sentido de que reciban confianza o crédito. Se actualiza la nota correspondiente para mantener las alternativas significativas.
