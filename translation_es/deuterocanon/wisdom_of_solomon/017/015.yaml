    text: O «fantasmas» o «visiones». El griego se refiere a apariciones espantosas, probablemente espectrales o ilusorias.
    reason: lexical_alternative
  - marker: b
    text: Literalmente, «eran paralizados por la traición del alma». La frase puede indicar un derrumbe interior en el que el propio ser interno parece volverse contra la persona.
    reason: alternative_reading
  revision_rationale: Se reemplaza «los impulsaban» por «eran acosados por» para reflejar mejor ἠλαύνοντο en un contexto de hostigamiento aterrador. También se ajusta la cláusula paralela a «eran paralizados por» para conservar mejor la simetría del griego. La nota b se actualiza levemente para corresponder con la redacción revisada, sin alterar la ambigüedad preservada por el original.
