translation:
  language: es
  text: Un regalo en secreto[a] apacigua la ira, y un soborno en el seno, la ira feroz.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'en el regazo'; la imagen hebrea es la de algo escondido en el pliegue de una prenda, enfatizando su carácter secreto.
    reason: lexical_alternative
lexical_decisions:
- source_word: מַתָּן
  english_pob_choice: gift
  chosen_spanish: regalo
  alternatives_spanish:
  - don
  - presente
  lexicon: HALOT
  rationale: El hebreo denota un obsequio en general. 'Regalo' es natural en español y evita anticipar el matiz ilícito que aparece en el segundo hemistiquio con שֹׁחַד.
- source_word: בַּסֵּתֶר
  english_pob_choice: in secret
  chosen_spanish: en secreto
  alternatives_spanish:
  - secretamente
  - en lo oculto
  lexicon: HALOT
  rationale: Conserva el valor locativo de 'en el lugar oculto' y suena fluido en español, manteniendo la idea de discreción que estructura el proverbio.
- source_word: יִכְפֶּה
  english_pob_choice: subdues
  chosen_spanish: apacigua
  alternatives_spanish:
  - sojuzga
  - reprime
  - calma
  lexicon: HALOT
  rationale: El verbo expresa el efecto de cubrir, contener o frenar la ira. 'Apacigua' comunica bien el resultado idiomático sin perder la idea de restricción.
- source_word: אָף
  english_pob_choice: anger
  chosen_spanish: la ira
  alternatives_spanish:
  - el enojo
  - la cólera
  lexicon: HALOT
  rationale: Aquí אָף es el modismo hebreo para 'ira/enojo'. 'Ira' mantiene el tono proverbial y corresponde al contraste con חֵמָה.
- source_word: שֹׁחַד
  english_pob_choice: bribe
  chosen_spanish: soborno
  alternatives_spanish:
  - coima
  - mordida
  lexicon: HALOT
  rationale: El término tiene carga negativa establecida. 'Soborno' preserva la distinción léxica frente a מַתָּן y funciona en registro bíblico contemporáneo.
- source_word: בַּחֵק
  english_pob_choice: in the bosom
  chosen_spanish: en el seno
  alternatives_spanish:
  - en el regazo
  - en el pliegue del vestido
  lexicon: HALOT
  rationale: El hebreo describe algo escondido en la parte interna de la ropa o del pecho. 'En el seno' es una solución literal y digna en español, manteniendo la imagen de ocultamiento.
- source_word: חֵמָה עַזָּה
  english_pob_choice: fierce wrath
  chosen_spanish: la furia intensa
  alternatives_spanish:
  - el ardor violento
  - la cólera vehemente
  - la ira feroz
  lexicon: HALOT
  rationale: La combinación intensifica la segunda cola más allá de 'ira'. 'Furia intensa' preserva el aumento de fuerza y el paralelismo escalar con el primer hemistiquio.
translation_notes:
  revision_awareness: El texto hebreo presenta un paralelismo contrastivo entre un regalo oculto que contiene la ira y un soborno oculto que provoca una furia más intensa. La versión española conserva esa escalada léxica con 'regalo' frente a 'soborno', y 'ira' frente a 'furia intensa', además de mantener el matiz de ocultamiento en ambos miembros.
  spanish_consistency_notes:
  - Se mantiene 'regalo' para מַתָּן y 'soborno' para שֹׁחַד para no borrar la oposición lexical documentada.
  - '''En secreto'' y ''en el seno'' preservan la imaginería de ocultamiento del hebreo.'
  - '''Ira'' y ''furia intensa'' reflejan la progresión semántica entre אָף y חֵמָה עַזָּה.'
