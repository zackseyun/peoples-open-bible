translation:
  language: es
  text: Entonces los levitas pondrán sus manos sobre las cabezas de los toros[a], y ofrecerás uno como ofrenda por el pecado y el otro como holocausto a Yahvé, para hacer expiación por los levitas.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «ofrenda de purificación» para חַטָּאת. El término hebreo puede designar la ofrenda asociada con el pecado y con la purificación en contextos sacerdotales.
    reason: lexical_alternative
lexical_decisions:
- source_word: יִסְמְכ֣וּ
  english_pob_choice: shall lay
  chosen_spanish: pondrán
  alternatives_spanish:
  - apoyarán
  - impondrán
  lexicon: HALOT
  rationale: En contexto sacrificial, סמך describe el gesto ritual de colocar las manos sobre la víctima. En español, «poner las manos sobre» comunica el acto con naturalidad y conserva la fuerza ritual sin volverlo técnico en exceso.
- source_word: יְדֵיהֶ֔ם
  english_pob_choice: their hands
  chosen_spanish: sus manos
  alternatives_spanish:
  - las manos de ellos
  lexicon: HALOT
  rationale: La referencia corporal directa se mantiene de forma literal y clara. «Sus manos» es la opción más natural en español contemporáneo.
- source_word: עַל רֹ֣אשׁ הַ/פָּרִ֑ים
  english_pob_choice: on the heads of the bulls
  chosen_spanish: sobre las cabezas de los toros
  alternatives_spanish:
  - sobre la cabeza de los toros
  - sobre las cabezas de los becerros
  lexicon: HALOT
  rationale: El hebreo usa un sustantivo singular en constructo con sentido distributivo. En español, el plural «las cabezas» refleja bien el gesto sobre dos animales. «Toros» sigue el valor léxico básico de פָּרִים; «becerros» sería posible en algunos contextos, pero aquí no es necesario.
- source_word: וַ֠/עֲשֵׂה
  english_pob_choice: and you shall offer
  chosen_spanish: ofrecerás
  alternatives_spanish:
  - harás
  - presentarás
  lexicon: HALOT
  rationale: En lenguaje sacrificial, עשה con una ofrenda como objeto se expresa de manera idiomática como «ofrecer». «Ofrecerás» conserva el mandato singular dirigido al oficiante.
- source_word: חַטָּ֜את
  english_pob_choice: sin offering
  chosen_spanish: ofrenda por el pecado
  alternatives_spanish:
  - ofrenda de expiación
  - ofrenda de purificación
  - ofrenda por el pecado
  lexicon: HALOT
  rationale: Para evitar un calco rígido y mantener la tensión léxica del hebreo sacerdotal, se usa una forma comprensible en español. «Ofrenda por el pecado» conserva el valor tradicional y permite la nota sobre la posible acepción de purificación.
- source_word: עֹלָה֙
  english_pob_choice: burnt offering
  chosen_spanish: holocausto
  alternatives_spanish:
  - ofrenda quemada
  - ofrenda totalmente quemada
  lexicon: HALOT
  rationale: «Holocausto» es el término cultual tradicional en español para עֹלָה y comunica de forma precisa la ofrenda totalmente consumida por el fuego. Aunque puede sonar histórico, sigue siendo claro y reconocible en registros bíblicos.
- source_word: לַֽ/יהוָ֔ה
  english_pob_choice: to Yahweh
  chosen_spanish: a Yahvé
  alternatives_spanish:
  - para Yahvé
  lexicon: HALOT
  rationale: Se preserva el nombre divino como «Yahvé» según la norma del proyecto. La preposición «a» expresa de modo natural la dirección/destinación cultual de la ofrenda en español.
- source_word: לְ/כַפֵּ֖ר
  english_pob_choice: to make atonement
  chosen_spanish: para hacer expiación
  alternatives_spanish:
  - para hacer propiciación
  - para expiar
  lexicon: HALOT
  rationale: כפר en contexto sacerdotal se traduce con el campo semántico de expiación/atonement. «Hacer expiación» es claro y mantiene el valor ritual sin imponer una sola teoría doctrinal; «expiar» sería posible pero algo más resumido.
- source_word: עַל הַ/לְוִיִּֽם
  english_pob_choice: for the Levites
  chosen_spanish: por los levitas
  alternatives_spanish:
  - a favor de los levitas
  - en favor de los levitas
  - por los levitas
  lexicon: HALOT
  rationale: Con כפר עַל, el sentido beneficiario se expresa bien con «por». Se conserva así la relación ritual de la expiación realizada en beneficio de los levitas.
theological_decisions:
- issue: Tratamiento del nombre divino יהוה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahveh
  - el SEÑOR
  rationale: El texto hebreo usa explícitamente el Tetragrámaton. Conforme a la terminología del proyecto, se mantiene el nombre propio divino en español como «Yahvé», evitando la sustitución por un título genérico.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה / YHWH'
- issue: Sentido sacrificial de חַטָּאת
  english_pob_reading: sin offering
  chosen_spanish_reading: ofrenda por el pecado
  alternative_spanish_readings:
  - ofrenda de purificación
  - ofrenda expiatoria
  rationale: El hebreo sacerdotal permite la asociación con pecado y purificación. En el texto principal se conserva una formulación inteligible y tradicional; la ambigüedad semántica se preserva mediante nota, sin borrar el trasfondo de purificación.
  doctrine_reference: Levítico 4; HALOT חטאת
- issue: Valor cultual de עֹלָה
  english_pob_reading: burnt offering
  chosen_spanish_reading: holocausto
  alternative_spanish_readings:
  - ofrenda totalmente quemada
  - ofrenda quemada
  rationale: «Holocausto» es un término bíblico consolidado en español para la ofrenda completamente consumida. Mantiene la referencia cultual sin necesidad de una perífrasis más larga.
  doctrine_reference: Levítico 1; HALOT עלה
translation_notes:
  revision_awareness: 'Concordante con el contexto auditado en inglés: se mantiene la estructura ritual de manos sobre los animales, la distribución entre dos ofrendas y la finalidad expiatoria. La principal adaptación española está en la naturalidad de «poner las manos sobre» y en el uso de términos cultuales establecidos («holocausto», «Yahvé», «expiación»). No se detectaron revisiones previas que requirieran ajuste adicional.'
  spanish_consistency_notes:
  - Se conserva el nombre divino como «Yahvé», conforme al estándar del proyecto.
  - «Holocausto» se usa como término técnico bíblico y no como uso moderno general.
  - La nota de pie preserva la alternativa semántica de חַטָּאת sin desplazar el texto principal.
  - Se mantuvo el mandato singular «ofrecerás», reflejando el interlocutor singular del hebreo.
  - La formulación «por los levitas» conserva el valor beneficiario de כפר עַל.
