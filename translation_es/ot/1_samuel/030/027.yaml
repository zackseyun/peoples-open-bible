lexical_decisions:
- source_word: לַאֲשֶׁר
  english_pob_choice: to those
  chosen_spanish: a los que estaban
  alternatives_spanish:
  - para los que estaban
  - a quienes estaban
  lexicon: HALOT
  rationale: En este listado distributivo, la construcción funciona como destinatarios/datos de envío. «A los que estaban» conserva el sentido direccional de ל y la referencia a personas ubicadas en cada lugar, con español natural.
- source_word: בְּבֵית אֵל
  english_pob_choice: in Bethel
  chosen_spanish: en Betel
  alternatives_spanish:
  - en Bet-el
  - en la casa de Dios
  lexicon: HALOT
  rationale: Aquí se trata del topónimo Betel, no de la expresión común «casa de Dios». En español bíblico la forma estable y clara es «Betel».
- source_word: בְּרָמוֹת נֶגֶב
  english_pob_choice: in Ramoth-negeb
  chosen_spanish: en Ramot-negeb
  alternatives_spanish:
  - en Ramot del Negueb
  - en Ramot del sur
  lexicon: HALOT
  rationale: Se conserva el topónimo compuesto sin interpretarlo demasiado. «Negueb» podría entenderse como nombre geográfico o como indicación direccional, pero la forma compacta mantiene mejor la ambigüedad documentada.
- source_word: בְּיַתִּר
  english_pob_choice: in Jattir
  chosen_spanish: en Jattir
  alternatives_spanish:
  - en Yattir
  - en Jatir
  lexicon: HALOT
  rationale: Es un nombre propio de lugar; se mantiene la transliteración convencional «Jattir» para correspondencia con el texto base y el uso bíblico en inglés.
- source_word: וְ
  english_pob_choice: and
  chosen_spanish: y
  alternatives_spanish:
  - e
  lexicon: HALOT
  rationale: Conjunción copulativa simple para enlazar el último elemento de la serie.
