  - severity: medium
    issue: «Prado» es menos preciso que «pasto/pastura» para מַרְעִיתֶךָ
    rationale: El hebreo y el English POB apuntan a la imagen de «pasture». «Prado» puede funcionar, pero desplaza la metáfora desde el cuidado pastoral hacia un paisaje más general.
