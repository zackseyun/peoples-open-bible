review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien el hebreo: mantiene la fórmula doxológica «Bendito sea», usa correctamente «Yahvé» para יהוה, conserva «el Dios de Israel», expresa la duración ilimitada de מֵהָעוֹלָם וְעַד הָעוֹלָם y preserva la repetición litúrgica «Amén y amén». La única desviación relevante es de estilo/puntuación: la apertura con signo de admiración no está motivada por el hebreo ni por el inglés auditado y resulta menos propia de una doxología bíblica continua.'
  spanish_quality_summary: El español es claro, digno y ampliamente legible. Sin embargo, «¡Bendito sea...» introduce un matiz exclamativo añadido. También conviene ajustar la nota para que la alternativa sea realmente distinta de la lectura principal y más natural en español. El resto suena bien y es fiel al registro litúrgico.
  glossary_alignment: 'La terminología del proyecto está bien alineada: יהוה → «Yahvé», אֱלֹהֵי יִשְׂרָאֵל → «el Dios de Israel», אָמֵן → «Amén». La formulación temporal puede conservarse como «desde la eternidad hasta la eternidad», que comunica bien la duración sin límites y evita la conjunción innecesaria en una expresión fija.'
  issues:
  - severity: medium
    issue: Signos de admiración añadidos en «¡Bendito sea...»
    rationale: Ni el hebreo ni la auditoría inglesa exigen un tono exclamativo. En español bíblico, la fórmula doxológica suena más natural y sobria sin signos de admiración.
  - severity: low
    issue: La nota al pie repite casi la misma formulación que el texto principal
    rationale: La alternativa «desde la eternidad hasta la eternidad» apenas difiere de «desde la eternidad y hasta la eternidad». Es preferible ofrecer una alternativa semánticamente útil, como «de eternidad en eternidad», o ajustar el texto principal para evitar redundancia.
  - severity: low
    issue: Conjunción innecesaria en «desde la eternidad y hasta la eternidad»
    rationale: Aunque comprensible, «y» hace la frase un poco más pesada. «Desde la eternidad hasta la eternidad» es más fluido y conserva el sentido.
  revised_spanish_text: Bendito sea Yahvé[a], el Dios de Israel, desde la eternidad hasta la eternidad. Amén y amén.
