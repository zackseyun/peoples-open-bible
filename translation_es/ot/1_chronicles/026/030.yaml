translation:
  language: es
  text: 'Para los hebronitas: Hasabías y sus hermanos[a], mil setecientos hombres capaces, estaban a cargo de la supervisión de Israel más allá del Jordán, hacia el occidente, para toda la obra de Yahvé y para el servicio del rey.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «más allá del Jordán hacia el occidente», es decir, en el lado occidental del Jordán.'
    reason: lexical_alternative
lexical_decisions:
- source_word: לַחֶבְרוֹנִי
  english_pob_choice: For the Hebronites
  chosen_spanish: Para los hebronitas
  alternatives_spanish:
  - Para el hebronita
  - Para el clan hebronita
  lexicon: HALOT
  rationale: El contexto es una lista administrativa/clánica, no un individuo aislado. El plural conserva el sentido grupal del hebreo y resulta natural en español.
- source_word: חֲשַׁבְיָהוּ
  english_pob_choice: Hashabiah
  chosen_spanish: Hasabías
  alternatives_spanish:
  - Jasabías
  - Hasabías
  lexicon: Convención onomástica bíblica
  rationale: Se translitera el nombre propio con forma castellana sobria y reconocible, sin añadir interpretación.
- source_word: וְאֶחָיו
  english_pob_choice: and his brothers
  chosen_spanish: y sus hermanos
  alternatives_spanish:
  - y sus parientes
  - y sus allegados
  lexicon: HALOT
  rationale: Se mantiene el término literal de parentesco. En este contexto de clan puede abarcar más que hermanos carnales, pero el hebreo dice 'hermanos' y conviene preservarlo.
- source_word: בְּנֵי חַיִל
  english_pob_choice: capable men
  chosen_spanish: hombres valientes
  alternatives_spanish:
  - hombres capaces
  - hombres de valor
  lexicon: HALOT
  rationale: La expresión puede denotar fuerza, competencia o valor. Aquí POB opta por una cualidad funcional; en español 'hombres valientes' conserva la fuerza del hebreo y sigue siendo idiomático en un contexto de servicio administrativo.
- source_word: אֶלֶף וּשְׁבַע מֵאוֹת
  english_pob_choice: 1,700
  chosen_spanish: mil setecientos
  alternatives_spanish:
  - '1.700'
  - mil setecientas
  lexicon: Numeral estándar
  rationale: Se expresa el número en forma natural para texto bíblico en español, concordando con 'hombres' en masculino implícito.
- source_word: עַל פְּקֻדַּת יִשְׂרָאֵל
  english_pob_choice: were in charge of the oversight of Israel
  chosen_spanish: estaban a cargo de la supervisión de Israel
  alternatives_spanish:
  - estaban encargados de la administración de Israel
  - tenían a su cargo la supervisión de Israel
  lexicon: HALOT
  rationale: פְּקֻדָּה aquí remite a supervisión/encargo/administración. 'Supervisión' conserva la idea de responsabilidad sin imponer una categoría burocrática moderna demasiado específica.
- source_word: מֵעֵבֶר לַיַּרְדֵּן מַעְרָבָה
  english_pob_choice: beyond the Jordan westward
  chosen_spanish: más allá del Jordán, hacia el occidente
  alternatives_spanish:
  - al oeste del Jordán
  - en la ribera occidental del Jordán
  lexicon: HALOT
  rationale: Se conserva la relación espacial del hebreo ('más allá... hacia el occidente') y se evita un giro demasiado interpretativo. 'Hacia el occidente' hace explícita la dirección que el hebreo añade.
- source_word: לְכֹל מְלֶאכֶת יְהוָה
  english_pob_choice: for all the work of Yahweh
  chosen_spanish: para toda la obra de Yahvé
  alternatives_spanish:
  - para todo el trabajo de Yahvé
  - para toda la tarea de Yahvé
  lexicon: HALOT
  rationale: מְלָאכָה puede ser obra, labor o tarea. 'Obra' es amplia, digna y adecuada al registro bíblico. Se mantiene 'Yahvé' para el nombre divino según la pauta del proyecto.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - SEÑOR
  - Jehová
  lexicon: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
  rationale: Se sigue la convención del proyecto de representar el Tetragrámaton con 'Yahvé', preservando el nombre personal divino y evitando la sustitución por un título.
- source_word: וְלַעֲבֹדַת הַמֶּלֶךְ
  english_pob_choice: and for the service of the king
  chosen_spanish: y para el servicio del rey
  alternatives_spanish:
  - y para la labor del rey
  - y para el trabajo del rey
  lexicon: HALOT
  rationale: עֲבֹדָה aquí es servicio/dedicación/función. 'Servicio del rey' es paralelo a 'obra de Yahvé' y distingue bien ambas esferas.
theological_decisions:
- issue: Rendering of the divine name יהוה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - Jehová
  rationale: El hebreo usa directamente el Tetragrámaton. La política del proyecto pide preservar el nombre divino en español como 'Yahvé', en vez de ocultarlo tras una sustitución litúrgica.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יהוה / YHWH → Yahvé'
translation_notes:
  revision_awareness: El texto inglés auditado fue revisado de 'west of the Jordan' a 'beyond the Jordan westward' para reflejar más de cerca el hebreo. La versión española conserva esa misma relación espacial con 'más allá del Jordán, hacia el occidente', y mantiene la distinción entre 'la obra de Yahvé' y 'el servicio del rey'.
  spanish_consistency_notes:
  - Se usa 'Yahvé' de forma consistente para יהוה.
  - '''Obra'' y ''servicio'' preservan el paralelismo entre las dos esferas de labor.'
  - '''Más allá del Jordán'' mantiene la referencia geográfica, mientras la nota aclara la equivalencia direccional.'
  - Se evitó 'SEÑOR' para no perder el nombre divino explícito del texto fuente.
