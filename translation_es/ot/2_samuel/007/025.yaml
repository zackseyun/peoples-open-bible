translation:
  language: es
  text: Y ahora[a], Yahvé Dios, confirma para siempre la palabra que has dicho acerca de tu siervo y acerca de su casa[b], y haz como has dicho.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'la promesa que has dicho'.
    reason: lexical_alternative
  - marker: b
    text: «Su casa» aquí tiene el sentido de su casa real o dinastía, no solo de su hogar o familia inmediata.
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  lexicon: HALOT
  rationale: Se conserva el nombre divino del Tetragrámaton como nombre propio, siguiendo el principio POB de no sustituirlo por un título. En español, "Yahvé" es la forma base coherente con el proyecto.
- source_word: אֱלֹהִים
  english_pob_choice: God
  chosen_spanish: Dios
  alternatives_spanish:
  - el Dios
  lexicon: HALOT
  rationale: En vocativo directo tras Yahvé, funciona como título divino común; "Dios" reproduce con naturalidad "Yahvé Dios" sin añadir artículo innecesario.
- source_word: הַדָּבָר
  english_pob_choice: the word
  chosen_spanish: la palabra
  alternatives_spanish:
  - la promesa
  - el asunto
  lexicon: HALOT
  rationale: Se mantiene el sustantivo básico "palabra" para no resolver interpretativamente la tensión entre palabra y promesa. El contexto permite la fuerza pactal sin abandonar el término hebreo.
- source_word: דִּבַּרְתָּ
  english_pob_choice: you have spoken
  chosen_spanish: has dicho
  alternatives_spanish:
  - has hablado
  - prometiste
  lexicon: HALOT
  rationale: En español, "decir" suena más natural y directo en la oración dirigida a Dios. No se intensifica a "prometiste" porque eso supera el valor léxico explícito de דבר, aunque la idea de promesa siga implícita en el contexto.
- source_word: עַל
  english_pob_choice: concerning
  chosen_spanish: acerca de
  alternatives_spanish:
  - sobre
  - en cuanto a
  lexicon: HALOT
  rationale: '"Acerca de" expresa el tema de lo dicho por Dios con registro claro y digno, equivalente funcional de "concerning".'
- source_word: עַבְדְּךָ
  english_pob_choice: your servant
  chosen_spanish: tu siervo
  alternatives_spanish:
  - tu esclavo
  lexicon: HALOT
  rationale: En este contexto de oración real, "siervo" comunica la fórmula reverente y se ajusta mejor al español eclesial. Se evita "esclavo" porque aquí el valor convencional de servicio humilde es el dominante y no el vínculo servil literal.
- source_word: בֵּיתוֹ
  english_pob_choice: his house
  chosen_spanish: su casa
  alternatives_spanish:
  - su dinastía
  - su familia
  lexicon: HALOT
  rationale: Se conserva la imagen de "casa", que es el término clave del pacto davídico. El sentido dinástico queda implícito y se explicita en nota para no perder el idiomático hebreo.
- source_word: הָקֵם
  english_pob_choice: confirm
  chosen_spanish: confirma
  alternatives_spanish:
  - establece
  - afirma
  lexicon: HALOT
  rationale: El imperativo hifil de קום expresa hacer que algo permanezca firme. "Confirma" comunica bien la idea de hacer quedar en pie la palabra dicha, sin desplazar el objeto al rey o a la casa solamente.
- source_word: עַד עוֹלָם
  english_pob_choice: forever
  chosen_spanish: para siempre
  alternatives_spanish:
  - eternamente
  - por siempre
  lexicon: HALOT
  rationale: '"Para siempre" es la equivalencia natural y solemne en español para el valor de perpetuidad de עוֹלָם.'
- source_word: וַעֲשֵׂה
  english_pob_choice: and do
  chosen_spanish: y haz
  alternatives_spanish:
  - y actúa
  - y cumple
  lexicon: HALOT
  rationale: Se conserva la brevedad imperativa del hebreo con "haz", evitando explicar de más la acción solicitada.
- source_word: כַּאֲשֶׁר דִּבַּרְתָּ
  english_pob_choice: as you have spoken
  chosen_spanish: como has dicho
  alternatives_spanish:
  - tal como has hablado
  - como lo has prometido
  lexicon: HALOT
  rationale: '"Como has dicho" mantiene la repetición verbal con naturalidad en español y deja abierta la fuerza de lo pronunciado por Dios sin convertirla explícitamente en "promesa".'
theological_decisions:
- issue: Cómo traducir הַדָּבָר en un contexto de alianza sin borrar la tensión entre palabra y promesa
  english_pob_reading: the word
  chosen_spanish_reading: la palabra
  alternative_spanish_readings:
  - la promesa
  - el asunto
  rationale: Se conserva el sustantivo "palabra" para reflejar el texto hebreo de modo transparente. El carácter de promesa pactal proviene del contexto de 2 Samuel 7 y no necesita ser reemplazado en el cuerpo del verso.
  doctrine_reference: 'Translation philosophy: original-language primacy; preserve lexical tension rather than resolving it.'
- issue: Cómo expresar בֵּיתוֹ en un pasaje davídico sin perder el sentido dinástico
  english_pob_reading: his house
  chosen_spanish_reading: su casa
  alternative_spanish_readings:
  - su dinastía
  - su familia
  rationale: '"Casa" conserva el término central del pacto davídico. La lectura dinástica es real y se documenta aparte, pero no se sustituye el idioma del texto por una explicación interpretativa en el cuerpo principal.'
  doctrine_reference: 'Translation philosophy: consistencia terminológica con excepción documentada.'
translation_notes:
  revision_awareness: El contexto inglés muestra acuerdo alto y sin revisiones aplicadas; esta versión sigue la lectura principal aprobada, conservando las dos notas alternativas ya documentadas y ajustando el español para naturalidad sin perder la transparencia del original.
  spanish_consistency_notes:
  - Se usa 'Yahvé' de forma consistente con el criterio del proyecto para יְהוָה.
  - '''la palabra'' mantiene la terminología clave y evita resolver prematuramente la posible fuerza de ''promesa''.'
  - '''casa'' conserva el término pactal central; la nota aclara el sentido dinástico.'
  - Se optó por 'siervo' en vez de 'esclavo' por el registro de oración real y por coherencia con el uso español eclesial cuando el contexto es honorífico.
