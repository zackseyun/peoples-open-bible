revisions:
- from: Y hizo lo malo delante de Yahvé[a], y no se avergonzó de las palabras dichas por Jeremías el profeta, de parte de la boca de Yahvé.
  to: Y hizo lo malo delante de Yahvé[a], y no se avergonzó de las palabras dichas por Jeremías el profeta, de la boca de Yahvé.
