translation:
  language: es
  text: Él y sus siervos se dividieron contra ellos[a] de noche, los abatieron y los persiguieron hasta Hobá[b], que está al norte de Damasco.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «dividió sus fuerzas contra ellos de noche». El hebreo puede describir una división táctica para un ataque sorpresa.
    reason: lexical_alternative
  - marker: b
    text: Literalmente, «a la izquierda de Damasco», un modismo que significa «al norte de Damasco».
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֵּחָלֵק
  english_pob_choice: divided themselves
  chosen_spanish: se dividieron
  alternatives_spanish:
  - dividieron sus fuerzas
  - se separaron
  lexicon: HALOT
  rationale: El nifal de חלק aquí tiene sentido reflexivo o pasivo con matiz táctico. «Se dividieron» conserva la idea verbal sin añadir explícitamente «fuerzas», aunque el contexto militar la presupone.
- source_word: עֲלֵיהֶם
  english_pob_choice: against them
  chosen_spanish: contra ellos
  alternatives_spanish:
  - sobre ellos
  - contra ellos en ataque
  lexicon: HALOT
  rationale: En contexto hostil, על expresa acción dirigida contra un adversario. «Contra ellos» es natural en español y mantiene el valor de oposición.
- source_word: לַיְלָה הוּא
  english_pob_choice: by night
  chosen_spanish: de noche
  alternatives_spanish:
  - por la noche
  - durante la noche
  lexicon: HALOT
  rationale: La expresión marca el momento del ataque. «De noche» es breve, natural y conserva el matiz táctico nocturno.
- source_word: וַעֲבָדָיו
  english_pob_choice: he and his servants
  chosen_spanish: él y sus siervos
  alternatives_spanish:
  - él y sus servidores
  - él y sus hombres
  lexicon: HALOT
  rationale: עֲבָדִים significa literalmente «siervos»/«esclavos», pero en este contexto son los dependientes de la casa de Abram. «Siervos» mantiene la relación de dependencia sin borrar el léxico hebreo; «hombres» sería más interpretativo.
- source_word: וַיַּכֵּם
  english_pob_choice: struck them down
  chosen_spanish: los derrotó
  alternatives_spanish:
  - los derribó
  - los golpeó
  lexicon: HALOT
  rationale: נכה puede significar golpear, herir o vencer. En español, «los derrotó» comunica el resultado bélico con claridad, sin sonar tan brusco o arcaico como «los hirió/los golpeó» en un relato de batalla.
- source_word: וַיִּרְדְּפֵם
  english_pob_choice: pursued them
  chosen_spanish: los persiguió
  alternatives_spanish:
  - los siguió persiguiendo
  - los fue persiguiendo
  lexicon: HALOT
  rationale: רדף se usa de persecución continua; «los persiguió» es la equivalencia más directa y natural en español.
- source_word: עַד חוֹבָה
  english_pob_choice: as far as Hobah
  chosen_spanish: hasta Joba
  alternatives_spanish:
  - hasta Hobá
  - hasta Hoba
  lexicon: HALOT
  rationale: עַד marca alcance o límite. Se conserva el nombre propio con adaptación ortográfica española («Joba») para una lectura más fluida, manteniendo la referencia geográfica.
- source_word: אֲשֶׁר מִשְּׂמֹאל לְדַמָּשֶׂק
  english_pob_choice: which is north of Damascus
  chosen_spanish: que está al norte de Damasco
  alternatives_spanish:
  - que está a la izquierda de Damasco
  lexicon: HALOT
  rationale: שׂמאל significa literalmente «izquierda», pero en orientación geográfica idiomáticamente indica «norte». «Al norte de Damasco» expresa el sentido pretendido en español claro; se preserva en nota la opción literal.
translation_notes:
  revision_awareness: La redacción sigue la revisión más reciente del POB inglés, que movió «by night» para reflejar con más naturalidad el orden hebreo, manteniendo el sentido militar y geográfico del versículo sin añadir información ajena al texto.
  spanish_consistency_notes:
  - Se conserva el nombre divino y la terminología teológica del proyecto cuando corresponda, aunque este versículo no contiene el Tetragrámaton ni vocabulario doctrinal clave.
  - Se prefirió un español sobrio y bíblico, pero sin arcaísmos innecesarios ni calcos del inglés.
  - Se mantiene la tensión lexical entre el sentido literal de חלק/רדף/שׂמאל y su equivalencia idiomática en español mediante nota.
