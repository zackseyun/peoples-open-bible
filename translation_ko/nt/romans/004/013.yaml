id: ROM.4.13
reference: Romans 4:13
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: Οὐ γὰρ διὰ νόμου ἡ ἐπαγγελία τῷ Ἀβραὰμ ἢ τῷ σπέρματι αὐτοῦ, τὸ κληρονόμον αὐτὸν ⸀εἶναι κόσμου, ἀλλὰ διὰ δικαιοσύνης πίστεως·
base_translation:
  language: en
  yaml_path: translation/nt/romans/004/013.yaml
  text: For the promise to Abraham or to his offspring that he would be heir of the world was not through the law[d][c][b][a], but through the righteousness of faith.
  footnotes:
  - marker: a
    text: 'Or ''seed.'' The Greek is singular but can function collectively: ''offspring'' or ''descendants.'''
    reason: lexical_alternative
  - marker: b
    text: Or 'through righteousness by faith' or 'through the righteousness that comes by faith.'
    reason: alternative_reading
  - marker: c
    text: '''Righteousness'' may also be rendered ''justice'' in Pauline contexts.'
    reason: lexical_alternative
  - marker: d
    text: '''Faith'' may also be rendered ''faithfulness'' or ''trust'' depending on context.'
    reason: lexical_alternative
translation:
  language: ko
  text: 이는 아브라함과 그의 후손에게 그가 세상의 상속자가 되리라 하신 약속이 율법을 통해서가 아니라 믿음의 의를 통해서 주어졌기 때문입니다.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ἐπαγγελία
  english_pob_choice: promise
  chosen_korean: 약속
  alternatives_korean:
  - 언약
  lexicon: BDAG
  rationale: 바울 신학의 핵심 「약속」을 유지한다.
- source_word: σπέρματι
  english_pob_choice: offspring
  chosen_korean: 후손
  alternatives_korean:
