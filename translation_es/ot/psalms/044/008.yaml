    issue: «nos has librado» para הוֹשַׁעְתָּנוּ
    rationale: Aunque es defendible, el hebreo y la auditoría inglesa priorizan «save/salvar». «Librado» desplaza un poco el centro semántico hacia liberación de peligro más que salvación directa.
  - severity: medium
    issue: «los que nos aborrecen» para מְשַׂנְאֵינוּ
    rationale: «Aborrecer» puede sonar más fuerte o más literario que el participio básico «odiar». El inglés auditado revisó precisamente hacia una formulación más natural; en español «los que nos odian» preserva mejor ese equilibrio.
  - severity: low
