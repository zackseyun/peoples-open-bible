  text: עֹ֣שֵֽׁק דָּ֭ל חֵרֵ֣ף עֹשֵׂ֑/הוּ וּ֝/מְכַבְּד֗/וֹ חֹנֵ֥ן אֶבְיֽוֹן׃
base_translation:
  language: en
  yaml_path: translation/ot/proverbs/014/031.yaml
  text: Whoever oppresses the poor insults his Maker[a], but whoever is gracious to the needy honors him.
  footnotes:
  - marker: a
    text: Or, 'but whoever honors the poor is gracious to the needy.' The Hebrew pronoun in 'honors him' can be read as referring either to the poor person or to his Maker; the main text takes it as referring to God because of the parallelism.
    reason: alternative_reading
