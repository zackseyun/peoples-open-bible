revisions:
- from: 'Porque dijeron[a]: «Un hombre, un sacerdote de la descendencia de Aarón, ha venido con las fuerzas[b], y no nos hará mal».'
  to: 'Porque dijeron: «Un hombre, un sacerdote de la descendencia de Aarón, ha venido con las fuerzas[a], y no nos agraviará».'
  rationale: Se elimina la nota innecesaria sobre el aoristo y se cambia «no nos hará mal» por «no nos agraviará» para reflejar mejor el sentido de ἀδικέω como tratar injustamente, sin perder naturalidad en español. Se conserva «de la descendencia de Aarón» como una forma idiomática y fiel del giro genealógico griego, y se mantiene la nota sobre «las fuerzas» porque preserva una alternativa útil y ya documentada.
