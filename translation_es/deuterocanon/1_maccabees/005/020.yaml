translation:
  language: es
  text: Y tres mil hombres fueron asignados a Simón para ir a Galilea, pero a Judas, ocho mil para Galaad.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ἐμερίσθησαν
  english_pob_choice: were assigned
  chosen_spanish: fueron asignados
  alternatives_spanish:
  - fueron divididos
  - fueron repartidos
  - fueron distribuidos
  lexicon: LSJ
  rationale: El pasivo de μερίζω aquí expresa una adjudicación o reparto de tropas a comandantes. «Fueron asignados» conserva la idea de asignación militar-administrativa sin introducir una imagen menos natural en español como «divididos».
- source_word: ἄνδρες
  english_pob_choice: men
  chosen_spanish: hombres
  alternatives_spanish:
  - soldados
  lexicon: LSJ
  rationale: El griego dice literalmente «hombres». En este contexto son combatientes, pero «hombres» preserva el dato del original sin añadir una glosa interpretativa.
- source_word: τρισχίλιοι
  english_pob_choice: three thousand
  chosen_spanish: tres mil
  alternatives_spanish:
  - tres mil hombres
  lexicon: LSJ
  rationale: Numeral directo y transparente; se integra naturalmente con el sustantivo explícito.
- source_word: τοῦ πορευθῆναι
  english_pob_choice: to go
  chosen_spanish: para ir
  alternatives_spanish:
  - para marchar
  - con el fin de ir
  lexicon: LSJ
  rationale: El infinitivo articular expresa propósito. «Para ir» es fiel y natural en español; «marchar» añadiría color militar no explicitado por el verbo.
- source_word: Γαλιλαίαν
  english_pob_choice: Galilee
  chosen_spanish: Galilea
  alternatives_spanish:
  - la Galilea
  lexicon: LSJ
  rationale: Nombre geográfico estándar en español bíblico; no requiere expansión.
- source_word: Ἰούδα
  english_pob_choice: Judas
  chosen_spanish: Judas
  alternatives_spanish:
  - Judá
  lexicon: LSJ
  rationale: Aquí λειτουργa como nombre propio del comandante en griego. «Judas» evita confundirlo con la región o tribu de Judá.
- source_word: ὀκτακισχίλιοι
  english_pob_choice: eight thousand
  chosen_spanish: ocho mil
  alternatives_spanish:
  - ocho mil hombres
  lexicon: LSJ
  rationale: Numeral directo y transparente.
- source_word: Γαλααδῖτιν
  english_pob_choice: Gilead
  chosen_spanish: Galaad
  alternatives_spanish:
  - Gilead
  - la región de Galaad
  lexicon: LSJ
  rationale: La forma española bíblica usual es «Galaad». Mantiene el referente geográfico del original sin usar una transliteración inglesa.
translation_notes:
  revision_awareness: El contexto inglés revisado ajustó el orden de la segunda cláusula para sonar más natural sin cambiar el sentido. En español, el orden «ocho mil hombres a Judas a Galaad» puede sonar algo elíptico, pero refleja de cerca la compacta construcción griega y evita añadir verbo o preposición no presente en el original.
  spanish_consistency_notes:
  - Se mantuvo «Simón» y «Judas» como nombres propios, siguiendo la forma griega y el uso bíblico español.
  - Se eligió «Galaad» en vez de «Gilead» para coherencia con la tradición bíblica española y la toponimia del target.
  - No se añadió nota textual porque el pasaje no presenta variante textual relevante en el paquete fuente.
