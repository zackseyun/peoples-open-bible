translation:
  text: She will be brought out before the assembly[a], and there will be an inspection concerning her children.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'there will be a visitation upon her children,' possibly implying judicial punishment rather than only examination.
    reason: alternative_reading
lexical_decisions:
- source_word: αὕτη
  chosen: She
  alternatives:
  - This woman
  - This one
  lexicon: LSJ
  rationale: The feminine demonstrative refers back to the adulterous woman in the immediate context. English pronoun 'she' is natural and sufficiently specific in context.
- source_word: ἐκκλησίαν
  chosen: assembly
  alternatives:
  - congregation
  - community
  lexicon: LSJ
  rationale: In Sirach this term denotes the gathered community rather than a later technical sense 'church.' 'Assembly' preserves the public, communal setting of judgment.
- source_word: ἐξαχθήσεται
  chosen: will be brought out before
  alternatives:
  - will be led out to
  - will be brought forth to
  lexicon: LSJ
  rationale: Future passive of ἐξάγω indicates public presentation/removal into view. 'Brought out before' captures both the passive and the judicial-public nuance in idiomatic English.
- source_word: ἐπὶ τὰ τέκνα αὐτῆς
  lemma: ἐπί
  chosen: concerning her children
  alternatives:
  - upon her children
  - against her children
  - over her children
  lexicon: LSJ
  rationale: The preposition ἐπί with this construction is somewhat flexible. In context it introduces the sphere/object of the ensuing visitation or inquiry. 'Concerning her children' avoids overcommitting to punitive force while preserving that the children are implicated in the public investigation.
- source_word: ἐπισκοπὴ
  chosen: inspection
  alternatives:
  - visitation
  - inquiry
  - oversight
  lexicon: LSJ
  rationale: ἐπισκοπή can mean visitation or inspection, sometimes with punitive/judicial overtones. Here the context is exposure of adultery and its consequences; 'inspection' communicates an official examination, especially of the children, without importing a specifically ecclesiastical sense.
- source_word: ἔσται
  chosen: there will be
  alternatives:
  - will occur
  - will take place
  lexicon: LSJ
  rationale: A simple future existential rendering best fits the Greek and keeps the sentence straightforward.
