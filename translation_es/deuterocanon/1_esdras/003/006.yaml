translation:
  language: es
  text: y a vestirse de púrpura[a], y a beber de vasos de oro, y a dormir sobre oro[b], y a tener un carro con bridas de oro[c], y un turbante de lino fino, y un collar alrededor del cuello.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «púrpura», en el sentido de vestiduras de color púrpura; el griego nombra la materia/color y deja implícita la prenda.
    reason: lexical_alternative
  - marker: b
    text: Literalmente, «dormir sobre oro»; probablemente alude a un lecho o diván adornado con oro, pero el griego es muy condensado.
    reason: lexical_alternative
  - marker: c
    text: O «un carro bridad[o] de oro» o «con aparejo de oro»; el adjetivo puede describir el carro por sus bridas o arnés de oro.
    reason: lexical_alternative
lexical_decisions:
- source_word: πορφύραν
  english_pob_choice: purple
  chosen_spanish: púrpura
  alternatives_spanish:
  - vestiduras púrpuras
  - púrpura real
  lexicon: LSJ
  rationale: El griego nombra la púrpura como material/colores de lujo y estatus; en español, «púrpura» conserva esa concisión y permite entender implícitamente la vestimenta introducida por el infinitivo «vestirse». No se añade «real» porque el texto no lo especifica.
- source_word: περιβαλέσθαι
  english_pob_choice: to put on
  chosen_spanish: vestirse
  alternatives_spanish:
  - ponerse
  - cubrirse con
  lexicon: LSJ
  rationale: El infinitivo medio expresa colocarse una prenda o envolverse con ella. «Vestirse» comunica bien la acción en español sin forzar un calco demasiado literal.
- source_word: ἐν χρυσώμασιν
  english_pob_choice: from gold vessels
  chosen_spanish: en vasos de oro
  alternatives_spanish:
  - de vasos de oro
  - en copas de oro
  lexicon: LSJ
  rationale: La construcción griega alude a beber usando objetos de oro, sin precisar la forma exacta. «Vasos de oro» mantiene la materialidad y el rango de lujo; «copas» sería posible, pero más específico de lo que el griego exige.
- source_word: πίνειν
  english_pob_choice: to drink
  chosen_spanish: beber
  alternatives_spanish:
  - tomar
  - beber de
  lexicon: LSJ
  rationale: Verbo simple y directo; «beber» es la equivalencia natural y fiel en la lista de acciones lujosas.
- source_word: ἐπὶ χρυσῷ καθεύδειν
  english_pob_choice: to sleep on gold
  chosen_spanish: dormir sobre oro
  alternatives_spanish:
  - dormir en oro
  - dormir sobre un lecho de oro
  lexicon: LSJ
  rationale: La expresión griega es comprimida y probablemente hiperbólica; «dormir sobre oro» preserva la literalidad y no introduce un mueble no nombrado. Se mantiene la tensión interpretativa sin explicarla en el texto principal.
- source_word: ἅρμα χρυσοχάλινον
  english_pob_choice: a chariot with gold bridles
  chosen_spanish: un carro con frenos de oro
  alternatives_spanish:
  - un carro con riendas de oro
  - un carro de bridas de oro
  lexicon: LSJ
  rationale: El compuesto apunta al arnés/brida del carro. En español, «frenos» puede abarcar el conjunto de la brida o rienda de tiro en un registro comprensible; «riendas» también es posible, pero «frenos de oro» conserva mejor la idea del adorno del aparejo sin añadir más de lo que el griego dice.
- source_word: κίδαριν βυσσίνην
  english_pob_choice: a turban of fine linen
  chosen_spanish: un turbante de lino fino
  alternatives_spanish:
  - una tiara de lino fino
  - un tocado de lino fino
  lexicon: LSJ
  rationale: κίδαρις designa un turbante o tocado alto; «turbante» es el término más claro y natural en español. «Lino fino» reproduce βύσσινος sin perder el matiz de material precioso.
- source_word: μανιάκην
  english_pob_choice: necklace
  chosen_spanish: un collar
  alternatives_spanish:
  - un collarillo
  - un adorno para el cuello
  lexicon: LSJ
  rationale: El término refiere a un ornamento para el cuello. Como el español común y digno para este contexto es «collar», se adopta esa forma; «adorno para el cuello» sería más descriptivo pero menos natural.
- source_word: περὶ τὸν τράχηλον
  english_pob_choice: around the neck
  chosen_spanish: alrededor del cuello
  alternatives_spanish:
  - en torno al cuello
  - sobre el cuello
  lexicon: LSJ
  rationale: La preposición y acusativo especifican la ubicación del adorno. «Alrededor del cuello» es idiomático y preciso en español.
translation_notes:
  revision_awareness: La revisión inglesa reciente ajustó solo el último objeto de 'neck-chain' a 'necklace'. En español se adoptó directamente una solución natural equivalente («collar») que evita un tecnicismo innecesario y mantiene el sentido ornamental del término griego.
  spanish_consistency_notes:
  - Se mantiene «púrpura» como sustantivo de color/material, no como color adjetival, porque el infinitivo ya sugiere la acción de vestirse.
  - Se conserva la tensión de «dormir sobre oro» sin desarrollar una explicación interpretativa en el cuerpo del texto.
  - «Frenos de oro» se usa para reflejar el arnés/brida del carro sin precisar más allá del griego.
  - No se emplea «SEÑOR» ni terminología teológica ajena al pasaje; el registro es descriptivo y de lujo cortesano.
