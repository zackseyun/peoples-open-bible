  text: וַ/יִּשָּׂא ל֣וֹט אֶת עֵינָ֗י/ו וַ/יַּרְא֙ אֶת כָּל כִּכַּ֣ר הַ/יַּרְדֵּ֔ן כִּ֥י כֻלָּ֖/הּ מַשְׁקֶ֑ה לִ/פְנֵ֣י שַׁחֵ֣ת יְהוָ֗ה אֶת סְדֹם֙ וְ/אֶת עֲמֹרָ֔ה כְּ/גַן יְהוָה֙ כְּ/אֶ֣רֶץ מִצְרַ֔יִם בֹּאֲ/כָ֖ה צֹֽעַר־־־־׀־־־׃
base_translation:
  language: en
  yaml_path: translation/ot/genesis/013/010.yaml
  text: Lot lifted up his eyes and saw all the plain of the Jordan[a], that all of it was well watered before Yahweh destroyed Sodom and Gomorrah, like the garden of Yahweh, like the land of Egypt[d][c][b], as you go toward Zoar.
