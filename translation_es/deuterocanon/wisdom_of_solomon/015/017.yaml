review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador capta bien el sentido general del griego: un ser mortal fabrica un objeto muerto con manos moralmente desviadas, y el fabricante es superior a aquello que reverencia porque tuvo vida, mientras esos objetos nunca la tuvieron. Sin embargo, hay dos desajustes con el rastro auditado de POB y con la precisión española: (1) la nota al pie está anclada en "mortal[a]" pero su contenido trata τῶν σεβασμάτων αὐτοῦ; el marcador debe ir en la frase pertinente, no en θνητός. (2) El cierre "pero aquellas nunca" queda elíptico de forma poco natural en español; conviene explicitar "vivieron" para preservar claramente el contraste de ἔζησεν / οὐδέποτε.'
  spanish_quality_summary: El español es generalmente claro y digno. "Fabrica una cosa muerta" y "con manos inicuas" son aceptables y legibles. "Las cosas que él venera" también funciona, aunque suena un poco menos directo que "las cosas que adora"; no obstante, es defendible por el matiz de σεβάσματα. El principal problema de calidad es la colocación errónea de la nota y la elipsis final poco idiomática.
  glossary_alignment: 'No hay conflicto con la terminología base del proyecto. Este versículo no activa términos como Yahvé/Mesías. Las decisiones léxicas principales concuerdan con el inglés POB: θνητός -> "mortal", νεκρόν -> "una cosa muerta", ἐργάζεται -> "fabrica", χερσὶν ἀνόμοις -> "con manos inicuas", κρείττων -> "es mejor". Para τῶν σεβασμάτων αὐτοῦ, "las cosas que él venera" preserva el sentido, con una nota alternativa útil; solo debe reubicarse el anclaje.'
  issues:
  - severity: high
    issue: La nota al pie está anclada en la palabra equivocada.
    rationale: El marcador [a] aparece en "mortal[a]", pero la nota explica una alternativa para τῶν σεβασμάτων αὐτοῦ ("las cosas que él adora"). Según las reglas del proyecto, el marcador debe aparecer exactamente en la palabra o frase relevante.
  - severity: medium
    issue: El final "pero aquellas nunca" suena incompleto en español.
    rationale: Aunque refleja el inglés "never did", en español el verbo elidido no se recupera con suficiente naturalidad. "Pero aquellas nunca vivieron" comunica con mayor claridad el contraste con "una vez vivió" sin añadir sentido ajeno.
  revised_spanish_text: Pero siendo mortal, fabrica una cosa muerta con manos inicuas; porque es mejor que las cosas que él venera[a], ya que él mismo una vez vivió, pero aquellas nunca vivieron.
  revised_footnotes:
  - marker: a
    text: 'O: "las cosas que él adora" para traducir con más literalidad τῶν σεβασμάτων αὐτοῦ.'
    reason: lexical_alternative
  revision_rationale: Se reubica la nota al pie al sintagma que realmente comenta, en conformidad con las reglas de anclaje del proyecto, y se explicita "vivieron" al final para que el español suene natural y preserve con claridad el contraste del griego entre el hombre que sí tuvo vida y los objetos que nunca la tuvieron.
