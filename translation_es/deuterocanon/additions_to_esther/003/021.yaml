translation:
  language: es
  text: No entregues, Yahvé, tu cetro[a] a los que no existen, y no permitas que se burlen de nuestra caída; más bien, vuelve su plan contra ellos, y haz escarmiento del que comenzó este ataque contra nosotros.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «a los que no son nada» o «a los no existentes». El griego dice literalmente «a los que no existen».
    reason: lexical_alternative
lexical_decisions:
- source_word: μὴ παραδῷς
  english_pob_choice: Do not hand over
  chosen_spanish: No entregues
  alternatives_spanish:
  - No entregues en manos de
  - No abandones
  lexicon: BDAG
  rationale: παραδίδωμι expresa ceder o poner algo en manos de otro. En español, "entregar" comunica bien la acción de ceder el poder o la posesión del cetro sin sonar excesivamente técnico.
- source_word: τὸ σκῆπρόν σου
  english_pob_choice: your scepter
  chosen_spanish: tu cetro
  alternatives_spanish:
  - tu vara real
  - tu bastón real
  lexicon: LSJ
  rationale: σκῆπτρον nombra literalmente el cetro como emblema de autoridad real. "Cetro" conserva la imagen concreta y la carga de soberanía mejor que una abstracción como "poder".
- source_word: τοῖς μὴ οὖσιν
  english_pob_choice: to those who do not exist
  chosen_spanish: a los que no existen
  alternatives_spanish:
  - a los que no son nada
  - a los no existentes
  lexicon: LSJ
  rationale: La frase griega es literalmente "a los que no son". Se mantiene el filo retórico con "no existen" para preservar la tensión del texto, sin suavizarlo a una paráfrasis interpretativa.
- source_word: μὴ καταγελασάτωσαν
  english_pob_choice: do not let them gloat
  chosen_spanish: no permitas que se burlen
  alternatives_spanish:
  - no dejes que se mofan
  - no permitas que se rían con desprecio
  lexicon: BDAG
  rationale: καταγελάω puede significar reírse de, burlarse o mofarse. En este contexto de triunfo hostil sobre la caída del pueblo, "se burlen" reproduce bien el desprecio y la humillación pública.
- source_word: ἐν τῇ πτώσει ἡμῶν
  english_pob_choice: over our downfall
  chosen_spanish: de nuestra caída
  alternatives_spanish:
  - en nuestra caída
  - de nuestra ruina
  lexicon: BDAG
  rationale: πτῶσις significa literalmente "caída". En español, "caída" conserva la imagen básica; "nuestra ruina" sería más interpretativo, así que se evita.
- source_word: στρέψον τὴν βουλὴν αὐτῶν ἐπʼ αὐτούς
  english_pob_choice: turn their plan against them
  chosen_spanish: vuelve su plan contra ellos
  alternatives_spanish:
  - gira su consejo contra ellos
  - reviérteles su plan
  lexicon: BDAG
  rationale: βουλή puede ser consejo, propósito o plan. "Plan" es natural y claro en español; "volver ... contra ellos" expresa bien el sentido de inversión hostil de ἐπʼ αὐτούς.
- source_word: τὸν δὲ ἀρξάμενον
  english_pob_choice: the one who began this attack
  chosen_spanish: al que comenzó este ataque
  alternatives_spanish:
  - al que inició esto
  - al que tomó la iniciativa contra nosotros
  lexicon: BDAG
  rationale: ἀρξάμενον indica a quien inició la acción. Se explicita "este ataque" siguiendo el contexto hostil del pasaje, como hace el POB inglés, sin añadir detalles no presentes en el griego.
- source_word: ἐφʼ ἡμᾶς
  english_pob_choice: against us
  chosen_spanish: contra nosotros
  alternatives_spanish:
  - sobre nosotros
  - hacia nosotros
  lexicon: BDAG
  rationale: Con sentido hostil, ἐπί con acusativo se traduce naturalmente como "contra". Esto mantiene la fuerza adversativa del griego.
- source_word: παραδειγμάτισον
  english_pob_choice: make an example of
  chosen_spanish: avergüenza
  alternatives_spanish:
  - hazlo ejemplo de escarmiento
  - expón públicamente
  lexicon: BDAG
  rationale: παραδειγματίζω puede significar exponer públicamente o convertir en escarmiento. Dado el valor de juicio público en una súplica imprecatoria, "avergüenza" comunica la idea de deshonra pública con sobriedad; como alternativa interpretativa cercana, el español admite también "hacer escarmiento".
theological_decisions:
- issue: Sentido de τοῖς μὴ οὖσιν
  english_pob_reading: those who do not exist
  chosen_spanish_reading: los que no existen
  alternative_spanish_readings:
  - los no existentes
  - los que no son nada
  rationale: Se conserva la literalidad áspera del griego para no resolver la tensión teológica ni convertirla en una explicación moralizante. La frase queda lo bastante extraña para transmitir el desprecio retórico del original.
  doctrine_reference: Preservar la tensión teológica y retórica del texto sin suavizarla.
translation_notes:
  revision_awareness: El borrador sigue el pasaje griego normalizado de Esther añadida 3:21 y se alinea con el audit trail inglés sin depender de una traducción mecánica. Se preservan las imágenes concretas (cetro, caída, plan, escarnio) y la dureza de τοῖς μὴ οὖσιν, con una solución española natural y publicable.
  spanish_consistency_notes:
  - Se mantiene "Yahvé" para el nombre divino conforme al criterio del proyecto.
  - '"cetro" conserva el emblema real sin abstraerlo a poder o dominio.'
  - '"no existen" reproduce la literalidad de τοῖς μὴ οὖσιν y deja intacta su tensión.'
  - '"contra nosotros" refleja el valor hostil de ἐφʼ ἡμᾶς.'
  - '"avergüenza" se usa para la exposición humillante sugerida por παραδειγμάτισον sin recurrir a un tecnicismo poco natural en español.'
