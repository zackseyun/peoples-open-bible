translation:
  language: es
  text: Porque las montañas le ofrecen alimento,[a] y todos los animales salvajes del campo[b] juegan allí.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «le producen alimento». El hebreo admite la idea de «producir» o «ofrecer» sustento.'
    reason: lexical_alternative
  - marker: b
    text: 'Tradicional: «y todas las fieras del campo juegan allí».'
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Ya que
  - Porque, en efecto
  lexicon: HALOT
  rationale: La partícula introduce aquí una explicación de lo dicho antes, no una causa estrictamente causal en español; «Porque» comunica bien esa relación explicativa con naturalidad.
- source_word: בּוּל
  english_pob_choice: food
  chosen_spanish: alimento
  alternatives_spanish:
  - produce
  - fruto
  - comida
  lexicon: HALOT
  rationale: בּוּל denota producto o provisión de la tierra; en este contexto, «alimento» mantiene la idea de sustento que las montañas aportan al animal sin volverlo técnico ni agrícola de más.
- source_word: הָרִים
  english_pob_choice: the mountains
  chosen_spanish: las montañas
  alternatives_spanish:
  - los montes
  - las colinas
  lexicon: HALOT
  rationale: El sustantivo plural definido se refiere de manera directa a las montañas como región de provisión. «Montañas» es la equivalencia más clara y fiel.
- source_word: יִשְׂאוּ לוֹ
  english_pob_choice: bear food for him
  chosen_spanish: le dan alimento
  alternatives_spanish:
  - le producen alimento
  - le llevan alimento
  - le proveen alimento
  lexicon: HALOT
  rationale: El hebreo combina נשא con בּוּל en una expresión idiomática de provisión o producción. En español, «le dan alimento» preserva la idea de que las montañas abastecen al animal sin forzar una imagen demasiado literal o extraña.
- source_word: וְכָל
  english_pob_choice: and all
  chosen_spanish: y todos
  alternatives_spanish:
  - y cada
  - y toda
  lexicon: HALOT
  rationale: La forma colectiva/distributiva queda bien en español con «todos», que enlaza naturalmente con el sustantivo colectivo siguiente.
- source_word: חַיַּת הַשָּׂדֶה
  english_pob_choice: the wild animals of the field
  chosen_spanish: los animales del campo
  alternatives_spanish:
  - las fieras del campo
  - las bestias del campo
  - los animales salvajes del campo
  lexicon: HALOT
  rationale: La expresión hebrea designa a los animales salvajes terrestres. Aquí «animales del campo» es una opción sobria y comprensible; «salvajes» puede añadirse como matiz, pero no es obligatorio porque el contexto ya contrasta con un entorno no doméstico.
- source_word: יְשַׂחֲקוּ
  english_pob_choice: play
  chosen_spanish: juegan
  alternatives_spanish:
  - retozan
  - juguetean
  - juegan allí
  lexicon: HALOT
  rationale: El verbo expresa actividad lúdica o juguetona. «Juegan» es el equivalente más natural en español; conserva el tono vívido sin volverlo demasiado literario o arcaico.
- source_word: שָׁם
  english_pob_choice: there
  chosen_spanish: allí
  alternatives_spanish:
  - allá
  - en ese lugar
  lexicon: HALOT
  rationale: El adverbio locativo se refiere al lugar descrito por el verso. «Allí» suena natural y mantiene la referencia espacial precisa.
translation_notes:
  revision_awareness: El audit trail inglés quedó sin revisiones aplicadas y con alto acuerdo; por eso la versión española sigue de cerca la lectura base y solo ajusta la expresión para que suene natural en español, sin perder la imagen de provisión de las montañas ni el matiz lúdico de los animales del campo.
  spanish_consistency_notes:
  - Se mantuvo «Dios/Yahvé» fuera de este versículo porque no aparecen en el texto.
  - Se evitó «SEÑOR» y otras formas de sustitución porque no corresponden al pasaje.
  - Se prefirió un registro bíblico claro y actual, sin arcaísmos innecesarios.
  - El marcador [a] en el texto señala una alternativa léxica real del hebreo para בּוּל y יִשְׂאוּ לוֹ; [b] preserva la alternativa tradicional documentada en el audit trail inglés.
