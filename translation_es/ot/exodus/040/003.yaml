revisions:
- from: Y pondrás allí el arca del testimonio[a], y cubrirás[b] el arca con la cortina.
  to: Y pondrás allí el arca del testimonio[a], y pondrás delante del arca la cortina[b].
  rationale: Se reemplaza 'cubrirás ... con la cortina' por 'pondrás delante del arca la cortina' para expresar en español la función de separación/pantalla documentada en el expediente fuente, evitando la lectura de una cobertura material sobre el arca. Se mantiene 'arca del testimonio' por fidelidad al hebreo עֵדוּת. También se conserva en nota la alternativa tradicional 'velo' para פָּרֹכֶת, en línea con el POB inglés.
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T21:28:20Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador acierta en los elementos principales: mantiene el mandato secuencial, conserva ''allí'', traduce אֲרוֹן הָעֵדוּת como ''el arca del testimonio'' y reconoce que הַפָּרֹכֶת es la cortina interior. Sin embargo, ''cubrirás el arca con la cortina'' sugiere en español que la cortina se pone encima del arca como cobertura física, mientras que el hebreo וְסַכֹּתָ עַל הָאָרֹן אֶת הַפָּרֹכֶת, según el propio expediente POB, describe la función de pantalla/separación de la cortina ante el arca. Conviene ajustar el verbo principal para preservar mejor esa función espacial en español.'
  spanish_quality_summary: El español es claro y natural en general. 'Pondrás allí' funciona, aunque 'colocarás' sería un poco más formal; no es necesario cambiarlo. La principal dificultad de legibilidad y fidelidad está en 'cubrirás', que en español moderno activa la lectura equivocada de tapar materialmente el arca. 'Pondrás la cortina delante del arca' o 'resguardarás el arca con la cortina' mejora la comprensión, pero la primera refleja mejor la función arquitectónica sin sonar forzada.
  glossary_alignment: 'Buen alineamiento con la terminología POB en ''arca del testimonio'' frente a la fórmula tradicional ''arca del pacto''. También es adecuada la elección de ''cortina'' como término principal con nota para ''velo''. No hay conflicto con términos de proyecto como Yahvé, Mesías, etc. La excepción problemática es lexical: el inglés POB documentó ''screen'' precisamente para evitar la idea de mera cobertura; el español debería reflejar esa misma decisión, no neutralizarla con ''cubrir''.'
  issues:
  - severity: medium
    issue: '''cubrirás'' debilita y potencialmente distorsiona el sentido de וְסַכֹּתָ en este contexto cultual.'
    rationale: El expediente fuente explica que la cortina no se coloca sobre el arca como paño, sino que la separa/oculta espacialmente. En español, 'cubrir el arca con la cortina' normalmente se entiende como taparla físicamente.
  - severity: low
    issue: La nota [b] explica bien el matiz, pero no corrige del todo la posible mala lectura del texto principal.
    rationale: La filosofía POB prioriza que el sentido principal esté en el texto, no relegado a la nota cuando la formulación principal puede inducir a error.
  - severity: low
    issue: Falta preservar en nota la alternativa tradicional 'velo' para פָּרֹכֶת, que el expediente inglés sí conserva.
    rationale: El inglés POB incluye nota explícita 'Or “veil.”' Dado el peso intertextual de 'velo' en tradición bíblica, conviene reflejarlo también en español.
  revised_spanish_text: Y pondrás allí el arca del testimonio[a], y pondrás delante del arca la cortina[b].
  revised_footnotes:
  - marker: a
    text: Tradicionalmente, en algunas versiones, 'el arca del pacto', pero el hebreo aquí dice 'del testimonio'.
    reason: alternative_reading
  - marker: b
    text: O 'el velo'. El hebreo פָּרֹכֶת se refiere a la cortina interior del tabernáculo que hacía separación delante del arca.
    reason: lexical_alternative
  revision_rationale: Se reemplaza 'cubrirás ... con la cortina' por 'pondrás delante del arca la cortina' para expresar en español la función de separación/pantalla documentada en el expediente fuente, evitando la lectura de una cobertura material sobre el arca. Se mantiene 'arca del testimonio' por fidelidad al hebreo עֵדוּת. También se conserva en nota la alternativa tradicional 'velo' para פָּרֹכֶת, en línea con el POB inglés.
