translation:
  language: es
  text: Ahora, sus hijos, los muchos pronunciamientos[a] contra él, y la reconstrucción de la casa de Dios—he aquí, están escritas en el Midrash del Libro de los Reyes[b]. Y Amasías, su hijo, reinó en su lugar.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O posiblemente: «la grandeza de la carga sobre él», «la abundancia del pronunciamiento contra él», o incluso «el pesado tributo impuesto sobre él». La frase hebrea es difícil, y מַשָּׂא puede significar «carga», «oráculo» o, en algunos contextos, una carga impuesta.'
    reason: lexical_alternative
  - marker: b
    text: «Midrash» aquí probablemente significa un registro interpretativo, una exposición o un comentario asociado con el Libro de los Reyes.
    reason: cultural_note
lexical_decisions:
- source_word: וּבָנָיו
  english_pob_choice: Now his sons
  chosen_spanish: Ahora, sus hijos
  alternatives_spanish:
  - Y sus hijos
  - Pues sus hijos
  - Ahora bien, sus hijos
  lexicon: HALOT
  rationale: El waw inicial funciona como enlace de cierre narrativo. 'Ahora' conserva ese valor discursivo en español sin volver la frase mecánica. 'Sus hijos' sigue de cerca el sufijo posesivo de tercera masculina singular.
- source_word: וְרֹב הַמַּשָּׂא עָלָיו
  english_pob_choice: the many pronouncements against him
  chosen_spanish: las muchas declaraciones contra él
  alternatives_spanish:
  - la abundancia de la declaración contra él
  - la gran carga sobre él
  - las muchas profecías contra él
  lexicon: HALOT
  rationale: La frase es difícil y ambigua. En este contexto historiográfico, 'declaraciones' conserva la amplitud semántica sin imponer 'profecías' de manera demasiado específica. 'Contra él' expresa la relación adversativa que el inglés POB también destacó.
- source_word: וִיסוֹד
  english_pob_choice: the rebuilding of
  chosen_spanish: la reconstrucción de
  alternatives_spanish:
  - el establecimiento de
  - la restauración de
  - la reedificación de
  lexicon: HALOT
  rationale: El pasaje se refiere al trabajo sobre la casa de Dios; por eso 'reconstrucción' refleja mejor el sentido contextual que una noción más abstracta como 'fundación'. Mantiene la relación con el edificio/obra material indicada por el audit trail inglés.
- source_word: בֵּית הָאֱלֹהִים
  english_pob_choice: the house of God
  chosen_spanish: la casa de Dios
  alternatives_spanish:
  - el templo de Dios
  lexicon: HALOT
  rationale: Se conserva la imagen hebrea directa 'casa de Dios', en línea con la transparencia del POB. 'Templo' es posible en español, pero estrecha el alcance semántico del hebreo.
- source_word: הִנָּם כְּתוּבִים
  english_pob_choice: behold, they are written
  chosen_spanish: he aquí, están escritas
  alternatives_spanish:
  - mira, están escritas
  - en verdad, están escritas
  lexicon: HALOT
  rationale: '''He aquí'' reproduce la deixis enfática de הִנָּם en un registro bíblico natural. Se usa el plural femenino ''escritas'' porque remite a las realidades mencionadas en la serie previa: hijos/declaraciones/reconstrucción.'
- source_word: עַל מִדְרַשׁ סֵפֶר הַמְּלָכִים
  english_pob_choice: in the Midrash of the Book of the Kings
  chosen_spanish: en el Midrash del Libro de los Reyes
  alternatives_spanish:
  - en la exposición del Libro de los Reyes
  - en el comentario sobre el Libro de los Reyes
  lexicon: HALOT
  rationale: '''Midrash'' se conserva como préstamo transliterado, porque el término señala un tipo de registro interpretativo que no conviene reducir prematuramente. ''Libro de los Reyes'' sigue la forma del texto fuente sin sustituirla por una designación canónica más interpretativa.'
- source_word: וַיִּמְלֹךְ ... תַּחְתָּיו
  english_pob_choice: And Amaziah his son reigned in his place
  chosen_spanish: Y Amasías, su hijo, reinó en su lugar
  alternatives_spanish:
  - Y Amasías, su hijo, fue rey en su lugar
  - Y Amasías, su hijo, reinó en vez de él
  lexicon: HALOT
  rationale: La fórmula de sucesión real se vierte con el giro español natural 'reinó en su lugar', que preserva la idea de reemplazo dinástico sin añadir matices no presentes en el hebreo.
theological_decisions:
- issue: Naturaleza de מַּשָּׂא (massa') en un resumen histórico
  english_pob_reading: the many pronouncements against him
  chosen_spanish_reading: las muchas declaraciones contra él
  alternative_spanish_readings:
  - las muchas profecías contra él
  - la gran carga sobre él
  - los muchos oráculos contra él
  rationale: No se debe cerrar el término en una sola lectura dogmática. En español, 'declaraciones' mantiene la amplitud semántica del hebreo y evita forzar una identificación exclusiva con profecía oracular o con tributo/carga material.
  doctrine_reference: None
- issue: Sentido de וִיסוֹד respecto a la obra en la casa de Dios
  english_pob_reading: the rebuilding of the house of God
  chosen_spanish_reading: la reconstrucción de la casa de Dios
  alternative_spanish_readings:
  - la fundación de la casa de Dios
  - la restauración de la casa de Dios
  - la reedificación de la casa de Dios
  rationale: El contexto inmediato habla de obras sobre el edificio sagrado, por lo que 'reconstrucción' comunica mejor la acción concreta sin perder la referencia al fundamento/establecimiento que también puede sugerir la raíz.
  doctrine_reference: None
translation_notes:
  revision_awareness: Se tuvo en cuenta la última revisión del audit trail inglés, que prefirió 'pronouncements' frente a 'oracles' y 'rebuilding' frente a 'founding'. En español se siguió esa revisión al optar por 'declaraciones' y 'reconstrucción', manteniendo la cautela ante la ambigüedad de מַשָּׂא y el sentido contextual de וִיסוֹד.
  spanish_consistency_notes:
  - Se mantiene 'casa de Dios' en vez de 'templo de Dios' para conservar la transparencia hebrea del POB.
  - Se conserva 'Midrash' transliterado, con nota explicativa, para no perder el valor técnico del término.
  - Se usa 'Amasías' como forma española estable del nombre propio.
  - Se preserva el orden narrativo resumitivo con 'Ahora' al inicio, equivalente funcional de 'Now' en el audit trail inglés.
