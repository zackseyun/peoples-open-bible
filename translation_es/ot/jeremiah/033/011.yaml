base_translation:
  language: en
  yaml_path: translation/ot/jeremiah/033/011.yaml
  text: the sound of joy and the sound of gladness[a], the sound of the bridegroom and the sound of the bride, the sound of those saying, ‘Give thanks to Yahweh of hosts, for Yahweh is good, for his steadfast love endures forever,’ and of those bringing a thank offering into the house of Yahweh. For I will restore the fortunes of the land as at first[b], says Yahweh.
  footnotes:
  - marker: a
    text: Or 'his mercy endures forever' or 'his covenant faithfulness endures forever' for 'his steadfast love endures forever.'
    reason: lexical_alternative
  - marker: b
    text: Or 'I will restore the captivity of the land'; the Hebrew idiom can refer either to the return of captives or more broadly to the restoration of fortunes.
    reason: alternative_reading
