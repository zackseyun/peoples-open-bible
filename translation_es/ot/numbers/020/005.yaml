base_translation:
  language: en
  yaml_path: translation/ot/numbers/020/005.yaml
  text: And why have you brought us up out of Egypt to bring us into this evil place? It is not a place of grain[a], or figs, or vines, or pomegranates[c][b], and there is no water to drink.
  footnotes:
  - marker: a
    text: Hebrew 'a place of seed' may mean a place fit for sowing or a place producing grain/crops.
    reason: lexical_alternative
  - marker: b
    text: Or 'this bad place' or 'this miserable place'; 'evil' here describes the place as harmful or undesirable, not necessarily morally evil.
    reason: lexical_alternative
  - marker: c
    text: Or 'fig trees' and 'grapevines.'
    reason: lexical_alternative
