  to: 'David dijo a Ahimelec, el sacerdote: «El rey me ha encargado un asunto y me dijo[a]: “Que ningún hombre sepa nada del asunto para el cual te envío y sobre el cual te he encargado”. Y he dirigido a los jóvenes a cierto lugar[b]».'
  rationale: La revisión corrige calcos no idiomáticos y mantiene la fidelidad al hebreo y al razonamiento léxico del POB. Se conserva «ningún hombre» para reflejar אִישׁ, pero en una construcción española natural. Se repara la segunda ocurrencia de צוה con una formulación comprensible en español. Se restituye mejor el modismo final con «cierto lugar» y su nota correspondiente. También se reordenan las notas para que sus marcadores coincidan con los anclajes reales del texto.
