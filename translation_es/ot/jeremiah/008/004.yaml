revisions:
- from: 'Dirás a ellos[a]: «Así dice Yahvé: ¿Caerán los hombres y no se levantarán? ¿Se volverá uno y no volverá?»'
  to: 'Les dirás: «Así dice Yahvé: ¿Cae la gente y no vuelve a levantarse? ¿Se aparta alguien[a] y no regresa?»'
  rationale: Se corrige el calco «a ellos» por el español natural «Les dirás». Se reformula la primera pregunta como proverbio general más idiomático. En la segunda, «se aparta» comunica mejor el primer שוב, mientras «regresa» mantiene el sentido del segundo; la nota conserva la alternativa más cercana a la repetición hebrea.
