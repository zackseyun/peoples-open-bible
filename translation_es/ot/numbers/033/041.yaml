    issue: Uso no idiomático de «de el monte Hor»
    rationale: En español estándar, la contracción «de el» > «del» es obligatoria en este contexto. Mantener «de el» para transparentar la forma hebrea produce una construcción antinatural y contraria al estilo meta.
  revised_spanish_text: Partieron del monte Hor y acamparon en Zalmoná.
  revision_rationale: Se corrige la contracción obligatoria «de el» a «del» para ajustarse a la gramática y naturalidad del español, sin alterar el sentido del hebreo ni las decisiones léxicas principales.
