    rationale: φύλον aquí designa al pueblo judío como colectividad étnica/nacional. «Tribu» en español suena demasiado estrecho y cambia el referente; además el demostrativo «esa» no está motivado por el texto.
  - severity: medium
    issue: «acerca de ellos» para περὶ αὐτούς
    rationale: Aunque literalmente posible, en español con «seguridad nocturna» resulta poco idiomático. El sentido es de medidas de seguridad respecto de ellos/en torno a ellos.
