base_translation:
  language: en
  yaml_path: translation/ot/leviticus/004/003.yaml
  text: If the anointed priest sins[a], bringing guilt on the people, then he shall present for the sin that he has committed a bull, a son of the herd, without blemish[b], to Yahweh as a sin offering.
  footnotes:
