translation:
  language: es
  text: Él dará entendimiento[a] a tu corazón, y lo que has deseado te hará sabio.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Paralelo griego: «él mismo fortalecerá tu corazón, y el deseo de tu sabiduría te será dado». El hebreo aquí dice: «Él dará entendimiento a tu corazón, y lo que has deseado te hará sabio».'
    reason: alternative_reading
lexical_decisions:
- source_word: וְהוּא / αὐτός
  english_pob_choice: He / he himself
  chosen_spanish: Él
  alternatives_spanish:
  - él mismo
  - ese mismo
  lexicon: HALOT; LXX parallel
  rationale: El hebreo y el paralelo griego presentan un sujeto personal masculino singular. En español, «Él» conserva la referencia personal y puede leerse naturalmente como el Señor sin añadir una glosa innecesaria en el cuerpo del texto.
- source_word: יָבִין / στηριεῖ
  english_pob_choice: will give understanding / will strengthen
  chosen_spanish: dará entendimiento
  alternatives_spanish:
  - hará comprender
  - fortalecerá
  lexicon: HALOT; BDAG/LSJ parallel sense
  rationale: El hebreo transmite una causación de entendimiento, mientras que el griego paralelo dice «fortalecerá tu corazón». «Dará entendimiento» sigue de cerca la lectura hebrea principal y deja visible, en la nota, la tensión con el paralelo griego.
- source_word: לִבֶּךָ
  english_pob_choice: your heart
  chosen_spanish: tu corazón
  alternatives_spanish:
  - tu mente
  - tu interior
  lexicon: HALOT
  rationale: «Corazón» conserva la antropología bíblica del hebreo para el centro del pensar y querer. En español moderno es claro y no reduce el sentido a mera emoción.
- source_word: וַאֲשֶׁר אִוִּיתָה
  english_pob_choice: what you have desired
  chosen_spanish: lo que has deseado
  alternatives_spanish:
  - lo que deseas
  - aquello que has anhelado
  lexicon: HALOT
  rationale: La relativa hebrea introduce el objeto deseado de manera abierta. «Lo que has deseado» es natural en español y conserva el valor de deseo ya realizado con relevancia presente.
- source_word: יְחַכְּמֶךָּ
  english_pob_choice: will make you wise
  chosen_spanish: te hará sabio
  alternatives_spanish:
  - te dará sabiduría
  - te volverá sabio
  lexicon: HALOT
  rationale: El causativo de חכם expresa hacer sabio, no solo comunicar información. «Te hará sabio» mantiene esa fuerza verbal y suena idiomático en español.
theological_decisions:
- issue: Referente del sujeto implícito/personal
  english_pob_reading: The pronoun refers to the Lord, in line with the Greek parallel.
  chosen_spanish_reading: El sujeto se entiende como Dios/Yahvé, con agencia personal.
  alternative_spanish_readings:
  - un sujeto impersonal
  - la sabiduría personificada
  rationale: El contexto griego paralelo habla de los mandatos del Señor y de su acción personal; por eso el español conserva un sujeto personal («Él») sin despersonalizarlo. La ambigüedad del hebreo no se borra, sino que se resuelve siguiendo el paralelo documentado.
  doctrine_reference: Sirach 6:37; paralelo griego en Swete LXX 1909
translation_notes:
  revision_awareness: La revisión más reciente no introdujo cambios; el expediente indica que no se necesitaban ajustes. Se mantiene la decisión de priorizar la lectura hebrea principal en el texto español y señalar el paralelo griego en nota.
  spanish_consistency_notes:
  - Se conservó «corazón» para לֵב/לֵבָב, en coherencia con el léxico bíblico del POB.
  - Se evitó «Cristo» o lenguaje eclesiástico ajeno; el versículo no lo requiere.
  - «Dará entendimiento» y «te hará sabio» preservan el doble movimiento cognitivo-causal del hebreo sin fusionarlo con la variante griega.
