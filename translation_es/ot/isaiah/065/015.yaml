review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura general del hebreo: dejar el nombre, contraste entre juicio sobre el grupo denunciado y favor para los siervos, y concesión de otro nombre a los siervos. Sin embargo, hay dos desajustes relevantes. Primero, לִשְׁבוּעָה en este contexto de juicio se entiende mejor como uso imprecatorio del nombre, no simplemente ''juramento''; la propia auditoría inglesa reconoce ''spoken curse-formula''. En español, ''como juramento'' suena demasiado neutro y no transmite bien la fuerza contextual. Segundo, וֶהֱמִיתְךָ lleva sufijo singular masculino (''te''), mientras que el borrador cambió a plural (''los hará morir'') para armonizar con ''dejarán''; esa nivelación borra un rasgo del texto fuente. Conviene conservar el singular con valor colectivo o distributivo.'
  spanish_quality_summary: El español es legible y digno, pero 'Dejarán' introduce un cambio de persona poco elegante frente a 'los hará morir'. Además, 'les pondrá otro nombre' es natural, pero una formulación como 'les dará otro nombre' conecta mejor con la nota alternativa y con la idea de designación conferida. 'El Señor Yahvé' es aceptable dentro de la política del proyecto para אֲדֹנָי יְהוִה.
  glossary_alignment: 'Alinea bien ''Yahvé'' y contextualmente ''siervos''. No hay problema con ''escogidos''. El mayor problema terminológico es לִשְׁבוּעָה: el proyecto inglés de base había oscilado, pero la evidencia léxica y contextual favorece en español una redacción que deje claro el valor de maldición/juramento imprecatorio, con nota para la lectura más literal. También debe respetarse mejor el singular de וֶהֱמִיתְךָ.'
  issues:
  - severity: high
    issue: '''como juramento'' no transmite bien el valor contextual de לִשְׁבוּעָה'
    rationale: En contexto de juicio, el nombre queda como fórmula de maldición/imprecación para los escogidos. 'Juramento' en español suele leerse como promesa solemne y debilita el sentido.
  - severity: high
    issue: '''los hará morir'' cambia indebidamente el singular de וֶהֱמִיתְךָ'
    rationale: El hebreo tiene sufijo singular masculino. Aunque el referente pueda ser colectivo, la traducción no debe normalizarlo al plural sin necesidad.
  - severity: low
    issue: '''les pondrá otro nombre'' puede afinarse'
    rationale: '''Les dará otro nombre'' suena más idiomático para asignación de designación y encaja mejor con la nota alternativa preservada.'
  revised_spanish_text: Dejarán su nombre como maldición[a] para mis escogidos; y el Señor Yahvé te hará morir[b]; pero a sus siervos les dará otro nombre.
  revised_footnotes:
  - marker: a
    text: O ‘para un juramento’; es decir, su nombre se usaría en una fórmula oral de maldición o imprecación.
    reason: lexical_alternative
  - marker: b
    text: O ‘él llamará otro nombre a sus siervos’.
    reason: lexical_alternative
