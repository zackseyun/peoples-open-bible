translation:
  language: es
  text: ¡Acuestémonos en nuestra vergüenza, y cúbranos nuestra deshonra; porque hemos pecado contra Yahvé nuestro Dios —nosotros y nuestros padres[a]— desde nuestra juventud hasta este día, y no hemos obedecido la voz de Yahvé nuestro Dios.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «nosotros y nuestros antepasados». El hebreo dice «nosotros y nuestros padres».
    reason: lexical_alternative
lexical_decisions:
- source_word: נִשְׁכְּבָה
  english_pob_choice: Let us lie down
  chosen_spanish: Recostémonos
  alternatives_spanish:
  - Acuémonos
  - Yacemos
  lexicon: HALOT
  rationale: La forma cohortativa expresa una invitación/volición comunitaria en tono de lamento penitencial. «Recostémonos» conserva la imagen corporal de abatimiento sin sonar demasiado rígido en español.
- source_word: בְּבָשְׁתֵּנוּ
  english_pob_choice: in our shame
  chosen_spanish: en nuestra vergüenza
  alternatives_spanish:
  - en nuestra deshonra
  - en nuestro oprobio
  lexicon: HALOT
  rationale: El sustantivo denota la esfera o condición de vergüenza. «Vergüenza» es la opción más directa y natural en español; conserva el valor afectivo y social del término.
- source_word: וּתְכַסֵּנוּ
  english_pob_choice: and let ... cover us
  chosen_spanish: y cúbranos
  alternatives_spanish:
  - y que nos cubra
  - y nos cubra
  lexicon: HALOT
  rationale: En paralelo con la cohortativa anterior, la forma imperfectiva con sujeto femenino singular se vuelve mejor en español con un imperativo/jusivo impersonal dirigido a la abstracción personificada («nuestra deshonra»).
- source_word: כְּלִמָּתֵנוּ
  english_pob_choice: our disgrace
  chosen_spanish: nuestra deshonra
  alternatives_spanish:
  - nuestra vergüenza
  - nuestro oprobio
  lexicon: HALOT
  rationale: Este sustantivo se superpone con בֹּשֶׁת pero no es idéntico; «deshonra» mantiene la diferencia semántica y evita repetir exactamente «vergüenza».
- source_word: לַיהוָה
  english_pob_choice: against Yahweh
  chosen_spanish: contra Yahvé
  alternatives_spanish:
  - a Yahvé
  - delante de Yahvé
  lexicon: HALOT
  rationale: Con חטא, ל puede señalar a quien se ofende. En español, «pecar contra» expresa con claridad la relación de agravio.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: Se conserva el nombre divino del Tetragrámaton según la política del proyecto, sin sustituirlo por un título.
- source_word: אֱלֹהֵינוּ
  english_pob_choice: our God
  chosen_spanish: nuestro Dios
  lexicon: HALOT
  rationale: Equivalente covenantal directo y natural en español.
- source_word: חָטָאנוּ
  english_pob_choice: we have sinned
  chosen_spanish: hemos pecado
  alternatives_spanish:
  - pecamos
  lexicon: HALOT
  rationale: El perfecto verbal en contexto confesional se reproduce bien con el pretérito perfecto compuesto, destacando culpa vigente.
- source_word: אֲנַחְנוּ וַאֲבוֹתֵינוּ
  english_pob_choice: we and our fathers
  chosen_spanish: nosotros y nuestros padres
  alternatives_spanish:
  - nosotros y nuestros antepasados
  lexicon: HALOT
  rationale: El hebreo dice literalmente «nuestros padres». Se preserva ese lenguaje familiar e intergeneracional; la alternativa más inclusiva no se adopta porque el audit trail privilegia la forma explícita del original.
- source_word: מִנְּעוּרֵינוּ
  english_pob_choice: from our youth
  chosen_spanish: desde nuestra juventud
  alternatives_spanish:
  - desde nuestros primeros años
  - desde nuestra niñez
  lexicon: HALOT
  rationale: Expresión temporal idiomática y fiel al hebreo; «juventud» mantiene la amplitud del período inicial de infidelidad.
- source_word: וְעַד הַיּוֹם הַזֶּה
  english_pob_choice: even to this day
  chosen_spanish: hasta este día
  alternatives_spanish:
  - hasta hoy
  - hasta el día de hoy
  lexicon: HALOT
  rationale: La frase marca continuidad hasta el presente. «Hasta este día» conserva de forma sobria la extensión temporal del original.
- source_word: וְלֹא שָׁמַעְנוּ בְּקוֹל
  english_pob_choice: and we have not obeyed the voice of
  chosen_spanish: y no hemos obedecido la voz de
  alternatives_spanish:
  - y no hemos escuchado la voz de
  - y no hemos atendido a la voz de
  lexicon: HALOT
  rationale: שמע בקול es un modismo de obediencia, no solo de audición. «Obedecido la voz de» reproduce con precisión el sentido covenantal que el audit trail ya identifica.
theological_decisions:
- issue: Traducción del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - Jehová
  rationale: Se sigue la decisión doctrinal del proyecto de transliterar el Tetragrámaton en lugar de ocultarlo bajo un título. «Yahvé» es la forma establecida en el texto meta y mantiene la transparencia del original.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Valor de חטא con לַיהוָה
  english_pob_reading: we have sinned against Yahweh
  chosen_spanish_reading: hemos pecado contra Yahvé
  alternative_spanish_readings:
  - hemos pecado a Yahvé
  - hemos pecado para Yahvé
  rationale: La preposición ל con חטא expresa al ofendido o la dirección del agravio. «Contra» comunica mejor en español la ofensa relacional y no sugiere simple dativo.
  doctrine_reference: 'Hebreo bíblico: uso relacional de ל con חטא'
- issue: Paralelismo de בֹּשֶׁת / כְּלִמָּה
  english_pob_reading: in our shame ... our disgrace
  chosen_spanish_reading: en nuestra vergüenza ... nuestra deshonra
  alternative_spanish_readings:
  - en nuestra vergüenza ... nuestra vergüenza
  - en nuestra deshonra ... nuestro oprobio
  rationale: Se conserva la tensión léxica del hebreo entre dos términos afines pero no idénticos. «Vergüenza» y «deshonra» son cercanos, pero no colapsan completamente el paralelismo.
  doctrine_reference: 'Poética hebrea: paralelismo sin total sinonimización'
translation_notes:
  revision_awareness: Se revisó el paquete fuente hebreo y el audit trail inglés; no hubo cambios aplicados en la revisión más reciente, y el consenso de revisión indicó alta concordancia. La redacción española sigue esa lectura estable, preservando el paralelismo penitencial, el uso del nombre divino y el modismo de obediencia.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» de forma consistente para יְהוָה.
  - Se usa «pecar contra» para לַיהוָה con חטא, acorde al valor relacional del hebreo.
  - Se preserva la distinción entre «vergüenza» y «deshonra» para reflejar dos lexemas cercanos pero no idénticos.
  - La frase final conserva el matiz de obediencia, no solo de escucha auditiva.
  - La nota a pie de página marca la alternativa lexical documentada sobre «nuestros padres».
