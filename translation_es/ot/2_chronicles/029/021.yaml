  to: Trajeron siete toros, siete carneros, siete corderos y siete machos cabríos como sacrificio por el pecado[a] por el reino, por el santuario y por Judá. Y les dijo a los hijos de Aarón, los sacerdotes, que los ofrecieran sobre el altar de Yahvé.
