base_translation:
  language: en
  yaml_path: translation/ot/1_chronicles/023/013.yaml
  text: 'The sons of Amram: Aaron and Moses. And Aaron was set apart[a], he and his sons forever, to sanctify him as most holy, to burn incense before Yahweh, to minister to him, and to bless in his name forever.'
  footnotes:
  - marker: a
    text: Or 'holy of holies.' The Hebrew expression is literally 'holiness of holinesses,' a superlative meaning 'most holy.'
    reason: lexical_alternative
