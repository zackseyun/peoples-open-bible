translation:
  language: es
  text: 'Y su ofrenda de grano será flor de harina mezclada con aceite: tres décimas[a] para el toro, y dos décimas para el carnero.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «tres décimas» y «dos décimas»; en este contexto sacrificial, normalmente se entienden como décimas de una efa.'
    reason: cultural_note
lexical_decisions:
- source_word: וּמִנְחָתָם
  english_pob_choice: And their grain offering shall be
  chosen_spanish: Y su ofrenda vegetal será
  alternatives_spanish:
  - Y su ofrenda será
  - Y su oblación será
  lexicon: HALOT
  rationale: En contexto sacrificial, מִנְחָה designa la ofrenda de cereal/grano; en español, «ofrenda vegetal» conserva el valor cultual sin sonar arcaico ni introducir una categoría ajena. «Será» suple el hebreo nominal con una forma natural en español.
- source_word: סֹלֶת
  english_pob_choice: fine flour
  chosen_spanish: flor de harina
  alternatives_spanish:
  - harina fina
  - harina selecta
  lexicon: HALOT
  rationale: סֹלֶת es la harina de mejor calidad usada en ofrendas. «Flor de harina» es una equivalencia tradicional y fiel, ampliamente inteligible en registro bíblico.
- source_word: בְּלוּלָה בַשָּׁמֶן
  english_pob_choice: mixed with oil
  chosen_spanish: amasada con aceite
  alternatives_spanish:
  - mezclada con aceite
  - mezclada con el aceite
  lexicon: HALOT
  rationale: El participio pasivo indica harina preparada mediante incorporación del aceite. «Amasada con aceite» comunica la preparación ritual de manera natural en español; se mantiene la idea de mezcla sin forzar un calco.
- source_word: שְׁלֹשָׁה עֶשְׂרֹנִים
  english_pob_choice: three-tenths
  chosen_spanish: tres décimas[a]
  alternatives_spanish:
  - tres décimas de medida
  - tres diezavos
  lexicon: HALOT
  rationale: Se conserva la medida fraccionaria breve del POB. El término «décimas» reproduce la unidad de décimo-measure sin inventar una equivalencia cerrada en el texto principal; el sentido cultual de la medida se explica en la nota.
- source_word: לַפָּר הָאֶחָד
  english_pob_choice: for the one bull
  chosen_spanish: para el becerro[b] uno
  alternatives_spanish:
  - para el toro uno
  - para el becerro único
  lexicon: HALOT
  rationale: פַּר es un bovino macho para sacrificio; en español «becerro» puede sonar más natural y sacrificial que «toro» en este contexto. Se conserva además el valor distributivo de הָאֶחָד con «uno».
- source_word: שְׁנֵי עֶשְׂרֹנִים
  english_pob_choice: two-tenths
  chosen_spanish: dos décimas
  alternatives_spanish:
  - dos décimas de medida
  - dos diezavos
  lexicon: HALOT
  rationale: 'Mismo criterio que en la primera medida: se mantiene la fracción cultual de manera breve y transparente, dejando la precisión metrológica en la nota.'
- source_word: לָאַיִל הָאֶחָד
  english_pob_choice: for the one ram
  chosen_spanish: para el carnero uno
  alternatives_spanish:
  - para el carnero único
  - para el macho cabrío
  lexicon: HALOT
  rationale: אַיִל es «carnero», el macho adulto de la oveja. Se evita «ram» y se conserva la estructura del hebreo con «uno».
theological_decisions:
- issue: Presentación de la ofrenda מִנְחָה en lenguaje cultual español
  english_pob_reading: grain offering
  chosen_spanish_reading: ofrenda vegetal
  alternative_spanish_readings:
  - ofrenda de cereal
  - ofrenda de grano
  rationale: La decisión evita reducir la ofrenda a un mero “grano” y mantiene su carácter sacrificial. «Vegetal» funciona aquí como etiqueta cultual amplia para la ofrenda no animal, sin negar el componente de cereal.
  doctrine_reference: Levítico 2; Números 28
translation_notes:
  revision_awareness: Se respetó la estructura prescriptiva del hebreo sin suavizar la precisión de las medidas ni la especificidad de los animales. El texto sigue de cerca el audit trail inglés, pero ajusta el léxico para que el español sea natural y litúrgicamente inteligible.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» como norma del proyecto, pero este versículo no contiene el nombre divino.
  - Se prefirió «ofrenda vegetal» para מִנְחָה por su valor cultual; en contextos cercanos podría alternar con «ofrenda de cereal» si el registro lo requiriera.
  - Se conservaron las medidas fraccionarias en forma breve («décimas») para reflejar el paralelismo del hebreo.
  - Se preservó la repetición formal de «uno» al traducir הָאֶחָד, reflejando la estructura del texto fuente.
