translation:
  language: es
  text: Y además de esto, el rey la observaba con la boca abierta; y si ella se reía de él[a], él se reía; pero si se enojaba con él, la halagaba para que pudiera reconciliarse con él.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «si ella se ríe con él, él se ríe». El dativo griego después de «ríe» puede entenderse en más de un sentido relacional.'
    reason: lexical_alternative
lexical_decisions:
- source_word: καὶ πρὸς τούτοις
  english_pob_choice: besides this
  chosen_spanish: y además de esto
  alternatives_spanish:
  - además
  - y aparte de esto
  lexicon: LSJ
  rationale: La locución añade un detalle acumulativo; «y además de esto» conserva ese valor aditivo en español sin sonar afectado.
- source_word: χάσκων τὸ στόμα
  english_pob_choice: stared at her with his mouth open
  chosen_spanish: la observaba con la boca abierta
  alternatives_spanish:
  - la miraba con la boca abierta
  - la contemplaba con la boca abierta
  lexicon: LSJ
  rationale: La imagen corporal de la boca abierta se mantiene explícita, y «observaba» comunica la atención fija del rey sin forzar un calco poco natural.
- source_word: ἐθεώρει
  english_pob_choice: stared at
  chosen_spanish: observaba
  alternatives_spanish:
  - miraba
  - contemplaba
  lexicon: LSJ
  rationale: El verbo expresa atención sostenida; «observaba» conserva el aspecto durativo y encaja con el cuadro del pasaje.
- source_word: ἐὰν γελάσῃ αὐτῷ, γελᾷ
  english_pob_choice: if she laughs at him, he laughs
  chosen_spanish: si ella se reía de él, él se reía
  alternatives_spanish:
  - si ella se reía con él, él se reía
  - si ella se ríe de él, él se ríe
  lexicon: LSJ
  rationale: Se mantiene el paralelismo verbal. «De él» sigue la lectura más literal del dativo, que en español resulta natural como burla o risa dirigida a alguien.
- source_word: πικρανθῇ ἐπʼ αὐτόν
  english_pob_choice: becomes angry with him
  chosen_spanish: se enojaba con él
  alternatives_spanish:
  - se amargaba contra él
  - se irritaba con él
  lexicon: LSJ
  rationale: El pasivo de πικραίνω puede expresar amargarse o disgustarse; en español «se enojaba con él» comunica bien la reacción relacional sin perder fuerza.
- source_word: κολακεύει
  english_pob_choice: flatters her
  chosen_spanish: la halagaba
  alternatives_spanish:
  - la adulaba
  - le hacía halagos
  lexicon: LSJ
  rationale: El verbo apunta a ganar favor mediante palabras o trato lisonjero; «halagaba» es una opción transparente y menos marcada negativamente que «adulaba».
- source_word: ὅπως διαλλαγῇ αὐτῷ
  english_pob_choice: so that she may be reconciled to him
  chosen_spanish: para que pudiera reconciliarse con él
  alternatives_spanish:
  - para que se reconciliara con él
  - a fin de que quedara reconciliada con él
  lexicon: LSJ
  rationale: «Reconciliarse con él» reproduce el sentido de restauración de relación/favor. Se evita una formulación excesivamente interpretativa y se mantiene la agencia implícita del contexto.
translation_notes:
  revision_awareness: Se siguió el texto griego de Swete 1909 y el rastro auditado en inglés sin cambios sustantivos; se preservó la ambigüedad relacional del dativo con «de él / con él» en nota.
  spanish_consistency_notes:
  - Se usó «Yahvé» como norma general del proyecto, pero este versículo no contiene el tetragrámaton ni un título divino.
  - Se mantuvo la repetición de la raíz «reír» para conservar el paralelismo del griego.
  - «Halagaba» se eligió para conservar la intención de ganar favor sin introducir un tono excesivamente peyorativo.
