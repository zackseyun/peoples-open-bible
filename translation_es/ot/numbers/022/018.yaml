translation:
  language: es
  text: 'Balaam respondió y dijo a los siervos[a] de Balac: «Si Balac me diera su casa llena de plata y oro, no podría ir más allá de la palabra de Yahvé mi Dios[b], para hacer algo pequeño o grande»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «los esclavos de Balac». En contexto puede referirse a siervos o servidores de Balac.'
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: «la boca de Yahvé mi Dios», un modismo que significa exceder o violar lo que él ha dicho. O: «transgredir el mandato de Yahvé mi Dios».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּעַן
  english_pob_choice: answered
  chosen_spanish: respondió
  alternatives_spanish:
  - contestó
  - respondió
  lexicon: HALOT
  rationale: ענה introduce una respuesta en discurso directo; «respondió» conserva el paralelo formal sin sonar rígido en español.
- source_word: עַבְדֵי
  english_pob_choice: servants
  chosen_spanish: siervos
  alternatives_spanish:
  - sirvientes
  - esclavos
  - oficiales
  lexicon: HALOT
  rationale: Aquí designa a los agentes de Balac. «Siervos» mantiene la relación de dependencia sin cargar necesariamente con la dureza de «esclavos» en este contexto diplomático.
- source_word: אִם יִתֶּן לִי בָלָק
  english_pob_choice: If Balak were to give me
  chosen_spanish: Si Balac me diera
  alternatives_spanish:
  - Aunque Balac me diera
  - Si Balac me da
  lexicon: HALOT
  rationale: El hebreo presenta una condición simple, hipotética; el subjuntivo imperfecto español la expresa de manera natural sin añadir énfasis que el hebreo no exige.
- source_word: מְלֹא בֵיתוֹ כֶּסֶף וְזָהָב
  english_pob_choice: his house full of silver and gold
  chosen_spanish: su casa llena de plata y oro
  alternatives_spanish:
  - su casa llena de plata y de oro
  - la plenitud de su casa de plata y oro
  lexicon: HALOT
  rationale: La imagen hebrea de abundancia se conserva con una formulación clara y literal en español.
- source_word: לֹא אוּכַל
  english_pob_choice: I could not
  chosen_spanish: no podría
  alternatives_spanish:
  - no puedo
  - no seré capaz
  lexicon: HALOT
  rationale: En español, «no podría» refleja bien la incapacidad dentro de la condición hipotética.
- source_word: לַעֲבֹר אֶת פִּי
  english_pob_choice: go beyond the word of
  chosen_spanish: pasar por encima de la palabra de
  alternatives_spanish:
  - traspasar la palabra de
  - ir más allá de la palabra de
  lexicon: HALOT
  rationale: Se conserva la metáfora del hebreo «pasar más allá de la boca/palabra de»; «pasar por encima de» expresa la idea de exceder o violar lo dicho sin perder del todo la imagen.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  lexicon: HALOT
  rationale: Se sigue el criterio proyectual de rendir el nombre divino como «Yahvé», manteniendo la distinción entre el nombre propio y un título genérico.
- source_word: אֱלֹהַי
  english_pob_choice: my God
  chosen_spanish: mi Dios
  alternatives_spanish:
  - mi Dios
  lexicon: HALOT
  rationale: Construcción posesiva directa y natural en español; preserva el énfasis relacional del hebreo.
- source_word: לַעֲשׂוֹת קְטַנָּה אוֹ גְדוֹלָה
  english_pob_choice: to do anything small or great
  chosen_spanish: para hacer algo pequeño o grande
  alternatives_spanish:
  - para hacer una cosa pequeña o grande
  - para hacer algo menor o mayor
  lexicon: HALOT
  rationale: La pareja hebrea es un merismo que significa cualquier cosa, pequeña o grande; «algo pequeño o grande» lo transmite de forma natural y fiel.
theological_decisions:
- issue: Rendering the divine name יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - Jehová
  rationale: El texto hebreo usa el Tetragrámaton; la tradición del proyecto pide no ocultarlo tras un título. «Yahvé» conserva el nombre divino como nombre propio en español.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Force of Balaam's statement
  english_pob_reading: inability to go beyond what Yahweh has said
  chosen_spanish_reading: no podría pasar por encima de la palabra de Yahvé
  alternative_spanish_readings:
  - no podría transgredir el mandato de Yahvé
  - no podría ir más allá de lo que Yahvé ha dicho
  rationale: El hebreo une incapacidad con el modismo «pasar por la boca/palabra»; la versión española conserva la imposibilidad y la imagen idiomática sin reducirla a mera desobediencia voluntaria.
  doctrine_reference: 'DOCTRINE.md Translation philosophy #1 and #3'
translation_notes:
  revision_awareness: La versión inglesa revisada eliminó «Even» para reflejar mejor el simple «si». La redacción española sigue ese mismo valor condicional, sin intensificarlo indebidamente.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» para el nombre divino, conforme al estándar del proyecto.
  - Se usa «mi Dios» para אֱלֹהַי, sin expandir el sentido más allá del posesivo hebreo.
  - La metáfora idiomática de «pasar por encima de la palabra/boca» se conserva con una nota explicativa para no perder el trasfondo semítico.
