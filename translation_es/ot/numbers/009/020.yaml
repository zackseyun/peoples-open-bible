review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja correctamente el sentido básico del hebreo: situación ocasional, permanencia de la nube sobre el tabernáculo, y movimiento/detención por mandato de Yahvé. También preserva bien el nombre divino «Yahvé» y la nota sobre el modismo עַל־פִּי. Sin embargo, «por un número de días» suena poco natural en español bíblico moderno, y «al mandato de Yahvé» es menos idiomático que «por mandato de Yahvé» o «al mandato de Yahvé»; además, la nota está anclada en «por[a]» en vez de en la frase correspondiente al modismo hebreo.'
  spanish_quality_summary: 'La redacción es comprensible, pero tiene dos puntos de mejora de estilo/legibilidad: «por un número de días» es una construcción forzada en español, y la ubicación de la nota al pie no corresponde al sintagma hebreo explicado. Una formulación más natural y fiel sería «durante varios días» o «por algunos días»; para conservar mejor la indefinición de יָמִים מִסְפָּר, «durante varios días» funciona bien. También conviene anclar la nota en «por mandato de Yahvé[a]».'
  glossary_alignment: 'Buen alineamiento general con la glosa del proyecto: יְהוָה → «Yahvé», מִשְׁכָּן → «tabernáculo». El modismo עַל־פִּי יְהוָה debe expresarse en español de manera más idiomática como «por mandato de Yahvé», manteniendo la nota lexical alternativa. No hay conflicto teológico relevante.'
  issues:
  - severity: medium
    issue: «por un número de días» es poco natural en español
    rationale: Aunque calca de cerca el inglés auditado, en español suena rígido y poco idiomático. El hebreo יָמִים מִסְפָּר indica una cantidad limitada e indefinida de días; «durante varios días» preserva mejor el sentido con naturalidad.
  - severity: medium
    issue: La nota al pie está anclada en «por[a]» en vez de en la expresión que traduce עַל־פִּי יְהוָה
    rationale: La nota explica el modismo «según la boca de Yahvé», que corresponde a «por mandato de Yahvé», no a la preposición de duración «por» en «por un número de días». El anclaje actual puede inducir a confusión.
  - severity: low
    issue: «al mandato de Yahvé» es menos idiomático que «por mandato de Yahvé»
    rationale: «Al mandato de» se entiende, pero no es la formulación más natural en español general. «Por mandato de Yahvé» comunica bien autoridad/directiva y suena más claro y digno.
  revised_spanish_text: A veces la nube permanecía sobre el tabernáculo durante varios días; por mandato de Yahvé[a] acampaban, y por mandato de Yahvé partían.
  revised_footnotes:
  - marker: a
    text: 'Hebreo: «según la boca de Yahvé»; es decir, por el mandato de Yahvé.'
    reason: lexical_alternative
  revision_rationale: 'Se ajusta la redacción para mejorar la naturalidad del español sin apartarse del sentido fuente: «durante varios días» transmite mejor יָמִים מִסְפָּר que «por un número de días». Además, se sustituye «al mandato de Yahvé» por «por mandato de Yahvé», y se reubica el anclaje de la nota al sintagma que realmente traduce עַל־פִּי יְהוָה.'
