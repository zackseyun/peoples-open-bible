lexical_decisions:
- source_word: וַיַּעַן
  english_pob_choice: answered
  chosen_spanish: respondió
  alternatives_spanish:
  - contestó
  - respondió
  lexicon: HALOT
  rationale: El hebreo introduce la réplica de Job con el verbo narrativo ענה. En español, «respondió» comunica bien la función discursiva de iniciar una respuesta y suena natural y sobrio; «contestó» también es posible, pero «respondió» encaja mejor con el tono bíblico sin volverse arcaico.
- source_word: אִיּוֹב
  english_pob_choice: Job
  chosen_spanish: Job
  alternatives_spanish:
  - Job
  lexicon: Nombre propio estándar
  rationale: Se conserva el nombre propio en su forma castellana convencional, sin traducirlo.
- source_word: וַיֹּאמַר
  english_pob_choice: and said
  chosen_spanish: y dijo
  alternatives_spanish:
  - y habló
  - dijo
  lexicon: HALOT
  rationale: La fórmula hebrea «respondió y dijo» se refleja de manera directa con «respondió y dijo», preservando el paralelismo narrativo. Aunque en español puede parecer redundante, esa redundancia pertenece al estilo del hebreo bíblico y no debe eliminarse sin razón textual.
- source_word: וַ
  english_pob_choice: Then
  chosen_spanish: Entonces
  alternatives_spanish:
  - Y
  - Luego
  lexicon: Conector discursivo
  rationale: El waw inicial marca continuación narrativa. «Entonces» expresa la progresión del relato de forma clara y natural en español, manteniendo la relación secuencial que el inglés POB resolvió con «Then».
translation_notes:
  revision_awareness: El inglés POB de Job 6:1 no presenta notas ni variantes textuales; la versión española sigue de cerca esa lectura simple y estable, conservando la fórmula narrativa hebrea sin añadir interpretaciones.
  spanish_consistency_notes:
  - Se mantiene el nombre propio «Job» conforme al uso bíblico habitual en español.
  - Se conserva la estructura formularia hebrea «respondió y dijo» por fidelidad al estilo narrativo.
  - No se introducen notas al pie porque el segmento no presenta ambigüedades textuales o teológicas relevantes en el paquete fuente.
