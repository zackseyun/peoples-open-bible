revisions:
- from: 'Entonces Moisés dijo[a]: «Déjame apartarme y ver esta gran visión, por qué la zarza no se quema[b]».'
  to: 'Entonces Moisés dijo: «Voy a desviarme y ver este gran espectáculo, por qué la zarza no se quema[a]».'
  rationale: Se reemplaza «gran visión» por «gran espectáculo» para reflejar mejor מַרְאֶה como ‘algo visto’ y evitar la connotación de experiencia visionaria. Se elimina la nota reflexiva sobre «dijo» por no tener apoyo en el hebreo. Se ajusta «Déjame apartarme» a «Voy a desviarme» para expresar el cohortativo de autoexhortación en español natural.
  reviewer_model: gpt-5.4
