    issue: «mi primavera» para חָרְפִּי
    rationale: 'El hebreo y la auditoría inglesa apuntan a la estación de madurez/plenitud (‘my prime’; nota: ‘my autumn’), no al comienzo vital asociado con «primavera». Esto altera el sentido del recuerdo de Job.'
  - severity: low
