- issue: Rendering the chain of divine titles παντοκράτορος ἐπουρανίου θεοῦ ζῶντος
  chosen_reading: the almighty, heavenly, living God
  alternative_readings:
  - the Almighty God of heaven, the living God
  - the all-powerful heavenly living God
  rationale: The Greek stacks descriptors without conjunctions. The chosen rendering preserves each title distinctly while remaining readable. No doctrinally contested term from DOCTRINE.md requires a special footnote here.
  doctrine_reference: 'DOCTRINE.md: Translate titles; transliterate names'
- issue: Gendered filial term υἱοὺς
  chosen_reading: sons
  alternative_readings:
  - children
  rationale: The source uses the masculine filial term, and there is no contextual pressure to neutralize it. This follows the project's gender-accurate policy.
  doctrine_reference: 'DOCTRINE.md: Gender-accurate over gender-neutral'
