translation:
  language: es
  text: Hijo mío, no olvides mi instrucción[a], y que tu corazón guarde[b] mis mandamientos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «mi enseñanza». תּוֹרָה aquí expresa instrucción sapiencial, no necesariamente ley en sentido jurídico.
    reason: lexical_alternative
  - marker: b
    text: O «custodie» o «guarde cuidadosamente». El verbo hebreo lleva la idea de guardar con cuidado o vigilar.
    reason: lexical_alternative
lexical_decisions:
- source_word: בְּנִי
  english_pob_choice: My son
  chosen_spanish: Hijo mío
  alternatives_spanish:
  - Mi hijo
  - Hijo
  lexicon: HALOT
  rationale: El hebreo es un vocativo masculino singular con sufijo de primera persona. «Hijo mío» conserva la dirección paterna de la instrucción sapiencial y suena natural en español bíblico y moderno; «mi hijo» es posible, pero menos idiomático como vocativo inicial.
- source_word: תּוֹרָתִי
  english_pob_choice: my instruction
  chosen_spanish: mi instrucción
  alternatives_spanish:
  - mi enseñanza
  - mi ley
  lexicon: HALOT
  rationale: Aquí תּוֹרָה no apunta principalmente a «ley» en sentido legal mosaico, sino a instrucción sapiencial/paterna. «Instrucción» mantiene ese valor directivo sin cargar la frase con un sentido jurídico ajeno al contexto.
- source_word: אַל תִּשְׁכָּח
  english_pob_choice: do not forget
  chosen_spanish: no olvides
  alternatives_spanish:
  - no te olvides
  - no olvides jamás
  lexicon: HALOT
  rationale: La prohibición jussiva en español se expresa con naturalidad mediante «no olvides». Conserva el imperativo exhortativo sin añadir intensidad o matiz no presente en el hebreo.
- source_word: וּמִצְוֺתַי
  english_pob_choice: my commandments
  chosen_spanish: mis mandamientos
  alternatives_spanish:
  - mis mandatos
  - mis órdenes
  lexicon: HALOT
  rationale: «Mandamientos» conserva el peso normativo de מִצְוֺת y coincide con el registro moral fuerte que el contexto exige. «Mandatos» es posible, pero menos asentado en español bíblico; «órdenes» suena más administrativo.
- source_word: יִצֹּר
  english_pob_choice: keep
  chosen_spanish: guarde
  alternatives_spanish:
  - conserve
  - custodie
  - vigile
  lexicon: HALOT
  rationale: נצר tiene la idea de guardar cuidadosamente. En español, «guarde» reproduce bien esa custodia interior y permite la coordinación natural con «tu corazón». «Custodie» o «vigile» serían más marcados y menos fluidos.
- source_word: לִבֶּךָ
  english_pob_choice: your heart
  chosen_spanish: tu corazón
  alternatives_spanish:
  - tu mente
  - tu interior
  lexicon: HALOT
  rationale: Se mantiene «corazón» de forma literal porque en la antropología hebrea es el centro de pensamiento, voluntad y afecto. «Mente» reduciría indebidamente el alcance interior del término.
theological_decisions:
- issue: Aislamiento del sentido de תּוֹרָה en Proverbios
  english_pob_reading: my instruction, not necessarily law in the narrow legal sense
  chosen_spanish_reading: mi instrucción, no «mi ley»
  alternative_spanish_readings:
  - mi enseñanza
  - mi ley
  rationale: En este versículo, la palabra hebrea tiene el sentido de instrucción sapiencial/paterna. Traducirla como «ley» introduciría una lectura jurídica más estrecha que el contexto no exige; «instrucción» preserva el tono formativo.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4
- issue: Guardar los mandamientos como custodia interior
  english_pob_reading: let your heart keep my commandments
  chosen_spanish_reading: que tu corazón guarde mis mandamientos
  alternative_spanish_readings:
  - y tu corazón mantenga mis mandamientos
  - que tu mente guarde mis mandamientos
  rationale: El hebreo sitúa la acción de guardar en el corazón, no solo en la conducta externa. Mantener el corazón como sujeto respeta la antropología bíblica y preserva la exigencia interior del texto.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4
translation_notes:
  revision_awareness: 'El borrador sigue la revisión más reciente sin cambios sustanciales: el inglés auditado mantuvo su lectura óptima, y la versión española conserva la misma distinción entre instrucción sapiencial y ley, así como el valor de guardar cuidadosamente. No se observan revisiones aplicadas en el paquete fuente.'
  spanish_consistency_notes:
  - Se mantuvo la forma vocativa «Hijo mío» para reflejar el singular masculino del hebreo.
  - «Instrucción» se usa consistentemente para תּוֹרָה en este contexto, evitando la carga jurídica de «ley».
  - «Mandamientos» conserva la fuerza normativa de מִצְוֺת.
  - «Corazón» se preserva como centro interior, sin reducirlo a «mente».
  - La coordinación verbal «no olvides... y que tu corazón guarde...» refleja la relación de exhortación y custodia interior del hebreo sin forzar un calco sintáctico.
