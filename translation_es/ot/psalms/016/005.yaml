    text: 'O: «Yahvé es mi porción y mi copa»; el hebreo reúne imágenes de asignación («porción», «herencia/parte», «suerte») en rápida sucesión.'
    reason: lexical_alternative
  revision_rationale: 'Se corrige la coordinación para reflejar fielmente el hebreo y el inglés auditado: Yahvé es tanto la porción de la herencia del salmista como su copa; no la porción de su copa. Se mantiene «mi suerte» como opción española aceptable para גּוֹרָלִי, apoyada por la nota que preserva la red de imágenes de reparto.'
