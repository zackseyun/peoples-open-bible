  to: Un hijo con una madre y un padre con una hija se entremezclaban[a].
  rationale: Se ajusta únicamente el verbo principal para reflejar mejor la imagen de mezcla mutua e ilícita de συνεφύροντο en español natural, manteniendo la cautela del POB de no explicitar más de lo que afirma el griego.
