review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español transmite bien la estructura y el sentido general del hebreo: identificación del lugar, cocción sacerdotal de tres tipos de ofrenda, propósito preventivo de no llevarlas al atrio exterior, y la idea de santidad transmitida al pueblo. Sin embargo, hay un desajuste léxico importante en אֲשֶׁר יֹאפוּ אֶת הַמִּנְחָה: el hebreo distingue entre ''hervir/cocer'' (יְבַשְּׁלוּ) para las dos primeras ofrendas y ''hornear'' (יֹאפוּ) para la ofrenda vegetal; el borrador usa ''cocerán'' en ambos casos y borra esa distinción. También el pronombre ''sacarlos'' en español queda menos claro que una referencia explícita a ''las ofrendas''.'
  spanish_quality_summary: El español es claro y digno, con buen registro bíblico moderno. 'Atrio exterior' y 'hacer santo al pueblo' son defendibles y legibles. No obstante, repetir 'cocerán' para ambos verbos reduce precisión, y 'para no sacarlos' suena algo abrupto por la referencia implícita masculina plural tras una serie de ofrendas mixtas; 'para no llevar las ofrendas' o equivalente mejora naturalidad sin añadir interpretación sustancial.
  glossary_alignment: No hay conflicto con las pautas terminológicas principales del proyecto. La terminología sacrificial es razonable, aunque 'ofrenda vegetal' puede mantenerse. La decisión sobre קדש como 'hacer santo' concuerda con la nota inglesa y preserva la tensión cultual. La principal corrección requerida es respetar la distinción verbal hebrea entre cocer/hervir y hornear.
  issues:
