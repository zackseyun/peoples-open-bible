translation:
  language: es
  text: Y sus hermanos[a], hombres de valor, eran ciento veintiocho; y el supervisor de ellos era Zabdiel, hijo de Haggedolim.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «hijo de los grandes» o «hijo de los nobles». El hebreo puede ser una frase descriptiva más que un nombre propio.'
    reason: alternative_reading
lexical_decisions:
- source_word: וַאֲחֵיהֶם
  english_pob_choice: And their brothers
  chosen_spanish: Y sus hermanos
  alternatives_spanish:
  - Y sus parientes
  - Y sus hermanos de clan
  - Y sus compatriotas
  lexicon: HALOT
  rationale: El hebreo dice literalmente 'sus hermanos'. En este contexto de lista/censo, el término mantiene el vínculo grupal sin introducir una interpretación más amplia que el texto no explicita.
- source_word: גִּבּוֹרֵי חַיִל
  english_pob_choice: mighty men of valor
  chosen_spanish: hombres valientes
  alternatives_spanish:
  - hombres de valor
  - valientes guerreros
  - hombres poderosos
  lexicon: HALOT
  rationale: La expresión hebrea puede abarcar fuerza, capacidad y valentía. En español, 'hombres valientes' conserva la idea de mérito y fortaleza sin sonar excesivamente bélico en un listado administrativo.
- source_word: מֵאָה עֶשְׂרִים וּשְׁמֹנָה
  english_pob_choice: one hundred twenty-eight
  chosen_spanish: ciento veintiocho
  alternatives_spanish:
  - ciento veintiocho
  lexicon: HALOT
  rationale: Es el número cardinal directo 128. Se usa la forma natural del español moderno.
- source_word: וּפָקִיד עֲלֵיהֶם
  english_pob_choice: and the overseer over them was
  chosen_spanish: y el supervisor sobre ellos era
  alternatives_spanish:
  - y el encargado sobre ellos era
  - y el oficial sobre ellos era
  - y el administrador sobre ellos era
  lexicon: HALOT
  rationale: פָקִיד indica una persona puesta a cargo. 'Supervisor' comunica la función de vigilancia/gestión sin cargar el término con una noción militar más fuerte de la que exige el hebreo.
- source_word: זַבְדִּיאֵל
  english_pob_choice: Zabdiel
  chosen_spanish: Zabdiel
  alternatives_spanish:
  - Zabdiel
  lexicon: transliteration
  rationale: Se conserva el nombre propio en transliteración estándar, como en la tradición POB.
- source_word: בֶּן הַגְּדוֹלִים
  english_pob_choice: son of Haggedolim
  chosen_spanish: hijo de Haggedolim
  alternatives_spanish:
  - hijo de los grandes
  - hijo de los nobles
  - hijo de Gedolim
  lexicon: HALOT
  rationale: La forma hebrea puede ser un nombre/clan o una frase descriptiva. El texto principal mantiene 'Haggedolim' para no decidir prematuramente entre ambas posibilidades; la alternativa interpretativa se preserva en nota.
translation_notes:
  revision_awareness: El texto hebreo y el auditor inglés coinciden en alto grado y no muestran revisiones sustantivas; se conserva la misma decisión de mantener la ambigüedad de בֶּן הַגְּדוֹלִים en una nota alternativa.
  spanish_consistency_notes:
  - Se usa 'Yahvé' solo cuando el texto fuente lo requiera; este versículo no lo contiene.
  - '''Supervisor'' se eligió para reflejar פָקִיד como cargo administrativo, en paralelo con el inglés POB ''overseer''.'
  - El nombre 'Haggedolim' se conserva como transliteración porque el original permite tanto un nombre como una frase descriptiva.
  - 'La puntuación en español sigue el orden de lista del hebreo: sujeto compuesto, cifra, y luego cargo y nombre propio.'
