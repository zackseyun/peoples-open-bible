translation:
  language: es
  text: Adiós[a]. En el año ciento cuarenta y ocho, el día quince de Xántico[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El griego ἔρρωσθε es literalmente un imperativo como «sean fuertes» o «estén bien», pero en fórmulas de cierre funciona como una despedida convencional.
    reason: lexical_alternative
  - marker: b
    text: Xántico era un nombre de mes macedonio usado en la cronología helenística.
    reason: cultural_note
lexical_decisions:
- source_word: ἔρρωσθε
  english_pob_choice: Farewell
  chosen_spanish: ¡[a]
  alternatives_spanish:
  - Adiós
  - Salud
  - Que estén bien
  lexicon: LSJ
  rationale: En griego funciona como fórmula convencional de despedida al final de una comunicación, no como exhortación literal a la fuerza. En español, el equivalente más natural y sobrio para una clausura breve es una exclamación de despedida; el signo y la apertura exclamativa mantienen el tono formular.
- source_word: ἔτους
  english_pob_choice: year
  chosen_spanish: Año
  alternatives_spanish:
  - del año
  - en el año
  lexicon: LSJ
  rationale: 'En una datación cronológica, el genitivo griego se expresa de forma natural en español con el sustantivo en posición inicial: «Año...». Evita una construcción más pesada sin añadir contenido ajeno.'
- source_word: ἑκατοστοῦ τεσσερακοστοῦ ὀγδόου
  english_pob_choice: one hundred forty-eighth
  chosen_spanish: ciento cuarenta y ocho
  alternatives_spanish:
  - ciento cuarenta y octavo
  - ciento cuarenta y ocho
  lexicon: LSJ
  rationale: El griego usa un ordinal en la fórmula de fecha. En español, en este tipo de encabezado cronológico, la forma cardinal tras «Año» comunica con claridad la datación sin forzar una lectura ordinal artificial; el contexto ya fija el valor de año contado.
- source_word: Ξανθικοῦ
  english_pob_choice: Xanthicus
  chosen_spanish: Xántico
  alternatives_spanish:
  - Xánticos
  - Xántico (mes macedonio)
  lexicon: LSJ
  rationale: Se translitera el nombre del mes macedonio con adaptación gráfica española mínima. Se preserva el nombre propio del calendario helenístico en lugar de sustituirlo por un mes moderno o explicarlo dentro del texto.
- source_word: πεντεκαιδεκάτῃ
  english_pob_choice: fifteenth day
  chosen_spanish: día quince
  alternatives_spanish:
  - el día quince
  - quince
  lexicon: LSJ
  rationale: El dativo en fórmula de fecha indica el día del mes. En español, «día quince» es la forma natural y clara; evita sobrecargar la frase con preposiciones implícitas.
translation_notes:
  revision_awareness: El texto griego es breve y de alta concordancia con el audit trail inglés. Se conservó la fórmula de despedida convencional y la datación helenística, sin añadir interpretaciones históricas sobre la era o el calendario más allá de lo exigido por el original.
  spanish_consistency_notes:
  - Se mantuvo «Xántico» como transliteración española coherente de Xanthicus.
  - Se evitó «señor»/«SEÑOR» u otras terminologías no pertinentes; el versículo solo contiene fórmula de despedida y fecha.
  - La numeración del año se expresa con palabras para conservar el estilo bíblico-publicación y la claridad cronológica.
