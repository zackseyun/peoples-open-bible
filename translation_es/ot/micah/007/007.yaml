translation:
  language: es
  text: Pero en cuanto a mí[a], estaré atento a Yahvé; aguardaré al Dios de mi salvación. Mi Dios me oirá.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «tendré esperanza en el Dios de mi salvación». El verbo hebreo puede implicar esperar con esperanza.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַאֲנִי
  english_pob_choice: But as for me
  chosen_spanish: Pero en cuanto a mí
  alternatives_spanish:
  - Pero yo
  - En cuanto a mí
  lexicon: HALOT
  rationale: La partícula conjuntiva con el pronombre independiente marca contraste enfático con el contexto previo; «Pero en cuanto a mí» conserva ese contraste mejor que un simple «Pero yo» y suena natural en español.
- source_word: בַּיהוָה
  english_pob_choice: watch for Yahweh
  chosen_spanish: esperaré en Yahvé
  alternatives_spanish:
  - velaré por Yahvé
  - miraré hacia Yahvé
  lexicon: HALOT
  rationale: El verbo צפה tiene el sentido de mirar/esperar con expectativa. En español, «esperaré en Yahvé» comunica de forma idiomática la espera confiada; se mantiene «Yahvé» según la norma del proyecto para יהוה.
- source_word: אֲצַפֶּה
  english_pob_choice: I will watch
  chosen_spanish: esperaré
  alternatives_spanish:
  - velaré
  - estaré atento
  lexicon: HALOT
  rationale: «Vigilar» o «mirar» serían demasiado literales y menos naturales aquí. La imagen de expectativa queda integrada en la idea de esperar, sin perder el matiz de atención confiada del verbo hebreo.
- source_word: אוֹחִילָה
  english_pob_choice: I will wait
  chosen_spanish: aguardaré
  alternatives_spanish:
  - esperaré
  - tendré esperanza
  lexicon: HALOT
  rationale: יׄחל puede significar esperar o esperar con esperanza. «Aguardaré» mantiene el sentido de espera activa y permite distinguirlo de אֲצַפֶּה, conservando la tensión semántica entre esperar y confiar sin resolverla del todo.
- source_word: לֵאלֹהֵי יִשְׁעִי
  english_pob_choice: for the God of my salvation
  chosen_spanish: al Dios de mi salvación
  alternatives_spanish:
  - al Dios que me salva
  - al Dios de mi rescate
  lexicon: HALOT
  rationale: La construcción posesiva se traduce de manera bastante literal para conservar el peso poético y teológico. «Salvación» refleja bien el sustantivo יִשְׁעִי y mantiene la fórmula bíblica reconocible sin usar una paráfrasis excesiva.
- source_word: יִשְׁמָעֵנִי
  english_pob_choice: will hear me
  chosen_spanish: me oirá
  alternatives_spanish:
  - me escuchará
  - me responderá
  lexicon: HALOT
  rationale: שמע significa primariamente oír/escuchar. «Me oirá» es la forma más directa y deja abierto, como en el hebreo, si la audiencia implica además respuesta favorable.
- source_word: אֱלֹהָי
  english_pob_choice: My God
  chosen_spanish: Mi Dios
  alternatives_spanish:
  - Dios mío
  lexicon: HALOT
  rationale: Se conserva la confesión personal final en español claro y reverente. «Mi Dios» reproduce bien el énfasis del hebreo colocado al final de la línea.
theological_decisions:
- issue: Renderización del nombre divino יהוה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - Jehová
  rationale: 'Se sigue el valor doctrinal del proyecto para el Tetragrámaton: transliterarlo como nombre propio en lugar de ocultarlo con un sustituto. «Yahvé» es la forma establecida en el español del proyecto y corresponde al nombre revelado de Dios.'
  doctrine_reference: 'DOCTRINE.md: Contested terms — יהוה YHWH → Yahvé'
- issue: Matiz de esperado/esperanza en אוֹחִילָה
  english_pob_reading: I will wait
  chosen_spanish_reading: aguardaré
  alternative_spanish_readings:
  - esperaré
  - tendré esperanza
  rationale: El hebreo admite tanto esperar como esperar con esperanza. Se eligió «aguardaré» para evitar una redundancia total con «esperaré» y preservar el matiz de expectativa confiada. La ambigüedad se mantiene sin resolverla en exceso.
  doctrine_reference: DOCTRINE.md §3 Preserve theological tension rather than resolve it
translation_notes:
  revision_awareness: 'La redacción sigue el consenso del audit trail inglés y no requiere cambios respecto del último pase revisado: se mantiene la tensión entre mirar con expectativa y esperar con esperanza, y se conserva la referencia directa al nombre divino mediante Yahvé.'
  spanish_consistency_notes:
  - Se usa «Yahvé» de forma consistente para יהוה.
  - Se evita «SEÑOR» como sustituto del nombre divino.
  - 'Se conserva el paralelismo verbal con dos verbos distintos: «esperaré» y «aguardaré».'
  - «Mi Dios» queda al final para reproducir el énfasis del hebreo.
  - La nota al pie preserva la alternativa semántica de «esperanza» sin desplazar la traducción principal.
