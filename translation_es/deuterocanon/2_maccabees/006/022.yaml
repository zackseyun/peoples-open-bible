translation:
  language: es
  text: para que, después de hacer esto, fuera liberado de la muerte[a], y, por la amistad que desde antiguo tenía con ellos, recibiera bondad[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «fuera librado de la muerte», es decir, exento de la ejecución.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «obtuviera buena voluntad» o «recibiera trato humano».'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἵνα
  english_pob_choice: so that
  chosen_spanish: para que
  alternatives_spanish:
  - a fin de que
  - de modo que
  lexicon: BDAG
  rationale: Introduce una cláusula de propósito/resulto; «para que» expresa con naturalidad el valor final sin perder la relación con la oración principal.
- source_word: τοῦτο πράξας
  english_pob_choice: after doing this
  chosen_spanish: después de hacer esto
  alternatives_spanish:
  - habiendo hecho esto
  - tras hacer esto
  - si hace esto
  lexicon: BDAG
  rationale: El participio aoristo anterior al verbo principal indica una acción previa; «después de hacer esto» conserva esa secuencia de manera clara en español.
- source_word: ἀπολυθῇ τοῦ θανάτου
  english_pob_choice: he might be released from death
  chosen_spanish: fuera liberado de la muerte
  alternatives_spanish:
  - fuera librado de la muerte
  - fuera soltado de la muerte
  - escapara de la muerte
  lexicon: BDAG
  rationale: ἀπολύω mantiene la idea de liberación; en el contexto narrativo/jurídico de la ejecución, «liberado de la muerte» preserva la fuerza del giro sin convertirlo en una paráfrasis doctrinal.
- source_word: διὰ τὴν ἀρχαίαν πρὸς αὐτοὺς φιλίαν
  english_pob_choice: because of their long-standing friendship with him
  chosen_spanish: por su antigua amistad con ellos
  alternatives_spanish:
  - por la antigua amistad de él hacia ellos
  - a causa de su vieja amistad con ellos
  - por la amistad que desde antiguo tenía con ellos
  lexicon: LSJ
  rationale: La frase expresa una amistad antigua/establecida; «antigua amistad» mantiene el valor temporal, y «con ellos» evita la dureza de una reproducción demasiado literal de πρὸς αὐτούς.
- source_word: τύχοι φιλανθρωπίας
  english_pob_choice: might receive kindness
  chosen_spanish: obtuviera benevolencia
  alternatives_spanish:
  - recibiera bondad
  - obtuviera amabilidad
  - recibiera trato humano
  lexicon: BDAG
  rationale: τύχοι con genitivo implica alcanzar/obtener; φιλανθρωπία denota benevolencia o humanidad. «Benevolencia» conserva el registro elevado y la amplitud semántica mejor que una formulación más coloquial.
theological_decisions:
- issue: Alcance de «liberado de la muerte»
  english_pob_reading: The clause refers to being spared or released from the death sentence, not an afterlife or salvation doctrine.
  chosen_spanish_reading: La frase se entiende como ser liberado de la pena de muerte o de la ejecución inminente, no como una afirmación doctrinal sobre salvación final.
  alternative_spanish_readings:
  - ser librado de la muerte en sentido absoluto
  - ser rescatado de la muerte como idea soteriológica
  rationale: El contexto narrativo es una apelación legal/política; conviene mantener esa tensión concreta y no cargar la expresión con sentidos doctrinales ajenos al pasaje.
  doctrine_reference: 'Translation philosophy: original-language primacy; preserve what the text says without importing doctrinal claims.'
translation_notes:
  revision_awareness: Pasaje revisado con concordancia alta con el texto griego de Swete (1909) y con el rastro auditado en inglés POB. No se aplicaron revisiones posteriores; se conserva la estructura de propósito, la secuencia participial y la ambigüedad narrativa de la liberación de la muerte.
  spanish_consistency_notes:
  - Se usó «Yahvé» como norma del proyecto solo cuando aparece el nombre divino; este versículo no lo contiene.
  - Se prefirió un registro sobrio y bíblico contemporáneo, evitando calcos innecesarios.
  - «Benevolencia» se mantuvo para reflejar la amplitud de φιλανθρωπία sin reducirla a mera cortesía.
