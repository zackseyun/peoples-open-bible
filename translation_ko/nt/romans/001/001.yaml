id: ROM.1.1
reference: Romans 1:1
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: Παῦλος δοῦλος ⸂Χριστοῦ Ἰησοῦ⸃, κλητὸς ἀπόστολος, ἀφωρισμένος εἰς εὐαγγέλιον θεοῦ
base_translation:
  language: en
  yaml_path: translation/nt/romans/001/001.yaml
  text: Paul[a], a slave of Messiah Jesus, called as an apostle, set apart for the gospel of God[d][c][b],
  footnotes:
  - marker: a
    text: Or servant; also traditionally bondservant.
    reason: lexical_alternative
  - marker: b
    text: Or Christ Jesus.
    reason: lexical_alternative
  - marker: c
    text: Or called apostle; more interpretively, called to be an apostle.
    reason: alternative_reading
  - marker: d
    text: Or 'called as an apostle'.
    reason: previous_rendering
translation:
  language: ko
  text: 메시아 예수의 노예[a]요, 부르심을 받은 사도이며, 하나님의 복음을 위하여 구별된[b] 바울이[c],
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 또는 「종」. 헬라어 δοῦλος는 매임(bonded status)을 본질로 가지며, DOCTRINE.md는 로마서 1:1을 그 매임이 신학적으로 부각되는 본보기로 명시한다. 한국어 「종」은 봉사의 기능만을 시사할 수 있으므로 본문의 무게를 살리기 위해 「노예」로 옮긴다.
    reason: lexical_alternative
  - marker: b
    text: 또는 「따로 세움을 받은」, 「임명된」. 헬라어 ἀφωρισμένος는 거룩한 목적을 위해 분리·구별되었다는 함의를 지닌다.
    reason: lexical_alternative
  - marker: c
    text: 또는 「그리스도 예수」. Χριστός를 칭호로 옮기는 본 번역의 원칙에 따라 「메시아」로 번역한다.
    reason: lexical_alternative
lexical_decisions:
- source_word: δοῦλος
  english_pob_choice: slave
  chosen_korean: 노예
  alternatives_korean:
  - 종
  - 하인
  lexicon: BDAG
  rationale: DOCTRINE.md는 로마서 1:1을 δοῦλος가 매임의 신학적 의미로 읽혀야 할 본보기로 명시한다. 친숙한 「종」은 매임의 무게를 약화시키므로 「노예」를 채택한다.
- source_word: Χριστοῦ Ἰησοῦ
  english_pob_choice: Messiah Jesus
  chosen_korean: 메시아 예수
  alternatives_korean:
  - 그리스도 예수
  lexicon: BDAG
  rationale: Χριστός는 본래 칭호이며, 바울 서신 자기소개에서 칭호의 무게가 살아 있다. 「그리스도」는 음역으로 굳어져 칭호성이 흐려지므로 「메시아」로 옮긴다.
- source_word: κλητὸς ἀπόστολος
  english_pob_choice: called as an apostle
  chosen_korean: 부르심을 받은 사도
  alternatives_korean:
  - 부름받은 사도
  - 사도로 부름받은 자
  lexicon: BDAG
  rationale: 형용사+명사 구조의 헬라어를 자연스러운 한국어 관형절로 옮기되, 부르심의 수동·신적 행위 함의를 보존한다.
- source_word: ἀφωρισμένος
  english_pob_choice: set apart
  chosen_korean: 구별된
  alternatives_korean:
  - 따로 세움을 받은
  - 임명된
  lexicon: BDAG
  rationale: 수동 분사의 거룩한 목적을 위한 분리·성별의 함의를 「구별된」으로 자연스럽게 옮긴다.
- source_word: εὐαγγέλιον
  english_pob_choice: gospel
  chosen_korean: 복음
  alternatives_korean:
  - 좋은 소식
  lexicon: BDAG
  rationale: 한국 교회 전통의 「복음」이 신학적 무게와 가독성을 함께 담는다.
theological_decisions:
- issue: 로마서 1:1의 δοῦλος를 매임을 드러내는 강한 어휘로 번역
  chosen_reading: 노예
  alternative_readings:
  - 종
  - 하인
  rationale: DOCTRINE.md는 로마서 1:1을 δοῦλος의 매임이 신학적으로 부각되는 본보기로 명시한다. 한국 전통의 「종」은 친숙하지만 매임의 무게를 약화시키므로, 본문의 무게를 보존하기 위해 「노예」를 채택한다.
  doctrine_reference: 'DOCTRINE.md: Original-language primacy; Contested terms table for δοῦλος (Rom 1:1 named context)'
