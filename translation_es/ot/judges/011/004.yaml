translation:
  language: es
  text: Después de algún tiempo[a], los amonitas lucharon contra Israel.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «Y sucedió después de días», un giro idiomático que indica que pasó un tiempo.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְהִ֖י מִ/יָּמִ֑ים
  english_pob_choice: After some time
  chosen_spanish: Después de algún tiempo
  alternatives_spanish:
  - Y sucedió después de días
  - Y después de algunos días
  lexicon: HALOT
  rationale: El hebreo es un giro idiomático que marca el paso del tiempo, no una afirmación principal sobre “suceder”. En español, “Después de algún tiempo” comunica con naturalidad ese lapso temporal sin perder la función narrativa del hebreo.
- source_word: וַ/יִּלָּחֲמ֥וּ
  english_pob_choice: fought against
  chosen_spanish: lucharon contra
  alternatives_spanish:
  - pelearon contra
  - entraron en batalla contra
  lexicon: HALOT
  rationale: El verbo expresa combate real en este contexto. “Lucharon contra” conserva la idea adversarial y suena natural en español bíblico moderno.
- source_word: בְנֵֽי עַמּ֖וֹן
  english_pob_choice: the Ammonites
  chosen_spanish: los amonitas
  alternatives_spanish:
  - los hijos de Amón
  - el pueblo de Amón
  lexicon: HALOT
  rationale: Se trata del etnónimo habitual para ese pueblo. “Los amonitas” es claro, bíblicamente reconocible y equivalente al sentido del original.
- source_word: עִם יִשְׂרָאֵֽל
  english_pob_choice: against Israel
  chosen_spanish: contra Israel
  alternatives_spanish:
  - con Israel
  lexicon: HALOT
  rationale: Aunque עִם suele significar “con”, con לחם en contexto bélico señala al bando opuesto. “Contra Israel” explicita esa fuerza relacional, como en el audit trail inglés.
translation_notes:
  revision_awareness: 'Coincide plenamente con el sentido del hebreo y con la solución inglesa auditada: se mantiene el valor idiomático temporal de וַיְהִי מִיָּמִים y el valor bélico de עִם con לחם, sin introducir interpretación adicional.'
  spanish_consistency_notes:
  - Se usa “amonitas” como etnónimo estable y natural en español.
  - Se preserva el matiz temporal idiomático con una nota breve para auditar la elección.
  - No se usa “SEÑOR” ni terminología teológica ajena al versículo.
  - La preposición “contra” refleja el valor contextual de עִם en guerra.
