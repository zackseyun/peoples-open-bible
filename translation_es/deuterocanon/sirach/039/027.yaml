translation:
  language: es
  text: Todas estas cosas son para bien para los buenos[a]; así también, para los impíos, se vuelven dañinas.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Paralelo griego: «a los piadosos» en lugar de simplemente «a los buenos». El hebreo dice «a los buenos».'
    reason: alternative_reading
lexical_decisions:
- source_word: כל אלה
  english_pob_choice: All these things
  chosen_spanish: Todas estas cosas
  alternatives_spanish:
  - Todas estas
  - Todas estas materias
  lexicon: HALOT
  rationale: La expresión hebrea abarca el conjunto de lo dicho; en español, «Todas estas cosas» conserva la amplitud del referente y suena natural en un registro bíblico moderno.
- source_word: לטובים
  english_pob_choice: for good to the good
  chosen_spanish: para bien a los buenos
  alternatives_spanish:
  - para bien a los buenos y rectos
  - para bien a los bondadosos
  - para bien a los justos
  lexicon: HALOT
  rationale: El hebreo dice literalmente «a/para los buenos», y el paralelo griego interpreta con εὐσεβέσιν («piadosos», «devotos»). En la línea principal se mantiene la base hebrea «los buenos», mientras que «para bien» expresa el valor beneficioso de la frase sin sobrecargarla con una lectura más específica que el hebreo no exige de manera explícita.
- source_word: ייטיבו
  english_pob_choice: are for good
  chosen_spanish: son para bien
  alternatives_spanish:
  - benefician
  - resultan en bien
  - traen bien
  lexicon: HALOT
  rationale: El verbo expresa resultado favorable. «Son para bien» reproduce el sentido resultativo de manera natural en español y preserva la idea de provecho o beneficio sin convertir el verbo en una glosa explicativa.
- source_word: כן
  english_pob_choice: so also
  chosen_spanish: así también
  alternatives_spanish:
  - de igual modo
  - igualmente
  - de la misma manera
  lexicon: HALOT
  rationale: Marca el paralelismo proverbial entre los dos miembros. «Así también» es claro, formal y mantiene el enlace comparativo.
- source_word: לרעים
  english_pob_choice: for the wicked
  chosen_spanish: para los impíos
  alternatives_spanish:
  - para los malvados
  - para los perversos
  - para los malos
  lexicon: HALOT
  rationale: El hebreo describe personas moralmente malas; el griego paralelo usa ἁμαρτωλοῖς («pecadores»). «Impíos» comunica bien ese perfil en español bíblico sin sonar excesivamente arcaico, y deja visible el contraste moral del dicho.
- source_word: לרעה
  english_pob_choice: to harm
  chosen_spanish: en mal
  alternatives_spanish:
  - para mal
  - en perjuicio
  - en daño
  lexicon: HALOT
  rationale: La palabra hebrea puede significar mal, calamidad o daño. «En mal» conserva la brevedad proverbial y el contraste con «para bien», sin diluir la tensión semántica del texto.
- source_word: נהפכו
  english_pob_choice: they are turned
  chosen_spanish: se tornarán
  alternatives_spanish:
  - se volverán
  - son vueltas
  - serán vueltas
  lexicon: HALOT
  rationale: 'El hebreo presenta un giro pasivo/reflexivo: las mismas cosas cambian de efecto según el destinatario. «Se tornarán» preserva ese movimiento de transformación y, en español, encaja bien con el paralelismo sentencioso.'
theological_decisions:
- issue: Si interpretar los «buenos» como simplemente moralmente buenos o como piadosos/devotos a la luz del griego
  english_pob_reading: Render the Hebrew טובים with a morally positive sense informed by the Greek parallel, without over-specifying covenantal piety in the main text.
  chosen_spanish_reading: Mantener «los buenos» en el texto principal, sin sustituirlo por «los piadosos» o «los devotos»; dejar que el paralelo griego informe el matiz, pero no reemplace la lectura hebrea.
  alternative_spanish_readings:
  - los piadosos
  - los devotos
  - los buenos y piadosos
  rationale: La prioridad del hebreo disponible favorece conservar la designación simple «los buenos». El griego confirma una lectura moral-religiosa, pero no obliga a imponer una especificación extra en la línea principal. Así se preserva la tensión documentada entre ambos testimonios.
  doctrine_reference: 'Translation philosophy: Original-language primacy over translation tradition; Preserve theological tension rather than resolve it.'
- issue: 'Valor teológico de la segunda cola: ¿resultado adverso o retribución moral explícita?'
  english_pob_reading: for the wicked they are turned to harm
  chosen_spanish_reading: para los impíos, se tornarán en mal
  alternative_spanish_readings:
  - para los impíos, se convertirán en daño
  - para los impíos, se volverán para mal
  - para los impíos, se trocarán en mal
  rationale: 'La formulación mantiene el carácter sapiencial general del proverbio: las mismas realidades benefician a unos y perjudican a otros. «En mal» conserva la indeterminación entre daño, calamidad o adversidad, sin convertir el versículo en una declaración doctrinal más precisa de la que el texto ofrece.'
  doctrine_reference: 'Wisdom literature: proverbial generalization; avoid over-systematizing the saying.'
translation_notes:
  revision_awareness: El borrador sigue la última revisión inglesa, que prefirió «good» en vez de «goodly» por exactitud y naturalidad. En español, eso se refleja con «los buenos» en la línea principal, sin introducir un equivalente artificial. También se conserva la estructura proverbial y el contraste simétrico del texto hebreo y del paralelo griego.
  spanish_consistency_notes:
  - Se conserva «Yahvé» como término por defecto en el proyecto cuando aparezca el nombre divino; este versículo no lo contiene.
  - Se usa «impíos» para לרעים, coherente con el tono sapiencial y el paralelo griego con «pecadores».
  - Se preserva la oposición «para bien / en mal» para mantener el juego verbal del hebreo entre beneficio y adversidad.
  - La nota al pie marca explícitamente la alternativa del griego sin sustituir la base hebrea del texto principal.
