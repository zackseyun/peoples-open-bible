  from: from all the goods of your house
  to: of all the goods of your house
  rationale: The current phrasing 'from all the goods of your house' is slightly ambiguous. It could be misread as referring to the location of the search (i.e., Laban's house), rather than the origin of the items being sought. The Hebrew preposition `מִן` here has a partitive sense, which is more clearly and accurately rendered by 'of'. This change clarifies that Jacob is asking what items belonging to Laban's house have been found among his own possessions.
