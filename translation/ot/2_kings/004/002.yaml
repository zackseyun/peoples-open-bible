id: 2KI.4.2
reference: 2 Kings 4:2
source:
  edition: WLC
  text: וַ/יֹּ֨אמֶר אֵלֶ֤י/הָ אֱלִישָׁע֙ מָ֣ה אֶֽעֱשֶׂה לָּ֔/ךְ הַגִּ֣ידִי לִ֔/י מַה יֶּשׁ ל/כי בַּ/בָּ֑יִת וַ/תֹּ֗אמֶר אֵ֣ין לְ/שִׁפְחָתְ/ךָ֥ כֹל֙ בַּ/בַּ֔יִת כִּ֖י אִם אָס֥וּךְ שָֽׁמֶן־־־־׃
translation:
  text: And Elisha said to her[a], “What shall I do for you? Tell me, what do you have in the house?” And she said, “Your female servant has nothing at all in the house except a flask of oil.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'a jar of oil' or 'a small flask of oil'; the Hebrew אָסוּךְ refers to a small container for oil.
    reason: lexical_alternative
lexical_decisions:
- source_word: מָה אֶעֱשֶׂה לָּךְ
  chosen: What shall I do for you?
  alternatives:
  - What can I do for you?
  - What am I to do for you?
  lexicon: HALOT
  rationale: The idiom asks what action Elisha should take on her behalf. 'Shall I do' preserves the deliberative nuance of the imperfect while remaining natural English.
- source_word: הַגִּידִי לִי
  chosen: Tell me
  alternatives:
  - Please tell me
  - Declare to me
  lexicon: HALOT
  rationale: Imperative of נגד with first-person object suffix. 'Tell me' is the most natural modern equivalent; 'please' is not explicit in the Hebrew.
- source_word: מַה יֶּשׁ לָכִי בַּבָּיִת
  chosen: what do you have in the house?
  alternatives:
  - what is there for you in the house?
  - what is in your house?
  lexicon: HALOT
  rationale: The existential יֵשׁ with ל plus possessor is idiomatically rendered as possession in English. 'In the house' keeps the concrete domestic setting.
- source_word: לְשִׁפְחָתְךָ
  chosen: Your female servant
  alternatives:
  - Your maidservant
  - Your servant
  lexicon: HALOT
  rationale: שִׁפְחָה specifically denotes a female servant/slave. 'Female servant' preserves the gender explicitly, in line with the gender-accurate philosophy, while avoiding archaic 'maidservant.' The possessive 'your' reflects her deferential self-reference to Elisha.
- source_word: אֵין ... כֹל
  chosen: has nothing at all
  alternatives:
  - has nothing
  - has nothing whatsoever
  lexicon: HALOT
  rationale: The combination of אֵין with כֹל intensifies the negation. 'Nothing at all' captures the emphatic force naturally in English.
- source_word: כִּי אִם
  chosen: except
  alternatives:
  - but only
  - unless it is
  lexicon: HALOT
  rationale: Here כִּי אִם introduces the sole exception to her statement of lack. 'Except' is the clearest idiomatic rendering.
- source_word: אָסוּךְ שָׁמֶן
  chosen: a flask of oil
  alternatives:
  - a jar of oil
  - a small jar of oil
  - an anointing flask of oil
  lexicon: HALOT
  rationale: אָסוּךְ denotes a small container or flask, often associated with oil. 'Flask of oil' best conveys a small vessel without over-specifying shape. 'Anointing flask' would import a ritual nuance not demanded by the context.
