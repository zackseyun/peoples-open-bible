translation:
  language: es
  text: 'Y Faraón le dijo a Jacob[a][b]: «¿Cuántos son los días de los años de tu vida?»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «¿Cuántos son los días de los años de tu vida?»; es una pregunta formal sobre la edad de Jacob expresada con un hebraísmo.'
    reason: cultural_note
  - marker: b
    text: 'O, más idiomáticamente: «¿Cuántos años tienes?»'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמֶר
  english_pob_choice: And ... said
  chosen_spanish: Y ... le dijo
  alternatives_spanish:
  - Entonces ... le dijo
  - Y ... dijo
  lexicon: HALOT
  rationale: La forma narrativa con waw consecutiva avanza la acción de manera simple. En español, 'Y ... le dijo' conserva ese flujo sin añadir matices temporales o explicativos que el hebreo no exige.
- source_word: פַּרְעֹה
  english_pob_choice: Pharaoh
  chosen_spanish: Faraón
  alternatives_spanish:
  - el Faraón
  lexicon: HALOT
  rationale: Se mantiene el título/nombre tradicional en español bíblico. Sin artículo funciona bien en esta construcción y conserva la referencia al rey egipcio.
- source_word: אֶל
  english_pob_choice: to
  chosen_spanish: le dijo a
  alternatives_spanish:
  - dijo a
  lexicon: HALOT
  rationale: El complemento de destinatario se expresa naturalmente en español con 'a'. El clítico 'le' mantiene la direccionalidad del habla sin sonar forzado.
- source_word: יַעֲקֹב
  english_pob_choice: Jacob
  chosen_spanish: Jacob
  alternatives_spanish:
  - Jacobo
  lexicon: HALOT
  rationale: Se conserva el nombre propio bíblico estándar en español, en continuidad con el uso común y con la forma inglesa auditada.
- source_word: כַּמָּה
  english_pob_choice: How many
  chosen_spanish: ¿Cuántos son...?
  alternatives_spanish:
  - ¿Cuánto es...?
  - ¿Qué edad tienes?
  lexicon: HALOT
  rationale: La pregunta cuantitativa sigue el idioma hebreo de forma bastante directa. '¿Cuántos son...?' permite conservar la construcción idiomática de días/años sin reducirla inmediatamente a una paráfrasis interpretativa.
- source_word: יְמֵי
  english_pob_choice: the days of
  chosen_spanish: los días de
  alternatives_spanish:
  - los días
  lexicon: HALOT
  rationale: Se conserva el plural constructo 'days of' porque forma parte de la expresión hebrea sobre la duración de la vida. En español, 'los días de' comunica bien esa medida temporal.
- source_word: שְׁנֵי
  english_pob_choice: the years of
  chosen_spanish: los años de
  alternatives_spanish:
  - años de
  lexicon: HALOT
  rationale: '''Años de'' reproduce el segundo miembro del giro hebreo y preserva la doble cuantificación ''días/años'' que el texto destaca.'
- source_word: חַיֶּיךָ
  english_pob_choice: your life
  chosen_spanish: tu vida
  alternatives_spanish:
  - tu existencia
  - tu vida entera
  lexicon: HALOT
  rationale: '''Tu vida'' es la equivalencia natural y fiel en español para este modismo. Mantiene el sentido de duración vital sin convertirlo de entrada en una simple pregunta de edad.'
theological_decisions:
- issue: La pregunta se formula como un hebraísmo de edad/ duración de vida, no como una consulta literal sobre 'días' y 'años' separados.
  english_pob_reading: 'Hebrew idiom about Jacob’s age stated in a formal way; alternate idiomatic English: ''How old are you?'''
  chosen_spanish_reading: Hebraísmo sobre la edad o la duración de la vida de Jacob, expresado formalmente como '¿Cuántos son los días de los años de tu vida?'
  alternative_spanish_readings:
  - '''¿Qué edad tienes?'''
  - '''¿Cuántos años tienes?'''
  rationale: La traducción principal conserva la imagen semítica 'días de los años de tu vida' porque el original la usa deliberadamente. Las alternativas españolas son válidas como equivalencia idiomática, pero suavizan la forma hebrea y por eso se dejan solo como opción, no en el texto principal.
  doctrine_reference: Ninguno; decisión de estilo e idiomatización del hebraísmo.
translation_notes:
  revision_awareness: La revisión más reciente no cambió el contenido; el pasaje quedó en acuerdo alto con las notas de auditoría. Se mantiene la estructura formal del hebraísmo sin reducirlo en el texto principal.
  spanish_consistency_notes:
  - Se usa 'Faraón' con mayúscula como título/nombre propio consistente.
  - Se preserva 'tu vida' en singular para reflejar el hebreo idiomático, no 'tus vidas'.
  - Se mantiene la doble estructura 'días de los años' por fidelidad al giro semítico y para conservar la tensión estilística documentada.
