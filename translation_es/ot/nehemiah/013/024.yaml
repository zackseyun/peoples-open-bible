translation:
  language: es
  text: Y la mitad de sus hijos hablaba asdodita[a], y no sabían hablar judeano, sino la lengua de un pueblo u otro.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «y no sabían hablar judeano, sino según la lengua de cada pueblo».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וּבְנֵיהֶם
  english_pob_choice: And their children
  chosen_spanish: sus hijos
  alternatives_spanish:
  - sus niños
  - sus descendientes
  lexicon: HALOT
  rationale: בנים puede referirse a descendencia en general; en este contexto familiar y narrativo, «hijos» es natural en español y conserva la referencia a la prole sin restringirla innecesariamente a varones.
- source_word: חֲצִי
  english_pob_choice: half
  chosen_spanish: la mitad
  alternatives_spanish:
  - mitad
  - la mitad de
  lexicon: HALOT
  rationale: El hebreo expresa una porción parcial del grupo; «la mitad» reproduce ese valor de manera clara y natural en español.
- source_word: מְדַבֵּר
  english_pob_choice: spoke
  chosen_spanish: hablaba
  alternatives_spanish:
  - habló
  - estaba hablando
  lexicon: HALOT
  rationale: El participio presenta un estado/hábito de habla más que un acto puntual; en español, el imperfecto comunica mejor esa condición continua.
- source_word: אַשְׁדּוֹדִית
  english_pob_choice: Ashdodite
  chosen_spanish: asdodita
  alternatives_spanish:
  - la lengua de Asdod
  - asdodiano
  lexicon: HALOT
  rationale: La forma gentilicia femenina señala la lengua asociada con Asdod. «Asdodita» preserva la marca etnolingüística con una formación natural en español.
- source_word: וְאֵינָם מַכִּירִים לְדַבֵּר
  english_pob_choice: and they did not know how to speak
  chosen_spanish: y no sabían hablar
  alternatives_spanish:
  - y no podían hablar
  - y no conocían cómo hablar
  lexicon: HALOT
  rationale: הכיר aquí expresa incapacidad por falta de conocimiento/competencia, no mera falta de reconocimiento. «No sabían hablar» sigue ese valor y mantiene la lectura revisada del POB inglés.
- source_word: יְהוּדִית
  english_pob_choice: Judean
  chosen_spanish: judío
  alternatives_spanish:
  - judeano
  - de Judá
  - hebreo
  lexicon: HALOT
  rationale: El término designa la lengua de Judá/judeanos. En español, «judío» conserva la referencia etnolingüística mejor que «hebreo», que el texto no usa; se evita también «SEÑOR» u otras convenciones ajenas al pasaje.
- source_word: וְכִלְשׁוֹן עַם וָעָם
  english_pob_choice: but the language of one people or another
  chosen_spanish: sino la lengua de un pueblo u otro
  alternatives_spanish:
  - sino según la lengua de cada pueblo
  - sino la lengua de cada pueblo
  lexicon: HALOT
  rationale: La frase distributiva indica la lengua correspondiente a distintos pueblos. «De un pueblo u otro» conserva el matiz distributivo y evita añadir la restricción de «solo» que el hebreo no explicita.
theological_decisions:
- issue: Identidad lingüística de יְהוּדִית
  english_pob_reading: Judean
  chosen_spanish_reading: judío
  alternative_spanish_readings:
  - judeano
  - de Judá
  - hebreo
  rationale: No hay una decisión doctrinal, pero sí un matiz histórico-lingüístico. Mantener «judío» preserva la referencia al idioma/uso de Judá sin convertirlo en «hebreo», que sería más específico de lo que el texto afirma.
  doctrine_reference: None
- issue: Marcador adversativo frente a la cláusula final
  english_pob_reading: but the language of one people or another
  chosen_spanish_reading: sino la lengua de un pueblo u otro
  alternative_spanish_readings:
  - pero la lengua de un pueblo u otro
  - y la lengua de un pueblo u otro
  rationale: «Sino» expresa con claridad la contraposición con la incapacidad de hablar judío, respetando la estructura del hebreo y evitando una simple coordinación que debilitaría el contraste.
  doctrine_reference: None
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión más reciente del POB inglés, que reemplazó una idea de incapacidad general por «did not know how to speak» y eliminó «only». Por eso la versión española usa «no sabían hablar» y no añade equivalente de «solo».
  spanish_consistency_notes:
  - Se mantuvo el gentilicio/lengua con forma baja «asdodita» por tratarse de un adjetivo étnico-lingüístico en contexto narrativo.
  - Se evitó «hebreo» para יְהוּדִית porque el hebreo del pasaje habla de la lengua de Judá, no de la lengua bíblica estándar en sentido técnico.
  - La puntuación conserva una oposición clara entre la incapacidad de hablar judío y la lengua de otros pueblos.
