revisions:
- from: No te juntes con mujeres cantoras[a], no sea que te quemen con sus bocas.
  to: No te juntes con mujeres que cantan[a], no sea que te quemen con la boca.
  rationale: Se hace una reparación menor para mejorar la legibilidad en español neutral sin apartarse del hebreo. «Mujeres que cantan» comunica mejor que «mujeres cantoras» para lectores generales, y «con la boca» conserva la imagen corporal concreta de בְּפִיפִיֹתָם con un giro más natural en español. Se mantiene la nota griega, ajustada para reflejar el texto revisado.
