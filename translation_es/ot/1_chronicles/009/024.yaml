translation:
  language: es
  text: 'Los porteros estaban en los cuatro puntos cardinales: este[a], oeste, norte y sur.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo literalmente: «hacia/para los cuatro vientos»; aquí «vientos» se refiere a las cuatro direcciones o puntos cardinales.'
    reason: lexical_alternative
lexical_decisions:
- source_word: לְאַרְבַּע
  english_pob_choice: at the four
  chosen_spanish: en las cuatro
  alternatives_spanish:
  - para las cuatro
  - a las cuatro
  lexicon: HALOT
  rationale: El hebreo con ל + numeral indica aquí distribución o asignación espacial. En español, 'en las cuatro' comunica de forma natural esa ubicación sin añadir más de lo que el texto dice.
- source_word: רוּחוֹת
  english_pob_choice: directions
  chosen_spanish: direcciones
  alternatives_spanish:
  - vientos
  - cuartos
  - lados
  lexicon: HALOT
  rationale: Aunque literalmente puede significar 'vientos', el contexto enumera puntos cardinales; por eso 'direcciones' conserva el sentido espacial sin perder la conexión con el hebreo.
- source_word: יִהְיוּ
  english_pob_choice: were
  chosen_spanish: estaban
  alternatives_spanish:
  - eran
  - estarían
  lexicon: HALOT
  rationale: El verbo hebreo solo marca existencia/estado. En este contexto de ubicación de los porteros, 'estaban' expresa su posición de manera clara y sobria, sin introducir la idea de ser 'estacionados'.
- source_word: הַשֹּׁעֲרִים
  english_pob_choice: the gatekeepers
  chosen_spanish: los porteros
  alternatives_spanish:
  - los guardianes de la puerta
  - los guardas de la puerta
  lexicon: HALOT
  rationale: '''Porteros'' es un equivalente tradicional y claro para quienes custodian las puertas. Conserva la función concreta del término en el contexto del templo.'
- source_word: מִזְרָח
  english_pob_choice: east
  chosen_spanish: oriente
  alternatives_spanish:
  - este
  lexicon: HALOT
  rationale: Para una enumeración de direcciones, 'oriente' es un español digno y preciso; 'este' también sería válido, pero 'oriente' mantiene mejor el registro bíblico y literario.
- source_word: יָמָּה
  english_pob_choice: west
  chosen_spanish: occidente
  alternatives_spanish:
  - oeste
  - hacia el mar
  lexicon: HALOT
  rationale: Aunque etimológicamente puede aludir a 'hacia el mar', en una lista de puntos cardinales designa el oeste. 'Occidente' conserva la referencia direccional sin explicitar una imagen no presente en el contexto inmediato.
- source_word: צָפֹונָה
  english_pob_choice: north
  chosen_spanish: norte
  alternatives_spanish:
  - hacia el norte
  lexicon: HALOT
  rationale: La forma direccional se traduce de modo directo como 'norte', que es natural en español dentro de una serie de puntos cardinales.
- source_word: וָנֶגְבָּה
  english_pob_choice: and south
  chosen_spanish: y sur
  alternatives_spanish:
  - y hacia el sur
  - y el Négueb
  lexicon: HALOT
  rationale: Aquí נגב funciona como punto cardinal y no como la región del Négueb. 'Sur' reproduce la lista de direcciones de manera limpia y fiel.
translation_notes:
  revision_awareness: La redacción sigue de cerca el pasaje hebreo y el ajuste final del POB en inglés, que simplificó 'were stationed' a 'were at' para adherirse más al original. En español se optó por 'estaban' para mantener esa misma cercanía sin añadir una idea de ubicación artificialmente enfática.
  spanish_consistency_notes:
  - Se evitó 'SEÑOR' porque el versículo no contiene el nombre divino.
  - Se usó 'porteros' como equivalente funcional y tradicionalmente inteligible para הַשֹּׁעֲרִים.
  - '''Oriente/occidente'' se prefirió por registro bíblico y claridad en una lista de puntos cardinales.'
  - No se introdujo 'Négueb' porque el contexto enumera direcciones, no la región geográfica.
