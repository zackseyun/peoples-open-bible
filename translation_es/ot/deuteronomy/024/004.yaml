revisions:
- from: Su primer esposo[a], que la había enviado, no podrá volver a tomarla para que sea su esposa, después de que ella haya sido defileada, porque es una abominación delante de Yahvé; y no harás pecar a la tierra que Yahvé tu Dios te da en herencia.
  to: Su primer esposo[a], que la despidió, no podrá volver a tomarla para que sea su esposa, después de que ella haya sido mancillada, porque eso es una abominación delante de Yahvé; y no traerás pecado sobre la tierra que Yahvé tu Dios te da en herencia.
  rationale: Se corrigen calcos no españoles ('defileada/defilada') con una formulación natural y digna ('mancillada') que sigue dejando abierta la naturaleza exacta de la impureza, tal como exige el source y el audit trail. Se mejora 'que la había enviado' a 'que la despidió' por naturalidad jurídica sin perder el matiz de שלח. Se cambia 'no harás pecar a la tierra' por 'no traerás pecado sobre la tierra' para alinearse mejor con la decisión lexical del POB inglés y con el español idiomático.
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T21:33:38Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien la estructura y el sentido general del hebreo: mantiene ''su primer esposo'', la acción de ''volver a tomarla'', ''abominación'' y ''Yahvé''. También preserva correctamente la ambigüedad de הֻטַּמָּאָה sin resolver su naturaleza exacta. Sin embargo, introduce formas españolas no aceptables (''defileada'', ''defilada'') y una formulación menos natural en ''que la había enviado''. Además, ''no harás pecar a la tierra'' es posible, pero en este contexto legal ''no traerás pecado sobre la tierra'' refleja mejor el valor causativo/documentado del hebreo y el audit trail inglés.'
  spanish_quality_summary: 'La legibilidad general es buena, pero hay problemas léxicos serios: ''defileada/defilada'' no son español estándar y dañan tanto la dignidad como la claridad del texto. Conviene usar una formulación natural como ''haya sido mancillada'' en el texto principal, con nota que preserve ''haya quedado impura'' / ''haya sido hecha impura'' y explique que el hebreo no especifica el tipo de impureza. También es preferible ''que la despidió'' o ''que la envió lejos''; en este contexto jurídico, ''despidió'' suena más idiomático que ''la había enviado'' sin sobreinterpretar demasiado. El resto del verso es claro y eclesialmente legible.'
  glossary_alignment: Se alinea bien con el glosario del proyecto en 'Yahvé', 'abominación', 'esposo' y 'herencia'. La principal desviación es el intento de calcar 'defiled' con 'defileada/defilada', contrario al español natural. El verbo חטא en hifil se puede expresar mejor como 'traer pecado sobre la tierra', en línea con la justificación del POB inglés, evitando una personificación algo torpe en español.
  issues:
  - severity: high
    issue: Uso de 'defileada/defilada' en texto y nota
    rationale: No son formas aceptables en español bíblico ni general. Distorsionan la legibilidad y no cumplen el objetivo de español moderno y digno. Debe reemplazarse por una opción natural que conserve la ambigüedad semántica del hebreo.
  - severity: medium
    issue: '''que la había enviado'' suena poco natural en este contexto legal'
    rationale: Aunque refleja literalmente שלח, en español jurídico-narrativo 'que la despidió' o 'que la envió lejos' suena más natural. 'Despidió' mantiene la idea de separación sin fijar técnicamente 'divorció'.
  - severity: medium
    issue: '''no harás pecar a la tierra'' es menos idiomático que la alternativa documentada'
    rationale: El audit trail inglés favorece 'bring sin upon the land'. En español, 'no traerás pecado sobre la tierra' transmite mejor culpa/contaminación corporativa y evita una personificación extraña de la tierra como agente moral.
  revised_spanish_text: Su primer esposo[a], que la despidió, no podrá volver a tomarla para que sea su esposa, después de que ella haya sido mancillada, porque eso es una abominación delante de Yahvé; y no traerás pecado sobre la tierra que Yahvé tu Dios te da en herencia.
  revised_footnotes:
  - marker: a
    text: O “después de que haya quedado impura” o “después de que haya sido hecha impura”. El hebreo dice “después de que ella haya sido mancillada”, sin especificar la naturaleza exacta de la impureza.
    reason: lexical_alternative
  revision_rationale: Se corrigen calcos no españoles ('defileada/defilada') con una formulación natural y digna ('mancillada') que sigue dejando abierta la naturaleza exacta de la impureza, tal como exige el source y el audit trail. Se mejora 'que la había enviado' a 'que la despidió' por naturalidad jurídica sin perder el matiz de שלח. Se cambia 'no harás pecar a la tierra' por 'no traerás pecado sobre la tierra' para alinearse mejor con la decisión lexical del POB inglés y con el español idiomático.
