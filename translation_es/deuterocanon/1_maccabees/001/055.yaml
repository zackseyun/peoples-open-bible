revisions:
- from: Y sobre los marcos de las puertas de las casas y en las calles quemaban incienso[a][b].
  to: Y en las entradas de las casas y en las calles quemaban incienso[a][b].
  rationale: Se reemplaza «sobre los marcos de las puertas» por «en las entradas» para reflejar mejor θυρίδων según el expediente inglés ('doorways') y para evitar una precisión arquitectónica innecesaria. El cambio mejora la naturalidad del español y mantiene el sentido locativo general del griego. Se conservan intactas las notas léxicas pertinentes.
