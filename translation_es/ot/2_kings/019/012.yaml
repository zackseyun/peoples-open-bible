revisions:
- from: ¿Acaso los dioses de las naciones que mis padres destruyeron las libraron[a] —Gozán, Harán, Rezef y los hijos de Edén, que estaban en Tel-asar?
  to: '¿Acaso los dioses de las naciones que mis padres destruyeron los libraron: Gozán, Harán, Rezef y la gente de Edén[a], que estaba en Tel-asar?'
  rationale: Se ajusta בני עדן a la decisión léxica principal del POB ('la gente de Edén') y se conserva la alternativa literal en nota. Además, se mejora la naturalidad del español con 'los libraron'.
