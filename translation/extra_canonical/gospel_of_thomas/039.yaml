  - Matthew 23:13 (conceptual)
  - Matthew 10:16
  handling: context_only
  rationale: The saying echoes known Synoptic motifs (keys of knowledge; wise as serpents/innocent
    as doves), but the translation follows the Thomasine Coptic wording and number
    without harmonizing to canonical cadence or plurality.
revision_risk_note: 'Key review points: (1) rendering ⲫⲣⲟⲛⲓⲙⲟⲥ as “prudent” rather
  than “wise/shrewd”; (2) rendering ⲁⲕⲉⲣⲁⲓⲟⲥ as “innocent” vs. “guileless/pure”; (3)
  preserving the Coptic generic singular “the serpent … the dove” despite the Greek
  plural and familiar Matthean cadence; (4) translating ⲕⲱⲛⲧⲟⲟⲩ as “allow” and leaving
  the infinitive “to enter” implicit, to retain Thomas’ terseness.'
