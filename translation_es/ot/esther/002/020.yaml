translation:
  language: es
  text: Ester no había dado a conocer[a] su linaje ni su pueblo, tal como Mardoqueo le había mandado; y Ester hacía lo que Mardoqueo había dicho,[b] como cuando estaba bajo su cuidado.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Linaje» traduce de manera amplia la idea de origen, parentesco o ascendencia; el hebreo puede abarcar más de un matiz aquí.
    reason: lexical_alternative
  - marker: b
    text: O «como cuando él la criaba». El hebreo recuerda la etapa anterior en que Ester estaba bajo la tutela y crianza de Mardoqueo.
    reason: lexical_alternative
lexical_decisions:
- source_word: אֵין ... מַגֶּדֶת
  english_pob_choice: had not made known
  chosen_spanish: no había dado a conocer
  alternatives_spanish:
  - no había revelado
  - no había declarado
  - no daba a conocer
  lexicon: HALOT
  rationale: El hebreo forma una negación narrativa con participio, que en español se expresa con naturalidad en pretérito pluscuamperfecto para situar la omisión hasta ese momento. «Dar a conocer» conserva el sentido de divulgación sin añadir una intensidad innecesaria de revelación.
- source_word: מוֹלַדְתָּהּ
  english_pob_choice: kindred
  chosen_spanish: su linaje
  alternatives_spanish:
  - su parentela
  - su ascendencia
  - su origen
  lexicon: HALOT
  rationale: El término puede abarcar nacimiento, linaje o parentesco. «Linaje» comunica bien la identidad de origen y mantiene la amplitud semántica sin reducirla solo a familia inmediata.
- source_word: עַמָּהּ
  english_pob_choice: her people
  chosen_spanish: su pueblo
  alternatives_spanish:
  - su gente
  - su nación
  - su pueblo étnico
  lexicon: HALOT
  rationale: «Pueblo» reproduce de manera natural la referencia al grupo étnico/nacional de Esther y empareja bien con «linaje» en español.
- source_word: צִוָּה עָלֶיהָ
  english_pob_choice: had commanded her
  chosen_spanish: le había mandado
  alternatives_spanish:
  - le había ordenado
  - le había encomendado
  - le había instruido
  lexicon: HALOT
  rationale: צוה expresa mandato con fuerza suficiente; «mandado» conserva esa fuerza en español. «Le había mandado» evita la repetición de «ordenado» y suena sobrio en contexto narrativo.
- source_word: מַאֲמַר מָרְדֳּכַי
  english_pob_choice: what Mordecai said
  chosen_spanish: lo que Mordejai decía
  alternatives_spanish:
  - lo que Mordejai había dicho
  - la palabra de Mordejai
  - el mandato de Mordejai
  lexicon: HALOT
  rationale: מַאֲמַר puede significar dicho, palabra o mandato. Dado que el versículo ya usa el verbo de mandar, «lo que ... decía» evita duplicar una fuerza normativa que el hebreo deja más abierta en esta segunda cláusula.
- source_word: עֹשָׂה
  english_pob_choice: did
  chosen_spanish: hacía
  alternatives_spanish:
  - hizo
  - seguía haciendo
  - obedecía
  lexicon: HALOT
  rationale: El participio sugiere acción habitual o continuada. «Hacía» preserva ese aspecto de continuidad de modo sobrio y natural en español, sin sobrecargarlo como «seguía haciendo».
- source_word: בְאָמְנָה אִתּוֹ
  english_pob_choice: as when she was under his care
  chosen_spanish: como cuando estaba bajo su cuidado
  alternatives_spanish:
  - como cuando él la criaba
  - como cuando estaba bajo su tutela
  - como cuando él la había criado
  lexicon: HALOT
  rationale: La expresión recuerda la etapa en que Mordejai la criaba/guardaba. «Bajo su cuidado» es claro, digno y suficientemente amplio para abarcar tutela y crianza sin introducir un término demasiado técnico.
translation_notes:
  revision_awareness: 'Se tuvo en cuenta la revisión inglesa más reciente: se prefirió una formulación más directa para מוֹלַדְתָּהּ y se evitó reforzar innecesariamente el matiz progresivo de עֹשָׂה. La versión española refleja ese ajuste con «linaje» y «hacía», manteniendo el paralelismo del versículo.'
  spanish_consistency_notes:
  - Se conserva «Esther» y «Mordejai» según la tradición de nombres ya establecida en el proyecto en español.
  - Se mantiene un registro formal y bíblico, pero con sintaxis natural del español moderno.
  - La pareja «linaje / pueblo» intenta reproducir la doble referencia identitaria del hebreo sin simplificarla a una sola idea.
  - 'No se introduce terminología eclesiástica ajena al pasaje; el sentido relacional de la última cláusula queda en lenguaje llano: «bajo su cuidado».'
