translation:
  language: es
  text: 'Así dice Yahvé de los ejércitos: los hijos de Israel y los hijos de Judá son oprimidos[a] por igual; todos los que los llevaron cautivos los retienen con firmeza[b]; se niegan a soltarlos.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «están oprimidos».'
    reason: lexical_alternative
  - marker: b
    text: 'O: «los tienen sujetos con firmeza»; o, menos literalmente, «los mantienen cautivos».'
    reason: lexical_alternative
lexical_decisions:
- source_word: כֹּה אָמַר
  english_pob_choice: Thus says
  chosen_spanish: Así dice
  alternatives_spanish:
  - Esto es lo que dice
  - Así ha dicho
  lexicon: HALOT
  rationale: La fórmula profética introductoria se expresa de manera natural y solemne en español con «Así dice», conservando el valor declarativo sin forzar un giro arcaizante.
- source_word: יְהוָה צְבָאוֹת
  english_pob_choice: Yahweh of hosts
  chosen_spanish: Yahvé de los ejércitos
  alternatives_spanish:
  - Yahvé de las huestes
  - Yahvé Todopoderoso
  lexicon: HALOT
  rationale: Se mantiene el nombre divino según el criterio del proyecto y se vierte צְבָאוֹת con el equivalente transparente «de los ejércitos», que comunica bien el título sin ocultar el nombre.
- source_word: עֲשׁוּקִים
  english_pob_choice: are oppressed
  chosen_spanish: son oprimidos
  alternatives_spanish:
  - están oprimidos
  - son maltratados
  lexicon: HALOT
  rationale: El participio pasivo describe una condición presente; «son oprimidos» conserva el valor pasivo y resulta claro en español. Se evita suavizarlo con un término menos fuerte.
- source_word: בְּנֵי יִשְׂרָאֵל
  english_pob_choice: the sons of Israel
  chosen_spanish: los hijos de Israel
  alternatives_spanish:
  - los israelitas
  - el pueblo de Israel
  lexicon: HALOT
  rationale: Se preserva la expresión filial literal para reflejar la forma hebrea y la decisión del POB en inglés de no neutralizarla sin necesidad textual.
- source_word: וּבְנֵי יְהוּדָה
  english_pob_choice: and the sons of Judah
  chosen_spanish: y los hijos de Judá
  alternatives_spanish:
  - y el pueblo de Judá
  - y Judá
  lexicon: HALOT
  rationale: Se mantiene el paralelismo con «los hijos de Israel» y la referencia explícita al grupo de Judá, sin sustituirla por una etiqueta más general.
- source_word: יַחְדָּו
  english_pob_choice: alike
  chosen_spanish: por igual
  alternatives_spanish:
  - juntos
  - del mismo modo
  lexicon: HALOT
  rationale: El adverbio expresa que ambos grupos comparten la misma condición. «Por igual» comunica esa equivalencia con naturalidad en español y evita la ambigüedad de una simple idea de cercanía espacial.
- source_word: שֹׁבֵי/הֶם
  english_pob_choice: their captors
  chosen_spanish: los que los llevaron cautivos
  alternatives_spanish:
  - sus cautivadores
  - sus captores
  lexicon: HALOT
  rationale: El participio activo designa a quienes los capturaron y deportaron. «Los que los llevaron cautivos» conserva el matiz histórico de cautiverio mejor que un genérico más breve.
- source_word: הֶחֱזִיקוּ בָם
  english_pob_choice: hold them fast
  chosen_spanish: los retienen con firmeza
  alternatives_spanish:
  - los sujetan con fuerza
  - los mantienen firmemente
  lexicon: HALOT
  rationale: La construcción idiomática expresa retención insistente, no mero contacto físico. «Retienen con firmeza» reproduce bien la idea de sujetar y mantener cautivos.
- source_word: מֵאֲנוּ שַׁלְּחָם
  english_pob_choice: they refuse to let them go
  chosen_spanish: se niegan a soltarlos
  alternatives_spanish:
  - rehúsan dejarlos ir
  - se niegan a liberarlos
  lexicon: HALOT
  rationale: En contexto de cautiverio, el infinitivo significa liberar o dejar ir. «Soltarlos» es idiomático en español y conserva la fuerza del rechazo a la liberación.
theological_decisions:
- issue: Traducción del Tetragrámaton en fórmula profética
  english_pob_reading: Yahweh of hosts
  chosen_spanish_reading: Yahvé de los ejércitos
  alternative_spanish_readings:
  - Yahvé de las huestes
  - SEÑOR de los ejércitos
  rationale: Se sigue el criterio del proyecto para el nombre divino, preservando el Tetragrámaton en forma audible y evitando la sustitución por un título enmascarado. El complemento «de los ejércitos» mantiene el contenido del título divino.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Valor colectivo de «los hijos de Israel» y «los hijos de Judá»
  english_pob_reading: The sons of Israel ... and the sons of Judah
  chosen_spanish_reading: los hijos de Israel ... y los hijos de Judá
  alternative_spanish_readings:
  - los israelitas ... y los judíos
  - el pueblo de Israel ... y el pueblo de Judá
  rationale: Se preserva la forma hebrea y la decisión del POB de no neutralizar automáticamente בְּנֵי. Aunque existen equivalentes colectivos más idiomáticos, aquí se mantiene la transparencia hacia el original.
  doctrine_reference: DOCTRINE.md Translation philosophy §4
- issue: Lectura de יַחְדָּו como condición compartida
  english_pob_reading: alike
  chosen_spanish_reading: por igual
  alternative_spanish_readings:
  - juntos
  - en común
  rationale: El adverbio no describe una mera proximidad, sino que marca que ambos grupos están en la misma condición de opresión. «Por igual» expresa con precisión esa equivalencia sin introducir una relación sintáctica ajena al hebreo.
  doctrine_reference: Jeremiah 50:33 source syntax and POB revision history
translation_notes:
  revision_awareness: 'He tomado en cuenta el historial de revisión del POB en inglés: la clausula final se ha ajustado para reflejar que ישראל y Judá comparten una sola condición de opresión, y יַחְדָּו se ha entendido como una marca de igualdad/compartición más natural que una simple indicación de acompañamiento. Por eso el español usa una sola predicación («son oprimidos por igual») y evita separar a Judá como secundario. También se conserva la fuerza de la retención cautiva y la negativa a liberar.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» para יהוה, de acuerdo con la norma del proyecto.
  - Se conserva «hijos» para בְּנֵי por transparencia al original y coherencia con el audit trail.
  - Se evita «SEÑOR» como máscara del nombre divino.
  - «Por igual» traduce יַחְדָּו en una lectura de condición compartida, coherente con la revisión más reciente.
  - «Soltarlos» expresa liberación de cautivos de forma natural en español, sin perder el sentido del infinitivo hebreo.
