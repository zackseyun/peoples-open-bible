  - marker: b
    text: “Brothers” translates the masculine plural Greek term. The phrase “these brothers of mine” may refer specifically to Jesus’ disciples, to believers more generally, or more broadly to the vulnerable; the translation preserves the wording without deciding the interpretive question.
    reason: alternative_reading
