translation:
  language: es
  text: Así que mi lira se ha vuelto lamento[a], y mi caramillo[b], el sonido de los que lloran.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «mi arpa se ha vuelto lamento». כִּנּוֹר puede designar una lira o un arpa, según el contexto.
    reason: lexical_alternative
  - marker: b
    text: O «mi flauta». עֻגָב se refiere en general a un instrumento de viento, y su forma exacta es incierta.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְהִי
  english_pob_choice: has become
  chosen_spanish: se ha vuelto
  alternatives_spanish:
  - se convirtió en
  - llegó a ser
  lexicon: HALOT
  rationale: El hebreo marca un estado resultante; en español, «se ha vuelto» expresa con naturalidad la transformación de los instrumentos en algo asociado al duelo, manteniendo el efecto de resultado sin sobretraducir.
- source_word: לְאֵבֶל
  english_pob_choice: mourning
  chosen_spanish: lamento
  alternatives_spanish:
  - duelo
  - llanto
  lexicon: HALOT
  rationale: אֵבֶל puede referirse al luto o al lamento ritual/poético. «Lamento» funciona bien en el paralelismo con los instrumentos musicales y evita una formulación demasiado ceremonial en español.
- source_word: כִּנֹּרִי
  english_pob_choice: my lyre
  chosen_spanish: mi lira
  alternatives_spanish:
  - mi arpa
  lexicon: HALOT
  rationale: כִּנּוֹר designa un instrumento de cuerdas; en español, «lira» comunica mejor la imagen antigua y evita importar la forma de un arpa moderna. Se conserva la posibilidad alternativa en nota porque el campo léxico permite también «arpa».
- source_word: וְעֻגָבִי
  english_pob_choice: my pipe
  chosen_spanish: mi flauta
  alternatives_spanish:
  - mi pipe
  - mi flauta antigua
  lexicon: HALOT
  rationale: עֻגָב es un instrumento de viento de forma exacta incierta. Aunque el inglés POB usa «pipe» como término amplio, en español «flauta» es el equivalente más inteligible y natural para un instrumento de viento, sin afirmar más de lo que el hebreo permite.
- source_word: לְקוֹל
  english_pob_choice: the sound of
  chosen_spanish: la voz de
  alternatives_spanish:
  - el sonido de
  - la voz de
  lexicon: HALOT
  rationale: קוֹל puede ser «sonido» o «voz». Aquí el paralelismo con los que lloran hace natural «la voz de», que mantiene la resonancia personal del término y su conexión con el llanto humano.
- source_word: בֹּכִים
  english_pob_choice: those who weep
  chosen_spanish: los que lloran
  alternatives_spanish:
  - los que lloran
  - los llorones
  - los que están llorando
  lexicon: HALOT
  rationale: El participio indica personas en acción de llorar. «Los que lloran» conserva el referente humano y suena más natural que un sustantivo artificioso; además, encaja con el paralelismo poético del verso.
translation_notes:
  revision_awareness: El borrador sigue el sentido y las alternativas documentadas en el texto fuente y en el audit trail inglés, sin introducir cambios textuales adicionales. No se detectaron revisiones aplicadas en el expediente; se conserva la lectura de alta concordancia.
  spanish_consistency_notes:
  - Se mantuvo el paralelismo poético entre los dos instrumentos y el final humano del verso.
  - Se evitó la forma tradicional «SEÑOR» o cualquier sustitución teológica no pertinente, ya que el verso no contiene el tetragrámaton ni títulos divinos.
  - Se prefirió un español natural y publicable, pero sin perder la tensión lexical de los nombres de instrumentos y del término de lamento.
