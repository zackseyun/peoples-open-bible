translation:
  language: es
  text: Y los hizo nobles y valientes para el combate de infantería[a] y la guerra de asedio, y después de saquearlos[b][c], venció a todos los enemigos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «para la batalla de a pie»; el griego se refiere literalmente a combatir a pie.
    reason: lexical_alternative
  - marker: b
    text: El participio griego puede entenderse como «después de saquear» o «después de devastar», con frecuencia con ciudades o fortalezas en vista.
    reason: lexical_alternative
  - marker: c
    text: El griego deja el sujeto de esta cláusula comprimido y algo implícito; la traducción conserva esa brusquedad en vez de especificar un sujeto desde el contexto más amplio.
    reason: alternative_reading
lexical_decisions:
- source_word: ἔσχεν
  english_pob_choice: it made
  chosen_spanish: los hizo
  alternatives_spanish:
  - los mantuvo
  - los hizo ser
  lexicon: BDAG
  rationale: En la construcción con doble acusativo, ἔσχεν tiene sentido causativo/resultativo. En español, «los hizo» comunica de manera natural esa acción de producir un estado de nobleza y valor en ellos.
- source_word: γενναίους
  english_pob_choice: noble
  chosen_spanish: nobles
  alternatives_spanish:
  - de noble ánimo
  - valerosos
  lexicon: LSJ
  rationale: γενναῖος puede expresar nobleza de carácter además de valor. Como ἀνδρείους ya cubre la valentía, «nobles» conserva la distinción semántica sin repetir la misma idea.
- source_word: ἀνδρείους
  english_pob_choice: courageous
  chosen_spanish: valientes
  alternatives_spanish:
  - courageosos
  - de gran valor
  lexicon: LSJ
  rationale: «Valientes» transmite el sentido de valor militar de ἀνδρείους con un registro claro y natural en español, sin introducir matices arcaicos.
- source_word: εἰς πεζομαχίαν
  english_pob_choice: in infantry combat
  chosen_spanish: para el combate de infantería
  alternatives_spanish:
  - para la batalla de a pie
  - para combate a pie
  lexicon: LSJ
  rationale: πεζομαχία remite a combatir a pie, es decir, combate de infantería. «Para el combate de infantería» preserva el matiz técnico y la relación de finalidad de εἰς.
- source_word: πολιορκίαν
  english_pob_choice: siege warfare
  chosen_spanish: la guerra de sitio
  alternatives_spanish:
  - el sitio
  - la guerra de asedio
  lexicon: LSJ
  rationale: πολιορκία denota actividad de sitio o asedio. «La guerra de sitio» suena natural en español y mantiene el paralelismo militar con el término anterior.
- source_word: ἐκπορθήσας
  english_pob_choice: after sacking them
  chosen_spanish: después de devastarlos
  alternatives_spanish:
  - después de saquearlos
  - después de arrasarlos
  lexicon: LSJ
  rationale: El participio ἐκπορθήσας suele referirse a saquear o devastar. «Devastarlos» conserva la fuerza destructiva sin añadir explícitamente un objeto como «ciudades», que el griego no nombra de forma abierta.
- source_word: ἐνίκησεν
  english_pob_choice: he conquered
  chosen_spanish: venció
  alternatives_spanish:
  - conquistó
  - triunfó sobre
  lexicon: BDAG
  rationale: νικάω puede traducirse como vencer o conquistar. Aquí «venció» encaja bien con el cierre militar de la frase y evita cargar de más el matiz territorial de «conquistó».
- source_word: πάντας τοὺς πολεμίους
  english_pob_choice: all the enemies
  chosen_spanish: a todos los enemigos
  alternatives_spanish:
  - a todos sus enemigos
  - a todos los adversarios
  lexicon: BDAG
  rationale: El griego dice literalmente «a todos los enemigos»; el posesivo no está expresado, por lo que no se añade. En español, el objeto directo con «a» es normal y transparente.
theological_decisions:
- issue: Sujeto implícito y cambio de referencia dentro de la oración
  english_pob_reading: Render the subject impersonally as 'it' and preserve the final singular as 'he conquered,' reflecting the Greek's rhetorical compression rather than resolving the referent.
  chosen_spanish_reading: Mantener la compresión retórica sin resolver el sujeto explícito en el texto principal, usando una formulación impersonal/indirecta que no añada un referente ausente en el griego.
  alternative_spanish_readings:
  - Hacer explícito un sujeto contextual, como 'la madre' o 'la razón'
  - Uniformar toda la cláusula con un solo sujeto explícito
  rationale: 'El griego presenta una frase comprimida: el verbo inicial carece de sujeto explícito y la secuencia final pasa a un singular masculino. La versión española conserva esa tensión sin introducir una identificación interpretativa que el texto base no dice directamente.'
  doctrine_reference: DOCTRINE.md §3 Preserve theological tension rather than resolve it
translation_notes:
  revision_awareness: 'Se tomó en cuenta la revisión más reciente que precisó πεζομαχίαν como «infantry combat» y ajustó ἐκπορθήσας para no añadir explícitamente «ciudades». La redacción española sigue esa línea: conserva el sentido técnico de combate de infantería y mantiene implícito el objeto de la devastación.'
  spanish_consistency_notes:
  - Se usó «Yahvé» no aplica aquí porque el versículo no contiene el nombre divino.
  - Se evitó introducir un posesivo en «a todos los enemigos» porque el griego no lo expresa.
  - Se prefirió «valientes» para ἀνδρείους y «nobles» para γενναίους para no fusionar ambos adjetivos.
  - Se conservó la compresión sintáctica del final sin resolver el referente implícito en el cuerpo del texto.
