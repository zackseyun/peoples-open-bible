translation:
  language: es
  text: Esta es la porción de toda carne de parte de Dios[a], ¿y por qué rechazar el decreto[b] del Altísimo? Sea por diez, o por cien, o por mil años[c], no hay en Sheol reproche de vida[d].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El hebreo dice «de Dios»; el paralelo griego dice «del Señor».
    reason: alternative_reading
  - marker: b
    text: El hebreo parece decir «la ley del Altísimo», mientras que el paralelo griego tiene «el beneplácito del Altísimo». «Decreto» refleja el sentido de una disposición divina en el contexto.
    reason: alternative_reading
  - marker: c
    text: La secuencia numérica es textualmente difícil en el hebreo; el paralelo griego dice «ya sea diez, o cien, o mil años».
    reason: textual_variant
  - marker: d
    text: El griego tiene «Hades»; el testimonio hebreo favorece «Sheol».
    reason: lexical_alternative
lexical_decisions:
- source_word: זה חלק כל בשר / τοῦτό τὸ κρίμα ... πάσῃ σαρκί
  english_pob_choice: This is the lot of all flesh
  chosen_spanish: Este es el lote de toda carne
  alternatives_spanish:
  - Este es el juicio de toda carne
  - Este es el destino de todo mortal
  lexicon: HALOT; BDAG/LXX lexica
  rationale: «Lote» conserva el valor de חלק como porción asignada o destino recibido, y «toda carne» preserva la referencia a la humanidad mortal. «Juicio» se mantiene como alternativa porque el griego usa κρίμα, pero en español «lote» funciona mejor con el hebreo y con el sentido de una condición ordenada para todos.
- source_word: מאל / παρὰ Κυρίου
  english_pob_choice: from God
  chosen_spanish: de parte de Dios
  alternatives_spanish:
  - del Señor
  lexicon: HALOT; BDAG/LXX lexica
  rationale: El hebreo transmite «de Dios», mientras que el griego dice «del Señor». «De parte de Dios» mantiene la procedencia divina en un español natural sin perder la tensión entre ambos testigos; «del Señor» queda como alternativa apoyada por el griego.
- source_word: תמאס / ἀπαναίνῃ
  english_pob_choice: reject
  chosen_spanish: rechazar
  alternatives_spanish:
  - despreciar
  - rehusar
  lexicon: HALOT; BDAG
  rationale: «Rechazar» expresa bien la pregunta retórica y el valor de מאס / ἀπαναίνῃ sin cargar innecesariamente la frase con matices más fuertes que el contexto no exige. «Despreciar» y «rehusar» siguen siendo posibles, pero menos fluidas aquí.
- source_word: בתורת עליון / ἐν εὐδοκίᾳ Ὑψίστου
  english_pob_choice: the decree of the Most High
  chosen_spanish: el decreto del Altísimo
  alternatives_spanish:
  - la ley del Altísimo
  - el beneplácito del Altísimo
  - la voluntad del Altísimo
  lexicon: HALOT; BDAG
  rationale: 'El testimonio hebreo y el griego divergen en un punto importante: «ley» frente a «beneplácito». «Decreto» funciona como término mediador en español para una determinación divina establecida, sin obligar al lector a escoger de antemano entre las dos formulaciones. Las alternativas se conservan para transparencia textual.'
- source_word: לאלף שנים מאה ועשר / εἴτε δέκα εἴτε ἑκατὸν εἴτε χίλια ἔτη
  english_pob_choice: Whether for a thousand years, or a hundred, or ten
  chosen_spanish: Sea por diez, o por cien, o por mil años
  alternatives_spanish:
  - Ya sea por diez, o por cien, o por mil años
  - Sea por diez, o por ciento, o por mil años
  lexicon: HALOT; BDAG
  rationale: Se sigue el orden del griego, que presenta la secuencia de menor a mayor. En español, la formulación «Sea por…» conserva el tono concesivo y la estructura del hebreo/griego sin sobreexplicar. «Cien» es preferible a «ciento» en este contexto.
- source_word: איש תוכחות בשאול חיים / οὐκ ἔστιν ἐν ᾅδου ἔλεγμὸς ζωῆς
  english_pob_choice: there is no rebuke of life in Sheol
  chosen_spanish: no hay en Sheol reprensión de vida
  alternatives_spanish:
  - no hay en Sheol reprobación respecto de la vida
  - no hay en Sheol reproche de vida
  lexicon: HALOT; BDAG
  rationale: «Reprensión de vida» conserva la aspereza del sintagma y deja visible la dificultad del hebreo y del griego, donde aparece la idea de una reprensión/reproche vinculada con la vida en el ámbito de los muertos. «Sheol» se mantiene para preservar el concepto semítico del texto hebreo.
theological_decisions:
- issue: Tratamiento del término de ultratumba שאול / ᾅδης
  english_pob_reading: Sheol
  chosen_spanish_reading: Sheol
  alternative_spanish_readings:
  - Hades
  - sepulcro
  rationale: Como el hebreo está disponible y es la base primaria aquí, «Sheol» preserva el mundo conceptual semítico sin importaciones posteriores. «Hades» refleja el paralelo griego, y «sepulcro» sería una simplificación posible pero menos precisa para este pasaje.
  doctrine_reference: 'PHILOSOPHY.md: translate directly from Hebrew where Sirach survives; preserve source concepts transparently'
- issue: Tensión entre «ley» en el hebreo y «beneplácito» en el griego
  english_pob_reading: the decree of the Most High
  chosen_spanish_reading: el decreto del Altísimo
  alternative_spanish_readings:
  - la ley del Altísimo
  - el beneplácito del Altísimo
  - la voluntad del Altísimo
  rationale: Se mantiene una traducción mediadora que no borra la divergencia significativa entre los testigos. «Decreto» en español expresa una determinación soberana y permite leer el pasaje como aceptación de la medida establecida por Dios sin resolver indebidamente la tensión textual.
  doctrine_reference: 'DOCTRINE.md: preserve theological tension rather than resolve it'
translation_notes:
  revision_awareness: 'El último repaso indicó acuerdo moderado y sin cambios: el borrador sigue la lectura hebrea primaria donde está disponible, conserva la tensión con el paralelo griego en el sintagma del Altísimo, y mantiene la secuencia numérica según el griego por la dificultad textual del hebreo.'
  spanish_consistency_notes:
  - Se usa «Dios» en el texto principal y se deja «Señor» solo como alternativa textual en nota.
  - «Sheol» se conserva consistentemente para el ámbito de los muertos, evitando sustituirlo por un término más general.
  - «Altísimo» se capitaliza de forma consistente como título divino.
  - La puntuación conserva el tono proverbial y la pregunta retórica del verso.
  - Los marcadores de nota [a]-[d] aparecen exactamente en el texto donde corresponde.
