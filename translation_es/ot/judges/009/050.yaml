translation:
  language: es
  text: Entonces Abimelec fue a Tebez[a], acampó contra Tebez y la capturó.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «acampó en Tebez»; la preposición hebrea puede vertirse de forma más literal así, pero en este contexto militar probablemente indica que estableció su campamento contra la ciudad.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֵּלֶךְ
  english_pob_choice: went
  chosen_spanish: fue
  alternatives_spanish:
  - marchó
  - procedió
  lexicon: HALOT
  rationale: El hebreo הלך en la secuencia narrativa wayyiqtol expresa movimiento básico. En español, «fue» comunica ese desplazamiento sin añadir matices militares que el verbo no exige por sí mismo.
- source_word: אֲבִימֶלֶךְ
  english_pob_choice: Abimelech
  chosen_spanish: Abimelec
  alternatives_spanish:
  - Abimelech
  lexicon: convención onomástica española
  rationale: Se translitera el nombre según el uso bíblico habitual en español, manteniendo la identificación del personaje sin depender de la forma inglesa.
- source_word: אֶל
  english_pob_choice: to
  chosen_spanish: a
  alternatives_spanish:
  - contra
  lexicon: HALOT
  rationale: La preposición אֶל marca primariamente dirección hacia un lugar. En español, «a» conserva ese valor básico; el matiz hostil lo aporta el contexto militar y el verbo siguiente.
- source_word: תֵּבֵץ
  english_pob_choice: Thebez
  chosen_spanish: Tebez
  alternatives_spanish:
  - Thebez
  lexicon: convención toponímica española
  rationale: Se adopta la forma española más natural del topónimo, sin modificar su referente histórico.
- source_word: וַיִּחַן
  english_pob_choice: camped against
  chosen_spanish: acampó contra
  alternatives_spanish:
  - acampó en
  - acampó junto a
  lexicon: HALOT
  rationale: חנה significa acampar. En este contexto de asedio, la construcción con בְּ describe una posición militar frente a la ciudad; «acampó contra» comunica mejor esa postura que una traducción meramente locativa.
- source_word: בְּתֵבֵץ
  english_pob_choice: against Thebez
  chosen_spanish: contra Tebez
  alternatives_spanish:
  - en Tebez
  - junto a Tebez
  lexicon: HALOT
  rationale: Aunque בְּ suele traducirse «en», con חנה en contexto de guerra puede implicar la colocación del campamento frente a la ciudad. En español, «contra Tebez» preserva esa lectura contextual y la continuidad con la captura posterior.
- source_word: וַיִּלְכְּדָהּ
  english_pob_choice: captured it
  chosen_spanish: la capturó
  alternatives_spanish:
  - la tomó
  - la apresó
  lexicon: HALOT
  rationale: לכד se usa frecuentemente para capturar o tomar una ciudad. «La capturó» mantiene el sentido militar y refleja que el pronombre femenino retoma a Tebez.
translation_notes:
  revision_awareness: El pasaje coincide de manera alta con el texto hebreo y con la revisión inglesa auditada; no se requirieron cambios de sentido adicionales.
  spanish_consistency_notes:
  - Se mantiene la secuencia narrativa simple del hebreo con verbos en pasado perfecto simple.
  - Se usa «contra» dos veces para reflejar la lectura militar de חנה + בְּ sin oscurecer la dirección inicial de אֶל.
  - El pronombre femenino «la» conserva la referencia al topónimo Tebez como ciudad.
