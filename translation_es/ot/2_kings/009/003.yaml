review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la secuencia verbal del hebreo, preserva correctamente «Yahvé», «te he ungido», «rey sobre Israel» y la urgencia final de escapar sin esperar. Sin embargo, la nota al pie no sigue la evidencia auditada: el inglés POB nota la alternativa literal «a Israel» para אֶל יִשְׂרָאֵל, no una explicación sobre «el aceite».'
  spanish_quality_summary: El español es claro y digno. «Frasco», «sobre su cabeza», «Así dice Yahvé» y «huye» funcionan bien. El único ajuste recomendable en el texto principal es «no esperes» en lugar de «no te quedes», porque corresponde más directamente a וְלֹא תְחַכֶּה (‘no esperes / no aguardes’) y evita una leve expansión interpretativa hacia ‘no permanecas allí’.
  glossary_alignment: 'La terminología clave del proyecto está bien alineada: יְהוָה = «Yahvé», מְשַׁחְתִּיךָ = «te he ungido», y la fórmula real conserva «rey sobre Israel». No hay conflicto con los términos doctrinales principales. La nota debe realinearse con la decisión léxica sobre אֶל יִשְׂרָאֵל.'
  issues:
  - severity: medium
    issue: La nota al pie está anclada en «frasco» pero el contenido trata «el aceite».
    rationale: No corresponde ni al punto auditado por el inglés POB ni a una ambigüedad que necesite nota en español. Además, el inglés preserva la nota sobre אֶל יִשְׂרָאֵל, no sobre הַשֶּׁמֶן.
  - severity: medium
    issue: Falta la nota léxica sobre «sobre Israel» frente al literal «a Israel».
    rationale: La auditoría inglesa documenta explícitamente esta decisión; debe preservarse en español porque justifica una interpretación no literal de la preposición hebrea.
  - severity: low
    issue: «No te quedes» es menos preciso que «no esperes».
    rationale: El verbo חכה significa ‘esperar, aguardar’. «No te quedes» comunica bien la urgencia, pero desplaza levemente el sentido desde esperar/demorarse hacia permanecer físicamente.
  revised_spanish_text: 'Entonces toma el frasco de aceite, derrámalo sobre su cabeza y dile: «Así dice Yahvé: Yo te he ungido rey sobre Israel[a]». Luego abre la puerta y huye; no esperes.'
  revised_footnotes:
  - marker: a
    text: 'Hebreo: «a Israel»; en esta fórmula de investidura real, el sentido es «sobre Israel».'
    reason: lexical_alternative
  revision_rationale: Se corrige la nota para que refleje la decisión léxica auditada sobre אֶל יִשְׂרָאֵל y se reemplaza «no te quedes» por «no esperes», que corresponde más directamente al hebreo תְחַכֶּה. No se requieren cambios doctrinales ni estructurales adicionales.
