translation:
  language: es
  text: Mientras Israel ha habitado en Hesbón y en sus ciudades dependientes[a], y en Aroer y en sus ciudades dependientes, y en todas las ciudades que están a lo largo del Arnón, durante trescientos años[b], ¿por qué no las recuperaron durante ese tiempo?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «sus hijas», un modismo para asentamientos menores dependientes de una ciudad principal.'
    reason: cultural_note
  - marker: b
    text: O «¿por qué no las libraron?» o «¿por qué no las salvaron?». En este contexto, el sentido es reclamar esas ciudades o territorio.
    reason: lexical_alternative
lexical_decisions:
- source_word: בְּשֶׁבֶת
  english_pob_choice: While Israel has lived
  chosen_spanish: Mientras Israel ha habitado
  alternatives_spanish:
  - Durante la morada de Israel
  - Cuando Israel vivía
  lexicon: HALOT
  rationale: El infinitivo constructo con ב indica circunstancia temporal durativa. «Mientras» conserva bien el marco temporal extendido, y «ha habitado» expresa la permanencia continua sin volver la frase pesada en español.
- source_word: בְּנוֹתֶיהָ
  english_pob_choice: its daughter towns
  chosen_spanish: sus ciudades dependientes
  alternatives_spanish:
  - sus ciudades hijas
  - sus aldeas dependientes
  lexicon: HALOT
  rationale: La imagen literal es «sus hijas», pero el sentido idiomático apunta a asentamientos subordinados a una ciudad principal. «Ciudades dependientes» mantiene la relación jerárquica y suena natural en español; se conserva la explicación en nota.
- source_word: עַרְעוֹר
  english_pob_choice: Aroer
  chosen_spanish: Aroer
  alternatives_spanish:
  - Aroer
  lexicon: Nombre propio
  rationale: Se conserva la transliteración estándar del topónimo.
- source_word: עַל יְדֵי אַרְנוֹן
  english_pob_choice: along the Arnon
  chosen_spanish: a lo largo del Arnón
  alternatives_spanish:
  - junto al Arnón
  - a la orilla del Arnón
  lexicon: HALOT
  rationale: La expresión idiomática comunica ubicación junto a o en la cercanía del río/valle del Arnón. «A lo largo del» es fluido y conserva la idea de extensión territorial.
- source_word: שְׁלֹשׁ מֵאוֹת שָׁנָה
  english_pob_choice: for three hundred years
  chosen_spanish: por trescientos años
  alternatives_spanish:
  - durante trescientos años
  - por espacio de trescientos años
  lexicon: HALOT
  rationale: El español admite «por» con duración. Se mantiene la extensión temporal del reclamo sin añadir interpretación.
- source_word: וּמַדּוּעַ
  english_pob_choice: why
  chosen_spanish: ¿por qué
  alternatives_spanish:
  - ¿y por qué
  lexicon: HALOT
  rationale: En español la conjunción inicial puede omitirse para una pregunta más natural; el valor interrogativo y retórico se conserva plenamente.
- source_word: הִצַּלְתֶּם
  english_pob_choice: recover them
  chosen_spanish: las recuperaste
  alternatives_spanish:
  - las rescataste
  - las libraste
  - las tomaste de vuelta
  lexicon: HALOT
  rationale: En este contexto judicial-territorial, el verbo no describe rescate personal sino la recuperación de territorio o ciudades. «Recuperaste» reproduce bien la fuerza argumentativa del pasaje.
- source_word: בָּעֵת הַהִיא
  english_pob_choice: during that time
  chosen_spanish: en ese tiempo
  alternatives_spanish:
  - durante ese tiempo
  - entonces
  lexicon: HALOT
  rationale: La referencia abarca el período de trescientos años, no un instante puntual. «En ese tiempo» evita restringir el sentido a un momento aislado.
translation_notes:
  revision_awareness: La base inglesa fue revisada de «at that time» a «during that time» para referirse con más naturalidad al período completo de trescientos años; la redacción española ya refleja ese alcance temporal con «en ese tiempo».
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma general para el tetragrámaton, aunque este versículo no lo contiene.
  - Se conserva un registro bíblico formal sin arcaísmos innecesarios.
  - «Ciudades dependientes» evita la literalidad cruda de «hijas» pero conserva el modismo semítico con nota explicativa.
  - La pregunta retórica se formula con fluidez natural en español sin perder el filo argumentativo del hebreo.
