  source_alignment_summary: 'La propuesta española sigue bien el hebreo: וַיְקַנֵּא expresa celo/celos de pacto por la tierra de Yahvé, יְהוָה se vierte correctamente como Yahvé, וַיַּחְמֹל עַל עַמּוֹ como compasión hacia su pueblo. Sin embargo, la nota al pie no preserva la alternativa documentada por el POB inglés, porque repite la lectura principal en vez de ofrecer la opción ''fue/mostró celo'' o equivalente.'
  spanish_quality_summary: El texto principal es natural y claro en español. 'Se mostró celoso por su tierra' es legible, aunque algo menos directo que 'se puso celoso' y más interpretativo que 'tuvo celo'. 'Tuvo compasión de su pueblo' es idiomático y digno. La única reparación necesaria es la nota al pie, y conviene también ajustar levemente la redacción principal para reflejar mejor el matiz ingresivo de 'became jealous'.
  glossary_alignment: 'Se respeta la terminología del proyecto: יְהוָה > ''Yahvé''; עַם > ''pueblo''. No hay conflicto con otras directrices. La elección ''celoso'' mantiene la tensión teológica de קנא, y la alternativa de nota debe reflejar ''celoso/lleno de celo'' en vez de duplicar la traducción principal.'
  issues:
