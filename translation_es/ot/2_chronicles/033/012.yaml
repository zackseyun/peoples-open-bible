    issue: Los marcadores de notas están anclados en el lugar equivocado.
    rationale: La nota sobre el modismo hebreo חִלָּה אֶת־פְּנֵי debe ir con 'buscó/imploró el favor de', no con 'angustia'. La nota sobre 'sus padres' debe anclarse en esa frase, no en 'angustia'.
  - severity: low
    issue: '''Imploró el favor de'' intensifica levemente la acción frente a la elección auditada ''sought the favor of''.'
    rationale: El hebreo permite 'imploró/rogó', pero la decisión principal inglesa escogió una formulación menos interpretativa. 'Buscó el favor de' preserva mejor esa elección y sigue sonando natural en español.
  revised_spanish_text: Y cuando estuvo en angustia, buscó el favor[a] de Yahvé su Dios y se humilló mucho delante del Dios de sus padres[b].
