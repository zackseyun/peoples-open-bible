- from: Y reunirá un pueblo santo, al cual lo conducirá[a] en justicia[b]; y juzgará las tribus del pueblo santificado[c] por el Señor su Dios.
  to: Y reunirá un pueblo santo, a quien conducirá en rectitud[a]; y juzgará las tribus del pueblo santificado por Yahvé, su Dios.[b]
  rationale: Se mejoró la naturalidad de la relativa («a quien conducirá»), se corrigió la nota defectuosa sobre δικαιοσύνη colocando «en rectitud» en el texto y «en justicia» como alternativa real, y se alineó el texto principal con la política del proyecto usando «Yahvé» para la referencia divina, conservando en nota la alternativa más cercana al audit trail inglés.
