translation:
  language: es
  text: Y quebrantaré la soberbia[a] de vuestra fuerza, y haré vuestros cielos[b] como hierro y vuestra tierra como bronce[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'la altivez'. El hebreo puede expresar tanto 'soberbia' como 'altivez'.
    reason: lexical_alternative
  - marker: b
    text: O 'su cielo'. El hebreo tiene 'sus cielos', una forma plural que a menudo se refiere al cielo visible.
    reason: lexical_alternative
  - marker: c
    text: O 'como cobre'. El término hebreo puede referirse a cobre o a bronce.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְשָׁבַרְתִּי
  english_pob_choice: And I will break
  chosen_spanish: Y quebrantaré
  alternatives_spanish:
  - y romperé
  - y destrozaré
  lexicon: HALOT
  rationale: שׁבר expresa la idea de romper o quebrantar. 'Quebrantaré' conserva el sentido de hacer añicos o abatir y suena natural en español bíblico sin perder fuerza.
- source_word: גְּאוֹן
  english_pob_choice: the pride
  chosen_spanish: la soberbia
  alternatives_spanish:
  - el orgullo
  - la arrogancia
  - la majestad
  lexicon: HALOT
  rationale: En este contexto de juicio pactual, גָּאוֹן apunta a una actitud altiva y autosuficiente. 'Soberbia' transmite mejor esa carga negativa que 'orgullo' en español bíblico.
- source_word: עֻזְּכֶם
  english_pob_choice: of your strength
  chosen_spanish: de vuestra fuerza
  alternatives_spanish:
  - de vuestro poder
  - de vuestra fortaleza
  lexicon: HALOT
  rationale: עֹז denota fuerza, poder o vigor. 'Fuerza' mantiene el paralelismo con 'soberbia' y conserva el valor concreto del genitivo.
- source_word: וְנָתַתִּי
  english_pob_choice: and I will make
  chosen_spanish: y haré
  alternatives_spanish:
  - y pondré
  - y convertiré
  lexicon: HALOT
  rationale: En esta construcción comparativa, נתן funciona idiomáticamente como 'hacer que sea'. 'Haré' expresa con claridad el resultado sin añadir matices no presentes en el hebreo.
- source_word: שְׁמֵיכֶם
  english_pob_choice: your heavens
  chosen_spanish: vuestros cielos
  alternatives_spanish:
  - vuestro cielo
  - vuestras alturas
  lexicon: HALOT
  rationale: El hebreo está en plural, y el POB inglés lo preserva como 'heavens'. 'Cielos' mantiene esa forma plural y el registro bíblico, con una nota posible para aclarar su referencia al cielo visible.
- source_word: כַּבַּרְזֶל
  english_pob_choice: like iron
  chosen_spanish: como hierro
  alternatives_spanish:
  - cual hierro
  lexicon: HALOT
  rationale: La comparación con hierro comunica dureza e intransigencia, coherente con la imagen de un cielo que no deja caer lluvia.
- source_word: אַרְצְכֶם
  english_pob_choice: your land
  chosen_spanish: vuestra tierra
  alternatives_spanish:
  - vuestra región
  - vuestro suelo
  lexicon: HALOT
  rationale: En un contexto agrícola y de pacto, 'tierra' puede abarcar tanto el territorio como el suelo productivo. Es natural en español y conserva el campo semántico de אֶרֶץ.
- source_word: כַּנְּחֻשָׁה
  english_pob_choice: like bronze
  chosen_spanish: como bronce
  alternatives_spanish:
  - como cobre
  lexicon: HALOT
  rationale: נְחֻשָׁה puede referirse a cobre o bronce. 'Bronce' es la opción más idiomática y convencional en español bíblico para esta imagen de dureza y esterilidad.
theological_decisions:
- issue: Imagen de juicio pactual y sequía implícita
  english_pob_reading: The verse describes covenant judgment in which the sky becomes unyielding and the land infertile.
  chosen_spanish_reading: El versículo presenta juicio pactual mediante imágenes de cielo endurecido y tierra improductiva.
  alternative_spanish_readings:
  - Una descripción general de dificultades severas sin aludir de modo específico a la sequía
  - Una metáfora puramente moral de humillación sin referencia agrícola
  rationale: La metáfora del cielo como hierro y la tierra como bronce pertenece al lenguaje de maldición del pacto y apunta a esterilidad agrícola. La traducción conserva la imagen sin explicitar 'sequía' en el texto principal.
  doctrine_reference: Levítico 26; Deuteronomio 28:23-24
translation_notes:
  revision_awareness: 'Se mantuvo la lectura ya validada por el POB en inglés: ''break'' para שׁבר, ''make'' para נתן en construcción resultativa, y la pareja imagética ''heavens/land'' con sus comparaciones a hierro y bronce. No se introdujeron intensificaciones ni explicaciones ajenas al hebreo.'
  spanish_consistency_notes:
  - Se preservó el plural bíblico 'cielos' para שְׁמֵיכֶם, en continuidad con el POB inglés.
  - '''Bronce'' se usó de manera consistente con el valor convencional de נְחֻשָׁה, sin sustituirlo por ''cobre'' en el texto principal.'
  - '''Soberbia'' mantiene una tonalidad negativa adecuada al contexto de juicio, sin borrar la idea de orgullo/autosuficiencia presente en גְּאוֹן.'
