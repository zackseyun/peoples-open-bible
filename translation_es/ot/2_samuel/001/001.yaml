translation:
  language: es
  text: Ahora bien, después de la muerte de Saúl, cuando David volvió de derrotar[a] a Amalec, David se quedó en Siclag dos días.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebreo «Amalec», un referente colectivo al pueblo amalecita.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְהִי
  english_pob_choice: Now
  chosen_spanish: Ahora bien
  alternatives_spanish:
  - Y aconteció
  - Ahora
  lexicon: HALOT
  rationale: La forma narrativa hebrea introduce la escena. «Ahora bien» conserva la función discursiva de transición sin cargar el texto con una fórmula demasiado literal o arcaica.
- source_word: אַֽחֲרֵי מ֣וֹת שָׁא֔וּל
  english_pob_choice: after the death of Saul
  chosen_spanish: después de la muerte de Saúl
  alternatives_spanish:
  - tras la muerte de Saúl
  - después de que Saúl murió
  lexicon: HALOT
  rationale: La construcción nominal temporal se expresa naturalmente en español como «después de la muerte de». Mantiene el marco temporal formal del hebreo.
- source_word: שָׁא֔וּל
  english_pob_choice: Saul
  chosen_spanish: Saúl
  alternatives_spanish:
  - Saul
  lexicon: HALOT
  rationale: Nombre propio bíblico en forma castellana habitual.
- source_word: שָׁ֔ב
  english_pob_choice: had returned
  chosen_spanish: había vuelto
  alternatives_spanish:
  - volvió
  - había regresado
  lexicon: HALOT
  rationale: El perfecto hebreo dentro de un marco temporal anterior se vierte mejor con pluscuamperfecto en español para señalar que la acción ya estaba completa antes del evento principal.
- source_word: מֵ/הַכּ֖וֹת
  english_pob_choice: from striking down
  chosen_spanish: de derribar[a]
  alternatives_spanish:
  - de dar muerte a
  - de derrotar
  lexicon: HALOT
  rationale: «הכה» tiene fuerza violenta concreta; «derribar» comunica el golpe o abatimiento sin afirmar más de lo que el hebreo exige. Se evita suavizarlo a «derrotar», que puede perder la contundencia física del verbo.
- source_word: אֶת הָ/עֲמָלֵ֑ק
  english_pob_choice: the Amalekites
  chosen_spanish: a Amalec
  alternatives_spanish:
  - a los amalecitas
  - a los de Amalec
  lexicon: HALOT
  rationale: El hebreo usa el etnónimo singular colectivo. En español conviene conservar la forma del nombre propio «Amalec» para reflejar el dato fuente y evitar borrar la tensión entre nombre colectivo y pueblo. El sentido colectivo queda implícito por el contexto narrativo.
- source_word: וַ/יֵּ֧שֶׁב
  english_pob_choice: stayed
  chosen_spanish: se quedó
  alternatives_spanish:
  - habitó
  - permaneció
  lexicon: HALOT
  rationale: En un lapso de dos días, «se quedó» expresa bien la permanencia temporal sin sugerir una residencia estable o prolongada.
- source_word: בְּ/צִקְלָ֖ג
  english_pob_choice: in Ziklag
  chosen_spanish: en Siclag
  alternatives_spanish:
  - en Ziklag
  lexicon: HALOT
  rationale: Nombre propio geográfico en su forma castellana tradicional «Siclag», mantenida por legibilidad bíblica en español.
- source_word: יָמִ֥ים שְׁנָֽיִם
  english_pob_choice: two days
  chosen_spanish: dos días
  alternatives_spanish:
  - por dos días
  - durante dos días
  lexicon: HALOT
  rationale: La duración acusativa se expresa de manera natural como «dos días»; el verbo de permanencia ya aporta el matiz durativo.
theological_decisions:
- issue: Referencia colectiva de Amalec / amalecitas
  english_pob_reading: Hebrew 'Amalek,' a collective reference to the Amalekite people.
  chosen_spanish_reading: «Amalec» se conserva como nombre colectivo, con valor de pueblo enemistado en el contexto narrativo.
  alternative_spanish_readings:
  - «los amalecitas»
  - «el pueblo de Amalec»
  rationale: La POB inglesa preserva la tensión entre el etnónimo singular y la referencia colectiva. En español, «Amalec» mantiene mejor esa forma fuente; la colectividad queda clara por el contexto y por la nota.
  doctrine_reference: No doctrinal issue; lexical-historical note only.
translation_notes:
  revision_awareness: La revisión reciente indicó que no había cambios necesarios y el cotejo mostró acuerdo alto; por eso la redacción sigue de cerca la lectura inglesa auditada, ajustando solo la naturalidad del español y conservando la tensión lexical de «Amalec».
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma general del proyecto, pero este versículo no contiene el nombre divino.
  - Se usa «Saúl» y «David» con ortografía española habitual.
  - Se prefiere «Siclag» para el topónimo por consistencia bíblica en español.
  - No se introduce lenguaje eclesiástico no sustentado por el hebreo; el verbo de violencia se conserva con fuerza moderada.
