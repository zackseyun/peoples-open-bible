translation:
  language: es
  text: Hijo de humano, laméntate sobre la multitud[a] de Egipto, y hazla bajar, a ella y a las hijas de naciones poderosas[b], a la tierra de abajo[c], con los que descienden al foso.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «las hordas de Egipto». El hebreo puede denotar una multitud o muchedumbre.
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: «las hijas de naciones poderosas», expresión figurada para pueblos o naciones asociados con Egipto.'
    reason: cultural_note
  - marker: c
    text: O «la tierra inferior» o «la región de los muertos». El hebreo habla del ámbito de abajo, asociado con los muertos.
    reason: alternative_reading
lexical_decisions:
- source_word: בֶּן אָדָם
  english_pob_choice: Son of man
  chosen_spanish: Hijo de hombre
  alternatives_spanish:
  - Ser humano
  - Mortal
  lexicon: HALOT
  rationale: Conserva la fórmula profética fija de Ezekiel y su fuerza idiomática. "Hijo de hombre" es la forma más transparente y tradicionalmente reconocible en español bíblico sin perder el vínculo directo con el hebreo.
- source_word: נְהֵה
  english_pob_choice: wail
  chosen_spanish: laméntate
  alternatives_spanish:
  - gime
  - clama en duelo
  - lamenta
  lexicon: HALOT
  rationale: El verbo expresa lamento funerario o de duelo. En español, "laméntate" comunica el tono exhortativo y doliente con naturalidad; "gime" sería más fuerte, pero menos preciso aquí.
- source_word: הֲמוֹן מִצְרַיִם
  english_pob_choice: the multitude of Egypt
  chosen_spanish: la multitud de Egipto
  alternatives_spanish:
  - las hordas de Egipto
  - la muchedumbre de Egipto
  - el multitudinario Egipto
  lexicon: HALOT
  rationale: '"Multitud" reproduce bien el valor básico de המון sin forzar una lectura de riqueza o de ejército. Mantiene la imagen de masa poblacional/judicial que el contexto sugiere.'
- source_word: וְהוֹרִדֵהוּ / אוֹתָהּ
  english_pob_choice: bring her down
  chosen_spanish: hazla bajar
  alternatives_spanish:
  - arrójala abajo
  - bájala
  - hazla descender
  lexicon: HALOT
  rationale: El hebreo presenta una forma causativa de ירד y el objeto femenino retoma a Egipto como nación. "Hazla bajar" preserva el sentido causal y evita resolver de manera innecesaria la irregularidad morfológica, que el inglés POB también deja como tensión implícita.
- source_word: וּבְנוֹת גּוֹיִם אַדִּרִם
  english_pob_choice: her and the daughters of mighty nations
  chosen_spanish: y las hijas de naciones poderosas
  alternatives_spanish:
  - y las hijas de naciones poderosas junto con ella
  - y las hijas de pueblos poderosos
  - y las hijas de naciones majestuosas
  lexicon: HALOT
  rationale: Se mantiene la imagen de "hijas" como personificación o pueblos dependientes asociados con Egipto. "Naciones poderosas" refleja אַדִּרִם con un español claro y sobrio.
- source_word: אֶרֶץ תַּחְתִּיּוֹת
  english_pob_choice: the land beneath
  chosen_spanish: la tierra de abajo
  alternatives_spanish:
  - la tierra inferior
  - la tierra de los abismos
  - la región de abajo
  lexicon: HALOT
  rationale: '"La tierra de abajo" conserva la dirección descendente y la ambigüedad deliberada del hebreo sin convertirla en una categoría doctrinal posterior. Es una expresión natural en español para este lenguaje poético.'
- source_word: אֶת יֹרְדֵי בוֹר
  english_pob_choice: with those who go down to the pit
  chosen_spanish: con los que descienden al foso
  alternatives_spanish:
  - con los que bajan al pozo
  - con los que descienden al sepulcro
  - junto a los que van al foso
  lexicon: HALOT
  rationale: '"Con" sigue la lectura asociativa del inglés POB para אֶת. "Foso" es una opción pública y comprensible para בוֹר en este contexto de descenso a la esfera de la muerte, aunque "pozo" también sería posible; "foso" suena algo más solemne y evita una imagen demasiado doméstica.'
- source_word: בּוֹר
  english_pob_choice: the pit
  chosen_spanish: el foso
  alternatives_spanish:
  - el pozo
  - la fosa
  - la sepultura
  lexicon: HALOT
  rationale: En este pasaje, בוֹר funciona como imagen de la región de los muertos. "Foso" mantiene el campo semántico de hundimiento/entierro sin identificarlo con una doctrina posterior como "infierno".
theological_decisions:
- issue: Imagen del mundo inferior en אֶרֶץ תַּחְתִּיּוֹת / בוֹר
  english_pob_reading: Render the imagery concretely as 'the land beneath' and 'the pit' without identifying it with a later, more systematized doctrine such as hell.
  chosen_spanish_reading: Traducir con "la tierra de abajo" y "el foso" para conservar la imaginería de descenso y muerte sin equipararla con una doctrina posterior como el infierno.
  alternative_spanish_readings:
  - la región de abajo / el sepulcro
  - el netherworld / la tumba
  - el infierno
  rationale: El texto hebreo presenta lenguaje poético de juicio y descenso a la esfera de los muertos. La traducción preserva esa tensión sin resolverla en términos doctrinales que el hebreo no explicita.
  doctrine_reference: 'Translation philosophy §3: Preservar la tensión teológica en vez de resolverla.'
translation_notes:
  revision_awareness: El inglés POB mantiene la fórmula profética 'Son of man' y traduce el lamento con 'wail'; también conserva la tensión del objeto femenino en 'bring her down' y evita identificar el ámbito subterráneo con 'hell'. La presente versión sigue esas decisiones auditadas, pero las expresa en español natural y publicable.
  spanish_consistency_notes:
  - Se mantiene 'Hijo de hombre' como fórmula profética fija para Ezekiel.
  - '''Multitud'' se usa para הֲמוֹן, evitando mover el sentido hacia ''riqueza''.'
  - 'La referencia subterránea queda deliberadamente abierta: ''la tierra de abajo'' y ''el foso''.'
  - Las 'hijas de naciones poderosas' conservan la metáfora hebrea sin explicitarla más de lo que permite el contexto.
