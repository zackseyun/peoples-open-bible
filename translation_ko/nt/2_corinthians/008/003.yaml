  text: ὅτι κατὰ δύναμιν, μαρτυρῶ, καὶ ⸀παρὰ δύναμιν, αὐθαίρετοι
base_translation:
  language: en
  yaml_path: translation/nt/2_corinthians/008/003.yaml
  text: For[a], I testify, they gave according to their ability, and beyond their ability, of their own accord[b],
translation:
  language: ko
  text: 내가 증언합니다. 그들은 힘닿는 대로, 아니 힘에 넘치도록, 자원하여[a]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 또는 「자발적으로」, 「기꺼이」. 헬라어 αὐθαίρετοι는 강요 없이 스스로의 결단으로 행함을 가리킨다.
    reason: lexical_alternative
lexical_decisions:
- source_word: κατὰ δύναμιν
  english_pob_choice: according to their ability
  chosen_korean: 힘닿는 대로
  lexicon: BDAG
  rationale: κατά + 「힘」 구조는 각자의 한계 안에서 측정된 분량을 가리킨다. 「힘닿는 대로」가 자연스러운 한국어 등가어이며 다음 구절 「힘에 넘치도록」과 대조를 이룬다.
  alternatives_korean:
  - 능력대로
  - 형편대로
- source_word: παρὰ δύναμιν
  english_pob_choice: beyond their ability
  chosen_korean: 힘에 넘치도록
  lexicon: BDAG
  rationale: παρά + 대격은 한계를 넘는 행위를 가리킨다. 앞 구절과 평행을 이루며 마게도냐 성도들의 헌신을 강조한다.
  alternatives_korean:
  - 능력을 넘어
- source_word: αὐθαίρετοι
  english_pob_choice: of their own accord
  chosen_korean: 자원하여
  lexicon: BDAG
  rationale: 강요 없이 스스로의 결단으로 행함을 가리키는 주격 보어. 「자원하여」가 한국어 헌신 문맥에서 가장 자연스럽다.
  alternatives_korean:
  - 자발적으로
  - 스스로의 뜻으로
