translation:
  language: es
  text: Levántate[a], Oh Dios; defiende tu causa. Recuerda tu afrenta de parte del necio[b], todo el día.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «defiende tu causa». El hebreo usa lenguaje jurídico de disputa; la línea puede entenderse como un llamado urgente a Dios para que actúe en defensa de su causa.
    reason: lexical_alternative
  - marker: b
    text: «Necio» aquí no significa solo alguien sin inteligencia, sino una persona moral y religiosamente corrupta o impía.
    reason: cultural_note
lexical_decisions:
- source_word: קוּמָה
  english_pob_choice: Rise up
  chosen_spanish: Levántate
  alternatives_spanish:
  - Levántate en pie
  - Alzate
  lexicon: HALOT
  rationale: El imperativo de קום con ה paragogica expresa un llamado urgente a que Dios actúe. «Levántate» es natural en español y conserva el impulso exhortativo sin sonar forzado.
- source_word: אֱלֹהִים
  english_pob_choice: O God
  chosen_spanish: oh Dios
  alternatives_spanish:
  - Dios
  - oh, Dios
  lexicon: HALOT
  rationale: Es vocativo directo. «Oh Dios» reproduce la apelación orante con dignidad y claridad en español.
- source_word: רִיבָה
  english_pob_choice: plead
  chosen_spanish: defiende
  alternatives_spanish:
  - pleitea
  - litiga
  - defiende tu causa
  lexicon: HALOT
  rationale: El verbo ריב pertenece al campo jurídico/disputado. En español, «defiende» comunica bien la idea de intervenir a favor en un pleito sin introducir una expresión demasiado técnica o poco natural.
- source_word: רִיבֶךָ
  english_pob_choice: your case
  chosen_spanish: tu causa
  alternatives_spanish:
  - tu pleito
  - tu caso
  - tu disputa
  lexicon: HALOT
  rationale: ריב puede significar asunto litigioso, causa o pleito. «Tu causa» mantiene el registro jurídico y es más idiomático en español bíblico que «tu caso» en este contexto.
- source_word: זְכֹר
  english_pob_choice: Remember
  chosen_spanish: Recuerda
  alternatives_spanish:
  - Acuérdate
  - Ten presente
  lexicon: HALOT
  rationale: Imperativo simple y directo. «Recuerda» conserva la fuerza breve del hebreo sin expansión interpretativa.
- source_word: חֶרְפָּתְךָ
  english_pob_choice: your reproach
  chosen_spanish: tu afrenta
  alternatives_spanish:
  - tu reproche
  - tu vergüenza
  - tu insulto
  lexicon: HALOT
  rationale: חֶרְפָּה puede ser reproche, afrenta o insulto. «Afrenta» comunica con precisión la idea de oprobio/insulto y mantiene la tensión de si la afrenta recae sobre Dios o sobre su pueblo identificado con él.
- source_word: מִנִּי
  english_pob_choice: from
  chosen_spanish: que viene del
  alternatives_spanish:
  - de
  - procedente de
  lexicon: HALOT
  rationale: La preposición מן marca origen. En español, «que viene del» hace explícita la procedencia y encaja con el flujo de la frase sin alterar el sentido.
- source_word: נָבָל
  english_pob_choice: the fool
  chosen_spanish: el necio
  alternatives_spanish:
  - el impío
  - el insensato
  - el necio impío
  lexicon: HALOT
  rationale: נבל en los Salmos designa una necedad moral y religiosa, no solo falta de inteligencia. «Necio» transmite esa carga ética de forma breve y reconocible en español.
- source_word: כָּל הַיּוֹם
  english_pob_choice: all day long
  chosen_spanish: todo el día
  alternatives_spanish:
  - todo el tiempo
  - constantemente
  lexicon: HALOT
  rationale: Expresión temporal idiomática. «Todo el día» conserva la continuidad de la afrenta de manera natural en español.
theological_decisions:
- issue: Referente de «tu afrenta»
  english_pob_reading: reproach directed against God
  chosen_spanish_reading: afrenta dirigida contra Dios, con posible referencia amplia al oprobio sufrido por su pueblo
  alternative_spanish_readings:
  - afrenta que sufren los fieles como asociada a Dios
  - afrenta contra tu nombre
  rationale: La marca posesiva «tu» puede referirse directamente a Dios, pero el contexto del salmo también permite una identificación pactual con el pueblo y el santuario. La traducción conserva esa tensión sin resolverla explícitamente ni cerrar el referente.
  doctrine_reference: Preservar la tensión teológica y el vínculo pactual sin sobreinterpretar.
translation_notes:
  revision_awareness: 'El texto sigue de cerca el hebreo masorético de Salmos 74:22 y armoniza con el audit trail inglés: mantiene el imperativo urgente, la metáfora jurídica de ריב, el referente deliberadamente algo abierto de חֶרְפָּה y la duración de כָּל הַיּוֹם. No se registraron revisiones posteriores que alteren la decisión de traducción.'
  spanish_consistency_notes:
  - Se prefirió «Yahvé» solo cuando el hebreo explicite el nombre divino; aquí el vocativo es אֱלֹהִים, por lo que corresponde «Dios».
  - Se evitó «SEÑOR» como sustituto automático del nombre divino, en coherencia con el sistema POB.
  - «Necio» se mantiene como categoría moral bíblica, no como insulto psicológico moderno.
  - La nota de pie para «tu afrenta» conserva la ambigüedad teológica documentada en el audit trail inglés.
