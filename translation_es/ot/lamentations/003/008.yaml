- from: Aunque clame y grite pidiendo ayuda[a], él cierra el acceso a mi oración.
  to: Incluso cuando clame y pida ayuda[a], él bloquea mi oración.
  rationale: Se ajusta la concesiva para reflejar mejor גַּם כִּי, se reemplaza la perífrasis «cierra el acceso a» por el objeto directo más fiel «bloquea mi oración», y se pule el paralelismo verbal para un español más natural sin perder la distinción léxica del hebreo. La nota conserva la alternativa concesiva documentada y una forma más intensiva del segundo verbo.
