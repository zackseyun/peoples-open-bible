translation:
  language: es
  text: Pero en cuanto a ustedes, vuelvan y partan hacia el desierto, por el camino del Mar Rojo[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, más literalmente, «el Mar de Juncos».
    reason: lexical_alternative
lexical_decisions:
- source_word: וְ/אַתֶּם
  english_pob_choice: But as for you
  chosen_spanish: Pero ustedes
  alternatives_spanish:
  - Y ustedes
  - Pero en cuanto a ustedes
  lexicon: HALOT
  rationale: La partícula con el pronombre independiente expresa contraste y énfasis. En español, «Pero ustedes» reproduce de forma natural el giro adversativo y el sujeto enfático sin sobrecargar la frase.
- source_word: פְּנוּ
  english_pob_choice: turn
  chosen_spanish: vuelvan
  alternatives_spanish:
  - den la vuelta
  - giren
  lexicon: HALOT
  rationale: El imperativo pide un cambio de dirección. «Vuelvan» comunica el giro requerido de manera natural y fiel, sin añadir el matiz reflexivo que el hebreo no exige explícitamente en esta forma breve.
- source_word: לָכֶם
  english_pob_choice: yourselves
  chosen_spanish: ustedes
  alternatives_spanish:
  - para ustedes
  - a ustedes mismos
  lexicon: HALOT
  rationale: La preposición con sufijo intensifica la orden y la dirige personalmente a los destinatarios. En español se absorbe con naturalidad en el pronombre explícito del sujeto, evitando una construcción artificial.
- source_word: וּ/סְעוּ
  english_pob_choice: set out
  chosen_spanish: salgan
  alternatives_spanish:
  - pongan rumbo
  - partan
  lexicon: HALOT
  rationale: נסע en imperativo sugiere levantar campamento e iniciar la marcha. «Salgan» transmite bien la salida en movimiento; es claro para español moderno y compatible con el contexto narrativo.
- source_word: הַ/מִּדְבָּרָ/ה
  english_pob_choice: for the wilderness
  chosen_spanish: hacia el desierto
  alternatives_spanish:
  - al desierto
  - rumbo al desierto
  lexicon: HALOT
  rationale: El he direccional indica movimiento hacia el desierto. «Hacia el desierto» conserva la dirección sin convertirla innecesariamente en una entrada puntual dentro de él.
- source_word: דֶּ֥רֶךְ
  english_pob_choice: by the way of
  chosen_spanish: por el camino de
  alternatives_spanish:
  - por la ruta de
  - vía
  lexicon: HALOT
  rationale: דרך introduce la ruta a seguir. «Por el camino de» es la equivalencia española más clara y natural para mantener el valor de itinerario.
- source_word: יַם סֽוּף
  english_pob_choice: the Red Sea
  chosen_spanish: Mar Rojo
  alternatives_spanish:
  - Mar de los Juncos
  lexicon: HALOT
  rationale: Se conserva la designación tradicional geográfica en español, que es clara y reconocible. La alternativa más literal del hebreo se reserva para nota por transparencia lexical.
translation_notes:
  revision_awareness: 'Se siguió la revisión inglesa más reciente que simplificó el verbo de giro a una forma más natural («turn») y conservó la frase de ruta. En español se reflejó ese mismo equilibrio: una orden breve y natural, sin añadir un reflexivo innecesario ni perder el contraste inicial.'
  spanish_consistency_notes:
  - Se preservó el contraste adversativo inicial con «Pero» para reflejar el peso de וְאַתֶּם.
  - Se mantuvo la referencia geográfica tradicional «Mar Rojo», con nota para la alternativa más literal del hebreo.
  - Se evitó «SEÑOR» u այլ sustituciones porque el versículo no contiene el nombre divino.
  - El registro es sobrio y bíblico, pero en español moderno comprensible para lectura pública.
