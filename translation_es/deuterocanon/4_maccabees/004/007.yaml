    reason: cross_reference
  revision_rationale: Se reubica la nota cultural para que corresponda al «tesoro sagrado», en línea con el audit trail inglés y con el griego τῷ ἱερῷ θησαυρῷ. También se mejora la naturalidad del español con «tesoro sagrado» y se suaviza «despojados» a «privados» para reflejar mejor στερηθήσονται en este contexto jurídico-financiero. Se conserva el resto de la redacción porque transmite fielmente la reacción airada y la oposición verbal del pueblo, así como la cláusula final abierta con «pues».
