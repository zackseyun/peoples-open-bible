translation:
  language: es
  text: Judá[a] se lamenta, y sus puertas languidecen; se oscurecen en el suelo[b], y el clamor de Jerusalén sube.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «Judá está de duelo». El hebreo expresa lamento o duelo; el tiempo verbal funciona como descripción poética del estado de la nación.
    reason: lexical_alternative
  - marker: b
    text: O «se ennegrecen en el suelo» / «están oscuras hasta la tierra». El verbo hebreo puede denotar oscurecerse, a menudo con matiz de duelo.
    reason: lexical_alternative
lexical_decisions:
- source_word: אָבְלָה
  english_pob_choice: mourns
  chosen_spanish: se lamenta
  alternatives_spanish:
  - está de duelo
  - llora
  lexicon: HALOT
  rationale: El verbo expresa duelo o lamento; en español, «se lamenta» comunica bien el estado de aflicción poética sin sonar demasiado rígido. Se evita sobrecargar con un presente progresivo que no aporta más fidelidad.
- source_word: יְהוּדָה
  english_pob_choice: Judah
  chosen_spanish: Judá
  lexicon: N/A
  rationale: Nombre propio geográfico/nacional; se translitera de forma estándar en español.
- source_word: שְׁעָרֶיהָ
  english_pob_choice: her gates
  chosen_spanish: sus puertas
  alternatives_spanish:
  - las puertas de ella
  - sus portones
  lexicon: HALOT
  rationale: «Puertas» mantiene la imagen concreta del texto hebreo; en español, el posesivo de tercera persona femenina «sus» conserva la referencia a Judá sin forzar una expresión más pesada.
- source_word: אֻמְלְל֖וּ
  english_pob_choice: languish
  chosen_spanish: languidecen
  alternatives_spanish:
  - se marchitan
  - se consumen
  lexicon: HALOT
  rationale: «Languidecen» reproduce bien el valor de debilidad/desfallecimiento y mantiene el paralelismo con «se lamenta». No se elige un verbo vegetal como «marchitan» porque el sujeto son puertas y el sentido es figurado.
- source_word: קָדְרוּ לָאָרֶץ
  english_pob_choice: grow dark on the ground
  chosen_spanish: se oscurecen sobre la tierra
  alternatives_spanish:
  - se ennegrecen hasta el suelo
  - se ponen oscuras en el suelo
  lexicon: HALOT
  rationale: Se conserva la idea de oscuridad vinculada al luto, pero en español «se oscurecen sobre la tierra» suena más natural y todavía refleja la imagen espacial del hebreo. Se evita añadir la noción de «sentarse» que no está en esta revisión del texto inglés.
- source_word: צִוְחַת
  english_pob_choice: the cry
  chosen_spanish: el clamor
  alternatives_spanish:
  - el grito
  - la voz de angustia
  lexicon: HALOT
  rationale: «Clamor» transmite una voz de distress con mayor gravedad literaria que «grito» y encaja bien con el tono profético.
- source_word: עָלָתָה
  english_pob_choice: goes up
  chosen_spanish: sube
  alternatives_spanish:
  - asciende
  - ha subido
  lexicon: HALOT
  rationale: «Sube» conserva la metáfora concreta de ascenso del verbo עלה y mantiene el movimiento dinámico del original.
theological_decisions:
- issue: La personificación de Judá y de sus puertas en duelo
  english_pob_reading: Judah mourns, and her gates languish
  chosen_spanish_reading: Judá se lamenta, y sus puertas languidecen
  alternative_spanish_readings:
  - Judá está de duelo, y sus puertas se marchitan
  - Judá llora, y sus puertas desfallecen
  rationale: No se espiritualiza ni se reduce la personificación; se mantiene el recurso poético del texto, donde la ciudad/territorio aparece como sujeto doliente. En español, «se lamenta» y «languidecen» conservan esa tensión literaria.
  doctrine_reference: Poética profética; personificación del pueblo/ciudad en lenguaje de lamentación.
- issue: La imagen de oscuridad asociada al luto y a la humillación
  english_pob_reading: they grow dark on the ground
  chosen_spanish_reading: se oscurecen sobre la tierra
  alternative_spanish_readings:
  - se ennegrecen en el suelo
  - se oscurecen hasta el suelo
  rationale: Se preserva la ambigüedad entre oscuridad y luto sin decidir excesivamente por una sola imagen. El español «se oscurecen» refleja el campo semántico de קָדְרוּ y permite el trasfondo de duelo señalado por la tradición textual.
  doctrine_reference: Lenguaje figurado de duelo en la literatura profética.
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión inglesa que prefirió «grow dark» frente a «sit in darkness», evitando introducir en español una acción de sentarse o una interpretación no presente en el hebreo. También se conservó la tensión entre oscuridad y duelo, sin convertirla en una paráfrasis más explicativa.
  spanish_consistency_notes:
  - Se usa «Judá» para el nombre propio y «Jerusalén» de manera estándar y consistente.
  - Se mantiene el tono poético-profético con verbos en presente, acorde al hebreo perfecto descriptivo y a la traducción inglesa POB.
  - «Clamor» y «sube» conservan la imagen sonora y ascendente del cierre del verso.
  - La nota[a] se ancla en «Judá» para ofrecer una alternativa válida sin alterar el cuerpo principal del texto.
