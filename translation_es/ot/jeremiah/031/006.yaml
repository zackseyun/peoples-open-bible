review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador conserva bien el sentido general del hebreo: un día futuro, una convocatoria emitida por vigilantes en la región montañosa de Efraín, y la exhortación inclusiva a subir a Sion hacia Yahvé nuestro Dios. También respeta correctamente el nombre divino «Yahvé» y el cohortativo «subamos».'
  spanish_quality_summary: El español es claro y digno, pero hay dos ajustes recomendables para mayor fidelidad y naturalidad. «Clamarán» tiende a sugerir un grito intenso o lamento, mientras que el contexto es más bien una convocatoria pública; «llamarán» o «darán voces» encaja mejor. Además, «sobre la región montañosa de Efraín» suena poco natural en español; «en la región montañosa de Efraín» o «por la región montañosa de Efraín» expresa mejor el marco geográfico sin calco innecesario. También conviene armonizar la nota al pie con las alternativas documentadas en inglés, incluyendo «guardias».
  glossary_alignment: 'Buena alineación con la terminología del proyecto: יְהוָה → «Yahvé», צִיּוֹן → «Sion», אֱלֹהֵינוּ → «nuestro Dios». La elección «centinelas» para נֹצְרִים es aceptable y fiel a «watchmen».'
  issues:
  - severity: medium
    issue: «clamarán» sobrerrefuerza el matiz de קָרְאוּ
    rationale: 'El hebreo describe una convocatoria o llamado público. «Clamar» en español suele cargar un matiz más intenso de grito, súplica o protesta. «Llamarán» preserva mejor el valor básico del verbo y la decisión inglesa «call out». '
  - severity: medium
    issue: «sobre la región montañosa de Efraín» es poco idiomático
    rationale: Aunque intenta reflejar la preposición espacial, en español suena forzado decir que alguien clama «sobre» una región montañosa. «En la región montañosa de Efraín» transmite con claridad el marco geográfico colectivo de בְּהַר אֶפְרַיִם sin pérdida relevante.
  - severity: low
    issue: La nota al pie no refleja exactamente las alternativas auditadas
    rationale: El inglés preserva «keepers» o «guards». La nota española actual ofrece «guardas» o «vigías». No es errónea, pero conviene acercarla más al registro auditado con «guardianes» o «guardias», manteniendo a la vez una opción natural en español.
  revised_spanish_text: 'Porque habrá un día en que los centinelas[a] llamarán en la región montañosa de Efraín: «¡Levántense, y subamos a Sion, a Yahvé nuestro Dios!»'
  revised_footnotes:
