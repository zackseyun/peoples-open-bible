id: PHP.1.12
reference: Philippians 1:12
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: Γινώσκειν δὲ ὑμᾶς βούλομαι, ἀδελφοί, ὅτι τὰ κατ’ ἐμὲ μᾶλλον εἰς προκοπὴν τοῦ εὐαγγελίου ἐλήλυθεν,
base_translation:
  language: en
  yaml_path: translation/nt/philippians/001/012.yaml
  text: 'Now I want you to know, brothers, that what has happened to me has actually advanced the good news,'
translation:
  language: ko
  text: '형제들[a]이여, 나는 여러분이 이것을 알기 원합니다. 곧, 내게 일어난 일들이 도리어 복음의 진전이 되었다는 것입니다.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 또는 「형제자매들이여」. 헬라어는 남성 복수 「형제들」이며, 본문은 전체 신자 공동체를 가리킬 가능성이 높다.
    reason: lexical_alternative
lexical_decisions:
- source_word: Γινώσκειν ... βούλομαι
  english_pob_choice: I want you to know
  chosen_korean: 나는 여러분이 ~을 알기 원합니다
  alternatives_korean:
  - 알리고자 합니다
  - 알기를 바랍니다
  lexicon: BDAG
  rationale: 서신적 정형 표현으로, 「알기 원합니다」가 합쇼체 격식과 바울의 개인적 의도를 함께 담는다.
- source_word: δὲ
  english_pob_choice: Now
  chosen_korean: (생략, 호격으로 전환 표시)
  alternatives_korean:
  - 그런데
  - 한편
  lexicon: BDAG
  rationale: δέ는 가벼운 화제 전환을 표시한다. 한국어 호격 「형제들이여」가 그 전환을 자연스럽게 받아 별도 접속어가 필요하지 않다.
- source_word: ἀδελφοί
  english_pob_choice: brothers
  chosen_korean: 형제들
  alternatives_korean:
  - 형제자매들
  - 동료 신자들
  lexicon: BDAG
  rationale: '헬라어 남성 복수 형태를 보존하되, 회중 전체를 포함하는 함의는 각주로 둔다. 본 프로젝트의 성별 정확성 원칙(DOCTRINE: gender-accurate over gender-neutral)을 따른다.'
- source_word: τὰ κατ’ ἐμὲ
  english_pob_choice: what has happened to me
  chosen_korean: 내게 일어난 일들
  alternatives_korean:
  - 나의 형편
  - 나에 관한 일들
  lexicon: BDAG
  rationale: 바울의 현재 상황 전반을 가리키는 정형 표현. 「내게 일어난 일들」이 자연스럽고 명료하다.
- source_word: μᾶλλον
  english_pob_choice: actually
  chosen_korean: 도리어
  alternatives_korean:
  - 오히려
  - 실은
  lexicon: BDAG
  rationale: 예상과 반대되는 결과를 표시하는 μᾶλλον의 의미를 「도리어」가 가장 적확하게 담는다.
- source_word: εἰς προκοπὴν
  english_pob_choice: advanced
  chosen_korean: 진전이 되었다
  alternatives_korean:
  - 진보로 나아갔다
  - 발전에 이르렀다
  lexicon: BDAG
  rationale: εἰς + προκοπή는 「진전·전진」을 향한 결과를 표현한다. 「진전이 되었다」가 그 결과적 함의를 자연스럽게 담는다.
- source_word: τοῦ εὐαγγελίου
  english_pob_choice: the good news
  chosen_korean: 복음
  alternatives_korean:
  - 좋은 소식
  lexicon: BDAG
  rationale: εὐαγγέλιον은 「복음」이 바울 신학에서 정립된 한국어 등가어이다. 영어 POB는 「good news」로 풀어쓰지만, 한국어 「좋은 소식」은 일반어로 무게가 약하다.
- source_word: ἐλήλυθεν
  english_pob_choice: has actually advanced
  chosen_korean: 되었다
  alternatives_korean:
  - 이르렀다
  - 나타났다
  lexicon: BDAG
  rationale: 완료 시제는 과거 사건의 현재 결과 상태를 가리킨다. 한국어 「~이 되었다」가 그 완료의 함의를 자연스럽게 담는다.
