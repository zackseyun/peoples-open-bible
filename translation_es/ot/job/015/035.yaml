lexical_decisions:
- source_word: הָרֹה
  english_pob_choice: conceive
  chosen_spanish: conciben
  alternatives_spanish:
  - están encinta de
  - están preñados de
  lexicon: HALOT
  rationale: El hebreo usa un participio con imagen de embarazo/concepción. «Conciben» mantiene la metáfora y suena natural en español bíblico contemporáneo, sin perder el paralelismo con «dar a luz».
- source_word: עָמָל
  english_pob_choice: trouble
  chosen_spanish: maldad
  alternatives_spanish:
  - problema
  - aflicción
  - fatiga
  - dolor
  lexicon: HALOT
  rationale: En este contexto sapiencial-poético, עָמָל tiene carga moral y dañina. «Maldad» comunica mejor la dimensión ética del conjunto que una traducción más neutra como «problema» o «aflicción».
- source_word: וְיָלֹד
  english_pob_choice: give birth to
  chosen_spanish: dan a luz
  alternatives_spanish:
  - paren
  - engendran
  - traen a luz
  lexicon: HALOT
  rationale: El verbo conserva la metáfora de parto. «Dan a luz» es la forma más clara y natural en español para reproducir el giro figurado del hebreo.
- source_word: אָוֶן
  english_pob_choice: wickedness
  chosen_spanish: perversidad
  alternatives_spanish:
  - iniquidad
  - maldad
  - maldad culpable
  lexicon: HALOT
  rationale: אָוֶן puede expresar maldad, iniquidad o calamidad. En paralelo con «engaño», «perversidad» preserva la fuerza moral sin repetir exactamente el primer miembro.
- source_word: וּבִטְנָם
  english_pob_choice: their womb
  chosen_spanish: su vientre
  alternatives_spanish:
  - su vientre materno
  - su entraña
  - sus entrañas
  lexicon: HALOT
  rationale: בטן literalmente es vientre/abdomen y aquí continúa la imaginería de gestación. En español, «vientre» mantiene el paralelo poético y puede referirse de manera idiomática al órgano/espacio de gestación.
- source_word: תָּכִין
  english_pob_choice: prepares
  chosen_spanish: prepara
  alternatives_spanish:
  - dispone
  - apresta
  - produce
  lexicon: HALOT
  rationale: El hiphil de כון aquí sugiere preparar o disponer internamente lo que va a surgir. «Prepara» preserva esa acción formativa sin introducir matices ajenos.
- source_word: מִרְמָה
  english_pob_choice: deceit
  chosen_spanish: engaño
  alternatives_spanish:
  - decepción
  - fraude
  - traición
  lexicon: HALOT
  rationale: מִרְמָה denota engaño, fraude o traición. «Engaño» es breve, directo y mantiene la amplitud semántica del término.
theological_decisions:
- issue: Número del sujeto implícito y concordancia en español
  english_pob_reading: They conceive ... their womb ...
  chosen_spanish_reading: Conciben ... su vientre ...
  alternative_spanish_readings:
  - Concibe ... su vientre ...
  - Uno concibe ... su vientre ...
  rationale: Aunque el participio hebreo es singular en forma, el sufijo plural de «su vientre» y el contexto colectivo favorecen una lectura genérica/plural. El español plural conserva mejor la referencia representativa a los malvados como clase.
  doctrine_reference: 'DOCTRINE.md: Gender-accurate over gender-neutral; preserve source intent in representative/generic expressions'
translation_notes:
  revision_awareness: El texto fuente y el control inglés muestran alta concordancia y no requieren revisión adicional; se preserva la metáfora de concepción/parto y la progresión hacia el engaño como resultado interno.
  spanish_consistency_notes:
  - Se mantiene la cadena metafórica concebir → dar a luz → vientre → preparar.
  - «Vientre» se usa de manera poética y coherente con el hebreo בטן, no como literalismo anatómico aislado.
  - El pie de nota ofrece una alternativa léxica que conserva la opción documentada en el audit trail inglés.
