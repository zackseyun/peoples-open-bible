revisions:
- from: 'Entonces el rey de Aram[a] dijo: «Ve ahora; y enviaré una carta al rey de Israel». Y él fue y llevó en su mano diez talentos de plata, seis mil [b] de oro y diez mudas de ropa.'
  to: 'Entonces el rey de Aram[c] dijo[a]: «Ve ahora, y enviaré una carta al rey de Israel». Y él fue y tomó en su mano diez talentos de plata, seis mil piezas[b] de oro y diez mudas de ropa.'
  rationale: Se ajusta el texto para representar mejor el verbo hebreo («tomó en su mano»), mejorar la naturalidad de la cifra con oro («piezas» suplido y explicado en nota), y conservar la nota léxica importante sobre el doble imperativo «ve, ven» que subyace a «Ve ahora».
