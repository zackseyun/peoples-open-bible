translation:
  language: es
  text: Porque he comido cenizas como pan[a], y he mezclado mi bebida con llanto.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «y he mezclado mi bebida con lágrimas». El hebreo dice «con llanto», que también puede concretarse así en español.'
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Ya que
  lexicon: HALOT
  rationale: Introduce la base causal del lamento. 'Porque' expresa con naturalidad esa relación en español y conserva el valor explicativo del hebreo.
- source_word: אֵפֶר
  english_pob_choice: ashes
  chosen_spanish: ceniza
  alternatives_spanish:
  - cenizas
  - polvo
  lexicon: HALOT
  rationale: En español, 'ceniza' funciona bien como sustantivo de materia y evita la fuerza un poco más idiomática pero menos directa de 'cenizas'. Mantiene la imagen de abatimiento y humillación.
- source_word: כַּלֶּחֶם
  english_pob_choice: like bread
  chosen_spanish: como pan
  alternatives_spanish:
  - cual pan
  - igual que pan
  lexicon: HALOT
  rationale: La preposición comparativa כַּ se rinde con 'como', y 'pan' preserva la comparación simple y directa sin añadir interpretación.
- source_word: אָכָלְתִּי
  english_pob_choice: I have eaten
  chosen_spanish: he comido
  alternatives_spanish:
  - comí
  - he estado comiendo
  lexicon: HALOT
  rationale: El perfecto español comunica una condición experimentada y aún vigente en el lamento, de manera semejante al perfecto inglés elegido por la POB.
- source_word: שִׁקֻּוַי
  english_pob_choice: my drink
  chosen_spanish: mi bebida
  alternatives_spanish:
  - lo que bebo
  - mi beber
  lexicon: HALOT
  rationale: El sustantivo apunta a la bebida ordinaria en este contexto, no a una ofrenda. 'Mi bebida' es claro y natural en español.
- source_word: בִּבְכִי
  english_pob_choice: with weeping
  chosen_spanish: con llanto
  alternatives_spanish:
  - con lágrimas
  - en llanto
  lexicon: HALOT
  rationale: '''Llanto'' conserva el valor de acción/estado del sustantivo hebreo y suena más natural que una glosa literal como ''con weeping''. Además, evita concretar prematuramente en lágrimas.'
- source_word: מָסָכְתִּי
  english_pob_choice: mixed
  chosen_spanish: he mezclado
  alternatives_spanish:
  - he minglado
  - he vertido
  lexicon: HALOT
  rationale: '''Mezclado'' expresa el acto de combinar la bebida con el llanto sin introducir una imagen adicional. ''Minglado'' es posible, pero menos usual en español contemporáneo.'
translation_notes:
  revision_awareness: Se corrigió la validación anterior anclando la nota [a] exactamente en 'pan[a]' dentro del texto español, manteniendo la alternativa interpretativa sobre בִּבְכִי sin cambiar el sentido base del verso.
  spanish_consistency_notes:
  - Se conserva el paralelismo poético de dos miembros con verbos en perfecto.
  - '''Ceniza'' mantiene el valor de humillación/lamento sin forzar pluralización.'
  - No se introduce léxico cultual en 'mi bebida'.
  - La nota [a] solo ofrece la alternativa 'lágrimas' como concreción posible de 'llanto', acorde con el audit trail en inglés.
