  text: מִ/שָּׁם֮ נָסָעוּ֒ וַֽ/יַּחֲנ֗וּ מֵ/עֵ֤בֶר אַרְנוֹן֙ אֲשֶׁ֣ר בַּ/מִּדְבָּ֔ר הַ/יֹּצֵ֖א מִ/גְּב֣וּל הָֽ/אֱמֹרִ֑י כִּ֤י אַרְנוֹן֙ גְּב֣וּל מוֹאָ֔ב בֵּ֥ין מוֹאָ֖ב וּ/בֵ֥ין הָ/אֱמֹרִֽי׃
base_translation:
  language: en
  yaml_path: translation/ot/numbers/021/013.yaml
  text: From there they set out and camped on the other side of the Arnon[a], which is in the wilderness that extends from the border of the Amorites, for the Arnon is the border of Moab[b], between Moab and the Amorites.
  footnotes:
  - marker: a
    text: Or 'on the other side of the Arnon.' The Hebrew expression can denote the far side or region across from a boundary, depending on perspective.
    reason: lexical_alternative
  - marker: b
    text: Literally 'that goes out from the border of the Amorite.' The sense is that the wilderness stretches out from the Amorite border.
    reason: lexical_alternative
