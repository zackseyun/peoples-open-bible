translation:
  language: es
  text: 'Maldito el que acepta un soborno para matar a un inocente[a], y todo el pueblo dirá: «Amén».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literalmente, «para derribar sangre inocente». El hebreo usa un giro idiomático que se refiere a matar a una persona inocente.
    reason: lexical_alternative
lexical_decisions:
- source_word: אָרוּר
  english_pob_choice: Cursed
  chosen_spanish: Maldito
  alternatives_spanish:
  - Cursed
  - Maldito sea
  lexicon: HALOT
  rationale: En una fórmula de maldición del pacto, 'maldito' comunica con naturalidad el valor declarativo del predicado hebreo. Evita la mayúscula ritual de 'Cursed' y no introduce una parafrasis más fuerte de la que el hebreo requiere.
- source_word: לֹקֵחַ
  english_pob_choice: the one who takes
  chosen_spanish: el que acepta
  alternatives_spanish:
  - el que toma
  - el que recibe
  - el aceptante
  lexicon: HALOT
  rationale: El participio funciona sustantivamente para un sujeto genérico. En español, 'acepta' comunica mejor la recepción ilícita del soborno que un calco como 'toma', y mantiene el referente personal singular.
- source_word: שֹׁחַד
  english_pob_choice: a bribe
  chosen_spanish: un soborno
  alternatives_spanish:
  - cohecho
  - una dádiva ilícita
  - un regalo
  lexicon: HALOT
  rationale: '''Soborno'' es el equivalente directo y jurídico más claro en español. ''Cohecho'' sería más técnico y menos inmediato para lectura eclesial general.'
- source_word: לְהַכּוֹת
  english_pob_choice: to strike down
  chosen_spanish: para matar
  alternatives_spanish:
  - para golpear
  - para derribar
  - para dar muerte
  lexicon: HALOT
  rationale: El infinitivo causativo aquí apunta a un resultado mortal dentro del contexto de sangre inocente. 'Para matar' expresa la fuerza del acto sin oscurecer el sentido idiomático en español; el matiz de 'golpear/derribar' queda subordinado al contexto letal.
- source_word: נֶפֶשׁ
  english_pob_choice: person
  chosen_spanish: a un inocente
  alternatives_spanish:
  - a una persona
  - a una vida
  - al inocente
  lexicon: HALOT
  rationale: En este contexto משפט/legal, נֶפֶשׁ designa a la persona afectada. El español necesita el referente humano explícito; 'a un inocente' preserva la idea de la víctima sin introducir 'alma' o una abstracción.
- source_word: דָּם נָקִי
  english_pob_choice: innocent
  chosen_spanish: a un inocente
  alternatives_spanish:
  - sangre inocente
  - sangre inocente derramada
  - la sangre del inocente
  lexicon: HALOT
  rationale: La expresión hebrea literalmente significa 'sangre inocente', pero en español la equivalencia natural es 'un inocente'. Se conserva el sentido de la víctima inocente y se evita una formulación rígida que podría sonar menos idiomática.
- source_word: וְאָמַר כָּל הָעָם
  english_pob_choice: and all the people shall say
  chosen_spanish: y todo el pueblo dirá
  alternatives_spanish:
  - y todo el pueblo dirá entonces
  - y todo el pueblo responderá
  lexicon: HALOT
  rationale: El perfecto con waw en este marco litúrgico tiene fuerza prescriptiva. 'Dirá' transmite con sobriedad la respuesta requerida por la fórmula de pacto.
- source_word: אָמֵן
  english_pob_choice: Amen
  chosen_spanish: Amén
  alternatives_spanish:
  - Así sea
  - Verdaderamente
  lexicon: HALOT
  rationale: Se conserva el término litúrgico tradicional en español, que además es plenamente inteligible y mantiene la fórmula responsorial del texto.
theological_decisions:
- issue: Fórmula de maldición del pacto sin suavizar su fuerza judicial
  english_pob_reading: Cursed is the one who takes a bribe to strike down an innocent person
  chosen_spanish_reading: Maldito el que acepta un soborno para matar a un inocente
  alternative_spanish_readings:
  - Maldito el que toma un soborno para matar a un inocente
  - Maldito el que recibe un soborno para dar muerte a un inocente
  rationale: La frase mantiene el carácter de maldición legal/covenantal del hebreo. 'Maldito' conserva la fuerza declarativa; 'matar a un inocente' expresa el resultado homicida sin ocultar la injusticia central. No se domestica la severidad del oráculo.
  doctrine_reference: 'Pacto y juicio: mantener la seriedad de las maldiciones del pacto sin atenuación retórica.'
translation_notes:
  revision_awareness: 'La redacción sigue de cerca el análisis auditado en inglés: mantiene la fórmula de maldición, traduce el participio de modo personal y genérico, conserva ''Amén'' como respuesta litúrgica y refleja el sentido idiomático de ''sangre inocente'' con una nota explicativa en lugar de una traducción rígida.'
  spanish_consistency_notes:
  - Se usa 'soborno' en lugar de un tecnicismo jurídico más estrecho para favorecer claridad eclesial.
  - Se evita 'SEÑOR' porque este versículo no contiene el tetragrámaton ni una cita directa del Nombre divino.
  - '''Amén'' se conserva como fórmula responsorial establecida en español bíblico y litúrgico.'
  - El sentido de נֶפֶשׁ/דָּם נָקִי se expresa en la nota para no perder la tensión idiomática del hebreo.
