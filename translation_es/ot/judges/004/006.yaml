  language: en
  yaml_path: translation/ot/judges/004/006.yaml
  text: She sent and summoned Barak son of Abinoam from Kedesh-naphtali[a], and said to him, “Has not Yahweh, the God of Israel, commanded, ‘Go, march to Mount Tabor[c][b], and take with you ten thousand men from the sons of Naphtali and from the sons of Zebulun’?”
