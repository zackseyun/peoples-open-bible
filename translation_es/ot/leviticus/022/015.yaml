review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien el sentido básico del hebreo: prohibición legal, «profanar» para יְחַלְּלוּ, «cosas santas» para קָדְשֵׁי, «hijos de Israel» para בְּנֵי יִשְׂרָאֵל y «Yahvé» para לַיהוָה. Sin embargo, «las cuales levantan para Yahvé» suena poco natural en español y además cambia el valor modal/jurídico del conjunto al pasar de una formulación prescriptiva completa a una relativa en presente. Conviene ajustar la cláusula relativa para preservar mejor el tono legal y la legibilidad sin perder la imagen de יָרִימוּ.'
  spanish_quality_summary: 'La redacción es mayormente fiel, pero necesita una reparación menor de naturalidad y fluidez. «No profanarán» funciona bien en estilo legislativo. «Las cosas santas de los hijos de Israel» es aceptable, aunque algo rígido; puede mantenerse por fidelidad. El principal problema es «las cuales levantan para Yahvé», que en español bíblico moderno suena forzado; «que ellos elevan a Yahvé» mantiene la imagen de elevación y lee mejor. También las notas actuales no corresponden bien a sus anclajes: [a] está anclada en «Israel» pero repite toda la frase, y [b] debería anclarse en el verbo relativo.'
  glossary_alignment: 'Alineado en lo esencial con la terminología del proyecto: יהוה -> «Yahvé» correctamente; חלל -> «profanar» correctamente; בְּנֵי יִשְׂרָאֵל -> «hijos de Israel» conforme a la política de no neutralizar. No hay conflicto doctrinal. La única mejora necesaria es estilística/semántica menor en la representación de יָרִימוּ y en el uso/ubicación de las notas.'
  issues:
  - severity: medium
    issue: «las cuales levantan para Yahvé» es poco natural en español
    rationale: Aunque «levantar» refleja la imagen de רום, en esta construcción relativa suena rígido y extraño. «Que ellos elevan a Yahvé» conserva mejor la imagen verbal y mejora la legibilidad.
  - severity: low
    issue: La cláusula relativa en presente simple puede debilitar el tono legal total del enunciado
    rationale: El hebreo legal y el inglés POB presentan una prohibición principal con relativa descriptiva. En español, mantener «No profanarán ... que ellos elevan» preserva mejor el registro legislativo que «las cuales levantan».
  - severity: low
    issue: Las notas al pie no están óptimamente ancladas
    rationale: La nota [a] se ancla tras «Israel» pero repite la frase completa sin aportar contraste útil; la nota [b] debe anclarse directamente en el verbo de la relativa para señalar las alternativas de יָרִימוּ.
  revised_spanish_text: No profanarán las cosas santas de los hijos de Israel, que ellos elevan[a] a Yahvé.
