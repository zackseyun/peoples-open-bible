translation:
  language: es
  text: Los que me comen aún tendrán hambre[a], y los que me beben aún tendrán sed.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «tendrán hambre de más de mí ... tendrán sed de más de mí». El griego dice literalmente «aún tendrán hambre» y «aún tendrán sed», expresando un deseo continuo de la Sabiduría aun después de participar de ella.'
    reason: lexical_alternative
lexical_decisions:
- source_word: οἱ ἐσθίοντές
  english_pob_choice: those who eat
  chosen_spanish: los que me comen
  alternatives_spanish:
  - los que me están comiendo
  - los que comen de mí
  - los que me consumen
  lexicon: BDAG
  rationale: El participio presente articular funciona de manera sustantiva y describe a personas caracterizadas por comer. En español, «los que me comen» conserva la referencia directa al objeto «me» y la imagen personificada de la Sabiduría sin volverlo explicativo de más.
- source_word: με
  english_pob_choice: me
  chosen_spanish: me
  alternatives_spanish:
  - a mí
  lexicon: BDAG
  rationale: Se mantiene el pronombre de primera persona para conservar la personificación de la Sabiduría hablante. «A mí» sería posible, pero menos natural y más enfático de lo necesario aquí.
- source_word: ἔτι
  english_pob_choice: still
  chosen_spanish: todavía
  alternatives_spanish:
  - aún
  - todavía más
  - todavía siguen
  lexicon: BDAG
  rationale: «Todavía» comunica continuidad y condición no resuelta, equivalente natural de ἔτι en este contexto. Evita la ambigüedad temporal de «aún» y conserva el matiz de persistencia.
- source_word: πεινάσουσιν
  english_pob_choice: will hunger
  chosen_spanish: tendrán hambre
  alternatives_spanish:
  - hambrearán
  - seguirán teniendo hambre
  - querrán más
  lexicon: BDAG
  rationale: En español, «tener hambre» es la forma idiomática y digna de expresar el futuro verbal de πεινάσουσιν. «Seguirán teniendo hambre» sería más explícito, pero «tendrán hambre» mantiene mejor la fuerza directa del verbo griego.
- source_word: οἱ πίνοντές
  english_pob_choice: those who drink
  chosen_spanish: los que me beben
  alternatives_spanish:
  - los que están bebiendo
  - los que beben de mí
  - los que me toman
  lexicon: BDAG
  rationale: Se conserva la estructura paralela con «los que me comen». «Me beben» retiene la imagen literal y la personificación, sin introducir una explicación interpretativa.
- source_word: διψήσουσιν
  english_pob_choice: will still thirst
  chosen_spanish: todavía tendrán sed
  alternatives_spanish:
  - seguirán teniendo sed
  - tendrán sed aún
  - seguirán sedientos
  lexicon: BDAG
  rationale: «Tendrán sed» es la expresión natural del futuro de διψήσουσιν; «todavía» conserva el ἔτι del griego. La combinación mantiene el paralelismo y la paradoja sin suavizarla a «desearán más» en el texto principal.
theological_decisions:
- issue: Paradoja de seguir teniendo hambre y sed después de comer y beber a la Sabiduría
  english_pob_reading: Retain the literal metaphor of continued hunger and thirst after eating and drinking Wisdom, without softening it into 'desire more' in the main text.
  chosen_spanish_reading: Conservar la metáfora literal de seguir teniendo hambre y sed después de participar de la Sabiduría, sin convertirla en una paráfrasis de «querer más» en el texto principal.
  alternative_spanish_readings:
  - Los que me comen tendrán hambre de más, y los que me beben tendrán sed de más.
  - Los que me comen seguirán deseando más, y los que me beben seguirán deseando más.
  rationale: El griego expresa la paradoja de manera directa con hambre y sed; no corresponde resolverla en la traducción principal. La posible idea de anhelo ulterior se puede sugerir en nota, pero el texto debe preservar la tensión semántica y teológica del original.
  doctrine_reference: 'DOCTRINE.md: preservar la tensión teológica en lugar de resolverla; primacía del texto original sobre la tradición de traducción.'
translation_notes:
  revision_awareness: 'Coincide con el último pase auditado: no se registraron revisiones aplicadas y el veredicto de control cruzado fue de alta concordancia. Se mantiene la lectura literal del griego con equivalencia óptima en español.'
  spanish_consistency_notes:
  - Se conserva el pronombre directo «me» para mantener la personificación de la Sabiduría.
  - «Todavía» reproduce ἔτι de modo natural y coherente en ambos miembros del paralelismo.
  - Se evita introducir «de más» en el cuerpo principal para no resolver la paradoja que el griego formula explícitamente.
  - La dicción es bíblica pero moderna, sin recurrir a fórmulas eclesiásticas que oculten el sujeto hablante.
