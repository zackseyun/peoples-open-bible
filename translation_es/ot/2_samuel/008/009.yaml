translation:
  language: es
  text: Cuando Toi[a], rey de Hamat, oyó que David había abatido a todo el ejército de Hadadezer,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El nombre del rey aparece como 'Tou' en el pasaje paralelo de 1 Crónicas 18:9; aquí el hebreo lee 'Toi'.
    reason: alternative_reading
lexical_decisions:
- source_word: וַיִּשְׁמַע
  english_pob_choice: heard
  chosen_spanish: oyó
  alternatives_spanish:
  - escuchó
  - se enteró
  lexicon: HALOT
  rationale: El verbo narrativo de שׁמע aquí introduce el siguiente hecho de la secuencia; en español, 'oyó' conserva la relación directa con el acto de recibir la noticia. 'Se enteró' explicita el resultado informativo, pero es más interpretativo.
- source_word: תֹּעִי
  english_pob_choice: Toi
  chosen_spanish: Toi
  alternatives_spanish:
  - Tou
  lexicon: HALOT
  rationale: Es nombre propio y se translitera. Se mantiene la forma del texto hebreo de este versículo; la variante de 1 Crónicas 18:9 queda documentada en nota.
- source_word: מֶלֶךְ חֲמָת
  english_pob_choice: king of Hamath
  chosen_spanish: rey de Hamat
  alternatives_spanish:
  - rey de Jamat
  - monarca de Hamat
  lexicon: HALOT
  rationale: La construcción de estado constructo se vierte de manera natural como 'rey de Hamat'. Se prefiere 'Hamat' para la transliteración estándar del topónimo.
- source_word: כִּי
  english_pob_choice: that
  chosen_spanish: que
  alternatives_spanish:
  - porque
  lexicon: HALOT
  rationale: Aquí introduce el contenido de lo que oyó Toi, no una causa; por eso 'que' reproduce mejor la sintaxis del relato.
- source_word: הִכָּה
  english_pob_choice: had struck down
  chosen_spanish: había derrotado
  alternatives_spanish:
  - había abatido
  - había golpeado
  lexicon: HALOT
  rationale: En contexto militar, נכה puede significar derrotar o abatir. En español, 'había derrotado' comunica claramente el resultado bélico sin perder el sentido de victoria contundente; 'había abatido' es más literal pero menos natural.
- source_word: אֵת כָּל חֵיל
  english_pob_choice: all the army
  chosen_spanish: a todo el ejército
  alternatives_spanish:
  - a toda la fuerza
  - a todas las tropas
  lexicon: HALOT
  rationale: חֵיל en este contexto designa las fuerzas militares. 'Ejército' es la equivalencia más clara y natural; el artículo totalizador 'todo' refleja כָּל.
- source_word: הֲדַדְעָזֶר
  english_pob_choice: Hadadezer
  chosen_spanish: Hadad-ezer
  alternatives_spanish:
  - Hadadezer
  lexicon: HALOT
  rationale: Se adopta una transliteración española transparente con guion, útil para separar los elementos del nombre compuesto y mantener la forma del hebreo; la forma inglesa tradicional queda como alternativa.
translation_notes:
  revision_awareness: El texto sigue de cerca el hebreo de 2 Samuel 8:9 y el expediente inglés POB, con la misma decisión de nota para la variante de nombre en el paralelo. No se detectaron revisiones aplicadas en el paquete inglés más reciente.
  spanish_consistency_notes:
  - Se mantuvo 'Hamat' como transliteración consistente del topónimo.
  - Se eligió 'había derrotado' para conservar el valor militar de הִכָּה sin sonar arcaico.
  - El nombre compuesto 'Hadad-ezer' se separa con guion para claridad tipográfica en español.
  - La nota [a] se ancla en el nombre propio para reflejar la variante textual paralela.
