translation:
  language: es
  text: Este pueblo me honra con sus labios[a], pero su corazón está lejos de mí.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «sus corazones». El griego tiene el singular καρδία, probablemente usado de manera colectiva para el pueblo como un todo.
    reason: lexical_alternative
lexical_decisions:
- source_word: Ὁ λαὸς οὗτος
  english_pob_choice: This people
  chosen_spanish: Este pueblo
  alternatives_spanish:
  - Este pueblo aquí
  - Esta gente
  lexicon: BDAG
  rationale: λαός designa un colectivo humano; «pueblo» preserva la referencia corporativa y el demostrativo οὗτος. «Esta gente» sería más coloquial y menos preciso; «este pueblo aquí» añade una partícula no exigida por el griego.
- source_word: τοῖς χείλεσίν
  english_pob_choice: with their lips
  chosen_spanish: con sus labios
  alternatives_spanish:
  - con los labios
  - por sus labios
  lexicon: BDAG
  rationale: El dativo es instrumental. «Con sus labios» conserva la imagen corporal concreta de χείλη y refleja naturalmente el sentido idiomático en español.
- source_word: με
  english_pob_choice: me
  chosen_spanish: me
  alternatives_spanish:
  - a mí
  lexicon: BDAG
  rationale: Es objeto directo de τιμᾷ; «me» es la forma más directa y fiel en español.
- source_word: τιμᾷ
  english_pob_choice: honors
  chosen_spanish: honra
  alternatives_spanish:
  - honra a
  - glorifica
  lexicon: BDAG
  rationale: τιμάω aquí significa mostrar honor. «Honra» corresponde bien al verbo griego sin intensificarlo a «glorifica», que sería más fuerte de lo que el texto exige.
- source_word: ἡ δὲ καρδία αὐτῶν
  english_pob_choice: but their heart
  chosen_spanish: pero su corazón
  alternatives_spanish:
  - pero sus corazones
  - y su corazón
  lexicon: BDAG
  rationale: Se mantiene el singular καρδία, que en griego funciona probablemente como singular colectivo para el pueblo en conjunto. «Su corazón» conserva esa fuerza corporativa mejor que normalizar a plural.
- source_word: πόρρω
  english_pob_choice: far
  chosen_spanish: lejos
  alternatives_spanish:
  - muy lejos
  - a distancia
  lexicon: BDAG
  rationale: πόρρω expresa lejanía. «Lejos» es natural y suficiente en español; «muy lejos» añade intensidad no explicitada.
- source_word: ἀπέχει ἀπ’ ἐμοῦ
  english_pob_choice: is far from me
  chosen_spanish: está lejos de mí
  alternatives_spanish:
  - se mantiene lejos de mí
  - permanece lejos de mí
  lexicon: BDAG
  rationale: ἀπέχω con ἀπό expresa distancia respecto de una persona. «Está lejos de mí» transmite esa separación relacional con naturalidad en español.
theological_decisions:
- issue: Singular colectivo de «corazón»
  english_pob_reading: 'Retain singular: ''their heart'''
  chosen_spanish_reading: 'Retener el singular: «su corazón»'
  alternative_spanish_readings:
  - sus corazones
  rationale: El griego tiene καρδία en singular; conservarlo mantiene la figura retórica del pueblo como un solo sujeto interior y evita suavizar el paralelismo profético.
  doctrine_reference: Translation philosophy §5 (consistency of key terms, o excepción documentada) y §6 (lengua moderna, clara y reverente)
translation_notes:
  revision_awareness: El texto griego y el audit trail inglés muestran acuerdo alto y sin revisiones aplicadas; se conserva la elección corporativa de καρδία en singular y la imagen concreta de «labios».
  spanish_consistency_notes:
  - Se usa «pueblo» para λαός en armonía con el valor colectivo del término.
  - «Corazón» se mantiene en singular para reflejar el singular griego y su fuerza colectiva.
  - Se evita «SEÑOR» porque este versículo no contiene el Tetragrámaton ni una cita directa del nombre divino.
