translation:
  language: es
  text: Pero él no quiso[a]; al contrario, fue y lo echó en la cárcel[b] hasta que pagara lo que se le debía[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «se negó»; el griego dice literalmente «no estaba dispuesto».
    reason: lexical_alternative
  - marker: b
    text: O «lo puso en la cárcel»; el verbo griego es más enérgico, literalmente «lo echó» o «lo arrojó» en la cárcel.
    reason: lexical_alternative
  - marker: c
    text: O «la deuda» o «la cantidad debida».
    reason: lexical_alternative
lexical_decisions:
- source_word: ὁ δὲ
  english_pob_choice: But he
  chosen_spanish: Pero él
  alternatives_spanish:
  - Pero ese hombre
  - Pero aquel
  lexicon: BDAG
  rationale: El artículo con valor sustantivo retoma al siervo anterior. En español conviene explicitar el pronombre para mantener la referencia clara y el contraste de δέ.
- source_word: οὐκ ἤθελεν
  english_pob_choice: was not willing
  chosen_spanish: no quiso
  alternatives_spanish:
  - no estaba dispuesto
  - se negó
  lexicon: BDAG
  rationale: θέλω expresa voluntad/disposición. «No quiso» comunica de forma natural la falta de voluntad y conserva la tensión entre voluntad y negativa sin volverla más fuerte de lo que el griego exige.
- source_word: ἀλλὰ
  english_pob_choice: instead
  chosen_spanish: al contrario
  alternatives_spanish:
  - pero
  - más bien
  lexicon: BDAG
  rationale: Ἀλλά introduce un contraste fuerte con la petición previa. «Al contrario» conserva esa oposición con un giro idiomático claro en español.
- source_word: ἀπελθὼν
  english_pob_choice: he went away
  chosen_spanish: fue
  alternatives_spanish:
  - se fue
  - habiéndose ido
  lexicon: BDAG
  rationale: El participio aoristo se vierte con una acción finita natural en español, manteniendo la secuencia narrativa sin recargar la sintaxis.
- source_word: ἔβαλεν αὐτὸν εἰς φυλακήν
  english_pob_choice: threw him into prison
  chosen_spanish: lo echó en la cárcel
  alternatives_spanish:
  - lo arrojó a la cárcel
  - lo puso en la cárcel
  lexicon: BDAG
  rationale: βάλλω tiene fuerza más intensa que un simple «poner». «Echó» preserva la violencia del acto con una expresión natural en español bíblico contemporáneo; «cárcel» comunica φυλακή de manera idiomática.
- source_word: ἕως οὗ
  english_pob_choice: until
  chosen_spanish: hasta que
  alternatives_spanish:
  - hasta el momento en que
  - hasta
  lexicon: BDAG
  rationale: La conjunción temporal se traduce de forma directa y natural en español para introducir el límite de la prisión.
- source_word: ἀποδῷ
  english_pob_choice: he should pay
  chosen_spanish: pagara
  alternatives_spanish:
  - restituyera
  - pagase
  lexicon: BDAG
  rationale: El subjuntivo aoristo tras ἕως οὗ se expresa bien con imperfecto de subjuntivo en español. «Pagara» mantiene la idea de cumplimiento esperado sin añadir matices ajenos.
- source_word: τὸ ὀφειλόμενον
  english_pob_choice: what was owed
  chosen_spanish: lo que se le debía
  alternatives_spanish:
  - la deuda
  - la cantidad debida
  lexicon: BDAG
  rationale: El participio sustantivado significa «lo debido / lo que se debe». «Lo que se le debía» preserva la referencia concreta a una obligación pendiente y suena más natural que una abstracción más técnica.
translation_notes:
  revision_awareness: 'El texto español sigue de cerca el griego de SBLGNT y el audit trail inglés: conserva la oposición fuerte de δέ/ἀλλά, la negativa volitiva de θέλω, la acción enérgica de βάλλω, y el límite temporal de ἕως οὗ con un subjuntivo natural en español.'
  spanish_consistency_notes:
  - Se usó «Yahvé» solo cuando el texto fuente lo requiera; este versículo no contiene el nombre divino.
  - Se prefirió «cárcel» por ser el equivalente idiomático de φυλακή en este contexto narrativo.
  - No se introdujo terminología doctrinal adicional porque el versículo es narrativo y no presenta una disputa teológica explícita.
