translation:
  language: es
  text: Y Abías se hizo fuerte[a], y tomó para sí catorce esposas[b], y engendró veintidós hijos y dieciséis hijas.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'También: «se hizo poderoso», «se fortaleció» o «llegó a ser fuerte».'
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: «tomó para sí catorce esposas»; el giro idiomático significa que se casó con ellas.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּתְחַזֵּק
  english_pob_choice: grew strong
  chosen_spanish: se hizo fuerte
  alternatives_spanish:
  - creció en fuerza
  - se fortaleció
  - llegó a ser poderoso
  lexicon: HALOT
  rationale: El hitpael de חזק expresa volverse fuerte o consolidarse. «Se hizo fuerte» conserva ese sentido de aumento de fuerza sin forzar una lectura militar o política específica.
- source_word: אֲבִיָּהוּ
  english_pob_choice: Abijah
  chosen_spanish: Abías
  alternatives_spanish:
  - Abijahu
  lexicon: Convención onomástica española bíblica
  rationale: En español bíblico, la forma establecida y más reconocible es «Abías»; mantiene la referencia al nombre propio sin transliteración innecesaria.
- source_word: וַיִּשָּׂא לוֹ נָשִׁים
  english_pob_choice: he took for himself fourteen wives
  chosen_spanish: tomó para sí catorce mujeres
  alternatives_spanish:
  - se casó con catorce mujeres
  - tomó para sí catorce esposas
  lexicon: HALOT
  rationale: נשא con נשים es un giro idiomático para tomar mujeres como esposas. «Tomó para sí» conserva el giro hebreo y la nota reflexiva del לוֹ; «mujeres» evita suavizar el hebreo con una equivalencia demasiado interpretativa, aunque el sentido es matrimonial.
- source_word: אַרְבַּע עֶשְׂרֵה
  english_pob_choice: fourteen
  chosen_spanish: catorce
  alternatives_spanish:
  - catorce
  lexicon: Numerales cardinales
  rationale: Correspondencia directa del cardinal hebreo; no requiere ajuste interpretativo.
- source_word: וַיּוֹלֶד
  english_pob_choice: fathered
  chosen_spanish: engendró
  alternatives_spanish:
  - fue padre de
  - tuvo
  lexicon: HALOT
  rationale: En forma causativa con sujeto masculino, ילד indica engendrar o ser padre de hijos. «Engendró» es preciso y conserva la relación paterna sin vaguedad.
- source_word: עֶשְׂרִים וּשְׁנַיִם בָּנִים
  english_pob_choice: twenty-two sons
  chosen_spanish: veintidós hijos
  alternatives_spanish:
  - veintidós varones
  - veintidós hijos varones
  lexicon: Uso contextual del hebreo
  rationale: El hebreo dice literalmente «hijos»; en este tipo de enumeración puede funcionar como colectivo para descendencia masculina. Se optó por «hijos» para mantener la forma del texto base, aunque el contexto deja claro que son varones.
- source_word: וְשֵׁשׁ עֶשְׂרֵה בָּנוֹת
  english_pob_choice: and sixteen daughters
  chosen_spanish: y dieciséis hijas
  alternatives_spanish:
  - y dieciséis hijas
  lexicon: Uso contextual del hebreo
  rationale: Correspondencia directa del sustantivo femenino plural; mantiene la especificación de género del original.
