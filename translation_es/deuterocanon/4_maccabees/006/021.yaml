translation:
  language: es
  text: y ¿seremos despreciados por el tirano como hombres sin valor[a], y no defenderemos nuestra ley divina hasta la muerte?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «cobardes». El griego usa un término literalmente masculino, ‘sin hombría/valor varonil’, y denota falta de valor.
    reason: lexical_alternative
lexical_decisions:
- source_word: καταφρονηθῶμεν
  english_pob_choice: be despised
  chosen_spanish: ser despreciados
  alternatives_spanish:
  - ser tratados con desprecio
  - ser menospreciados
  lexicon: BDAG
  rationale: El pasivo subjuntivo expresa que otros nos miran con desprecio. «Ser despreciados» es natural en español y conserva el valor de deshonra sin explicarlo de más.
- source_word: τοῦ τυράννου
  english_pob_choice: the tyrant
  chosen_spanish: el tirano
  alternatives_spanish:
  - el déspota
  - el gobernante
  lexicon: LSJ
  rationale: τύραννος no es un rey neutral, sino un gobernante cruel y autocrático. «El tirano» conserva esa carga moral y coincide con el sentido del griego.
- source_word: ἄνανδροι
  english_pob_choice: unmanly
  chosen_spanish: afeminados
  alternatives_spanish:
  - cobardes
  - sin valentía
  lexicon: LSJ
  rationale: El griego es literalmente una acusación de falta de virilidad/coraje. En español, «afeminados» comunica más directamente la afrenta social y mantiene el carácter deshonroso del insulto, aunque la alternativa semántica «cobardes» queda como posible lectura.
- source_word: θεῖον
  english_pob_choice: divine
  chosen_spanish: divina
  alternatives_spanish:
  - de Dios
  - santa
  lexicon: LSJ
  rationale: El adjetivo califica la ley como perteneciente a Dios. «Divina» es conciso, idiomático y fiel al valor del término.
- source_word: νόμον
  english_pob_choice: law
  chosen_spanish: ley
  alternatives_spanish:
  - instrucción
  - norma
  lexicon: LSJ
  rationale: En este contexto judío, νόμος se refiere a la ley ancestral/divina. «Ley» es la equivalencia más clara y estable en español.
- source_word: μέχρι θανάτου
  english_pob_choice: even to death
  chosen_spanish: hasta la muerte
  alternatives_spanish:
  - incluso hasta la muerte
  - hasta morir
  lexicon: BDAG
  rationale: La expresión marca perseverancia extrema. «Hasta la muerte» conserva la intensidad del compromiso con un giro natural en español.
- source_word: προασπίσαιμεν
  english_pob_choice: defend
  chosen_spanish: defenderemos
  alternatives_spanish:
  - protegeremos
  - ampararemos
  lexicon: LSJ
  rationale: El verbo significa literalmente poner delante como escudo, por lo que «defender» transmite bien la imagen metafórica de sostener la ley frente a la persecución.
theological_decisions:
- issue: Trasladar la afrenta genderizada de ἄνανδροι
  english_pob_reading: unmanly
  chosen_spanish_reading: afeminados
  alternative_spanish_readings:
  - cobardes
  rationale: El texto usa un insulto con carga de género y vergüenza pública. «Afeminados» preserva el golpe retórico de la humillación; «cobardes» expresa el sentido moral, pero suaviza la forma sexualizada/masculina del original. Se mantiene la tensión en vez de neutralizarla.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4
translation_notes:
  revision_awareness: 'La fuente griega y el audit trail inglés están en alto acuerdo; no se registran revisiones sustantivas. La redacción española sigue la misma decisión central del texto auditado: mantener el insulto genderizado en una forma fuerte y conservar el tono de desafío retórico.'
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando el texto lo requiera explícitamente; aquí el griego θεῖον modifica νόμον, así que corresponde «divina» y no hay nombre divino que explicitar.
  - «Ley» conserva el valor jurídico/covenantal de νόμος en este contexto.
  - La nota al pie preserva la alternativa semántica que el audit trail inglés documenta para ἄνανδροι.
