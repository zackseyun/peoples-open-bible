translation:
  language: es
  text: Cavó un hoyo[a] y lo ahondó, y cayó en el hoyo que hizo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'También puede traducirse: «Cavó un hoyo y lo excavó, y cayó en el hoyo que hizo».'
    reason: lexical_alternative
lexical_decisions:
- source_word: בּוֹר
  english_pob_choice: pit
  chosen_spanish: hoyo
  alternatives_spanish:
  - pozo
  - foso
  - hueco
  lexicon: HALOT
  rationale: En este verso, בּוֹר designa una cavidad física preparada como trampa. El inglés POB eligió 'pit' por su valor general; en español, 'hoyo' comunica bien la imagen concreta sin sonar tan técnico como 'pozo' ni tan militar como 'foso'.
- source_word: כָּרָה
  english_pob_choice: dug
  chosen_spanish: cavó
  alternatives_spanish:
  - excavó
  - hizo un hoyo
  lexicon: HALOT
  rationale: El verbo expresa la acción básica de cavar. 'Cavó' es el equivalente natural y directo en español, y conserva la contundencia narrativa del hebreo.
- source_word: וַיַּחְפְּרֵהוּ
  english_pob_choice: and hollowed it out
  chosen_spanish: y lo ahondó
  alternatives_spanish:
  - y lo excavó
  - y lo profundizó
  lexicon: HALOT
  rationale: La secuencia verbal intensifica la acción de cavar. 'Ahondó' mantiene la idea de profundizar o hacer más hondo el hoyo sin repetir exactamente el primer verbo, como hace el inglés POB con 'hollowed it out'.
- source_word: וַיִּפֹּל
  english_pob_choice: and he fell
  chosen_spanish: y cayó
  alternatives_spanish:
  - y se precipitó
  - y se desplomó
  lexicon: HALOT
  rationale: La forma narrativa simple pide un español igualmente directo. 'Cayó' conserva la tersura poética del original y del inglés POB.
- source_word: שַׁחַת
  english_pob_choice: the hole
  chosen_spanish: la fosa
  alternatives_spanish:
  - el hoyo
  - el pozo
  - la trampa
  lexicon: HALOT
  rationale: Aunque el inglés POB usa 'hole' para evitar repetir 'pit', en español 'fosa' mantiene la imagen de una cavidad peligrosa y suena más natural en el registro bíblico. Se conserva así la relación con el hoyo cavado, sin perder la referencia física.
- source_word: יִפְעָל
  english_pob_choice: he made
  chosen_spanish: hizo
  alternatives_spanish:
  - fabricó
  - preparó
  - formó
  lexicon: HALOT
  rationale: פעל aquí apunta al resultado producido por la acción previa. 'Hizo' expresa de forma clara y fiel que la cavidad es obra de quien la cavó.
translation_notes:
  revision_awareness: La revisión más reciente indica que no hubo cambios necesarios y el estado de concordancia es alto; por eso esta versión sigue de cerca la lectura del texto hebreo y el criterio léxico ya auditado en inglés, ajustando solo la formulación para una publicación natural en español.
  spanish_consistency_notes:
  - Se mantiene la secuencia verbal breve y paralela del hebreo.
  - Se evita repetir el mismo sustantivo en ambos miembros, como hace el inglés POB con pit/hole, pero sin borrar la imagen de cavidad/trampa.
  - '''Ahondó'' refleja la progresión de ''cavar'' + ''hollow out'' sin volver el verso prolijo.'
  - No se introduce terminología doctrinal ajena al versículo.
