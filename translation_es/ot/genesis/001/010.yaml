revisions:
- from: Y Dios llamó a la tierra seca «Tierra»[a], y al conjunto de las aguas llamó «mares». Y Dios vio que era bueno.
  to: Y Dios llamó a la tierra seca «Tierra»[a], y a la reunión de las aguas llamó «Mares». Y Dios vio que era bueno.
  rationale: Se ajusta «conjunto» a «reunión» para reflejar mejor מִקְוֵה y mejorar la naturalidad del español. Se capitaliza «Mares» para mantener la simetría del acto de nombramiento con «Tierra». Se conserva la nota léxica sobre אֶרֶץ y su anclaje en el texto.
