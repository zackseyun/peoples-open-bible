revisions:
- from: Al tercer día[a], mientras ellos estaban con dolor, dos de los hijos de Jacob, Simeón y Leví, hermanos de Dina, cada uno tomó su espada[b], entraron sobre la ciudad confiados[c], y mataron a todo varón.
  to: Al tercer día[a], mientras estaban con dolor, dos de los hijos de Jacob, Simeón y Leví, hermanos de Dina, cada uno tomó su espada; cayeron sobre la ciudad sin sospecharlo[b], y mataron a todo varón.
  rationale: 'Se revisa el texto para corregir un giro no idiomático (''entraron sobre la ciudad'') y para alinear mejor בֶּטַח con la decisión contextual documentada en la auditoría inglesa: la ciudad estaba desprevenida. Se elimina una nota redundante y se conserva en nota la ambigüedad léxica pertinente.'
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T21:22:51Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador conserva bien la secuencia narrativa básica y varias decisiones léxicas importantes: ''mientras ... estaban con dolor'', ''dos de los hijos de Jacob'', ''hermanos de Dina'' y ''mataron a todo varón'' reflejan adecuadamente el hebreo. Sin embargo, falla en un punto clave: וַיָּבֹאוּ עַל הָעִיר no se expresa fielmente con ''entraron sobre la ciudad'', que es poco natural en español y no transmite bien la idea de irrupción/ataque. Además, el uso de ''confiados'' en el texto principal desplaza el sentido hacia los atacantes y suena ambiguo en español, mientras que la revisión inglesa auditada optó por el sentido contextual de que la ciudad estaba desprevenida.'
  spanish_quality_summary: 'El español es en general comprensible, pero presenta giros poco naturales o innecesarios para lectura bíblica fluida: ''Al tercer día'' es menos idiomático que ''En el tercer día'' o mejor ''Al tercer día'' puede pasar, pero aquí la puntuación y el encabalgamiento con la nota no ayudan; ''mientras ellos estaban con dolor'' suena más pesado que ''mientras estaban adoloridos'' o ''mientras estaban con dolor''; sobre todo, ''entraron sobre la ciudad'' no es español natural. La nota b es redundante porque solo repite exactamente el texto principal y no preserva una alternativa significativa.'
  glossary_alignment: No hay conflicto con la terminología teológica del proyecto en este versículo. Los nombres propios están bien. 'Varón' preserva adecuadamente כָּל זָכָר. La revisión debe centrarse en fidelidad sintáctica y naturalidad del español, no en glosario doctrinal.
  issues:
  - severity: high
    issue: '''entraron sobre la ciudad'' no refleja bien וַיָּבֹאוּ עַל הָעִיר'
    rationale: El hebreo describe venir contra/sobre la ciudad en movimiento hostil. 'Entraron sobre' es un calco extraño en español y puede sugerir penetración física en vez de acometida sorpresiva. 'Cayeron sobre la ciudad' o 'vinieron contra la ciudad' expresa mejor la fuerza contextual.
  - severity: medium
    issue: '''confiados'' es ambiguo y probablemente mal orientado en el texto principal'
    rationale: Aunque בֶּטַח admite ambigüedad, la revisión inglesa auditada tomó el sentido contextual de que la ciudad estaba desprevenida/off guard. En español, 'confiados' se entiende más naturalmente de los atacantes que de la ciudad. Conviene usar 'sin sospecharlo' o equivalente en el texto y preservar la otra posibilidad en nota.
  - severity: low
    issue: La nota b es innecesaria
    rationale: Indica 'Lit. «cada uno tomó su espada»', pero eso ya aparece exactamente en el texto principal. No aporta alternativa, aclaración ni ambigüedad relevante.
  revised_spanish_text: Al tercer día[a], mientras estaban con dolor, dos de los hijos de Jacob, Simeón y Leví, hermanos de Dina, cada uno tomó su espada; cayeron sobre la ciudad sin sospecharlo[b], y mataron a todo varón.
  revised_footnotes:
  - marker: a
    text: 'O: «Y sucedió que al tercer día, mientras estaban con dolor...». El hebreo incluye una fórmula narrativa introductoria que puede expresarse de manera más plena.'
    reason: previous_rendering
  - marker: b
    text: O «confiadamente / seguros»; el hebreo בֶּטַח puede describir la manera de los atacantes o el estado desprevenido y seguro de la ciudad. Aquí se entiende que la ciudad fue tomada por sorpresa.
    reason: lexical_alternative
  revision_rationale: 'Se revisa el texto para corregir un giro no idiomático (''entraron sobre la ciudad'') y para alinear mejor בֶּטַח con la decisión contextual documentada en la auditoría inglesa: la ciudad estaba desprevenida. Se elimina una nota redundante y se conserva en nota la ambigüedad léxica pertinente.'
