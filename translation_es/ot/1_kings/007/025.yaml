revisions:
- from: 'Estaba sobre doce bueyes: tres mirando al norte[a], tres mirando al oeste, tres mirando al sur y tres mirando al este; y el Mar estaba sobre ellos, por encima[b], y todas sus partes traseras quedaban hacia adentro.'
  to: 'Estaba sobre doce bueyes: tres vueltos hacia el norte, tres vueltos hacia el oeste[a], tres vueltos hacia el sur y tres vueltos hacia el este; y el Mar estaba sobre ellos arriba, y todas sus partes traseras estaban hacia adentro[b].'
  rationale: 'Se corrigen las notas para que coincidan con la evidencia y la auditoría inglesa: [a] se mueve a ''oeste'', y [b] ahora preserva la alternativa significativa para ''sus partes traseras ... hacia adentro''. También se ajusta ''mirando'' a ''vueltos hacia'' para reflejar mejor la orientación de פֹנִים en una descripción de figuras, y se simplifica levemente la redacción para mejorar la naturalidad del español sin apartarse del hebreo.'
  reviewer_model: gpt-5.4
