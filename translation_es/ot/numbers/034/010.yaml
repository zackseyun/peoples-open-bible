translation:
  language: es
  text: Y ustedes delimitarán para sí la frontera oriental desde Hazar-enán hasta Shefam[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O bien, «trazar/delimitar para sí la frontera oriental». El verbo hebreo aquí es inusual y, en este contexto, se refiere a marcar o trazar una línea fronteriza.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהִתְאַוִּיתֶם
  english_pob_choice: you shall mark out
  chosen_spanish: marcaréis
  alternatives_spanish:
  - trazaréis
  - delimitaréis
  - señalaréis
  lexicon: HALOT
  rationale: En este contexto de límites territoriales, el verbo hebreo expresa la acción de trazar o marcar una línea de frontera, no deseo. «Marcaréis» comunica de forma natural esa acción legal-geográfica en español.
- source_word: לָכֶם
  english_pob_choice: for yourselves
  chosen_spanish: para vosotros
  alternatives_spanish:
  - para ustedes
  - para vosotros mismos
  lexicon: contextual pronoun nuance
  rationale: El dativo indica beneficio o asignación para el pueblo. En español, «para vosotros» preserva la referencia directa al destinatario sin sobrecargar con una redundancia reflexiva innecesaria.
- source_word: לִגְבוּל
  english_pob_choice: the border
  chosen_spanish: el límite
  alternatives_spanish:
  - la frontera
  - el borde
  lexicon: HALOT
  rationale: En una descripción de delimitación territorial, גבול puede expresarse como «límite» o «frontera». «Límite» resulta claro y sobrio en español, manteniendo el sentido técnico.
- source_word: קֵדְמָה
  english_pob_choice: eastern
  chosen_spanish: oriental
  alternatives_spanish:
  - del este
  - este
  lexicon: HALOT
  rationale: El término direccional señala el lado oriental de la tierra. «Oriental» conserva el valor adjetival y funciona bien con «límite» en un registro bíblico digno.
- source_word: מֵחֲצַר עֵינָן
  english_pob_choice: from Hazar-enan
  chosen_spanish: desde Hazar-enán
  alternatives_spanish:
  - de Hazar-enán
  lexicon: proper noun transliteration
  rationale: Es un topónimo, por lo que se translitera. «Desde» reproduce con naturalidad el punto de partida del trazado de la frontera.
- source_word: שְׁפָמָה
  english_pob_choice: to Shepham
  chosen_spanish: hasta Shefam
  alternatives_spanish:
  - hasta Shefam
  - a Shefam
  lexicon: proper noun transliteration
  rationale: Es otro topónimo que marca el extremo del tramo fronterizo. «Hasta» expresa adecuadamente el término del recorrido, y la transliteración «Shefam» sigue una forma española transparente y estable.
translation_notes:
  revision_awareness: El texto inglés auditable coincide con el hebreo en una lectura de delimitación territorial; no se registran revisiones que alteren el sentido. La nota conserva la tensión léxica del verbo hebreo inusual, evitando reducirlo a un sentido genérico de 'desear'.
  spanish_consistency_notes:
  - Se ha mantenido el paralelismo de frontera/término direccional con un registro jurídico-geográfico.
  - Los nombres propios se transliteran para conservar la transparencia del texto fuente.
  - La nota de alternancia léxica se ancla en el verbo principal, donde está la principal dificultad interpretativa.
