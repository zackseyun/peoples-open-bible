  to: y un espíritu de justicia para el que se sienta para juzgar[a][b], y fortaleza para los que hacen retroceder la batalla en la puerta[c].
  rationale: 'La revisión conserva la estructura y las decisiones principales del POB, pero mejora dos puntos: 1) aclara la función judicial de לַיֹּשֵׁב עַל הַמִּשְׁפָּט con «para el que se sienta para juzgar»; 2) refleja con mayor fidelidad el sentido causativo-militar de מְשִׁיבֵי mediante «hacen retroceder la batalla». Se mantienen las alternativas léxicas documentadas en notas.'
