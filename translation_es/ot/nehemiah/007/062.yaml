lexical_decisions:
- source_word: בְּנֵי
  english_pob_choice: the sons of
  chosen_spanish: los hijos de
  alternatives_spanish:
  - los descendientes de
  - los hijos varones de
  lexicon: HALOT
  rationale: En este contexto de censo/lista genealógica, el hebreo בְּנֵי señala pertenencia a un grupo familiar por linaje. En español, «los hijos de» conserva bien la repetición estructural y la forma breve del original sin ampliar el sentido a «descendientes», que sería más interpretativo.
- source_word: דְלָיָה
  english_pob_choice: Delaiah
  chosen_spanish: Delaía
  alternatives_spanish:
  - Delaías
  lexicon: nombre propio
  rationale: Nombre propio transliterado. «Delaía» sigue de cerca la forma hebrea y evita adaptar innecesariamente a una tradición denominacional; se mantiene la vocalización española natural sin añadir información.
- source_word: טוֹבִיָּה
  english_pob_choice: Tobiah
  chosen_spanish: Tobías
  alternatives_spanish:
  - Tobia
  lexicon: nombre propio
  rationale: Nombre propio transliterado. «Tobías» es la forma más reconocible y estable en español bíblico, y representa con claridad el nombre hebreo sin traducirlo.
- source_word: נְקוֹדָא
  english_pob_choice: Nekoda
  chosen_spanish: Necodá
  alternatives_spanish:
  - Nekodá
  - Nekoda
  lexicon: nombre propio
  rationale: Nombre propio transliterado. «Necodá» refleja la pronunciación española fluida y conserva la terminación acentuada para indicar el acento final; la consonancia con la forma hebrea se mantiene sin crear una forma artificial.
- source_word: שֵׁשׁ מֵאוֹת וְאַרְבָּעִים וּשְׁנָיִם
  english_pob_choice: six hundred forty-two
  chosen_spanish: seiscientos cuarenta y dos
  alternatives_spanish:
  - seiscientos y cuarenta y dos
  lexicon: HALOT
  rationale: El número total del grupo se expresa en español en forma cardinal simple. Se omite «y» porque en español estándar no es necesario entre «seiscientos» y «cuarenta», y así se preserva un estilo más natural y directo.
translation_notes:
  revision_awareness: El texto inglés auditado se mantuvo sin notas y con alta concordancia en la revisión más reciente; la propuesta española sigue la misma lectura, ajustando únicamente la transliteración y el orden natural del español.
  spanish_consistency_notes:
  - Se mantiene el patrón repetido «los hijos de» para reflejar la estructura genealógica del hebreo.
  - Se transliteran todos los nombres propios de manera consistente y no se mezclan formas latinizadas con transliteraciones hebreas en una misma línea.
  - La cifra cardinal se presenta en estilo español moderno, sin alteraciones interpretativas.
