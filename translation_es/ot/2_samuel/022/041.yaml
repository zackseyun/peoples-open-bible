translation:
  language: es
  text: Tú me diste la nuca[a] de mis enemigos; destruí a los que me odiaban.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo literalmente: «me diste la nuca/el cuello de mis enemigos», un modismo que indica que los enemigos se volvieron y huyeron delante del vencedor.'
    reason: lexical_alternative
lexical_decisions:
- source_word: אֹיְבַי
  english_pob_choice: my enemies
  chosen_spanish: mis enemigos
  alternatives_spanish:
  - mis adversarios
  - los que me son hostiles
  lexicon: HALOT
  rationale: El sustantivo אֹיֵב nombra a un enemigo; el sufijo de primera persona exige la posesión en español con «mis». «Enemigos» es la equivalencia más transparente y natural.
- source_word: תַּתָּה לִּי עֹרֶף
  english_pob_choice: you gave me the necks
  chosen_spanish: me diste la nuca
  alternatives_spanish:
  - me diste el cuello
  - hiciste que volvieran la espalda ante mí
  - me pusiste la nuca de mis enemigos
  lexicon: HALOT
  rationale: El hebreo expresa literalmente «dar cuello/nuca», con valor idiomático de hacer huir al enemigo o ponerlo en retirada. «Nuca» conserva la imagen corporal sin sonar tan extraño en español como una traducción rígida de «cuello». La nota explica el giro idiomático.
- source_word: מְשַׂנְאַי
  english_pob_choice: those who hated me
  chosen_spanish: los que me odiaban
  alternatives_spanish:
  - mis odiadores
  - los que me aborrecían
  lexicon: HALOT
  rationale: El participio con sufijo de primera persona señala a quienes me odian/odiaban. «Los que me odiaban» conserva el valor sustantivo del participio y funciona bien en el flujo narrativo poético español.
- source_word: וָאַצְמִיתֵם
  english_pob_choice: I destroyed
  chosen_spanish: destruí
  alternatives_spanish:
  - los exterminé
  - los aniquilé
  - los hice desaparecer
  lexicon: HALOT
  rationale: El hifil de צמת denota destruir, acabar con, exterminar. «Destruí» mantiene fuerza, es fiel al rango semántico y evita un exceso de tecnicismo o de intensidad no necesaria en el español receptor.
theological_decisions:
- issue: Idiom of the enemy's 'neck/back'
  english_pob_reading: You gave me the necks of my enemies, an idiom for causing enemies to turn and flee before the victor.
  chosen_spanish_reading: Tú me diste la nuca de mis enemigos, es decir, los pusiste en retirada delante de mí.
  alternative_spanish_readings:
  - Tú me diste la espalda de mis enemigos
  - Tú hiciste que mis enemigos volvieran la espalda ante mí
  rationale: No se debe ocultar el valor idiomático del hebreo. La traducción principal conserva la imagen corporal («nuca») y la nota aclara el sentido de derrota/huida que el POB inglés documenta.
  doctrine_reference: No aplica; decisión lexicográfica y poética, no doctrinal.
translation_notes:
  revision_awareness: El texto inglés auditado fue revisado de «backs» a «necks» para reflejar con mayor precisión עֹרֶף ('neck/back of the neck') dentro del modismo. La versión española sigue esa revisión al preferir «nuca» antes que una expresión más libre como «espalda», y preserva el sentido idiomático con nota.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» como forma por defecto en el proyecto, pero este versículo no contiene el tetragrámaton ni un equivalente directo.
  - Se evitó «Cristo» y terminología eclesial ajena al versículo.
  - «Destruí» reproduce la fuerza verbal sin sobrecargar el registro.
  - La puntuación con punto y coma refleja la paralelización poética del hebreo y del inglés POB.
