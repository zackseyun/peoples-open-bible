revisions:
- from: Él cambia los tiempos y las estaciones[a]; quita reyes y pone reyes[b]; da sabiduría a los sabios y conocimiento a los que tienen entendimiento.
  to: Él cambia los tiempos y las estaciones[a]; depone reyes y establece reyes; da sabiduría a los sabios y conocimiento a los que tienen entendimiento[b].
  rationale: 'Se revisa únicamente el par verbal sobre los reyes para elevar la precisión semántica y el registro en español: «depone ... y establece ...» comunica mejor la remoción e instalación de gobernantes que «quita ... y pone ...», sin suavizar la soberanía divina del texto. Se conserva «tiempos y estaciones» con nota, y se mantiene la nota literal final porque documenta una alternativa significativa del original.'
