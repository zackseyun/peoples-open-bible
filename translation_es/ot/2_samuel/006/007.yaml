translation:
  language: es
  text: Y la ira de Yahvé se encendió contra Uzá[a], y Dios lo hirió allí por el error, y murió allí junto al arca de Dios.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «por la falta», «por la irreverencia» o quizá «porque extendió su mano». La expresión hebrea es difícil y se ha entendido de varias maneras.
    reason: alternative_reading
lexical_decisions:
- source_word: וַיִּחַר אַף
  english_pob_choice: the anger ... burned
  chosen_spanish: la ira ... se encendió
  alternatives_spanish:
  - la ira ... ardió
  - la ira ... se inflamó
  lexicon: HALOT
  rationale: La construcción hebrea expresa la ira como algo que se enciende; en español, «se encendió» conserva la imagen sin sonar forzado.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: Se sigue el estándar del proyecto para el Tetragrámaton, preservando el nombre divino propio y no una sustitución titulada.
- source_word: בְּעֻזָּה
  english_pob_choice: against Uzzah
  chosen_spanish: contra Uzá
  alternatives_spanish:
  - en contra de Uzá
  - a Uzá
  lexicon: HALOT
  rationale: Con el giro de ira encendida, la preposición marca al objeto de la ira; «contra» es idiomático y transparente en español.
- source_word: וַיַּכֵּהוּ
  english_pob_choice: struck him
  chosen_spanish: lo hirió
  alternatives_spanish:
  - lo golpeó
  - lo hirió de muerte
  lexicon: HALOT
  rationale: נכה admite «herir» o «golpear»; «lo hirió» es natural y permite que la muerte se exprese en la cláusula siguiente sin anticiparla.
- source_word: הָאֱלֹהִים
  english_pob_choice: God
  chosen_spanish: Dios
  alternatives_spanish:
  - el Dios
  - el Señor
  lexicon: HALOT
  rationale: Se mantiene la variación del hebreo, que aquí dice explícitamente «Dios», en vez de armonizarla con Yahvé.
- source_word: עַל הַשַּׁל
  english_pob_choice: for the error
  chosen_spanish: por el error
  alternatives_spanish:
  - por la falta
  - a causa del error
  - por la irreverencia
  lexicon: HALOT
  rationale: La expresión es difícil y rara; «por el error» sigue de cerca la revisión inglesa reciente y evita cargar el texto principal con una interpretación más específica que el hebreo no asegura.
- source_word: וַיָּמָת
  english_pob_choice: he died
  chosen_spanish: murió
  alternatives_spanish:
  - y murió
  - así que murió
  lexicon: HALOT
  rationale: El verbo narrativo se rinde de forma simple y directa en español.
- source_word: עִם אֲרוֹן הָאֱלֹהִים
  english_pob_choice: beside the ark of God
  chosen_spanish: junto al arca de Dios
  alternatives_spanish:
  - al lado del arca de Dios
  - junto al arca de Dios
  lexicon: HALOT
  rationale: Aunque עִם literalmente puede ser «con», en este contexto espacial español requiere una relación locativa; «junto a» refleja mejor la escena que «con».
theological_decisions:
- issue: La frase oscura עַל הַשַּׁל y el motivo de la muerte de Uzá
  english_pob_reading: for the error
  chosen_spanish_reading: por el error
  alternative_spanish_readings:
  - por la falta
  - por la irreverencia
  - a causa del error
  rationale: La traducción principal conserva la tensión textual sin resolverla del todo. «Por el error» mantiene la cautela del audit trail inglés y deja abiertas las interpretaciones posibles sin convertir una glosa en certeza del texto.
  doctrine_reference: Primacía de la fuente original; mantener la ambigüedad cuando el hebreo es difícil.
translation_notes:
  revision_awareness: La redacción española sigue la revisión más reciente del audit trail inglés, que sustituyó «because of the irreverence» por «for the error» para acercarse más al hebreo עַל הַשַּׁל sin introducir una expansión interpretativa. Se conserva esa cautela en la versión española, manteniendo además la variación divina Yahvé/Dios presente en el original.
  spanish_consistency_notes:
  - Se preserva «Yahvé» para יְהוָה conforme a la norma del proyecto.
  - Se conserva «Dios» para הָאֱלֹהִים, respetando la variación del hebreo.
  - «junto al arca de Dios» evita el falso matiz de compañía que tendría «con el arca» en español.
  - La nota al pie recoge alternativas interpretativas sin sobreexplicar el texto principal.
