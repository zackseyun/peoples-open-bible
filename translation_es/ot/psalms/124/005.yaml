translation:
  language: es
  text: entonces las aguas furiosas[a] habrían pasado sobre nuestra alma.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «las aguas orgullosas habrían pasado sobre nosotros». El adjetivo hebreo puede significar «orgullosas», «insolentes» o «presuntuosas»; aquí describe metafóricamente a las aguas como violentamente avasalladoras.
