translation:
  language: es
  text: 'Con estas palabras[a], diciendo: «El rey Alejandro a su hermano'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El texto griego suministrado para este versículo parece incompleto y suena como el inicio de una carta o fórmula de cita, no como una oración completa. Por eso la traducción se mantiene muy cercana al fragmento conservado y no reconstruye material perdido.
