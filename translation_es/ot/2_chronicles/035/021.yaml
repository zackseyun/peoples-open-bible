translation:
  language: es
  text: 'Pero le envió mensajeros, diciendo: «¿Qué tengo yo contigo, rey de Judá? No vengo contra ti hoy, sino contra la casa[a] con la que estoy en guerra; y Dios me ha dicho que me apresure. Deja de oponerte a Dios, que está conmigo, para que no te destruya».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «contra la casa de mi guerra»; o «contra la casa o reino con la que estoy en guerra». La expresión hebrea es difícil.
    reason: lexical_alternative
lexical_decisions:
- source_word: מַלְאָכִים
  english_pob_choice: messengers
  chosen_spanish: mensajeros
  alternatives_spanish:
  - enviados
  - mensajeros
  lexicon: HALOT
  rationale: En este contexto narrativo se trata de representantes humanos enviados por Necao, no de seres celestiales. «Mensajeros» conserva el sentido natural y transparente en español.
- source_word: מַה לִּי וָלָךְ
  english_pob_choice: What have I to do with you
  chosen_spanish: ¿Qué tengo yo contigo?
  alternatives_spanish:
  - ¿Qué hay entre tú y yo?
  - ¿Qué tengo que ver contigo?
  lexicon: HALOT
  rationale: La expresión es idiomática y expresa no implicación, más que hostilidad directa. «¿Qué tengo yo contigo?» reproduce bien ese valor en español actual.
- source_word: לֹא עָלֶיךָ אַתָּה הַיּוֹם
  english_pob_choice: I am not coming against you today
  chosen_spanish: No es contra ti que vengo hoy
  alternatives_spanish:
  - Hoy no vengo contra ti
  - No vengo hoy contra ti
  lexicon: HALOT
  rationale: El hebreo es elíptico; en español conviene hacer explícito el verbo de movimiento/ataque. La formulación elegida mantiene el sentido sin endurecerlo más de lo que pide el texto.
- source_word: אֶל בֵּית מִלְחַמְתִּי
  english_pob_choice: against the house with which I am at war
  chosen_spanish: contra la casa con la que estoy en guerra
  alternatives_spanish:
  - contra la casa de mi guerra
  - contra la casa con la que guerreo
  - contra el reino con el que estoy en guerra
  lexicon: HALOT
  rationale: Se conserva la imagen de «casa», que en hebreo es algo opaca y puede aludir a casa real, reino o ámbito de la campaña militar. Se evita resolverla de más en el texto principal.
- source_word: וֵאלֹהִים
  english_pob_choice: God
  chosen_spanish: Dios
  alternatives_spanish:
  - dios
  - los dioses
  lexicon: HALOT
  rationale: Aunque la forma puede parecer plural, el verbo singular y el marco narrativo favorecen un referente singular. «Dios» respeta esa lectura y es la forma natural en español.
- source_word: לְבַהֲלֵנִי
  english_pob_choice: to hurry
  chosen_spanish: que me apresure
  alternatives_spanish:
  - que me dé prisa
  - que me apure
  - para apresurarme
  lexicon: HALOT
  rationale: El infinitivo expresa urgencia y premura. «Que me apresure» suena natural y mantiene el impulso del mandato.
- source_word: חֲדַל לְךָ מֵאֱלֹהִים
  english_pob_choice: Stop opposing God
  chosen_spanish: Déjalo ya de oponerte a Dios
  alternatives_spanish:
  - Deja de interferir con Dios
  - Cesa de oponerte a Dios
  - Apártate de Dios
  lexicon: HALOT
  rationale: El hebreo pide cesar de oponerse o interferir con la acción de Dios. «Déjalo ya de oponerte a Dios» comunica ese matiz de advertencia y freno.
- source_word: אֲשֶׁר עִמִּי
  english_pob_choice: who is with me
  chosen_spanish: que está conmigo
  alternatives_spanish:
  - que está de mi lado
  - que me acompaña en esto
  lexicon: HALOT
  rationale: La cláusula relativa es directa. «Que está conmigo» preserva la formulación sin sobreinterpretar la clase de ayuda divina.
- source_word: וְאַל יַשְׁחִיתֶךָ
  english_pob_choice: so that he does not destroy you
  chosen_spanish: para que no te destruya
  alternatives_spanish:
  - para que no te arruine
  - para que no te haga perecer
  lexicon: HALOT
  rationale: Con אַל, el hebreo expresa prevención o propósito negativo. «Destruir» transmite la gravedad del aviso y corresponde al verbo המקראי.
theological_decisions:
- issue: Referencia de אֱלֹהִים en el discurso de Necao
  english_pob_reading: Render as singular 'God'
  chosen_spanish_reading: Traducir «Dios» en singular
  alternative_spanish_readings:
  - «dios» en minúscula
  - «los dioses»
  rationale: La forma verbal singular y el contexto inmediato favorecen un referente singular. La narración posterior también trata estas palabras como advertencia procedente de Dios, por lo que «Dios» preserva mejor el encuadre del relato.
  doctrine_reference: Translation philosophy §1, §3; afirmaciones sobre la verdad narrativa del texto
- issue: Interpretación de בֵּית מִלְחַמְתִּי
  english_pob_reading: Retain 'house' imagery in the main text
  chosen_spanish_reading: Mantener «casa» en el texto principal
  alternative_spanish_readings:
  - «reino»
  - «dinastía»
  - «lugar de mi guerra»
  rationale: La expresión es difícil y algo abierta. Conservar «casa» mantiene la transparencia al hebreo y evita resolver de más una frase que el propio texto no aclara plenamente.
  doctrine_reference: Translation philosophy §1, §3, §5
translation_notes:
  revision_awareness: El inglés POB revisó esta cláusula desde «against the house of my war» a «against the house with which I am at war» para aclarar el sentido sin abandonar la opacidad relativa del hebreo. La versión española sigue esa revisión, conservando «casa» y expresando el vínculo bélico de modo natural.
  spanish_consistency_notes:
  - Se mantiene «Dios» para אֱלֹהִים conforme al encuadre narrativo y al verbo singular.
  - Se conserva «casa» en la frase difícil para no sobreinterpretar el hebreo.
  - Se usa un registro digno y moderno, evitando calcos innecesarios pero respetando la fuerza idiomática del original.
  - No se sustituye «mensajeros» por «ángeles», dado el contexto humano del envío.
