translation:
  language: es
  text: 'Así dice Yahvé, el Redentor de Israel, su Santo: al despreciado en el alma[a], aborrecido por la nación[b], siervo de gobernantes[c]. Reyes verán y se pondrán de pie; también príncipes, y se postrarán, por causa de Yahvé, que es fiel, el Santo de Israel, que te ha escogido.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O "al despreciado", "al profundamente despreciado" o posiblemente "despreciado por la gente"; la expresión hebrea es comprimida y difícil.
    reason: lexical_alternative
  - marker: b
    text: O "aborrecido por las naciones" o "a quien la nación aborrece".
    reason: lexical_alternative
  - marker: c
    text: O "esclavo de gobernantes"; el hebreo עֶבֶד puede significar tanto "siervo" como "esclavo", pero aquí el contexto de humillación favorece una lectura que preserve la sujeción.
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  lexicon: HALOT
  rationale: Se conserva el nombre propio del Tetragrámaton en español como "Yahvé", siguiendo la decisión del POB en inglés de transliterar el nombre divino en vez de sustituirlo por un título. "Jehová" se evita por ser una forma tradicional menos consistente con la etimología y con el criterio del proyecto.
- source_word: גֹּאֵל
  english_pob_choice: Redeemer
  chosen_spanish: Redentor
  alternatives_spanish:
  - Rescatador
  - pariente redentor
  lexicon: HALOT
  rationale: '"Redentor" comunica bien el título participial y su carga de salvación y pacto en un registro natural para el español bíblico. "Pariente redentor" sería demasiado específico para un matiz legal no explicitado aquí.'
- source_word: קְדוֹשׁוֹ
  english_pob_choice: his Holy One
  chosen_spanish: su Santo
  alternatives_spanish:
  - su Santo Uno
  - el Santo que le pertenece
  lexicon: HALOT
  rationale: Se preserva el sufijo posesivo con "su" y el sustantivo/adjetivo titular con "Santo". "Su Santo" mantiene la relación gramatical sin resolver interpretivamente si el referente es el mismo Yahvé o el siervo al que se dirige el pasaje.
- source_word: לִבְזֹה נֶפֶשׁ
  english_pob_choice: to one despised in soul
  chosen_spanish: a quien se desprecia en el alma
  alternatives_spanish:
  - al despreciado
  - a quien se desprecia profundamente
  - a quien la gente desprecia
  lexicon: HALOT
  rationale: La construcción hebrea es comprimida y difícil. "A quien se desprecia en el alma" conserva la presencia de נֶפֶשׁ ('alma') y reproduce la dureza del hebreo sin resolver si el énfasis es interior, total o social.
- source_word: לִמְתָעֵב גּוֹי
  english_pob_choice: abhorred by the nation
  chosen_spanish: aborrecido por la nación
  alternatives_spanish:
  - aborrecido por las naciones
  - a quien la nación aborrece
  - repugnante para la nación
  lexicon: HALOT
  rationale: '"Aborrecido por la nación" es natural en español y preserva el pasivo. El singular "nación" puede funcionar colectivamente, como en el inglés auditado, sin forzar una generalización innecesaria.'
- source_word: לְעֶבֶד מֹשְׁלִים
  english_pob_choice: a servant of rulers
  chosen_spanish: siervo de gobernantes
  alternatives_spanish:
  - esclavo de gobernantes
  - siervo de príncipes
  - servidor de gobernantes
  lexicon: HALOT
  rationale: Aunque el POB inglés pasó de "slave" a "servant" por naturalidad contextual, en español "siervo" expresa adecuadamente la sujeción humillante y evita una dureza innecesaria en la lectura pública. "Gobernantes" traduce el plural de מֹשְׁלִים sin perder el sentido de dominio.
- source_word: מְלָכִים יִרְאוּ וָקָמוּ
  english_pob_choice: Kings will see and rise up
  chosen_spanish: Reyes verán y se pondrán de pie
  alternatives_spanish:
  - Reyes verán y se levantarán
  - Reyes lo verán y se alzarán
  lexicon: HALOT
  rationale: '"Ponerse de pie" comunica el gesto de respeto/honor implícito en וָקָמוּ de manera clara en español contemporáneo. Se conserva "verán" sin explicitar el objeto para no añadir contenido no expresado.'
- source_word: שָׂרִים וְיִשְׁתַּחֲוּוּ
  english_pob_choice: princes also, and they will bow down
  chosen_spanish: también príncipes, y se postrarán
  alternatives_spanish:
  - también príncipes, y se inclinarán
  - también oficiales, y se postrarán
  lexicon: HALOT
  rationale: '"Príncipes" es el equivalente más directo de שָׂרִים en registro bíblico. "Se postrarán" conserva la fuerza de השתחוה sin suavizar el gesto de homenaje. Se mantiene la ambigüedad del destinatario del acto de homenaje, como en el audit trail inglés.'
- source_word: לְמַעַן יְהוָה
  english_pob_choice: because of Yahweh
  chosen_spanish: por causa de Yahvé
  alternatives_spanish:
  - a causa de Yahvé
  - por amor de Yahvé
  - en atención a Yahvé
  lexicon: HALOT
  rationale: '"Por causa de" comunica bien la razón causal y suena natural en español. Conserva la relación con Yahvé como fundamento último del homenaje descrito.'
- source_word: אֲשֶׁר נֶאֱמָן
  english_pob_choice: who is faithful
  chosen_spanish: que es fiel
  alternatives_spanish:
  - que es digno de confianza
  - que permanece fiel
  lexicon: HALOT
  rationale: '"Fiel" es la forma más idiomática y teológicamente cargada en español para el atributo de fiabilidad/constancia divina. Mantiene el valor del relativo sin sobreexplicar.'
- source_word: קְדֹשׁ יִשְׂרָאֵל
  english_pob_choice: the Holy One of Israel
  chosen_spanish: el Santo de Israel
  alternatives_spanish:
  - el Santo de Israelíes
  - el Santo perteneciente a Israel
  lexicon: HALOT
  rationale: Se mantiene el título isaiano tradicional y reconocible en español. Es una fórmula estable que conserva la densidad teológica del hebreo.
- source_word: וַיִּבְחָרֶךָּ
  english_pob_choice: who has chosen you
  chosen_spanish: que te ha escogido
  alternatives_spanish:
  - que te escogió
  - y te ha escogido
  lexicon: HALOT
  rationale: '"Te ha escogido" conserva el perfecto y el valor relacional del hebreo dentro de la cadena de títulos divinos. Se evita una traducción demasiado suelta para no perder el enlace con el motivo de la reverencia anterior.'
theological_decisions:
- issue: Referente de "su Santo" (קְדוֹשׁוֹ)
  english_pob_reading: The phrase refers to the servant addressed, not to the LORD himself.
  chosen_spanish_reading: 'La frase se mantiene ambigua de forma controlada: "su Santo" puede oírse como una designación ligada al destinatario sin resolver aquí si refiere al siervo o al propio Yahvé.'
  alternative_spanish_readings:
  - '"su Santo" como título del siervo'
  - '"su Santo" como continuación apposicional de Yahvé'
  rationale: El hebreo y el audit trail inglés señalan una tensión real en el referente. En español conviene no borrar esa tensión con una paráfrasis explicativa; por eso se conserva una forma breve y ambigua que permite la lectura auditada sin imponer una resolución doctrinal desde la traducción.
  doctrine_reference: Preservar la tensión textual y teológica; no resolver la ambigüedad por adelantado.
- issue: Objeto del postrarse de los príncipes
  english_pob_reading: The text leaves the homage directed in relation to the servant because of the LORD, without specifying worship of the servant as divine worship.
  chosen_spanish_reading: '"Se postrarán" se deja sin objeto explícito; el motivo se expresa solo con "por causa de Yahvé".'
  alternative_spanish_readings:
  - se postrarán ante el siervo
  - se postrarán ante Yahvé
  rationale: La sintaxis hebrea permite que el honor se dirija en relación con el siervo, mientras que Yahvé es la razón última. El español conserva esa indeterminación para no resolver dogmáticamente lo que el texto deja abierto.
  doctrine_reference: Preservar la tensión interpretativa; evitar aclaraciones no exigidas por el hebreo.
translation_notes:
  revision_awareness: 'La redacción sigue el estado revisado más reciente del POB inglés: se prefiere un equivalente más natural de עֶבֶד que preserve la humillación contextual sin recurrir a un calco excesivamente duro, y se mantiene la ambigüedad teológica del sintagma "su Santo" y del acto de homenaje. También se respeta la decisión de conservar Yahweh/Yahvé como nombre propio.'
  spanish_consistency_notes:
  - Se usa "Yahvé" para יְהוָה de forma consistente con el proyecto.
  - Se mantiene "Santo de Israel" como título fijo isaiano.
  - Se evita alternar entre "siervo" y "esclavo" dentro del versículo para no introducir oscilación semántica.
  - La puntuación separa el bloque de títulos del discurso profético y preserva el paralelismo de los miembros poéticos.
