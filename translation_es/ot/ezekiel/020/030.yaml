  text: לָ/כֵ֞ן אֱמֹ֣ר אֶל בֵּ֣ית יִשְׂרָאֵ֗ל כֹּ֤ה אָמַר֙ אֲדֹנָ֣/י יְהוִ֔ה הַ/בְּ/דֶ֥רֶךְ אֲבֽוֹתֵי/כֶ֖ם אַתֶּ֣ם נִטְמְאִ֑ים וְ/אַחֲרֵ֥י שִׁקּוּצֵי/הֶ֖ם אַתֶּ֥ם זֹנִֽים׀־׃
