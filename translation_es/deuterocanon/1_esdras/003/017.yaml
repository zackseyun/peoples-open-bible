translation:
  language: es
  text: 'Y les dijeron[a]: «Cuéntennos de lo que está escrito». Entonces el primero, que había hablado acerca de la fuerza del vino[b], comenzó y dijo así:'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'También puede entenderse: «sobre lo que ha sido escrito» o «acerca de los escritos». El griego puede referirse colectivamente a las composiciones presentadas para juicio.'
    reason: lexical_alternative
  - marker: b
    text: 'También: «la potencia del vino» o «el poder del vino». ἰσχύς puede denotar fuerza, vigor o poder.'
    reason: lexical_alternative
lexical_decisions:
- source_word: Ἀπαγγείλατε
  english_pob_choice: Tell / Report
  chosen_spanish: Denos noticia / Den noticias
  alternatives_spanish:
  - Cuéntenos
  - Repórtennos
  - Declaren
  lexicon: LSJ
  rationale: El imperativo plural expresa una solicitud formal dentro de un intercambio argumentativo. «Dennos noticia» conserva el matiz de comunicación solicitada sin sonar mecánico, y evita un tono demasiado coloquial para el contexto.
- source_word: περὶ τῶν γεγραμμένων
  english_pob_choice: about what has been written
  chosen_spanish: de lo que está escrito
  alternatives_spanish:
  - acerca de lo que ha sido escrito
  - sobre los escritos
  - de las cosas escritas
  lexicon: LSJ
  rationale: El participio perfecto pasivo señala algo ya escrito y disponible como referencia. «Lo que está escrito» es natural en español y preserva el valor resultativo sin introducir innecesariamente la idea de autoría.
- source_word: ἤρξατο
  english_pob_choice: began
  chosen_spanish: comenzó
  alternatives_spanish:
  - empezó
  - se puso a
  lexicon: LSJ
  rationale: «Comenzó» es la equivalencia sobria y formal de ἤρξατο, adecuada para una introducción narrativa y más digna que una opción muy coloquial.
- source_word: ὁ πρῶτος
  english_pob_choice: the first
  chosen_spanish: el primero
  alternatives_spanish:
  - el primer participante
  - el primero de ellos
  lexicon: LSJ
  rationale: La sustantivación ordinal se mantiene de forma directa. «El primero» preserva la referencia a la secuencia de hablantes en la disputa.
- source_word: ὁ εἴπας
  english_pob_choice: who had spoken
  chosen_spanish: que había hablado
  alternatives_spanish:
  - que dijo
  - que había dicho
  lexicon: LSJ
  rationale: El participio aoristo identifica al hablante por una intervención previa. «Que había hablado» transmite esa identificación retrospectiva de modo natural en español, sin perder la función atributiva.
- source_word: περὶ τῆς ἰσχύος τοῦ οἴνου
  english_pob_choice: about the strength of wine
  chosen_spanish: acerca de la fuerza del vino
  alternatives_spanish:
  - acerca del poder del vino
  - sobre la fuerza del vino
  - sobre el poder del vino
  lexicon: LSJ
  rationale: ἰσχύς puede significar fuerza, vigor o poder. «Fuerza» mantiene la imagen lexical y evita una abstracción excesiva; «del vino» conserva el genitivo como relación objetiva en español.
- source_word: ἔφη οὕτως
  english_pob_choice: said thus
  chosen_spanish: dijo así
  alternatives_spanish:
  - dijo de este modo
  - habló así
  - dijo de esta manera
  lexicon: LSJ
  rationale: La fórmula introductoria de discurso directo se vierte con una expresión breve y natural. «Dijo así» conserva el valor de οὕτως sin forzar un calco.
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión del inglés POB que prefirió una formulación más natural para la solicitud directa y conservó «said thus» para reflejar οὕτως. En español se siguió esa misma dirección con una petición formal pero idiomática y una clausula narrativa breve.
  spanish_consistency_notes:
  - Se mantiene «Dios/Yahvé» y terminología doctrinal estándar fuera de este versículo, sin aplicar fórmulas eclesiásticas ajenas al texto.
  - Se preserva el registro sobrio y narrativo propio de una escena de debate/judicio.
  - Los dos matices léxicos principales del griego—γεγραμμένων e ἰσχύς—quedan señalados en notas para evitar simplificación indebida.
