lexical_decisions:
- source_word: וַיְהִי
  english_pob_choice: came
  chosen_spanish: vino
  alternatives_spanish:
  - llegó
  - fue
  lexicon: HALOT
  rationale: En la fórmula profética ויהי דבר־יהוה אלי, el verbo funciona idiomáticamente como introducción del mensaje divino. 'Vino' conserva la idea de movimiento hacia el profeta y suena natural en español, sin perder la fórmula estable.
- source_word: דְבַר
  english_pob_choice: the word
  chosen_spanish: la palabra
  alternatives_spanish:
  - el mensaje
  - la palabra de Yahvé
  lexicon: HALOT
  rationale: En este contexto profético, דָּבָר designa el mensaje revelado de Dios. 'La palabra' mantiene la fórmula profética reconocible y evita diluir el peso del término.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  - el SEÑOR
  lexicon: HALOT
  rationale: 'La traducción española sigue el criterio del proyecto para el Tetragrámaton: transliterar el nombre divino como ''Yahvé'', preservando el nombre personal del pacto y no sustituyéndolo por un título.'
- source_word: אֵלַי
  english_pob_choice: to me
  chosen_spanish: a mí
  alternatives_spanish:
  - hasta mí
  - para mí
  lexicon: HALOT
  rationale: La preposición con sufijo indica el destinatario del mensaje profético. 'A mí' es la forma natural y precisa en español.
- source_word: לֵאמֹר
  english_pob_choice: saying
  chosen_spanish: diciendo
  alternatives_spanish:
  - y dijo
  - para decir
  lexicon: HALOT
  rationale: La forma infinitiva introduce el discurso directo. 'Diciendo' conserva el valor de fórmula y prepara la cita siguiente con naturalidad en español.
theological_decisions:
- issue: Uso del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Jehová
  - el SEÑOR
  rationale: El texto hebreo usa explícitamente el Nombre del pacto. La lectura española debe conservar ese nombre propio y no ocultarlo tras una sustitución litúrgica.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Fórmula profética 'la palabra de Yahvé vino a mí'
  english_pob_reading: And the word of Yahweh came to me, saying,
  chosen_spanish_reading: 'Y vino la palabra de Yahvé a mí, diciendo:'
  alternative_spanish_readings:
  - 'La palabra de Yahvé vino a mí, diciendo:'
  - 'Y la palabra de Yahvé vino a mí, diciendo:'
  rationale: La estructura española conserva el carácter formular y oracular del hebreo. El verbo de movimiento 'vino' refleja adecuadamente la llegada del mensaje divino al profeta.
  doctrine_reference: 'DOCTRINE.md: Prophetic formulae and divine speech introductions'
translation_notes:
  revision_awareness: 'Se corrigió el problema anterior: el marcador [a] ahora aparece anclado en el texto principal junto a ''mí''. La formulación se ajusta a la fórmula profética hebrea y mantiene el nombre divino según el criterio del proyecto.'
  spanish_consistency_notes:
  - Se usa 'Yahvé' de manera consistente para יְהוָה.
  - Se prefirió 'vino' frente a un calco más rígido para preservar la fórmula profética en español.
  - '''Diciendo'' funciona como introducción al discurso directo y evita una construcción innecesariamente pesada.'
