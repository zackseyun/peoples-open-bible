  glossary_alignment: 'La terminología está bien alineada con las pautas del proyecto: no hay nombres divinos problemáticos en este versículo; «Altísimo» refleja עֶלְיוֹנִין; «santos» preserva קַדִּישִׁין/קַדִּישֵׁי sin estrechar el referente; «reino» para מַלְכוּתָא y «juicio» para דִּינָא son adecuados. No se detectan conflictos con las decisiones léxicas o teológicas documentadas, aparte del problema de ubicación de la nota [b].'
