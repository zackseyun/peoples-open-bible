  rationale: Se recomienda una revisión menor para ajustar mejor la fuerza de לְכַלֵּא a la decisión auditada del POB en inglés y evitar un giro español algo más interpretativo. También se mejora la naturalidad de la nota d sin cerrar la ambigüedad teológica del hebreo.
