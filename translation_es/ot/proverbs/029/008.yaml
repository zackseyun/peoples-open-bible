revisions:
- from: Los hombres de burla inflaman una ciudad[a][b], pero los sabios apartan la ira.
  to: Los burladores inflaman[a][b] una ciudad, pero los sabios apartan la ira.
  rationale: Se reemplaza la expresión poco natural «los hombres de burla» por «los burladores», que comunica con claridad el sentido de אַנְשֵׁי לָצוֹן en un español bíblico natural. Se mantienen «inflaman», «una ciudad», «los sabios» y «apartan la ira» por su fidelidad y buena legibilidad. También se corrigen los anclajes de las notas para que recaigan sobre el verbo comentado.
