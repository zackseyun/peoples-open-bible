revisions:
- from: Y todo aquello sobre lo cual se acueste durante su impureza menstrual[a] será inmundo, y todo aquello sobre lo cual se siente será inmundo.
  to: Y todo aquello en que se acueste en su impureza menstrual[a] será inmundo, y todo aquello en que se siente será inmundo.
  rationale: Se ajusta la sintaxis para un español más natural y eclesialmente legible, sin alterar el sentido fuente ni las decisiones léxicas clave. «En que» evita una construcción demasiado dura, y «en su impureza menstrual» expresa mejor el estado ritual indicado por el hebreo.
