review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien la estructura condicional y el sentido legal del hebreo: contraste con el caso anterior, imagen concreta de ''si el sol ha salido sobre él'', obligación enfática de restitución, y venta del ladrón como remedio de deuda si carece de medios. Sin embargo, el punto clave דָּמִים לוֹ está mal resuelto en el texto principal: «hay sangre sobre él» suena a calco ambiguo y puede sugerir sangre física sobre el ladrón, mientras el hebreo en contexto legal significa responsabilidad/culpa de sangre para quien lo mata en esas circunstancias. El English POB ya fijó ''bloodguilt'', y el español debe reflejar ese valor jurídico en el texto, no solo en nota.'
  spanish_quality_summary: El español es generalmente claro y digno, pero «hay sangre sobre él» no es natural ni suficientemente inteligible en español bíblico moderno. «Ciertamente deberá hacer restitución» es aceptable, aunque más natural es «sin falta deberá hacer restitución» o simplemente «deberá hacer restitución». «Por su robo» funciona, pero «por su hurto» sería algo más jurídico; no es necesario cambiarlo. Conviene también pulir las notas para quitar comillas externas innecesarias y mantener estilo limpio.
  glossary_alignment: 'No hay conflicto con los términos globales principales del proyecto. La decisión clave aquí es léxico jurídico: דָּמִים debe expresarse como «culpa de sangre» o «responsabilidad de sangre», no como «sangre» desnuda. El resto de las elecciones principales son compatibles con el expediente inglés y con un español eclesial legible.'
  issues:
  - severity: high
    issue: «hay sangre sobre él» no transmite adecuadamente דָּמִים לוֹ
    rationale: En este contexto legal, דמים denota culpa o responsabilidad de sangre. El calco propuesto es ambiguo y poco idiomático en español; puede malentenderse como descripción física o como culpa del intruso, cuando el sentido es que matar al ladrón de día acarrea culpa de sangre.
  - severity: medium
    issue: La nota b corrige demasiado lo que el texto principal deja oscuro
    rationale: La aclaración jurídica está en la nota, pero el texto principal debería ya comunicar el sentido básico. Las notas deben complementar, no rescatar una formulación principal deficiente.
  - severity: low
    issue: Estilo de la nota a con comillas externas innecesarias
    rationale: La nota empieza con una comilla de apertura que engloba toda la nota; en español editorial limpio basta con presentar las alternativas entre comillas angulares o latinas sin comillas envolventes adicionales.
  revised_spanish_text: Pero si el sol ya ha salido sobre él[a], hay culpa de sangre[b]. Sin falta deberá hacer restitución. Si no tiene nada[c], será vendido por su robo.
