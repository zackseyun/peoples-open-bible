  to: Y su ofrenda fue un plato[a] de plata, con un peso de ciento treinta siclos; un cuenco[b] de plata de setenta siclos, según el siclo del santuario; ambos estaban llenos de flor de harina mezclada con aceite, para ofrenda de grano.
