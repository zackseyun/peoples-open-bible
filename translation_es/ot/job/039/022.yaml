translation:
  language: es
  text: Él se ríe del miedo[a] y no se espanta, y no retrocede ante la espada[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «se burla del miedo». El verbo hebreo puede llevar un matiz de derisión además de risa.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «no se vuelve atrás ante la espada».'
    reason: lexical_alternative
lexical_decisions:
- source_word: יִשְׂחַק
  english_pob_choice: laughs
  chosen_spanish: se ríe
  alternatives_spanish:
  - se burla
  - se mofa
  lexicon: HALOT
  rationale: El verbo qal aquí expresa una reacción desafiante ante el peligro. «Se ríe» conserva la imagen vívida de la risa y permite incluir la posible nuance de derisión; «se burla» o «se mofa» intensifican esa idea, pero son más interpretativos.
- source_word: לְפַחַד
  english_pob_choice: at fear
  chosen_spanish: del miedo
  alternatives_spanish:
  - del temor
  - del terror
  lexicon: HALOT
  rationale: פחד puede significar miedo, temor o terror. «Del miedo» es claro y natural en español, y mantiene la brevedad de la construcción hebrea sin aumentar la intensidad.
- source_word: יֵחָת
  english_pob_choice: is dismayed
  chosen_spanish: se espanta
  alternatives_spanish:
  - se desalienta
  - queda aterrorizado
  - se quebranta
  lexicon: HALOT
  rationale: En el niphal de חתת la idea puede ir de quedar quebrantado a desanimarse o aterrarse. «Se espanta» comunica bien la reacción emocional en este contexto de guerra; «se desalienta» debilita el matiz y «se quebranta» sería más literal pero menos idiomático.
- source_word: יָשׁוּב
  english_pob_choice: turn back
  chosen_spanish: vuelve la espalda
  alternatives_spanish:
  - retrocede
  - se vuelve atrás
  lexicon: HALOT
  rationale: שוב literalmente es «volver/volver atrás». En español, «vuelve la espalda» transmite de manera natural la idea de retirarse ante el peligro y conserva la imagen de no ceder.
- source_word: מִפְּנֵי
  english_pob_choice: from
  chosen_spanish: ante
  alternatives_spanish:
  - de
  - frente a
  lexicon: HALOT
  rationale: La expresión idiomática מִפְּנֵי puede indicar «delante de» o «ante». Aquí, con una amenaza hostil, «ante la espada» expresa bien la idea de retirarse en presencia del peligro.
- source_word: חָרֶב
  english_pob_choice: the sword
  chosen_spanish: la espada
  alternatives_spanish:
  - una espada
  lexicon: HALOT
  rationale: חֶרֶב es singular, pero funciona como imagen representativa del combate. «La espada» conserva esa fuerza general y corresponde al uso tradicional de la imagen bélica.
translation_notes:
  revision_awareness: Se corrigió el fallo anterior anclando ambos marcadores de nota directamente en el texto español. La redacción busca mantener la imaginería bélica y el matiz de derisión/laughing del hebreo, sin depender mecánicamente del inglés.
  spanish_consistency_notes:
  - Se conservó la fuerza verbal de שׂחק con «se ríe», dejando la derisión como alternativa en nota.
  - «Se espanta» evita la paráfrasis doctrinal y corresponde al campo semántico de חתת en contexto bélico.
  - «Vuelve la espalda» traduce el gesto de retirada con un español natural, en lugar de un calco rígido.
  - No hay decisión teológica específica en este versículo; el registro se limita a imágenes de valor y temor.
