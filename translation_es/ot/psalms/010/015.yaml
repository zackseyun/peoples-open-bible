  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien la estructura básica del hebreo: imperativo dirigido a Dios, conservación de la imagen de «brazo», y la secuencia de buscar la maldad hasta que no se halle. Sin embargo, el anclaje de la nota [a] en «malvado» no corresponde bien a la alternativa documentada, que afecta a la relación entre «malvado» y «hombre perverso» como dos descriptores/miembros paralelos. Además, «hasta que no halles nada» es comprensible, pero en español puede sonar ligeramente menos preciso que «hasta que no halles ninguna» o «hasta que no encuentres nada de ella» respecto al antecedente de la maldad. Aun así, el sentido principal está bien preservado.'
  spanish_quality_summary: 'El texto es legible y digno. «Quebranta el brazo» suena natural en registro bíblico moderno. «Busca su maldad» es fiel, aunque algo escueto; funciona bien en contexto. La principal mejora necesaria es de presentación y precisión: mover la nota al sintagma pertinente y suavizar una posible ambigüedad referencial en el cierre.'
  glossary_alignment: No hay conflictos con la terminología del proyecto. No aparecen Yahvé, Mesías, δοῦλος, etc. Las decisiones «brazo», «malvado», «maldad» y el mantenimiento del imperativo son coherentes con el expediente inglés y con la filosofía de preservar imágenes concretas.
  issues:
  - severity: medium
    issue: La nota [a] está anclada en «malvado», pero la alternativa afecta a toda la coordinación «el malvado y el hombre perverso».
    rationale: La nota explica una lectura alternativa de la relación entre los dos descriptores personales; por eso debe anclarse en la frase coordinada, no solo en el primer sustantivo.
  - severity: low
    issue: «Hasta que no halles nada» puede dejar el referente de «nada» algo implícito.
    rationale: El hebreo se refiere a la maldad del impío; una formulación como «hasta que no halles ninguna» mantiene mejor el referente femenino implícito («maldad») en español.
  revised_spanish_text: Quebranta el brazo del malvado y del hombre perverso[a]; busca su maldad hasta que no halles ninguna.
