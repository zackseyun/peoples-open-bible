translation:
  language: es
  text: 'diciendo[a]: «De ti es la victoria, y de ti es la sabiduría, y tuya es la gloria, y yo soy tu siervo[b]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Diciendo» conserva el participio griego; puede entenderse también como «y dijo».
    reason: lexical_alternative
  - marker: b
    text: O «sirviente de tu casa»; el término griego también puede tener el sentido más fuerte de «esclavo».
    reason: lexical_alternative
lexical_decisions:
- source_word: λέγων
  english_pob_choice: saying
  chosen_spanish: diciendo
  alternatives_spanish:
  - y dijo
  lexicon: LSJ
  rationale: El participio presente introductorio se conserva naturalmente con «diciendo», manteniendo la relación sintáctica con la cita directa sin forzar una forma finita innecesaria.
- source_word: Παρὰ σοῦ
  english_pob_choice: From you
  chosen_spanish: De ti
  alternatives_spanish:
  - De parte de ti
  - Procede de ti
  lexicon: LSJ
  rationale: En este contexto doxológico, παρά con genitivo expresa origen o procedencia. «De ti» comunica con claridad que la victoria y la sabiduría provienen del destinatario.
- source_word: νίκη
  english_pob_choice: victory
  chosen_spanish: victoria
  alternatives_spanish:
  - triunfo
  lexicon: LSJ
  rationale: νίκη denota victoria de manera directa. «Victoria» es la equivalencia más natural y transparente en español.
- source_word: σοφία
  english_pob_choice: wisdom
  chosen_spanish: sabiduría
  alternatives_spanish:
  - prudencia
  - entendimiento
  lexicon: LSJ
  rationale: σοφία normalmente significa sabiduría; no hay presión contextual para restringirla a habilidad técnica o entendimiento especializado.
- source_word: σὴ ἡ δόξα
  english_pob_choice: yours is the glory
  chosen_spanish: tuya es la gloria
  alternatives_spanish:
  - la gloria es tuya
  - tu es la gloria
  lexicon: LSJ
  rationale: La construcción posesiva enfática se reproduce en español con «tuya es la gloria», que conserva la fuerza del original y suena idiomática.
- source_word: οἰκέτης
  english_pob_choice: servant
  chosen_spanish: esclavo
  alternatives_spanish:
  - siervo
  - sirviente
  - criado
  - servidor doméstico
  lexicon: LSJ
  rationale: οἰκέτης designa propiamente a un servidor de casa y puede abarcar un esclavo doméstico. Dado que el POB inglés preserva la posibilidad más fuerte («slave») como nota lexical, en español se elige «esclavo» para no debilitar el rango semántico ni suavizar la autohumillación del hablante.
theological_decisions:
- issue: Autoidentificación servil ante Dios
  english_pob_reading: I am your servant (with lexical possibility of slave/household servant)
  chosen_spanish_reading: yo soy tu esclavo
  alternative_spanish_readings:
  - yo soy tu siervo
  - yo soy tu servidor doméstico
  rationale: El griego οἰκέτης permite un sentido de dependencia vinculada al hogar y también un matiz más fuerte de esclavitud. Para no borrar esa tensión semántica, se conserva «esclavo» en el texto principal; la alternativa más suave queda implícita en las decisiones léxicas.
  doctrine_reference: 'DOCTRINE.md: δοῦλος servant / slave (context-dependent); preservation of lexical force and documented tension'
translation_notes:
  revision_awareness: 'El texto sigue de cerca el griego de Swete LXX 1909 y respeta el audit trail en inglés: παρά con genitivo como procedencia («de ti»), νίκη como «victoria», σοφία como «sabiduría», la posesión enfática de δόξα como «tuya es la gloria», y οἰκέτης con su rango lexical completo. Se adoptó una opción más fuerte que la inglesa en οἰκέτης para no perder la tensión esclavo/siervo que el propio expediente documenta.'
  spanish_consistency_notes:
  - Se usa «sabiduría» y no «sapiencia» para mantener la transparencia léxica y el registro bíblico natural.
  - «Tuya es la gloria» conserva el énfasis posesivo del griego sin invertir el orden de manera artificial.
  - El vocativo implícito del griego queda reflejado en una cita directa sobria y fluida en español.
  - Se evita «Señor» porque el versículo no contiene κύριος ni una forma que requiera ese reemplazo.
