    rationale: 'El texto principal dice «habían sido derrotadas», pero la nota dice «O “habían vuelto atrás” o “habían sido derrotadas”». Las alternativas deben distinguirse del texto principal y reflejar el abanico lexical documentado en inglés: ''had turned back'' / ''had been defeated'' frente al principal ''had been routed''.'
  - severity: low
    issue: El matiz militar de τετρόπωνται podría expresarse con más precisión en español.
    rationale: La decisión inglesa principal fue 'had been routed'. En español, «habían sido puestas en fuga» o «habían sido derrotadas y puestas en fuga» se acerca más que «habían sido derrotadas» al valor de ser rechazadas o dispersadas. No es un error grave, pero sí una mejora fiel al audit trail.
  revised_spanish_text: Y llegó uno a informarle en Persia que las fuerzas que habían ido a la tierra de Judá habían sido puestas en fuga[a][b].
