  source_alignment_summary: 'El borrador español refleja fielmente el sentido del hebreo: la pregunta desafiante de Faraón, el valor obediencial de שׁמע בקולו, la preservación de «Yahvé» para יהוה, y la negativa reforzada final. La estructura general y las decisiones léxicas siguen bien la auditoría inglesa.'
  spanish_quality_summary: 'El español es claro y digno, pero la nota al pie actual genera un problema interno: presenta «Yahvé» como alternativa cuando ya es la forma usada en el texto. Conviene ajustar la nota para evitar esa incoherencia. El resto del versículo suena natural y bien leído en español bíblico contemporáneo.'
  glossary_alignment: 'Alineación buena con la terminología del proyecto: יהוה → «Yahvé» correctamente; no hay conflictos con otros términos doctrinales clave. La única corrección necesaria es en la formulación de la nota sobre el Tetragrámaton.'
  issues:
  - severity: medium
    issue: La nota al pie enumera «Yahvé» como alternativa aunque esa es precisamente la forma adoptada en el texto principal.
    rationale: Esto contradice la propia decisión léxica y puede confundir al lector sobre cuál es la lectura elegida frente a las alternativas reales. La nota debe dejar claro que el hebreo tiene «YHWH», que tradicionalmente se vierte «el SEÑOR», y que otra alternativa española histórica es «Jehová».
  revised_spanish_text: 'Faraón dijo[a]: «¿Quién es Yahvé, para que yo obedezca su voz y deje ir a Israel? No conozco a Yahvé, y además no dejaré ir a Israel».'
  revised_footnotes:
