translation:
  language: es
  text: Porque ellos son tu pueblo y tu heredad[a], a quienes sacaste de Egipto[b], de en medio del horno de hierro.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «tu posesión» o «tu herencia» para «tu heredad».
    reason: lexical_alternative
  - marker: b
    text: «El horno de hierro» es una metáfora para Egipto como lugar de intensa opresión y aflicción; compárese Deuteronomio 4:20.
    reason: cross_reference
lexical_decisions:
- source_word: עַמְּךָ
  english_pob_choice: your people
  chosen_spanish: tu pueblo
  alternatives_spanish:
  - tu gente
  lexicon: HALOT
  rationale: «Pueblo» es el equivalente natural y bíblico para la designación de Israel como comunidad pactal de Dios. Mantiene el valor relacional sin suavizarlo a un término menos preciso como «gente».
- source_word: וְנַחֲלָתְךָ
  english_pob_choice: your inheritance
  chosen_spanish: tu heredad
  alternatives_spanish:
  - tu herencia
  - tu posesión
  lexicon: HALOT
  rationale: «Heredad» conserva en español el matiz de posesión adjudicada, corporativa y pactal, cercano a «inheritance» en el POB inglés. «Herencia» puede sonar más abstracta o patrimonial; «posesión» pierde la resonancia covenantal.
- source_word: הֵם
  english_pob_choice: they are
  chosen_spanish: son
  alternatives_spanish:
  - ellos son
  lexicon: HALOT
  rationale: En español el verbo copulativo ya expresa la relación predicativa; no hace falta conservar el pronombre explícito para una lectura más fluida y natural.
- source_word: אֲשֶׁר
  english_pob_choice: whom
  chosen_spanish: a quienes
  alternatives_spanish:
  - que
  lexicon: HALOT
  rationale: Como el relativo remite a personas, «a quienes» refleja mejor la función personal del pronombre que un simple «que». Además evita ambigüedad sintáctica en español.
- source_word: הוֹצֵאתָ
  english_pob_choice: you brought out
  chosen_spanish: sacaste
  alternatives_spanish:
  - trajiste afuera
  - hiciste salir
  lexicon: HALOT
  rationale: «Sacaste» expresa con naturalidad el sentido causativo del éxodo en español y preserva el valor de liberación histórica. «Hiciste salir» sería más literal pero menos idiomático.
- source_word: מִמִּצְרַיִם
  english_pob_choice: out of Egypt
  chosen_spanish: de Egipto
  alternatives_spanish:
  - desde Egipto
  lexicon: HALOT
  rationale: Con el verbo de extracción/liberación en español, «de Egipto» comunica adecuadamente el origen del éxodo sin sobrecargar la frase. La fuerza direccional queda reforzada por el complemento siguiente.
- source_word: מִתּוֹךְ
  english_pob_choice: out of the midst of
  chosen_spanish: de en medio de
  alternatives_spanish:
  - de entre
  - desde dentro de
  lexicon: HALOT
  rationale: «De en medio de» es la manera más natural de conservar la imagen espacial de emergencia desde el interior de algo, sin diluirla en un mero «de».
- source_word: כּוּר הַבַּרְזֶל
  english_pob_choice: the iron furnace
  chosen_spanish: el horno de hierro
  alternatives_spanish:
  - el horno ferrífero
  - el horno de fundición de hierro
  lexicon: HALOT
  rationale: En español bíblico y moderno, «horno de hierro» transmite bien la metáfora de opresión intensa sin explicar de más. «Horno de fundición de hierro» sería más técnico, pero menos ágil y más interpretativo.
theological_decisions:
- issue: Designación pactal de Israel como propiedad/heredad de Yahvé
  english_pob_reading: Retain 'your inheritance' in the main text
  chosen_spanish_reading: Mantener «tu heredad» en el texto principal
  alternative_spanish_readings:
  - tu herencia
  - tu posesión
  rationale: El hebreo נַחֲלָה comunica una pertenencia adjudicada por pacto. «Heredad» conserva mejor esa carga teológica en español que «posesión», y evita que «herencia» se entienda solo como transmisión patrimonial humana.
  doctrine_reference: Translation philosophy §§1, 5
- issue: Metáfora del «horno de hierro» aplicada a Egipto
  english_pob_reading: '''The iron furnace'' is a metaphor for Egypt as a place of intense oppression and affliction; compare Deuteronomy 4:20.'
  chosen_spanish_reading: Mantener la metáfora en el texto y explicarla en nota
  alternative_spanish_readings:
  - el horno de hierro como imagen de esclavitud y aflicción
  - el horno de fundición de hierro
  rationale: El texto hebreo usa una imagen deliberadamente vívida. Traducirla literalmente preserva la tensión metafórica; la aclaración en nota evita que se lea como una descripción técnica de un horno físico.
  doctrine_reference: Deuteronomy 4:20; Translation philosophy §§1, 5
translation_notes:
  revision_awareness: El borrador sigue de cerca el sentido del hebreo WLC y el auditorio inglés de POB, sin depender mecánicamente de la redacción inglesa. Se conservó la estructura argumentativa del versículo, la designación pactal de Israel y la metáfora del «horno de hierro», con decisiones españolas ajustadas a naturalidad y precisión lexical.
  spanish_consistency_notes:
  - Se usa «Yahvé» como norma general en el proyecto, pero en este versículo no aparece el Tetragrámaton explícito en el texto hebreo citado.
  - «Heredad» se mantiene como opción principal para נַחֲלָה por su resonancia pactal; las alternativas se documentan en nota.
  - La imagen de movimiento («sacaste», «de en medio de») conserva la fuerza del éxodo sin añadir glosa al cuerpo del texto.
  - El pronombre relativo se adapta a español con concordancia personal («a quienes») para claridad y fidelidad semántica.
