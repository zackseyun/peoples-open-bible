translation:
  language: es
  text: El que esté lejos morirá por la peste, y el que esté cerca caerá por la espada; y el que quede y esté asediado[a] morirá por hambre. Y agotaré mi ira[b] sobre ellos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: ''el que quede y esté encerrado''; el hebreo también puede denotar a alguien cercado bajo sitio, lo cual encaja con el ''hambre'' que sigue.'
    reason: lexical_alternative
  - marker: b
    text: 'O: ''consumiré mi ira sobre ellos''. El verbo hebreo comunica llevar la ira al cumplimiento total en juicio.'
    reason: lexical_alternative
lexical_decisions:
- source_word: הָרָחוֹק
  english_pob_choice: the one far away
  chosen_spanish: el que esté lejos
  alternatives_spanish:
  - el lejano
  - el que está lejos
  lexicon: HALOT
  rationale: El hebreo usa un adjetivo sustantivado en singular; en español, una relativa con subjuntivo mantiene bien el valor individualizante y suena natural en un anuncio profético.
- source_word: בַּדֶּבֶר
  english_pob_choice: by pestilence
  chosen_spanish: por la peste
  alternatives_spanish:
  - por la pestilencia
  - por la plaga
  lexicon: HALOT
  rationale: דֶּבֶר designa una calamidad de juicio que en español se expresa con claridad como 'peste' o 'plaga'. 'Peste' conserva el tono grave y la fuerza de castigo, y funciona bien con la construcción instrumental.
- source_word: הַקָּרוֹב
  english_pob_choice: the one nearby
  chosen_spanish: el que esté cerca
  alternatives_spanish:
  - el cercano
  - el que está cerca
  lexicon: HALOT
  rationale: Se conserva el paralelo con 'el que esté lejos' y la oposición espacial del hebreo sin volverlo rígidamente literal.
- source_word: בַּחֶרֶב
  english_pob_choice: by the sword
  chosen_spanish: por la espada
  alternatives_spanish:
  - a espada
  - con la espada
  lexicon: HALOT
  rationale: La imagen hebrea de muerte violenta por espada se mantiene de forma directa y natural en español.
- source_word: יִפּוֹל
  english_pob_choice: will fall
  chosen_spanish: caerá
  alternatives_spanish:
  - será derribado
  - se desplomará
  lexicon: HALOT
  rationale: '''Caerá'' reproduce la metáfora hebrea de caer en combate o bajo juicio sin explicar de más el modo de la muerte.'
- source_word: הַנִּשְׁאָר
  english_pob_choice: the one left
  chosen_spanish: el que quede
  alternatives_spanish:
  - el restante
  - el que permanezca
  lexicon: HALOT
  rationale: El participio pasivo singular se expresa de manera natural con una relativa futura/subjuntiva; conserva la idea de alguien que ha quedado después de los otros juicios.
- source_word: הַנָּצוּר
  english_pob_choice: besieged
  chosen_spanish: cercado
  alternatives_spanish:
  - asediado
  - sitado
  - encerrado
  lexicon: HALOT
  rationale: Aunque el término puede entenderse como 'shut up' o 'hemmed in', el contexto inmediato de hambre en sitio favorece 'cercado', que preserva la tensión lexical y la relación con el hambre sin imponer una sola glosa estrecha.
- source_word: בָּרָעָב
  english_pob_choice: by famine
  chosen_spanish: por el hambre
  alternatives_spanish:
  - por el hambre extrema
  - por la hambruna
  lexicon: HALOT
  rationale: '''Hambre'' comunica de forma clara la calamidad de escasez alimentaria; evita un término más técnico que podría sonar menos inmediato en español bíblico.'
- source_word: וְכִלֵּיתִי
  english_pob_choice: I will spend
  chosen_spanish: acabaré con
  alternatives_spanish:
  - consumiré
  - agotaré
  - derramaré plenamente
  lexicon: HALOT
  rationale: כלה con 'mi ira' expresa llevar la ira a su término completo. 'Acabaré con' captura la consumación del juicio en español natural y mantiene la fuerza verbal sin suavizarla.
- source_word: חֲמָתִי
  english_pob_choice: my wrath
  chosen_spanish: mi ira
  alternatives_spanish:
  - mi furor
  - mi cólera
  lexicon: HALOT
  rationale: חֵמָה puede ser 'ira' o 'furor'; 'ira' es amplio, digno y claro en español, y permite que la frase final suene natural sin perder la severidad del juicio.
- source_word: בָּם
  english_pob_choice: on them
  chosen_spanish: sobre ellos
  alternatives_spanish:
  - contra ellos
  - en ellos
  lexicon: HALOT
  rationale: Con verbos de juicio, 'sobre ellos' conserva mejor el sentido de la ira ejecutada encima de los destinatarios, evitando una formulación demasiado abstracta.
theological_decisions:
- issue: Mantener el lenguaje de juicio divino sin atenuarlo
  english_pob_reading: I will spend my wrath on them
  chosen_spanish_reading: Y acabaré con mi ira sobre ellos
  alternative_spanish_readings:
  - Y agotaré mi furor sobre ellos
  - Y derramaré plenamente mi ira sobre ellos
  rationale: El hebreo presenta una sentencia de juicio consumado. La versión española conserva la severidad y el carácter conclusivo del acto divino, sin introducir categorías doctrinales ajenas al pasaje.
  doctrine_reference: Translation philosophy §§1, 3, 6
- issue: El valor de הַנָּצוּר en el contexto de sitio y hambre
  english_pob_reading: the one left and besieged
  chosen_spanish_reading: el que quede y esté cercado
  alternative_spanish_readings:
  - el que quede y esté asediado
  - el que quede y esté encerrado
  rationale: La secuencia de hambre junto con el participio sugiere alguien cercado por un sitio. 'Cercado' conserva la tensión semántica y el vínculo con el hambre, sin borrar la posible lectura alternativa de 'encerrado/puesto a salvo' que el inglés POB ya anotó.
  doctrine_reference: Translation philosophy §§1, 6
translation_notes:
  revision_awareness: 'El pasaje coincide estrechamente con la revisión final del POB en inglés (estado de alta concordancia, sin cambios recientes). La redacción española sigue esa lectura estable: triplete distributivo de muerte por peste/espada/hambre, más la clausula final de consumación de la ira divina.'
  spanish_consistency_notes:
  - Se mantiene el patrón distributivo singular ('el que...') para reflejar la sintaxis hebrea individualizante.
  - 'Se conserva la tríada de juicio con términos concretos: peste, espada, hambre.'
  - Se evita 'SEÑOR' o eufemismos por 'Yahvé' aquí porque el versículo no contiene el Tetragrámaton; el sujeto es la primera persona divina implícita en el verbo final.
  - '''Ira'' se usa de manera consistente para חֵמָה en esta línea, manteniendo registro bíblico sobrio en español.'
