translation:
  language: es
  text: ¡Canten alabanzas a Yahvé con la lira[a], con la lira y el sonido del canto[b]!
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebreo kinnor, un antiguo instrumento de cuerdas; tradicionalmente, 'arpa'.
    reason: lexical_alternative
  - marker: b
    text: 'O: ''y la voz de la melodía''.'
    reason: lexical_alternative
lexical_decisions:
- source_word: זַמְּרוּ
  english_pob_choice: Sing praises
  chosen_spanish: Canten alabanzas
  alternatives_spanish:
  - Canten
  - Toquen alabanzas
  lexicon: HALOT
  rationale: El imperativo pi'el plural de זמר expresa cantar en alabanza musical. En español, 'canten alabanzas' conserva el matiz de alabanza y mantiene un tono natural y digno; 'canten' solo sería demasiado general.
- source_word: לַיהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: El texto hebreo usa el Tetragrámaton directamente. Según la terminología del proyecto, se traduce como 'Yahvé' y no se sustituye por una convención de ocultamiento. 'Yahvé' es el equivalente español coherente con el nombre divino revelado.
- source_word: בְּכִנּוֹר
  english_pob_choice: with the lyre
  chosen_spanish: con el arpa
  alternatives_spanish:
  - con la lira
  - con el lyre
  lexicon: HALOT
  rationale: כִנּוֹר es un instrumento de cuerdas antiguo; en español bíblico, 'arpa' es la opción más reconocible y tradicional. Aunque 'lira' es más técnica, puede sonar menos natural para lectores generales; aquí se prioriza legibilidad sin perder el referente instrumental.
- source_word: וְקוֹל זִמְרָה
  english_pob_choice: and the sound of song
  chosen_spanish: y el sonido de la canción
  alternatives_spanish:
  - y la voz de la melodía
  - y el sonido del canto
  - y la voz de la canción
  lexicon: HALOT
  rationale: קוֹל significa 'sonido' o 'voz', y זִמְרָה denota canto/melodía/música. 'El sonido de la canción' conserva la imagen auditiva concreta y la relación de constructo sin forzar un giro demasiado literal en español.
theological_decisions:
- issue: Nombre divino YHWH / יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: El versículo emplea el nombre del pacto de Dios, no un título genérico. En español, 'Yahvé' preserva esa distinción y evita el reemplazo litúrgico que ocultaría el dato textual hebreo.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
translation_notes:
  revision_awareness: El audit trail en inglés no requirió revisiones finales; el borrador español sigue la misma lectura textual y conserva el paralelismo hebreo con una equivalencia natural en español.
  spanish_consistency_notes:
  - Se mantuvo 'Yahvé' como forma estándar del nombre divino en el texto principal, en coherencia con las directrices del proyecto.
  - Se conservó la repetición de 'con el arpa' para reflejar el paralelismo hebreo entre los dos miembros del versículo.
  - Se eligió una formulación audible y litúrgicamente usable, evitando una literalidad que sonara forzada en español.
