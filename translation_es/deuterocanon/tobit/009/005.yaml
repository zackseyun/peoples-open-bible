translation:
  language: es
  text: Entonces Rafael fue y se hospedó con Gabael[a], y le entregó la nota escrita[b]; entonces Gabael sacó las bolsas de dinero con los sellos y se las dio.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «en casa de Gabael». La preposición griega παρά con persona puede indicar estancia con alguien o en su casa.
    reason: lexical_alternative
  - marker: b
    text: O «el pagaré» o «la nota de obligación». El griego χειρόγραφον puede referirse a un documento escrito de deuda o reconocimiento financiero.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐπορεύθη
  english_pob_choice: went
  chosen_spanish: fue
  alternatives_spanish:
  - partió
  - se fue
  lexicon: BDAG
  rationale: El aoristo narrativo de πορεύομαι expresa movimiento simple. «Fue» mantiene la sobriedad narrativa y suena natural en español.
- source_word: ηὐλίσθη
  english_pob_choice: lodged
  chosen_spanish: se hospedó
  alternatives_spanish:
  - se alojó
  - pasó la noche
  lexicon: LSJ
  rationale: αὐλίζομαι puede significar hospedarse o pasar la noche. «Se hospedó» preserva el matiz de estancia temporal durante un viaje sin sobredesarrollar el texto.
- source_word: παρὰ Γαβαήλ
  english_pob_choice: with Gabael
  chosen_spanish: con Gabael
  alternatives_spanish:
  - en casa de Gabael
  - junto a Gabael
  lexicon: BDAG
  rationale: Con persona, παρά indica cercanía o estancia con alguien. «Con Gabael» es breve, idiomático y fiel al sentido relacional del griego.
- source_word: τὸ χειρόγραφον
  english_pob_choice: the written note
  chosen_spanish: el documento escrito
  alternatives_spanish:
  - la nota escrita
  - el pagaré
  - el bono
  lexicon: BDAG
  rationale: χειρόγραφον designa un escrito, a menudo un reconocimiento de deuda o documento financiero. «Documento escrito» conserva la generalidad del término sin forzar un tecnicismo que el contexto inmediato no exige.
- source_word: προήνεγκεν
  english_pob_choice: brought out
  chosen_spanish: sacó
  alternatives_spanish:
  - trajo
  - presentó
  lexicon: BDAG
  rationale: El verbo describe sacar algo hacia afuera en respuesta a la documentación. «Sacó» comunica la acción concreta y fluida en español.
- source_word: τὰ θυλάκια
  english_pob_choice: the money bags
  chosen_spanish: las bolsas de dinero
  alternatives_spanish:
  - las bolsas
  - las talegas
  - las bolsas pequeñas
  lexicon: LSJ
  rationale: θυλάκιον es una bolsa o saquito. Dado el contexto de fondos depositados, «bolsas de dinero» explicita su función sin añadir más de lo que el relato implica.
- source_word: ἐν ταῖς σφραγῖσιν
  english_pob_choice: with the seals
  chosen_spanish: con los sellos
  alternatives_spanish:
  - todavía selladas
  - bajo sello
  - con sus sellos
  lexicon: BDAG
  rationale: La frase indica que las bolsas conservaban los sellos intactos. «Con los sellos» sigue de cerca el griego y evita interpretar de más, aunque el sentido narrativo sea que estaban selladas.
- source_word: ἔδωκεν αὐτῷ
  english_pob_choice: gave them to him
  chosen_spanish: se las dio
  alternatives_spanish:
  - se las entregó
  - las dio a él
  lexicon: BDAG
  rationale: El objeto directo está elíptico en griego pero es claro por contexto. En español, «se las dio» recupera naturalmente las bolsas de dinero como referente implícito.
translation_notes:
  revision_awareness: 'La versión española sigue el último estado del audit trail en inglés: «with the seals» en lugar de «with their seals». Mantiene también la decisión de traducir τὸ χειρόγραφον de forma amplia y no técnica, y refleja la elipsis final mediante un clítico español natural.'
  spanish_consistency_notes:
  - Se usa «Rafael» para Ῥαφαήλ y «Gabael» para Γαβαήλ, conforme al expediente en inglés.
  - Se preserva la relación concreta de estancia con «con Gabael», sin convertirla en una localización más específica que el griego no obliga.
  - «Documento escrito» evita importar un tecnicismo jurídico que el texto no explicita; la nota conserva la alternativa financiera.
  - «Con los sellos» sigue la revisión inglesa más reciente y conserva la imagen concreta de las bolsas selladas.
  - La finalización «se las dio» resuelve la referencia implícita al objeto plural de manera idiomática en español.
