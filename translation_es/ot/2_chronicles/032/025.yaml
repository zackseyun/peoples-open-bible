translation:
  language: es
  text: Pero Ezequías no retribuyó conforme al beneficio[a] que se le había hecho, porque su corazón se enalteció; por eso vino sobre él ira, y sobre Judá y Jerusalén.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «la bondad mostrada hacia él». La expresión hebrea alude ampliamente a hacer una respuesta adecuada por el bien recibido.
    reason: lexical_alternative
lexical_decisions:
- source_word: כִגְמֻל עָלָיו
  english_pob_choice: according to the benefit done to him
  chosen_spanish: conforme al beneficio que se le había hecho
  alternatives_spanish:
  - conforme a la bondad mostrada hacia él
  - según el bien recibido por él
  - de acuerdo con el beneficio hecho para él
  lexicon: HALOT
  rationale: גְמֻל puede abarcar beneficio, retribución o trato recibido; aquí el contexto favorece el bien hecho a Ezequías. «Beneficio» conserva la amplitud de la expresión y la nota histórica de un bien recibido, mientras que «conforme a» reproduce el valor comparativo de כ sin fijar demasiado el tipo de respuesta requerida.
- source_word: הֵשִׁיב
  english_pob_choice: did not repay
  chosen_spanish: no retribuyó
  alternatives_spanish:
  - no respondió
  - no devolvió
  - no hizo una retribución
  lexicon: HALOT
  rationale: El hifil de שוב, con גמול, expresa hacer una devolución adecuada o corresponder. «No retribuyó» comunica la idea de una respuesta debida sin reducirla solo a gratitud verbal.
- source_word: גָבַהּ לִבּוֹ
  english_pob_choice: his heart was proud
  chosen_spanish: su corazón se enalteció
  alternatives_spanish:
  - su corazón se volvió altivo
  - su corazón se elevó
  - su corazón fue orgulloso
  lexicon: HALOT
  rationale: La expresión hebrea dice literalmente que el corazón se hizo alto. «Se enalteció» preserva la metáfora de elevación y funciona bien en español, manteniendo el foco interior en el corazón.
- source_word: קֶצֶף
  english_pob_choice: wrath
  chosen_spanish: indignación
  alternatives_spanish:
  - ira
  - furor
  - enojo
  lexicon: HALOT
  rationale: קֶצֶף denota una reacción intensa, a menudo judicial o divina. «Indignación» es suficientemente fuerte en español bíblico y evita suavizar el juicio.
- source_word: וַיְהִי עָלָיו קֶצֶף
  english_pob_choice: wrath came upon him
  chosen_spanish: vino sobre él indignación
  alternatives_spanish:
  - hubo indignación sobre él
  - la indignación estuvo sobre él
  - la ira cayó sobre él
  lexicon: HALOT
  rationale: 'La construcción narrativa hebrea es resultativa: la indignación recae o sobreviene. «Vino sobre él» conserva ese movimiento de irrupción sin añadir un sujeto explícito que el hebreo no menciona.'
- source_word: יְהוּדָה וִירוּשָׁלִָם
  english_pob_choice: Judah and Jerusalem
  chosen_spanish: Judá y Jerusalén
  alternatives_spanish:
  - la tierra de Judá y Jerusalén
  - Judá y la ciudad de Jerusalén
  lexicon: HALOT
  rationale: Los nombres propios se conservan en forma estándar española. No se añaden explicaciones geográficas porque el texto solo enumera los destinatarios del juicio.
theological_decisions:
- issue: Naturaleza de la falta de Ezequías frente al beneficio recibido
  english_pob_reading: Hezekiah failed to make a fitting return for the good he had received, without specifying a narrower act such as verbal thanksgiving alone.
  chosen_spanish_reading: Ezequías no correspondió debidamente al beneficio recibido, sin reducir la falta a una sola acción de agradecimiento verbal.
  alternative_spanish_readings:
  - Ezequías no dio gracias por el beneficio recibido
  - Ezequías no respondió con gratitud proporcional al favor de Dios
  rationale: El hebreo habla de no devolver o corresponder conforme al bien recibido. «No retribuyó» mantiene la valoración moral amplia y evita estrechar el sentido a una mera omisión litúrgica o verbal.
  doctrine_reference: Translation philosophy §1, §3
- issue: Origen de la indignación
  english_pob_reading: The verse leaves the agent implicit and simply states that wrath came upon him, Judah, and Jerusalem.
  chosen_spanish_reading: El versículo deja implícito al agente y solo afirma que vino indignación sobre él, Judá y Jerusalén.
  alternative_spanish_readings:
  - vino la indignación de Yahvé sobre él
  - la ira de Yahvé vino sobre él
  rationale: Aunque el contexto sugiere una indignación divina, aquí el hebreo no nombra explícitamente a Yahvé. Se conserva esa reserva textual para no introducir un sujeto que el versículo no expresa.
  doctrine_reference: Translation philosophy §1, §3
translation_notes:
  revision_awareness: La redacción sigue de cerca el sentido del hebreo y el audit trail inglés de POB; no se detectaron revisiones aplicadas en el expediente, y la versión inglesa final fue marcada como sin cambios respecto al último pase.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como forma española preferida del nombre divino, pero en este versículo no aparece explícitamente en el hebreo, por lo que la traducción preserva la pasiva/resultativa sin nombrarlo.
  - Se emplea «indignación» para קֶצֶף por su tono judicial y su compatibilidad con el registro bíblico español.
  - «No retribuyó» conserva la fuerza relacional de גמול y evita reducir la falta a simple cortesía.
  - 'Los nombres propios quedan en forma española estándar: Judá y Jerusalén.'
