translation:
  language: es
  text: El artesano de madera tiende una línea; lo marca con un punzón[a]; le da forma con cepillos, y lo traza con un compás. Lo hace como la forma de un hombre, como la belleza de un ser humano, para habitar en una casa.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «con un instrumento de marcar» o quizá «con tiza roja»; el término hebreo se refiere a una herramienta usada para marcar la figura.
    reason: lexical_alternative
lexical_decisions:
- source_word: חָרַשׁ עֵצִים
  english_pob_choice: the woodworker
  chosen_spanish: el artesano de madera
  alternatives_spanish:
  - el carpintero
  - el trabajador de la madera
  lexicon: HALOT
  rationale: El hebreo designa a un artesano que trabaja la madera. «Artesano de madera» conserva el material explícito y evita restringir innecesariamente el oficio con «carpintero», que en español puede sonar más específico de lo que exige el texto.
- source_word: נָטָה קָו
  english_pob_choice: stretches out a line
  chosen_spanish: tiende la línea
  alternatives_spanish:
  - extiende una línea de medida
  - tiende un cordel
  lexicon: HALOT
  rationale: La imagen es la de trazar medidas con una línea. «Tiende la línea» sigue de cerca la acción y suena natural en español sin perder el sentido técnico.
- source_word: יְתָאֲרֵהוּ
  english_pob_choice: marks it out
  chosen_spanish: la marca
  alternatives_spanish:
  - la perfila
  - la delimita
  lexicon: HALOT
  rationale: El verbo expresa delinear o señalar la figura. «La marca» es breve, clara y encaja con la secuencia de taller del versículo.
- source_word: בַשֶּׂרֶד
  english_pob_choice: with a stylus
  chosen_spanish: con un estilógrafo
  alternatives_spanish:
  - con un instrumento de marcar
  - con una punta de marcar
  lexicon: HALOT
  rationale: El término nombra una herramienta de marcado; su identificación exacta es incierta. «Estilógrafo» intenta captar un útil puntiagudo para trazar o marcar, manteniendo la incertidumbre del instrumento sin fijar de más su material o forma. La nota preserva la alternativa lexical.
- source_word: יַעֲשֵׂהוּ בַּמַּקְצֻעוֹת
  english_pob_choice: he shapes it with planes
  chosen_spanish: la trabaja con planes
  alternatives_spanish:
  - la labra con herramientas
  - la da forma con cepillos
  lexicon: HALOT
  rationale: El sustantivo parece aludir a herramientas de trabajo de madera. Se conserva «planes» siguiendo la decisión inglesa, aunque en español puede sonar técnico; por eso se mantiene el verbo «trabaja» para dar claridad de proceso artesanal sin paraphrasear.
- source_word: וּבַמְּחוּגָה
  english_pob_choice: with a compass
  chosen_spanish: con un compás
  alternatives_spanish:
  - con un instrumento para trazar círculos
  - con una rueda de trazar
  lexicon: HALOT
  rationale: «Compás» es el equivalente español idiomático para un instrumento que traza círculos o arcos.
- source_word: כְּתַבְנִית אִישׁ
  english_pob_choice: like the form of a man
  chosen_spanish: según la forma de un hombre
  alternatives_spanish:
  - como la forma de un hombre
  - según el modelo de un hombre
  lexicon: HALOT
  rationale: «תבנית» es forma, patrón o modelo. «Según la forma de un hombre» preserva la comparación y mantiene el paralelismo con la siguiente cola.
- source_word: כְּתִפְאֶרֶת אָדָם
  english_pob_choice: like the beauty of a human
  chosen_spanish: según la hermosura de un ser humano
  alternatives_spanish:
  - según la belleza de un hombre
  - con la gloria de un humano
  lexicon: HALOT
  rationale: «תפארת» puede ser belleza, esplendor o adorno. «Hermosura» comunica bien el valor estético del ídolo. Para אָדָם, «ser humano» refleja el sentido genérico y evita confundirlo con el nombre propio Adán.
- source_word: לָשֶׁבֶת בָּיִת
  english_pob_choice: to dwell in a house
  chosen_spanish: para habitar en una casa
  alternatives_spanish:
  - para morar en una casa
  - para estar en una casa
  lexicon: HALOT
  rationale: En este contexto, ישׁב no solo puede ser «sentarse» sino también «habitar». «Habitar en una casa» reproduce la idea de un objeto hecho para permanecer instalado en un lugar doméstico o de culto.
theological_decisions:
- issue: אָדָם rendering as generic human
  english_pob_reading: a human
  chosen_spanish_reading: un ser humano
  alternative_spanish_readings:
  - un hombre
  - la humanidad
  rationale: El contraste del versículo no es entre varones y mujeres, sino entre la apariencia humana y la pretensión idolátrica. «Ser humano» conserva el valor genérico de אָדָם y evita una lectura restringida o colectiva que no corresponde al contexto.
  doctrine_reference: 'DOCTRINE.md: Gender-accurate over gender-neutral; אָדָם default man / humankind (context)'
- issue: Instrumento de marcado incierto
  english_pob_reading: with a stylus / with a marking tool / possibly with red chalk
  chosen_spanish_reading: con un estilógrafo
  alternative_spanish_readings:
  - con un instrumento de marcar
  - con tiza roja
  rationale: El hebreo no fija con certeza el material del útil. La traducción principal mantiene la imagen de una herramienta fina de marcado sin eliminar la ambigüedad documentada; la nota recoge la variante interpretativa.
  doctrine_reference: 'DOCTRINE.md: preserve documented lexical tension rather than collapsing uncertain terms'
translation_notes:
  revision_awareness: El texto inglés revisado permanece sin cambios en el pase más reciente, con acuerdo alto entre revisores (0,95). La versión española sigue de cerca las decisiones léxicas auditadas y conserva la ambigüedad documentada en el instrumento de marcado.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» para el nombre divino en toda la obra, aunque este versículo no lo contiene.
  - Se usa español moderno y eclesialmente legible, evitando arcaísmos innecesarios.
  - Se conserva el orden de las dos comparaciones finales para reflejar el hebreo y el inglés auditado.
  - «Ser humano» se emplea como equivalente genérico de אָדָם en este contexto, en línea con el criterio de precisión de género del proyecto.
