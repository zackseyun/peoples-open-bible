    issue: «Entrégame» intensifica innecesariamente הָבָה
    rationale: El hebreo expresa una petición directa tipo «dame». «Entrégame» añade un matiz de entrega formal o de transferencia posesoria que no es necesario y suena menos natural en español general.
  - severity: medium
    issue: «para que vaya a ella» es un eufemismo poco idiomático en español
    rationale: Aunque intenta conservar la modestia del hebreo, en español actual esta expresión suena forzada. «para que me una a ella» comunica la consumación matrimonial con dignidad y naturalidad sin caer en una paráfrasis explícita.
