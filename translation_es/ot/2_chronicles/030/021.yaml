translation:
  language: es
  text: Y los hijos de Israel que se encontraban en Jerusalén celebraron la Fiesta de los Panes sin Levadura durante siete días con gran alegría, y los levitas y los sacerdotes alababan a Yahvé día tras día con instrumentos de fuerza[a] para Yahvé.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'instrumentos poderosos' o 'instrumentos de gran fuerza'. El hebreo dice literalmente 'instrumentos de fuerza'.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּעֲשׂוּ
  english_pob_choice: kept
  chosen_spanish: celebraron
  alternatives_spanish:
  - guardaron
  - hicieron
  lexicon: HALOT
  rationale: En contexto festivo, el hebreo literalmente dice ‘hicieron’, pero el sentido idiomático es observar/celebrar la fiesta. ‘Celebraron’ transmite ese valor sin perder la referencia a la acción ritual.
- source_word: בְנֵי יִשְׂרָאֵל
  english_pob_choice: the sons of Israel
  chosen_spanish: los hijos de Israel
  alternatives_spanish:
  - los israelitas
  - el pueblo de Israel
  lexicon: HALOT
  rationale: Se conserva la expresión genealógica del hebreo para reflejar con transparencia la forma original y evitar una neutralización innecesaria.
- source_word: הַנִּמְצְאִים
  english_pob_choice: who were found
  chosen_spanish: que estaban
  alternatives_spanish:
  - que fueron hallados
  - que se encontraban
  lexicon: HALOT
  rationale: El participio de מצא puede expresar presencia o disponibilidad en contexto. En español, ‘que estaban’ resulta natural y comunica la idea de los que se hallaban en Jerusalén sin sonar forzado.
- source_word: חַג הַמַּצּוֹת
  english_pob_choice: the Feast of Unleavened Bread
  chosen_spanish: la Fiesta de los Panes sin Levadura
  alternatives_spanish:
  - la Fiesta de los Panes Ácimos
  - la fiesta de los panes sin levadura
  lexicon: HALOT
  rationale: Se mantiene el nombre tradicional de la fiesta con una formulación clara en español. ‘Panes sin Levadura’ conserva el contenido semántico del término hebreo.
- source_word: שִׁבְעַת יָמִים
  english_pob_choice: for seven days
  chosen_spanish: por siete días
  alternatives_spanish:
  - durante siete días
  - siete días
  lexicon: HALOT
  rationale: La preposición temporal ‘por’ expresa duración de manera natural en español y refleja el valor durativo de la frase.
- source_word: בְּשִׂמְחָה גְדוֹלָה
  english_pob_choice: with great joy
  chosen_spanish: con gran alegría
  alternatives_spanish:
  - con gran gozo
  - en gran alegría
  lexicon: HALOT
  rationale: ‘Alegría’ comunica bien el sustantivo hebreo en un registro claro y digno. Se preserva la intensificación con ‘gran’.
- source_word: וּמְהַלְלִים
  english_pob_choice: and ... praised
  chosen_spanish: alababan
  alternatives_spanish:
  - y alababan
  - y estaban alabando
  lexicon: HALOT
  rationale: El participio expresa acción concurrente y continua. En español, el imperfecto ‘alababan’ reproduce bien ese trasfondo durativo sin sobrecargar la frase.
- source_word: יּוֹם בְּיוֹם
  english_pob_choice: day by day
  chosen_spanish: día tras día
  alternatives_spanish:
  - día por día
  - cada día
  lexicon: HALOT
  rationale: ‘Día tras día’ conserva el valor distributivo e intensivo del hebreo con una expresión idiomática natural en español.
- source_word: בִּכְלֵי עֹז
  english_pob_choice: with mighty instruments
  chosen_spanish: con instrumentos de fuerza
  alternatives_spanish:
  - con instrumentos poderosos
  - con instrumentos de gran fuerza
  lexicon: HALOT
  rationale: Se preserva la imagen poco común del hebreo (‘instrumentos de fuerza’) en vez de suavizarla a una paráfrasis más interpretativa. Así queda audible la tensión lexical documentada.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  lexicon: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
  rationale: Se sigue el estándar del proyecto para el Tetragrámaton, preservando el nombre divino en forma hispana estable y legible.
theological_decisions:
- issue: Rendición del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  rationale: El texto hebreo usa directamente el Nombre divino. Se evita la sustitución por un título para mantener la transparencia del texto fuente y la coherencia del proyecto.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Valor de בִּכְלֵי עֹז
  english_pob_reading: mighty instruments
  chosen_spanish_reading: instrumentos de fuerza
  alternative_spanish_readings:
  - instrumentos poderosos
  - instrumentos de gran fuerza
  rationale: El hebreo es deliberadamente inusual; no se convierte en una expresión más común como ‘instrumentos de alabanza’ para no borrar la imagen lexical ni la tensión interpretativa. La nota permite la alternativa idiomática sin imponerla.
  doctrine_reference: HALOT; revisión POB del sentido instrumental/dedicado
translation_notes:
  revision_awareness: El texto inglés revisado cambió de una formulación más literal y algo áspera (‘with instruments of strength to the LORD’) a una más natural (‘with mighty instruments to the LORD’), y también sustituyó ‘while’ por ‘and’. La versión española sigue esa revisión de coordinación simple con ‘y’ y conserva la concreción del instrumento, pero mantiene la transparencia lexical de ‘instrumentos de fuerza’ para no perder el hebraísmo documentado.
  spanish_consistency_notes:
  - Se usa ‘Yahvé’ consistentemente para יהוה.
  - Se conserva una sintaxis coordinada sencilla con ‘y’, acorde con la revisión del inglés.
  - ‘Fiesta de los Panes sin Levadura’ mantiene el nombre establecido de la festividad y evita una paráfrasis excesiva.
  - El imperfecto ‘alababan’ refleja la acción simultánea y continua del participio hebreo.
  - Se mantiene la imagen rara de ‘instrumentos de fuerza’ con nota alternativa, para respetar la tensión léxica del original.
