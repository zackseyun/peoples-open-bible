base_translation:
  language: en
  yaml_path: translation/ot/1_kings/022/003.yaml
  text: And the king of Israel said to his servants[a], “Do you know that Ramoth-gilead belongs to us[b], yet we are keeping silent instead of taking it from the hand of the king of Aram?”
  footnotes:
  - marker: a
    text: Or, more literally, “we are silent from taking it.” The Hebrew idiom conveys culpable inaction.
    reason: lexical_alternative
  - marker: b
    text: Aram is the Hebrew name often rendered “Syria” in older English translations.
    reason: alternative_reading
