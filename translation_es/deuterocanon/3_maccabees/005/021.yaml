translation:
  language: es
  text: Y cuando el rey habló, todos los presentes, juntos, asintieron con gusto y con alegría, y cada uno se fue a su propia casa.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: εἰπόντος
  english_pob_choice: when ... had spoken
  chosen_spanish: cuando el rey hubo hablado
  alternatives_spanish:
  - después de que el rey habló
  - al hablar el rey
  lexicon: LSJ
  rationale: El genitivo absoluto expresa una acción previa a la respuesta; en español, «hubo hablado» comunica bien la anterioridad consumada sin sonar demasiado pesado.
- source_word: ἀσμένως
  english_pob_choice: gladly
  chosen_spanish: con gusto
  alternatives_spanish:
  - alegremente
  - de buen grado
  lexicon: LSJ
  rationale: «Con gusto» transmite la prontitud y agrado del asentimiento en español natural. Se evita duplicar el matiz de χαρᾶς sin perder la idea de disposición favorable.
- source_word: συναινέσαντες
  english_pob_choice: consented
  chosen_spanish: consintieron
  alternatives_spanish:
  - asintieron
  - estuvieron de acuerdo
  lexicon: LSJ
  rationale: «Consintieron» refleja la cooperación/aprobación del verbo con un tono formal cercano al audit trail inglés, y mantiene la fuerza de aprobación conjunta.
- source_word: ὁμοῦ
  english_pob_choice: together
  chosen_spanish: todos los presentes
  alternatives_spanish:
  - juntos
  - unánimemente
  lexicon: LSJ
  rationale: El griego subraya acción colectiva; en español eso queda bien expresado con «todos los presentes», que integra naturalmente la idea de simultaneidad y acuerdo común.
- source_word: μετὰ χαρᾶς
  english_pob_choice: with joy
  chosen_spanish: con alegría
  alternatives_spanish:
  - con gozo
  - llenos de alegría
  lexicon: LSJ
  rationale: Se conserva el sustantivo «alegría» para representar explícitamente χαρᾶς, sin convertir toda la frase en un adverbio y manteniendo la acumulación enfática de respuestas positivas.
- source_word: οἱ παρόντες
  english_pob_choice: those who were present
  chosen_spanish: los presentes
  alternatives_spanish:
  - los que estaban presentes
  - los asistentes
  lexicon: LSJ
  rationale: «Los presentes» es una forma natural y fiel que no sobreespecifica su función; corresponde bien al grupo de quienes estaban allí.
- source_word: ἀνέλυσε
  english_pob_choice: departed
  chosen_spanish: se fue
  alternatives_spanish:
  - partió
  - se retiró
  lexicon: LSJ
  rationale: En contexto, el verbo indica salida o alejamiento. «Se fue» es idiomático en español y no añade la idea de retorno que el griego no exige.
- source_word: εἰς τὸν ἴδιον οἶκον
  english_pob_choice: to his own house
  chosen_spanish: a su propia casa
  alternatives_spanish:
  - a su propia vivienda
  - a su casa
  lexicon: LSJ
  rationale: «Casa» sigue de cerca οἶκος, y el posesivo refuerza la individualidad del retorno sin introducir un sentido más doméstico o abstracto de «hogar».
translation_notes:
  revision_awareness: La versión inglesa reciente ajustó 'agreed' a 'consented' para reflejar más de cerca συναινέσαντες; la española adopta «consintieron» para mantener esa precisión y conservar el tono formal. No se añade nota al pie porque no hay variante textual ni ambigüedad editorial que requiera anclaje.
  spanish_consistency_notes:
  - 'Se mantuvo el paralelismo de dos matices positivos: «con gusto» para ἀσμένως y «con alegría» para μετὰ χαρᾶς.'
  - Se prefirió un castellano sobrio y publicable, evitando «Cristo» o terminología eclesiástica no presente en el pasaje.
  - «Los presentes» cubre οἱ παρόντες sin añadir información inexistente sobre su cargo o identidad.
