translation:
  language: es
  text: El Espíritu de la verdad[a], a quien el mundo no puede recibir, porque no lo ve ni lo conoce. Ustedes lo conocen[b], porque permanece con ustedes y estará en ustedes.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «el espíritu de la verdad, el cual el mundo no puede recibir... porque no lo ve ni lo conoce». El griego usa género neutro con πνεῦμα, aunque el referente es personal.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «estará entre ustedes». El griego puede leerse en sentido corporativo; sin embargo, «en ustedes» conserva mejor el contraste con «con ustedes».'
    reason: alternative_reading
lexical_decisions:
- source_word: πνεῦμα
  english_pob_choice: Spirit
  chosen_spanish: Espíritu
  alternatives_spanish:
  - espíritu
  lexicon: BDAG
  rationale: Se escribe con mayúscula porque en el contexto joánico se refiere al Espíritu Santo como agente personal, no a un espíritu impersonal. Se conserva así la referencia personal destacada por el audit trail en inglés.
- source_word: τῆς ἀληθείας
  english_pob_choice: of truth
  chosen_spanish: de la verdad
  alternatives_spanish:
  - verdadero
  - que es verdad
  lexicon: BDAG
  rationale: Se mantiene la construcción genitiva directa 'de la verdad' para reproducir la expresión fija 'el Espíritu de la verdad' sin paráfrasis.
- source_word: ὃ
  english_pob_choice: whom
  chosen_spanish: a quien
  alternatives_spanish:
  - que
  - el cual
  lexicon: BDAG
  rationale: Aunque πνεῦμα es neutro en griego, el referente es personal; por eso en español se usa 'a quien', que conserva la referencia personal sin forzar el género gramatical.
- source_word: κόσμος
  english_pob_choice: the world
  chosen_spanish: el mundo
  alternatives_spanish:
  - el sistema del mundo
  - la humanidad
  lexicon: BDAG
  rationale: '''El mundo'' es la traducción más natural y conserva el término joánico amplio sin precisar indebidamente si se trata de humanidad en general o del orden rebelde del mundo.'
- source_word: οὐ δύναται λαβεῖν
  english_pob_choice: is not able to receive
  chosen_spanish: no puede recibir
  alternatives_spanish:
  - no es capaz de recibir
  - no puede स्वीकारarlo
  lexicon: BDAG
  rationale: Se expresa la incapacidad con 'no puede', que en español comunica la fuerza modal de δύναται sin perder la idea de 'recibir' propia de λαβεῖν.
- source_word: θεωρεῖ
  english_pob_choice: sees
  chosen_spanish: ve
  alternatives_spanish:
  - contempla
  - percibe
  lexicon: BDAG
  rationale: '''Ve'' es el equivalente natural y preserva el matiz sensorial/cognitivo del verbo sin volverlo arcaico o interpretativo.'
- source_word: γινώσκει / γινώσκετε
  english_pob_choice: knows / know
  chosen_spanish: conoce / conocen
  alternatives_spanish:
  - reconoce / reconocen
  - llega a conocer / llegan a conocer
  lexicon: BDAG
  rationale: Se elige 'conocer' para mantener la continuidad léxica entre la incapacidad del mundo y el conocimiento de los discípulos; en español resulta idiomático y fiel.
- source_word: παρ’ ὑμῖν μένει
  english_pob_choice: he remains with you
  chosen_spanish: permanece con ustedes
  alternatives_spanish:
  - permanece junto a ustedes
  - habita con ustedes
  lexicon: BDAG
  rationale: '''Permanece'' conserva la consistencia joánica de μένω y ''con ustedes'' traduce naturalmente παρά + dativo, manteniendo la relación cercana sin añadir interpretación.'
- source_word: ἐν ὑμῖν ἔσται
  english_pob_choice: will be in you
  chosen_spanish: estará en ustedes
  alternatives_spanish:
  - estará dentro de ustedes
  - estará entre ustedes
  lexicon: BDAG
  rationale: Se opta por 'en ustedes'/'estará en ustedes' para reflejar ἐν y preservar la distinción entre 'con' y 'en'. Se deja abierta la posibilidad corporativa que el inglés anotó como alternativa, sin imponer 'dentro' como interpretación demasiado específica.
theological_decisions:
- issue: Referencia personal del Espíritu pese al neutro griego
  english_pob_reading: Use personal English pronouns ('whom,' 'him,' 'he') for the Spirit
  chosen_spanish_reading: Se usa 'a quien' y pronombres personales implícitos/expresos para el Espíritu
  alternative_spanish_readings:
  - lo / le
  - que / el cual
  rationale: El texto presenta al Espíritu como agente personal. En español, 'a quien' evita el neutro impersonal y mantiene la lectura personal sin perder la tensión entre la gramática griega y el referente teológico.
  doctrine_reference: Credo Niceno-Constantinopolitano (381) sobre el Espíritu Santo como persona divina
- issue: 'Relación del Espíritu con los creyentes: ''con ustedes'' y ''en ustedes'''
  english_pob_reading: Preserve both locative distinctions as 'with you' and 'in you'
  chosen_spanish_reading: Se preservan ambas distinciones como 'con ustedes' y 'en ustedes'
  alternative_spanish_readings:
  - entre ustedes
  - en medio de ustedes
  - dentro de ustedes
  rationale: El griego usa παρά y ἐν con valores distintos. La traducción conserva esa tensión y no la nivela en una sola idea de presencia, siguiendo la filosofía de mantener la distinción relacional y la progresión del texto.
  doctrine_reference: 'Filosofía de traducción POB: preservar la tensión teológica en lugar de resolverla'
- issue: Alcance de ἐν ὑμῖν
  english_pob_reading: '''in you'' best preserves the contrast with ''with you'''
  chosen_spanish_reading: '''en ustedes'' mantiene el contraste con ''con ustedes'' y deja abierta la lectura corporativa posible'
  alternative_spanish_readings:
  - dentro de ustedes
  - entre ustedes
  rationale: En español, 'en ustedes' es la forma más directa de reflejar ἐν sin sobreespecificar interioridad física o corporativa; la nota puede aclarar la alternativa si se desea.
  doctrine_reference: BDAG / análisis sintáctico de ἐν + dativo en contexto plural
translation_notes:
  revision_awareness: El borrador sigue de cerca el texto griego de SBLGNT y el audit trail inglés. Se conservaron las dos distinciones preposicionales clave (παρ’ ὑμῖν / ἐν ὑμῖν), la referencia personal del Espíritu y la tensión entre gramática neutra y referente personal. No se detectaron revisiones posteriores que alteraran la base de traducción.
  spanish_consistency_notes:
  - Se usa 'Espíritu' con mayúscula para el Espíritu Santo en contexto joánico.
  - Se usa 'con ustedes' y 'en ustedes' de manera consistente para diferenciar παρά y ἐν.
  - Se prefirió 'conocer' frente a 'reconocer' para mantener continuidad léxica.
  - Se evitó 'SEÑOR' u otras sustituciones de nombre divino porque este versículo no contiene el Tetragrámaton ni κύριος en función equivalente.
