translation:
  language: es
  text: Tomó su bastón en su mano y escogió para sí cinco piedras lisas del wadi[a], y las puso en la bolsa del pastor que tenía, en la bolsa pequeña; y su honda estaba en su mano[b]. Entonces se acercó al filisteo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'arroyo' o 'cauce' para 'wadi' (hebreo נַחַל), un término que suele referirse a un barranco o curso de agua estacional.
    reason: lexical_alternative
  - marker: b
    text: O 'alforja' para 'bolsa pequeña' (hebreo יַלְקוּט), una bolsa o zurrón pequeño usado para llevar objetos.
    reason: lexical_alternative
lexical_decisions:
- source_word: מַקְלוֹ
  english_pob_choice: his staff
  chosen_spanish: su bastón
  alternatives_spanish:
  - su vara
  - su cayado
  lexicon: HALOT
  rationale: מַקֵּל designa un palo o bastón; en español, 'bastón' comunica bien la idea de un palo llevado en la mano sin sonar demasiado pesado como 'vara'. 'Cayado' sería más específicamente pastoral, pero aquí el término general es suficiente y más cercano al movimiento narrativo.
- source_word: בְּיָדוֹ
  english_pob_choice: in his hand
  chosen_spanish: en la mano
  alternatives_spanish:
  - con la mano
  - en su mano
  lexicon: HALOT
  rationale: La expresión locativa se conserva de forma directa para mantener el detalle concreto y la repetición enfática del texto. 'En la mano' es natural en español; el posesivo se sobreentiende por el contexto inmediato.
- source_word: וַיִּבְחַר לוֹ
  english_pob_choice: chose for himself
  chosen_spanish: escogió para sí
  alternatives_spanish:
  - eligió para sí
  - seleccionó para sí
  lexicon: HALOT
  rationale: Se preserva el matiz reflexivo de לּוֹ con 'para sí', evitando un mero 'eligió' que perdería la deliberación personal. 'Escogió' suena idiomático y sobrio en español bíblico moderno.
- source_word: חֲמִשָּׁה חַלֻּקֵי אֲבָנִים
  english_pob_choice: five smooth stones
  chosen_spanish: cinco piedras lisas
  alternatives_spanish:
  - cinco piedras suaves
  - cinco piedras pulidas
  lexicon: HALOT
  rationale: חַלֻּקֵי describe piedras lisas o resbaladizas; 'lisas' es la opción más natural y precisa en español. 'Pulidas' sugeriría trabajo humano, algo no exigido por el hebreo ni por el contexto del cauce.
- source_word: מִן הַנַּחַל
  english_pob_choice: from the wadi
  chosen_spanish: del wadi
  alternatives_spanish:
  - del arroyo
  - del cauce
  - del torrente
  lexicon: HALOT
  rationale: Se conserva 'wadi' como préstamo técnico para reflejar con precisión el término hebreo נַחַל, que suele designar un cauce estacional o barranco, no simplemente un arroyo permanente. Esto sigue la decisión del POB inglés y mantiene la primacía del término original.
- source_word: בִּכְלִי הָרֹעִים
  english_pob_choice: in the shepherd’s bag
  chosen_spanish: en la bolsa del pastor
  alternatives_spanish:
  - en la bolsa de pastor
  - en el morral del pastor
  - en el utensilio del pastor
  lexicon: HALOT
  rationale: כְּלִי es amplio, pero en este contexto el contenedor para llevar piedras se entiende mejor como 'bolsa'. 'Bolsa del pastor' mantiene la función pastoral y evita términos demasiado técnicos o ambiguos para el lector español.
- source_word: אֲשֶׁר לוֹ
  english_pob_choice: that he had
  chosen_spanish: que tenía
  alternatives_spanish:
  - que era suyo
  - que poseía
  lexicon: HALOT
  rationale: La cláusula relativa identifica la bolsa como pertenencia de David; 'que tenía' es una forma natural y fiel que evita sobrecargar el español con una frase posesiva más pesada.
- source_word: וּבַיַּלְקוּט
  english_pob_choice: in the pouch
  chosen_spanish: en la alforja
  alternatives_spanish:
  - en la bolsa
  - en el bolsillo
  - en la mochila
  lexicon: HALOT
  rationale: יַלְקוּט denota una bolsa pequeña o saco de transporte; 'alforja' ofrece en español una imagen de bolsa de carga/porte más concreta que 'bolsa' y conserva la idea de un segundo contenedor especificado por el hebreo. Dado que el POB inglés distinguió entre una bolsa general y el 'pouch', se mantiene esa segunda especificación con un término español distinto.
- source_word: וְקַלְּעוֹ בְיָדוֹ
  english_pob_choice: and his sling was in his hand
  chosen_spanish: y su honda estaba en su mano
  alternatives_spanish:
  - y su honda en la mano
  - con su honda en la mano
  - y tenía su honda en la mano
  lexicon: HALOT
  rationale: קלּע mantiene el sentido de 'honda'. En español, 'honda estaba en su mano' reproduce bien la frase nominal hebrea y la imagen de disponibilidad inmediata. Se evita añadir acción no presente en el texto.
- source_word: וַיִּגַּשׁ אֶל הַפְּלִשְׁתִּי
  english_pob_choice: Then he approached the Philistine
  chosen_spanish: Entonces se acercó al filisteo
  alternatives_spanish:
  - Y se acercó al filisteo
  - Luego se aproximó al filisteo
  - Entonces avanzó hacia el filisteo
  lexicon: HALOT
  rationale: נגשׁ significa acercarse o aproximarse. 'Se acercó' es natural y directo; 'Entonces' refleja el avance narrativo del hebreo con waw consecutivo. 'Filisteo' se deja en minúscula por ser un gentilicio/etnónimo en español corriente.
translation_notes:
  revision_awareness: La revisión inglesa más reciente quedó sin cambios; este borrador español sigue de cerca ese texto auditado y conserva sus dos decisiones léxicas marcadas (wadi; pouch) con equivalentes explicados en notas.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' fuera de este versículo porque no aparece el Tetragrama ni un sustituto directo.
  - '''Filisteo'' se escribe en minúscula por tratarse de etnónimo en uso común dentro de la narrativa.'
  - Se conserva el paralelismo concreto de 'mano' dos veces para reflejar la imaginería del hebreo.
  - 'La doble referencia al contenedor se mantiene diferenciada: ''bolsa del pastor'' / ''alforja''.'
