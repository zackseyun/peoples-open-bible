translation:
  language: es
  text: Entonces Betsabé vino al rey Salomón para hablarle acerca de Adonías. Y el rey se levantó para recibirla y se postró ante ella[a], y se sentó en su trono, y se colocó un trono para la madre del rey, y ella se sentó a su derecha.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «le rindió homenaje» o «se postró delante de ella». El verbo hebreo puede denotar una inclinación profunda de honor; aquí no implica necesariamente adoración.
    reason: lexical_alternative
lexical_decisions:
- source_word: בַת שֶׁבַע / Bathsheba
  english_pob_choice: Bathsheba
  chosen_spanish: Betsabé
  alternatives_spanish:
  - Bathsheba
  lexicon: HALOT
  rationale: Se conserva el nombre propio en forma castellana ampliamente reconocible. «Betsabé» es la transliteración tradicional y natural en español; no se traduce etimológicamente.
- source_word: אֶל הַמֶּלֶךְ שְׁלֹמֹה
  english_pob_choice: to King Solomon
  chosen_spanish: al rey Salomón
  alternatives_spanish:
  - al rey, Salomón
  lexicon: HALOT
  rationale: El hebreo une el título y el nombre en aposición. «Al rey Salomón» reproduce esa relación de manera natural y fiel.
- source_word: לְדַבֶּר לוֹ
  english_pob_choice: to speak to him
  chosen_spanish: para hablarle
  alternatives_spanish:
  - para hablar con él
  lexicon: HALOT
  rationale: El infinitivo con ל expresa finalidad. En español, «para hablarle» conserva la dirección del discurso sin sonar forzado.
- source_word: עַל אֲדֹנִיָּהוּ
  english_pob_choice: about Adonijah
  chosen_spanish: acerca de Adonías
  alternatives_spanish:
  - sobre Adonías
  - en cuanto a Adonías
  lexicon: HALOT
  rationale: עַל aquí señala el tema de la conversación. «Acerca de» evita añadir por sí solo la idea de representación o intercesión, que no está explícita en la preposición.
- source_word: וַיָּקָם ... לִקְרָאתָהּ
  english_pob_choice: the king rose to meet her
  chosen_spanish: el rey se levantó para salir a recibirla
  alternatives_spanish:
  - el rey se levantó a su encuentro
  - el rey se puso de pie para recibirla
  lexicon: HALOT
  rationale: La combinación de קום con לקראת expresa levantarse para ir al encuentro de alguien. «Para salir a recibirla» comunica bien el gesto de honor en un castellano natural.
- source_word: וַיִּשְׁתַּחוּ לָהּ
  english_pob_choice: bowed down to her
  chosen_spanish: se postró ante ella
  alternatives_spanish:
  - se inclinó ante ella
  - le rindió homenaje
  lexicon: HALOT
  rationale: שׁחה puede referirse a una reverencia profunda o postración. En este contexto cortesano, «se postró ante ella» preserva la fuerza del gesto sin implicar adoración.
- source_word: וַיֵּשֶׁב עַל כִּסְאוֹ
  english_pob_choice: sat on his throne
  chosen_spanish: se sentó en su trono
  alternatives_spanish:
  - se sentó sobre su trono
  lexicon: HALOT
  rationale: La acción es simplemente sentarse; «en su trono» es la formulación natural en español y mantiene el marco real.
- source_word: וַיָּשֶׂם כִּסֵּא
  english_pob_choice: a throne was set
  chosen_spanish: se puso un trono
  alternatives_spanish:
  - se colocó un trono
  - se dispuso un trono
  lexicon: HALOT
  rationale: Se evita introducir un sujeto agente no expresado. «Se puso un trono» refleja el hebreo de manera concisa y mantiene la dignidad de la escena.
- source_word: לְאֵם הַמֶּלֶךְ
  english_pob_choice: for the king’s mother
  chosen_spanish: para la madre del rey
  alternatives_spanish:
  - para la madre del rey Salomón
  - para la madre del monarca
  lexicon: HALOT
  rationale: La expresión conserva el estatus oficial de Betsabé. «Madre del rey» preserva el énfasis del hebreo sin reducirlo a una relación privada.
- source_word: וַתֵּשֶׁב לִימִינוֹ
  english_pob_choice: she sat at his right hand
  chosen_spanish: ella se sentó a su derecha
  alternatives_spanish:
  - ella se sentó a su mano derecha
  - ella se sentó a su lado derecho
  lexicon: HALOT
  rationale: «A su derecha» es el equivalente español más natural del lugar de honor expresado por לימין. Mantiene la imagen sin sobrecargarla.
theological_decisions:
- issue: Sentido de וַיִּשְׁתַּחוּ en un contexto real humano
  english_pob_reading: Rendered as an act of royal respect ('bowed down to her'), not worship.
  chosen_spanish_reading: 'Se entiende como una reverencia real de respeto: «se postró ante ella», no como adoración.'
  alternative_spanish_readings:
  - la adoró
  - le rindió culto
  - le hizo reverencia
  rationale: El contexto es de corte y honor hacia la madre del rey. Traducirlo como adoración distorsionaría el acto; «se postró ante ella» conserva la tensión lexicográfica entre reverencia intensa y culto religioso.
  doctrine_reference: Mantener la tensión lexical sin importar adoración donde el texto describe honor humano.
translation_notes:
  revision_awareness: 'La redacción sigue el ajuste final del audit trail inglés: coordina las acciones con «y» en lugar de introducir un «entonces» adicional, y refleja el hebreo con una formulación pasiva/impersonal en «se puso un trono», sin añadir una causatividad explícita no marcada en el texto fuente.'
  spanish_consistency_notes:
  - Se usa «Yahvé» en la serie española del proyecto cuando aparezca el nombre divino; este versículo no contiene el Tetragrámaton.
  - Se mantiene «Betsabé» y «Salomón» con formas castellanas estándar y consistentes.
  - «Se postró» se reserva para reverencia intensa; en este contexto no se traduce como adoración.
  - «A su derecha» conserva el valor de lugar de honor de לימין, coherente con el uso del proyecto.
