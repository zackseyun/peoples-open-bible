translation:
  language: es
  text: 'Por tanto, así dice Yahvé acerca de Jehoiaquim, hijo de Josías, rey de Judá: no lo lamentarán[a], diciendo: «¡Ay, hermano mío!» o «¡Ay, hermana!» No lo lamentarán[a], diciendo: «¡Ay, señor!» o «¡Ay, su majestad![b]»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «No harán duelo por él». El verbo hebreo se refiere especialmente a una lamentación funeraria formal.
    reason: lexical_alternative
  - marker: b
    text: O «¡Ay, su esplendor!». La expresión hebrea se refiere a la majestad o esplendor real.
    reason: lexical_alternative
lexical_decisions:
- source_word: לָכֵן
  english_pob_choice: Therefore
  chosen_spanish: Por tanto
  alternatives_spanish:
  - Por eso
  - Así que
  lexicon: HALOT
  rationale: Introduce una conclusión inferida del oráculo anterior; «Por tanto» conserva la fuerza lógica y el tono profético sin sonar mecánico.
- source_word: כֹּה אָמַר יְהוָה
  english_pob_choice: thus says Yahweh
  chosen_spanish: así dice Yahvé
  alternatives_spanish:
  - así ha dicho Yahvé
  - esto dice Yahvé
  lexicon: HALOT
  rationale: Mantiene la fórmula profética estándar con el nombre divino en la forma proyectada para español («Yahvé»), sin enmascararlo.
- source_word: אֶל
  english_pob_choice: concerning
  chosen_spanish: acerca de
  alternatives_spanish:
  - contra
  - a
  lexicon: HALOT
  rationale: En este contexto de juicio profético, la preposición introduce el tema del oráculo; «acerca de» expresa bien ese enfoque en español.
- source_word: יְהוֹיָקִים בֶּן יֹאשִׁיָּהוּ מֶלֶךְ יְהוּדָה
  english_pob_choice: Jehoiakim son of Josiah, king of Judah
  chosen_spanish: Jehoiaquim, hijo de Josías, rey de Judá
  alternatives_spanish:
  - Jehoiaquim hijo de Josías, rey de Judá
  lexicon: HALOT
  rationale: Translitera los nombres propios de manera estándar en español bíblico y conserva la identificación real completa.
- source_word: לֹא יִסְפְּדוּ לוֹ
  english_pob_choice: They will not lament for him
  chosen_spanish: no harán lamentación por él
  alternatives_spanish:
  - no lo llorarán
  - no harán duelo por él
  lexicon: HALOT
  rationale: ספד refiere a lamentación funeraria formal; «hacer lamentación» conserva esa carga ritual mejor que un simple «llorar».
- source_word: הוֹי
  english_pob_choice: Alas
  chosen_spanish: ¡Ay!
  alternatives_spanish:
  - ¡Ay de!
  - ¡Oh, ay!
  lexicon: HALOT
  rationale: Interjección de duelo y lamento; «¡Ay!» es natural en español y conserva el tono funerario.
- source_word: אָחִי
  english_pob_choice: my brother
  chosen_spanish: hermano mío
  alternatives_spanish:
  - mi hermano
  - hermano
  lexicon: HALOT
  rationale: La terminación posesiva de primera persona está explícita; «hermano mío» reproduce la relación afectiva y el giro exclamativo del lamento.
- source_word: אָחוֹת
  english_pob_choice: sister
  chosen_spanish: hermana
  alternatives_spanish:
  - hermana mía
  - mi hermana
  lexicon: HALOT
  rationale: El hebreo no repite aquí de forma explícita el sufijo posesivo como en «mi hermano»; se mantiene la asimetría documentada con una forma breve y natural en español.
- source_word: הוֹי אָדוֹן
  english_pob_choice: Alas, lord!
  chosen_spanish: ¡Ay, señor!
  alternatives_spanish:
  - ¡Ay, mi señor!
  - ¡Ay, soberano!
  lexicon: HALOT
  rationale: אָדוֹן puede denotar superior o gobernante; «señor» preserva el rango sin confundirlo con el nombre divino, y encaja con el lamento.
- source_word: הוֹי הֹדֹה
  english_pob_choice: Alas, his majesty!
  chosen_spanish: ¡Ay, su majestad!
  alternatives_spanish:
  - ¡Ay, su esplendor!
  - ¡Ay, su gloria!
  lexicon: HALOT
  rationale: הוֹד expresa majestad, esplendor o gloria; «su majestad» captura bien la dignidad regia del término en un registro natural para el español.
theological_decisions:
- issue: Renderización del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - SEÑOR
  rationale: 'Se sigue la directriz del proyecto para el Tetragrámaton en español: usar «Yahvé» de forma explícita, no una sustitución litúrgica en mayúsculas.'
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Tono funerario de לֹא יִסְפְּדוּ לוֹ
  english_pob_reading: They will not lament for him
  chosen_spanish_reading: no harán lamentación por él
  alternative_spanish_readings:
  - no lo llorarán
  - no harán duelo por él
  rationale: La expresión conserva la idea de lamentación formal pública, no solo pena privada, manteniendo la fuerza ritual del verbo hebreo.
  doctrine_reference: HALOT / uso funerario de ספד
translation_notes:
  revision_awareness: La versión inglesa auditada fue revisada desde «master» a «lord» para אָדוֹן y mantiene «his majesty» para הֹדֹה. En español se siguió esa lectura revisada con «señor» y «su majestad», además de conservar la forma explícita del nombre divino como «Yahvé».
  spanish_consistency_notes:
  - Se usa «Yahvé» según la terminología del proyecto para יְהוָה.
  - 'Se conservan los nombres propios en transliteración española habitual: Jehoiaquim, Josías, Judá.'
  - Se mantiene el paralelismo del lamento con dos fórmulas exclamativas para cada par de términos.
  - No se añadió nota a pie porque el español permite reflejar la asimetría de «hermano mío» / «hermana» sin ambigüedad adicional.
