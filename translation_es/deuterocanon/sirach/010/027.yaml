translation:
  language: es
  text: Mejor es el que trabaja y tiene abundancia de bienes que el que se honra a sí mismo y carece de alimento[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Testimonio griego: «Hijo, glorifica tu alma con mansedumbre, y dale honor conforme a su valor». El hebreo y el griego difieren sustancialmente aquí.'
    reason: alternative_reading
lexical_decisions:
- source_word: טוֹב
  english_pob_choice: Better is
  chosen_spanish: Mejor es
  alternatives_spanish:
  - Bueno es
  - Es mejor
  lexicon: HALOT
  rationale: La apertura proverbial comparativa se expresa con una construcción natural en español. 'Mejor es' conserva el valor evaluativo y el tono sapiencial sin volverlo torpe.
- source_word: עוֹבֵד
  english_pob_choice: one who works
  chosen_spanish: el que trabaja
  alternatives_spanish:
  - el trabajador
  - el labrador
  - el que labora
  lexicon: HALOT
  rationale: El hebreo apunta a la persona que trabaja, no a una condición servil. 'El que trabaja' refleja la función práctica del proverbio y evita introducir una matiz de estatus que el contexto no exige.
- source_word: וְיוֹתֵר הוֹן
  english_pob_choice: and has abundant wealth
  chosen_spanish: y tiene abundancia de bienes
  alternatives_spanish:
  - y tiene más riqueza
  - y posee abundante riqueza
  - y tiene mucho
  lexicon: HALOT
  rationale: '''הוֹן'' denota bienes/riqueza sustancial, y ''יוֹתֵר'' añade exceso o abundancia. ''Abundancia de bienes'' suena natural en español y conserva el contraste económico del proverbio.'
- source_word: מִמִּתְכַּבֵּד
  english_pob_choice: than one who honors himself
  chosen_spanish: que el que se honra a sí mismo
  alternatives_spanish:
  - que el que se glorifica a sí mismo
  - que el que se hace importante
  - que el que es honrado
  lexicon: HALOT
  rationale: El hitpael es reflexivo; por eso la idea es autoexaltación, no recibir honor de otros. 'Se honra a sí mismo' es claro y mantiene la tensión ética del refrán.
- source_word: חֲסַר
  english_pob_choice: lacks
  chosen_spanish: carece de
  alternatives_spanish:
  - le falta
  - está sin
  - no tiene
  lexicon: HALOT
  rationale: '''Carece de'' conserva el valor de carencia de modo sobrio y literario. En español funciona bien en contraste con la abundancia del miembro anterior.'
- source_word: מַתָּן
  english_pob_choice: food
  chosen_spanish: alimento
  alternatives_spanish:
  - provisión
  - sustento
  - pan
  lexicon: HALOT
  rationale: En este contexto sapiencial la idea es la necesidad básica de sustento. 'Alimento' comunica esa carencia con naturalidad en español, sin forzar una traducción demasiado literal de una palabra potencialmente ambigua.
theological_decisions:
- issue: Divergencia importante entre el hebreo conservado y el paralelo griego de Sirácida 10:27
  english_pob_reading: Translate the extant Hebrew as the primary witness, while preserving the Greek as an alternative in a footnote.
  chosen_spanish_reading: Traducir el hebreo disponible como texto principal y preservar el griego en nota como lectura alternativa significativa.
  alternative_spanish_readings:
  - 'Seguir el griego en el texto principal: ''Hijo, glorifica tu alma con mansedumbre...'''
  - Fusionar ambas tradiciones en una paráfrasis conciliadora
  rationale: La política del proyecto da prioridad al hebreo cuando el libro se conserva en hebreo, pero aquí la discrepancia con el testimonio griego es grande y no meramente estilística. Por eso el texto principal sigue el hebreo, y la nota conserva transparentemente la lectura griega como alternativa documentada.
  doctrine_reference: 'PHILOSOPHY.md: traducir del hebreo donde se conserva; mantener honestamente la incertidumbre de la fuente'
translation_notes:
  revision_awareness: 'El registro revisa la decisión previa del equipo y mantiene el mismo enfoque: texto principal basado en el hebreo conservado, con la variante griega preservada en nota por la divergencia sustancial entre testigos.'
  spanish_consistency_notes:
  - Se evitó 'SEÑOR' u otra convención de ocultamiento, porque aquí no aparece el Tetragrámaton.
  - '''Mejor es'' mantiene el tono sapiencial comparativo del hebreo.'
  - '''Alimento'' se eligió por claridad contextual; en nota se preserva el contraste del testimonio griego sin mezclar tradiciones en el cuerpo del texto.'
