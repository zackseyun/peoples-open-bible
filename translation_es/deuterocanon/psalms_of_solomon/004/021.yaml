translation:
  language: es
  text: Que la carne de los que agradan a los hombres[a] sea dispersada por las fieras, y los huesos de los transgresores queden delante del sol en deshonor.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: “de los complacientes con los hombres”.'
    reason: lexical_alternative
lexical_decisions:
- source_word: σκορπισθείησαν
  english_pob_choice: May ... be scattered
  chosen_spanish: Que ... sea dispersada
  alternatives_spanish:
  - Que ... sean esparcidos
  - Ojalá ... sea dispersada
  lexicon: LSJ
  rationale: El aoristo pasivo optativo expresa deseo o imprecación. En español, 'Que ... sea dispersada' conserva mejor el tono de maldición-oración que un futuro simple, y mantiene la forma pasiva del griego.
- source_word: σάρκες
  english_pob_choice: flesh
  chosen_spanish: carne
  alternatives_spanish:
  - cuerpos
  - cadáveres
  lexicon: LSJ
  rationale: El griego usa σάρκες en sentido literal y corporal; 'carne' preserva la imagen cruda y concreta mejor que generalizar a 'cuerpos'.
- source_word: ἀνθρωπαρέσκων
  english_pob_choice: people-pleasers
  chosen_spanish: los complacientes con los hombres
  alternatives_spanish:
  - los que agradan a los hombres
  - los buscadores de aprobación humana
  lexicon: LSJ
  rationale: '''Complacientes con los hombres'' reproduce el sentido compuesto de agradar a seres humanos sin introducir un matiz demasiado coloquial. Conserva la fuerza moral del término y evita una paráfrasis más amplia.'
- source_word: ὑπὸ θηρίων
  english_pob_choice: by wild beasts
  chosen_spanish: por las fieras
  alternatives_spanish:
  - por bestias salvajes
  - por animales salvajes
  lexicon: LSJ
  rationale: '''Fieras'' es una equivalencia natural y solemne en español bíblico para θηρία, y comunica la imagen de animales devoradores en un juicio infamante.'
- source_word: ὀστᾶ / οὐτὰ
  english_pob_choice: the bones
  chosen_spanish: los huesos
  alternatives_spanish:
  - los restos
  - los cadáveres
  lexicon: LSJ
  rationale: Aunque el paquete griego muestra una forma problemática, la revisión del texto identifica el término como 'huesos'. 'Los huesos' sigue el paralelismo con 'carne' y refleja la corrección textual documentada en el audit trail.
- source_word: παρανόμων
  english_pob_choice: of the lawless
  chosen_spanish: de los impíos
  alternatives_spanish:
  - de los sin ley
  - de los transgresores
  lexicon: LSJ
  rationale: '''Impíos'' es una opción idiomática y bíblica en español para quienes actúan contra la ley divina y humana. Mantiene el juicio moral del término sin sonar forzado, aunque ''sin ley'' conserva más literalmente el componente legal.'
- source_word: κατέναντι τοῦ ἡλίου
  english_pob_choice: before the sun
  chosen_spanish: delante del sol
  alternatives_spanish:
  - ante el sol
  - frente al sol
  lexicon: LSJ
  rationale: '''Delante del sol'' conserva la imagen de exposición pública y vergüenza en el espacio abierto. Es una traducción cercana al griego y natural en español.'
- source_word: ἐν ἀτιμίᾳ
  english_pob_choice: in dishonor
  chosen_spanish: en deshonra
  alternatives_spanish:
  - en vergüenza
  - en deshonor
  lexicon: LSJ
  rationale: '''Deshonra'' comunica bien ἀτιμία en un registro formal y mantiene el tono de humillación judicial del pasaje.'
theological_decisions:
- issue: Retener el tono imprecatorio del verso
  english_pob_reading: May the flesh ... be scattered ... and the bones ... lie ... in dishonor.
  chosen_spanish_reading: Que la carne ... sea dispersada ... y los huesos ... queden ... en deshonra.
  alternative_spanish_readings:
  - Ojalá la carne ... sea dispersada ...
  - Que la carne ... sea esparcida ...
  rationale: El verso funciona como imprecación, no como simple predicción. En español, la construcción con 'Que' conserva mejor ese valor volitivo y judicial.
  doctrine_reference: Salmos imprecatorios; lenguaje de juicio en la literatura sapiencial y devocional
- issue: Resolver la tensión textual de οὐτὰ / ὀστᾶ en favor de la lectura revisada
  english_pob_reading: the bones of the lawless
  chosen_spanish_reading: los huesos de los impíos
  alternative_spanish_readings:
  - los restos de los impíos
  - las osamentas de los impíos
  rationale: La revisión del expediente indica que la forma transmitida era una confusión OCR y que el texto de Swete imprime 'bones'. Por eso el español debe reflejar 'huesos' y no una solución indefinida.
  doctrine_reference: Crítica textual; prioridad del testimonio griego establecido en la base fuente
translation_notes:
  revision_awareness: El borrador español sigue la revisión aplicada que corrige la línea a 'bones' y mantiene la opción revisada para ἀνθρωπαρέσκων como 'people-pleasers'. También atiende el estatus textual problemático de οὐτὰ/ὀστᾶ documentado en el audit trail, reflejándolo como 'huesos' según la revisión más reciente.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' solo cuando corresponda al nombre divino; este verso no lo contiene.
  - Se ha preferido un registro bíblico contemporáneo ('fieras', 'deshonra', 'impíos') sin caer en calcos demasiado anglosajones.
  - '''Carne'' y ''huesos'' preservan el paralelismo corporal del bicolon griego.'
  - La nota al pie señala la alternativa semántica de ἀνθρωπαρέσκων sin duplicar marcadores ni introducir variantes textuales innecesarias.
