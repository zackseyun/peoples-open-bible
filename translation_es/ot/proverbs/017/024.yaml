  to: La sabiduría está ante el rostro de un hombre entendido[a][b], pero los ojos del necio están en los confines de la tierra[c].
  rationale: Se ajusta la frase principal para que el español conserve la imagen hebrea de «rostro» sin sonar como calco duro, se suaviza la expresión del participio con una formulación más natural y se corrige la nota sobre אָרֶץ para que refleje correctamente la alternativa léxica documentada en el POB inglés.
