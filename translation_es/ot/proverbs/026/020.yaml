    issue: «chismoso» para נִרְגָּן en el texto principal
    rationale: Aunque es comprensible, no preserva tan bien como «murmurador» la imagen de hablar dañinamente en secreto o en voz baja que el POB inglés quiso mantener con 'whisperer'.
  - severity: medium
    issue: La nota b usa el anglicismo «gossip»
    rationale: La nota debe estar enteramente en español y explicar la alternativa léxica con terminología natural para lectores hispanohablantes.
  - severity: low
    issue: La nota a sobre «leña» es defensible pero no necesaria
    rationale: No es incorrecta; puede mantenerse. «Leña» es una buena contextualización de עֵצִים como combustible.
