  glossary_alignment: Correcto en el uso de «Yahvé» para יְהוָה. No hay conflictos con otros términos del glosario. La decisión de mantener abierta la imagen de אֶבֶן לְפִנָּה mediante nota es adecuada; conviene expresarla en un español más natural en el texto principal.
