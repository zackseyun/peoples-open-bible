translation:
  language: es
  text: Entonces Belsasar dio la orden, y vistieron a Daniel de púrpura[a], le pusieron una cadena de oro alrededor de su cuello, y proclamaron acerca de él que sería el tercer gobernante en el reino[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «vistieron a Daniel con púrpura». El término arameo puede referirse a ropa púrpura o a tela púrpura como señal de honor real.
    reason: lexical_alternative
  - marker: b
    text: O «el tercer gobernante en el dominio». La frase denota rango dentro del reino, probablemente indicando la posición de Daniel como tercero en autoridad.
    reason: lexical_alternative
lexical_decisions:
- source_word: בֵּאדַיִן
  english_pob_choice: Then
  chosen_spanish: Entonces
  alternatives_spanish:
  - Luego
  - En ese momento
  lexicon: HALOT
  rationale: Marcador discursivo arameo que introduce la siguiente acción en secuencia. «Entonces» conserva la continuidad narrativa con un español natural y sobrio.
- source_word: אֲמַר
  english_pob_choice: gave the command
  chosen_spanish: dio la orden
  alternatives_spanish:
  - dijo
  - mandó
  lexicon: HALOT
  rationale: Aunque el verbo base es «decir», aquí funciona como una directiva real. «Dio la orden» refleja la fuerza performativa sin forzar el texto.
- source_word: בֵּלְשַׁאצַּר
  english_pob_choice: Belshazzar
  chosen_spanish: Belsasar
  alternatives_spanish:
  - Belshazar
  lexicon: transliteration
  rationale: Se adopta la transliteración española usual del nombre propio, manteniendo reconocimiento bíblico y fluidez en español.
- source_word: וְהַלְבִּישׁוּ לְדָנִיֵּאל אַרְגְּוָנָא
  english_pob_choice: they clothed Daniel with purple
  chosen_spanish: vistieron a Daniel de púrpura
  alternatives_spanish:
  - lo vistieron de púrpura
  - lo vistieron con púrpura
  lexicon: HALOT
  rationale: El causativo plural expresa que le pusieron vestidura u honor de púrpura. En español, «vestir de púrpura» suena natural y conserva la marca regia.
- source_word: ו/המונכ/א דִי דַהֲבָא
  english_pob_choice: a chain of gold
  chosen_spanish: un collar de oro
  alternatives_spanish:
  - una cadena de oro
  - un collar de oro
  lexicon: HALOT
  rationale: El término designa un adorno honorífico para el cuello. «Collar de oro» comunica bien la función ornamental y la dignidad regia en español actual.
- source_word: עַל צַוְּארֵהּ
  english_pob_choice: around his neck
  chosen_spanish: alrededor del cuello
  alternatives_spanish:
  - sobre su cuello
  - en su cuello
  lexicon: HALOT
  rationale: La preposición es literalmente «sobre», pero el giro español más claro para un adorno es «alrededor del cuello».
- source_word: וְהַכְרִזוּ עֲלֹוהִי
  english_pob_choice: and proclaimed concerning him
  chosen_spanish: y proclamaron acerca de él
  alternatives_spanish:
  - y anunciaron sobre él
  - y proclamaron respecto de él
  lexicon: HALOT
  rationale: El verbo expresa proclamación pública; la frase preposicional indica el contenido referente a Daniel. «Acerca de él» mantiene la referencia sin añadir interpretación.
- source_word: דִּי לֶהֱוֵא
  english_pob_choice: that he should be
  chosen_spanish: que sería
  alternatives_spanish:
  - que debía ser
  - que habría de ser
  lexicon: HALOT
  rationale: La construcción introduce el contenido del decreto/proclamación con matiz de designación. «Sería» comunica bien el resultado declarativo en español.
- source_word: שַׁלִּיט
  english_pob_choice: ruler
  chosen_spanish: gobernante
  alternatives_spanish:
  - ruler
  - uno con autoridad
  lexicon: HALOT
  rationale: En este contexto de corte y rango, «gobernante» suena natural en español y conserva la idea de autoridad ejercida.
- source_word: תַּלְתָּא
  english_pob_choice: third
  chosen_spanish: tercer
  alternatives_spanish:
  - tercero
  lexicon: HALOT
  rationale: Ordinal que indica rango. «Tercer» se ajusta al sustantivo siguiente y mantiene la referencia al puesto de honor prometido.
- source_word: בְּמַלְכוּתָא
  english_pob_choice: in the kingdom
  chosen_spanish: en el reino
  alternatives_spanish:
  - en el reino
  - en el dominio real
  lexicon: HALOT
  rationale: «Reino» es una equivalencia clara y consistente para el dominio real de la escena, sin añadir matices ajenos al texto.
translation_notes:
  revision_awareness: Se tomó como base el paquete fuente arameo y la auditoría inglesa; la versión española sigue la lectura de la POB en la secuencia narrativa, la orden real implícita en אֲמַר, y el valor honorífico-regio de la púrpura y del adorno de oro, sin introducir ampliaciones doctrinales no presentes en el versículo.
  spanish_consistency_notes:
  - Se conserva «Yahvé» como norma del proyecto, pero este versículo no contiene el nombre divino.
  - Se evita «Señor» para שַׁלִּיט; se prefiere un término de autoridad política.
  - «Púrpura» se mantiene sin explicar adicionalmente en el texto principal para preservar la concisión y el tono cortesano.
  - La frase «tercer gobernante» se formula como rango en el reino, no como título eclesiástico ni teológico.
