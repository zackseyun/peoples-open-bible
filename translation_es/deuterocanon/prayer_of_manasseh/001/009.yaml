translation:
  language: es
  text: Porque he pecado más allá del número de la arena del mar. Se han multiplicado mis transgresiones, Señor; se han multiplicado mis transgresiones, y no soy digno de mirar fijamente[a] y ver la altura del cielo a causa de la multitud de mis actos injustos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «mirar atentamente y ver la altura del cielo». El verbo griego puede enfatizar una mirada fija o intensa, no solo la dirección hacia arriba.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἥμαρτον
  english_pob_choice: I have sinned
  chosen_spanish: he pecado
  alternatives_spanish:
  - he errado
  - pequé
  lexicon: BDAG
  rationale: El aoristo confesional se expresa de forma natural en español con perfecto compuesto, que comunica una acción pasada con efecto presente. "He pecado" mantiene el tono de confesión personal sin endurecer el ritmo.
- source_word: ὑπὲρ ἀριθμὸν
  english_pob_choice: beyond the number of
  chosen_spanish: más allá del número de
  alternatives_spanish:
  - más que el número de
  - sobre el número de
  lexicon: LSJ
  rationale: La idea es de exceso respecto de toda cuantificación. "Más allá del número de" conserva la imagen intensiva y suena natural en español culto.
- source_word: ψάμμου θαλάσσης
  english_pob_choice: the sand of the sea
  chosen_spanish: la arena del mar
  alternatives_spanish:
  - la arena de la mar
  - la arena junto al mar
  lexicon: LSJ
  rationale: Se mantiene la imagen bíblica de innumerabilidad con una formulación idiomática en español. "La arena del mar" reproduce el valor proverbial sin calco torpe.
- source_word: ἐπλήθυναν
  english_pob_choice: have multiplied
  chosen_spanish: se han multiplicado
  alternatives_spanish:
  - han aumentado
  - se han hecho muchas
  lexicon: BDAG
  rationale: El verbo expresa hacerse numerosas. La voz media en español funciona bien con "se han multiplicado", conservando el aumento cuantitativo y el tono penitencial.
- source_word: ἀνομίαι
  english_pob_choice: lawless deeds
  chosen_spanish: actos sin ley
  alternatives_spanish:
  - iniquidades
  - transgresiones
  lexicon: BDAG
  rationale: La POB en inglés distinguió este término de ἀδικιῶν. En español, "actos sin ley" conserva esa fuerza legal-moral y evita aplanarlo en un sinónimo religioso más tradicional como "iniquidades".
- source_word: κύριε
  english_pob_choice: Lord
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Señor
  - oh Yahvé
  lexicon: BDAG
  rationale: Aunque el griego dice κύριε, aquí funciona como vocativo dirigido a Dios. Se sigue el criterio del proyecto de no enmascarar el nombre divino cuando la invocación corresponde al Dios de Israel; en español, "Yahvé" preserva esa identificación sin perder el tono de súplica.
- source_word: οὐκ εἰμὶ ἄξιος
  english_pob_choice: I am not worthy
  chosen_spanish: no soy digno
  alternatives_spanish:
  - no soy merecedor
  - no soy digno ni
  lexicon: BDAG
  rationale: '"No soy digno" es la equivalencia natural y solemne en español para la falta de mérito personal. Mantiene la humildad confesional del original.'
- source_word: ἀτενίσαι
  english_pob_choice: to look up
  chosen_spanish: mirar fijamente
  alternatives_spanish:
  - alzar la vista
  - mirar hacia arriba
  lexicon: BDAG
  rationale: La POB inglesa conservó la tensión entre orientación y fijación visual; en español, "mirar fijamente" recupera la posible intensidad del verbo griego, como la nota inglesa señala, y deja implícito el ascenso de la mirada hacia el cielo.
- source_word: ἰδεῖν
  english_pob_choice: see
  chosen_spanish: ver
  alternatives_spanish:
  - contemplar
  - mirar
  lexicon: BDAG
  rationale: Verbo básico de percepción visual; "ver" es la opción más directa y fiel en español moderno.
- source_word: τὸ ὕψος τοῦ οὐρανοῦ
  english_pob_choice: the height of heaven
  chosen_spanish: la altura del cielo
  alternatives_spanish:
  - la altura de los cielos
  - la elevación del cielo
  lexicon: LSJ
  rationale: Se preserva el singular de ὕψος con "altura", y οὐρανοῦ con "del cielo" para un español claro y reverente. No se pluraliza "cielos" porque el griego aquí es singular.
- source_word: ἀπὸ τοῦ πλήθους
  english_pob_choice: because of the multitude of
  chosen_spanish: a causa de la multitud de
  alternatives_spanish:
  - por la multitud de
  - debido a la multitud de
  lexicon: BDAG
  rationale: En este contexto ἀπό es causal. "A causa de" comunica la relación de manera natural sin perder la fuerza explicativa del original.
- source_word: ἀδικιῶν
  english_pob_choice: unrighteous acts
  chosen_spanish: actos injustos
  alternatives_spanish:
  - injusticias
  - iniquidades
  lexicon: BDAG
  rationale: Se mantiene la distinción del inglés POB respecto de ἀνομίαι. "Actos injustos" conserva la esfera moral/legal sin repetir exactamente la misma solución léxica que para el primer término.
theological_decisions:
- issue: Distinguir ἀνομίαι y ἀδικιῶν en una misma confesión
  english_pob_reading: Render ἀνομίαι as 'lawless deeds' and ἀδικιῶν as 'unrighteous acts'
  chosen_spanish_reading: Traducir ἀνομίαι como "actos sin ley" y ἀδικιῶν como "actos injustos"
  alternative_spanish_readings:
  - traducir ambos como "pecados"
  - traducir ambos como "iniquidades"
  rationale: El griego usa dos términos morales emparentados pero no idénticos. Mantener una distinción en español respeta la densidad retórica de la confesión y evita borrar una tensión léxica que el texto original sí presenta.
  doctrine_reference: DOCTRINE.md §5 Consistency of key terms, or documented exception
- issue: Tratamiento de κύριε en una invocación a Dios
  english_pob_reading: Lord
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Señor
  - Oh Señor
  rationale: Aunque el griego usa κύριε, el contexto es una súplica dirigida al Dios de Israel. Conforme al criterio del proyecto, se expone el nombre divino en vez de ocultarlo con "Señor"; esto mantiene la transparencia del texto fuente y la coherencia terminológica del POB.
  doctrine_reference: 'DOCTRINE.md Contested terms: יהוה / YHWH → Yahvé'
translation_notes:
  revision_awareness: El borrador sigue el paquete fuente griego y el audit trail inglés sin cambios sustanciales respecto de la última pasada revisada; se conserva la distinción léxica entre ἀνομίαι y ἀδικιῶν, y la nota sobre ἀτενίσαι se refleja en una nota española equivalente.
  spanish_consistency_notes:
  - Se mantiene "Yahvé" según el estándar del proyecto para el nombre divino.
  - Se conserva la diferencia semántica entre "actos sin ley" y "actos injustos" para no aplanar dos términos griegos distintos.
  - El registro es confesional, sobrio y publicable en español latinoamericano neutro.
  - La nota al pie marca solo la alternativa relevante para ἀτενίσαι, con el marcador [a] en el texto.
