review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien la estructura básica del hebreo: hicieron las piedras, en engastes de oro, grabadas al estilo de sello, según los nombres de los hijos de Israel. También preserva correctamente la nota sobre la incertidumbre de שֹׁהַם. Sin embargo, dos elecciones debilitan la fidelidad fina al sentido y al español natural: ''enclavadas'' no comunica bien la idea de piedras rodeadas o montadas en engastes, y ''grabadas como grabados de sello'' suena torpe en español, aunque intenta reflejar la construcción cognada hebrea.'
  spanish_quality_summary: El texto es comprensible, pero 'enclavadas' resulta poco idiomático y puede sugerir clavar o incrustar de manera impropia para joyería; 'montadas' o 'engastadas' suena más natural y preciso. Además, 'grabadas como grabados de sello' es demasiado calcado; 'grabadas como las inscripciones de un sello' mantiene la imagen y mejora mucho la legibilidad. El resto del versículo está en un español claro y digno.
  glossary_alignment: No hay conflictos con la terminología base del proyecto. 'ónice' con nota alternativa está bien. 'los hijos de Israel' preserva adecuadamente בְּנֵי יִשְׂרָאֵל conforme a la política documentada. No aparecen términos sensibles del glosario principal como Yahvé, Mesías o esclavo.
  issues:
  - severity: medium
    issue: '''enclavadas en engastes de oro'''
    rationale: '''Enclavadas'' no es la mejor equivalencia para מֻסַבֹּת מִשְׁבְּצֹת זָהָב. En contexto de orfebrería bíblica, la idea es estar montadas/engastadas/rodeadas por engastes de oro, no ''enclavadas''.'
  - severity: medium
    issue: '''grabadas como grabados de sello'''
    rationale: Aunque busca conservar la repetición hebrea, en español suena duro y poco natural. Una formulación como 'grabadas como las inscripciones de un sello' preserva mejor el sentido de פִּתּוּחֵי חוֹתָם sin calco torpe.
  revised_spanish_text: Y hicieron las piedras de ónice[a], montadas en engastes de oro, grabadas como las inscripciones de un sello, según los nombres de los hijos de Israel.
  revised_footnotes:
  - marker: a
    text: O posiblemente ‘piedras de shoham’; la identificación exacta de la gema es incierta, aunque ‘ónice’ es la traducción tradicional.
    reason: lexical_alternative
  revision_rationale: Se ajusta 'enclavadas' a 'montadas' para reflejar mejor el hebreo de piedras rodeadas/fijadas en engastes de oro con español natural de joyería. Se reemplaza 'grabadas como grabados de sello' por 'grabadas como las inscripciones de un sello' para conservar la imagen de grabado de sello sin un calco incómodo. Se mantiene la nota sobre 'shoham' y la expresión 'los hijos de Israel' por fidelidad al original y a la política del proyecto.
