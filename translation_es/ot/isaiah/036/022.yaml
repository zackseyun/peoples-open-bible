  yaml_path: translation/ot/isaiah/036/022.yaml
  text: Then Eliakim son of Hilkiah[a], who was over the household, and Shebna the scribe, and Joah son of Asaph, the recorder, came to Hezekiah with their clothes torn and told him the words of the Rabshakeh.
  footnotes:
