translation:
  language: es
  text: 'Y los hijos de Israel oyeron decir[a]: «Mira, los hijos de Rubén, los hijos de Gad y la media tribu de Manasés han edificado el altar frente a la tierra de Canaán, en la región del Jordán[b][c], del lado de los hijos de Israel[d]»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «los hijos de Israel oyeron, diciendo», tomando לֵאמֹר de manera más literal; la redacción principal suaviza la fórmula hebrea de reporte.
    reason: lexical_alternative
  - marker: b
    text: O «de cara a la tierra de Canaán» para «frente a la tierra de Canaán».
    reason: lexical_alternative
  - marker: c
    text: 'Hebreo: «las regiones/distritos del Jordán»; el matiz geográfico exacto de la expresión es incierto.'
    reason: cultural_note
  - marker: d
    text: O «frente a los hijos de Israel» / «al otro lado respecto de los hijos de Israel». La frase final puede señalar el lado perteneciente a Israel al oeste del Jordán o una posición opuesta a ellos.
    reason: alternative_reading
lexical_decisions:
- source_word: וַיִּשְׁמְעוּ
  english_pob_choice: heard
  chosen_spanish: oyeron decir
  alternatives_spanish:
  - oyeron
  - escucharon decir
  lexicon: HALOT
  rationale: La forma narrativa comunica recepción de un informe; en español, «oyeron decir» conserva ese valor reportativo sin perder naturalidad. Evita suponer que oyeron directamente el hecho, que viene introducido por לֵאמֹר.
- source_word: בְנֵי יִשְׂרָאֵל
  english_pob_choice: the sons of Israel
  chosen_spanish: los hijos de Israel
  alternatives_spanish:
  - los israelitas
  - el pueblo de Israel
  lexicon: HALOT
  rationale: Se conserva la formulación familiar y nacional del hebreo, coherente con la repetición del pasaje. «Israelitas» sería más idiomático, pero suaviza la transparencia del original.
- source_word: לֵאמֹר
  english_pob_choice: it said
  chosen_spanish: decir
  alternatives_spanish:
  - diciendo
  - que
  lexicon: HALOT
  rationale: En español, la fórmula reportativa se expresa con una construcción equivalente a «oír decir». Mantiene la función de introducir contenido indirecto sin forzar una traducción literal torpe.
- source_word: הִנֵּה
  english_pob_choice: Look
  chosen_spanish: Mira
  alternatives_spanish:
  - He aquí
  - Miren
  lexicon: HALOT
  rationale: «Mira» reproduce el llamado de atención del hebreo de manera clara y moderna. Se evita «He aquí» por su tono más arcaico.
- source_word: בָנוּ
  english_pob_choice: have built
  chosen_spanish: han edificado
  alternatives_spanish:
  - han construido
  - han levantado
  lexicon: HALOT
  rationale: «Edificar» es un equivalente natural y suficientemente formal para un altar, y conserva mejor el registro bíblico que «construir» o «levantar».
- source_word: הַמִּזְבֵּחַ
  english_pob_choice: the altar
  chosen_spanish: el altar
  alternatives_spanish:
  - un altar
  lexicon: HALOT
  rationale: El artículo definido está presente en hebreo; «el altar» es la opción más fiel y contextual.
- source_word: אֶל מוּל אֶרֶץ כְּנַעַן
  english_pob_choice: opposite the land of Canaan
  chosen_spanish: frente a la tierra de Canaán
  alternatives_spanish:
  - opuesto a la tierra de Canaán
  - de cara a la tierra de Canaán
  lexicon: HALOT
  rationale: «Frente a» comunica la relación espacial de מוּל de modo natural en español. Conserva la idea de orientación/oposición sin hacerla excesivamente técnica.
- source_word: גְּלִילוֹת הַיַּרְדֵּן
  english_pob_choice: the region of the Jordan
  chosen_spanish: la región del Jordán
  alternatives_spanish:
  - los distritos del Jordán
  - las regiones del Jordán
  lexicon: HALOT
  rationale: «Región» recoge bien el sentido geográfico incierto de גְּלִילוֹת sin comprometerse con una delimitación más precisa de la que el texto no da.
- source_word: אֶל עֵבֶר בְּנֵי יִשְׂרָאֵל
  english_pob_choice: on the side of the sons of Israel
  chosen_spanish: al lado de los hijos de Israel
  alternatives_spanish:
  - del lado de los hijos de Israel
  - frente a los hijos de Israel
  - al otro lado respecto de los hijos de Israel
  lexicon: HALOT
  rationale: La frase final es geográficamente difícil; «al lado de» mantiene la relación espacial más general sin fijar indebidamente si la referencia es al lado occidental, al lado perteneciente a Israel o simplemente al lado opuesto. Se preserva así la tensión interpretativa documentada por el POB.
theological_decisions:
- issue: Mantenimiento de la terminología familiar/nacional 'hijos de Israel'
  english_pob_reading: the sons of Israel
  chosen_spanish_reading: los hijos de Israel
  alternative_spanish_readings:
  - los israelitas
  - el pueblo de Israel
  rationale: No hay una carga doctrinal especial, pero la repetición de la expresión en la perícopa pide mantener la forma hebrea transparente. Esto evita diluir el eco literario del texto y permite seguir el desarrollo narrativo con precisión.
  doctrine_reference: No aplica; decisión literaria y de equivalencia léxica
- issue: Relación espacial final ambigua ('al lado de los hijos de Israel')
  english_pob_reading: on the side of the sons of Israel
  chosen_spanish_reading: al lado de los hijos de Israel
  alternative_spanish_readings:
  - frente a los hijos de Israel
  - del lado de los hijos de Israel
  - al otro lado respecto de los hijos de Israel
  rationale: El hebreo permite más de una lectura sobre la localización exacta. La traducción conserva esa ambigüedad en vez de resolverla de manera interpretativa, en línea con el aparato auditado del POB.
  doctrine_reference: No aplica; variante geográfica/textual
translation_notes:
  revision_awareness: La versión española sigue la revisión más reciente del POB, que prefirió la formulación más literal y natural «on the side of the sons of Israel» frente a la más interpretativa «belonging to». Por eso se opta por «al lado de los hijos de Israel», manteniendo la ambigüedad geográfica observada en el audit trail.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma general del proyecto cuando aparezca el nombre divino, aunque este versículo no lo contiene.
  - Se usa «hijos de Israel» para conservar la transparencia del hebreo, coherente con la decisión inglesa.
  - «Frente a» y «al lado de» respetan la oscilación semántica espacial documentada en el original y en la auditoría inglesa.
  - No se introduce terminología eclesiástica ajena al texto; el versículo es narrativo-geográfico y se traduce con registro sobrio y claro.
