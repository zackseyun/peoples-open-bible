translation:
  language: es
  text: También dale lugar[a] al médico, y no lo despidas, porque también de él hay necesidad.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'El griego añade: «porque el Señor lo creó», antes de «y no lo despidas».'
    reason: textual_variant
lexical_decisions:
- source_word: וגם / καὶ
  english_pob_choice: Also
  chosen_spanish: También
  alternatives_spanish:
  - Además
  - Y también
  lexicon: HALOT
  rationale: Conserva el valor aditivo de apertura sin sonar pesado; en español introduce naturalmente una exhortación adicional.
- source_word: לרופא / ἰατρῷ
  english_pob_choice: the physician
  chosen_spanish: al médico
  alternatives_spanish:
  - al doctor
  - al físico
  lexicon: HALOT
  rationale: En español actual, 'médico' comunica con claridad el oficio de curar. 'Médico' mantiene el registro sobrio de sabiduría y evita un calco forzado.
- source_word: תן מקום / δὸς τόπον
  english_pob_choice: give ... a place
  chosen_spanish: da lugar
  alternatives_spanish:
  - hazle lugar
  - dale un lugar
  - da espacio
  lexicon: HALOT
  rationale: La expresión española 'dar lugar' reproduce de forma natural la imagen concreta de 'dar lugar' y mantiene la fuerza idiomática del hebreo y del griego sin explicitarla de más.
- source_word: ולא ימוש / μὴ ἀποστήτῳ σου
  english_pob_choice: do not dismiss him
  chosen_spanish: no lo despidas
  alternatives_spanish:
  - no lo dejes ir
  - no permitas que se aparte de ti
  - no lo retires
  lexicon: HALOT
  rationale: '''Despedir'' en español puede significar enviar a alguien fuera o apartarlo; aquí expresa bien la idea de no mandarlo lejos ni prescindir de él. Evita una formulación demasiado literal que sonaría menos natural.'
- source_word: כי גם בו צורך / αὐτοῦ χρεία
  english_pob_choice: for there is need of him as well
  chosen_spanish: porque también de él hay necesidad
  alternatives_spanish:
  - porque también lo necesitas
  - pues también es necesario
  - porque él también es necesario
  lexicon: HALOT
  rationale: La construcción impersonal 'hay necesidad de' preserva el giro semítico y la fuerza general de utilidad/urgencia. 'También de él' mantiene el énfasis de גם/καὶ γάρ sin convertirlo en un comentario explicativo.
theological_decisions:
- issue: La cláusula griega 'porque el Señor lo creó' no aparece en el hebreo base
  english_pob_reading: Translate the Hebrew base text while allowing the Greek to confirm the sense, without importing the Greek addition 'for the Lord created him.'
  chosen_spanish_reading: No incluir en el texto principal la adición 'porque Yahvé lo creó'; dejarla solo como nota textual del griego.
  alternative_spanish_readings:
  - También da lugar al médico, porque Yahvé lo creó, y no lo despidas, porque también de él hay necesidad.
  - También da lugar al médico, pues Yahvé lo creó, y no lo despidas, porque también de él hay necesidad.
  rationale: El testimonio hebreo conservado es la base primaria para esta unidad; el griego aporta una expansión teológicamente significativa, pero no debe desplazar la lección hebrea en el cuerpo del texto. La nota preserva la tensión textual y permite auditarla.
  doctrine_reference: 'PHILOSOPHY.md: prioridad del hebreo conservado; el griego se usa como apoyo y testimonio paralelo, no como reemplazo automático.'
translation_notes:
  revision_awareness: La redacción sigue la revisión que prefirió 'no lo despidas' frente a 'no lo dejes partir', por reflejar mejor el sentido de no echar al médico ni prescindir de él, manteniendo el paralelo semítico sin sobretraducirlo. La nota textual conserva la adición griega documentada por el aparato en inglés.
  spanish_consistency_notes:
  - Se usa 'médico' para el oficio, en lugar de 'doctor', por registro bíblico sobrio y comprensión amplia.
  - Se mantiene 'Yahvé' conforme a la terminología POB cuando el añadido griego menciona al Señor; no se introduce en el texto principal porque no está en el hebreo base.
  - La puntuación separa con comas las exhortaciones para conservar el ritmo sapiencial breve del original.
