  text: וְ/אַתָּ֞ה אָמַ֤רְתָּ אֵלַ/י֙ אֲדֹנָ֣/י יְהוִ֔ה קְנֵֽה לְ/ךָ֧ הַ/שָּׂדֶ֛ה בַּ/כֶּ֖סֶף וְ/הָעֵ֣ד עֵדִ֑ים וְ/הָ/עִ֥יר נִתְּנָ֖ה בְּ/יַ֥ד הַ/כַּשְׂדִּֽים־׃
base_translation:
  language: en
  yaml_path: translation/ot/jeremiah/032/025.yaml
  text: Yet you yourself said to me[a], Lord Yahweh[b], ‘Buy the field for yourself with silver and call witnesses,’ though the city has been given into the hand of the Chaldeans.
  footnotes:
  - marker: a
    text: Or, 'while the city has been given into the hand of the Chaldeans.' The Hebrew conjunction can be read more simply as 'and/while'; the main text brings out the concessive force in Jeremiah's complaint.
    reason: alternative_reading
  - marker: b
    text: '''Chaldeans'' refers to the Babylonian power.'
    reason: cultural_note
