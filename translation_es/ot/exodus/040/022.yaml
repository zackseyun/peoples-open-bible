  source_alignment_summary: 'El borrador refleja bien la estructura básica del hebreo: acción de colocar, «la mesa», ubicación en el santuario, lado norte, y posición fuera de la cortina interior. Sin embargo, «tabernáculo de reunión» para בְּאֹהֶל מוֹעֵד no sigue de cerca el referente léxico primario «tienda/tent», y además crea tensión en el mismo versículo con הַמִּשְׁכָּן, que sí corresponde a «tabernáculo».'
  spanish_quality_summary: 'El español es claro y eclesialmente legible, pero presenta dos detalles mejorables: la nota al pie está anclada en «mesa» aunque explica «velo/cortina», y «al lado norte» suena menos natural que «en el lado norte». También conviene distinguir «tienda de reunión» de «tabernáculo» para evitar repetir «tabernáculo» con dos términos hebreos distintos.'
  glossary_alignment: 'No hay términos del glosario mayor en juego como Yahvé o Mesías. La principal cuestión terminológica es interna al pasaje: conservar la distinción entre אֹהֶל מוֹעֵד = «tienda de reunión» y מִשְׁכָּן = «tabernáculo». «Fuera del velo» es aceptable, con nota sobre «cortina».'
