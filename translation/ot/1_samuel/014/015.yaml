id: 1SA.14.15
reference: 1 Samuel 14:15
source:
  edition: WLC
  text: וַ/תְּהִי֩ חֲרָדָ֨ה בַ/מַּחֲנֶ֤ה בַ/שָּׂדֶה֙ וּ/בְ/כָל הָ/עָ֔ם הַ/מַּצָּב֙ וְ/הַ/מַּשְׁחִ֔ית חָרְד֖וּ גַּם הֵ֑מָּה וַ/תִּרְגַּ֣ז הָ/אָ֔רֶץ וַ/תְּהִ֖י לְ/חֶרְדַּ֥ת אֱלֹהִֽים־־׃
translation:
  text: And there was trembling in the camp[a], in the field, and among all the people; the garrison and the raiding party also trembled. And the earth quaked, so that it became a trembling from God.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'a very great trembling' or 'a divine terror.' The Hebrew phrase can express either source ('from God') or intensity.
    reason: alternative_reading
lexical_decisions:
- source_word: חֲרָדָה
  chosen: trembling
  alternatives:
  - terror
  - panic
  lexicon: HALOT
  rationale: The noun denotes trembling/shuddering from fear. 'Trembling' preserves the concrete image and allows the repeated חרד/חרדה wordplay in the verse to remain audible; 'panic' is possible but more interpretive.
- source_word: בַמַּחֲנֶה
  chosen: in the camp
  alternatives:
  - throughout the camp
  lexicon: HALOT
  rationale: Locative sense is straightforward; 'in the camp' is the most direct rendering.
- source_word: בַשָּׂדֶה
  chosen: in the field
  alternatives:
  - in the open country
  lexicon: HALOT
  rationale: שָׂדֶה commonly means 'field' or countryside. 'In the field' is formally close; broader nuance is preserved by context.
- source_word: וּבְכָל הָעָם
  chosen: and among all the people
  alternatives:
  - and among all the troops
  - and among all the army
  lexicon: HALOT
  rationale: עָם can mean 'people' generally or troops in military context. 'People' keeps the Hebrew term while still fitting the scene; the military nuance is possible but not necessary in the main text.
- source_word: הַמַּצָּב
  chosen: the garrison
  alternatives:
  - the outpost
  - the stationed troops
  lexicon: HALOT
  rationale: In this context the term refers to a military post or force stationed in place. 'Garrison' is idiomatic and contextually precise.
- source_word: הַמַּשְׁחִית
  chosen: the raiding party
  alternatives:
  - the destroyer
  - the spoilers
  lexicon: HALOT
  rationale: Although the form could be rendered more literally as 'the destroyer,' in military narrative it likely denotes the marauding unit or raiders. 'Raiding party' communicates the function in readable English.
- source_word: חָרְדוּ גַּם הֵמָּה
  chosen: also trembled
  alternatives:
  - they too trembled
  lexicon: HALOT
  rationale: The clause emphasizes that even these military elements were seized by fear. English smoothness favors 'also trembled,' while preserving the emphatic גם המה sense.
- source_word: וַתִּרְגַּז הָאָרֶץ
  chosen: The earth quaked
  alternatives:
  - the land trembled
  - the earth shook
  lexicon: HALOT
  rationale: רגז here refers to shaking/quaking. 'The earth quaked' is vivid and natural, and fits the escalation from human fear to cosmic disturbance.
- source_word: לְחֶרְדַּת אֱלֹהִים
  chosen: a trembling from God
  alternatives:
  - a very great trembling
  - a divine terror
  - an exceedingly great panic
  lexicon: HALOT
  rationale: The genitive with אֱלֹהִים can be understood as source ('from God') or as an intensifying/genitival superlative ('great'). Given the narrative context and the common biblical attribution of extraordinary events to God, 'from God' best preserves the theological force without overparaphrase. The alternative intensifying sense is worth preserving in a footnote.
