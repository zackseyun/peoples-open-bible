translation:
  language: es
  text: Y tú, ¿buscas para ti cosas grandes? No las busques, porque he aquí que traigo mal sobre toda carne[a], declara Yahvé. Pero te daré tu vida como botín[b] en todos los lugares por donde vayas.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «toda la humanidad». El hebreo dice literalmente «toda carne», un modismo bíblico para todas las personas o todos los mortales en vista.
    reason: lexical_alternative
  - marker: b
    text: Literalmente, «te daré tu vida como botín», un modismo que significa que escapará con vida, aunque pierda todo lo demás.
    reason: cultural_note
lexical_decisions:
- source_word: וְאַתָּה
  english_pob_choice: And you, are you seeking
  chosen_spanish: Y tú, ¿estás buscando
  alternatives_spanish:
  - Y tú, ¿buscas
  - Y en cuanto a ti, ¿estás buscando
  lexicon: HALOT
  rationale: El hebreo adelanta el pronombre para marcar contraste y énfasis. En español, «Y tú» conserva ese giro enfático sin forzar una construcción extraña; el presente progresivo comunica la acción en curso de manera natural y solemne.
- source_word: גְדֹל֖וֹת
  english_pob_choice: great things
  chosen_spanish: cosas grandes
  alternatives_spanish:
  - grandes cosas
  - cosas importantes
  lexicon: HALOT
  rationale: La pluralidad sustantivada apunta a aspiraciones, metas o pretensiones grandes sin precisarlas. «Cosas grandes» mantiene la amplitud del hebreo y su tono retórico, evitando restringirlo solo a estatus o éxito.
- source_word: אַל תְּבַקֵּשׁ
  english_pob_choice: Do not seek them
  chosen_spanish: No las busques
  alternatives_spanish:
  - No busques
  - No continúes buscándolas
  lexicon: HALOT
  rationale: El hebreo repite el verbo de la primera cláusula con fuerza prohibitiva. En español, el objeto pronominal femenino plural remite a «cosas grandes» y hace clara la referencia sin añadir explicación.
- source_word: הִנְנִי מֵבִיא
  english_pob_choice: behold, I am bringing
  chosen_spanish: he aquí, yo estoy trayendo
  alternatives_spanish:
  - mira, yo traigo
  - ciertamente, yo traigo
  lexicon: HALOT
  rationale: «He aquí» conserva el registro profético y la inmediatez solemne del hebreo. «Yo estoy trayendo» refleja el participio de acción inminente de manera suficientemente directa en español.
- source_word: רָעָה
  english_pob_choice: disaster
  chosen_spanish: mal
  alternatives_spanish:
  - desgracia
  - calamidad
  lexicon: HALOT
  rationale: En este contexto judicial, el término no describe mal moral en Dios, sino una calamidad enviada. «Mal» mantiene la ambigüedad amplia del hebreo y deja ver la tensión semántica sin resolverla por completo; en español bíblico, el contexto limita su sentido.
- source_word: כָּל בָּשָׂר
  english_pob_choice: all flesh
  chosen_spanish: toda carne
  alternatives_spanish:
  - toda la humanidad
  - todos los seres humanos
  lexicon: HALOT
  rationale: Se preserva el idiomismo bíblico literal. «Toda carne» conserva la textura original y el alcance universal de la amenaza, sin sustituirlo por una paráfrasis que borre la expresión hebrea.
- source_word: נְאֻם יְהוָה
  english_pob_choice: declares Yahweh
  chosen_spanish: declara Yahvé
  alternatives_spanish:
  - dice Yahvé
  - oráculo de Yahvé
  lexicon: HALOT
  rationale: 'Se mantiene el nombre divino según la convención del proyecto: «Yahvé». «Declara» reproduce la fórmula profética con dignidad formal y evita la sustitución por un equivalente litúrgico que ocultaría el nombre del original.'
- source_word: נַפְשְׁךָ
  english_pob_choice: your life
  chosen_spanish: tu vida
  alternatives_spanish:
  - tu alma
  - tu ser
  lexicon: HALOT
  rationale: Aquí נֶפֶשׁ se refiere a la vida preservada, no específicamente al alma inmaterial. «Tu vida» comunica con precisión el sentido del idiomismo en contexto.
- source_word: לְשָׁלָל
  english_pob_choice: as plunder
  chosen_spanish: como botín
  alternatives_spanish:
  - como presa
  - como despojo
  lexicon: HALOT
  rationale: La imagen es la de sobrevivir con la vida como único «botín». «Como botín» conserva la metáfora bélica y el sentido idiomático sin neutralizarla.
- source_word: עַל כָּל הַמְּקֹמוֹת אֲשֶׁר תֵּלֶךְ שָׁם
  english_pob_choice: in all the places where you go
  chosen_spanish: en todos los lugares por donde vayas
  alternatives_spanish:
  - en todos los lugares a donde vayas
  - dondequiera que vayas
  lexicon: HALOT
  rationale: El plural hebreo pide una expresión distributiva. «En todos los lugares por donde vayas» es natural en español y conserva la amplitud geográfica sin volverlo una paráfrasis demasiado libre.
theological_decisions:
- issue: Renderización del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Señor
  - Jehová
  rationale: El texto hebreo usa directamente el Tetragrámaton. Siguiendo la convención del POB en español y su principio de transparencia textual, se conserva el nombre divino en forma explícita, no como título sustituto.
  doctrine_reference: 'DOCTRINE.md: contested terms — YHWH -> Yahvé'
- issue: Alcance de כָּל בָּשָׂר
  english_pob_reading: all flesh
  chosen_spanish_reading: toda carne
  alternative_spanish_readings:
  - toda la humanidad
  - todas las personas
  rationale: Se preserva el idiomismo bíblico, que comunica universalidad y mantiene la tensión literaria del hebreo. La frase no se aclara con una equivalencia más explicativa porque el POB privilegia la huella del original cuando es comprensible.
  doctrine_reference: 'DOCTRINE.md translation philosophy: original-language primacy; preserve theological tension rather than resolve it'
- issue: Sentido de רָעָה en un contexto de juicio
  english_pob_reading: disaster
  chosen_spanish_reading: mal
  alternative_spanish_readings:
  - desgracia
  - calamidad
  rationale: Aunque «mal» puede sonar ambiguo, esa ambigüedad corresponde al hebreo y permite distinguir entre mal moral y mal/calamidad enviada. El contexto profético dirige la lectura sin necesidad de cerrar el campo semántico.
  doctrine_reference: 'DOCTRINE.md: preserve lexical tension where the source does'
translation_notes:
  revision_awareness: La redacción refleja la última revisión del audit trail en cuanto a la expresión distributiva «en todos los lugares por donde vayas» y la preservación del nombre divino explícito. También mantiene el registro profético formal sin el guion enfático añadido en una fase anterior del inglés.
  spanish_consistency_notes:
  - Se usa «Yahvé» de forma consistente para יְהוָה, conforme al estándar del proyecto.
  - Se preserva el idiomatismo «toda carne» para כָּל בָּשָׂר.
  - «Tu vida» se usa para נַפְשְׁךָ por el sentido contextual de supervivencia.
  - «Botín» mantiene la imagen bélica de לְשָׁלָל sin explicarla en el texto principal.
  - La puntuación conserva el tono profético y la interrogación retórica del hebreo.
