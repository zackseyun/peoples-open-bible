translation:
  language: es
  text: 'Y los hijos de Benjamín: Bela, Beker[a], Ashbel, Gera, Naamán, Ehi[b], Rosh, Muppim[c], Huppim, y Ard[d].'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Las versiones inglesas tradicionales suelen escribir בֶּכֶר como «Becher».
    reason: lexical_alternative
  - marker: b
    text: En Números 26:38, una genealogía paralela de Benjamín tiene «Ahiram» donde este versículo dice «Ehi».
    reason: cross_reference
  - marker: c
    text: Algunas tradiciones genealógicas paralelas tienen una variante como «Shuppim» en lugar de «Muppim»; esta traducción sigue aquí el Texto Masorético.
    reason: textual_variant
  - marker: d
    text: 1 Crónicas 8:3 tiene la forma relacionada «Addar» en una genealogía benjaminita; este versículo dice «Ard».
    reason: cross_reference
lexical_decisions:
- source_word: וּבְנֵי
  english_pob_choice: And the sons of
  chosen_spanish: Y los hijos de
  alternatives_spanish:
  - Ahora los hijos de
  - Los hijos de
  lexicon: HALOT
  rationale: En una lista genealógica, «hijos de» reproduce naturalmente el sentido del constructo plural. Conservar la conjunción inicial «Y» refleja el waw hebreo y la continuidad de la enumeración.
- source_word: בִנְיָמִן
  english_pob_choice: Benjamin
  chosen_spanish: Benjamín
  alternatives_spanish:
  - Benjamin
  lexicon: HALOT
  rationale: Nombre propio bíblico en forma española estándar, con acento ortográfico para la pronunciación natural del español.
- source_word: בֶּלַע
  english_pob_choice: Bela
  chosen_spanish: Bela
  alternatives_spanish:
  - Bela
  lexicon: HALOT
  rationale: Nombre propio; se mantiene la transliteración breve y estándar en español.
- source_word: בֶּכֶר
  english_pob_choice: Beker
  chosen_spanish: Beker
  alternatives_spanish:
  - Becher
  lexicon: HALOT
  rationale: Se prefiere una forma más cercana a las consonantes del hebreo en este versículo. La forma tradicional inglesa «Becher» no se adopta en el texto principal por no ser la lectura más fuente-cercana.
- source_word: אַשְׁבֵּל
  english_pob_choice: Ashbel
  chosen_spanish: Ashbel
  alternatives_spanish:
  - Asbel
  lexicon: HALOT
  rationale: Nombre propio transliterado; se conserva la aspiración inicial reflejada en la forma fuente-near.
- source_word: גֵּרָא
  english_pob_choice: Gera
  chosen_spanish: Gera
  alternatives_spanish:
  - Gera
  lexicon: HALOT
  rationale: Nombre propio; transliteración estándar y directa.
- source_word: נַעֲמָן
  english_pob_choice: Naaman
  chosen_spanish: Naamán
  alternatives_spanish:
  - Naaman
  lexicon: HALOT
  rationale: Nombre propio transliterado al español con acento gráfico por acentuación natural.
- source_word: אֵחִי
  english_pob_choice: Ehi
  chosen_spanish: Ehi
  alternatives_spanish:
  - Ahiram
  lexicon: HALOT
  rationale: La forma masorética de este versículo es אֵחִי, por lo que se transcribe como «Ehi». La alternativa paralela «Ahiram» pertenece a otra tradición genealógica y no sustituye la lectura presente.
- source_word: רֹאשׁ
  english_pob_choice: Rosh
  chosen_spanish: Rosh
  alternatives_spanish:
  - Cabeza
  - Jefe
  lexicon: HALOT
  rationale: Aquí funciona como nombre propio dentro de la genealogía, no como sustantivo común; por eso se translitera en lugar de traducirse.
- source_word: מֻפִּים
  english_pob_choice: Muppim
  chosen_spanish: Mupim
  alternatives_spanish:
  - Muppim
  - Shuppim
  lexicon: HALOT
  rationale: Se conserva el nombre propio según el hebreo masorético del versículo. En español, una sola p puede acomodar la transliteración sin perder identificación; la variante tradicional inglesa y la tradición paralela se reservan como alternativas.
- source_word: חֻפִּים
  english_pob_choice: Huppim
  chosen_spanish: Hupim
  alternatives_spanish:
  - Huppim
  lexicon: HALOT
  rationale: Nombre propio; en español puede representarse con una sola p para una transliteración más fluida, manteniendo la correspondencia con el hebreo.
- source_word: אָרְדְּ
  english_pob_choice: Ard
  chosen_spanish: Ard
  alternatives_spanish:
  - Addar
  lexicon: HALOT
  rationale: Se translitera el nombre tal como aparece en este versículo. La variante paralela «Addar» se reconoce solo como tradición relacionada, no como sustitución del texto base.
translation_notes:
  revision_awareness: Se siguió la lectura hebrea masorética del versículo y se mantuvo la estrategia del POB inglés de priorizar la forma del texto presente sobre variantes genealógicas paralelas. No se introdujeron notas textuales porque el registro español puede reflejar las mismas decisiones lexicales directamente en el texto o en las decisiones léxicas.
  spanish_consistency_notes:
  - Se mantuvo «hijos de» como fórmula genealógica natural y fiel al hebreo.
  - Los nombres propios se transliteran de manera consistente y sin castellanizaciones innecesarias.
  - Se respetó la distinción entre la forma masorética presente y las variantes paralelas sin mezclar tradiciones en el texto principal.
