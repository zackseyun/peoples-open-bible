translation:
  language: es
  text: 'Pero esto es lo que ustedes harán con ellos: derribarán sus altares, quebrarán sus pilares[a], cortarán sus postes de Asera[b] y quemarán sus imágenes talladas[c] en el fuego.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «sus pilares sagrados» o «sus piedras erguidas».
    reason: lexical_alternative
  - marker: b
    text: Hebreo Aserim; probablemente objetos de culto de madera asociados con la diosa Asera.
    reason: cultural_note
  - marker: c
    text: O «sus ídolos»; el hebreo dice más específicamente «sus imágenes talladas».
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי אִם
  english_pob_choice: But
  chosen_spanish: Pero
  alternatives_spanish:
  - Sin embargo
  - Antes bien
  lexicon: HALOT
  rationale: La expresión introduce un contraste fuerte con la instrucción anterior; «Pero» reproduce con naturalidad ese valor adversativo en español sin debilitarlo.
- source_word: כֹּה
  english_pob_choice: this is what
  chosen_spanish: esto es lo que
  alternatives_spanish:
  - así
  - de esta manera
  lexicon: HALOT
  rationale: El deíctico señala la acción que sigue. «Esto es lo que» conserva esa función introductoria con un español claro y digno.
- source_word: תַעֲשׂוּ לָהֶם
  english_pob_choice: you shall do to them
  chosen_spanish: ustedes harán con ellos
  alternatives_spanish:
  - ustedes deberán hacerles
  - harán esto con ellos
  lexicon: HALOT
  rationale: En un contexto instructivo, el imperfecto tiene fuerza imperativa. La construcción con «harán con ellos» mantiene esa directividad y evita un calco demasiado rígido.
- source_word: מִזְבְּחֹתֵיהֶם תִּתֹּצוּ
  english_pob_choice: you shall tear down their altars
  chosen_spanish: derribarán sus altares
  alternatives_spanish:
  - demolerán sus altares
  - destruirán sus altares
  lexicon: HALOT
  rationale: נתץ expresa derribar una estructura. «Derribarán» es idiomático para altares y conserva la acción concreta y enérgica del hebreo.
- source_word: מַצֵּבֹתָם
  english_pob_choice: their pillars
  chosen_spanish: sus columnas
  alternatives_spanish:
  - sus pilares
  - sus piedras erguidas
  lexicon: HALOT
  rationale: El término designa objetos cultuales levantados. «Columnas» es un equivalente natural en español y comunica una pieza vertical sin introducir una glosa excesiva en el texto principal.
- source_word: תְּשַׁבֵּרוּ
  english_pob_choice: shatter
  chosen_spanish: quebrarán
  alternatives_spanish:
  - romperán
  - harán pedazos
  lexicon: HALOT
  rationale: El piel de שׁבר intensifica la ruptura. «Quebrarán» conserva el matiz fuerte mejor que «romperán» y suena sobrio en español bíblico moderno.
- source_word: אֲשֵׁירֵיהֶם
  english_pob_choice: their Asherah poles
  chosen_spanish: sus Aseras
  alternatives_spanish:
  - sus postes de Asera
  - sus postes de culto de Asera
  lexicon: HALOT
  rationale: El hebreo alude a objetos de culto asociados con Ashera. «Aseras» sigue de cerca el referente histórico-religioso y evita reemplazarlo por una explicación interpretativa en el texto principal.
- source_word: תְּגַדֵּעוּן
  english_pob_choice: cut down
  chosen_spanish: cortarán
  alternatives_spanish:
  - derribarán
  - cortarán de raíz
  lexicon: HALOT
  rationale: גדע se usa para cortar algo leñoso o erguido. «Cortarán» es breve y fiel; el contexto con los objetos de culto deja claro el sentido.
- source_word: פְסִילֵיהֶם
  english_pob_choice: their carved images
  chosen_spanish: sus imágenes talladas
  alternatives_spanish:
  - sus ídolos tallados
  - sus imágenes esculpidas
  lexicon: HALOT
  rationale: פֶּסֶל designa una imagen hecha por talla. «Imágenes talladas» preserva la concreción del término y evita el tono más interpretativo de «ídolos».
- source_word: תִּשְׂרְפוּן בָּאֵשׁ
  english_pob_choice: burn ... with fire
  chosen_spanish: quemarán ... en el fuego
  alternatives_spanish:
  - quemarán ... con fuego
  - las incendiarán
  lexicon: HALOT
  rationale: La construcción hebrea enfatiza el fuego como medio. «En el fuego» reproduce bien esa fuerza sin sonar forzado en español.
theological_decisions:
- issue: Cómo traducir אֲשֵׁרִים sin diluir su identidad cultual
  english_pob_reading: Asherah poles
  chosen_spanish_reading: Aseras
  alternative_spanish_readings:
  - postes de Asera
  - poles de Asera
  rationale: El texto distingue varios objetos de culto cananeo. «Aseras» mantiene la referencia histórica-religiosa y evita reducirla a un término genérico como «ídolos», que borraría una distinción importante.
  doctrine_reference: Translation philosophy §1, §5
- issue: Fuerza de la orden de destruir los objetos de culto
  english_pob_reading: Direct imperatives rendered with 'you shall' plus forceful verbs
  chosen_spanish_reading: 'Futuro exhortativo con verbos fuertes: «derribarán», «quebrarán», «cortarán», «quemarán»'
  alternative_spanish_readings:
  - 'imperativos directos: «derriben», «quiebren», «corten», «quemen»'
  - construcciones más suaves como «deberán eliminar»
  rationale: El hebreo presenta un mandato concreto y enérgico. El futuro exhortativo conserva el tono normativo sin suavizar la severidad del pasaje ni añadir motivación teológica ajena al versículo.
  doctrine_reference: Translation philosophy §1, §6
translation_notes:
  revision_awareness: Sin revisiones aplicadas en el paquete inglés auditado; la redacción española sigue de cerca la última versión estable y conserva sus decisiones léxicas principales, adaptándolas a un español bíblico claro y natural.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» fuera del versículo porque el texto no lo contiene.
  - «Aseras» se usa como transliteración funcional del referente cultual; la nota aclara el trasfondo.
  - 'Se conserva la secuencia de acciones y el carácter acumulativo del hebreo: derribar, quebrar, cortar, quemar.'
  - El futuro exhortativo en español comunica el mandato legal sin sobrecargar el verso con imperativos consecutivos.
