- from: 'Por tanto, así dice Yahvé: He aquí[a], yo estoy trayendo sobre ellos un desastre del cual no podrán salir; y clamarán a mí, pero yo no los escucharé.'
  to: 'Por tanto, así dice Yahvé: He aquí, yo estoy trayendo sobre ellos un desastre[a] del que no podrán escapar; y clamarán a mí, pero yo no los escucharé.'
  rationale: Se reubica la nota al término que realmente explica ('desastre'), y se mejora ligeramente la naturalidad de la cláusula de escape con 'del que no podrán escapar'. Se conserva el resto por su fidelidad general al hebreo y a las decisiones auditadas. Aunque 'clamarán a mí' sigue siendo algo rígido, permanece dentro del registro bíblico aceptable y no requiere adjudicación mayor.
