review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura y el sentido del hebreo: marco temporal («En este año de jubileo»), mandato legal de retorno, distribución individual, y destino («a su propiedad»). Sin embargo, la nota al pie no preserva la alternativa léxica documentada en el English POB, que contrasta «property» con «possession», no la construcción temporal «in the year of jubilee».'
  spanish_quality_summary: El español es claro, natural y digno. «Cada uno de ustedes volverá a su propiedad» suena bien en contexto legal. La única reparación necesaria es la nota al pie, para que corresponda al lugar correcto y al contraste léxico real. También conviene capitalizar «Jubileo» en este contexto institucional, en línea con el English POB («Year of Jubilee»).
  glossary_alignment: No hay conflicto con los términos del proyecto. «Jubileo» es adecuado para יוֹבֵל; «propiedad» para אֲחֻזָּה concuerda con la decisión auditada, con alternativa «posesión» en nota. No aparece terminología sensible como Yahvé/Mesías.
  issues:
  - severity: medium
    issue: La nota al pie está anclada en «jubileo» pero la alternativa documentada en el English POB corresponde a «su propiedad» / «su posesión».
    rationale: 'El English POB tiene la nota: «Or ''each one shall return to his possession.''» La nota española actual («O: “en el año de jubileo”») no representa esa variante y crea una alternativa que no está auditada como significativa.'
  - severity: low
    issue: '«jubileo» debería ir con mayúscula en este contexto institucional: «Jubileo».'
    rationale: El English POB lo trata como designación del año especial («Year of Jubilee»). En español bíblico y legal, la mayúscula ayuda a marcar la institución específica sin afectar el sentido.
  revised_spanish_text: En este año de Jubileo, cada uno de ustedes volverá a su propiedad[a].
  revised_footnotes:
  - marker: a
    text: 'O: «cada uno de ustedes volverá a su posesión».'
    reason: lexical_alternative
  revision_rationale: Se corrige la nota al pie para alinearla con la alternativa léxica documentada en el English POB sobre אֲחֻזָּה («propiedad/posesión»), y se mueve el anclaje al sintagma correspondiente. Además, se capitaliza «Jubileo» para reflejar mejor la designación institucional del año especial en Levítico 25.
