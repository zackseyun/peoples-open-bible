  - severity: low
    issue: La formulación de la nota [a] es algo explicativa y menos directa que la alternativa auditada
    rationale: La nota inglesa a preserva la alternativa ‘the same likeness’. En español conviene mantener una nota léxica directa sobre ‘apariencia/aspecto’ sin expandir innecesariamente el comentario.
