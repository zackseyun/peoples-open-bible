base_translation:
  language: en
  yaml_path: translation/ot/leviticus/013/030.yaml
  text: And the priest shall examine the diseased area[a], and behold, its appearance is deeper than the skin, and in it is thin yellow hair, then the priest shall pronounce him unclean; it is an itch[b], a skin disease of the head or of the beard.
  footnotes:
  - marker: a
    text: Or 'scall,' a traditional rendering for נֶתֶק; the exact medical condition is uncertain.
    reason: lexical_alternative
  - marker: b
    text: Hebrew צָרַעַת is a broad term for a serious skin disease and does not necessarily refer to modern leprosy (Hansen's disease).
    reason: cultural_note
