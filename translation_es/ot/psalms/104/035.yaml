translation:
  language: es
  text: Que los pecadores[a] se acaben de la tierra, y los impíos ya no existan. Bendice a Yahvé, alma mía[b]. ¡Aleluya!
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «lleguen a su fin»; el verbo hebreo puede expresar llegar a término, no solo ser destruido.'
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: «¡Alaben a Yah!». «Aleluya» es la forma tradicional en español de esta doxología.'
    reason: lexical_alternative
lexical_decisions:
- source_word: יִתַּמּוּ
  english_pob_choice: may ... be finished
  chosen_spanish: sean acabados
  alternatives_spanish:
  - lleguen a su fin
  - sean destruidos
  - sean consumidos
  lexicon: HALOT
  rationale: El verbo transmite la idea de llegar a término o cesar. En español, «sean acabados» conserva el valor de conclusión/remoción sin cargarlo innecesariamente con una noción más fuerte de destrucción física.
- source_word: חַטָּאִים
  english_pob_choice: sinners
  chosen_spanish: pecadores
  alternatives_spanish:
  - sujetos al pecado
  - personas pecadoras
  lexicon: HALOT
  rationale: «Pecadores» es la correspondencia natural y concisa para el sustantivo plural personal; mantiene la referencia a personas caracterizadas por el pecado, no al pecado abstracto.
- source_word: מִן הָאָרֶץ
  english_pob_choice: from the earth
  chosen_spanish: de la tierra
  alternatives_spanish:
  - de la tierra
  - de la tierra/ del mundo
  lexicon: HALOT
  rationale: «Tierra» refleja היטב el hebreo אֶרֶץ y su valor poético-cósmico. En español bíblico, «de la tierra» es natural y no restringe indebidamente el alcance a una región.
- source_word: וּרְשָׁעִים
  english_pob_choice: and the wicked
  chosen_spanish: los impíos
  alternatives_spanish:
  - los malvados
  - los injustos
  lexicon: HALOT
  rationale: «Impíos» preserva la categoría moral-religiosa del plural sustantivado. Es un término bíblico sobrio y adecuado para poesía, sin diluir la fuerza ética del hebreo.
- source_word: עוֹד אֵינָם
  english_pob_choice: be no more
  chosen_spanish: ya no existan
  alternatives_spanish:
  - ya no sean
  - no existan más
  lexicon: HALOT
  rationale: La frase expresa cesación de presencia/existencia. «Ya no existan» reproduce bien esa idea en un español fluido y poético; «ya» ayuda a reflejar עוֹד en el contexto negativo.
- source_word: בָּרֲכִי נַפְשִׁי
  english_pob_choice: Bless Yahweh, O my soul
  chosen_spanish: Bendice, Yahvé, alma mía
  alternatives_spanish:
  - Bendice, Yahvé, oh alma mía
  - Bendice al Yahvé, alma mía
  lexicon: HALOT
  rationale: «Bendice» corresponde al imperativo de ברך cuando Dios es el objeto de la alabanza. Se conserva la autoadmonición poética con «alma mía»; el orden mantiene el tono litúrgico sin sonar forzado.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahveh
  - el SEÑOR
  lexicon: HALOT
  rationale: Se mantiene la representación directa del nombre divino con la forma española establecida en el proyecto, «Yahvé», en lugar de una sustitución por título.
- source_word: הַלְלוּ יָהּ
  english_pob_choice: Hallelujah!
  chosen_spanish: ¡Aleluya!
  alternatives_spanish:
  - ¡Aleluya, alabado sea Yah!
  - ¡Alaben a Yah!
  lexicon: HALOT
  rationale: «Aleluya» es el equivalente litúrgico asentado en español para esta fórmula fija. Conserva el carácter doxológico y reconocible del hebreo.
theological_decisions:
- issue: Si el versículo debe suavizarse hacia la desaparición del pecado en abstracto o mantener la referencia a personas impías
  english_pob_reading: The text speaks of sinners and the wicked being removed from the earth, not merely of sin in the abstract ending.
  chosen_spanish_reading: El texto habla de pecadores e impíos que cesan de existir en la tierra, no solo del pecado como abstracción.
  alternative_spanish_readings:
  - Que el pecado sea acabado en la tierra
  - Que desaparezca la maldad de la tierra
  rationale: Los sustantivos hebreos son personales; por eso la traducción mantiene la referencia a personas concretas. Así se preserva la tensión imprecatoria del salmo sin diluirla en un enunciado abstracto.
  doctrine_reference: Primacía del texto original; conservar la tensión teológica sin resolverla por paráfrasis.
translation_notes:
  revision_awareness: La redacción sigue la revisión final del audit trail inglés al preferir una expresión de término/fin sobre una de consumo explícito, y al representar directamente el nombre divino como Yahvé. También conserva la fórmula litúrgica final como Aleluya, con nota explicativa alternativa.
  spanish_consistency_notes:
  - Se usa «Yahvé» para יְהוָה conforme al estándar del proyecto.
  - Se reserva «impíos» para רְשָׁעִים por su fuerza moral bíblica; «pecadores» traduce חַטָּאִים.
  - La frase verbal «ya no existan» refleja la negación existencial de עוֹד אֵינָם en registro poético natural.
  - «Aleluya» se mantiene como fórmula establecida, con nota que explicita su sentido literal.
