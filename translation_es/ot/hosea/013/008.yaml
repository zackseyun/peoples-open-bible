  source_alignment_summary: 'El borrador español sigue bien el sentido básico del hebreo y del POB inglés: mantiene la primera persona divina, la secuencia de imágenes depredadoras, ‘allí’, y la dificultad de סְגוֹר לִבָּם con una opción relativamente literal. Sin embargo, hay dos desajustes importantes con la evidencia y la trazabilidad del POB: (1) la nota [a] afirma incorrectamente que el hebreo usa un término gramaticalmente masculino para דֹב; el hebreo no marca género aquí, y el matiz maternal procede de שַׁכּוּל y de la imagen idiomática, no de un femenino gramatical; (2) ‘despedazará’ para תְּבַקְּעֵם es más fuerte e interpretativo que el POB revisado ‘tear them apart’ y conviene acercarlo a ‘desgarrará’ para mayor consistencia léxica.'
