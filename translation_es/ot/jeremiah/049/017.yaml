review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura del hebreo: futuro resultativo para וְהָיְתָה, nombre propio Edom, desolación para לְשַׁמָּה, reacción de los transeúntes, y silbar/sisear para וְיִשְׁרֹק. Sin embargo, hay dos problemas de fidelidad menores: la nota [a] repite la lectura principal en vez de dar una alternativa real, y «se quedará horrorizado» intensifica un poco יִשֹּׁם, que en contexto apunta más a quedar espantado/asombrado ante la ruina que necesariamente horrorizado.'
  spanish_quality_summary: El español es natural y claro. «Edom se volverá una desolación» suena digno y legible. «Todo el que pase por ella» funciona bien. Conviene suavizar «se quedará horrorizado» a una formulación más precisa y algo más idiomática en este contexto de juicio público. También las notas deben corregirse para no presentar como alternativa la misma lectura principal.
  glossary_alignment: No hay conflictos con la terminología base del proyecto. No aparecen Yahvé, Mesías/Cristo, δοῦλος, etc. «Edom» y «desolación» están bien alineados. «Silbará» concuerda con la decisión auditada, con «siseará» como alternativa en nota.
  issues:
  - severity: medium
    issue: La nota [a] está mal formulada porque ofrece «una desolación» como alternativa cuando ya es la lectura principal.
    rationale: Las notas deben preservar alternativas significativas; repetir la lectura principal confunde al lector y no refleja correctamente el expediente inglés, donde las alternativas son «objeto de horror» o el matiz combinado del término hebreo.
  - severity: low
    issue: «Se quedará horrorizado» sobretraduce ligeramente יִשֹּׁם.
    rationale: El verbo describe quedar pasmado/espantado/asombrado ante la devastación. «Horrorizado» no es imposible, pero añade un matiz más fuerte que el necesario. «Quedará espantado» o «quedará asombrado» se ajusta mejor al hebreo y al contexto.
  - severity: low
    issue: La nota [b] presenta dos opciones pero una de ellas es la lectura principal.
    rationale: No es un error grave, pero la nota queda más limpia si ofrece solo la alternativa real («siseará») y explica por qué se prefiere «silbará» en el texto.
  revised_spanish_text: Edom se volverá una desolación[a]; todo el que pase por ella quedará espantado y silbará[b] ante todas sus heridas.
