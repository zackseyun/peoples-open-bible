translation:
  language: es
  text: Zabulón habitará junto a la orilla de los mares[c][a]; estará junto a la orilla de las naves, y su flanco[b] estará hacia Sidón.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «en un fondeadero para naves». El hebreo, más literalmente, dice «junto a la orilla de naves».'
    reason: lexical_alternative
  - marker: b
    text: 'O: «su lado», «su borde» o «sus regiones más remotas estarán hacia Sidón». El término hebreo puede referirse a un lado, flanco o extremidad en sentido geográfico.'
    reason: lexical_alternative
  - marker: c
    text: «Los mares» traduce un plural hebreo; algunas versiones lo vierten idiomáticamente en singular, «el mar».
    reason: lexical_alternative
lexical_decisions:
- source_word: זְבוּלֻן
  english_pob_choice: Zebulun
  chosen_spanish: Zabulón
  alternatives_spanish:
  - Zebulón
  lexicon: transliteración estándar de nombre propio
  rationale: Se conserva el nombre propio en forma española ampliamente reconocible. 'Zabulón' respeta la tradición bíblica en español y la transliteración del hebreo.
- source_word: לְחֹוף
  english_pob_choice: by the shore of
  chosen_spanish: junto a la orilla de
  alternatives_spanish:
  - en la orilla de
  - a la orilla de
  lexicon: HALOT
  rationale: La preposición con חוֹף expresa localización/orientación. 'Junto a la orilla de' suena natural en español y conserva la relación espacial sin añadir interpretación.
- source_word: יַמִּים
  english_pob_choice: the seas
  chosen_spanish: los mares
  alternatives_spanish:
  - el mar
  lexicon: HALOT
  rationale: Se mantiene el plural hebreo en el texto principal para transparencia. En español, 'los mares' reproduce la forma plural sin forzar singularización idiomática.
- source_word: יִשְׁכֹּן
  english_pob_choice: will dwell
  chosen_spanish: habitará
  alternatives_spanish:
  - morará
  - se establecerá
  lexicon: HALOT
  rationale: '''Habitará'' comunica bien el sentido de residir o establecerse, con registro digno y natural para la poesía bíblica.'
- source_word: וְהוּא
  english_pob_choice: he
  chosen_spanish: será
  alternatives_spanish:
  - y él
  - él
  lexicon: HALOT
  rationale: El hebreo repite el pronombre para el paralelismo. En español se mantiene la segunda cola con un verbo copulativo natural, sin perder la referencia a la misma persona. Se evita una repetición pesada de 'y él'.
- source_word: לְחֹוף אֳנִיּוֹת
  english_pob_choice: by the shore of ships
  chosen_spanish: junto a la orilla de las naves
  alternatives_spanish:
  - junto a la orilla de los barcos
  - en un fondeadero para naves
  lexicon: HALOT
  rationale: Se conserva la imagen literal 'orilla de naves' con una adaptación española natural. 'Naves' mantiene un tono bíblico y amplio; 'barcos' es posible, pero menos solemne. No se introduce 'fondeadero' en el texto principal porque sería más interpretativo que el hebreo.
- source_word: וְיַרְכָתוֹ
  english_pob_choice: his flank
  chosen_spanish: su flanco
  alternatives_spanish:
  - su lado
  - su extremo
  - sus confines
  lexicon: HALOT
  rationale: '''Flanco'' conserva la metáfora corporal/geográfica y la ambigüedad del término hebreo entre lado, extremidad o parte remota. Es más exacto que reducirlo de entrada a un mero ''límite''.'
- source_word: עַל
  english_pob_choice: toward
  chosen_spanish: hacia
  alternatives_spanish:
  - sobre
  - contra
  - hasta
  lexicon: HALOT
  rationale: En un enunciado geográfico con topónimo, 'hacia' expresa orientación o extensión mejor que una superposición literal. Sigue la lectura del POB inglés.
- source_word: צִידֹן
  english_pob_choice: Sidon
  chosen_spanish: Sidón
  alternatives_spanish:
  - Sídon
  lexicon: transliteración estándar de nombre propio
  rationale: Se adopta la forma española habitual 'Sidón' para el topónimo fenicio.
theological_decisions:
- issue: Pluralidad de 'mares'
  english_pob_reading: The seas translates a Hebrew plural; some English versions render it idiomatically as singular, 'the sea.'
  chosen_spanish_reading: los mares
  alternative_spanish_readings:
  - el mar
  rationale: Se preserva el plural hebreo como dato textual y poético. Aunque el singular sería idiomático en español, el plural mantiene la transparencia al original y la fuerza literaria del texto.
  doctrine_reference: No aplica; decisión de forma textual y poética.
- issue: Extensión territorial de 'su flanco'
  english_pob_reading: his side, his border, or his farthest reaches will be toward Sidon
  chosen_spanish_reading: su flanco estará hacia Sidón
  alternative_spanish_readings:
  - su lado estará hacia Sidón
  - sus confines estarán hacia Sidón
  - sus extremidades estarán hacia Sidón
  rationale: Se conserva la ambigüedad del hebreo entre lado, borde y extremidad. 'Flanco' permite una lectura geográfica sin fijar indebidamente el sentido a un término técnico de frontera.
  doctrine_reference: No aplica; decisión semántica y geográfica.
translation_notes:
  revision_awareness: Se revisó la consistencia con el audit trail inglés y no se requirieron cambios de revisión adicionales; se mantuvo la lectura de 'mares' en plural y la ambigüedad geográfica de 'יַרְכָתוֹ' sin sobre-interpretarla.
  spanish_consistency_notes:
  - 'Se mantiene el nombre propio en forma española tradicional: Zabulón, Sidón.'
  - Se preserva el plural hebreo 'mares' en el texto principal y se aclara en nota.
  - Se usa 'naves' en el texto principal para un registro bíblico digno; la alternativa 'barcos' queda implícita en la nota.
  - Se evita traducir 'יַרְכָתוֹ' como un término técnico demasiado específico para no perder la amplitud semántica del hebreo.
  - La puntuación reproduce el paralelismo poético del hebreo con dos miembros y una clausula final.
