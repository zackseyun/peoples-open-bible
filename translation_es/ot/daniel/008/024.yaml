revisions:
- from: Su poder crecerá[a], pero no por su propio poder. Causará destrucción extraordinaria, y prosperará y hará; destruirá a los poderosos y al pueblo de los santos[b].
  to: Su poder se hará grande[a], pero no por su propio poder. Causará destrucción extraordinaria, y tendrá éxito y actuará; destruirá a los poderosos y al pueblo de los santos[b].
  rationale: 'Se ajusta la primera cláusula para reflejar mejor la decisión principal del POB auditado (‘become great’) con un español natural: ‘se hará grande’. También se reemplaza ‘prosperará y hará’ por ‘tendrá éxito y actuará’, que reproduce mejor ‘succeed and act’ y mejora la fluidez. Se conservan las alternativas interpretativas documentadas en notas, con anclajes correctos en el texto.'
