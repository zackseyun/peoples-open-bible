translation:
  language: es
  text: Y ellos ayudaron a David contra el grupo de incursión[a], porque todos ellos eran valientes guerreros[b], y llegaron a ser comandantes[c] en el ejército.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «contra la banda» o «contra la tropa»; el hebreo גְּדוּד puede referirse a una banda militar o a un grupo de incursión.
    reason: lexical_alternative
  - marker: b
    text: O «guerreros poderosos» o «hombres valientes»; la expresión hebrea גִבּוֹרֵי חַיִל es una fórmula militar para hombres capaces y valientes.
    reason: lexical_alternative
  - marker: c
    text: O «capitanes» o «jefes» para «comandantes».
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהֵמָּה
  english_pob_choice: And they
  chosen_spanish: Y ellos
  alternatives_spanish:
  - Y estos
  - Ahora ellos
  lexicon: HALOT
  rationale: El pronombre independiente hebreo añade énfasis al sujeto. En español, «ellos» conserva esa explicitud sin recargar el estilo.
- source_word: עָזְרוּ
  english_pob_choice: helped
  chosen_spanish: ayudaron
  alternatives_spanish:
  - vinieron a ayudar
  - prestaron apoyo a
  lexicon: HALOT
  rationale: El sentido básico es ayudar o prestar apoyo. «Ayudaron» es natural y fiel al verbo hebreo.
- source_word: עִם דָּוִיד
  english_pob_choice: David
  chosen_spanish: a David
  alternatives_spanish:
  - con David
  lexicon: HALOT
  rationale: Aunque la preposición puede ser «con», en español con «ayudar» el beneficiario suele expresarse directamente con objeto indirecto. Se mantiene la relación con David sin forzar una construcción extraña.
- source_word: עַל הַגְּדוּד
  english_pob_choice: against the raiding band
  chosen_spanish: contra la banda de incursión
  alternatives_spanish:
  - contra la banda
  - contra la tropa
  lexicon: HALOT
  rationale: גְּדוּד puede referirse a una banda militar o a un grupo de incursión. «Banda de incursión» conserva el matiz de grupo armado que realiza saqueos o incursiones.
- source_word: כִּי
  english_pob_choice: for
  chosen_spanish: porque
  alternatives_spanish:
  - pues
  - ya que
  lexicon: HALOT
  rationale: Aquí introduce la razón explicativa. «Porque» expresa con claridad la conexión causal en español.
- source_word: גִבּוֹרֵי חַיִל
  english_pob_choice: mighty men of valor
  chosen_spanish: guerreros valientes
  alternatives_spanish:
  - hombres valientes
  - mighty men of valor
  lexicon: HALOT
  rationale: La expresión fija combina fuerza/capacidad y valor militar. En español, «guerreros valientes» comunica bien el campo semántico sin sonar forzado. Se evita una traducción demasiado literal que podría sonar arcaica.
- source_word: כֻּלָּם
  english_pob_choice: all of them
  chosen_spanish: todos ellos
  alternatives_spanish:
  - todos
  lexicon: HALOT
  rationale: La forma sufijada señala al grupo entero. «Todos ellos» reproduce la referencia distributiva con claridad.
- source_word: וַיִּהְיוּ
  english_pob_choice: they became
  chosen_spanish: llegaron a ser
  alternatives_spanish:
  - se hicieron
  - fueron
  lexicon: HALOT
  rationale: El hebreo expresa un cambio de estado o resultado. «Llegaron a ser» preserva ese proceso mejor que un simple «eran».
- source_word: שָׂרִים
  english_pob_choice: commanders
  chosen_spanish: jefes
  alternatives_spanish:
  - comandantes
  - capitanes
  - líderes
  lexicon: HALOT
  rationale: En contexto militar, puede referirse a oficiales o jefes. «Jefes» es amplio y natural en español, evitando una precisión excesiva donde el hebreo permite flexibilidad.
- source_word: בַּצָּבָא
  english_pob_choice: in the army
  chosen_spanish: en el ejército
  alternatives_spanish:
  - en la tropa
  - en la fuerza militar
  lexicon: HALOT
  rationale: צָבָא se refiere a la fuerza militar organizada. «Ejército» es el equivalente moderno más claro en español.
translation_notes:
  revision_awareness: La revisión más reciente indicó acuerdo alto y ningún cambio necesario; este borrador sigue de cerca la lectura aprobada del inglés POB, ajustándola al español con decisiones léxicas transparentes basadas en el hebreo.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» para el nombre divino cuando aparezca, aunque este versículo no lo contiene.
  - Se evita «SEÑOR» como sustituto por convención editorial.
  - «Guerreros valientes» preserva el matiz militar sin introducir terminología eclesiástica.
  - «Ejército» traduce צָבָא de forma clara y contemporánea en español.
  - Las notas alternativas se conservan porque el hebreo admite más de una matización léxica en «גְּדוּד», «גִבּוֹרֵי חַיִל» y «שָׂרִים».
