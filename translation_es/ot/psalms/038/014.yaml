translation:
  language: es
  text: Pero yo, como un sordo, no oigo; y como un mudo[a], no abro la boca.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «y como un mudo, él no abre su boca». El hebreo cambia a tercera persona en esta segunda línea.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַאֲנִי
  english_pob_choice: But I
  chosen_spanish: Pero yo
  alternatives_spanish:
  - Y yo
  - Mas yo
  - En cuanto a mí
  lexicon: HALOT
  rationale: La partícula coordinante más el pronombre introducen contraste con el contexto inmediato; en español, «Pero yo» comunica de modo natural la oposición sin perder la fuerza enfática del sujeto.
- source_word: כְחֵרֵשׁ
  english_pob_choice: like a deaf man
  chosen_spanish: como un sordo
  alternatives_spanish:
  - como un hombre sordo
  - como el sordo
  lexicon: HALOT
  rationale: כְ marca comparación; חֵרֵשׁ describe a una persona sorda. «Como un sordo» conserva la imagen breve y directa del hebreo y su paralelismo con la segunda línea.
- source_word: לֹא אֶשְׁמָע
  english_pob_choice: do not hear
  chosen_spanish: no oigo
  alternatives_spanish:
  - no escucho
  - no oigo ni respondo
  - no puedo oír
  lexicon: HALOT
  rationale: שׁמע en qal aquí mantiene su valor básico de oír. «No oigo» conserva el lenguaje sensorial literal; evita añadir una explicación que no está expresada explícitamente en el hebreo.
- source_word: וּכְאִלֵּם
  english_pob_choice: and like a mute man
  chosen_spanish: y como un mudo
  alternatives_spanish:
  - y como uno mudo
  - y como un hombre mudo
  - y como el mudo
  lexicon: HALOT
  rationale: אִלֵּם designa a una persona muda. «Mudo» preserva el paralelo con «sordo» y mantiene la metáfora física sin volverla más interpretativa de lo necesario.
- source_word: לֹא יִפְתַּח פִּיו
  english_pob_choice: I do not open my mouth
  chosen_spanish: no abro mi boca
  alternatives_spanish:
  - no abre su boca
  - no abro la boca
  - no habla
  lexicon: HALOT
  rationale: El hebreo presenta una imagen idiomática de no abrir la boca; el audit trail inglés mostró la tensión del cambio de persona, pero la última revisión optó por primera persona. «No abro mi boca» conserva esa lectura y la expresión idiomática en español.
theological_decisions:
- issue: Persona gramatical en la segunda línea
  english_pob_reading: 'Final revision reads first person: ''I do not open my mouth.'''
  chosen_spanish_reading: 'Primera persona: «no abro mi boca»'
  alternative_spanish_readings:
  - 'Tercera persona: «no abre su boca»'
  - 'Construcción explicativa: «como un mudo, no abre su boca»'
  rationale: Aunque el hebreo puede sentirse abrupto por el cambio de referencia simétrica, el registro final del POB inglés corrigió la línea a primera persona. El español sigue esa decisión para mantener consistencia con la última lectura auditada y con el paralelismo del versículo.
  doctrine_reference: No doctrinal issue; text-critical / syntactic alignment
- issue: Valor de la comparación con sordo y mudo
  english_pob_reading: Literal similes with deaf/mute imagery
  chosen_spanish_reading: 'Similitudes literales: «como un sordo... y como un mudo...»'
  alternative_spanish_readings:
  - 'Paráfrasis funcional: «como si no oyera... y como si no hablara...»'
  - 'Explicación interpretativa: «como uno que no responde a las acusaciones...»'
  rationale: El hebreo usa imágenes concretas de sordera y mutismo. Mantenerlas en español evita suavizar la metáfora y preserva la tensión retórica del salmo, que el POB inglés también retiene.
  doctrine_reference: Poetic imagery / rhetorical parallelism
translation_notes:
  revision_awareness: La redacción sigue la revisión más reciente del POB inglés, que corrigió la segunda cláusula a primera persona ('I do not open my mouth') y eliminó la lectura en tercera persona. También conserva el paralelismo breve y literal de las imágenes de sordera y mutismo, sin añadir explicación interpretativa no presente en el texto hebreo.
  spanish_consistency_notes:
  - Se mantiene el contraste inicial con «Pero yo», equivalente natural del adversativo hebreo y del inglés auditado.
  - Se usa «sordo» y «mudo» en singular para preservar el paralelismo nominal y la imaginería corporal del verso.
  - «Mi boca» sigue la revisión final en primera persona y evita introducir la variante textual de tercera persona no adoptada en el inglés final.
  - El registro es bíblico y sobrio, pero en español moderno y publicable.
