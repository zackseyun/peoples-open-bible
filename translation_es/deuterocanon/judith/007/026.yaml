translation:
  language: es
  text: Y ahora convóquenlos y entreguen toda la ciudad como botín al pueblo[a] de Holofernes y a todas sus fuerzas.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El griego λαός significa literalmente 'pueblo'; en el contexto bélico del versículo alude a las huestes o soldados de Holofernes. Se conserva 'pueblo' en el texto para respetar la literalidad del término griego, conforme a la decisión documentada en el inglés POB.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐπικαλέσασθε
  english_pob_choice: summon them
  chosen_spanish: convóquenlos
  alternatives_spanish:
  - llámenlos
  - apélenlos
  lexicon: LSJ
  rationale: El imperativo medio aoristo ἐπικαλέσασθε en contexto militar designa llamar/convocar a las fuerzas enemigas para que actúen. El inglés POB pasó por revisión de 'call' a 'summon' para mayor formalidad; el español 'convocar' recoge ese mismo registro formal frente al más llano 'llamar', y es el término natural en español para convocar a un ejército o embajada. 'Apelar' añade matiz jurídico-suplicatorio que el contexto no justifica.
- source_word: ἔκδοθε
  english_pob_choice: hand over
  chosen_spanish: entreguen
  alternatives_spanish:
  - cedan
  - rindan
  lexicon: LSJ
  rationale: 'ἐκδίδωμι en imperativo activo expresa el acto de ceder o transferir la ciudad al control enemigo. ''Entregar'' en español es el equivalente más directo y natural de ''hand over'': transmite el acto de rendición sin suavizarlo. ''Rendir'' (la ciudad) también funciona pero puede sonar más heroico; ''ceder'' es demasiado débil para la violencia implícita en el contexto.'
- source_word: προνομὴν
  english_pob_choice: as plunder
  chosen_spanish: botín
  alternatives_spanish:
  - presa
  - saqueo
  - despojo
  lexicon: LSJ
  rationale: 'προνομή designa el botín o despojo tomado en la guerra. ''Botín'' es el término español más preciso y de uso común en contextos bélicos: es claro, moderno y refleja bien el sentido predicativo (''como botín'') que el inglés POB identificó. ''Saqueo'' acentúa el proceso más que el resultado; ''despojo'' es correcto pero algo más arcaico.'
- source_word: λαῷ
  english_pob_choice: people
  chosen_spanish: pueblo[a]
  alternatives_spanish:
  - hueste
  - gente
  - tropa
  lexicon: LSJ
  rationale: λαός significa literalmente 'pueblo'; en contexto militar alude a la hueste o contingente de Holofernes. El inglés POB optó conscientemente por 'people' para preservar la literalidad del término griego y su transparencia auditora. El español 'pueblo' reproduce esa misma decisión; sin embargo, crea la misma ambigüedad (¿civiles o tropa?) que el griego, por lo que se anota en pie de página.
- source_word: δυνάμει
  english_pob_choice: forces
  chosen_spanish: fuerzas
  alternatives_spanish:
  - ejército
  - poder
  - tropa
  lexicon: LSJ
  rationale: δύναμις en contexto militar denota el contingente armado. El inglés POB eligió 'forces' (en plural, tras revisión de 'force') para distinguirlo del 'people/pueblo' anterior y reflejar la totalidad del poder bélico de Holofernes. El español 'fuerzas' (militar, plural) es el equivalente más natural y refleja la misma distinción entre el 'pueblo' de Holofernes y la totalidad de su aparato militar.
- source_word: πόλιν πᾶσαν
  english_pob_choice: the whole city
  chosen_spanish: toda la ciudad
  alternatives_spanish:
  - la ciudad entera
  lexicon: LSJ
  rationale: πᾶσαν modifica a πόλιν con fuerza de totalidad. 'Toda la ciudad' es la expresión española más natural e idiomática para este énfasis; 'la ciudad entera' también es válida pero levemente más enfática en español; ambas son equivalentes semánticos cercanos.
translation_notes:
  revision_awareness: 'El inglés POB pasó por una revisión (2026-04-23, modelo gpt-5.4) que cambió ''call them'' por ''summon them'' (por mayor formalidad en la representación de ἐπικαλέσασθε) y ''his force'' por ''his forces'' (para reflejar mejor πάσῃ τῇ δυνάμει αὐτοῦ en inglés natural). El español toma en cuenta el texto revisado: ''convóquenlos'' recoge el registro formal de ''summon'', y ''fuerzas'' (plural) corresponde a ''forces''. No hay indicios de que la revisión alterara ninguna decisión de peso teológico o lexical sustantivo.'
  spanish_consistency_notes:
  - Este versículo no contiene ningún nombre divino (יהוה/κύριος/θεός); no aplican las convenciones de proyecto para Yahvé o Dios.
  - El nombre propio Ὁλοφέρνης se transliterada como 'Holofernes', forma establecida en el español bíblico y sin variante relevante.
  - No aparecen términos cristológicos, pneumatológicos ni δοῦλος/σάρξ/δικαιοσύνη; las convenciones terminológicas del proyecto no afectan este versículo.
  - El tiempo verbal de los imperativos griegos (ἐπικαλέσασθε, ἔκδοθε) se vierte con el presente de subjuntivo/imperativo en forma de 'ustedes' (convóquenlos, entreguen), conforme al español neutro latinoamericano adoptado como norma de estilo del proyecto.
