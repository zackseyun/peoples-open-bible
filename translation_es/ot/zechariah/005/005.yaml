translation:
  language: es
  text: 'Entonces el ángel que estaba hablando conmigo[b] salió[a] y me dijo: «Levanta, por favor, tus ojos y mira qué es esto que está saliendo[c]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «salió» / «vino»; el verbo hebreo es el común verbo de movimiento יָצָא.
    reason: lexical_alternative
  - marker: b
    text: Hebreo literalmente, «el ángel que hablaba en mí», un giro idiomático que aquí significa «conmigo».
    reason: lexical_alternative
  - marker: c
    text: O «qué es esto que sale».
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֵּצֵא
  english_pob_choice: went out
  chosen_spanish: salió
  alternatives_spanish:
  - se fue
  - salió hacia afuera
  lexicon: HALOT
  rationale: El verbo יצא tiene el sentido básico de salir/ir afuera. «Salió» refleja directamente ese movimiento sin perder naturalidad en español.
- source_word: הַמַּלְאָךְ
  english_pob_choice: the angel
  chosen_spanish: el ángel
  alternatives_spanish:
  - el mensajero
  lexicon: HALOT
  rationale: En el contexto visionario de Zacarías, la figura interpretativa es mejor entendida como ángel, no solo como mensajero.
- source_word: הַדֹּבֵר בִּי
  english_pob_choice: who was speaking with me
  chosen_spanish: que estaba hablando conmigo
  alternatives_spanish:
  - que hablaba conmigo
  - que estaba hablando en mí
  lexicon: HALOT
  rationale: La expresión es idiomática; en español «conmigo» comunica la relación conversacional que el hebreo expresa aquí, mientras que «estaba hablando» conserva el aspecto continuo del participio.
- source_word: וַיֹּאמֶר אֵלַי
  english_pob_choice: and said to me
  chosen_spanish: y me dijo
  alternatives_spanish:
  - y dijo a mí
  lexicon: HALOT
  rationale: Es la equivalencia narrativa normal del wayyiqtol con complemento indirecto en español.
- source_word: שָׂא נָא עֵינֶיךָ
  english_pob_choice: Please lift up your eyes
  chosen_spanish: Levanta, por favor, tus ojos
  alternatives_spanish:
  - Levanta ahora tus ojos
  - Alza, por favor, tus ojos
  lexicon: HALOT
  rationale: Se conserva la imagen hebrea de «levantar/alzar los ojos». «Por favor» representa נָא como partícula de cortesía. Se evita «mira» en el núcleo para no borrar la imagen corporal del original.
- source_word: וּרְאֵה
  english_pob_choice: and see
  chosen_spanish: y mira
  alternatives_spanish:
  - y ve
  lexicon: HALOT
  rationale: En español, «mira» funciona naturalmente como imperativo de atención visual dentro de una escena profética, sin perder el valor de ראה.
- source_word: מָה
  english_pob_choice: what
  chosen_spanish: qué
  alternatives_spanish:
  - qué cosa
  lexicon: HALOT
  rationale: Interrogativo directo y simple; «qué» es la forma más natural en español.
- source_word: הַיּוֹצֵאת
  english_pob_choice: is coming out
  chosen_spanish: está saliendo
  alternatives_spanish:
  - sale
  - está viniendo afuera
  lexicon: HALOT
  rationale: El participio femenino singular expresa acción en curso. «Está saliendo» conserva esa progresividad y la perspectiva visual del profeta.
- source_word: הַזֹּאת
  english_pob_choice: this
  chosen_spanish: esto
  alternatives_spanish:
  - esta cosa
  lexicon: HALOT
  rationale: Aunque el hebreo es femenino, en español la referencia a un objeto aún no identificado se expresa con naturalidad como «esto»; el contexto visionario permite esa neutralización de género sin perder la deixis.
theological_decisions:
- issue: Naturaleza de la figura que habla con el profeta
  english_pob_reading: the angel who was speaking with me
  chosen_spanish_reading: el ángel que estaba hablando conmigo
  alternative_spanish_readings:
  - el ángel que hablaba conmigo
  - el mensajero que estaba hablando conmigo
  rationale: Se mantiene «ángel» por el contexto de la visión y el papel interpretativo de la figura. No se atenúa a «mensajero» porque el marco narrativo apoya la identificación angelical.
  doctrine_reference: Zacarías 1:9, 1:13-14; 2:3; 4:1-5; 6:4-5
translation_notes:
  revision_awareness: La revisión inglesa reciente volvió de una paráfrasis más interpretativa («came forward») a una rendición más directa de ויצא («went out/came out»). La presente versión española sigue esa decisión revisada con «salió», y conserva también la progresividad de הַיּוֹצֵאת con «está saliendo».
  spanish_consistency_notes:
  - Se mantiene el tratamiento de la voz visionaria de Zacarías con «ángel» y no «mensajero», en continuidad con el uso contextual del libro.
  - Se preserva la imagen idiomática de «levantar los ojos» junto con una formulación española natural.
  - La deixis final se resuelve con «esto» por naturalidad referencial en español, sin añadir «cosa» al texto principal.
