review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien el sentido básico del hebreo: vocativo «Dios mío», clamor continuo «de día… de noche», falta de respuesta divina y ausencia de quietud/reposo. Sin embargo, la nota [a] está mal anclada: el marcador aparece en «Dios mío» pero la nota trata sobre «clamo». Además, la nota [a] no preserva la alternativa relevante del inglés para אֱלֹהַי («Mi Dios» / «Oh Dios mío»), sino que introduce una observación verbal ajena al anclaje textual. Eso requiere corrección editorial.'
  spanish_quality_summary: 'La redacción principal es natural, clara y digna en español: «Dios mío, clamo de día, pero tú no respondes; y de noche, no tengo reposo». La puntuación con punto y coma ayuda al paralelismo. «No tengo reposo» es una solución idiomática aceptable para דומיה לי. La única deficiencia material es la gestión de notas, no la fluidez del texto.'
  glossary_alignment: No hay conflicto con la terminología del proyecto. אֱלֹהַי se vierte correctamente como «Dios mío», no «Señor». No hay términos sensibles adicionales. La decisión «clamo» para אקרא y «reposo» para דומיה concuerda con la auditoría inglesa y con un español bíblico legible.
  issues:
  - severity: medium
    issue: La nota [a] está anclada a «Dios mío» pero comenta el verbo «clamo».
    rationale: Las notas deben corresponder exactamente al lugar marcado en el texto. Tal como está, el lector entiende que [a] explica «Dios mío», pero el contenido habla de אקרא.
  - severity: medium
    issue: La nota [a] omite la alternativa léxica pertinente para אֱלֹהַי y sustituye esa información por una observación no correspondiente.
    rationale: La auditoría inglesa documenta para אֱלֹהַי la alternativa «O my God». En español, si se conserva una nota en ese punto, debe explicar «Mi Dios» / «Oh, Dios mío», no «Clamo a ti».
  revised_spanish_text: Dios mío[a], clamo de día, pero tú no respondes; y de noche[b], no tengo reposo.
  revised_footnotes:
  - marker: a
    text: 'O: «Oh, Dios mío» o «Mi Dios». El hebreo expresa una apelación directa a Dios; «Dios mío» es la forma más natural en español.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «no hay silencio para mí». El hebreo puede conservar la imagen de una ausencia de silencio o quietud.'
    reason: lexical_alternative
  revision_rationale: 'Se conserva el texto principal porque representa fielmente el sentido del hebreo y suena natural en español. Se corrige únicamente el aparato de notas: [a] ahora corresponde al vocativo אֱלֹהַי, y [b] sigue documentando la alternativa más literal para דומיה לי.'
