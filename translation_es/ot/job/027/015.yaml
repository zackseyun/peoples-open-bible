  - severity: medium
    issue: La formulación inicial con coma topicalizada ('A los que le sobrevivan, ...') es menos natural que una estructura de sujeto directa.
    rationale: Aunque entendible, 'Los que le sobrevivan...' fluye mejor en español bíblico moderno y mantiene el valor colectivo de שָׂרִידוֹ.
  - severity: low
    issue: La nota al pie necesita mejor redacción en español.
    rationale: 'La apertura con comilla y dos puntos está poco natural (''O: «... »''). Una nota más limpia debe mantener la alternativa ''en la muerte'' y explicar la compresión hebrea con español idiomático.'
  revised_spanish_text: Los que le sobrevivan serán sepultados por la muerte[a], y sus viudas no llorarán.
