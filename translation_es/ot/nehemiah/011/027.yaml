lexical_decisions:
- source_word: וּ/בַ/חֲצַר שׁוּעָל
  english_pob_choice: and in Hazar-shual
  chosen_spanish: y en Hazar-sual
  alternatives_spanish:
  - y en Hazar Shual
  - y en la Villa del Zorro
  lexicon: HALOT
  rationale: Se conserva el nombre propio geográfico por transliteración, como en el inglés POB. En español, 'Hazar-sual' mantiene la forma reconocible sin traducir etimológicamente el topónimo, lo que sería menos adecuado para un lugar.
- source_word: וּ/בִ/בְאֵר שֶׁבַע
  english_pob_choice: and in Beer-sheba
  chosen_spanish: y en Beer-seba
  alternatives_spanish:
  - y en Beerseba
  - y en Pozo del Juramento
  - y en Pozo del Siete
  lexicon: HALOT
  rationale: Se conserva el topónimo tradicional transliterado. 'Beer-seba' es una forma clara y fiel en español; las traducciones etimológicas no se prefieren tratándose de un nombre de lugar.
- source_word: וּ/בְנֹתֶיהָ
  english_pob_choice: and its villages
  chosen_spanish: y sus aldeas
  alternatives_spanish:
  - y sus hijas
  - y sus pueblos dependientes
  - y sus asentamientos dependientes
  lexicon: HALOT
  rationale: El hebreo literalmente dice 'y sus hijas', pero en este contexto idiomático designa las aldeas o asentamientos dependientes de la ciudad. 'Aldeas' comunica bien el sentido geográfico en español sin perder la relación posesiva implícita.
translation_notes:
  revision_awareness: El texto inglés POB y el control cruzado muestran alta concordancia y no requieren revisión sustantiva; la única precisión necesaria en español es anclar la nota del modismo de 'sus hijas' en el texto traducido.
  spanish_consistency_notes:
  - Se mantiene un estilo sobrio y publicable, con transliteración consistente de topónimos.
  - '''Y'' se conserva al inicio de cada segmento como reflejo sencillo del hebreo coordinado.'
  - La nota de pie queda anclada en 'Beer-seba[a]' para evitar un marcador suelto y cumplir la trazabilidad solicitada.
