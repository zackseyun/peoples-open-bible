  glossary_alignment: No hay términos del glosario mayor en juego salvo la preservación adecuada de nombres propios. «Gershom» sigue correctamente la forma hebrea documentada, y «el jefe» coincide bien con la decisión auditada para הַשַּׂר. «Hermanos» con nota explicativa preserva la fuerza léxica preferida frente a una paráfrasis como «parientes».
