base_translation:
  language: en
  yaml_path: translation/ot/1_samuel/014/043.yaml
  text: Then Saul said to Jonathan[a], “Tell me what you have done.” And Jonathan told him and said, “I indeed tasted a little honey on the tip of the staff that was in my hand, and here I am, about to die.”
  footnotes:
