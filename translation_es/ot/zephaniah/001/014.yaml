base_translation:
  language: en
  yaml_path: translation/ot/zephaniah/001/014.yaml
  text: The great day of Yahweh is near—near and very quickly coming[b][a]. The sound of the day of Yahweh! There the warrior cries out bitterly.
  footnotes:
