revisions:
- from: Mantén tus ojos en el campo donde ellos siegan[a], y ve detrás de ellos. ¿No he ordenado a los jóvenes que no te toquen? Cuando tengas sed, ve a los cántaros y bebe de lo que los jóvenes han sacado.
  to: Mantén tus ojos en el campo donde siegan, y ve detrás de ellas. ¿No he ordenado a los jóvenes que no te toquen[a]? Cuando tengas sed, ve a los cántaros y bebe de lo que los jóvenes han sacado.
  rationale: Se reubicó la nota [a] al segmento correcto (‘que no te toquen’) para cumplir la disciplina de anclaje de notas. También se cambió ‘ellos’ por ‘ellas’ para reflejar el femenino plural del hebreo y mantener la distinción entre las mujeres que van delante y los jóvenes varones mencionados después. No se requieren cambios adicionales sustanciales.
