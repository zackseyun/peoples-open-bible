base_translation:
  language: en
  yaml_path: translation/ot/1_kings/008/053.yaml
  text: For you set them apart for yourself as an inheritance from all the peoples of the earth[a], just as you spoke by the hand of Moses your servant when you brought our fathers out from Egypt[c][b], Lord GOD.
