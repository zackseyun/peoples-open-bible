review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien el sentido del hebreo: Yahvé habla a Moisés, le ordena entrar ante/ir a Faraón, comunicar la fórmula profética «Así dice Yahvé», exigir la liberación de «mi pueblo» y expresar el propósito «para que me sirvan». También preserva correctamente el nombre divino «Yahvé» y la amplitud semántica de עבד con una nota alternativa adecuada.'
  spanish_quality_summary: 'El español es claro y digno, pero hay dos detalles que conviene reparar: (1) la nota [a] es incorrecta e innecesaria, porque no hay variante significativa en «Moisés» ni la nota inglesa justifica una nota aquí; (2) «Entra ante Faraón» es comprensible, pero «Ve a Faraón» o «Ve ante Faraón» suena más natural en español general. Dado que el inglés auditado prefirió «Go in to Pharaoh» por el matiz cortesano, «Ve ante Faraón» equilibra mejor fidelidad y naturalidad que «Entra ante Faraón».'
  glossary_alignment: 'Buena alineación con la terminología del proyecto: יְהוָה -> «Yahvé»; עַמִּי -> «mi pueblo»; וְיַעַבְדֻנִי -> «para que me sirvan», con nota alternativa «me adoren». No hay conflicto teológico relevante.'
  issues:
  - severity: medium
    issue: Nota [a] en «Moisés[a]» no está respaldada por la evidencia
    rationale: La nota inglesa en Moses[a] no introduce una alternativa real útil para español; el borrador «O «Moisés»» es tautológico y no aporta información textual ni léxica. Debe eliminarse.
  - severity: low
    issue: «Entra ante Faraón» suena algo forzado en español
    rationale: Aunque intenta reflejar el matiz de entrar a la presencia del rey, en español neutral resulta menos natural. «Ve ante Faraón» mantiene la idea de comparecer ante él sin torpeza.
  revised_spanish_text: 'Yahvé dijo a Moisés: «Ve ante Faraón y dile: “Así dice Yahvé: Deja ir a mi pueblo, para que me sirvan[a]”».'
  revised_footnotes:
  - marker: a
    text: O «me adoren». El verbo hebreo puede denotar servicio rendido a Dios, incluido el culto.
    reason: lexical_alternative
  revision_rationale: Se elimina una nota espuria sobre «Moisés» y se mejora la naturalidad de «Entra ante Faraón» a «Ve ante Faraón», sin perder el matiz de presentarse ante el rey. Se conserva la fórmula profética, el nombre «Yahvé», «mi pueblo» y la amplitud de «me sirvan» con la nota alternativa documentada.
