  text: 묵은 누룩을 깨끗이 치우십시오. 그래야 여러분이 새 반죽이 될 것입니다. 사실 여러분은 누룩 없는 자들입니다. 우리의 유월절 어린양인 메시아께서 희생되셨기 때문입니다.
  philosophy: optimal-equivalence
