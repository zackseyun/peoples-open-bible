  rationale: Se ajusta el conector inicial a 'Pues' para reflejar mejor la función explicativa de כִּי en contexto, y se añade 'un' antes de 'pueblo' para mejorar la naturalidad española y reflejar con más precisión la pérdida de estatus nacional. Se mantiene 'será quebrantado' por cercanía al audit trail y aceptabilidad en registro bíblico moderno.
