translation:
  language: es
  text: Y le he declarado que estoy juzgando su casa para siempre, por la iniquidad que él sabía, porque sus hijos estaban maldiciendo a Dios[a], y él no los refrenó.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, según una lectura alternativa reflejada en algunos testigos antiguos y muchas traducciones: “porque sus hijos se estaban maldiciendo a sí mismos” o “estaban atrayendo maldición sobre sí mismos”.'
    reason: alternative_reading
lexical_decisions:
- source_word: וְהִגַּדְתִּי
  english_pob_choice: And I have declared
  chosen_spanish: Y le he declarado
  alternatives_spanish:
  - Y le dije
  - Y le anuncié
  lexicon: HALOT
  rationale: El verbo hiphil de נגד expresa hacer saber, declarar o anunciar. El perfecto hebreo se rinde bien con un pretérito perfecto compuesto en español para conservar la anterioridad con relevancia presente en el discurso profético.
- source_word: שֹׁפֵט אֲנִי
  english_pob_choice: I am judging
  chosen_spanish: estoy juzgando
  alternatives_spanish:
  - juzgo
  - juzgaré
  lexicon: HALOT
  rationale: El participio con pronombre explícito expresa acción vigente o inminente. 'Estoy juzgando' preserva esa fuerza procesual y solemne mejor que un futuro simple.
- source_word: בֵּיתוֹ
  english_pob_choice: his house
  chosen_spanish: su casa
  alternatives_spanish:
  - su casa
  - su familia
  - su linaje
  lexicon: HALOT
  rationale: Se conserva la imagen idiomática de 'casa' sin estrecharla a una sola referencia. En español, 'casa' puede abarcar hogar, familia o línea dinástica, según el contexto.
- source_word: עַד עוֹלָם
  english_pob_choice: forever
  chosen_spanish: para siempre
  alternatives_spanish:
  - por siempre
  - perpetuamente
  lexicon: HALOT
  rationale: La expresión denota duración permanente. 'Para siempre' es natural en español moderno y mantiene la severidad del juicio.
- source_word: בַּעֲוֺן
  english_pob_choice: for the iniquity
  chosen_spanish: por la iniquidad
  alternatives_spanish:
  - por la culpa
  - por el pecado
  lexicon: HALOT
  rationale: '''Iniquidad'' preserva el peso moral del término y coincide con el matiz culpable y gravemente ético del hebreo.'
- source_word: יָדַע
  english_pob_choice: he knew
  chosen_spanish: él conoció
  alternatives_spanish:
  - él sabía
  - él estaba al tanto
  lexicon: HALOT
  rationale: El sentido es el de conocimiento culpable de la falta. 'Conoció' mantiene la relación con el hecho conocido sin añadir explicaciones ajenas al texto.
- source_word: מְקַלְלִים לָהֶם
  english_pob_choice: because his sons were cursing God
  chosen_spanish: porque sus hijos estaban maldiciendo a Dios
  alternatives_spanish:
  - porque sus hijos se estaban maldiciendo
  - porque sus hijos estaban atrayendo maldición sobre sí mismos
  lexicon: HALOT
  rationale: Se sigue la lectura preferida en el audit trail revisado, que entiende la frase como una irreverencia directa contra Dios. En español, 'maldiciendo a Dios' transmite el sentido fuerte de la expresión sin suavizarla.
- source_word: כִהָה בָּם
  english_pob_choice: did not restrain them
  chosen_spanish: no los refrenó
  alternatives_spanish:
  - no los reprendió con severidad
  - no los contuvo
  lexicon: HALOT
  rationale: El verbo puede significar debilitar, amortiguar o contener. En contexto, la idea es que Eli no frenó la conducta de sus hijos; 'refrenó' comunica bien esa fuerza práctica.
theological_decisions:
- issue: Lectura del acto de los hijos de Elí en la frase difícil מְקַלְלִים לָהֶם
  english_pob_reading: The revised English POB reads 'because his sons were cursing God'
  chosen_spanish_reading: porque sus hijos estaban maldiciendo a Dios
  alternative_spanish_readings:
  - porque sus hijos se maldecían a sí mismos
  - porque sus hijos estaban blasfemando
  rationale: 'La tradición textual presenta una dificultad real: el hebreo consonántico permite una lectura menos directa, pero el audit trail de POB adoptó la lectura de que la ofensa era contra Dios. La versión española sigue esa decisión revisada y conserva la tensión textual en la nota.'
  doctrine_reference: Principios de fidelidad textual y manejo de variantes de traducción
- issue: Alcance de la expresión 'su casa'
  english_pob_reading: '''his house'' is retained without narrowing'
  chosen_spanish_reading: su casa
  alternative_spanish_readings:
  - su familia
  - su linaje
  rationale: La expresión hebrea es idiomática y puede abarcar hogar, descendencia o dinastía. Mantener 'su casa' evita resolver de antemano un alcance que el texto deja amplio.
  doctrine_reference: Principios de equivalencia óptima y conservación del idiomatismo bíblico
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión más reciente del audit trail en inglés, que cambió la frase problemática de una lectura reflexiva a 'cursing God'. La redacción española adopta esa lectura revisada en el texto principal y conserva la alternativa textual en nota.
  spanish_consistency_notes:
  - Se usa 'Yahvé' como forma por defecto cuando aparezca el nombre divino; en este versículo no ocurre.
  - Se mantiene 'casa' para בית como idiomatismo bíblico, sin convertirlo en 'familia' o 'linaje' en el texto principal.
  - Se eligió 'maldiciendo a Dios' para seguir la decisión inglesa revisada y evitar suavizar la gravedad del verbo.
  - '''Refrenó'' reproduce bien la idea de frenar/contener implícita en כִהָה.'
