translation:
  language: es
  text: Y toda la asamblea se sentó en el atrio abierto del templo[a], temblando a causa del temporal que los azotaba[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «en la amplia explanada del templo» o «en el espacioso recinto del santuario». El griego εὐρυχώρῳ es algo inusual y puede indicar un área abierta dentro del recinto del templo.
    reason: lexical_alternative
  - marker: b
    text: O «temblando por la tormenta invernal» o «por el clima que entonces tenían encima». χειμών puede significar «invierno» o «tormenta/mal tiempo»; el contexto favorece el sentido de clima tormentoso presente en ese momento.
    reason: lexical_alternative
lexical_decisions:
- source_word: συνεκάθισαν
  english_pob_choice: sat together
  chosen_spanish: se sentó junta
  alternatives_spanish:
  - se sentó unida
  - tomó asiento junta
  - se sentó en conjunto
  lexicon: LSJ
  rationale: El verbo compuesto expresa una acción colectiva de sentarse o acomodarse juntos. En español, «se sentó junta» conserva la imagen concreta y la simultaneidad sin volverse áspero.
- source_word: πᾶν τὸ πλῆθος
  english_pob_choice: the whole assembly
  chosen_spanish: toda la multitud
  alternatives_spanish:
  - toda la asamblea
  - todo el gentío
  - la multitud entera
  lexicon: LSJ
  rationale: La expresión designa al conjunto reunido. «Multitud» preserva el valor masivo del griego; «toda» refuerza la totalidad. «Asamblea» sería más interpretativa para un contexto litúrgico que el texto no exige de manera explícita.
- source_word: ἐν τῇ εὐρυχώρῳ
  english_pob_choice: in the open court
  chosen_spanish: en el atrio abierto
  alternatives_spanish:
  - en el lugar espacioso
  - en la amplia explanada
  - en el espacio abierto
  lexicon: LSJ
  rationale: εὐρυχώρῳ es un término espacioso/open-place. Dado τοῦ ἱεροῦ, «atrio abierto» comunica de forma natural un espacio abierto dentro del recinto sagrado, manteniendo el sentido arquitectónico sin forzar una identificación demasiado específica.
- source_word: τοῦ ἱεροῦ
  english_pob_choice: of the temple
  chosen_spanish: del templo
  alternatives_spanish:
  - del santuario
  - del recinto sagrado
  - del lugar santo
  lexicon: LSJ
  rationale: ἱερόν suele referirse al templo o recinto sagrado. «Templo» es la opción más clara y directa en español; el matiz de recinto queda ya sugerido por «atrio».
- source_word: τρέμοντες
  english_pob_choice: trembling
  chosen_spanish: temblando
  alternatives_spanish:
  - tiritando
  - estremeciéndose
  - temiendo
  lexicon: LSJ
  rationale: El participio puede indicar temblor físico por el clima. «Temblando» es la forma más neutral y permite no cerrar indebidamente entre miedo y reacción corporal al frío o la intemperie.
- source_word: τὸν ἐνεστῶτα χειμῶνα
  english_pob_choice: because of the present storm
  chosen_spanish: a causa de la tormenta presente
  alternatives_spanish:
  - a causa del invierno presente
  - a causa del temporal que los azotaba
  - por el mal tiempo del momento
  lexicon: LSJ
  rationale: χειμών puede significar invierno, tormenta o mal tiempo. En este contexto, la lectura de tormenta/mal tiempo es la más natural; «presente» traduce ἐνεστῶτα como una condición actual e inmediata.
translation_notes:
  revision_awareness: La traducción sigue el texto griego de Swete como ancla principal; el paralelo hebreo/masorético se usa solo como verificación de contexto y no altera la elección básica de sentido. La revisión inglesa más reciente quedó sin cambios, y la correspondencia general fue de alto acuerdo.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma del proyecto cuando aparezca el Tetragrámaton, aunque este versículo no lo contiene.
  - No hay términos cristológicos ni referencias doctrinales que requieran glosa especial.
  - Se evita una traducción demasiado técnica de εὐρυχώρῳ; «atrio abierto» equilibra claridad y cautela semántica.
