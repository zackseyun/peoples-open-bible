  verdict: revise
  source_alignment_summary: 'El borrador refleja bien el sentido básico del hebreo: una misma norma para el nativo y para el גֵּר que vive dentro de la comunidad. Conserva adecuadamente תּוֹרָה como «ley» y distingue al no nativo como residente, con nota alternativa para «instrucción». Sin embargo, «habrá» no reproduce tan fielmente יִהְיֶה לְ… («será para…») como sí lo hace «será», y «entre ustedes» puede mejorarse a «en medio de ustedes» para reflejar mejor בְּתוֹכְכֶם en un registro bíblico natural.'
  spanish_quality_summary: El español es claro y comprensible, pero «Una sola ley habrá…» suena algo menos natural y menos transparente que «Habrá una sola ley…» o, mejor aquí por fidelidad, «Una sola ley será…». Además, la combinación «extranjero residente que reside» resulta repetitiva. Puede mantenerse por transparencia léxica, pero es preferible variar el participio a «que vive» para evitar dureza sin perder el matiz residente.
  glossary_alignment: 'Buena alineación general con las decisiones del POB: תּוֹרָה→«ley» con nota «instrucción»; אֶזְרָח→«nativo»; גֵּר→«extranjero residente», una opción válida en español para «sojourner/resident foreigner». No hay conflictos con la terminología doctrinal del proyecto.'
  issues:
