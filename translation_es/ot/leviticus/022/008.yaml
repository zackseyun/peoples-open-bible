translation:
  language: es
  text: No comerá un animal hallado muerto[a] ni uno desgarrado por fieras, haciéndose impuro por ello. Yo soy Yahvé.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «lo que muere por sí mismo o es despedazado por fieras»; el hebreo puede expresar un animal hallado muerto sin sacrificio apropiado.'
    reason: lexical_alternative
lexical_decisions:
- source_word: נְבֵלָה
  english_pob_choice: an animal found dead
  chosen_spanish: animal hallado muerto
  alternatives_spanish:
  - cadáver de animal
  - animal muerto por sí mismo
  lexicon: HALOT
  rationale: נְבֵלָה nombra un animal muerto sin sacrificio apropiado, especialmente uno hallado muerto o caído por causas naturales. «Animal hallado muerto» comunica bien ese sentido en español contemporáneo y conserva la idea legal y ritual mejor que un simple «cadáver».
- source_word: וּטְרֵפָה
  english_pob_choice: or torn by beasts
  chosen_spanish: ni desgarrado por fieras
  alternatives_spanish:
  - o desgarrado
  - o un animal desgarrado por bestias
  lexicon: HALOT
  rationale: טְרֵפָה designa un animal destrozado por depredadores. En español, «desgarrado por fieras» hace explícito el agente y mantiene el tono natural del mandamiento. Se usa «ni» para conservar la prohibición conjunta en la serie de objetos prohibidos.
- source_word: לֹא יֹאכַל
  english_pob_choice: He shall not eat
  chosen_spanish: No comerá
  alternatives_spanish:
  - No deberá comer
  - No ha de comer
  lexicon: HALOT
  rationale: En registro legal, el imperfecto con negación expresa prohibición. «No comerá» preserva esa fuerza normativa en español sin volverla excesivamente arcaica.
- source_word: לְטָמְאָה בָהּ
  english_pob_choice: making himself unclean by it
  chosen_spanish: haciéndose impuro por él
  alternatives_spanish:
  - para contaminarse por él
  - volviéndose impuro por ello
  lexicon: HALOT
  rationale: 'El infinitivo con ל expresa finalidad o consecuencia: comerlo produciría impureza ritual. «Haciéndose impuro por él» refleja bien esa relación causal y mantiene el lenguaje de pureza ritual. Se prefiere «impuro» como equivalente natural de טָמֵא en español bíblico contemporáneo.'
- source_word: אֲנִי יְהוָה
  english_pob_choice: I am Yahweh
  chosen_spanish: Yo soy Yahvé
  alternatives_spanish:
  - Yo soy Yahweh
  - Yo soy el SEÑOR
  lexicon: DOCTRINE.md contested terms / Tetragrammaton
  rationale: El texto hebreo dice directamente יהוה. Conforme a la terminología del proyecto, se traduce como «Yahvé» y se conserva la fórmula enfática «Yo soy», que cierra el mandato con autoridad de pacto.
theological_decisions:
- issue: Nombre divino y fórmula de autoridad
  english_pob_reading: I am Yahweh
  chosen_spanish_reading: Yo soy Yahvé
  alternative_spanish_readings:
  - Yo soy Yahweh
  - Yo soy el SEÑOR
  rationale: El versículo termina con la autoidentificación de YHWH. La lectura en español conserva el nombre divino «Yahvé» según la directriz del proyecto, evitando el sustituto litúrgico «SEÑOR» que ocultaría el Tetragrammaton.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Impureza ritual por ingestión prohibida
  english_pob_reading: making himself unclean by it
  chosen_spanish_reading: haciéndose impuro por él
  alternative_spanish_readings:
  - contaminándose por él
  - volviéndose impuro por ello
  rationale: La frase expresa un efecto ritual, no meramente higiénico o moral. «Impuro» y no «sucio» mantiene la categoría cultual de טָמֵא. El verbo pronominal conserva la agencia del sujeto, como en la construcción hebrea.
  doctrine_reference: 'Levítico 11–22: lenguaje de pureza ritual'
translation_notes:
  revision_awareness: 'Se siguió de cerca el audit trail inglés, pero la traducción se ajustó directamente al hebreo: נְבֵלָה como «animal hallado muerto», טְרֵפָה como «desgarrado por fieras», la negación legal como prohibición, y לְטָמְאָה בָהּ como consecuencia ritual de impureza. Se mantuvo la clausura con el nombre divino «Yahvé» de acuerdo con la política terminológica española del proyecto.'
  spanish_consistency_notes:
  - Se usa «Yahvé» para יְהוָה en todo el registro español, coherente con la política del proyecto.
  - «Impuro» se emplea para טָמֵא en contexto ritual; no se sustituye por «contaminado» salvo necesidad contextual.
  - La serie prohibitiva se resuelve en español con «ni» para mantener fluidez sin debilitar la fuerza legal del hebreo.
