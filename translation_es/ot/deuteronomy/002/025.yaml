    text: O «oirán tu fama» o «oirán noticias acerca de ti». El hebreo puede referirse a un informe que produce reputación.
    reason: lexical_alternative
  - marker: b
    text: O «estarán en angustia» o «se retorcerán como una mujer de parto». El verbo hebreo evoca una aflicción corporal intensa.
    reason: lexical_alternative
  revision_rationale: 'Se reparó el español para que suene natural sin perder el sentido fuente: el doblete objetivo pasó a «el pavor y el temor que inspiras»; «bajo todos los cielos» mejora la idiomaticidad; «oirán noticias de ti» expresa bien שִׁמְעֲךָ. También se alinearon las notas con las alternativas léxicas auditadas más significativas. Se mantuvo «se retorcerán» en el texto principal por su viveza y fidelidad al hebreo.'
