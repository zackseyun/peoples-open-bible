translation:
  language: es
  text: 'David los dividió en divisiones para los hijos de Leví: Guersón[a], Cohat y Merari.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «para Guersón, Cohat y Merari», haciendo más explícito que la preposición rige la lista de clanes.'
