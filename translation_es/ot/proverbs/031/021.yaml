    issue: «el frío» reemplaza «nieve»
    rationale: מִשָּׁלֶג significa específicamente «de la nieve / por la nieve». Cambiarlo a «frío» introduce interpretación adicional y pierde la imagen concreta preservada por el texto fuente y el English POB.
  - severity: medium
    issue: «por su casa» puede sonar al edificio más que al hogar/household
    rationale: Aunque «casa» puede incluir la unidad doméstica, en español la frase completa se entiende mejor como preocupación por las personas bajo su cuidado. Conviene una formulación que conserve «casa» pero haga claro el sentido humano, o usar «hogar».
  - severity: medium
    issue: «toda su casa está vestida» suena menos natural en español
    rationale: 'El hebreo usa un predicado singular colectivo, pero en español una formulación con referente humano plural comunica mejor: «todos en su casa están vestidos». Esto evita imaginar la casa física vestida.'
  - severity: low
    issue: La nota al pie necesita una redacción más natural y exacta
    rationale: Debe reflejar la alternativa inglesa «all her household are clothed in double garments» con español idiomático y sin puntuación innecesariamente marcada.
