review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la sintaxis básica del griego: cláusula temporal con sujeto implícito, movimiento hostil contra los pecadores, procedencia desde la presencia divina y propósito de destrucción. También sigue correctamente la revisión inglesa más reciente al entender πᾶσαν ὑπόστασιν ἁμαρτωλῶν en sentido patrimonial. Sin embargo, «desde la presencia de Yahvé» suena menos natural que «de la presencia de Yahvé» o «de delante de Yahvé» para ἀπὸ προσώπου, y «toda posesión de los pecadores» es comprensible pero algo singular/marcado; «todas las posesiones de los pecadores» expresa mejor el distributivo de πᾶσαν ὑπόστασιν en español idiomático.'
  spanish_quality_summary: El español es claro y digno, pero requiere un ajuste menor para sonar más natural y bíblico sin calco. La frase preposicional con «desde» resulta algo rígida en este contexto. Además, el singular «toda posesión» es posible, pero «todas las posesiones» fluye mejor y comunica con más claridad el alcance total de los bienes.
  glossary_alignment: 'Buena alineación general con las convenciones del proyecto: «Yahvé» para κύριος en referencia divina, «pecadores» para ἁμαρτωλοί, y «destruir» para ὀλεθρεύσαι. La nota alternativa sobre «sustancia» preserva bien la amplitud léxica documentada para ὑπόστασις.'
  issues:
  - severity: medium
    issue: «desde la presencia de Yahvé» suena poco natural para ἀπὸ προσώπου Κυρίου
    rationale: Aunque «desde» puede marcar procedencia, en español bíblico-natural «de la presencia de Yahvé» expresa mejor el origen desde delante de Dios sin rigidez innecesaria.
  - severity: low
    issue: «toda posesión de los pecadores» resulta menos idiomático que un plural colectivo
    rationale: Para bienes o patrimonio en general, el español prefiere «todas las posesiones de los pecadores», que conserva el sentido patrimonial de ὑπόστασις y mejora la fluidez.
  revised_spanish_text: cuando salga contra los pecadores de la presencia de Yahvé, para destruir todas las posesiones de los pecadores.[a]
