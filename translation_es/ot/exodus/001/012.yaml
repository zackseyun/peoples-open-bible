translation:
  language: es
  text: Pero cuanto más los afligían, tanto más se multiplicaban y tanto más se extendían[b], de modo que temían[c] a los hijos de Israel[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'los israelitas' o 'los hijos de Israel'.
    reason: lexical_alternative
  - marker: b
    text: O 'irrumpían' o 'se expandían con fuerza'. El hebreo expresa una expansión vigorosa.
    reason: lexical_alternative
  - marker: c
    text: O 'sentían temor ante' o 'los aborrecían'. El hebreo puede expresar temor intenso o aversión.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְכַאֲשֶׁר
  english_pob_choice: But the more
  chosen_spanish: Pero cuanto más
  alternatives_spanish:
  - Y como
  - Pero como
  - Cuanto más
  lexicon: HALOT
  rationale: 'La construcción correlativa expresa proporcionalidad: ''cuanto más... tanto más''. ''Pero'' conserva el giro adversativo narrativo frente a la opresión egipcia.'
- source_word: יְעַנּוּ
  english_pob_choice: they afflicted
  chosen_spanish: los afligían
  alternatives_spanish:
  - los oprimían
  - los humillaban
  lexicon: HALOT
  rationale: ענה en piel puede significar afligir, oprimir o humillar. 'Afligían' conserva el trato duro sin concretar indebidamente el medio.
- source_word: אֹתוֹ
  english_pob_choice: them
  chosen_spanish: los
  alternatives_spanish:
  - lo
  - a él
  lexicon: HALOT
  rationale: 'Aunque el pronombre hebreo es singular, el referente es colectivo: Israel. En español, ''los'' refleja ese referente colectivo con naturalidad.'
- source_word: כֵּן
  english_pob_choice: the more
  chosen_spanish: tanto más
  alternatives_spanish:
  - así
  - de ese modo
  lexicon: HALOT
  rationale: En correlación con la cláusula inicial, כֵּן intensifica la proporción; 'tanto más' reproduce bien el paralelismo hebreo.
- source_word: יִרְבֶּה
  english_pob_choice: they multiplied
  chosen_spanish: se multiplicaban
  alternatives_spanish:
  - aumentaban
  - crecían
  lexicon: HALOT
  rationale: רבה expresa aumento numérico; el reflexivo impersonal en español comunica crecimiento del pueblo sin forzar un sujeto gramatical extraño.
- source_word: וְכֵן יִפְרֹץ
  english_pob_choice: and the more they spread out
  chosen_spanish: y tanto más se extendían
  alternatives_spanish:
  - y tanto más se propagaban
  - y tanto más se expandían
  - y tanto más se abrían paso
  lexicon: HALOT
  rationale: פרץ aquí sugiere expansión vigorosa o irrupción. 'Se extendían' expresa la expansión del pueblo de forma clara y sobria en español.
- source_word: וַיָּקֻצוּ
  english_pob_choice: they dreaded
  chosen_spanish: les causaban temor
  alternatives_spanish:
  - les inspiraban horror
  - les daban asco
  - les producían repugnancia
  lexicon: HALOT
  rationale: קוץ puede abarcar temor intenso o aversión. Dado el contexto de reacción frente al crecimiento de Israel, 'les causaban temor' preserva la fuerza sin introducir un matiz demasiado específico de repulsión.
- source_word: מִפְּנֵי
  english_pob_choice: so that the Egyptians dreaded
  chosen_spanish: de modo que
  alternatives_spanish:
  - por causa de que
  - ante
  lexicon: HALOT
  rationale: La relación resultativa se expresa con naturalidad en español mediante 'de modo que'. El sujeto de la reacción queda implícito por el contexto, como en la revisión inglesa más reciente.
- source_word: בְּנֵי יִשְׂרָאֵל
  english_pob_choice: the sons of Israel
  chosen_spanish: los hijos de Israel
  alternatives_spanish:
  - los hijos de Jacob
  - los israelitas
  - el pueblo de Israel
  lexicon: HALOT
  rationale: Se mantiene la fórmula transparente 'hijos de Israel', que es fiel al hebreo y comprensible en español bíblico contemporáneo.
theological_decisions:
- issue: Referencia colectiva del pronombre singular hebreo
  english_pob_reading: Hebrew literally 'him,' referring collectively to Israel; English renders the collective sense as 'them.'
  chosen_spanish_reading: 'El pronombre se traduce en plural colectivo: ''los''.'
  alternative_spanish_readings:
  - lo
  - a él
  rationale: El hebreo usa un singular morfológico para un referente colectivo. En español, el plural colectivo evita oscurecer que se habla del pueblo entero.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4
- issue: Expresión etnónima בְּנֵי יִשְׂרָאֵל
  english_pob_reading: the sons of Israel
  chosen_spanish_reading: los hijos de Israel
  alternative_spanish_readings:
  - los israelitas
  - los niños de Israel
  - el pueblo de Israel
  rationale: '''Hijos de Israel'' preserva la forma hebrea y sigue siendo idiomática en español bíblico. ''Israelitas'' es más fluido, pero menos transparente respecto de la construcción מקורית.'
  doctrine_reference: DOCTRINE.md §Translation philosophy 4
- issue: Valor semántico de וַיָּקֻצוּ
  english_pob_reading: they dreaded / they loathed
  chosen_spanish_reading: les causaban temor
  alternative_spanish_readings:
  - les provocaban aversión
  - les inspiraban horror
  - les resultaban repugnantes
  rationale: El verbo hebreo puede expresar temor o aversión fuerte. En este contexto de reacción ante el crecimiento de Israel, 'temor' mantiene abierta la tensión entre miedo y repulsión sin decidir en exceso.
  doctrine_reference: HALOT; DOCTRINE.md §Translation philosophy 2
translation_notes:
  revision_awareness: La revisión inglesa más reciente eliminó 'the Egyptians' porque no está explícito en el hebreo y mantuvo un sujeto implícito. Esta versión española sigue esa decisión, dejando la reacción en forma impersonal/resultativa ('de modo que...') y sin introducir un sujeto no expreso.
  spanish_consistency_notes:
  - Se conserva el paralelismo correlativo hebreo con 'cuanto más... tanto más...'.
  - Se mantiene 'hijos de Israel' para la etnónimo bíblico, en línea con la transparencia del texto fuente.
  - '''Afligían'' y ''les causaban temor'' preservan la ambigüedad del campo semántico sin sobreinterpretar.'
  - No se introduce 'Egipcios' porque el hebreo no lo menciona explícitamente en este versículo.
