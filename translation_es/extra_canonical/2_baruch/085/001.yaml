  text: '… the times are close and already pressing in. The pitcher is near the well, the ship the harbor, the journey the city, and life its completion.


    So then receive his commandments, that you may not be cut off from the greatness of his mercy, but may find rest and not condemnation.


    For when the Most High brings these things to pass, there will no longer be room for repentance, or a boundary for the times, or an extension of the seasons, or a turning toward rest; nor will anyone be helped by prayer, or by the mediation of fathers, or by the petition of prophets, or by the aid of the righteous, or by the weeping of women, or by the tenderness of little children, or by the crying of infants, or by the innocence of newborns, or by the righteousness of their fathers. None of the things once thought and seen to be helpers will be able to help.


    For each of us will then be judged by himself alone.


    And he will preserve for his age those who have hope in him, but he will at once destroy those who are defiled with sins.'
  footnotes:
  - marker: a
    text: Or 'stand by himself alone'.
    reason: previous_rendering
