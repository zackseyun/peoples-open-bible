revisions:
- from: Pero mi ojo los perdonó[a] de destruirlos, y no hice de ellos un fin completo en el desierto.
  to: Pero mi ojo tuvo compasión de ellos[a] y no los destruí por completo en el desierto.
  rationale: Se conserva el antropomorfismo deliberado «mi ojo» y se corrige חוס a una expresión española natural que preserve la compasión activa del hebreo. También se reemplaza el calco «no hice de ellos un fin completo» por «no los destruí por completo», que comunica fielmente el sentido de עשה כלה en español claro y digno. No se requiere adjudicación especial; es una reparación estilística y léxica directa.
