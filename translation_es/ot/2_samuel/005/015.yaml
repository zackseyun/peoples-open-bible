  rationale: En una lista genealógica, el hebreo funciona como nombre personal y debe transliterarse, no traducirse. Conservé la forma ya adoptada por la POB inglesa, aunque 'Yibhar' sería una alternativa más fonética en español.
- source_word: אֱלִישׁוּעַ
  english_pob_choice: Elishua
  chosen_spanish: Elisúa
  alternatives_spanish:
  - Elishua
  lexicon: nombre propio
  rationale: Es un nombre propio y se translitera. En español, 'Elisúa' refleja mejor la secuencia vocálica natural y evita una grafía demasiado anglicada; 'Elishua' queda como alternativa conservadora.
- source_word: נֶפֶג
  english_pob_choice: Nepheg
  chosen_spanish: Néfeg
  alternatives_spanish:
  - Nepheg
  lexicon: nombre propio
  rationale: Nombre propio en una serie genealógica. Mantengo la transliteración y adapto la acentuación gráfica al español para una lectura más natural; la forma sin tilde es posible, pero menos clara para la pronunciación.
- source_word: יָפִיעַ
  english_pob_choice: Japhia
  chosen_spanish: Jafía
  alternatives_spanish:
  - Yafía
  - Japhia
  lexicon: nombre propio
  rationale: Nombre propio transliterado. Uso 'Jafía' para una representación española legible y fonéticamente cercana; 'Yafía' sería una transliteración más literal del valor inicial, mientras que 'Japhia' sigue la convención inglesa.
- source_word: וְ
  english_pob_choice: and
  chosen_spanish: y
  alternatives_spanish:
  - e
  lexicon: conjunción coordinante
  rationale: El hebreo repite la conjunción ante cada nombre. En español, la serie se expresa de forma idiomática con comas y 'y' antes del último elemento. No repito 'y' en cada miembro porque sonaría artificial; esto sigue la equivalencia óptima del texto inglés auditado.
