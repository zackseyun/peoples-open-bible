revisions:
- from: Por tanto, Yahvé no se complace en sus jóvenes[a], ni tiene compasión de sus huérfanos y de sus viudas; porque todos ellos son impíos y malhechores, y toda boca habla vileza[b]. Con todo esto, no se ha vuelto su ira, y todavía su mano está extendida.
  to: Por tanto, el Señor no se regocija por sus jóvenes[a], ni tiene compasión de sus huérfanos y de sus viudas; porque todos ellos son impíos y malhechores, y toda boca habla insensatez[b]. Con todo esto, su ira no se ha apartado, y todavía su mano está extendida.
  rationale: 'Se corrige «Yahvé» a «el Señor» porque la fuente dice אֲדֹנָי, no יהוה. Se ajusta el estribillo a un español idiomático y fiel: «su ira no se ha apartado». También se mueve נְבָלָה a «insensatez» para reflejar mejor la elección principal del audit trail inglés («folly»), manteniendo en nota las alternativas de vileza/vergüenza. El resto del versículo puede conservarse con leves mejoras de fluidez.'
