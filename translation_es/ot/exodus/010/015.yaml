translation:
  language: es
  text: Y cubrió la faz[a] de toda la tierra, y la tierra se oscureció; y comió toda planta de la tierra y todo el fruto de los árboles que había dejado el granizo. No quedó nada verde en los árboles ni en las plantas del campo, en toda la tierra de Egipto.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo, literalmente: ‘el ojo de toda la tierra’, un modismo para la superficie visible o la faz de la tierra.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְכַס
  english_pob_choice: it covered
  chosen_spanish: cubrió
  alternatives_spanish:
  - la cubrió
  - la cubrió por completo
  lexicon: HALOT
  rationale: El verbo está en singular, con sujeto colectivo implícito (la plaga). En español, el singular también puede referirse a un agente/plaga colectiva sin necesidad de explicitarlo.
- source_word: עֵין כָּל הָאָרֶץ
  english_pob_choice: the face of the whole land
  chosen_spanish: la superficie[a] de toda la tierra
  alternatives_spanish:
  - el rostro de toda la tierra
  - la cara de toda la tierra
  - la superficie de toda la tierra
  lexicon: HALOT
  rationale: Se conserva el valor idiomático de ‘ojo’ como superficie visible/rostro del territorio. ‘Superficie’ comunica bien la imagen en español; la nota preserva el trasfondo literal ‘ojo de toda la tierra’.
- source_word: וַתֶּחְשַׁךְ הָאָרֶץ
  english_pob_choice: so that the land was darkened
  chosen_spanish: y la tierra se oscureció
  alternatives_spanish:
  - y la tierra quedó oscura
  - y la tierra fue oscurecida
  lexicon: HALOT
  rationale: El verbo expresa llegar a estar oscura. ‘Se oscureció’ es natural y mantiene el cambio de estado sin introducir una pasiva innecesaria.
- source_word: וַיֹּאכַל
  english_pob_choice: it ate
  chosen_spanish: devoró
  alternatives_spanish:
  - comió
  - consumió
  lexicon: HALOT
  rationale: El verbo ‘comer’ se aplica aquí de modo figurado a la devastación de la plaga. ‘Devoró’ preserva el efecto destructivo que la POB inglesa deja en ‘ate’ dentro del contexto narrativo.
- source_word: כָּל עֵשֶׂב הָאָרֶץ
  english_pob_choice: every plant of the land
  chosen_spanish: toda la hierba de la tierra
  alternatives_spanish:
  - toda planta de la tierra
  - toda vegetación de la tierra
  lexicon: HALOT
  rationale: עֵשֶׂב puede abarcar vegetación/hierba. Dado el paralelismo con ‘fruto de los árboles’ y ‘hierba del campo’, ‘hierba’ comunica la cobertura vegetal sin restringirla excesivamente a césped.
- source_word: כָּל פְּרִי הָעֵץ
  english_pob_choice: all the fruit of the trees
  chosen_spanish: todo el fruto de los árboles
  alternatives_spanish:
  - todo el fruto del árbol
  - todos los frutos de los árboles
  lexicon: HALOT
  rationale: Se conserva el colectivo distributivo. El plural ‘árboles’ fluye naturalmente en español, como en la auditoría inglesa, sin perder el sentido genérico.
- source_word: אֲשֶׁר הוֹתִיר הַבָּרָד
  english_pob_choice: that the hail had left
  chosen_spanish: que había dejado el granizo
  alternatives_spanish:
  - que el granizo había dejado
  - que el granizo había perdonado
  - que quedó del granizo
  lexicon: HALOT
  rationale: '‘Había dejado’ reproduce el valor de הוֹתִיר con perfecto anterior y mantiene claro el antecedente: lo que sobrevivió a la plaga del granizo.'
- source_word: וְלֹא נוֹתַר
  english_pob_choice: No ... remained
  chosen_spanish: No quedó
  alternatives_spanish:
  - No permaneció
  - No se mantuvo
  lexicon: HALOT
  rationale: La construcción negativa resultativa en español se expresa con naturalidad mediante ‘no quedó’, que conserva la totalidad de la destrucción.
- source_word: כָּל יֶרֶק
  english_pob_choice: No green thing
  chosen_spanish: ningún verde
  alternatives_spanish:
  - nada verde
  - ninguna cosa verde
  - ningún brote verde
  lexicon: HALOT
  rationale: יֶרֶק denota ‘verde’ o ‘cosa verde/verdor’. ‘Ningún verde’ mantiene la amplitud semántica y la fuerza totalizante; es breve y fiel al hebreo. La nota explica que se trata del ‘verdor/verde’ general, no sólo de hojas.
- source_word: בָּעֵץ
  english_pob_choice: on the trees
  chosen_spanish: en los árboles
  alternatives_spanish:
  - sobre los árboles
  - en el árbol
  lexicon: HALOT
  rationale: Con ‘quedó’ y el contexto de vegetación, ‘en los árboles’ es idiomático y abarca lo que permanece sobre ellos.
- source_word: וּבְעֵשֶׂב הַשָּׂדֶה
  english_pob_choice: or on the plants of the field
  chosen_spanish: ni en la hierba del campo
  alternatives_spanish:
  - ni en la vegetación del campo
  - ni en las plantas del campo
  lexicon: HALOT
  rationale: El paralelismo exige una segunda esfera vegetal. ‘Hierba del campo’ es claro y mantiene el estilo bíblico sin sonar arcaizante.
- source_word: בְּכָל אֶרֶץ מִצְרָיִם
  english_pob_choice: in all the land of Egypt
  chosen_spanish: en toda la tierra de Egipto
  alternatives_spanish:
  - en todo el país de Egipto
  - por toda la tierra de Egipto
  lexicon: HALOT
  rationale: ‘Tierra de Egipto’ es la forma bíblica más natural y fiel al territorialismo del hebreo.
translation_notes:
  revision_awareness: La redacción sigue la revisión más reciente del audit trail inglés, que prefirió una negación natural y formal (‘No green thing remained’) en lugar de una doble negación más torpe. En español se adoptó ‘No quedó ningún verde...’, equivalente en registro y fluidez.
  spanish_consistency_notes:
  - Se conservó Yahvé donde no aplica en este versículo; no aparece el nombre divino en el texto base.
  - Se evitó ‘plantas’ para עֵשֶׂב porque el paralelo poético y el contexto agrícola permiten ‘hierba’ con amplitud semántica suficiente.
  - La imagen idiomática de עֵין הָאָרֶץ se resolvió con ‘superficie’, manteniendo la nota para no perder la metáfora original.
  - ‘Devoró’ se eligió para preservar el matiz devastador de ‘comió’ en español narrativo sin volver la frase excesivamente libre.
