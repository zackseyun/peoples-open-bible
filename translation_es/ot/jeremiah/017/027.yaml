revisions:
- from: Pero si no me escuchan[a], para santificar el día del sábado, y para no cargar una carga y entrarla por las puertas de Jerusalén en el día del sábado, entonces encenderé un fuego en sus puertas, y consumirá los palacios de Jerusalén[b], y no se apagará.
  to: Pero si no me escuchan, para santificar el día del sábado, y para no llevar una carga[a] ni meterla por las puertas de Jerusalén en el día del sábado, entonces encenderé un fuego en sus puertas[b], y consumirá los palacios de Jerusalén, y no se apagará.
  rationale: Se revisa para alinear la nota [a] con el expediente inglés y para mejorar la naturalidad del español en la expresión de introducir la carga por las puertas de Jerusalén. «Llevar una carga» y «meterla» conservan el sentido hebreo y son más claros para lectores hispanos. También se normaliza la redacción de la nota [b].
