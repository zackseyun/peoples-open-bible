  yaml_path: translation/nt/1_corinthians/006/015.yaml
  text: Do you not know that your bodies are members of Messiah? Shall I then take the members of Messiah and make them members of a prostitute? May it never be[a][b].
  footnotes:
  - marker: a
    text: 'Or, ''Christ'' instead of ''the Messiah.'' The Greek title Χριστός can function either as a translated title (''Messiah'') or a name-like form (''Christ'').'
    reason: alternative_reading
  - marker: b
    text: 'Or, ''By no means'' / ''Certainly not.'' Greek μὴ γένοιτο is a strong expression of repudiation.'
    reason: lexical_alternative
