id: GEN.47.31
reference: Genesis 47:31
source:
  edition: WLC
  text: וַ/יֹּ֗אמֶר הִשָּֽׁבְעָ/ה֙ לִ֔/י וַ/יִּשָּׁבַ֖ע ל֑/וֹ וַ/יִּשְׁתַּ֥חוּ יִשְׂרָאֵ֖ל עַל רֹ֥אשׁ הַ/מִּטָּֽה־׃פ
translation:
  text: He said[a], “Swear to me,” and he swore to him. Then Israel bowed himself on the head of the bed.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'at the head of the staff.' The Hebrew consonants can be read this way, and this is the sense reflected in the Septuagint and in Hebrews 11:21.
    reason: alternative_reading
lexical_decisions:
- source_word: הִשָּׁבְעָה
  chosen: Swear
  alternatives:
  - Take an oath
  lexicon: HALOT
  rationale: Imperative of שבע in the Niphal/Hiphil-related oath formula; 'Swear to me' is the natural, concise English equivalent and preserves the directness of Jacob's demand.
- source_word: וַיִּשָּׁבַע
  chosen: he swore
  alternatives:
  - he took an oath
  lexicon: HALOT
  rationale: Narrative continuation of the same oath verb; 'he swore' keeps lexical consistency with the imperative and matches standard English idiom.
- source_word: וַיִּשְׁתַּחוּ
  chosen: bowed himself
  alternatives:
  - worshiped
  - prostrated himself
  lexicon: HALOT
  rationale: The verb can denote bowing down or worship depending on context. Here the object is not explicitly God but Jacob/Israel's bodily act on the bed, so 'bowed himself' best preserves the physical gesture without importing an explicit act of worship into the main text.
- source_word: יִשְׂרָאֵל
  chosen: Israel
  alternatives:
  - Jacob
  lexicon: HALOT
  rationale: The Hebrew text uses 'Israel,' and the translation philosophy prefers preserving the source's chosen personal designation rather than harmonizing to 'Jacob.'
- source_word: עַל רֹאשׁ הַמִּטָּה
  chosen: at the head of the bed
  alternatives:
  - upon the head of the bed
  - toward the head of the bed
  lexicon: HALOT
  rationale: The phrase most naturally refers to the head/end of Jacob's bed. 'At the head of the bed' is idiomatic modern English while staying close to the Hebrew spatial expression.
- source_word: הַמִּטָּה
  chosen: bed
  alternatives:
  - couch
  lexicon: HALOT
  rationale: The Masoretic pointing reads 'bed' (mittah). This is the plain sense in the Hebrew text and fits the immediate context of Jacob's weakness and posture.
