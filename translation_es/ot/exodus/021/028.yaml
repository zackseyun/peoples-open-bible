translation:
  language: es
  text: Y si un buey[a] cornea a un hombre o a una mujer y la mata, el buey ciertamente será apedreado, y no se comerá su carne; pero el dueño del buey queda libre.[b]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O “toro” o “res”. El hebreo שׁוֹר designa un bovino en un contexto legal; se eligió “buey” por claridad y porque no impone innecesariamente un matiz más específico.
    reason: lexical_alternative
  - marker: b
    text: O “es inocente” o “no es responsable”. El hebreo נָקִי es un término legal que aquí indica quedar libre o exento de pena en este caso.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְכִי
  english_pob_choice: And if
  chosen_spanish: Y si
  alternatives_spanish:
  - Si
  - Y cuando
  lexicon: HALOT
  rationale: En una cláusula casuística legal, 'Y si' conserva la fuerza conectiva de ו sin sonar rígido en español.
- source_word: יִגַּח
  english_pob_choice: gores
  chosen_spanish: cornea
  alternatives_spanish:
  - embiste con los cuernos
  - hiere con los cuernos
  lexicon: HALOT
  rationale: El verbo hebreo remite específicamente a la acción de cornear con los cuernos; 'cornear' es la correspondencia más precisa y natural en español legal.
- source_word: שׁוֹר
  english_pob_choice: ox
  chosen_spanish: buey
  alternatives_spanish:
  - toro
  - res
  lexicon: HALOT
  rationale: '''Buey'' es un equivalente tradicional y claro para שׁוֹר en este contexto legal; evita sobreespecificar sexo como ''toro''.'
- source_word: אֶת אִישׁ א֥וֹ אֶת אִשָּׁה
  english_pob_choice: a man or a woman
  chosen_spanish: a un hombre o a una mujer
  alternatives_spanish:
  - a una persona, hombre o mujer
  - a alguien, sea hombre o mujer
  lexicon: HALOT
  rationale: El hebreo nombra explícitamente ambos sexos; se preserva esa precisión sin neutralizarla en 'persona'.
- source_word: וָמֵת
  english_pob_choice: and he dies
  chosen_spanish: y muere
  alternatives_spanish:
  - y el hombre o la mujer muere
  - y resulta muerto
  lexicon: HALOT
  rationale: El verbo expresa el resultado de la cornada; en español, 'y muere' mantiene la concisión del hebreo y deja claro por el contexto que el sujeto es la víctima humana.
- source_word: סָקוֹל יִסָּקֵל
  english_pob_choice: shall surely be stoned
  chosen_spanish: será apedreado sin falta
  alternatives_spanish:
  - será apedreado ciertamente
  - sin duda será apedreado
  lexicon: HALOT
  rationale: La construcción enfática del hebreo se refleja con 'sin falta', que conserva la obligatoriedad sin sonar arcaico.
- source_word: וְלֹא יֵאָכֵל אֶת בְּשָׂרוֹ
  english_pob_choice: and its flesh shall not be eaten
  chosen_spanish: y no se comerá su carne
  alternatives_spanish:
  - y su carne no será comida
  - y no comerán su carne
  lexicon: HALOT
  rationale: '''Carne'' reproduce בָּשָׂר con naturalidad en español; la pasiva refleja conserva el tono legal impersonal del hebreo.'
- source_word: וּבַעַל הַשּׁוֹר
  english_pob_choice: but the owner of the ox
  chosen_spanish: pero el dueño del buey
  alternatives_spanish:
  - pero el propietario del buey
  - pero el poseedor del buey
  lexicon: HALOT
  rationale: '''Dueño'' expresa con claridad la relación legal de pertenencia; es el equivalente moderno más directo para בעל en este contexto.'
- source_word: נָקִי
  english_pob_choice: is clear
  chosen_spanish: queda libre
  alternatives_spanish:
  - es inocente
  - no es responsable
  - queda exento
  lexicon: HALOT
  rationale: En este contexto jurídico, נָקִי indica estar libre de pena o responsabilidad. 'Queda libre' preserva esa amplitud sin cerrar indebidamente la cuestión a una sola categoría jurídica.
theological_decisions:
- issue: Alcance del estado legal del dueño en la cláusula final
  english_pob_reading: The owner is free from liability in this case.
  chosen_spanish_reading: el dueño queda libre
  alternative_spanish_readings:
  - el dueño es inocente
  - el dueño no es responsable
  - el dueño queda exento
  rationale: El hebreo sólo afirma נָקִי, un término legal de quedar libre de pena o cargo. 'Queda libre' mantiene la tensión jurídica abierta, sin especificar más de lo que el texto dice.
  doctrine_reference: 'Translation philosophy §3: preservar la tensión lexical y teológica en vez de resolverla'
- issue: Relación entre la víctima humana y el sujeto verbal singular
  english_pob_reading: and he dies
  chosen_spanish_reading: y muere
  alternative_spanish_readings:
  - y el hombre o la mujer muere
  - y la persona muere
  rationale: Aunque el verbo está en singular, el antecedente puede ser varón o mujer. Se conserva la forma breve y se deja que el contexto determine la referencia inclusiva sin borrar el paralelismo legal.
  doctrine_reference: Gender-accurate rendering principle
translation_notes:
  revision_awareness: El texto base en inglés no requirió cambios según el último pase de revisión; se mantuvo la lectura legal principal y la nota sobre נָקִי para no reducir indebidamente su alcance.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' como forma preferente en este proyecto, pero este versículo no contiene el nombre divino.
  - Se usa 'buey' para שׁוֹר y 'dueño' para בעל, conforme al registro legal y a la claridad en español.
  - '''Queda libre'' conserva la ambigüedad jurídica de נָקִי mejor que una lectura demasiado específica como ''inocente'' o ''exento''.'
