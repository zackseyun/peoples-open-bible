review_pass:
  verdict: revise
  source_alignment_summary: El borrador capta bien la escena básica, pero no preserva con precisión varios valores aspectuales y una decisión clave del POB inglés. El hebreo narrativo וְרָאָה ... וְקָם ... וְהִשְׁתַּחֲוּוּ se refleja mejor en español con pretéritos puntuales ('vio', 'se levantó', 'adoró/se postró') que con imperfectos habituales ('veía', 'se levantaba', 'se postraba'). Además, el POB inglés optó por el sentido teológico principal 'worshiped' y reservó la acción física en nota; el borrador invierte esa prioridad en el texto principal.
  spanish_quality_summary: El español es claro y legible, pero 'veía ... se levantaba y se postraba' suena iterativo/habitual, no como una secuencia narrativa de evento. 'Pilar de nube' es comprensible, aunque 'columna de nube' suena más idiomático bíblicamente en español; sin embargo, no es imprescindible corregirlo si se mantiene la fidelidad. La frase revisada con pretérito mejora mucho la naturalidad y la fuerza narrativa.
  glossary_alignment: 'No hay conflictos con terminología de proyecto como Yahvé o Mesías. El punto principal es alinear וְהִשְׁתַּחֲוּוּ con la decisión léxica/auditada del POB: en el texto principal debe ir ''adoró'' (o equivalente de culto), con nota para ''se inclinó/se postró''. ''Cada uno'' es aceptable para אִישׁ en español, aunque se pierde algo del masculino distributivo de ''cada hombre''; no es problema suficiente para rechazarlo.'
  issues:
  - severity: high
    issue: Uso de imperfectos ('veía', 'se levantaba', 'se postraba') en lugar de una secuencia narrativa puntual
    rationale: El hebreo presenta acciones narrativas consecutivas; en español aquí el pretérito ('vio', 'se levantó', 'adoró') comunica mejor la secuencia cuando todos vieron la columna y reaccionaron.
  - severity: high
    issue: El texto principal usa 'se postraba' donde el POB inglés eligió 'worshiped' como decisión teológica principal
    rationale: La auditoría inglesa documenta que, en este contexto, el verbo expresa respuesta reverente a la presencia divina y por eso se traduce 'worshiped', dejando 'bowed down/prostrated themselves' en nota. El español debe reflejar esa misma prioridad.
  - severity: low
    issue: '''Pilar de nube'' es menos idiomático que ''columna de nube'' en español bíblico'
    rationale: No es infiel al hebreo, pero 'columna de nube' es la expresión más reconocible y natural para lectores hispanohablantes.
  revised_spanish_text: Cuando todo el pueblo vio la columna de nube de pie[a] a la entrada de la tienda, todo el pueblo se levantó y adoró, cada uno a la entrada de su tienda.
  revised_footnotes:
  - marker: a
    text: O 'en pie'. Más adelante, 'adoró' puede traducirse también 'se inclinó' o 'se postró'; el verbo hebreo se refiere a un acto corporal de reverencia y a menudo funciona como acto de adoración.
    reason: lexical_alternative
  revision_rationale: Se corrige el aspecto verbal para reflejar la secuencia narrativa del hebreo y se alinea la traducción principal de וְהִשְׁתַּחֲוּוּ con la decisión documentada del POB inglés ('worshiped' > 'adoró'), preservando las alternativas físicas en nota. También se mejora la idiomaticidad con 'columna de nube'.
