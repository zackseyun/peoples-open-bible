base_translation:
  language: en
  yaml_path: translation/ot/isaiah/018/007.yaml
  text: At that time tribute will be brought to Yahweh of Armies from a people tall and smooth-skinned[a], from a people feared far and wide, a nation of command upon command and trampling, whose land rivers divide, to the place of the name of Yahweh of Armies[b], Mount Zion.
  footnotes:
