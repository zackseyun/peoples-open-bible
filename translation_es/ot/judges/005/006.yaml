translation:
  language: es
  text: En los días de Shamgar hijo de Anat, en los días de Jael, los caminos principales quedaron desiertos[a], y los viajeros iban por rutas indirectas[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O "los caminos cesaron"; es decir, el tránsito normal por las rutas principales se detuvo.
    reason: lexical_alternative
  - marker: b
    text: Lit. "caminos sinuosos" o "caminos torcidos"; se refiere probablemente a rutas indirectas tomadas por seguridad, no a una idea moral.
    reason: cultural_note
lexical_decisions:
- source_word: בִּימֵי
  english_pob_choice: in the days of
  chosen_spanish: En los días de
  alternatives_spanish:
  - Durante el tiempo de
  lexicon: HALOT
  rationale: Mantiene el valor idiomático temporal del hebreo y suena natural en español bíblico sin perder el marco histórico-poético.
- source_word: שַׁמְגַּר בֶּן עֲנָת
  english_pob_choice: Shamgar son of Anath
  chosen_spanish: Shamgar hijo de Anat
  alternatives_spanish:
  - Shamgar ben Anat
  lexicon: Transliteración estándar + equivalencia relacional
  rationale: Se conserva el nombre propio y se vierte בֶּן como 'hijo de', como en la decisión inglesa; 'Anat' mantiene la forma breve y reconocible del nombre propio.
- source_word: יָעֵל
  english_pob_choice: Jael
  chosen_spanish: Jael
  alternatives_spanish:
  - Yael
  lexicon: Transliteración estándar
  rationale: Se mantiene la transliteración establecida del nombre propio en español de lectura bíblica.
- source_word: חָדְלוּ אֳרָחוֹת
  english_pob_choice: the highways were deserted
  chosen_spanish: las carreteras cesaron
  alternatives_spanish:
  - las carreteras quedaron desiertas
  - cesaron las rutas principales
  lexicon: HALOT
  rationale: El hebreo dice literalmente que las rutas 'cesaron' o 'dejaron de existir/funcionar'. Conservé 'cesaron' para no borrar la tensión lexical, aunque en español suena algo más duro que la explicación idiomática inglesa. 'Carreteras' intenta reflejar el contraste con vías principales sin imponer un matiz moderno excesivo.
- source_word: הֹלְכֵי נְתִיבוֹת
  english_pob_choice: travelers went by roundabout paths
  chosen_spanish: los que andaban por senderos
  alternatives_spanish:
  - los caminantes de los senderos
  - los viajeros por los caminos secundarios
  lexicon: HALOT
  rationale: La construcción nominal expresa literalmente 'los que caminan por senderos/caminos'. 'Los que andaban por senderos' preserva la imagen y evita añadir explícitamente 'viajeros' donde el hebreo solo marca a quienes transitan.
- source_word: אֳרָחוֹת עֲקַלְקַלּוֹת
  english_pob_choice: roundabout paths
  chosen_spanish: rutas torcidas
  alternatives_spanish:
  - caminos sinuosos
  - senderos retorcidos
  - rutas indirectas
  lexicon: HALOT
  rationale: '''Torcidas'' conserva el campo semántico de עֲקַלְקַלּוֹת y permite una lectura física de rutas indirectas o difíciles; no se interpreta moralmente. ''Rutas'' mantiene el contraste con las vías principales del primer hemistiquio.'
theological_decisions:
- issue: Posible carga moral de 'torcidas'
  english_pob_reading: '''Crooked paths'' likely refers to indirect side routes taken for safety rather than moral crookedness.'
  chosen_spanish_reading: '''Rutas torcidas'' se entiende como rutas indirectas o inseguras, no como una valoración moral.'
  alternative_spanish_readings:
  - caminos sinuosos
  - rutas indirectas
  rationale: Sigo la nota inglesa que desactiva una lectura ética de 'crooked'. En español, 'torcidas' puede sugerir desviación moral; por eso la nota de lectura debe guiar la comprensión hacia la forma del trayecto, no hacia la conducta.
  doctrine_reference: Lectura contextual del paralelismo poético; semántica de rutas en literatura narrativa-poética.
translation_notes:
  revision_awareness: 'La revisión inglesa reciente reemplazó una frase que hacía depender a los caminantes de ''byways'' por una formulación más fiel al hebreo, y cambió ''crooked paths'' por ''roundabout paths'' para expresar rutas indirectas de manera más natural. Esta versión española sigue esa dirección: conserva el contraste entre rutas principales y senderos, evita sobreespecificar dos clases de vías secundarias, y busca una solución natural sin perder el valor literal de ''cesaron''.'
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' solo cuando aparezca el Tetragrámaton; este versículo no lo contiene.
  - '''Anat'' se translitera como nombre propio, no como sustantivo común.'
  - No se introduce lenguaje moral en 'torcidas'; la lectura debe ser topográfica/funcional.
  - 'El paralelismo de dos hemistiquios se conserva: cese de las rutas principales / tránsito por senderos torcidos.'
