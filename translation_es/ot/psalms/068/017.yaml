    text: 'O: «¿Por qué miran con envidia, montes de muchas cumbres?» El verbo hebreo es raro e incierto; puede describir saltar/brincar o mirar con envidia o de soslayo.'
    reason: lexical_alternative
  revision_rationale: 'Se hace una reparación menor para mejorar fidelidad y naturalidad: se elimina «ustedes» por redundante en poesía, y se cambia «ante el monte» por «contra el monte» para expresar mejor el contraste/rivalidad implícitos en el hebreo y en la auditoría inglesa. Se conserva la decisión principal «saltan» con nota léxica alternativa.'
