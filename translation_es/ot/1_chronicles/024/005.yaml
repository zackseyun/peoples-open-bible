    rationale: Aunque literalmente cercano, en español suena impropio y puede malentenderse como si Dios tuviera superiores o jefes. «Oficiales de Dios» conserva la formulación escueta del hebreo y el valor administrativo de שָׂרִים, además de seguir mejor el audit trail inglés («officers of God»).
  - severity: medium
    issue: «unos con otros» para אֵלֶּה עִם אֵלֶּה
    rationale: La expresión española pierde el contraste demostrativo «éstos... aquéllos/ésos» preservado por el inglés POB. Una formulación más cercana en el texto principal o en nota debe reflejar mejor la deixis distributiva del hebreo.
  - severity: low
    issue: Nota b imprecisa
    rationale: La nota dice que el hebreo literalmente expresa «éstos con éstos» / «unos con otros», pero el audit trail inglés explica «these with those». La nota debe corregirse para no confundir la relación entre los grupos.
  - severity: low
    issue: «por sorteo» es aceptable pero menos directo que «por suertes»
    rationale: El plural hebreo בְּגוֹרָלוֹת se refleja de forma más transparente con «por suertes». No es error grave, pero el ajuste mejora la correspondencia formal.
