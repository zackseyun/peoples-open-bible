translation:
  language: es
  text: Y entonces enviará a los ángeles y reunirá a los escogidos[a] de los cuatro vientos[b], desde el extremo de la tierra hasta el extremo del cielo[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, más tradicionalmente, «los elegidos».
    reason: lexical_alternative
  - marker: b
    text: «Los cuatro vientos» es un modismo que significa de todas las direcciones, es decir, de todos los lugares.
    reason: cultural_note
  - marker: c
    text: 'Algunas traducciones vierten la última frase de manera más interpretativa: «desde el extremo más lejano de la tierra hasta el extremo más lejano del cielo» o «de un extremo del cielo al otro».'
    reason: alternative_reading
lexical_decisions:
- source_word: τότε
  english_pob_choice: then
  chosen_spanish: y entonces
  alternatives_spanish:
  - entonces
  - y luego
  lexicon: BDAG
  rationale: El adverbio temporal marca secuencia en el discurso; «y entonces» conserva la continuidad narrativa de καὶ τότε y suena natural en español.
- source_word: ἀποστελεῖ
  english_pob_choice: he will send out
  chosen_spanish: enviará
  alternatives_spanish:
  - mandará
  - enviará fuera
  lexicon: BDAG
  rationale: ἀποστέλλω en este contexto implica enviar con comisión; «enviará» comunica la acción sin forzar una perífrasis pesada. El valor de salida queda suficiente por el contexto con los ángeles.
- source_word: ἀγγέλους
  english_pob_choice: the angels
  chosen_spanish: los ángeles
  alternatives_spanish:
  - mensajeros
  lexicon: BDAG
  rationale: El contexto apocalíptico apunta claramente a seres celestiales, no a mensajeros humanos.
- source_word: ἐπισυνάξει
  english_pob_choice: gather
  chosen_spanish: reunirá
  alternatives_spanish:
  - juntará
  - reunirá juntos
  lexicon: BDAG
  rationale: ἐπισυνάγω expresa reunir a los dispersos; «reunirá» es la forma más natural en español y preserva la idea de congregación.
- source_word: ἐκλεκτούς
  english_pob_choice: chosen ones
  chosen_spanish: los escogidos[a]
  alternatives_spanish:
  - los elegidos
  - los electos
  lexicon: BDAG
  rationale: La forma sustantivada designa a los que Dios ha escogido. «Escogidos» conserva el contenido sin cargar de antemano el término técnico «electos». Se ancla una nota para mantener la alternativa tradicional documentada por la POB en inglés.
- source_word: ἐκ τῶν τεσσάρων ἀνέμων
  english_pob_choice: from the four winds
  chosen_spanish: de los cuatro vientos[b]
  alternatives_spanish:
  - de los cuatro puntos cardinales
  - de los cuatro rincones
  lexicon: BDAG
  rationale: Se mantiene el giro idiomático y la imagen bíblica de totalidad direccional; «vientos» reproduce mejor la metáfora que una paráfrasis interpretativa.
- source_word: ἀπ’ ἄκρου γῆς
  english_pob_choice: from the end of the earth
  chosen_spanish: desde el extremo de la tierra
  alternatives_spanish:
  - desde el fin de la tierra
  - desde el confín de la tierra
  lexicon: BDAG
  rationale: ἄκρον denota extremo o punto terminal; «extremo de la tierra» es claro y conserva la fuerza merística sin sonar demasiado arcaico.
- source_word: ἕως ἄκρου οὐρανοῦ
  english_pob_choice: to the end of heaven
  chosen_spanish: hasta el extremo del cielo[c]
  alternatives_spanish:
  - hasta el fin del cielo
  - hasta el otro extremo del cielo
  lexicon: BDAG
  rationale: Se preserva el paralelismo con la frase anterior y la amplitud total del merismo. «Cielo» es la opción española más natural aquí y evita confundir este uso espacial con una afirmación doctrinal sobre el lugar de Dios.
theological_decisions:
- issue: 'Ἐκλεκτοί: tensión entre traducción transparente y terminología tradicional'
  english_pob_reading: chosen ones
  chosen_spanish_reading: los escogidos
  alternative_spanish_readings:
  - los electos
  - los elegidos
  rationale: La lectura mantiene la idea bíblica de elección divina sin convertir el término en una etiqueta doctrinal técnica. «Escogidos» es transparente y corresponde bien a la preferencia de la POB por la claridad contemporánea.
  doctrine_reference: Preservar la tensión lexical sin resolverla por sistema teológico posterior.
- issue: Alcance cósmico de la recolección
  english_pob_reading: from the four winds, from the end of the earth to the end of heaven
  chosen_spanish_reading: de los cuatro vientos, desde el extremo de la tierra hasta el extremo del cielo
  alternative_spanish_readings:
  - de los cuatro puntos cardinales
  - desde el confín de la tierra hasta el confín del cielo
  - desde un extremo del cielo hasta el otro
  rationale: La imagen combina idiomatismo direccional y merismo de totalidad. Se conserva la formulación cercana al griego, sin convertirla en una paráfrasis interpretativa más suave.
  doctrine_reference: Primacía de la evidencia original sobre la tradición de traducción.
translation_notes:
  revision_awareness: 'La redacción sigue la revisión final del audit trail inglés: se omite cualquier posesivo no presente en el griego (no se añade «su» o «sus» antes de «escogidos»). Se conserva la coordinación inicial con «Y entonces» para reflejar καὶ τότε, y se mantiene la imagen totalizadora de los cuatro vientos y del merismo tierra/cielo sin suavizarla.'
  spanish_consistency_notes:
  - Se usa «Y entonces» para reproducir la secuencia narrativa de καὶ τότε.
  - Se evita «SEÑOR» y no aplica aquí terminología de Yahvé o Cristo.
  - «Escogidos» traduce el sustantivo ἐκλεκτούς sin añadir posesivo inexistente.
  - «Cielo» se usa en sentido espacial/merístico, no doctrinal.
  - 'La puntuación conserva el paralelismo de las dos grandes acciones: enviar y reunir.'
