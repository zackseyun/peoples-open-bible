    rationale: El POB inglés conservó alternativas para el verbo («pueden comerlo» / «comerán» / «deben comerlo» según el matiz jurídico), para «salario» y una aclaración cultural sobre ‘household’. Dado que en español también existe posible ambigüedad, conviene mantener esas ayudas.
  revised_spanish_text: Ustedes y su hogar[b] pueden comerlo en cualquier lugar,[c][a] porque es su salario[c] en compensación por su servicio en la tienda del encuentro.
