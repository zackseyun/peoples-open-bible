revisions:
- from: 'Por favor, hablen a oídos de todos los señores[a] de Siquem: ¿Qué es mejor para ustedes: que los gobiernen setenta hombres, todos los hijos de Jerubaal, o que los gobierne un solo hombre? Y acuérdense de que yo soy hueso y carne de ustedes.'
  to: 'Por favor, hablen para que oigan todos los líderes de Siquem: ¿Qué es mejor para ustedes: que los gobiernen setenta hombres, todos los hijos de Jerubaal, o que los gobierne un solo hombre? Y recuerden que yo soy su hueso y su carne.[a]'
  rationale: Se ajusta «בַּעֲלֵי שְׁכֶם» a «líderes» para seguir la decisión contextual del audit trail y evitar la ambigüedad de «señores». Se reemplaza «a oídos de» por «para que oigan» para expresar con español natural la idea pública de בְּאָזְנֵי. Se mantiene el idiomático concreto de parentesco, pero con forma más natural («su hueso y su carne») y nota aclaratoria. También se pule el registro con «recuerden».
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T21:43:38Z'
