translation:
  language: es
  text: A ti[a], Yahvé, clamo, y al Señor le suplico misericordia.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'El hebreo usa dos designaciones divinas distintas aquí: יהוה (Yahvé) y אֲדֹנָי (el Señor).'
    reason: lexical_alternative
lexical_decisions:
- source_word: אֵלֶיךָ
  english_pob_choice: To you
  chosen_spanish: A ti
  alternatives_spanish:
  - Para ti
  - Hacia ti
  lexicon: HALOT
  rationale: La preposición אֶל con sufijo de 2ª masculina singular expresa dirección hacia el destinatario del clamor. En español, 'a ti' conserva la dirección y la apelación directa con naturalidad y sin añadir matiz que no esté en el hebreo.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  - el SEÑOR
  lexicon: HALOT
  rationale: El Tetragrámaton se translitera en esta serie como 'Yahvé', preservando el nombre propio divino en lugar de sustituirlo por un título. 'Jehová' no sigue el criterio editorial del proyecto; 'el SEÑOR' ocultaría el nombre.
- source_word: אֶקְרָא
  english_pob_choice: I call
  chosen_spanish: clamo
  alternatives_spanish:
  - llamo
  - grito
  lexicon: HALOT
  rationale: El qal imperfecto 1cs de קרא aquí expresa invocación dirigida a Dios. 'Clamo' comunica bien la acción de llamar/invocar en contexto de oración y mantiene una dignidad litúrgica en español. 'Llamo' sería más neutro, pero menos idiomático en una súplica a Dios.
- source_word: אֲדֹנָי
  english_pob_choice: the Lord
  chosen_spanish: el Señor
  alternatives_spanish:
  - mi Señor
  - el Soberano
  lexicon: HALOT
  rationale: La revisión inglesa ajustó la frase a 'the Lord' para mantener la consistencia léxica con אֲדֹנָי. En español, 'el Señor' refleja ese valor titulador sin introducir el posesivo 'mi', que no quedó adoptado en la lectura final inglesa. 'El Soberano' sería más interpretativo.
- source_word: אֶתְחַנָּן
  english_pob_choice: I plead for mercy
  chosen_spanish: suplico misericordia
  alternatives_spanish:
  - imploro favor
  - ruego misericordia
  - pido misericordia
  lexicon: HALOT
  rationale: El hitpael imperfecto 1cs de חנן expresa hacer súplica por gracia o favor. 'Suplico misericordia' conserva la fuerza peticional y el matiz de gracia/misericordia señalado por el audit trail. 'Pido' es más débil; 'imploro' es posible, pero algo más enfático de lo que exige el verbo.
theological_decisions:
- issue: Distinguir las dos designaciones divinas en paralelo
  english_pob_reading: '''Yahweh'' y ''the Lord'' aparecen como dos designaciones diferentes en el mismo verso.'
  chosen_spanish_reading: '''Yahvé'' y ''el Señor'' se mantienen diferenciados.'
  alternative_spanish_readings:
  - '''Yahvé'' y ''Yahvé'''
  - '''el SEÑOR'' y ''el Señor'''
  rationale: El hebreo usa יהוה y אֲדֹנָי, dos formas distintas. Mantenerlas diferenciadas en español preserva la textura poética y evita borrar la diferencia léxica documentada por el aparato inglés. No se añade ninguna afirmación doctrinal extra; solo se refleja la distinción del texto.
  doctrine_reference: 'DOCTRINE.md: translate titles; transliterate names; preserve lexical distinctions when source marks them'
translation_notes:
  revision_awareness: 'La versión inglesa revisada cambió ''my Lord'' por ''the Lord'' para ajustarse con más precisión a אֲדֹנָי. Esta propuesta sigue esa revisión: conserva ''el Señor'' para אֲדֹנָי y ''Yahvé'' para יהוה, sin introducir el posesivo ''mi''. También se respeta la opción de ''plead for mercy'' con un verbo español de súplica equivalente.'
  spanish_consistency_notes:
  - Se usa 'Yahvé' de forma consistente para יהוה, conforme al criterio del proyecto.
  - Se evita 'SEÑOR' en versalitas porque el objetivo es transparentar el nombre divino, no enmascararlo.
  - '''Clamo'' y ''suplico misericordia'' mantienen un registro reverente y directo, adecuado al paralelismo poético.'
  - La nota al pie explica la distinción de las dos designaciones divinas sin sobrecargar el cuerpo del verso.
