translation:
  language: es
  text: Los malvados son derribados y ya no están[b], pero la casa[a] de los justos permanecerá.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «el hogar» o «la familia» de los justos permanecerá.'
    reason: lexical_alternative
  - marker: b
    text: 'Literalmente: «y no son».'
    reason: lexical_alternative
lexical_decisions:
- source_word: הָפוֹךְ
  english_pob_choice: are overthrown
  chosen_spanish: son derribados
  alternatives_spanish:
  - son trastornados
  - son volcados
  lexicon: HALOT
  rationale: El hebreo presenta un valor resultativo/pasivo en forma proverbial. «Son derribados» conserva la idea de caída o abatimiento sin volver el dicho demasiado mecánico; «son volcados» sería más literal, pero menos natural en español para personas.
- source_word: רְשָׁעִים
  english_pob_choice: the wicked
  chosen_spanish: los malvados
  alternatives_spanish:
  - los impíos
  - los culpables
  lexicon: HALOT
  rationale: Es un plural sustantivado que designa a personas moralmente torcidas. «Los malvados» es claro, bíblico y no fuerza una terminología eclesiástica más marcada que el hebreo.
- source_word: וְאֵינָם
  english_pob_choice: and are no more
  chosen_spanish: y ya no existen
  alternatives_spanish:
  - y no son más
  - y ya no están
  lexicon: HALOT
  rationale: La frase hebrea dice literalmente «y no son». En español, «ya no existen» comunica con naturalidad la desaparición o extinción sin perder la fuerza negativa; la formulación más literal se conserva en nota.
- source_word: וּבֵית
  english_pob_choice: but the house
  chosen_spanish: la casa
  alternatives_spanish:
  - el hogar
  - la casa/linaje
  - la familia
  lexicon: HALOT
  rationale: «Casa» puede abarcar hogar, casa-hogar o casa como línea/establecimiento familiar. Se mantiene «casa» por su amplitud semántica y porque reproduce el término proverbial del hebreo; el contraste adversativo ya está expresado por «pero».
- source_word: צַדִּיקִים
  english_pob_choice: of the righteous
  chosen_spanish: de los justos
  alternatives_spanish:
  - de los rectos
  - de los justos y rectos
  lexicon: HALOT
  rationale: El adjetivo sustantivado plural se refiere a quienes son justos en sentido moral y relacional. «Los justos» es la equivalencia más directa y estable en español bíblico sin desviar a una noción meramente jurídica.
- source_word: יַעֲמֹד
  english_pob_choice: will stand
  chosen_spanish: permanecerá
  alternatives_spanish:
  - se mantendrá en pie
  - se sostendrá
  lexicon: HALOT
  rationale: El verbo significa literalmente «estar en pie». En este proverbio expresa estabilidad perdurable en contraste con el derribo de los malvados; «permanecerá» transmite ese endurecimiento/resistencia en español natural, aunque la metáfora vertical queda sugerida por el paralelismo.
theological_decisions:
- issue: Destello metafórico de «casa» como hogar/linaje/establecimiento familiar
  english_pob_reading: but the house of the righteous will stand
  chosen_spanish_reading: pero la casa de los justos permanecerá
  alternative_spanish_readings:
  - pero el hogar de los justos permanecerá
  - pero la familia de los justos permanecerá
  - pero la casa/linaje de los justos permanecerá
  rationale: El hebreo permite una amplitud semántica que no debe estrecharse sin necesidad. Mantener «casa» preserva la metáfora abierta de estabilidad doméstica o dinástica; el sentido exacto puede variar por contexto, pero el proverbio generaliza la permanencia de la comunidad de los justos.
  doctrine_reference: Proverbios sapienciales sobre la estabilidad de los justos frente a la ruina de los malvados
translation_notes:
  revision_awareness: 'La revisión más reciente indicó alta concordancia y ningún cambio necesario; se mantiene la solución semántica del original con ajustes de naturalidad española: «derribados» para el pasivo resultativo, «ya no existen» para וְאֵינָם y «permanecerá» para el valor de estabilidad de יַעֲמֹד.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» para el nombre divino cuando aparezca; este versículo no lo contiene.
  - Se usa «justos/malvados» como categorías morales proverbiales, coherentes con el resto del proyecto.
  - No se traduce mecánicamente «casa» como «familia» en el texto principal para conservar la amplitud del hebreo.
  - La nota [b] conserva la tensión literal de «y no son» sin sobreinterpretarla.
