revisions:
- from: Por tanto[a], mira, estoy trayendo contra ti extranjeros, los más crueles de las naciones; ellos sacarán sus espadas[b] contra la belleza de tu sabiduría[c], y profanarán tu esplendor.
  to: Por tanto[a], he aquí, traigo contra ti extranjeros, los más crueles de las naciones; sacarán sus espadas[b] contra la belleza de tu sabiduría[c], y mancharán tu esplendor.
  rationale: Se ajusta el inicio para un tono profético más natural y solemne en español ('he aquí, traigo contra ti') y se reemplaza 'profanarán' por 'mancharán' para reflejar mejor el matiz no cúltico de וְחִלְּלוּ con 'tu esplendor', sin alterar el sentido del juicio. Se mantienen las notas léxicas existentes porque siguen siendo pertinentes y están correctamente ancladas.
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T22:27:14Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien la estructura y el sentido general del hebreo: inferencia de juicio, anuncio profético, invasores extranjeros, agresión contra la sabiduría/esplendor del destinatario. También conserva adecuadamente las alternativas léxicas principales en notas. Sin embargo, hay dos puntos mejorables para mayor fidelidad y naturalidad: (1) הִנְנִי se vierte mejor con una fórmula más propia del registro profético que ''mira''; y (2) וְחִלְּלוּ, dado el audit trail inglés y el objeto no cúltico, queda mejor como ''mancharán'' o ''contaminarán''/''deshonrarán'' que ''profanarán'', aunque ''profanarán'' no es inaceptable. La reparación es menor.'
  spanish_quality_summary: El español es claro y digno, pero 'mira, estoy trayendo' suena algo coloquial/forzado en contexto profético, y 'ellos' es innecesario. 'He aquí, traigo contra ti' o 'voy a traer contra ti' fluye mejor en español bíblico moderno. El resto del versículo es legible y natural.
  glossary_alignment: No hay conflictos con la terminología base del proyecto. Las decisiones léxicas son en general coherentes con el audit trail. La nota [c] está correctamente anclada en 'sabiduría' para reflejar la alternativa de cláusula completa, aunque conviene mantener coherencia semántica en el texto principal usando un verbo menos cúltico que 'profanarán'.
  issues:
  - severity: medium
    issue: Registro de הִנְנִי como 'mira'
    rationale: Aunque comunica deixis, 'mira' suena más coloquial que la fórmula profética solemne. 'He aquí' o una construcción sin imperativo refleja mejor el tono del original y la decisión inglesa 'behold'.
  - severity: medium
    issue: '''estoy trayendo contra ti'' suena poco natural en español'
    rationale: Formalmente refleja el participio con הִנְנִי, pero en español bíblico moderno resulta más idiomático 'traigo contra ti' o 'voy a traer contra ti' sin perder inminencia.
  - severity: low
    issue: '''profanarán'' puede sonar demasiado cúltico para יִפְעָתֶךָ'
    rationale: El audit trail inglés prefirió 'defile' por tratarse del esplendor del rey, no de un objeto sagrado. En español, 'mancharán' o 'deshonrarán' puede preservar mejor el matiz de ultraje no cúltico.
  revised_spanish_text: Por tanto[a], he aquí, traigo contra ti extranjeros, los más crueles de las naciones; sacarán sus espadas[b] contra la belleza de tu sabiduría[c], y mancharán tu esplendor.
  revised_footnotes:
