translation:
  language: es
  text: 'Y aconteció que, aquella noche, Yahvé le dijo[a]: «Levántate, desciende al campamento, porque lo he entregado en tu mano».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «en tu mano», un modismo que significa en tu poder o bajo tu control.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְהִי
  english_pob_choice: And it happened
  chosen_spanish: Y aconteció
  alternatives_spanish:
  - Y sucedió
  - Y pasó
  lexicon: HALOT
  rationale: La forma narrativa wayyiqtol introduce una nueva escena; «aconteció» conserva ese valor discursivo con un tono natural y digno en español.
- source_word: בַּלַּיְלָה הַהוּא
  english_pob_choice: that night
  chosen_spanish: aquella noche
  alternatives_spanish:
  - esa noche
  - en aquella noche
  lexicon: HALOT
  rationale: Es una referencia temporal definida; «aquella noche» reproduce bien la deíxis del hebreo sin sonar artificial.
- source_word: וַיֹּאמֶר אֵלָיו
  english_pob_choice: said to him
  chosen_spanish: le dijo
  alternatives_spanish:
  - habló con él
  - dijo a él
  lexicon: HALOT
  rationale: אָמַר es el verbo ordinario de hablar; en español, «le dijo» es la forma más directa y natural para marcar el destinatario.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  lexicon: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
  rationale: La norma del proyecto para יהוה es «Yahvé», manteniendo el nombre propio divino en lugar de sustituirlo por un título.
- source_word: קוּם
  english_pob_choice: Arise
  chosen_spanish: Levántate
  alternatives_spanish:
  - Ponte en pie
  - Levántate ahora
  lexicon: HALOT
  rationale: El imperativo exhorta a la acción inmediata; «levántate» comunica bien el mandato en español y mantiene la fuerza directiva.
- source_word: רֵד
  english_pob_choice: go down
  chosen_spanish: desciende
  alternatives_spanish:
  - baja
  - ve hacia abajo
  lexicon: HALOT
  rationale: ירד expresa movimiento descendente; «desciende» conserva el sentido y el registro solemne del mandato divino.
- source_word: בַּמַּחֲנֶה
  english_pob_choice: into the camp
  chosen_spanish: al campamento
  alternatives_spanish:
  - hacia el campamento
  - dentro del campamento
  lexicon: HALOT
  rationale: El valor direccional del hebreo permite expresar la meta con «al campamento»; en español resulta más natural que una calca rígida con «en el campamento».
- source_word: כִּי
  english_pob_choice: for
  chosen_spanish: porque
  alternatives_spanish:
  - pues
  - ya que
  lexicon: HALOT
  rationale: Introduce la razón del mandato; «porque» comunica de modo claro la fuerza causal del hebreo.
- source_word: נְתַתִּיו
  english_pob_choice: I have given it
  chosen_spanish: lo he entregado
  alternatives_spanish:
  - lo he dado
  - lo he puesto
  lexicon: HALOT
  rationale: נתן con sufijo pronominal se refiere al campamento por extensión; «he entregado» expresa mejor la idea de poner algo en poder de otro que un simple «he dado».
- source_word: בְּיָדֶךָ
  english_pob_choice: into your hand
  chosen_spanish: en tu mano
  alternatives_spanish:
  - en tu poder
  - en tu control
  lexicon: HALOT
  rationale: Se preserva la metáfora bíblica de la mano como poder o control. «En tu mano» suena natural en español y mantiene la imagen del original.
theological_decisions:
- issue: Rendering the divine name יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Jehová
  rationale: Se sigue la convención del proyecto para el Tetragrámaton, preservando el nombre divino en vez de sustituirlo por un título como «Señor».
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
translation_notes:
  revision_awareness: Se corrigió la validación anterior anclando la nota [a] directamente en «dijo[a]» dentro del texto español, manteniendo la misma observación lexical sobre el modismo de «en tu mano».
  spanish_consistency_notes:
  - Se mantiene «Yahvé» de forma consistente con la norma del proyecto para יהוה.
  - Se conserva la metáfora «en tu mano» en el texto principal y se aclara su valor idiomático en la nota.
  - El registro es bíblico y sobrio, sin calcar innecesariamente el inglés.
