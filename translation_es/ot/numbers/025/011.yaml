translation:
  language: es
  text: Finees, hijo de Eleazar, hijo de Aarón el sacerdote, ha apartado mi ira de los hijos de Israel, al mostrar celo[a] por mi celo entre ellos, de modo que no consumí a los hijos de Israel en mi celo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «al ser celoso con mi celo ... en mi celo». El hebreo usa formas cognadas de la misma raíz para la acción de Finees y la respuesta de Dios.'
    reason: lexical_alternative
lexical_decisions:
- source_word: הֵשִׁיב
  english_pob_choice: has turned back
  chosen_spanish: ha apartado
  alternatives_spanish:
  - ha hecho retroceder
  - ha desviado
  lexicon: HALOT
  rationale: El hifil de שוב expresa aquí hacer retroceder o apartar la ira. «Ha apartado» conserva la idea causativa y suena natural en español sin perder la imagen de retirar la ira de encima de Israel.
- source_word: חֲמָתִי
  english_pob_choice: my wrath
  chosen_spanish: mi ira
  alternatives_spanish:
  - mi furia
  - mi enojo
  lexicon: HALOT
  rationale: חֵמָה denota ira intensa, con fuerza judicial. «Ira» comunica mejor esa gravedad en español que un término más coloquial como «enojo».
- source_word: מֵעַל
  english_pob_choice: from upon
  chosen_spanish: de sobre
  alternatives_spanish:
  - de encima de
  - de
  lexicon: HALOT
  rationale: La preposición conserva la imagen espacial de algo que pesaba sobre Israel. «De sobre» mantiene esa fuerza con un español claro y digno.
- source_word: בְּנֵי יִשְׂרָאֵל
  english_pob_choice: the sons of Israel
  chosen_spanish: los hijos de Israel
  alternatives_spanish:
  - los israelitas
  - el pueblo de Israel
  lexicon: HALOT
  rationale: Se preserva la forma literal del hebreo, que es gramaticalmente masculina y funciona como designación pactual estable. «Hijos de Israel» mantiene visible la forma fuente.
- source_word: בְּקַנְאוֹ
  english_pob_choice: by being jealous
  chosen_spanish: al ponerse celoso
  alternatives_spanish:
  - al mostrarse celoso
  - por su celo
  lexicon: HALOT
  rationale: El hebreo usa un sustantivo/verbización de la misma raíz para vincular la acción de Finees con el celo divino. «Al ponerse celoso» conserva ese enlace léxico sin sonar forzado en español.
- source_word: קִנְאָתִי
  english_pob_choice: my jealousy
  chosen_spanish: mi celo
  alternatives_spanish:
  - mi celosía
  - mi celo celoso
  lexicon: HALOT
  rationale: En este contexto, «celo» expresa mejor la pasión exclusiva de Yahvé por su pacto que «celos» en español corriente. Además, permite reproducir la correspondencia con la acción de Finees, tal como el POB inglés preserva la relación cognada.
- source_word: בְּתוֹכָם
  english_pob_choice: among them
  chosen_spanish: entre ellos
  alternatives_spanish:
  - en medio de ellos
  - en su seno
  lexicon: HALOT
  rationale: «Entre ellos» transmite la localización comunitaria de la acción con naturalidad en español moderno.
- source_word: כִלִּיתִי
  english_pob_choice: I did not consume
  chosen_spanish: no consumí
  alternatives_spanish:
  - no destruí
  - no acabé con
  lexicon: HALOT
  rationale: כלה en piel puede significar consumir o destruir completamente. «Consumí» mantiene la imagen de destrucción total, consistente con la amenaza de juicio contenida en el pasaje.
- source_word: בְּקִנְאָתִי
  english_pob_choice: in my zeal/jealousy
  chosen_spanish: en mi celo
  alternatives_spanish:
  - por mi celo
  - con mi celo
  lexicon: HALOT
  rationale: Se conserva la misma traducción de קנאה a lo largo del versículo para reflejar la repetición cognada. «En mi celo» es la opción más uniforme y apta para el español de lectura pública.
- source_word: הַכֹּהֵן
  english_pob_choice: the priest
  chosen_spanish: el sacerdote
  alternatives_spanish:
  - el sacerdote consagrado
  - el ministro
  lexicon: HALOT
  rationale: «El sacerdote» es la equivalencia directa y natural del título apposicional de Aarón.
theological_decisions:
- issue: Conservar la tensión léxica entre el celo de Finees y el celo/ira de Yahvé
  english_pob_reading: zealous / zeal
  chosen_spanish_reading: celoso / celo
  alternative_spanish_readings:
  - zeloso / celo
  - celoso / celos
  rationale: El hebreo repite la misma raíz para la acción de Finees y la respuesta de Yahvé. En español, «celoso / celo» permite conservar esa relación cognada sin neutralizarla. Se evita «zeloso» por ser menos natural; «celos» sugiere con facilidad una emoción interpersonal menor y no la exclusividad pactual.
  doctrine_reference: Translation philosophy items 3 and 5
- issue: Mantener la imagen de la ira apartada de sobre Israel
  english_pob_reading: has turned back my wrath from the sons of Israel
  chosen_spanish_reading: ha apartado mi ira de sobre los hijos de Israel
  alternative_spanish_readings:
  - ha desviado mi ira de Israel
  - ha alejado mi ira de los hijos de Israel
  rationale: La imagen hebrea presenta la ira como algo que estaba «sobre» Israel y fue retirada. «De sobre» conserva mejor esa espacialidad que una formulación llanamente abstracta.
  doctrine_reference: Translation philosophy item 2
- issue: Traducir בני ישראל de forma literal y no neutralizada
  english_pob_reading: the sons of Israel
  chosen_spanish_reading: los hijos de Israel
  alternative_spanish_readings:
  - los israelitas
  - el pueblo de Israel
  rationale: Se conserva la forma masculina plural del hebreo, como corresponde al texto fuente y a la práctica POB de hacer visible la forma original cuando no se pierde inteligibilidad.
  doctrine_reference: Translation philosophy item 4
translation_notes:
  revision_awareness: Se tuvo en cuenta el último pase de revisión del contexto inglés, que prefirió un estilo más natural y sustituyó expresiones demasiado literales como «from upon» por una formulación más idiomática. En español se aplicó ese mismo principio con «de sobre» y se evitó un calco rígido, pero se conservó la relación cognada entre Finees y Yahvé con «celoso / celo», porque el efecto retórico del hebreo depende de esa repetición.
  spanish_consistency_notes:
  - Se usa «Yahvé» conforme al estándar POB en español para el nombre divino, aunque en este versículo el texto hebreo sólo presenta el pronombre posesivo y la referencia divina viene por contexto.
  - «Hijos de Israel» se mantiene de manera consistente con el criterio de visibilidad morfológica del original.
  - Se eligió «celo» en ambos casos para reproducir la repetición de la raíz קנא; no se alterna con «celos» para no diluir la conexión lexical.
  - El nombre propio se da como «Finees» en la nota por ser la forma castellana tradicional y más reconocible para lectores hispanos.
