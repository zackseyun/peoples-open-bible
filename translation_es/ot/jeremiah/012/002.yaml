    text: Hebreo literalmente, «lejos de sus riñones», expresión hebrea para el ser interior o los motivos ocultos.
    reason: lexical_alternative
  revision_rationale: Se conserva toda la estructura y el contenido del original, pero se reemplaza 'sus entrañas' por 'su ser más íntimo' para alinearse mejor con la decisión semántica auditada en inglés sobre כִּלְיוֹתֵיהֶם. Se mantiene la nota literal sobre 'riñones'. Aunque 'en su boca' sigue siendo algo literal, es aceptable y preserva la imagen hebrea; el cambio necesario es principalmente la cláusula final para precisión y legibilidad.
