translation:
  language: es
  text: 'Y de esta presentará su ofrenda, una ofrenda de alimento[a] a Yahvé: la grasa que cubre las entrañas, y toda la grasa que está sobre las entrañas,'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «una ofrenda hecha por fuego». El término hebreo אִשֶּׁה se suele verter tradicionalmente así en contextos sacrificiales.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהִקְרִיב
  english_pob_choice: he shall present
  chosen_spanish: presentará
  alternatives_spanish:
  - ofrecerá
  - traerá
  lexicon: HALOT
  rationale: En contexto sacrificial, el verbo hifil de קרב expresa la acción ritual de presentar la ofrenda ante Dios. "Presentará" mantiene el sentido cultual sin volverlo rígido o demasiado interpretativo.
- source_word: מִמֶּנּוּ
  english_pob_choice: from it
  chosen_spanish: de él
  alternatives_spanish:
  - de esto
  - de ella
  lexicon: HALOT
  rationale: El sufijo retoma el animal/ofrenda del contexto inmediato. En español, "de él" conserva la referencia al sacrificio en forma natural y breve.
- source_word: קָרְבָּנוֹ
  english_pob_choice: his offering
  chosen_spanish: su ofrenda
  alternatives_spanish:
  - su don
  - su sacrificio
  lexicon: HALOT
  rationale: קָרְבָּן es un término técnico de ofrenda sacrificial. "Ofrenda" es el equivalente claro y reverente en español.
- source_word: אִשֶּׁה
  english_pob_choice: a food offering
  chosen_spanish: una ofrenda hecha por fuego
  alternatives_spanish:
  - una ofrenda por fuego
  - una ofrenda consumida por el fuego
  lexicon: HALOT
  rationale: Se preserva la alternativa documentada por la POB inglesa. En español, "ofrenda hecha por fuego" comunica mejor el valor cultual del término que "ofrenda de comida", que sería engañoso en este contexto sacrificial.
- source_word: לַיהוָה
  english_pob_choice: to Yahweh
  chosen_spanish: a Yahvé
  alternatives_spanish:
  - para Yahvé
  lexicon: HALOT
  rationale: Se sigue la convención del proyecto de usar "Yahvé" para יהוה. La preposición ל en este marco sacrificial se expresa de modo natural como "a" en español.
- source_word: הַחֵלֶב
  english_pob_choice: the fat
  chosen_spanish: la grasa
  alternatives_spanish:
  - el sebo
  - la grasa selecta
  lexicon: HALOT
  rationale: En legislación sacrificial, חֵלֶב designa la porción grasa reservada para quemarse. "Grasa" es claro y fiel en español; "sebo" suena más técnico pero menos natural para lectura pública.
- source_word: הַמְכַסֶּה
  english_pob_choice: that covers
  chosen_spanish: que cubre
  alternatives_spanish:
  - que recubre
  - cubriendo
  lexicon: HALOT
  rationale: El participio funciona mejor como relativa en español. "Que cubre" reproduce de forma directa la relación modificadora sin forzar la sintaxis.
- source_word: הַקֶּרֶב
  english_pob_choice: the entrails
  chosen_spanish: las entrañas
  alternatives_spanish:
  - los intestinos
  - las partes internas
  lexicon: HALOT
  rationale: Aunque "entrails" es el equivalente inglés de la POB, en español bíblico "entrañas" es el término más natural y digno para la anatomía interna del animal sacrificial.
- source_word: וְאֵת כָּל הַחֵלֶב אֲשֶׁר עַל הַקֶּרֶב
  english_pob_choice: and all the fat that is on the entrails
  chosen_spanish: y toda la grasa que está sobre las entrañas
  alternatives_spanish:
  - y toda la grasa que hay sobre las entrañas
  - y toda la grasa encima de las entrañas
  lexicon: HALOT
  rationale: Se conserva el alcance total de la frase y la relación espacial de עַל. "Está sobre" mantiene la imagen concreta sin añadir interpretación.
theological_decisions:
- issue: Renderización del nombre divino יהוה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - el SEÑOR
  rationale: La fuente hebrea contiene el Tetragrámaton y el proyecto español usa "Yahvé" por convención editorial. Se evita la máscara "SEÑOR" para conservar la transparencia textual y la auditabilidad.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Sentido de אִשֶּׁה en contexto sacrificial
  english_pob_reading: a food offering
  chosen_spanish_reading: una ofrenda hecha por fuego
  alternative_spanish_readings:
  - una ofrenda por fuego
  - una ofrenda de fuego
  rationale: El término admite una alternativa tradicional, y la POB inglesa la conserva en nota. En español, "hecha por fuego" mantiene el dato sacrificial sin la ambigüedad de "ofrenda de comida".
  doctrine_reference: HALOT; POB lexical note on אִשֶּׁה
translation_notes:
  revision_awareness: La versión inglesa auditada mantiene alta concordancia y no registra cambios aplicados en la última revisión; por eso la redacción española sigue de cerca sus decisiones léxicas, ajustándolas a un español natural y al criterio editorial de usar Yahvé para el nombre divino.
  spanish_consistency_notes:
  - Se mantiene el paralelismo de la lista sacrificial con dos miembros coordinados por «y».
  - «Grasa» se usa de manera consistente para חֵלֶב en este versículo.
  - «Entrañas» se elige por naturalidad bíblica en español, conservando el referente anatómico del texto hebreo.
  - La nota al pie se ancla en «ofrenda[a]» para preservar la alternativa léxica documentada.
