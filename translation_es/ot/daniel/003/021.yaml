    issue: Demostrativo "aquellos hombres"
    rationale: El arameo גֻּבְרַיָּא אִלֵּךְ y la auditoría inglesa favorecen "estos hombres". "Aquellos" no destruye el sentido, pero cambia la deixis sin necesidad y se aleja de la decisión documentada.
  - severity: high
    issue: La nota [a] está anclada en "pantalones" en vez de "túnicas"
    rationale: La nota explica una alternativa para el segundo término de vestimenta (פטישי/הון), no para סַרְבָּלֵיהוֹן. Debe colocarse donde aparece la palabra correspondiente en español para no inducir error lexical.
  - severity: medium
    issue: '"al medio de" es menos natural que "en medio de"'
    rationale: Para לְגוֹא, la idea es interior/midst. En español bíblico y natural, "en medio de" expresa mejor el interior del horno sin sonar forzado.
  - severity: medium
    issue: '"horno encendido" atenúa la imagen de intensidad'
    rationale: El source acumula horno/fuego/ardor, y la auditoría inglesa eligió "blazing furnace". "Horno ardiente" o similar preserva mejor la fuerza que simplemente "encendido".
  revised_spanish_text: Entonces estos hombres fueron atados con sus pantalones, sus túnicas[a], sus mantos y sus demás vestidos, y fueron arrojados en medio del horno ardiente[b].
