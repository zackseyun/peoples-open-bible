translation:
  language: es
  text: 'Y el hijo de Hananías: Pelatías y Jesaías; los hijos de Refaías[a], los hijos de Arnán, los hijos de Obadías, los hijos de Secanías.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'El hebreo presenta una sintaxis comprimida y algo difícil. Literalmente dice: «Y el hijo de Hananías: Pelatías y Jesaías; los hijos de Refaías, los hijos de Arnán, los hijos de Obadías, los hijos de Secanías». Algunos intérpretes entienden parte de la secuencia más ampliamente como una línea de descendientes, no necesariamente como hijos inmediatos.'
    reason: alternative_reading
lexical_decisions:
- source_word: וּבֶן / בְּנֵי
  english_pob_choice: And the sons of / the sons of
  chosen_spanish: Y los hijos de / los hijos de
  alternatives_spanish:
  - Y el hijo de / el hijo de
  - Y los descendientes de
  lexicon: HALOT
  rationale: El hebreo presenta una secuencia genealógica comprimida con lenguaje de filiación. En español, «hijos de» mantiene la estructura y la ambigüedad genealógica sin forzar una precisión generacional que el texto no explicita. Se evita «descendientes de» para no suavizar demasiado la forma del original.
- source_word: חֲנַנְיָה
  english_pob_choice: Hananiah
  chosen_spanish: Hananías
  alternatives_spanish:
  - Hananía
  lexicon: HALOT
  rationale: Nombre propio transliterado según uso bíblico en español. «Hananías» es la forma más reconocible y consistente con la tradición de transliteración hispana, sin traducir el nombre.
- source_word: פְּלַטְיָה
  english_pob_choice: Pelatiah
  chosen_spanish: Pelatías
  alternatives_spanish:
  - Pelatía
  lexicon: HALOT
  rationale: Nombre propio transliterado con adaptación hispana usual de nombres hebreos terminados en -yāh. Se conserva la forma nominal sin interpretarla.
- source_word: וִישַׁעְיָה
  english_pob_choice: and Jeshaiah
  chosen_spanish: y Jesaías
  alternatives_spanish:
  - y Isaías
  lexicon: HALOT
  rationale: Se distingue este nombre del profeta Isaías, aunque esté emparentado formalmente. «Jesaías» refleja la forma hebrea específica de este pasaje y evita confusión con un nombre más familiar.
- source_word: רְפָיָה
  english_pob_choice: Rephaiah
  chosen_spanish: Refaías
  alternatives_spanish:
  - Refaía
  lexicon: HALOT
  rationale: Nombre propio transliterado. Se sigue la adaptación española habitual de la secuencia consonántica y final hebrea.
- source_word: אַרְנָן
  english_pob_choice: Arnan
  chosen_spanish: Arnán
  alternatives_spanish:
  - Arnan
  lexicon: HALOT
  rationale: Nombre propio transliterado al español con acento prosódico para lectura natural. No se altera el nombre ni se lo traduce.
- source_word: עֹבַדְיָה
  english_pob_choice: Obadiah
  chosen_spanish: Abdías
  alternatives_spanish:
  - Obadías
  - Obadiah
  lexicon: HALOT
  rationale: Se usa la forma española bíblica bien establecida «Abdías», que corresponde al mismo nombre hebreo. Es más natural y reconocible para lectura eclesial en español.
- source_word: שְׁכַנְיָה
  english_pob_choice: Shecaniah
  chosen_spanish: Secanías
  alternatives_spanish:
  - Secanías
  - Shecanías
  lexicon: HALOT
  rationale: Nombre propio transliterado en forma española usual. Se mantiene como nombre, sin intentar armonizarlo con otras variantes cercanas.
theological_decisions:
- issue: Alcance de la cadena genealógica comprimida
  english_pob_reading: The Hebrew syntax is compressed and somewhat difficult... Some interpreters understand part of the sequence more broadly as a line of descendants rather than immediate sons.
  chosen_spanish_reading: La secuencia se vierte de manera formal como una cadena de filiación, sin decidir en el texto principal si todos los elementos son hijos inmediatos o una línea más amplia de descendientes.
  alternative_spanish_readings:
  - y los descendientes de Hananías
  - y una línea de descendencia de Hananías
  rationale: El hebreo admite una lectura más amplia que la filiación inmediata, pero el texto no obliga a resolverla. Por fidelidad al audit trail, el cuerpo principal conserva la estructura genealógica compacta, y la nota explica la dificultad sin borrarla.
  doctrine_reference: No aplica; cuestión de sintaxis genealógica, no doctrinal.
translation_notes:
  revision_awareness: El borrador refleja la revisión más reciente del audit trail, que corrigió la lectura inglesa de ‘the son of Hananiah’ a ‘the sons of Hananiah’ por precisión lexical. En español se adoptó directamente la lectura plural correspondiente («los hijos de Hananías»), manteniendo la naturaleza colectiva/comprimida del hebreo.
  spanish_consistency_notes:
  - Se mantiene «hijos de» de forma consistente para la cadena genealógica, porque el pasaje usa repetición estructural de בני.
  - Se usa transliteración hispana estable para nombres propios, evitando mezcla de formas inglesas e hispanas.
  - Se conserva la ambigüedad sintáctica del hebreo mediante la nota, sin expandir el texto principal más allá de lo evidenciado.
