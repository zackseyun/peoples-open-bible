base_translation:
  language: en
  yaml_path: translation/ot/zephaniah/002/014.yaml
  text: Herds will lie down in her midst[a], every beast of the nations; both the desert owl and the hedgehog will spend the night among her capitals. A voice will sing in the window; devastation will be on the threshold[c][b], for her cedarwork has been laid bare.
  footnotes:
  - marker: a
    text: The identification of the Hebrew animal names is uncertain. 'Desert owl' may also be rendered 'pelican.'
    reason: lexical_alternative
  - marker: b
    text: Or 'porcupine' for 'hedgehog.' The exact species denoted by the Hebrew term is debated.
    reason: lexical_alternative
  - marker: c
    text: Hebrew 'every beast of a nation' or similar; the phrase is difficult, likely meaning 'every kind of beast.'
    reason: alternative_reading
