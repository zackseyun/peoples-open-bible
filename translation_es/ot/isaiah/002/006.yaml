review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien la estructura básica del hebreo y la línea de decisiones del POB inglés: abandono de «tu pueblo, la casa de Jacob», plenitud de influencias/prácticas orientales, adivinación como los filisteos, y asociación con extranjeros. Sin embargo, hay un desajuste importante de anclaje de nota: la nota [a] explica «desde el oriente / prácticas orientales», pero está colocada sobre «has abandonado» en vez de sobre la frase correspondiente. Además, «estrechan manos» suena menos idiomático en español bíblico moderno que una formulación reflexiva o una expresión más natural.'
  spanish_quality_summary: El español es claro y digno, pero requiere un ajuste menor para legibilidad y precisión editorial. «Has abandonado» es aceptable, aunque «has desamparado»/«has abandonado» ambos funcionarían; no exige cambio. La mejora principal es mover la nota [a] al segmento correcto y hacer más natural la última cláusula. «Hacen tratos con» comunica bien el probable sentido de alianza/compromiso y evita la torpeza de «estrechan manos».
  glossary_alignment: No hay conflicto con la terminología base del proyecto. Se conserva «Jacob», «Dios/Yahvé» no aparece aquí, y no hay desvíos teológicos indebidos. La decisión de no convertir la denuncia en xenofobia general está bien alineada con el razonamiento documentado. La nota sobre el verbo raro final debe mantenerse.
  issues:
  - severity: high
    issue: La nota [a] está anclada en «has abandonado» pero explica «desde el oriente / prácticas orientales».
    rationale: Esto rompe la trazabilidad entre texto y nota, y puede inducir al lector a pensar que la alternativa literal corresponde al verbo נָטַשְׁתָּה en vez de a מִקֶּדֶם.
  - severity: medium
    issue: «Estrechan manos con» suena poco natural en español y no expresa con la mayor claridad el matiz de pacto/asociación.
    rationale: El hebreo es incierto, pero el POB inglés preserva el probable sentido de alianza. En español, «hacen tratos con» o «se dan la mano con» resulta más idiomático; con nota se puede conservar la incertidumbre léxica.
  - severity: low
    issue: «Hijos de extranjeros» es formalmente fiel pero puede sonar algo rígido.
    rationale: No es error; se puede mantener por cercanía al hebreo, especialmente si la nota del verbo ya aclara que la denuncia es de asociación comprometida, no étnica.
