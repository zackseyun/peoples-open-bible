translation:
  language: es
  text: 'Un hombre lo vio y se lo dijo a Joab[a], y dijo: «Mira, vi a Absalón colgado en el árbol de terebinto».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «en la encina». El hebreo אֵלָה puede referirse a un terebinto y a veces se vierte de manera más general como «encina».
    reason: lexical_alternative
lexical_decisions:
- source_word: אִישׁ אֶחָד
  english_pob_choice: One man
  chosen_spanish: Un hombre
  alternatives_spanish:
  - un hombre
  - una persona
  lexicon: HALOT
  rationale: La expresión hebrea significa literalmente ‘un hombre’. En español, ‘un hombre’ conserva bien la referencia singular masculina y la simplicidad narrativa, sin añadir matices no presentes en el texto.
- source_word: וַיַּרְא
  english_pob_choice: saw it
  chosen_spanish: lo vio
  alternatives_spanish:
  - vio
  - alcanzó a ver
  lexicon: HALOT
  rationale: El verbo expresa una visión completada en la narración. En español conviene explicitar el objeto implícito con ‘lo’ para mantener la referencia al hecho observado sin sobrecargar la frase.
- source_word: וַיַּגֵּד לְיוֹאָב
  english_pob_choice: told Joab
  chosen_spanish: se lo dijo a Joab
  alternatives_spanish:
  - le informó a Joab
  - se lo reportó a Joab
  lexicon: HALOT
  rationale: נגד en este contexto narrativo es ‘decir/contar a’. ‘Se lo dijo a Joab’ transmite el acto de comunicar la noticia de forma natural en español y conserva el complemento implícito del mensaje.
- source_word: הִנֵּה
  english_pob_choice: Look
  chosen_spanish: Mira
  alternatives_spanish:
  - Mira
  - Mira bien
  - He aquí
  lexicon: HALOT
  rationale: La partícula deíctica pide atención inmediata. ‘Mira’ reproduce esa función con español actual; ‘He aquí’ sería más tradicional y menos natural aquí.
- source_word: רָאִיתִי
  english_pob_choice: I saw
  chosen_spanish: vi
  alternatives_spanish:
  - he visto
  - he visto yo
  lexicon: HALOT
  rationale: El perfecto hebreo se integra mejor al pretérito simple en español narrativo. ‘Vi’ mantiene la inmediatez del testimonio sin introducir un matiz resultativo innecesario.
- source_word: תָּלוּי
  english_pob_choice: hanging
  chosen_spanish: colgado
  alternatives_spanish:
  - colgando
  - suspendido
  lexicon: HALOT
  rationale: El participio pasivo describe el estado de Absalón. ‘Colgado’ es la forma más natural y fiel en español para expresar que estaba en esa condición.
- source_word: בָּאֵלָה
  english_pob_choice: in the terebinth tree
  chosen_spanish: en el terebinto
  alternatives_spanish:
  - en el terebinto
  - en la encina
  lexicon: HALOT
  rationale: אֵלָה designa específicamente un terebinto. En español, ‘terebinto’ conserva el referente botánico mejor que ‘encina’ u otras equivalencias más generales. Se omite ‘árbol’ porque el sustantivo ya funciona como el objeto locativo en uso castellano bíblico claro.
translation_notes:
  revision_awareness: 'Se comparó con el texto inglés auditado y su nota léxica sobre אֵלָה. No se requieren ajustes mayores: la lectura española mantiene el valor narrativo, el objeto implícito de ‘vio’, la atención de הִנֵּה y la alternativa botánica en nota.'
  spanish_consistency_notes:
  - Se mantiene Joab sin artículo, como nombre propio.
  - ‘Terebinto’ se usa en el texto principal siguiendo la preferencia fuente-orientada; la alternativa tradicional ‘encina’ queda en nota.
  - No se añadió lenguaje interpretativo sobre el significado de la escena; la redacción sigue de cerca la narración hebrea.
