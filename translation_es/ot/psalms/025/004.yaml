translation:
  language: es
  text: Hazme conocer[a] tus caminos, Yahvé; enséñame tus sendas.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «hazme saber»; tradicionalmente, «muéstrame».'
    reason: lexical_alternative
lexical_decisions:
- source_word: דְּרָכֶיךָ
  english_pob_choice: your ways
  chosen_spanish: tus caminos
  alternatives_spanish:
  - tus vías
  - tus maneras de obrar
  lexicon: HALOT
  rationale: דֶּרֶךְ puede significar 'camino' y, en sentido figurado, el modo de actuar. 'Caminos' conserva la metáfora hebrea y resulta natural en español, sin reducirla a una explicación interpretativa.
- source_word: יְהוָה
  english_pob_choice: O Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - SEÑOR
  - Yahweh
  lexicon: HALOT
  rationale: El texto hebreo usa el nombre propio divino. En español, 'Yahvé' sigue la política de la POB de no sustituirlo por un título, y es idiomático y reconocible en registro bíblico.
- source_word: הוֹדִיעֵנִי
  english_pob_choice: Make ... known to me
  chosen_spanish: Hazme conocer
  alternatives_spanish:
  - Dame a conocer
  - Muéstrame
  lexicon: HALOT
  rationale: La forma causativa de ידע expresa 'hacer saber' o 'hacer conocer'. 'Hazme conocer' preserva mejor ese valor causativo que 'muéstrame', sin perder naturalidad en español.
- source_word: אֹרְחוֹתֶיךָ
  english_pob_choice: your paths
  chosen_spanish: tus sendas
  alternatives_spanish:
  - tus caminos
  - tus huellas
  lexicon: HALOT
  rationale: אֹרַח designa 'sendero, senda, camino estrecho'. 'Sendas' ayuda a mantener la distinción poética con דְּרָכֶיךָ, que en español también puede ser 'caminos'.
- source_word: לַמְּדֵנִי
  english_pob_choice: teach me
  chosen_spanish: enséñame
  alternatives_spanish:
  - instrúyeme
  - adiéstrame
  lexicon: HALOT
  rationale: El imperativo de למד con sufijo de primera persona singular pide instrucción directa. 'Enséñame' es la equivalencia más natural y fiel en español.
theological_decisions:
- issue: Traducción del nombre divino יְהוָה
  english_pob_reading: O Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - Yahweh
  rationale: Se mantiene el nombre propio del pacto en lugar de una sustitución por título. 'Yahvé' es la forma establecida en la línea editorial de la POB para español y preserva la referencia explícita al Tetragrámaton.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
translation_notes:
  revision_awareness: 'El pasaje coincide plenamente con el contexto auditado en inglés: se conserva la paralelismo poético entre דְּרָכֶיךָ / אֹרְחוֹתֶיךָ, la causatividad de הוֹדִיעֵנִי y el nombre divino יְהוָה sin sustitución titulada. No se requirieron revisiones posteriores según el registro de auditoría.'
  spanish_consistency_notes:
  - Se distinguió 'caminos' y 'sendas' para preservar el paralelismo hebreo.
  - Se eligió 'Hazme conocer' para reflejar el matiz causativo de הוֹדִיעֵנִי.
  - Se usó 'Yahvé' conforme a la terminología base del proyecto en español.
  - Se evitó 'muéstrame' en el texto principal, pero se dejó como alternativa en la nota para reflejar la glosa tradicional reconocida por la auditoría.
