base_translation:
  language: en
  yaml_path: translation/ot/2_samuel/002/023.yaml
  text: But he refused to turn aside[a], so Abner struck him in the belly with the back end of the spear, and the spear came out behind him; and he fell there and died where he was. And everyone who came to the place where Asahel had fallen and died stood still.
  footnotes:
