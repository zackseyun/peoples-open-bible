translation:
  language: es
  text: Y alzaron un clamor e hicieron oír un sonido poderoso[a], para hacer memorial delante del Altísimo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «para servir de memorial delante del Altísimo». El infinitivo hebreo y el paralelo griego conservan aquí lenguaje de memorial en sentido litúrgico.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּרִיעוּ / ἀνέκραγον
  english_pob_choice: they raised a shout
  chosen_spanish: clamaron
  alternatives_spanish:
  - alzaron un clamor
  - gritaron
  - prorrumpieron en un grito
  lexicon: HALOT; LXX ἀνακράζω
  rationale: El hebreo y el griego apuntan a un clamor fuerte y ceremonial. «Clamaron» comunica bien el acto vocal intenso sin forzar un modismo demasiado coloquial o demasiado mecánico.
- source_word: וַיַּשְׁמִיעוּ / ἤχησαν
  english_pob_choice: made ... heard
  chosen_spanish: resonaron
  alternatives_spanish:
  - hicieron oír
  - sonaron
  - se dejaron oír
  lexicon: HALOT; LSJ
  rationale: El causativo hebreo y el verbo griego expresan producir un sonido audible. «Resonaron» mantiene la fuerza sonora y evita duplicar demasiado la idea de «hicieron oír» en español.
- source_word: קוֹל אַדִּיר / φωνὴν μεγάλην
  english_pob_choice: a mighty sound
  chosen_spanish: una gran voz
  alternatives_spanish:
  - un sonido poderoso
  - una voz poderosa
  - un gran sonido
  lexicon: HALOT; LSJ
  rationale: El hebreo puede significar «voz» o «sonido»; el contexto litúrgico y el paralelo griego favorecen una formulación audible y solemne. «Gran voz» conserva el eco bíblico sin limitarse a habla humana.
- source_word: לְהַזְכִּיר / εἰς μνημόσυνον
  english_pob_choice: to make remembrance
  chosen_spanish: para hacer memorial
  alternatives_spanish:
  - para hacer recuerdo
  - para servir de memorial
  - para traer a memoria
  lexicon: HALOT; LSJ
  rationale: El sustantivo/infinitivo tiene fuerza cultual de memorial. «Hacer memorial» preserva ese valor litúrgico mejor que un simple «recordar».
- source_word: לִפְנֵי עֶלְיוֹן / ἔναντι Ὑψίστου
  english_pob_choice: before the Most High
  chosen_spanish: delante del Altísimo
  alternatives_spanish:
  - en presencia del Altísimo
  - ante el Altísimo
  - delante de Dios Altísimo
  lexicon: HALOT; LSJ
  rationale: «Altísimo» es el título divino correspondiente; «delante de» refleja bien la relación espacial/ritual de לִפְנֵי y del griego ἔναντι.
- source_word: שופר / σάλπιγξιν (implícito por el contexto griego)
  chosen_spanish: trompetas de metal
  alternatives_spanish:
  - trompetas
  - clarines
  - trompetas de bronce
  lexicon: HALOT; LSJ
  rationale: El griego menciona trompetas de metal (ἐλαταῖς). Aunque el hebreo de este versículo no explicita el instrumento en esta forma, el paralelo griego ayuda a justificar una referencia instrumental sobria en español.
theological_decisions:
- issue: Language of memorial in a liturgical context
  english_pob_reading: to make remembrance before the Most High
  chosen_spanish_reading: para hacer memorial delante del Altísimo
  alternative_spanish_readings:
  - para servir de memorial delante del Altísimo
  - para traer a memoria delante del Altísimo
  rationale: La frase conserva la tensión entre recuerdo y memorial litúrgico. «Hacer memorial» evita reducir el sentido a mera memoria psicológica y respeta el valor cultual de ambos originales.
  doctrine_reference: Preservar la ambigüedad cultual del texto fuente sin resolverla hacia categorías doctrinales posteriores.
translation_notes:
  revision_awareness: El texto español sigue el acuerdo alto entre hebreo y griego. Se ajustó la sintaxis para que suene natural en español sin perder el paralelismo de clamor, sonido audible y memorial cultual. No se introdujeron doctrinas ajenas al pasaje.
  spanish_consistency_notes:
  - Se usó «Altísimo» para עֶלְיוֹן, conforme al patrón bíblico estándar y al valor teológico del título.
  - Se evitó «SEÑOR» porque el texto fuente no contiene el Tetragrámaton y el título divino explícito es «el Altísimo».
  - «Memorial» se mantuvo como término cultual y no se redujo a «recuerdo», para conservar la tensión lexical documentada.
