id: ACT.2.17
reference: Acts 2:17
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: Καὶ ἔσται ἐν ταῖς ἐσχάταις ἡμέραις, λέγει ὁ θεός, ἐκχεῶ ἀπὸ τοῦ πνεύματός μου ἐπὶ πᾶσαν σάρκα, καὶ προφητεύσουσιν οἱ υἱοὶ ὑμῶν καὶ αἱ θυγατέρες ὑμῶν, καὶ οἱ νεανίσκοι ὑμῶν ὁράσεις ὄψονται, καὶ οἱ πρεσβύτεροι ὑμῶν ⸀ἐνυπνίοις ἐνυπνιασθήσονται·
base_translation:
  language: en
  yaml_path: translation/nt/acts/002/017.yaml
  text: And it will be in the last days[a], says God, that I will pour out from my Spirit on all flesh, and your sons and your daughters will prophesy, and your young men will see visions[b], and your old men will dream dreams.
  footnotes:
  - marker: a
    text: Or 'on all people.' The Greek reads 'on all flesh,' preserving the prophetic idiom.
    reason: lexical_alternative
  - marker: b
    text: Traditional English often has 'I will pour out of my Spirit'; the Greek more literally says 'from my Spirit.'
    reason: lexical_alternative
translation:
  language: ko
  text: 『하나님께서 말씀하신다. 마지막 날에 내가 내 영을 모든 육체 위에 부어 주리니, 너희의 아들들과 딸들이 예언할 것이며, 너희의 젊은이들은 환상을 보고, 너희의 노인들은 꿈을 꿀 것이다.
  philosophy: optimal-equivalence
theological_decisions:
- issue: 요엘 2:28-32 인용에서 신적 화자의 발화 처리
  chosen_reading: 하나님의 직접 발화에 대해 반말 친근체를 피하고, 신탁 문체에 맞는 격조 있는 평서형(-리라/-할 것이다)을 채택
  alternative_readings:
  - 합쇼체 「~할 것입니다」
  rationale: 구약 신탁(요엘) 직접 인용의 한국어 전통 문체를 따라, 문학적 위엄과 예언적 권위를 유지한다. 화자가 청중을 직접 부르는 것이 아니라 신탁 발화를 그대로 옮기는 정황이므로 합쇼체보다 평서형이 자연스럽다.
  doctrine_reference: 'KOREAN_PIPELINE.md: 직접 신적 발화의 register 처리'
