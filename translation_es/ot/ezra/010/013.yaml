translation:
  language: es
  text: Pero el pueblo es numeroso, y es tiempo de lluvias; no hay fuerza para permanecer fuera. Y la tarea no es para un día ni para dos[a], porque hemos transgredido[b] gravemente en este asunto.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «no puede hacerse en un día ni en dos».'
    reason: alternative_reading
  - marker: b
    text: 'O: «hemos pecado gravemente en este asunto».'
    reason: alternative_reading
lexical_decisions:
- source_word: אֲבָל
  english_pob_choice: But
  chosen_spanish: Pero
  alternatives_spanish:
  - Sin embargo
  lexicon: HALOT
  rationale: Marca el contraste con la propuesta anterior de manera natural en español y mantiene el valor adversativo directo del hebreo.
- source_word: הָעָם רָב
  english_pob_choice: the people are many
  chosen_spanish: el pueblo es numeroso
  alternatives_spanish:
  - el pueblo es grande
  - la gente es mucha
  lexicon: HALOT
  rationale: Conserva el predicado de cantidad aplicado al sustantivo colectivo 'pueblo'. 'Numeroso' suena más natural que una calca literal y preserva el sentido.
- source_word: וְהָעֵת גְּשָׁמִים
  english_pob_choice: it is the rainy season
  chosen_spanish: es tiempo de lluvias
  alternatives_spanish:
  - es la temporada de lluvias
  - es tiempo de lluvia
  lexicon: HALOT
  rationale: El hebreo dice literalmente 'el tiempo [de] lluvias'. 'Es tiempo de lluvias' transmite esa idea con español idiomático sin perder el valor temporal.
- source_word: וְאֵין כֹּחַ לַעֲמֹד בַּחוּץ
  english_pob_choice: there is no strength to stand outside
  chosen_spanish: no hay fuerza para permanecer fuera
  alternatives_spanish:
  - no hay fuerza para estar afuera
  - no podemos resistir afuera
  lexicon: HALOT
  rationale: Conserva la construcción impersonal del hebreo y expresa la incapacidad de soportar la exposición exterior, sin introducir más interpretación de la necesaria.
- source_word: וְהַמְּלָאכָה
  english_pob_choice: the work
  chosen_spanish: la obra
  alternatives_spanish:
  - el trabajo
  - la tarea
  lexicon: HALOT
  rationale: Aquí מְלָאכָה se refiere a la diligencia o gestión del asunto en curso. 'Obra' es suficientemente amplia y puede abarcar el trámite colectivo sin restringirlo a labor manual.
- source_word: לֹא לְיוֹם אֶחָד וְלֹא לִשְׁנַיִם
  english_pob_choice: is not for one day or for two
  chosen_spanish: no es para un día ni para dos
  alternatives_spanish:
  - no puede hacerse en un día ni en dos
  - no es cosa de un día o de dos
  lexicon: HALOT
  rationale: Mantiene cerca la estructura hebrea y comunica duración, no mera imposibilidad abstracta. 'Ni para dos' preserva el paralelismo del original.
- source_word: כִּי הִרְבִּינוּ
  english_pob_choice: for we have greatly
  chosen_spanish: porque hemos transgredido gravemente
  alternatives_spanish:
  - porque hemos pecado gravemente
  - porque hemos hecho mucho mal
  lexicon: HALOT
  rationale: El hebreo une la intensificación con el infinitivo de pecar/trasgredir. En español, la gravedad se expresa mejor con 'gravemente'; no se reduce el verbo a cantidad de personas, y se conserva la acusación del texto.
- source_word: לִפְשֹׁעַ
  english_pob_choice: transgressed
  chosen_spanish: transgredido
  alternatives_spanish:
  - pecado
  - rebelado
  lexicon: HALOT
  rationale: '''Transgredir'' preserva la fuerza jurídica y moral de פשע sin resolverla en una sola categoría doctrinal. Es más preciso que ''pecar'' cuando el contexto enfatiza violación de un asunto/al mandato.'
- source_word: בַּדָּבָר הַזֶּה
  english_pob_choice: in this matter
  chosen_spanish: en este asunto
  alternatives_spanish:
  - en esta cosa
  - en este tema
  lexicon: HALOT
  rationale: '''Asunto'' es la forma natural en español para דָּבָר en este contexto de decisión comunitaria y problema concreto.'
theological_decisions:
- issue: Naturaleza de la culpa expresada por לִפְשֹׁעַ
  english_pob_reading: Render as 'transgressed' without specifying a doctrinal category beyond the text.
  chosen_spanish_reading: Renderizar como 'transgredido' y mantener la gravedad con 'gravemente', sin añadir una categoría doctrinal más específica.
  alternative_spanish_readings:
  - pecado
  - rebelado
  rationale: El versículo confiesa una violación seria, pero no define por sí mismo si debe catalogarse primariamente como pecado, rebeldía o ruptura legal. 'Transgredido' conserva esa tensión y evita sobreinterpretar.
  doctrine_reference: Preservar la tensión teológica sin resolverla de forma excesiva.
translation_notes:
  revision_awareness: La revisión más reciente no introdujo cambios; el consenso del repaso indicó acuerdo alto y solo observaciones menores, por lo que esta redacción sigue de cerca el texto hebreo y el audit trail en inglés.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' como norma general del proyecto, pero este versículo no contiene el nombre divino.
  - Se evita 'Cristo' porque no aparece el vocabulario mesiánico del pasaje.
  - Se traduce פשע como 'transgredido' para preservar el matiz jurídico-moral documentado por el POB inglés.
  - Se respeta la ambigüedad de 'hemos transgredido gravemente' sin convertirla en una confesión doctrinal más precisa de lo que el hebreo exige.
