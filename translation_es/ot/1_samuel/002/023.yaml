translation:
  language: es
  text: 'Y él les dijo: «¿Por qué hacen tales cosas? Porque oigo de toda esta gente acerca de sus malas acciones[a]»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo literalmente: «oigo sus malas palabras/asuntos de toda esta gente». En contexto, Eli está oyendo reportes sobre la conducta perversa de sus hijos, por lo que «malas acciones» expresa mejor el sentido.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמֶר
  english_pob_choice: And he said
  chosen_spanish: Y él les dijo
  alternatives_spanish:
  - Entonces les dijo
  - Y dijo
  lexicon: WLC/HALOT
  rationale: Conserva el avance narrativo del wayyiqtol sin forzar un giro innecesariamente arcaico. Se explicita el sujeto por claridad en español, ya que el pronombre relativo al contexto evita ambigüedad.
- source_word: לָהֶם
  english_pob_choice: to them
  chosen_spanish: les
  alternatives_spanish:
  - a ellos
  - a sus hijos
  lexicon: WLC/HALOT
  rationale: El dativo pronominal español reproduce directamente el destinatario del habla. El contexto identifica a los hijos de Elí, pero el texto hebreo solo dice 'a ellos'.
- source_word: לָמָּה תַעֲשׂוּן
  english_pob_choice: Why do you do
  chosen_spanish: ¿Por qué hacen
  alternatives_spanish:
  - ¿Por qué hacen ustedes
  - ¿Por qué están haciendo
  - ¿Para qué hacen
  lexicon: WLC/HALOT
  rationale: La pregunta de reprensión pide una forma natural en español. El imperfecto hebreo de reproche expresa acción habitual o continua; 'hacen' comunica bien esa conducta repetida sin añadir matiz progresivo no explícito.
- source_word: כַּדְּבָרִים הָאֵלֶּה
  english_pob_choice: such things
  chosen_spanish: tales cosas
  alternatives_spanish:
  - esas cosas
  - cosas como estas
  - tales hechos
  lexicon: WLC/HALOT
  rationale: '''דְּבָרִים'' puede abarcar palabras, asuntos o hechos. Aquí, por el contexto de conducta culpable, ''cosas'' mantiene amplitud semántica; ''tales'' refleja el valor intensivo de ''כַּ'' sin concretar de más.'
- source_word: אָנֹכִי שֹׁמֵעַ
  english_pob_choice: I hear
  chosen_spanish: oigo
  alternatives_spanish:
  - estoy oyendo
  - escucho
  lexicon: WLC/HALOT
  rationale: El participio con pronombre independiente expresa una acción en curso o habitual. 'Oigo' es natural y mantiene el presente de recepción de informes, como en el audit trail inglés.
- source_word: אֶת דִּבְרֵיכֶם רָעִים
  english_pob_choice: about your evil deeds
  chosen_spanish: sus malas palabras
  alternatives_spanish:
  - sus malas acciones
  - sus malos asuntos
  - sus palabras malas
  lexicon: WLC/HALOT
  rationale: La expresión hebrea es literalmente 'vuestras palabras/asuntos malos', pero el contexto indica que son reportes de conducta perversa. En español se conserva la tensión entre 'palabras/asuntos' y el valor moral de 'malas', evitando imponer 'acciones' como interpretación cerrada. Se usa 'sus' porque el referente en español ya está claro por el diálogo.
- source_word: מֵאֵת כָּל הָעָם אֵלֶּה
  english_pob_choice: from all these people
  chosen_spanish: de entre todo este pueblo
  alternatives_spanish:
  - de parte de todo este pueblo
  - de todos estos hombres
  - de todo este pueblo
  lexicon: WLC/HALOT
  rationale: מֵאֵת indica fuente/origen de la información. 'De entre' conserva la idea de procedencia desde el conjunto del pueblo y permite reflejar el plural con sentido colectivo de 'todo este pueblo' sin perder el deíctico 'este'.
translation_notes:
  revision_awareness: Se tuvo en cuenta que el texto inglés POB fue revisado de 'these things' a 'such things' para un inglés más natural. En español se reflejó esa naturalidad con 'tales cosas' y se mantuvo la nota léxica sobre דְּבָרִים por la tensión entre 'palabras/asuntos' y el sentido contextual de mala conducta reportada.
  spanish_consistency_notes:
  - Se mantuvo 'Yahvé' como norma general del proyecto no aplicable aquí, ya que este versículo no contiene el Tetragrámaton.
  - Se evitó 'Señor' y vocabulario eclesiástico no presente en el hebreo.
  - Se prefirió un español neutral y sobrio, apto para lectura pública.
  - La nota al pie [a] marca la alternativa lexical relevante sin duplicar otras ambigüedades del versículo.
