translation:
  language: es
  text: Te exaltaré[a], Yahvé, porque me has sacado de lo hondo y no has permitido que mis enemigos se alegren a costa mía.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «me has levantado»; el verbo hebreo evoca literalmente sacar algo hacia arriba, como de un pozo.
    reason: lexical_alternative
lexical_decisions:
- source_word: אֲרוֹמִמְךָ
  english_pob_choice: I will exalt you
  chosen_spanish: Yo te exaltaré
  alternatives_spanish:
  - Yo te alabaré
  - Yo te levantaré en alto
  lexicon: HALOT
  rationale: El verbo expresa elevar/exaltar en alabanza; «exaltar» conserva bien la metáfora vertical y funciona de manera natural en español reverente sin convertirla en una imagen física literal.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  - el SEÑOR
  lexicon: HALOT
  rationale: Se conserva el nombre divino como transliteración establecida en español, conforme a la política del proyecto; no se sustituye por un título. «Yahvé» es la forma más reconocible y eclesialmente legible en español.
- source_word: כִּי
  english_pob_choice: because
  chosen_spanish: porque
  alternatives_spanish:
  - pues
  - ya que
  lexicon: HALOT
  rationale: Introduce la razón del acto de alabanza; «porque» es la equivalencia más directa y clara en español actual.
- source_word: דִלִּיתָנִי
  english_pob_choice: you have drawn me up
  chosen_spanish: me has sacado
  alternatives_spanish:
  - me has sacado del pozo
  - me has levantado
  lexicon: HALOT
  rationale: El verbo hebreo alude literalmente a sacar algo hacia arriba, como de un pozo. En español, «me has sacado» mantiene la idea de extracción sin sobrecargar el verso; el matiz concreto queda explícito en la nota.
- source_word: וְלֹא
  english_pob_choice: and have not
  chosen_spanish: y no has permitido
  alternatives_spanish:
  - y no has hecho
  - y no has dejado
  lexicon: HALOT
  rationale: Con «שִׂמַּחְתָּ» la construcción causativa se expresa con naturalidad en español como «no has permitido», conservando el sentido de impedir la alegría triunfal de los enemigos.
- source_word: שִׂמַּחְתָּ
  english_pob_choice: have not let ... rejoice
  chosen_spanish: que mis enemigos se alegren
  alternatives_spanish:
  - que mis enemigos se regocijen
  - que mis enemigos celebren
  lexicon: HALOT
  rationale: El verbo significa hacer alegrarse. En español, con el sujeto «mis enemigos», «se alegren» reproduce la idea de gozo triunfal de forma idiomática y directa.
- source_word: אֹיְבַי
  english_pob_choice: my enemies
  chosen_spanish: mis enemigos
  alternatives_spanish:
  - los que me odian
  - mis adversarios
  lexicon: HALOT
  rationale: «Mis enemigos» es la equivalencia más exacta y común para אויב, sin suavizar la fuerza del término.
- source_word: לִי
  english_pob_choice: over me
  chosen_spanish: sobre mí
  alternatives_spanish:
  - a mi costa
  - en contra de mí
  lexicon: HALOT
  rationale: La preposición señala ventaja hostil o triunfo respecto del salmista; «sobre mí» preserva ese matiz de victoria o dominio en español.
theological_decisions:
- issue: Rendering the divine name יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - el SEÑOR
  rationale: El texto hebreo emplea directamente el Tetragrámaton. Siguiendo la política del POB en español, se preserva el nombre propio divino en transliteración y no se lo sustituye por un título devocional.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
translation_notes:
  revision_awareness: 'El contexto auditado en inglés coincide plenamente con la solución propuesta: preservación del nombre divino, verbo de elevación traducido de forma idiomática pero con nota del matiz concreto, y construcción causativa expresada en español natural sin perder la relación entre la alegría de los enemigos y el favor recibido.'
  spanish_consistency_notes:
  - Se usa «Yahvé» en lugar de «SEÑOR» para mantener la política del proyecto sobre el nombre divino.
  - «Exaltar» preserva el lenguaje de elevación sin perder naturalidad en español.
  - «Me has sacado» se mantiene deliberadamente breve en el texto principal; el detalle de «sacar de un pozo» queda en la nota para no cargar el verso.
  - «Sobre mí» conserva el matiz hostil/triunfal del hebreo לִי.
