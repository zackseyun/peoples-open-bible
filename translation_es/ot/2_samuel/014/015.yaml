  text: וְ֠/עַתָּה אֲשֶׁר בָּ֜אתִי לְ/דַבֵּ֨ר אֶל הַ/מֶּ֤לֶךְ אֲדֹנִ/י֙ אֶת הַ/דָּבָ֣ר הַ/זֶּ֔ה כִּ֥י יֵֽרְאֻ֖/נִי הָ/עָ֑ם וַ/תֹּ֤אמֶר שִׁפְחָֽתְ/ךָ֙ אֲדַבְּרָה נָּ֣א אֶל הַ/מֶּ֔לֶךְ אוּלַ֛י יַעֲשֶׂ֥ה הַ/מֶּ֖לֶךְ אֶת דְּבַ֥ר אֲמָתֽ/וֹ־־־־־־׃
base_translation:
  language: en
  yaml_path: translation/ot/2_samuel/014/015.yaml
  text: And now I have come to speak this word to my lord the king[a], because the people have made me afraid. And your servant said, ‘Please let me speak to the king[b]; perhaps the king will do the word of his maidservant.’
  footnotes:
  - marker: a
    text: Or, 'because the people made me afraid.' The Hebrew verb is causative ('frightened me'), not 'the people fear me.'
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'the word of his maidservant.' That is, her request or plea.
    reason: lexical_alternative
