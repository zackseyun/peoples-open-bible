review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español no sigue fielmente el texto fuente ni la trayectoria auditada en inglés en dos puntos mayores. La primera cola intenta preservar la dificultad de מטמנת שקר, pero «una ocultación de engaño» resulta menos fiel y menos idiomático que una formulación como «una causa oculta de engaño», que refleja mejor la solución ya adoptada en el POB inglés mientras mantiene la opacidad hebrea con apoyo de la nota. Más grave aún, las dos cláusulas finales se desvían del inglés POB auditado y del hebreo base: el borrador traduce según el griego «para que no decaiga» y «para que no sea odiada», cuando la versión inglesa revisada ya decidió seguir el hebreo con «lest she remain unmarried» y «lest she not be married», dejando la lectura griega en nota. Por tanto, el texto español actual no preserva la decisión documental del proyecto.'
  spanish_quality_summary: 'La redacción actual tiene problemas de naturalidad y claridad: «La hija» suena genérico pero algo rígido; «una ocultación de engaño» es poco idiomático; «le aparta el sueño» es aceptable pero menos natural que «le quita el sueño» o «ahuyenta su sueño». Además, «para que no decaiga» y «para que no sea odiada» introducen sentidos oscuros y desconectados del paralelismo matrimonial del verso. Una revisión leve puede mantener la dignidad del registro y mejorar la legibilidad sin sobreparafrasear.'
  glossary_alignment: No hay términos doctrinales del glosario principal en juego, pero sí hay desalineación con la política de traducir desde el hebreo donde se conserva y usar el griego como control y como nota cuando hay tensión textual. El borrador español privilegia indebidamente el griego en las cláusulas finales contra la decisión ya documentada del POB inglés. La revisión propuesta restablece esa alineación y conserva la alternativa griega en notas.
  issues:
  - severity: high
    issue: Las cláusulas finales siguen el griego en vez de la decisión auditada del POB basada en el hebreo.
    rationale: El inglés POB revisado dice «lest she remain unmarried» y «lest she not be married». El español «para que no decaiga» y «para que no sea odiada» contradice esa resolución editorial y altera el sentido principal del verso.
  - severity: medium
    issue: «una ocultación de engaño» es español poco natural y no refleja bien la solución inglesa «hidden cause of deceit».
    rationale: La frase hebrea es difícil, pero la versión española debe ser legible. «Causa oculta de engaño» conserva la aspereza semántica sin caer en un giro nominal extraño.
  - severity: medium
    issue: La nota a y su texto mezclan inglés («sleeplessness») dentro del español.
    rationale: Debe decir «insomnio oculto» o equivalente para mantener coherencia idiomática.
  - severity: low
    issue: «le aparta el sueño» es correcto pero menos natural que una expresión española más común.
    rationale: «Le quita el sueño» transmite bien la idiomaticidad del original y sigue siendo digno y claro.
  revised_spanish_text: 'Una hija es una causa oculta de engaño para su padre[a], y la preocupación por ella le quita el sueño: en su juventud, no sea que quede sin casarse, y en su virginidad[b], no sea que no la casen.'
  revised_footnotes:
