translation:
  language: es
  text: 'Y este fue su número: mil copas de libación de oro, mil copas de libación de plata, veintinueve incensarios de plata, treinta copas de oro, doscientas diez copas de plata[a], y mil otros utensilios[b].'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: La notación numérica griega para las copas de plata es difícil en la presentación diplomática de Swete; esta traducción sigue la lectura de doscientas diez, aunque la forma transmitida no es perfectamente clara.
    reason: textual_variant
  - marker: b
    text: El paralelo hebreo de Esdras 1:9 presenta en este punto otros objetos y números distintos; 1 Esdras parece conservar aquí un inventario griego reordenado o ampliado, no un equivalente palabra por palabra del hebreo.
    reason: alternative_reading
lexical_decisions:
- source_word: ὁ δὲ τούτων ἀριθμὸς ἦν
  english_pob_choice: And this was their number
  chosen_spanish: Y este fue su número
  alternatives_spanish:
  - Y el número de estos fue
  - Ahora bien, este fue su número
  lexicon: LSJ
  rationale: La fórmula introductoria de conteo se vierte de manera natural y fiel en español. "Este fue su número" conserva la estructura demostrativa sin sonar forzado.
- source_word: σπονδεῖα
  english_pob_choice: libation bowls
  chosen_spanish: copas de libación
  alternatives_spanish:
  - vasos de libación
  - copas para libación
  lexicon: LSJ
  rationale: En español, "copa" comunica mejor que "bol" el objeto ritual de este inventario. Se mantiene la referencia cultual de σπονδεῖα mediante "de libación", sin perder claridad.
- source_word: χρυσᾶ
  english_pob_choice: gold
  chosen_spanish: de oro
  alternatives_spanish:
  - doradas
  - de oro fino
  lexicon: LSJ
  rationale: El adjetivo material se expresa con la construcción natural "de oro", adecuada para inventarios y sin sobrecargar el estilo.
- source_word: ἀργυρᾶ
  english_pob_choice: silver
  chosen_spanish: de plata
  alternatives_spanish:
  - plateadas
  - de plata fina
  lexicon: LSJ
  rationale: Se conserva el valor material literal con la forma idiomática española "de plata".
- source_word: θυίσκαι ἀργυραῖ
  english_pob_choice: silver censers
  chosen_spanish: incensarios de plata
  alternatives_spanish:
  - censers de plata
  - braseros de plata
  lexicon: LSJ
  rationale: '"Incensarios" comunica en español el utensilio templario asociado al incienso de forma más natural que "censers", y conserva la función ritual del término.'
- source_word: φιάλαι
  english_pob_choice: bowls
  chosen_spanish: copas
  alternatives_spanish:
  - cuencos
  - vasos
  lexicon: LSJ
  rationale: Aunque φιάλαι puede referir a recipientes abiertos, en español "copa" resulta más fluido en un inventario ceremonial y mantiene la imagen de un vaso ritual.
- source_word: ἀργυραῖ ,βυʹ δέκα
  english_pob_choice: two hundred and ten silver bowls
  chosen_spanish: doscientos diez copas de plata
  alternatives_spanish:
  - doscientas diez copas de plata
  - doscientos diez vasos de plata
  lexicon: LSJ
  rationale: Se sigue la lectura que el audit trail inglés adopta para la cifra, en una forma castellana clara. La ambigüedad textual del numeral queda documentada en la nota correspondiente.
- source_word: ἄλλα σκεύη
  english_pob_choice: other vessels
  chosen_spanish: otros utensilios
  alternatives_spanish:
  - otros vasos
  - otros implementos
  lexicon: LSJ
  rationale: En contexto de inventario del templo, σκεύη puede abarcar recipientes e implementos. "Utensilios" preserva esa amplitud sin imponer una especificación innecesaria.
theological_decisions:
- issue: Terminología cultual para σπονδεῖα y θυίσκαι
  english_pob_reading: The items are temple/ritual vessels, rendered with cultic specificity.
  chosen_spanish_reading: Los objetos se entienden como vasijas y utensilios rituales del templo, expresados con terminología cultual clara.
  alternative_spanish_readings:
  - Los objetos son simplemente recipientes.
  - Los objetos se describen con términos genéricos no cultuales.
  rationale: El contexto del pasaje es un inventario del templo; por tanto, conviene conservar la función religiosa de los términos. "Copas de libación" e "incensarios" mantienen visible la dimensión ritual sin exceder el texto.
  doctrine_reference: Inventario del templo; uso cultual en el segundo templo
- issue: Tratamiento de la cifra textual difícil en el segundo grupo de vasos
  english_pob_reading: The Greek numeral notation ... is difficult; the translation follows it as two hundred and ten, with uncertainty preserved in a note.
  chosen_spanish_reading: Se traduce la cifra como doscientos diez, dejando constancia de la dificultad textual en la nota.
  alternative_spanish_readings:
  - Se podría omitir la cifra por incertidumbre.
  - Se podría adoptar otra reconstrucción numérica.
  rationale: El texto griego transmitido presenta una notación numérica diplomáticamente compleja. La traducción debe ser legible, pero sin borrar la inseguridad textual documentada por el audit trail.
  doctrine_reference: Crítica textual / integridad de la transmisión
translation_notes:
  revision_awareness: 'Se ha mantenido la lectura óptima del audit trail inglés y no se requieren cambios respecto de la revisión más reciente. La decisión principal en español es lexical: se preserva la dimensión ritual de los utensilios y se traduce la cifra difícil sin suavizar la incertidumbre textual.'
  spanish_consistency_notes:
  - Se usa "copas de libación" para σπονδεῖα de manera consistente con el sentido ritual.
  - Se usa "incensarios" para θυίσκαι por su función templaria.
  - Se conserva "de oro" / "de plata" para los materiales, en registro natural y uniforme.
  - Se mantiene "utensilios" como término amplio para σκεύη en contexto de inventario.
  - Los corchetes de nota aparecen solo donde corresponde y en el orden solicitado.
