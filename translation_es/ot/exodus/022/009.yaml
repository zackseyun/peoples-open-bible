revisions:
- from: Si un hombre entrega a su vecino un asno[a], o un buey, o una oveja, o cualquier animal para guardarlo, y muere, o se lesiona[b], o es llevado[c], sin que nadie lo vea,
  to: Si un hombre entrega a su vecino un asno, o un buey, o una oveja[a], o cualquier animal para guardarlo, y muere, o se lesiona[b], o es llevado cautivo, sin que nadie lo haya visto[c],
  rationale: Se corrige la ubicación de la nota léxica sobre שֶׂה, anclándola en «oveja». Se fortalece נִשְׁבָּה con «es llevado cautivo», que comunica mejor la idea de ser arrebatado/capturado sin reducirlo a simple robo. Se ajusta la cláusula final a «sin que nadie lo haya visto» para una expresión más natural y precisa de ausencia de testigos en español.
