revisions:
- from: Ellos comerán la ofrenda vegetal[a], la ofrenda por el pecado y la ofrenda por la culpa, y toda cosa dedicada[b] en Israel será de ellos.
  to: Ellos comerán la ofrenda de cereal, la ofrenda por el pecado y la ofrenda por la culpa, y todo lo dedicado[a] en Israel será de ellos.
  rationale: Se ajusta מִנְחָה a ‘ofrenda de cereal’ para reflejar mejor la decisión léxica documentada (‘grain offering’) y el uso cúltico establecido en español. Se mejora חֵרֶם a ‘todo lo dedicado’ por naturalidad y precisión, y se corrige la nota defectuosa eliminando ‘devotada’ e incorporando la explicación teológica/lexical del término técnico. No hace falta nota para מִנְחָה, porque el texto principal ya expresa bien el sentido y la alternativa no es necesaria para evitar ambigüedad en español.
