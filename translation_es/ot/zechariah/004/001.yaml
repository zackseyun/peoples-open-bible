translation:
  language: es
  text: Entonces el ángel que hablaba conmigo volvió y me despertó[a], como un hombre que es despertado de su sueño.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, «que despierta de su sueño». El hebreo permite entender el verbo en sentido pasivo/reflexivo («es despertado») o expresarlo en forma intransitiva.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּשָׁב
  english_pob_choice: returned
  chosen_spanish: volvió
  alternatives_spanish:
  - regresó
  - volvió a venir
  lexicon: HALOT
  rationale: שׁוּב expresa la idea de volver/retornar. En español, «volvió» mantiene la acción narrativa sin sonar rígido, y encaja con el ángel reanudando la interacción.
- source_word: הַמַּלְאָךְ
  english_pob_choice: the angel
  chosen_spanish: el ángel
  alternatives_spanish:
  - el mensajero
  lexicon: HALOT
  rationale: En un contexto de visión profética, «ángel» comunica con claridad el intermediario celestial que el hebreo designa con מַלְאָךְ.
- source_word: הַדֹּבֵר בִּי
  english_pob_choice: who was speaking with me
  chosen_spanish: que hablaba conmigo
  alternatives_spanish:
  - que estaba hablando conmigo
  - que hablaba con migo
  lexicon: HALOT
  rationale: El participio hebreo describe al ángel como el que está en la acción de hablar. «Hablaba conmigo» conserva bien ese valor durativo y la relación interpersonal de בִּי.
- source_word: וַיְעִירֵנִי
  english_pob_choice: woke me
  chosen_spanish: me despertó
  alternatives_spanish:
  - me despertó de nuevo
  - me hizo despertar
  lexicon: HALOT
  rationale: El hifil de עור significa despertar/poner en estado de vigilia. «Me despertó» es natural y fiel al valor causativo.
- source_word: כְּאִישׁ
  english_pob_choice: like a man
  chosen_spanish: como un hombre
  alternatives_spanish:
  - como un varón
  - como un hombre cualquiera
  lexicon: HALOT
  rationale: La comparación conserva el singular masculino del hebreo. «Como un hombre» suena natural en español y mantiene la imagen genérica.
- source_word: אֲשֶׁר יֵעוֹר מִשְּׁנָתוֹ
  english_pob_choice: who is awakened from his sleep
  chosen_spanish: que es despertado de su sueño
  alternatives_spanish:
  - que despierta de su sueño
  - que se despierta de su sueño
  lexicon: HALOT
  rationale: El niphal de עור puede ser pasivo/reflexivo. Se eligió la forma pasiva «es despertado» para reflejar mejor la correspondencia con el causativo previo y preservar la tensión verbal del hebreo.
translation_notes:
  revision_awareness: 'Se siguió de cerca el audit trail en inglés: returned = volvió, speaking with me = hablaba conmigo, woke me = me despertó, and the final simile retains the passive/reflexive ambiguity documented in the English note.'
  spanish_consistency_notes:
  - Se mantuvo «ángel» en lugar de «mensajero» por el contexto visionario.
  - Se conservó el paralelismo entre el verbo causativo inicial y el pasivo final mediante «me despertó» / «es despertado».
  - La nota al pie preserva la alternativa verbal documentada en la tradición de auditoría.
  - Se evitó la terminología eclesiástica tradicional no requerida por el hebreo.
  - La puntuación sigue el ritmo narrativo breve del versículo hebreo.
