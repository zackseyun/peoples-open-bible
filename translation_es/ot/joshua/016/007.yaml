translation:
  language: es
  text: Entonces descendió desde Janoah hasta Atarot y Naarah[a], y llegó a Jericó[b], y terminó en el Jordán[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebreo Naarah; algunas tradiciones relacionan este nombre con Naarath en Josué 16:7–8.
    reason: alternative_reading
  - marker: b
    text: O «tocó Jericó»; el verbo hebreo puede expresar que una linde alcanza o toca un lugar.
    reason: lexical_alternative
  - marker: c
    text: O «salió al Jordán»; el giro hebreo describe el curso o punto final de la frontera.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְיָרַד
  english_pob_choice: Then it went down
  chosen_spanish: Entonces descendía
  alternatives_spanish:
  - Y descendía
  - Luego bajaba
  lexicon: HALOT
  rationale: En descripciones de límites, ירד expresa un descenso geográfico. «Descendía» conserva ese movimiento; «Entonces» refleja la secuencia narrativa del waw inicial sin forzar un valor temporal fuerte.
- source_word: מִיָּנוֹחָה
  english_pob_choice: from Janoah
  chosen_spanish: desde Janoah
  alternatives_spanish:
  - desde Yanoah
  - de Janoah
  lexicon: HALOT
  rationale: Se conserva el nombre propio con transliteración usual. «Desde» expresa bien el punto de partida del límite en español contemporáneo.
- source_word: עֲטָרוֹת
  english_pob_choice: Ataroth
  chosen_spanish: Atarot
  alternatives_spanish:
  - Ataroth
  lexicon: HALOT
  rationale: Nombre propio de lugar. Se adopta «Atarot» para una transliteración más natural en español, sin traducir el topónimo.
- source_word: וְנַעֲרָתָה
  english_pob_choice: Naarah
  chosen_spanish: Naará
  alternatives_spanish:
  - Naarah
  - Naarat
  lexicon: HALOT
  rationale: El hebreo masorético apunta a una forma con terminación femenina; «Naará» refleja mejor la vocalización del texto base. Se conserva la alternativa tradicional en la nota.
- source_word: וּפָגַע בִּירִיחוֹ
  english_pob_choice: and reached Jericho
  chosen_spanish: y llegaba a Jericó
  alternatives_spanish:
  - y alcanzaba a Jericó
  - y tocaba Jericó
  - y llegaba hasta Jericó
  lexicon: HALOT
  rationale: פגע en fórmulas territoriales puede significar llegar, tocar o encontrarse con un punto limítrofe. «Llegaba a» mantiene la idea espacial sin decidir en exceso entre contacto exacto y aproximación.
- source_word: וְיָצָא הַיַּרְדֵּן
  english_pob_choice: and ended at the Jordan
  chosen_spanish: y salía al Jordán
  alternatives_spanish:
  - y terminaba en el Jordán
  - y llegaba al Jordán
  - y salía hacia el Jordán
  lexicon: HALOT
  rationale: יצא en descripciones de límites suele indicar el punto de salida o culminación del trazado. «Salía al Jordán» reproduce ese valor direccional de manera natural en español.
- source_word: הַיַּרְדֵּן
  english_pob_choice: the Jordan
  chosen_spanish: el Jordán
  alternatives_spanish:
  - el río Jordán
  lexicon: HALOT
  rationale: Se mantiene el nombre del río con artículo, como en el uso bíblico común. No se añade «río» porque el contexto ya lo identifica como curso de agua.
translation_notes:
  revision_awareness: El texto inglés auditado fue revisado de «touched Jericho» a «reached Jericho» por naturalidad, manteniendo el valor espacial de פגע. La versión española refleja esa misma decisión semántica con «llegaba a Jericó», y conserva el final del límite con «salía al Jordán» según la lectura más reciente del audit trail.
  spanish_consistency_notes:
  - Se usa «Jordán» con artículo masculino singular, conforme al uso bíblico en español.
  - Se prefieren transliteraciones sobrias para los topónimos, sin adaptar a grafías eclesiásticas tradicionales cuando el texto fuente permite una forma más cercana al hebreo.
  - La secuencia verbal mantiene el carácter de lista territorial, no de relato narrativo pleno.
