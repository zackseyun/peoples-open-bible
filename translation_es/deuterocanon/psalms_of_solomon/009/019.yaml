review_pass:
  verdict: revise
  source_alignment_summary: El borrador español refleja bien la estructura general del griego y conserva el futuro de ἐλπιοῦμεν, la referencia a «nuestros padres» y la literalidad de «nuestra alma». Sin embargo, «estableciste con nuestros padres» no corresponde bien a τοῖς πατράσιν, que aquí va mejor como complemento indirecto («a nuestros padres») dentro del giro de pacto. Además, «en el volver de nuestra alma» suena poco natural en español y debilita la claridad del giro ἐν ἐπιστροφῇ ψυχῆς ἡμῶν; «en el retorno de nuestra alma» mantiene mejor la nominalización literal sin caer en una construcción extraña.
  spanish_quality_summary: 'La redacción es mayormente comprensible, pero tiene dos tropiezos de naturalidad: 1) «estableciste con nuestros padres» combina de forma rígida el verbo con una preposición poco idiomática en español para este contexto; 2) «en el volver de nuestra alma» resulta forzado y menos digno que alternativas igualmente fieles. Una leve revisión mejora la legibilidad sin sacrificar correspondencia fuente-texto.'
  glossary_alignment: No hay conflicto con la terminología principal del proyecto. «Pacto» es aceptable para διαθήκη en este contexto, aunque «alianza» también sería posible. Se preserva correctamente «alma» para ψυχή y no se sobreinterpreta ἐπιστροφή como «arrepentimiento» en el texto principal. Las notas deben seguir apoyando esa tensión semántica.
  issues:
  - severity: medium
    issue: Régimen verbal poco adecuado en «estableciste con nuestros padres»
    rationale: El griego τοῖς πατράσιν ἡμῶν se expresa más naturalmente aquí como «a nuestros padres» con «estableciste»/«dispusiste», o bien habría que rehacer todo el giro como «hiciste un pacto con nuestros padres». La forma actual mezcla una literalidad inglesa con español menos idiomático.
  - severity: medium
    issue: «En el volver de nuestra alma» es una construcción poco natural
    rationale: Aunque intenta preservar la nominalización de ἐπιστροφῇ, «volver» como sustantivo suena torpe aquí. «Retorno» conserva la imagen de vuelta/regreso y mantiene abierta la posible connotación penitencial sin resolverla en «arrepentimiento».
  - severity: low
    issue: La nota b debe ajustarse al texto revisado
    rationale: Si el texto principal mantiene «En un pacto ...», la nota alternativa debe seguir siendo coherente y útil como variante estilística/documental.
  revised_spanish_text: En un pacto[a][b] estableciste a nuestros padres acerca de nosotros, y nosotros esperaremos en ti en el retorno de nuestra alma.
  revised_footnotes:
  - marker: a
    text: 'O: «Estableciste un pacto».'
    reason: alternative_reading
  - marker: b
    text: 'O: «cuando nuestra alma se vuelva»; el griego dice literalmente «en el volver/retorno de nuestra alma».'
    reason: lexical_alternative
  revision_rationale: Se corrige el régimen de «estableciste» para reflejar mejor τοῖς πατράσιν ἡμῶν en español y se sustituye «volver» por «retorno» para una expresión más natural y digna, sin perder la literalidad ni la tensión teológica del original. Se conservan las dos notas, con marcadores válidos presentes en el texto.
