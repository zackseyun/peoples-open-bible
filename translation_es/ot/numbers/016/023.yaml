translation:
  language: es
  text: Entonces Yahvé habló a Moisés[a], diciendo,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «Yahvé habló a Moisés, diciendo». La conjunción inicial puede también rendirse como «Y».'
