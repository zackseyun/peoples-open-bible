base_translation:
  language: en
  yaml_path: translation/deuterocanon/1_esdras/008/057.yaml
  text: And he handed over to them[a], after weighing it out, six hundred fifty talents of silver, and silver vessels worth a hundred talents, and a hundred talents of gold, and twenty golden bowls[b], and ten vessels of fine gleaming bronze.
  footnotes:
  - marker: a
    text: The Greek text here differs notably from the Hebrew parallel in Ezra 8:27, which lists two vessels of fine bronze and gives a value for the gold bowls. Because 1 Esdras is translated from the Greek witness here, the main text follows the Greek inventory.
    reason: textual_variant
  - marker: b
    text: Or possibly 'twenty gold objects' for 'twenty golden bowls'; the Greek term is rare, but the Hebrew parallel supports understanding it as a kind of bowl or basin.
    reason: lexical_alternative
