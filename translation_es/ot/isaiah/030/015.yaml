translation:
  language: es
  text: 'Porque así dice el Señor Yahvé, el Santo de Israel: «En volver[a] y reposo seréis salvos[b]; en quietud y confianza será vuestra fuerza». Pero no quisisteis.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «en arrepentimiento»; el hebreo dice más literalmente «en volver», lo cual puede incluir arrepentimiento y regreso a Dios.
    reason: lexical_alternative
  - marker: b
    text: O «seréis librados».
    reason: alternative_reading
lexical_decisions:
- source_word: אֲדֹנָי יְהוִה
  english_pob_choice: the Lord GOD
  chosen_spanish: el Señor Yahvé
  alternatives_spanish:
  - el Señor DIOS
  - el Señor Yahvéh
  lexicon: HALOT
  rationale: El hebreo combina el título אֲדֹנָי con el nombre divino יהוה. En español, “Señor” rinde אֲדֹנָי y “Yahvé” mantiene visible el nombre propio, evitando el ocultamiento litúrgico de la forma y conservando la distinción del doble título.
- source_word: קְדוֹשׁ יִשְׂרָאֵל
  english_pob_choice: the Holy One of Israel
  chosen_spanish: el Santo de Israel
  alternatives_spanish:
  - el Santo de Israel
  lexicon: HALOT
  rationale: “Santo de Israel” es la manera natural y precisa de expresar el título recurrente de Isaías, preservando la santidad y la relación de pacto con Israel.
- source_word: בְּשׁוּבָה
  english_pob_choice: in returning
  chosen_spanish: en volver
  alternatives_spanish:
  - en retorno
  - en arrepentirse
  lexicon: HALOT
  rationale: El sustantivo verbal apunta al acto de volver o regresar. “En volver” conserva la imagen concreta y deja abierta la tensión entre regreso físico/político y arrepentimiento, sin resolverla prematuramente.
- source_word: וָנַחַת
  english_pob_choice: and rest
  chosen_spanish: y en reposo
  alternatives_spanish:
  - y descanso
  - y calma
  lexicon: HALOT
  rationale: נַחַת expresa reposo sereno, quietud asentada. “Reposo” funciona bien en español con el paralelo de “volver” y mantiene la idea de descanso sin volverlo demasiado interpretativo.
- source_word: תִּוָּשֵׁעוּן
  english_pob_choice: you will be saved
  chosen_spanish: seréis salvos
  alternatives_spanish:
  - seréis librados
  - seréis rescatados
  lexicon: HALOT
  rationale: La forma nifal de ישׁע denota ser salvado o liberado. “Seréis salvos” preserva el peso profético y soteriológico del verbo; las alternativas de liberación quedan abiertas, como en el inglés auditado.
- source_word: בְּהַשְׁקֵט
  english_pob_choice: in quietness
  chosen_spanish: en quietud
  alternatives_spanish:
  - en silencio
  - en calma
  lexicon: HALOT
  rationale: “Quietud” expresa bien el estado de calma y sosiego del sustantivo, y mantiene el paralelismo con “confianza” sin desplazar el sentido hacia silencio meramente externo.
- source_word: וּבְבִטְחָה
  english_pob_choice: and trust
  chosen_spanish: y en confianza
  alternatives_spanish:
  - y en seguridad
  - y en fe
  lexicon: HALOT
  rationale: בִּטְחָה puede ser confianza, seguridad o confianza plena. “Confianza” comunica mejor la dependencia relacional de Yahvé y conserva el matiz de confianza activa, no solo de seguridad resultante.
- source_word: תִּהְיֶה גְּבוּרַתְכֶם
  english_pob_choice: will be your strength
  chosen_spanish: estará vuestra fuerza
  alternatives_spanish:
  - será vuestra fuerza
  - estará vuestro poder
  - será vuestro vigor
  lexicon: HALOT
  rationale: גְּבוּרָה puede significar fuerza, poder o potencia. “Fuerza” es el equivalente más natural y claro en español; “estará” refleja con soltura el valor de estado/presencia del verbo “ser” en este contexto poético.
- source_word: וְלֹא אֲבִיתֶם
  english_pob_choice: But you were unwilling
  chosen_spanish: Pero no quisisteis
  alternatives_spanish:
  - Pero no estuvisteis dispuestos
  - Pero rehusasteis
  lexicon: HALOT
  rationale: אָבָה indica querer/consentir. “No quisisteis” es una forma directa y natural en español que transmite la negativa de voluntad; conserva bien el contraste con la oferta divina.
theological_decisions:
- issue: Cómo traducir בְּשׁוּבָה sin fijarlo de entrada como “arrepentimiento”
  english_pob_reading: Rendered more broadly as 'returning'
  chosen_spanish_reading: “En volver” mantiene la amplitud del retorno
  alternative_spanish_readings:
  - “en arrepentimiento”
  - “en conversión”
  rationale: El hebreo admite un retorno que puede incluir arrepentimiento, pero el contexto inmediato también puede aludir a abandonar estrategias humanas y regresar a la confianza en Dios. Mantener “volver” conserva esa tensión teológica y no la reduce a un solo matiz.
  doctrine_reference: 'Translation philosophy #3: preserve theological tension rather than resolve it.'
- issue: Alcance de תִּוָּשֵׁעוּן
  english_pob_reading: Rendered 'you will be saved'
  chosen_spanish_reading: “seréis salvos” conserva la amplitud de salvación/liberación
  alternative_spanish_readings:
  - “seréis librados”
  - “seréis rescatados”
  rationale: El verbo hebreo puede referirse a rescate, liberación o salvación en sentido más amplio. “Seréis salvos” mantiene el peso profético sin cerrar el pasaje a una sola lectura nacional o espiritual.
  doctrine_reference: 'Translation philosophy #3: preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: 'The English POB audit trail shows no applied revisions and a high-agreement cross-check verdict. The Spanish draft follows the same source-based lexical choices and preserves the documented tensions: שׁוּב as returning rather than narrowed to repentance, and ישׁע as saved with liberation retained as an alternative.'
  spanish_consistency_notes:
  - Se mantiene “Yahvé” para יהוה en coherencia con el estándar español del proyecto.
  - Se usa “el Señor” para אֲדֹנָי, conservando el doble título divino con claridad.
  - “Seréis salvos” refleja el valor amplio de ישׁע sin perder la resonancia profética.
  - La puntuación y la comilla mantienen el discurso directo del hebreo y del inglés auditado.
  - Las notas al pie están ancladas solo donde hay alternativa lexical o de traducción documentada.
