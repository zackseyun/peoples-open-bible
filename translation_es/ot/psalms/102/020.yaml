translation:
  language: es
  text: Pues miró desde su altura santa[a]; Yahvé[b] miró desde el cielo hacia la tierra[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «desde la altura de su santidad»; la expresión se refiere a la santa morada exaltada de Dios.'
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: el nombre divino YHWH, transliterado aquí como Yahvé.'
    reason: theological_note
  - marker: c
    text: 'O: «desde los cielos ... hacia la tierra».'
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Ya que
  lexicon: HALOT
  rationale: La partícula introduce la base o razón del enunciado anterior. En español, «Porque» conserva mejor ese valor explicativo que «Ya que», y mantiene el tono poético sin sobrecargar la sintaxis.
- source_word: הִשְׁקִיף
  english_pob_choice: looked down
  chosen_spanish: miró desde lo alto
  alternatives_spanish:
  - miró hacia abajo
  - se asomó desde lo alto
  lexicon: HALOT
  rationale: El verbo expresa una mirada dirigida desde una posición elevada. «Miró desde su altura santa» comunica la imagen vertical del hebreo sin sonar forzado en español; «miró hacia abajo» pierde el matiz de procedencia espacial.
- source_word: מִמְּרוֹם קָדְשׁוֹ
  english_pob_choice: from his holy height
  chosen_spanish: desde su altura santa
  alternatives_spanish:
  - desde la altura de su santidad
  - desde su santa morada
  - desde su lugar santo en lo alto
  lexicon: HALOT
  rationale: La construcción hebrea combina altura/exaltación con santidad. «Su altura santa» conserva esa tensión entre elevación y santidad; «morada» aclara demasiado la imagen y debilita el paralelismo con «desde los cielos».
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahveh
  - el SEÑOR
  lexicon: 'DOCTRINE.md: Contested terms — יהוה YHWH → Yahweh'
  rationale: Se conserva el nombre divino propio en español como «Yahvé», conforme a la política del proyecto. No se sustituye por un título, porque el texto hebreo usa el Tetragrámaton directamente.
- source_word: מִשָּׁמַיִם
  english_pob_choice: from heaven
  chosen_spanish: desde los cielos
  alternatives_spanish:
  - desde el cielo
  lexicon: HALOT
  rationale: Aunque el hebreo es plural, en español poético «los cielos» preserva mejor la forma y el paralelismo del verso. «Desde el cielo» sería más idiomático, pero suaviza la pluralidad poética del original.
- source_word: אֶל אֶרֶץ
  english_pob_choice: to earth
  chosen_spanish: hacia la tierra
  alternatives_spanish:
  - a la tierra
  - sobre la tierra
  lexicon: HALOT
  rationale: La preposición marca dirección. «Hacia la tierra» reproduce esa orientación y evita la impresión de movimiento ya concluido que podría sugerir «a la tierra».
- source_word: הִבִּיט
  english_pob_choice: looked
  chosen_spanish: miró
  alternatives_spanish:
  - observó
  - contempló
  lexicon: HALOT
  rationale: Se mantiene el verbo general de ver/dirigir la vista, en paralelo con el primer hemistiquio. «Miró» es simple, directo y reproduce la decisión revisada del audit trail de no intensificar innecesariamente el segundo verbo.
theological_decisions:
- issue: Nombre divino יהוה en español
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahveh
  - el Señor
  rationale: El texto hebreo usa el Tetragrámaton. La decisión del proyecto es transliterarlo; en español se adopta «Yahvé» como forma estable y reconocible, evitando la sustitución por un título y preservando el nombre personal de Dios.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יהוה YHWH → Yahweh'
- issue: Imagen de trascendencia y morada divina
  english_pob_reading: from his holy height / from heaven to earth
  chosen_spanish_reading: desde su altura santa / desde los cielos hacia la tierra
  alternative_spanish_readings:
  - desde su santa morada
  - desde el cielo hacia la tierra
  rationale: 'El hebreo mantiene doble lenguaje espacial: una altura santa y el contraste cielo/tierra. La traducción conserva ambas imágenes sin convertirlas en una paráfrasis explicativa, porque la tensión poética es parte del sentido.'
  doctrine_reference: Salmo 102:20; imagen poética de la trascendencia divina
translation_notes:
  revision_awareness: El audit trail inglés muestra una revisión que prefirió «looked» para el segundo verbo, buscando mayor consistencia léxica con el primero. En español se siguió esa misma cautela, usando dos ocurrencias de «miró» sin introducir un contraste interpretativo no respaldado por el hebreo.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» conforme a la terminología del proyecto para יְהוָה.
  - 'Se preserva la imagen espacial del original: altura santa, cielos, tierra.'
  - No se introdujo un equivalente litúrgico como «el Señor», para no ocultar el nombre divino.
  - El paralelismo poético se conserva con sintaxis breve y directa.
