revisions:
- from: Yo agitaré a los egipcios contra los egipcios[a]; y cada uno peleará contra su hermano, y cada uno contra su prójimo; ciudad contra ciudad[b], reino contra reino.
  to: Enfrentaré a egipcios contra egipcios[a]; y cada uno peleará contra su hermano, y cada uno contra su prójimo; ciudad contra ciudad, reino contra reino.[b]
  rationale: Se ajusta el verbo principal a una opción más idiomática y precisa en español para expresar la idea de provocar conflicto interno. También se elimina el pronombre explícito «Yo» y se simplifica la expresión del colectivo nacional, manteniendo intactas las decisiones exegéticas y las notas del POB.
