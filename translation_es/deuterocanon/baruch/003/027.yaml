translation:
  language: es
  text: Dios no eligió a estos[a], ni les dio el camino[b] del conocimiento.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'los'; el griego usa un demostrativo, que puede señalar específicamente al grupo mencionado en el contexto inmediato.
    reason: lexical_alternative
  - marker: b
    text: O 'la vía del conocimiento' o 'el camino del entendimiento'. El griego dice más literalmente 'el camino del conocimiento'.
    reason: lexical_alternative
lexical_decisions:
- source_word: οὐ τούτους
  english_pob_choice: did not choose these
  chosen_spanish: no eligió a estos
  alternatives_spanish:
  - no los eligió
  - no escogió a estos
  lexicon: BDAG
  rationale: El demostrativo τούτους conserva en español la deixis de 'estos', que mantiene la referencia específica al grupo del contexto. 'Eligió' comunica bien ἐξελέξατο sin perder naturalidad.
- source_word: ἐξελέξατο
  english_pob_choice: did not choose
  chosen_spanish: no eligió
  alternatives_spanish:
  - no escogió
  - no seleccionó
  lexicon: BDAG
  rationale: El verbo medio se expresa con 'elegir/escoger' en español. 'Eligió' es claro y sobrio; no añade matices ajenos como una selección técnica.
- source_word: ὁ θεός
  english_pob_choice: God
  chosen_spanish: Dios
  alternatives_spanish:
  - el Dios
  lexicon: BDAG
  rationale: La forma española normal y fiel es 'Dios'. El artículo griego no exige reproducirse de manera forzada en español.
- source_word: οὐδὲ
  english_pob_choice: nor did
  chosen_spanish: ni
  alternatives_spanish:
  - ni tampoco
  lexicon: BDAG
  rationale: '''Ni'' coordina naturalmente la segunda negación en español y mantiene la paralelidad con la primera cláusula.'
- source_word: ὁδὸν
  english_pob_choice: the way
  chosen_spanish: el camino
  alternatives_spanish:
  - la vía
  - el sendero
  lexicon: BDAG
  rationale: Aunque el griego dice literalmente 'camino/vía', en español 'camino del conocimiento' resulta idiomático y conserva la imagen de un modo de acceso o proceder. Se evita una construcción demasiado rígida.
- source_word: ἐπιστήμης
  english_pob_choice: of knowledge
  chosen_spanish: del conocimiento
  alternatives_spanish:
  - de conocimiento
  - de la sabiduría
  lexicon: BDAG
  rationale: ἐπιστήμη expresa conocimiento en sentido intelectual o de comprensión. 'Del conocimiento' refleja bien la relación genitiva sin ampliar el sentido a 'sabiduría'.
- source_word: ἔδωκεν αὐτοῖς
  english_pob_choice: did he give them
  chosen_spanish: les dio
  alternatives_spanish:
  - se lo dio
  - les concedió
  lexicon: BDAG
  rationale: '''Les dio'' es la forma más natural y directa para ἔδωκεν αὐτοῖς. ''Concedió'' introduciría una formalidad no exigida por el griego.'
theological_decisions:
- issue: Preservar la fuerza demostrativa de τούτους
  english_pob_reading: these rather than them
  chosen_spanish_reading: estos, no un pronombre neutro
  alternative_spanish_readings:
  - los
  - ellos
  rationale: El griego usa un demostrativo que apunta a un grupo concreto del contexto. 'Estos' conserva esa referencia sin explicitar más de lo que el verso da.
  doctrine_reference: Translation philosophy §1 (primacía del texto original)
- issue: Forma de ὁδὸν ἐπιστήμης
  english_pob_reading: the way of knowledge
  chosen_spanish_reading: el camino del conocimiento
  alternative_spanish_readings:
  - el camino hacia el conocimiento
  - la vía del conocimiento
  rationale: La estructura griega es literalmente 'camino de conocimiento', no 'camino hacia'. 'Del conocimiento' mantiene la metáfora sapiencial y evita añadir dirección que el texto no expresa.
  doctrine_reference: Translation philosophy §1 (original-language primacy over translation tradition)
translation_notes:
  revision_awareness: 'El inglés POB mantiene la forma demostrativa ''these'' y ofrece una alternativa pronominal, además de una nota para ''the way of knowledge''. La versión española conserva esa misma distinción: demostrativo explícito en el texto y una nota para alternativas léxicas de ὁδὸν ἐπιστήμης. No se registran revisiones textuales posteriores en el paquete.'
  spanish_consistency_notes:
  - Se mantiene 'Dios' para θεός en línea con el estándar del proyecto.
  - Se evita 'SEÑOR' porque aquí el griego no usa κύριος.
  - '''Conocimiento'' se conserva para ἐπιστήμη sin expandirlo a ''sabiduría'', aunque esta sea una posible glosa contextual.'
  - La negación coordinada se resuelve con 'ni' para reproducir con naturalidad el paralelismo griego.
