review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador capta bien el sentido global del hebreo: Jonadab corrige la conclusión falsa de que todos los hijos del rey murieron y aclara que solo Amnón murió. Sin embargo, hay dos detalles mejorables para mayor fidelidad y naturalidad: (1) «no ponga ... este asunto en su corazón» preserva la metáfora, pero en español suena algo forzado; «no tome ... a pecho» comunica mejor el sentido idiomático de אַל יָשֵׂם ... אֶל לִבּוֹ, mientras la nota puede conservar el literal hebreo. (2) El pie de nota b no es necesario, porque la exclusión ya queda clara en el texto y el inglés POB no exigía una nota aparte aquí.'
  spanish_quality_summary: El español es claro y digno, pero «este asunto en su corazón» resulta poco idiomático para lectura bíblica fluida. «No tome ... a pecho» mejora la legibilidad sin pérdida semántica. También conviene mantener una sola nota, anclada en la expresión idiomática principal, para evitar sobreanotar.
  glossary_alignment: No hay conflictos con la terminología del proyecto. No aparecen nombres divinos ni términos teológicos sensibles. «Mi señor el rey», «hijos del rey» y «Amnón» están bien. La decisión idiomática sobre el corazón debe explicarse en nota para preservar la evidencia léxica del hebreo.
  issues:
  - severity: medium
    issue: La expresión «no ponga ... este asunto en su corazón» es demasiado calcada
    rationale: Aunque refleja la metáfora hebrea, en español moderno suena rígida y menos natural que «no tome ... a pecho», que corresponde bien al sentido de 'take to heart' documentado en el POB.
  - severity: low
    issue: La nota b es redundante
    rationale: La exclusividad de כִּי אִם ... לְבַדּוֹ ya queda expresada claramente en «solo Amnón». La nota no preserva una ambigüedad necesaria ni añade información imprescindible.
  - severity: low
    issue: El anclaje de la nota a en «rey» no señala la frase relevante
    rationale: La nota explica la expresión idiomática del corazón; por tanto debe anclarse en la frase correspondiente, no en «rey».
  revised_spanish_text: 'Ahora, que mi señor el rey no tome este asunto a pecho[a], diciendo: «Todos los hijos del rey han muerto»; porque solo Amnón ha muerto.'
  revised_footnotes:
