  yaml_path: translation/ot/2_chronicles/010/006.yaml
  text: Then King Rehoboam consulted the elders who had stood before Solomon his father while he was still alive[a], saying[b], “How do you advise me to answer this people?”
  footnotes:
  - marker: a
    text: Literally, “How are you advising to return a word to this people?” The Hebrew idiom means to give an answer or reply.
    reason: lexical_alternative
  - marker: b
    text: “Stood before Solomon” can also mean “attended” or “served” him in an official capacity.
    reason: lexical_alternative
