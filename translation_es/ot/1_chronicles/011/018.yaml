    issue: «abrieron paso» sin pronombre reflexivo
    rationale: Para ויבקעו en este contexto militar, el español idiomático pide «se abrieron paso» o un verbo como «irrumpieron». «Abrieron paso» suele requerir objeto o complemento distinto y suena menos natural.
  - severity: medium
    issue: Se pierde la distinción entre וַיִּשְׂאוּ y וַיָּבִיאוּ
    rationale: 'El hebreo presenta dos acciones consecutivas: cargar/transportar y luego llevar hasta David. El borrador usa solo «la llevaron a David», que comprime ambas. Conviene reflejar ambas con «la cargaron y la llevaron a David» o equivalente.'
  - severity: low
    issue: «entre el campamento» es menos preciso que «en el campamento»
    rationale: Con la idea de irrumpir o abrirse paso, «en el campamento de los filisteos» comunica mejor la penetración en la posición enemiga que «entre el campamento», que suena extraño en español.
