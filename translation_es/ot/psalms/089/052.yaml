translation:
  language: es
  text: con lo cual tus enemigos se han burlado de ti, Yahvé, con lo cual se han burlado de los pasos[a] de tu ungido[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: '''Los pasos'' también puede entenderse como ''las huellas'', ''las pisadas'' o ''los talones'', en referencia metafórica al andar, las huellas o la venida del ungido de Yahvé.'
    reason: lexical_alternative
  - marker: b
    text: O 'tu Mesías'. El hebreo dice 'tu ungido' (מְשִׁיחֶךָ), que en contexto probablemente se refiere al rey davídico, aunque el término también conserva resonancia mesiánica.
    reason: alternative_reading
lexical_decisions:
- source_word: חֵרְפוּ
  english_pob_choice: have taunted
  chosen_spanish: han ultrajado
  alternatives_spanish:
  - han taunted
  - han reprochado
  - han escarnecido
  - han insultado
  lexicon: HALOT
  rationale: חרף expresa reproche burlón y deshonroso. En español, 'ultrajar' comunica mejor la carga de afrenta pública y desprecio que 'reprochar', y mantiene un tono digno sin suavizar la violencia verbal del hebreo.
- source_word: אוֹיְבֶיךָ
  english_pob_choice: your enemies
  chosen_spanish: tus enemigos
  alternatives_spanish:
  - tus adversarios
  - tus contrarios
  lexicon: HALOT
  rationale: La relación posesiva de segunda persona singular y el sustantivo plural se reflejan de forma directa y natural con 'tus enemigos'.
- source_word: יְהוָה
  english_pob_choice: O Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahveh
  - SEÑOR
  lexicon: HALOT
  rationale: Se conserva el nombre divino como 'Yahvé' conforme a la política del proyecto, evitando la sustitución por un título. No se añade una partícula vocativa en español porque el segmento ya funciona como apostrofe en el contexto poético.
- source_word: אֲשֶׁר
  english_pob_choice: with which
  chosen_spanish: con lo cual
  alternatives_spanish:
  - con lo que
  - con lo cual
  lexicon: HALOT
  rationale: El relativo introduce el medio o contenido de la afrenta. 'Con lo cual' suena natural en español formal y conserva la relación causal/instrumental del hebreo sin forzar una paráfrasis.
- source_word: עִקְּבוֹת
  english_pob_choice: the footsteps
  chosen_spanish: los pasos
  alternatives_spanish:
  - las huellas
  - los talones
  - las pisadas
  lexicon: HALOT
  rationale: La imagen hebrea puede abarcar pasos, huellas o talones. En español, 'los pasos' preserva la metáfora de movimiento/andanza y evita una concreción excesiva. Se mantiene la ambigüedad útil del original.
- source_word: מְשִׁיחֶךָ
  english_pob_choice: your anointed
  chosen_spanish: tu ungido
  alternatives_spanish:
  - tu Mesías
  - tu ungido
  lexicon: HALOT
  rationale: En el contexto inmediato de un salmo real, 'ungido' refleja con precisión el sentido primario de מָשִׁיחַ sin resolver la referencia hacia una designación cristológica explícita. Se preserva la tensión entre el rey davídico histórico y la resonancia mesiánica canónica.
theological_decisions:
- issue: Alcance de מְשִׁיחֶךָ en un salmo real con resonancia mesiánica
  english_pob_reading: your anointed; footnote preserves possible 'your Messiah'
  chosen_spanish_reading: tu ungido
  alternative_spanish_readings:
  - tu Mesías
  rationale: La lectura inmediata apunta al rey davídico como ungido de Yahvé. Traducir 'ungido' mantiene la referencia histórica y, a la vez, no elimina la resonancia mesiánica que el mismo término puede adquirir en la lectura canónica posterior. La alternativa 'tu Mesías' se reserva para nota, no para el texto principal.
  doctrine_reference: 'DOCTRINE.md: traducir títulos; preservar tensión teológica cuando el contexto no obliga a un título cristológico explícito.'
- issue: Nombre divino יְהוָה
  english_pob_reading: O Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahveh
  - el SEÑOR
  rationale: La política del proyecto exige representar el Tetragrámaton con el nombre propio. 'Yahvé' es la forma estándar adoptada en este corpus; no se reemplaza por un título reverencial para no ocultar el nombre del pacto.
  doctrine_reference: 'DOCTRINE.md: transliterar nombres divinos; evitar sustituciones litúrgicas que borren la forma del texto fuente.'
translation_notes:
  revision_awareness: La traducción sigue de cerca el texto hebreo y coincide en sustancia con la revisión inglesa más reciente, que no introdujo cambios. Se mantiene la ambigüedad documentada de מְשִׁיחֶךָ y de עִקְּבוֹת, trasladándolas al español con una solución principal y notas alternativas, sin resolver en exceso la referencia.
  spanish_consistency_notes:
  - Se usa 'Yahvé' para יְהוָה, coherente con la terminología del proyecto.
  - Se prefiere 'ungido' en el texto principal para מְשִׁיחֶךָ, reservando 'Mesías' para la nota por la tensión contextual documentada.
  - Se conserva el paralelismo sintáctico de las dos cláusulas relativas con 'con lo cual... con lo cual...'.
  - No se introduce puntuación o articulación litúrgica ajena al hebreo; el vocativo queda integrado por el contexto poético.
