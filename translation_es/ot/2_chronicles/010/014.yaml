review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue de cerca el hebreo y el rastro auditado en inglés: conserva «habló», la estructura «conforme al consejo», «los jóvenes», la metáfora del «yugo», «disciplinó», «látigos» y el literal «escorpiones» con nota alternativa apropiada. Sin embargo, presenta dos fallas importantes de fidelidad formal y legibilidad: usa «tu yugo» donde el hebreo tiene 2mp («vuestro/su yugo» plural), y «añadiré a él», que es poco natural en español para אֹסִיף עָלָיו.'
  spanish_quality_summary: El texto es en general comprensible y de tono bíblico moderno, pero requiere correcciones menores para español natural y concordancia pronominal. «Él» inicial es innecesario; «tu yugo» rompe la referencia al grupo; «añadiré a él» suena calcado. «Les habló» y «los disciplinó» son correctos con el objeto plural.
  glossary_alignment: 'No hay conflictos con la terminología base del proyecto. Las decisiones léxicas principales están alineadas: «los jóvenes», «yugo», «disciplinó», «látigos», «escorpiones». La nota léxica sobre «escorpiones» debe mantenerse con su anclaje correcto en el texto español.'
  issues:
  - severity: high
    issue: Cambio indebido de plural a singular en «tu yugo»
    rationale: 'עֻלְּכֶם lleva sufijo 2mp. El discurso va dirigido al pueblo/grupo, por lo que el español debe reflejar plural: «su yugo» o «el yugo de ustedes/vuestro yugo», no «tu yugo».'
  - severity: medium
    issue: «añadiré a él» es un calco poco idiomático
    rationale: Aunque intenta seguir אֹסִיף עָלָיו, en español natural conviene «le añadiré más» o «le añadiré a este». Esto preserva la referencia al yugo sin forzar la sintaxis.
  - severity: low
    issue: Falta anclaje de la nota al término relevante
    rationale: La nota sobre el sentido posible de «escorpiones» debe anclarse en «escorpiones[a]» en el texto, no en «jóvenes[a]», porque explica בָּעֲקְרַבִּים, no הַיְלָדִים.
  - severity: low
    issue: Pronombre explícito inicial innecesario
    rationale: «Él les habló» no es incorrecto, pero «Les habló» suena más natural y fluido en español narrativo bíblico cuando el sujeto ya está claro por contexto.
  revised_spanish_text: 'Les habló conforme al consejo de los jóvenes, diciendo: «Haré más pesado su yugo, y le añadiré más. Mi padre los disciplinó con látigos, pero yo con escorpiones[a]».'
  revised_footnotes:
  - marker: a
    text: Posiblemente, «con látigos de escorpiones», es decir, látigos provistos de puntas agudas o barbas; el hebreo dice literalmente «con escorpiones».
    reason: lexical_alternative
  revision_rationale: Se corrige la segunda persona plural del hebreo con «su yugo», se reemplaza el calco poco natural «añadiré a él» por «le añadiré más», y se mueve la nota al término «escorpiones», que es la palabra que la nota explica. También se elimina el «Él» inicial por fluidez sin pérdida de sentido.
