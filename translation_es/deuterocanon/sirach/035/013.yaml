translation:
  language: es
  text: Da testimonio de tus obras anteriores[a], y establece la visión prontamente en tu nombre.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'El hebreo de esta línea es difícil, especialmente la frase traducida aquí como ''prontamente''. El paralelo griego dice en cambio: ''Y además de estas cosas, bendice al que te hizo y al que te colma de sus bienes.'''
    reason: alternative_reading
lexical_decisions:
- source_word: תן עדות
  english_pob_choice: Bear witness
  chosen_spanish: Da testimonio
  alternatives_spanish:
  - Testifica
  - Da testimonio como testigo
  lexicon: HALOT
  rationale: La forma imperativa expresa una acción testimonial/jurídica. En español, 'da testimonio' conserva ese valor con naturalidad y evita una construcción demasiado literal o pesada.
- source_word: למראש
  english_pob_choice: to your former
  chosen_spanish: de tus obras de antes
  alternatives_spanish:
  - de tus obras primeras
  - de lo que fue antes
  - de tus obras antiguas
  lexicon: HALOT
  rationale: El hebreo es difícil, pero en contexto con 'obras' la idea apunta a lo previo o anterior. 'De antes' mantiene la referencia temporal sin fijar más de lo que permite el texto.
- source_word: מעשיך
  english_pob_choice: deeds
  chosen_spanish: obras
  alternatives_spanish:
  - hechos
  - acciones
  - deeds
  lexicon: HALOT
  rationale: '''Obras'' es un equivalente natural y bíblico en español para acciones humanas evaluables moralmente, sin desplazar el sentido de conducta/obra.'
- source_word: והקם
  english_pob_choice: and establish
  chosen_spanish: y establece
  alternatives_spanish:
  - y confirma
  - y levanta
  - y haz firme
  lexicon: HALOT
  rationale: La idea causativa de קום aquí puede expresarse con 'establece', que funciona bien con 'visión' y conserva el matiz de fijar o hacer firme.
- source_word: חזון
  english_pob_choice: vision
  chosen_spanish: la visión
  alternatives_spanish:
  - la revelación
  - el oráculo
  lexicon: HALOT
  rationale: '''Visión'' es la traducción más directa y conserva la imagen profética sin interpretar de antemano el contenido.'
- source_word: דברק
  english_pob_choice: swiftly
  chosen_spanish: prontamente
  alternatives_spanish:
  - rápidamente
  - de forma repentina
  - como relámpago
  lexicon: HALOT
  rationale: El hebreo es textualmente oscuro. Dado el contexto y la incertidumbre reconocida en la auditoría, 'prontamente' ofrece una solución sobria en español sin fingir certeza sobre el valor exacto del término.
- source_word: בשמך
  english_pob_choice: in your name
  chosen_spanish: en tu nombre
  alternatives_spanish:
  - por tu nombre
  - a tu nombre
  lexicon: HALOT
  rationale: '''En tu nombre'' es la correspondencia normal y clara del hebreo con ב + ''nombre'', y preserva la formulación cercana al texto.'
theological_decisions:
- issue: Texto hebreo oscuro frente al paralelo griego sustancialmente distinto
  english_pob_reading: Translate the extant Hebrew line as the primary text while acknowledging that the Greek parallel reflects a substantially different wording.
  chosen_spanish_reading: Traducir la línea hebrea conservada como texto principal, sin ocultar que el paralelo griego ofrece una redacción muy distinta.
  alternative_spanish_readings:
  - Bendice al que te hizo y te colma de sus bienes.
  - Y, además de esto, bendice al que te formó y te sacia con sus bienes.
  rationale: La política del proyecto da primacía al testimonio hebreo donde existe. Como aquí el hebreo es oscuro y el griego presenta un sentido diferente y más claro, la traducción principal sigue el hebreo con cautela, dejando constancia de la alternativa griega en nota para transparencia.
  doctrine_reference: 'PHILOSOPHY.md: translate from Hebrew where it survives; use Greek parallel as actual translation input'
translation_notes:
  revision_awareness: La revisión más reciente no introdujo cambios; sin embargo, el informe de control cruzado señaló asuntos mayores, por lo que se mantuvo una traducción prudente del hebreo con nota explícita sobre el paralelo griego divergente.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' como forma preferente del nombre divino solo cuando corresponda; este versículo no lo requiere.
  - '''Obras'' se usa para מעשיך porque encaja mejor con el registro sapiencial que ''hechos'' en esta línea.'
  - La solución 'prontamente' conserva la incertidumbre del hebreo oscuro sin convertirla en una conjetura demasiado fuerte.
