translation:
  language: es
  text: Después de hacer estas cosas[a], y de hacer una oración de súplica en común, rogaban al Señor misericordioso que se reconciliara plenamente con sus esclavos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «después de haber llevado a cabo estas cosas». El participio griego resume acciones concluidas; la traducción principal lo vuelve un español fluido sin precisar más de lo que el texto dice.
    reason: lexical_alternative
lexical_decisions:
- source_word: διαπραξάμενοι
  english_pob_choice: after doing these things
  chosen_spanish: después de hacer estas cosas
  alternatives_spanish:
  - después de llevar a cabo estas cosas
  - después de haber realizado estas cosas
  lexicon: LSJ
  rationale: El participio resume acciones ya cumplidas; «hacer estas cosas» conserva esa amplitud sin añadir matices de éxito que el griego no exige.
- source_word: κοινὴν
  english_pob_choice: common
  chosen_spanish: común
  alternatives_spanish:
  - hecha en común
  - compartida
  - conjunta
  lexicon: LSJ
  rationale: El adjetivo modifica la súplica como acto compartido; «común» reproduce directamente esa idea en español sin volverlo extraño.
- source_word: ἱκετίαν
  english_pob_choice: prayer of supplication
  chosen_spanish: súplica
  alternatives_spanish:
  - oración de súplica
  - ruego
  - entreaty
  lexicon: LSJ
  rationale: En español, «súplica» comunica con naturalidad la petición intensa y reverente; la idea de oración queda ya asegurada por el contexto dirigido al Señor.
- source_word: ἐλεήμονα
  english_pob_choice: merciful
  chosen_spanish: misericordioso
  alternatives_spanish:
  - misericorde
  - compasivo
  lexicon: LSJ
  rationale: «Misericordioso» es un equivalente claro y digno para la disposición de Dios aquí; mantiene el valor teológico sin arcaísmo innecesario.
- source_word: κύριον
  english_pob_choice: Lord
  chosen_spanish: Señor
  alternatives_spanish:
  - Dueño
  - Maestro
  lexicon: LSJ
  rationale: En esta oración funciona como título divino; «Señor» es la forma normal y reverente en español bíblico.
- source_word: ἠξίουν
  english_pob_choice: they begged
  chosen_spanish: rogaban
  alternatives_spanish:
  - pedían encarecidamente
  - suplicaban
  - imploraban
  lexicon: LSJ
  rationale: El imperfecto expresa una petición insistente y continuada; «rogaban» conserva la intensidad sin sonar demasiado forzado.
- source_word: εἰς τέλος
  english_pob_choice: fully
  chosen_spanish: plenamente
  alternatives_spanish:
  - completamente
  - hasta el fin
  - por completo
  lexicon: LSJ
  rationale: La expresión intensifica la reconciliación; «plenamente» comunica bien la idea de totalidad y evita una lectura meramente temporal.
- source_word: καταλλαγῆναι
  english_pob_choice: to be reconciled
  chosen_spanish: se reconciliara
  alternatives_spanish:
  - fuera reconciliado
  - se apaciguara
  - volviera a favor
  lexicon: LSJ
  rationale: El infinitivo pasivo apunta a restauración de relación/favor; el subjuntivo refleja la petición en español y conserva el sentido relacional sin tecnicismo ajeno.
- source_word: δούλοις
  english_pob_choice: slaves
  chosen_spanish: esclavos
  alternatives_spanish:
  - siervos
  - servidores
  lexicon: LSJ
  rationale: Se conserva la fuerza de δοῦλοις como vínculo de pertenencia y dependencia. «Esclavos» sigue la decisión léxica del POB en inglés y evita suavizar el término.
theological_decisions:
- issue: Renderización de δοῦλοις referido a Dios
  english_pob_reading: his slaves
  chosen_spanish_reading: sus esclavos
  alternative_spanish_readings:
  - sus siervos
  rationale: El griego usa el término de dependencia vinculada. Dado el contexto de plegaria a Dios, la traducción mantiene la fuerza de pertenencia y sumisión sin diluirla.
  doctrine_reference: 'DOCTRINE.md: δοῦλος = esclavo cuando el vínculo de dependencia es saliente.'
- issue: Fuerza de εἰς τέλος καταλλαγῆναι
  english_pob_reading: to be fully reconciled
  chosen_spanish_reading: que se reconciliara plenamente
  alternative_spanish_readings:
  - que se reconciliara por completo
  - que fuera reconciliado hasta el fin
  rationale: La frase intensifica la reconciliación como completa o total; «plenamente» preserva esa intensidad y la dimensión relacional.
  doctrine_reference: LSJ / uso contextual de εἰς τέλος con καταλλαγῆναι.
translation_notes:
  revision_awareness: 'El audito inglés pasó de ''together'' a ''common'' para κοινήν y restableció ''slaves'' tras un desvío a ''servants''. La versión española sigue esa lectura final: ''común'' para κοινήν y ''esclavos'' para δοῦλοις. También conserva la intensidad de εἰς τέλος con ''plenamente''.'
  spanish_consistency_notes:
  - Se mantiene «Señor» para κύριος en su uso divino, coherente con el resto del proyecto.
  - Se conserva «esclavos» para δοῦλοις cuando el vínculo de dependencia es teológicamente relevante.
  - La puntuación intenta reflejar la acumulación participial del griego sin sobrecargar la sintaxis española.
  - No se introduce «Cristo» ni otras equivalencias no presentes en el versículo.
