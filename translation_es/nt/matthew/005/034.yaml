translation:
  language: es
  text: 'Pero yo les digo[a]: no juren en absoluto; ni por el cielo, porque es el trono de Dios[b].'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «no hagan ningún juramento»'
    reason: lexical_alternative
  - marker: b
    text: Lit. «en el cielo»; aquí se expresa como fórmula de juramento, por eso se traduce «por el cielo».
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐγὼ δὲ λέγω ὑμῖν
  english_pob_choice: But I say to you
  chosen_spanish: Pero yo les digo
  alternatives_spanish:
  - Pero yo les digo a ustedes
  - Pero yo les afirmo
  lexicon: BDAG
  rationale: Conserva el contraste enfático introducido por δέ y reproduce la fórmula discursiva sin volverla arcaica. Se mantiene el pronombre explícito "yo" para reflejar el énfasis del griego.
- source_word: μὴ ὀμόσαι
  english_pob_choice: do not swear
  chosen_spanish: no juren
  alternatives_spanish:
  - no hagan juramento
  - no tomen juramento
  lexicon: BDAG
  rationale: ὀμνύω puede significar jurar o tomar juramento. En español, "juren" comunica de forma directa la prohibición y evita una paráfrasis más interpretativa.
- source_word: ὅλως
  english_pob_choice: at all
  chosen_spanish: en absoluto
  alternatives_spanish:
  - en ninguna manera
  - del todo
  lexicon: BDAG
  rationale: La partícula intensifica la prohibición. "En absoluto" expresa bien el alcance total en español moderno y suena natural en registro bíblico contemporáneo.
- source_word: μήτε
  english_pob_choice: neither
  chosen_spanish: ni
  alternatives_spanish:
  - ni siquiera
  lexicon: BDAG
  rationale: μήτε introduce una nueva prohibición en serie. En español, "ni" prepara la continuación con la siguiente fórmula de juramento de modo breve y natural.
- source_word: ἐν τῷ οὐρανῷ
  english_pob_choice: by heaven
  chosen_spanish: por el cielo
  alternatives_spanish:
  - en el cielo
  lexicon: BDAG
  rationale: 'Aunque el griego usa ἐν, el contexto de juramento exige expresar la fórmula en español como medio/invocación: "por el cielo". Así se conserva el sentido idiomático sin ocultar la construcción subyacente.'
- source_word: ὅτι θρόνος ἐστὶν τοῦ θεοῦ
  english_pob_choice: for it is the throne of God
  chosen_spanish: porque es el trono de Dios
  alternatives_spanish:
  - pues es el trono de Dios
  - ya que es el trono de Dios
  lexicon: BDAG
  rationale: ὅτι introduce la razón de la prohibición. "Porque" es claro y fiel en español. "Trono de Dios" mantiene la relación nominal del griego con naturalidad.
theological_decisions:
- issue: Alcance de la prohibición de jurar
  english_pob_reading: do not swear at all
  chosen_spanish_reading: no juren en absoluto
  alternative_spanish_readings:
  - no juren falsamente
  - no hagan juramentos ligeros
  rationale: Se conserva la amplitud de la prohibición tal como aparece en el griego y en la auditoría inglesa, sin limitarla a juramentos falsos o triviales. La restricción interpretativa pertenece a la exégesis, no a la traducción.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
- issue: Valor de la frase preposicional con el cielo
  english_pob_reading: neither by heaven
  chosen_spanish_reading: ni por el cielo
  alternative_spanish_readings:
  - ni en el cielo
  - ni invocando el cielo
  rationale: Se mantiene el sentido de fórmula de juramento. Traducir literalmente como "en el cielo" ocultaría el valor idiomático indicado por la auditoría inglesa; "por el cielo" hace explícita la función de invocación sin añadir doctrina.
  doctrine_reference: BDAG; English audit note on idiomatic oath formula
translation_notes:
  revision_awareness: La versión inglesa revisada cambió "because" por "for" para ὅτι; en español se optó por "porque", equivalente natural y formal en este contexto. También se mantuvo la lectura amplia de la prohibición y la glosa idiomática de ἐν τῷ οὐρανῷ como fórmula de juramento.
  spanish_consistency_notes:
  - Se usa "Dios" para θεοῦ, conforme al criterio POB.
  - Se usa "cielo" para οὐρανός en la frase idiomática del juramento, no "cielo" como localización literal, siguiendo la función contextual.
  - Se preserva "trono de Dios" sin invertir el orden al estilo posesivo para permanecer cercano al griego.
  - El tono es moderno y digno, sin recurrir a arcaísmos innecesarios.
