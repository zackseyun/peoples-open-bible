base_translation:
  language: en
  yaml_path: translation/ot/isaiah/053/007.yaml
  text: He was oppressed[a], and he was afflicted, yet he did not open his mouth; like a lamb led to the slaughter, and like a ewe silent before her shearers, so he did not open his mouth.
  footnotes:
