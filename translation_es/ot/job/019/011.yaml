translation:
  language: es
  text: Su ira se enciende contra mí[a], y me considera como uno de sus enemigos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Su ira fue encendida contra mí, y me tiene por uno de sus adversarios».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּחַר
  english_pob_choice: burns
  chosen_spanish: se enciende
  alternatives_spanish:
  - arde
  - se inflama
  - se enciende de ira
  lexicon: HALOT
  rationale: Con אַף, חרה expresa la imagen de una ira que se enciende o arde. «Se enciende» conserva la metáfora en español natural y digno, sin volverlo demasiado literal o arcaico.
- source_word: עָלַי
  english_pob_choice: against me
  chosen_spanish: contra mí
  alternatives_spanish:
  - sobre mí
  - hacia mí
  - atacándome
  lexicon: HALOT
  rationale: El valor adversativo de עַל con emociones hostiles se expresa bien con «contra mí», que mantiene la oposición personal sin añadir elementos ajenos al texto.
- source_word: אַפּוֹ
  english_pob_choice: his anger
  chosen_spanish: su ira
  alternatives_spanish:
  - su enojo
  - su furor
  - su nariz
  lexicon: HALOT
  rationale: אַף funciona aquí idiomáticamente como «ira»/«enojo»; «ira» es claro, sobrio y apropiado en registro bíblico en español. Se evita la literalidad de «nariz» porque el sentido figurado es el primario.
- source_word: וַיַּחְשְׁבֵנִי
  english_pob_choice: he counts me
  chosen_spanish: me cuenta
  alternatives_spanish:
  - me considera
  - me estima
  - me tiene por
  lexicon: HALOT
  rationale: חשב puede significar contar, considerar o reputar. «Me cuenta» sigue de cerca la decisión inglesa y conserva la idea forense/relacional de ser clasificado en una categoría.
- source_word: לוֹ
  english_pob_choice: as his
  chosen_spanish: entre sus
  alternatives_spanish:
  - como sus
  - por sus
  - en el grupo de sus
  lexicon: HALOT
  rationale: El pronombre dativo expresa relación con el punto de vista del sujeto. En español, «entre sus enemigos» transmite de forma natural la pertenencia de Job al grupo adversario desde la perspectiva del sujeto implícito.
- source_word: כְצָרָיו
  english_pob_choice: enemies
  chosen_spanish: enemigos
  alternatives_spanish:
  - adversarios
  - enemistades
  - oponentes
  lexicon: HALOT
  rationale: צָר denota enemigo o adversario; «enemigos» es la opción más clara y común en español, manteniendo el plural del hebreo y el tono de conflicto.
theological_decisions:
- issue: Referente del sujeto implícito y del posesivo de tercera persona
  english_pob_reading: The subject remains God, continuing Job's complaint that God is acting against him.
  chosen_spanish_reading: El sujeto sigue siendo Dios, manteniendo la queja de Job de que Dios actúa en su contra.
  alternative_spanish_readings:
  - Un agente hostil no especificado
  - La referencia queda deliberadamente ambigua
  rationale: En el contexto inmediato, Job 19:6-12 atribuye repetidamente estas acciones a Dios. La traducción debe conservar esa tensión teológica en vez de suavizarla o despersonalizarla.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: Se corrigió el problema de validación asegurando que el marcador [a] aparezca exactamente en el texto base. También se mantuvo el sentido del hebreo y del audit trail inglés, con una nota alternativa anclada al punto lexical principal.
  spanish_consistency_notes:
  - Se usó «ira» para אַף en lugar de «SEÑOR» u otra convención eclesiástica, conforme al nombre/atribución del sujeto en el contexto.
  - Se mantuvo el plural implícito del hebreo en «enemigos», coherente con el audit trail inglés y con el campo semántico de צָר.
  - La puntuación y el registro son publicados y reverentes, sin calco rígido del inglés.
