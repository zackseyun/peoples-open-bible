translation:
  language: es
  text: Su rostro, en efecto, estaba sudando, y respiraba con mucha dificultad[a], y era admirado incluso por los mismos que lo torturaban[b], a causa de su valentía.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «jadeaba fuertemente» para «respiraba con mucha dificultad».
    reason: lexical_alternative
  - marker: b
    text: La construcción griega subraya enfáticamente que eran los mismos torturadores quienes lo admiraban.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἱδρῶν
  english_pob_choice: was sweating
  chosen_spanish: estaba sudando
  alternatives_spanish:
  - sudaba
  - estaba empapado de sudor
  lexicon: LSJ
  rationale: El participio griego expresa una acción física en curso. «Estaba sudando» conserva el aspecto progresivo y suena natural en español.
- source_word: τὸ πρόσωπον
  english_pob_choice: his face
  chosen_spanish: su rostro
  alternatives_spanish:
  - su cara
  - el rostro
  lexicon: LSJ
  rationale: Aunque el griego dice literalmente «el rostro», el posesivo se sobreentiende por el contexto. «Su rostro» mantiene la referencia personal con un registro digno.
- source_word: ἐπασθμαίνων σφοδρῶς
  english_pob_choice: was breathing very hard
  chosen_spanish: respiraba con mucha dificultad
  alternatives_spanish:
  - jadeaba fuertemente
  - respiraba con gran esfuerzo
  - estaba jadeando
  lexicon: LSJ
  rationale: La combinación indica respiración agitada o jadeante. «Respiraba con mucha dificultad» conserva el sentido sin forzar un calco poco natural en español.
- source_word: ὑπʼ αὐτῶν τῶν βασανιζόντων
  english_pob_choice: even by those very men who were torturing him
  chosen_spanish: incluso por esos mismos que lo torturaban
  alternatives_spanish:
  - incluso por los mismos que lo torturaban
  - hasta por sus propios torturadores
  lexicon: LSJ
  rationale: El griego subraya con fuerza la identidad de los torturadores. «Esos mismos» conserva el énfasis sin perder fluidez, y evita suavizar la repetición enfática del original.
- source_word: ἐθαυμάζετο
  english_pob_choice: he was being admired
  chosen_spanish: era admirado
  alternatives_spanish:
  - era admirado con asombro
  - era objeto de admiración
  lexicon: LSJ
  rationale: El imperfecto pasivo sugiere una acción continua. «Era admirado» transmite bien la recepción positiva y mantiene la simplicidad del enunciado.
- source_word: ἐπὶ τῇ εὐψυχίᾳ
  english_pob_choice: because of his courage
  chosen_spanish: a causa de su valentía
  alternatives_spanish:
  - por su valentía
  - a causa de su coraje
  - por su valor
  lexicon: LSJ
  rationale: εὐψυχία denota valentía, ánimo firme o coraje en la prueba. «Valentía» es claro y digno en español; «a causa de» conserva la relación causal indicada por ἐπί con dativo.
- source_word: γέ τοι
  english_pob_choice: indeed
  chosen_spanish: en efecto
  alternatives_spanish:
  - de hecho
  - ciertamente
  - en verdad
  lexicon: LSJ
  rationale: La partícula añade énfasis confirmatorio. «En efecto» reproduce esa intensificación de manera natural en español.
theological_decisions:
- issue: Presentación del sufrimiento y la admiración de los torturadores
  english_pob_reading: The verse emphasizes that his endurance was striking enough to be admired even by the men torturing him.
  chosen_spanish_reading: El verso conserva que su resistencia era tan notable que incluso sus torturadores lo admiraban.
  alternative_spanish_readings:
  - su resistencia era admirada por sus torturadores
  - su sufrimiento producía admiración en quienes lo torturaban
  rationale: 'No hay una afirmación doctrinal directa, pero sí una tensión retórica importante: el contraste entre tortura y admiración. La traducción preserva ese choque sin suavizarlo ni moralizarlo.'
  doctrine_reference: Martirio y perseverancia bajo persecución; lectura literaria del testimonio del justo sufriente
translation_notes:
  revision_awareness: Se tomó en cuenta la revisión inglesa que añadió «those» antes de «very men» para reflejar mejor el énfasis de αὐτῶν τῶν βασανιζόντων. En español, ese énfasis quedó preservado con «esos mismos», sin necesidad de añadir una glosa más pesada en el cuerpo del texto.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» como norma general del proyecto, pero este versículo no contiene el tetragrámaton ni un equivalente contextual.
  - Se eligió «valentía» para εὐψυχία, conservando el valor de ánimo firme sin introducir terminología eclesiástica posterior.
  - Se prefirió una sintaxis directa y sobria, acorde con el tono narrativo y martirial del contexto.
  - Los marcadores de nota a y b aparecen en el texto exactamente donde corresponde; no se emplearon otros marcadores.
