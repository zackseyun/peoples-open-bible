translation:
  language: es
  text: Por lo tanto[a], en todo tiempo, continuamente nos acordamos de ustedes en las fiestas y en los otros días señalados, al ofrecer sacrificios y en nuestras oraciones, como es justo y conveniente acordarse de los hermanos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «los otros días apropiados», «los otros días debidos» o «los otros días prescritos». El adjetivo griego καθηκούσαις puede expresar días que son apropiados, acostumbrados o establecidos para la observancia.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀδιαλείπτως
  english_pob_choice: continually
  chosen_spanish: continuamente
  alternatives_spanish:
  - sin cesar
  - de manera continua
  lexicon: BDAG
  rationale: '''Continuamente'' preserva la idea de repetición persistente sin sonar tan rígido como ''sin cesar''. Encaja naturalmente junto con ''en todo tiempo'' y conserva el énfasis del griego.'
- source_word: ἑορταῖς
  english_pob_choice: festivals
  chosen_spanish: fiestas
  alternatives_spanish:
  - festivales
  - festejos
  lexicon: LSJ
  rationale: En español, 'fiestas' comunica bien las celebraciones religiosas o cultuales del contexto y es más natural que 'festivales' en una frase bíblica. Mantiene el matiz de ocasión celebrativa.
- source_word: λοιπαῖς καθηκούσαις ἡμέραις
  english_pob_choice: the other appointed days
  chosen_spanish: los otros días señalados
  alternatives_spanish:
  - los otros días apropiados
  - los otros días prescritos
  - los demás días convenientes
  lexicon: LSJ
  rationale: καθηκούσαις puede significar 'convenientes', 'debidos' o 'apuntados/establecidos'. 'Señalados' conserva la idea de días determinados para observancia sin decidir demasiado entre 'fitting' y 'appointed'.
- source_word: μιμνησκόμεθα ὑμῶν
  english_pob_choice: we remember you
  chosen_spanish: nos acordamos de ustedes
  alternatives_spanish:
  - los recordamos
  - hacemos memoria de ustedes
  - nos mantenemos recordando a ustedes
  lexicon: BDAG
  rationale: '''Nos acordamos de ustedes'' expresa el acto relacional de recuerdo de forma natural en español. Evita una construcción demasiado literal que sonaría forzada, y conserva el objeto personal directo del contexto diplomático.'
- source_word: ἐφʼ ὧν
  english_pob_choice: when
  chosen_spanish: cuando
  alternatives_spanish:
  - en las cuales
  - en las ocasiones en que
  - durante las cuales
  lexicon: LSJ
  rationale: El valor temporal idiomático está bien captado por 'cuando' en español. Mantiene la conexión entre el recuerdo y los momentos de sacrificios y oración.
- source_word: προσφέρομεν θυσιῶν
  english_pob_choice: we offer sacrifices
  chosen_spanish: ofrecemos sacrificios
  alternatives_spanish:
  - presentamos sacrificios
  - ofrecemos ofrendas sacrificiales
  lexicon: BDAG
  rationale: '''Ofrecemos sacrificios'' traduce con claridad el lenguaje cultual específico del griego sin generalizarlo a ''adoración'' o ''ofrendas'' de forma imprecisa.'
- source_word: προσευχαῖς
  english_pob_choice: our prayers
  chosen_spanish: nuestras oraciones
  alternatives_spanish:
  - las oraciones
  - en la oración
  lexicon: BDAG
  rationale: El plural 'nuestras oraciones' refleja el plural griego y el sujeto comunitario implícito en la primera persona plural. 'Oraciones' es más natural que 'prácticas de oración' y conserva el acto cultual paralelo a los sacrificios.
- source_word: ὡς δέον ἐστὶν καὶ πρέπον
  english_pob_choice: as it is right and fitting
  chosen_spanish: como es justo y conveniente
  alternatives_spanish:
  - como es debido y apropiado
  - como es necesario y correcto
  - como corresponde y es conveniente
  lexicon: LSJ
  rationale: '''Justo y conveniente'' preserva el doble matiz ético y de conveniencia/propriedad del griego. ''Conveniente'' captura πρέπον sin caer en un registro demasiado técnico o eclesiástico.'
- source_word: ἀδελφῶν
  english_pob_choice: brothers
  chosen_spanish: de los hermanos
  alternatives_spanish:
  - de los hermanos y hermanas
  - de nuestros hermanos
  - de los parientes
  lexicon: BDAG
  rationale: Se conserva 'hermanos' por fidelidad al masculino griego y a la política de precisión de género. En español, 'de los hermanos' suena natural en un contexto de alianza y fraternidad.
theological_decisions:
- issue: Lenguaje de fraternidad masculina ἀδελφῶν
  english_pob_reading: brothers
  chosen_spanish_reading: los hermanos
  alternative_spanish_readings:
  - los hermanos y hermanas
  - la familia
  - los parientes
  rationale: El griego usa la forma masculina plural sin marca inclusiva explícita. Mantener 'los hermanos' preserva la fuerza diplomática y familiar del texto sin neutralizarlo.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4
- issue: Lenguaje cultual de sacrificios y oraciones
  english_pob_reading: retain explicit sacrificial wording
  chosen_spanish_reading: mantener 'sacrificios' y 'oraciones' de forma explícita
  alternative_spanish_readings:
  - generalizar a 'adoración'
  - usar solo 'ofrendas'
  - parafrasear como 'acto de culto'
  rationale: El texto griego menciona explícitamente sacrificios y oraciones; ampliar a un término general como 'adoración' ocultaría la concreción del marco templo-cultual. La traducción conserva esa tensión sin suavizarla.
  doctrine_reference: DOCTRINE.md §Translation philosophy 1, 5
- issue: Valor de καθηκούσαις ἡμέραις
  english_pob_reading: the other appointed days
  chosen_spanish_reading: los otros días señalados
  alternative_spanish_readings:
  - los otros días apropiados
  - los otros días prescritos
  - los demás días convenientes
  rationale: El griego admite tanto 'debidos/convenientes' como 'establecidos/señalados'. 'Señalados' deja abierta la doble posibilidad y evita imponer una sola interpretación donde el texto permite una ambigüedad real.
  doctrine_reference: DOCTRINE.md §Translation philosophy 1
translation_notes:
  revision_awareness: La redacción sigue de cerca el griego y la auditoría inglesa revisada, especialmente en el valor temporal de ἐν ταῖς ἑορταῖς ('en las fiestas') y en la preservación del lenguaje cultual explícito. Se optó por 'fiestas' y 'días señalados' como equivalentes idiomáticos en español, manteniendo la alternancia entre recuerdo continuo, celebración y oración.
  spanish_consistency_notes:
  - Se usa 'Yahvé' solo cuando aparezca el nombre divino; este versículo no lo contiene.
  - '''Mesías'' no aplica aquí; no se introduce ''Cristo''.'
  - Se mantiene el plural comunitario 'nuestras oraciones' para reflejar la primera persona plural del griego.
  - '''Hermanos'' se conserva como término de fraternidad diplomática y no se neutraliza.'
