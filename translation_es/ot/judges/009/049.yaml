revisions:
- from: Así que todo el pueblo también cortó una rama cada uno[a], y fueron tras Abimélec, y las pusieron contra la cámara interior, y prendieron fuego a la cámara interior sobre ellos; así murieron también todos los habitantes de la torre de Siquem, como mil hombres y mujeres.
  to: Así que todo el pueblo también cortó[b] una rama cada uno[a], y fueron tras Abimélec, y las amontonaron contra la cámara interior, y prendieron fuego a la cámara interior sobre ellos; así murieron también todos los habitantes de la torre de Siquem, unos mil hombres y mujeres.
  rationale: Se corrige la concordancia verbal para reflejar fielmente el plural hebreo y la sintaxis española natural; se refuerza el matiz contextual de acumulación de ramas con 'amontonaron'; y se reemplaza 'como mil' por 'unos mil' para una aproximación más idiomática. Se conserva 'cámara interior' y 'sobre ellos' por fidelidad al rastro léxico documentado.
