translation:
  language: es
  text: 'Por tanto, así dice Yahvé: Pregunten ahora entre las naciones: ¿quién ha oído cosas como estas?[a] Virgen Israel ha cometido algo muy horrible.[b]'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «¿quién ha oído tales cosas?»'
    reason: lexical_alternative
  - marker: b
    text: 'O: «Virgen Israel ha cometido una cosa espantosa» o «un hecho atroz».'
    reason: lexical_alternative
lexical_decisions:
- source_word: לָכֵן
  english_pob_choice: Therefore
  chosen_spanish: Por tanto
  alternatives_spanish:
  - Por eso
  - Así que
  lexicon: HALOT
  rationale: Conjunción inferencial que introduce la conclusión divina; «Por tanto» conserva el valor conclusivo con registro formal y natural en español.
- source_word: כֹּה אָמַר יְהוָה
  english_pob_choice: thus says Yahweh
  chosen_spanish: así dice Yahvé
  alternatives_spanish:
  - esto dice Yahvé
  - así ha dicho Yahvé
  lexicon: HALOT
  rationale: Se mantiene la fórmula profética convencional sin mascar el nombre divino; «Yahvé» sigue la terminología del proyecto para יְהוָה.
- source_word: שַׁאֲלוּ נָא בַּגּוֹיִם
  english_pob_choice: Ask now among the nations
  chosen_spanish: Pregunten ahora entre las naciones
  alternatives_spanish:
  - Inquieran ahora entre las naciones
  - Pregunten, por favor, entre las naciones
  lexicon: HALOT
  rationale: El plural imperativo se refleja con «Pregunten»; «ahora» comunica la urgencia/discurso de נָא sin introducir un calco innecesario de cortesía.
- source_word: מִי שָׁמַע כָּאֵלֶּה
  english_pob_choice: who has heard such things?
  chosen_spanish: ¿quién ha oído cosas como estas?
  alternatives_spanish:
  - ¿quién ha oído tales cosas?
  - ¿quién ha oído semejantes cosas?
  lexicon: HALOT
  rationale: La pregunta retórica expresa lo inaudito del hecho. «Cosas como estas» preserva el comparativo de כָאֵלֶּה con español natural.
- source_word: שַׁעֲרֻרִת
  english_pob_choice: a very horrible thing
  chosen_spanish: una cosa muy horrible
  alternatives_spanish:
  - una cosa espantosa
  - un hecho atroz
  lexicon: HALOT
  rationale: Se conserva el sustantivo de acción con valor de escándalo/horrores; «muy horrible» refleja el intensificador מְאֹד sin suavizar la carga semántica.
- source_word: עָשְׂתָה מְאֹד
  english_pob_choice: has done a very horrible thing
  chosen_spanish: ha cometido una cosa muy horrible
  alternatives_spanish:
  - ha hecho una cosa muy horrible
  - ha perpetrado una cosa muy horrible
  lexicon: HALOT
  rationale: «Ha cometido» transmite mejor en español la gravedad del acto que un simple «ha hecho», manteniendo el perfecto y la intensificación ligada al sustantivo.
- source_word: בְּתוּלַת יִשְׂרָאֵל
  english_pob_choice: Virgin Israel
  chosen_spanish: La virgen Israel
  alternatives_spanish:
  - Virgen Israel
  - la virgen, Israel
  lexicon: HALOT
  rationale: Se conserva la personificación profética. El artículo en español puede facilitar la lectura pública; no se añade «hija» porque no está en el hebreo.
theological_decisions:
- issue: Renderización del Nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - Jehová
  rationale: El texto hebreo contiene el Tetragrámaton directamente; por la norma del proyecto, se traduce con el nombre divino explícito en español.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Personificación de Israel como virgen
  english_pob_reading: Virgin Israel
  chosen_spanish_reading: La virgen Israel
  alternative_spanish_readings:
  - Virgen Israel
  - la virgen, Israel
  rationale: El hebreo presenta a Israel como personificación femenina nacional. En español se mantiene la figura retórica sin convertirla en una glosa explicativa.
  doctrine_reference: Profecía poética y personificación nacional en los profetas
translation_notes:
  revision_awareness: 'Se tuvo en cuenta la revisión del inglés POB que prefirió una formulación más natural para כָאֵלֶּה (“such things”). En español se adoptó una solución igualmente idiomática: «cosas como estas», sin perder el matiz comparativo ni la fuerza retórica. También se conservó el nombre divino como Yahvé, conforme al criterio del proyecto y frente a la máscara tradicional.'
  spanish_consistency_notes:
  - Se mantiene el registro profético formal y directo.
  - «Yahvé» se usa de forma consistente para יְהוָה.
  - «virgen» conserva la personificación nacional sin añadir elementos ausentes del hebreo.
  - La estructura interrogativa retórica sigue de cerca el hebreo y el audit trail inglés.
