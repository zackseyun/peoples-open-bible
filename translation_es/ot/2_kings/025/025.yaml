  text: וַ/יְהִ֣י בַּ/חֹ֣דֶשׁ הַ/שְּׁבִיעִ֗י בָּ֣א יִשְׁמָעֵ֣אל בֶּן נְ֠תַנְיָה בֶּן אֱלִ֨ישָׁמָ֜ע מִ/זֶּ֣רַע הַ/מְּלוּכָ֗ה וַ/עֲשָׂרָ֤ה אֲנָשִׁים֙ אִתּ֔/וֹ וַ/יַּכּ֥וּ אֶת גְּדַלְיָ֖הוּ וַ/יָּמֹ֑ת וְ/אֶת הַ/יְּהוּדִים֙ וְ/אֶת הַ/כַּשְׂדִּ֔ים אֲשֶׁר הָי֥וּ אִתּ֖/וֹ בַּ/מִּצְפָּֽה׀־־־־־־׃
base_translation:
  language: en
  yaml_path: translation/ot/2_kings/025/025.yaml
  text: And it happened in the seventh month that Ishmael son of Nethaniah[a], son of Elishama, of the royal seed, came with ten men, and they struck down Gedaliah so that he died[b], and also the Judeans and the Chaldeans who were with him at Mizpah.
  footnotes:
  - marker: a
    text: Or "of royal descent." The Hebrew literally says "of the royal seed," indicating Ishmael's lineage from the royal house.
    reason: lexical_alternative
  - marker: b
    text: '"Chaldeans" can also be rendered "Babylonians" in context.'
    reason: lexical_alternative
