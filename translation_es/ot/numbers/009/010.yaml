base_translation:
  language: en
  yaml_path: translation/ot/numbers/009/010.yaml
  text: Speak to the sons of Israel[a], saying, ‘If any man is unclean because of a dead body, or is on a distant journey, whether among you or throughout your generations[c][b], he shall keep the Passover to Yahweh.
  footnotes:
  - marker: a
    text: Hebrew 'sons of Israel'; the phrase refers to the Israelite community as a whole.
    reason: lexical_alternative
  - marker: b
    text: Or 'unclean because of a corpse.' The Hebrew idiom literally says 'unclean for a person/soul' and in this legal context refers to corpse impurity.
    reason: lexical_alternative
  - marker: c
    text: Or 'throughout your generations.'
    reason: lexical_alternative
