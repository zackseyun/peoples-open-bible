translation:
  language: es
  text: Sin embargo, por causa de David, Yahvé su Dios le dio una lámpara[a] en Jerusalén, levantando a su hijo tras él y estableciendo Jerusalén.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'luz'; la expresión 'le dio una lámpara en Jerusalén' es una metáfora de la preservación de la línea real de David allí.
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי / כִּי־
  english_pob_choice: Nevertheless
  chosen_spanish: Sin embargo
  alternatives_spanish:
  - Porque
  - Pues
  - De hecho
  lexicon: HALOT
  rationale: En este contexto la cláusula explica por qué el rey no fue destruido por completo pese a su pecado; en español, un conector adversativo-concesivo comunica mejor la relación discursiva que un causal simple.
- source_word: לְמַעַן דָּוִד
  english_pob_choice: for David’s sake
  chosen_spanish: por amor de David
  alternatives_spanish:
  - a causa de David
  - por David
  - en favor de David
  lexicon: HALOT
  rationale: La expresión señala acción realizada por causa de David, con fuerza de favor/covenant. 'Por amor de David' es natural en español bíblico y conserva la motivación relacional sin volverla mecánica.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - SEÑOR
  - el Señor
  lexicon: HALOT
  rationale: Se conserva el nombre divino revelado, conforme al criterio del proyecto, en lugar de sustituirlo por un título.
- source_word: אֱלֹהָיו
  english_pob_choice: his God
  chosen_spanish: su Dios
  alternatives_spanish:
  - Dios de él
  - su Dios
  lexicon: HALOT
  rationale: El posesivo español mantiene la relación pronominal sin sobreespecificar el referente en el cuerpo del texto; el contexto inmediato permite entender que se trata del rey mencionado.
- source_word: נִיר
  english_pob_choice: lamp
  chosen_spanish: lámpara
  alternatives_spanish:
  - luz
  - antorcha
  - dinastía
  lexicon: HALOT
  rationale: El sustantivo denota literalmente una lámpara/luz, y el uso metafórico apunta a la continuidad de la línea real davídica. Se conserva la imagen concreta en el texto principal, tal como hace el POB en inglés.
- source_word: בִּירוּשָׁלָם
  english_pob_choice: in Jerusalem
  chosen_spanish: en Jerusalén
  alternatives_spanish:
  - en la ciudad de Jerusalén
  lexicon: HALOT
  rationale: La preposición locativa se traduce de forma directa y natural.
- source_word: לְהָקִים
  english_pob_choice: to raise up
  chosen_spanish: levantando
  alternatives_spanish:
  - para levantar
  - para suscitar
  - levantando
  lexicon: HALOT
  rationale: El hiphil de קום aquí expresa hacer surgir o levantar a un sucesor. En español, el gerundio participa mejor del paralelismo con la segunda frase verbal y conserva el sentido dinástico.
- source_word: אֶת בְּנוֹ אַחֲרָיו
  english_pob_choice: his son after him
  chosen_spanish: a su hijo después de él
  alternatives_spanish:
  - a su hijo para sucederle
  - a su hijo tras él
  lexicon: HALOT
  rationale: La construcción marca sucesión. 'Después de él' mantiene la relación temporal y sucesoria de manera transparente; en nota podría entenderse como 'para sucederle', pero el texto principal sigue más de cerca el hebreo.
- source_word: וּלְהַעֲמִיד
  english_pob_choice: to establish
  chosen_spanish: y estableciendo
  alternatives_spanish:
  - y para establecer
  - y sosteniendo
  - y afianzando
  lexicon: HALOT
  rationale: El hiphil de עמד puede significar hacer permanecer o establecer. 'Estableciendo' conserva el valor de mantenimiento/afirmación del orden davídico en Jerusalén.
- source_word: אֶת יְרוּשָׁלָם
  english_pob_choice: Jerusalem
  chosen_spanish: Jerusalén
  alternatives_spanish:
  - la ciudad de Jerusalén
  lexicon: HALOT
  rationale: Se conserva el topónimo como objeto directo, en paralelo con la formulación inglesa y con el peso metonímico de la ciudad como centro del reino.
theological_decisions:
- issue: Sentido metafórico de נִיר en el marco del pacto davídico
  english_pob_reading: Retain the metaphor 'lamp' in the main text
  chosen_spanish_reading: Retener la metáfora de 'lámpara' en el texto principal
  alternative_spanish_readings:
  - dinastía
  - luz
  - linaje
  rationale: La imagen concreta mantiene la resonancia intertextual del hebreo y evita aplanar el tropo a una explicación abstracta; la nota puede aclarar el sentido dinástico sin perder el símbolo.
  doctrine_reference: Translation philosophy §§1, 3, 5
- issue: Referente de 'su Dios'
  english_pob_reading: Take the pronoun as referring to Abijam/the king in context
  chosen_spanish_reading: Tomar el posesivo como referido al rey en contexto
  alternative_spanish_readings:
  - su Dios de David
  - el Dios de él
  rationale: El antecedente más cercano es el rey de la narración inmediata. Traducir 'su Dios' conserva la ambigüedad controlada del hebreo sin imponer una especificación no escrita en el versículo.
  doctrine_reference: Translation philosophy §§1, 2
translation_notes:
  revision_awareness: La redacción sigue de cerca el estado revisado del inglés POB, que prefirió 'raising up... and establishing...' por un gerundio más natural. En español se mantuvo ese flujo participial con 'levantando... y estableciendo...', respetando la imagen de la 'lámpara' y la motivación 'por amor de David'.
  spanish_consistency_notes:
  - Se usa 'Yahvé' como forma consistente para el nombre divino.
  - Se conserva 'lámpara' en el texto principal y se aclara su valor metafórico en nota.
  - Se evita traducir 'luz' en el cuerpo para no perder la metáfora concreta documentada por el POB inglés.
  - '''Su Dios'' deja la referencia pronominal contextual, sin explicitar innecesariamente el antecedente.'
  - La secuencia verbal en gerundio preserva la cadencia de las infinitivas hebreas sin forzar un infinitivo español menos natural.
