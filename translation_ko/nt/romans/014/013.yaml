  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: Μηκέτι οὖν ἀλλήλους κρίνωμεν· ἀλλὰ τοῦτο κρίνατε μᾶλλον, τὸ μὴ τιθέναι πρόσκομμα τῷ ἀδελφῷ ἢ σκάνδαλον.
base_translation:
  language: en
  yaml_path: translation/nt/romans/014/013.yaml
  text: 'Therefore, let us no longer judge one another, but rather decide this: not to put a stumbling block or an offense before a brother.'
translation:
  language: ko
  text: '그러므로 우리가 더 이상 서로를 판단하지 맙시다. 도리어 이것을 결단하십시오. 곧 형제 앞에 걸림돌[a]이나 거치는 것을 두지 않는 것입니다.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 또는 「장애물」. 헬라어 πρόσκομμα와 σκάνδαλον은 「발에 걸리는 것」과 「덫·올무」를 가리키는 두 어휘로, 신앙적 넘어짐을 일으키는 요소를 가리킨다.
    reason: lexical_alternative
lexical_decisions:
- source_word: Μηκέτι κρίνωμεν
  english_pob_choice: let us no longer judge
  chosen_korean: 더 이상 판단하지 맙시다
  lexicon: BDAG
  rationale: 권유 부정사. 「판단」은 14:3·14:10과 일관.
- source_word: τοῦτο κρίνατε μᾶλλον
  english_pob_choice: rather decide this
  chosen_korean: 도리어 이것을 결단하다
  alternatives_korean:
  - 도리어 이것을 결정하다
  - 차라리 이것을 판단하다
  lexicon: BDAG
  rationale: κρίνω의 또 다른 의미(결정·결단)를 살려 동족 동사의 의미 전환을 보존한다.
- source_word: πρόσκομμα ... σκάνδαλον
  english_pob_choice: stumbling block ... offense
  chosen_korean: 걸림돌 ... 거치는 것
  alternatives_korean:
  - 장애물 ... 올무
  lexicon: BDAG
  rationale: 두 어휘의 형상(발에 걸림 / 덫에 걸림)을 한국어로 자연스럽게 분리하면서도 같은 의미군으로 묶는다.
- source_word: τῷ ἀδελφῷ
  english_pob_choice: a brother
  chosen_korean: 형제
  lexicon: BDAG
  rationale: 14:10과 어휘 일관.
