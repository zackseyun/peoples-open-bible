translation:
  language: es
  text: Su herencia no será hallada entre sus hijos[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Su herencia no será hallada para sus hijos»; es decir, no pasará a sus descendientes.'
