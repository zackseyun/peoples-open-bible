translation:
  language: es
  text: No se harán una calva en la cabeza, ni se rasurarán el borde[a] de la barba, ni se harán cortes en la carne.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «las esquinas de la barba». El término hebreo puede denotar borde, lado o esquina.
    reason: lexical_alternative
lexical_decisions:
- source_word: לֹא יקרחה קָרְחָה
  english_pob_choice: make a bald patch
  chosen_spanish: se harán una calva
  alternatives_spanish:
  - se harán un parche calvo
  - se raparán una zona calva
  - se harán calvos
  lexicon: HALOT
  rationale: La combinación verbo-sustantivo expresa una acción deliberada de producir una zona sin cabello, no una calvicie natural. «Se harán una calva» conserva esa fuerza concreta y suena natural en español bíblico actual.
- source_word: בְּרֹאשָׁם
  english_pob_choice: on their head
  chosen_spanish: en la cabeza
  alternatives_spanish:
  - sobre sus cabezas
  - en su cabeza
  lexicon: HALOT
  rationale: El hebreo usa singular con sufijo plural; en español, «en la cabeza» mantiene la forma distributiva y evita una rigidez innecesaria.
- source_word: וּפְאַת זְקָנָם
  english_pob_choice: the edge of their beard
  chosen_spanish: el borde de la barba
  alternatives_spanish:
  - las esquinas de su barba
  - el contorno de la barba
  - las puntas de la barba
  lexicon: HALOT
  rationale: פאה puede ser borde, lado o esquina. «Borde» comunica bien la idea sin fijar un patrón de arreglo más específico de lo que el término exige.
- source_word: יְגַלֵּחוּ
  english_pob_choice: shave off
  chosen_spanish: se rasurarán
  alternatives_spanish:
  - se afeitarán
  - se rasurarán por completo
  - se cortarán
  lexicon: HALOT
  rationale: El piel indica la acción de quitar el pelo. «Rasurarse» transmite claramente la remoción del vello en español contemporáneo.
- source_word: וּבִבְשָׂרָם
  english_pob_choice: in their flesh
  chosen_spanish: en la carne
  alternatives_spanish:
  - en su cuerpo
  - en su piel
  lexicon: HALOT
  rationale: «Carne» mantiene la concreción corporal del hebreo בשר y preserva el matiz físico de la prohibición.
- source_word: יִשְׂרְטוּ שָׂרָטֶת
  english_pob_choice: make cuts
  chosen_spanish: se harán cortes
  alternatives_spanish:
  - se lacerarán
  - se abrirán heridas
  - se harán incisiones
  lexicon: HALOT
  rationale: La combinación verbo-sustantivo denota cortes o incisiones rituales en el cuerpo. «Se harán cortes» es directo, claro y no añade detalles no presentes en el texto.
theological_decisions:
- issue: Alcance de la prohibición
  english_pob_reading: Translate the concrete body-modification prohibitions without importing an explicit explanatory phrase such as 'for the dead' from parallel passages.
  chosen_spanish_reading: Traducir las acciones prohibidas tal como aparecen aquí, sin añadir una explicación que este versículo no expresa.
  alternative_spanish_readings:
  - Aclarar en el texto principal que se trata de luto por los muertos
  - Parafrasear la prohibición como un rito funerario
  rationale: El versículo enumera actos prohibidos, pero no incluye la cláusula explicativa de pasajes paralelos. La traducción debe conservar esa restricción textual y dejar la relación intertextual para notas o estudio, no para el cuerpo principal.
  doctrine_reference: Translation philosophy §1, §3
translation_notes:
  revision_awareness: El borrador sigue el estado revisado final del inglés POB sin cambios posteriores relevantes; la traducción española mantiene el mismo perfil de equivalencia óptima y las mismas decisiones léxicas nucleares.
  spanish_consistency_notes:
  - Se mantiene «carne» para בשר, evitando «cuerpo» para conservar la concreción del hebreo.
  - Se usa «barba» en singular distributivo, coherente con el hebreo posesivo plural.
  - No se añade «por los muertos» en el texto principal, para no exceder el contenido explícito del versículo.
