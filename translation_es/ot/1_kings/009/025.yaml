translation:
  language: es
  text: Y Salomón ofreció holocaustos y ofrendas de paz sobre el altar que había edificado para Yahvé tres veces al año, y quemaba incienso con él[a] delante de Yahvé. Así completó la casa[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «hacía humear con él»; el verbo hebreo puede referirse más ampliamente a convertir una ofrenda en humo, no solo a quemar incienso.'
    reason: lexical_alternative
  - marker: b
    text: Hebreo «la casa», refiriéndose al templo.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהֶעֱלָה
  english_pob_choice: offered up
  chosen_spanish: ofrecía
  alternatives_spanish:
  - ofreció
  - presentaba
  lexicon: HALOT
  rationale: El hifil de עלה en contexto sacrificial puede expresar la acción de presentar una ofrenda. En español, «ofrecía» mantiene el valor cultual y la iteración contextual sin forzar un giro demasiado mecánico; además conserva la tensión de si el texto resume una práctica regular más que un acto puntual aislado.
- source_word: עֹלוֹת
  english_pob_choice: burnt offerings
  chosen_spanish: holocaustos
  alternatives_spanish:
  - ofrendas quemadas
  - ofrendas totalmente quemadas
  lexicon: HALOT
  rationale: «Holocaustos» es un equivalente cultual tradicional y preciso para sacrificios totalmente consumidos por el fuego. En español eclesial sigue siendo inteligible y refleja mejor el término técnico que una paráfrasis más larga.
- source_word: וּשְׁלָמִים
  english_pob_choice: peace offerings
  chosen_spanish: ofrendas de paz
  alternatives_spanish:
  - ofrendas de comunión
  - sacrificios de paz
  lexicon: HALOT
  rationale: «Ofrendas de paz» conserva la forma breve y reconocible del término, mientras que «ofrendas de comunión» explicita el matiz relacional pero interpreta más libremente. Se mantiene así la categoría sacrificial sin borrar su ambigüedad histórica.
- source_word: שָׁלֹשׁ פְּעָמִים בַּשָּׁנָה
  english_pob_choice: three times a year
  chosen_spanish: tres veces al año
  alternatives_spanish:
  - tres veces en el año
  lexicon: HALOT
  rationale: La expresión temporal idiomática se vierte de manera natural en español sin pérdida de sentido.
- source_word: וְהַקְטֵיר
  english_pob_choice: he burned incense
  chosen_spanish: hacía que se elevara el humo
  alternatives_spanish:
  - quemaba incienso
  - hacía humear
  lexicon: HALOT
  rationale: El hifil de קטר puede significar más ampliamente convertir una ofrenda en humo, no solo quemar incienso. Dado que el objeto directo no aparece expresado y el paralelo inglés preserva esa amplitud con una nota, la solución española evita restringirlo indebidamente a «incienso» y conserva la apertura semántica.
- source_word: אִתּוֹ
  english_pob_choice: with it
  chosen_spanish: con ello
  alternatives_spanish:
  - con él
  - junto a ello
  lexicon: HALOT
  rationale: El sufijo es sintácticamente difícil y puede referirse al altar o funcionar de manera más libre. «Con ello» mantiene la referencia sin decidir en exceso el antecedente, y en español resulta más natural que una forma estrictamente masculina o una adverbialización forzada.
- source_word: אֲשֶׁר לִפְנֵי יְהוָה
  english_pob_choice: before Yahweh
  chosen_spanish: delante de Yahvé
  alternatives_spanish:
  - ante Yahvé
  - en presencia de Yahvé
  lexicon: HALOT
  rationale: «Delante de Yahvé» reproduce la relación espacial-ritual del hebreo con claridad y evita sustituir el nombre divino por un título.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  lexicon: HALOT
  rationale: 'Se mantiene el nombre divino según el criterio del proyecto: transliteración del Tetragrámaton como «Yahvé».'
- source_word: וְשִׁלַּם אֶת הַבָּיִת
  english_pob_choice: Thus he completed the house
  chosen_spanish: Así terminó la casa
  alternatives_spanish:
  - Así completó la casa
  - Y terminó la casa
  lexicon: HALOT
  rationale: El piel de שלם expresa completar/terminar. «Terminó la casa» es breve, fiel y natural; «casa» se conserva como en el hebreo, aunque el contexto deja claro que se trata del templo.
theological_decisions:
- issue: Participación de Salomón en acciones sacrificiales e incienso
  english_pob_reading: The verse describes Solomon's regular participation in temple worship by offering sacrifices and burning incense in connection with the altar before the LORD, without implying that Solomon personally performed priestly acts contrary to priestly regulations.
  chosen_spanish_reading: El verso presenta a Salomón como sujeto de la acción cultual, pero sin resolver si ejerció personalmente el rito sacerdotal o si el texto resume su patrocinio/mandato real.
  alternative_spanish_readings:
  - Salomón realizó personalmente los ritos sacerdotales
  - Salomón solo ordenó a los sacerdotes que los realizaran
  rationale: La formulación española sigue la superficie del hebreo y conserva la tensión histórica y teológica señalada por el audit trail. No se introduce una aclaración doctrinal que cierre la ambigüedad del texto.
  doctrine_reference: Preservar la tensión interpretativa sin resolverla de forma especulativa.
translation_notes:
  revision_awareness: El texto base inglés fue revisado una vez para ajustar el cierre final de «So he completed the house» a «Thus he completed the house» por un registro ligeramente más formal. La versión española sigue esa misma línea formal y mantiene el cierre breve del resumen narrativo.
  spanish_consistency_notes:
  - Se usa «Yahvé» de manera consistente para el Tetragrámaton.
  - Se conserva «casa» en el cierre, siguiendo el hebreo y el audit trail inglés, aunque el contexto refiere al templo.
  - «Holocaustos» y «ofrendas de paz» mantienen el léxico cultual técnico del versículo.
  - La frase «hacía que se elevara el humo» busca preservar la amplitud de קטר sin restringirla a incienso.
