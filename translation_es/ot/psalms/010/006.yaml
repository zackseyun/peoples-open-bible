translation:
  language: es
  text: 'Dice en su corazón: «No seré sacudido[a]; de generación en generación no estaré en adversidad[b]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, más formalmente, «no seré movido»; el verbo hebreo puede significar ser sacudido, tambalear o ser movido.
    reason: lexical_alternative
  - marker: b
    text: 'La cláusula final es elíptica en hebreo y también puede traducirse: «por generaciones, uno que no está en adversidad», o «nunca me vendrá calamidad».'
    reason: alternative_reading
lexical_decisions:
- source_word: אָמַר
  english_pob_choice: He says
  chosen_spanish: Dice
  alternatives_spanish:
  - Dijo
  lexicon: HALOT
  rationale: El perfecto hebreo en poesía puede funcionar como presente dramático para introducir la voz interior. «Dice» conserva ese efecto vivo y natural en español.
- source_word: בְּלִבּוֹ
  english_pob_choice: in his heart
  chosen_spanish: en su corazón
  alternatives_spanish:
  - para sí
  - dentro de sí
  lexicon: HALOT
  rationale: Es un hebraísmo idiomático de pensamiento interior. «En su corazón» preserva la metáfora sin perder claridad.
- source_word: בַּל
  english_pob_choice: not
  chosen_spanish: 'No'
  alternatives_spanish:
  - nunca
  - ciertamente no
  lexicon: HALOT
  rationale: La partícula negativa poética se rinde de forma simple con «No», sin intensificar más de lo que exige el hebreo.
- source_word: אֶמּוֹט
  english_pob_choice: I will not be shaken
  chosen_spanish: seré sacudido
  alternatives_spanish:
  - seré movido
  - vacilaré
  lexicon: HALOT
  rationale: מוט en nifal expresa ser sacudido, movido o tambalear. «Ser sacudido» conserva la imagen de inestabilidad y suena natural en español.
- source_word: לְדֹר וָדֹר
  english_pob_choice: from generation to generation
  chosen_spanish: de generación en generación
  alternatives_spanish:
  - por generación tras generación
  - a lo largo de las generaciones
  lexicon: HALOT
  rationale: La fórmula expresa continuidad sucesiva. «De generación en generación» es la correspondencia idiomática más clara y fiel en español.
- source_word: אֲשֶׁר לֹא בְרָע
  english_pob_choice: I will not be in adversity
  chosen_spanish: no estaré en adversidad
  alternatives_spanish:
  - no estaré en aflicción
  - nunca me vendrá calamidad
  - sin adversidad
  lexicon: HALOT
  rationale: La cláusula final es elíptica y difícil; el contexto favorece mantener la primera persona del jactancioso. «Adversidad» conserva el registro formal y refleja el campo semántico de רָע sin banalizarlo.
theological_decisions:
- issue: Perspectiva del hablante en la cláusula final elíptica
  english_pob_reading: 'The final clause is rendered as the wicked person''s continued self-speech: ''I will not be in trouble.'''
  chosen_spanish_reading: 'La cláusula final se vierte como continuación de la autoafirmación del malvado: «no estaré en adversidad».'
  alternative_spanish_readings:
  - «quien no estará en adversidad»
  - «nunca me vendrá calamidad»
  - «por generaciones, uno que no está en adversidad»
  rationale: El versículo reproduce la jactancia interna del malvado. Mantener la primera persona en la cláusula final produce la lectura más coherente en español y respeta el carácter poético-elíptico del hebreo.
  doctrine_reference: 'Principio traductológico POB: preservar la lectura más coherente del discurso reportado, manteniendo alternativas en nota cuando la elipsis lo permite.'
translation_notes:
  revision_awareness: La base inglesa revisada pasó de 'through generation after generation' a 'from generation to generation' y de 'in trouble' a 'in adversity'. La versión española sigue esa revisión con la fórmula idiomática «de generación en generación» y con «adversidad» para reflejar el registro formal y el campo semántico de רָע.
  spanish_consistency_notes:
  - Se conserva «Yahvé» como norma del proyecto cuando aparezca el nombre divino; aquí no aparece.
  - Se mantiene el discurso en primera persona en la cláusula final, en línea con la lectura principal del audit trail inglés.
  - «Ser sacudido» evita el calcado rígido de «ser movido» y conserva la imagen de inestabilidad del verbo hebreo.
