review_pass:
  verdict: revise
  source_alignment_summary: El borrador conserva bien la estructura temporal, la personificación poética del día y la huida de las sombras, y maneja adecuadamente el dativo ético לִי mediante 'iré' con nota. Sin embargo, 'incienso' no preserva con suficiente precisión לבונה, que en la evidencia y la auditoría inglesa se documenta específicamente como 'frankincense'.
  spanish_quality_summary: El español es claro y poético. No obstante, la colocación de las notas en 'el día[b][a]' resulta torpe, porque la nota b corresponde a 'iré' y debe anclarse allí. Además, 'franquincienso' es más exacto que 'incienso' y sigue siendo comprensible en registro bíblico.
  glossary_alignment: 'No hay términos del glosario mayor en juego como Yahvé/Mesías. Sí aplica la decisión léxica documentada de לבונה: debe reflejar ''frankincense'' de manera específica; por eso conviene ''franquincienso'' en vez de ''incienso''. El tratamiento de לִי como dativo ético implícito en ''iré'' concuerda con la auditoría, pero la nota debe moverse al verbo.'
  issues:
  - severity: high
    issue: '''incienso'' traduce de forma demasiado general לבונה'
    rationale: La auditoría inglesa documenta explícitamente que לבונה significa 'frankincense', no incienso en general. 'Collado de incienso' pierde especificidad léxica del hebreo.
  - severity: medium
    issue: La nota [b] está anclada a 'el día' pero trata sobre 'iré'
    rationale: El marcador debe aparecer en la palabra o frase pertinente. Aquí la nota del dativo ético corresponde al verbo 'iré', no a 'día'.
  - severity: low
    issue: La nota a contiene opciones poco claras en español ('gire la brisa', 'gire la tarde')
    rationale: No reflejan bien las alternativas auditadas ('blows/grows cool') y suenan menos naturales que 'sople', 'respire' o 'se refresque'.
  revised_spanish_text: Hasta que el día[a] sople y las sombras huyan, iré[b] al monte de mirra y al collado de franquincienso.
  revised_footnotes:
