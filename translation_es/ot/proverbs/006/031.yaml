translation:
  language: es
  text: Sin embargo, si es hallado[a], deberá pagar siete veces; deberá entregar toda la riqueza de su casa.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «en séptuplo». La expresión hebrea también puede denotar restitución en una cantidad de siete veces.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְנִמְצָא
  english_pob_choice: Yet if he is found
  chosen_spanish: Sin embargo, si es hallado[a]
  alternatives_spanish:
  - Pero cuando es hallado
  - y, al ser hallado
  lexicon: HALOT / מצא
  rationale: El hebreo con וְ + nifal introduce un giro concesivo frente al versículo anterior. En español, «Sin embargo» conserva mejor el contraste discursivo que un simple «y». «Si es hallado» expresa la condición de ser descubierto de forma natural en castellano; la pasiva refleja evita añadir sujeto no presente en el hebreo.
- source_word: יְשַׁלֵּם
  english_pob_choice: he must repay
  chosen_spanish: deberá pagar
  alternatives_spanish:
  - tendrá que restituir
  - deberá restituir
  lexicon: HALOT / שלם
  rationale: El piel de שלם aquí comunica restitución u obligación de pago. «Deberá pagar» mantiene el valor obligatorio y suena claro en español jurídico-sapiencial. «Restituir» es posible, pero «pagar» reproduce mejor el acto concreto sin perder la idea de reparación.
- source_word: שִׁבְעָתָיִם
  english_pob_choice: sevenfold
  chosen_spanish: siete veces
  alternatives_spanish:
  - séptuplo
  - siete pliegos
  lexicon: HALOT
  rationale: La expresión adverbial puede significar «siete veces» o «en séptuplo». Siguiendo el auditable margen del POB inglés, se usa la forma más transparente y natural en español. Se conserva en nota la alternativa lexical.
- source_word: אֶת כָּל הוֹן בֵּיתוֹ
  english_pob_choice: all the wealth of his house
  chosen_spanish: toda la riqueza de su casa
  alternatives_spanish:
  - toda la hacienda de su casa
  - todos los bienes de su casa
  - toda la sustancia de su casa
  lexicon: HALOT / הון; בית
  rationale: «הוֹן» denota riqueza, bienes o caudal. «Riqueza» mantiene el alcance económico total sin sonar arcaico. «De su casa» conserva la relación posesiva/genitiva del hebreo y, en español, puede referirse al patrimonio del hogar o linaje; no se suaviza a una paráfrasis más abstracta.
- source_word: יִתֵּן
  english_pob_choice: he must give
  chosen_spanish: entregará
  alternatives_spanish:
  - deberá dar
  - tendrá que entregar
  lexicon: HALOT / נתן
  rationale: Aunque el hebreo dice literalmente «dará», en el contexto de restitución el sentido es el de entregar como pago. «Entregará» es idiomático y conserva el acto concreto de transferir todo el patrimonio. Se evita añadir una obligación explícita adicional, ya sugerida por el paralelismo con el verbo anterior.
translation_notes:
  revision_awareness: Se siguió el audit trail inglés con acuerdo alto y sin revisiones aplicadas; la redacción española mantiene el contraste discursivo, la obligación legal de la restitución y la ambigüedad legítima de שִׁבְעָתָיִם mediante nota.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» en general como norma del proyecto, pero este versículo no contiene el tetragrámaton.
  - Se evitó «SEÑOR» o formulación eclesiástica no presente en el hebreo.
  - Se conservó el tono sapiencial/legal breve y directo del proverbio.
  - La nota [a] se ancla solo en «si es hallado» para no duplicar marcadores.
