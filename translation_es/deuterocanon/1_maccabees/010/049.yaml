translation:
  language: es
  text: Y los dos reyes entablaron batalla, y el campamento[a] de Demetrio huyó, y Alejandro lo persiguió y prevaleció sobre ellos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'El griego dice literalmente: «el campamento de Demetrio huyó... Alejandro lo persiguió y prevaleció sobre ellos». El paso del singular («lo») al plural («ellos») probablemente refleja la persecución de Demetrio como comandante y la victoria sobre sus fuerzas.'
    reason: lexical_alternative
lexical_decisions:
- source_word: συνῆψαν πόλεμον
  english_pob_choice: joined battle
  chosen_spanish: entablaron batalla
  alternatives_spanish:
  - se unieron en batalla
  - libraron batalla
  - entraron en combate
  lexicon: LSJ
  rationale: La expresión griega es idiomática y militar; en español, «entablaron batalla» conserva la idea de iniciar el combate sin volverla más interpretativa que el original. Evita una calca como «unieron guerra», que sonaría ajena al castellano.
- source_word: οἱ δύο βασιλεῖς
  english_pob_choice: the two kings
  chosen_spanish: los dos reyes
  alternatives_spanish:
  - ambos reyes
  - los dos monarcas
  lexicon: LSJ
  rationale: Se mantiene el sujeto explícito y directo del griego. «Reyes» es el equivalente natural y fiel; no se introduce una perífrasis más solemne que no aporta precisión.
- source_word: ἡ παρεμβολὴ Δημητρίου
  english_pob_choice: Demetrius's camp
  chosen_spanish: el campamento de Demetrio
  alternatives_spanish:
  - el campamento de Demetrio
  - el ejército de Demetrio
  - la hueste de Demetrio
  lexicon: LSJ
  rationale: παρεμβολή designa un campamento o fuerza acampada. «Campamento» conserva mejor el valor léxico que «ejército», que interpreta metonímicamente. La preposición «de» expresa de modo natural la relación posesiva.
- source_word: ἔφυγεν
  english_pob_choice: fled
  chosen_spanish: huyó
  alternatives_spanish:
  - fue puesto en fuga
  - se retiró en fuga
  lexicon: LSJ
  rationale: «Huyó» reproduce de forma concisa el hecho de retirarse precipitadamente. «Fue puesto en fuga» sería más explícito pero añade pasividad que el verbo por sí solo no exige.
- source_word: ἐδίωξεν αὐτὸν
  english_pob_choice: pursued him
  chosen_spanish: lo persiguió
  alternatives_spanish:
  - lo siguió de cerca
  - lo fue persiguiendo
  lexicon: LSJ
  rationale: El verbo denota persecución militar. En español, «lo persiguió» es directo y fiel. Se prefiere el objeto neutro «lo» por concordancia con «Demetrio».
- source_word: ἴσχυσεν ἐπʼ αὐτούς
  english_pob_choice: prevailed over them
  chosen_spanish: prevaleció contra ellos
  alternatives_spanish:
  - se impuso sobre ellos
  - venció sobre ellos
  - ganó ventaja sobre ellos
  lexicon: LSJ
  rationale: La frase indica superioridad o victoria sobre los adversarios. «Prevaleció contra ellos» conserva la relación adversativa del griego y evita exagerar a una derrota total si el contexto no la explicita. «Sobre ellos» también sería posible, pero «contra ellos» suena más natural en español militar.
theological_decisions:
- issue: Cambio de número entre «lo» y «ellos» en la persecución y el triunfo
  english_pob_reading: The shift from singular ('him') to plural ('them') likely reflects pursuit of Demetrius as commander and victory over his forces.
  chosen_spanish_reading: Se mantiene el singular en la persecución de Demetrio como persona y el plural en la victoria sobre sus fuerzas.
  alternative_spanish_readings:
  - lo persiguió y prevaleció sobre él
  - los persiguió y prevaleció contra ellos
  rationale: 'El griego pasa del singular al plural, y la redacción española debe conservar esa tensión: Demetrio es perseguido como líder individual, mientras que la victoria recae sobre su campamento o fuerzas. Mantener ambos números evita borrar el matiz señalado en la nota inglesa.'
  doctrine_reference: No aplica; es una cuestión narrativa y de referencia pronominal.
translation_notes:
  revision_awareness: El control cruzado disponible indica alta concordancia con el texto fuente y solo problemas menores; no se requieren cambios sustanciales respecto al sentido del griego. La nota sobre el cambio de número del singular al plural se conserva para no suavizar una tensión sintáctica observada en el original y ya reflejada en el audit trail inglés.
  spanish_consistency_notes:
  - Se mantiene «Demetrio» y «Alejandro» como nombres propios sin transliteración adicional.
  - Se usa «campamento» para παρεμβολή en coherencia con el valor léxico documentado, no «ejército».
  - Se conserva el cambio de número pronominal del griego mediante «lo... ellos», con nota explicativa.
  - El registro es sobrio y bíblico sin recurrir a fórmulas eclesiásticas no motivadas por el original.
