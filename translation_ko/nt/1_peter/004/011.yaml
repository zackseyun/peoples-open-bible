id: 1PE.4.11
reference: 1 Peter 4:11
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: εἴ τις λαλεῖ, ὡς λόγια θεοῦ· εἴ τις διακονεῖ, ὡς ἐξ ἰσχύος ἧς χορηγεῖ ὁ θεός· ἵνα ἐν πᾶσιν δοξάζηται ὁ θεὸς διὰ Ἰησοῦ Χριστοῦ, ᾧ ἐστιν ἡ δόξα καὶ τὸ κράτος εἰς τοὺς αἰῶνας τῶν αἰώνων· ἀμήν.
base_translation:
  language: en
  yaml_path: translation/nt/1_peter/004/011.yaml
  text: 'If anyone speaks, let it be as the utterances of God; if anyone serves, let it be from the strength that God supplies, so that in everything God may be glorified through Jesus Messiah, to whom belong the glory and the dominion forever and ever. Amen.'
translation:
  language: ko
  text: '누가 말한다면 하나님의 말씀처럼 하고, 누가 섬긴다면 하나님이 공급하시는 힘으로 하는 것처럼 하십시오. 이는 모든 일에서 메시아 예수로 말미암아 하나님이 영광을 받으시게 하려는 것입니다. 그분께 영광과 권능이 영원무궁하기를 빕니다. 아멘.'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: λόγια θεοῦ
  english_pob_choice: the utterances of God
  chosen_korean: 하나님의 말씀
  alternatives_korean:
  - 하나님의 신탁
  - 하나님의 발언
  lexicon: BDAG
  rationale: λόγια는 「신적 발언·신탁」. 한국 성서 전통의 「말씀」으로 옮긴다 (롬 3:2와 동일 어휘).
- source_word: ἐξ ἰσχύος ἧς χορηγεῖ ὁ θεός
  english_pob_choice: from the strength that God supplies
  chosen_korean: 하나님이 공급하시는 힘으로
  alternatives_korean:
  - 하나님이 주시는 능력에서
  lexicon: BDAG
  rationale: χορηγέω의 「풍성히 공급함」을 「공급하시다」로 옮긴다.
- source_word: ᾧ ἐστιν ἡ δόξα καὶ τὸ κράτος εἰς τοὺς αἰῶνας τῶν αἰώνων
  english_pob_choice: to whom belong the glory and the dominion forever and ever
  chosen_korean: 그분께 영광과 권능이 영원무궁하기를
  alternatives_korean:
  - 그에게 영광과 통치가 영원히 있기를
  lexicon: BDAG
  rationale: 송영 정형을 한국 성서 전통의 「영원무궁」으로 옮긴다. 5:11과 통일.
