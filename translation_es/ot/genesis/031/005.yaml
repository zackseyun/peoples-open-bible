    text: Literalmente, «no está hacia mí»; con «rostro», el hebreo expresa la actitud o disposición de una persona.
    reason: lexical_alternative
  - marker: b
    text: Literalmente, «como ayer y anteayer», un modismo hebreo que significa «como antes».
    reason: alternative_reading
  revision_rationale: Se corrige la apertura a un español más natural y fiel al uso receptor («les dijo») sin perder el referente original. Se eliminó una nota gramatical innecesaria y se conservaron solo las notas que preservan alternativas significativas del hebreo y del audit trail inglés.
