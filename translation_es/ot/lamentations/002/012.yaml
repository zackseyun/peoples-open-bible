base_translation:
  language: en
  yaml_path: translation/ot/lamentations/002/012.yaml
  text: They say to their mothers[a], “Where are grain and wine?” as they faint like the wounded in the streets of the city[c][b], as their life is poured out into their mothers’ bosom.
  footnotes:
  - marker: a
    text: Or “like the slain.” The Hebrew חָלָל can refer to one slain, pierced, or mortally wounded; here it likely evokes children collapsing as if battlefield casualties.
    reason: lexical_alternative
  - marker: b
    text: Hebrew nephesh, often rendered “soul,” here likely means “life” in the sense of life ebbing away.
    reason: lexical_alternative
  - marker: c
    text: Or “into their mothers’ arms” or “on their mothers’ lap.” Hebrew “bosom” is a literal, intimate maternal image.
    reason: lexical_alternative
