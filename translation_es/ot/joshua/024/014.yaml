revisions:
- from: Ahora teman a Yahvé y sírvanle con integridad[a] y fidelidad[b]; y aparten los dioses que sirvieron sus padres al otro lado del río[c] y en Egipto, y sirvan a Yahvé.
  to: Ahora teman a Yahvé y sírvanle con integridad y fidelidad[a], y quiten de en medio los dioses que sirvieron sus padres al otro lado del río[b] y en Egipto, y sirvan a Yahvé.
  rationale: 'Se simplificó y naturalizó el español sin apartarse del hebreo ni de la auditoría POB: se mantuvo ''Yahvé'', ''teman'', ''sirvan'' y ''sus padres''; se mejoró וְהָסִירוּ con ''quiten de en medio'', que expresa mejor la remoción de dioses rivales; se dejó una sola nota léxica útil sobre אֱמֶת y la nota cultural sobre el Río; y se aligeró la puntuación para mejor legibilidad.'
