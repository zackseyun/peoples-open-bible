translation:
  language: es
  text: El fuego seguía siendo fuerte en el agua con su propia fuerza[a], y el agua olvidó su poder de apagar;
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «El fuego era fuerte en el agua más allá de su propia fuerza, y el agua olvidó su poder de extinguir».'
    reason: lexical_alternative
lexical_decisions:
- source_word: πῦρ
  english_pob_choice: fire
  chosen_spanish: fuego
  alternatives_spanish:
  - llama
  - incendio
  lexicon: LSJ
  rationale: Sustantivo literal y elemental; en español 'fuego' conserva el contraste con 'agua' y la imagen poética del pasaje.
- source_word: ἴσχυεν
  english_pob_choice: was strong
  chosen_spanish: era fuerte
  alternatives_spanish:
  - tenía fuerza
  - prevalecía
  - mantenía su fuerza
  lexicon: LSJ
  rationale: El imperfecto expresa una acción/estado continuo. 'Era fuerte' sigue de cerca la fuerza verbal de ἴσχυεν y suena natural en español.
- source_word: ἐν ὕδατι
  english_pob_choice: in water
  chosen_spanish: en el agua
  alternatives_spanish:
  - dentro del agua
  - en agua
  lexicon: LSJ
  rationale: Traducción literal del sintagma espacial; 'en el agua' mantiene la paradoja retórica del texto.
- source_word: τῆς ἰδίας δυνάμεως
  english_pob_choice: beyond its own power
  chosen_spanish: más allá de su propia fuerza
  alternatives_spanish:
  - con su propia fuerza
  - según su propia fuerza
  - en su propia fuerza
  lexicon: LSJ
  rationale: 'La revisión inglesa entendió el genitivo como medida/comparación. En español, ''más allá de su propia fuerza'' conserva esa tensión: el fuego actúa aun en un medio que normalmente lo supera.'
- source_word: ὕδωρ
  english_pob_choice: water
  chosen_spanish: el agua
  alternatives_spanish:
  - agua
  lexicon: LSJ
  rationale: Sustantivo literal; el artículo definido ayuda a la fluidez y a la personificación del elemento.
- source_word: τῆς σβεστικῆς δυνάμεως
  english_pob_choice: its extinguishing power
  chosen_spanish: su poder de extinguir
  alternatives_spanish:
  - su poder de apagar
  - su poder de sofocar
  - su poder de apagar el fuego
  lexicon: LSJ
  rationale: '''σβεστική'' apunta a la capacidad de apagar/extinguir. ''Poder de extinguir'' preserva el valor verbal y la relación elemental sin perder naturalidad.'
- source_word: ἐπελανθάνετο
  english_pob_choice: forgot
  chosen_spanish: olvidó
  alternatives_spanish:
  - se olvidó
  - dejó de ejercer
  - ya no actuó
  lexicon: LSJ
  rationale: Se mantiene la personificación del agua como en el griego y en el registro inglés POB. 'Olvidó' evita explicitar una interpretación que el texto no formula.
theological_decisions:
- issue: Personificación de los elementos en un contexto milagroso
  english_pob_reading: Retain the literal-personified wording ('water forgot') rather than flattening it into explanatory prose.
  chosen_spanish_reading: Mantener la personificación literal ('el agua olvidó') en lugar de convertirla en una explicación prosaica.
  alternative_spanish_readings:
  - el agua perdió su capacidad de extinguir
  - el agua ya no apagaba
  rationale: El versículo presenta una inversión poética de la creación bajo la acción divina. La personificación preserva la fuerza literaria y no añade explicación interpretativa.
  doctrine_reference: DOCTRINE.md §Translation philosophy 3, 6
translation_notes:
  revision_awareness: El borrador sigue la revisión más reciente del inglés POB, que corrigió la primera cláusula para reflejar más directamente ἴσχυεν como 'was strong' y entendió τῆς ἰδίας δυνάμεως como una medida/comparación ('beyond its own power'). Se conserva la segunda cláusula con la personificación de 'olvidó'.
  spanish_consistency_notes:
  - Se mantiene 'agua' con artículo definido para conservar la personificación y la simetría con 'fuego'.
  - Se eligió 'extinguir' en lugar de 'apagar' para seguir de cerca el valor de σβεστικῆς y evitar una reducción demasiado doméstica del contraste elemental.
  - La nota al pie ofrece una alternativa más cercana al giro griego 'con su fuerza propia' para reflejar la tensión lexical señalada en el audit trail.
