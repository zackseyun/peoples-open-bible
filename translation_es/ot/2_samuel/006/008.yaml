translation:
  language: es
  text: Y David se enojó porque Yahvé había irrumpido contra Uza[a], y llamó a aquel lugar Pérez-Uza hasta el día de hoy.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Pérez-Uza» conserva el sonido del nombre hebreo y recuerda el sentido de «brecha / irrupción contra Uza», reflejando el juego de palabras del hebreo con la acción de Yahvé contra Uza.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּחַר לְדָוִד
  english_pob_choice: And David was angry
  chosen_spanish: Y David se enojó
  alternatives_spanish:
  - Y David se airó
  - Y David se llenó de ira
  lexicon: HALOT
  rationale: La expresión hebrea חרה ל comunica enojo. «Se enojó» conserva la fuerza emocional en español moderno y suena natural sin debilitar el sentido.
- source_word: פָּרַץ יְהוָה פֶּרֶץ בְּעֻזָּה
  english_pob_choice: the LORD had broken out against Uzzah
  chosen_spanish: Yahvé había hecho una brecha contra Uza
  alternatives_spanish:
  - Yahvé había irrumpido contra Uza
  - Yahvé había abierto una brecha contra Uza
  lexicon: HALOT
  rationale: Se mantiene el juego de palabras entre el verbo פרץ y el sustantivo פֶּרֶץ con «brecha». «Hacer una brecha» reproduce con claridad la imagen de una ruptura súbita y judicial, sin suavizar la acción divina.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el SEÑOR
  - Yahveh
  lexicon: HALOT
  rationale: Conforme al criterio del proyecto, el Tetragrámaton se rinde como «Yahvé» para conservar el nombre divino revelado, en lugar de sustituirlo por un título.
- source_word: וַיִּקְרָא לַמָּקוֹם הַהוּא
  english_pob_choice: and he called that place
  chosen_spanish: y llamó a aquel lugar
  alternatives_spanish:
  - y nombró a aquel lugar
  - y puso nombre a aquel lugar
  lexicon: HALOT
  rationale: «Llamó a aquel lugar» es una fórmula natural y fiel para el acto de nombrar el sitio.
- source_word: פֶּרֶץ עֻזָּה
  english_pob_choice: Perez-uzzah
  chosen_spanish: Pérez-Uza
  alternatives_spanish:
  - Breach-Uza
  - Brecha de Uza
  lexicon: HALOT
  rationale: Los nombres propios se transliteran en español. Se conserva el valor alusivo del nombre con una forma legible en español y la mayúscula inicial en ambos elementos.
- source_word: עַד הַיּוֹם הַזֶּה
  english_pob_choice: to this day
  chosen_spanish: hasta el día de hoy
  alternatives_spanish:
  - hasta hoy
  - hasta este día
  lexicon: HALOT
  rationale: La fórmula temporal hebrea se expresa con una equivalencia idiomática natural en español, manteniendo el valor durativo.
theological_decisions:
- issue: Nombre divino en el texto principal
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Yahveh
  rationale: Se preserva el nombre propio divino en la línea principal para reflejar el Tetragrámaton sin sustitución devocional, de acuerdo con la política del proyecto.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Acción divina de juicio sin atenuación
  english_pob_reading: the LORD had broken out against Uzzah
  chosen_spanish_reading: había hecho una brecha contra Uza
  alternative_spanish_readings:
  - había irrumpido contra Uza
  - había estallado contra Uza
  rationale: La construcción española conserva el sentido de acción directa y de juicio, sin convertirla en mera consecuencia accidental. También mantiene el paralelismo léxico con el nombre del lugar.
  doctrine_reference: 'DOCTRINE.md: Contested terms — juicio divino y lenguaje antropomórfico'
- issue: Juego de palabras entre acción y topónimo
  english_pob_reading: Perez-uzzah sounds like 'breach/outburst against Uzzah'
  chosen_spanish_reading: Pérez-Uza
  alternative_spanish_readings:
  - Brecha contra Uza
  - Brecha de Uza
  rationale: El topónimo se deja como nombre propio transliterado; el juego de palabras queda implícito en la proximidad entre «brecha» y «Pérez».
  doctrine_reference: 'DOCTRINE.md: Naming and wordplay preservation'
translation_notes:
  revision_awareness: 'El inglés auditado pasó por una revisión que eliminó la expresión redundante «with a breach» para dejar «broke out against Uzzah». La versión española sigue ese ajuste: usa «hizo una brecha contra Uza» para conservar el verbo de ruptura y el sustantivo cognado sin añadir redundancia innecesaria. También refleja el consenso de alta concordancia del control cruzado.'
  spanish_consistency_notes:
  - Se usa «Yahvé» de manera consistente con el criterio del proyecto para יְהוָה.
  - Se translitera el nombre propio como «Pérez-Uza», con acento gráfico en Pérez por normas del español.
  - «Uza» se usa como forma española del nombre propio, coherente con la adaptación fonética habitual.
  - La puntuación y el orden responden a una sintaxis natural en español bíblico contemporáneo, sin perder la densidad del hebreo.
