revisions:
- from: Los edomitas[a] también habían venido, hirieron a Judá y se llevaron cautivos[b].
  to: Los edomitas también habían venido, atacaron a Judá y se llevaron cautivos[a].
  rationale: Se reemplaza «hirieron» por «atacaron» para reflejar mejor el sentido militar de נכה y la decisión léxica auditada en inglés. Se elimina la nota innecesaria sobre «edomitas» y se conserva solo la nota de alternativa léxica realmente útil. El resto del versículo permanece cercano al hebreo y natural en español.
