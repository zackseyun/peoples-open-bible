translation:
  language: es
  text: y en el tercer carro, caballos blancos; y en el cuarto carro, caballos moteados, fuertes[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, posiblemente: «caballos moteados, y los fuertes», tomando «fuertes» como un grupo separado más que como una segunda descripción de los caballos del cuarto carro.'
    reason: alternative_reading
lexical_decisions:
- source_word: וּבַמֶּרְכָּבָה
  english_pob_choice: and in the ... chariot
  chosen_spanish: y en el ... carro
  alternatives_spanish:
  - y sobre el ... carro
  - y en el ... carruaje
  lexicon: HALOT
  rationale: En español, 'carro' comunica mejor la imagen de un carro de guerra o carroza en este contexto profético. Mantengo 'en' para seguir la relación de pertenencia/ubicación de los caballos respecto del carro, como en la nota inglesa que evita una traducción demasiado literal de la preposición.
- source_word: הַשְּׁלִשִׁית
  english_pob_choice: third
  chosen_spanish: tercer
  alternatives_spanish:
  - tercera
  lexicon: HALOT
  rationale: Es un ordinal directo que modifica 'carro'; uso la forma apocopada 'tercer' delante de un sustantivo masculino para español natural y fiel.
- source_word: סוּסִים
  english_pob_choice: horses
  chosen_spanish: caballos
  alternatives_spanish:
  - caballos de guerra
  - corceles
  lexicon: HALOT
  rationale: '''Caballos'' es el equivalente más neutral y directo. ''Corceles'' sería más literario y menos preciso; ''caballos de guerra'' añade una especificación no explícita en el hebreo.'
- source_word: לְבָנִים
  english_pob_choice: white
  chosen_spanish: blancos
  alternatives_spanish:
  - blancas
  lexicon: HALOT
  rationale: Adjetivo de color básico; concuerda en masculino plural con 'caballos'.
- source_word: הָרְבִעִית
  english_pob_choice: fourth
  chosen_spanish: cuarto
  alternatives_spanish:
  - cuarta
  lexicon: HALOT
  rationale: Ordinal directo que modifica 'carro'; la forma masculina concuerda con 'carro'.
- source_word: בְּרֻדִּים
  english_pob_choice: dappled
  chosen_spanish: overos
  alternatives_spanish:
  - moteados
  - pintados
  - manchados
  lexicon: HALOT
  rationale: En español ecuestre, 'overos' es una opción natural para un pelaje variegado o manchado; preserva la imagen visual del término hebreo sin sonar técnico. Otras opciones son posibles, pero menos idiomáticas o más ambiguas.
- source_word: אֲמֻצִּים
  english_pob_choice: strong
  chosen_spanish: fuertes
  alternatives_spanish:
  - robustos
  - poderosos
  lexicon: HALOT
  rationale: '''Fuertes'' reproduce bien la fuerza/robustez del adjetivo y funciona de manera natural con caballos en español. Mantiene la posibilidad de leerlo como un segundo descriptor del mismo grupo, tal como permite el hebreo y la auditoría inglesa.'
theological_decisions:
- issue: Relación de 'bĕruddîm' y 'amuttzîm' en el cuarto carro
  english_pob_reading: '''dappled horses, strong ones''—the final term likely describes the horses rather than naming a separate group, though the alternative remains possible.'
  chosen_spanish_reading: '''caballos overos, fuertes'' como dos descriptores del mismo grupo de caballos; la alternativa de leer ''fuertes'' como un grupo aparte queda abierta.'
  alternative_spanish_readings:
  - '''caballos overos y fuertes'' como dos rasgos del mismo grupo'
  - '''caballos overos—a los fuertes'' como un grupo adicional'
  rationale: El hebreo coloca dos adjetivos en secuencia sin repetir el sustantivo, lo que favorece tomarlos juntos. Aun así, la puntuación y la nota conservan la tensión interpretativa, en línea con la auditoría inglesa que no resuelve silenciosamente la ambigüedad.
  doctrine_reference: 'Translation philosophy §3: preserve theological tension rather than resolve it'
translation_notes:
  revision_awareness: La redacción sigue la revisión final del inglés POB que separa visualmente los dos descriptores del cuarto carro y conserva la ambigüedad sobre si 'fuertes' modifica a los mismos caballos o introduce un grupo aparte. El español adopta la misma estrategia mediante puntuación y nota.
  spanish_consistency_notes:
  - Uso 'carro' para מרכבה de manera consistente con el registro profético y el español lector de Biblia.
  - Uso 'caballos' para סוסים y adjetivos de color/estado en masculino plural concordante.
  - Evito 'SEÑOR' y no hay nombres divinos en el versículo.
  - Mantengo una sintaxis sobria y cercana al orden hebreo sin caer en calco rígido.
