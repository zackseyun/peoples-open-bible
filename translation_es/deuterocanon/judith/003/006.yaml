translation:
  language: es
  text: Y él descendió a la costa con su fuerza, y guarneció las ciudades altas, y tomaron de ellas hombres escogidos para incorporarlos a la alianza[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El griego dice «tomaron» en plural, aunque los verbos inmediatos anteriores están en singular («descendió», «guarneció»). El plural puede referirse a sus fuerzas actuando bajo su mando; algunos traductores lo suavizan al singular.
    reason: alternative_reading
lexical_decisions:
- source_word: κατέβη
  english_pob_choice: went down
  chosen_spanish: descendieron
  alternatives_spanish:
  - bajó
  - marchó hacia abajo
  lexicon: LSJ
  rationale: El aoristo de καταβαίνω expresa movimiento hacia abajo. «Descendieron» conserva el sentido direccional sin añadir un matiz militar que el verbo por sí solo no exige.
- source_word: παραλίαν
  english_pob_choice: the coast
  chosen_spanish: la costa
  alternatives_spanish:
  - el litoral
  - la región costera
  lexicon: LSJ
  rationale: παραλία se refiere a la franja costera o litoral. «La costa» es natural en español moderno y mantiene el valor geográfico del término.
- source_word: δύναμις
  english_pob_choice: force
  chosen_spanish: fuerza
  alternatives_spanish:
  - ejército
  - tropas
  - poder
  lexicon: LSJ
  rationale: En este contexto militar, δύναμις designa un contingente armado. «Fuerza» conserva amplitud semántica y evita precisar más de lo que el griego dice.
- source_word: ἐφρούρησε
  english_pob_choice: garrisoned
  chosen_spanish: guarneció
  alternatives_spanish:
  - guardó
  - aseguró
  - dejó guarnición en
  lexicon: LSJ
  rationale: El verbo alude a custodiar o mantener bajo vigilancia. En contexto militar, «guarneció» transmite mejor la idea de colocar tropas en las ciudades que un simple «guardó».
- source_word: πόλεις τὰς ὑψηλάς
  english_pob_choice: the high cities
  chosen_spanish: las ciudades altas
  alternatives_spanish:
  - las ciudades elevadas
  - las ciudades de altura
  - las ciudades fuertes
  lexicon: LSJ
  rationale: ὑψηλάς significa literalmente «altas». «Ciudades altas» preserva el rasgo topográfico sin introducir la idea de fortaleza, que no está explícita en el adjetivo.
- source_word: ἔλαβον
  english_pob_choice: they took
  chosen_spanish: tomaron
  alternatives_spanish:
  - tomó
  - recibieron
  lexicon: LSJ
  rationale: La forma griega es plural, y la traducción mantiene ese plural. Esto respeta el texto aun cuando los verbos cercanos sean singulares, probablemente por referencia a las fuerzas que actúan bajo su mando.
- source_word: ἄνδρας ἐπιλέκτους
  english_pob_choice: chosen men
  chosen_spanish: hombres escogidos
  alternatives_spanish:
  - varones escogidos
  - hombres selectos
  - hombres elegidos
  lexicon: LSJ
  rationale: ἐπιλέκτους significa «escogidos/seleccionados». «Hombres escogidos» es claro y conserva la referencia masculina explícita de ἄνδρας.
- source_word: εἰς συμμαχίαν
  english_pob_choice: into alliance
  chosen_spanish: para alianza
  alternatives_spanish:
  - en alianza
  - a alianza
  - para un pacto de alianza
  lexicon: LSJ
  rationale: La preposición con συμμαχία indica incorporación u orientación hacia una alianza. «Para alianza» es una solución natural en español y mantiene el valor relacional del sintagma sin ampliar innecesariamente el sentido.
translation_notes:
  revision_awareness: Se siguió el texto griego de Swete 1909 y se tuvo en cuenta el audit trail inglés. En especial, se conservó el plural de ἔλαβον, como hace la POB en inglés, y se evitó convertir la frase final en una paráfrasis más explícita que el original.
  spanish_consistency_notes:
  - Se mantuvo «costa» para παραλίαν por claridad y naturalidad en español.
  - Se prefirió «guarneció» para ἐφρούρησε por su valor militar más preciso en este contexto.
  - Se conservó el plural de ἔλαβον en la cláusula final para no perder la tensión gramatical del griego.
  - No se introdujo terminología eclesiástica ajena al pasaje; la frase εἰς συμμαχίαν se vertió de manera relacional y sobria.
