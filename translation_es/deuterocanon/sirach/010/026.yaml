review_pass:
  verdict: revise
  source_alignment_summary: El borrador sigue bien el hebreo base y conserva correctamente la nota sobre la fuerte divergencia griega. Mantiene la fuerza reflexiva de אַל תּתְחַכַּם y וְאַל תִּתְכַּבֵּד, y no armoniza indebidamente con la LXX. Sin embargo, «No te hagas demasiado sabio» suena algo calcado y puede sugerir volverse sabio en vez de presumir o mostrarse sabio; además, «en el tiempo de tu necesidad» es fiel pero menos natural que «cuando estás necesitado».
  spanish_quality_summary: El español es claro y digno, pero una leve pulida mejora la naturalidad sin perder precisión. «No te las des de sabio» comunica mejor la reflexividad y la advertencia contra la sabiduría afectada o interesada. «No te honres a ti mismo» es fiel, pero «no te des honores» sería más idiomático; aun así, puede alejarse del texto. Conviene mantener la segunda cláusula cercana al original y ajustar solo la primera.
  glossary_alignment: No hay conflictos con la terminología base del proyecto. No aparecen términos sensibles como Yahvé, Mesías, espíritu, carne o esclavo. La gestión de la variante griega en nota está bien alineada con la política de Sirácida.
  issues:
  - severity: medium
    issue: «No te hagas demasiado sabio» suena poco idiomático en español bíblico moderno
    rationale: Aunque es relativamente literal, puede entenderse como 'volverte sabio' más que como adoptar una pose de sabiduría interesada. El hitpael pide una expresión más claramente reflexiva/afectada.
  - severity: low
    issue: La ancla [a] está colocada en «sabio» en vez de sobre la cláusula o segmento donde la variante es más global
    rationale: La nota explica una lectura griega completamente distinta para buena parte del versículo, no solo para «sabio». No es un error grave, pero puede anclarse mejor al primer segmento traducido.
  revised_spanish_text: No te las des de sabio[a] para servir a tu propio deseo, y no te honres a ti mismo en el tiempo de tu necesidad.
  revised_footnotes:
  - marker: a
    text: 'El testigo griego lee de manera muy distinta: «Mejor el que trabaja en todo que el que anda jactándose y carece de pan». El hebreo conservado en la Geniza de El Cairo advierte contra una astucia que se sirve a sí misma y contra la autoexaltación en tiempo de necesidad.'
    reason: alternative_reading
  revision_rationale: Se ajusta la primera cláusula para reflejar mejor el valor reflexivo y afectado de תתחכם en español natural, sin perder la literalidad ética del hebreo. Se conserva la segunda cláusula y la nota textual porque ya son fieles y claras.
