translation:
  language: es
  text: Porque Efraín ha multiplicado altares para pecar[a], estos se le han vuelto altares para pecar.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «para ofrendas por el pecado» en ambas ocasiones de «para pecar»; la forma hebrea puede entenderse en sentido cultual, pero el contexto favorece la idea de que estos altares se volvieron ocasión de pecado.'
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  english_pob_choice: Because
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Ya que
  lexicon: HALOT
  rationale: Introduce la razón del juicio de manera natural en español y conserva la relación causal del hebreo, sin endurecer el tono más de lo que el contexto exige.
- source_word: הִרְבָּה
  english_pob_choice: has multiplied
  chosen_spanish: ha multiplicado
  alternatives_spanish:
  - ha aumentado
  - ha hecho muchos
  lexicon: HALOT
  rationale: El hifil expresa incremento causado; «ha multiplicado» conserva la fuerza verbal y el juicio profético de la abundancia culpable.
- source_word: אֶפְרַיִם
  english_pob_choice: Ephraim
  chosen_spanish: Efraín
  alternatives_spanish:
  - Efraím
  lexicon: Nombre propio
  rationale: Se mantiene el nombre propio tal como aparece en español bíblico, referido aquí al reino del norte.
- source_word: מִזְבְּחֹת
  english_pob_choice: altars
  chosen_spanish: altares
  alternatives_spanish:
  - altares sacrificiales
  - lugares de altar
  lexicon: HALOT
  rationale: El plural subraya la proliferación de sitios de culto; «altares» es la correspondencia directa y clara en español.
- source_word: לַחֲטֹא
  english_pob_choice: for sinning
  chosen_spanish: para pecar
  alternatives_spanish:
  - para el pecado
  - para pecar / para ofrendas por el pecado
  lexicon: HALOT
  rationale: 'Se preserva el valor verbal del infinitivo: el contexto acusa a los altares de promover el pecado. Se evita fijar sin fundamento el sentido cultual de «ofrenda por el pecado».'
- source_word: הָיוּ לוֹ
  english_pob_choice: they have become ... to him
  chosen_spanish: le han llegado a ser
  alternatives_spanish:
  - le han sido
  - se le han vuelto
  lexicon: HALOT
  rationale: 'Expresa con naturalidad el resultado del hebreo: los altares no solo existen, sino que han pasado a ser para Efraín instrumentos o ocasiones de pecado.'
- source_word: מִזְבְּחוֹת לַחֲטֹא
  english_pob_choice: altars for sinning
  chosen_spanish: los altares ... para pecar
  alternatives_spanish:
  - altares para pecar
  - altares de pecado
  lexicon: HALOT
  rationale: 'La repetición retórica del hebreo se conserva en español para reflejar el énfasis: los mismos altares destinados al culto se convierten en ocasión de pecado.'
theological_decisions:
- issue: Sentido de לַחֲטֹא en ambas ocurrencias
  english_pob_reading: 'verbal sense: ''for sinning'' / ''to sin'''
  chosen_spanish_reading: 'sentido verbal: «para pecar»'
  alternative_spanish_readings:
  - 'sentido cultual: «para ofrendas por el pecado»'
  - «para el pecado»
  rationale: El contexto inmediato denuncia la multiplicación de altares como acto culpable; por eso se mantiene el valor verbal y la ironía profética. No se resuelve la ambigüedad hacia un sacrificio específico que el pasaje no exige.
  doctrine_reference: Primacía del hebreo y preservación de la tensión lexical sin armonizarla artificialmente con la tradición.
translation_notes:
  revision_awareness: El borrador sigue de cerca la decisión revisada del POB inglés (sin cambios en el último pase) y conserva la lectura verbal de לַחֲטֹא, con la nota alternativa cultual documentada en el aparato inglés.
  spanish_consistency_notes:
  - Se usa «Efraín» como nombre propio bíblico estándar en español.
  - Se evita «SEÑOR» o equivalentes de máscara porque no aparece el Tetragrámaton en este versículo.
  - «Para pecar» mantiene la repetición retórica del hebreo y la acusación profética.
  - La nota se ancla en el primer «para pecar» y cubre ambas ocurrencias, como en el texto fuente.
