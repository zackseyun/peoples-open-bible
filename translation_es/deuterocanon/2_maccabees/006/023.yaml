translation:
  language: es
  text: Pero él, tomando una resolución noble, digna de su edad y de la dignidad de la vejez, y de la distinción de su honrado modo de vida, y de la excelente conducta que había tenido desde la niñez —más bien, conforme a la santa ley dada por Dios— declaró claramente, diciendo que lo enviaran pronto al Hades[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O «al reino de los muertos». Griego: «al Hades».'
    reason: lexical_alternative
lexical_decisions:
- source_word: λογισμὸν ἀστεῖον
  english_pob_choice: a noble resolve
  chosen_spanish: una resolución noble
  alternatives_spanish:
  - un juicio noble
  - una decisión noble
  - un pensamiento refinado
  lexicon: LSJ
  rationale: λογισμός aquí expresa una resolución o decisión deliberada, no solo un pensamiento. ἀστεῖος tiene un matiz de nobleza, refinamiento o loable calidad; «resolución noble» conserva bien ese valor en español sin sonar rebuscado.
- source_word: ἀναλαβὼν
  english_pob_choice: adopting
  chosen_spanish: tomando
  alternatives_spanish:
  - asumiendo
  - adoptando
  - habiendo asumido
  lexicon: BDAG
  rationale: El participio introduce la asunción deliberada de esa resolución. «Tomando» en español es natural y conserva la idea de abrazar o asumir esa decisión.
- source_word: ἄξιον τῆς ἡλικίας
  english_pob_choice: worthy of his age
  chosen_spanish: digna de su edad
  alternatives_spanish:
  - conforme a su edad
  - digna de sus años
  lexicon: LSJ
  rationale: ἄξιον expresa valor o adecuación. «Digna de su edad» mantiene la evaluación honorífica y suena fluido en español.
- source_word: τοῦ γήρους ὑπεροχῆς
  english_pob_choice: the dignity of old age
  chosen_spanish: la dignidad de la vejez
  alternatives_spanish:
  - la excelencia de la vejez
  - la eminencia de la vejez
  lexicon: LSJ
  rationale: ὑπεροχή sugiere superioridad, distinción o eminencia. «Dignidad» funciona bien en español para esa elevación honorable de la vejez.
- source_word: ἐπικτήτου καὶ ἐπιφανοῦς πολιτείας
  english_pob_choice: his honored way of life
  chosen_spanish: su modo de vida honrado
  alternatives_spanish:
  - su vida distinguida
  - su conducta ilustre
  - su ciudadanía distinguida
  lexicon: LSJ
  rationale: πολιτεία puede referirse a modo de vida o conducta en este contexto. «Modo de vida honrado» respeta esa lectura y evita sobrecargar el sentido con «ciudadanía» donde el pasaje describe su carácter.
- source_word: ἐκ παιδὸς καλλίστης ἀναστροφῆς
  english_pob_choice: the finest conduct from childhood
  chosen_spanish: la excelente conducta que había tenido desde la niñez
  alternatives_spanish:
  - la mejor conducta desde la niñez
  - su excelente manera de vivir desde niño
  lexicon: BDAG
  rationale: ἀναστροφή suele significar conducta o manera de vivir. «Conducta que había tenido desde la niñez» preserva el punto de partida temporal y el matiz ético.
- source_word: μᾶλλον δὲ
  english_pob_choice: rather
  chosen_spanish: más bien
  alternatives_spanish:
  - o más bien
  - antes bien
  lexicon: LSJ
  rationale: La expresión corrige y eleva lo anterior hacia la razón suprema. «Más bien» mantiene bien esa transición retórica.
- source_word: τῆς ἁγίας καὶ θεοκτίστου νομοθεσίας
  english_pob_choice: the holy and God-given law
  chosen_spanish: la santa y dada-por-Dios ley
  alternatives_spanish:
  - la santa y ley dada por Dios
  - la santa y divinamente establecida ley
  lexicon: LSJ
  rationale: νομοθεσία aquí remite concretamente a la ley de Dios. «Dada-por-Dios» preserva la fuerza de θεοκτίστος sin introducir un giro demasiado interpretativo.
- source_word: ἀκολούθως
  english_pob_choice: in keeping with
  chosen_spanish: conforme a
  alternatives_spanish:
  - de acuerdo con
  - en consonancia con
  lexicon: LSJ
  rationale: El adverbio indica conformidad con la ley. «Conforme a» es claro, natural y fiel.
- source_word: ἀπεφήνατο
  english_pob_choice: declared himself plainly
  chosen_spanish: declaró claramente
  alternatives_spanish:
  - declaró abiertamente
  - expresó con claridad su decisión
  lexicon: LSJ
  rationale: El verbo en voz media comunica una manifestación clara de su postura. «Declaró claramente» conserva la idea sin alargar innecesariamente.
- source_word: προπέμπειν εἰς τὸν ᾅδην
  english_pob_choice: send him quickly to Hades
  chosen_spanish: lo enviaran pronto al Hades
  alternatives_spanish:
  - lo mandaran pronto al Hades
  - lo enviaran rápidamente al Hades
  - lo despacharan pronto al Hades
  lexicon: LSJ
  rationale: ᾅδης se mantiene como «Hades» para conservar el término griego del mundo de los muertos y no confundirlo con el infierno final. El verbo conserva el matiz de enviar rápidamente.
theological_decisions:
- issue: Rendering of ᾅδης
  english_pob_reading: Hades
  chosen_spanish_reading: Hades
  alternative_spanish_readings:
  - el sepulcro
  - el reino de los muertos
  rationale: El texto griego nombra ᾅδης, el ámbito de los muertos. Mantener «Hades» preserva la primacía del original y evita mezclarlo con categorías posteriores de juicio final.
  doctrine_reference: Preservar la tensión lexical sin armonizarla con tradiciones posteriores.
- issue: Rendering of θεοκτίστου
  english_pob_reading: God-given
  chosen_spanish_reading: dada-por-Dios
  alternative_spanish_readings:
  - divinamente establecida
  - dada por Dios
  rationale: El adjetivo subraya el origen divino de la ley. «Dada-por-Dios» lo explicita en español sin perder la fuerza teológica del compuesto.
  doctrine_reference: Mantener el origen divino de la ley con lenguaje inteligible y fiel.
translation_notes:
  revision_awareness: Se tomó en cuenta la revisión del POB inglés que simplificó 'his acquired and honored way of life' a 'his honored way of life'; por eso en español se evitó sobretraducir ἐπικτήτου y se optó por 'su modo de vida honrado'. También se mantuvo la lectura de Hades, con nota alternativa, para respetar el audit trail y la tensión léxica documentada.
  spanish_consistency_notes:
  - Se mantiene «Hades» como préstamo transliterado, coherente con la decisión inglesa y con la política de preservar ᾅδης.
  - Se usa «santa» para ἁγία y «dada-por-Dios» para θεοκτίστου, evitando sustituir la ley por una formulación eclesiástica no requerida.
  - «Modo de vida» y «conducta» se distinguen para reflejar πολιτεία y ἀναστροφή sin fusionarlas.
  - La puntuación reproduce el giro retórico de μᾶλλον δὲ con un inciso introducido por raya, para conservar el contraste del griego.
