revisions:
- from: El sabio habla poco por sí mismo[a][b], pero la bondad de los necios derrama sabiduría[c].
  to: El sabio habla poco para sí[a][b], pero el bien de los necios derrama sabiduría[c].
  rationale: Se ajusta «por sí mismo» a «para sí» por naturalidad y concisión proverbial. Se cambia «la bondad de los necios» por «el bien de los necios» para reflejar mejor la amplitud de טוֹבַת sin convertir el texto en una alabanza moral de los necios; así se preserva mejor la tensión con la posible ironía y con la variante griega sobre el don del necio. También se pulió la nota griega a «El don de un necio» para un español más natural.
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T23:13:10Z'
