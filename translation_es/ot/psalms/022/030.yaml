translation:
  language: es
  text: Todos los prósperos[a] de la tierra comerán y se postrarán; delante de él se arrodillarán todos los que bajan al polvo[b], incluso él que no pudo conservarse con vida[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo literalmente: «todos los gordos de la tierra». La expresión probablemente significa los prósperos o los bien alimentados.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «todos los que descienden al polvo». «Polvo» es una imagen hebrea de mortalidad y muerte.'
    reason: lexical_alternative
  - marker: c
    text: 'La última cláusula hebrea es difícil: literalmente, «y su vida/alma no vivificó»; a menudo se entiende como «incluso él que no pudo mantener viva su propia vida».'
    reason: alternative_reading
lexical_decisions:
- source_word: אָכְלוּ
  english_pob_choice: will eat
  chosen_spanish: comerán
  alternatives_spanish:
  - habrán comido
  - comerán y participarán de un banquete
  lexicon: HALOT
  rationale: El perfecto hebreo en este contexto poético-futuro se entiende con valor prospectivo. «Comerán» conserva la lectura futura sin añadir matices no dados por el texto.
- source_word: וַיִּשְׁתַּחֲווּ
  english_pob_choice: and bow down
  chosen_spanish: se postrarán
  alternatives_spanish:
  - se inclinarán en adoración
  - se doblarán
  lexicon: HALOT
  rationale: El verbo expresa postración corporal y, por contexto, también reverencia. «Se postrarán» preserva la imagen física con naturalidad en español.
- source_word: כָּל דִּשְׁנֵי אֶרֶץ
  english_pob_choice: all the prosperous of the earth
  chosen_spanish: Todos los prosperados de la tierra
  alternatives_spanish:
  - todos los gordos de la tierra
  - todos los ricos de la tierra
  - todos los prósperos de la tierra
  lexicon: HALOT
  rationale: דיּשְׁנֵי significa literalmente «los gordos», pero el sentido idiomático apunta a personas bien alimentadas o prósperas. «Prosperados» conserva la idea social y evita un calco demasiado crudo.
- source_word: לְפָנָיו
  english_pob_choice: before him
  chosen_spanish: delante de él
  alternatives_spanish:
  - en su presencia
  lexicon: HALOT
  rationale: Es la equivalencia directa y fluida en español para la preposición con sufijo pronominal.
- source_word: יִכְרְעוּ
  english_pob_choice: will kneel
  chosen_spanish: se inclinarán
  alternatives_spanish:
  - se arrodillarán
  - doblarán la rodilla
  lexicon: HALOT
  rationale: כּרע puede expresar arrodillarse o doblar la rodilla. Dado que el versículo ya usa «se postrarán», «se inclinarán» mantiene paralelismo sin forzar una repetición mecánica; la noción de reverencia corporal sigue presente.
- source_word: כָּל יוֹרְדֵי עָפָר
  english_pob_choice: all who go down to the dust
  chosen_spanish: todos los que bajan al polvo
  alternatives_spanish:
  - todos los que descienden al polvo
  - todos los que van al polvo
  - todos los que bajan a la tumba
  lexicon: HALOT
  rationale: «Polvo» conserva la imagen hebrea de mortalidad. «Bajan» sigue la metáfora de descenso y evita interpretarla directamente como «tumba».
- source_word: וְנַפְשׁוֹ לֹא חִיָּה
  english_pob_choice: even he who could not keep himself alive
  chosen_spanish: incluso él, cuya vida no logró mantenerse
  alternatives_spanish:
  - e incluso él, que no pudo conservar su vida
  - incluso él, su alma no quedó viva
  - e incluso él, que no se mantuvo con vida
  lexicon: HALOT
  rationale: La cláusula final es sintácticamente difícil y se mantiene la tensión del hebreo. «Cuya vida no logró mantenerse» comunica la idea de incapacidad para preservar la propia vida sin decidir demasiado la sintaxis oscura del original.
theological_decisions:
- issue: Alcance universal del homenaje en el versículo
  english_pob_reading: The prosperous and those near death alike join in homage before him.
  chosen_spanish_reading: Los prosperados de la tierra y aun los que bajan al polvo aparecen ambos en la misma escena de reverencia ante él.
  alternative_spanish_readings:
  - Solo los prosperados se postran; los demás son un contraste negativo
  - Todos terminan igualados en la muerte, sin matiz de homenaje
  rationale: El hebreo yuxtapone prosperidad y mortalidad, pero no borra el gesto de homenaje. La traducción conserva esa amplitud sin resolverla en una sola tesis doctrinal.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it'
- issue: Lectura de la cláusula final קשה/oscura
  english_pob_reading: Even he who could not keep himself alive.
  chosen_spanish_reading: Incluso él, cuya vida no logró mantenerse.
  alternative_spanish_readings:
  - Incluso el que no pudo conservar su vida
  - Y su vida no fue mantenida
  - Incluso él, cuya alma no fue vivificada
  rationale: Se mantiene la dificultad del hebreo sin sobreexplicar quién actúa o cómo se formula la oración. La versión española deja visible la tensión semántica del original.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it'
translation_notes:
  revision_awareness: 'La redacción española sigue el acuerdo alto del audit trail inglés y conserva sus decisiones revisadas: lectura futura de «comerán», postración + reverencia corporal, «prosperados» para דִּשְׁנֵי, metáfora de «polvo» para la mortalidad, y la clausula final difícil sin resolverla en exceso. Se adoptó una formulación más natural en español que el inglés revisado, manteniendo la misma tensión interpretativa.'
  spanish_consistency_notes:
  - Se usó «Yahvé» no aplica en este versículo porque no aparece el Tetragrámaton.
  - «Prosperados» se eligió como solución intermedia entre el calco crudo «gordos» y la explicación «prósperos», para conservar la imagen idiomática y la inteligibilidad.
  - Se prefirió «se postrarán» y «se inclinarán» para distinguir las dos acciones hebreas sin perder el paralelismo.
  - El marcador [a] queda anclado en «prosperados», [b] en «polvo» y [c] en la cláusula final difícil, de acuerdo con el texto español.
