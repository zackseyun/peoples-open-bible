translation:
  language: es
  text: Y el granizo hirió en toda la tierra de Egipto todo lo que estaba en el campo[a], desde el hombre hasta la bestia. El granizo hirió toda planta del campo, y destrozó todo árbol del campo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «desde el ser humano hasta la bestia» o «desde la gente hasta los animales».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּךְ / הִכָּה
  english_pob_choice: struck
  chosen_spanish: hirió
  alternatives_spanish:
  - golpeó
  - azotó
  - pegó
  lexicon: HALOT
  rationale: El hebreo נכה expresa un golpe devastador de juicio. En español, "herir" comunica mejor el daño causado por el granizo que "golpear", y mantiene la fuerza de acción directa sin sonar demasiado coloquial.
- source_word: הַבָּרָד
  english_pob_choice: the hail
  chosen_spanish: el granizo
  alternatives_spanish:
  - la piedra
  - la granizada
  lexicon: HALOT
  rationale: '"Granizo" es la forma natural y precisa en español para el fenómeno meteorológico y conserva el paralelismo de la repetición en el versículo.'
- source_word: בְּכָל אֶרֶץ מִצְרַיִם
  english_pob_choice: throughout all the land of Egypt
  chosen_spanish: en toda la tierra de Egipto
  alternatives_spanish:
  - por toda la tierra de Egipto
  - en toda la tierra egipcia
  lexicon: HALOT
  rationale: '"En toda la tierra de Egipto" expresa bien la extensión distributiva del hebreo. Se prefiere "tierra" por su tono bíblico y porque refleja de modo claro el ámbito territorial.'
- source_word: אֵת כָּל אֲשֶׁר בַּשָּׂדֶה
  english_pob_choice: everything that was in the field
  chosen_spanish: todo lo que estaba en el campo
  alternatives_spanish:
  - todo lo que había en el campo
  - todo cuanto estaba en el campo
  lexicon: HALOT
  rationale: El hebreo abarca todo lo que se hallaba al aire libre o en el terreno cultivado. "Estaba en el campo" conserva la concreción del texto sin ampliar indebidamente el sentido.
- source_word: מֵאָדָם וְעַד בְּהֵמָה
  english_pob_choice: from man to beast
  chosen_spanish: desde el hombre hasta la bestia
  alternatives_spanish:
  - desde el ser humano hasta la bestia
  - desde la gente hasta los animales
  lexicon: HALOT
  rationale: Se mantiene la fórmula de alcance total. "Hombre" conserva la fuerza representativa de אָדָם en este tipo de merismo, y "bestia" corresponde bien a בְּהֵמָה en un contexto de plaga.
- source_word: עֵשֶׂב הַשָּׂדֶה
  english_pob_choice: every plant of the field
  chosen_spanish: toda planta del campo
  alternatives_spanish:
  - toda hierba del campo
  - toda vegetación del campo
  lexicon: HALOT
  rationale: '"עֵשֶׂב" puede abarcar hierba, plantas y vegetación baja. "Planta" ofrece un equivalente claro y moderno, suficientemente amplio para el contexto agrícola del juicio.'
- source_word: עֵץ הַשָּׂדֶה
  english_pob_choice: every tree of the field
  chosen_spanish: todo árbol del campo
  alternatives_spanish:
  - todo árbol en el campo
  lexicon: HALOT
  rationale: Se conserva la estructura repetida del hebreo con "del campo", que subraya el ámbito afectado por el granizo.
- source_word: שִׁבֵּר
  english_pob_choice: shattered
  chosen_spanish: destrozó
  alternatives_spanish:
  - quebró
  - rompió
  lexicon: HALOT
  rationale: El piel de שבר intensifica la acción destructiva. "Destrozó" transmite mejor que "rompió" la violencia y el efecto ruinoso del granizo sobre los árboles.
theological_decisions:
- issue: Alcance total del juicio en la formulación merística "desde el hombre hasta la bestia"
  english_pob_reading: from man to beast
  chosen_spanish_reading: desde el hombre hasta la bestia
  alternative_spanish_readings:
  - desde el ser humano hasta la bestia
  - desde la gente hasta los animales
  rationale: Se preserva el merismo bíblico sin neutralizarlo, porque el texto marca una escala completa de criaturas afectadas. "Hombre" se mantiene como equivalente representativo de אָדָם, siguiendo la decisión documentada en el POB inglés.
  doctrine_reference: 'DOCTRINE.md: Translation philosophy §4; Contested terms table for אָדָם'
- issue: Preferencia por "tierra" frente a una paráfrasis más general de territorio
  english_pob_reading: throughout all the land of Egypt
  chosen_spanish_reading: en toda la tierra de Egipto
  alternative_spanish_readings:
  - por todo Egipto
  - en todo el territorio de Egipto
  rationale: '"Tierra de Egipto" conserva la forma bíblica tradicional sin perder claridad, y evita reducir el hebreo a una simple referencia geográfica moderna.'
  doctrine_reference: Transparencia semántica del hebreo אֶרֶץ en contexto narrativo
translation_notes:
  revision_awareness: El paquete fuente y la auditoría inglesa muestran acuerdo alto y sin revisiones aplicadas; por eso la redacción española sigue de cerca las decisiones léxicas del POB inglés, ajustándolas a un español natural sin perder el merismo ni la intensidad del juicio.
  spanish_consistency_notes:
  - Se mantiene el paralelismo de dos cláusulas con "El granizo hirió..." / "El granizo hirió..." para reflejar la repetición del hebreo.
  - '"Tierra de Egipto" y "del campo" conservan el ámbito espacial del original sin amplificación interpretativa.'
  - '"Destrozó" se usa para reflejar la intensidad de שִׁבֵּר y distinguirlo del verbo inicial.'
  - La nota a pie de página preserva la alternativa inclusiva documentada en el audit trail inglés.
