revisions:
- from: Y ahora estos son los reyes de la tierra a quienes hirieron los hijos de Israel y cuya tierra tomaron posesión de ella, al otro lado del Jordán, hacia donde nace el sol, desde el valle del Arnón hasta el monte Hermón, y todo el Arabá hacia el este.
  to: Ahora bien, estos son los reyes de la tierra a quienes hirieron los hijos de Israel[b], y de cuya tierra tomaron posesión al otro lado del Jordán, hacia la salida del sol[c], desde el uadi Arnón[a] hasta el monte Hermón, y toda la Arabá[d] hacia el este.
  rationale: La revisión corrige una construcción española defectuosa, mejora la naturalidad del encabezamiento, preserva mejor las decisiones léxicas del rastro POB sobre נחל y עֲרָבָה, y restituye notas importantes para alternativas y precisión geográfica. El resultado sigue de cerca el hebreo y es más claro y digno en español eclesial general.
