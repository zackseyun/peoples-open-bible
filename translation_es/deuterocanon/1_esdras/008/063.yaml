translation:
  language: es
  text: 'Y los que habían venido de la cautividad ofrecieron sacrificios a Yahvé, el Dios de Israel: noventa y seis carneros, setenta y seis corderos y doce machos cabríos como ofrenda de paz[a]; todos ellos como sacrificio a Yahvé.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «como ofrenda de bienestar», «para salvación» o «para liberación». El griego dice literalmente «para salvación/liberación», pero aquí aparece en un contexto sacrificial.
    reason: lexical_alternative
lexical_decisions:
- source_word: οἱ δὲ παραγενόμενοι ἐκ τῆς αἰχμαλωσίας
  english_pob_choice: those who had come from the captivity
  chosen_spanish: los que habían venido de la cautividad
  alternatives_spanish:
  - los que habían llegado del exilio
  - los que habían venido del cautiverio
  lexicon: BDAG; LSJ
  rationale: παραγενόμενοι indica llegada o venida; el participio en español se expresa con naturalidad en pretérito compuesto. αἰχμαλωσία remite a cautividad/cautiverio; «cautividad» conserva el matiz del estado de estar cautivo y es una opción bíblica clara en español.
- source_word: προσήνεγκαν θυσίας
  english_pob_choice: offered sacrifices
  chosen_spanish: ofrecieron sacrificios
  alternatives_spanish:
  - presentaron sacrificios
  - trajeron sacrificios
  lexicon: BDAG
  rationale: En contexto cultual, προσφέρω se traduce idiomáticamente como «ofrecer». θυσίας es el plural de sacrificios, por lo que la formulación directa resulta precisa y natural.
- source_word: τῷ θεῷ τοῦ Ἰσραὴλ Κυρίῳ
  english_pob_choice: to the Lord, the God of Israel
  chosen_spanish: a Yahvé, el Dios de Israel
  alternatives_spanish:
  - al Señor, el Dios de Israel
  - al Dios de Israel, Yahvé
  lexicon: BDAG
  rationale: El dativo identifica al destinatario de los sacrificios. Se conserva «Yahvé» según la norma del proyecto para יהוה/κύριος cuando el texto lo identifica como el Dios de Israel. «El Dios de Israel» mantiene la apposición del griego.
- source_word: ἐνενήκοντα ἕξ
  english_pob_choice: ninety-six
  chosen_spanish: noventa y seis
  alternatives_spanish:
  - '96'
  lexicon: LSJ
  rationale: Número cardinal traducido de forma directa.
- source_word: ἄρνας
  english_pob_choice: rams
  chosen_spanish: carneros
  alternatives_spanish:
  - corderos
  - ovejas
  lexicon: LSJ
  rationale: Aunque ἄρνας puede ser flexible en algunos contextos, en inventarios sacrificiales el referente masculino de la oveja se expresa bien como «carneros». Esto mantiene la distinción con los corderos que siguen en la lista.
- source_word: ἑβδομήκοντα ἕξ
  english_pob_choice: seventy-six
  chosen_spanish: setenta y seis
  alternatives_spanish:
  - '76'
  lexicon: LSJ
  rationale: Número cardinal traducido de forma directa.
- source_word: τράγους
  english_pob_choice: male goats
  chosen_spanish: machos cabríos
  alternatives_spanish:
  - cabras machos
  - macho cabrío
  lexicon: LSJ
  rationale: τράγος denota un macho cabrío. «Machos cabríos» es claro, culto y suficientemente literal para el inventario sacrificial.
- source_word: ὑπὲρ σωτηρίου
  english_pob_choice: for a peace offering
  chosen_spanish: como ofrenda de paz
  alternatives_spanish:
  - para salvación
  - para liberación
  - como sacrificio de bienestar
  lexicon: LSJ
  rationale: La expresión es cultual e idiomática; en español bíblico «ofrenda de paz» comunica la categoría sacrificial de manera inteligible. Se preserva, sin embargo, la tensión semántica de σωτηρία mediante una nota alternativa, pues el griego literalmente apunta a salvación/deliverance.
- source_word: ἅπαντα θυσίαν
  english_pob_choice: all of them as a sacrifice
  chosen_spanish: todos ellos como sacrificio
  alternatives_spanish:
  - todo ello como sacrificio
  - la totalidad como sacrificio
  lexicon: BDAG
  rationale: ἅπαντα resume colectivamente la lista anterior; «todos ellos» mantiene el valor sumativo sin añadir elementos ajenos. «Como sacrificio» refleja la conclusión del verso.
theological_decisions:
- issue: Sentido de κύριος aplicado al Dios de Israel
  english_pob_reading: the Lord
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el Señor
  - el Soberano
  rationale: Dado que el texto griego identifica al destinatario como «el Dios de Israel, Kyrios», y el proyecto pide usar «Yahvé» para el nombre divino, se conserva ese nombre en la traducción principal en vez de una sustitución reverencial por «Señor».
  doctrine_reference: 'Proyecto POB: uso de Yahvé para יהוה; regla editorial sobre κύριος cuando remite al nombre divino'
- issue: ὑπὲρ σωτηρίου en contexto sacrificial
  english_pob_reading: for a peace offering
  chosen_spanish_reading: como ofrenda de paz
  alternative_spanish_readings:
  - para salvación
  - para liberación
  - como ofrenda de bienestar
  rationale: El contexto enumera animales sacrificados y concluye que todos fueron un sacrificio a Yahvé; por eso la frase debe leerse cultualmente. «Ofrenda de paz» comunica ese valor ritual sin borrar el trasfondo semántico de σωτηρία, que se conserva como alternativa.
  doctrine_reference: Translation philosophy §§1, 6
translation_notes:
  revision_awareness: 'La redacción sigue la revisión del audit trail que ajustó el orden para reflejar mejor el griego: el destinatario es «a Yahvé, el Dios de Israel». Además, se mantuvo el cierre colectivo del verso («todos ellos como sacrificio») y se optó por una equivalencia cultual en ὑπὲρ σωτηρίου, con nota de la alternativa literal.'
  spanish_consistency_notes:
  - Se usa «Yahvé» de manera consistente para el nombre divino, conforme al estándar del proyecto.
  - Se mantiene «cautividad» para αἰχμαλωσία como término bíblico natural en español.
  - «Carneros», «corderos» y «machos cabríos» conservan la distinción zoológica del inventario sacrificial.
  - La nota al pie marca la tensión semántica entre la lectura cultual y la literal de σωτηρία sin eliminar ninguna de las dos.
