translation:
  language: es
  text: Entonces Moisés volvió al campamento[a], él y los ancianos de Israel.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «Entonces Moisés fue reunido al campamento, él y los ancianos de Israel». El verbo hebreo puede traducirse más literalmente, pero aquí el contexto indica que Moisés regresó al campamento.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֵּאָסֵף
  english_pob_choice: returned
  chosen_spanish: volvió
  alternatives_spanish:
  - regresó
  - fue reunido
  lexicon: HALOT
  rationale: En este contexto narrativo, el nifal de אסף describe el movimiento de Moisés de vuelta al campamento. «Volvió» conserva el sentido idiomático natural en español sin perder la base verbal del hebreo. «Fue reunido» preserva más literalmente la forma, pero en español sugiere una pasividad que aquí no comunica bien el sentido contextual.
- source_word: אֶל הַמַּחֲנֶה
  english_pob_choice: to the camp
  chosen_spanish: al campamento
  alternatives_spanish:
  - hacia el campamento
  - dentro del campamento
  lexicon: HALOT
  rationale: אֶל marca dirección; en español, «al campamento» reproduce de forma natural la orientación hacia el lugar. «Dentro del campamento» es más interpretativo y no es necesario para el sentido básico.
- source_word: הוּא
  english_pob_choice: he
  chosen_spanish: él
  alternatives_spanish:
  - junto con él
  - mismo
  lexicon: HALOT
  rationale: 'El pronombre hebreo es enfático o appositivo: subraya que fue Moisés quien volvió, junto con los ancianos. «Él» mantiene esa estructura de manera sobria en español. No se amplifica a una frase más explicativa para no sobrepasar el hebreo.'
- source_word: זִקְנֵי יִשְׂרָאֵל
  english_pob_choice: the elders of Israel
  chosen_spanish: los ancianos de Israel
  alternatives_spanish:
  - los mayores de Israel
  - los ancianos israelitas
  lexicon: HALOT
  rationale: «Ancianos» es la correspondencia estándar para זִקְנֵי en el sentido de líderes o representantes del pueblo, y conserva el registro bíblico. «Mayores» sería menos preciso en este contexto institucional.
translation_notes:
  revision_awareness: La revisión más reciente no introdujo cambios; el consenso de auditoría es de alta concordancia y no requiere ajuste textual.
  spanish_consistency_notes:
  - Se mantiene «Moisés» como nombre propio estándar y «ancianos de Israel» como fórmula bíblica clara.
  - «Campamento» traduce מַחֲנֶה con el sentido del campamento israelita, coherente con el contexto narrativo.
  - Se evitó una calca pasiva en el texto principal para reflejar el valor idiomático del nifal con waw consecutiva.
