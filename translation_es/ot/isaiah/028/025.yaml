review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español sigue bien el sentido agrícola del hebreo: nivelar la superficie, esparcir/sembrar distintas semillas y colocarlas deliberadamente en partes específicas del campo. También preserva adecuadamente las incertidumbres léxicas de קֶצַח, שׂוֹרָה y כֻסֶּמֶת mediante notas. Sin embargo, la apertura «¿No es así: cuando…?» no refleja con naturalidad ni fidelidad el valor retórico-temporal de הֲלוֹא אִם, que en contexto funciona mejor como «¿No lo hace así cuando…?» o equivalente, con sujeto explícito implícito en la secuencia verbal.'
  spanish_quality_summary: 'La frase principal es comprensible, pero «¿No es así: cuando…?» suena poco natural en español y debilita la imagen del agricultor actuando. Además, la nota a tiene una formulación defectuosa («O “comino negro” o…») porque la lectura principal ya es «comino negro». La nota c («es incierto con exactitud») también suena poco idiomática. Con ajustes menores, el texto queda claro, digno y natural.'
  glossary_alignment: No hay términos teológicos de proyecto en juego. Léxicamente, «comino negro», «comino», «trigo», «cebada» y «espelta» son adecuados; «espelta» puede mantenerse con nota de alternativa «emmer». «En hileras» para שׂוֹרָה y «en su lugar señalado» para נִסְמָן son coherentes con el rastro de auditoría. Conviene mantener la nota de incertidumbre de שׂוֹרָה y mejorar la redacción de las notas a y c.
  issues:
  - severity: medium
    issue: 'Apertura poco natural y débilmente fiel: «¿No es así: cuando…?»'
    rationale: הֲלוֹא אִם introduce una pregunta retórica con matiz temporal/condicional. En español, la forma actual no expresa bien que el labrador es el sujeto que realiza las acciones; «¿No lo hace así cuando…?» refleja mejor el flujo del original y del POB inglés.
  - severity: low
    issue: Nota a mal formulada
    rationale: La nota dice «O “comino negro” o “alcaravea negra”», pero «comino negro» ya es la opción principal del texto. Debe presentar solo la alternativa relevante y la explicación de incertidumbre.
  - severity: low
    issue: Nota c poco idiomática
    rationale: «Es incierto con exactitud» no suena natural en español. Mejor «la identificación exacta del grano… es incierta» o equivalente.
