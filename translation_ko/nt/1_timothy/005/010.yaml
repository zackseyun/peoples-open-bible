id: 1TI.5.10
reference: 1 Timothy 5:10
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: ἐν ἔργοις καλοῖς μαρτυρουμένη, εἰ ἐτεκνοτρόφησεν, εἰ ἐξενοδόχησεν, εἰ ἁγίων πόδας ἔνιψεν, εἰ θλιβομένοις ἐπήρκεσεν, εἰ παντὶ ἔργῳ ἀγαθῷ ἐπηκολούθησεν.
base_translation:
  language: en
  yaml_path: translation/nt/1_timothy/005/010.yaml
  text: 'well attested for good works: if she has raised children[a], if she has shown hospitality, if she has washed the feet of the saints, if she has helped those under affliction[c][b], if she has followed every good work.'
  footnotes:
  - marker: a
    text: Or 'has welcomed strangers.' The Greek verb refers specifically to receiving guests or strangers into one's home.
    reason: lexical_alternative
  - marker: b
    text: '''The saints'' here refers to God''s holy people, that is, fellow believers.'
    reason: lexical_alternative
  - marker: c
    text: Or 'has followed after every good work.' The Greek expression emphasizes active pursuit and commitment.
    reason: lexical_alternative
translation:
  language: ko
  text: '선한 행실로 인정받은 자라야 합니다: 곧 자녀를 길렀거나, 나그네를 영접했거나[a], 성도들[b]의 발을 씻겼거나, 환난당하는 자들을 도왔거나, 모든 선한 일을 좇아 행한[c] 자입니다.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 또는 「낯선 손님을 받아들였거나」. 헬라어 동사는 손님이나 낯선 사람을 자기 집에 영접하는 것을 가리킨다.
    reason: lexical_alternative
  - marker: b
    text: 본 절의 「성도들」은 하나님의 거룩한 백성, 곧 동료 신자들을 가리킨다.
    reason: lexical_alternative
  - marker: c
    text: 또는 「모든 선한 일을 따라간」. 헬라어 표현은 적극적 추구와 헌신을 강조한다.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐν ἔργοις καλοῖς μαρτυρουμένη
  english_pob_choice: well attested for good works
  chosen_korean: 선한 행실로 인정받은 자
  alternatives_korean:
  - 좋은 행위로 인정받은 자
  - 선한 일로 증언을 얻은 자
  lexicon: BDAG
  rationale: μαρτυρέω 수동의 「인정받음·증언받음」을 「인정받은」으로.
- source_word: ἐτεκνοτρόφησεν
  english_pob_choice: has raised children
  chosen_korean: 자녀를 길렀거나
  alternatives_korean:
  - 자녀를 양육했거나
  lexicon: BDAG
  rationale: 합성어 직역.
- source_word: ἐξενοδόχησεν
  english_pob_choice: has shown hospitality
  chosen_korean: 나그네를 영접했거나
  alternatives_korean:
  - 손님을 대접했거나
  lexicon: BDAG
  rationale: 합성어 본의(낯선 손님 환대).
- source_word: ἁγίων πόδας ἔνιψεν
  english_pob_choice: has washed the feet of the saints
  chosen_korean: 성도들의 발을 씻겼거나
  alternatives_korean:
  - 거룩한 자들의 발을 씻어 주었거나
  lexicon: BDAG
  rationale: 표준 표현.
- source_word: θλιβομένοις ἐπήρκεσεν
  english_pob_choice: helped those under affliction
  chosen_korean: 환난당하는 자들을 도왔거나
  alternatives_korean:
  - 고난받는 자들을 구제했거나
  lexicon: BDAG
  rationale: θλίβω의 「압박·환난」을 「환난」으로.
- source_word: παντὶ ἔργῳ ἀγαθῷ ἐπηκολούθησεν
  english_pob_choice: followed every good work
  chosen_korean: 모든 선한 일을 좇아 행한
  alternatives_korean:
  - 모든 선한 일에 헌신한
  - 모든 선한 일을 따라간
  lexicon: BDAG
  rationale: ἐπακολουθέω의 「뒤따라 행함·헌신」을 「좇아 행한」으로.
