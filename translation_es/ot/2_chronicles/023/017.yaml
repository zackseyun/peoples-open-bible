revisions:
- from: Entonces todo el pueblo fue a la casa de Baal y la derribó[a]; y rompieron en pedazos sus altares y sus imágenes[b], y mataron a Mattán, el sacerdote de Baal, delante de los altares.
  to: Entonces todos fueron a la casa de Baal y la derribaron[a]; y rompieron en pedazos sus altares y sus imágenes[b], y mataron a Mattán, el sacerdote de Baal, delante de los altares.
  rationale: Se corrigió la concordancia verbal para reflejar correctamente los verbos plurales del hebreo y producir un español natural y coherente. También se mantuvo de forma uniforme la grafía 'Mattán' en el texto revisado. No se requieren cambios léxicos mayores ni adjudicación adicional.
  reviewer_model: gpt-5.4
