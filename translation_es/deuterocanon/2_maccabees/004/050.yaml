translation:
  language: es
  text: Pero Menelao, por la avaricia de los que estaban en el poder, permaneció en el cargo, creciendo en maldad, hecho ya un gran maquinador[a] contra sus conciudadanos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'También puede traducirse: «por la codicia de los gobernantes». La frase griega también puede expresarse de manera más formal como referencia a quienes ejercen autoridad.'
    reason: lexical_alternative
lexical_decisions:
- source_word: διὰ τὰς τῶν κρατούντων πλεονεξίας
  english_pob_choice: because of the greed of those in power
  chosen_spanish: por la avaricia de los que tenían el poder
  alternatives_spanish:
  - a causa de la codicia de los que gobernaban
  - por la codicia de los poderosos
  - por la avaricia de los gobernantes
  lexicon: LSJ
  rationale: διά con acusativo expresa causalidad; en español, «por» comunica bien esa relación. πλεονεξία admite «avaricia» y «codicia»; elegí «avaricia» por su fuerza moral y su buen uso en español bíblico actual. κρατούντων se refiere a quienes ejercen el poder, así que «los que tenían el poder» conserva el matiz sin estrecharlo solo a funcionarios.
- source_word: ἔμενεν ἐπὶ τῇ ἀρχῇ
  english_pob_choice: remained in office
  chosen_spanish: permaneció en el cargo
  alternatives_spanish:
  - siguió en el cargo
  - permaneció en el poder
  - continuó en su puesto
  lexicon: LSJ
  rationale: ἀρχή aquí señala cargo o posición de autoridad. «Permaneció en el cargo» es natural en español y evita exagerar el alcance como si implicara dominio absoluto.
- source_word: ἐπιφυόμενος τῇ κακίᾳ
  english_pob_choice: increasing in wickedness
  chosen_spanish: creciendo en maldad
  alternatives_spanish:
  - aumentando en maldad
  - creciendo en perversidad
  - incrementándose en maldad
  lexicon: LSJ
  rationale: El participio presenta una progresión moral. «Creciendo en maldad» mantiene la imagen de aumento y suena idiomático en español; «maldad» transmite bien κακία en este contexto narrativo.
- source_word: μέγας τῶν πολιτῶν ἐπίβουλος καθεστώς
  english_pob_choice: having become a great schemer against his fellow citizens
  chosen_spanish: y llegó a ser un gran conspirador contra sus conciudadanos
  alternatives_spanish:
  - y se había vuelto un gran maquinador contra sus conciudadanos
  - y quedó establecido como gran conspirador contra sus conciudadanos
  - y llegó a ser un gran intrigante contra sus conciudadanos
  lexicon: LSJ
  rationale: ἐπίβουλος es «conspirador», «intrigante» o «maquinador»; elegí «conspirador» porque conserva el sentido de actuar contra otros con intención hostil. τῶν πολιτῶν se traduce con «conciudadanos» para expresar la relación cívica. καθεστώς se entiende como resultado alcanzado, de ahí «llegó a ser».
theological_decisions:
- issue: La fuerza moral y política de πλεονεξία/κρατούντων
  english_pob_reading: because of the greed of those in power
  chosen_spanish_reading: por la avaricia de los que tenían el poder
  alternative_spanish_readings:
  - por la codicia de los que gobernaban
  - por la avaricia de los gobernantes
  rationale: No hay aquí un problema doctrinal, pero sí una tensión lexical entre «gobernantes» y una formulación más amplia. Elegí una expresión que mantiene el sentido político y causal sin reducir κρατούντων únicamente a autoridades formales.
  doctrine_reference: N/A
- issue: El valor de κακία como degradación moral continua
  english_pob_reading: increasing in wickedness
  chosen_spanish_reading: creciendo en maldad
  alternative_spanish_readings:
  - aumentando en maldad
  - creciendo en perversidad
  rationale: La frase presenta una intensificación ética. «Maldad» preserva el juicio moral fuerte sin añadir un matiz técnico que el griego no exige.
  doctrine_reference: N/A
translation_notes:
  revision_awareness: El inglés auditado pasó de «great plotter» a «great schemer» para ἐπίβουλος, y el núcleo causal/administrativo quedó estable. La versión española sigue esa línea con un verbo de resultado («llegó a ser») y un sustantivo de conspiración que mantiene la idea hostil sin exagerarla.
  spanish_consistency_notes:
  - Se conservó un registro bíblico moderno y claro, sin recurrir a «SEÑOR» ni a fórmulas eclesiásticas ajenas al sentido del texto.
  - «Conciudadanos» se eligió para τῶν πολιτῶν porque refleja mejor la relación cívica que un simple «ciudadanos» aislado.
  - No se añadió mayúscula a «maldad» ni a «conspirador», porque aquí no designan títulos ni nombres propios.
