  glossary_alignment: 'Buena alineación general con la terminología del proyecto: «Yahvé» correcto para יְהוָה; «señal» para הָאוֹת; «en nuestra mano» aceptable con nota explicativa. La única desalineación significativa es priorizar en el texto principal una alternativa léxica no escogida por el POB auditado para עֲלוּ עָלֵינוּ.'
