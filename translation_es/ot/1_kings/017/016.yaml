revisions:
- from: La tinaja de harina no se agotó[a], y la vasija de aceite no se vació, conforme a la palabra de Yahvé, que había hablado por medio de Elías.
  to: La tinaja de harina no se agotó, y la vasija de aceite no faltó, conforme a la palabra de Yahvé, que había hablado por medio de Elías[a].
  rationale: Se corrige 'no se vació' a 'no faltó' para reflejar con mayor fidelidad el sentido de חָסֵר y mejorar el paralelismo con 'no se agotó'. Se reubica la nota al pie al segmento que realmente comenta, el modismo 'por medio de Elías', manteniendo la explicación literal preservada en el rastro de auditoría inglés.
