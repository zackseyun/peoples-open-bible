revisions:
- from: El que prepara su espalda para los azotes[a][b] será purificado[c], porque bueno es el Señor para con los que soportan la disciplina[d].
  to: El que prepara su espalda para los azotes[a][b] será limpiado[c], porque el Señor es bueno con los que soportan la disciplina[d].
  rationale: Se ajusta καθαρισθήσεται a «será limpiado» para seguir más de cerca la decisión principal auditada («will be cleansed»), dejando «será purificado» como alternativa en nota. También se mejora la naturalidad del español con «porque el Señor es bueno con...» sin alterar el sentido. Se conserva «azotes» por la continuidad léxica con el verso anterior y «disciplina» por la fuerza correctiva de παιδεία.
