translation:
  language: ko
  text: 유대인의 신화나 진리에서 등을 돌린 사람들의 명령에 마음을 두지 않도록[a] 말입니다.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 또는 「유대인의 신화나 진리에서 등을 돌린 사람들의 인간적 명령에 자신을 내어 주지 않도록」.
    reason: lexical_alternative
lexical_decisions:
- source_word: μὴ προσέχοντες
  english_pob_choice: not paying attention to
  chosen_korean: 마음을 두지 않도록
  alternatives_korean:
  - 주의를 기울이지 않도록
  - 빠지지 않도록
  lexicon: BDAG
  rationale: προσέχω + 여격은 「~에 마음을 두다·전념하다」. 13절의 「건전하게 되도록」 목적절을 이어받는 분사 구문이므로 종속적 연결로 옮긴다.
- source_word: Ἰουδαϊκοῖς μύθοις
  english_pob_choice: Jewish myths
  chosen_korean: 유대인의 신화
  alternatives_korean:
  - 유대적 전설
  - 유대인의 설화
  lexicon: BDAG
  rationale: μῦθος는 「꾸며낸 이야기·신화」. 「신화」가 정립된 한국어 등가어.
- source_word: ἐντολαῖς ἀνθρώπων
  english_pob_choice: commandments of people
  chosen_korean: 사람들의 명령
  alternatives_korean:
  - 사람의 계명
  - 인간의 분부
  lexicon: BDAG
  rationale: 하나님의 명령과 대비된 인간 기원의 규례. 「사람들의 명령」이 자연스럽다.
- source_word: ἀποστρεφομένων τὴν ἀλήθειαν
  english_pob_choice: who turn away from the truth
  chosen_korean: 진리에서 등을 돌린
  alternatives_korean:
  - 진리를 외면하는
  - 진리에서 떠난
  lexicon: BDAG
  rationale: ἀποστρέφομαι(중간태)는 의도적 배척. 「등을 돌리다」가 그 능동적 거부의 어감을 잘 살린다.
