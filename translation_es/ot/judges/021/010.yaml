translation:
  language: es
  text: 'Así que la congregación envió allí doce mil hombres de los hijos de valor[a], y les ordenaron, diciendo: «Vayan y hieran a los habitantes de Jabes de Galaad a filo de espada, junto con las mujeres y los niños pequeños».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O «de los valientes» o «de los guerreros». Hebreo: «de los hijos de valor».'
    reason: lexical_alternative
lexical_decisions:
- source_word: הָעֵדָה
  english_pob_choice: the congregation
  chosen_spanish: la congregación
  alternatives_spanish:
  - la asamblea
  - la comunidad
  lexicon: HALOT
  rationale: עֵדָה nombra al cuerpo reunido de Israel actuando corporativamente. En español, «congregación» conserva bien ese sentido colectivo y corresponde al audit trail inglés sin volverlo eclesiástico en exceso.
- source_word: שָׁם
  english_pob_choice: there
  chosen_spanish: allí
  alternatives_spanish:
  - ahí
  - allá
  lexicon: HALOT
  rationale: El adverbio señala el lugar de envío o de destino en el contexto narrativo. «Allí» es natural y preciso en español.
- source_word: שְׁנֵים עָשָׂר אֶלֶף אִישׁ
  english_pob_choice: twelve thousand men
  chosen_spanish: doce mil hombres
  alternatives_spanish:
  - doce mil soldados
  lexicon: HALOT
  rationale: La expresión numérica y אִישׁ se mantienen con «hombres»; el matiz militar queda apoyado por el contexto y no requiere sustituir el sustantivo por «soldados».
- source_word: מִבְּנֵי הֶחָיִל
  english_pob_choice: from the sons of valor
  chosen_spanish: de los hijos de valor
  alternatives_spanish:
  - de los valientes
  - de los guerreros
  - de los hombres de valor
  lexicon: HALOT
  rationale: Se conserva la imagen hebrea literalmente, como en el inglés auditado. «Hijos de valor» mantiene el idiomático masculino explícito y evita neutralizar el término; la nota ofrece equivalentes más naturales si se necesitan.
- source_word: וַיְצַוּוּ אֹתָם לֵאמֹר
  english_pob_choice: and they commanded them, saying
  chosen_spanish: y les dieron esta orden, diciendo
  alternatives_spanish:
  - y les mandaron, diciendo
  - y les ordenaron, diciendo
  lexicon: HALOT
  rationale: צוה expresa mandato fuerte. En español, «dar esta orden» suena más natural que un calco rígido, pero conserva el valor imperativo del verbo y la cadencia narrativa del participio de habla.
- source_word: לְכוּ
  english_pob_choice: Go
  chosen_spanish: Vayan
  alternatives_spanish:
  - Vayan ustedes
  - Id
  lexicon: HALOT
  rationale: Imperativo plural claro y contemporáneo; «Vayan» funciona bien para la lectura pública y evita arcaísmo.
- source_word: וְהִכִּיתֶם
  english_pob_choice: and strike
  chosen_spanish: y ataquen
  alternatives_spanish:
  - y golpeen
  - y maten
  lexicon: HALOT
  rationale: נכה puede significar golpear, atacar o herir mortalmente. Dado que el complemento «con filo de espada» ya comunica la letalidad, «ataquen» preserva la fuerza del mandato en español sin sobrecargarlo con una expansión interpretativa.
- source_word: יוֹשְׁבֵי יָבֵשׁ גִּלְעָד
  english_pob_choice: the inhabitants of Jabesh-gilead
  chosen_spanish: los habitantes de Jabes de Galaad
  alternatives_spanish:
  - los moradores de Jabes de Galaad
  - los residentes de Jabes de Galaad
  lexicon: HALOT
  rationale: '«Habitantes» reproduce bien el participio sustantivado. Se translitera el topónimo en forma comprensible para el español bíblico: «Jabes de Galaad».'
- source_word: לְפִי חֶרֶב
  english_pob_choice: with the edge of the sword
  chosen_spanish: con filo de espada
  alternatives_spanish:
  - a filo de espada
  - con la espada desenvainada
  lexicon: HALOT
  rationale: El hebreo usa un modismo concreto de violencia con espada. «Con filo de espada» mantiene la imagen sin sonar artificial; es una equivalencia estable en español bíblico formal.
- source_word: וְהַנָּשִׁים
  english_pob_choice: along with the women
  chosen_spanish: junto con las mujeres
  alternatives_spanish:
  - y las mujeres
  - incluidas las mujeres
  lexicon: HALOT
  rationale: La coordinación añade otro grupo al alcance del mandato. «Junto con» reproduce bien el valor acumulativo del hebreo y del inglés auditado.
- source_word: וְהַטָּף
  english_pob_choice: the little children
  chosen_spanish: los niños pequeños
  alternatives_spanish:
  - los niños
  - los pequeñitos
  - los dependientes
  lexicon: HALOT
  rationale: טַף designa a los pequeños/dependientes. «Niños pequeños» conserva la carga afectiva y la referencia a la niñez, de forma más directa que un término técnico como «dependientes».
theological_decisions:
- issue: Mantener sin suavizar el mandato violento
  english_pob_reading: Translate the command directly and plainly, preserving its severity
  chosen_spanish_reading: Traducir la orden de manera directa, preservando su severidad
  alternative_spanish_readings:
  - Suavizar con un eufemismo como «vencer» o «derrotar»
  - Explicitar interpretativamente que la intención es matar en cada cláusula
  rationale: El hebreo presenta una orden de violencia letal contra Jabes de Galaad, incluyendo mujeres y niños. La traducción no debe atenuar ni añadir explicación; debe reflejar la gravedad del texto con claridad y sobriedad.
  doctrine_reference: Principio de primacía de la fuente original; no parafrasear más allá de lo que el texto warrants.
- issue: Conservar el idiomatismo masculino de מִבְּנֵי הֶחָיִל
  english_pob_reading: Preserve the masculine idiom as 'sons of valor' in the main text
  chosen_spanish_reading: Conservar el idiomatismo masculino como «hijos de valor» en el texto principal
  alternative_spanish_readings:
  - «hombres valientes»
  - «guerreros»
  - «varones de valor»
  rationale: El hebreo es explícitamente masculino y formula un modismo. «Hijos de valor» reproduce esa estructura y evita neutralizarla; la nota ofrece alternativas idiomáticas para lectores que prefieran mayor naturalidad.
  doctrine_reference: Principio de precisión de género y de preservación del modismo cuando éste es semánticamente relevante.
translation_notes:
  revision_awareness: Tomé como base el audit trail inglés más reciente, que revisó «assembly» por «congregation» y aclaró «the little children» como una formulación más natural. A la vez, revisé el hebreo directamente para conservar el modismo «hijos de valor» y la progresión sintáctica de mandato, ataque y extensión del objetivo a mujeres y niños, sin suavizar la violencia del pasaje.
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando corresponda al Tetragrámaton; aquí no aparece.
  - «Congregación» se mantiene para עֵדָה en coherencia con el audit trail, sin cargarlo de sentido eclesial.
  - «Filo de espada» conserva el modismo concreto לְפִי חֶרֶב sin traducirlo como un simple «por la espada».
  - La nota de «hijos de valor» preserva la tensión entre literalidad hebrea y naturalidad española; no se sustituye en el texto principal por un equivalente más genérico.
