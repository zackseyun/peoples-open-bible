  text: Μὴ καταλαλεῖτε ἀλλήλων, ἀδελφοί· ὁ καταλαλῶν ἀδελφοῦ ⸀ἢ κρίνων τὸν ἀδελφὸν αὐτοῦ καταλαλεῖ νόμου καὶ κρίνει νόμον· εἰ δὲ νόμον κρίνεις, οὐκ εἶ ποιητὴς νόμου ἀλλὰ κριτής.
base_translation:
  language: en
  yaml_path: translation/nt/james/004/011.yaml
  text: Do not speak against one another[a], brothers. The one who speaks against a brother or judges his brother speaks against the law and judges the law. But if you judge the law[b], you are not a doer of the law but a judge.
  footnotes:
  - marker: a
    text: Or 'Do not slander one another'; the Greek verb can mean to speak against someone in a defamatory way.
    reason: lexical_alternative
  - marker: b
    text: '''Brothers'' here is the Greek masculine plural form and likely addresses the whole community, that is, brothers and sisters.'
    reason: lexical_alternative
