translation:
  language: es
  text: Los entregó en manos de las naciones[a][b], y los que los odiaban gobernaron sobre ellos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «En manos de» reproduce el hebreo idiomático y conserva la imagen de quedar bajo control ajeno.
    reason: cultural_note
  - marker: b
    text: También puede entenderse como «en poder de las naciones».
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּתְּנֵם
  english_pob_choice: He gave them
  chosen_spanish: Los entregó
  alternatives_spanish:
  - Los dio
  - Los puso en manos de
  lexicon: HALOT
  rationale: נתן con objeto pronominal y sujeto implícito expresa aquí la acción de poner a un pueblo bajo el poder de otro. En español, «entregó» conserva mejor la idea de dejar a alguien en poder ajeno que un simple «dio», sin añadir más de lo que el hebreo exige.
- source_word: בְּיַד
  english_pob_choice: into the hand of
  chosen_spanish: en mano de
  alternatives_spanish:
  - en la mano de
  - en el poder de
  - bajo el poder de
  lexicon: HALOT
  rationale: La expresión hebrea es idiomática. «En mano de» reproduce la imagen bíblica de estar bajo control ajeno, y en español es suficientemente clara y natural en este contexto poético.
- source_word: גּוֹיִם
  english_pob_choice: the nations
  chosen_spanish: las naciones
  alternatives_spanish:
  - los pueblos
  - los gentiles
  lexicon: HALOT
  rationale: Aquí גּוֹיִם se refiere a naciones extranjeras como instrumento de juicio. «Las naciones» mantiene el valor habitual del término en los Salmos y evita el matiz más confesional o eclesiástico de «gentiles».
- source_word: וַיִּמְשְׁלוּ
  english_pob_choice: ruled over
  chosen_spanish: gobernaron sobre
  alternatives_spanish:
  - dominaron sobre
  - regían sobre
  lexicon: HALOT
  rationale: מָשַׁל significa gobernar o ejercer dominio. «Gobernaron sobre» conserva la relación de autoridad y evita que «dominaron» suene más interpretativo o violento de lo que el verbo requiere.
- source_word: בָהֶם
  english_pob_choice: over them
  chosen_spanish: sobre ellos
  alternatives_spanish:
  - sobre ellos mismos
  - sobre ellos con poder
  lexicon: HALOT
  rationale: El hebreo con מָשַׁל exige la preposición de relación de autoridad. «Sobre ellos» es la forma natural y fiel en español.
- source_word: שֹׂנְאֵיהֶם
  english_pob_choice: those who hated them
  chosen_spanish: los que los odiaban
  alternatives_spanish:
  - sus odiadores
  - sus enemigos
  lexicon: HALOT
  rationale: El participio expresa hostilidad activa. «Los que los odiaban» es más literal y transparente que «sus enemigos», que amplía el sentido más allá del dato léxico.
theological_decisions:
- issue: Agencia divina en el juicio de Israel
  english_pob_reading: The verse states that God actively gave Israel into the power of foreign nations as an act of judgment.
  chosen_spanish_reading: El verso mantiene la afirmación de que Dios los entregó en poder de las naciones como acto de juicio.
  alternative_spanish_readings:
  - Dios permitió que cayeran en poder de las naciones.
  - Fueron puestos en poder de las naciones.
  rationale: El hebreo atribuye la acción de manera directa al sujeto divino implícito en el verbo. Conviene conservar esa fuerza sin suavizarla a mera permisión ni desplazar el sujeto a una pasiva impersonal.
  doctrine_reference: 'Translation philosophy: preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: El texto coincide con la última revisión auditada, que no introdujo cambios y fue validado con alto grado de acuerdo.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» solo cuando el hebreo lo exige explícitamente; en este versículo no aparece.
  - Se preserva la fuerza causal/judicial del verbo hebreo sin convertirla en mera permisión.
  - Se conserva el paralelismo entre la entrega inicial y el dominio posterior de los odiadores.
