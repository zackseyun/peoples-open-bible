translation:
  language: es
  text: Hay un sabio que es despreciado por sus palabras[a], y se le priva de todo alimento agradable.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'El griego dice: «El sabio entre su pueblo heredará confianza, y su nombre vivirá para siempre». El hebreo y el griego difieren sustancialmente aquí.'
    reason: textual_variant
lexical_decisions:
- source_word: וְיֵשׁ
  english_pob_choice: There is
  chosen_spanish: Hay
  alternatives_spanish:
  - Y hay
  - Existe
  lexicon: HALOT
  rationale: La apertura existencial se expresa con naturalidad en español con «Hay», sin forzar un matiz conjuntivo innecesario.
- source_word: חָכָם
  english_pob_choice: a wise man
  chosen_spanish: un sabio
  alternatives_spanish:
  - un hombre sabio
  - un sage
  lexicon: HALOT
  rationale: «Sabio» conserva el sustantivo masculino singular y suena natural en español bíblico contemporáneo.
- source_word: בִּדְבָרוֹ
  english_pob_choice: for his words
  chosen_spanish: por sus palabras
  alternatives_spanish:
  - por su palabra
  - a causa de lo que dice
  - por su hablar
  lexicon: HALOT
  rationale: 'La preposición ב con דָּבָר aquí tiene fuerza causal/instrumental: la deshonra recae sobre él a causa de su hablar. «Por sus palabras» mantiene el plural colectivo implícito y sigue de cerca el hebreo y la revisión inglesa.'
- source_word: נִמְאָס
  english_pob_choice: is despised
  chosen_spanish: es despreciado
  alternatives_spanish:
  - es rechazado
  - es aborrecido
  lexicon: HALOT
  rationale: El nifal de מאס indica ser rechazado o despreciado; «despreciado» conserva bien el sentido social y moral.
- source_word: וּמִכָּל מַאֲכָל תַּעֲנוּג
  english_pob_choice: of every pleasant food
  chosen_spanish: de todo alimento agradable
  alternatives_spanish:
  - de toda comida agradable
  - de toda delicia
  - de todo manjar agradable
  lexicon: HALOT
  rationale: La frase apunta a alimento/comida de agrado o deleite. «Alimento agradable» preserva la imagen concreta sin introducir una paráfrasis más amplia.
- source_word: נִבְצָר
  english_pob_choice: is deprived
  chosen_spanish: se le priva
  alternatives_spanish:
  - le es negado
  - se le retiene
  - queda privado
  lexicon: HALOT
  rationale: Con la idea de inaccesibilidad o retención, «se le priva» comunica bien el resultado en español y mantiene la pasiva de sentido.
theological_decisions:
- issue: Divergencia textual entre el hebreo conservado y el paralelo griego en Sirácides 37:26
  english_pob_reading: Translate the extant Hebrew as the main text; preserve the Greek alternative in a footnote because the traditions differ substantially.
  chosen_spanish_reading: Traducir el hebreo conservado como texto principal, con nota que registre el griego alternativo.
  alternative_spanish_readings:
  - «El sabio entre su pueblo heredará confianza, y su nombre vivirá para siempre.»
  rationale: En Sirácides, cuando el hebreo está disponible, gobierna el texto principal. Aquí el griego no es una variante menor sino una línea sustancialmente distinta; por transparencia, la nota preserva esa lectura alternativa sin desplazar el hebreo.
  doctrine_reference: 'PHILOSOPHY.md: priorizar el hebreo donde se conserva en Sirácides y documentar honestamente la incertidumbre textual'
translation_notes:
  revision_awareness: La redacción sigue la última revisión inglesa, que ajustó «for his speech» a «for his words» para reflejar con mayor precisión el singular colectivo del hebreo בִּדְבָרוֹ. La versión española conserva esa decisión con «por sus palabras».
  spanish_consistency_notes:
  - Se mantuvo «sabio» para חָכָם y no «sabio/a» ni «sabio hombre», porque el hebreo es masculino singular y el registro bíblico español lo admite con naturalidad.
  - Se prefirió «Yahvé» cuando no aparece en este versículo, por coherencia de proyecto, pero aquí no era aplicable.
  - «Alimento agradable» evita «manjar» como opción más marcada y conserva la neutralidad requerida para una lectura pública amplia.
  - La nota al pie registra la discrepancia textual sin armonizar artificialmente hebreo y griego.
