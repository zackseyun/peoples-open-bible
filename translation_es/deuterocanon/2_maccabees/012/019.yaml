lexical_decisions:
- source_word: Δωσίθεος δὲ καὶ Σωσίπατρος
  english_pob_choice: Dositheus and Sosipater
  chosen_spanish: Dositreo y Sosípatro
  alternatives_spanish:
  - Dositheo y Sosípater
  - Dositeo y Sosípatro
  lexicon: Onomastic transliteration from Greek forms
  rationale: Se conserva la identificación propia con una transliteración española natural y estable. 'Dositreo' y 'Sosípatro' reflejan mejor la adaptación fonética al español que una transliteración demasiado pegada al inglés.
- source_word: τῶν περὶ τὸν Μακκαβαῖον ἡγουμένων
  english_pob_choice: leaders under Maccabaeus
  chosen_spanish: líderes bajo Macabeo
  alternatives_spanish:
  - jefes bajo Macabeo
  - dirigentes con Macabeo
  - comandantes bajo Macabeo
  lexicon: LSJ
  rationale: ἡγουμένων señala a quienes van al frente o dirigen; 'líderes' conserva esa amplitud sin forzar un cargo militar técnico. 'Bajo Macabeo' mantiene la relación de subordinación/adscripción que el contexto exige.
- source_word: ἐξοδεύσαντες
  english_pob_choice: marched out
  chosen_spanish: marcharon
  alternatives_spanish:
  - salieron
  - salieron marchando
  - se desplegaron
  lexicon: LSJ
  rationale: El participio tiene sentido de salir hacia una acción militar; 'marcharon' comunica ese movimiento con naturalidad en español y evita una calca demasiado literal.
- source_word: τοὺς ὑπὸ Τιμοθέου ἀπώλεσαν καταλειφθέντας
  english_pob_choice: those left behind by Timothy ... destroyed
  chosen_spanish: a los que había dejado atrás Timoteo ... destruyeron
  alternatives_spanish:
  - a los que Timoteo había dejado atrás ... destruyeron
  - a los hombres abandonados por Timoteo ... destruyeron
  - a los que quedaron de parte de Timoteo ... destruyeron
  lexicon: LSJ
  rationale: 'La construcción se entiende mejor uniendo ὑπὸ Τιμοθέου con καταλειφθέντας: ''los que había dejado atrás Timoteo''. Esto evita fragmentar la sintaxis y mantiene la acción previa de Timoteo antes de la destrucción.'
- source_word: ἀπώλεσαν
  english_pob_choice: destroyed
  chosen_spanish: destruyeron
  alternatives_spanish:
  - mataron
  - aniquilaron
  - arrasaron
  lexicon: LSJ
  rationale: '''Destruyeron'' conserva el sentido amplio de ruina o aniquilación militar sin cerrar el alcance exacto del verbo a un matiz exclusivamente mortal.'
- source_word: ἐν τῷ ὀχυρώματι
  english_pob_choice: in the stronghold
  chosen_spanish: en la fortaleza
  alternatives_spanish:
  - en el fuerte
  - en la fortificación
  - en la plaza fuerte
  lexicon: LSJ
  rationale: ὀχύρωμα designa un lugar fortificado; 'fortaleza' es claro y natural en español, y comunica bien el contexto militar.
- source_word: πλείους τῶν μυρίων ἀνδρῶν
  english_pob_choice: more than ten thousand men
  chosen_spanish: más de diez mil hombres
  alternatives_spanish:
  - más de diez mil varones
  - más de diez mil soldados
  lexicon: LSJ
  rationale: μυρίοι indica diez mil; la comparación expresa 'más de'. 'Hombres' mantiene el referente humano y militar de manera idiomática en español.
translation_notes:
  revision_awareness: Se corrigió la validación anterior anclando la nota [a] directamente en el verbo 'marcharon' del texto español. La redacción mantiene la secuencia narrativa y evita introducir notas sin anclaje.
  spanish_consistency_notes:
  - Se mantiene 'Macabeo' como forma breve del nombre, coherente con el contexto de 2 Macabeos y con el uso editorial español.
  - Se evita 'SEÑOR' u այլ sustituciones no pertinentes porque el versículo no contiene el nombre divino ni una cita de κύριος.
  - La cifra se expresa en forma literal 'diez mil' para reflejar μυρίων sin amplificación interpretativa.
