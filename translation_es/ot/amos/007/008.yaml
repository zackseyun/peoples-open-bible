base_translation:
  language: en
  yaml_path: translation/ot/amos/007/008.yaml
  text: And Yahweh said to me[a], “What do you see, Amos?” And I said, “A plumb line.” Then the Lord said, “Look, I am setting a plumb line in the midst of my people Israel[b]; I will not again pass by them.”
  footnotes:
