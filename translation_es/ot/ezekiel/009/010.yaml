translation:
  language: es
  text: Y en cuanto a mí, mi ojo no tendrá compasión, ni tendré piedad; he hecho recaer su conducta[a] sobre sus cabezas[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'su camino'. El hebreo 'camino' es un modismo para la manera de vivir o el comportamiento.
    reason: lexical_alternative
  - marker: b
    text: '''Sobre sus cabezas'' es una expresión hebrea de retribución que vuelve sobre el culpable.'
    reason: cultural_note
lexical_decisions:
- source_word: וְגַם אֲנִי
  english_pob_choice: And as for me
  chosen_spanish: Y en cuanto a mí
  alternatives_spanish:
  - Y yo también
  - Y por mi parte
  - Y en cuanto a mí mismo
  lexicon: HALOT
  rationale: La partícula aditiva con el pronombre independiente expresa énfasis y contraste. 'En cuanto a mí' comunica bien ese valor enfático en español sin sonar forzado, y evita un simple 'yo' que debilitaría el matiz.
- source_word: לֹא תָחוֹס עֵינִי
  english_pob_choice: my eye will not spare
  chosen_spanish: mi ojo no tendrá compasión[a]
  alternatives_spanish:
  - mi ojo no perdonará
  - mi ojo no se compadecerá
  - mi ojo no mostrará compasión
  lexicon: HALOT
  rationale: Se conserva la imagen concreta de 'mi ojo' y el sentido idiomático de negar misericordia. 'Tener compasión' transmite con naturalidad el valor de חס en español, manteniendo la fuerza del juicio.
- source_word: וְלֹא אֶחְמֹל
  english_pob_choice: nor will I show pity
  chosen_spanish: ni tendré piedad[b]
  alternatives_spanish:
  - ni mostraré piedad
  - ni me compadeceré
  - ni tendré compasión
  lexicon: HALOT
  rationale: חמל se acerca semánticamente a misericordia/compasión; 'piedad' permite distinguir este miembro del paralelo sin repetir exactamente la misma palabra del primer cola, preservando el paralelismo hebreo.
- source_word: דַּרְכָּם
  english_pob_choice: their way
  chosen_spanish: su conducta
  alternatives_spanish:
  - su camino
  - sus caminos
  - su manera de vivir
  lexicon: HALOT
  rationale: El hebreo usa 'camino' como idiomático para conducta o modo de vida. En español, 'conducta' explicita el sentido moral sin alejarse del valor figurado que el POB inglés dejó abierto con una nota.
- source_word: בְּרֹאשָׁם
  english_pob_choice: upon their heads
  chosen_spanish: sobre su propia cabeza
  alternatives_spanish:
  - sobre sus cabezas
  - en sus cabezas
  - recaerá sobre ellos
  lexicon: HALOT
  rationale: Se mantiene la imagen de retribución que cae sobre el culpable. 'Sobre su propia cabeza' hace explícito el sentido idiomático en español, como permitía la nota cultural del POB en inglés, sin perder la metáfora judicial.
- source_word: נָתָתִּי
  english_pob_choice: I have brought
  chosen_spanish: he puesto
  alternatives_spanish:
  - he traído
  - he dado
  - he colocado
  lexicon: HALOT
  rationale: Aunque literalmente el verbo puede ser 'dar/poner', en este contexto de juicio la construcción española más natural es 'he puesto ... sobre'. Mantiene el acto soberano de imponer retribución sin introducir explicaciones ajenas al texto.
theological_decisions:
- issue: Retribución judicial y compasión divina
  english_pob_reading: The verse declares that God will withhold sparing mercy and repay the people's conduct upon them, without softening the severity.
  chosen_spanish_reading: El versículo declara que Yahvé retendrá la compasión y hará recaer la conducta sobre los culpables, sin suavizar la severidad del juicio.
  alternative_spanish_readings:
  - Yahvé no perdonará y devolverá a cada uno según su conducta
  - Dios no tendrá compasión y hará volver su camino sobre ellos
  rationale: Se conserva la dureza del juicio profético y la doble negación de compasión/piedad. No se atenúa el texto ni se añade una explicación doctrinal; se mantiene la imagen de retribución que recae sobre el propio culpable.
  doctrine_reference: Ezequiel 9:10; Traducción con tensión lexical preservada
- issue: Referencia al nombre divino
  english_pob_reading: The English POB uses 'my eye' and judgment language without masking the divine name here, but the broader project renders YHWH as Yahvé.
  chosen_spanish_reading: No aparece el Tetragrámaton en este versículo; por tanto, la traducción no introduce una sustitución innecesaria.
  alternative_spanish_readings:
  - Señor
  - YHWH
  rationale: No hay mención explícita del nombre divino en el hebreo de este versículo. La decisión relevante aquí es no introducir un término que no esté presente en el texto fuente.
  doctrine_reference: Política terminológica del proyecto POB
translation_notes:
  revision_awareness: La redacción sigue la lectura revisada del POB inglés que eliminó el 'also' redundante y mantuvo 'And as for me'. En español se optó por 'Y en cuanto a mí' para conservar el énfasis sin redundancia. También se respetó la tensión léxica entre חס y חמל mediante dos términos cercanos pero no idénticos.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' solo cuando el nombre divino está presente; aquí no aparece, así que no se inserta.
  - '''Compasión'' y ''piedad'' se distribuyen para reflejar el paralelismo hebreo de dos verbos cercanos pero no idénticos.'
  - La nota a se ancla en 'compasión' para permitir la alternativa 'conducta' sin alterar el cuerpo del texto.
  - La nota b se ancla en 'piedad' y preserva la imagen idiomática de retribución sin convertirla en paráfrasis extensa.
