lexical_decisions:
- source_word: וַיִּסְעוּ
  english_pob_choice: They set out
  chosen_spanish: Partieron
  alternatives_spanish:
  - Se pusieron en camino
  - Salieron
  lexicon: HALOT
  rationale: En la fórmula itinerante del desierto, נסע expresa el movimiento de una estación a otra. «Partieron» conserva el valor de salida sin sonar mecánico en español.
- source_word: מֵרִסָּה
  english_pob_choice: from Rissah
  chosen_spanish: de Rissá
  alternatives_spanish:
  - desde Rissá
  lexicon: Nombre propio transliterado
  rationale: Es un nombre de lugar; se translitera y se mantiene la preposición de origen con «de», natural en español para indicar procedencia.
- source_word: וַיַּחֲנוּ
  english_pob_choice: and camped
  chosen_spanish: acamparon
  alternatives_spanish:
  - y acamparon
  - y acamparon allí
  lexicon: HALOT
  rationale: חנה en contextos de itinerario se refiere a establecer el campamento. «Acamparon» comunica la acción concreta con naturalidad; el sujeto verbal ya enlaza la secuencia narrativa.
- source_word: בִּקְהֵלָתָה
  english_pob_choice: at Kehelathah
  chosen_spanish: en Queelatá
  alternatives_spanish:
  - en Keelatá
  - en Kehelatá
  lexicon: Nombre propio transliterado
  rationale: Se translitera el topónimo. Se prefirió «en» porque el hebreo usa בְּ, que en español normalmente se expresa mejor con una localización estática en el lugar del campamento.
