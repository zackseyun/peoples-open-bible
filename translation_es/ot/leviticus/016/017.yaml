    issue: El texto principal usa 'ningún hombre' para כָל אָדָם.
    rationale: Aunque el hebreo usa singular masculino con fuerza genérica, el expediente inglés revisado cambió a 'no person'. En español, 'ningún hombre' puede leerse como excluyendo a varones específicamente, mientras que el contexto exige una prohibición general.
  - severity: medium
    issue: '''Por su casa'' para בֵּיתוֹ es demasiado literal y potencialmente ambiguo.'
    rationale: En contexto sacerdotal, בֵּיתוֹ se refiere al hogar/familia/household, no al edificio. 'Su familia' comunica mejor el referente en español contemporáneo y coincide mejor con la rationale inglesa de 'household'.
