translation:
  language: es
  text: Que sus hijos anden vagando y pidan limosna; que busquen de sus ruinas[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «que busquen lejos de sus ruinas», tomando la preposición como separación en vez de origen.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְנֹועַ יָנוּעוּ
  english_pob_choice: may his children wander about
  chosen_spanish: anden errantes
  alternatives_spanish:
  - vaguen
  - anden vagando
  - vayan errantes
  lexicon: HALOT
  rationale: La construcción infinitivo absoluto + imperfecto intensifica la idea de movimiento continuo. En español, «anden errantes» conserva ese sentido de deambular sin rumbo con un tono jussivo adecuado al contexto imprecatorio.
- source_word: בָנָיו
  english_pob_choice: his children
  chosen_spanish: sus hijos
  alternatives_spanish:
  - sus hijos varones
  - sus niños
  lexicon: HALOT
  rationale: בנים puede referirse a hijos en sentido amplio. «Sus hijos» mantiene la naturalidad en español y no restringe indebidamente el alcance del término.
- source_word: וְשִׁאֵלוּ
  english_pob_choice: and beg
  chosen_spanish: pidan limosna
  alternatives_spanish:
  - pidan
  - mendigan
  - soliciten
  lexicon: HALOT
  rationale: En este contexto de miseria y ruina, שאל no suena como una simple petición, sino como una búsqueda de caridad o ayuda. «Pidan limosna» expresa esa fuerza sin salir del marco semántico.
- source_word: וְדָרְשׁוּ
  english_pob_choice: may they seek from their ruins
  chosen_spanish: que busquen
  alternatives_spanish:
  - que busquen ayuda
  - que busquen sustento
  - que inquieran
  lexicon: HALOT
  rationale: דרש significa «buscar/indagar». Como el hebreo no explicita el objeto, se conserva la brevedad con «busquen», evitando añadir contenido no presente en el texto base.
- source_word: מֵחָרְבוֹתֵיהֶם
  english_pob_choice: from their ruins
  chosen_spanish: en sus ruinas
  alternatives_spanish:
  - de sus ruinas
  - desde sus ruinas
  - a causa de sus ruinas
  lexicon: HALOT
  rationale: El מן puede marcar origen o separación, y el sustantivo חרבות alude a lugares arrasados. «En sus ruinas» comunica bien el ámbito donde realizan la búsqueda; se preserva la ambigüedad entre procedencia y localización sin forzar una sola lectura.
translation_notes:
  revision_awareness: Se siguió el ajuste editorial del inglés POB que eliminó «food» por no estar explícito en el hebreo. También se mantuvo la estructura paralela de dos miembros con valor de imprecación/jussivo, evitando añadir objetos no expresados.
  spanish_consistency_notes:
  - Se usó «hijos» para בָנָיו, en línea con el valor familiar amplio del hebreo.
  - Se evitó introducir «comida» o «sustento», porque el texto hebreo solo dice «buscar» y la revisión inglesa retiró «food».
  - Se preservó la ambigüedad de מִן al traducir con «en sus ruinas», lo que deja abierta la lectura de localización o separación.
