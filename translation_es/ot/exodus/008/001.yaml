  source_alignment_summary: 'El borrador español conserva fielmente la secuencia narrativa y los mandatos del hebreo: Yahvé habla a Moisés, Moisés debe decir a Aarón que extienda su mano con la vara sobre tres clases de aguas y que haga subir las ranas sobre la tierra de Egipto. Se preservan bien el nombre divino יְהוָה como ''Yahvé'', el imperativo ''Di'', el gesto físico ''Extiende tu mano'', el valor instrumental de בְּמַטֶּךָ con ''con tu vara'', y el sentido causativo de וְהַעַל con ''haz subir''. La nota sobre ''canales del Nilo'' refleja adecuadamente la alternativa léxica documentada para הַיְאֹרִים.'
