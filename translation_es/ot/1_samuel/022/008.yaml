translation:
  language: es
  text: Porque todos vosotros habéis conspirado contra mí, y nadie me lo revela[a] cuando mi hijo hace alianza con el hijo de Isaí[b], y ninguno de vosotros se duele por mí[c] ni me lo revela, que mi hijo ha incitado a mi siervo contra mí para tender una emboscada[d], como sucede hoy.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El hebreo dice literalmente «descubre mi oído», un modismo que significa «me informa» o «me lo revela».
    reason: lexical_alternative
  - marker: b
    text: «El hijo de Isaí» es David; Saúl usa el patronímico en vez de su nombre.
    reason: cultural_note
  - marker: c
    text: O «ninguno de vosotros tiene compasión de mí» / «ninguno de vosotros se preocupa por mí».
    reason: lexical_alternative
  - marker: d
    text: O «ha levantado a mi siervo contra mí para un ataque por sorpresa».
    reason: lexical_alternative
lexical_decisions:
- source_word: קְשַׁרְתֶּם
  english_pob_choice: have conspired
  chosen_spanish: habéis conspirado
  alternatives_spanish:
  - habéis tramado
  - os habéis confabulado
  lexicon: HALOT
  rationale: קשר en este contexto expresa una conspiración hostil contra el rey, no solo una alianza. «Habéis conspirado» conserva esa fuerza acusatoria en español natural y bíblico.
- source_word: גֹּלֶה אֶת אָזְנִי
  english_pob_choice: reveals it to me
  chosen_spanish: me revela
  alternatives_spanish:
  - me descubre el oído
  - me lo da a conocer
  lexicon: HALOT
  rationale: El hebreo usa el modismo «descubrir el oído», es decir, informar o revelar. En español, «me revela» comunica bien el sentido sin perder la idea de comunicación previa de información.
- source_word: בִּכְרָת
  english_pob_choice: when ... makes
  chosen_spanish: cuando ... hace pacto
  alternatives_spanish:
  - al hacer pacto
  - cuando ... pacta
  lexicon: HALOT
  rationale: La construcción con ב marca circunstancia temporal; el sentido idiomático en español se expresa de forma más clara con «cuando hace pacto» que con un calco como «en cortar».
- source_word: בְּנִי עִם בֶּן יִשַׁי
  english_pob_choice: my son makes a covenant with the son of Jesse
  chosen_spanish: mi hijo hace pacto con el hijo de Isaí
  alternatives_spanish:
  - mi hijo pacta con el hijo de Isaí
  - mi hijo hace alianza con el hijo de Isaí
  lexicon: HALOT
  rationale: Se conserva el parentesco de David mediante el patronímico «hijo de Isaí», como en el texto fuente, porque Saul evita nombrarlo directamente. «Hace pacto» mantiene el verbo formal y sobrio del pasaje.
- source_word: חֹלֶה ... עָלַי
  english_pob_choice: is sorry for me
  chosen_spanish: se compadece de mí
  alternatives_spanish:
  - se duele por mí
  - tiene compasión de mí
  lexicon: HALOT
  rationale: El participio aquí no significa enfermedad literal, sino preocupación o simpatía por Saúl. «Se compadece de mí» recoge mejor esa carga emocional que «está enfermo».},{
- source_word: הֵקִים
  english_pob_choice: has stirred up
  chosen_spanish: ha levantado
  alternatives_spanish:
  - ha incitado
  - ha suscitado
  lexicon: HALOT
  rationale: Aunque «ha levantado» es más literal, en este contexto expresa que Jonathan ha puesto a David en una postura de oposición activa contra Saúl. Se conserva la formulación cercana al hebreo, apoyada por el audit trail que también admite «raised up».
- source_word: עַבְדִּי
  english_pob_choice: my servant
  chosen_spanish: mi siervo
  alternatives_spanish:
  - mi servidor
  - mi esclavo
  lexicon: HALOT
  rationale: Aquí David es presentado como subordinado real de Saúl; «siervo» mantiene la relación de servicio con dignidad castellana y evita introducir una connotación de esclavitud no explícita en este contexto.
- source_word: לְאֹרֵב
  english_pob_choice: to lie in wait
  chosen_spanish: para tender una emboscada
  alternatives_spanish:
  - para acechar
  - para estar al acecho
  lexicon: HALOT
  rationale: La idea es la de una acción hostil de acecho/emboscada. «Tender una emboscada» es claro y conserva el matiz militar y agresivo del hebreo.
- source_word: כַּיּוֹם הַזֶּה
  english_pob_choice: as at this day
  chosen_spanish: como en este día
  alternatives_spanish:
  - como hasta el día de hoy
  - tal como sucede hoy
  lexicon: HALOT
  rationale: El modismo apunta al estado presente de los hechos. «Como en este día» mantiene el tono retórico formal del discurso de Saúl y es fiel a la expresión hebrea.
translation_notes:
  revision_awareness: La redacción española sigue de cerca la última revisión inglesa, especialmente en el uso de «reveals it to me» y la preferencia por una expresión natural de compasión. También se preserva la tensión lexical entre el modismo hebreo de «descubrir el oído» y su equivalencia idiomática en español.
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando el texto fuente lo requiere; este versículo no contiene el tetragrámaton.
  - «Hijo de Isaí» se mantiene como patronímico, siguiendo el distanciamiento de Saúl respecto de David.
  - «Siervo» se usa para עבד en este contexto político/cortesano, no «esclavo».
  - 'La frase final conserva el tono formal de acusación: «como en este día».'
