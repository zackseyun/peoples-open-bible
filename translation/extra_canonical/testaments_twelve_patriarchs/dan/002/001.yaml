    μὴ φυλάξητε⁴ ἑαυτοὺς ἀπὸ *τοῦ πνεύματος⁵ *τοῦ ψεύδους καὶ τοῦ θυμοῦ⁶, καὶ ἀγαπήσητε⁷
  language: Greek
