  to: 'pero[a]: «¡Vive Yahvé, que hizo subir a los hijos de Israel de la tierra del norte y de todas las tierras adonde los había arrojado!». Porque los haré volver a su propia tierra, la que di a sus padres[b].'
  rationale: 'Se conserva la redacción principal porque transmite fielmente el sentido del hebreo y mantiene bien la terminología del proyecto. Se reparan dos puntos: (1) las notas, para reflejar la alternativa léxica relevante en «sus padres» y eliminar una nota redundante sobre «Yahvé»; y (2) el texto, para colocar el marcador [b] donde corresponde. También se normaliza el conjunto de la cita para que las notas queden alineadas con los puntos léxicos significativos del expediente.'
