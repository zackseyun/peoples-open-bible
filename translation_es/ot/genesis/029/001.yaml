translation:
  language: es
  text: Entonces Jacob levantó los pies[a] y fue a la tierra de los hijos del oriente[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: ''levantó los pies'', un modismo que significa que emprendió o reanudó su camino.'
    reason: lexical_alternative
  - marker: b
    text: O 'los pueblos del oriente' o 'los orientales'.
    reason: alternative_reading
lexical_decisions:
- source_word: וַיִּשָּׂא ... רַגְלָיו
  english_pob_choice: lifted up his feet
  chosen_spanish: alzó sus pies
  alternatives_spanish:
  - partió
  - se puso en camino
  - levantó sus pies
  lexicon: HALOT
  rationale: 'La expresión hebrea es idiomática: literalmente habla de ''levantar los pies'', pero el sentido narrativo es que Jacob reanudó o emprendió el viaje. En español, ''alzó sus pies'' conserva la imagen sin volverla incomprensible; también deja visible la tensión entre literalidad e idiomatismo que el POB inglés documenta.'
- source_word: וַיֵּלֶךְ
  english_pob_choice: went
  chosen_spanish: fue
  alternatives_spanish:
  - anduvo
  - viajó
  - partió
  lexicon: HALOT
  rationale: El verbo común de movimiento pide en español una forma simple y natural. 'Fue' mantiene el carácter narrativo directo del hebreo y se coordina bien con la primera cláusula idiomática.
- source_word: אַרְצָה
  english_pob_choice: to the land
  chosen_spanish: a la tierra
  alternatives_spanish:
  - hacia la tierra
  - a la región
  lexicon: HALOT
  rationale: El sufijo direccional indica movimiento hacia un destino. 'A la tierra' reproduce esa dirección de manera clara y formal, sin añadir una especificación que el texto no da.
- source_word: בְנֵי קֶדֶם
  english_pob_choice: the sons of the east
  chosen_spanish: los hijos del oriente
  alternatives_spanish:
  - los pueblos del oriente
  - los orientales
  - la gente del oriente
  lexicon: HALOT
  rationale: Se preserva la forma semítica 'hijos de' porque el POB inglés la retuvo y porque en español puede funcionar como etnónimo o designación grupal. 'Oriente' evita un giro demasiado interpretativo y mantiene la expresión geográfica-ethnográfica del hebreo.
translation_notes:
  revision_awareness: Se tomó en cuenta la revisión inglesa más reciente, que prefirió una traducción más directa del modismo hebreo ('lifted up his feet') en lugar de una paráfrasis como 'set out'. La versión española sigue esa decisión al conservar la imagen corporal del hebreo, pero con una sintaxis fluida y publicable en español.
  spanish_consistency_notes:
  - Se evita 'SEÑOR' porque este versículo no contiene el tetragrámaton.
  - '''Tierra'' traduce el valor direccional de אַרְצָה sin añadir ''país'' o ''territorio''.'
  - '''Hijos del oriente'' conserva la estructura hebrea y la posible ambigüedad etnográfica señalada por el POB inglés.'
