translation:
  language: es
  text: 'Porque el Señor hizo que el campamento de Aram[a] oyera el sonido de carros, el sonido de caballos, el sonido de un gran ejército[b], y se dijeron unos a otros[c]: «Miren, el rey de Israel ha contratado a los reyes de los hititas y a los reyes de Egipto contra nosotros, para venir contra nosotros».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «el campamento arameo».
    reason: lexical_alternative
  - marker: b
    text: 'El hebreo repite «el sonido de»: «el sonido de carros, el sonido de caballos, el sonido de un gran ejército».'
    reason: lexical_alternative
  - marker: c
    text: Literalmente, «cada uno a su hermano».
    reason: lexical_alternative
lexical_decisions:
- source_word: וַאדֹנָי
  english_pob_choice: the Lord
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el Señor
  - el Dueño
  lexicon: HALOT
  rationale: En este contexto narrativo se trata del Dios de Israel actuando soberanamente; el POB en español usa Yahvé para el nombre divino en lugar de ocultarlo con un título. Aunque el hebreo aquí es אֲדֹנָי y no el Tetragrámaton, la referencia es claramente al Dios de Israel.
- source_word: הִשְׁמִיעַ
  english_pob_choice: had caused ... to hear
  chosen_spanish: había hecho que ... oyera
  alternatives_spanish:
  - había causado que ... oyera
  - había hecho oír a ...
  lexicon: HALOT
  rationale: 'El hifil conserva el valor causativo: Yahvé no solo permitió oír, sino que hizo percibir el sonido al campamento arameo. La construcción española mantiene esa causalidad de forma natural.'
- source_word: מַחֲנֵה אֲרָם
  english_pob_choice: the camp of Aram
  chosen_spanish: el campamento de Aram
  alternatives_spanish:
  - el campamento arameo
  - el campamento de Siria
  lexicon: HALOT
  rationale: Se conserva Aram como nombre propio, como en el texto hebreo, evitando la equivalencia interpretativa 'Siria'. 'Campamento de Aram' es fiel y claro en español.
- source_word: ק֥וֹל רֶכֶב ק֣וֹל סוּס ק֖וֹל חַ֣יִל גָּדֹול
  english_pob_choice: the sound of chariots, the sound of horses, the sound of a great army
  chosen_spanish: el sonido de carros, el sonido de caballos, el sonido de un gran ejército
  alternatives_spanish:
  - el ruido de carros, el ruido de caballos, el ruido de un gran ejército
  - el sonido de carros, de caballos y de un gran ejército
  lexicon: HALOT
  rationale: Se conserva la repetición retórica de 'el sonido de' que el POB en inglés preservó. 'Carros' traduce רֶכֶב en este contexto militar; 'gran ejército' refleja חַיִל גָּדוֹל como fuerza militar, no riqueza o valor.
- source_word: וַיֹּאמְרוּ אִישׁ אֶל אָחִיו
  english_pob_choice: they said to one another
  chosen_spanish: se dijeron unos a otros
  alternatives_spanish:
  - cada uno dijo a su hermano
  - se dijeron entre sí
  lexicon: HALOT
  rationale: 'La expresión hebrea es idiomática y literal: ''un hombre a su hermano''. En español, ''unos a otros'' comunica la reciprocidad sin forzar un giro literal poco natural.'
- source_word: הִנֵּה
  english_pob_choice: Look
  chosen_spanish: Miren
  alternatives_spanish:
  - Miren
  - He aquí
  - Vean
  lexicon: HALOT
  rationale: '''Miren'' conserva la fuerza deíctica e imperativa de הִנֵּה con un tono moderno y publicable, sin el arcaísmo de ''He aquí''.'
- source_word: שָׂכַר עָלֵינוּ
  english_pob_choice: has hired against us
  chosen_spanish: ha alquilado contra nosotros
  alternatives_spanish:
  - ha contratado contra nosotros
  - ha tomado a sueldo contra nosotros
  - ha alquilado para nuestra ruina
  lexicon: HALOT
  rationale: Se mantiene el valor básico de שׂכר = alquilar/contratar, y עַל en sentido hostil se vierte con 'contra nosotros'. 'Alquilar' sigue la fuerza léxica del verbo sin introducir 'mercenarios' que el texto no menciona explícitamente.
- source_word: מַלְכֵי הַחִתִּים
  english_pob_choice: the kings of the Hittites
  chosen_spanish: a los reyes de los hititas
  alternatives_spanish:
  - a los reyes hititas
  - a los Hittitas
  lexicon: HALOT
  rationale: Se conserva el plural del hebreo y se expresa con una construcción genitiva natural en español. 'Hititas' es la forma común del etnónimo en español bíblico.
- source_word: מַלְכֵי מִצְרַיִם
  english_pob_choice: the kings of Egypt
  chosen_spanish: y a los reyes de Egipto
  alternatives_spanish:
  - y a los reyes egipcios
  - y al rey de Egipto
  lexicon: HALOT
  rationale: El hebreo presenta plural, y el POB inglés lo retiene; por fidelidad no se suaviza a singular. La pluralidad queda explícita en español, aunque resulte inusual históricamente.
- source_word: לָבוֹא עָלֵינוּ
  english_pob_choice: to come against us
  chosen_spanish: para venir contra nosotros
  alternatives_spanish:
  - para atacarnos
  - para venir sobre nosotros
  lexicon: HALOT
  rationale: La infinitiva expresa movimiento hostil; 'venir contra nosotros' conserva tanto la dirección como la amenaza sin sobreinterpretar con 'atacar'. En español, el infinitivo final se integra bien con 'para venir'.
theological_decisions:
- issue: Nombre divino en אֲדֹנָי dentro de una explicación narrativa
  english_pob_reading: the Lord
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el Señor
  - el Dueño
  rationale: Aunque el hebreo aquí usa אֲדֹנָי, el sujeto de la acción es el Dios de Israel. En el proyecto español, el nombre divino se representa como Yahvé para no ocultarlo bajo un título genérico; esto mantiene la transparencia del texto y su auditoría.
  doctrine_reference: Project terminology default for יהוה / YHWH -> Yahvé; divine-name transparency policy
- issue: Repetición de קוֹל antes de cada sustantivo militar
  english_pob_reading: the sound of chariots, the sound of horses, the sound of a great army
  chosen_spanish_reading: el sonido de carros, el sonido de caballos, el sonido de un gran ejército
  alternative_spanish_readings:
  - el ruido de carros, el ruido de caballos, el ruido de un gran ejército
  - el sonido de carros, caballos y un gran ejército
  rationale: Se preserva la repetición enfática del hebreo y del POB inglés. Suprimirla haría perder un rasgo retórico importante del versículo.
  doctrine_reference: Retention of source rhetorical repetition where the source foregrounds it
translation_notes:
  revision_awareness: La redacción sigue el ajuste final del POB inglés que colocó correctamente 'the kings ... against us' y conserva la secuencia hostil 'to come against us' sin invertir el orden. También conserva la repetición hebrea de 'el sonido de' que la auditoría inglesa mantuvo explícitamente.
  spanish_consistency_notes:
  - Se usa Yahvé de manera consistente con el estándar español del proyecto para el nombre divino.
  - Se mantiene 'Aram' y no 'Siria' para respetar el nombre propio hebreo.
  - '''Hititas'' y ''Egipto'' se expresan con el plural del original, aun cuando suene poco usual, por fidelidad textual.'
  - La puntuación y las comillas siguen norma española, con énfasis en claridad litúrgica y lectura pública.
