revisions:
- from: 'Pero ustedes dicen[a]: «¿Por qué?». Porque Yahvé ha sido testigo entre tú y la esposa de tu juventud, a quien has sido infiel[b], aunque ella es tu compañera y la esposa de tu pacto.'
  to: 'Pero ustedes dicen: «¿Por qué?». Porque Yahvé ha sido testigo entre tú y la esposa de tu juventud, a quien le has sido infiel[a], aunque ella es tu compañera y la esposa de tu pacto[b].'
  rationale: Se corrige la sintaxis española de la cláusula de infidelidad («a quien le has sido infiel») y se reubican las notas para que expliquen las expresiones correctas. Se mantiene «Yahvé», el matiz jurídico de «ha sido testigo», la imagen «la esposa de tu juventud» y el énfasis covenantal de «pacto».
  reviewer_model: gpt-5.4
