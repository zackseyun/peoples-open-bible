translation:
  language: es
  text: 'diciendo a los presos: «Salgan», a los que están en tinieblas: «Manifiétense[a]». En los caminos pastarán, y en todas las alturas peladas[b] será su pastura.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «sean revelados» / «aparezcan» para «manifiétense».
    reason: lexical_alternative
  - marker: b
    text: «Alturas peladas» se refiere a cumbres expuestas o sin árboles; alternativamente, «cerros pelados».
    reason: lexical_alternative
lexical_decisions:
- source_word: לֵאמֹר
  english_pob_choice: saying
  chosen_spanish: diciendo
  alternatives_spanish:
  - para decir
  - diciendo así
  lexicon: HALOT
  rationale: El infinitivo constructo introduce el contenido de la comisión; «diciendo» conserva esa función introductoria en español sin volverlo demasiado pesado.
- source_word: לַאֲסוּרִים
  english_pob_choice: to the prisoners
  chosen_spanish: a los presos
  alternatives_spanish:
  - a los prisioneros
  - a los cautivos
  - a los atados
  lexicon: HALOT
  rationale: El participio pasivo alude a personas retenidas o ligadas. «Presos» es natural en español y mantiene la fuerza de privación de libertad.
- source_word: צֵאוּ
  english_pob_choice: Come out
  chosen_spanish: Salgan
  alternatives_spanish:
  - Salid
  - Salgan afuera
  - Vengan fuera
  lexicon: HALOT
  rationale: El imperativo plural de יצא pide una orden directa de salida. «Salgan» es claro y fiel, sin añadir matices ajenos.
- source_word: לַאֲשֶׁר בַּחֹשֶׁךְ
  english_pob_choice: to those in darkness
  chosen_spanish: a los que están en tinieblas
  alternatives_spanish:
  - a los que están en oscuridad
  - a los que están en la oscuridad
  lexicon: HALOT
  rationale: «Tinieblas» conserva el registro bíblico y la amplitud literal/metafórica de חֹשֶׁךְ mejor que una sola explicación interpretativa.
- source_word: הִגָּלוּ
  english_pob_choice: Show yourselves
  chosen_spanish: Manifiétense
  alternatives_spanish:
  - Sean revelados
  - Aparezcan
  - Muéstrense
  lexicon: HALOT
  rationale: El nifal imperativo expresa volverse visible o quedar al descubierto. «Manifiétense» comunica bien la idea de aparecer/revelarse en español formal y respeta la alternativa documentada por la POB inglesa.
- source_word: עַל דְּרָכִים
  english_pob_choice: along the roads
  chosen_spanish: en los caminos
  alternatives_spanish:
  - a lo largo de los caminos
  - junto a los caminos
  - sobre los caminos
  lexicon: HALOT
  rationale: La preposición עַל con el plural de «caminos» describe el lugar donde pastarán; «en los caminos» funciona de manera natural en español y no fuerza la imagen.
- source_word: יִרְעוּ
  english_pob_choice: They will graze
  chosen_spanish: pastarán
  alternatives_spanish:
  - apacentarán
  - pastorearán
  - pacerán
  lexicon: HALOT
  rationale: El qal imperfecto de רעה mantiene la metáfora pastoral. «Pastarán» es breve, claro y adecuado para el registro poético.
- source_word: שְׁפָיִם
  english_pob_choice: bare heights
  chosen_spanish: alturas peladas
  alternatives_spanish:
  - alturas desnudas
  - cerros pelados
  - cumbres peladas
  lexicon: HALOT
  rationale: El término designa alturas expuestas o sin vegetación. «Alturas peladas» conserva la imagen topográfica y evita la carga cultual de «lugares altos».
- source_word: מַרְעִיתָם
  english_pob_choice: their pasture
  chosen_spanish: su pasto
  alternatives_spanish:
  - su pastura
  - su pasto de pastoreo
  - su lugar de pasto
  lexicon: HALOT
  rationale: El sustantivo nombra el alimento o lugar de pastar. «Pasto» es conciso y natural en español, y puede funcionar colectivamente como en hebreo.
theological_decisions:
- issue: 'Imagen de liberación: prisión y tinieblas sin reducirlas a una sola referencia'
  english_pob_reading: Retain the concrete imagery ('prisoners,' 'darkness') without explicating whether it refers to exile, spiritual bondage, or both.
  chosen_spanish_reading: Conservar «presos» y «tinieblas» sin especificar si la referencia es al exilio histórico, a la esclavitud espiritual o a ambas.
  alternative_spanish_readings:
  - Interpretarlo explícitamente como el regreso del exilio
  - Interpretarlo explícitamente como liberación espiritual
  rationale: El hebreo mantiene una imagen amplia de liberación. La traducción española no debe cerrar una tensión teológica que el texto deja abierta.
  doctrine_reference: Translation philosophy §3
translation_notes:
  revision_awareness: El texto inglés auditado no muestra cambios aplicados en la revisión más reciente; se mantiene alta coincidencia con el hebreo y sin observaciones de corrección. La versión española sigue esa línea estable, conservando la metáfora y las alternativas léxicas documentadas.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» por norma del proyecto cuando el contexto no exige el Tetragrámaton explícito en este versículo.
  - 'Se preserva el paralelo entre dos mandatos: salida desde la prisión y manifestación desde las tinieblas.'
  - «Pasto» y «pastarán» conservan la imagen pastoral sin convertirla en explicación interpretativa.
