review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura del hebreo: «el resto de», la cláusula «que habían quedado», la referencia temporal «en los días de Asa su padre» y la idea de removerlos del territorio. Sin embargo, el punto clave הַקָּדֵשׁ no está bien resuelto en el texto principal, porque la transliteración «qedeshim» no preserva de forma inteligible en español el sentido léxico documentado por la evidencia y por la auditoría inglesa.'
  spanish_quality_summary: El español es mayormente claro, pero «los qedeshim» introduce un hebraísmo opaco e impropio del estilo meta solicitado. Además, «de la tierra» suena menos natural aquí que «del país» o «de la tierra», pero puede mantenerse; el problema principal es terminológico. Una formulación como «los prostitutos del culto» es más fiel e inteligible en español e incorpora la decisión léxica de la POB inglesa.
  glossary_alignment: 'No hay conflicto con los términos globales principales. La desviación importante es metodológica: se reemplazó una decisión léxica semántica («cult prostitutes») por transliteración no justificada. La nota puede conservar la alternativa masculina más explícita, pero el texto principal debe expresar el sentido.'
  issues:
  - severity: high
    issue: Uso de «qedeshim» en el texto principal
    rationale: El hebreo קָדֵשׁ no debe quedar transliterado sin necesidad en una traducción española legible. La auditoría inglesa decidió traducir el sentido como «cult prostitutes», con nota para la especificación masculina. La transliteración oscurece el significado y no sigue el estilo objetivo.
  - severity: medium
    issue: La nota alternativa queda redundante si el texto principal usa transliteración
    rationale: La nota actual ofrece «los prostitutos del culto» como alternativa, pero esa expresión debería estar en el texto principal, no relegada a nota, ya que es la decisión léxica principal sustentada por la evidencia.
  revised_spanish_text: Y expulsó del país al resto de los prostitutos del culto[a] que habían quedado en los días de Asa su padre.
