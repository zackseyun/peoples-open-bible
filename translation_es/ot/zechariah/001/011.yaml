    text: O «hemos ido por toda la tierra» o «hemos andado de un lado a otro por la tierra».
    reason: lexical_alternative
  - marker: b
    text: O «toda la tierra está en reposo y quieta».
    reason: lexical_alternative
  revision_rationale: Se ajusta «arrayanes» a «mirtos» por mayor transparencia bíblica y mejor alineación con הֲדַסִּים / myrtle trees. Se revisa la cláusula final a «está en reposo y tranquila» para reflejar mejor la secuencia semántica de יֹשֶׁבֶת וְשֹׁקָטֶת y mejorar la naturalidad del español, manteniendo la nota alternativa ya documentada.
