translation:
  language: es
  text: Porque ha aplastado y abandonado a los pobres[a]; ha arrebatado una casa y no la reconstruirá.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Porque aplastó y abandonó a los pobres; arrebató una casa y no la reconstruirá».'
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Ya que
  lexicon: HALOT
  rationale: La conjunción introduce la razón del juicio en el contexto; «Porque» conserva la fuerza explicativa de forma natural en español.
- source_word: רִצַּץ
  english_pob_choice: has crushed
  chosen_spanish: ha aplastado
  alternatives_spanish:
  - ha quebrantado
  - ha oprimido
  lexicon: HALOT
  rationale: El verbo expresa una acción violenta y concreta; «ha aplastado» preserva mejor la imagen física que una versión más abstracta como «ha oprimido».
- source_word: עָזַב
  english_pob_choice: abandoned
  chosen_spanish: abandonado
  alternatives_spanish:
  - desamparado
  - dejado
  lexicon: HALOT
  rationale: «Abandonado» comunica la idea de dejar culpablemente sin ayuda, en paralelo con la violencia previa.
- source_word: דַּלִּים
  english_pob_choice: the poor
  chosen_spanish: los pobres
  alternatives_spanish:
  - los débiles
  - los necesitados
  lexicon: HALOT
  rationale: Aquí la referencia social es clara; «los pobres» es la opción más directa e idiomática, manteniendo el alcance de vulnerabilidad del término hebreo.
- source_word: בַּיִת
  english_pob_choice: a house
  chosen_spanish: una casa
  alternatives_spanish:
  - una vivienda
  - un hogar
  lexicon: HALOT
  rationale: El contexto de tomar y luego no reconstruir favorece una propiedad concreta; «casa» conserva el paralelo con la casa saqueada. «Hogar» introduciría un matiz más relacional que espacial.
- source_word: גָּזַל
  english_pob_choice: has seized
  chosen_spanish: ha arrebatado
  alternatives_spanish:
  - ha robado
  - ha saqueado
  lexicon: HALOT
  rationale: El verbo implica tomar por fuerza o mediante despojo. «Ha arrebatado» preserva la violencia del acto sin reducirlo solo a robo oculto.
- source_word: וְלֹא יִבֶנֵהוּ
  english_pob_choice: and will not rebuild it
  chosen_spanish: y no la reconstruirá
  alternatives_spanish:
  - y no la edificará de nuevo
  - y no la volverá a construir
  lexicon: HALOT
  rationale: El verbo בנה puede ser «construir/reconstruir»; dado el objeto ya tomado, «reconstruirá» reproduce bien la ironía del texto y sugiere restauración de lo usurpado.
translation_notes:
  revision_awareness: La redacción sigue el sentido revisado del inglés POB, especialmente la clausula final «will not rebuild it», traducida de forma más natural como «no la reconstruirá» en lugar de una paráfrasis más amplia. Se conserva además la alternativa interpretativa donde el sujeto verbal puede leerse como pasado descriptivo o como razón introducida por «Porque» en español.
  spanish_consistency_notes:
  - Se mantuvo «los pobres» para דַּלִּים, en coherencia con el inglés POB y sin diluir la vulnerabilidad social del término.
  - Se eligió «casa» en singular para בַּיִת y se retomó con «la» para conservar el referente concreto y evitar ambigüedad.
  - «Reconstruirá» mantiene la idea de restituir/restaurar una casa ya tomada, reflejando la ironía del hebreo y la revisión inglesa más reciente.
