review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español sigue de cerca el hebreo y el rastro auditado en inglés: enumera correctamente la grasa, los riñones y el lóbulo del hígado provenientes de la ofrenda por el pecado, conserva el matiz cultual de הִקְטִיר con una expresión de humo, y usa correctamente «Yahvé» para יהוה. Sin embargo, la nota [a] está mal anclada: la alternativa «ofrenda de purificación» corresponde a חַטָּאת, no a «grasa».'
  spanish_quality_summary: 'El español es claro y digno, pero hay dos detalles que requieren reparación menor: 1) la nota [a] debe moverse a «ofrenda por el pecado»; 2) la nota [b] es innecesaria y además contiene un error gramatical («la lóbulo»). La frase «lo hizo subir en humo» es entendible, pero resulta algo menos natural en español bíblico que «lo hizo subir en humo» ya está aceptable; no obstante, conviene ajustar el pronombre a plural para concordar con la serie de objetos: «los hizo subir en humo».'
  glossary_alignment: 'Buena alineación general con la terminología del proyecto: יהוה -> «Yahvé» correcto; חַטָּאת -> «ofrenda por el pecado» con alternativa «ofrenda de purificación» preservable en nota; הִקְטִיר mantiene el sentido sacrificial mejor que «quemó». No hay conflicto doctrinal ni léxico mayor, solo el problema de anclaje de la nota y la concordancia pronominal.'
  issues:
  - severity: medium
    issue: La nota [a] está colocada sobre «grasa» en vez de sobre «ofrenda por el pecado».
    rationale: La nota explica una alternativa para חַטָּאת («ofrenda de purificación»), no para חֵלֶב («grasa»). Tal como está, induce a error al lector y no cumple la disciplina de anclar la nota al término pertinente.
  - severity: low
    issue: La nota [b] es prescindible y contiene un error gramatical interno.
    rationale: El inglés POB no exige una nota para «lobe of the liver», y en español «el lóbulo del hígado» ya es suficientemente claro. Además, la formulación de la nota dice «la lóbulo», lo cual es incorrecto.
  - severity: low
    issue: Discordancia leve en «lo hizo subir en humo».
    rationale: El referente es plural («la grasa, los riñones y el lóbulo...»), por lo que «los hizo subir en humo» concuerda mejor en español, aun si el hebreo usa verbo singular por sujeto tácito singular.
  revised_spanish_text: Y la grasa, los riñones y el lóbulo del hígado de la ofrenda por el pecado[a] los hizo subir en humo sobre el altar, tal como Yahvé había mandado a Moisés.
  revised_footnotes:
  - marker: a
    text: O, «ofrenda de purificación». El término hebreo puede enfatizar la función de la ofrenda de quitar la impureza, así como su relación con el pecado.
    reason: alternative_reading
  revision_rationale: Se corrige el anclaje de la nota alternativa para que recaiga sobre חַטָּאת («ofrenda por el pecado»), se elimina una nota léxica innecesaria y defectuosa sobre «lóbulo del hígado», y se ajusta el pronombre a plural («los hizo subir en humo») para mejorar la concordancia y la naturalidad del español sin alterar el sentido fuente.
