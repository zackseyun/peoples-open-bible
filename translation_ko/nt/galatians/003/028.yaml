source:
  edition: SBLGNT
  text: οὐκ ἔνι Ἰουδαῖος οὐδὲ Ἕλλην, οὐκ ἔνι δοῦλος οὐδὲ ἐλεύθερος, οὐκ ἔνι ἄρσεν καὶ θῆλυ· ⸀πάντες γὰρ ὑμεῖς εἷς ἐστε ἐν Χριστῷ Ἰησοῦ.
base_translation:
  language: en
  yaml_path: translation/nt/galatians/003/028.yaml
  text: There is no Jew or Greek[a], there is no slave or free, there is no male and female[b]; for you are all one in Messiah Jesus.
  footnotes:
  - marker: a
    text: 'Or ''There is not male nor female''; the Greek literally has ''male and female,'' likely echoing Genesis 1:27.'
    reason: alternative_reading
  - marker: b
    text: 'Greek ''in Christ Jesus''; rendered ''in Messiah Jesus'' because Χριστός is a title here.'
    reason: lexical_alternative
translation:
  language: ko
  text: 유대인이나 헬라인이 없고, 노예나 자유인이 없으며, 남자와 여자가 없습니다[a]. 여러분은 모두 메시아 예수 안에서 하나이기 때문입니다.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 헬라어는 「남자와 여자」로, 창세기 1:27을 반향한다.
    reason: cross_reference
lexical_decisions:
- source_word: δοῦλος οὐδὲ ἐλεύθερος
  english_pob_choice: slave or free
  chosen_korean: 노예나 자유인
