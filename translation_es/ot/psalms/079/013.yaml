translation:
  language: es
  text: Pero nosotros, tu pueblo y las ovejas de tu prado[a], te daremos gracias por siempre; de generación en generación contaremos[b] tu alabanza.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «el rebaño de tu prado».
    reason: lexical_alternative
  - marker: b
    text: O «declararemos».
    reason: lexical_alternative
lexical_decisions:
- source_word: וַאֲנַחְנוּ
  english_pob_choice: But we
  chosen_spanish: Pero nosotros
  alternatives_spanish:
  - Y nosotros
  - Mas nosotros
  - En cuanto a nosotros
  lexicon: HALOT
  rationale: El prefijo conjuntivo con el pronombre independiente tiene fuerza adversativa en el contexto del salmo. «Pero nosotros» conserva esa oposición de manera natural en español sin perder la referencia explícita al sujeto.
- source_word: עַמְּךָ
  english_pob_choice: your people
  chosen_spanish: tu pueblo
  alternatives_spanish:
  - tu gente
  - tu pueblo perteneciente a ti
  lexicon: HALOT
  rationale: Es la expresión pactual directa y usual para el pueblo de Dios. «Pueblo» es claro y fiel al registro bíblico.
- source_word: וְצֹאן מַרְעִיתֶךָ
  english_pob_choice: and the sheep of your pasture
  chosen_spanish: y las ovejas de tu pastizal
  alternatives_spanish:
  - y el rebaño de tu pastizal
  - y las ovejas de tu prado
  lexicon: HALOT
  rationale: Se mantiene la metáfora pastoral de צֹאן. «Pastizal» rinde de forma transparente מַרְעִיתֶךָ y conserva la imagen de alimento/cuidado sin suavizarla a una abstracción como «flock».
- source_word: נוֹדֶה
  english_pob_choice: will give thanks to you
  chosen_spanish: te daremos gracias
  alternatives_spanish:
  - te alabaremos
  - confesaremos gracias a ti
  lexicon: HALOT
  rationale: La forma hifil de ידה admite «dar gracias» o «alabar». Aquí se eligió «dar gracias» porque el siguiente hemistiquio ya usa explícitamente «alabanza», preservando así la distinción poética entre ambas ideas.
- source_word: לְעוֹלָם
  english_pob_choice: forever
  chosen_spanish: por siempre
  alternatives_spanish:
  - para siempre
  - eternamente
  lexicon: HALOT
  rationale: «Por siempre» expresa continuidad sin sonar mecánico. En español es una manera natural de transmitir duración indefinida en una promesa de culto.
- source_word: לְדֹר וָדֹר
  english_pob_choice: from generation to generation
  chosen_spanish: de generación en generación
  alternatives_spanish:
  - por generaciones y generaciones
  - para toda generación
  lexicon: HALOT
  rationale: Es el equivalente idiomático normal en español y conserva la idea de sucesión histórica continua entre generaciones.
- source_word: נְסַפֵּר
  english_pob_choice: we will recount
  chosen_spanish: contaremos
  alternatives_spanish:
  - narraremos
  - proclamaremos
  - relataremos
  lexicon: HALOT
  rationale: ספר en piel puede significar narrar o relatar públicamente. «Contaremos» mantiene la acción de transmitir de manera continua y suena más natural en español bíblico que un calco pesado.
- source_word: תְּהִלָּתֶךָ
  english_pob_choice: your praise
  chosen_spanish: tu alabanza
  alternatives_spanish:
  - tu gloria
  - tus loores
  - tu elogio
  lexicon: HALOT
  rationale: «Alabanza» es la forma más directa y bíblica en español para תְּהִלָּה. También preserva el paralelismo con «te daremos gracias» sin introducir una paráfrasis.
theological_decisions:
- issue: Metáfora pastoral del pueblo de Dios
  english_pob_reading: 'Retain the metaphor explicitly: ''the sheep of your pasture'''
  chosen_spanish_reading: las ovejas de tu pastizal
  alternative_spanish_readings:
  - tu rebaño
  - las ovejas de tu prado
  rationale: Se conserva la imagen pastoral en lugar de convertirla en una abstracción. Esto mantiene la relación de cuidado, pertenencia y guía entre Yahvé y su pueblo, como en el hebreo y en el POB inglés.
  doctrine_reference: Principio de primacía del texto original y preservación de imágenes bíblicas sin domesticarlas
- issue: Distinción semántica entre dar gracias y alabar
  english_pob_reading: '''will give thanks to you'' ... ''we will recount your praise'''
  chosen_spanish_reading: te daremos gracias ... contaremos tu alabanza
  alternative_spanish_readings:
  - te alabaremos ... contaremos tu alabanza
  - te daremos gracias ... proclamaremos tu alabanza
  rationale: Se mantiene la diferencia entre נוֹדֶה y תְּהִלָּתֶךָ. Así no se borra la tensión lexical que el POB inglés cuidó al separar thanksgiving de praise.
  doctrine_reference: Lectura poética y semántica de los paralelismos hebreos
translation_notes:
  revision_awareness: Se tomó en cuenta el estado de alta concordancia del audit trail inglés y el pass más reciente sin cambios; por ello no se introdujeron revisiones textuales adicionales ni se alteró la distribución paralela de los dos hemistiquios.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como término estándar del proyecto cuando el contexto del salterio lo requiera; en este versículo no aparece explícitamente en el texto hebreo, por lo que no se añadió.
  - Se conservó el paralelismo entre gratitud y alabanza mediante dos verbos distintos en español.
  - Se evitó traducir צֹאן como un término eclesiástico más abstracto, para no perder la imagen pastoral concreta.
  - El orden de las cláusulas sigue de cerca el hebreo y el inglés auditado, con ajuste natural de la sintaxis española.
