translation:
  language: es
  text: También tiende tu mano al pobre[a], para que tu bendición llegue a plenitud.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Paralelo griego: «Que la bondad de un don esté delante de todo viviente, y no niegues bondad ni siquiera al muerto». El testimonio hebreo aquí dice en cambio: «También tiende tu mano al pobre, para que tu bendición llegue a plenitud».'
    reason: alternative_reading
lexical_decisions:
- source_word: וְגַם
  english_pob_choice: Also
  chosen_spanish: También
  alternatives_spanish:
  - Además
  - Y también
  lexicon: HALOT
  rationale: Conserva el valor aditivo de la partícula hebrea y suena natural al inicio de una exhortación en español.
- source_word: לְאֶבְיוֹן
  english_pob_choice: to the poor
  chosen_spanish: al pobre
  alternatives_spanish:
  - al necesitado
  - al indigente
  lexicon: HALOT
  rationale: אֶבְיוֹן designa a una persona pobre o necesitada; «el pobre» es la opción más directa y amplia en español.
- source_word: הוֹשִׁיט יָד
  english_pob_choice: stretch out your hand
  chosen_spanish: extiende tu mano
  alternatives_spanish:
  - tiende tu mano
  - alarga tu mano
  - abre tu mano
  lexicon: HALOT
  rationale: Se conserva la imagen corporal del hebreo, con un español natural. «Extiende» mantiene el gesto de ayuda sin perder el sentido literal.
- source_word: לְמַעַן
  english_pob_choice: so that
  chosen_spanish: para que
  alternatives_spanish:
  - a fin de que
  - con el fin de que
  lexicon: HALOT
  rationale: Introduce claramente la cláusula de propósito/resulto en un español fluido y bíblicamente adecuado.
- source_word: תִּשְׁלַם
  english_pob_choice: may be complete
  chosen_spanish: se complete
  alternatives_spanish:
  - sea completa
  - llegue a plenitud
  - sea cumplida
  lexicon: HALOT
  rationale: El hebreo sugiere plenitud o completitud; en español, la forma pronominal refleja bien la idea de llegar a su totalidad sin imponer un matiz de retribución.
- source_word: בִּרְכָתֶךָ
  english_pob_choice: your blessing
  chosen_spanish: tu bendición
  alternatives_spanish:
  - tu bendición-gift
  - tu beneficencia
  - tu favor
  lexicon: HALOT
  rationale: «Bendición» es el equivalente más natural y abarca la ambigüedad hebrea entre bendición recibida, bendición otorgada y acto benéfico, sin forzar una interpretación más específica.
theological_decisions:
- issue: Divergencia textual entre el hebreo y el griego en Sirácides 7:33
  english_pob_reading: Translate the extant Hebrew as the primary witness for this verse, while noting the Greek parallel in a footnote.
  chosen_spanish_reading: Traducir el hebreo conservado como texto principal y señalar en nota la forma griega alternativa más amplia.
  alternative_spanish_readings:
  - «La bondad de un don esté delante de todo viviente, y no niegues la bondad ni al muerto»
  - «La gracia de un regalo esté ante todo viviente, y no niegues gracia al muerto»
  rationale: Siguiendo el criterio del POB para Sirácides, el texto principal se basa en el hebreo allí donde se conserva; el griego de Swete se registra como testimonio alternativo significativo porque presenta una formulación distinta y no controla la redacción hebrea.
  doctrine_reference: 'PHILOSOPHY.md: traducir Sirácides desde el hebreo cuando está disponible; usar la LXX griega como fuente real y como control de coherencia.'
translation_notes:
  revision_awareness: El pasaje fue revisado con base en el hebreo conservado de Kahana como testimonio primario y en el paralelo griego de Swete como alternativa textual importante. No se requirieron cambios respecto del último pase revisado.
  spanish_consistency_notes:
  - Se mantuvo «bendición» para בִּרְכָתֶךָ, en consonancia con la ambigüedad semántica preservada por el POB en inglés.
  - Se evitó sustituir «pobre» por una formulación más interpretativa, para no borrar el matiz socioeconómico del hebreo.
  - La nota al pie distingue claramente la lectura griega sin desplazar el texto hebreo principal.
