base_translation:
  language: en
  yaml_path: translation/ot/proverbs/019/009.yaml
  text: A false witness will not go unpunished[b][a], and one who breathes out lies will perish.
  footnotes:
  - marker: a
    text: Or 'will not be acquitted' / 'will not be held innocent.' The Hebrew verb can emphasize either lack of acquittal or the certainty of punishment.
    reason: lexical_alternative
  - marker: b
    text: Literally, 'breathes out lies.' The expression pictures lies flowing out as readily as breath.
    reason: lexical_alternative
