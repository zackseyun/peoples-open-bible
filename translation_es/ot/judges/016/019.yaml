base_translation:
  language: en
  yaml_path: translation/ot/judges/016/019.yaml
  text: So she made him sleep on her knees[a], and she called for a man, and she shaved off the seven locks of his head. Then she began to afflict him[c][b], and his strength left him.
  footnotes:
  - marker: a
    text: Or 'on her lap'; literally 'on her knees.'
    reason: lexical_alternative
  - marker: b
    text: Or 'she summoned a man' / 'she called a man.' The Hebrew can refer either to calling for a man already in view or summoning a man for the task.
    reason: alternative_reading
  - marker: c
    text: Or 'the seven braids of his head.'
    reason: lexical_alternative
