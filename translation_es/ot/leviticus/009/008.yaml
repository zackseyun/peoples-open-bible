translation:
  language: es
  text: Entonces Aarón se acercó al altar y degolló el becerro de la ofrenda por el pecado[a], que era para sí.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, «la ofrenda de purificación». El término hebreo puede referirse a la ofrenda asociada con el pecado y con la remoción de impureza.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּקְרַב
  english_pob_choice: came near
  chosen_spanish: se acercó
  alternatives_spanish:
  - se aproximó
  - llegó cerca
  lexicon: HALOT
  rationale: קרב en este contexto cultual expresa movimiento hacia el altar. «Se acercó» conserva la cercanía concreta y suena natural en español, sin perder el valor ritual del acto.
- source_word: הַמִּזְבֵּחַ
  english_pob_choice: the altar
  chosen_spanish: el altar
  alternatives_spanish:
  - el altar sacrificial
  lexicon: HALOT
  rationale: מזבח se traduce de forma directa por «altar», que es el equivalente normal y preciso en este contexto de sacrificio.
- source_word: וַיִּשְׁחַט
  english_pob_choice: slaughtered
  chosen_spanish: degolló
  alternatives_spanish:
  - sacrificó
  - mató ritualmente
  lexicon: HALOT
  rationale: שחט designa un sacrificio con degüello ritual. «Degolló» preserva la fuerza concreta del verbo y evita diluir el acto en un «sacrificó» más general.
- source_word: עֵגֶל
  english_pob_choice: the calf
  chosen_spanish: el becerro
  alternatives_spanish:
  - el ternero
  - el novillo joven
  lexicon: HALOT
  rationale: עגל puede referirse a un bovino joven. En español bíblico «becerro» comunica bien esa edad y mantiene el registro cultual, con buena intelligibilidad.
- source_word: הַחַטָּאת
  english_pob_choice: the sin offering
  chosen_spanish: la ofrenda por el pecado
  alternatives_spanish:
  - la ofrenda de purificación
  - el sacrificio por el pecado
  lexicon: HALOT
  rationale: חטאת en contextos sacerdotales puede denominar la ofrenda asociada con el pecado o con la purificación ritual. Se eligió «ofrenda por el pecado» como forma clara y suficientemente tradicional en español, sin borrar la tensión documental con la función purificadora del rito.
- source_word: אֲשֶׁר לוֹ
  english_pob_choice: that was for himself
  chosen_spanish: que era para él mismo
  alternatives_spanish:
  - que le pertenecía
  - que era suyo
  lexicon: HALOT
  rationale: La frase identifica la ofrenda como propia de Aarón, en contraste con las ofrendas por el pueblo. «Para él mismo» comunica con claridad esa referencia personal y el valor cultual del texto.
theological_decisions:
- issue: Interpretación de חטאת en lenguaje sacrificial levítico
  english_pob_reading: sin offering
  chosen_spanish_reading: ofrenda por el pecado
  alternative_spanish_readings:
  - ofrenda de purificación
  - sacrificio por el pecado
  rationale: El hebreo permite ver tanto la categoría sacrificial tradicional como el trasfondo de purificación ritual. Se mantiene una fórmula clara en el texto principal y se conserva la alternativa interpretativa en nota para no borrar la discusión semántica.
  doctrine_reference: Translation philosophy §3, §5
translation_notes:
  revision_awareness: 'El texto sigue de cerca el consenso del borrador inglés auditado: קרב = acercarse, שחט = slaughter/ritual slaughter, עגל = calf, חטאת = sin offering con nota alternativa, y אֲשֶׁר לוֹ = para él mismo. No se aplicaron revisiones posteriores; el pasaje permanece en alta concordancia con la revisión más reciente.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma del proyecto, aunque este versículo no contiene el nombre divino.
  - Se usa «ofrenda por el pecado» en el texto principal y se preserva la alternativa «ofrenda de purificación» en nota, siguiendo la tensión lexical documentada.
  - «Degolló» se eligió para reflejar el matiz ritual concreto de שחט sin caer en un calco áspero.
  - «Becerro» se prefiere por naturalidad en español bíblico y por corresponder a un bovino joven en contexto sacrificial.
