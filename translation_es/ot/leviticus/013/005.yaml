  to: Y el sacerdote lo examinará al séptimo día, y he aquí, si la mancha[a] se ha mantenido sin cambios[b] a su vista y la mancha no se ha extendido en la piel, entonces el sacerdote lo aislará[c] por siete días una segunda vez.
  rationale: Se corrige el anclaje de la nota léxica sobre negaʿ para que recaiga sobre 'mancha', se mejora la naturalidad temporal con 'al séptimo día', se suaviza 'sin cambio' a 'sin cambios', y se corrige el error léxico 'el aflicto' por 'la afección' en la nota. No se requieren cambios doctrinales ni adjudicación compleja.
