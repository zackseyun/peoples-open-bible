translation:
  language: es
  text: Y su tropa[a], los inscritos en ella[b], fueron cincuenta y siete mil cuatrocientos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «su hueste» o «su división»; צָבָא puede denotar un contingente militar o una unidad organizada dentro del censo del campamento.
    reason: lexical_alternative
  - marker: b
    text: O «los pasados por revista en ella» o «sus inscritos»; la forma hebrea alude a los que fueron oficialmente contados en el censo.
    reason: lexical_alternative
lexical_decisions:
- source_word: וּצְבָאוֹ
  english_pob_choice: And his company
  chosen_spanish: Y su tropa
  alternatives_spanish:
  - Y su hueste
  - Y su división
  - Y su ejército
  lexicon: HALOT
  rationale: צָבָא en este contexto de censo y campamento designa el contingente organizado de la tribu. «Tropa» comunica en español la idea de unidad ordenada sin cargar innecesariamente el sentido de guerra que tendría «ejército», y mantiene la concreción buscada por la POB en inglés.
- source_word: וּפְקֻדָיו
  english_pob_choice: even those numbered of it
  chosen_spanish: los contados de ella
  alternatives_spanish:
  - los enumerados de ella
  - los musterados de ella
  - los inscritos de ella
  lexicon: HALOT
  rationale: La forma de פקד en estas fórmulas censales se refiere a los que fueron oficialmente contados o pasados revista. «Los contados de ella» conserva la relación con el grupo y evita una paráfrasis más interpretativa; «de ella» retoma el femenino implícito en el sustantivo colectivo precedente en español.
- source_word: שִׁבְעָה וַחֲמִשִּׁים אֶלֶף וְאַרְבַּע מֵאוֹת
  english_pob_choice: fifty-seven thousand four hundred
  chosen_spanish: cincuenta y siete mil cuatrocientos
  alternatives_spanish:
  - siete y cincuenta mil y cuatrocientos
  lexicon: HALOT
  rationale: El número hebreo se expresa en el orden normal del español moderno para claridad y legibilidad, preservando exactamente el valor numérico del texto fuente.
translation_notes:
  revision_awareness: El texto coincide con el sentido y el valor numérico del hebreo y con la línea de decisión de la POB en inglés; no se registran revisiones posteriores que alteren esta lectura.
  spanish_consistency_notes:
  - Se mantiene el registro sobrio y bíblico sin recurrir a «SEÑOR» ni a terminología eclesiástica ajena al hebreo.
  - Se evita «ejército» para no sobredeterminar el contexto bélico; «tropa» conserva la organización del campamento.
  - La puntuación sigue el español bíblico contemporáneo, con coma para aislar la segunda cola nominal y facilitar la lectura pública.
