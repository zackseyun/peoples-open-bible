translation:
  language: es
  text: En vano[a], oh hijos, soporté por ustedes muchos dolores de parto y las preocupaciones más penosas de criarlos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «muchas angustias de parto ... y los cuidados más penosos de la crianza».
    reason: lexical_alternative
lexical_decisions:
- source_word: μάτην
  english_pob_choice: In vain
  chosen_spanish: En vano
  alternatives_spanish:
  - Para nada
  - Sin fruto
  lexicon: LSJ
  rationale: μάτην expresa inutilidad o futilidad; «En vano» es una solución natural y solemne en español, conservando el lamento de que el sufrimiento haya resultado sin provecho.
- source_word: ἐφʼ ὑμῖν
  english_pob_choice: for you
  chosen_spanish: por vosotros
  alternatives_spanish:
  - a causa de vosotros
  - por ustedes
  lexicon: LSJ
  rationale: Con verbos de padecimiento, la expresión señala referencia o motivo respecto de los hijos. «Por vosotros» mantiene esa relación causal/beneficiaria en un español claro y reverente.
- source_word: ὦ παῖδες
  english_pob_choice: O children
  chosen_spanish: oh hijos
  alternatives_spanish:
  - oh niños
  - oh muchachos
  lexicon: LSJ
  rationale: παῖδες puede significar «hijos» o «niños». En el contexto de una madre que se dirige a su descendencia, «hijos» comunica mejor la relación familiar sin añadir especificación innecesaria.
- source_word: πολλὰς ... ὠδῖνας
  english_pob_choice: many birth pains
  chosen_spanish: muchas angustias de parto
  alternatives_spanish:
  - muchos dolores de parto
  - muchos trabajos de parto
  lexicon: LSJ
  rationale: ὠδῖνες nombra dolores o angustias de parto. «Angustias de parto» conserva la imagen materna concreta y permite un castellano digno y comprensible.
- source_word: ὑπέμεινα
  english_pob_choice: did I endure
  chosen_spanish: soporté
  alternatives_spanish:
  - aguanté
  - perseveré en
  lexicon: LSJ
  rationale: El aoristo implica resistencia sufrida y sostenida. «Soporté» comunica bien la idea de haber sobrellevado penosamente esas pruebas.
- source_word: χαλεπωτέρας
  english_pob_choice: the more grievous
  chosen_spanish: las más graves
  alternatives_spanish:
  - las más penosas
  - las más arduas
  lexicon: LSJ
  rationale: El comparativo de χαλεπός intensifica la carga de las preocupaciones. «Las más graves» reproduce esa intensificación de manera natural en español, en línea con la revisión inglesa que prefirió una formulación más idiomática.
- source_word: φροντίδας
  english_pob_choice: anxieties
  chosen_spanish: preocupaciones
  alternatives_spanish:
  - cuidados
  - angustias
  - solicitudes
  lexicon: LSJ
  rationale: φροντίς puede abarcar cuidado, preocupación o ansiedad. Aquí el sentido materno de la crianza hace apropiado «preocupaciones», que mantiene el peso emocional sin exceder la evidencia del texto.
- source_word: ἀνατροφῆς
  english_pob_choice: of raising you
  chosen_spanish: de vuestra crianza
  alternatives_spanish:
  - de vuestro cuidado
  - de vuestra educación
  - de vuestro crecimiento
  lexicon: LSJ
  rationale: ἀνατροφή refiere a la crianza o educación de los hijos. «Crianza» es un equivalente directo y natural en español; el posesivo plural preserva la referencia a los hijos como objeto de ese cuidado.
translation_notes:
  revision_awareness: La revisión inglesa sustituyó «the harder anxieties» por «the more grievous anxieties» para reflejar mejor χαλεπωτέρας; el español adopta una intensificación equivalente con «las más graves» y mantiene el paralelismo entre parto y crianza. También se conservó la lectura maternal concreta de ὠδῖνας y ἀνατροφῆς, en vez de generalizar a dolores/trabajos sin matiz.
  spanish_consistency_notes:
  - Se mantuvo «En vano» para μάτην por su equivalencia solemne y transparente.
  - Se prefirió «hijos» para παῖδες por el contexto maternal inmediato.
  - «Crianza» traduce ἀνατροφῆς con un término natural en español bíblico y no eclesiástico.
  - La nota al pie conserva una alternativa lexical importante sin sobrecargar el cuerpo principal.
