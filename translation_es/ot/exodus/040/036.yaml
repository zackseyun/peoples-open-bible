review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura temporal iterativa del hebreo, la referencia a la nube, el tabernáculo y la salida habitual de los hijos de Israel. Sin embargo, dos elecciones españolas no preservan con suficiente naturalidad y precisión el sentido fuente: «era tomada» suena impropio para הֵעָלֹת/‘ser alzada/subir’, y «viajes» es menos adecuado que «jornadas» o «marchas» para מַסְעֵיהֶם en este contexto de desplazamientos por etapas.'
  spanish_quality_summary: El texto es comprensible, pero «la nube era tomada de sobre» resulta poco idiomático y algo opaco en español bíblico actual. Una formulación como «era alzada de sobre» mantiene mejor el valor pasivo y la imagen espacial. Además, «en todos sus viajes» suena moderno/turístico; «en todas sus jornadas» es más digno y contextual.
  glossary_alignment: Se mantiene correctamente «tabernáculo» para מִשְׁכָּן y «los hijos de Israel» para בְּנֵי יִשְׂרָאֵל, en línea con la decisión documentada de no aplanar la designación corporativa. No hay términos de glosario mayor en conflicto. La nota léxica existente es adecuada y puede conservarse.
  issues:
  - severity: medium
    issue: «era tomada» para הֵעָלֹת
    rationale: Aunque intenta reflejar el pasivo inglés «was taken up», en español «tomada» no comunica naturalmente que la nube se elevaba o era alzada. «Era alzada» o «subía» preserva mejor el sentido sin extrañeza innecesaria.
  - severity: low
    issue: «viajes» para מַסְעֵיהֶם
    rationale: «Viajes» es entendible, pero en este contexto de marchas del campamento israelita resulta menos preciso y menos digno que «jornadas» o «marchas». El hebreo apunta a etapas/desplazamientos del trayecto, no a viajes en sentido moderno.
  - severity: low
    issue: Ligera aspereza de «de sobre»
    rationale: «De sobre» es defendible y bastante literal para מֵעַל. No requiere cambio por fidelidad, aunque combinado con «era alzada» suena mejor que con «era tomada».
  revised_spanish_text: Siempre que la nube era alzada de sobre el tabernáculo, los hijos de Israel partían en todas sus jornadas[a].
  revised_footnotes:
  - marker: a
    text: 'O «los israelitas». Hebreo: «los hijos de Israel».'
    reason: lexical_alternative
  revision_rationale: Se ajusta «era tomada» a «era alzada» para reflejar con español natural el sentido de הֵעָלֹת / «was taken up». Se cambia «viajes» por «jornadas» para representar mejor los desplazamientos por etapas en el desierto. La nota se simplifica para que corresponda exactamente a la alternativa léxica real del texto revisado; no debe decir al mismo tiempo «los hijos de Israel» como alternativa si esa ya es la lectura principal. No se requiere adjudicación adicional.
