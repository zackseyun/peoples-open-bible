revisions:
- from: Por tanto, mi pueblo va al destierro por falta de conocimiento; sus hombres honorables mueren de hambre[a], y su multitud está reseca de sed.
  to: Por tanto, mi pueblo va al destierro por falta de conocimiento; sus nobles[a] mueren de hambre, y su multitud está seca de sed.
  rationale: Se hizo una reparación menor para mejorar la naturalidad y precisión del español sin alterar la decisión exegética del audit trail. 'Sus nobles' expresa mejor la referencia a personas prominentes que 'sus hombres honorables', y 'está seca de sed' suena más natural que 'está reseca de sed' mientras mantiene la imagen hebrea. La nota se ajusta para preservar la alternativa cercana al borrador original.
