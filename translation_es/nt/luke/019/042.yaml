translation:
  language: es
  text: 'diciendo[a]: «Si hubieras sabido en este día, aun tú, las cosas que conducen a la paz[b]—pero ahora han sido ocultadas de tus ojos[c]»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Si tan solo hubieras sabido en este día, aun tú, las cosas que conducen a la paz».'
    reason: lexical_alternative
  - marker: b
    text: 'Griego literalmente: «las cosas hacia paz», es decir, lo que pertenece a la paz o conduce a ella.'
    reason: lexical_alternative
  - marker: c
    text: 'Algunas traducciones entienden la última cláusula en singular: «ahora ha sido ocultado de tus ojos», tomando la expresión anterior de manera conceptual.'
    reason: alternative_reading
lexical_decisions:
- source_word: λέγων
  english_pob_choice: saying
  chosen_spanish: diciendo
  alternatives_spanish:
  - y dijo
  lexicon: BDAG
  rationale: El participio presente conserva mejor el flujo narrativo respecto de la cláusula anterior que convertirlo en verbo finito; «diciendo» mantiene la relación participial de manera natural en español.
- source_word: Εἰ ἔγνως
  english_pob_choice: If you had known
  chosen_spanish: Si hubieras conocido
  alternatives_spanish:
  - Si hubieras sabido
  - Si conocieras
  lexicon: BDAG
  rationale: El aoristo en este lamento expresa una condición contraria a la realidad; en español, el pluscuamperfecto de subjuntivo comunica bien esa condición no cumplida sin añadir la partícula interpretativa «solo» al texto principal.
- source_word: ἐν τῇ ἡμέρᾳ ταύτῃ
  english_pob_choice: on this day
  chosen_spanish: en este día
  alternatives_spanish:
  - en este mismo día
  - hoy
  lexicon: BDAG
  rationale: La preposición temporal con ἡμέρα se rinde de forma directa y natural con «en este día», conservando el énfasis temporal sin sobretraducirlo.
- source_word: καὶ σὺ
  english_pob_choice: even you
  chosen_spanish: aun tú
  alternatives_spanish:
  - tú también
  - incluso tú
  lexicon: BDAG
  rationale: La frase es enfática y de lamento; «aun tú» reproduce mejor ese relieve emocional que una adición menos marcada como «tú también».
- source_word: τὰ πρὸς εἰρήνην
  english_pob_choice: the things that make for peace
  chosen_spanish: las cosas que conducen a la paz
  alternatives_spanish:
  - las cosas para la paz
  - las cosas que pertenecen a la paz
  - lo que conduce a la paz
  lexicon: BDAG
  rationale: El griego expresa literalmente «las cosas hacia/para paz», un plural sustantivado. «Las cosas que conducen a la paz» conserva el sentido de orientación o relación con la paz y mantiene la fuerza plural que el inglés POB explicó.
- source_word: εἰρήνην
  english_pob_choice: peace
  chosen_spanish: la paz
  alternatives_spanish:
  - bienestar
  - armonía
  lexicon: BDAG
  rationale: «Paz» es la equivalencia normal y la más adecuada al trasfondo bíblico, que incluye tanto bienestar como la ausencia de juicio inminente.
- source_word: νῦν δὲ
  english_pob_choice: but now
  chosen_spanish: pero ahora
  alternatives_spanish:
  - y ahora
  - mas ahora
  lexicon: BDAG
  rationale: La contraposición es clara y abrupta; «pero ahora» reproduce bien el giro adversativo del griego.
- source_word: ἐκρύβη
  english_pob_choice: they have been hidden
  chosen_spanish: han sido ocultadas
  alternatives_spanish:
  - ha sido ocultada
  - fueron ocultadas
  lexicon: BDAG
  rationale: 'Aunque el verbo es singular, el referente conceptual inmediato es plural: «las cosas que conducen a la paz». Por eso se mantiene el plural en español para no borrar esa relación semántica, siguiendo la decisión auditada del POB en inglés.'
- source_word: ἀπὸ ὀφθαλμῶν σου
  english_pob_choice: from your eyes
  chosen_spanish: de tus ojos
  alternatives_spanish:
  - de tu vista
  - ante tus ojos
  lexicon: BDAG
  rationale: La imagen idiomática se conserva con una traducción literal y natural en español; «de tus ojos» mantiene el lenguaje bíblico de percepción y reconocimiento.
theological_decisions:
- issue: Sujeto implícito de ἐκρύβη
  english_pob_reading: The hidden object is 'the things that make for peace,' rendered with plural English 'they have been hidden.'
  chosen_spanish_reading: 'Se mantiene el plural: «han sido ocultadas», retomando «las cosas que conducen a la paz».'
  alternative_spanish_readings:
  - «ha sido ocultado»
  - «ha sido ocultado de tus ojos»
  rationale: Aunque el verbo griego es singular, el antecedente más cercano y coherente es el neutro plural τὰ πρὸς εἰρήνην. En español, el plural explicita mejor la referencia sin introducir contenido ajeno al texto y preserva la decisión auditada del POB.
  doctrine_reference: Translation philosophy §1, §3, §6
- issue: Fuerza del lamento condicional
  english_pob_reading: Render as 'If you had known' without adding 'only' to the main text.
  chosen_spanish_reading: «Si hubieras conocido» sin añadir «ojalá» o «solo» al texto principal.
  alternative_spanish_readings:
  - «¡Si hubieras conocido!»
  - «Si tan solo hubieras conocido»
  rationale: El matiz de lamento está presente en el contexto, pero no se añade una intensificación explícita que el griego no formule con una partícula equivalente; así se conserva la tensión retórica documentada por el POB.
  doctrine_reference: Translation philosophy §1, §6
translation_notes:
  revision_awareness: No se registran revisiones aplicadas en el último pase; la propuesta sigue el estado de alta concordancia del audit trail en inglés y mantiene sus decisiones léxicas y teológicas principales.
  spanish_consistency_notes:
  - Se usa «paz» de manera consistente para εἰρήνη.
  - Se conserva el plural en la cláusula pasiva para no borrar el antecedente neutro plural.
  - Se evita «SEÑOR» u otra sustitución teológica no pertinente; este verso no contiene el nombre divino.
  - El registro es reverente pero moderno, con sintaxis natural en español latinoamericano.
