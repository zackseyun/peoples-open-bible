translation:
  language: es
  text: Y extirparé al habitante de Asdod, y al que sostiene el cetro[a] de Ascalón; volveré mi mano[b] contra Ecrón, y perecerá el remanente de los filisteos —dice el Señor Yahvé.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «al gobernante de Ascalón»; literalmente, «al que sostiene el cetro».'
    reason: lexical_alternative
  - marker: b
    text: 'O: «haré volver mi mano contra Ecrón». El modismo hebreo expresa juicio dirigido.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהִכְרַתִּי
  english_pob_choice: I will cut off
  chosen_spanish: destruiré
  alternatives_spanish:
  - cortaré de raíz
  - eliminaré
  lexicon: HALOT
  rationale: כרת en el Hifil expresa cortar, quitar o exterminar. En español, «destruiré» comunica con naturalidad la acción judicial de eliminación total; «cortaré de raíz» suena más explicativo y menos directo, aunque conserva la idea de cortar.
- source_word: יוֹשֵׁב
  english_pob_choice: the inhabitant
  chosen_spanish: al habitante
  alternatives_spanish:
  - al que habita
  - al residente
  lexicon: HALOT
  rationale: El singular funciona de manera representativa y colectiva en un oráculo de juicio. «Habitante» mantiene esa fuerza sin convertirlo innecesariamente en «gobernante», que no está explícito en la palabra hebrea.
- source_word: וְתוֹמֵךְ שֵׁבֶט
  english_pob_choice: the one who holds the scepter
  chosen_spanish: al que sostiene el cetro
  alternatives_spanish:
  - al portador del cetro
  - al gobernante
  lexicon: HALOT
  rationale: La imagen del participio más שֵׁבֶט como cetro de mando se conserva mejor con «el que sostiene el cetro». «Gobernante» es posible por implicación, pero borra la metáfora que el texto preserva.
- source_word: וַהֲשִׁיבוֹתִי יָדִי עַל
  english_pob_choice: I will turn my hand against
  chosen_spanish: volveré mi mano contra
  alternatives_spanish:
  - volveré a extender mi mano contra
  - llevaré de nuevo mi mano contra
  lexicon: HALOT
  rationale: El hebreo usa un modismo de juicio dirigido. «Volveré mi mano contra» reproduce el giro con naturalidad en español y evita sustituirlo por otro modismo distinto.
- source_word: עַל עֶקְרוֹן
  english_pob_choice: against Ekron
  chosen_spanish: contra Ecrón
  alternatives_spanish:
  - sobre Ecrón
  lexicon: HALOT
  rationale: En contexto hostil, עַל se entiende mejor como «contra». Se conserva el nombre propio en forma española habitual «Ecrón».
- source_word: וְאָבְדוּ
  english_pob_choice: shall perish
  chosen_spanish: perecerá
  alternatives_spanish:
  - será destruido
  - desaparecerá
  lexicon: HALOT
  rationale: אבד expresa perecer, ser destruido o desaparecer. «Perecerá» mantiene el tono profético y el matiz resultativo sin forzar una voz pasiva innecesaria.
- source_word: שְׁאֵרִית פְּלִשְׁתִּים
  english_pob_choice: the remnant of the Philistines
  chosen_spanish: el remanente de los filisteos
  alternatives_spanish:
  - lo que queda de los filisteos
  - los sobrevivientes de los filisteos
  lexicon: HALOT
  rationale: «Remanente» preserva el valor técnico y profético de שְׁאֵרִית y su peso temático en los oráculos de juicio. «Lo que queda» es más explicativo, pero menos resonante.
- source_word: אֲדֹנָי יְהוִה
  english_pob_choice: the Lord GOD
  chosen_spanish: el Señor Yahvé
  alternatives_spanish:
  - el Señor Yavé
  - el Señor, Yahvé
  lexicon: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
  rationale: Se traduce el nombre divino por «Yahvé» conforme a la política terminológica del proyecto, y «Adonai» por «Señor» para conservar el título soberano. En español, «Señor Yahvé» preserva ambos elementos sin el enmascaramiento convencional de «SEÑOR».
theological_decisions:
- issue: Tratamiento del nombre divino יהוה en el título final
  english_pob_reading: the Lord GOD
  chosen_spanish_reading: el Señor Yahvé
  alternative_spanish_readings:
  - el Señor Yavé
  - el Señor, Yahvé
  rationale: El hebreo presenta explícitamente el Tetragrámaton, y la guía del proyecto pide traducirlo como «Yahvé». Mantener «Señor» para אֲדֹנָי evita perder la distinción entre título y nombre propio divino.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Valor idiomático de «volver mi mano contra»
  english_pob_reading: I will turn my hand against
  chosen_spanish_reading: volveré mi mano contra
  alternative_spanish_readings:
  - extenderé mi mano contra
  - volveré a alzar mi mano contra
  rationale: La expresión hebrea comunica juicio dirigido y renovado. La forma elegida conserva el modismo sin reemplazarlo por otro de sentido más amplio o distinto.
  doctrine_reference: HALOT, entrada idiomática de יָד con preposición עַל en contextos de juicio
translation_notes:
  revision_awareness: La revisión más reciente indicó alta concordancia y ningún cambio sustantivo necesario; esta propuesta conserva el sentido del texto hebreo y la intención auditada del POB inglés, con adaptación natural al español y mantenimiento explícito del nombre divino Yahvé.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» para יְהוָה de forma consistente con la política del proyecto.
  - «Señor» se reserva para אֲדֹנָי como título, evitando confundirlo con el nombre propio divino.
  - Se conserva la metáfora de la mano para el modismo de juicio, sin desplazarla por una paráfrasis explicativa.
  - «Remanente» se usa como término profético estándar para שְׁאֵרִית.
  - 'Los nombres propios se normalizan a formas españolas usuales: Asdod, Ascalón, Ecrón y filisteos.'
