translation:
  language: es
  text: e Ismaía el gibeonita, un guerrero valiente entre los Treinta[a] y sobre los Treinta[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «de los Treinta»; la preposición hebrea puede indicar pertenencia al grupo de élite llamado «los Treinta».
    reason: lexical_alternative
  - marker: b
    text: «Sobre los Treinta» probablemente indica una posición de liderazgo o de rango superior con relación a los Treinta.
    reason: cultural_note
lexical_decisions:
- source_word: וְ/יִשְׁמַֽעְיָ֧ה
  english_pob_choice: and Ishmaiah
  chosen_spanish: e Ismaía
  alternatives_spanish:
  - e Ismaías
  - e Ismaía
  lexicon: HALOT
  rationale: Se conserva la conjunción coordinante inicial para continuar la lista. El nombre propio se translitera en una forma natural para el español bíblico; 'Ismaía' evita una castellanización innecesaria y sigue de cerca la forma hebrea.
- source_word: הַ/גִּבְעוֹנִ֛י
  english_pob_choice: the Gibeonite
  chosen_spanish: el gibeonita
  alternatives_spanish:
  - de Gabaón
  - el de Gabaón
  lexicon: HALOT
  rationale: El gentilicio con artículo se expresa como sustantivo gentilicio en español, preservando la identificación por origen o afiliación. Se evita la paráfrasis 'de Gabaón' para no perder la fuerza nominal del hebreo.
- source_word: גִּבּ֥וֹר
  english_pob_choice: a mighty man
  chosen_spanish: un hombre valiente
  alternatives_spanish:
  - un guerrero
  - un hombre poderoso
  - un guerrero valiente
  lexicon: HALOT
  rationale: En este contexto de lista militar, גִּבּוֹר apunta a fuerza/valor marcial. 'Hombre valiente' comunica el sentido sin sonar demasiado solemne o redundante en español, aunque conserva la categoría de guerrero destacado.
- source_word: בַּ/שְּׁלֹשִׁ֖ים
  english_pob_choice: among the Thirty
  chosen_spanish: entre los Treinta
  alternatives_spanish:
  - de los Treinta
  - en los Treinta
  lexicon: HALOT
  rationale: La preposición permite pertenencia al grupo elite llamado 'los Treinta'. 'Entre los Treinta' es idiomático en español y mantiene la posible ambigüedad de membresía señalada en el auditorio inglés.
- source_word: וְ/עַל הַ/שְּׁלֹשִֽׁים
  english_pob_choice: and over the Thirty
  chosen_spanish: y sobre los Treinta
  alternatives_spanish:
  - y al frente de los Treinta
  - y por encima de los Treinta
  - y con autoridad sobre los Treinta
  lexicon: HALOT
  rationale: עַל aquí indica rango o autoridad. 'Sobre los Treinta' reproduce la tersedad del hebreo y deja abierta la lectura de liderazgo superior, como en el inglés auditado.
translation_notes:
  revision_awareness: 'El borrador sigue el texto hebreo consonante y la pauta de auditoría en inglés sin cambios relevantes de revisión: el consenso es alto y no se registran correcciones aplicadas.'
  spanish_consistency_notes:
  - Se conserva 'Treinta' con mayúscula para el grupo de elite, en paralelo al tratamiento del inglés POB.
  - Se mantiene una traducción breve y lista para publicación, sin expandir el hebreo más allá de la evidencia.
  - La decisión sobre 'entre' y 'sobre' mantiene la tensión semántica documentada entre pertenencia y autoridad.
