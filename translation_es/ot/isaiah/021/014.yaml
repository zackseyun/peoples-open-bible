translation:
  language: es
  text: Traigan agua para salir al encuentro del sediento[a]; habitantes de la tierra de Tema[b], salgan al encuentro del fugitivo con pan.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'También: "salgan al encuentro del fugitivo con pan para él". La frase hebrea puede significar ya sea acompañar el encuentro con su pan/provisiones o suministrarle pan.'
    reason: lexical_alternative
  - marker: b
    text: Tema era un oasis o región árabe asociada con rutas de caravanas.
    reason: cultural_note
lexical_decisions:
- source_word: לִקְרַאת
  english_pob_choice: to meet
  chosen_spanish: salir al encuentro de
  alternatives_spanish:
  - para encontrar
  - al encuentro de
  lexicon: HALOT
  rationale: El hebreo expresa movimiento o acción dirigida hacia un encuentro; en español, la locución natural y fiel es 'salir al encuentro de'. Conserva la dinámica de ambas mitades del verso sin volverlo rígidamente literal.
- source_word: צָמֵא
  english_pob_choice: the thirsty
  chosen_spanish: el sediento
  alternatives_spanish:
  - el que tiene sed
  - la persona sedienta
  lexicon: HALOT
  rationale: El adjetivo funciona sustantivamente. 'El sediento' mantiene la concisión y el valor representativo del hebreo, sin especificar número ni género más allá de lo que permite el español bíblico general.
- source_word: הֵתָיוּ
  english_pob_choice: bring
  chosen_spanish: trae
  alternatives_spanish:
  - traed
  - traigan
  lexicon: HALOT
  rationale: El imperativo plural pide una exhortación directa. En español, 'trae' funciona como llamada imperativa breve y natural; aunque la forma plural más estricta sería 'traed' o 'traigan', el verso en conjunto admite un estilo exhortativo fluido y bíblico.
- source_word: מָיִם
  english_pob_choice: water
  chosen_spanish: agua
  alternatives_spanish:
  - aguas
  lexicon: HALOT
  rationale: Correspondencia léxica directa. El singular colectivo español 'agua' expresa con naturalidad el plural hebreo en este contexto.
- source_word: יֹשְׁבֵי אֶרֶץ תֵּימָא
  english_pob_choice: O inhabitants of the land of Tema
  chosen_spanish: oh habitantes de la tierra de Tema
  alternatives_spanish:
  - habitantes de la tierra de Tema
  - oh moradores de la tierra de Tema
  lexicon: HALOT
  rationale: Se conserva el vocativo y el topónimo transliterado. 'Habitantes' refleja el participio sustantivado y 'tierra de Tema' mantiene la referencia geográfica sin introducir explicaciones en el texto principal.
- source_word: בְּלַחְמוֹ
  english_pob_choice: with his bread
  chosen_spanish: con pan
  alternatives_spanish:
  - con su pan
  - con pan para él
  - con sus provisiones
  lexicon: HALOT
  rationale: El audit trail inglés señaló una tensión textual respecto del sufijo posesivo, que fue retirado del texto principal. En español, 'con pan' preserva el sentido seguro sin decidir indebidamente entre 'su pan' y 'pan para él'.
- source_word: קִדְּמוּ
  english_pob_choice: meet
  chosen_spanish: salid al encuentro de
  alternatives_spanish:
  - recibid
  - id al encuentro de
  - encontrad
  lexicon: HALOT
  rationale: El piel tiene sentido de ir al encuentro o recibir a alguien. La misma locución usada para לִקְרַאת refuerza el paralelismo del verso y su tono exhortativo.
- source_word: נֹדֵד
  english_pob_choice: the fugitive
  chosen_spanish: el fugitivo
  alternatives_spanish:
  - el que huye
  - el errante
  - el que va huyendo
  lexicon: HALOT
  rationale: '''Fugitivo'' captura mejor el matiz de alguien en huida que ''errante''. Mantiene el enlace con el contexto de desplazamiento implícito en el oráculo.'
translation_notes:
  revision_awareness: Se tomó en cuenta la revisión más reciente del audit trail inglés, que eliminó el posesivo 'his' antes de 'bread' por la posible complejidad textual del hebreo. Por eso el texto español evita introducir un posesivo y deja 'con pan' como opción más cauta y auditable.
  spanish_consistency_notes:
  - Se mantiene 'Tema' como transliteración del topónimo, coherente con el patrón POB de nombres propios geográficos.
  - Se conserva el paralelismo verbal con dos exhortaciones al encuentro ('salir al encuentro'), evitando variar innecesariamente el sentido entre colon.
  - '''Agua'' y ''pan'' se dejan sin pluralización artificial para un español natural y fiel al hebreo colectivo.'
  - No se usa 'SEÑOR' ni terminología eclesial no presente en el verso.
