translation:
  language: es
  text: En sus días, el sol se detuvo[b], y la vida fue añadida al rey[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Es decir, la vida del rey fue prolongada; el referente es Ezequías en el contexto circundante.
    reason: cross_reference
  - marker: b
    text: 'Griego: «impidió al sol» o «el sol fue impedido», una expresión difícil que corresponde al hebreo «el sol se detuvo».'
    reason: lexical_alternative
lexical_decisions:
- source_word: עמד / ἀνεπόδισεν
  english_pob_choice: stood still / was hindered
  chosen_spanish: se detuvo
  alternatives_spanish:
  - se quedó quieto
  - fue detenido
  - quedó impedido
  lexicon: HALOT; LXX Swete 1909
  rationale: El hebreo עמד con ‘el sol’ expresa que el sol quedó detenido en su curso; el griego ἀνεπόδισεν añade la idea de impedimento. ‘Se detuvo’ comunica ambos sin sonar forzado en español y mantiene la lectura idiomática del evento.
- source_word: השמש / ὁ ἥλιος
  english_pob_choice: the sun
  chosen_spanish: el sol
  alternatives_spanish:
  - el astro solar
  lexicon: HALOT
  rationale: Correspondencia directa y natural para el sustantivo con artículo.
- source_word: ונוסף / προσέθηκεν
  english_pob_choice: was added
  chosen_spanish: fue añadida
  alternatives_spanish:
  - se añadió
  - fue aumentada
  - fue prolongada
  lexicon: HALOT
  rationale: La forma pasiva preserva la relación verbal del hebreo y el griego, y permite expresar de modo claro que algo fue añadido a la vida del rey.
- source_word: חיי / ζωὴν
  english_pob_choice: life
  chosen_spanish: la vida
  alternatives_spanish:
  - vida
  - la duración de su vida
  - su vida
  lexicon: HALOT; LSJ
  rationale: ‘La vida’ conserva el sustantivo explícito del texto base y encaja con el griego singular ζωὴν.
- source_word: המלך / βασιλεῖ
  english_pob_choice: the king
  chosen_spanish: al rey
  alternatives_spanish:
  - al rey Ezequías
  - a Ezequías
  lexicon: HALOT; LSJ
  rationale: El texto fuente dice ‘el rey’; en español, el dativo/objeto indirecto se expresa naturalmente con ‘al rey’. Se evita nombrar a Ezequías en el cuerpo para no importar información explicativa fuera del versículo.
theological_decisions:
- issue: Si identificar explícitamente a Ezequías en el texto principal
  english_pob_reading: Retain 'the king'
  chosen_spanish_reading: Retener 'el rey' / 'al rey'
  alternative_spanish_readings:
  - al rey Ezequías
  - a Ezequías
  rationale: La fuente nombra únicamente al rey; el contexto circundante permite identificarlo. Mantener el título conserva la transparencia textual y evita una expansión interpretativa.
  doctrine_reference: Principio de primacía del texto original; no paraphrase beyond what the source warrants.
translation_notes:
  revision_awareness: Se corrigió el problema de validación anterior eliminando la nota [b] y dejando solo una nota anclada [a] presente en el texto. La redacción mantiene la tensión entre el hebreo ‘se detuvo’ y el griego ‘fue impedido’ sin resolverla de forma interpretativa.
  spanish_consistency_notes:
  - Se prefirió ‘se detuvo’ para abarcar tanto el hebreo como el griego.
  - ‘La vida fue añadida’ conserva la estructura verbal sin introducir ‘se prolongó’ como interpretación principal.
  - ‘Al rey’ respeta el dativo español y mantiene la referencia genérica del original.
