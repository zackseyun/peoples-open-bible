translation:
  language: es
  text: Yahvé tu Dios lo entregará en tu mano[a], y matarás a todos sus varones con el filo de la espada.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «todos sus varones»; el hebreo especifica varones, no un término más general como «hombres».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וּנְתָנָהּ
  english_pob_choice: will give it into your hand
  chosen_spanish: lo entregará en tu mano
  alternatives_spanish:
  - y lo dará en tu mano
  - y lo pondrá en tu mano
  lexicon: HALOT
  rationale: El hebreo expresa entrega de la ciudad al control del destinatario. "Entregará" conserva la idea de dar bajo dominio, y "en tu mano" preserva la imagen idiomática sin explicarla excesivamente. Se mantiene el complemento directo masculino singular por el referente implícito de la ciudad en español bíblico-contextual.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  lexicon: HALOT
  rationale: 'Se sigue el criterio del proyecto para יהוה: transliterar el Nombre divino como "Yahvé" en el texto principal, en lugar de sustituirlo por un título.'
- source_word: אֱלֹהֶיךָ
  english_pob_choice: your God
  chosen_spanish: tu Dios
  alternatives_spanish:
  - el Dios tuyo
  lexicon: HALOT
  rationale: La forma posesiva de pacto se expresa de manera natural y fiel como "tu Dios". Mantiene el vínculo relacional del hebreo sin recargar la frase.
- source_word: בְּיָדֶךָ
  english_pob_choice: into your hand
  chosen_spanish: en tu mano
  alternatives_spanish:
  - en tu poder
  - en tus manos
  lexicon: HALOT
  rationale: La idiomática hebrea de dominio/control puede conservarse literalmente en español como "en tu mano". Aunque "en tu poder" explicita el sentido, aquí se prefiere la imagen fuente por su transparencia interlineal y porque el contexto militar ya aclara la fuerza de la expresión.
- source_word: וְהִכִּיתָ
  english_pob_choice: you shall strike down
  chosen_spanish: herirás
  alternatives_spanish:
  - golpearás
  - derribarás
  - matarás
  lexicon: HALOT
  rationale: El verbo נכה en este contexto militar implica infligir golpe mortal o derrota letal. "Herirás" conserva la fuerza verbal sin añadir un equivalente más interpretativo como "matarás"; en español bíblico puede sonar más duro o amplio que el inglés "strike down", pero aquí sirve como renderización sobria del acto bélico.
- source_word: כָּל
  english_pob_choice: all
  chosen_spanish: a todos
  alternatives_spanish:
  - todos
  - a cada
  lexicon: HALOT
  rationale: Se conserva el alcance totalizador del hebreo. Con el objeto plural humano, "a todos" fluye mejor en español y mantiene la exhaustividad del mandato.
- source_word: זְכוּרָהּ
  english_pob_choice: its males
  chosen_spanish: sus varones
  alternatives_spanish:
  - sus machos
  - todos los varones de ella
  - sus hombres
  lexicon: HALOT
  rationale: El hebreo especifica sexo masculino, no simplemente personas varones en sentido social. "Varones" comunica el rasgo sexual de forma digna y más natural que un calco como "males" o una versión más amplia como "hombres", que podría perder precisión.
- source_word: לְפִי חָרֶב
  english_pob_choice: with the edge of the sword
  chosen_spanish: con el filo de la espada
  alternatives_spanish:
  - a filo de espada
  - con la punta de la espada
  - con la espada
  lexicon: HALOT
  rationale: El hebreo usa la imagen idiomática "la boca de la espada". En español, "el filo de la espada" es la equivalencia idiomática estable que conserva la imagen de corte y la gravedad bélica mejor que una traducción plana como "con la espada".
theological_decisions:
- issue: Comando de guerra con atribución divina de la entrega de la ciudad
  english_pob_reading: The LORD your God will give it into your hand, and you shall strike down all its males with the edge of the sword.
  chosen_spanish_reading: Yahvé tu Dios lo entregará en tu mano, y herirás a todos sus varones con el filo de la espada.
  alternative_spanish_readings:
  - Yahvé tu Dios lo dará en tu mano, y matarás a todos sus varones con la espada.
  - Yahvé tu Dios te lo entregará, y derrotarás a todos sus varones.
  rationale: Se conserva la secuencia causal y militar del hebreo sin suavizar el mandato ni añadir una interpretación teológica ajena al versículo. La frase mantiene la gravedad del texto y deja explícito que la acción está enmarcada por la entrega divina.
  doctrine_reference: Translation philosophy §§1, 3, 6
translation_notes:
  revision_awareness: El texto sigue de cerca la revisión más reciente del inglés POB al conservar la coordinación simple con «y» y la secuencia verbal directa. A la vez, se ajusta al patrón español del proyecto para el Nombre divino como «Yahvé» y para la imagen idiomática de «en tu mano» / «con el filo de la espada».
  spanish_consistency_notes:
  - Se preserva «Yahvé» como forma estable para יהוה, conforme al estándar del proyecto.
  - Se mantiene la imagen idiomática de control («en tu mano») en vez de una paráfrasis como «en tu poder», para no borrar el vínculo con el hebreo.
  - «Varones» se usa para reflejar la especificación sexual del original y evitar la neutralización de «hombres» si se entendiera socialmente.
  - «Filo de la espada» es la equivalencia idiomática española más natural para לְפִי חָרֶב.
