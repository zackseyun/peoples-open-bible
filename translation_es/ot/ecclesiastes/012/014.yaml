translation:
  language: es
  text: Porque Dios llevará todo acto a juicio[a], junto con toda cosa oculta, sea bueno o malo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «incluyendo toda cosa oculta» o «respecto de toda cosa oculta».'
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Ya que
  lexicon: HALOT
  rationale: Introduce la base explicativa del versículo previo; «Porque» conserva la fuerza causal/explicativa de forma natural en español.
- source_word: אֶת כָּל מַעֲשֶׂה
  english_pob_choice: every deed
  chosen_spanish: toda obra
  alternatives_spanish:
  - todo hecho
  - toda acción
  lexicon: HALOT
  rationale: La distribución de «toda» reproduce el alcance universal de כָּל, y «obra» conserva una amplitud semántica cercana a מַעֲשֶׂה sin restringirlo solo a actos puntuales.
- source_word: הָאֱלֹהִים
  english_pob_choice: God
  chosen_spanish: Dios
  alternatives_spanish:
  - el Dios
  - Dios mismo
  lexicon: HALOT
  rationale: El artículo hebreo se expresa de modo natural en español como «Dios»; no hace falta marcar el artículo de forma explícita.
- source_word: יָבִא
  english_pob_choice: will bring
  chosen_spanish: traerá
  alternatives_spanish:
  - llevará
  - hará venir
  lexicon: HALOT
  rationale: El hiphil de בוא expresa traer hacia una esfera de evaluación; «traerá» es idiomático en español y preserva la idea de introducir la obra en el juicio.
- source_word: בְמִשְׁפָּט
  english_pob_choice: into judgment
  chosen_spanish: a juicio
  alternatives_spanish:
  - en juicio
  - para juicio
  lexicon: HALOT
  rationale: «A juicio» refleja de manera natural la dirección/ingreso a la esfera judicial que transmite la preposición con מִשְׁפָּט. «En juicio» podría sonar más estático en español.
- source_word: עַל כָּל נֶעְלָם
  english_pob_choice: with every hidden thing
  chosen_spanish: junto con toda cosa oculta
  alternatives_spanish:
  - con toda cosa secreta
  - incluyendo toda cosa oculta
  - respecto de toda cosa oculta
  lexicon: HALOT
  rationale: El hebreo puede entenderse como una adición asociada al juicio sobre la obra; «junto con» refleja esa inclusión sin resolver indebidamente la relación exacta de עַל. «Cosa oculta» conserva נֶעְלָם como lo escondido o no visible.
- source_word: אִם טוֹב וְאִם רָע
  english_pob_choice: whether good or evil
  chosen_spanish: sea buena o sea mala
  alternatives_spanish:
  - sea bueno o malo
  - ya sea bueno o malo
  lexicon: HALOT
  rationale: La fórmula con subjuntivo reproduce el binomio moral total en español. El femenino concuerda con «obra» y mantiene la evaluación ética del hebreo.
theological_decisions:
- issue: Alcance del juicio divino
  english_pob_reading: God judges every deed, with every hidden thing, whether good or evil, without specifying the mechanism or timing of judgment.
  chosen_spanish_reading: Dios someterá toda obra al juicio, junto con toda cosa oculta, sin especificar aquí si el énfasis recae solo en el juicio final o también en juicios dentro de la historia.
  alternative_spanish_readings:
  - juicio final solamente
  - juicio providencial en esta vida y juicio final
  rationale: El hebreo afirma la universalidad del juicio divino, pero no delimita explícitamente su momento ni su mecanismo. La traducción conserva esa amplitud sin imponer un esquema doctrinal más estrecho.
  doctrine_reference: Preservar la tensión teológica sin resolverla
translation_notes:
  revision_awareness: La redacción sigue de cerca la revisión más reciente del POB inglés, que prefirió «with every hidden thing» por encima de una formulación más relacional como «concerning every hidden thing». En español se optó por «junto con toda cosa oculta» para reflejar esa inclusión asociada al juicio sin introducir una preposición interpretativa más fuerte que el hebreo no exige.
  spanish_consistency_notes:
  - Se usa «Dios» para הָאֱלֹהִים conforme al estándar del proyecto.
  - Se evitó «SEÑOR» porque el texto hebreo usa אֱלֹהִים y no יהוה.
  - «Obra» conserva mejor la amplitud moral/general que «acto» en este contexto.
  - «Cosa oculta» mantiene la idea de lo no manifiesto sin reducirlo solo a «secreto» interior.
  - 'La puntuación mantiene el paralelismo final: juicio universal, inclusión de lo oculto y evaluación moral binaria.'
