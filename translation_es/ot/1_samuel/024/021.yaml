translation:
  language: es
  text: Y ahora, mira, sé que reinarás ciertamente, y el reino de Israel quedará establecido en tu mano[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «bajo tu autoridad». El hebreo dice literalmente «en tu mano», un modismo para control o poder.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְעַתָּה
  english_pob_choice: And now
  chosen_spanish: Y ahora
  alternatives_spanish:
  - Ahora
  lexicon: HALOT
  rationale: Conserva la transición discursiva con el valor conjuntivo del hebreo; la conjunción inicial es natural en español y mantiene el enlace con el contexto previo.
- source_word: הִנֵּה
  english_pob_choice: behold
  chosen_spanish: mira
  alternatives_spanish:
  - he aquí
  - mira aquí
  - mira bien
  lexicon: HALOT
  rationale: Busca reproducir la fuerza deíctica y de atención del hebreo con un giro natural en español. 'He aquí' es posible, pero 'mira' resulta más claro y menos arcaico sin perder el énfasis.
- source_word: יָדַעְתִּי
  english_pob_choice: I know
  chosen_spanish: yo sé
  alternatives_spanish:
  - sé
  - yo he sabido
  lexicon: HALOT
  rationale: El perfecto expresa una certeza asentada; en español, el presente 'sé' comunica mejor la convicción actual de Saúl que una forma compuesta más pesada.
- source_word: מָלֹךְ תִּמְלֹךְ
  english_pob_choice: you will surely reign
  chosen_spanish: tú reinarás ciertamente
  alternatives_spanish:
  - tú reinarás con certeza
  - tú seguramente reinarás
  - tú serás rey con certeza
  lexicon: HALOT
  rationale: La construcción de infinitivo absoluto + imperfecto intensifica la afirmación. 'Reinarás ciertamente' conserva el sentido de certeza y el verbo de reinar, sin reducirlo solo al estatus de rey.
- source_word: וְקָמָה
  english_pob_choice: will be established
  chosen_spanish: será establecido
  alternatives_spanish:
  - se afirmará
  - se levantará
  - quedará firme
  lexicon: HALOT
  rationale: Para un reino, 'será establecido' transmite bien la idea de quedar firme o quedar asentado. Mantiene la lectura futura del contexto y el sentido idiomático del hebreo.
- source_word: בְּיָדְךָ
  english_pob_choice: in your hand
  chosen_spanish: en tu mano
  alternatives_spanish:
  - bajo tu autoridad
  - bajo tu poder
  lexicon: HALOT
  rationale: Conserva la metáfora concreta del hebreo. La imagen de 'mano' expresa control o dominio, y el texto español la mantiene de forma transparente; las alternativas explicitan el sentido idiomático.
- source_word: מַמְלֶכֶת יִשְׂרָאֵל
  english_pob_choice: the kingdom of Israel
  chosen_spanish: el reino de Israel
  alternatives_spanish:
  - el reinado de Israel
  - la monarquía de Israel
  lexicon: HALOT
  rationale: '''Reino de Israel'' es la forma más natural y fiel para la entidad política/real nombrada por el hebreo. ''Reinado'' sería más abstracto y menos directo en este contexto.'
theological_decisions:
- issue: Fuerza de la predicción sobre el futuro de David
  english_pob_reading: A recognition/prediction that David will certainly reign and that Israel's kingdom will be firmly established under his control.
  chosen_spanish_reading: Una confesión de Saúl de que David reinará con certeza y que el reino de Israel quedará establecido en su mano.
  alternative_spanish_readings:
  - David simplemente llegará a ser rey, sin subrayar la firmeza del reino.
  - El reino será establecido solo en sentido general, sin la imagen de dominio.
  rationale: La doble forma verbal intensifica la certeza, y la frase 'en tu mano' conserva la imagen hebrea de control o dominio. No se amplía doctrinalmente el sentido; se mantiene la fuerza contextual del reconocimiento de Saúl.
  doctrine_reference: Translation philosophy §§1, 3, 5
translation_notes:
  revision_awareness: 'El draft inglés más reciente consolidó ''behold'' por formalidad, pero el audit trail mantiene la misma lectura de fondo: reconocimiento certero del futuro reinado de David y del reino de Israel firmemente establecido bajo su control. El español conserva esa lectura, con una equivalencia óptima que respeta el modismo de ''mano'' y la intensificación verbal.'
  spanish_consistency_notes:
  - Se mantuvo 'Yahvé' solo cuando corresponda; este versículo no lo contiene.
  - Se tradujo הִנֵּה con un imperativo de atención ('mira') para preservar la fuerza deíctica sin arcaísmo excesivo.
  - '''En tu mano'' conserva la metáfora hebrea y queda aclarada en nota como modismo de autoridad o poder.'
  - '''Reinarás ciertamente'' refleja la intensificación del hebreo בלי reducirlo a mera investidura.'
