revisions:
- from: 'Y dirás al pueblo de la tierra[a]: «Así ha dicho el Señor Yahvé acerca de los habitantes de Jerusalén, en la tierra de Israel: comerán su pan con angustia y beberán su agua con horror[b], para que su tierra sea hecha desolada de su plenitud, a causa de la violencia de todos los que habitan en ella».'
  to: 'Y dirás al pueblo de la tierra[a]: «Así ha dicho el Señor Yahvé acerca de los habitantes de Jerusalén en la tierra de Israel: comerán su pan con angustia y beberán su agua con horror[b], para que su tierra quede desolada[c] a causa de la violencia de todos los que habitan en ella»'
  rationale: 'Se corrige la cláusula central para un español natural y fiel al hebreo: ''quede desolada'' expresa bien תֵּשַׁם, y una nota preserva la idea de מִמְּלֹאָהּ (''su plenitud / todo lo que la llena'') que el borrador comunicaba de manera torpe. También se suaviza la puntuación eliminando la coma innecesaria tras ''Jerusalén''.'
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T22:41:50Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español preserva en general el sentido del hebreo y sigue bien la línea del POB auditado: ''pueblo de la tierra'', ''Señor Yahvé'', ''pan'', ''agua'', ''con angustia'', ''con horror'', la causalidad de ''a causa de la violencia'' y la referencia final a todos los que habitan en la tierra. Sin embargo, la cláusula ''para que su tierra sea hecha desolada de su plenitud'' no representa un español natural ni reproduce con claridad תֵּשַׁם אַרְצָהּ מִמְּלֹאָהּ. El hebreo expresa que la tierra quede/desolada, privada de su plenitud; no exige el calco torpe ''sea hecha desolada''.'
  spanish_quality_summary: La calidad es buena en casi todo el versículo, con registro digno y legible. El problema principal es de naturalidad y precisión sintáctica en 'sea hecha desolada de su plenitud', que suena calcado y poco idiomático. También conviene ajustar la coma tras 'Jerusalén' para no entorpecer la lectura. El resto del verso funciona bien en español bíblico moderno.
  glossary_alignment: 'Hay buena alineación con la terminología del proyecto: יְהוָה se vierte como ''Yahvé''; אֲדֹנָי como ''Señor''; חָמָס como ''violencia''. No hay conflicto doctrinal serio. La elección ''con horror'' para בְּשִׁמָּמוֹן es aceptable y está respaldada por la auditoría inglesa, aunque el vínculo con ''desolación'' se preserva mejor en nota. La única desviación importante es estilística/semántica en la representación de תֵּשַׁם אַרְצָהּ מִמְּלֹאָהּ.'
  issues:
  - severity: high
    issue: La frase 'para que su tierra sea hecha desolada de su plenitud' es un calco poco natural y semánticamente torpe.
    rationale: תֵּשַׁם אַרְצָהּ מִמְּלֹאָהּ se expresa mejor en español como 'para que su tierra quede desolada, despojada de su plenitud' o equivalente. 'Sea hecha desolada' no suena castellano idiomático y oscurece el efecto judicial del hebreo.
  - severity: low
    issue: La puntuación en 'los habitantes de Jerusalén, en la tierra de Israel' puede suavizarse.
    rationale: Sin la coma, 'los habitantes de Jerusalén en la tierra de Israel' fluye mejor y mantiene el mismo sentido contextual de la frase fuente.
  - severity: medium
    issue: Falta en español una nota para la alternativa de מִמְּלֹאָהּ / la cláusula de desolación, que sí quedó preservada en el rastro inglés.
    rationale: El English POB conserva la alternativa 'stripped of all that fills it'. Dado que en español el ajuste necesario reformula la frase, conviene preservar esa alternativa en nota para transparencia léxica.
  revised_spanish_text: 'Y dirás al pueblo de la tierra[a]: «Así ha dicho el Señor Yahvé acerca de los habitantes de Jerusalén en la tierra de Israel: comerán su pan con angustia y beberán su agua con horror[b], para que su tierra quede desolada[c] a causa de la violencia de todos los que habitan en ella»'
  revised_footnotes:
  - marker: a
    text: O 'el pueblo de la tierra'. La expresión hebrea puede aludir a los habitantes del territorio sin precisar una categoría social técnica.
    reason: lexical_alternative
  - marker: b
    text: O 'con desolación' o 'con espanto'. El término hebreo puede expresar tanto horror sobrecogedor como desolación devastadora.
    reason: lexical_alternative
  - marker: c
    text: O 'despojada de su plenitud' o 'despojada de todo lo que la llena'. El hebreo también puede expresarse como que la tierra queda desolada al ser vaciada de su plenitud.
    reason: lexical_alternative
  revision_rationale: 'Se corrige la cláusula central para un español natural y fiel al hebreo: ''quede desolada'' expresa bien תֵּשַׁם, y una nota preserva la idea de מִמְּלֹאָהּ (''su plenitud / todo lo que la llena'') que el borrador comunicaba de manera torpe. También se suaviza la puntuación eliminando la coma innecesaria tras ''Jerusalén''.'
