  to: 'Y les dijo: «Escuchen, por favor, este sueño que soñé[a]».'
  rationale: 'Se mejora el registro y la naturalidad del español sin apartarse del hebreo ni de la auditoría inglesa: se omite el pronombre innecesario, se mantiene נָא con «por favor» en una posición más idiomática, y se conserva explícitamente la construcción cognada con una nota mejor anclada.'
