  language: en
  yaml_path: translation/ot/jeremiah/016/006.yaml
  text: Both great and small will die in this land[a]. They will not be buried, and no one will mourn for them, or cut himself[b], or make himself bald for them.
  footnotes:
  - marker: a
    text: That is, customary mourning practices such as self-laceration and shaving the head bald will not be performed for the dead.
    reason: cultural_note
  - marker: b
    text: Or 'they will not lament for them.' The Hebrew uses an indefinite plural verb.
    reason: lexical_alternative
