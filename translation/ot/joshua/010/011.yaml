theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Nature of the heavenly projectiles
  chosen_reading: 'The main text preserves both stages of the Hebrew description: ''large stones'' and later ''hailstones.'''
  alternative_readings:
  - Translate the first mention already as 'hailstones' for immediate clarity
  rationale: The Hebrew intentionally introduces the objects as large stones from heaven and then identifies them as hailstones. Preserving that progression avoids overharmonizing and keeps the narrative emphasis on the LORD's intervention.
  doctrine_reference: DOCTRINE.md Translation philosophy §1, §5
- issue: Rendering בְּנֵי יִשְׂרָאֵל
  chosen_reading: the sons of Israel
  alternative_readings:
  - the Israelites
  rationale: The source is grammatically masculine and the translation philosophy prefers gender-accurate renderings. Because 'the Israelites' is idiomatic English and may aid readability, it is preserved in a footnote as a lexical alternative rather than adopted in the main text.
  doctrine_reference: DOCTRINE.md Translation philosophy §4
