translation:
  language: es
  text: Y Dios hizo así aquella noche, y hubo sequedad solo en el vellón, y sobre todo el suelo[a] hubo rocío.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «sobre toda la tierra hubo rocío». El hebreo אֶרֶץ puede significar «suelo», «tierra» o «país»; aquí «suelo» encaja mejor con el escenario inmediato de la señal de Gedeón.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּעַשׂ
  english_pob_choice: did
  chosen_spanish: hizo
  alternatives_spanish:
  - actuó
  - realizó
  lexicon: HALOT
  rationale: עשה aquí retoma la señal pedida por Gedeón; en español, «hizo» conserva la brevedad narrativa y la referencia anafórica de כֵּן, como en «Y Dios hizo así».
- source_word: אֱלֹהִים
  english_pob_choice: God
  chosen_spanish: Dios
  alternatives_spanish:
  - el Dios
  lexicon: HALOT
  rationale: En este contexto narrativo se refiere al Dios de Israel; «Dios» es la forma natural y fiel en español.
- source_word: כֵּן
  english_pob_choice: so
  chosen_spanish: así
  alternatives_spanish:
  - de ese modo
  - de ese modo
  lexicon: HALOT
  rationale: כֵּן remite a la condición solicitada en el versículo anterior. «Así» preserva esa referencia retrospectiva con naturalidad en español.
- source_word: בַּלַּיְלָה הַהוּא
  english_pob_choice: that night
  chosen_spanish: aquella noche
  alternatives_spanish:
  - esa noche
  - en aquella noche
  lexicon: HALOT
  rationale: La expresión temporal se vierte de manera idiomática como «aquella noche», manteniendo la especificidad del hebreo.
- source_word: וַיְהִי
  english_pob_choice: there was
  chosen_spanish: hubo
  alternatives_spanish:
  - y fue
  - y aconteció
  lexicon: HALOT
  rationale: El היה existencial se expresa bien con «hubo» en español bíblico actual, y evita una construcción más forzada.
- source_word: חֹרֶב
  english_pob_choice: dryness
  chosen_spanish: sequedad
  alternatives_spanish:
  - sequedad
  - lo seco
  lexicon: HALOT
  rationale: חֹרֶב es un sustantivo de estado, no solo un adjetivo; «sequedad» conserva mejor ese valor nominal y el contraste con el rocío.
- source_word: אֶל הַגִּזָּה
  english_pob_choice: on the fleece
  chosen_spanish: sobre el vellón
  alternatives_spanish:
  - en el vellón
  - sobre la lana
  lexicon: HALOT
  rationale: Con חֹרֶב, la preposición señala la localización del estado. «Sobre el vellón» comunica el efecto de forma clara y acorde al episodio.
- source_word: הַגִּזָּה
  english_pob_choice: the fleece
  chosen_spanish: el vellón
  alternatives_spanish:
  - la lana esquilada
  - el copo de lana
  lexicon: HALOT
  rationale: גִּזָּה alude al vellón de lana esquilada usado como señal. «Vellón» es el término más preciso y entendible en español bíblico.
- source_word: לְבַדָּהּ
  english_pob_choice: alone
  chosen_spanish: solo
  alternatives_spanish:
  - solamente
  - por sí solo
  lexicon: HALOT
  rationale: El sufijo femenino vuelve a referirse al vellón. «Solo» expresa la exclusividad de la sequedad sin añadir matices innecesarios.
- source_word: וְעַל כָּל הָאָרֶץ
  english_pob_choice: and on all the ground
  chosen_spanish: y sobre toda la tierra
  alternatives_spanish:
  - y sobre todo el suelo
  - y sobre toda la tierra
  lexicon: HALOT
  rationale: Aunque el audit trail inglés optó por «ground» para el contexto inmediato, el hebreo הָאָרֶץ admite «tierra» y en español suena más natural y amplio; aquí se mantiene el contraste local sin forzar «suelo».
- source_word: טָל
  english_pob_choice: dew
  chosen_spanish: rocío
  alternatives_spanish:
  - rocío
  - dewdrop
  lexicon: HALOT
  rationale: טָל significa «rocío». Esta elección conserva el contraste climático y evita una paráfrasis.
theological_decisions:
- issue: Alcance de הָאָרֶץ en la última cláusula
  english_pob_reading: '''on all the ground there was dew'' with a note that אֶרֶץ can mean ground, land, or earth; ''ground'' best fits the immediate setting.'
  chosen_spanish_reading: '''sobre toda la tierra hubo rocío'''
  alternative_spanish_readings:
  - '''sobre todo el suelo hubo rocío'''
  - '''sobre toda la tierra hubo rocío'''
  rationale: El hebreo permite varias opciones semánticas. En español, 'tierra' mantiene bien la amplitud posible de אֶרֶץ y es estilísticamente natural; la nota conserva la tensión con la lectura local del episodio.
  doctrine_reference: None
- issue: Reproducción del contraste de la señal
  english_pob_reading: dryness on the fleece alone, and on all the ground dew
  chosen_spanish_reading: sequedad sobre el vellón solo ... sobre toda la tierra hubo rocío
  alternative_spanish_readings:
  - sequedad sobre el vellón únicamente
  - sequedad en el vellón solamente
  rationale: La señal depende del contraste exacto entre sequedad y rocío. El español debe preservar ese paralelismo sin suavizarlo ni explicarlo en exceso.
  doctrine_reference: None
translation_notes:
  revision_awareness: 'He seguido el acuerdo alto del audit trail inglés y su revisión más reciente: conservar la coordinación narrativa con «y», y reflejar el hebreo con una cláusula breve para la acción divina y dos cláusulas existenciales paralelas. También he respetado la nota lexical sobre אֶרֶץ, aunque en español la opción principal es «tierra» y la alternativa se conserva en nota.'
  spanish_consistency_notes:
  - Usé «Dios» para אֱלֹהִים, conforme al estándar del proyecto.
  - Mantengo «vellón» para הַגִּזָּה, no «lana», para conservar la referencia concreta a la señal de Gedeón.
  - «Rocío» traduce טָל de forma directa y mantiene el contraste con «sequedad».
  - La puntuación con comas sigue el flujo narrativo coordinado del hebreo.
