review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura del hebreo: presentación de lista, ''los nombres'', referencia a los nacidos de David en Jerusalén y los cuatro nombres propios. Sin embargo, ''de los que le nacieron'' suena menos natural en español bíblico claro y desplaza innecesariamente el participio pasivo hebreo hacia una formulación verbal. La nota ya preserva bien la alternativa más explícita.'
  spanish_quality_summary: El texto es mayormente claro, pero 'los que le nacieron' resulta algo forzado y menos digno/readable que una solución más directa. 'Los nacidos de él' sería demasiado literal; 'los que le nacieron' es idiomático en algunos contextos, pero aquí suena menos limpio que 'los nacidos que tuvo' o 'los nacidos'. Conviene una leve reparación para mantener fidelidad y mejor español eclesial general.
  glossary_alignment: No hay términos teológicos sensibles del glosario principal en este versículo. Los nombres propios en español ('Samúa', 'Sobab', 'Natán', 'Salomón') son aceptables dentro de la adaptación ortográfica española. La nota léxica sobre הַיִּלֹּדִים está bien encaminada y debe mantenerse con anclaje correcto.
  issues:
  - severity: medium
    issue: La frase 'de los que le nacieron' es poco natural en este contexto.
    rationale: Aunque intenta reflejar el valor genealógico de 'born to him', en español de lectura bíblica amplia suena algo coloquial/forzada. El hebreo participial se puede representar mejor con una construcción nominal más estable, sin perder sentido.
  - severity: low
    issue: La relación entre el participio hebreo y la traducción principal queda menos transparente de lo necesario.
    rationale: El inglés auditado enfatiza 'those born' y reserva 'children born' para nota. La versión española debería conservar más de cerca ese núcleo léxico en el texto principal, dejando la explicitación 'hijos' en nota.
  revised_spanish_text: 'Estos son los nombres de los nacidos[a] que tuvo en Jerusalén: Samúa, Sobab, Natán y Salomón.'
  revised_footnotes:
  - marker: a
    text: 'O: «los hijos que le nacieron en Jerusalén». El participio hebreo significa literalmente «los nacidos».'
    reason: lexical_alternative
