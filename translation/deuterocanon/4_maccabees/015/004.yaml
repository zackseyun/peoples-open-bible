theological_decisions:
- issue: Anthropological nuance in 'likeness of soul and form'
  chosen_reading: Retain both inward and outward resemblance in the main text
  alternative_readings:
  - Render more dynamically as 'their children's character and appearance resemble them'
  rationale: The verse is not making a technical doctrinal claim about the soul, but the Greek explicitly names both ψυχή and μορφή. Preserving both avoids flattening the author's rhetoric and maintains transparency to the source.
