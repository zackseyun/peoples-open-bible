translation:
  language: es
  text: Yahvé es Dios[a], y él nos ha dado luz. Aten el sacrificio festivo[b] con cuerdas[c], hasta los cuernos del altar[d].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «y ha brillado sobre nosotros». El verbo hebreo puede significar que Yahvé dio luz a su pueblo o que brilló sobre ellos con favor.
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: «Aten el חַג». El sustantivo suele significar «fiesta» o «festival», pero aquí muchos lo entienden por asociación como el sacrificio de la fiesta; otros toman la línea como referencia a una procesión festiva.'
    reason: alternative_reading
  - marker: c
    text: O «con sogas gruesas»; algunos interpretan la palabra como «ramas», pero el sentido léxico más probable es «cuerdas/sogas».
    reason: lexical_alternative
  - marker: d
    text: O «a los cuernos del altar».
    reason: previous_rendering
lexical_decisions:
- source_word: אֵל יְהוָה
  english_pob_choice: The LORD is God
  chosen_spanish: Yahvé es Dios
  alternatives_spanish:
  - Dios es Yahvé
  - Yahvé es el Dios
  lexicon: HALOT
  rationale: 'El hebreo presenta una cláusula nominal: YHWH identificado como Dios. En español, «Yahvé es Dios» conserva la identificación directa sin añadir intensificación no marcada por el texto. Se evita «SEÑOR» porque el proyecto pide traducir el nombre divino como «Yahvé».'
- source_word: וַיָּאֶר לָנוּ
  english_pob_choice: and he has given light to us
  chosen_spanish: y él nos ha dado luz
  alternatives_spanish:
  - y nos ha iluminado
  - y ha brillado sobre nosotros
  lexicon: HALOT
  rationale: El hiphil de אור admite la idea de «dar luz/iluminar». «Nos ha dado luz» preserva el valor causativo y suena natural en español. La ambigüedad con «ha brillado sobre nosotros» queda documentada en la nota.
- source_word: אִסְרוּ
  english_pob_choice: Bind
  chosen_spanish: Atad
  alternatives_spanish:
  - Bind
  - Amarrad
  lexicon: HALOT
  rationale: El imperativo plural de אסר significa «atar / sujetar». «Atad» conserva la fuerza verbal directa y es una forma idiomática en español bíblico sin volverse arcaizante en exceso.
- source_word: חַג
  english_pob_choice: the festal sacrifice
  chosen_spanish: la víctima festiva
  alternatives_spanish:
  - la fiesta
  - el sacrificio festivo
  - la víctima del festival
  lexicon: HALOT
  rationale: Siguiendo el juicio del POB inglés, el sustantivo aquí se entiende metonímicamente como la víctima sacrificial asociada con la fiesta. «Víctima festiva» conserva esa relación cultual sin sobreexplicar en el cuerpo principal.
- source_word: בַּעֲבֹתִים
  english_pob_choice: with cords
  chosen_spanish: con cuerdas
  alternatives_spanish:
  - con gruesas sogas
  - con sogas
  lexicon: HALOT
  rationale: El término designa cuerdas/sogas; «cuerdas» es el equivalente más neutro y natural en español. Se evita «ramas» porque la evidencia léxica favorece el sentido de cuerda.
- source_word: עַד קַרְנוֹת הַמִּזְבֵּחַ
  english_pob_choice: up to the horns of the altar
  chosen_spanish: hasta las cuernas del altar
  alternatives_spanish:
  - hasta los cuernos del altar
  - hasta las esquinas del altar
  lexicon: HALOT
  rationale: «Cuernas» mantiene la metáfora cultual de los salientes del altar y el paralelismo con el hebreo. Se evita «cornos»/«esquinas» por precisión y porque en español bíblico «cuernos» puede sonar demasiado zoológico; «cuernas» resuelve mejor la referencia arquitectónica sin perder el simbolismo.
theological_decisions:
- issue: Nombre divino יהוה en la cláusula de identificación
  english_pob_reading: The LORD is God
  chosen_spanish_reading: Yahvé es Dios
  alternative_spanish_readings:
  - El Señor es Dios
  - Dios es Yahvé
  rationale: La política del proyecto exige traducir el nombre divino como «Yahvé» y no ocultarlo bajo «SEÑOR». La cláusula identifica a Yahvé con Dios; no se introduce doctrina adicional, solo se preserva la identificación del texto.
  doctrine_reference: Uso del nombre divino conforme a la política terminológica del proyecto; no implica una decisión doctrinal polémica adicional.
- issue: Sentido de חַג en contexto sacrificial
  english_pob_reading: the festal sacrifice
  chosen_spanish_reading: la víctima festiva
  alternative_spanish_readings:
  - la fiesta
  - el sacrificio festivo
  - la procesión festiva
  rationale: El mandato «Atad» requiere un objeto que pueda ser sujetado; el contexto del altar favorece leer חַג de modo metonímico como la víctima sacrificial asociada con la fiesta. Se documenta la alternativa procesional porque la ambigüedad existe, pero el contexto cultual hace más probable la lectura sacrificial.
  doctrine_reference: Decisión léxico-contextual, no doctrinal; afecta la imagen cultual del versículo.
translation_notes:
  revision_awareness: He seguido el estado de revisión más reciente del POB inglés, que mantuvo «up to the horns of the altar» por reflejar mejor עַד en este contexto, y también la elección estable de «festal sacrifice». En español, «hasta» y «víctima festiva» reproducen esas decisiones con claridad natural.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» conforme a la norma terminológica del proyecto.
  - Se usó una construcción verbal sobria y directa («nos ha dado luz») para conservar la ambigüedad del hebreo sin oscurecer el sentido.
  - «Atad» conserva el imperativo plural y el tono cultual.
  - Se evitó «SEÑOR» y «Cristo», que no corresponden a este versículo.
  - La nota sobre «cuernas» documenta la alternativa literal «cuernos» para preservar la imagen del altar.
