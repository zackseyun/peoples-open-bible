- from: 'Por tanto[a], esto dice Yahvé: «No descenderás de la cama[b] en la que has subido allí, porque ciertamente morirás». Y Elías se fue.'
  to: 'Por tanto[a], esto dice Yahvé: «No descenderás de la cama a la que has subido[b], porque ciertamente morirás». Y Elías se fue.'
  rationale: Se elimina el calco poco idiomático «allí» del texto principal para lograr un español natural sin perder el contraste semántico entre עלה y ירד. La nota b preserva la alternativa más literal con «allí» y explica la formulación hebrea, en línea con el rastro de auditoría inglés.
