translation:
  language: es
  text: Entonces sucederá que lo que yo me propuse hacerles[a], se lo haré a ustedes.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «lo que me propuse hacerles, se lo haré a ustedes».'
    reason: alternative_reading
lexical_decisions:
- source_word: וְהָיָה
  english_pob_choice: then it will happen
  chosen_spanish: Entonces sucederá
  alternatives_spanish:
  - Y será
  - Y acontecerá
  lexicon: HALOT
  rationale: El hebreo introduce aquí el resultado o consecuencia de la advertencia anterior. «Entonces sucederá» conserva ese valor futuro-resultante en español natural y digno, sin caer en arcaísmo.
- source_word: כַּאֲשֶׁר
  english_pob_choice: that what
  chosen_spanish: lo que
  alternatives_spanish:
  - según lo que
  - tal como
  lexicon: HALOT
  rationale: La construcción enlaza el contenido de lo que fue determinado con el acto subsiguiente. En español, «lo que» comunica de forma clara y fiel la cláusula sustantiva implícita sin forzar una calca.
- source_word: דִּמִּיתִי
  english_pob_choice: I intended
  chosen_spanish: me propuse
  alternatives_spanish:
  - intenté
  - tuve la intención de
  lexicon: HALOT
  rationale: El verbo aquí expresa intención determinada en un contexto de juicio. «Me propuse» mantiene la fuerza volitiva y es idiomático en español; «tuve la intención de» es más explicativo pero menos fluido.
- source_word: לַעֲשׂוֹת
  english_pob_choice: to do
  chosen_spanish: hacer
  alternatives_spanish:
  - actuar
  - tratar
  lexicon: HALOT
  rationale: «Hacer» conserva el valor amplio de עשה y permite que el contexto de juicio precise la acción sin añadir matices no explicitados.
- source_word: לָהֶם
  english_pob_choice: to them
  chosen_spanish: les
  alternatives_spanish:
  - contra ellos
  - a ellos
  lexicon: HALOT
  rationale: El hebreo usa un complemento dativo directo; en español, el clítico «les» mantiene la referencia sin introducir de antemano una preposición interpretativa como «contra».
- source_word: אֶעֱשֶׂה
  english_pob_choice: I will do
  chosen_spanish: se lo haré
  alternatives_spanish:
  - lo haré
  - procederé así con ellos
  lexicon: HALOT
  rationale: Se conserva el paralelismo con el infinitivo anterior mediante «haré». La próclisis «se lo» incorpora el complemento indirecto por continuidad referencial, evitando repetir «a ellos» de manera pesada.
- source_word: לָכֶם
  english_pob_choice: to you
  chosen_spanish: a ustedes
  alternatives_spanish:
  - contra ustedes
  - a vosotros
  lexicon: HALOT
  rationale: «A ustedes» expresa con claridad el destinatario del juicio en español neutral y amplio; se evita «contra» porque el texto hebreo mantiene la forma dativa y el contexto ya aporta la fuerza punitiva.
theological_decisions:
- issue: Fuerza del anuncio de juicio recíproco
  english_pob_reading: 'A direct divine warning of reciprocal judgment: the same action intended for the inhabitants will be done to Israel if they fail to drive them out.'
  chosen_spanish_reading: 'Una advertencia divina directa de juicio recíproco: lo que Yahvé se propuso hacer a los habitantes, lo hará a Israel si Israel no obedece.'
  alternative_spanish_readings:
  - Una simple consecuencia sin énfasis judicial
  - Una amenaza menos explícita
  rationale: El versículo no solo anuncia una consecuencia, sino un acto judicial de Yahvé. La formulación española mantiene la gravedad del aviso sin añadir detalles ajenos al texto.
  doctrine_reference: juicio divino; fidelidad del pacto; retribución conforme al contexto del libro
translation_notes:
  revision_awareness: Se corrigió la validación anterior asegurando que el marcador de nota [a] aparezca exactamente en el texto español, anclado en la cláusula «hacerles[a]». La redacción sigue de cerca el hebreo y conserva la tensión judicial documentada en el audit trail inglés.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como forma de referencia divina coherente con el proyecto.
  - Se evita el arcaísmo «sucederá que» en favor de un español claro y publicable.
  - Se preserva la repetición de «haré» para reflejar el paralelismo hebreo entre intención y ejecución.
  - La nota al pie ofrece la alternativa formal sin alterar el sentido base del texto.
