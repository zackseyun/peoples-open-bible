    text: Literalmente, «como ciervas». La imagen subraya agilidad y firmeza al andar en terreno escarpado.
    reason: lexical_alternative
  - marker: c
    text: O «mis lugares altos». La frase puede referirse a alturas físicas o, figuradamente, a lugares de seguridad o triunfo.
    reason: lexical_alternative
  - marker: d
    text: 'Esta línea final funciona como suscripción musical: «Para el director del coro; con mis instrumentos de cuerda».'
    reason: cultural_note
  revision_rationale: 'Se revisa para ajustar dos puntos centrales al hebreo y al audit trail: se restaura el valor posesivo de אֲדֹנָי con «mi Señor» en vez de «Dios», y se fortalece יַדְרִכֵנִי con «me hace andar» en lugar de «me hace caminar». También se afinan las notas para reflejar con más precisión las alternativas documentadas.'
