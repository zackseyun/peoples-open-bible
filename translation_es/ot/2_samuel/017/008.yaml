review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien la estructura y el sentido general del hebreo: Husai apela al conocimiento de Absalón sobre David y sus hombres, destaca su valentía, su ferocidad comparada con una osa despojada de sus crías, y afirma que David no pasará la noche con el pueblo. Sin embargo, hay un desajuste importante de anclaje de nota: la nota [a] está colocada sobre «hombres valientes», pero en realidad comenta מָרֵי נֶפֶשׁ («de espíritu amargo» / «fieros»), no גִבֹּרִים. También conviene pulir la puntuación final.'
  spanish_quality_summary: El español es generalmente natural y digno. «Husai», «hombres valientes», «como una osa privada de sus cachorros en el campo» y «no pasará la noche con el pueblo» son legibles. «Tú conoces» es aceptable, aunque «Tú sabes» podría sonar más idiomático; no es necesario cambiarlo. La frase «de espíritu amargo» es comprensible, pero en contexto militar y comparativo suena menos natural que «fieros»; dado que el proyecto inglés documenta la alternativa literal en nota, lo mejor es usar una forma principal más fluida y conservar la literalidad en la nota.
  glossary_alignment: No hay términos teológicos sensibles aquí. Las decisiones léxicas están en general alineadas con el expediente inglés. «Hombre de guerra» preserva bien אִישׁ מִלְחָמָה. «Pueblo» mantiene la elección inglesa revisada para הָעָם, aunque la nota debe aclarar la posible referencia a la fuerza de combate. La principal corrección necesaria es reubicar y ajustar las notas para que correspondan exactamente al texto.
  issues:
  - severity: high
    issue: La nota [a] está anclada al término equivocado.
    rationale: En el texto, [a] aparece en «hombres valientes[a]», pero la nota explica «de espíritu amargo» como alternativa de מָרֵי נֶפֶשׁ. Esto rompe la correspondencia exigida entre marcador y palabra/frase anotada.
  - severity: medium
    issue: La elección principal «de espíritu amargo» suena menos natural en español que el equivalente contextual.
    rationale: Aunque es defendible por literalidad, en este contexto de peligro militar y símil con la osa, «fieros» comunica mejor el sentido inmediato; la literalidad puede preservarse en nota.
  - severity: low
    issue: La puntuación final tiene un espacio incorrecto antes del punto.
    rationale: En español no debe haber espacio entre las comillas de cierre y el punto en esta construcción.
  - severity: medium
    issue: Falta una nota que preserve la alternativa de «no alojarse/pasar la noche con el pueblo».
    rationale: El expediente inglés conserva una nota para לֹא יָלִין אֶת־הָעָם explicando la alternativa «alojarse» y que «pueblo» probablemente se refiere a la fuerza de combate; esa información útil debería mantenerse en español.
