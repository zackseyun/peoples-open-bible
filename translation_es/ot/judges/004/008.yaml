translation:
  language: es
  text: 'Barak le dijo[a]: «Si tú vas conmigo, yo iré; pero si no vas conmigo, no iré».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, de manera más formal: «Si vas conmigo, entonces yo iré; pero si no vas conmigo, no iré».'
    reason: alternative_reading
lexical_decisions:
- source_word: וַיֹּאמֶר
  english_pob_choice: said
  chosen_spanish: le dijo
  alternatives_spanish:
  - dijo
  - habló
  lexicon: HALOT
  rationale: El hebreo narrativo introduce discurso directo; en español, «le dijo» conserva la relación verbal con el complemento indirecto femenino y suena natural en este contexto.
- source_word: אֵלֶיהָ
  english_pob_choice: to her
  chosen_spanish: a ella
  alternatives_spanish:
  - le
  - a la
  lexicon: HALOT
  rationale: El sufijo femenino singular señala a Débora; «a ella» hace explícito el referente y evita ambigüedad en una línea breve.
- source_word: בָּרָק
  english_pob_choice: Barak
  chosen_spanish: Barac
  alternatives_spanish:
  - Barak
  lexicon: Transliteración estándar al español
  rationale: Se translitera el nombre propio de forma transparente para lector hispanohablante; «Barac» evita la grafía inglesa y es la forma usual en español bíblico sin cambiar el referente.
- source_word: אִם
  english_pob_choice: if
  chosen_spanish: Si
  alternatives_spanish:
  - Si acaso
  - En caso de que
  lexicon: HALOT
  rationale: Introduce una cláusula condicional directa; «si» es la equivalencia más fiel y natural.
- source_word: תֵּלְכִי
  english_pob_choice: you will go
  chosen_spanish: vas
  alternatives_spanish:
  - irás
  - vayas
  lexicon: HALOT
  rationale: En español, el presente en prótasis condicional suele expresar mejor la condición que el futuro literal; conserva el sentido del hebreo sin endurecer la sintaxis.
- source_word: עִמִּי
  english_pob_choice: with me
  chosen_spanish: conmigo
  alternatives_spanish:
  - junto a mí
  - a mi lado
  lexicon: HALOT
  rationale: La preposición hebrea de compañía se vierte de manera idiomática con «conmigo».
- source_word: וְהָלָכְתִּי
  english_pob_choice: I will go
  chosen_spanish: yo iré
  alternatives_spanish:
  - entonces iré
  - iría
  lexicon: HALOT
  rationale: La forma verbal funciona como resultado de la condición; «yo iré» expresa la apódosis con claridad y mantiene el valor volitivo-condicional.
- source_word: וְאִם לֹא
  english_pob_choice: but if not
  chosen_spanish: pero si no
  alternatives_spanish:
  - y si no
  - sino si no
  lexicon: HALOT
  rationale: El hebreo contrapone la segunda condición a la primera; «pero si no» conserva mejor el matiz adversativo que un simple «y si no».
- source_word: לֹא אֵלֵךְ
  english_pob_choice: I will not go
  chosen_spanish: no iré
  alternatives_spanish:
  - no voy a ir
  - no iría
  lexicon: HALOT
  rationale: La negación del verbo expresa la negativa de Barac; «no iré» es directo, sobrio y fiel al resultado del condicional.
translation_notes:
  revision_awareness: El texto sigue de cerca el hebreo WLC y el audit trail inglés, manteniendo la estructura condicional y el contraste adversativo. La única variación notable respecto al inglés auditado es el uso del presente condicional español («vas/iré») en lugar del futuro literal, por ser la forma más natural y precisa en español.
  spanish_consistency_notes:
  - Se usa «Barac» como transliteración española del nombre propio.
  - Se conserva el discurso directo con comillas angulares, propio de edición bíblica en español.
  - La alternancia entre presente en la prótasis y futuro en la apódosis refleja el uso idiomático del español sin perder el sentido condicional del hebreo.
