translation:
  language: es
  text: entonces, que oigas en el cielo[a] y perdones el pecado de tus siervos, tu pueblo Israel, cuando les enseñes el buen camino en el cual deben andar[b]. Y que des lluvia sobre tu tierra, que has dado a tu pueblo como herencia.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'desde el cielo'. El hebreo dice literalmente 'oír el cielo/los cielos', y en español normalmente se explicita la preposición.
    reason: lexical_alternative
  - marker: b
    text: O 'cuando los instruyas en el buen camino en que deben andar'.
    reason: lexical_alternative
lexical_decisions:
- source_word: תִּשְׁמַע הַשָּׁמַיִם
  english_pob_choice: hear in heaven
  chosen_spanish: que oigas desde el cielo
  alternatives_spanish:
  - que oigas en el cielo
  - que oigas desde los cielos
  lexicon: HALOT
  rationale: El hebreo usa el giro idiomático ‘oír cielo/los cielos’; en español conviene explicitar la procedencia con ‘desde’. ‘Desde el cielo’ conserva el valor idiomático y suena natural en oración.
- source_word: וְסָלַחְתָּ לְחַטַּאת
  english_pob_choice: forgive the sin
  chosen_spanish: perdones el pecado
  alternatives_spanish:
  - perdones la culpa
  - perdones la ofensa
  lexicon: HALOT
  rationale: חַטָּאת aquí se refiere al acto pecaminoso que requiere perdón. ‘Pecado’ es la equivalencia más directa y clara en español, sin desplazar el sentido a ‘culpa’.
- source_word: עֲבָדֶיךָ
  english_pob_choice: your servants
  chosen_spanish: tus siervos
  alternatives_spanish:
  - tus servidores
  - tus esclavos
  lexicon: HALOT
  rationale: En este contexto de oración al pacto, ‘siervos’ comunica respeto y pertenencia sin la dureza de ‘esclavos’. Aunque el POB inglés usa ‘servants’, en español ‘siervos’ es el término más natural y reverente aquí.
- source_word: וְעַמְּךָ יִשְׂרָאֵל
  english_pob_choice: your people Israel
  chosen_spanish: tu pueblo Israel
  alternatives_spanish:
  - tu pueblo, Israel
  - tu pueblo, que es Israel
  lexicon: HALOT
  rationale: Se conserva la aposición directa del hebreo. ‘Tu pueblo Israel’ mantiene la identificación sin añadir una coma que debilite la forma compacta del original.
- source_word: כִּי תוֹרֵם
  english_pob_choice: when you teach them
  chosen_spanish: cuando les enseñes
  alternatives_spanish:
  - cuando los instruyas
  - porque les enseñes
  - ya que les enseñes
  lexicon: HALOT
  rationale: El Hifil de ירה tiene el sentido de ‘enseñar/instruir’. ‘Cuando les enseñes’ reproduce bien la relación circunstancial que el POB inglés expresó con ‘when’.
- source_word: הַדֶּרֶךְ הַטּוֹבָה
  english_pob_choice: the good way
  chosen_spanish: el buen camino
  alternatives_spanish:
  - el buen camino de vida
  - la buena senda
  lexicon: HALOT
  rationale: ‘Camino’ conserva la metáfora bíblica de conducta, y ‘buen’ refleja טוֹבָה de manera idiomática en español. ‘Senda’ es posible, pero menos natural en registro contemporáneo.
- source_word: אֲשֶׁר יֵלְכוּ בָהּ
  english_pob_choice: in which they should walk
  chosen_spanish: por el cual deben andar
  alternatives_spanish:
  - en el que deben andar
  - por donde deben caminar
  - en el que han de andar
  lexicon: HALOT
  rationale: ‘Andar’ preserva el hebraísmo moral de ‘caminar’ como conducta. ‘Por el cual’ expresa mejor en español la relación con ‘camino’ que un simple ‘en el que’.
- source_word: וְנָתַתָּה מָטָר
  english_pob_choice: may you give rain
  chosen_spanish: que des lluvia
  alternatives_spanish:
  - y des lluvia
  - que concedas lluvia
  - que envíes lluvia
  lexicon: HALOT
  rationale: נָתַן con ‘lluvia’ se puede rendir literalmente como ‘dar lluvia’, pero en español ‘dar lluvia’ suena menos natural; ‘des lluvia’ preserva la forma verbal de petición. La jussiva queda marcada por el contexto orante y la partícula ‘que’.
- source_word: עַל אַרְצְךָ
  english_pob_choice: on your land
  chosen_spanish: sobre tu tierra
  alternatives_spanish:
  - sobre tu país
  - en tu tierra
  lexicon: HALOT
  rationale: ‘Tierra’ comunica mejor el campo semántico del territorio prometido que ‘país’. Se mantiene el posesivo ‘tu’ para conservar la tensión teológica de la tierra como posesión divina.
- source_word: אֲשֶׁר נָתַתָּה לְעַמְּךָ לְנַחֲלָה
  english_pob_choice: which you have given to your people as an inheritance
  chosen_spanish: que has dado a tu pueblo como herencia
  alternatives_spanish:
  - que has dado a tu pueblo por herencia
  - que diste a tu pueblo como heredad
  lexicon: HALOT
  rationale: ‘Herencia’ es el equivalente más claro y contemporáneo de נַחֲלָה. Se evita ‘heredad’ por sonoridad más arcaica, sin perder el contenido de don pactal.
theological_decisions:
- issue: Forma de oración petitoria y jussiva
  english_pob_reading: then may you hear ... And may you give rain ...
  chosen_spanish_reading: entonces, que oigas ... Y que des lluvia ...
  alternative_spanish_readings:
  - entonces, escucha ... y da lluvia ...
  - entonces, puedas oír ... y puedas dar lluvia ...
  rationale: El hebreo y el POB inglés expresan una súplica, no una narración. En español se conserva el valor volitivo con ‘que’ y el presente de subjuntivo, manteniendo el tono de plegaria.
  doctrine_reference: Translation philosophy §3, §5
- issue: Tensión entre la tierra como posesión divina y don a Israel
  english_pob_reading: your land ... which you have given to your people as an inheritance
  chosen_spanish_reading: tu tierra ... que has dado a tu pueblo como herencia
  alternative_spanish_readings:
  - la tierra que diste a tu pueblo como herencia
  - tu tierra, que has dado a tu pueblo como herencia
  rationale: El hebreo preserva simultáneamente que la tierra es ‘tuya’ y que fue dada a Israel. Mantener ‘tu tierra’ evita borrar la posesión divina, mientras ‘como herencia’ conserva el carácter de don covenantal.
  doctrine_reference: Translation philosophy §3, §5
translation_notes:
  revision_awareness: He seguido el cambio final del POB inglés que introduce un equivalente explícito de la forma petitoria en la segunda cola ('And may you give rain'). En español, esa apertura jussiva se expresa de manera consistente con 'que' + subjuntivo en ambas mitades. También he atendido la lectura revisada que mantiene la tensión teológica de 'your land' / 'which you have given'.
  spanish_consistency_notes:
  - Se usa 'siervos' para עֲבָדֶיךָ y no 'esclavos' por el contexto reverente de oración al pacto; aquí no domina la fuerza social de dependencia sino la relación cultual con Dios.
  - Se mantiene 'camino' y 'andar' para conservar la metáfora ética de conducta.
  - '''Herencia'' se emplea de manera uniforme para נַחֲלָה, evitando alternar con ''posesión'' sin necesidad.'
  - Se ha conservado 'tu tierra' en vez de neutralizar el posesivo, para no perder la atribución divina presente en el hebreo.
