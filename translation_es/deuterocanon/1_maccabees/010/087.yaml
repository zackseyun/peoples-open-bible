translation:
  language: es
  text: Y Jonathan volvió con los que estaban con él[a], llevando mucho botín.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «despojos». El término griego se refiere a bienes tomados en combate.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐπέστρεψεν
  english_pob_choice: returned
  chosen_spanish: volvió
  alternatives_spanish:
  - regresó
  - volvió atrás
  lexicon: LSJ
  rationale: El verbo de aoristo expresa la idea simple de regresar del lugar de combate. En español, «volvió» suena natural y conserva el sentido narrativo directo sin añadir matices innecesarios.
- source_word: σὺν τοῖς παρʼ αὐτοῦ
  english_pob_choice: with those who were with him
  chosen_spanish: con los que estaban con él
  alternatives_spanish:
  - con los que iban con él
  - con sus hombres
  lexicon: LSJ
  rationale: La frase griega es idiomática y literalmente cercana a «con los que de su parte/estaban junto a él». «Con los que estaban con él» mantiene la cercanía al original y evita introducir explícitamente un matiz militar que el griego no formula de manera directa.
- source_word: ἔχοντες
  english_pob_choice: carrying
  chosen_spanish: llevando
  alternatives_spanish:
  - trayendo
  - teniendo
  lexicon: LSJ
  rationale: El participio describe la acción concomitante al regreso. «Llevando» comunica bien la idea concreta en español y se ajusta al contexto del botín, sin forzar la direccionalidad de «trayendo».
- source_word: σκῦλα
  english_pob_choice: plunder
  chosen_spanish: botín
  alternatives_spanish:
  - despojos
  - saqueo
  lexicon: LSJ
  rationale: El término se refiere a bienes tomados en guerra. «Botín» es la forma más natural y precisa en español bíblico actual; «despojos» es posible, pero suena más arcaico, y «saqueo» nombra más bien el acto que el resultado.
- source_word: πολλά
  english_pob_choice: much
  chosen_spanish: mucho
  alternatives_spanish:
  - gran cantidad de
  - muchos
  lexicon: LSJ
  rationale: Con un sustantivo colectivo como «botín», en español corresponde «mucho». Mantiene la fuerza cuantitativa del griego sin sonar artificial.
translation_notes:
  revision_awareness: 'Coincide con el paquete fuente y el audita inglés: no hay revisiones aplicadas y el estado de acuerdo es alto.'
  spanish_consistency_notes:
  - Se preservó el nombre «Jonathan» como «Jonathan», de acuerdo con la forma histórica usual en el libro, en lugar de adaptar a «Jonatán», para mantener continuidad con el contexto editorial recibido.
  - 'Se mantuvo un orden sintáctico fluido en español, pero sin perder la correspondencia de los elementos griegos principales: regreso, compañía, porte de botín.'
