translation:
  language: es
  text: 'Entonces Jehú salió hacia los siervos[a] de su señor, y uno le dijo: «¿Está todo bien? ¿Por qué vino este loco[b] a ti?». Y él les respondió: «Ustedes conocen al hombre y su manera de hablar[c]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, «los servidores de su señor». El hebreo עֶבֶד puede abarcar desde esclavo hasta servidor, según el contexto.
    reason: lexical_alternative
  - marker: b
    text: O, «este insensato» o «este demente». El hebreo usa una etiqueta claramente despectiva.
    reason: lexical_alternative
  - marker: c
    text: O, «su charla» o «su discurso». שִׂיחוֹ puede referirse en general al habla o al modo de hablar.
    reason: lexical_alternative
lexical_decisions:
- source_word: עַבְדֵי אֲדֹנָיו
  english_pob_choice: the servants of his master
  chosen_spanish: los esclavos[a] de su señor
  alternatives_spanish:
  - los servidores de su señor
  - los siervos de su señor
  lexicon: HALOT
  rationale: עֶבֶד puede significar esclavo/siervo/servidor; aquí la POB inglesa eligió 'servants' por el contexto narrativo, pero en español 'esclavos' preserva mejor la fuerza léxica básica sin convertirlos en funcionarios de alto rango. 'Su señor' mantiene אֲדֹנָיו sin introducir 'rey' que el hebreo no explicita.
- source_word: הֲשָׁלוֹם
  english_pob_choice: Is all well?
  chosen_spanish: ¿Está todo bien?
  alternatives_spanish:
  - ¿Hay paz?
  - ¿Todo está bien?
  lexicon: HALOT
  rationale: La pregunta hebrea es idiomática y apunta al estado de bienestar o paz. '¿Está todo bien?' comunica de forma natural esa inquietud sin ocultar el sentido literal de 'paz'.
- source_word: הַמְשֻׁגָּע הַזֶּה
  english_pob_choice: this madman
  chosen_spanish: este loco[b]
  alternatives_spanish:
  - este insensato
  - este demente
  lexicon: HALOT
  rationale: El término es despectivo y no neutral. 'Loco' preserva el tono insultante y la referencia a una persona considerada mentalmente desquiciada, sin suavizarlo en exceso.
- source_word: שִׂיחוֹ
  english_pob_choice: his talk
  chosen_spanish: su hablar[c]
  alternatives_spanish:
  - su charla
  - su discurso
  - su baboseo
  lexicon: HALOT
  rationale: שִׂיחַ puede referirse al habla, conversación o discurso. 'Su hablar' conserva la amplitud semántica y la ambigüedad del hebreo; 'hablar' suena algo más abstracto que 'mensaje', que sería demasiado específico.
theological_decisions:
- issue: El hebreo usa el título אֲדֹנָיו sin decir explícitamente 'rey'
  english_pob_reading: his master
  chosen_spanish_reading: su señor
  alternative_spanish_readings:
  - su amo
  - su jefe
  rationale: Mantener 'su señor' sigue la relación jerárquica del texto sin añadir una identificación que no aparece en esta frase. Evita también cargar el verso con una precisión interpretativa innecesaria.
  doctrine_reference: fidelidad textual y sobriedad exegética
- issue: La frase הֲשָׁלוֹם puede leerse literalmente como '¿paz?' o idiomáticamente como consulta de bienestar
  english_pob_reading: Is all well?
  chosen_spanish_reading: ¿Está todo bien?
  alternative_spanish_readings:
  - ¿Hay paz?
  - ¿Todo va bien?
  rationale: La opción española busca reproducir el valor pragmático de la pregunta en contexto narrativo. No se elimina la noción de 'paz'; se expresa como estado general de bienestar.
  doctrine_reference: equivalencia óptima y claridad idiomática
translation_notes:
  revision_awareness: La redacción sigue la revisión inglesa más reciente, que prefirió 'Is all well?' por ser una formulación más formal e idiomática de הֲשָלוֹם. En español se adoptó una solución igualmente idiomática ('¿Está todo bien?') y se mantuvo el tono despectivo de הַמְשֻׁגָּע הַזֶּה, así como la ambigüedad de שִׂיחוֹ.
  spanish_consistency_notes:
  - Se usa 'Jehú' con acento estándar en español.
  - Se conserva 'su señor' para reflejar אֲדֹנָיו sin introducir 'rey'.
  - Se evita 'SEÑOR' como máscara del nombre divino porque este verso no contiene el Tetragrámaton.
  - '''hablar'' se emplea como sustantivo de sentido amplio para שִׂיחוֹ, en lugar de ''mensaje''.'
