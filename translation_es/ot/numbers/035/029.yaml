revisions:
- from: Y estas serán para ustedes estatuto de juicio[a] por todas sus generaciones, en todos sus lugares de habitación[b].
  to: Y estas serán para ustedes un estatuto de juicio[a] por todas sus generaciones, en todos los lugares donde ustedes habiten[b].
  rationale: Se añadió el artículo indefinido para una sintaxis española natural, se reemplazó el calco rígido «lugares de habitación» por «lugares donde ustedes habiten» para reflejar mejor מוֹשָׁב en español claro, y se ajustó la nota a para que preserve solo alternativas reales sin duplicar la lectura principal.
  reviewer_model: gpt-5.4
