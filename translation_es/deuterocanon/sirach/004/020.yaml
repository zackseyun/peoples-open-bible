base_translation:
  language: en
  yaml_path: translation/deuterocanon/sirach/004/020.yaml
  text: My son[a], keep the proper time and beware of evil[c][b], and do not be ashamed for your own soul.
  footnotes:
  - marker: a
    text: Hebrew 'keep time' is difficult because the transmitted Hebrew includes הָמוֹן, a word usually meaning something like 'multitude,' 'wealth,' or 'tumult.' The Greek parallel reads simply 'keep/observe the proper time,' which is followed here as the clearest sense.
    reason: textual_variant
  - marker: b
    text: Or 'guard yourself from evil.' The Hebrew wording is awkward as transmitted, while the Greek parallel clearly has 'be on guard from evil.'
    reason: lexical_alternative
  - marker: c
    text: Or 'do not be ashamed for yourself' or 'for your life.' Hebrew נֶפֶשׁ and Greek ψυχή can mean 'soul,' 'self,' or 'life' depending on context.
    reason: lexical_alternative
