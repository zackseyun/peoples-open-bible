translation:
  language: es
  text: Si me piden algo en mi nombre[a], yo lo haré.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Algunos manuscritos leen: «Si piden algo en mi nombre, yo lo haré», omitiendo «me».'
