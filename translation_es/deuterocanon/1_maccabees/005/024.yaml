translation:
  language: es
  text: Y Judas Macabeo y Jonatán su hermano cruzaron el Jordán, e hicieron un viaje de tres días en la región despoblada.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: Ἰούδας ὁ Μακκαβαῖος
  english_pob_choice: Judas Maccabeus
  chosen_spanish: Judas Macabeo
  alternatives_spanish:
  - Judas el Macabeo
  - Judas Maccabeo
  lexicon: LSJ
  rationale: El epíteto funciona como designación histórica fija. «Macabeo» es la forma natural y reconocible en español, manteniendo el valor identificador sin añadir explicación ajena al texto.
- source_word: Ἰωναθὰν ὁ ἀδελφὸς αὐτοῦ
  english_pob_choice: Jonathan his brother
  chosen_spanish: Jonatán su hermano
  alternatives_spanish:
  - Jonatán, su hermano
  - su hermano Jonatán
  lexicon: LSJ
  rationale: La construcción appositiva identifica a Jonatán en relación con Judas. El español puede omitir la coma para conservar fluidez y cercanía al orden del griego.
- source_word: διέβησαν
  english_pob_choice: crossed
  chosen_spanish: cruzaron
  alternatives_spanish:
  - pasaron
  - atravesaron
  lexicon: LSJ
  rationale: El verbo expresa el paso de un lado a otro del Jordán. «Cruzaron» reproduce bien ese movimiento concreto y es idiomático en español.
- source_word: τὸν Ἰορδάνην
  english_pob_choice: the Jordan
  chosen_spanish: el Jordán
  alternatives_spanish:
  - el río Jordán
  lexicon: LSJ
  rationale: En español bíblico y geográfico, «el Jordán» es suficiente y fiel al uso del griego con artículo. «Río» sería explicativo pero no necesario.
- source_word: ἐπορεύθησαν
  english_pob_choice: went
  chosen_spanish: caminaron
  alternatives_spanish:
  - fueron
  - se fueron
  - anduvieron
  lexicon: LSJ
  rationale: El verbo señala desplazamiento deliberado. «Caminaron» comunica el avance por ruta en un registro claro; «fueron» es más general, pero menos preciso sobre el acto de desplazarse.
- source_word: ὁδὸν τριῶν ἡμερῶν
  english_pob_choice: a three-day journey
  chosen_spanish: un trayecto de tres días
  alternatives_spanish:
  - un viaje de tres días
  - una jornada de tres días
  lexicon: LSJ
  rationale: La construcción griega expresa extensión de recorrido. «Trayecto de tres días» conserva la idea de medida del camino sin sobrecargar con una fórmula demasiado literal o demasiado moderna.
- source_word: ἐν τῇ ἐρήμῳ
  english_pob_choice: in the wilderness
  chosen_spanish: por el desierto
  alternatives_spanish:
  - en el desierto
  - por la soledad
  lexicon: LSJ
  rationale: ἔρημος puede abarcar un lugar deshabitado o árido. «Desierto» es una opción legítima en español; aquí se opta por «por el desierto» para reflejar el tránsito por una zona árida y amplia sin restringirla a un tipo técnico de paisaje.
translation_notes:
  revision_awareness: La redacción sigue de cerca el texto griego y coincide en sentido con el audit trail inglés, sin introducir notas textuales o variantes porque no hay conflicto lexical ni teológico significativo en este versículo.
  spanish_consistency_notes:
  - Se mantiene el nombre divino ausente en este versículo, por lo que no se aplica la convención de Yahvé.
  - Se usa un registro bíblico sobrio y contemporáneo, evitando arcaísmos innecesarios.
  - No se añade ‘río’ a Jordán, porque el artículo definido ya identifica claramente el topónimo en contexto.
  - ‘Caminaron un trayecto de tres días’ preserva la idea de recorrido extenso sin alterar el contenido factual del griego.
