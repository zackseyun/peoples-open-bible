  rationale: Se ajusta el texto para preservar la especificidad de «sons» documentada en el audit trail («hijos varones») y para mejorar la naturalidad y el paralelismo verbal en español («quede viuda»). Se conserva la nota léxica sobre «sin padre / huérfanos».
