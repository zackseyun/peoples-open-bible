    text: 'O: «yo había construido la muralla». El hebreo dice simplemente «construí»; se usa «reconstruido» porque el contexto es la restauración de una muralla existente.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «Gesem el de Arabia».'
    reason: lexical_alternative
  revision_rationale: Se corrige una nota al pie defectuosa («arabio») y se mejora la claridad arquitectónica de שְׁעָרִים evitando «portones». Se conserva la distinción entre דְּלָתוֹת y שְׁעָרִים con «las puertas» y «las puertas de la ciudad». También se normaliza la puntuación del inciso.
