    reason: alternative_reading
  revision_rationale: La revisión mantiene el sentido del borrador, pero corrige el anclaje de la nota textual para que corresponda a la imagen alternativa griega y ajusta «semblante» a «apariencia» para alinearse mejor con מַרְאֶה y con la auditoría inglesa.
