  text: כִּ֤י יָדַ֨עְתִּי֙ רַבִּ֣ים פִּשְׁעֵי/כֶ֔ם וַ/עֲצֻמִ֖ים חַטֹּֽאתֵי/כֶ֑ם צֹרְרֵ֤י צַדִּיק֙ לֹ֣קְחֵי כֹ֔פֶר וְ/אֶבְיוֹנִ֖ים בַּ/שַּׁ֥עַר הִטּֽוּ׃
base_translation:
  language: en
  yaml_path: translation/ot/amos/005/012.yaml
  text: For I know that your transgressions are many and your sins are great—those who oppress the righteous[a], who take a bribe[b], and who turn aside the needy in the gate.
  footnotes:
