translation:
  language: es
  text: Y si el entendimiento[a] obra eficazmente[b], ¿quién entre las cosas que existen es más hábil que ella?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «prudencia» o «sabiduría práctica». El término griego puede referirse a entendimiento práctico, juicio sensato o inteligencia práctica.
    reason: lexical_alternative
  - marker: b
    text: Literalmente, «¿quién de las cosas que son es más artesana que ella?». También puede expresarse «si el entendimiento trabaja» o «si produce». El verbo griego puede enfatizar actividad eficaz o resultado productivo, y el sustantivo griego alude a una artesana o experta en un oficio.
    reason: lexical_alternative
lexical_decisions:
- source_word: φρόνησις
  english_pob_choice: understanding
  chosen_spanish: prudencia
  alternatives_spanish:
  - entendimiento
  - discernimiento
  - sabiduría práctica
  lexicon: LSJ
  rationale: φρόνησις en sabiduría griega y deuterocanónica suele tener el sentido de juicio sensato, prudencia o sabiduría práctica. En español, 'prudencia' comunica bien la inteligencia práctica sin confundirla con σοφία ('sabiduría') y mantiene el registro bíblico-digno.
- source_word: ἐργάζεται
  english_pob_choice: is effective
  chosen_spanish: obra eficazmente
  alternatives_spanish:
  - trabaja
  - produce
  - está en acción
  - es eficaz
  lexicon: LSJ
  rationale: El verbo medio aquí expresa actividad con efecto o resultado. 'Obra eficazmente' conserva la fuerza de operación efectiva sin sonar demasiado mecánico; además permite una construcción natural en español que mantiene el sentido de eficacia productiva del griego.
- source_word: τῶν ὄντων
  english_pob_choice: among existing things
  chosen_spanish: entre las cosas que existen
  alternatives_spanish:
  - entre los seres
  - de las cosas que son
  - entre todo lo que existe
  lexicon: LSJ
  rationale: La expresión griega literalmente dice 'de las cosas que son'. 'Entre las cosas que existen' preserva el alcance ontológico sin volverlo excesivamente filosófico o abstracto en español.
- source_word: μᾶλλόν
  english_pob_choice: more
  chosen_spanish: más
  alternatives_spanish:
  - con mayor grado
  - más bien
  lexicon: LSJ
  rationale: En la pregunta comparativa, 'más' es la correspondencia directa y más natural en español.
- source_word: τεχνῖτις
  english_pob_choice: skillful / craftswoman
  chosen_spanish: hábil
  alternatives_spanish:
  - artesana
  - diestro/a
  - experta
  lexicon: LSJ
  rationale: Aunque τεχνῖτις puede aludir a una artesana o maestra del oficio, la revisión inglesa final privilegió la cualidad ('skillful') sobre el sustantivo ocupacional. 'Hábil' reproduce la comparación de destreza sin introducir un oficio explícito que el español haría menos natural en esta pregunta retórica.
theological_decisions:
- issue: Personificación femenina de φρόνησις
  english_pob_reading: Retain feminine personification with 'she' and a feminine occupational term.
  chosen_spanish_reading: Mantener la personificación femenina con 'ella'.
  alternative_spanish_readings:
  - usar 'eso' o 'ello' para neutralizar la referencia
  - convertir la frase a un impersonal sin género
  rationale: El griego usa αὐτῆς y mantiene un referente femenino. El español conserva esa personificación con 'ella', evitando neutralizarla y respetando la retórica del texto.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4
- issue: Diferencia lexical entre φρόνησις y σοφία
  english_pob_reading: Translate φρόνησις distinctly as 'understanding' rather than 'wisdom.'
  chosen_spanish_reading: Traducir φρόνησις de manera distinta de 'sabiduría', como 'prudencia'.
  alternative_spanish_readings:
  - sabiduría
  - entendimiento
  rationale: En el contexto inmediato se está elogiando la Sabiduría, pero aquí el término griego no es σοφία. 'Prudencia' conserva la distinción léxica y evita identificar automáticamente ambos conceptos.
  doctrine_reference: DOCTRINE.md §Translation philosophy 1, 5
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión inglesa más reciente, que prefirió 'effective' frente a 'productive' y 'skillful' frente a una paráfrasis ocupacional más marcada. En español se optó por 'obra eficazmente' y 'hábil' para reflejar esa decisión revisada sin perder el trasfondo léxico del griego.
  spanish_consistency_notes:
  - Se conserva el tratamiento femenino de la personificación con 'ella'.
  - Se evita traducir φρόνησις como 'sabiduría' para no confundirla con σοφία.
  - '''Entre las cosas que existen'' mantiene el valor de τῶν ὄντων de forma natural en español.'
  - '''Hábil'' traduce la comparación final de destreza sin introducir una ocupación específica que el español no exige aquí.'
