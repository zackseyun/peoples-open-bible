translation:
  language: es
  text: ¡Qué débil es tu corazón, declara el Señor Yahvé, cuando haces todas estas cosas, las obras de una prostituta descarada[a]!
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «una prostituta dominante»; el adjetivo hebreo puede transmitir una conducta audaz, imperiosa o desvergonzada.
    reason: lexical_alternative
lexical_decisions:
- source_word: מָה
  english_pob_choice: How
  chosen_spanish: ¡Qué...!
  alternatives_spanish:
  - ¿Cómo...?
  - ¡Cuán...!
  lexicon: HALOT
  rationale: El hebreo abre con una exclamación de intensidad, no con una pregunta informativa. En español, «¡Qué...!» transmite mejor el golpe retórico del reproche.
- source_word: אֲמֻלָה
  english_pob_choice: weak
  chosen_spanish: desfallecido
  alternatives_spanish:
  - débil
  - lánguido
  - enfermo
  lexicon: HALOT
  rationale: La raíz expresa debilidad o languidez. «Desfallecido» conserva la idea de debilitamiento interno y suena natural en español bíblico contemporáneo.
- source_word: לִבָּתֵךְ
  english_pob_choice: your heart
  chosen_spanish: tu corazón
  alternatives_spanish:
  - tu mente
  - tu interior
  lexicon: HALOT
  rationale: Se mantiene la imagen antropológica del «corazón» como centro interior de la persona, sin rebajarla a una paráfrasis más abstracta.
- source_word: נְאֻם אֲדֹנָי יְהוִה
  english_pob_choice: declares the Lord GOD
  chosen_spanish: declara el Señor Yahvé
  alternatives_spanish:
  - declara el Señor Dios
  - oráculo del Señor Yahvé
  lexicon: HALOT
  rationale: Se conserva la fórmula profética con «declara» y se traduce el nombre divino como «Yahvé» según la directriz del proyecto. «Señor» refleja אֲדֹנָי y evita una repetición torpe en español.
- source_word: בַּעֲשׂוֹתֵךְ
  english_pob_choice: when you do
  chosen_spanish: cuando haces
  alternatives_spanish:
  - al hacer
  - por hacer
  lexicon: HALOT
  rationale: El infinitivo con ב expresa aquí circunstancia/tiempo. «Cuando haces» da la relación temporal de forma clara y fluida.
- source_word: אֶת כָּל אֵלֶּה
  english_pob_choice: all these things
  chosen_spanish: todas estas cosas
  alternatives_spanish:
  - todo esto
  - todas estas
  lexicon: HALOT
  rationale: Se preserva el alcance total del demostrativo con una formulación natural en español.
- source_word: מַעֲשֵׂה
  english_pob_choice: the deeds of
  chosen_spanish: las obras de
  alternatives_spanish:
  - los hechos de
  - los actos de
  lexicon: HALOT
  rationale: En este sintagma calificativo, «obras» conserva el valor de acciones/obrar y se ajusta bien a la caracterización moral del verso.
- source_word: אִשָּׁה זוֹנָה
  english_pob_choice: a prostitute
  chosen_spanish: una prostituta
  alternatives_spanish:
  - una ramera
  - una mujer prostituta
  lexicon: HALOT
  rationale: «Prostituta» es fiel, claro y no arcaizante. Mantiene el peso moral del término sin introducir coloración excesiva.
- source_word: שַׁלָּטֶת
  english_pob_choice: brazen
  chosen_spanish: descarada
  alternatives_spanish:
  - dominante
  - insolente
  - imperiosa
  lexicon: HALOT
  rationale: El adjetivo puede indicar audacia, arrogancia o falta de pudor. «Descarada» comunica bien la mezcla de atrevimiento y vergüenza perdida en español.
theological_decisions:
- issue: Renderización del nombre divino en la fórmula profética אֲדֹנָי יְהוִה
  english_pob_reading: declares the Lord GOD
  chosen_spanish_reading: declara el Señor Yahvé
  alternative_spanish_readings:
  - declara el Señor Dios
  - declara el Señor Yahvé de los ejércitos
  rationale: La guía del proyecto pide traducir YHWH como «Yahvé» en el texto principal. Al mismo tiempo, אֲדֹנָי se refleja con «Señor», preservando el doble componente de la fórmula sin ocultar el nombre propio divino.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יהוה / YHWH → Yahvé'
translation_notes:
  revision_awareness: La revisión inglesa más reciente indicó que no había cambios necesarios y el control cruzado señaló solo asuntos menores; por eso se mantiene la lectura principal con ajustes mínimos de español para fluidez y precisión.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» para יהוה conforme a la terminología del proyecto.
  - Se conserva «corazón» para לִבָּתֵךְ como imagen del centro interior de la persona.
  - «Prostituta descarada» reproduce la tensión moral del hebreo sin suavizarla ni volverla vulgar.
  - El adjetivo en nota preserva la alternativa léxica documentada en el audit trail inglés.
