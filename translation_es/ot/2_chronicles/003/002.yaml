translation:
  language: es
  text: Él comenzó a construir en el segundo mes[a], el segundo día, en el cuarto año de su reinado.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo literalmente: «en el segundo mes, en el segundo»; la expresión final suele entenderse como «el segundo día».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּחֶל
  english_pob_choice: He began
  chosen_spanish: Él comenzó
  alternatives_spanish:
  - Y comenzó
  - Él empezó
  lexicon: HALOT
  rationale: El verbo introduce el inicio de la acción; en español, «comenzó» comunica ese valor de manera natural y digna. Se omite la conjunción narrativa inicial para conservar fluidez, como hace el POB en inglés.
- source_word: לִבְנוֹת
  english_pob_choice: to build
  chosen_spanish: a construir
  alternatives_spanish:
  - a edificar
  - a edificar/levantar
  lexicon: HALOT
  rationale: El infinitivo de בנה se expresa con el verbo general «construir», que es claro en español moderno y no añade matices no documentados. «Edificar» es posible, pero suena más marcado y menos neutral.
- source_word: בַּחֹדֶשׁ הַשֵּׁנִי
  english_pob_choice: in the second month
  chosen_spanish: en el segundo mes
  alternatives_spanish:
  - en el mes segundo
  lexicon: HALOT
  rationale: La fórmula temporal se mantiene de forma directa. «En el segundo mes» es la equivalencia más natural y fiel al hebreo.
- source_word: בַּשֵּׁנִי
  english_pob_choice: on the second day
  chosen_spanish: en el segundo día
  alternatives_spanish:
  - el segundo día
  - al segundo día
  lexicon: HALOT
  rationale: El hebreo repite el ordinal de manera elíptica; el POB inglés explicita «day». En español, «en el segundo día» conserva esa decisión interpretativa sin sonar forzado. Se evita sobrecargar con una nota en el texto principal, pero se documenta la alternativa en nota.
- source_word: בִּשְׁנַת אַרְבַּע
  english_pob_choice: in the fourth year
  chosen_spanish: en el cuarto año
  alternatives_spanish:
  - durante el cuarto año
  lexicon: HALOT
  rationale: Es una fórmula regnal estándar. «En el cuarto año» conserva el valor cronológico directo y el tono sobrio del pasaje.
- source_word: לְמַלְכוּתוֹ
  english_pob_choice: of his reign
  chosen_spanish: de su reinado
  alternatives_spanish:
  - de su realeza
  - de su gobierno
  lexicon: HALOT
  rationale: «Reinado» es el equivalente español normal para una referencia cronológica al ejercicio real de gobierno. Mantiene el sentido sin introducir una paraphrasis.
theological_decisions:
- issue: Fórmula cronológica regnal sin implicación doctrinal especial
  english_pob_reading: in the fourth year of his reign
  chosen_spanish_reading: en el cuarto año de su reinado
  alternative_spanish_readings:
  - durante el cuarto año de su reinado
  rationale: No hay una cuestión doctrinal directa; la decisión es estilística y de precisión histórica. Se conserva la estructura temporal del hebreo y del POB inglés.
  doctrine_reference: N/A
translation_notes:
  revision_awareness: Se siguió el acuerdo alto del control cruzado y no fue necesario revisar la lectura estable de la secuencia temporal. La única decisión interpretativa relevante es la elipsis hebrea de בַּשֵּׁנִי, que el POB inglés ya explicita como día del mes.
  spanish_consistency_notes:
  - Se emplea «Dios/Yahvé/Mesías/Cristo» según los patrones del proyecto; este versículo no contiene esos términos.
  - Se mantiene un español neutro y readable, evitando arcaísmos innecesarios.
  - La nota [a] se vincula solo a la expresión elíptica del segundo ordinal, siguiendo el audit trail del POB en inglés.
