- from: para que se ofrezcan libaciones[a] a Dios Altísimo, por el rey y sus hijos, y para que oren por ellos[b].
  to: para que se ofrezcan libaciones[a] al Dios Altísimo, por el rey y sus hijos, y para que oren por ellos[b].
  rationale: Se ajusta «a Dios Altísimo» a «al Dios Altísimo» para mejor español y representación más natural del título griego, y se pule la nota sobre περὶ αὐτῶν para reflejar con más exactitud la literalidad auditada. Se conserva «sus hijos» en el texto por buena legibilidad española, pero sin una justificación que contradiga la decisión contextual del inglés.
