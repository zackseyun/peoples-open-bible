translation:
  language: es
  text: 'Le informaron y dijeron[a]: «Llegamos a la tierra a la que nos enviaste. Ciertamente mana leche y miel, y este es su fruto».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Y ciertamente mana leche y miel». El hebreo וְגַם añade énfasis a la afirmación sobre la abundancia de la tierra.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְסַפְּרוּ
  english_pob_choice: They reported
  chosen_spanish: le informaron
  alternatives_spanish:
  - le contaron
  - le reportaron
  lexicon: HALOT
  rationale: סָפַר en piel expresa dar cuenta o informar. «Le informaron» funciona naturalmente en español para un informe formal de los espías a Moisés y conserva el matiz de reporte.
- source_word: לוֹ
  english_pob_choice: to him
  chosen_spanish: le
  alternatives_spanish:
  - a él
  - a Moisés
  lexicon: HALOT
  rationale: El sufijo pronominal es simplemente «a él». En español el dativo átono «le» preserva el pronombre sin reemplazarlo por el nombre propio.
- source_word: וַיֹּאמְרוּ
  english_pob_choice: and said
  chosen_spanish: y dijeron
  alternatives_spanish:
  - y decían
  - diciendo
  lexicon: HALOT
  rationale: La secuencia narrativa se reproduce de forma directa con «y dijeron», sin añadir paráfrasis.
- source_word: בָּאנוּ
  english_pob_choice: We came to
  chosen_spanish: Llegamos a
  alternatives_spanish:
  - Vinimos a
  - Entramos en
  lexicon: HALOT
  rationale: בוא puede significar venir o llegar/entrar según contexto. «Llegamos a» refleja bien la llegada al territorio y suena natural en español.
- source_word: אֶל הָאָרֶץ אֲשֶׁר שְׁלַחְתָּנוּ
  english_pob_choice: the land to which you sent us
  chosen_spanish: la tierra a la que nos enviaste
  alternatives_spanish:
  - la tierra donde nos enviaste
  - la tierra que nos enviaste a
  lexicon: HALOT
  rationale: Se conserva el marcador direccional אֶל con «a la que» y la relativa de forma transparente y fluida.
- source_word: וְגַם
  english_pob_choice: It indeed
  chosen_spanish: Ciertamente
  alternatives_spanish:
  - Y ciertamente
  - En verdad
  lexicon: HALOT
  rationale: La partícula añade énfasis a la afirmación sobre la abundancia de la tierra. «Ciertamente» comunica ese realce sin forzar una estructura innecesaria.
- source_word: זָבַת חָלָב וּדְבַשׁ
  english_pob_choice: flows with milk and honey
  chosen_spanish: mana leche y miel
  alternatives_spanish:
  - fluye con leche y miel
  - está manando leche y miel
  lexicon: HALOT
  rationale: La imagen idiomática hebrea de abundancia agrícola se expresa con el giro castellano habitual «mana leche y miel», fiel y reconocible.
- source_word: הִוא
  english_pob_choice: It
  chosen_spanish: es
  alternatives_spanish:
  - es ella
  - es esa tierra
  lexicon: HALOT
  rationale: El pronombre femenino se refiere a «la tierra»; en español la copulativa «es» integra naturalmente la referencia sin recargar la frase.
- source_word: וְזֶה פִּרְיָהּ
  english_pob_choice: and this is its fruit
  chosen_spanish: y este es su fruto
  alternatives_spanish:
  - y he aquí su fruto
  - y esto es su fruto
  lexicon: HALOT
  rationale: El demostrativo más el sustantivo presentan el fruto como evidencia visible. «Este es su fruto» conserva el gesto de señalamiento.
theological_decisions:
- issue: Énfasis de וְגַם en la afirmación sobre la fertilidad de la tierra
  english_pob_reading: It indeed flows with milk and honey
  chosen_spanish_reading: Ciertamente mana leche y miel
  alternative_spanish_readings:
  - Y ciertamente mana leche y miel
  - En verdad mana leche y miel
  rationale: No se atenúa el valor enfático de וְגַם; se conserva como refuerzo afirmativo de la descripción de la tierra, no como mera conjunción aditiva.
  doctrine_reference: Sin implicación doctrinal directa; decisión de puntuación y énfasis textual.
translation_notes:
  revision_awareness: Se corrigió la validación anterior asegurando que el marcador de nota [a] aparezca exactamente en el texto español junto a la frase a la que corresponde. La redacción también mantiene alineación estrecha con el hebreo y con la revisión inglesa que prefirió 'to' y 'indeed'.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma general del proyecto, pero este versículo no contiene el nombre divino.
  - Se preserva el pronombre dativo en español («le») para reflejar el sufijo hebreo sin sustituirlo por el nombre de Moisés.
  - «Mana leche y miel» conserva la imagen idiomática tradicional sin perder el sentido de abundancia.
  - No se usó «Cristo/Mesías», «esclavo/siervo» ni otros términos de decisión proyectual porque no aparecen en el versículo.
