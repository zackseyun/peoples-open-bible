translation:
  language: es
  text: ¿Por qué[a], Yahvé, rechazas mi alma? ¿Por qué escondes tu rostro[b] de mí?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «¿Por qué me rechazas?». El hebreo «mi alma» también puede significar «me» o «mi vida».'
    reason: lexical_alternative
  - marker: b
    text: «Esconder tu rostro» es un modismo hebreo para retirar la presencia o la atención favorable.
    reason: cultural_note
lexical_decisions:
- source_word: לָמָה
  english_pob_choice: Why
  chosen_spanish: ¿Por qué
  alternatives_spanish:
  - ¿Con qué motivo
  - ¿Por qué razón
  lexicon: HALOT
  rationale: Es la interrogativa natural del lamento y conserva la fuerza directa del hebreo sin añadir explicación.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  lexicon: HALOT
  rationale: Se mantiene el nombre divino propio, conforme al criterio POB de no sustituirlo por un título como «Señor». En español, «Yahvé» es la forma más estable y readable para el Tetragrama.
- source_word: תִּזְנַח
  english_pob_choice: reject
  chosen_spanish: rechazas
  alternatives_spanish:
  - rechazas de ti
  - repudias
  - desprecias
  lexicon: HALOT
  rationale: El verbo expresa rechazo o desecho; «rechazas» conserva ese núcleo semántico en español moderno y evita una paráfrasis más fuerte que el hebreo.
- source_word: נַפְשִׁי
  english_pob_choice: my soul
  chosen_spanish: mi alma
  alternatives_spanish:
  - a mí
  - mi vida
  lexicon: HALOT
  rationale: Se conserva la expresión hebrea con «alma», que en este contexto puede abarcar la persona entera sin perder la dimensión interior del lamento.
- source_word: תַּסְתִּיר
  english_pob_choice: hide
  chosen_spanish: ocultas
  alternatives_spanish:
  - escondes
  - apartas
  lexicon: HALOT
  rationale: «Ocultar el rostro» reproduce de forma natural el verbo y la imagen idiomática del hebreo.
- source_word: פָּנֶיךָ
  english_pob_choice: your face
  chosen_spanish: tu rostro
  alternatives_spanish:
  - tu cara
  - tu presencia
  lexicon: HALOT
  rationale: «Rostro» mantiene la metáfora concreta del original. En español puede implicar presencia o favor, pero se conserva la imagen textual.
- source_word: מִמֶּנִּי
  english_pob_choice: from me
  chosen_spanish: de mí
  alternatives_spanish:
  - alejándote de mí
  - apartado de mí
  lexicon: HALOT
  rationale: Equivale de manera directa a la preposición hebrea y su complemento personal, sin introducir matices no presentes explícitamente.
theological_decisions:
- issue: Rendering of the divine name יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Jehová
  - el SEÑOR
  rationale: Se preserva el nombre divino personal del Tetragrama, siguiendo la política POB. En este versículo no hay necesidad de disfrazarlo con un título; la queja del salmista se dirige directamente a Yahvé.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH'
- issue: Hebrew idiom 'hide your face'
  english_pob_reading: withdrawal of favorable presence or attention
  chosen_spanish_reading: ocultar tu rostro
  alternative_spanish_readings:
  - apartar tu presencia
  - retirar tu favor
  rationale: Se conserva la imagen idiomática en el texto principal para no perder el paralelismo poético. El sentido de retirada de presencia/favor queda implícito, como en el audit trail en inglés.
  doctrine_reference: POB style on Hebrew idiom preservation
translation_notes:
  revision_awareness: Se corrigió el problema de validación anterior anclando ambos marcadores de nota directamente en el texto español. La redacción mantiene la misma lectura auditada del inglés POB, pero con terminología española consistente y publicable.
  spanish_consistency_notes:
  - Se usa «Yahvé» de forma uniforme para el nombre divino.
  - Se conserva la metáfora «rostro» en lugar de reemplazarla por una explicación en el texto principal.
  - «Alma» se mantiene por fidelidad al hebreo נֶפֶשׁ, dejando la alternativa semántica en nota.
  - La puntuación y el orden son naturales en español y reproducen el paralelismo del hebreo.
