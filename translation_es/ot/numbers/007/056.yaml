translation:
  language: es
  text: un plato de oro de diez siclos[a], lleno de incienso;
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Literalmente: ''un plato de oro, diez [siclos], lleno de incienso''. El hebreo deja implícita aquí la unidad de peso, pero en esta fórmula repetida de la ofrenda el sentido es diez siclos.'
    reason: lexical_alternative
lexical_decisions:
- source_word: כַּף
  english_pob_choice: dish
  chosen_spanish: fuente
  alternatives_spanish:
  - plato
  - cuenco
  - tazón
  lexicon: HALOT
  rationale: En el contexto de las ofrendas del tabernáculo en Números 7, כַּף designa un recipiente pequeño para incienso. En español, 'fuente' comunica un recipiente para contener ofrendas sin sugerir un utensilio doméstico como 'cuchara'. 'Plato' es posible, pero 'fuente' mantiene mejor la idea de vasija/ofrenda.
- source_word: אַחַת
  english_pob_choice: one
  chosen_spanish: una
  alternatives_spanish:
  - uno
  lexicon: HALOT
  rationale: Número cardinal femenino que concuerda con כַּף, que es femenino; en español, 'una' es la concordancia natural.
- source_word: עֲשָׂרָה
  english_pob_choice: ten
  chosen_spanish: diez
  alternatives_spanish:
  - diez [siclos]
  - diez de peso
  lexicon: HALOT
  rationale: El hebreo omite la unidad de peso, pero el contexto repetido de esta fórmula indica diez siclos. En español se puede dejar implícita la medida, o explicitarla con una nota; aquí se preserva la concisión del texto y se documenta la unidad implícita en la nota.
- source_word: זָהָב
  english_pob_choice: gold
  chosen_spanish: de oro
  alternatives_spanish:
  - de oro fino
  - dorada
  lexicon: HALOT
  rationale: Hebreo material del recipiente. 'De oro' reproduce de modo natural la relación material en español.
- source_word: מְלֵאָה
  english_pob_choice: full of
  chosen_spanish: llena de
  alternatives_spanish:
  - llena
  - colmada de
  lexicon: HALOT
  rationale: Adjetivo predicativo que describe el contenido del recipiente. 'Llena de' es la forma más natural y fiel en español.
- source_word: קְטֹרֶת
  english_pob_choice: incense
  chosen_spanish: incienso
  alternatives_spanish:
  - perfume aromático
  - aroma
  lexicon: HALOT
  rationale: Término estándar para la ofrenda aromática cultual. 'Incienso' es la equivalencia directa y clara en español bíblico.
theological_decisions:
- issue: Unidad de peso implícita en la fórmula repetida
  english_pob_reading: Literally, 'one gold dish, ten [shekels], full of incense.' The Hebrew leaves the weight unit implicit here, but in this repeated offering formula the sense is ten shekels.
  chosen_spanish_reading: El texto español conserva 'diez siclos' con nota explicativa sobre la unidad implícita en el hebreo.
  alternative_spanish_readings:
  - una fuente de oro, diez [siclos], llena de incienso
  - una fuente de oro de peso de diez siclos, llena de incienso
  rationale: No hay tensión doctrinal, pero sí una decisión de claridad textual. La fórmula repetida en Números 7 presupone la unidad de peso. En español conviene hacerla explícita o anotarla para evitar ambigüedad; se optó por una redacción fluida con nota de soporte.
  doctrine_reference: No aplica; decisión de claridad textual y métrica cultual.
translation_notes:
  revision_awareness: El texto base en inglés y la evaluación de revisión coinciden sin cambios; la versión española sigue el mismo entendimiento del hebreo y conserva la unidad implícita de peso según la nota, sin introducir expansiones no sustentadas.
  spanish_consistency_notes:
  - Se usa 'de oro' para el material y 'llena de incienso' para el contenido, manteniendo el orden natural del español.
  - '''Siclos'' se emplea como equivalente consagrado para la unidad de peso hebrea šeqel en contexto bíblico.'
  - No se introduce lenguaje eclesiástico adicional; la redacción permanece cultual y descriptiva.
