  source_alignment_summary: 'El borrador español refleja bien la estructura y el sentido general del griego: hospitalidad ofrecida a personas ingratas, seguida de un resultado adicional de oír algo amargo. Sin embargo, "darás hospedaje y bebida" debilita el paralelismo verbal de ξενιεῖς καὶ ποτιεῖς, porque el segundo verbo queda reducido a sustantivo. También conviene ajustar "además de esto" a una formulación más natural y plural, dado πρὸς ἐπὶ τούτοις (''además de estas cosas'').'
  spanish_quality_summary: 'El español es claro y legible, pero puede sonar más idiomático y fiel con dos mejoras menores: usar dos verbos coordinados ("darás hospedaje y darás de beber") y corregir la ortografía a "oirás" -> "oirás" según la norma actual preferible "oirás"? En realidad la forma normativa moderna es "oirás" sin tilde? No: el infinitivo es "oír" y el futuro es "oirás" sin tilde. El borrador ya está correcto en acento. La expresión "palabras amargas" es comprensible, aunque "cosas amargas" debe mantenerse en nota como alternativa. '
  glossary_alignment: No hay términos teológicos sensibles en este versículo. "Ingratos" corresponde bien a ἀχάριστα. La explicitación "palabras amargas" sigue la decisión del POB inglés y la nota preserva la alternativa implícita.
  issues:
  - severity: medium
    issue: El segundo verbo griego ποτιεῖς no debe reducirse a un sustantivo aislado ("bebida").
    rationale: 'El original tiene dos futuros coordinados: ''hospedarás'' y ''darás de beber''. En español, ''darás hospedaje y bebida'' comunica la idea, pero pierde la fuerza verbal paralela del griego y suena algo elíptico.'
  - severity: low
    issue: '"Además de esto" es aceptable, pero "además de estas cosas" refleja mejor τούτοις y conserva la acumulación retórica.'
    rationale: La frase griega es aditiva y ligeramente pleonástica. El plural ayuda a mantener el matiz de 'encima de todo eso' sin dificultad para el lector.
  revised_spanish_text: Darás hospedaje y darás de beber a los ingratos[a], y además de estas cosas oirás palabras amargas.
  revised_footnotes:
  - marker: a
    text: O "cosas amargas"; el griego deja implícito el objeto de "oirás", y "palabras" se suministra para que el español suene natural.
    reason: lexical_alternative
