review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien el hebreo y la auditoría inglesa: conserva «Yahvé», la súplica urgente, el modismo «de su mano», la cláusula de propósito y la confesión exclusiva final. Sin embargo, hay un problema en la nota b: repite la lectura principal («tierra») donde debería preservar la alternativa documentada «land» como «país» o «tierra» en sentido local. Además, la nota a está desanclada respecto de la auditoría inglesa: el marcador [a] en español corresponde al modismo «de su mano», mientras en inglés el contenido alternativo/explicativo se invirtió en los marcadores; conviene dejar las notas españolas internamente coherentes con el texto revisado.'
  spanish_quality_summary: El texto es claro, natural y digno en español eclesial contemporáneo. «Sálvanos, te rogamos» suena bien y evita un calco forzado. La sintaxis general es fluida. La única reparación necesaria es la formulación de la nota léxica alternativa sobre «la tierra».
  glossary_alignment: 'Buena alineación con la terminología del proyecto: יְהוָה → «Yahvé»; אֱלֹהֵינוּ → «nuestro Dios»; הוֹשִׁיעֵנוּ נָא → «sálvanos, te rogamos»; מִיָּדוֹ → «de su mano»; לְבַדֶּךָ → «solo tú». La decisión final «solo tú eres Dios» preserva correctamente la exclusividad sin introducir «el Señor Dios».'
  issues:
  - severity: medium
    issue: La nota b no preserva correctamente la alternativa léxica documentada para הָאָרֶץ.
    rationale: El texto de la nota dice «O “todos los reinos de la tierra”», que repite la lectura principal en lugar de ofrecer la alternativa equivalente a inglés «all the kingdoms of the land». Debe indicar algo como «del país» o «de la tierra» en sentido local, explicando que aquí el contexto favorece el alcance global.
  revised_spanish_text: Y ahora, Yahvé nuestro Dios, sálvanos, te rogamos, de su mano[a], para que todos los reinos de la tierra[b] sepan que solo tú eres Dios.
  revised_footnotes:
  - marker: a
    text: 'Hebreo: «de su mano», un modismo para ser librados de su poder.'
    reason: cultural_note
  - marker: b
    text: O «todos los reinos del país»; aquí «de la tierra» refleja mejor el alcance internacional del contexto.
    reason: lexical_alternative
  revision_rationale: Se mantiene el texto principal porque es fiel, claro y bien alineado con el proyecto. Solo se corrige la nota b para que preserve una alternativa real al hebreo הָאָרֶץ, en vez de repetir la lectura principal.
