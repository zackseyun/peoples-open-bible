    issue: Puntuación innecesaria en «de Asa, rey de Judá»
    rationale: En esta fórmula regnal, «rey de Judá» funciona como especificación de Asa, no como aposición parentética. Sin comas refleja mejor el hebreo y suena más natural en español bíblico moderno.
  revised_spanish_text: En el tercer año de Asa rey de Judá, Baasa hijo de Ahías llegó a ser rey sobre todo Israel en Tirsa, y reinó veinticuatro años.
