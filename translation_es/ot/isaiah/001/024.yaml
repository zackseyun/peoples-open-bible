translation:
  language: es
  text: 'Por tanto, la declaración del Señor[a], Yahvé de los Ejércitos[b], el Poderoso de Israel: «¡Ah![c], me aliviaré de mis adversarios y tomaré venganza de mis enemigos».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «el oráculo del Señor».
    reason: lexical_alternative
  - marker: b
    text: Hebreo «Yahvé de las huestes»; se traduce «de los Ejércitos» para hacer explícita la imagen militar del título.
    reason: lexical_alternative
  - marker: c
    text: O «me consolaré de mis adversarios» o «me desahogaré de mis adversarios».
    reason: lexical_alternative
lexical_decisions:
- source_word: לָכֵן
  english_pob_choice: Therefore
  chosen_spanish: Por tanto
  alternatives_spanish:
  - Por eso
  - Así que
  - Por consiguiente
  lexicon: HALOT
  rationale: La expresión introduce una conclusión fuerte a partir del juicio previo; «Por tanto» conserva el valor inferencial formal sin sonar tan áspero como un calco.
- source_word: נְאֻם
  english_pob_choice: the declaration of
  chosen_spanish: la declaración de
  alternatives_spanish:
  - el oráculo de
  - la palabra de
  - el dicho de
  lexicon: HALOT
  rationale: La fórmula profética exige un registro solemne. «La declaración de» sigue de cerca la decisión de POB en inglés y mantiene el tono performativo sin recurrir a un tecnicismo innecesario.
- source_word: הָאָדוֹן
  english_pob_choice: the Lord
  chosen_spanish: el Señor
  alternatives_spanish:
  - el Dueño
  - el Soberano
  - el Maestro
  lexicon: HALOT
  rationale: Con artículo, el título destaca la autoridad divina. En español, «el Señor» es la equivalencia más natural y reverente para este título, distinto del nombre propio Yahvé que sigue después.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahveh
  - Jehová
  lexicon: HALOT
  rationale: Se conserva el nombre divino explícito, conforme a la convención del proyecto. «Yahvé» preserva el Tetragrámaton sin ocultarlo tras un sustituto.
- source_word: צְבָא֔וֹת
  english_pob_choice: of Armies
  chosen_spanish: de los Ejércitos
  alternatives_spanish:
  - de los ejércitos celestiales
  - de los ejércitos
  - de las huestes
  lexicon: HALOT
  rationale: El hebreo alude a ejércitos/huestes; «de los Ejércitos» comunica esa fuerza con claridad en español bíblico moderno. Se evita «huestes» por ser menos transparente.
- source_word: אֲבִ֖יר יִשְׂרָאֵ֑ל
  english_pob_choice: the Mighty One of Israel
  chosen_spanish: el Poderoso de Israel
  alternatives_spanish:
  - el Fuerte de Israel
  - el Valiente de Israel
  - el Poderoso de Israel
  lexicon: HALOT
  rationale: El título subraya fuerza y majestad divina. «Poderoso» conserva el núcleo semántico de fuerza intensa sin añadir una interpretación más libre.
- source_word: ה֚וֹי
  english_pob_choice: Ah
  chosen_spanish: ¡Ah!
  alternatives_spanish:
  - ¡Ay!
  - ¡Eh!
  - ¡Ha!
  lexicon: HALOT
  rationale: La interjección expresa resolución solemne y no solo lamento. «¡Ah!» reproduce el valor exclamativo con neutralidad y dignidad.
- source_word: אֶנָּחֵ֣ם
  english_pob_choice: I will get relief
  chosen_spanish: Me aliviaré
  alternatives_spanish:
  - recibiré alivio
  - hallaré alivio
  - me consolaré
  lexicon: HALOT
  rationale: POB entiende aquí un sentido idiomático de alivio/satisfacción frente a los adversarios. «Me aliviaré» preserva la fuerza reflexiva y evita confundirlo con simple consuelo emocional.
- source_word: מִ/צָּרַ֔/י
  english_pob_choice: from my foes
  chosen_spanish: de mis adversarios
  alternatives_spanish:
  - de mis enemigos
  - de mis enemigos hostiles
  - de mis contrarios
  lexicon: HALOT
  rationale: El complemento depende del matiz de enemistad/oposición. «Adversarios» mantiene un nivel solemne y también deja abierta la relación con la siguiente mención de «enemigos».
- source_word: וְ/אִנָּקְמָ֖ה
  english_pob_choice: and avenge myself
  chosen_spanish: y me vengaré
  alternatives_spanish:
  - y tomaré venganza
  - y me vindicaré
  - y haré venganza
  lexicon: HALOT
  rationale: El verbo expresa resolución activa de retribución. «Me vengaré» conserva la primera persona y el paralelismo con la línea anterior sin suavizar el juicio.
- source_word: מֵ/אוֹיְבָֽ/י
  english_pob_choice: on my enemies
  chosen_spanish: de mis enemigos
  alternatives_spanish:
  - contra mis enemigos
  - sobre mis enemigos
  - a mis enemigos
  lexicon: HALOT
  rationale: Aunque el español corriente suele usar «contra», el paralelismo con el hebreo y con la decisión inglesa permite «de mis enemigos» como complemento de desahogo/represalia dentro de la frase verbal. Se mantiene la repetición léxica de «enemigos» para reflejar el segundo miembro.
theological_decisions:
- issue: Uso del nombre divino YHWH frente a un sustituto reverencial
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el Señor
  - el Eterno
  - Jehová
  rationale: El hebreo contiene el Tetragrámaton explícito y el proyecto pide su transliteración. Traducirlo como «el Señor» ocultaría el nombre propio y borraría una decisión teológica auditable.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Distinción entre alivio divino y venganza divina
  english_pob_reading: I will get relief from my foes and avenge myself on my enemies
  chosen_spanish_reading: Me aliviaré de mis adversarios y me vengaré de mis enemigos
  alternative_spanish_readings:
  - Me consolaré de mis adversarios y me vengaré de mis enemigos
  - Recibiré alivio de mis adversarios y me vengaré de mis enemigos
  - Me aliviaré de mis enemigos y me vengaré de mis enemigos
  rationale: 'El versículo contiene dos verbos relacionados pero no idénticos. La redacción española conserva la tensión: primero un alivio/descarga frente a los adversarios, luego la acción retributiva explícita. No se fusionan ambos miembros ni se reduce la fuerza judicial del segundo.'
  doctrine_reference: DOCTRINE.md Translation philosophy §3
- issue: Tono del término צְבָאוֹת
  english_pob_reading: of Armies
  chosen_spanish_reading: de los Ejércitos
  alternative_spanish_readings:
  - de las huestes
  - de los ejércitos
  - de las huestes celestiales
  rationale: Se conserva el sentido militar concreto del hebreo. «Ejércitos» es suficientemente claro para lectores bíblicos en español y mantiene la solemnidad del título divino.
  doctrine_reference: POB lexical policy on צְבָאוֹת
translation_notes:
  revision_awareness: 'La redacción sigue de cerca el texto hebreo WLC y la decisión inglesa POB más reciente, incluyendo la conservación explícita de YHWH como «Yahvé» y la distinción entre el verbo de alivio/consuelo (אֶנָּחֵם) y el verbo de venganza (וְאִנָּקְמָה). Se evitó copiar mecánicamente el inglés en la segunda cláusula: en español se prefirió una solución idiomática que mantenga la tensión semántica documentada por POB. También se resolvió la repetición del título divino con una estructura natural en español: «el Señor, Yahvé de los Ejércitos».'
  spanish_consistency_notes:
  - Se mantuvo el nombre divino como «Yahvé» en lugar de «SEÑOR», conforme a la política del proyecto.
  - Se conservó la repetición de «enemigos» para reflejar el paralelismo del hebreo y la decisión inglesa.
  - «Adversarios» y «enemigos» se distinguen levemente para no aplastar la doble referencia del verso.
  - La puntuación con dos puntos antes de la cita refleja adecuadamente la fórmula profética.
  - La interjección quedó dentro de comillas latinas para mantener el registro bíblico publicable.
