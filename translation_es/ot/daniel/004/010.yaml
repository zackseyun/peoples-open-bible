translation:
  language: es
  text: Estaba mirando en las visiones de mi cabeza mientras yacía en mi cama, y he aquí, un vigilante, un santo[a], bajó del cielo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «un ángel vigilante»; el arameo dice literalmente «un vigilante, un santo».
    reason: lexical_alternative
lexical_decisions:
- source_word: חָזֵה הֲוֵית
  english_pob_choice: I was looking
  chosen_spanish: Estaba mirando
  alternatives_spanish:
  - Yo veía
  - Estaba viendo
  lexicon: HALOT
  rationale: La construcción perifrástica del arameo expresa una percepción en curso en el pasado. «Estaba mirando» comunica ese aspecto progresivo de manera natural en español sin perder el matiz narrativo.
- source_word: בְּחֶזְוֵי
  english_pob_choice: the visions
  chosen_spanish: las visiones
  alternatives_spanish:
  - visiones
  - las apariciones
  lexicon: HALOT
  rationale: El sustantivo apunta a visiones o escenas visionarias. Se conserva el plural y el valor concreto del sustantivo, como en el contexto de un relato onírico.
- source_word: רֵאשִׁי
  english_pob_choice: of my head
  chosen_spanish: de mi cabeza
  alternatives_spanish:
  - de mi mente
  - en mi mente
  lexicon: HALOT
  rationale: Se mantiene la imagen corporal del arameo. «De mi cabeza» es más fiel que una interpretación interiorizada como «de mi mente».
- source_word: עַל מִשְׁכְּבִי
  english_pob_choice: as I lay on my bed
  chosen_spanish: mientras yacía en mi cama
  alternatives_spanish:
  - sobre mi cama
  - en mi cama
  lexicon: HALOT
  rationale: La frase sitúa la visión durante el acto de estar acostado. «Mientras yacía en mi cama» conserva esa simultaneidad y suena natural en español.
- source_word: וַאֲלוּ
  english_pob_choice: and behold
  chosen_spanish: y he aquí
  alternatives_spanish:
  - y mira
  - entonces he aquí
  lexicon: HALOT
  rationale: Es la fórmula discursiva que introduce una aparición inesperada. «Y he aquí» preserva el valor de atención súbita sin volverlo coloquial.
- source_word: עִיר
  english_pob_choice: a watcher
  chosen_spanish: un vigilante
  alternatives_spanish:
  - un guardián
  - un observador
  lexicon: HALOT
  rationale: El arameo nombra a un ser celestial con un término activo de vigilancia. «Vigilante» conserva esa fuerza verbal y evita sustituirlo prematuramente por «ángel».
- source_word: וְקַדִּישׁ
  english_pob_choice: a holy one
  chosen_spanish: un santo
  alternatives_spanish:
  - un ser santo
  - un consagrado
  lexicon: HALOT
  rationale: Aunque el inglés separa «watcher» y «holy one», en español «un santo» puede funcionar como aposición sustantivada. Se evita añadir explicaciones que el verso no da.
- source_word: מִן שְׁמַיָּא
  english_pob_choice: from heaven
  chosen_spanish: desde el cielo
  alternatives_spanish:
  - del cielo
  - desde los cielos
  lexicon: HALOT
  rationale: Se opta por «desde el cielo» para reflejar el movimiento de descenso y mantener el registro bíblico natural en español. El plural arameo se expresa idiomáticamente como singular.
- source_word: נָחִת
  english_pob_choice: came down
  chosen_spanish: descendió
  alternatives_spanish:
  - bajó
  - vino abajo
  lexicon: HALOT
  rationale: El verbo indica movimiento hacia abajo desde lo alto. «Descendió» conserva el tono formal y la dirección del movimiento con precisión.
theological_decisions:
- issue: Identidad de עִיר וְקַדִּישׁ
  english_pob_reading: Render literally as 'a watcher, a holy one' without identifying the being more specifically.
  chosen_spanish_reading: «un vigilante, un santo», sin identificarlo más específicamente.
  alternative_spanish_readings:
  - un ángel
  - un mensajero celestial
  rationale: El arameo usa una designación propia y no el término general para «ángel». Mantenerla en español preserva la tensión interpretativa del texto y evita resolverla más allá de lo que el verso dice.
  doctrine_reference: Primacía del texto original; preservar la tensión lexicológica y teológica.
translation_notes:
  revision_awareness: Se siguió el último pase de revisión del inglés POB que prioriza la lectura en curso («I was looking») y mantiene la literalidad de «visions of my head», «watcher» y «holy one». La presente versión española conserva esos rasgos con un orden sintáctico natural en español y sin identificar al ser celestial más allá del texto.
  spanish_consistency_notes:
  - Se emplea «Dios», «Yahvé» y «Mesías» según las normas del proyecto cuando corresponda; en este versículo no aparecen.
  - Se evita «SEÑOR» como sustituto del nombre divino porque el versículo no lo contiene.
  - «Vigilante» se usa como equivalente consistente de עִיר para preservar el término distintivo del arameo.
  - «Santo» se mantiene sustantivado para reflejar la aposición del original sin añadir interpretación.
  - La puntuación refleja una sola oración narrativa con un inciso temporal claro y una aparición repentina introducida por «y he aquí».
