base_translation:
  language: en
  yaml_path: translation/ot/habakkuk/003/006.yaml
  text: He stood and measured the earth[a]; he looked and made nations tremble. The ancient mountains were shattered; the everlasting hills sank low[b]. His ways are everlasting.
  footnotes:
