translation:
  language: es
  text: ¿Acaso corren los caballos sobre la peña? ¿Acaso se ara con bueyes? Pero ustedes han convertido la justicia en veneno[a], y el fruto de la rectitud[c] en ajenjo[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «en hiel» para «en veneno»; el hebreo רֹאשׁ puede designar una sustancia o planta amarga o venenosa.
    reason: lexical_alternative
  - marker: b
    text: «Ajenjo» nombra una planta muy amarga usada metafóricamente para corrupción moral y amarga consecuencia.
    reason: cultural_note
  - marker: c
    text: O «el fruto de la justicia» para «el fruto de la rectitud»; el hebreo צְדָקָה puede llevar matiz moral o jurídico según el contexto.
    reason: lexical_alternative
lexical_decisions:
- source_word: הַיְרֻצוּן
  english_pob_choice: Do ... run
  chosen_spanish: ¿Acaso corren... ?
  alternatives_spanish:
  - ¿Van a correr... ?
  - ¿Corren... ?
  lexicon: HALOT
  rationale: La forma interrogativa retórica pide en español una pregunta natural que exprese lo absurdo de la imagen. «Acaso» conserva el tono polémico sin volverlo condicional.
- source_word: בַּסֶּלַע
  english_pob_choice: on rock
  chosen_spanish: sobre la peña
  alternatives_spanish:
  - sobre la roca
  - en la roca
  lexicon: HALOT
  rationale: «Peña» comunica bien el terreno rocoso y la fuerza proverbial de סֶלַע; «sobre la roca» también sería válido, pero aquí «peña» suena más vivo y concreto en español bíblico moderno.
- source_word: סוּסִים
  english_pob_choice: horses
  chosen_spanish: los caballos
  alternatives_spanish:
  - caballos
  lexicon: HALOT
  rationale: Plural directo y natural en español.
- source_word: אִם
  english_pob_choice: Does one
  chosen_spanish: ¿Acaso... ?
  alternatives_spanish:
  - ¿O acaso... ?
  - ¿Se... ?
  lexicon: HALOT
  rationale: En la segunda pregunta, אִם funciona como segunda cola retórica, no como condicional. «Acaso» reproduce el paralelismo interrogativo sin forzar un sentido hipotético.
- source_word: יַחֲרֹשׁ
  english_pob_choice: plow
  chosen_spanish: se ara
  alternatives_spanish:
  - ará
  - se labra
  lexicon: HALOT
  rationale: El verbo básico es «arar». El impersonal pasivo/reflexivo «se ara» suena natural en español para una pregunta proverbial sin objeto explícito.
- source_word: בַּבְּקָרִים
  english_pob_choice: with oxen
  chosen_spanish: con bueyes
  alternatives_spanish:
  - con oxen
  - con ganado
  lexicon: HALOT
  rationale: Aunque el inglés auditado eligió «oxen», en español bíblico y agrícola «bueyes» es el equivalente más natural y preciso para la escena de arado.
- source_word: הֲפַכְתֶּם
  english_pob_choice: you have turned
  chosen_spanish: han convertido
  alternatives_spanish:
  - han vuelto
  - han transformado
  lexicon: HALOT
  rationale: El perfecto expresa acción consumada con efecto presente. «Convertido» comunica bien la inversión moral de manera idiomática en español.
- source_word: לְרֹאשׁ
  english_pob_choice: into poison
  chosen_spanish: en veneno
  alternatives_spanish:
  - en hiel
  - en amargura
  - en gall
  lexicon: HALOT
  rationale: רֹאשׁ puede denotar una sustancia amarga o venenosa. Dado el registro moderno y la claridad pública, «veneno» sigue el criterio del inglés auditable sin perder la tensión metafórica; se preserva la alternativa tradicional en nota.
- source_word: מִשְׁפָּט
  english_pob_choice: justice
  chosen_spanish: la justicia
  alternatives_spanish:
  - el derecho
  - el juicio
  lexicon: HALOT
  rationale: En el contexto profético social, «justicia» conserva la fuerza legal y ética del término.
- source_word: וּפְרִי צְדָקָה
  english_pob_choice: and the fruit of righteousness
  chosen_spanish: y el fruto de la justicia
  alternatives_spanish:
  - y el fruto de la rectitud
  - y el fruto de la justicia / rectitud
  lexicon: HALOT
  rationale: Aunque el inglés POB distinguió entre מִשְׁפָּט y צְדָקָה, en español «la justicia» cubre aquí la dimensión judicial y moral de ambas expresiones sin introducir una segunda abstracción menos natural. Se preserva la tensión interpretativa en nota.
- source_word: לְלַעֲנָה
  english_pob_choice: into wormwood
  chosen_spanish: en ajenjo
  alternatives_spanish:
  - en absintio
  - en amargura
  lexicon: HALOT
  rationale: לענה es el nombre de una planta amarga. «Ajenjo» es el equivalente español tradicional y claro para conservar la imagen concreta del texto.
theological_decisions:
- issue: Relación entre מִשְׁפָּט y צְדָקָה
  english_pob_reading: justice / righteousness with lexical distinction preserved in context; footnote allows 'the fruit of justice' as an alternative for צְדָקָה
  chosen_spanish_reading: la justicia ... el fruto de la justicia
  alternative_spanish_readings:
  - la justicia ... el fruto de la rectitud
  - el derecho ... el fruto de la rectitud
  rationale: El hebreo empareja juicio/justicia pública con una cualidad recta o justa. En español, repetir «justicia» en ambos miembros puede sonar menos elegante pero mantiene la crítica profética clara y no fuerza una distinción artificial donde el paralelismo ya concentra el sentido.
  doctrine_reference: Profética ética social; justicia en el lenguaje del pacto y la vida pública.
- issue: Valor metafórico de רֹאשׁ
  english_pob_reading: poison with note 'or gall' and recognition of bitter/poisonous substance
  chosen_spanish_reading: veneno
  alternative_spanish_readings:
  - gall
  - hiel
  - amargura
  rationale: El término hebreo admite una sustancia amarga o venenosa. «Veneno» hace explícita la idea de corrupción nociva en un español actual y mantiene la fuerza acusatoria del texto sin borrar la ambigüedad documentada, que se conserva en nota.
  doctrine_reference: Imagen profética de perversión moral y consecuencias dañinas.
translation_notes:
  revision_awareness: Se mantiene el acuerdo alto del auditorio inglés y el pasaje no requirió revisión posterior; esta versión sigue de cerca la estructura retórica del hebreo y conserva las principales tensiones léxicas documentadas en el POB inglés.
  spanish_consistency_notes:
  - Se usa «Yahvé» según la política del proyecto cuando aparezca el nombre divino, pero en este versículo no ocurre.
  - Se conserva la alternancia semántica justicia/rectitud en nota, aunque el texto principal unifica la expresión para mayor naturalidad en español.
  - «Ajenjo» se emplea como equivalente estable y reconocible de לענה, manteniendo la imagen vegetal concreta.
