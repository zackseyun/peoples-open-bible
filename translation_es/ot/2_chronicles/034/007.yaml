translation:
  language: es
  text: Derribó los altares, las Aseras[a] y las imágenes talladas; las hizo polvo. También cortó todos los altares de incienso[b] en toda la tierra de Israel. Luego volvió a Jerusalén.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «postes de Asera». El término hebreo se refiere a objetos de culto asociados con Asera; su forma exacta puede variar según el contexto.
    reason: lexical_alternative
  - marker: b
    text: O «postes solares». El término hebreo probablemente designa algún tipo de objeto de culto, aunque su identificación precisa es debatida.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְנַתֵּץ
  english_pob_choice: he tore down
  chosen_spanish: derribó
  alternatives_spanish:
  - los tiró abajo
  - los demolió
  lexicon: HALOT
  rationale: נתץ expresa derribar o desmontar por la fuerza estructuras cultuales. «Derribó» es natural en español y conserva la acción física contra altares.
- source_word: הַמִּזְבְּחוֹת
  english_pob_choice: the altars
  chosen_spanish: los altares
  alternatives_spanish:
  - los altares de culto
  lexicon: HALOT
  rationale: מִזְבְּחוֹת se traduce de forma directa como «altares»; el contexto de reforma religiosa ya delimita su carácter idólatra sin necesidad de ampliar.
- source_word: הָאֲשֵׁרִים
  english_pob_choice: the Asherim
  chosen_spanish: las Aseras
  alternatives_spanish:
  - los postes de Asera
  - los objetos de Asera
  lexicon: HALOT
  rationale: El término hebreo designa objetos de culto asociados con Asera. «Aseras» conserva la forma técnica sin decidir prematuramente su forma física exacta; la alternativa explicativa queda disponible.
- source_word: הַפְּסִלִים
  english_pob_choice: the carved images
  chosen_spanish: los ídolos tallados
  alternatives_spanish:
  - las imágenes talladas
  - las esculturas idolátricas
  lexicon: HALOT
  rationale: פְּסִלִים son imágenes esculpidas para culto. «Ídolos tallados» comunica bien el valor cultual e idolátrico en español, aunque «imágenes talladas» es una alternativa más formalmente cercana.
- source_word: כִּתַּת לְהֵדַק
  english_pob_choice: he crushed ... to powder
  chosen_spanish: los desmenuzó hasta hacerlos polvo
  alternatives_spanish:
  - los trituró hasta hacerlos polvo
  - los machacó hasta hacerlos polvo
  lexicon: HALOT
  rationale: La expresión transmite trituración completa hasta partículas finas. «Desmenuzó hasta hacerlos polvo» mantiene el resultado enfático del hebreo y suena idiomático en español.
- source_word: הַחַמָּנִים
  english_pob_choice: the incense altars
  chosen_spanish: los altares de incienso
  alternatives_spanish:
  - los postes solares
  - los pilares solares
  lexicon: HALOT
  rationale: En el contexto de reforma, la referencia es a objetos/instalaciones de culto cuya identificación exacta es debatida. Se sigue la elección funcional del POB inglés con una expresión clara en español, sin ocultar que la identificación precisa puede variar.
- source_word: גִּדַּע
  english_pob_choice: he cut down
  chosen_spanish: cortó
  alternatives_spanish:
  - derribó
  - tronchó
  lexicon: HALOT
  rationale: גדע significa cortar o tronchar objetos de pie; en español «cortó» es breve y adecuado aquí, reforzado por el contexto de destrucción cultual.
- source_word: בְּכָל אֶרֶץ יִשְׂרָאֵל
  english_pob_choice: throughout all the land of Israel
  chosen_spanish: en toda la tierra de Israel
  alternatives_spanish:
  - por toda la tierra de Israel
  lexicon: HALOT
  rationale: בכל con la fórmula de tierra expresa extensión geográfica amplia. «En toda la tierra de Israel» conserva la amplitud del original y la cadencia narrativa.
- source_word: וַיָּשָׁב לִירוּשָׁלִָם
  english_pob_choice: Then he returned to Jerusalem
  chosen_spanish: Luego volvió a Jerusalén
  alternatives_spanish:
  - y volvió a Jerusalén
  - entonces regresó a Jerusalén
  lexicon: HALOT
  rationale: La forma narrativa hebrea avanza la acción; «Luego» mantiene la secuencia sin forzar un matiz interpretativo adicional.
theological_decisions:
- issue: Conservación de términos cultuales específicos en vez de generalizarlos como «ídolos»
  english_pob_reading: Specific cultic objects are named ('Asherim,' 'carved images,' 'incense altars') rather than flattened into a generic term like 'idols.'
  chosen_spanish_reading: 'Se conservan referentes concretos: «Aseras», «ídolos tallados» y «altares de incienso».'
  alternative_spanish_readings:
  - «ídolos» como resumen general
  - «objetos de culto» de manera genérica
  rationale: La especificidad del hebreo debe permanecer visible; así se evita borrar la diferencia entre objetos, imágenes y altares. No se introduce una simplificación doctrinal que el texto no exige.
  doctrine_reference: 'Principio POB: primacía del original y consistencia terminológica con decisiones léxicas documentadas.'
translation_notes:
  revision_awareness: El contexto inglés del POB se mantiene sin cambios relevantes en la revisión más reciente; la decisión principal sigue siendo conservar la especificidad de los objetos de culto y una redacción española fluida sin perder precisión léxica.
  spanish_consistency_notes:
  - Se mantuvo el nombre divino y los títulos cultuales según las normas del proyecto, sin necesidad de intervenir en este versículo.
  - «Aseras» se usa como término técnico en el texto principal, con nota explicativa para la alternativa física más común.
  - «Altares de incienso» refleja la elección funcional del POB inglés para הַחַמָּנִים, mientras la nota preserva la lectura alternativa «postes solares».
  - 'El paralelismo de destrucción se conservó con tres verbos coordinados: derribó, desmenuzó y cortó/volvió.'
