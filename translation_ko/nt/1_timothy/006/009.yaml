id: 1TI.6.9
reference: 1 Timothy 6:9
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: οἱ δὲ βουλόμενοι πλουτεῖν ἐμπίπτουσιν εἰς πειρασμὸν καὶ παγίδα καὶ ἐπιθυμίας πολλὰς ἀνοήτους καὶ βλαβεράς, αἵτινες βυθίζουσι τοὺς ἀνθρώπους εἰς ὄλεθρον καὶ ἀπώλειαν·
base_translation:
  language: en
  yaml_path: translation/nt/1_timothy/006/009.yaml
  text: But those who want to be rich fall into temptation[a], a snare, and many foolish and harmful desires[c][b], which plunge people into ruin and destruction.
  footnotes:
  - marker: a
    text: Or 'to get rich.' The Greek can denote the desire to become wealthy, not merely the state of possessing wealth.
    reason: lexical_alternative
  - marker: b
    text: Or 'a trap.'
    reason: lexical_alternative
  - marker: c
    text: '''People'' translates Greek ''men/human beings'' in a generic sense.'
    reason: lexical_alternative
translation:
  language: ko
  text: 그러나 부자가 되려는[a] 자들은 시험과 올무[b]와 어리석고 해로운 많은 욕망에 빠지며, 그것들이 사람들[c]을 멸망과 파멸로 가라앉힙니다.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 또는 「부유해지려는」. 헬라어는 단순한 부유한 상태가 아니라 부유해지려는 욕망을 가리킬 수 있다.
    reason: lexical_alternative
  - marker: b
    text: 또는 「덫」 「함정」.
    reason: lexical_alternative
  - marker: c
    text: 「사람들」은 헬라어 「사람들」(ἄνθρωποι)의 일반적 의미를 옮긴 것이다.
    reason: lexical_alternative
lexical_decisions:
- source_word: οἱ βουλόμενοι πλουτεῖν
  english_pob_choice: those who want to be rich
  chosen_korean: 부자가 되려는 자들
  alternatives_korean:
  - 부유해지고자 하는 자들
  lexicon: BDAG
  rationale: πλουτέω의 「부유하다」와 βούλομαι의 「의지」를 결합.
- source_word: ἐμπίπτουσιν εἰς πειρασμὸν καὶ παγίδα
  english_pob_choice: fall into temptation, a snare
  chosen_korean: 시험과 올무에 빠지며
  alternatives_korean:
  - 시험과 덫에 떨어지며
  lexicon: BDAG
  rationale: 3:7 παγίς와 일관 「올무」.
- source_word: ἐπιθυμίας πολλὰς ἀνοήτους καὶ βλαβεράς
  english_pob_choice: many foolish and harmful desires
  chosen_korean: 어리석고 해로운 많은 욕망
  alternatives_korean:
  - 우매하고 해로운 많은 욕심
  lexicon: BDAG
  rationale: ἐπιθυμία의 「욕망」을 「욕망」으로(「욕심」도 가능).
- source_word: βυθίζουσι ... εἰς ὄλεθρον καὶ ἀπώλειαν
  english_pob_choice: plunge ... into ruin and destruction
  chosen_korean: 멸망과 파멸로 가라앉힙니다
  alternatives_korean:
  - 파멸과 멸망으로 침몰시킵니다
  lexicon: BDAG
  rationale: βυθίζω의 「깊이 가라앉히다」 비유를 「가라앉히다」로.
