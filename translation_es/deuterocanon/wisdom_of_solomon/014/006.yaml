  yaml_path: translation/deuterocanon/wisdom_of_solomon/014/006.yaml
  text: For when the proud giants were perishing in the beginning[a], the hope of the world, taking refuge on a raft, left to the age a seed of generation[b], steered by your hand.
  footnotes:
  - marker: a
    text: Or 'on a vessel' or 'on a small craft.' The Greek says 'raft,' a rhetorically marked term rather than the usual word for a ship or ark.
    reason: lexical_alternative
  - marker: b
    text: Or 'for posterity' or 'for the age.' The Greek distinguishes 'world' (κόσμος) earlier in the verse from 'age' (αἰών) here.
    reason: lexical_alternative
