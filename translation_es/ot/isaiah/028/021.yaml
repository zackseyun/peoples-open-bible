  text: כִּ֤י כְ/הַר פְּרָצִים֙ יָק֣וּם יְהוָ֔ה כְּ/עֵ֖מֶק בְּ/גִבְע֣וֹן יִרְגָּ֑ז לַ/עֲשׂ֤וֹת מַעֲשֵׂ֨/הוּ֙ זָ֣ר מַעֲשֵׂ֔/הוּ וְ/לַֽ/עֲבֹד֙ עֲבֹ֣דָת֔/וֹ נָכְרִיָּ֖ה עֲבֹדָתֽ/וֹ־׃
base_translation:
  language: en
  yaml_path: translation/ot/isaiah/028/021.yaml
  text: For Yahweh will rise up as at Mount Perazim[a]; he will be stirred up as in the Valley of Gibeon[c][b], to do his work—his strange work—and to perform his task—his foreign task.
  footnotes:
  - marker: a
    text: Mount Perazim recalls the LORD's bursting out against David's enemies (2 Samuel 5:20; 1 Chronicles 14:11).
    reason: cross_reference
  - marker: b
    text: The Valley at Gibeon likely recalls the LORD's intervention in battle at Gibeon (Joshua 10:10–14).
    reason: cross_reference
  - marker: c
    text: Or 'his alien work ... his strange task.' The paired adjectives emphasize that this act of judgment is portrayed as unusual or foreign.
    reason: lexical_alternative
