translation:
  language: es
  text: 'Pero este es un pueblo saqueado y devastado[a], todos ellos atrapados en hoyos y escondidos en casas de confinamiento. Se han vuelto botín, y no hay quien los rescate; despojo, y no hay quien diga: «¡Devuelve!»».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O posiblemente: «todos ellos atrapados entre jóvenes», si בַּחוּרִים se toma en su sentido más común de «jóvenes»; sin embargo, el contexto favorece un sentido como «hoyos» o «pozos».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהוּא / עַם
  english_pob_choice: But this is a people
  chosen_spanish: Pero este es un pueblo
  alternatives_spanish:
  - Y él es un pueblo
  - Y es un pueblo
  lexicon: HALOT
  rationale: El hebreo usa un pronombre singular seguido de עַם en sentido colectivo. En español, «este es un pueblo» transmite mejor el contraste y la identificación colectiva sin forzar un «él» poco natural. «Pueblo» conserva el valor colectivo de עַם.
- source_word: בָּזוּז
  english_pob_choice: plundered
  chosen_spanish: saqueado
  alternatives_spanish:
  - despojado
  - robado
  lexicon: HALOT
  rationale: El término denota haber sido tomado como presa en un contexto de guerra o incursión. «Saqueado» conserva esa fuerza de violencia colectiva y funciona bien junto al siguiente término.
- source_word: וְשָׁסוּי
  english_pob_choice: pillaged
  chosen_spanish: devastado
  alternatives_spanish:
  - pillado
  - despojado
  lexicon: HALOT
  rationale: El par hebreo intensifica la imagen de ruina violenta. «Devastado» mantiene esa intensificación sin repetir exactamente «saqueado», y comunica bien la destrucción completa que sugiere el contexto.
- source_word: הָפֵחַ בַּחוּרִים
  english_pob_choice: trapped in holes
  chosen_spanish: atrapados en hoyos
  alternatives_spanish:
  - atrapados en pozos
  - atrapados entre jóvenes
  lexicon: HALOT
  rationale: La POB inglesa sigue la lectura contextual de un lugar de encierro o trampa, no el sentido más común «jóvenes». En español, «hoyos» refleja ese campo semántico de hoyos/pozos/emboscadas y mantiene la ambigüedad resuelta por el contexto.
- source_word: כֻּלָּם
  english_pob_choice: all of them
  chosen_spanish: todos ellos
  alternatives_spanish:
  - todos
  - cada uno de ellos
  lexicon: HALOT
  rationale: El sufijo pronominal explicita la totalidad distributiva. «Todos ellos» es natural y mantiene el énfasis colectivo del hebreo.
- source_word: וּבְבָתֵּי כְלָאִים
  english_pob_choice: in prison houses
  chosen_spanish: en casas de prisión
  alternatives_spanish:
  - en cárceles
  - en casas de confinamiento
  lexicon: HALOT
  rationale: La expresión hebrea es concreta, literalmente «casas de encierro». «Casas de prisión» conserva la imagen arquitectónica del original mejor que un abstracto «cárceles».
- source_word: הָחְבָּאוּ
  english_pob_choice: hidden away
  chosen_spanish: escondidos
  alternatives_spanish:
  - ocultados
  - puestos a salvo ocultamente
  lexicon: HALOT
  rationale: El verbo indica estar ocultos/puestos fuera de la vista. En español, el participio «escondidos» comunica el estado resultante y combina de forma natural con «atrapados».
- source_word: הָיוּ לָבַז
  english_pob_choice: They have become spoil
  chosen_spanish: Se han vuelto botín
  alternatives_spanish:
  - Han llegado a ser botín
  - Se hicieron presa
  lexicon: HALOT
  rationale: La construcción היה ל + sustantivo se expresa bien como cambio de estado. «Botín» mantiene el lenguaje de guerra y enlaza con «saqueado».
- source_word: וְאֵין מַצִּיל
  english_pob_choice: with no one to rescue them
  chosen_spanish: y no hay quien los rescate
  alternatives_spanish:
  - y no hay rescatador
  - y no hay quien los libere
  lexicon: HALOT
  rationale: El participio denota el que rescata/libera. «No hay quien los rescate» conserva la forma existencial del hebreo y su tono lamentoso.
- source_word: מְשִׁסָּה
  english_pob_choice: plunder
  chosen_spanish: despojo
  alternatives_spanish:
  - saqueo
  - presa
  lexicon: HALOT
  rationale: El sustantivo paralelo a לָבַז refuerza la idea de ser objeto de expolio. «Despojo» es un equivalente breve y adecuado en español bíblico moderno.
- source_word: וְאֵין אֹמֵר הָשַׁב
  english_pob_choice: with no one saying, “Restore!”
  chosen_spanish: 'y no hay quien diga: «¡Restituyan!»'
  alternatives_spanish:
  - 'y no hay quien diga: «¡Devuelvan!»'
  - 'y nadie dice: «¡Restauren!»'
  lexicon: HALOT
  rationale: El imperativo singular hebreo puede entenderse como una exhortación general de restitución. En español, el plural de cortesía/indefinido «Restituyan» mantiene el valor de llamada pública y evita limitarlo a una sola persona. «Restituir» recoge tanto personas como bienes.
theological_decisions:
- issue: Referente del pronombre singular וְהוּא
  english_pob_reading: The pronoun refers collectively to Israel/the people under judgment, rendered idiomatically as 'this is a people.'
  chosen_spanish_reading: El pronombre se interpreta colectivamente como referencia al pueblo bajo juicio, expresado como «este es un pueblo».
  alternative_spanish_readings:
  - «y él es un pueblo»
  - «y es un pueblo»
  rationale: No se trata de una decisión doctrinal sino discursiva. El hebreo introduce una descripción colectiva; el español requiere una formulación idiomática que conserve el contraste y la identificación del sujeto colectivo.
  doctrine_reference: Gramática y discurso; sin implicación doctrinal específica
translation_notes:
  revision_awareness: La revisión más reciente del auditorio inglés no introdujo cambios y mantuvo alta concordancia con el texto fuente; por eso la redacción española sigue de cerca el mismo juicio léxico, especialmente en בַּחוּרִים, donde se preserva la decisión contextual favorable a «hoyos/pozos» sobre «jóvenes».
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como convención general del proyecto cuando corresponda, aunque este versículo no contiene el tetragrámaton.
  - «Pueblo» traduce עַם en sentido colectivo sin convertirlo en una nación técnica.
  - «Botín»/«despojo» preservan la doble imagen de expolio del hebreo.
  - La nota a pie de página se ancla en «atrapados en hoyos» para reflejar la alternativa lexical preservada por la POB inglesa.
