  to: 'Y él dijo: «Sal y quédate de pie en el monte delante de Yahvé». Y he aquí que Yahvé pasaba, y un viento grande y fuerte desgarraba los montes y quebraba las peñas delante de Yahvé; pero Yahvé no estaba en el viento[a]. Después del viento, un terremoto[b]; pero Yahvé no estaba en el terremoto.'
