translation:
  language: es
  text: Como pastor, pastoreará a su rebaño[a]; con su brazo reunirá a los corderos, y en su seno[b] los llevará; conducirá con cuidado a las ovejas que amamantan[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «Como pastor, apacentará a su rebaño».
    reason: lexical_alternative
  - marker: b
    text: Literalmente, «en su seno», imagen de cercanía y tierno cuidado.
    reason: cultural_note
  - marker: c
    text: O «las ovejas con cría».
    reason: lexical_alternative
lexical_decisions:
- source_word: כְּרֹעֶה
  english_pob_choice: Like a shepherd
  chosen_spanish: Como pastor
  alternatives_spanish:
  - Como un pastor
  - Así como un pastor
  lexicon: HALOT
  rationale: El prefijo כ expresa comparación; en español, «como pastor» reproduce la imagen con naturalidad y conserva el valor comparativo sin sobrecargar el verso.
- source_word: עֶדְרוֹ
  english_pob_choice: his flock
  chosen_spanish: su rebaño
  alternatives_spanish:
  - su rebaño de ovejas
  - su grey
  lexicon: HALOT
  rationale: En contexto de pastoreo, עֵדֶר designa un rebaño; «rebaño» es el equivalente natural en español y conserva la referencia concreta a animales bajo cuidado pastoral.
- source_word: יִרְעֶה
  english_pob_choice: he will pasture
  chosen_spanish: pastoreará
  alternatives_spanish:
  - apacentará
  - lo pastoreará
  lexicon: HALOT
  rationale: El verbo רעה en este contexto expresa la acción de pastorear/alimentar como pastor. «Pastoreará» mantiene el verbo pastoral y evita perder la imagen concreta de cuidado y sustento.
- source_word: בִּזְרֹעוֹ
  english_pob_choice: with his arm
  chosen_spanish: con su brazo
  alternatives_spanish:
  - por su brazo
  - mediante su brazo
  lexicon: HALOT
  rationale: La preposición ב aquí es instrumental; «con su brazo» reproduce de forma natural la imagen de fuerza activa con la que reúne a los vulnerables.
- source_word: יְקַבֵּץ
  english_pob_choice: he will gather
  chosen_spanish: reunirá
  alternatives_spanish:
  - juntará
  - recogerá
  lexicon: HALOT
  rationale: קבץ es «juntar/reunir». «Reunirá» funciona bien en español y mantiene la idea de congregar a los corderos bajo su cuidado.
- source_word: טְלָאִים
  english_pob_choice: the lambs
  chosen_spanish: los corderos
  alternatives_spanish:
  - los corderitos
  - los corderos pequeños
  lexicon: HALOT
  rationale: El término denota corderos; «corderos» es claro, idiomático y suficientemente específico para el contexto pastoril.
- source_word: וּבְחֵיקוֹ
  english_pob_choice: in his bosom
  chosen_spanish: en su seno
  alternatives_spanish:
  - en su pecho
  - en su regazo
  lexicon: HALOT
  rationale: חֵיק es literalmente seno/bosom, una imagen de cercanía y ternura. «En su seno» conserva el matiz íntimo mejor que opciones más explicativas.
- source_word: יִשָּׂא
  english_pob_choice: he will carry them
  chosen_spanish: los llevará
  alternatives_spanish:
  - los cargará
  - los portará
  lexicon: HALOT
  rationale: נשא puede significar llevar/cargar. Dado el objeto directo implícito, «los llevará» es natural en español y mantiene la acción de sostener y transportar con cuidado.
- source_word: עָלוֹת
  english_pob_choice: the nursing ewes
  chosen_spanish: las que crían
  alternatives_spanish:
  - las ovejas que crían
  - las ovejas con cría
  - las que amamantan
  lexicon: HALOT
  rationale: La forma participial refiere a hembras que crían o amamantan. «Las que crían» conserva la idea básica de maternidad/lactancia sin añadir más de lo que el hebreo exige.
- source_word: יְנַהֵל
  english_pob_choice: he will gently lead
  chosen_spanish: conducirá con cuidado
  alternatives_spanish:
  - guiará con ternura
  - las llevará con cuidado
  lexicon: HALOT
  rationale: נהל en contexto pastoral expresa guiar/dirigir con cuidado. «Conducirá con cuidado» comunica la atención delicada del pastor sin introducir un adverbio interpretativo más fuerte que el hebreo.
theological_decisions:
- issue: Imagen pastoral de Yahvé sin cristologización implícita
  english_pob_reading: Retain the pastoral metaphor straightforwardly without importing later messianic or christological interpretation into the translation.
  chosen_spanish_reading: Mantener la metáfora pastoral de Yahvé de manera directa, sin incorporar una lectura mesiánica o cristológica implícita en la redacción.
  alternative_spanish_readings:
  - Introducir una formulación más interpretativa que sugiera cumplimiento mesiánico
  - Reemplazar la metáfora por una explicación doctrinal
  rationale: El texto hebreo presenta a Yahvé como pastor cuidadoso de su pueblo. La redacción española preserva esa imagen sin añadir desarrollos doctrinales que el versículo no expresa explícitamente.
  doctrine_reference: Isaías 40:11; filosofía de traducción POB §§1, 3
translation_notes:
  revision_awareness: 'El pasaje coincide en lo esencial con el control de calidad más reciente: se mantiene la equivalencia óptima, sin cambios sustanciales respecto del borrador auditado; se conservaron las decisiones pastorales y las notas sobre alternativas léxicas e imaginería cultural.'
  spanish_consistency_notes:
  - Se usó «Yahvé» conforme al estándar del proyecto para el nombre divino, aunque en este versículo no aparece explícito en el texto hebreo conservado en el paquete fuente.
  - 'Se mantuvo la serie pastoral con verbos consistentes: pastoreará / reunirá / llevará / conducirá, para reflejar la progresión del hebreo.'
  - «Seno» se conservó como equivalente de חֵיק por su valor de cercanía íntima; la nota aclara la imagen sin desplazar el texto principal.
  - «Las que crían» preserva la ambigüedad suficiente de עָלוֹת y evita precisar innecesariamente más de lo que el hebreo exige.
