lexical_decisions:
- source_word: λέγει
  english_pob_choice: said
  chosen_spanish: dijo
  alternatives_spanish:
  - dice
  lexicon: BDAG
  rationale: El griego usa presente histórico, pero en narrativa española natural se expresa mejor con pasado simple. «Dijo» conserva el sentido narrativo sin rigidez.
- source_word: αὐτῷ
  english_pob_choice: to him
  chosen_spanish: le
  alternatives_spanish:
  - a él
  lexicon: BDAG
  rationale: El dativo de destinatario del habla se expresa de forma natural en español con el complemento indirecto «le».},{
theological_decisions:
- issue: Referencia escatológica a la resurrección
  english_pob_reading: 'Martha refers to a future bodily resurrection at the end of the age: ''the resurrection on the last day.'''
  chosen_spanish_reading: 'Marta se refiere a una resurrección corporal futura al final de la era: «la resurrección, en el último día».'
  alternative_spanish_readings:
  - una esperanza general de vida después de la muerte
  - la resurrección del último día
  rationale: La doble mención de resurrección y la expresión temporal «en el último día» apuntan a una esperanza escatológica concreta, no solo a una continuidad vaga después de la muerte. La traducción conserva esa especificidad sin añadir detalles doctrinales externos.
  doctrine_reference: Affirmations; Translation philosophy §3
translation_notes:
  revision_awareness: 'Se corrigió la validación anterior: el marcador [a] ahora aparece en el texto español, anclado a «le dijo[a]». Se mantuvo la equivalencia óptima y la lectura escatológica específica del pasaje sin depender del inglés como base mecánica.'
  spanish_consistency_notes:
  - Se usa «Marta» como nombre propio estándar en español.
  - «Resucitará» preserva el matiz futuro de ἀναστήσεται en contexto de resurrección.
  - «En el último día» refleja naturalmente ἐν τῇ ἐσχάτῃ ἡμέρᾳ.
  - Se eligió «le dijo» en lugar de «le dice» para español narrativo fluido.
