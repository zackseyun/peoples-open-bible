translation:
  language: es
  text: 'Ahora bien, Booz había subido a la puerta[a] y se había sentado allí. Y he aquí que pasaba el redentor de quien Booz había hablado. Entonces le dijo: «Apártate, siéntate aquí, fulano[b]». Y él se apartó y se sentó.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: La puerta de la ciudad era un lugar público para asuntos legales y cívicos.
    reason: cultural_note
  - marker: b
    text: 'Hebreo: «Peloni Almoni», una fórmula que omite deliberadamente el nombre propio y funciona como «fulano» o «equis».'
    reason: lexical_alternative
lexical_decisions:
- source_word: עָלָה הַשַּׁעַר
  english_pob_choice: had gone up to the gate
  chosen_spanish: había subido a la puerta
  alternatives_spanish:
  - había ido a la puerta
  - había subido a la puerta de la ciudad
  lexicon: HALOT
  rationale: עָלָה conserva la imagen de movimiento ascendente; en español, «subir» reproduce ese valor sin perder naturalidad. «Puerta» mantiene el equivalente directo del hebreo, y la nota puede explicar su función cívico-legal.
- source_word: וַיֵּשֶׁב שָׁם
  english_pob_choice: and sat down there
  chosen_spanish: y se había sentado allí
  alternatives_spanish:
  - y se sentó allí
  - y tomó asiento allí
  lexicon: HALOT
  rationale: El hebreo narra una acción previa en secuencia; el pluscuamperfecto español refleja bien ese trasfondo narrativo. «Sentarse» conserva el gesto de tomar lugar para un asunto público.
- source_word: וְהִנֵּה
  english_pob_choice: and behold
  chosen_spanish: Y he aquí
  alternatives_spanish:
  - y mira
  - y de pronto
  lexicon: HALOT
  rationale: La partícula introduce un giro narrativo llamativo. «He aquí» preserva la fuerza de atención y sorpresa sin banalizar el registro.
- source_word: הַגֹּאֵל
  english_pob_choice: the redeemer
  chosen_spanish: el redentor
  alternatives_spanish:
  - el rescatador
  - el pariente redentor
  lexicon: HALOT
  rationale: Aunque el inglés POB optó por «redeemer» para evitar expansión interpretativa, en español «redentor» es el término más directo y reconocido para גֹּאֵל en este contexto. Se evita añadir «pariente» en el texto principal para no ampliar más allá del hebreo, pero la función relacional queda disponible en nota si se desea.
- source_word: עֹבֵר
  english_pob_choice: was passing by
  chosen_spanish: pasaba
  alternatives_spanish:
  - iba pasando
  - estaba pasando
  lexicon: HALOT
  rationale: El participio hebreo expresa acción en desarrollo; «pasaba» conserva ese aspecto progresivo de manera natural en español.
- source_word: אֲשֶׁר דִּבֶּר בֹּעַז
  english_pob_choice: of whom Boaz had spoken
  chosen_spanish: de quien Booz había hablado
  alternatives_spanish:
  - acerca de quien Booz había hablado
  - a quien Booz había mencionado
  lexicon: HALOT
  rationale: «De quien» reproduce con sobriedad la referencia del relativo, y el pluscuamperfecto español mantiene la anterioridad de la mención de Booz.
- source_word: סוּרָה
  english_pob_choice: Turn aside
  chosen_spanish: Apártate
  alternatives_spanish:
  - Desvía tu camino
  - Hazte a un lado
  lexicon: HALOT
  rationale: El imperativo comunica la idea de desviarse o hacerse a un lado. «Apártate» es natural en español y mantiene la directividad del mandato.
- source_word: שְׁבָה
  english_pob_choice: sit down
  chosen_spanish: siéntate
  alternatives_spanish:
  - toma asiento
  - siéntate aquí
  lexicon: HALOT
  rationale: El verbo invita a tomar asiento para una gestión formal. «Siéntate» conserva el imperativo simple del hebreo y el paralelismo con el mandato anterior.
- source_word: פֹּה
  english_pob_choice: here
  chosen_spanish: aquí
  alternatives_spanish:
  - en este lugar
  lexicon: HALOT
  rationale: Adverbio locativo directo y natural en español.
- source_word: פְּלֹנִי אַלְמֹנִי
  english_pob_choice: so-and-so
  chosen_spanish: fulano
  alternatives_spanish:
  - tal y cual
  - fulano de tal
  - so-and-so
  lexicon: HALOT
  rationale: El hebreo deja el nombre en blanco mediante una fórmula idiomática. «Fulano» es el equivalente natural español para una persona no nombrada y conserva el matiz de anonimato deliberado.
- source_word: וַיָּסַר
  english_pob_choice: he turned aside
  chosen_spanish: se apartó
  alternatives_spanish:
  - se desvió
  - se hizo a un lado
  lexicon: HALOT
  rationale: El verbo responde al imperativo previo y muestra obediencia al llamado. «Se apartó» mantiene la correspondencia verbal sin sonar forzado.
- source_word: וַיֵּשֶׁב
  english_pob_choice: sat down
  chosen_spanish: se sentó
  alternatives_spanish:
  - tomó asiento
  - se acomodó
  lexicon: HALOT
  rationale: «Se sentó» es la equivalencia más directa y sobria para el cierre narrativo del verso.
theological_decisions:
- issue: Rendering of גֹּאֵל in Ruth 4:1
  english_pob_reading: the redeemer
  chosen_spanish_reading: el redentor
  alternative_spanish_readings:
  - el pariente redentor
  - el rescatador
  rationale: El pasaje no desarrolla aún toda la función legal del גֹּאֵל; por eso se evita expandir con «pariente» en el cuerpo del verso. «Redentor» conserva la categoría semántica central y deja abierta la explicación contextual sin sobreinterpretar.
  doctrine_reference: Rut 4; uso lexical del término גֹּאֵל en el Antiguo Testamento
- issue: Legal-public setting of the gate
  english_pob_reading: The town gate functioned as a public place for legal and civic proceedings.
  chosen_spanish_reading: la puerta como lugar público de asuntos legales y cívicos
  alternative_spanish_readings:
  - la puerta de la ciudad como tribunal público
  - la puerta como sitio de juicio
  rationale: La tradición narrativa del libro presupone el valor jurídico de la puerta. No se añade al texto principal, pero se conserva en nota para que el lector español entienda el trasfondo sin interpolarlo en la línea versal.
  doctrine_reference: Rut 4; costumbres jurídicas de Israel antiguo
translation_notes:
  revision_awareness: 'Se siguió el último pasaje revisado del audit trail: se evitó expandir גֹּאֵל a «pariente redentor» en el texto principal, y se prefirió una forma breve para la expresión de anonimato. Para el español, se optó por «redentor» como equivalente directo y «fulano» como idiomatismo natural que conserva la falta de nombre. También se reflejó la progresión narrativa con pluscuamperfecto en la primera cláusula y pasado simple/reflexivo en las acciones siguientes.'
  spanish_consistency_notes:
  - Se mantiene «Booz» como forma española estable del nombre propio.
  - Se usa «Yahvé» solo cuando el texto lo requiera; aquí no aparece ningún tetragrámaton.
  - «El redentor» se conserva como término funcional sin añadir explicaciones al cuerpo del verso.
  - La puntuación reproduce el contraste narrativo entre marco y discurso directo.
  - Las comillas angulares se usan para el habla directa según convención editorial española.
