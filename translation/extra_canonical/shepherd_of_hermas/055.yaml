translation:
  text: |-
    And he says to me, “Do you see this shepherd?” “I do,” I say, “sir.”[a]
    
    “Those sheep you saw not skipping but grazing in one place—these are the ones who have handed themselves over to luxuries and deceptions,[b] yet they have not blasphemed the Lord at all.[c] These, then, have been corrupted away from the truth; in them there is hope for repentance, by which they can live.[d] Corruption, then, has hope of a certain renewal,[e] but death has eternal destruction.”[f]
    
    5. Again we went on a little, and he shows me a great shepherd, as if savage in appearance, wearing a white goatskin,[g] and he had a bag on his shoulders,[h] and a staff very hard and with knots,[i] and a great whip.[j] He had a very bitter look, so that I was afraid of him—such was his look.[k]
    
    6. This shepherd, then, took over the sheep from the shepherd who was a young man—those that were living profligately and living in self-indulgence, and not skipping—and he cast them into a certain place that was steep, thorny, and full of thistles,[m] so that, because of the thorns and thistles, the sheep were unable to disentangle themselves, but [were entangled in the thorns and thistles; these, then,] being entangled, grazed among the thorns and thistles.[o] They suffered greatly, being beaten by him;[p] he drove them here and there and gave them no rest, and those sheep were not at ease at all.[q]
