revisions:
- from: 'Entonces ella concibió otra vez y dio a luz una hija. Y él le dijo: «Ponle por nombre Lo-ruhama[a], porque ya no volveré a mostrar compasión sobre la casa de Israel[b], de modo que yo los perdone».'
  to: 'Entonces ella concibió otra vez y dio a luz una hija[a]. Y él le dijo: «Ponle por nombre Lo-ruhamah, porque ya no tendré compasión de la casa de Israel[b], como para perdonarlos jamás».'
  rationale: Se corrigió la transliteración del nombre para alinearla con la forma auditada y más reconocible del hebreo; se cambió «sobre la casa de Israel» por «de la casa de Israel» para un español natural y fiel; y se reformuló la cláusula final para reflejar mejor la lectura POB de perdón negado sin borrar la dificultad textual, que sigue preservada en la nota.
