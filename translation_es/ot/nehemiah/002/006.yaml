translation:
  language: es
  text: 'Entonces el rey me[a] dijo, mientras la reina estaba sentada junto a él: «¿Cuánto durará tu viaje, y cuándo volverás?». Al rey le pareció bien enviarme, y le di un plazo.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «la consorte» o «la esposa real». El término hebreo se refiere a la consorte real del rey.
    reason: lexical_alternative
lexical_decisions:
- source_word: הַמֶּלֶךְ
  english_pob_choice: the king
  chosen_spanish: el rey
  alternatives_spanish:
  - el monarca
  lexicon: HALOT
  rationale: מֶלֶךְ en este contexto narrativo designa al soberano; en español, «el rey» es la forma natural y precisa.
- source_word: הַשֵּׁגַל
  english_pob_choice: the queen
  chosen_spanish: la reina
  alternatives_spanish:
  - la consorte
  - la esposa real
  lexicon: HALOT
  rationale: El término hebreo se refiere a la consorte real. «La reina» conserva la dignidad y la función cortesana con naturalidad en español; las alternativas explicitan más el matiz de consorte.
- source_word: יוֹשֶׁבֶת אֶצְל/וֹ
  english_pob_choice: while the queen was sitting beside him
  chosen_spanish: estaba sentada junto a él
  alternatives_spanish:
  - estaba sentada al lado de él
  - estaba sentada a su lado
  lexicon: HALOT
  rationale: El participio presenta una escena en curso; «estaba sentada junto a él» refleja bien la postura y proximidad sin forzar el español.
- source_word: עַד מָתַי
  english_pob_choice: How long
  chosen_spanish: ¿Cuánto durará... ?
  alternatives_spanish:
  - ¿Hasta cuándo...?
  - ¿Por cuánto tiempo...?
  lexicon: HALOT
  rationale: Aquí la pregunta se refiere a la duración del viaje; en español, una formulación temporal directa comunica mejor el valor idiomático que un calco literal.
- source_word: יִהְיֶה מַהֲלָכֲךָ
  english_pob_choice: will your journey be
  chosen_spanish: durará tu viaje
  alternatives_spanish:
  - será tu viaje
  - será tu caminar
  lexicon: HALOT
  rationale: מַהֲלָךְ alude al ir/recorrer un trayecto. En este contexto, «durará tu viaje» expresa con claridad la duración implícita del desplazamiento oficial.
- source_word: וּמָתַי תָּשׁוּב
  english_pob_choice: and when will you return
  chosen_spanish: y cuándo volverás
  alternatives_spanish:
  - y cuándo regresarás
  lexicon: HALOT
  rationale: שׁוּב significa volver/retornar. «Volverás» suena natural en el diálogo y mantiene el valor temporal de la pregunta.
- source_word: וַיִּיטַב לִפְנֵי הַמֶּלֶךְ
  english_pob_choice: So it pleased the king
  chosen_spanish: Y agradó al rey
  alternatives_spanish:
  - Y le pareció bien al rey
  - Y fue bueno ante el rey
  lexicon: HALOT
  rationale: La expresión hebrea es idiomática y expresa aprobación real. «Agradó al rey» conserva la sencillez y el juicio favorable del pasaje.
- source_word: וַיִּשְׁלָחֵנִי
  english_pob_choice: to send me
  chosen_spanish: enviarme
  alternatives_spanish:
  - mandarme
  - despedirme
  lexicon: HALOT
  rationale: Después de la aprobación del rey, el infinitivo expresa el resultado de la decisión. «Enviarme» reproduce de forma natural la intención de permitir y despachar el viaje.
- source_word: וָאֶתְּנָה לוֹ זְמָן
  english_pob_choice: and I gave him a time
  chosen_spanish: y yo le fijé un plazo
  alternatives_spanish:
  - y le di un tiempo
  - y le señalé un tiempo
  lexicon: HALOT
  rationale: זְמָן aquí es un período o plazo acordado. «Fijé un plazo» explicita bien el sentido de tiempo determinado sin añadir contenido ajeno.
translation_notes:
  revision_awareness: La versión en inglés POB se mantiene sin revisiones en el registro auditado; la presente propuesta sigue su línea exegética general, pero adapta algunas elecciones a un español más natural y preciso, especialmente en la pregunta temporal y en la cláusula final sobre el plazo.
  spanish_consistency_notes:
  - Se mantiene «rey» y «reina» como equivalentes naturales de los términos cortesanos del contexto.
  - «Agradó al rey» conserva el idiomatismo hebreo sin expandirlo innecesariamente.
  - «Fijé un plazo» respeta el valor de זְמָן como tiempo señalado o término determinado.
  - La nota sobre הַשֵּׁגַל se conserva por la misma tensión lexical documentada en el inglés POB.
