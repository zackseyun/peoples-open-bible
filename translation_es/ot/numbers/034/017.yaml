review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español transmite bien la estructura del hebreo: cláusula identificatoria, referencia explícita a varones concretos, y sentido causativo/administrativo de יִנְחֲלוּ aplicado a la tierra como herencia. Sin embargo, la transliteración del nombre propio אֶלְעָזָר no está adaptada al uso bíblico estándar en español, donde corresponde «Eleazar», no «Eleazar».'
  spanish_quality_summary: La redacción es clara y natural en español bíblico moderno. «Estos son los nombres de los hombres...» y «les asignarán la tierra como herencia» suenan dignos y comprensibles. El único ajuste necesario es ortográfico/onomástico en el nombre propio para mantener la convención española establecida y la legibilidad eclesial amplia.
  glossary_alignment: No hay términos teológicos problemáticos. «Josué», «sacerdote», «herencia» y «tierra» están bien. La principal desalineación es el nombre propio «Eleazar», que en español bíblico ampliamente reconocido debe ser «Eleazar».
  issues:
  - severity: medium
    issue: Nombre propio «Eleazar» en vez de «Eleazar»
    rationale: Aunque refleja la forma inglesa, la forma española bíblica estándar para אֶלְעָזָר es «Eleazar». Mantener «Eleazar» preserva mejor la convención onomástica española y evita una anglicización innecesaria.
  revised_spanish_text: 'Estos son los nombres de los hombres que les asignarán la tierra como herencia: Eleazar el sacerdote y Josué hijo de Nun.'
  revision_rationale: 'Se conserva toda la sintaxis y la decisión léxica principal del borrador, pero se corrige la forma del nombre propio al uso bíblico estándar en español: «Eleazar». No se requieren notas, ya que el borrador no introducía ambigüedad nueva y la alternativa léxica del verbo no necesita nota obligatoria en español aquí.'
