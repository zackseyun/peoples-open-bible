translation:
  text: And the name of the first was Yeqon[a]; this is the one who led all the children of the angels astray, and brought them down upon the dry land[d][c][b], and led them astray through the daughters of men.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Yeqon is a transliteration of the Ge'ez form; English spellings may vary, including Yequn or Yequn.
    reason: lexical_alternative
  - marker: b
    text: The phrase rendered 'the sons of the angels' is literal. Some interpreters take it more broadly as the angelic host.
    reason: lexical_alternative
  - marker: c
    text: '''Upon the dry land'' may also be rendered ''upon the earth'' or ''onto the land''; the Ge''ez points concretely to the terrestrial realm.'
    reason: lexical_alternative
  - marker: d
    text: Or 'by the daughters of men'.
    reason: previous_rendering
lexical_decisions:
- source_word: ወስሙ
  chosen: And the name
  alternatives:
  - And his name
  - And the name of
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The conjunction plus noun naturally introduces the naming formula in a list. 'And the name' preserves the catalog style of the passage.
- source_word: ለቀዳማዊ
  chosen: of the first
  alternatives:
  - for the first
  - of the former one
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: In context this identifies the first named figure in a sequence of fallen angel leaders. 'Of the first' is the most natural English rendering of the genitival relation.
- source_word: ይቁን
  chosen: was Yeqon
  alternatives:
  - was Yequn
  - was Yequn
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: This is the proper name of the first figure. I transliterate rather than translate, following project policy for names. Vocalization in English is somewhat uncertain, so a footnote records alternatives.
- source_word: ዝውእቱ
  chosen: this is the one who
  alternatives:
  - this is he who
  - he is the one who
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The demonstrative-plus-copula construction identifies and explains the named figure. 'This is the one who' is readable modern English while preserving the emphatic identification.
- source_word: ዘአስሐተ
  chosen: led ... astray
  alternatives:
  - deceived
  - caused to err
  - misled
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The verb denotes causing error or deception. 'Led astray' fits the moral-religious context and preserves the apocalyptic sense of seduction into rebellion.
- source_word: ኵሎሙ
  chosen: all
  alternatives:
  - all of them
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Simple universal term; 'all' is sufficient in English.
- source_word: ደቂቀ መላእክት
  chosen: the sons of the angels
  alternatives:
  - the children of the angels
  - the angelic offspring
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Formally, the phrase reads 'sons/children of angels.' I retain the familial idiom rather than smoothing it into an abstract collective, since the verse uses lineage language. Because the referent may be the angelic host rather than literal offspring, a footnote notes the alternative.
- source_word: ወአውረዶሙ
  chosen: and brought them down
  alternatives:
  - and cast them down
  - and made them descend
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The verb is a causative of descent. 'Brought them down' preserves the downward movement without over-specifying whether the action is coercive or persuasive.
- source_word: ዲበ የብስ
  chosen: upon the dry land
  alternatives:
  - onto the earth
  - upon the land
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The phrase literally points to dry ground/land. 'Upon the dry land' preserves the concrete imagery of descent from heaven to the terrestrial realm better than the more generic 'earth.'
- source_word: ወአስሐቶሙ
  chosen: and led them astray
  alternatives:
  - and deceived them
  - and seduced them
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Repeating the same English verb reflects the repeated Ge'ez root and preserves the rhetorical pattern of the accusation.
- source_word: በአዋልደ ሰብእ
  chosen: by the daughters of men
  alternatives:
  - through the daughters of humankind
  - by means of the daughters of men
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The preposition marks means or instrumentality. 'By the daughters of men' is concise and preserves the traditional anthropological contrast between heavenly beings and human women without importing later phrasing.
