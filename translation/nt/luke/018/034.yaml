id: LUK.18.34
reference: Luke 18:34
source:
  edition: SBLGNT
  text: καὶ αὐτοὶ οὐδὲν τούτων συνῆκαν, καὶ ἦν τὸ ῥῆμα τοῦτο κεκρυμμένον ἀπ’ αὐτῶν, καὶ οὐκ ἐγίνωσκον τὰ λεγόμενα.
translation:
  text: And they understood none of these things[a], and this saying was hidden from them[c][b], and they did not understand the things being said.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'this saying' or 'this message' for 'this word.'
    reason: lexical_alternative
  - marker: b
    text: The passive 'was hidden from them' does not state who or what concealed it.
    reason: alternative_reading
  - marker: c
    text: Or 'what was being said.'
    reason: lexical_alternative
lexical_decisions:
- source_word: συνῆκαν
  chosen: understood
  alternatives:
  - grasped
  - comprehended
  lexicon: BDAG
  rationale: συνίημι here denotes intellectual comprehension of Jesus's preceding predictions. 'Understood' is natural English and preserves the cognitive sense without overinterpreting as spiritual acceptance.
- source_word: οὐδὲν τούτων
  chosen: none of these things
  alternatives:
  - nothing of these things
  - none of this
  lexicon: BDAG
  rationale: The genitive demonstrative refers back to the cluster of preceding statements. 'None of these things' is idiomatic and keeps the plural reference explicit.
- source_word: τὸ ῥῆμα τοῦτο
  chosen: this word
  alternatives:
  - this saying
  - this message
  - this matter
  lexicon: BDAG
  rationale: ῥῆμα can mean 'word,' 'statement,' or 'matter.' 'This word' preserves the Greek form closely while remaining understandable; alternatives are possible depending on whether one emphasizes the utterance or its content.
- source_word: κεκρυμμένον ἀπ’ αὐτῶν
  chosen: was hidden from them
  alternatives:
  - had been hidden from them
  - was concealed from them
  lexicon: BDAG
  rationale: The periphrastic construction with perfect passive participle conveys a state resulting from concealment. 'Was hidden from them' is concise and idiomatic, preserving the passive without specifying the agent.
- source_word: ἐγίνωσκον
  chosen: did not know
  alternatives:
  - did not understand
  - were not recognizing
  lexicon: BDAG
  rationale: γινώσκω here overlaps with understanding, but using 'know' preserves the lexical distinction from συνῆκαν in the first clause. This helps retain Luke's layered description rather than flattening both verbs into the same English gloss.
- source_word: τὰ λεγόμενα
  chosen: the things being said
  alternatives:
  - what was being said
  - the things said
  lexicon: BDAG
  rationale: The present passive participle points to the content currently being spoken. 'The things being said' is slightly formal but transparent and preserves the participial nuance better than the smoother 'what was being said.'
