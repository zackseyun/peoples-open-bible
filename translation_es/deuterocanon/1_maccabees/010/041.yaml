translation:
  language: es
  text: Y todo lo sobrante que no pagaron de las rentas, como en los años anteriores[a], desde ahora lo darán para las obras de la casa[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «excedente» / «remanente» para «sobrante».
    reason: lexical_alternative
  - marker: b
    text: Es decir, el templo; «la casa» reproduce literalmente la expresión griega.
    reason: cultural_note
lexical_decisions:
- source_word: πλεονάζον
  english_pob_choice: surplus
  chosen_spanish: sobrante
  alternatives_spanish:
  - excedente
  - remanente
  - lo que sobra
  lexicon: LSJ
  rationale: El participio sustantivado expresa lo que queda por encima de lo debido o gastado. En español, «sobrante» comunica bien esa idea en un contexto administrativo sin forzar un término demasiado técnico.
- source_word: ἀπέδωσαν
  english_pob_choice: did not pay
  chosen_spanish: no pagaron
  alternatives_spanish:
  - no entregaron
  - no remitieron
  - no devolvieron
  lexicon: LSJ
  rationale: 'Aquí el verbo se entiende en sentido fiscal: pago o remisión de fondos. «No pagaron» es la opción más natural en español para este contexto.'
- source_word: χρειῶν
  english_pob_choice: revenues
  chosen_spanish: las rentas
  alternatives_spanish:
  - los ingresos
  - los recursos
  - las entradas
  lexicon: LSJ
  rationale: Aunque χρεία puede significar necesidad o uso, en este pasaje se refiere a fondos o entradas de carácter financiero. «Rentas» conserva el sentido económico y suena adecuado en castellano bíblico moderno.
- source_word: ἐν τοῖς πρώτοις ἔτεσιν
  english_pob_choice: in the former years
  chosen_spanish: en los años anteriores
  alternatives_spanish:
  - en los años pasados
  - en los primeros años
  - antes
  lexicon: LSJ
  rationale: El griego contrasta con la situación presente, por lo que se refiere a años previos, no necesariamente a los primeros de una era. «Años anteriores» transmite bien ese contraste temporal.
- source_word: τὰ ἔργα
  english_pob_choice: the works
  chosen_spanish: las obras
  alternatives_spanish:
  - los trabajos
  - la obra
  - las reparaciones
  lexicon: LSJ
  rationale: El plural griego conserva la idea de distintos proyectos o trabajos relacionados con el templo. «Las obras» mantiene el plural y es natural en español.
- source_word: τοῦ οἴκου
  english_pob_choice: the house
  chosen_spanish: de la casa
  alternatives_spanish:
  - del templo
  lexicon: LSJ
  rationale: Se mantiene la expresión literal «la casa» para reflejar el giro reverencial del griego y el audit trail inglés, donde se explicó que se trata del templo. En el español resulta claro por el contexto.
theological_decisions:
- issue: Referencia reverencial a «la casa»
  english_pob_reading: '''the house'' is a literal rendering of the Greek expression, referring to the temple.'
  chosen_spanish_reading: «la casa» se conserva literalmente y se entiende como el templo por el contexto.
  alternative_spanish_readings:
  - «el templo»
  - «la casa del Señor»
  rationale: El texto griego usa οἶκος de manera reverencial. Traducirlo como «casa» preserva la forma original y la tensión entre literalidad y referencia cultual; el contexto ya permite identificar el templo.
  doctrine_reference: Uso reverencial del templo como «casa» en la tradición bíblica
- issue: Destino de los fondos
  english_pob_reading: they shall give for the works of the house
  chosen_spanish_reading: «lo darán para las obras de la casa» mantiene el carácter de asignación cultual/templo.
  alternative_spanish_readings:
  - «lo destinarán a las obras de la casa»
  - «lo darán para las obras del templo»
  rationale: El griego εἰς τὰ ἔργα indica dirección o finalidad. «Para» conserva esa finalidad sin convertirla en una interpretación más específica de lo que el texto dice.
  doctrine_reference: Administración de recursos para el culto y mantenimiento del templo
translation_notes:
  revision_awareness: Se siguió el texto griego de Swete 1909 y el audit trail inglés. No se introdujeron cambios respecto del sentido fiscal, temporal y cultual; se optó por conservar la metáfora reverencial «la casa» y por una equivalencia natural en español para el registro administrativo.
  spanish_consistency_notes:
  - Se mantuvo «casa» para οἴκου, en coherencia con la decisión inglesa y con el uso bíblico reverencial.
  - «Rentas» traduce el valor fiscal de χρειῶν sin perder la referencia a fondos/ingresos.
  - «Obras» conserva el plural de τὰ ἔργα y evita sobreinterpretar como «reparaciones».
