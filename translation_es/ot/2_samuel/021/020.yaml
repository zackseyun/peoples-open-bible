translation:
  language: es
  text: Y hubo otra vez guerra en Gat[a], y hubo un hombre de gran tamaño cuyos dedos de las manos y de los pies eran seis y seis, veinticuatro en número[b]; también él nació de Rapha[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «en Gat».
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: «los dedos de sus manos y los dedos de sus pies». En español se expresa naturalmente como «dedos de las manos y de los pies».'
    reason: lexical_alternative
  - marker: c
    text: O «descendía de Rapha»; posiblemente alude a los refaítas, un grupo asociado con gigantes.
    reason: alternative_reading
lexical_decisions:
- source_word: מִלְחָמָה
  english_pob_choice: war
  chosen_spanish: guerra
  alternatives_spanish:
  - batalla
  lexicon: HALOT
  rationale: El sustantivo hebreo denota conflicto bélico en general. «Guerra» conserva mejor la repetición narrativa del contexto que «batalla».
- source_word: בְּגַת
  english_pob_choice: at Gath
  chosen_spanish: en Gat
  alternatives_spanish:
  - en Gath
  - a Gat
  lexicon: HALOT
  rationale: En español, con una ciudad como ubicación del conflicto, «en Gat» es la forma más natural y fiel al valor locativo de ב.
- source_word: אִישׁ מדין
  english_pob_choice: a man of great size
  chosen_spanish: un hombre de gran tamaño
  alternatives_spanish:
  - un hombre de medida
  - un hombre enorme
  - un hombre de estatura
  lexicon: HALOT
  rationale: La expresión es idiomática y apunta a dimensiones corporales inusuales. «De gran tamaño» conserva la idea sin forzar un calco extraño en español.
- source_word: אֶצְבְּעֹת יָדָיו ... אֶצְבְּעֹת רַגְלָיו
  english_pob_choice: whose fingers and toes
  chosen_spanish: cuyos dedos de las manos y dedos de los pies
  alternatives_spanish:
  - cuyos dedos de sus manos y dedos de sus pies
  - cuyos dedos de las manos y los dedos de los pies
  lexicon: HALOT
  rationale: El hebreo dice literalmente «los dedos de sus manos» y «los dedos de sus pies». En español, mantener la distinción anatómica con «de las manos» y «de los pies» preserva el sentido y evita ambigüedad.
- source_word: שֵׁשׁ וָשֵׁשׁ עֶשְׂרִים וְאַרְבַּע מִסְפָּר
  english_pob_choice: were six and six, twenty-four in number
  chosen_spanish: eran seis y seis, veinticuatro en total
  alternatives_spanish:
  - eran seis y seis, veinticuatro en número
  - eran seis y seis, sumando veinticuatro
  lexicon: HALOT
  rationale: La repetición del seis se conserva para reflejar la estructura hebrea. «Veinticuatro en total» expresa con naturalidad la suma final.
- source_word: יֻלַּד לְהָרָפָה
  english_pob_choice: was born to the Rapha
  chosen_spanish: nació del Rapha
  alternatives_spanish:
  - nació para el Rapha
  - era descendiente del Rapha
  - nació de la estirpe de Rapha
  lexicon: HALOT
  rationale: La construcción pasiva con ל indica pertenencia o descendencia. Mantener «del Rapha» conserva la forma de nombre propio/linaje que la POB inglesa retuvo, sin convertirlo en una glosa interpretativa.
theological_decisions:
- issue: Identidad de הָרָפָה
  english_pob_reading: the Rapha as a proper ancestral designation
  chosen_spanish_reading: el Rapha como designación ancestral propia
  alternative_spanish_readings:
  - los refaítas
  - el gigante
  - descendiente de Rapha
  rationale: El texto apunta más naturalmente a linaje o descendencia que a una simple descripción de tamaño. Mantener «Rapha» en el texto principal evita introducir una interpretación cerrada, dejando abierta la relación con los refaítas/Rephaim.
  doctrine_reference: Gn 14:5; Dt 2:10-11; 1 Cr 20:8
translation_notes:
  revision_awareness: La revisión más reciente no introdujo cambios; el acuerdo entre la base hebrea, la auditoría inglesa y el control cruzado es alto, con solo observaciones menores. Se mantuvo la decisión de tratar הָרָפָה como designación de linaje y de traducir la anatomía de forma natural en español.
  spanish_consistency_notes:
  - Se conservó «Yahvé» como terminología por defecto en el proyecto, pero este versículo no contiene el nombre divino.
  - Se prefirió «guerra» por su correspondencia con el contexto bélico repetido.
  - Se evitó «Cristo»/«Mesías» porque no aplica al versículo.
  - La sintaxis busca ser bíblica y publicable en español moderno sin depender de formulación tradicional que oculte matices del hebreo.
