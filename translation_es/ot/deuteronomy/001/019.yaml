translation:
  language: es
  text: Entonces partimos de Horeb y atravesamos todo aquel desierto grande y temible[a] que ustedes vieron, por el camino a la región montañosa de los amorreos, tal como Yahvé nuestro Dios nos lo mandó, y llegamos hasta Cades-barnea.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «grande y terrible». El adjetivo hebreo puede denotar aquello que inspira temor, asombro o pavor.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַנִּסַּע
  english_pob_choice: we set out
  chosen_spanish: nos partimos
  alternatives_spanish:
  - salimos
  - nos pusimos en marcha
  - partimos
  lexicon: HALOT
  rationale: נסע en este contexto describe levantar el campamento y emprender la marcha. En español, «nos partimos» comunica bien el acto de salir de un lugar para continuar el viaje sin sonar demasiado técnico.
- source_word: מֵחֹרֵב
  english_pob_choice: from Horeb
  chosen_spanish: de Horeb
  alternatives_spanish:
  - desde Horeb
  lexicon: HALOT
  rationale: Es un nombre propio de lugar; la preposición simple «de» reproduce con naturalidad el hebreo מִן.
- source_word: וַנֵּלֶךְ
  english_pob_choice: and went through
  chosen_spanish: atravesamos
  alternatives_spanish:
  - fuimos
  - recorrimos
  - caminamos a través de
  lexicon: HALOT
  rationale: Con el complemento totalizante «todo el desierto», el verbo implica recorrerlo. «Atravesamos» expresa ese tránsito sin necesidad de añadir más explicación.
- source_word: אֵת כָּל הַמִּדְבָּר
  english_pob_choice: through all that ... wilderness
  chosen_spanish: todo aquel desierto
  alternatives_spanish:
  - todo aquel desierto
  - todo aquel territorio desértico
  - toda aquella región del desierto
  lexicon: HALOT
  rationale: El marcador directo con הלך no se traslada literalmente al español. «Todo aquel desierto» conserva la idea de totalidad y la referencia al espacio recorrido.
- source_word: הַמִּדְבָּר
  english_pob_choice: wilderness
  chosen_spanish: desierto
  alternatives_spanish:
  - wilderness (en transliteración no aplica)
  - región desierta
  - yermo
  lexicon: HALOT
  rationale: Aunque «desierto» no cubre todos los matices de מִדְבָּר, en español bíblico es la forma más clara y aceptada. «Yermo» resultaría más arcaico y menos transparente para lectores actuales.
- source_word: הַגָּדוֹל וְהַנּוֹרָא
  english_pob_choice: great and fearsome
  chosen_spanish: grande y temible
  alternatives_spanish:
  - grande y terrible
  - grande e imponente
  - vasto y temible
  lexicon: HALOT
  rationale: גָּדוֹל es «grande». נוֹרָא puede expresar aquello que inspira temor o asombro; «temible» preserva ese campo semántico sin cargarlo con una sola lectura moral.
- source_word: הַהוּא
  english_pob_choice: that
  chosen_spanish: aquel
  alternatives_spanish:
  - ese
  - ese mismo
  lexicon: HALOT
  rationale: El demostrativo retoma el desierto ya descrito. «Aquel» suena natural en español y conserva la distancia deíctica.
- source_word: אֲשֶׁר רְאִיתֶם
  english_pob_choice: that you saw
  chosen_spanish: que ustedes vieron
  alternatives_spanish:
  - que vieron
  - que ustedes mismos vieron
  lexicon: HALOT
  rationale: La cláusula relativa apela a la experiencia de los oyentes. «Ustedes vieron» mantiene la segunda persona plural explícita y la referencia testimonial.
- source_word: דֶּרֶךְ הַר הָאֱמֹרִי
  english_pob_choice: on the way to the hill country of the Amorites
  chosen_spanish: por el camino a la región montañosa de los amorreos
  alternatives_spanish:
  - por el camino hacia la tierra montañosa de los amorreos
  - por la ruta a la región montañosa de los amorreos
  lexicon: HALOT
  rationale: דֶּרֶךְ es «camino». הַר, en este contexto, indica la zona alta o montañosa; por eso «región montañosa» es más claro que «monte». «Amorreos» reproduce el etnónimo.
- source_word: כַּאֲשֶׁר צִוָּה
  english_pob_choice: just as ... commanded
  chosen_spanish: tal como ... nos lo mandó
  alternatives_spanish:
  - como ... nos mandó
  - según ... nos mandó
  lexicon: HALOT
  rationale: El hebreo expresa correspondencia con una orden previa. «Tal como» preserva esa equivalencia de manera fluida; «mandó» refleja bien צִוָּה en español bíblico contemporáneo.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  - el SEÑOR
  lexicon: HALOT
  rationale: La política del proyecto pide «Yahvé» para el Tetragrámaton. Se conserva el nombre divino propio en vez de sustituirlo por un título.
- source_word: אֱלֹהֵינוּ
  english_pob_choice: our God
  chosen_spanish: nuestro Dios
  alternatives_spanish:
  - Dios nuestro
  lexicon: HALOT
  rationale: Construcción posesiva directa y natural en español. Mantiene la relación de pacto implícita en el hebreo.
- source_word: וַנָּבֹא עַד
  english_pob_choice: and we came as far as
  chosen_spanish: y llegamos hasta
  alternatives_spanish:
  - y vinimos hasta
  - y alcanzamos
  lexicon: HALOT
  rationale: La combinación marca llegada hasta un límite o punto de referencia. «Llegamos hasta» conserva bien ese matiz fronterizo.
- source_word: קָדֵשׁ בַּרְנֵעַ
  english_pob_choice: Kadesh-barnea
  chosen_spanish: Cades-barnea
  alternatives_spanish:
  - Cades Barnea
  lexicon: HALOT
  rationale: Topónimo transliterado según uso bíblico en español. El guion ayuda a reflejar el nombre compuesto.
theological_decisions:
- issue: Tratamiento del nombre divino יהוה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - el SEÑOR
  rationale: Se conserva el nombre personal de Dios revelado a Israel, evitando la sustitución por un título. La forma «Yahvé» sigue la terminología por defecto del proyecto y mantiene transparencia auditable.
  doctrine_reference: 'DOCTRINE.md: contested terms — YHWH → Yahvé'
- issue: Valor de נוֹרָא en el desierto
  english_pob_reading: fearsome
  chosen_spanish_reading: temible
  alternative_spanish_readings:
  - terrible
  - imponente
  - que inspira temor
  rationale: El término hebreo puede expresar temor, asombro o pavor. «Temible» deja abierta esa tensión semántica sin reducirla a un solo matiz.
  doctrine_reference: HALOT / uso contextual de נוֹרָא
- issue: הַר הָאֱמֹרִי como destino geográfico
  english_pob_reading: hill country of the Amorites
  chosen_spanish_reading: región montañosa de los amorreos
  alternative_spanish_readings:
  - montaña de los amorreos
  - territorio montañoso de los amorreos
  rationale: En español, «región montañosa» comunica mejor el valor colectivo de הַר en este contexto que un singular literal («monte»), que sonarían menos precisos geográficamente.
  doctrine_reference: Uso contextual de topónimos y términos geográficos
translation_notes:
  revision_awareness: Se siguió de cerca el audit trail inglés sin traducir mecánicamente. La principal decisión lexical fue mantener el valor de recorrido total con «atravesamos» y preservar la tensión semántica de נוֹרָא con «temible», en línea con la nota inglesa. No se detectaron revisiones posteriores que alteraran el sentido base.
  spanish_consistency_notes:
  - Se usó «Yahvé» consistentemente para יהוה, conforme a la política del proyecto.
  - Se empleó «desierto» para מִדְבָּר por claridad bíblica en español, sin añadir explicaciones no presentes en el texto.
  - «Cades-barnea» mantiene la transliteración compuesta y el guion del topónimo.
  - Se evitó «SEÑOR» para no enmascarar el nombre divino, y se mantuvo «Dios» para אֱלֹהִים.
