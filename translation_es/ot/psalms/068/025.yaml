translation:
  language: es
  text: 'Han visto tus procesiones[a], oh Dios—

    las procesiones de mi Dios, mi Rey, en el santuario.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'Han visto tus idas, oh Dios— las idas de mi Dios, mi Rey, en santidad'. El hebreo plural הֲלִיכוֹת también puede referirse a 'idas' o 'marchas'; aquí se ha preferido 'procesiones' por el contexto litúrgico y celebrativo.
    reason: lexical_alternative
lexical_decisions:
- source_word: רָאוּ
  english_pob_choice: They have seen
  chosen_spanish: Han visto
  alternatives_spanish:
  - Vieron
  - Han contemplado
  lexicon: HALOT
  rationale: El perfecto qal de ראה expresa una acción vista/completada; en español, el pretérito perfecto compuesto transmite bien una observación realizada con fuerza poética, sin exigir una lectura más interpretativa que el original.
- source_word: הֲלִיכוֹתֶיךָ
  english_pob_choice: your processions
  chosen_spanish: tus procesiones
  alternatives_spanish:
  - tus marchas
  - tus andanzas
  - tus pasos
  lexicon: HALOT
  rationale: La forma plural y el contexto cultual favorecen un sentido procesional y ceremonial. 'Procesiones' conserva el plural del hebreo y la imagen ritual que la auditoría inglesa resaltó.
- source_word: אֱלֹהִים
  english_pob_choice: O God
  chosen_spanish: oh Dios
  alternatives_spanish:
  - Dios
  - ¡Oh, Dios!
  lexicon: HALOT
  rationale: El contexto exige vocativo; en español, 'oh Dios' comunica el llamado directo y poético sin introducir una construcción ajena al hebreo.
- source_word: הֲלִיכוֹת
  english_pob_choice: the processions
  chosen_spanish: las procesiones
  alternatives_spanish:
  - los pasos
  - las marchas
  - las andanzas
  lexicon: HALOT
  rationale: Se mantiene la repetición del sustantivo plural para preservar el paralelismo. 'Procesiones' funciona de manera natural en español y retiene el valor ceremonial del pasaje.
- source_word: אֵלִי
  english_pob_choice: my God
  chosen_spanish: mi Dios
  alternatives_spanish:
  - Dios mío
  lexicon: HALOT
  rationale: La forma posesiva expresa pertenencia/devoción directa; 'mi Dios' sigue de cerca el hebreo y se ajusta al paralelismo con 'mi Rey'.
- source_word: מַלְכִּי
  english_pob_choice: my King
  chosen_spanish: mi Rey
  alternatives_spanish:
  - mi rey
  lexicon: HALOT
  rationale: El título real aplicado a Dios se conserva como 'Rey' para mantener la fuerza teológica y poética del original. La mayúscula distingue el título divino sin añadir contenido extra.
- source_word: בַקֹּדֶשׁ
  english_pob_choice: into the sanctuary
  chosen_spanish: en el santuario
  alternatives_spanish:
  - en la santidad
  - en lo santo
  - hacia el santuario
  lexicon: HALOT
  rationale: La auditoría inglesa optó por un sentido cultual/sagrado, no meramente abstracto. En español, 'en el santuario' comunica con claridad el ámbito sagrado y preserva la lectura processional sin forzar un 'hacia' que el hebreo no exige de manera inequívoca.
theological_decisions:
- issue: Sentido de la escena procesional
  english_pob_reading: The verse describes God's ceremonial procession into the sacred place.
  chosen_spanish_reading: El versículo describe las procesiones de Dios en un marco cultual, culminando en el santuario.
  alternative_spanish_readings:
  - El versículo habla de los caminos de Dios de manera más abstracta.
  - El versículo podría leerse como 'en santidad' sin referencia espacial al santuario.
  rationale: La repetición de הֲלִיכוֹת y el cierre con בַקֹּדֶשׁ favorecen una imagen ceremonial. 'Procesiones' y 'santuario' preservan esa lectura sin sobreexplicar el detalle histórico.
  doctrine_reference: Translation philosophy §3, §5
translation_notes:
  revision_awareness: La revisión inglesa reciente corrigió el singular 'procession' a 'processions' para reflejar mejor el plural hebreo. La versión española sigue esa decisión con dos ocurrencias de 'procesiones' y mantiene la lectura cultual del verso.
  spanish_consistency_notes:
  - Se conserva el vocativo directo 'oh Dios' para corresponder al inglés POB 'O God' y al contexto poético.
  - '''Mi Rey'' se capitaliza como título divino, en línea con la convención usada en el texto inglés auditado.'
  - Se mantiene 'santuario' para el ámbito sagrado señalado por la auditoría, evitando reducirlo a una noción meramente abstracta de 'santidad'.
