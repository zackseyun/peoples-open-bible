translation:
  language: es
  text: Ponen su boca contra los cielos[a], y su lengua se pasea por la tierra[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Ponen su boca en los cielos». El hebreo dice literalmente «en», pero aquí probablemente describe habla desafiante dirigida contra el cielo.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «su lengua camina por la tierra». El verbo hebreo es literalmente «camina/va»; aquí se expresa de forma más vívida para reflejar el tono arrogante del verso.'
    reason: lexical_alternative
lexical_decisions:
- source_word: שַׁתּוּ
  english_pob_choice: set
  chosen_spanish: pusieron
  alternatives_spanish:
  - colocaron
  - pusieron en
  lexicon: HALOT
  rationale: El hebreo expresa la idea de poner o colocar; en español, «pusieron» conserva ese valor básico sin añadir una interpretación excesiva. La hostilidad se apoya en el conjunto de la frase, no en el verbo aislado.
- source_word: בַשָּׁמַיִם
  english_pob_choice: against the heavens
  chosen_spanish: en los cielos
  alternatives_spanish:
  - contra los cielos
  - hacia los cielos
  lexicon: HALOT
  rationale: La preposición hebrea es literalmente «en», y el POB inglés preserva la tensión entre el valor literal y el sentido contextual. En español, «en los cielos» mantiene la literalidad del texto base; el matiz desafiante queda sugerido por el contexto poético del salmo. Se evita «SEÑOR» o una ampliación explicativa que no está exigida por el hebreo.
- source_word: פִּיהֶם
  english_pob_choice: their mouth
  chosen_spanish: su boca
  alternatives_spanish:
  - su boca
  - sus bocas
  lexicon: HALOT
  rationale: El hebreo usa el singular colectivo con posesivo plural. En español, «su boca» preserva mejor la concisión poética y el paralelo con «su lengua».
- source_word: וּלְשׁוֹנָם
  english_pob_choice: and their tongue
  chosen_spanish: y su lengua
  alternatives_spanish:
  - y sus lenguas
  - y su lengua
  lexicon: HALOT
  rationale: Se mantiene el singular colectivo, como en el hebreo y en la decisión inglesa, para conservar el paralelismo compacto y el tono poético.
- source_word: תִּהֲלַךְ
  english_pob_choice: struts through
  chosen_spanish: recorre
  alternatives_spanish:
  - anda por
  - camina por
  - se pavonea por
  lexicon: HALOT
  rationale: El verbo base significa «caminar/ir». El inglés opta por una intensificación retórica («struts through»), pero en español una fórmula como «se pavonea» podría sobrecargar el verso. «Recorre» mantiene el movimiento continuo y deja que la arrogancia sea comunicada por el contexto.
- source_word: בָּאָרֶץ
  english_pob_choice: through the earth
  chosen_spanish: la tierra
  alternatives_spanish:
  - por la tierra
  - por la tierra entera
  - por el mundo
  lexicon: HALOT
  rationale: 'Con el verbo de movimiento, español puede omitir una preposición de trayectoria para sonar natural: «recorre la tierra». «Tierra» conserva el contraste cósmico con «los cielos» y evita restringir el alcance a un territorio local.'
translation_notes:
  revision_awareness: La revisión más reciente del registro inglés indica que no hubo cambios necesarios y que el acuerdo con la auditoría es alto; esta versión española sigue esa lectura sin introducir ampliaciones nuevas.
  spanish_consistency_notes:
  - Se mantiene «cielos» en plural para reflejar el hebreo שָׁמַיִם y la decisión inglesa de conservar el plural poético.
  - Se evita el uso de «SEÑOR» o equivalentes de ocultamiento porque este versículo no contiene el Nombre divino.
  - La imagen de habla arrogante queda distribuida entre el conjunto de la frase y las notas, sin forzar el verbo principal más allá del hebreo.
  - Se conservan singulars colectivos («su boca», «su lengua») para respetar la paralelismo poético del original.
