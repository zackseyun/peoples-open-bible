translation:
  language: es
  text: 'Habla a Aarón y a sus hijos, diciendo: «Esta es la ley de la ofrenda por el pecado[a]: en el lugar donde se degüella el holocausto será degollada la ofrenda por el pecado delante de Yahvé. Es santísima»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «ofrenda de purificación» para חַטָּאת; el término hebreo puede referirse tanto al pecado como a la ofrenda asociada con la purificación de él.
    reason: lexical_alternative
lexical_decisions:
- source_word: דַּבֵּר
  english_pob_choice: Speak
  chosen_spanish: Habla
  alternatives_spanish:
  - Di
  - Habla
  lexicon: HALOT
  rationale: El imperativo de דבר introduce una instrucción formal; en español, «Habla» conserva el tono directo y legislativo sin volverse rígido. «Di» sería más general, pero pierde algo de la solemnidad del mandato.
- source_word: אֶל אַהֲרֹן וְאֶל בָּנָיו
  english_pob_choice: to Aaron and to his sons
  chosen_spanish: a Aarón y a sus hijos
  alternatives_spanish:
  - a Aarón y a sus hijos
  - a Aarón y a sus hijos de él
  lexicon: HALOT
  rationale: Se mantiene la doble relación preposicional con lenguaje natural en español. «Sus hijos» comunica claramente la filiación sacerdotal sin forzar una repetición de pronombres.
- source_word: לֵאמֹר
  english_pob_choice: saying
  chosen_spanish: diciendo
  alternatives_spanish:
  - diciendo
  - y di
  lexicon: HALOT
  rationale: La fórmula de cita queda más fluida en español con «diciendo». Conserva el carácter introductorio de la instrucción legal.
- source_word: זֹאת תּוֹרַת
  english_pob_choice: This is the law of
  chosen_spanish: Esta es la ley de
  alternatives_spanish:
  - Ésta es la ley de
  - Esta es la instrucción de
  lexicon: HALOT
  rationale: «Ley» preserva la fuerza normativa de תּוֹרָה en este contexto sacrificial. «Instrucción» es posible, pero debilita el tono jurídico que aquí resulta importante.
- source_word: הַחַטָּאת
  english_pob_choice: the sin offering
  chosen_spanish: la ofrenda por el pecado[a]
  alternatives_spanish:
  - la ofrenda por el pecado
  - la ofrenda de purificación
  lexicon: HALOT
  rationale: Se adopta «ofrenda por el pecado» como término inteligible y tradicional en español, pero se marca la tensión lexical con una nota porque חַטָּאת puede referirse también a una ofrenda de purificación. Esto sigue la nota auditada del POB inglés sin ocultar la ambigüedad del término.
- source_word: בִּמְקוֹם
  english_pob_choice: in the place
  chosen_spanish: en el lugar
  alternatives_spanish:
  - en el lugar
  - en el sitio
  lexicon: HALOT
  rationale: «En el lugar» es la correspondencia más natural y exacta para el valor locativo de בְּמָקוֹם.
- source_word: אֲשֶׁר תִּשָּׁחֵט הָעֹלָה
  english_pob_choice: where the burnt offering is slaughtered
  chosen_spanish: donde se degüella el holocausto
  alternatives_spanish:
  - donde se degüella el holocausto
  - donde es sacrificada la ofrenda quemada
  lexicon: HALOT
  rationale: Se usa «degollar» para rendir el sentido sacrificial específico de שׁחט, y «holocausto» para עֹלָה como término técnico bien establecido. «Se degüella» mantiene el pasivo impersonal natural en español.
- source_word: תִּשָּׁחֵט הַחַטָּאת
  english_pob_choice: the sin offering shall be slaughtered
  chosen_spanish: será degollada la ofrenda por el pecado
  alternatives_spanish:
  - será degollada la ofrenda por el pecado
  - debe ser degollada la ofrenda por el pecado
  lexicon: HALOT
  rationale: El futuro pasivo transmite con claridad la obligación legal. Se conserva la misma raíz verbal en español que en la cláusula anterior para reflejar el paralelismo hebreo.
- source_word: לִפְנֵי יְהוָה
  english_pob_choice: before Yahweh
  chosen_spanish: delante de Yahvé
  alternatives_spanish:
  - delante de Yahvé
  - ante Yahvé
  lexicon: HALOT
  rationale: Se sigue el criterio del proyecto para el Nombre divino. «Delante de» reproduce el valor cultual de לִפְנֵי con naturalidad en español; «ante» también sería posible, pero algo más formal.
- source_word: קֹדֶשׁ קָדָשִׁים
  english_pob_choice: most holy
  chosen_spanish: cosa santísima
  alternatives_spanish:
  - cosa santísima
  - santísima
  lexicon: HALOT
  rationale: La construcción intensiva se vierte con el superlativo español «santísima». Se añade «cosa» para hacer explícito que la frase califica a la ofrenda; es una opción idiomática y precisa en este contexto legal.
- source_word: הִוא
  english_pob_choice: It is
  chosen_spanish: Es
  alternatives_spanish:
  - Es
  - Ella es
  lexicon: HALOT
  rationale: El pronombre femenino remite a la ofrenda. En español, el predicado puede quedar elíptico y natural con «Es», manteniendo el cierre enfático sin recargarlo con un pronombre innecesario.
theological_decisions:
- issue: Rendering of the divine name יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahvé
  - SEÑOR
  rationale: Se sigue el estándar del proyecto para el Tetragrámaton. En un contexto sacerdotal y sacrificial, preservar el Nombre propio evita el enmascaramiento litúrgico y mantiene la transparencia del texto fuente.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Semantic range of חַטָּאת
  english_pob_reading: sin offering / purification offering
  chosen_spanish_reading: ofrenda por el pecado
  alternative_spanish_readings:
  - ofrenda de purificación
  - ofrenda por el pecado
  rationale: La elección principal conserva la designación más reconocible y coincide con el audit trail inglés; sin embargo, se reconoce que el término hebreo puede abarcar el aspecto ritual de purificación. Por eso se deja constancia de la alternativa en la nota.
  doctrine_reference: Levitical sacrificial terminology; lexical note in English POB
- issue: Cultic classification קֹדֶשׁ קָדָשִׁים
  english_pob_reading: most holy
  chosen_spanish_reading: cosa santísima
  alternative_spanish_readings:
  - santísimo
  - santísima
  rationale: La expresión señala el grado máximo de santidad aplicada a la ofrenda. «Cosa santísima» evita confundir esta clasificación con el topónimo/espacio «Santo de los Santos» y deja claro el valor adjetival del hebreo.
  doctrine_reference: Priestly holiness terminology
translation_notes:
  revision_awareness: 'Se respetó el pasaje base sin cambios textuales relevantes respecto del audit trail inglés. La principal decisión de ajuste al español fue conservar el término técnico de culto con una formulación idiomática: «se degüella» / «será degollada», y mantener la nota léxica para חַטָּאת, tal como lo documenta la versión inglesa. No se detectaron revisiones tardías que exigieran alteración del sentido.'
  spanish_consistency_notes:
  - Se usa «Yahvé» de forma consistente para יְהוָה, conforme al estándar del proyecto.
  - Se mantiene «holocausto» para עֹלָה por ser el término técnico tradicional y transparente en español.
  - «Degollar»/«degüella» reproduce el acto sacrificial de שׁחט con mayor precisión que «matar» o «sacrificar».
  - La frase final «cosa santísima» evita una lectura ambigua de «santo de los santos» y preserva el superlativo hebreo.
