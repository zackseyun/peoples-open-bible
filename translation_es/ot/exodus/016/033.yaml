translation:
  language: es
  text: 'Y Moisés dijo a Aarón: «Toma una vasija[a], y pon en ella un omer[b] completo de maná, y colócalo delante de Yahvé, para que se conserve por todas sus generaciones».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «jarra» o «tarro» para el recipiente nombrado aquí.
    reason: lexical_alternative
  - marker: b
    text: O «la medida completa de un omer»; la expresión hebrea enfatiza una medida llena, no solo la unidad de medida.
    reason: lexical_alternative
lexical_decisions:
- source_word: צִנְצֶנֶת
  english_pob_choice: jar
  chosen_spanish: vasija
  alternatives_spanish:
  - jarra
  - tarro
  - recipiente
  lexicon: HALOT
  rationale: El término hebreo designa un recipiente/vessel para guardar algo. En español, «vasija» es amplio, natural y digno; evita sugerir una olla de cocina o un tarro moderno demasiado específico.
- source_word: מְלֹא הָעֹמֶר
  english_pob_choice: an omerful
  chosen_spanish: un omer lleno
  alternatives_spanish:
  - la medida completa de un omer
  - un omer colmado
  lexicon: HALOT
  rationale: מְלֹא expresa plenitud, no solo la medida. «Un omer lleno» conserva la unidad de medida y la idea de que iba colmada, sin perder la brevedad del hebreo.
- source_word: מָן
  english_pob_choice: manna
  chosen_spanish: maná
  alternatives_spanish:
  - manna
  lexicon: HALOT
  rationale: «Maná» es la forma establecida y transparente en español para la sustancia nombrada en el contexto.
- source_word: וְתֶן שָׁמָּה
  english_pob_choice: put in it
  chosen_spanish: pon en ella
  alternatives_spanish:
  - colócalo allí
  - mete en ella
  lexicon: HALOT
  rationale: El adverbio hebreo significa «allí», pero el contexto aclara que el contenido va dentro de la vasija. «Pon en ella» refleja esa referencia de manera natural en español.
- source_word: וְהַנַּח אֹתוֹ
  english_pob_choice: place it
  chosen_spanish: colócalo
  alternatives_spanish:
  - déjalo
  - ponlo
  lexicon: HALOT
  rationale: El verbo indica poner/dejar en un lugar. «Colócalo» mantiene el tono ritual y formal del mandato.
- source_word: לִפְנֵי יְהוָה
  english_pob_choice: before Yahweh
  chosen_spanish: delante de Yahvé
  alternatives_spanish:
  - ante Yahvé
  - en presencia de Yahvé
  lexicon: HALOT
  rationale: Se conserva el nombre divino como «Yahvé» por la convención del proyecto. «Delante de» reproduce bien לִפְנֵי y funciona con naturalidad en el registro bíblico.
- source_word: לְמִשְׁמֶרֶת
  english_pob_choice: to be kept
  chosen_spanish: para que se conserve
  alternatives_spanish:
  - para guardarlo
  - para preservarlo
  - como algo que se debe guardar
  lexicon: HALOT
  rationale: Aquí la idea es de preservación/custodia. «Para que se conserve» expresa el propósito sin hacer sonara demasiado técnico o extraño en español.
- source_word: לְדֹרֹתֵיכֶם
  english_pob_choice: throughout your generations
  chosen_spanish: para sus generaciones
  alternatives_spanish:
  - por todas sus generaciones
  - para todas sus generaciones
  - a través de sus generaciones
  lexicon: HALOT
  rationale: La frase indica continuidad intergeneracional. En español, «para sus generaciones» es breve y fiel; el posesivo plural se adapta al discurso dirigido a Israel.
- source_word: קַח ... אַחַת
  english_pob_choice: Take one jar
  chosen_spanish: Toma una vasija
  alternatives_spanish:
  - Toma una sola vasija
  - Toma una vasija única
  lexicon: HALOT
  rationale: El numeral enfatiza que debe ser un solo recipiente. En español, el énfasis puede quedar implícito en el artículo indefinido singular sin forzar la frase.
theological_decisions:
- issue: Representación del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahveh
  - el SEÑOR
  rationale: Se sigue la terminología del proyecto para el Tetragrámaton. En español, «Yahvé» es la forma preferida por claridad y coherencia con el nombre personal de Dios revelado a Israel; se evita la sustitución por un título.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Valor de לְמִשְׁמֶרֶת
  english_pob_reading: to be kept
  chosen_spanish_reading: para que se conserve
  alternative_spanish_readings:
  - para guardarse
  - para ser preservado
  rationale: No se trata solo de almacenar el maná, sino de conservarlo como testimonio/depósito. «Para que se conserve» mantiene ese sentido de custodia sin añadir una explicación ausente del verso.
  doctrine_reference: HALOT; contexto de preservación memorial en Éxodo 16
translation_notes:
  revision_awareness: La redacción inglesa auditada pasó de «put there» a «put ... in it» para clarificar la referencia al recipiente. En español se adoptó directamente «pon en ella», que conserva esa claridad sin perder la economía del hebreo. También se mantuvo la opción doctrinal del nombre divino como «Yahvé», acorde con el estándar del proyecto.
  spanish_consistency_notes:
  - Se mantuvo el nombre divino como «Yahvé» en vez de una sustitución por «SEÑOR».
  - Se eligió «maná» como término estable y transparente en español.
  - «Vasija» se usa como equivalente amplio y neutro del recipiente hebreo, sin implicar una olla de cocina.
  - La construcción «para que se conserve» expresa finalidad/preservación de forma natural en español.
  - El plural posesivo «sus generaciones» se ajusta al español bíblico y a la referencia corporativa a Israel.
