translation:
  language: es
  text: Hombres[a], ¡cuánto prevalece el vino! Desvía la mente de todas las personas que lo beben,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Hombres» conserva el vocativo masculino del griego (Ἄνδρες). El sustantivo siguiente, ἀνθρώπους, tiene alcance más amplio; por eso se traduce más abajo como «personas».
    reason: lexical_alternative
lexical_decisions:
- source_word: Ἄνδρες
  english_pob_choice: Men
  chosen_spanish: Hombres
  alternatives_spanish:
  - ¡Hombres!
  - Varones
  - Señores
  lexicon: LSJ
  rationale: El vocativo plural de ἀνήρ pide una dirección masculina explícita. «Hombres» conserva el tono directo y la fuerza retórica sin volverlo ceremonioso como «Señores».
- source_word: πῶς
  english_pob_choice: how greatly
  chosen_spanish: ¡cuán mucho!
  alternatives_spanish:
  - ¡cómo!
  - ¡cuán grandemente!
  - ¡cuánto!
  lexicon: LSJ
  rationale: Aquí πῶς es exclamativo y de grado, no de modo. «¡Cuán mucho!» comunica la intensidad de la exclamación de manera natural en español, aunque suene un poco enfático; mantiene el valor retórico del griego.
- source_word: ὑπερισχύει
  english_pob_choice: prevails
  chosen_spanish: prevalece
  alternatives_spanish:
  - es más fuerte
  - se impone
  - vence
  lexicon: LSJ
  rationale: El verbo expresa ser más fuerte o imponerse. «Prevalece» preserva la idea de superioridad/poder de influencia sin añadir un objeto que el griego no expresa.
- source_word: ὁ οἶνος
  english_pob_choice: wine
  chosen_spanish: el vino
  alternatives_spanish:
  - vino
  lexicon: LSJ
  rationale: Correspondencia directa y normal en español.
- source_word: πάντας τοὺς ἀνθρώπους
  english_pob_choice: all the people
  chosen_spanish: todas las personas
  alternatives_spanish:
  - todos los hombres
  - todo el mundo
  - toda la gente
  lexicon: LSJ
  rationale: Aunque ἄνδρες abre con address masculino, ἀνθρώπους es más amplio y el propio audit trail inglés revisó el segmento a «people» para reflejarlo mejor. En español, «todas las personas» evita una repetición pesada de «hombres» y conserva el alcance general.
- source_word: τοὺς πίοντας αὐτόν
  english_pob_choice: who drink it
  chosen_spanish: que lo beben
  alternatives_spanish:
  - que lo beben habitualmente
  - bebiéndolo
  - los que lo beben
  lexicon: LSJ
  rationale: El participio presente sustantivado expresa una acción general/habitual. «Que lo beben» es natural y conserva esa referencia continua.
- source_word: πλανᾷ
  english_pob_choice: leads astray
  chosen_spanish: desvía
  alternatives_spanish:
  - engaña
  - extravía
  - hace errar
  lexicon: LSJ
  rationale: πλανᾷ puede ser «hacer errar», «desviar» o «extraviar». «Desvía» mantiene la imagen de apartar la mente de su recto curso; «engaña» sería demasiado estrecho y podría perder la dimensión intelectual.
- source_word: τὴν διάνοιαν
  english_pob_choice: the mind
  chosen_spanish: la mente
  alternatives_spanish:
  - el entendimiento
  - la razón
  - el pensamiento
  lexicon: LSJ
  rationale: διάνοια abarca mente, entendimiento y facultad de pensar. «La mente» es la opción más directa y clara en español contemporáneo.
translation_notes:
  revision_awareness: El texto base inglés primero decía «all the men», pero la revisión autorizada lo ajustó a «all the people» para reflejar con más precisión πάντας τοὺς ἀνθρώπους y evitar una repetición innecesaria. La versión española sigue esa revisión y mantiene, al mismo tiempo, el vocativo masculino inicial por su valor discursivo en el griego.
  spanish_consistency_notes:
  - Se mantiene «vino» como equivalente directo de οἶνος.
  - Se evita «señor» o fórmulas eclesiásticas no presentes en el texto.
  - No se introduce puntuación explicativa adicional fuera de la exclamación principal y la coma final del inciso conservado.
