translation:
  language: es
  text: Y ustedes reúnan junto a ustedes a todos los que practican la ley[a], y tomen venganza[b] por su pueblo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «todos los hacedores de la ley». El griego es más literalmente «todos los hacedores/practicantes de la ley».'
    reason: lexical_alternative
  - marker: b
    text: Literalmente, «tomen venganza, venganza de su pueblo»; la construcción cognada griega intensifica el mandato de vengarlos.
    reason: lexical_alternative
lexical_decisions:
- source_word: προσάξετε πρὸς ὑμᾶς
  english_pob_choice: gather to yourselves
  chosen_spanish: reúnan a su alrededor
  alternatives_spanish:
  - reúnan junto a ustedes
  - atraigan hacia ustedes
  - llamen a su lado
  lexicon: LSJ
  rationale: El griego expresa reunir o hacer venir hacia el propio bando o compañía. En español, «reúnan a su alrededor» comunica con naturalidad esa idea de convocatoria y adhesión, manteniendo el matiz de formar un grupo alrededor de ellos.
- source_word: πάντας τοὺς ποιητὰς τοῦ νόμου
  english_pob_choice: all who practice the law
  chosen_spanish: todos los que practican la ley
  alternatives_spanish:
  - todos los hacedores de la ley
  - todos los que guardan la ley
  - todos los que cumplen la ley
  lexicon: LSJ
  rationale: ποιητής aquí significa quien hace o practica, no quien compone. «Practicen la ley» conserva el valor activo del participio y suena más natural en español que «hacedores», aunque esta última sigue siendo una alternativa posible.
- source_word: ἐκδικήσατε ἐκδίκησιν
  english_pob_choice: take vengeance
  chosen_spanish: tomen venganza
  alternatives_spanish:
  - hagan venganza
  - exijan venganza
  - venguen
  lexicon: LSJ
  rationale: La construcción cognada intensifica el mandato. «Tomen venganza» reproduce el tono imperativo y enérgico del griego sin perder claridad en español.
- source_word: τοῦ λαοῦ ὑμῶν
  english_pob_choice: for your people
  chosen_spanish: por su pueblo
  alternatives_spanish:
  - a favor de su pueblo
  - en nombre de su pueblo
  - por el pueblo de ustedes
  lexicon: LSJ
  rationale: Aunque formalmente el genitivo sigue a la construcción cognada, el sentido idiomático es actuar en favor del pueblo. «Por su pueblo» expresa esa finalidad/beneficio con concisión.
- source_word: νόμος
  english_pob_choice: the law
  chosen_spanish: la ley
  alternatives_spanish:
  - la Ley
  - la instrucción
  - la Torá
  lexicon: LSJ
  rationale: En este contexto macabeo, νόμος remite a la ley ancestral de Israel. Se eligió «ley» en minúscula para mantener la lectura natural y no introducir una convención tipográfica no explícita en el griego.
theological_decisions:
- issue: Sentido comunitario y bélico de la exhortación
  english_pob_reading: gather to yourselves all who practice the law, and take vengeance for your people
  chosen_spanish_reading: reúnan a su alrededor a todos los que practican la ley, y tomen venganza por su pueblo
  alternative_spanish_readings:
  - reúnan a todos los que guardan la ley a su alrededor y venguen a su pueblo
  - atraigan a su lado a todos los observantes de la ley y hagan venganza por su pueblo
  rationale: El texto es una arenga de convocatoria y represalia colectiva. La redacción española conserva esa fuerza exhortativa sin suavizar la dimensión de venganza que el griego y la POB inglesa mantienen.
  doctrine_reference: Principio POB de no atenuar tensiones léxicas o históricas; fidelidad al imperativo del texto
- issue: Nociones de Torah en contexto judío
  english_pob_reading: the law
  chosen_spanish_reading: la ley
  alternative_spanish_readings:
  - la Ley
  - la Torá
  rationale: El contexto apunta a la ley mosaica/Torá, pero el griego no añade una marca técnica que obligue a capitalizar o a glosar. «La ley» preserva la neutralidad del original y evita sobreinterpretación.
  doctrine_reference: Consistencia terminológica POB para νόμος en contextos judíos; evitar capitalización doctrinal no indicada
translation_notes:
  revision_awareness: 'Coincide con el pasaje griego recibido y con la lectura inglesa auditada: προσάξετε πρὸς ὑμᾶς = convocatoria hacia el propio grupo; ποιητὰς τοῦ νόμου = practicantes/hacedores de la ley; ἐκδικήσατε ἐκδίκησιν = venganza intensificada. No se detectan revisiones textuales pendientes en el expediente.'
  spanish_consistency_notes:
  - Se mantuvo el tratamiento plural de segunda persona en todo el versículo.
  - Se prefirió «ley» en minúscula por coherencia con la decisión inglesa y por la ausencia de marcación explícita en el griego.
  - Se preservó «venganza» en vez de suavizar a «justicia», para no borrar la fuerza del imperativo.
  - El marcador [a] va unido a «ustedes» por corresponder a una alternativa de la frase completa; el marcador [b] va unido a «venganza» por la construcción cognada intensificadora.
