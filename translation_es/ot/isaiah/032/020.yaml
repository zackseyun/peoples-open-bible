translation:
  language: es
  text: Bienaventurados ustedes, los que siembran junto a todas las aguas, los que dejan libres los pies del buey y del asno.[a]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Literalmente: «los que envían el pie del buey y del asno», un modismo para dejarlos pastar o moverse libremente.'
    reason: lexical_alternative
lexical_decisions:
- source_word: אַשְׁרֵי/כֶם
  english_pob_choice: Blessed are you
  chosen_spanish: Bienaventurados
  alternatives_spanish:
  - Dichosos
  - Felices
  lexicon: HALOT
  rationale: La expresión funciona como bienaventuranza; en español, "Bienaventurados" conserva mejor el tono solemne y declarativo que "Felices", y evita reducir el sentido a emoción subjetiva.
- source_word: זֹרְעֵי
  english_pob_choice: who sow
  chosen_spanish: los que siembran
  alternatives_spanish:
  - sembradores
  - los que están sembrando
  lexicon: HALOT
  rationale: El participio hebreo identifica a los destinatarios por su acción continua o característica. "Los que siembran" preserva ese valor verbal y suena natural en español.
- source_word: עַל כָּל מָיִם
  english_pob_choice: beside all waters
  chosen_spanish: junto a todas las aguas
  alternatives_spanish:
  - junto a toda agua
  - sobre todas las aguas
  - al lado de todas las aguas
  lexicon: HALOT
  rationale: La imagen agrícola apunta a lugares bien regados o próximos al agua. "Junto a todas las aguas" evita el calco de "sobre" y mantiene la idea de abundancia y ubicación favorable.
- source_word: מְשַׁלְּחֵי רֶגֶל
  english_pob_choice: who let the feet of the ox and the donkey range free
  chosen_spanish: los que dejan suelto el pie del buey y del asno
  alternatives_spanish:
  - los que sueltan el pie del buey y del asno
  - los que dejan andar libre al buey y al asno
  - los que liberan el pie del buey y del asno
  lexicon: HALOT
  rationale: Se conserva la metáfora literal de "pie" porque el texto hebreo la usa explícitamente, y la POB inglesa ya registró el valor idiomático. En español, "dejan suelto el pie" reproduce la imagen sin borrar la tensión entre literalidad e idioma figurado.
- source_word: הַשּׁוֹר
  english_pob_choice: the ox
  chosen_spanish: el buey
  alternatives_spanish:
  - el ox
  - el toro
  - el ganado
  lexicon: HALOT
  rationale: '"Buey" es el equivalente natural y tradicional en español para el animal de labor del contexto agrario, y corresponde mejor al valor de "ox" que "toro".'
- source_word: וְהַחֲמוֹר
  english_pob_choice: the donkey
  chosen_spanish: el asno
  alternatives_spanish:
  - el burro
  - el jumento
  - el donkey
  lexicon: HALOT
  rationale: '"Asno" conserva la correspondencia más directa con el hebreo y mantiene el tono bíblico sobrio; "burro" sería más coloquial.'
translation_notes:
  revision_awareness: 'La versión española sigue el texto hebreo masorético y toma como guía la POB inglesa revisada, especialmente al conservar la imagen de רֶגֶל («pie») en lugar de explicarla por completo en el cuerpo del texto. Se mantiene la equivalencia óptima: frase natural en español, pero con la metáfora agrícola e idiomática aún visible y auditada.'
  spanish_consistency_notes:
  - Se usa "Bienaventurados" para la fórmula de beatitud, consistente con el tono oracular del hebreo.
  - Se conserva "buey" y "asno" como animales de labor y no se suaviza a términos más generales.
  - La nota al pie marca explícitamente la alternativa literal para no perder la tensión semántica del modismo hebreo.
