id: LUK.23.17
reference: Luke 23:17
source:
  edition: robinson-pierpont-2005-byzantine
  text: Ἀνάγκην δὲ εἶχεν ἀπολύειν αὐτοῖς κατὰ ἑορτὴν ἕνα.
  language: Greek
translation:
  text: Now he had an obligation[a] to release one man to them at the festival.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: This entire verse is absent from several of the earliest Greek manuscripts
      (including the 3rd-century Papyrus 75 and 4th-century Vaticanus) and early Coptic
      translations. It is present in other major early manuscripts (such as the 4th-century
      Sinaiticus), the Latin tradition, and the later Byzantine majority. It was likely
      added by scribes to harmonize Luke's account with the release custom mentioned
      in Matthew 27:15 and Mark 15:6. Some manuscripts place this sentence after verse
      18.
    reason: textual_critical
lexical_decisions:
- source_word: ἀνάγκη
  chosen: obligation
  alternatives:
  - necessity
  - duty
  - compulsion
  lexicon: BDAG
  rationale: The phrase 'ἀνάγκην ἔχειν' is an idiom meaning 'to be under necessity'
    or 'to be obligated.' Translating it as 'had an obligation' captures the legal
    or customary pressure Pilate faced better than the overly literal 'had a necessity.'
- source_word: ἀπολύω
  chosen: release
  alternatives:
  - set free
  - let go
  - pardon
  lexicon: BDAG
  rationale: In legal and penal contexts, this verb specifically denotes releasing
    a prisoner from custody or acquitting them.
- source_word: ἑορτή
  chosen: festival
  alternatives:
  - feast
  - holiday
  lexicon: BDAG
  rationale: While 'feast' is traditional, 'festival' better conveys the multi-day
    public and religious celebration of Passover to modern readers.
