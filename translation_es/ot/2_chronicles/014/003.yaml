translation:
  language: es
  text: Y dijo a Judá que buscaran a Yahvé[a], el Dios de sus padres[b], y que observaran la ley y el mandamiento.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «consultar a Yahvé»; el verbo hebreo puede incluir buscarlo en adoración, dependencia o consulta.
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: «sus padres»; alternativamente, «sus antepasados».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמֶר
  english_pob_choice: he told
  chosen_spanish: les dijo
  alternatives_spanish:
  - les habló
  - les ordenó
  lexicon: HALOT
  rationale: אָמַר es literalmente «decir», y con לִיהוּדָה introduce el destinatario del mensaje. En español, «les dijo» conserva el sentido básico sin endurecerlo indebidamente como «ordenó».
- source_word: לִיהוּדָה
  english_pob_choice: Judah
  chosen_spanish: a Judá
  alternatives_spanish:
  - a la gente de Judá
  - al reino de Judá
  lexicon: HALOT
  rationale: El nombre propio se mantiene como entidad colectiva, como en el texto base. «A Judá» es breve y permite entender el referente nacional/colectivo.
- source_word: לִדְרוֹשׁ
  english_pob_choice: to seek
  chosen_spanish: buscaran
  alternatives_spanish:
  - consultaran
  - inquirieran de
  lexicon: HALOT
  rationale: דרש con Dios puede abarcar búsqueda devocional, dependencia y consulta. En español, «buscar» es el equivalente más natural y suficientemente amplio; «inquirir de» sería más estrecho.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  - Jehová
  lexicon: HALOT
  rationale: 'Se sigue el criterio del proyecto para el Nombre divino: transliteración del Tetragrama como «Yahvé», evitando la sustitución por un título.'
- source_word: אֱלֹהֵי אֲבוֹתֵיהֶם
  english_pob_choice: the God of their fathers
  chosen_spanish: el Dios de sus padres
  alternatives_spanish:
  - el Dios de sus antepasados
  - su Dios ancestral
  lexicon: HALOT
  rationale: Se conserva la formulación explícita de parentesco masculino («padres»), que en el contexto alude a la continuidad pactal con las generaciones previas. «Antepasados» es posible, pero atenúa la forma hebrea.
- source_word: וְלַעֲשׂוֹת
  english_pob_choice: to observe
  chosen_spanish: observaran
  alternatives_spanish:
  - hicieran
  - cumplieran
  lexicon: HALOT
  rationale: עָשָׂה es literalmente «hacer», pero con «la ley y el mandamiento» el español idiomático requiere una noción de práctica obediente. «Observaran» sigue el ajuste revisado del POB inglés y sugiere cumplimiento continuo sin sonar forzado.
- source_word: הַתּוֹרָה
  english_pob_choice: the law
  chosen_spanish: la ley
  alternatives_spanish:
  - la instrucción
  - la Torá
  lexicon: HALOT
  rationale: En este contexto de fidelidad pactal junto con «el mandamiento», «la ley» comunica con claridad la norma divina. «Instrucción» es válido pero menos directo; «Torá» sería más transliterado de lo necesario.
- source_word: וְהַמִּצְוָה
  english_pob_choice: the commandment
  chosen_spanish: el mandamiento
  alternatives_spanish:
  - el precepto
  - los mandamientos
  lexicon: HALOT
  rationale: Se mantiene el singular hebreo. «El mandamiento» preserva la forma y la fuerza normativa del sustantivo, sin pluralizarlo innecesariamente.
theological_decisions:
- issue: Uso del Nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - Jehová
  rationale: La política del proyecto exige representar el Tetragrama con el Nombre divino transliterado. «Yahvé» conserva la identidad personal del Dios del pacto y evita el reemplazo por una designación genérica.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Lenguaje ancestral en אֲבוֹתֵיהֶם
  english_pob_reading: their fathers
  chosen_spanish_reading: sus padres
  alternative_spanish_readings:
  - sus antepasados
  rationale: El hebreo dice literalmente «sus padres». Mantenerlo en español conserva la referencia histórica y de pacto, sin neutralizar la carga genealógica del original.
  doctrine_reference: 'DOCTRINE.md Translation philosophy §4: Gender-accurate over gender-neutral'
- issue: Valor de וְלַעֲשׂוֹת con «la ley y el mandamiento»
  english_pob_reading: to observe
  chosen_spanish_reading: que observaran
  alternative_spanish_readings:
  - que hicieran
  - que cumplieran
  rationale: El ajuste del POB inglés hacia «observe» apunta a una obediencia práctica continua. «Observaran» reproduce bien esa idea en español y evita reducir el verbo a un simple acto puntual.
  doctrine_reference: Applied revision pass 2026-04-23T10:13:45Z
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión inglesa reciente que cambió «keep» por «observe» para וְלַעֲשׂוֹת, y se reflejó con «observaran» en español. También se respetó el consenso alto del control cruzado, sin introducir una lectura más fuerte que la del hebreo.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» conforme al estándar terminológico del proyecto.
  - Se preserva el singular «mandamiento» como reflejo del hebreo.
  - Se opta por «padres» para conservar la expresión ancestral explícita del texto.
  - La construcción con subjuntivo («que buscaran... y que observaran») refleja adecuadamente el infinitivo de propósito tras «les dijo».
