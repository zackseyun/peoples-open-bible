translation:
  language: es
  text: 'Entonces Noemí, su suegra, le dijo: «Hija mía, ¿no he de buscarte un lugar de descanso[a], para que te vaya bien?»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «reposo», «seguridad» o «un hogar». En el contexto, Noemí busca el bienestar asentado de Rut, probablemente mediante el matrimonio, pero el hebreo dice literalmente «lugar de descanso».
    reason: lexical_alternative
lexical_decisions:
- source_word: וַתֹּאמֶר
  english_pob_choice: Then ... said
  chosen_spanish: Entonces ... le dijo
  alternatives_spanish:
  - Y ... le dijo
  - Así que ... le dijo
  lexicon: WLC/HALOT
  rationale: El waw consecutivo marca avance narrativo; «Entonces» conserva la secuencia de manera natural en español sin perder el giro narrativo.
- source_word: נָעֳמִי
  english_pob_choice: Naomi
  chosen_spanish: Noemí
  alternatives_spanish:
  - Naomí
  lexicon: Convención onomástica bíblica en español
  rationale: Se usa la forma castellana establecida del nombre propio, manteniendo reconocibilidad para lectores de Biblia en español.
- source_word: חֲמוֹתָהּ
  english_pob_choice: her mother-in-law
  chosen_spanish: su suegra
  alternatives_spanish:
  - la madre de su esposo
  - su parienta política
  lexicon: HALOT
  rationale: El sustantivo identifica claramente la relación de Noemí con Rut; «su suegra» es la equivalencia directa y natural en español.
- source_word: בִּתִּי
  english_pob_choice: My daughter
  chosen_spanish: Hija mía
  alternatives_spanish:
  - Mi hija
  - Hija
  lexicon: HALOT
  rationale: El vocativo expresa afecto y relación familiar. «Hija mía» conserva la ternura sin añadir matices ajenos al hebreo.
- source_word: הֲלֹא
  english_pob_choice: should I not
  chosen_spanish: ¿no buscaré?
  alternatives_spanish:
  - ¿acaso no buscaré?
  - ¿no debería buscar?
  lexicon: HALOT
  rationale: La pregunta retórica espera asentimiento. En español, la forma con futuro retórico reproduce bien la fuerza exhortativa/expectativa del hebreo y mantiene la iniciativa de Noemí.
- source_word: אֲבַקֶּשׁ
  english_pob_choice: seek
  chosen_spanish: buscaré
  alternatives_spanish:
  - buscaré con empeño
  - buscaré para ti
  - procuraré
  lexicon: HALOT
  rationale: בקש puede significar «buscar» o «procurar». «Buscaré» es la opción más directa y no sobredetermina la acción, preservando el alcance amplio del verbo.
- source_word: מָנוֹחַ
  english_pob_choice: a resting place
  chosen_spanish: un lugar de descanso[a]
  alternatives_spanish:
  - descanso
  - reposo
  - un hogar
  lexicon: HALOT
  rationale: El sustantivo expresa descanso, reposo o estado de seguridad asentada. «Lugar de descanso» mantiene la imagen espacial/estatal y evita interpretar de antemano «hogar» o «esposo».
- source_word: אֲשֶׁר יִיטַב לָךְ
  english_pob_choice: that it may go well with you
  chosen_spanish: para que te vaya bien
  alternatives_spanish:
  - para que te vaya mejor
  - para tu bien
  lexicon: HALOT
  rationale: La cláusula final expresa bienestar y buen resultado. «Para que te vaya bien» es una equivalencia idiomática clara en español y conserva el sentido amplio de prosperidad/bienestar.
theological_decisions:
- issue: Alcance de מָנוֹחַ en el contexto de Rut
  english_pob_reading: '''a resting place'' preserves the metaphor and avoids importing ''husband'' directly into the text; the context likely points toward settled well-being, possibly through marriage.'
  chosen_spanish_reading: '''un lugar de descanso'' preserva la metáfora y deja abierta la referencia contextual a bienestar asentado, posiblemente mediante matrimonio.'
  alternative_spanish_readings:
  - un hogar
  - descanso
  - seguridad
  rationale: El hebreo no nombra explícitamente un esposo; el texto habla de un estado/lugar de reposo. El español debe retener esa tensión semántica y no resolverla prematuramente.
  doctrine_reference: Rut 3:1; cf. el uso de מָנוֹחַ como reposo/seguridad en el léxico hebreo
- issue: Fuerza de la pregunta retórica inicial
  english_pob_reading: '''should I not seek'' introduces a rhetorical question expecting agreement.'
  chosen_spanish_reading: '''¿no buscaré?'' conserva la expectativa de respuesta afirmativa y el impulso de la propuesta de Noemí.'
  alternative_spanish_readings:
  - ¿acaso no buscaré?
  - ¿no debería buscar?
  rationale: El hebreo הֲלֹא no plantea duda real sino una pregunta persuasiva. La versión con futuro retórico suena natural en español y preserva la fuerza pragmática.
  doctrine_reference: Retórica hebrea en preguntas con הֲלֹא
translation_notes:
  revision_awareness: El paquete fuente muestra alta concordancia con la revisión más reciente; no se requieren cambios sustanciales respecto al sentido inglés auditado. La redacción española se ajusta para sonar natural sin perder la metáfora de מָנוֹחַ ni la fuerza retórica de הֲלֹא.
  spanish_consistency_notes:
  - Se mantiene Noemí como forma castellana estándar del nombre propio.
  - Se conserva la metáfora de 'descanso' en lugar de sustituirla por una explicación interpretativa.
  - La pregunta retórica se traduce con un futuro en primera persona para reflejar el tono persuasivo del hebreo.
  - El registro es bíblico contemporáneo y respetuoso, evitando arcaísmos innecesarios.
