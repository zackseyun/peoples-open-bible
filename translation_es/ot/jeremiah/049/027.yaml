translation:
  language: es
  text: Y encenderé un fuego en la muralla de Damasco[a], y consumirá los palacios de Ben-hadad.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O "contra la muralla de Damasco". La preposición puede entenderse con una fuerza espacial ligeramente distinta.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהִצַּתִּי
  english_pob_choice: And I will kindle
  chosen_spanish: Y yo prenderé
  alternatives_spanish:
  - Y yo encenderé
  - Y yo pondré fuego
  lexicon: HALOT
  rationale: El verbo hifil expresa causación directa; en español, 'prenderé' comunica bien la acción de iniciar el fuego y conserva la fuerza profética sin sonar forzado. Se añadió 'yo' para reflejar la primera persona enfática del hebreo.
- source_word: אֵשׁ
  english_pob_choice: a fire
  chosen_spanish: un fuego
  alternatives_spanish:
  - fuego
  - una llama
  lexicon: HALOT
  rationale: El sustantivo singular indefinido se vierte naturalmente como 'un fuego', manteniendo el valor concreto de la imagen sin perder fluidez en español.
- source_word: בְּחוֹמַת
  english_pob_choice: in the wall of
  chosen_spanish: en la muralla de
  alternatives_spanish:
  - contra la muralla de
  - dentro de la muralla de
  lexicon: HALOT
  rationale: '''Muralla'' transmite mejor en español la idea de fortificación urbana que ''muro'' en este contexto. La preposición ''en'' sigue la lectura principal del POB en inglés y deja abierta la misma leve ambigüedad espacial.'
- source_word: דַּמָּשֶׂק
  english_pob_choice: Damascus
  chosen_spanish: Damasco
  alternatives_spanish:
  - Damasco
  lexicon: Nombre propio geográfico estándar
  rationale: Se usa la forma española establecida del topónimo.
- source_word: וְאָכְלָה
  english_pob_choice: and it will consume
  chosen_spanish: y consumirá
  alternatives_spanish:
  - y devorará
  - y se comerá
  lexicon: HALOT
  rationale: El sujeto implícito es 'fuego', que en español admite perfectamente una forma verbal sin pronombre explícito. 'Consumirá' reproduce el matiz de destrucción total con registro natural y sobrio.
- source_word: אַרְמְנוֹת
  english_pob_choice: the palaces
  chosen_spanish: los palacios
  alternatives_spanish:
  - los edificios palaciegos
  - las residencias reales
  lexicon: HALOT
  rationale: '''Palacios'' es la correspondencia directa y clara de אַרְמוֹנוֹת, conservando el contraste de grandeza y destrucción.'
- source_word: בֶּן הֲדָד
  english_pob_choice: Ben-hadad
  chosen_spanish: Ben-hadad
  alternatives_spanish:
  - Ben Hadad
  lexicon: Convención de nombre propio
  rationale: Se conserva la transliteración habitual con guion, siguiendo la forma estable en español bíblico y la decisión auditada del POB en inglés.
theological_decisions:
- issue: Agencia divina directa en el juicio
  english_pob_reading: The first-person verb is rendered directly as God's own action without adding 'the LORD said' or other explicit identifiers.
  chosen_spanish_reading: 'La acción se expresa directamente en primera persona divina: ''yo prenderé'''
  alternative_spanish_readings:
  - '''el Señor prenderá'''
  - '''Y Yahvé prenderá'''
  rationale: El hebreo mantiene la voz directa del hablante profético; por eso el español debe conservar la primera persona sin introducir un sujeto explicativo que no está en el verso. Esto preserva la inmediatez del juicio divino.
  doctrine_reference: Jeremías 49:27; discurso profético directo de Yahvé
translation_notes:
  revision_awareness: 'Se siguió el pasaje auditado en inglés sin cambios de sentido: se conservó la imagen de fuego, la ambigüedad leve de la preposición hebrea y la referencia a Ben-hadad. No se detectaron revisiones posteriores que exigieran ajuste adicional.'
  spanish_consistency_notes:
  - Se usó 'Yahvé' solo cuando el texto lo exigiera explícitamente; aquí la cláusula está en primera persona y no requiere insertar el nombre.
  - '''Muralla'' se eligió por claridad urbana en español, pero la nota preserva la posibilidad alternativa de lectura espacial.'
  - El verbo final se coordinó con el sujeto implícito 'fuego' para que el español sea natural sin alterar el hebreo.
