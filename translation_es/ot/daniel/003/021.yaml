  to: Entonces estos hombres fueron atados con sus pantalones, sus túnicas[a], sus mantos y sus demás vestidos, y fueron arrojados en medio del horno ardiente[b].
  rationale: Se corrige la deixis para alinearla con el source y la auditoría ("estos hombres"), se mueve la nota [a] al segundo término de ropa al que realmente corresponde, se mejora la naturalidad de לְגוֹא con "en medio de", y se refuerza la intensidad de אַתּוּן נוּרָא יָקִדְתָּא con "horno ardiente".
