revisions:
- from: Establecerás jueces y oficiales para ti en todas tus puertas[a], que Yahvé tu Dios te da, según tus tribus[b]; y ellos juzgarán al pueblo con juicio de justicia.
  to: Nombrarás jueces y funcionarios para ti en todas tus puertas[a] que Yahvé tu Dios te da, según tus tribus; y ellos juzgarán al pueblo con juicio justo[b].
  rationale: 'Se revisa el texto para mejorar la fidelidad idiomática al hebreo y la legibilidad en español: ''nombrarás'' expresa mejor la designación oficial; ''funcionarios'' representa de manera más natural el papel administrativo de שֹׁטְרִים; y ''con juicio justo'' traduce מִשְׁפַּט צֶדֶק de forma clara y fiel, mientras la nota conserva alternativas más literales. Se mantiene ''Yahvé'' conforme a la política terminológica del proyecto y se conserva la imagen literal de ''puertas'' con nota cultural.'
