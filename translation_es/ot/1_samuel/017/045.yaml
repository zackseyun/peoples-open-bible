translation:
  language: es
  text: 'Entonces David dijo al filisteo: «Tú vienes a mí con espada, con lanza y con jabalina, pero yo vengo a ti en el nombre de Yahvé de los Ejércitos[a], el Dios de los ejércitos de Israel[b], a quien has desafiado[c]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «Yahvé de las huestes»; tradicionalmente, «el Señor de los Ejércitos» o «el Señor de las huestes».
    reason: lexical_alternative
  - marker: b
    text: O «el Dios de las filas de combate de Israel» o «el Dios de las líneas de batalla de Israel».
    reason: lexical_alternative
  - marker: c
    text: «Desafiado» también puede traducirse «reprochado» o «provocado con burla»; aquí expresa un desafío despectivo contra el Dios de Israel.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמֶר
  english_pob_choice: Then ... said
  chosen_spanish: Entonces ... dijo
  alternatives_spanish:
  - Y ... dijo
  - Así ... dijo
  lexicon: HALOT
  rationale: La waw consecutiva avanza la narración; «Entonces» conserva la secuencia de manera natural en español sin perder el valor discursivo.
- source_word: הַפְּלִשְׁתִּי
  english_pob_choice: the Philistine
  chosen_spanish: el filisteo
  alternatives_spanish:
  - el guerrero filisteo
  lexicon: HALOT
  rationale: El hebreo identifica a Goliat por su filiación/nacionalidad. «El filisteo» es fiel y no añade información no explícita en el verso.
- source_word: בָּא אֵלַי / בָא אֵלֶיךָ
  english_pob_choice: come to me / come to you
  chosen_spanish: vienes contra mí / vengo contra ti
  alternatives_spanish:
  - vienes a mí / vengo a ti
  - te acercas a mí / me acerco a ti
  lexicon: HALOT
  rationale: Aunque el verbo básico es «venir», el contexto es hostil; «contra» explicita la dirección de combate sin abandonar la literalidad funcional del hebreo.
- source_word: בְּחֶרֶב
  english_pob_choice: with a sword
  chosen_spanish: con espada
  alternatives_spanish:
  - con una espada
  lexicon: HALOT
  rationale: «Con espada» es idiomático y mantiene el sentido instrumental de la preposición ב.
- source_word: וּבַחֲנִית
  english_pob_choice: with a spear
  chosen_spanish: con lanza
  alternatives_spanish:
  - con una lanza
  - con una pica
  lexicon: HALOT
  rationale: חֲנִית puede ser lanza o pica; «lanza» comunica bien el arma en español y se mantiene dentro del campo semántico del texto.
- source_word: וּבְכִידוֹן
  english_pob_choice: with a javelin
  chosen_spanish: con jabalina
  alternatives_spanish:
  - con dardo
  - con lanza arrojadiza
  lexicon: HALOT
  rationale: כִּידוֹן designa un arma de arrojamiento o lanza más ligera; «jabalina» distingue esa clase de arma de חֲנִית y suena natural en español moderno.
- source_word: בְּשֵׁם
  english_pob_choice: in the name of
  chosen_spanish: en el nombre de
  alternatives_spanish:
  - por el nombre de
  - bajo la autoridad de
  lexicon: HALOT
  rationale: La expresión bíblica estándar conserva mejor la idea de representación y autoridad que una paráfrasis directa.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  lexicon: HALOT
  rationale: Se usa «Yahvé» conforme al estándar español del proyecto para el Tetragrámaton, preservando el nombre propio divino en vez de sustituirlo por un título.
- source_word: צְבָאוֹת
  english_pob_choice: of Armies
  chosen_spanish: de los Ejércitos
  alternatives_spanish:
  - de los ejércitos
  - de las huestes
  lexicon: HALOT
  rationale: צְבָאוֹת alude a ejércitos/huestes; «de los Ejércitos» conserva la mayúscula reverencial y refleja el título divino de modo transparente para lectores hispanohablantes.
- source_word: אֱלֹהֵי מַעַרְכֹות יִשְׂרָאֵל
  english_pob_choice: the God of the armies of Israel
  chosen_spanish: el Dios de los ejércitos de Israel
  alternatives_spanish:
  - el Dios de las filas de combate de Israel
  - el Dios de los escuadrones de Israel
  lexicon: HALOT
  rationale: מַעַרְכֹות se refiere a formaciones o líneas de batalla; «ejércitos» sigue la lectura del POB en inglés y funciona naturalmente en español, aunque «filas de combate» conserva mejor el matiz de disposición militar.
- source_word: אֲשֶׁר חֵרַפְתָּ
  english_pob_choice: whom you have defied
  chosen_spanish: a quien has desafiado
  alternatives_spanish:
  - a quien has desafiado con desprecio
  - a quien has vilipendiado
  lexicon: HALOT
  rationale: חרף aquí implica un desafío despectivo, no solo insulto verbal. «Desafiado» comunica el enfrentamiento; la nota explica que el verbo lleva también un matiz de desprecio.
theological_decisions:
- issue: Renderización del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  rationale: El verso usa explícitamente el Tetragrámaton. La forma «Yahvé» mantiene el nombre personal de Dios en español, en línea con la práctica del proyecto, sin sustituirlo por un título impersonal.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Título יְהוָה צְבָאוֹת
  english_pob_reading: Yahweh of Armies
  chosen_spanish_reading: Yahvé de los Ejércitos
  alternative_spanish_readings:
  - Yahvé de las huestes
  - Yahvé de los ejércitos
  rationale: El título expresa soberanía y poder militar. «De los Ejércitos» preserva ese valor de forma clara en español y evita la sustitución tradicional «de los ejércitos» como mero giro litúrgico sin aclaración.
  doctrine_reference: DOCTRINE.md Translation philosophy §§1, 6
- issue: אֱלֹהֵי מַעַרְכֹות יִשְׂרָאֵל
  english_pob_reading: the God of the armies of Israel
  chosen_spanish_reading: el Dios de los ejércitos de Israel
  alternative_spanish_readings:
  - el Dios de las filas de combate de Israel
  - el Dios de las líneas de batalla de Israel
  rationale: La frase hebrea puede evocar tropas organizadas o líneas de batalla. «Ejércitos» mantiene la fuerza militar de la expresión y armoniza con el audit trail inglés, sin ocultar la metáfora bélica.
  doctrine_reference: DOCTRINE.md Translation philosophy §§2, 5
translation_notes:
  revision_awareness: El borrador sigue la última revisión inglesa que prefirió «the armies of Israel» sobre «the ranks of Israel». En español se optó por «los ejércitos de Israel» para reflejar ese ajuste y mantener una formulación natural, solemne y consistente con el registro bíblico del verso.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» para יְהוָה en todo el texto, conforme al estándar del proyecto.
  - Se usa «Ejércitos» con mayúscula para el título divino y «ejércitos» en minúscula para Israel.
  - «Jabalina» diferencia claramente כִּידוֹן de «lanza» y evita la repetición mecánica.
  - La nota sobre חרף conserva la tensión semántica entre insulto, reproche y desafío sin diluir el sentido central del contexto bélico y teológico.
