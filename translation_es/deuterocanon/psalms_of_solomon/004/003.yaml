translation:
  language: es
  text: Y su mano está entre las primeras contra él[a], como si actuara con celo[b], pero él mismo es culpable de una variedad de actos pecaminosos[c][d], en actos de desenfreno.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «su mano está al principio sobre él», tomando ἐν πρώτοις como referencia temporal y no como prioridad entre acusadores.'
    reason: alternative_reading
  - marker: b
    text: 'O: «como en celo»; la frase puede describir un celo aparente o una postura alegada de celo.'
    reason: lexical_alternative
  - marker: c
    text: 'O: «de una variedad de cosas pecaminosas»; el griego es condensado y permite entender ἁμαρτωλῶν como un sustantivo neutro plural de cosas o actos pecaminosos.'
    reason: alternative_reading
  - marker: d
    text: 'También posible: «en las diversas maneras de pecadores», si se toma ἁμαρτωλῶν como genitivo masculino plural.'
    reason: lexical_alternative
lexical_decisions:
- source_word: χείρ
  english_pob_choice: hand
  chosen_spanish: mano
  alternatives_spanish:
  - mano
  - brazo
  - poder
  lexicon: BDAG
  rationale: Se conserva la imagen corporal concreta del griego, que en este contexto expresa acción hostil contra una persona.
- source_word: ἐν πρώτοις
  english_pob_choice: among the first
  chosen_spanish: estuvo primero
  alternatives_spanish:
  - entre los primeros
  - al principio
  - primero
  lexicon: LSJ
  rationale: En español, la idea de prioridad en la acción se expresa de forma más natural con una construcción adverbial temporal que mantiene la ambigüedad entre prioridad y prontitud.
- source_word: ἐπʼ αὐτόν
  english_pob_choice: against him
  chosen_spanish: contra él
  alternatives_spanish:
  - sobre él
  - contra él
  lexicon: BDAG
  rationale: Con 'mano', la relación es adversativa; 'contra él' comunica mejor el valor idiomático que un calco como 'sobre él'.
- source_word: ὡς ἐν ζήλει
  english_pob_choice: as if in zeal
  chosen_spanish: como si fuera por celo
  alternatives_spanish:
  - como en celo
  - como si fuera celoso
  lexicon: BDAG
  rationale: '''Como si fuera por celo'' conserva la posible apariencia o pretensión de celo, sin afirmar que el celo sea necesariamente genuino.'
- source_word: ἔνοχος
  english_pob_choice: guilty
  chosen_spanish: culpable
  alternatives_spanish:
  - culpable
  - reo
  - responsable
  lexicon: BDAG
  rationale: '''Culpable'' es el término judicial más claro en español y refleja el tono acusatorio del pasaje.'
- source_word: ποικιλίᾳ
  english_pob_choice: a variety of
  chosen_spanish: una variedad de
  alternatives_spanish:
  - diversidad de
  - múltiples
  lexicon: LSJ
  rationale: '''Una variedad de'' es natural en español y conserva la multiplicidad expresada por el griego sin volverlo rígido o arcaico.'
- source_word: ἁμαρτωλῶν
  english_pob_choice: sinful deeds
  chosen_spanish: actos pecaminosos
  alternatives_spanish:
  - obras pecaminosas
  - hechos pecaminosos
  - cosas pecaminosas
  lexicon: BDAG
  rationale: 'Se sigue la revisión que entiende el sustantivo en sentido neutro/substantivado: no ''de pecadores'', sino de cosas o actos pecaminosos, lo que encaja con el paralelismo con las ''actos de desenfreno''.'
- source_word: ἀκρασίαις
  english_pob_choice: acts of self-indulgence
  chosen_spanish: actos de desenfreno
  alternatives_spanish:
  - actos de intemperancia
  - falta de dominio propio
  - excesos
  lexicon: BDAG
  rationale: '''Desenfreno'' comunica la idea de falta de autocontrol y exceso moral en un español natural y digno.'
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión aplicada que favorece entender ἁμαρτωλῶν como un neutro plural substantivado (cosas/actos pecaminosos) en paralelo con ἀκρασίαις. La redacción española evita la lectura 'de pecadores' en el texto principal, pero preserva la alternativa en nota por la tensión gramatical señalada en el audit trail.
  spanish_consistency_notes:
  - Se usó 'Yahvé' no porque aparezca explícitamente aquí, sino como norma del proyecto; este verso no contiene el tetragrámaton ni κύριος.
  - Se prefirió 'celo' sobre 'celoso' para conservar el sustantivo del griego y la ambigüedad de sinceridad o apariencia.
  - '''Actos pecaminosos'' mantiene el paralelismo con ''actos de desenfreno'' y refleja la lectura neutra revisada de ἁμαρτωλῶν.'
  - Se evitó 'siervo' u otra terminología no pertinente al verso.
  - La puntuación separa las dos cláusulas principales y mantiene el tono acusatorio del griego.
