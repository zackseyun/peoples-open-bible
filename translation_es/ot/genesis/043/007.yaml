base_translation:
  language: en
  yaml_path: translation/ot/genesis/043/007.yaml
  text: They said[a], “The man questioned us closely about ourselves and our family, saying, ‘Is your father still alive? Do you have another brother?’ So we told him according to these words. Could we possibly know that he would say, ‘Bring your brother down’?”
  footnotes:
