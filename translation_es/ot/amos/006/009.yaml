review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura y el sentido del hebreo: una situación futura/condicional, ''diez hombres'', el referente espacial concreto ''en una casa'', y el resultado ''morirán''. Sin embargo, la nota al pie está defectuosa porque repite la misma opción (''quedan'' ... ''quedan'') y no preserva correctamente la alternativa léxica documentada en el POB inglés (''are left'' / ''remain'').'
  spanish_quality_summary: El español principal es claro y legible. 'Y sucederá que, si diez hombres quedan en una sola casa, morirán' es comprensible, aunque 'quedan' puede sonar un poco menos natural que 'quedan con vida' o 'quedan' en ciertos contextos; aun así, se mantiene dentro de una equivalencia aceptable y no requiere cambio. El problema real está en la nota, que resulta incoherente e inútil para el lector.
  glossary_alignment: No hay términos de glosario sensibles en este versículo. 'Hombres' respeta עֲשָׂרָה אֲנָשִׁים. 'Casa' preserva el sentido concreto de בַּיִת. No hay conflicto con los defaults del proyecto.
  issues:
  - severity: medium
    issue: 'La nota al pie repite la misma palabra en ambas opciones: «quedan» en lugar de «quedan».'
    rationale: La nota no comunica ninguna alternativa real y no preserva la decisión léxica auditada en inglés, donde la alternativa es 'are left' frente a 'remain'. Debe corregirse para ofrecer una opción española significativa, como 'son dejados' o mejor 'son dejados allí' / 'son dejados', aunque algo más natural es 'son dejados' como equivalencia formal.
  revised_spanish_text: Y sucederá que, si diez hombres quedan[a] en una sola casa, morirán.
  revised_footnotes:
  - marker: a
    text: O, «son dejados» en lugar de «quedan». El verbo hebreo denota ser dejado o quedar después de que otros han desaparecido.
    reason: lexical_alternative
  revision_rationale: Se conserva el texto principal porque es fiel y legible. Solo se corrige la nota al pie para que exprese una alternativa léxica real y coherente con la evidencia fuente y la auditoría inglesa.
