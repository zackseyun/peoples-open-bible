    issue: 'Construcción poco natural: «las palabras de los profetas, a una voz, son favorables al rey»'
    rationale: Aunque entendible, en español suena forzada porque «a una voz» modifica mejor un acto de hablar que un predicado estático con «ser». Una reformulación leve mejora legibilidad sin perder la imagen idiomática.
  - severity: low
    issue: Uso de «le habló» en vez de «te habló» dentro del discurso narrativo inmediato
    rationale: Con «Micaías» ya introducido como referente y siendo el objeto directo de la escena, «te habló» puede sonar más directo en español. Sin embargo, no es un error grave; la mejora principal es estilística.
