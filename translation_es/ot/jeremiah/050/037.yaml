translation:
  language: es
  text: Una espada contra sus caballos y contra sus carros, y contra toda la población mezclada[a] que está en medio de ella, y se convertirán en mujeres[b]. Una espada contra sus tesorerías, y serán saqueadas.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «todos los mercenarios extranjeros» o «toda la multitud mezclada». El hebreo probablemente se refiere a una población mixta o a fuerzas auxiliares dentro de Babilonia.'
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: «y se convertirán en mujeres», un modismo antiguo para volverse temerosos o perder el valor en la batalla.'
    reason: cultural_note
lexical_decisions:
- source_word: חֶרֶב
  english_pob_choice: A sword against
  chosen_spanish: Una espada contra
  alternatives_spanish:
  - La espada contra
  - Espada contra
  lexicon: HALOT
  rationale: En español, como en el inglés POB, la expresión funciona de manera elíptica como anuncio profético de ataque. 'Contra' conserva la fuerza de juicio militar sin añadir verbos interpretativos innecesarios.
- source_word: סוּסָיו
  english_pob_choice: his horses
  chosen_spanish: sus caballos
  alternatives_spanish:
  - sus corceles
  lexicon: HALOT
  rationale: El sufijo de 3ms se refleja con 'sus'. 'Caballos' es el equivalente más directo y natural para el contexto bélico.
- source_word: רִכְבּוֹ
  english_pob_choice: his chariots
  chosen_spanish: sus carros
  alternatives_spanish:
  - su carro de guerra
  - su carruaje de guerra
  lexicon: HALOT
  rationale: '''Carros'' transmite bien el vehículo militar en español bíblico sin sobrecargar el texto. Mantiene la colectividad militar del singular hebreo.'
- source_word: כָּל הָעֶרֶב
  english_pob_choice: all the mixed people
  chosen_spanish: toda la población mezclada
  alternatives_spanish:
  - toda la multitud mezclada
  - todos los extranjeros mezclados
  lexicon: HALOT
  rationale: '''Población mezclada'' preserva el valor léxico de עֶרֶב sin fijarlo demasiado a ''mercenarios'', que sería más interpretativo. En español evita una expresión demasiado técnica y mantiene la tensión semántica documentada.'
- source_word: בְּתוֹכָהּ
  english_pob_choice: in her midst
  chosen_spanish: que está en medio de ella
  alternatives_spanish:
  - en medio de ella
  - dentro de ella
  lexicon: HALOT
  rationale: La referencia femenina a Babilonia se mantiene con 'ella'. 'Que está en medio de ella' suena natural en español y conserva la imagen de una población ubicada dentro de la ciudad/personificación.
- source_word: וְהָיוּ לְנָשִׁים
  english_pob_choice: and they will become women
  chosen_spanish: y se convertirán en mujeres
  alternatives_spanish:
  - y serán como mujeres
  - y se volverán cobardes
  lexicon: HALOT
  rationale: Se conserva la formulación explícita del hebreo, como hace el POB inglés, para no borrar la tensión idiomática. En español, 'se convertirán en mujeres' mantiene el dato textual; la nota explica el sentido idiomático antiguo sin introducirlo en el cuerpo principal.
- source_word: אוֹצְרֹתֶיהָ
  english_pob_choice: her treasuries
  chosen_spanish: sus tesoros
  alternatives_spanish:
  - sus depósitos
  - sus almacenes de riqueza
  lexicon: HALOT
  rationale: Aunque el inglés POB usa 'treasuries', en español 'tesoros' comunica mejor el contenido de riqueza resguardada y evita un término demasiado administrativo. El plural y la posesión se conservan.
- source_word: וּבֻזָּזוּ
  english_pob_choice: and they will be plundered
  chosen_spanish: y serán saqueados
  alternatives_spanish:
  - y serán despojados
  - y serán plenos de botín
  lexicon: HALOT
  rationale: '''Saqueados'' corresponde bien al pasivo de despojo en contexto de guerra y suena natural en español moderno. Mantiene la relación directa con los ''tesoros''.'
theological_decisions:
- issue: Tratamiento del idiomático לְנָשִׁים en un oráculo de guerra
  english_pob_reading: and they will become women
  chosen_spanish_reading: y se convertirán en mujeres
  alternative_spanish_readings:
  - y serán como mujeres
  - y se volverán cobardes
  rationale: Se preserva la wording explícita del hebreo y del POB inglés para no neutralizar el tropo de género presente en el texto. La aclaración interpretativa queda para la nota, no para el cuerpo del versículo, siguiendo el principio de mantener la tensión textual.
  doctrine_reference: DOCTRINE.md Translation philosophy §3 (Preserve theological tension rather than resolve it) y §4 (Gender-accurate over gender-neutral)
- issue: Personificación femenina de Babilonia en los sufijos pronominales
  english_pob_reading: in her midst / her treasuries
  chosen_spanish_reading: en medio de ella / sus tesoros
  alternative_spanish_readings:
  - en medio de ella / sus almacenes
  - dentro de ella / sus tesoros
  rationale: La personificación de Babilonia como femenina se refleja mediante 'ella' y 'sus'. Esto conserva la cohesión del pasaje y evita convertirlo en una referencia neutra que borre el rasgo literario del original.
  doctrine_reference: DOCTRINE.md Translation philosophy §2 (Source transparency)
translation_notes:
  revision_awareness: El borrador sigue de cerca el paquete fuente hebreo y la línea de decisión del POB inglés. Se corrigió la validación anterior incorporando los marcadores [a] y [b] directamente en el texto español en los puntos correspondientes.
  spanish_consistency_notes:
  - Se mantuvo 'sus' para los sufijos de 3ms femeninos referidos a Babilonia personificada.
  - Se evitó 'SEÑOR' o 'Cristo' porque no aparecen en este versículo.
  - Se usó 'saqueados' para el pasivo final, coherente con el contexto bélico.
  - Se evitó sobreinterpretar עֶרֶב como 'mercenarios' en el texto principal, dejando la alternativa en nota.
