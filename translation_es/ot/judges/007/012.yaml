revisions:
- from: Ahora Madián y Amalec y todos los hijos de oriente estaban tendidos[a] en el valle, como langostas en multitud, y sus camellos eran innumerables[b], como la arena que está a la orilla del mar, en abundancia.
  to: Ahora Madián y Amalec y toda la gente de oriente[a] estaban tendidos[b] en el valle, tan numerosos como langostas, y sus camellos eran innumerables[c], como la arena que está a la orilla del mar, en abundancia.
  rationale: Se ajusta בְּנֵי קֶדֶם a una expresión colectiva natural y alineada con la decisión POB ('la gente de oriente'), conservando la alternativa literal en nota. Se corrige la ubicación de la nota sobre נֹפְלִים para anclarla al verbo correspondiente. También se suaviza el símil de las langostas a una formulación más idiomática en español sin cambiar el sentido.
