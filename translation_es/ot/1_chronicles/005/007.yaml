revisions:
- from: 'Y sus hermanos, por sus clanes[a], en la genealogía de sus generaciones: el jefe era Jeiel, y Zacarías.'
  to: 'Y sus hermanos, por sus clanes[a], en el registro genealógico de sus generaciones: el jefe era Jeiel, y Zacarías.'
  rationale: Se conserva plenamente el sentido del hebreo y del POB inglés, pero se mejora la naturalidad del español al explicitar el valor documental de בְּהִתְיַחֵשׂ como «registro genealógico». La nota alternativa se rehace para evitar una expresión redundante y poco fluida, manteniendo la opción verbal de inscripción genealógica ya documentada en el audit trail inglés.
