translation:
  language: es
  text: 'Entonces Jonatán entregó sus armas[a] al joven que estaba con él y le dijo: «Ve, llévalas[b] a la ciudad».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El hebreo «sus armas» también puede significar de manera más amplia «su equipo» o «sus implementos»; aquí el contexto favorece «armas».
    reason: lexical_alternative
  - marker: b
    text: El objeto de «llévalas» está implícito en hebreo y se entiende por el contexto como las armas o el equipo de Jonatán.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּתֵּן
  english_pob_choice: gave
  chosen_spanish: entregó
  alternatives_spanish:
  - dio
  - pasó
  lexicon: HALOT
  rationale: נתן en narrativa puede ser 'dar' o 'entregar'. En español, 'entregó' transmite con naturalidad el acto de poner algo en manos de otro y conserva el valor narrativo sin exagerar.
- source_word: יְהוֹנָתָן
  english_pob_choice: Jonathan
  chosen_spanish: Jonatán
  alternatives_spanish:
  - Jonathan
  lexicon: convención bíblica española
  rationale: Se usa la forma española establecida para el nombre propio, manteniendo la identificación clara y la lectura natural.
- source_word: כֵּלָיו
  english_pob_choice: his weapons
  chosen_spanish: sus armas
  alternatives_spanish:
  - su equipo
  - sus utensilios
  - sus implementos
  lexicon: HALOT
  rationale: כְּלִי puede abarcar implementos, equipo o armas. Por el contexto inmediato de arco y flechas, 'armas' comunica mejor la referencia concreta que la escena sugiere, sin perder el valor colectivo del plural.
- source_word: הַנַּעַר אֲשֶׁר לוֹ
  english_pob_choice: the young man who was with him
  chosen_spanish: el joven que estaba con él
  alternatives_spanish:
  - el muchacho que estaba con él
  - su criado joven
  - el joven que le pertenecía
  lexicon: HALOT
  rationale: נַעַר indica un joven/ayudante; אֲשֶׁר לוֹ admite la relación de pertenencia o cercanía. 'Que estaba con él' sigue la revisión inglesa más natural y evita forzar un matiz de posesión que en español sonaría demasiado duro o ambiguo.
- source_word: וַיֹּאמֶר לוֹ
  english_pob_choice: and said to him
  chosen_spanish: y le dijo
  alternatives_spanish:
  - y le habló
  - y le ordenó
  lexicon: HALOT
  rationale: אָמַר es el verbo común 'decir'; 'le dijo' es la opción directa y fiel.
- source_word: לֵךְ
  english_pob_choice: Go
  chosen_spanish: Ve
  alternatives_spanish:
  - Vete
  - Anda
  lexicon: HALOT
  rationale: Imperativo de הלך. 'Ve' es la forma más neutra y estándar en español bíblico moderno.
- source_word: הָבֵיא
  english_pob_choice: bring them
  chosen_spanish: lleva
  alternatives_spanish:
  - tráelos
  - llévalas
  lexicon: HALOT
  rationale: El hebreo pide un movimiento de traer/llevar el objeto implícito. En español, para evitar añadir un pronombre inferido que el texto no explicita, se opta por 'lleva' en continuidad con el mandato a la ciudad; el objeto sigue implícito como en el hebreo.
- source_word: הָעִיר
  english_pob_choice: the city
  chosen_spanish: a la ciudad
  alternatives_spanish:
  - a la ciudadela
  - a la villa
  - a la población
  lexicon: HALOT
  rationale: עִיר se traduce de forma directa como 'ciudad'. El artículo definido se conserva en español y la preposición 'a' corresponde al movimiento indicado por el verbo.
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión inglesa que prefirió 'who was with him' sobre una lectura más posesiva de אֲשֶׁר לוֹ, y el ajuste que mantiene 'weapons' y el objeto implícito de 'bring'. La versión española refleja esa misma preferencia por una relación de compañía/cercanía antes que una posesión rígida.
  spanish_consistency_notes:
  - Se conservó Jonatán como forma española estándar del nombre.
  - '''Armas'' se eligió por el contexto bélico inmediato y por la serie arco/flechas implícita en el relato.'
  - No se tradujo mecánicamente el posesivo de אֲשֶׁר לוֹ como pertenencia fuerte; se optó por una relación de acompañamiento natural en español.
  - Se mantuvo el objeto de 'lleva' implícito para respetar la economía del hebreo.
