revisions:
- from: Y aconteció que, cuando nuestros enemigos oyeron que se nos había hecho saber[a], y que Dios había frustrado su plan[b], todos nosotros volvimos a la muralla[c], cada uno a su trabajo.
  to: Y aconteció que, cuando nuestros enemigos oyeron que se había sabido entre nosotros[a], y que Dios había frustrado su plan[b], todos nosotros volvimos a la muralla, cada hombre a su trabajo[c].
  rationale: La revisión corrige el valor de נוֹדַע לָנוּ para evitar un causativo innecesario y alinea la expresión distributiva אִישׁ con la decisión documentada del POB de conservar el masculino representativo. Se mantiene «muralla» como una buena adaptación contextual de הַחוֹמָה y se preserva la atribución directa a Dios.
