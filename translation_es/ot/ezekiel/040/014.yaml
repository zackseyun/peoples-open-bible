  - severity: medium
    issue: הֶחָצֵר fue traducido como 'la corte'
    rationale: En español bíblico contemporáneo 'corte' suele evocar corte real o judicial. Para el recinto del templo, 'atrio' es más natural y preciso.
  - severity: low
    issue: Falta la nota de lectura alternativa presente en el inglés POB
    rationale: El inglés conserva una nota importante sobre la oscuridad sintáctica de toda la segunda cláusula, no solo una alternativa léxica para 'jambs'. Esa información también beneficia al lector español.
