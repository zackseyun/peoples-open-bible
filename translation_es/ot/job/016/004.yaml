  text: גַּ֤ם אָנֹכִי֮ כָּ/כֶ֪ם אֲדַ֫בֵּ֥רָה ל֤וּ יֵ֪שׁ נַפְשְׁ/כֶ֡ם תַּ֤חַת נַפְשִׁ֗/י אַחְבִּ֣ירָה עֲלֵי/כֶ֣ם בְּ/מִלִּ֑ים וְ/אָנִ֥יעָה עֲ֝לֵי/כֶ֗ם בְּמ֣וֹ רֹאשִֽׁ/י׀־׃
base_translation:
  language: en
  yaml_path: translation/ot/job/016/004.yaml
  text: I too could speak like you[a], if your soul were in place of my soul[c][b]; I could heap up words against you and shake my head at you.
  footnotes:
  - marker: a
    text: Or 'your life were in place of my life.' The Hebrew noun נֶפֶשׁ can denote soul, life, self, or person depending on context.
    reason: lexical_alternative
  - marker: b
    text: Or 'I could heap up words against you.' The Hebrew verb may suggest joining, stringing together, or piling up words.
    reason: lexical_alternative
  - marker: c
    text: '''Shake my head'' is a gesture of scorn or derision in this context.'
    reason: cultural_note
