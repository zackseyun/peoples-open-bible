    text: Or 'And among these'; the conjunction can be rendered simply as 'and,' but here it likely carries a contrast with the previous verse.
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'the sons of Israel,' a traditional familial designation for Israel.
    reason: lexical_alternative
