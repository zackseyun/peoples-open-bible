review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura y el sentido del hebreo: lamento exclamativo, imagen de cubrir con nube, descenso desde el cielo a la tierra, y la ambigüedad de «su estrado/escabel». Conserva adecuadamente la referencia indefinida de תִּפְאֶרֶת יִשְׂרָאֵל y no resuelve de forma interpretativa «su footstool».'
  spanish_quality_summary: El español es generalmente claro y digno, pero requiere ajustes menores para mayor fidelidad y legibilidad eclesial amplia. «Sion» debería ajustarse al estándar ortográfico actual «Sión». Además, «el Señor» para אֲדֹנָי no sigue el patrón del proyecto de usar «Yahvé» solo para יהוה; aquí corresponde conservar el título divino, pero en español bíblico «el Señor» es aceptable. Sin embargo, «su estrado» suena menos preciso que «su escabel», que es la equivalencia bíblica más reconocible para הֲדֹם y mantiene mejor la imagen del estrado de los pies. También conviene reordenar la puntuación inicial para que la exclamación abarque todo el hemistiquio con mayor naturalidad.
  glossary_alignment: No hay conflicto con los defaults principales, porque el término fuente es אֲדֹנָי, no יהוה. «Mesías/Cristo», «esclavo», etc., no aplican aquí. Se recomienda «Sión» por uso estándar en español y «escabel» para הֲדֹם como mejor equivalente tradicional y preciso.
  issues:
  - severity: medium
    issue: Uso de «Sion» en lugar de «Sión»
    rationale: La forma con tilde es la ortografía estándar en español actual y mejora la legibilidad y naturalidad sin alterar el sentido.
  - severity: medium
    issue: «su estrado» para הֲדֹם רַגְלָיו
    rationale: Aunque posible, «estrado» puede sugerir una tarima o plataforma y no evoca con suficiente precisión un apoyapiés real. «Escabel» es más exacto para «footstool» y es término bíblico reconocible.
  - severity: low
    issue: Ubicación de la nota [a] y cierre de la exclamación
    rationale: La exclamación fluye mejor si abarca la primera cláusula completa y la nota se ancla directamente en el verbo clave, no al final de «Sión».
