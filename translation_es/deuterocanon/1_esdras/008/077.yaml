translation:
  language: es
  text: de nuestro Señor[a]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El texto griego suministrado para este versículo es solo el fragmento «ὑπὸ τοῦ κυρίου ἡμῶν» ('de nuestro Señor'). El texto hebreo paralelo provisto no se alinea directamente con esta frase, así que aquí no se reconstruye una oración más amplia.
    reason: textual_variant
lexical_decisions:
- source_word: ὑπό
  english_pob_choice: from
  chosen_spanish: de parte de
  alternatives_spanish:
  - de
  - por
  - bajo
  lexicon: BDAG
  rationale: En este fragmento con genitivo, ὑπό puede expresar agencia u origen. Como el inglés POB optó por 'from' para una cláusula suelta y cauta, en español 'de parte de' conserva mejor la idea de procedencia/agencia sin imponer una reconstrucción más amplia.
- source_word: τοῦ κυρίου
  english_pob_choice: our Lord
  chosen_spanish: nuestro Señor
  alternatives_spanish:
  - el Señor
  - nuestro amo
  lexicon: BDAG
  rationale: κύριος se traduce con el valor reverencial 'Señor' según el uso del proyecto. El posesivo ἡμῶν se mantiene explícitamente como 'nuestro', como en el audit trail inglés.
- source_word: ἡμῶν
  english_pob_choice: our
  chosen_spanish: nuestro
  alternatives_spanish:
  - de nosotros
  lexicon: BDAG
  rationale: Pronombre posesivo de primera persona plural; en español se integra naturalmente con 'Señor' como 'nuestro Señor'.
theological_decisions:
- issue: Renderizado de κύριος en un fragmento aislado
  english_pob_reading: Lord
  chosen_spanish_reading: Señor
  alternative_spanish_readings:
  - amo
  - maestro
  rationale: Se conserva el valor confesional estándar de κύριος como 'Señor'. No hay base en el fragmento para desviarse hacia 'amo' o 'maestro'.
  doctrine_reference: 'DOCTRINE.md Contested terms: κύριος → Lord'
- issue: Manejo de la evidencia fragmentaria y del desajuste textual
  english_pob_reading: Translate the extant Greek clause fragment conservatively as a standalone phrase
  chosen_spanish_reading: Traducir solo la frase griega atestiguada, sin reconstrucción
  alternative_spanish_readings:
  - reconstruir una oración más amplia a partir del paralelo hebreo
  - suavizar la fragmentación omitiendo el matiz de origen/agencia
  rationale: El testimonio griego disponible es solo un fragmento breve y el paralelo hebreo no corresponde directamente. Por transparencia textual, el español conserva esa pequeñez y no introduce material no atestiguado.
  doctrine_reference: 'PHILOSOPHY.md: original-language primacy; transparency about source uncertainty'
translation_notes:
  revision_awareness: 'Se siguió el mismo criterio conservador del audit trail inglés: traducir únicamente el fragmento griego extante, sin intentar completar el versículo a partir del paralelo hebreo, y mantener visible la incertidumbre textual mediante nota.'
  spanish_consistency_notes:
  - Se mantuvo 'Señor' para κύριος conforme al estándar del proyecto.
  - La frase 'de parte de' busca reflejar la relación de ὑπό con genitivo sin forzar una reconstrucción sintáctica.
  - Se conservó el poseedor explícito 'nuestro' para ἡμῶν.
