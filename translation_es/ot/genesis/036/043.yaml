translation:
  language: es
  text: Jefe[a] Magdiel, jefe Iram. Estos son los jefes de Edom según sus asentamientos en la tierra de su posesión[b]. Este es Esaú, el padre de Edom[c][d].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'jefes de clan de Edom'. El término hebreo puede denotar dirigentes tribales o de clan.
    reason: lexical_alternative
  - marker: b
    text: O 'en la tierra que poseían'.
    reason: lexical_alternative
  - marker: c
    text: Es decir, Esaú fue el antepasado de los edomitas.
    reason: cultural_note
  - marker: d
    text: O 'Él es Esaú'.
    reason: alternative_reading
lexical_decisions:
- source_word: אַלּוּף
  english_pob_choice: chief
  chosen_spanish: jefe
  alternatives_spanish:
  - caudillo
  - jefe de clan
  - líder
  lexicon: HALOT
  rationale: En Génesis 36 el término designa a los jefes nombrados de Edom. 'Jefe' es natural en español, conserva el valor de liderazgo y evita un calco demasiado arcaico o una ampliación excesiva.
- source_word: מַגְדִּיאֵל
  english_pob_choice: Magdiel
  chosen_spanish: Magdiel
  alternatives_spanish:
  - —
  lexicon: Nombre propio
  rationale: Nombre propio transliterado de forma directa, sin adaptación innecesaria.
- source_word: עִירָם
  english_pob_choice: Iram
  chosen_spanish: Iram
  alternatives_spanish:
  - —
  lexicon: Nombre propio
  rationale: Nombre propio transliterado de forma directa.
- source_word: אֵלֶּה
  english_pob_choice: These are
  chosen_spanish: Estos son
  alternatives_spanish:
  - Estos eran
  lexicon: HALOT
  rationale: La deíxis plural introduce una conclusión resumidora de la lista. En español, 'Estos son' suena natural y mantiene la función identificadora del hebreo.
- source_word: אַלּוּפֵי אֱדֹם
  english_pob_choice: the chiefs of Edom
  chosen_spanish: los jefes de Edom
  alternatives_spanish:
  - los jefes de clan de Edom
  - los caudillos de Edom
  lexicon: HALOT
  rationale: Se mantiene la repetición de 'jefes' para conservar consistencia con el singular אַלּוּף. 'Jefes de clan' explicita el matiz, pero añade interpretación; 'jefes de Edom' conserva la formulación resumidora del texto.
- source_word: לְמֹשְׁבֹתָם
  english_pob_choice: according to their settlements
  chosen_spanish: según sus moradas
  alternatives_spanish:
  - según sus asentamientos
  - de acuerdo con sus lugares de habitación
  lexicon: HALOT
  rationale: La ל prefijada aquí expresa clasificación/ordenamiento, no movimiento. 'Moradas' recoge el sentido de residencia habitual y permite una frase breve y digna en español.
- source_word: בְּאֶרֶץ אֲחֻזָּתָם
  english_pob_choice: in the land of their possession
  chosen_spanish: en la tierra de su posesión
  alternatives_spanish:
  - en la tierra que poseían
  - en la tierra de su patrimonio
  lexicon: HALOT
  rationale: '''Aḥuzzá'' denota posesión o propiedad territorial. ''Tierra de su posesión'' preserva la construcción nominal y el tono formal del hebreo, mientras que la alternativa verbaliza el sentido.'
- source_word: הוּא עֵשָׂו
  english_pob_choice: This is Esau
  chosen_spanish: Este es Esaú
  alternatives_spanish:
  - Él es Esaú
  - Ese es Esaú
  lexicon: HALOT
  rationale: Se conserva la función de identificación conclusiva. 'Este es' evita la posible ambigüedad de 'Él es' y refleja bien el valor resumidor del pronombre hebreo.
- source_word: אֲבִי אֱדֹם
  english_pob_choice: the father of Edom
  chosen_spanish: el padre de Edom
  alternatives_spanish:
  - el antepasado de Edom
  lexicon: HALOT
  rationale: '''Padre'' mantiene el modismo genealógico del hebreo y reproduce la relación de Esaú como progenitor de Edom. ''Antepasado'' explicita la idea, pero suaviza el idiomatismo del original.'
theological_decisions:
- issue: Esaú como progenitor de Edom
  english_pob_reading: the father of Edom
  chosen_spanish_reading: el padre de Edom
  alternative_spanish_readings:
  - el antepasado de Edom
  rationale: La frase es genealógica y étnica, no una afirmación doctrinal adicional. Mantener 'padre' conserva el idioma hebreo y el cierre identitario del versículo, sin borrar que se trata del antecesor de los edomitas.
  doctrine_reference: Genealogía/etnografía bíblica; relación patriarcal de origen
translation_notes:
  revision_awareness: 'El inglés auditado fue afinado para claridad en la identificación final: ''This is Esau'' reemplazó una formulación más ambigua. El español sigue esa decisión con ''Este es Esaú'' y conserva el cierre genealógico ''el padre de Edom''.'
  spanish_consistency_notes:
  - Se mantiene 'jefe' para אַלּוּף para conservar uniformidad terminológica dentro del pasaje.
  - '''Moradas'' traduce el valor clasificatorio de לְמֹשְׁבֹתָם sin convertirlo en una paráfrasis extensa.'
  - '''Tierra de su posesión'' respeta la construcción nominal hebrea y la continuidad del registro formal.'
  - La nota sobre 'padre de Edom' preserva el matiz genealógico sin sustituirlo por un término más explicativo en el texto principal.
