translation:
  language: es
  text: sonrojada en el pleno esplendor de su belleza[a], y su rostro era alegre, como amable[b], pero su corazón estaba oprimido por el temor.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «en la flor de su belleza». El griego une un participio de «sonrojarse/enrojecer» con una expresión que señala la belleza en su punto culminante.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «como agradable» o «como luminoso». La frase griega ὡς προσφιλές conserva una comparación algo inusual; «como amable» intenta reflejar un semblante grato y afectuoso.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐρυθριῶσα
  english_pob_choice: blushing
  chosen_spanish: sonrojada
  alternatives_spanish:
  - enrojecida
  - ruborizada
  lexicon: LSJ
  rationale: El participio indica un rubor visible del rostro; «sonrojada» es natural en español y conserva la imagen corporal sin añadir interpretación.
- source_word: ἀκμῇ
  english_pob_choice: in the full bloom of
  chosen_spanish: en el pleno esplendor de
  alternatives_spanish:
  - en la flor de
  - en la cima de
  lexicon: LSJ
  rationale: ἀκμή expresa punto culminante, auge o plenitud. Con κάλλους, la idea es la belleza en su punto máximo; «pleno esplendor» mantiene ese valor y suena idiomático en español.
- source_word: κάλλους
  english_pob_choice: her beauty
  chosen_spanish: su belleza
  alternatives_spanish:
  - su hermosura
  - su hermosura
  lexicon: LSJ
  rationale: κάλλος significa belleza, hermosura. «Belleza» es la equivalencia más directa y sobria.
- source_word: ἱλαρόν
  english_pob_choice: cheerful
  chosen_spanish: alegre
  alternatives_spanish:
  - radiante
  - amable
  - placentero
  lexicon: LSJ
  rationale: ἱλαρός describe un semblante alegre, benigno o luminoso. «Alegre» comunica bien el tono del rostro sin perder claridad.
- source_word: ὡς προσφιλές
  english_pob_choice: as if affectionate
  chosen_spanish: como afable
  alternatives_spanish:
  - como amable
  - como querido
  - como agradable
  lexicon: LSJ
  rationale: El griego conserva una comparación algo inusual. «Afable» reproduce la idea de un rostro amable y agradable, evitando reducirlo a una relación de ser amado, y preserva la tensión expresiva del original.
- source_word: ἀπεστενωμένη
  english_pob_choice: was constricted
  chosen_spanish: estaba oprimido
  alternatives_spanish:
  - estaba contraído
  - estaba estrechado
  - estaba comprimido
  lexicon: LSJ
  rationale: El participio sugiere ser apretado o estrechado interiormente; en español, «oprimido» expresa ese peso emocional de modo natural y compatible con el contexto de temor.
- source_word: ἀπὸ τοῦ φόβου
  english_pob_choice: from fear
  chosen_spanish: por el temor
  alternatives_spanish:
  - a causa del temor
  - debido al temor
  lexicon: LSJ
  rationale: ἀπό marca origen o causa. «Por el temor» es conciso y fiel; «temor» mantiene un registro bíblico sobrio sin volverlo arcaizante.
translation_notes:
  revision_awareness: El texto inglés auditado fue revisado de «as if beloved» a «as if affectionate» para ajustar προσφιλές al matiz del semblante, no de la relación personal. La versión española sigue esa decisión y la expresa con «como afable», manteniendo la comparación implícita y la tensión semántica del griego.
  spanish_consistency_notes:
  - Se usa un español neutral y publicable, con sintaxis directa y digna.
  - 'Se mantiene la correspondencia corporal/emocional del original: rubor, rostro, corazón, temor.'
  - No se introduce terminología eclesiástica no atestiguada por el griego.
  - «Temor» conserva el matiz afectivo del sustantivo φόβος sin expandirlo a una interpretación teológica específica.
