translation:
  language: es
  text: Así que Daniel entró y pidió al rey que le diera tiempo[a], para que pudiera dar a conocer la interpretación al rey.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Y Daniel entró y pidió al rey que le fuera dado tiempo, y daría a conocer la interpretación al rey».'
    reason: alternative_reading
lexical_decisions:
- source_word: וְדָנִיֵּאל / וְ
  english_pob_choice: So Daniel
  chosen_spanish: Así que Daniel
  alternatives_spanish:
  - Y Daniel
  - Entonces Daniel
  lexicon: HALOT
  rationale: El relato avanza desde la escena anterior; «Así que» conserva la relación consecutiva del waw narrativo sin sonar rígido. «Y Daniel» sería más literal, pero menos natural en español.
- source_word: עַל
  english_pob_choice: went in
  chosen_spanish: entró
  alternatives_spanish:
  - fue
  - se presentó
  lexicon: HALOT
  rationale: En este contexto arameo la idea es la de acercarse o entrar a la presencia del rey. «Entró» comunica de manera clara y directa ese movimiento.
- source_word: וּבְעָה
  english_pob_choice: asked
  chosen_spanish: pidió
  alternatives_spanish:
  - solicitó
  - rogó
  lexicon: HALOT
  rationale: El verbo expresa una solicitud formal. «Pidió» es natural en español y mantiene el valor de petición sin endurecerlo excesivamente.
- source_word: מִן מַלְכָּא
  english_pob_choice: the king
  chosen_spanish: al rey
  alternatives_spanish:
  - del rey
  - ante el rey
  lexicon: HALOT
  rationale: Aunque la construcción aramea marca origen/antecedente, con un verbo de pedir en español la formulación idiomática es «pedir al rey».
- source_word: זְמָן
  english_pob_choice: time
  chosen_spanish: tiempo
  alternatives_spanish:
  - un plazo
  - un tiempo señalado
  lexicon: HALOT
  rationale: Aquí la palabra designa un período concedido. «Tiempo» es la opción más directa y amplia; «plazo» sería más interpretativo.
- source_word: יִנְתֵּן לֵהּ
  english_pob_choice: to give him
  chosen_spanish: que le diera
  alternatives_spanish:
  - que se le concediera
  - que le fuese concedido
  lexicon: HALOT
  rationale: El verbo hebreo-arameo es literalmente «dar». En español, con «pedir al rey», la subordinada «que le diera» conserva bien la acción de conceder tiempo.
- source_word: וּפִשְׁרָא
  english_pob_choice: the interpretation
  chosen_spanish: la interpretación
  alternatives_spanish:
  - la explicación
  lexicon: HALOT
  rationale: En Daniel, este sustantivo tiene un sentido técnico para la interpretación de un sueño o misterio. «Interpretación» preserva ese valor especializado.
- source_word: לְהַחֲוָיָה
  english_pob_choice: make known
  chosen_spanish: dar a conocer
  alternatives_spanish:
  - hacer saber
  - declarar
  lexicon: HALOT
  rationale: El causativo significa «hacer saber». «Dar a conocer» suena natural en español y conserva el sentido de comunicar explícitamente.
- source_word: לְמַלְכָּא
  english_pob_choice: to the king
  chosen_spanish: al rey
  alternatives_spanish:
  - ante el rey
  lexicon: HALOT
  rationale: Se mantiene el destinatario directo de la comunicación, con la preposición española esperable.
translation_notes:
  revision_awareness: La redacción sigue de cerca el texto arameo y el juicio auditado de la POB en inglés. Se conserva la relación consecutiva del inicio, la petición de tiempo y el propósito de dar a conocer la interpretación, evitando añadir matices no sustentados por la fuente.
  spanish_consistency_notes:
  - Se usa «tiempo» sin especificación adicional para no cerrar el alcance semántico de זְמָן más allá de lo que exige el contexto.
  - Se mantiene «interpretación» como término técnico de Daniel.
  - Se evita «SEÑOR» o «Cristo», porque no aparecen en este versículo.
  - La nota [a] recoge una alternativa sintáctica que preserva mejor el pasivo implícito del posible giro de traducción, como en el audit trail inglés.
