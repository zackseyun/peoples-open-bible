translation:
  language: es
  text: ¿Quién puede contar las nubes[a] con sabiduría, o volcar las vasijas de los cielos?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «nubes» traduce שְׁחָקִים, que en poesía hebrea puede abarcar el ámbito de las nubes o el cielo nuboso; aquí se opta por el sentido meteorológico inmediato.
    reason: lexical_alternative
lexical_decisions:
- source_word: מִי
  english_pob_choice: Who
  chosen_spanish: ¿Quién
  alternatives_spanish:
  - ¿Quién es el que
  - ¿Quién puede
  lexicon: HALOT
  rationale: La interrogativa hebrea introduce una pregunta retórica sobre capacidad; «¿Quién?» reproduce de forma natural esa fuerza en español.
- source_word: יְסַפֵּר
  english_pob_choice: can count
  chosen_spanish: puede contar
  alternatives_spanish:
  - puede enumerar
  - puede hacer el recuento de
  lexicon: HALOT
  rationale: El piel de ספר expresa aquí contar/number. «Puede contar» conserva el verbo concreto y el matiz de capacidad implícito en la pregunta retórica.
- source_word: שְׁחָקִים
  english_pob_choice: the clouds
  chosen_spanish: las nubes
  alternatives_spanish:
  - los cielos
  - las nubes del cielo
  lexicon: HALOT
  rationale: En poesía, שְׁחָקִים puede referirse a nubes o al ámbito nuboso del cielo. El contexto meteorológico favorece «las nubes» como equivalente más natural y directo.
- source_word: בְּחָכְמָה
  english_pob_choice: with wisdom
  chosen_spanish: con sabiduría
  alternatives_spanish:
  - sabia/mente
  - por sabiduría
  lexicon: HALOT
  rationale: La preposición ב con חָכְמָה admite valor instrumental o adverbial. «Con sabiduría» mantiene la estructura hebrea y suena natural en español.
- source_word: וְנִבְלֵי שָׁמַיִם
  english_pob_choice: the jars of the heavens
  chosen_spanish: los cántaros de los cielos
  alternatives_spanish:
  - los odres de los cielos
  - los cántaros del cielo
  lexicon: HALOT
  rationale: נֵבֶל denota un recipiente, a menudo odre o jarra. En este contexto poético de lluvia, «cántaros» conserva la imagen concreta de recipientes celestiales sin añadir «agua», que no está explícito en el hebreo.
- source_word: יַשְׁכִּיב
  english_pob_choice: tip over
  chosen_spanish: volcar
  alternatives_spanish:
  - inclinar
  - derribar
  - hacer caer
  lexicon: HALOT
  rationale: El hiphil de שׁכב puede entenderse literalmente como ‘hacer acostar’, pero con recipientes aquí la imagen apunta a inclinarlos o volcarlos para que su contenido salga. «Volcar» preserva esa acción física de manera clara en español.
translation_notes:
  revision_awareness: Se siguió el ajuste del audit trail en inglés que eliminó «water» antes de «jars» por no estar explícito en el hebreo. La traducción española evita añadir ese elemento y conserva la imagen de recipientes celestiales.
  spanish_consistency_notes:
  - Se usó «Yahvé» para el Tetragrámaton por norma del proyecto, pero este versículo no lo contiene.
  - Se prefirió «cántaros» frente a «odres» porque en español contemporáneo la imagen queda más transparente y no introduce una textura pastoral ajena al paralelo poético.
  - La pregunta retórica se mantuvo sin añadir marcadores modales excesivos; «puede» refleja adecuadamente la capacidad implícita en el hebreo.
