id: EST.9.5
reference: Esther 9:5
source:
  edition: WLC
  text: וַ/יַּכּ֤וּ הַ/יְּהוּדִים֙ בְּ/כָל אֹ֣יְבֵי/הֶ֔ם מַכַּת חֶ֥רֶב וְ/הֶ֖רֶג וְ/אַבְדָ֑ן וַ/יַּֽעֲשׂ֥וּ בְ/שֹׂנְאֵי/הֶ֖ם כִּ/רְצוֹנָֽ/ם־־׃
translation:
  text: So the Jews struck all their enemies with the stroke of the sword[a], and with slaughter and destruction[b], and they did to those who hated them as they pleased.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'with the stroke of the sword.' The Hebrew phrase is literally 'the blow of the sword.'
    reason: lexical_alternative
  - marker: b
    text: Or 'according to their will.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּכּוּ
  chosen: struck
  alternatives:
  - attacked
  - smote
  - killed
  lexicon: HALOT
  rationale: From נכה, a broad verb for striking/smiting. 'Struck' preserves the verbal action without prematurely collapsing it into 'killed,' since the following nouns specify lethal results.
- source_word: הַיְּהוּדִים
  chosen: the Jews
  alternatives:
  - the Judeans
  lexicon: HALOT
  rationale: In Esther, יְהוּדִים refers to the Jewish people as an ethnic-religious group in the Persian diaspora context. 'The Jews' is the most natural and contextually accurate English rendering.
- source_word: בְּכָל אֹיְבֵיהֶם
  chosen: all their enemies
  alternatives:
  - every one of their enemies
  lexicon: HALOT
  rationale: The preposition with כל marks the total scope of those opposed to them. 'All their enemies' is idiomatic and preserves comprehensiveness.
- source_word: מַכַּת חֶרֶב
  chosen: the blow of the sword
  alternatives:
  - the stroke of the sword
  - the sword-blow
  - with the sword
  lexicon: HALOT
  rationale: A construct phrase literally meaning 'blow/stroke of sword.' Rendering it more fully preserves the Hebrew's emphatic piling up of violent terms better than flattening it to simply 'with the sword.'
- source_word: וְהֶרֶג
  chosen: with slaughter
  alternatives:
  - and killing
  - and massacre
  lexicon: HALOT
  rationale: הרג as a noun denotes killing/slaughter. 'Slaughter' fits the wartime context and matches the severity of the sequence.
- source_word: וְאַבְדָן
  chosen: destruction
  alternatives:
  - annihilation
  - ruin
  lexicon: HALOT
  rationale: אבדן denotes destruction/perishing. 'Destruction' is strong and natural; 'annihilation' is possible but slightly more interpretive in English.
- source_word: וַיַּעֲשׂוּ
  chosen: they did
  alternatives:
  - they dealt
  - they acted
  lexicon: HALOT
  rationale: עשה is semantically broad. 'They did' keeps the Hebrew's simplicity and allows the following phrase to define the action.
- source_word: בְשֹׂנְאֵיהֶם
  chosen: to those who hated them
  alternatives:
  - against their haters
  - to their enemies
  lexicon: HALOT
  rationale: 'The participial form of שׂנא is more specific than ''enemies'': these are ''those who hated them.'' This preserves the lexical distinction from אֹיְבֵיהֶם earlier in the verse.'
- source_word: כִּרְצוֹנָם
  chosen: as they pleased
  alternatives:
  - according to their will
  - as they desired
  lexicon: HALOT
  rationale: Literally 'according to their desire/will.' 'As they pleased' is idiomatic modern English and conveys discretionary action without unnecessary stiffness.
