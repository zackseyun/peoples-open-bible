  - severity: low
    issue: Tiempo verbal de la relativa geográfica
    rationale: «que está cerca de Efraín» es comprensible, pero «que estaba cerca de Efraín» armoniza mejor con la narración en pasado. No es un error de sentido, sino un ajuste estilístico.
