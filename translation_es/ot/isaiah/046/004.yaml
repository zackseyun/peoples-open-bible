translation:
  language: es
  text: Aun hasta tu vejez, yo soy el mismo, y hasta las canas te llevaré[a]. Yo te hice, y yo te soportaré; yo te llevaré, y te rescataré[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «te sostendré». El verbo hebreo también puede significar «llevar» o «soportar» en el sentido de sostener una carga.
    reason: lexical_alternative
  - marker: b
    text: O «te libraré». El verbo hebreo también puede expresar la idea de poner a alguien a salvo o sacarlo del peligro.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְעַד
  english_pob_choice: Even to
  chosen_spanish: Aun hasta
  alternatives_spanish:
  - Y hasta
  - Hasta
  lexicon: HALOT
  rationale: La fórmula marca extensión continua hasta un límite; «aun hasta» conserva el énfasis inclusivo del hebreo y suena natural en español bíblico moderno.
- source_word: זִקְנָה
  english_pob_choice: old age
  chosen_spanish: vejez
  alternatives_spanish:
  - ancianidad
  - viejez
  lexicon: HALOT
  rationale: «Vejez» es la forma más natural y digna en español para esta etapa de la vida y mantiene el sentido idiomático del sustantivo.
- source_word: אֲנִי הוּא
  english_pob_choice: I am he
  chosen_spanish: yo soy él
  alternatives_spanish:
  - yo soy el que soy
  - soy yo
  lexicon: HALOT
  rationale: Se conserva la autodeclaración sobria y formulaica del hebreo. «Yo soy él» puede sonar extraño en español, pero precisamente retiene la tensión solemne de la expresión sin resolverla interpretativamente.
- source_word: שֵׂיבָה
  english_pob_choice: gray hairs
  chosen_spanish: las canas
  alternatives_spanish:
  - canicie
  - cabellos canos
  lexicon: HALOT
  rationale: «Las canas» reproduce la imagen concreta de la edad avanzada y evita repetir «vejez», preservando el paralelismo poético del original.
- source_word: אֶסְבֹּל
  english_pob_choice: I will carry
  chosen_spanish: te llevaré
  alternatives_spanish:
  - te sostendré
  - te cargaré
  lexicon: HALOT
  rationale: En este contexto de carga y cuidado, «llevaré» comunica bien el sostén continuo. En la nota se preserva la alternativa de «sostener» porque el verbo hebreo admite ese matiz.
- source_word: עָשִׂיתִי
  english_pob_choice: I have made
  chosen_spanish: Yo te hice
  alternatives_spanish:
  - Yo he hecho
  - Yo te he creado
  lexicon: HALOT
  rationale: El texto apunta a la acción creadora o formativa de Dios respecto de su pueblo; «te hice» es breve, fiel y suficientemente amplio para no forzar una precisión no explicitada por el hebreo.
- source_word: אֶשָּׂא
  english_pob_choice: I will bear
  chosen_spanish: te sostendré
  alternatives_spanish:
  - te llevaré
  - te levantaré
  lexicon: HALOT
  rationale: Se elige «sostendré» para distinguir este verbo del siguiente «llevaré» y para expresar el apoyo continuo implícito en el hebreo, sin perder la idea de carga o soporte.
- source_word: וַאֲמַלֵּט
  english_pob_choice: and I will rescue
  chosen_spanish: te rescataré
  alternatives_spanish:
  - te libraré
  - te salvaré
  - te libraré y rescataré
  lexicon: HALOT
  rationale: «Rescataré» comunica bien la idea de sacar a alguien de peligro o de una situación amenazante. Se evita «salvaré» para no ampliar innecesariamente el matiz inmediato de liberación física o providencial.
theological_decisions:
- issue: Autoidentificación divina en אֲנִי הוּא
  english_pob_reading: I am he
  chosen_spanish_reading: yo soy él
  alternative_spanish_readings:
  - yo soy el que soy
  - soy yo
  rationale: Se mantiene la fórmula breve y enigmática del hebreo, sin reemplazarla por una explicación teológica más desarrollada. Esto preserva la solemnidad de la autoafirmación divina y la tensión interpretativa documentada en la POB inglesa.
  doctrine_reference: Preserve theological tension rather than resolve it.
translation_notes:
  revision_awareness: La revisión inglesa más reciente no introdujo cambios; el texto quedó confirmado tras una pasada de alta concordancia. Por eso la redacción española sigue de cerca la decisión auditada, sin añadir aclaraciones no sustentadas por el hebreo.
  spanish_consistency_notes:
  - 'Se conserva el paralelismo de dos miembros iniciales: «vejez» / «canas».'
  - 'Se mantiene la secuencia verbal distinta en la segunda mitad para reflejar el encadenamiento hebreo: «te hice» / «te sostendré» / «te llevaré» / «te rescataré».'
  - Se usa «Yahvé» no porque aparezca explícitamente en este versículo, sino porque la política del proyecto reserva esa forma para יהוה; aquí el versículo presenta la autodeclaración divina con אֲנִי הוּא.
  - No se introduce «Mesías», «Señor» ni otra terminología teológica ajena al texto.
  - Se evita «sustentar» como forma principal para no volver opaca la imagen de carga/cuidado ya documentada en la auditoría inglesa.
