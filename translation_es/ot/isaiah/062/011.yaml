translation:
  language: es
  text: 'He aquí[a], Yahvé ha proclamado hasta el extremo de la tierra: «Digan a la hija de Sion: “He aquí, tu salvación viene; he aquí, su recompensa está con él, y su retribución delante de él”».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «tu salvador viene». El hebreo dice «tu salvación», pero las frases siguientes usan sufijos masculinos («su recompensa… su retribución»), lo que puede personificar la salvación en el libertador venidero.
    reason: alternative_reading
lexical_decisions:
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: Se conserva el nombre divino del Tetragrámaton con la forma española estándar del proyecto, sin sustituirlo por un título. "Yahvé" mantiene la decisión documental de la POB y es transparente para el lector español.
- source_word: הִשְׁמִיעַ
  english_pob_choice: has proclaimed
  chosen_spanish: ha proclamado
  alternatives_spanish:
  - ha hecho oír
  - ha anunciado
  lexicon: HALOT
  rationale: El hifil de שמע expresa hacer llegar un mensaje públicamente. "Ha proclamado" reproduce bien esa fuerza declarativa en español natural.
- source_word: אֶל קְצֵה הָאָרֶץ
  english_pob_choice: to the end of the earth
  chosen_spanish: hasta el extremo de la tierra
  alternatives_spanish:
  - hasta el fin de la tierra
  - a los confines de la tierra
  lexicon: HALOT
  rationale: Se conserva la imagen singular del hebreo sin forzar un plural idiomático. "Extremo de la tierra" comunica con claridad el alcance universal del anuncio.
- source_word: אִמְרוּ
  english_pob_choice: Say
  chosen_spanish: Digan
  alternatives_spanish:
  - Diga
  - Declaren
  lexicon: HALOT
  rationale: El imperativo plural concuerda con el plural español implícito en la citación profética. "Digan" conserva la orden directa del texto.
- source_word: לְבַת צִיּוֹן
  english_pob_choice: to Daughter Zion
  chosen_spanish: a la Hija de Sion
  alternatives_spanish:
  - a la hija de Sion
  - a la Hija Sion
  lexicon: HALOT
  rationale: Se mantiene la personificación poética de la ciudad como en el hebreo. "Hija de Sion" es natural en español bíblico y preserva el valor figurado del giro.
- source_word: יִשְׁעֵךְ
  english_pob_choice: your salvation
  chosen_spanish: tu salvación
  alternatives_spanish:
  - tu salvador
  - tu liberación
  lexicon: HALOT
  rationale: Se conserva el sustantivo hebreo literal, no una resolución interpretativa al agente personal. En español, "tu salvación" mantiene la tensión documentada con los sufijos masculinos siguientes sin borrarla.
- source_word: בָּא
  english_pob_choice: comes
  chosen_spanish: viene
  alternatives_spanish:
  - está viniendo
  - ha venido
  lexicon: HALOT
  rationale: El perfecto profético se vierte con presente en español para un anuncio solemne y vivo. "Viene" resulta más natural que un perfecto castellano menos idiomático aquí.
- source_word: שְׂכָרוֹ
  english_pob_choice: his reward
  chosen_spanish: su recompensa
  alternatives_spanish:
  - su salario
  - su pago
  lexicon: HALOT
  rationale: '"Recompensa" preserva el valor de retribución y mantiene el paralelismo con la expresión siguiente. Aunque "salario" es posible léxicamente, aquí suena más estrecho.'
- source_word: אִתּוֹ
  english_pob_choice: with him
  chosen_spanish: con él
  alternatives_spanish:
  - junto a él
  lexicon: HALOT
  rationale: La preposición indica acompañamiento; "con él" es el equivalente más directo y transparente en español.
- source_word: וּפְעֻלָּתוֹ
  english_pob_choice: and his recompense
  chosen_spanish: y su retribución
  alternatives_spanish:
  - y su obra
  - y su pago
  lexicon: HALOT
  rationale: Se diferencia de "recompensa" anterior con "retribución" para reflejar el matiz de retorno debido, no solo de premio. Así se conserva el paralelismo sin repetir innecesariamente el mismo término.
- source_word: לְפָנָיו
  english_pob_choice: before him
  chosen_spanish: delante de él
  alternatives_spanish:
  - ante él
  - frente a él
  lexicon: HALOT
  rationale: La frase espacial metafórica se expresa con una locución natural en español. "Delante de él" comunica la posición precedente sin cargarla de interpretación adicional.
theological_decisions:
- issue: Cómo reflejar יִשְׁעֵךְ frente a los sufijos masculinos posteriores
  english_pob_reading: your salvation
  chosen_spanish_reading: tu salvación
  alternative_spanish_readings:
  - tu salvador
  rationale: El hebreo dice literalmente "tu salvación"; los sufijos masculinos de las frases siguientes pueden personificar esa salvación en un libertador venidero. El texto principal conserva la forma lexical y deja la alternativa personal para nota, en vez de resolver la ambigüedad de manera interpretativa.
  doctrine_reference: Translation philosophy §1, §3
- issue: Cómo representar el nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: Se sigue la política del proyecto de transparentar el Tetragrámaton con un nombre propio, no con una sustitución titulada. "Yahvé" es la forma española apropiada y consistente con la evidencia auditada.
  doctrine_reference: 'Project terminology: YHWH -> Yahvé'
translation_notes:
  revision_awareness: La revisión auditada reemplazó la antigua sustitución titulada del nombre divino por la forma explícita Yahvé, sin cambios adicionales. La versión española refleja esa decisión y mantiene la misma ambigüedad lexical de יִשְׁעֵךְ documentada en el inglés POB.
  spanish_consistency_notes:
  - Se mantuvo "Yahvé" para יְהוָה conforme al estándar del proyecto.
  - Se preservó la personificación potencial de "tu salvación" mediante nota, no en el cuerpo principal.
  - '"Hija de Sion" sigue la convención poética de personificación del hebreo.'
  - Se diferenció "recompensa" y "retribución" para conservar el paralelismo de שְׂכָרוֹ / פְעֻלָּתוֹ.
