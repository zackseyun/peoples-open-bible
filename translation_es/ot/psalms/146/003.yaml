translation:
  language: es
  text: No confíen en príncipes[a], ni en un mortal humano[b], en quien no hay salvación[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «en nobles» o «en gobernantes»; hebreo «príncipes».
    reason: lexical_alternative
  - marker: b
    text: Hebreo literalmente «en un hijo de hombre», un modismo para un ser humano mortal, no un título mesiánico aquí.
    reason: lexical_alternative
  - marker: c
    text: O «liberación».
    reason: lexical_alternative
lexical_decisions:
- source_word: אַל
  english_pob_choice: Do not
  chosen_spanish: 'No'
  alternatives_spanish:
  - No... jamás
  - Nunca
  lexicon: HALOT
  rationale: La partícula prohibitiva con imperfecto expresa una prohibición directa; en español, «No» comunica con naturalidad esa fuerza sin añadir énfasis que el hebreo no exige.
- source_word: תִּבְטְחוּ
  english_pob_choice: trust
  chosen_spanish: confíen
  alternatives_spanish:
  - pongan su confianza
  - relién
  lexicon: HALOT
  rationale: בטח expresa confiar, apoyarse en algo o alguien. «Confiar en» es el equivalente más directo y claro en español; el subjuntivo exhortativo mantiene el tono prohibitivo.
- source_word: בִנְדִיבִים
  english_pob_choice: in princes
  chosen_spanish: en príncipes
  alternatives_spanish:
  - en nobles
  - en gobernantes
  lexicon: HALOT
  rationale: נְדִיבִים puede abarcar nobles o personajes prominentes de poder. «Príncipes» reproduce bien el referente sociopolítico y coincide con la elección inglesa documentada, sin reducirlo a una sola función administrativa.
- source_word: בְּבֶן אָדָם
  english_pob_choice: in a son of man
  chosen_spanish: en un hijo de hombre
  alternatives_spanish:
  - en un ser humano
  - en un hombre
  lexicon: HALOT
  rationale: Se preserva la idiomaticidad hebrea («hijo de hombre») en vez de resolverla por completo a «ser humano», porque el audit trail inglés también retiene la expresión formal para mostrar la textura del original. Aquí no es título mesiánico, sino un modo genérico de hablar de un mortal.
- source_word: תְשׁוּעָה
  english_pob_choice: salvation
  chosen_spanish: salvación
  alternatives_spanish:
  - liberación
  - ayuda
  lexicon: HALOT
  rationale: El término puede significar rescate, liberación o salvación. «Salvación» conserva el peso teológico y la antítesis del salmo entre los recursos humanos y la acción salvadora de Dios.
theological_decisions:
- issue: Sentido de «hijo de hombre»
  english_pob_reading: generic mortal human being, not a messianic title
  chosen_spanish_reading: expresión genérica para un ser humano mortal, no un título mesiánico
  alternative_spanish_readings:
  - simplemente «hombre» o «ser humano» sin conservar el giro hebreo
  rationale: El contexto advierte contra confiar en líderes humanos, incluso poderosos. No apunta al uso daniélico/mesiánico de «Hijo de Hombre», sino a la fragilidad de cualquier persona mortal. Mantener la forma idiomática ayuda a documentar esa tensión semántica y su no-aplicación mesiánica aquí.
  doctrine_reference: 'DOCTRINE.md: Gender-accurate over gender-neutral; אָדָם default ''man / humankind (context)'''
translation_notes:
  revision_awareness: 'El texto inglés ya fue revisado y quedó sin cambios en el último pase; la concordancia general con el control cruzado fue alta, así que no se requiere una revisión adicional del sentido base. La versión española sigue el mismo trazado auditado: prohibición directa, confianza en líderes humanos, expresión idiomática «hijo de hombre» conservada, y «salvación» como traducción teológicamente cargada de תְשׁוּעָה.'
  spanish_consistency_notes:
  - Se mantiene «príncipes» para reflejar el matiz sociopolítico de נְדִיבִים, en línea con la elección inglesa auditada.
  - Se conserva «hijo de hombre» para no borrar el giro hebreo ni confundirlo con el título mesiánico.
  - «Salvación» se usa de manera consistente con el valor soteriológico amplio de תְשׁוּעָה en este contexto.
  - La puntuación y el tono siguen un español bíblico moderno, claro y publicable, sin arcaísmos innecesarios.
