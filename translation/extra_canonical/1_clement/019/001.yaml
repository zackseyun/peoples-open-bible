  from: 'Therefore, the humility and submissiveness of so many and such great people, so well attested, through obedience has made not only us better, but also the generations before us—those who received his oracles in holiness and truth.


    2. Since, then, we have shared in many great and glorious deeds, let us press on toward the goal of peace that has been handed down to us from the beginning, and let us fix our gaze on the Father and Creator of the whole world, and cling to his magnificent and surpassing gifts of peace and acts of kindness.


    3. Let us behold him in our mind, and let us look with the eyes of the soul into his patient purpose. Let us understand how free from anger he is toward all his creation.'
  to: 'Therefore, the humility and lowliness of so many and such great people, so well attested, through obedience has made not only us better, but also the generations before us—those who received his oracles in holiness and truth.


    2. Since, then, we have shared in many great and glorious deeds, let us press on toward the goal of peace that has been handed down to us from the beginning, and let us fix our gaze on the Father and Creator of the whole world, and cling to his magnificent and surpassing gifts and benefits of peace.


    3. Let us behold him in our mind, and let us look with the eyes of the soul into his patient purpose. Let us understand how free from anger he is toward all his creation.'
