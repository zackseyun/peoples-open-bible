translation:
  language: es
  text: 'Y Caleb dijo[a]: «Cualquiera que ataque a Quiriat-sefer y la capture, le daré a mi hija Acsa por esposa».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «el que ataque a Quiriat-sefer y la capture».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמֶר
  english_pob_choice: And ... said
  chosen_spanish: dijo
  alternatives_spanish:
  - y dijo
  - entonces dijo
  lexicon: HALOT
  rationale: El hebreo introduce una acción narrativa en secuencia. En español, el encabezado más natural y fiel es «dijo»; la conjunción inicial puede omitirse porque el flujo narrativo ya queda claro en el contexto inmediato.
- source_word: כָּלֵב
  english_pob_choice: Caleb
  chosen_spanish: Caleb
  alternatives_spanish:
  - Calev
  lexicon: Convención onomástica bíblica
  rationale: Se conserva el nombre propio en su forma establecida en español bíblico, que es inteligible para la lectura eclesial y no altera el referente.
- source_word: אֲשֶׁר
  english_pob_choice: whoever
  chosen_spanish: Cualquiera que
  alternatives_spanish:
  - el que
  - quienquiera que
  lexicon: HALOT
  rationale: La cláusula relativa es indefinida y abierta. «Cualquiera que» reproduce bien la amplitud del hebreo y su valor de desafío general.
- source_word: יַכֶּה
  english_pob_choice: strikes
  chosen_spanish: golpee
  alternatives_spanish:
  - hiere
  - ataque
  - derrote
  lexicon: HALOT
  rationale: El verbo hebreo tiene fuerza concreta de golpear/smiter. «Golpee» conserva esa fuerza mejor que una traducción más interpretativa como «derrote».
- source_word: אֶת קִרְיַת סֵפֶר
  english_pob_choice: Kiriath-sepher
  chosen_spanish: Quiriat-sefer
  alternatives_spanish:
  - Quiriat-Séfer
  - Kiriat-sefer
  lexicon: HALOT
  rationale: Se translitera el topónimo. «Quiriat-sefer» refleja el compuesto hebreo con mayor cercanía fonológica al original y evita convertir el nombre en una explicación geográfica.
- source_word: וּלְכָדָהּ
  english_pob_choice: and captures it
  chosen_spanish: y la capture
  alternatives_spanish:
  - y la tome
  - y la conquiste
  - y la capture
  lexicon: HALOT
  rationale: El verbo לָכַד en contexto militar significa capturar o tomar por la fuerza. «La capture» preserva el objeto femenino singular referido a la ciudad y mantiene la exigencia militar del hebreo.
- source_word: וְנָתַתִּי לוֹ
  english_pob_choice: I will give him
  chosen_spanish: le daré
  alternatives_spanish:
  - se la daré
  - yo le daré
  lexicon: HALOT
  rationale: El promisor hebreo expresa futuro de compromiso. «Le daré» comunica la promesa de forma natural y directa en español, sin añadir marcación innecesaria.
- source_word: עַכְסָה
  english_pob_choice: Achsah
  chosen_spanish: Acsa
  alternatives_spanish:
  - Acsá
  - Achsá
  lexicon: Convención onomástica bíblica
  rationale: Se usa la forma española tradicional y breve del nombre, ampliamente reconocible en traducciones bíblicas en español.
- source_word: בִתִּי
  english_pob_choice: my daughter
  chosen_spanish: mi hija
  alternatives_spanish:
  - mi hija propia
  lexicon: HALOT
  rationale: La relación filial es explícita en el hebreo y debe mantenerse. «Mi hija» es la forma natural y fiel en español.
- source_word: לְאִשָּׁה
  english_pob_choice: as a wife
  chosen_spanish: por esposa
  alternatives_spanish:
  - como esposa
  - para esposa
  - como mujer
  lexicon: HALOT
  rationale: La construcción española más idiomática para una entrega matrimonial es «por esposa». Conserva el sentido de otorgarla en matrimonio sin introducir una paráfrasis excesiva.
translation_notes:
  revision_awareness: 'El texto coincide con el sentido del hebreo y con la auditoría inglesa: mantiene la promesa condicional de Caleb, el verbo de combate concreto y la entrega de su hija como esposa. No se detectaron revisiones previas que afecten este versículo.'
  spanish_consistency_notes:
  - Se mantiene «Acsa» como forma española del nombre propio.
  - Se translitera el lugar como «Quiriat-sefer», evitando la traducción explicativa del topónimo.
  - Se conserva el paralelismo condicional con verbo de acción militar y resultado de captura.
  - La puntuación de cita española usa comillas angulares y dos puntos tras el verbo de habla.
