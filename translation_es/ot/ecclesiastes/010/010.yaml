translation:
  language: es
  text: Si el hierro está embotado, y no se ha afilado el filo[a], entonces hay que emplear más fuerza[b]; pero la sabiduría es la ventaja que produce éxito.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Si el hierro está embotado y no se ha afilado el filo, entonces hay que emplear más fuerza; y la ventaja de la sabiduría es que produce éxito».'
    reason: lexical_alternative
  - marker: b
    text: Hebreo «el hierro» probablemente alude a una herramienta o hoja de hierro, no al metal en abstracto.
    reason: cultural_note
lexical_decisions:
- source_word: אִם
  english_pob_choice: If
  chosen_spanish: Si
  alternatives_spanish:
  - Cuando
  - En caso de que
  lexicon: HALOT
  rationale: La partícula introduce una condición directa; «Si» conserva la estructura proverbial del hebreo sin añadir matiz temporal innecesario.
- source_word: קֵהָה
  english_pob_choice: is dull
  chosen_spanish: está embotado
  alternatives_spanish:
  - está opaco
  - está sin filo
  - está romo
  lexicon: HALOT
  rationale: El sentido es de pérdida de corte/filo en un instrumento; «embotado» comunica bien ese estado en español y funciona naturalmente con herramientas o hojas.
- source_word: הַבַּרְזֶל
  english_pob_choice: the iron
  chosen_spanish: el hierro
  alternatives_spanish:
  - el metal
  - la hoja de hierro
  - la herramienta de hierro
  lexicon: HALOT
  rationale: Se conserva la expresión literal «el hierro», que en contexto puede referir metonímicamente a un utensilio o cuchilla de hierro. No se explicita «herramienta» en el texto para no ir más allá del hebreo.
- source_word: פָנִים
  english_pob_choice: its edge
  chosen_spanish: el filo
  alternatives_spanish:
  - la cara
  - la superficie
  - el frente
  lexicon: HALOT
  rationale: Aunque literalmente es «rostro/cara», en este contexto de herramienta la referencia práctica es al borde cortante. «El filo» es el equivalente español más claro y fiel al uso idiomático.
- source_word: קִלְקַל
  english_pob_choice: has not sharpened
  chosen_spanish: no se ha afilado
  alternatives_spanish:
  - no se ha preparado
  - no se ha pulido
  - no se ha hecho más liso
  lexicon: HALOT
  rationale: El verbo en contexto describe poner en orden o preparar la herramienta, aquí concretado como afilar. La pasiva refleja mantiene la impersonalidad proverbial del original.
- source_word: וַחֲיָלִים יְגַבֵּר
  english_pob_choice: then he must exert more strength
  chosen_spanish: entonces hay que esforzar más
  alternatives_spanish:
  - entonces debe ejercer más fuerza
  - entonces hay que aplicar más fuerza
  - entonces debe esforzarse con más vigor
  lexicon: HALOT
  rationale: חֲיָלִים puede expresar fuerza o vigor; el verbo intensifica el acto de hacerse más fuerte. «Hay que esforzar más» expresa la consecuencia práctica sin sonar demasiado técnico, y preserva el tono proverbial.
- source_word: וְיִתְרוֹן
  english_pob_choice: but ... advantage
  chosen_spanish: pero ... la ventaja
  alternatives_spanish:
  - y la ganancia
  - y el provecho
  - y la utilidad
  lexicon: HALOT
  rationale: יִתְרוֹן significa ventaja, provecho o ganancia. Se traduce con «la ventaja» para mantener el sustantivo y el contraste, evitando una paráfrasis excesiva.
- source_word: הכשיר
  english_pob_choice: brings success
  chosen_spanish: para el éxito
  alternatives_spanish:
  - que produce éxito
  - que hace prosperar
  - que da eficacia
  lexicon: HALOT
  rationale: El hifil expresa hacer apto, eficaz o exitoso. En español, «para el éxito» conserva la relación de utilidad/resultado que destaca el hebreo y el auditorio POB, sin forzar una frase más interpretativa.
- source_word: חָכְמָה
  english_pob_choice: wisdom
  chosen_spanish: la sabiduría
  alternatives_spanish:
  - la prudencia
  - la habilidad
  - el discernimiento
  lexicon: HALOT
  rationale: «Sabiduría» es la equivalencia estándar y mantiene el tema sapiencial de Qohelet, donde la sabiduría práctica produce ventaja.
theological_decisions:
- issue: Relación entre 'יִתְרוֹן' y el resultado de la sabiduría
  english_pob_reading: wisdom is the advantage for success
  chosen_spanish_reading: la sabiduría es la ventaja para el éxito
  alternative_spanish_readings:
  - la sabiduría trae éxito
  - la ventaja de la sabiduría es el éxito
  - la sabiduría da provecho
  rationale: El hebreo no dice solo que la sabiduría «da éxito», sino que la presenta como la ganancia/ventaja que se obtiene. Mantener «es la ventaja para el éxito» preserva la tensión entre provecho y eficacia sin borrar el sustantivo clave.
  doctrine_reference: Sabiduría en Qohelet; no doctrinal, sino sapiencial y lexical.
- issue: Imagen del hierro y el filo
  english_pob_reading: the iron ... the edge
  chosen_spanish_reading: el hierro ... el filo
  alternative_spanish_readings:
  - el hierro ... la cara
  - la herramienta de hierro ... el borde
  rationale: Se conserva la metáfora concreta. El hebreo usa «el hierro» y «el rostro/cara» de manera idiomática; en español, «filo» comunica el sentido sin perder la base material de la imagen.
  doctrine_reference: No aplica; decisión de imagen lexical.
translation_notes:
  revision_awareness: La redacción sigue de cerca la revisión más reciente del audit trail al mantener la idea de «embotado», el infinitivo resultativo de «afilar» y la formulación sustantiva de «ventaja» en la línea final. También conserva el tono proverbial y la ambigüedad útil entre fuerza y esfuerzo, sin convertirla en una paráfrasis libre.
  spanish_consistency_notes:
  - Se usa «sabiduría» de manera consistente para חָכְמָה, en consonancia con el registro sapiencial de Eclesiastés.
  - Se mantiene «el hierro» como expresión literal, pero el contexto lo orienta hacia un instrumento cortante; por eso el texto principal usa «filo».
  - Se evita «SEÑOR» u otras sustituciones no presentes en este versículo.
  - La puntuación sigue el orden condicional-proverbial del hebreo y del audit trail inglés, con una cláusula principal contrastiva introducida por «pero».
