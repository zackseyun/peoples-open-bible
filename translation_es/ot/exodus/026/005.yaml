    issue: '''la primera cortina'' sobreespecifica הָאֶחָת'
    rationale: El hebreo dice literalmente 'la una' y el audit trail inglés evitó 'the first'. 'Primera' introduce orden secuencial que no está expresado en la fuente.
  - severity: medium
    issue: La nota [a] está anclada en el lugar equivocado
    rationale: La nota explica el modismo 'a woman to her sister', correspondiente a אִשָּׁה אֶל אֲחֹתָהּ al final del versículo, no al sustantivo 'presillas' al comienzo.
  - severity: low
    issue: La nota [b] es innecesaria y redundante
    rationale: La alternativa 'alineadas una con otra' solo parafrasea מַקְבִּילֹת y no preserva una variante fuente significativa adicional; recarga el texto sin necesidad.
