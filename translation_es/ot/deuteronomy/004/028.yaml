translation:
  language: es
  text: Y allí serviréis a dioses, obra de manos humanas, de madera y de piedra, que ni ven ni oyen ni comen ni huelen.
  philosophy: optimal-equivalence
  footnotes: []
lexical_decisions:
- source_word: וַעֲבַדְתֶּם
  english_pob_choice: you will serve
  chosen_spanish: servirán
  alternatives_spanish:
  - serviréis
  - estarán sirviendo
  lexicon: HALOT
  rationale: El hebreo expresa una acción futura en el contexto de la advertencia de Moisés. «Servirán» conserva ese valor predictivo en español con naturalidad y sin arcaísmo excesivo.
- source_word: שָׁם
  english_pob_choice: there
  chosen_spanish: allí
  alternatives_spanish:
  - ahí
  - allá
  lexicon: HALOT
  rationale: El adverbio locativo se refiere al lugar del exilio o dispersión ya mencionado en el contexto. «Allí» suena claro y neutro en español.
- source_word: אֱלֹהִים
  english_pob_choice: gods
  chosen_spanish: dioses
  alternatives_spanish:
  - ídolos
  lexicon: HALOT
  rationale: El plural hebreo aquí designa deidades falsas. «Dioses» conserva el sentido léxico directo; «ídolos» sería más interpretativo y desplazaría el contraste que el texto desarrolla con la apposición siguiente.
- source_word: מַעֲשֵׂה יְדֵי אָדָם
  english_pob_choice: the work of human hands
  chosen_spanish: obra de manos humanas
  alternatives_spanish:
  - hechura de manos humanas
  - obra hecha por manos humanas
  lexicon: HALOT
  rationale: La cadena constructa se vierte de manera transparente y natural. «Humanas» conserva el valor genérico de אָדָם sin introducir un matiz masculino no requerido por el hebreo.
- source_word: עֵץ וָאֶבֶן
  english_pob_choice: wood and stone
  chosen_spanish: de madera y de piedra
  alternatives_spanish:
  - madera y piedra
  - madero y piedra
  lexicon: HALOT
  rationale: En este contexto describe la materia de los ídolos, no árboles vivos. «De madera y de piedra» comunica el material con fluidez en español.
- source_word: אֲשֶׁר לֹא יִרְאוּן וְלֹא יִשְׁמְעוּן וְלֹא יֹאכְלוּן וְלֹא יְרִיחֻן
  english_pob_choice: which neither see nor hear nor eat nor smell
  chosen_spanish: que ni ven ni oyen ni comen ni huelen
  alternatives_spanish:
  - que no ven ni oyen ni comen ni huelen
  - que ni pueden ver ni oír ni comer ni oler
  lexicon: HALOT
  rationale: La serie negativa reproduce el paralelismo del hebreo con economía y ritmo. «Ni...ni...» refleja bien la acumulación de negaciones sin añadir la modalización «pueden», que no está explícita en el texto.
- source_word: יְרִיחֻן
  english_pob_choice: smell
  chosen_spanish: huelen
  alternatives_spanish:
  - perciben olores
  - tienen olfato
  lexicon: HALOT
  rationale: El verbo de la lista sensorial alude al olfato. «Huelen» es la correspondencia más natural y directa en español.
theological_decisions:
- issue: Valor de אֱלֹהִים en un contexto de idolatría
  english_pob_reading: gods
  chosen_spanish_reading: dioses
  alternative_spanish_readings:
  - ídolos
  rationale: Conservar «dioses» mantiene la fuerza del hebreo y deja que la frase siguiente explique su carácter manufacturado. Esto evita reducir prematuramente el término a una glosa interpretativa.
  doctrine_reference: DOCTRINE.md Translation philosophy §2; lexical distinction between deity language and idol language
- issue: Polómica contra los ídolos como seres sin facultades
  english_pob_reading: which neither see nor hear nor eat nor smell
  chosen_spanish_reading: que ni ven ni oyen ni comen ni huelen
  alternative_spanish_readings:
  - que no ven ni oyen ni comen ni huelen
  - que no pueden ver ni oír ni comer ni oler
  rationale: 'La serie negativa mantiene la ironía y el contraste del pasaje: los supuestos dioses carecen de las facultades básicas de la vida. Se evitó «pueden» para no introducir una interpretación modal no explícita en el hebreo.'
  doctrine_reference: DOCTRINE.md Translation philosophy §1; respect for source-image and polemical force
translation_notes:
  revision_awareness: La redacción sigue la revisión más reciente del inglés POB, que sustituyó una formulación más general por la estructura negativa «ni... ni...», más cercana al hebreo y de tono más formal. En español se reflejó esa misma decisión mediante una serie negativa coordinada.
  spanish_consistency_notes:
  - Se preservó «dioses» en lugar de «ídolos» para mantener la distinción léxica entre deidad falsa y material manufacturado.
  - Se usó el adverbio locativo «allí» para corresponder al hebreo שָׁם sin añadir especificación geográfica innecesaria.
  - La traducción de אָדָם como «humanas» conserva el valor genérico y evita una lectura masculinizante no sustentada por el contexto.
