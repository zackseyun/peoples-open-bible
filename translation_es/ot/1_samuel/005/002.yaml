translation:
  language: es
  text: Así que los filisteos tomaron el arca de Dios y la llevaron a la casa de Dagón[a], y la colocaron junto a Dagón.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «el templo de Dagón». Literalmente, «la casa de Dagón».
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּקְחוּ
  english_pob_choice: took
  chosen_spanish: tomaron
  alternatives_spanish:
  - agarraron
  - se apoderaron de
  lexicon: HALOT
  rationale: לקח en esta secuencia narrativa expresa la acción simple de tomar. «Tomaron» conserva ese sentido natural en español sin añadir una intensidad que el hebreo no exige por sí mismo.
- source_word: פְלִשְׁתִּים
  english_pob_choice: the Philistines
  chosen_spanish: los filisteos
  alternatives_spanish:
  - los filisteos
  lexicon: HALOT
  rationale: El nombre del grupo étnico se vierte de forma estándar. El artículo definido es natural en español para un colectivo ya identificado en el relato.
- source_word: אֲרוֹן הָאֱלֹהִים
  english_pob_choice: the ark of God
  chosen_spanish: el arca de Dios
  alternatives_spanish:
  - el cofre de Dios
  - el arca del Dios
  lexicon: HALOT
  rationale: אֲרוֹן corresponde al término consagrado «arca» en este contexto cultual. הָאֱלֹהִים se refiere a Dios; en español, «de Dios» preserva el sentido directo del texto hebreo, sin cambiarlo por una designación distinta.
- source_word: וַיָּבִיאוּ אֹתוֹ
  english_pob_choice: brought it
  chosen_spanish: la llevaron
  alternatives_spanish:
  - la trajeron
  - la llevaron adentro
  lexicon: HALOT
  rationale: El verbo en hifil expresa llevar/introducir. En español, «la llevaron» es natural y mantiene el referente femenino de «arca»; evita añadir un matiz de modo que el hebreo no especifica.
- source_word: בֵּית דָּגוֹן
  english_pob_choice: the house of Dagon
  chosen_spanish: la casa de Dagón
  alternatives_spanish:
  - el templo de Dagón
  lexicon: HALOT
  rationale: בית significa literalmente «casa». Se conserva la expresión hebrea de manera transparente; «templo» sería una interpretación contextual válida, pero menos literal.
- source_word: וַיַּצִּיגוּ אֹתוֹ
  english_pob_choice: set it
  chosen_spanish: la colocaron
  alternatives_spanish:
  - la pusieron
  - la situaron
  lexicon: HALOT
  rationale: יצג en hifil significa poner/colocar/presentar. «La colocaron» es preciso y fluido en español; mantiene la idea de posicionar el arca sin introducir énfasis innecesario.
- source_word: אֵצֶל דָּגוֹן
  english_pob_choice: beside Dagon
  chosen_spanish: junto a Dagón
  alternatives_spanish:
  - al lado de Dagón
  - cerca de Dagón
  lexicon: HALOT
  rationale: אֵצֶל indica proximidad. «Junto a» es la equivalencia más natural y exacta en español; preserva la relación espacial sin sobreexplicar que se trata de la imagen cultual.
theological_decisions:
- issue: Referencia de «Dios» en «el arca de Dios»
  english_pob_reading: Render as 'God,' not 'the LORD'
  chosen_spanish_reading: «de Dios», no «del SEÑOR»
  alternative_spanish_readings:
  - el arca del SEÑOR
  rationale: El hebreo dice הָאֱלֹהִים, no el nombre divino YHWH. Por fidelidad al texto fuente, se conserva «Dios» en español en lugar de sustituirlo por una fórmula tradicional distinta.
  doctrine_reference: DOCTRINE.md Translation philosophy §1; tabla de términos controvertidos para YHWH
- issue: Valor de בֵּית דָּגוֹן
  english_pob_reading: House of Dagon, with note that it may mean temple
  chosen_spanish_reading: «la casa de Dagón», con nota sobre posible sentido de templo
  alternative_spanish_readings:
  - el templo de Dagón
  rationale: La expresión hebrea dice literalmente «casa». Se mantiene la formulación directa y se deja constancia de la alternativa contextual «templo», sin borrar la tensión entre literalidad y sentido cultual.
  doctrine_reference: Principio POB de transparencia léxica; HALOT para בית
- issue: Referencia de «Dagón»
  english_pob_reading: Dagon
  chosen_spanish_reading: Dagón
  alternative_spanish_readings:
  - Dagón
  rationale: Se conserva el nombre propio con acentuación española para la pronunciación natural, sin alterar la identidad del referente.
  doctrine_reference: Convención editorial de nombres propios en español POB
translation_notes:
  revision_awareness: 'El borrador sigue el acuerdo alto de la revisión más reciente: no introduce cambios de sentido respecto del texto fuente ni del análisis POB inglés, y conserva la alternativa léxica principal para בֵּית דָּגוֹן en nota.'
  spanish_consistency_notes:
  - Se usa «Dagón» de forma uniforme como nombre propio.
  - Se conserva «arca de Dios» para reflejar הָאֱלֹהִים sin sustituirlo por «SEÑOR».
  - 'Los verbos narrativos se mantienen simples y directos: «tomaron», «llevaron», «colocaron».'
  - La nota a debe ir anclada en «casa de Dagón» para preservar la alternativa semántica sin recargar el texto principal.
