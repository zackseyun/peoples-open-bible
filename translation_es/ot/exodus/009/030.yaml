translation:
  language: es
  text: Pero en cuanto a ti y a tus siervos[a], sé que ustedes todavía no temen[b] ante Yahvé Dios.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Siervos» traduce aquí el hebreo עֲבָדֶיךָ. En este contexto de corte, también puede entenderse como «servidores» u «oficiales».
    reason: lexical_alternative
  - marker: b
    text: El hebreo טֶרֶם con el imperfecto puede significar «todavía no» o «antes de que». En este contexto, la traducción principal adopta «todavía no», pero la otra posibilidad sigue siendo viable.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְאַתָּה
  english_pob_choice: But as for you
  chosen_spanish: Pero en cuanto a ti
  alternatives_spanish:
  - Pero tú
  - Y en cuanto a ti
  lexicon: HALOT
  rationale: La partícula con el pronombre independiente introduce contraste y enfoque tópico; en español, «Pero en cuanto a ti» reproduce bien ese giro adversativo y delimitador sin sonar mecánico.
- source_word: וַעֲבָדֶיךָ
  english_pob_choice: and your servants
  chosen_spanish: y a tus siervos
  alternatives_spanish:
  - y a tus servidores
  - y a tus esclavos
  lexicon: HALOT
  rationale: עֶבֶד puede ser «siervo» o «esclavo». Aquí, por el contexto de la corte de Faraón, «siervos» es natural y evita imponer una lectura de esclavitud chattel que el contexto inmediato no requiere.
- source_word: יָדַעְתִּי
  english_pob_choice: I know
  chosen_spanish: sé
  alternatives_spanish:
  - yo sé
  - he sabido
  lexicon: HALOT
  rationale: El perfecto expresa una evaluación actual o conocimiento asentado; «sé» transmite de forma natural la certeza presente de Moisés.
- source_word: טֶרֶם תִּירְאוּן
  english_pob_choice: you do not yet fear / before you fear
  chosen_spanish: todavía no temen
  alternatives_spanish:
  - aún no temen
  - no temen todavía
  - antes de que teman
  lexicon: HALOT
  rationale: טֶרֶם con el imperfecto puede significar prioridad temporal («antes de») o «todavía no». En contexto, la lectura más idiomática en español es «todavía no», manteniendo la tensión temporal sin suavizar la idea de temor reverente.
- source_word: מִפְּנֵי
  english_pob_choice: before
  chosen_spanish: a
  alternatives_spanish:
  - ante
  - delante de
  lexicon: HALOT
  rationale: En español, con «temer» el hebreo idiomático se expresa mejor con «temer a»; el valor relacional de «from/before the face of» queda incorporado en la construcción verbal.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  - el SEÑOR
  lexicon: HALOT
  rationale: Se mantiene la convención POB de transliterar el nombre divino como «Yahvé», conservando el nombre propio del pacto y evitando la sustitución por un título.
- source_word: אֱלֹהִים
  english_pob_choice: God
  chosen_spanish: Dios
  alternatives_spanish:
  - el Dios
  - dios
  lexicon: HALOT
  rationale: En aposición a YHWH, «Dios» conserva el designativo divino sin alterar el sentido del hebreo ni añadir artículo innecesario.
theological_decisions:
- issue: Lectura temporal de טֶרֶם con ירא
  english_pob_reading: you do not yet fear / before you fear
  chosen_spanish_reading: todavía no temen
  alternative_spanish_readings:
  - antes de que teman
  - aún no temen
  rationale: El hebreo mantiene una tensión entre prioridad temporal y estado moral/religioso. «Todavía no» preserva esa tensión en español y evita resolverla demasiado pronto en una sola paráfrasis.
  doctrine_reference: POB translation philosophy on preserving lexical/theological tension
- issue: Representación del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - el SEÑOR
  rationale: La elección mantiene el nombre propio divino en forma transparente y auditable, conforme al estándar POB, sin ocultarlo bajo una sustitución litúrgica.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Valor de ירא respecto a Dios
  english_pob_reading: fear
  chosen_spanish_reading: temen
  alternative_spanish_readings:
  - reverencian
  - temen reverentemente
  rationale: «Temen» conserva el campo semántico de miedo, reverencia y rendición ante Dios. En este contexto de juicio, esa amplitud es teológicamente importante.
  doctrine_reference: 'POB Translation philosophy #3'
translation_notes:
  revision_awareness: La revisión más reciente no introdujo cambios; el borrador español sigue la misma lectura central del inglés POB, pero ajusta la expresión para que el español conserve la contraposición, la temporalidad de טֶרֶם y el nombre divino con terminología POB transparente.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» para יהוה, conforme al estándar español del proyecto.
  - Se prefirió «siervos» por contexto cortesano, sin imponer «esclavos».
  - «Todavía no» refleja la ambigüedad de טֶרֶם sin borrar la posibilidad de la lectura «antes de».
  - La construcción «temen a Yahvé Dios» conserva el régimen verbal natural del español y el sentido relacional del hebreo.
