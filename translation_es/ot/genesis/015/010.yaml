translation:
  language: es
  text: Entonces llevó todos estos a él, los partió por la mitad[a], y puso cada mitad frente a la otra[b]; pero no partió las aves por la mitad.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O ‘los cortó por la mitad’. El verbo hebreo alude a dividir los animales en partes dentro de un rito de pacto.
    reason: lexical_alternative
  - marker: b
    text: Literalmente, ‘puso cada pieza frente a su otra parte’.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּקַּח לוֹ
  english_pob_choice: So he brought all these to him
  chosen_spanish: Así que los llevó a él
  alternatives_spanish:
  - Entonces los llevó para él
  - Y los llevó a él
  lexicon: HALOT
  rationale: El hebreo combina el verbo de tomar/traer con el pronombre dativo לוֹ; en este contexto, el antecedente es Dios por la orden previa de ‘tráeme’. ‘Los llevó a él’ conserva la dirección hacia Dios sin introducir una lectura reflexiva que el contexto no favorece.
- source_word: כָּל אֵלֶּה
  english_pob_choice: all these
  chosen_spanish: los
  alternatives_spanish:
  - todos estos
  - todas estas cosas
  lexicon: HALOT
  rationale: 'El referente ya quedó claro en el contexto inmediato: los animales mencionados antes. En español, el pronombre directo es suficiente y evita una repetición pesada.'
- source_word: וַיְבַתֵּר אֹתָם בַּתָּוֶךְ
  english_pob_choice: cut them in two
  chosen_spanish: los partió por la mitad
  alternatives_spanish:
  - los cortó en dos
  - los dividió en dos
  lexicon: HALOT
  rationale: בתר se refiere a dividir o cortar cuerpos animales en un rito de pacto. ‘Partió por la mitad’ comunica bien la acción concreta en español y mantiene la imagen ritual sin sonar excesivamente técnico.
- source_word: וַיִּתֵּן אִישׁ בִּתְרוֹ לִקְרַאת רֵעֵהוּ
  english_pob_choice: placed each half opposite the other
  chosen_spanish: puso cada mitad frente a la otra
  alternatives_spanish:
  - puso cada pieza frente a su compañera
  - colocó cada parte una enfrente de la otra
  lexicon: HALOT
  rationale: La expresión distributiva ‘cada... la otra’ refleja el hebreo sin añadir una noción de ‘pareja’ que no está explícita. ‘Frente a la otra’ conserva la disposición espacial del ritual.
- source_word: וְאֶת הַצִפֹּר לֹא בָתָר
  english_pob_choice: but he did not cut the birds in two
  chosen_spanish: pero no partió las aves por la mitad
  alternatives_spanish:
  - pero no dividió las aves
  - pero no partió el ave por la mitad
  lexicon: HALOT
  rationale: El hebreo singular colectivo puede referirse a las aves del conjunto. En español, el plural ‘aves’ comunica con naturalidad el referente mencionado antes, y ‘por la mitad’ mantiene el paralelismo con la acción negada en la cláusula anterior.
theological_decisions:
- issue: Lenguaje del rito de pacto sin explicación añadida
  english_pob_reading: Rendered the action concretely as animal halves arranged opposite each other without importing later theological explanation into the verse itself.
  chosen_spanish_reading: 'Se conserva la escena concreta del rito: animales partidos y colocados frente a frente, sin añadir una glosa interpretativa dentro del texto.'
  alternative_spanish_readings:
  - Se partió en dos y los puso uno frente al otro, como señal de pacto
  - Los cortó en mitades, un rito de alianza
  rationale: El hebreo describe la preparación material de la escena. En español conviene mantener la concreción del gesto y su fuerza ritual, pero sin explicitar más de lo que el verso dice.
  doctrine_reference: Translation philosophy §§1, 3, 6
translation_notes:
  revision_awareness: La revisión más reciente prefirió ‘the other’ en inglés para reflejar con más precisión la relación distributiva del hebreo sin sugerir más de lo necesario. En español, ‘la otra’ conserva esa misma precisión y evita introducir una lectura más pareja/compañera de la requerida.
  spanish_consistency_notes:
  - Se mantuvo ‘partió’ para בתר, consistente con la imagen de dividir animales en el rito.
  - Se evitó ‘SEÑOR’ o fórmulas eufemísticas porque el verso hebreo no contiene el nombre divino, aunque el contexto inmediato sí presupone la dirección a Dios.
  - Se usó ‘aves’ en plural para expresar con naturalidad el colectivo hebreo, sin perder el contraste con los animales partidos.
