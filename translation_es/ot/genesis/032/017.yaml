review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura básica del hebreo: Jacob pone cada rebaño por separado bajo control de sus siervos y les ordena avanzar delante de él dejando separación entre los grupos. Sin embargo, las notas y sus anclajes no preservan fielmente el rastro de auditoría inglés: la nota sobre «cada rebaño aparte» falta en el texto y se reemplaza por una nota mal anclada al final; la nota sobre «Pasen delante de mí» no corresponde a una ambigüedad real del hebreo ni del POB inglés; y la alternativa «entre rebaño y rebaño» duplica innecesariamente la lectura principal en vez de reflejar mejor la alternativa inglesa «entre un rebaño y otro».'
  spanish_quality_summary: El español es claro y legible, con buen registro bíblico moderno. «Puso cada rebaño aparte en manos de sus siervos» y «pongan un espacio» suenan naturales. Aun así, la colocación de las notas al final de la cita produce confusión sobre qué expresiones glosan, y «idiomismo» en la nota a suena menos natural que «expresión idiomática».
  glossary_alignment: No hay conflicto con la terminología principal del proyecto. La elección «siervos» para עֲבָדָיו es defendible por contexto narrativo. «Rebaño» para עֵדֶר y «espacio» para רֶוַח concuerdan con las decisiones auditadas. El problema principal no es de glosario sino de conservación de las decisiones y notas del POB inglés.
  issues:
  - severity: high
    issue: Falta la nota correspondiente a «cada rebaño aparte» y las notas están mal ancladas.
    rationale: El POB inglés conserva una alternativa para עֵדֶר עֵדֶר לְבַדּוֹ («each drove by itself») y una nota de rendering previo; en español ninguna de esas se ancla a «cada rebaño aparte». En cambio, tres notas se acumulan al final de la oración, lo que no respeta la disciplina requerida de anclar cada nota a la frase pertinente.
  - severity: high
    issue: La nota d del borrador introduce una lectura alternativa no respaldada por el rastro inglés ni por una ambigüedad significativa del hebreo.
    rationale: «O “Pasen delante de mí”. La construcción puede leerse también como una instrucción general de avanzar al frente» no añade información real y además duplica prácticamente el texto principal. La nota d inglesa era sobre el orden previo de la cláusula, no sobre עִבְרוּ לְפָנַי.
  - severity: medium
    issue: La nota b actual es incorrecta como alternativa.
    rationale: Presenta «entre rebaño y rebaño» como opción, pero esa ya es la redacción principal. La alternativa inglesa relevante es «between one herd and another», que en español sería «entre un rebaño y otro».
  - severity: low
    issue: Redacción mejorable en la nota a.
    rationale: «Idiomismo» suena técnico y menos natural en español general; «expresión idiomática» comunica mejor la idea.
  revised_spanish_text: 'Puso cada rebaño aparte[d] en manos de sus siervos[a], y dijo a sus siervos: «Pasen delante de mí, y pongan un espacio entre rebaño y rebaño[b][c]».'
