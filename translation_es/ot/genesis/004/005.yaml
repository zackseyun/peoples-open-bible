    text: 'Hebreo: «su rostro cayó», un modismo para expresar abatimiento o decaimiento visible.'
    reason: lexical_alternative
  revision_rationale: La revisión mantiene el sentido fuente y la cautela teológica del POB, pero usa español más claro y natural. «No miró con favor» expresa mejor שָׁעָה que «no tuvo consideración»; «se enojó mucho» conserva la intensidad sin coloquialismo excesivo; y «su rostro se abatió» comunica el hebraísmo con mejor inteligibilidad, dejando la imagen literal en nota donde corresponde.
