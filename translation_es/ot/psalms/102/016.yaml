translation:
  language: es
  text: Entonces las naciones temerán el nombre de Yahvé[a][b], y todos los reyes de la tierra temerán tu gloria.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Y las naciones temerán el nombre de Yahvé». El hebreo con waw puede leerse simplemente como «y»; «entonces» explicita la consecuencia en el contexto.'
    reason: alternative_reading
  - marker: b
    text: 'O: «reverenciarán». El verbo hebreo puede expresar temor en el sentido de reverente asombro.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְיִירְאוּ
  english_pob_choice: Then ... will fear
  chosen_spanish: Entonces ... temerán
  alternatives_spanish:
  - Y ... temerán
  - Y ... reverenciarán
  lexicon: HALOT
  rationale: El perfecto/imperfecto con waw consecutivo en este contexto expresa consecuencia. «Entonces» hace explícita la relación contextual sin perder el valor conjuntivo; «temerán» conserva el alcance de temor reverente que el verbo puede tener.
- source_word: גּוֹיִם
  english_pob_choice: the nations
  chosen_spanish: las naciones
  alternatives_spanish:
  - naciones
  - los gentiles
  lexicon: HALOT
  rationale: «Las naciones» comunica el plural genérico del hebreo sin introducir una oposición técnico-religiosa que «los gentiles» podría sugerir en español.
- source_word: אֶת שֵׁם יְהוָה
  english_pob_choice: the name of Yahweh
  chosen_spanish: el nombre de Yahvé
  alternatives_spanish:
  - el nombre de Yahweh
  - el nombre del Señor
  lexicon: HALOT
  rationale: Se mantiene «nombre» para conservar el peso hebreo de reputación/identidad revelada, y «Yahvé» para el Tetragrámaton según el criterio del proyecto, en vez de sustituirlo por un título.
- source_word: וְכָל מַלְכֵי הָאָרֶץ
  english_pob_choice: and all the kings of the earth
  chosen_spanish: y todos los reyes de la tierra
  alternatives_spanish:
  - y todos los reyes de la tierra
  - y cada rey de la tierra
  lexicon: HALOT
  rationale: «Todos los reyes de la tierra» reproduce de forma directa el plural constructo y el ámbito universal del verso.
- source_word: אֶת כְּבוֹדֶךָ
  english_pob_choice: your glory
  chosen_spanish: tu gloria
  alternatives_spanish:
  - tu honor
  - tu esplendor
  lexicon: HALOT
  rationale: «Gloria» es la equivalencia más estable para כָּבוֹד en este registro poético-teológico. Se conserva la segunda persona directa a Dios con «tu».
theological_decisions:
- issue: Renderización del nombre divino יהוה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - el Señor
  rationale: El hebreo usa el nombre propio divino. La política del proyecto pide «Yahvé» en el texto principal para preservar el nombre del pacto y evitar la sustitución por un título.
  doctrine_reference: 'DOCTRINE.md Contested terms: יהוה YHWH'
- issue: Valor semántico de ירא en este contexto
  english_pob_reading: fear / revere
  chosen_spanish_reading: temerán
  alternative_spanish_readings:
  - reverenciarán
  - tendrán reverencia
  rationale: El verbo admite temor y reverencia. Se conserva «temerán» porque no borra la gravedad del término; el matiz reverente queda implícito por el objeto divino y el contexto poético.
  doctrine_reference: HALOT ירא
- issue: Sentido de כבוד aplicado a Dios
  english_pob_reading: glory
  chosen_spanish_reading: gloria
  alternative_spanish_readings:
  - honor
  - esplendor
  rationale: «Gloria» conserva mejor la densidad teológica de כבוד que una paráfrasis. En este verso funciona como aquello que los reyes reconocen respecto de Dios.
  doctrine_reference: HALOT כבד
translation_notes:
  revision_awareness: Se siguió el auditorial inglés en la decisión de explicitar el valor consecutivo de la waw con «Entonces», pero se mantuvo una alternativa en nota para «y». También se preservó la implicación del verbo hebreo ירא con una nota léxica, en lugar de reducirlo de forma absoluta a «reverenciarán».
  spanish_consistency_notes:
  - Se usa «Yahvé» para יהוה de manera consistente con el criterio del proyecto.
  - Se conserva «gloria» para כָּבוֹד y «naciones» para גּוֹיִם, evitando sustituciones interpretativas.
  - 'La segunda cláusula deja el verbo tácito en español como en el hebreo: «y todos los reyes de la tierra, tu gloria», sin añadir un verbo no presente en el texto base.'
