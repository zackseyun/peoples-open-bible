translation:
  language: es
  text: Tiempo de nacer, y tiempo de morir; tiempo de plantar, y tiempo de arrancar lo plantado[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «tiempo de arrancar de raíz lo plantado».'
