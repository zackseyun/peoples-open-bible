translation:
  language: es
  text: Y golpeó su cuello dos veces con todas sus fuerzas, y le quitó la cabeza[a], e hizo rodar su cuerpo fuera de la cama, y quitó el dosel[b] de los postes.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, más explícitamente: «le cortó la cabeza». El griego dice literalmente «le quitó la cabeza», pero el contexto deja claro que la decapitó.'
    reason: lexical_alternative
  - marker: b
    text: El término griego puede referirse a una mosquitera o a un dosel de cama.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐπάταξεν
  english_pob_choice: struck
  chosen_spanish: hirió
  alternatives_spanish:
  - golpeó
  - pegó
  lexicon: LSJ
  rationale: πατάσσω expresa un golpe violento. En español, «herir» comunica mejor la agresión contundente y el resultado lesivo en un contexto narrativo de combate, sin volverse arcaico como «golpeó» puede sonar aquí. Se preserva la fuerza del acto.
- source_word: εἰς τὸν τράχηλον
  english_pob_choice: his neck
  chosen_spanish: en el cuello
  alternatives_spanish:
  - al cuello
  - sobre el cuello
  lexicon: LSJ
  rationale: τράχηλος es «cuello». Con el verbo de golpear, el español natural es «en el cuello»; expresa el blanco del golpe sin calco innecesario.
- source_word: δὶς
  english_pob_choice: twice
  chosen_spanish: dos veces
  alternatives_spanish:
  - doblemente
  lexicon: LSJ
  rationale: Adverbio numeral directo y transparente en español.
- source_word: ἐν τῇ ἰσχύϊ αὐτῆς
  english_pob_choice: with all her strength
  chosen_spanish: con todas sus fuerzas
  alternatives_spanish:
  - con su fuerza
  - en su fuerza
  lexicon: LSJ
  rationale: La expresión comunica modo e intensidad. «Con todas sus fuerzas» reproduce de forma natural la fuerza idiomática del griego y del audit trail inglés.
- source_word: ἀφεῖλεν τὴν κεφαλὴν αὐτοῦ
  english_pob_choice: removed his head
  chosen_spanish: le quitó la cabeza
  alternatives_spanish:
  - le cortó la cabeza
  - le separó la cabeza
  lexicon: LSJ
  rationale: ἀφαιρέω significa literalmente «quitar / remover». El español «le quitó la cabeza» conserva la forma verbal cercana al griego, mientras el contexto deja claro que se trata de una decapitación. Se mantiene la tensión lexical señalada por la traducción inglesa.
- source_word: ἀπεκύλισεν
  english_pob_choice: rolled
  chosen_spanish: rodó
  alternatives_spanish:
  - hizo rodar
  - lo empujó
  lexicon: LSJ
  rationale: El verbo denota rodar o hacer rodar. «Rodó» es natural en español y conserva el movimiento físico.
- source_word: τὸ σῶμα αὐτοῦ ἀπὸ τῆς στρωμνῆς
  english_pob_choice: his body off the bed
  chosen_spanish: su cuerpo fuera de la cama
  alternatives_spanish:
  - su cuerpo fuera del lecho
  - su cadáver fuera de la cama
  lexicon: LSJ
  rationale: σῶμα es «cuerpo»; el griego no usa aquí un término específico para cadáver. στρωμνή puede ser «cama» o «lecho». «Fuera de la cama» es claro y fiel al contexto narrativo.
- source_word: ἀφεῖλε τὸ κωνώπιον ἀπὸ τῶν στύλων
  english_pob_choice: took the canopy down from the posts
  chosen_spanish: quitó el dosel de los postes
  alternatives_spanish:
  - quitó la mosquitera de los postes
  - quitó la cortina de los postes
  lexicon: LSJ
  rationale: κωνώπιον puede referirse a una mosquitera o a un dosel/canopy. En este contexto de alcoba, «dosel» ofrece una opción natural en español que no presupone de manera innecesaria la función de mosquitera, a la vez que mantiene la ambigüedad documentada.
theological_decisions:
- issue: 'Forma de la decapitación: conservar o explicitar'
  english_pob_reading: removed his head
  chosen_spanish_reading: le quitó la cabeza
  alternative_spanish_readings:
  - le cortó la cabeza
  - lo decapitó
  rationale: El audit trail inglés preserva la forma lexical amplia de ἀφαιρέω en vez de sustituirla por un verbo especializado. En español se mantiene esa cercanía con «le quitó la cabeza», dejando que el contexto narre la decapitación sin sobreespecificar la acción.
  doctrine_reference: 'Principio POB: primacía del texto original y preservación de tensiones lexicales documentadas.'
- issue: 'κωνώπιον: dosel o mosquitera'
  english_pob_reading: canopy
  chosen_spanish_reading: dosel
  alternative_spanish_readings:
  - mosquitera
  - cortina
  rationale: La nota inglesa reconoce la ambigüedad léxica entre mosquitera y dosel. En español, «dosel» funciona bien para el contexto de cámara/lecho y evita introducir una función insecticida que el pasaje no exige.
  doctrine_reference: 'Principio POB: preferir el equivalente contextual más probable sin borrar variantes documentadas.'
translation_notes:
  revision_awareness: No se aplicaron revisiones previas; este borrador sigue de cerca el audit trail inglés y el griego de Swete con equivalencia óptima y preserva las ambigüedades documentadas.
  spanish_consistency_notes:
  - Se usa «Yahvé» como norma del proyecto solo cuando el texto lo requiera; aquí no aparece.
  - Se mantiene «cabeza» en lugar de una paráfrasis como «cuello» o «cráneo», porque el griego habla de κεφαλή y el contexto exige decapitación.
  - «Dosel» se eligió por naturalidad en español, pero la nota conserva la alternativa «mosquitera» para no borrar la ambigüedad del término griego.
  - El tono es narrativo y sobrio, sin arcaísmos innecesarios.
