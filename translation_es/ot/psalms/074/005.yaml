lexical_decisions:
- source_word: יִ֭וָּדַע
  english_pob_choice: He was known
  chosen_spanish: Fue conocido
  alternatives_spanish:
  - Se dio a conocer
  - Era conocido
  - Fue reconocido
  lexicon: HALOT
  rationale: El nifal de ידע expresa aquí un estado/resultante descriptivo en pasado. En español, «Fue conocido» mantiene la voz pasiva/estativa sin añadir un sujeto explícito innecesario, y conserva la ambigüedad del referente tal como la mantiene el contexto poético.
- source_word: כְּ/מֵבִ֣יא
  english_pob_choice: like one who lifts up
  chosen_spanish: como el que levantaba
  alternatives_spanish:
  - como uno que traía
  - como el que alzaba
  - como quien subía
  lexicon: HALOT
  rationale: El כ comparativo pide «como». El participio causativo de בוא puede sugerir «el que trae», pero en este contexto de herramientas y tala la imagen natural en español es la acción de levantar o alzar el hacha. «El que levantaba» conserva el valor participial y la acción continua o característica.
- source_word: לְ/מָ֑עְלָ/ה
  english_pob_choice: high / upward
  chosen_spanish: levantaba
  alternatives_spanish:
  - hacia arriba
  - en alto
  - arriba
  lexicon: HALOT
  rationale: El adverbio indica dirección ascendente. En español se integra mejor con el verbo «levantaba» que como adverbio independiente, evitando una redundancia áspera sin perder el rasgo de elevación.
- source_word: בִּֽ/סֲבָךְ
  english_pob_choice: in a thicket
  chosen_spanish: en una espesura
  alternatives_spanish:
  - en un matorral
  - en un denso bosque
  - entre la espesura
  lexicon: HALOT
  rationale: סבך designa espesura o vegetación enmarañada. «Espesura» es natural, bíblica y suficientemente amplia para conservar la imagen de bosque cerrado. Se evita «matorral» por ser más limitado y menos solemne.
- source_word: עֵ֝֗ץ
  english_pob_choice: of trees / wood
  chosen_spanish: de árboles
  alternatives_spanish:
  - de madera
  - de leños
  - arbórea
  lexicon: HALOT
  rationale: En combinación con «espesura», עץ se entiende mejor como «árboles» y no como materia prima. «De árboles» preserva la imaginería arbórea que el audit trail inglés prefirió frente a «wood».
- source_word: קַרְדֻּמּֽוֹת
  english_pob_choice: axes
  chosen_spanish: hachas
  alternatives_spanish:
  - azadas
  - hachuelas
  - hachas de cortar
  lexicon: HALOT
  rationale: El plural de קַרְדֻּם refiere herramientas de corte. «Hachas» es el equivalente más claro y natural en español, acorde con el contexto de tala. Se evita «hachuelas» por demasiado específico o diminutivo.
translation_notes:
  revision_awareness: El audit trail inglés mantuvo la dificultad del hebreo y revisó el sujeto genérico («He/One was known») y la preposición («in a thicket»). La versión española conserva esa compactación con un pasivo estativo («Fue conocido») y una imagen forestal sobria («espesura de árboles»), sin sobreexplicar el referente.
  spanish_consistency_notes:
  - Se usa «hachas» en lugar de un tecnicismo menos común para mantener legibilidad pública.
  - Se preserva la ambigüedad del sujeto, ya que el hebreo usa 3ms y el contexto general del salmo no la resuelve de forma explícita.
  - «Espesura de árboles» sigue de cerca la imagen del texto fuente sin introducir una localización dinámica que el hebreo no exige.
