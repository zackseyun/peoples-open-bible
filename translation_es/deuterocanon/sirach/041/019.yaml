translation:
  language: es
  text: por violar un juramento y un pacto[b][a], y por apoyar el codo sobre el pan.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'El hebreo es breve y algo incierto en la segunda cláusula. El paralelo griego es más explícito: «y por poner el codo sobre los panes», lo que apoya la traducción «apoyar el codo sobre el pan».'
    reason: textual_variant
  - marker: b
    text: «Juramento» también puede entenderse como «maldición» o «adjuración», porque el término hebreo puede llevar matices de juramento con sanción.
    reason: lexical_alternative
lexical_decisions:
- source_word: מהפר
  english_pob_choice: for violating
  chosen_spanish: para no violar
  alternatives_spanish:
  - para no quebrantar
  - para no anular
  lexicon: HALOT
  rationale: El hebreo expresa la idea de quebrantar o invalidar una obligación; en español, "violar" conserva el peso moral y jurídico del contexto. El infinitivo de finalidad con negación encaja bien en la lista de acciones vergonzosas.
- source_word: אלה
  english_pob_choice: an oath
  chosen_spanish: un juramento
  alternatives_spanish:
  - una maldición
  - una adjuración
  lexicon: HALOT
  rationale: Aunque el término puede tener matiz de juramento sancionado por maldición, aquí la lectura con el paralelo griego favorece el ámbito de juramento solemne. "Juramento" es claro y fiel en español.
- source_word: וברית
  english_pob_choice: and a covenant
  chosen_spanish: y un pacto
  alternatives_spanish:
  - y una alianza
  - y un convenio
  lexicon: HALOT
  rationale: '"Pacto" preserva la fuerza relacional y obligatoria de ברית en español bíblico contemporáneo, y evita una formulación demasiado técnica o eclesiástica.'
- source_word: ממטה
  english_pob_choice: for leaning
  chosen_spanish: por apoyar
  alternatives_spanish:
  - por inclinarse
  - por recostar
  lexicon: HALOT
  rationale: La imagen es una postura corporal en la mesa. "Apoyar" comunica el gesto concreto que el griego desarrolla como 'poner/fijar el codo' sobre el pan.
- source_word: אציל
  english_pob_choice: your elbow
  chosen_spanish: el codo
  alternatives_spanish:
  - el antebrazo
  - la articulación del brazo
  lexicon: HALOT
  rationale: El griego ἀγκών confirma la referencia específica al codo. En español, el posesivo no es necesario para transmitir el sentido general del precepto.
- source_word: אל לחם
  english_pob_choice: over the bread
  chosen_spanish: sobre el pan
  alternatives_spanish:
  - encima del pan
  - sobre los panes
  lexicon: HALOT
  rationale: '"Pan" mantiene la concreción del hebreo y del griego ἄρτοι/ἄρτος en un contexto de mesa. "Sobre" reproduce la relación espacial sin sobre-explicar la costumbre.'
theological_decisions:
- issue: Relación entre juramento, maldición y adjuración en אלה
  english_pob_reading: '''An oath'' could also be rendered ''a curse'' or ''an adjuration,'' since the Hebrew term can carry oath-curse overtones.'
  chosen_spanish_reading: un juramento
  alternative_spanish_readings:
  - una maldición
  - una adjuración
  rationale: La línea de sentido más probable aquí es la de juramento solemne ligado a una obligación pactal. Se conserva la tensión semántica en las alternativas, pero el texto principal opta por la lectura más natural en español y coherente con el paralelo griego.
  doctrine_reference: HALOT; paralelo griego ἀληθείας θεοῦ καὶ διαθήκης
translation_notes:
  revision_awareness: Se siguió la pauta del POB inglés de mantener la tensión textual de la segunda cláusula y de conservar la posible ambivalencia léxica de אלה. No se adoptó una formulación más libre; se prefirió una equivalencia óptima que refleje el hebreo breve con apoyo del paralelo griego.
  spanish_consistency_notes:
  - Se emplea «pacto» para ברית, en coherencia con el uso bíblico estándar en español y con la elección inglesa de covenant.
  - Se usa «pan» en singular, siguiendo el giro concreto de la imagen de mesa y manteniendo la sobriedad del hebreo/greek parallel.
  - La nota a mantiene la decisión textual principal; la nota b preserva la ambivalencia semántica sin imponer una sola opción.
