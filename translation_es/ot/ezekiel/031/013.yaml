translation:
  language: es
  text: Sobre su tronco caído[a] habitarán todas las aves de los cielos, y sobre sus ramas[b] estarán todas las bestias del campo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «sobre su caída habitarán todas las aves de los cielos». El sustantivo hebreo también puede entenderse de manera más abstracta, pero la imagen del árbol en este contexto favorece el sentido concreto de «tronco caído».
    reason: lexical_alternative
  - marker: b
    text: O «sus ramas mayores».
    reason: lexical_alternative
lexical_decisions:
- source_word: מַפַּלְתּוֹ
  english_pob_choice: its fallen trunk
  chosen_spanish: su tronco caído
  alternatives_spanish:
  - su caída
  - su derribo
  - su ruina
  lexicon: HALOT
  rationale: El sustantivo derivado de נפל puede expresar la caída misma o el objeto caído. En esta metáfora arbórea, el contexto inmediato habla del árbol abatido, por lo que «tronco caído» conserva la imagen concreta mejor que una abstracción como «ruina» o «caída».
- source_word: יִשְׁכְּנ֖וּ
  english_pob_choice: will dwell
  chosen_spanish: habitarán
  alternatives_spanish:
  - se alojarán
  - se posarán
  - morarán
  lexicon: HALOT
  rationale: שׁכן suele significar habitar, morar o establecerse. «Habitarán» comunica de forma natural la permanencia de las aves en el lugar sin perder el sentido de asentarse.
- source_word: עוֹף הַשָּׁמַיִם
  english_pob_choice: the birds of the heavens
  chosen_spanish: las aves de los cielos
  alternatives_spanish:
  - las aves del cielo
  - las aves de los cielos
  - las aves celestiales
  lexicon: HALOT
  rationale: Se mantiene la imagen hebrea de «cielos» en plural, frecuente en lenguaje profético. «Aves de los cielos» refleja con más cercanía la construcción original que «aves del cielo».
- source_word: פֹּארֹתָיו
  english_pob_choice: its boughs
  chosen_spanish: sus ramas
  alternatives_spanish:
  - sus boughs
  - sus gajos
  - sus ramas mayores
  lexicon: HALOT
  rationale: El término se refiere a ramas extendidas o mayores. En español, «ramas» es la opción más clara y natural para lectores amplios; «boughs» no es idiomático, y «ramas mayores» sería más explicativo que el hebreo.
- source_word: הָיוּ
  english_pob_choice: will be
  chosen_spanish: estarán
  alternatives_spanish:
  - serán
  - habrán de estar
  lexicon: HALOT
  rationale: Aunque la forma verbal es qatal, en este contexto profético funciona con sentido futuro en paralelo con יִשְׁכְּנוּ. «Estarán» mantiene ese valor prospectivo y suena natural en español.
- source_word: חַיַּת הַשָּׂדֶה
  english_pob_choice: the beasts of the field
  chosen_spanish: las bestias del campo
  alternatives_spanish:
  - los animales del campo
  - las fieras del campo
  - los animales silvestres del campo
  lexicon: HALOT
  rationale: Es una collocación bíblica tradicional. «Bestias del campo» conserva el registro y la amplitud del hebreo sin restringirlo innecesariamente a «fieras».
- source_word: עַל ... וְאֶל
  english_pob_choice: On ... and on
  chosen_spanish: Sobre ... y sobre
  alternatives_spanish:
  - En ... y en
  - Sobre ... y hacia
  lexicon: HALOT
  rationale: La primera preposición es claramente espacial («sobre»). La segunda, aunque formalmente puede ser «a/toward», aquí introduce el lugar donde se posan las bestias; por eso «sobre» comunica mejor la imagen en español.
translation_notes:
  revision_awareness: La redacción sigue de cerca el texto hebreo y la solución inglesa auditada, manteniendo la metáfora del árbol abatido y la ocupación de aves y bestias sin añadir explicaciones interpretativas. No se detectaron revisiones posteriores que alteren esta lectura.
  spanish_consistency_notes:
  - 'Se mantuvo el paralelismo futuro de la línea poética con verbos en futuro simple: «habitarán» / «estarán».'
  - Se prefirió «aves de los cielos» para conservar la dicción profética del hebreo y la pluralidad de הַשָּׁמַיִם.
  - «Bestias del campo» conserva el registro bíblico, coherente con el español del proyecto.
