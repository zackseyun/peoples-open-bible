translation:
  language: es
  text: Apresúrate al tiempo y recuerda el juramento[a][b], y que ellos recuenten tus hechos poderosos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: La validación de la fuente marca este versículo con incertidumbre textual ('major mismatch'). Esta traducción sigue el griego transmitido sin reconstrucción conjetural.
    reason: textual_variant
  - marker: b
    text: 'O: «el tiempo señalado» para «el tiempo» (griego καιρόν).'
    reason: lexical_alternative
lexical_decisions:
- source_word: σπεῦσον
  english_pob_choice: Hasten
  chosen_spanish: Apresúrate
  alternatives_spanish:
  - Date prisa
  - Apresúrate con rapidez
  lexicon: LSJ
  rationale: El imperativo aoristo expresa urgencia. «Apresúrate» transmite con naturalidad en español la prontitud exigida, sin perder el tono exhortativo elevado.
- source_word: καιρὸν
  english_pob_choice: the time
  chosen_spanish: el tiempo
  alternatives_spanish:
  - el momento
  - el tiempo señalado
  - el tiempo oportuno
  lexicon: LSJ
  rationale: El griego καιρός puede ser «momento oportuno» o «tiempo señalado». «El tiempo» mantiene la amplitud semántica y deja abierta la precisión contextual, como en el inglés POB.
- source_word: μνήσθητι
  english_pob_choice: remember
  chosen_spanish: recuerda
  alternatives_spanish:
  - acuérdate de
  - ten presente
  lexicon: LSJ
  rationale: El imperativo medio de μιμνῄσκομαι pide acto de memoria consciente. «Recuerda» es directo, idiomático y fiel al valor exhortativo.
- source_word: ὁρκισμοῦ
  english_pob_choice: the oath
  chosen_spanish: el juramento
  alternatives_spanish:
  - la promesa jurada
  - el juramento solemne
  lexicon: LSJ
  rationale: Ὁρκισμός apunta a un juramento o compromiso jurado. «Juramento» es la equivalencia más natural en español y conserva la fuerza vinculante del término.
- source_word: ἐκδιηγησάσθωσαν
  english_pob_choice: let them recount
  chosen_spanish: que ellos recuenten
  alternatives_spanish:
  - que ellos declaren en detalle
  - que ellos cuenten plenamente
  lexicon: LSJ
  rationale: El verbo sugiere narrar con amplitud o dar un relato completo. «Recuenten» conserva la idea de relatar, y la construcción con «que ellos» reproduce bien el imperativo jussivo.
- source_word: τὰ μεγαλεῖά σου
  english_pob_choice: your mighty deeds
  chosen_spanish: tus hechos poderosos
  alternatives_spanish:
  - tus grandes obras
  - tus obras poderosas
  lexicon: LSJ
  rationale: τὰ μεγαλεῖα alude a grandes obras o acciones poderosas dignas de alabanza. «Hechos poderosos» retiene el valor de actos realizados con poder, evitando una abstracción como «grandezas».
theological_decisions:
- issue: Referente del discurso y del lenguaje de alabanza
  english_pob_reading: 'Render the verse as an address to God: ''your mighty deeds.'''
  chosen_spanish_reading: 'Se mantiene el habla dirigida a Dios: «tus hechos poderosos».'
  alternative_spanish_readings:
  - Dejar el referente implícito sin explicitarlo
  - usar una fórmula más devocional con un título divino añadido
  rationale: El texto griego usa segunda persona y lenguaje de obras poderosas, propio de oración o alabanza dirigida a Dios. El español conserva ese referente sin introducir títulos que no están en el versículo.
  doctrine_reference: Preservar la tensión teológica del texto sin ampliarla más allá de la evidencia.
- issue: Incertidumbre textual señalada por la validación de fuente
  english_pob_reading: Translate the extant Greek as given, while noting textual uncertainty in a footnote.
  chosen_spanish_reading: Se traduce el griego transmitido y se avisa la incertidumbre textual en nota.
  alternative_spanish_readings:
  - Reconstruir un texto hebreo hipotético
  - silenciar la advertencia crítica
  rationale: La validación marca el versículo como de desajuste mayor, por lo que conviene transparentar la inestabilidad textual sin abandonar el testimonio griego disponible.
  doctrine_reference: Primacía de la fuente original y transparencia crítica.
translation_notes:
  revision_awareness: Se siguió el testimonio griego de Swete tal como está transmitido, en concordancia con la auditoría inglesa. La nota textual se conserva porque la validación de la fuente señala desajuste mayor, y la alternativa sobre καιρός se mantiene para no cerrar indebidamente su matiz.
  spanish_consistency_notes:
  - Se emplea «Yahvé» como norma general del proyecto solo cuando el texto lo requiere; aquí el versículo no contiene el nombre divino explícito, por lo que no se introduce ninguna designación adicional.
  - «Juramento» conserva el valor jurídico-covenantal de ὁρκισμός sin suavizarlo a una simple promesa.
  - «Hechos poderosos» mantiene la relación con τὰ μεγαλεῖά σου y evita una paráfrasis devocional excesiva.
  - La construcción jussiva «que ellos recuenten» refleja el mandato de tercera persona del griego.
