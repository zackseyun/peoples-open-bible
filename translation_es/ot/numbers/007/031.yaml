revisions:
- from: Su ofrenda fue un plato[a] de plata, de ciento treinta siclos de peso; un tazón[b] de plata de setenta siclos, según[c] el siclo del santuario; ambos estaban llenos de flor de harina mezclada con aceite, para una ofrenda vegetal.
  to: Su ofrenda fue un plato[a] de plata, de ciento treinta siclos de peso; un tazón[b] de plata de setenta siclos, según el siclo del santuario[c]; ambos estaban llenos de flor de harina mezclada con aceite, para una ofrenda de cereal.
  rationale: Se corrige la nota [a] para reflejar una alternativa léxica real en español sin repetir la lectura principal ni introducir una opción no sustentada; se reubica [c] al sintagma completo 'el siclo del santuario' para anclar mejor la nota cultural; y se cambia 'ofrenda vegetal' por 'ofrenda de cereal' para mayor precisión semántica y mejor alineación con מִנְחָה / 'grain offering'.
  reviewer_model: gpt-5.4
