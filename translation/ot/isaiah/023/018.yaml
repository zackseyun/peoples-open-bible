id: ISA.23.18
reference: Isaiah 23:18
source:
  edition: WLC
  text: וְ/הָיָ֨ה סַחְרָ֜/הּ וְ/אֶתְנַנָּ֗/הּ קֹ֚דֶשׁ לַֽ/יהוָ֔ה לֹ֥א יֵֽאָצֵ֖ר וְ/לֹ֣א יֵֽחָסֵ֑ן כִּ֣י לַ/יֹּשְׁבִ֞ים לִ/פְנֵ֤י יְהוָה֙ יִֽהְיֶ֣ה סַחְרָ֔/הּ לֶ/אֱכֹ֥ל לְ/שָׂבְעָ֖ה וְ/לִ/מְכַסֶּ֥ה עָתִֽיק׃פ
translation:
  text: And her merchandise and her wages will be holy to Yahweh[a]; they will not be stored up or hoarded, for her merchandise will be for those who dwell before Yahweh[b], for eating to satisfaction and for durable clothing.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'her hire.' The term can denote payment or hire and may echo the chapter's imagery of Tyre as a prostitute.
    reason: lexical_alternative
  - marker: b
    text: Or 'for durable clothing,' 'for stately clothing,' or 'for ample covering.' The final phrase is difficult, especially the adjective 'lasting/choice/ancient.'
    reason: lexical_alternative
lexical_decisions:
- source_word: סַחְרָהּ
  chosen: her merchandise
  alternatives:
  - her trade
  - her profit
  - her gain
  lexicon: HALOT
  rationale: The noun refers to commercial trade or merchandise. 'Merchandise' fits the Tyre-oracle context of commerce better than the more abstract 'gain' or 'profit.'
- source_word: אֶתְנַנָּהּ
  chosen: her wages
  alternatives:
  - her hire
  - her earnings
  lexicon: HALOT
  rationale: The term often denotes hire or payment, sometimes with morally charged overtones in contexts of prostitution. Here, paired with 'merchandise' in the oracle against Tyre, 'wages' is clear modern English while preserving the idea of commercial proceeds. The alternative 'hire' is possible and worth preserving because of the chapter's imagery.
- source_word: קֹדֶשׁ לַיהוָה
  chosen: holy to the LORD
  alternatives:
  - set apart to the LORD
  - consecrated to the LORD
  lexicon: HALOT
  rationale: This phrase denotes dedication to YHWH. 'Holy to the LORD' is concise and preserves the cultic force of consecration without over-paraphrasing. Per doctrine, יהוה is rendered 'the LORD.'
- source_word: יֵאָצֵר
  chosen: be stored up
  alternatives:
  - be treasured up
  - be gathered up
  lexicon: HALOT
  rationale: Niphal of אצר conveys being stored or accumulated. 'Stored up' is natural English and pairs well with the following verb to express non-accumulation.
- source_word: יֵחָסֵן
  chosen: be hoarded
  alternatives:
  - be laid up
  - be kept in reserve
  lexicon: HALOT
  rationale: The verb conveys storing up wealth or treasure. Rendering it as 'hoarded' differentiates it from the previous verb while preserving the parallel sense of accumulation.
- source_word: לַיֹּשְׁבִים לִפְנֵי יְהוָה
  chosen: for those who dwell before the LORD
  alternatives:
  - for those who sit before the LORD
  - for those who live in the presence of the LORD
  lexicon: HALOT
  rationale: The participle from ישב commonly means dwell/live. 'Before the LORD' preserves the covenantal-cultic sense of living in his presence without over-interpreting the referent.
- source_word: לֶאֱכֹל לְשָׂבְעָה
  chosen: for eating to satisfaction
  alternatives:
  - for food in abundance
  - to eat their fill
  lexicon: HALOT
  rationale: The phrase expresses eating unto fullness/satiety. 'For eating to satisfaction' is slightly formal but closely tracks the Hebrew syntax and sense.
- source_word: לִמְכַסֶּה עָתִיק
  chosen: for lasting clothing
  alternatives:
  - for durable clothing
  - for stately clothing
  - for ample covering
  lexicon: HALOT
  rationale: מכסה is a covering/garment, and עתיק likely conveys enduring, lasting, or choice quality. 'Lasting clothing' best captures a practical sense of durable provision without importing excessive interpretive detail. Because the adjective is somewhat rare and debated, alternatives are preserved in a footnote.
