review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien la estructura y el sentido general del hebreo: vocativo afectuoso, doble localización poética, dos peticiones paralelas y la razón final sobre voz y aspecto. Sin embargo, hay dos desajustes principales con el rastro auditado: (1) la nota [a] quedó anclada en el vocativo equivocado, pues el inglés base eligió claramente ''My dove'' y la alternativa menor es ''pigeon''; en español, ''Palomita mía'' introduce un diminutivo no presente en la evidencia y desplaza innecesariamente el término base. (2) ''suave'' para עָרֵב es aceptable pero atenúa el matiz poético de ''sweet''; en este contexto amoroso, ''dulce'' preserva mejor la fuerza semántica y la decisión léxica auditada.'
  spanish_quality_summary: El texto es fluido y legible en español contemporáneo. 'En las hendiduras de la roca' y 'en el escondite del precipicio' son naturales y poéticos. No obstante, 'palomita mía' suena más interpretativo y coloquial que el hebreo y que el estilo digno solicitado. Además, 'apariencia' es fiel pero algo fría en español bíblico; 'aspecto' suena un poco más natural sin perder amplitud semántica. La frase resultante gana en dignidad y naturalidad con 'Paloma mía' y 'aspecto'.
  glossary_alignment: 'No hay términos teológicos especiales en juego. La revisión propuesta sigue mejor las decisiones léxicas documentadas: יוֹנָתִי -> ''Paloma mía''; עָרֵב -> ''dulce''; מַרְאַיִךְ / מַרְאֵיךְ -> ''aspecto'' como equivalente amplio y repetido de manera coherente. Se preserva la alternativa ''rostro'' en nota, y se mantiene la incertidumbre de מַדְרֵגָה en la nota [a].'
  issues:
  - severity: medium
    issue: '''Palomita mía'' añade un diminutivo no sustentado por el hebreo ni por la auditoría inglesa.'
    rationale: יוֹנָתִי significa literalmente 'mi paloma'. El diminutivo intensifica ternura de forma interpretativa y reduce la neutralidad poética pedida.
  - severity: medium
    issue: La nota [a] en el vocativo no corresponde a la nota inglesa auditada.
    rationale: La nota inglesa [a] trata sobre בְּסֵתֶר הַמַּדְרֵגָה ('cliff/steep path/precipice'), no sobre יוֹנָתִי. En español, el marcador debe moverse a la frase topográfica pertinente.
  - severity: low
    issue: '''Suave'' para la voz debilita el valor de עָרֵב frente a la decisión inglesa ''sweet''.'
    rationale: En un contexto amoroso y poético, 'dulce' es más cercano semántica y estilísticamente que 'suave', que enfatiza textura/tono más que agrado dulce.
  - severity: low
    issue: '''Apariencia'' es fiel pero algo rígida en español literario aquí.'
    rationale: El hebreo alude al aspecto visible o semblante. 'Aspecto' conserva amplitud y suena más natural en español de lectura eclesial contemporánea.
