  to: Y los de las casas salían apresuradamente en grupos para una súplica pública[a], porque el lugar estaba a punto de caer en desprecio.
  rationale: 'Se ajusta la primera cláusula para reflejar más fielmente la distribución del sentido en griego: οἱ δὲ ἐκ τῶν οἰκιῶν = «los de las casas», y ἐξεπήδων = «salían apresuradamente». Así se preserva mejor la viveza del original sin perder naturalidad en español. Se mantiene «súplica pública» y «el lugar» con la nota explicativa, en línea con el POB inglés.'
