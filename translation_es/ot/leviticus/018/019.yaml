review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien la estructura del hebreo: prohibición legal de acercarse a una mujer en estado de impureza menstrual con el propósito de ‘descubrir su desnudez’. Conserva el eufemismo legal de Levítico 18 y el carácter ritual de טֻמְאָה en términos generales. Sin embargo, la nota al pie introduce una alternativa menos natural en español (‘impureza ritual menstrual’) y conviene afinarla para preservar mejor la relación entre ‘menstrual’ e ‘impureza’ sin sonar forzada.'
  spanish_quality_summary: El texto principal es claro, natural y digno en español. ‘No te acercarás a una mujer durante su impureza menstrual’ funciona bien y evita un calco torpe. ‘Para descubrir su desnudez’ es idiomático y fiel al eufemismo jurídico. La mejora necesaria es menor y afecta sobre todo a la formulación de la nota alternativa, para que el español sea más natural y refleje mejor la explicación auditada en inglés.
  glossary_alignment: No hay conflictos con los términos por defecto del proyecto. El verso no contiene Yahvé, Mesías/Cristo, espíritu, etc. La decisión de usar ‘impureza’ para טֻמְאָה está alineada con la racionalidad teológica documentada, siempre que se explique como categoría ritual y no médica o moral.
  issues:
  - severity: medium
    issue: La nota al pie ofrece ‘impureza ritual menstrual’, formulación poco natural en español.
    rationale: Aunque busca explicitar la categoría ritual, en español suena más claro ‘impureza menstrual’ en el texto y, como alternativa, ‘durante la impureza de su menstruación’ o una explicación separada sobre el lenguaje ritual. La nota inglesa da una alternativa léxica y luego una explicación; conviene mantener esa distinción sin crear una frase española torpe.
  - severity: low
    issue: La nota dice ‘lenguaje de pureza ritual’, mientras el contraste relevante es pureza/impureza ritual.
    rationale: No es un error grave, pero la explicación puede ser más precisa si menciona explícitamente la categoría ritual de pureza e impureza, tal como la documentación inglesa la describe.
  revised_spanish_text: No te acercarás a una mujer durante su impureza menstrual, para descubrir su desnudez[a].
  revised_footnotes:
  - marker: a
    text: 'O: «durante la impureza de su menstruación». El hebreo usa lenguaje ritual de pureza e impureza.'
    reason: lexical_alternative
  revision_rationale: Se conserva el texto principal porque es fiel, claro y natural. Solo se ajusta la nota al pie para ofrecer una alternativa léxica más idiomática en español y una explicación más precisa del trasfondo ritual del hebreo.
