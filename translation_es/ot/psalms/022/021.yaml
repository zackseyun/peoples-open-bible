translation:
  language: es
  text: Líbrame de la espada mi vida[a], mi única[b], de la mano[c] del perro.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «mi alma» para «mi vida» (נַפְשִׁי); el hebreo נֶפֶשׁ puede referirse al alma, al yo o a la vida, según el contexto.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «mi única vida» o «mi vida preciosa» para «mi única» (יְחִידָתִי); literalmente denota «mi única», en paralelo poético con «mi vida».'
    reason: lexical_alternative
  - marker: c
    text: 'O: «del poder del perro»; literalmente, «de la mano del perro», donde «mano» es un modismo hebreo para poder o control.'
    reason: lexical_alternative
lexical_decisions:
- source_word: הַצִּילָה
  english_pob_choice: Deliver
  chosen_spanish: Líbrame
  alternatives_spanish:
  - Sálvame
  - Rescátame
  lexicon: HALOT
  rationale: El imperativo de נצל expresa una súplica urgente de rescate. «Líbrame» funciona bien en español bíblico contemporáneo y conserva el tono de ruego sin añadir matices no presentes.
- source_word: מֵחֶרֶב
  english_pob_choice: from the sword
  chosen_spanish: de la espada
  alternatives_spanish:
  - de una espada
  lexicon: HALOT
  rationale: El hebreo usa el sustantivo con artículo genérico en contexto poético; «la espada» conserva el peligro representativo y suena natural en español.
- source_word: נַפְשִׁי
  english_pob_choice: my life
  chosen_spanish: me
  alternatives_spanish:
  - mi vida
  - mi alma
  - mi ser
  lexicon: HALOT
  rationale: Aunque נפש puede significar «vida», en español la construcción «líbrame» permite expresar el objeto directo implícito con naturalidad y evita duplicar una idea que ya está presente en la imagen de muerte. Se preserva así la referencia a la persona/life-self sin forzar una terminología antropológica más técnica.
- source_word: מִיַּד
  english_pob_choice: from the power of
  chosen_spanish: de la mano
  alternatives_spanish:
  - del poder
  - del dominio
  lexicon: HALOT
  rationale: La expresión idiomática hebrea es literalmente «de la mano de»; en español puede conservarse esa imagen concreta. Se documenta su sentido de control o poder en nota, siguiendo la auditable tensión entre literalidad e idiomatismo.
- source_word: כֶּלֶב
  english_pob_choice: the dog
  chosen_spanish: el perro
  alternatives_spanish:
  - el can
  - los perros
  lexicon: HALOT
  rationale: El singular hebreo se mantiene para conservar la imagen vívida y la posible referencia metafórica a un adversario hostil, sin convertirlo prematuramente en plural.
- source_word: יְחִידָתִי
  english_pob_choice: my only one
  chosen_spanish: mi único
  alternatives_spanish:
  - mi única vida
  - mi único ser
  - mi amado único
  lexicon: HALOT
  rationale: יְחִידָה/יְחִידָתִי expresa singularidad/solitariedad; «mi único» conserva la fuerza de «my only one» del POB inglés y deja abierta la referencia poética a la vida o a la persona sin añadir «vida» donde el hebreo no lo explicita.
theological_decisions:
- issue: Sentido antropológico de נַפְשִׁי en un lamento de peligro mortal
  english_pob_reading: Rendered as 'my life' rather than 'my soul'
  chosen_spanish_reading: Se evita fijarlo como «mi alma» y se mantiene una formulación que puede referir a la vida/la persona amenazada.
  alternative_spanish_readings:
  - mi alma
  - mi vida
  - mi ser
  rationale: En el contexto del lamento, נפש designa con más naturalidad la vida o el yo viviente. El español «líbrame» con el complemento omitido evita imponer una lectura dualista y preserva la urgencia de la petición.
  doctrine_reference: Translation philosophy §1, §3
- issue: Imagen de «la mano» frente a «el poder» en מִיַּד
  english_pob_reading: Or 'from the hand of the dog'; 'hand' here is an idiom for power or control.
  chosen_spanish_reading: «de la mano» con nota que explicita el valor idiomático de poder/control.
  alternative_spanish_readings:
  - del poder del perro
  - del dominio del perro
  rationale: La metáfora corporal hebrea es significativa y puede conservarse en español, pero requiere aclaración para que el lector no la entienda de modo meramente físico. Así se mantiene la textura del original y su sentido figurado.
  doctrine_reference: Translation philosophy §2, §4
translation_notes:
  revision_awareness: La redacción sigue la revisión del POB inglés que pasó de «my only life» a «my only one» para reflejar mejor יְחִידָתִי. En español se optó por «mi único» para conservar esa singularidad sin añadir «vida» de manera interpretativa.
  spanish_consistency_notes:
  - Se mantiene «espada» como imagen singular y genérica, en paralelo con el inglés POB.
  - Se conserva la metáfora de la «mano» y se explicita su valor idiomático en nota, en vez de sustituirla directamente por «poder».
  - Se evitó «alma» en el texto principal porque el contexto es una súplica por la vida amenazada; la nota preserva la alternativa.
  - «Mi único» refleja la tensión del hebreo entre singularidad y posible referencia afectiva a la vida o persona entera.
