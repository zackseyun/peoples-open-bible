translation:
  language: es
  text: Porque la sentencia contra una mala acción no se ejecuta rápidamente, por lo tanto el corazón de los hijos del hombre[a] está plenamente dispuesto[b] en ellos para hacer el mal.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «los hijos de los hombres», es decir, la humanidad en general. Se conserva la forma representativa del hebreo.
    reason: lexical_alternative
  - marker: b
    text: El hebreo literalmente dice que el corazón está «lleno» en ellos para hacer el mal, una expresión que comunica una determinación asentada o una inclinación envalentonada hacia el mal.
    reason: lexical_alternative
lexical_decisions:
- source_word: פִתְגָם
  english_pob_choice: sentence
  chosen_spanish: sentencia
  alternatives_spanish:
  - decreto
  - veredicto
  - fallo
  lexicon: HALOT
  rationale: 'El contexto es judicial: se trata de una declaración oficial contra una acción mala. “Sentencia” conserva ese sentido jurídico en español y corresponde bien al inglés POB “sentence”.'
- source_word: מַעֲשֵׂה הָרָעָה
  english_pob_choice: an evil deed
  chosen_spanish: una obra mala
  alternatives_spanish:
  - un acto malo
  - una obra de maldad
  - un hecho malo
  lexicon: HALOT
  rationale: La cadena constructa expresa literalmente “obra/deed de maldad”. “Obra mala” mantiene la relación nominal y la fuerza moral del hebreo sin sonar excesivamente técnica en español.
- source_word: נַעֲשָׂה
  english_pob_choice: is carried out
  chosen_spanish: se ejecuta
  alternatives_spanish:
  - se hace
  - se realiza
  - se lleva a cabo
  lexicon: HALOT
  rationale: Aquí el pasivo no significa simplemente “hacerse”, sino la aplicación efectiva de la sentencia. “Se ejecuta” comunica bien la puesta en vigor judicial que el POB inglés quiso expresar con “is carried out”.
- source_word: מְהֵרָה
  english_pob_choice: quickly
  chosen_spanish: rápidamente
  alternatives_spanish:
  - pronto
  - velozmente
  - de inmediato
  lexicon: HALOT
  rationale: Adverbio de tiempo/modo que indica ausencia de demora. “Rápidamente” es natural y fiel al valor adverbial.
- source_word: עַל כֵּן
  english_pob_choice: therefore
  chosen_spanish: por eso
  alternatives_spanish:
  - por tanto
  - así que
  - de manera que
  lexicon: HALOT
  rationale: Marca consecuencia directa entre la demora de la justicia y la disposición al mal. “Por eso” mantiene la relación lógica en un español fluido.
- source_word: לֵב
  english_pob_choice: heart
  chosen_spanish: corazón
  alternatives_spanish:
  - corazón/mente
  - interior
  - ánimo
  lexicon: HALOT
  rationale: En español bíblico “corazón” conserva el centro volitivo e ինտencional del ser humano que el hebreo לֵב denota, sin reducirlo a emoción.
- source_word: בְּנֵי הָאָדָם
  english_pob_choice: the sons of man
  chosen_spanish: los hijos de los hombres
  alternatives_spanish:
  - los hijos del hombre
  - los seres humanos
  - la humanidad
  lexicon: HALOT
  rationale: Se conserva la expresión representativa masculina del hebreo, siguiendo la decisión auditada del POB inglés de no neutralizar אָדָם aquí. “Los hijos de los hombres” suena más bíblico y fiel que una generalización.
- source_word: בָּהֶם
  english_pob_choice: in them
  chosen_spanish: en ellos
  alternatives_spanish:
  - dentro de ellos
  - entre ellos
  lexicon: HALOT
  rationale: El pronombre remite a los “hijos de los hombres” y expresa una disposición interior; “en ellos” preserva esa ubicación interna.
- source_word: מָלֵא ... לַעֲשׂוֹת רָע
  english_pob_choice: is fully set in them to do evil
  chosen_spanish: está plenamente dispuesto en ellos para hacer el mal
  alternatives_spanish:
  - está lleno en ellos para hacer el mal
  - está resuelto en ellos a hacer el mal
  - está embebido en ellos para hacer el mal
  lexicon: HALOT
  rationale: El hebreo usa la imagen de estar “lleno” con el sentido de inclinación o resolución establecida. “Está plenamente dispuesto” intenta conservar la metáfora y el resultado volitivo sin exagerar hacia una paráfrasis psicológica.
- source_word: רָע
  english_pob_choice: evil
  chosen_spanish: el mal
  alternatives_spanish:
  - maldad
  - lo malo
  - mal
  lexicon: HALOT
  rationale: Mantiene la correspondencia con “obra mala” y la fuerza moral del término hebreo, usando una forma natural en español.
theological_decisions:
- issue: Renderización de בְּנֵי הָאָדָם como expresión genérica de humanidad sin neutralizarla
  english_pob_reading: the sons of man
  chosen_spanish_reading: los hijos de los hombres
  alternative_spanish_readings:
  - los seres humanos
  - la humanidad
  - los hijos de la humanidad
  rationale: El POB inglés decidió mantener la forma representativa masculina del hebreo por fidelidad al texto y a su política sobre אָדָם. La versión española preserva esa misma decisión con una expresión bíblica y reconocible, sin convertirla en un genérico moderno que borre la forma original.
  doctrine_reference: DOCTRINE.md Translation philosophy §4; Contested terms table for אָדָם
- issue: Sentido de la frase idiomática sobre el corazón ‘lleno’
  english_pob_reading: the heart ... is fully set in them to do evil
  chosen_spanish_reading: el corazón ... está plenamente dispuesto en ellos para hacer el mal
  alternative_spanish_readings:
  - el corazón ... está lleno en ellos para hacer el mal
  - el corazón ... está resuelto en ellos para hacer el mal
  rationale: 'El hebreo presenta una imagen de plenitud que desemboca en inclinación firme al mal. La traducción española intenta respetar esa tensión: no la reduce a mera emoción ni la convierte en un simple acto externo, sino que refleja una disposición interior estabilizada.'
  doctrine_reference: Ecclesiastes 8:11 lexical audit; HALOT on idiomatic מלא + infinitive
translation_notes:
  revision_awareness: 'El borrador sigue de cerca el texto hebreo de WLC y la auditoría inglesa, sin cambios necesarios respecto al último pase revisado. Se preservan dos tensiones relevantes: el sentido judicial de פִתְגָם y la metáfora de corazón “lleno” que expresa disposición firme al mal.'
  spanish_consistency_notes:
  - Se mantiene “Yahvé” cuando aparezca el nombre divino en otros contextos; aquí no hay un equivalente directo en el versículo.
  - Se usa “mal” para רָע, coherente con la redacción de la obra mala y con el registro bíblico en español.
  - Se evita “siervo” o cualquier suavización de léxico que no corresponda a este versículo.
  - 'La puntuación reproduce la lógica causal del hebreo: causa seguida de consecuencia.'
