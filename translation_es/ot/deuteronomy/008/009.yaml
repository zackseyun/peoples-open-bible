translation:
  language: es
  text: una tierra en la que no comerás pan en pobreza[a], en la que no te faltará nada; una tierra cuyas piedras son hierro, y de cuyos montes extraerás cobre[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «en escasez» / «en necesidad» para «en pobreza».
    reason: lexical_alternative
  - marker: b
    text: El hebreo neḥoshet puede significar «cobre» o «bronce»; aquí se prefiere «cobre» porque el versículo habla de material extraído de los montes.
    reason: lexical_alternative
lexical_decisions:
- source_word: בְמִסְכֵּנֻת
  english_pob_choice: in poverty
  chosen_spanish: en pobreza
  alternatives_spanish:
  - en escasez
  - en necesidad
  - en penuria
  lexicon: HALOT
  rationale: El sustantivo expresa pobreza, necesidad o carencia. «En pobreza» conserva la fuerza concreta del hebreo y corresponde bien al valor que el POB inglés fijó como principal, evitando una paráfrasis demasiado suave.
- source_word: לֶחֶם
  english_pob_choice: bread
  chosen_spanish: pan
  alternatives_spanish:
  - alimento
  - comida
  lexicon: HALOT
  rationale: El sentido básico es «pan». Aunque puede extenderse a alimento en general, aquí conviene mantener el término concreto para respetar la imagen del texto hebreo y la decisión del POB inglés.
- source_word: תֶחְסַר כֹּל
  english_pob_choice: you will lack nothing
  chosen_spanish: no te faltará nada
  alternatives_spanish:
  - no carecerás de nada
  - no te faltará cosa alguna
  lexicon: HALOT
  rationale: La expresión comunica suficiencia total. «No te faltará nada» es natural en español y preserva el valor totalizador de כֹּל sin volverlo artificial.
- source_word: אֲבָנֶיהָ בַרְזֶל
  english_pob_choice: whose stones are iron
  chosen_spanish: cuyas piedras son hierro
  alternatives_spanish:
  - cuyas piedras son de hierro
  - cuyas rocas son hierro
  lexicon: HALOT
  rationale: El hebreo es breve y apposicional. La construcción española mantiene la imagen literal de piedras asociadas con hierro, siguiendo la lectura auditable del POB inglés y sin añadir explicaciones interpretativas.
- source_word: תַּחְצֹב
  english_pob_choice: you will quarry
  chosen_spanish: sacarás
  alternatives_spanish:
  - cavarás
  - extraerás
  - canterearás
  lexicon: HALOT
  rationale: En español, «sacarás» transmite de forma natural la acción de extraer material de los montes. «Quarry» en inglés enfatiza la extracción de cantera; aquí se conserva la idea sin emplear un verbo técnico poco idiomático.
- source_word: נְחֹשֶׁת
  english_pob_choice: copper
  chosen_spanish: cobre
  alternatives_spanish:
  - bronce
  lexicon: HALOT
  rationale: Como en el POB inglés, «cobre» es preferible en este contexto de recursos naturales extraídos de la tierra, ya que bronce es una aleación y no algo que se extrae directamente de los montes.
translation_notes:
  revision_awareness: El testimonio de revisión indica alta concordancia y ningún cambio necesario respecto del pasaje base; por ello, el borrador sigue de cerca la lectura aprobada del POB inglés, adaptándola a un español natural sin introducir ampliaciones.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma del proyecto solo cuando aparezca el Tetragrámaton; este versículo no lo contiene.
  - Se conserva el paralelismo de las dos cláusulas con «una tierra...», siguiendo la estructura del hebreo.
  - «Cobre» se mantiene por coherencia con la decisión auditada del POB inglés, aunque en otros contextos bíblicos נְחֹשֶׁת puede ser «bronce».
