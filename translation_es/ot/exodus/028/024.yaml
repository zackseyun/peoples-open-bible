translation:
  language: es
  text: Y pondrás las dos cadenas trenzadas[a] de oro sobre los dos anillos, en los extremos del pectoral[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «cadenas retorcidas»; tradicionalmente, «cadenas entretejidas».
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo חֹשֶׁן: pieza sacerdotal del pecho; no una coraza o armadura. Tradicionalmente también se ha dicho «pectoral» o «placa del pecho», pero aquí se refiere a una pieza ornamental y funcional del vestuario sacerdotal.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְנָתַתָּה
  english_pob_choice: And you shall put
  chosen_spanish: Y pondrás
  alternatives_spanish:
  - Y colocarás
  - Y pondrás allí
  lexicon: HALOT
  rationale: La forma verbal en secuencia instruccional expresa mandato en futuro; en español, «pondrás» comunica con naturalidad la acción de fijar o disponer un elemento.
- source_word: עֲבֹתֹת
  english_pob_choice: braided chains
  chosen_spanish: cadenas trenzadas
  alternatives_spanish:
  - cadenas entrelazadas
  - cadenas retorcidas
  - cadenas trenzadas de oro
  lexicon: HALOT
  rationale: El término apunta a un trabajo de cadena/cuerda tejido o entrelazado. «Trenzadas» preserva la idea de construcción entrelazada sin forzar un tecnicismo arcaico.
- source_word: הַזָּהָב
  english_pob_choice: of gold
  chosen_spanish: de oro
  alternatives_spanish:
  - áureas
  - doradas
  lexicon: HALOT
  rationale: El hebreo especifica el material. «De oro» conserva la relación de pertenencia/material con el sustantivo precedente.
- source_word: הַטַּבָּעֹת
  english_pob_choice: the two rings
  chosen_spanish: los dos aros
  alternatives_spanish:
  - los dos anillos
  - las dos argollas
  lexicon: HALOT
  rationale: En este contexto de artesanía del tabernáculo, «aros» transmite bien la pieza de fijación; «anillos» sería posible, pero en español puede sonar menos natural para un objeto de ensamblaje.
- source_word: אֶל קְצֹות הַחֹשֶׁן
  english_pob_choice: at the ends of the breastpiece
  chosen_spanish: en los extremos del pectoral
  alternatives_spanish:
  - junto a los extremos del pectoral
  - en las puntas del pectoral
  lexicon: HALOT
  rationale: «קְצֹות» denota extremidades o extremos. «En los extremos» mantiene la ubicación; «pectoral» sigue la decisión de la POB para חֹשֶׁן, evitando «placa» o «coraza» que desviarían el referente.
- source_word: הַחֹשֶׁן
  english_pob_choice: breastpiece
  chosen_spanish: pectoral
  alternatives_spanish:
  - pieza del pecho
  - breastpiece
  lexicon: HALOT
  rationale: La pieza no es una coraza metálica, sino un ornamento sacerdotal para el pecho. «Pectoral» es el equivalente español más claro y tradicional para ese objeto litúrgico, sin implicar armadura.
translation_notes:
  revision_awareness: La revisión más reciente no introdujo cambios; el texto inglés auditado mantiene la decisión de traducir עֲבֹתֹת como cadenas trenzadas y חֹשֶׁן como breastpiece, con acuerdo alto en la consulta cruzada.
  spanish_consistency_notes:
  - Se evitó el masking litúrgico de YHWH porque este versículo no contiene el nombre divino.
  - 'Se mantuvo un registro consistente de la terminología artesanal del tabernáculo: cadenas trenzadas, aros y pectoral.'
  - La puntuación y el orden siguen una sintaxis española directa, sin añadir contenido no presente en el hebreo.
