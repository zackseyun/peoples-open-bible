  to: 'El ojo que se burla de un padre y desprecia la obediencia[a] a una madre: los cuervos del valle[b] le sacarán el ojo, y las crías del águila[c] lo comerán.'
  rationale: Se ajustó el español para reflejar mejor la imagen del hebreo (sacar el ojo, no solo arrancar algo), mejorar la naturalidad idiomática ('las crías del águila') y mantener las alternativas léxicas de las notas de forma clara y fiel al audit trail.
