translation:
  language: es
  text: 'Entonces los oficiales fueron a los principales sacerdotes y fariseos, y ellos[a] les dijeron: «¿Por qué no lo trajeron?»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El griego expresa aquí un demostrativo enfático (ἐκεῖνοι), que señala a los principales sacerdotes y fariseos como los que hablan. En español, «ellos» permite conservar ese matiz de manera natural.
    reason: lexical_alternative
lexical_decisions:
- source_word: οὖν
  english_pob_choice: So
  chosen_spanish: Entonces
  alternatives_spanish:
  - Así que
  - Por tanto
  lexicon: BDAG
  rationale: Marca la consecuencia narrativa del episodio anterior. «Entonces» conserva la relación discursiva en español sin sonar demasiado formal.
- source_word: ὑπηρέται
  english_pob_choice: officers
  chosen_spanish: los oficiales
  alternatives_spanish:
  - los guardias del templo
  - los servidores
  lexicon: BDAG
  rationale: En este contexto joánico se trata de funcionarios enviados para detener a Jesús; «oficiales» comunica mejor esa función que un sentido doméstico de «servidores».
- source_word: ἀρχιερεῖς
  english_pob_choice: chief priests
  chosen_spanish: los principales sacerdotes
  alternatives_spanish:
  - los sumos sacerdotes
  lexicon: BDAG
  rationale: El plural designa al grupo dirigente sacerdotal. «Principales sacerdotes» mantiene el valor colectivo y es claro en español; «sumos sacerdotes» también es posible, pero puede sonar más estrecho.
- source_word: Φαρισαίους
  english_pob_choice: Pharisees
  chosen_spanish: fariseos
  alternatives_spanish:
  - los fariseos
  lexicon: BDAG
  rationale: Transliteración estándar del grupo judío mencionado en el texto.
- source_word: ἐκεῖνοι
  english_pob_choice: they / those men
  chosen_spanish: les
  alternatives_spanish:
  - ellos
  - aquellos
  lexicon: BDAG
  rationale: El griego usa un demostrativo enfático para referirse a los principales sacerdotes y fariseos. En español, el énfasis puede conservarse por la estructura del relato sin añadir una expresión pesada como «aquellos hombres»; el pronombre átono «les» evita forzar el estilo y sigue el sentido del intercambio.
- source_word: Διὰ τί
  english_pob_choice: Why
  chosen_spanish: ¿Por qué
  alternatives_spanish:
  - ¿Con qué motivo
  lexicon: BDAG
  rationale: Equivalente interrogativo idiomático y directo en español.
- source_word: ἠγάγετε
  english_pob_choice: did you not bring
  chosen_spanish: trajeron
  alternatives_spanish:
  - llevaron
  - trajiste(n)
  lexicon: BDAG
  rationale: 'El verbo puede significar «traer» o «llevar/conducir». En este contexto de arresto, «traerlo» es el sentido natural en español. Se formula como pregunta negativa directa de cortesía narrativa: «¿Por qué no lo trajeron?».'
- source_word: αὐτόν
  english_pob_choice: him
  chosen_spanish: lo
  alternatives_spanish:
  - a él
  lexicon: BDAG
  rationale: Pronombre de objeto directo que se refiere a Jesús; «lo» es la forma natural en español.
translation_notes:
  revision_awareness: 'Se siguió el sentido confirmado por la auditoría inglesa: los ὑπηρέται son oficiales, ἀρχιερεῖς son los principales sacerdotes, ἐκεῖνοι introduce un sujeto enfático, y ἠγάγετε admite «traer» o «conducir». Se optó por una formulación natural en español sin perder el trasfondo de arresto ni añadir interpretaciones ajenas al texto.'
  spanish_consistency_notes:
  - Se mantuvo «oficiales» para ὑπηρέται en consonancia con el POB inglés.
  - Se usó «principales sacerdotes» para ἀρχιερεῖς como término colectivo claro y publicable.
  - Se prefirió el pronombre directo «lo» para Jesús, siguiendo el uso natural del español.
  - No se introdujo lenguaje eclesiástico no atestiguado por el texto; la frase permanece descriptiva y narrativa.
