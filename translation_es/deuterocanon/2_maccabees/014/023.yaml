translation:
  language: es
  text: Nicanor permaneció en Jerusalén y no hizo nada fuera de lugar; y despidió a las multitudes reunidas[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El griego ἀγελαίους tiene un matiz despectivo, literalmente cercano a «de rebaño» o «de manada». También podría entenderse como «la chusma reunida» o, más literalmente, «las multitudes de manada». La revisión inglesa final prefirió no reflejarlo explícitamente en el texto principal, y aquí también se atenúa en «las multitudes reunidas».
    reason: lexical_alternative
lexical_decisions:
- source_word: διέτριβεν
  english_pob_choice: stayed on
  chosen_spanish: permaneció
  alternatives_spanish:
  - se quedó
  - estuvo allí por un tiempo
  - permaneció allí
  lexicon: LSJ
  rationale: El imperfecto expresa permanencia continua durante un período. «Permaneció» comunica esa duración de manera natural en español sin forzar una interpretación más específica que el griego no exige.
- source_word: ἔπραττεν οὐδὲν ἄτοπον
  english_pob_choice: did nothing out of place
  chosen_spanish: no hizo nada inconveniente
  alternatives_spanish:
  - no hizo nada impropio
  - no hizo nada desacertado
  - no hizo nada fuera de lugar
  lexicon: LSJ
  rationale: ἄτοπος puede significar impropio, extraño o fuera de lugar. En este contexto narrativo, la idea es que Nicanor no cometió una conducta perturbadora o indebida. «Inconveniente» mantiene amplitud semántica y suena natural en español, aunque «fuera de lugar» sería una alternativa más cercana al giro literal.
- source_word: συναχθέντας
  english_pob_choice: gathered
  chosen_spanish: reunidas
  alternatives_spanish:
  - juntadas
  - convocadas
  - asambleadas
  lexicon: LSJ
  rationale: El participio describe a las personas que fueron reunidas. «Reunidas» es breve y transparente en español, y conserva el sentido participial sin añadir matiz técnico.
- source_word: ἀγελαίους
  english_pob_choice: crowds
  chosen_spanish: multitudes
  alternatives_spanish:
  - turbas
  - muchedumbres
  - grupos
  lexicon: LSJ
  rationale: El adjetivo tiene un matiz despectivo, literalmente cercano a «de manada» o «de rebaño», pero la revisión inglesa decidió no sobrecargar el texto con una equivalencia interpretativa. En español, «multitudes» mantiene el referente colectivo con un tono neutro; el matiz pejorativo queda atenuado, como en la revisión inglesa final.
- source_word: ὄχλους
  english_pob_choice: crowds
  chosen_spanish: multitudes
  alternatives_spanish:
  - muchedumbres
  - gente
  - turbas
  lexicon: LSJ
  rationale: ὄχλοι suele significar «multitudes» o «muchedumbres». Dado que el texto revisado en inglés optó por «crowds», «multitudes» reproduce bien el colectivo sin intensificar indebidamente la carga negativa.
- source_word: ἀπέλυσεν
  english_pob_choice: dismissed
  chosen_spanish: despidió
  alternatives_spanish:
  - los dejó ir
  - los envió fuera
  - los dispersó
  lexicon: LSJ
  rationale: En contexto político-social, el verbo indica dar por terminadas o hacer salir a las personas reunidas. «Despidió» funciona en español para este acto de enviar a la gente fuera, y evita la idea específica de libertad de cautiverio que «liberó» sugeriría.
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión inglesa posterior que eliminó «mob-like» de la primera redacción y dejó simplemente «the gathered crowds». Por eso la versión española evita un equivalente más duro como «turbas» y opta por una solución más sobria. También se preserva la duratividad de διέτριβεν con un verbo de permanencia.
  spanish_consistency_notes:
  - Se mantiene un estilo bíblico moderno y sobrio, sin recurrir a fórmulas arcaicas.
  - «Nicanor» se conserva como nombre propio transliterado estándar.
  - «Inconveniente» traduce ἄτοπον con una amplitud semántica compatible con el contexto narrativo.
  - No se capitalizan los colectivos en exceso ni se introduce terminología eclesiástica ajena al pasaje.
