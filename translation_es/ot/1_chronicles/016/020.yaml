translation:
  language: es
  text: Y anduvieron de nación en nación[a], y de un reino a otro pueblo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Y anduvieron de nación en nación, y de un reino a otro pueblo».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּתְהַלְּכוּ
  english_pob_choice: they wandered
  chosen_spanish: anduvieron
  alternatives_spanish:
  - vagaron
  - anduvieron de un lado a otro
  - se desplazaron
  lexicon: HALOT
  rationale: El hitpael de הלך expresa un movimiento repetido o distributivo. En español, «anduvieron» mantiene ese sentido de recorrido continuo sin forzar un matiz más negativo que «vagaron».
- source_word: מִגּוֹי אֶל גּוֹי
  english_pob_choice: from nation to nation
  chosen_spanish: de nación en nación
  alternatives_spanish:
  - de pueblo en pueblo
  - de una nación a otra
  lexicon: HALOT
  rationale: «Nación» conserva היטב el valor de גּוֹי y reproduce la construcción distributiva del hebreo. «De nación en nación» es natural y mantiene la repetición enfática del original.
- source_word: וּמִמַּמְלָכָה
  english_pob_choice: and from one kingdom
  chosen_spanish: y de un reino
  alternatives_spanish:
  - y de reino
  - y de una nación
  lexicon: HALOT
  rationale: מַמְלָכָה significa «reino». Se incluye «un» para reflejar el valor distributivo implícito que el inglés POB explicitó con «one».
- source_word: עַם אַחֵר
  english_pob_choice: another people
  chosen_spanish: otro pueblo
  alternatives_spanish:
  - otro pueblo distinto
  - otra gente
  lexicon: HALOT
  rationale: עַם puede ser «pueblo» o «gente». Aquí «pueblo» conserva la distinción frente a גּוֹי y permite una correspondencia más clara con el paralelismo del verso.
translation_notes:
  revision_awareness: La base inglesa revisó 'they went about' a 'they wandered' para reflejar mejor el valor iterativo del verbo. La versión española evita un calco mecánico y opta por «anduvieron», que conserva el movimiento continuo sin añadir una connotación excesivamente errante.
  spanish_consistency_notes:
  - Se mantiene «nación» para גּוֹי y «reino» para מַמְלָכָה, respetando la distinción léxica del hebreo.
  - Se conserva «pueblo» para עַם, en contraste con «nación», para no neutralizar la diferencia semántica presente en el paralelismo.
  - La nota al pie marca una alternativa de puntuación/flujo posible sin cambiar el contenido léxico de fondo.
