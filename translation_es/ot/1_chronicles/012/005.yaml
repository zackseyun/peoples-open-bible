- source_word: יוֹחָנָן
  english_pob_choice: Johanan
  chosen_spanish: Johanan
  alternatives_spanish:
  - Yehohanan
  - Jehohanan
  lexicon: HALOT
  rationale: Nombre propio. La forma Johanan es breve, reconocible y sigue de cerca la transliteración inglesa auditada; no hay motivo para castellanar a un equivalente distinto.
- source_word: יוֹזָבָד
  english_pob_choice: Jozabad
  chosen_spanish: Jozabad
  alternatives_spanish:
  - Yozabad
  lexicon: HALOT
  rationale: Nombre propio; se mantiene la forma transliterada convencional del expediente inglés para preservar consistencia editorial.
- source_word: הַגְּדֵרָתִי
  english_pob_choice: the Gederathite
  chosen_spanish: el gederatita
  alternatives_spanish:
  - el gederita
  - el hombre de Gederá
  lexicon: HALOT
  rationale: El hebreo presenta un gentilicio con artículo. En español se conserva la función adjetival/clánica con un gentilicio transparente y se evita especificar más de lo que el texto asegura. 'Gederathite' no es natural en español; 'gederatita' retiene mejor la forma formal del gentilicio que una paráfrasis interpretativa.
translation_notes:
  revision_awareness: La revisión más reciente no introdujo cambios y el cotejo externo indica alto acuerdo; por ello se conserva la lectura directa del nombre y del gentilicio, manteniendo la ambigüedad documentada sobre su procedencia.
  spanish_consistency_notes:
  - Se mantiene el tratamiento uniforme de nombres propios como transliteraciones reconocibles en lugar de traducirlos.
  - Se preserva la ambigüedad del gentilicio hebreo mediante nota, sin resolverla de modo interpretativo en el texto principal.
  - La puntuación en español distribuye la lista con coma antes de la conjunción final, de acuerdo con el uso editorial estándar.
