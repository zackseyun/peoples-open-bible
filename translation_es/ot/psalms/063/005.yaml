translation:
  language: es
  text: Así te bendeciré[a] mientras viva; en tu nombre levantaré mis manos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «te alabaré». El hebreo dice más literalmente «te bendeciré».
    reason: lexical_alternative
lexical_decisions:
- source_word: כֵּן
  english_pob_choice: So
  chosen_spanish: Así
  alternatives_spanish:
  - De este modo
  - Por eso
  lexicon: HALOT
  rationale: כֵּן enlaza la afirmación con lo anterior con sentido resultativo o inferencial. «Así» conserva ese vínculo en español de forma natural y sobria.
- source_word: אֲבָרֶכְךָ
  english_pob_choice: I will bless you
  chosen_spanish: te bendeciré
  alternatives_spanish:
  - te alabaré
  lexicon: HALOT
  rationale: ברך en piel significa primariamente «bendecir». Aunque dirigido a Dios puede sonar inusual, «bendecir» preserva mejor la forma verbal del hebreo que sustituirla por «alabar».
- source_word: בְחַיָּי
  english_pob_choice: as long as I live
  chosen_spanish: mientras viva
  alternatives_spanish:
  - durante mi vida
  - en mi vida
  lexicon: HALOT
  rationale: La expresión hebrea es literalmente «en mi vida», pero aquí tiene valor durativo. «Mientras viva» comunica con claridad esa duración sin forzar el español.
- source_word: בְּשִׁמְךָ
  english_pob_choice: in your name
  chosen_spanish: en tu nombre
  alternatives_spanish:
  - por tu nombre
  - invocando tu nombre
  lexicon: HALOT
  rationale: La preposición con «nombre» puede indicar esfera o referencia cultual. «En tu nombre» es la opción más natural y fiel en español.
- source_word: אֶשָּׂא
  english_pob_choice: I will lift up
  chosen_spanish: levantaré
  alternatives_spanish:
  - alzaré
  - elevaré
  lexicon: HALOT
  rationale: נשא con «manos» describe el gesto de levantar en oración o alabanza. «Levantaré» mantiene el sentido directo y la imagen reconocible.
- source_word: כַפָּי
  english_pob_choice: my hands
  chosen_spanish: mis manos
  alternatives_spanish:
  - mis palmas
  lexicon: HALOT
  rationale: כף puede ser «palma», pero el modismo bíblico en español suele expresarse como «manos». Así se preserva la gestualidad sin literalismo innecesario.
theological_decisions:
- issue: ברך dirigido a Dios
  english_pob_reading: Retain 'bless' rather than substituting 'praise' in the main text.
  chosen_spanish_reading: Mantener «bendecir» en el texto principal, no sustituirlo por «alabar».
  alternative_spanish_readings:
  - te alabaré
  rationale: El hebreo usa explícitamente ברך. En español, «bendecir a Dios» puede sonar menos habitual, pero es más transparente que reinterpretar el verbo. La alternativa más idiomática se preserva solo como posibilidad lexical.
  doctrine_reference: Translation philosophy §1, §5
translation_notes:
  revision_awareness: El texto español sigue de cerca el hebreo y coincide con la decisión inglesa de conservar «bless» en el cuerpo principal, dejando la opción interpretativa en nota. No se requieren revisiones adicionales respecto del paquete auditado.
  spanish_consistency_notes:
  - Se mantuvo el trato directo a Dios con «te» y «tu», coherente con el hebreo y con el registro devocional del pasaje.
  - «Mis manos» conserva el gesto corporal sin introducir una precisión anatómica innecesaria («palmas») en el texto principal.
  - La nota a pie de página marca la alternativa lexical principal y evita borrar la tensión entre el sentido literal de ברך y el uso más esperado en español.
