lexical_decisions:
- source_word: ὁ υἱός μου ὁ ἀγαπητός
  english_pob_choice: my beloved Son
  chosen_korean: 내 사랑하는 아들
  alternatives_korean:
  - 나의 사랑하는 아들
  lexicon: BDAG
  rationale: 한국 성서 정형 「내 사랑하는 아들」을 채택해 시편 2:7과 이사야 42:1의 메아리를 살린다.
- source_word: εὐδόκησα
  english_pob_choice: I am well pleased
  chosen_korean: 매우 기뻐한다
  alternatives_korean:
  - 기뻐한다
  - 흡족해한다
  lexicon: BDAG
  rationale: εὐδοκέω는 단순한 호감이 아니라 의지적 선택의 흡족함을 함의한다. 한국어 「매우 기뻐한다」가 그 무게를 살린다.
theological_decisions:
- issue: 하늘에서 들린 신적 발화 — 합쇼체 종결과 인용 형식
  chosen_reading: 이는 내 사랑하는 아들이다. 내가 그를 매우 기뻐한다.
  alternative_readings:
  - 이는 내 사랑하는 아들이라
  - 나는 그를 기뻐한다
  rationale: 신적 발화는 합쇼체 원칙이나, 신적 자기 선언은 「-이다/-한다」 평서종결로 옮겨 신적 권위·확정성을 살린다. 청중 일반(군중·요한·예수 자신)이 듣도록 선포되는 형식이므로 「합니다」보다 「-이다/-한다」가 본문의 무게에 더 가깝다.
  doctrine_reference: 'Korean register policy: divine self-declaration → declarative -이다/-한다 within 합쇼체 narrative'
