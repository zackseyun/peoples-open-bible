lexical_decisions:
- source_word: יִתֶּן
  english_pob_choice: May he grant
  chosen_spanish: Que te conceda
  alternatives_spanish:
  - Que te dé
  - Que te otorgue
  lexicon: HALOT
  rationale: El hebreo expresa aquí una petición/augurio en forma de yiqtol; en español, una construcción desiderativa con «que» conserva ese tono. «Conceda» refleja bien la idea de otorgar favorablemente en un contexto de bendición.
- source_word: לְךָ
  english_pob_choice: you
  chosen_spanish: te
  alternatives_spanish:
  - a ti
  - para ti
  lexicon: HALOT
  rationale: En español, el dativo átono es la forma más natural y fiel para el objeto indirecto.
- source_word: כִלְבָבֶךָ
  english_pob_choice: according to your heart
  chosen_spanish: conforme a tu corazón
  alternatives_spanish:
  - según tu corazón
  - de acuerdo con tu corazón
  - según tu deseo
  lexicon: HALOT
  rationale: «Corazón» conserva la antropología hebrea del centro del querer e intención. «Conforme a» transmite adecuadamente el prefijo כ en este contexto y evita reducir el sentido a mera emoción.
- source_word: וְכָל
  english_pob_choice: and all
  chosen_spanish: y todo
  alternatives_spanish:
  - y toda
  lexicon: HALOT
  rationale: El plural o singular colectivo se vierte de modo natural con «todo» en español, manteniendo el alcance total del enunciado.
- source_word: עֲצָתְךָ
  english_pob_choice: your counsel
  chosen_spanish: tu consejo
  alternatives_spanish:
  - tus planes
  - tu propósito
  - tu designio
  lexicon: HALOT
  rationale: «Consejo» preserva la conexión léxica con deliberación, consejo o plan. En español bíblico es claro y no fuerza el texto hacia una sola opción interpretativa.
- source_word: יְמַלֵּא
  english_pob_choice: fulfill
  chosen_spanish: cumpla
  alternatives_spanish:
  - llene
  - realice
  - lleve a cabo
  lexicon: HALOT
  rationale: El piel de מלא aquí comunica llevar a plena realización. «Cumpla» es una equivalencia natural en español para la idea de realizar plenamente lo pedido o planeado, sin introducir una imagen ajena.
theological_decisions:
- issue: Fuerza desiderativa de los verbos
  english_pob_reading: Render both verbs as wishes/prayers ('May he grant ... and fulfill ...')
  chosen_spanish_reading: Expresar ambos verbos como deseo o súplica («Que te conceda ... y cumpla ...»).
  alternative_spanish_readings:
  - Te concederá ... y cumplirá ...
  - Conceda ... y cumpla ...
  rationale: El contexto benedictorio del salmo favorece una lectura optativa, no meramente predictiva. «Que» mantiene el tono de petición/bendición en español.
  doctrine_reference: Translation philosophy §1, §3, §6
- issue: Sentido de «corazón»
  english_pob_reading: Retain 'heart' as the seat of desire/intention without psychologizing or spiritualizing beyond the text
  chosen_spanish_reading: Mantener «corazón» como sede de deseo, intención y voluntad.
  alternative_spanish_readings:
  - según tus deseos
  - según tu voluntad
  - según tu mente
  rationale: Conservar «corazón» respeta la antropología bíblica y evita reducir el término a una sola facultad interior. La frase sigue siendo comprensible en español contemporáneo.
  doctrine_reference: Translation philosophy §1, §6
translation_notes:
  revision_awareness: El texto coincide con la última pasada de revisión indicada como sin cambios; se mantiene la decisión de traducir el tono desiderativo de los yiqtol y conservar la imagen hebrea de «corazón».
  spanish_consistency_notes:
  - Se mantiene «conceda» para el verbo de concesión favorable, coherente con el tono de bendición.
  - Se conserva «corazón» sin sustituirlo por «deseos» en el cuerpo principal para no estrechar el campo semántico hebreo.
  - «Consejo» se usa como equivalente de עֵצָה, dejando la alternativa «planes» en nota para reflejar la ambigüedad lexical documentada.
