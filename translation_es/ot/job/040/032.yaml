translation:
  language: es
  text: Pon tu mano sobre él[a]; recuerda la batalla; no volverás a hacerlo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo literalmente: «no añadas»; el sentido es idiomático: «no volverás a hacerlo» o «no lo repetirás».'
    reason: lexical_alternative
lexical_decisions:
- source_word: שִׂים
  english_pob_choice: Lay
  chosen_spanish: Pon
  alternatives_spanish:
  - Coloca
  - Extiende
  - Echa
  lexicon: HALOT
  rationale: El imperativo de שׂים pide una acción directa de poner o colocar. En español, «pon» conserva esa inmediatez y suena natural con el complemento «tu mano sobre él».
- source_word: עָלָיו
  english_pob_choice: on him
  chosen_spanish: sobre él
  alternatives_spanish:
  - en él
  - encima de él
  - contra él
  lexicon: HALOT
  rationale: עַל con sufijo masculino singular se expresa bien con «sobre». Aquí mantiene la imagen física de tender la mano hacia Leviatán sin intensificarla innecesariamente con «contra».
- source_word: כַּפֶּךָ
  english_pob_choice: your hand
  chosen_spanish: tu mano
  alternatives_spanish:
  - tu palma
  - tu puño
  lexicon: HALOT
  rationale: כַּף puede referir a la palma/mano. En español, «mano» reproduce la idiomaticidad del mandato sin sonar forzado; «palma» sería más literal pero menos natural.
- source_word: זְכֹר
  english_pob_choice: remember
  chosen_spanish: recuerda
  alternatives_spanish:
  - ten presente
  - acuérdate
  lexicon: HALOT
  rationale: El imperativo de זכר se traduce de forma directa con «recuerda», que conserva la fuerza exhortativa y la conexión con la advertencia que sigue.
- source_word: מִלְחָמָה
  english_pob_choice: the battle
  chosen_spanish: la batalla
  alternatives_spanish:
  - la guerra
  - el combate
  - la lucha
  lexicon: HALOT
  rationale: מִלְחָמָה puede abarcar guerra/batalla. «La batalla» comunica bien el enfrentamiento concreto sugerido por el contexto de Leviatán y evita una abstracción excesiva.
- source_word: אַל תּוֹסַף
  english_pob_choice: you will not do it again
  chosen_spanish: no volverás a hacerlo
  alternatives_spanish:
  - no lo repetirás
  - no lo intentarás otra vez
  - no añadirás más
  lexicon: HALOT
  rationale: 'Aunque la forma hebrea dice literalmente «no añadas», el uso idiomático en este contexto funciona como consecuencia o predicción: no repetirás el intento. «No volverás a hacerlo» preserva ese valor sin perder claridad en español.'
translation_notes:
  revision_awareness: 'El borrador sigue de cerca el texto hebreo y coincide con la solución auditada en inglés: mandato directo, referencia corporal explícita y cierre idiomático que expresa la idea de no repetir el intento.'
  spanish_consistency_notes:
  - Se usa un registro bíblico claro y contemporáneo, sin recurrir a formulaciones eclesiásticas arcaizantes.
  - «Mano» se prefiere a «palma» por naturalidad en español y fidelidad al uso idiomático del mandato.
  - La nota conserva la tensión entre el hebreo literal y el valor idiomático final, como en el auditoría inglesa.
