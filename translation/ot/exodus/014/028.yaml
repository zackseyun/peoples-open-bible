theological_decisions:
- issue: Extent of Pharaoh's destruction
  chosen_reading: 'The verse states total destruction of the Egyptian force that entered the sea after Israel: not one of that group remained.'
  alternative_readings:
  - The statement could be read less universally if restricted only to the specific troops in pursuit rather than every Egyptian soldier everywhere.
  rationale: The Hebrew syntax ties the final clause to 'all the army of Pharaoh that had gone in after them into the sea.' The translation preserves the verse's emphatic totality without extending it beyond the pursuing force named in the text.
