review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español transmite correctamente el sentido general del griego: respuesta de Jesús, fórmula escrituraria, contraste entre pan y palabra divina, y referencia universal a la humanidad. Sin embargo, hay una tensión innecesaria entre el texto principal y la nota sobre διὰ στόματος θεοῦ: la nota afirma literalmente «de la boca de Dios», cuando el griego usa διά con genitivo, más cercano a «por medio de / por». Conviene ajustar la nota y simplificar el aparato para que refleje mejor la evidencia fuente sin sobrecargar el texto.'
  spanish_quality_summary: El español es claro, digno y muy legible. «Pero él respondió» y «Escrito está» funcionan bien. «El ser humano» comunica adecuadamente el valor genérico de ὁ ἄνθρωπος en español contemporáneo. La frase «que sale de la boca de Dios» es natural y bíblicamente reconocible. La principal mejora necesaria es la precisión de la nota c; además, la nota b puede formularse con mayor naturalidad.
  glossary_alignment: No hay conflictos con la terminología base del proyecto. No aparecen Yahvé, Mesías, Espíritu, etc. La elección «el ser humano» para ὁ ἄνθρωπος es una excepción contextual razonada frente al inglés «Man» y es aceptable en español por su fuerza inclusiva. «Palabra» para ῥῆμα y «Dios» para θεοῦ están bien alineados.
  issues:
  - severity: medium
    issue: La nota c describe incorrectamente el griego como si dijera literalmente «de la boca de Dios».
    rationale: El texto griego tiene διὰ στόματος θεοῦ, donde διά con genitivo expresa más literalmente «por / por medio de / a través de». El texto principal puede mantener «de la boca de Dios» por naturalidad, pero la nota no debe llamar eso la literalidad griega.
  - severity: low
    issue: 'La nota b suena algo calcada: «no en pan solo».'
    rationale: Puede explicarse mejor en español como «no con solo pan» o indicar simplemente la estructura griega sin una glosa poco idiomática.
  revised_spanish_text: 'Pero él respondió[a]: «Escrito está: “No solo de pan[b] vivirá el ser humano, sino de toda palabra que sale de la boca de Dios[c]”».'
  revised_footnotes:
  - marker: a
    text: O «contestó»; el griego usa una fórmula narrativa de respuesta que en español puede expresarse con un solo verbo.
    reason: lexical_alternative
  - marker: b
    text: O «solamente de pan». El griego expresa literalmente la idea «no con solo pan», conservando el contraste entre el sustento material y la palabra de Dios.
    reason: lexical_alternative
  - marker: c
    text: El griego dice literalmente «por / por medio de la boca de Dios» (διά con genitivo). Se traduce «de la boca de Dios» por naturalidad en español, manteniendo la imagen de la palabra divina pronunciada.
    reason: lexical_alternative
  revision_rationale: El texto principal puede mantenerse. Se revisan las notas para reflejar con mayor precisión el valor de διά con genitivo y para mejorar la naturalidad explicativa del aparato sin cambiar el sentido de la traducción.
