translation:
  language: es
  text: Las fieras orgullosas[a] no la han hollado; el león no ha pasado sobre ella.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literalmente, «los hijos del orgullo». La expresión probablemente se refiere a fieras orgullosas, especialmente depredadores.
    reason: lexical_alternative
lexical_decisions:
- source_word: הִדְרִיכֻהוּ
  english_pob_choice: have not trodden it
  chosen_spanish: no han hollado en ella
  alternatives_spanish:
  - no han pisado en ella
  - no han caminado sobre ella
  - no han puesto el pie en ella
  lexicon: HALOT
  rationale: El verbo hebreo, en este contexto poético, expresa transitar un camino. «Hollar» conserva la imagen de pisar o recorrer un sendero, y mantiene mejor la fuerza idiomática que un simple «caminar».
- source_word: בְנֵי שָׁחַץ
  english_pob_choice: the proud beasts
  chosen_spanish: los animales orgullosos
  alternatives_spanish:
  - los hijos del orgullo
  - los orgullosos
  - las fieras orgullosas
  lexicon: HALOT
  rationale: La expresión es literalmente «hijos del orgullo», pero el contexto inmediato con «león» muestra que se trata de bestias salvajes depredadoras. «Animales orgullosos» conserva la imagen y evita una lectura antropológica, aunque «bestias» sería más fuerte y más cercano al matiz poético.
- source_word: עָדָה עָלָיו
  english_pob_choice: has not passed over it
  chosen_spanish: no ha pasado sobre ella
  alternatives_spanish:
  - no ha cruzado por ella
  - no ha transitado por ella
  - no ha atravesado ella
  lexicon: HALOT
  rationale: La construcción con עַל indica movimiento por encima o a través de un lugar. «Pasar sobre ella» reproduce bien el paralelo con «hollar» y no introduce una idea ajena al texto.
- source_word: שָׁחַל
  english_pob_choice: the lion
  chosen_spanish: el león
  alternatives_spanish:
  - el león feroz
  - la leona
  lexicon: HALOT
  rationale: שׁחל es un término poético para «león». «León» es la forma más clara y natural en español; el matiz de fuerza o fiereza ya está sugerido por el paralelismo poético.
translation_notes:
  revision_awareness: Se siguió el estado más reciente del expediente, que indica agreement alto y sin cambios pendientes; por eso no se incorporaron revisiones adicionales.
  spanish_consistency_notes:
  - Se preservó el paralelismo poético entre «hollado» y «pasado sobre ella».
  - Se evitó «SEÑOR» o cualquier máscara reverencial porque el versículo no contiene el Nombre divino.
  - Se optó por «león» como término poético natural para שׁחל, en línea con la decisión inglesa del POB.
  - La nota al pie mantiene la tensión entre la literalidad «hijos del orgullo» y la lectura contextual de fieras depredadoras.
