translation:
  language: es
  text: Ahora, aparten de mí su prostitución y los cadáveres de sus reyes[a][b], y habitaré en medio de ellos para siempre.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «su fornicación» o «su ramera conducta»; el hebreo usa una metáfora de prostitución para la infidelidad pactal, a menudo expresada como idolatría.
    reason: lexical_alternative
  - marker: b
    text: La frase «los cadáveres de sus reyes» puede referirse literalmente a cuerpos reales muertos o, de modo más amplio, a instalaciones funerarias o memoriales reales cerca del santuario.
    reason: cultural_note
lexical_decisions:
- source_word: עַתָּה
  english_pob_choice: Now
  chosen_spanish: Ahora
  alternatives_spanish:
  - Ahora bien
  - Y ahora
  lexicon: HALOT
  rationale: Marcador temporal y discursivo que introduce la respuesta exigida; «Ahora» es natural y fiel al valor de transición del hebreo.
- source_word: יְרַחֲקוּ
  english_pob_choice: let them put far
  chosen_spanish: aparten
  alternatives_spanish:
  - pongan lejos
  - aléjenlos
  - separen
  lexicon: HALOT
  rationale: 'El hiphil tiene sentido causativo: hacer que algo quede lejos. En español, «aparten» conserva el matiz exhortativo/imperativo que el inglés POB expresó con «let them put far».'
- source_word: זְנוּתָם
  english_pob_choice: their prostitution
  chosen_spanish: su prostitución
  alternatives_spanish:
  - su fornicación
  - su ramera conducta
  - su idolatría
  lexicon: HALOT
  rationale: Se preserva la metáfora profética de infidelidad pactal. «Prostitución» mantiene la fuerza figurada mejor que una paráfrasis interpretativa como «idolatría».
- source_word: פִגְרֵי מַלְכֵיהֶם
  english_pob_choice: the corpses of their kings
  chosen_spanish: los cadáveres de sus reyes
  alternatives_spanish:
  - los cuerpos muertos de sus reyes
  - los restos de sus reyes
  - los cadáveres de sus monarcas
  lexicon: HALOT
  rationale: «Cadáveres» transmite de manera directa y digna פגר. «Sus reyes» conserva el posesivo plural y la concreción histórica sin explicitar una interpretación no requerida por el hebreo.
- source_word: מִמֶּנִּי
  english_pob_choice: from me
  chosen_spanish: de mí
  alternatives_spanish:
  - lejos de mí
  - apartado de mí
  lexicon: HALOT
  rationale: La preposición de separación se integra naturalmente en la expresión «aparten de mí»; «de mí» mantiene la relación con la presencia divina sin añadir una paráfrasis.
- source_word: וְשָׁכַנְתִּי
  english_pob_choice: and I will dwell
  chosen_spanish: y habitaré
  alternatives_spanish:
  - y moraré
  - y residiré
  lexicon: HALOT
  rationale: «Habitaré» conserva el peso teológico del verbo שכן y su resonancia de presencia pactal, más fuerte que un simple «viviré».
- source_word: בְתוֹכָם
  english_pob_choice: in their midst
  chosen_spanish: en medio de ellos
  alternatives_spanish:
  - en su interior
  - entre ellos
  lexicon: HALOT
  rationale: «En medio de ellos» reproduce bien la imagen espacial y comunitaria del hebreo, manteniendo el énfasis en la presencia divina en su centro.
- source_word: לְעוֹלָם
  english_pob_choice: forever
  chosen_spanish: para siempre
  alternatives_spanish:
  - eternamente
  - por siempre
  lexicon: HALOT
  rationale: En este contexto de restauración, «para siempre» es la opción más natural en español y expresa permanencia duradera.
theological_decisions:
- issue: Metáfora de זְנוּתָם
  english_pob_reading: Rendered metaphorically as 'their prostitution,' preserving the prophetic image of covenantal unfaithfulness/idolatry without reducing it to a purely sexual sin.
  chosen_spanish_reading: Se conserva «su prostitución» como metáfora de infidelidad pactal, sin reducirla a una conducta meramente sexual ni sustituirla por «idolatría» en el cuerpo principal.
  alternative_spanish_readings:
  - su idolatría
  - su inmoralidad sexual
  rationale: La imagen profética debe seguir visible en español. «Prostitución» deja abierta la carga de infidelidad religiosa y moral; «idolatría» interpreta más de lo que el hebreo dice; «inmoralidad sexual» estrecha el alcance metafórico.
  doctrine_reference: Translation philosophy §§1, 3, 6
- issue: Fuerza de יְרַחֲקוּ
  english_pob_reading: '''Exhortatory/jussive sense: ''let them put far'''''
  chosen_spanish_reading: '«aparten» conserva el valor exhortativo: lo que el pueblo debe hacer en respuesta al mandato divino.'
  alternative_spanish_readings:
  - se apartarán
  - deben apartar
  - aparten lejos
  rationale: En español, el imperativo/subjuntivo exhortativo comunica mejor la fuerza directiva del contexto que un futuro simple. Mantiene la idea de responsabilidad humana ante la palabra de Dios.
  doctrine_reference: Translation philosophy §1
- issue: Sentido de 'the corpses of their kings'
  english_pob_reading: Kept as a concrete phrase without interpretive expansion
  chosen_spanish_reading: Se mantiene la concreción de «los cadáveres de sus reyes» sin convertirla en una interpretación sobre monumentos o sepulcros.
  alternative_spanish_readings:
  - las tumbas de sus reyes
  - los memoriales de sus reyes
  - los restos mortales de sus reyes
  rationale: El hebreo es concreto y el pasaje tiene un trasfondo histórico discutido. La traducción no debe resolver la discusión en el texto principal; eso queda para la nota.
  doctrine_reference: Translation philosophy §§1, 3
translation_notes:
  revision_awareness: El borrador sigue la lectura aprobada del POB inglés y el consenso del control cruzado; no se registraron revisiones aplicadas en la pasada más reciente.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» implícito por contexto al evitar una sustitución por «SEÑOR»; aquí no aparece el nombre divino explícito en el versículo.
  - Se conserva la metáfora profética en «prostitución» para no neutralizar el tono del hebreo.
  - «Habitaré» y «en medio de ellos» mantienen el lenguaje de presencia pactal del original.
  - Las notas a pie distinguen alternativa léxica de aclaración cultural, con marcadores únicos en orden.
