    rationale: 'El hebreo describe acciones de juicio repetidas o características, pero en este contexto profético español suena más claro con pretérito: «fueron… no quedaron satisfechas… no volvieron». Esto mantiene bien el sentido sin perder fuerza.'
  - severity: low
