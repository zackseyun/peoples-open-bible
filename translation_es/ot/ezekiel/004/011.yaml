translation:
  language: es
  text: Y beberás agua por medida[a], un sexto de un hin; de tiempo en tiempo beberás.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «En tiempos determinados beberás».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וּמַיִם
  english_pob_choice: And ... water
  chosen_spanish: Y ... agua
  alternatives_spanish:
  - Y agua
  lexicon: HALOT
  rationale: מַיִם significa «agua». La conjunción inicial ו se conserva con «Y» para mantener la continuidad de la orden en el contexto.
- source_word: בִּמְשׂוּרָה
  english_pob_choice: by measure
  chosen_spanish: por medida
  alternatives_spanish:
  - con medida
  - en medida medida
  - en cantidad medida
  lexicon: HALOT
  rationale: מְשׂוּרָה denota una porción medida o racionada. «Por medida» es natural en español y conserva la idea de ración fija.
- source_word: תִשְׁתֶּה
  english_pob_choice: you shall drink
  chosen_spanish: beberás
  alternatives_spanish:
  - has de beber
  - deberás beber
  lexicon: HALOT
  rationale: El yiqtol 2ms en este contexto funciona como mandato/instrucción futura. «Beberás» mantiene el tono directivo sin añadir modalidades no explícitas.
- source_word: שִׁשִּׁית הַהִין
  english_pob_choice: a sixth of a hin
  chosen_spanish: la sexta parte de un hin
  alternatives_spanish:
  - una sexta parte de un hin
  - un sexto de un hin
  lexicon: HALOT
  rationale: La frase especifica la cantidad racionada. «La sexta parte de un hin» refleja el valor fraccionario y conserva la unidad antigua sin convertirla.
- source_word: מֵעֵת עַד עֵת
  english_pob_choice: from time to time
  chosen_spanish: de tiempo en tiempo
  alternatives_spanish:
  - en tiempos determinados
  - a intervalos
  lexicon: HALOT
  rationale: El hebreo idiomático indica periodicidad, no acceso continuo. «De tiempo en tiempo» es una equivalencia natural y fiel en español.
- source_word: תִּשְׁתֶּה
  english_pob_choice: you shall drink
  chosen_spanish: beberás
  alternatives_spanish:
  - has de beber
  lexicon: HALOT
  rationale: Se repite el verbo para reproducir la reiteración del hebreo y subrayar el carácter regulado de la acción.
translation_notes:
  revision_awareness: El texto hebreo y el audit trail inglés coinciden en una lectura de ración medida y consumo periódico; no se detectan revisiones aplicadas en el registro fuente. Se conservó la repetición verbal final para reflejar el hebreo.
  spanish_consistency_notes:
  - Se mantuvo «hin» como unidad antigua, siguiendo la decisión inglesa de no convertir medidas.
  - «Por medida» evita interpretar la medida como mero modo; conserva el matiz de racionamiento.
  - La nota conserva la alternativa temporal que en inglés aparece como «at set times».
