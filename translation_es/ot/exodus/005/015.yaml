translation:
  language: es
  text: 'Entonces los oficiales de los hijos de Israel fueron y clamaron a Faraón[a], diciendo[c][b]: «¿Por qué haces esto a tus siervos?»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «los israelitas»; literalmente, «los hijos de Israel».
    reason: lexical_alternative
  - marker: b
    text: Literalmente, «¿Por qué haces así a tus siervos?»
    reason: lexical_alternative
  - marker: c
    text: O «tus esclavos», según cómo se entienda עבד en este contexto.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּבֹאוּ
  english_pob_choice: Then ... came
  chosen_spanish: Entonces ... fueron
  alternatives_spanish:
  - Y ... fueron
  - Entonces ... vinieron
  lexicon: HALOT
  rationale: La forma wayyiqtol avanza la narración; «Entonces» conserva la sucesión y «fueron» refleja el movimiento narrativo hacia Faraón con naturalidad en español.
- source_word: שֹׁטְרֵי
  english_pob_choice: officers
  chosen_spanish: oficiales
  alternatives_spanish:
  - capataces
  - inspectores
  lexicon: HALOT
  rationale: En Éxodo este término designa administradores subordinados del trabajo israelita bajo autoridad egipcia. «Oficiales» preserva el papel administrativo sin restringirlo demasiado a un matiz de capataz.
- source_word: בְּנֵי יִשְׂרָאֵל
  english_pob_choice: the sons of Israel
  chosen_spanish: los hijos de Israel
  alternatives_spanish:
  - los israelitas
  - los descendientes de Israel
  lexicon: HALOT
  rationale: Se conserva la expresión literal del hebreo, que el proyecto prefiere no aplanar a una etiqueta étnica más genérica cuando la forma familiar es significativa.
- source_word: וַיִּצְעֲקוּ
  english_pob_choice: cried out
  chosen_spanish: clamaron
  alternatives_spanish:
  - gritaron
  - alzaron la voz
  lexicon: HALOT
  rationale: El verbo expresa una súplica urgente y enérgica, no un simple decir. «Clamaron» mantiene esa fuerza de protesta y petición.
- source_word: אֶל פַּרְעֹה
  english_pob_choice: to Pharaoh
  chosen_spanish: a Faraón
  alternatives_spanish:
  - ante Faraón
  - hacia Faraón
  lexicon: HALOT
  rationale: La preposición marca dirección hacia Faraón; en español «a Faraón» es la forma más natural y directa.
- source_word: לֵאמֹר
  english_pob_choice: saying
  chosen_spanish: diciendo
  alternatives_spanish:
  - y dijeron
  - al decir
  lexicon: HALOT
  rationale: Introduce la cita de manera estándar. «Diciendo» refleja bien la construcción hebrea sin añadir contenido extra.
- source_word: לָמָּה
  english_pob_choice: Why
  chosen_spanish: ¿Por qué
  alternatives_spanish:
  - ¿Con qué motivo?
  - ¿A qué viene?
  lexicon: HALOT
  rationale: Interrogativa directa; «¿Por qué?» es la equivalencia natural y transparente en español.
- source_word: תַעֲשֶׂה כֹה
  english_pob_choice: do you this to
  chosen_spanish: haces así
  alternatives_spanish:
  - haces esto
  - procedes de este modo
  lexicon: HALOT
  rationale: El hebreo dice literalmente «hacer así». En español, «haces así» conserva la forma sin perder naturalidad dentro de la pregunta.
- source_word: לַעֲבָדֶיךָ
  english_pob_choice: your servants
  chosen_spanish: a tus esclavos
  alternatives_spanish:
  - a tus siervos
  - a tus servidores
  lexicon: HALOT
  rationale: Siguiendo la decisión del POB sobre עבד, «esclavos» preserva la fuerza léxica cuando los hablantes se presentan bajo la presión del dominio faraónico. Se mantiene en la nota la alternativa «siervos» como opción de matiz social menos fuerte.
theological_decisions:
- issue: Valor de עבד en la boca de los oficiales israelitas frente a Faraón
  english_pob_reading: your servants / or your slaves, depending on how עבד is understood in this context
  chosen_spanish_reading: a tus esclavos
  alternative_spanish_readings:
  - a tus siervos
  - a tus servidores
  rationale: El contexto es de opresión laboral bajo Egipto, y el POB documenta la tensión entre «servants» y «slaves». En español, «esclavos» comunica mejor esa tensión léxica; «siervos» puede sonar demasiado suave y ocultar la carga social del término.
  doctrine_reference: Éxodo 1–5; uso léxico de עבד en contexto de servidumbre forzada
translation_notes:
  revision_awareness: Se siguió la revisión más reciente del POB inglés, que ajustó la segunda cláusula a una formulación más cercana a «do this to your servants». La versión española conserva esa cercanía al hebreo con una pregunta breve y directa, sin depender de una paráfrasis de tipo «tratas de esta manera».
  spanish_consistency_notes:
  - Se mantiene «Faraón» para פַּרְעֹה, en vez de intentar ocultar el nombre con un título genérico.
  - «Los hijos de Israel» conserva la forma literal del hebreo y armoniza con el principio del proyecto de no aplanar etiquetas familiares cuando son textualmente relevantes.
  - La puntuación de la cita directa sigue el estilo español con comillas angulares y dos puntos antes de la cita.
  - Se distingue entre «oficiales» y «esclavos» para mantener separadas la función administrativa del primer sintagma y la condición social del último.
