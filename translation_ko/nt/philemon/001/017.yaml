id: PHM.1.17
reference: Philemon 1:17
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: Εἰ οὖν με ἔχεις κοινωνόν, προσλαβοῦ αὐτὸν ὡς ἐμέ.
base_translation:
  language: en
  yaml_path: translation/nt/philemon/001/017.yaml
  text: So if you consider me a partner[a], receive him as you would me.
  footnotes:
  - marker: a
    text: Or 'welcome him.' The verb can carry the sense of receiving someone favorably or accepting them into fellowship.
    reason: lexical_alternative
translation:
  language: ko
  text: 그러므로 만일 그대가 나를 동역자로 여긴다면, 그를 나처럼 받아 주시기[a] 바랍니다.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 또는 「환영하다」. 헬라어 동사는 호의로 받아들이거나 친교에 받아들이는 의미를 함께 담는다.
    reason: lexical_alternative
lexical_decisions:
- source_word: Εἰ οὖν
  english_pob_choice: So if
  chosen_korean: 그러므로 만일
  alternatives_korean:
  - 그렇다면 만일
  - 그러니 만일
  lexicon: BDAG
  rationale: 추론 οὖν + 조건 εἰ를 자연스럽게 결합한다.
- source_word: ἔχεις κοινωνόν
  english_pob_choice: you consider me a partner
  chosen_korean: 나를 동역자로 여긴다면
  alternatives_korean:
  - 나를 동반자로 본다면
  - 나를 동지로 여긴다면
  lexicon: BDAG
  rationale: κοινωνός는 함께 나누는 자, 동역자·동반자. 본 번역은 빌레몬서 전체에서 κοινων- 어휘군(1:6의 κοινωνία)을 「동역」으로 일관되게 옮긴다. 「ἔχω + 대격 + 보어」의 「여기다」 관용. 「여기다」가 합쇼체에 자연스럽다.
- source_word: προσλαβοῦ
  english_pob_choice: receive
  chosen_korean: 받아 주시기 바랍니다
  alternatives_korean:
  - 환영하시기 바랍니다
  - 받아들이시기 바랍니다
  lexicon: BDAG
  rationale: 중간태 명령형. 합쇼체 권면에 「받아 주시기 바랍니다」가 자연스럽다. 「받아 주다」는 환영과 인격적 수용을 함께 담는다.
- source_word: αὐτὸν
  english_pob_choice: him
  chosen_korean: 그를
  lexicon: BDAG
  rationale: 오네시모를 가리키는 대격.
- source_word: ὡς ἐμέ
  english_pob_choice: as you would me
  chosen_korean: 나처럼
  alternatives_korean:
  - 나를 대하듯
  - 나를 영접하는 것처럼
  lexicon: BDAG
  rationale: ὡς + 대격 강조. 한국어 「나처럼」이 가장 간결하면서도 비교의 무게를 살린다.
theological_decisions:
- issue: κοινωνός의 관계적 무게
  chosen_reading: 동역자
  alternative_readings:
  - 동반자
  - 동지
  - 친교의 동역자
  rationale: 본 절은 바울과 빌레몬 사이의 공유된 사역적 참여와 평등한 위치를 가리키며, 성례적·신학적 전문 개념이 아니다. 「동역자」가 그 상호 관계를 가장 잘 담아내며, 1:6의 κοινωνία(「동역」)와 어휘 일관성을 유지한다.
  doctrine_reference: 'Translation philosophy: optimal equivalence; 어휘 일관성'
