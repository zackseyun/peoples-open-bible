base_translation:
  language: en
  yaml_path: translation/ot/joshua/024/001.yaml
  text: Then Joshua gathered all the tribes of Israel to Shechem[a], and he called for the elders of Israel, its heads, its judges, and its officers[c][b], and they presented themselves before God.
  footnotes:
