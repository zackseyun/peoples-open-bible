translation:
  language: es
  text: 'Y presentarán un holocausto como aroma grato[a] a Yahvé: dos novillos del ganado, un carnero y siete corderos machos de un año.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «para un aroma de sosiego». La fórmula hebrea לְרֵיחַ נִיחֹחַ también puede traducirse «como aroma agradable/grato».
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהִקְרַבְתֶּם
  english_pob_choice: you shall present
  chosen_spanish: y presentarás
  alternatives_spanish:
  - y ofrecerás
  - y harás presentar
  lexicon: HALOT
  rationale: En contexto sacrificial, el verbo hifil de קרב expresa traer/presentar una ofrenda ante Dios. «Presentar» conserva el sentido ritual sin sonar demasiado rígido; «ofrecer» también es posible, pero «presentar» sigue más de cerca la elección auditada del inglés POB.
- source_word: עוֹלָה
  english_pob_choice: a burnt offering
  chosen_spanish: un holocausto
  alternatives_spanish:
  - una ofrenda quemada
  - una ofrenda del todo quemada
  lexicon: HALOT
  rationale: El término técnico español más estable para el sacrificio totalmente consumido por fuego es «holocausto». Aunque etimológicamente podría explicarse de otra forma, aquí funciona como equivalente cultual reconocido y fiel al género sacrificial.
- source_word: לְרֵיחַ נִיחֹחַ
  english_pob_choice: as a pleasing aroma
  chosen_spanish: como aroma agradable
  alternatives_spanish:
  - como aroma placentero
  - como aroma de sosiego
  lexicon: HALOT
  rationale: La fórmula sacrificial hebrea es idiomática y no debe leerse de manera meramente literal. «Aroma agradable» conserva la idea de aceptación/grata aceptación ante Yahvé, y evita una calca pesada en español.
- source_word: לַיהוָה
  english_pob_choice: to Yahweh
  chosen_spanish: a Yahvé
  alternatives_spanish:
  - para Yahvé
  - a Yahweh
  lexicon: HALOT
  rationale: 'Se sigue el estándar del proyecto para el Tetragrámaton: «Yahvé». La preposición «a» reproduce con naturalidad el dativo cultual del hebreo en español.'
- source_word: פָּרִים בְּנֵי בָקָר
  english_pob_choice: two bulls from the herd
  chosen_spanish: dos novillos del ganado
  alternatives_spanish:
  - dos toros del ganado
  - dos becerros del ganado
  lexicon: HALOT
  rationale: La expresión designa bovinos del hato/ganado; «novillos» comunica bien la categoría sacrificial y evita la fuerza excesiva de «toros». «Del ganado» preserva la referencia colectiva de בְּנֵי בָקָר.
- source_word: אַיִל אֶחָד
  english_pob_choice: one ram
  chosen_spanish: un carnero
  alternatives_spanish:
  - un macho carnero
  - un macho
  lexicon: HALOT
  rationale: «Carnero» es el equivalente natural y preciso en español para el animal sacrificial. El numeral singular queda implícito en el artículo indefinido.
- source_word: שִׁבְעָה כְבָשִׂים
  english_pob_choice: seven male lambs
  chosen_spanish: siete corderos machos
  alternatives_spanish:
  - siete corderos
  - siete corderos varones
  lexicon: HALOT
  rationale: Se mantiene la especificación de sexo presente en el hebreo y reflejada en el inglés auditado. «Corderos machos» es claro en español y evita perder precisión zoológica.
- source_word: בְּנֵי שָׁנָה
  english_pob_choice: a year old
  chosen_spanish: de un año
  alternatives_spanish:
  - de un año de edad
  - en su primer año
  lexicon: HALOT
  rationale: La fórmula de edad sacrificial se expresa de modo natural en español como «de un año». Es breve, idiomática y fiel al valor cronológico del hebreo.
theological_decisions:
- issue: Renderización del nombre divino יהוה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - Yahweh
  rationale: El proyecto español usa «Yahvé» como forma principal para el nombre del pacto. Se evita la sustitución por «SEÑOR» porque la consigna del proyecto exige hacer visible el nombre divino en la traducción principal.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Sentido de la fórmula sacrificial לְרֵיחַ נִיחֹחַ
  english_pob_reading: pleasing aroma
  chosen_spanish_reading: aroma agradable
  alternative_spanish_readings:
  - aroma de sosiego
  - aroma placentero
  rationale: La fórmula no pretende describir solamente olor físico, sino la aceptación cultual de la ofrenda. «Aroma agradable» conserva esa ambigüedad útil sin agregar explicaciones interpretativas que el texto no exige.
  doctrine_reference: Lexical/sacrificial formula
- issue: Terminología sacrificial de עוֹלָה
  english_pob_reading: burnt offering
  chosen_spanish_reading: holocausto
  alternative_spanish_readings:
  - ofrenda quemada
  - ofrenda totalmente quemada
  rationale: «Holocausto» es la designación tradicional y técnica en español para este tipo de sacrificio completo. En este contexto no introduce confusión doctrinal y mantiene la categoría cultual exacta.
  doctrine_reference: Sacrificial terminology
translation_notes:
  revision_awareness: Se corrigió el problema de validación anterior asegurando que todo marcador de nota aparezca exactamente en el texto principal. También se alineó la decisión teológica sobre יהוה con la consigna del proyecto en español, usando «Yahvé» de forma consistente.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» para יהוה, conforme al estándar del proyecto.
  - «Holocausto» se usa como término sacrificial técnico, no con el sentido histórico moderno no cultual.
  - «Novillos del ganado» conserva la referencia zoológica de בְּנֵי בָקָר sin forzar una traducción más literal que sonaría extraña.
  - La nota [a] está anclada exactamente en «agradable[a]» para evitar errores de validación.
