review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien el sentido del hebreo: mantiene la llegada del levita, la razón de que no tiene porción ni heredad, la tríada social vulnerable, el comer y saciarse, el propósito de la bendición, y el nombre divino Yahvé. Sin embargo, la ancla de nota [a] está colocada sobre ''puertas'' aunque la nota mezcla dos asuntos distintos y su primera parte corresponde a הַגֵּר, no a ''puertas''.'
  spanish_quality_summary: El español es generalmente claro y digno, pero 'forastero' puede sonar más transitorio o externo que residente integrado, y la nota actual combina alternativa léxica y nota cultural en un solo marcador mal anclado. Conviene usar 'residente extranjero' en el texto, que comunica mejor el valor de גֵּר en español neutral. El resto del verso fluye bien; 'parte ni heredad contigo' y 'obra de tus manos' son aceptables y legibles.
  glossary_alignment: Se alinea bien con la política de 'Yahvé'. No hay conflicto con otros términos doctrinales. Se recomienda ajustar הַגֵּר de 'forastero' a 'residente extranjero' para reflejar mejor la justificación léxica del POB y evitar ambigüedad en español.
  issues:
  - severity: medium
    issue: La nota [a] está anclada en 'puertas' pero su contenido principal trata sobre הַגֵּר.
    rationale: Las instrucciones exigen que cada marcador aparezca en el lugar pertinente del texto. Aquí la alternativa léxica corresponde a 'el forastero', mientras que 'dentro de tus puertas' requeriría, si se desea, una nota separada.
  - severity: medium
    issue: '''Forastero'' no refleja tan bien como otras opciones el sentido de גֵּר como no israelita residente entre Israel.'
    rationale: '''Forastero'' puede sugerir simplemente alguien de fuera o de paso. ''Residente extranjero'' conserva mejor la condición de extranjero asentado, en línea con el audit trail inglés.'
  - severity: low
    issue: La nota combina alternativa léxica y explicación cultural en un solo objeto.
    rationale: Aunque no imposibilita la comprensión, mezcla razones distintas. Es más limpio separar la nota léxica de גֵּר y la nota cultural sobre 'dentro de tus puertas'.
  revised_spanish_text: Y vendrá el levita, porque no tiene parte ni heredad contigo; y el residente extranjero[a], el huérfano y la viuda que están dentro de tus puertas[b], y comerán y se saciarán, para que Yahvé tu Dios te bendiga en toda obra de tus manos que hagas.
  revised_footnotes:
