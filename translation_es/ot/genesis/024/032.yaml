base_translation:
  language: en
  yaml_path: translation/ot/genesis/024/032.yaml
  text: So the man came into the house and unloaded the camels and gave straw and feed to the camels[b][a], and water to wash his feet and the feet of the men who were with him.
  footnotes:
  - marker: a
    text: Or 'unsaddled' or 'loosed' the camels.' The Hebrew literally says 'opened the camels,' an idiom for removing their gear or otherwise relieving them after arrival.
    reason: lexical_alternative
  - marker: b
    text: Or 'and unloaded the camels, and he gave'.
    reason: previous_rendering
