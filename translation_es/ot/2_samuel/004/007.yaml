translation:
  language: es
  text: Entraron en la casa mientras él estaba acostado en su cama, en su dormitorio[a], y lo golpearon y lo mataron. Luego le quitaron la cabeza[c], tomaron la cabeza, y se fueron por el Arabá[b] toda la noche.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «en el cuarto donde dormía» para «en su dormitorio».
    reason: lexical_alternative
  - marker: b
    text: El Arabá es la depresión o llanura del Jordán; el hebreo usa un nombre geográfico.
    reason: cultural_note
  - marker: c
    text: O «le cortaron la cabeza»; el verbo hebreo es más literalmente «le quitaron la cabeza».
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּבֹאוּ הַבַּיִת
  english_pob_choice: They came into the house
  chosen_spanish: Entraron en la casa
  alternatives_spanish:
  - Vinieron a la casa
  - Llegaron a la casa
  lexicon: HALOT
  rationale: בוא con la dirección marcada expresa ingreso al lugar. «Entraron» conserva el movimiento narrativo de manera natural en español y evita una calca innecesaria.
- source_word: וְהוּא שֹׁכֵב
  english_pob_choice: while he was lying
  chosen_spanish: mientras él estaba acostado
  alternatives_spanish:
  - y él estaba acostado
  - mientras yacía
  lexicon: HALOT
  rationale: La forma es circunstancial y describe la situación al momento de la entrada. «Mientras él estaba acostado» hace clara la simultaneidad en español sin perder el matiz narrativo.
- source_word: עַל מִטָּתוֹ
  english_pob_choice: on his bed
  chosen_spanish: en su cama
  alternatives_spanish:
  - sobre su cama
  - acostado en su cama
  lexicon: HALOT
  rationale: La preposición hebrea marca ubicación; en español, «en su cama» fluye mejor en la cláusula circunstancial. Se mantiene la imagen concreta del lecho.
- source_word: בַּחֲדַר מִשְׁכָּבוֹ
  english_pob_choice: in his bedroom
  chosen_spanish: en su dormitorio
  alternatives_spanish:
  - en el cuarto donde dormía
  - en su cámara de dormir
  lexicon: HALOT
  rationale: El constructo designa el lugar de dormir. «Dormitorio» comunica el sentido con naturalidad; no se impone un arcaísmo ni se diluye el referente espacial.
- source_word: וַיַּכֻּהוּ
  english_pob_choice: they struck him
  chosen_spanish: lo golpearon
  alternatives_spanish:
  - lo hirieron
  - lo atacaron
  lexicon: HALOT
  rationale: נכה puede referir un golpe violento. «Lo golpearon» preserva la fuerza del verbo sin añadir la interpretación de caída que el texto inglés había descartado para mayor precisión.
- source_word: וַיְמִתֻהוּ
  english_pob_choice: put him to death
  chosen_spanish: lo mataron
  alternatives_spanish:
  - le dieron muerte
  - lo hicieron morir
  lexicon: HALOT
  rationale: El causativo de מות expresa causar la muerte. «Lo mataron» es la forma más natural y directa en español; mantiene la transitividad y la claridad narrativa.
- source_word: וַיָּסִירוּ אֶת רֹאשׁוֹ
  english_pob_choice: they removed his head
  chosen_spanish: le quitaron la cabeza
  alternatives_spanish:
  - le separaron la cabeza
  - le cortaron la cabeza
  lexicon: HALOT
  rationale: סור en Hifil significa retirar/quitar. «Le quitaron la cabeza» conserva la secuencia verbal del hebreo y evita traducir de antemano la acción como «cortar», que el texto no expresa con ese verbo.
- source_word: וַיִּקְחוּ אֶת רֹאשׁוֹ
  english_pob_choice: took his head
  chosen_spanish: tomaron su cabeza
  alternatives_spanish:
  - se llevaron su cabeza
  - llevaron su cabeza
  lexicon: HALOT
  rationale: לקח es el verbo ordinario «tomar». Se conserva la repetición enfática del hebreo («cabeza... cabeza») y su tono sombrío. «Tomaron» resulta más sobrio que «se llevaron».
- source_word: וַיֵּלְכוּ דֶּרֶךְ הָעֲרָבָה
  english_pob_choice: went by way of the Arabah
  chosen_spanish: y se fueron por el camino del Arabá
  alternatives_spanish:
  - y fueron por el Arabá
  - y marcharon por el camino de la Arabá
  lexicon: HALOT
  rationale: דֶּרֶךְ con topónimo admite «por el camino de». Se mantiene el nombre geográfico transliterado como «Arabá», y se conserva la sensación de ruta concreta.
- source_word: הָעֲרָבָה
  english_pob_choice: the Arabah
  chosen_spanish: el Arabá
  alternatives_spanish:
  - la Arabá
  - la llanura del Jordán
  lexicon: HALOT
  rationale: Es un nombre geográfico. La forma «Arabá» respeta la transliteración habitual en español bíblico y evita reemplazar el topónimo por una explicación interpretativa en el texto principal.
- source_word: כָּל הַלָּיְלָה
  english_pob_choice: all night
  chosen_spanish: toda la noche
  alternatives_spanish:
  - durante toda la noche
  - por toda la noche
  lexicon: HALOT
  rationale: La expresión temporal es idiomática. «Toda la noche» es la equivalencia natural en español y conserva la duración continua de la acción.
theological_decisions:
- issue: 'La doble referencia a la cabeza: «le quitaron la cabeza» y luego «tomaron su cabeza».'
  english_pob_reading: The English POB retains both verbs, preserving the Hebrew sequence and the tension between removal and carrying away.
  chosen_spanish_reading: 'Se conservan ambas expresiones: primero «le quitaron la cabeza» y luego «tomaron su cabeza».'
  alternative_spanish_readings:
  - «le cortaron la cabeza» y luego «se llevaron su cabeza»
  - fusionar ambas acciones en una sola frase
  rationale: El hebreo distingue entre retirar/quitar la cabeza y luego tomarla. Fusionar las acciones borraría la repetición intencional del texto. La versión española mantiene esa secuencia y, con ella, la crudeza narrativa.
  doctrine_reference: Principio de fidelidad textual y preservación de repeticiones significativas del original
translation_notes:
  revision_awareness: 'La redacción sigue la última revisión inglesa: evita intensificar innecesariamente «lo golpearon» como «lo derribaron», pero conserva la secuencia de violencia y muerte. También conserva la repetición de «su cabeza» para reflejar el hebreo y su efecto retórico.'
  spanish_consistency_notes:
  - «Yahvé» no aparece en este versículo.
  - Se usa «Arabá» como topónimo transliterado, de acuerdo con el tratamiento POB de nombres geográficos.
  - Se prefirió «lo mataron» como equivalente natural del causativo hebreo, sin debilitar la causación.
  - Se evitó «siendo» o estructuras demasiado literales para mantener español bíblico moderno y claro.
