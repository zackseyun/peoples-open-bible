  from: whatever passes
  to: whatever passes away
  rationale: In English, 'whatever passes' can sound like physical movement past a
    point (e.g., someone walking by). Adding 'away' clarifies that the text refers
    to mortality and transience, which fits the context of being created from dust
    and departing.
- timestamp: '2026-04-28T09:36:33Z'
  adjudicator: claude-opus-4-7
  reviewer_model: gemini-3.1-pro-preview
  source_review: state/reviews/gemini/vertex_full_book_qc_2026_04/extra_canonical/2_baruch/021/026.job-77199.json
  category: mistranslation
  from: the earth was created from dust
  to: he was created from the earth and from dust
  rationale: The translation misconstrues the Syriac. The text likely reads `mn 'ar'a
    w-mn 'afra 'tbry` ('from the earth and from dust he was created'). The feminine
    noun 'ar'a (earth) cannot be the subject of the masculine verb 'tbry (he was created).
    The subject is man (from the preceding context), who returns to the earth/dust
    because he was created from it (cf. Gen 3:19).
