review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien el hebreo y el rastro POB en casi todo: «harás expiación por el altar», «lo consagrarás» y «santísimo» reflejan adecuadamente כפר, וקדשתו y קֹדֶשׁ קָדָשִׁים. También preserva correctamente la amplitud de כָּל הַנֹּגֵעַ con «Todo lo que toque». Sin embargo, «será santo» para יִקְדָּשׁ debilita el valor resultativo/incoativo que el POB inglés documentó como «shall become holy». En español conviene expresar ese devenir para preservar mejor la lógica ritual del contacto que comunica santidad.'
  spanish_quality_summary: El español es claro, natural y digno. La sintaxis funciona bien en registro bíblico moderno. La única mejora importante es cambiar «será santo» por una forma más naturalmente resultativa, como «quedará santo» o «llegará a ser santo». «Quedará santo» suena mejor en español bíblico actual y comunica el resultado del contacto sin sobreexplicar.
  glossary_alignment: No hay conflictos con la terminología base del proyecto. No aparecen Yahvé, Mesías, δοῦλος, etc. «Consagrar» y «santísimo» están bien justificados. La nota alternativa está bien conservada y anclada. La principal excepción es que la decisión léxica documentada para יִקְדָּשׁ pide una noción de 'llegar a ser santo'; el texto español actual no la refleja suficientemente.
  issues:
  - severity: medium
    issue: «será santo» no refleja plenamente el matiz resultativo de יִקְדָּשׁ
    rationale: 'El hebreo, según la auditoría inglesa, apunta a una santidad impartida por contacto: ''shall become holy''. «Será santo» puede leerse meramente descriptivo o estativo. «Quedará santo» preserva mejor el cambio de estado sin imponer una interpretación ajena al texto.'
  revised_spanish_text: Por siete días harás expiación por el altar y lo consagrarás[a]; y el altar será santísimo. Todo lo que toque el altar quedará santo.
  revised_footnotes:
