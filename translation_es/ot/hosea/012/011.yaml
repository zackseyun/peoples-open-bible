translation:
  language: es
  text: Hablé a los profetas[a]; yo mismo multipliqué visiones[b], y por medio de los profetas[d] di parábolas[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'También: “a los profetas” o, según el giro hebreo, “por medio de los profetas”. El contexto paralelo favorece la idea de mediación profética.'
    reason: alternative_reading
  - marker: b
    text: O “hice abundar visiones”. El verbo hebreo sugiere multiplicar o hacer numerosas las visiones.
    reason: lexical_alternative
  - marker: c
    text: O “usé comparaciones” / “hablé en similitudes”. El verbo hebreo es difícil y puede referirse a un discurso figurado o parabólico.
    reason: lexical_alternative
  - marker: d
    text: Literalmente, “por la mano de los profetas”, un hebraísmo que expresa agencia o medio.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְדִבַּרְתִּי עַל הַנְּבִיאִים
  english_pob_choice: I spoke to the prophets
  chosen_spanish: Hablé a los profetas
  alternatives_spanish:
  - Hablé con los profetas
  - Hablé acerca de los profetas
  - Hablé por medio de los profetas
  lexicon: HALOT
  rationale: El verbo דבר con עַל permite más de una relación semántica; el audit trail inglés revisa la primera cláusula hacia “to the prophets” por mayor cercanía sintáctica. En español, “a los profetas” conserva esa lectura directa sin forzar una mediación no explícita en esta cláusula.
- source_word: וְאָנֹכִי
  english_pob_choice: I myself
  chosen_spanish: yo mismo
  alternatives_spanish:
  - y yo
  - incluso yo
  - yo
  lexicon: HALOT
  rationale: El pronombre independiente añade énfasis. “Yo mismo” preserva ese valor enfático de forma natural en español.
- source_word: חָזוֹן הִרְבֵּיתִי
  english_pob_choice: multiplied visions
  chosen_spanish: multipliqué visiones
  alternatives_spanish:
  - di muchas visiones
  - hice abundar visiones
  - multipliqué las visiones
  lexicon: HALOT
  rationale: El hifil de רבה expresa hacer muchas o multiplicar. “Multipliqué visiones” conserva la concreción del objeto y la fuerza del verbo sin añadir explicaciones.
- source_word: וּבְיַד הַנְּבִיאִים
  english_pob_choice: through the prophets
  chosen_spanish: por medio de los profetas
  alternatives_spanish:
  - por la mano de los profetas
  - mediante los profetas
  - a través de los profetas
  lexicon: HALOT
  rationale: La expresión ביד es un hebraísmo instrumental de agencia. “Por medio de los profetas” comunica claramente la mediación profética en un español natural, sin perder el sentido de instrumento.
- source_word: אֲדַמֶּה
  english_pob_choice: I gave parables
  chosen_spanish: di parábolas
  alternatives_spanish:
  - usé comparaciones
  - hablé en similitudes
  - hice semejanzas
  lexicon: HALOT
  rationale: El piel de דמה es difícil y el audit trail inglés opta por un sentido figurado/parabólico. “Di parábolas” preserva ese modo de comunicación figurativa en un castellano claro y bíblicamente reconocible.
theological_decisions:
- issue: Modo de revelación profética
  english_pob_reading: 'The verse describes God as communicating by means of prophets in multiple forms: speech, visions, and figurative sayings.'
  chosen_spanish_reading: 'El versículo describe a Dios comunicándose mediante los profetas en varias formas: palabra directa, visiones y dichos figurados.'
  alternative_spanish_readings:
  - El versículo podría leerse como que Dios habló solo a los profetas, no necesariamente por medio de ellos.
  - El versículo podría entenderse como una secuencia de comunicaciones proféticas sin enfatizar el medio.
  rationale: La estructura paralela favorece una revelación mediada por profetas. En español, la primera cláusula queda deliberadamente directa (“a los profetas”), mientras que la segunda hace explícita la mediación (“por medio de los profetas”), manteniendo la tensión textual sin resolverla de forma excesiva.
  doctrine_reference: Translation philosophy §1, §3
translation_notes:
  revision_awareness: El auditorio inglés revisó la primera cláusula desde “through the prophets” a “to the prophets” para ajustar la preposición de עַל, y simplificó la segunda cláusula instrumental de “through the hand of the prophets” a “through the prophets”. La presente versión española refleja esa revisión manteniendo la ambigüedad mediada en nota, pero sin introducir una formulación demasiado literal que suene extraña en español.
  spanish_consistency_notes:
  - Se mantiene “profetas” para נביאים en todo el versículo, en coherencia con el audit trail inglés y el registro profético de Oseas.
  - Se traduce el instrumento hebreo ביד con una expresión española natural (“por medio de”), evitando el calco “por la mano de” en el texto principal.
  - Se conserva la imagen concreta de “visiones” y el modo figurado de “parábolas”, sin sustituirlos por explicaciones interpretativas.
  - No se usa “SEÑOR” ni “Cristo”; el texto no lo requiere.
  - La puntuación con punto y coma refleja la estructura triádica del hebreo y ayuda a distinguir las tres acciones divinas.
