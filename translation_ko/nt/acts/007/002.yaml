translation:
  language: ko
  text: 스데반이 답하였습니다. 「형제와 어른 여러분, 들어 주십시오. 영광의 하나님께서 우리 조상 아브라함이 하란에 정착하기 전, 메소포타미아에 있을 때에 그에게 나타나셔서,
  philosophy: optimal-equivalence
theological_decisions:
- issue: 스데반의 긴 구약 회고(Acts 7) 정책
  chosen_reading: 구약 인용·암시를 본문 어휘 그대로 옮기고, 70인역의 κύριος가 YHWH를 가리키는 곳은 「야훼」로 표기하며, 신성한 발화 안의 호칭과 청중을 향한 호칭의 register를 분리한다
  alternative_readings:
  - 모든 κύριος를 「주」로 통일
  rationale: 스데반의 설교는 창세기-출애굽기 본문을 압축적으로 회고한다. 본 역본은 인용·요약 양면에서 원자료의 신학적 무게(특히 신명·언약·예언)를 약화시키지 않으며, 70인역의 κύριος가 YHWH 인용임이 분명한 경우에는 「야훼」로 옮긴다.
  doctrine_reference: 'KOREAN_PIPELINE.md: κύριος(=YHWH) → 야훼; DOCTRINE.md §1·§5'
