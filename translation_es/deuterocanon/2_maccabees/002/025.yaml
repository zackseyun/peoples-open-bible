translation:
  language: es
  text: Y después de haberlo cercado[a], el rey lo hizo un santuario[c][b], tras examinar el asunto.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «después de haberlo cercado con una cerca» o «después de haberlo fortificado»; el participio griego puede sugerir cercar para protección.
    reason: lexical_alternative
  - marker: b
    text: O «un templo» o «un lugar santo»; ἱερόν puede referirse de manera amplia a un recinto sagrado.
    reason: lexical_alternative
  - marker: c
    text: La fuente griega de este versículo está marcada con incertidumbre de validación de la fuente ('major_mismatch'); este borrador sigue directamente la redacción disponible de la zona 1, pero debe revisarse con ediciones críticas.
    reason: textual_variant
lexical_decisions:
- source_word: περιφράξας
  english_pob_choice: after enclosing it
  chosen_spanish: después de haberlo cercado
  alternatives_spanish:
  - después de haberlo rodeado con una cerca
  - después de haberlo fortificado
  - después de haberlo cercado con un muro
  lexicon: LSJ
  rationale: El participio aoristo expresa una acción previa. «Haberlo cercado» conserva la idea de cercar/envolver físicamente sin especificar más de lo que el griego exige. «Cercar» es natural en español y mantiene la posible matiz de protección o delimitación.
- source_word: ἱερὸν
  english_pob_choice: a sanctuary
  chosen_spanish: un santuario
  alternatives_spanish:
  - un templo
  - un lugar sagrado
  - un recinto sagrado
  lexicon: LSJ
  rationale: ἱερόν puede abarcar un recinto sagrado o templo. «Santuario» refleja ese campo semántico amplio mejor que «templo», que podría estrechar demasiado el referente. El artículo indefinido se conserva como en el griego anartro.
- source_word: ἐποίησεν
  english_pob_choice: made
  chosen_spanish: hizo de ello
  alternatives_spanish:
  - lo estableció como
  - lo convirtió en
  - lo hizo
  lexicon: LSJ
  rationale: ποιέω es semánticamente amplio. «Hizo de ello» mantiene la ambigüedad del original entre hacer, establecer o constituir, sin imponer una interpretación más precisa de la que el texto da.
- source_word: δοκιμάσας
  english_pob_choice: having tested
  chosen_spanish: habiendo probado
  alternatives_spanish:
  - habiendo examinado
  - habiéndolo comprobado
  - tras probar
  lexicon: LSJ
  rationale: δοκιμάζω puede significar probar, examinar o verificar. «Habiendo probado» conserva la acción de someter algo a prueba y respeta el participio previo; en español funciona de modo idiomático sin perder la fuerza del verbo griego.
- source_word: τὸ πρᾶγμα
  english_pob_choice: the matter
  chosen_spanish: el asunto
  alternatives_spanish:
  - la cuestión
  - la situación
  - el hecho
  lexicon: LSJ
  rationale: πρᾶγμα es muy general. «Asunto» reproduce bien esa amplitud en español y suena natural en la clausula final, sin forzar un sentido técnico ni demasiado concreto.
