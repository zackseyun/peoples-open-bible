  yaml_path: translation/ot/daniel/003/029.yaml
  text: 'And from me a decree is issued: any people[a], nation, or language that speaks anything offensive against the God of Shadrach, Meshach, and Abed-nego shall be torn limb from limb, and his house shall be made a ruin[c][b], because there is no other god who is able to deliver like this.'
  footnotes:
