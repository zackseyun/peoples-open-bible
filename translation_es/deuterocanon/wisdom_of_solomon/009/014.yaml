  text: Porque los razonamientos de los mortales son tímidos, y nuestros pensamientos son inciertos;
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: λογισμοὶ
  english_pob_choice: reasonings
  chosen_spanish: razonamientos
  alternatives_spanish:
  - pensamientos
  - cálculos
  - planes
  lexicon: LSJ
  rationale: λογισμοί expresa procesos de razonar o deliberar, no solo ideas estáticas. «Razonamientos» conserva ese matiz procesual y distingue este término de ἐπίνοιαι sin fusionarlos en una sola palabra española.
- source_word: θνητῶν
  english_pob_choice: mortals
  chosen_spanish: mortales
  alternatives_spanish:
  - hombres
  - seres humanos
  lexicon: LSJ
  rationale: El término subraya la condición mortal de la humanidad. «Mortales» reproduce mejor ese énfasis antropológico que una opción más genérica como «hombres» o «seres humanos».
- source_word: δειλοί
  english_pob_choice: timid
  chosen_spanish: tímidos
  alternatives_spanish:
  - cobardes
  - débiles
  - temerosos
  lexicon: LSJ
  rationale: En este contexto describe la fragilidad y vacilación del razonamiento humano ante la sabiduría divina. «Tímidos» comunica esa falta de firmeza sin cargar demasiado el juicio moral.
- source_word: ἐπισφαλεῖς
  english_pob_choice: uncertain
  chosen_spanish: inciertos
  alternatives_spanish:
  - precarios
  - inseguros
  - propensos a fallar
  lexicon: LSJ
  rationale: La palabra sugiere inestabilidad y poca fiabilidad. «Inciertos» es natural en español y comunica que los pensamientos humanos no son confiables.
- source_word: ἐπίνοιαι
  english_pob_choice: thoughts
  chosen_spanish: pensamientos
  alternatives_spanish:
  - disposiciones
  - planes
  - concepciones
  lexicon: LSJ
  rationale: El término puede referirse a pensamientos ideados, planes o concepciones. Dado que λογισμοί se vertió como «razonamientos», «pensamientos» mantiene una distinción legible en español sin perder la actividad mental interna.
- source_word: ἡμῶν
  english_pob_choice: our
  chosen_spanish: nuestros
  alternatives_spanish:
  - de nosotros
  lexicon: LSJ
  rationale: La primera persona plural debe conservarse de forma directa. El hablante se incluye entre la humanidad general, por lo que «nuestros» es la opción más natural y fiel.
theological_decisions:
- issue: Énfasis antropológico de θνητῶν
  english_pob_reading: mortals
  chosen_spanish_reading: mortales
  alternative_spanish_readings:
