    reason: lexical_alternative
  - marker: b
    text: Literalmente, "cabezas de casas de padres", una expresión de parentesco para los jefes de hogares ancestrales dentro de los clanes levitas.
    reason: cultural_note
  revision_rationale: Se corrigen las notas para que coincidan con la evidencia fuente y la auditoría inglesa, se añade la nota cultural requerida sobre la expresión genealógica, se reubica el anclaje [a] en la frase pertinente, y se ajusta el nombre a 'Finees', forma española bíblica más reconocible y adecuada.
