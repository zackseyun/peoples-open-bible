translation:
  language: es
  text: 'Todos los que pasan por el camino baten palmas ante ti; silban[a] y sacuden la cabeza sobre la hija de Jerusalén[b]: «¿Es esta la ciudad que llamaban la perfección de la hermosura[c], el gozo de toda la tierra?»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «sisean»; el verbo hebreo puede indicar un sonido agudo de burla, ya se traduzca «silbar» o «sisear».
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: «hija de Jerusalén», personificación poética de la ciudad.'
    reason: cultural_note
  - marker: c
    text: O «perfecta en belleza» o «la perfección de la belleza».
    reason: lexical_alternative
lexical_decisions:
- source_word: סָפְקוּ ... כַּפַּיִם
  english_pob_choice: clap their hands
  chosen_spanish: aplauden
  alternatives_spanish:
  - dan palmadas
  - golpean las palmas
  lexicon: HALOT
  rationale: La expresión hebrea describe un gesto de burla, no simple aplauso celebratorio. En español, «aplauden contra ti» conserva la idea del gesto con las manos y su dirección hostil, sin sonar demasiado literal o mecánico.
- source_word: עָלַיִךְ
  english_pob_choice: at you
  chosen_spanish: contra ti
  alternatives_spanish:
  - sobre ti
  - a ti
  lexicon: HALOT
  rationale: El contexto es de escarnio y hostilidad; «contra ti» expresa mejor la carga adversativa que el mero «a ti».
- source_word: כָּל עֹבְרֵי דֶרֶךְ
  english_pob_choice: all who pass along the road
  chosen_spanish: Todos los que pasan por el camino
  alternatives_spanish:
  - todos los que pasan
  - todos los transeúntes del camino
  lexicon: HALOT
  rationale: «Camino» reproduce דֶרֶךְ de manera natural en español bíblico y conserva la imagen de los viajeros que pasan por allí.
- source_word: שָׁרְקוּ
  english_pob_choice: hiss
  chosen_spanish: silban
  alternatives_spanish:
  - sisearon
  - silbaban
  lexicon: HALOT
  rationale: El hebreo puede significar silbar o silbar/sisear con intención de burla. En español, «silban» comunica bien el gesto sonoro de desprecio y deja abierta la ambigüedad del original que la nota inglesa también preserva.
- source_word: וַיָּנִעוּ רֹאשָׁם
  english_pob_choice: shake their heads
  chosen_spanish: mueven la cabeza
  alternatives_spanish:
  - niegan con la cabeza
  - sacuden la cabeza
  lexicon: HALOT
  rationale: La fórmula hebrea describe un gesto convencional de burla o asombro. «Mueven la cabeza» mantiene el gesto sin forzarlo a una idiomatización excesiva; la lectura de escarnio queda dada por el contexto.
- source_word: עַל בַּת יְרוּשָׁלָם
  english_pob_choice: over daughter Jerusalem
  chosen_spanish: sobre la hija de Jerusalén
  alternatives_spanish:
  - contra la hija de Jerusalén
  - sobre la hija Jerusalén
  lexicon: HALOT
  rationale: Se conserva la personificación poética «hija de Jerusalén», igual que la nota inglesa sobre «daughter Jerusalem». «Sobre» refleja la postura de burla dirigida hacia la ciudad/persona figurada.
- source_word: הֲזֹאת הָעִיר
  english_pob_choice: Is this the city
  chosen_spanish: ¿Es esta la ciudad
  alternatives_spanish:
  - ¿Es esta aquella ciudad?
  lexicon: HALOT
  rationale: Pregunta retórica de desprecio. La forma directa en español conserva el tono escarnecedor y no añade matices inexistentes en el hebreo.
- source_word: שֶׁיֹּאמְרוּ
  english_pob_choice: that they called
  chosen_spanish: de la que decían
  alternatives_spanish:
  - que llamaban
  - de la que solían decir
  lexicon: HALOT
  rationale: El relativo apunta a la fama antigua de Jerusalén. «Decían» reproduce bien el valor de habla tradicional o reputación pública sin volverla demasiado explícita.
- source_word: כְּלִילַת יֹפִי
  english_pob_choice: the perfection of beauty
  chosen_spanish: la perfección de la hermosura
  alternatives_spanish:
  - la perfección de la belleza
  - el esplendor perfecto
  lexicon: HALOT
  rationale: «Hermosura» funciona bien en registro bíblico y literario, y preserva el valor estético exaltado del sintagma nominal. «Perfección de la hermosura» mantiene la estructura compacta del hebreo, como la opción inglesa.
- source_word: מָשׂוֹשׂ לְכָל הָאָרֶץ
  english_pob_choice: the joy of all the earth
  chosen_spanish: el gozo de toda la tierra
  alternatives_spanish:
  - la alegría de toda la tierra
  - el deleite de toda la tierra
  lexicon: HALOT
  rationale: «Gozo» conserva el tono bíblico y la fuerza colectiva de la expresión. «Toda la tierra» sigue el alcance universal del hebreo y de la versión inglesa.
translation_notes:
  revision_awareness: La redacción sigue de cerca el audit trail inglés y no requiere cambios sustantivos respecto del texto fuente; se mantuvo la ambigüedad sonora de שָׁרְקוּ mediante una nota léxica, y la personificación «hija de Jerusalén» con nota cultural, en línea con la revisión más reciente marcada como sin cambios.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» como norma del proyecto solo cuando aparezca el tetragrámaton; este versículo no lo contiene.
  - Se preservó el paralelismo poético con dos miembros principales y una cita final entre comillas.
  - «Hija de Jerusalén» se usó de manera consistente para la personificación de la ciudad, sin convertirla en una fórmula eclesiástica.
  - La opción «perfección de la hermosura» se priorizó sobre un giro más libre para conservar la estructura nominal del hebreo.
