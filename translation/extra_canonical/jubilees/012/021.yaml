translation:
  text: And he said[a], "Shall I return to Ur of the Chaldeans, who seek my face so that I should return to them? And what shall I do here in this place? Make the right path straight before you in the hand of your servant, that he may do it, and let me not walk in the error of my heart, my God." And he finished speaking and praying, and behold, one was sent
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The middle of this verse is difficult in the segmented Ge'ez. The translation preserves the sense of Abram asking God to make the right path straight before him and not let him follow his own erring heart.
    reason: segmentation_note
