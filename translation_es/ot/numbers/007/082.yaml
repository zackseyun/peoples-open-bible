review_pass:
  verdict: revise
  source_alignment_summary: El hebreo שְׂעִיר עִזִּים אֶחָד לְחַטָּאת significa literalmente 'un macho cabrío para ofrenda por el pecado'. El borrador acierta en el numeral y en identificar el animal como macho cabrío, pero 'de las cabras' es una reproducción innecesariamente literal del constructo hebreo que suena antinatural en español, y 'para expiación' no preserva con suficiente precisión el valor cultual nominal de חַטָּאת como ofrenda específica.
  spanish_quality_summary: El texto actual es comprensible, pero 'macho cabrío de las cabras' resulta forzado y poco idiomático. 'Para expiación' es más abstracto que el original sacrificial. Una formulación más natural y fiel en español bíblico moderno es 'un macho cabrío para una ofrenda por el pecado'.
  glossary_alignment: No hay términos del glosario mayor implicados aparte de mantener el sentido cultual preciso. La revisión sigue la decisión inglesa 'for a sin offering' y evita desplazarla a una abstracción teológica ('expiación').
  issues:
  - severity: medium
    issue: '''de las cabras'' calca el constructo hebreo de forma antinatural'
    rationale: שְׂעִיר עִזִּים es una expresión idiomática para 'macho cabrío'; en español no hace falta añadir 'de las cabras' para expresar esa especie.
  - severity: medium
    issue: '''para expiación'' no representa con precisión חַטָּאת en contexto sacrificial'
    rationale: Aquí חַטָּאת no se refiere meramente al resultado expiatorio sino a la ofrenda por el pecado como categoría cultual específica, tal como refleja la auditoría inglesa.
  revised_spanish_text: un macho cabrío para una ofrenda por el pecado;
  revision_rationale: Se elimina un calco poco natural ('de las cabras') y se sustituye 'para expiación' por 'para una ofrenda por el pecado' para reflejar con mayor fidelidad el sustantivo cultual חַטָּאת y la decisión léxica documentada en el POB inglés.
