revisions:
- from: La prostitución[a], el vino y el mosto[b] quitan el corazón.
  to: La inmoralidad sexual, el vino y el vino nuevo quitan el corazón[a].
  rationale: Se corrige «prostitución» a «inmoralidad sexual» para reflejar mejor el sentido amplio de זְנוּת documentado por el POB inglés. Se sustituye «mosto» por «vino nuevo» para seguir más de cerca la distinción léxica hebrea y evitar ambigüedad regional. Se añade la nota necesaria sobre el idiomatismo «quitan el corazón», conforme a la decisión teológica y lexical auditada. No se requiere adjudicación adicional.
  reviewer_model: gpt-5.4
