    rationale: Aunque intenta reflejar el vínculo con 'endecha', en español no se dice 'mujeres endechas' para referirse a mujeres que lamentan profesionalmente. El hebreo participial exige algo como 'las mujeres que endechan' o una designación establecida como 'las plañideras'.
  - severity: medium
