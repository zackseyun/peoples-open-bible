    text: O «por los hombres»; la frase hebrea es breve y puede describir que el grupo doméstico fue presentado en subdivisiones masculinas para el proceso del sorteo.
    reason: lexical_alternative
  revision_rationale: Se corrige la frase procedimental para reflejar mejor לַגְּבָרִים, siguiendo la auditoría inglesa y el hebreo subyacente. También se reemplaza «su casa» por «su familia» para evitar la lectura de edificio y comunicar el sentido de unidad doméstica en este contexto narrativo. Se mantiene «fue tomado» por fidelidad a וַיִּלָּכֵד y se conserva la genealogía formal.
