    text: Or 'every soul.' Here 'soul' is a Hebrew way of referring to a person.
    reason: lexical_alternative
  - marker: c
    text: Hebrew 'chief of the slaughterers/executioners,' a title commonly rendered 'captain of the guard.'
    reason: cultural_note
