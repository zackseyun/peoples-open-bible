id: 2CH.6.10
reference: 2 Chronicles 6:10
source:
  edition: WLC
  text: וַ/יָּ֣קֶם יְהוָ֔ה אֶת דְּבָר֖/וֹ אֲשֶׁ֣ר דִּבֵּ֑ר וָ/אָק֡וּם תַּחַת֩ דָּוִ֨יד אָבִ֜/י וָ/אֵשֵׁ֣ב עַל כִּסֵּ֣א יִשְׂרָאֵ֗ל כַּ/אֲשֶׁר֙ דִּבֶּ֣ר יְהוָ֔ה וָ/אֶבְנֶ֣ה הַ/בַּ֔יִת לְ/שֵׁ֥ם יְהוָ֖ה אֱלֹהֵ֥י יִשְׂרָאֵֽל־׀־׃
translation:
  text: And Yahweh has fulfilled his word that he spoke[a], and I have risen in the place of David my father and sit on the throne of Israel, as Yahweh spoke, and I have built the house for the name of Yahweh[b], the God of Israel.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'has established his word' or 'has carried out his word.' The Hebrew verb literally means 'has caused his word to stand.'
    reason: lexical_alternative
  - marker: b
    text: '''The house'' refers to the temple. The Hebrew keeps the covenantal expression ''house for the name of the LORD.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּקֶם
  chosen: has fulfilled
  alternatives:
  - has established
  - has carried out
  - has confirmed
  lexicon: HALOT
  rationale: The verb קום in the Hiphil here means to cause a word/promise to stand, i.e., to fulfill or carry out it. 'Has fulfilled' is idiomatic English for a spoken promise and fits the object 'his word.'
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: דְּבָרוֹ
  chosen: his word
  alternatives:
  - his promise
  - what he said
  lexicon: HALOT
  rationale: דבר can mean word, matter, or promise. 'His word' preserves the Hebrew expression while allowing the fulfillment sense to emerge from the verb.
- source_word: אֲשֶׁר דִּבֵּר
  chosen: that he spoke
  alternatives:
  - which he said
  - that he had spoken
  lexicon: HALOT
  rationale: A straightforward relative clause is best; 'spoke' keeps verbal consistency with דבר.
- source_word: וָאָקוּם
  chosen: I have arisen
  alternatives:
  - I have risen
  - I arose
  lexicon: HALOT
  rationale: The verb echoes the earlier קום and marks Solomon's succession. 'I have arisen' preserves the formal link and works with the present-result context in English.
- source_word: תַּחַת דָּוִיד אָבִי
  chosen: in the place of David my father
  alternatives:
  - instead of David my father
  - after David my father
  lexicon: HALOT
  rationale: תחת in succession contexts means 'in place of' or 'instead of.' 'In the place of' is natural and preserves the dynastic succession sense without implying hostility or replacement beyond succession.
- source_word: וָאֵשֵׁב
  chosen: sit
  alternatives:
  - have sat
  - am seated
  lexicon: HALOT
  rationale: The verb can be rendered as a present-result state after accession. 'Sit on the throne' is idiomatic royal language in English and pairs naturally with the preceding perfect-like clauses.
- source_word: כִּסֵּא יִשְׂרָאֵל
  chosen: the throne of Israel
  alternatives:
  - Israel's throne
  lexicon: HALOT
  rationale: A direct rendering preserves the formal royal expression.
- source_word: כַּאֲשֶׁר דִּבֶּר יְהוָה
  chosen: as the LORD spoke
  alternatives:
  - as the LORD said
  - just as the LORD had spoken
  lexicon: HALOT
  rationale: This keeps the repeated דבר language and ties Solomon's enthronement to divine promise.
- source_word: וָאֶבְנֶה
  chosen: I have built
  alternatives:
  - I built
  lexicon: HALOT
  rationale: The clause reports a completed action with present relevance in Solomon's speech. 'I have built' fits the discourse context of dedication.
- source_word: הַבַּיִת
  chosen: the house
  alternatives:
  - the temple
  lexicon: HALOT
  rationale: Though it refers to the temple, 'the house' is the Hebrew term and preserves the canonical idiom 'house for the name of the LORD.' 'Temple' is a possible interpretive gloss but is less textually transparent here.
- source_word: לְשֵׁם יְהוָה
  chosen: for the name of the LORD
  alternatives:
  - for the LORD's name
  - in honor of the LORD
  lexicon: HALOT
  rationale: This preserves the important theological expression that the house is for God's name, not a containment of God himself. A more dynamic rendering would lose that biblical-theological nuance.
- source_word: אֱלֹהֵי יִשְׂרָאֵל
  chosen: the God of Israel
  lexicon: HALOT
  rationale: Standard covenantal designation; a direct rendering is best.
