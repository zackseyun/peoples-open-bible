review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien el sentido general del hebreo: prohibición de hablar para que el necio oiga, seguida de la razón de que despreciará el valor de tus palabras. Sin embargo, «al oído de» en español suele sugerir hablar en voz baja o en secreto a una sola oreja, lo cual no refleja bien el modismo hebreo בְּאָזְנֵי ni la decisión auditada «in the hearing of».'
  spanish_quality_summary: El español es claro y digno, pero «No hables al oído de un necio» suena algo marcado e introduce una imagen menos natural que «delante de» o «para que lo oiga». Para conservar la imagen auditiva y seguir siendo natural, «No hables para que lo oiga un necio» funciona mejor. El resto del versículo es legible y fiel; «menospreciará la sabiduría de tus palabras» es aceptable, aunque algo literal.
  glossary_alignment: No hay términos del glosario mayor en juego. «Necio» para כְסִיל está bien y encaja con Proverbios. «Sabiduría» para שֵׂכֶל sigue la revisión inglesa documentada, con nota alternativa adecuada.
  issues:
  - severity: medium
    issue: «al oído de» no representa bien el modismo בְּאָזְנֵי
    rationale: En español, «hablar al oído» normalmente implica susurrar o hablar confidencialmente. El hebreo significa hablar de modo que alguien oiga, no susurrarle al oído. Esto distorsiona levemente la imagen y la pragmática del proverbio.
  - severity: low
    issue: La nota literal usa «oídos» mientras el texto principal usa «oído»
    rationale: La discordancia refuerza que la formulación principal no está alineada con la literalidad que la propia nota intenta preservar.
  revised_spanish_text: No hables para que lo oiga un necio[a], porque menospreciará la sabiduría[b] de tus palabras.
