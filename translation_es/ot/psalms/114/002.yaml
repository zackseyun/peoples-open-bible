translation:
  language: es
  text: Judá se volvió su santuario[a][b], Israel su dominio[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «Judá fue su santuario». El verbo hebreo puede entenderse como estado («era/fue») o como resultado de un cambio («se volvió»).
    reason: lexical_alternative
  - marker: b
    text: O «su lugar santo». El término hebreo puede denotar santidad o un lugar santo/santuario; aquí el sentido concreto encaja mejor con el paralelismo de «su dominio».
    reason: lexical_alternative
  - marker: c
    text: O «su dominio», «su gobierno» o «su reino». El sustantivo hebreo es formalmente plural, pero probablemente expresa una noción abstracta de autoridad.
    reason: lexical_alternative
lexical_decisions:
- source_word: הָיְתָה
  english_pob_choice: became
  chosen_spanish: se volvió
  alternatives_spanish:
  - fue
  - era
  lexicon: HALOT
  rationale: El hebreo היה aquí expresa un cambio de estado en la secuencia poética. En español, «se volvió» transmite mejor ese valor eventivo que «era», y suena más natural que un calco rígido de «llegó a ser».
- source_word: יְהוּדָה
  english_pob_choice: Judah
  chosen_spanish: Judá
  alternatives_spanish:
  - Judea
  lexicon: HALOT
  rationale: Es el nombre propio del territorio/tribu. «Judá» conserva la referencia histórica y literaria del texto hebreo.
- source_word: לְקָדְשׁוֹ
  english_pob_choice: his sanctuary
  chosen_spanish: su santuario
  alternatives_spanish:
  - su lugar santo
  - su santidad
  lexicon: HALOT
  rationale: קֹדֶשׁ puede denotar santidad o un lugar santo. En este contexto paralelo con «su dominio», la lectura concreta de espacio sagrado se expresa mejor con «santuario». El posesivo en español mantiene el referente divino implícito del hebreo.
- source_word: יִשְׂרָאֵל
  english_pob_choice: Israel
  chosen_spanish: Israel
  alternatives_spanish:
  - el pueblo de Israel
  lexicon: HALOT
  rationale: Nombre propio conservado sin expansión para respetar el paralelismo poético y la brevedad del hebreo.
- source_word: מַמְשְׁלוֹתָיו
  english_pob_choice: his dominion
  chosen_spanish: su dominio
  alternatives_spanish:
  - su reino
  - su gobierno
  - sus dominios
  lexicon: HALOT
  rationale: El sustantivo de משל tiene sentido de dominio, gobierno o esfera de autoridad. Aunque la forma es plural, aquí probablemente funciona de manera abstracta; en español, el singular «dominio» reproduce mejor esa abstracción y el paralelismo con «santuario».
theological_decisions:
- issue: Referente del posesivo en «su santuario» y «su dominio»
  english_pob_reading: The suffixes refer to God/the LORD.
  chosen_spanish_reading: Los posesivos se entienden como referencia a Dios, implícito en el salmo.
  alternative_spanish_readings:
  - Los posesivos quedan implícitos sin explicitar a Dios en la frase.
  - «su» podría leerse de forma más vaga como referencia contextual.
  rationale: El salmo habla del éxodo y de la relación de Israel con su Dios; el posesivo femenino/masculino del hebreo apunta naturalmente a él. En español, «su» preserva la tersura del hebreo sin añadir una glosa como «de Yahvé» dentro del versículo.
  doctrine_reference: Affirmations; Translation philosophy §1 y §3
- issue: Tratamiento del paralelismo Judá / Israel
  english_pob_reading: Maintain both names distinctly rather than harmonizing them into a single collective expression.
  chosen_spanish_reading: Se mantienen ambos nombres como unidades poéticas distintas.
  alternative_spanish_readings:
  - Judá fue su pueblo santo, Israel su reino.
  - Judá fue su santuario, e Israel su dominio.
  rationale: El hebreo presenta un paralelismo deliberado entre Judá e Israel. Mantener ambos nombres evita nivelar la estructura poética y no introduce una interpretación explicativa ajena al texto.
  doctrine_reference: Translation philosophy §1 y §5
translation_notes:
  revision_awareness: No hay revisiones aplicadas en el expediente inglés; se sigue la lectura de alta concordancia, con ajuste español para naturalidad sintáctica sin alterar el valor eventivo de היה ni la abstracción de מַמְשְׁלוֹתָיו.
  spanish_consistency_notes:
  - Se preserva el paralelismo directo entre Judá e Israel.
  - Se usa «santuario» para קֹדֶשׁ por el contexto concreto y litúrgico.
  - Se usa «dominio» en singular para reflejar el plural abstracto del hebreo.
  - El posesivo «su» mantiene el referente divino implícito sin sobreexplicitarlo.
