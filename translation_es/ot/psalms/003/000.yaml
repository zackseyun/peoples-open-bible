translation:
  language: es
  text: Un salmo de David[a], cuando huyó de Absalón su hijo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «por David» o «para David»; el encabezamiento hebreo puede indicar autoría, dedicación o asociación.
    reason: alternative_reading
lexical_decisions:
- source_word: מִזְמוֹר
  english_pob_choice: A psalm
  chosen_spanish: Un salmo
  alternatives_spanish:
  - Una melodía
  - Un canto
  lexicon: HALOT
  rationale: En un encabezado poético, ‘salmo’ es el equivalente español establecido y preciso para מִזְמוֹר; conserva el género literario mejor que opciones más generales como ‘canto’.
- source_word: לְדָוִד
  english_pob_choice: of David
  chosen_spanish: de David
  alternatives_spanish:
  - por David
  - para David
  - perteneciente a David
  lexicon: HALOT
  rationale: La preposición ל en encabezamientos de salmos puede señalar autoría, dedicación o asociación. ‘De David’ mantiene esa ambigüedad sin resolverla de manera más fuerte de lo que permite el hebreo.
- source_word: בְּבָרְחוֹ
  english_pob_choice: when he fled
  chosen_spanish: cuando huyó
  alternatives_spanish:
  - en su huida
  - durante su huida
  lexicon: HALOT
  rationale: El valor temporal se expresa naturalmente en español con ‘cuando huyó’; preserva el sentido sin una construcción demasiado literal o pesada.
- source_word: מִפְּנֵי
  english_pob_choice: from
  chosen_spanish: de
  alternatives_spanish:
  - de delante de
  - lejos de la presencia de
  lexicon: HALOT
  rationale: Aunque literalmente puede ser ‘de delante de’/‘de la presencia de’, en este contexto la idea es la huida desde la presencia de alguien. ‘De’ comunica el sentido de forma idiomática en español.
- source_word: בְּנוֹ
  english_pob_choice: his son
  chosen_spanish: su hijo
  alternatives_spanish:
  - el hijo de él
  lexicon: HALOT
  rationale: ‘Su hijo’ es la forma natural en español y conserva el vínculo filial subrayado por el encabezado.
theological_decisions:
- issue: Sentido del encabezamiento davídico
  english_pob_reading: Retain the ambiguous 'of David' rather than specifying authorship.
  chosen_spanish_reading: Mantener ‘de David’ sin precisar autoría, dedicación o asociación.
  alternative_spanish_readings:
  - por David
  - para David
  rationale: Los encabezamientos de salmos pueden indicar autoría, pertenencia, dedicación o asociación. El hebreo no obliga a una sola lectura, así que la traducción conserva esa tensión interpretativa en lugar de resolverla.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: La versión sigue de cerca el paquete de fuente hebrea y el criterio auditado del POB en inglés, conservando la ambigüedad del encabezamiento davídico y la relación familiar explícita del cierre, sin introducir interpretaciones adicionales.
  spanish_consistency_notes:
  - Se usa ‘salmo’ como término técnico para מִזְמוֹר.
  - Se conserva ‘David’ y ‘Absalón’ como transliteraciones estándar.
  - Se mantiene ‘de David’ para reflejar la ambigüedad del ל hebreo.
  - El texto fluye como encabezado poético/publicable en español y evita un calco excesivo.
