translation:
  language: es
  text: y con ella no hay parcialidad ni distinción[a], sino que hace lo justo en vez de todo lo injusto y malo; y todos aprueban sus obras[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literalmente, «recibir rostros»; es un modismo que significa mostrar favoritismo o parcialidad.
    reason: lexical_alternative
  - marker: b
    text: 'O: «se separa de todo lo injusto y malo». La frase griega puede entenderse como separación respecto de cosas injustas y malas, o más personalmente respecto de personas injustas y malas.'
    reason: lexical_alternative
lexical_decisions:
- source_word: παρʼ αὐτῇ
  english_pob_choice: with her
  chosen_spanish: con ella
  alternatives_spanish:
  - en su presencia
  - ante ella
  lexicon: LSJ
  rationale: La expresión griega sitúa el enunciado en relación con la figura personificada del contexto; en español, «con ella» conserva esa relación de manera natural y no añade un matiz espacial más específico que el texto no exige.
- source_word: λαμβάνειν πρόσωπα
  english_pob_choice: partiality
  chosen_spanish: parcialidad
  alternatives_spanish:
  - favoritismo
  - acepción de personas
  lexicon: LSJ
  rationale: El modismo literalmente alude a «recibir rostros/personas» y expresa el sentido ético de favoritismo. «Parcialidad» es la forma más natural y clara en español para este uso.
- source_word: διαφορά
  english_pob_choice: distinction
  chosen_spanish: distinción
  alternatives_spanish:
  - diferencia
  - discriminación
  lexicon: LSJ
  rationale: Aquí el término va paralelo a la negación de parcialidad y habla de hacer distinciones entre personas. «Distinción» conserva ese valor moral/judicial sin introducir connotaciones modernas no deseadas.
- source_word: τὰ δίκαια
  english_pob_choice: what is righteous
  chosen_spanish: lo justo
  alternatives_spanish:
  - lo recto
  - las cosas justas
  lexicon: LSJ
  rationale: El plural neutro con adjetivo apunta a acciones o conductas justas. «Lo justo» es una solución española natural que mantiene la cualidad moral del griego.
- source_word: ἀδίκων καὶ πονηρῶν
  english_pob_choice: all that is unjust and evil
  chosen_spanish: todo lo injusto y malo
  alternatives_spanish:
  - los injustos y malos
  - todo lo inicuo y perverso
  lexicon: LSJ
  rationale: El griego usa plurales articularios que pueden entenderse como categorías morales. «Todo lo injusto y malo» preserva ese valor impersonal y evita forzar una referencia personal donde el contexto admite ambas posibilidades.
- source_word: ποιεῖ
  english_pob_choice: does
  chosen_spanish: hace
  alternatives_spanish:
  - obra
  - practica
  lexicon: LSJ
  rationale: «Hace» es el verbo más directo y natural en español para expresar la acción de realizar lo justo.
- source_word: τοῖς ἔργοις αὐτῆς
  english_pob_choice: her works
  chosen_spanish: sus obras
  alternatives_spanish:
  - sus hechos
  - lo que hace
  lexicon: LSJ
  rationale: ἔργα se traduce de forma estable como «obras» y mantiene un vínculo formal con el griego, además de sonar digno y claro en español.
theological_decisions:
- issue: Personificación femenina del sujeto
  english_pob_reading: Retain feminine pronouns ('her') for the antecedent carried over from the context, reflecting personified Wisdom/Truth.
  chosen_spanish_reading: Conservar el referente femenino implícito mediante «ella» y «sus», reflejando la personificación del contexto.
  alternative_spanish_readings:
  - Repetir explícitamente «sabiduría» o «verdad»
  - Usar un sujeto impersonal como «esto»
  rationale: El griego emplea formas femeninas y el contexto personifica el sujeto. Mantener la referencia femenina en español preserva el tejido literario y teológico sin aplanarlo.
  doctrine_reference: 'DOCTRINE.md: Preserve theological tension rather than resolve it; readable modern Spanish'
- issue: ἔργοις αὐτῆς y la valoración universal de sus obras
  english_pob_reading: and all approve of her works
  chosen_spanish_reading: y todos aprueban sus obras
  alternative_spanish_readings:
  - y todos se complacen en sus obras
  - y todos están de acuerdo con sus obras
  rationale: «Aprueban» recoge bien el valor evaluativo del verbo griego y encaja con el marco moral de la cláusula. Se evita intensificar el sentido hacia simple deleite sin apoyo necesario.
  doctrine_reference: LSJ; contexto ético de la personificación
translation_notes:
  revision_awareness: La redacción sigue de cerca el texto griego de Swete LXX 1909 y toma en cuenta el ajuste editorial del POB inglés, especialmente la lectura contrastiva de ἀπό como oposición («rather than») en vez de simple separación espacial. En español se optó por «apartándose de» para conservar tanto la idea de contraste moral como la posibilidad de una lectura de separación, sin borrar la ambigüedad documentada.
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando el texto fuente lo requiera; aquí no aparece el nombre divino.
  - Se mantiene «parcialidad» como término técnico ético-jurídico coherente con la tradición POB.
  - «Sus obras» conserva el plural formal de ἔργα y evita una paráfrasis más libre.
  - La personificación femenina se conserva mediante pronombres y posesivos femeninos implícitos en la concordancia española.
