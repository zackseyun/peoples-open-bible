translation:
  text: 1[a]. Now my father kept asking about me, because he had seen me gloomy, and I told him, “My liver is swollen.” 2. For I was grieving more than all the others, because I was responsible for the sale of Joseph. 3. And when we went down into Egypt and he bound me as a spy, I knew that I was suffering justly, and I was not distressed. 4. But Joseph was a good man[b], and having the Spirit of God in him, being compassionate and merciful, he did not hold a grudge against me, but loved me along with my brothers. 5. Therefore guard yourselves, my children, from every jealousy and envy, and walk in simplicity of heart, so that God may also give you favor and glory and blessing upon your heads, just as you saw in Joseph. 6. All his days he did not reproach us about this matter, but he loved us as his own soul, and honored us above his own sons, and granted us riches and livestock and produce. 7. And you also, my children, let each one love his brother with a good heart, and the spirit of envy will depart from you. 8. For this makes the soul savage, and destroys the body; it brings anger and war to one’s designs, and provokes to bloodshed, and leads the mind into frenzy, and gives the soul upheaval and the body trembling. 9. For even in sleep envy, presenting to him visions of wickedness, consumes him and troubles his soul with evil spirits, and makes the body shudder, and wakes the mind in turmoil; and like an evil and venomous spirit[c][d], so he appears to people.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: '"My liver is swollen" reflects an ancient bodily idiom for inner anguish or distress; Simeon gives his father a physical explanation for his troubled appearance.'
    reason: cultural_note
    anchor_ref: '4:1'
  - marker: b
    text: '"Simplicity of heart" can also be rendered "single-heartedness" or "sincerity of heart."'
    reason: lexical_alternative
    anchor_ref: '4:5'
  - marker: d
    text: The pair "jealousy and envy" renders two related Greek terms (ζῆλος, φθόνος), both negative here.
    reason: lexical_alternative
    anchor_ref: '4:8'
  - marker: c
    text: The final clause may mean either that the envious person appears to others like an evil, venomous spirit, or that envy itself appears in that way.
    reason: alternative_reading
    anchor_ref: '4:9'
lexical_decisions:
- source_word: σκυθρωπός
  chosen: gloomy
  alternatives:
  - downcast
  - sullen
  lexicon: LSJ
  rationale: Conveys visible dejection in natural English without sounding overly modern; fits Jacob noticing Simeon's troubled appearance.
- source_word: τὰ ἤπατά μου ὀγκοῦμαι
  chosen: My liver is swollen
  alternatives:
  - my liver is inflamed
  - I am sick at heart
  lexicon: LSJ
  rationale: Retains the concrete ancient physiological idiom rather than paraphrasing it away. The liver was associated with inner distress; a note preserves the cultural sense.
- source_word: τῆς πράσεως
  chosen: the sale
  alternatives:
  - the selling
  - the betrayal
  lexicon: LSJ
  rationale: The Greek specifically refers to Joseph's sale, not a generalized betrayal; 'sale' preserves the concrete wrongdoing.
- source_word: δίκαιως πάσχω
  chosen: I was suffering justly
  alternatives:
  - I was rightly suffering
  - I deserved what I suffered
  lexicon: LSJ
  rationale: Keeps the moral-judicial force of δικαίως while remaining readable.
- source_word: ἀγαθὸς ἀνήρ
  chosen: a good man
  alternatives:
  - a noble man
  - a virtuous man
  lexicon: LSJ
  rationale: Simple and direct, matching the testamentary style and Joseph's moral character.
- source_word: πνεῦμα θεοῦ ἐν αὐτῷ
  chosen: the Spirit of God was in him
  alternatives:
  - a spirit of God was in him
  - God's spirit was in him
  lexicon: LSJ
  rationale: The phrase naturally bears a strong theological sense here; capitalized 'Spirit' reflects that likely sense while preserving the wording of the Greek.
- source_word: εὔσπλαγχνος
  chosen: compassionate
  alternatives:
  - tenderhearted
  - kindhearted
  lexicon: LSJ
  rationale: A clear modern equivalent for inward pity/compassion.
- source_word: ἐμνησικάκησέν
  chosen: did not hold a grudge
  alternatives:
  - did not remember wrongs
  - did not bear malice
  lexicon: LSJ
  rationale: Captures the idiomatic sense of refusing to retain resentment.
- source_word: ἁπλότης καρδίας
  chosen: simplicity of heart
  alternatives:
  - single-heartedness
  - sincerity of heart
  lexicon: LSJ
  rationale: 'Preserves a key ethical term in testament literature: undivided, guileless inwardness.'
- source_word: ζῆλος / φθόνος
  chosen: jealousy and envy
  alternatives:
  - zeal and envy
  - jealous rivalry and envy
  lexicon: LSJ
  rationale: In this context ζῆλος is negative, so 'jealousy' fits better than the more neutral or positive 'zeal'; paired with φθόνος to preserve the vice catalogue.
- source_word: ψυχὴν αὐτοῦ
  chosen: his own soul
  alternatives:
  - his own life
  - his very self
  lexicon: LSJ
  rationale: Retains the anthropological language of the Greek while remaining intelligible in English.
- source_word: ἐδόξασεν
  chosen: honored
  alternatives:
  - glorified
  - treated with honor
  lexicon: LSJ
  rationale: Avoids overly exalted English while preserving the sense of giving honor.
- source_word: ἀγριοῖ
  chosen: makes ... savage
  alternatives:
  - embitters
  - makes wild
  lexicon: LSJ
  rationale: 'Keeps the vivid, harsh force of the verb: envy brutalizes the inner person.'
- source_word: διαβούλιον
  chosen: one’s plans
  alternatives:
  - counsel
  - deliberation
  lexicon: LSJ
  rationale: The sense is the sphere of deliberation or intention; 'plans' is readable while preserving the mental dimension.
- source_word: εἰς αἵματα
  chosen: to bloodshed
  alternatives:
  - to acts of blood
  - to murder
  lexicon: LSJ
  rationale: Preserves the plural idiom as a general movement toward violent blood-guilt.
- source_word: ἔκστασις
  chosen: frenzy
  alternatives:
  - madness
  - derangement
  lexicon: LSJ
  rationale: Conveys mental displacement and agitation without overcommitting to clinical language.
- source_word: κλόνος
  chosen: upheaval
  alternatives:
  - agitation
  - shaking
  lexicon: LSJ
  rationale: Matches the parallel bodily trembling while distinguishing the soul's inner disturbance.
- source_word: φαντάζουσα
  chosen: presenting ... visions
  alternatives:
  - showing apparitions
  - imagining
  lexicon: LSJ
  rationale: Reflects the dreamlike, imagistic force in context rather than reducing it to mere thought.
- source_word: ἐκθροεῖσθαι
  chosen: start up in fear
  alternatives:
  - cry out
  - be startled
  lexicon: LSJ
  rationale: 'Best fits the sleep context: the body is jolted awake in alarm.'
- source_word: ἰοβόλος
  chosen: venomous
  alternatives:
  - poisonous
  - venom-casting
  lexicon: LSJ
  rationale: A vivid moral image; 'venomous' is idiomatic and forceful in English.
