translation:
  language: es
  text: 'Entonces Yahvé respondió y dijo a su pueblo: «He aquí, les envío el grano, el vino nuevo y el aceite[a]; se saciarán de ello[b], y ya no los haré un oprobio entre las naciones».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «el aceite fresco», probablemente aceite de oliva; el término hebreo se refiere al aceite fresco como parte de la tríada agrícola estándar de grano, vino y aceite.
    reason: lexical_alternative
  - marker: b
    text: O «ya no los convertiré en un oprobio entre las naciones».
    reason: alternative_reading
lexical_decisions:
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahvé
  - Jehová
  lexicon: HALOT
  rationale: El texto hebreo tiene el nombre propio divino, no un título. En español, el equivalente auditado del POB es «Yahvé», que preserva el Tetragrámaton sin sustituirlo por «SEÑOR».
- source_word: וַיַּעַן
  english_pob_choice: answered
  chosen_spanish: respondió
  alternatives_spanish:
  - respondió
  - contestó
  lexicon: HALOT
  rationale: La fórmula narrativa expresa respuesta a una situación previa. «Respondió» reproduce bien el valor de contestar a una petición o clamor sin cargar el tono de «contestó».
- source_word: וַיֹּאמֶר
  english_pob_choice: said
  chosen_spanish: dijo
  alternatives_spanish:
  - dijo
  - declaró
  lexicon: HALOT
  rationale: אָמַר es el verbo estándar «decir». «Dijo» es la opción más directa y fiel al encadenamiento narrativo.
- source_word: לְעַמּוֹ
  english_pob_choice: to his people
  chosen_spanish: a su pueblo
  alternatives_spanish:
  - a su pueblo
  - a su gente
  lexicon: HALOT
  rationale: עַם aquí designa al pueblo del pacto en conjunto. «Su pueblo» mantiene la relación posesiva y comunitaria del hebreo.
- source_word: הִנְנִי
  english_pob_choice: Behold, I am / Look, I am
  chosen_spanish: Mira, estoy
  alternatives_spanish:
  - Mira, estoy
  - He aquí, estoy
  lexicon: HALOT
  rationale: La partícula deíctica expresa inmediatez y énfasis. «Mira, estoy» suena natural en español actual y conserva el valor llamativo sin recurrir a un arcaísmo innecesario.
- source_word: שֹׁלֵחַ
  english_pob_choice: sending
  chosen_spanish: enviándoles
  alternatives_spanish:
  - enviándoles
  - voy a enviarles
  lexicon: HALOT
  rationale: El participio con הִנְנִי expresa acción inminente/segura. «Estoy enviándoles» refleja esa cercanía; el dativo «les» reproduce el destinatario explícito del hebreo.
- source_word: הַדָּגָן
  english_pob_choice: the grain
  chosen_spanish: el grano
  alternatives_spanish:
  - el grano
  - el cereal
  lexicon: HALOT
  rationale: דָּגָן designa grano/cereal de manera general. «Grano» es el equivalente natural en español y conserva el artículo.
- source_word: הַתִּירוֹשׁ
  english_pob_choice: the new wine
  chosen_spanish: el vino nuevo
  alternatives_spanish:
  - el vino nuevo
  - el vino fresco
  lexicon: HALOT
  rationale: תִּירוֹשׁ se refiere al vino recién producido. «Vino nuevo» conserva el matiz agrícola específico documentado por el POB.
- source_word: הַיִּצְהָר
  english_pob_choice: the oil / the fresh oil
  chosen_spanish: el aceite
  alternatives_spanish:
  - el aceite
  - el aceite fresco
  - el aceite de oliva
  lexicon: HALOT
  rationale: יִצְהָר apunta al aceite producido dentro de la triada agrícola habitual. En español, «aceite» es la forma más sobria y natural; el contexto ya delimita que se trata del aceite de la cosecha, comúnmente de oliva.
- source_word: וּשְׂבַעְתֶּם אֹתוֹ
  english_pob_choice: and you will be satisfied with it
  chosen_spanish: y se saciarán de ello
  alternatives_spanish:
  - y se saciarán de ello
  - y quedarán satisfechos con ello
  lexicon: HALOT
  rationale: שׂבע significa saciarse/llenarse hasta quedar satisfecho. «Se saciarán de ello» expresa la plenitud resultante y mantiene el referente colectivo del pronombre.
- source_word: וְלֹא אֶתֵּן אֶתְכֶם עוֹד
  english_pob_choice: and I will no longer make you
  chosen_spanish: y ya no haré de ustedes
  alternatives_spanish:
  - y ya no haré de ustedes
  - y ya no los pondré como
  lexicon: HALOT
  rationale: 'La construcción hebrea puede tener valor causativo: hacer/poner a alguien en cierto estado. «Haré de ustedes» comunica esa función sin forzar un giro demasiado literal o extraño en español.'
- source_word: חֶרְפָּה
  english_pob_choice: a reproach
  chosen_spanish: un oprobio
  alternatives_spanish:
  - un oprobio
  - una vergüenza
  - un reproche
  lexicon: HALOT
  rationale: חֶרְפָּה denota reproche, afrenta o deshonra pública. «Oprobio» conserva el peso formal y la dimensión de deshonra social del término.
- source_word: בַּגּוֹיִם
  english_pob_choice: among the nations
  chosen_spanish: entre las naciones
  alternatives_spanish:
  - entre las naciones
  - entre los pueblos
  lexicon: HALOT
  rationale: גּוֹיִם aquí se refiere a las naciones circundantes. «Entre las naciones» mantiene el sentido internacional y evita un giro eclesiástico ajeno al contexto.
theological_decisions:
- issue: Nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Jehová
  - el SEÑOR
  rationale: Se preserva el nombre propio del pacto, no una sustitución titulada. La forma española auditada en el proyecto es «Yahvé», coherente con el inglés POB «Yahweh» y con la política de no enmascarar el Tetragrámaton.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: La triada agrícola como restauración material
  english_pob_reading: material covenant restoration through agricultural abundance
  chosen_spanish_reading: restauración material del pacto mediante abundancia agrícola
  alternative_spanish_readings:
  - bendición espiritual puramente simbólica
  - restauración agrícola con posible sentido amplio
  rationale: El hebreo promete grano, vino nuevo y aceite de forma concreta. La traducción evita espiritualizar el pasaje y conserva su carácter de restauración tangible dentro del marco del pacto.
  doctrine_reference: 'DOCTRINE.md Translation philosophy #1 y #3'
- issue: חֶרְפָּה בַּגּוֹיִם
  english_pob_reading: public shame before other nations
  chosen_spanish_reading: oprobio público entre las naciones
  alternative_spanish_readings:
  - vergüenza interna solamente
  - escarnio entre las naciones
  rationale: La frase habla del estatus de Israel ante los pueblos vecinos, no solo de un sentimiento interno. «Oprobio» y «entre las naciones» conservan la dimensión pública e internacional de la deshonra.
  doctrine_reference: 'DOCTRINE.md Translation philosophy #1'
translation_notes:
  revision_awareness: 'Esta redacción sigue de cerca el último pase de revisión del POB en inglés: mantuvo la secuencia narrativa «respondió y dijo», conservó la triada agrícola con «grano, vino nuevo y aceite», y reflejó el valor de satisfacción y la promesa de no volver a ser motivo de deshonra pública entre las naciones. La principal adaptación fue escoger un español natural y reverente sin perder la precisión del hebreo.'
  spanish_consistency_notes:
  - Se usa «Yahvé» para el nombre divino en todo el pasaje, conforme al estándar del proyecto.
  - 'Se conserva la triada agrícola con términos consistentes: grano, vino nuevo y aceite.'
  - «Oprobio» mantiene el registro formal del hebreo חֶרְפָּה y armoniza con el tono profético.
  - El marcador [a] se ancla en «aceite» porque allí se concentra la alternativa léxica documentada.
  - El marcador [b] se ancla en la cláusula final porque allí aparece la alternativa de lectura sobre la deshonra pública.
