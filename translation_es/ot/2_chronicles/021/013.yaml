  text: וַ/תֵּ֗לֶךְ בְּ/דֶ֨רֶךְ֙ מַלְכֵ֣י יִשְׂרָאֵ֔ל וַ/תַּזְנֶ֤ה אֶת יְהוּדָה֙ וְ/אֶת יֹשְׁבֵ֣י יְרוּשָׁלִַ֔ם כְּ/הַזְנ֖וֹת בֵּ֣ית אַחְאָ֑ב וְ/גַ֨ם אֶת אַחֶ֧י/ךָ בֵית אָבִ֛י/ךָ הַ/טּוֹבִ֥ים מִמְּ/ךָ֖ הָרָֽגְתָּ־־־־׃
base_translation:
  language: en
  yaml_path: translation/ot/2_chronicles/021/013.yaml
  text: but you have walked in the way of the kings of Israel[a], and have caused Judah and the inhabitants of Jerusalem to prostitute themselves, as the house of Ahab caused them to prostitute themselves; and you have also killed your brothers of your father’s house[b], who were better than you.
  footnotes:
  - marker: a
    text: Or, more literally, 'made Judah and the inhabitants of Jerusalem play the prostitute,' a prophetic metaphor for covenant unfaithfulness, often expressed in idolatry.
    reason: lexical_alternative
  - marker: b
    text: '''The house of Ahab'' refers to Ahab’s ruling dynasty.'
    reason: cultural_note
