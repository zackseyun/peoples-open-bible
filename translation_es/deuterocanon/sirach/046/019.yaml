translation:
  language: es
  text: 'Aun hasta el tiempo de su fin, fue hallado fiel ante Yahvé: «He tomado un soborno[a] y lo he ocultado; ¿de quién he tomado algo? Y nadie respondió contra él»[b].'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El hebreo es breve y puede entenderse como «rescate», pero en este contexto la acusación implícita es de pago corrupto; el testigo griego lo amplía como «dinero», incluso «hasta las sandalias».
    reason: lexical_alternative
  - marker: b
    text: El hebreo dice literalmente «nadie respondió contra él»; el griego expresa más claramente «nadie presentó una acusación contra él».
    reason: alternative_reading
lexical_decisions:
- source_word: וגם עד עת קצו
  english_pob_choice: Even up to the time of his end
  chosen_spanish: Y hasta antes del tiempo de su fin
  alternatives_spanish:
  - Y aun hasta el tiempo de su fin
  - Y aun antes del tiempo de su muerte
  lexicon: HALOT
  rationale: Mantiene la cercanía del hebreo y conserva el matiz temporal del testimonio final. «Antes del tiempo de su fin» refleja la formulación del griego («antes del tiempo de su sueño eterno») sin imponerla como lectura única en el cuerpo principal.
- source_word: נכון נמצא
  english_pob_choice: he was found faithful
  chosen_spanish: fue hallado fiel
  alternatives_spanish:
  - fue hallado firme
  - fue hallado confiable
  - fue hallado estable
  lexicon: HALOT
  rationale: «Fiel» comunica bien la confiabilidad moral de נמצא נכון en este contexto de integridad pública. Preserva la idea de firmeza sin sonar técnico o forzado en español.
- source_word: בעיני יהוה
  english_pob_choice: in the eyes of Yahweh
  chosen_spanish: ante Yahvé
  alternatives_spanish:
  - a los ojos de Yahvé
  - en la presencia de Yahvé
  - delante de Yahvé
  lexicon: HALOT
  rationale: «Ante Yahvé» es natural en español y conserva el valor idiomático de evaluación divina. Se usa «Yahvé» conforme al criterio del proyecto para יהוה.
- source_word: כפר
  english_pob_choice: I have taken a bribe
  chosen_spanish: He tomado un soborno
  alternatives_spanish:
  - He tomado un rescate
  - He tomado una compensación
  lexicon: HALOT
  rationale: Aquí el contexto judicial y la revisión inglesa favorecen «soborno» como mejor equivalente pragmático. «Rescate» queda como alternativa posible por la polisemia de כפר, pero en este verso la acusación implícita es de pago corrupto.
- source_word: ונעלם
  english_pob_choice: and concealed it
  chosen_spanish: y lo he ocultado
  alternatives_spanish:
  - y lo he encubierto
  - y lo he escondido
  lexicon: HALOT
  rationale: «Ocultado» reproduce con claridad la idea de encubrimiento que acompaña al acto de aceptar el pago. Es más natural que un calco rígido y conserva la carga ética del verbo.
- source_word: ממי לקחתי
  english_pob_choice: from whose hand have I taken anything?
  chosen_spanish: ¿de quién he tomado algo?
  alternatives_spanish:
  - ¿de quién he tomado esto?
  - ¿de cuya mano he tomado algo?
  lexicon: HALOT
  rationale: El hebreo es elíptico; en español, «¿de quién he tomado algo?» es claro y fiel. Se evita introducir «mano» en el texto principal porque no está explícita en el hebreo, aunque el griego y la revisión inglesa lo sugieren como expansión interpretativa.
- source_word: וכל אדם לא ענה בו
  english_pob_choice: And no one answered against him
  chosen_spanish: Y nadie respondió contra él
  alternatives_spanish:
  - Y nadie lo acusó
  - Y nadie presentó cargo contra él
  lexicon: HALOT
  rationale: «Responder contra él» sigue más de cerca la sintaxis hebrea y conserva la posible ambigüedad entre respuesta, réplica o acusación. La alternativa forense más explícita se reserva para nota, en consonancia con el griego.
theological_decisions:
- issue: Divine name rendering
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: El hebreo tiene יהוה y el proyecto pide «Yahvé» como forma principal. Se evita el sustituto reverencial «SEÑOR» para mantener transparencia textual y coherencia con el criterio doctrinal del POB.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Tensión entre el hebreo breve y el griego más explícito
  english_pob_reading: Hebrew is somewhat terse here; the Greek witness reads more explicitly
  chosen_spanish_reading: Mantener en el texto principal la brevedad hebrea, con nota sobre la expansión griega
  alternative_spanish_readings:
  - Integrar la expansión griega en el texto principal
  - Suavizar la brevedad para armonizar ambos testigos
  rationale: La POB inglesa preserva la tensión textual en lugar de resolverla. En español se conserva la formulación breve del hebreo y se documenta la expansión griega en una nota, sin mezclar ambos testigos de manera no auditable.
  doctrine_reference: 'DOCTRINE.md: Preserve theological tension rather than resolve it'
- issue: Naturaleza de la falta implícita en כפר
  english_pob_reading: bribe rather than ransom
  chosen_spanish_reading: soborno
  alternative_spanish_readings:
  - rescate
  - compensación
  - pago
  rationale: El contexto de integridad judicial exige una lectura de pago corrupto; «soborno» transmite ese valor mejor que «rescate» en español actual. No se elimina, sin embargo, la polisemia del término en la nota textual.
  doctrine_reference: 'DOCTRINE.md: Preserve lexical nuance'
translation_notes:
  revision_awareness: Tomé en cuenta la revisión inglesa más reciente, que corrigió «ransom» a «bribe» y ajustó «from whom have I taken anything?» a una formulación más natural. La versión española adopta esa corrección semántica con «soborno», pero conserva la brevedad del hebreo en el movimiento final y documenta la expansión griega en nota, dado que el expediente marca la concordancia como necesitada de revisión.
  spanish_consistency_notes:
  - Usé «Yahvé» para יהוה conforme al estándar del proyecto.
  - Preferí «soborno» para reflejar la decisión inglesa revisada y la fuerza contextual de כפר.
  - Mantuve «nadie respondió contra él» en el texto principal para conservar la sintaxis hebrea, con nota aclaratoria sobre la lectura forense.
  - No usé «Cristo» ni «Mesías» porque en este versículo el griego χριστοῦ αὐτοῦ es un testigo expansivo del texto griego y no una lectura principal del hebreo base; la nota la documenta sin desplazar el texto principal.
