translation:
  text: 'I am peace[a], and war has come because of me[c][b];

    and I am a foreigner and a citizen.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Or: ''stranger''. Both are acceptable renderings of ⲝⲉⲛⲟⲥ; ''foreigner''
      foregrounds the civic contrast with ''citizen''.'
    reason: lexical_alternative
  - marker: b
    text: '''Has arisen'' is also possible for the perfect of ''to come'' and preserves
      the sense of war breaking out.'
    reason: lexical_alternative
  - marker: c
    text: The OCR excerpt here shows unrelated Greek loans (kolasis, physis, ktisis,
      psychē), indicating a likely misalignment with this segment.
    reason: alignment_note
lexical_decisions:
- source_word: ϩⲓⲣⲏⲛⲏ (loan from Greek εἰρήνη)
  chosen: peace
  alternatives:
  - tranquility
  - harmony
  lexicon: Crum; Layton; LSJ (for Greek loans)
  rationale: Straightforward, high-salience antonym to 'war'; preserves the poem’s
    paradox without softening.
- source_word: ⲡⲟⲗⲉⲙⲟⲥ (loan from Greek πόλεμος)
  chosen: war
  alternatives:
  - battle
  - conflict
  lexicon: Crum; Layton; LSJ
  rationale: '''War'' keeps maximum antithetical force against ''peace''; ''conflict''
    would weaken the paradox.'
- source_word: ⲉⲧⲃⲉ ⲁⲛⲟⲕ ("because of me")
  chosen: because of me
  alternatives:
  - on account of me
  - for my sake
  lexicon: Crum; Layton
  rationale: Idiomatic Coptic causal phrase rendered with clear, direct English; avoids
    idioms that might suggest positive causality ('for my sake').
- source_word: ⲝⲉⲛⲟⲥ (loan from Greek ξένος)
  chosen: foreigner
  alternatives:
  - stranger
  - alien
  lexicon: Crum; Layton; LSJ
  rationale: '''Foreigner'' pairs precisely with ''citizen'' (ⲡⲟⲗⲓⲧⲏⲥ) as a civic
    paradox; ''stranger'' is a viable alternative but is broader.'
- source_word: ⲡⲟⲗⲓⲧⲏⲥ (loan from Greek πολίτης)
  chosen: citizen
  alternatives:
  - townsman
  - city-dweller
  lexicon: Crum; Layton; LSJ
  rationale: '''Citizen'' is the standard civic term and yields the sharpest binary
    with ''foreigner''.'
- source_word: ⲉⲓ (perfect/aorist of 'to come')
  chosen: has come
  alternatives:
  - has arisen
  - has appeared
  lexicon: Crum; Layton
  rationale: Perfective aspect suits the poem’s statement of consequence; 'has arisen'
    is also defensible.
parallelism_check: 'Both antithetical pairs are preserved intact: ''peace // war''
  and ''foreigner // citizen''. The repeated ''I am'' anaphora is retained at the
  head of each clause to keep cadence and paradox. The causal middle ''and war has
  come because of me'' mirrors the Coptic causal phrase and maintains the shock value.'
voice_check: First-person declarative 'I am' is preserved twice, maintaining the authoritative,
  paradox-stacked voice characteristic of Thunder. Diction is simple and forceful,
  avoiding smoothing or explanatory glosses.
