review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien el sentido general del hebreo: condición real, vocativo superlativo, mandato de seguir el rastro del rebaño, pastorear las crías y ubicarlas junto a las tiendas de los pastores. Sin embargo, dos matices del audit trail no quedan del todo bien preservados: (1) צְאִי לָךְ incluye el matiz personal/reflexivo de לָךְ, que el borrador omite; (2) la nota al pie está anclada en «sal[a]», pero la alternativa se refiere a la frase espacial «tras las huellas del rebaño», no al verbo solo.'
  spanish_quality_summary: El español es claro, natural y digno. «La más hermosa entre las mujeres», «junto a las tiendas de los pastores» y «apacienta» son buenas opciones. «Cabritas» es comprensible, pero puede sonar algo diminutivo/afectivo más de lo que exige el hebreo; «cabras jóvenes» o «cabras pequeñas» sería más neutral, aunque no imprescindible. La mejora principal es reubicar la nota y explicitar mejor el matiz de לָךְ con una formulación natural como «sal por ti misma».
  glossary_alignment: No hay conflictos con la terminología doctrinal del proyecto. Las decisiones léxicas principales siguen bien el POB en este verso. La única divergencia relevante es que el POB inglés preservó el matiz de לָךְ («for yourself»), y conviene conservarlo en español.
  issues:
  - severity: medium
    issue: Se omite el matiz reflexivo/personal de לָךְ en צְאִי לָךְ.
    rationale: El audit trail inglés lo preserva explícitamente con «go out for yourself». En español no hace falta calcarlo siempre, pero aquí puede expresarse con naturalidad como «sal por ti misma» sin sobretraducción.
  - severity: medium
    issue: La nota al pie está anclada en el lugar equivocado.
    rationale: La nota explica la alternativa de בְּעִקְבֵי הַצֹּאן («en/tras las huellas del rebaño»), no el verbo «sal». Debe colocarse sobre la frase espacial correspondiente.
  - severity: low
    issue: «Cabritas» introduce un matiz diminutivo-afectivo no necesariamente presente en גְּדִיֹּתַיִךְ.
    rationale: La palabra es entendible y no incorrecta, pero una opción más neutra como «cabras jóvenes» preserva mejor el valor léxico de ‘young goats’ sin color afectivo añadido.
  revised_spanish_text: Si no lo sabes, tú, la más hermosa entre las mujeres, sal por ti misma tras las huellas[a] del rebaño, y apacienta tus cabras jóvenes junto a las tiendas de los pastores.
  revised_footnotes:
  - marker: a
    text: 'O: «detrás del rebaño»; el hebreo dice literalmente «en las huellas/pisadas del rebaño».'
    reason: lexical_alternative
  revision_rationale: Se ajusta el texto para reflejar el matiz de לָךְ en «sal por ti misma», se mueve la nota al pie al sintagma que realmente comenta («huellas»), y se sustituye «cabritas» por una expresión más neutral y precisa en registro general («cabras jóvenes»). No se requieren cambios doctrinales ni adjudicación adicional.
