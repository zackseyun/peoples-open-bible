translation:
  language: es
  text: 'Entonces los oficiales y todo el pueblo dijeron a los sacerdotes y a los profetas[a]: «Este hombre no merece la sentencia de muerte, porque nos ha hablado en nombre de Yahvé nuestro Dios[b]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «No hay sentencia de muerte para este hombre», o «Este hombre no es digno de muerte».'
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: «en nombre de Yahvé nuestro Dios».'
    reason: alternative_reading
lexical_decisions:
- source_word: הַשָּׂרִים
  english_pob_choice: the officials
  chosen_spanish: los oficiales
  alternatives_spanish:
  - los príncipes
  - los líderes
  lexicon: HALOT
  rationale: שָׂרִים designa autoridades o funcionarios gobernantes; «oficiales» comunica bien ese sentido judicial y es natural en español moderno.
- source_word: וְכָל הָעָם
  english_pob_choice: and all the people
  chosen_spanish: y todo el pueblo
  alternatives_spanish:
  - y toda la gente
  - y toda la población
  lexicon: HALOT
  rationale: Se mantiene el alcance colectivo y público del sujeto, con una expresión clara y sobria en español.
- source_word: הַכֹּהֲנִים ... הַנְּבִיאִים
  english_pob_choice: the priests and the prophets
  chosen_spanish: los sacerdotes y los profetas
  alternatives_spanish:
  - los presbíteros y los profetas
  - los sacerdotes y los portavoces
  lexicon: HALOT
  rationale: Son los destinatarios directos de la declaración; «sacerdotes» y «profetas» son las equivalencias directas y auditables.
- source_word: אֵין לָאִישׁ הַזֶּה מִשְׁפַּט מָוֶת
  english_pob_choice: This man does not deserve the sentence of death
  chosen_spanish: Este hombre no merece la sentencia de muerte
  alternatives_spanish:
  - No hay sentencia de muerte para este hombre
  - Este hombre no es digno de muerte
  - No se le debe dictar sentencia de muerte a este hombre
  lexicon: HALOT
  rationale: 'La construcción hebrea es forense: «juicio/sentencia de muerte». En español, «sentencia de muerte» conserva la fuerza legal; «merece» refleja adecuadamente la absolución pública sin volverla meramente moral.'
- source_word: אִישׁ הַזֶּה
  english_pob_choice: This man
  chosen_spanish: Este hombre
  alternatives_spanish:
  - Este varón
  - Esta persona
  lexicon: HALOT
  rationale: Se refiere a Jeremías como individuo masculino en el juicio; «este hombre» es preciso y natural.
- source_word: כִּי
  english_pob_choice: for
  chosen_spanish: porque
  alternatives_spanish:
  - pues
  - ya que
  lexicon: HALOT
  rationale: Introduce la razón de la exoneración; «porque» es la opción más clara en español contemporáneo.
- source_word: בְּשֵׁם יְהוָה אֱלֹהֵינוּ
  english_pob_choice: in the name of Yahweh our God
  chosen_spanish: en nombre de Yahvé nuestro Dios
  alternatives_spanish:
  - por nombre de Yahvé nuestro Dios
  - con la autoridad de Yahvé nuestro Dios
  lexicon: HALOT
  rationale: «En nombre de» reproduce bien el valor de agencia/autoridad de בְּשֵׁם. Se conserva «Yahvé» según el estándar del proyecto para el nombre divino.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  lexicon: HALOT
  rationale: El tetragrámaton se vierte como «Yahvé» conforme a la terminología del proyecto y a la lectura directa del nombre del pacto.
- source_word: דִּבֶּר אֵלֵינוּ
  english_pob_choice: he has spoken to us
  chosen_spanish: nos ha hablado
  alternatives_spanish:
  - nos habló
  - ha hablado a nosotros
  lexicon: HALOT
  rationale: El perfecto hebreo expresa una acción completada con relevancia presente; «nos ha hablado» suena natural y preserva ese valor.
theological_decisions:
- issue: Traducción del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Jehová
  - el SEÑOR
  rationale: Se sigue el estándar del proyecto para no enmascarar el Tetragrámaton y mantener visible el nombre del pacto en la traducción española.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Fuerza jurídica de מִשְׁפַּט מָוֶת
  english_pob_reading: sentence of death
  chosen_spanish_reading: sentencia de muerte
  alternative_spanish_readings:
  - pena de muerte
  - juicio de muerte
  - merece morir
  rationale: El contexto es un procedimiento judicial; «sentencia de muerte» conserva el matiz forense sin añadir interpretaciones morales que el hebreo no exige.
  doctrine_reference: 'DOCTRINE.md Translation philosophy: optimal equivalence'
translation_notes:
  revision_awareness: La redacción sigue el ajuste de revisión del inglés POB que prefirió una formulación más formal de מִשְׁפַּט מָוֶת («sentence of death») frente a una versión más idiomática. En español se adoptó «sentencia de muerte» para conservar ese tono forense y la transparencia respecto del hebreo.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» de forma consistente con el estándar del proyecto para יְהוָה.
  - «Sacerdotes» y «profetas» se conservan como términos directos y reconocibles en un contexto judicial profético.
  - La nota [a] recoge alternativas reales del hebreo sin debilitar la afirmación principal.
  - La nota [b] aclara que la frase final reproduce con precisión la construcción instrumental/autoritaria del hebreo.
