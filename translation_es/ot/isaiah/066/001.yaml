translation:
  language: es
  text: 'Así dice Yahvé: El cielo es mi trono, y la tierra es el estrado para mis pies. ¿Qué clase de casa[a][b] construirían para mí, y cuál sería el lugar de mi descanso[c]?'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «¿Qué casa podrían construir para mí?». La pregunta hebrea es retórica y puede enfatizar lo inadecuado de cualquier casa que los seres humanos pudieran construir para Dios.'
    reason: lexical_alternative
  - marker: b
    text: «Casa» probablemente alude al templo, pero la palabra hebrea en sí es «casa».
    reason: cultural_note
  - marker: c
    text: 'O: «mi lugar de reposo».'
    reason: lexical_alternative
lexical_decisions:
- source_word: כֹּה אָמַר
  english_pob_choice: Thus says
  chosen_spanish: Así dice
  alternatives_spanish:
  - Esto es lo que dice
  - Así ha dicho
  lexicon: HALOT
  rationale: Fórmula profética estándar. «Así dice» conserva el tono solemne y directo de proclamación sin cargar la frase con un arcaísmo innecesario.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: 'Se sigue el criterio del proyecto para el Tetragrámaton: transliteración del nombre divino en lugar de una sustitución por título. «Yahvé» es la forma base en el texto español.'
- source_word: הַשָּׁמַיִם
  english_pob_choice: Heaven
  chosen_spanish: el cielo
  alternatives_spanish:
  - los cielos
  - el firmamento
  lexicon: HALOT
  rationale: Aunque el hebreo es plural, aquí funciona como el ámbito cósmico en contraste con «la tierra». En español, el singular «el cielo» expresa bien la imagen del trono y mantiene naturalidad.
- source_word: כִּסְאִי
  english_pob_choice: my throne
  chosen_spanish: mi trono
  alternatives_spanish:
  - mi asiento real
  lexicon: HALOT
  rationale: Traducción literal y transparente del símbolo real.
- source_word: וְהָאָרֶץ
  english_pob_choice: and the earth
  chosen_spanish: y la tierra
  alternatives_spanish:
  - y el mundo
  lexicon: HALOT
  rationale: Contraste directo con «el cielo»; «tierra» preserva el paralelo léxico y la amplitud cósmica.
- source_word: הֲדֹם רַגְלָי
  english_pob_choice: my footstool
  chosen_spanish: el estrado de mis pies
  alternatives_spanish:
  - el banquillo de mis pies
  - mi escabel
  lexicon: HALOT
  rationale: Se conserva el valor idiomático de soporte bajo los pies con una expresión natural en español. «Estrado» mantiene la dignidad de la metáfora real mejor que una forma demasiado doméstica.
- source_word: אֵי זֶה
  english_pob_choice: What kind of
  chosen_spanish: ¿Qué clase de
  alternatives_spanish:
  - ¿Qué tipo de
  - ¿Qué casa
  lexicon: HALOT
  rationale: La pregunta es retórica y apunta a la adecuación, no solo a la identificación. «Qué clase de» comunica mejor ese matiz que una traducción meramente literal.
- source_word: בַיִת
  english_pob_choice: house
  chosen_spanish: casa
  alternatives_spanish:
  - casa/templo
  - templo
  lexicon: HALOT
  rationale: Se mantiene el término genérico «casa» porque el hebreo no dice explícitamente «templo», aunque la alusión sea clara. Dado el contraste con la grandeza divina, en español «casa» preserva la fuerza retórica de la pregunta.
- source_word: אֲשֶׁר תִּבְנוּ לִי
  english_pob_choice: would you build for me
  chosen_spanish: construirían para mí
  alternatives_spanish:
  - me construirían
  - podrían construir para mí
  lexicon: HALOT
  rationale: El futuro/condicional en español reproduce bien la impugnación retórica del verbo hebreo en contexto. «Construirían» evita sonar como mera pregunta informativa.
- source_word: מָקוֹם
  english_pob_choice: place
  chosen_spanish: lugar
  alternatives_spanish:
  - sitio
  lexicon: HALOT
  rationale: Equivalente simple y natural, adecuado al paralelismo con «casa».
- source_word: מְנוּחָתִי
  english_pob_choice: my resting place
  chosen_spanish: mi lugar de descanso
  alternatives_spanish:
  - mi descanso
  - mi lugar de reposo
  lexicon: HALOT
  rationale: «Lugar de descanso» conserva la idea locativa del sustantivo y resulta claro en español. Se mantiene el paralelismo con la pregunta anterior.
theological_decisions:
- issue: Si «בַיִת» debe explicitarse como «templo»
  english_pob_reading: house, with temple only implied
  chosen_spanish_reading: casa, con el templo solo implícito
  alternative_spanish_readings:
  - templo
  - casa/templo
  rationale: Se preserva la forma hebrea sin introducir un término más específico que el texto no usa. El sentido templario es evidente por el contexto, pero la traducción no debe sobreespecificarlo.
  doctrine_reference: 'Translation philosophy: primacía del texto original; no añadir contenido no dicho explícitamente por el hebreo.'
- issue: Cómo entender la pregunta retórica sobre construir una casa para Dios
  english_pob_reading: The Hebrew question is rhetorical and may emphasize the inadequacy of any house humans might build for God.
  chosen_spanish_reading: La pregunta es retórica y subraya la insuficiencia de cualquier casa construida por seres humanos para Dios.
  alternative_spanish_readings:
  - pregunta informativa
  - simple negación implícita
  rationale: La formulación española debe conservar el desafío retórico. No se trata de pedir información, sino de declarar la desproporción entre Dios y cualquier edificio humano.
  doctrine_reference: Retórica profética bíblica; coherencia con el mensaje de trascendencia divina.
- issue: Si «הַשָּׁמַיִם» conviene en singular o plural
  english_pob_reading: Heaven is my throne
  chosen_spanish_reading: El cielo es mi trono
  alternative_spanish_readings:
  - Los cielos son mi trono
  - El firmamento es mi trono
  rationale: En este paralelismo, el singular español suena natural y conserva la imagen del ámbito celestial como trono de Yahvé. El plural sería posible, pero menos idiomático en esta construcción.
  doctrine_reference: Uso semántico contextual del plural hebreo frente al singular idiomático en español.
translation_notes:
  revision_awareness: Se revisó el borrador a la luz del paquete fuente hebreo, la traducción inglesa auditada y sus notas. No se requirieron cambios sustanciales respecto del sentido base; la principal atención fue mantener la pregunta retórica, el paralelismo cielo/tierra, y no sobretraducir בַיִת como «templo».
  spanish_consistency_notes:
  - Se mantiene «Yahvé» conforme al estándar del proyecto para יְהוָה.
  - Se conserva el binomio «cielo/tierra» para reflejar el contraste cosmológico del hebreo.
  - «Casa» y «lugar de descanso» siguen la literalidad controlada del original, con notas para las alternativas legítimas.
  - El tono es bíblico y digno, pero sin depender de fórmulas arcaizantes no necesarias.
