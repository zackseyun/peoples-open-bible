revisions:
- from: Así que José estableció a su padre y a sus hermanos[a], y les dio una posesión en la tierra de Egipto, en la mejor parte de la tierra, en la tierra de Ramesés, tal como Faraón había mandado.
  to: Entonces José asentó a su padre y a sus hermanos[a], y les dio una posesión en la tierra de Egipto, en la mejor parte de la tierra, en la tierra de Ramesés, tal como Faraón había mandado.
  rationale: Se ajusta «Así que» a «Entonces» para un arranque narrativo más neutro y bíblico, y «estableció» a «asentó» para reflejar mejor el causativo de וַיּוֹשֵׁב en un español más natural para personas ubicadas a residir en una tierra. El resto del texto y la nota se mantienen por ser fieles y claros.
