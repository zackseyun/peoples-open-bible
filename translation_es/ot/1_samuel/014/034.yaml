translation:
  language: es
  text: 'Y Saúl dijo: «Dispérsense entre el pueblo y díganles: “Que cada hombre me traiga su buey y cada hombre su oveja; mátenlos aquí y coman, para que no pequen contra Yahvé al comer con la sangre[a]”». Así que todo el pueblo trajo, cada hombre su buey en su mano esa noche[b], y los mataron allí.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo literalmente: «al comer con/sobre la sangre», refiriéndose a comer la carne antes de que la sangre hubiera sido drenada correctamente.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «cada hombre conduciendo su buey de la mano».'
    reason: lexical_alternative
lexical_decisions:
- source_word: פֻּצוּ בָעָם
  english_pob_choice: Disperse among the people
  chosen_spanish: Dispersaos entre el pueblo
  alternatives_spanish:
  - Dispersaos entre la gente
  - Id por entre el pueblo
  lexicon: HALOT
  rationale: פוץ expresa dispersarse o repartirse. En español, el imperativo plural reflexivo «dispersaos» comunica bien la orden dirigida a varios mensajeros o servidores; «entre el pueblo» preserva el marco locativo del hebreo.
- source_word: הַגִּישׁוּ אֵלַי
  english_pob_choice: bring me
  chosen_spanish: traiga me
  alternatives_spanish:
  - presénteme
  - háganme traer
  lexicon: HALOT
  rationale: El hifil de נגשׁ significa hacer acercar o presentar. En este contexto, la orden va a traer animales para el sacrificio; «me traiga» en estilo distributivo español refleja el inglés POB y la fuerza del mandato, aunque suena más natural que un calco como «presentadme».
- source_word: אִישׁ שׁוֹרוֹ וְאִישׁ שְׂיֵהוּ
  english_pob_choice: Each man his ox and each man his sheep
  chosen_spanish: cada hombre me traiga su buey y cada hombre su oveja
  alternatives_spanish:
  - cada hombre su buey y cada hombre su ganado menor
  - cada hombre su toro y cada hombre su oveja
  lexicon: HALOT
  rationale: La construcción distributiva con אִישׁ se conserva con «cada hombre». שׁוֹר se traduce mejor aquí como «buey» por su uso como animal de labor y de comida; שֶׂה puede abarcar oveja o cabra, pero «oveja» es la opción más clara y común en español bíblico actual.
- source_word: וּשְׁחַטְתֶּם בָּזֶה
  english_pob_choice: you must slaughter them here
  chosen_spanish: degolladlos aquí
  alternatives_spanish:
  - sacrificadlos aquí
  - matadlos aquí
  lexicon: HALOT
  rationale: שׁחט es degollar o sacrificar mediante degüello, no matar en general. «Degolladlos» conserva la acción concreta necesaria para el alimento ritual y evita perder el matiz culinario/sacrificial.
- source_word: וַאֲכַלְתֶּם
  english_pob_choice: and eat
  chosen_spanish: y comed
  alternatives_spanish:
  - y después comed
  - y comed de ellos
  lexicon: HALOT
  rationale: 'Se trata de una continuación inmediata de la orden: degollar y luego comer. El imperativo español «comed» reproduce el tono directo del hebreo.'
- source_word: וְלֹא תֶחֶטְאוּ לַיהוָה
  english_pob_choice: so that you may not sin against Yahweh
  chosen_spanish: para que no pequéis contra Yahvé
  alternatives_spanish:
  - para que no ofendáis a Yahvé
  - y no pequéis contra Yahvé
  lexicon: HALOT
  rationale: 'La cláusula expresa finalidad/previsión: la acción correcta evita el pecado. «Pecar contra Yahvé» conserva la relación personal y ética del hebreo; «contra» refleja היטב el hebreo לַיהוָה en este uso direccional/relacional.'
- source_word: לֶאֱכֹל אֶל־הַדָּם
  english_pob_choice: by eating with the blood
  chosen_spanish: al comer con la sangre
  alternatives_spanish:
  - al comer la carne con la sangre
  - al comer sobre la sangre
  lexicon: HALOT
  rationale: El hebreo es idiomático y alude a comer la carne sin haber drenado la sangre. «Al comer con la sangre» mantiene cercanía al texto y es inteligible; la nota preserva la lectura alternativa explicativa.
- source_word: וַיַּגִּשׁוּ כָל־הָעָם
  english_pob_choice: So all the people brought
  chosen_spanish: Así que todo el pueblo trajo
  alternatives_spanish:
  - Entonces todo el pueblo presentó
  - Así todo el pueblo acercó
  lexicon: HALOT
  rationale: El mismo verbo נגשׁ aparece en forma narrativa. «Trajo» funciona naturalmente en español como verbo de movimiento con objeto animado y conserva la idea de presentar/acercar los animales.
- source_word: אִישׁ שׁוֹרוֹ בְיָדוֹ
  english_pob_choice: each man his ox in his hand
  chosen_spanish: cada hombre su buey en su mano
  alternatives_spanish:
  - cada hombre llevando su buey de la mano
  - cada hombre con su buey en la mano
  lexicon: HALOT
  rationale: 'La frase hebrea es literal: «cada hombre su buey en su mano». En español se conserva la imagen; aunque sugiere llevar el animal personalmente, no se fuerza una explicación en el texto principal.'
- source_word: הַלַּיְלָה
  english_pob_choice: that night
  chosen_spanish: aquella noche
  alternatives_spanish:
  - esa noche
  - durante la noche
  lexicon: HALOT
  rationale: Es un marcador temporal narrativo. «Aquella noche» suena natural en español y conserva la referencia al mismo turno nocturno del relato.
- source_word: וַיִּשְׁחֲטוּ שָׁם
  english_pob_choice: and they slaughtered them there
  chosen_spanish: y los degollaron allí
  alternatives_spanish:
  - y los sacrificaron allí
  - y los mataron allí
  lexicon: HALOT
  rationale: Se mantiene el verbo específico de degüello. «Allí» preserva la referencia local del hebreo שָׁם sin necesidad de ampliar el sentido.
theological_decisions:
- issue: Nombre divino יהוה / YHWH
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - SEÑOR
  rationale: El paquete fuente usa el Tetragrámaton directamente, y el POB inglés actualiza el nombre divino a «Yahweh». En español, el equivalente editorial recibido es «Yahvé», que mantiene la identificación del nombre propio de pacto sin recurrir a la convención de ocultamiento «SEÑOR».
  doctrine_reference: 'DOCTRINE.md: Contested terms — יהוה YHWH → Yahvé/Yahweh in target-language form'
translation_notes:
  revision_awareness: El POB inglés revisó «Spread out among the people» a «Disperse among the people» para reflejar mejor la orden a varios mensajeros, y cambió «the LORD» a «Yahweh» por consistencia con el nombre divino. La versión española sigue esas decisiones y mantiene la tensión léxica de שׁוֹר / שֶׂה, el valor idiomático de «con la sangre», y el matiz concreto de שׁחט como degollar.
  spanish_consistency_notes:
  - He usado «Yahvé» de forma consistente para יהוה.
  - He preferido verbos imperativos directos en plural para reflejar la secuencia de órdenes.
  - He mantenido «degollar» para שׁחט por su fuerza específica y no genérica.
  - He conservado la imagen de «en su mano» en el texto principal y he puesto la posibilidad de conducir el buey en una nota.
  - La puntuación respeta el discurso directo y las comillas españolas.
  - La nota a preserva la tensión entre la formulación literal y la opción distributiva natural en español.
