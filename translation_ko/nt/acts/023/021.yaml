  text: 그러니 그들에게 설득되지 마십시오. 그들 가운데 마흔 명이 넘는 자들이 바울을 매복해 노리고 있고, 그를 죽이기 전까지는 먹지도 마시지도 않겠다고 스스로를 저주로 묶었습니다. 지금 그들은 준비를 마치고 당신의 허락만을 기다리고 있습니다.」
