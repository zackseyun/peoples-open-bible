id: JOB.37.21
reference: Job 37:21
source:
  edition: WLC
  text: וְ/עַתָּ֤ה לֹ֘א רָ֤אוּ א֗וֹר בָּהִ֣יר ה֭וּא בַּ/שְּׁחָקִ֑ים וְ/ר֥וּחַ עָ֝בְרָ֗ה וַֽ/תְּטַהֲרֵֽ/ם׀׃
translation:
  text: And now they do not see the light[a], bright though it is in the skies[b]; but a wind passes by and clears them.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'they have not seen the light, which is bright in the skies'; the Hebrew sequence is compact and may be taken less concessively.
    reason: alternative_reading
  - marker: b
    text: The pronoun in 'clears them' is plural, likely referring to the skies or clouds; some understand the sense more generally as 'clears the sky.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְעַתָּה
  chosen: And now
  alternatives:
  - Now
  - But now
  lexicon: HALOT
  rationale: Temporal/discourse marker introducing Elihu’s present observation. 'And now' preserves the connective ו while remaining natural English.
- source_word: לֹא רָאוּ
  chosen: they do not see
  alternatives:
  - they have not seen
  - one does not see
  lexicon: HALOT
  rationale: Qal perfect 3cp can function as a present/general statement in context. 'They do not see' fits Elihu’s description of current weather conditions better than a simple past.
- source_word: אוֹר
  chosen: the light
  alternatives:
  - light
  - sunlight
  lexicon: HALOT
  rationale: Definite English expression is natural here for the visible bright light in the sky. 'Sunlight' is possible interpretively, but the Hebrew simply says 'light,' so the broader term is retained.
- source_word: בָּהִיר
  chosen: bright
  alternatives:
  - shining
  - clear
  - brilliant
  lexicon: HALOT
  rationale: Adjectival description of the light. 'Bright' is concise and idiomatic.
- source_word: הוּא
  chosen: though it is
  alternatives:
  - it is
  - which is
  lexicon: HALOT
  rationale: The pronoun links back to 'light.' Rendering it concessively in English ('bright though it is') captures the sense of the clause within the larger sentence, where the light exists in the skies yet is not seen.
- source_word: בַּשְּׁחָקִים
  chosen: in the skies
  alternatives:
  - in the clouds
  - in the heavens
  - in the sky
  lexicon: HALOT
  rationale: שׁחקים often refers to skies/cloud-masses. 'In the skies' preserves the elevated poetic register without over-specifying either heavens or clouds.
- source_word: וְרוּחַ
  chosen: but a wind
  alternatives:
  - and a wind
  - then a wind
  - the wind
  lexicon: HALOT
  rationale: רוּחַ here is meteorological wind, not spirit. 'But' reflects the adversative sense between not seeing the light and the wind’s action that changes conditions.
- source_word: עָבְרָה
  chosen: passes by
  alternatives:
  - has passed by
  - sweeps through
  - passes over
  lexicon: HALOT
  rationale: The verb עבר in this context describes the movement of the wind across the sky. Present English suits the vivid observational context.
- source_word: וַתְּטַהֲרֵם
  chosen: and clears them
  alternatives:
  - and cleanses them
  - and clears it
  - and makes them bright
  lexicon: HALOT
  rationale: From טהר, 'to make clean/clear.' The 3mp suffix most naturally refers to the skies/clouds, not the light. 'Clears them' communicates the meteorological effect in idiomatic English while preserving the plural object.
