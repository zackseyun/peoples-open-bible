  yaml_path: translation/ot/joshua/010/028.yaml
  text: And Joshua captured Makkedah on that day and struck it with the edge of the sword[a], and he devoted to destruction its king and every person in it; he left no survivor. And he did to the king of Makkedah just as he had done to the king of Jericho.
  footnotes:
