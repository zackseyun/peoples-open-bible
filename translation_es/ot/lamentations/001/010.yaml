translation:
  language: es
  text: El enemigo ha extendido su mano sobre todas sus cosas preciosas[a][b], pues ella ha visto a las naciones entrar en su santuario—aquellos a quienes tú mandaste que no entraran en tu asamblea[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Cosas preciosas» también puede entenderse como «tesoros» o «cosas deseables».
    reason: lexical_alternative
  - marker: b
    text: «Naciones» puede verterse también como «gentiles», es decir, pueblos extranjeros que entraron en el recinto sagrado.
    reason: lexical_alternative
  - marker: c
    text: Compárese Deuteronomio 23, donde ciertos pueblos son prohibidos de entrar en la asamblea de Yahvé.
    reason: cross_reference
lexical_decisions:
- source_word: יָדוֹ ... פָּרַשׂ
  english_pob_choice: has stretched out his hand
  chosen_spanish: ha extendido su mano
  alternatives_spanish:
  - ha alargado su mano
  - ha alzado su mano
  lexicon: HALOT
  rationale: El gesto hebreo comunica una acción hostil de apropiación o invasión. «Extendido su mano» conserva la imagen corporal con naturalidad en español y evita una paráfrasis excesiva.
- source_word: צָר
  english_pob_choice: the enemy
  chosen_spanish: el enemigo
  alternatives_spanish:
  - el adversario
  - el opresor
  lexicon: HALOT
  rationale: En este lamento, el sustantivo se refiere al agresor que saquea y profana. «Enemigo» es claro, directo y fiel al contexto.
- source_word: מַחֲמַדֶּיהָ
  english_pob_choice: her precious things
  chosen_spanish: sus cosas preciosas
  alternatives_spanish:
  - sus tesoros
  - sus cosas deseables
  lexicon: HALOT
  rationale: El término abarca lo valioso o deseado, no sólo bienes monetarios. «Cosas preciosas» preserva amplitud semántica y el tono de duelo; el posesivo femenino queda implícito en el contexto de Jerusalén.
- source_word: גוֹיִם
  english_pob_choice: nations
  chosen_spanish: las naciones
  alternatives_spanish:
  - los gentiles
  - las naciones extranjeras
  lexicon: HALOT
  rationale: «Naciones» traduce de forma directa el plural hebreo y evita introducir una carga histórica posterior que «gentiles» podría sugerir.
- source_word: בָּאוּ מִקְדָּשָׁהּ
  english_pob_choice: enter her sanctuary
  chosen_spanish: entrar en su santuario
  alternatives_spanish:
  - entrar en su lugar santo
  - entrar en su templo
  lexicon: HALOT
  rationale: «Santuario» expresa el espacio sagrado profanado y se ajusta al campo semántico del texto; «templo» sería más interpretativo y menos preciso aquí.
- source_word: אֲשֶׁר צִוִּיתָה
  english_pob_choice: those whom you commanded
  chosen_spanish: aquellos a quienes tú mandaste
  alternatives_spanish:
  - los que tú ordenaste
  - a quienes tú habías mandado
  lexicon: HALOT
  rationale: El hebreo mantiene un relativo explícito que apunta a las naciones mencionadas. «Mandaste» conserva el matiz imperativo del mandato divino sin sobrecargar el estilo.
- source_word: לֹא יָבֹאוּ
  english_pob_choice: not to enter
  chosen_spanish: que no entraran
  alternatives_spanish:
  - que no entrasen
  - que no debían entrar
  lexicon: HALOT
  rationale: Después de «mandaste», el subjuntivo en pasado resulta natural en español y preserva la prohibición sin añadir modales ajenos al texto.
- source_word: בַקָּהָל לָךְ
  english_pob_choice: your assembly
  chosen_spanish: tu asamblea
  alternatives_spanish:
  - tu congregación
  - la asamblea para ti
  lexicon: HALOT
  rationale: «Asamblea» refleja קָהָל con amplitud y evita el sesgo confesional de «congregación». Mantiene el carácter comunitario y covenantal del término.
theological_decisions:
- issue: A quién se dirige el texto en la segunda persona
  english_pob_reading: The speaker addresses God directly with 'you commanded' and 'your assembly.'
  chosen_spanish_reading: 'El hablante se dirige directamente a Dios: «tú mandaste» y «tu asamblea».'
  alternative_spanish_readings:
  - El mandato se entiende de forma impersonal o general
  - La segunda persona se suaviza a una referencia indirecta
  rationale: El verbo en segunda persona y el posesivo «tu» requieren conservar el adresamiento directo a Dios, propio del tono de lamentación y oración del libro.
  doctrine_reference: Lamentaciones 1:10; lectura coherente con la oración dirigida a Yahvé en el contexto del libro
translation_notes:
  revision_awareness: 'La versión española sigue de cerca el texto hebreo y el audit trail en inglés: conserva la imagen de la mano extendida, el valor amplio de מַחֲמַדֶּיהָ, el plural «naciones» y la prohibición relativa sobre la asamblea. No se han introducido cambios de sentido respecto del consenso del rastreo inglés.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como convención general del proyecto cuando aparezca el nombre divino; aquí el texto hebreo usa segunda persona sin el tetragrámaton explícito.
  - «Santuario» se usa de manera consistente para el recinto sagrado profanado.
  - «Asamblea» se preserva para קָהָל, evitando sustituirlo por términos eclesiásticos más estrechos.
