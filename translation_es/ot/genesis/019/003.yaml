translation:
  language: es
  text: Pero les insistió mucho[a], y se desviaron para ir con él y entraron en su casa. Les preparó un banquete, horneó panes sin levadura[b] y comieron.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'los presionó mucho' / 'insistió con fuerza'.
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: ''panes sin levadura'' o ''tortas sin levadura''; tradicionalmente, pan hecho sin fermento.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּפְצַר
  english_pob_choice: urged
  chosen_spanish: insistió mucho
  alternatives_spanish:
  - los urgió
  - les pidió con insistencia
  lexicon: HALOT
  rationale: El verbo expresa presión o insistencia fuerte para que acepten; en español, 'insistió mucho' conserva la fuerza sin sonar antinatural. 'Urgió' sería más breve, pero aquí la idea de insistencia sostenida queda más clara.
- source_word: מְאֹד
  english_pob_choice: strongly
  chosen_spanish: mucho
  alternatives_spanish:
  - grandemente
  - en gran manera
  lexicon: HALOT
  rationale: El adverbio intensifica la acción verbal. 'Mucho' funciona naturalmente con 'insistió' y transmite la intensidad sin forzar una construcción poco idiomática.
- source_word: וַיָּסֻרוּ אֵלָיו
  english_pob_choice: turned aside to him
  chosen_spanish: se desviaron hacia él
  alternatives_spanish:
  - se apartaron hacia él
  - volvieron a él
  lexicon: HALOT
  rationale: Se conserva la imagen de apartarse del camino para ir hacia él. 'Se desviaron hacia él' refleja היטב la dirección y la metáfora espacial del hebreo.
- source_word: וַיָּבֹאוּ אֶל־בֵּיתוֹ
  english_pob_choice: entered his house
  chosen_spanish: entraron en su casa
  alternatives_spanish:
  - entraron a su casa
  - vinieron a su casa
  lexicon: HALOT
  rationale: La entrada al interior se expresa de manera directa y natural en español. 'En su casa' preserva el destino sin calcar la preposición hebrea.
- source_word: מִשְׁתֶּה
  english_pob_choice: a feast
  chosen_spanish: un banquete
  alternatives_spanish:
  - una fiesta
  - un convite
  lexicon: HALOT
  rationale: En contexto narrativo, 'banquete' comunica una comida preparada con abundancia y solemnidad, equivalente natural de 'feast'. 'Fiesta' podría sugerir celebración general y 'convite' resulta más regional o arcaizante.
- source_word: מַצּוֹת
  english_pob_choice: unleavened bread
  chosen_spanish: panes sin levadura
  alternatives_spanish:
  - pan ázimo
  - tortas sin levadura
  lexicon: HALOT
  rationale: '''Panes sin levadura'' mantiene el sentido literal y es claro para lectores amplios. ''Pan ázimo'' es correcto pero más técnico; ''tortas'' podría sugerir otra forma de alimento no explicitada.'
- source_word: אָפָה
  english_pob_choice: baked
  chosen_spanish: horneó
  alternatives_spanish:
  - coció
  - lo coció al horno
  lexicon: HALOT
  rationale: El verbo indica la acción culinaria de preparar en calor seco. 'Horneó' es la opción más natural en español actual y preserva la acción concreta sobre el pan sin añadir contenido ajeno.
- source_word: וַיֹּאכֵלוּ
  english_pob_choice: they ate
  chosen_spanish: comieron
  alternatives_spanish:
  - y comieron
  - se alimentaron
  lexicon: HALOT
  rationale: El cierre narrativo en español puede expresarse de forma simple y fluida. 'Comieron' evita redundancia con el sujeto ya claro en el contexto.
translation_notes:
  revision_awareness: El texto sigue de cerca el hebreo y coincide con el audit trail inglés en el valor intensivo de וַיִּפְצַר/מְאֹד, el movimiento de desviarse hacia Lot, la comida festiva y el pan sin levadura. No se introdujeron cambios doctrinales ni se detectaron revisiones aplicadas en el paquete inglés.
  spanish_consistency_notes:
  - Se mantiene ‘Yahvé’ como término base del proyecto, pero este versículo no lo contiene.
  - Se usó ‘banquete’ para מִשְׁתֶּה por claridad y naturalidad, sin perder el matiz de comida abundante.
  - Se prefirió ‘panes sin levadura’ en lugar de transliterar o usar un término litúrgico más especializado.
