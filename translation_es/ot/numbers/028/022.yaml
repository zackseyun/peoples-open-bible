translation:
  language: es
  text: y un macho cabrío por ofrenda por el pecado[a], para hacer expiación por ustedes.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O también: «ofrenda por la purificación». El término hebreo traducido aquí como «ofrenda por el pecado» puede, en contextos sacrificiales, entenderse también como «ofrenda de purificación».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וּ/שְׂעִיר
  english_pob_choice: and one male goat
  chosen_spanish: y un macho cabrío
  alternatives_spanish:
  - y un cabrío
  - y una cabra macho
  lexicon: HALOT
  rationale: שָׂעִיר designa un macho cabrío; en español, «macho cabrío» comunica con precisión el sexo y la especie sacrificial. Se omite «uno» porque el artículo indefinido ya cumple esa función de manera natural en español.
- source_word: חַטָּאת
  english_pob_choice: sin offering
  chosen_spanish: ofrenda por el pecado
  alternatives_spanish:
  - ofrenda por la purificación
  - ofrenda expiatoria
  lexicon: HALOT
  rationale: En contexto sacrificial, חַטָּאת puede referirse a la ofrenda misma. «Ofrenda por el pecado» mantiene la lectura cultual tradicional y transparente; no se adopta «purificación» en el texto principal porque el español de uso bíblico lo expresaría menos directamente, aunque la alternativa se conserva como posibilidad semántica.
- source_word: אֶחָד
  english_pob_choice: one
  chosen_spanish: un
  alternatives_spanish:
  - uno
  lexicon: HALOT
  rationale: El numeral está integrado de forma natural en español con el artículo indefinido. La cantidad singular queda preservada sin forzar el orden.
- source_word: לְ/כַפֵּר
  english_pob_choice: to make atonement
  chosen_spanish: para hacer expiación
  alternatives_spanish:
  - para hacer atonement
  - para expiar
  lexicon: HALOT
  rationale: כפר en contexto sacerdotal admite «expiación» además de «expiación/atonement». Se eligió «hacer expiación» para conservar la fuerza cultual sin cargar el texto con una formulación doctrinal más estrecha; «hacer expiación» resulta idiomático y auditable.
- source_word: עֲלֵי/כֶם
  english_pob_choice: for you
  chosen_spanish: por ustedes
  alternatives_spanish:
  - por ustedes mismos
  - en favor de ustedes
  lexicon: HALOT
  rationale: La preposición עַל con sufijo pronominal en este contexto indica beneficio o representación. «Por ustedes» suena natural en español y mantiene la idea de beneficio/on behalf of, sin perder el matiz relacional.
theological_decisions:
- issue: Terminología sacrificial de חַטָּאת
  english_pob_reading: sin offering
  chosen_spanish_reading: ofrenda por el pecado
  alternative_spanish_readings:
  - ofrenda por la purificación
  - ofrenda expiatoria
  rationale: La frase hebrea puede abarcar la ofrenda sacrificial y, en algunos contextos, el sentido de purificación. La redacción principal conserva la tensión entre pecado, purificación y rito sin resolverla de forma excesiva. Se deja abierta la posibilidad alternativa en notas o decisiones léxicas.
  doctrine_reference: Translation philosophy §3, §6
- issue: Lenguaje de כפר
  english_pob_reading: to make atonement for you
  chosen_spanish_reading: para hacer expiación por ustedes
  alternative_spanish_readings:
  - para hacer atonación por ustedes
  - para expiar por ustedes
  rationale: «Expiación» preserva el peso cultual-teológico de כפר en el marco levítico sin imponer una explicación doctrinal específica del mecanismo. La formulación mantiene la ambigüedad útil del texto y su función ritual.
  doctrine_reference: Translation philosophy §3, §6
translation_notes:
  revision_awareness: 'El texto hebreo y la traducción inglesa concuerdan ampliamente: un macho cabrío singular, ofrenda חַטָּאת y finalidad expiatoria. No se detectaron revisiones textuales relevantes ni cambios de pasaje entre la base hebrea y el contexto auditado en inglés.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma del proyecto solo cuando aparece el nombre divino; este versículo no lo contiene.
  - Se usa «expiación» en lugar de «atonement» transliterado o de una paráfrasis más amplia para conservar el registro bíblico-cultual en español.
  - La nota al pie conserva la alternativa semántica documentada en el audit trail inglés.
  - «Por ustedes» expresa beneficio/on behalf of y evita una construcción demasiado literal o arcaica.
