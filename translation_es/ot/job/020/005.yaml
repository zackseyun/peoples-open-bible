    rationale: Si el texto principal usa «impío», la nota debe seguir explicando que חָנֵף también puede traducirse «hipócrita», mientras que aquí se prefiere el sentido más amplio de persona irreligiosa o sin temor de Dios.
  revised_spanish_text: Porque el júbilo de los impíos es breve[a], y el gozo del impío dura solo un momento.
