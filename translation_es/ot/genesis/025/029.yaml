    issue: La nota [b] del borrador español introduce una alternativa para וַיָּבֹא («entró del campo») que no está en el POB inglés ni es necesaria en español.
    rationale: El rastro de auditoría inglés usa [b] para la alternativa tradicional de נָזִיד («pottage»), no para el verbo «came in». Añadir una nota distinta rompe la correspondencia documental.
  - severity: medium
    issue: Falta en español la nota tradicional sobre «potaje» para נָזִיד.
    rationale: El inglés preserva explícitamente la alternativa tradicional; el español debe reflejarla con una nota equivalente, idealmente anclada en «guiso».
  - severity: low
    issue: «Exhausto» es fiel, pero «agotado» sería más idiomático en español general.
    rationale: Ambos son válidos; no es error de fidelidad, pero una leve mejora de naturalidad favorece «agotado».
