base_translation:
  language: en
  yaml_path: translation/deuterocanon/1_esdras/001/014.yaml
  text: And the temple singers[a], the sons of Asaph, were at their stations according to what had been appointed by David, and Asaph and Zechariah and Eddinous[b], who were from the king.
  footnotes:
  - marker: a
    text: Or 'who were appointed by the king.' The Greek phrase 'who were from the king' is compressed and may indicate royal appointment or royal affiliation.
    reason: alternative_reading
  - marker: b
    text: The wording here differs from the approximate Hebrew parallel in 2 Chronicles, which in this section focuses on distributing the burnt offering. 1 Esdras preserves an expanded notice about the singers and named officials.
    reason: cross_reference
