theological_decisions:
- issue: Divergence between Hebrew and Greek in the opening clause
  chosen_reading: 'Follow the Hebrew main text: ''Elijah was hidden in the storehouse'''
  alternative_readings:
  - 'Follow the Greek parallel: ''Elijah was covered/taken up in a whirlwind'''
  rationale: The project policy gives primacy to the Hebrew witness for Sirach where extant, while using the Greek as an actual input. Here the difference is substantial and materially affects translation. The Hebrew is retained in the main text, but the Greek reading is preserved in a footnote because it is ancient, coherent, and likely reflects a different textual form or interpretive tradition tied to Elijah's departure in 2 Kings 2.
  doctrine_reference: 'PHILOSOPHY.md: translate from Hebrew where it survives; use Greek parallel as translation input'
- issue: Referent of 'his spirit'
  chosen_reading: Elijah's spirit passed to Elisha
  alternative_readings:
  - the Spirit in a more explicitly divine sense
  rationale: Both the Hebrew suffix and the Greek αὐτοῦ point most naturally to Elijah as the antecedent. The context in Sirach 48 and the Elijah-Elisha succession narrative support this reading. Capitalizing 'Spirit' would over-interpret the phrase beyond what the text explicitly states.
  doctrine_reference: 'DOCTRINE.md: preserve theological tension rather than resolve it; do not import doctrinal claims the text does not make'
