revisions:
- from: Las fuentes eternas[a] de los abismos, de los montes altos, fueron detenidas, porque no había entre ellos quien hiciera justicia[b] y derecho; desde su gobernante hasta el más pequeño del pueblo, todos estaban en todo tipo de pecado.
  to: Los manantiales eternos[a], desde las profundidades, desde los montes altos, fueron retenidos, porque no había entre ellos quien practicara rectitud y justicia; desde su gobernante hasta el más pequeño del pueblo, todos estaban en toda clase de pecado.
  rationale: 'Se ajusta el verso para reflejar mejor el sentido del griego y el razonamiento documentado en el audit trail: «manantiales» para πηγαὶ, «desde las profundidades» para ἐξ ἀβύσσων, «fueron retenidos» como pasivo natural de συνεσχέθησαν, y sobre todo «rectitud y justicia» para distinguir δικαιοσύνη de κρίμα según la decisión teológica del proyecto. Se elimina la nota [b] porque la alternativa pasa al texto principal y ya no hace falta.'
  reviewer_model: gpt-5.4
