    issue: Discordancia de género y artículo en 'Estas son las clanes'
    rationale: '''Clan'' es masculino en español; debe ser ''los clanes''. Esto afecta la corrección básica y la legibilidad.'
  - severity: medium
    issue: Calco poco natural en 'según los contados de ellos'
    rationale: Aunque intenta reflejar el participio sustantivado y el sufijo hebreo, en español resulta forzado y poco claro. Una formulación como 'según sus registrados' conserva mejor la función censal sin paráfrasis excesiva.
  - severity: low
    issue: Racional léxico con errores menores de español en metadatos
    rationale: Aparecen errores como 'un tribu' y 'sociotrilbal', pero esto no afecta directamente el texto bíblico final.
