translation:
  language: es
  text: y la mesa para la presentación del pan[a], y los vasos para libaciones y los cuencos y los incensarios de oro y la cortina y las coronas y la ornamentación de oro en el frente del templo; y lo despojó de todo[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Presentación del pan» sigue el sentido funcional del griego; también puede entenderse como «mesa de la Presencia» o «mesa del pan de la Presencia».
    reason: lexical_alternative
  - marker: b
    text: El verbo griego puede sugerir «desprender» o «arrancar» un revestimiento, no solo quitar objetos sueltos; por eso la frase admite la idea de retirar decoración adherida.
    reason: lexical_alternative
lexical_decisions:
- source_word: τράπεζαν τῆς προθέσεως
  english_pob_choice: the table for the presentation of the bread
  chosen_spanish: la mesa para la presentación del pan
  alternatives_spanish:
  - la mesa de la Presencia
  - la mesa de la proposición
  - la mesa del pan de la Presencia
  lexicon: LSJ
  rationale: En contexto de templo, πρόθεσις alude al acto de poner el pan delante de Dios. «Presentación del pan» mantiene la función ritual sin imponer una formulación tradicional que pueda oscurecer el sentido del griego.
- source_word: σπονδεῖα
  english_pob_choice: libation vessels
  chosen_spanish: vasos para libaciones
  alternatives_spanish:
  - vasos de libación
  - copas para libaciones
  lexicon: LSJ
  rationale: El término designa recipientes vinculados con libaciones. «Vasos para libaciones» conserva la referencia cultual y resulta natural en español.
- source_word: φιάλας
  english_pob_choice: bowls
  chosen_spanish: copas
  alternatives_spanish:
  - cuencos
  - copas rituales
  - bowls
  lexicon: LSJ
  rationale: φιάλη puede referirse a una vasija ancha usada en ritos. En español, «copas» es breve y comprensible, aunque «cuencos» también sería posible; el contexto de ajuar ritual permite esta opción.
- source_word: θυΐσκας τὰς χρυσᾶς
  english_pob_choice: the golden censers
  chosen_spanish: los incensarios de oro
  alternatives_spanish:
  - los censers de oro
  - los quemadores de incienso de oro
  lexicon: LSJ
  rationale: El objeto es un utensilio para quemar incienso. «Incensarios» comunica bien la función; «de oro» refleja el adjetivo que modifica directamente el sustantivo en griego.
- source_word: καταπέτασμα
  english_pob_choice: the curtain
  chosen_spanish: el cortinaje
  alternatives_spanish:
  - la cortina
  - el velo
  lexicon: LSJ
  rationale: El término puede designar el telón o colgadura del santuario. «Cortinaje» mantiene un registro digno y evita restringirlo indebidamente a una cortina doméstica.
- source_word: στεφάνους
  english_pob_choice: crowns
  chosen_spanish: las coronas
  alternatives_spanish:
  - las guirnaldas
  - los ornamentos en forma de corona
  lexicon: LSJ
  rationale: En una lista de ornamentos del templo, «coronas» preserva la correspondencia léxica y deja abierta la posibilidad de adorno decorativo más que de regalia real.
- source_word: κόσμον τὸν χρυσοῦν
  english_pob_choice: the gold decoration
  chosen_spanish: la ornamentación de oro
  alternatives_spanish:
  - el adorno de oro
  - la decoración dorada
  - el ornamento de oro
  lexicon: LSJ
  rationale: κόσμος aquí significa adorno u ornamento, no «mundo». «Ornamentación de oro» comunica el sentido colectivo y decorativo de forma clara en español.
- source_word: κατὰ πρόσωπον τοῦ ναοῦ
  english_pob_choice: on the front of the temple
  chosen_spanish: en el frente del templo
  alternatives_spanish:
  - ante el templo
  - frente al templo
  - sobre la fachada del templo
  lexicon: LSJ
  rationale: La frase describe la ubicación de la ornamentación en la fachada o frente del templo. «En el frente del templo» sigue de cerca el sentido espacial del griego sin sonar arcaico.
- source_word: ἐλέπισεν
  english_pob_choice: he stripped it all off
  chosen_spanish: lo arrancó todo
  alternatives_spanish:
  - lo despegó todo
  - lo peló todo
  - lo arrancó por completo
  lexicon: LSJ
  rationale: El verbo sugiere arrancar o desprender una capa adherida, probablemente de revestimiento decorativo. «Lo arrancó todo» reproduce la violencia y la totalidad de la acción en español.
translation_notes:
  revision_awareness: 'El texto griego y el contexto de 1 Macabeos 1:22 coinciden de forma alta con la auditoría inglesa: inventario de objetos del templo y culminación en el despojo total de la ornamentación. Se ha mantenido la secuencia cultual y la fuerza del verbo final sin suavizarla.'
  spanish_consistency_notes:
  - Se usa «Dios» implícitamente solo donde el texto lo exige; aquí no aparece.
  - Se evita «SEÑOR» como sustituto, pues no hay יהוה en el versículo.
  - «Pan» se conserva en el sentido cultual de la mesa de la proposición/presentación, no como alimento común.
  - «Incensarios» y «libaciones» mantienen el registro ritual del inventario del templo.
