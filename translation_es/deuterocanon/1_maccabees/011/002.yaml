translation:
  language: es
  text: Y salió a Siria con palabras de paz, y los de las ciudades le abrían[a] y le salían al encuentro, porque Alejandro el rey había ordenado que salieran a su encuentro[b], pues era su suegro.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, más explícitamente, «le abrían las puertas». El griego deja implícito el objeto.
    reason: lexical_alternative
  - marker: b
    text: Es decir, Alejandro había dado órdenes para que lo recibieran favorablemente y salieran a su encuentro, por ser Ptolomeo su suegro.
    reason: cross_reference
lexical_decisions:
- source_word: ἐξῆλθεν
  english_pob_choice: went out
  chosen_spanish: salió
  alternatives_spanish:
  - partió
  - se dirigió
  lexicon: LSJ
  rationale: El aoristo de ἐξέρχομαι expresa salida o partida. «Salió» reproduce la acción de manera natural y directa sin añadir matiz no presente en el griego.
- source_word: εἰς Συρίαν
  english_pob_choice: into Syria
  chosen_spanish: a Siria
  alternatives_spanish:
  - hacia Siria
  - en Siria
  lexicon: LSJ
  rationale: La preposición εἰς con movimiento se rinde naturalmente en español con «a». Conserva el sentido direccional del texto griego.
- source_word: λόγοις εἰρηνικοῖς
  english_pob_choice: with peaceful words
  chosen_spanish: con palabras de paz
  alternatives_spanish:
  - con palabras pacíficas
  - pacíficamente
  lexicon: LSJ
  rationale: Se conserva el sustantivo concreto λόγοις como «palabras» y el calificativo εἰρηνικοῖς como una expresión de paz. «Con palabras de paz» evita reducirlo a una mera actitud interior y refleja mejor el lenguaje diplomático del pasaje.
- source_word: ἤνοιγον αὐτῷ
  english_pob_choice: opened to him
  chosen_spanish: le abrían
  alternatives_spanish:
  - le abrían las puertas
  - lo recibían
  lexicon: LSJ
  rationale: El griego deja el objeto implícito. «Le abrían» mantiene esa elipsis, como en el inglés POB, sin añadir «puertas» al texto principal.
- source_word: οἱ ἀπὸ τῶν πόλεων
  english_pob_choice: those from the cities
  chosen_spanish: los de las ciudades
  alternatives_spanish:
  - los hombres de las ciudades
  - la gente de las ciudades
  lexicon: LSJ
  rationale: La expresión identifica a los procedentes de las ciudades, probablemente delegados o habitantes. «Los de las ciudades» conserva la referencia sin sobreespecificar el género en el texto principal, a diferencia de una traducción más marcada como «los hombres».
- source_word: συνήντων αὐτῷ
  english_pob_choice: met him
  chosen_spanish: le salían al encuentro
  alternatives_spanish:
  - lo encontraban
  - se reunían con él
  lexicon: LSJ
  rationale: Dado el contexto y el infinitivo siguiente, el sentido es de salir a recibirle. «Le salían al encuentro» conserva el movimiento implícito mejor que un simple «le encontraban».
- source_word: ἐντολή
  english_pob_choice: order
  chosen_spanish: había ordenado
  alternatives_spanish:
  - había mandado
  - había dado la orden
  lexicon: LSJ
  rationale: El sustantivo ἐντολή denota una disposición autoritativa. En español, la construcción verbal «había ordenado» expresa con naturalidad ese mandato real y permite completar el objeto implícito desde el contexto.
- source_word: συναντᾷν αὐτῷ
  english_pob_choice: to meet him
  chosen_spanish: que lo recibieran
  alternatives_spanish:
  - que salieran a su encuentro
  - que lo encontraran
  lexicon: LSJ
  rationale: El infinitivo explica el contenido del mandato. «Que lo recibieran» traduce el valor contextual de un encuentro favorable ordenado por el rey, coherente con la apertura de las ciudades.
- source_word: διὰ τὸ πενθερὸν αὐτοῦ εἶναι
  english_pob_choice: since he was his father-in-law
  chosen_spanish: pues era su suegro
  alternatives_spanish:
  - porque era su suegro
  - ya que era su suegro
  lexicon: LSJ
  rationale: πενθερός significa «suegro / padre político». En español, «suegro» es el equivalente natural y exacto. El contexto histórico deja clara la relación de parentesco y la razón del trato favorable.
theological_decisions:
- issue: Término de parentesco πενθερός en una narración política
  english_pob_reading: since he was his father-in-law
  chosen_spanish_reading: pues era su suegro
  alternative_spanish_readings:
  - porque era su suegro
  - ya que era su suegro
  rationale: No hay tensión doctrinal, pero sí una elección de precisión histórica. «Suegro» conserva el parentesco específico sin introducir explicación adicional. La relación es la base del trato favorable, y el español lo comunica con claridad.
  doctrine_reference: N/A
translation_notes:
  revision_awareness: 'El texto sigue el griego de Swete 1909 y toma en cuenta el audit trail inglés: mantiene la elipsis de ἤνοιγον αὐτῷ en el cuerpo principal, conserva el valor diplomático de λόγοις εἰρηνικοῖς y hace explícito el mandato real de ἐντολή/συναντᾷν con una formulación española natural. También conserva la aclaración relacional de πενθερός sin exceder la evidencia del pasaje.'
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando aparezca el nombre divino; aquí no aplica.
  - Se mantiene un registro histórico sobrio y no litúrgico, acorde con 1 Macabeos.
  - «Los de las ciudades» conserva la referencia colectiva sin forzar un género léxico que el español no necesita aquí.
  - 'Las notas a y b cubren las dos ambigüedades principales del versículo: el objeto implícito de «abrían» y el sentido favorable del mandato real.'
