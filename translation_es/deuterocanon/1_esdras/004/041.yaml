translation:
  language: es
  text: 'Y dejó de hablar; y entonces todo el pueblo exclamó, y entonces dijeron: «¡Grande es la verdad, y prevalece[a]!».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «¡Grande es la verdad, y es la más fuerte / vence / prevalece!». El verbo griego puede significar «prevalece», «es más fuerte» o «vence».
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐσιώπησεν
  english_pob_choice: stopped speaking
  chosen_spanish: enmudeció de hablar
  alternatives_spanish:
  - dejó de hablar
  - guardó silencio
  lexicon: LSJ
  rationale: El griego expresa el cese del habla; en español, «enmudeció de hablar» comunica esa interrupción de manera natural y mantiene el matiz de silencio resultante. «Dejó de hablar» también sería posible, pero suena algo más explicativo.
- source_word: τοῦ λαλεῖν
  english_pob_choice: speaking
  chosen_spanish: de hablar
  alternatives_spanish:
  - al hablar
  - de hablar
  lexicon: LSJ
  rationale: El infinitivo articular indica la acción de hablar como aquello cuya continuación cesa. En español, «de hablar» conserva la relación con la cesación sin volverla pesada.
- source_word: πᾶς ὁ λαός
  english_pob_choice: all the people
  chosen_spanish: todo el pueblo
  alternatives_spanish:
  - todo el pueblo reunido
  - toda la gente
  lexicon: LSJ
  rationale: «Pueblo» refleja mejor el colectivo público del contexto que «gente», y «todo» conserva el valor totalizador de πᾶς ὁ λαός.
- source_word: ἐφώνησεν
  english_pob_choice: cried out
  chosen_spanish: exclamó
  alternatives_spanish:
  - clamó
  - gritó
  lexicon: LSJ
  rationale: El verbo marca una respuesta audible y colectiva; «exclamó» transmite la proclamación pública sin forzar una intensidad más fuerte de la que exige el texto.
- source_word: Μεγάλη
  english_pob_choice: Great is
  chosen_spanish: Grande es
  alternatives_spanish:
  - Grande
  - Mucha es
  lexicon: LSJ
  rationale: La construcción predicativa exclamativa se mantiene de forma directa en español con «Grande es», que suena solemne y fiel al griego.
- source_word: ἡ ἀλήθεια
  english_pob_choice: the truth
  chosen_spanish: la verdad
  alternatives_spanish:
  - verdad
  lexicon: LSJ
  rationale: El artículo griego puede sonar genérico o definido; en español, «la verdad» conserva la fuerza de una afirmación reconocida y formulada como sentencia.
- source_word: ὑπερισχύει
  english_pob_choice: it prevails
  chosen_spanish: prevalece
  alternatives_spanish:
  - es más fuerte
  - vence
  - triunfa
  lexicon: LSJ
  rationale: El verbo admite la idea de prevalecer, ser superior o vencer. «Prevalece» es conciso y reproduce bien el cierre proverbial de la aclamación.
theological_decisions:
- issue: Aclamación sobre la verdad con artículo definido
  english_pob_reading: the truth
  chosen_spanish_reading: la verdad
  alternative_spanish_readings:
  - verdad
  rationale: Se conserva el artículo para reflejar el griego y la fórmula solemne de la proclamación, sin convertirla en un lema abstracto más general que el texto.
  doctrine_reference: Translation philosophy §§1, 5
translation_notes:
  revision_awareness: Se corrigió la validación anterior asegurando que el marcador de nota [a] aparece exactamente en el texto español y corresponde a la única nota incluida.
  spanish_consistency_notes:
  - Se mantuvo el paralelismo repetido de καὶ τότε con «y entonces» para conservar el ritmo del griego.
  - Se evitó «SEÑOR» u այլ terminología ajena porque el versículo no contiene el nombre divino.
  - «Pueblo» se usó como colectivo público, acorde con el contexto narrativo y la respuesta coral.
