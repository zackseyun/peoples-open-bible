translation:
  language: es
  text: Pero los levitas acamparán alrededor del tabernáculo del testimonio[a], para que no haya ira sobre la congregación de los hijos de Israel; y los levitas estarán a cargo del tabernáculo del testimonio.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «contra la congregación de los hijos de Israel».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהַלְוִיִּם
  english_pob_choice: But the Levites
  chosen_spanish: Pero los levitas
  alternatives_spanish:
  - Y los levitas
  - Ahora bien, los levitas
  lexicon: HALOT
  rationale: El hebreo enlaza esta instrucción con contraste discursivo respecto del arreglo de las demás tribus; en español, «Pero» conserva ese matiz mejor que un simple «Y». «Levitas» es el término natural y reconocido para el nombre tribal.
- source_word: יַחֲנוּ
  english_pob_choice: shall camp
  chosen_spanish: acamparán
  alternatives_spanish:
  - deben acampar
  - han de acampar
  lexicon: HALOT
  rationale: El imperfecto tiene fuerza directiva en este contexto de organización del campamento. «Acamparán» mantiene el valor de mandato/futuro sin volver la frase pesada.
- source_word: סָבִיב
  english_pob_choice: around
  chosen_spanish: alrededor de
  alternatives_spanish:
  - en torno a
  - rodeando
  lexicon: HALOT
  rationale: Es la equivalencia espacial más clara y natural con «acampar».
- source_word: לְמִשְׁכַּן הָעֵדֻת
  english_pob_choice: the tabernacle of the testimony
  chosen_spanish: el tabernáculo del testimonio
  alternatives_spanish:
  - el tabernáculo del testimonio del pacto
  - la morada del testimonio
  lexicon: HALOT
  rationale: «Tabernáculo» conserva el término cultual establecido para מִשְׁכָּן. «Testimonio» preserva הָעֵדוּת sin restringirlo interpretativamente a una sola idea como «pacto» o «ley».
- source_word: וְלֹא יִהְיֶה קֶצֶף
  english_pob_choice: so that there may be no wrath
  chosen_spanish: para que no haya ira
  alternatives_spanish:
  - para que no se encienda la ira
  - a fin de que no haya ira
  lexicon: HALOT
  rationale: El hebreo expresa propósito preventivo. «Ira» comunica el peso judicial/covenantal del término sin añadir explicación ajena al verso. Se evita suavizarlo con «enojo».
- source_word: עַל עֲדַת בְּנֵי יִשְׂרָאֵל
  english_pob_choice: on the congregation of the sons of Israel
  chosen_spanish: sobre la congregación de los hijos de Israel
  alternatives_spanish:
  - contra la congregación de los israelitas
  - sobre la comunidad de los hijos de Israel
  lexicon: HALOT
  rationale: «Congregación» reproduce עֵדָה en su sentido de asamblea/cuerpo reunido. «Hijos de Israel» conserva la forma filial y masculina del hebreo, como en la POB inglesa.
- source_word: וְשָׁמְרוּ
  english_pob_choice: and the Levites shall keep
  chosen_spanish: y los levitas guardarán
  alternatives_spanish:
  - y los levitas custodiarán
  - y los levitas observarán
  lexicon: HALOT
  rationale: Aquí שׁמר tiene el sentido de vigilar/proteger una responsabilidad asignada. «Guardarán» es natural en español y mantiene la idea de custodia.
- source_word: מִשְׁמֶרֶת
  english_pob_choice: charge
  chosen_spanish: la custodia
  alternatives_spanish:
  - el encargo
  - la responsabilidad
  - la guardia
  lexicon: HALOT
  rationale: En contexto sacerdotal/cultual, מִשְׁמֶרֶת es una responsabilidad confiada, con matiz de vigilancia. «Custodia» permite conservar tanto deber como resguardo sin perder solemnidad.
- source_word: מִשְׁכַּן הָעֵדוּת
  english_pob_choice: the tabernacle of the testimony
  chosen_spanish: del tabernáculo del testimonio
  alternatives_spanish:
  - del tabernáculo del testimonio del pacto
  - de la morada del testimonio
  lexicon: HALOT
  rationale: Se mantiene la misma traducción de la frase repetida para conservar la coherencia terminológica dentro del versículo.
theological_decisions:
- issue: Naturaleza de קֶצֶף en este contexto sacerdotal
  english_pob_reading: wrath refers to divine wrath/judicial outbreak if the sanctuary is not properly guarded
  chosen_spanish_reading: ira como juicio divino que podría irrumpir sobre Israel si el santuario no está debidamente custodiado
  alternative_spanish_readings:
  - enojo
  - ira humana
  - desagrado
  rationale: En Números, el peligro es el quebrantamiento de límites sagrados con consecuencias judiciales. «Ira» preserva esa fuerza teológica sin explicitar más de lo que el texto dice.
  doctrine_reference: Mantener la tensión teológica del juicio santo; no suavizar la amenaza ni convertirla en mera molestia emocional.
- issue: Valor de בְּנֵי יִשְׂרָאֵל
  english_pob_reading: sons of Israel
  chosen_spanish_reading: hijos de Israel
  alternative_spanish_readings:
  - israelitas
  - pueblo de Israel
  rationale: El hebreo es explícitamente filial y masculino plural. Se conserva la forma del original en lugar de neutralizarla, siguiendo la decisión auditada en la POB inglesa.
  doctrine_reference: Fidelidad formal cuando el género gramatical forma parte del contenido lingüístico del hebreo.
- issue: Sentido de מִשְׁכַּן הָעֵדוּת
  english_pob_reading: tabernacle of the testimony
  chosen_spanish_reading: tabernáculo del testimonio
  alternative_spanish_readings:
  - tabernáculo del testimonio del pacto
  - morada del testimonio
  rationale: «Testimonio» mantiene la ambigüedad hebrea y evita cerrar el sentido a una sola paráfrasis teológica. «Tabernáculo» es el término cultual estándar en español y sigue la solución inglesa auditada.
  doctrine_reference: Preservar terminología cultual estable y la tensión semántica de עֵדוּת.
translation_notes:
  revision_awareness: La versión inglesa auditada no muestra cambios textuales recientes y el cross-check indica alto acuerdo; por eso la redacción española sigue de cerca la lectura estabilizada, manteniendo la terminología cultual y la fuerza judicial de los términos clave.
  spanish_consistency_notes:
  - Se mantiene «tabernáculo del testimonio» de forma uniforme para מִשְׁכַּן הָעֵדוּת.
  - Se conserva «hijos de Israel» por consistencia con la decisión de género-accurate del original hebreo.
  - «Ira» traduce קֶצֶף con peso judicial, evitando suavizarlo a «enojo».
