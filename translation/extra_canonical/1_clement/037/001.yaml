translation:
  text: |-
    Therefore let us serve as soldiers, brothers, with all earnestness under his blameless commands. Let us consider those who serve as soldiers under our commanders: how orderly, how readily, how submissively they carry out what is commanded. Not all are prefects, nor tribunes, nor centurions, nor commanders of fifty, nor the rest in order; but each, in his own rank, carries out the orders given by the king and by the commanders.
    
    The great cannot exist without the small, nor the small without the great. There is a certain blending in all things, and in these things there is usefulness. Let us take our body as an example: the head is nothing without the feet; likewise the feet are nothing without the head. Even the smallest members of our body are necessary and useful to the whole body. But all work together in harmony and make use of one submission, so that the whole body may be preserved.
