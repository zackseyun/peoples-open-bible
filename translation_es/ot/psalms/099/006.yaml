translation:
  language: es
  text: Moisés y Aarón estaban entre sus sacerdotes[a], y Samuel entre los que invocaban su nombre; ellos invocaban a Yahvé, y él les respondió.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «entre los que invocaban su nombre». La frase hebrea literalmente se refiere a quienes llaman o invocan su nombre.
    reason: lexical_alternative
lexical_decisions:
- source_word: בְּכֹהֲנָיו
  english_pob_choice: were among his priests
  chosen_spanish: estaban entre sus sacerdotes
  alternatives_spanish:
  - estaban entre sus sacerdotes
  - entre sus sacerdotes
  - eran de sus sacerdotes
  lexicon: HALOT
  rationale: 'El ב partitivo con el sustantivo plural y sufijo posesivo se entiende naturalmente como inclusión en un grupo: Moisés y Aarón son contados entre los sacerdotes de Dios. En español, «estaban entre» reproduce bien ese matiz sin convertirlos en sacerdotes en un sentido técnico que el hebreo no obliga a afirmar aquí.'
- source_word: בְּקֹרְאֵי שְׁמוֹ
  english_pob_choice: among those who called on his name
  chosen_spanish: entre los que invocaban su nombre
  alternatives_spanish:
  - entre los que invocaban su nombre
  - entre los que llamaban sobre su nombre
  - entre los que llamaban a su nombre
  lexicon: HALOT
  rationale: La frase participial identifica a Samuel con un grupo caracterizado por la invocación del nombre divino. «Invocaban su nombre» conserva mejor el uso bíblico de llamado/rezo al nombre de Dios que una paráfrasis menos precisa.
- source_word: קֹרִאים אֶל
  english_pob_choice: they called to
  chosen_spanish: invocaban a
  alternatives_spanish:
  - clamaban a
  - llamaban a
  - invocaban a
  lexicon: HALOT
  rationale: El verbo resume la acción de los personajes y la preposición אֶל pide un complemento directo de dirección. «Invocaban a Yahvé» mantiene el sentido de oración o súplica sin restringirlo indebidamente al grito de angustia.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahvé
  lexicon: HALOT
  rationale: Se conserva el nombre propio divino, conforme al criterio del proyecto, en lugar de sustituirlo por una designación tradicional como «el SEÑOR».
- source_word: יַעֲנֵם
  english_pob_choice: he answered them
  chosen_spanish: les respondía
  alternatives_spanish:
  - les respondió
  - les respondía
  lexicon: HALOT
  rationale: El imperfecto hebreo aquí funciona como pasado resumido o habitual dentro de la evocación del salmo. «Les respondía» conserva esa flexión aspectual; «les respondió» también sería posible en un español más narrativo.
- source_word: שְׁמוֹ
  english_pob_choice: his name
  chosen_spanish: su nombre
  alternatives_spanish:
  - su nombre
  - él
  lexicon: HALOT
  rationale: Debe preservarse el hebreo explícito «su nombre», porque en la Biblia el llamado al nombre de Dios es una fórmula teológica concreta de oración e invocación, no simplemente un pronombre.
theological_decisions:
- issue: Cómo reflejar la relación de Moisés y Aarón con el sacerdocio sin borrar la tensión del hebreo
  english_pob_reading: Moses and Aaron were among his priests
  chosen_spanish_reading: Moisés y Aarón estaban entre sus sacerdotes
  alternative_spanish_readings:
  - Moisés y Aarón eran sus sacerdotes
  - Moisés y Aarón estaban entre los sacerdotes
  rationale: El hebreo usa una expresión partitiva que los incluye en el conjunto de los sacerdotes de Yahvé. «Estaban entre sus sacerdotes» preserva la inclusión sin afirmar más de lo que el texto exige sobre un oficio sacerdotal en sentido estrecho.
  doctrine_reference: Preservar la tensión textual y la primacía del original; no armonizar prematuramente con categorías posteriores.
- issue: Cómo traducir la invocación del nombre divino
  english_pob_reading: Samuel among those who called on his name; they called to Yahweh
  chosen_spanish_reading: Samuel entre los que invocaban su nombre; ellos invocaban a Yahvé
  alternative_spanish_readings:
  - Samuel entre los que llamaban sobre su nombre; ellos clamaban a Yahvé
  - Samuel entre los que invocaban su nombre; ellos llamaban a Yahvé
  rationale: La construcción hebrea «llamar/invocar el nombre» es una fórmula de culto y súplica. En español, «invocar su nombre» y «invocaban a Yahvé» conservan esa carga religiosa sin diluirla en una simple referencia verbal.
  doctrine_reference: Mantener el lenguaje de oración e intercesión que el salmo atribuye a estas figuras.
translation_notes:
  revision_awareness: Se revisó la concordancia con el hebreo masorético y con el audit trail inglés. Se mantuvo la estructura paralela del verso, la inclusión partitiva de Moisés y Aarón, y el lenguaje de invocación del nombre divino. No se requirieron cambios adicionales respecto del borrador de referencia más reciente.
  spanish_consistency_notes:
  - Se usa «Yahvé» de forma consistente para יהוה.
  - Se conserva «su nombre» en la expresión de invocación para no perder el idiomatismo bíblico.
  - Se evita «SEÑOR» como sustituto del nombre divino conforme al criterio del proyecto.
  - «Respondía» se eligió para reflejar el imperfecto hebreo dentro del recuerdo poético del salmo.
