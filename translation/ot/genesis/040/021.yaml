  from: and he put
  to: and the cupbearer put
  rationale: The pronoun 'he' in the second clause is ambiguous and most naturally refers to the subject of the first clause (Pharaoh). This creates a nonsensical reading where Pharaoh puts the cup into his own hand. The subject of the Hebrew verb וַיִּתֵּן ('and he gave/put') is the chief cupbearer, who has just been restored to his position. The current rendering misrepresents the actor in the second clause. Making the subject explicit ('the cupbearer') resolves the ambiguity and corrects the meaning.
