translation:
  language: es
  text: Y sea tu casa como la casa de Peres[a], a quien Tamar dio a luz a Judá, de la descendencia[b] que Yahvé te dará de esta joven.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Aquí ‘casa’ puede significar hogar, familia o línea familiar, no solo una vivienda física.
    reason: cultural_note
  - marker: b
    text: O ‘de la semilla’, es decir, ‘de la descendencia’. El hebreo usa ‘semilla’ como un modismo común para los descendientes.
    reason: lexical_alternative
lexical_decisions:
- source_word: וִיהִי
  english_pob_choice: And may ... be
  chosen_spanish: Y sea ...
  alternatives_spanish:
  - Y que sea ...
  - Y sea ...
  lexicon: HALOT
  rationale: El yusivo hebreo expresa una bendición o deseo. En español, el subjuntivo con ‘sea’ comunica de forma natural ese valor optativo sin forzar una paráfrasis.
- source_word: בֵיתְךָ
  english_pob_choice: your house
  chosen_spanish: tu casa
  alternatives_spanish:
  - tu hogar
  - tu familia
  - tu casa
  lexicon: HALOT
  rationale: ‘Casa’ conserva la imagen hebrea y, en este contexto genealógico, puede abarcar casa, familia o linaje. Se mantiene la amplitud del término sin sustituirlo por una explicación interpretativa.
- source_word: כְּבֵית פֶּרֶץ
  english_pob_choice: like the house of Perez
  chosen_spanish: como la casa de Peres
  alternatives_spanish:
  - como la familia de Peres
  - como la casa de Peres
  lexicon: HALOT
  rationale: Se conserva la comparación literal y el idiomatismo ‘casa de’, que en contexto alude a una línea familiar/descendencia. ‘Peres’ sigue la transliteración usual del nombre hebreo.
- source_word: אֲשֶׁר יָלְדָה תָמָר לִיהוּדָה
  english_pob_choice: whom Tamar bore to Judah
  chosen_spanish: a quien Tamar dio a luz para Judá
  alternatives_spanish:
  - a quien Tamar dio a luz a Judá
  - a quien Tamar tuvo para Judá
  lexicon: HALOT
  rationale: ‘Dar a luz’ refleja bien יָלְדָה. La preposición ‘para’ reproduce la relación genealógica de לִיהוּדָה sin sobrecargar el español con un giro menos natural.
- source_word: מִן הַזֶּרַע
  english_pob_choice: from the offspring
  chosen_spanish: del linaje[c]
  alternatives_spanish:
  - de la descendencia
  - de la semilla
  - del linaje
  lexicon: HALOT
  rationale: זֶרַע puede significar literalmente ‘semilla’, pero en este contexto denota descendencia. ‘Linaje’ comunica la referencia genealógica con dignidad y evita un calco opaco; se marca nota para conservar la alternativa más literal.
- source_word: אֲשֶׁר יִתֵּן יְהוָה לְךָ
  english_pob_choice: that Yahweh will give you
  chosen_spanish: que Yahvé te dará
  alternatives_spanish:
  - que Yahvé te concederá
  - que Yahvé te dará
  lexicon: HALOT
  rationale: Se sigue el valor futuro de יִתֵּן. ‘Yahvé’ responde al estándar del proyecto para el Nombre divino.
- source_word: מִן הַנַּעֲרָה הַזֹּאת
  english_pob_choice: by this young woman
  chosen_spanish: por medio de esta joven
  alternatives_spanish:
  - de esta joven
  - por esta joven
  - por medio de esta joven
  lexicon: HALOT
  rationale: נַעֲרָה es ‘joven’ o ‘joven mujer’. ‘Por medio de’ expresa de modo natural la mediación maternal sugerida en español, sin perder el referente humano concreto.
theological_decisions:
- issue: Nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahvé
  - Jehová
  rationale: 'Se aplica el estándar del proyecto para el Tetragrámaton: ‘Yahvé’, preservando el nombre del pacto en vez de sustituirlo por una forma de título.'
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Sentido de בֵּית en una bendición genealógica
  english_pob_reading: house
  chosen_spanish_reading: casa
  alternative_spanish_readings:
  - hogar
  - familia
  - linaje
  rationale: ‘Casa’ mantiene la ambigüedad intencional entre casa física, casa/hogar y línea familiar. Dado que la bendición trata de descendencia, no conviene estrechar el sentido demasiado pronto.
  doctrine_reference: DOCTRINE.md Translation philosophy §1, §5
translation_notes:
  revision_awareness: La redacción sigue la revisión final del audit trail, que corrigió la relación de מִן de una noción causal ('because of') a una relación más directa de procedencia ('from'). Por eso se evita en español una causalidad explícita y se usa 'del linaje...'.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' para el Nombre divino, según la convención del proyecto.
  - Se usa 'casa' para preservar la amplitud genealógica del hebreo.
  - Se evita 'Mesías'/'Cristo' porque el versículo no contiene ese término.
  - El registro busca ser publicable y natural en español sin perder la estructura de bendición del hebreo.
