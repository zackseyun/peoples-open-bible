review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien la secuencia narrativa hebrea: el momento temporal al ponerse el sol, la orden de Josué, bajar los cuerpos de los árboles, arrojarlos a la cueva donde se habían escondido y colocar piedras grandes en la abertura de la cueva con vigencia hasta el día del narrador. Sin embargo, hay dos puntos que conviene ajustar: ''de encima de los árboles'' suena poco natural en español para cuerpos colgados en árboles, y ''los echaron'' es algo más débil/coloquial que el hebreo וַיַּשְׁלִכֻם y que la línea inglesa auditada ''threw them''.'
  spanish_quality_summary: 'El texto es generalmente claro y digno, pero puede sonar más natural y preciso con pequeños cambios de estilo: ''los bajaron de los árboles'' es el giro idiomático normal, y ''los arrojaron'' mantiene mejor la viveza del verbo hebreo sin perder legibilidad. El resto del versículo lee bien en español eclesial neutro.'
  glossary_alignment: No hay términos teológicos de proyecto en juego aquí. 'Josué', 'cueva', y la construcción temporal están alineados con el estilo del proyecto. La decisión de no introducir 'allí' en el cuerpo principal para שָׁם es aceptable, dado que el audit trail inglés ya lo trató como énfasis opcional y en español sería redundante.
  issues:
  - severity: medium
    issue: '''de encima de los árboles'' es una formulación torpe en español'
    rationale: Aunque מֵעַל literalmente añade la idea de 'de sobre', en español narrativo la forma natural para retirar cuerpos colgados es 'de los árboles'. Mantiene el sentido sin calco rígido.
  - severity: medium
    issue: '''los echaron'' suaviza demasiado וַיַּשְׁלִכֻם'
    rationale: El hebreo expresa 'arrojar/castar'. 'Echaron' puede sonar coloquial o menos enérgico; 'arrojaron' preserva mejor la fuerza léxica y el tono narrativo solemne.
  revised_spanish_text: Y al tiempo de ponerse el sol, Josué mandó, y los bajaron de los árboles y los arrojaron en la cueva donde se habían escondido, y pusieron grandes piedras sobre la entrada de la cueva hasta este mismo día.
  revision_rationale: 'Se hicieron dos reparaciones menores para mejorar fidelidad léxica y naturalidad del español: ''de encima de los árboles'' se simplificó a ''de los árboles'', que es el giro idiomático normal y suficiente para el sentido de מֵעַל en este contexto; y ''los echaron'' se fortaleció a ''los arrojaron'' para reflejar mejor וַיַּשְׁלִכֻם. No se requieren notas al pie adicionales.'
