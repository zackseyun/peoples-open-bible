translation:
  language: es
  text: 'Y además, enviaron por hombres que venían de lejos, a quienes se había enviado un mensajero; y he aquí que vinieron: a la que se había lavado, se había pintado[a] los ojos y se había adornado con joyas.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «se había delineado los ojos con kohl». El verbo hebreo se refiere a aplicar un cosmético oscuro para los ojos.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְאַף כִּי
  english_pob_choice: And moreover
  chosen_spanish: Y además
  alternatives_spanish:
  - Y además de esto
  - Y aun más
  lexicon: HALOT
  rationale: La combinación intensifica la acusación y avanza el reproche. «Y además» conserva el valor aditivo y enfático sin sonar rígido en español.
- source_word: תִשְׁלַחְנָה
  english_pob_choice: they sent for
  chosen_spanish: enviaron por
  alternatives_spanish:
  - mandaron por
  - enviaron a
  lexicon: HALOT
  rationale: El verbo es femenino plural y en el contexto implica convocar o solicitar la presencia de esos hombres. «Enviaron por» reproduce bien ese matiz de llamado/summons en español.
- source_word: לַאֲנָשִׁים בָּאִים מִמֶּרְחָק
  english_pob_choice: for men coming from far away
  chosen_spanish: por hombres que venían de lejos
  alternatives_spanish:
  - por hombres que venían de un lugar lejano
  - para hombres que venían de lejos
  lexicon: HALOT
  rationale: «Hombres» respeta el género del hebreo. «Que venían de lejos» mantiene el participio y la imagen espacial sin sobreexplicar.
- source_word: אֲשֶׁר מַלְאָךְ שָׁלוּחַ אֲלֵיהֶם
  english_pob_choice: to whom a messenger had been sent
  chosen_spanish: a quienes se había enviado un mensajero
  alternatives_spanish:
  - a quienes se había despachado un mensajero
  - a los que se les había enviado un mensajero
  lexicon: HALOT
  rationale: «Mensajero» es el sentido humano de מַלְאָךְ aquí, no «ángel». La pasiva conserva la relación anterior de envío y el resultado previo a su llegada.
- source_word: וְהִנֵּה בָאוּ
  english_pob_choice: and behold, they came
  chosen_spanish: y he aquí que vinieron
  alternatives_spanish:
  - y he aquí, vinieron
  - y mira, vinieron
  lexicon: HALOT
  rationale: «He aquí» reproduce la fuerza deíctica y profética de וְהִנֵּה. «Vinieron» es natural en español y sigue el movimiento narrativo.
- source_word: לַאֲשֶׁר
  english_pob_choice: to the one who
  chosen_spanish: a la que
  alternatives_spanish:
  - a quien
  - a la mujer que
  lexicon: HALOT
  rationale: El hebreo pasa de plural colectivo a singular femenino. «A la que» hace visible ese cambio y mantiene la referencia femenina sin suavizarla.
- source_word: רָחַצְתְּ
  english_pob_choice: had washed herself
  chosen_spanish: se había lavado
  alternatives_spanish:
  - se lavó
  - había lavado su cuerpo
  lexicon: HALOT
  rationale: El contexto es preparatorio y reflexivo. «Se había lavado» expresa de manera natural la acción previa de aseo sin añadir detalles ajenos al texto.
- source_word: כָּחַלְתְּ עֵינַיִךְ
  english_pob_choice: painted her eyes
  chosen_spanish: se había pintado los ojos
  alternatives_spanish:
  - había delineado sus ojos con kohl
  - se había puesto cosmético en los ojos
  lexicon: HALOT
  rationale: El verbo alude al uso de cosmético oscuro para los ojos. «Se había pintado los ojos» es fiel y comprensible; la especificación tradicional de kohl se puede notar aparte si se desea.
- source_word: וְעָדִית עֶדִי
  english_pob_choice: and adorned herself with jewelry
  chosen_spanish: y se había adornado con joyas
  alternatives_spanish:
  - y se había adornado con adornos
  - y se había engalanado con joyas
  lexicon: HALOT
  rationale: La construcción verbo-objeto indica ponerse adorno personal. «Joyas» comunica bien el sentido moderno y mantiene el tono de embellecimiento.
theological_decisions:
- issue: Cambio de número y de referente entre el grupo y la mujer singular
  english_pob_reading: Render the opening verb as plural ('they sent for') and the grooming actions as singular feminine ('the one who had washed herself ...')
  chosen_spanish_reading: Mantener el plural inicial («enviaron») y pasar al singular femenino en la cláusula relativa («a la que se había lavado…»).
  alternative_spanish_readings:
  - Uniformar todo en plural para el flujo estilístico
  - Uniformar todo en singular para identificar solo a una figura
  rationale: El hebreo alterna deliberadamente entre las dos mujeres/pueblos en conjunto y la mujer interpelada en singular. Conservar ese cambio evita suavizar la retórica profética y respeta la tensión textual.
  doctrine_reference: 'Translation philosophy #3, #5'
- issue: Valor de מַלְאָךְ como mensajero humano
  english_pob_reading: to whom a messenger had been sent
  chosen_spanish_reading: «un mensajero»
  alternative_spanish_readings:
  - «un ángel»
  - «un enviado»
  rationale: En este contexto la palabra designa a un enviado humano. Traducir «ángel» introduciría una lectura no apoyada por el pasaje y alteraría el sentido narrativo.
  doctrine_reference: HALOT; contexto inmediato
translation_notes:
  revision_awareness: La revisión inglesa reciente no introdujo cambios sustantivos; el texto publicado en inglés quedó estable. La presente versión española sigue la misma lectura global, pero ajusta la sintaxis para que la alternancia de plural/singular y el valor de «mensajero» queden claros en español.
  spanish_consistency_notes:
  - Uso de «Yahvé» no aplica en este versículo.
  - Se conserva «mensajero» para מַלְאָךְ por el contexto humano, evitando «ángel».
  - «Se había pintado los ojos» mantiene la equivalencia abierta con la nota sobre kohl.
  - La alternancia entre «enviaron» y «a la que» refleja la distinción colectiva/individual del hebreo.
