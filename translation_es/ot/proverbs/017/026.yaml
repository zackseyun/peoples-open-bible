translation:
  language: es
  text: También[a], castigar a un justo no es bueno, ni golpear a los nobles[b] por su rectitud[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «y aun». La partícula hebrea añade o intensifica el proverbio anterior; «también» expresa bien ese valor aditivo.'
    reason: lexical_alternative
  - marker: b
    text: «Nobles» también puede traducirse «príncipes» o «líderes»; el hebreo puede referirse a personas de alto rango.
    reason: lexical_alternative
  - marker: c
    text: 'O: «contra lo justo». La frase hebrea עַל יֹשֶׁר puede entenderse como «por su rectitud» o, más idiomáticamente, «contra la justicia / contra lo que es recto».'
    reason: alternative_reading
lexical_decisions:
- source_word: גַּם
  english_pob_choice: Also
  chosen_spanish: También
  alternatives_spanish:
  - Además
  - Asimismo
  lexicon: HALOT
  rationale: La partícula agrega otro dicho o refuerzo del proverbio anterior. «También» conserva el valor aditivo de forma natural en español sin sobrecargar el énfasis.
- source_word: עֲנוֹשׁ
  english_pob_choice: to punish
  chosen_spanish: castigar
  alternatives_spanish:
  - sancionar
  - penalizar
  lexicon: HALOT
  rationale: El infinitivo expresa la acción de imponer castigo. «Castigar» es la equivalencia más amplia y natural en español para este contexto sapiencial.
- source_word: לַצַּדִּיק
  english_pob_choice: a righteous man
  chosen_spanish: a un justo
  alternatives_spanish:
  - al justo
  - a un hombre justo
  lexicon: HALOT
  rationale: El sustantivo/adjetivo con artículo señala a una persona representativa. «Justo» preserva la fuerza ética y resulta idiomático en español; se evita una formulación más pesada sin perder el referente personal.
- source_word: לֹא טוֹב
  english_pob_choice: is not good
  chosen_spanish: no es bueno
  alternatives_spanish:
  - no es correcto
  - no es apropiado
  lexicon: HALOT
  rationale: Es una fórmula evaluativa estándar del hebreo. «No es bueno» conserva la forma y el juicio moral básico del original.
- source_word: לְהַכּוֹת
  english_pob_choice: to strike
  chosen_spanish: golpear
  alternatives_spanish:
  - azotar
  - pegar
  lexicon: HALOT
  rationale: נכה puede abarcar golpear o herir. «Golpear» mantiene el sentido amplio sin especificar un grado de violencia que el texto no determina.
- source_word: נְדִיבִים
  english_pob_choice: nobles
  chosen_spanish: los nobles
  alternatives_spanish:
  - príncipes
  - líderes
  lexicon: HALOT
  rationale: En Proverbios, el término designa personas de alto rango o dignidad social. «Nobles» preserva bien ese campo semántico y encaja con el paralelismo del proverbio.
- source_word: עַל יֹשֶׁר
  english_pob_choice: for their uprightness
  chosen_spanish: por su rectitud
  alternatives_spanish:
  - a causa de su rectitud
  - contra lo que es recto
  lexicon: HALOT
  rationale: La preposición עַל puede indicar motivo o referencia. «Por su rectitud» sigue la lectura directa adoptada en la base inglesa y mantiene la ambigüedad suficiente para el contraste implícito.
translation_notes:
  revision_awareness: 'Coincide con la revisión más reciente: no se registraron cambios y el control cruzado indicó alto acuerdo.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma de proyecto, pero este versículo no contiene el Tetragrámaton.
  - Se prefirió «justo/rectitud» para conservar el lenguaje ético sapiencial del hebreo.
  - «Nobles» conserva la referencia social de alto rango sin forzar un término eclesiástico.
