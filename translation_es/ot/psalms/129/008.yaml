translation:
  language: es
  text: 'y los que pasan por allí no dicen: «La bendición de Yahvé[a] sea sobre ustedes; los bendecimos en el nombre de Yahvé».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «YHWH» (el nombre divino), tradicionalmente vertido «el SEÑOR».'
    reason: alternative_reading
lexical_decisions:
- source_word: וְלֹא
  english_pob_choice: and ... do not
  chosen_spanish: y ... no dirán
  alternatives_spanish:
  - ni dirán
  - y ... no dicen
  lexicon: HALOT
  rationale: La coordinación con negación continúa la descripción poética; en español, «y ... no dirán» conserva la secuencia y la negación sin forzar una construcción más literal pero menos natural.
- source_word: אָמְרוּ
  english_pob_choice: say
  chosen_spanish: dirán
  alternatives_spanish:
  - dicen
  - han dicho
  - dijeron
  lexicon: HALOT
  rationale: El qatal funciona en un enunciado general/gnómico. «Dirán» transmite bien la acción típica de los que pasan sin fijarla a un tiempo pasado narrativo.
- source_word: הָעֹבְרִים
  english_pob_choice: those who pass by
  chosen_spanish: los que pasan
  alternatives_spanish:
  - los que pasan por allí
  - los transeúntes
  lexicon: HALOT
  rationale: El participio con artículo designa una clase de personas. «Los que pasan» es natural en español y conserva el sentido habitual y general.
- source_word: בִּרְכַּת יְהוָה
  english_pob_choice: The blessing of Yahweh
  chosen_spanish: La bendición de Yahvé
  alternatives_spanish:
  - La bendición de Yahweh
  - La bendición de Yahvé sea
  lexicon: HALOT
  rationale: Se mantiene la construcción nominal con el nombre divino en la forma POB «Yahvé». «Bendición» preserva el sustantivo del hebreo בִּרְכַּת sin convertirlo en un verbo.
- source_word: אֲלֵיכֶם
  english_pob_choice: be upon you
  chosen_spanish: sea sobre ustedes
  alternatives_spanish:
  - esté sobre ustedes
  - venga sobre ustedes
  lexicon: HALOT
  rationale: El hebreo omite el verbo; en español se requiere uno. «Sea sobre ustedes» reproduce el valor optativo de la bendición con registro digno y claro.
- source_word: בֵּרַכְנוּ אֶתְכֶם
  english_pob_choice: we bless you
  chosen_spanish: los bendecimos
  alternatives_spanish:
  - los hemos bendecido
  - los bendecimos a ustedes
  lexicon: HALOT
  rationale: El perfecto hebreo aquí funciona como respuesta formularia de bendición. En español, el presente performativo «los bendecimos» expresa mejor la acción ritual pronunciada por los que pasan.
- source_word: בְּשֵׁם יְהוָה
  english_pob_choice: in the name of Yahweh
  chosen_spanish: en el nombre de Yahvé
  alternatives_spanish:
  - por el nombre de Yahvé
  - invocando el nombre de Yahvé
  lexicon: HALOT
  rationale: La preposición «en» conserva la fórmula de autoridad/invocación. Se mantiene «Yahvé» por consistencia con el nombre divino en el texto principal.
theological_decisions:
- issue: Representación del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - SEÑOR
  rationale: El texto hebreo usa el Tetragrama. La convención del proyecto en español es «Yahvé», transliteración reverente del nombre divino, evitando la sustitución titulada «SEÑOR».
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
translation_notes:
  revision_awareness: Se corrigió el fallo anterior asegurando que el marcador [a] aparezca exactamente en el texto español junto a la frase sobre el nombre divino, con la nota correspondiente anclada a esa decisión.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» en ambos lugares del versículo para coherencia con la política terminológica del proyecto.
  - Se conservó el tono poético y formular de bendición sin añadir elementos no presentes en el hebreo.
  - Se prefirió «los que pasan» por naturalidad, sin perder el sentido de una clase general de transeúntes.
