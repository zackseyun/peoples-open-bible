translation:
  language: es
  text: No prestes a un hombre más fuerte que tú; y si prestas[a], considera ese préstamo como perdido.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'El testimonio griego aquí lee una advertencia distinta: «No pelees con un hombre iracundo, y no vayas con él por el desierto... porque, a sus ojos, la sangre no es nada, y donde no hay ayuda te abatirá». El hebreo conservado, en cambio, advierte contra prestar a alguien más fuerte que tú.'
    reason: textual_variant
lexical_decisions:
- source_word: אַל
  english_pob_choice: Do not
  chosen_spanish: No prestes
  alternatives_spanish:
  - No debes prestar
  - No hagas un préstamo
  lexicon: HALOT
  rationale: La partícula prohibitiva introduce un mandato negativo directo. «No prestes» mantiene el tono sapiencial breve y natural, sin añadir dureza ni perífrasis innecesarias.
- source_word: תַּלְוֶה
  english_pob_choice: lend
  chosen_spanish: prestes
  alternatives_spanish:
  - hagas un préstamo
  - prestes dinero
  lexicon: HALOT
  rationale: El verbo transmite la acción de prestar en contexto financiero. En español, el verbo simple «prestar» es claro y fiel; el complemento «dinero» se omite porque el hebreo no lo explicita en esta línea.
- source_word: אִישׁ חָזָק מִמְּךָ
  english_pob_choice: a man stronger than you
  chosen_spanish: a un hombre más fuerte que tú
  alternatives_spanish:
  - a alguien más fuerte que tú
  - a un hombre poderoso que tú
  lexicon: HALOT
  rationale: Se conserva el singular masculino de אִישׁ como «un hombre», según la decisión de mantener el valor gramatical del hebreo. חָזָק con מִמְּךָ se expresa de forma natural como «más fuerte que tú».
- source_word: וְאִם הִלְוִיתָ
  english_pob_choice: and if you do lend
  chosen_spanish: y si prestas
  alternatives_spanish:
  - y si llegas a prestar
  - y si prestaras
  lexicon: HALOT
  rationale: La apódosis condicional en español fluye mejor con presente («si prestas»). La partícula se mantiene con «y» para reflejar la transición del mandato a la eventualidad sin sobrecargar la frase.
- source_word: כִּמְאַבֵּד
  english_pob_choice: regard it as lost
  chosen_spanish: considérelo como perdido
  alternatives_spanish:
  - téngalo por perdido
  - cuéntelo como perdido
  lexicon: HALOT
  rationale: 'El comparativo כ comunica tratamiento estimativo: actuar como si el préstamo ya no se recuperara. «Considérelo como perdido» conserva esa valoración práctica y suena idiomático en español.'
theological_decisions:
- issue: 'Base textual de Sirach 8:16: hebreo frente a griego'
  english_pob_reading: Translate the Hebrew loan-warning directly, without importing the divergent Greek wording about quarreling with a hot-tempered man.
  chosen_spanish_reading: Traducir el aviso hebreo sobre prestar a alguien más fuerte, y señalar en nota la divergencia del griego.
  alternative_spanish_readings:
  - Traducir el dicho griego sobre no pelear con un colérico
  - Fusionar hebreo y griego en una advertencia general
  rationale: El hebreo conservado ofrece una instrucción financiera distinta del testimonio griego. La POB inglesa toma el hebreo como texto principal y preserva la divergencia en nota; el español sigue esa misma priorización para no mezclar dos sentencias diferentes.
  doctrine_reference: Philosophy of source priority for Sirach; use the preserved Hebrew as primary where available, with Greek as audit witness
- issue: Marcación de género en אִישׁ
  english_pob_reading: a man stronger than you
  chosen_spanish_reading: a un hombre más fuerte que tú
  alternative_spanish_readings:
  - a alguien más fuerte que tú
  rationale: Se mantiene el masculino singular del sustantivo hebreo. En este contexto sapiencial, neutralizar a «alguien» borraría un rasgo explícito del source text sin necesidad textual.
  doctrine_reference: 'Translation philosophy: preserve grammatical gender where source is explicit unless context requires neutralization'
translation_notes:
  revision_awareness: Se revisó el pasaje con el testimonio hebreo conservado como texto base y el griego como variante paralela significativa. No se requirieron cambios ulteriores tras el último pase de revisión, y la formulación española mantiene la tensión textual sin armonizarla artificialmente.
  spanish_consistency_notes:
  - Se usa «prestar» para el contexto financiero, no «auxiliar» ni «favorecer», porque el hebreo trata de un préstamo.
  - Se conserva «un hombre» para reflejar el singular masculino del hebreo אִישׁ.
  - «Más fuerte que tú» reproduce el valor comparativo de מִמְּךָ sin sobreinterpretar como autoridad social.
  - La nota al pie distingue con claridad el dicho griego divergente para evitar confusión con el texto principal.
