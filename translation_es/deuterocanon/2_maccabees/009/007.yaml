translation:
  language: es
  text: Pero de ningún modo dejó de ser arrogante[a]; antes bien, estaba aún más lleno de orgullo, respirando fuego en su ira contra los judíos y ordenando que se apresurara el viaje. Entonces sucedió que cayó del carro mientras avanzaba con ímpetu, y, al verse envuelto en tan grave caída[b], todos los miembros de su cuerpo se dislocaron.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: También puede traducirse «altivez» o «insolencia». El griego ἀγερωχία puede abarcar soberbia altanera o arrogancia insolente.
    reason: lexical_alternative
  - marker: b
    text: O «todos los miembros de su cuerpo quedaron dislocados». El raro verbo griego probablemente describe una violenta desarticulación de las extremidades tras la caída.
    reason: lexical_alternative
lexical_decisions:
- source_word: οὐδαμῶς ... ἔληγεν
  english_pob_choice: in no way ceased
  chosen_spanish: de ningún modo cesó
  alternatives_spanish:
  - no cesó en absoluto
  - de ninguna manera dejó de
  lexicon: LSJ
  rationale: οὐδαμῶς intensifica la negación, y ἔληγεν expresa cesar o detenerse. «De ningún modo cesó» conserva la fuerza enfática con español natural y digno.
- source_word: ἀγερωχίας
  english_pob_choice: arrogance
  chosen_spanish: arrogancia
  alternatives_spanish:
  - altivez
  - haughtiness
  lexicon: LSJ
  rationale: El sustantivo denota una conducta soberbia o altanera. «Arrogancia» es claro en español moderno y refleja bien el tono moral del pasaje.
- source_word: ὑπερηφανίας ἐπεπλήρωτο
  english_pob_choice: was filled even more with pride
  chosen_spanish: se llenaba aún más de orgullo
  alternatives_spanish:
  - estaba lleno de orgullo
  - era llenado todavía más de arrogancia
  lexicon: LSJ
  rationale: La construcción perifrástica indica que el orgullo lo llenaba; ἔτι δὲ καί añade intensificación. «Aún más» reproduce la escalada sin perder naturalidad.
- source_word: πῦρ πνέων τοῖς θυμοῖς
  english_pob_choice: breathing fire in his anger
  chosen_spanish: respirando fuego en su ira
  alternatives_spanish:
  - lanzando fuego en su ira
  - ardiendo en ira
  lexicon: LSJ
  rationale: La imagen es vívida e idiomática. «Respirando fuego» conserva la metáfora; «ira» expresa con suficiente precisión θυμοῖς en este contexto de hostilidad.
- source_word: ἐπὶ τοὺς Ἰουδαίους
  english_pob_choice: against the Jews
  chosen_spanish: contra los judíos
  alternatives_spanish:
  - hacia los judíos
  lexicon: LSJ
  rationale: Con lenguaje emocional hostil, ἐπί tiene aquí fuerza adversativa. «Contra» refleja mejor la dirección de su enojo.
- source_word: κελεύων ἐποξύνειν τὴν πορίαν
  english_pob_choice: ordering the journey to be hastened
  chosen_spanish: ordenando que se apresurara el viaje
  alternatives_spanish:
  - mandando que se apremiara la marcha
  - ordenando que se acelerara el viaje
  lexicon: LSJ
  rationale: πορία puede significar viaje o marcha, según el contexto. «Viaje» es natural aquí, y «se apresurara» conserva el valor causativo de la orden.
- source_word: ἅρματος φερομένου ῥοίζῳ
  english_pob_choice: the chariot as it was rushing along
  chosen_spanish: mientras avanzaba con ímpetu
  alternatives_spanish:
  - mientras el carro era llevado velozmente
  - mientras el carro corría con estrépito
  lexicon: LSJ
  rationale: La frase describe un movimiento rápido y ruidoso. «Con ímpetu» comunica bien la velocidad sin sonar forzado; «carro» es una opción española natural para ἅρμα en este contexto.
- source_word: δυσχερεῖ πτώματι
  english_pob_choice: the grievous fall
  chosen_spanish: aquella caída grave
  alternatives_spanish:
  - aquella caída penosa
  - aquel grave desplome
  lexicon: LSJ
  rationale: δυσχερής puede significar duro, penoso o severo. «Caída grave» es idiomática y mantiene el peso físico del accidente.
- source_word: πάντα τὰ μέλη τοῦ σώματος ἀποσφύζειν
  english_pob_choice: all the limbs of his body were dislocated
  chosen_spanish: todos los miembros de su cuerpo se dislocaron
  alternatives_spanish:
  - todos los miembros de su cuerpo fueron dislocados
  - todos los miembros de su cuerpo se les desunieron
  lexicon: LSJ
  rationale: El verbo raro sugiere una violentísima separación o dislocación de las articulaciones. «Se dislocaron» es claro, formal y fiel a la imagen física sin exagerar más allá del contexto.
theological_decisions:
- issue: Escalada moral de la soberbia de Antíoco
  english_pob_reading: Retain both 'arrogance' and 'pride' as distinct but related terms
  chosen_spanish_reading: Conservar «arrogancia» y «orgullo» como términos distintos pero emparentados
  alternative_spanish_readings:
  - fusionar ambos en un solo término como «arrogancia»
  - usar solo «orgullo»
  rationale: El griego usa dos sustantivos relacionados pero no idénticos, ἀγερωχία y ὑπερηφανία, para intensificar la soberbia del personaje. Mantener ambos en español preserva la progresión retórica y no aplana el matiz moral.
  doctrine_reference: Translation philosophy §5 (consistency of key terms, or documented exception)
- issue: Valor de θυμοῖς en el contexto hostil
  english_pob_reading: breathing fire in his anger
  chosen_spanish_reading: respirando fuego en su ira
  alternative_spanish_readings:
  - respirando fuego en su enojo
  - ardiendo en ira
  rationale: En este pasaje, θυμοῖς expresa una reacción vehemente y hostil. «Ira» conserva la fuerza afectiva sin introducir una connotación técnica innecesaria.
  doctrine_reference: Context-sensitive lexical equivalence
translation_notes:
  revision_awareness: La base inglesa revisó «rage» por «anger» para θυμοῖς y afinó la cláusula final desde una formulación más libre a «when he was involved in the grievous fall... were dislocated». En español se siguió esa revisión con «ira» y con una subordinada que refleja «al verse envuelto en aquella caída grave», manteniendo la formalidad y la claridad.
  spanish_consistency_notes:
  - Se usa «Yahvé» para el nombre divino cuando corresponda, pero este versículo no lo contiene.
  - Se mantiene «judíos» para Ἰουδαίους conforme al referente étnico-histórico del pasaje.
  - «Carro» se usa como equivalente natural de ἅρμα en este contexto narrativo.
  - Se evita «siervo» porque δοῦλος no aparece en este versículo.
