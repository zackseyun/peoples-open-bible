revisions:
- from: Y llevaréis a Sicut[a] vuestro rey, y a Quiún vuestros ídolos, la estrella de vuestro dios[c][b], que os habíais hecho para vosotros mismos.
  to: Y llevasteis a Sicut[a] vuestro rey, y a Quiún vuestras imágenes, la estrella de vuestro dios[c][b], que hicieron para ustedes mismos.
  rationale: Se ajustó el verbo principal a pasado ('llevasteis') para reflejar mejor el valor acusatorio del hebreo y la decisión auditada en inglés. Se cambió 'vuestros ídolos' por 'vuestras imágenes' para respetar צַלְמֵיכֶם sin sobreinterpretar. Se simplificó la cláusula final para mejorar naturalidad en español neutral latinoamericano, evitando 'os/vosotros' y el pluscuamperfecto innecesario, mientras se conserva la idea de objetos hechos por ellos mismos. Se mantuvieron las notas existentes porque siguen documentando adecuadamente las alternativas textuales e históricas.
  reviewer_model: gpt-5.4
