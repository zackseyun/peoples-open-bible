translation:
  language: es
  text: Porque no existía desde el principio[a], ni existirá para siempre.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El griego deja el sujeto implícito por el contexto; puede referirse a los ídolos o a la idolatría.
    reason: alternative_reading
lexical_decisions:
- source_word: οὔτε γὰρ
  english_pob_choice: For ... not ... nor
  chosen_spanish: Porque ... no ... ni
  alternatives_spanish:
  - Pues ... no ... ni
  - Porque ... ni ... ni
  lexicon: BDAG
  rationale: γάρ aporta fuerza explicativa, bien representada por 'Porque'. La correlación negativa se naturaliza en español con 'no ... ni' para conservar el enlace lógico sin una repetición forzada de 'ni'.
- source_word: ἦν
  english_pob_choice: it was
  chosen_spanish: era
  alternatives_spanish:
  - existía
  - había sido
  lexicon: BDAG
  rationale: El sujeto permanece implícito en el griego; en español, 'era' mantiene la referencia elíptica con una copulativa sencilla y fiel, sin añadir un sustantivo no expresado.
- source_word: ἀπ' ἀρχῆς
  english_pob_choice: from the beginning
  chosen_spanish: desde el principio
  alternatives_spanish:
  - desde el comienzo
  - al principio
  lexicon: BDAG
  rationale: La frase idiomática española 'desde el principio' reproduce con claridad el sentido de origen temporal del griego y corresponde al uso ya auditado en la POB en inglés.
- source_word: εἰς τὸν αἰῶνα
  english_pob_choice: forever
  chosen_spanish: para siempre
  alternatives_spanish:
  - por toda la eternidad
  - por el siglo
  lexicon: BDAG
  rationale: '''Para siempre'' comunica de manera natural y precisa la continuidad indefinida del futuro en el contraste temporal del verso, evitando una literalidad menos transparente.'
- source_word: ἔσται
  english_pob_choice: will it be
  chosen_spanish: será
  alternatives_spanish:
  - existirá
  - estará
  lexicon: BDAG
  rationale: El futuro de εἰμί se vierte con 'será' para mantener el paralelo verbal con 'era' y conservar la sobriedad del griego.
theological_decisions:
- issue: Sujeto implícito no explicitado en el griego
  english_pob_reading: Use the pronoun 'it' without specifying 'idols' or 'idolatry' in the main text.
  chosen_spanish_reading: Se conserva el sujeto tácito en la traducción española, sin añadir 'ídolos' ni 'idolatría' en el texto principal.
  alternative_spanish_readings:
  - Porque los ídolos no eran desde el principio, ni serán para siempre.
  - Porque la idolatría no era desde el principio, ni será para siempre.
  rationale: El griego deja el sujeto implícito por el contexto. En español también es posible mantener esa elipsis mediante la forma verbal impersonal/contextualmente referida, evitando sobreespecificar lo que el texto base no dice explícitamente.
  doctrine_reference: 'Translation philosophy: preserve what the source text says without importing more specificity than warranted.'
translation_notes:
  revision_awareness: 'La presente redacción sigue la lectura auditada de alta concordancia: mantiene la elipsis del sujeto, conserva la relación explicativa de γάρ y no introduce una especificación interpretativa en el texto principal. No se registraron revisiones que alteraran el sentido base.'
  spanish_consistency_notes:
  - Se mantuvo 'principio' para ἀρχή en un registro bíblico natural, coherente con la terminología española usual.
  - Se evitó 'SEÑOR' u otras convenciones de sustitución, pues no hay aquí un léxico divino que requiera ese tratamiento.
  - '''Para siempre'' se emplea como equivalente idiomático de εἰς τὸν αἰῶνα en contraste temporal, sin cargarlo de una lectura doctrinal adicional.'
