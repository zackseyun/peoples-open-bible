lexical_decisions:
- source_word: אֲנִי
  english_pob_choice: As for me
  chosen_spanish: En cuanto a mí
  alternatives_spanish:
  - Yo
  - En mi caso
  lexicon: HALOT
  rationale: El pronombre independiente está adelantado para enfatizar contraste. «En cuanto a mí» reproduce mejor en español ese matiz contrastivo que un simple «yo», sin alejarse del valor enfático del hebreo.
- source_word: אֶל
  english_pob_choice: to
  chosen_spanish: a
  alternatives_spanish:
  - hacia
  lexicon: HALOT
  rationale: La preposición marca dirección del clamor hacia Dios; en español, «a» es la equivalencia natural y más fiel en este contexto poético.
- source_word: אֱלֹהִים
  english_pob_choice: God
  chosen_spanish: Dios
  alternatives_spanish:
  - el Dios verdadero
  lexicon: HALOT
  rationale: El sustantivo se refiere al Dios único en paralelismo con Yahvé en la cláusula siguiente; «Dios» conserva la referencia singular y el registro bíblico normal.
- source_word: אֶקְרָא
  english_pob_choice: I call
  chosen_spanish: clamaré
  alternatives_spanish:
  - clamo
  - llamaré
  lexicon: HALOT
  rationale: Aunque el verbo básico puede ser «llamar», en este contexto de ruego poético el sentido comunicativo es invocar con urgencia. «Clamaré» preserva mejor la fuerza del acto verbal sin perder la dirección del hebreo.
- source_word: וַיהוָה
  english_pob_choice: and the LORD / Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - y Yahvé
  - el SEÑOR
  lexicon: HALOT
  rationale: El texto hebreo contiene explícitamente el nombre divino YHWH. Según la convención del proyecto en español, se rinde como «Yahvé», manteniendo el nombre del pacto y evitando el reemplazo por un título enmascarado.
- source_word: יוֹשִׁיעֵנִי
  english_pob_choice: will save me
  chosen_spanish: me salvará
  alternatives_spanish:
  - me rescatará
  - me librará
  lexicon: HALOT
  rationale: El hiphil de ישׁע expresa salvar/liberar. «Me salvará» conserva la correspondencia léxica más directa con la raíz y el matiz de confianza futura del imperfecto.
theological_decisions:
- issue: Representación del nombre divino YHWH
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: El verso usa el tetragrámaton יְהוָה de forma directa. La política española del proyecto exige «Yahvé» como forma principal para preservar el nombre del pacto y la transparencia textual; no se emplea un título sustitutivo.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יהוה / YHWH → Yahvé'
translation_notes:
  revision_awareness: Coincide con el texto fuente hebreo y con el auditorío inglés en el contenido básico; la única adaptación relevante es la convención española para el nombre divino, aplicada de forma consistente.
  spanish_consistency_notes:
  - Se mantuvo el orden poético con un inicio contrastivo equivalente a «As for me».
  - Se evitó «SEÑOR» para reflejar directamente el tetragrámaton.
  - «Clamaré» conserva el tono de súplica implícito en el verbo hebreo en este contexto.
  - La puntuación separa claramente las dos cláusulas coordinadas, como en el hebreo y en el inglés auditado.
