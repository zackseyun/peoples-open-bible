  yaml_path: translation/ot/leviticus/020/020.yaml
  text: If a man lies with his aunt[a], he has uncovered his uncle’s nakedness. They shall bear their sin[b]; they shall die childless.
  footnotes:
  - marker: a
    text: Or, 'They shall bear their guilt.' The Hebrew idiom can express either sin or the liability/guilt borne for it.
    reason: lexical_alternative
  - marker: b
    text: Literally, 'his uncle’s nakedness he has uncovered'—a Levitical idiom for violating a prohibited sexual kinship bond by lying with the uncle’s wife.
    reason: cultural_note
