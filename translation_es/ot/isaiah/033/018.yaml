translation:
  language: es
  text: 'Tu corazón meditará en el terror: «¿Dónde está el escriba? ¿Dónde está el que pesa? ¿Dónde está el que cuenta las torres?»[a][b]'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «ponderará el terror» o «musitará sobre el terror». El verbo hebreo puede denotar musitación interior o una meditación casi en voz baja.
    reason: lexical_alternative
  - marker: b
    text: «El escriba... el que pesa... el que cuenta las torres» probablemente alude a oficiales extranjeros involucrados en tasación, tributo o cálculos de asedio.
    reason: cultural_note
lexical_decisions:
- source_word: לִבְּךָ
  english_pob_choice: your heart
  chosen_spanish: tu corazón
  alternatives_spanish:
  - tu mente
  - tu interior
  lexicon: HALOT
  rationale: לֵב/לֵבָב designa el centro interior de la persona, incluyendo pensamiento y reflexión. «Corazón» conserva ese antropologismo hebreo y funciona bien con el verbo siguiente de meditación.
- source_word: יֶהְגֶּה
  english_pob_choice: will meditate on
  chosen_spanish: meditará en
  alternatives_spanish:
  - musitará sobre
  - ponderará
  - murmurará sobre
  lexicon: HALOT
  rationale: הגה puede expresar masticación interior, musitación o meditación. En este contexto de recuerdo interno tras la crisis, «meditará en» reproduce la idea reflexiva sin forzar un sentido vocal.
- source_word: אֵימָה
  english_pob_choice: terror
  chosen_spanish: el terror
  alternatives_spanish:
  - el pavor
  - el temor
  - el espanto
  lexicon: HALOT
  rationale: El sustantivo denota terror o pavor intenso. «Terror» es la forma más directa y mantiene la fuerza del recuerdo de una amenaza pasada.
- source_word: אַיֵּה
  english_pob_choice: Where is
  chosen_spanish: ¿Dónde está?
  alternatives_spanish:
  - ¿Dónde están?
  lexicon: HALOT
  rationale: La partícula interrogativa repetida introduce una pregunta retórica singular con cada participio. «¿Dónde está?» preserva la forma y el tono de desafío.
- source_word: סֹפֵר
  english_pob_choice: the scribe
  chosen_spanish: el escriba
  alternatives_spanish:
  - el secretario
  - el contador
  - el registrador
  lexicon: HALOT
  rationale: ספר como participio nominal puede referirse a quien escribe, registra o cuenta. En este contexto administrativo-militar, «escriba» es el equivalente más asentado y plausible sin especificar de más.
- source_word: שֹׁקֵל
  english_pob_choice: the one who weighs
  chosen_spanish: el que pesa
  alternatives_spanish:
  - el que mide
  - el pesador
  lexicon: HALOT
  rationale: El participio de שקל significa literalmente pesar. «El que pesa» conserva la transparencia verbal y evita convertirlo en un oficio más interpretado de lo que el hebreo exige.
- source_word: סֹפֵר אֶת הַמִּגְדָּלִים
  english_pob_choice: the one who counts the towers
  chosen_spanish: el que cuenta las torres
  alternatives_spanish:
  - el que registra las torres
  - el que inspecciona las torres
  lexicon: HALOT
  rationale: Aquí ספר naturalmente significa contar respecto de las torres. «Cuenta las torres» mantiene la imagen concreta y la posible referencia a evaluación militar o de tributo sin añadir explicaciones al texto principal.
- source_word: הַמִּגְדָּלִים
  english_pob_choice: the towers
  chosen_spanish: las torres
  alternatives_spanish:
  - las torres de vigilancia
  - las fortificaciones
  lexicon: HALOT
  rationale: מגדלים son torres. Aunque el trasfondo puede ser militar, «las torres» preserva el sustantivo concreto sin expandirlo interpretativamente.
translation_notes:
  revision_awareness: 'Se siguió la lectura de alta concordancia del audit trail inglés sin cambios de fondo: se mantuvo la estructura retórica y la imagen concreta de los títulos/funciones, y se preservó en nota la ambigüedad del verbo hebreo הגה y el trasfondo cultural de los oficios mencionados.'
  spanish_consistency_notes:
  - Se usó «corazón» para לֵב conforme al uso bíblico hebreo del centro interior.
  - Se eligió «meditará en» por ser natural en español y conservar el matiz reflexivo de הגה.
  - Se mantuvo el paralelismo interrogativo con «¿Dónde está?» en las tres cláusulas.
  - Se evitó ampliar «torres» a «fortificaciones» en el texto principal para no sobreinterpretar el sustantivo.
