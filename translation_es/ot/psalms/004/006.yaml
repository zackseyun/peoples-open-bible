translation:
  language: es
  text: Ofrezcan sacrificios de rectitud[a], y confíen en Yahvé.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «Ofrezcan sacrificios justos» o «Ofrezcan sacrificios de justicia».
