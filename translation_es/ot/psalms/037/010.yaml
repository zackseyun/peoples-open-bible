translation:
  language: es
  text: Aún un poco de tiempo[a], y el impío ya no estará; aunque observes atentamente su lugar, no estará allí.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'El singular hebreo רָשָׁע puede funcionar de manera representativa o genérica: «el impío» también puede entenderse como «los impíos» en sentido colectivo. Aquí se conserva el singular porque en español comunica con naturalidad esa fuerza representativa sin añadir «hombre».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְעוֹד
  english_pob_choice: Yet
  chosen_spanish: Todavía
  alternatives_spanish:
  - Y todavía
  - Aún
  lexicon: HALOT
  rationale: עוֹד con מְעַט forma una expresión temporal idiomática. En español, «Todavía» transmite la expectativa de un breve lapso sin forzar una coordinación artificial.
- source_word: מְעַט
  english_pob_choice: a little while
  chosen_spanish: un poco de tiempo
  alternatives_spanish:
  - un poco
  - un breve tiempo
  lexicon: HALOT
  rationale: Aunque el hebreo dice literalmente «poco», aquí el valor es temporal. «Un poco de tiempo» comunica con naturalidad el corto plazo implícito.
- source_word: וְאֵין
  english_pob_choice: will be no more
  chosen_spanish: ya no será
  alternatives_spanish:
  - no existirá más
  - será nada
  lexicon: HALOT
  rationale: El negativo existencial mira hacia el futuro. «Ya no será» conserva la idea de cesación de presencia/existencia sin introducir una perífrasis demasiado explicativa.
- source_word: רָשָׁע
  english_pob_choice: the wicked
  chosen_spanish: el impío
  alternatives_spanish:
  - el malvado
  - el perverso
  lexicon: HALOT
  rationale: El sustantivo/adjetivo singular hebreo funciona de modo representativo. «El impío» mantiene el valor sustantivado y la gravedad moral del término con registro bíblico claro.
- source_word: וְהִתְבּוֹנַנְתָּ
  english_pob_choice: though you look carefully
  chosen_spanish: aunque observes atentamente
  alternatives_spanish:
  - y observarás atentamente
  - aunque mires con cuidado
  lexicon: HALOT
  rationale: La forma hitpolel expresa observación reflexiva y cuidadosa. «Aunque observes atentamente» refleja bien el matiz concesivo del contexto y la acción de examinar con atención.
- source_word: עַל מְקוֹמוֹ
  english_pob_choice: at his place
  chosen_spanish: su lugar
  alternatives_spanish:
  - en su lugar
  - donde estaba
  lexicon: HALOT
  rationale: La expresión apunta al sitio asociado con él. «Su lugar» es natural en español y conserva la imagen concreta sin sobreespecificar la preposición.
- source_word: וְאֵינֶנּוּ
  english_pob_choice: he will not be there
  chosen_spanish: no estará allí
  alternatives_spanish:
  - no se encontrará allí
  - no estará presente
  lexicon: HALOT
  rationale: La repetición final refuerza la ausencia en el sitio mencionado. «No estará allí» reproduce con sencillez el sentido locativo de ausencia.
theological_decisions:
- issue: Valor representativo del singular hebreo רָשָׁע
  english_pob_reading: The wicked / the wicked man as a representative singular
  chosen_spanish_reading: el impío como singular representativo, no un individuo identificado
  alternative_spanish_readings:
  - el impío
  - el impío hombre
  - los impíos
  rationale: El hebreo singular puede funcionar genéricamente o representativamente. En español, «el impío» preserva esa fuerza sin añadir «hombre» ni pluralizar indebidamente.
  doctrine_reference: Poética sapiencial y uso genérico del singular en el hebreo bíblico
- issue: Negación existencial prospectiva
  english_pob_reading: will be no more / he will not be there
  chosen_spanish_reading: ya no será / no estará allí como desaparición futura
  alternative_spanish_readings:
  - no existirá más
  - no será hallado allí
  rationale: El verso promete la futura desaparición del impío. Mantener ambas cláusulas como negaciones prospectivas conserva el paralelismo hebreo y la tensión de ausencia futura.
  doctrine_reference: Paralelismo poético y semántica del negativo existencial en hebreo bíblico
translation_notes:
  revision_awareness: 'La revisión inglesa eliminó «man» para reflejar mejor el singular representativo del hebreo. Esta versión española sigue esa revisión y evita masculinizar de más el término, manteniendo el valor genérico de רָשָׁע. También conserva el paralelismo de dos negaciones futuras: «ya no será» / «no estará allí».'
  spanish_consistency_notes:
  - Se usa «impío» para רָשָׁע, consistente con un registro bíblico sobrio y con el valor sustantivado del hebreo.
  - Se traduce וְאֵין con una negación prospectiva («ya no será») en armonía con el contexto futuro.
  - Se mantiene la imagen concreta de lugar/sitio con «su lugar» y «allí», sin añadir explicaciones interpretativas.
