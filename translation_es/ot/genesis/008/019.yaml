review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura y el sentido general del hebreo: enumera las tres categorías animales, conserva la cláusula resumidora y mantiene לְמִשְׁפְּחֹתֵיהֶם con ''familias''. Sin embargo, hay dos desajustes relevantes con la evidencia fuente y con la propia auditoría inglesa: (1) el signo de puntuación tras ''ave'' debe ser raya o coma parentética, no dos puntos, porque כֹּל רוֹמֵשׂ עַל הָאָרֶץ funciona como recapitulación appositiva, no como explicación formal; (2) יָצְאוּ es plural y debe reflejarse en español con ''salieron'', no ''salió''.'
  spanish_quality_summary: El español es claro y digno, con buenas opciones como 'toda bestia', 'todo animal que se arrastra' y 'toda ave'. La frase suena natural en registro bíblico moderno. No obstante, la concordancia verbal en singular produce una incorrección evidente, y la nota al pie actual repite exactamente la lectura del texto ('según sus familias') como si fuera alternativa, cuando la alternativa documentada en inglés es más bien 'por sus familias' o 'de acuerdo con sus familias'.
  glossary_alignment: 'No hay conflictos con la terminología base del proyecto. Las decisiones léxicas principales están alineadas con la auditoría POB: חַיָּה -> ''bestia'', רֶמֶשׂ -> ''animal que se arrastra'', עוֹף -> ''ave'', רוֹמֵשׂ -> ''se mueve'', תֵּבָה -> ''arca''. También es correcto mantener ''familias'' y no sustituir por ''especies'' o ''clases''.'
  issues:
  - severity: high
    issue: Concordancia verbal incorrecta en 'salió del arca'
    rationale: El verbo hebreo יָצְאוּ está en plural. En español, con la serie de sujetos distributivos, la forma fiel y natural es 'salieron del arca'. El singular borra una marca gramatical del original y contradice incluso la justificación interna del archivo.
  - severity: medium
    issue: Puntuación poco fiel con dos puntos después de 'toda ave'
    rationale: La cláusula כֹּל רוֹמֵשׂ עַל הָאָרֶץ es una recapitulación parentética o resumidora. En español fluye mejor y refleja mejor el original con raya o comas, no con dos puntos.
  - severity: medium
    issue: Nota al pie mal formulada como alternativa idéntica al texto
    rationale: Si el texto dice 'según sus familias', la nota no debe decir 'O ‘según sus familias’'. La alternativa debe diferir realmente, por ejemplo 'por sus familias' o 'de acuerdo con sus familias', mientras se preserva la explicación semántica.
  revised_spanish_text: Toda bestia[a], todo animal que se arrastra, y toda ave —todo lo que se mueve sobre la tierra—, según sus familias, salieron del arca.
  revised_footnotes:
  - marker: a
    text: O 'por sus familias'. La expresión hebrea preserva la idea de grupos de descendencia o divisiones entre los animales.
    reason: lexical_alternative
  revision_rationale: La revisión corrige la concordancia verbal para reflejar el plural hebreo, mejora la puntuación de la cláusula recapituladora para que suene natural y fiel, y ajusta la nota al pie para que ofrezca una alternativa real coherente con la auditoría inglesa. No hace falta una reescritura mayor, porque el resto de las decisiones léxicas son sólidas.
