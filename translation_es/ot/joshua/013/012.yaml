translation:
  language: es
  text: todo el reino de Og en Basán[a], que reinó en Ashtarot y en Edrei—él había quedado del remanente de los refaítas. Moisés los derrotó y los desposeyó.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O ''los gigantes''. Hebreo: ''los refaítas'', probablemente el nombre de un pueblo antiguo.'
    reason: lexical_alternative
lexical_decisions:
- source_word: כָּל מַמְלְכ֥וּת
  english_pob_choice: all the kingdom
  chosen_spanish: todo el reino
  alternatives_spanish:
  - todo el dominio real
  - el reino entero
  lexicon: HALOT
  rationale: כָּל con מַמְלְכּוּת singular expresa la totalidad del reino; en español, 'todo el reino' comunica de forma natural esa totalidad sin añadir pluralidad.
- source_word: עוֹג
  english_pob_choice: Og
  chosen_spanish: Og
  alternatives_spanish:
  - Og
  lexicon: transliteración propia
  rationale: Es un nombre propio; se conserva la forma transliterada estándar.
- source_word: בַּבָּשָׁן
  english_pob_choice: in Bashan
  chosen_spanish: en Basán
  alternatives_spanish:
  - de Basán
  lexicon: HALOT
  rationale: La preposición ב indica ubicación; 'en Basán' refleja el sentido espacial de manera directa.
- source_word: אֲשֶׁר מָלַךְ
  english_pob_choice: who reigned
  chosen_spanish: que reinó
  alternatives_spanish:
  - que gobernó
  - que fue rey
  lexicon: HALOT
  rationale: מָלַךְ tiene fuerza real/monárquica; 'reinó' preserva mejor ese matiz que 'gobernó'.
- source_word: בְּעַשְׁתָּרוֹת וּבְאֶדְרֶעִי
  english_pob_choice: in Ashtaroth and in Edrei
  chosen_spanish: en Ashtarot y en Edrei
  alternatives_spanish:
  - en Astarot y en Edrei
  - en Ashtarot y Edrei
  lexicon: HALOT
  rationale: Son nombres de lugar; se repite 'en' para mantener explícita la localización y seguir la construcción hebrea.
- source_word: הוּא נִשְׁאַר
  english_pob_choice: he was left
  chosen_spanish: él quedó
  alternatives_spanish:
  - él fue dejado
  - él permaneció
  lexicon: HALOT
  rationale: נִשְׁאַר expresa quedar/ser dejado. 'Él quedó' suena natural en español y conserva la idea de supervivencia o resto.
- source_word: מִיֶּתֶר
  english_pob_choice: of the remnant of
  chosen_spanish: del remanente de
  alternatives_spanish:
  - de lo que quedaba de
  - del resto de
  lexicon: HALOT
  rationale: יִתֶר / יֶתֶר alude a lo que queda; 'remanente' permite una traducción sobria y fiel al valor residual del término.
- source_word: הָרְפָאִים
  english_pob_choice: the Rephaim
  chosen_spanish: los refaítas
  alternatives_spanish:
  - los Refaím
  - los gigantes
  lexicon: HALOT
  rationale: Se preserva como nombre de un grupo étnico/antiguo, evitando una interpretación descriptiva como 'gigantes' que la POB documenta solo como alternativa.
- source_word: וַיַּכֵּם
  english_pob_choice: Moses struck them down
  chosen_spanish: Moisés los hirió
  alternatives_spanish:
  - Moisés los golpeó
  - Moisés los derrotó
  lexicon: HALOT
  rationale: נכה puede ser 'herir', 'golpear' o 'derrotar'. 'Los hirió' mantiene la fuerza de acción violenta sin introducir un giro demasiado interpretativo.
- source_word: וַיֹּרִשֵׁם
  english_pob_choice: and dispossessed them
  chosen_spanish: y los desposeyó
  alternatives_spanish:
  - y los expulsó
  - y los despojó
  lexicon: HALOT
  rationale: Hifil de ירשׁ en contexto de conquista indica causar pérdida de posesión. 'Desposeyó' conserva ese sentido jurídico-conquistador mejor que 'expulsó'.
theological_decisions:
- issue: Identificación de הָרְפָאִים
  english_pob_reading: the Rephaim, likely the name of an ancient people group
  chosen_spanish_reading: los refaítas, como nombre de un antiguo grupo de pueblos
  alternative_spanish_readings:
  - los gigantes
  - los Refaím
  rationale: Se mantiene el término como etnónimo para no reducirlo a una glosa interpretativa. La alternativa 'gigantes' queda implícitamente disponible, pero no se adopta en el texto principal porque la POB la trata como lectura alternativa, no como equivalencia principal.
  doctrine_reference: Translation philosophy §1, §5
translation_notes:
  revision_awareness: 'La redacción sigue la revisión más reciente del audit trail, que ajustó la relación preposicional a una forma más natural y literal: ''of the remnant'' > ''of the remnant''. En español se reflejó con ''del remanente de'', conservando la idea de pertenencia/resto sin introducir ''desde''.'
  spanish_consistency_notes:
  - Se usa 'Yahvé' por norma de proyecto solo cuando aparece el nombre divino; este versículo no lo contiene.
  - Se evitó 'SEÑOR' y 'Cristo' por no corresponder al contenido del versículo.
  - '''Refaítas'' se usa en minúscula como gentilicio/etnónimo común en español bíblico; la nota conserva la alternativa interpretativa ''gigantes''.'
  - Se mantuvo la doble preposición 'en ... y en ...' para reproducir la estructura locativa del hebreo.
