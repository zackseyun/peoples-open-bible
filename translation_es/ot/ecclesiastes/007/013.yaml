translation:
  language: es
  text: Considera la obra de Dios[a], porque ¿quién puede enderezar lo que él ha torcido?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «enderezar lo que él ha doblado».
    reason: lexical_alternative
lexical_decisions:
- source_word: רְאֵה
  english_pob_choice: Consider
  chosen_spanish: Considera
  alternatives_spanish:
  - Mira
  - Observa
  - Fíjate en
  lexicon: HALOT
  rationale: El imperativo aquí pide atención reflexiva más que mera percepción visual. «Considera» conserva el tono sapiencial y la invitación a meditar sobre la acción divina.
- source_word: מַעֲשֵׂה
  english_pob_choice: work
  chosen_spanish: obra
  alternatives_spanish:
  - trabajo
  - hecho
  - acción
  lexicon: HALOT
  rationale: En español, «obra de Dios» es natural y amplio, como el inglés «work of God». Comunica tanto lo que Dios hace como lo realizado por él sin estrechar el sentido.
- source_word: הָאֱלֹהִים
  english_pob_choice: God
  chosen_spanish: Dios
  alternatives_spanish:
  - el Dios
  - el Altísimo
  lexicon: HALOT
  rationale: El hebreo nombra a Dios en sentido genérico y no el nombre divino YHWH; por eso «Dios» es la equivalencia directa y adecuada.
- source_word: מִי יוּכַל
  english_pob_choice: who can
  chosen_spanish: ¿quién puede?
  alternatives_spanish:
  - ¿quién es capaz de?
  - ¿quién podrá?
  lexicon: HALOT
  rationale: La pregunta retórica en español se expresa con naturalidad como «¿quién puede?», manteniendo la fuerza de incapacidad humana implícita en el hebreo.
- source_word: לְתַקֵּן
  english_pob_choice: straighten
  chosen_spanish: enderezar
  alternatives_spanish:
  - poner recto
  - arreglar
  - corregir
  lexicon: HALOT
  rationale: «Enderezar» preserva la imagen concreta y el contraste con «torcido». Es la mejor opción para mantener el paralelismo metafórico sin volverlo abstracto.
- source_word: עִוְּתוֹ
  english_pob_choice: he has made crooked
  chosen_spanish: lo que él ha torcido
  alternatives_spanish:
  - lo que ha torcido
  - lo que Dios ha torcido
  - lo que ha hecho torcido
  lexicon: HALOT
  rationale: La expresión conserva el verbo de torcer y el sujeto personal implícito en el sufijo. «Él» mantiene la referencia a Dios en el contexto inmediato, sin suavizar la tensión teológica del texto.
theological_decisions:
- issue: Sujeto implícito en «lo que él ha torcido»
  english_pob_reading: 'The subject is God: the verse states that no one can straighten what God has made crooked.'
  chosen_spanish_reading: El sujeto se mantiene implícito en «él»; por el contexto, se entiende que se refiere a Dios.
  alternative_spanish_readings:
  - lo que Dios ha torcido
  - lo que ha sido torcido
  rationale: El hebreo deja el sufijo personal y el contexto inmediato habla de la obra de Dios. Mantener «él» preserva la gramática y la tensión teológica, mientras que explicitar «Dios» en el texto o volverlo impersonal reduciría esa fuerza.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it'
translation_notes:
  revision_awareness: La revisión más reciente no introdujo cambios y el dictamen de control cruzado fue de alto acuerdo; por eso la redacción sigue de cerca el hebreo y la decisión inglesa auditada, sin modificaciones adicionales.
  spanish_consistency_notes:
  - Se mantiene «Dios» para אֱלֹהִים, no «Yahvé», porque el hebreo aquí usa el sustantivo genérico.
  - Se conserva la metáfora recto/torcido con «enderezar/torcido» para reflejar el paralelismo léxico.
  - Se evita una paráfrasis explicativa como «arreglar» o «corregir», porque debilitaría la imagen concreta del versículo.
