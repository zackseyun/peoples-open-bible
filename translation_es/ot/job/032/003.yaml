translation:
  language: es
  text: Y se encendió su ira contra sus tres amigos, porque no habían hallado respuesta, y habían condenado[a] a Job.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «habían declarado culpable a Job» o «lo habían tratado como malvado».
    reason: lexical_alternative
lexical_decisions:
- source_word: וּבִשְׁלֹשֶׁת רֵעָיו
  english_pob_choice: against his three friends
  chosen_spanish: contra sus tres amigos
  alternatives_spanish:
  - con sus tres amigos
  - sobre sus tres amigos
  lexicon: HALOT
  rationale: La preposición ב con חרה אַף expresa el objeto de la ira de manera idiomática; en español, «contra» comunica mejor la dirección hostil que una traducción más literal.
- source_word: חָרָה אַפּוֹ
  english_pob_choice: his anger burned
  chosen_spanish: se encendió su ira
  alternatives_spanish:
  - ardió su ira
  - se inflamó su ira
  - su ira se encendió
  lexicon: HALOT
  rationale: La expresión hebrea es un modismo de enojo intenso. «Se encendió su ira» conserva la imagen del fuego sin caer en un calco torpe.
- source_word: עַל אֲשֶׁר
  english_pob_choice: because
  chosen_spanish: porque
  alternatives_spanish:
  - puesto que
  - ya que
  lexicon: HALOT
  rationale: La secuencia introduce la causa de la ira; «porque» es el equivalente natural y claro en español.
- source_word: לֹא מָצְאוּ מַעֲנֶה
  english_pob_choice: they had found no answer
  chosen_spanish: no habían hallado respuesta
  alternatives_spanish:
  - no encontraron respuesta
  - no habían encontrado una respuesta
  - no dieron respuesta
  lexicon: HALOT
  rationale: מַעֲנֶה puede significar «respuesta» o «réplica». En este contexto de disputa, «respuesta» comunica bien la falta de réplica convincente; el pluscuamperfecto refleja la anterioridad respecto de la ira de Eliú.
- source_word: וַיַּרְשִׁיעוּ
  english_pob_choice: they had condemned
  chosen_spanish: habían condenado
  alternatives_spanish:
  - habían declarado culpable
  - lo habían tenido por culpable
  - lo habían juzgado como perverso
  lexicon: HALOT
  rationale: 'El verbo causativo de רשע tiene fuerza forense: declarar culpable o condenar. «Habían condenado» preserva esa tensión jurídica sin añadir una lectura más fuerte que la del texto.'
- source_word: אֶת אִיּוֹב
  english_pob_choice: Job
  chosen_spanish: a Job
  alternatives_spanish:
  - a Job
  - contra Job
  lexicon: HALOT
  rationale: El marcador de objeto directo exige en español la preposición «a» ante el nombre propio.
theological_decisions:
- issue: Fuerza forense de וַיַּרְשִׁיעוּ
  english_pob_reading: forensic condemnation ('they had condemned Job')
  chosen_spanish_reading: forensic condemnation ('habían condenado a Job')
  alternative_spanish_readings:
  - lo habían declarado culpable
  - lo habían tratado como malvado
  rationale: En un contexto de debate judicial, el verbo expresa una declaración de culpabilidad o condena. «Condenado» mantiene el peso forense sin convertirlo en una afirmación doctrinal más amplia sobre la condición moral de Job.
  doctrine_reference: Translation philosophy §1, §3, §5
translation_notes:
  revision_awareness: Se corrigió el problema de validación anterior incluyendo el marcador [a] exactamente en el texto de traducción y anclando la nota al sintagma correspondiente.
  spanish_consistency_notes:
  - Se usa «Yahvé» por defecto en el proyecto, pero este versículo no contiene el tetragrámaton.
  - «Respuesta» conserva mejor el contexto de debate que una paráfrasis más libre.
  - Se mantiene el valor forense de «condenado» para no perder la tensión lexical del hebreo.
