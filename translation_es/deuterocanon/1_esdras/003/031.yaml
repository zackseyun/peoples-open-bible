translation:
  language: es
  text: Dijo que golpearan, y golpean; dijo que asolaran, y asolan; dijo que edificaran, y edifican.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: εἶπε
  english_pob_choice: he said
  chosen_spanish: dijo
  alternatives_spanish:
  - habló
  - ordenó
  lexicon: LSJ
  rationale: El verbo griego introduce cada dicha real o directiva con sencillez. «Dijo» preserva el paralelismo repetitivo del texto y evita intensificar sin necesidad a «ordenó», aunque la fuerza imperativa se entiende por los infinitivos y la respuesta que sigue.
- source_word: πατάξαι
  english_pob_choice: to strike
  chosen_spanish: golpear
  alternatives_spanish:
  - herir
  - pegar
  - abatir
  lexicon: LSJ
  rationale: El infinitivo aoristo expresa la acción mandada. «Golpear» es claro en español moderno y mantiene la amplitud semántica de una acción violenta sin precisar más de lo que el griego indica.
- source_word: τύπτουσιν
  english_pob_choice: they strike
  chosen_spanish: golpean
  alternatives_spanish:
  - hierven
  - pegan
  - hieren
  lexicon: LSJ
  rationale: Se conserva la correspondencia verbal con πατάξαι. «Golpean» reproduce la acción con naturalidad en español y mantiene el ritmo breve y paralelo de la cláusula.
- source_word: ἐρημῶσαι
  english_pob_choice: to lay waste
  chosen_spanish: asolar
  alternatives_spanish:
  - devastar
  - dejar desolado
  lexicon: LSJ
  rationale: El verbo denota dejar arruinado o desolado. «Asolar» es una opción española directa y elevada que conserva la dureza militar del término sin volverlo explicativo.
- source_word: ἐρημοῦσιν
  english_pob_choice: they lay waste
  chosen_spanish: asolan
  alternatives_spanish:
  - devastan
  - dejan desolado
  lexicon: LSJ
  rationale: Se repite el mismo verbo para preservar la simetría retórica entre mandato y ejecución. «Asolan» mantiene el paralelo verbal y el tono conciso.
- source_word: οἰκοδομῆσαι
  english_pob_choice: to build
  chosen_spanish: edificar
  alternatives_spanish:
  - construir
  - reconstruir
  lexicon: LSJ
  rationale: El sentido básico es «construir/edificar». «Edificar» conserva la nobleza del registro y corresponde bien al final ascendente de la serie, sin introducir explícitamente el matiz de «reconstruir» que el griego no marca de forma obligatoria.
- source_word: οἰκοδομοῦσιν
  english_pob_choice: they build
  chosen_spanish: edifican
  alternatives_spanish:
  - construyen
  - reconstruyen
  lexicon: LSJ
  rationale: Se mantiene la repetición del verbo del mandato con un equivalente natural en español. «Edifican» conserva la cadencia y la equivalencia léxica con οἰκοδομῆσαι.
theological_decisions:
- issue: 'Fuerza de la palabra real: εἶπε + infinitivo y la respuesta inmediata'
  english_pob_reading: Render literally as 'he said ... and they ...' rather than heightening to 'he commanded ... and they obeyed.'
  chosen_spanish_reading: Traducir literalmente «dijo ... y ...» en vez de intensificar a «ordenó ... y obedecen» o «hizo que ...»
  alternative_spanish_readings:
  - ordenó ... y obedecen
  - a su palabra ...
  - mandó ... y obedecen
  rationale: El verso subraya la eficacia de la palabra del rey mediante la repetición de una estructura simple. Mantener «dijo» deja visible la parataxis y no añade una glosa de autoridad que el griego no exige.
  doctrine_reference: Translation philosophy §1, §6
translation_notes:
  revision_awareness: La versión inglesa final no introdujo notas ni cambios posteriores relevantes; la revisión reporta alto acuerdo y sin alteraciones, por lo que la redacción española sigue de cerca el patrón auditado del original griego y de la POB inglesa.
  spanish_consistency_notes:
  - Se evitó «SEÑOR» y cualquier terminología cultual ajena al texto, porque aquí no aparecen nombres divinos ni títulos cristológicos.
  - 'Se preservó la secuencia verbal breve y paralela del griego: dicho → ejecución, sin expandir a una narración más explicativa.'
  - «Asolar» se eligió por su fuerza léxica y por ser más directo que «devastar» en una línea de ritmo rápido.
