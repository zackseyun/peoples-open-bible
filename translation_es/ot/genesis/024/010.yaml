  rationale: Se corrigieron los anclajes de las notas para que correspondan a las palabras relevantes del texto, y se ajustó su contenido para reflejar con fidelidad las alternativas y redacciones previas del expediente inglés. También se cambió 'partió' por 'fue' para conservar más de cerca el valor básico de וילך en la narración. Se mantuvo 'esclavo', 'amo', 'Aram-naharaim' y 'Nacor' por ser opciones defendibles y fieles al enfoque del proyecto.
