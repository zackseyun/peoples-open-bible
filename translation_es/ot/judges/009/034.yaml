translation:
  language: es
  text: Entonces Abimélec y toda la gente que estaba con él se levantaron de noche, y tendieron una emboscada contra Siquem en cuatro compañías[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebreo literalmente, «cuatro cabezas», un modismo que significa cuatro grupos o divisiones.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּקָם
  english_pob_choice: got up
  chosen_spanish: se levantaron
  alternatives_spanish:
  - se alzaron
  - se pusieron en pie
  - se levantó
  lexicon: HALOT
  rationale: קום en este contexto narrativo expresa incorporarse o ponerse en acción. «Se levantaron» es natural en español y conserva el movimiento concreto sin añadir la idea de partir o marchar.
- source_word: לָיְלָה
  english_pob_choice: by night
  chosen_spanish: de noche
  alternatives_spanish:
  - por la noche
  - durante la noche
  lexicon: HALOT
  rationale: El acusativo temporal se expresa bien con «de noche», una solución idiomática y breve que mantiene la referencia nocturna sin intensificarla indebidamente.
- source_word: וַיֶּאֶרְבוּ
  english_pob_choice: they lay in ambush
  chosen_spanish: tendieron una emboscada
  alternatives_spanish:
  - se escondieron en emboscada
  - estuvieron al acecho
  lexicon: HALOT
  rationale: ארב denota esperar ocultamente para atacar. «Tender una emboscada» conserva el sentido militar y funciona con naturalidad en español contemporáneo.
- source_word: עַל שְׁכֶם
  english_pob_choice: against Shechem
  chosen_spanish: contra Siquem
  alternatives_spanish:
  - cerca de Siquem
  - junto a Siquem
  - en Siquem
  lexicon: HALOT
  rationale: Con ארב, עַל marca orientación hostil o contra un objetivo. «Contra» refleja mejor esa postura adversarial que una simple ubicación.
- source_word: אַרְבָּעָה רָאשִׁים
  english_pob_choice: in four companies
  chosen_spanish: en cuatro compañías
  alternatives_spanish:
  - en cuatro grupos
  - en cuatro divisiones
  - en cuatro bandas
  lexicon: HALOT
  rationale: La expresión literal es «cuatro cabezas», un modismo para divisiones o grupos. «Compañías» comunica con claridad una subdivisión militar y preserva el número de unidades sin volver la frase opaca.
- source_word: הָעָם אֲשֶׁר עִמּוֹ
  english_pob_choice: all the people who were with him
  chosen_spanish: toda la gente que estaba con él
  alternatives_spanish:
  - todos los que estaban con él
  - todo el pueblo que estaba con él
  - todos los hombres que estaban con él
  lexicon: HALOT
  rationale: עם puede ser amplio y no exige aquí «hombres» ni «tropas». «Toda la gente» mantiene la amplitud semántica del hebreo y sigue de cerca la decisión del texto base en inglés.
translation_notes:
  revision_awareness: El texto hebreo y el audítor en inglés muestran alta concordancia; no se registran revisiones aplicadas. La versión española sigue esa lectura estable, conservando la ambigüedad idiomática de אַרְבָּעָה רָאשִׁים mediante una nota breve.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma del proyecto solo cuando el texto lo requiera; este versículo no contiene el nombre divino.
  - «Siquem» conserva la forma tradicional geográfica en español, coherente con el nombre propio del hebreo.
  - Se evitó «siervo», «hombres» o «tropas» porque el hebreo usa עָם, término más general.
  - La nota reproduce la equivalencia idiomática del inglés POB sin expandirla más allá de lo que el hebreo justifica.
