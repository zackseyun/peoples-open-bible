  source_alignment_summary: 'El borrador sigue bien el griego y el rastro inglés en casi todo: mantiene la doble invocación a Κύριε, conserva οἶκος como «casa» con nota alternativa a «templo», y refleja adecuadamente κλῖνον ... καὶ ἄκουσον. La principal mejora necesaria está en algo más idiomático y fiel al matiz de κάτιδε: «mira desde» suena incompleto en español para la imagen de mirar desde arriba, y «mira hacia nosotros»/«fíjate en nosotros» expresaría mejor ἐννόησον εἰς ἡμᾶς que «atiéndenos», que puede sugerir responder o servir más que notar/considerar.'
  spanish_quality_summary: El texto es legible y digno, pero «mira desde tu casa santa» resulta menos natural que «mira desde tu santa casa» y además no capta tan bien el valor de «look down». También «atiéndenos» es comprensible, pero menos preciso que «fíjate en nosotros» en este contexto de súplica. «Inclina tu oído ... y oye» es claro y adecuado.
  glossary_alignment: No hay conflicto con la terminología base del proyecto. «Señor» para κύριε es correcto aquí; no hay base suficiente para sustituir por «Yahvé», ya que la fuente inmediata es κύριος sin documentación aquí de cita explícita del nombre divino. «Casa» frente a «templo» está bien alineado con la decisión auditada.
  issues:
  - severity: medium
    issue: «mira desde» no expresa bien el matiz de κάτιδε
    rationale: El verbo lleva la idea de mirar hacia abajo/desde arriba. En español bíblico natural, «mira desde tu santa casa» puede entenderse, pero queda elíptico; «mira hacia abajo desde tu santa casa» o «mira desde tu santa casa» con mejor orden ayuda, y conviene reforzar la imagen vertical.
  - severity: medium
    issue: «atiéndenos» debilita el matiz de ἐννόησον εἰς ἡμᾶς
    rationale: La idea principal es prestar atención o fijarse en ellos, no tanto atenderlos en el sentido de servirlos o responderles. «Fíjate en nosotros» o «pon atención a nosotros» representa mejor la dirección de la atención divina.
  - severity: low
    issue: Orden menos natural en «casa santa»
    rationale: Aunque gramaticalmente posible, «santa casa» suena más natural y solemne en español religioso amplio, sin alterar el sentido literal.
  revised_spanish_text: Señor[a], mira hacia abajo desde tu santa casa y fíjate en nosotros; inclina tu oído, Señor, y oye.
