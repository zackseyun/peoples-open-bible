translation:
  language: es
  text: Yahvé peleará por ustedes[a], y ustedes deben guardar silencio.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «ustedes callarán», «ustedes se quedarán callados» o, tradicionalmente, «ustedes guardarán silencio».
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  - el SEÑOR
  lexicon: HALOT
  rationale: El hebreo usa el nombre propio divino, no un título. En español del POB se mantiene la transliteración reverente y transparente «Yahvé», equivalente funcional de «Yahweh» en el audit trail inglés.
- source_word: יִלָּחֵם
  english_pob_choice: will fight
  chosen_spanish: peleará
  alternatives_spanish:
  - combatirá
  - hará guerra
  lexicon: HALOT
  rationale: El verbo expresa acción bélica futura en favor de Israel. «Peleará» es natural en español y conserva el sentido militar sin sobrecargar el registro.
- source_word: לָכֶם
  english_pob_choice: for you
  chosen_spanish: por ustedes
  alternatives_spanish:
  - a favor de ustedes
  - para ustedes
  lexicon: HALOT
  rationale: La preposición ל indica beneficio/ventaja. «Por ustedes» comunica bien la acción vicaria o en favor del pueblo, con un tono idiomático en español.
- source_word: וְאַתֶּם
  english_pob_choice: and you
  chosen_spanish: y ustedes
  alternatives_spanish:
  - pero ustedes
  - en cambio, ustedes
  lexicon: HALOT
  rationale: La conjunción más el pronombre independiente marca contraste con la acción de Yahvé. «Y ustedes» conserva la coordinación hebrea sin introducir una reinterpretación excesiva.
- source_word: תַּחֲרִישׁוּן
  english_pob_choice: must be silent
  chosen_spanish: deben guardar silencio
  alternatives_spanish:
  - callarán
  - se callarán
  - deben estar callados
  lexicon: HALOT
  rationale: El hifil imperfecto aquí funciona con fuerza exhortativa. «Deben guardar silencio» preserva esa fuerza y evita el matiz excesivamente pasivo de «estar callados» o la arcaización de «guardaréis silencio».
theological_decisions:
- issue: Nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Jehová
  - el SEÑOR
  rationale: Se mantiene el nombre del pacto revelado en el texto hebreo, siguiendo la decisión doctrinal del POB de no ocultarlo tras una sustitución titular. La forma española «Yahvé» es la transliteración estable y legible para este proyecto.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH'
- issue: Fuerza exhortativa de תַּחֲרִישׁוּן
  english_pob_reading: you must be silent
  chosen_spanish_reading: ustedes deben guardar silencio
  alternative_spanish_readings:
  - ustedes callarán
  - ustedes se callarán
  - ustedes deben estar callados
  rationale: Aunque la forma verbal hebrea es imperfectiva, el contexto la usa como instrucción. El español necesita expresar esa fuerza de manera clara; por eso se prefiere una perífrasis modal que conserve el matiz mandativo sin perder la relación con el verbo original de callar/silenciarse.
  doctrine_reference: HALOT, חרשׁ
translation_notes:
  revision_awareness: No se reportan cambios en la última pasada de revisión; el acuerdo entre los controles fue alto (0.95) y el texto inglés quedó sin modificaciones, por lo que este borrador sigue fielmente el audit trail existente.
  spanish_consistency_notes:
  - Se usó «Yahvé» de forma consistente con la política del proyecto para יְהוָה.
  - Se evitó «SEÑOR» como sustituto, manteniendo visible el nombre divino.
  - «Guardar silencio» se eligió para expresar la injunción con naturalidad y sin arcaísmo.
  - El pronombre plural «ustedes» refleja el destinatario plural del hebreo.
