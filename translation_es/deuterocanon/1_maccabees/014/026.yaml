translation:
  language: es
  text: Porque él, sus hermanos y la casa de su padre se mantuvieron firmes, y combatieron a los enemigos de Israel, y establecieron libertad para ellos[a], y lo consignaron en tablillas de bronce, y las colocaron en una columna en el monte Sión.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O “para él”; el griego tiene literalmente un dativo singular masculino, probablemente con referencia colectiva a Israel como nación.
    reason: alternative_reading
lexical_decisions:
- source_word: ἐστήρισεν
  english_pob_choice: stood firm
  chosen_spanish: se mantuvieron firmes
  alternatives_spanish:
  - se fortalecieron
  - permanecieron firmes
  - quedaron firmes
  lexicon: LSJ
  rationale: El verbo puede expresar fortalecer o afirmar, pero aquí el sujeto coordinado (“él, sus hermanos y la casa de su padre”) sugiere perseverancia y firmeza en el contexto militar-político. “Se mantuvieron firmes” conserva esa idea con español natural y no introduce un agente implícito extraño.
- source_word: οἱ ἀδελφοὶ αὐτοῦ
  english_pob_choice: his brothers
  chosen_spanish: sus hermanos
  alternatives_spanish:
  - sus parientes
  lexicon: LSJ
  rationale: El sentido familiar ordinario es el más directo y está bien sustentado por el griego; no hay presión contextual suficiente para ampliar a “parientes”.
- source_word: ὁ οἶκος τοῦ πατρὸς αὐτοῦ
  english_pob_choice: his father's house
  chosen_spanish: la casa de su padre
  alternatives_spanish:
  - la familia de su padre
  - la casa paterna
  - su linaje paterno
  lexicon: LSJ
  rationale: La expresión semítica se conserva de forma transparente en español. “Casa de su padre” mantiene el valor idiomático sin interpretarlo prematuramente.
- source_word: ἐπολέμησαν
  english_pob_choice: fought
  chosen_spanish: combatieron
  alternatives_spanish:
  - pelearon
  - hicieron guerra contra
  - lucharon
  lexicon: LSJ
  rationale: “Combatieron” es un equivalente digno y claro en registro bíblico, y preserva la acción bélica sin sobrerretorcerla.
- source_word: τοὺς ἐχθροὺς Ἰσραὴλ
  english_pob_choice: the enemies of Israel
  chosen_spanish: a los enemigos de Israel
  alternatives_spanish:
  - contra los enemigos de Israel
  - los enemigos de Israel
  lexicon: LSJ
  rationale: La estructura acusativa del griego se expresa naturalmente con “a los enemigos de Israel”. Mantiene la relación de objeto directo del verbo “combatieron”.
- source_word: ἔστησαν αὐτῷ ἐλευθερίαν
  english_pob_choice: established freedom for them
  chosen_spanish: establecieron libertad para ellos
  alternatives_spanish:
  - aseguraron libertad para ellos
  - consiguieron libertad para ellos
  - establecieron libertad para él
  lexicon: LSJ
  rationale: La revisión inglesa reciente entiende el referente como plural en contexto, y el español puede reflejarlo claramente como Israel/nación. “Libertad” conserva ἐλευθερίαν; “para ellos” evita la ambigüedad del dativo singular griego sin borrar el sentido colectivo.
- source_word: κατέγραψαν
  english_pob_choice: recorded it
  chosen_spanish: la registraron
  alternatives_spanish:
  - la записaron
  - la inscribieron
  - la consignaron
  lexicon: LSJ
  rationale: El verbo implica inscribir o poner por escrito. “La registraron” funciona bien en español formal para un decreto con soporte escrito, y enlaza con las tablillas de bronce sin redundancia excesiva.
- source_word: ἐν δέλτοις χαλκαῖς
  english_pob_choice: on bronze tablets
  chosen_spanish: en tablillas de bronce
  alternatives_spanish:
  - sobre tablillas de bronce
  - en placas de bronce
  - sobre placas de bronce
  lexicon: LSJ
  rationale: “Tablillas” comunica el objeto de escritura; “de bronce” traduce el material. Se conserva el matiz documental del soporte inscrito.
- source_word: ἔθεντο ἐν στήλῃ
  english_pob_choice: set them on a pillar
  chosen_spanish: la colocaron en una columna
  alternatives_spanish:
  - la pusieron en una estela
  - la pusieron en un monumento
  - la colocaron en una estela
  lexicon: LSJ
  rationale: στήλη designa una estela o columna con inscripción. “Columna” es comprensible en español y mantiene el carácter monumental; el pronombre “la” se refiere naturalmente al registro/decreto.
- source_word: ἐν ὄρει Σιών
  english_pob_choice: on Mount Zion
  chosen_spanish: en el monte Sión
  alternatives_spanish:
  - sobre el monte Sión
  lexicon: LSJ
  rationale: La preposición con ὄρος/ὄρει admite en español “en el monte” como forma natural y reverente. “Sión” se conserva como topónimo bíblico estándar.
theological_decisions:
- issue: Referente colectivo de αὐτῷ / posible singular masculino en griego
  english_pob_reading: The English audit trail notes a tension between the literal masculine singular and the likely collective national referent; the latest revision prefers the plural in context.
  chosen_spanish_reading: “para ellos” en referencia a Israel como pueblo/nación
  alternative_spanish_readings:
  - “para él”
  - “para ello”
  rationale: El contexto inmediato menciona “los enemigos de Israel”, por lo que la libertad establecida es corporativa. El español puede resolver con claridad ese referente colectivo sin perder la base griega, que en el audit trail ya se reconoce como tensionada.
  doctrine_reference: Primacía del original con preservación de tensiones textuales; no borrar la referencia nacional implícita.
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión inglesa posterior, que suaviza la frase y prefiere un referente plural contextual para la libertad establecida. La versión española sigue esa adjudicación, pero conserva la literalidad suficiente del griego en la secuencia narrativa y en la nota sobre el referente colectivo.
  spanish_consistency_notes:
  - Se usó “Monte Sión”/“monte Sión” y no una forma litúrgica distinta, por ser el topónimo bíblico estándar en español.
  - Se prefirió “libertad” por correspondencia directa con ἐλευθερίαν, sin sustituirlo por “independencia”, porque el griego no obliga a ese matiz político más específico.
  - No se introdujo “Yahvé” porque el versículo no contiene el nombre divino.
  - El sintagma “casa de su padre” se conservó como calco idiomático transparente, coherente con el registro histórico-bíblico.
