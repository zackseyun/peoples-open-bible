translation:
  language: es
  text: Una sola ley y una sola ordenanza habrá para ustedes y para el residente extranjero[a] que reside con ustedes.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «forastero». El hebreo גֵּר se refiere a un no nativo que vive entre Israel bajo su orden comunitario.
    reason: lexical_alternative
lexical_decisions:
- source_word: תּוֹרָה
  english_pob_choice: law
  chosen_spanish: ley
  alternatives_spanish:
  - instrucción
  lexicon: HALOT
  rationale: En este contexto jurídico, תּוֹרָה designa una norma vinculante. «Ley» comunica bien el valor legal y funciona de forma natural junto con «estatuto». «Instrucción» es posible, pero resulta más general y menos precisa aquí.
- source_word: מִשְׁפָּט
  english_pob_choice: ordinance
  chosen_spanish: estatuto
  alternatives_spanish:
  - ordenanza
  - sentencia
  - regla
  lexicon: HALOT
  rationale: El término apunta a una disposición jurídica prescrita. «Estatuto» mantiene el sentido normativo y diferencia el segundo término del primero sin caer en «sentencia», que podría sugerir un veredicto judicial.
- source_word: אַחַת / אֶחָד
  english_pob_choice: one
  chosen_spanish: una / un
  alternatives_spanish:
  - el mismo
  - igual
  lexicon: HALOT
  rationale: La repetición del numeral subraya unidad y equivalencia de norma. Reproducir «una» y «un» conserva esa insistencia del hebreo de manera transparente.
- source_word: יִהְיֶה
  english_pob_choice: shall be
  chosen_spanish: habrá
  alternatives_spanish:
  - será
  - deberá haber
  lexicon: HALOT
  rationale: En una formulación legal española, «habrá» comunica adecuadamente la fuerza normativa del imperfecto. «Será» también sería posible, pero «habrá» suena más natural con el doble sujeto nominal.
- source_word: גֵּר
  english_pob_choice: sojourner
  chosen_spanish: forastero
  alternatives_spanish:
  - residente extranjero
  - extranjero
  - forastero residente
  lexicon: HALOT
  rationale: El hebreo גֵּר no es simplemente un visitante temporal; alude a un no nativo que vive dentro del orden comunitario de Israel. «Forastero» conserva la alteridad sin introducir connotaciones modernas demasiado técnicas. La nota mantiene abierta la alternativa lexical «residente extranjero» que el inglés POB documenta.
- source_word: הַגָּר
  english_pob_choice: who sojourns
  chosen_spanish: que reside
  alternatives_spanish:
  - que mora
  - que vive
  lexicon: HALOT
  rationale: El participio repite y desarrolla גֵּר. «Que reside» comunica la estancia estable y evita un calco artificial como «que forasterea». Aunque el inglés conserva el juego con «sojourns», en español el paralelismo se preserva mejor con un verbo natural.
- source_word: אִתְּכֶם
  english_pob_choice: with you
  chosen_spanish: con ustedes
  alternatives_spanish:
  - entre ustedes
  - junto a ustedes
  lexicon: HALOT
  rationale: La preposición significa literalmente «con ustedes». «Con ustedes» es la forma más directa y natural en español actual, y mantiene la cercanía relacional del hebreo.
theological_decisions:
- issue: Igualdad jurídica entre Israel y el extranjero residente
  english_pob_reading: The verse states that the same legal standard applies equally to Israel and to the resident sojourner among them.
  chosen_spanish_reading: El versículo afirma que una misma norma rige por igual para ustedes y para el forastero que vive con ustedes.
  alternative_spanish_readings:
  - El versículo podría entenderse más restringidamente como referido solo a las disposiciones inmediatas del contexto sacrificial.
  rationale: 'La formulación hebrea es amplia: «una sola ley y un solo estatuto». La traducción conserva esa amplitud sin extenderla más allá del pasaje concreto, manteniendo la tensión entre alcance general y contexto inmediato.'
  doctrine_reference: 'Principio de traducción POB: preservar la tensión teológica y jurídica sin resolverla artificialmente.'
translation_notes:
  revision_awareness: 'Coincide con la revisión más reciente del expediente fuente: sin cambios necesarios; acuerdo alto con el control cruzado.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» para el nombre divino solo cuando aparezca en el contexto; en este versículo no aparece.
  - «Ley» y «estatuto» preservan la pareja jurídica del hebreo y evitan homogeneizar ambos términos.
  - Se opta por un español sobrio y contemporáneo, sin introducir lenguaje litúrgico no atestiguado por la fuente.
