translation:
  language: es
  text: de los hijos de Hanunai y sus hijos[a], veinte hombres;
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'El griego conservado dice literalmente: «de los hijos de Hanunai y sus hijos, veinte hombres». El paralelo hebreo aproximado en Neh 8:19 nombra a Hasabías y Jesaías, de los hijos de Merari, con sus hermanos y sus hijos, veinte.'
    reason: alternative_reading
lexical_decisions:
- source_word: οἱ ἐκ τῶν υἱῶν Χανουναίου
  english_pob_choice: from the sons of Hanunai
  chosen_spanish: de los hijos de Hanunai
  alternatives_spanish:
  - de entre los hijos de Hanunai
  - procedentes de los hijos de Hanunai
  lexicon: LSJ
  rationale: La construcción griega οἱ ἐκ + genitivo expresa pertenencia/origen dentro de un grupo familiar. En español, «de los hijos de Hanunai» conserva esa relación genealógica sin añadir una perífrasis innecesaria. Se translitera el nombre propio, siguiendo la práctica del POB.
- source_word: οἱ υἱοὶ αὐτῶν
  english_pob_choice: their sons
  chosen_spanish: sus hijos
  alternatives_spanish:
  - y sus hijos
  - sus hijos de ellos
  lexicon: LSJ
  rationale: El posesivo plural αὐτῶν pide un plural posesivo en español. «Sus hijos» reproduce la relación directa del griego y evita armonizar con el paralelo hebreo aproximado, que presenta otra formulación.
- source_word: εἴκοσι ἄνδρες
  english_pob_choice: twenty men
  chosen_spanish: veinte hombres
  alternatives_spanish:
  - veinte varones
  - veinte personas
  lexicon: LSJ
  rationale: ἄνδρες en un conteo nominal masculino se rinde naturalmente por «hombres». «Veinte hombres» mantiene la precisión de género del griego y el tono de lista censal.
theological_decisions:
- issue: Divergencia griego-hebreo en la lista de personas
  english_pob_reading: 'The main text follows the extant Greek: ''from the sons of Hanunai and their sons, twenty men,'' with the approximate Hebrew parallel noted separately.'
  chosen_spanish_reading: 'El texto principal sigue el griego: «de los hijos de Hanunai y sus hijos, veinte hombres», dejando constancia de que el paralelo hebreo aproximado difiere.'
  alternative_spanish_readings:
  - 'Según el paralelo hebreo aproximado: «y Hashabías, con él Jesaías, de los hijos de Merari, sus hermanos y sus hijos, veinte»'
  rationale: En 1 Esdras la tradición griega es la fuente primaria, y aquí presenta una identificación de grupo distinta de la del paralelo hebreo. La traducción no debe armonizar ambas tradiciones en el cuerpo principal, porque eso borraría una tensión textual documentada y afectaría la identificación histórica del grupo.
  doctrine_reference: 'PHILOSOPHY.md: primacía de la fuente original; 1 Esdras paralelos MT/grec not harmonized in main text'
translation_notes:
  revision_awareness: 'Se siguió el último pase de revisión sin cambios: el texto griego fue mantenido como base primaria y la divergencia con el paralelo hebreo se preservó en nota, sin armonización.'
  spanish_consistency_notes:
  - Se usó «Hanunai» para el nombre propio conforme a la transliteración del inglés auditado y del griego Χανουναίου.
  - Se evitó «SEÑOR» o cualquier terminología no presente en el verso, ya que aquí no hay designación divina.
  - La puntuación sigue el estilo español y la nota está anclada en la frase relevante mediante [a].
