translation:
  language: es
  text: Y cuando muchas calamidades y angustias le sobrevengan[a], este cántico dará testimonio delante de él[b] como testigo, porque no será olvidado de boca de su descendencia; porque yo conozco su inclinación[c], lo que está haciendo hoy, antes de llevarlo a la tierra que juré[d].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «lo hallen» o «lo alcancen»; el hebreo puede expresar que estos males lo encuentran o lo sobrevienen.
    reason: lexical_alternative
  - marker: b
    text: O «contra él»; «delante de él» conserva el hebreo, pero en este contexto puede entenderse con fuerza adversativa, ya que el cántico funciona como testigo.
    reason: lexical_alternative
  - marker: c
    text: Hebreo «su inclinación» (o «su intención/imaginación»), refiriéndose a su disposición interior.
    reason: lexical_alternative
  - marker: d
    text: Hebreo simplemente «que juré»; «dar» se sobreentiende por el contexto y el lenguaje del pacto en pasajes paralelos.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהָיָה כִּי
  english_pob_choice: And when
  chosen_spanish: Y cuando
  alternatives_spanish:
  - Y acontecerá que cuando
  - Y será que cuando
  lexicon: HALOT
  rationale: La fórmula hebrea introduce un marco temporal futuro. «Y cuando» conserva la estructura sin volverla rígida en español.
- source_word: תִמְצֶאןָ אֹתוֹ
  english_pob_choice: come upon him
  chosen_spanish: le sobrevengan
  alternatives_spanish:
  - le lleguen
  - lo alcancen
  lexicon: HALOT
  rationale: Con eventos negativos como sujeto, el hebreo expresa que los males lo alcanzan o caen sobre él. «Le sobrevengan» mantiene esa fuerza adversativa de manera natural.
- source_word: רָעוֹת רַבּוֹת וְצָרוֹת
  english_pob_choice: many evils and troubles
  chosen_spanish: muchas calamidades y angustias
  alternatives_spanish:
  - muchos males y aflicciones
  - muchas desgracias y estrecheces
  lexicon: HALOT
  rationale: «רָעוֹת» aquí refiere a males/daños concretos, no a maldad moral abstracta. «Calamidades» y «angustias» transmiten bien el par intensivo en un registro bíblico claro.
- source_word: וְעָנְתָה
  english_pob_choice: will testify
  chosen_spanish: testificará
  alternatives_spanish:
  - responderá
  - dará testimonio
  lexicon: HALOT
  rationale: Aunque el verbo básico es «responder», el contexto forense del versículo pide la función de testimonio. «Testificará» recoge esa función sin perder el valor verbal.
- source_word: הַשִּׁירָה הַזֹּאת
  english_pob_choice: this song
  chosen_spanish: este cántico
  alternatives_spanish:
  - esta canción
  - este poema
  lexicon: HALOT
  rationale: «Cántico» es más acorde con el registro bíblico y litúrgico que «canción», sin desplazar el género poético del texto.
- source_word: לְפָנָיו
  english_pob_choice: before him
  chosen_spanish: delante de él
  alternatives_spanish:
  - ante él
  - en su presencia
  lexicon: HALOT
  rationale: La preposición conserva la imagen espacial del hebreo. «Delante de él» es transparente y no fuerza el sentido a «contra él» en el texto principal.
- source_word: לְעֵד
  english_pob_choice: as a witness
  chosen_spanish: como testigo
  alternatives_spanish:
  - como testimonio
  - para testimonio
  lexicon: HALOT
  rationale: El sustantivo designa la función probatoria del cántico. «Como testigo» mantiene la personificación del texto y su valor jurídico.
- source_word: לֹא תִשָּׁכַח מִפִּי זַרְעוֹ
  english_pob_choice: it will not be forgotten from the mouth of his offspring
  chosen_spanish: no se olvidará de la boca de su descendencia
  alternatives_spanish:
  - no saldrá de la boca de su descendencia
  - no será olvidado por la boca de su descendencia
  lexicon: HALOT
  rationale: La expresión hebrea preserva la recitación oral; en español, «de la boca de» mantiene esa imagen. «Descendencia» recoge el valor colectivo de זֶרַע.
- source_word: זַרְעוֹ
  english_pob_choice: his offspring
  chosen_spanish: su descendencia
  alternatives_spanish:
  - su linaje
  - su semilla
  lexicon: HALOT
  rationale: «Descendencia» es natural y abarca el plural colectivo implícito. Evita el tecnicismo o la literalidad extraña de «semilla».
- source_word: יָדַעְתִּי
  english_pob_choice: I know
  chosen_spanish: yo conozco
  alternatives_spanish:
  - yo sé
  - he conocido
  lexicon: HALOT
  rationale: El perfecto hebreo tiene fuerza presente. «Yo conozco» suena natural y conserva la afirmación actual de conocimiento divino.
- source_word: יִצְרוֹ
  english_pob_choice: his inclination
  chosen_spanish: su inclinación
  alternatives_spanish:
  - su tendencia
  - su intención
  - su impulso
  lexicon: HALOT
  rationale: «Inclicación» conserva la ambivalencia moral-volitiva del término hebreo sin reducirlo a una sola noción psicológica.
- source_word: אֲשֶׁר הוּא עֹשֶׂה הַיּוֹם
  english_pob_choice: what he is doing today
  chosen_spanish: lo que está haciendo hoy
  alternatives_spanish:
  - lo que hace hoy
  - lo que él está haciendo hoy
  lexicon: HALOT
  rationale: El participio sugiere una acción en curso. «Lo que está haciendo hoy» refleja bien el presente progresivo contextual.
- source_word: בְּטֶרֶם אֲבִיאֶנּוּ
  english_pob_choice: before I bring him
  chosen_spanish: antes de llevarlo
  alternatives_spanish:
  - antes de traerlo
  - antes de introducirlo
  lexicon: HALOT
  rationale: El verbo en español necesita completarse con el objeto de destino dado en la frase siguiente. «Llevarlo» funciona bien con la construcción final de la oración.
- source_word: אֶל הָאָרֶץ
  english_pob_choice: into the land
  chosen_spanish: a la tierra
  alternatives_spanish:
  - a la tierra prometida
  - hacia la tierra
  lexicon: HALOT
  rationale: «A la tierra» mantiene la referencia directa sin añadir una glosa no presente en el versículo. El movimiento ya está implicado por el verbo.
- source_word: אֲשֶׁר נִשְׁבָּעְתִּי
  english_pob_choice: that I swore
  chosen_spanish: que juré
  alternatives_spanish:
  - que he jurado
  - de la que juré
  lexicon: HALOT
  rationale: El hebreo termina simplemente con «que juré». «Juré» es directo y fiel al texto transmitido, sin completar lo que aquí no está explícito.
theological_decisions:
- issue: Función forense del cántico como testigo
  english_pob_reading: this song will testify before him as a witness
  chosen_spanish_reading: este cántico testificará delante de él como testigo
  alternative_spanish_readings:
  - este cántico responderá delante de él como testigo
  - este cántico dará testimonio contra él como testigo
  rationale: 'Se mantiene la imagen legal del texto: el cántico comparece como testigo. «Delante de él» conserva el hebreo; no se fuerza «contra él» en el texto principal, aunque el contexto lo sugiere.'
  doctrine_reference: Preservar la función evidencial del cántico sin resolver de antemano el matiz adversativo.
- issue: Sentido de יִצְרוֹ en el conocimiento divino
  english_pob_reading: his inclination
  chosen_spanish_reading: su inclinación
  alternative_spanish_readings:
  - su intención
  - su impulso
  - su imaginación
  rationale: El término hebreo apunta a la disposición interior, con posible matiz de inclinación moral. «Inclinación» conserva esa tensión sin tecnificarla ni psicologizarla en exceso.
  doctrine_reference: Mantener la tensión entre conocimiento divino y disposición humana, sin expandir el versículo más allá de su alcance.
translation_notes:
  revision_awareness: El texto español sigue la última revisión del audit trail al omitir cualquier añadido no presente en el hebreo final y al reflejar la función forense del verbo con «testificará». También conserva el final breve «que juré», sin expandirlo con «dar».
  spanish_consistency_notes:
  - Se usó «Yahvé» no porque aparezca explícitamente en este versículo, sino como norma del proyecto cuando corresponda; aquí no se necesita.
  - Se evitó «SEÑOR» y «Cristo» porque no pertenecen a este texto.
  - Se prefirió «cántico» sobre «canción» para coherencia bíblica y de registro.
  - Se mantuvo «descendencia» para זרע por su valor colectivo y continuidad oral.
