review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien el sentido general del hebreo y del POB inglés: mantiene la imagen corporal literal, la ubicación del monte respecto de Jerusalén, la partición del monte, el valle resultante y el movimiento de ambas mitades. Sin embargo, hay dos ajustes importantes: «se afirmarán» no reproduce tan fielmente וְעָמְדוּ como «estarán» o «se pondrán de pie», porque añade matiz de firmeza/afianzamiento no exigido por el verbo; y la nota [b] explica el resultado como si el monte se separara «para formar el valle», mientras el texto fuente dice más directamente que al partirse produce/queda un gran valle. El resto está sustancialmente alineado.'
  spanish_quality_summary: El español es claro y digno, pero «sus pies se afirmarán» suena menos natural y menos directo que «sus pies estarán». También conviene capitalizar el nombre geográfico establecido como «Monte de los Olivos» por ser topónimo. La sintaxis general es fluida y comprensible para lectura eclesial amplia.
  glossary_alignment: No hay conflictos con las pautas terminológicas mayores del proyecto en este versículo. La principal cuestión léxica es preferir una equivalencia más directa para וְעָמְדוּ. El topónimo se beneficia de la forma convencional «Monte de los Olivos». Las notas léxicas pueden conservarse con leve pulido.
  issues:
  - severity: medium
    issue: «se afirmarán» para וְעָמְדוּ
    rationale: El hebreo significa sencillamente «estarán / se pondrán de pie». «Afirmarse» introduce una noción de afianzarse o establecerse que no está explícita en el verbo y suena menos idiomática con «pies» en este contexto.
  - severity: low
    issue: 'Topónimo en minúscula: «monte de los Olivos»'
    rationale: Como nombre geográfico establecido, «Monte de los Olivos» es la forma más natural y reconocible en español bíblico.
  - severity: low
    issue: Nota [b] algo interpretativa en la cláusula final
    rationale: La explicación «separándose para formar el valle» es comprensible, pero puede ajustarse mejor al hebreo diciendo que el monte se divide/hiende y así queda un gran valle, sin sugerir una finalidad.
  revised_spanish_text: En aquel día sus pies estarán sobre el Monte de los Olivos[a], que está delante de Jerusalén, al oriente; y el Monte de los Olivos se partirá por la mitad, de oriente a occidente, en un valle muy grande[b], y la mitad del monte se moverá hacia el norte y la otra mitad hacia el sur.
  revised_footnotes:
