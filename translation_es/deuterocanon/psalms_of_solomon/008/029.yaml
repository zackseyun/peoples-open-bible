translation:
  language: es
  text: ¡Alabado sea el Señor, que juzga toda la tierra en su justicia[a]!
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «con su justicia».
    reason: lexical_alternative
lexical_decisions:
- source_word: αἰνετὸς
  english_pob_choice: Praised be
  chosen_spanish: ¡Alabado sea!
  alternatives_spanish:
  - ¡Sea alabado!
  - ¡Digno de alabanza es!
  lexicon: LSJ
  rationale: El adjetivo introduce una fórmula doxológica. En español, «¡Alabado sea!» conserva el valor de alabanza y suena natural en un registro bíblico digno. Se evita «bendito», porque en este verso el griego es αἰνετὸς (de alabar), no εὐλογητός (bendito).
- source_word: Κύριος
  english_pob_choice: the Lord
  chosen_spanish: el Señor
  alternatives_spanish:
  - el Señor Yahvé
  - Yahvé
  lexicon: LSJ
  rationale: El contexto griego usa Κύριος como título definido. En español, «el Señor» reproduce ese valor titular y mantiene la correspondencia litúrgica y textual establecida por el inglés auditado.
- source_word: ὁ κρίνων
  english_pob_choice: who judges
  chosen_spanish: que juzga
  alternatives_spanish:
  - el que juzga
  - quien juzga
  lexicon: LSJ
  rationale: El participio articular se expresa con naturalidad en español mediante una subordinada relativa. «Que juzga» es fluido y conserva el presente durativo/gnómico del griego.
- source_word: πᾶσαν τὴν γῆν
  english_pob_choice: the whole earth
  chosen_spanish: toda la tierra
  alternatives_spanish:
  - toda la tierra habitada
  - el mundo entero
  lexicon: LSJ
  rationale: γῆ puede referirse a tierra/tierra habitada/terra. Aquí la opción más directa y fiel al griego es «toda la tierra», que conserva el alcance universal sin introducir una paráfrasis excesiva.
- source_word: ἐν δικαιοσύνῃ αὐτοῦ
  english_pob_choice: in his righteousness
  chosen_spanish: con su justicia
  alternatives_spanish:
  - en su justicia
  - en su rectitud
  lexicon: LSJ
  rationale: El sintagma indica la esfera o modo del juicio divino. En español, «con su justicia» comunica bien el matiz instrumental/modal y evita una construcción demasiado rígida. Se mantiene «justicia» como equivalencia primaria de δικαιοσύνη, con «rectitud» como alternativa posible.
theological_decisions:
- issue: Relación entre δικαιοσύνη y justicia/rectitud
  english_pob_reading: 'in his righteousness; footnote: Or “in his justice.”'
  chosen_spanish_reading: con su justicia
  alternative_spanish_readings:
  - en su justicia
  - con su rectitud
  rationale: El audit trail inglés preserva la ambigüedad entre righteousness y justice. En español, «justicia» mantiene el peso judicial y moral del término; «rectitud» sería posible, pero menos natural en este contexto de juicio universal. La preposición «con» refleja el modo del juicio sin perder la idea de conformidad con el carácter justo de Dios.
  doctrine_reference: Divine justice / righteousness
- issue: Fórmula doxológica inicial
  english_pob_reading: Praised be the Lord
  chosen_spanish_reading: ¡Alabado sea el Señor!
  alternative_spanish_readings:
  - ¡Sea alabado el Señor!
  - ¡Bendito sea el Señor!
  rationale: La revisión inglesa corrigió «Blessed is» a «Praised be», por la diferencia lexical entre αἰνετὸς y εὐλογητός. En español, se conserva esa distinción con «alabado», no con «bendito», para reflejar la alabanza explícita del griego.
  doctrine_reference: Doxology / praise vocabulary
translation_notes:
  revision_awareness: El inglés auditado pasó de «Blessed is» a «Praised be the Lord» tras una revisión lexical, corrigiendo el valor de αἰνετὸς. La versión española sigue esa corrección y evita «bendito», manteniendo la distinción entre alabanza y bendición. También se evitó una calca rígida de «in his righteousness»; se optó por una formulación natural en español que sigue el sentido modal del griego.
  spanish_consistency_notes:
  - Se usa «el Señor» para Κύριος, coherente con el título definido del texto fuente.
  - Se usa «justicia» para δικαιοσύνη, manteniendo la alternativa «rectitud» en nota por la ambigüedad reconocida por el POB.
  - «Tierra» conserva el alcance universal de πᾶσαν τὴν γῆν sin introducir una glosa interpretativa.
