translation:
  language: es
  text: Y yo cortaré el carro de Efraín y el caballo de Jerusalén, y el arco de guerra será cortado; él proclamará paz a las naciones, y su dominio será de mar a mar, y desde el Río[a] hasta los confines de la tierra.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «El Río» probablemente se refiere al Éufrates.
    reason: cultural_note
lexical_decisions:
- source_word: וְהִכְרַתִּי
  english_pob_choice: And I will cut off
  chosen_spanish: Y yo cortaré
  alternatives_spanish:
  - Y yo eliminaré
  - Y yo quitaré
  lexicon: HALOT
  rationale: הכרית en hiphil conserva la imagen concreta de cortar/eliminar. «Cortaré» mantiene esa fuerza verbal y el tono profético sin explicar el medio de la acción.
- source_word: רֶכֶב
  english_pob_choice: the chariot
  chosen_spanish: el carro
  alternatives_spanish:
  - el carro de guerra
  - la caballería
  lexicon: HALOT
  rationale: En español, «carro» transmite de forma natural el vehículo bélico antiguo; «carro de guerra» sería más explícito, pero el hebreo usa el singular con valor colectivo, que aquí conviene no expandir innecesariamente.
- source_word: מֵאֶפְרַיִם
  english_pob_choice: from Ephraim
  chosen_spanish: de Efraín
  alternatives_spanish:
  - desde Efraín
  - de la tribu de Efraín
  lexicon: HALOT
  rationale: Se conserva el referente geográfico-político de Efraín sin añadir aclaraciones que el texto no da. «De» funciona bien en español para expresar procedencia o eliminación «de» un ámbito.
- source_word: וְסוּס מִירוּשָׁלִַם
  english_pob_choice: and the horse from Jerusalem
  chosen_spanish: y el caballo de Jerusalén
  alternatives_spanish:
  - y los caballos de Jerusalén
  - y el corcel de Jerusalén
  lexicon: HALOT
  rationale: Se mantiene el singular del hebreo, con posible fuerza colectiva. «Caballo» refleja el paralelismo con «carro» y evita sobreinterpretar pluralidad donde el texto no la marca.
- source_word: וְנִכְרְתָה
  english_pob_choice: will be cut off
  chosen_spanish: será cortado
  alternatives_spanish:
  - será eliminado
  - será quitado
  lexicon: HALOT
  rationale: La pasiva reproduce el mismo lexema que en la primera cláusula y conserva la repetición enfática del hebreo.
- source_word: קֶשֶׁת מִלְחָמָה
  english_pob_choice: the battle bow
  chosen_spanish: el arco de guerra
  alternatives_spanish:
  - el arco de batalla
  - el arco guerrero
  lexicon: HALOT
  rationale: «Arco de guerra» comunica el constructo hebreo como un arco destinado al combate. Se evita una paráfrasis más libre para preservar la imagen militar.
- source_word: וְדִבֶּר
  english_pob_choice: and he will speak
  chosen_spanish: y él hablará
  alternatives_spanish:
  - y él proclamará
  - y él declarará
  lexicon: HALOT
  rationale: «Hablará» es el equivalente directo y permite que el complemento «paz» complete el sentido sin forzar un verbo más interpretativo.
- source_word: שָׁלוֹם
  english_pob_choice: peace
  chosen_spanish: paz
  alternatives_spanish:
  - bienestar
  - plenitud
  lexicon: HALOT
  rationale: «Paz» es la equivalencia más natural y fiel en español para el valor amplio de שָׁלוֹם en este contexto real-mesiánico.
- source_word: לַגּוֹיִם
  english_pob_choice: to the nations
  chosen_spanish: a las naciones
  alternatives_spanish:
  - a los pueblos
  - a las gentes
  lexicon: HALOT
  rationale: Se mantiene el horizonte universal del hebreo. «Naciones» evita restringir el alcance a una referencia étnica posterior más técnica.
- source_word: וּמָשְׁלוֹ
  english_pob_choice: and his dominion will be
  chosen_spanish: y su dominio será
  alternatives_spanish:
  - y su señorío será
  - y gobernará
  lexicon: HALOT
  rationale: El sustantivo con sufijo pronominal pide un nombre («dominio») y no un verbo. «Dominio» sigue la revisión inglesa más formal y suena natural en registro bíblico.
- source_word: מִיָּם עַד יָם
  english_pob_choice: from sea to sea
  chosen_spanish: de mar a mar[a]
  alternatives_spanish:
  - de un mar a otro
  - de costa a costa
  lexicon: HALOT
  rationale: Se conserva el modismo bíblico de alcance universal. La nota aclara la posible lectura alternativa del miembro hebreo en relación con el dominio del rey.
- source_word: וּמִנָּהָר
  english_pob_choice: and from the River
  chosen_spanish: y desde el Río[b]
  alternatives_spanish:
  - y desde el río
  - y desde el Eufrates
  lexicon: HALOT
  rationale: «El Río» preserva la fórmula bíblica convencional que probablemente alude al Éufrates. Se capitaliza para señalar que funciona como designación conocida, no como cualquier curso de agua.
- source_word: עַד אַפְסֵי אָרֶץ
  english_pob_choice: to the ends of the earth
  chosen_spanish: hasta los confines de la tierra
  alternatives_spanish:
  - hasta los extremos de la tierra
  - hasta las últimas tierras
  lexicon: HALOT
  rationale: «Confines de la tierra» reproduce el hebraísmo de alcance máximo con dignidad literaria y sin perder claridad para el lector moderno.
theological_decisions:
- issue: Referente del sujeto singular en «él hablará paz» y del posesivo en «su dominio»
  english_pob_reading: The verse refers to the coming king of the preceding context, rendered with personal pronouns 'he' and 'his.'
  chosen_spanish_reading: El texto se traduce con «él» y «su» para conservar la referencia personal al rey anunciado en el contexto inmediato.
  alternative_spanish_readings:
  - hablará paz a las naciones, y el dominio será...
  - se hablará paz a las naciones, y el dominio será...
  rationale: El hebreo pasa de la primera persona divina a una tercera persona singular, lo que favorece una referencia personal al rey del contexto previo. Mantener pronombres personales preserva la tensión mesiánico-real sin resolverla por anticipado.
  doctrine_reference: Preservar la tensión teológica sin armonizarla de más
- issue: Alcance universal del reinado expresado por los modismos geográficos
  english_pob_reading: Universal scope is retained in the geographic idioms without reduction to merely local Israelite rule.
  chosen_spanish_reading: Se conserva el alcance universal de «de mar a mar» y «desde el Río hasta los confines de la tierra» sin reducirlo a un dominio meramente local.
  alternative_spanish_readings:
  - un dominio solo regional
  - una expansión hiperbólica sin alcance real
  rationale: Los dos miembros geográficos presentan una extensión deliberadamente amplia. La traducción mantiene esa amplitud y deja el modo exacto de cumplimiento a la interpretación.
  doctrine_reference: Preservar la amplitud profética del reinado
translation_notes:
  revision_awareness: La revisión inglesa más reciente sustituyó «his rule» por «his dominion» para un tono más natural y formal. La versión española sigue esa decisión con «su dominio», y mantiene intactos los demás elementos del versículo conforme al texto hebreo y al audit trail inglés.
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando aparezca el nombre divino explícito; aquí no aparece.
  - Se mantiene «dominio» para la regla real, en línea con la revisión inglesa y la preferencia por un sustantivo formal.
  - Se conserva el singular hebreo («carro», «caballo», «arco») sin pluralizar por estilística moderna.
  - Se evita «gentiles» porque גויים en este contexto conserva mejor el valor de «naciones» en sentido amplio.
