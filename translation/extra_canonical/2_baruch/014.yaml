translation:
  text: '1 Then I answered and said[a], “Behold, you have shown me the course of the times, and what is to happen after these things, and you have told me of the retribution that is to come.


    2 Yet I said in my thoughts, ‘Many are those who have sinned and have lived, and only a few will remain in those times to whom these words may be spoken.


    3 For what profit is there in this, or what is worse than these things which we have seen, that we should desire to expect to see?’


    4 But I will speak before you: What more have those gained who knew you and did not walk in vanity like the rest,


    5 who did not seek the dead, but desired you, and did not turn their hearts to what is small and passing,


    6 and for whom the labor of good was sought, and for whom the prophets were found?


    7 Or who is there, O Lord, that knows what is not known to you? Or who can search out your way?


    8 Or who can learn your judgment, or comprehend your counsel which cannot be grasped?


    9 Or who among mortals can trace the beginning and the end of your wisdom?


    10 For we have all become like a breath.


    11 For as a breath rises without intention and vanishes, so is the nature of men: they go not by their own will, and they do not know what will happen to them in the end.


    12 But the righteous may rightly hope for the end, and they depart from this dwelling without fear, because they have with you a store of works kept in treasuries.


    13 Therefore they leave this world without fear, and, trusting in gladness[b][c][d][e][f][g], wait to receive the world that you promised them …'
  philosophy: optimal-equivalence
