translation:
  language: es
  text: 'Pero el ángel le dijo[a]: «¿No recuerdas las palabras que tu padre te mandó acerca de tomar una esposa de tu propio linaje? Y ahora, escúchame, hermano, porque ella será tu esposa, y no hagas caso del demonio, pues esta noche ella te será dada como esposa».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «no le des importancia al demonio». La expresión griega dice literalmente: «no tengas palabra/cuenta alguna respecto del demonio».'
    reason: lexical_alternative
lexical_decisions:
- source_word: μέμνησαι
  english_pob_choice: do you not remember
  chosen_spanish: ¿No recuerdas
  alternatives_spanish:
  - ¿No has recordado
  - ¿No te acuerdas
  lexicon: BDAG
  rationale: La forma griega tiene fuerza de presente con matiz de estado recordado; en español, la pregunta natural y fiel es «¿No recuerdas?», sin volverla un perfecto pesado.
- source_word: λόγων
  english_pob_choice: words
  chosen_spanish: palabras
  alternatives_spanish:
  - cosas dichas
  - instrucciones
  lexicon: BDAG
  rationale: «Palabras» conserva la cercanía al sustantivo griego λόγων y sigue siendo natural en español.
- source_word: ἐνετείλατό
  english_pob_choice: commanded
  chosen_spanish: mandó
  alternatives_spanish:
  - ordenó
  - encargó
  lexicon: BDAG
  rationale: En este contexto, el padre da una instrucción con autoridad. «Mandó» comunica bien la fuerza imperativa sin sonar excesivamente técnico.
- source_word: ὑπὲρ τοῦ λαβεῖν σε γυναῖκα
  english_pob_choice: about taking a wife
  chosen_spanish: acerca de tomar una esposa
  alternatives_spanish:
  - sobre tomar esposa
  - respecto de casarte
  lexicon: BDAG
  rationale: La construcción expresa el asunto del mandato del padre. «Tomar una esposa» preserva el giro del texto y la formulación marital explícita.
- source_word: ἐκ τοῦ γένους σου
  english_pob_choice: from your own kin
  chosen_spanish: de tu propio linaje
  alternatives_spanish:
  - de tu propia parentela
  - de tu propio pueblo
  lexicon: BDAG
  rationale: γένος aquí señala el grupo familiar o de parentesco. «Linaje» mantiene la referencia genealógica sin restringirla indebidamente a una sola categoría social.
- source_word: ἄκουσόν μου
  english_pob_choice: listen to me
  chosen_spanish: escúchame
  alternatives_spanish:
  - oye
  - pon atención a mí
  lexicon: BDAG
  rationale: El imperativo pide atención a lo que sigue. «Escúchame» es la forma más natural y directa en español.
- source_word: ἀδελφέ
  english_pob_choice: brother
  chosen_spanish: hermano
  alternatives_spanish:
  - mi hermano
  - amigo
  lexicon: BDAG
  rationale: El vocativo significa literalmente «hermano» y funciona como trato cercano; se conserva ese valor sin sustituirlo por un término más general.
- source_word: σοὶ ἔσται εἰς γυναῖκα
  english_pob_choice: she will be your wife
  chosen_spanish: ella será tu esposa
  alternatives_spanish:
  - ella llegará a ser tu esposa
  - será para ti como esposa
  lexicon: BDAG
  rationale: La expresión idiomática indica resultado matrimonial. «Será tu esposa» transmite de manera idiomática y clara la fuerza del griego.
- source_word: τοῦ δαιμονίου μηδένα λόγον ἔχε
  english_pob_choice: pay no attention to the demon
  chosen_spanish: no hagas caso del demonio
  alternatives_spanish:
  - no prestes atención al demonio
  - no te preocupes por el demonio
  lexicon: BDAG
  rationale: El griego dice literalmente algo como «no tengas ninguna consideración/palabra respecto del demonio». En español, «no hagas caso» recoge bien la idea de no atenderle ni darle peso.
- source_word: δαιμονίου
  english_pob_choice: demon
  chosen_spanish: demonio
  alternatives_spanish:
  - espíritu maligno
  lexicon: BDAG
  rationale: El término griego nombra explícitamente un demonio; «demonio» preserva la transparencia léxica que el POB inglés también mantuvo.
- source_word: τὴν νύκτα ταύτην
  english_pob_choice: tonight
  chosen_spanish: esta noche
  alternatives_spanish:
  - esta misma noche
  - la noche de hoy
  lexicon: BDAG
  rationale: La frase temporal se expresa de forma natural en español como «esta noche».
- source_word: δοθήσεταί σοι αὕτη εἰς γυναῖκα
  english_pob_choice: she will be given to you as a wife
  chosen_spanish: ella te será dada como esposa
  alternatives_spanish:
  - te será entregada como esposa
  - ella será dada a ti como esposa
  lexicon: BDAG
  rationale: Se conserva la pasiva explícita del griego («será dada») y la fórmula matrimonial. La colocación «te será dada» es clara y fiel en español.
theological_decisions:
- issue: Lenguaje matrimonial y de parentesco
  english_pob_reading: The verse is translated with explicit marital language ('taking a wife,' 'your wife,' 'given to you as a wife') and kinship language ('from your own kin') without softening the arranged-marriage framework.
  chosen_spanish_reading: Se mantiene el lenguaje matrimonial explícito («tomar una esposa», «tu esposa», «te será dada como esposa») y el de parentesco («de tu propio linaje») sin suavizar el marco de matrimonio arreglado.
  alternative_spanish_readings:
  - Usar simplemente «casarte» y «pariente»
  - Atenuar la fórmula pasiva matrimonial
  rationale: El griego insiste en las fórmulas de esposa y parentesco. Conservarlas evita borrar el marco social del pasaje y sigue de cerca la transparencia del POB inglés.
  doctrine_reference: Translation philosophy §§1, 5, 6
- issue: Referencia al peligro sobrenatural
  english_pob_reading: δαιμόνιον is rendered 'demon' in the main text.
  chosen_spanish_reading: δαιμόνιον se traduce como «demonio» en el texto principal.
  alternative_spanish_readings:
  - espíritu malo
  - espíritu maligno
  rationale: El texto griego nombra explícitamente al ser como δαιμόνιον; «demonio» es preciso y mantiene la especificidad léxica y teológica.
  doctrine_reference: Translation philosophy §§1, 5
translation_notes:
  revision_awareness: Se corrigió la validación anterior anclando explícitamente la nota [a] en el texto español y manteniendo una sola nota con marcador único presente en la traducción.
  spanish_consistency_notes:
  - Se usó «Yahvé» solo cuando corresponda a textos con el nombre divino; en este versículo no aparece.
  - «demonio» se mantuvo para δαιμόνιον por transparencia léxica.
  - «esposa» se eligió para γυναῖκα en el marco matrimonial explícito del pasaje, coherente con el español bíblico moderno y la formulación del POB inglés.
  - Se conservó la pasiva «te será dada» para reflejar δοθήσεταί σοι sin convertirla en voz activa.
