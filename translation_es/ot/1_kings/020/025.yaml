translation:
  language: es
  text: Y tú, numera para ti un ejército como el ejército que perdiste[a], y caballo por caballo y carro por carro; entonces luchemos contra ellos en la llanura[b]. Ciertamente[c] seremos más fuertes que ellos.” Y él escuchó su consejo y así lo hizo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «que cayó de ti»; probablemente significa «que perdiste», es decir, tropas perdidas en batalla.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «en terreno llano». Los consejeros suponen que Aram tendrá mejor ventaja en la llanura que en las colinas.'
    reason: cultural_note
  - marker: c
    text: La expresión «Ciertamente» traduce un modismo hebreo (literalmente, «si no») usado como afirmación enfática.
    reason: lexical_alternative
lexical_decisions:
- source_word: תִמְנֶה
  english_pob_choice: number
  chosen_spanish: numera
  alternatives_spanish:
  - cuenta
  - muestra
  - convoca
  lexicon: HALOT
  rationale: En este contexto militar, el verbo implica contar/organizar fuerzas para la campaña; "numera" conserva la idea de contabilizar y disponer tropas sin introducir una paráfrasis más libre.
- source_word: חַיִל
  english_pob_choice: army
  chosen_spanish: ejército
  alternatives_spanish:
  - fuerza
  - tropas
  lexicon: HALOT
  rationale: Aquí חַיִל se refiere a fuerza militar. "Ejército" es el equivalente natural y claro en español para este contexto.
- source_word: כַּחַיִל הַנֹּפֵל מֵאוֹתָךְ
  english_pob_choice: like the army that fell from you
  chosen_spanish: como el ejército que cayó de ti
  alternatives_spanish:
  - como la fuerza que perdiste
  - como el ejército que se te cayó de las manos
  lexicon: HALOT
  rationale: Conservar "cayó de ti" mantiene la imagen hebrea de pérdida/caída desde las filas. En español puede sonar más vívido que una explicación explícita, y el contexto militar aclara el sentido de tropas perdidas.
- source_word: וְסוּס כַּסּוּס
  english_pob_choice: horse for horse
  chosen_spanish: caballo por caballo
  alternatives_spanish:
  - caballos por caballos
  - caballo como caballo
  lexicon: HALOT
  rationale: La construcción distributiva singular se expresa de forma natural en español con "caballo por caballo", indicando reemplazo uno a uno.
- source_word: וְרֶכֶב כָּרֶכֶב
  english_pob_choice: chariot for chariot
  chosen_spanish: carro por carro
  alternatives_spanish:
  - carros por carros
  - carro como carro
  lexicon: HALOT
  rationale: Se conserva la misma estructura distributiva que en el hebreo. "Carro" es la traducción usual y clara para רֶכֶב en este contexto bélico.
- source_word: וְנִלָּחֲמָה אוֹתָם
  english_pob_choice: then let us fight against them
  chosen_spanish: entonces pelearemos contra ellos
  alternatives_spanish:
  - entonces luchemos contra ellos
  - y pelearemos con ellos
  lexicon: HALOT
  rationale: El cohortativo expresa una propuesta de acción. "Pelearemos contra ellos" mantiene el valor exhortativo sin forzar un imperativo que el español no exige aquí.
- source_word: בַּמִּישׁוֹר
  english_pob_choice: on the plain
  chosen_spanish: en la llanura
  alternatives_spanish:
  - sobre la llanura
  - en terreno llano
  - en la planicie
  lexicon: HALOT
  rationale: מִישׁוֹר indica terreno llano o llanura. "Llanura" comunica bien la ventaja táctica que los consejeros asumen frente al terreno montañoso.
- source_word: אִם לֹא
  english_pob_choice: Surely
  chosen_spanish: Ciertamente
  alternatives_spanish:
  - seguramente
  - sin duda
  - si no
  lexicon: HALOT
  rationale: En este uso enfático, la expresión funciona como afirmación fuerte, no como condición. "Ciertamente" reproduce ese valor idiomático en español.
- source_word: נֶחֱזַק מֵהֶם
  english_pob_choice: we will be stronger than they are
  chosen_spanish: seremos más fuertes que ellos
  alternatives_spanish:
  - prevaleceremos sobre ellos
  - seremos más fuertes que ellos mismos
  lexicon: HALOT
  rationale: El verbo חזק comparativo expresa fuerza superior. "Más fuertes que ellos" conserva la comparación directa y el sentido militar del hebreo.
- source_word: וַיִּשְׁמַע לְקֹלָם
  english_pob_choice: So he listened to their voice
  chosen_spanish: Y él escuchó su voz
  alternatives_spanish:
  - Y atendió a su consejo
  - Y les hizo caso
  lexicon: HALOT
  rationale: La frase hebrea es literalmente "escuchó su voz". Se mantiene esa transparencia formal, dejando implícito que aceptó su consejo.
- source_word: וַיַּעַשׂ כֵּן
  english_pob_choice: and did so
  chosen_spanish: y lo hizo así
  alternatives_spanish:
  - y actuó así
  - y así lo hizo
  lexicon: HALOT
  rationale: Es una fórmula breve de cumplimiento. "Lo hizo así" mantiene la concisión y el tono narrativo del hebreo.
theological_decisions:
- issue: La fuerza de אִם לֹא como afirmación enfática
  english_pob_reading: Surely we will be stronger than they are
  chosen_spanish_reading: Ciertamente seremos más fuertes que ellos
  alternative_spanish_readings:
  - Sin duda seremos más fuertes que ellos
  - Si no, seremos más fuertes que ellos
  rationale: No se traduce como condicional, porque en este contexto funciona como un giro idiomático de fuerte seguridad. La opción afirmativa evita oscurecer la intención retórica del texto.
  doctrine_reference: Hermenéutica del discurso bíblico; énfasis idiomático en hebreo
translation_notes:
  revision_awareness: El audit trail inglés fue revisado desde 'muster' a 'number'; por eso la opción española conserva el valor de contar/organizar tropas con «numera», evitando una traducción más interpretativa. También se conservó la lectura enfática de אִם לֹא como afirmación fuerte, y la escena final sigue el resumen narrativo breve del hebreo.
  spanish_consistency_notes:
  - Se usa «Yahvé» para el nombre divino en este proyecto cuando aparece; este versículo no lo contiene.
  - «Carro» traduce רֶכֶב en sentido militar, coherente con el uso del POB en contextos bélicos.
  - Se mantiene la distinción entre la llanura y el terreno montañoso implícita en la nota, sin introducir información ajena al texto.
