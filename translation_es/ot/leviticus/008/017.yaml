review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien el sentido básico del hebreo: el toro, sus partes listadas, la quema fuera del campamento y la cláusula final de conformidad con el mandato de Yahvé a Moisés. También mantiene correctamente ''Yahvé'' para יְהוָה. Sin embargo, hay un problema de anclaje de nota: la nota [b] explica פִּרְשׁוֹ (''su estiércol/excremento''), pero en el texto está colocada sobre ''con fuego'', no sobre ''su estiércol''.'
  spanish_quality_summary: 'El español es claro, natural y de registro bíblico digno. ''Pero el toro, junto con su piel, su carne y su estiércol...'' fluye bien. ''Lo quemó con fuego'' es aceptable, aunque algo literal; no requiere cambio. La reparación necesaria es técnica y de legibilidad editorial: mover la marca de nota al término correcto para evitar confusión.'
  glossary_alignment: 'Buena alineación con la terminología del proyecto: יְהוָה → ''Yahvé''; בָּשָׂר → ''carne''; מִחוּץ לַמַּחֲנֶה → ''fuera del campamento''. La decisión ''toro'' para הַפָּר es defendible. ''Piel'' para עֹרוֹ es buena en español; la nota alternativa ''O "su piel"'' en [a] resulta redundante frente al texto principal y al inglés, donde la alternativa era ''its skin'' porque el texto principal tenía ''hide''. En español conviene invertir: texto principal ''su cuero'' con nota ''O "su piel"'', o más sencillamente eliminar la nota. Dado que el registro ya incluye la nota, la opción más fiel al expediente auditado es usar ''su cuero[a]'' y conservar la alternativa ''su piel''.'
  issues:
  - severity: medium
    issue: La nota [b] está anclada en 'con fuego' pero explica 'su estiércol'.
    rationale: La nota lexical alternativa corresponde a פִּרְשׁוֹ, no a שָׂרַף בָּאֵשׁ. El anclaje actual induce a error y no cumple la disciplina de notas requerida.
  - severity: low
    issue: La nota [a] es redundante con el texto principal actual.
    rationale: Si el texto dice 'su piel', una nota que diga 'O "su piel"' no aporta alternativa real. El expediente inglés preserva una alternativa entre 'hide' y 'skin'; en español eso se puede reflejar mejor con 'su cuero[a]' y nota 'O "su piel"'.
  revised_spanish_text: Pero el toro, junto con su cuero[a], su carne y su estiércol[b], lo quemó con fuego fuera del campamento, tal como Yahvé había mandado a Moisés.
  revised_footnotes:
