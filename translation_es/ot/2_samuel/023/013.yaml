translation:
  language: es
  text: Entonces treinta de los treinta hombres principales[a] bajaron y vinieron en tiempo de cosecha[b] a David, a la cueva de Adulam, mientras una tropa[c] de los filisteos estaba acampada en el Valle de Refaim.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «treinta de los treinta, jefe»; la expresión es difícil. Puede significar «treinta de los hombres principales» o, más específicamente, referirse a miembros de «los Treinta», los guerreros de élite de David.'
    reason: alternative_reading
  - marker: b
    text: 'O: «durante la cosecha».'
    reason: lexical_alternative
  - marker: c
    text: Hebreo חַיַּת פְּלִשְׁתִּים, literalmente «ser viviente/animal de los filisteos»; aquí se usa idiomáticamente para una tropa o destacamento militar.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֵּרְדוּ
  english_pob_choice: went down
  chosen_spanish: bajaron
  alternatives_spanish:
  - descendieron
  - fueron hacia abajo
  lexicon: HALOT
  rationale: El verbo ירד expresa descenso; en español, «bajaron» conserva el movimiento direccional con naturalidad narrativa.
- source_word: שְׁלֹשִׁים
  english_pob_choice: thirty
  chosen_spanish: treinta
  alternatives_spanish:
  - los treinta
  lexicon: HALOT
  rationale: Es el numeral básico y no requiere expansión en el texto principal.
- source_word: מֵהַשְּׁלֹשִׁים רֹאשׁ
  english_pob_choice: of the thirty chief men
  chosen_spanish: de entre los treinta jefes
  alternatives_spanish:
  - de los treinta principales
  - de entre los Treinta, jefes
  lexicon: HALOT
  rationale: La construcción hebrea es comprimida y difícil. «De entre los treinta jefes» preserva la idea de pertenencia al grupo y de rango principal, sin forzar una decisión más específica que el texto no exige.
- source_word: וַיָּבֹאוּ
  english_pob_choice: came
  chosen_spanish: llegaron
  alternatives_spanish:
  - vinieron
  - vinieron y llegaron
  lexicon: HALOT
  rationale: Con destino señalado por אֶל, «llegaron» comunica bien el arribo al lugar sin añadir información ajena.
- source_word: אֶל קָצִיר
  english_pob_choice: at harvest time
  chosen_spanish: en tiempo de cosecha
  alternatives_spanish:
  - durante la cosecha
  - al tiempo de la cosecha
  lexicon: HALOT
  rationale: La expresión es temporal; «en tiempo de cosecha» es claro y mantiene el valor idiomático.
- source_word: אֶל דָּוִד
  english_pob_choice: to David
  chosen_spanish: a David
  alternatives_spanish:
  - hacia David
  lexicon: HALOT
  rationale: La preposición direccional se conserva de forma simple y natural.
- source_word: אֶל מְעָרַת עֲדֻלָּם
  english_pob_choice: to the cave of Adullam
  chosen_spanish: a la cueva de Adulam
  alternatives_spanish:
  - a la cueva de Adulam
  - a la cueva en Adulam
  lexicon: HALOT
  rationale: El sintagma constructo se rinde directamente como nombre del lugar; se mantiene la forma reconocible en español.
- source_word: חַיַּת פְּלִשְׁתִּים
  english_pob_choice: a band of the Philistines
  chosen_spanish: una banda de los filisteos
  alternatives_spanish:
  - un destacamento de los filisteos
  - una tropa de los filisteos
  lexicon: HALOT
  rationale: Aunque el hebreo literalmente puede aludir a «animal/ser viviente», el contexto militar apoya un sentido colectivo. «Banda» reproduce la idea de grupo armado sin perder la rareza semántica que el audit trail ya reconoce.
- source_word: חֹנָה
  english_pob_choice: was camped
  chosen_spanish: estaba acampada
  alternatives_spanish:
  - estaba acampado
  - estaba acampada allí
  lexicon: HALOT
  rationale: El participio indica acción continua de acampar; «estaba acampada» reproduce bien el estado y el aspecto progresivo en español.
- source_word: בְּעֵמֶק רְפָאִים
  english_pob_choice: in the Valley of Rephaim
  chosen_spanish: en el Valle de Refaim
  alternatives_spanish:
  - en el valle de Refaim
  lexicon: HALOT
  rationale: Se conserva el topónimo transliterado y se capitaliza «Valle» como parte del nombre propio reconocido.
translation_notes:
  revision_awareness: 'Se siguió el audit trail inglés sin cambios textuales posteriores: la lectura sigue siendo la misma en la revisión más reciente, y no se documentaron revisiones aplicadas. La redacción española mantiene la ambigüedad de la expresión hebrea sobre «los treinta» y conserva la nota sobre el sentido militar idiomático de חַיַּת פְּלִשְׁתִּים.'
  spanish_consistency_notes:
  - Se usó «Yahvé» como forma estándar del proyecto solo cuando aparece el nombre divino; aquí no aplica.
  - Se prefirió «filisteos» en minúscula por ser etnónimo común; el nombre propio geográfico se mantuvo como «Valle de Refaim».
  - Se evitó añadir verbos como «salieron a encontrar» porque el hebreo solo dice que llegaron a David y a la cueva.
  - La puntuación sigue el orden narrativo y mantiene la pausa temporal introducida por la cláusula de cosecha.
