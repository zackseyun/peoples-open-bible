translation:
  language: es
  text: Y el resto de los hechos de Josafat[a], y su valentía que mostró, y cómo combatió, ¿no están escritos en el libro de las Crónicas de los reyes de Judá?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, «y sus hechos poderosos que hizo». El hebreo une «su valentía» con «que mostró», un modismo que expresa fuerza o hazañas valerosas manifestadas en acción.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְיֶתֶר
  english_pob_choice: Now the rest of
  chosen_spanish: Ahora, el resto de
  alternatives_spanish:
  - Y el resto de
  - El resto de
  lexicon: HALOT
  rationale: En esta fórmula historiográfica, יֶתֶר expresa lo restante o lo demás. «Ahora» funciona como marcador discursivo natural en español y conserva el tono de transición del relato sin añadir contenido.
- source_word: דִּבְרֵי
  english_pob_choice: acts
  chosen_spanish: hechos
  alternatives_spanish:
  - acciones
  - cosas
  - deeds
  lexicon: HALOT
  rationale: Aunque literalmente puede ser «palabras» o «asuntos», en esta fórmula real se refiere a los actos o hechos del rey. «Hechos» mantiene el sentido histórico y resulta natural en español.
- source_word: יְהוֹשָׁפָט
  english_pob_choice: Jehoshaphat
  chosen_spanish: Josafat
  alternatives_spanish:
  - Jehosafat
  - Jehoshafat
  lexicon: convención onomástica
  rationale: Se usa la forma castellana tradicionalmente reconocible «Josafat», que identifica claramente al rey sin perder fidelidad al nombre propio hebreo.
- source_word: וּגְבוּרָתוֹ
  english_pob_choice: and his might
  chosen_spanish: y su poder
  alternatives_spanish:
  - y su valentía
  - y su fuerza
  - y sus hechos valerosos
  lexicon: HALOT
  rationale: גְּבוּרָה puede abarcar fuerza, valor o hazañas valerosas. «Poder» conserva la idea de capacidad demostrada y permite un español fluido; se mantiene la tensión semántica con la cláusula siguiente.
- source_word: אֲשֶׁר עָשָׂה
  english_pob_choice: that he showed
  chosen_spanish: que mostró
  alternatives_spanish:
  - que hizo
  - que desplegó
  - que realizó
  lexicon: HALOT
  rationale: El hebreo literalmente dice «que hizo», pero en esta combinación idiomática se refiere a la manera en que su poder quedó manifiesto. «Mostró» sigue de cerca la revisión inglesa y expresa bien la manifestación pública de esa fuerza.
- source_word: וַאֲשֶׁר נִלְחָם
  english_pob_choice: and how he fought
  chosen_spanish: y cómo peleó
  alternatives_spanish:
  - y que peleó
  - y las guerras que libró
  - y cómo guerreó
  lexicon: HALOT
  rationale: נִלְחָם significa luchar o pelear. «Cómo peleó» conserva el valor narrativo del hebreo y es más natural que una paráfrasis mayor como «las guerras que libró», que añade explícitamente un sustantivo no presente.
- source_word: הֲלֹא הֵם כְּתוּבִים
  english_pob_choice: are they not written
  chosen_spanish: ¿no están escritos?
  alternatives_spanish:
  - ¿acaso no están escritos?
  - ¿no se hallan escritos?
  lexicon: HALOT
  rationale: Se conserva la pregunta retórica de la fórmula de referencia documental. El español permite omitir el sujeto explícito sin perder claridad; el sentido de validación por escrito queda intacto.
- source_word: עַל סֵפֶר דִּבְרֵי הַיָּמִים
  english_pob_choice: in the Book of the Chronicles
  chosen_spanish: en el Libro de las Crónicas
  alternatives_spanish:
  - en el libro de los anales
  - en el libro de los hechos de los días
  lexicon: HALOT
  rationale: La expresión funciona como título de fuente histórica. «Libro de las Crónicas» reproduce bien el nombre convencional del registro, sin calcar de manera extraña la estructura hebrea.
- source_word: לְמַלְכֵי יְהוּדָה
  english_pob_choice: of the Kings of Judah
  chosen_spanish: de los reyes de Judá
  alternatives_spanish:
  - para los reyes de Judá
  - perteneciente a los reyes de Judá
  lexicon: HALOT
  rationale: Aquí ל funciona como marcador genitivo en el título. «De los reyes de Judá» es la forma española natural y fiel para esa relación posesiva/titular.
theological_decisions:
- issue: Fórmula de remisión a una fuente histórica real
  english_pob_reading: are they not written in the Book of the Chronicles of the Kings of Judah?
  chosen_spanish_reading: ¿no están escritos en el Libro de las Crónicas de los reyes de Judá?
  alternative_spanish_readings:
  - ¿no se hallan escritos en el Libro de las Crónicas de los reyes de Judá?
  - ¿acaso no están escritos en el Libro de las Crónicas de los reyes de Judá?
  rationale: No hay cuestión doctrinal especial, pero sí una fórmula de autoridad documental. Se preserva la pregunta retórica y la referencia a una fuente histórica como garantía de veracidad narrativa.
  doctrine_reference: N/A
translation_notes:
  revision_awareness: La versión inglesa auditada fue revisada de «displayed» a «showed» para reflejar con mayor cercanía el hebreo. La propuesta española sigue esa revisión con «mostró», manteniendo el registro formal y la idiomaticidad del modismo hebreo en torno a גְּבוּרָה + אֲשֶׁר עָשָׂה.
  spanish_consistency_notes:
  - Se mantiene «Judá» como nombre geográfico y dinástico estándar.
  - Se usa «Libro de las Crónicas» como título establecido de la fuente histórica, coherente con el audit trail en inglés.
  - Se preserva la nota lexical sobre גְּבוּרָה para no borrar la tensión entre «poder/might» y «hechos valerosos».
