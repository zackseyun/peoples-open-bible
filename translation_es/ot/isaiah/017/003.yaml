    rationale: Esto rompe la disciplina de notas exigida y desorienta al lector. El marcador debe aparecer junto a «gloria» o la frase relevante.
  - severity: medium
    issue: La segunda cláusula «y el reino de Damasco» queda demasiado elíptica en español.
    rationale: Aunque refleja la elipsis hebrea, en español conviene repetir o completar el verbo para una lectura clara sin añadir significado indebido.
  - severity: medium
    issue: «Será» no refleja el plural hebreo יִהְיוּ.
    rationale: Aunque «remanente» puede tratarse colectivamente en singular en español, el hebreo usa plural y el inglés auditado también. «Serán» preserva mejor la forma fuente.
