- from: para que el corazón se derrita y los tropiezos[a] sean muchos. A todas sus puertas he puesto el fulgor de la espada. ¡Ah! Está hecha para relámpago[b], afilada para la matanza.
  to: para que el corazón se derrita y los tropiezos[a] sean muchos. A todas sus puertas he puesto el fulgor de la espada. ¡Ah! Está hecha para centellear, desenvainada[b] para la matanza.
  rationale: Se corrige la línea final para que el español sea idiomático y siga mejor la decisión principal documentada por la POB inglesa. «Hecha para centellear» transmite la imagen de brillo/relámpago de la espada sin un calco extraño, y «desenvainada para la matanza» restaura la opción principal auditada para la frase difícil final, dejando las otras posibilidades en nota. También se ajusta la nota [a] para reflejar con más precisión la alternativa verbal preservada en inglés.
