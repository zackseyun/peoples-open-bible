id: JAS.1.13
reference: James 1:13
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: 'μηδεὶς πειραζόμενος λεγέτω ὅτι Ἀπὸ θεοῦ πειράζομαι· ὁ γὰρ θεὸς ἀπείραστός ἐστιν κακῶν, πειράζει δὲ αὐτὸς οὐδένα.'
base_translation:
  language: en
  yaml_path: translation/nt/james/001/013.yaml
  text: 'Let no one who is being tempted say[a], “I am being tempted by God,” for God is untemptable by evil, and he himself tempts no one.'
translation:
  language: ko
  text: '유혹을 받는 자는 누구도 「내가 하나님께 유혹을 받는다」고 말하지 마십시오[a]. 하나님은 악에 유혹받지 않으시고, 친히 어느 누구도 유혹하지 않으시기 때문입니다.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: '1:2의 πειρασμός가 외부에서 닥치는 「시험」을 뜻한 반면, 여기서는 내부에서 일어나는 「유혹」을 가리킨다. 같은 헬라어가 문맥에 따라 의미를 달리하므로 한국어도 「유혹」으로 구별하여 옮긴다.'
    reason: lexical_alternative
lexical_decisions:
- source_word: 'πειράζομαι'
  english_pob_choice: 'being tempted'
  chosen_korean: '유혹을 받는'
  alternatives_korean:
  - '시험을 받는'
  lexicon: BDAG
  rationale: '1:2의 외적 시련과 달리 여기서는 죄로 끌어가는 내적 유혹이다. 14절의 ἐπιθυμία(욕망) 분석이 이를 확증한다.'
theological_decisions:
- issue: 'πειρασμός/πειράζω의 문맥적 의미 분리'
  chosen_reading: '유혹 (1:13–14) vs. 시험 (1:2, 1:12)'
  alternative_readings:
  - '동일하게 「시험」으로 통일'
  rationale: '동일 어근이라도 1:2-12의 외적 시련과 1:13-14의 내적 유혹은 야고보가 의도적으로 구분한 두 의미이다. 한국어에서 한 단어로 통일하면 「하나님은 시험하지 않으신다」가 1:2와 모순처럼 읽히므로, 「유혹」으로 구별하여 본문의 신학적 정합성을 보존한다.'
  doctrine_reference: 'DOCTRINE.md: Lexical fidelity; preserve authorial distinction'
