theological_decisions:
- issue: Relation of wealth, suffering, and divine recompense in a difficult Hebrew clause
  chosen_reading: 'The verse states a wisdom observation: a person may become rich through affliction, and that outcome is his due recompense.'
  alternative_readings:
  - There is one who grows rich by self-denial, and this is his allotted reward.
  - There is one who grows rich from toil, and this is his wage.
  rationale: The Hebrew is terse and somewhat awkward, especially in יְחַיֵּב שְׂכָרוֹ. The Greek parallel broadens the sense toward labor/poverty and divine ability to enrich suddenly. The chosen rendering preserves the Hebrew witness as primary while expressing the likely sense of recompense without importing a stronger doctrine of merit than the text itself states.
  doctrine_reference: Preserve theological tension rather than resolve it; original-language primacy over translation tradition.
