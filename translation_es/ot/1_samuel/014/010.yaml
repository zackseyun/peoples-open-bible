translation:
  language: es
  text: Pero si ellos dicen esto[a], «Suban hacia nosotros», entonces subiremos, porque Yahvé los ha entregado en nuestra mano[b], y esta será la señal para nosotros.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Suban contra nosotros». El hebreo puede enfatizar el acercamiento a la posición de los filisteos; el contexto militar también puede implicar fuerza hostil.'
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: «en nuestra mano», un modismo que significa «en nuestro poder» o «bajo nuestro control».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְאִם
  english_pob_choice: But if
  chosen_spanish: Pero si
  alternatives_spanish:
  - Y si
  - Pero en caso de que
  lexicon: HALOT
  rationale: En español, ‘Pero si’ conserva el contraste discursivo con la opción anterior del contexto y mantiene la fuerza condicional sin sonar artificial.
- source_word: כֹה
  english_pob_choice: this
  chosen_spanish: esto
  alternatives_spanish:
  - así
  - de esta manera
  lexicon: HALOT
  rationale: El demostrativo introduce el contenido de la respuesta de forma natural en español y preserva el valor deíctico del hebreo.
- source_word: יֹאמְרוּ
  english_pob_choice: they say
  chosen_spanish: dicen
  alternatives_spanish:
  - dirán
  lexicon: HALOT
  rationale: En una cláusula condicional con discurso directo, el presente ‘dicen’ resulta natural en español y refleja bien la forma verbal con sentido prospectivo.
- source_word: עֲלוּ עָלֵינוּ
  english_pob_choice: Come up to us
  chosen_spanish: Sube contra nosotros
  alternatives_spanish:
  - Suban hacia nosotros
  - Sube hacia nosotros
  lexicon: HALOT
  rationale: La secuencia verbal admite un matiz hostil en contexto militar; ‘contra nosotros’ conserva esa posible tensión que el inglés POB dejó como alternativa documentada.
- source_word: וְעָלִינוּ
  english_pob_choice: then we will go up
  chosen_spanish: entonces subiremos
  alternatives_spanish:
  - y subiremos
  - subiremos
  lexicon: HALOT
  rationale: ‘Entonces’ expresa la consecuencia lógica del signo, como en el inglés auditado, y ‘subiremos’ sigue de cerca el valor verbal del hebreo.
- source_word: כִּי
  english_pob_choice: for
  chosen_spanish: porque
  alternatives_spanish:
  - pues
  - ya que
  lexicon: HALOT
  rationale: En español, ‘porque’ introduce de modo claro la razón confiada que da Jonatán; conserva el carácter explicativo del ‘for’ inglés.
- source_word: נְתָנָם
  english_pob_choice: has given them
  chosen_spanish: los ha entregado
  alternatives_spanish:
  - los ha dado
  - los entregará
  lexicon: HALOT
  rationale: ‘Entregar’ comunica mejor en español la idea de poner a alguien en poder de otro. Mantiene la imagen hebrea de נתן sin suavizarla.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahveh
  lexicon: HALOT
  rationale: Se sigue la convención POB en español para el Nombre divino, preservando el Tetragrámaton con una transliteración directa y no una sustitución litúrgica.
- source_word: בְּיָדֵנוּ
  english_pob_choice: into our hand
  chosen_spanish: en nuestra mano
  alternatives_spanish:
  - en nuestras manos
  - en nuestro poder
  lexicon: HALOT
  rationale: Se conserva la imagen idiomática singular del hebreo (‘mano’) para no borrar su fuerza figurativa; en español sigue siendo comprensible.
- source_word: וְזֶה לָּנוּ הָאוֹת
  english_pob_choice: and this will be the sign for us
  chosen_spanish: y esto será la señal para nosotros
  alternatives_spanish:
  - y esta será la señal para nosotros
  - y esta es nuestra señal
  lexicon: HALOT
  rationale: ‘Señal’ es el equivalente directo y ‘para nosotros’ refleja לָנוּ sin convertir la frase en posesión estricta; ‘será’ mantiene el valor prospectivo.
theological_decisions:
- issue: Tratamiento del Nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahveh
  rationale: El texto hebreo usa directamente el Tetragrámaton. En la tradición editorial POB se translitera el Nombre en lugar de enmascararlo como ‘SEÑOR’; en español, ‘Yahvé’ es la forma adoptada para mantener esa decisión.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
translation_notes:
  revision_awareness: Se corrigió la validación anterior anclando ambos marcadores de nota directamente en el texto español con [a] y [b], y se mantuvieron las decisiones léxicas y teológicas alineadas con el audit trail inglés y el hebreo.
  spanish_consistency_notes:
  - Se mantiene ‘Yahvé’ como forma del Nombre divino, consistente con el estándar POB en español.
  - Se conserva la imagen singular ‘mano’ para בְּיָדֵנוּ, evitando una neutralización prematura.
  - ‘Señal’ traduce הָאוֹת con claridad y sin sobreinterpretar el referente.
  - La estructura condicional conserva el orden lógico del hebreo y del inglés auditado.
