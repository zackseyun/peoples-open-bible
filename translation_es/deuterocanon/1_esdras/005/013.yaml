lexical_decisions:
- source_word: υἱοὶ
  english_pob_choice: the sons of
  chosen_spanish: los hijos de
  alternatives_spanish:
  - hijos de
  lexicon: LSJ
  rationale: En esta lista censal, υἱοὶ introduce un grupo familiar o clánico; «los hijos de» conserva la fórmula genealógica natural en español y sigue de cerca el valor del griego.
- source_word: Βηβαί
  english_pob_choice: Bebai
  chosen_spanish: Bebai
  alternatives_spanish:
  - Bebái
  lexicon: LSJ
  rationale: Nombre propio transliterado desde la forma griega Βηβαί. Se mantiene «Bebai» para corresponder al audit trail inglés y a la grafía bíblica usual en español moderno cuando el nombre aparece sin adaptación tradicional establecida.
- source_word: ἑξακόσιοι τριάκοντα τρεῖς
  english_pob_choice: six hundred thirty-three
  chosen_spanish: seiscientos treinta y tres
  alternatives_spanish:
  - seiscientos y treinta y tres
  lexicon: LSJ
  rationale: Número cardinal rendido en español moderno y claro, sin añadir una conjunción que el griego no exige.
- source_word: Ἀργαί
  english_pob_choice: Argai
  chosen_spanish: Argai
  alternatives_spanish:
  - Arai
  - Azgad
  lexicon: LSJ
  rationale: El texto griego primario lee Ἀργαί, por lo que la traducción sigue esa lectura directamente. Se preserva la forma transliterada «Argai», mientras que «Azgad» pertenece al paralelo masorético aproximado y no gobierna esta base textual.
- source_word: χίλιοι τριακόσιοι εἴκοσι δύο
  english_pob_choice: one thousand three hundred twenty-two
  chosen_spanish: mil trescientos veintidós
  alternatives_spanish:
  - mil trescientos y veintidós
  lexicon: LSJ
  rationale: Número cardinal traducido con la sintaxis normal del español contemporáneo, manteniendo exactamente el total del griego.
translation_notes:
  revision_awareness: Se corrige el fallo anterior anclando la nota [a] en el propio texto traducido junto a «Argai». No se introducen notas sin marca y se mantiene la prioridad del griego como fuente primaria.
  spanish_consistency_notes:
  - Se usa «los hijos de» para conservar la fórmula genealógica de lista.
  - Se mantiene la transliteración «Argai» en lugar de sustituirla por la forma del paralelo masorético, porque el texto base griego es la fuente primaria.
  - Los números se escriben con palabras, en estilo bíblico legible para español moderno.
