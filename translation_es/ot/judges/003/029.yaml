revisions:
- from: En aquel tiempo hirieron a Moab[a], como a diez mil hombres, todos robustos[b] y todos hombres de valor[c]; no escapó ni un hombre.
  to: Y en aquel tiempo derribaron a unos diez mil hombres de Moab[a], todo hombre robusto[b] y todo hombre de valor[c]; no escapó ni un hombre.
  rationale: La revisión alinea el español con la decisión auditada del POB de explicitar que el objeto son hombres moabitas, fortalece el verbo principal para concordar con el desenlace letal del versículo, mejora la naturalidad de la aproximación numérica en español y corrige la sintaxis distributiva y la nota con anglicismo.
