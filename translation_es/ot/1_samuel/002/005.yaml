base_translation:
  language: en
  yaml_path: translation/ot/1_samuel/002/005.yaml
  text: Those who were full have hired themselves out for bread[a], but those who were hungry have ceased. Even the barren woman has borne seven[c][b], but she who had many sons has withered away.
  footnotes:
  - marker: a
    text: Or, 'have ceased'—the Hebrew leaves the object unstated; the sense is that the hungry no longer hunger or no longer lack.
    reason: lexical_alternative
  - marker: b
    text: '''Seven'' may function as a literal number or as a poetic number of fullness/completeness.'
    reason: cultural_note
  - marker: c
    text: Hebrew 'sons'; some translations generalize to 'children.'
    reason: lexical_alternative
