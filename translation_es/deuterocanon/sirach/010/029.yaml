translation:
  language: es
  text: ¿Quién declarará justo al que se condena a sí mismo[a], y quién honrará al que se deshonra a sí mismo?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Testimonio griego: «Un pobre es honrado por su conocimiento, y un rico es honrado por su riqueza». El hebreo y el griego preservan aquí dichos sustancialmente diferentes.'
    reason: alternative_reading
lexical_decisions:
- source_word: מַרְשִׁיעַ
  english_pob_choice: condemns
  chosen_spanish: se condena
  alternatives_spanish:
  - se declara culpable
  - se hace culpable
  lexicon: HALOT
  rationale: 'El hebreo hifil de רשע tiene valor forense: declarar culpable o condenar. En español, «se condena» conserva ese matiz judicial y permite el sentido reflexivo que el contexto pide con נַפְשׁוֹ.'
- source_word: נַפְשׁוֹ
  english_pob_choice: himself
  chosen_spanish: a sí mismo
  alternatives_spanish:
  - su alma
  - su vida
  - a sí propio
  lexicon: HALOT
  rationale: נפש puede ser alma, vida o self. Aquí el paralelo reflexivo exige un giro natural en español; «a sí mismo» evita espiritualizar indebidamente y mantiene la idea de actuar contra uno mismo.
- source_word: יַצְדִיקֶנּוּ
  english_pob_choice: declare righteous
  chosen_spanish: declarará justo
  alternatives_spanish:
  - justificará
  - vindicará
  lexicon: HALOT
  rationale: El hifil de צדק es forense. «Declarará justo» expresa con claridad la decisión judicial sin cargar el verbo con un peso doctrinal posterior que «justificar» puede activar en español.
- source_word: יְכַבֵּד
  english_pob_choice: honor
  chosen_spanish: honrará
  alternatives_spanish:
  - glorificará
  - estimará
  lexicon: HALOT
  rationale: כבד en piel significa honrar. «Honrará» reproduce bien el paralelo con el primer hemistiquio y es la forma más natural y digna en español.
- source_word: מַקְלֶה
  english_pob_choice: dishonors
  chosen_spanish: se deshonra
  alternatives_spanish:
  - se desprecia
  - se envilece
  - se menosprecia
  lexicon: HALOT
  rationale: La idea es hacer ligero, rebajar o deshonrar. «Se deshonra» mantiene la antítesis con «honrará» y conserva el valor relacional del verbo en este contexto sapiencial.
theological_decisions:
- issue: Divergencia fuerte entre el hebreo y el testimonio griego
  english_pob_reading: The English POB follows the Hebrew and preserves the Greek as an alternative witness in a footnote.
  chosen_spanish_reading: El texto principal sigue el hebreo disponible y añade una nota con la tradición griega como dicho sustancialmente distinto.
  alternative_spanish_readings:
  - «Pobre es honrado por su conocimiento, y rico es honrado por su riqueza.»
  rationale: La política del proyecto da prioridad al hebreo cuando está conservado en Sirácides. Dado que aquí el griego ofrece un proverbio claramente diferente, no se armoniza ni se mezcla con el hebreo; se preserva como tradición alternativa documentada.
  doctrine_reference: 'PHILOSOPHY.md: traducir desde el hebreo donde Sirácides se conserva; usar el paralelo griego como testimonio real y mantener honestamente la incertidumbre.'
translation_notes:
  revision_awareness: No hay revisiones aplicadas en el expediente; la propuesta sigue el hebreo como testimonio primario y conserva la divergencia con el griego en nota.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma del proyecto, pero este versículo no contiene el nombre divino.
  - Se evita «justificar» para no cargar innecesariamente el verso con una resonancia doctrinal posterior; «declarar justo» conserva el matiz forense.
  - El reflexivo «a sí mismo» traduce mejor נַפְשׁוֹ que una versión literal como «su alma».
