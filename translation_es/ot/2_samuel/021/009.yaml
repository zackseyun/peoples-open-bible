revisions:
- from: Lo entregó en manos de los gabaonitas[a], y ellos los colgaron en el monte delante de Yahvé; y los siete cayeron juntos. Fueron muertos en los primeros días de la siega, al comienzo de la siega de cebada.
  to: Los entregó en manos de los gabaonitas[a], y ellos los colgaron en el monte delante de Yahvé, y los siete cayeron juntos. Fueron ejecutados en los primeros días de la siega, al comienzo de la siega de cebada.
  rationale: Se corrige el error grave de concordancia pronominal ('Lo' -> 'Los') para ajustarse al objeto plural del hebreo. Se sustituye 'Fueron muertos' por 'Fueron ejecutados' para reflejar mejor el pasivo causativo/judicial de הֻמְתוּ en español natural y claro. También se suaviza la puntuación para una lectura narrativa más fluida, manteniendo la nota léxica del verbo יקע.
