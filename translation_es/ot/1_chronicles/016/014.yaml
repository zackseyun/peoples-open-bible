translation:
  language: es
  text: Él es Yahvé nuestro Dios[b][a]; sus juicios están en toda la tierra.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «por todo el país», si אֶרֶץ se entiende en un sentido más localizado; aquí se prefiere «tierra» porque el contexto destaca el alcance universal del gobierno de Yahvé.
    reason: lexical_alternative
  - marker: b
    text: El nombre divino en hebreo es YHWH, tradicionalmente vertido como «el SEÑOR».
    reason: alternative_reading
lexical_decisions:
- source_word: הוּא
  english_pob_choice: He is
  chosen_spanish: Él es
  alternatives_spanish:
  - Él
  lexicon: HALOT
  rationale: El pronombre independiente hebreo es enfático y sostiene una cláusula nominal. En español, "Él es" conserva esa fuerza enfática de manera natural.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  - el SEÑOR
  lexicon: HALOT
  rationale: 'Se sigue la convención del proyecto para el Nombre divino: transliterar el Tetragrámaton como "Yahvé" en lugar de sustituirlo por un título.'
- source_word: אֱלֹהֵינוּ
  english_pob_choice: our God
  chosen_spanish: nuestro Dios
  alternatives_spanish:
  - nuestros dioses
  lexicon: HALOT
  rationale: Aunque la forma hebrea tiene morfología plural, aquí refiere al Dios único de Israel; en español, "nuestro Dios" comunica correctamente ese referente singular.
- source_word: בְּכָל הָאָרֶץ
  english_pob_choice: in all the earth
  chosen_spanish: en toda la tierra
  alternatives_spanish:
  - en toda la tierra
  - en toda la tierra/país
  lexicon: HALOT
  rationale: La POB inglesa opta por el alcance universal de "earth". En español, "tierra" mantiene ese sentido amplio y resulta más idiomático que una perífrasis más técnica.
- source_word: מִשְׁפָּטָיו
  english_pob_choice: his judgments
  chosen_spanish: sus juicios
  alternatives_spanish:
  - su justicia
  - sus decretos
  - sus sentencias
  lexicon: HALOT
  rationale: '"Juicios" conserva el valor léxico de מִשְׁפָּט sin estrecharlo a solo "justicia" abstracta ni a "decretos". Además, mantiene el tono solemne del contexto.'
theological_decisions:
- issue: Rendering of the divine name יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Jehová
  - el SEÑOR
  rationale: El texto hebreo emplea directamente el Nombre divino. La traducción española adopta "Yahvé" para preservar el nombre propio revelado, en línea con la política del proyecto.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Scope of הָאָרֶץ
  english_pob_reading: earth
  chosen_spanish_reading: tierra
  alternative_spanish_readings:
  - país
  - territorio
  rationale: El contexto de alabanza celebra el gobierno universal de Yahvé; "tierra" conserva en español el alcance global que la POB inglesa prefirió con "earth".
  doctrine_reference: DOCTRINE.md Translation philosophy §1, §5
translation_notes:
  revision_awareness: La revisión más reciente indica que no hubo cambios sustanciales y que el veredicto de control cruzado fue de alta concordancia; por eso la presente propuesta sigue de cerca el sentido del original hebreo y la auditoría inglesa sin introducir ajustes innecesarios.
  spanish_consistency_notes:
  - Se mantiene "Yahvé" como forma estándar para YHWH.
  - Se usa "Dios" en singular para אֱלֹהֵינוּ conforme al referente contextual.
  - '"Juicios" preserva la polisemia legal/judicial de מִשְׁפָּט.'
  - '"Tierra" mantiene el alcance amplio de אֶרֶץ sin forzar una lectura territorial restringida.'
