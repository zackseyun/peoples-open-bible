translation:
  language: es
  text: Y he aquí, un hombre anciano venía de su trabajo en el campo al atardecer. El hombre era de la región montañosa de Efraín[a], y residía en Guibeá[b], pero los hombres del lugar eran benjaminitas.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, más literalmente, 'el hombre era del monte de Efraín'.
    reason: lexical_alternative
  - marker: b
    text: El verbo hebreo para 'residía' también puede significar 'vivía' o 'residía como forastero', lo que sugiere que habitaba en Guibeá aunque no era originario de allí.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהִנֵּה
  english_pob_choice: And behold
  chosen_spanish: Y he aquí
  alternatives_spanish:
  - Y mira
  - Ahora bien, he aquí
  lexicon: HALOT
  rationale: Conserva la partícula narrativa deíctica que introduce un giro relevante en la escena; 'he aquí' mantiene el énfasis sin omitirlo.
- source_word: אִישׁ זָקֵן
  english_pob_choice: an old man
  chosen_spanish: un hombre anciano
  alternatives_spanish:
  - un anciano
  - un hombre de edad avanzada
  lexicon: HALOT
  rationale: Respeta la combinación sustantivo + adjetivo y su referencia a la edad sin añadir matices inexistentes en el hebreo.
- source_word: בָּא
  english_pob_choice: was coming in
  chosen_spanish: venía
  alternatives_spanish:
  - venía llegando
  - llegaba
  lexicon: HALOT
  rationale: En contexto narrativo, el imperfectivo español expresa mejor el movimiento en curso; no se fuerza un perfecto simple que cerraría demasiado la escena.
- source_word: מִן מַעֲשֵׂהוּ
  english_pob_choice: from his work
  chosen_spanish: de su trabajo
  alternatives_spanish:
  - de su labor
  - de su tarea
  lexicon: HALOT
  rationale: מַעֲשֶׂה puede abarcar trabajo o labor; 'trabajo' es natural en español y conserva el sentido ocupacional.
- source_word: מִן הַשָּׂדֶה
  english_pob_choice: in the field
  chosen_spanish: en el campo
  alternatives_spanish:
  - del campo
  lexicon: HALOT
  rationale: La combinación española 'de su trabajo en el campo' reproduce con fluidez la relación espacial del hebreo y evita una repetición torpe de 'de'.
- source_word: בָּעֶרֶב
  english_pob_choice: at evening
  chosen_spanish: al atardecer
  alternatives_spanish:
  - por la tarde
  - al anochecer
  lexicon: HALOT
  rationale: '''At evening'' se entiende bien como referencia temporal; ''al atardecer'' es una equivalencia digna y natural en español bíblico contemporáneo.'
- source_word: וְהָאִישׁ מֵהַר אֶפְרַיִם
  english_pob_choice: The man was from the hill country of Ephraim
  chosen_spanish: El hombre era del país montañoso de Efraín
  alternatives_spanish:
  - El hombre era del monte de Efraín
  - El hombre era de la región montañosa de Efraín
  lexicon: HALOT
  rationale: La expresión geográfica הַר אֶפְרַיִם suele equivaler a 'hill country of Ephraim'; 'país montañoso' comunica el referente territorial con naturalidad en español.
- source_word: וְהוּא גָר בַּגִּבְעָה
  english_pob_choice: and he was staying in Gibeah
  chosen_spanish: y estaba residiendo en Gabaa
  alternatives_spanish:
  - y vivía en Gabaa
  - y moraba en Gabaa
  lexicon: HALOT
  rationale: גָּר puede implicar residir o sojornar; 'estaba residiendo' preserva la idea de residencia sin borrar la posible condición de no originario del lugar. 'Gabaa' sigue la forma toponímica española del lugar.
- source_word: וְאַנְשֵׁי הַמָּקוֹם
  english_pob_choice: but the men of the place
  chosen_spanish: pero los hombres del lugar
  alternatives_spanish:
  - y los hombres del lugar
  - pero los habitantes del lugar
  lexicon: HALOT
  rationale: Se conserva la referencia al colectivo local y el matiz contrastivo que el contexto exige frente al forastero/residente mencionado antes.
- source_word: בְּנֵי יְמִינִי
  english_pob_choice: were Benjaminites
  chosen_spanish: eran benjaminitas
  alternatives_spanish:
  - eran hijos de Benjamín
  - pertenecían a Benjamín
  lexicon: HALOT
  rationale: La forma gentílica en español transmite con claridad la adscripción tribal; 'benjaminitas' corresponde a 'Benjaminites' y evita una paráfrasis más larga.
theological_decisions:
- issue: Cómo reflejar la fórmula narrativa introductoria sin banalizarla
  english_pob_reading: And behold
  chosen_spanish_reading: Y he aquí
  alternative_spanish_readings:
  - Y mira
  - Ahora bien, he aquí
  rationale: 'No hay una carga doctrinal especial, pero sí una función narrativa importante: marca una nueva presencia en la escena. ''He aquí'' conserva ese relieve discursivo mejor que omitir la partícula.'
  doctrine_reference: Narrativa bíblica / discurso hebreo
- issue: Matiz de גָּר en relación con la residencia de un forastero
  english_pob_reading: was staying in Gibeah
  chosen_spanish_reading: estaba residiendo en Gabaa
  alternative_spanish_readings:
  - estaba viviendo en Gabaa
  - estaba alojándose en Gabaa
  rationale: El texto sugiere que el hombre no era originario de allí, aunque sí habitaba en el lugar. 'Estaba residiendo' mantiene esa tensión mejor que 'vivía', que podría sonar demasiado estable.
  doctrine_reference: Ninguna; matiz léxico-histórico
- issue: Relación entre origen geográfico y pertenencia tribal al final del verso
  english_pob_reading: but the men of the place were Benjaminites
  chosen_spanish_reading: pero los hombres del lugar eran benjaminitas
  alternative_spanish_readings:
  - y los hombres del lugar eran benjaminitas
  - pero los hombres del lugar pertenecían a Benjamín
  rationale: La frase final contrasta la condición geográfica del hombre con la identidad tribal de los locales. 'Benjaminitas' preserva la identificación étnico-tribal sin añadir explicaciones que el hebreo no da.
  doctrine_reference: Identidad tribal en Israel
translation_notes:
  revision_awareness: Se mantuvo el sentido y la estructura del texto fuente con equivalencia óptima; no se detectaron revisiones aplicadas en el tramo inglés de referencia, y la lectura española conserva la tensión léxica de 'גור' y la formulación geográfica de 'הַר אֶפְרַיִם'.
  spanish_consistency_notes:
  - Se usa 'Y he aquí' para preservar la marcación narrativa hebrea.
  - Se emplea 'Gabaa' como topónimo bíblico estándar en español, coherente con el contexto de Jueces.
  - Se evita 'SEÑOR' u otras sustituciones teológicas porque no aparecen en este versículo.
  - Se mantiene 'benjaminitas' como gentilicio tribal, no como paráfrasis explicativa.
