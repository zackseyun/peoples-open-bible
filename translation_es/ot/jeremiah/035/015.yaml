translation:
  language: es
  text: 'Y envié a ustedes a todos mis siervos, los profetas, madrugando y enviándolos[c], para decir: «Vuélvanse[a], por favor, cada uno[b] de su mal camino, y mejoren sus obras[d], y no anden tras dioses ajenos para servirlos. Entonces habiten en la tierra que di a ustedes y a sus padres». Pero no inclinaron su oído ni me escucharon.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Regresen», o más interpretivamente: «Arrepiéntanse».'
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: «cada uno de su mal camino», expresión distributiva que llama a cada persona individualmente.'
    reason: lexical_alternative
  - marker: c
    text: 'Modismo hebreo: «madrugando y enviando», que expresa envío persistente y solícito.'
    reason: cultural_note
  - marker: d
    text: 'O: «enmenden sus obras».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וָאֶשְׁלַח
  english_pob_choice: And I sent
  chosen_spanish: Y envié
  alternatives_spanish:
  - Y he enviado
  lexicon: HALOT
  rationale: El wayyiqtol narrativo se vierte naturalmente con pretérito simple en español. Aquí conserva el relato retrospectivo de Yahvé sobre su envío repetido de los profetas.
- source_word: עֲבָדַי הַנְּבִאִים
  english_pob_choice: my servants the prophets
  chosen_spanish: mis siervos, los profetas
  alternatives_spanish:
  - mis siervos los profetas
  - mis siervos profetas
  lexicon: HALOT
  rationale: Se mantiene la aposición entre 'siervos' y 'profetas' sin forzar una fusión nominal. 'Siervos' conserva la relación de pertenencia y servicio a Yahvé.
- source_word: הַשְׁכֵּים וְשָׁלֹחַ
  english_pob_choice: rising early and sending them
  chosen_spanish: madrugando y enviándolos
  alternatives_spanish:
  - levantándome temprano y enviándolos
  - insistentemente enviándolos
  lexicon: HALOT
  rationale: La expresión hebrea es idiomática y comunica empeño/persistencia. En español, 'madrugando y enviándolos' conserva la imagen sin volverla rígida; el objeto 'los' se explicita para claridad.
- source_word: שֻׁבוּ נָא
  english_pob_choice: Please turn back
  chosen_spanish: Vuélvanse, por favor
  alternatives_spanish:
  - Por favor, vuelvan
  - Arrepiéntanse, por favor
  lexicon: HALOT
  rationale: שׁוּב expresa volver/volver atrás; 'vuélvanse' preserva el movimiento concreto sin cargar el término con un tecnicismo teológico que el hebreo no exige aquí. נָא se refleja con 'por favor'.
- source_word: אִישׁ מִדַּרְכּוֹ הָרָעָה
  english_pob_choice: each man from his evil way
  chosen_spanish: cada uno de su mal camino
  alternatives_spanish:
  - cada hombre de su mal camino
  - cada uno de su camino malo
  lexicon: HALOT
  rationale: Se conserva el valor distributivo de אִישׁ sin masculinizar innecesariamente en español. 'Mal camino' es una forma natural y fiel para el giro profético 'camino malo'.
- source_word: וְהֵיטִיבוּ מַעַלְלֵיכֶם
  english_pob_choice: and make your deeds good
  chosen_spanish: y mejoren sus obras
  alternatives_spanish:
  - y hagan buenas sus obras
  - y corrijan sus acciones
  lexicon: HALOT
  rationale: El hifil de יטב tiene el sentido de hacer bueno/mejorar. 'Mejoren sus obras' expresa el valor verbal con un español claro y digno, manteniendo la exigencia ética.
- source_word: וְאַל תֵּלְכוּ אַחֲרֵי אֱלֹהִים אֲחֵרִים
  english_pob_choice: and do not go after other gods
  chosen_spanish: y no anden tras dioses ajenos
  alternatives_spanish:
  - y no sigan a dioses ajenos
  - y no vayan tras otros dioses
  lexicon: HALOT
  rationale: '''Andar tras'' conserva el hebraísmo de seguimiento/apostasia y su tono bíblico. ''Dioses ajenos'' evita una paráfrasis más libre y preserva el contraste de lealtad.'
- source_word: לְעָבְדָם
  english_pob_choice: to serve them
  chosen_spanish: para servirlos
  alternatives_spanish:
  - para adorarlos
  - para rendirles culto
  lexicon: HALOT
  rationale: '''Servir'' mantiene el rango léxico de עבד y evita restringirlo a ''adorar''. El pronombre enclítico ''los'' mantiene referencia directa a los dioses ajenos.'
- source_word: וּשְׁבוּ אֶל הָאֲדָמָה
  english_pob_choice: Then dwell in the land
  chosen_spanish: Vuelvan a la tierra
  alternatives_spanish:
  - Y habiten en la tierra
  - Entonces vuelvan a la tierra
  lexicon: HALOT
  rationale: Aunque שׁוּב puede significar 'volver', aquí el paralelo contextual con la posesión de la tierra permite 'Vuelvan a la tierra' como rendering idiomático. Se conserva el vínculo covenantal sin añadir 'dwell' explícitamente.
- source_word: הָאֲדָמָה
  english_pob_choice: the land
  chosen_spanish: la tierra
  alternatives_spanish:
  - el país
  - el suelo
  lexicon: HALOT
  rationale: En contexto pactal, 'tierra' es el equivalente natural de הָאֲדָמָה. 'Suelo' sería demasiado físico; 'país' sería más interpretativo.
- source_word: אֲשֶׁר נָתַתִּי לָכֶם וְלַאֲבֹתֵיכֶם
  english_pob_choice: that I gave to you and to your fathers
  chosen_spanish: que di a ustedes y a sus padres
  alternatives_spanish:
  - que les di a ustedes y a sus padres
  - que di a ustedes y a sus antepasados
  lexicon: HALOT
  rationale: Se conserva la referencia histórica y pactal con 'sus padres', un hebraísmo que en español bíblico funciona bien para 'ancestros'. 'Di' refleja el perfecto con valor narrativo.
- source_word: וְלֹא הִטִּיתֶם אֶת אָזְנְכֶם
  english_pob_choice: But you did not incline your ear
  chosen_spanish: Pero no inclinaron su oído
  alternatives_spanish:
  - Pero no prestaron atención
  - Pero no escucharon
  lexicon: HALOT
  rationale: Se preserva el hebraísmo corporal 'inclinar el oído/oído' como imagen vívida. En español, 'oído' puede sonar más natural que 'oreja' y mantiene la conexión con el siguiente 'escucharon'.
- source_word: וְלֹא שְׁמַעְתֶּם אֵלָי
  english_pob_choice: or listen to me
  chosen_spanish: ni me escucharon
  alternatives_spanish:
  - ni me oyeron
  - ni obedecieron
  lexicon: HALOT
  rationale: שׁמע aquí tiene el sentido auditivo y el de obediencia implícita; 'escucharon' preserva ambas capas sin explicitar una obediencia que el verso formula por la vía auditiva.
theological_decisions:
- issue: Renderizar שׁוּב en la exhortación profética
  english_pob_reading: Please turn back
  chosen_spanish_reading: Vuélvanse, por favor
  alternative_spanish_readings:
  - Arrepiéntanse, por favor
  - Vuelvan, por favor
  rationale: Se evita imponer un vocabulario técnico de 'arrepentimiento' donde el hebreo presenta primero un llamado concreto a volverse de un camino malo. Así se conserva la tensión entre giro moral y acto de retorno.
  doctrine_reference: DOCTRINE.md §Translation philosophy 1, 3
- issue: Tratamiento de אִישׁ con valor distributivo
  english_pob_reading: each man
  chosen_spanish_reading: cada uno
  alternative_spanish_readings:
  - cada hombre
  - cada persona
  rationale: El singular distributivo se conserva sin neutrarlo en exceso. 'Cada uno' comunica la individualidad de la llamada y evita perder la forma representativa masculina del hebreo.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4
translation_notes:
  revision_awareness: 'Se tuvo en cuenta el audit trail inglés y el control de revisión más reciente, que no introdujo cambios. La redacción española sigue la decisión óptima-equivalente del POB: conserva el hebraísmo central, evita sobrerreligiosizar ''repent/repentirse'' y mantiene el paralelismo final entre no inclinar el oído y no escuchar.'
  spanish_consistency_notes:
  - Se usa 'Yahvé' como nombre divino en el proyecto, aunque en este versículo solo aparece la primera persona narrativa.
  - '''Siervos'' se mantiene para עֲבָדַי, en coherencia con el POB inglés y con el valor de pertenencia al servicio de Yahvé.'
  - '''Dioses ajenos'' conserva el contraste de exclusividad de culto sin sustituirlo por un término más teológico que el hebreo no exige.'
  - '''Tierra'' se usa para הָאֲדָמָה en sentido pactal/territorial, no como ''suelo''.'
