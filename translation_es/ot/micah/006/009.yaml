review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien la estructura del hebreo: conserva «La voz de Yahvé», «a la ciudad», el imperativo final y la referencia a «la vara». También refleja correctamente la revisión inglesa más reciente al traducir יִרְאֶה como «ve», mientras mantiene la dificultad de la cláusula en nota. Sin embargo, la nota al pie no preserva con precisión la alternativa principal del audit trail inglés, porque repite esencialmente la lectura principal («y la sabiduría ve tu nombre») en vez de la alternativa más literal «y la sabiduría sana ve tu nombre».'
  spanish_quality_summary: 'El español es en general claro y digno, pero «sabiduría sana» suena algo forzado en español eclesial general; aun así, puede tolerarse por fidelidad al matiz de «sound wisdom». El problema principal de legibilidad está en la mezcla de registro: «oíd» es peninsular y no encaja con el objetivo de español neutral latinoamericano. «Oigan» o «Escuchen» sería mejor; «Oigan» preserva mejor el tono breve e imperativo. «y a quien la ha designado» es comprensible, aunque «a quien la designó» fluye mejor en el estilo profético.'
  glossary_alignment: 'Buen alineamiento general con el glosario del proyecto: יהוה se vierte correctamente como «Yahvé», no como «SEÑOR»; no hay conflictos con otros términos doctrinales clave. La elección «vara» para מַטֶּה es adecuada. La decisión «ve tu nombre» concuerda con la revisión auditada, con nota de dificultad. La excepción necesaria es cambiar «oíd» a una forma neutral latinoamericana.'
  issues:
  - severity: medium
    issue: Imperativo plural «oíd» no es neutral latinoamericano
    rationale: El encargo pide español neutral latinoamericano / ampliamente legible en iglesia. «Oíd» es correcto, pero marcadamente peninsular; «Oigan» mantiene claridad y dignidad sin regionalismo fuerte.
  - severity: medium
    issue: La nota al pie no reproduce bien la alternativa documentada
    rationale: 'La nota actual dice «O: “y la sabiduría ve tu nombre”», pero el texto principal ya dice «y la sabiduría sana ve tu nombre». Debe preservarse la alternativa inglesa relevante: «y la sabiduría ve tu nombre», junto con «y es sabiduría sana temer tu nombre», o reformularse para que realmente ofrezca lecturas distintas del texto principal.'
  - severity: low
    issue: «la ha designado» es algo pesado en este contexto
    rationale: No es infiel, pero «la designó» suena más natural y suficientemente fiel a יעד en una línea poética breve.
  revised_spanish_text: 'La voz de Yahvé clama a la ciudad, y la sabiduría sana ve tu nombre[a]: oigan la vara y a quien la designó.'
  revised_footnotes:
  - marker: a
    text: 'O: «y la sabiduría ve tu nombre», o «y es sabiduría sana temer tu nombre». El hebreo de esta cláusula es difícil.'
    reason: alternative_reading
  revision_rationale: Se ajusta el imperativo a un español neutral latinoamericano («oigan»), se aligera la última cláusula con un pretérito simple más natural («la designó»), y se corrige la nota para que preserve alternativas reales frente al texto principal, en línea con el audit trail inglés y la dificultad reconocida del hebreo.
