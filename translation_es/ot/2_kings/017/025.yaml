    issue: «su morada allí» es poco natural para שִׁבְתָּם en narrativa histórica
    rationale: Aunque semánticamente defendible, «morada» en español suena más estático o literario y menos idiomático que el sentido de habitar/establecerse en el lugar. «Su asentamiento allí» preserva mejor el valor nominal del hebreo y mejora la legibilidad.
  - severity: low
