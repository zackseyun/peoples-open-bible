review_pass:
  verdict: revise
  source_alignment_summary: El borrador refleja bien la estructura tripartita del hebreo, mantiene la repetición retórica de «en ti», y comunica correctamente las acusaciones de desprecio a padre y madre, opresión del גֵּר, y abuso contra huérfano/viuda. Sin embargo, el rastro auditado en inglés preserva más específicamente «fatherless» que «orphan», y la nota b del español actual está formulada de manera incorrecta y confusa, porque presenta «huérfano» como opción más literal cuando en realidad es la lectura principal y no reproduce con precisión el matiz de «sin padre».
  spanish_quality_summary: El español es claro, natural y digno. «Han tratado con desprecio», «en medio de ti», y «han oprimido» son buenas soluciones. «Forastero» es defendible para גֵּר, aunque en registro bíblico e intertextual «residente extranjero» sería más técnico; no hace falta cambiarlo. La principal debilidad de calidad está en la nota b, que desorienta al lector. Además, conviene alinear el texto principal con la decisión auditada usando «el que no tiene padre» para conservar el matiz sin caer en una expresión antiidiomática.
  glossary_alignment: No hay conflicto con los términos globales del proyecto. No aparece Yahvé/Mesías/etc. La decisión sobre גֵּר como «forastero» entra dentro de la flexibilidad permitida, aunque es menos precisa que «residente extranjero». La decisión sobre יָתוֹם debería ajustarse mejor al razonamiento lexical inglés que privilegia la noción específica de carencia de padre.
  issues:
  - severity: medium
    issue: La traducción principal de יָתוֹם como «huérfano» pierde el matiz específico de «sin padre / fatherless» preservado en el audit trail inglés.
    rationale: El inglés documenta explícitamente que «fatherless» fue elegido para mantener la nuance literal y la pareja de lenguaje del pacto. En español, «huérfano» es natural pero más amplio. «El que no tiene padre» conserva mejor el sentido sin sonar excesivamente torpe.
  - severity: high
    issue: La nota b está invertida y resulta semánticamente incorrecta.
    rationale: 'Dice: «O “huérfano” en un sentido más literal para reproducir el matiz de “sin padre”». Pero «huérfano» no es una alternativa más literal que el hebreo; al contrario, es la opción más general. Esto contradice la justificación lexical auditada y confunde al lector.'
  revised_spanish_text: En ti han tratado con desprecio[a] al padre y a la madre; en medio de ti han oprimido al forastero[c]; en ti han defraudado al que no tiene padre[b] y a la viuda.
  revised_footnotes:
