translation:
  language: es
  text: Pero aun a estos[a], por cuanto eran seres humanos, los perdonaste; y enviaste avispones[b] como precursores de tu ejército[c], para que los destruyeran poco a poco.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «como hombres» / «en cuanto eran humanos». El griego destaca que eran seres humanos mortales, y eso se da como razón de la contención divina.'
    reason: lexical_alternative
  - marker: b
    text: «Avispones» conserva mejor el eco bíblico del motivo de Dios enviando estos insectos delante de Israel contra pueblos hostiles; compárese Éxodo 23:28; Deuteronomio 7:20; Josué 24:12.
    reason: cross_reference
  - marker: c
    text: 'O: «de tu campamento». στρατόπεδον puede significar campamento o ejército/hueste; aquí se conserva la imagen militar con «ejército».'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀλλὰ καὶ τούτων
  english_pob_choice: But even these
  chosen_spanish: Pero aun a estos
  alternatives_spanish:
  - Pero también a estos
  - Y aun a estos
  lexicon: LSJ
  rationale: Conserva la fuerza adversativa y acumulativa de ἀλλὰ καί, con referencia demostrativa a los pueblos del contexto inmediato.
- source_word: ὡς ἀνθρώπων
  english_pob_choice: since they were human beings
  chosen_spanish: por cuanto eran seres humanos
  alternatives_spanish:
  - como hombres
  - ya que eran humanos
  lexicon: LSJ
  rationale: La construcción expresa la razón o consideración de la acción divina; 'seres humanos' mantiene el matiz antropológico y evita un masculino genérico innecesario.
- source_word: ἐφείσω
  english_pob_choice: you spared
  chosen_spanish: los perdonaste
  alternatives_spanish:
  - los preservaste
  - te abstuviste de destruirlos
  lexicon: LSJ
  rationale: '''Perdonaste'' comunica la idea de reservar o no ejecutar destrucción en este contexto de juicio; mantiene el contraste con la acción posterior de envío.'
- source_word: ἀπέστειλάς τε
  english_pob_choice: and you sent
  chosen_spanish: y enviaste
  alternatives_spanish:
  - y despachaste
  - y mandaste
  lexicon: LSJ
  rationale: Equivale de manera directa al aoristo y conserva la conexión enlazada por τε con la cláusula anterior.
- source_word: προδρόμους
  english_pob_choice: as forerunners
  chosen_spanish: como precursoras
  alternatives_spanish:
  - como adelantadas
  - como mensajeras previas
  lexicon: LSJ
  rationale: Se opta por una forma natural en español que preserve la idea de ir delante de la fuerza principal. En español 'precursoras' concuerda con 'avispas'.
- source_word: τοῦ στρατοπέδου σου
  english_pob_choice: of your army
  chosen_spanish: de tu ejército
  alternatives_spanish:
  - de tu campamento
  - de tu hueste
  lexicon: LSJ
  rationale: '''Ejército'' conserva el campo militar de στρατόπεδον y hace clara la imagen de una fuerza organizada enviada por Dios; ''campamento'' sería más literal pero menos transparente aquí.'
- source_word: σφῆκας
  english_pob_choice: hornets
  chosen_spanish: avispas
  alternatives_spanish:
  - avispas grandes
  - avispones
  lexicon: LSJ
  rationale: Se traduce con el término zoológico más natural en español. Aunque el POB inglés usa 'hornets' para activar el eco bíblico, 'avispas' mantiene la referencia a insectos que pican; el sentido contextual se conserva en la nota cruzada.
- source_word: ἵνα αὐτοὺς κατὰ βραχὺ ἐξολεθρεύσωσιν
  english_pob_choice: so that they might destroy them little by little
  chosen_spanish: para que los destruyeran poco a poco
  alternatives_spanish:
  - para que los exterminaran gradualmente
  - a fin de que los destruyeran poco a poco
  lexicon: LSJ
  rationale: '''Poco a poco'' refleja κατὰ βραχύ con naturalidad en español. ''Destruyeran'' conserva la fuerza de ἐξολεθρεύω sin volver la frase excesivamente técnica o arcaica.'
theological_decisions:
- issue: Motivo de la reserva divina hacia los pueblos
  english_pob_reading: The text grounds God's restraint in their being human beings.
  chosen_spanish_reading: El texto funda la reserva de Dios en que eran seres humanos.
  alternative_spanish_readings:
  - Dios los trató como hombres
  - Dios se contuvo porque eran mortales
  rationale: La traducción mantiene el fundamento explícito del enunciado griego sin ampliarlo doctrinalmente. 'Seres humanos' expresa bien la condición mortal y la razón dada para el perdón/ahorro divino.
  doctrine_reference: DOCTRINE.md §Translation philosophy 3, 4
- issue: Metáfora militar aplicada a la acción divina
  english_pob_reading: '''your army'' is retained as metaphorical language for God''s punitive agency.'
  chosen_spanish_reading: Se conserva 'tu ejército' como lenguaje metafórico de la agencia punitiva divina.
  alternative_spanish_readings:
  - tu campamento
  - tu hueste
  rationale: El verso presenta avispas enviadas como precursoras de la fuerza de Dios. 'Tu ejército' preserva la imaginería militar sin convertirla en explicación literalista.
  doctrine_reference: DOCTRINE.md §Translation philosophy 1, 6
translation_notes:
  revision_awareness: El borrador sigue de cerca el texto griego de Swete 1909 y el rastro auditado en inglés POB, sin cambios sustantivos respecto del pasaje adjudicado final; se mantiene la tensión entre la literalidad de στρατόπεδον y su valor militar contextual, y se adapta σφῆκας a un español natural con nota de eco bíblico.
  spanish_consistency_notes:
  - Se usa 'Yahvé' como forma por defecto solo cuando aparezca el tetragrámaton; aquí el texto griego no lo contiene.
  - '''seres humanos'' evita masculinizar la referencia y conserva el motivo antropológico del versículo.'
  - '''ejército'' se mantiene para preservar la metáfora militar del texto; no se reemplaza por ''campamento'' en el texto principal.'
  - '''avispas'' es una solución idiomática en español para σφῆκας; la nota explica el eco tradicional de ''hornets''.'
