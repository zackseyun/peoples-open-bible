  spanish_consistency_notes:
  - Se mantiene el patrón verbal narrativo simple para conservar la progresión del hebreo.
  - No se introducen glosas doctrinales ni equivalencias interpretativas no respaldadas por el texto.
  - «Juzgó» conserva la terminología característica de Jueces sin sustituirla por un verbo más general.
  - El topónimo se adapta a ortografía española sin cambiar el referente del lugar.
