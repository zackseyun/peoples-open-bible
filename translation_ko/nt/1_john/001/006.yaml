  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: ἐὰν εἴπωμεν ὅτι κοινωνίαν ἔχομεν μετ’ αὐτοῦ καὶ ἐν τῷ σκότει περιπατῶμεν, ψευδόμεθα καὶ οὐ ποιοῦμεν τὴν ἀλήθειαν·
base_translation:
  language: en
  yaml_path: translation/nt/1_john/001/006.yaml
  text: If we say that we have fellowship with him and yet walk in the darkness[b][a], we are lying and are not practicing the truth.
  footnotes:
  - marker: a
    text: Or 'in darkness.' The Greek has 'in the darkness,' which may emphasize the moral-spiritual realm opposed to God in Johannine usage.
    reason: lexical_alternative
  - marker: b
    text: Literally, 'do not do the truth.'
    reason: lexical_alternative
translation:
  language: ko
  text: 만일 우리가 그분과 교제를 누린다고 말하면서 어둠 가운데 걸어가면, 우리는 거짓말하는 것이며 진리를 행하지 않는 것입니다.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: περιπατῶμεν
  english_pob_choice: walk
  chosen_korean: 걸어가면
  alternatives_korean:
  - 행하면
  - 산다면
  lexicon: BDAG
  rationale: περιπατέω는 70인역에서 삶의 양식을 가리키는 히브리적 관용. 「걸어가다」를 그대로 살려 빛/어둠 가운데 「걷는다」는 공간적 은유를 보존한다.
- source_word: ποιοῦμεν τὴν ἀλήθειαν
  english_pob_choice: practicing the truth
  chosen_korean: 진리를 행하지
  alternatives_korean:
  - 진리를 실천하지
  - 진실하게 살지
  lexicon: BDAG
  rationale: 「진리를 행함」은 셈어적 관용으로 진리에 부합하는 삶을 가리킨다. 직역을 보존한다.
