review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien la estructura y el sentido general del hebreo: juicio divino agrícola, lista de cultivos afectados, falta de retorno del pueblo y cierre profético con el nombre divino Yahvé. Sin embargo, introduce dos desajustes: (1) una nota innecesaria en ''viñedos[a]'' que no preserva una alternativa significativa del inglés ni resuelve una ambigüedad real en español; y (2) ''higuerales''/''olivares'' desplaza el sentido de árboles individuales o conjuntos arbóreos hacia plantaciones, mientras que el inglés auditado justificó específicamente ''fig trees'' y ''olive trees''.'
  spanish_quality_summary: El español es generalmente claro y digno, pero mezcla registro peninsular ('os', 'vuestros', 'volvisteis') con una meta declarada de español neutro latinoamericano. Además, 'higuerales' y 'olivares' suenan menos directos y más interpretativos que 'higueras' y 'olivos'. 'Tizón' y 'añublo' son defendibles, aunque algo técnicos; aun así permanecen legibles en contexto bíblico agrícola.
  glossary_alignment: Se alinea correctamente con la política del proyecto en 'Yahvé' para יְהוָה. No hay otros términos doctrinales conflictivos. La decisión sobre שַׁבְתֶּם עָדַי debe conservar la idea de 'volver'/'regresar' a Dios; conviene expresarla en español más neutral como 'no regresaron a mí'.
  issues:
  - severity: medium
    issue: Registro pronominal poco acorde con español neutro latinoamericano
    rationale: El borrador usa 'os', 'vuestros' y 'volvisteis', formas naturales en España pero menos adecuadas para un objetivo de español neutral latinoamericano y lectura eclesial amplia.
  - severity: medium
    issue: '''Higuerales'' y ''olivares'' interpretan el inventario como plantaciones'
    rationale: El hebreo permite y el inglés auditado prefiere 'fig trees' y 'olive trees'. En español, 'higueras' y 'olivos' preservan mejor la referencia básica a los árboles sin añadir el matiz de huerto o plantación.
  - severity: low
    issue: Nota al pie en 'viñedos[a]' no está justificada
    rationale: El inglés POB no preservó una alternativa para כַרְמֵיכֶם, y la nota española no aclara una ambigüedad real ni añade valor exegético relevante.
