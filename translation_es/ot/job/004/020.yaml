translation:
  language: es
  text: Desde la mañana hasta la tarde son aplastados; sin que nadie se fije en ello[a], perecen para siempre.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «sin que nadie le preste atención» / «sin que nadie lo tome a pecho».
    reason: lexical_alternative
lexical_decisions:
- source_word: מִבֹּקֶר לָעֶרֶב
  english_pob_choice: From morning to evening
  chosen_spanish: De mañana a tarde
  alternatives_spanish:
  - Desde la mañana hasta la tarde
  - De mañana hasta la noche
  lexicon: HALOT
  rationale: La pareja temporal marca el transcurso de una sola jornada y subraya la brevedad de la vida humana. «De mañana a tarde» conserva la imagen hebrea con un giro natural en español.
- source_word: יֻכַּתּוּ
  english_pob_choice: they are crushed
  chosen_spanish: son aplastados
  alternatives_spanish:
  - son golpeados
  - son abatidos
  - son quebrantados
  lexicon: HALOT
  rationale: La forma hophal expresa que reciben una acción de ser golpeados o aplastados. «Son aplastados» mantiene el valor pasivo y la fuerza de la imagen sin añadir un detalle mecánico no explícito en el hebreo.
- source_word: מִבְּלִי מֵשִׂים
  english_pob_choice: without anyone taking notice
  chosen_spanish: sin que nadie lo note
  alternatives_spanish:
  - sin que nadie le preste atención
  - sin que nadie lo tome en cuenta
  - sin que nadie lo tenga en cuenta
  lexicon: HALOT
  rationale: El giro hebreo es idiomático y probablemente elíptico, con la idea de no poner el corazón o la mente en ello. «Sin que nadie lo note» comunica de forma natural la falta de atención o advertencia que el inglés POB también documenta.
- source_word: לָנֶצַח
  english_pob_choice: forever
  chosen_spanish: para siempre
  alternatives_spanish:
  - por siempre
  - eternamente
  lexicon: HALOT
  rationale: El término puede expresar permanencia o duración continua. Aquí intensifica la irreversibilidad del perecer. «Para siempre» es una equivalencia clara y digna en español.
- source_word: יֹאבֵדוּ
  english_pob_choice: they perish
  chosen_spanish: perecen
  alternatives_spanish:
  - se pierden
  - son destruidos
  - caen en ruina
  lexicon: HALOT
  rationale: El qal de אבד significa «perecer» o «perderse». «Perecen» preserva el sentido amplio de ruina o desaparición sin cargar el texto con una interpretación doctrinal más específica.
theological_decisions:
- issue: Finalidad de la muerte humana en el discurso de Elifaz
  english_pob_reading: The verse is rendered as a statement of temporal human frailty and unnoticed death, not as a doctrinal claim about eternal condemnation.
  chosen_spanish_reading: El versículo se lee como una afirmación de fragilidad humana y muerte inadvertida, no como una declaración doctrinal sobre condenación eterna.
  alternative_spanish_readings:
  - leer «para siempre» como ruina escatológica definitiva
  - tomarlo como una afirmación directa sobre juicio final
  rationale: En contexto, Elifaz describe la vulnerabilidad de los mortales ante Dios. Se conserva el lenguaje de permanencia sin ampliar su alcance teológico. Así se mantiene la tensión interpretativa del original en lugar de resolverla.
  doctrine_reference: Preservar la tensión teológica sin resolverla.
translation_notes:
  revision_awareness: 'Coincide con la revisión más reciente: no se requieren cambios respecto del pase anterior; la concordancia con el texto fuente y el análisis auditado es alta.'
  spanish_consistency_notes:
  - Se usa «Dios» solo cuando el contexto lo requiere; aquí no aparece.
  - Se evita «SEÑOR» porque el versículo no contiene el nombre divino.
  - «Perecen para siempre» conserva la tensión entre muerte humana y permanencia del enunciado sin convertirla en doctrina escatológica.
  - La nota a pie de página mantiene la alternativa idiomática ya documentada en el audit trail inglés.
