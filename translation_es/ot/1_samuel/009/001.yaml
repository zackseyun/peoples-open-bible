revisions:
- from: Ahora había un hombre de Benjamín[a], y su nombre era Quis, hijo de Abiel, hijo de Zeror, hijo de Becorat, hijo de Afías, hijo de un benjaminita, un hombre poderoso y valiente.
  to: Ahora había un hombre de Benjamín, y su nombre era Quis, hijo de Abiel, hijo de Zeror, hijo de Becorat, hijo de Afías, hijo de un benjaminita, un hombre de gran valor[a].
  rationale: Se corrigió la ubicación de la nota para que ancle la expresión hebrea pertinente, y se ajustó גִּבּוֹר חָיִל a «un hombre de gran valor», una formulación más natural en español y más fiel a la amplitud semántica documentada por la auditoría inglesa.
