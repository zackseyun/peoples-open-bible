  text: 도시의 서기관이 무리를 진정시킨 후에 말하였습니다. 「에베소 사람들이여, 어떤 사람이 에베소 도시가 위대한 아데미와 하늘에서 떨어진 형상의 신전 관리자임을 모르겠습니까?
