  glossary_alignment: No hay conflictos con la terminología teológica principal del proyecto. La decisión de traducir μυστήριον como «secreto» en lugar de «misterio» está bien justificada. Para βουλή, en este contexto cortesano «plan» comunica mejor el sentido que «consejo».
