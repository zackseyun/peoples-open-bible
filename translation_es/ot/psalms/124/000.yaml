translation:
  language: es
  text: Cántico de las subidas[a]. De David. Si Yahvé no hubiera estado por nosotros[b]—dígalo ahora Israel—
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, más idiomáticamente: «Cántico de peregrinación».'
    reason: lexical_alternative
  - marker: b
    text: 'O, más idiomáticamente: «Si Yahvé no hubiera estado de parte nuestra».'
    reason: lexical_alternative
lexical_decisions:
- source_word: שִׁיר הַמַּעֲלוֹת
  english_pob_choice: A Song of Ascents
  chosen_spanish: Cántico de las subidas
  alternatives_spanish:
  - Cántico de ascenso
  - Canción de ascenso
  - Cántico de peregrinación
  lexicon: שִׁיר; מַעֲלוֹת
  rationale: Mantiene la imagen del hebreo y la forma litúrgica tradicional del encabezado sin ocultar el término. 'Subidas' refleja literalmente מַעֲלוֹת y conserva la ambigüedad heredada del título.
- source_word: לְדָוִד
  english_pob_choice: Of David
  chosen_spanish: De David
  alternatives_spanish:
  - Para David
  - Pertenece a David
  lexicon: לְ + proper name
  rationale: '''De David'' es la manera más natural y fiel de expresar la atribución del superscrito en español, sin añadir una relación más específica de la que el hebreo exige.'
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahveh
  - SEÑOR
  lexicon: יהוה
  rationale: Se sigue el estándar del proyecto para el Nombre divino. 'Yahvé' preserva la audibilidad del nombre y evita la sustitución por un título.
- source_word: לוּלֵי יְהוָה שֶׁהָיָה לָנוּ
  english_pob_choice: If Yahweh had not been for us
  chosen_spanish: Si Yahvé no hubiera estado por nosotros
  alternatives_spanish:
  - Si Yahvé no hubiese estado a nuestro favor
  - Si Yahvé no hubiera estado de parte nuestra
  lexicon: לוּלֵי + היה + ל
  rationale: El hebreo expresa presencia o apoyo favorable. 'Por nosotros' conserva la brevedad del original y el sentido de respaldo sin forzar una frase idiomática distinta al texto base.
- source_word: יֹאמַר נָא יִשְׂרָאֵל
  english_pob_choice: let Israel now say
  chosen_spanish: que lo diga ahora Israel
  alternatives_spanish:
  - diga ahora Israel
  - que Israel diga ahora
  lexicon: אמר + נא + ישראל
  rationale: El imperativo exhortativo se vuelve naturalmente en español con 'que lo diga ahora Israel', manteniendo el matiz de llamado colectivo y el énfasis temporal de נָא.
theological_decisions:
- issue: Uso del nombre divino en el encabezado y en la línea principal
  english_pob_reading: The POB renders יהוה as Yahweh, preserving the divine name in the main text.
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - Yahveh
  rationale: Se conserva el nombre propio divino en lugar de un título enmascarado, siguiendo la política del POB y el valor auditable del texto hebreo.
  doctrine_reference: Tetragrammaton / divine name policy
- issue: Sentido de apoyo divino en לוּלֵי יְהוָה שֶׁהָיָה לָנוּ
  english_pob_reading: If Yahweh had not been for us
  chosen_spanish_reading: Si Yahvé no hubiera estado por nosotros
  alternative_spanish_readings:
  - Si Yahvé no hubiera estado de parte nuestra
  - Si Yahvé no hubiera estado con nosotros
  rationale: La cláusula afirma dependencia real de la ayuda de Yahvé; 'por nosotros' mantiene el valor relacional sin convertirlo en un giro interpretativo más explicativo que el hebreo.
  doctrine_reference: Providencia / ayuda divina
translation_notes:
  revision_awareness: La revisión inglesa completó el versículo a partir del encabezado y añadió la cláusula principal y la exhortación final tomadas del hebreo. Esta versión española sigue esa lectura completa, preserva el superscrito poético y refleja el nombre divino con Yahvé, manteniendo la estructura exhortativa del cierre.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' como forma regular para יהוה en el texto principal.
  - Se conserva la estructura breve y litúrgica del superscrito.
  - No se introduce 'Cristo', 'Señor' ni paráfrasis explicativas no sustentadas por el hebreo.
  - La puntuación con raya reproduce el corte enfático del hebreo y del audit trail inglés.
