translation:
  language: es
  text: Sólo por sorteo[a] se dividirá la tierra; ellos la heredarán conforme a los nombres de las tribus de sus padres.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «sus padres», es decir, sus antepasados paternos. El hebreo dice literalmente «sus padres», refiriéndose a las líneas ancestrales dentro de las tribus.
    reason: lexical_alternative
lexical_decisions:
- source_word: אַךְ
  english_pob_choice: Only
  chosen_spanish: Sólo
  alternatives_spanish:
  - Únicamente
  - Solamente
  - Sólo y no de otro modo
  lexicon: HALOT
  rationale: אַךְ tiene fuerza restrictiva; en este contexto limita el medio de reparto. «Sólo» comunica con naturalidad esa exclusividad sin añadir interpretación extra.
- source_word: בְּגוֹרָל
  english_pob_choice: by lot
  chosen_spanish: por sorteo
  alternatives_spanish:
  - por suertes
  - mediante sorteo
  - por lotes
  lexicon: HALOT
  rationale: גוֹרָל se refiere al procedimiento de echar suertes para asignar la herencia. En español, «por sorteo» mantiene la idea instrumental de manera clara y contemporánea.
- source_word: יֵחָלֵק
  english_pob_choice: shall be divided
  chosen_spanish: se dividirá
  alternatives_spanish:
  - será dividida
  - se repartirá
  - será repartida
  lexicon: HALOT
  rationale: 'El nifal expresa pasividad/reflexividad: la tierra recibe la acción de ser dividida. «Se dividirá» conserva el sentido pasivo y es idiomático en español.'
- source_word: הָאָרֶץ
  english_pob_choice: the land
  chosen_spanish: la tierra
  alternatives_spanish:
  - la tierra prometida
  - el país
  - la tierra de la herencia
  lexicon: HALOT
  rationale: Aquí se trata de la tierra de la distribución tribal. «La tierra» es fiel y suficientemente precisa sin sobreespecificar.
- source_word: לִשְׁמוֹת
  english_pob_choice: according to the names of
  chosen_spanish: conforme a los nombres de
  alternatives_spanish:
  - según los nombres de
  - de acuerdo con los nombres de
  - por los nombres de
  lexicon: HALOT
  rationale: La ל introduce referencia o estándar. «Conforme a» preserva esa relación normativa y suena natural en español bíblico moderno.
- source_word: מַטּוֹת
  english_pob_choice: tribes
  chosen_spanish: tribus
  alternatives_spanish:
  - ramas
  - divisiones tribales
  - estirpes
  lexicon: HALOT
  rationale: En este contexto מַטּוֹת designa los grupos tribales, no bastones. «Tribus» es el sentido contextual correcto.
- source_word: אֲבֹתָם
  english_pob_choice: their fathers
  chosen_spanish: sus padres
  alternatives_spanish:
  - sus padres ancestrales
  - sus antepasados
  - sus padres patriarcales
  lexicon: HALOT
  rationale: El hebreo dice literalmente «sus padres». En el marco genealógico tribal, la referencia es a la línea paterna; «sus padres» conserva esa forma sin neutralizarla en el texto principal.
- source_word: יִנְחָלוּ
  english_pob_choice: they shall inherit
  chosen_spanish: heredarán
  alternatives_spanish:
  - recibirán en herencia
  - tomarán posesión como herencia
  - poseerán por herencia
  lexicon: HALOT
  rationale: נחל expresa recibir como herencia. «Heredarán» es breve, exacto e idiomático.
theological_decisions:
- issue: Terminología ancestral masculina en אֲבֹתָם
  english_pob_reading: their fathers
  chosen_spanish_reading: sus padres
  alternative_spanish_readings:
  - sus antepasados
  - sus ancestros
  rationale: El texto hebreo usa el término masculino explícito y el contexto es la transmisión de herencia por líneas paternas tribales. Se conserva esa precisión en el español principal.
  doctrine_reference: DOCTRINE.md Translation philosophy §4 (Gender-accurate over gender-neutral)
translation_notes:
  revision_awareness: La revisión más reciente indicó que no hacía falta ningún cambio; la redacción española mantiene esa lectura estable, con una nota sólo para aclarar el alcance genealógico de «padres» y evitar neutralizar el término hebreo.
  spanish_consistency_notes:
  - Se mantiene «tierra» para הָאָרֶץ en concordancia con el contexto de reparto de heredad.
  - Se usa lenguaje bíblico claro y contemporáneo, sin sustituir el matiz restrictivo de אַךְ.
  - «Tribus» conserva el sentido técnico tribal de מַטּוֹת.
  - La nota [a] está anclada explícitamente en el texto para cumplir la validación de formato.
