id: PHP.4.1
reference: Philippians 4:1
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: ὥστε, ἀδελφοί μου ἀγαπητοὶ καὶ ἐπιπόθητοι, χαρὰ καὶ στέφανός μου, οὕτως στήκετε ἐν κυρίῳ, ἀγαπητοί.
base_translation:
  language: en
  yaml_path: translation/nt/philippians/004/001.yaml
  text: So then, my beloved and longed-for brothers, my joy and crown, stand firm in the Lord in this way, beloved.
translation:
  language: ko
  text: 그러므로 나의 사랑하고 사모하는 형제 여러분[a], 나의 기쁨이요 면류관[b]인 여러분, 사랑하는 자들이여, 이와 같이 주 안에 굳게 서십시오.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 「형제」는 헬라어 남성형 호격 ἀδελφοί를 문법성에 맞게 옮긴 것이지만, 본문 맥락에서 바울은 빌립보 회중 전체(남녀 모두)를 부르고 있다.
    reason: cultural_note
  - marker: b
    text: 또는 「승리의 화관」. 헬라어 στέφανος는 왕관(王冠)이 아니라 경기 승자에게 씌워주던 화관(花冠)을 가리킨다.
    reason: lexical_alternative
lexical_decisions:
- source_word: ὥστε
  english_pob_choice: So then
  chosen_korean: 그러므로
  alternatives_korean:
  - 그러니
  - 따라서
  lexicon: BDAG
  rationale: 앞선 논증의 결론을 도출하는 추론적 접속사. 한국어로는 「그러므로」가 가장 자연스러운 결론·권면 도입어이다.
- source_word: ἀδελφοί
  english_pob_choice: brothers
  chosen_korean: 형제 여러분
  alternatives_korean:
  - 형제들
  - 형제자매들
  lexicon: BDAG
  rationale: 헬라어 남성 복수 호격을 성별 정확성 원칙에 따라 「형제」로 유지하되, 합쇼체 호격 어감을 위해 「여러분」을 더해 회중 전체에 대한 따뜻한 호명을 살린다. 포용적 함의는 각주로 보존한다.
- source_word: ἀγαπητοὶ ... ἀγαπητοί
  english_pob_choice: beloved ... beloved
  chosen_korean: 사랑하는 ... 사랑하는 자들이여
  alternatives_korean:
  - 사랑하는 자들
  - 친애하는
  lexicon: BDAG
  rationale: 바울이 의도적으로 반복한 어휘를 한국어에서도 두 번 살려 강조를 유지한다. 첫째 위치는 관형사 「사랑하는」, 마지막 위치는 호격 「사랑하는 자들이여」로 분명한 부름을 나타낸다.
- source_word: ἐπιπόθητοι
  english_pob_choice: longed-for
  chosen_korean: 사모하는
  alternatives_korean:
  - 그리워하는
  - 보고 싶어 하는
  lexicon: BDAG
  rationale: 깊은 그리움과 애틋함을 함께 담는 한국어 어휘로서 「사모하는」이 가장 적합하다. 「그리워하는」은 더 일상적이나 영적·관계적 무게가 옅다.
- source_word: χαρὰ
  english_pob_choice: joy
  chosen_korean: 기쁨
  lexicon: BDAG
  rationale: 표준 등가어. 빌립보 성도 자체가 바울의 기쁨이라는 직설을 그대로 살린다.
- source_word: στέφανος
  english_pob_choice: crown
  chosen_korean: 면류관
  alternatives_korean:
  - 화관
  - 승리의 관
  lexicon: BDAG
  rationale: 「면류관」은 한국 교회 전통에서 신약의 στέφανος(승리의 화관)를 가리키는 정착된 어휘로, 왕관(王冠)이 아닌 경기 승자의 화관 이미지를 담는다. 정확한 어원적 뉘앙스는 각주에 둔다.
- source_word: οὕτως
  english_pob_choice: in this way
  chosen_korean: 이와 같이
  alternatives_korean:
  - 그렇게
  - 이렇게
  lexicon: BDAG
  rationale: 앞 단락의 권면을 지시하는 부사적 힘을 「이와 같이」로 명시하여 보존한다.
- source_word: στήκετε
  english_pob_choice: stand firm
  chosen_korean: 굳게 서십시오
  alternatives_korean:
  - 굳건히 서라
  - 흔들리지 말고 서십시오
  lexicon: BDAG
  rationale: 현재 명령형의 지속성과 권면성을 합쇼체 「-십시오」로 옮기며, 부동(不動)의 함의를 「굳게」로 살린다.
- source_word: ἐν κυρίῳ
  english_pob_choice: in the Lord
  chosen_korean: 주 안에
  alternatives_korean:
  - 주님 안에
  - 주와 연합하여
  lexicon: BDAG
  rationale: 바울의 정형 표현 ἐν κυρίῳ를 처소적 「주 안에」로 그대로 보존한다. 「주」는 본 번역의 κύριος 기본 옮김.
theological_decisions:
- issue: ἀδελφοί의 성별 표현 범위
  chosen_reading: 본문은 「형제」로 남성형의 정확성을 유지하고, 회중 전체(남녀 포함)에 대한 호명은 각주로 보존한다.
  alternative_readings:
  - 형제자매
  - 동료 신자
  rationale: DOCTRINE.md는 성별 정확한 번역을 성별 중립적 의역보다 우선시한다. 빌립보서 호격은 회중 전체를 부르므로, 포용적 의미는 본문이 아니라 각주에 두는 영어 POB의 결정을 한국어 본문에서도 그대로 따른다.
  doctrine_reference: 'DOCTRINE.md § Translation philosophy, point 4'
