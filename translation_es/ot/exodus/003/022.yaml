revisions:
- from: Cada mujer pedirá[a] de su vecina y de la mujer que habita en su casa artículos de plata y artículos de oro, y vestidos; y los pondréis sobre vuestros hijos y sobre vuestras hijas. Así despojaréis a Egipto.
  to: Cada mujer pedirá[a] de su vecina y de la mujer que vive en su casa[b] artículos de plata y artículos de oro, y ropa; y los pondréis sobre vuestros hijos y sobre vuestras hijas. Así despojaréis[c] a Egipto.
  rationale: 'Se corrigen tres puntos menores pero importantes: se repara la nota [a] para que contenga una alternativa verdadera; se añaden las notas faltantes para la mujer residente/forastera y para el verbo final de despojar; y se sustituye ''vestidos'' por ''ropa'' para mantener la amplitud semántica de וּשְׂמָלֹת en español natural. El resto del borrador puede conservarse.'
