base_translation:
  language: en
  yaml_path: translation/ot/ezra/005/017.yaml
  text: And now[a], if it seems good to the king, let a search be made in the royal treasury there in Babylon, whether it is so that a decree was issued by King Cyrus to rebuild this house of God in Jerusalem[b]; and let the king send to us his pleasure concerning this matter.
  footnotes:
  - marker: a
    text: Or, 'to build this house of God in Jerusalem.' The Aramaic verb can be rendered simply 'build'; 'rebuild' reflects the restoration context.
    reason: lexical_alternative
  - marker: b
    text: Or, 'the king's will' or 'the king's decision.'
    reason: lexical_alternative
