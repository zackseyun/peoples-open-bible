revisions:
- from: Y mientras celebraban la victoria en su patria[a], quemaron a los que habían incendiado las puertas sagradas, incluso a Kallisthenes, que había huido a un cierto alojamiento para refugiarse; y recibió el salario digno de su impiedad.
  to: Y mientras celebraban la victoria en su patria, quemaron a los que habían incendiado las puertas sagradas, incluso a Calístenes, que había huido a una casa[a] para refugiarse; y recibió la recompensa merecida por su impiedad.
  rationale: Se corrigió la ubicación de la nota para que corresponda a la frase griega difícil εἰς ἐνοίκιον πεφευγότα. Se reemplazó «un cierto alojamiento» por «una casa» para lograr un español más natural, manteniendo la incertidumbre en la nota. Se adaptó el nombre a «Calístenes» por legibilidad en español. Se cambió «salario digno» por «recompensa merecida» para un registro más idiomático en contexto de retribución judicial.
