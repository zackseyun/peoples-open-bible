    rationale: La alternativa documentada debe conservar el alcance absoluto de כֹּל; la nota debe decir 'eliminaré todo...' o similar.
  - severity: low
    issue: 'La glosa literal de la nota termina de forma extraña: ''recogeré [y]'''
    rationale: En español esa literalidad queda incompleta y poco legible. Puede formularse como 'recogiendo, recogeré' o 'recogeré y quitaré' según el propósito de la nota.
