translation:
  language: es
  text: Por la ciudad[a] irrumpen; corren sobre el muro; trepan a las casas; entran por las ventanas como un ladrón.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: También puede entenderse «en la ciudad»; la preposición hebrea es literalmente «en», aunque el español naturaliza el movimiento como «por la ciudad».
    reason: lexical_alternative
lexical_decisions:
- source_word: בָּעִיר
  english_pob_choice: through the city
  chosen_spanish: Por la ciudad
  alternatives_spanish:
  - En la ciudad
  - A través de la ciudad
  lexicon: HALOT
  rationale: El hebreo usa ב con sentido locativo/movimiento. En español, “por la ciudad” comunica movimiento dentro del espacio urbano con naturalidad y mantiene la ambigüedad entre estar en la ciudad y desplazarse por ella, sin resolver más de lo que el texto exige.
- source_word: יָשֹׁקּוּ
  english_pob_choice: rush through
  chosen_spanish: corren
  alternatives_spanish:
  - se precipitan
  - van corriendo
  - corren de aquí para allá
  lexicon: HALOT
  rationale: El verbo describe movimiento rápido e intenso. “Corren” preserva la acción básica y la paralelismo verbal del versículo en español, sin añadir una especificación que el hebreo no exige.
- source_word: בַּֽחוֹמָה
  english_pob_choice: on the wall
  chosen_spanish: sobre el muro
  alternatives_spanish:
  - en el muro
  - a lo largo del muro
  lexicon: HALOT
  rationale: La imagen es de desplazamiento sobre la fortificación. “Sobre el muro” reproduce bien la visualidad del asalto y evita que “en” suene demasiado estático en español.
- source_word: יְרֻצּוּן
  english_pob_choice: run
  chosen_spanish: corren
  alternatives_spanish:
  - razan
  - se lanzan
  - van corriendo
  lexicon: HALOT
  rationale: El hebreo continúa la serie de verbos de movimiento veloz. Se mantiene “corren” para conservar la repetición rítmica y la claridad del cuadro bélico.
- source_word: יַעֲלוּ
  english_pob_choice: climb into
  chosen_spanish: suben a
  alternatives_spanish:
  - suben a las
  - trepan a
  - suben dentro de
  lexicon: HALOT
  rationale: El verbo significa “subir/ascender”; en contexto de asalto a casas, “suben a” deja que el lector perciba la acción de trepar sin forzar un detalle que el hebreo expresa por implicación más que por un verbo específico de escalada.
- source_word: בַּבָּתִּים
  english_pob_choice: the houses
  chosen_spanish: las casas
  alternatives_spanish:
  - casas
  - los hogares
  lexicon: HALOT
  rationale: El artículo hebreo se conserva naturalmente con “las casas”, que mantiene la escena concreta del allanamiento. “Hogares” sería más interpretativo y suavizaría la violencia del contexto.
- source_word: בְּעַד הַחַלּוֹנִים
  english_pob_choice: through the windows
  chosen_spanish: por las ventanas
  alternatives_spanish:
  - a través de las ventanas
  - por medio de las ventanas
  lexicon: HALOT
  rationale: בְּעַד indica paso por una abertura. “Por las ventanas” es la forma más natural en español y expresa la intrusión sin calco rígido.
- source_word: יָבֹאוּ
  english_pob_choice: enter
  chosen_spanish: entran
  alternatives_spanish:
  - entran
  - ingresan
  lexicon: HALOT
  rationale: El verbo común de entrada se traduce aquí con “entran” para conservar el presente vívido del poema profético y la fluidez del verso.
- source_word: כַּגַּנָּב
  english_pob_choice: like a thief
  chosen_spanish: como ladrón
  alternatives_spanish:
  - como un ladrón
  - igual que un ladrón
  lexicon: HALOT
  rationale: La comparación subraya entrada furtiva e ilícita. “Como ladrón” conserva la concisión del hebreo y el tono proverbial de la comparación.
theological_decisions:
- issue: Referente implícito del sujeto plural
  english_pob_reading: Use the generic plural pronoun 'they' without specifying whether the referent is locusts, an army, or a blended prophetic image.
  chosen_spanish_reading: Mantener un sujeto implícito en la flexión verbal española, sin especificar si se trata de langostas, ejército o una imagen mixta.
  alternative_spanish_readings:
  - Ellos corren por la ciudad...
  - Las langostas corren por la ciudad...
  - Los guerreros corren por la ciudad...
  rationale: El hebreo sostiene la tensión imagética entre plaga de langostas e invasión militar. El español puede preservar esa ambigüedad usando verbos conjugados sin pronombre explícito, evitando resolver lo que el texto profético deja abierto.
  doctrine_reference: Preservar la tensión literaria y teológica sin armonizarla prematuramente.
translation_notes:
  revision_awareness: 'La revisión más reciente del texto fuente en inglés mantuvo sin cambios la decisión óptima: movimiento veloz e invasor, con sujeto plural no especificado y la nota léxica sobre בָּעִיר. La versión española conserva esa misma ambigüedad y el cuadro de asalto sin introducir aclaraciones no justificadas por el hebreo.'
  spanish_consistency_notes:
  - Se mantiene un registro bíblico claro y contemporáneo, sin arcaísmos innecesarios.
  - Se evita introducir “SEÑOR” o terminología teológica ajena al versículo, pues no aparece el nombre divino aquí.
  - El paralelismo verbal se conserva con formas breves y directas.
  - “Como ladrón” reproduce la comparación sin añadir artículos o explicaciones que debiliten la concisión del hebreo.
