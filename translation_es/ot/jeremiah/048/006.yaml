translation:
  language: es
  text: ¡Huyan! Escapen con sus vidas, y sean como un enebro[a][b] en el desierto.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O posiblemente: «y sean como Aroer en el desierto». El hebreo עֲרוֹעֵר puede entenderse como nombre de lugar o como nombre de un arbusto del desierto; el símil con «en el desierto» favorece aquí la imagen vegetal.'
    reason: alternative_reading
  - marker: b
    text: La planta exacta denotada por עֲרוֹעֵר es incierta; entre las posibles traducciones están «enebro», «tamarisco» o, de modo más general, «arbusto del desierto».
    reason: lexical_alternative
lexical_decisions:
- source_word: נֻסוּ
  english_pob_choice: Flee!
  chosen_spanish: ¡Huyan!
  alternatives_spanish:
  - ¡Corran!
  - ¡Pónganse en fuga!
  lexicon: HALOT
  rationale: El imperativo plural de נוס exige una orden breve y urgente. «Huyan» conserva la fuerza imperativa y resulta natural en español bíblico contemporáneo.
- source_word: מַלְּטוּ
  english_pob_choice: Escape
  chosen_spanish: Escapen
  alternatives_spanish:
  - Sálvense
  - Libérense
  lexicon: HALOT
  rationale: En combinación con נַפְשְׁכֶם, el verbo comunica huida para preservar la vida. «Escapen» mantiene el paralelismo con «Huyan» y evita la dureza o ambigüedad de un literal «salven sus almas».
- source_word: נַפְשְׁכֶם
  english_pob_choice: your lives
  chosen_spanish: sus vidas
  alternatives_spanish:
  - ustedes mismos
  - sus almas
  lexicon: HALOT
  rationale: En contextos de supervivencia, נֶפֶשׁ significa vida o persona. «Sus vidas» expresa con claridad la referencia a la preservación física sin introducir una lectura doctrinal ajena al contexto.
- source_word: וְתִהְיֶינָה
  english_pob_choice: and be
  chosen_spanish: y sean
  alternatives_spanish:
  - y queden
  - y lleguen a ser
  lexicon: HALOT
  rationale: El imperfecto jussivo continúa la serie de exhortaciones. En español, «sean» conserva el tono exhortativo y evita sobrecargar el verbo con una idea de cambio que el hebreo no exige aquí.
- source_word: כַּעֲרוֹעֵר
  english_pob_choice: like a juniper
  chosen_spanish: como un enebro
  alternatives_spanish:
  - como un junípero
  - como un arbusto del desierto
  - como un tamarisco
  lexicon: HALOT
  rationale: Sigo la decisión auditada de entender עֲרוֹעֵר como imagen vegetal y no como topónimo. «Enebro» es una forma clara y reconocible en español; se conserva la cautela implícita sobre la especie exacta sin abandonar la imagen de arbusto solitario.
- source_word: בַּמִּדְבָּר
  english_pob_choice: in the wilderness
  chosen_spanish: en el desierto
  alternatives_spanish:
  - en la estepa
  - en el desierto apartado
  lexicon: HALOT
  rationale: מִדְבָּר puede ser «desierto» o «desierto/estepa»; aquí «en el desierto» comunica bien el entorno árido del símil y suena natural en español. El contexto favorece una planta sola en un lugar desolado.
theological_decisions:
- issue: Lectura de כַּעֲרוֹעֵר como nombre de lugar o como imagen vegetal
  english_pob_reading: The simile with 'in the wilderness' favors the plant image here.
  chosen_spanish_reading: 'Se entiende como imagen vegetal: «como un enebro en el desierto».'
  alternative_spanish_readings:
  - como Aroer en el desierto
  - como un arbusto del desierto
  rationale: El hebreo permite tanto un topónimo como un sustantivo vegetal. La construcción con «en el desierto» favorece el valor comparativo de un arbusto aislado más que una referencia a la ciudad de Aroer. La traducción mantiene esa tensión en nota.
  doctrine_reference: No aplica; decisión semántica y contextual, no doctrinal.
translation_notes:
  revision_awareness: Coincide con la revisión auditada más reciente, que no introdujo cambios y mantuvo el acuerdo alto con el texto fuente y la decisión de leer עֲרוֹעֵר como imagen vegetal.
  spanish_consistency_notes:
  - Se mantiene el registro bíblico claro y digno, evitando un calco innecesario del inglés.
  - «Desierto» se usa como equivalente natural de מִדְבָּר en este contexto poético.
  - 'La serie de imperativos se conserva con dos verbos en plural: «Huyan» / «Escapen».'
  - Las notas conservan la ambigüedad botánica y la lectura alternativa del topónimo, como en el audit trail inglés.
