translation:
  language: es
  text: 'Así dice Yahvé de los ejércitos: He aquí, estoy quebrando el arco de Elam, la parte principal[a] de su poder.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O ‘el sostén principal de su poder’.
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהוָה צְבָאוֹת
  english_pob_choice: Yahweh of hosts
  chosen_spanish: Yahvé de los ejércitos
  alternatives_spanish:
  - Yahvé de los anfitriones
  - Yahvé de las huestes
  lexicon: HALOT
  rationale: Conservo el nombre divino como ‘Yahvé’ según el criterio POB, y traduzco צְבָאוֹת con ‘de los ejércitos’ por ser claro en español y mantener el valor marcial amplio del título. ‘Huestes’ es posible, pero menos transparente para lectura pública actual.
- source_word: כֹּה אָמַר
  english_pob_choice: Thus says
  chosen_spanish: Así dice
  alternatives_spanish:
  - Así ha dicho
  - Esto dice
  lexicon: HALOT
  rationale: La fórmula profética de introducción se rinde de forma directa y solemne. ‘Así dice’ conserva el tono oracular sin añadir contenido ni sonoridad excesivamente arcaica.
- source_word: הִנְנִי
  english_pob_choice: Behold, I am
  chosen_spanish: He aquí, estoy
  alternatives_spanish:
  - Mira, estoy
  - Yo estoy aquí
  lexicon: HALOT
  rationale: ‘He aquí’ preserva el llamado enfático de atención; ‘estoy’ refleja la fuerza inminente de la construcción hebrea con participio, evitando una paráfrasis excesiva.
- source_word: שֹׁבֵר
  english_pob_choice: breaking
  chosen_spanish: quebrando
  alternatives_spanish:
  - rompiendo
  - destruyendo
  lexicon: HALOT
  rationale: El participio indica acción en curso o inminente. ‘Quebrando’ funciona bien en español bíblico y conserva la imagen del arma hecha pedazos sin intensificarla indebidamente.
- source_word: קֶשֶׁת
  english_pob_choice: the bow
  chosen_spanish: el arco
  alternatives_spanish:
  - el arco de guerra
  - el arco bélico
  lexicon: HALOT
  rationale: En español, ‘arco’ es el término natural para קֶשֶׁת. ‘Arco de guerra’ explicita la función militar, pero el hebreo no lo añade de forma explícita.
- source_word: עֵילָם
  english_pob_choice: Elam
  chosen_spanish: Elam
  alternatives_spanish:
  - la región de Elam
  lexicon: HALOT
  rationale: Se conserva el nombre propio transliterado por ser un topónimo/nación reconocible y no requerir adaptación.
- source_word: רֵאשִׁית גְּבוּרָתָם
  english_pob_choice: the chief of their might
  chosen_spanish: el principal de su poder
  alternatives_spanish:
  - la parte principal de su fuerza
  - el sostén principal de su poder
  - lo más destacado de su valentía
  lexicon: HALOT
  rationale: רֵאשִׁית aquí funciona como rasgo de primacía o elemento principal. ‘Principal’ comunica bien esa relación en español. ‘Poder’ mantiene la amplitud de גְּבוּרָה en un contexto militar; ‘fuerza’ también sería válido, pero ‘poder’ suena más natural junto con ‘principal’ en este giro.
theological_decisions:
- issue: Traducción del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Jehová
  rationale: Sigo el criterio POB de transliterar el Tetragrama con el nombre propio ‘Yahvé’, preservando el referente personal del pacto y evitando la sustitución reverencial por un título.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Valor de רֵאשִׁית en la cola del verso
  english_pob_reading: the chief of their might
  chosen_spanish_reading: el principal de su poder
  alternative_spanish_readings:
  - la principal parte de su poder
  - el sostén principal de su fuerza
  rationale: No trato רֵאשִׁית como simple ‘comienzo’ cronológico, porque el contexto la presenta appositivamente como la parte o elemento principal de la fortaleza militar de Elam. ‘Principal’ conserva esa tensión entre ‘cabeza/parte principal’ y ‘lo más importante’.
  doctrine_reference: Jeremiah 49:35 lexical context; POB revision from 'foremost' to 'chief'
translation_notes:
  revision_awareness: La redacción sigue el pasaje hebreo directo y toma en cuenta la revisión inglesa que prefirió ‘chief’ sobre ‘foremost’ para רֵאשִׁית; por eso opto por ‘principal’ como equivalente natural y formal en español. También preservo la fuerza aspectual de הִנְנִי + participio con una forma progresiva (‘estoy quebrando’).
  spanish_consistency_notes:
  - Se conserva ‘Yahvé’ como forma regular del Tetragrama, conforme al estándar del proyecto.
  - ‘Ejércitos’ se usa para צְבָאוֹת por ser claro y suficientemente amplio en español.
  - ‘Arco’ mantiene el sentido literal de קֶשֶׁת sin añadir explicaciones interpretativas al cuerpo del texto.
  - ‘Poder’ traduce גְּבוּרָה con amplitud semántica compatible con el contexto militar.
