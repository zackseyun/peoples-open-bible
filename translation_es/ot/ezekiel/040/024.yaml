    text: Es decir, la puerta correspondía en sus dimensiones a las descritas antes.
    reason: cross_reference
  - marker: b
    text: O, más técnicamente, «sus jambas». El término arquitectónico hebreo probablemente se refiere a las estructuras laterales de sostén de la puerta.
    reason: lexical_alternative
  revision_rationale: 'Se corrige el texto para reflejar mejor la decisión léxica auditada del POB: una expresión principal más clara para lectores generales («pilares laterales») con la alternativa técnica («jambas») en nota. También se ajusta וְהִנֵּה a una formulación española natural que conserva mejor su función deíctica. Se mantienen «pórtico» y «estas mismas medidas», que son fieles y legibles. La nota de referencia se reancla al lugar más natural de la frase para evitar desajuste entre marcador y contenido.'
