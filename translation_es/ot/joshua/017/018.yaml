revisions:
- from: Pero la región montañosa[a] será tuya; porque es un bosque, y tú la despejarás, y sus extremos[b] serán tuyos. Porque tú despojarás a los cananeos[c], aunque tienen carros de hierro y aunque son fuertes.
  to: Pero la región montañosa[a] será tuya; porque es un bosque, y tú la despejarás, y sus confines[b] serán tuyos. Porque tú desposeerás a los cananeos[c], aunque tienen carros de hierro y aunque son fuertes.
  rationale: Se ajusta «despojarás» a «desposeerás» para reflejar mejor el matiz territorial/legal de תוֹרִישׁ, y «sus extremos» a «sus confines» para una expresión geográfica más natural y precisa en español. El resto del texto se conserva por ser fiel y claro.
