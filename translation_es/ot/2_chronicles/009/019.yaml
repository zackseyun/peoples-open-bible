revisions:
- from: Y doce leones estaban allí, sobre los seis peldaños[a], de este lado y de aquel lado. No se había hecho nada semejante para ningún reino.
  to: Y doce leones estaban colocados allí, sobre los seis peldaños[a], de este lado y de aquel lado. No se había hecho nada semejante para ningún reino.
  rationale: Se revisa «estaban allí» a «estaban colocados allí» para preservar mejor el sentido descriptivo de עֹמְדִים sin forzar un antropomorfismo extraño para figuras de leones. Se mantiene «peldaños» como opción válida y digna. También se corrige el formato de la nota al pie.
