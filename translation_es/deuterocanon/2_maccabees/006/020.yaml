translation:
  language: es
  text: Pero, después de escupirlo[a], avanzó de la manera requerida para quienes están determinados a resistir cosas que no es lícito probar, aun por amor a la vida.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «los que perseveran en resistir cosas que no es lícito probar». El griego comprime perseverancia y resistencia en una frase difícil.
    reason: lexical_alternative
lexical_decisions:
- source_word: προπτύσας
  english_pob_choice: after spitting it out
  chosen_spanish: después de escupirlo
  alternatives_spanish:
  - habiéndolo escupido
  - después de haberlo escupido
  lexicon: LSJ
  rationale: El aoristo participial expresa una acción previa de expulsar de la boca lo que se había tomado. En español, «escupirlo» conserva la acción concreta y natural sin añadir elementos no presentes en el griego.
- source_word: καθʼ ὃν ἔδει τρόπον
  english_pob_choice: in the manner required
  chosen_spanish: de la manera requerida
  alternatives_spanish:
  - como era necesario
  - de la manera debida
  lexicon: LSJ
  rationale: La expresión señala una necesidad o conveniencia normativa. «De la manera requerida» mantiene el matiz de obligación/fuente de corrección, con un español fluido.
- source_word: προσέρχεσθαι
  english_pob_choice: he came forward
  chosen_spanish: avanzó
  alternatives_spanish:
  - se acercó
  - se presentó
  lexicon: LSJ
  rationale: Aunque formalmente es infinitivo, en contexto describe su movimiento hacia la escena del castigo. «Avanzó» comunica ese movimiento narrativo sin forzar la sintaxis española.
- source_word: τοὺς ὑπομένοντας
  english_pob_choice: those who are determined to resist
  chosen_spanish: quienes están determinados a resistir
  alternatives_spanish:
  - los que perseveran
  - los que resisten con firmeza
  lexicon: LSJ
  rationale: ὑπομένω puede significar perseverar o mantenerse firme bajo prueba. Dado que ἀμύνασθαι aclara una resistencia activa, «están determinados a resistir» recoge la perseverancia volitiva sin borrar la tensión del pasaje.
- source_word: ἀμύνασθαι
  english_pob_choice: to resist
  chosen_spanish: resistir
  alternatives_spanish:
  - defenderse de
  - rechazar
  lexicon: LSJ
  rationale: El verbo puede significar defenderse, rechazar o hacer frente. En este contexto se trata de oponerse a una acción prohibida; «resistir» mantiene el sentido activo y directo.
- source_word: ὧν οὐ θέμις γεύσασθαι
  english_pob_choice: things that it is not lawful to taste
  chosen_spanish: cosas que no es lícito probar
  alternatives_spanish:
  - cosas que no se deben comer
  - cosas prohibidas de probar
  lexicon: LSJ
  rationale: «No es lícito» preserva el peso jurídico-religioso de θέμις. «Probar» conserva γεύσασθαι sin reducirlo a «comer», lo cual deja visible la restricción del texto griego.
- source_word: διὰ τὴν πρὸς ζῆν φιλοστοργίαν
  english_pob_choice: even because of one’s love of life
  chosen_spanish: aun por amor a la vida
  alternatives_spanish:
  - incluso por amor a vivir
  - aun por su apego a la vida
  lexicon: LSJ
  rationale: φιλοστοργία expresa afecto o apego entrañable; con πρὸς ζῆν apunta al impulso de conservar la vida. «Por amor a la vida» es breve y natural en español, y conserva la fuerza afectiva del motivo.
theological_decisions:
- issue: Alcance moral y religioso de οὐ θέμις
  english_pob_reading: not lawful
  chosen_spanish_reading: no es lícito
  alternative_spanish_readings:
  - está prohibido
  - no está permitido
  rationale: El contexto de martirio judío exige conservar el carácter moral-sacral de la norma, no solo una preferencia personal. «No es lícito» mantiene el registro legal-religioso del griego.
  doctrine_reference: 'Translation philosophy: original-language primacy over translation tradition; preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión más reciente del POB en inglés, que ajustó la lectura de ὑπομένοντας/ἀμύνασθαι hacia una resistencia determinada y tradujo διὰ τὴν πρὸς ζῆν φιλοστοργίαν de forma más literal como «love of life». La versión española conserva esa tensión, pero la expresa con una fórmula natural y breve («por amor a la vida») sin perder el matiz afectivo.
  spanish_consistency_notes:
  - Se mantiene «lícito» para θέμις, en coherencia con el valor jurídico-religioso del texto.
  - Se traduce γεύσασθαι por «probar» para no borrar la restricción concreta del acto de comer/tocar con la boca.
  - Se evita «Cristo», «Señor» u otros términos no presentes; el versículo no contiene vocabulario cristológico o divino que requiera adaptación terminológica.
  - Se conserva una estructura narrativa española natural, pero sin suavizar la dureza semántica del griego.
