    text: O «que toda la humanidad». El hebreo אָדָם puede referirse a «hombre» o a la humanidad en general; aquí la lista de sabios varones favorece «todos los hombres».
    reason: lexical_alternative
  - marker: b
    text: «Ezrajita» puede reflejar una designación étnica o familiar; algunos la relacionan con «zeraíta».
    reason: lexical_alternative
  - marker: c
    text: 'O «su fama estaba entre todas las naciones vecinas». Literalmente: «su nombre estaba en todas las naciones de alrededor».'
    reason: lexical_alternative
  revision_rationale: La revisión corrige un modismo poco natural en español. El hebreo literal «su nombre estaba» es transparente como base auditiva, pero en el texto principal español resulta más fiel comunicar su sentido idiomático con «su nombre era conocido entre todas las naciones vecinas», manteniendo la alternativa más literal en nota. También se mejora la fluidez de «de alrededor» a «vecinas».
