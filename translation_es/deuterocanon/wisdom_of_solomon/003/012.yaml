translation:
  language: es
  text: Sus mujeres son necias[a], y sus hijos son perversos; su descendencia[b] es maldita.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'esposas'. El griego γυναῖκες puede significar 'mujeres' o 'esposas' según el contexto.
    reason: lexical_alternative
  - marker: b
    text: O 'su linaje es maldito' o 'su generación es maldita'. El griego γένεσις puede referirse a descendencia, linaje o generación.
    reason: lexical_alternative
lexical_decisions:
- source_word: γυναῖκες
  english_pob_choice: women
  chosen_spanish: mujeres
  alternatives_spanish:
  - esposas
  lexicon: LSJ
  rationale: γυνή puede significar 'mujer' o 'esposa' según el contexto. Aquí, como en el inglés POB, 'mujeres' reproduce de forma transparente el plural griego y conserva la ambigüedad contextual sin imponer 'esposas' como lectura obligatoria.
- source_word: ἄφρονες
  english_pob_choice: foolish
  chosen_spanish: insensatas
  alternatives_spanish:
  - necias
  - faltas de entendimiento
  lexicon: LSJ
  rationale: ἄφρων expresa falta de juicio o entendimiento. 'Insensatas' comunica esa carencia con tono natural en español y evita una trivialización excesiva; mantiene la evaluación moral e intelectual del griego.
- source_word: πονηρά
  english_pob_choice: evil
  chosen_spanish: malos
  alternatives_spanish:
  - malvados
  - malignos
  - perversos
  lexicon: LSJ
  rationale: En este contexto, πονηρά porta una carga moral negativa fuerte. 'Malos' es una opción más natural en español para calificar a los hijos sin perder la condena ética; 'malvados' habría reforzado más explícitamente la maldad, pero suena más interpretativo.
- source_word: τέκνα
  english_pob_choice: children
  chosen_spanish: hijos
  alternatives_spanish:
  - niños
  - descendientes
  lexicon: LSJ
  rationale: τέκνα puede ser 'hijos' o 'hijos/niños' según contexto. Aquí, dentro del paralelismo familiar, 'hijos' es la forma más idiomática y directa en español, aunque 'descendientes' sigue siendo posible para un matiz más genealógico.
- source_word: ἐπικατάρατος
  english_pob_choice: accursed
  chosen_spanish: maldita
  alternatives_spanish:
  - maldecida
  - bajo maldición
  - maldita sea
  lexicon: LSJ
  rationale: El adjetivo intensifica la condición de estar bajo maldición. 'Maldita' conserva el peso judicial y es comprensible en español contemporáneo; se evita 'cursed' calcado y también 'bajo maldición' por ser más explicativo que adjetival.
- source_word: γένεσις
  english_pob_choice: offspring
  chosen_spanish: descendencia
  alternatives_spanish:
  - linaje
  - generación
  - prole
  lexicon: LSJ
  rationale: γένεσις puede referirse al origen, linaje, descendencia o generación. 'Descendencia' mantiene la relación genealógica y evita la ambigüedad moderna de 'generación'; además permite diferenciar este tercer miembro del paralelismo frente a 'hijos'.
theological_decisions:
- issue: Fuerza de la condena familiar
  english_pob_reading: The verse is rendered as a direct denunciation of the wicked person's household and descendants, without softening the severe moral judgment.
  chosen_spanish_reading: El versículo se traduce como una denuncia directa de la familia y la descendencia del impío, sin suavizar la severidad del juicio moral.
  alternative_spanish_readings:
  - Una versión más atenuada que presente estas palabras como una desgracia general, no como condena moral.
  - Una lectura que transforme los adjetivos en simples consecuencias sociales o domésticas.
  rationale: El griego usa predicados fuertes y no ofrece base textual para mitigar el tono. La traducción conserva la tensión teológica y la dureza del juicio, en vez de resolverla mediante paráfrasis o suavización.
  doctrine_reference: Preservar la tensión teológica sin resolverla.
translation_notes:
  revision_awareness: El texto base en inglés fue revisado y quedó sin cambios, con acuerdo alto en la auditoría. Esta versión española sigue de cerca esa decisión estable y mantiene las alternativas léxicas relevantes donde el griego admite más de una lectura.
  spanish_consistency_notes:
  - Se mantuvo 'mujeres' y no 'esposas' como forma principal, en continuidad con la decisión inglesa y por transparencia frente al plural griego.
  - '''Insensatas'' y ''malos'' conservan el paralelismo de juicios negativos sin sobreinterpretar el alcance moral.'
  - '''Descendencia'' diferencia el tercer miembro de ''hijos'' y evita que γένεσις se fusione con τέκνα.'
  - Se evitó 'SEÑOR' u otras convenciones no pertinentes; no hay nombre divino en el versículo.
