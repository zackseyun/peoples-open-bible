translation:
  language: es
  text: Porque sus ojos están puestos en los caminos de un hombre[a], y ve todos sus pasos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «los caminos de una persona». El hebreo dice «los caminos de un hombre», con una forma masculina singular de sentido genérico.
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Porque, ya que
  - En efecto
  lexicon: HALOT
  rationale: Introduce la razón o fundamento de lo anterior. En español, «Porque» comunica de forma natural esa relación explicativa sin añadir más contenido que el hebreo.
- source_word: עֵינָיו
  english_pob_choice: his eyes
  chosen_spanish: sus ojos
  alternatives_spanish:
  - su ojo
  - sus miradas
  lexicon: HALOT
  rationale: El sustantivo está en plural con sufijo de 3ms; por tanto, se conserva el plural literal «ojos».
- source_word: עַל
  english_pob_choice: are on
  chosen_spanish: están sobre
  alternatives_spanish:
  - vigilan
  - están puestos sobre
  - están en
  lexicon: HALOT
  rationale: Con «ojos» y un objeto observado, «están sobre» reproduce la relación espacial/atencional del hebreo sin volverlo forzado.
- source_word: דַּרְכֵי אִישׁ
  english_pob_choice: the ways of a man
  chosen_spanish: los caminos de un hombre[a]
  alternatives_spanish:
  - los caminos de una persona
  - los caminos de alguien
  - las sendas de un hombre
  lexicon: HALOT
  rationale: דֶּרֶךְ puede referirse a camino y también a conducta o modo de vida. «Caminos» mantiene esa amplitud; «un hombre» conserva la forma masculina singular genérica del hebreo, tal como refleja la nota del POB en inglés.
- source_word: וְכָל
  english_pob_choice: and all
  chosen_spanish: y todos
  alternatives_spanish:
  - y cada uno
  - y toda
  - e todos
  lexicon: HALOT
  rationale: El hebreo suma y totaliza. En español, «y todos» mantiene la fuerza colectiva y enlaza naturalmente con el sintagma siguiente.
- source_word: צְעָדָיו
  english_pob_choice: his steps
  chosen_spanish: sus pasos
  alternatives_spanish:
  - sus pisadas
  - sus andanzas
  - sus movimientos
  lexicon: HALOT
  rationale: «Pasos» es la equivalencia directa y también idiomática para la imagen de progreso o conducta en la vida.
- source_word: יִרְאֶה
  english_pob_choice: he sees
  chosen_spanish: ve
  alternatives_spanish:
  - observa
  - mira
  - contempla
  lexicon: HALOT
  rationale: El qal imperfecto de ראה expresa aquí observación continua o general. En español, el presente simple «ve» comunica mejor esa verdad permanente que un futuro.
theological_decisions:
- issue: Sujeto implícito en la observación divina
  english_pob_reading: his eyes ... he sees ...
  chosen_spanish_reading: sus ojos ... ve ...
  alternative_spanish_readings:
  - sus ojos ... los ve ...
  - sus ojos ... observa ...
  rationale: El verso, como en el inglés POB, conserva el pronombre implícito sin explicitar el referente, aunque el contexto lo identifica como Dios. Mantener esa forma respeta la sintaxis hebrea y deja intacto el hilo del discurso.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4
- issue: Masculino genérico de אִישׁ
  english_pob_reading: a man
  chosen_spanish_reading: un hombre
  alternative_spanish_readings:
  - una persona
  - al ser humano
  rationale: El hebreo usa singular masculino con valor representativo. Se conserva «un hombre» para no neutralizar indebidamente la forma del original, siguiendo la decisión auditada en inglés.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4
translation_notes:
  revision_awareness: No se registran revisiones aplicadas en el pasaje fuente. El presente borrador sigue el texto hebreo y la decisión auditada del POB inglés sin cambios sustanciales.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma del proyecto cuando el texto lo requiera; en este versículo no aparece el nombre divino explícito.
  - Se preserva el masculino genérico de אִישׁ con nota explicativa, en paralelo al tratamiento auditado del POB inglés.
  - «Caminos» y «pasos» conservan el paralelismo metafórico del hebreo entre conducta general y acciones concretas.
