revisions:
- from: Aun si machacas a un necio[a] en un mortero, con el majadero, entre grano aplastado, su necedad no se apartará de él.
  to: Aun si machacas a un necio en un mortero, con la mano del mortero, entre grano triturado[a], su necedad no se apartará de él.
  rationale: Se corrige el anclaje de la nota para que corresponda a רִיפוֹת, se reemplaza «majadero» por «mano del mortero» para mayor claridad y legibilidad panhispánica, y se afina «grano triturado» como formulación más natural sin alterar el sentido del original ni el razonamiento léxico documentado.
