    issue: La frase «hacia él» debilita ligeramente la fuerza de אֵלָיו.
    rationale: El hebreo expresa dirección personal «a él/to him», no meramente orientación espacial. En español, «hacia él» puede sonar más locativo o gestual que relacional. «A él» preserva mejor el valor de la preposición y la decisión teológica de mantener el pronombre sin explicitar el referente.
  - severity: low
    issue: La prótasis condicional puede beneficiarse de un verbo en subjuntivo para mayor naturalidad bíblica en español.
    rationale: Aunque «Si preparas...» no es incorrecto, «Si preparas tu corazón y extiendes tus manos a él» funciona; no obstante, el ajuste principal requerido es la preposición. No hace falta una reescritura mayor.
