translation:
  language: es
  text: 'Y José dijo a su padre: «No, padre mío, porque este es el primogénito. Pon tu mano derecha sobre su cabeza».'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: וַיֹּאמֶר
  english_pob_choice: And ... said
  chosen_spanish: Entonces ... dijo
  alternatives_spanish:
  - Y ... dijo
  - Luego ... dijo
  lexicon: HALOT
  rationale: La forma narrativa hebrea avanza la acción; «Entonces» comunica el paso discursivo de manera natural en español y mantiene el valor consecutivo sin volver la frase pesada.
- source_word: אֶל אָבִיו
  english_pob_choice: to his father
  chosen_spanish: a su padre
  alternatives_spanish:
  - a su propio padre
  lexicon: HALOT
  rationale: La preposición de dirección más el sufijo se expresa con naturalidad como «a su padre»; en este contexto no hace falta marcar «propio», porque el referente ya está claro en la narración.
- source_word: לֹא כֵן
  english_pob_choice: Not so
  chosen_spanish: No así
  alternatives_spanish:
  - No es así
  - No de esa manera
  lexicon: HALOT
  rationale: La expresión corrige con tacto. «No así» preserva la protesta breve y respetuosa del hebreo sin expandirla innecesariamente.
- source_word: אָבִי
  english_pob_choice: my father
  chosen_spanish: padre mío
  alternatives_spanish:
  - mi padre
  - padre
  lexicon: HALOT
  rationale: Se conserva el tratamiento reverente y explícito del sufijo de primera persona. «Padre mío» suena natural en español bíblico y refleja el tono respetuoso de José.
- source_word: כִּי
  english_pob_choice: for
  chosen_spanish: porque
  alternatives_spanish:
  - pues
  - ya que
  lexicon: HALOT
  rationale: Aquí introduce la razón de la corrección de José. «Porque» comunica bien esa explicación causal en español y mantiene la claridad discursiva.
- source_word: זֶה
  english_pob_choice: this one
  chosen_spanish: éste
  alternatives_spanish:
  - este
  - ese
  lexicon: HALOT
  rationale: El demonstrativo es deíctico y señala al hijo presente. «Éste» conserva esa referencia directa en español con buena fluidez.
- source_word: הַבְּכֹר
  english_pob_choice: the firstborn
  chosen_spanish: el primogénito
  alternatives_spanish:
  - el primero en nacer
  - el hijo mayor
  lexicon: HALOT
  rationale: En español, «primogénito» es el término preciso y digno para el estatus familiar y de herencia del hebreo בְּכוֹר. Mantiene la carga de prioridad y privilegio del contexto de bendición.
- source_word: שִׂים
  english_pob_choice: Put
  chosen_spanish: Pon
  alternatives_spanish:
  - Coloca
  - Mete
  lexicon: HALOT
  rationale: El imperativo simple es directo y natural en español. «Pon» reproduce adecuadamente la orden breve del hebreo.
- source_word: יְמִינְךָ
  english_pob_choice: your right hand
  chosen_spanish: tu mano derecha
  alternatives_spanish:
  - tu diestra
  - tu derecha
  lexicon: HALOT
  rationale: El hebreo alude a la mano derecha de forma concreta. «Tu mano derecha» evita ambigüedad en español moderno y conserva el gesto ritual de bendición.
- source_word: עַל רֹאשׁוֹ
  english_pob_choice: on his head
  chosen_spanish: sobre su cabeza
  alternatives_spanish:
  - encima de su cabeza
  - en su cabeza
  lexicon: HALOT
  rationale: «Sobre su cabeza» es la expresión más natural para el acto físico de imponer la mano en una bendición y mantiene el valor locativo del hebreo.
theological_decisions:
- issue: Primogenitura en el contexto de bendición
  english_pob_reading: the firstborn
  chosen_spanish_reading: el primogénito
  alternative_spanish_readings:
  - el hijo mayor
  - el primero en nacer
  rationale: La escena trata del orden y privilegio de la bendición. «Primogénito» conserva el valor técnico de estatus familiar sin reducirlo solo a edad o secuencia biológica.
  doctrine_reference: Translation philosophy §5 (consistency of key terms, or documented exception)
translation_notes:
  revision_awareness: 'El pasaje coincide plenamente con el audit trail inglés: no hay revisiones aplicadas ni cambios pendientes; la formulación española mantiene la corrección respetuosa, el deíctico y el término técnico de primogenitura.'
  spanish_consistency_notes:
  - Se evitó «SEÑOR» y otros términos no presentes en este versículo.
  - Se mantuvo un registro bíblico sobrio y natural, sin calcos pesados.
  - «Primogénito» se usa como término técnico coherente con el contexto de bendición e herencia.
