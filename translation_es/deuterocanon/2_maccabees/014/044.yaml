revisions:
- from: Pero cuando se retiraron rápidamente[a], y se abrió un espacio, él avanzó hasta el centro del patio.
  to: Pero cuando se retiraron rápidamente[a] y se abrió un espacio, él llegó al centro del patio.
  rationale: Se reemplaza «avanzó hasta el centro» por «llegó al centro» para reflejar con mayor fidelidad el valor simple de ἦλθεν y mantener un español natural. También se elimina la coma antes de «y» para una puntuación más fluida en español, sin cambiar el sentido.
