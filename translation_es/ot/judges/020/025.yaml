revisions:
- from: Benjamín salió de Gibeá para encontrarse con ellos en el segundo día[a], y derribaron a otros dieciocho mil hombres de Israel hasta el suelo[b]; todos estos eran los que sacaban la espada.
  to: Benjamín salió de Gibeá para encontrarse con ellos el segundo día[a], y mataron a otros dieciocho mil hombres de Israel por tierra[b]; todos estos eran de los que sacaban la espada.
  rationale: 'Se ajustó la redacción para un español más natural y más fiel al sentido del hebreo en contexto bélico: «el segundo día» mejora la expresión temporal; «mataron» comunica claramente la acción letal de וַיַּשְׁחִיתוּ con un número de bajas; «por tierra» expresa mejor אָרְצָה que «hasta el suelo»; y la cláusula final se suavizó sin perder la imagen participial de «sacar la espada».'
