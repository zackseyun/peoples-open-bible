translation:
  language: es
  text: La integridad de los rectos los guía, pero la torcedura[a] de los desleales[b] los destruye.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «perversidad» en lugar de «torcedura» para סֶלֶף; el hebreo presenta la imagen de un torcimiento moral en contraste con «rectos».
    reason: lexical_alternative
  - marker: b
    text: La última cláusula también puede traducirse «la perversidad de los desleales los arruina» o, más literalmente, «es su destrucción».
    reason: lexical_alternative
lexical_decisions:
- source_word: תֻּמַּת
  english_pob_choice: integrity
  chosen_spanish: integridad
  alternatives_spanish:
  - blamelessness
  - inocencia
  lexicon: HALOT
  rationale: El sustantivo de תם expresa plenitud o rectitud moral en la sabiduría. «Integridad» comunica bien esa idea en español y evita sugerir sin pecado absoluto, como podría hacerlo «inocencia» en este contexto.
- source_word: יְשָׁרִים
  english_pob_choice: the upright
  chosen_spanish: los rectos
  alternatives_spanish:
  - los justos
  - los honestos
  lexicon: HALOT
  rationale: יָשָׁר describe a quienes son moralmente rectos. «Los rectos» mantiene la imagen ética y funciona de manera natural en un proverbio, en paralelo con «traidores».
- source_word: תַּנְחֵם
  english_pob_choice: guides them
  chosen_spanish: los guía
  alternatives_spanish:
  - los conduce
  - los dirige
  lexicon: HALOT
  rationale: El hiphil de נחה significa guiar o conducir. «Los guía» conserva la idea de dirección moral sin añadir matices innecesarios.
- source_word: סֶלֶף
  english_pob_choice: crookedness
  chosen_spanish: perversidad
  alternatives_spanish:
  - torcedura
  - desviación
  - corrupción
  lexicon: HALOT
  rationale: El término denota torcimiento, distorsión o desvío moral. «Perversidad» comunica bien la fuerza ética del contraste; aunque «torcedura» preservaría más la imagen, suena menos natural en español contemporáneo.
- source_word: בּוֹגְדִים
  english_pob_choice: the treacherous
  chosen_spanish: los traidores
  alternatives_spanish:
  - los pérfidos
  - los infieles
  lexicon: HALOT
  rationale: El participio se refiere a quienes obran con traición o quiebran la confianza. «Los traidores» es claro en español y conserva el carácter moral habitual del proverbio.
- source_word: וְשָׁדָם
  english_pob_choice: destroys them
  chosen_spanish: los destruye
  alternatives_spanish:
  - los arruina
  - los lleva a la ruina
  - los devasta
  lexicon: HALOT
  rationale: La forma procede de שׁדד, con sentido de destrucción o devastación. «Los destruye» es fiel, directo y suficientemente amplio para abarcar tanto ruina como devastación.
translation_notes:
  revision_awareness: La redacción sigue de cerca el hebreo masorético transmitido en WLC y el audit trail en inglés. Se conserva el paralelismo antitético y la tensión lexical entre una imagen concreta de torcimiento y una formulación española natural. No se requieren revisiones textuales adicionales según el estado de alta concordancia.
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando el texto fuente lo requiera; en este versículo no aparece el nombre divino.
  - Se prefirió «los rectos» para mantener el paralelo con «los traidores» y evitar una variación innecesaria.
  - «Perversidad» queda documentado en nota como alternativa por la imagen hebrea de torcimiento moral.
  - El verbo final se presenta en forma directa («los destruye») para reflejar el valor resultativo del hebreo sin sobreexplicar.
