base_translation:
  language: en
  yaml_path: translation/deuterocanon/sirach/029/027.yaml
  text: Go out[a], sojourner, from before honor, for my brother has become a guest to me[b]; there is need of lodging.
  footnotes:
  - marker: a
    text: Or 'from the honored place' or more literally 'from before the face of honor.' The Greek expression is unusual, and the sense is likely that the sojourner must leave a prominent or honored spot to make room for another guest.
    reason: lexical_alternative
  - marker: b
    text: The final phrase could also be rendered 'I need hospitality' or 'there is need of lodging.' The Greek emphasizes the necessity created by receiving another guest.
    reason: lexical_alternative
