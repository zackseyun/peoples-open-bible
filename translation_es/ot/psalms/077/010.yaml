translation:
  language: es
  text: ¿Se ha olvidado Dios de mostrar su gracia? ¿Ha cerrado en su enojo su compasión? Selah[a][b]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «¿Se ha olvidado Dios de mostrar favor? ¿O ha retenido en su enojo sus misericordias?»'
    reason: lexical_alternative
  - marker: b
    text: «Selah» es probablemente un marcador litúrgico o musical; su significado preciso es incierto.
    reason: cultural_note
lexical_decisions:
- source_word: הֲ/שָׁכַח
  english_pob_choice: Has ... forgotten
  chosen_spanish: ¿Se ha olvidado ...?
  alternatives_spanish:
  - ¿Ha olvidado ...?
  - ¿Se ha olvidado de ...?
  lexicon: HALOT
  rationale: La forma interrogativa retórica del hebreo pide un verbo natural en español que exprese el mismo cuestionamiento angustiado. «Se ha olvidado» conserva el sentido de olvido/cesar de recordar sin endurecer el tono.
- source_word: חַנּוֹת
  english_pob_choice: to be gracious
  chosen_spanish: ser misericordioso
  alternatives_spanish:
  - mostrar favor
  - ser gracioso
  lexicon: HALOT
  rationale: Aunque el inglés POB retiene «gracious», en español «misericordioso» comunica con claridad la acción divina de favor/gracia. Se evita «gracioso» por ambigüedad moderna. La elección mantiene la conexión teológica con la gracia divina, aunque con un matiz de misericordia más natural en español bíblico contemporáneo.
- source_word: אֵל
  english_pob_choice: God
  chosen_spanish: Dios
  alternatives_spanish:
  - el Dios Fuerte
  lexicon: HALOT
  rationale: Es el título divino común, no el Tetragrámaton. «Dios» es el equivalente idiomático y claro en español.
- source_word: אִם
  english_pob_choice: Has
  chosen_spanish: ¿Ha ...?
  alternatives_spanish:
  - ¿O ha ...?
  - si ha ...
  lexicon: HALOT
  rationale: Como en el inglés auditado, introduce una segunda pregunta paralela. En español la repetición de la interrogación conserva el paralelismo poético y la tensión retórica.
- source_word: קָפַץ
  english_pob_choice: shut up
  chosen_spanish: encerrado
  alternatives_spanish:
  - cerrado
  - reprimido
  - retenido
  lexicon: HALOT
  rationale: La imagen concreta de cerrar o apretar se expresa de modo natural con «encerrado» en esta construcción con compasión, preservando el gesto figurado de impedir su libre ejercicio. «Retenido» o «cerrado» sonarían más abstractos.
- source_word: בְּ/אַף
  english_pob_choice: in anger
  chosen_spanish: en su enojo
  alternatives_spanish:
  - en ira
  - en cólera
  - en su ira
  lexicon: HALOT
  rationale: אַף refiere a ira/enojo. «En su enojo» es claro y bíblicamente entendible en español; mantiene el vínculo semántico sin forzar un registro excesivamente arcaico.
- source_word: רַחֲמָיו
  english_pob_choice: his compassion
  chosen_spanish: su compasión
  alternatives_spanish:
  - sus misericordias
  - sus tiernas misericordias
  - su misericordia
  lexicon: HALOT
  rationale: El plural hebreo funciona aquí como colectivo abstracto. «Compasión» preserva el valor singular colectivo de la expresión y suena natural en español; se documenta la alternativa tradicional plural en la nota.
- source_word: סֶלָה
  english_pob_choice: Selah
  chosen_spanish: Selah
  lexicon: HALOT
  rationale: Se translitera el marcador litúrgico/musical incierto, siguiendo la cautela del POB inglés y evitando una traducción conjetural.
theological_decisions:
- issue: Si el verso debe presentarse como pregunta retórica o afirmación
  english_pob_reading: Two rhetorical questions expressing the psalmist's distress
  chosen_spanish_reading: Dos preguntas retóricas que expresan la angustia del salmista
  alternative_spanish_readings:
  - Dios se ha olvidado de ser misericordioso.
  - Dios ha encerrado en su enojo su compasión.
  rationale: El hebreo interrogativo y el contexto de lamento favorecen preguntas retóricas. Traducirlas como afirmaciones resolvería indebidamente la tensión del texto y suavizaría el lamento.
  doctrine_reference: Preservar la tensión teológica del lamento en vez de resolverla.
translation_notes:
  revision_awareness: 'El pasaje coincide ampliamente con el audit trail inglés: se mantienen las dos preguntas retóricas, el sentido de חנן como gracia/misericordia, el título divino אֵל como «Dios», el verbo figurado de קָפַץ con una imagen de cierre/retención, y la transliteración de Selah por incertidumbre semántica.'
  spanish_consistency_notes:
  - Se evita «SEÑOR» porque el hebreo aquí usa אֵל y no el Tetragrámaton.
  - «Compasión» conserva mejor el singular colectivo de רַחֲמָיו en español que un plural literal.
  - Se mantiene un registro bíblico moderno y digno, sin arcaísmos innecesarios.
  - La puntuación conserva el paralelismo interrogativo y la pausa litúrgica final.
