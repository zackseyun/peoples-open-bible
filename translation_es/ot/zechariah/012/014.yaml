translation:
  language: es
  text: Todas las familias que quedan[a], familia por familia, aparte, y sus esposas aparte.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «familia por familia ... y sus mujeres por separado». El hebreo usa una repetición distributiva («familias, familias») y repite «aparte/por separado» para dar énfasis.'
    reason: lexical_alternative
lexical_decisions:
- source_word: כֹּל
  english_pob_choice: all
  chosen_spanish: Todas
  alternatives_spanish:
  - Todas las
  - Todas las familias
  lexicon: HALOT
  rationale: El hebreo cuantifica el conjunto completo de las familias restantes; en español, «todas» comunica naturalmente la totalidad sin añadir énfasis innecesario.
- source_word: הַמִּשְׁפָּחוֹת
  english_pob_choice: the families
  chosen_spanish: las familias
  alternatives_spanish:
  - los clanes
  - las casas
  lexicon: HALOT
  rationale: מִשְׁפָּחָה puede ser «familia» o «clan»; aquí «familias» conserva la amplitud del término y funciona bien con la repetición distributiva siguiente.
- source_word: הַנִּשְׁאָרוֹת
  english_pob_choice: that remain
  chosen_spanish: que quedan
  alternatives_spanish:
  - que permanecen
  - que han quedado
  lexicon: HALOT
  rationale: El participio expresa las que han quedado o permanecen; «que quedan» es natural en español y no fuerza la idea hacia «sobrevivientes» más de lo que el hebreo exige.
- source_word: מִשְׁפָּחֹת מִשְׁפָּחֹת
  english_pob_choice: family by family
  chosen_spanish: familia por familia
  alternatives_spanish:
  - familia tras familia
  - clan por clan
  lexicon: HALOT
  rationale: La repetición es distributiva. «Familia por familia» conserva esa distribución en una forma idiomática y transparente en español.
- source_word: לְבָד
  english_pob_choice: by itself
  chosen_spanish: aparte
  alternatives_spanish:
  - por sí sola
  - sola
  lexicon: HALOT
  rationale: El término marca separación o aislamiento. «Aparte» transmite bien la separación repetida en el versículo sin sonar excesivamente literal.
- source_word: וּנְשֵׁיהֶם
  english_pob_choice: and their wives
  chosen_spanish: y sus mujeres
  alternatives_spanish:
  - y sus esposas
  - y sus esposas/mujeres
  lexicon: HALOT
  rationale: En este contexto doméstico puede entenderse como «sus mujeres» o «sus esposas». «Sus mujeres» mantiene la correspondencia con el hebreo sin decidir más de lo necesario; la nota explica la alternativa de lectura.
- source_word: לְבָד
  english_pob_choice: by themselves
  chosen_spanish: aparte
  alternatives_spanish:
  - solas
  - por sí mismas
  lexicon: HALOT
  rationale: La repetición final del separativo refuerza que ellas también están apartadas. «Aparte» mantiene el paralelismo con la primera ocurrencia y el énfasis distributivo.
theological_decisions:
- issue: Distinción explícita entre las familias y sus mujeres
  english_pob_reading: Retain the explicit distinction 'their wives by themselves' in the main text.
  chosen_spanish_reading: Mantener la separación explícita entre las familias y «sus mujeres aparte».
  alternative_spanish_readings:
  - sus esposas aparte
  - las mujeres aparte
  rationale: El hebreo distingue entre los grupos familiares y las mujeres, marcando una participación separada en el lamento. La traducción conserva esa distinción sin neutralizarla.
  doctrine_reference: DOCTRINE.md §Translation philosophy, punto 4
- issue: Repetición distributiva como énfasis
  english_pob_reading: family by family ... by themselves
  chosen_spanish_reading: familia por familia, cada una aparte
  alternative_spanish_readings:
  - familia por familia, aparte
  - cada familia aparte
  rationale: La duplicación hebrea subraya la separación de cada unidad. En español, «familia por familia, cada una aparte» preserva tanto la distribución como el matiz de aislamiento.
  doctrine_reference: DOCTRINE.md §Translation philosophy, punto 2
translation_notes:
  revision_awareness: 'Se corrigió la validación anterior anclando la nota [a] directamente en «aparte[a]» dentro del texto traducido, de modo que cada nota tenga su marcador visible en el lugar correspondiente. La redacción sigue el audit trail inglés: se conserva la repetición distributiva («familia por familia») y la separación reiterada («aparte»).'
  spanish_consistency_notes:
  - Se usa «familias» para מִשְׁפָּחוֹת y no «clanes», siguiendo una opción más natural y suficientemente amplia en español.
  - Se evita «SEÑOR» o equivalentes porque el versículo no contiene el nombre divino.
  - Se mantiene «sus mujeres» para reflejar el hebreo sin forzar una neutralización que borre la distinción explícita del texto.
  - La puntuación española y la colocación del modificador siguen un orden natural en español mientras preservan la repetición del hebreo.
