    rationale: 'Esto produce una incoherencia editorial seria: el lector recibe una nota léxica en el lugar equivocado y se pierde la justificación del idiomatismo hebreo de שֵׁם גָּדוֹל.'
  - severity: medium
    issue: '''Exterminé'' sobretraduce וָאַכְרִתָה.'
    rationale: El hebreo documentado por el POB favorece 'cut off'; 'exterminé' añade una intensidad específica de aniquilación que va más allá de 'quitar/cortar de delante' y reduce la cercanía al texto fuente.
  - severity: medium
    issue: '''un nombre grande'' es menos natural que ''un gran nombre''.'
    rationale: Ambas opciones son posibles, pero 'un gran nombre' es la forma más idiomática y literaria en español para expresar fama/renombre conservando la metáfora bíblica.
  revised_spanish_text: Y yo estuve contigo por dondequiera que anduviste, y eliminé a todos tus enemigos de delante de ti. Y haré para ti un gran nombre[a], como el nombre de los grandes[b] que hay en la tierra.
