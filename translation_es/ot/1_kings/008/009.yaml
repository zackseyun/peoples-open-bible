    reason: lexical_alternative
  - marker: c
    text: 'O: «en Horeb».'
    reason: lexical_alternative
  - marker: d
    text: 'O: «los israelitas» o «los hijos de Israel».'
    reason: lexical_alternative
  revision_rationale: Se corrige la frase principal a 'hizo un pacto con' para una representación más natural y fiel del idiomatismo hebreo en español. También se reordenan y reparan las notas para que cada una ofrezca una alternativa real o una aclaración útil. Se añade una nota para 'los hijos de Israel' con las alternativas documentadas, y se evita la nota defectuosa que repetía la lectura principal sin aportar información nueva.
