translation:
  language: es
  text: 'Entonces Noemí dijo a sus dos nueras: «Vayan, vuélvanse, cada una a la casa de su madre. Que Yahvé les muestre bondad[a], como ustedes la han mostrado a los muertos y a mí».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'amor leal', 'bondad leal' o 'fidelidad de pacto' para חֶסֶד.
    reason: lexical_alternative
lexical_decisions:
- source_word: כַלֹּתֶיהָ
  english_pob_choice: her two daughters-in-law
  chosen_spanish: sus dos nueras
  alternatives_spanish:
  - sus dos hijas por matrimonio
  - sus dos esposas de sus hijos
  lexicon: HALOT
  rationale: En este contexto, כַּלָּה designa a la esposa del hijo; en español, ‘nueras’ es el equivalente natural y preciso, y conserva la relación familiar sin añadir explicación innecesaria.
- source_word: לֵכְנָה שֹּׁבְנָה
  english_pob_choice: Go, return
  chosen_spanish: Vayan, vuélvanse
  alternatives_spanish:
  - Vayan, regresen
  - Vayan, vuelvan
  lexicon: HALOT
  rationale: Los dos imperativos consecutivos intensifican la exhortación. ‘Vayan, vuélvanse’ mantiene esa fuerza y el matiz de movimiento de salida y retorno mejor que reducirlo a una sola orden.
- source_word: אִשָּׁה לְבֵית אִמָּהּ
  english_pob_choice: each to her mother’s house
  chosen_spanish: cada una a la casa de su madre
  alternatives_spanish:
  - cada una a la casa materna
  - cada una a la casa de su madre
  lexicon: HALOT
  rationale: 'El hebreo es distributivo: ‘cada una’. ‘Casa de su madre’ conserva la expresión concreta del hebreo y evita generalizarla a ‘familia’ o ‘hogar’.'
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: Se sigue la convención del proyecto de renderizar el Tetragrámaton como ‘Yahvé’, preservando el nombre propio divino en vez de sustituirlo por un título.
- source_word: חֶסֶד
  english_pob_choice: kindness
  chosen_spanish: misericordia
  alternatives_spanish:
  - bondad
  - bondad leal
  - amor leal
  - fidelidad de pacto
  lexicon: HALOT
  rationale: חֶסֶד abarca bondad leal, fidelidad y benevolencia. En este contexto de bendición, ‘misericordia’ funciona de forma sobria en español, pero se debe preservar la amplitud semántica mediante nota.
- source_word: עֲשִׂיתֶם עִם הַמֵּתִים וְעִמָּדִי
  english_pob_choice: as you have shown it to the dead and to me
  chosen_spanish: como ustedes la han hecho con los muertos y conmigo
  alternatives_spanish:
  - como ustedes han obrado con los muertos y conmigo
  - como ustedes han mostrado esa misericordia a los muertos y a mí
  lexicon: HALOT
  rationale: El verbo עשה con חֶסֶד admite la idea de ‘hacer/mostrar’ bondad. El pronombre ‘la’ mantiene la referencia al sustantivo previo sin forzar una ampliación explicativa; ‘con los muertos’ sigue el hebreo y deja abierta la referencia a los difuntos vinculados a la familia.
theological_decisions:
- issue: Renderización del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: El texto hebreo usa directamente el Tetragrámaton. La política del proyecto pide transliterar el nombre divino como ‘Yahvé’, preservando su carácter de nombre propio del pacto.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Sentido de חֶסֶד en una bendición personal
  english_pob_reading: kindness
  chosen_spanish_reading: misericordia
  alternative_spanish_readings:
  - bondad
  - amor leal
  - fidelidad de pacto
  rationale: Aunque el campo semántico de חֶסֶד es más amplio que ‘misericordia’, el contexto de bendición interpersonal permite esta traducción. La nota conserva las alternativas teológicas y léxicas relevantes sin borrar la tensión semántica.
  doctrine_reference: HALOT; POB lexical note on חֶסֶד
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión inglesa que afinó la frase distributiva de אִשָּׁה como ‘each’, sin añadir una glosa innecesaria. Por eso el español usa ‘cada una’ y evita duplicar sustantivos. También se preserva la estructura paralela de la bendición y el contraste entre ‘los muertos’ y ‘conmigo’.
  spanish_consistency_notes:
  - Se mantiene ‘Yahvé’ para יְהוָה conforme al estándar del proyecto.
  - Se conserva un español natural y eclesialmente legible sin sustituir términos hebreos clave por fórmulas tradicionales que oculten el nombre divino.
  - ‘Nueras’ comunica la relación familiar con precisión y evita el calco innecesario de ‘hijas políticas’.
