translation:
  language: es
  text: Y te convertirás en oprobio y en burla, en advertencia[a] y en horror[b], para las naciones que están alrededor de ti, cuando ejecute sobre ti juicios en ira y en furor, y con reprensiones de furor[c]. Yo soy Yahvé; he hablado.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O también 'instrucción', 'disciplina' o 'corrección'; aquí se refiere a que Jerusalén llega a ser una lección de advertencia para las naciones vecinas.
    reason: lexical_alternative
  - marker: b
    text: O 'desolación' o 'asombro'; aquí se traduce por 'horror' para expresar la reacción provocada entre las naciones.
    reason: lexical_alternative
  - marker: c
    text: 'Hebreo: ''con reprensiones de furor''. La construcción conserva la idea de reprobación severa bajo la ira divina.'
    reason: source_note
lexical_decisions:
- source_word: וְהָיְתָה
  english_pob_choice: you shall become
  chosen_spanish: te convertirás
  alternatives_spanish:
  - serás
  - llegarás a ser
  lexicon: HALOT
  rationale: La forma verbal femenina singular apunta a Jerusalén como interlocutora implícita; en español, el futuro reflexivo/dativo 'te convertirás' comunica bien el cambio de condición con naturalidad, sin perder el sentido de transformación anunciado.
- source_word: חֶרְפָּה
  english_pob_choice: a reproach
  chosen_spanish: oprobio
  alternatives_spanish:
  - afrenta
  - reproche
  - deshonra
  lexicon: HALOT
  rationale: '''Oprobio'' conserva la vergüenza pública y la deshonra social del término hebreo, con tono profético solemne. ''Reproche'' en español suele sonar más a reprensión que a vergüenza pública, por eso no se eligió como principal.'
- source_word: גְדוּפָה
  english_pob_choice: a taunt
  chosen_spanish: burla
  alternatives_spanish:
  - escarnio
  - insulto
  - mofa
  lexicon: HALOT
  rationale: El sustantivo denota habla injuriosa o de vituperio; 'burla' transmite el acto verbal de menosprecio de forma clara y publicable en español. Se mantiene la distinción con 'oprobio' para no fusionar vergüenza y burla.
- source_word: מוּסָר
  english_pob_choice: a warning
  chosen_spanish: advertencia
  alternatives_spanish:
  - instrucción
  - disciplina
  - corrección
  - amonestación
  lexicon: HALOT
  rationale: 'En este contexto judicial, el valor no es solo educativo sino ejemplar: Jerusalén llega a ser un caso que advierte a otros pueblos. ''Advertencia'' preserva mejor esa función que una traducción más escolar como ''instrucción''.'
- source_word: מְשַׁמָּה
  english_pob_choice: a horror
  chosen_spanish: horror
  alternatives_spanish:
  - desolación
  - espanto
  - asombro
  lexicon: HALOT
  rationale: Dado que el sustantivo aparece dentro de una lista de lo que Jerusalén llega a ser 'para las naciones', el énfasis recae en la reacción que provoca la devastación. 'Horror' conserva ese efecto en español y sigue siendo idiomático.
- source_word: לַגּוֹיִם אֲשֶׁר סְבִיבוֹתָיִךְ
  english_pob_choice: to the nations that are around you
  chosen_spanish: para las naciones que están alrededor de ti
  alternatives_spanish:
  - a las naciones que te rodean
  - para las naciones cercanas a ti
  lexicon: HALOT
  rationale: El hebreo indica relación de referencia y proximidad geográfica. 'Para las naciones que están alrededor de ti' mantiene la dirección del efecto y el marco espacial sin volverlo demasiado abstracto.
- source_word: בַּעֲשׂוֹתִי בָךְ שְׁפָטִים
  english_pob_choice: when I execute judgments on you
  chosen_spanish: cuando ejecute sobre ti juicios
  alternatives_spanish:
  - cuando haga sobre ti juicios
  - cuando ejerza juicios contra ti
  - cuando ejecute juicios contra ti
  lexicon: HALOT
  rationale: La construcción infinitiva con preposición es temporal ('cuando'), y שְׁפָטִים conserva su sentido judicial. 'Juicios' mantiene esa fuerza sin sustituirlo por 'castigos', que sería más interpretativo.
- source_word: בְּאַף
  english_pob_choice: in anger
  chosen_spanish: en ira
  alternatives_spanish:
  - con ira
  - en enojo
  lexicon: HALOT
  rationale: אַף en contextos divinos suele expresar ira; 'en ira' suena natural en español bíblico contemporáneo y conserva el tono judicial solemne.
- source_word: וּבְחֵמָה
  english_pob_choice: and in wrath
  chosen_spanish: y en furor
  alternatives_spanish:
  - y en ira
  - y con furor
  - y en cólera
  lexicon: HALOT
  rationale: Se mantiene la distinción entre אַף y חֵמָה con un segundo término intensificado. 'Furor' comunica bien la vehemencia de la cólera divina sin repetir exactamente 'ira'.
- source_word: וּבְתֹכְחוֹת חֵמָה
  english_pob_choice: and with wrathful rebukes
  chosen_spanish: y con reprensiones de furor
  alternatives_spanish:
  - y con reprensiones airadas
  - y con reproches de furor
  - y con reprensiones en furor
  lexicon: HALOT
  rationale: תֹכְחוֹת son reprensiones o reprobaciones; el genitivo חֵמָה las cualifica. 'Reprensiones de furor' conserva ambos elementos y deja visible la tensión entre corrección verbal y cólera.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  - Jehová
  lexicon: HALOT
  rationale: 'Se sigue el criterio del proyecto para el Tetragrámaton: transliterar el nombre divino como ''Yahvé'', evitando la sustitución por un título. Esta forma es clara y reconocible en español bíblico.'
- source_word: דִּבַּרְתִּי
  english_pob_choice: I have spoken
  chosen_spanish: he hablado
  alternatives_spanish:
  - lo he dicho
  - hablé
  lexicon: HALOT
  rationale: El perfecto funciona como fórmula solemne de cierre y certeza profética. 'He hablado' mantiene esa declaración conclusiva en español y evita una paráfrasis más libre.
theological_decisions:
- issue: Nombre divino del Tetragrámaton
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - Jehová
  rationale: El texto hebreo contiene יְהוָה directamente; siguiendo el criterio del proyecto, se conserva el nombre propio divino en transliteración y no se lo sustituye por un título como 'Señor'.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Matiz de מוּסָר en contexto de juicio
  english_pob_reading: a warning
  chosen_spanish_reading: advertencia
  alternative_spanish_readings:
  - instrucción
  - disciplina
  - corrección
  - amonestación
  rationale: En esta escena Jeremías no está frente a enseñanza general sino a un juicio que convierte a Jerusalén en señal para los pueblos vecinos. 'Advertencia' retiene el carácter ejemplar sin diluirlo en una noción pedagógica más neutral.
  doctrine_reference: DOCTRINE.md Translation philosophy §1, §5
- issue: Matiz de מְשַׁמָּה
  english_pob_reading: a horror
  chosen_spanish_reading: horror
  alternative_spanish_readings:
  - desolación
  - espanto
  - asombro
  rationale: Como el término aparece en una enumeración de lo que Jerusalén llega a ser para las naciones, el foco no está solo en el estado de ruina sino en el impacto que produce. 'Horror' conserva esa respuesta de consternación en español.
  doctrine_reference: DOCTRINE.md Translation philosophy §6
translation_notes:
  revision_awareness: El pasaje coincide ampliamente con la última versión auditada en inglés, que fue aprobada sin cambios sustanciales; esta versión española sigue esa lectura y solo ajusta la expresión para naturalidad y fidelidad al hebreo, manteniendo la secuencia semántica de reproche/burla, advertencia/horror y la fórmula conclusiva divina.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' para יְהוָה conforme al estándar del proyecto.
  - Se conserva la distinción entre los pares semánticos 'oprobio / burla' y 'advertencia / horror'.
  - '''Juicios'' se usa para שְׁפָטִים, preservando el valor judicial del término.'
  - La clausura profética 'he hablado' refleja el perfecto hebreo como declaración solemne.
