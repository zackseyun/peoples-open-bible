- issue: Conjugal euphemism in πρὶν ἢ γενέσθαι αὐτοὺς μετʼ αὐτῆς ὡς ἐν γυναιξίν
  chosen_reading: 'Render as a modest but clear reference to marital relations: ''before they could be with her as with wives.'''
  alternative_readings:
  - before they had relations with her
  - before they came together with her
  rationale: The Greek uses euphemistic language rather than an explicit sexual verb. The translation preserves that restraint while making the sense clear enough for modern readers.
  doctrine_reference: 'Translation philosophy: optimal equivalence; preserve source meaning without paraphrase.'
