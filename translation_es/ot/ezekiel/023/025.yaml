    issue: קִנְאָתִי se tradujo 'mi celo' en vez de una forma que preserve 'my jealousy'
    rationale: 'La decisión auditada en inglés fue explícitamente teológica y contextual: ''jealousy'' preserva mejor la imagen pactual/matrimonial del juicio. En español, ''mis celos'' o ''mi celosa indignación'' sería más cercano; ''mi celo'' reduce la fuerza relacional y cambia el matiz.'
  - severity: medium
    issue: La nota [a] no ofrece una alternativa real y defiende una desviación del audit trail
    rationale: Dice 'O pondré mi celo contra ti', que repite el texto principal, y además justifica preferir 'celo' frente a 'celos', contrariando la decisión inglesa documentada.
