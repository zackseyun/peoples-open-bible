translation:
  language: es
  text: Así, un hombre justo que no tiene ídolos es mejor[a], pues estará lejos del oprobio[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «una persona justa». El griego usa el singular masculino ἄνθρωπος, aquí con sentido representativo.
    reason: lexical_alternative
  - marker: b
    text: «Oprobio» también puede expresarse como «reproche», «desgracia» o «vergüenza».
    reason: lexical_alternative
lexical_decisions:
- source_word: κρείσσον
  english_pob_choice: better
  chosen_spanish: es mejor
  alternatives_spanish:
  - es superior
  - es más excelente
  lexicon: LSJ
  rationale: Comparativo predicativo. «Es mejor» es la forma más natural en español y conserva el valor evaluativo sin elevar el registro innecesariamente.
- source_word: οὖν
  english_pob_choice: so
  chosen_spanish: Así
  alternatives_spanish:
  - por tanto
  - entonces
  lexicon: LSJ
  rationale: Marca una conclusión inferida del contexto anterior. «Así» funciona de manera natural en español y mantiene el enlace lógico.
- source_word: ἄνθρωπος δίκαιος
  english_pob_choice: a righteous man
  chosen_spanish: un hombre justo
  alternatives_spanish:
  - una persona justa
  - un ser humano justo
  lexicon: LSJ
  rationale: El griego usa el singular masculino ἄνθρωπος. Se conserva «hombre» por fidelidad gramatical y el valor representativo; «justo» reproduce bien δίκαιος en este contexto.
- source_word: οὐκ ἔχων εἴδωλα
  english_pob_choice: who has no idols
  chosen_spanish: que no tiene ídolos
  alternatives_spanish:
  - sin ídolos
  - que no posee ídolos
  lexicon: LSJ
  rationale: El participio modifica a «hombre». «Que no tiene ídolos» es una construcción clara y natural en español, manteniendo la negación de posesión/asociación del griego.
- source_word: ἔσται
  english_pob_choice: he will be
  chosen_spanish: estará
  alternatives_spanish:
  - será
  lexicon: LSJ
  rationale: Futuro de εἰμί. «Estará» es directo y idiomático en español moderno.
- source_word: μακρὰν ἀπὸ ὀνειδισμοῦ
  english_pob_choice: far from reproach
  chosen_spanish: lejos del oprobio
  alternatives_spanish:
  - lejos del reproche
  - lejos de la vergüenza
  - lejos de la deshonra
  lexicon: LSJ
  rationale: ὀνειδισμός puede ser «reproche», «desgracia» o «vergüenza». «Oprobio» conserva la carga de deshonra pública y queda bien en un registro bíblico digno sin perder precisión.
theological_decisions:
- issue: Masculino singular representativo en ἄνθρωπος
  english_pob_reading: a righteous man
  chosen_spanish_reading: un hombre justo
  alternative_spanish_readings:
  - una persona justa
  - un hombre recto
  rationale: Se conserva el masculino singular del griego, como en la decisión inglesa, porque el término funciona aquí de manera representativa y no exige neutralización.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4
translation_notes:
  revision_awareness: El texto griego y el control de calidad inglés muestran acuerdo alto; no se registran revisiones aplicadas y la redacción española sigue la lectura confirmada sin introducir cambios interpretativos adicionales.
  spanish_consistency_notes:
  - Se mantuvo «ídolos» para εἴδωλα, en continuidad con el término bíblico técnico y sin sustituirlo por una paráfrasis.
  - Se preservó el orden lógico del original con una conclusión inicial («Así») y una cláusula causal («pues»).
  - Se evitó «SEÑOR» u სხვა terminología de nombre divino porque este versículo no contiene el tetragrámaton ni κύριος.
