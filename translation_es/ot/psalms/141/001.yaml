revisions:
- from: Salmo de David. Yahvé[a], te invoco; apresúrate a mí. Da oído a mi voz cuando te invoco.
  to: Salmo de David. Yahvé[a], te invoco; ven pronto a mí. Presta oído a mi voz cuando te invoco.
  rationale: 'Se ajustan dos expresiones para mejorar la naturalidad y fidelidad funcional en español: «ven pronto a mí» evita un calco poco idiomático y mantiene la urgencia de חוּשָׁה לִּי; «Presta oído» preserva mejor el tono poético de הַאֲזִינָה en español actual. Se mantiene «Yahvé» y su nota conforme a la política terminológica del proyecto y al audit trail inglés.'
