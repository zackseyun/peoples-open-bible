translation:
  language: es
  text: Y el reino quedó establecido[a] ante Antíoco; y emprendió gobernar la tierra de Egipto, para reinar sobre los dos reinos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, más literalmente: «el reino fue preparado ante Antíoco». La redacción griega puede sugerir que su dominio quedó asegurado antes de que se volviera hacia Egipto.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἡτοιμάσθη
  english_pob_choice: was established
  chosen_spanish: quedó establecido
  alternatives_spanish:
  - fue preparado
  - fue hecho listo
  - quedó asegurado
  lexicon: LSJ
  rationale: El pasivo de ἑτοιμάζω significa literalmente ‘ser preparado / puesto listo’, pero en el contexto real y político apunta a que el reino quedó dispuesto o asegurado para Antíoco. ‘Quedó establecido’ comunica ese sentido sin perder la idea de una situación ya fijada.
- source_word: ἡ βασιλεία
  english_pob_choice: the kingdom
  chosen_spanish: el reino
  alternatives_spanish:
  - la realeza
  - el poder real
  lexicon: LSJ
  rationale: Aquí βασιλεία se entiende mejor como entidad política concreta. ‘El reino’ preserva el sentido territorial-político que el contexto desarrolla en la mención de Egipto y de ‘los dos reinos’.
- source_word: ἐνώπιον Ἀντιόχου
  english_pob_choice: before Antiochus
  chosen_spanish: delante de Antíoco
  alternatives_spanish:
  - ante Antíoco
  - en presencia de Antíoco
  - para Antíoco
  lexicon: LSJ
  rationale: ‘Delante de’ conserva la preposición griega de manera natural en español. La frase deja abierta la matización contextual de que el reino quedó puesto en una स्थिति favorable o asegurada para él, sin explicitarla en el texto principal.
- source_word: ὑπέλαβεν
  english_pob_choice: undertook
  chosen_spanish: se propuso
  alternatives_spanish:
  - se dispuso a
  - tomó sobre sí
  - intentó
  lexicon: LSJ
  rationale: Con el infinitivo βασιλεῦσαι, el verbo indica asumir o emprender la intención de reinar. ‘Se propuso’ expresa bien la toma de iniciativa y evita volverlo demasiado interpretativo.
- source_word: βασιλεῦσαι
  english_pob_choice: to rule
  chosen_spanish: reinar
  alternatives_spanish:
  - gobernar
  - ejercer dominio sobre
  - ser rey sobre
  lexicon: LSJ
  rationale: El infinitivo denota ejercer autoridad real. En español, ‘reinar’ conserva mejor el matiz de soberanía que ‘gobernar’ y armoniza con el contexto monárquico.
- source_word: γῆς Αἰγύπτου
  english_pob_choice: the land of Egypt
  chosen_spanish: la tierra de Egipto
  alternatives_spanish:
  - Egipto
  - el territorio de Egipto
  lexicon: LSJ
  rationale: La construcción genitiva se refleja con ‘la tierra de Egipto’, manteniendo el énfasis territorial del griego y la formulación auditable del original.
- source_word: ὅπως
  english_pob_choice: so that
  chosen_spanish: para que
  alternatives_spanish:
  - a fin de que
  - de modo que
  lexicon: LSJ
  rationale: Introduce finalidad. ‘Para que’ reproduce de forma clara y natural el valor purposivo de la cláusula en español.
- source_word: ἐπὶ τὰς δύο βασιλείας
  english_pob_choice: over the two kingdoms
  chosen_spanish: sobre los dos reinos
  alternatives_spanish:
  - sobre ambos reinos
  - sobre las dos realeza
  lexicon: LSJ
  rationale: ‘Sobre los dos reinos’ es la traducción más directa y transparente. Conserva la referencia a dos entidades políticas distintas, tal como la lectura auditada del inglés identifica a su propio reino y Egipto.
translation_notes:
  revision_awareness: La revisión más reciente no introdujo cambios; el control de concordancia señala acuerdo alto y no se detectaron ajustes pendientes respecto del texto fuente y la decisión inglesa auditada.
  spanish_consistency_notes:
  - Se conserva Yahvé para el tetragrámaton por norma del proyecto; este versículo no lo contiene.
  - ‘Reino’ se mantiene como sustantivo político, no como ‘realeza’, para corresponder con la lectura contextual de βασιλεία.
  - No se añadió comentario interpretativo al cuerpo del versículo; la matización sobre el posible sentido de ἡτοιμάσθη queda en la nota.
  - ‘Reinar’ se usa para βασιλεῦσαι por su naturalidad en español y por mantener el campo semántico monárquico.
