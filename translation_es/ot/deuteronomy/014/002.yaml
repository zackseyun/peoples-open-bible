translation:
  language: es
  text: Porque tú eres un pueblo santo para Yahvé tu Dios, y Yahvé te ha escogido para que seas para él un pueblo atesorado[a], de entre todos los pueblos que hay sobre la faz de la tierra.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «un pueblo para su posesión atesorada». El hebreo סְגֻלָּה designa una posesión especialmente valiosa.
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Ya que
  lexicon: HALOT
  rationale: Introduce la razón del mandato anterior; «porque» conserva bien la fuerza explicativa y es natural en español.
- source_word: עַם קָדוֹשׁ
  english_pob_choice: a holy people
  chosen_spanish: un pueblo santo
  alternatives_spanish:
  - un pueblo consagrado
  - un pueblo sagrado
  lexicon: HALOT
  rationale: «Santo» mantiene el valor de consagración/covenantalidad del hebreo sin cargar el texto con una paráfrasis más interpretativa.
- source_word: לַיהוָה אֱלֹהֶיךָ
  english_pob_choice: to Yahweh your God
  chosen_spanish: para Yahvé tu Dios
  alternatives_spanish:
  - de Yahvé tu Dios
  - perteneciente a Yahvé tu Dios
  lexicon: HALOT
  rationale: La preposición ל indica relación de pertenencia/dedicación; «para» funciona de forma natural en español y preserva esa relación.
- source_word: בָּחַר
  english_pob_choice: has chosen
  chosen_spanish: ha escogido
  alternatives_spanish:
  - ha elegido
  - escogió
  lexicon: HALOT
  rationale: «Escogido» comunica bien el acto soberano de selección. Se prefiere el perfecto compuesto para expresar vigencia presente del acto divino.
- source_word: לִהְיוֹת לוֹ
  english_pob_choice: to be ... for himself
  chosen_spanish: para que seas para él
  alternatives_spanish:
  - para ser suyo
  - para que le pertenezcas
  lexicon: HALOT
  rationale: El hebreo expresa propósito/resultadо de la elección; la forma final evita sonar artificial y conserva la referencia relacional a Dios.
- source_word: לְעַם סְגֻלָּה
  english_pob_choice: a treasured people
  chosen_spanish: un pueblo especial[a]
  alternatives_spanish:
  - un pueblo tesoro
  - un pueblo precioso
  - un pueblo de su propiedad
  lexicon: HALOT
  rationale: סְגֻלָּה denota una posesión especialmente valiosa. «Pueblo especial» suena natural en español, y la nota conserva la alternativa más literal de «posesión/tesoro valioso» sin borrar la tensión lexical.
- source_word: מִכֹּל הָעַמִּים
  english_pob_choice: out of all the peoples
  chosen_spanish: de entre todos los pueblos
  alternatives_spanish:
  - entre todos los pueblos
  - de todos los pueblos
  lexicon: HALOT
  rationale: «De entre» expresa con claridad la selección desde un conjunto mayor y evita sugerir superioridad no explicitada por el hebreo.
- source_word: אֲשֶׁר עַל פְּנֵי הָאֲדָמָה
  english_pob_choice: who are on the face of the earth
  chosen_spanish: que hay sobre la faz de la tierra
  alternatives_spanish:
  - que están sobre la faz de la tierra
  - que están sobre la superficie de la tierra
  lexicon: HALOT
  rationale: El giro idiomático hebreo se vierte con una fórmula española natural. «Faz de la tierra» conserva el tono bíblico sin ser arcaizante en exceso.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  lexicon: HALOT
  rationale: Se sigue el estándar del proyecto para el nombre divino, manteniendo la transparencia frente al texto hebreo.
theological_decisions:
- issue: Lenguaje de elección y pertenencia de Israel
  english_pob_reading: Render the verse as covenant election to belonging and treasured status without adding implications of ethnic superiority or later theological systems.
  chosen_spanish_reading: Presentar la elección como pertenencia pactal y estado de especial valor, sin añadir superioridad étnica ni sistemas doctrinales posteriores.
  alternative_spanish_readings:
  - traducir «de entre todos» como «por encima de todos»
  - parafrasear hacia una doctrina sistemática de predestinación
  rationale: El hebreo afirma elección divina y estatus de posesión valiosa; la traducción conserva esa afirmación y evita ampliar el alcance del texto más allá de sus palabras.
  doctrine_reference: Preservar la tensión teológica del texto; primacía del hebreo sobre tradiciones interpretativas posteriores.
translation_notes:
  revision_awareness: Revisé el paralelo inglés auditado y su nota sobre סְגֻלָּה. Mantengo la idea de «pueblo santo» y la selección «de entre todos los pueblos», pero adapto el cierre a una formulación española más natural sin perder la relación de pertenencia ni la alternativa lexical documentada.
  spanish_consistency_notes:
  - Uso «Yahvé» según el estándar del proyecto para יהוה.
  - Uso «pueblo santo» para עַם קָדוֹשׁ, en continuidad con la consagración pactal.
  - Conservo una nota para סְגֻלָּה para no borrar la alternativa documental de «posesión especial».
  - Mantengo «de entre todos los pueblos» para respetar el valor selectivo de מִן sin introducir superioridad implícita.
