revisions:
- from: Tú convocaste mis terrores[a] desde todos lados, como en un día señalado, y en el día de la ira de Yahvé no hubo sobreviviente ni remanente. A los que yo crié y eduqué, mi enemigo los destruyó.
  to: Tú convocaste mis terrores de todas partes, como en un día señalado[a], y en el día de la ira de Yahvé no hubo sobreviviente ni remanente. A los que yo crié y hice crecer, mi enemigo los destruyó.
  rationale: Se corrige la nota para alinearla con la evidencia fuente y el audit trail inglés, anclándola en ‘día señalado’ y preservando la alternativa ‘día de fiesta / festival’. Se reemplaza ‘eduqué’ por ‘hice crecer’ para reflejar mejor el sentido de crianza/levantamiento de וְרִבִּיתִי en paralelo con ‘crié’. También se suaviza ‘desde todos lados’ a ‘de todas partes’ por mayor naturalidad sin cambiar el sentido.
