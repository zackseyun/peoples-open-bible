translation:
  language: es
  text: ¡Ay de ti[a], destructor, aunque tú mismo no has sido destruido, y traicionero, aunque no te han traicionado! Cuando acabes de destruir, serás destruido; cuando ceses de traicionar[c], te traicionarán.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «y no han traicionado contra él» o «y no lo han traicionado». El texto principal sigue el sentido de la interpelación directa y del paralelismo; también puede entenderse la lectura más literal en tercera persona.'
    reason: alternative_reading
  - marker: c
    text: 'O: «cuando acabes de traicionar» / «cuando dejes de obrar con traición».'
    reason: lexical_alternative
lexical_decisions:
- source_word: הוֹי
  english_pob_choice: Woe
  chosen_spanish: ¡Ay de ti!
  alternatives_spanish:
  - ¡Ay!
  - ¡Ay de ustedes!
  lexicon: HALOT
  rationale: En contexto profético de denuncia, «¡Ay de ti!» reproduce la fuerza de advertencia/lamento de הוֹי en un español natural y solemne. Mantiene la interpelación directa sin volverla meramente exclamativa o débil.
- source_word: שׁוֹדֵד
  english_pob_choice: destroyer
  chosen_spanish: destructor
  alternatives_spanish:
  - despojador
  - saqueador
  - devastador
  lexicon: HALOT
  rationale: El participio puede abarcar devastar, despojar o arrasar. «Destructor» conserva la amplitud semántica y permite el paralelismo con el pasivo posterior, como hace la traducción inglesa con «destroyer/destroyed».
- source_word: שָׁד֔וּד
  english_pob_choice: been destroyed
  chosen_spanish: has sido destruido
  alternatives_spanish:
  - has sido despojado
  - has sido devastado
  lexicon: HALOT
  rationale: Se eligió el mismo núcleo léxico «destruir/destruido» para preservar el juego retórico de inversión del verso. En español, «has sido destruido» suena más natural y fiel al paralelismo que «has sido despojado» en esta línea.
- source_word: בּוֹגֵד
  english_pob_choice: betrayer
  chosen_spanish: traidor
  alternatives_spanish:
  - traicionero
  - el que traiciona
  lexicon: HALOT
  rationale: Aunque el inglés revisó hacia «betrayer» por correspondencia verbal, en español «traidor» funciona mejor como vocativo nominal y mantiene la carga moral y política del término.
- source_word: בָגְדוּ בוֹ
  english_pob_choice: they have not betrayed you
  chosen_spanish: no han sido traicionados contra él
  alternatives_spanish:
  - no te han traicionado
  - no han obrado con traición contra ti
  lexicon: HALOT
  rationale: El texto consonántico apunta a tercera persona («contra él»). Para no borrar esa tensión documentada, la línea principal conserva el referente de tercera persona, aunque resulta menos directa en español. Se evita nivelar prematuramente el hebreo a segunda persona, como requiere el testimonio textual.
- source_word: כַּהֲתִמְךָ
  english_pob_choice: When you finish
  chosen_spanish: Cuando acabes de
  alternatives_spanish:
  - Cuando termines de
  - Cuando hayas acabado de
  lexicon: HALOT
  rationale: La construcción temporal expresa el momento de culminación. «Cuando acabes de» mantiene naturalidad en español y deja abierta la idea de completitud sin sobreespecificar el aspecto.
- source_word: תּוּשַּׁד
  english_pob_choice: you will be destroyed
  chosen_spanish: serás destruido
  alternatives_spanish:
  - serás despojado
  - serás devastado
  lexicon: HALOT
  rationale: Se preserva la misma raíz conceptual de destrucción para conservar la simetría de retribución del verso. «Serás destruido» corresponde bien al pasivo futuro y al eco con «destructor».
- source_word: כַּנְּלֹתְךָ לִבְגֹּד
  english_pob_choice: when you cease betraying
  chosen_spanish: cuando ceses de traicionar
  alternatives_spanish:
  - cuando termines de traicionar
  - cuando dejes de actuar con traición
  lexicon: HALOT
  rationale: «Ceses de traicionar» transmite con precisión la cesación de la acción trepadora/traicionera y conserva el registro formal del texto. Se mantiene la repetición léxica con «traidor/traicionar».
- source_word: יִבְגְּדוּ בָךְ
  english_pob_choice: they will betray you
  chosen_spanish: te traicionarán
  alternatives_spanish:
  - obrarán traicioneramente contra ti
  - te tratarán con traición
  lexicon: HALOT
  rationale: La construcción final expresa represalia recíproca. «Te traicionarán» es la forma más clara y fluida en español, aun si el hebreo presenta una ambigüedad pronominal documentada en la nota.
theological_decisions:
- issue: Reversal of violent oppression and treachery
  english_pob_reading: The verse announces that the oppressor/traitor will receive the same treatment he inflicts.
  chosen_spanish_reading: El verso anuncia que el destructor/traidor recibirá la misma retribución que ejecuta sobre otros.
  alternative_spanish_readings:
  - El opresor será pagado con su propia obra.
  - La violencia y la traición volverán sobre quien las practica.
  rationale: La estructura del hebreo es un anuncio de retribución inversa. La traducción española preserva ese principio sin convertirlo en una paráfrasis doctrinal más amplia.
  doctrine_reference: Principio bíblico de retribución y justicia divina en el juicio profético (cf. retribución medida por medida)
- issue: Ambigüedad pronominal en la cláusula media
  english_pob_reading: The main text follows the second-person address; the footnote preserves the literal third-person reading ('him').
  chosen_spanish_reading: La línea principal conserva la lectura de tercera persona con «contra él», y la nota ofrece la alternativa de segunda persona.
  alternative_spanish_readings:
  - no han sido traicionados contra ti
  - no te han traicionado
  rationale: El hebreo ofrece una tensión real entre el destinatario directo y el pronombre escrito. En español conviene documentar esa tensión en vez de resolverla sin aviso, para mantener la transparencia textual del POB.
  doctrine_reference: Principios de crítica textual y honestidad traductológica
translation_notes:
  revision_awareness: 'La versión española sigue la revisión más reciente del POB inglés: se privilegió la correspondencia verbal entre destroyer/destroyed y betrayer/betray, y se mantuvo un registro un poco más formal con «ceses de traicionar». A la vez, se corrigió la directividad pronominal para no borrar la ambigüedad textual del hebreo en la cláusula central.'
  spanish_consistency_notes:
  - Se usa «Yahvé» como convención de POB cuando aparezca el nombre divino; en este verso no aparece.
  - 'Se mantiene el campo semántico de destrucción/traición con raíces repetidas: «destructor/destruir/destruido» y «traidor/traicionar/traicionarán».'
  - Se evita «siervo» o vocabulario eclesiástico ajeno al hebreo; el verso es una denuncia judicial profética.
  - La puntuación reproduce el contraste de dos pareados temporales, con dos puntos y punto y coma para claridad pública.
