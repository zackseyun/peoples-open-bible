lexical_decisions:
- source_word: οἱ ... δύο δράκοντες
  english_pob_choice: the two dragons
  chosen_spanish: los dos dragones
  alternatives_spanish:
  - los dos serpientes
  lexicon: LSJ
  rationale: δράκοντες en griego puede denotar dragones o grandes serpientes. Se mantiene 'dragones' para conservar la imaginería vívida del sueño y la correspondencia directa con el plural del original, como hace la traducción inglesa auditada.
- source_word: ἐγώ εἰμι
  english_pob_choice: are I
  chosen_spanish: yo
  alternatives_spanish:
  - soy yo
  - estoy yo
  lexicon: BDAG
  rationale: El griego usa el pronombre enfático con el verbo copulativo para una identificación. En español, la identificación queda explícita y natural con el pronombre sujeto 'yo' dentro de la frase de equivalencia; el verbo 'son' del enunciado cubre la relación plural del sujeto 'los dos dragones' con los dos referentes.
- source_word: Ἁμάν
  english_pob_choice: Haman
  chosen_spanish: Amán
  alternatives_spanish:
  - Haman
  lexicon: transliteración convencional
  rationale: Se usa la forma tradicional española 'Amán', conforme al hábito de transliterar nombres propios bíblicos en español de forma legible y estándar.
- source_word: δέ
  english_pob_choice: But
  chosen_spanish: Pero
  alternatives_spanish:
  - Y
  - Ahora
  lexicon: BDAG
  rationale: δέ marca un giro suave. 'Pero' comunica bien el paso explicativo e identificativo del sueño al señalar a los personajes representados.
theological_decisions:
- issue: Identificación simbólica de los dragones en el sueño de Ester
  english_pob_reading: 'The verse is rendered as a direct identification: the two dragons symbolize Mordecai (''I'') and Haman.'
  chosen_spanish_reading: 'El verso se traduce como una identificación directa: los dos dragones corresponden a ''yo'' y a Amán, sin añadir explicación interpretativa.'
  alternative_spanish_readings:
  - Los dos dragones son Mardoqueo y Amán.
  - Los dos serpientes son yo y Amán.
  rationale: El griego presenta una identificación sencilla y no exige expansión interpretativa. La traducción conserva la tensión simbólica del texto y deja implícito, como en el original, que el hablante se refiere a sí mismo.
  doctrine_reference: Priorizar la primacía del idioma original y preservar la tensión simbólica sin resolverla mediante paráfrasis.
translation_notes:
  revision_awareness: La revisión más reciente del proyecto indicó que no se requerían cambios; este borrador sigue el texto griego normalizado y mantiene la misma decisión léxica principal que el audit trail inglés.
  spanish_consistency_notes:
  - Se mantiene 'dragones' como término principal para δράκοντες, en coherencia con el audit trail inglés.
  - Se usa 'Amán' para el nombre propio, conforme a la transliteración usual en español.
  - La puntuación conserva el tono breve y declarativo del original griego.
  - La nota al pie ofrece la alternativa 'serpientes' porque el español también hereda esa ambigüedad léxica.
