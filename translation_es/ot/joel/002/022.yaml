translation:
  language: es
  text: No teman[a], bestias del campo; porque los pastizales del campo abierto han reverdecido; porque el árbol da su fruto, la higuera y la vid han dado su abundancia.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «No tengan miedo».'
    reason: lexical_alternative
lexical_decisions:
- source_word: אַל תִּירְאוּ
  english_pob_choice: Do not fear
  chosen_spanish: No teman
  alternatives_spanish:
  - No tengan miedo
  - No estén atemorizados
  lexicon: HALOT / ירא
  rationale: La prohibición con אַל + imperfecto plural pide una negación imperativa directa. 'No teman' es natural en español, conserva la fuerza exhortativa y evita añadir matices no presentes en el hebreo.
- source_word: בַּהֲמוֹת שָׂדַי
  english_pob_choice: beasts of the field
  chosen_spanish: bestias del campo
  alternatives_spanish:
  - animales del campo
  - bestias de la tierra
  lexicon: HALOT / בהמה
  rationale: '''Bestias'' preserva el registro elevado y la concreción zoológica del hebreo, más cercano a la formulación profética que ''animales''. ''Del campo'' refleja שָׂדַי con su sentido de ámbito abierto/cultivado.'
- source_word: דָשְׁאוּ
  english_pob_choice: have become green
  chosen_spanish: se han vuelto verdes
  alternatives_spanish:
  - han reverdecido
  - han brotado
  - se han puesto verdes
  lexicon: HALOT / דשא
  rationale: El verbo expresa reverdecimiento o aparición de vegetación. 'Se han vuelto verdes' comunica el resultado de forma idiomática en español y conserva el aspecto perfectivo de restauración.
- source_word: נְאֹות מִדְבָּר
  english_pob_choice: the pastures of the wilderness
  chosen_spanish: los pastos del desierto
  alternatives_spanish:
  - los pastos del desierto árido
  - las dehesas del desierto
  - los prados del desierto
  lexicon: HALOT / נאות + מדבר
  rationale: '''Pastos'' es una equivalencia clara y breve para el lugar de pastoreo. ''Desierto'' mantiene la base léxica de מִדְבָּר; aunque puede sugerir aridez extrema, aquí funciona como espacio no cultivado, no necesariamente estéril.'
- source_word: עֵץ נָשָׂא פִרְיוֹ
  english_pob_choice: the tree bears its fruit
  chosen_spanish: el árbol da su fruto
  alternatives_spanish:
  - el árbol ha dado su fruto
  - el árbol produce su fruto
  lexicon: HALOT / נָשָׂא + פרי
  rationale: '''Da su fruto'' expresa con naturalidad el valor verbal de ''bear fruit'' y conserva el sentido de productividad restaurada. ''Su'' refleja el sufijo pronominal singular del hebreo.'
- source_word: תְּאֵנָה וָגֶפֶן
  english_pob_choice: the fig tree and the vine
  chosen_spanish: la higuera y la vid
  alternatives_spanish:
  - el higo y la vid
  - la higuera y la parra
  lexicon: HALOT / תְּאֵנָה + גֶפֶן
  rationale: '''Higuera'' y ''vid'' son equivalentes bíblicos naturales y precisos en español. ''Vid'' evita reducir גֶפֶן a ''parra'', que en español puede sonar menos bíblico o más regional.'
- source_word: נָתְנוּ חֵילָם
  english_pob_choice: have given their wealth
  chosen_spanish: han dado su abundancia
  alternatives_spanish:
  - han dado su riqueza
  - han dado su pleno rendimiento
  - han producido su riqueza
  lexicon: HALOT / חֵיל
  rationale: El POB inglés revisado entendió חֵילָם aquí como produce/abundance. 'Abundancia' conserva ese campo semántico sin forzar una imagen de dinero o posesiones, y funciona bien para frutos y viñas en contexto agrícola.
theological_decisions:
- issue: Imagen de restauración agrícola como señal de bendición
  english_pob_reading: 'The verse describes renewed fertility: pastures turn green, the tree bears fruit, and the fig tree and vine give abundance.'
  chosen_spanish_reading: 'El versículo describe una fertilidad restaurada: los pastos reverdecen, el árbol da fruto y la higuera y la vid dan abundancia.'
  alternative_spanish_readings:
  - '...dan su riqueza'
  - '...dan su fruto en plenitud'
  rationale: No hay una tesis doctrinal explícita que requiera aclaración, pero sí conviene preservar el valor teológico de restauración material como signo de la acción favorable de Dios en el marco del libro. 'Abundancia' mantiene la idea de plenitud productiva sin desplazar el énfasis agrícola.
  doctrine_reference: Tema bíblico de bendición/restauración agrícola en el marco del pacto; cf. Joel 2:18-27 como unidad.
translation_notes:
  revision_awareness: La traducción sigue el texto hebreo consonante con la audit trail inglesa, respetando la revisión que entendió חֵילָם como 'wealth' en el sentido de abundancia/produce. Se mantuvo el registro profético y se evitó suavizar 'bestias' a 'animales' porque el inglés POB también preserva esa fuerza léxica. No se introducen notas textuales porque el versículo presenta alta concordancia en el paquete fuente.
  spanish_consistency_notes:
  - Se usó 'Yahvé' solo cuando el contexto lo requiera; este verso no contiene el nombre divino.
  - '''Bestias'' se mantuvo por fidelidad al registro profético y a la elección inglesa.'
  - '''Abundancia'' se escogió para חֵילָם en lugar de ''riqueza'' por el contexto agrícola, evitando una lectura monetaria ajena al pasaje.'
  - La puntuación reproduce el paralelismo hebreo con dos cláusulas causales introducidas por 'porque'.
