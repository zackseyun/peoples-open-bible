  revision_rationale: Se ajusta la apertura para reflejar mejor la inmediatez temporal del hebreo de forma idiomática en español; se mejora «alzaron la voz» por naturalidad; y se reubica la nota al pie en la frase que realmente explica, manteniendo la decisión léxica sobre el acusativo cognado de duelo intenso.
