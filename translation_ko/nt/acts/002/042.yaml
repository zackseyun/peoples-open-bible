  text: ἦσαν δὲ προσκαρτεροῦντες τῇ διδαχῇ τῶν ἀποστόλων καὶ τῇ ⸀κοινωνίᾳ, τῇ κλάσει τοῦ ἄρτου καὶ ταῖς προσευχαῖς.
base_translation:
  language: en
  yaml_path: translation/nt/acts/002/042.yaml
  text: And they were devoting themselves to the apostles' teaching and the fellowship[c][b][a], to the breaking of bread and the prayers.
  footnotes:
  - marker: a
    text: Or 'sharing,' 'participation,' or 'communion.'
    reason: lexical_alternative
  - marker: b
    text: '''The breaking of bread'' may refer to shared meals generally, though many understand it here to include the Lord''s Supper.'
    reason: alternative_reading
  - marker: c
    text: Or 'the set prayers'; the article may suggest recognized times or forms of prayer.
    reason: lexical_alternative
translation:
  language: ko
  text: 그들은 사도들의 가르침과 교제와[a] 떡을 떼는 일과 기도에 전념하였습니다.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 헬라어 κοινωνία는 「교제」, 「나눔」, 「참여」를 포괄한다. 「떡을 떼는 일」은 일상의 공동 식사와 함께 주의 만찬을 포함할 수 있다.
    reason: lexical_alternative
theological_decisions:
- issue: 2:42의 네 가지 항목을 정형 표현으로 보존
  chosen_reading: 가르침·교제·떡을 떼는 일·기도
  alternative_readings:
  - 가르침·친교·성찬·기도
  rationale: 헬라어 본문이 네 명사구를 병렬로 제시하므로, 한국어에서도 정형 표현으로 옮긴다. 「떡을 떼는 일」을 「성찬」으로 좁히지 않고 본문의 폭을 유지한다.
  doctrine_reference: 'KOREAN_PIPELINE.md: 본문의 폭을 좁히지 않음'
