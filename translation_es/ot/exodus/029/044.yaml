translation:
  language: es
  text: Y consagraré[a] la tienda de reunión y el altar; y consagraré a Aarón y a sus hijos para servirme como sacerdotes[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «santificaré» / «haré santo» para el verbo en ambas ocurrencias.
    reason: lexical_alternative
  - marker: b
    text: Literalmente, «para ser sacerdote para mí» o «para ministrar como sacerdotes para mí».
    reason: lexical_alternative
lexical_decisions:
- source_word: וְקִדַּשְׁתִּי
  english_pob_choice: And I will consecrate
  chosen_spanish: yo consagraré
  alternatives_spanish:
  - yo santificaré
  - yo haré santo
  lexicon: HALOT
  rationale: קדשׁ en piel expresa apartar para uso sagrado. «Consagraré» comunica bien la dedicación cultual en español actual, más naturalmente que «santificaré», aunque ambas conservan la idea de hacer sagrado.
- source_word: אֹהֶל מוֹעֵד
  english_pob_choice: the tent of meeting
  chosen_spanish: la tienda de reunión
  alternatives_spanish:
  - la tienda del encuentro
  - la tienda de cita
  lexicon: HALOT
  rationale: La expresión tradicional y transparente en español es «tienda de reunión», que refleja el lugar señalado para el encuentro con Dios sin perder el valor técnico del término.
- source_word: הַמִּזְבֵּחַ
  english_pob_choice: the altar
  chosen_spanish: el altar
  lexicon: HALOT
  rationale: Término cultual directo y transparente; no requiere ampliación.
- source_word: אַהֲרֹן
  english_pob_choice: Aaron
  chosen_spanish: Aarón
  alternatives_spanish:
  - Aaron
  lexicon: convención bíblica española
  rationale: Nombre propio adaptado a la forma habitual en español bíblico.
- source_word: בָּנָיו
  english_pob_choice: his sons
  chosen_spanish: sus hijos
  alternatives_spanish:
  - sus hijos varones
  - sus descendientes varones
  lexicon: HALOT
  rationale: Aunque el hebreo dice literalmente «sus hijos/sons», en este contexto sacerdotal se refiere a los hijos varones de Aarón; «sus hijos» mantiene la literalidad y el referente inmediato.
- source_word: אֲקַדֵּשׁ
  english_pob_choice: I will also consecrate
  chosen_spanish: consagraré
  alternatives_spanish:
  - también consagraré
  - santificaré
  lexicon: HALOT
  rationale: Se mantiene la repetición verbal del hebreo con el mismo verbo en español. No se añade «también» porque el español ya suena natural con dos cláusulas coordinadas que repiten el verbo.
- source_word: לְכַהֵן לִי
  english_pob_choice: to serve as priests to me
  chosen_spanish: para servir como sacerdotes para mí
  alternatives_spanish:
  - para ejercer el sacerdocio para mí
  - para ministrar como sacerdotes para mí
  lexicon: HALOT
  rationale: כהן en este infinitivo expresa función sacerdotal. «Servir como sacerdotes» conserva la fuerza funcional sin forzar una construcción poco natural; «para mí» preserva el dativo de beneficio/pertenencia.
theological_decisions:
- issue: Lenguaje de santidad cultual
  english_pob_reading: consecrate / sanctify / make holy
  chosen_spanish_reading: consagrar
  alternative_spanish_readings:
  - santificar
  - hacer santo
  rationale: En este contexto de tabernáculo y sacerdocio, «consagrar» transmite mejor la dedicación ritual de personas y objetos. No se elimina la tensión entre «consagrar» y «santificar»; queda documentada como alternativa válida.
  doctrine_reference: Translation philosophy §6; consistency of key cultic terms
- issue: Referencia sacerdotal masculina
  english_pob_reading: his sons
  chosen_spanish_reading: sus hijos
  alternative_spanish_readings:
  - sus hijos varones
  - sus descendientes varones
  rationale: El hebreo es masculino y el contexto restringe el referente a la línea sacerdotal masculina. «Sus hijos» conserva la forma breve del original; la lectura masculina queda explícitamente anotada.
  doctrine_reference: Translation philosophy §4 gender-accurate over gender-neutral
translation_notes:
  revision_awareness: 'La redacción sigue de cerca el tramo revisado del audit trail inglés: mantiene la coordinación de ambas cláusulas con el mismo verbo en español y refleja el infinitivo hebreo con «para servir como sacerdotes para mí», evitando invertir el orden o añadir elementos no presentes en el texto fuente.'
  spanish_consistency_notes:
  - Se usa «consagrar» de manera uniforme para קדשׁ en ambas ocurrencias, preservando la repetición del original.
  - Se mantiene «tienda de reunión» como término técnico estable para אֹהֶל מוֹעֵד.
  - «Aarón» sigue la forma bíblica española habitual.
  - «Sus hijos» conserva el referente masculino implícito del hebreo sin ampliar a una formulación neutral.
  - La preposición «para mí» refleja el dativo hebreo לִי con naturalidad en español.
