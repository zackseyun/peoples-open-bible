  rationale: Se corrige el anclaje de la nota [a] para que corresponda a la expresión adecuada, y se suaviza la cláusula relativa final eliminando el dativo redundante 'a ellos', que en español resulta forzado y no es necesario para conservar el sentido. También se normaliza levemente la puntuación y el estilo de las notas.
