translation:
  language: es
  text: Se han corrompido profundamente[a], como en los días de Gibeá; recordará su iniquidad[b]; castigará sus pecados.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Gibeá alude al escándalo de Gibeá en Jueces 19–21, usado aquí como comparación de la corrupción de Israel.
    reason: cross_reference
  - marker: b
    text: 'O, más literalmente: «han ido hondo; se han corrompido», o «han profundizado en la corrupción». El hebreo es breve e idiomático.'
    reason: lexical_alternative
lexical_decisions:
- source_word: הֶעְמִֽיקוּ
  english_pob_choice: have deeply
  chosen_spanish: se han corrompido profundamente
  alternatives_spanish:
  - han ido muy hondo
  - se han hundido profundamente
  lexicon: HALOT
  rationale: El hebreo usa un verbo de ‘profundizar’ que, unido al siguiente, expresa intensificación del mal. En español, ‘se han corrompido profundamente’ conserva la idea de profundidad y el sentido idiomático de degeneración moral sin volver la frase torpe.
- source_word: שִׁחֵ֖תוּ
  english_pob_choice: have corrupted themselves / into corruption
  chosen_spanish: se han corrompido
  alternatives_spanish:
  - se han arruinado
  - han obrado corruptamente
  lexicon: HALOT
  rationale: שׁחת en este contexto denota corromperse o arruinarse moralmente. El reflexivo ‘se han corrompido’ refleja bien la fuerza intensiva y la autoimplicación del verbo en este pasaje profético.
- source_word: כִּ/ימֵ֣י
  english_pob_choice: as in the days of
  chosen_spanish: como en los días de
  alternatives_spanish:
  - como los días de
  lexicon: HALOT
  rationale: La comparación temporal se expresa de forma natural en español con ‘como en los días de’, manteniendo el paralelo histórico.
- source_word: הַ/גִּבְעָ֑ה
  english_pob_choice: Gibeah
  chosen_spanish: Gabaa
  alternatives_spanish:
  - Gueba
  - Gibeá
  lexicon: HALOT
  rationale: Se conserva el nombre propio de la localidad con una transliteración clara para lectores hispanohablantes. ‘Gabaa’ es una forma tradicional y legible en español bíblico; se evita sustituirlo por una paráfrasis.
- source_word: עֲוֺנָ֔/ם
  english_pob_choice: their iniquity
  chosen_spanish: su iniquidad
  alternatives_spanish:
  - su culpa
  - su maldad
  lexicon: HALOT
  rationale: עון puede abarcar culpa/iniquidad/castigo. Aquí, como el segundo miembro ya expresa el castigo, ‘iniquidad’ preserva el énfasis en la ofensa moral que Dios recuerda.
- source_word: יִפְק֖וֹד
  english_pob_choice: he will punish
  chosen_spanish: castigará
  alternatives_spanish:
  - visitará
  - hará rendir cuentas de
  lexicon: HALOT
  rationale: פקד en contextos de juicio significa visitar con castigo o tomar en cuenta judicialmente. ‘Castigará’ comunica de modo claro y digno el sentido judicial en español moderno.
- source_word: חַטֹּאותָֽ/ם
  english_pob_choice: their sins
  chosen_spanish: sus pecados
  alternatives_spanish:
  - sus faltas
  - sus ofensas
  lexicon: HALOT
  rationale: חטאת aquí se entiende como pecados, no como sacrificios por el pecado, por el paralelismo con ‘iniquidad’ y el contexto de juicio. ‘Sus pecados’ mantiene el plural y la relación con el castigo.
theological_decisions:
- issue: Sujeto implícito de los verbos de juicio
  english_pob_reading: '''he will remember'' and ''he will punish'' refer to God, though the Hebrew leaves the subject unstated.'
  chosen_spanish_reading: él recordará...; castigará...
  alternative_spanish_readings:
  - recordará...; castigará...
  - Dios recordará...; Dios castigará...
  rationale: El hebreo usa verbos en tercera persona singular sin sujeto explícito. En el contexto profético, el sujeto se entiende como Yahvé, pero en la traducción se conserva el pronombre implícito para respetar la tersura del texto y no añadir el nombre divino donde no aparece explícitamente en la cláusula.
  doctrine_reference: Preservar la ambigüedad gramatical original sin perder la referencia contextual a Dios.
translation_notes:
  revision_awareness: 'La redacción española sigue el ajuste más reciente del audit trail inglés: la apertura se entiende como una corrupción intensificada y autoconsciente, no solo como una metáfora espacial de ‘ir hondo’. Por eso se eligió ‘se han corrompido profundamente’ como equivalente más natural y fiel al doble valor del hebreo.'
  spanish_consistency_notes:
  - Se mantiene ‘Yahvé’ como convención del proyecto solo cuando el texto lo requiere expresamente; en este versículo no aparece el nombre divino de forma explícita en la superficie hebrea, por lo que se conserva el sujeto implícito.
  - ‘Gabaa’ se usa como transliteración legible y consistente con el nombre propio bíblico.
  - ‘Iniquidad’ y ‘pecados’ se distinguen para reflejar el paralelismo hebreo entre el recuerdo de la culpa y el castigo de las transgresiones.
