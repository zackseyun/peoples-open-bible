  text: Οὐ γὰρ τολμῶμεν ἐγκρῖναι ἢ συγκρῖναι ἑαυτούς τισιν τῶν ἑαυτοὺς συνιστανόντων· ἀλλὰ αὐτοὶ ἐν ἑαυτοῖς ἑαυτοὺς μετροῦντες καὶ συγκρίνοντες ἑαυτοὺς ἑαυτοῖς οὐ συνιᾶσιν.
base_translation:
  language: en
  yaml_path: translation/nt/2_corinthians/010/012.yaml
  text: For we do not dare to classify or compare ourselves with some of those who commend themselves[a]. But when they measure themselves by themselves and compare themselves with themselves[b], they do
    not understand.
translation:
  language: ko
  text: 우리는 스스로를 추천하는 어떤 이들과 자신을 같이 끼워 넣거나 비교할 엄두를 내지 못합니다. 그들은 스스로를 자기 자신으로 재고 자기 자신과 비교하니, 깨닫지 못합니다.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ἐγκρῖναι
  english_pob_choice: classify
  chosen_korean: 같이 끼워 넣거나
  lexicon: BDAG
  rationale: 「같은 부류로 분류하다」. 자연스러운 한국어 풀이.
  alternatives_korean:
  - 분류하거나
- source_word: συγκρῖναι
  english_pob_choice: compare
  chosen_korean: 비교할
  lexicon: BDAG
  rationale: 표준 등가어.
- source_word: συνιστανόντων
  english_pob_choice: commend
  chosen_korean: 추천하는
  lexicon: BDAG
  rationale: '바울 어휘 동족(10:18, 12:11과 호응). 「추천하다」 일관.'
  alternatives_korean:
  - 천거하는
- source_word: οὐ συνιᾶσιν
  english_pob_choice: do not understand
  chosen_korean: 깨닫지 못합니다
  lexicon: BDAG
  rationale: 「이해/분별이 없음」. 「깨닫다」가 한국어 표준.
