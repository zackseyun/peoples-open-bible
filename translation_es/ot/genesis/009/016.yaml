translation:
  language: es
  text: Y el arco estará en la nube[a], y lo veré y recordaré el pacto eterno entre Dios y toda criatura viviente entre toda carne que está sobre la tierra.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «arco iris». El hebreo literalmente dice «arco».
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהָיְתָה
  english_pob_choice: will be
  chosen_spanish: estará
  alternatives_spanish:
  - será
  - habrá de estar
  lexicon: HALOT
  rationale: El verbo en este contexto continúa el discurso futuro de Yahvé; en español, «estará» expresa con naturalidad esa proyección futura sin añadir matices ajenos.
- source_word: הַקֶּשֶׁת
  english_pob_choice: the bow
  chosen_spanish: el arco
  alternatives_spanish:
  - el arco iris
  - el arco en el cielo
  lexicon: HALOT
  rationale: La palabra hebrea significa literalmente «arco». Se conserva esa imagen para no reemplazarla mecánicamente por la interpretación contextual. La opción «arco iris» puede ir implícita, pero no se impone en el texto principal.
- source_word: בֶּעָנָן
  english_pob_choice: in the cloud
  chosen_spanish: en la nube
  alternatives_spanish:
  - entre las nubes
  - en las nubes
  lexicon: HALOT
  rationale: El singular con artículo se refleja mejor con «la nube». Mantiene la referencia directa al signo visible sin pluralizar innecesariamente.
- source_word: וּרְאִיתִיהָ
  english_pob_choice: and I will see it
  chosen_spanish: y lo veré
  alternatives_spanish:
  - y la veré
  - y cuando la vea
  lexicon: HALOT
  rationale: El sufijo femenino singular se refiere a «el arco» entendido en español como masculino; por eso el pronombre concordante en español es «lo». La coordinación simple conserva la secuencia verbal del hebreo.
- source_word: לִזְכֹּר
  english_pob_choice: to remember
  chosen_spanish: para recordar
  alternatives_spanish:
  - a fin de recordar
  - para que recuerde
  lexicon: HALOT
  rationale: El infinitivo de propósito se vierte con «para» en español, que expresa naturalmente finalidad sin perder el valor intencional del hebreo.
- source_word: בְּרִית עוֹלָם
  english_pob_choice: the everlasting covenant
  chosen_spanish: el pacto eterno
  alternatives_spanish:
  - el pacto perpetuo
  - el pacto para siempre
  lexicon: HALOT
  rationale: «Pacto» mantiene el sentido jurídico-relacional de בְּרִית. «Eterno» transmite adecuadamente la duración indefinida de עוֹלָם en este contexto.
- source_word: בֵּין אֱלֹהִים וּבֵין
  english_pob_choice: between God and
  chosen_spanish: entre Dios y
  alternatives_spanish:
  - entre Dios y entre
  - entre Dios y también
  lexicon: HALOT
  rationale: El hebreo repite la preposición de manera idiomática; en español se comprime naturalmente a «entre ... y ...» sin perder la relación bilateral.
- source_word: כָּל נֶפֶשׁ חַיָּה
  english_pob_choice: every living creature
  chosen_spanish: todo ser viviente
  alternatives_spanish:
  - toda criatura viviente
  - todo viviente
  lexicon: HALOT
  rationale: «Ser viviente» comunica bien la amplitud de נֶפֶשׁ חַיָּה en el contexto del pacto con toda vida, sin restringirlo a «alma» humana.
- source_word: בְּכָל בָּשָׂר
  english_pob_choice: among all flesh
  chosen_spanish: de toda carne
  alternatives_spanish:
  - entre toda carne
  - en toda carne
  lexicon: HALOT
  rationale: Siguiendo la revisión del audit trail, la preposición בְּ aquí funciona de modo especificador/aposicional respecto de «todo ser viviente». En español, «de toda carne» comunica esa relación de manera más natural que una preposición espacial más dura.
- source_word: אֲשֶׁר עַל הָאָרֶץ
  english_pob_choice: that is on the earth
  chosen_spanish: que está sobre la tierra
  alternatives_spanish:
  - que está en la tierra
  - que está sobre la tierra
  lexicon: HALOT
  rationale: «Sobre la tierra» preserva la amplitud universal del hebreo y evita restringirlo a «en la tierra» como si fuera meramente local.
theological_decisions:
- issue: Remembrance language applied to God
  english_pob_reading: I will see it and remember
  chosen_spanish_reading: lo veré para recordar
  alternative_spanish_readings:
  - lo veré y recordaré
  - lo veré para que me acuerde
  rationale: Se conserva el lenguaje antropomórfico y pactual de la memoria divina sin explicarlo ni suavizarlo. «Para recordar» mantiene la finalidad expresada por el infinitivo hebreo y evita reemplazar el texto por una paráfrasis interpretativa.
  doctrine_reference: Translation philosophy §3
translation_notes:
  revision_awareness: 'El texto español refleja el estado más reciente del audit trail: se mantuvo la secuencia futura y la relación de propósito con לִזְכֹּר, y se evitó la solución inglesa previa «among all flesh» al optar por una formulación española más natural y especificadora («de toda carne»). También se preservó la tensión entre la imagen literal «arco» y su identificación contextual como «arco iris» en nota.'
  spanish_consistency_notes:
  - Se usa «Dios» para אֱלֹהִים, conforme al estándar del proyecto.
  - Se mantiene «pacto» para בְּרִית por su valor relacional y jurídico.
  - Se conserva el término «carne» en «toda carne» porque el contexto universal lo requiere y no se refiere aquí a la naturaleza humana en sentido paulino.
  - 'La sintaxis española intenta seguir la estructura hebrea sin sonar forzada: una cláusula futura, seguida de propósito y del marco de la alianza universal.'
