- from: Y vivió Reú después de haber engendrado a Serug doscientos siete años[a], y engendró hijos e hijas.
  to: Y Reú vivió después de engendrar a Serug doscientos siete años[a], y engendró hijos e hijas.
  rationale: Se hace una reparación menor de estilo para mejorar la naturalidad del español sin apartarse del hebreo ni del rastro auditado en inglés. «Después de engendrar» conserva plenamente el valor de אחרי הולידו y suena más limpio que «después de haber engendrado». También se ajusta el orden a «Y Reú vivió...» para mejor fluidez en español formal. La nota se conserva, adaptada al texto revisado.
