translation:
  language: es
  text: Si un hombre entrega a su vecino dinero[a] o bienes[b] para guardarlos, y estos son robados de la casa del hombre, si el ladrón es hallado, pagará el doble[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «plata»; aquí se usa en el sentido de dinero.'
    reason: lexical_alternative
  - marker: b
    text: O «objetos» o «artículos» para «bienes».
    reason: lexical_alternative
  - marker: c
    text: 'Literalmente: «restituirá dos veces» o «restituirá al doble».'
    reason: lexical_alternative
lexical_decisions:
- source_word: אִישׁ
  english_pob_choice: a man gives
  chosen_spanish: un hombre entrega
  alternatives_spanish:
  - una persona entrega
  - alguien entrega
  lexicon: HALOT
  rationale: El hebreo usa un singular masculino representativo en estilo legal. «Un hombre» conserva ese tono casuístico sin volver la frase innecesariamente genérica.
- source_word: אֶל רֵעֵהוּ
  english_pob_choice: his neighbor
  chosen_spanish: a su vecino
  alternatives_spanish:
  - a su prójimo
  - a su compañero
  lexicon: HALOT
  rationale: «Vecino» comunica bien el sentido comunitario y relacional de רֵעַ en un contexto legal, y suena natural en español bíblico moderno.
- source_word: כֶּסֶף
  english_pob_choice: money
  chosen_spanish: dinero
  alternatives_spanish:
  - plata
  lexicon: HALOT
  rationale: Aunque literalmente puede ser «plata», aquí el valor funcional es monetario. «Dinero» evita una literalidad engañosa en español.
- source_word: כֵלִים
  english_pob_choice: goods
  chosen_spanish: bienes
  alternatives_spanish:
  - objetos
  - enseres
  - artículos
  lexicon: HALOT
  rationale: El término es amplio y se refiere a propiedad confiada para custodia. «Bienes» preserva amplitud semántica sin reducirlo a recipientes u objetos domésticos.
- source_word: לִשְׁמֹר
  english_pob_choice: to keep
  chosen_spanish: para guardarlos
  alternatives_spanish:
  - para cuidarlos
  - para custodiarlo
  lexicon: HALOT
  rationale: El infinitivo expresa propósito. En español, «guardar» transmite naturalmente la idea de custodia o resguardo de objetos confiados.
- source_word: וְגֻנַּב
  english_pob_choice: and it is stolen
  chosen_spanish: y le son robados
  alternatives_spanish:
  - y fueron robados
  - y se lo roban
  lexicon: HALOT
  rationale: El pasivo hebreo refiere al conjunto confiado. En español, el plural «le son robados» acuerda con «dinero o bienes» y evita una construcción artificial con singular neutro.
- source_word: מִבֵּית הָאִישׁ
  english_pob_choice: from the man's house
  chosen_spanish: de la casa del hombre
  alternatives_spanish:
  - de la casa de ese hombre
  - de su casa
  lexicon: HALOT
  rationale: La frase remite a la casa del custodio mencionado. «De la casa del hombre» reproduce la relación posesiva de forma clara y sobria.
- source_word: אִם יִמָּצֵא הַגַּנָּב
  english_pob_choice: if the thief is found
  chosen_spanish: si se encuentra al ladrón
  alternatives_spanish:
  - si el ladrón es hallado
  - si atrapan al ladrón
  lexicon: HALOT
  rationale: «Se encuentra al ladrón» conserva el valor básico de נִמְצָא sin forzar una lectura de captura. El complemento con «al» suena natural en español.
- source_word: יְשַׁלֵּם שְׁנָיִם
  english_pob_choice: he shall pay double
  chosen_spanish: pagará el doble
  alternatives_spanish:
  - hará restitución doble
  - restituirá el doble
  lexicon: HALOT
  rationale: La frase legal indica pago en doble cantidad. «Pagará el doble» es fiel y comprensible; mantiene la idea de reparación sin añadir explicaciones no explícitas en el hebreo.
theological_decisions:
- issue: Lenguaje casuístico legal y sujeto masculino representativo
  english_pob_reading: a man gives
  chosen_spanish_reading: un hombre entrega
  alternative_spanish_readings:
  - una persona entrega
  - alguien entrega
  rationale: No se neutraliza el masculino del original, porque en la formulación legal hebrea funciona como sujeto típico de caso. En español, «un hombre» preserva esa forma sin sobreinterpretarla como exclusión total.
  doctrine_reference: Hermenéutica legal del Pentateuco; fidelidad al género del texto
- issue: Alcance de la restitución en la cláusula final
  english_pob_reading: he shall pay double
  chosen_spanish_reading: pagará el doble[c]
  alternative_spanish_readings:
  - hará restitución doble
  - restituirá el doble
  rationale: El sentido básico es una compensación duplicada. Se mantiene la formulación breve y jurídica; la nota explica que el hebreo dice literalmente «repagará dos veces».
  doctrine_reference: Éxodo 22:1–15; ley de restitución
- issue: Tensión entre singular y plural en el objeto robado
  english_pob_reading: and it is stolen
  chosen_spanish_reading: y le son robados
  alternative_spanish_readings:
  - y fue robado
  - y se lo roban
  rationale: Hebreo usa un verbo pasivo singular para una lista de bienes. En español, el plural concuerda mejor con la coordinación «dinero o bienes» sin perder el valor colectivo del objeto confiado.
  doctrine_reference: Concordancia semántica en traducción bíblica
translation_notes:
  revision_awareness: El borrador sigue de cerca el texto hebreo y coincide con el sentido del audit trail inglés. Se ajustó la concordancia del objeto robado al plural español («le son robados») por claridad, sin cambiar la referencia colectiva del hebreo. No se introdujeron cambios textuales ni doctrinales respecto del pasaje base.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» como norma del proyecto, aunque este versículo no contiene el Tetragrámaton.
  - Se prefirió «ladrón» para הַגַּנָּב, siguiendo el valor léxico directo y el registro legal.
  - «Pagará el doble» conserva el estilo jurídico breve del hebreo y del audit trail inglés.
  - «Guardar» y «bienes» se eligieron por naturalidad en español sin perder la amplitud semántica del original.
