translation:
  language: es
  text: Y cuando la multitud[a] sea llevada, su corazón se enaltecerá[b], y derribará decenas de millares, pero no prevalecerá[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «sea levantada» o «sea removida». El verbo hebreo puede entenderse como «ser levantada» o «ser llevada / removida»; el contexto de derrota militar favorece «sea llevada».
    reason: lexical_alternative
  - marker: b
    text: Heb. «su corazón será levantado», un modismo para volverse orgulloso.
    reason: cultural_note
  - marker: c
    text: O «no llegará a ser fuerte». El hebreo puede subrayar ya sea la falta de prevalecimiento o la falta de fuerza consolidada.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְנִשָּׂא
  english_pob_choice: when ... is carried away
  chosen_spanish: cuando ... sea llevada
  alternatives_spanish:
  - cuando ... sea levantada
  - cuando ... sea removida
  lexicon: HALOT
  rationale: El nifal de נשׂא admite la idea de ser alzado, llevado o removido. En este contexto bélico, «sea llevada» conserva la pasividad del sujeto y la idea de ser desplazada o arrastrada por la derrota, sin forzar una sola glosa.
- source_word: הֶהָמוֹן
  english_pob_choice: the multitude
  chosen_spanish: la multitud
  alternatives_spanish:
  - la muchedumbre
  - el ejército
  lexicon: HALOT
  rationale: הָמוֹן designa una masa o multitud. «Multitud» preserva el alcance léxico amplio sin especificar más de lo que el hebreo exige.
- source_word: ירום לְבָבוֹ
  english_pob_choice: his heart will be lifted up
  chosen_spanish: su corazón se enaltecerá
  alternatives_spanish:
  - su corazón será levantado
  - se volverá orgulloso
  lexicon: HALOT
  rationale: La imagen hebrea de «el corazón levantado» es un modismo para orgullo o arrogancia. «Se enaltecerá» mantiene la metáfora con un español natural y digno.
- source_word: וְהִפִּיל
  english_pob_choice: he will cast down
  chosen_spanish: derribará
  alternatives_spanish:
  - hará caer
  - abatirá
  - derribará a muchos
  lexicon: HALOT
  rationale: El hifil de נפל expresa causar caída. «Derribará» comunica bien la acción causativa y encaja con el contexto militar.
- source_word: רִבֹּאוֹת
  english_pob_choice: tens of thousands
  chosen_spanish: muchas decenas de millares
  alternatives_spanish:
  - miriadas
  - tens de millares
  lexicon: HALOT
  rationale: רִבֹּאות puede equivaler a diez miles o miríadas. «Decenas de millares» es comprensible en español moderno; añadí «muchas» para reflejar el plural intensivo, sin volver demasiado rígida la cifra.
- source_word: וְלֹא יָעוֹז
  english_pob_choice: but he will not prevail
  chosen_spanish: pero no prevalecerá
  alternatives_spanish:
  - pero no será fuerte
  - pero no llegará a ser fuerte
  lexicon: HALOT
  rationale: עוז puede expresar fuerza o prevalecer. «No prevalecerá» reproduce el sentido contextual de no obtener victoria o fortaleza duradera con una forma idiomática en español.
translation_notes:
  revision_awareness: Coincido con el audit trail inglés en mantener la ambigüedad de וְנִשָּׂא y en expresar el modismo de «corazón levantado» como orgullo. La única adaptación relevante es que en español conviene explicitar el valor numérico intensivo de רִבֹּאוֹת con una nota, mientras que en el texto principal se privilegia una formulación natural y publicable.
  spanish_consistency_notes:
  - Usé «Yahvé» solo cuando el texto hebreo lo requiera; este versículo no contiene el nombre divino.
  - Conservé «multitud» para הֶהָמוֹן y no lo restringí a «ejército», porque el contexto permite más de una referencia.
  - Mantuve el paralelismo sintáctico breve del versículo para que el tono profético quede claro en español.
