id: ROM.13.12
reference: Romans 13:12
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: ἡ νὺξ προέκοψεν, ἡ δὲ ἡμέρα ἤγγικεν. ⸀ἀποβαλώμεθα οὖν τὰ ἔργα τοῦ σκότους, ⸂ἐνδυσώμεθα δὲ⸃ τὰ ὅπλα τοῦ φωτός.
base_translation:
  language: en
  yaml_path: translation/nt/romans/013/012.yaml
  text: The night is far gone; the day has drawn near. Therefore let us cast off the works of darkness and put on the armor of light.
translation:
  language: ko
  text: 밤은 깊었고[a] 낮은 가까이 왔습니다. 그러므로 우리는 어둠의 일을 벗어 버리고 빛의 갑옷[b]을 입읍시다.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 또는 「밤이 많이 지났다」. 헬라어 동사는 밤이 앞으로 나아가 거의 다 흘러갔음을 그린다.
    reason: lexical_alternative
  - marker: b
    text: 또는 「빛의 무기」.
    reason: alternative_reading
lexical_decisions:
- source_word: ἡ νὺξ προέκοψεν
  english_pob_choice: The night is far gone
  chosen_korean: 밤은 깊었다
  alternatives_korean:
  - 밤은 많이 지났다
  - 밤이 늦었다
  lexicon: BDAG
  rationale: προέκοψεν은 시간이 앞으로 나아감. 한국어 관용 「밤이 깊다」가 「밤이 거의 다 흘러갔다」를 자연스럽게 살린다.
- source_word: ἤγγικεν
  english_pob_choice: has drawn near
  chosen_korean: 가까이 왔다
  alternatives_korean:
  - 임박했다
  lexicon: BDAG
  rationale: 완료 시제로 다가옴의 현재 상태. 「가까이 왔다」가 자연스럽다.
- source_word: ἀποβαλώμεθα
  english_pob_choice: let us cast off
  chosen_korean: 벗어 버리다
  alternatives_korean:
  - 던져 버리다
  - 떨쳐 버리다
  lexicon: BDAG
  rationale: 부정 과거 중간 명령형(권유). 옷을 벗듯 떨쳐 버리는 이미지를 「벗어 버리다」로 살린다.
- source_word: ἔργα τοῦ σκότους
  english_pob_choice: works of darkness
  chosen_korean: 어둠의 일
  alternatives_korean:
  - 어둠의 행실
  lexicon: BDAG
  rationale: 직역적 속격. 어둠의 도덕적 함의는 문맥이 공급하게 둔다.
- source_word: ἐνδυσώμεθα
  english_pob_choice: put on
  chosen_korean: 입읍시다
  alternatives_korean:
  - 옷 입읍시다
  lexicon: BDAG
  rationale: 부정 과거 중간 권유. 옷·갑옷 이미지의 짝.
- source_word: ὅπλα τοῦ φωτός
  english_pob_choice: armor of light
  chosen_korean: 빛의 갑옷
  alternatives_korean:
  - 빛의 무기
  - 빛의 병기
  lexicon: BDAG
  rationale: ὅπλα는 무기 또는 장비. 「입다」 동사와 짝지어지므로 「갑옷」이 가장 자연스럽다.
theological_decisions:
- issue: 밤/낮의 종말론적 은유
  chosen_reading: 시간적 이미지(「밤」/「낮」)를 직역으로 보존하고, 도덕적·구속사적 무게는 함축적으로 둠
  alternative_readings:
  - 「이 어둠의 시대가 거의 끝났다 / 새 날이 가깝다」 식의 해석적 풀이
  rationale: 본문은 시간적이면서 윤리적인 은유다. 해석적 풀이는 긴장을 해소한다. 직역 이미지를 유지한다.
  doctrine_reference: 'DOCTRINE.md: 신학적 긴장은 해소하지 말고 보존하라'
