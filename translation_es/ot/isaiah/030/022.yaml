translation:
  language: es
  text: 'Y contaminarás el revestimiento de plata de tus ídolos tallados y el recubrimiento de oro de tus imágenes fundidas. Los esparcirás como un paño menstrual[a]; le dirás: «¡Sal!»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «como una cosa menstruosa» o «como un trapo inmundo de menstruación». La comparación hebrea evoca explícitamente la impureza menstrual.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְטִמֵּאתֶם
  english_pob_choice: And you will defile
  chosen_spanish: Y profanaréis
  alternatives_spanish:
  - Y contaminaréis
  - Y volveréis impuro
  lexicon: HALOT
  rationale: El piel de טמא expresa hacer impuro/profanar en sentido cultual. «Profanaréis» conserva con naturalidad en español la fuerza ritual de tratar algo como impuro, sin diluirla en una mera suciedad.
- source_word: צִפּוּי
  english_pob_choice: overlay
  chosen_spanish: revestimiento
  alternatives_spanish:
  - cobertura
  - chapado
  lexicon: HALOT
  rationale: El término alude a una capa superficial, a menudo metálica. «Revestimiento» funciona bien en español y mantiene la idea de una capa sobre el objeto.
- source_word: פְּסִילֵי כַסְפֶּךָ
  english_pob_choice: your carved idols
  chosen_spanish: vuestros ídolos tallados
  alternatives_spanish:
  - vuestras imágenes talladas de plata
  - vuestras imágenes de plata talladas
  lexicon: HALOT
  rationale: פְּסִילִים son imágenes talladas/ídolos. En el contexto, el poseedor plural en español fluye mejor con «vuestros»; «ídolos tallados» preserva el referente sin forzar una glosa demasiado pesada.
- source_word: אֲפֻדַּת
  english_pob_choice: plating
  chosen_spanish: recubrimiento
  alternatives_spanish:
  - chapado
  - cobertura
  lexicon: HALOT
  rationale: Es un sustantivo raro para una capa o cobertura aplicada. «Recubrimiento» refleja bien la función material y mantiene el paralelismo con «revestimiento».
- source_word: מַסֵּכַת זְהָבֶךָ
  english_pob_choice: your cast images
  chosen_spanish: de oro de vuestras imágenes fundidas
  alternatives_spanish:
  - de oro de vuestras imágenes moldeadas
  - de oro de vuestros ídolos fundidos
  lexicon: HALOT
  rationale: מַסֵּכָה es una imagen fundida o vaciada. «Imágenes fundidas» conserva el sentido técnico del término y evita perder la referencia idolátrica.
- source_word: תִּזְרֵם
  english_pob_choice: You will scatter them
  chosen_spanish: Los esparcirás
  alternatives_spanish:
  - Los arrojarás
  - Los dispersarás
  lexicon: HALOT
  rationale: זרה en contexto puede significar esparcir o arrojar fuera. «Esparcirás» conserva la imagen verbal y la idea de desecharlos con desprecio.
- source_word: כְּמוֹ דָוָה
  english_pob_choice: like a menstrual cloth
  chosen_spanish: como un paño menstrual
  alternatives_spanish:
  - como una cosa menstruosa
  - como un trapo impuro de menstruación
  lexicon: HALOT
  rationale: דָוָה evoca impureza menstrual. «Paño menstrual» comunica la comparación con claridad y sin suavizar la impureza ritual que el hebreo subraya.
- source_word: צֵא
  english_pob_choice: Go out!
  chosen_spanish: ¡Sal fuera!
  alternatives_spanish:
  - ¡Fuera!
  - ¡Vete!
  lexicon: HALOT
  rationale: La forma imperativa expresa expulsión directa. «¡Sal fuera!» es natural en español y conserva la orden contundente.
- source_word: לוֹ
  english_pob_choice: to it
  chosen_spanish: le
  alternatives_spanish:
  - a ello
  - a él
  lexicon: Hebrew grammar
  rationale: Aunque el sufijo es gramaticalmente singular, en español el objeto indirecto singular «le» sigue de cerca el texto revisado de POB y mantiene la referencia singular de la reprensión final.
theological_decisions:
- issue: Preservar la impureza menstrual como imagen teológica y retórica
  english_pob_reading: The verse depicts radical repudiation of idolatry by comparing the idols to something ritually unclean and discarded.
  chosen_spanish_reading: El versículo presenta un rechazo radical de la idolatría al comparar los ídolos con algo ritualmente impuro y desechable.
  alternative_spanish_readings:
  - Se los compararía solo con suciedad general
  - Se suavizaría la referencia menstrual
  rationale: La comparación hebrea es explícita y cultual, no meramente higiénica. La traducción debe conservar esa tensión para no borrar la fuerza profética del pasaje.
  doctrine_reference: Translation philosophy §§1, 6
translation_notes:
  revision_awareness: La revisión inglesa corrigió el pronombre final a singular («to it»). En español se reflejó con «le» en la orden final, manteniendo la referencia singular y la cadencia profética.
  spanish_consistency_notes:
  - Se mantuvo el registro profético solemne, con verbos fuertes y léxico cultual.
  - Se evitó «SEÑOR» u otras sustituciones no presentes; no aplica aquí el Tetragrámaton.
  - «Ídolos tallados» e «imágenes fundidas» distinguen correctamente dos términos hebreos relacionados pero no idénticos.
  - La nota al pie [a] está anclada explícitamente en «paño menstrual».
