revisions:
- from: En Jerusalén hizo dispositivos[a], inventados por hombres hábiles, para estar en las torres y en las esquinas, para disparar flechas y piedras grandes. Y su fama[b] se extendió hasta muy lejos, porque fue maravillosamente ayudado[c] hasta que se hizo fuerte.
  to: En Jerusalén hizo dispositivos[a], inventados por hombres hábiles, para que estuvieran en las torres y en las esquinas, para lanzar flechas y piedras grandes. Y su fama[b] se extendió muy lejos, porque fue maravillosamente ayudado[c] hasta que se hizo fuerte.
  rationale: 'La revisión mantiene el contenido y las decisiones léxicas principales del borrador, pero mejora la naturalidad y la precisión funcional del español: ''para que estuvieran'' expresa mejor la instalación prevista de los mecanismos; ''lanzar'' cubre naturalmente flechas y piedras bajo un mismo verbo; y ''se extendió muy lejos'' suena más idiomático que ''hasta muy lejos''.'
