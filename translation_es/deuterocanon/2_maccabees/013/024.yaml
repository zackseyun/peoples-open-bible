translation:
  language: es
  text: Y recibió a Macabeo favorablemente, y dejó a Hegemonides como comandante desde Ptolemaida hasta los gerreneos[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Griego: «desde Ptolemaida hasta los gerreneos». El último nombre de lugar/pueblo es textualmente y geográficamente incierto en este testimonio; la traducción conserva la forma griega en vez de forzar una identificación más precisa.'
    reason: textual_variant
lexical_decisions:
- source_word: ἐπεδέξατο
  english_pob_choice: received ... favorably
  chosen_spanish: recibió ... favorablemente
  alternatives_spanish:
  - lo acogió favorablemente
  - lo recibió con agrado
  lexicon: LSJ
  rationale: El griego medio puede sugerir una recepción benévola u hospitalaria, no solo aceptación neutra. «Recibió favorablemente» conserva esa matización sin alejarse del valor básico del verbo.
- source_word: κατέλειπεν
  english_pob_choice: left
  chosen_spanish: dejó
  alternatives_spanish:
  - dejó puesto
  - nombró
  lexicon: LSJ
  rationale: La forma básica es «dejó / dejó atrás». En el contexto implica designación para un cargo, pero «dejó» se mantiene más cerca del griego y permite expresar el cargo con el predicado nominal.
- source_word: στρατηγόν
  english_pob_choice: commander
  chosen_spanish: comandante
  alternatives_spanish:
  - general
  - jefe militar
  lexicon: LSJ
  rationale: El término denota un mando militar; «comandante» es claro en español moderno y evita fijar un rango más específico que el del griego.
- source_word: ἀπὸ Πτολεμαΐδος ἕως τῶν Γεννήρων
  english_pob_choice: from Ptolemais as far as the Gerrenians
  chosen_spanish: desde Ptolemaida hasta los gerreneos
  alternatives_spanish:
  - desde Ptolemaida hasta la región de los gerreneos
  - desde Ptolemaida hasta Genner
  lexicon: LSJ
  rationale: La frase delimita un territorio. Dado que el topónimo/etnónimo τῶν Γεννήρων es incierto en este testimonio, conviene una transliteración conservadora en español para no imponer una identificación más precisa de la que el texto permite.
- source_word: Ἡγεμονίδην
  english_pob_choice: Hegemonides
  chosen_spanish: Hegemonides
  alternatives_spanish:
  - Hegemónides
  lexicon: LSJ
  rationale: Nombre propio transliterado de manera directa; se conserva la forma convencional y reconocible en español bíblico académico.
- source_word: Μακκαβαῖον
  english_pob_choice: Maccabaeus
  chosen_spanish: Macabeo
  alternatives_spanish:
  - Maccabeo
  - el Macabeo
  lexicon: LSJ
  rationale: Como designación personal/titulada, «Macabeo» es la forma natural en español y mantiene la referencia al personaje sin introducir una glosa innecesaria.
translation_notes:
  revision_awareness: 'Se siguió el audit trail inglés: recepción benévola para ἐπεδέξατο, «dejó» para κατέλειπεν y transliteración conservadora para la cláusula territorial incierta. No hubo revisiones posteriores que alteraran esas decisiones.'
  spanish_consistency_notes:
  - Se evitó «SEÑOR» o equivalentes irrelevantes, pues no aparece el nombre divino en este versículo.
  - Se prefirió «Macabeo» por ser la forma española usual y fiel del nombre/título.
  - «Comandante» mantiene una equivalencia funcional sin sobredeterminar στρατηγόν como «general».
