  text: δίδοτε, καὶ δοθήσεται ὑμῖν· μέτρον καλὸν πεπιεσμένον ⸀σεσαλευμένον ὑπερεκχυννόμενον δώσουσιν εἰς τὸν κόλπον ὑμῶν· ⸂ᾧ γὰρ μέτρῳ⸃ μετρεῖτε ἀντιμετρηθήσεται ὑμῖν.
base_translation:
  language: en
  yaml_path: translation/nt/luke/006/038.yaml
  text: 'Give[a], and it will be given to you: a good measure—pressed down, shaken together, overflowing—they will give into your lap. For with the measure by which you measure[b], it will be measured back to you.'
  footnotes:
  - marker: a
    text: Or 'running over.' The image is of a container filled so fully that its contents spill over.
    reason: lexical_alternative
  - marker: b
    text: Or 'into the fold of your garment.' 'Lap' refers to the front fold of a robe used to receive measured goods.
    reason: cultural_note
translation:
  language: ko
  text: 주라. 그러면 너희에게 주어지리니, 좋은 분량으로 누르고 흔들어 넘치도록 너희 품에 안겨 줄 것이다. 너희가 헤아리는 그 분량으로 너희도 도로 헤아림을 받을 것이다.」
  philosophy: optimal-equivalence
