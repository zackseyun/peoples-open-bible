translation:
  language: es
  text: Sus pecados eran secretos[a], y yo no sabía.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: "en cosas ocultas" o "se cometían en secreto". La frase griega es breve y puede entenderse de manera más general que "en lugares secretos".'
    reason: lexical_alternative
lexical_decisions:
- source_word: αἱ ἁμαρτίαι
  english_pob_choice: sins
  chosen_spanish: pecados
  alternatives_spanish:
  - faltas
  - culpas
  - actos pecaminosos
  lexicon: LSJ
  rationale: El plural ἁμαρτίαι designa pecados concretos; 'pecados' es el equivalente más directo y natural en español, sin suavizar el peso moral del término.
- source_word: αὐτῶν
  english_pob_choice: their
  chosen_spanish: sus
  alternatives_spanish:
  - de ellos
  - de ellas
  lexicon: LSJ
  rationale: El posesivo español 'sus' conserva la referencia posesiva simple del genitivo sin añadir especificación innecesaria.
- source_word: ἐν ἀποκρύφοις
  english_pob_choice: in secret
  chosen_spanish: en secreto
  alternatives_spanish:
  - en cosas ocultas
  - en oculto
  - en lugares secretos
  lexicon: LSJ
  rationale: La revisión inglesa prefirió 'in secret' frente a 'in secret places' porque el plural neutro funciona adverbialmente. En español, 'en secreto' transmite mejor la idea de ocultamiento/covertura sin forzar una imagen espacial.
- source_word: οὐκ ᾔδειν
  english_pob_choice: did not know
  chosen_spanish: no lo sabía
  alternatives_spanish:
  - no sabía
  - no lo conocía
  - no estaba al tanto
  lexicon: LSJ
  rationale: El imperfecto de οἶδα expresa falta de conocimiento/conciencia continua. 'No lo sabía' es idiomático y mantiene la afirmación de ignorancia del hablante.
theological_decisions:
- issue: Alcance de la ocultación en ἐν ἀποκρύφοις
  english_pob_reading: The text states that their sins were concealed/secret, without specifying whether hidden from God, from the speaker, or generally done covertly.
  chosen_spanish_reading: El texto dice que sus pecados estaban ocultos o se cometían en secreto, sin precisar frente a quién o de qué modo exacto estaban escondidos.
  alternative_spanish_readings:
  - Sus pecados fueron cometidos en secreto
  - Sus pecados estaban escondidos de la vista
  - Sus pecados estaban en lugares ocultos
  rationale: Conviene conservar la indeterminación del griego y no resolverla hacia una localización física o una relación teológica específica. La frase inmediata 'y yo no lo sabía' sostiene esa apertura.
  doctrine_reference: Preservar la tensión interpretativa sin sobreespecificar el texto.
translation_notes:
  revision_awareness: La revisión inglesa final desplazó la expresión desde 'in secret places' a 'in secret' para respetar el valor adverbial posible de ἐν ἀποκρύφοις. La versión española adopta esa misma preferencia y evita introducir una imagen espacial no exigida por el griego.
  spanish_consistency_notes:
  - Se mantiene 'pecados' para αἱ ἁμαρτίαι, en línea con la opción inglesa directa.
  - '''En secreto'' evita calcar ''lugares'' y conserva la ambigüedad del sustantivo plural griego.'
  - '''No lo sabía'' refleja el imperfecto y mantiene el tono sobrio del enunciado.'
