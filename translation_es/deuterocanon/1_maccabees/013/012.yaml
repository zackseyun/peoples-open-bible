  source_alignment_summary: 'El borrador sigue bien el sentido del griego: Trifón sale de Ptolemaida con fuerza militar con el propósito de entrar en la tierra de Judá, y Jonatán va retenido con él. Sin embargo, ''iba con él en custodia'' no suena idiomático en español; la locución española natural para ἐν φυλακῇ aquí es ''bajo custodia'' o ''bajo guardia''.'
  spanish_quality_summary: La redacción es clara y mayormente fiel. 'Partió', 'gran fuerza' y 'la tierra de Judá' son opciones defendibles y legibles. El único problema real es la colocación 'en custodia', que en español resulta forzada para una persona detenida; 'bajo custodia' expresa el estado de Jonatán con naturalidad y precisión.
  glossary_alignment: 'No hay términos teológicos o de glosario mayores en juego. Las decisiones léxicas principales están alineadas con el audit trail inglés y con el sentido del griego. La excepción es ἐν φυλακῇ, donde conviene apartarse levemente de la forma inglesa ''in custody'' para lograr español natural: ''bajo custodia''.'
