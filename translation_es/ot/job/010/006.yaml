lexical_decisions:
- source_word: כִּי
  english_pob_choice: that
  chosen_spanish: porque
  alternatives_spanish:
  - que
  - pues
  lexicon: HALOT
  rationale: En este contexto, כִּי continúa la pregunta retórica de Job y puede introducir la razón o el contenido de lo dicho. En español, «porque» conserva bien esa subordinación dentro de la queja, sin sonar tan rígido como «que» y manteniendo la continuidad discursiva.
- source_word: תְבַקֵּשׁ
  english_pob_choice: you seek out
  chosen_spanish: buscas
  alternatives_spanish:
  - buscas a fondo
  - andas buscando
  - investigas
  lexicon: HALOT
  rationale: בקש en piel expresa buscar activamente. «Buscas» es natural en español y, unido al paralelismo con «rastreas», comunica la idea de una búsqueda insistente sin sobrecargar el verso con un calco demasiado técnico.
- source_word: לַעֲוֺנִי
  english_pob_choice: my iniquity
  chosen_spanish: mi iniquidad
  alternatives_spanish:
  - mi culpa
  - mi pecado
  - mi maldad
  lexicon: HALOT
  rationale: עָוֹן puede significar iniquidad, culpa o el peso moral de la falta. «Iniquidad» conserva el valor ético fuerte del término y mantiene la tensión del discurso de Job sin resolverla hacia una condena explícita.
- source_word: וּלְחַטָּאתִי
  english_pob_choice: my sin
  chosen_spanish: mi pecado
  alternatives_spanish:
  - mi falta
  - mi ofensa
  - mi culpa
  lexicon: HALOT
  rationale: חַטָּאת se adapta naturalmente a «pecado» en español, en paralelo con «iniquidad». Esta elección preserva el doblete hebreo de términos morales cercanos sin fusionarlos en una sola idea.
- source_word: תִדְרֹשׁ
  english_pob_choice: search for
  chosen_spanish: rastreas
  alternatives_spanish:
  - investigas
  - indagas
  - buscas
  lexicon: HALOT
  rationale: דרש puede significar buscar, indagar o investigar. «Rastrear» transmite en español la imagen de una pesquisa minuciosa y activa, y refuerza el paralelismo con «buscas» en la primera cola.
theological_decisions:
- issue: Mantener la acusación retórica de Job sin resolver la cuestión de su culpa real
  english_pob_reading: Translate as 'iniquity' and 'sin' without implying Job's actual guilt.
  chosen_spanish_reading: Traducir como «iniquidad» y «pecado» sin sugerir que el texto declara culpable a Job.
  alternative_spanish_readings:
  - «culpa» y «pecado»
  - «maldad» y «falta»
  rationale: El hablante expresa la percepción de que Dios está examinando sus faltas. La traducción debe conservar esa tensión retórica y no convertirla en una afirmación doctrinal de culpabilidad de Job.
  doctrine_reference: Preservar la tensión teológica del libro de Job sin anticipar juicio final sobre el personaje.
translation_notes:
  revision_awareness: El pasaje fue revisado recientemente y el estado de acuerdo fue alto; no se registraron cambios en la última pasada, así que la redacción española sigue de cerca el paquete fuente y el par inglés auditado.
  spanish_consistency_notes:
  - 'Se conserva el doblete moral hebreo con dos términos distintos: «iniquidad» y «pecado».'
  - Se evita sustituir el vocabulario por «culpa» como lectura principal, aunque se reconoce como alternativa válida.
  - El tono mantiene la queja retórica de Job y no añade explicaciones doctrinales fuera del verso.
