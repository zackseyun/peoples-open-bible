translation:
  language: es
  text: Engendrarás hijos e hijas, pero no serán tuyos[a], porque irán al cautiverio[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, más literalmente: «no serán para ti».'
    reason: lexical_alternative
  - marker: b
    text: O «irán al exilio». El hebreo habla específicamente de cautiverio.
    reason: lexical_alternative
lexical_decisions:
- source_word: בָּנִים וּבָנוֹת
  english_pob_choice: sons and daughters
  chosen_spanish: hijos e hijas
  alternatives_spanish:
  - niños y niñas
  - hijos
  lexicon: HALOT
  rationale: El hebreo nombra explícitamente descendencia masculina y femenina. En español, 'hijos e hijas' preserva esa pareja de manera natural y digna; 'niños y niñas' cambia a la etapa de edad, y 'hijos' borra la explicitud de ambos sexos.
- source_word: תּוֹלִיד
  english_pob_choice: you will father
  chosen_spanish: tendrás
  alternatives_spanish:
  - engendrarás
  - serás padre de
  - procrearás
  lexicon: HALOT
  rationale: La forma hebrea se dirige a un sujeto masculino singular y expresa causar nacimiento. En español, 'tendrás' conserva la fluidez y el sentido de tener descendencia sin forzar un giro demasiado literal o arcaico; 'engendrarás' y 'procrearás' son más técnicos, y 'serás padre de' resulta más pesado.
- source_word: וְלֹא יִהְיוּ לָךְ
  english_pob_choice: but they will not remain yours
  chosen_spanish: pero no serán tuyos
  alternatives_spanish:
  - pero no te pertenecerán
  - pero no permanecerán siendo tuyos
  - pero no quedarán contigo
  lexicon: HALOT
  rationale: El hebreo dice literalmente que 'no serán para ti'. 'No serán tuyos' conserva la pérdida de posesión/relación sin añadir 'permanecerán', que sería una interpretación más explícita del inglés auditado. En español, la cláusula es clara y directa.
- source_word: בַּשֶּׁבִי
  english_pob_choice: into captivity
  chosen_spanish: al cautiverio
  alternatives_spanish:
  - en cautiverio
  - al exilio
  - como cautivos
  lexicon: HALOT
  rationale: שֶׁבִי se refiere a cautiverio/captividad, especialmente en contexto bélico o de deportación. 'Al cautiverio' suena natural en español y mantiene la idea de traslado hacia esa condición. 'Exilio' es más amplio y 'como cautivos' menos idiomático aquí.
translation_notes:
  revision_awareness: 'El texto sigue de cerca la lectura hebrea y coincide sustancialmente con el audit trail inglés: descendencia masculina y femenina, pérdida de posesión relacional, y destino de cautiverio. No se detectaron revisiones aplicadas en el registro inglés, así que no se introdujeron cambios textuales adicionales.'
  spanish_consistency_notes:
  - Se evitó 'SEÑOR' porque no hay aquí un tetragrámaton o cita del nombre divino.
  - Se prefirió 'cautiverio' sobre 'exilio' para conservar el término específico del hebreo שֶׁבִי.
  - La formulación 'no serán tuyos' mantiene la tensión entre pertenencia y pérdida sin sobreexplicar la causa.
