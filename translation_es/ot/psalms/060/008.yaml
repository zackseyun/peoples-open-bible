translation:
  language: es
  text: 'Dios ha hablado en su santidad[a]: «Me regocijaré[b]; repartiré Siquem y mediré el valle de Sucot.»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «en su lugar santo», o «por su santidad». La expresión hebrea puede referirse a la santidad misma de Dios o a la esfera de su santa presencia.'
    reason: lexical_alternative
  - marker: b
    text: Algunos entienden «me regocijaré» como la respuesta del salmista al discurso de Dios, y no como parte de la declaración divina.
    reason: alternative_reading
lexical_decisions:
- source_word: אֱלֹהִים
  english_pob_choice: God
  chosen_spanish: Dios
  alternatives_spanish:
  - dioses
  lexicon: HALOT
  rationale: Aunque la forma hebrea es plural, el verbo singular indica al Dios de Israel; en español corresponde el singular «Dios».
- source_word: דִּבֶּר
  english_pob_choice: has spoken
  chosen_spanish: ha hablado
  alternatives_spanish:
  - habló
  lexicon: HALOT
  rationale: El perfecto comunica una palabra ya pronunciada y vigente; «ha hablado» mantiene ese valor de acción cumplida con relevancia presente.
- source_word: בְּקָדְשׁוֹ
  english_pob_choice: in his holiness
  chosen_spanish: en su santidad
  alternatives_spanish:
  - por su santidad
  - en su lugar santo
  - en su santo lugar
  lexicon: HALOT
  rationale: La expresión puede referir la santidad misma de Dios o la esfera de su presencia santa. «En su santidad» preserva la ambigüedad y evita añadir una idea de templo que el hebreo no exige.
- source_word: אֶעְלֹזָה
  english_pob_choice: I will exult
  chosen_spanish: me regocijaré
  alternatives_spanish:
  - me alegraré
  - exultaré
  lexicon: HALOT
  rationale: El verbo expresa júbilo intenso; en español «me regocijaré» comunica bien esa alegría elevada, aunque «exultaré» también sería posible. El contexto permite la lectura de la voz divina o del salmista, y se mantiene la tensión.
- source_word: אֲחַלְּקָה
  english_pob_choice: I will divide up
  chosen_spanish: repartiré
  alternatives_spanish:
  - dividiré
  - apartaré
  lexicon: HALOT
  rationale: En contexto territorial, el verbo implica distribuir porciones. «Repartiré» suena natural en español y conserva la idea de asignación de territorio.
- source_word: שְׁכֶם
  english_pob_choice: Shechem
  chosen_spanish: Siquem
  alternatives_spanish:
  - Siquén
  lexicon: HALOT
  rationale: Topónimo propio; en español bíblico estándar se escribe «Siquem».
- source_word: וְעֵמֶק סֻכּוֹת
  english_pob_choice: the Valley of Succoth
  chosen_spanish: el valle de Succot
  alternatives_spanish:
  - el valle de Sucot
  - el valle de Succot
  lexicon: HALOT
  rationale: Se conserva el nombre propio por transliteración, adaptado al uso español. «Succot» reproduce el valor del topónimo sin ocultar el referente geográfico.
- source_word: אֲמַדֵּד
  english_pob_choice: measure out
  chosen_spanish: mediré
  alternatives_spanish:
  - mediré y delimitaré
  - trazaré
  lexicon: HALOT
  rationale: El verbo sugiere medir con la implicación de delimitar o asignar; «mediré» mantiene la imagen básica sin sobreinterpretar.
theological_decisions:
- issue: Alcance de la cita y cambio de hablante
  english_pob_reading: The verse is rendered as God's direct speech after the introductory clause, though some read the exultation as the psalmist's response.
  chosen_spanish_reading: Se presenta como discurso directo de Dios tras la introducción, pero la frase «me regocijaré» queda en una forma que no elimina del todo la alternativa de que sea la respuesta del salmista.
  alternative_spanish_readings:
  - '«...: “Me regocijaré; repartiré Siquem...”» leído como voz del salmista'
  - '«...: “Yo me regocijaré; yo repartiré...”» como oráculo divino explícito'
  rationale: La sintaxis favorece una declaración divina, especialmente por el lenguaje territorial. A la vez, la ambigüedad señalada en el POB inglés debe preservarse como tensión interpretativa, no borrarse.
  doctrine_reference: Preservar la tensión interpretativa documentada por el texto y el aparato del POB.
translation_notes:
  revision_awareness: Se tomó en cuenta la revisión más reciente del POB en inglés, que normaliza el topónimo del valle como Succoth; aquí se adaptó al español como «Succot» para mantener una transliteración clara y reconocible en español, sin desplazar el referente geográfico. También se conservó la nota sobre la posible ambigüedad de la voz en primera persona.
  spanish_consistency_notes:
  - Se usó «Dios» para אֱלֹהִים con verbo singular implícito.
  - Se mantuvo «Siquem» como topónimo bíblico estándar en español.
  - Se transliteró el valle como «Succot» para reflejar el nombre propio sin traducirlo.
  - Se prefirió «en su santidad» para no decidir innecesariamente entre cualidad divina y lugar santo.
  - Se evitó «SEÑOR» porque el hebreo aquí dice אֱלֹהִים, no el tetragrámaton.
