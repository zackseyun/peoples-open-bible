translation:
  language: es
  text: Entonces entró, cayó a sus pies y se inclinó hasta el suelo[a]. Luego recogió a su hijo y salió.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «se postró hasta el suelo»; el verbo hebreo también puede traducirse «adoró» en algunos contextos, pero aquí probablemente describe un gesto de profunda reverencia ante Eliseo.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַתָּבֹא
  english_pob_choice: Then she came
  chosen_spanish: Entonces ella llegó
  alternatives_spanish:
  - Y ella llegó
  - Luego ella llegó
  lexicon: HALOT
  rationale: El waw consecutivo avanza la narración; «entonces» conserva la secuencia de forma natural en español, y «llegó» transmite el movimiento al lugar sin sonar forzado.
- source_word: וַתִּפֹּל עַל רַגְלָיו
  english_pob_choice: fell at his feet
  chosen_spanish: cayó a sus pies
  alternatives_spanish:
  - cayó sobre sus pies
  - se arrojó a sus pies
  lexicon: HALOT
  rationale: La expresión idiomática indica postración o súplica ante Eliseo; «a sus pies» es la forma idiomática y natural en español, y evita la literalidad extraña de «sobre sus pies».
- source_word: וַתִּשְׁתַּחוּ אָרְצָה
  english_pob_choice: bowed to the ground
  chosen_spanish: se inclinó hasta el suelo
  alternatives_spanish:
  - se postró hasta el suelo
  - se inclinó a tierra
  - se postró en tierra
  lexicon: HALOT
  rationale: El verbo puede expresar inclinación profunda o postración. Aquí el contexto muestra reverencia agradecida ante Eliseo, no necesariamente adoración divina; «se inclinó hasta el suelo» conserva el gesto sin resolver la ambigüedad teológica.
- source_word: וַתִּשָּׂא אֶת בְּנָהּ
  english_pob_choice: picked up her son
  chosen_spanish: tomó a su hijo
  alternatives_spanish:
  - levantó a su hijo
  - recogió a su hijo
  lexicon: HALOT
  rationale: נשא puede significar levantar o tomar/cargar. En este contexto narrativo, después de la restauración del niño, «tomó a su hijo» comunica la acción de manera natural y suficiente para el español.
- source_word: וַתֵּצֵא
  english_pob_choice: went out
  chosen_spanish: salió
  alternatives_spanish:
  - se fue
  - partió
  lexicon: HALOT
  rationale: יצא significa salir; «salió» reproduce directamente el movimiento narrativo sin añadir matices interpretativos.
theological_decisions:
- issue: Sentido de וַתִּשְׁתַּחוּ respecto de Eliseo
  english_pob_reading: Acto de reverencia o postración ante Eliseo, no adoración explícita a Dios.
  chosen_spanish_reading: Acto de reverencia/prosternación ante Eliseo, no adoración divina explícita.
  alternative_spanish_readings:
  - adoró
  - se postró en adoración
  rationale: El hebreo permite tanto postración como adoración según el contexto. Aquí el objeto inmediato es Eliseo y la escena expresa gratitud y reverencia tras la restauración del hijo; por eso el español debe preservar la tensión sin convertirlo en un enunciado inequívoco de culto.
  doctrine_reference: 'Translation philosophy §3: Preservar la tensión teológica en vez de resolverla'
translation_notes:
  revision_awareness: El cotejo disponible muestra alta concordancia con la traducción inglesa auditada y no registra revisiones posteriores; el español sigue esa lectura sin introducir cambios textuales no sustentados.
  spanish_consistency_notes:
  - Se mantuvo «Dios» en lugar de «SEÑOR» porque este versículo no contiene el nombre divino.
  - Se evitó «Cristo» y la terminología cristológica porque el pasaje no la requiere.
  - Se eligió un registro moderno y digno, con verbos sencillos de narración («llegó», «salió») para conservar el ritmo del hebreo.
