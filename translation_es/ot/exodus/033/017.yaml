translation:
  language: es
  text: 'Y Yahvé dijo a Moisés: «También haré esta palabra[a] que has hablado, porque has hallado favor en mis ojos[b], y te conozco por nombre».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «este asunto» o «esto».
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: «has hallado favor en mis ojos», un modismo que significa recibir consideración favorable.'
    reason: cultural_note
lexical_decisions:
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  lexicon: HALOT
  rationale: Se mantiene el nombre propio del pacto según el criterio del proyecto. «Yahvé» conserva la referencia directa al Tetragrama sin sustituirlo por un título, y es la forma fijada para el texto principal en español.
- source_word: וַיֹּאמֶר ... אֶל מֹשֶׁה
  english_pob_choice: And Yahweh said to Moses
  chosen_spanish: Y Yahvé dijo a Moisés
  alternatives_spanish:
  - Entonces Yahvé habló a Moisés
  - Y Yahvé le dijo a Moisés
  lexicon: HALOT
  rationale: El hebreo introduce una continuación narrativa simple. «Dijo a Moisés» sigue la relación verbal directa sin añadir elementos no necesarios; se conserva el nombre propio de Moisés sin sobrerrepresentar el pronombre objeto.
- source_word: גַּם
  english_pob_choice: also
  chosen_spanish: También
  alternatives_spanish:
  - Además
  - Aun
  lexicon: HALOT
  rationale: La partícula añade esta respuesta a lo ya pedido. «También» reproduce mejor la fuerza aditiva que un «además» más discursivo.
- source_word: הַדָּבָר הַזֶּה
  english_pob_choice: this thing
  chosen_spanish: esto que has hablado
  alternatives_spanish:
  - esta cosa que has hablado
  - esta palabra que has hablado
  - este asunto que has hablado
  lexicon: HALOT
  rationale: דָּבָר puede ser «palabra», «asunto» o «cosa». Dado que el contexto remite a la petición expresada por Moisés, «esto que has hablado» preserva la referencia anafórica y el vínculo con la expresión verbal sin forzar un sustantivo en español que suene artificial.
- source_word: דִּבַּרְתָּ
  english_pob_choice: that you have spoken
  chosen_spanish: has hablado
  alternatives_spanish:
  - hablaste
  - has dicho
  lexicon: HALOT
  rationale: Se conserva el enlace verbal con la petición de Moisés. El perfecto compuesto español expresa adecuadamente una acción dicha en el diálogo inmediato.
- source_word: אֶעֱשֶׂה
  english_pob_choice: I will do
  chosen_spanish: haré
  alternatives_spanish:
  - lo haré
  - voy a hacer
  lexicon: HALOT
  rationale: El verbo עשה aquí responde a la petición con una promesa de acción. «Haré» es la forma más natural y fiel en español.
- source_word: מָצָאתָ חֵן בְּעֵינַי
  english_pob_choice: you have found favor in my eyes
  chosen_spanish: has hallado favor en mis ojos
  alternatives_spanish:
  - has encontrado gracia ante mis ojos
  - me eres grato
  lexicon: HALOT
  rationale: Se conserva el modismo hebreo con la imagen de «ojos», como lo hizo la POB en inglés. «Favor» reproduce חֵן con claridad; «gracia» sería posible, pero en este contexto el valor idiomático de aceptación favorable es más preciso.
- source_word: וָאֵדָעֲךָ
  english_pob_choice: and I know you
  chosen_spanish: y te conozco
  alternatives_spanish:
  - y te he conocido
  - y te reconozco
  lexicon: HALOT
  rationale: ידע expresa conocimiento personal y relacional. «Te conozco» comunica esa cercanía de manera directa en español y mantiene la declaración divina sin sobrecargarla temporalmente.
- source_word: בְּשֵׁם
  english_pob_choice: by name
  chosen_spanish: por nombre
  alternatives_spanish:
  - por tu nombre
  - personalmente
  lexicon: HALOT
  rationale: La frase breve conserva el matiz de conocimiento específico e אישי. «Por nombre» sigue de cerca el hebreo y suena natural en español bíblico contemporáneo.
theological_decisions:
- issue: Tratamiento del nombre divino YHWH
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Jehová
  - el SEÑOR
  rationale: El texto hebreo usa el Tetragrama directamente. La POB en inglés preserva el nombre como «Yahweh»; en español, el equivalente de proyecto es «Yahvé», manteniendo la transparencia auditiva y evitando la sustitución litúrgica por un título.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Sentido de חֵן en la expresión «hallar favor»
  english_pob_reading: favor in my eyes
  chosen_spanish_reading: favor en mis ojos
  alternative_spanish_readings:
  - gracia en mis ojos
  - aceptación en mis ojos
  rationale: La POB conserva el modismo hebreo. En español, «favor» comunica mejor el valor relacional y de aceptación que «gracia» en esta frase, sin perder la imagen corporal de «mis ojos».
  doctrine_reference: HALOT חֵן; uso idiomático de favor/aceptación
- issue: Conocimiento divino «por nombre»
  english_pob_reading: I know you by name
  chosen_spanish_reading: te conozco por nombre
  alternative_spanish_readings:
  - te conozco personalmente
  - te conozco por tu nombre
  rationale: La expresión puede sonar extraña, pero preserva la particularidad del trato divino. Se evita diluirla a «personalmente» para no perder el énfasis en la identificación nominativa.
  doctrine_reference: Ex 33:17; ידע + בְּשֵׁם
translation_notes:
  revision_awareness: El pasaje muestra alta concordancia con la POB inglesa; no se detectaron revisiones sustanciales recientes en el contexto de auditoría. La redacción española sigue la misma lectura estable, con ajustes naturales de estilo para mantener transparencia y fluidez.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como forma uniforme del nombre divino.
  - Se conserva «favor» en la expresión idiomática de aceptación divina.
  - «Por nombre» reproduce de manera consistente el matiz nominativo de בְּשֵׁם.
  - El orden narrativo y la cita directa siguen de cerca la estructura del hebreo y de la POB inglesa.
