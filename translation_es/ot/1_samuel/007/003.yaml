  text: Then Samuel said to all the house of Israel[a], “If you are returning to Yahweh with all your heart, remove the foreign gods and the Ashtaroths from among you, and direct your heart to Yahweh and serve him alone[d][c][b], and he will deliver you from the hand of the Philistines.”
  footnotes:
