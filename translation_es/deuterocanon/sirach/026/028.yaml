translation:
  language: es
  text: 'Por dos cosas mi corazón se ha entristecido, y por una tercera me ha sobrevenido ira: un guerrero abatido por la pobreza, y hombres de entendimiento si son tratados como basura[a], y uno que vuelve de la rectitud al pecado[b]—Yahvé lo preparará para la espada.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «si son tratados como desecho», «si son tratados como basura» o «si son arrojados como estiércol»; el verbo griego procede de una palabra para desecho y comunica una degradación despectiva.
    reason: lexical_alternative
  - marker: b
    text: El «lo» singular se refiere más naturalmente al que vuelve de la rectitud al pecado, aunque la lista griega es sintácticamente condensada y algunos lectores pueden oír la cláusula de juicio como un resumen de todo el dicho.
    reason: alternative_reading
lexical_decisions:
- source_word: Ἐπὶ δυτὶ
  english_pob_choice: Over two things
  chosen_spanish: Por dos cosas
  alternatives_spanish:
  - A causa de dos cosas
  - Sobre dos cosas
  lexicon: LSJ
  rationale: ἐπί con dativo introduce las causas de la aflicción; en español, «Por dos cosas» expresa de manera natural esa relación causal y conserva el tono de lamentación del original.
- source_word: λελύπηται ἡ καρδία μου
  english_pob_choice: my heart is grieved
  chosen_spanish: mi corazón se ha entristecido
  alternatives_spanish:
  - mi corazón está afligido
  - mi corazón ha sido entristecido
  lexicon: LSJ
  rationale: El perfecto de λυπέω señala un estado presente resultado de la tristeza. «Se ha entristecido» reproduce bien ese estado sin sonar demasiado arcaico.
- source_word: θυμός μοι ἐπῆλθεν
  english_pob_choice: anger has come upon me
  chosen_spanish: me ha sobrevenido ira
  alternatives_spanish:
  - me ha venido ira
  - la ira ha venido sobre mí
  lexicon: LSJ
  rationale: θυμός aquí expresa enojo o ira que irrumpe en el hablante. «Me ha sobrevenido ira» conserva la imagen de algo que irrumpe y mantiene el peso verbal del griego.
- source_word: ἀνὴρ πολεμιστὴς
  english_pob_choice: a warrior
  chosen_spanish: un guerrero
  alternatives_spanish:
  - un hombre de guerra
  - un combatiente
  lexicon: LSJ
  rationale: La expresión designa a un hombre caracterizado por la guerra. «Guerrero» es breve, natural y mantiene el valor masculino singular.
- source_word: ὑστερῶν διʼ ἔνδειαν
  english_pob_choice: brought low by poverty
  chosen_spanish: abatido por la pobreza
  alternatives_spanish:
  - reducido por la pobreza
  - faltándole por la pobreza
  lexicon: LSJ
  rationale: ὑστερέω implica quedar falto o quedar por debajo; διʼ ἔνδειαν especifica la causa como pobreza o carencia. «Abatido por la pobreza» recoge la humillación y la privación en un español claro.
- source_word: ἄνδρες συνετοὶ
  english_pob_choice: men of understanding
  chosen_spanish: hombres de entendimiento
  alternatives_spanish:
  - hombres sabios
  - hombres prudentes
  lexicon: LSJ
  rationale: συνετός denota entendimiento, discernimiento y sensatez. «Hombres de entendimiento» preserva el plural masculino y el matiz intelectual-moral.
- source_word: ἐὰν σκυβαλωθῶσιν
  english_pob_choice: if they are treated like refuse
  chosen_spanish: si son tratados como desecho
  alternatives_spanish:
  - si son tratados como basura
  - si son arrojados como estiércol
  lexicon: LSJ
  rationale: El verbo derivado de σκύβαλον evoca ser tratado como residuo o cosa despreciable. «D echo» transmite la degradación y la burla sin forzar un registro innecesariamente crudo.
- source_word: ἐπανάγων ἀπὸ δικαιοσύνης ἐπὶ ἁμαρτίαν
  english_pob_choice: one who turns back from righteousness to sin
  chosen_spanish: uno que vuelve de la justicia al pecado
  alternatives_spanish:
  - uno que vuelve de la rectitud al pecado
  - uno que se aparta de la justicia hacia el pecado
  lexicon: LSJ
  rationale: El participio expresa el retroceso desde una conducta justa hacia el pecado. Se eligió «vuelve» para mantener la idea de retorno, y «justicia» sigue el sentido moral del término en este contexto sapiencial.
- source_word: ὁ κύριος
  english_pob_choice: the Lord
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el Señor
  lexicon: LSJ
  rationale: Aunque κύριος en griego puede leerse como «Señor», aquí el contexto de Sirácides apunta al Dios de Israel. Conforme al criterio del proyecto, se usa «Yahvé» para evitar el ocultamiento del nombre divino.
- source_word: ἑτοιμάσει εἰς ῥομφαίαν αὐτόν
  english_pob_choice: will prepare him for the sword
  chosen_spanish: lo preparará para la espada
  alternatives_spanish:
  - lo dispondrá para la espada
  - lo preparará para la espada de juicio
  lexicon: LSJ
  rationale: La expresión indica destinación judicial a la espada. «Lo preparará para la espada» conserva la formulación breve y ominosa del griego.
theological_decisions:
- issue: Referencia del sujeto castigado en la cláusula final singular
  english_pob_reading: The final singular 'him' most naturally refers to the one who turns back from righteousness to sin, though the Greek list is syntactically compressed and some readers may hear the judgment clause as summing up the whole saying.
  chosen_spanish_reading: La cláusula final se mantiene ligada de manera principal al que vuelve de la justicia al pecado, sin resolver en exceso la sintaxis comprimida del listado.
  alternative_spanish_readings:
  - El juicio podría oírse como resumido sobre todo el conjunto de los casos mencionados
  rationale: El singular αὐτόν sigue más de cerca al participio singular final, pero la enumeración previa es comprimida y admite una lectura más amplia. Se preserva esa tensión con una redacción que no obliga a una resolución más precisa de la que ofrece el griego.
  doctrine_reference: Preservar la tensión sintáctica y no sobreexplicar el referente
- issue: Rendición de δικαιοσύνη
  english_pob_reading: righteousness
  chosen_spanish_reading: justicia
  alternative_spanish_readings:
  - rectitud
  - justicia/righteousness en sentido moral
  rationale: En este contexto sapiencial, δικαιοσύνη describe una conducta recta y conforme al orden de Dios. «Justicia» mantiene ese campo semántico sin desplazarlo hacia un sentido puramente judicial.
  doctrine_reference: 'Contested terms table: δικαιοσύνη → righteousness by default; en español, justicia/rectitud según contexto'
translation_notes:
  revision_awareness: 'Concordancia alta con el texto fuente griego y con el auditorío inglés: se mantiene la secuencia de tres agravios, el contraste entre justicia y pecado, y la clausula final de juicio divino. No se detectaron revisiones aplicadas en el contexto inglés reciente.'
  spanish_consistency_notes:
  - Se usa «Yahvé» para κύριος en coherencia con el estándar del proyecto cuando el contexto refiere al Dios de Israel.
  - Se mantiene «justicia» para δικαιοσύνη por su valor moral sapiencial, no como justicia forense exclusivamente.
  - Se conserva la imagen de «espada» sin amplificación interpretativa, porque el griego dice εἰς ῥομφαίαν.
  - La enumeración y el guion largo reflejan la sintaxis comprimida del griego y la observación auditada sobre el posible alcance del juicio final.
