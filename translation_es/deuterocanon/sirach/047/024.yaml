base_translation:
  language: en
  yaml_path: translation/deuterocanon/sirach/047/024.yaml
  text: A broad folly and lacking understanding was Rehoboam[a], who caused the people to revolt by his counsel, until one arose—may there be no remembrance of him—Jeroboam son of Nebat[b], who sinned and caused Israel to sin.
  footnotes:
  - marker: a
    text: The Hebrew witness here is compressed and the verse division appears unstable; the Greek parallel preserves a fuller wording, including 'and gave Ephraim a way of sin.' That fuller clause is not carried into the main text because it is not explicit in the surviving Hebrew line here.
    reason: textual_variant
  - marker: b
    text: Or 'divided the people by his counsel.' The underlying Hebrew is difficult, and the Greek parallel supports the sense that Rehoboam caused the people's defection through his policy.
    reason: lexical_alternative
