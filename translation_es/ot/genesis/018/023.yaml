translation:
  language: es
  text: 'Entonces Abraham se acercó y dijo[a]: «¿De veras arrasarás al justo con el malvado?»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «destruirás» o «consumirás» para «arrasarás»; el verbo hebreo expresa quitar o remover en juicio.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּגַּשׁ
  english_pob_choice: came near
  chosen_spanish: se acercó
  alternatives_spanish:
  - se aproximó
  - se allegó
  lexicon: HALOT
  rationale: El verbo expresa movimiento físico y discursivo hacia delante. «Se acercó» conserva la acción concreta de Abraham al intervenir e interceder, y suena natural en español bíblico contemporáneo.
- source_word: אַבְרָהָם
  english_pob_choice: Abraham
  chosen_spanish: Abraham
  alternatives_spanish:
  - Abrahán
  lexicon: Transliteración estándar
  rationale: Se mantiene el nombre propio tradicional y ampliamente reconocible en español.
- source_word: וַיֹּאמַר
  english_pob_choice: said
  chosen_spanish: dijo
  alternatives_spanish:
  - habló
  - respondió
  lexicon: HALOT
  rationale: «Dijo» reproduce con naturalidad el verbo narrativo común sin introducir matices no presentes en el hebreo.
- source_word: הַאַף
  english_pob_choice: indeed
  chosen_spanish: ¿De veras?
  alternatives_spanish:
  - ¿Acaso?
  - ¿Realmente?
  lexicon: HALOT
  rationale: La partícula intensifica la pregunta y expresa asombro/apelación. «¿De veras?» comunica bien esa fuerza interrogativa sin volverla demasiado explicativa.
- source_word: תִּסְפֶּה
  english_pob_choice: sweep away
  chosen_spanish: barrerás
  alternatives_spanish:
  - destruirás
  - consumirás
  - extinguirás
  lexicon: HALOT
  rationale: El verbo hebreo implica remover en juicio. «Barrerás» conserva la imagen vívida de eliminación total que el inglés POB plasmó con «sweep away».
- source_word: צַדִּיק
  english_pob_choice: the righteous
  chosen_spanish: al justo
  alternatives_spanish:
  - al justo inocente
  - a los justos
  lexicon: HALOT
  rationale: Aunque la forma hebrea es singular, funciona de manera genérica. En español, «al justo» mantiene la categoría moral sin forzar una pluralización que altere la formulación del hebreo.
- source_word: עִם
  english_pob_choice: with
  chosen_spanish: junto con
  alternatives_spanish:
  - con
  - al lado de
  lexicon: HALOT
  rationale: La preposición expresa asociación en el mismo destino. «Junto con» hace explícita esa solidaridad de juicio en un español claro y fiel.
- source_word: רָשָׁע
  english_pob_choice: the wicked
  chosen_spanish: el malvado
  alternatives_spanish:
  - el impío
  - el injusto
  lexicon: HALOT
  rationale: El contraste moral con צַדִּיק exige un término fuerte. «Malvado» conserva el valor ético del hebreo y evita suavizarlo con opciones menos directas.
theological_decisions:
- issue: Categorías morales genéricas en singular
  english_pob_reading: 'Render צַדִּיק and רָשָׁע as generic class terms: ''the righteous'' and ''the wicked''.'
  chosen_spanish_reading: 'Traducirlas en singular genérico: «al justo» y «el malvado».'
  alternative_spanish_readings:
  - «a los justos» y «los malvados»
  - «al hombre justo» y «al hombre malvado»
  rationale: El hebreo usa formas singulares con valor representativo para formular un principio de justicia divina, no para señalar solo a una persona específica. El singular español conserva esa tensión y evita desdibujar la construcción del texto.
  doctrine_reference: DOCTRINE.md §Translation philosophy, punto 3 (preservar la tensión) y punto 4 (precisión de género y número según el fuente)
translation_notes:
  revision_awareness: El cotejo de revisión indica alto acuerdo y ningún cambio necesario; se mantiene la lectura del inglés POB, con adaptación española directa desde el hebreo y sin resolver la tensión moral del par justo/malvado.
  spanish_consistency_notes:
  - Se preserva el movimiento narrativo con «se acercó» para וַיִּגַּשׁ.
  - Se mantiene la intensidad interrogativa de הַאַף con una pregunta inicial en español.
  - Se usa un singular genérico en «al justo» / «el malvado» para reflejar la forma hebrea.
  - Se evita «SEÑOR» porque este versículo no contiene el Tetragrámaton ni una cita explícita de יהוה.
