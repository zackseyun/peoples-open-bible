- from: Los que habían quedado en la ciudad se llenaron de confusión y salieron corriendo[a], en incertidumbre acerca de lo que estaba ocurriendo.
  to: Los que habían quedado en la ciudad quedaron desconcertados y salieron corriendo[a], sin tener claro lo que estaba ocurriendo.
