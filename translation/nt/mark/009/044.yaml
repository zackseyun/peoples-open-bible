id: MRK.9.44
reference: Mark 9:44
source:
  edition: robinson-pierpont-2005-byzantine
  text: ὅπου ὁ σκώληξ αὐτῶν οὐ τελευτᾷ, καὶ τὸ πῦρ οὐ σβέννυται.
  language: Greek
translation:
  text: where[a] their worm does not die, and the fire is not quenched.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: This verse is absent from the earliest Greek manuscripts (including the
      4th-century Sinaiticus and Vaticanus) and early Coptic translations, but is
      present in the 5th-century Alexandrinus, the Latin tradition, and the later
      Byzantine majority. It is likely a later scribal addition that repeats the identical
      phrase from verse 48.
    reason: textual_critical
lexical_decisions:
- source_word: σκώληξ
  chosen: worm
  alternatives:
  - maggot
  - grub
  lexicon: BDAG
  rationale: Refers to a worm or maggot that feeds on decaying matter. 'Worm' is the
    traditional and most direct English equivalent, preserving the direct quotation
    of the imagery from Isaiah 66:24.
- source_word: τελευτᾷ
  chosen: die
  alternatives:
  - come to an end
  - perish
  lexicon: BDAG
  rationale: From 'teleutaō', meaning to come to an end or die. In the context of
    a living organism, 'die' is the most natural and accurate rendering.
- source_word: σβέννυται
  chosen: quenched
  alternatives:
  - extinguished
  - put out
  lexicon: BDAG
  rationale: A present passive indicative meaning to be extinguished or put out. 'Quenched'
    carries the appropriate theological and traditional weight for the unceasing nature
    of the fire.
theological_decisions: []
