- from: Porque grande es la lucha del alma y el peligro que yace en tormento eterno para los que transgreden el mandamiento de Dios[a].
  to: Porque grande es la lucha del alma y el peligro que aguarda en tormento eterno para los que transgreden el mandamiento de Dios[a].
  rationale: Se reemplaza «que yace» por «que aguarda» para expresar κείμενος de manera más natural y clara en español, conservando la idea de un peligro que está allí para quienes transgreden el mandamiento de Dios. Se mantiene «tormento eterno» y la nota léxica conforme a la auditoría inglesa y al sentido del griego.
