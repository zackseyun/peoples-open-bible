translation:
  language: es
  text: Entonces Ester mandó que respondieran a Mardoqueo.[a]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo literalmente: «Y Ester dijo que hicieran volver respuesta a Mardoqueo». El sentido es que dio instrucciones para responderle.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַתֹּאמֶר
  english_pob_choice: Then ... told
  chosen_spanish: Entonces ... dijo
  alternatives_spanish:
  - Y ... dijo
  - Entonces ... habló
  lexicon: HALOT
  rationale: La forma con waw consecutivo avanza la narración; en español, «Entonces» reproduce con naturalidad ese valor secuencial. Se conserva «dijo» porque el hebreo usa אמר, aunque el contexto muestra que la palabra va seguida de una instrucción para dar respuesta.
- source_word: אֶסְתֵּר
  english_pob_choice: Esther
  chosen_spanish: Ester
  alternatives_spanish:
  - Esther
  lexicon: Nombres propios bíblicos
  rationale: Se translitera el nombre propio al uso castellano bíblico estándar, con adaptación gráfica natural «Ester».
- source_word: לְהָשִׁיב
  english_pob_choice: to reply
  chosen_spanish: que respondieran
  alternatives_spanish:
  - que dieran respuesta
  - que devolvieran respuesta
  - que contestaran
  lexicon: HALOT
  rationale: El hifil de שוב aquí expresa causar que una respuesta vuelva; en español, el sentido idiomático se rinde con un verbo de respuesta en subjuntivo, manteniendo la idea de respuesta enviada de vuelta sin volverlo literal en exceso.
- source_word: אֶל
  english_pob_choice: to
  chosen_spanish: a
  alternatives_spanish:
  - hacia
  - para
  lexicon: HALOT
  rationale: La preposición marca dirección respecto de Mardoqueo; en español, con el verbo de respuesta, «a» es la construcción natural y suficiente.
- source_word: מָרְדֳּכָי
  english_pob_choice: Mordecai
  chosen_spanish: Mardoqueo
  alternatives_spanish:
  - Mordecai
  lexicon: Nombres propios bíblicos
  rationale: Se usa la forma castellana tradicional del nombre propio bíblico, más reconocible para lectores en español.
translation_notes:
  revision_awareness: El texto sigue de cerca el hebreo masorético de Ester 4:15 y el audit trail inglés, que entiende לְהָשִׁיב como una instrucción para responder a Mardoqueo. No se registran revisiones aplicadas en el paquete fuente.
  spanish_consistency_notes:
  - Se mantiene la narración en pasado con valor secuencial («Entonces»).
  - Se evita traducir mecánicamente como «decir a volver»; en cambio, se expresa el valor idiomático del infinitivo causativo hebreo.
  - 'Los nombres propios siguen la forma castellana bíblica coherente: Ester, Mardoqueo.'
