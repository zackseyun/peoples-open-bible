translation:
  language: es
  text: No te gloríes[a] en la deshonra de tu padre, porque no es un honor para ti.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «No te gloríes por la deshonra de tu padre». El verbo reflexivo hebreo puede sugerir buscar honor para uno mismo; el griego paralelo también usa lenguaje de gloria y honor.'
    reason: lexical_alternative
lexical_decisions:
- source_word: אַל / μὴ
  english_pob_choice: Do not
  chosen_spanish: 'No'
  alternatives_spanish:
  - No hagas
  - No debes
  lexicon: HALOT; LXX μὴ
  rationale: La prohibición sapiencial se expresa de manera directa y natural con 'No' + verbo en español.
- source_word: תִּתְכַּבֵּד / δόξαζε
  english_pob_choice: glorify yourself
  chosen_spanish: te gloríes
  alternatives_spanish:
  - te glorifiques
  - busques honra para ti
  - te honres
  lexicon: HALOT; LSJ
  rationale: 'El hitpael hebreo y el verbo griego tienen fuerza reflexiva: no solo ''honrar'' sino buscar gloria/honor para uno mismo. ''Te gloríes'' conserva ese matiz sin sonar tan pesado como una glosa literal.'
- source_word: בְּקְלוֹן / ἐν ἀτιμίᾳ
  english_pob_choice: in your father's disgrace
  chosen_spanish: en la deshonra de tu padre
  alternatives_spanish:
  - en la vergüenza de tu padre
  - por la deshonra de tu padre
  - a causa de la deshonra de tu padre
  lexicon: HALOT; BDAG
  rationale: '''קלון'' y ''ἀτιμία'' expresan vergüenza, deshonra, falta de honra. ''Deshonra'' es la forma más clara y digna en español, y mantiene la relación con ''honra'' del miembro final.'
- source_word: אָבִיךָ / πατρός σου
  english_pob_choice: your father
  chosen_spanish: tu padre
  alternatives_spanish:
  - de tu padre
  lexicon: HALOT
  rationale: Se preserva el posesivo singular del hebreo y del griego, con el orden natural del español.
- source_word: לֹא כָבוֹד הוּא לָךְ / οὐ γάρ ἐστίν σοι δόξα
  english_pob_choice: it is no honor to you
  chosen_spanish: no es honra para ti
  alternatives_spanish:
  - no es honor para ti
  - no te trae honra
  - no te da honor
  lexicon: HALOT; LSJ
  rationale: '''כָבוֹד'' / ''δόξα'' aquí significan honra, no gloria en sentido abstracto. ''Honra'' mantiene mejor el paralelo con ''deshonra'' y la sentencia sapiencial.'
translation_notes:
  revision_awareness: La versión inglesa final cambió de 'honor yourself' a 'glorify yourself' para reflejar mejor el sentido reflexivo del verbo hebreo. La redacción española sigue esa misma decisión, pero usa 'te gloríes' para naturalidad y para conservar el campo semántico de gloria/honra presente en el hebreo y el griego.
  spanish_consistency_notes:
  - Se mantuvo el paralelismo honra/deshonra para reflejar כָבוֹד/קְלוֹן y δόξα/ἀτιμία.
  - Se evitó 'SEÑOR' u otras sustituciones no pertinentes porque el versículo no contiene el nombre divino.
  - Se prefirió 'honra' en la cláusula final para no diluir el contraste moral del dicho sapiencial.
