translation:
  language: es
  text: Y en aquel tiempo mató al hombre[a] del rey, que estaba obligando a la gente a sacrificar, y derribó el altar.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Griego literalmente, «el hombre del rey». Probablemente se refiere a un funcionario o agente real.
    reason: lexical_alternative
lexical_decisions:
- source_word: τὸν ἄνδρα τοῦ βασιλέως
  english_pob_choice: the king’s man
  chosen_spanish: el hombre del rey
  alternatives_spanish:
  - el oficial del rey
  - el agente del rey
  lexicon: LSJ
  rationale: ἄνδρα significa literalmente «hombre», y el genitivo τοῦ βασιλέως indica pertenencia o representación del rey. «El hombre del rey» conserva la cercanía al griego y resulta natural en español. «Oficial» o «agente» interpretan más específicamente la función, útil solo como alternativa explicativa.
- source_word: τὸν ἀναγκάζοντα
  english_pob_choice: who was compelling them
  chosen_spanish: que en aquel tiempo estaba obligando
  alternatives_spanish:
  - que los estaba forzando
  - que los estaba presionando
  lexicon: BDAG
  rationale: 'ἀναγκάζω expresa coerción real: obligar, forzar, compelir. «Estaba obligando» transmite la acción continua y el matiz coercitivo. Se omite el objeto explícito en español porque el contexto narrativo ya lo presupone; añadir «los» sería interpretativo, aunque posible.'
- source_word: θύειν
  english_pob_choice: to sacrifice
  chosen_spanish: a sacrificar
  alternatives_spanish:
  - a ofrecer sacrificio
  - a inmolar
  lexicon: LSJ
  rationale: En contexto sacrificial, θύω significa ofrecer sacrificio. La construcción «obligar a sacrificar» es idiomática y fiel. «Ofrecer sacrificio» es más explícito, pero menos conciso. «Inmolar» puede sonar demasiado técnico o restrictivo.
- source_word: ἀπέκτεινεν
  english_pob_choice: killed
  chosen_spanish: mató
  alternatives_spanish:
  - dio muerte a
  - asesinó
  lexicon: BDAG
  rationale: El aoristo de ἀποκτείνω significa simplemente matar. «Mató» es claro y directo. «Asesinó» añade juicio intencional no exigido por el verbo; «dio muerte a» es correcto pero más pesado.
- source_word: ἐν τῷ καιρῷ ἐκείνῳ
  english_pob_choice: at that time
  chosen_spanish: en aquel tiempo
  alternatives_spanish:
  - en ese momento
  - entonces
  lexicon: LSJ
  rationale: La frase es temporal y algo enfática. «En aquel tiempo» conserva el valor deíctico del griego y suena natural en español bíblico contemporáneo.
- source_word: τὸν βωμὸν
  english_pob_choice: the altar
  chosen_spanish: el altar
  alternatives_spanish:
  - el altar del sacrificio
  - el altar de los holocaustos
  lexicon: LSJ
  rationale: βωμός designa un altar, especialmente de sacrificio. «El altar» es suficiente y fiel en este contexto. Las ampliaciones especifican más de lo que el griego dice.
- source_word: καθεῖλεν
  english_pob_choice: tore down
  chosen_spanish: derribó
  alternatives_spanish:
  - destruyó
  - echó abajo
  lexicon: BDAG
  rationale: καθαιρέω aquí significa derribar o demoler. «Derribó» reproduce bien la acción violenta contra el altar sin sobretraducir a destrucción total.
theological_decisions:
- issue: Objeto implícito de «obligar a sacrificar»
  english_pob_reading: who was compelling them to sacrifice
  chosen_spanish_reading: que en aquel tiempo estaba obligando a sacrificar
  alternative_spanish_readings:
  - que estaba obligando al pueblo a sacrificar
  - que los estaba obligando a sacrificar
  rationale: El griego no expresa un objeto directo con θύειν; el contexto de 1 Macabeos 2 muestra coerción cultual sobre la población. En español se puede dejar implícito para no fijar indebidamente el referente, manteniendo a la vez la fuerza de la coerción.
  doctrine_reference: Translation philosophy §1, §5
- issue: Traducción del agente real
  english_pob_reading: the king’s man
  chosen_spanish_reading: el hombre del rey
  alternative_spanish_readings:
  - el oficial del rey
  - el agente del rey
  rationale: La expresión griega es literal y genérica. «El hombre del rey» conserva esa literalidad y deja abierta la identificación histórica precisa, como hace la nota inglesa. Las alternativas interpretan el cargo con mayor especificidad.
  doctrine_reference: Translation philosophy §2
translation_notes:
  revision_awareness: Se revisó el testimonio inglés y el griego directo. No se detectaron cambios textuales recientes relevantes; la versión inglesa mantiene alta concordancia con el griego y solo requiere en español conservar la misma apertura lexical en «el hombre del rey» y el objeto implícito de «obligar a sacrificar».
  spanish_consistency_notes:
  - Se mantiene «altar» para βωμός, sin añadir especificadores litúrgicos que el griego no exige.
  - Se evita «Cristo» u այլ terminología ajena al pasaje.
  - «Mató» y «derribó» conservan el tono narrativo sobrio del relato.
  - La nota [a] queda anclada en «hombre del rey», siguiendo el tipo de aclaración del inglés.
