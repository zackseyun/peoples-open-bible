lexical_decisions:
- source_word: אַלּוּף
  english_pob_choice: chief
  chosen_spanish: jefe
  alternatives_spanish:
  - caudillo
  - jefe de clan
  - líder
  lexicon: HALOT
  rationale: En estas listas edomitas, אַלּוּף nombra a un jefe tribal o de clan. «Jefe» comunica bien el rango de liderazgo en español actual y evita el matiz más marcadamente histórico o nobiliario de «caudillo» o «duque».
- source_word: קְנַז
  english_pob_choice: Kenaz
  chosen_spanish: Quenaz
  alternatives_spanish:
  - Kenaz
  lexicon: Nombre propio
  rationale: Se translitera el nombre propio. Se emplea «Quenaz» para reflejar de manera más natural la pronunciación española inicial /k/ ante e, sin alterar la identidad del nombre.
- source_word: תֵּימָן
  english_pob_choice: Teman
  chosen_spanish: Temán
  alternatives_spanish:
  - Temán
  - Temán, región de Edom
  lexicon: HALOT
  rationale: Aquí funciona como nombre propio dentro de una lista genealógica/tribal; por eso se conserva la transliteración. Se acentúa «Temán» para la acentuación natural en español.
- source_word: מִבְצָר
  english_pob_choice: Mibzar
  chosen_spanish: Mibzar
  alternatives_spanish:
  - Mibzar
  lexicon: Nombre propio
  rationale: Nombre propio transliterado, sin traducción semántica, siguiendo el patrón de la lista y el tratamiento auditable del texto fuente.
translation_notes:
  revision_awareness: El cotejo de revisión indica alta concordancia y ningún cambio sustantivo; la única tensión lexical relevante es אַלּוּף, donde el inglés POB opta por «chief» y conserva como alternativa «clan chief».
  spanish_consistency_notes:
  - Se mantiene una estructura nominal breve, adecuada para una lista genealógica.
  - Los nombres propios se conservan como transliteraciones españolas estables, con acentuación solo donde mejora la lectura en español sin introducir interpretación.
  - Se evita «duque» por su carga histórica y por ser menos claro en español moderno.
