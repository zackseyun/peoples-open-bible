  glossary_alignment: 'La terminología clave está bien alineada: עֲבָדִים → «esclavos» respeta la política del proyecto; מִנְחָה → «tributo» refleja bien el contexto político; no hay conflictos con Yahvé/Mesías u otras pautas globales. La única desalineación real es la omisión de la nota léxica principal conservada en el English POB.'
