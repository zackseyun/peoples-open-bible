translation:
  language: es
  text: Que sean pocos sus días; que otro tome su oficio[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «cargo», «responsabilidad» o «puesto». El término hebreo se refiere a una responsabilidad confiada o a un rol designado.
    reason: lexical_alternative
lexical_decisions:
- source_word: יִֽהְיֽוּ
  english_pob_choice: May ... be
  chosen_spanish: Sean
  alternatives_spanish:
  - Que sean
  - Ojalá sean
  lexicon: HALOT
  rationale: 'El verbo yiqtol con valor jussivo en esta imprecación se expresa de forma natural en español con un subjuntivo exhortativo: «Sean». Mantiene el tono desiderativo sin convertirlo en una simple afirmación futura.'
- source_word: יָמָיו
  english_pob_choice: his days
  chosen_spanish: sus días
  alternatives_spanish:
  - sus años
  - el tiempo de su vida
  lexicon: HALOT
  rationale: «Días» reproduce directamente el sustantivo plural con sufijo posesivo y conserva la referencia a la duración de la vida.
- source_word: מְעַטִּים
  english_pob_choice: few
  chosen_spanish: pocos
  alternatives_spanish:
  - breves
  - escasos
  lexicon: HALOT
  rationale: «Pocos» corresponde de manera directa al valor cuantitativo del adjetivo. En español, también puede implicar brevedad temporal por extensión, sin añadir una paráfrasis.
- source_word: פְּקֻדָּתוֹ
  english_pob_choice: his office
  chosen_spanish: su cargo
  alternatives_spanish:
  - su oficio
  - su responsabilidad
  - su puesto
  lexicon: HALOT
  rationale: El sustantivo expresa una responsabilidad o rol confiado. «Cargo» transmite bien la idea de un puesto asignado sin imponer de entrada una terminología eclesiástica específica, aunque sigue siendo compatible con la cita posterior en Hechos 1:20.
- source_word: אַחֵר
  english_pob_choice: another
  chosen_spanish: otro
  alternatives_spanish:
  - alguien más
  - uno distinto
  lexicon: HALOT
  rationale: «Otro» es la correspondencia más directa y natural en español para אַחֵר en este paralelismo.
theological_decisions:
- issue: פְּקֻדָּתוֹ y su relación con la cita en Hechos 1:20
  english_pob_reading: office
  chosen_spanish_reading: cargo
  alternative_spanish_readings:
  - oficio
  - responsabilidad
  - puesto
  rationale: La palabra hebrea puede designar una responsabilidad encomendada, un encargo o un rol instituido. «Cargo» conserva esa amplitud y, al mismo tiempo, permite una lectura sobria del texto del Salmo sin importar un sentido técnico posterior más fuerte de lo que el hebreo exige. La forma elegida sigue siendo plenamente compatible con la aplicación de Hechos 1:20.
  doctrine_reference: Translation philosophy §1, §3, §5
translation_notes:
  revision_awareness: El paquete de revisión indica alta concordancia y ningún cambio necesario en la última pasada; por eso la redacción española sigue de cerca la fuerza jussiva e imprecatoria del hebreo y mantiene la ambigüedad lexical relevante de פְּקֻדָּתוֹ sin sobreespecificarla.
  spanish_consistency_notes:
  - Se mantiene «días» en plural para יָמָיו, coherente con el hebreo.
  - Se evita «SEÑOR» u otra sustitución innecesaria, porque el versículo no contiene el nombre divino.
  - «Cargo» evita una lectura exclusivamente eclesiástica, pero no niega la resonancia de Hechos 1:20.
  - La puntuación con punto y coma refleja bien el paralelismo entre las dos peticiones.
