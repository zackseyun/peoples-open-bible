translation:
  language: es
  text: Yahvé ha hecho lo que se propuso; ha cumplido[a] su palabra, la cual ordenó desde días de antaño[b]. Ha derribado y no tuvo compasión; hizo que el enemigo se regocijara a costa de ti; alzó el cuerno de tus adversarios[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'También: «ejecutó» o «llevó a cabo» su palabra.'
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: «desde días de antaño», es decir, desde mucho tiempo atrás.'
    reason: lexical_alternative
  - marker: c
    text: «Cuerno» es una imagen bíblica de fuerza, poder u honor.
    reason: cultural_note
lexical_decisions:
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: Se conserva el nombre divino propio del Tetragrámaton, conforme al criterio del proyecto. 'Yahvé' mantiene la transparencia del texto original mejor que una sustitución titular.
- source_word: זָמָם
  english_pob_choice: planned
  chosen_spanish: se propuso
  alternatives_spanish:
  - planeó
  - tuvo la intención de
  - ideó
  lexicon: HALOT
  rationale: En este contexto expresa intención deliberada previa. 'Se propuso' comunica resolución sin cargar innecesariamente una connotación negativa que no exige el hebreo por sí solo.
- source_word: בִּצַּע
  english_pob_choice: has fulfilled
  chosen_spanish: ha cumplido
  alternatives_spanish:
  - ha ejecutado
  - ha llevado a cabo
  - ha realizado
  lexicon: HALOT
  rationale: La imagen no es solo de hacer, sino de llevar a término lo anunciado. 'Ha cumplido' funciona naturalmente con 'su palabra' y preserva la idea de ejecución/completamiento.
- source_word: אֶמְרָתוֹ
  english_pob_choice: his word
  chosen_spanish: su palabra
  alternatives_spanish:
  - su dicho
  - su declaración
  - su promesa
  lexicon: HALOT
  rationale: '''Palabra'' es la equivalencia más amplia y natural en español para el pronunciamiento divino, sin limitarlo solo a ''promesa''.'
- source_word: צִוָּה
  english_pob_choice: commanded
  chosen_spanish: ordenó
  alternatives_spanish:
  - mandó
  - decretó
  - prescribió
  lexicon: HALOT
  rationale: Aquí el verbo señala algo establecido por autoridad. 'Ordenó' mantiene la fuerza directiva y suena más natural en español que un calco rígido.
- source_word: מִימֵי קֶדֶם
  english_pob_choice: from days of old
  chosen_spanish: desde días de antaño
  alternatives_spanish:
  - desde tiempos antiguos
  - desde hace mucho
  - desde días de antiguo
  lexicon: HALOT
  rationale: La expresión conserva el matiz poético temporal. 'Antaño' evita una paráfrasis excesiva y comunica antigüedad remota de forma idiomática.
- source_word: הָרַס
  english_pob_choice: has torn down
  chosen_spanish: ha derribado
  alternatives_spanish:
  - ha destruido
  - ha demolido
  - ha echado abajo
  lexicon: HALOT
  rationale: El verbo sugiere desmantelamiento o ruina de una estructura. 'Derribado' preserva la imagen concreta del colapso de la ciudad.
- source_word: חָמָל
  english_pob_choice: has not shown pity
  chosen_spanish: no tuvo compasión
  alternatives_spanish:
  - no mostró piedad
  - no se apiadó
  - no perdonó
  lexicon: HALOT
  rationale: En español, 'tener compasión' expresa bien la falta de misericordia o indulgencia del juicio. Evita suavizar la fuerza del verbo.
- source_word: וַיְשַׂמַּח עָלַיִךְ אוֹיֵב
  english_pob_choice: he has made the enemy rejoice over you
  chosen_spanish: hizo que el enemigo se alegrara sobre ti
  alternatives_spanish:
  - hizo regocijarse al enemigo sobre ti
  - causó que el enemigo se alegrara sobre ti
  - hizo que el enemigo celebrara tu ruina
  lexicon: HALOT
  rationale: La forma causativa se refleja con 'hizo que'. 'Sobre ti' conserva la relación hostil de triunfo y humillación, sin añadir más contenido del que el hebreo da.
- source_word: הֵרִים קֶרֶן
  english_pob_choice: he has exalted the horn
  chosen_spanish: alzó el cuerno
  alternatives_spanish:
  - levantó el cuerno
  - exaltó el cuerno
  - levantó la fuerza
  lexicon: HALOT
  rationale: '''Cuerno'' preserva la metáfora bíblica de fuerza, poder y honor. ''Alzó'' permite mantener la imagen corporal sin forzar una explicación en el cuerpo del texto.'
- source_word: צָרָיִךְ
  english_pob_choice: your foes
  chosen_spanish: tus adversarios
  alternatives_spanish:
  - tus enemigos
  - tus opresores
  - tus rivales
  lexicon: HALOT
  rationale: El plural exige un referente plural. 'Adversarios' es una opción digna y amplia; evita la repetición inmediata de 'enemigo' y conserva el tono poético.
theological_decisions:
- issue: Agencia divina en la destrucción de Jerusalén
  english_pob_reading: The verse is rendered with God as the explicit subject of planning, fulfilling, tearing down, withholding pity, and enabling enemy triumph.
  chosen_spanish_reading: El versículo mantiene a Yahvé como sujeto explícito de propósitos, cumplimiento, derribo, falta de compasión y del triunfo enemigo.
  alternative_spanish_readings:
  - Suavizar la causalidad divina con un mero permiso
  - Trasladar la acción a causas secundarias y omitir a Yahvé como agente principal
  rationale: El hebreo presenta una cadena verbal atribuida directamente a Yahvé. La traducción conserva esa tensión teológica sin atenuarla con explicaciones que el texto no introduce.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: El borrador sigue de cerca el acuerdo alto del expediente inglés y mantiene sin resolver la agencia divina explícita. Se adoptó 'Yahvé' para el nombre divino, 'cumplido' para la ejecución de la palabra, y 'cuerno' con nota cultural, sin introducir revisiones no atestiguadas.
  spanish_consistency_notes:
  - Se preservó el paralelismo verbal del hebreo con una secuencia clara en español.
  - '''Antaño'' se usó para mantener el matiz temporal antiguo sin volverlo arcaico en exceso.'
  - Se evitó 'SEÑOR' por coherencia con la terminología del proyecto sobre el Tetragrámaton.
  - '''Adversarios'' mantiene pluralidad y registro digno, diferenciándose de ''enemigo'' en la línea anterior.'
