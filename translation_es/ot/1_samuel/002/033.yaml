translation:
  language: es
  text: Pero no eliminaré de junto a mi altar a todos los tuyos, para consumir tus ojos[a] y entristecer tu alma; y todos los que aumentan en tu casa morirán como hombres[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, «hacerte perder la vista». El hebreo dice literalmente «consumir tus ojos».
    reason: alternative_reading
  - marker: b
    text: O, «morirán en la fuerza de su edad». El hebreo dice literalmente «morirán como hombres».
    reason: alternative_reading
lexical_decisions:
- source_word: וְאִישׁ
  english_pob_choice: every man
  chosen_spanish: todo hombre
  alternatives_spanish:
  - un hombre
  - cada hombre
  lexicon: HALOT
  rationale: En el contexto con negación y verbo de eliminación, la fuerza distributiva es importante. «Todo hombre» conserva mejor la idea de que no será cortada toda la línea, sin convertirla en una frase demasiado interpretativa.
- source_word: לֹא אַכְרִית לְךָ מֵעִם מִזְבְּחִי
  english_pob_choice: I will not cut off every man of yours from beside my altar
  chosen_spanish: no cortaré de ti a todo hombre de junto a mi altar
  alternatives_spanish:
  - no destruiré a todos los tuyos de mi altar
  - no apartaré de mi altar a ninguno de los tuyos
  lexicon: HALOT
  rationale: «Cortaré» mantiene el valor fuerte de כרת en hifil, y «de junto a mi altar» refleja con precisión מֵעִם, no solo un simple «de» o «desde». La construcción conserva la tensión de juicio con un remanente que no será totalmente excluido.
- source_word: לְכַלּוֹת אֶת עֵינֶיךָ
  english_pob_choice: to make your eyes fail
  chosen_spanish: para hacer que se consuman tus ojos
  alternatives_spanish:
  - para hacer fallar tus ojos
  - para desgastar tus ojos
  lexicon: HALOT
  rationale: כלה aquí expresa consumirse o agotarse por dolor. «Se consuman tus ojos» conserva la imagen hebrea de desgaste y resulta natural en español bíblico contemporáneo.
- source_word: וְלַאֲדִיב אֶת נַפְשֶׁךָ
  english_pob_choice: and your soul grieve
  chosen_spanish: y se entristezca tu alma
  alternatives_spanish:
  - y se aflija tu alma
  - y tu alma se consuma de dolor
  lexicon: HALOT
  rationale: El verbo raro tiene el valor de causar aflicción o dolor. «Se entristezca tu alma» preserva el lenguaje interior de נֶפֶשׁ sin sobrecargar la frase, y mantiene la relación paralela con los ojos que se consumen.
- source_word: נַפְשֶׁךָ
  english_pob_choice: your soul
  chosen_spanish: tu alma
  alternatives_spanish:
  - tu vida
  - tu ser interior
  lexicon: HALOT
  rationale: «Alma» es la forma más natural para preservar el paralelismo antropológico del hebreo y la carga afectiva del pasaje. «Vida» o «ser interior» aplanarían la imagen.
- source_word: וְכָל מַרְבִּית בֵּיתְךָ
  english_pob_choice: all the increase of your house
  chosen_spanish: toda la descendencia de tu casa
  alternatives_spanish:
  - todo el aumento de tu casa
  - todos los que se multiplican en tu casa
  lexicon: HALOT
  rationale: מַרְבִּית significa literalmente aumento o multiplicación, pero en este contexto se refiere a los miembros que surgen de la casa/linaje. «Descendencia» comunica la referencia personal con claridad en español sin perder el vínculo con la idea de multiplicación.
- source_word: יָמֻתוּ אֲנָשִׁים
  english_pob_choice: will die by the sword of men
  chosen_spanish: morirá por la espada de hombres
  alternatives_spanish:
  - morirán como hombres
  - morirán en la fuerza de su edad
  lexicon: HALOT
  rationale: La revisión inglesa aclaró el matiz violento del hebreo final. En español, «por la espada de hombres» reproduce esa interpretación de muerte a manos de otros hombres sin borrar la tersedad del hebreo ni resolver por completo la ambigüedad residual del final.
theological_decisions:
- issue: Alcance del juicio sobre la casa de Elí
  english_pob_reading: The line is not totally extinguished from altar service immediately; instead, survivors remain to witness grief and ongoing judgment.
  chosen_spanish_reading: La casa no es borrada por completo de junto al altar de inmediato, sino que permanece bajo juicio, con un remanente que experimenta dolor y vergüenza.
  alternative_spanish_readings:
  - Toda la casa queda excluida por completo del servicio sacerdotal
  - La frase solo habla de supervivencia física cerca del altar
  rationale: La negación con «no cortaré» y el complemento «de junto a mi altar» permiten preservar la tensión entre misericordia y juicio. No se debe resolver el versículo como aniquilación total ni reducirlo a mera supervivencia física sin función.
  doctrine_reference: Translation philosophy §3 (preserve theological tension rather than resolve it)
- issue: Sentido de אֲנָשִׁים al final del versículo
  english_pob_reading: Rendered literally as 'as men' in the main text, with the likely sense 'in the prime of life' preserved in a footnote.
  chosen_spanish_reading: Se mantiene la imagen de «hombres» en la expresión final, con la lectura idiomática violenta en nota.
  alternative_spanish_readings:
  - en la fuerza de su edad
  - como hombres mortales
  rationale: El hebreo final es condensado y permite más de una lectura. La traducción principal conserva la referencia literal a hombres, mientras que la nota aclara el valor idiomático que la revisión inglesa destacó, sin imponer una sola solución interpretativa.
  doctrine_reference: Translation philosophy §3 (preserve theological tension rather than resolve it)
translation_notes:
  revision_awareness: Se tomó en cuenta la última revisión del texto inglés, que añadió «by the sword of men» para aclarar el matiz violento del final hebreo. La versión española refleja ese ajuste con «por la espada de hombres», sin abandonar la literalidad suficiente para conservar la ambigüedad controlada del original.
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando el tetragrámaton aparece explícitamente; aquí no aparece, por lo que no se introduce.
  - «Altar» se mantiene literal y no se sustituye por términos eclesiásticos.
  - «Alma» preserva נֶפֶשׁ; no se sustituye por «vida» salvo donde el contexto lo exigiera.
  - La estructura negativa con futuro conserva el tono oracular del hebreo.
  - Se evitó suavizar «cortaré» a expresiones menos fuertes para no perder la severidad del juicio.
