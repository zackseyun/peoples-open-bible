translation:
  text: A woman said to him in the crowd[a], “Blessed is the womb that bore you, and
    the breasts that nursed you.” He said to her, “Blessed are those who have heard
    the word of the Father and have kept it in truth; for days will come when you
    will say, ‘Blessed is the womb that has not conceived[e][d][c][b], and the breasts
    that have not given milk.’”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The Coptic literally reads “your breasts,” a possessive construction used
      for the breasts from which you were nursed; rendered idiomatically in English
      as “the breasts that nursed you.”
    reason: dialect_note
  - marker: b
    text: “Have kept it in truth” could also be rendered “have guarded it” or “have
      truly kept it.”
    reason: lexical_alternative
  - marker: c
    text: Minor restorations in Dilley’s edition (e.g., in ‘woman,’ ‘womb,’ ‘breasts,’
      ‘to nurse’) do not affect the sense of the saying.
    reason: lacuna_or_restoration
  - marker: d
    text: Compare Luke 11:27–28 (response to a woman’s blessing) and Luke 23:29 (“Blessed
      are the barren … the breasts that never nursed”).
    reason: cross_reference
  - marker: e
    text: Or 'has not borne'.
    reason: previous_rendering
lexical_decisions:
- source_word: ⲟⲩⲥϩⲓⲙⲉ
  chosen: a woman
  alternatives:
  - the woman
  lexicon: Crum s.v. ⲥϩⲓⲙⲉ
  rationale: Indefinite article ⲟⲩ- signals an unspecified woman from the crowd.
- source_word: ⲙⲏⲏϣⲉ
  chosen: crowd
  alternatives:
  - multitude
  - throng
  lexicon: Crum s.v. ⲙⲏϣⲉ
  rationale: Standard sense “crowd, assembly.” “Crowd” is concise and natural.
- source_word: ⲛⲧⲟⲥ (3fs pronoun) with ⲡϩⲏ
  chosen: the womb
  alternatives:
  - the belly
  lexicon: Crum s.v. ϩⲏ; Layton, Grammar §35 on independent pronouns in predication
  rationale: The 3fs pronoun refers back to the feminine noun; in context, ϩⲏ denotes
    ‘womb’ rather than general ‘belly’.
- source_word: ϥⲓ ϩⲁ (in ⲉⲧⲉⲣⲉⲁⲛⲧⲟϥ ϥⲓ ϩⲁ ⲛⲧⲟⲕ)
  chosen: bore
  alternatives:
  - gave birth to
  - brought forth
  lexicon: Crum s.v. ϥⲓ; Lambdin, Introduction to Sahidic Coptic §143
  rationale: With ϩⲁ + 2ms, expresses giving birth ‘to you’; “bore” is concise and
    idiomatic.
- source_word: ⲓⲃⲉ
  chosen: breasts
  alternatives:
  - bosom
  lexicon: Crum s.v. ⲓⲃⲉ
  rationale: Plural ‘breasts’ fits nursing context.
- source_word: ⲥⲁⲛⲟⲩϣ
  chosen: nursed
  alternatives:
  - suckled
  - breast-fed
  lexicon: Crum s.v. ⲥⲁⲛⲟⲩϣ
  rationale: Verb means ‘to nurse/suckle’; “nursed you” reads naturally in English.
- source_word: ⲉⲓⲁⲧ
  chosen: Blessed is/are
  alternatives:
  - Happy is/are
  - Fortunate is/are
  lexicon: Layton, Grammar §190; Crum s.v. ⲉⲓⲁⲧ
  rationale: Conventional rendering of makarisms; preserves solemn tone.
- source_word: ⲥⲱⲧⲙ
  chosen: have heard
  alternatives:
  - hear
  - listened to
  lexicon: Crum s.v. ⲥⲱⲧⲙ; Lambdin §95
  rationale: 'Relative perfect ⲉⲧⲉⲣⲉ…ⲁ- marks completed action: ‘who have heard’.'
- source_word: ⲡⲗⲟⲅⲟⲥ
  chosen: the word
  alternatives:
  - the message
  lexicon: Loan from Greek λόγος
  rationale: “Word” is the established sense; keeps intertextual resonance without
    harmonizing.
- source_word: ⲡⲉⲓⲱⲧ
  chosen: the Father
  alternatives:
  - the Father (God)
  lexicon: Crum s.v. ⲓⲱⲧ
  rationale: Definite with title “the Father,” as in Thomas; do not expand to ‘God’.
- source_word: ϩⲁⲣⲉϩ ⲉⲛⲧⲟϥ
  chosen: have kept it
  alternatives:
  - have guarded it
  - have observed it
  lexicon: Crum s.v. ϩⲁⲣⲉϩ
  rationale: With object pronoun, ‘keep/guard’ an utterance; “kept it” is idiomatic.
- source_word: ϩⲛ ⲟⲩⲙⲉ
  chosen: in truth
  alternatives:
  - truly
  - in sincerity
  lexicon: Crum s.v. ⲙⲉ
  rationale: Prepositional phrase; retain literal ‘in truth’ rather than adverb to
    preserve Thomas’s tone.
- source_word: ⲟⲩⲛ ⲟⲩϩⲟⲟⲩ ⲅⲁⲣ ⲛⲁϣⲱⲡⲉ
  chosen: for days will come
  alternatives:
  - for there will be days
  lexicon: Layton, Grammar §194
  rationale: Standard idiom for a coming time period.
- source_word: ⲙⲡⲉⲛⲧⲟⲥⲱⲱ
  chosen: has not borne
  alternatives:
  - did not bear
  - has not given birth
  lexicon: Lambdin §153 (negative perfect)
  rationale: Negative perfect with emphasis maintained.
- source_word: ⲧⲟⲟⲩϯ ⲉⲣⲱⲧⲉ
  chosen: have not given milk
  alternatives:
  - have not nursed
  - have not suckled
  lexicon: Crum s.v. ⲧⲟⲟⲩϯ; ⲣⲱⲧⲉ ‘milk’
  rationale: Literal ‘give milk’ captures the Coptic collocation; keeps parallelism
    with ‘has not borne’.
- source_word: ⲡⲉⲕⲓⲃⲉ (possessive 2ms)
  chosen: the breasts (that nursed you)
  alternatives:
  - your breasts
  lexicon: Layton, Grammar §49 (possessive with relational nuance)
  rationale: Underlying Coptic has ‘your breasts’ (those from which you nursed); render
    idiomatically to avoid misleading English while noting in footnote.
textual_note: 'Dilley’s printed text marks several minor restorations/uncertain letters:
  ⲟⲩⲥϩⲓⲙ̣[ⲉ] (completion of ‘woman’), ⲛⲉⲉⲓⲁⲧⲥ̣ [ⲛ̄]ⲑϩⲏ (pronoun + preposition), ⲛ̄ⲕⲓ[ⲃ]ⲉ
  (‘breasts’), and ⲥⲁ[[ϩ]]ⲛⲟⲩϣⲕ (nursing verb). The normalized reading clarifies these
  without affecting meaning. Note also the deictic ⲡⲁⲓ (‘this’) after ⲡϩⲏ and ⲡⲓⲃⲉ
  in the latter beatitude, an emphatic feature of Sahidic; it is not replicated in
  English to avoid awkwardness. The construction ⲉⲓⲁⲧ + 3fs pronoun (ⲛⲧⲟⲥ) predicates
  ‘blessed’ of the feminine antecedent (‘womb’). No Greek POxy fragment overlaps this
  saying. Dialectally, the forms are standard Sahidic with typical Thomasine syntax.'
