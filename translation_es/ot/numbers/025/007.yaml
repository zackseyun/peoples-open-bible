translation:
  language: es
  text: Cuando Fineés, hijo de Eleazar, hijo de Aarón el sacerdote, lo vio[a], se levantó de en medio de la congregación[b] y tomó una lanza en su mano.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «vio esto». El hebreo simplemente dice «vio»; el objeto está implícito por el contexto precedente.
    reason: lexical_alternative
  - marker: b
    text: O «de entre la congregación» o «de entre la asamblea».
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּרְא
  english_pob_choice: saw it
  chosen_spanish: lo vio
  alternatives_spanish:
  - vio
  - lo vio
  lexicon: HALOT
  rationale: El hebreo dice simplemente “vio”; el objeto está implícito por el contexto inmediato. En español, “lo vio” mantiene esa referencia implícita de manera natural y evita dejar el verbo demasiado abrupto.
- source_word: פִּינְחָס
  english_pob_choice: Phinehas
  chosen_spanish: Fineés
  alternatives_spanish:
  - Finees
  - Finehas
  lexicon: Transliteración estándar bíblica en español
  rationale: Se usa la forma española bíblica más reconocible y estable, sin traducir el nombre.
- source_word: בֶּן אֶלְעָזָר בֶּן אַהֲרֹן הַכֹּהֵן
  english_pob_choice: son of Eleazar, son of Aaron the priest
  chosen_spanish: hijo de Eleazar, hijo de Aarón el sacerdote
  alternatives_spanish:
  - hijo de Eleazar, hijo de Aarón, el sacerdote
  - hijo de Eleazar, hijo de Aarón, el sacerdote principal
  lexicon: HALOT
  rationale: Se conserva la apposición genealógica directa del hebreo. Se mantiene “el sacerdote” porque el texto dice solo הַכֹּהֵן; añadir “sumo” o “principal” introduciría información no explicitada.
- source_word: וַיָּקָם
  english_pob_choice: he rose up
  chosen_spanish: se levantó
  alternatives_spanish:
  - se puso de pie
  - se alzó
  lexicon: HALOT
  rationale: El verbo expresa una acción de ponerse en pie o levantarse para actuar. “Se levantó” es natural en español y conserva el impulso narrativo.
- source_word: מִתּוֹךְ הָעֵדָה
  english_pob_choice: from the midst of the congregation
  chosen_spanish: de en medio de la congregación
  alternatives_spanish:
  - de entre la congregación
  - de en medio de la asamblea
  lexicon: HALOT
  rationale: “De en medio de” refleja bien מִתּוֹךְ y conserva la imagen espacial del hebreo. “Congregación” mantiene el sentido colectivo de עֵדָה en el contexto pentateucal.
- source_word: וַיִּקַּח
  english_pob_choice: and took
  chosen_spanish: y tomó
  alternatives_spanish:
  - y agarró
  - y se apoderó de
  lexicon: HALOT
  rationale: El verbo común “tomó” basta para expresar que tomó el arma; no se intensifica innecesariamente.
- source_word: רֹמַח
  english_pob_choice: a spear
  chosen_spanish: una lanza
  alternatives_spanish:
  - una lanza
  - una pica
  - una jabalina
  lexicon: HALOT
  rationale: רֹמַח designa un arma de asta; “lanza” es una equivalencia natural y clara en español. Se prefiere aquí sobre “spear” literalizado como “lanza” por ser el término más idiomático.
- source_word: בְּיָדוֹ
  english_pob_choice: in his hand
  chosen_spanish: en su mano
  alternatives_spanish:
  - en la mano
  - con la lanza en la mano
  lexicon: HALOT
  rationale: Se conserva la expresión idiomática del hebreo. “En su mano” comunica que llevaba el arma preparada, sin sobreexplicar.
theological_decisions:
- issue: Rendering of הָעֵדָה as a covenant community term
  english_pob_reading: congregation
  chosen_spanish_reading: congregación
  alternative_spanish_readings:
  - asamblea
  - comunidad
  rationale: No hay una disputa doctrinal directa aquí, pero el término en el Pentateuco conserva el matiz de pueblo reunido bajo pacto. “Congregación” mantiene esa referencia colectiva sin cargarla con un sentido eclesial posterior.
  doctrine_reference: Translation philosophy §5 (consistencia de términos clave)
translation_notes:
  revision_awareness: El pasaje coincide de cerca con la revisión inglesa final sin cambios recientes; la versión inglesa aprobada mantiene “saw it” y “from the midst of the congregation”, y la presente propuesta refleja esas decisiones de manera natural en español.
  spanish_consistency_notes:
  - Se mantiene “Yahvé” como norma general del proyecto, pero este versículo no contiene el tetragrámaton ni un equivalente directo.
  - Se usa “congregación” de forma consistente con la terminología pentateucal del proyecto.
  - Se evita “sacerdote principal” o “sumo sacerdote” porque el hebreo solo dice “el sacerdote”.
  - Se elige “lanza” para רֹמַח por claridad y naturalidad en español bíblico.
