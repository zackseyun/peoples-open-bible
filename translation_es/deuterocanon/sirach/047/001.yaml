translation:
  language: es
  text: Y después de él se levantó Natán[a], para presentarse ante David.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Paralelo griego: «Natán se levantó para profetizar en los días de David». El hebreo dice «para presentarse ante David».'
    reason: alternative_reading
lexical_decisions:
- source_word: וגם
  english_pob_choice: And
  chosen_spanish: Y
  alternatives_spanish:
  - Y también
  - Además
  lexicon: HALOT
  rationale: La partícula tiene valor aditivo y de continuación; en español, la conjunción simple «Y» transmite la continuidad del relato con naturalidad y sin sobrecargar la línea.
- source_word: אחריו
  english_pob_choice: after him
  chosen_spanish: después de él
  alternatives_spanish:
  - tras él
  - luego de él
  lexicon: HALOT
  rationale: Mantiene la referencia personal y la sucesión respecto del personaje previamente mencionado, con un español claro y fiel.
- source_word: עמד
  english_pob_choice: arose
  chosen_spanish: se levantó
  alternatives_spanish:
  - se puso en pie
  - apareció
  - salió al frente
  lexicon: HALOT
  rationale: Aunque el hebreo literalmente dice «estar de pie», el contexto de sucesión y la paralela griega apoyan una expresión de surgimiento o entrada en escena. «Se levantó» conserva esa idea en español sin perder la imagen verbal.
- source_word: נתן
  english_pob_choice: Nathan
  chosen_spanish: Natán
  alternatives_spanish:
  - Nathan
  lexicon: Nombres propios bíblicos
  rationale: Se translitera el nombre al español bíblico usual «Natán».
- source_word: להתיצב
  english_pob_choice: to stand before
  chosen_spanish: para ponerse delante de
  alternatives_spanish:
  - para presentarse delante de
  - para estar delante de
  lexicon: HALOT
  rationale: El hitpael de יצב expresa colocarse o presentarse en posición de comparecencia; «ponerse delante de» conserva la postura y la relación de presencia delante de David.
- source_word: לפני דוד
  english_pob_choice: before David
  chosen_spanish: delante de David
  alternatives_spanish:
  - en presencia de David
  - ante David
  lexicon: HALOT
  rationale: «Delante de David» reproduce la relación espacial/personal del hebreo. «Ante David» sería también posible, pero la opción elegida suena más natural y directa en español.
theological_decisions:
- issue: Divergencia entre el hebreo y el paralelo griego en la última cláusula
  english_pob_reading: before David, with footnote noting Greek parallel 'in the days of David'
  chosen_spanish_reading: delante de David, con nota que registra el paralelo griego «en los días de David»
  alternative_spanish_readings:
  - en los días de David
  - en tiempo de David
  rationale: La tradición hebrea conservada en este pasaje dice explícitamente «delante de David», mientras que el griego interpreta la acción como parte del ministerio de Natán en la época de David. Se mantiene el hebreo como texto principal y se preserva la alternativa griega en nota por transparencia textual.
  doctrine_reference: 'Principio editorial de Sirácides: seguir el testimonio hebreo cuando está conservado, dejando constancia del paralelo griego para control auditable'
translation_notes:
  revision_awareness: 'Coincide con la pasada de revisión más reciente: no se requieren cambios adicionales; el borrador mantiene la decisión principal hebrea y la variante griega en nota.'
  spanish_consistency_notes:
  - Se mantiene «Natán» como forma española del nombre propio.
  - Se usa «Yahvé» solo cuando el texto lo exija; aquí no aparece el nombre divino.
  - La nota conserva la tensión textual entre el hebreo («delante de David») y el griego («en los días de David») sin resolverla artificialmente.
  - El registro es sobrio y bíblico, evitando calcos innecesarios pero sin ampliar el sentido más allá del testimonio fuente.
