    issue: Concordancia y naturalidad con 'mi rebaño pastará... beberá'
    rationale: Aunque 'rebaño' puede tomar singular en español, el hebreo lleva verbos femeninos plurales y el contexto de contraste entre ovejas fuertes y débiles se expresa con más claridad en español como 'mis ovejas pastarán... beberán'.
  - severity: medium
    issue: Marcación de notas no conforme
    rationale: La nota [b] describe la formulación literal de ambas cláusulas, pero en el borrador queda anclada solo a 'enturbiado[b]'. El proyecto exige que el marcador aparezca en el punto relevante del texto; conviene anclarla en la primera cláusula o ajustar el contenido.
  - severity: low
    issue: Formato y calidad de alternativas léxicas internas
    rationale: En las decisiones léxicas aparecen alternativas erróneas como 'mi flanco' y 'befoulado', lo que indica descuido editorial aunque no afecta directamente el texto bíblico final.
  revised_spanish_text: Y mis ovejas[a] pastarán en lo que vuestros pies han pisoteado[b], y beberán lo que vuestros pies han enturbiado.
