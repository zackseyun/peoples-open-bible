review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien el sentido básico del hebreo: David tomó los escudos de oro que pertenecían a los siervos de Hadadézer y los llevó a Jerusalén. Las decisiones principales (''tomó'', ''escudos de oro'', ''pertenecían a'', ''los llevó'') están alineadas con la evidencia fuente y con la auditoría inglesa.'
  spanish_quality_summary: 'El texto principal es claro y natural. Sin embargo, la nota al pie tiene un problema serio: presenta como alternativa exactamente la misma frase que ya está en el texto principal (''los escudos de oro''), por lo que no preserva correctamente la distinción del inglés entre la traducción principal y la alternativa estilística ''the golden shields''. Además, ''quiveras'' no es la forma más natural; ''aljabas'' expresa mejor la propuesta minoritaria.'
  glossary_alignment: No hay conflictos con la terminología de proyecto. 'Siervos' aquí es aceptable por el contexto de retenedores/cortesanos, aunque 'servidores' también sería posible. No hay asuntos teológicos especiales.
  issues:
  - severity: medium
    issue: La nota al pie duplica la lectura principal en vez de ofrecer la alternativa real.
    rationale: El inglés distingue entre la lectura principal 'the shields of gold' y la alternativa 'the golden shields'. En español, la nota debería reflejar esa diferencia, p. ej. 'los escudos dorados' o 'los escudos de oro' según la principal elegida. Tal como está, la nota no aporta información útil y desfigura la auditoría léxica.
  - severity: low
    issue: '''Quiveras'' suena menos natural que ''aljabas'' para la propuesta minoritaria.'
    rationale: Si se conserva la alternativa minoritaria, 'aljabas' es el término más reconocible y natural en español bíblico moderno para 'quivers'.
  revised_spanish_text: Y David tomó los escudos de oro que pertenecían a los siervos de Hadadézer y los llevó a Jerusalén[a].
  revised_footnotes:
  - marker: a
    text: 'O: «los escudos dorados»; el hebreo también puede entenderse más literalmente como «los escudos de oro». Una interpretación minoritaria propone «las aljabas de oro».'
    reason: lexical_alternative
  revision_rationale: Se mantiene el texto principal, que es fiel y natural. Se corrige la nota para que preserve la alternativa léxica real documentada en la auditoría inglesa y se mejora la naturalidad de la opción minoritaria en español.
