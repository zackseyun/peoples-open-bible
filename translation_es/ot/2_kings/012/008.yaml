base_translation:
  language: en
  yaml_path: translation/ot/2_kings/012/008.yaml
  text: So King Jehoash called Jehoiada the priest and the priests and said to them[a], “Why are you not repairing the damage of the house? Now then, do not take money from your donors[c][b], but give it for the repair of the house.”
  footnotes:
  - marker: a
    text: Hebrew 'the house,' referring to the temple.
    reason: cultural_note
  - marker: b
    text: Or 'the repairs of the house' / 'the breaches of the house' for 'the damage of the house.'
    reason: lexical_alternative
  - marker: c
    text: The Hebrew term rendered 'donors' is difficult; alternatives include 'contributors' or, more literally, 'those known to you.'
    reason: lexical_alternative
