  text: זֹ֣את תּוֹרַ֤ת הַ/בְּהֵמָה֙ וְ/הָ/ע֔וֹף וְ/כֹל֙ נֶ֣פֶשׁ הַֽ/חַיָּ֔ה הָ/רֹמֶ֖שֶׂת בַּ/מָּ֑יִם וּ/לְ/כָל נֶ֖פֶשׁ הַ/שֹּׁרֶ֥צֶת עַל הָ/אָֽרֶץ־־׃
base_translation:
  language: en
  yaml_path: translation/ot/leviticus/011/046.yaml
  text: This is the law concerning the livestock[a], the birds, every living creature that moves in the waters[c][b], and every creature that swarms on the earth.
  footnotes:
  - marker: a
    text: Or 'instruction for' instead of 'law concerning' for תּוֹרַת; the Hebrew term can denote authoritative teaching as well as law.
    reason: lexical_alternative
  - marker: b
    text: Or 'every living being' for 'every living creature'; Hebrew נֶפֶשׁ הַחַיָּה is an idiom for animate life, not specifically an immaterial 'soul.'
    reason: lexical_alternative
  - marker: c
    text: Or 'on the land' for 'on the earth.'
    reason: lexical_alternative
