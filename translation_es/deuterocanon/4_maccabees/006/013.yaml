translation:
  language: es
  text: Y algunos de los hombres del rey[a], movidos por simpatía a causa de su trato prolongado con él, y otros, acercándose a él con admiración por su perseverancia[b], decían
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «por su familiaridad con él». El griego τῆς συνηθείας puede denotar asociación prolongada o familiaridad.
    reason: lexical_alternative
  - marker: b
    text: O «con asombro ante su perseverancia». καρτερία lleva el sentido de resistencia firme y perseverante bajo prueba.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐν συμπαθείᾳ
  english_pob_choice: being moved by sympathy
  chosen_spanish: movidos por simpatía
  alternatives_spanish:
  - con simpatía
  - en simpatía
  - movidos por compasión
  lexicon: LSJ
  rationale: La frase griega expresa el estado afectivo o la manera en que se acercaban a él; «movidos por simpatía» conserva esa fuerza emocional sin forzar una paráfrasis.
- source_word: τῆς συνηθείας
  english_pob_choice: because of their long acquaintance with him
  chosen_spanish: a causa de su larga familiaridad con él
  alternatives_spanish:
  - por su larga relación con él
  - a causa de su familiaridad con él
  - por su trato prolongado con él
  lexicon: LSJ
  rationale: συνήθεια puede indicar familiaridad o asociación prolongada. «Larga familiaridad» recoge bien la relación sostenida sin convertirla en amistad íntima.
- source_word: ἐν θαυμαστῷ τῆς καρτερίας
  english_pob_choice: in admiration of his endurance
  chosen_spanish: con admiración por su perseverancia
  alternatives_spanish:
  - con asombro ante su firmeza
  - en admiración de su resistencia
  - con admiración de su constancia
  lexicon: LSJ
  rationale: καρτερία apunta a resistencia perseverante bajo prueba. «Perseverancia» es natural en español y mantiene el matiz de firmeza ante el sufrimiento.
- source_word: προσίοντες αὐτῷ
  english_pob_choice: approaching him
  chosen_spanish: acercándose a él
  alternatives_spanish:
  - yéndose hacia él
  - aproximándose a él
  - llegando junto a él
  lexicon: LSJ
  rationale: El participio describe el movimiento físico hacia Eleazar; «acercándose a él» es claro y fiel al aspecto progresivo del griego.
- source_word: τινες τῶν τοῦ βασιλέως
  english_pob_choice: some of the king’s men
  chosen_spanish: algunos de los hombres del rey
  alternatives_spanish:
  - algunos de los servidores del rey
  - algunos de los del rey
  - algunos de la comitiva del rey
  lexicon: LSJ
  rationale: La expresión genitiva designa personas vinculadas al servicio o entorno del rey. «Hombres del rey» es natural y no especifica más de lo que el griego permite.
- source_word: ἔλεγον
  english_pob_choice: were saying
  chosen_spanish: decían
  alternatives_spanish:
  - estaban diciendo
  - seguían diciendo
  lexicon: LSJ
  rationale: El imperfecto puede expresar habla repetida o en curso; en español narrativo, «decían» transmite ese valor sin sonar forzado.
translation_notes:
  revision_awareness: 'El texto griego y el audit trail inglés concuerdan en lo esencial: simpatía por familiaridad y admiración por la καρτερία de la figura mencionada. No se requieren cambios de revisión respecto del pasaje auditado; se mantiene la misma estructura semántica con español natural y controlado.'
  spanish_consistency_notes:
  - Se evitó «Cristo»/«Mesías» porque no aparecen en el versículo.
  - Se mantuvo una sintaxis participial fluida en español para reflejar los participios griegos sin perder legibilidad.
  - «Perseverancia» se eligió para καρτερία por su equilibrio entre firmeza, constancia y resistencia bajo prueba.
  - «Hombres del rey» reproduce el valor genitivo de pertenencia sin sobreinterpretarlo como cargo oficial.
