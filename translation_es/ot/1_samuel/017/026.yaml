base_translation:
  language: en
  yaml_path: translation/ot/1_samuel/017/026.yaml
  text: And David said to the men standing with him[a], “What will be done for the man who strikes down this Philistine and removes disgrace from Israel? For who is this uncircumcised Philistine[b], that he should defy the battle lines of the living God?”
