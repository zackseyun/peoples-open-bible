base_translation:
  language: en
  yaml_path: translation/ot/lamentations/001/015.yaml
  text: The Lord has rejected all my mighty men in my midst[a]; he has summoned an appointed time against me to crush my young men[b]. The Lord has trodden the winepress for the virgin daughter of Judah.
  footnotes:
  - marker: a
    text: Or 'he proclaimed a set time against me' or 'he called an assembly against me.' The Hebrew מוֹעֵד can mean an appointed time or an appointed gathering.
    reason: lexical_alternative
  - marker: b
    text: The image of treading a winepress is a metaphor for severe divine judgment.
    reason: cultural_note
