review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien el sentido básico del hebreo: título de salmo, imagen de profundidad extrema, súplica directa y el nombre divino «Yahvé». Sin embargo, «de ascensos» no preserva bien el título tradicional ni suena natural en español bíblico; «de las subidas» o mejor «de ascenso» sería más fiel y legible. Además, las notas están desalineadas: la nota [a] en español presenta una alternativa no preferible, mientras que en el rastro inglés la nota cultural explica el título tradicional; la nota [b] en español comenta «lo profundo», pero en el rastro inglés la nota [b] pertenece a «to you».'
  spanish_quality_summary: La frase principal es comprensible y digna, pero «Cántico de ascensos» suena forzado en español. «Desde lo profundo clamo a ti, Yahvé» es bastante natural, aunque «Desde las profundidades» preserva mejor el plural metafórico y la expresión conocida del salmo. El conjunto mejora con una formulación más idiomática y con notas que realmente aclaren el hebreo sin introducir opciones menos útiles.
  glossary_alignment: 'Cumple bien con el glosario en «Yahvé» para יְהוָה. «Clamo» reproduce adecuadamente la urgencia que el rastro inglés quiso resaltar. El principal problema terminológico está en הַמַּעֲלוֹת: «ascensos» no es la mejor opción para el título tradicional de esta colección en español; conviene una forma más estable y eclesialmente reconocible.'
  issues:
  - severity: medium
    issue: «Cántico de ascensos» es poco natural y poco adecuado para el título tradicional.
    rationale: הַמַּעֲלוֹת en esta superscripción funciona como título de colección. «Ascensos» suena técnico e infrecuente; «de ascenso» o «de las subidas» preserva mejor el uso tradicional sin sobreinterpretar.
  - severity: medium
    issue: La nota [a] no sigue la función de la nota inglesa y prioriza una alternativa débil.
    rationale: La auditoría inglesa usa la nota sobre «A Song of Ascents» como nota cultural para identificar el título tradicional del grupo de salmos. La nota española debería explicar esto, no promover «ascensiones» como alternativa principal.
  - severity: low
    issue: La nota [b] está aplicada a la frase equivocada respecto al rastro inglés.
    rationale: En inglés, [b] ancla «to you» y explica el título hebreo en [a]; en español se puede reorganizar si hace falta, pero las notas actuales no responden a la misma lógica auditada. Además, no es necesario notar «a ti» aquí; sí conviene notar la alternativa verbal pasada del hebreo.
  - severity: low
    issue: «Desde lo profundo» pierde el plural concreto del hebreo.
    rationale: Aunque es poético, מִמַּעֲמַקִּים es plural, «desde las profundidades / de las profundidades». Preservar el plural mantiene mejor la imagen fuente y además es una expresión muy natural en español.
  revised_spanish_text: Cántico de ascenso[a]. Desde las profundidades clamo a ti, Yahvé[b].
