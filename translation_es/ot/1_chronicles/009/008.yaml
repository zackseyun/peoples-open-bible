translation_notes:
  revision_awareness: Se revisó el versículo como una lista genealógica de nombres propios con enlaces consecutivos por la conjunción waw. No se detectaron variantes textuales ni cambios de sentido respecto del hebreo masorético base; se mantuvo la estructura nominal simple del original y la preferencia POB por transliteración auditable de antropónimos.
  spanish_consistency_notes:
  - Se mantuvo 'hijo de' para בן en contexto genealógico.
  - Se prefirió 'Reuel' en lugar de la variante tradicional 'Raguel', en línea con el audit trail inglés.
  - Se usó 'e' antes de Ibneía por eufonía en español; no altera el valor conjuntivo.
  - Las formas de nombres se adaptan al español solo en la medida necesaria para lectura fluida, sin traducir significados ni sustituir identidades onomásticas.
