review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura y el sentido general del hebreo: imperativo de pastoreo dirigido a Dios, pueblo como rebaño de su heredad, estado de aislamiento, referencia a Carmel, petición jussiva para Basán y Galaad, y cierre temporal ''como en los días de antaño''. Sin embargo, hay un desajuste importante con la decisión léxica auditada para בְשִׁבְטֶךָ: el inglés POB eligió ''with your staff'' por el contexto pastoral, mientras que ''con tu vara'' en español inclina más naturalmente hacia instrumento de corrección o golpe. Además, la nota al pie está mal anclada: el marcador [a] aparece en ''vara'' pero la nota explica ''Carmel''.'
  spanish_quality_summary: El español es claro y bíblicamente legible. 'Apacienta', 'el rebaño de tu heredad' y 'como en los días de antaño' funcionan bien en registro digno. No obstante, conviene cambiar 'vara' por 'cayado' para mayor coherencia pastoral y reubicar el marcador de nota a 'Carmel[a]'. 'Que habita solo' es aceptable, aunque 'que habita solitario' también sería posible; no requiere cambio.
  glossary_alignment: 'No hay conflictos con los términos de proyecto como Yahvé/Mesías/etc. La principal cuestión terminológica es interna al verso: שֵׁבֶט debe seguir la racionalidad documentada de ''staff'', que en español se expresa mejor como ''cayado'' en este contexto. Se conserva ''heredad'' como opción válida para נַחֲלָה y ''Carmel'' como topónimo con nota alternativa.'
  issues:
  - severity: high
    issue: '''con tu vara'' no preserva bien la decisión auditada ''with your staff'''
    rationale: La rationale inglesa subraya explícitamente el sentido pastoral de שֵׁבֶט y evita el matiz disciplinario de 'rod'. En español, 'vara' activa con más fuerza ese matiz punitivo que 'cayado'.
  - severity: high
    issue: El marcador de nota [a] está anclado a la palabra equivocada
    rationale: La nota explica el valor léxico de כַּרְמֶל, pero el marcador está puesto en 'vara[a]'. Debe colocarse junto a 'Carmel[a]' en el texto revisado.
  - severity: low
    issue: Inconsistencia entre nota y topónimo transliterado
    rationale: Si el texto usa 'Carmel', la nota también debe decir 'Carmel' de forma consistente, no introducir una variante distinta accidentalmente.
