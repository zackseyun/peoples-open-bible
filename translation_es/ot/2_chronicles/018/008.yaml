translation:
  language: es
  text: 'Entonces el rey de Israel llamó a un oficial[a] y dijo: «Date prisa; trae a Micaías hijo de Imla».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «un eunuco» o «un funcionario de la corte»; el término hebreo puede referirse tanto a un eunuco literal como, más ampliamente, a un oficial real.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּקְרָא
  english_pob_choice: called
  chosen_spanish: llamó
  alternatives_spanish:
  - convocó
  - mandó llamar
  lexicon: HALOT
  rationale: El verbo narrativo expresa una acción de llamar a alguien para dar una instrucción. «Llamó» es natural en español y conserva la sencillez del hebreo y del inglés POB; «convocó» o «mandó llamar» añaden un matiz más formal o explícito que el contexto no exige.
- source_word: מֶלֶךְ יִשְׂרָאֵל
  english_pob_choice: the king of Israel
  chosen_spanish: el rey de Israel
  lexicon: HALOT
  rationale: La cadena constructa es directa e identifica al hablante. «El rey de Israel» mantiene el sentido definido que el contexto ya aporta.
- source_word: סָרִיס אֶחָד
  english_pob_choice: one officer
  chosen_spanish: un oficial
  alternatives_spanish:
  - un eunuco
  - un funcionario de la corte
  lexicon: HALOT
  rationale: סָרִיס puede referirse a un eunuco literal o, más ampliamente, a un oficial de la corte. En esta escena, la función narrativa es la de un servidor real a quien se le da una orden. «Oficial» comunica bien ese rol; la lectura más literal se preserva en nota.
- source_word: וַיֹּאמֶר
  english_pob_choice: said
  chosen_spanish: dijo
  lexicon: HALOT
  rationale: Verbo estándar de introducción de discurso; «dijo» es la equivalencia natural en español.
- source_word: מַהֵר
  english_pob_choice: Quickly bring
  chosen_spanish: Date prisa; trae
  alternatives_spanish:
  - Apresúrate y trae
  - Trae de inmediato
  lexicon: HALOT
  rationale: El imperativo expresa urgencia. En español, separar la urgencia con «Date prisa» y el mandato «trae» conserva el valor exhortativo sin sonar forzado.
- source_word: מיכהו
  english_pob_choice: Micaiah
  chosen_spanish: Micaías
  alternatives_spanish:
  - Micaía
  lexicon: HALOT
  rationale: Se usa la forma castellana usual del nombre personal en este contexto bíblico. «Micaías» es la transliteración estable y readable en español.
- source_word: בֶן יִמְלָא
  english_pob_choice: son of Imla
  chosen_spanish: hijo de Imla
  lexicon: HALOT
  rationale: Expresión patronímica directa y idiomática en español.
theological_decisions:
- issue: Alcance de סָרִיס
  english_pob_reading: one officer / one eunuch / a court official
  chosen_spanish_reading: un oficial
  alternative_spanish_readings:
  - un eunuco
  - un funcionario de la corte
  rationale: No se fuerza una lectura biográfica (eunuco físico) cuando el contexto únicamente requiere la función de mensajero/servidor real. La nota preserva la tensión lexical documentada por el POB inglés.
  doctrine_reference: Lexical semantics of סָרִיס; narrative context in 2 Crónicas 18:8
translation_notes:
  revision_awareness: El contexto inglés muestra alto acuerdo y ninguna revisión aplicada; se mantiene la lectura base sin cambios sustantivos. Se preserva la alternativa léxica documentada para סָרִיס mediante nota.
  spanish_consistency_notes:
  - Se evita «SEÑOR» porque aquí no aparece el nombre divino ni una cita directa del tetragrámaton.
  - Se usa «Micaías» como forma española estable del nombre, coherente con el uso bíblico corriente en español.
  - «Oficial» conserva la ambigüedad funcional de סָרִיס sin decidir indebidamente por «eunuco» en el cuerpo principal.
