translation:
  language: es
  text: El sabio calla hasta el momento oportuno[a], pero el necio no observa el momento oportuno.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «hasta el tiempo debido». El hebreo literalmente dice «hasta tiempo» / «hasta un tiempo»; el paralelo griego para este versículo dice de manera bastante diferente: «El que abunda en palabras será detestado, y el que actúa con altivez será odiado».'
    reason: alternative_reading
lexical_decisions:
- source_word: חָכָם
  english_pob_choice: a wise man
  chosen_spanish: el sabio
  alternatives_spanish:
  - el hombre sabio
  - una persona sabia
  lexicon: HALOT
  rationale: El hebreo proverbial usa el singular masculino de manera representativa; en español, «el sabio» conserva la forma sentenciosa sin forzar una paráfrasis más larga.
- source_word: יַחֲרִישׁ
  english_pob_choice: keeps silent
  chosen_spanish: calla
  alternatives_spanish:
  - guarda silencio
  - permanece callado
  lexicon: HALOT
  rationale: El verbo expresa silencio voluntario; «calla» es natural en español y mantiene la brevedad proverbial del original.
- source_word: עַד עֵת
  english_pob_choice: until the right time
  chosen_spanish: hasta el momento oportuno
  alternatives_spanish:
  - hasta el tiempo debido
  - hasta la ocasión adecuada
  - hasta el tiempo correcto
  lexicon: HALOT
  rationale: La expresión hebrea remite a un tiempo apropiado, no solo cronológico. «Momento oportuno» comunica bien esa idea idiomática sin perder el matiz de oportunidad.
- source_word: וּכְסִיל
  english_pob_choice: but a fool
  chosen_spanish: pero el necio
  alternatives_spanish:
  - y el necio
  - pero el insensato
  lexicon: HALOT
  rationale: La conjunción contrasta dos tipos proverbiales; «pero» refleja mejor la oposición implícita entre sabio y necio. «Necio» conserva el registro sapiencial tradicional.
- source_word: לֹא יִשְׁמוֹר עֵת
  english_pob_choice: does not observe the right time
  chosen_spanish: no observa el momento oportuno
  alternatives_spanish:
  - no guarda el tiempo
  - no espera el tiempo debido
  - no atiende al momento
  lexicon: HALOT
  rationale: Sigo de cerca el giro idiomático hebreo de «guardar/observar tiempo». «No observa el momento oportuno» es claro en español y mantiene la fuerza de la observancia temporal.
theological_decisions:
- issue: Tensión textual entre el hebreo conservado y el paralelo griego
  english_pob_reading: 'The Hebrew says a wise man keeps silent until the right time, but a fool does not observe the right time. The Greek parallel reads quite differently: the one who abounds in speech will be detested, and the one who acts high-handedly will be hated.'
  chosen_spanish_reading: 'El texto principal sigue el hebreo: el sabio guarda silencio hasta el momento oportuno y el necio no observa ese momento.'
  alternative_spanish_readings:
  - El que abunda en palabras será detestado, y el que actúa con altivez será odiado.
  - El que habla demasiado será aborrecido, y el que se impone con violencia será odiado.
  rationale: La evidencia hebrea es la base principal del versículo, pero el paralelo griego muestra una tradición diferente que no debe borrarse. Por eso el texto español sigue el hebreo y la nota conserva la lectura griega alternativa.
  doctrine_reference: Texto y crítica textual; prudencia sapiencial sobre el uso de la palabra.
translation_notes:
  revision_awareness: La versión española sigue la última revisión inglesa en la segunda cola («does not observe the right time») y adapta el hebreo idiomático con una fórmula natural en español. Se mantiene además la tensión documentada con el paralelo griego mediante nota.
  spanish_consistency_notes:
  - Se usa «sabio» y «necio» como términos sapienciales estables, en consonancia con el registro del libro.
  - Se evita «SEÑOR» u otra terminología no pertinente porque el versículo no contiene el nombre divino.
  - La repetición de «momento oportuno» en ambas mitades preserva el paralelismo y la simetría del hebreo.
