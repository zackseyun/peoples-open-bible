  spanish_quality_summary: El español es generalmente claro, pero «nuestra leña llega a precio» suena poco idiomático. «Madera» funciona mejor que «leña» para no sobreinterpretar, y «nuestra madera llega por un precio» aún suena algo rígido; la forma más natural y fiel es «nuestra madera nos llega por un precio» o «nuestra madera viene por un precio». Añadir «nos» explicita el sentido de acceso/suministro sin alejarse del hebreo.
