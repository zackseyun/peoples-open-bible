  source_alignment_summary: 'El borrador refleja fielmente el sentido del hebreo: el sonido de las alas de los querubines se oía hasta el área exterior y se compara con el sonido de Dios Todopoderoso cuando habla. También preserva bien la nota sobre אֵל שַׁדַּי. Sin embargo, en contexto templario/profético, חָצֵר se vierte mejor como «atrio» que como «patio», porque «atrio exterior» es más preciso y más bíblico en español eclesial sin sonar arcaico.'
