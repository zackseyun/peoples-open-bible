lexical_decisions:
- source_word: בְּנֵי
  english_pob_choice: sons of
  chosen_spanish: hijos de
  alternatives_spanish:
  - descendientes de
  - hijos
  lexicon: HALOT
  rationale: En un contexto genealógico y tribal, el plural constructo de בֵּן puede expresarse naturalmente en español como «hijos de». «Descendientes de» es posible, pero atenúa la relación filial explícita que el hebreo conserva aquí.
- source_word: יוֹסֵף
  english_pob_choice: Joseph
  chosen_spanish: José
  alternatives_spanish:
  - José
  lexicon: nombre propio
  rationale: Nombre propio bíblico estándar en español. Se mantiene la forma usual «José» para preservar claridad y reconocimiento inmediato.
- source_word: לְמִשְׁפְּחֹתָם
  english_pob_choice: by their clans
  chosen_spanish: por sus clanes
  alternatives_spanish:
  - según sus clanes
  - de acuerdo con sus clanes
  - por sus familias
  lexicon: HALOT
  rationale: מִשְׁפָּחָה en contexto censal/tribal designa una unidad de clan, no solo «familia» en sentido moderno. La preposición לְ con este sustantivo expresa distribución o clasificación; «por sus clanes» comunica bien esa organización sin forzar una glosa más larga.
- source_word: מְנַשֶּׁה
  english_pob_choice: Manasseh
  chosen_spanish: Manasés
  alternatives_spanish:
  - Manasés
  lexicon: nombre propio
  rationale: Forma española estándar del nombre tribal/personal. Se conserva la vocalización tradicional en español.
- source_word: וְאֶפְרָיִם
  english_pob_choice: and Ephraim
  chosen_spanish: y Efraín
  alternatives_spanish:
  - y Efraín
  lexicon: nombre propio
  rationale: Forma española estándar del nombre tribal/personal. La coordinación simple con «y» refleja el hebreo sin añadir matices no presentes.
translation_notes:
  revision_awareness: El texto base en inglés coincide plenamente con el hebreo masorético proporcionado; no se detectan revisiones sustantivas ni variantes textuales relevantes en este registro.
  spanish_consistency_notes:
  - Se mantiene el término técnico «clanes» para מִשְׁפְּחֹתָם, en lugar de «familias», por consistencia con el uso censal/tribal bíblico.
  - Se evita «SEÑOR» o cualquier sustitución teológica porque el versículo no contiene el nombre divino.
  - La traducción conserva la estructura nominal breve del hebreo, adecuada para un registro genealógico/censal.
