base_translation:
  language: en
  yaml_path: translation/extra_canonical/gospel_of_thomas/114.yaml
  text: 'Simon Peter said to them, “Let Mary go out from among us, for the female is not worthy of life.” Jesus said, “Look: I myself will lead her, so that I will make her male, so that she too may become a living spirit like you males. For every female who makes herself male will enter the kingdom of the heavens.”'
  footnotes:
  - marker: a
    text: The choice ‘female’ (ⲥϩⲓⲙⲉ) over ‘woman’ keeps the parallel with ‘male’ (ϩⲟⲟⲩⲧ) tight and reflects Thomas’s stark male/female polarity.
    reason: lexical_alternative
  - marker: b
    text: The object pronoun ‘her’ appears as ⲙ̄ⲙⲟⲥ in the manuscript lineation; Dilley’s normalization presents the equivalent ⲛⲛⲧⲟⲥ. Both are 3fs direct objects.
    reason: textual_variant
  - marker: c
    text: Spelling varies between ⲛϩⲟⲟⲧ and ⲛϩⲟⲟⲩⲧ for ‘male’; this is an orthographic/dialectal fluctuation without semantic difference.
    reason: dialect_note
  - marker: d
    text: ‘Heavens’ renders ⲡⲡⲉ; some translations use ‘heaven’. The Coptic expression functions as the locus of divine reign rather than a strictly spatial plural.
    reason: lexical_alternative
