review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura causal del griego: ἰσχύς → δικαιοσύνης ἀρχή y δεσπόζειν πάντων → πάντων φείδεσθαι. Sin embargo, «perdones a todos» desplaza φείδεσθαι hacia absolución o perdón personal, mientras que el griego aquí significa más precisamente «tener miramiento», «perdonar en el sentido de no destruir», «ahorrar / ser indulgente». También «sobre todos» suena más natural que «sobre todos»? Actually fine, but for broad readability and tighter alignment with the English audit trail, «de todos» for dominion is less idiomatic than «sobre todos»; the main needed repair is φείδεσθαι. The ἀρχή / δικαιοσύνη footnotes are appropriately preserved.'
  spanish_quality_summary: El español es claro y digno, pero «hace que perdones a todos» introduce un matiz demasiado interpretativo y moderno. «Hace que tengas miramiento de todos» sería demasiado literal; «te mueve a perdonar a todos» still overinterprets. «Hace que perdones» is readable but less fiel. A more natural and faithful church-readable rendering is «te hace perdonar a todos»? Still same issue. Best is «te hace tener compasión de todos»? But that shifts from sparing to compassion. «te hace ser indulgente con todos» is possible, though less direct. «te hace perdonar a todos» should be repaired to «te hace ser indulgente con todos» or «te lleva a tratar con indulgencia a todos». To stay close to source and readability, I recommend «y tu dominio sobre todos te lleva a ser indulgente con todos».
  glossary_alignment: La decisión de «justicia» para δικαιοσύνη es defendible en español y está respaldada por nota con «rectitud». «fuerza», «principio» y «dominio» están bien. El problema principal es φείδεσθαι, donde el proyecto inglés eligió «spare» y la explicación lexical rechaza un sentido primario de absolución; por ello conviene evitar «perdonar» en el texto principal. No hay conflicto con la terminología de Yahvé/Mesías/etc. en este versículo.
  issues:
  - severity: medium
    issue: «perdones a todos» no representa con suficiente precisión φείδεσθαι
    rationale: El verbo griego significa «ahorrar / abstenerse de destruir / tener miramiento», no primariamente perdonar culpa en sentido personal o forense. En español «perdonar» puede desviar la lectura.
  - severity: low
    issue: La documentación menciona una nota sobre el sentido de «perdonar/ahorrar», pero no existe una nota correspondiente en el borrador
    rationale: Hay una pequeña incoherencia interna entre las decisiones léxicas/teológicas y las notas realmente incluidas.
  revised_spanish_text: Porque tu fuerza es el principio de la justicia[a][b], y tu dominio sobre todos te lleva a ser indulgente con todos.
  revised_footnotes:
  - marker: a
    text: O «fuente de la justicia». El griego ἀρχή puede significar «principio», «fuente» o «primer principio».
    reason: lexical_alternative
  - marker: b
    text: O «rectitud» para «justicia». El griego δικαιοσύνη puede abarcar ambos sentidos.
    reason: alternative_reading
  revision_rationale: Se conserva la estructura y las notas del borrador, pero se reemplaza «hace que perdones a todos» por «te lleva a ser indulgente con todos» para reflejar mejor φείδεσθαι como restricción benévola o acto de perdonar en el sentido de no destruir, evitando el matiz de absolución personal que «perdonar» suele activar en español.
