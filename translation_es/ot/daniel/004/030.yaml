translation:
  language: es
  text: En ese mismo momento se cumplió la palabra contra Nabucodonosor. Fue expulsado de entre los hombres, y comió hierba como los bueyes, y su cuerpo quedó empapado por el rocío del cielo, hasta que su cabello creció como plumas de águilas[a], y sus uñas como garras de aves.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «como plumas de buitres»; el término arameo puede referirse más ampliamente a grandes aves de presa, aunque «águilas» es la traducción tradicional.
    reason: lexical_alternative
lexical_decisions:
- source_word: בַּהּ שַׁעֲתָא
  english_pob_choice: At that moment
  chosen_spanish: En ese mismo momento
  alternatives_spanish:
  - En esa misma hora
  - En ese momento
  lexicon: HALOT
  rationale: La expresión aramea es idiomática y marca inmediatez. «En ese mismo momento» conserva la urgencia del juicio y suena natural en español.
- source_word: מִלְּתָא סָפַת
  english_pob_choice: the word was fulfilled
  chosen_spanish: se cumplió la palabra
  alternatives_spanish:
  - se cumplió el asunto
  - se consumó la palabra
  - se completó la palabra
  lexicon: HALOT
  rationale: מִלְּתָא puede significar «palabra, asunto, decreto». Aquí la POB inglesa opta por «word» por fidelidad léxica; en español, «la palabra» mantiene esa correspondencia y evita introducir «sentencia», que no está explícito en el arameo.
- source_word: עַל נְבוּכַדְנֶצַּר
  english_pob_choice: against Nebuchadnezzar
  chosen_spanish: contra Nabucodonosor
  alternatives_spanish:
  - sobre Nabucodonosor
  - en Nabucodonosor
  lexicon: HALOT
  rationale: El valor adversativo de עַל en contexto de juicio se expresa de forma clara con «contra».
- source_word: וּמִן אֲנָשָׁא טְרִיד
  english_pob_choice: He was driven away from among men
  chosen_spanish: Fue expulsado de entre los hombres
  alternatives_spanish:
  - Fue arrojado de entre los hombres
  - Fue alejado de entre los hombres
  - Fue expulsado de entre la gente
  lexicon: HALOT
  rationale: טְרִיד indica ser echado/alejado. «De entre los hombres» sigue de cerca la construcción aramea y mantiene la idea de exclusión de la sociedad humana.
- source_word: וְעִשְׂבָּא כְתוֹרִין יֵאכֻל
  english_pob_choice: and he ate grass like oxen
  chosen_spanish: y comió hierba como los bueyes
  alternatives_spanish:
  - y comió pasto como los bueyes
  - y comió hierba como los toros
  - y comió pasto como el ganado
  lexicon: HALOT
  rationale: עִשְׂבָּא es «hierba/vegetación». Aunque la POB inglesa usa «oxen», en español «bueyes» comunica bien el animal de labor y conserva la imagen; «hierba» es un término bíblico claro y natural.
- source_word: וּמִטַּל שְׁמַיָּא גִּשְׁמֵהּ יִצְטַבַּע
  english_pob_choice: and his body was drenched with the dew of heaven
  chosen_spanish: y su cuerpo fue empapado con el rocío del cielo
  alternatives_spanish:
  - y su cuerpo quedó mojado con el rocío del cielo
  - y su cuerpo fue bañado con el rocío del cielo
  - y su cuerpo fue empapado por el rocío del cielo
  lexicon: HALOT
  rationale: גִּשְׁמֵהּ es «su cuerpo». יִצְטַבַּע expresa quedar mojado/empapado. «Rocío del cielo» preserva la expresión tradicional del pasaje sin volverla más interpretativa.
- source_word: שַׂעְרֵהּ כְּנִשְׁרִין רְבָה
  english_pob_choice: his hair grew like eagles’ feathers
  chosen_spanish: su cabello creció como plumas de águilas
  alternatives_spanish:
  - su cabello creció como plumas de buitres
  - su cabello creció como plumas de aves rapaces
  - su pelo creció como plumas de águilas
  lexicon: HALOT
  rationale: נִשְׁרִין puede referirse de modo amplio a grandes aves de presa; la POB inglesa retiene «eagles» por tradición. «Plumas de águilas» reproduce esa tradición y la comparación con una imagen comprensible en español.
- source_word: וְטִפְרוֹהִי כְצִפְּרִין
  english_pob_choice: and his nails like birds’ claws
  chosen_spanish: y sus uñas como las de las aves
  alternatives_spanish:
  - y sus uñas como garras de aves
  - y sus uñas como picos de aves
  - y sus uñas como las uñas de las aves
  lexicon: HALOT
  rationale: טִפְרִין son uñas/garras. En español, «uñas como las de las aves» mantiene la literalidad sin forzar una equivalencia anatómica demasiado dura; «garras» podría intensificar más de lo que exige el texto.
theological_decisions:
- issue: אֲנָשָׁא como referencia a humanos en contraste con la condición bestial de Nabucodonosor
  english_pob_reading: from among men
  chosen_spanish_reading: de entre los hombres
  alternative_spanish_readings:
  - de entre la humanidad
  - de entre la gente
  - de entre los seres humanos
  rationale: La frase señala exclusión de la sociedad humana, no una afirmación exclusiva sobre varones. «De entre los hombres» conserva la forma idiomática del arameo y el contraste humano/bestial sin añadir explicación innecesaria.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4
translation_notes:
  revision_awareness: La POB inglesa revisó «sentence» por «word» para ajustarse mejor a מִלְּתָא. Esta versión sigue esa decisión con «la palabra» y mantiene el resto de la línea narrativa sin añadir elementos interpretativos.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma del proyecto solo cuando el texto lo requiera; aquí no aparece el nombre divino.
  - Se usa «Nabucodonosor» de forma uniforme para el nombre propio.
  - «Hierba» y «bueyes» conservan la imaginería rural del pasaje sin suavizarla.
  - «Rocío del cielo» sigue la formulación bíblica reconocible y auditable.
  - No se introduce «Cristo/Mesías», por no aparecer en el verso.
