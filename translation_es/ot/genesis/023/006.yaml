review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español sigue bien el sentido general del hebreo: apelación respetuosa, título honorífico, oferta del mejor sepulcro y garantía de que nadie impedirá el entierro. Sin embargo, la última cláusula puede alinearse mejor con la sintaxis fuente y con el rastro inglés usando una formulación menos interpretativa que «impidiéndote», y «el mejor de nuestros sepulcros» puede mejorarse a «lo mejor de nuestros sepulcros» para reflejar más de cerca «the choicest of our tombs / בְּמִבְחַר קְבָרֵינוּ».'
  spanish_quality_summary: 'El español es claro y digno, pero «en el mejor de nuestros sepulcros» suena algo singularizado donde el hebreo/inglés expresan una selección excelente entre varios. Además, la nota [b] no coincide idealmente con el texto principal: la nota ofrece una alternativa muy literal, mientras el texto usa una glosa explicativa más libre («impidiéndote»). Una redacción más directa mejora fidelidad y coherencia nota-texto.'
  glossary_alignment: No hay conflictos con la terminología principal del proyecto. «príncipe de Dios» preserva correctamente נְשִׂיא אֱלֹהִים con nota superlativa. «sepulcro» es adecuado para קבר. «mi señor» y «entre nosotros» son naturales y fieles.
  issues:
  - severity: medium
    issue: «en el mejor de nuestros sepulcros» reduce el matiz de מבחר
    rationale: בְּמִבְחַר קְבָרֵינוּ indica ‘en lo escogido/de lo mejor de nuestros sepulcros’, no necesariamente un único sepulcro ‘el mejor’. «En lo mejor de nuestros sepulcros» o similar conserva mejor el valor de selección excelente.
  - severity: medium
    issue: La cláusula final «impidiéndote enterrar a tu muerto» es más interpretativa que el texto auditado
    rationale: Aunque semánticamente correcta, explicita el resultado preventivo de manera más libre. Dado que el inglés final retuvo una estructura más cercana al hebreo (‘from burying your dead’), conviene una forma española como «de enterrar a tu muerto» en el texto, dejando la explicación sintáctica en la nota.
  - severity: low
    issue: La nota [b] queda desajustada respecto del anclaje textual
    rationale: Si el texto principal dice «impidiéndote enterrar...», una nota «O, “de enterrar...”» presenta como alternativa una forma que en realidad es más cercana al original que la lectura principal. Es mejor armonizar texto y nota.
  revised_spanish_text: 'Escúchanos[a], mi señor: tú eres un príncipe de Dios entre nosotros. Entierra a tu muerto en lo mejor de nuestros sepulcros. Ninguno de nosotros te negará su sepulcro[b], de enterrar a tu muerto.'
  revised_footnotes:
