translation:
  language: es
  text: Cuando los malhechores se acercaron a mí para devorar mi carne[a], mis adversarios y mis enemigos—tropezaron y cayeron.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «para comer mi carne». La expresión hebrea es una imagen vívida de ataque violento.
    reason: lexical_alternative
lexical_decisions:
- source_word: בִּקְרֹב
  english_pob_choice: when ... came near
  chosen_spanish: Cuando ... se acercaron
  alternatives_spanish:
  - al acercarse
  - cuando llegaron cerca
  lexicon: HALOT
  rationale: El infinitivo constructo con בּ expresa aquí circunstancia temporal. «Cuando ... se acercaron» comunica de forma natural el valor de tiempo/circunstancia sin perder el sentido verbal de קרב.
- source_word: מְרֵעִים
  english_pob_choice: evildoers
  chosen_spanish: malhechores
  alternatives_spanish:
  - malvados
  - hombres malvados
  - hacedores de mal
  lexicon: HALOT
  rationale: El participio designa personas que hacen el mal. «Malhechores» conserva la fuerza moral y suena natural en español bíblico contemporáneo.
- source_word: לֶאֱכֹל אֶת־בְּשָׂרִי
  english_pob_choice: to devour my flesh
  chosen_spanish: para devorar mi carne
  alternatives_spanish:
  - para comer mi carne
  - para consumir mi carne
  lexicon: HALOT
  rationale: «Devorar» mantiene la imagen violenta del hebreo y sugiere ataque hostil. En español, «carne» conserva la literalidad y el golpe imagético de בָּשָׂר.
- source_word: בְּשָׂרִי
  english_pob_choice: my flesh
  chosen_spanish: mi carne
  alternatives_spanish:
  - mi cuerpo
  lexicon: HALOT
  rationale: Se preserva la imagen corporal concreta del hebreo. «Cuerpo» suavizaría demasiado la metáfora y perdería la aspereza del texto.
- source_word: צָרַי
  english_pob_choice: my adversaries
  chosen_spanish: mis adversarios
  alternatives_spanish:
  - mis enemigos
  - mis opresores
  lexicon: HALOT
  rationale: «Adversarios» distingue este término del siguiente «enemigos» y conserva la idea de oposición hostil sin colapsar los dos sustantivos.
- source_word: וְאֹיְבַי
  english_pob_choice: and my enemies
  chosen_spanish: y mis enemigos
  alternatives_spanish:
  - y mis foes
  lexicon: HALOT
  rationale: Es la correspondencia directa de אויב. Mantener ambos pares sustantivos refleja el paralelismo hebreo.
- source_word: הֵמָּה
  english_pob_choice: they
  chosen_spanish: ellos
  alternatives_spanish:
  - ellos mismos
  lexicon: HALOT
  rationale: El pronombre independiente es enfático. En español se puede reflejar con la colocación y el guion; «ellos» preserva la referencia explícita sin sobrecargarla.
- source_word: כָשְׁלוּ וְנָפָלוּ
  english_pob_choice: stumbled and fell
  chosen_spanish: tropezaron y cayeron
  alternatives_spanish:
  - vacilaron y cayeron
  - se tambalearon y cayeron
  - fueron hechos tropezar y cayeron
  lexicon: HALOT
  rationale: La pareja verbal expresa derrota o derrumbe. «Tropezaron y cayeron» es idiomático en español y conserva la secuencia verbal sin precisar más de lo que el hebreo dice.
theological_decisions:
- issue: Valor de לִי con sustantivos hostiles
  english_pob_reading: The hostile relation is already carried by 'my adversaries and my enemies'; the dative is not separately rendered as 'against me' in the final English revision.
  chosen_spanish_reading: Se omite una segunda explicitación como «contra mí» porque la relación hostil ya queda expresada por «mis adversarios y mis enemigos».
  alternative_spanish_readings:
  - mis adversarios y mis enemigos contra mí
  - mis adversarios y mis enemigos para mí
  rationale: En español, añadir «contra mí» duplicaría innecesariamente la hostilidad ya codificada por los posesivos y rompería la fluidez. La omisión mantiene la economía del hebreo tal como fue entendida en la revisión inglesa.
  doctrine_reference: No aplica; decisión de relación sintáctica y retórica.
translation_notes:
  revision_awareness: La redacción sigue la última revisión inglesa que eliminó «against» después de «came near» y mantuvo la imagen de devorar la carne. También respeta la decisión editorial de no forzar una segunda explicitación hostil en la última frase, conservando el paralelismo de «mis adversarios y mis enemigos».
  spanish_consistency_notes:
  - Se mantiene «carne» para בָּשָׂר por consistencia con el valor imagístico del término en los Salmos.
  - «Malhechores» y «adversarios/enemigos» distinguen los tres matices hostiles sin fusionarlos.
  - El pronombre enfático de הֵמָּה queda reflejado por la puntuación y por el sujeto explícito «ellos» antes de los verbos finales.
