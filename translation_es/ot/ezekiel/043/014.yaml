  language: en
  yaml_path: translation/ot/ezekiel/043/014.yaml
  text: And from the ledge of the ground to the lower platform shall be two cubits[a], with a width of one cubit; and from the smaller platform to the larger platform shall be four cubits[c][b], with a width of one cubit.
  footnotes:
  - marker: a
    text: Hebrew חֵיק הָאָרֶץ is literally 'the bosom of the earth' and may refer to the altar's base, recess, or ground-level ledge.
    reason: lexical_alternative
  - marker: b
    text: The Hebrew term עֲזָרָה in this passage refers to stepped structural levels of the altar; translations vary between 'ledge,' 'platform,' and the older architectural term 'settle.'
    reason: lexical_alternative
  - marker: c
    text: The final phrase is literally 'and the width of the cubit,' likely meaning a width of one cubit, parallel to the earlier measurement.
    reason: lexical_alternative
