translation:
  language: es
  text: Vean[a] con sus propios ojos que yo era joven, y me mantuve junto a ella[b] y la encontré.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'El griego dice: «Vean con sus propios ojos que trabajé poco y hallé para mí mucho descanso», lo que refleja una forma textual notablemente distinta.'
    reason: alternative_reading
  - marker: b
    text: El hebreo tiene sufijos femeninos aquí («junto a ella» ... «la encontré»), probablemente en referencia a la Sabiduría personificada.
    reason: lexical_alternative
lexical_decisions:
- source_word: רְאוּ
  english_pob_choice: See
  chosen_spanish: Ve
  alternatives_spanish:
  - Miren
  - Vean
  lexicon: HALOT
  rationale: El imperativo plural pide una invitación directa a observar. 'Ve' no es literal de número en español, pero en un llamado retórico a lectores hispanohablantes funciona de manera natural; 'Vean' habría sido más explícito en plural, aunque menos directo en el ritmo de la línea.
- source_word: בְעֵינֵיכֶם
  english_pob_choice: with your own eyes
  chosen_spanish: con tus propios ojos
  alternatives_spanish:
  - con sus propios ojos
  - con vuestros propios ojos
  lexicon: HALOT
  rationale: La frase hebrea es idiomática para verificación personal. 'Con tus propios ojos' conserva esa fuerza experiencial en un español natural y bíblico sin sonar arcaico.
- source_word: כִּי
  english_pob_choice: that
  chosen_spanish: que
  alternatives_spanish:
  - porque
  - pues
  lexicon: HALOT
  rationale: Aquí introduce el contenido de lo que se debe observar; 'que' es la equivalencia más clara en español.
- source_word: קָטֹן
  english_pob_choice: young
  chosen_spanish: joven
  alternatives_spanish:
  - pequeño
  - insignificante
  - de corta edad
  lexicon: HALOT
  rationale: Aunque el hebreo permite 'pequeño' o 'insignificante', el audit trail inglés revisado eligió 'young' como sentido más natural. En español, 'joven' expresa mejor ese valor probable que una mera pequeñez abstracta.
- source_word: וְעָמַדְתִּי
  english_pob_choice: and I stood by
  chosen_spanish: y me mantuve junto a
  alternatives_spanish:
  - y permanecí junto a
  - y persistí con
  - y me mantuve en
  lexicon: HALOT
  rationale: El verbo admite la idea de permanecer o perseverar. 'Me mantuve junto a' conserva la noción de adhesión perseverante y suena fluido en español.
- source_word: בָהּ
  english_pob_choice: her
  chosen_spanish: ella
  alternatives_spanish:
  - a ella
  - en ella
  lexicon: HALOT
  rationale: La terminación femenina probablemente alude a la Sabiduría personificada. En español, 'junto a ella' hace visible ese referente sin forzar un pronombre neutro que ocultaría la personificación.
- source_word: וּמְצָאתִיהָ
  english_pob_choice: and found her
  chosen_spanish: la encontré
  alternatives_spanish:
  - y la hallé
  - y la alcancé
  lexicon: HALOT
  rationale: El verbo מצא con sufijo femenino se traduce con naturalidad como 'encontré'/'hallé'. 'La encontré' mantiene la referencia femenina y la continuidad con 'ella'.
theological_decisions:
- issue: Personificación de la Sabiduría en los sufijos femeninos
  english_pob_reading: Render with 'her' in the main text, preserving the feminine referent of Wisdom.
  chosen_spanish_reading: Mantener la personificación con 'ella' / 'la'.
  alternative_spanish_readings:
  - Usar 'eso' o 'lo' para despersonalizarla
  - Explicitar 'Sabiduría' en la traducción
  rationale: Sirácida frecuentemente presenta la Sabiduría como figura femenina. El español puede conservar esa tensión sin añadir una explicación interpretativa en el cuerpo del texto.
  doctrine_reference: Translation philosophy §§1, 3, 6
- issue: Divergencia entre el hebreo y el griego paralelo
  english_pob_reading: Follow the Hebrew as the primary witness where extant, while noting the Greek's substantially different sense in a footnote.
  chosen_spanish_reading: Seguir el hebreo y señalar en nota la forma griega distinta.
  alternative_spanish_readings:
  - 'Traducir según el griego: ''Trabajé poco y hallé para mí mucho descanso'''
  - Fusionar ambas lecturas en una sola frase
  rationale: La política del proyecto da primacía al hebreo conservado de Sirácida. La forma griega es suficientemente distinta como para merecer una nota transparente, no una fusión silenciosa.
  doctrine_reference: 'PHILOSOPHY.md: Hebrew Sirach is translated from Hebrew where it survives; transparency principle'
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión más reciente del audit trail, que prefirió 'young' frente a 'small' y 'her' frente a 'it'. La redacción española sigue esa orientación, pero adapta la sintaxis para que suene natural y mantenga la personificación femenina explícita en el texto principal.
  spanish_consistency_notes:
  - Se mantuvo 'joven' como equivalente de קָטֹן según la revisión del expediente, evitando 'pequeño' por sonar menos probable aquí.
  - Se preservó la personificación de la Sabiduría con 'ella' y 'la', coherente con la lectura hebrea y con la revisión final inglesa.
  - '''Con tus propios ojos'' reproduce la verificación directa idiomática de בְעֵינֵיכֶם sin calco duro.'
  - La nota griega queda anclada en el texto con [b], y la nota sobre la Sabiduría con [a], como exige la validación.
