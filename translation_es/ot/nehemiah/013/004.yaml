translation:
  language: es
  text: Antes de esto[a], Eliasib el sacerdote, que había sido encargado del aposento de la casa de nuestro Dios, era pariente de Tobías—
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'tenía relación estrecha con Tobías'. La expresión hebrea puede denotar cercanía relacional, ya sea familiar o social.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְלִפְנֵי מִזֶּה
  english_pob_choice: Now before this
  chosen_spanish: Antes de esto
  alternatives_spanish:
  - Ahora antes de esto
  - Y antes de esto
  lexicon: HALOT
  rationale: La expresión introduce un hecho anterior en la narración. En español, 'Antes de esto' conserva el valor temporal sin añadir una partícula discursiva innecesaria como 'ahora'.
- source_word: אֶלְיָשִׁיב
  english_pob_choice: Eliashib
  chosen_spanish: Eliasib
  alternatives_spanish:
  - Eliashib
  lexicon: Transliteración bíblica estándar en español
  rationale: Se adapta el nombre propio a la ortografía española corriente, manteniendo la identificación del personaje.
- source_word: הַכֹּהֵן
  english_pob_choice: the priest
  chosen_spanish: el sacerdote
  alternatives_spanish:
  - el sacerdote
  - el sacerdote principal
  lexicon: HALOT
  rationale: El hebreo usa el título definido para su oficio; 'sacerdote' es la forma natural y fiel en español, sin cambiar el valor del título.
- source_word: נָתוּן
  english_pob_choice: who had been appointed over
  chosen_spanish: que había sido puesto sobre
  alternatives_spanish:
  - que había sido nombrado sobre
  - que había sido asignado a cargo de
  lexicon: HALOT
  rationale: El participio pasivo expresa que fue colocado en una función de responsabilidad. 'Puesto sobre' conserva la idea de encargo/autoridad sin forzar una formulación administrativa más moderna.
- source_word: בְּלִשְׁכַּת בֵּית אֱלֹהֵינוּ
  english_pob_choice: over the chamber of the house of our God
  chosen_spanish: sobre la cámara de la casa de nuestro Dios
  alternatives_spanish:
  - en la cámara de la casa de nuestro Dios
  - sobre el aposento de la casa de nuestro Dios
  lexicon: HALOT
  rationale: '''לִשְׁכָּה'' puede ser cámara o aposento/depósito. ''Cámara'' preserva el sentido arquitectónico-templario y coincide con el matiz de la traducción inglesa auditada.'
- source_word: קָרוֹב לְטוֹבִיָּה
  english_pob_choice: was related to Tobiah
  chosen_spanish: era pariente de Tobías
  alternatives_spanish:
  - era cercano a Tobías
  - era asociado con Tobías
  lexicon: HALOT
  rationale: El hebreo permite cercanía familiar o social. La revisión inglesa eliminó 'closely' para no intensificar; en español, 'pariente' comunica la relación de manera concreta sin añadir cercanía excesiva, manteniendo la tensión entre parentesco y asociación.
theological_decisions:
- issue: Relación de Eliasib con Tobías
  english_pob_reading: was related to Tobiah
  chosen_spanish_reading: era pariente de Tobías
  alternative_spanish_readings:
  - era asociado con Tobías
  - tenía relación con Tobías
  rationale: El texto hebreo no especifica si la relación es familiar o social. 'Pariente' es una opción interpretativa sobria que refleja una posible relación de sangre, pero la nota permite la alternativa amplia para no cerrar la ambigüedad del original.
  doctrine_reference: No aplica; cuestión léxica-histórica, no doctrinal.
translation_notes:
  revision_awareness: La versión inglesa revisada redujo 'closely related' a 'related' para ajustar la precisión léxica. La presente propuesta evita intensificadores no presentes y conserva la ambigüedad del vínculo con una nota alternativa.
  spanish_consistency_notes:
  - Se mantiene 'nuestro Dios' para בֵּית אֱלֹהֵינוּ, en línea con la traducción inglesa auditada.
  - Se usa 'cámara' para לשכה por su valor arquitectónico-templario.
  - Se evita 'SEÑOR' porque el texto hebreo usa אֱלֹהִים, no el tetragrámaton.
