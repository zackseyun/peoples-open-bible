translation:
  language: es
  text: Levanten sus ojos a los cielos[a], y miren la tierra abajo; porque los cielos se desvanecerán como humo, y la tierra se gastará como un vestido, y sus habitantes morirán de la misma manera. Pero mi salvación será para siempre, y mi rectitud[b] no será quebrantada.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «los cielos se disiparán como humo». El verbo hebreo es difícil; el sentido general es que los cielos pasarán.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «mi justicia». El hebreo puede denotar tanto justicia como rectitud.'
    reason: lexical_alternative
lexical_decisions:
- source_word: שְׂאוּ
  english_pob_choice: Lift up
  chosen_spanish: Levanten
  alternatives_spanish:
  - Alcen
  - Levanten hacia arriba
  lexicon: HALOT
  rationale: El imperativo plural pide una acción dirigida a los ojos; «Levanten» transmite bien el gesto físico e idiomático en español, sin perder la concreción del hebreo.
- source_word: לַשָּׁמַיִם
  english_pob_choice: to the heavens
  chosen_spanish: a los cielos
  alternatives_spanish:
  - al cielo
  - a los cielos
  lexicon: HALOT
  rationale: «שָׁמַיִם» está en plural y suele abarcar el ámbito celeste/cósmico; «a los cielos» conserva ese plural mejor que el singular «al cielo».
- source_word: עֵינֵיכֶם
  english_pob_choice: your eyes
  chosen_spanish: sus ojos
  alternatives_spanish:
  - vuestros ojos
  - sus ojos
  lexicon: HALOT
  rationale: Mantiene el objeto literal del imperativo. Se eligió el tratamiento de cortesía/plural amplio «sus» para un registro bíblico moderno y sobrio en español.
- source_word: וְהַבִּיטוּ
  english_pob_choice: and look
  chosen_spanish: y miren
  alternatives_spanish:
  - y contemplen
  - y vean
  lexicon: HALOT
  rationale: El paralelo con «Levanten» pide un segundo imperativo claro; «miren» es natural y directo, sin introducir matices no presentes en el hebreo.
- source_word: אֶל הָאָרֶץ מִתַּחַת
  english_pob_choice: at the earth beneath
  chosen_spanish: la tierra debajo
  alternatives_spanish:
  - la tierra de abajo
  - la tierra que está debajo
  lexicon: HALOT
  rationale: El contraste es con los cielos arriba; «debajo» reproduce la oposición espacial de forma natural en español.
- source_word: כִּי
  english_pob_choice: for
  chosen_spanish: porque
  alternatives_spanish:
  - pues
  - ya que
  lexicon: HALOT
  rationale: Introduce la razón de las exhortaciones anteriores; «porque» expresa con claridad la relación causal.
- source_word: נִמְלָחוּ
  english_pob_choice: will vanish
  chosen_spanish: se desvanecerán
  alternatives_spanish:
  - desaparecerán
  - se disiparán
  lexicon: HALOT
  rationale: El verbo hebreo es difícil; la POB inglesa opta por una pérdida o desaparición del cielo. «Se desvanecerán» conserva la idea de desaparecer sin forzar una imagen demasiado literal o extraña en español.
- source_word: כֶּעָשָׁן
  english_pob_choice: like smoke
  chosen_spanish: como humo
  alternatives_spanish:
  - como humo
  - como el humo
  lexicon: HALOT
  rationale: La comparación es directa y transparente; «humo» funciona mejor que una glosa más explicativa.
- source_word: תִּבְלֶה
  english_pob_choice: will wear out
  chosen_spanish: se gastará
  alternatives_spanish:
  - se desgastará
  - envejecerá
  lexicon: HALOT
  rationale: El verbo sugiere el desgaste de una prenda; «se gastará» conserva la idea de deterioro por uso, con naturalidad en español.
- source_word: כַּבֶּגֶד
  english_pob_choice: like a garment
  chosen_spanish: como un vestido
  alternatives_spanish:
  - como una prenda
  - como un vestido
  lexicon: HALOT
  rationale: Se mantiene la metáfora textil. «Vestido» es un equivalente natural de «garment» y funciona bien en el flujo poético del verso.
- source_word: וְיֹשְׁבֶיהָ
  english_pob_choice: and its inhabitants
  chosen_spanish: y sus habitantes
  alternatives_spanish:
  - y los que habitan en ella
  - y sus moradores
  lexicon: HALOT
  rationale: La forma sustantivada del participio se expresa con precisión mediante «sus habitantes».
- source_word: כְּמוֹ כֵן
  english_pob_choice: likewise
  chosen_spanish: de la misma manera
  alternatives_spanish:
  - asimismo
  - igualmente
  lexicon: HALOT
  rationale: La frase marca correspondencia con el destino de la tierra; «de la misma manera» explicita esa equivalencia sin añadir interpretación.
- source_word: יְמוּתוּן
  english_pob_choice: will die
  chosen_spanish: morirán
  alternatives_spanish:
  - perecerán
  - morirán
  lexicon: HALOT
  rationale: Se usa el verbo ordinario «morir» para conservar el sentido básico y directo del hebreo.
- source_word: וִישׁוּעָתִי
  english_pob_choice: my salvation
  chosen_spanish: mi salvación
  alternatives_spanish:
  - mi liberación
  - mi salvación
  lexicon: HALOT
  rationale: El sustantivo tiene un fuerte campo de rescate y liberación, pero «salvación» es el equivalente bíblico más adecuado y coincide con la tradición semántica del pasaje.
- source_word: לְעוֹלָם תִּהְיֶה
  english_pob_choice: will be forever
  chosen_spanish: será para siempre
  alternatives_spanish:
  - existirá para siempre
  - será eterna
  lexicon: HALOT
  rationale: Preserva el valor durativo de la cláusula con una fórmula natural y solemne en español.
- source_word: וְצִדְקָתִי
  english_pob_choice: and my righteousness
  chosen_spanish: y mi justicia
  alternatives_spanish:
  - y mi justicia
  - y mi rectitud
  lexicon: HALOT
  rationale: Se mantiene la opción «justicia» para hacer audible la amplitud semántica de צדקה en este contexto profético; el término puede abarcar rectitud y acción justa, no solo una cualidad moral abstracta.
- source_word: לֹא תֵחָת
  english_pob_choice: will not be shattered
  chosen_spanish: no será quebrantada
  alternatives_spanish:
  - no se quebrará
  - no será destruida
  lexicon: HALOT
  rationale: La forma niphal con un sujeto abstracto admite la imagen de algo que no se rompe o se quiebra; «quebrantada» conserva bien la metáfora de firmeza frente a la fragilidad de lo creado.
theological_decisions:
- issue: Valor de צִדְקָתִי en el cierre del verso
  english_pob_reading: my righteousness
  chosen_spanish_reading: mi justicia
  alternative_spanish_readings:
  - mi rectitud
  - mi justicia
  rationale: En Isaías, צדקה puede abarcar la justicia fiel de Yahvé en su actuar salvador y su rectitud covenantal. En español, «justicia» deja ver tanto el contenido ético-jurídico como la fidelidad activa de Dios, mientras que «rectitud» estrecha más el campo. Se mantiene la resonancia semántica sin reducirla solo a una categoría doctrinal.
  doctrine_reference: 'DOCTRINE.md Contested terms: δικαιοσύνη default ''righteousness'' with ''justice'' preserved in footnotes where relevant by analogy of semantic field'
- issue: Alcance de שָׁמַיִם en plural
  english_pob_reading: the heavens
  chosen_spanish_reading: los cielos
  alternative_spanish_readings:
  - el cielo
  - los cielos
  rationale: El plural hebreo sugiere el marco cósmico completo, no solo el cielo visible como un techo singular. «Los cielos» preserva mejor el plural morfológico y el contraste con «la tierra» del verso.
  doctrine_reference: Uso poético-bíblico del plural de majestad/cosmología en textos proféticos
- issue: Sentido de נִמְלָחוּ
  english_pob_reading: will vanish
  chosen_spanish_reading: se desvanecerán
  alternative_spanish_readings:
  - se disiparán
  - desaparecerán
  rationale: La raíz es difícil y el contexto apunta a la desaparición o disolución de los cielos; no se intenta domesticar el verbo con una literalidad opaca. Se conserva la tensión textual reconociendo que el hebreo es semánticamente incierto.
  doctrine_reference: Principio de prudencia exegética ante verbos raros o dudosos
translation_notes:
  revision_awareness: Se siguió el audit trail inglés de POB con filosofía de equivalencia óptima; no se detectaron revisiones aplicadas en el paquete fuente. La traducción española conserva el paralelismo poético, la oposición cielos/tierra, el verbo difícil de נִמְלָחוּ en una solución semánticamente prudente, y la ambigüedad de צדקה mediante nota.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» como norma del proyecto solo cuando aparezca el nombre divino explícito; en este verso no aparece.
  - Se evitó «SEÑOR» porque el versículo no contiene יהוה ni κύριος en el texto fuente.
  - 'Se conservó el paralelismo de imágenes: cielo/humo, tierra/vestido, habitantes/morir, salvación/para siempre, justicia/no ser quebrantada.'
  - Se usó un español contemporáneo y reverente, sin arcaísmos innecesarios.
