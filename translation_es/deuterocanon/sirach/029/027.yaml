translation:
  language: es
  text: Sal[a], forastero, de delante del honor, porque mi hermano ha venido a hospedarse conmigo[b]; hay necesidad de alojamiento[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «desde el lugar de honor» o, más literalmente, «de delante del rostro del honor». La expresión griega es inusual y probablemente indica que el forastero debe dejar un lugar prominente u honroso para hacer espacio a otro huésped.
    reason: lexical_alternative
  - marker: b
    text: O «ha llegado como huésped a mi casa». El griego indica que ahora está en condición de huésped recibido por el hablante.
    reason: lexical_alternative
  - marker: c
    text: También puede traducirse «hay necesidad de hospedaje» o «hace falta hospitalidad». El griego subraya la necesidad creada por recibir a otro huésped.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἔξελθε
  english_pob_choice: Go out
  chosen_spanish: Sal
  alternatives_spanish:
  - Sal fuera
  - Vete
  - Salte
  lexicon: LSJ
  rationale: El imperativo de ἐξέρχομαι pide una orden breve y directa. «Sal» conserva la fuerza inmediata sin sobrecargar el español con una redundancia innecesaria.
- source_word: πάροικε
  english_pob_choice: sojourner
  chosen_spanish: forastero
  alternatives_spanish:
  - forastero residente
  - extranjero
  - transeúnte
  lexicon: LSJ
  rationale: El término griego señala a alguien no perteneciente al lugar, con estatus de huésped o residente temporal. «Forastero» comunica esa condición social en español sin sonar técnico como «extranjero residente».
- source_word: ἀπὸ προσώπου δόξης
  english_pob_choice: from before honor
  chosen_spanish: de delante del honor
  alternatives_spanish:
  - de delante de la gloria
  - desde el lugar de honor
  - de delante del rostro del honor
  lexicon: LSJ
  rationale: Se preserva la imagen literal del griego, que es inusual. «De delante del honor» mantiene la tensión lexical sin decidir demasiado pronto si se trata de un lugar físico o de una posición honorífica.
- source_word: ἐπεξενώταί μοι
  english_pob_choice: has become a guest to me
  chosen_spanish: se ha convertido en huésped para mí
  alternatives_spanish:
  - se ha alojado conmigo
  - ha llegado como huésped para mí
  - se ha hospedado conmigo
  lexicon: LSJ
  rationale: El verbo de la familia de ξεν- expresa la llegada al estado de huésped. «Se ha convertido en huésped para mí» conserva ese resultado y evita suavizarlo a una mera visita.
- source_word: ὁ ἀδελφός
  english_pob_choice: my brother
  chosen_spanish: mi hermano
  alternatives_spanish:
  - el hermano
  - mi pariente
  - mi hermano o pariente
  lexicon: LSJ
  rationale: Aunque el griego usa artículo, el contexto hace natural en español el posesivo explícito. «Mi hermano» preserva la relación cercana sin forzar una paráfrasis más amplia.
- source_word: χρεία
  english_pob_choice: there is need of
  chosen_spanish: hay necesidad de
  alternatives_spanish:
  - necesito
  - hay una necesidad de
  - se requiere
  lexicon: LSJ
  rationale: La construcción nominal se conserva de forma bastante literal para mantener el peso de la necesidad. «Hay necesidad de» refleja bien la fuerza impersonal de χρεία.
- source_word: τῆς ξενίας
  english_pob_choice: the lodging
  chosen_spanish: alojamiento
  alternatives_spanish:
  - hospedaje
  - hospitalidad
  - estancia para huéspedes
  lexicon: LSJ
  rationale: En este contexto concreto, el término apunta al alojamiento disponible para el huésped añadido. «Alojamiento» es natural en español y conserva el dominio semántico de ξενία sin borrar la idea de hospitalidad.
theological_decisions:
- issue: Tensión entre honor, hospitalidad y desplazamiento del primer huésped
  english_pob_reading: The Greek expression is unusual, and the sense is likely that the sojourner must leave a prominent or honored spot to make room for another guest.
  chosen_spanish_reading: La traducción conserva la rareza de «de delante del honor» para no resolver prematuramente si el énfasis recae en el lugar físico o en la dignidad social.
  alternative_spanish_readings:
  - desde el lugar de honor
  - de delante de la gloria
  - del puesto honorífico
  rationale: El texto parece describir el desplazamiento de un huésped para dar cabida a otro, pero la formulación griega es deliberadamente extraña. Mantener esa extrañeza permite que el lector perciba la tensión entre honra y acomodación del huésped nuevo.
  doctrine_reference: Hospitalidad bíblica y orden de honor en la vida comunitaria; cf. Sabiduría práctica en textos de instrucción.
translation_notes:
  revision_awareness: La versión inglesa auditada fue revisada desde una formulación más interpretativa («place of honor») hacia una más cercana al griego («before honor»), y también ajustó la segunda cláusula a «has become a guest to me» y «there is need of lodging». La redacción española sigue esa revisión al conservar la literalidad de la imagen y al evitar soluciones excesivamente explicativas.
  spanish_consistency_notes:
  - Se usó «Yahvé» como norma del proyecto solo cuando corresponde; este versículo no contiene el Tetragrámaton.
  - Se prefirió «huésped/alojamiento» para mantener el campo semántico de ξενία sin perder la referencia concreta al acto de hospedar.
  - Se evitó «señor» o lenguaje eclesiástico tradicional no apoyado por el texto.
  - «Honor» se mantuvo sin expandir a «gloria» en el cuerpo principal para preservar la ambigüedad del griego.
