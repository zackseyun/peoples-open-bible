translation:
  language: es
  text: El corazón del sabio está a su derecha[a], pero el corazón del necio está a su izquierda.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «a su lado derecho ... a su lado izquierdo». El hebreo usa derecha e izquierda como orientaciones simbólicas, probablemente con la idea de juicio acertado frente a juicio erróneo.'
    reason: lexical_alternative
lexical_decisions:
- source_word: לֵב
  english_pob_choice: heart
  chosen_spanish: corazón
  alternatives_spanish:
  - mente
  - interior
  lexicon: HALOT
  rationale: 'לֵב nombra el centro interior de la persona: pensamiento, voluntad y disposición. En español, «corazón» conserva mejor la imagen hebrea y su fuerza idiomática que reducirlo a «mente».'
- source_word: חָכָם
  english_pob_choice: wise man
  chosen_spanish: sabio
  alternatives_spanish:
  - hombre sabio
  - persona sabia
  lexicon: HALOT
  rationale: La forma hebrea es un adjetivo sustantivado masculino singular. En español, «el sabio» mantiene esa sustantivación sin añadir una expansión innecesaria, y conserva el paralelismo con «el necio».
- source_word: לִימִינוֹ
  english_pob_choice: at his right hand
  chosen_spanish: a su derecha
  alternatives_spanish:
  - a su mano derecha
  - a su lado derecho
  lexicon: HALOT
  rationale: La partícula ל con ימין aquí expresa orientación o lado. «A su derecha» es natural en español y conserva la imagen espacial y simbólica sin sobreinterpretarla.
- source_word: כְּסִיל
  english_pob_choice: fool
  chosen_spanish: necio
  alternatives_spanish:
  - fool
  - estúpido
  lexicon: HALOT
  rationale: כְּסִיל en la literatura sapiencial designa una necedad moral e intelectual. «Necio» es la opción española más estable y digna para ese campo semántico, mejor que un insulto coloquial.
- source_word: לִשְׂמֹאלוֹ
  english_pob_choice: at his left
  chosen_spanish: a su izquierda
  alternatives_spanish:
  - a su mano izquierda
  - a su lado izquierdo
  lexicon: HALOT
  rationale: Como en el hemistiquio anterior, se preserva la orientación espacial del hebreo con una formulación idiomática natural en español.
theological_decisions:
- issue: Contraste sapiencial con orientación derecha/izquierda
  english_pob_reading: The Hebrew idiom uses right and left as symbolic orientations, likely implying sound judgment versus poor judgment.
  chosen_spanish_reading: La derecha y la izquierda se conservan como orientaciones simbólicas, probablemente insinuando buen juicio frente a mal juicio.
  alternative_spanish_readings:
  - El sabio acierta y el necio yerra.
  - El sabio tiene criterio; el necio, no.
  rationale: El hebreo no explica el símbolo, y el valor literario depende del contraste espacial. Conviene mantener la metáfora para no borrar la tensión interpretativa documentada en la POB inglesa.
  doctrine_reference: DOCTRINE.md Translation philosophy §2 (Source transparency)
translation_notes:
  revision_awareness: 'El texto sigue de cerca el hebreo y el audit trail inglés: conserva la metáfora de derecha/izquierda, mantiene el paralelismo sintáctico y evita convertir el dicho sapiencial en una paráfrasis explicativa.'
  spanish_consistency_notes:
  - Se usa «sabio/necio» por consistencia con la terminología sapiencial bíblica en español.
  - Se evita «señor» o fórmulas devocionales porque el versículo no contiene el Tetragrámaton ni lenguaje cultual.
  - La nota mantiene una alternativa de traducción explícita, como en el POB inglés, para reflejar la ambigüedad idiomática del hebreo.
