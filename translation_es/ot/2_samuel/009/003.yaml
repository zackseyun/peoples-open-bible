translation:
  language: es
  text: 'Entonces el rey dijo: «¿Todavía queda alguien de la casa de Saúl, para que yo le muestre la bondad de Dios[a]?». Siba dijo al rey: «Todavía hay un hijo de Jonatán, lisiado de los pies[b]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «la lealtad del pacto de Dios» o «la bondad divina».
    reason: lexical_alternative
  - marker: b
    text: O «cojo de los pies».
    reason: lexical_alternative
lexical_decisions:
- source_word: הַאֶפֶס עוֹד אִישׁ
  english_pob_choice: Is there still anyone left
  chosen_spanish: ¿Todavía queda alguien
  alternatives_spanish:
  - ¿Todavía no queda nadie
  - ¿Todavía hay un hombre
  lexicon: HALOT
  rationale: El hebreo usa una pregunta idiomática sobre si aún permanece alguien. «Todavía queda alguien» comunica la idea de supervivencia/resto con naturalidad en español y evita una negación engañosa.
- source_word: לְבֵית שָׁאוּל
  english_pob_choice: of the house of Saul
  chosen_spanish: de la casa de Saúl
  alternatives_spanish:
  - de la casa de Saúl
  - de la familia de Saúl
  lexicon: HALOT
  rationale: «Casa» conserva el sentido dinástico/familiar del hebreo. «Casa de Saúl» es transparente y mantiene el vínculo de linaje.
- source_word: וְאֶעֱשֶׂה עִמּוֹ
  english_pob_choice: that I may show him
  chosen_spanish: para que yo le muestre
  alternatives_spanish:
  - y le haga
  - para hacerle
  lexicon: HALOT
  rationale: Con חֶסֶד, el español «mostrar» reproduce bien el valor relacional de hacer favor/bondad a alguien. La forma final conserva el matiz cohortativo del verbo.
- source_word: חֶסֶד אֱלֹהִים
  english_pob_choice: the kindness of God
  chosen_spanish: la bondad de Dios
  alternatives_spanish:
  - la misericordia de Dios
  - la lealtad del pacto de Dios
  - la bondad de Dios
  lexicon: HALOT
  rationale: En este contexto narrativo, חֶסֶד apunta a una bondad leal y generosa. «Bondad de Dios» es idiomático en español y mantiene abierta la carga de favor fiel sin sobreespecificarla en el texto principal.
- source_word: עוֹד בֵּן לִיהוֹנָתָן
  english_pob_choice: There is still a son of Jonathan
  chosen_spanish: Todavía hay un hijo de Jonatán
  alternatives_spanish:
  - Aún queda un hijo de Jonatán
  - Todavía permanece un hijo de Jonatán
  lexicon: HALOT
  rationale: La frase reporta la existencia de un descendiente sobreviviente. «Todavía hay» es natural y fiel al énfasis hebreo en que queda uno.
- source_word: נְכֵה רַגְלָיִם
  english_pob_choice: crippled in his feet
  chosen_spanish: lisiado de sus pies
  alternatives_spanish:
  - cojo de sus pies
  - inválido de sus pies
  - lisiado de sus pies
  lexicon: HALOT
  rationale: El hebreo describe una incapacidad física relacionada con los pies. «Lisiado» conserva la fuerza descriptiva de la lesión; se mantiene el complemento «de sus pies» para reflejar el hebreo de manera auditable.
theological_decisions:
- issue: חֶסֶד אֱלֹהִים como cualidad divina y como acto de lealtad/bondad
  english_pob_reading: the kindness of God
  chosen_spanish_reading: la bondad de Dios
  alternative_spanish_readings:
  - la misericordia de Dios
  - la lealtad del pacto de Dios
  - la bondad de Dios
  rationale: 'La lectura inglesa evita fijar demasiado el sentido a una sola formulación doctrinal. En español, «bondad de Dios» preserva la amplitud: puede oírse como bondad divina y como bondad acorde con el carácter fiel de Dios. No se fuerza «pacto» en el texto principal, aunque el matiz de חֶסֶד queda reconocido en la decisión léxica.'
  doctrine_reference: Translation philosophy §§1, 3, 5
translation_notes:
  revision_awareness: La versión inglesa revisada corrigió la idea de «no hay nadie» a «¿queda alguien?», y la traducción española sigue esa corrección con una pregunta afirmativa sobre la existencia de un sobreviviente. También conserva la equivalencia funcional de חֶסֶד con una expresión española natural, sin perder el trasfondo de favor leal.
  spanish_consistency_notes:
  - Se usa «Saúl» y «Jonatán» con acentuación española habitual y sin introducir equivalentes eclesiásticos tradicionales innecesarios.
  - Se mantiene «casa de Saúl» para el sentido dinástico de בֵּית.
  - «Lisiado de sus pies» conserva el rasgo corporal explícito del hebreo; la nota ofrece la alternativa más tradicional «cojo».
