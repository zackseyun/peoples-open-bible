  rationale: Se hace una reparación menor para reflejar mejor la secuencia narrativa hebrea con «Entonces» en vez de «Así que». Se conserva el resto del borrador porque es fiel al sentido fuente, al contexto legal y a la nota léxica del POB en inglés.
