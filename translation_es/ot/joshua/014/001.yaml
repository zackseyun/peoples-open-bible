translation:
  language: es
  text: Ahora bien, estas son las herencias que recibieron los hijos de Israel en la tierra de Canaán[a], las cuales les repartieron Eleazar el sacerdote, Josué hijo de Nun, y los jefes de las casas paternas de las tribus de los hijos de Israel[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'los israelitas' para 'los hijos de Israel'. El hebreo usa literalmente la expresión familiar 'hijos de Israel'.
    reason: lexical_alternative
  - marker: b
    text: O 'que les repartieron Eleazar el sacerdote, Josué hijo de Nun y los jefes de las casas paternas de las tribus como herencia'. El hebreo repite la raíz de heredar en ambas cláusulas.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְאֵלֶּה
  english_pob_choice: Now these are
  chosen_spanish: Ahora bien, estas son
  alternatives_spanish:
  - Y estas son
  - Estas son
  lexicon: HALOT
  rationale: En español, 'Ahora bien' reproduce bien la función discursiva de apertura de una nueva sección sin sonar abrupto; conserva la continuidad narrativa mejor que un simple 'Estas son'.
- source_word: נָחֲלוּ
  english_pob_choice: received
  chosen_spanish: recibieron
  alternatives_spanish:
  - heredaron
  - obtuvieron como heredad
  lexicon: HALOT
  rationale: '''Recibieron'' expresa de forma natural la recepción de las porciones asignadas, sin restringir indebidamente el sentido a herencia por sucesión familiar. Mantiene la idea de posesión recibida por reparto.'
- source_word: בְנֵי יִשְׂרָאֵל
  english_pob_choice: the sons of Israel
  chosen_spanish: los hijos de Israel
  alternatives_spanish:
  - los israelitas
  - los hijos de Jacob
  lexicon: HALOT
  rationale: Se conserva la expresión familiar/covenantal del hebreo. 'Hijos de Israel' es transparente y fiel al original, y mantiene la forma masculina plural explícita.
- source_word: בְּאֶרֶץ כְּנָעַן
  english_pob_choice: in the land of Canaan
  chosen_spanish: en la tierra de Canaán
  alternatives_spanish:
  - en Canaán
  lexicon: HALOT
  rationale: Se preserva 'tierra' porque el hebreo lo dice explícitamente y es relevante en un contexto de heredad territorial.
- source_word: אֲשֶׁר נִחֲלוּ אֹתָם
  english_pob_choice: which ... apportioned to them
  chosen_spanish: las cuales les repartieron
  alternatives_spanish:
  - las cuales les asignaron
  - las cuales les dieron como heredad
  lexicon: HALOT
  rationale: '''Repartieron'' expresa con claridad el acto administrativo de distribución. Aunque el hebreo repite la raíz de heredar, en español la repetición exacta sería pesada; ''repartieron'' conserva la idea de asignación de porciones.'
- source_word: אֶלְעָזָר הַכֹּהֵן
  english_pob_choice: Eleazar the priest
  chosen_spanish: Eleazar el sacerdote
  alternatives_spanish:
  - Eleazar el sacerdote
  - Eleazar el sacerdote (el sacerdote)
  lexicon: HALOT
  rationale: '''Sacerdote'' es el equivalente natural de הַכֹּהֵן en español bíblico moderno, y evita una transliteración innecesaria del oficio.'
- source_word: יְהוֹשֻׁעַ בִּן נוּן
  english_pob_choice: Joshua son of Nun
  chosen_spanish: Josué hijo de Nun
  alternatives_spanish:
  - Josué, hijo de Nun
  - Josué hijo de Nun
  lexicon: HALOT
  rationale: Se usa el nombre bíblico habitual en español 'Josué' y se traduce la relación filial de modo natural.
- source_word: רָאשֵׁי אֲבוֹת הַמַּטּוֹת
  english_pob_choice: the heads of the fathers’ houses of the tribes
  chosen_spanish: los jefes de las casas paternas de las tribus
  alternatives_spanish:
  - los jefes de las casas ancestrales de las tribus
  - los cabezas de los clanes de las tribus
  lexicon: HALOT
  rationale: '''Jefes'' representa ''heads'' de forma idiomática en español. ''Casas paternas'' mantiene la estructura de parentesco del hebreo; ''clanes'' sería más interpretativo y menos transparente.'
- source_word: לִבְנֵי יִשְׂרָאֵל
  english_pob_choice: of the sons of Israel
  chosen_spanish: de los hijos de Israel
  alternatives_spanish:
  - de Israel
  - de los israelitas
  lexicon: HALOT
  rationale: Se conserva la relación genitiva del hebreo y la fórmula familiar/covenantal. Además, en español fluye mejor al final de la cadena nominal.
theological_decisions:
- issue: Mantener la fórmula genealógica/covenantal בני ישראל
  english_pob_reading: the sons of Israel
  chosen_spanish_reading: los hijos de Israel
  alternative_spanish_readings:
  - los israelitas
  - los hijos de Jacob
  rationale: Se preserva la formulación explícita del hebreo, que no es meramente étnica sino también familiar y pactal. 'Israelitas' es más idiomático, pero atenúa esa transparencia textual.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4
- issue: Conservar la estructura social de אבות הַמַּטּוֹת
  english_pob_reading: the fathers’ houses of the tribes
  chosen_spanish_reading: las casas paternas de las tribus
  alternative_spanish_readings:
  - las casas ancestrales de las tribus
  - los linajes tribales
  rationale: La frase refleja una organización familiar concreta del texto fuente. Mantenerla evita sustituir el marco social original por una etiqueta sociológica más moderna pero menos exacta.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4, 5
translation_notes:
  revision_awareness: La versión española sigue de cerca el texto hebreo y el trazado de decisiones del POB en inglés. Se preserva la doble referencia al reparto de la heredad, aunque en español la repetición literal de la raíz נחל se vuelve menos natural; por eso se opta por 'recibieron' y 'repartieron' para claridad publicable.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' como norma del proyecto cuando aparezca el nombre divino, pero este versículo no lo contiene.
  - '''Hijos de Israel'' conserva la fórmula bíblica masculina plural, en línea con el criterio de fidelidad formal del proyecto.'
  - '''Casas paternas'' se usa de manera consistente con otras secciones del POB para reflejar el hebreo אבות sin modernizarlo a ''clanes'' salvo necesidad contextual.'
