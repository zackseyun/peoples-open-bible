review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja en gran medida el sentido del hebreo y sigue bien la auditoría inglesa: preserva las dos porciones sacrificiales, el mandato de comerlas en un lugar limpio, la inclusión de hijos e hijas, la noción de porción asignada y la expresión ''los hijos de Israel''. Sin embargo, hay varios desajustes léxicos y de naturalidad: ''pecho'' para חֲזֵה suena menos idiomático que ''pechuga'' en contexto cárnico/sacrificial; ''pierna'' para שׁוֹק es menos preciso que ''muslo'', y además el texto principal usa ''ofrenda alzada'' mientras la nota b repite exactamente la misma frase como supuesta alternativa, por lo que la nota no conserva una alternativa real al estilo del inglés (''contribución'').'
  spanish_quality_summary: La redacción es comprensible, pero 'Y ustedes, y sus hijos...' resulta torpe en español bíblico-litúrgico. Dado que el hebreo está en singular masculino ('tú'), conviene 'Y tú, y tus hijos y tus hijas contigo'. También 'han sido dados como su porción y la porción de sus hijos' mezcla número/persona y suena menos natural que 'les han sido dados como tu porción y la porción de tus hijos'. El resto es legible y digno.
  glossary_alignment: 'Buena alineación general con la terminología del proyecto: no aparece el nombre divino en el texto principal porque no está en el versículo; ''ofrendas de paz'' y ''los hijos de Israel'' siguen la política documentada. La principal divergencia con la auditoría inglesa está en שׁוֹק הַתְּרוּמָה: el inglés eligió ''thigh of the contribution'', mientras el español cambió a ''pierna de la ofrenda alzada''. Ese cambio puede defenderse parcialmente, pero la nota debe preservar la alternativa correspondiente y el texto español debe usar una formulación más natural y precisa.'
  issues:
  - severity: medium
    issue: Cambio de persona gramatical de singular a plural en el destinatario
    rationale: El hebreo dice אַתָּה ... אִתָּךְ ('tú ... contigo'), no 'ustedes'. En español neutro eclesial, 'tú' aquí es más fiel y más natural que 'ustedes'.
  - severity: medium
    issue: '''Pecho'' para חֲזֵה suena poco idiomático en este contexto'
    rationale: Aunque semánticamente posible, en español de cortes sacrificiales/cárnicos 'pechuga' comunica mejor la porción animal sin ambigüedad corporal humana innecesaria.
  - severity: medium
    issue: '''Pierna'' para שׁוֹק es menos preciso que ''muslo'''
    rationale: שׁוֹק suele referirse a la parte superior de la pierna; 'muslo' preserva mejor la precisión del original y coincide mejor con la tradición sacrificial.
  - severity: high
    issue: La nota b no ofrece una alternativa real al texto principal
    rationale: El texto principal dice 'ofrenda alzada' y la nota b también dice 'O la pierna de la ofrenda alzada'. Esto invalida la función de nota de alternativa léxica. Debe distinguirse, por ejemplo, con 'contribución' en el texto principal o en la nota.
  - severity: low
    issue: Construcción pasiva final poco natural en español
    rationale: '''Han sido dados como su porción...'' es entendible, pero ''les han sido dados como tu porción...'' o ''se les han dado como tu porción...'' fluye mejor y aclara el dativo implícito.'
