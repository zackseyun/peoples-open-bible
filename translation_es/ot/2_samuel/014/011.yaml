  to: 'Entonces ella dijo: «Por favor, que el rey se acuerde de Yahvé tu Dios, para que el vengador de sangre no destruya más, y no destruyan a mi hijo». Y él dijo: «Tan cierto como que Yahvé vive,[b] ni un solo cabello de tu hijo caerá al suelo».'
  rationale: 'Se revisa el texto para mejorar la naturalidad y fidelidad del español sin apartarse del hebreo ni del audit trail inglés: «se acuerde de» expresa mejor la súplica deferente; «Tan cierto como que Yahvé vive» reproduce la fórmula de juramento de manera idiomática; «caerá al suelo» suena más natural en español actual. Se mantiene «Yahvé» y «vengador de sangre» conforme al glosario del proyecto.'
