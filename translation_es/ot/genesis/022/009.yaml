translation:
  language: es
  text: Entonces llegaron al lugar que Dios le había dicho[a], y Abraham construyó allí el altar y dispuso la madera. Ató a Isaac, su hijo, y lo puso sobre el altar[c][b], encima de la madera.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «y llegaron al lugar que Dios le había dicho».'
    reason: lexical_alternative
  - marker: b
    text: 'O: «un altar». El hebreo dice «el altar», lo que puede presentar la estructura como el altar específico que se estaba preparando para este sacrificio.'
    reason: lexical_alternative
  - marker: c
    text: 'Hebreo: «por encima de la madera», es decir, sobre la madera ya dispuesta.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּבֹאוּ
  english_pob_choice: Then they came
  chosen_spanish: Entonces llegaron
  alternatives_spanish:
  - Y llegaron
  - Llegaron entonces
  lexicon: HALOT
  rationale: El hebreo avanza la narración con wayyiqtol; en español, «Entonces» conserva la secuencia narrativa natural. «Llegaron» mantiene el plural implícito de la forma verbal.
- source_word: הַמָּקוֹם
  english_pob_choice: the place
  chosen_spanish: el lugar
  alternatives_spanish:
  - el lugar
  - el sitio
  lexicon: HALOT
  rationale: «Lugar»/«sitio» expresan correctamente el sustantivo locativo; «lugar» es más neutro y fluido en español bíblico moderno.
- source_word: אֲשֶׁר אָמַר לוֹ הָאֱלֹהִים
  english_pob_choice: that God had told him
  chosen_spanish: que Dios le había dicho
  alternatives_spanish:
  - que Dios le había hablado
  - que Dios le había indicado
  lexicon: HALOT
  rationale: «Dijo» reproduce bien אָמַר con objeto indirecto en este contexto. El pluscuamperfecto «había dicho» expresa anterioridad respecto a la llegada, como en el POB inglés.
- source_word: הָאֱלֹהִים
  english_pob_choice: God
  chosen_spanish: Dios
  alternatives_spanish:
  - Dios
  lexicon: HALOT
  rationale: Aquí אֱלֹהִים se refiere al Dios verdadero; «Dios» es la traducción directa y adecuada sin necesidad de marcar pluralidad léxica en el texto.
- source_word: וַיִּבֶן שָׁם אַבְרָהָם אֶת הַמִּזְבֵּחַ
  english_pob_choice: and Abraham built the altar there
  chosen_spanish: y Abraham construyó allí el altar
  alternatives_spanish:
  - y Abraham edificó allí el altar
  - y Abraham levantó allí el altar
  lexicon: HALOT
  rationale: «Construyó» comunica naturalmente la acción de edificar en español. Se conserva el artículo definido de הַמִּזְבֵּחַ con «el altar», siguiendo la decisión del POB de reflejar la definitud marcada del hebreo.
- source_word: וַיַּעֲרֹךְ אֶת הָעֵצִים
  english_pob_choice: and arranged the wood
  chosen_spanish: y dispuso la madera
  alternatives_spanish:
  - y ordenó la madera
  - y arregló la madera
  lexicon: HALOT
  rationale: ערך en contexto sacrificial es «disponer/poner en orden». «Dispuso la madera» suena natural y conserva la preparación ritual sin perder el matiz de ordenamiento.
- source_word: וַיַּעֲקֹד
  english_pob_choice: He bound
  chosen_spanish: Ató
  alternatives_spanish:
  - Lo ató
  - Lo amarró
  lexicon: HALOT
  rationale: El verbo עקד remite específicamente al acto de atar para inmovilizar. «Ató» es la forma más directa y sobria en español; el contexto ya identifica a Isaac como objeto del acto.
- source_word: יִצְחָק בְּנוֹ
  english_pob_choice: Isaac his son
  chosen_spanish: a Isaac, su hijo
  alternatives_spanish:
  - a Isaac, su hijo
  - a su hijo Isaac
  lexicon: HALOT
  rationale: Se mantiene el orden hebreo con el nombre primero y se explicita el acusativo con «a». La coma ayuda a leer el aposición posesiva de forma clara en español.
- source_word: וַיָּשֶׂם אֹתוֹ עַל הַמִּזְבֵּחַ
  english_pob_choice: and placed him on the altar
  chosen_spanish: y lo puso sobre el altar
  alternatives_spanish:
  - y lo colocó sobre el altar
  - y lo puso en el altar
  lexicon: HALOT
  rationale: «Puso» es el equivalente natural de שׂים para una colocación física. «Sobre el altar» sigue de cerca el hebreo y conserva la relación espacial.
- source_word: מִמַּעַל לָעֵצִים
  english_pob_choice: on top of the wood
  chosen_spanish: encima de la madera
  alternatives_spanish:
  - sobre la madera
  - arriba de la madera
  lexicon: HALOT
  rationale: El hebreo expresa posición por encima de lo ya dispuesto. «Encima de la madera» refleja bien esa relación espacial y mantiene la referencia al material ya preparado.
theological_decisions:
- issue: Definitud del altar
  english_pob_reading: the altar
  chosen_spanish_reading: el altar
  alternative_spanish_readings:
  - un altar
  rationale: Como en el POB inglés, el artículo definido del hebreo se refleja en español. Esto sugiere el altar específico que Abraham está preparando para este sacrificio, sin añadir simbolismo externo.
  doctrine_reference: Translation philosophy §1, §5
- issue: El acto de atar a Isaac
  english_pob_reading: He bound Isaac his son
  chosen_spanish_reading: Ató a Isaac, su hijo
  alternative_spanish_readings:
  - Lo ató
  - Lo amarró
  rationale: Se conserva la fuerza lexical del verbo y la referencia tradicional a la «atadura» sin suavizarla. El español elegido mantiene la gravedad narrativa del episodio.
  doctrine_reference: Translation philosophy §1, §6
translation_notes:
  revision_awareness: El inglés POB más reciente indica que no hubo cambios en la última pasada de revisión y mantiene la decisión de reflejar el artículo definido de הַמִּזְבֵּחַ y la expresión espacial final «on top of the wood». La versión española sigue ese estado estable sin introducir reinterpretaciones.
  spanish_consistency_notes:
  - Se mantiene «Dios» para הָאֱלֹהִים según el estándar del proyecto.
  - Se usa «altar» con artículo definido para conservar la definitud del hebreo y la decisión del POB inglés.
  - Se traduce la secuencia narrativa con marcadores naturales en español, sin perder el carácter consecutivo del wayyiqtol.
  - Se evita «SEÑOR» porque el texto fuente aquí nombra a Dios como אֱלֹהִים, no como el nombre divino YHWH.
