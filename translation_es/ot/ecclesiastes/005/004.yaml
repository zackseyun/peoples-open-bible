translation:
  language: es
  text: Es mejor que no hagas un voto, que hagas un voto y no lo cumplas[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, más literalmente, «y no pagarlo». Aquí «pagar» se refiere a pagar o cumplir un voto.
    reason: lexical_alternative
lexical_decisions:
- source_word: טוֹב
  english_pob_choice: It is better
  chosen_spanish: Mejor es
  alternatives_spanish:
  - Es mejor
  - Más vale
  lexicon: HALOT
  rationale: El adjetivo טוב funciona aquí como evaluación comparativa proverbial. En español, «Mejor es» conserva el sentido comparativo con sintaxis natural y sobria.
- source_word: אֲשֶׁר
  english_pob_choice: that
  chosen_spanish: que
  alternatives_spanish:
  - cuando
  - el cual
  lexicon: HALOT
  rationale: Introduce la primera cláusula comparativa de modo natural en español. «Que» mantiene la estructura proverbial sin forzar una equivalencia mecánica.
- source_word: לֹא תִדֹּר
  english_pob_choice: you should not vow
  chosen_spanish: no hagas voto
  alternatives_spanish:
  - no prometas
  - no votes
  lexicon: HALOT
  rationale: נדר en este contexto es hacer un voto o promesa votiva. «Hagas voto» conserva el valor lexical de voto/voto solemne mejor que «prometas», y evita el tono eclesiástico excesivo de otras fórmulas.
- source_word: מִשֶׁתִּדּוֹר
  english_pob_choice: than that you should vow
  chosen_spanish: que hacer voto
  alternatives_spanish:
  - que hagas voto
  - que votos
  lexicon: HALOT
  rationale: El prefijo comparativo מִן con אֲשֶׁר expresa «que / que...». En español, la comparación queda más natural con el infinitivo «que hacer voto», manteniendo el paralelismo semántico con la primera cláusula.
- source_word: וְלֹא תְשַׁלֵּם
  english_pob_choice: and not fulfill it
  chosen_spanish: y no cumplirlo
  alternatives_spanish:
  - y no pagarlo
  - y no cumplir el voto
  lexicon: HALOT
  rationale: שלם en piel aquí significa cumplir o realizar lo prometido; «cumplirlo» reproduce el sentido idiomático que el inglés POB expresó con «fulfill it». El pronombre enclítico recupera el voto implícito del contexto.
translation_notes:
  revision_awareness: 'Texto alineado con el pasaje hebreo y con la decisión inglesa ya establecida: una formulación proverbial comparativa, manteniendo el sentido idiomático de נדר/שלם y la nota explicativa sobre «pagar» como cumplimiento de un voto.'
  spanish_consistency_notes:
  - Se prefirió «voto» y «cumplirlo» para conservar el campo semántico votivo del hebreo.
  - «Hagas voto» y «cumplirlo» mantienen el paralelismo comparativo y la referencia al objeto implícito del voto.
  - El marcador [a] se ancla en «voto» para la alternativa más literal «pagar».
