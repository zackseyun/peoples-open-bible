id: 2MA.6.19
reference: 2 Maccabees 6:19
source:
  edition: lxx-swete-1909
  text: ὁ δὲ τὸν μετʼ εὐκλείας θάνατον μᾶλλον ἢ τὸν μετὰ μύσους βίον ἀναδεξάμενος αὐθαιρέτως ἐπὶ τὸ τύμπανον προσῆγεν,
  language: Greek
  pages:
  - 701
  confidence: high
  validation: agree
translation:
  text: But he[a], choosing death with honor rather than life with defilement, went to the rack of his own accord,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Greek 'to the tympanum,' a torture device; traditionally rendered more literally as 'drum,' though the exact apparatus is uncertain.
    reason: lexical_alternative
lexical_decisions:
- source_word: μετʼ εὐκλείας
  chosen: with honor
  alternatives:
  - with good repute
  - with glory
  - with noble renown
  lexicon: LSJ
  rationale: εὐκλεία denotes good repute, honor, or glory. 'With honor' is concise, natural English and preserves the contrast with the shameful alternative life.
- source_word: θάνατον
  chosen: death
  lexicon: LSJ
  rationale: Direct and unambiguous rendering of the accusative object.
- source_word: μᾶλλον ἢ
  chosen: rather than
  alternatives:
  - more than
  lexicon: LSJ
  rationale: Standard comparative construction in English matching the Greek contrast.
- source_word: μετὰ μύσους βίον
  chosen: a life with defilement
  alternatives:
  - a life with pollution
  - a life with disgrace
  - a hateful life
  lexicon: LSJ
  rationale: μύσος commonly carries the sense of ritual or moral defilement/pollution, not merely subjective hatred. 'Defilement' best fits the martyrdom context, where Eleazar refuses conduct that would profane his fidelity to the law.
- source_word: ἀναδεξάμενος
  chosen: welcoming
  alternatives:
  - accepting
  - embracing
  - choosing
  lexicon: LSJ
  rationale: The participle conveys a deliberate taking to oneself or accepting. 'Welcoming' captures the voluntary, resolute acceptance of honorable death without sounding overly wooden.
- source_word: αὐθαιρέτως
  chosen: of his own accord
  alternatives:
  - voluntarily
  - willingly
  lexicon: LSJ
  rationale: This adverb emphasizes self-moved willingness. 'Of his own accord' preserves that nuance more fully than the simpler 'voluntarily.'
- source_word: ἐπὶ τὸ τύμπανον
  chosen: to the rack
  alternatives:
  - to the drum
  - to the torture wheel
  lexicon: LSJ
  rationale: In this context τύμπανον refers to an instrument of torture, not a musical drum. 'Rack' is an accessible functional rendering for the torture device, though the exact ancient apparatus may not match the later medieval rack precisely.
- source_word: προσῆγεν
  chosen: went
  alternatives:
  - advanced
  - was led
  - came forward
  lexicon: LSJ
  rationale: Given αὐθαιρέτως, the sense is that he moved himself forward. 'Went' avoids implying passive leading and reads naturally in English.
