  to: He proclamado justicia[a] en la gran asamblea; he aquí, no he refrenado mis labios[b]; Yahvé, tú sabes.
  rationale: Se ajusta la cláusula final a «Yahvé, tú sabes» para evitar añadir un objeto no expreso en el hebreo. También se añade la nota léxica faltante en «no he refrenado mis labios», en continuidad con el audit trail inglés. Se mantiene «justicia» en el texto por su fuerza moral y judicial en español, con «rectitud» como alternativa válida en nota.
