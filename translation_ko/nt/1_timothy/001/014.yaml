id: 1TI.1.14
reference: 1 Timothy 1:14
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: ὑπερεπλεόνασεν δὲ ἡ χάρις τοῦ κυρίου ἡμῶν μετὰ πίστεως καὶ ἀγάπης τῆς ἐν Χριστῷ Ἰησοῦ.
base_translation:
  language: en
  yaml_path: translation/nt/1_timothy/001/014.yaml
  text: But the grace of our Lord overflowed all the more[a], with faith and love that are in Messiah Jesus.
  footnotes:
  - marker: a
    text: Or, 'Christ Jesus.'
    reason: alternative_reading
translation:
  language: ko
  text: 그러나 우리 주의 은혜가 메시아[a] 예수 안에 있는 믿음과 사랑과 함께 넘치도록 풍성히 임하였습니다.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 또는 「그리스도」.
    reason: alternative_reading
lexical_decisions:
- source_word: ὑπερεπλεόνασεν
  english_pob_choice: overflowed all the more
  chosen_korean: 넘치도록 풍성히 임하였습니다
  alternatives_korean:
  - 더없이 넘쳤습니다
  - 넘치도록 부어졌습니다
  lexicon: BDAG
  rationale: ὑπερ- + πλεονάζω는 「넘침 이상의 넘침」의 강조 합성. 「넘치도록 풍성히」가 그 강조를 담는다.
- source_word: ἡ χάρις τοῦ κυρίου ἡμῶν
  english_pob_choice: the grace of our Lord
  chosen_korean: 우리 주의 은혜
  alternatives_korean:
  - 우리 주님의 은혜
  lexicon: BDAG
  rationale: 표준 표현.
- source_word: μετὰ πίστεως καὶ ἀγάπης
  english_pob_choice: with faith and love
  chosen_korean: 믿음과 사랑과 함께
  alternatives_korean:
  - 믿음과 사랑을 동반하여
  lexicon: BDAG
  rationale: μετά + 속격의 동반 의미를 「~과 함께」로 자연스럽게 옮긴다.
- source_word: τῆς ἐν Χριστῷ Ἰησοῦ
  english_pob_choice: that are in Messiah Jesus
  chosen_korean: 메시아 예수 안에 있는
  alternatives_korean:
  - 메시아 예수 안에서 비롯된
  lexicon: BDAG
  rationale: ἐν의 처소적 어감을 「안에 있는」으로 보존하여 바울의 「그리스도 안에」 정형 표현을 살린다.
