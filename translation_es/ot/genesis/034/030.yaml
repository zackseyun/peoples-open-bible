translation:
  language: es
  text: 'Entonces Jacob dijo a Simeón y a Leví: «Ustedes me han traído problemas, haciendo que yo apeste[a] entre los habitantes de la tierra, entre los cananeos y los ferezeos. Como somos pocos en número, ellos se juntarán contra mí, me atacarán, y seré destruido: yo y mi familia».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «haciéndome odioso» o «haciéndome ofensivo» entre los habitantes de la tierra. El hebreo dice literalmente «haciendo que yo apeste».'
    reason: lexical_alternative
lexical_decisions:
- source_word: עֲכַרְתֶּם
  english_pob_choice: have brought trouble on
  chosen_spanish: han causado problemas en mí
  alternatives_spanish:
  - me han perturbado
  - me han acarreado problemas
  lexicon: HALOT
  rationale: עכר en este contexto expresa causar turbación, calamidad o problema. «Han causado problemas en mí» reproduce la acusación de Jacob de forma natural en español sin suavizar el valor negativo del verbo.
- source_word: לְהַבְאִישֵׁנִי
  english_pob_choice: making me stink
  chosen_spanish: haciéndome hediondo
  alternatives_spanish:
  - haciéndome apestar
  - haciéndome odioso
  - haciéndome ofensivo
  lexicon: HALOT
  rationale: El hifil de באש es literalmente «hacer oler mal». Se conserva la imagen fuerte en español con «hediondo», mientras que las alternativas más idiomáticas se reservan para la nota textual.
- source_word: בְּיֹשֵׁב הָאָרֶץ
  english_pob_choice: among the inhabitants of the land
  chosen_spanish: entre los habitantes de la tierra
  alternatives_spanish:
  - entre los moradores de la tierra
  - entre quienes habitan la tierra
  lexicon: HALOT
  rationale: El participio colectivo se entiende mejor en español como el conjunto de la población establecida. «Habitantes de la tierra» mantiene el sentido social y geográfico del hebreo.
- source_word: בַּכְּנַעֲנִי וּבַפְּרִזִּי
  english_pob_choice: among the Canaanites and the Perizzites
  chosen_spanish: entre los cananeos y los ferezeos
  alternatives_spanish:
  - entre los cananeos y los perizitas
  lexicon: HALOT
  rationale: Se conserva el etnónimo bíblico tradicional en español para estos pueblos. La preposición sigue la esfera social indicada por el hebreo, no una mera localización espacial.
- source_word: מְתֵי מִסְפָּר
  english_pob_choice: few in number
  chosen_spanish: pocos en número
  alternatives_spanish:
  - de escaso número
  - pocos
  lexicon: HALOT
  rationale: La expresión idiomática hebrea comunica pequeñez numérica. «Pocos en número» es claro, fiel y suficientemente natural en español.
- source_word: וְנֶאֶסְפוּ עָלַי
  english_pob_choice: they will gather against me
  chosen_spanish: se juntarán contra mí
  alternatives_spanish:
  - se reunirán contra mí
  - se congregarán contra mí
  lexicon: HALOT
  rationale: El nifal de אסף tiene fuerza de reunión hostil. «Se juntarán contra mí» conserva la idea de coalición agresiva con un verbo comprensible en español moderno.
- source_word: וְהִכּוּנִי
  english_pob_choice: strike me down
  chosen_spanish: me golpearán
  alternatives_spanish:
  - me atacarán
  - me herirán
  - me derrotarán
  lexicon: HALOT
  rationale: נכה abarca golpear, herir o derrotar. En este contexto de amenaza violenta, «me golpearán» mantiene la literalidad básica; la nota puede abrir otras posibilidades si se desea mayor especificidad bélica.
- source_word: וְנִשְׁמַדְתִּי
  english_pob_choice: I will be destroyed
  chosen_spanish: seré destruido
  alternatives_spanish:
  - seré aniquilado
  - seré exterminado
  lexicon: HALOT
  rationale: שמד señala destrucción total. «Seré destruido» es directo y sobrio, sin añadir matices que el hebreo no exige en este versículo.
- source_word: בֵּיתִי
  english_pob_choice: my household
  chosen_spanish: mi casa
  alternatives_spanish:
  - mi familia
  - mi casa y mi casa de familia
  - mi hogar
  lexicon: HALOT
  rationale: En hebreo, «casa» puede referirse al grupo familiar o doméstico. Aquí se conserva «mi casa» porque el paralelo con Jacob como cabeza del clan permite esa lectura; en español, «mi casa» mantiene la amplitud semántica sin perder la imagen original.
theological_decisions:
- issue: Alcance de la amenaza sobre Jacob y su casa
  english_pob_reading: I will be destroyed—I and my household.
  chosen_spanish_reading: 'seré destruido: yo y mi casa'
  alternative_spanish_readings:
  - seré destruido, yo y mi casa
  - seremos destruidos, yo y mi casa
  rationale: El hebreo presenta a Jacob como sujeto singular de la destrucción, seguido por la inclusión de su casa. Se evita pluralizar el verbo para no borrar la forma original ni diluir la tensión narrativa.
  doctrine_reference: Gn 34:30
translation_notes:
  revision_awareness: 'Se siguió el audit trail inglés: se mantuvo el valor literal-vivido de לְהַבְאִישֵׁנִי con una nota para alternativas más idiomáticas; se conservó la fuerza colectiva de וְנֶאֶסְפוּ עָלַי como reunión hostil; y se respetó la estructura singular de destrucción con mención añadida de la casa. La elección «seré destruido: yo y mi casa» refleja la puntuación y el énfasis del hebreo sin introducir lecturas ajenas.'
  spanish_consistency_notes:
  - Se emplea «Yahvé» como terminología por defecto del proyecto, aunque este versículo no contiene el tetragrámaton.
  - Se tradujo «ferezeos» para el etnónimo bíblico, de acuerdo con uso español común y fidelidad al nombre de pueblo.
  - Se mantuvo «mi casa» en la línea principal por su valor de unidad doméstico-clánica en hebreo.
  - Los marcadores de nota [a] y [b] aparecen exactamente en el texto principal y están anclados a sus respectivos segmentos.
