    text: Or 'If I have not leveled and quieted my soul.' The Hebrew opening is an idiomatic emphatic expression, here rendered 'Surely.'
    reason: lexical_alternative
  - marker: b
    text: The image is of a child no longer restless for nursing, resting quietly with his mother.
    reason: cultural_note
  - marker: c
    text: Or 'like a weaned child on me is my soul.' The Hebrew expression is difficult; 'within me' gives the likely sense in natural English.
    reason: alternative_reading
