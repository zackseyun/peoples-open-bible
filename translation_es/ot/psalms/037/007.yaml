  text: דּ֤וֹם לַ/יהוָה֮ וְ/הִתְח֪וֹלֵ֫ל ל֥/וֹ אַל תִּ֭תְחַר בְּ/מַצְלִ֣יחַ דַּרְכּ֑/וֹ בְּ֝/אִ֗ישׁ עֹשֶׂ֥ה מְזִמּֽוֹת׀־׃
base_translation:
  language: en
  yaml_path: translation/ot/psalms/037/007.yaml
  text: Be still before Yahweh[a], and wait patiently for him; do not burn with anger because of one who prospers in his way[c][b], because of a man who carries out schemes.
  footnotes:
  - marker: a
    text: Or 'Be silent before the LORD.' The Hebrew verb can emphasize silence as well as stillness.
    reason: lexical_alternative
  - marker: b
    text: Or 'wait longingly for him' or, more traditionally, 'rest in him.' The Hebrew verb likely expresses patient, even anguished, waiting before God.
    reason: lexical_alternative
  - marker: c
    text: Traditionally, 'do not fret.' The Hebrew more literally speaks of becoming heated or burning with anger.
    reason: lexical_alternative
