translation:
  language: es
  text: 'En este asunto, haya para nosotros un juramento[a] a Yahvé: despedir a todas nuestras esposas de entre pueblos extranjeros, junto con sus hijos, como ha sido decidido por ti, y por todos los que obedecen la ley de Yahvé.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'El griego transmite de forma comprimida: «como ha sido juzgado/decidido por ti, y cuantos obedecerán/obedecen la ley del Señor». Se explicita el sentido en español para que la cláusula final quede coherente.'
    reason: textual_variant
lexical_decisions:
- source_word: ἐν τούτῳ
  english_pob_choice: In this matter
  chosen_spanish: En este asunto
  alternatives_spanish:
  - En esto
  - En esta cuestión
  lexicon: LSJ
  rationale: La expresión introduce el punto concreto que se está resolviendo; «en este asunto» conserva el valor discursivo sin sonar rígido en español.
- source_word: γενέσθω ἡμῖν
  english_pob_choice: let there be for us
  chosen_spanish: haya para nosotros
  alternatives_spanish:
  - se nos haga
  - tengamos
  lexicon: LSJ
  rationale: El griego usa γίνομαι con dativo; en español «haya para nosotros» mantiene la idea de que algo quede establecido para el grupo, sin forzar un giro literal poco natural.
- source_word: ὁρκωμοσία
  english_pob_choice: an oath
  chosen_spanish: un juramento
  alternatives_spanish:
  - un voto
  - un pacto jurado
  lexicon: LSJ
  rationale: El término denota un compromiso solemne bajo juramento. «Juramento» es la opción más directa y clara en español; «voto» podría sonar eclesiástico y menos exacto aquí.
- source_word: πρὸς τὸν κύριον
  english_pob_choice: to the Lord
  chosen_spanish: ante Yahvé
  alternatives_spanish:
  - a Yahvé
  - para Yahvé
  lexicon: LSJ
  rationale: Aunque la preposición puede expresar relación o dirección, en contexto de juramento el sentido es invocar a Dios. Se usa «Yahvé» según el criterio del proyecto para κύριος cuando se refiere al Dios de Israel; «ante» explicita el marco solemne del juramento sin sustituir el referente divino.
- source_word: ἐκβαλεῖν
  english_pob_choice: to send away
  chosen_spanish: despedir
  alternatives_spanish:
  - echar
  - expulsar
  - mandar fuera
  lexicon: LSJ
  rationale: El verbo puede tener fuerza de sacar/expulsar, pero en este contexto matrimonial «despedir» comunica la ruptura y separación requerida sin cargar más violencia que la que el texto evidencia.
- source_word: πάσας τὰς γυναῖκας ἡμῶν
  english_pob_choice: all our wives
  chosen_spanish: a todas nuestras esposas
  alternatives_spanish:
  - a todas nuestras mujeres
  lexicon: LSJ
  rationale: Por el contexto de matrimonios mixtos, γυναῖκες aquí significa «esposas». «Esposas» evita ambigüedad moderna y respeta el ámbito marital.
- source_word: τὰς ἐκ τῶν ἀλλογενῶν
  english_pob_choice: from among the foreigners
  chosen_spanish: de entre los extranjeros
  alternatives_spanish:
  - de entre los de otras naciones
  - de entre los extranjeros de otro pueblo
  lexicon: LSJ
  rationale: «Extranjero» reproduce el valor básico de ἀλλογενής como persona de otro linaje/pueblo. «De entre» conserva la construcción partitiva del griego.
- source_word: σὺν τοῖς τέκνοις αὐτῶν
  english_pob_choice: together with their children
  chosen_spanish: junto con sus hijos
  alternatives_spanish:
  - con sus hijos
  lexicon: LSJ
  rationale: «Junto con» refleja con claridad la inclusión explícita marcada por σύν, sin perder naturalidad en español.
- source_word: ὡς ἐκρίθη σοι
  english_pob_choice: as it has been decided by you
  chosen_spanish: como ha sido decidido por ti
  alternatives_spanish:
  - como tú has juzgado
  - como se te ha resuelto
  lexicon: LSJ
  rationale: Se conserva el pasivo del griego sin añadir interpretación innecesaria. «Decidido» mantiene el matiz judicial del verbo κρίνω, y el dativo σοι se expresa de forma directa con «por ti».
- source_word: καὶ ὅσοι πειθαρχήσουσιν
  english_pob_choice: and by all who obey
  chosen_spanish: y por todos los que obedecen
  alternatives_spanish:
  - y todos los que obedecerán
  - y por cuantos se sometan
  lexicon: LSJ
  rationale: El futuro griego puede funcionar con sentido general/volitivo; en español el presente «obedecen» reproduce mejor esa fuerza general y coincide con la revisión inglesa que evitó el futuro.
- source_word: τοῦ νόμου τοῦ κυρίου
  english_pob_choice: the law of the Lord
  chosen_spanish: la ley de Yahvé
  alternatives_spanish:
  - la ley del Señor
  - la ley del Señor Dios
  lexicon: LSJ
  rationale: Se sigue el criterio del proyecto de traducir κύριος como «Yahvé» cuando remite al Dios de Israel. «Ley» conserva el sentido normativo/jurídico del genitivo.
theological_decisions:
- issue: Renderización de κύριος en un juramento de alianza
  english_pob_reading: Lord
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Señor
  - el Señor
  rationale: Aquí κύριος no es un título genérico, sino el referente divino de Israel en un acto de juramento y obediencia a su ley. Por las normas del proyecto, se usa «Yahvé» en el texto principal para no enmascarar el nombre divino.
  doctrine_reference: 'DOCTRINE.md: יהוה / YHWH -> Yahvé; κύριος en contexto del Dios de Israel se vierte como Yahvé cuando el contexto lo justifica.'
- issue: Valor de la secuencia final con πειθαρχήσουσιν
  english_pob_reading: and by all who obey the law of the Lord
  chosen_spanish_reading: y por todos los que obedecen la ley de Yahvé
  alternative_spanish_readings:
  - y todos los que obedecerán la ley de Yahvé
  - y por los que se sometan a la ley de Yahvé
  rationale: El griego está comprimido; la idea no es una promesa cronológica, sino una apelación general a quienes se someten a la ley. El presente español expresa mejor esa generalidad y evita un futuro innecesariamente rígido.
  doctrine_reference: Principio de sentido general/volitivo en futuros griegos; coherencia con la revisión inglesa aplicada.
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión inglesa más reciente, que ajustó «will obey» a «obey» para reflejar mejor el futuro griego de valor general/volitivo. La versión española sigue esa decisión con el presente «obedecen», y además adapta κύριος al criterio español del proyecto («Yahvé»). Se mantuvo la compresión sintáctica del original, pero se hizo explícita la relación entre la cláusula de decisión y la obediencia a la ley.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» para κύριος, conforme al estándar del proyecto en textos que refieren al Dios de Israel.
  - Se eligió «juramento» en vez de «voto» o «pacto» para conservar el valor jurídico-solemne del sustantivo griego.
  - «Esposas» se usó por el contexto marital claro; «mujeres» sería demasiado amplio en español.
  - La nota textual en [a] responde a la compresión sintáctica del griego y evita ocultar la tensión interpretativa.
  - Se prefirió «obedecen» en vez de «obedecerán» por la fuerza general del futuro griego en este contexto y para una lectura natural en español.
