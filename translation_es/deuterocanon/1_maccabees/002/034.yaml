translation:
  language: es
  text: 'Y dijeron: «No saldremos, ni haremos la palabra del rey, para profanar[a] el día del sábado».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Profanar» conserva el sentido cultual de tratar como común lo que es santo; alternativas como «desecrar» también son posibles, pero «profanar» sigue de cerca el registro del POB inglés.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐξελευσόμεθα
  english_pob_choice: we will not come out
  chosen_spanish: No saldremos
  alternatives_spanish:
  - No saldremos afuera
  - No saldremos de allí
  - No saldremos a la luz
  lexicon: LSJ
  rationale: El futuro medio de ἐξέρχομαι pide una salida física; en español «salir» es natural y fiel, y no añade matices ajenos al contexto de quienes se esconden y son llamados a salir.
- source_word: ποιήσομεν τὸν λόγον τοῦ βασιλέως
  english_pob_choice: we will not do the king’s word
  chosen_spanish: ni haremos la palabra del rey
  alternatives_spanish:
  - ni obedeceremos la palabra del rey
  - ni cumpliremos la palabra del rey
  - ni haremos el mandato del rey
  lexicon: LSJ
  rationale: Conservo «hacer la palabra» porque el griego dice literalmente ποιήσομεν τὸν λόγον; en español suena menos natural que «obedecer», pero mantiene mejor la correspondencia léxica que el POB inglés decidió resguardar al revisar de «obey» a «do».
- source_word: βεβηλῶσαι
  english_pob_choice: to profane
  chosen_spanish: profanar
  alternatives_spanish:
  - desecrar
  - contaminar
  - manchar
  lexicon: LSJ
  rationale: «Profanar» mantiene el sentido cultual de tratar como común o no santo, que es el registro que el POB inglés conservó para el sábado.
- source_word: ἡμέραν τῶν σαββάτων
  english_pob_choice: the Sabbath day
  chosen_spanish: el día del sábado
  alternatives_spanish:
  - el día de reposo
  - el día del Sabbat
  - el sábado
  lexicon: LSJ
  rationale: Aunque el giro griego es plural idiomático, el referente es singular. «El día del sábado» preserva la forma de día sagrado sin perder inteligibilidad; evita además sustituirlo por una equivalencia eclesiástica menos transparente.
theological_decisions:
- issue: Tratamiento del día sagrado como objeto de profanación
  english_pob_reading: to profane the Sabbath day
  chosen_spanish_reading: profanar el día del sábado
  alternative_spanish_readings:
  - desecrar el día del sábado
  - deshonrar el día del sábado
  rationale: La negativa no es solo a obedecer una orden real, sino a colaborar en una acción que profana un tiempo santo. «Profanar» conserva esa carga religiosa y legal.
  doctrine_reference: Translation philosophy §§1, 6
translation_notes:
  revision_awareness: Se tomó en cuenta el ajuste reciente del POB inglés de «obey» a «do» en ποιήσομεν, por lo que la versión española evita «obedecer» y mantiene la correspondencia más literal «hacer la palabra del rey», sin perder naturalidad general.
  spanish_consistency_notes:
  - Se usa «Sabbat» solo dentro de la nota; en el texto principal se prefiere la forma plenamente transparente «sábado».
  - Se mantiene el tiempo verbal futuro en español para reflejar el futuro medio griego.
  - La puntuación abre comillas y cierra con coma interna conforme al uso editorial en español.
