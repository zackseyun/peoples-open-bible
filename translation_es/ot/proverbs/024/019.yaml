review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura y el sentido básico del hebreo: dos prohibiciones paralelas dirigidas al oyente singular, con el primer colon expresando perturbación emocional a causa de los malhechores y el segundo prohibiendo la envidia hacia los impíos. Sin embargo, «no te irrites» inclina el sentido demasiado hacia enojo/irritación, mientras que תִּתְחַר en hitpael aquí apunta más ampliamente a agitarse, alterarse o inquietarse interiormente. La nota alternativa también queda invertida frente al expediente inglés, que prefiere «be agitated» y conserva «fret» como alternativa.'
  spanish_quality_summary: El español es claro y legible, con buen registro proverbial. «Malhechores» y «los impíos» funcionan bien en un contexto bíblico sapiencial. La mejora principal es reemplazar «no te irrites» por una opción más fiel y natural al matiz interno del hebreo, como «no te inquietes».
  glossary_alignment: No hay conflictos con la terminología principal del proyecto. «Los impíos» es defendible para רְשָׁעִים en registro sapiencial. «Malhechores» para מְרֵעִים también es adecuado. El único ajuste léxico necesario es en תִּתְחַר.
  issues:
  - severity: medium
    issue: «No te irrites» estrecha demasiado el matiz de תִּתְחַר
    rationale: El hitpael de חרה aquí describe agitación o turbación interior, no solo irritación o enojo. «Irritarse» en español suele centrarse más en enfado, mientras que el expediente inglés justificó «be agitated» precisamente para evitar ese estrechamiento semántico.
  - severity: low
    issue: La nota lexical alternativa no sigue bien la jerarquía del expediente inglés
    rationale: Si el texto principal se corrige a «no te inquietes», la alternativa puede preservar una opción más tradicional como «no te irrites» o mejor «no te agites». En el borrador actual, la nota hace de «no te inquietes» una mera alternativa, aunque es la opción más fiel al razonamiento documentado.
  revised_spanish_text: No te inquietes[a] a causa de los malhechores; no envidies a los impíos.
  revised_footnotes:
  - marker: a
    text: 'O: «no te irrites».'
    reason: lexical_alternative
  revision_rationale: Se ajusta תִּתְחַר a «no te inquietes» para conservar mejor la idea de perturbación o agitación interior sin limitarla al enojo. Se mantienen «a causa de los malhechores» y «los impíos» por su fidelidad al hebreo y buen registro sapiencial. La nota se conserva como alternativa léxica secundaria.
