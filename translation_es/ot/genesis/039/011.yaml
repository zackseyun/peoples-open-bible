revisions:
- from: Y aconteció en tal día, que entró en la casa para hacer su trabajo[a], y no había allí ningún hombre de la casa, en la casa.
  to: Y aconteció que, en una ocasión así[a], él entró en la casa para hacer su trabajo, y no había allí ninguno de los hombres de la casa, en la casa.
  rationale: La revisión restaura el sentido explícito de «los hombres de la casa», mejora la naturalidad del español al tratar la expresión idiomática temporal, y mantiene el énfasis locativo del hebreo («allí ... en la casa») sin omitir contenido del original. También se elimina la puntuación torpe del borrador.
