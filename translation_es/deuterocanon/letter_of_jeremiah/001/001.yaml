  glossary_alignment: No hay conflicto con la terminología del proyecto. «Dios» corresponde a θεοῦ; no aparece YHWH ni otros términos sensibles del glosario. La decisión de usar «pecados», «contra Dios» y «cautivos» coincide con la línea léxica documentada.
