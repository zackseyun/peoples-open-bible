translation:
  language: es
  text: Ahora Pasjur, hijo de Imer, el sacerdote, que era oficial principal en la casa de Yahvé[a], oyó a Jeremías profetizando estas palabras.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «en el templo de Yahvé»; literalmente, «en la casa de Yahvé».
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּשְׁמַע
  english_pob_choice: heard
  chosen_spanish: oyó
  alternatives_spanish:
  - escuchó
  - se enteró
  lexicon: HALOT
  rationale: El verbo narrativo comunica percepción auditiva y avance de la acción. «Oyó» es natural en español y no añade la idea de atención deliberada que tendría «escuchó».
- source_word: פַּשְׁחוּר בֶּן אִמֵּר
  english_pob_choice: Pashhur son of Immer
  chosen_spanish: Pashjur, hijo de Imer
  alternatives_spanish:
  - Pashjur, hijo de Immer
  - Pasjur, hijo de Imer
  lexicon: Transliteración convencional del hebreo propio del proyecto
  rationale: Se conserva el nombre propio transliterado y el patronímico con «hijo de». «Pashjur» refleja una adaptación fonética española más natural sin perder identificabilidad.
- source_word: הַכֹּהֵן
  english_pob_choice: the priest
  chosen_spanish: el sacerdote
  alternatives_spanish:
  - el sacerdote
  - el cura
  lexicon: HALOT
  rationale: El artículo definido marca un cargo conocido. En español, «sacerdote» es el término reverente y claro para el oficio; «cura» no conviene por registro ni precisión.
- source_word: וְהוּא פָקִיד נָגִיד
  english_pob_choice: who was chief officer
  chosen_spanish: que era oficial principal
  alternatives_spanish:
  - que era jefe de oficiales
  - que era supervisor principal
  - que era oficial, un jefe
  lexicon: HALOT
  rationale: Los dos términos administrativos hebreos se combinan para expresar rango y función. «Oficial principal» conserva la fuerza de liderazgo sin forzar una duplicación extraña en español.
- source_word: בְּבֵית יְהוָה
  english_pob_choice: in the house of Yahweh
  chosen_spanish: en la casa de Yahvé
  alternatives_spanish:
  - en el templo de Yahvé
  - en la casa de Yahvé
  lexicon: HALOT
  rationale: Se mantiene la forma literal «casa de Yahvé», que preserva el vínculo con el hebreo בית sin sustituirlo por una equivalencia interpretativa como «templo».
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahveh
  - Jehová
  lexicon: 'DOCTRINE.md: Contested terms — יְהוָה YHWH'
  rationale: 'Se sigue el estándar del proyecto para el Tetragrámaton: «Yahvé», transliteración del nombre divino y no una sustitución por título.'
- source_word: נִבָּא
  english_pob_choice: prophesying
  chosen_spanish: profetizando
  alternatives_spanish:
  - mientras profetizaba
  - en acto de profetizar
  lexicon: HALOT
  rationale: El participio hebreo describe una acción en curso. «Profetizando» conserva el aspecto contemporáneo y el sentido verbal profético.
- source_word: אֶת הַדְּבָרִים הָאֵלֶּה
  english_pob_choice: these words
  chosen_spanish: estas palabras
  alternatives_spanish:
  - estas cosas
  - este mensaje
  lexicon: HALOT
  rationale: En este contexto, דברים se refiere al contenido verbal pronunciado por Jeremías. «Palabras» es la correspondencia más directa y precisa en español.
theological_decisions:
- issue: Rendering of the divine name יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahveh
  - Jehová
  rationale: El texto hebreo usa el nombre propio divino, no un título. El proyecto preserva ese nombre como «Yahvé» para mantener la transparencia fuente-objetivo.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH'
translation_notes:
  revision_awareness: La versión previa falló porque el marcador de nota [a] no estaba anclado en el texto. Aquí el marcador aparece junto a «el sacerdote» y la nota ofrece la alternativa léxica conservada por el audit trail inglés.
  spanish_consistency_notes:
  - Se mantuvo la distinción entre «casa de Yahvé» y la equivalencia interpretativa «templo de Yahvé» en nota.
  - Se usó «Yahvé» de forma consistente para יהוה.
  - «Profetizando» preserva el participio hebreo sin convertirlo en una acción puntual pasada.
