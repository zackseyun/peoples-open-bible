translation:
  language: es
  text: 'y gastarás el dinero[a] en todo lo que tu alma desee[b]: ganado, ovejas, vino, bebida fuerte[c], o cualquier cosa que tu alma te pida. Y comerás allí delante de Yahvé tu Dios, y te alegrarás, tú y tu hogar.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: ''la plata''; es decir, dinero.'
    reason: lexical_alternative
  - marker: b
    text: 'O: ''todo lo que tu alma desee ... cualquier cosa que tu alma te pida''. Aquí ''alma'' se refiere al deseo o apetito personal.'
    reason: lexical_alternative
  - marker: c
    text: '''Bebida fuerte'' se refiere a una bebida embriagante distinta del vino.'
    reason: cultural_note
lexical_decisions:
- source_word: וְנָתַתָּה
  english_pob_choice: spend
  chosen_spanish: gastarás
  alternatives_spanish:
  - emplearás
  - invertirás
  - darás
  lexicon: HALOT
  rationale: En este contexto comercial, con el dinero destinado a adquirir provisiones, el verbo expresa uso del dinero; 'gastarás' transmite bien la acción sin perder la relación con el objeto monetario.
- source_word: הַכֶּסֶף
  english_pob_choice: the silver
  chosen_spanish: el dinero
  alternatives_spanish:
  - la plata
  - la moneda
  lexicon: HALOT
  rationale: Aunque el hebreo dice literalmente 'la plata', en español 'el dinero' es más natural y clarifica el valor de medio de pago, manteniendo el sentido del original en un contexto de compra.
- source_word: נַפְשְׁךָ / נַפְשֶׁךָ
  english_pob_choice: your soul
  chosen_spanish: tu alma
  alternatives_spanish:
  - tu ser
  - tu vida
  - tu apetito
  lexicon: HALOT
  rationale: Se conserva el término antropológico 'alma' para reflejar נֶפֶשׁ, como hizo la revisión inglesa al preferir 'soul'. En este contexto de deseo y consumo, no se reduce a 'apetito' para no borrar la carga del hebreo.
- source_word: בַּבָּקָר
  english_pob_choice: cattle
  chosen_spanish: ganado
  alternatives_spanish:
  - reses
  - vacuno
  lexicon: HALOT
  rationale: '''Ganado'' funciona como equivalente colectivo y natural en español para בקר en esta lista de bienes alimentarios.'
- source_word: וּבַצֹּאן
  english_pob_choice: sheep
  chosen_spanish: ovejas
  alternatives_spanish:
  - rebaño
  - ganado menor
  - corderos
  lexicon: HALOT
  rationale: '''Ovejas'' es el equivalente común y claro en español para צאן en una enumeración de alimentos y animales domésticos.'
- source_word: וּבַיַּיִן
  english_pob_choice: wine
  chosen_spanish: vino
  alternatives_spanish:
  - vino tinto
  - vino fermentado
  lexicon: HALOT
  rationale: Es la traducción estándar de יין y mantiene la oposición con la siguiente bebida.
- source_word: וּבַשֵּׁכָר
  english_pob_choice: strong drink
  chosen_spanish: bebida fuerte
  alternatives_spanish:
  - licor
  - bebida embriagante
  - bebida alcohólica
  lexicon: HALOT
  rationale: Se conserva la distinción del hebreo entre vino y otra bebida alcohólica. 'Bebida fuerte' sigue la forma tradicional del español bíblico sin esconder su carácter intoxicante.
- source_word: וּבְכֹל אֲשֶׁר תִּשְׁאָלְךָ נַפְשֶׁךָ
  english_pob_choice: or whatever your soul asks for
  chosen_spanish: o en cualquier cosa que tu alma te pida
  alternatives_spanish:
  - o en lo que tu alma desee
  - o en cualquier cosa que desees
  lexicon: HALOT
  rationale: La construcción con שׁאל conserva el matiz de 'pedir' o 'solicitar'. En español, 'te pida' mantiene esa personificación del deseo sin volverlo meramente abstracto.
- source_word: וְאָכַלְתָּ שָּׁם
  english_pob_choice: And you shall eat there
  chosen_spanish: Y comerás allí
  alternatives_spanish:
  - Y allí comerás
  - Entonces comerás allí
  lexicon: HALOT
  rationale: Es una instrucción directa y simple; 'allí' preserva la referencia al lugar de culto señalado en el contexto.
- source_word: לִפְנֵי יְהוָה אֱלֹהֶיךָ
  english_pob_choice: before Yahweh your God
  chosen_spanish: delante de Yahvé tu Dios
  alternatives_spanish:
  - ante Yahvé tu Dios
  - en presencia de Yahvé tu Dios
  lexicon: HALOT
  rationale: Se conserva el nombre divino 'Yahvé' según la convención del proyecto. 'Delante de' refleja bien la fórmula cultual y relacional del hebreo.
- source_word: וְשָׂמַחְתָּ
  english_pob_choice: and rejoice
  chosen_spanish: y te alegrarás
  alternatives_spanish:
  - y te regocijarás
  - y gozarás
  lexicon: HALOT
  rationale: '''Te alegrarás'' suena natural en español y comunica la alegría cultual del texto. ''Regocijar'' sería más solemne, pero menos común.'
- source_word: אַתָּה וּבֵיתֶךָ
  english_pob_choice: you and your household
  chosen_spanish: tú y tu casa
  alternatives_spanish:
  - tú y tu familia
  - tú y tu hogar
  lexicon: HALOT
  rationale: '''Casa'' puede abarcar más que la familia nuclear y conserva bien el valor de בַּיִת como unidad doméstica.'
theological_decisions:
- issue: Representación del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: Se sigue la norma del proyecto de traducir YHWH como 'Yahvé', manteniendo visible el nombre del pacto en lugar de ocultarlo con un sustituto editorial.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Mantenimiento de la referencia a bebida alcohólica distinta del vino
  english_pob_reading: wine, strong drink
  chosen_spanish_reading: vino, bebida fuerte
  alternative_spanish_readings:
  - vino, licor
  - vino, bebida embriagante
  rationale: El hebreo distingue explícitamente entre vino y otra bebida intoxicante. La traducción no debe suavizar esa distinción ni convertirla en una alusión genérica.
  doctrine_reference: DOCTRINE.md Translation philosophy §1, §3
- issue: Renderización de נֶפֶשׁ en un contexto de deseo
  english_pob_reading: your soul desires / your soul asks for
  chosen_spanish_reading: tu alma desee / tu alma te pida
  alternative_spanish_readings:
  - tu apetito desee / tu apetito te pida
  - tu ser desee / tu ser te pida
  rationale: El texto hebreo usa נֶפֶשׁ de manera antropológica para expresar deseo personal. 'Alma' preserva esa tensión sin reducirla a un simple impulso físico.
  doctrine_reference: HALOT; DOCTRINE.md lexical transparency
translation_notes:
  revision_awareness: La revisión inglesa más reciente sustituyó 'appetite' por 'soul' para reflejar mejor נֶפֶשׁ, y mantuvo intacta la estructura de compra, la lista de bienes y la clausula final de alegría. La versión española sigue esa decisión al elegir 'alma' y conservar la distinción entre vino y bebida fuerte, así como el nombre divino Yahvé.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' para יְהוָה conforme al estándar del proyecto.
  - Se usa 'alma' para נֶפֶשׁ, en paralelo con la revisión inglesa final.
  - '''Bebida fuerte'' preserva la separación semántica entre יין y שֵׁכָר.'
  - '''Casa'' traduce בַּיִת en sentido doméstico amplio, no solo ''familia''.'
