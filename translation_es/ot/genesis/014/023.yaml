translation:
  language: es
  text: 'que no tomaría desde un hilo hasta una correa de sandalia,[a] ni nada de lo que es tuyo, no sea que digas: «Yo enriquecí a Abram».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'El hebreo emplea una fórmula elíptica de juramento: literalmente, «si de un hilo y hasta una correa de sandalia, y si tomo algo que sea tuyo...». El sentido es una negativa jurada.'
    reason: lexical_alternative
lexical_decisions:
- source_word: אִם ... וְאִם
  english_pob_choice: that I would not ... or
  chosen_spanish: que no tomaría ... ni ...
  alternatives_spanish:
  - si ... y si
  - si ... o
  lexicon: HALOT
  rationale: En este contexto de juramento, la fórmula hebrea es elíptica y expresa una negativa jurada, no una condición simple. En español, «que no tomaría» comunica el sentido de rechazo jurado sin volverlo demasiado literal ni oscuro.
- source_word: מִחוּט
  english_pob_choice: from a thread
  chosen_spanish: ni un hilo
  alternatives_spanish:
  - ni siquiera un hilo
  - desde un hilo
  lexicon: HALOT
  rationale: חוט es «hilo» o «hebra». «Ni un hilo» conserva la mínima unidad concreta del hebreo y suena natural en español.
- source_word: וְעַד שְׂרֹוךְ נַעַל
  english_pob_choice: to a sandal strap
  chosen_spanish: ni una correa de sandalia
  alternatives_spanish:
  - ni una tira de sandalia
  - ni un cordón de sandalia
  lexicon: HALOT
  rationale: La expresión marca el límite entre el objeto mínimo y una pieza de calzado. «Correa de sandalia» es claro en español y mantiene la imagen del hebreo mejor que opciones más modernas.
- source_word: אֶקַּח
  english_pob_choice: I would take
  chosen_spanish: tomaría
  alternatives_spanish:
  - tomase
  - tomara
  lexicon: HALOT
  rationale: 'Dentro del juramento, el valor modal en español se expresa mejor con condicional: «tomaría», que refleja la negación de una acción que Abram se compromete a no realizar.'
- source_word: מִכָּל אֲשֶׁר לָךְ
  english_pob_choice: anything that is yours
  chosen_spanish: ninguna cosa que fuera tuya
  alternatives_spanish:
  - nada de lo que es tuyo
  - cualquier cosa que fuera tuya
  lexicon: HALOT
  rationale: El hebreo tiene un alcance total («de todo lo que es tuyo»). «Ninguna cosa que fuera tuya» preserva esa amplitud en una forma natural para la negativa jurada.
- source_word: וְלֹא תֹאמַר
  english_pob_choice: lest you say
  chosen_spanish: para que no digas
  alternatives_spanish:
  - no sea que digas
  - lest you say
  lexicon: HALOT
  rationale: El hebreo expresa propósito negativo. «Para que no digas» es claro y digno en español; mantiene el sentido pragmático de evitar una futura declaración de vanagloria.
- source_word: הֶעֱשַׁרְתִּי
  english_pob_choice: I have made Abram rich
  chosen_spanish: Yo enriquecí a Abram
  alternatives_spanish:
  - Yo hice rico a Abram
  - Yo he enriquecido a Abram
  lexicon: HALOT
  rationale: El Hiphil de עשר significa «hacer rico / enriquecer». «Enriquecí» reproduce la idea de atribuirse el acto sin recargar el español.
- source_word: אַבְרָם
  english_pob_choice: Abram
  chosen_spanish: Abram
  alternatives_spanish:
  - Abrán
  lexicon: standard transliteration
  rationale: Se mantiene la transliteración tradicional del nombre propio en este periodo narrativo.
theological_decisions:
- issue: Juramento elíptico de negativa
  english_pob_reading: Render the verse as a sworn refusal tied to Abram's oath in the previous verse.
  chosen_spanish_reading: 'Presentarlo como una negativa jurada: Abram declara que no aceptará nada del botín.'
  alternative_spanish_readings:
  - 'Traducirlo de modo rígidamente condicional: «si de un hilo hasta una correa de sandalia...»'
  - 'Explicitar más la fórmula: «juro que no tomaré...»'
  rationale: El hebreo usa una fórmula de juramento elíptica. La versión española debe dejar claro que no se trata de una simple hipótesis, sino de una promesa solemne de no tomar nada, en continuidad con el juramento del versículo anterior.
  doctrine_reference: Translation philosophy §1, §6
- issue: 'Propósito negativo: evitar la jactancia ajena'
  english_pob_reading: lest you say, ‘I have made Abram rich.’
  chosen_spanish_reading: '«para que no digas: “Yo enriquecí a Abram”».'
  alternative_spanish_readings:
  - «no sea que digas»
  - «a fin de que no digas»
  rationale: La frase hebrea apunta a evitar que el rey de Sodoma reclame mérito por la riqueza de Abram. «Para que no digas» comunica bien esa finalidad negativa sin añadir interpretación innecesaria.
  doctrine_reference: Translation philosophy §2, §5
translation_notes:
  revision_awareness: La redacción sigue la revisión más reciente del audit trail inglés, que prefirió «lest you say» sobre una paráfrasis más amplia del propósito negativo. También conserva la decisión de entender la cadena condicional hebrea como fórmula de juramento elíptica, no como condición literal.
  spanish_consistency_notes:
  - Se usa «Abram» de manera uniforme para el nombre propio.
  - Se mantuvo «hilo» y «correa de sandalia» para conservar el rango mínimo del hebreo.
  - «Enriquecí» reproduce el valor verbal causativo de עשר sin introducir una expresión más interpretativa.
