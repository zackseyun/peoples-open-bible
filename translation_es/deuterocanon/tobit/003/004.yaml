  verdict: revise
  source_alignment_summary: 'El borrador refleja bien el griego: mantiene «desobedecieron» para παρήκουσαν, conserva la agencia divina explícita en «nos entregaste», y reproduce la serie de calamidades «saqueo, cautiverio, muerte». También preserva la imagen de vergüenza pública en παραβολὴν ὀνειδισμοῦ y la dispersión entre las naciones. Sin embargo, «a ser proverbio de oprobio» suena algo forzado en español; una formulación más natural puede mantener la misma cercanía semántica.'
  spanish_quality_summary: 'El español es claro y digno, pero hay una aspereza estilística en «a ser proverbio de oprobio». «Para ser un proverbio de oprobio» mejora la fluidez y refleja mejor el valor resultativo de la construcción. Además, la nota b debe armonizarse con esa decisión y con el inglés auditado: conviene preferir «dicho/proverbio» y «objeto de reproche» como alternativas más naturales, evitando «proverbio de vergüenza», que no corresponde tan bien al matiz de ὀνειδισμός.'
  glossary_alignment: No hay conflictos con la terminología base del proyecto. «Mandamientos», «nos entregaste», «cautiverio», «muerte» y «naciones» están bien alineados con las decisiones léxicas documentadas.
  issues:
  - severity: medium
    issue: La expresión «a ser proverbio de oprobio» es poco natural en español.
    rationale: Aunque es cercana al griego, la construcción infinitiva sin «para» suena rígida en español bíblico moderno. «Para ser un proverbio de oprobio» preserva el sentido y mejora la legibilidad.
  - severity: low
    issue: La nota lexical b puede afinarse.
    rationale: El inglés auditado preserva alternativas como «byword of disgrace» o «object of reproach». En español, «objeto de reproche» y «dicho de vergüenza»/«una expresión de vergüenza» comunican mejor la idiomaticidad que «proverbio de vergüenza». Además, conviene explicar que el griego combina «proverbio/byword» con «reproche».
  revised_spanish_text: Porque desobedecieron tus mandamientos[a], y nos entregaste al saqueo, al cautiverio, a la muerte y para ser un proverbio de oprobio[b] entre todas las naciones, entre las cuales hemos sido esparcidos.
  revised_footnotes:
  - marker: a
    text: O «mandatos».
    reason: lexical_alternative
  - marker: b
    text: O «objeto de reproche» o «dicho de vergüenza». El griego combina literalmente la idea de «proverbio/dicho» con la de «reproche».
    reason: lexical_alternative
  revision_rationale: Se hizo una reparación menor de estilo para que la construcción resultativa suene natural en español sin alejarse del griego ni del audit trail inglés. También se afinó la nota lexical sobre παραβολὴν ὀνειδισμοῦ para reflejar mejor las alternativas idiomáticas en español.
