base_translation:
  language: en
  yaml_path: translation/ot/nehemiah/009/022.yaml
  text: You gave them kingdoms and peoples[a], and allotted to them every corner. So they took possession of the land of Sihon, even the land of the king of Heshbon[b], and the land of Og king of Bashan.
  footnotes:
  - marker: a
    text: Or 'divided them by districts,' 'apportioned them portion by portion,' or 'to the edge.' The Hebrew phrase is difficult and may describe distribution by regions or to every extremity.
    reason: lexical_alternative
  - marker: b
    text: 'Hebrew ''the land of Sihon, and the land of the king of Heshbon.'' Since Sihon was the king of Heshbon, the phrase may function appositionally: ''the land of Sihon, that is, the land of the king of Heshbon.'''
    reason: alternative_reading
