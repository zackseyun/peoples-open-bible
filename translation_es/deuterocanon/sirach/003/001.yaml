translation:
  language: es
  text: Escuchen[a], hijos, la instrucción de un padre, y hagan para que vivan.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Griego: «Escúchenme, hijos, su padre ... para que se salven». El testigo hebreo lee de modo más general: «la instrucción de un padre ... para que vivan».'
    reason: alternative_reading
lexical_decisions:
- source_word: שִׁמְעוּ / ἀκούσατε
  english_pob_choice: Listen
  chosen_spanish: Escuchen
  alternatives_spanish:
  - Oigan
  - Escuchen atentamente
  - Obedezcan
  lexicon: HALOT; LXX ἀκούω
  rationale: El imperativo plural pide atención obediente. «Escuchen» conserva la escucha activa sin cerrar prematuramente el sentido a «obedezcan», aunque la obediencia queda implicada por la cláusula siguiente.
- source_word: בָנִים / τέκνα
  english_pob_choice: children
  chosen_spanish: hijos
  alternatives_spanish:
  - niños
  - hijos e hijas
  - descendientes
  lexicon: HALOT; LSJ
  rationale: «Hijos» refleja mejor el vocativo sapiencial y la forma familiar del hebreo/greiego que un genérico como «niños». En español mantiene la apelación filial natural y reverente.
- source_word: מִשְׁפַט אָב
  english_pob_choice: a father's instruction
  chosen_spanish: la instrucción de un padre
  alternatives_spanish:
  - la norma de un padre
  - el juicio de un padre
  - la disciplina de un padre
  lexicon: HALOT
  rationale: Aquí מִשְׁפַט no expresa «juicio» forense sino una directiva formativa. «Instrucción» comunica bien el valor sapiencial y evita una connotación judicial ajena al contexto.
- source_word: וַעֲשׂוּ
  english_pob_choice: do
  chosen_spanish: hagan así
  alternatives_spanish:
  - hagan
  - obren así
  - practíquenlo
  lexicon: HALOT
  rationale: El hebreo pide hacer/ejecutar lo escuchado. «Hagan así» suena natural en español y preserva la referencia anafórica a la instrucción previa sin añadir contenido no explicitado.
- source_word: לְמַעַן תִּחְיוּ
  english_pob_choice: so that you may live
  chosen_spanish: para que vivan
  alternatives_spanish:
  - a fin de que vivan
  - para que tengan vida
  - para que sean salvos
  lexicon: HALOT
  rationale: El hebreo dice literalmente «para que vivan». Se mantiene el sentido concreto de vida como resultado, sin importar la alternativa griega «sean salvos» al texto principal.
theological_decisions:
- issue: Divergencia entre el hebreo y el griego en la autodefinición del padre
  english_pob_reading: 'Greek: ''Listen to me, your father ...'' The Hebrew witness reads more generically, ''to a father''s instruction ...'''
  chosen_spanish_reading: Seguir el hebreo con «la instrucción de un padre»
  alternative_spanish_readings:
  - «Escúchenme, hijos, yo soy su padre»
  - «la instrucción de mi padre»
  rationale: En Sirácida, cuando el hebreo está disponible, se sigue como testigo principal. Por eso no se importa al cuerpo principal el yo explícito del griego, aunque se reconoce como variante significativa.
  doctrine_reference: 'PHILOSOPHY.md: primacía del hebreo donde se conserva; mantener la tensión textual sin resolverla artificialmente'
- issue: 'Resultado final: vida vs. salvación'
  english_pob_reading: '''so that you may live'' with Greek alternative ''so that you may be saved'''
  chosen_spanish_reading: «para que vivan»
  alternative_spanish_readings:
  - «para que sean salvos»
  - «para que se salven»
  rationale: La forma hebrea expresa vida concreta; la lectura griega de salvación es una alternativa interpretativa válida pero no debe desplazar el sentido del texto hebreo en el cuerpo principal.
  doctrine_reference: 'DOCTRINE.md: preservar tensiones relevantes; no homogeneizar la tradición textual'
translation_notes:
  revision_awareness: 'La redacción sigue la revisión más reciente del audit trail: se prefirió una forma más directa equivalente a וַעֲשׂוּ («y hagan») sin añadir paráfrasis; en español se optó por «hagan así» para conservar la referencia al contenido previamente oído y mantener fluidez natural.'
  spanish_consistency_notes:
  - Se mantiene «hijos» como vocativo sapiencial natural y no se expande a «hijos e hijas» porque el plural masculino ya funciona de modo representativo en español bíblico contemporáneo.
  - Se usa «vida/vivan» en coherencia con el hebreo, reservando «salvos» solo para la nota de variante griega.
  - El registro es formal y sobrio, sin arcaísmos innecesarios.
