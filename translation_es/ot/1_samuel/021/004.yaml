translation:
  language: es
  text: Ahora bien, ¿qué tienes a mano[a]? Dame cinco panes[b], o lo que haya disponible[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literalmente, «qué hay bajo tu mano», un modismo hebreo para lo que está inmediatamente disponible o en posesión de alguien.
    reason: lexical_alternative
  - marker: b
    text: Literalmente, «dame en mi mano»; el sentido natural en español es «dame».
    reason: lexical_alternative
  - marker: c
    text: O, «o lo que pueda encontrarse».
    reason: alternative_reading
lexical_decisions:
- source_word: וְעַתָּה
  english_pob_choice: Now then
  chosen_spanish: Ahora bien
  alternatives_spanish:
  - Y ahora
  - Ahora
  lexicon: HALOT
  rationale: La expresión introduce una petición inmediata y sigue el hilo del diálogo. «Ahora bien» conserva el valor discursivo y temporal sin sonar forzado en español.
- source_word: מַה יֵּשׁ תַּחַת יָדְךָ
  english_pob_choice: what do you have on hand
  chosen_spanish: ¿qué tienes a mano?
  alternatives_spanish:
  - ¿qué tienes bajo tu mano?
  - ¿qué tienes en tu posesión?
  lexicon: HALOT
  rationale: La idiomática hebrea pregunta por lo que está disponible o a disposición. «A mano» comunica bien esa disponibilidad inmediata en español y evita una calca pesada.
- source_word: חֲמִשָּׁה לֶחֶם
  english_pob_choice: five loaves of bread
  chosen_spanish: cinco panes
  alternatives_spanish:
  - cinco hogazas
  - cinco panes de pan
  lexicon: HALOT
  rationale: El hebreo usa «pan» de forma colectiva; en español, para un conteo natural, «cinco panes» transmite la cantidad y el alimento con claridad sin añadir más de lo requerido.
- source_word: תְּנָה בְיָדִי
  english_pob_choice: Give me
  chosen_spanish: Dame
  alternatives_spanish:
  - Te ruego, dame
  - Pon en mi mano
  lexicon: HALOT
  rationale: La petición hebrea literalmente apunta a «dar en la mano», pero en español la forma natural y fiel es «dame», que conserva la fuerza directa del imperativo.
- source_word: אוֹ הַנִּמְצָא
  english_pob_choice: or whatever is available
  chosen_spanish: o lo que se pueda encontrar
  alternatives_spanish:
  - o cualquier cosa disponible
  - o lo que haya
  lexicon: HALOT
  rationale: El participio pasivo de מצא expresa lo que puede hallarse o está disponible. «Se pueda encontrar» mantiene esa amplitud y la alternativa abierta del pedido.
translation_notes:
  revision_awareness: 'Se siguió de cerca el texto hebreo y el auditorio en inglés: la línea inicial conserva la transición discursiva de וְעַתָּה; la pregunta reproduce el modismo de disponibilidad de תַּחַת יָדְךָ; la petición de alimento mantiene la cifra exacta y el sustantivo concreto; y la cláusula final preserva la apertura semántica de הַנִּמְצָא, como en el POB inglés.'
  spanish_consistency_notes:
  - Se eligió «panes» en lugar de «loaves of bread» o «hogazas» para una lectura natural y fiel al hebreo.
  - Se evitó «SEÑOR» u otras fórmulas no pertinentes, porque no aparece el nombre divino en este versículo.
  - Se mantuvo un registro reverente pero directo, acorde con un pedido urgente en diálogo narrativo.
