translation:
  language: es
  text: Estas eran las divisiones de los guardianes de las puertas[a] para los coraítas y para los hijos de Merari.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, más literalmente: «Estas son las divisiones de los guardianes de las puertas para los coraítas y para los hijos de Merari».

      '
    reason: lexical_alternative
lexical_decisions:
- source_word: אֵלֶּה
  english_pob_choice: These were
  chosen_spanish: Estas eran
  alternatives_spanish:
  - Estas son
  lexicon: HALOT
  rationale: El hebreo usa un demostrativo plural en una fórmula de resumen de lista. En español, 'Estas eran' refleja bien el encuadre retrospectivo que eligió la POB en inglés, sin forzar una traducción excesivamente literal del verbo implícito.
- source_word: מַחְלְקוֹת
  english_pob_choice: divisions
  chosen_spanish: divisiones
  alternatives_spanish:
  - turnos
  - secciones
  - clases
  lexicon: HALOT
  rationale: '''Divisiones'' conserva la idea de repartición u organización asignada, especialmente adecuada para funciones del templo. ''Turnos'' añadiría una idea temporal que no está explícita en el hebreo.'
- source_word: הַשֹּׁעֲרִים
  english_pob_choice: the gatekeepers
  chosen_spanish: los porteros
  alternatives_spanish:
  - los guardianes de las puertas
  - los vigilantes de las puertas
  lexicon: HALOT
  rationale: '''Porteros'' es un equivalente español natural y tradicional para el oficio de guardar las puertas del templo. ''Guardianes de las puertas'' sería más explicativo, pero menos económico; ''vigilantes'' suena menos idiomático en este contexto.'
- source_word: לִבְנֵי
  english_pob_choice: for the sons of
  chosen_spanish: para los hijos de
  alternatives_spanish:
  - para los descendientes de
  - pertenecientes a los hijos de
  lexicon: HALOT
  rationale: Se mantiene la estructura hebrea de distribución clan por clan. 'Para los hijos de' reproduce la preposición de asignación y la fórmula genealógica sin añadir interpretación.
- source_word: הַקָּרְחִי
  english_pob_choice: the Korahites
  chosen_spanish: los coraitas
  alternatives_spanish:
  - los coreítas
  - la casa de Coré
  lexicon: HALOT
  rationale: En español, el gentilicio de clan se expresa de forma natural como 'coraitas'. Evita la forma más literal pero menos asentada 'coreítas' y conserva el valor colectivo del original.
- source_word: וְלִבְנֵי מְרָרִי
  english_pob_choice: and for the sons of Merari
  chosen_spanish: y para los hijos de Merari
  alternatives_spanish:
  - y para los meraritas
  lexicon: HALOT
  rationale: La frase hebrea dice explícitamente 'los hijos de Merari'; se preserva esa forma paralela con la cláusula anterior. 'Meraritas' sería más compacto, pero reduciría la simetría del hebreo.
theological_decisions:
- issue: Si traducir la lista como una afirmación presente o pasada
  english_pob_reading: These were
  chosen_spanish_reading: Estas eran
  alternative_spanish_readings:
  - Estas son
  rationale: Aunque el hebreo es nominal y admite presente, la POB en inglés optó por una formulación retrospectiva de resumen. En español, 'eran' mantiene ese valor de recapitulación sin alterar el contenido doctrinal ni histórico.
  doctrine_reference: N/A
translation_notes:
  revision_awareness: 'Se siguió el audit trail inglés sin cambios relevantes: la POB entiende אֵלֶּה como fórmula de resumen (''These were'') y מַחְלְקוֹת como ''divisions''. No hubo revisiones posteriores que alteraran la lectura básica.'
  spanish_consistency_notes:
  - Se mantuvo 'Yahvé' fuera del versículo porque no aparece en el hebreo de esta unidad.
  - Se prefirió 'coraitas' para el clan de Coré, evitando una transliteración menos natural en español.
  - '''Porteros'' preserva el oficio del templo con una palabra clara y estable en español bíblico.'
