translation:
  language: es
  text: 'Los hijos de Nadab: Seled y Apaim[a]. Seled murió sin hijos varones.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Seled murió y no tuvo hijos varones».'
