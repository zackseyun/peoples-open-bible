  language: en
  yaml_path: translation/deuterocanon/sirach/050/024.yaml
  text: May his faithful love be with Shimon[a], and may he establish for him the covenant of Phinehas[b], which shall not be cut off from him or from his offspring as long as the days of heaven endure.
  footnotes:
