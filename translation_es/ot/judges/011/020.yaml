review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien la secuencia básica del hebreo: falta de confianza de Sijón, reunión de todo su pueblo, campamento en Jahaza/Jahaz y combate contra Israel. Sin embargo, «no confió en Israel para dejarlo pasar» desplaza el infinitivo עֲבֹר desde el acto de Israel (''pasar por'') al permiso concedido por Sijón (''dejarlo pasar''), lo cual explicita una implicación válida pero no preserva tan de cerca la forma y foco del original ni del POB auditado. También falta el matiz alternativo de הֶאֱמִין en nota, que el inglés sí conservó.'
  spanish_quality_summary: 'El español es generalmente natural y legible, pero la oración necesita un sujeto explícito antes de «acamparon» para evitar una coordinación algo brusca. «Acamparon en Jahaz» es correcto; puede pulirse con «ellos acamparon» o reestructurando. Las notas actuales no están bien alineadas con el contenido auditado: la nota [a] no justifica una alternativa sino que comenta el hebreo; la [b] propone «encampó», que además cambia indebidamente el número; y falta una nota en el lugar de «territorio» para la alternativa de ''creer/no confiar''.'
  glossary_alignment: No hay términos teológicos mayores en juego. «Sijón», «Israel» y «territorio» son aceptables. «Peleó contra Israel» está bien y sigue la revisión inglesa contextual para וַיִּלָּחֶם עִם. «Todo su pueblo» preserva correctamente כָּל עַמּוֹ frente a una sobrerrestricción como «ejército».
  issues:
  - severity: medium
    issue: «para dejarlo pasar» sobretraduce el infinitivo עֲבֹר
    rationale: El hebreo dice literalmente que Sijón no confió en Israel 'para pasar por su territorio'. «Dejarlo pasar» introduce el resultado de permitir, mencionado en la explicación léxica inglesa como implicación, no como traducción principal.
  - severity: medium
    issue: Las notas no preservan fielmente las alternativas auditadas
    rationale: Debe conservarse la alternativa de הֶאֱמִין ('no creyó a Israel' / 'no confió lo suficiente para dejarlo pasar') y la de כָּל עַמּוֹ; la nota actual [b] sobre «encampó» no corresponde al inglés y además pasa de plural a singular.
  - severity: low
    issue: La coordinación con «acamparon» queda algo suelta
    rationale: Después de «reunió a todo su pueblo», pasar directamente a «acamparon» puede leerse con leve tropiezo; «y ellos acamparon» o una puntuación más clara mejora la fluidez sin alterar el sentido.
  revised_spanish_text: Pero Sijón no confió en Israel[a] para pasar por su territorio. Entonces Sijón reunió a todo su pueblo[b], y ellos acamparon en Jahaz, y peleó contra Israel[c].
  revised_footnotes:
  - marker: a
    text: O «no creyó a Israel» o, por implicación, «no confió en Israel lo suficiente como para dejarlo pasar».
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: «todo su pueblo»; el texto no dice explícitamente «ejército», aunque el contexto es militar.'
    reason: lexical_alternative
  - marker: c
    text: 'Hebreo literalmente: «peleó con Israel».'
    reason: lexical_alternative
  revision_rationale: 'Se ajusta «para pasar por su territorio» para reflejar más de cerca עֲבֹר בִּגְבֻלוֹ sin convertir la implicación en traducción principal. Se rehacen las notas para alinearlas con el rastro de auditoría inglés: alternativa léxica de הֶאֱמִין, preservación de «todo su pueblo» y literalidad de «peleó con». Se añade «ellos» para mejorar la naturalidad del cambio al verbo plural «acamparon».'
