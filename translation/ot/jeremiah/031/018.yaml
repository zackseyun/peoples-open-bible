id: JER.31.18
reference: Jeremiah 31:18
source:
  edition: WLC
  text: שָׁמ֣וֹעַ שָׁמַ֗עְתִּי אֶפְרַ֨יִם֙ מִתְנוֹדֵ֔ד יִסַּרְתַּ֨/נִי֙ וָֽ/אִוָּסֵ֔ר כְּ/עֵ֖גֶל לֹ֣א לֻמָּ֑ד הֲשִׁיבֵ֣/נִי וְ/אָשׁ֔וּבָה כִּ֥י אַתָּ֖ה יְהוָ֥ה אֱלֹהָֽ/י׃
translation:
  text: 'I have surely heard Ephraim grieving: ‘You disciplined me[a], and I was disciplined, like an untrained calf. Restore me, and I will return[b], for you are Yahweh my God.’'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'bemoaning himself' for 'grieving'; the Hebrew participle can suggest audible self-lament.
    reason: lexical_alternative
  - marker: b
    text: Or 'Turn me back, and I will turn back.' The Hebrew repeats the verb 'return/turn back' in both clauses.
    reason: lexical_alternative
lexical_decisions:
- source_word: שָׁמוֹעַ שָׁמַעְתִּי
  chosen: I have surely heard
  alternatives:
  - I have indeed heard
  - hearing I have heard
  lexicon: HALOT
  rationale: Infinitive absolute plus finite verb of שׁמע intensifies the assertion. English idiom is best conveyed with 'surely' rather than a wooden repetition.
- source_word: אֶפְרַיִם
  chosen: Ephraim
  alternatives:
  - —
  rationale: Proper name is transliterated per translation philosophy. In context it represents the northern people/tribe, but the text personifies Ephraim singularly, so the name is retained.
- source_word: מִתְנוֹדֵד
  chosen: grieving
  alternatives:
  - bemoaning himself
  - lamenting
  - wandering restlessly
  lexicon: HALOT
  rationale: The Hitpolel participle of נוד can denote lamenting, shaking, or moving to and fro. In this penitential context, 'grieving' captures the audible self-lament without awkward archaism. The more literal 'bemoaning himself' is preserved as an alternative.
- source_word: יִסַּרְתַּנִי
  chosen: You disciplined me
  alternatives:
  - You chastened me
  - You corrected me
  lexicon: HALOT
  rationale: יסר commonly denotes disciplinary correction, often with covenantal or parental overtones. 'Disciplined' is natural modern English and preserves the corrective sense better than the more archaic 'chastened'.
- source_word: וָאִוָּסֵר
  chosen: and I was disciplined
  alternatives:
  - and I accepted discipline
  - and I was chastened
  lexicon: HALOT
  rationale: The Niphal/Waw form of יסר is most straightforwardly passive/reflexive. 'I was disciplined' keeps the verbal echo with the previous clause. Some take it as more middle-like ('I let myself be corrected' / 'I accepted discipline'), but the passive is the plainer sense here.
- source_word: כְּעֵגֶל לֹא לֻמָּד
  chosen: like an untrained calf
  alternatives:
  - like a calf not taught
  - like an untamed calf
  lexicon: HALOT
  rationale: The phrase compares Ephraim to a calf not yet trained to the yoke. 'Untrained calf' is concise, idiomatic, and preserves the agricultural image better than a more abstract paraphrase.
- source_word: הֲשִׁיבֵנִי
  chosen: Restore me
  alternatives:
  - Turn me back
  - Bring me back
  lexicon: HALOT
  rationale: The Hiphil imperative of שוב means to cause to return/turn back. In this repentance-restoration context, 'Restore me' communicates both relational and covenantal return in natural English, while the more literal 'Turn me back' is preserved as an alternative.
- source_word: וְאָשׁוּבָה
  chosen: and I will return
  alternatives:
  - that I may return
  - and I will turn back
  lexicon: HALOT
  rationale: Qal cohortative/volitional form of שוב following the imperative expresses the result or resolve of return. 'I will return' is clear and fits the prayerful response. 'Turn back' is possible but less natural in English here.
- source_word: כִּי אַתָּה יְהוָה אֱלֹהָי
  chosen: for you are the LORD my God
  alternatives:
  - for you, LORD, are my God
  - because you are the LORD my God
  lexicon: HALOT
  rationale: כִּי gives the reason for the plea. יְהוָה is rendered 'the LORD' per doctrine. The clause is kept direct and confessional.
