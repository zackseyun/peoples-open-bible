translation:
  language: es
  text: Así, reconstruimos la muralla[a], y toda la muralla quedó unida hasta la mitad de su altura, porque el pueblo tenía ánimo para trabajar.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo literalmente: «el pueblo tenía un corazón para hacer». La expresión indica resolución interior y disposición para la obra.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַנִּבְנֶה
  english_pob_choice: So we rebuilt
  chosen_spanish: Así, reconstruimos
  alternatives_spanish:
  - Y construimos
  - Así construimos
  lexicon: HALOT
  rationale: El verbo en wayyiqtol marca avance narrativo; «Así» conserva la continuidad causal/narrativa del waw sin sonar mecánico. «Reconstruimos» es el equivalente natural en el contexto de reparación de una muralla ya existente.
- source_word: הַחוֹמָה
  english_pob_choice: the wall
  chosen_spanish: el muro
  alternatives_spanish:
  - la muralla
  - la pared
  lexicon: HALOT
  rationale: חוֹמָה designa una fortificación urbana; en español, «muro» y «muralla» son posibles. Elijo «muro» por sobriedad y amplitud, manteniendo el referente defensivo del texto sin cargarlo demasiado con un registro más literario.
- source_word: וַתִּקָּשֵׁר
  english_pob_choice: was joined together
  chosen_spanish: quedó unido
  alternatives_spanish:
  - fue unido
  - se enlazó
  lexicon: HALOT
  rationale: 'El nifal expresa resultado pasivo: las partes del muro llegaron a formar una unidad. «Quedó unido» transmite bien ese estado resultante en español natural.'
- source_word: כָּל הַחוֹמָה
  english_pob_choice: the whole wall
  chosen_spanish: todo el muro
  alternatives_spanish:
  - el muro entero
  - toda la muralla
  lexicon: HALOT
  rationale: כָּל con artículo expresa totalidad; «todo el muro» es claro y directo en español, conservando la amplitud del original.
- source_word: עַד חֶצְיָהּ
  english_pob_choice: up to half its height
  chosen_spanish: hasta la mitad de su altura
  alternatives_spanish:
  - hasta la mitad de él
  - hasta la mitad
  lexicon: HALOT
  rationale: El hebreo dice literalmente «hasta su mitad». En este contexto de construcción, la referencia implícita es a la elevación del muro; «de su altura» explicita ese sentido sin excederlo.
- source_word: וַיְהִי לֵב לָעָם
  english_pob_choice: for the people had a heart
  chosen_spanish: porque el pueblo tenía ánimo
  alternatives_spanish:
  - porque el pueblo tenía un corazón
  - porque el pueblo estaba resuelto
  lexicon: HALOT
  rationale: La expresión hebrea es idiomática y señala disposición interior. «Tenía ánimo» conserva la idea de voluntad y disposición para la tarea, evitando una formulación extraña en español. Mantiene el matiz de motivación interna sin borrar la metáfora por completo.
- source_word: לַעֲשׂוֹת
  english_pob_choice: to work
  chosen_spanish: para trabajar
  alternatives_spanish:
  - para hacer
  - para obrar
  lexicon: HALOT
  rationale: En el contexto de obra material, עשה se refiere al trabajo de construcción. «Trabajar» comunica de forma natural la labor concreta que impulsaba al pueblo.
translation_notes:
  revision_awareness: Se mantuvo el sentido narrativo y progresivo del hebreo sin depender mecánicamente del texto inglés. La revisión más reciente indica que no hubo cambios sustanciales, y el consenso de control cruzado fue de alta concordancia.
  spanish_consistency_notes:
  - Se prefirió «muro» en lugar de «muralla» para un español más sobrio y ampliamente inteligible, sin perder el sentido fortificado.
  - Se evitó traducir la expresión idiomática de forma literal en el cuerpo principal, pero se preservó su base hebrea en la nota.
  - El ritmo narrativo reproduce la secuencia del wayyiqtol con una cadencia natural en español.
  - La referencia de altura se explicitó como «su altura» por claridad contextual, ya que el hebreo deja implícito el referente.
