lexical_decisions:
- source_word: יַעֲמֹד
  english_pob_choice: stood still
  chosen_spanish: se quedó quieto
  alternatives_spanish:
  - se detuvo
  - estuvo de pie
  - quedó en pie
  lexicon: HALOT
  rationale: El hebreo עמד puede significar ‘estar de pie’, ‘quedarse’ o ‘permanecer’. En este contexto de visión, ‘se quedó quieto’ comunica la idea de que la figura permaneció inmóvil ante el hablante, sin forzar un matiz excesivamente físico de postura.
- source_word: וְלֹא אַכִּיר
  english_pob_choice: but I could not recognize
  chosen_spanish: pero no pude reconocer
  alternatives_spanish:
  - y no reconocí
  - pero no logré distinguir
  lexicon: HALOT
  rationale: נכר en הִפְעִיל expresa ‘reconocer’ o ‘identificar’. En español, ‘no pude reconocer’ mantiene la incapacidad real de identificación y conserva bien el contraste adversativo introducido por la conjunción.
- source_word: מַרְאֵהוּ
  english_pob_choice: its appearance
  chosen_spanish: su apariencia
  alternatives_spanish:
  - su aspecto
  - su apariencia
  - su forma visible
  lexicon: HALOT
  rationale: מַרְאֶה refiere a la apariencia o a lo visible. ‘Su apariencia’ es natural en español y preserva la ambigüedad del sufijo masculino singular sin imponer innecesariamente una personalización más precisa.
- source_word: תְּמוּנָה
  english_pob_choice: a form
  chosen_spanish: una forma
  alternatives_spanish:
  - una imagen
  - una figura
  - una semejanza
  lexicon: HALOT
  rationale: תְּמוּנָה puede ser ‘forma’, ‘imagen’ o ‘semejanza’. ‘Una forma’ resulta claro y sobrio en español, y encaja con la percepción vaga descrita en la visión.
- source_word: לְנֶגֶד עֵינַי
  english_pob_choice: was before my eyes
  chosen_spanish: estaba delante de mis ojos
  alternatives_spanish:
  - estaba ante mis ojos
  - estaba frente a mis ojos
  - estaba a la vista
  lexicon: HALOT
  rationale: La frase hebrea significa literalmente ‘delante / enfrente de mis ojos’. ‘Estaba delante de mis ojos’ conserva la vividez visual y evita un giro demasiado idiomático que diluya la imagen.
- source_word: דְּמָמָה
  english_pob_choice: there was silence
  chosen_spanish: había silencio
  alternatives_spanish:
  - había quietud
  - había un silencio
  - había sosiego
  lexicon: HALOT
  rationale: דְּמָמָה puede expresar ‘silencio’ o ‘quietud’. ‘Había silencio’ reproduce con naturalidad el sustantivo abstracto y mantiene el efecto de pausa solemne antes de la voz.
- source_word: וָקוֹל אֶשְׁמָע
  english_pob_choice: and I heard a voice
  chosen_spanish: y oí una voz
  alternatives_spanish:
  - y escuché una voz
  - y oí un sonido
  - y entonces oí una voz
  lexicon: HALOT
  rationale: קוֹל puede significar ‘voz’ o ‘sonido’. Dado que el contexto inmediato introduce discurso, ‘voz’ es la opción más fiel. ‘Oí’ sigue el valor simple del verbo שׁמע sin añadir matices interpretativos.
translation_notes:
  revision_awareness: El cotejo final reporta alta concordancia con el texto fuente y con la auditoría inglesa; no se identificaron revisiones pendientes que alteren la redacción base.
  spanish_consistency_notes:
  - Se mantiene ‘Yahvé’ como término estándar cuando el texto lo exija, pero este versículo no contiene el tetragrámaton.
  - Se preserva la ambigüedad del referente en ‘su apariencia’, conforme a la nota de la POB en inglés.
  - Se usa ‘silencio’ en el cuerpo y se deja ‘quietud’ como alternativa en nota para reflejar el rango semántico de דְּמָמָה.
  - El verso queda en forma de cláusula continua con dos puntos finales, siguiendo el movimiento del hebreo hacia la voz que se oye.
