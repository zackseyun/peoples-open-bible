translation:
  language: es
  text: Ustedes fueron vendidos[a] a las naciones, no para destrucción; sino porque provocaron a Dios a ira, fueron entregados a sus adversarios.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: “fueron vendidos”.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐπράθητε
  english_pob_choice: you were sold
  chosen_spanish: ustedes fueron vendidos
  alternatives_spanish:
  - ustedes fueron vendidos fuera
  - ustedes fueron puestos en venta
  lexicon: BDAG
  rationale: El aoristo pasivo de πιπράσκω expresa la idea de ser vendidos. "Fueron vendidos" conserva la metáfora de quedar bajo dominio ajeno sin añadir una explicación que el griego no da.
- source_word: τοῖς ἔθνεσιν
  english_pob_choice: to the nations
  chosen_spanish: a las naciones
  alternatives_spanish:
  - a los gentiles
  - a los pueblos
  lexicon: BDAG
  rationale: En este contexto de exilio y juicio, ἔθνη se refiere a naciones extranjeras. "Naciones" es transparente en español y evita cargar el texto con el sentido técnico posterior de "gentiles".
- source_word: οὐκ εἰς ἀπώλειαν
  english_pob_choice: not for destruction
  chosen_spanish: no para destrucción
  alternatives_spanish:
  - no para ruina
  - no para aniquilación
  lexicon: BDAG
  rationale: La construcción expresa finalidad o resultado negado. "No para destrucción" suena natural en español y mantiene la afirmación de que la venta/exilio no tenía como fin la aniquilación final.
- source_word: παροργίσαι
  english_pob_choice: provoked ... to anger
  chosen_spanish: provocaron a Dios a ira
  alternatives_spanish:
  - irritaron a Dios
  - hicieron enojar a Dios
  lexicon: BDAG
  rationale: El verbo intensifica la idea de provocar a ira. "Provocaron a Dios a ira" conserva la fuerza verbal y el objeto explícito, evitando suavizar el tono del juicio.
- source_word: παρεδόθητε
  english_pob_choice: you were handed over
  chosen_spanish: fueron entregados
  alternatives_spanish:
  - fueron entregados en manos de
  - fueron puestos en manos de
  lexicon: BDAG
  rationale: El pasivo de παραδίδωμι tiene matiz de ser entregado/cedido a otro poder. "Fueron entregados" mantiene la pasividad judicial del acto.
- source_word: τοῖς ὑπεναντίοις
  english_pob_choice: to your adversaries
  chosen_spanish: a sus adversarios
  alternatives_spanish:
  - a los enemigos
  - a los que se oponían a ustedes
  lexicon: LSJ
  rationale: ὑπεναντίος significa el que está en oposición, un adversario. "Adversarios" reproduce mejor ese valor que el más general "enemigos".
theological_decisions:
- issue: Sentido del exilio como juicio pero no destrucción final
  english_pob_reading: Being sold to the nations was not for destruction, but as a consequence of provoking God to anger, leading to being handed over to adversaries.
  chosen_spanish_reading: Ser vendidos a las naciones no fue para destrucción final, sino consecuencia de haber provocado a Dios a ira y de quedar entregados a adversarios.
  alternative_spanish_readings:
  - Fue un castigo disciplinario, no una destrucción definitiva.
  - La frase puede leerse solo como una explicación histórica del exilio.
  rationale: El griego contrasta explícitamente "no para destrucción" con la causalidad de haber provocado a Dios. La traducción preserva esa tensión sin resolverla más allá de lo que el verso afirma.
  doctrine_reference: Preservar la tensión teológica del texto en lugar de expandirla.
translation_notes:
  revision_awareness: 'El texto español sigue de cerca el griego del LXX y el audit trail inglés: conserva la metáfora de venta, el valor causal de διά con infinitivo y la distinción entre destrucción y disciplina/jucio sin explicarla en exceso. No hay revisiones aplicadas en el registro fuente; por tanto, el borrador refleja el estado final aprobado.'
  spanish_consistency_notes:
  - Se usa "Dios" sin artículo, como en el inglés auditado, porque en español es la forma idiomática para el objeto definido de la provocación.
  - Se prefiere "naciones" y no "gentiles" para evitar una lectura anacrónica en este contexto exílico.
  - '"Adversarios" mantiene el matiz de oposición activa de ὑπεναντίοις.'
  - La puntuación con punto y coma conserva la oposición entre la primera y la segunda cláusula, como en el griego y en la traducción inglesa auditada.
