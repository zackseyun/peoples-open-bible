base_translation:
  language: en
  yaml_path: translation/ot/1_samuel/009/027.yaml
  text: As they were going down to the edge of the city[a], Samuel said to Saul, “Tell the young man to go on ahead of us.” And he went on ahead. “But you, stand here now[b], and I will let you hear the word of God.”
  footnotes:
