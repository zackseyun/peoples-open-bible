  rationale: Se ajustó ἐκκαυθήσεται de «será encendido» a «arderá» en ambas ocurrencias para lograr un español más natural y mantener la imagen de fuego sin rigidez calcada. También se eliminó el pronombre sujeto explícito «él» por innecesario en español. No se modificaron las decisiones léxicas de fondo ni las notas existentes.
