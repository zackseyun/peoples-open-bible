translation:
  language: es
  text: Y clamaron a Simón para que recibiera prendas de buena fe[a], y él se las dio, y los expulsó de allí[b], y limpió la ciudadela de sus contaminaciones.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Griego literalmente, «recibir manos derechas», un modismo para recibir seguridades o prendas de buena fe.
    reason: lexical_alternative
  - marker: b
    text: O «el Akra», la ciudadela fortificada en Jerusalén.
    reason: alternative_reading
lexical_decisions:
- source_word: ἐβόησαν πρὸς Σίμωνα
  english_pob_choice: they cried out to Simon
  chosen_spanish: clamaron a Simón
  alternatives_spanish:
  - gritaron a Simón
  - exclamaron a Simón
  - apelaron a Simón
  lexicon: LSJ
  rationale: ἐβόησαν expresa un clamor fuerte y urgente. En español, «clamar» conserva mejor la intensidad vocal y el matiz de súplica o requerimiento que «decir» o «pedir».
- source_word: δεξιὰς λαβεῖν
  english_pob_choice: to receive pledges of good faith
  chosen_spanish: para recibir manos derechas
  alternatives_spanish:
  - para recibir pledges de buena fe
  - para recibir garantías
  - para recibir un juramento
  lexicon: LSJ
  rationale: La expresión griega es literalmente «recibir manos derechas», un modismo para dar/recibir seguridades. Se mantiene la literalidad en el texto principal para no borrar la imagen idiomática; la nota explica el sentido de garantía o pacto.
- source_word: ἔδωκεν αὐτοῖς
  english_pob_choice: he gave them to them
  chosen_spanish: él se las dio
  alternatives_spanish:
  - les dio eso
  - se las concedió
  - les dio las manos derechas
  lexicon: LSJ
  rationale: El griego deja el objeto elíptico, retomado del modismo anterior. «Se las dio» reproduce esa elipsis en español de modo natural y muestra que Simón concedió lo pedido.
- source_word: ἐξέβαλεν αὐτοὺς ἐκεῖθεν
  english_pob_choice: he drove them out from there
  chosen_spanish: los expulsó de allí
  alternatives_spanish:
  - los echó de allí
  - los arrojó de allí
  - los sacó de allí
  lexicon: LSJ
  rationale: ἐξέβαλεν tiene fuerza de expulsión o echar fuera. «Expulsó» es claro, sobrio y conserva el tono de acción enérgica del contexto militar-político.
- source_word: τὴν ἄκραν
  english_pob_choice: the citadel
  chosen_spanish: la acrópolis
  alternatives_spanish:
  - la citadela
  - el Akra
  - la fortaleza
  lexicon: LSJ
  rationale: ἄκρα puede designar una ciudadela/fortaleza; en este contexto de 1 Macabeos se refiere a la fortificación de Jerusalén conocida como el Akra. «Acrópolis» comunica una fortificación elevada, pero se reconoce aquí como un término menos directo; la nota conserva la alternativa histórica «Akra».
- source_word: ἀπὸ τῶν μιασμάτων
  english_pob_choice: from its defilements
  chosen_spanish: de sus contaminaciones
  alternatives_spanish:
  - de sus impurezas
  - de sus defilezas
  - de sus inmundicias
  lexicon: LSJ
  rationale: μίασμα indica contaminación ritual o defilement. «Contaminaciones» mantiene el plural y el campo semántico de profanación; aunque «defilezas» o «impurezas» son posibles, «contaminaciones» suena más natural en español moderno sin perder el sentido cultual.
theological_decisions:
- issue: Cómo rendir el modismo de δεξιὰς λαβεῖν sin eliminar su fuerza de pacto/seguridad
  english_pob_reading: 'idiomatic: ''receive pledges of good faith'''
  chosen_spanish_reading: literal en el texto, con explicación idiomática en nota
  alternative_spanish_readings:
  - 'explicitar: ''recibir garantías de buena fe'''
  - 'parafrasear: ''recibir una promesa de seguridad'''
  rationale: La POB inglesa decidió preservar el valor idiomático sin perder la referencia concreta a «manos derechas». En español, mantener la literalidad en el cuerpo del texto evita ocultar la imagen original, mientras la nota aclara el sentido de garantía o pacto.
  doctrine_reference: DOCTRINE.md Translation philosophy §§1, 6
- issue: Cómo traducir τὴν ἄκραν considerando la tensión entre nombre propio histórico y sustantivo común
  english_pob_reading: 'common noun in main text: ''the citadel'''
  chosen_spanish_reading: 'sustantivo común en el texto principal: ''la acrópolis'''
  alternative_spanish_readings:
  - el Akra
  - la ciudadela
  - la fortaleza
  rationale: El griego admite un sustantivo común, pero el referente histórico es la fortificación de Jerusalén conocida como el Akra. Se eligió un término transparente para lectores modernos y se conserva la identificación histórica en nota.
  doctrine_reference: DOCTRINE.md Translation philosophy §§5, 6
translation_notes:
  revision_awareness: 'Coincide con la revisión más reciente: no se detectaron cambios necesarios respecto al paso de revisión anterior; se mantiene la solución idiomática para δεξιὰς λαβεῖν y la lectura común de ἄκρα con nota alternativa histórica.'
  spanish_consistency_notes:
  - Se mantiene «Simón» para Σίμων y «Yahvé» no aparece en este versículo.
  - Se conserva el registro sobrio y bíblico moderno, evitando calcos innecesarios salvo donde la imagen griega es significativa.
  - «Contaminaciones» y «expulsó» respetan el tono cultual y militar del contexto.
  - La nota de ἄκρα preserva la alternativa histórica «Akra» sin imponerla al texto principal.
