translation:
  language: es
  text: Cada uno tenía cuatro rostros[a], y cada uno tenía cuatro alas, y la semejanza de manos humanas estaba debajo de sus alas.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, «las manos de un hombre».
    reason: lexical_alternative
lexical_decisions:
- source_word: אַרְבָּעָה אַרְבָּעָה
  english_pob_choice: Each one had four
  chosen_spanish: Cada uno tenía cuatro
  alternatives_spanish:
  - Cuatro cada uno
  - Cada uno tenía cuatro, cuatro
  lexicon: HALOT
  rationale: La repetición distributiva expresa que la cantidad se asigna a cada ser viviente. En español, «Cada uno tenía cuatro» comunica de forma natural el sentido distributivo sin perder la fuerza del hebreo.
- source_word: פָנִים
  english_pob_choice: faces
  chosen_spanish: rostros
  alternatives_spanish:
  - caras
  - fisonomías
  lexicon: HALOT
  rationale: El plural indica varias caras o rostros pertenecientes a cada criatura. «Rostros» conserva mejor el tono visionario y solemne que «caras».
- source_word: לְאֶחָד
  english_pob_choice: each one
  chosen_spanish: cada uno
  alternatives_spanish:
  - para cada uno
  - a cada uno
  lexicon: HALOT
  rationale: La preposición con el numeral tiene función distributiva. «Cada uno» es la forma más natural en español para mantener esa distribución.
- source_word: וְאַרְבַּע כְּנָפַיִם לְאֶחָד
  english_pob_choice: and each one had four wings
  chosen_spanish: y cada uno tenía cuatro alas
  alternatives_spanish:
  - y cuatro alas para cada uno
  - y cada uno poseía cuatro alas
  lexicon: HALOT
  rationale: Se preserva el paralelismo con la primera cláusula y la imagen directa del hebreo. «Tenía» mantiene la relación posesiva sin forzar un giro más literario que el original no exige.
- source_word: וּדְמוּת
  english_pob_choice: and the likeness of
  chosen_spanish: y la semejanza de
  alternatives_spanish:
  - y la apariencia de
  - y algo semejante a
  lexicon: HALOT
  rationale: En las visiones de Ezequiel, דְמוּת señala semejanza, no identidad plena. «Semejanza de» preserva ese matiz analógico mejor que una traducción más interpretativa.
- source_word: יְדֵי אָדָם
  english_pob_choice: human hands
  chosen_spanish: manos humanas
  alternatives_spanish:
  - las manos de un hombre
  - manos de hombre
  lexicon: HALOT
  rationale: El sustantivo אָדָם aquí se refiere a humanidad, no necesariamente a un varón individual. «Humanas» sigue la decisión inglés-POB de evitar una lectura marcadamente masculina y mantiene el contraste antropomórfico.
- source_word: תַּחַת כַּנְפֵיהֶם
  english_pob_choice: under their wings
  chosen_spanish: debajo de sus alas
  alternatives_spanish:
  - bajo sus alas
  - por debajo de sus alas
  lexicon: HALOT
  rationale: La expresión espacial es directa. «Debajo de» suena natural en español y conserva la relación de ubicación exacta del hebreo.
theological_decisions:
- issue: Lectura de אָדָם como humano o varón
  english_pob_reading: human hands
  chosen_spanish_reading: manos humanas
  alternative_spanish_readings:
  - las manos de un hombre
  - manos de hombre
  rationale: El contexto describe la forma de las manos, no la identidad sexual del referente. Traducir «humanas» conserva la precisión antropológica y evita introducir una masculinidad no exigida por el hebreo.
  doctrine_reference: 'DOCTRINE.md: Contested terms table (אָדָם), Translation philosophy §4'
- issue: Valor de דְמוּת en lenguaje visionario
  english_pob_reading: the likeness of
  chosen_spanish_reading: la semejanza de
  alternative_spanish_readings:
  - la apariencia de
  - algo semejante a
  rationale: Ezequiel usa lenguaje de visión y analogía. «Semejanza» mantiene la tensión entre lo visto y lo descrito sin convertir la imagen en una identificación literal.
  doctrine_reference: 'DOCTRINE.md: Visionary language and metaphor in Ezekiel'
translation_notes:
  revision_awareness: El texto coincide con el pasaje hebreo WLC y con la traducción inglesa POB auditada, sin revisiones pendientes; se mantuvo el acuerdo alto del control cruzado.
  spanish_consistency_notes:
  - Se usa «cada uno» de modo distributivo para reflejar אַרְבָּעָה אַרְבָּעָה y לְאֶחָד.
  - Se eligió «rostros» en lugar de «caras» por registro profético y solemnidad.
  - Se mantiene «semejanza de» para respetar el matiz no-identificativo de דְמוּת.
  - El marcador [a] aparece en el punto exacto del sustantivo que admite la alternativa lexical sobre אָדָם.
