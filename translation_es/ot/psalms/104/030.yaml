revisions:
- from: Cuando envías tu Espíritu[a], son creados[b], y renuevas la faz de la tierra.
  to: Cuando envías tu Espíritu[a], son creados[b], y renuevas la faz del suelo.
  rationale: Se ajusta אֲדָמָה de «la tierra» a «el suelo» para preservar la distinción lexical documentada en el expediente fuente y evitar un sentido demasiado cósmico. También se corrige la nota b para que refleje más fielmente la formulación alternativa preservada en el POB inglés. No se requiere adjudicación adicional porque la evidencia fuente y la decisión inglesa son claras.
