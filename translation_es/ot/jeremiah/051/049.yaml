lexical_decisions:
- source_word: גַּם
  english_pob_choice: also
  chosen_spanish: también
  alternatives_spanish:
  - incluso
  - asimismo
  lexicon: HALOT
  rationale: Conserva la marca de correspondencia entre los dos miembros del versículo sin sobrecargar el español.
- source_word: בָּבֶל
  english_pob_choice: Babylon
  chosen_spanish: Babylonia
  alternatives_spanish:
  - Babilonia
  lexicon: HALOT
  rationale: Se usa la forma española asentada para el topónimo. En el segundo miembro se mantiene el mismo nombre propio para preservar la paralela relación con el hebreo.
- source_word: לִ/נְפֹּל
  english_pob_choice: must fall
  chosen_spanish: debe caer
  alternatives_spanish:
  - ha de caer
  - caer
  lexicon: HALOT
  rationale: El infinitivo con ל expresa caída destinada o decretada; «debe caer» transmite necesidad profética en español natural sin perder el matiz de juicio.
- source_word: חַֽלְלֵי
  english_pob_choice: the slain
  chosen_spanish: los muertos
  alternatives_spanish:
  - los caídos
  - los muertos en batalla
  lexicon: HALOT
  rationale: Aunque «los muertos» es menos técnico que «los caídos», en español fluye mejor en esta construcción compacta y puede abarcar el sentido de víctimas mortales de guerra y juicio.
- source_word: יִשְׂרָאֵל
  english_pob_choice: Israel
  chosen_spanish: Israel
  alternatives_spanish:
  - el Israel
  lexicon: HALOT
  rationale: Nombre nacional estándar; no requiere adaptación.
- source_word: לְ/בָבֶל
  english_pob_choice: for Babylon
  chosen_spanish: por Babilonia
  alternatives_spanish:
  - a causa de Babilonia
  - para Babilonia
  lexicon: HALOT
  rationale: «Por» refleja la relación causal/relacional breve del prefijo ל en el segundo miembro y reproduce con naturalidad el paralelismo hebreo.
- source_word: נָפְל֖וּ
  english_pob_choice: have fallen
  chosen_spanish: han caído
  alternatives_spanish:
  - cayeron
  lexicon: HALOT
  rationale: El perfecto verbal señala una realidad ya cumplida en la reflexión profética; el perfecto compuesto español lo expresa de forma directa.
- source_word: חַֽלְלֵ֥י כָל הָ/אָֽרֶץ
  english_pob_choice: the slain of all the earth
  chosen_spanish: los muertos de toda la tierra
  alternatives_spanish:
  - los caídos de toda la tierra
  - los muertos de todo el mundo
  lexicon: HALOT
  rationale: Se conserva la amplitud universal de אָרֶץ como «toda la tierra», siguiendo la decisión auditada del inglés POB. «Los muertos» evita una formulación demasiado literal que en español podría sonar dura o artificial.
theological_decisions:
- issue: Alcance de אָרֶץ
  english_pob_reading: all the earth
  chosen_spanish_reading: toda la tierra
  alternative_spanish_readings:
  - todo el país
  - toda la tierra habitada
  rationale: El contexto del oráculo contra Babilonia apunta a devastación de alcance amplio, no solo local. «Toda la tierra» conserva esa universalización sin precisar más de lo que el hebreo exige.
  doctrine_reference: Jeremías 51:49; juicio imperial y retribución proporcional
- issue: Sintaxis comprimida del primer miembro
  english_pob_reading: 'Babylon also must fall for the slain of Israel; alternative: Babylon also has fallen, you slain of Israel'
  chosen_spanish_reading: Babylonia también debe caer por los muertos de Israel
  alternative_spanish_readings:
  - Babylonia también ha caído, ustedes los muertos de Israel
  - Babylonia también caerá por los muertos de Israel
  rationale: Se sigue la lectura principal del POB porque el hebreo permite un valor resultativo/profético. La alternativa con «ha caído» se conserva implícitamente en la nota para no borrar la tensión sintáctica documentada.
  doctrine_reference: Jeremías 51:49; lectura profética y ambigüedad sintáctica
- issue: Relación de correspondencia entre los dos miembros
  english_pob_reading: just as the slain of all the earth have fallen for Babylon
  chosen_spanish_reading: así como por Babilonia han caído los muertos de toda la tierra
  alternative_spanish_readings:
  - así como han caído por Babilonia los muertos de toda la tierra
  - del mismo modo han caído por Babilonia los muertos de toda la tierra
  rationale: Se mantiene el paralelismo del hebreo y el reordenamiento más natural de la revisión inglesa, poniendo «por Babilonia» al inicio del segundo miembro para que la correspondencia suene clara en español.
  doctrine_reference: Jeremías 51:49; paralelismo retributivo
translation_notes:
  revision_awareness: La versión inglesa revisada reordenó el segundo miembro para hacerlo más natural en inglés, manteniendo la relación con Babilonia y con los muertos de Israel. El español sigue esa línea, pero conserva la ambigüedad reconocida en la nota para el primer miembro, sin resolverla de manera excesiva.
  spanish_consistency_notes:
  - Se mantiene «Babilonia» como topónimo uniforme en ambos miembros.
  - Se evita «SEÑOR» u otras sustituciones irrelevantes; no aparece vocabulario divino en este versículo.
  - «Los muertos» se usa dos veces para conservar la correspondencia verbal del hebreo entre Israel y toda la tierra.
  - La preposición «por» reproduce de forma compacta la relación establecida por ל en ambas cláusulas.
  - El registro es bíblico formal, pero con sintaxis española natural.
