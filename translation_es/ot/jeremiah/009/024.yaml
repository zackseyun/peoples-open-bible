base_translation:
  language: en
  yaml_path: translation/ot/jeremiah/009/024.yaml
  text: Look[a], days are coming, declares Yahweh[b], when I will punish all who are circumcised only in the flesh.
  footnotes:
  - marker: a
    text: Or, 'all the circumcised with the uncircumcised,' preserving the Hebrew paradox more formally.
    reason: alternative_reading
  - marker: b
    text: The phrase likely refers to those who bear physical circumcision outwardly but remain uncircumcised in a deeper covenantal sense; compare the following verses and Jer 4:4.
    reason: cross_reference
