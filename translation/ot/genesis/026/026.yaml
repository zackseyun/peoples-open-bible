id: GEN.26.26
reference: Genesis 26:26
source:
  edition: WLC
  text: וַ/אֲבִימֶ֕לֶךְ הָלַ֥ךְ אֵלָ֖י/ו מִ/גְּרָ֑ר וַ/אֲחֻזַּת֙ מֵֽרֵעֵ֔/הוּ וּ/פִיכֹ֖ל שַׂר צְבָאֽ/וֹ־׃
translation:
  text: Then Abimelech went to him from Gerar[a], with Ahuzzath his friend and Phicol the commander of his army.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'his friend' or 'his companion.' The Hebrew term can denote a personal associate as well as a court companion or adviser.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַ/אֲבִימֶלֶךְ
  chosen: Then Abimelech
  alternatives:
  - And Abimelech
  - Now Abimelech
  lexicon: HALOT
  rationale: Proper name transliterated by standard convention. The prefixed waw on a narrative sequence is represented idiomatically as 'Then' to carry the storyline forward in natural English.
- source_word: הָלַךְ
  chosen: went
  alternatives:
  - came
  - traveled
  lexicon: HALOT
  rationale: הלך commonly means 'go/walk.' In English, with אֵלָיו ('to him'), 'went to him' is the most straightforward rendering from the narrator's perspective. 'Came' would shift deictic perspective toward Isaac and is less literal.
- source_word: אֵלָי/ו
  chosen: to him
  alternatives:
  - to Isaac
  lexicon: HALOT
  rationale: The pronominal object refers to Isaac from context. The main text preserves the Hebrew pronoun rather than substituting the name; the referent is clear from the surrounding narrative.
- source_word: מִ/גְּרָר
  lemma: מִן
  chosen: from Gerar
  alternatives:
  - out from Gerar
  lexicon: HALOT
  rationale: Gerar is a place name and is transliterated. The preposition מִן is naturally rendered 'from.'
- source_word: וַ/אֲחֻזַּת
  chosen: with Ahuzzath
  alternatives:
  - and Ahuzzath
  lexicon: HALOT
  rationale: Although the form is introduced with waw, English idiom in a list accompanying the subject is smoother with 'with Ahuzzath ... and Phicol.' The sense is that Abimelech went accompanied by these men.
- source_word: מֵֽרֵעֵ/הוּ
  chosen: his adviser
  alternatives:
  - his friend
  - his companion
  - one of his companions
  lexicon: HALOT
  rationale: The noun derives from רע ('friend/companion/associate'). In this court setting, many English versions understand an official associate or counselor rather than a merely personal friend. 'His adviser' communicates the likely functional role in context while remaining plausible semantically. Because 'his friend' is also lexically possible, it is preserved in a footnote.
- source_word: וּ/פִיכֹל
  chosen: and Phicol
  lexicon: HALOT
  rationale: Proper name transliterated by standard convention.
- source_word: שַׂר צְבָא/וֹ
  chosen: the commander of his army
  alternatives:
  - the captain of his army
  - the chief of his host
  lexicon: HALOT
  rationale: שַׂר denotes a ruler, chief, or commander; צָבָא here refers to military forces. 'Commander of his army' is clear modern English and fits the military context better than the archaic 'host.'
