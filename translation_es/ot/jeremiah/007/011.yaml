translation:
  language: es
  text: ¿Se ha convertido esta casa, sobre la cual es invocado mi nombre, en una cueva de ladrones[a] ante sus propios ojos? Aun yo mismo, miren, lo he visto, declara Yahvé.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «cueva de hombres violentos» o «cueva de bandidos». La expresión hebrea puede enfatizar tanto a personas violentas y sin ley como a ladrones en sentido más específico.
    reason: lexical_alternative
lexical_decisions:
- source_word: הַמְעָרַת
  english_pob_choice: den
  chosen_spanish: cueva
  alternatives_spanish:
  - den
  - guarida
  - escondrijo
  lexicon: HALOT
  rationale: El sustantivo designa una gruta o refugio natural usado como escondite. En español, «cueva» conserva la imagen básica con naturalidad; «den» sería un calco menos idiomático. La nota mantiene la posibilidad de un matiz de guarida/refugio violento.
- source_word: פָּרִצִים
  english_pob_choice: robbers
  chosen_spanish: ladrones
  alternatives_spanish:
  - hombres violentos
  - bandidos
  - salteadores
  lexicon: HALOT
  rationale: El término puede abarcar gente violenta y sin ley, no solo robo literal. «Ladrones» sigue la collocación tradicional con «cueva de ladrones» y comunica bien la acusación, sin cerrar del todo el rango semántico.
- source_word: הָיָה
  english_pob_choice: become
  chosen_spanish: se ha convertido en
  alternatives_spanish:
  - ha sido
  - es
  lexicon: HALOT
  rationale: 'En este contexto profético, el sentido es ingresivo/resultativo: la casa ha llegado a funcionar así. «Se ha convertido en» reproduce mejor esa fuerza que un simple presente o perfecto estático.'
- source_word: הַבַּיִת הַזֶּה
  english_pob_choice: this house
  chosen_spanish: esta casa
  alternatives_spanish:
  - este templo
  - esta morada
  lexicon: HALOT
  rationale: La hebrea dice literalmente «esta casa». Se conserva esa formulación, que en el contexto del templo sigue siendo clara en español y evita introducir una interpretación no expresada directamente por el texto.
- source_word: נִקְרָא שְׁמִי עָלָיו
  english_pob_choice: which is called by my name
  chosen_spanish: que lleva mi nombre
  alternatives_spanish:
  - sobre la que se invoca mi nombre
  - que es llamada por mi nombre
  lexicon: HALOT
  rationale: La expresión hebrea es un modismo de pertenencia/consagración. En español, «lleva mi nombre» suena natural y conserva la idea de que la casa pertenece al nombre divino; la alternativa más literal se guarda como opción semántica.
- source_word: בְּעֵינֵיכֶם
  english_pob_choice: in your eyes
  chosen_spanish: a vuestros ojos
  alternatives_spanish:
  - en vuestros ojos
  - a vuestro parecer
  lexicon: HALOT
  rationale: La locución idiomática se mantiene con valor evaluativo. «A vuestros ojos» es comprensible, bíblico y no pierde la perspectiva acusatoria sobre la percepción humana del templo.
- source_word: גַּם אָנֹכִי
  english_pob_choice: Even I myself
  chosen_spanish: Yo mismo, sí
  alternatives_spanish:
  - Aun yo mismo
  - Yo también
  lexicon: HALOT
  rationale: La combinación es enfática y contrastiva. En español, «Yo mismo, sí» reproduce el énfasis y la sorpresa retórica de la réplica divina sin sonar forzado; se conserva la autoafirmación de que Dios también ha visto.
- source_word: הִנֵּה
  english_pob_choice: look
  chosen_spanish: sí
  alternatives_spanish:
  - mirad
  - he aquí
  lexicon: HALOT
  rationale: Aquí funciona como partícula de atención reforzando la afirmación divina. En español queda absorbida de modo natural por «sí» junto con el verbo principal; no es necesario forzar una interjección separada.
- source_word: רָאִיתִי
  english_pob_choice: I have seen it
  chosen_spanish: he visto esto
  alternatives_spanish:
  - lo he visto
  - he visto
  lexicon: HALOT
  rationale: 'El objeto está sobreentendido por contexto. «He visto esto» lo explicita sin exceder el sentido: Yahvé ha visto el estado/uso de la casa y lo denuncia.'
- source_word: נְאֻם יְהוָה
  english_pob_choice: declares Yahweh
  chosen_spanish: declara Yahvé
  alternatives_spanish:
  - dice Yahvé
  - oráculo de Yahvé
  lexicon: HALOT
  rationale: Se conserva la fórmula profética formal. «Declara Yahvé» mantiene el peso de la clausula de proclamación y el nombre divino según el estándar del proyecto.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  lexicon: HALOT
  rationale: 'Se sigue el criterio del proyecto para el Tetragrámaton: transliteración del nombre divino en vez de una sustitución por título.'
theological_decisions:
- issue: Función retórica de la pregunta sobre el templo
  english_pob_reading: Has this house ... become a den of robbers in your eyes?
  chosen_spanish_reading: ¿Se ha convertido esta casa ... en una cueva de ladrones a vuestros ojos?
  alternative_spanish_readings:
  - ¿Es esta casa ... una cueva de ladrones a vuestros ojos?
  rationale: 'La forma ingresiva subraya la acusación: el templo ha llegado a funcionar como refugio de violencia y profanación. «Se ha convertido» conserva esa carga sin añadir interpretación doctrinal ajena al versículo.'
  doctrine_reference: 'DOCTRINE.md Translation philosophy: optimal equivalence'
- issue: Nombre divino al final del versículo
  english_pob_reading: declares Yahweh
  chosen_spanish_reading: declara Yahvé
  alternative_spanish_readings:
  - dice Yahvé
  - oráculo de Yahvé
  rationale: El hebreo emplea el Tetragrámaton. Mantener «Yahvé» preserva el nombre personal del pacto y evita la sustitución litúrgica por un título, conforme al criterio del proyecto.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
translation_notes:
  revision_awareness: 'La redacción sigue de cerca la lectura final inglesa, pero ajusta la sintaxis para un español natural y mantiene las tensiones léxicas documentadas: el valor ingresivo de הָיָה, el modismo de pertenencia de נִקְרָא שְׁמִי עָלָיו, y el alcance semántico de פָּרִצִים. No se detectaron revisiones textuales posteriores que obliguen a cambiar la solución base.'
  spanish_consistency_notes:
  - Se usa «Yahvé» de manera consistente para יְהוָה.
  - Se conserva «casa» en lugar de «templo» para reflejar el hebreo literal, aunque el contexto identifica claramente el templo.
  - La nota a pie marca la ambigüedad de פָּרִצִים sin imponer una sola glosa.
  - La formulación «a vuestros ojos» mantiene el matiz evaluativo del hebreo.
  - La puntuación y el orden buscan resonar con el tono profético sin calco rígido.
