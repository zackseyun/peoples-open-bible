translation:
  language: es
  text: Tus mejillas son hermosas con ornamentos[a], tu cuello con collares de cuentas[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «con hileras»; el término hebreo probablemente se refiere a filas o arreglos de adornos. Algunos lo entienden más literalmente como un tipo específico de adorno.
    reason: lexical_alternative
  - marker: b
    text: O «con cuentas» o «con collares»; el hebreo se refiere a adornos ensartados.
    reason: lexical_alternative
lexical_decisions:
- source_word: נָאוּ / נָאוּוּ
  english_pob_choice: are lovely
  chosen_spanish: son hermosas
  alternatives_spanish:
  - son bellas
  - son agradables
  - son comedidas
  lexicon: HALOT
  rationale: El verbo expresa belleza o conveniencia; en español, "son hermosas" comunica con naturalidad el elogio poético sin arcaísmo, manteniendo la fuerza estética del hebreo.
- source_word: לְחָיַיִךְ
  english_pob_choice: your cheeks
  chosen_spanish: tus mejillas
  alternatives_spanish:
  - tus quijadas
  - tu rostro
  lexicon: HALOT
  rationale: En este contexto poético, el término apunta a la zona de las mejillas/mandíbula. "Mejillas" es la equivalencia más idiomática y visual en español.
- source_word: בַּתֹּרִים
  english_pob_choice: with ornaments
  chosen_spanish: con ornamentos
  alternatives_spanish:
  - con hileras
  - con arreglos
  - con palomas
  lexicon: HALOT
  rationale: La POB inglesa opta por el sentido ornamental probable por el paralelismo con el cuello adornado en el versículo. "Ornamentos" conserva ese valor sin forzar una literalidad opaca como "hileras".
- source_word: צַוָּארֵךְ
  english_pob_choice: your neck
  chosen_spanish: tu cuello
  alternatives_spanish:
  - tu garganta
  lexicon: HALOT
  rationale: Es un término anatómico directo; "cuello" es la equivalencia normal y clara en español.
- source_word: בַּחֲרוּזִים
  english_pob_choice: with strings of jewels
  chosen_spanish: con hileras de joyas
  alternatives_spanish:
  - con collares de cuentas
  - con cadenas de joyas
  - con cuentas ensartadas
  lexicon: HALOT
  rationale: חרוזים se refiere a adornos ensartados. "Hileras de joyas" preserva la imagen de piezas alineadas/ensartadas, de modo natural en español, y deja visible la idea de adorno stringado que la POB inglesa comunica.
translation_notes:
  revision_awareness: 'La revisión más reciente indica que no hubo cambios: el estado final coincide con el texto auditado de la POB inglesa, con acuerdo alto entre revisores.'
  spanish_consistency_notes:
  - Se mantiene el tono poético y elogioso del hebreo sin introducir explicaciones interpretativas dentro del texto principal.
  - Se preserva la ambigüedad controlada de los términos de adorno mediante notas, como en la auditoría inglesa.
  - Se usa español moderno y digno, evitando calcos innecesarios pero sin diluir la imaginería del original.
