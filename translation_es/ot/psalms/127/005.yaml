base_translation:
  language: en
  yaml_path: translation/ot/psalms/127/005.yaml
  text: Blessed is the man who fills his quiver with them[c][b][a]; they will not be put to shame when they speak with enemies in the gate.
  footnotes:
  - marker: a
    text: Or 'they will not be ashamed'; some understand the subject as the father alone and render, 'he will not be put to shame.' The Hebrew verbs are plural.
    reason: alternative_reading
  - marker: b
    text: Or 'when they contend with enemies' or 'when they plead their case with enemies.' The verb can carry a legal or adversarial nuance in this setting.
    reason: lexical_alternative
  - marker: c
    text: The 'gate' was the place of public judgment and civic business in an ancient city.
    reason: cultural_note
