translation:
  language: es
  text: Y en cada ciudad puso escudos y lanzas[a], y fortaleció las ciudades en gran manera; y Judá y Benjamín le pertenecían.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'El hebreo repite ''ciudad'' de manera distributiva: literalmente, ''en cada ciudad y ciudad'', para subrayar cada ciudad individualmente.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וּ/בְ/כָל עִיר וָ/עִיר
  english_pob_choice: in every city and city
  chosen_spanish: en cada ciudad
  alternatives_spanish:
  - en toda ciudad
  - en cada ciudad y ciudad
  lexicon: HALOT
  rationale: El hebreo usa repetición distributiva para enfatizar cada ciudad individualmente. En español, 'en cada ciudad' comunica ese sentido con naturalidad; repetir 'ciudad y ciudad' sería más transparente pero sonarían forzado. La nota conserva la observación distributiva del original.
- source_word: צִנּוֹת
  english_pob_choice: shields
  chosen_spanish: escudos
  alternatives_spanish:
  - escudos grandes
  - broqueles
  lexicon: HALOT
  rationale: El término designa escudos militares; 'escudos' es el equivalente claro y sobrio en español. 'Escudos grandes' podría sobredeterminar el tamaño, y 'broqueles' sería demasiado técnico o arcaizante.
- source_word: וּ/רְמָחִים
  english_pob_choice: spears
  chosen_spanish: lanzas
  alternatives_spanish:
  - lanzas militares
  - venablos
  lexicon: HALOT
  rationale: רְמָחִים corresponde al arma arrojadiza o de asta traducible naturalmente como 'lanzas'. 'Lanzas' es el equivalente moderno más transparente en español.
- source_word: וַֽ/יְחַזְּקֵ֖/ם
  english_pob_choice: he strengthened them
  chosen_spanish: los fortaleció
  alternatives_spanish:
  - los hizo fuertes
  - los fortificó
  lexicon: HALOT
  rationale: El verbo חזק con sufijo plural puede referirse a los recursos defensivos o a las ciudades implícitas. 'Los fortaleció' conserva la ambigüedad controlada del hebreo y sigue la lectura del POB inglés; 'los fortificó' sería posible, pero desplaza el matiz hacia obras defensivas más que hacia fortalecimiento general.
- source_word: לְ/הַרְבֵּ֣ה מְאֹ֑ד
  english_pob_choice: very greatly
  chosen_spanish: muchísimo
  alternatives_spanish:
  - en gran manera
  - en extremo
  lexicon: HALOT
  rationale: La construcción intensificadora pide un adverbio fuerte. 'Muchísimo' reproduce bien la intensidad y suena natural en español; 'en gran manera' es más formal, pero menos idiomático en lectura pública.
- source_word: וַ/יְהִי ל֖/וֹ יְהוּדָ֥ה וּ/בִנְיָמִֽן
  english_pob_choice: Judah and Benjamin belonged to him
  chosen_spanish: Judá y Benjamín le pertenecían
  alternatives_spanish:
  - Judá y Benjamín eran suyos
  - tenía a Judá y Benjamín
  lexicon: HALOT
  rationale: La expresión idiomática ויהי לו indica posesión o lealtad bajo control. 'Le pertenecían' expresa esa relación de sujeción/pertenencia con más naturalidad que una literalidad rígida; 'eran suyos' es posible, pero menos explícito sobre dominio o pertenencia política.
theological_decisions:
- issue: Relación de pertenencia/poder político de Judá y Benjamín
  english_pob_reading: Judah and Benjamin belonged to him
  chosen_spanish_reading: Judá y Benjamín le pertenecían
  alternative_spanish_readings:
  - Judá y Benjamín eran suyos
  - tenía a Judá y Benjamín
  rationale: El cierre del versículo no afirma simplemente una posesión abstracta, sino que resume la pertenencia de las tribus a Roboam dentro de su esfera de gobierno. 'Le pertenecían' conserva ese sentido de sujeción política sin añadir explicaciones no presentes en el texto.
  doctrine_reference: Historia redaccional / monarquía dividida en Crónicas
translation_notes:
  revision_awareness: La revisión inglesa más reciente decidió suavizar la repetición distributiva en la superficie, pero mantuvo la referencia a una acción que fortalece las ciudades y el cierre de pertenencia de Judá y Benjamín. La versión española conserva la idea distributiva con una formulación natural ('en cada ciudad') y mantiene la lectura de 'los fortaleció' alineada con el sujeto implícito del contexto.
  spanish_consistency_notes:
  - Se usa 'escudos' y 'lanzas' como términos militares directos y no se introduce tecnicismo innecesario.
  - Se mantiene 'Yahvé' solo cuando el hebreo lo exige explícitamente; en este versículo no aparece el nombre divino.
  - '''Le pertenecían'' evita tanto el posesivo demasiado coloquial (''eran suyos'') como una traducción interpretativa excesiva.'
