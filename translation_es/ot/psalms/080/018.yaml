translation:
  language: es
  text: Sea tu mano sobre el hombre de tu derecha[a], sobre el hijo del hombre[b] que has fortalecido para ti.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «el hombre a tu derecha». El modismo hebreo puede denotar a alguien especialmente favorecido, sostenido o colocado junto a la diestra de Dios.'
    reason: lexical_alternative
  - marker: b
    text: «Hijo del hombre» puede significar simplemente «ser humano», aunque en contexto bíblico también puede llevar resonancia real o mesiánica.
    reason: alternative_reading
lexical_decisions:
- source_word: תְּהִי
  english_pob_choice: Let ... be
  chosen_spanish: Sea
  alternatives_spanish:
  - Que sea
  - Permanezca
  lexicon: HALOT
  rationale: El jussivo pide un ruego; en español, "Sea" reproduce con naturalidad la súplica poética sin añadir contenido.
- source_word: יָדְךָ
  english_pob_choice: your hand
  chosen_spanish: tu mano
  alternatives_spanish:
  - tu poder
  - tu diestra
  lexicon: HALOT
  rationale: '"Mano" mantiene la metáfora concreta del hebreo. "Diestra" sería más interpretativa; aquí se conserva la imagen de apoyo/acción.'
- source_word: עַל
  english_pob_choice: upon
  chosen_spanish: sobre
  alternatives_spanish:
  - en
  - contra
  lexicon: HALOT
  rationale: '"Sobre" comunica bien la idea de colocación/apoyo en español y conserva el registro poético.'
- source_word: אִישׁ יְמִינֶךָ
  english_pob_choice: the man of your right hand
  chosen_spanish: el hombre de tu mano derecha
  alternatives_spanish:
  - el hombre a tu derecha
  - el hombre de tu diestra
  lexicon: HALOT
  rationale: Se conserva la estructura idiomática de forma transparente. "De tu mano derecha" mantiene la ambigüedad del hebreo entre favor, apoyo y posición especial.
- source_word: בֶּן אָדָם
  english_pob_choice: the son of man
  chosen_spanish: el hijo de hombre
  alternatives_spanish:
  - el hijo del hombre
  - el ser humano
  - el hijo de Adán
  lexicon: HALOT
  rationale: Se preserva la fórmula hebrea en su forma más directa para no resolver prematuramente su alcance poético/real. "Hijo de hombre" en español suena más fijo en tradición bíblica, pero puede opacar la literalidad hebrea; aquí se opta por una equivalencia transparente.
- source_word: אִמַּצְתָּ
  english_pob_choice: you have made strong
  chosen_spanish: has fortalecido
  alternatives_spanish:
  - has hecho fuerte
  - has afirmado
  - has robustecido
  lexicon: HALOT
  rationale: El piel expresa fortalecer/hacer firme. "Has fortalecido" es idiomático en español y conserva el perfecto del hebreo con sentido resultativo.
- source_word: לָּךְ
  english_pob_choice: for yourself
  chosen_spanish: para ti
  alternatives_spanish:
  - para ti mismo
  - como tuyo
  lexicon: HALOT
  rationale: '"Para ti" transmite la relación de propósito/pertenencia sin recargar la frase con reflexividad excesiva.'
theological_decisions:
- issue: Posible lectura mesiánica de "el hombre de tu mano derecha" / "el hijo de hombre"
  english_pob_reading: Kept as poetic-human language without explicit messianic capitalization or interpretive expansion
  chosen_spanish_reading: Se mantiene el lenguaje poético-humano sin capitalización mesiánica ni expansión interpretativa explícita
  alternative_spanish_readings:
  - El Mesías
  - el Cristo
  - el ser humano corporativo / Israel
  rationale: El hebreo admite varias resonancias, pero no obliga a resolverlas en la traducción. Se preserva la tensión interpretativa en lugar de imponer una identificación cristológica o corporativa en el texto principal.
  doctrine_reference: Translation philosophy §3; fidelidad a la ambigüedad poética del original
translation_notes:
  revision_awareness: La revisión más reciente no introdujo cambios; el pasaje quedó con alto acuerdo entre revisores y sin observaciones pendientes.
  spanish_consistency_notes:
  - Se usó "mano" y no "diestra" en el texto principal para no interpretar demasiado pronto el hebreo idiomático.
  - Se mantuvo "hijo de hombre" como calco controlado de la expresión fija, y no "ser humano", para conservar su posible resonancia literaria.
  - '"Has fortalecido" refleja el valor causativo/resultativo del piel sin añadir matices doctrinales.'
  - Se evitó "SEÑOR" porque el texto hebreo no contiene el tetragrámaton en este versículo.
