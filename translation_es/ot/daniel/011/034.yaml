translation:
  language: es
  text: Cuando tropiecen[a], recibirán poca ayuda, y muchos se unirán a ellos con palabras suaves.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «con halagos» / «por medio de halagos». El hebreo dice literalmente «cosas/palabras suaves», una imagen habitual para el habla engañosa o adulatoria.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וּבְהִכָּשְׁלָם
  english_pob_choice: When they stumble
  chosen_spanish: Y cuando tropiecen
  alternatives_spanish:
  - Y cuando caigan
  - En su tropiezo
  lexicon: HALOT
  rationale: El valor temporal de la construcción pide un español natural con 'cuando'. 'Tropiecen' conserva la imagen verbal del fracaso sin intensificarla innecesariamente a una caída total.
- source_word: יֵעָזְרוּ
  english_pob_choice: they will receive help
  chosen_spanish: recibirán una ayuda
  alternatives_spanish:
  - serán ayudados
  - recibirán ayuda
  lexicon: HALOT
  rationale: El pasivo hebreo se expresa de forma idiomática en español con 'recibirán'. 'Una ayuda' mantiene la noción de asistencia limitada y evita volverlo demasiado abstracto.
- source_word: עֵזֶר מְעָט
  english_pob_choice: a little help
  chosen_spanish: una ayuda poca
  alternatives_spanish:
  - poca ayuda
  - una pequeña ayuda
  - algo de ayuda
  lexicon: HALOT
  rationale: La combinación expresa ayuda limitada; 'una ayuda poca' conserva de manera directa el matiz de escasez. Aunque menos natural que 'poca ayuda', sigue siendo clara y próxima a la estructura del original.
- source_word: וְנִלְווּ עֲלֵיהֶם
  english_pob_choice: many will join themselves to them
  chosen_spanish: muchos se les unirán
  alternatives_spanish:
  - muchos se unirán a ellos
  - muchos se les pegarán
  lexicon: HALOT
  rationale: '''Unirse'' refleja bien la idea de adherirse al grupo; el dativo ''se les'' preserva el sentido relacional del hebreo sin forzar la reflexividad explícita.'
- source_word: רַבִּים
  english_pob_choice: many
  chosen_spanish: muchos
  alternatives_spanish:
  - multitudes
  lexicon: HALOT
  rationale: Es la equivalencia directa y natural para la cantidad indeterminada del hebreo.
- source_word: בַּחֲלַקְלַקּוֹת
  english_pob_choice: with smooth words
  chosen_spanish: con palabras suaves
  alternatives_spanish:
  - con halagos
  - con lisonjas
  - con habla melosa
  lexicon: HALOT
  rationale: La imagen hebrea de lo 'suave' sugiere habla halagadora o engañosa; 'palabras suaves' conserva la metáfora y deja abierta la ambigüedad entre suavidad aparente y adulación.
translation_notes:
  revision_awareness: 'El texto castellano sigue de cerca el sentido del hebreo y el rastro auditado en inglés: circunstancia temporal (''cuando''), ayuda limitada (''a little help''), unión de muchos al grupo y la imagen metafórica de ''palabras suaves'' para el habla aduladora o engañosa. No hubo revisiones aplicadas en el pasaje de referencia.'
  spanish_consistency_notes:
  - Se mantuvo 'Yahvé' como norma del proyecto, pero este versículo no contiene el nombre divino.
  - Se prefirió 'tropiecen' frente a 'caigan' para preservar la metáfora sin sobredeterminar el resultado.
  - '''Palabras suaves'' conserva la tensión léxica entre literalidad e implicación pragmática de adulación.'
