id: ACT.2.36
reference: Acts 2:36
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: ἀσφαλῶς οὖν γινωσκέτω πᾶς οἶκος Ἰσραὴλ ὅτι καὶ κύριον ⸂αὐτὸν καὶ χριστὸν⸃ ⸂ἐποίησεν ὁ θεός⸃, τοῦτον τὸν Ἰησοῦν ὃν ὑμεῖς ἐσταυρώσατε.
base_translation:
  language: en
  yaml_path: translation/nt/acts/002/036.yaml
  text: Therefore let all the house of Israel know for certain that God has made him both Lord and Messiah—this Jesus whom you crucified[a][b].
  footnotes:
  - marker: a
    text: Or 'Christ.' The Greek title is Χριστός (Christos), here rendered 'Messiah' to preserve its title sense in Peter's address to Israel.
    reason: alternative_reading
  - marker: b
    text: '''Has made him both Lord and Messiah'' speaks of God''s exaltation and public installation of Jesus in these roles, not of a change in his divine nature.'
    reason: lexical_alternative
translation:
  language: ko
  text: 그러므로 이스라엘의 온 집은 확실히 알아 두십시오. 여러분이 십자가에 못 박은 이 예수를 하나님께서 주와 메시아가 되게 하셨습니다.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 헬라어 ἐποίησεν은 본질의 변화가 아니라 하나님이 부활·승귀를 통하여 예수를 공적으로 주와 메시아의 자리에 세우셨음을 가리킨다.
    reason: lexical_alternative
theological_decisions:
- issue: 2:36의 그리스도론적 정점에서 κύριον과 χριστόν 처리
  chosen_reading: 주(主)와 메시아
  alternative_readings:
  - 주와 그리스도
  rationale: 베드로 설교의 핵심 선언으로, κύριον은 예수의 고양된 주권적 칭호이므로 「주」로, χριστόν은 칭호로 기능하므로 「메시아」로 옮긴다. 시편 110:1의 「내 주」가 가리키던 분이 곧 이 예수임을 보임으로써, 신명 야훼와 구별되는 christological한 「주」가 자리잡는다.
  doctrine_reference: 'DOCTRINE.md: Translate titles; Contested terms table for Χριστός; κύριος of Jesus → 주'
