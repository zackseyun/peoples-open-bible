translation:
  language: es
  text: 'Y Eliseo estaba mirando[a], y clamó: «¡Padre mío, padre mío! ¡El carro de Israel y sus jinetes!». Luego no lo vio más, y tomó sus vestidos y los rasgó en dos pedazos.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «¡Israel, su carro y sus jinetes!». La exclamación puede identificar a Elías como la verdadera fuerza y defensa de Israel, o puede referirse a la escena del carro y los caballos celestiales que Eliseo está viendo.'
    reason: alternative_reading
lexical_decisions:
- source_word: רֹאֶה
  english_pob_choice: was watching
  chosen_spanish: estaba mirando
  alternatives_spanish:
  - miraba
  - estaba viendo
  lexicon: HALOT
  rationale: El participio hebreo expresa acción en curso; «estaba mirando» conserva esa duratividad con un español natural y digno.
- source_word: מְצַעֵק
  english_pob_choice: cried out
  chosen_spanish: clamó
  alternatives_spanish:
  - gritó
  - exclamó
  lexicon: HALOT
  rationale: El participio acompaña la escena y expresa una vocación intensa. «Clamó» preserva fuerza emotiva sin sonar excesivamente coloquial.
- source_word: אָבִי אָבִי
  english_pob_choice: My father, my father!
  chosen_spanish: ¡Padre mío, padre mío!
  alternatives_spanish:
  - ¡Padre, padre!
  - ¡Padre mío!
  lexicon: HALOT
  rationale: El sufijo posesivo de primera persona se refleja con «mío». Se conserva la repetición para mantener la intensidad afectiva y relacional del llamado.
- source_word: רֶכֶב יִשְׂרָאֵל וּפָרָשָׁיו
  english_pob_choice: The chariot of Israel and its horsemen
  chosen_spanish: El carro de Israel y su caballería
  alternatives_spanish:
  - El carro de Israel y sus jinetes
  - El carro de Israel y sus caballos
  lexicon: HALOT
  rationale: «רֶכֶב» puede designar carro de guerra o carro/caballería en sentido militar; «carro» mantiene la imagen y la fuerza figurada. «Caballería» comunica el conjunto militar vinculado con «su» sufijo, sin resolver interpretativamente la tensión del hebreo.
- source_word: וְלֹא רָאָהוּ עוֹד
  english_pob_choice: Then he saw him no more
  chosen_spanish: Luego no lo vio más
  alternatives_spanish:
  - y no lo vio más
  - y ya no lo vio
  lexicon: HALOT
  rationale: La fórmula idiomática se expresa con fluidez en español y conserva la cesación de la visión sin añadir matices ausentes.
- source_word: וַיַּחֲזֵק
  english_pob_choice: he took hold of
  chosen_spanish: tomó
  alternatives_spanish:
  - agarró
  - se aferró a
  lexicon: HALOT
  rationale: En este contexto, la acción sobre las vestiduras queda clara en español con «tomó»; unido al complemento «sus vestidos» evita sobrecargar el verso con una equivalencia más fuerte de la necesaria.
- source_word: בִּבְגָדָיו
  english_pob_choice: his clothes
  chosen_spanish: sus vestidos
  alternatives_spanish:
  - sus ropas
  - sus prendas
  lexicon: HALOT
  rationale: «Vestidos» es un término bíblico-readable y adecuado para la ropa como señal de duelo; no se añade «propios» porque no está explícito en el texto base.
- source_word: וַיִּקְרָעֵם לִשְׁנַיִם קְרָעִים
  english_pob_choice: tore them into two pieces
  chosen_spanish: los rasgó en dos pedazos
  alternatives_spanish:
  - los rompió en dos
  - los partió en dos
  lexicon: HALOT
  rationale: El giro idiomático de rasgar vestiduras en luto se vierte de modo claro y natural. «Rasgó» mantiene el gesto de duelo; «en dos pedazos» conserva el resultado dual del hebreo.
theological_decisions:
- issue: Sentido de «el carro de Israel y su caballería»
  english_pob_reading: The main text preserves the direct exclamation without resolving whether it refers to Elijah as Israel's true defense or to the heavenly chariot-horses scene.
  chosen_spanish_reading: La traducción principal conserva la exclamación directa sin decidir entre una lectura figurada sobre Elías como defensa de Israel o una referencia a la escena celestial.
  alternative_spanish_readings:
  - Elías es la verdadera defensa de Israel
  - Eliseo está aludiendo al carro y a los caballos celestiales que ve
  rationale: El hebreo permite más de una relación semántica. Mantener la frase de forma directa en español preserva la tensión interpretativa documentada por la POB inglesa.
  doctrine_reference: Preservar la tensión interpretativa sin resolverla prematuramente.
translation_notes:
  revision_awareness: La redacción sigue la revisión más reciente del audit trail inglés al preferir un verbo narrativo simple para la segunda cláusula y evitar añadir posesivos no explicitados en el texto base. La solución española conserva esa economía y mantiene la ambigüedad teológica señalada por la POB.
  spanish_consistency_notes:
  - Se usa «Yahvé» como norma de proyecto cuando corresponda, pero aquí el versículo no contiene el Tetragrámaton.
  - 'Se prefieren formas sobrias y publicables: «clamó», «tomó», «rasgó», sin arcaísmo innecesario.'
  - La nota al pie reproduce la alternativa de lectura ya documentada en la tradición auditada y se ancla en la frase relevante.
