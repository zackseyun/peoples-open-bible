    rationale: Aunque calca de cerca el inglés auditado, en español «hablar conocimiento» resulta forzado. El hebreo puede preservarse bien con «mis labios hablan con claridad conocimiento» o mejor «mis labios expresan claramente conocimiento», manteniendo el contenido semántico sin paraprasear excesivamente.
  - severity: medium
    issue: La nota [a] está colocada sobre «palabras», pero explica el término «claramente».
    rationale: Según el rastro inglés, la alternativa léxica corresponde a בָּרוּר / «clearly», no a «my words». El marcador debe aparecer junto al elemento español que traduce ese término para no inducir a error.
  - severity: low
    issue: 'La redacción de la nota es algo torpe: «lo explícito/llano».'
    rationale: Puede expresarse con mayor naturalidad como «claridad, pureza o llaneza», que comunica mejor los matices léxicos en español eclesial legible.
  revised_spanish_text: La rectitud de mi corazón está en mis palabras, y mis labios expresan conocimiento claramente[a].
