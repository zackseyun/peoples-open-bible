lexical_decisions:
- source_word: וַיַּשִּׂגֵם
  english_pob_choice: He caught up with them
  chosen_spanish: Él los alcanzó
  alternatives_spanish:
  - Él los alcanzó de nuevo
  - Él los sobrepasó
  lexicon: HALOT
  rationale: El verbo hebreo en hifil con sufijo de 3ª plural expresa que el hombre se puso al alcance de ellos en el camino. «Los alcanzó» conserva bien la idea de movimiento y contacto posterior sin sonar forzado en español; «sobrepasó» se aparta del contexto, y «alcanzó de nuevo» añade una idea no requerida por el texto.
- source_word: וַיְדַבֵּר
  english_pob_choice: and spoke
  chosen_spanish: y les habló
  alternatives_spanish:
  - y dijo
  - y les dijo
  lexicon: HALOT
  rationale: El hebreo usa דִּבֵּר, que suele introducir habla formulada. En español, «les habló» comunica la acción verbal de modo natural y mantiene el enlace con el contenido que sigue; «dijo» sería posible, pero pierde un poco la correspondencia con la construcción hebrea.
- source_word: אֲלֵהֶם
  english_pob_choice: to them
  chosen_spanish: les
  alternatives_spanish:
  - a ellos
  - con ellos
  lexicon: HALOT
  rationale: La preposición אֶל señala dirección hacia los hermanos. En español, el dativo «les» expresa con naturalidad ese destino del habla; «a ellos» es correcto pero más pesado, y «con ellos» no refleja el valor direccional.
- source_word: אֶת הַדְּבָרִים הָאֵלֶּה
  english_pob_choice: these words
  chosen_spanish: estas palabras
  alternatives_spanish:
  - estas cosas
  - estos dichos
  lexicon: HALOT
  rationale: La expresión hebrea significa literalmente «estas palabras». «Estas palabras» reproduce fielmente el sustantivo y su función introductoria del discurso siguiente. «Estas cosas» sería demasiado general; «estos dichos» suena menos natural en el español actual.
translation_notes:
  revision_awareness: El pasaje fue revisado recientemente sin cambios sustanciales y el control cruzado reportó alta concordancia; por eso se mantiene una solución muy cercana al audit trail inglés, con adaptación natural al español.
  spanish_consistency_notes:
  - Se conserva el sujeto explícito «Él» para reflejar la continuidad narrativa del hebreo, aunque en español podría omitirse.
  - Se mantiene el plural «palabras» para reproducir el objeto directo literal del hebreo.
  - No se introduce una equivalencia más interpretativa como «les respondió», porque el texto sólo dice que los alcanzó y les habló.
