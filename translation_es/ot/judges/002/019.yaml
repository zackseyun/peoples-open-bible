    text: 'O: «No abandonaron sus prácticas ni su camino obstinado». El hebreo dice literalmente que no las «dejaron caer»; por eso también puede entenderse como que no las abandonaron.'
    reason: lexical_alternative
  revision_rationale: Se corrigió «camino duro» a «camino obstinado» para reflejar fielmente el sentido moral de הַקָּשָׁה y la decisión auditada del POB inglés («stubborn way»). También se ajustaron los verbos a pasado narrativo («volvieron», «se corrompieron») para mejorar la fluidez y la fuerza de recaída en español. Se mantuvo la nota lexical sobre לֹא הִפִּילוּ, pero con redacción más natural y mejor alineada con el audit trail.
