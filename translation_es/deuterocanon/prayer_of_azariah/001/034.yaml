translation:
  language: es
  text: Bendigan al Señor, todas las obras del Señor; cántenle alabanzas y exáltenlo en gran manera por siempre[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «para los siglos». El griego dice literalmente «hacia los siglos», una fórmula habitual para expresar alabanza duradera.
    reason: lexical_alternative
lexical_decisions:
- source_word: εὐλογεῖτε
  english_pob_choice: Bless
  chosen_spanish: Bendigan
  alternatives_spanish:
  - Alaben
  - Bendigan con bendición
  lexicon: BDAG
  rationale: El imperativo plural de εὐλογέω conserva mejor en español la fuerza litúrgica de una exhortación doxológica si se vierte con «bendigan». Mantiene el tono de bendición dirigida a Dios sin caer en un calco rígido.
- source_word: πάντα τὰ ἔργα Κυρίου
  english_pob_choice: all the works of the Lord
  chosen_spanish: todas las obras del Señor
  alternatives_spanish:
  - todas las obras del Señor
  - todas las obras del Yahvé
  lexicon: BDAG
  rationale: La estructura genitiva se refleja naturalmente como «las obras del Señor». Se conserva el sentido colectivo de totalidad con «todas» y el valor de pertenencia/relación del genitivo.
- source_word: Κυρίου / τὸν κύριον
  english_pob_choice: the Lord
  chosen_spanish: el Señor
  alternatives_spanish:
  - el Señor
  - el Yahvé
  lexicon: BDAG
  rationale: Aunque el proyecto prefiere «Yahvé» para el nombre divino, aquí la tradición del texto griego usa κύριος como título reverente dentro de un himno; «Señor» preserva esa forma de reverencia y la repetición del refrán en español.
- source_word: ὑμνεῖτε
  english_pob_choice: sing praise
  chosen_spanish: cántenle alabanzas
  alternatives_spanish:
  - canten himnos
  - alábenlo cantando
  lexicon: BDAG
  rationale: ὑμνέω suele implicar alabanza cantada. «Cántenle alabanzas» comunica ese matiz de forma natural y conserva el movimiento litúrgico del original.
- source_word: ὑπερυψοῦτε
  english_pob_choice: highly exalt
  chosen_spanish: engrandézcanlo muchísimo
  alternatives_spanish:
  - engrandezcanlo en gran manera
  - exáltenlo grandemente
  lexicon: BDAG
  rationale: El compuesto intensifica la exaltación. «Engrandézcanlo muchísimo» intenta reproducir esa intensidad en español sin perder la claridad del mandato de exaltarlo por encima de lo ordinario.
- source_word: εἰς τοὺς αἰῶνας
  english_pob_choice: forever
  chosen_spanish: por siempre
  alternatives_spanish:
  - para siempre
  - por los siglos
  lexicon: BDAG
  rationale: El idiomatismo griego literalmente significa «hacia los siglos» o «en los siglos». En español, «por siempre» expresa con naturalidad la permanencia indefinida que el himno requiere.
theological_decisions:
- issue: Tratamiento de κύριος en un himno de alabanza de matriz judía/helénica
  english_pob_reading: Lord
  chosen_spanish_reading: Señor
  alternative_spanish_readings:
  - Yahvé
  - SEÑOR
  rationale: Se conserva el valor reverencial y litúrgico de κύριος con «Señor». Aunque el proyecto suele usar «Yahvé» para el nombre divino, aquí el griego presenta el título en una fórmula doxológica; traducirlo como «Señor» mantiene la cadencia del himno y evita borrar la forma griega recibida.
  doctrine_reference: 'DOCTRINE.md Contested terms: κύριος → Lord / reverential title in doxology'
- issue: Alcance temporal de εἰς τοὺς αἰῶνας
  english_pob_reading: forever
  chosen_spanish_reading: por siempre
  alternative_spanish_readings:
  - para siempre
  - por los siglos
  rationale: La expresión griega es un idiomatismo de duración indefinida y no requiere una literalidad que oscurezca el sentido. «Por siempre» transmite la perpetuidad de la alabanza de modo claro y solemne.
  doctrine_reference: BDAG; idiomatic temporal expression
translation_notes:
  revision_awareness: El pasaje coincide sustancialmente con la traducción inglesa auditada. Se mantuvo la estructura exhortativa y el paralelismo entre «bendecir / cantar alabanzas / engrandecer». La única nota necesaria es la alternativa idiomática de εἰς τοὺς αἰῶνας, ya reflejada en la nota textual del inglés.
  spanish_consistency_notes:
  - Se mantuvo «Señor» para κύριος por coherencia con la forma reverencial del himno, sin introducir «Yahvé» donde el griego no lo exige de manera explícita.
  - «Cántenle alabanzas» conserva el valor de alabanza cantada de ὑμνεῖτε sin recurrir a un calco como «himen» o «hymn».
  - «Engrandézcanlo muchísimo» reproduce la intensificación de ὑπερυψοῦτε con un español natural y solemne.
  - La nota [a] se ancla en «por siempre», correspondiente al idiomatismo griego de duración eterna.
