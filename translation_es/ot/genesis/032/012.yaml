  text: הַצִּילֵ֥/נִי נָ֛א מִ/יַּ֥ד אָחִ֖/י מִ/יַּ֣ד עֵשָׂ֑ו כִּֽי יָרֵ֤א אָנֹכִי֙ אֹת֔/וֹ פֶּן יָב֣וֹא וְ/הִכַּ֔/נִי אֵ֖ם עַל בָּנִֽים־־־׃
