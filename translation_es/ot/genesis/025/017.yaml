base_translation:
  language: en
  yaml_path: translation/ot/genesis/025/017.yaml
  text: 'These were the years of Ishmael’s life: one hundred and thirty-seven years[a]. And he breathed his last and died[b], and was gathered to his people.'
  footnotes:
  - marker: a
    text: Or 'expired.' The Hebrew verb here is distinct from the following 'died,' so both are retained in translation.
    reason: lexical_alternative
  - marker: b
    text: '''Was gathered to his people'' is a Hebrew idiom used in death notices; it may refer to reunion with one''s forebears, burial among one''s kin, or both.'
    reason: cultural_note
