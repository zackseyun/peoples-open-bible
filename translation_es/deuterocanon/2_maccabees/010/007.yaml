translation:
  language: es
  text: Pero el mismo Macabeo fue el primero en tomar las armas[a], y exhortó a los demás, arriesgándose junto con él, a acudir en ayuda de sus hermanos[b]; y juntos también se lanzaron con prontitud.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, «armarse». El griego usa una expresión idiomática para tomar armas para el combate.
    reason: lexical_alternative
  - marker: b
    text: «Hermanos» también puede referirse aquí a sus correligionarios o compatriotas.
    reason: lexical_alternative
lexical_decisions:
- source_word: πρῶτος
  english_pob_choice: was the first
  chosen_spanish: fue el primero
  alternatives_spanish:
  - fue el primero en
  lexicon: LSJ
  rationale: El predicativo con αὐτός y ὁ Μακκαβαῖος destaca que Macabeo tomó la iniciativa antes que los demás; «fue el primero» conserva esa prioridad con naturalidad en español.
- source_word: ἀναλαβὼν τὰ ὅπλα
  english_pob_choice: to take up arms
  chosen_spanish: tomar las armas
  alternatives_spanish:
  - armarse
  - tomar las armas
  lexicon: LSJ
  rationale: La expresión es idiomática y militar; en español «tomar las armas» es la equivalencia más natural y fiel al sentido de armarse para el combate.
- source_word: προετρέψατο
  english_pob_choice: he urged
  chosen_spanish: exhortó
  alternatives_spanish:
  - instó
  - animó
  lexicon: LSJ
  rationale: El verbo expresa incitación/exhortación a la acción. «Exhortó» mantiene el tono fuerte y formal del contexto bélico.
- source_word: ἅμα αὐτῷ διακινδυνεύοντας
  english_pob_choice: by risking danger together with him
  chosen_spanish: arriesgándose junto con él
  alternatives_spanish:
  - compartiendo el peligro con él
  - arriesgando el peligro con él
  lexicon: LSJ
  rationale: El participio subraya que los otros debían unirse a él en el riesgo. «Arriesgándose junto con él» conserva el valor de solidaridad peligrosa sin perder fluidez española.
- source_word: ἐπιβοηθεῖν
  english_pob_choice: to come to the aid of
  chosen_spanish: acudir en ayuda de
  alternatives_spanish:
  - venir en ayuda de
  - socorrer a
  lexicon: LSJ
  rationale: El compuesto sugiere acudir en apoyo urgente. «Acudir en ayuda de» reproduce bien ese matiz de llegar para asistir.
- source_word: τοῖς ἀδελφοῖς αὐτῶν
  english_pob_choice: their brothers
  chosen_spanish: sus hermanos
  alternatives_spanish:
  - sus compatriotas
  - sus correligionarios
  lexicon: LSJ
  rationale: Se mantiene «hermanos» por la forma masculina plural del griego y por la lectura comunitaria del contexto; no se neutraliza en el texto principal.
- source_word: ὁμοῦ
  english_pob_choice: together
  chosen_spanish: juntos
  alternatives_spanish:
  - al mismo tiempo
  - todos juntos
  lexicon: LSJ
  rationale: Marca acción colectiva; «juntos» es el equivalente más directo y natural.
- source_word: προθύμως
  english_pob_choice: eagerly
  chosen_spanish: con ímpetu y prontitud
  alternatives_spanish:
  - con entusiasmo
  - prontamente
  lexicon: LSJ
  rationale: El adverbio combina disposición y celo. «Con ímpetu y prontitud» intenta conservar tanto la energía como la disposición voluntariosa del griego.
- source_word: ἐξώρμησαν
  english_pob_choice: charged out
  chosen_spanish: salieron con ímpetu
  alternatives_spanish:
  - irrumpieron
  - se lanzaron
  lexicon: LSJ
  rationale: El verbo es enérgico y de movimiento hacia fuera; «salieron con ímpetu» expresa bien la salida decidida en un contexto militar sin sonar artificial.
theological_decisions:
- issue: ἀδελφοῖς en contexto militar y nacional
  english_pob_reading: their brothers
  chosen_spanish_reading: sus hermanos
  alternative_spanish_readings:
  - sus compatriotas
  - sus correligionarios
  rationale: El griego usa ἀδελφοῖς en plural masculino. En este contexto puede referirse a aliados o compañeros judíos, pero el texto base conserva la imagen fraterna; por eso se mantiene «hermanos» en el texto principal.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4
translation_notes:
  revision_awareness: El inglés POB revisó previamente «take up the weapons» a «take up arms» para hacer más natural la formulación. La versión española sigue esa decisión con «tomar las armas», manteniendo el registro militar formal y la fuerza del griego. También conserva el matiz de solidaridad peligrosa en ἅμα αὐτῷ διακινδυνεύοντας, que el audit trail inglés trató como participación en el riesgo.
  spanish_consistency_notes:
  - Se usa «Macabeo» como forma de nombre/título en español, coherente con el contexto histórico-literario.
  - Se mantiene el plural masculino «sus hermanos» por fidelidad al griego y a la política del proyecto sobre ἀδελφοί.
  - El cierre con «con ímpetu y prontitud» busca reflejar la doble idea de disposición y movimiento en προθύμως ἐξώρμησαν sin añadir contenido ajeno al texto.
