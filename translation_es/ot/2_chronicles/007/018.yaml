translation:
  language: es
  text: 'entonces estableceré el trono de tu reino, como pacté con David tu padre, diciendo: «No se te cortará[a] un hombre que gobierne sobre Israel»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, de manera más idiomática: «No te faltará un hombre que gobierne sobre Israel».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַהֲקִימוֹתִי
  english_pob_choice: then I will establish
  chosen_spanish: entonces estableceré
  alternatives_spanish:
  - y estableceré
  - entonces confirmaré
  lexicon: HALOT
  rationale: El verbo causativo de קום en este contexto expresa hacer firme o establecer; “estableceré” mantiene la fuerza verbal y funciona naturalmente con la apódosis introducida por la conjunción narrativa/resultado.
- source_word: כִּסֵּא מַלְכוּתֶךָ
  english_pob_choice: the throne of your kingdom
  chosen_spanish: el trono de tu reino
  alternatives_spanish:
  - tu trono real
  - el trono de tu realeza
  lexicon: HALOT
  rationale: 'La cadena constructa se conserva con dos sustantivos en español: “trono” + “reino”. “Reino” refleja מַלְכוּת sin reemplazarlo por una paráfrasis más libre.'
- source_word: כַּאֲשֶׁר
  english_pob_choice: as
  chosen_spanish: como
  alternatives_spanish:
  - tal como
  - así como
  lexicon: HALOT
  rationale: “Como” transmite la comparación de manera breve y sobria, sin añadir matices no exigidos por el hebreo.
- source_word: כָּרַתִּי
  english_pob_choice: I covenanted
  chosen_spanish: pacté
  alternatives_spanish:
  - hice pacto
  - concerté un pacto
  lexicon: HALOT
  rationale: En contexto de pacto, כרת tiene el valor idiomático de formalizar un pacto. “Pacté” comunica esa acción de manera natural en español y evita una formulación demasiado pesada.
- source_word: לְדָוִיד אָבִיךָ
  english_pob_choice: with David your father
  chosen_spanish: con David tu padre
  alternatives_spanish:
  - con David, tu padre
  - a David tu padre
  lexicon: HALOT
  rationale: El hebreo del pacto se expresa naturalmente con “con” en español. “Tu padre” se mantiene literalmente, en sentido dinástico de antepasado inmediato del linaje.
- source_word: לֹא יִכָּרֵת
  english_pob_choice: will not be cut off
  chosen_spanish: No se te cortará
  alternatives_spanish:
  - No faltará para ti
  - No será eliminado de ti
  lexicon: HALOT
  rationale: Se conserva la imagen verbal de כרת en pasivo/reflexivo impersonal, sin borrar la tensión entre el sentido literal de “cortar” y el uso dinástico. “No se te cortará” es más transparente que una equivalencia totalmente idiomática.
- source_word: לְךָ
  english_pob_choice: from you
  chosen_spanish: se te
  alternatives_spanish:
  - de ti
  - para ti
  lexicon: HALOT
  rationale: En español, el complemento indirecto “se te” reproduce de forma idiomática la idea de que la línea no quedará cortada respecto de David/Salomón, sin perder el sentido relacional del hebreo.
- source_word: אִישׁ
  english_pob_choice: A man
  chosen_spanish: un hombre
  alternatives_spanish:
  - una persona
  - alguien
  lexicon: HALOT
  rationale: Se conserva el valor masculino singular del sustantivo hebreo y su referencia dinástica concreta.
- source_word: מוֹשֵׁל
  english_pob_choice: to rule over
  chosen_spanish: que gobierne
  alternatives_spanish:
  - para gobernar
  - que rija
  lexicon: HALOT
  rationale: El participio funciona atributivamente con אִישׁ. En español, la relativa “que gobierne” expresa de forma natural la función gobernante sin forzar una calca sintáctica.
- source_word: בְּיִשְׂרָאֵל
  english_pob_choice: over Israel
  chosen_spanish: sobre Israel
  alternatives_spanish:
  - en Israel
  lexicon: HALOT
  rationale: Aunque la preposición hebrea es ב, con משל el sentido es de gobierno sobre un pueblo. “Sobre Israel” conserva ese valor dominativo.
theological_decisions:
- issue: Promesa dinástica davídica
  english_pob_reading: A man to rule over Israel will not be cut off from you
  chosen_spanish_reading: No se te cortará un hombre que gobierne sobre Israel
  alternative_spanish_readings:
  - No te faltará un hombre que gobierne sobre Israel
  - Siempre tendrás un hombre que gobierne sobre Israel
  rationale: 'La traducción principal mantiene el giro de ‘cortar’ para no suavizar la imaginería del pacto y al mismo tiempo deja claro el sentido dinástico: no cesará la sucesión real. Se preserva así la tensión entre literalidad y equivalencia idiomática.'
  doctrine_reference: 2 Samuel 7; 1 Crónicas 17; promesa davídica
translation_notes:
  revision_awareness: La revisión inglesa reciente ajustó la construcción de “ruling over Israel” a “to rule over Israel” para reflejar con más naturalidad el hebreo. En español, se optó por una relativa verbal (“que gobierne”) que evita el participio pesado y conserva el valor funcional del hebreo. También se mantuvo la metáfora de “cortar” en la línea dinástica, como alternativa explícitamente marcada.
  spanish_consistency_notes:
  - Se usa “Yahvé” solo cuando el texto base lo requiera; este versículo no contiene el nombre divino.
  - Se prefirió “reino” para מַלְכוּת por ser el equivalente más directo y transparente en español.
  - Se mantuvo “un hombre” para reflejar el singular masculino del hebreo y la referencia sucesoria concreta.
  - La nota al pie preserva la alternativa idiomática documentada en el audit trail inglés sin reemplazar la redacción principal.
