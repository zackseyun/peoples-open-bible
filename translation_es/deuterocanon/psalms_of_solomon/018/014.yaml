translation:
  language: es
  text: Y no se han extraviado desde el día en que los creó[a]. Desde generaciones antiguas no se han apartado de sus caminos[b], a menos que Dios les haya ordenado por mandato de sus esclavos[c][d].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «no se han desviado».'
    reason: lexical_alternative
  - marker: b
    text: «Sus caminos» puede significar sus cursos o patrones asignados.
    reason: lexical_alternative
  - marker: c
    text: 'O: «por medio de sus esclavos». El griego dice: «esclavos».'
    reason: lexical_alternative
  - marker: d
    text: 'O: «con un mandato de sus esclavos».'
    reason: previous_rendering
lexical_decisions:
- source_word: ἐπλανήθησαν
  english_pob_choice: have not gone astray
  chosen_spanish: no se han extraviado
  alternatives_spanish:
  - no han andado errantes
  - no se han desviado
  lexicon: BDAG
  rationale: «Extraviarse» comunica bien la idea de desviarse del curso debido y mantiene el matiz moral/religioso de πλανάω sin añadir una agencia que el griego no expresa aquí.
- source_word: ἔκτισεν
  english_pob_choice: created
  chosen_spanish: los creó
  alternatives_spanish:
  - los creó
  - los formó
  - los hizo
  lexicon: BDAG
  rationale: κτίζω aquí se rinde naturalmente como «crear»; en español «crear» conserva con claridad la acción divina originaria.
- source_word: ἀφʼ ἧς ἡμέρας
  english_pob_choice: since the day
  chosen_spanish: desde el día en que
  alternatives_spanish:
  - desde que
  - a partir del día en que
  lexicon: BDAG
  rationale: La construcción temporal se expresa con naturalidad en español como «desde el día en que», equivalente idiomático de la continuidad desde un punto inicial.
- source_word: γενεῶν ἀρχαίων
  english_pob_choice: from ancient generations
  chosen_spanish: desde generaciones antiguas
  alternatives_spanish:
  - desde generaciones de antaño
  - desde tiempos antiguos
  lexicon: BDAG
  rationale: La frase marca gran antigüedad; «generaciones antiguas» conserva la estructura y el énfasis temporal del griego.
- source_word: ἀπέστησαν
  english_pob_choice: have not departed
  chosen_spanish: no se han apartado
  alternatives_spanish:
  - no se han desviado
  - no han abandonado
  lexicon: BDAG
  rationale: «Apartarse» reproduce bien la idea de salir de una trayectoria establecida y mantiene el paralelismo con «sus caminos».
- source_word: ὁδῶν αὐτῶν
  english_pob_choice: their ways
  chosen_spanish: sus caminos
  alternatives_spanish:
  - sus sendas
  - sus cursos
  lexicon: BDAG
  rationale: «Caminos» es la opción más natural en español para ὁδός en sentido figurado; puede abarcar tanto rutas como patrones de conducta o curso asignado.
- source_word: ἐνετείλατο
  english_pob_choice: commanded
  chosen_spanish: les haya mandado
  alternatives_spanish:
  - les haya ordenado
  - les haya dado mandamiento
  lexicon: BDAG
  rationale: «Mandar» conserva el carácter autoritativo del verbo y suena más idiomático que una calca más rígida.
- source_word: ἐν ἐπιταγῇ
  english_pob_choice: by an ordinance
  chosen_spanish: por el mandamiento
  alternatives_spanish:
  - con un mandamiento
  - mediante un mandato
  lexicon: BDAG
  rationale: La frase puede expresar el modo o instrumento de la orden; «por el mandamiento» preserva la fuerza formal y deja abierta la relación sintáctica sin forzar «ordenanza» en español.
- source_word: δούλων
  english_pob_choice: slaves
  chosen_spanish: esclavos
  alternatives_spanish:
  - siervos
  lexicon: BDAG
  rationale: Se mantiene «esclavos» porque el griego usa δοῦλοι y la pauta del proyecto preserva esa fuerza lexical cuando el vínculo de sujeción es relevante. Aquí también evita suavizar indebidamente la expresión.
theological_decisions:
- issue: Referente implícito de «ellos»
  english_pob_reading: Render generically as 'they' without specifying the referent in English.
  chosen_spanish_reading: Se mantiene el sujeto implícito en español con «se» y «los», sin identificar explícitamente el referente.
  alternative_spanish_readings:
  - los cuerpos celestes
  - las criaturas
  - los seres creados
  rationale: El griego no nombra explícitamente el antecedente dentro de este versículo; por fidelidad textual conviene no resolverlo en español. Así se preserva la tensión interpretativa del contexto.
  doctrine_reference: Preservar la ambigüedad donde el texto fuente no la resuelve.
- issue: Valor de δούλων αὐτοῦ
  english_pob_reading: by the command of his slaves
  chosen_spanish_reading: por el mandamiento de sus esclavos
  alternative_spanish_readings:
  - por el mandamiento de sus siervos
  - mediante sus esclavos
  rationale: Se conserva «esclavos» para no rebajar el término griego δοῦλοι. La frase puede resultar teológicamente tensa, pero el texto griego presenta precisamente esa forma y no debe suavizarse sin base textual.
  doctrine_reference: Mantener la fuerza léxica de δοῦλος según la política terminológica del proyecto.
translation_notes:
  revision_awareness: La auditoría inglesa muestra una oscilación editorial entre «slaves» y «servants» en la historia de revisiones, pero el estado final restituye «slaves»; por eso el español conserva «esclavos». También se siguió la corrección de «since the day» para ἀφʼ ἧς ἡμέρας. No se añadió ningún referente explícito para «they» porque el griego lo deja implícito.
  spanish_consistency_notes:
  - Se mantuvo Yahvé no porque aparezca aquí, sino porque la pauta del proyecto lo exige cuando corresponda; en este versículo el sujeto explícito es Dios, así que se traduce simplemente «Dios».
  - 'Se prefirió una sintaxis sobria y publicable: «les haya mandado por el mandamiento de sus esclavos» conserva la relación de ἐν ἐπιταγῇ sin convertirla en una paráfrasis.'
  - Los corchetes de notas se colocan solo donde hay alternativa lexical o ambigüedad real en español.
  - «No se han extraviado» y «no se han apartado» se conservan en paralelo para reflejar los dos verbos griegos distintos sin homogeneizarlos.
