translation:
  language: es
  text: Y cuando el asunto se difundió[a], los hijos de Israel[b] trajeron en abundancia las primicias de grano, mosto, aceite, miel[c] y todo el producto del campo; trajeron en abundancia el diezmo de todo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «el informe se difundió». El hebreo usa דבר, un término amplio que puede referirse al asunto, la noticia o lo dicho.
    reason: alternative_reading
  - marker: b
    text: O «los israelitas». El hebreo dice literalmente «los hijos de Israel», una expresión corporativa habitual para el pueblo de Israel.
    reason: lexical_alternative
  - marker: c
    text: «Miel» puede en algunos contextos referirse a un jarabe dulce, como jarabe de dátiles, no solo a miel de abeja.
    reason: cultural_note
lexical_decisions:
- source_word: וְ/כִ/פְרֹץ
  english_pob_choice: And when ... spread
  chosen_spanish: Y cuando el asunto se difundió
  alternatives_spanish:
  - Y cuando el asunto se extendió
  - Y cuando el asunto se propagó
  lexicon: HALOT
  rationale: El valor temporal de כי con el infinitivo constructo pide una frase como «cuando». פרץ conserva la idea de irrupción o expansión rápida; «se difundió» comunica bien esa propagación en español sin perder el matiz.
- source_word: הַ/דָּבָר
  english_pob_choice: the matter
  chosen_spanish: el asunto
  alternatives_spanish:
  - la cosa
  - el hecho
  - el informe
  lexicon: HALOT
  rationale: דבר es amplio y aquí alude a lo ya ocurrido o dicho que se hizo público. «Asunto» mantiene esa amplitud sin forzar a «palabra», «mandato» o «informe».
- source_word: הִרְבּוּ
  english_pob_choice: brought in abundance
  chosen_spanish: trajeron en abundancia
  alternatives_spanish:
  - trajeron mucho
  - aumentaron
  lexicon: HALOT
  rationale: En contexto, רבה en hifil describe la gran cantidad de lo aportado. En español es más natural expresar esa abundancia con el verbo de acción que ya sigue implícito en la lista de ofrendas.
- source_word: בְנֵי יִשְׂרָאֵל
  english_pob_choice: the sons of Israel
  chosen_spanish: los hijos de Israel
  alternatives_spanish:
  - los israelitas
  - el pueblo de Israel
  lexicon: HALOT
  rationale: Se conserva la expresión corporativa masculina del hebreo, que en español bíblico es plenamente comprensible. La alternativa idiomática se deja como opción semántica, pero no se sustituye en el texto principal.
- source_word: רֵאשִׁית
  english_pob_choice: the firstfruits
  chosen_spanish: las primicias
  alternatives_spanish:
  - la primera porción
  - los primeros frutos
  lexicon: HALOT
  rationale: En contexto de ofrenda, רֵאשִׁית funciona como término técnico para la primera porción consagrada. «Primicias» es el equivalente español más asentado y fiel.
- source_word: דָּגָן
  english_pob_choice: grain
  chosen_spanish: grano
  alternatives_spanish:
  - cereal
  - trigo
  lexicon: HALOT
  rationale: Es un término genérico para cereal/provisión agrícola. «Grano» es el español más amplio y natural aquí.
- source_word: תִּירוֹשׁ
  english_pob_choice: new wine
  chosen_spanish: mosto
  alternatives_spanish:
  - vino nuevo
  - vino fresco
  lexicon: HALOT
  rationale: El hebreo suele referirse al vino recién producido o al mosto. «Mosto» comunica bien esa fase de la bebida y evita sobreespecificar.
- source_word: יִצְהָר
  english_pob_choice: oil
  chosen_spanish: aceite
  alternatives_spanish:
  - aceite de oliva
  lexicon: HALOT
  rationale: El término alude normalmente al aceite fresco, especialmente de oliva. «Aceite» es conciso y suficiente en esta enumeración.
- source_word: דְבַשׁ
  english_pob_choice: honey
  chosen_spanish: miel
  alternatives_spanish:
  - jarabe de dátiles
  lexicon: HALOT
  rationale: El hebreo puede referirse a miel o a un jarabe dulce, a menudo de dátiles. Se mantiene «miel» en el texto principal y se deja abierta la alternativa cultural.
- source_word: וְ/כֹל תְּבוּאַת שָׂדֶה
  english_pob_choice: and all the produce of the field
  chosen_spanish: y todo el producto del campo
  alternatives_spanish:
  - y toda la cosecha del campo
  - y todo el rendimiento del campo
  lexicon: HALOT
  rationale: תבואה es producto/yield agrícola. «Producto del campo» suena natural en español y conserva el ámbito agrario.
- source_word: וּ/מַעְשַׂר הַ/כֹּל
  english_pob_choice: the tithe of everything
  chosen_spanish: el diezmo de todo
  alternatives_spanish:
  - la décima parte de todo
  - el diezmo de todas las cosas
  lexicon: HALOT
  rationale: מעשר es el término técnico «diezmo». «De todo» refleja הכל de modo directo y breve.
- source_word: לָ/רֹב
  english_pob_choice: abundantly
  chosen_spanish: en abundancia
  alternatives_spanish:
  - abundantemente
  - en gran cantidad
  lexicon: HALOT
  rationale: La frase subraya la gran cantidad. «En abundancia» es una equivalencia natural y clara en español.
- source_word: הֵבִיאוּ
  english_pob_choice: they brought in
  chosen_spanish: trajeron
  alternatives_spanish:
  - aportaron
  - llevaron
  lexicon: HALOT
  rationale: El verbo concreto es traer/introducir las ofrendas. En español, el sentido de «trajeron» ya implica la acción de llevar al lugar de depósito sin añadir rigidez.
theological_decisions:
- issue: Expresión corporativa masculina בְנֵי יִשְׂרָאֵל
  english_pob_reading: the sons of Israel
  chosen_spanish_reading: los hijos de Israel
  alternative_spanish_readings:
  - los israelitas
  - el pueblo de Israel
  rationale: Se conserva la forma hebrea masculina plural por fidelidad al texto y por su uso estable en tradición bíblica. No se neutraliza en el texto principal, aunque el sentido corporativo queda claro en español.
  doctrine_reference: DOCTRINE.md Translation philosophy §4
- issue: Valor de דְבַשׁ
  english_pob_reading: honey
  chosen_spanish_reading: miel
  alternative_spanish_readings:
  - jarabe de dátiles
  - melaza de dátiles
  rationale: No hay base suficiente en este versículo para restringir el término a un tipo específico de jarabe. Se preserva la opción general y se deja abierta la alternativa cultural sin imponerla.
  doctrine_reference: HALOT / nota cultural sobre דבש
translation_notes:
  revision_awareness: 'Se corrigió la validación anterior asegurando que cada marcador de nota aparezca exactamente en el texto español: [a] en “se difundió[a]” y [b] en “Israel[b]”.'
  spanish_consistency_notes:
  - Se mantuvo el tono bíblico claro y contemporáneo, sin calcos innecesarios.
  - Se preservó la enumeración agrícola con equivalentes españoles naturales y técnicamente adecuados.
  - Se evitó sustituir términos técnicos como “diezmo” por una paráfrasis menos precisa.
