translation:
  language: es
  text: Y sucedió que, en el año veintitrés del rey Joás, los sacerdotes no habían reparado los daños[a] de la casa.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'las brechas de la casa'. Aquí 'casa' se refiere al templo.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְהִי
  english_pob_choice: Now it happened
  chosen_spanish: En
  alternatives_spanish:
  - Ahora ocurrió
  - Y sucedió
  lexicon: HALOT
  rationale: La forma narrativa hebrea introduce un nuevo momento del relato. En español, una apertura temporal simple al inicio de la cláusula mantiene la función discursiva sin sonar forzada.
- source_word: בִּשְׁנַת עֶשְׂרִים וְשָׁלֹשׁ שָׁנָה
  english_pob_choice: in the twenty-third year
  chosen_spanish: en el año veintitrés
  alternatives_spanish:
  - en el año veintitrés
  - en el año vigésimo tercero
  lexicon: HALOT
  rationale: La fórmula regnal se expresa de modo natural en español con cardinal + año. 'Veintitrés' conserva el valor temporal directo del hebreo.
- source_word: לַמֶּלֶךְ יְהוֹאָשׁ
  english_pob_choice: of King Jehoash
  chosen_spanish: del rey Joás
  alternatives_spanish:
  - del rey Jehoás
  - del rey Joás
  lexicon: HALOT
  rationale: Se traduce el nombre propio con la forma bíblica más reconocible y fluida en español, manteniendo el título regnal explícito.
- source_word: לֹא חִזְּק֥וּ
  english_pob_choice: had not repaired
  chosen_spanish: aún no habían reparado
  alternatives_spanish:
  - no habían reparado
  - no habían fortalecido
  lexicon: HALOT
  rationale: Aunque חזק literalmente significa 'fortalecer', en esta construcción con בדק הבית el sentido idiomático es reparar. 'Reparado' preserva la acción concreta requerida por el contexto.
- source_word: הַכֹּהֲנִים
  english_pob_choice: the priests
  chosen_spanish: los sacerdotes
  alternatives_spanish:
  - los sacerdotes
  - los sacerdotes del templo
  lexicon: HALOT
  rationale: כהנים corresponde de manera natural a 'sacerdotes'. No se añade especificación interpretativa que el hebreo no exige.
- source_word: בֶּדֶק הַבָּיִת
  english_pob_choice: the damage to the house
  chosen_spanish: el daño de la casa
  alternatives_spanish:
  - las grietas de la casa
  - el daño del templo
  lexicon: HALOT
  rationale: בֶּדֶק puede denotar daño, grieta o brecha. Se conserva 'casa' porque el hebreo dice literalmente 'casa'; el contexto del relato muestra que se trata del templo. 'Daño' refleja la necesidad de reparación sin sobreespecificar más allá del texto.
theological_decisions:
- issue: Referencia de 'la casa' al templo
  english_pob_reading: Here 'house' refers to the temple.
  chosen_spanish_reading: Aquí 'casa' se entiende como el templo.
  alternative_spanish_readings:
  - la casa
  - el templo
  rationale: Se mantiene la literalidad de 'casa' en el texto principal, pero se aclara en nota que el referente contextual es el templo, siguiendo la práctica auditada de la POB en inglés.
  doctrine_reference: 2 Kings 12:7; uso contextual de בית en el relato del templo
- issue: Valor idiomático de חזק en contexto de reparaciones
  english_pob_reading: had not repaired
  chosen_spanish_reading: no habían reparado
  alternative_spanish_readings:
  - no habían fortalecido
  - no habían restaurado
  rationale: 'El hebreo conserva la raíz ''fortalecer'', pero el objeto concreto ''el daño de la casa'' requiere una equivalencia contextual: reparar. Así se evita oscurecer el sentido narrativo.'
  doctrine_reference: HALOT; 2 Kings 12:5-12
translation_notes:
  revision_awareness: Se siguió el ajuste revisado de la POB inglesa que naturalizó la relación preposicional a 'damage to the house'; en español se resolvió de forma equivalente con 'el daño de la casa', manteniendo la referencia contextual al templo sin introducir una paráfrasis más amplia.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' como norma del proyecto, pero este versículo no contiene el nombre divino.
  - '''Casa'' se conserva para reflejar בית, con aclaración contextual en nota.'
  - '''Sacerdotes'' se usa para כהנים; no se sustituye por ''clero'' u otra terminología posterior.'
  - La formulación es sobria y narrativa, evitando arcaísmos innecesarios.
