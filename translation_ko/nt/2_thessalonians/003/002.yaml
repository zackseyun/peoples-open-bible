  yaml_path: translation/nt/2_thessalonians/003/002.yaml
  text: and that we may be delivered from wicked and evil men[b][a], for not all have faith.
translation:
  language: ko
  text: 또한 우리가 비뚤어지고 악한 사람들[a]에게서 건짐 받기를 기도해 주십시오. 모든 사람이 다 믿음을 가진 것은 아니기 때문입니다[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 또는 「부당하고 악한 사람들」. 헬라어 ἄτοπος는 「제자리에 있지 않은」, 「부당한」, 「불합리한」을 뜻하며, 본 정황에서는 도덕적으로 어긋난 적대자들을 가리킨다.
    reason: lexical_alternative
  - marker: b
    text: 또는 「모든 사람이 다 신실한 것은 아니기 때문입니다」. 헬라어는 문자적으로 「믿음이 모든 사람의 것은 아니기 때문이다」.
    reason: alternative_reading
lexical_decisions:
- source_word: ῥυσθῶμεν
  english_pob_choice: we may be delivered
  chosen_korean: 우리가 ~ 건짐 받기를
  alternatives_korean:
  - 우리가 구원받기를
  - 우리가 구출되기를
  lexicon: BDAG
  rationale: ῥύομαι의 「위험에서 건져냄」을 「건짐 받다」로 자연스럽게 옮긴다.
- source_word: ἀτόπων
  english_pob_choice: perverse
  chosen_korean: 비뚤어지고
  alternatives_korean:
  - 부당하고
  - 불합리하고
  - 사악하고
  lexicon: BDAG
  rationale: ἄτοπος는 「제자리에 있지 않은」을 어원으로 한다. 「비뚤어진」이 도덕적으로 어긋난 정황을 자연스럽게 표현한다.
- source_word: πονηρῶν
  english_pob_choice: evil
  chosen_korean: 악한
  alternatives_korean:
  - 사악한
  lexicon: BDAG
  rationale: 표준 도덕 어휘.
- source_word: ἀνθρώπων
  english_pob_choice: men
  chosen_korean: 사람들
  alternatives_korean:
  - 자들
  - 인간들
  lexicon: BDAG
  rationale: 본 정황에서 ἄνθρωποι는 적대적 자들 일반을 가리킨다. 한국어 「사람들」은 성별 중립적이며 헬라어의 범칭적 사용에 부합한다.
- source_word: πίστις
  english_pob_choice: faith
  chosen_korean: 믿음
  alternatives_korean:
  - 신실함
  - 신뢰
  lexicon: BDAG
  rationale: 기본 번역. 적대 정황상 「믿음/신뢰」가 자연스럽다.
- source_word: οὐ γὰρ πάντων ἡ πίστις
  english_pob_choice: for not all have faith
  chosen_korean: 모든 사람이 다 믿음을 가진 것은 아니기 때문입니다
  alternatives_korean:
  - 믿음이 모든 사람의 것은 아니기 때문입니다
  - 모든 사람이 다 신실한 것은 아니기 때문입니다
  lexicon: BDAG
  rationale: 헬라어의 생략 구문을 「가지다」 동사를 보충하여 자연스럽게 옮긴다.
theological_decisions:
- issue: πίστις의 번역 — 「믿음」 vs 「신실함」
  chosen_reading: 믿음
  alternative_readings:
  - 신실함
  - 신뢰
  rationale: 기본 번역. 정황은 적대적 사람들이므로 「믿음/신뢰가 없음」이 자연스럽다.
  doctrine_reference: 'Contested terms: πίστις'
