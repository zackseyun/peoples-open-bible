  rationale: Se corrigió el anclaje de la nota [a] para que corresponda a הַרְפֵּה מִמֶּנִּי, se ajustó «y lloraré» a «y llorar» para reflejar mejor la dependencia sintáctica de la petición, y se mejoró la naturalidad del español con «llorar por mi virginidad», preservando la literalidad hebrea en la nota [b].
