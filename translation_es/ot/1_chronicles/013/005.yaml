translation:
  language: es
  text: Así David reunió a todo Israel, desde Sijor de Egipto[a] hasta Lebo-hamat[b], para traer el arca de Dios desde Quiriat-jearim.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Sijor de Egipto» es una designación de frontera meridional; algunos lo entienden como «el arroyo de Egipto».
    reason: cultural_note
  - marker: b
    text: O, más literalmente, «hasta la entrada a Hamat».
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּקְהֵל
  english_pob_choice: assembled
  chosen_spanish: reunió
  alternatives_spanish:
  - convocó
  - juntó
  lexicon: HALOT
  rationale: El hifil de קהל expresa hacer que un grupo se junte. En español, 'reunió' comunica con naturalidad ese sentido de congregar a todo el pueblo sin endurecer la sintaxis.
- source_word: כָּל יִשְׂרָאֵל
  english_pob_choice: all Israel
  chosen_spanish: todo Israel
  alternatives_spanish:
  - todo el Israel
  - todos los israelitas
  lexicon: HALOT
  rationale: Conserva la fórmula colectiva nacional del hebreo. 'Todo Israel' es una expresión bíblica natural en español y puede referirse al conjunto del pueblo, no necesariamente a cada individuo.
- source_word: מִן שִׁיחוֹר מִצְרַיִם
  english_pob_choice: from the Shihor of Egypt
  chosen_spanish: desde Sijor de Egipto
  alternatives_spanish:
  - desde el Shijor de Egipto
  - desde el arroyo de Egipto
  lexicon: HALOT
  rationale: Se preserva el nombre propio hebreo transliterado 'Sijor' para respetar la primacía del texto original y evitar identificar de antemano el término con un cauce específico. 'De Egipto' mantiene el complemento geográfico del hebreo.
- source_word: וְעַד לְבוֹא חֲמָת
  english_pob_choice: to Lebo-hamath
  chosen_spanish: hasta Lebo-hamat
  alternatives_spanish:
  - hasta la entrada de Hamat
  - hasta Lebo-Hamat
  lexicon: HALOT
  rationale: La expresión funciona como designación de límite geográfico. 'Hasta Lebo-hamat' conserva el topónimo y el valor de frontera; la alternativa más literal se reserva en nota.
- source_word: לְהָבִיא
  english_pob_choice: to bring
  chosen_spanish: para traer
  alternatives_spanish:
  - para llevar
  - para hacer venir
  lexicon: HALOT
  rationale: El infinitivo expresa propósito. 'Para traer' comunica con claridad en español la finalidad de ir a buscar el arca y trasladarla desde Quiriat-jearim.
- source_word: אֲרוֹן הָאֱלֹהִים
  english_pob_choice: the ark of God
  chosen_spanish: el arca de Dios
  alternatives_spanish:
  - el arca del Dios
  - el arca del verdadero Dios
  lexicon: HALOT
  rationale: Es la equivalencia directa y estándar del sintagma constructo. No se añade interpretación teológica que el hebreo no exija aquí.
- source_word: מִקִּרְיַת יְעָרִים
  english_pob_choice: from Kiriath-jearim
  chosen_spanish: desde Quiriat-jearim
  alternatives_spanish:
  - desde Quiriat Yearim
  - desde Quiryat-jearim
  lexicon: HALOT
  rationale: Se usa la transliteración habitual del topónimo en español bíblico, manteniendo el nombre propio y su forma reconocible.
translation_notes:
  revision_awareness: El texto inglés auditado está estable y no presenta revisiones aplicadas; se mantiene la lectura óptima ya acordada, con equivalencias españolas ajustadas a la sintaxis y a la toponimia bíblica.
  spanish_consistency_notes:
  - Se mantiene Yahvé no aplicable aquí porque el versículo usa אֱלֹהִים, por lo que corresponde 'Dios'.
  - Se preserva la transliteración de topónimos para no introducir identificaciones interpretativas no exigidas por el hebreo.
  - La preposición 'desde... hasta...' reproduce la fórmula de límite geográfico con naturalidad en español.
  - No se introduce artículo en 'todo Israel' para conservar la fórmula colectiva bíblica.
  - El orden verbal final 'para traer' refleja adecuadamente el propósito del infinitivo hebreo.
