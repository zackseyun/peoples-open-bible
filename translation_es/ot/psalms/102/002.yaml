translation:
  language: es
  text: Oh Yahvé[a], escucha mi oración, y que mi clamor venga a ti.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: YHWH; tradicionalmente se traduce «el SEÑOR». Alternativas: «Yahvé» o «Jehová».'
    reason: alternative_reading
lexical_decisions:
- source_word: יְהוָה
  english_pob_choice: O Yahweh
  chosen_spanish: ¡Oh Yahvé[a]!
  alternatives_spanish:
  - ¡Oh Jehová!
  - ¡Oh SEÑOR!
  lexicon: HALOT
  rationale: El texto fuente usa el Tetragrama directamente; en español se conserva el nombre divino como "Yahvé" para mantener la referencia personal del pacto, no una sustitución por título. El vocativo "Oh" reproduce el tono de súplica del hebreo y del POB inglés.
- source_word: שִׁמְעָה
  english_pob_choice: hear
  chosen_spanish: escucha
  alternatives_spanish:
  - oye
  - atiende
  lexicon: HALOT
  rationale: El imperativo qal 2ms de שׁמע pide una acción directa de oír/atender. "Escucha" es natural en español y conserva la fuerza imperativa de la petición.
- source_word: תְפִלָּתִי
  english_pob_choice: my prayer
  chosen_spanish: mi oración
  alternatives_spanish:
  - mi plegaria
  - mi súplica
  lexicon: HALOT
  rationale: La forma nominal denota "oración" de manera directa. "Mi oración" es la equivalencia más transparente y registralmente adecuada.
- source_word: וְשַׁוְעָתִי
  english_pob_choice: and my cry
  chosen_spanish: mi clamor
  alternatives_spanish:
  - mi grito
  - mi clamor de ayuda
  lexicon: HALOT
  rationale: שַׁוְעָה comunica un grito o clamor urgente, a menudo de auxilio. "Clamor" conserva esa intensidad sin añadir explícitamente "de ayuda", que el hebreo no formula aquí.
- source_word: אֵלֶיךָ
  english_pob_choice: to you
  chosen_spanish: a ti
  alternatives_spanish:
  - hacia ti
  - ante ti
  lexicon: HALOT
  rationale: La preposición אֶל con sufijo de 2ms expresa dirección hacia la persona invocada. En español, "a ti" mantiene esa dirección de forma natural.
- source_word: תָבֹוא
  english_pob_choice: let ... come
  chosen_spanish: llegue
  alternatives_spanish:
  - venga
  - pueda llegar
  lexicon: HALOT
  rationale: El imperfecto qal 3fs de בוא funciona con valor jussivo en contexto. "Llegue" comunica el movimiento/arribo del clamor a Dios con buena naturalidad en español, sin perder el matiz de petición.
theological_decisions:
- issue: Traducción del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Jehová
  - SEÑOR
  rationale: 'Se sigue la política del proyecto para el Tetragrama: transliterar el nombre divino como "Yahvé" en lugar de sustituirlo por un título. Esto preserva la identidad personal del Dios del pacto mencionada en el hebreo.'
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
translation_notes:
  revision_awareness: El texto inglés auditado ya fue marcado como sin cambios necesarios en la última pasada (high_agreement). Esta versión española sigue la misma lectura y no introduce revisiones textuales adicionales.
  spanish_consistency_notes:
  - 'Se mantiene el vocativo y el orden semántico básico del hebreo: invocación al nombre divino, petición de escucha, y clamor que llega a Dios.'
  - '"Oración" y "clamor" distinguen bien entre תְפִלָּה y שַׁוְעָה sin forzar una paráfrasis.'
  - El uso de "Yahvé" es consistente con la terminología base del proyecto para יְהוָה.
