revisions:
- from: 'Entonces yo, Daniel, miré, y he aquí, dos otros estaban de pie: uno[a] en esta ribera del río y uno en la otra ribera del río.'
  to: 'Entonces yo, Daniel, miré, y he aquí, otros dos estaban de pie: uno en esta ribera del río[a], y uno en la otra ribera del río.'
  rationale: Se ajusta «dos otros» a «otros dos» para lograr un español natural y fiel, y se recoloca la nota al pie para que corresponda a la alternativa léxica de toda la expresión espacial. No hay cambio de sentido ni de decisión teológica.
