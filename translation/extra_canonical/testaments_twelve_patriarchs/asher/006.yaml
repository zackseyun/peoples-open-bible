  text: VI. Προσέχετε οὖν *καὶ ὑμεῖς, τέκνα μου¹, *τὰς ἐντολὰς² Κυρίου³ μονοπροσώπως *ἀκολουθοῦντες τῇ ἀληθείᾳ⁴. 2. Ὅτι οἱ διπρόσωποι δισσῶς †κολάζονται⁵, ⌜Ὅτι καὶ πράσσουσι τὸ κακόν, καὶ συνευδοκοῦσι τοῖς πράσσουσιν⁶, *μιμούμενοι τὰ πνεύματα τῆς πλάνης καὶ κατὰ τῶν ἀνθρώπων συναγωνιζόμενοι⁷.⌝ 3. ⌈Ὑμεῖς οὖν, τέκνα μου⁷ᵃ, τὸν νόμον Κυρίου⁹ φυλάξατε· καὶ¹⁰ μὴ προσέχετε *τῷ κακῷ ὡς καλῷ¹¹, ἀλλὰ κατὰ¹² τὸ ὄντως⁹ καλὸν¹³ ἀποβλέπετε, καὶ διατηρεῖτε αὐτὸ ἐν πάσαις ταῖς¹⁴ ἐντολαῖς Κυρίου, εἰς αὐτὸ¹⁵ ἀναστρεφόμενοι, καὶ ἐν αὐτῷ καταπαύοντες¹⁶. 4. Ὅτι τὰ τέλη τῶν ἀνθρώπων δεικνύουσι¹⁷ τὴν δικαιοσύνην αὐτῶν¹⁸, *καὶ †γνωρίζονται¹⁹ *τοῖς ἀγγέλοις²⁰ Κυρίου, καὶ τοῦ Βελίαρ²¹. 5. Ὅτε²² γὰρ †πονηρὰ²³ ἡ ψυχὴ ἀπέρχεται²⁴, βασανίζεται ὑπὸ τοῦ πονηροῦ πνεύματος, *ὃ καὶ²⁵ ἐδούλευεν²⁶ ἐν ἐπιθυμίαις²⁷ καὶ ἔργοις πονηροῖς. 6. Ἐὰν δὲ *ἔστω ἥσυχος²⁸ *ἐν χαρᾷ²⁹ †γνωρίζει³⁰ τὸν ἄγγελον τῆς εἰρήνης, *καὶ εἰσφέρει αὐτὸν εἰς ζωὴν αἰώνιον³¹.
