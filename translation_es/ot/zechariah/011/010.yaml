translation:
  language: es
  text: Entonces tomé mi bastón Favor y lo corté en dos,[a] para romper mi pacto que había hecho con todos los pueblos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «todas las naciones». El hebreo puede significar pueblos o naciones; se ha retenido el plural más literal.
    reason: lexical_alternative
lexical_decisions:
- source_word: מַקְלִי
  english_pob_choice: my staff
  chosen_spanish: mi bastón
  alternatives_spanish:
  - mi vara
  - mi cayado
  lexicon: HALOT
  rationale: מַקֵּל designa un bastón, vara o cayado. En español, «bastón» comunica con naturalidad el objeto simbólico sin sonar demasiado técnico; «vara» y «cayado» son posibles, pero «bastón» resulta más general y legible en este contexto.
- source_word: נֹעַם
  english_pob_choice: Favor
  chosen_spanish: Favor
  alternatives_spanish:
  - Agradable
  - Gracia
  - Beldad
  lexicon: HALOT
  rationale: El texto trata el término como nombre propio del bastón. Mantener «Favor» conserva el valor nominal y el matiz de benevolencia o agrado que la POB inglesa documenta, sin reducirlo a una simple cualidad abstracta.
- source_word: וָאֶגְדַּע אֹתוֹ
  english_pob_choice: cut it in two
  chosen_spanish: lo quebré en dos
  alternatives_spanish:
  - lo corté en dos
  - lo partí en dos
  - lo corté
  lexicon: HALOT
  rationale: גָּדַע expresa cortar o despedazar un objeto de forma que se rompa. «Lo quebré en dos» hace explícita la ruptura física y mantiene el acto simbólico. «Lo corté en dos» también sería posible, pero «quebré» comunica mejor el resultado visible del gesto.
- source_word: לְהָפֵיר
  english_pob_choice: to break
  chosen_spanish: para romper
  alternatives_spanish:
  - para anular
  - para revocar
  - para invalidar
  lexicon: HALOT
  rationale: En lenguaje de pacto, הפר puede significar quebrantar, anular o invalidar. «Romper» es la opción más directa y comprensible en español, y preserva la fuerza del acto sin tecnicismos innecesarios.
- source_word: בְּרִיתִי
  english_pob_choice: my covenant
  chosen_spanish: mi pacto
  alternatives_spanish:
  - mi alianza
  - mi convenio
  lexicon: HALOT
  rationale: בְּרִית es el término de pacto; en español bíblico, «pacto» es claro y ampliamente reconocible. Aunque «alianza» es posible, «pacto» conserva mejor la amplitud jurídica y relacional del hebreo en este contexto.
- source_word: כָּרַתִּי
  english_pob_choice: I had made
  chosen_spanish: había hecho
  alternatives_spanish:
  - hice
  - había cortado
  lexicon: HALOT
  rationale: כָּרַתִּי en la expresión idiomática «cortar/hacer pacto» se vierte naturalmente como «había hecho» en español. El pluscuamperfecto respeta la secuencia temporal observada en el inglés POB y en el hebreo narrativo.
- source_word: כָּל הָעַמִּים
  english_pob_choice: all the peoples
  chosen_spanish: todos los pueblos
  alternatives_spanish:
  - todas las naciones
  - todos los pueblos y naciones
  lexicon: HALOT
  rationale: עַמִּים puede significar pueblos o naciones. Se eligió «pueblos» para preservar la pluralidad del hebreo y evitar una lectura estrictamente geopolítica que el texto no explicita.
theological_decisions:
- issue: Alcance de «todos los pueblos»
  english_pob_reading: Retain the broad wording 'all the peoples' without narrowing it to Israel alone or to hostile nations alone.
  chosen_spanish_reading: Mantener «todos los pueblos» sin limitarlo a Israel ni a las naciones enemigas.
  alternative_spanish_readings:
  - todas las naciones
  - todos los pueblos vecinos
  rationale: El hebreo presenta una formulación amplia y no especifica por sí misma un referente más estrecho en este versículo. La traducción conserva esa amplitud para no resolver por anticipado la tensión interpretativa.
  doctrine_reference: Preservar la tensión textual y dejar la delimitación para la exégesis.
translation_notes:
  revision_awareness: La revisión inglesa reciente eliminó una coma para leer el nombre del bastón de manera más natural como «Favor». En español se siguió esa misma decisión de fluidez nominal, sin añadir puntuación que rompa la lectura del nombre propio. No hubo otros cambios relevantes que afecten el sentido.
  spanish_consistency_notes:
  - Se conserva el nombre del bastón como «Favor», siguiendo la decisión auditada del inglés POB de tratar נֹעַם como nombre y no como simple adjetivo.
  - Se usa «pacto» de manera consistente para בְּרִית, evitando alternar con «alianza» para no diluir el término técnico.
  - Se mantiene el pluscuamperfecto «había hecho» para reflejar la relación temporal del acto simbólico con el pacto previo.
  - «Pueblos» reproduce la pluralidad de עַמִּים y deja abierta la amplitud del referente.
