base_translation:
  language: en
  yaml_path: translation/deuterocanon/sirach/038/026.yaml
  text: His diligence is to finish the foddering place[b][a]; he sets his heart on plowing the furrows.
  footnotes:
  - marker: a
    text: 'Greek: ''and his wakefulness is for the fodder of calves,'' which supports the Hebrew sense of constant concern for feeding cattle. The Hebrew wording likely focuses on the stall or feeding-place, while the Greek expresses the same idea through the animals'' fodder.'
    reason: alternative_reading
  - marker: b
    text: Or 'he applies his mind to breaking up the furrows.' The Hebrew verb may denote working over the soil rather than specifically harrowing in the technical sense.
    reason: lexical_alternative
