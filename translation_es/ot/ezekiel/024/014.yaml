    reason: lexical_alternative
  - marker: b
    text: 'O: «no cambiaré de parecer» para «no cederé».'
    reason: lexical_alternative
  - marker: c
    text: 'El hebreo tiene un plural no especificado: «te juzgarán», que puede referirse a los agentes del juicio de Yahvé.'
    reason: lexical_alternative
  revision_rationale: Se corrige la colocación de la nota [a] para que corresponda al verbo adecuado, se reemplaza «me arrepentiré» por «cederé» para reflejar mejor el valor de נָחַם en contexto de juicio sin sugerir arrepentimiento moral en Dios, y se alisa la puntuación final. Se conservan «Yahvé», «te juzgarán» y la estructura judicial del verso.
