    issue: La nota [a] está anclada en la palabra equivocada.
    rationale: La nota explica alternativas para ἀπόνοια, es decir, «locura», pero el marcador aparece en «hostilidad». Esto incumple la disciplina de notas exigida y puede confundir al lector.
  - severity: medium
