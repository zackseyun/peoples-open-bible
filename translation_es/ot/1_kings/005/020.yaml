base_translation:
  language: en
  yaml_path: translation/ot/1_kings/005/020.yaml
  text: Now command that cedars from Lebanon be cut for me[a], and let my servants be with your servants, and I will give you the wages of your servants according to all that you say[b]; for you know that among us there is no man who knows how to cut timber like the Sidonians.
  footnotes:
  - marker: a
    text: Hebrew 'no man among us.' The expression refers to the absence of anyone with comparable skill, not necessarily to gender exclusion as a social claim.
    reason: lexical_alternative
  - marker: b
    text: Or 'who knows how to cut trees.' The Hebrew literally says 'to cut woods/trees,' but the context is timber harvesting.
    reason: lexical_alternative
