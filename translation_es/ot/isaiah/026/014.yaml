base_translation:
  language: en
  yaml_path: translation/ot/isaiah/026/014.yaml
  text: The dead do not live[a]; the shades do not rise. Therefore you have punished them and destroyed them[c][b], and you have made all memory of them perish.
  footnotes:
  - marker: a
    text: Or 'the departed spirits'; Hebrew רְפָאִים refers here to the dead in the underworld, not the ancient people called Rephaim.
    reason: lexical_alternative
  - marker: b
    text: Or 'you have called them to account'; the Hebrew verb can mean 'visit' in either mercy or judgment, but here the context favors punishment.
    reason: lexical_alternative
  - marker: c
    text: Literally 'you have destroyed all memory of them.'
    reason: lexical_alternative
