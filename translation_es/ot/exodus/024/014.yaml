translation:
  language: es
  text: 'Y a los ancianos les dijo[a]: «Quédense aquí para nosotros hasta que volvamos a ustedes. Y he aquí, Aarón y Hur están con ustedes. Quien tenga un asunto, que se acerque a ellos».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Quien tenga un caso, que se acerque a ellos».'
    reason: lexical_alternative
lexical_decisions:
- source_word: הַזְּקֵנִים
  english_pob_choice: the elders
  chosen_spanish: los ancianos
  alternatives_spanish:
  - los líderes
  - los mayores
  lexicon: HALOT
  rationale: זְקֵנִים designa aquí a los miembros reconocidos de mayor autoridad del grupo, no solo a personas de edad avanzada. En español, «ancianos» conserva el valor institucional y es más natural en registro bíblico que «los líderes».
- source_word: שְׁבוּ
  english_pob_choice: Wait
  chosen_spanish: Quédense aquí
  alternatives_spanish:
  - Permanezcan aquí
  - Estén aquí
  - Siéntense aquí
  lexicon: HALOT
  rationale: El verbo literalmente puede significar «sentarse» o «permanecer», pero en esta instrucción funciona como orden de quedarse en el lugar. «Quédense aquí» transmite esa fuerza directiva de manera natural en español.
- source_word: לָנוּ
  english_pob_choice: for us
  chosen_spanish: para nosotros
  alternatives_spanish:
  - por nosotros
  - en favor de nosotros
  lexicon: HALOT
  rationale: La relación expresada por la preposición es de beneficio o referencia respecto de Moisés y su acompañante. «Para nosotros» es la formulación más directa y clara en español.
- source_word: בָזֶה
  english_pob_choice: here
  chosen_spanish: aquí
  alternatives_spanish:
  - en este lugar
  - en este sitio
  lexicon: HALOT
  rationale: El demostrativo tiene valor deíctico local; «aquí» reproduce la referencia inmediata al lugar presente sin añadir matices innecesarios.
- source_word: עַד אֲשֶׁר נָשׁוּב אֲלֵיכֶם
  english_pob_choice: until we return to you
  chosen_spanish: hasta que volvamos a ustedes
  alternatives_spanish:
  - hasta que regresemos a ustedes
  - hasta nuestro regreso a ustedes
  lexicon: HALOT
  rationale: La cláusula temporal expresa retorno de primera persona plural. «Volvamos» conserva el valor prospectivo y el paralelo natural con la orden dada.
- source_word: וְהִנֵּה
  english_pob_choice: behold
  chosen_spanish: Y miren
  alternatives_spanish:
  - Y he aquí
  - Y behold
  lexicon: HALOT
  rationale: La partícula introduce atención sobre lo que sigue. «Y miren» es idiomático y mantiene el impulso discursivo; se deja constancia de que el POB inglés usó «behold» por registro.
- source_word: עִמָּכֶם
  english_pob_choice: are with you
  chosen_spanish: están con ustedes
  alternatives_spanish:
  - están entre ustedes
  - permanecen con ustedes
  lexicon: HALOT
  rationale: La preposición עִם señala presencia/compañía. «Están con ustedes» es la forma más directa y conserva el sentido relacional.
- source_word: מִי בַעַל דְּבָרִים
  english_pob_choice: Whoever has a matter
  chosen_spanish: Quien tenga un asunto
  alternatives_spanish:
  - Quien tenga un caso
  - Quien tenga una disputa
  - Quien tenga algo que resolver
  lexicon: HALOT
  rationale: בַעַל דְּבָרִים en contexto legal puede referirse a alguien con una causa, pleito o asunto pendiente. «Asunto» mantiene la amplitud semántica que el revisado inglés buscó con «matter», sin reducirlo obligatoriamente a un pleito judicial.
- source_word: יִגַּשׁ אֲלֵהֶם
  english_pob_choice: let him approach them
  chosen_spanish: que se acerque a ellos
  alternatives_spanish:
  - que se presente ante ellos
  - que vaya a ellos
  - que se acerque a ellos
  lexicon: HALOT
  rationale: El imperfecto tiene fuerza exhortativa/jussiva. «Que se acerque a ellos» refleja la instrucción con un sujeto singular genérico, manteniendo la política de precisión gramatical del proyecto.
theological_decisions:
- issue: Sujeto singular genérico en instrucción legal
  english_pob_reading: Whoever has a matter, let him approach them.
  chosen_spanish_reading: Quien tenga un asunto, que se acerque a ellos.
  alternative_spanish_readings:
  - Quien tenga un asunto, que ellos se acerquen a ellos.
  - Los que tengan un asunto, que se acerquen a ellos.
  rationale: El hebreo usa un singular genérico (מִי ... יִגַּשׁ). Se preserva el singular en español («quien... se acerque») para no borrar la forma del mandato ni convertirlo en un plural genérico no explicitado por el texto.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión más reciente del POB inglés, que elevó el registro de «look» a «behold» y prefirió «matter» frente a «dispute». La versión española sigue ese ajuste al usar una partícula discursiva más formal («Y miren») y «asunto» en lugar de «disputa», sin perder el alcance posible del hebreo בעל דברים.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como convención del proyecto cuando aparezca el nombre divino; en este versículo no ocurre.
  - Se preserva el singular genérico en «Quien tenga... que se acerque», conforme a la política de precisión gramatical.
  - «Ancianos» se usa como término institucional, no como simple referencia etaria.
  - El cierre «a ellos» refleja el plural del referente (Aarón y Hur) sin añadir explicación no presente en el texto.
