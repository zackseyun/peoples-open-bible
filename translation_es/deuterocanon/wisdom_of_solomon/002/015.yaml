translation:
  language: es
  text: porque su vida es distinta a la de los demás[a], y sus sendas son diferentes.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «porque su modo de vida es distinto al de los demás, y sus sendas son diferentes»'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀνόμοιος
  english_pob_choice: unlike
  chosen_spanish: distinta de
  alternatives_spanish:
  - desemejante de
  - diferente de
  - no semejante a
  lexicon: LSJ
  rationale: ἀνόμοιος expresa desemejanza o falta de semejanza. En español, «distinta de» suena natural y conserva la comparación con «los demás» sin volver el enunciado pesado. «Desemejante de» sería más literal, pero menos fluido.
- source_word: βίος
  english_pob_choice: life
  chosen_spanish: vida
  alternatives_spanish:
  - modo de vida
  - manera de vivir
  lexicon: LSJ
  rationale: βίος puede referirse a la vida entendida como curso o manera de vivir. Se mantiene «vida» porque es la opción directa del griego y deja que la segunda cola, sobre las sendas, aclare que se trata del comportamiento.
- source_word: ἐξηλλαγμέναι
  english_pob_choice: are different
  chosen_spanish: son diferentes
  alternatives_spanish:
  - están cambiadas
  - han sido alteradas
  - están alteradas
  lexicon: LSJ
  rationale: 'El participio perfecto pasivo comunica un estado resultante: algo que ha quedado distinto. «Son diferentes» comunica bien ese estado en español y evita un calco rígido como «están cambiadas», que puede sonar menos idiomático aquí.'
- source_word: τρίβοι
  english_pob_choice: ways
  chosen_spanish: sendas
  alternatives_spanish:
  - caminos
  - rutas
  - maneras
  lexicon: LSJ
  rationale: τρίβοι son literalmente caminos o sendas transitadas, y en sentido figurado pueden ser las maneras de obrar. «Sendas» conserva la imagen concreta y mantiene la correspondencia con la primera cláusula sobre la vida.
theological_decisions:
- issue: Mantener el contraste moral sin explicitarlo en exceso
  english_pob_reading: Retain the concrete terms 'life' and 'paths' without interpretive expansion.
  chosen_spanish_reading: Retener «vida» y «sendas» sin ampliar a una paráfrasis moralizante.
  alternative_spanish_readings:
  - porque su manera de vivir es distinta de la de los demás, y sus conductas son diferentes
  rationale: El versículo presenta la crítica mediante lenguaje concreto e imagen de caminos. La traducción conserva esa forma para no añadir más interpretación de la que el griego ofrece, aunque el sentido moral quede claro por el contexto.
  doctrine_reference: Translation philosophy §§1, 3, 6
translation_notes:
  revision_awareness: El borrador sigue la revisión más reciente del POB en inglés, que prefirió una formulación más natural para ἐξηλλαγμέναι («are different») sin perder el valor resultativo del perfecto pasivo. Por eso se evita «están cambiadas» y se opta por una equivalencia española igualmente natural.
  spanish_consistency_notes:
  - Se mantiene «vida» para βίος, en paralelo con la decisión inglesa, y «sendas» para τρίβοι para conservar la metáfora de caminos.
  - 'Se usa «demás» para τοῖς ἄλλοις, con una construcción natural en español: «la de los demás».'
  - La nota conserva la alternativa lexical relevante del inglés POB, adaptándola a un español publicable sin añadir glosa doctrinal.
