review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien la estructura del hebreo: caso alternativo, pasivo de ''hacer saber'', referencia a ''pecado'' en ambas ocurrencias de חַטָּאת, y la especificación de una cabra hembra sin defecto como ofrenda. Sin embargo, la frase ''una cabra hembra'' suena poco idiomática en español bíblico-natural; conviene ajustar el orden y la formulación para conservar la especificación femenina de נְקֵבָה sin torpeza.'
  spanish_quality_summary: La redacción es clara y fiel, pero 'cabra hembra' es redundante de manera poco natural en español. También mejora la fluidez quitar una coma innecesaria tras 'ofrenda'. 'Se le da a conocer' y 'por el pecado que ha cometido' funcionan bien y mantienen la ambigüedad/pasividad documentada.
  glossary_alignment: No hay conflictos con la terminología del proyecto. 'Pecado' para חַטָּאת en ambas ocurrencias está correctamente preservado según la decisión teológica documentada. 'Ofrenda' para קָרְבָּנוֹ y 'sin defecto' para תְּמִימָה también están bien alineados.
  issues:
  - severity: medium
    issue: '''una cabra hembra'' suena poco natural en español'
    rationale: Aunque reproduce la doble marcación de sexo del hebreo, en español resulta más idiomático 'una cabra, hembra' o mejor 'una cabra sin defecto, hembra', o 'una cabra hembra sin defecto' con menor naturalidad. Se debe conservar la especificación explícita de נְקֵבָה, pero con mejor castellano.
  - severity: low
    issue: Coma innecesaria en 'como su ofrenda, por el pecado'
    rationale: La pausa entorpece una frase ya cargada de complementos. Sin la coma, la línea fluye mejor y sigue siendo fiel al original.
  revised_spanish_text: O si se le da a conocer el pecado[a] que ha cometido, entonces traerá como su ofrenda por el pecado que ha cometido una cabra sin defecto, hembra.
  revised_footnotes:
