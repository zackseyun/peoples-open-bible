translation:
  language: es
  text: David reinó sobre todo Israel[a], y David administraba justicia y rectitud a todo su pueblo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O bien, «administraba justicia y hacía lo que es recto». La pareja hebrea «justicia y rectitud» es una expresión estable para describir el gobierno real ideal.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּמְלֹךְ
  english_pob_choice: reigned
  chosen_spanish: reinó
  alternatives_spanish:
  - fue rey
  - gobernó como rey
  lexicon: HALOT
  rationale: El verbo מלך en esta forma indica ejercicio real de la realeza. «Reinó» es el equivalente natural en español y preserva la idea de reinar, no solo de llegar al trono.
- source_word: עַל כָּל יִשְׂרָאֵל
  english_pob_choice: over all Israel
  chosen_spanish: sobre todo Israel
  alternatives_spanish:
  - sobre todo el Israel
  - sobre la totalidad de Israel
  lexicon: HALOT
  rationale: «Sobre» expresa bien la relación de dominio propia de מלך con עַל. «Todo Israel» mantiene el alcance total sin añadir explicaciones.
- source_word: וַיְהִי ... עֹשֶׂה
  english_pob_choice: was administering
  chosen_spanish: administraba
  alternatives_spanish:
  - estaba administrando
  - hacía
  lexicon: HALOT
  rationale: La construcción con וַיְהִי + participio describe una acción continua o habitual. En español, el imperfecto «administraba» transmite mejor esa duratividad que un perfecto simple.
- source_word: מִשְׁפָּט
  english_pob_choice: justice
  chosen_spanish: justicia
  alternatives_spanish:
  - juicio
  - sentencia
  lexicon: HALOT
  rationale: En contexto real y gubernamental, מִשְׁפָּט se refiere a la administración correcta de justicia. «Justicia» conserva ese sentido jurídico y ético.
- source_word: וּצְדָקָה
  english_pob_choice: righteousness
  chosen_spanish: rectitud
  alternatives_spanish:
  - justicia
  - justicia y rectitud
  lexicon: HALOT
  rationale: צְדָקָה puede rendirse como «justicia» o «rectitud». Aquí se eligió «rectitud» para conservar la diferencia con מִשְׁפָּט y reflejar el matiz de orden moral correcto.
- source_word: לְכָל עַמּוֹ
  english_pob_choice: to all his people
  chosen_spanish: a todo su pueblo
  alternatives_spanish:
  - para todo su pueblo
  - a todo el pueblo
  lexicon: HALOT
  rationale: La preposición ל se entiende de forma natural en español como «a» en este contexto de acción dirigida al pueblo. El sufijo posesivo se refleja en «su pueblo».
theological_decisions:
- issue: La pareja real מִשְׁפָּט וּצְדָקָה
  english_pob_reading: justice and righteousness
  chosen_spanish_reading: justicia y rectitud
  alternative_spanish_readings:
  - justicia y justicia
  - juicio y rectitud
  - justicia y equidad
  rationale: La expresión hebrea es una fórmula de gobierno ideal. Mantener dos términos distintos preserva la tensión entre el orden jurídico correcto y la integridad moral del rey; «rectitud» evita repetir «justicia» y deja visible el paralelismo.
  doctrine_reference: Translation philosophy §5 (Consistency of key terms, or documented exception)
- issue: Valor aspectual de וַיְהִי ... עֹשֶׂה
  english_pob_reading: was administering
  chosen_spanish_reading: administraba
  alternative_spanish_readings:
  - estaba administrando
  - administró
  rationale: El inglés POB opta por una lectura durativa. En español, el imperfecto comunica mejor la acción habitual o continua sin convertirla en un evento puntual.
  doctrine_reference: Translation philosophy §4 (Aspecto verbal y flujo narrativo)
translation_notes:
  revision_awareness: El borrador sigue la lectura final del inglés POB («to all his people») y conserva la equivalencia optimal con ajuste natural del aspecto verbal al imperfecto español. También mantiene la distinción semántica entre מִשְׁפָּט y צְדָקָה, en lugar de fusionarlos en una sola idea.
  spanish_consistency_notes:
  - Se usó «Yahvé» como norma general del proyecto, pero este versículo no contiene el Tetragrámaton.
  - «Justicia» se reservó para מִשְׁפָּט y «rectitud» para צְדָקָה para conservar la pareja semántica.
  - «Reinó» reproduce el valor real de מלך sin introducir una perífrasis innecesaria.
  - La nota al pie ofrece la alternativa «lo que es recto», correspondiente al sentido reconocido en el audit trail inglés.
