  glossary_alignment: No hay conflictos con la terminología principal del proyecto. Se conserva la distinción «pueblos» / «naciones» conforme al hebreo. Las notas léxicas están bien encaminadas, pero la nota [b] debe alinearse con una redacción principal que no añada «verte».
