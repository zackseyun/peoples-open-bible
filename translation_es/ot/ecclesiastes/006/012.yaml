review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español sigue bien el sentido global del hebreo y del POB inglés: mantiene la doble pregunta retórica, conserva la idea de limitación de la vida con «el número de los días», traduce הֶבֶל con una expresión dinámica y preserva la apertura de «qué habrá después de él». Sin embargo, hay ajustes necesarios para mayor fidelidad idiomática y para alinear mejor una fórmula clave de Eclesiastés.'
  spanish_quality_summary: El texto es mayormente claro y digno, pero «debajo del sol» suena menos idiomático para la fórmula estable תַּחַת הַשָּׁמֶשׁ que el español bíblico natural «bajo el sol». Además, «como sombra» funciona, pero «como una sombra» suena más natural en español. El segundo «Porque» puede mantenerse por cercanía al hebreo, aunque el conjunto mejora con pequeños retoques.
  glossary_alignment: No hay términos del glosario mayor en juego como Yahvé/Mesías. La decisión «vida fugaz» para הֶבֶל concuerda con la rationale documentada, y la nota léxica está bien preservada. «El hombre» para אָדָם es aceptable en contexto sapiencial genérico. La principal mejora terminológica es usar «bajo el sol» para la fórmula recurrente de Eclesiastés.
  issues:
  - severity: medium
    issue: «debajo del sol» para תַּחַת הַשָּׁמֶשׁ
    rationale: Aunque semánticamente posible, la fórmula característica de Eclesiastés se expresa de modo más natural y reconocible en español como «bajo el sol». Esto también refleja mejor la decisión inglesa auditada «under the sun» como refrán técnico del libro.
  - severity: low
    issue: «como sombra» suena algo incompleto en español
    rationale: El hebreo permite la comparación sin artículo, pero en español «como una sombra» resulta más natural y fluido sin alterar el sentido.
  - severity: low
    issue: Anclaje de la nota en «vida[a]» en vez de «fugaz[a]» o «vida fugaz[a]»
    rationale: La nota explica específicamente הֶבֶל, que en la frase se vierte por «vida fugaz». Conviene anclar el marcador al sintagma completo o al adjetivo que carga el matiz léxico, no a «vida» aisladamente.
  revised_spanish_text: Porque, ¿quién sabe qué es bueno para el hombre en la vida, durante el número de los días de su vida fugaz[a], que él pasa como una sombra? Porque, ¿quién puede decirle al hombre qué habrá después de él, bajo el sol?
  revised_footnotes:
