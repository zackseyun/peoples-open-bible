translation:
  language: es
  text: 'He aquí: aquella noche sea estéril; que no entre en ella grito de alegría[a].'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «canto»; o «clamor de júbilo».'
    reason: lexical_alternative
lexical_decisions:
- source_word: הִנֵּה
  english_pob_choice: Behold
  chosen_spanish: He aquí
  alternatives_spanish:
  - Mira
  - Miren
  - He ahí
  lexicon: HALOT
  rationale: La interjección introductoria exige atención enfática. «He aquí» conserva el tono formal y deíctico de «Behold» sin sonar arcaica en español bíblico actual.
- source_word: הַ/לַּיְלָה הַ/הוּא
  english_pob_choice: that night
  chosen_spanish: aquella noche
  alternatives_spanish:
  - esa noche
  - la noche aquella
  - aquella misma noche
  lexicon: HALOT
  rationale: El demostrativo señala una noche específica ya maldita en el contexto. «Aquella noche» comunica distancia y referencia precisa de manera natural.
- source_word: יְהִי
  english_pob_choice: may ... be
  chosen_spanish: sea
  alternatives_spanish:
  - que sea
  - ojalá sea
  - sea que
  lexicon: HALOT
  rationale: El imperfecto jussivo expresa deseo/curse wish. En español, «que sea» o el subjuntivo simple «sea» transmiten bien la fuerza optativa; aquí se integra en la serie de deseos imprecatorios.
- source_word: גַלְמוּד
  english_pob_choice: barren
  chosen_spanish: estéril
  alternatives_spanish:
  - barrena
  - desolada
  - vacía
  lexicon: HALOT
  rationale: El adjetivo puede abarcar barrenness/fruitlessness/emptiness. «Estéril» mantiene la fuerza de privación y funciona bien en español para una noche personificada bajo maldición.
- source_word: אַל
  english_pob_choice: let no
  chosen_spanish: que no
  alternatives_spanish:
  - no permitas que
  - no haya
  lexicon: HALOT
  rationale: La partícula negativa con fuerza volitiva continúa el ruego maldiciente. «Que no» reproduce de forma natural el valor exhortativo/jussivo en español.
- source_word: תָּבֹא
  english_pob_choice: come
  chosen_spanish: entre
  alternatives_spanish:
  - venga
  - llegue
  - pase
  lexicon: HALOT
  rationale: Con בּוֹ el verbo tiene sentido espacial de entrar/venir dentro. «Entre» conserva la imagen de movimiento hacia el interior mejor que «venga».
- source_word: רְנָנָה
  english_pob_choice: joyful cry
  chosen_spanish: grito de alegría
  alternatives_spanish:
  - canto alegre
  - clamor de júbilo
  - alegría
  lexicon: HALOT
  rationale: El sustantivo puede ser clamor, grito jubiloso o canto. «Grito de alegría» conserva el componente vocal y celebrativo sin imponer necesariamente la idea de canto.
- source_word: בּוֹ
  english_pob_choice: into it
  chosen_spanish: en ella
  alternatives_spanish:
  - dentro de ella
  - en eso
  - sobre ella
  lexicon: HALOT
  rationale: El sufijo pronominal retoma «noche», femenino en español. «En ella» es idiomático y refleja el valor locativo del hebreo con naturalidad.
translation_notes:
  revision_awareness: 'La redacción sigue el flujo imprecatorio del hebreo con subjuntivo volitivo en español. Frente al audit trail inglés, se conservó el registro formal de «Behold» con «He aquí», pero se evitó el calco rígido y se usó una sintaxis española natural: «que aquella noche sea estéril; que no entre en ella grito de alegría».'
  spanish_consistency_notes:
  - Se mantuvo «noche» en femenino para concordar con «ella».
  - «Estéril» se eligió por su fuerza semántica cercana a barrenness; no se usó «desolada» para no desplazar el foco hacia ruina geográfica.
  - «Grito de alegría» preserva la vocalidad del término hebreo sin forzar «canto», que sería una opción válida pero más específica.
  - La puntuación con dos puntos implícita en la apertura enfática se resolvió mediante pausa con punto y coma para conservar fluidez en español.
