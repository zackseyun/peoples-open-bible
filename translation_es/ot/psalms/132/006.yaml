translation:
  language: es
  text: He aquí[a], oímos hablar de ello en Efrata; lo hallamos en los campos de Jaar.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, «en los campos del bosque». El hebreo יָעַר suele significar «bosque», pero aquí probablemente funciona como elemento de un nombre de lugar, con alusión a Quiriat-jearim.
    reason: lexical_alternative
lexical_decisions:
- source_word: הִנֵּה
  english_pob_choice: Behold
  chosen_spanish: He aquí
  alternatives_spanish:
  - Mira
  - Miren
  - Ved
  lexicon: HALOT
  rationale: La partícula deíctica pide una apertura atencional. En español bíblico y reverente, «He aquí» conserva mejor el tono formal del cierre revisado del POB inglés que «Mira», sin caer en una paráfrasis explicativa.
- source_word: שְׁמַֽעֲנ֥וּ/הָ
  english_pob_choice: we heard of it
  chosen_spanish: oímos de ello
  alternatives_spanish:
  - lo oímos
  - oímos hablar de ello
  lexicon: HALOT
  rationale: El sufijo femenino apunta al arca en contexto, pero el hebreo no repite el sustantivo. «Oímos de ello» mantiene la referencia pronominal y evita introducir «el arca» en el texto principal.
- source_word: בְ/אֶפְרָ֑תָה
  english_pob_choice: in Ephrathah
  chosen_spanish: en Efrata
  alternatives_spanish:
  - en Efratah
  - en Ephrata
  lexicon: HALOT
  rationale: Se translitera el topónimo en forma natural al español. «En» reproduce el valor locativo de la preposición sin sobreinterpretar el referente exacto.
- source_word: מְ֝צָאנ֗וּ/הָ
  english_pob_choice: we found it
  chosen_spanish: lo hallamos
  alternatives_spanish:
  - lo encontramos
  - lo descubrimos
  lexicon: HALOT
  rationale: «Hallamos» es un equivalente sobrio y directo de מצא. El pronombre objeto masculino singular se usa para la referencia contextual al arca, sin explicitarla en la línea principal.
- source_word: בִּ/שְׂדֵי
  english_pob_choice: in the fields of
  chosen_spanish: en los campos de
  alternatives_spanish:
  - en las tierras de
  - en los parajes de
  lexicon: HALOT
  rationale: El constructo plural de שׂדה se expresa con naturalidad como «campos de». Es la opción más cercana y menos interpretativa en español.
- source_word: יָעַר
  english_pob_choice: Jaar
  chosen_spanish: Jaar
  alternatives_spanish:
  - el bosque
  - la selva
  lexicon: HALOT
  rationale: Se conserva como nombre propio en el texto principal, siguiendo la lectura toponímica del POB inglés y la posible alusión a Quiriat-jearim. La acepción léxica común se reserva para la nota.
theological_decisions:
- issue: Referente pronominal femenino
  english_pob_reading: The suffixes are rendered neutrally as 'it,' referring contextually to the ark/covenant chest without expanding the text.
  chosen_spanish_reading: Los sufijos se expresan neutralmente como «ello/lo», con referencia contextual al arca sin añadirla al versículo.
  alternative_spanish_readings:
  - el arca
  - el arca del pacto
  rationale: El hebreo usa sufijos pronominales y no repite el nombre del objeto. En español, «ello/lo» conserva la cohesión textual y respeta el límite del hebreo, dejando que el contexto identifique el referente.
  doctrine_reference: Translation philosophy §1, §3
- issue: יָעַר como topónimo o sustantivo común
  english_pob_reading: Treat יָעַר as a proper name ('Jaar') in the main text.
  chosen_spanish_reading: Tratar יָעַר como nombre propio («Jaar») en el texto principal.
  alternative_spanish_readings:
  - el bosque
  - el bosque de Jaar
  rationale: La forma puede funcionar toponímicamente y la tradición auditada del POB inglés privilegia esa lectura. Mantener «Jaar» evita cerrar indebidamente la ambigüedad y deja la alternativa léxica para la nota.
  doctrine_reference: Translation philosophy §2, §3
translation_notes:
  revision_awareness: El borrador sigue la decisión revisada del POB inglés de usar un registro más formal en la interjección inicial («Behold»). También conserva la ambigüedad documentada del objeto pronominal y de יָעַר, sin expandir el versículo más allá de lo que exige el hebreo.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma del proyecto solo cuando el texto lo requiere; este versículo no contiene el nombre divino.
  - Se evita «Cristo/Mesías» porque no aparece en el texto.
  - Se conserva un registro bíblico formal, pero con sintaxis española natural.
  - La nota a cubre la única alternativa léxica significativa del versículo; el marcador aparece anclado en el texto principal.
