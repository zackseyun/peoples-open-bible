translation:
  language: es
  text: Cuando el hombre salió hacia el oriente, con la cuerda de medir en su mano[a], midió mil codos y me hizo pasar por el agua, agua hasta los tobillos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literalmente, «aguas de tobillos», es decir, agua que llegaba hasta los tobillos.
    reason: lexical_alternative
lexical_decisions:
- source_word: בְּ/צֵאת
  english_pob_choice: As ... went out
  chosen_spanish: Mientras ... salía
  alternatives_spanish:
  - Cuando ... salía
  - Al salir
  lexicon: HALOT
  rationale: El infinitivo constructo con ב expresa tiempo de simultaneidad o circunstancia. «Mientras» conserva el valor temporal y suena natural en español sin perder la relación con el avance narrativo.
- source_word: הָ/אִ֥ישׁ
  english_pob_choice: the man
  chosen_spanish: el hombre
  alternatives_spanish:
  - la persona
  lexicon: HALOT
  rationale: אִישׁ aquí designa de manera directa al varón ya introducido en el contexto. «El hombre» es preciso y mantiene la referencia narrativa concreta.
- source_word: קָדִ֖ים
  english_pob_choice: eastward
  chosen_spanish: hacia el oriente
  alternatives_spanish:
  - al oriente
  - hacia el este
  lexicon: HALOT
  rationale: El término funciona de manera direccional. «Hacia el oriente» conserva la orientación espacial con registro bíblico claro y comprensible.
- source_word: וְ/קָ֣ו
  english_pob_choice: with a measuring line
  chosen_spanish: con la cuerda de medir
  alternatives_spanish:
  - con una línea de medir
  - con un cordel de medir
  lexicon: HALOT
  rationale: קָו en este contexto es un instrumento de medición. «Cuerda de medir» comunica la función del objeto de forma natural en español y evita una expresión demasiado técnica o fría.
- source_word: בְּ/יָד֑/וֹ
  english_pob_choice: in his hand
  chosen_spanish: en su mano
  alternatives_spanish:
  - en la mano
  - en su poder
  lexicon: HALOT
  rationale: La imagen es concreta y corporal. «En su mano» reproduce directamente la escena visionaria y el valor instrumental del hebreo.
- source_word: וַ/יָּ֤מָד
  english_pob_choice: he measured
  chosen_spanish: midió
  alternatives_spanish:
  - y midió
  lexicon: HALOT
  rationale: El wayyiqtol avanza la narración; en español puede expresarse con el verbo simple sin repetir innecesariamente la conjunción.
- source_word: אֶ֨לֶף֙
  english_pob_choice: a thousand
  chosen_spanish: mil
  alternatives_spanish:
  - mil unidades
  lexicon: HALOT
  rationale: Número cardinal estándar. En español el artículo indefinido no es necesario para la fluidez del conteo.
- source_word: בָּֽ/אַמָּ֔ה
  english_pob_choice: cubits
  chosen_spanish: codos
  alternatives_spanish:
  - por codos
  - por el codo
  lexicon: HALOT
  rationale: אַמָּה es la unidad de medida tradicional «codo». «Mil codos» expresa con exactitud la medida y es la equivalencia bíblica asentada en español.
- source_word: וַ/יַּעֲבִרֵ֥/נִי
  english_pob_choice: led me through
  chosen_spanish: me hizo pasar
  alternatives_spanish:
  - me condujo
  - me llevó a través
  lexicon: HALOT
  rationale: El hiphil de עבר indica hacer pasar, causar que alguien cruce. «Me hizo pasar» preserva la causatividad con fidelidad; en español bíblico es claro y sobrio.
- source_word: בַ/מַּ֖יִם
  english_pob_choice: through the water
  chosen_spanish: por el agua
  alternatives_spanish:
  - a través del agua
  - en el agua
  lexicon: HALOT
  rationale: El movimiento es de cruce o paso por dentro del agua. «Por el agua» mantiene la dirección del tránsito con una formulación natural.
- source_word: מֵ֥י אָפְסָֽיִם
  english_pob_choice: water up to the ankles
  chosen_spanish: agua hasta los tobillos
  alternatives_spanish:
  - aguas hasta los tobillos
  - agua a la altura de los tobillos
  lexicon: HALOT
  rationale: La expresión literal es «aguas de tobillos», idiomática para agua que llega a los tobillos. «Agua hasta los tobillos» comunica con claridad el sentido sin perder la imagen corporal del hebreo.
theological_decisions:
- issue: Conservación de la imagen literal frente a la explicación idiomática
  english_pob_reading: water up to the ankles, with a footnote explaining the literal phrase
  chosen_spanish_reading: agua hasta los tobillos, con nota que preserva la literalidad idiomática
  alternative_spanish_readings:
  - aguas de tobillos
  - agua a la altura de los tobillos
  rationale: El hebreo dice literalmente «aguas de tobillos». En el texto principal conviene una formulación clara y natural, pero la nota debe conservar la tensión entre la imagen literal y su sentido idiomático, como hace la POB en inglés.
  doctrine_reference: Principio de transparencia textual y respeto por la imagen original
- issue: Mantener la escena visionaria concreta sin espiritualizarla
  english_pob_reading: a man with a measuring line in his hand led me through the water
  chosen_spanish_reading: un hombre con una cuerda de medir en su mano me hizo pasar por el agua
  alternative_spanish_readings:
  - un hombre con una línea de medir
  - un hombre con un cordel de medir
  rationale: La escena es concreta y visual. No conviene convertirla en una abstracción; la traducción debe retener el carácter corporal y narrativo del recorrido medido.
  doctrine_reference: Lectura literal-histórica del texto profético
translation_notes:
  revision_awareness: 'El pasaje está en alto acuerdo con la revisión inglesa más reciente: no se registraron cambios aplicados y la solución semántica estable es la misma. La versión española sigue de cerca esa lectura auditada, manteniendo la equivalencia óptima y la nota explicativa sobre la expresión idiomática.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como convención del proyecto cuando aparezca el nombre divino; este versículo no lo contiene.
  - Se traduce קָו como «cuerda de medir» para preservar su función instrumental en un registro natural.
  - Se conserva «codos» para la unidad de medida bíblica, por ser el equivalente tradicional y exacto en español.
  - Se evita añadir elementos no presentes en el hebreo; el sentido de profundidad se expresa solo hasta los tobillos, como en la POB inglesa.
