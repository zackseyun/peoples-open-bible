translation:
  language: es
  text: Porque así como un cuervo está entre el cielo y la tierra, así también, cuando el fuego cae en una casa de dioses de madera, recubiertos de oro o recubiertos de plata[a], sus sacerdotes huirán y se pondrán a salvo[b], pero ellos mismos serán quemados como vigas en medio.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'un templo de dioses de madera, recubiertos de oro o recubiertos de plata'.
    reason: lexical_alternative
  - marker: b
    text: La comparación inicial es breve en griego; el sentido es que los ídolos quedan tan indefensos como un cuervo expuesto cuando llega la calamidad.
    reason: cultural_note
lexical_decisions:
- source_word: ὥσπερ
  english_pob_choice: just as ... so also
  chosen_spanish: Porque así como ... así también
  alternatives_spanish:
  - como ... también
  - tal como ... así también
  lexicon: LSJ
  rationale: Reproduce la comparación correlativa en español sin añadir explicación ajena al griego y manteniendo el paralelismo retórico.
- source_word: κορώνη
  english_pob_choice: crow
  chosen_spanish: cuervo
  alternatives_spanish:
  - corneja
  - ave
  lexicon: LSJ
  rationale: El griego designa un ave concreta; 'cuervo' es la opción más natural y transparente en español para conservar la imagen puntual.
- source_word: ἀνὰ μέσον τοῦ οὐρανοῦ καὶ τῆς γῆς
  english_pob_choice: between heaven and earth
  chosen_spanish: entre el cielo y la tierra
  alternatives_spanish:
  - en medio del cielo y de la tierra
  - entre el cielo y la tierra
  lexicon: LSJ
  rationale: Es la expresión espacial idiomática más clara en español y preserva el contraste cósmico del original.
- source_word: ἐμπέσῃ
  english_pob_choice: falls into
  chosen_spanish: cae en
  alternatives_spanish:
  - cae dentro de
  - se mete en
  lexicon: LSJ
  rationale: Con πῦρ como sujeto, 'cae en' conserva la irrupción repentina del fuego sin volverla una paráfrasis interpretativa.
- source_word: οἰκίαν θεῶν
  english_pob_choice: a house of ... gods
  chosen_spanish: una casa de dioses
  alternatives_spanish:
  - un templo de dioses
  - una morada de dioses
  lexicon: LSJ
  rationale: Se mantiene 'casa' por fidelidad al sustantivo griego; 'templo' se reserva como alternativa contextual posible, pero no se incorpora al texto principal.
- source_word: ξύλινων
  english_pob_choice: wooden
  chosen_spanish: de madera
  alternatives_spanish:
  - maderosos
  - hechos de madera
  lexicon: LSJ
  rationale: Traducción directa, natural y sobria del adjetivo material.
- source_word: περιχρύσων
  english_pob_choice: gold-covered
  chosen_spanish: recubiertos de oro
  alternatives_spanish:
  - cubiertos de oro
  - dorado
  lexicon: LSJ
  rationale: '''Recubiertos de oro'' conserva el valor compositivo de ''rodeado/cubierto con oro'' sin perder la imagen material del texto.'
- source_word: περιηργύρων
  english_pob_choice: silver-covered
  chosen_spanish: recubiertos de plata
  alternatives_spanish:
  - cubiertos de plata
  - plateados
  lexicon: LSJ
  rationale: Mantiene el paralelismo con 'recubiertos de oro' y la idea de revestimiento externo.
- source_word: φεύξονται καὶ διασωθήσονται
  english_pob_choice: will flee and be saved
  chosen_spanish: huirán y serán salvados
  alternatives_spanish:
  - huirán y se salvarán
  - escaparán y serán salvados
  lexicon: LSJ
  rationale: 'Conserva los dos verbos distintos: primero la fuga, luego el resultado de salvación/liberación. ''Serán salvados'' refleja bien el pasivo griego.'
- source_word: δοκοὶ μέσοι
  english_pob_choice: beams in the middle
  chosen_spanish: vigas en medio
  alternatives_spanish:
  - vigas del medio
  - vigas centrales
  lexicon: LSJ
  rationale: Sigue la revisión inglesa más natural ('beams in the middle') y evita una abstracción excesiva; 'vigas' comunica el elemento estructural en español actual.
- source_word: κατακαυθήσονται
  english_pob_choice: will be burned up
  chosen_spanish: serán quemados
  alternatives_spanish:
  - serán consumidos por el fuego
  - serán abrasados
  lexicon: LSJ
  rationale: En español, 'quemados' transmite el verbo intensivo sin sobrecargar la frase; el contexto de destrucción total ya queda reforzado por la comparación final.
theological_decisions:
- issue: Comparación abrupta y burla contra los ídolos
  english_pob_reading: Retain the simile with minimal smoothing; the sense is that the idols are as helpless as an exposed crow when disaster comes.
  chosen_spanish_reading: Conservar la comparación con un enlace natural en español, sin explicitar más de lo que dice el texto.
  alternative_spanish_readings:
  - Omitir la comparación inicial por ser fragmentaria
  - Explicar abiertamente el punto de la imagen del cuervo
  rationale: La retórica irónica del texto se preserva mejor dejando la comparación visible. El español puede hacerla fluida sin convertirla en comentario interpretativo.
  doctrine_reference: Translation philosophy §§1, 3, 6
- issue: 'οἰκίαν θεῶν: ''casa'' frente a ''templo'''
  english_pob_reading: Use 'house of ... gods' in the main text; a footnote preserves the natural contextual alternative.
  chosen_spanish_reading: Usar 'casa de dioses' en el texto principal.
  alternative_spanish_readings:
  - templo de dioses
  - santuario de dioses
  rationale: El griego dice literalmente 'casa'; conservarlo respeta la forma del original y evita introducir una equivalencia más interpretativa en el texto principal.
  doctrine_reference: Translation philosophy §§1, 5, 6
translation_notes:
  revision_awareness: La redacción sigue la revisión más reciente del inglés POB que prefirió 'beams in the middle' para δοκοὶ μέσοι. En español se reflejó con 'vigas en medio' para mantener naturalidad y cercanía semántica. También se preservó el tono breve y comparativo del griego, sin expandir el sentido más allá del texto fuente.
  spanish_consistency_notes:
  - Se mantuvo 'cielo y tierra' en vez de 'cielo y la tierra' para sonar idiomático y estable en el registro bíblico, sin recurrir a sustituciones litúrgicas no requeridas.
  - Se evitó 'SEÑOR' porque el pasaje no contiene el nombre divino; el término relevante es θεῶν, traducido aquí como 'dioses'.
  - '''Recubiertos de oro/plata'' conserva el paralelismo y la materialidad del original mejor que ''dorados/plateados'' en este contexto.'
  - '''Serán salvados'' reproduce el pasivo de διασωθήσονται sin introducir una formulación doctrinal más amplia.'
  - '''Vigas en medio'' sigue la revisión inglesa y mantiene la imagen arquitectónica sin hacerla más técnica de lo que exige el griego.'
