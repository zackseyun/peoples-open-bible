revisions:
- from: También[a], no pongas tu corazón en toda palabra que se diga, para que no oigas a tu esclavo[b] maldiciéndote.
  to: También[a], no des tu corazón a toda palabra que se diga, no sea que oigas a tu siervo[b] maldiciéndote.
  rationale: Se ajusta la cláusula de advertencia a «no sea que oigas», que comunica mejor el valor preventivo del hebreo que «para que no oigas». Se alinea עֶבֶד con la decisión auditada de la POB usando «tu siervo» en el texto principal y conservando «tu esclavo» como alternativa en nota. También se mejora la fidelidad idiomática de אַל תִּתֵּן לִבֶּךָ con «no des tu corazón a», manteniendo la imagen antropológica del original y una lectura natural en español.
