translation:
  language: es
  text: 'Y le dijo: «Yo soy Yahvé[a], que te saqué de Ur de los caldeos para darte esta tierra en posesión»[b].'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «Yo soy Yahvé».
    reason: alternative_reading
  - marker: b
    text: O «para heredarla» o «para tomar posesión de ella».
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמֶר / וַיֹּאמֶר אֵלָיו
  english_pob_choice: And he said to him
  chosen_spanish: Y le dijo
  alternatives_spanish:
  - Entonces le dijo
  - Y dijo a él
  lexicon: HALOT
  rationale: El wayyiqtol narrativo avanza la acción en español con el perfecto simple; "le dijo" expresa naturalmente el objeto indirecto implícito en אֵלָיו sin calco innecesario.
- source_word: אֲנִי יְהוָה
  english_pob_choice: I am Yahweh
  chosen_spanish: Yo soy Yahvé
  alternatives_spanish:
  - Yo soy el SEÑOR
  - Yo soy Yahweh
  lexicon: HALOT
  rationale: El hebreo es una cláusula nominal; en español requiere verbo copulativo. Se usa "Yahvé" según la terminología del proyecto para יְהוָה, preservando el nombre del pacto en lugar de ocultarlo con una sustitución tradicional.
- source_word: אֲשֶׁר
  english_pob_choice: who
  chosen_spanish: que
  alternatives_spanish:
  - quien
  lexicon: HALOT
  rationale: En español, con antecedente personal y cláusula explicativa, "que" es natural y fiel; evita una personificación excesiva o un registro artificial.
- source_word: הוֹצֵאתִיךָ
  english_pob_choice: brought you out
  chosen_spanish: te saqué
  alternatives_spanish:
  - te traje fuera
  - te hice salir
  lexicon: HALOT
  rationale: El hiphil de יצא expresa hacer salir; "te saqué" conserva la fuerza causal y es más idiomático en español que una perífrasis más pesada.
- source_word: מֵאוּר כַּשְׂדִּים
  english_pob_choice: from Ur of the Chaldeans
  chosen_spanish: de Ur de los caldeos
  alternatives_spanish:
  - desde Ur de los caldeos
  - de Ur, tierra de los caldeos
  lexicon: HALOT
  rationale: Se mantiene el nombre propio y el gentilicio de forma transparente. "De" reproduce el origen sin añadir matices que el hebreo no exige.
- source_word: לָתֶת לְךָ
  english_pob_choice: to give you
  chosen_spanish: para darte
  alternatives_spanish:
  - para darte a ti
  - a fin de darte
  lexicon: HALOT
  rationale: El infinitivo de propósito con ל se expresa bien con "para" + infinitivo; "darte" conserva el destinatario de forma natural.
- source_word: אֶת הָאָרֶץ הַזֹּאת
  english_pob_choice: this land
  chosen_spanish: esta tierra
  alternatives_spanish:
  - esta tierra misma
  - la tierra esta
  lexicon: HALOT
  rationale: '"Tierra" es la opción más natural en español bíblico para אֶרֶץ en este contexto de promesa territorial. El demostrativo "esta" conserva la inmediatez del hebreo.'
- source_word: לְרִשְׁתָּהּ
  english_pob_choice: to possess it / to inherit it / to take possession of it
  chosen_spanish: para poseerla
  alternatives_spanish:
  - para heredarla
  - para tomar posesión de ella
  - para heredarla
  lexicon: HALOT
  rationale: Se traduce con "poseerla" para reflejar el valor de ירש en contexto de promesa de tierra sin reducirlo a "heredar" exclusivamente ni a una perífrasis más larga. El pronombre enclítico mantiene la referencia a "esta tierra".
theological_decisions:
- issue: Renderización del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: El texto hebreo usa explícitamente el Tetragrámaton. Siguiendo la norma del proyecto, se translitera como "Yahvé" para no enmascarar el nombre revelado. La forma "Yahvé" es la convención principal establecida para el texto español.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Valor de לְרִשְׁתָּהּ en la promesa de la tierra
  english_pob_reading: to possess it / to inherit it / to take possession of it
  chosen_spanish_reading: para poseerla
  alternative_spanish_readings:
  - para heredarla
  - para tomar posesión de ella
  rationale: El verbo ירש puede abarcar posesión e herencia. En este versículo, el punto es la entrega de la tierra prometida a Abram; "poseerla" mantiene la amplitud del término sin forzar la imagen legal-familiar de "heredar" ni hacer la frase demasiado explicativa.
  doctrine_reference: 'DOCTRINE.md: Lexical ambiguity — ירשׁ'
translation_notes:
  revision_awareness: Se siguió la lectura revisada del audit trail inglés en cuanto a la fluidez de la frase de propósito; en español se optó por una equivalencia igualmente natural con "para poseerla", manteniendo el pronombre para evitar pérdida de referencia explícita. No se requirieron cambios textuales adicionales respecto del sentido base del hebreo.
  spanish_consistency_notes:
  - Se mantiene Yahvé como forma principal para יְהוָה, conforme a la terminología del proyecto.
  - '"Tierra" se usa para אֶרֶץ en contexto de promesa territorial; evita el calco innecesario de "país".'
  - La cláusula relativa con "que" conserva la identidad del sujeto divino sin añadir interpretación.
  - '"Poseerla" preserva la ambigüedad de ירש entre posesión e herencia; las alternativas quedan documentadas en nota.'
  - La puntuación con comillas angulares es compatible con el estilo español bíblico moderno y distingue claramente el discurso directo.
