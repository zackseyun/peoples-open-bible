translation:
  language: es
  text: 'Entonces Moisés y Aarón reunieron a la congregación delante de la roca, y les dijo: «Escuchen ahora, rebeldes: ¿sacaremos[a] agua para ustedes de esta roca?»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «¿haremos salir agua para ustedes de esta roca?»
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּקְהִלוּ
  english_pob_choice: assembled
  chosen_spanish: reunieron
  alternatives_spanish:
  - convocaron
  - asamblea reunida
  lexicon: HALOT
  rationale: El hiphil de קהל expresa hacer que el grupo se reúna. En español, «reunieron» transmite de forma natural esa acción causativa sin perder el sentido de convocatoria colectiva.
- source_word: הַקָּהָל
  english_pob_choice: the congregation
  chosen_spanish: la congregación
  alternatives_spanish:
  - la asamblea
  - el pueblo reunido
  lexicon: HALOT
  rationale: «Congregación» es una opción natural y bíblica en español para el grupo reunido, y mantiene la referencia al colectivo sin introducir un matiz eclesiástico excesivo.
- source_word: אֶל פְּנֵי הַסָּלַע
  english_pob_choice: before the rock
  chosen_spanish: delante de la roca
  alternatives_spanish:
  - frente a la roca
  - ante la roca
  lexicon: HALOT
  rationale: La expresión idiomática apunta a ubicación frente a un objeto; «delante de la roca» conserva el sentido espacial de manera idiomática en español.
- source_word: וַיֹּאמֶר
  english_pob_choice: he said
  chosen_spanish: y él les dijo
  alternatives_spanish:
  - y dijo
  - y Moisés les dijo
  lexicon: HALOT
  rationale: El verbo hebreo está en singular, después de un sujeto compuesto. «Él» preserva esa forma sin añadir un nombre que el hebreo no repite en el verbo.
- source_word: שִׁמְעוּ נָא
  english_pob_choice: Listen now
  chosen_spanish: Escuchen ahora
  alternatives_spanish:
  - Oigan ahora
  - Escuchen, por favor
  lexicon: HALOT
  rationale: La forma imperativa plural pide atención inmediata; «ahora» transmite la urgencia de נָא en un registro natural y digno.
- source_word: הַמֹּרִים
  english_pob_choice: you rebels
  chosen_spanish: rebeldes
  alternatives_spanish:
  - rebeldes ustedes
  - revoltosos
  lexicon: HALOT
  rationale: El participio sustantivado de מרה describe a los oyentes como rebeldes. «Rebeldes» conserva la fuerza del reproche de forma concisa y directa.
- source_word: הֲמִן הַסֶּלַע הַזֶּה
  english_pob_choice: from this rock
  chosen_spanish: de esta roca
  alternatives_spanish:
  - desde esta roca
  - de la roca esta
  lexicon: HALOT
  rationale: La pregunta con מן señala procedencia; «de esta roca» mantiene ese valor de origen de manera natural en español.
- source_word: נוֹצִיא
  english_pob_choice: shall we bring out
  chosen_spanish: sacaremos
  alternatives_spanish:
  - haremos salir
  - traeremos
  lexicon: HALOT
  rationale: El hiphil de יצא expresa causar que algo salga. En español, «sacar» es el equivalente más directo y vivo para el acto de hacer salir agua.
- source_word: מָיִם
  english_pob_choice: water
  chosen_spanish: agua
  alternatives_spanish:
  - aguas
  lexicon: HALOT
  rationale: «Agua» es la traducción estándar de מָיִם y funciona naturalmente en este contexto.
theological_decisions:
- issue: Primera persona plural en la pregunta de Moisés
  english_pob_reading: shall we bring out water for you from this rock?
  chosen_spanish_reading: ¿sacaremos agua para ustedes de esta roca?
  alternative_spanish_readings:
  - ¿sacaremos agua para ustedes de esta roca?
  - ¿sacaremos agua para ustedes de este peñasco?
  rationale: Se conserva el plural de primera persona de נוֹצִיא sin suavizarlo. La traducción mantiene la tensión narrativa sobre la relación entre la acción humana de Moisés y Aarón y la provisión divina, sin resolverla artificialmente en el texto.
  doctrine_reference: Preservar la tensión teológica del texto
translation_notes:
  revision_awareness: La versión inglesa auditada pasó de «assembly» a «congregation» para הַקָּהָל; la draft española adopta «congregación» por naturalidad contextual, y conserva la singularidad verbal de וַיֹּאמֶר y la primera persona plural de נוֹצִיא. También se mantiene el valor de origen de מִן con «de esta roca» y el matiz de urgencia de נָא con «ahora».
  spanish_consistency_notes:
  - Se usa «Moisés» y «Aarón» de forma estándar y consistente con la nomenclatura bíblica en español.
  - «Roca» se emplea de manera uniforme para סֶלַע/סָּלַע; la nota alternativa muestra la posibilidad verbal de «haremos salir».
  - El tono imperativo se conserva sin exageración; «Escuchen ahora» mantiene la reprensión directa del hebreo.
