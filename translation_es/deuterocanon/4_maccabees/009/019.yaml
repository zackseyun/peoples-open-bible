  yaml_path: translation/deuterocanon/4_maccabees/009/019.yaml
  text: They are unconquerable for the sake of virtue[a]. While he was still saying these things, they piled on more fire, and, by turning the wheel more violently[c][b], they tightened it further.
  footnotes:
