translation:
  language: es
  text: Y confiando en él, hizo como dijo, y envió las fuerzas, y fueron[a] a la tierra de Judá.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «a la tierra de Judá» puede entenderse como «dentro de la tierra de Judá»; la preposición griega puede traducirse de cualquiera de las dos maneras en este contexto de movimiento.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐμπιστεύσας
  english_pob_choice: trusting him
  chosen_spanish: confiando en él
  alternatives_spanish:
  - habiendo confiado en él
  - poniendo su confianza en él
  lexicon: BDAG
  rationale: El participio aoristo expresa una acción previa o concomitante que da base a la acción principal. «Confiando en él» conserva la relación causal y suena natural en español; «habiendo confiado en él» es más literal pero menos fluido.
- source_word: ἐποίησεν καθὼς εἶπεν
  english_pob_choice: he did as he said
  chosen_spanish: hizo como había dicho
  alternatives_spanish:
  - hizo como dijo
  - actuó como había dicho
  lexicon: BDAG
  rationale: La construcción indica conformidad con lo dicho anteriormente. En español, el pluscuamperfecto «había dicho» expresa mejor la referencia a una palabra previa sin forzar el griego; también evita ambigüedad temporal.
- source_word: ἐξαπέστειλεν
  english_pob_choice: sent out
  chosen_spanish: envió
  alternatives_spanish:
  - despachó
  - envió fuera
  lexicon: BDAG
  rationale: El verbo compuesto intensifica la idea de enviar. En este contexto militar, «envió» comunica bien la acción; «despachó» suena más administrativo y «envió fuera» es menos natural en español.
- source_word: τὰς δυνάμεις
  english_pob_choice: the forces
  chosen_spanish: las fuerzas
  alternatives_spanish:
  - las tropas
  - el ejército
  lexicon: BDAG
  rationale: «Fuerzas» conserva el plural del griego y mantiene el matiz militar sin precisar más de lo que el texto dice. «Tropas» y «ejército» son posibles, pero «ejército» singulariza demasiado.
- source_word: ἀπῆλθον
  english_pob_choice: went into
  chosen_spanish: fueron
  alternatives_spanish:
  - partieron
  - se dirigieron
  lexicon: BDAG
  rationale: El verbo marca salida o marcha. En español, «fueron» con el complemento direccional reproduce la sencillez del griego; «partieron» añade énfasis en la salida, y «se dirigieron» explicita la dirección de manera más interpretativa.
- source_word: εἰς γῆν Ἰούδα
  english_pob_choice: into the land of Judah
  chosen_spanish: a la tierra de Judá
  alternatives_spanish:
  - a la tierra de Judá
  - a Judea
  - hacia la tierra de Judá
  lexicon: BDAG
  rationale: γῆ con genitivo propio se traduce naturalmente como «tierra de». Aquí «a la tierra de Judá» refleja el movimiento sin sobreinterpretar «Judea» como término administrativo posterior. El texto griego permite tanto ‘a’ como ‘a/into’, y en español la preposición simple resulta natural.
translation_notes:
  revision_awareness: La redacción sigue el texto griego de Swete (1909) y toma en cuenta el expediente inglés POB, incluyendo su nota sobre la alternancia preposicional en εἰς. A diferencia del inglés, el español permite expresar la dirección con una simple «a» sin perder la fuerza del movimiento; por eso se evita una glosa más pesada. También se refleja la cadencia narrativa breve del original sin añadir elementos no presentes en el verso.
  spanish_consistency_notes:
  - Se mantiene «Judá» para γῆ Ἰούδα, en vez de «Judea», para conservar la correspondencia más directa con el griego y el matiz territorial del texto.
  - Se usa un perfecto más natural («había dicho») para la anterioridad implícita en la cláusula, sin convertirla en una paráfrasis.
  - No se introduce terminología eclesiástica posterior; el registro permanece narrativo y militar, acorde con el contexto de 1 Macabeos.
