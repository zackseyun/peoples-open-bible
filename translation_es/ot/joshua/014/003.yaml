review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura general, el pluscuamperfecto («había dado»), la terminología de heredad, el contraste con los levitas y la cláusula final «entre ellos». Sin embargo, falla en un punto importante de alineación con el hebreo מֵעֵבֶר לַיַּרְדֵּן y con el POB inglés: el texto principal dice «de este lado del Jordán», mientras que la evidencia fuente y la traducción auditada favorecen «al otro lado del Jordán» o «más allá del Jordán» en el cuerpo principal, con la alternativa en nota.'
  spanish_quality_summary: El español es claro y legible, con registro bíblico natural. «Heredad» y «media tribu» funcionan bien. No obstante, «de este lado del Jordán» suena direccionalmente invertido frente al original y crea una lectura geográfica engañosa; conviene corregirlo para fidelidad y claridad.
  glossary_alignment: No hay conflictos con la terminología base del proyecto. «Levitas», «heredad» y la sintaxis contrastiva están bien resueltas. La única desviación relevante es geográfica/lexical en מֵעֵבֶר לַיַּרְדֵּן, donde el principal debería alinearse con «al otro lado del Jordán» o «más allá del Jordán», dejando la otra opción en nota.
  issues:
  - severity: high
    issue: «de este lado del Jordán» no representa fielmente מֵעֵבֶר לַיַּרְדֵּן en este contexto.
    rationale: El hebreo y el POB inglés apuntan a «beyond/on the other side of the Jordan», no a «de este lado». La redacción actual invierte la perspectiva espacial y contradice la nota, que ofrece precisamente «al otro lado del Jordán» como alternativa más fiel.
  - severity: low
    issue: La nota al pie debería corresponder a una alternativa real respecto del texto principal corregido.
    rationale: Si el texto principal se corrige a «al otro lado del Jordán», la nota puede ofrecer «más allá del Jordán» como alternativa léxica breve y natural.
  revised_spanish_text: Porque Moisés había dado la heredad de las dos tribus y de la media tribu al otro lado del Jordán[a]; pero a los levitas no les dio heredad entre ellos.
  revised_footnotes:
  - marker: a
    text: 'O: «más allá del Jordán».'
    reason: lexical_alternative
  revision_rationale: Se corrige la expresión geográfica para ajustarla al hebreo מֵעֵבֶר לַיַּרְדֵּן y al rastro de auditoría del POB inglés. El resto del versículo puede mantenerse, ya que preserva bien la anterioridad temporal, la terminología de heredad y la matización de que los levitas no recibieron heredad territorial entre las demás tribus.
