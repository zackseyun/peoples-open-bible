translation:
  language: es
  text: ¿Acaso han librado[a] alguna vez los dioses de las naciones, cada uno, su tierra de la mano del rey de Asiria?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'El hebreo usa una construcción enfática: literalmente, «¿Han librado de veras...?».'
    reason: lexical_alternative
lexical_decisions:
- source_word: הַהַצֵּל הִצִּילוּ
  english_pob_choice: Have ... ever delivered
  chosen_spanish: ¿Acaso han librado[a]
  alternatives_spanish:
  - ¿Acaso han salvado[a]
  - ¿Acaso han rescatado[a]
  lexicon: HALOT
  rationale: La construcción hebrea con infinitivo absoluto más verbo finito intensifica la pregunta retórica. En español, «¿Acaso han librado…?» conserva el tono de desafío y la idea de acción efectivamente realizada, sin copiar de forma mecánica la repetición verbal del hebreo.
- source_word: אֱלֹהֵי הַגּוֹיִם
  english_pob_choice: the gods of the nations
  chosen_spanish: los dioses de las naciones
  alternatives_spanish:
  - los dioses de los pueblos
  - los dioses nacionales
  lexicon: HALOT
  rationale: «Dioses» refleja el plural constructo y «de las naciones» corresponde de manera directa a הַגּוֹיִם. Se mantiene la ironía del discurso asirio con una formulación natural en español.
- source_word: אִישׁ
  english_pob_choice: each one
  chosen_spanish: cada uno
  alternatives_spanish:
  - alguno
  - uno por uno
  lexicon: HALOT
  rationale: Aquí אִישׁ es distributivo, no «varón». «Cada uno» expresa esa distribución con claridad y evita introducir un matiz de género que el contexto no requiere.
- source_word: אֶת אַרְצוֹ
  english_pob_choice: his land
  chosen_spanish: su tierra
  alternatives_spanish:
  - su país
  - su territorio
  lexicon: HALOT
  rationale: 'El sufijo singular tras el distributivo se entiende como posesión distributiva: cada dios, su respectiva tierra. «Tierra» sigue de cerca el hebreo אַרֶץ y funciona mejor que «país» en un contexto bíblico.'
- source_word: מִיַּד
  english_pob_choice: from the hand of
  chosen_spanish: de la mano de
  alternatives_spanish:
  - del poder de
  - de la autoridad de
  lexicon: HALOT
  rationale: La locución hebrea se conserva en español con la imagen corporal tradicional «de la mano de», ampliamente inteligible y fiel a la metáfora de poder o dominio.
- source_word: מֶלֶךְ אַשּׁוּר
  english_pob_choice: the king of Assyria
  chosen_spanish: el rey de Asiria
  alternatives_spanish:
  - el rey asirio
  lexicon: HALOT
  rationale: La expresión constructa se vierte de manera directa y transparente como «el rey de Asiria», que comunica sin pérdida el referente histórico.
translation_notes:
  revision_awareness: El borrador sigue de cerca el sentido del texto hebreo y la decisión inglesa auditada de reproducir la fuerza enfática de הַהַצֵּל הִצִּילוּ mediante una pregunta retórica natural en español. No se observaron revisiones aplicadas en el expediente inglés.
  spanish_consistency_notes:
  - Se mantiene «Asiria» para אַשּׁוּר siguiendo el nombre histórico habitual en español.
  - Se evita «SEÑOR» o «Yahvé» porque el versículo habla de «los dioses de las naciones» y «el rey de Asiria», sin aparición del nombre divino.
  - «Librar» se eligió por su capacidad de expresar rescate/liberación en un reto militar, acorde con el valor de נצל en este contexto.
