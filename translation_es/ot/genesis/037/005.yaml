translation:
  language: es
  text: Entonces José tuvo un sueño[a], y se lo contó a sus hermanos, y ellos lo odiaron todavía más.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo literalmente: «José soñó un sueño».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּחֲלֹם
  english_pob_choice: dreamed
  chosen_spanish: soñó
  alternatives_spanish:
  - tuvo un sueño
  lexicon: HALOT
  rationale: El verbo חלם significa 'soñar'. En español, 'soñó' conserva el valor verbal natural sin perder el evento narrativo.
- source_word: חֲלוֹם
  english_pob_choice: a dream
  chosen_spanish: un sueño
  alternatives_spanish:
  - 'un sueño en una construcción cognada: ''soñó un sueño'''
  lexicon: HALOT
  rationale: El sustantivo forma una construcción cognada con el verbo. Se mantiene con 'un sueño' para reflejar el énfasis hebreo y, a la vez, suena natural en español.
- source_word: וַיַּגֵּד
  english_pob_choice: told it
  chosen_spanish: se lo contó
  alternatives_spanish:
  - lo relató
  - lo comunicó
  lexicon: HALOT
  rationale: נגד puede significar contar, relatar o hacer saber. 'Se lo contó' expresa bien la transmisión del sueño a los hermanos con español idiomático.
- source_word: לְאֶחָיו
  english_pob_choice: to his brothers
  chosen_spanish: a sus hermanos
  alternatives_spanish:
  - a sus hermanos solamente
  lexicon: HALOT
  rationale: El sustantivo plural con sufijo posesivo se traduce de manera directa como 'sus hermanos', manteniendo el parentesco masculino específico del texto.
- source_word: וַיּוֹסִפוּ עוֹד
  english_pob_choice: even more
  chosen_spanish: todavía más
  alternatives_spanish:
  - aún más
  - más todavía
  lexicon: HALOT
  rationale: La combinación de יסף con עוד intensifica la acción. 'Todavía más' conserva esa escalada en un español claro y natural.
- source_word: שְׂנֹא אֹתוֹ
  english_pob_choice: hated him
  chosen_spanish: lo odiaron
  alternatives_spanish:
  - lo aborrecieron
  lexicon: HALOT
  rationale: El infinitivo constructo con יסף expresa aumento de odio. 'Odiaron' es más fuerte y cercano al peso del verbo hebreo que opciones más suaves.
- source_word: וַ
  english_pob_choice: Now
  chosen_spanish: Ahora
  alternatives_spanish:
  - Y
  lexicon: HALOT
  rationale: La waw inicial marca avance narrativo. 'Ahora' funciona como marcador discursivo natural en español al abrir una nueva acción en la secuencia.
translation_notes:
  revision_awareness: 'El texto sigue de cerca el hebreo del WLC y el audit trail inglés: conserva la construcción cognada ''soñó un sueño'' en nota, traduce נגד de forma idiomática como ''se lo contó'', y mantiene la intensificación de עוד mediante ''todavía más''.'
  spanish_consistency_notes:
  - Se mantiene 'José' como forma española estándar del nombre hebreo.
  - Se conserva la referencia masculina específica 'hermanos' por fidelidad al texto.
  - No se introduce puntuación o sintaxis interpretativa adicional más allá de la clara progresión narrativa del versículo.
