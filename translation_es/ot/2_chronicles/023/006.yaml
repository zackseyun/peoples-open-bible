    text: Or 'the temple of the LORD.' Literally, 'the house of the LORD.'
    reason: lexical_alternative
  - marker: b
    text: '''Keep the charge of the LORD'' can also be rendered ''keep watch for the LORD'' or ''observe the LORD’s duty/order.'''
    reason: lexical_alternative
