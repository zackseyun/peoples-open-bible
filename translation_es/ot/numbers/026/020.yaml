    text: 'Hebreo: «hijos de Judá»; en este contexto de censo la expresión designa a los descendientes varones de Judá agrupados en clanes.'
    reason: lexical_alternative
  - marker: b
    text: La tradición bíblica más antigua en español a veces tiene «Fares» para «Pérez».
    reason: lexical_alternative
  revision_rationale: 'La revisión corrige la principal desviación respecto al hebreo y al audit trail inglés: se restituye «Pérez» como forma base para פֶרֶץ y se ajusta el gentilicio a «perezitas». También se mueve la nota de variante tradicional al nombre correcto. Se mantiene «Sela» y la fórmula censal original. Para זֶרַח se adopta «Zérah» y «zerahitas», que preservan mejor la relación con el hebreo que «Zéraj/zarjitas» y resultan más legibles en español amplio.'
