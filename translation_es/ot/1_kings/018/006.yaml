translation:
  language: es
  text: 'Así que dividieron la tierra entre ellos para pasar por ella: Acab fue solo por un camino[a], y Abdías fue por otro camino solo.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'El hebreo repite literalmente «por un camino» en ambas cláusulas: «Acab fue por un camino él solo, y Abdías fue por un camino él solo». En español, «por otro camino» hace explícito de manera natural el contraste entre las dos rutas.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְחַלְּקוּ
  english_pob_choice: they divided
  chosen_spanish: dividieron
  alternatives_spanish:
  - repartieron
  - apartenaron
  lexicon: HALOT
  rationale: El piel wayyiqtol de חלק expresa una acción de dividir o repartir. «Dividieron» es natural en español y conserva la acción distributiva del contexto.
- source_word: לָהֶם
  english_pob_choice: between themselves
  chosen_spanish: para atravesarla
  alternatives_spanish:
  - entre ellos
  - para ellos
  lexicon: HALOT
  rationale: 'En este contexto la preposición y el pronombre indican la distribución del territorio entre los dos hombres para recorrerlo. El español queda más claro al vincular la finalidad con la frase siguiente: «para atravesarla»; la relación recíproca queda explícita por la coordinación de ambos sujetos y sus rutas separadas.'
- source_word: אֶת הָאָרֶץ
  english_pob_choice: the land
  chosen_spanish: la tierra
  alternatives_spanish:
  - la región
  - el país
  lexicon: HALOT
  rationale: אֶרֶץ aquí designa el territorio que iban a recorrer, no «la tierra» en sentido cósmico. «La tierra» es el equivalente más amplio y natural en español.
- source_word: לַעֲבָר בָּהּ
  english_pob_choice: to pass through it
  chosen_spanish: para atravesarla
  alternatives_spanish:
  - para pasar por ella
  - para recorrerla
  lexicon: HALOT
  rationale: El infinitivo constructo de עבר con בָּהּ expresa movimiento a través del territorio. «Atravesarla» preserva el sentido de atravesar un área, sin añadir matices innecesarios.
- source_word: הָלַךְ
  english_pob_choice: went
  chosen_spanish: fue
  alternatives_spanish:
  - anduvo
  - viajó
  lexicon: HALOT
  rationale: הלך en este relato de itinerario se traduce de forma idiomática con «fue», que comunica desplazamiento sin restringirlo a caminar literalmente.
- source_word: בְּדֶרֶךְ אֶחָד
  english_pob_choice: one way
  chosen_spanish: por un camino
  alternatives_spanish:
  - por una ruta
  - por una vía
  lexicon: HALOT
  rationale: La expresión marca una ruta concreta dentro de la distribución de la búsqueda. «Por un camino» reproduce bien el paralelismo con la segunda cláusula.
- source_word: לְבַדּוֹ
  english_pob_choice: by himself
  chosen_spanish: solo
  alternatives_spanish:
  - por sí solo
  - a solas
  lexicon: HALOT
  rationale: El sentido es que cada uno fue sin compañía. «Solo» es la forma más natural y breve en español; el marcado final de la separación queda claro por el paralelismo.
- source_word: וְעֹבַדְיָהוּ
  english_pob_choice: and Obadiah
  chosen_spanish: y Abdías
  alternatives_spanish:
  - y Obadías
  lexicon: HALOT
  rationale: Se usa la forma bíblica española tradicional «Abdías», que corresponde al nombre propio hebreo עֹבַדְיָהוּ y es más reconocible para lectores de la Biblia en español.
- source_word: בְּדֶרֶךְ אֶחָד
  english_pob_choice: another way
  chosen_spanish: por otro camino
  alternatives_spanish:
  - por un camino diferente
  - por una ruta distinta
  lexicon: HALOT
  rationale: Aunque el hebreo repite literalmente «por un camino», en español el contraste paralelo exige una segunda vía distinta. «Por otro camino» preserva la oposición distributiva sin oscurecerla.
translation_notes:
  revision_awareness: El texto griego o hebreo no presenta variantes textuales relevantes en el paquete provisto; la pauta de la POB en inglés también se mantiene estable, con una única nota para explicitar el contraste de las dos rutas.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» solo cuando el texto lo exija; este versículo no lo contiene.
  - «Abdías» se adopta como forma española bíblica estándar para el nombre propio.
  - Se conserva el paralelismo sintáctico breve del hebreo mediante dos cláusulas coordinadas y repetición de «por un camino / por otro camino».
