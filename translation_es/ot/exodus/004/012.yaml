  glossary_alignment: No hay conflictos con la terminología del proyecto. No aparecen términos sensibles como Yahvé, Mesías, Espíritu o δοῦλος. La decisión de mantener «boca» en vez de suavizar a «habla» o «palabras» está alineada con la filosofía del POB y con el rastro de auditoría inglés.
