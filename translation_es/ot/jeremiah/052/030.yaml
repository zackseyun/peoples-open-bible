review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja correctamente la estructura del hebreo: fecha regnal, sujeto Nebuzaradán con su título, verbo de exilio/deportación, cifra de 745, y la suma final de 4,600 para los deportados de los vv. 28–30. Las notas a, b y c conservan bien el sentido del audit trail inglés. Sin embargo, hay dos puntos de fidelidad/claridad que requieren ajuste: ''judeos'' no es la mejor forma española eclesial y ampliamente legible para representar ''Judeans''; y ''Todas las personas fueron 4,600'' suena poco natural para la fórmula sumativa hebrea.'
  spanish_quality_summary: 'El español es mayormente claro, pero presenta problemas de naturalidad: ''En el año veintitrés'' es entendible, aunque ''En el año veintitrés del reinado de'' o simplemente mantenerlo como está es aceptable; el problema principal es ''judeos'', forma poco idiomática en español general, y la construcción ''fueron 4,600'', que resulta torpe. También conviene adaptar el formato numérico a la convención española: ''4,600'' puede malinterpretarse; ''4.600'' es la forma estándar en español.'
  glossary_alignment: 'No hay términos teológicos sensibles aquí. Se mantiene bien ''deportó'' para הֶגְלָה y ''personas'' para נֶפֶשׁ. El punto de glosario más importante es יְהוּדִים: para preservar el matiz etnogeográfico de ''Judeans'' sin sacrificar legibilidad, ''judíos de Judá'' sería demasiado expansivo; ''judíos'' pierde algo del matiz pero es la forma natural. En este contexto narrativo y para español ampliamente legible, ''judíos'' con nota explicativa sobre el hebreo podría ser una solución, pero como ya existe la nota b para נֶפֶשׁ y el audit trail no exige nota para este término, la revisión mínima más viable es usar ''judíos''.'
  issues:
  - severity: high
    issue: Uso de 'judeos' para יְהוּדִים
    rationale: Aunque intenta reflejar 'Judeans', 'judeos' suena poco natural y poco ampliamente legible en español bíblico contemporáneo. Puede distraer o sonar incorrecto para muchos lectores. 'Judíos' es más natural, aunque algo menos fino en matiz histórico.
  - severity: medium
    issue: Construcción 'Todas las personas fueron 4,600'
    rationale: Es una reproducción demasiado literal del inglés y no suena idiomática en español. La fórmula sumativa se expresa mejor como 'El total de personas fue 4.600' o 'En total fueron 4.600 personas'.
  - severity: medium
    issue: Formato numérico '4,600' en español
    rationale: En español, la convención usual para millares es punto o espacio fino, no coma. '4,600' puede interpretarse como decimal según algunos lectores.
