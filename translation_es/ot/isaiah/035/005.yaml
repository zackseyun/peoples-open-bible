translation:
  language: es
  text: Entonces se abrirán los ojos de los ciegos, y se abrirán[a] los oídos de los sordos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «se destaparán».
    reason: lexical_alternative
lexical_decisions:
- source_word: אָז
  english_pob_choice: Then
  chosen_spanish: Entonces
  alternatives_spanish:
  - En ese momento
  - Entonces, en aquel tiempo
  lexicon: HALOT
  rationale: El adverbio temporal introduce el momento consecuente en la secuencia profética; «Entonces» es natural en español y preserva esa progresión futura sin añadir explicación.
- source_word: תִּפָּקַחְנָה
  english_pob_choice: will be opened
  chosen_spanish: se abrirán
  alternatives_spanish:
  - serán abiertos
  - se destaparán
  lexicon: HALOT
  rationale: 'El nifal femenino plural expresa pasivo: con «ojos» el español idiomático es «se abrirán». Mantiene la imagen concreta sin sobreexplicar ni intensificar con «ampliamente».'
- source_word: עֵינֵי
  english_pob_choice: the eyes of
  chosen_spanish: los ojos de
  alternatives_spanish:
  - ojos de
  lexicon: HALOT
  rationale: La forma en constructo requiere complemento; en español, el artículo es natural y la frase queda fluida como «los ojos de».
- source_word: עִוְרִים
  english_pob_choice: the blind
  chosen_spanish: los ciegos
  alternatives_spanish:
  - las personas ciegas
  - los ciegos y ciegas
  lexicon: HALOT
  rationale: El adjetivo sustantivado plural se expresa con el sustantivo/adjetivo sustantivado común «los ciegos». Es conciso, bíblico y equivalente en registro.
- source_word: וְ/אָזְנֵי
  english_pob_choice: and the ears of
  chosen_spanish: y se abrirán los oídos de
  alternatives_spanish:
  - y los oídos de
  - y se destaparán los oídos de
  lexicon: HALOT
  rationale: Se mantiene el paralelismo del primer miembro y se traslada la misma construcción verbal al español para conservar la consistencia del hebreo y de la revisión inglesa.
- source_word: חֵרְשִׁים
  english_pob_choice: the deaf
  chosen_spanish: los sordos
  alternatives_spanish:
  - las personas sordas
  - los que no oyen
  lexicon: HALOT
  rationale: 'Como en el primer hemistiquio, el adjetivo sustantivado plural se vierte de manera directa: «los sordos». Preserva el paralelismo con «los ciegos».'
- source_word: תִּפָּתַחְנָה
  english_pob_choice: will be opened
  chosen_spanish: se abrirán
  alternatives_spanish:
  - serán abiertos
  - se destaparán
  lexicon: HALOT
  rationale: La revisión inglesa optó por «opened» para ambos verbos; en español conviene repetir «se abrirán» para reflejar la identidad verbal del paralelismo sin introducir una solución menos natural para los oídos.
theological_decisions:
- issue: Imagen de restauración corporal y posible lectura espiritual
  english_pob_reading: Render as straightforward bodily restoration language without narrowing it to either purely literal healing or purely metaphorical spiritual renewal.
  chosen_spanish_reading: Traducir como restauración corporal directa, sin reducirla ni a sanidad solo literal ni a metáfora espiritual exclusiva.
  alternative_spanish_readings:
  - Interpretarla solo como sanidad física milagrosa
  - Interpretarla solo como percepción espiritual
  rationale: El versículo presenta ojos y oídos de manera concreta. La traducción debe conservar esa imaginería profética y no resolver el alcance teológico del cumplimiento; por eso se mantiene la tensión interpretativa.
  doctrine_reference: Preservar la tensión teológica, no resolverla.
translation_notes:
  revision_awareness: La revisión inglesa unificó ambos miembros con «opened» en lugar de «unstopped» para mantener coherencia verbal; por eso el español repite «se abrirán» en ambas cláusulas y evita una variante diferente para los oídos.
  spanish_consistency_notes:
  - Conservo el paralelismo entre «los ojos de los ciegos» y «los oídos de los sordos».
  - Uso «ciegos» y «sordos» como sustantivados directos, en estilo bíblico natural y conciso.
  - No empleo «SEÑOR» ni terminología eclesiástica añadida, porque el versículo no contiene el nombre divino ni otro término que requiera glosa.
  - La nota al pie acompaña solo la opción léxica relevante, sin crear una segunda lectura innecesaria.
