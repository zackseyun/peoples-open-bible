revisions:
- from: Porque no fue por mi propia gracia[a], sino por la voluntad de su Dios. Por tanto, bendíganlo para siempre.
  to: Porque no fue por mi propio favor[a], sino por la voluntad del Dios de ustedes. Por tanto, bendíganlo para siempre.
