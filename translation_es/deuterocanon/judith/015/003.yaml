translation:
  language: es
  text: Y los que estaban acampados en la región montañosa alrededor de Betulia se pusieron en fuga[a]; entonces los hijos de Israel[b], todo hombre guerrero, se lanzaron contra ellos[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «huyeron»; literalmente, «se volvieron a huida».
    reason: lexical_alternative
  - marker: b
    text: O «los israelitas»; griego, «los hijos de Israel».
    reason: lexical_alternative
  - marker: c
    text: O «se derramaron contra ellos»; literalmente, «fueron derramados contra ellos».
    reason: lexical_alternative
lexical_decisions:
- source_word: οἱ παρεμβεβληκότες
  english_pob_choice: those encamped
  chosen_spanish: los que estaban acampados
  alternatives_spanish:
  - los acampados
  - los que habían acampado
  lexicon: BDAG
  rationale: El participio perfecto sustantivado describe a los que se hallaban en campamento. En español, «los que estaban acampados» conserva el estado resultante y el marco militar sin sonar rígido.
- source_word: ἐν τῇ ὀρεινῇ
  english_pob_choice: in the hill country
  chosen_spanish: en la región montañosa
  alternatives_spanish:
  - en la zona montañosa
  - en las tierras altas
  lexicon: LSJ
  rationale: «ὀρεινή» apunta a una región alta o montañosa; «región montañosa» comunica el sentido geográfico de forma natural en español.
- source_word: κύκλῳ Βαιτυλουὰ
  english_pob_choice: around Bethulia
  chosen_spanish: alrededor de Betulia
  alternatives_spanish:
  - rodeando Betulia
  - en torno a Betulia
  lexicon: LSJ
  rationale: La construcción expresa cercanía/encirclemento espacial. «Alrededor de Betulia» es transparente y fiel al valor locativo.
- source_word: ἐτράπησαν εἰς φυγήν
  english_pob_choice: turned to flight
  chosen_spanish: se pusieron en fuga
  alternatives_spanish:
  - huyeron
  - fueron puestos en fuga
  lexicon: BDAG
  rationale: El giro griego conserva la imagen de ser empujados a la huida. «Se pusieron en fuga» reproduce el resultado militar sin perder naturalidad; como alternativa, «huyeron» sería más simple pero menos vívida.
- source_word: οἱ υἱοὶ Ἰσραήλ
  english_pob_choice: the sons of Israel
  chosen_spanish: los hijos de Israel
  alternatives_spanish:
  - los israelitas
  - los hijos de Jacob
  lexicon: LSJ
  rationale: Se mantiene la expresión tradicional y formal del griego. En español «los hijos de Israel» conserva la forma fuente y la resonancia bíblica sin neutralizarla.
- source_word: πᾶς ἀνὴρ πολεμιστής
  english_pob_choice: every man a warrior
  chosen_spanish: todo hombre guerrero
  alternatives_spanish:
  - cada hombre, guerrero
  - todo varón guerrero
  lexicon: BDAG
  rationale: El griego distribuye πᾶς + ἀνήρ con un predicado nominal. «Todo hombre guerrero» mantiene la masculinidad explícita y el carácter distributivo con un español formal y legible.
- source_word: ἐξέχυθησαν ἐπʼ αὐτούς
  english_pob_choice: poured out against them
  chosen_spanish: se lanzaron contra ellos
  alternatives_spanish:
  - se derramaron contra ellos
  - irrumpieron contra ellos
  lexicon: BDAG
  rationale: La imagen literal de «derramarse» suena forzada en español si se aplica a combatientes; «se lanzaron contra ellos» preserva la idea de irrupción masiva y ofensiva. La metáfora subyacente sigue audible, aunque adaptada para claridad.
theological_decisions:
- issue: Lenguaje masculino y étnico tradicional
  english_pob_reading: the sons of Israel, every man a warrior
  chosen_spanish_reading: los hijos de Israel, todo hombre guerrero
  alternative_spanish_readings:
  - los israelitas, cada guerrero
  - los israelitas, todos los combatientes
  rationale: 'Se conserva la explicitud del griego: υἱοὶ e ἀνήρ son masculinos y forman parte del tejido literario del pasaje. No se neutraliza la formulación porque la fuente no lo hace.'
  doctrine_reference: DOCTRINE.md §Translation philosophy 4
translation_notes:
  revision_awareness: El inglés POB pasó de «every man who was a warrior» a «every man a warrior» para eliminar una cláusula relativa innecesaria. La redacción española sigue esa revisión con «todo hombre guerrero», evitando una perífrasis explicativa y manteniendo la concisión del ajuste final.
  spanish_consistency_notes:
  - Se usa «Betulia» como forma castellana del topónimo Bethulia.
  - Se conserva la sintaxis narrativa con dos miembros unidos por «entonces», acorde con el griego καὶ τότε.
  - «Los hijos de Israel» se mantiene de forma consistente con la fórmula bíblica tradicional y con la transparencia hacia el texto fuente.
  - La metáfora militar de ἐξέχυθησαν se vuelve más idiomática en español, pero se documenta la alternativa literal en nota.
