translation:
  language: es
  text: Así Gedeón y los cien hombres que estaban con él llegaron al borde del campamento al comienzo de la vigilia de en medio[a], justo cuando acababan de poner a los centinelas[b]; y tocaron las trompetas[c] y rompieron los cántaros que llevaban en las manos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «la segunda vigilia» o «la vigilia de la mitad de la noche». El hebreo se refiere a una división de la noche.
    reason: lexical_alternative
  - marker: b
    text: O «acababan de apostar a los centinelas» o «acababan de establecer la guardia». La construcción hebrea enfatiza la acción de colocar la guardia.
    reason: lexical_alternative
  - marker: c
    text: Hebreo shofarot, tradicionalmente «trompetas», más específicamente cuernos usados para señalizar.
    reason: cultural_note
lexical_decisions:
- source_word: בִּ/קְצֵה
  english_pob_choice: to the edge of
  chosen_spanish: al borde de
  alternatives_spanish:
  - al extremo de
  - a la orilla de
  lexicon: HALOT
  rationale: קָצֶה expresa un límite o extremo. «Al borde de» conserva la imagen espacial de manera natural en español sin añadir interpretación.
- source_word: רֹאשׁ
  english_pob_choice: at the beginning of
  chosen_spanish: al comienzo de
  alternatives_spanish:
  - al principio de
  - al inicio de
  lexicon: HALOT
  rationale: Aquí רֹאשׁ funciona idiomáticamente como inicio temporal. «Al comienzo de» transmite bien esa fuerza temporal en español.
- source_word: הָאַשְׁמֹרֶת הַתִּיכוֹנָה
  english_pob_choice: the middle watch
  chosen_spanish: la vigilia media
  alternatives_spanish:
  - la segunda vigilia
  - la vigilia del medio
  lexicon: HALOT
  rationale: El hebreo se refiere a una división de la noche. «Vigilia media» mantiene la referencia a una división nocturna sin imponer un sistema de numeración que el hebreo no explicita.
- source_word: אַךְ
  english_pob_choice: just as
  chosen_spanish: justo cuando
  alternatives_spanish:
  - precisamente cuando
  - mientras
  lexicon: HALOT
  rationale: Aquí אַךְ marca coincidencia exacta en el tiempo, no restricción. «Justo cuando» refleja bien esa inmediatez en español.
- source_word: הָקֵם הֵקִימוּ אֶת הַשֹּׁמְרִים
  english_pob_choice: they had posted the watchmen
  chosen_spanish: habían puesto a los centinelas
  alternatives_spanish:
  - habían apostado a los centinelas
  - habían colocado a los guardias
  lexicon: HALOT
  rationale: La construcción intensiva con קום en hifil enfatiza la acción de establecer/postar. «Puesto a los centinelas» refleja la colocación militar y mantiene el matiz de acción previa al relato principal. «Centinelas» preserva la función de vigilancia mejor que un término más genérico.
- source_word: וַיִּתְקְעוּ בַּשּׁוֹפָרוֹת
  english_pob_choice: they blew the trumpets
  chosen_spanish: tocaron las trompetas
  alternatives_spanish:
  - sonaron los cuernos
  - tocaron los cuernos de carnero
  lexicon: HALOT
  rationale: שׁוֹפָר es un cuerno usado como señal; «tocar» es el verbo natural en español para instrumentos de soplo/señal. «Trompetas» funciona como equivalente funcional tradicional y claro, sin exigir una glosa zoológica no expresada en el hebreo inmediato.
- source_word: וְנָפוֹץ
  english_pob_choice: and smashed
  chosen_spanish: y rompieron
  alternatives_spanish:
  - y destrozaron
  - y quebraron
  lexicon: HALOT
  rationale: El verbo expresa una ruptura violenta. «Romper» es natural en español y suficientemente fuerte en el contexto militar; evita sobrecargar con una recreación demasiado libre.
- source_word: הַכַּדִּים
  english_pob_choice: the jars
  chosen_spanish: los cántaros
  alternatives_spanish:
  - las vasijas
  - las jarras
  lexicon: HALOT
  rationale: כַּד nombra un recipiente de cerámica. «Cántaros» es más idiomático en español bíblico que «jarras» y conserva la imagen de un recipiente frágil y portátil.
- source_word: אֲשֶׁר בְּיָדָם
  english_pob_choice: that were in their hands
  chosen_spanish: que llevaban en las manos
  alternatives_spanish:
  - que tenían en las manos
  - que estaban en sus manos
  lexicon: HALOT
  rationale: La frase hebrea identifica los recipientes que portaban. «Llevaban en las manos» traduce con naturalidad la idea de portar sin perder el detalle físico del texto.
theological_decisions:
- issue: Divine-name handling in this verse
  english_pob_reading: No explicit divine name appears in the verse.
  chosen_spanish_reading: No se introduce ningún equivalente de nombre divino en el texto.
  alternative_spanish_readings:
  - No aplica
  rationale: El versículo no contiene יהוה ni una cita directa del nombre divino, así que no hay motivo para insertar «Yahvé» ni otro sustituto.
  doctrine_reference: none
translation_notes:
  revision_awareness: 'La redacción sigue de cerca el hebreo de Jueces 7:19 y el criterio auditado en inglés: conserva la secuencia temporal, el valor intensivo de הָקֵם הֵקִימוּ, y el sentido funcional de שׁוֹפָרוֹת como instrumento de señal. No se detectaron revisiones aplicadas en el expediente inglés; la versión española refleja el estado estable del pasaje.'
  spanish_consistency_notes:
  - Se usa «Gedeón» para גִדְעוֹן, conforme al uso bíblico estándar en español.
  - Se mantiene «centinelas» para הַשֹּׁמְרִים, que preserva la función de vigilancia militar.
  - Se evita «SEÑOR» porque el verso no contiene el nombre divino.
  - Se usa puntuación y coordinación naturales en español sin añadir información externa al hebreo.
