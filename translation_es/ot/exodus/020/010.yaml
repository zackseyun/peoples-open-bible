translation:
  language: es
  text: 'pero el séptimo día es un sábado[a] para Yahvé tu Dios; no harás ningún trabajo: tú, ni tu hijo, ni tu hija, ni tu esclavo[b], ni tu esclava[b], ni tu ganado[c], ni el residente extranjero[d] que está dentro de tus puertas.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «y el séptimo día». La conjunción hebrea puede traducirse de las dos maneras; aquí «pero» destaca el contraste con los seis días de labor del versículo anterior.
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: «tu esclavo ... tu esclava». En español tradicional a veces se suaviza como «siervo» o «criada», pero el valor léxico aquí es el de esclavitud doméstica/jurídica.'
    reason: lexical_alternative
  - marker: c
    text: O «tus animales». Hebreo בְּהֵמָה se refiere colectivamente al ganado doméstico o de trabajo.
    reason: lexical_alternative
  - marker: d
    text: O «el forastero». Hebreo גֵר designa al no nativo que vive entre Israel bajo su orden social y legal.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְי֨וֹם הַשְּׁבִיעִי
  english_pob_choice: but the seventh day
  chosen_spanish: pero el séptimo día
  alternatives_spanish:
  - y el séptimo día
  lexicon: HALOT
  rationale: La conjunción ו puede ser aditiva o adversativa; en este contexto legal, la oposición con los seis días de trabajo del versículo previo se expresa naturalmente con «pero». «Séptimo día» traduce de forma directa y transparente.
- source_word: שַׁבָּת
  english_pob_choice: a Sabbath
  chosen_spanish: un sábado
  alternatives_spanish:
  - un día de reposo
  - un shabat
  lexicon: HALOT
  rationale: Se conserva el sustantivo de la institución en una forma comprensible para el lector hispanohablante. «Sábado» mantiene la referencia histórica y normativa, sin reducirla a una simple paráfrasis de descanso.
- source_word: לַיהוָה אֱלֹהֶיךָ
  english_pob_choice: to Yahweh your God
  chosen_spanish: para Yahvé tu Dios
  alternatives_spanish:
  - a Yahvé tu Dios
  - perteneciente a Yahvé tu Dios
  lexicon: HALOT
  rationale: 'La lamed aquí expresa dedicación o relación: el día queda consagrado a Yahvé. Se usa «Yahvé» conforme al criterio del proyecto, y «tu Dios» conserva la relación de pacto en segunda persona singular.'
- source_word: לֹא תַעֲשֶׂה
  english_pob_choice: you shall not do
  chosen_spanish: no harás
  alternatives_spanish:
  - no debes hacer
  - no debes realizar
  lexicon: HALOT
  rationale: 'En normativa legal hebrea, el imperfecto con לֹא se expresa en español de manera fuerte y natural con futuro de mandato: «no harás».'
- source_word: כָל מְלָאכָה
  english_pob_choice: any work
  chosen_spanish: ninguna obra
  alternatives_spanish:
  - ningún trabajo
  - ningún tipo de trabajo
  lexicon: HALOT
  rationale: «מְלָאכָה» abarca labor, ocupación o tarea productiva. «Obra» evita estrechar el campo semántico a «trabajo» únicamente manual o laboral y conserva una amplitud acorde con la norma sabática.
- source_word: עַבְדְּךָ
  english_pob_choice: your male slave
  chosen_spanish: tu esclavo
  alternatives_spanish:
  - tu siervo
  - tu servidor
  lexicon: HALOT
  rationale: Se conserva la fuerza léxica de la esclavitud doméstica/jurídica. En este contexto, «esclavo» es más fiel que «siervo», que suaviza el estatus social.
- source_word: וַאֲמָתְךָ
  english_pob_choice: your female slave
  chosen_spanish: tu esclava
  alternatives_spanish:
  - tu sierva
  - tu servidora
  lexicon: HALOT
  rationale: Se mantiene el paralelo con עַבְדְּךָ y se evita atenuar la relación de dependencia. «Esclava» preserva la transparencia social del texto.
- source_word: וּבְהֶמְתֶּךָ
  english_pob_choice: your livestock
  chosen_spanish: tu ganado
  alternatives_spanish:
  - tus animales
  - tu bestiame
  lexicon: HALOT
  rationale: בְּהֵמָה puede referirse colectivamente a animales domésticos y de trabajo. «Ganado» es un término natural y suficientemente amplio en español para el contexto rural doméstico.
- source_word: וְגֵרְךָ
  english_pob_choice: the sojourner
  chosen_spanish: el forastero
  alternatives_spanish:
  - el residente extranjero
  - el advenedizo
  lexicon: HALOT
  rationale: גֵר designa al no nativo que reside entre el pueblo bajo su orden social. «Forastero» comunica la extranjería sin caer en el matiz legal menos transparente de «extraño» o en el tecnicismo de «residente extranjero».
- source_word: אֲשֶׁר בִּשְׁעָרֶיךָ
  english_pob_choice: within your gates
  chosen_spanish: que está dentro de tus puertas
  alternatives_spanish:
  - que está dentro de tus puertas/ciudades
  - dentro de tus puertas
  lexicon: HALOT
  rationale: Se conserva el modismo hebreo de jurisdicción/comunidad asentada. «Dentro de tus puertas» es una traducción formal y reconocible del giro idiomático.
theological_decisions:
- issue: Nombre divino יהוה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - Jehová
  rationale: El texto hebreo usa el Tetragramatón de manera explícita. Conforme al criterio del proyecto, se traduce por el nombre propio «Yahvé» y no se enmascara con un título en mayúsculas.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Alcance de la obligación sabática
  english_pob_reading: Explicitly includes children, slaves, livestock, and the sojourner under the prohibition
  chosen_spanish_reading: Incluye explícitamente a hijos, hija, esclavo, esclava, ganado y forastero bajo la prohibición
  alternative_spanish_readings:
  - Una formulación más general que solo mencione la casa
  - Una paráfrasis que omita categorías sociales
  rationale: La lista se mantiene íntegra para no suavizar ni reducir el alcance social de la orden. La traducción conserva la estructura inclusiva del mandato sabático.
  doctrine_reference: DOCTRINE.md Translation philosophy §§1, 5
translation_notes:
  revision_awareness: Se revisó el contexto auditado en inglés y la base hebrea. No se adoptó el masking «SEÑOR» para יהוה, porque el proyecto exige Yahvé. También se preservó la lista social completa y el valor de esclavitud en עבד/אמה, evitando suavizaciones tradicionales.
  spanish_consistency_notes:
  - Se emplea «Yahvé» de forma consistente para יהוה.
  - «Esclavo/esclava» se usa para עבד/אמה por fuerza léxica, sin sustituir por «siervo».
  - «Forastero» se usa para גֵר y se aclara en nota la opción equivalente «residente extranjero».
  - «Dentro de tus puertas» conserva el hebraísmo jurisdiccional de בִּשְׁעָרֶיךָ.
  - La puntuación con dos puntos introduce correctamente la lista dependiente del mandato negativo.
