translation:
  language: es
  text: 'Entonces respondí y dije al ángel que hablaba conmigo[a]: «¿Qué son estas, mi señor?»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «que estaba hablando conmigo». El participio hebreo puede describir al ángel como el que estaba hablando con el profeta.
    reason: lexical_alternative
lexical_decisions:
- source_word: וָ/אַ֨עַן֙
  english_pob_choice: Then I answered
  chosen_spanish: Entonces respondí
  alternatives_spanish:
  - Y respondí
  - Así que respondí
  lexicon: HALOT
  rationale: El wayyiqtol introduce la secuencia narrativa; «Entonces» conserva el avance discursivo sin sonar mecánico en español.
- source_word: וָֽ/אֹמַ֔ר
  english_pob_choice: and said
  chosen_spanish: y dije
  alternatives_spanish:
  - y respondí
  - y hablé
  lexicon: HALOT
  rationale: La pareja verbal hebrea «respondí y dije» se mantiene de forma transparente, con el verbo simple «dije» para un español natural.
- source_word: הַ/מַּלְאָ֖ךְ
  english_pob_choice: the angel
  chosen_spanish: el ángel
  alternatives_spanish:
  - el mensajero
  lexicon: HALOT
  rationale: En el contexto visionario de Zacarías, el ser interpretador se entiende mejor como «ángel»; «mensajero» sería posible pero menos preciso en este pasaje.
- source_word: הַ/דֹּבֵ֣ר בִּ֑/י
  english_pob_choice: who was speaking with me
  chosen_spanish: que hablaba conmigo
  alternatives_spanish:
  - que estaba hablando conmigo
  - que hablaba en mí
  lexicon: HALOT
  rationale: El participio expresa acción en curso; «hablaba conmigo» conserva ese matiz y evita un pasado puntual que estreche el sentido.
- source_word: מָה אֵ֖לֶּה
  english_pob_choice: What are these
  chosen_spanish: ¿Qué son estas cosas?
  alternatives_spanish:
  - ¿Qué son estas?
  - ¿Qué es esto?
  lexicon: HALOT
  rationale: El hebreo pregunta por los objetos de la visión. En español, «estas cosas» explicita el referente implícito sin sobreinterpretarlo.
- source_word: אֲדֹנִֽ/י
  english_pob_choice: my lord
  chosen_spanish: mi señor
  alternatives_spanish:
  - señor mío
  - mi amo
  lexicon: HALOT
  rationale: Se conserva el valor honorífico del vocativo sin convertirlo en una referencia divina; «mi señor» es una forma natural y reverente en español.
theological_decisions:
- issue: Si אֲדֹנִי debe leerse como título divino o como tratamiento respetuoso al ángel
  english_pob_reading: 'It is a respectful address to the angel: ''my lord.'''
  chosen_spanish_reading: 'Es un tratamiento respetuoso dirigido al ángel: «mi señor».'
  alternative_spanish_readings:
  - «Señor» como título divino
  - «mi Señor» con mayúscula reverencial
  rationale: El destinatario inmediato es el ángel que hablaba con el profeta. Traducirlo como un vocativo honorífico evita resolver indebidamente la tensión teológica y mantiene la primacía del hebreo sobre la tradición interpretativa.
  doctrine_reference: Conservar la tensión del texto original; no imponer una identificación divina donde el contexto inmediato favorece un respeto dirigido al mensajero angélico.
translation_notes:
  revision_awareness: El español sigue el control de la revisión más reciente sin cambios sustantivos, manteniendo la lectura de alta concordancia y la solución ya aceptada para el participio hebreo.
  spanish_consistency_notes:
  - Se usa «ángel» de manera consistente con el contexto visionario de Zacarías.
  - Se preserva el vocativo honorífico «mi señor» para אֲדֹנִי, sin convertirlo en un título divino.
  - La puntuación reproduce una pregunta directa con comillas españolas y la nota al pie vinculada al participio.
