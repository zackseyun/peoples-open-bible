translation:
  language: es
  text: Lo provocaron a ira por sus hechos[a], y una plaga se desató entre ellos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «con sus acciones».
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּכְעִיסוּ
  english_pob_choice: They provoked him to anger
  chosen_spanish: Los provocaron a ira
  alternatives_spanish:
  - Lo irritaron
  - Lo provocaron
  lexicon: HALOT
  rationale: El verbo hebreo en hiphil expresa provocar a ira o exasperar. En español, «provocar a ira» conserva el valor causativo mejor que una forma más suave, y «los» retoma el objeto implícito según el contexto del salmo. Se evita «lo» para no perder la referencia plural de quienes provocan, y se deja la teología del objeto implícito a la nota correspondiente.
- source_word: בְּמַעַלְלֵיהֶם
  english_pob_choice: by their deeds
  chosen_spanish: con sus hechos
  alternatives_spanish:
  - por sus acciones
  - mediante sus obras
  lexicon: HALOT
  rationale: מַעֲלָלִים denota hechos o acciones, a menudo con carga moral. La preposición ב puede expresar medio o instrumento; en español, «con sus hechos» comunica ese medio de forma natural y conserva el matiz de que fueron sus propias obras las que ocasionaron la ira. «Hechos» evita una paráfrasis más amplia como «conducta».
- source_word: וַתִּפְרָץ
  english_pob_choice: broke out
  chosen_spanish: se desató
  alternatives_spanish:
  - brotó
  - estalló
  lexicon: HALOT
  rationale: El verbo פרץ sugiere irrupción súbita o ruptura. Con מַגֵּפָה como sujeto, «se desató» es un equivalente natural en español para la irrupción de una plaga, sin perder la imagen de algo que irrumpe de forma repentina. «Brotó» sería posible, pero menos idiomático para una plaga.
- source_word: בָּם
  english_pob_choice: among them
  chosen_spanish: entre ellos
  alternatives_spanish:
  - en medio de ellos
  - contra ellos
  lexicon: HALOT
  rationale: La preposición ב con personas después de este verbo expresa la ocurrencia dentro del grupo. «Entre ellos» refleja con claridad el alcance comunitario de la plaga y corresponde bien al uso español. «Contra ellos» añade una interpretación más enfática que el hebreo no exige aquí.
- source_word: מַגֵּפָה
  english_pob_choice: a plague
  chosen_spanish: una plaga
  alternatives_spanish:
  - una pestilencia
  - un azote
  lexicon: HALOT
  rationale: מַגֵּפָה designa una plaga o golpe calamitoso enviado en juicio. «Plaga» es la equivalencia más clara y directa en español moderno, y coincide con el sentido histórico-jurídico del contexto del salmo. «Pestilencia» sería más específico y algo más arcaizante.
theological_decisions:
- issue: Objeto implícito de «provocar a ira»
  english_pob_reading: The verse is rendered with the supplied object 'him,' referring to God.
  chosen_spanish_reading: Se deja el objeto implícito en la forma verbal, pero el referente es Dios por el contexto inmediato.
  alternative_spanish_readings:
  - Los provocaron a ira.
  - Provocaron a Dios a ira con sus hechos.
  rationale: El hebreo no expresa de manera explícita el objeto, aunque el contexto del salmo lo identifica claramente. En español, puede omitirse el objeto explícito o suplirse con un clítico; aquí se conserva la referencia contextual sin introducir una formulación más pesada de la necesaria. Esto evita sobreexplicitar más allá del texto y mantiene la continuidad discursiva del pasaje.
  doctrine_reference: Contexto de Israel provocando la ira de Yahvé en el salmo; no se introduce una doctrina ajena al versículo.
translation_notes:
  revision_awareness: La versión inglesa más reciente añadió «to anger» para explicitar el valor del verbo causativo; en español se reflejó ese incremento semántico con «a ira», que preserva la fuerza del hiphil sin volverlo redundante. Se mantuvo el resto del versículo conforme al paquete fuente y al sentido contextual del hebreo.
  spanish_consistency_notes:
  - Se usa «plaga» para מַגֵּפָה en coherencia con el valor de juicio calamitoso.
  - Se mantiene un registro bíblico moderno y claro, sin recurrir a «SEÑOR» para יהוה en este versículo porque no aparece el Tetragrámaton de forma explícita.
  - La preposición «entre» comunica mejor en español el ב locativo/distributivo con personas que una traducción literal rígida como «en».
