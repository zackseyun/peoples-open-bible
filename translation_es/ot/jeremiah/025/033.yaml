review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador conserva bien el sentido global del hebreo: juicio universal, cuerpos sin duelo ni sepultura, y la imagen degradante final. También mantiene correctamente «Yahvé» para יְהוָה y «tierra» para אֶרֶץ según la decisión contextual del POB. Sin embargo, la apertura «Y habrá los muertos de Yahvé» no es español natural y no representa bien el valor existencial/resultativo de וְהָיוּ; además, «muertos» es más débil que «víctimas» o «caídos» para חַלְלֵי en un contexto de matanza judicial.'
  spanish_quality_summary: 'La mayor debilidad es la legibilidad inicial: «Y habrá los muertos de Yahvé» suena calcado e impropio en español bíblico natural. El resto del versículo es claro y digno. «Recogidos» funciona, y «serán como estiércol» comunica bien la comparación final. Conviene también ajustar la nota a para que no suene torpe («muertos causados por Yahvé» es poco idiomático).'
  glossary_alignment: 'Se alinea bien con la terminología del proyecto en «Yahvé», «tierra» y el tono judicial. No hay conflicto doctrinal serio. El ajuste propuesto mantiene la decisión del POB para חַלְלֵי יְהוָה pero la expresa en español más natural como «las víctimas de Yahvé», con nota alternativa que preserva la agencia explícita: «los que Yahvé mató».'
  issues:
  - severity: high
    issue: 'Apertura no idiomática: «Y habrá los muertos de Yahvé»'
    rationale: El hebreo וְהָיוּ introduce el estado/resultado futuro, pero en español «habrá los muertos» es gramaticalmente forzado. Debe reformularse como «Las víctimas de Yahvé... estarán/serán...» o equivalente.
  - severity: medium
    issue: «los muertos de Yahvé» suena ambiguo y poco natural en español
    rationale: Aunque refleja compactamente el constructo hebreo, en español puede sugerir pertenencia más que víctimas del juicio divino. «Las víctimas de Yahvé» conserva mejor el sentido judicial y la legibilidad.
  - severity: low
    issue: 'Nota a poco idiomática: «los muertos causados por Yahvé»'
    rationale: La alternativa española propuesta suena artificial. Una formulación como «los que Yahvé mató» o «los muertos por Yahvé» comunica mejor la agencia explícita.
  revised_spanish_text: Las víctimas de Yahvé[a] en aquel día estarán desde un extremo de la tierra hasta el otro extremo de la tierra[b]. No serán lamentadas, ni recogidas, ni sepultadas; serán como estiércol sobre la superficie del suelo[c].
  revised_footnotes:
