translation:
  language: es
  text: Él yace al acecho en lo oculto[a], como un león en su guarida[b]; yace al acecho para arrebatar al pobre; arrebata al pobre cuando lo arrastra a su red[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «En lo oculto» también puede entenderse como «en secreto».
    reason: lexical_alternative
  - marker: b
    text: O «en su escondite»; el término hebreo puede referirse a un refugio, un lugar oculto o una espesura.
    reason: lexical_alternative
  - marker: c
    text: También puede leerse «mientras lo arrastra con su red» o «mientras lo arrastra en su red».
    reason: lexical_alternative
lexical_decisions:
- source_word: יֶאֱרֹב
  english_pob_choice: lies in wait
  chosen_spanish: yace al acecho
  alternatives_spanish:
  - acecha
  - se pone al acecho
  lexicon: HALOT
  rationale: El hebreo expresa una espera predatoria y deliberada. «Yace al acecho» mantiene ese valor idiomático en español y conserva bien la repetición enfática del verso.
- source_word: בַּמִּסְתָּר
  english_pob_choice: in hiding
  chosen_spanish: en lo oculto
  alternatives_spanish:
  - en secreto
  - en un escondite
  lexicon: HALOT
  rationale: מִסְתָּר puede referirse tanto a un lugar oculto como a la cualidad de secretividad. «En lo oculto» comunica ambas posibilidades sin volver la frase pesada.
- source_word: כְּאַרְיֵה
  english_pob_choice: like a lion
  chosen_spanish: como un león
  alternatives_spanish:
  - como león
  lexicon: HALOT
  rationale: La comparación es directa y se preserva sin alteración. «León» mantiene la imagen de un depredador peligroso.
- source_word: בְסֻכֹּה
  english_pob_choice: in his lair
  chosen_spanish: en su guarida
  alternatives_spanish:
  - en su den
  - en su escondrijo
  lexicon: HALOT
  rationale: En este contexto animal, סֻכָּה funciona como refugio oculto del depredador. «Guarida» es una equivalencia natural en español y conserva la idea de escondite predatorio.
- source_word: לַחֲטוֹף
  english_pob_choice: to seize
  chosen_spanish: para arrebatar
  alternatives_spanish:
  - para asir
  - para atrapar
  lexicon: HALOT
  rationale: חטף transmite captura súbita y violenta. «Arrebatar» comunica esa fuerza mejor que un término más neutro.
- source_word: עָנִי
  english_pob_choice: the poor
  chosen_spanish: al pobre
  alternatives_spanish:
  - al afligido
  - al necesitado
  lexicon: HALOT
  rationale: En el contexto de opresión social del Salmo 10, «pobre» es una forma directa y fiel para עָנִי, que incluye vulnerabilidad y desamparo.
- source_word: יַחְטֹף
  english_pob_choice: he seizes
  chosen_spanish: arrebata
  alternatives_spanish:
  - se apodera de
  - atrapa
  lexicon: HALOT
  rationale: Se conserva el mismo campo semántico del verbo anterior para reflejar la repetición poética y la insistencia del agresor.
- source_word: בְּמָשְׁכ֥וֹ
  english_pob_choice: when he drags him
  chosen_spanish: cuando lo arrastra
  alternatives_spanish:
  - al arrastrarlo
  - mientras lo tira
  lexicon: HALOT
  rationale: La construcción con משך expresa el acto de tirar o arrastrar como medio de captura. «Cuando lo arrastra» reproduce la relación circunstancial de manera natural en español.
- source_word: בְרִשְׁתּוֹ
  english_pob_choice: into his net
  chosen_spanish: a su red
  alternatives_spanish:
  - en su red
  - con su red
  lexicon: HALOT
  rationale: רֶשֶׁת es «red». El hebreo no exige explícitamente «dentro de», por lo que «a su red» mantiene la imagen sin añadir más de lo que el texto asegura.
translation_notes:
  revision_awareness: La redacción sigue de cerca el hebreo poético y mantiene la repetición de «yace al acecho / arrebata» para conservar el paralelismo y la imagen depredadora. Se adoptó una equivalencia óptima, priorizando naturalidad en español sin debilitar la intensidad del original. No hubo revisiones textuales en el audit trail inglés; la versión publicada en inglés permaneció sin cambios.
  spanish_consistency_notes:
  - Se mantiene «pobre» para עָנִי, coherente con el contexto de opresión del salmo.
  - Se conserva la metáfora animal con «león» y «guarida» para no diluir el cuadro de depredación.
  - La repetición verbal refleja el hebreo y evita suavizar la acción con sinónimos demasiado diversos.
  - «Red» traduce רֶשֶׁת de forma directa; la preposición española se ajusta para fluidez sin cambiar la imagen básica.
