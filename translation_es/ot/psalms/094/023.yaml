  spanish_quality_summary: El español es claro y digno, pero «hará volver sobre ellos su iniquidad» suena algo rígido. «Hará recaer sobre ellos su iniquidad» suena más natural en español bíblico contemporáneo y preserva mejor la imagen judicial. Además, «en su maldad» guarda mejor la compacidad del hebreo que «por su maldad».
  glossary_alignment: Alineación correcta con la terminología del proyecto en «Yahvé» y «Dios». «Iniquidad» es aceptable para אוֹן en contexto retributivo. «Exterminará» transmite bien la fuerza de יַצְמִיתֵם, aunque «destruirá» también sería posible; no requiere cambio. La principal mejora es ajustar בְּרָעָתָם para no perder la tensión léxica documentada.
