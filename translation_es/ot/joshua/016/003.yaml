translation:
  language: es
  text: Entonces descendió hacia el oeste hasta el límite de los jafletitas[a], hasta el límite de Bet-horón de Abajo, y hasta Gezer; y sus salidas[b] daban al mar.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebreo literalmente, «los jafletitas»; se conserva el nombre del grupo como etnónimo/topónimo, sin intentar identificarlo con mayor precisión que la fuente.
    reason: lexical_alternative
  - marker: b
    text: La expresión hebrea «sus salidas» es una fórmula técnica de frontera que se refiere a los puntos terminales o extremidades del límite; es decir, la frontera terminaba en el mar.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְיָרַד
  english_pob_choice: Then it went down
  chosen_spanish: Entonces descendió
  alternatives_spanish:
  - Y descendió
  - Entonces bajó
  lexicon: HALOT
  rationale: En descripciones de fronteras, ירד expresa movimiento topográfico descendente. «Descendió» conserva esa dirección física con naturalidad en español; el conector «Entonces» refleja la secuencia narrativa del hebreo, como en la solución inglesa auditada.
- source_word: יָמָּה
  english_pob_choice: westward
  chosen_spanish: hacia el oeste
  alternatives_spanish:
  - occidentalmente
  - hacia el mar
  lexicon: HALOT
  rationale: En fórmulas geográficas hebreas, esta forma direccional suele equivaler a una orientación hacia el oeste. En español, «hacia el oeste» comunica esa dirección de manera clara y evita una lectura exclusivamente marítima donde el contexto es fronterizo.
- source_word: אֶל גְּבוּל
  english_pob_choice: to the border of
  chosen_spanish: hasta el límite de
  alternatives_spanish:
  - hasta la frontera de
  - a la frontera de
  lexicon: HALOT
  rationale: גְּבוּל en Josué funciona como término técnico de delimitación territorial. «Límite» es una opción natural y precisa en español; «hasta» mantiene el valor de extensión del trayecto fronterizo.
- source_word: הַיַּפְלֵטִי
  english_pob_choice: the Japhletites
  chosen_spanish: los jafletitas
  alternatives_spanish:
  - los jefletitas
  - Jaflet
  lexicon: HALOT
  rationale: Se conserva el etnónimo/topónimo con transliteración. «Jafletitas» sigue el valor gentilicio del hebreo, en paralelo con la opción inglesa de transliterar el nombre del grupo.
- source_word: עַד גְּבוּל בֵּית חוֹרֹן תַּחְתּוֹן
  english_pob_choice: as far as the border of Lower Beth-horon
  chosen_spanish: hasta el límite de Bet-horón de Abajo
  alternatives_spanish:
  - hasta el límite de Bet-horón Inferior
  - hasta el límite de Bajo Bet-horón
  lexicon: HALOT
  rationale: «עד» expresa alcance, por eso se traduce con «hasta». «Bet-horón de Abajo» conserva el contraste con la localidad superior sin introducir una paráfrasis; «de Abajo» es la forma más transparente y fiel al valor locativo de תַּחְתּוֹן.
- source_word: וְעַד גָּזֶר
  english_pob_choice: and as far as Gezer
  chosen_spanish: y hasta Gezer
  alternatives_spanish:
  - y hasta Gazer
  - y hasta Guézer
  lexicon: HALOT
  rationale: Se mantiene el progresivo de la lista fronteriza con «y hasta». El nombre propio se translitera como «Gezer», una forma ampliamente reconocible y consistente con la pronunciación habitual en español bíblico.
- source_word: וְהָיוּ תצאת/ו
  english_pob_choice: and its goings out were
  chosen_spanish: y sus salidas
  alternatives_spanish:
  - y sus salidas estaban
  - y sus extremidades
  lexicon: HALOT
  rationale: La fórmula técnica תֹצְאֹת en límites territoriales designa los puntos de terminación o extensión de una frontera. «Sus salidas» sigue de cerca la imagen hebrea, como hizo la traducción inglesa auditada con «goings out», sin perder la referencia técnica.
- source_word: יָמָּה
  english_pob_choice: at the sea
  chosen_spanish: hacia el mar
  alternatives_spanish:
  - en el mar
  - al mar
  lexicon: HALOT
  rationale: Aquí la expresión final funciona como ubicación terminal de la frontera. «Hacia el mar» mantiene la fuerza direccional y resulta más natural en español que «en el mar», sin borrar el valor de término geográfico que aparece en el hebreo.
theological_decisions:
- issue: Valor direccional de יָמָּה en un texto de fronteras
  english_pob_reading: westward / at the sea
  chosen_spanish_reading: hacia el oeste / hacia el mar
  alternative_spanish_readings:
  - occidentalmente
  - al occidente
  - al mar
  rationale: 'No hay una decisión doctrinal en juego, pero sí una tensión léxica: el hebreo usa la misma forma derivada de «mar» tanto para dirección occidental como para referencia terminal. En español se preserva esa ambigüedad funcional con dos expresiones distintas según el contexto sintáctico, evitando reducir ambas a una sola idea.'
  doctrine_reference: Josué 16:3; uso geográfico de יָמָּה en descripciones de frontera
translation_notes:
  revision_awareness: La redacción española sigue el último estado revisado del inglés auditado, especialmente la decisión de conservar la fórmula técnica «goings out» en vez de sustituirla por una paráfrasis como «boundary ends». También mantiene la secuencia fronteriza y el cierre locativo del hebreo, diferenciando entre dirección («hacia el oeste») y término geográfico («hacia el mar»).
  spanish_consistency_notes:
  - Se usa «Bet-horón» con guion y la distinción «de Abajo» para reflejar el par habitual con Bet-horón de Arriba en otras referencias.
  - Se prefiere «Gezer» para la toponimia, coherente con un español bíblico amplio y legible.
  - Se evita «SEÑOR» o cualquier sustitución teológica, porque el versículo no contiene el nombre divino.
  - «Salidas» se mantiene deliberadamente para conservar la fórmula técnica y su relación con el audit trail inglés.
