  verdict: revise
  source_alignment_summary: El borrador refleja bien la estructura imperativa del hebreo y mantiene la advertencia ética final. Sin embargo, «no te enojes» debilita y desplaza el matiz de תִּתְחַר, que en este salmo se relaciona con agitación/exasperación/provocación más que con una simple repetición de «ira». Además, la nota [a] introduce una alternativa inglesa ajena al lugar donde está anclada en español.
  spanish_quality_summary: El español es claro y legible, con buen registro bíblico moderno. «Deja la ira y abandona el furor» suena natural. La mejora principal es evitar repetir dos veces la misma idea de enojo y escoger una formulación más precisa para la tercera prohibición.
  glossary_alignment: 'No hay conflictos con la terminología base del proyecto. Las decisiones para «ira», «furor» y «mal» son aceptables. La principal cuestión es léxica-contextual: conviene traducir תתחר como «no te irrites» o similar, en línea con la evidencia y la auditoría inglesa revisada.'
  issues:
  - severity: medium
    issue: «no te enojes» suaviza y aplana תִּתְחַר
    rationale: El hebreo hitpael de חרה aquí apunta a agitarse, irritarse o dejarse provocar; «no te enojes» repite la idea ya expresada por «ira/furor» y pierde el matiz más dinámico que la revisión inglesa quiso preservar con «do not be provoked».
  - severity: medium
    issue: La nota [a] está mal enfocada para su anclaje textual
    rationale: 'La nota actual en «ira» dice «O: enojo» y menciona la figura corporal hebrea, pero la alternativa inglesa preservada («Do not fret...») corresponde realmente al verbo inicial הֶרֶף, no al sustantivo מֵאַף. Tal como está, mezcla niveles y puede confundir al lector.'
  - severity: low
    issue: La causal «porque eso» es válida pero menos directa que el hebreo
    rationale: No es errónea, pero «eso» añade un elemento anafórico no presente. Una formulación más ceñida y elegante es «solo conduce al mal» o «solo lleva al mal» tras una pausa fuerte.
  revised_spanish_text: 'Deja la ira y abandona el furor; no te irrites[a]: solo conduce al mal[b].'
