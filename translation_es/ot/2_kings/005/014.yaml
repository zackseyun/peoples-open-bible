revisions:
- from: Entonces bajó y se sumergió en el Jordán siete veces, conforme a la palabra del hombre de Dios; y su carne fue restaurada[a], como la carne de un muchacho pequeño, y fue purificado[b].
  to: Entonces bajó y se sumergió en el Jordán siete veces[a], conforme a la palabra del hombre de Dios; y su carne fue restaurada como la carne de un niño pequeño, y fue purificado[b].
  rationale: Se corrige la nota [a] para que corresponda verdaderamente al texto español, se mejora «muchacho pequeño» a «niño pequeño» por naturalidad y fidelidad idiomática, y se afina la nota [b] para expresar con mejor español la alternativa entre estado y resultado preservada en la auditoría inglesa.
