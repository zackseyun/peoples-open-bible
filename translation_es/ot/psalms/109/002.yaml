    reason: lexical_alternative
  - marker: b
    text: O «han hablado conmigo con una lengua de falsedad». Probablemente el sentido es habla hostil dirigida al salmista; por eso el texto principal dice «me han hablado».
    reason: lexical_alternative
  revision_rationale: 'La revisión corrige el único problema sustancial de fidelidad: «me han hablado» refleja mejor la decisión contextual de la POB para אִתִּי que «han hablado conmigo». También se mejora la naturalidad con «han abierto» y se reescriben las notas para que apoyen, en lugar de contradecir, el texto principal. Se conserva la repetición de «boca» y la imagen de «lengua mentirosa», en línea con la fuente hebrea y la auditoría inglesa.'
