translation:
  language: es
  text: Porque Yahvé ha expulsado de delante de ustedes a naciones grandes y poderosas[a]; y en cuanto a ustedes, ni un hombre[b] se ha mantenido firme delante de ustedes hasta el día de hoy.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «ha desposeído» o «ha echado fuera». El verbo hebreo puede enfatizar la remoción de pueblos de la tierra para que Israel la posea.
    reason: lexical_alternative
  - marker: b
    text: Hebreo «ni un hombre ha estado delante de ustedes», un modismo que significa que nadie ha podido resistirles.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיּוֹרֶשׁ
  english_pob_choice: has driven out
  chosen_spanish: ha expulsado
  alternatives_spanish:
  - ha desposeído
  - ha echado fuera
  lexicon: HALOT
  rationale: El verbo hebreo en este contexto de conquista expresa hacer salir o retirar a los pueblos del territorio para dar posesión a Israel. «Ha expulsado» comunica bien el acto de removerlos y evita una formulación demasiado técnica o mecánica en español.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: Se conserva el nombre divino del Tetragrámaton como «Yahvé», conforme al criterio del proyecto, en vez de sustituirlo por un título.
- source_word: מִפְּנֵיכֶם
  english_pob_choice: from before you
  chosen_spanish: de delante de ustedes
  alternatives_spanish:
  - de su presencia
  - de ante ustedes
  lexicon: HALOT
  rationale: La expresión hebrea es idiomática y espacial. «De delante de ustedes» mantiene la imagen de remoción desde la línea/frente de Israel sin sonar arcaica en español.
- source_word: גּוֹיִם גְּדֹלִים וַעֲצוּמִים
  english_pob_choice: great and mighty nations
  chosen_spanish: naciones grandes y poderosas
  alternatives_spanish:
  - naciones grandes y fuertes
  - naciones grandes y valientes
  lexicon: HALOT
  rationale: «גדולים» apunta a grandeza/importancia y «עצומים» a fuerza/poder. En español, «grandes y poderosas» preserva esa doble cualidad con naturalidad y dignidad.
- source_word: וְאַתֶּם
  english_pob_choice: and as for you
  chosen_spanish: y en cuanto a ustedes
  alternatives_spanish:
  - y ustedes
  - pero ustedes
  lexicon: HALOT
  rationale: La anteposición del pronombre es enfática. «En cuanto a ustedes» refleja ese valor de contraste/enfoque sin convertirlo innecesariamente en una adversativa fuerte.
- source_word: לֹא עָמַד אִישׁ
  english_pob_choice: not a man has stood
  chosen_spanish: nadie ha podido mantenerse en pie
  alternatives_spanish:
  - no ha podido ponerse en pie un hombre
  - ningún hombre ha permanecido en pie
  lexicon: HALOT
  rationale: El hebreo es literalmente singular («un hombre no ha estado de pie»), pero el sentido idiomático es que nadie ha podido resistir. En español, «nadie ha podido mantenerse en pie» preserva el sentido de resistencia sin sonar forzado.
- source_word: בִּפְנֵיכֶם
  english_pob_choice: before you
  chosen_spanish: delante de ustedes
  alternatives_spanish:
  - frente a ustedes
  - en su presencia
  lexicon: HALOT
  rationale: En contexto bélico, «delante de ustedes» conserva el paralelismo con «de delante de ustedes» y mantiene la imagen hebrea de oposición frontal.
- source_word: עַד הַיּוֹם הַזֶּה
  english_pob_choice: to this day
  chosen_spanish: hasta el día de hoy
  alternatives_spanish:
  - hasta hoy
  - hasta este día
  lexicon: HALOT
  rationale: Es el equivalente español más natural para el modismo temporal de continuidad narrativa.
theological_decisions:
- issue: Nombre divino YHWH
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - Jehová
  rationale: El texto hebreo usa directamente יְהוָה. Se preserva el nombre propio de Dios en la forma establecida por el proyecto, evitando la sustitución litúrgica por un título.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Idiomatismo de resistencia en לֹא עָמַד אִישׁ בִּפְנֵיכֶם
  english_pob_reading: not a man has stood before you
  chosen_spanish_reading: nadie ha podido mantenerse en pie delante de ustedes
  alternative_spanish_readings:
  - no se ha mantenido en pie hombre alguno delante de ustedes
  - ningún hombre ha podido resistirles
  rationale: El POB inglés preserva la forma idiomática y la explica como incapacidad de resistir. En español, la formulación elegida conserva el sentido de derrota completa sin perder claridad idiomática.
  doctrine_reference: Principio de equivalencia óptima y nota lexical sobre el modismo hebreo
- issue: Tono de conquista y posesión territorial
  english_pob_reading: has driven out from before you
  chosen_spanish_reading: ha expulsado de delante de ustedes
  alternative_spanish_readings:
  - ha desposeído de delante de ustedes
  - ha echado fuera de delante de ustedes
  rationale: La acción divina no es solo “sacar”, sino remover a los pueblos para que Israel ocupe la tierra. «Ha expulsado» comunica el acto de desplazamiento con fuerza histórica y militar.
  doctrine_reference: HALOT sobre ירשׁ en hifil en contexto de conquista
translation_notes:
  revision_awareness: 'Se revisó el pasaje con alta concordancia entre la versión inglesa auditada y el hebreo. No se detectaron cambios sustanciales en la lectura: se mantuvo el nombre divino como Yahvé/Yahvé́, el matiz de expulsión/dispossession en el verbo de conquista, y el modismo de resistencia en la segunda cláusula.'
  spanish_consistency_notes:
  - Se usa «Yahvé» de forma consistente para יְהוָה.
  - Se mantiene «de delante de ustedes» / «delante de ustedes» para reflejar el paralelismo espacial hebreo.
  - Se traduce el modismo de resistencia de manera natural en español, sin borrar el sentido literal subyacente.
  - Se opta por «naciones grandes y poderosas» como equivalente publicable de la doble descripción hebrea.
