translation:
  language: es
  text: 'Y clamó al hombre de Dios que había venido de Judá, diciendo: «Así dice Yahvé: Porque te has rebelado contra la palabra[a] de Yahvé y no has guardado el mandamiento que Yahvé tu Dios te ordenó»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literalmente, «la boca de Yahvé», un modismo que significa lo que Yahvé habló.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּקְרָא
  english_pob_choice: he cried out
  chosen_spanish: y clamó
  alternatives_spanish:
  - y llamó
  - y proclamó
  lexicon: HALOT
  rationale: El verbo קרא admite varias posibilidades; en este contexto de reprensión profética, «clamó» conserva el tono enérgico y público que el audit trail inglés quiso expresar con «cried out», sin perder naturalidad en español.
- source_word: אִישׁ הָאֱלֹהִים
  english_pob_choice: the man of God
  chosen_spanish: el hombre de Dios
  alternatives_spanish:
  - el profeta de Dios
  lexicon: HALOT
  rationale: Se mantiene el título hebreo de manera literal y transparente. «Profeta de Dios» sería interpretativo y menos fiel al marcador textual.
- source_word: מִיהוּדָה
  english_pob_choice: from Judah
  chosen_spanish: de Judá
  alternatives_spanish:
  - desde Judá
  lexicon: HALOT
  rationale: La procedencia geográfica se expresa de forma directa y natural en español con «de Judá».
- source_word: כֹּה אָמַר יְהוָה
  english_pob_choice: Thus says Yahweh
  chosen_spanish: Así dice Yahvé
  alternatives_spanish:
  - Así ha dicho Yahvé
  - Esto dice Yahvé
  lexicon: HALOT
  rationale: Se conserva la fórmula profética estándar con el nombre divino en la forma de proyecto «Yahvé», conforme al criterio POB para יְהוָה. «Así dice» es idiomático y reproduce el valor de mensajero del hebreo.
- source_word: יַעַן כִּי
  english_pob_choice: Because
  chosen_spanish: Porque
  alternatives_spanish:
  - Puesto que
  - Ya que
  lexicon: HALOT
  rationale: Introduce la causa del juicio. «Porque» es la equivalencia más natural y suficiente en español.
- source_word: מָרִיתָ
  english_pob_choice: you have rebelled
  chosen_spanish: te has rebelado
  alternatives_spanish:
  - has desobedecido
  - has desafiado
  lexicon: HALOT
  rationale: מרה expresa rebeldía o desafío, más fuerte que mera desobediencia. «Te has rebelado» preserva esa carga covenantal y judicial.
- source_word: פִּי יְהוָה
  english_pob_choice: the word of Yahweh
  chosen_spanish: la palabra de Yahvé
  alternatives_spanish:
  - la boca de Yahvé
  - el mandato de Yahvé
  lexicon: HALOT
  rationale: El hebreo dice literalmente «la boca de Yahvé», pero el POB inglés optó por el equivalente idiomático «the word of Yahweh». En español, «la palabra de Yahvé» mantiene el sentido idiomático y evita una imagen corporal que aquí suena menos natural.
- source_word: שָׁמַרְתָּ
  english_pob_choice: have not kept
  chosen_spanish: no has guardado
  alternatives_spanish:
  - no has observado
  - no has obedecido
  lexicon: HALOT
  rationale: En lenguaje de mandato, שׁמר puede significar guardar/observar. «Has guardado» conserva la fuerza covenantal y el paralelo con el inglés auditado.
- source_word: הַמִּצְוָה
  english_pob_choice: the command
  chosen_spanish: el mandamiento
  alternatives_spanish:
  - el mandato
  - el precepto
  lexicon: HALOT
  rationale: Para español bíblico, «mandamiento» comunica bien la singularidad y la fuerza normativa del hebreo; no añade un matiz excesivamente eclesiástico y encaja con el paralelismo del verso.
- source_word: צִוְּךָ
  english_pob_choice: commanded you
  chosen_spanish: te ordenó
  alternatives_spanish:
  - te mandó
  - te dio la orden
  lexicon: HALOT
  rationale: צוה expresa ordenar/mandar. «Ordenó» es claro y solemne en español; mantiene la relación directa entre Yahvé y el destinatario.
- source_word: יְהוָה אֱלֹהֶיךָ
  english_pob_choice: the LORD your God
  chosen_spanish: Yahvé tu Dios
  alternatives_spanish:
  - Yahvé, tu Dios
  - Yahvé, el Dios tuyo
  lexicon: HALOT
  rationale: Se conserva el nombre divino Yahvé y la relación posesiva del pacto en forma natural en español. No se reemplaza por «SEÑOR» porque el proyecto exige la transliteración del Tetragrámaton.
theological_decisions:
- issue: Renderización de יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - SEÑOR
  rationale: El verso usa el Tetragrámaton explícitamente. Conforme al criterio del proyecto, se preserva el nombre divino como «Yahvé» en lugar de sustituirlo por un título.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Intensidad de מָרִיתָ
  english_pob_reading: you have rebelled
  chosen_spanish_reading: te has rebelado
  alternative_spanish_readings:
  - has desobedecido
  - te has rebelado contra
  rationale: El hebreo expresa una ruptura más grave que incumplimiento formal. «Te has rebelado» mantiene la gravedad judicial y pactual sin sobreinterpretar.
  doctrine_reference: DOCTRINE.md Translation philosophy §1, §3, §5
- issue: Idiomático de פִּי יְהוָה
  english_pob_reading: the word of Yahweh
  chosen_spanish_reading: la palabra de Yahvé
  alternative_spanish_readings:
  - la boca de Yahvé
  - el dicho de Yahvé
  rationale: Aunque la imagen literal es «la boca», el inglés auditado ya documenta la equivalencia idiomática. En español, «la palabra de Yahvé» es la forma más clara y fiel al sentido.
  doctrine_reference: HALOT / audit trail lexical decision on פִּי יְהוָה
translation_notes:
  revision_awareness: No se registran revisiones aplicadas en el paquete fuente; el borrador sigue el pasaje auditado con la misma solución semántica y con equivalencias españolas naturales para el estilo POB.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» para יְהוָה, conforme al estándar del proyecto.
  - Se conserva el título «el hombre de Dios» de manera literal y consistente.
  - Se traduce פִּי יְהוָה idiomáticamente como «la palabra de Yahvé», sin perder la tensión documentada entre literalidad e idiomatismo.
  - «Mandamiento» y «ordenó» preservan el campo semántico de obligación pactual en un español claro y publicable.
