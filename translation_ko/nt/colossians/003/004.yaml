id: COL.3.4
reference: Colossians 3:4
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: ὅταν ὁ Χριστὸς φανερωθῇ, ἡ ζωὴ ⸀ὑμῶν, τότε καὶ ὑμεῖς σὺν αὐτῷ φανερωθήσεσθε ἐν δόξῃ.
base_translation:
  language: en
  yaml_path: translation/nt/colossians/003/004.yaml
  text: When Messiah, who is your life, is revealed, then you also will be revealed with him in glory.
translation:
  language: ko
  text: 여러분의 생명이신 메시아께서 나타나실 때에, 여러분도 그분과 함께 영광 가운데 나타날 것입니다.
  philosophy: optimal-equivalence
  footnotes: []
lexical_decisions:
- source_word: ὅταν ... φανερωθῇ
  english_pob_choice: When ... is revealed
  chosen_korean: 나타나실 때에
  alternatives_korean:
  - 드러나실 때에
  - 나타날 때에
  lexicon: BDAG
  rationale: 미래 시간절. φανερόω를 「나타나다」로 옮긴다.
- source_word: ὁ Χριστὸς ... ἡ ζωὴ ὑμῶν
  english_pob_choice: Messiah, who is your life
  chosen_korean: 여러분의 생명이신 메시아
  alternatives_korean:
  - 우리의 생명이신 메시아
  - 메시아, 곧 여러분의 생명
  lexicon: BDAG
  rationale: 동격 구문을 한국어 관형절 「~이신 메시아」로 자연스럽게 옮긴다.
- source_word: τότε καὶ ὑμεῖς
  english_pob_choice: then you also
  chosen_korean: 여러분도
  alternatives_korean:
  - 그때 여러분도
  - 그때 여러분 자신도
  lexicon: BDAG
  rationale: τότε καί + 강조 대명사를 「여러분도」로 자연스럽게 옮긴다. 시간 표현은 앞 절의 「때에」로 함의.
- source_word: σὺν αὐτῷ φανερωθήσεσθε
  english_pob_choice: will be revealed with him
  chosen_korean: 그분과 함께 ... 나타날 것입니다
  alternatives_korean:
  - 그분과 함께 드러날 것입니다
  lexicon: BDAG
  rationale: 미래 수동 「나타날 것입니다」. 동일 어근 일관성.
- source_word: ἐν δόξῃ
  english_pob_choice: in glory
  chosen_korean: 영광 가운데
  alternatives_korean:
  - 영광으로
  - 영광스럽게
  lexicon: BDAG
  rationale: 종말적 영광의 영역·양식을 「영광 가운데」로 옮긴다.
