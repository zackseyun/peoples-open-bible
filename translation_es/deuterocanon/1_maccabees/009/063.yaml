  yaml_path: translation/deuterocanon/1_maccabees/009/063.yaml
  text: And Bacchides learned of it and gathered all his forces[c][b][a], and he gave orders to those from Judea.
  footnotes:
  - marker: a
    text: Or 'came to know' or 'found out.' The Greek verb can denote receiving news of a situation.
    reason: lexical_alternative
  - marker: b
    text: Literally, 'all his multitude.' In context this likely means the full body of troops or supporters under his command.
    reason: lexical_alternative
  - marker: c
    text: Or 'those in Judea.' The Greek phrase literally reads 'those from Judea,' which may refer to Judean associates rather than only inhabitants currently located there.
    reason: lexical_alternative
