  note: This chapter comes from the normalized Funk 1901 OCR layer.
translation:
  text: 'Therefore[a], since we are a holy portion, let us do all the things of sanctification, fleeing slander, foul and unclean entanglements, drunkenness, seditions, and detestable desires, loathsome adultery, and detestable pride.


    For God[b], he says, opposes the proud, but gives grace to the humble.


    Let us therefore cling to those to whom grace has been given from God. Let us clothe ourselves with concord, being humble-minded and self-controlled, keeping ourselves far from every whispering and slander, being justified by works and not by words.


    For he says, “He who says many things shall also hear in reply.” Or does the ready speaker think himself righteous?


    “Blessed is one born of woman, short-lived. Do not be excessive in words.”


    Let our praise be in God and not from ourselves, for God hates those who praise themselves.


    Let the testimony of our good conduct be given by others, just as it was given to our righteous fathers.


    Boldness and arrogance and recklessness belong to those cursed by God[c][d][e][f][g]; but gentleness and humility and meekness are found among those blessed by God.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The citation echoes Proverbs 3:34 in the form also used in James 4:6 and 1 Peter 5:5.
    reason: cross_reference
    anchor_ref: '30:2'
  - marker: b
    text: These lines appear to echo Job tradition, especially themes found in Job 11:2-3 and 14:1.
    reason: cross_reference
    anchor_ref: 30:4-5
  - marker: g
    text: Or 'being shown righteous by works and not by words.' The Greek verb can denote demonstrated righteousness in conduct.
    reason: lexical_alternative
    anchor_ref: '30:3'
  - marker: f
    text: The term rendered 'seditions' can also be understood as disruptive 'innovations' or factional upheavals.
    reason: lexical_alternative
    anchor_ref: '30:1'
  - marker: e
    text: Or 'Therefore, since we are a holy portion'.
    reason: previous_rendering
  - marker: d
    text: Or 'the testimony of our good deed'.
    reason: previous_rendering
  - marker: c
    text: Or 'Blessed is one born of woman, short-lived.'.
    reason: previous_rendering
lexical_decisions:
- source_word: Ἅγια ... μερὶς
  chosen: a holy portion
  alternatives:
  - a holy share
  - a holy people
  lexicon: LSJ
  rationale: μερὶς is literally a portion/share. 'Holy portion' preserves the covenantal-partitive image without over-paraphrasing into 'people.'
- source_word: τὰ τοῦ ἁγιασμοῦ
  chosen: the things that belong to sanctification
  alternatives:
  - the works of holiness
  - the things of holiness
  lexicon: BDAG
  rationale: Keeps the abstract noun ἁγιασμός as 'sanctification' while making idiomatic English of the genitive construction.
- source_word: καταλαλιάς
  chosen: slander
  alternatives:
  - evil speaking
  - backbiting
  lexicon: BDAG
  rationale: '''Slander'' is concise, current English and fits the vice list context.'
- source_word: συμπλοκὰς
  chosen: entanglements
  alternatives:
  - intercourses
  - connections
  - liaisons
  lexicon: LSJ
  rationale: The term suggests morally compromising involvements; 'entanglements' preserves breadth and moral force without over-specifying.
- source_word: μιαράς τε καὶ ἀνάγνους
  chosen: foul and unclean
  alternatives:
  - defiled and impure
  - filthy and polluted
  lexicon: LSJ
  rationale: A paired rendering preserves the rhetorical doubling of moral revulsion.
- source_word: νεωτεροποιΐας
  chosen: seditions
  alternatives:
  - innovations
  - revolutionary acts
  - factious upheavals
  lexicon: LSJ
  rationale: In paraenetic and civic-moral context, the word points not to neutral novelty but disruptive factionalism; 'seditions' best captures the negative social force.
- source_word: βδελυκτὰς ἐπιθυμίας
  chosen: detestable desires
  alternatives:
  - abominable lusts
  - hateful cravings
  lexicon: BDAG
  rationale: Retains the strong moral disgust of βδελυκτός while keeping accessible English.
- source_word: μυσερὰν μοιχείαν
  chosen: loathsome adultery
  alternatives:
  - hateful adultery
  - foul adultery
  lexicon: LSJ
  rationale: Preserves the emphatic moral denunciation attached to μοιχεία.
- source_word: ὑπερηφανίαν
  chosen: pride
  alternatives:
  - arrogance
  - haughtiness
  lexicon: BDAG
  rationale: Matches the subsequent scriptural citation about the proud and keeps lexical coherence.
- source_word: κολληθῶμεν
  chosen: cling to
  alternatives:
  - join ourselves to
  - cleave to
  lexicon: BDAG
  rationale: '''Cling to'' is vivid, idiomatic, and preserves the exhortational force.'
- source_word: ὁμόνοιαν
  chosen: concord
  alternatives:
  - harmony
  - unity
  lexicon: LSJ
  rationale: Concord preserves the communal-ecclesial tone and rhetorical dignity of the passage.
- source_word: ταπεινοφρονοῦντες
  chosen: being humble-minded
  alternatives:
  - thinking humbly
  - being lowly in mind
  lexicon: BDAG
  rationale: Keeps the mental/dispositional element explicit rather than flattening to merely social humility.
- source_word: ἐγκρατευόμενοι
  chosen: self-controlled
  alternatives:
  - temperate
  - exercising restraint
  lexicon: BDAG
  rationale: Standard, clear rendering for moral self-restraint.
- source_word: ψιθυρισμοῦ
  chosen: whispering
  alternatives:
  - murmuring
  - gossip
  lexicon: BDAG
  rationale: '''Whispering'' preserves the image of covert speech and pairs well with slander.'
- source_word: ἔργοις δικαιούμενοι καὶ μὴ λόγοις
  chosen: being justified by works and not by words
  alternatives:
  - being shown righteous by deeds and not by speech
  - being vindicated by works and not by words
  lexicon: BDAG
  rationale: δικαιόω here concerns demonstrated righteousness in conduct. 'Justified' preserves the lexical link, while the contrast with words clarifies the practical sense.
- source_word: Ὁ ἰὰ πολλὰ λέγων καὶ ἀντακουσεται
  chosen: He who says many things shall also hear in reply
  alternatives:
  - The one who speaks much will also be answered
  - He who multiplies words will get an answer back
  lexicon: Septuagint/Job tradition
  rationale: A restrained rendering preserves the proverbial cadence and likely scriptural allusion without forcing a more interpretive paraphrase.
- source_word: εὐλάλος
  chosen: the ready speaker
  alternatives:
  - the eloquent man
  - the fluent talker
  lexicon: LSJ
  rationale: Conveys facility in speech without implying true wisdom.
- source_word: αὐτεπανέτους
  chosen: those who praise themselves
  alternatives:
  - self-commenders
  - the self-applauding
  lexicon: LSJ
  rationale: Makes the rare compound transparent in natural English.
- source_word: ἡ μαρτυρία τῆς ἀγαθῆς πράξεως
  chosen: the testimony of our good deed
  alternatives:
  - the witness of our good conduct
  - the testimony of our good work
  lexicon: BDAG
  rationale: Singular 'deed' follows the Greek form, though collective in sense; 'testimony' preserves the public-witness nuance.
- source_word: θράσος καὶ αὐθάδεια καὶ τόλμα
  chosen: boldness and arrogance and recklessness
  alternatives:
  - insolence and self-will and audacity
  - presumption and stubbornness and daring
  lexicon: LSJ
  rationale: The trio marks culpable overconfidence; the chosen sequence preserves rhetorical escalation in accessible English.
- source_word: ἐπιείκεια καὶ ταπεινοφροσύνη καὶ πραΰτης
  chosen: gentleness and humility and meekness
  alternatives:
  - forbearance and humility and mildness
  lexicon: BDAG
  rationale: A classic Christian virtue triad; 'meekness' is retained because it remains theologically resonant and distinct from mere softness.
theological_decisions:
- issue: δικαιούμενοι in a paraenetic, non-Pauline context
  chosen_reading: being justified by works and not by words
  alternative_readings:
  - being shown righteous by works and not by words
  - being vindicated by deeds and not by speech
  rationale: The Greek uses δικαιόω, and the chapter's moral exhortation stresses demonstrable righteousness rather than forensic doctrine. Retaining 'justified' preserves lexical transparency while the surrounding wording prevents a misleadingly technical reading.
  doctrine_reference: Preserve theological tension rather than resolve it; consistency of key terms, or documented exception.
- issue: νεωτεροποιΐαι as social-ecclesial vice
  chosen_reading: seditions
  alternative_readings:
  - innovations
  - factious upheavals
  rationale: In Clement's context of communal disorder, the term likely targets destabilizing faction rather than novelty in the abstract. 'Seditions' best reflects the ecclesial warning without importing later technical categories.
  doctrine_reference: Original-language primacy over translation tradition.
