review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien el hebreo principal: תן como petición directa, פעלת en sentido de recompensa/retribución, קוויך con matiz de esperar/esperar con esperanza, ונביאיך como «tus profetas», y יאמנו como vindicación de fiabilidad. Sin embargo, falta en el texto español la nota sobre la fuerte divergencia del testimonio griego, que el POB inglés preserva explícitamente y que el propio expediente teológico español dice que conviene señalar.'
  spanish_quality_summary: El español es claro, digno y legible. «Da la recompensa…» funciona bien. «Sean hallados fieles» es fiel al expediente, aunque algo más literal; mantenerlo es aceptable. El problema principal no es de estilo sino de omisión de una nota textual importante. Además, la nota b actual es redundante y parcialmente confusa, porque repite «esperan en ti» como alternativa a sí misma.
  glossary_alignment: No hay choques con la terminología base del proyecto. Se respetan «Dios» implícito, «profetas», y no hay términos sensibles mal resueltos. La decisión «esperan en ti» puede mantenerse como opción contextual para קוה, pero debe conservarse también la alternativa «te esperan» y añadirse la nota del paralelo griego divergente conforme al audit trail inglés.
  issues:
  - severity: high
    issue: Falta la nota sobre la lectura griega divergente
    rationale: El POB inglés conserva una nota sustancial porque el griego presenta una forma textual muy distinta. Omitirla pierde evidencia textual relevante y va contra la decisión teológica documentada.
  - severity: medium
    issue: La nota b actual sobre קוה está mal formulada
    rationale: 'Dice «O: “los que esperan en ti” = “los que te esperan”…», repitiendo la lectura principal como si fuera alternativa. Conviene formular la alternativa real con claridad: «los que te esperan» / «los que esperan en ti» / «los que confían en ti».'
  revised_spanish_text: Da la recompensa[b][a] de los que esperan en ti, y haz que tus profetas sean hallados fieles.
