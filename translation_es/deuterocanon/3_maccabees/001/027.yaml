translation:
  language: es
  text: Por tanto, cuando los que estaban con él vieron estas cosas, se volvieron para unirse a los nuestros[a] en invocar al que tiene todo poder para ayudar en las circunstancias presentes y no pasar por alto la acción injusta y arrogante.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «con los nuestros»; el griego deja implícito el referente de σὺν τοῖς ἡμετέροις.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ταῦτα
  english_pob_choice: these things
  chosen_spanish: estas cosas
  alternatives_spanish:
  - esto
  - tales cosas
  lexicon: LSJ
  rationale: El demostrativo plural conserva la referencia a los hechos recién vistos y mantiene el enlace narrativo sin forzar una singularización.
- source_word: οἱ περὶ αὐτὸν ὄντες
  english_pob_choice: those around him
  chosen_spanish: los que estaban con él
  alternatives_spanish:
  - los que lo rodeaban
  - sus acompañantes
  lexicon: LSJ
  rationale: La expresión griega describe a los que estaban alrededor de él; en español, 'los que estaban con él' resulta natural y no añade un rango social no explicitado.
- source_word: θεωροῦντες
  english_pob_choice: saw
  chosen_spanish: vieron
  alternatives_spanish:
  - observaban
  - contemplaban
  lexicon: LSJ
  rationale: El participio expresa ver/observar. 'Vieron' comunica con claridad el sentido causal del contexto, sin intensificar indebidamente la idea de vigilancia.
- source_word: ἐτράπησαν εἰς τὸ ... ἐπικελεῦσθαι
  english_pob_choice: they turned to ... calling on
  chosen_spanish: se volvieron para unirse ... en invocar
  alternatives_spanish:
  - fueron movidos a invocar
  - se inclinaron a invocar
  lexicon: LSJ
  rationale: La idiomática griega indica un giro o movimiento interior hacia una acción. 'Se volvieron para unirse ... en invocar' conserva ese cambio de dirección y el matiz de apelación religiosa.
- source_word: σὺν τοῖς ἡμετέροις
  english_pob_choice: join our people
  chosen_spanish: unirse a nuestra gente
  alternatives_spanish:
  - unirse con nuestra gente
  - unirse a los nuestros
  lexicon: LSJ
  rationale: El griego dice literalmente 'con los nuestros'. 'Unirse a nuestra gente' sigue la revisión inglesa más precisa y suena natural en español, manteniendo el referente comunitario implícito.
- source_word: τὸν πὰν κράτος ἔχοντα
  english_pob_choice: the one who has all power
  chosen_spanish: al que tiene todo poder
  alternatives_spanish:
  - al Omnipotente
  - al que posee todo dominio
  lexicon: LSJ
  rationale: La frase describe a Dios por su atributo, no por un título fijo. 'Todo poder' refleja πὰν κράτος de manera directa y evita introducir un nombre teológico no presente en el griego.
- source_word: τοῖς παροῦσιν
  english_pob_choice: in the present circumstances
  chosen_spanish: en las circunstancias presentes
  alternatives_spanish:
  - en lo presente
  - para lo que está ocurriendo
  lexicon: LSJ
  rationale: El dativo plural puede referirse a las circunstancias actuales. 'En las circunstancias presentes' expresa bien ese valor contextual y mantiene el sentido de ayuda concreta.
- source_word: ἐπαμῦναι
  english_pob_choice: to help
  chosen_spanish: para ayudar
  alternatives_spanish:
  - para defender
  - para socorrer
  lexicon: LSJ
  rationale: El verbo puede significar ayudar o defender. 'Ayudar' es fiel y sobrio; el complemento inmediato ya sitúa la ayuda en el conflicto presente.
- source_word: μὴ περιιδεῖν
  english_pob_choice: not overlook
  chosen_spanish: no pasar por alto
  alternatives_spanish:
  - no ignorar
  - no mirar sin actuar
  lexicon: LSJ
  rationale: '''No pasar por alto'' conserva la idea de mirar de lado y no prestar atención, con una fuerza idiomática clara en español.'
- source_word: τὴν ἄνομον καὶ ὑπερήφανον πρᾶξιν
  english_pob_choice: the lawless and arrogant deed
  chosen_spanish: la acción inicua y soberbia
  alternatives_spanish:
  - la acción sin ley y arrogante
  - la obra impía y orgullosa
  lexicon: LSJ
  rationale: πρᾶξις es una acción/obra concreta. 'Inicua' y 'soberbia' comunican bien ἄνομος y ὑπερήφανος en un registro bíblico natural, sin perder el juicio moral del texto.
theological_decisions:
- issue: Descripción de Dios mediante τὸν πὰν κράτος ἔχοντα
  english_pob_reading: the one who has all power
  chosen_spanish_reading: al que tiene todo poder
  alternative_spanish_readings:
  - al Omnipotente
  - al que posee todo dominio
  rationale: La fuente griega usa una descripción atributiva y no un título cerrado. El español conserva ese carácter descriptivo para no oscurecer la forma original ni intensificarla con una etiqueta tradicional no presente.
  doctrine_reference: Translation philosophy §§1, 6
- issue: Sentido de σὺν τοῖς ἡμετέροις
  english_pob_reading: join our people
  chosen_spanish_reading: unirse a nuestra gente
  alternative_spanish_readings:
  - unirse con nuestra gente
  - unirse a los nuestros
  rationale: La lectura inglesa revisada aclara que la construcción expresa alinearse con el grupo comunitario. En español, 'nuestra gente' mantiene esa identificación colectiva sin sobreexplicar la relación social exacta.
  doctrine_reference: Translation philosophy §§5, 6
translation_notes:
  revision_awareness: Tomé en cuenta la revisión inglesa más reciente que corrigió 'join with our people' a 'join our people' para reflejar mejor la construcción griega σὺν τοῖς ἡμετέροις. Por eso la versión española usa 'unirse a nuestra gente' sin una preposición adicional que duplicara la relación ya expresada por el verbo y la frase preposicional.
  spanish_consistency_notes:
  - Se mantuvo un registro bíblico claro y contemporáneo, evitando 'SEÑOR' como máscara para el nombre divino porque este versículo no contiene el Tetragrámaton ni κύριος como cita directa.
  - '''Todo poder'' conserva el valor descriptivo de πὰν κράτος sin convertirlo en título técnico.'
  - '''Acción inicua y soberbia'' preserva el juicio moral del griego y evita suavizar ἄνομος y ὑπερήφανος.'
