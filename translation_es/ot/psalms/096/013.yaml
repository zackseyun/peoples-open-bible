    issue: La nota [a] está mal anclada.
    rationale: En el texto español, [a] aparece después de 'Yahvé', pero la nota explica 'porque viene, porque viene'. El marcador debe ir junto a la frase repetida o no incluirse allí.
  - severity: high
    issue: Las notas no preservan las alternativas significativas del POB inglés.
    rationale: El inglés conserva alternativas para 'for he comes', 'the peoples'/'the nations', y 'with righteousness'/'with his truth' según sus marcadores distribuidos. El borrador omite la alternativa de 'los pueblos' y desplaza la de 'su verdad' a una nota sobre 'justicia', alterando la documentación léxica.
  - severity: medium
    issue: La nota [b] añade una explicación nueva sobre 'mundo' frente a 'tierra' que no forma parte del aparato inglés.
    rationale: Aunque la distinción es defendible en las decisiones léxicas, no corresponde a una nota al pie preservada por el POB aquí y puede confundir el propósito del aparato.
  revised_spanish_text: Delante de Yahvé, porque viene[a], porque viene para juzgar la tierra. Juzgará el mundo con justicia[c], y a los pueblos[b] con su fidelidad.
