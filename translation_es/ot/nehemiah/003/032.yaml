revisions:
- from: Y entre la torre[a] del ángulo y la Puerta de las Ovejas, los orfebres y los comerciantes hicieron reparaciones.
  to: Y entre el aposento alto[a] de la esquina y la Puerta de las Ovejas, los orfebres y los comerciantes hicieron reparaciones.
  rationale: Se revisa únicamente la primera expresión nominal para ajustarla al hebreo y al audit trail inglés. «Aposento alto» conserva la idea de una estructura elevada sin imponer «torre», mientras la nota mantiene las alternativas legítimas y la incertidumbre arquitectónica. «Esquina» mejora la naturalidad del español frente a «ángulo».
