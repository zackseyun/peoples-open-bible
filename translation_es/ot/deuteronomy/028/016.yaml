translation:
  language: es
  text: Maldito[a] eres en la ciudad, y maldito eres en el campo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «bajo maldición».'
    reason: lexical_alternative
lexical_decisions:
- source_word: אָרוּר
  english_pob_choice: cursed
  chosen_spanish: maldito
  alternatives_spanish:
  - maldito bajo maldición
  - bajo maldición
  lexicon: HALOT
  rationale: La forma hebrea funciona aquí como estado predicativo de sanción del pacto. En español, «maldito» comunica de manera directa la condición declarada; «bajo maldición» es una alternativa válida, pero menos concisa y menos paralela al tono formular del hebreo.
- source_word: אַתָּה
  english_pob_choice: are you
  chosen_spanish: eres
  alternatives_spanish:
  - tú eres
  - estás
  lexicon: HALOT
  rationale: El pronombre de 2 ms es explícito en hebreo. En español, la persona queda marcada en el verbo; «eres» conserva la declaración directa sin sobrecargar la frase. No se añade «tú» porque no aporta más claridad en este contexto formulístico.
- source_word: בָּעִיר
  english_pob_choice: in the city
  chosen_spanish: en la ciudad
  alternatives_spanish:
  - dentro de la ciudad
  - en la urbe
  lexicon: HALOT
  rationale: La preposición ב indica ubicación. «En la ciudad» es la equivalencia más natural y conserva el contraste con «el campo».
- source_word: וְ
  english_pob_choice: and
  chosen_spanish: y
  alternatives_spanish:
  - también
  lexicon: HALOT
  rationale: La conjunción simple mantiene el paralelismo y la acumulación de la fórmula de maldición.
- source_word: בַּשָּׂדֶה
  english_pob_choice: in the field
  chosen_spanish: en el campo
  alternatives_spanish:
  - en el terreno
  - en la campiña
  lexicon: HALOT
  rationale: שָׂדֶה designa el ámbito agrícola/campestre. «En el campo» conserva el paralelismo concreto con «en la ciudad» y la amplitud merística del dicho.
theological_decisions:
- issue: 'Naturaleza de la cláusula: declaración de maldición, no deseo ni predicción futura'
  english_pob_reading: Cursed are you in the city, and cursed are you in the field.
  chosen_spanish_reading: Maldito eres en la ciudad, y maldito eres en el campo.
  alternative_spanish_readings:
  - Serás maldito en la ciudad y en el campo
  - Que seas maldito en la ciudad y en el campo
  rationale: El hebreo presenta una construcción predicativa con participio repetido, propia de una sanción declarativa del pacto. Por eso se evita una lectura de futuro o de deseo optativo, que debilitaría el valor jurídico de la fórmula.
  doctrine_reference: 'Translation philosophy: optimal equivalence; conservar la fuerza del juicio pactual sin introducir matices ajenos al hebreo.'
translation_notes:
  revision_awareness: El texto inglés auditado no requirió cambios en esta pasada; se conservó la lectura declarativa y el paralelismo espacial de la fórmula de maldición.
  spanish_consistency_notes:
  - Se evitó «SEÑOR» o equivalentes de ocultamiento porque el versículo no contiene el nombre divino.
  - Se mantuvo «maldito» como equivalente directo del participio pasivo de sanción; no se sustituyó por una formulación más suave.
  - Se conservó el paralelismo «en la ciudad / en el campo» para reflejar el merismo del hebreo.
