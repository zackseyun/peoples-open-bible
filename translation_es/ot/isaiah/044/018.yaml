  text: לֹ֥א יָדְע֖וּ וְ/לֹ֣א יָבִ֑ינוּ כִּ֣י טַ֤ח מֵֽ/רְאוֹת֙ עֵֽינֵי/הֶ֔ם מֵ/הַשְׂכִּ֖יל לִבֹּתָֽ/ם׃
base_translation:
  language: en
  yaml_path: translation/ot/isaiah/044/018.yaml
  text: They do not know[a], nor do they understand, because he has shut their eyes from seeing[c][b], and their hearts from understanding.
  footnotes:
  - marker: a
    text: Or 'has plastered over their eyes so they cannot see.' The Hebrew verb is a concrete image of smearing or coating over, often rendered more interpretively as 'blinded.'
    reason: lexical_alternative
  - marker: b
    text: The Hebrew says 'their hearts,' using 'heart' as the seat of thought and understanding, not merely emotion.
    reason: cultural_note
  - marker: c
    text: The subject of 'has smeared' is implicit in Hebrew; the text does not explicitly name the agent here.
    reason: alternative_reading
