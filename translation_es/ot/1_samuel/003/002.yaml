translation:
  language: es
  text: Y sucedió que aquel día[a], Elí estaba acostado en su lugar, y sus ojos habían comenzado a oscurecerse; no podía ver.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O bien: «su ojo había comenzado a oscurecerse». La forma hebrea puede entenderse colectivamente para la vista; por eso el texto principal dice «sus ojos».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְהִי
  english_pob_choice: Now ...
  chosen_spanish: Aquel día
  alternatives_spanish:
  - Y aconteció
  - Y sucedió
  lexicon: HALOT
  rationale: El hebreo introduce la escena con una fórmula narrativa temporal. En español, «Aquel día» conserva la función de anclaje temporal del contexto inmediato sin sonar tan arcaico como una fórmula con «Y aconteció».
- source_word: בַּיּוֹם הַהוּא
  english_pob_choice: on that day
  chosen_spanish: Aquel día
  alternatives_spanish:
  - en aquel día
  - en ese día
  lexicon: HALOT
  rationale: La expresión temporal se rinde de forma natural y directa. «Aquel día» mantiene el valor deíctico del hebreo y funciona bien en español bíblico contemporáneo.
- source_word: שֹׁכֵב
  english_pob_choice: was lying down
  chosen_spanish: estaba acostado
  alternatives_spanish:
  - estaba tendido
  - yacía
  lexicon: HALOT
  rationale: El participio describe un estado continuo. «Estaba acostado» comunica la postura sin forzar un calco literal y es idiomático en español; «yacía» sería más elevado, pero menos natural aquí.
- source_word: בִּמְקֹמוֹ
  english_pob_choice: in his place
  chosen_spanish: en su lugar
  alternatives_spanish:
  - en su propio lugar
  - en su sitio
  lexicon: HALOT
  rationale: מָקוֹם significa literalmente «lugar». «En su lugar» preserva la sobriedad del hebreo y evita añadir información no explícita, como «cuarto» o «habitación».
- source_word: וְעֵינוֹ
  english_pob_choice: his eyes
  chosen_spanish: sus ojos
  alternatives_spanish:
  - su ojo
  lexicon: HALOT
  rationale: Aunque la forma hebrea puede leerse singular con sentido colectivo, el español normaliza la referencia a la vista con plural cuando se habla de la capacidad visual. Se conserva la nota de ambigüedad en el pie.
- source_word: הֵחֵלוּ כֵהוֹת
  english_pob_choice: had begun to grow dim
  chosen_spanish: habían comenzado a oscurecerse
  alternatives_spanish:
  - habían empezado a ponerse turbios
  - habían comenzado a debilitarse
  lexicon: HALOT
  rationale: La combinación verbal expresa el inicio de una pérdida progresiva de visión. «Oscurecerse» reproduce bien la imagen de visión debilitada; «debilitarse» es posible, pero menos visual.
- source_word: לֹא יוּכַל לִרְאוֹת
  english_pob_choice: he could not see
  chosen_spanish: no podía ver
  alternatives_spanish:
  - no podía ver ya
  - no logró ver
  lexicon: HALOT
  rationale: La cláusula expresa el resultado práctico de la vista menguante. «No podía ver» es directo y natural, sin añadir matices de esfuerzo o completividad que el hebreo no exige.
translation_notes:
  revision_awareness: El texto sigue de cerca la solución auditada en inglés, pero adapta la introducción narrativa al español con una fórmula temporal más natural. Se conserva la ambigüedad hebrea sobre singular/plural en el pie de nota, como en el POB inglés.
  spanish_consistency_notes:
  - Se mantuvo «Elí» con acento según el uso español bíblico estándar.
  - Se evitó «SEÑOR» o equivalentes porque este versículo no contiene el Tetragrámaton ni κύριος.
  - Se prefirió un registro sobrio y claro, sin introducir elementos interpretativos adicionales.
