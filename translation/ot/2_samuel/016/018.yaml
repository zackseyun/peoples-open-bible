id: 2SA.16.18
reference: 2 Samuel 16:18
source:
  edition: WLC
  text: וַ/יֹּ֣אמֶר חוּשַׁי֮ אֶל אַבְשָׁלֹם֒ לֹ֕א כִּי֩ אֲשֶׁ֨ר בָּחַ֧ר יְהוָ֛ה וְ/הָ/עָ֥ם הַ/זֶּ֖ה וְ/כָל אִ֣ישׁ יִשְׂרָאֵ֑ל לא אֶהְיֶ֖ה וְ/אִתּ֥/וֹ אֵשֵֽׁב־־׃
translation:
  text: Hushai said to Absalom[a], “No, for the one whom Yahweh and this people and all the men of Israel have chosen—I will be his[c][b], and with him I will remain.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, “whomever the LORD, this people, and all the men of Israel choose.”
    reason: lexical_alternative
  - marker: b
    text: Hebrew literally, “and every man of Israel.”
    reason: lexical_alternative
  - marker: c
    text: Or, “with him I will stay.”
    reason: lexical_alternative
lexical_decisions:
- source_word: לֹא כִּי
  chosen: No, for
  alternatives:
  - No, but
  - No indeed, rather
  lexicon: HALOT
  rationale: The sequence functions as a strong denial followed by explanation/correction. 'No, for' preserves the rebuttal and the causal force without overparaphrasing.
- source_word: אֲשֶׁר בָּחַר
  chosen: the one whom ... have chosen
  alternatives:
  - whomever ... choose
  - he whom ... has chosen
  lexicon: HALOT
  rationale: The relative clause points to a specific person already in view. English smooths the singular object with a relative construction. The plural English auxiliary 'have' reflects the compound subject that follows.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives: []
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: וְהָעָם הַזֶּה
  chosen: and this people
  alternatives:
  - and these people
  - and the people here
  lexicon: HALOT
  rationale: Hebrew has singular 'people' with demonstrative 'this.' Retaining singular matches the collective sense and the source wording.
- source_word: וְכָל אִישׁ יִשְׂרָאֵל
  chosen: and every man of Israel
  alternatives:
  - and all the men of Israel
  - and every Israelite
  lexicon: HALOT
  rationale: Literally 'every man of Israel.' This is gender-accurate and preserves the distributive force of כָל + אִישׁ better than the more generalized 'every Israelite.'
- source_word: לא אֶהְיֶה
  chosen: I will be his
  alternatives:
  - I will belong to him
  - I will be
  lexicon: HALOT
  rationale: 'The Hebrew is elliptical: ''not I will be?'' in context meaning ''I will be [for him/his].'' Supplying ''his'' makes the allegiance sense explicit in natural English while staying close to the implied object.'
- source_word: וְאִתּוֹ אֵשֵׁב
  chosen: and with him I will remain
  alternatives:
  - and with him I will sit
  - and with him I will stay
  lexicon: HALOT
  rationale: יָשַׁב often means 'sit,' but in contexts of residence or continued association it idiomatically means 'remain' or 'stay.' 'Remain' fits Hushai's pledge of continued attachment in court.
