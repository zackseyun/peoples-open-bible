review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien la estructura hebrea: temporal con בְּשׁוֹבְבִי, distinción entre עמים (''pueblos'') y גוים (''naciones''), plural de ''tierras'', y la idea de manifestación pública de la santidad divina. Sin embargo, la formulación española ''seré mostrado santo'' suena poco natural y no representa tan bien en español bíblico digno el valor de וְנִקְדַּשְׁתִּי בָם como una expresión más idiomática.'
  spanish_quality_summary: La mayor parte del verso es clara y fiel. 'de entre los pueblos' mejora la naturalidad frente a 'de entre/entre' en este contexto de retorno. El principal problema es 'seré mostrado santo', que resulta forzado en español. También la nota 'seré hecho santo en ellos' es teológicamente y estilísticamente deficiente; 'seré tenido por santo' o 'seré santificado en ellos' es mejor.
  glossary_alignment: 'Buena alineación general con la terminología del proyecto: ''pueblos'' frente a ''naciones'', y lenguaje de santidad que intenta evitar implicar cambio intrínseco en Dios. No aparece el nombre divino en el texto base, pero la nota ya lo menciona adecuadamente como Yahvé. Conviene ajustar la alternativa formal para que no sugiera que Dios llega a ser santo.'
  issues:
  - severity: medium
    issue: '''seré mostrado santo'' es una construcción poco idiomática en español'
    rationale: Aunque busca reflejar el pasivo del inglés auditado, en español suena torpe y menos natural que 'seré reconocido como santo' o 'seré santificado en ellos'. La traducción debe conservar sentido y dignidad eclesial legible.
  - severity: medium
    issue: La nota alternativa 'seré hecho santo en ellos' es teológicamente desafortunada
    rationale: Puede sugerir que Dios es hecho santo por otro agente, lo cual distorsiona el sentido. El hebreo trata de la manifestación o vindicación pública de su santidad, no de un cambio en Dios.
  - severity: low
    issue: '''de entre los pueblos'' encaja mejor que ''de entre/entre los pueblos'' con el hebreo y el registro'
    rationale: El hebreo מִן הָעַמִּים se vierte de manera más natural y precisa en español como 'de entre los pueblos' en contextos de dispersión y retorno.
  revised_spanish_text: cuando yo los haga volver de entre los pueblos y los reúna de las tierras de sus enemigos[a], y seré reconocido como santo por medio de ellos ante los ojos de muchas naciones.
  revised_footnotes:
