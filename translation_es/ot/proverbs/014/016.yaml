translation:
  language: es
  text: El sabio teme y se aparta del mal, pero el necio es temerario[a] y confiado.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «se enfurece» o «se sobrepasa»; el verbo hebreo es difícil, pero aquí probablemente describe una conducta precipitada y sin freno.
    reason: lexical_alternative
lexical_decisions:
- source_word: חָכָם
  english_pob_choice: wise man
  chosen_spanish: el sabio
  alternatives_spanish:
  - un hombre sabio
  - la persona sabia
  - el que es sabio
  lexicon: HALOT
  rationale: El adjetivo funciona sustantivamente en el proverbio. En español, «el sabio» comunica naturalmente la categoría proverbial sin forzar el género como en inglés; mantiene la brevedad y la fuerza sentenciosa del hebreo.
- source_word: יָרֵא
  english_pob_choice: fears
  chosen_spanish: teme
  alternatives_spanish:
  - reverencia
  - es cauteloso
  - tiene temor
  lexicon: HALOT
  rationale: El verbo básico es «temer». En este contexto sapiencial expresa una reacción prudente ante el peligro o el mal; «teme» conserva ese valor léxico sin añadir un objeto explícito que el hebreo no formula aquí.
- source_word: וְסָר
  english_pob_choice: turns away
  chosen_spanish: se aparta
  alternatives_spanish:
  - se desvía
  - se aleja
  - se retira
  lexicon: HALOT
  rationale: סור significa apartarse o desviarse. «Se aparta» es idiomático en español y conserva la idea de movimiento moral alejándose del mal.
- source_word: מֵרָע
  english_pob_choice: from evil
  chosen_spanish: del mal
  alternatives_spanish:
  - de lo malo
  - del mal moral
  - de la desgracia
  lexicon: HALOT
  rationale: רַע puede significar mal moral o calamidad. Aquí, por el paralelismo con el necio y por la formulación proverbial, «del mal» preserva la amplitud del término sin restringirlo indebidamente.
- source_word: כְסִיל
  english_pob_choice: a fool
  chosen_spanish: el necio
  alternatives_spanish:
  - el insensato
  - el tonto
  - el falto de juicio
  lexicon: HALOT
  rationale: En Proverbios, כְסִיל es un término técnico de sabiduría para quien rechaza la instrucción. «El necio» es la equivalencia tradicional y precisa en español bíblico, más cercana al registro sapiencial que «tonto».
- source_word: מִתְעַבֵּר
  english_pob_choice: is reckless
  chosen_spanish: es temerario
  alternatives_spanish:
  - se enfurece
  - se desborda
  - actúa sin freno
  lexicon: HALOT
  rationale: El hitpael de עבר es difícil y puede implicar sobrepasarse, irrumpir o enfurecerse. Dado el contexto contrastivo con el sabio que teme y se aparta, «es temerario» expresa bien la conducta impulsiva y sin contención, sin decidir en exceso por una de las posibles matizaciones.
- source_word: וּבוֹטֵחַ
  english_pob_choice: confident
  chosen_spanish: y confiado
  alternatives_spanish:
  - y seguro de sí
  - y confiado en sí mismo
  - y tranquilo
  lexicon: HALOT
  rationale: בטח denota confianza o seguridad. Como el hebreo no especifica objeto y el contexto es negativo, «confiado» reproduce la idea de confianza sin imponer «en sí mismo» como interpretación explícita.
theological_decisions:
- issue: Sentido de רַע en contraste sapiencial
  english_pob_reading: '''from evil'' with possible practical nuance of harm/disaster'
  chosen_spanish_reading: «del mal» con amplitud para mal moral y daño
  alternative_spanish_readings:
  - «de la desgracia»
  - «de lo que hace daño»
  rationale: No se debe estrechar el hebreo a una sola dimensión. En español, «mal» conserva la tensión entre lo moralmente malo y lo ruin o nocivo, permitiendo la lectura sapiencial amplia que el contexto admite.
  doctrine_reference: Sabiduría bíblica en Proverbios; semántica de רַע
- issue: Valor de מִתְעַבֵּר
  english_pob_reading: '''reckless'' with footnote preserving ''becomes enraged'' or ''oversteps bounds'''
  chosen_spanish_reading: «temerario» con nota que preserve posibles matices
  alternative_spanish_readings:
  - «iracundo»
  - «que se sobrepasa»
  - «desenfrenado»
  rationale: La forma hebrea es difícil y el auditable inglés ya documenta varias posibilidades. «Temerario» da una lectura coherente con el paralelismo y, al mismo tiempo, no elimina las demás opciones; la nota conserva la tensión léxica importante.
  doctrine_reference: Poética sapiencial; ambigüedad verbal del hitpael de עבר
translation_notes:
  revision_awareness: La versión inglesa más reciente cambió «self-confident» por «confident» para suavizar la última cláusula. En español se reflejó esa neutralidad con «confiado», evitando una explicitación reflexiva que no está en el hebreo.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» fuera de este versículo porque no aparece el tetragrámaton ni una alusión directa al nombre divino en el texto base.
  - Se prefirió «el sabio / el necio» por ser fórmulas proverbiales naturales y consistentes con el registro sapiencial.
  - «Teme» y «se aparta» conservan el paralelismo verbal breve del hebreo sin agregar objetos implícitos.
  - La nota al pie se ancla en «temerario» para preservar la dificultad léxica de מִתְעַבֵּר, aunque el texto principal adopta una solución interpretativa viable.
