base_translation:
  language: en
  yaml_path: translation/ot/1_chronicles/019/007.yaml
  text: So they hired for themselves thirty-two thousand chariots[a], and the king of Maacah with his people. They came and camped before Medeba[b], and the sons of Ammon gathered from their cities and came to battle.
  footnotes:
  - marker: a
    text: Or 'the Ammonites' for 'the sons of Ammon.' The Hebrew is literally 'sons of Ammon,' a standard ethnic designation.
    reason: lexical_alternative
  - marker: b
    text: '''Chariots'' may also denote a chariot force or chariotry collectively, not necessarily a count of individual vehicles only.'
    reason: lexical_alternative
