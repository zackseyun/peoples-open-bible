    issue: La nota [a] está anclada tras 'su rey' en vez de en la cláusula sobre tomar botín.
    rationale: La nota inglesa a explica la ambigüedad de תָּבֹזּוּ לָכֶם ('may plunder/shall plunder'), no la comparación con Jericó ni 'su rey'. El anclaje actual induce a error y no cumple la disciplina de notas.
  - severity: medium
