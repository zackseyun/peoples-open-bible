translation:
  language: es
  text: Después comprenderás mis palabras[a], y suspirarás por mi hermana.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'El hebreo es difícil aquí, especialmente la frase traducida «por mi hermana». El testimonio griego lee en cambio: «Permanecerá contigo una hora, y si te apartas, no resistirá», lo cual refleja un texto o una interpretación sustancialmente diferente.'
    reason: alternative_reading
lexical_decisions:
- source_word: וּלְאָחוֹר
  english_pob_choice: Afterward
  chosen_spanish: Después
  alternatives_spanish:
  - Luego
  - Más tarde
  - Al final
  lexicon: HALOT
  rationale: La frase marca una referencia temporal posterior. «Después» es natural en español y conserva la idea de un momento ulterior sin especificar si implica demora extrema o conclusión definitiva.
- source_word: תַּשִּׂיג
  english_pob_choice: you will understand
  chosen_spanish: comprenderás
  alternatives_spanish:
  - entenderás
  - alcanzarás
  - captarás
  lexicon: HALOT
  rationale: El hebreo puede llevar la idea de «alcanzar/rebasar», pero el contexto con «mis palabras» favorece una realización intelectual posterior. «Comprenderás» refleja la revisión inglesa y suena más natural que una calca literal.
- source_word: אֲמָרַי
  english_pob_choice: my words
  chosen_spanish: mis palabras
  alternatives_spanish:
  - mis dichos
  - lo que dije
  - mis sentencias
  lexicon: HALOT
  rationale: Es una traducción directa y transparente del sustantivo plural con sufijo de primera persona. «Palabras» es la opción más clara y menos marcada en español.
- source_word: וּלְאַחְוָתִי
  english_pob_choice: for my sister
  chosen_spanish: por mi hermana
  alternatives_spanish:
  - por mi compañera
  - por mi hermana/unión
  - por mi fraternidad
  lexicon: HALOT
  rationale: Se conserva la lectura difícil del hebreo transmitido. En español, «por mi hermana» mantiene la rareza textual sin suavizarla indebidamente; otras opciones interpretativas borrarían la tensión documentada.
- source_word: תִּתְאַנָּח
  english_pob_choice: you will sigh
  chosen_spanish: suspirarás
  alternatives_spanish:
  - gemirás
  - lamentarás
  - suspirarás con dolor
  lexicon: HALOT
  rationale: El verbo expresa suspirar/gemir. «Suspirarás» es idiomático en español y retiene una fuerza emotiva relativamente contenida, acorde con la opción inglesa.
theological_decisions:
- issue: Primacía del hebreo frente al paralelo griego divergente
  english_pob_reading: Main text follows the extant Hebrew, with the Greek informing the sense of delayed regret but not replacing the Hebrew wording.
  chosen_spanish_reading: El texto principal sigue el hebreo conservado, mientras que el griego se registra como alternativa notable en nota, sin sustituir la línea hebrea.
  alternative_spanish_readings:
  - 'Traducir directamente el griego: «Él permanecerá contigo una hora, y si te apartas, no resistirá».'
  - Reemplazar el hebreo oscuro por una paráfrasis interpretativa basada en el griego.
  rationale: La política del proyecto da prioridad al hebreo cuando está preservado. Dado que aquí hebreo y griego difieren sustancialmente, la traducción debe mantener el testimonio hebreo y documentar el testimonio griego, en vez de armonizarlos silenciosamente.
  doctrine_reference: 'PHILOSOPHY.md: translate from Hebrew where it survives; use Greek parallel as actual input'
- issue: Tratamiento de una expresión hebrea textualmente difícil
  english_pob_reading: Retain the more literal rendering 'for my sister' in the main text and preserve the Greek alternative in a footnote.
  chosen_spanish_reading: Se mantiene la expresión literal y difícil «por mi hermana» en el texto principal, con la alternativa griega explicada en nota.
  alternative_spanish_readings:
  - Emendar hacia «por mi compañerismo» o «por mi compañera».
  - Sustituir la cláusula por el sentido del griego sin señalar la diferencia.
  rationale: La transparencia editorial exige conservar la dificultad del hebreo transmitido. Traducir de forma más lisa eliminaría una tensión textual real que el aparato inglés ya documenta.
  doctrine_reference: 'DOCTRINE.md: preserve theological/interpretive tension rather than resolve it silently'
translation_notes:
  revision_awareness: Se siguió la revisión inglesa más reciente que cambió 'attain' por 'understand' para תַּשִּׂיג; por eso se prefirió «comprenderás» en lugar de un verbo más literal como «alcanzarás». También se mantuvo la tensión textual entre hebreo y griego sin armonizarla.
  spanish_consistency_notes:
  - Se usó «Yahvé» como término base del proyecto cuando corresponda, pero este versículo no contiene el nombre divino.
  - Se mantuvo un español neutral y eclesialmente readable, sin arcaísmos innecesarios.
  - La nota de pie de página conserva la divergencia griega sin introducir una segunda traducción en el cuerpo principal.
  - No se sustituyó «hermana» por un equivalente interpretativo no atestiguado, para preservar la rareza del hebreo.
