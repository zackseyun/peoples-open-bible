translation:
  language: es
  text: Y el sacerdote lo acercará al altar[a], y le desprenderá la cabeza y lo hará arder sobre el altar[b], y su sangre será escurrida sobre el costado del altar.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «le retorcerá la cabeza»; el verbo hebreo es un término técnico para la acción sacerdotal de matar un ave de sacrificio.
    reason: lexical_alternative
  - marker: b
    text: Literalmente, «sobre la pared del altar».
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהִקְרִיבוֹ
  english_pob_choice: shall bring it
  chosen_spanish: lo acercará
  alternatives_spanish:
  - lo presentará
  - lo ofrecerá
  lexicon: HALOT
  rationale: El hifil de קרב expresa acercar o traer cerca. En español, «lo acercará» conserva el movimiento concreto hacia el altar y evita una abstracción excesiva.
- source_word: הַכֹּהֵן
  english_pob_choice: the priest
  chosen_spanish: el sacerdote
  alternatives_spanish:
  - el sacerdote oficiant
  - el ministro
  lexicon: HALOT
  rationale: En español bíblico, «sacerdote» es la equivalencia natural y clara para כֹּהֵן en legislación sacrificial.
- source_word: אֶל הַמִּזְבֵּחַ
  english_pob_choice: to the altar
  chosen_spanish: al altar
  alternatives_spanish:
  - hacia el altar
  - junto al altar
  lexicon: HALOT
  rationale: אֶל indica movimiento hacia una meta; «al altar» reproduce esa dirección de manera natural en español.
- source_word: וּמָלַק
  english_pob_choice: pinch off
  chosen_spanish: le arrancará
  alternatives_spanish:
  - le torcerá
  - le desgajará
  lexicon: HALOT
  rationale: El verbo técnico מלק describe la acción sacerdotal sobre el ave. «Le arrancará» comunica la separación del cuello/cabeza con fuerza suficiente en español, sin imponer una imagen excesivamente mecánica; la nota conserva la alternativa más literal.
- source_word: אֶת רֹאשׁוֹ
  english_pob_choice: its head
  chosen_spanish: la cabeza
  alternatives_spanish:
  - su cabeza
  lexicon: HALOT
  rationale: El referente es el ave; en español, el objeto directo queda claro con «la cabeza» dentro del contexto inmediato.
- source_word: וְהִקְטִיר
  english_pob_choice: burn it
  chosen_spanish: lo hará arder
  alternatives_spanish:
  - lo quemará
  - lo ofrecerá en humo
  lexicon: HALOT
  rationale: En contexto sacrificial, קטר implica quemar para que ascienda en humo. «Lo hará arder» mantiene la acción y deja implícita la noción cultual del humo sin volverla más explícita que el hebreo.
- source_word: הַמִּזְבֵּחָה
  english_pob_choice: on the altar
  chosen_spanish: sobre el altar
  alternatives_spanish:
  - en el altar
  - encima del altar
  lexicon: HALOT
  rationale: La terminación direccional aquí acompaña la acción de quemar en el altar; «sobre el altar» es natural y fiel a la escena ritual.
- source_word: וְנִמְצָה
  english_pob_choice: shall be drained out
  chosen_spanish: será escurrida
  alternatives_spanish:
  - será drenada
  - será exprimida
  lexicon: HALOT
  rationale: El nifal de מצה expresa que la sangre sale por presión/escurrimiento. «Será escurrida» conserva la pasiva y resulta idiomático en español.
- source_word: דָמוֹ
  english_pob_choice: its blood
  chosen_spanish: su sangre
  alternatives_spanish:
  - la sangre de él
  - su propia sangre
  lexicon: HALOT
  rationale: Se refiere a la sangre del ave; «su sangre» es natural y mantiene la referencia pronominal del original.
- source_word: עַל קִיר הַמִּזְבֵּחַ
  english_pob_choice: on the side of the altar
  chosen_spanish: sobre el costado del altar
  alternatives_spanish:
  - contra la pared del altar
  - sobre la pared del altar
  lexicon: HALOT
  rationale: קִיר significa literalmente «pared», pero en español «costado» comunica mejor el punto de aplicación de la sangre en un altar. La nota preserva el sentido literal «pared» como alternativa.
theological_decisions:
- issue: La acción ritual de מלק en una ofrenda de ave
  english_pob_reading: The verb is a technical term for the priestly killing of a bird offering; POB renders it with a concrete action and footnotes the technical nuance.
  chosen_spanish_reading: La traducción principal usa un verbo concreto («le arrancará») y la nota preserva que se trata de un término técnico sacerdotal.
  alternative_spanish_readings:
  - le torcerá el cuello
  - le desgajará la cabeza
  rationale: La acción debe ser entendible sin perder el carácter técnico y cultual del verbo. Por eso se evita una paráfrasis interpretativa y se mantiene la nota sobre el término especializado.
  doctrine_reference: Levítico 1:15; legislación sacrificial sobre ofrendas de aves
translation_notes:
  revision_awareness: Se siguió el pasaje hebreo de Levítico 1:15 y el registro auditado en inglés sin cambios de revisión pendientes; el texto inglés aprobado preserva dos notas lexicográficas que se reflejan en español. No se detectaron revisiones aplicadas posteriores.
  spanish_consistency_notes:
  - Se mantiene «altar» para מִזְבֵּחַ y «sacerdote» para הַכֹּהֵן.
  - Se conservó un tono ritual sobrio y contemporáneo, evitando el calco inglés «offer up in smoke» pero manteniendo la idea cultual de quemar en el altar.
  - Se eligió «Yahvé» como convención general del proyecto, pero este versículo no contiene el nombre divino.
  - La imagen final «costado del altar» busca ser natural en español sin borrar la alternativa literal «pared» que el audit trail documenta.
