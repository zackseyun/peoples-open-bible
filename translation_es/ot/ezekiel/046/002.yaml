    issue: La nota [a] está colocada en «desde afuera[a]» pero su contenido explica «ofrendas de paz».
    rationale: Esto rompe la disciplina requerida de anclar cada nota exactamente en la palabra o frase pertinente y puede confundir al lector sobre qué elemento tiene alternativa léxica.
