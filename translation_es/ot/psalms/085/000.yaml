translation:
  language: es
  text: Para el director musical[a]. De los hijos de Coré[b]. Salmo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'También puede entenderse: "Para el maestro de música", "Para el director del coro" o "Al maestro de coro".'
    reason: lexical_alternative
  - marker: b
    text: 'O: "Para los hijos de Coré". La preposición hebrea puede indicar autoría, asociación o dedicación en los encabezados de los salmos.'
    reason: alternative_reading
lexical_decisions:
- source_word: לַמְנַצֵּחַ
  english_pob_choice: For the choir director
  chosen_spanish: Para el director musical
  alternatives_spanish:
  - Para el maestro de música
  - Para el director del coro
  - Al maestro de coro
  lexicon: HALOT
  rationale: El término en encabezados de salmos señala a la persona encargada de la dirección musical o de la ejecución. "Director musical" conserva bien esa función en español actual y evita un calco demasiado literal o una fórmula eclesiástica más cargada.
- source_word: לִבְנֵי
  english_pob_choice: Of the sons of
  chosen_spanish: De los hijos de
  alternatives_spanish:
  - Para los hijos de
  - Pertenece a los hijos de
  - De la línea de
  lexicon: HALOT
  rationale: La preposición ל en títulos de salmos puede indicar pertenencia, asociación o dedicación. "De los hijos de" mantiene esa ambigüedad y reproduce de manera natural la construcción del encabezado.
- source_word: קֹרַח
  english_pob_choice: Korah
  chosen_spanish: Coré
  alternatives_spanish:
  - Korah
  lexicon: Transliteración estándar bíblica
  rationale: En español bíblico, el nombre se adapta comúnmente como "Coré". Es la forma más reconocible y coherente con el uso tradicional español, sin alterar la referencia propia.
- source_word: מִזְמוֹר
  english_pob_choice: A psalm
  chosen_spanish: Salmo
  alternatives_spanish:
  - Un salmo
  - Cántico
  - Poema
  lexicon: HALOT
  rationale: מִזְמוֹר es la etiqueta genérica del género. En español, "Salmo" funciona de modo natural como rótulo de encabezado y preserva el valor genérico-musical del hebreo.
translation_notes:
  revision_awareness: El paquete fuente muestra alta concordancia y ninguna revisión aplicada; por tanto, se conserva la lectura estable del encabezado, manteniendo la ambigüedad funcional de ל en los títulos y la etiqueta genérica de género.
  spanish_consistency_notes:
  - Se usa "Yahvé" para el nombre divino en el proyecto, pero este versículo no lo contiene.
  - Se evita "SEÑOR" como máscara editorial en encabezados; aquí el término relevante es un rótulo musical, no un sustituto divino.
  - '"Salmo" se mantiene como rótulo de género, no como paráfrasis interpretativa.'
  - La forma "Coré" sigue la convención bíblica española y no altera la relación con el hebreo מקור.
