translation:
  language: es
  text: A causa de sus pecados[a], que cometieron contra Dios, ustedes serán llevados cautivos a Babilonia por Nabucodonosor, rey de los babilonios.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «los pecados que cometieron contra Dios». El griego repite más literalmente la idea: «pecados que pecaron».'
    reason: lexical_alternative
lexical_decisions:
- source_word: Διὰ
  english_pob_choice: Because of
  chosen_spanish: A causa de
  alternatives_spanish:
  - Por
  - Debido a
  lexicon: BDAG
  rationale: Con acusativo de causa, Διὰ expresa el motivo del juicio. «A causa de» comunica bien la relación causal en español y mantiene el tono explicativo del pasaje.
- source_word: τὰς ἁμαρτίας
  english_pob_choice: sins
  chosen_spanish: pecados
  alternatives_spanish:
  - faltas
  - transgresiones
  lexicon: BDAG
  rationale: ἁμαρτία designa el pecado en sentido moral y religioso. «Pecados» es la correspondencia más directa y natural en español e integra bien con el resto de la frase.
- source_word: ἃς ἡμαρτήκατε
  english_pob_choice: which you committed
  chosen_spanish: que cometieron
  alternatives_spanish:
  - que pecaron
  - que ustedes han cometido
  lexicon: BDAG
  rationale: El griego repite la raíz de pecado («pecados que pecaron»). En español, una repetición literal sonaría forzada; «que cometieron» conserva la referencia a la acción culpable sin perder la relación con «pecados».
- source_word: ἐναντίον τοῦ θεοῦ
  english_pob_choice: against God
  chosen_spanish: contra Dios
  alternatives_spanish:
  - delante de Dios
  - en presencia de Dios
  lexicon: BDAG
  rationale: El contexto es de ofensa moral. «Contra Dios» expresa mejor la dirección de la culpa que una mera localización «delante de Dios».
- source_word: ἀχθήσεσθε
  english_pob_choice: you will be carried away
  chosen_spanish: serán llevados
  alternatives_spanish:
  - serán conducidos
  - serán transportados
  lexicon: BDAG
  rationale: En un contexto de exilio, el pasivo futuro de ἄγω indica traslado forzado. «Serán llevados» es claro y natural en español; el complemento «cautivos» preserva el matiz de deportación.
- source_word: αἰχμάλωτοι
  english_pob_choice: as captives
  chosen_spanish: cautivos
  alternatives_spanish:
  - en cautiverio
  - como cautivos
  lexicon: LSJ
  rationale: El término describe la condición resultante del traslado. «Cautivos» funciona bien en español bíblico actual y evita una perífrasis innecesaria.
- source_word: ὑπὸ Ναβουχοδονοσὸρ
  english_pob_choice: by Nebuchadnezzar
  chosen_spanish: por Nabucodonosor
  alternatives_spanish:
  - a manos de Nabucodonosor
  - bajo Nabucodonosor
  lexicon: BDAG
  rationale: ὑπό con pasivo marca el agente. «Por Nabucodonosor» es la forma más natural y reconoce la agencia del rey en la deportación.
- source_word: βασιλέως τῶν Βαβυλωνίων
  english_pob_choice: king of the Babylonians
  chosen_spanish: rey de los babilonios
  alternatives_spanish:
  - rey de Babilonia
  - el rey babilonio
  lexicon: BDAG
  rationale: El griego dice literalmente «rey de los babilonios», no «rey de Babilonia». Se conserva la expresión étnica para respetar el matiz del original.
theological_decisions:
- issue: Relación entre pecado y exilio
  english_pob_reading: Because of your sins ... you will be carried away captive to Babylon
  chosen_spanish_reading: A causa de sus pecados ... serán llevados cautivos a Babilonia
  alternative_spanish_readings:
  - Por sus pecados ... serán deportados a Babilonia
  - Debido a sus pecados ... irán a Babilonia en cautiverio
  rationale: 'La frase mantiene la lógica bíblica de juicio: el pecado trae como consecuencia el exilio. «Cautivos» conserva la fuerza judicial y histórica de la deportación.'
  doctrine_reference: Translation philosophy §§1, 5, 6
- issue: Intensificación cognada en la expresión de culpa
  english_pob_reading: sins, which you committed against God
  chosen_spanish_reading: pecados, que cometieron contra Dios
  alternative_spanish_readings:
  - pecados, que ustedes pecaron contra Dios
  - pecados, que han cometido contra Dios
  rationale: El griego usa una repetición enfática de la raíz de pecado. En español, la repetición literal sería poco idiomática, pero la traducción conserva la vinculación estrecha entre «pecados» y la acción culpable.
  doctrine_reference: Translation philosophy §§1, 6
- issue: Valor de ἐναντίον τοῦ θεοῦ
  english_pob_reading: against God
  chosen_spanish_reading: contra Dios
  alternative_spanish_readings:
  - delante de Dios
  - en la presencia de Dios
  rationale: En este contexto, el término no es meramente espacial sino moral. «Contra Dios» expresa rebelión y ofensa, manteniendo la gravedad teológica del texto.
  doctrine_reference: Translation philosophy §§1, 6
translation_notes:
  revision_awareness: 'El texto inglés auditado pasó de una forma más literal y extraña («which you sinned») a una forma más natural («which you committed»). La versión española opta por una solución intermedia: conserva la relación entre «pecados» y la acción culpable, pero evita una repetición mecánica que sonaría antinatural en español. También se mantiene el valor de agente en ὑπό y la referencia étnica «rey de los babilonios».'
  spanish_consistency_notes:
  - Se usa «Dios» y no una perífrasis, porque el texto griego presenta el nombre común θεοῦ sin ambigüedad.
  - Se conserva «Babilonia» como destino geográfico y «babilonios» como gentilicio, siguiendo el contraste del original.
  - «Cautivos» expresa mejor el estado de deportación que una simple idea de movimiento.
  - La nota[a] refleja una alternativa de traducción válida sin ocultar la repetición enfática del griego.
