translation:
  language: es
  text: Y ahora, Señor, no tomo por esposa a esta mi hermana[a] por causa de inmoralidad sexual, sino en verdad[b]. Manda que yo alcance misericordia y que ella y yo envejezcamos juntos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Esta mi hermana» reproduce el lenguaje de parentesco del libro para una mujer que también es una legítima compañera matrimonial; alternativamente, «esta hermana mía» o, de manera interpretativa, «mi parienta».
    reason: cultural_note
  - marker: b
    text: 'O: «Manda que tengas misericordia de mí y de ella, y que envejezcamos juntos». El griego vincula la misericordia y el envejecimiento compartido dentro de la misma petición.'
    reason: lexical_alternative
lexical_decisions:
- source_word: κύριε
  english_pob_choice: Lord
  chosen_spanish: Señor
  alternatives_spanish:
  - Maestro
  lexicon: LSJ
  rationale: Es una invocación directa en oración. 'Señor' es el equivalente natural y reverente en español, y preserva el valor de κύριος en este contexto devocional.
- source_word: πορνείαν
  english_pob_choice: sexual immorality
  chosen_spanish: inmoralidad sexual
  alternatives_spanish:
  - fornicación
  - lujuria
  lexicon: LSJ
  rationale: El término griego abarca conducta sexual ilícita en sentido amplio. 'Inmoralidad sexual' comunica ese alcance sin restringirlo indebidamente a un solo acto o deseo.
- source_word: λαμβάνω
  english_pob_choice: am taking
  chosen_spanish: recibo
  alternatives_spanish:
  - tomo
  - estoy tomando
  - me caso con
  lexicon: LSJ
  rationale: En español, 'recibir a una mujer' puede sonar más natural dentro del marco matrimonial y conserva la idea básica de tomar/recibir a la mujer como esposa sin volverlo demasiado mecánico.
- source_word: τὴν ἀδελφήν μου ταύτην
  english_pob_choice: this my sister
  chosen_spanish: a esta mi hermana
  alternatives_spanish:
  - a esta hermana mía
  - a mi parienta
  - a esta parienta mía
  lexicon: LSJ
  rationale: Se mantiene el lenguaje de parentesco literal del libro. 'Hermana' conserva la textura narrativa de Tobit, donde ese término funciona como kinship language para una mujer con la que el matrimonio es legítimo.
- source_word: ἐπʼ ἀληθείας
  english_pob_choice: in truth
  chosen_spanish: en verdad
  alternatives_spanish:
  - con sinceridad
  - de verdad
  lexicon: LSJ
  rationale: La frase contrasta con la motivación de πορνείαν. 'En verdad' mantiene el contraste formal y puede implicar sinceridad y rectitud de intención.
- source_word: ἐπίταξον
  english_pob_choice: Command
  chosen_spanish: Manda
  alternatives_spanish:
  - Ordena
  - Dispón
  lexicon: LSJ
  rationale: El imperativo pide una intervención con autoridad. 'Manda' reproduce esa fuerza verbal de manera natural en español bíblico actual.
- source_word: ἐλεῆσαί
  english_pob_choice: may find mercy / have mercy on me
  chosen_spanish: alcance misericordia
  alternatives_spanish:
  - tenga misericordia
  - reciba misericordia
  lexicon: LSJ
  rationale: La petición griega expresa el deseo de ser objeto de misericordia. 'Alcance misericordia' evita atribuirle al verbo una forma más perifrástica y conserva la idea de recibir misericordia.
- source_word: συγκαταγηρᾶσαι
  english_pob_choice: may grow old together
  chosen_spanish: envejezcamos juntos
  alternatives_spanish:
  - crezcamos viejos juntos
  - lleguemos juntos a la vejez
  lexicon: LSJ
  rationale: El compuesto expresa envejecer juntos. 'Envejezcamos juntos' es idiomático, fiel y mantiene la petición de una vida larga compartida.
theological_decisions:
- issue: Retener el parentesco literal "hermana" en un contexto matrimonial
  english_pob_reading: Retain literal 'sister' in the main text as kinship language within the narrative world.
  chosen_spanish_reading: Mantener 'hermana' en el texto principal como lenguaje de parentesco dentro del relato.
  alternative_spanish_readings:
  - parienta
  - pariente
  - prima
  rationale: El griego dice literalmente 'esta mi hermana', y el contexto de Tobit usa lenguaje familiar para una unión matrimonial legítima. Conservarlo hace visible la textura cultural del pasaje; una equivalencia explicativa puede quedar para nota, no para reemplazar el texto.
  doctrine_reference: 'Translation philosophy: original-language primacy; readable modern Spanish with documented exceptions.'
- issue: Relación entre la petición de misericordia y la de envejecer juntos
  english_pob_reading: The Greek links 'have mercy' and 'grow old together' under the same petition.
  chosen_spanish_reading: 'Separar en español ambas peticiones: que yo alcance misericordia y que ella y yo envejezcamos juntos.'
  alternative_spanish_readings:
  - Manda que nos tengas misericordia y que envejezcamos juntos
  - Manda que tenga misericordia de mí y de ella, y que envejezcamos juntos
  rationale: El griego une la idea de misericordia con la petición matrimonial, pero en español conviene distinguirlas para que ambas queden explícitas. 'Alcance misericordia' preserva el objeto de la petición sin perder la conexión con la cláusula siguiente.
  doctrine_reference: 'Translation philosophy: source-faithful clarity with preservation of documented tension/structure.'
translation_notes:
  revision_awareness: 'Se tomó en cuenta la revisión más reciente del audit trail inglés, que corrigió la cláusula final para reflejar con mayor precisión ἐλεῆσαί με como una petición de misericordia separada de la de envejecer juntos. Por eso la traducción española también separa ambas ideas: ''que yo alcance misericordia y que ella y yo envejezcamos juntos''.'
  spanish_consistency_notes:
  - Se usó 'Señor' para κύριε, coherente con el tratamiento reverente de la invocación divina en español.
  - Se evitó 'Cristo' u otra terminología no presente en el verso.
  - '''Inmoralidad sexual'' se prefirió por claridad semántica y amplitud de alcance frente a ''fornicación''.'
  - Se preservó el lenguaje de parentesco 'hermana' en el texto principal y se explicó en nota.
  - Se mantuvo la petición de misericordia explícita y separada de la de envejecer juntos, conforme al audit trail revisado.
