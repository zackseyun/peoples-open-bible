translation:
  language: es
  text: El más pequeño llegará a ser mil[a][b], y el más insignificante, una nación poderosa. Yo soy Yahvé; en su tiempo lo apresuraré[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «el pequeño» o «el menor» para «el más pequeño».'
    reason: lexical_alternative
  - marker: b
    text: «Mil» también puede entenderse por algunos como «un clan», pero el sentido numérico encaja mejor con el paralelismo de crecimiento aquí.
    reason: lexical_alternative
  - marker: c
    text: 'O: «en su tiempo señalado lo apresuraré». El hebreo conserva una tensión entre el tiempo fijado y el cumplimiento rápido.'
    reason: alternative_reading
lexical_decisions:
- source_word: הַקָּטֹן
  english_pob_choice: the smallest
  chosen_spanish: el más pequeño
  alternatives_spanish:
  - el pequeño
  - el menos importante
  - el más insignificante
  lexicon: HALOT
  rationale: קָטֹן expresa pequeñez o insignificancia; en este paralelismo funciona de modo sustantivado. En español, «el más pequeño» comunica bien la idea de menor rango/tamaño sin sonar artificial.
- source_word: יִהְיֶה
  english_pob_choice: will become
  chosen_spanish: llegará a ser
  alternatives_spanish:
  - será
  - se convertirá en
  lexicon: HALOT
  rationale: היה puede significar «ser» o «llegar a ser». Aquí hay una transformación desde pequeñez a gran aumento, y «llegará a ser» preserva ese cambio de estado.
- source_word: לָאֶלֶף
  english_pob_choice: a thousand
  chosen_spanish: mil
  alternatives_spanish:
  - un millar
  - una tribu
  - un clan
  lexicon: HALOT
  rationale: אֶלֶף tiene sentido básico numérico de «mil». Aunque puede aludir a un clan en otros contextos, aquí el paralelismo con «nación poderosa» favorece el valor numérico directo.
- source_word: הַצָּעִיר
  english_pob_choice: the least
  chosen_spanish: el más insignificante
  alternatives_spanish:
  - el menor
  - el más pequeño
  - el más joven
  lexicon: HALOT
  rationale: צָעִיר puede denotar pequeñez, inferioridad o juventud. En este contexto de estatus paralelo a הַקָּטֹן, «el más insignificante» comunica mejor la idea de poca relevancia social.
- source_word: לְגוֹי עָצוּם
  english_pob_choice: a mighty nation
  chosen_spanish: una nación poderosa
  alternatives_spanish:
  - una nación fuerte
  - un pueblo poderoso
  lexicon: HALOT
  rationale: גּוֹי es «nación» y עָצוּם significa fuerte, poderoso, grande en capacidad. «Nación poderosa» mantiene el alcance y la naturalidad del español.
- source_word: אֲנִי יְהוָה
  english_pob_choice: I am Yahweh
  chosen_spanish: Yo soy Yahvé
  alternatives_spanish:
  - Yo soy Yahweh
  - Yo soy el SEÑOR
  lexicon: DOCTRINE.md contested terms
  rationale: El texto hebreo usa directamente el Nombre divino; conforme a la terminología del proyecto, se translitera como «Yahvé» en el texto principal, evitando la sustitución por «SEÑOR».
- source_word: בְּעִתָּהּ
  english_pob_choice: in its time
  chosen_spanish: en su tiempo
  alternatives_spanish:
  - a su tiempo
  - en el tiempo señalado
  - en su momento
  lexicon: HALOT
  rationale: La forma con sufijo femenino se refiere naturalmente al evento/promesa. «En su tiempo» conserva la referencia temporal y la brevedad del hebreo.
- source_word: אֲחִישֶׁנָּה
  english_pob_choice: I will hasten it
  chosen_spanish: lo apresuraré
  alternatives_spanish:
  - lo aceleraré
  - lo daré prisa
  - lo haré venir pronto
  lexicon: HALOT
  rationale: El hifil de חוּשׁ expresa apresurar o hacer que algo ocurra pronto. «Lo apresuraré» conserva la agencia divina y, junto con «en su tiempo», mantiene la tensión del hebreo.
theological_decisions:
- issue: Nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - el SEÑOR
  rationale: El source packet y el POB inglés identifican el Tetragrámaton como Nombre propio divino. En español del proyecto, la forma establecida es «Yahvé», para preservar la identidad covenantal sin ocultarla tras una máscara litúrgica.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Tensión entre tiempo fijado y aceleración divina
  english_pob_reading: in its time I will hasten it
  chosen_spanish_reading: en su tiempo lo apresuraré
  alternative_spanish_readings:
  - a su tiempo lo haré pronto
  - en el tiempo señalado lo aceleraré
  rationale: El hebreo yuxtapone un tiempo determinado con una acción de apresuramiento. La redacción elegida conserva esa tensión sin resolverla en una paráfrasis más suave.
  doctrine_reference: 'DOCTRINE.md Translation philosophy #3: Preserve theological tension rather than resolve it'
translation_notes:
  revision_awareness: La revisión más reciente indicó que no eran necesarios cambios; este borrador sigue de cerca el consenso alto del audit trail inglés y conserva la tensión semántica principal del texto.
  spanish_consistency_notes:
  - Se usó «Yahvé» de forma consistente con el estándar del proyecto para יְהוָה.
  - Se evitó «SEÑOR» como sustituto del Nombre divino.
  - 'Se mantuvo el paralelismo de aumento: de pequeñez a grandeza nacional.'
  - Se preservó la tensión entre «en su tiempo» y «lo apresuraré» sin suavizarla.
