  timestamp: '2026-05-07T21:25:03Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien la estructura del hebreo: día primero y séptimo como ocasiones de מִקְרָא קֹדֶשׁ, prohibición general de trabajo, y excepción para la comida necesaria. Sin embargo, hay dos desajustes importantes: «en ellos» en el texto principal suena poco natural en español para referirse a días, y «lo que haya de comerse por toda persona» pierde la claridad idiomática y la fuerza práctica documentada en el POB inglés («what every person must eat»). También conviene reflejar mejor que la excepción apunta a la preparación de alimentos.'
  spanish_quality_summary: 'El español es mayormente digno, pero varias frases suenan rígidas o calcadas: «No se hará ningún trabajo en ellos» y «lo que haya de comerse por toda persona» resultan poco naturales para lectura pública. «Santa asamblea» es aceptable, aunque «asamblea santa» también sería posible; no requiere cambio. La revisión propuesta mejora claridad y fluidez sin apartarse del hebreo.'
  glossary_alignment: No hay términos del glosario mayor en juego. «נֶפֶשׁ» como «persona» está bien y debe conservarse. La nota sobre מִקְרָא קֹדֶשׁ preserva adecuadamente la alternativa tradicional «santa convocación».
  issues:
  - severity: medium
    issue: «en ellos» en el texto principal
    rationale: Aunque refleja literalmente בָהֶם, en español aplicado a días suena forzado. «En esos días» expresa el referente temporal con claridad, preservando el sentido del hebreo y del POB inglés.
  - severity: medium
    issue: «lo que haya de comerse por toda persona» es poco idiomático
    rationale: La construcción pasiva con «por» suena antinatural y menos clara que el valor documentado «lo que cada persona deba comer». El hebreo apunta a la comida necesaria para cada persona, no a una formulación pasiva rebuscada.
  - severity: low
    issue: La nota b está anclada en «No se hará» en vez de en la frase temporal problemática
    rationale: Si se mantiene una nota sobre el literal «en ellos», conviene que el anclaje y el contenido expliquen el giro hebreo sin entorpecer la lectura principal.
  - severity: low
    issue: La nota c no preserva explícitamente la aclaración sobre preparación de comida como única excepción
    rationale: El POB inglés explica que «eso solo» implica la preparación de alimento necesaria. En español conviene mantener esa explicación de manera más completa.
