    text: 'O: «no había tenido éxito con el golpe». El griego sugiere que el golpe autoinfligido no logró el efecto previsto.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «varonilmente» o «valerosamente». El griego usa un adverbio específicamente masculino para la valentía.'
    reason: lexical_alternative
  revision_rationale: 'La revisión corrige dos calcos poco naturales y mejora la fidelidad semántica al griego y al análisis POB: 1) «no había logrado su propósito con el golpe» expresa adecuadamente el valor de μὴ κατευκτήσας en contexto de intento fallido; 2) «irrumpían por las puertas hacia adentro» refleja mejor ἔσω τῶν θυρωμάτων εἰσβαλλόντων que «dentro de las puertas». También se elimina una nota innecesaria sobre «multitudes» y se conservan las notas realmente útiles: el fracaso del golpe y el matiz masculino de ἀνδρωδῶς.'
