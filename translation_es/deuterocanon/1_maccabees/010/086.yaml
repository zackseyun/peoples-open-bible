translation:
  language: es
  text: Y partió de allí Jonatán, y acampó en Ascalón[a]; y salieron los de la ciudad a su encuentro con gran honor.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «con gran esplendor» o «con gran gloria»; la expresión griega destaca la magnificencia de la recepción de Jonatán por la ciudad.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀπῆρεν
  english_pob_choice: departed
  chosen_spanish: partió
  alternatives_spanish:
  - se fue
  - salió
  - marchó
  lexicon: LSJ
  rationale: El aoristo de ἀπαίρω indica que Jonatán dejó el lugar anterior. «Partió» conserva el movimiento y suena natural en español narrativo sin añadir matiz innecesario.
- source_word: παρενέβαλεν
  english_pob_choice: encamped
  chosen_spanish: acampó
  alternatives_spanish:
  - acamparon
  - hizo campamento
  - estableció campamento
  lexicon: LSJ
  rationale: El verbo describe tomar campamento o acampar. «Acampó» transmite la acción de forma clara y mantiene el posible matiz militar/travel del griego.
- source_word: Ἀσκάλωνα
  english_pob_choice: Ashkelon
  chosen_spanish: Ascalón
  alternatives_spanish:
  - Ascalón
  lexicon: LSJ
  rationale: Se usa la forma española tradicional del topónimo, fiel a la transliteración habitual en español bíblico. La variante inglesa «Ashkelon» no se traslada mecánicamente porque el español ya tiene una forma asentada.
- source_word: ἐξῆλθον οἱ ἐκ τῆς πόλεως
  english_pob_choice: the people of the city came out
  chosen_spanish: salieron los de la ciudad
  alternatives_spanish:
  - salieron los habitantes de la ciudad
  - salió la gente de la ciudad
  - los ciudadanos salieron
  lexicon: LSJ
  rationale: La expresión es amplia y no exige restringirla a varones. «Los de la ciudad» conserva la referencia colectiva del griego sin sobreespecificar.
- source_word: εἰς συνάντησιν αὐτῷ
  english_pob_choice: to meet him
  chosen_spanish: a su encuentro
  alternatives_spanish:
  - para encontrarse con él
  - a recibirlo
  - a saludarlo
  lexicon: LSJ
  rationale: Es un giro idiomático griego para salir al encuentro de alguien. «A su encuentro» reproduce esa función de manera natural y sobria en español.
- source_word: ἐν δόξῃ μεγάλῃ
  english_pob_choice: with great honor
  chosen_spanish: con gran honor
  alternatives_spanish:
  - con gran esplendor
  - con gran gloria
  - con gran pompa
  lexicon: LSJ
  rationale: δόξα aquí puede ser honor, esplendor o gloria. Dado el contexto de recepción pública de Jonatán, «honor» comunica mejor la acogida sin sugerir una gloria divina que el contexto no exige.
theological_decisions:
- issue: Sentido de δόξα en la recepción de Jonatán
  english_pob_reading: with great honor; alternative footnote notes splendor/glory as possibilities
  chosen_spanish_reading: con gran honor
  alternative_spanish_readings:
  - con gran esplendor
  - con gran gloria
  - con gran pompa
  rationale: En este contexto la escena describe la acogida pública de la ciudad. «Honor» preserva la valoración positiva y evita confundir el término con gloria divina o con un significado más técnico no señalado por el contexto inmediato.
  doctrine_reference: No doctrinal issue; lexical-contextual decision
translation_notes:
  revision_awareness: El texto griego y el audit trail inglés están en alto acuerdo; no se reportan revisiones aplicadas. La traducción española sigue la lectura estable sin introducir variantes textuales.
  spanish_consistency_notes:
  - Se mantiene «Jonatán» para el nombre propio, conforme al uso bíblico estándar en español.
  - Se evita «SEÑOR» u այլ sustitución teológica porque no aparece el tetragrámaton ni κύριος en este versículo.
  - «Ascalón» se prefiere por ser la forma española tradicional del topónimo, manteniendo consistencia con el español bíblico.
  - La nota al pie se ancla en «honor» porque allí está la principal ambigüedad léxica de δόξα.
