revisions:
- from: Pero el pueblo de la tierra hirió a todos los que habían conspirado contra el rey Amón[a][b], y el pueblo de la tierra hizo rey a Josías su hijo en su lugar.
  to: Pero el pueblo de la tierra dio muerte a todos los que habían conspirado contra el rey Amón[a][b], y el pueblo de la tierra hicieron rey a Josías su hijo en su lugar.
  rationale: Se reemplaza «hirió» por «dio muerte a» para reflejar mejor la fuerza narrativa de וַיַּכּוּ en este contexto. Se conserva «el pueblo de la tierra» por fidelidad léxica y la nota cultural. Se ajusta el segundo verbo a una formulación más idiomática con sujeto colectivo repetido; idealmente, toda la cláusula puede también reestructurarse como «y el pueblo de la tierra hizo rey a Josías, su hijo, en su lugar», pero el cambio principal necesario es el del primer verbo.
