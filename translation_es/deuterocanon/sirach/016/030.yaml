translation:
  language: es
  text: La superficie[a] de ella cubrió la vida de todo ser viviente, y a ella vuelven[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literalmente, «su rostro». El griego probablemente se refiere al rostro o a la superficie de la tierra.
    reason: lexical_alternative
  - marker: b
    text: 'O: «y en ella es su retorno». La expresión apunta a los seres vivientes que vuelven a la tierra.'
    reason: alternative_reading
lexical_decisions:
- source_word: ψυχὴν
  english_pob_choice: the life
  chosen_spanish: la vida
  alternatives_spanish:
  - el alma
  - el aliento
  - el soplo de vida
  lexicon: BDAG
  rationale: En este contexto, con παντὸς ζῴου, ψυχή designa la vida animada y no un alma inmortal. «La vida» comunica con claridad el sentido cosmológico sin introducir una antropología ajena al pasaje.
- source_word: παντὸς ζῴου
  english_pob_choice: of every living thing
  chosen_spanish: de todo ser viviente
  alternatives_spanish:
  - de todo animal
  - de toda criatura
  lexicon: LSJ
  rationale: ζῷον puede abarcar animal o ser viviente. «Todo ser viviente» conserva el alcance amplio del griego y evita restringirlo solo a animales.
- source_word: ἐκάλυψεν
  english_pob_choice: covered
  chosen_spanish: cubrió
  alternatives_spanish:
  - tapó
  - envolvió
  lexicon: LSJ
  rationale: El verbo significa de manera directa «cubrió». En español, «cubrió» es natural y fiel sin añadir interpretación.
- source_word: τὸ πρόσωπον αὐτῆς
  english_pob_choice: her surface
  chosen_spanish: la superficie de ella
  alternatives_spanish:
  - su rostro
  - la superficie de la tierra
  - su faz
  lexicon: LSJ
  rationale: Aunque literalmente es «su rostro», en este contexto la referencia es a la tierra o el suelo. «La superficie de ella» deja visible la referencia femenina del griego y transmite el sentido idiomático de la faz/superficie de la tierra sin explicitar un sustantivo ausente en la cláusula.
- source_word: καὶ εἰς αὐτὴν
  english_pob_choice: and to it
  chosen_spanish: y a ella
  alternatives_spanish:
  - y en ella
  - y hacia ella
  - y dentro de ella
  lexicon: LSJ
  rationale: εἰς puede expresar movimiento hacia o dentro de. «A ella» preserva la referencia pronominal y permite la idea de retorno a la tierra sin forzar una imagen de sepultura más específica de la que exige el texto.
- source_word: ἡ ἀποστροφὴ αὐτῶν
  english_pob_choice: is their return
  chosen_spanish: es su retorno
  alternatives_spanish:
  - es su vuelta
  - es su regreso
  - es su volver
  lexicon: LSJ
  rationale: ἀποστροφή aquí significa retorno o vuelta atrás. «Su retorno» es la opción más natural y sobria en español, manteniendo la fuerza del sustantivo abstracto.
theological_decisions:
- issue: Referencia de los pronombres femeninos αὐτῆς / αὐτὴν
  english_pob_reading: The pronouns refer to the earth/ground from the surrounding creation context, rendered with feminine English pronouns for transparency.
  chosen_spanish_reading: Los pronombres se conservan como femeninos en español para dejar visible la referencia implícita a la tierra/suelo del contexto inmediato.
  alternative_spanish_readings:
  - La superficie de la tierra cubrió la vida de todo ser viviente, y a la tierra es su retorno.
  - La superficie de ella cubrió la vida de todo ser viviente, y a ella es su retorno.
  rationale: El griego usa pronombres femeninos sin nombrar explícitamente el sustantivo en esta cláusula. En español, mantener el femenino preserva la anáfora y la tensión del original, mientras que aclarar «tierra» haría más explícito lo implícito pero añadiría un sustantivo que no está en la frase.
  doctrine_reference: Principio de primacía del texto original; preservar anáfora y ambigüedad cuando el griego no explicita el referente.
- issue: Sentido de ἀποστροφή como destino de retorno a la tierra
  english_pob_reading: The phrase points to living things returning to the earth.
  chosen_spanish_reading: La frase indica el retorno de los seres vivientes a la tierra/suelo.
  alternative_spanish_readings:
  - La frase indica su vuelta a la tierra.
  - La frase indica que vuelven a ella.
  rationale: El contexto cosmológico favorece entender ἀποστροφή como vuelta o retorno, no como «apostasía» u otro sentido moral. «Retorno» comunica el movimiento de regreso sin sobrecargar la línea con lenguaje funerario no explícito.
  doctrine_reference: Contexto léxico de ἀποστροφή; lectura cosmológica del pasaje.
translation_notes:
  revision_awareness: Se siguió el audit trail inglés, pero la versión española evita calcar «surface of it» de forma extraña. Se mantuvo el valor de ψυχή como «vida», se preservó el referente femenino implícito con «ella», y se retuvo la posibilidad de lectura alternativa de εἰς αὐτήν como «a ella» en vez de especificar «en ella».
  spanish_consistency_notes:
  - Se usó «vida» para ψυχή en el sentido animado/cosmológico, coherente con el tratamiento POB de no imponer «alma» donde el contexto habla de seres vivientes.
  - Se conservó «retorno» para ἀποστροφή, en línea con la decisión inglesa de evitar traducciones moralizantes o demasiado libres.
  - Se mantuvo una referencia femenina en todo el verso para reflejar la anáfora griega, aunque en español el antecedente quede implícito.
