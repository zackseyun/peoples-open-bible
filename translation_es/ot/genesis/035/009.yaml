    rationale: 'La nota comienza con comillas innecesarias y la fórmula «O:» puede mantenerse, pero conviene normalizarla en español bíblico claro: «O bien: “Dios se reveló…”» o similar.'
  revised_spanish_text: Dios se apareció a Jacob otra vez, cuando volvió de Paddán-aram[a], y lo bendijo.
