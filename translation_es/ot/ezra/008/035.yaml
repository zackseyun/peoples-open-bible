    text: Or 'on behalf of all Israel.'
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'the sons of the exile,' an idiom referring to the returned exiles.
    reason: cultural_note
  - marker: c
    text: Hebrew 'All of it was a burnt offering to the LORD.' The wording is preserved as in the source text, even though the verse also mentions male goats for a sin offering.
    reason: lexical_alternative
