    reason: lexical_alternative
  revision_rationale: Se ajusta «para Salomón» a «a Salomón» para reflejar con mayor precisión el destinatario marcado en hebreo. También se mejora la nota alternativa para que suene natural en español y conserve la distinción documentada entre un grupo comercial itinerante y comerciantes más generales.
