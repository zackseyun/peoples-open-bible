revisions:
- from: 'Y aconteció por la mañana que salió y se puso en pie, y dijo a todo el pueblo[a]: «Ustedes son justos. Miren, yo conspiré contra mi señor y lo maté; ¿pero quién derribó a todos estos?»'
  to: 'Y aconteció por la mañana que salió y se puso en pie, y dijo a todo el pueblo[a]: «Ustedes son justos. Miren, yo conspiré contra mi señor y lo maté; pero ¿quién abatió a todos estos?»'
  rationale: Se reemplaza 'derribó' por 'abatió' para reflejar mejor el sentido letal de הִכָּה en contexto. Se ajusta la nota al pie para ofrecer alternativas reales y explicar con más claridad el matiz forense de צַדִּקִים. El resto del texto puede mantenerse como fiel y legible.
