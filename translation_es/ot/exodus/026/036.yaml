revisions:
- from: Harás una pantalla[a] para la entrada de la tienda, de azul, púrpura y escarlata, y de lino fino torcido, obra de un bordador.
  to: Harás una cortina[a] para la entrada de la tienda, de azul, púrpura y escarlata, y de lino fino torcido, obra de un bordador.
  rationale: Se reemplaza «pantalla» por «cortina» porque en español actual y eclesial «pantalla» no describe naturalmente un colgante textil de entrada. «Cortina» mantiene la función de cobertura, lee con naturalidad, y la nota conserva la distinción contextual respecto del velo interior, que era la motivación documentada en el POB inglés.
