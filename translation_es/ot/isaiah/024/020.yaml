translation:
  language: es
  text: La tierra se tambaleará como un borracho, y se mecerá de un lado a otro como una choza[a]; su transgresión pesa sobre ella, y caerá y no volverá a levantarse.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «como una caseta de vigilante» o «como un refugio temporal»; el término hebreo se refiere a una vivienda frágil y provisional.
    reason: lexical_alternative
lexical_decisions:
- source_word: נ֣וֹעַ תָּנ֤וּעַ
  english_pob_choice: will stagger
  chosen_spanish: se tambaleará
  alternatives_spanish:
  - se estremecerá
  - se bamboleará
  - se trastabillará
  lexicon: HALOT
  rationale: El infinitivo absoluto con imperfecto intensifica la acción; en español, «se tambaleará» comunica bien la inestabilidad repetida sin sonar forzado. Evita una duplicación mecánica, pero conserva la fuerza enfática del hebreo.
- source_word: אֶ֨רֶץ֙
  english_pob_choice: the earth
  chosen_spanish: la tierra
  alternatives_spanish:
  - la tierra
  - el país
  lexicon: HALOT
  rationale: En Isaías 24 el contexto es de juicio de alcance universal. «La tierra» refleja mejor ese alcance cósmico que «el país», que estrecharía indebidamente el referente.
- source_word: כַּ/שִּׁכּ֔וֹר
  english_pob_choice: like a drunkard
  chosen_spanish: como un borracho
  alternatives_spanish:
  - como un ebrio
  - como un hombre borracho
  lexicon: HALOT
  rationale: El sustantivo describe a una persona ebria. «Borracho» es natural y directo en español; conserva el golpe imagético del símil sin añadir elementos ausentes en el hebreo.
- source_word: וְ/הִֽתְנוֹדְדָ֖ה
  english_pob_choice: and sway back and forth
  chosen_spanish: y se mecerá de un lado a otro
  alternatives_spanish:
  - y vacilará
  - y se bamboleará
  - y oscilará
  lexicon: HALOT
  rationale: El hitpolel expresa movimiento inestable y repetido. «Se mecerá de un lado a otro» transmite esa oscilación continua de manera clara y literaria en español.
- source_word: כַּ/מְּלוּנָ֑ה
  english_pob_choice: like a hut
  chosen_spanish: como una choza
  alternatives_spanish:
  - como una cabaña
  - como una choza temporal
  - como una caseta
  lexicon: HALOT
  rationale: El término alude a una vivienda temporal y frágil. «Choza» comunica bien esa precariedad en español, manteniendo la imagen de una estructura débil sin sobreinterpretarla.
- source_word: וְ/כָבַ֤ד עָלֶ֨י/הָ֙
  english_pob_choice: lies heavy upon it
  chosen_spanish: pesa sobre ella
  alternatives_spanish:
  - cae con peso sobre ella
  - se abate sobre ella
  - le pesa
  lexicon: HALOT
  rationale: El verbo expresa peso o carga. «Pesa sobre ella» conserva la metáfora de opresión con un giro natural en español; el sentido no es solo físico, sino también culpable y penal.
- source_word: פִּשְׁעָ֔/הּ
  english_pob_choice: its transgression
  chosen_spanish: su transgresión
  alternatives_spanish:
  - su rebelión
  - su delito
  - su pecado
  lexicon: HALOT
  rationale: «Transgresión» preserva el valor moral y de ruptura del pacto implicado por פשע, sin reducirlo a una noción demasiado general como «pecado» ni cargarlo excesivamente con «rebelión».
- source_word: וְ/נָפְלָ֖ה
  english_pob_choice: and it will fall
  chosen_spanish: y caerá
  alternatives_spanish:
  - y caerá al suelo
  - y se desplomará
  lexicon: HALOT
  rationale: La forma verbal se ajusta bien al futuro narrativo/profético en español. «Caerá» es conciso y mantiene la progresión del juicio.
- source_word: וְ/לֹא תֹסִ֥יף קֽוּם
  english_pob_choice: and not rise again
  chosen_spanish: y no volverá a levantarse
  alternatives_spanish:
  - y no se levantará otra vez
  - y no seguirá levantándose
  - y jamás volverá a levantarse
  lexicon: HALOT
  rationale: La construcción hebrea indica que no hará de nuevo la acción de levantarse. «No volverá a levantarse» expresa con claridad esa irreversibilidad sin añadir una intensificación no obligada por el texto.
theological_decisions:
- issue: Alcance de אֶרֶץ en el juicio profético
  english_pob_reading: the earth
  chosen_spanish_reading: la tierra
  alternative_spanish_readings:
  - el país
  - la tierra habitada
  rationale: Isaías 24 presenta un cuadro de devastación de alcance amplio, no meramente local. «La tierra» conserva ese horizonte universal sin introducir una explicación doctrinal ajena al versículo.
  doctrine_reference: Translation philosophy §1 (primacía del texto original sobre la tradición de traducción)
translation_notes:
  revision_awareness: El texto inglés auditado eliminó una duplicación innecesaria de «staggering» para reflejar mejor el hebreo intensivo. En español, se optó de entrada por una única forma verbal enfática («se tambaleará») sin duplicación, manteniendo la fuerza del binomio hebreo y evitando una repetición poco natural.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» según la norma del proyecto solo cuando aparezca el tetragrámaton; en este versículo no aparece.
  - Se eligió «transgresión» para פִּשְׁעָה, consistente con el uso del proyecto para פשע en contextos de culpabilidad moral y judicial.
  - Se evitó «SEÑOR» como sustituto divino porque aquí no hay el nombre divino en el texto hebreo.
  - La nota [a] preserva la alternativa lexical del sustantivo מְלוּנָה, siguiendo el audit trail inglés sobre la posible referencia a una caseta de vigilante o refugio temporal.
