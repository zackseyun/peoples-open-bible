    text: «La casa» aquí se refiere al edificio del templo.
    reason: cultural_note
  revision_rationale: Se revisa solo la cláusula sobre la lana para que el español sea natural y a la vez conserve la fuerza literal documentada por la POB. «Ninguna lana vendrá sobre ellos» comunica mejor la imagen hebrea que «no subirá sobre ellos lana». Se mantiene el resto del texto porque es fiel, claro y terminológicamente adecuado.
