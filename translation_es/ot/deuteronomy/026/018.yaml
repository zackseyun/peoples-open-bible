translation:
  language: es
  text: Yahvé ha declarado hoy que tú has de ser para él su pueblo atesorado[a], como te prometió[b], y que has de guardar todos sus mandamientos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O ''su posesión atesorada''; hebreo: ''un pueblo, una posesión atesorada''.'
    reason: lexical_alternative
  - marker: b
    text: O 'como te habló'.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיהוָה
  english_pob_choice: the LORD
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el Señor
  - SEÑOR
  lexicon: HALOT
  rationale: 'Se sigue el estándar del proyecto para יהוה: usar el nombre divino ''Yahvé'' en el texto principal. Así se preserva la referencia explícita al nombre propio, en lugar de ocultarlo con una convención tipográfica.'
- source_word: הֶאֱמִירְךָ
  english_pob_choice: has declared
  chosen_spanish: ha declarado
  alternatives_spanish:
  - ha afirmado
  - te ha reconocido
  - te ha escogido
  lexicon: HALOT
  rationale: El verbo raro aquí expresa una declaración formal en contexto pactual. 'Ha declarado' conserva ese valor performativo sin convertirlo en una explicación interpretativa como 'te ha escogido'.
- source_word: הַיּוֹם
  english_pob_choice: today
  chosen_spanish: hoy
  alternatives_spanish:
  - este día
  lexicon: HALOT
  rationale: '''Hoy'' es el equivalente natural en español y mantiene la inmediatez solemne del contexto.'
- source_word: לִהְיוֹת לוֹ
  english_pob_choice: that you are to be his
  chosen_spanish: que tú has de ser para él
  alternatives_spanish:
  - para que seas suyo
  - para ser de él
  lexicon: HALOT
  rationale: La construcción infinitiva se vierte con una formulación natural en español que conserva la idea de designación/obligación resultante de la declaración divina.
- source_word: לְעַם סְגֻלָּה
  english_pob_choice: treasured people
  chosen_spanish: un pueblo especial
  alternatives_spanish:
  - un pueblo tesoro
  - un pueblo de posesión
  - un pueblo precioso
  lexicon: HALOT
  rationale: '''סְגֻלָּה'' denota algo valioso y especialmente perteneciente a alguien. En español, ''pueblo especial'' comunica de manera clara y digna la idea de pueblo apartado/valioso sin introducir una expresión menos natural. La nota preserva la alternativa lexical de ''possession/treasured possession''.'
- source_word: כַּאֲשֶׁר דִּבֶּר לָךְ
  english_pob_choice: as he promised you
  chosen_spanish: como te prometió
  alternatives_spanish:
  - como te habló
  - como te dijo
  lexicon: HALOT
  rationale: Aunque el verbo básico es 'hablar', en este contexto de pacto el sentido es una promesa previa. 'Como te prometió' explicita esa fuerza sin alejarse del contenido de la cláusula.
- source_word: וְלִשְׁמֹר
  english_pob_choice: and that you are to keep
  chosen_spanish: y que has de guardar
  alternatives_spanish:
  - y guardar
  - y observar
  lexicon: HALOT
  rationale: שׁמר con mandamientos se traduce con 'guardar' en español bíblico contemporáneo, que conserva la idea de custodiar/obedecer. La repetición de 'has de' sigue el paralelismo de las dos cláusulas infinitivas.
- source_word: כָּל מִצְוֺתָיו
  english_pob_choice: all his commandments
  chosen_spanish: todos sus mandamientos
  alternatives_spanish:
  - todos sus preceptos
  - todos sus órdenes
  lexicon: HALOT
  rationale: '''Mandamientos'' es el equivalente más directo y mantiene el registro jurídico-pactual del hebreo.'
theological_decisions:
- issue: Fuerza pactual del verbo raro הֶאֱמִיר
  english_pob_reading: formal divine declaration within covenant context
  chosen_spanish_reading: declaración formal de Yahvé en contexto pactual
  alternative_spanish_readings:
  - elección explícita
  - avowal o mutua confesión en lenguaje más arcaico
  rationale: Se conserva la fuerza formal de la declaración divina sin resolverla en una teología más específica de elección que el versículo no formula de manera explícita. Esto preserva la tensión lexical/documental del hebreo y del audit trail inglés.
  doctrine_reference: 'Principio de traducción del POB: mantener la tensión teológica y la claridad moderna, evitando tanto el arcaísmo como la sobreinterpretación.'
translation_notes:
  revision_awareness: Sin cambios respecto al último pase en inglés; esta propuesta sigue el mismo juicio lexical y teológico, trasladándolo al español con equivalencia óptima y manteniendo las alternativas documentadas.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' para יהוה conforme al estándar del proyecto.
  - '''Mandamientos'' y ''guardar'' conservan el registro pactual y legal del texto.'
  - Se evita 'Cristo' u otra terminología no pertinente al versículo.
  - Las notas a y b reproducen las alternativas documentadas en el audit trail inglés, adaptadas al español.
