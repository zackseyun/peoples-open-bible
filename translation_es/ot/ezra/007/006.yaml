revisions:
- from: Este Esdras subió de Babilonia[a], y era un escriba hábil en la Ley de Moisés, que Yahvé, el Dios de Israel, había dado. Y el rey le concedió todo lo que pidió, según la mano de Yahvé su Dios sobre él.
  to: Este Esdras subió de Babilonia, y era un escriba hábil en la Ley de Moisés, que Yahvé, el Dios de Israel, había dado. Y el rey le concedió toda su petición, según la mano de Yahvé su Dios sobre él[a].
  rationale: Se reubica la nota al modismo que realmente explica y se ajusta «todo lo que pidió» a «toda su petición» para reflejar mejor el sustantivo singular formal del hebreo y la decisión léxica documentada, sin perder claridad en español.
