translation:
  language: es
  text: 'Sus discípulos le dijeron: «¿La circuncisión beneficia o no?». Él les dijo: «Si beneficiara[a], su padre los engendraría circuncidados de su madre. Más bien, la circuncisión de verdad[b] en espíritu[c] ha llegado a ser totalmente provechosa[d]»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Si beneficiara» refleja la construcción irreal del copto; también podría expresarse como «si fuera beneficiosa».
    reason: lexical_alternative
  - marker: b
    text: La expresión «de verdad» conserva el genitivo del copto; también puede entenderse como «verdadera circuncisión».
    reason: lexical_alternative
  - marker: c
    text: Aquí «espíritu» mantiene la ambigüedad del original; no se fuerza una referencia explícita al Espíritu Santo.
    reason: theological_note
  - marker: d
    text: 'La frase final completa una elipsis: literalmente, «ha llegado a ser totalmente [así]», con la idea de «provechosa» tomada del verbo anterior de beneficio.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ⲥⲃⲃⲉ
  english_pob_choice: circumcision
  chosen_spanish: circuncisión
  alternatives_spanish:
  - corte
  - cortadura
  lexicon: Crum s.v. ⲥⲃⲃⲉ
  rationale: El contexto trata claramente del rito judío; en español, «circuncisión» es el término normal y preciso.
- source_word: ⲣⲱⲫⲉⲗⲉⲓ
  english_pob_choice: benefit
  chosen_spanish: beneficia / provechosa
  alternatives_spanish:
  - aprovecha
  - reporta beneficio
  lexicon: Loan from Gk. ὠφελεῖν; Crum notes ωφελεῖν as ‘to benefit’
  rationale: Conviene conservar la idea de utilidad/beneficio. En la pregunta uso el verbo «beneficia» y en la cláusula final, para completar el elipsis, «provechosa».
- source_word: ⲛⲉⲣⲉ…ⲣⲱⲫⲉⲗⲉⲓ
  english_pob_choice: if it were beneficial
  chosen_spanish: si beneficiara
  alternatives_spanish:
  - si fuera beneficiosa
  - de ser beneficiosa
  lexicon: Layton, Grammar §280 (irrealis with ⲛⲉⲣⲉ + infinitive)
  rationale: 'El valor contrafactual se expresa bien con el imperfecto de subjuntivo en español: «si beneficiara».'
- source_word: ϫⲡⲟⲛ
  english_pob_choice: beget
  chosen_spanish: engendraría
  alternatives_spanish:
  - engendraría hijos
  - sería padre de
  lexicon: Crum s.v. ϫⲡⲟⲛ ‘beget’
  rationale: «Engendrar» conserva mejor el sujeto paterno y la fuerza generativa del verbo original que una paráfrasis más libre.
- source_word: ⲉⲃⲟⲗ ϩⲛ ⲡⲉⲩⲙⲁⲁⲩ
  english_pob_choice: from their mother
  chosen_spanish: desde su madre
  alternatives_spanish:
  - de su madre
  - a partir de su madre
  lexicon: Crum s.v. ⲙⲁⲁⲩ ‘mother’
  rationale: La construcción expresa origen; en español, «desde su madre» mantiene la imagen de procedencia sin forzar la frase.
- source_word: ⲉⲣⲉⲛⲧⲟⲟⲩ ⲥⲃⲃⲉ
  english_pob_choice: them circumcised
  chosen_spanish: circuncidados
  alternatives_spanish:
  - siendo circuncidados
  - con la circuncisión
  lexicon: Layton, Grammar §119 (ⲉⲣⲉ + object + predicate)
  rationale: 'La construcción predicativa se vuelve naturalmente una forma adjetival en español: «circuncidados».'
- source_word: ⲁⲗⲗⲁ
  english_pob_choice: Rather
  chosen_spanish: Más bien
  alternatives_spanish:
  - Pero más bien
  - Al contrario
  lexicon: Gk. ἀλλά loan
  rationale: «Más bien» transmite el giro correctivo y suena natural al inicio de la corrección.
- source_word: ⲡⲥⲃⲃⲉ ⲛⲙⲉ
  english_pob_choice: the circumcision of truth
  chosen_spanish: la circuncisión de verdad
  alternatives_spanish:
  - la verdadera circuncisión
  - la circuncisión verdadera
  lexicon: Crum s.v. ⲙⲉ ‘truth; reality’
  rationale: Conservo el genitivo «de verdad» para respetar la forma coptа y su posible aspereza; también queda abierta la lectura adjetival «verdadera circuncisión».
- source_word: ϩⲛ ⲡⲛⲉⲩⲙⲁ
  english_pob_choice: in spirit
  chosen_spanish: en espíritu
  alternatives_spanish:
  - en el Espíritu
  - espiritualmente
  lexicon: Standard for ‘spirit’; no nomina sacra capitalization required in Thomas
  rationale: El texto no obliga a una mayúscula teológica; «en espíritu» mantiene la ambigüedad y la economía del original.
- source_word: ⲁϥϭⲛ̄ϩⲏⲩ ⲧⲏⲣϥ
  english_pob_choice: has become entirely profitable
  chosen_spanish: ha llegado a ser totalmente provechosa
  alternatives_spanish:
  - ha sido enteramente provechosa
  - ha resultado del todo provechosa
  lexicon: Crum s.v. ϭⲛϩⲏⲩ ‘wholly, completely’; Layton notes ellipsis recoverable from context
  rationale: La elipsis de «provechoso» se completa por el contexto previo; «ha llegado a ser» expresa bien el cambio de estado, y «totalmente provechosa» conserva el valor de plenitud.
theological_decisions:
- issue: ¿Mantener la tensión entre una circuncisión ritual y una circuncisión verdaderamente provechosa?
  english_pob_reading: ‘Rather, the circumcision of truth in spirit has become entirely profitable.’
  chosen_spanish_reading: «Más bien, la circuncisión de verdad en espíritu ha llegado a ser totalmente provechosa.»
  alternative_spanish_readings:
  - «Más bien, la verdadera circuncisión en espíritu ha llegado a ser totalmente provechosa»
  - «Más bien, la circuncisión verdadera en el espíritu ha llegado a ser plenamente útil»
  rationale: La formulación conserva la oposición entre el rito externo y la realidad interna/auténtica sin resolverla demasiado. El genitivo «de verdad» deja visible la estructura del original y evita borrar la posible tensión interpretativa.
  doctrine_reference: Rom 2:29; Fil 3:3
- issue: ¿Traducir ‘spirit’ con mayúscula teológica?
  english_pob_reading: ‘in spirit’
  chosen_spanish_reading: «en espíritu»
  alternative_spanish_readings:
  - «en el Espíritu»
  - «por el Espíritu»
  rationale: No hay marcador suficiente en este dicho para forzar una referencia explícita al Espíritu Santo; la minúscula preserva la ambigüedad del coptico y evita una interpretación más fuerte que la evidencia.
  doctrine_reference: 1 Co 2:11-14; Jn 3:6
translation_notes:
  revision_awareness: 'El borrador sigue el estado más reciente del audit trail sin cambios sustantivos: no hubo revisiones aplicadas y el control cruzado reporta alta concordancia con solo observaciones menores.'
  spanish_consistency_notes:
  - Se mantiene «circuncisión» como término técnico consistente.
  - Se usa «Yahvé» solo cuando aparezca el nombre divino; este dicho no lo contiene.
  - Se conserva la minúscula en «espíritu» por la ambigüedad del original.
  - La frase final explicita en español la elipsis ya señalada por el POB inglés.
