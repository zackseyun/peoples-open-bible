translation:
  text: 'Do not despise my lowliness[a];

    and my self-control toward you—love her in my poverty.

    Do not laugh at me excessively;

    and do not despise my fault[d][c][b], and do not curse my boasting.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: ⲛ̄ⲧⲉⲧⲛ̄ with ⲧⲁⲉⲅⲕⲣⲁⲧⲉⲓⲁ could also be read as “of you (pl.),” i.e., “my
      self‑control concerning you” or “over you.”
    reason: alignment_note
  - marker: b
    text: ⲧⲏⲛⲉ marks intensity; alternatives include “much” or “exceedingly.”
    reason: lexical_alternative
  - marker: c
    text: ⲥⲁϩⲟⲩ ⲙ̄ⲡⲁϣⲟⲩϣⲟⲩ could be understood more concretely as “the band of slaughter,”
      hence “those killed in violence.”
    reason: alignment_note
  - marker: d
    text: Or 'and do not send me into the assembly of violence.'.
    reason: previous_rendering
lexical_decisions:
- source_word: ⲙ̄ⲡⲣ̄ⲙⲉⲥⲧⲉ
  chosen: do not despise
  alternatives:
  - do not hate
  - do not disdain
  lexicon: Crum, Coptic Dictionary (s.v. ⲙⲉⲥⲧⲉ)
  rationale: Negative imperative with ⲙ̄ⲡⲣ̄ + verb; ⲙⲉⲥⲧⲉ commonly means despise/abhor;
    "despise" fits petition tone.
- source_word: ⲙⲛ̄ⲧⲥⲧⲙⲏⲧ
  chosen: lowliness
  alternatives:
  - humiliation
  - insignificance
  - humility
  lexicon: Crum (s.v. ⲥⲧⲙⲏⲧ)
  rationale: Abstract noun of smallness/contemptibility. "Lowliness" preserves non-virtue
    nuance better than "humility" here.
- source_word: ⲉⲅⲕⲣⲁⲧⲉⲓⲁ
  chosen: self-control
  alternatives:
  - continence
  - self-restraint
  lexicon: Loan from Gk. ἐγκράτεια
  rationale: Standard modern gloss; maintains ethical nuance without ecclesiastical
    archaism.
- source_word: ⲛ̄ⲧⲉⲧⲛ̄ (with ⲧⲁⲉⲅⲕⲣⲁⲧⲉⲓⲁ)
  chosen: toward you
  alternatives:
  - over you
  - of you
  lexicon: Coptic genitival ⲛ̄ⲧⲉ + dependent pronoun
  rationale: Context fits relational orientation; "of you" risks misreading possession;
    "toward you" conveys reference.
- source_word: ⲙⲉⲣⲓⲧⲥ
  chosen: love her
  alternatives:
  - love it
  lexicon: Crum (s.v. ⲙⲉⲣⲓ)
  rationale: Object pronoun ⲥ is 3sg feminine; abstracts like ⲉⲅⲕⲣⲁⲧⲉⲓⲁ are feminine;
    retain grammatical gender in English for vividness.
- source_word: ϩⲛ̄
  chosen: in
  alternatives:
  - amid
  - among
  lexicon: Standard preposition
  rationale: Locative sense fits "in my poverty"; "amid" is possible but more marked.
- source_word: ⲙⲛ̄ⲧϭⲱⲃ
  chosen: poverty
  alternatives:
  - need
  - want
  - destitution
  lexicon: Crum (s.v. ϭⲱⲃ)
  rationale: Established abstract for state of being poor; clear and weighty.
- source_word: ⲕⲱ ⲧⲏⲛⲉ
  chosen: laugh ... excessively
  alternatives:
  - laugh much
  - mock loudly
  lexicon: Crum (s.v. ⲕⲱ; ⲧⲏⲛⲉ)
  rationale: ⲧⲏⲛⲉ intensifies; "excessively" is idiomatic and keeps scalar force without
    adding imagery.
- source_word: ⲥⲁϩⲟⲩ
  chosen: assembly
  alternatives:
  - band
  - company
  lexicon: Crum (s.v. ⲥⲁϩⲟⲩ)
  rationale: Neutral collective fits collocation with ⲙ̄ⲡⲁϣⲟⲩϣⲟⲩ.
- source_word: ϣⲟⲩϣⲟⲩ
  chosen: violence
  alternatives:
  - tumult
  - slaughter
  lexicon: Crum (s.v. ϣⲟⲩϣⲟⲩ)
  rationale: Context of exclusion/harms supports "violence"; "slaughter" is a stronger
    but possible alternative.
parallelism_check: 'The block runs as a chain of imperatives: two negatives bracketing
  a positive command (love) and concluding with another negative. This preserves the
  Coptic imperatival cadence (ⲙ̄ⲡⲣ̄ + verb; then ⲙⲉⲣⲓⲧⲥ; then ⲙ̄ⲡⲣ̄ ... understood).
  The repeated direct address to the audience (2nd plural) with "me/my" maintains
  the parallelism found in the source petitions.'
voice_check: 'Thunder’s commanding, self-referential voice is kept: first-person possessives
  (my lowliness, my poverty) and direct imperatives to the hearers. The feminine grammatical
  object for "self-control" is kept as "her," preserving the personal, paradox-tinged
  tone of the poem.'
alignment_risk_note: Overall alignment confidence is medium. The first three cola
  ("Do not despise my lowliness; ... love her in my poverty; do not laugh at me ...")
  align well with recognizable forms (ⲙ̄ⲡⲣ̄ⲙⲉⲥⲧⲉ; ⲧⲁⲙⲛ̄ⲧⲥⲧⲙⲏⲧ; ⲧⲁⲉⲅⲕⲣⲁⲧⲉⲓⲁ; ⲙⲉⲣⲓⲧⲥ;
  ⲕⲱ ⲧⲏⲛⲉ; ⲉⲣⲟⲓ). The latter portion (ⲁⲩⲱ ⲛ̄ⲧⲉ / ⲉⲧⲕⲉⲟⲩⲁⲩ ⲧⲉ ⲧⲁⲣⲕⲁⲧⲁⲫⲣⲟⲛⲓ ... ⲧⲛ̄ⲥⲁϩⲟⲩ
  ⲙ̄ⲡⲁϣⲟⲩϣⲟⲩ) is difficult due to probable line breaks through Greek loanwords (e.g.,
  καταφρόνησις ‘contempt’) and compressed syntax. I render the close as "do not send
  me into the assembly of violence" based on ⲥⲁϩⲟⲩ + ϣⲟⲩϣⲟⲩ, but acknowledge that
  it may reflect the more specific sense "do not cast me out among those slain by
  violence."
