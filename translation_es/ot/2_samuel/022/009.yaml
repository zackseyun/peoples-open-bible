revisions:
- from: Subió humo de sus narices[a], y fuego consumidor de su boca; brasas se encendieron de él.
  to: Subió humo de sus narices[a], y fuego que consume de su boca; las brasas ardieron de él.
  rationale: La revisión mantiene todas las decisiones exegéticas del POB —especialmente la imaginería corporal literal y la nota sobre la alternativa idiomática— pero mejora la naturalidad y fuerza poética del español. «Fuego que consume» expresa con claridad el valor activo de תֹאכֵל, y «las brasas ardieron de él» comunica mejor la combustión y la procedencia de מִמֶּנּוּ sin sonar como calco rígido.
  reviewer_model: gpt-5.4
