base_translation:
  language: en
  yaml_path: translation/ot/proverbs/017/026.yaml
  text: Also[a], to punish a righteous man is not good[b], nor to strike nobles for their uprightness.
  footnotes:
  - marker: a
    text: Or 'nor to strike princes contrary to justice.' The Hebrew phrase עַל יֹשֶׁר can be understood either as 'for uprightness' or, more idiomatically, 'against what is right / contrary to justice.'
    reason: lexical_alternative
  - marker: b
    text: '''Nobles'' may also be rendered ''princes'' or ''leaders''; the Hebrew can denote people of high rank.'
    reason: lexical_alternative
