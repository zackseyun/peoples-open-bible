base_translation:
  language: en
  yaml_path: translation/ot/isaiah/030/033.yaml
  text: For Topheth has long been prepared[a]; indeed, it is made ready for the king. He has made it deep and wide, with a pyre of fire and wood in abundance. The breath of Yahweh, like a stream of sulfur[c][b], kindles it.
  footnotes:
  - marker: a
    text: Or 'Tophet.' The Hebrew form is a place-name associated with burning and judgment imagery.
    reason: lexical_alternative
  - marker: b
    text: Literally 'from yesterday,' an idiom meaning that it has been prepared beforehand or long ago.
    reason: lexical_alternative
  - marker: c
    text: Traditional English often has 'brimstone' for 'sulfur.'
    reason: lexical_alternative
