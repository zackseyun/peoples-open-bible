  language: en
  yaml_path: translation/ot/leviticus/003/009.yaml
  text: 'And from the sacrifice of peace offerings he shall present an offering made by fire to Yahweh: its fat[a], the whole fat tail, which he shall remove close to the backbone, and the fat that covers the entrails, and all the fat that is on the entrails[c][b],'
  footnotes:
