base_translation:
  language: en
  yaml_path: translation/ot/jeremiah/022/030.yaml
  text: 'Thus says Yahweh: Write this man down as childless[a], a man who will not prosper in his days; for none of his offspring will prosper[b], sitting on the throne of David and ruling again in Judah.'
  footnotes:
  - marker: a
    text: 'Or ''record this man as without an heir.'' The Hebrew says ''childless,'' but the following clause shows the focus is dynastic succession: none of his offspring will succeed on David''s throne.'
    reason: lexical_alternative
  - marker: b
    text: That is, no descendant of Jeconiah would successfully reign as Davidic king in Judah.
    reason: cultural_note
