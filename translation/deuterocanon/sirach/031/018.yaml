theological_decisions:
- issue: Ethical formulation relative to the better-known positive 'love your neighbor as yourself' tradition
  chosen_reading: Retain the Hebrew's wording 'Understand your neighbor as yourself' without harmonizing to 'love.'
  alternative_readings:
  - Love your neighbor as yourself
  rationale: The Hebrew witness here uses ידע/understanding language, not explicit love language. The translation preserves the source text's distinct ethical emphasis rather than importing a more familiar biblical formula.
  doctrine_reference: 'DOCTRINE.md: Original-language primacy over translation tradition; Preserve theological tension rather than resolve it.'
