translation:
  language: es
  text: 'Jonatán le dijo: «Mañana es la luna nueva, y te echarán de menos[a], porque tu asiento quedará vacío».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «se notará tu ausencia ... porque tu lugar estará vacío / desocupado». El hebreo repite el verbo פקד en ambas cláusulas, creando un juego de palabras que el español no puede reproducir con la misma naturalidad.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמֶר לּוֹ
  english_pob_choice: said to him
  chosen_spanish: le dijo
  alternatives_spanish:
  - dijo a él
  - le habló
  lexicon: HALOT
  rationale: La fórmula narrativa וַיֹּאמֶר con sufijo indirecto se expresa de manera natural en español con «le dijo», conservando el reporte directo sin añadir énfasis ajeno al hebreo.
- source_word: יְהוֹנָתָן
  english_pob_choice: Jonathan
  chosen_spanish: Jonathan
  alternatives_spanish:
  - Jonatán
  lexicon: Nombre propio estándar
  rationale: Se mantiene la forma usual en español bíblico y de lectura eclesial, coherente con el valor identificable del nombre propio.
- source_word: מָחָר
  english_pob_choice: Tomorrow
  chosen_spanish: Mañana
  alternatives_spanish:
  - al día siguiente
  lexicon: HALOT
  rationale: El adverbio temporal se vierte con el equivalente directo y natural en español.
- source_word: חֹדֶשׁ
  english_pob_choice: the new moon
  chosen_spanish: la luna nueva
  alternatives_spanish:
  - la novilunio
  - el novilunio
  - el mes
  lexicon: HALOT
  rationale: En este contexto cortesano y festivo, חֹדֶשׁ alude a la observancia de luna nueva, no simplemente a «mes». «La luna nueva» comunica el rito y su fuerza contextual de forma clara en español.
- source_word: וְנִפְקַדְתָּ
  english_pob_choice: you will be missed
  chosen_spanish: serás echado[a] en falta
  alternatives_spanish:
  - te echarán de menos
  - serás notado
  - se notará tu ausencia
  lexicon: HALOT
  rationale: El nifal de פקד aquí expresa que la ausencia de David llamará la atención. «Serás echado en falta» conserva el sentido pasivo y la carga relacional mejor que una formulación meramente descriptiva. Se marca la flexión inclusiva/alternativa con nota porque el español idiomático puede decir también «te echarán de menos».
- source_word: כִּי
  english_pob_choice: because
  chosen_spanish: porque
  alternatives_spanish:
  - pues
  - ya que
  lexicon: HALOT
  rationale: La partícula causal se traduce con la conjunción española más directa y transparente.
- source_word: יִפָּקֵד
  english_pob_choice: will be empty
  chosen_spanish: quedará vacío
  alternatives_spanish:
  - estará vacío
  - quedará desocupado
  - faltará
  lexicon: HALOT
  rationale: 'El mismo verbo פקד reaparece con el sujeto «tu asiento». En español, el resultado se expresa mejor con el estado del asiento: «quedará vacío». Así se conserva el paralelismo lógico del hebreo sin forzar una repetición poco natural.'
- source_word: מוֹשָׁבֶךָ
  english_pob_choice: your seat
  chosen_spanish: tu asiento
  alternatives_spanish:
  - tu lugar
  - tu puesto
  lexicon: HALOT
  rationale: En el marco del banquete real, מוֹשָׁב indica el lugar asignado para sentarse. «Tu asiento» mantiene esa precisión contextual mejor que el más general «tu lugar».
translation_notes:
  revision_awareness: 'Alineado con el testimonio hebreo de WLC y con el audit trail inglés: se preserva la escena de la comida de luna nueva, el valor pasivo de פקד en la primera cláusula y el paralelismo verbal en nota.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» solo cuando el texto fuente lo exige; en este versículo no aparece el nombre divino.
  - Se usa un español sobrio y bíblico, evitando calcos innecesarios y sin introducir lenguaje confesional ajeno al hebreo.
  - Se conserva la misma base semántica para פקד en una nota, ya que el hebreo crea un juego de palabras que no conviene borrar.
