translation:
  language: es
  text: Nuestra piel está tan caliente como un horno por el calor abrasador de la hambruna[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Nuestra piel está abrasada como un horno por el calor abrasador de la hambruna». El hebreo usa un verbo y un sustantivo poco frecuentes; por eso también es posible entender la imagen como una piel abrasada por un calor consumidor, más que simplemente caliente.'
    reason: lexical_alternative
lexical_decisions:
- source_word: עוֹרֵנוּ
  english_pob_choice: Our skin
  chosen_spanish: Nuestra piel
  alternatives_spanish:
  - Nuestra carne
  - Nuestra piel y cuero
  lexicon: HALOT
  rationale: עוֹר en contexto humano significa 'piel'. 'Piel' es la equivalencia natural y fiel en español; 'cuero' o 'hide' resultarían demasiado ásperos o zoológicos.
- source_word: כְּתַנּוּר
  english_pob_choice: as hot as an oven
  chosen_spanish: tan caliente como un horno
  alternatives_spanish:
  - como un horno
  - tan ardiente como un horno
  lexicon: HALOT
  rationale: La comparación con תַּנּוּר pide una equivalencia que suene natural en español. Como el verbo siguiente expresa un estado de calor/intensidad, 'tan caliente como un horno' reproduce bien la imagen sin forzar un calco.
- source_word: נִכְמָרוּ
  english_pob_choice: is as hot
  chosen_spanish: está
  alternatives_spanish:
  - está quemada
  - está tostada
  - está abrasada
  lexicon: HALOT
  rationale: El nifal de כמר es raro y puede sugerir estar calentado, consumido o quemado por el calor. En español, la construcción 'está tan caliente como un horno' mantiene el estado resultante sin sobreespecificar una decoloración o quemadura concreta.
- source_word: מִפְּנֵי
  english_pob_choice: because of
  chosen_spanish: por
  alternatives_spanish:
  - a causa de
  - debido a
  lexicon: HALOT
  rationale: La preposición introduce causa. 'Por' es breve y natural en español bíblico moderno; 'a causa de' también sería posible, pero algo más pesado.
- source_word: זַלְעֲפוֹת
  english_pob_choice: burning heat
  chosen_spanish: ardor
  alternatives_spanish:
  - calor abrasador
  - calor ardiente
  - ardiente calor
  lexicon: HALOT
  rationale: זַלְעֲפוֹת puede referirse a un calor abrasador o incandescente. 'Ardor' conserva la intensidad y permite un español más fluido que la perífrasis 'calor ardiente'.
- source_word: רָעָב
  english_pob_choice: famine
  chosen_spanish: hambre
  alternatives_spanish:
  - hambruna
  - famine
  lexicon: HALOT
  rationale: En este lamento el sustantivo puede abarcar hambre devastadora o la calamidad de la hambruna. 'Hambre' mantiene la referencia al sufrimiento corporal inmediato; 'hambruna' sería más interpretativo y más técnico.
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión inglesa que prefirió 'burning heat' frente a 'burning fever'. Por eso el español evita 'fiebre' y conserva una imagen de calor/ardor más directamente ligada al hebreo.
  spanish_consistency_notes:
  - Se mantiene 'piel' para עוֹר en contexto humano, conforme al valor léxico básico.
  - Se usa 'hambre' para רָעָב porque en español la imagen corporal inmediata es más natural que 'hambruna', aunque ambas son posibles según el alcance contextual.
  - Se evitó traducir mecánicamente 'as hot as an oven' con una estructura demasiado inglesa; se optó por una frase española fluida que conserva la comparación.
  - No hay decisiones teológicas explícitas en este versículo; el trabajo es principalmente léxico e imagístico.
