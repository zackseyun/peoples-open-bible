revisions:
- from: Neftalí no expulsó a los habitantes de Bet-semes[a] ni a los habitantes de Bet-anat, sino que habitó entre los cananeos, los habitantes de la tierra. Y los habitantes de Bet-semes y de Bet-anat les quedaron como trabajo forzado.
  to: Neftalí no expulsó a los habitantes de Bet-semes ni a los habitantes de Bet-anat, así que vivió entre los cananeos, los habitantes de la tierra. Y los habitantes de Bet-semes y de Bet-anat llegaron a ser trabajo forzado[a] para ellos.
  rationale: Se corrige el anclaje de la nota para que recaiga sobre 'trabajo forzado', que es el término explicado por la nota. También se reemplaza 'les quedaron como trabajo forzado' por 'llegaron a ser trabajo forzado para ellos', una formulación más natural y más fiel a הָיוּ לָהֶם לָמַס. Además, 'así que vivió entre' refleja mejor la consecuencia narrativa señalada en el audit trail inglés.
  reviewer_model: gpt-5.4
