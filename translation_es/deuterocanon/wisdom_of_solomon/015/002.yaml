translation:
  language: es
  text: Porque aun si pecamos[a], tuyos somos, sabiendo tu poder[b]; pero no pecaremos, sabiendo que hemos sido contados como tuyos[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «si pecamos»; el griego deja una condición real sin suavizarla a un exhortativo.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «tu fuerza»; κράτος puede referirse a poder, fuerza o dominio.'
    reason: lexical_alternative
  - marker: c
    text: 'O: «hemos sido tenidos por tuyos» / «hemos sido reckoned como tuyos»; el verbo griego es contable y expresa pertenencia.'
    reason: lexical_alternative
lexical_decisions:
- source_word: καὶ γὰρ
  english_pob_choice: For even
  chosen_spanish: Porque aun
  alternatives_spanish:
  - pues aun
  - porque incluso
  lexicon: LSJ
  rationale: El griego introduce una relación explicativa y enfática. «Porque aun» conserva esa conexión causal/explanatoria y la concesión sin volver la frase pesada en español.
- source_word: ἐὰν ἁμάρτωμεν
  english_pob_choice: if we sin
  chosen_spanish: si pecamos
  alternatives_spanish:
  - si llegamos a pecar
  - aunque pequemos
  lexicon: BDAG
  rationale: El subjuntivo condicional pide una forma natural en español. «Pecamos» mantiene la posibilidad condicional; «aunque pequemos» ya interpretaría la relación más de lo que exige el griego.
- source_word: σοὶ ἐσμεν
  english_pob_choice: we are yours
  chosen_spanish: tuyos somos
  alternatives_spanish:
  - somos de ti
  - te pertenecemos
  lexicon: LSJ
  rationale: El dativo con εἰμί expresa pertenencia o relación. «Tuyos somos» es breve, bíblico y conserva la idea de posesión/pertenencia sin perder naturalidad.
- source_word: εἰδότες
  english_pob_choice: knowing
  chosen_spanish: sabiendo
  alternatives_spanish:
  - porque sabemos
  - ya que sabemos
  lexicon: BDAG
  rationale: El participio perfecto funciona de manera circunstancial o causal. «Sabiendo» preserva la estructura participial y deja que el contexto exprese la fuerza causal.
- source_word: σου τὸ κράτος
  english_pob_choice: your power
  chosen_spanish: tu poder
  alternatives_spanish:
  - tu fuerza
  - tu dominio
  lexicon: BDAG
  rationale: κράτος puede ser poder, fuerza o dominio. «Poder» es la opción amplia y natural aquí; «dominio» inclinaría el sentido hacia soberanía más de lo que el término exige.
- source_word: οὐχ ἁμαρτησόμεθα
  english_pob_choice: we will not sin
  chosen_spanish: no pecaremos
  alternatives_spanish:
  - no vamos a pecar
  - no hemos de pecar
  lexicon: BDAG
  rationale: El futuro griego se vierte mejor con futuro español. Se preserva la afirmación/resolución del texto sin suavizarla a un exhortativo.
- source_word: ὅτι σοὶ λελογίσμεθα
  english_pob_choice: that we have been counted as yours
  chosen_spanish: que hemos sido contados como tuyos
  alternatives_spanish:
  - que hemos sido reckoned como tuyos
  - que se nos ha contado entre los tuyos
  lexicon: BDAG
  rationale: λογίζομαι en perfecto pasivo conserva un matiz contable/judicial de ser contados o considerados. «Contados como tuyos» retiene tanto el lenguaje de cuenta como el sentido de pertenencia.
theological_decisions:
- issue: Tensión entre «si pecamos» y «no pecaremos»
  english_pob_reading: Preserve both clauses as stated without harmonizing them.
  chosen_spanish_reading: Mantener ambas cláusulas tal como están, sin resolver la tensión.
  alternative_spanish_readings:
  - si pecáramos... no pecaríamos
  - aunque pequemos... no pecaremos
  - si pecamos... que no pequemos
  rationale: 'El griego presenta una tensión retórica real: la posibilidad de pecar no niega la pertenencia a Dios, y esa pertenencia fundamenta la afirmación de no pecar. La traducción debe conservar esa tensión en vez de armonizarla.'
  doctrine_reference: DOCTRINE.md §3 Preserve theological tension rather than resolve it
- issue: Sentido relacional de λελογίσμεθα
  english_pob_reading: that we have been counted as yours
  chosen_spanish_reading: que hemos sido contados como tuyos
  alternative_spanish_readings:
  - que se nos ha considerado tuyos
  - que hemos sido reckoned para ti
  rationale: 'El pasivo perfecto apunta a una designación ya establecida: ser contados/considerados pertenecientes a Dios. «Como tuyos» mantiene la relación de pertenencia sin borrar el matiz contable.'
  doctrine_reference: Lexical/theological note on λογίζομαι in the audit trail
translation_notes:
  revision_awareness: La revisión más reciente indicó alta concordancia y ningún cambio necesario; se conserva la tensión del original y las decisiones léxicas ya adjudicadas en el paquete inglés.
  spanish_consistency_notes:
  - Se usa «Dios»/«Yahvé» según corresponda; aquí el texto griego emplea la segunda persona («tú/tu») sin un nombre divino explícito.
  - Se mantiene «pecar» para ἁμαρτάνω y «poder» para κράτος siguiendo el audit trail inglés.
  - «Tuyos somos» y «contados como tuyos» preservan la semántica de pertenencia sin reemplazarla por formulaciones eclesiásticas más interpretativas.
