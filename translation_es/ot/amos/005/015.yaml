translation:
  language: es
  text: Odien el mal[a] y amen el bien; establezcan la justicia en la puerta. Quizá Yahvé, Dios de las huestes[c][b], sea propicio al remanente de José.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: La puerta era el lugar público donde los ancianos y las autoridades oían causas legales y administraban la justicia cívica.
    reason: cultural_note
  - marker: b
    text: O "a la puerta". El hebreo es una expresión idiomática que se refiere al lugar de juicio público en la ciudad.
    reason: lexical_alternative
  - marker: c
    text: José aquí se refiere al pueblo descendiente de José, especialmente al reino del norte; "el remanente de José" designa a los que quedan después del juicio.
    reason: cross_reference
lexical_decisions:
- source_word: שִׂנְאוּ
  english_pob_choice: Hate
  chosen_spanish: Odiad
  alternatives_spanish:
  - Aborreced
  - Odiad el mal
  lexicon: HALOT
  rationale: Imperativo plural fuerte de שׂנא. 'Odiad' preserva la fuerza exhortativa del mandato y mantiene el contraste ético del versículo.
- source_word: רָע
  english_pob_choice: evil
  chosen_spanish: el mal
  alternatives_spanish:
  - lo malo
  - la maldad
  lexicon: HALOT
  rationale: Sustantivo/adjetivo sustantivado en contraste con 'bien'. 'El mal' es natural en español y conserva el valor moral general del término.
- source_word: אֶהֱבוּ
  english_pob_choice: love
  chosen_spanish: amad
  alternatives_spanish:
  - Amad
  - quered
  lexicon: HALOT
  rationale: Imperativo plural de אהב. 'Amad' mantiene la antítesis directa con 'Odiad' y refleja la fuerza del original sin suavizarla.
- source_word: טוֹב
  english_pob_choice: good
  chosen_spanish: el bien
  alternatives_spanish:
  - lo bueno
  - el bueno
  lexicon: HALOT
  rationale: Aquí funciona como sustantivo ético en paralelo con 'el mal'. 'El bien' comunica mejor la oposición moral que 'lo bueno' en este contexto profético.
- source_word: הַצִּיגוּ
  english_pob_choice: establish
  chosen_spanish: estableced
  alternatives_spanish:
  - poned
  - haced que se mantenga
  - colocad
  lexicon: HALOT
  rationale: Hifil imperativo con sentido de hacer que algo permanezca firme. 'Estableced' expresa con claridad la idea de implantar o hacer firme la justicia en el orden público.
- source_word: בַשַּׁעַר
  english_pob_choice: in the gate
  chosen_spanish: en la puerta
  alternatives_spanish:
  - en la puerta de la ciudad
  - en la puerta del juicio
  lexicon: HALOT
  rationale: El hebreo alude al lugar público de deliberación y juicio. 'Puerta' conserva el idioma bíblico; la nota explica su función judicial y cívica.
- source_word: מִשְׁפָּט
  english_pob_choice: justice
  chosen_spanish: la justicia
  alternatives_spanish:
  - el juicio
  - el derecho
  - la rectitud
  lexicon: HALOT
  rationale: En este contexto se refiere al orden legal justo en la ciudad. 'Justicia' es la opción más natural y fiel al valor jurídico-social del término.
- source_word: אוּלַי
  english_pob_choice: perhaps
  chosen_spanish: quizá
  alternatives_spanish:
  - tal vez
  - quizás
  lexicon: HALOT
  rationale: Expresa esperanza sin certeza. 'Quizá' conserva la reserva del original y evita convertir la promesa en garantía.
- source_word: יֶֽחֱנַ֛ן
  english_pob_choice: will be gracious
  chosen_spanish: tendrá compasión
  alternatives_spanish:
  - será gracioso
  - mostrará favor
  - será clemente
  lexicon: HALOT
  rationale: De חנן, verbo de gracia/favor inmerecido. 'Tendrá compasión' comunica bien la benevolencia divina en español; aunque 'será gracioso' sería más literal, suena poco natural y puede oscurecer el sentido.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  lexicon: HALOT
  rationale: Se mantiene el nombre divino en transliteración, conforme a la política del proyecto, en lugar de sustituirlo por un título.
- source_word: אֱלֹהֵי צְבָאוֹת
  english_pob_choice: the God of hosts
  chosen_spanish: el Dios de los ejércitos
  alternatives_spanish:
  - el Dios de los ejércitos celestiales
  - el Dios de los ejércitos
  lexicon: HALOT
  rationale: Título divino fijo. En español, 'ejércitos' conserva el alcance de 'hosts' y es transparente para lectores bíblicos; evita restringir indebidamente el término a un solo ámbito.
- source_word: שְׁאֵרִית
  english_pob_choice: the remnant
  chosen_spanish: el remanente
  alternatives_spanish:
  - el resto
  - los sobrevivientes
  lexicon: HALOT
  rationale: Término profético técnico para los que quedan tras el juicio. 'Remanente' preserva la continuidad teológica y el matiz histórico del hebreo.
- source_word: יוֹסֵף
  english_pob_choice: Joseph
  chosen_spanish: José
  alternatives_spanish:
  - José
  lexicon: HALOT
  rationale: Nombre propio mantenido en forma española habitual. En el contexto profético puede referir metonímicamente al pueblo del norte descendiente de José.
theological_decisions:
- issue: Nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: Se conserva el nombre propio del pacto en vez de una sustitución titular. 'Yahvé' sigue la convención del proyecto y preserva la referencia directa al Tetragrama.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Tensión de אוּלַי con יֶחֱנַן
  english_pob_reading: perhaps ... will be gracious
  chosen_spanish_reading: quizá ... tendrá compasión
  alternative_spanish_readings:
  - tal vez ... mostrará favor
  - quizás ... será clemente
  rationale: El hebreo presenta esperanza, no certeza. 'Quizá' mantiene la contingencia, y 'tendrá compasión' expresa la gracia divina sin convertirla en resultado asegurado.
  doctrine_reference: 'DOCTRINE.md Translation philosophy #3: Preserve theological tension rather than resolve it'
- issue: מִשְׁפָּט en el ámbito de la puerta
  english_pob_reading: justice in the gate
  chosen_spanish_reading: la justicia en la puerta
  alternative_spanish_readings:
  - el derecho en la puerta
  - la justicia en la puerta de la ciudad
  rationale: La 'puerta' era el lugar de juicio público. Mantener la expresión breve conserva el trasfondo institucional sin perder naturalidad en español.
  doctrine_reference: Amos 5:15 cultural-historical context of civic judgment
- issue: שְׁאֵרִית יוֹסֵף
  english_pob_reading: the remnant of Joseph
  chosen_spanish_reading: el remanente de José
  alternative_spanish_readings:
  - los sobrevivientes de José
  - el resto de José
  rationale: Se preserva el término profético 'remanente' y el nombre propio 'José', sin explicar metonímicamente dentro del texto para no recargarlo; el sentido puede anotarse en nota.
  doctrine_reference: Prophetic remnant theology in Amos; cross-reference note in POB audit trail
translation_notes:
  revision_awareness: La revisión más reciente indicó que no se requerían cambios; el borrador sigue de cerca el texto hebreo y la auditoría inglesa, conservando la tensión de 'quizá' y la imagen judicial de la 'puerta'.
  spanish_consistency_notes:
  - Se usa 'Yahvé' para יְהוָה de manera consistente con el proyecto.
  - '''Remanente'' se reserva para שְׁאֵרִית en contexto profético.'
  - '''Puerta'' mantiene la imagen bíblica del foro judicial, con explicación en nota.'
  - Se prefirió 'tendrá compasión' para יֶחֱנַן por naturalidad en español, sin perder el valor de gracia/favor.
