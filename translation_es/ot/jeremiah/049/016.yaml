base_translation:
  language: en
  yaml_path: translation/ot/jeremiah/049/016.yaml
  text: The terror you inspire has deceived you[a], the arrogance of your heart— you who dwell in the clefts of the rock, who occupy the height of the hill. Though you make your nest as high as the eagle, from there I will bring you down[c][b], declares Yahweh.
  footnotes:
  - marker: a
    text: Or 'your terror' or 'your horror'; the Hebrew may refer either to the terror Edom inspires or to its dreadfulness/reputation.
    reason: lexical_alternative
  - marker: b
    text: Or 'the pride of your heart.'
    reason: lexical_alternative
  - marker: c
    text: Hebrew 'in the clefts of the rock,' evoking Edom's seemingly impregnable mountain strongholds.
    reason: cultural_note
