    reason: lexical_alternative
  - marker: b
    text: O «el matador» o «el que quitó la vida». Aquí se conserva «homicida» para mantener la distinción legal frente a un asesino condenado.
    reason: lexical_alternative
  revision_rationale: 'La revisión corrige tres puntos para alinear mejor el español con el hebreo y con el audit trail inglés: 1) cambia «volverá» por «podrá volver» para expresar permiso legal; 2) sustituye «entrará» por «llegar a» para un movimiento natural en español; 3) restituye la dirección final con «a la ciudad». También mejora la claridad de «que haya en aquellos días» con «que esté en funciones en aquellos días».'
