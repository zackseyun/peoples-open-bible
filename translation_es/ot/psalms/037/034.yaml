revisions:
- from: Espera en Yahvé y guarda su camino[a]; y él te exaltará para heredar la tierra[b]; cuando los malvados sean exterminados[c], tú lo verás.
  to: Espera en Yahvé[a] y guarda su camino, y él te exaltará para heredar la tierra[b]; cuando los malvados sean cortados[c], lo verás.
  rationale: Se revisa para alinear mejor el español con el hebreo y con las decisiones documentadas del POB inglés. 'Sean cortados' preserva la fuerza idiomática de כרת mejor que 'sean exterminados'. Se añade la alternativa documentada para קוה y se corrige la nota sobre אָרֶץ para reflejar mejor la tensión 'land/earth' y el matiz de herencia pactal, además de restaurar la referencia cruzada pertinente.
