translation:
  language: es
  text: Y persiguieron a los hijos de la soberbia[a], y la obra prosperó en sus manos[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «los soberbios» o «los hijos del orgullo». El griego usa una expresión literal, «hijos de la soberbia».
    reason: lexical_alternative
  - marker: b
    text: Es decir, la empresa tuvo éxito bajo su dirección; literalmente, «la obra prosperó en su mano».
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐδίωξαν
  english_pob_choice: pursued
  chosen_spanish: persiguieron
  alternatives_spanish:
  - dieron caza a
  - perseguieron
  - expulsaron
  lexicon: BDAG / LEH
  rationale: El verbo griego indica una persecución activa y hostil. «Persiguieron» conserva bien la fuerza verbal sin decidir de más si el efecto fue expulsión, captura o destrucción.
- source_word: τοὺς υἱοὺς τῆς ὑπερηφανίας
  english_pob_choice: the sons of arrogance
  chosen_spanish: los hijos de la soberbia
  alternatives_spanish:
  - los arrogantes
  - los hijos del orgullo
  - los soberbios
  lexicon: LEH
  rationale: La expresión es semítica y literal. «Hijos de la soberbia» mantiene el giro idiomático y la carga retórica, evitando reducirlo de inmediato a un adjetivo simple.
- source_word: ὑπερηφανίας
  english_pob_choice: arrogance
  chosen_spanish: soberbia
  alternatives_spanish:
  - orgullo
  - arrogancia
  - altivez
  lexicon: LSJ
  rationale: En español «soberbia» comunica mejor el matiz moral negativo y más tradicional del término, con un tono claro pero no arcaico.
- source_word: κατευωδώθη
  english_pob_choice: prospered
  chosen_spanish: prosperó
  alternatives_spanish:
  - tuvo éxito
  - salió bien
  - fue hecho prosperar
  lexicon: LEH
  rationale: El pasivo griego expresa que la empresa tuvo éxito. «Prosperó» es conciso, natural y preserva la valoración favorable del resultado.
- source_word: τὸ ἔργον
  english_pob_choice: the work
  chosen_spanish: la obra
  alternatives_spanish:
  - el trabajo
  - la empresa
  - la tarea
  lexicon: BDAG
  rationale: En este contexto militar e histórico, «obra» funciona bien para referirse a la actuación o empresa en curso sin restringir demasiado el alcance.
- source_word: ἐν χειρὶ αὐτῶν
  english_pob_choice: in their hands
  chosen_spanish: en sus manos
  alternatives_spanish:
  - bajo su mano
  - por medio de ellos
  - bajo su dirección
  lexicon: LEH
  rationale: La locución idiomática se puede mantener de forma natural en español como «en sus manos», preservando la imagen bíblica de agencia y control.
translation_notes:
  revision_awareness: El griego y el control editorial inglés concuerdan de forma alta. Se mantuvo la imagen semítica de «hijos de la soberbia» y el idiomático «prosperó en sus manos», ajustando al español natural sin perder la literalidad subyacente. No hay tensión textual relevante adicional en este versículo.
  spanish_consistency_notes:
  - Se usó «Y» inicial para reflejar el arranque conjuntivo del griego.
  - Se eligió «soberbia» en lugar de «arrogancia» por naturalidad y matiz moral en español, pero se conservó la alternativa en nota.
  - Se pluralizó «sus manos» para concordar con el ajuste idiomático ya reconocido en el audit trail inglés.
  - No se introdujo terminología eclesiástica posterior ni se suavizó la fuerza hostil del verbo griego.
