translation:
  language: es
  text: 'Y en cuanto a ustedes, mi rebaño, así dice Señor Yahvé: He aquí, yo estoy juzgando entre oveja y oveja[a], entre los carneros y los machos cabríos.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «entre oveja y oveja»; es decir, entre un miembro del rebaño y otro dentro del mismo rebaño.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְאַתֵּנָה
  english_pob_choice: And as for you
  chosen_spanish: Y en cuanto a ustedes
  alternatives_spanish:
  - Y ustedes
  - Pero ustedes
  lexicon: HALOT
  rationale: El pronombre independiente en posición inicial marca un cambio enfático de interlocutor. «En cuanto a ustedes» reproduce en español ese enfoque discursivo mejor que un simple «Y ustedes».
- source_word: צֹאנִי
  english_pob_choice: my flock
  chosen_spanish: mi rebaño
  alternatives_spanish:
  - mis ovejas
  - mi ganado menor
  lexicon: HALOT
  rationale: En este contexto pastoral, el sustantivo colectivo se entiende mejor como un grupo; «rebaño» conserva la imagen de conjunto y suena natural en español bíblico actual.
- source_word: כֹּה אָמַר
  english_pob_choice: thus says
  chosen_spanish: así dice
  alternatives_spanish:
  - así ha dicho
  - esto dice
  lexicon: HALOT
  rationale: La fórmula profética queda bien reflejada con «así dice», que es formal y directa sin perder claridad en español.
- source_word: אֲדֹנָי יְהוִה
  english_pob_choice: the Lord GOD
  chosen_spanish: el Señor Yahvé
  alternatives_spanish:
  - el Señor Dios
  - el Señor Yahveh
  lexicon: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
  rationale: Se preserva el nombre divino como «Yahvé» según la directriz del proyecto, y se mantiene el título de soberanía con «Señor». En español, «el Señor Yahvé» evita la máscara tradicional de «SEÑOR» y conserva la distinción del título compuesto.
- source_word: הִנְנִי
  english_pob_choice: Behold, I
  chosen_spanish: He aquí, yo
  alternatives_spanish:
  - Miren, yo
  - Pues yo
  lexicon: HALOT
  rationale: La partícula de auto-presentación enfática se expresa de manera solemne con «He aquí, yo», fórmula bíblica reconocible y fiel al valor deíctico.
- source_word: שֹׁפֵט
  english_pob_choice: am judging
  chosen_spanish: estoy juzgando
  alternatives_spanish:
  - juzgo
  - voy a juzgar
  lexicon: HALOT
  rationale: El participio comunica una acción en curso o inminente; «estoy juzgando» conserva mejor ese matiz que un futuro simple.
- source_word: בֵּין שֶׂה לָשֶׂה
  english_pob_choice: between sheep and sheep
  chosen_spanish: entre oveja y oveja
  alternatives_spanish:
  - entre una oveja y otra
  - entre oveja y oveja
  lexicon: HALOT
  rationale: Se mantiene la expresión distributiva breve del hebreo. «Oveja y oveja» reproduce la forma concisa sin explicitar demasiado, mientras que el sentido es el de distinguir dentro del rebaño.
- source_word: לָאֵילִים
  english_pob_choice: the rams
  chosen_spanish: los carneros
  alternatives_spanish:
  - los rams
  - los machos ovinos
  lexicon: HALOT
  rationale: «אֵילִים» designa literalmente carneros; en español «carneros» es preciso y natural en un registro bíblico contemporáneo.
- source_word: וְלָעַתּוּדִים
  english_pob_choice: the male goats
  chosen_spanish: los machos cabríos
  alternatives_spanish:
  - los cabríos
  - los machos cabríos
  lexicon: HALOT
  rationale: El término nombra machos de cabra. «Machos cabríos» es claro y preciso, manteniendo la imagen animal del texto.
theological_decisions:
- issue: Nombre divino en אֲדֹנָי יְהוִה
  english_pob_reading: the Lord GOD
  chosen_spanish_reading: el Señor Yahvé
  alternative_spanish_readings:
  - Señor Yahvé
  - el Señor Dios
  rationale: La política del proyecto exige traducir יהוה como «Yahvé». En la combinación אֲדֹנָי יְהוִה, se conserva el título de autoridad con «Señor» y el nombre propio divino con «Yahvé», evitando la sustitución tradicional por «SEÑOR».
  doctrine_reference: 'DOCTRINE.md: Contested terms — יהוה YHWH → Yahweh'
translation_notes:
  revision_awareness: Seguí la revisión más reciente del audit trail inglés, que prefirió la expresión breve y distributiva «between sheep and sheep» sobre una explicación más expansiva. Por eso el español conserva una estructura igualmente concisa. También mantuve el nombre divino como «Yahvé» según la directriz doctrinal del proyecto, en vez de la convención inglesa «the Lord GOD».
  spanish_consistency_notes:
  - Usé «Yahvé» de forma consistente con el estándar del proyecto para יהוה.
  - Elegí «rebaño» para צֹאן como sustantivo colectivo natural en este contexto pastoral.
  - Mantuve la imagen animal completa («oveja», «carneros», «machos cabríos») sin espiritualizarla.
  - La nota al pie explica la expresión distributiva hebrea sin alterar el texto principal.
