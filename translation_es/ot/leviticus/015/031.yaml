translation:
  language: es
  text: Así advertirán a los hijos de Israel acerca de su impureza[a], para que no mueran en su impureza al profanar mi tabernáculo, que está entre ellos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «los israelitas» o «los descendientes de Israel».
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהִזַּרְתֶּם
  english_pob_choice: you shall warn
  chosen_spanish: advertirás
  alternatives_spanish:
  - amonestarás
  - avisarás
  - advertirás
  lexicon: HALOT
  rationale: El verbo hiphil aquí tiene fuerza preventiva y exhortativa; en español, «advertir» comunica bien la idea de dar una advertencia para evitar un daño futuro, sin suavizar el mandato.
- source_word: בְּנֵי יִשְׂרָאֵל
  english_pob_choice: the sons of Israel
  chosen_spanish: los hijos de Israel
  alternatives_spanish:
  - los israelitas
  - los hijos de Israel
  - los descendientes de Israel
  lexicon: HALOT
  rationale: Se conserva la formulación cercana al hebreo («hijos de Israel») para respetar la designación corporativa y su forma masculina plural, tal como hace la POB en inglés con «sons of Israel».
- source_word: טֻמְאָה
  english_pob_choice: uncleanness
  chosen_spanish: impureza
  alternatives_spanish:
  - impureza ritual
  - inmundicia
  - inmundicia ritual
  lexicon: HALOT
  rationale: En español bíblico contemporáneo, «impureza» expresa con claridad la categoría ritual de Levítico sin cargarla de connotaciones morales que el contexto no exige. Se evita «inmundicia» por ser menos natural en este registro.
- source_word: וְלֹא יָמֻתוּ
  english_pob_choice: so that they may not die
  chosen_spanish: para que no mueran
  alternatives_spanish:
  - para que no mueran
  - y no morirán
  - no sea que mueran
  lexicon: HALOT
  rationale: La finalidad preventiva del hebreo se expresa de forma natural con «para que no mueran», manteniendo el valor de advertencia.
- source_word: בְּטֻמְאָתָם
  english_pob_choice: in their uncleanness
  chosen_spanish: en su impureza
  alternatives_spanish:
  - en su impureza
  - mientras estén impuros
  - en estado de impureza
  lexicon: HALOT
  rationale: El prefijo בּ indica estado o condición; «en su impureza» conserva ese matiz y suena fluido en español.
- source_word: בְּטַמְּאָם
  english_pob_choice: by defiling
  chosen_spanish: al profanar
  alternatives_spanish:
  - al profanar
  - al contaminar
  - al volver impuro
  lexicon: HALOT
  rationale: Aquí el verbo causativo se refiere al efecto sobre el tabernáculo. «Profanar» reproduce bien la dimensión cultual de la acción en español y evita una expresión más pesada como «volver impuro».
- source_word: מִשְׁכָּנִי
  english_pob_choice: my tabernacle
  chosen_spanish: mi tabernáculo
  alternatives_spanish:
  - mi tabernáculo
  - mi morada
  - mi santuario
  lexicon: HALOT
  rationale: «Tabernáculo» es el equivalente más preciso para el objeto cultual concreto del texto; «morada» o «santuario» amplían o desplazan el referente.
- source_word: אֲשֶׁר בְּתוֹכָם
  english_pob_choice: which is among them
  chosen_spanish: que está entre ellos
  alternatives_spanish:
  - que está entre ellos
  - que está en medio de ellos
  lexicon: HALOT
  rationale: La cláusula subraya la presencia divina en medio del pueblo. «Entre ellos» es fiel y claro en español; «en medio de ellos» se mantiene como alternativa igualmente válida.
theological_decisions:
- issue: Terminología ritual de טֻמְאָה
  english_pob_reading: Render טֻמְאָה as 'uncleanness' and preserve the cultic sense rather than moralizing it as sin.
  chosen_spanish_reading: Traducir טֻמְאָה como «impureza» y conservar su sentido ritual, no moral.
  alternative_spanish_readings:
  - inmundicia
  - impureza ritual
  - contaminación ritual
  rationale: El contexto de Levítico 15 trata de pureza ritual y de la relación con el tabernáculo; «impureza» comunica esa categoría sin convertirla en un juicio moral general. La nota léxica deja abierta la alternativa «inmundicia» para lectores que prefieran un eco más tradicional.
  doctrine_reference: Translation philosophy §1, §6
- issue: Permanencia de la presencia divina
  english_pob_reading: which is among them
  chosen_spanish_reading: que está entre ellos
  alternative_spanish_readings:
  - que está en medio de ellos
  - que habita entre ellos
  rationale: El hebreo destaca que el tabernáculo está en medio del pueblo y que la presencia de Yahvé es real y localizada. «Entre ellos» preserva esa cercanía sin añadir una formulación interpretativa.
  doctrine_reference: Translation philosophy §2, §7
- issue: Designación corporativa de Israel
  english_pob_reading: the sons of Israel
  chosen_spanish_reading: los hijos de Israel
  alternative_spanish_readings:
  - los israelitas
  - los descendientes de Israel
  - los hijos de Israel
  rationale: Se mantiene una correspondencia formal con el hebreo y con la opción de la POB en inglés, sin neutralizar la expresión hacia un colectivo genérico que perdería parte de su forma fuente.
  doctrine_reference: Translation philosophy §4
translation_notes:
  revision_awareness: 'La redacción sigue el sentido revisado de la POB inglesa: una advertencia preventiva con resultado final de evitar la muerte por profanar el tabernáculo. Se prefirió una construcción española más natural («al profanar») en lugar de una traducción más pesada del hebreo, sin perder el vínculo causal del original.'
  spanish_consistency_notes:
  - Se usa «Yahvé» en el texto bíblico del proyecto cuando corresponda al Tetragrámaton; en este versículo no aparece.
  - Se mantiene «tabernáculo» para מִשְׁכָּן, coherente con el uso técnico del Pentateuco.
  - Se conserva «impureza» para טֻמְאָה a fin de mantener la categoría ritual sin moralizarla.
  - La cláusula final «que está entre ellos» refleja la cercanía espacial de la presencia divina y evita sobreinterpretar el hebreo.
