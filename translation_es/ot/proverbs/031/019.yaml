review_pass:
  verdict: revise
  source_alignment_summary: El borrador conserva bien la estructura poética y la distinción entre las dos herramientas de hilar, y refleja adecuadamente «sus manos / sus palmas» y «huso» para פָלֶךְ. Sin embargo, «distaff» no es español y no cumple la meta de legibilidad eclesial en español; además, la nota alternativa repite ese anglicismo y usa «asen», que en español moderno resulta erróneo o ambiguo aquí. Conviene mantener la distinción léxica con un término español natural y claro.
  spanish_quality_summary: La frase es fluida salvo por «distaff», que rompe la naturalidad del español. «Sus manos alcanzan la rueca, y sus palmas sostienen el huso» es claro y digno, aunque «rueca» puede abarcar el instrumento de hilar de modo algo más amplio que el hebreo técnico; aun así, es la mejor solución de legibilidad disponible en español común. La puntuación y el paralelismo son buenos. Se debe retirar el espacio antes de la nota al pie y mejorar la redacción de la nota alternativa.
  glossary_alignment: 'No hay términos teológicos clave del glosario general en este versículo. La decisión principal es léxica: sustituir el anglicismo «distaff» por un equivalente español inteligible. «Huso» para פָלֶךְ sigue alineado con el expediente inglés. «Palmas» preserva bien כַּף frente a «manos».'
  issues:
  - severity: high
    issue: Uso de «distaff» en el texto principal
    rationale: Es un anglicismo no integrado en español y perjudica la legibilidad. El encargo pide español neutral y eclesialmente legible, no una transliteración del inglés auditado.
  - severity: medium
    issue: Nota alternativa con redacción deficiente
    rationale: La nota repite «distaff» y usa «asen», forma que en español actual se asocia con «asar» o resulta confusa; para «grasp» conviene «agarran» o «sujetan».
  - severity: low
    issue: Espaciado del marcador de nota
    rationale: 'En el texto principal, el marcador debe anclarse directamente a la palabra o frase pertinente: «manos[a]», no «manos [a]».'
  revised_spanish_text: Sus manos alcanzan la rueca[a], y sus palmas sostienen el huso.
