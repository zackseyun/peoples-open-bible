    text: 'O: «desde el oriente hasta el occidente»; literalmente, «desde la salida del sol hasta su puesta».'
    reason: lexical_alternative
  - marker: b
    text: Hebreo YHWH, tradicionalmente traducido «el SEÑOR».
    reason: alternative_reading
  revision_rationale: Se ajusta מְהֻלָּל a «ha de ser alabado» para reflejar mejor la decisión auditada «is to be praised» y la fuerza del participio pasivo. Se corrige la nota alternativa para que corresponda de verdad a «from the east to the west». También se usa «puesta» en el texto por mayor coherencia con la literalidad documentada y con el paralelismo hebreo.
