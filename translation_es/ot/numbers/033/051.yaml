translation:
  language: es
  text: 'Habla a los hijos de Israel y diles: «Porque ustedes están cruzando[a] el Jordán a la tierra de Canaán»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El hebreo usa un participio que expresa una acción inminente; puede entenderse como «están cruzando» o «están por cruzar».
    reason: lexical_alternative
lexical_decisions:
- source_word: דַּבֵּר
  english_pob_choice: Speak
  chosen_spanish: Habla
  alternatives_spanish:
  - Di
  - Dirige la palabra a
  lexicon: HALOT
  rationale: El imperativo piel de דבר pide un mandato directo de comunicación. «Habla» conserva el tono formal y encaja con el segundo verbo «diles».
- source_word: בְּנֵי יִשְׂרָאֵל
  english_pob_choice: the sons of Israel
  chosen_spanish: los hijos de Israel
  alternatives_spanish:
  - los israelitas
  - los hijos de Jacob
  lexicon: HALOT
  rationale: Se mantiene la expresión literal y transparente del hebreo. «Hijos» conserva el parentesco lexical del original; «israelitas» sería más idiomático, pero menos transparente.
- source_word: וְאָמַרְתָּ אֲלֵהֶם
  english_pob_choice: and say to them
  chosen_spanish: y diles
  alternatives_spanish:
  - y di a ellos
  - y háblales
  lexicon: HALOT
  rationale: El hebreo coordina dos verbos de habla. En español, «diles» comunica con naturalidad el objeto indirecto y preserva la fuerza del mandato.
- source_word: כִּי
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Ya que
  lexicon: HALOT
  rationale: En este contexto introduce la razón o base de la instrucción. «Porque» mantiene el valor explicativo que el texto hebreo permite aquí, sin forzar una lectura temporal.
- source_word: אַתֶּם עֹבְרִים
  english_pob_choice: you are crossing
  chosen_spanish: ustedes están cruzando
  alternatives_spanish:
  - ustedes cruzan
  - ustedes van a cruzar
  lexicon: HALOT
  rationale: El participio expresa acción inminente/prospectiva. El presente progresivo español comunica esa cercanía sin perder la tensión de futuro inmediato documentada en el POB inglés.
- source_word: אֶת הַיַּרְדֵּן
  english_pob_choice: the Jordan
  chosen_spanish: el Jordán
  alternatives_spanish:
  - el río Jordán
  lexicon: HALOT
  rationale: Se conserva el nombre breve y habitual del río, como en el inglés POB. El artículo definido hace natural la referencia en español.
- source_word: אֶל אֶרֶץ כְּנָעַן
  english_pob_choice: into the land of Canaan
  chosen_spanish: hacia la tierra de Canaán
  alternatives_spanish:
  - a la tierra de Canaán
  - entrando en la tierra de Canaán
  lexicon: HALOT
  rationale: El hebreo usa אֶל, que puede indicar dirección hacia un destino. «Hacia» evita sobrecargar con un matiz de entrada ya explícito en el contexto y conserva la orientación espacial del original.
translation_notes:
  revision_awareness: Se corrigió el problema anterior anclando ambos marcadores de nota en el texto español. También se revisó el valor de כִּי según el POB inglés y se optó por una traducción explicativa más directa, con el matiz prospectivo preservado en el participio español.
  spanish_consistency_notes:
  - Se mantuvo «hijos de Israel» para transparencia con el hebreo, coherente con la política del proyecto.
  - Se usó «Jordán» sin añadir «río» en el texto principal para conservar la concisión del original.
  - Se evitó «SEÑOR» o equivalentes porque este versículo no contiene el nombre divino.
