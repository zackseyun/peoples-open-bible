review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien la estructura del hebreo: un primer nombramiento para el pueblo y un segundo para Sion/Jerusalén personificada. Conserva correctamente יְהוָה como ''Yahvé'' y transmite adecuadamente גְּאוּלֵי יְהוָה. Sin embargo, hay dos desajustes principales con el audit trail: (1) la nota [c] en inglés corresponde a una alternativa para ''Sought Out'', no para ''city not forsaken'', y en español los marcadores [b] y [c] quedaron invertidos respecto de sus funciones; (2) ''ciudad no abandonada'' es aceptable, pero ''ciudad no desamparada'' preserva mejor la resonancia de נֶעֱזָבָה / ''forsaken'' en Isaías y alinea mejor con la decisión léxica documentada.'
  spanish_quality_summary: El español es claro y natural. 'Y les llamarán' y 'se te llamará' son idiomáticos en fórmulas de nombramiento. 'Pueblo santo' funciona bien como título, aunque la ausencia del artículo definido suaviza levemente la definitud hebrea; no obstante, en una fórmula titular española resulta natural. 'Buscada' como nombre honorífico es legible. La principal necesidad es corregir la distribución y contenido de las notas, y conviene ajustar 'abandonada' a 'desamparada' para mejor fidelidad temática y literaria.
  glossary_alignment: 'Hay buena alineación con la terminología del proyecto: יְהוָה -> ''Yahvé'' correctamente; no hay términos doctrinales problemáticos adicionales. ''los redimidos de Yahvé'' sigue bien la pauta documentada. El único ajuste léxico recomendable es נֶעֱזָבָה -> ''desamparada'' en vez de ''abandonada'', por la rationale del POB sobre el vocabulario restaurador de Isaías.'
  issues:
  - severity: high
    issue: Los marcadores de notas [b] y [c] no corresponden a las mismas unidades semánticas que en el audit trail inglés.
    rationale: En el POB inglés, una nota alternativa acompaña 'Sought Out' y otra acompaña 'a city not forsaken'. En español, [b] quedó en 'Buscada' y [c] en 'ciudad no abandonada', pero además la numeración/orden no refleja el patrón del texto inglés citado ('Sought Out[c][b]'). Debe corregirse para que cada nota ancle en la frase correcta y no induzca confusión editorial.
  - severity: medium
    issue: '''ciudad no abandonada'' es menos afín que ''ciudad no desamparada'' a la decisión léxica y al tema de Isaías.'
    rationale: Aunque 'abandonada' es comprensible, el audit trail prioriza 'forsaken' por su resonancia contextual en Isaías. En español bíblico legible, 'desamparada' conserva mejor esa carga temática sin sonar demasiado arcaico.
  - severity: low
    issue: La nota sobre 'Buscada' introduce formulaciones algo interpretativas.
    rationale: '''Buscada con empeño'' y ''Buscada e indagada'' van más allá de las alternativas inglesas ''Sought After'' / ''Inquired For''. Conviene mantener alternativas más cercanas: ''Buscada'', ''Buscada con afán'' o mejor ''Buscada'' / ''Procurada'' / ''Indagada'' según el límite del audit trail.'
  revised_spanish_text: Y les llamarán[a] «Pueblo santo, los redimidos de Yahvé»; y a ti se te llamará «Buscada[b], ciudad no desamparada[c]».
  revised_footnotes:
