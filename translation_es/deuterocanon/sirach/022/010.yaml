translation:
  language: es
  text: Llora con más dulzura por el difunto[a], porque ha hallado descanso,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'llora más agradablemente/más dulcemente por el difunto'; el adverbio griego comparativo ἥδιον puede expresar 'más dulcemente' o 'más agradablemente', pero aquí probablemente sugiere un llanto más moderado o más suave.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἥδιον
  english_pob_choice: more sweetly
  chosen_spanish: con más dulzura
  alternatives_spanish:
  - más agradablemente
  - con más suavidad
  - más dulcemente
  lexicon: LSJ
  rationale: ἥδιον es un adverbio comparativo de ἡδύς y, según el expediente inglés, puede significar literalmente 'más dulcemente/agradablemente'. En español, 'con más dulzura' conserva esa comparación sin sonar extraña en un contexto de duelo.
- source_word: κλαῦσον
  english_pob_choice: weep
  chosen_spanish: Llora
  alternatives_spanish:
  - Llora de duelo
  - Llora
  - Lamenta
  lexicon: LSJ
  rationale: El aoristo imperativo de κλαίω pide un mandato directo de llorar. 'Llora' es el equivalente natural y claro en español; 'lamenta' sería más interpretativo.
- source_word: ἐπὶ νεκρῷ
  english_pob_choice: over the dead
  chosen_spanish: sobre el muerto
  alternatives_spanish:
  - por el muerto
  - sobre el difunto
  - por el difunto
  lexicon: LSJ
  rationale: La preposición ἐπί con dativo marca aquí el ámbito u objeto del llanto. 'Sobre el muerto' mantiene la imagen espacial y el foco en el doliente, sin añadir vocabulario funerario no explícito.
- source_word: ὅτι
  english_pob_choice: because
  chosen_spanish: porque
  alternatives_spanish:
  - pues
  - ya que
  - puesto que
  lexicon: LSJ
  rationale: '''Porque'' reproduce con claridad la relación causal introducida por ὅτι.'
- source_word: ἀνεπαύσατο
  english_pob_choice: has found rest
  chosen_spanish: ha hallado descanso
  alternatives_spanish:
  - ha descansado
  - ha sido puesto en descanso
  - ha sido sepultado
  lexicon: LSJ
  rationale: El medio de ἀναπαύω/ἀναπαύομαι expresa reposo; 'ha hallado descanso' comunica el estado completado de forma natural en español, sin convertirlo en una afirmación doctrinal más precisa de lo que permite el griego.
theological_decisions:
- issue: La muerte como descanso
  english_pob_reading: Render ἀνεπαύσατο as 'has found rest' without expanding it into a doctrinal statement about the afterlife.
  chosen_spanish_reading: Traducirlo como 'ha hallado descanso', conservando la imagen de reposo sin especificar el estado intermedio ni la resurrección.
  alternative_spanish_readings:
  - ha dormido
  - ha sido puesto en descanso
  - ha partido en paz
  rationale: El versículo usa lenguaje sapiencial de consuelo. La traducción debe preservar esa imagen sin resolverla con una formulación doctrinal posterior que el griego no exige.
  doctrine_reference: Preservar la tensión teológica en vez de resolverla.
translation_notes:
  revision_awareness: El expediente inglés pasó de 'more gently' a 'more sweetly' para reflejar con más precisión ἥδιον; la versión española sigue esa revisión con 'con más dulzura', evitando una lectura meramente modal como 'suavemente' y manteniendo el matiz comparativo.
  spanish_consistency_notes:
  - Se usa 'descanso' para ἀνεπαύσατο, en línea con la decisión inglesa de no forzar 'sepultura' ni un doctrinalismo sobre el más allá.
  - '''Muerto'' se mantiene como equivalente directo de νεκρῷ, sin elevarlo a ''difunto'' porque el verso es conciso y sobrio.'
  - La cadencia imperativa y causal del griego queda reflejada con 'Llora... porque...' sin añadir nexos explicativos.
