translation:
  language: es
  text: Y vino a Judas, y se saludaron mutuamente de manera pacífica[a]; pero los enemigos estaban listos para apoderarse de Judas[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'También: «pacíficamente» o «en paz». El adverbio griego subraya el carácter aparentemente pacífico del encuentro.'
    reason: lexical_alternative
  - marker: b
    text: El verbo griego puede significar «arrebatar» o «apresar súbitamente», destacando la intención traicionera detrás del saludo pacífico.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἦλθεν πρὸς Ἰούδαν
  english_pob_choice: came to Judas
  chosen_spanish: vino a Judas
  alternatives_spanish:
  - fue a Judas
  - se acercó a Judas
  lexicon: LSJ
  rationale: El aoristo de ἔρχομαι con πρός expresa movimiento hacia una persona. «Vino a Judas» conserva el movimiento narrativo con un español natural y sobrio.
- source_word: ἠσπάσαντο ἀλλήλους
  english_pob_choice: they greeted one another
  chosen_spanish: se saludaron mutuamente
  alternatives_spanish:
  - se abrazaron mutuamente
  - se intercambiaron saludos
  lexicon: LSJ
  rationale: ἀσπάζομαι suele significar saludar o dar el saludo. «Se saludaron mutuamente» preserva el sentido básico sin añadir un gesto físico que el verbo no exige.
- source_word: εἰρηνικῶς
  english_pob_choice: peaceably
  chosen_spanish: en paz
  alternatives_spanish:
  - pacíficamente
  - de manera pacífica
  lexicon: LSJ
  rationale: El adverbio describe la manera externa del encuentro. «En paz» es breve y natural en español, y mantiene la tensión irónica con la intención hostil del siguiente miembro.
- source_word: οἱ πολέμιοι
  english_pob_choice: the enemies
  chosen_spanish: los enemigos
  alternatives_spanish:
  - los hostiles
  - sus enemigos
  lexicon: LSJ
  rationale: πολέμιοι como sustantivo designa enemigos o adversarios. «Los enemigos» refleja bien el grupo ya identificado por el contexto y suena natural en español.
- source_word: ἕτοιμοι ἐξαρπάσαι
  english_pob_choice: were ready to seize
  chosen_spanish: estaban listos para prender
  alternatives_spanish:
  - estaban preparados para arrebatar
  - estaban listos para apoderarse de
  lexicon: LSJ
  rationale: ἐξαρπάζω puede implicar arrebatar o apoderarse súbitamente. «Prender» comunica en español la intención de capturarlo de forma repentina, sin perder el matiz de emboscada. "Listos para" conserva ἕτοιμοι con claridad.
translation_notes:
  revision_awareness: Fuente y auditoría inglesa en alta concordancia; no se registran revisiones aplicadas en el pasaje y la propuesta sigue de cerca el griego con equivalencias naturales en español.
  spanish_consistency_notes:
  - Se mantiene «Judas» como nombre propio sin artículo, de acuerdo con el texto fuente.
  - Se usa «en paz» para εἰρηνικῶς, preservando el contraste irónico con la hostilidad del cierre.
  - «Prender» se eligió por su fuerza narrativa de captura súbita; en una nota se conserva la alternativa semántica de «arrebatar/apresar».
