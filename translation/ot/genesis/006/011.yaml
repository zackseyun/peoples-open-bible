theological_decisions:
- issue: Nature of the corruption described
  chosen_reading: Moral corruption of the earth/human society under God's observation
  alternative_readings:
  - Physical ruin of the earth
  rationale: The immediate context emphasizes human wickedness and violence, so the verse is best rendered to reflect moral corruption rather than merely physical devastation. The translation avoids importing a more specific doctrinal claim than the text states.
  doctrine_reference: Translation philosophy §3 (preserve theological tension rather than resolve it)
