theological_decisions:
- issue: Handling the difficult Hebrew phrase מטמנת שקר in light of the Greek parallel ἀπόκρυφος ἀγρυπνία
  chosen_reading: Retain a relatively literal rendering from the Hebrew ('hidden falsehood') while allowing the Greek to inform the surrounding sense of concealed paternal distress.
  alternative_readings:
  - A daughter is a secret sleeplessness to her father
  - A daughter is hidden anxiety to her father
  rationale: The project gives primacy to the Hebrew where extant, but the Greek parallel is to be used as actual translation input. Here the Hebrew is awkward and likely textually difficult; the Greek points to concealed anxiety/sleeplessness. Rather than replace the Hebrew with the Greek's smoother sense in the main text, the draft preserves the Hebrew's opacity and documents the alternative in a footnote.
  doctrine_reference: 'PHILOSOPHY.md: translate from Hebrew where it survives; use Greek parallel as actual input; preserve ambiguity rather than over-resolve.'
