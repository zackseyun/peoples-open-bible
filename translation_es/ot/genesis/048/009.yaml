translation:
  language: es
  text: 'Y José dijo a su padre: «Estos son mis hijos, los que Dios me ha dado aquí[a]». Y él dijo: «Por favor, tráemelos[b], y los bendeciré».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «en este lugar». La expresión hebrea puede apuntar más específicamente al lugar en que José se encuentra.
    reason: lexical_alternative
  - marker: b
    text: O «Llévalos a mí, por favor, para que los bendiga».
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמֶר
  english_pob_choice: And ... said
  chosen_spanish: Entonces ... dijo
  alternatives_spanish:
  - Y ... dijo
  - Luego ... dijo
  lexicon: HALOT
  rationale: El hebreo waw consecutivo marca avance narrativo; en español, «Entonces» mantiene la secuencia sin sonar tan mecánico como un simple calco de «Y», y conserva el tono narrativo sobrio.
- source_word: אָבִיו
  english_pob_choice: his father
  chosen_spanish: su padre
  alternatives_spanish:
  - su papá
  lexicon: HALOT
  rationale: «Su padre» preserva el registro formal y la relación familiar directa del hebreo, sin coloquializar el texto.
- source_word: בָּנַי
  english_pob_choice: my sons
  chosen_spanish: mis hijos
  alternatives_spanish:
  - mis hijos varones
  - mis hijos, los varones
  lexicon: HALOT
  rationale: Aunque el hebreo dice literalmente «mis hijos varones/miembros masculinos», en español «hijos» suele abarcar el mismo referente filial en contexto familiar. Se evita «mis hijos varones» porque suena forzado; el contexto inmediato ya identifica que son varones.
- source_word: הֵם
  english_pob_choice: They are
  chosen_spanish: Estos son
  alternatives_spanish:
  - Ellos son
  lexicon: HALOT
  rationale: La identificación deíctica encaja mejor con «Estos son» en español, porque presenta a los muchachos de manera natural en el momento de señalarlos o introducirlos.
- source_word: אֲשֶׁר נָתַן לִי אֱלֹהִים
  english_pob_choice: whom God has given me
  chosen_spanish: los que Dios me ha dado
  alternatives_spanish:
  - a quienes Dios me ha dado
  - que Dios me dio
  lexicon: HALOT
  rationale: Se conserva el sentido de don divino sin sobrecargar con relativo personal en español. «Me ha dado» sigue bien el valor resultativo del perfecto inglés y la acción pasada con efecto presente.
- source_word: אֱלֹהִים
  english_pob_choice: God
  chosen_spanish: Dios
  alternatives_spanish:
  - el Dios
  lexicon: HALOT
  rationale: Aquí el referente es inequívocamente el Dios de la narración patriarcal; «Dios» es la forma natural y fiel en español.
- source_word: בָּזֶה
  english_pob_choice: here
  chosen_spanish: aquí
  alternatives_spanish:
  - en este lugar
  - en este sitio
  lexicon: HALOT
  rationale: La deixis espacial se expresa de forma idiomática con «aquí». El texto puede apuntar al lugar presente de José; «aquí» preserva esa apertura sin explicar de más.
- source_word: קָחֶם נָא אֵלַי
  english_pob_choice: Please bring them to me
  chosen_spanish: tráemelos, por favor
  alternatives_spanish:
  - tráelos a mí, por favor
  - por favor, tráemelos
  lexicon: HALOT
  rationale: El verbo לקח admite en este contexto la idea de hacer que se acerquen para la bendición; en español, «tráemelos» comunica de manera natural la petición de acercamiento. «Por favor» refleja נָא como cortesía.
- source_word: וַאֲבָרֲכֵם
  english_pob_choice: and I will bless them
  chosen_spanish: para que yo los bendiga
  alternatives_spanish:
  - y los bendeciré
  - y los bendiga
  lexicon: HALOT
  rationale: Tras la petición, el valor final o intencional de la frase se expresa mejor en español con «para que yo los bendiga», que evita forzar un futuro donde el hebreo deja la acción en el marco de la intención del hablante.
theological_decisions:
- issue: Referencia de אֱלֹהִים como donante de los hijos
  english_pob_reading: Singular 'God' referring to the God of Israel as giver of Joseph's sons
  chosen_spanish_reading: «Dios» como el Dios de Israel que ha dado a José a sus hijos
  alternative_spanish_readings:
  - «dioses»
  - «un dios»
  rationale: El contexto patriarcal y la voz de José excluyen una lectura genérica o politeísta. El español debe mantener la referencia singular sin añadir mayúsculas o fórmulas eclesiásticas que oculten el nombre divino cuando no aparece Yahvé explícitamente.
  doctrine_reference: Affirmations; Translation philosophy §1
translation_notes:
  revision_awareness: El pasaje presenta alta concordancia entre los cotejos del flujo inglés y el hebreo, sin revisiones aplicadas en la fuente auditada. La versión española sigue la misma resolución léxica general, pero ajusta la deixis y la intención final para sonar natural en español sin perder el sentido hebreo.
  spanish_consistency_notes:
  - Se mantiene «Dios» para אֱלֹהִים según la práctica POB ya auditada.
  - Se evita «SEÑOR» porque el hebreo usa אֱלֹהִים, no el tetragrámaton.
  - «Bendiga» conserva el valor desiderativo/final del acto pedido.
  - La decisión sobre «hijos» frente a «hijos varones» prioriza claridad idiomática sin perder el referente masculino del hebreo.
