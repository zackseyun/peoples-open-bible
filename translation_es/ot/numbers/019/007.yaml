translation:
  language: es
  text: Entonces el sacerdote lavará sus vestidos y lavará su cuerpo en agua, y después podrá entrar en el campamento; pero el sacerdote quedará impuro[a] hasta la tarde.[b]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Aquí ‘impuro’ se refiere a impureza ritual, no necesariamente a pecado personal ni a culpa moral.
    reason: cultural_note
  - marker: b
    text: 'O: ‘podrá venir al campamento’. El hebreo puede entenderse como autorización para reingresar después del lavado requerido.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְכִבֶּס
  english_pob_choice: shall wash
  chosen_spanish: lavará
  alternatives_spanish:
  - deberá lavar
  - deberá lavarse
  lexicon: HALOT
  rationale: En la instrucción ritual, el valor es prescriptivo. En español, ‘lavará’ conserva el tono procedimental sin cargar el texto con una perífrasis más pesada.
- source_word: בְּגָדָיו
  english_pob_choice: his clothes
  chosen_spanish: sus vestidos
  alternatives_spanish:
  - sus ropas
  - sus prendas
  lexicon: HALOT
  rationale: ‘Vestidos’ mantiene un registro bíblico sobrio y corresponde a la ropa del sacerdote; ‘ropas’ sería posible, pero menos específico en este contexto.
- source_word: הַכֹּהֵן
  english_pob_choice: the priest
  chosen_spanish: el sacerdote
  alternatives_spanish:
  - el sacerdote oficiante
  - el ministro
  lexicon: HALOT
  rationale: En contexto cultual, ‘sacerdote’ es el equivalente directo de כֹּהֵן y es claro para el lector español.
- source_word: וְרָחַץ
  english_pob_choice: bathe
  chosen_spanish: bañará
  alternatives_spanish:
  - lavará
  - se lavará
  lexicon: HALOT
  rationale: Se distingue de ‘lavará sus vestidos’ para evitar repetición y porque el hebreo añade una ablución corporal completa.
- source_word: בְּשָׂרוֹ
  english_pob_choice: his body
  chosen_spanish: su cuerpo
  alternatives_spanish:
  - su carne
  - su cuerpo entero
  lexicon: HALOT
  rationale: Aunque el hebreo dice literalmente ‘su carne’, aquí se refiere al cuerpo de la persona en la ablución ritual. ‘Cuerpo’ comunica la referencia sin perder el sentido ceremonial.
- source_word: בַּמַּיִם
  english_pob_choice: in water
  chosen_spanish: en agua
  alternatives_spanish:
  - con agua
  lexicon: HALOT
  rationale: La construcción natural en español con ‘bañar’ es ‘en agua’; refleja bien el medio de la ablución.
- source_word: וְאַחַר
  english_pob_choice: afterward
  chosen_spanish: y después
  alternatives_spanish:
  - después
  - luego
  lexicon: HALOT
  rationale: Marca secuencia ritual de forma clara y natural en español.
- source_word: יָבֹא אֶל־הַמַּחֲנֶה
  english_pob_choice: he may come into the camp
  chosen_spanish: podrá entrar en el campamento
  alternatives_spanish:
  - podrá volver al campamento
  - podrá venir al campamento
  lexicon: HALOT
  rationale: El hebreo permite la reentrada tras la purificación requerida. ‘Podrá entrar’ expresa autorización, y ‘campamento’ conserva el marco narrativo del desierto.
- source_word: וְטָמֵא
  english_pob_choice: shall be unclean
  chosen_spanish: quedará impuro
  alternatives_spanish:
  - será impuro
  - quedará ritualmente impuro
  lexicon: HALOT
  rationale: ‘Impuro’ reproduce טמא en sentido ritual. ‘Quedará’ refleja el estado resultante, no una acción moral.
- source_word: עַד הָעָרֶב
  english_pob_choice: until evening
  chosen_spanish: hasta el anochecer
  alternatives_spanish:
  - hasta la tarde
  - hasta el atardecer
  lexicon: HALOT
  rationale: ‘Anochecer’ es una equivalencia natural y precisa para el cierre del día en español bíblico contemporáneo; evita la ambigüedad de ‘tarde’.
theological_decisions:
- issue: Impureza ritual vs. culpa moral
  english_pob_reading: ritual uncleanness, not moral guilt
  chosen_spanish_reading: impuro en sentido ritual, no culpable moralmente
  alternative_spanish_readings:
  - ritualmente impuro
  - contaminado ceremonialmente
  rationale: Siguiendo la nota inglesa, ‘impuro’ se entiende aquí como estado cultual temporal por contacto ritual, no como pecado o inmoralidad. No se añade explicación al texto principal, pero se preserva la distinción en la nota.
  doctrine_reference: Levítico 11–15; Números 19
translation_notes:
  revision_awareness: La base inglesa revisó ‘until the evening’ a ‘until evening’ por naturalidad; en español se optó por ‘hasta el anochecer’, una equivalencia igualmente natural que preserva el cierre del periodo diurno y evita una formulación demasiado literal. Se mantuvo la lógica procedimental y la distinción entre lavado de vestidos y baño corporal.
  spanish_consistency_notes:
  - Se usó ‘sacerdote’ para כֹּהֵן y ‘campamento’ para מַחֲנֶה de forma consistente con el registro cultual y narrativo.
  - Se evitó ‘SEÑOR’ u otra máscara nominal porque este versículo no contiene el nombre divino.
  - ‘Impuro’ se reservó para טָמֵא en su sentido ritual, siguiendo la política terminológica del proyecto.
  - ‘Bañará su cuerpo’ conserva la diferencia entre lavar prendas y realizar ablución corporal.
