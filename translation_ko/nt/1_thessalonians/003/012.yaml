id: 1TH.3.12
reference: 1 Thessalonians 3:12
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: ὑμᾶς δὲ ὁ κύριος πλεονάσαι καὶ περισσεύσαι τῇ ἀγάπῃ εἰς ἀλλήλους καὶ εἰς πάντας, καθάπερ καὶ ἡμεῖς εἰς ὑμᾶς,
base_translation:
  language: en
  yaml_path: translation/nt/1_thessalonians/003/012.yaml
  text: And may the Lord cause you to increase and abound in love for one another and for all[a], just as we also do for you[b],
  footnotes:
  - marker: a
    text: Or 'toward one another and toward all.'
    reason: lexical_alternative
  - marker: b
    text: The final clause is elliptical in Greek, literally 'just as also we toward you,' with the sense supplied from the previous phrase.
    reason: lexical_alternative
translation:
  language: ko
  text: 또 주께서 우리가 여러분에게 그러하듯이[b], 여러분이 서로와 모든 사람을 향한[a] 사랑에서 자라나고 넘쳐 흐르게 해 주시기를 빕니다.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 또는 「서로에게와 모든 사람에게」.
    reason: lexical_alternative
  - marker: b
    text: 마지막 절은 헬라어로 생략적(직역 「우리가 여러분에게 그러한 것과 마찬가지로」)이며, 앞 절에서 의미를 보충한다.
    reason: lexical_alternative
lexical_decisions:
- source_word: πλεονάσαι καὶ περισσεύσαι
  english_pob_choice: cause you to increase and abound
  chosen_korean: 자라나고 넘쳐 흐르게
  alternatives_korean:
  - 풍성하게 하고 넘치게
  - 더하게 하고 넘쳐 흐르게
  lexicon: BDAG
  rationale: πλεονάζω와 περισσεύω의 두 동사를 「자라나다·넘치다」 두 한국어 동사로 구분한다. 「자라남」이 점진적 증가를, 「넘쳐 흐름」이 풍성한 결과를 담는다.
- source_word: τῇ ἀγάπῃ εἰς ἀλλήλους καὶ εἰς πάντας
  english_pob_choice: in love for one another and for all
  chosen_korean: 서로와 모든 사람을 향한 사랑에서
  alternatives_korean:
  - 서로에 대한 사랑과 모든 이를 향한 사랑에서
  - 서로 간의 사랑과 만인을 향한 사랑에서
  lexicon: BDAG
  rationale: εἰς의 방향성을 「향한」으로 보존한다. 한국 교회 전통의 「서로」 어휘를 활용한다.
