translation:
  language: es
  text: Josué y todo Israel con él pasaron de Laquis a Eglón; y acamparon contra ella y pelearon contra ella.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: וַיַּעֲבֹר
  english_pob_choice: passed on
  chosen_spanish: pasó
  alternatives_spanish:
  - siguió adelante
  - pasó de largo
  lexicon: HALOT
  rationale: En este contexto narrativo de avance militar entre ciudades, «pasó» comunica el movimiento sin añadir la idea específica de cruzar una frontera o un obstáculo. Mantiene la fluidez del español y sigue de cerca la decisión inglesa de no especificar más de lo que el hebreo requiere.
- source_word: עִמּוֹ
  english_pob_choice: with him
  chosen_spanish: con él
  alternatives_spanish:
  - junto con él
  lexicon: HALOT
  rationale: La construcción comitativa se expresa de forma natural en español con «con él». Conserva la referencia a Josué como líder acompañado por todo Israel.
- source_word: מִלָּכִישׁ
  english_pob_choice: from Lachish
  chosen_spanish: de Laquis
  alternatives_spanish:
  - desde Laquis
  lexicon: HALOT
  rationale: La preposición marca el punto de partida de la campaña. «De Laquis» es la formulación más directa y natural en español para este desplazamiento.
- source_word: עֶגְלֹנָה
  english_pob_choice: to Eglon
  chosen_spanish: a Eglón
  alternatives_spanish:
  - hacia Eglón
  lexicon: HALOT
  rationale: El sufijo direccional se expresa con «a» en español. «A Eglón» conserva la dirección del movimiento sin sobreinterpretar el matiz como simple aproximación.
- source_word: וַיַּחֲנוּ
  english_pob_choice: they camped
  chosen_spanish: acamparon
  alternatives_spanish:
  - acamparon allí
  - se establecieron en campamento
  lexicon: HALOT
  rationale: El verbo de acampar en un contexto bélico se traduce con el verbo simple «acamparon», que es claro y fiel sin la marcación algo más literaria de «encamparon».
- source_word: עָלֶיהָ
  english_pob_choice: against it
  chosen_spanish: contra ella
  alternatives_spanish:
  - frente a ella
  - junto a ella
  lexicon: HALOT
  rationale: Con חנה en un contexto de asedio, la preposición indica posicionamiento hostil. En español, «contra ella» reproduce bien ese sentido sin neutralizarlo.
- source_word: וַיִּלָּחֲמוּ
  english_pob_choice: fought
  chosen_spanish: pelearon
  alternatives_spanish:
  - combatieron
  - hicieron guerra
  lexicon: HALOT
  rationale: El verbo expresa combate real; «pelearon» es natural y claro en español moderno. Se evita «hicieron guerra» por sonar más explicativo y menos inmediato en esta línea narrativa.
- source_word: וְכָל יִשְׂרָאֵל
  english_pob_choice: and all Israel
  chosen_spanish: y todo Israel
  alternatives_spanish:
  - y todo el Israel
  lexicon: HALOT
  rationale: La designación colectiva se conserva de manera literal y comprensible. En español bíblico moderno, «todo Israel» funciona bien para el conjunto del pueblo/cuerpo militar.
translation_notes:
  revision_awareness: 'La versión inglesa auditada ya fue marcada como sin cambios necesarios (latest_revision_pass: unchanged=true; cross_check_summary: high_agreement). No se introducen notas textuales ni alternativas adicionales porque el hebreo y la decisión inglesa son directos y no presentan tensión lexical o teológica relevante en este versículo.'
  spanish_consistency_notes:
  - Se mantiene «Laquis» y «Eglón» como formas toponímicas usuales en español bíblico.
  - Se preserva el tono narrativo militar con verbos simples y directos.
  - No se usa «encamparon» ni «lucharon» porque «acamparon» y «pelearon» reflejan mejor la decisión inglesa y el español contemporáneo.
  - 'La secuencia verbal mantiene el orden del hebreo: movimiento, llegada, campamento y combate.'
