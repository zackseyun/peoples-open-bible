translation:
  language: es
  text: 'Por tanto, así dice el Señor Yahvé: Sus caídos[a], a quienes han puesto en medio de ella, ellos son la carne[b], y ella es la olla; pero a ustedes los sacaré de en medio de ella.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'sus muertos violentamente'. El hebreo חַלְלֵיכֶם se refiere a personas muertas por herida o violencia, no solo a los muertos en general.
    reason: lexical_alternative
  - marker: b
    text: O 'la vianda'. El hebreo בָּשָׂר puede significar 'carne' o, en esta metáfora de cocina, la carne como alimento dentro de la olla.
    reason: lexical_alternative
lexical_decisions:
- source_word: אֲדֹנָי יְהוִה
  english_pob_choice: Lord Yahweh
  chosen_spanish: Señor Yahvé
  alternatives_spanish:
  - el Señor Yahvé
  - Señor Dios
  lexicon: HALOT
  rationale: El hebreo combina el título soberano אֲדֹנָי con el nombre divino יְהוִה. En español, 'Señor Yahvé' conserva ambos elementos sin ocultar el nombre propio del pacto. 'Señor Dios' atenúa el nombre; 'el Señor Yahvé' es posible, pero la forma sin artículo suena más directa en esta fórmula profética.
- source_word: חַלְלֵיכֶם
  english_pob_choice: your slain
  chosen_spanish: vuestros muertos
  alternatives_spanish:
  - vuestros caídos
  - vuestros asesinados
  - vuestros cadáveres
  lexicon: HALOT
  rationale: חַלְלֵיכֶם designa a los que han sido heridos mortalmente o muertos violentamente. 'Vuestros muertos' es natural en español y mantiene la referencia a personas fallecidas; 'vuestros asesinados' intensifica demasiado, y 'cadáveres' desplaza el foco humano del oráculo. Se conserva la tensión de que son muertos por violencia, aunque en español no se explicita con un adjetivo pesado.
- source_word: בָּשָׂר
  english_pob_choice: meat
  chosen_spanish: la carne
  alternatives_spanish:
  - la carne (como carne para comer)
  - la comida
  - la carne de comer
  lexicon: HALOT
  rationale: El POB inglés eligió 'meat' para la metáfora culinaria. En español, 'carne' cubre mejor tanto el sentido físico como el de alimento y evita un término más estrecho o marcado regionalmente. Así se preserva el juego imagético de la olla sin forzar una glosa explicativa en el texto principal.
- source_word: הַסִּיר
  english_pob_choice: the pot
  chosen_spanish: la olla
  alternatives_spanish:
  - la olla de cocinar
  - el caldero
  - la marmita
  lexicon: HALOT
  rationale: '''סִיר'' nombra un recipiente de cocina. ''Olla'' es el equivalente más natural y claro en español moderno, y encaja bien con la imagen doméstica del oráculo. ''Caldero'' suena más arcaico o épico; ''marmita'' es menos común.'
- source_word: הוֹצִיא
  english_pob_choice: I will bring out
  chosen_spanish: os sacaré
  alternatives_spanish:
  - os haré salir
  - os llevaré fuera
  - os traeré fuera
  lexicon: HALOT
  rationale: Aunque el hebreo es causativo en tercera persona, el discurso profético introduce la voz directa de Yahvé; por eso el español usa primera persona. 'Sacar' reproduce bien el movimiento fuera del recipiente metafórico y suena natural en castellano bíblico contemporáneo.
- source_word: בְּתוֹכָהּ / מִתּוֹכָהּ
  english_pob_choice: in its midst / from its midst
  chosen_spanish: en medio de ella / de en medio de ella
  alternatives_spanish:
  - dentro de ella / de dentro de ella
  - en su interior / de su interior
  lexicon: HALOT
  rationale: '''En medio de ella'' conserva el valor espacial y figurado de תּוֹךְ mejor que un simple ''dentro''. ''De en medio de ella'' mantiene el paralelismo del hebreo y el contraste entre estar contenido y ser extraído.'
theological_decisions:
- issue: Representación del nombre divino en la fórmula אֲדֹנָי יְהוִה
  english_pob_reading: Lord Yahweh
  chosen_spanish_reading: Señor Yahvé
  alternative_spanish_readings:
  - Yahvé
  - Señor Dios
  rationale: El POB actualiza el tetragrámaton como 'Yahweh/Yahvé' en lugar de enmascararlo con 'SEÑOR'. En español, 'Señor Yahvé' refleja ese criterio y conserva la solemnidad profética. Se evita 'Señor Dios' porque perdería el nombre propio revelado.
  doctrine_reference: 'DOCTRINE.md: YHWH → Yahvé; preservar el nombre del pacto'
- issue: Metáfora de la carne y la olla
  english_pob_reading: they are the meat, and it is the pot
  chosen_spanish_reading: ellos son la carne, y ella es la olla
  alternative_spanish_readings:
  - ellos son la carne, y ella es el pot
  - ellos son la carne, y ella es el recipiente
  rationale: La traducción mantiene la imagen sin explicarla. El texto responde al proverbio previo de Jerusalén como olla y los líderes asesinados como contenido; por eso conviene no suavizar la metáfora. 'Carne' en español conserva el vínculo con el alimento y la violencia corporal del contexto.
  doctrine_reference: 'DOCTRINE.md Translation philosophy §3: preservar la tensión metafórica'
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión más reciente del POB en inglés, que sustituyó 'the Lord GOD' por 'Lord Yahweh' para reflejar el nombre divino. La versión española sigue ese mismo principio y evita la máscara tradicional 'SEÑOR'. También se conservó la metáfora de la olla/carne sin interpretarla, conforme al historial de decisiones del texto fuente.
  spanish_consistency_notes:
  - Se usa 'Yahvé' para יְהוִה conforme al estándar del proyecto.
  - Se optó por 'carne' en lugar de 'carne/flesh' calco o de 'comida' por claridad e ինտelligibilidad bíblica.
  - '''Olla'' resulta más natural que ''caldero'' en español moderno y mantiene la imagen doméstica del pasaje.'
  - La sintaxis 'de en medio de ella' refleja el paralelismo de בְּתוֹכָהּ / מִתּוֹכָהּ.
