    issue: «en primer lugar» para בָּרִאשֹׁנָה
    rationale: El hebreo aquí señala la primera partida/inicio inaugural, no simplemente prioridad en una lista. «En primer lugar» en español normalmente denota orden lógico o enumerativo, y debilita el sentido narrativo de «por primera vez» documentado en el POB inglés.
  - severity: low
    issue: «salieron» es aceptable pero algo genérico
    rationale: Aunque comunica movimiento inicial, «partieron» encaja mejor con el contexto de campamento y desplazamiento ordenado. No es un error grave, pero mejora la precisión narrativa.
  revised_spanish_text: Así partieron por primera vez, conforme al mandato de Yahvé, por medio de Moisés[a].
