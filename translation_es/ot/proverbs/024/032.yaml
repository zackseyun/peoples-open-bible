    issue: «puse mi corazón» es demasiado literal y poco idiomático
    rationale: Aunque reproduce la forma hebrea, en español no comunica naturalmente el sentido de atender, considerar e interiorizar. La propia auditoría inglesa documenta que la literalidad necesita nota, no texto principal.
  - severity: low
    issue: La nota al pie a repite exactamente la redacción del texto principal
    rationale: Si el texto principal cambia a una opción idiomática, la nota puede conservar la alternativa literal documentada por la POB inglesa, cumpliendo mejor la función de nota léxica.
