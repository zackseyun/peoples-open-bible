    text: O «se humillarán» o «se negarán a sí mismos». El modismo hebreo se refiere a la autoaflicción en una observancia penitencial, tradicionalmente asociada con el ayuno.
    reason: lexical_alternative
  - marker: b
    text: Literalmente, «de anochecer a anochecer», marcando la observancia según el cómputo israelita del día.
    reason: cultural_note
  revision_rationale: La revisión corrige el principal problema de fidelidad y naturalidad reemplazando «afligirán sus vidas» por el reflexivo idiomático «se afligirán», en línea con el hebreo y con la justificación del POB inglés sobre נַפְשֹׁתֵיכֶם como reflexivo. También reubica las notas para preservar las alternativas léxicas significativas documentadas por el expediente inglés y mantener la nota cultural sobre «de anochecer a anochecer».
