revisions:
- from: Vístete[a], Jerusalén, de las vestiduras de tu gloria; prepara tu manto santo[b], porque Dios ha hablado cosas buenas a Israel para siempre y aún más[c].
  to: Vístete, Jerusalén, de las vestiduras de tu gloria; prepara tu túnica sagrada[a], porque Dios ha hablado cosas buenas a Israel por siempre jamás[b].
  rationale: Se reubicó la nota léxica al sintagma correcto de la prenda sagrada, se mejoró στολή como «túnica» y τοῦ ἁγιάσματός σου como «sagrada», y se reemplazó el final poco idiomático «para siempre y aún más» por «por siempre jamás», que preserva el sentido durativo en un español bíblico natural y concuerda con la revisión auditada del English POB.
