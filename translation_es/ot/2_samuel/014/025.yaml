translation:
  language: es
  text: Ahora bien, Absalón[a] no tenía en todo Israel ningún rival por ser tan apuesto, tan alabado; desde la planta de su pie hasta la coronilla de su cabeza no había en él defecto.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «grandemente alabado» o «alabado en gran manera». La expresión hebrea לְהַלֵּל מְאֹד indica el grado excepcional de alabanza que recibía Absalón por su apariencia.
    reason: lexical_alternative
lexical_decisions:
- source_word: וּכְאַבְשָׁלוֹם
  english_pob_choice: Now ... Absalom
  chosen_spanish: Ahora bien, Absalón
  alternatives_spanish:
  - Y en cuanto a Absalón
  - Ahora Absalón
  lexicon: HALOT
  rationale: La partícula inicial introduce un nuevo foco discursivo sobre Absalón. «Ahora bien» comunica el cambio de enfoque con naturalidad en español sin perder el valor de transición.
- source_word: לֹא הָיָה אִישׁ יָפֶה
  english_pob_choice: there was not a man as handsome
  chosen_spanish: no había un hombre tan apuesto
  alternatives_spanish:
  - no había un hombre tan hermoso
  - no había un hombre tan bello
  lexicon: HALOT
  rationale: 'La construcción expresa comparación superlativa: nadie en Israel igualaba la apariencia de Absalón. «Tan apuesto» transmite esa comparación de modo natural para un varón, sin volverla más abstracta de lo que exige el hebreo.'
- source_word: יָפֶה
  english_pob_choice: handsome
  chosen_spanish: apuesto
  alternatives_spanish:
  - hermoso
  - bello
  - atractivo
  lexicon: HALOT
  rationale: Para un sujeto masculino, «apuesto» es la equivalencia más idiomática y digna en español. Evita la posible ambigüedad de «hermoso/bello», aunque esas formas también serían posibles.
- source_word: בְּכָל יִשְׂרָאֵל
  english_pob_choice: in all Israel
  chosen_spanish: en todo Israel
  alternatives_spanish:
  - por todo Israel
  - en todo el pueblo de Israel
  lexicon: HALOT
  rationale: La frase indica extensión nacional total. «En todo Israel» conserva la amplitud geográfica y comunitaria del hebreo sin añadir matices ajenos.
- source_word: לְהַלֵּל מְאֹד
  english_pob_choice: so highly praised
  chosen_spanish: tan sumamente alabado
  alternatives_spanish:
  - muy alabado
  - grandemente alabado
  - altamente alabado
  lexicon: HALOT
  rationale: La expresión combina la idea de alabanza con un grado intensivo excepcional. «Sumamente alabado» mantiene ese énfasis; el adverbio «tan» enlaza con la comparación previa y reproduce bien la fuerza del hebreo.
- source_word: מִכַּף רַגְלוֹ
  english_pob_choice: from the sole of his foot
  chosen_spanish: desde la planta de su pie
  alternatives_spanish:
  - desde la suela de su pie
  - desde la planta del pie
  lexicon: HALOT
  rationale: כַּף con רֶגֶל designa la planta o suela del pie. «Planta de su pie» es claro y natural en español; conserva el valor de merismo corporal sin sonar técnico.
- source_word: וְעַד קָדְקֳדוֹ
  english_pob_choice: to the crown of his head
  chosen_spanish: hasta la coronilla de su cabeza
  alternatives_spanish:
  - hasta la parte superior de su cabeza
  - hasta la coronilla
  lexicon: HALOT
  rationale: קָדְקֹד señala la parte superior/coronilla de la cabeza. «Coronilla» transmite bien la imagen de totalidad corporal y resulta idiomático en español.
- source_word: לֹא הָיָה בוֹ מוּם
  english_pob_choice: there was no blemish in him
  chosen_spanish: no había en él defecto
  alternatives_spanish:
  - no había en él mancha
  - no tenía defecto alguno
  lexicon: HALOT
  rationale: מוּם puede referir a defecto físico o falta corporal. «Defecto» preserva el sentido de imperfección física sin forzar una lectura moral; se evita «mancha» por ser menos preciso aquí.
translation_notes:
  revision_awareness: 'La redacción sigue de cerca el audit trail inglés de la POB y mantiene la misma decisión interpretativa básica: énfasis en la comparación superlativa, en la alabanza excepcional y en la merisma corporal de «pie» a «cabeza». No se registran revisiones posteriores con cambios sustantivos.'
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando el texto lo requiera; este versículo no lo contiene.
  - Se conserva «Absalón» como forma castellana estable del nombre propio.
  - Se prefirió un registro bíblico moderno y digno, evitando calcos como «hombre hermoso» que podrían sonar menos naturales para un sujeto masculino.
  - «Defecto» mantiene la neutralidad física del hebreo מוּם sin introducir juicio moral.
