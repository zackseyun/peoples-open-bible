translation:
  language: es
  text: Revistió veinte codos en la parte trasera de la casa con tablas de cedro[a], desde el piso hasta las paredes, y construyó dentro de ella un santuario interior[c][b], como el Lugar Santísimo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «desde el piso hasta las vigas»; el texto hebreo dice «hasta las paredes», y eso es lo que se conserva aquí.'
    reason: alternative_reading
  - marker: b
    text: Hebreo debir, el santuario interior del templo.
    reason: cultural_note
  - marker: c
    text: 'Traducción tradicional: «Santo de los Santos».'
    reason: lexical_alternative
lexical_decisions:
- source_word: מִירְכְּתֵי הַבַּיִת
  english_pob_choice: at the rear of the house
  chosen_spanish: en la parte trasera de la casa
  alternatives_spanish:
  - en el fondo de la casa
  - en la parte posterior de la casa
  lexicon: HALOT
  rationale: La expresión hebrea señala la zona remota o posterior del edificio. En español, 'parte trasera' comunica con naturalidad esa ubicación sin perder el sentido espacial del hebreo.
- source_word: בְּצַלְעוֹת אֲרָזִים
  english_pob_choice: with cedar boards
  chosen_spanish: con tablas de cedro
  alternatives_spanish:
  - con paneles de cedro
  - con maderas laterales de cedro
  - con listones de cedro
  lexicon: HALOT
  rationale: El término puede referirse a elementos laterales, costillas o tablas según el contexto arquitectónico. Aquí la función constructiva dentro del templo hace que 'tablas de cedro' sea una opción clara y fiel en español.
- source_word: מִן הַקַּרְקַע עַד הַקִּירוֹת
  english_pob_choice: from the floor to the walls
  chosen_spanish: desde el piso hasta las paredes
  alternatives_spanish:
  - desde el suelo hasta las paredes
  - del piso hasta las paredes
  - desde el piso hasta las vigas
  lexicon: HALOT
  rationale: El texto masorético dice literalmente 'hasta las paredes', y se conserva esa lectura principal. 'Piso'/'paredes' suena natural en español y mantiene la dificultad arquitectónica del hebreo sin emendarla.
- source_word: וַיִּבֶן לוֹ מִבַּיִת
  english_pob_choice: and he built it within
  chosen_spanish: y la edificó por dentro
  alternatives_spanish:
  - y la construyó dentro
  - y la edificó en el interior
  lexicon: HALOT
  rationale: El hebreo es compacto y alude a la construcción de un espacio interior. 'Por dentro' expresa esa interioridad de forma idiomática y sin añadir contenido no sustentado.
- source_word: לִדְבִיר
  english_pob_choice: as an inner sanctuary
  chosen_spanish: como un santuario interior
  alternatives_spanish:
  - como el santuario interior
  - como el recinto interior
  - como el debir
  lexicon: HALOT
  rationale: '''Debir'' es un tecnicismo arquitectónico-cultual del templo. ''Santuario interior'' transmite su función sin transliterarlo, manteniendo el sentido del lugar más interno.'
- source_word: לְקֹדֶשׁ הַקֳּדָשִׁים
  english_pob_choice: as the Most Holy Place
  chosen_spanish: como el Lugar Santísimo
  alternatives_spanish:
  - como el Lugar Más Santo
  - como el Santísimo
  - como el Santo de los Santos
  lexicon: HALOT
  rationale: En español bíblico 'Lugar Santísimo' es claro y tradicionalmente comprensible para el superlativo cultual del hebreo. Conserva la idea de la máxima santidad del recinto.
- source_word: עֶשְׂרִים אַמָּה
  english_pob_choice: twenty cubits
  chosen_spanish: veinte codos
  alternatives_spanish:
  - veinte cubitos
  - unos diez metros
  - veinte codos de longitud
  lexicon: HALOT
  rationale: Se mantiene la unidad antigua 'codos' para ser fiel al texto fuente y evitar una conversión innecesaria en el texto principal.
theological_decisions:
- issue: Traducción del recinto final del templo y su jerarquía de santidad
  english_pob_reading: inner sanctuary ... the Most Holy Place
  chosen_spanish_reading: santuario interior ... Lugar Santísimo
  alternative_spanish_readings:
  - recinto interior ... Santo de los Santos
  - santuario interior ... Santísimo
  rationale: La sección describe el espacio más interno del templo con un término técnico y luego su designación superlativa. 'Santuario interior' y 'Lugar Santísimo' reproducen esa progresión sin suavizar la distinción cultual.
  doctrine_reference: 1 Reyes 6:16; Éxodo 26:33-34; 1 Reyes 8:6
- issue: Conservación de la dificultad arquitectónica en 'hasta las paredes'
  english_pob_reading: The Hebrew text reads 'to the walls,' which is retained here.
  chosen_spanish_reading: desde el piso hasta las paredes
  alternative_spanish_readings:
  - desde el piso hasta las vigas
  - desde el suelo hasta el techo
  rationale: El hebreo masorético presenta una expresión arquitectónicamente difícil. Se conserva la lectura base en lugar de armonizarla con una reconstrucción probable, para no borrar la tensión textual documentada.
  doctrine_reference: Principio de fidelidad textual / crítica textual del MT
- issue: Terminología cultual tradicional para 'Holy of Holies'
  english_pob_reading: 'Traditional rendering: ''the Holy of Holies.'''
  chosen_spanish_reading: Lugar Santísimo
  alternative_spanish_readings:
  - Santo de los Santos
  - Santísimo
  rationale: '''Lugar Santísimo'' comunica bien en español la función del superlativo hebreo y es un equivalente reverente y transparente. Se evita una fórmula demasiado litúrgica si no aporta más claridad.'
  doctrine_reference: Hebreos 9:2-3; Éxodo 26:33
translation_notes:
  revision_awareness: 'El texto sigue de cerca el análisis del POB en inglés y mantiene la lectura masorética de קִירוֹת (‘paredes’) en el texto principal. Se preserva la progresión espacial y cultual del hebreo: parte trasera de la casa -> santuario interior -> Lugar Santísimo. No se realizaron revisiones sustanciales respecto al audit trail inglés, salvo la adaptación idiomática natural al español.'
  spanish_consistency_notes:
  - Se usa 'codos' para la unidad hebrea אַמָּה, coherente con la práctica bíblica estándar.
  - Se evita 'SEÑOR' para el nombre divino porque este versículo no contiene el Tetragrámaton ni un sustituto griego relevante.
  - '''Lugar Santísimo'' se reserva para la equivalencia cultual del superlativo hebreo y no se mezcla con ''santo'' en sentido general.'
  - '''Santuario interior'' y ''Lugar Santísimo'' se distinguen para reflejar la estructura de doble designación del final del verso.'
