translation:
  language: es
  text: Y ahora, nuestro Dios, escucha la oración de tu siervo y sus súplicas por misericordia, y haz resplandecer tu rostro sobre tu santuario desolado, por causa del Señor[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, “por tu propia causa, Señor”. El hebreo dice “por causa del Señor”, con un título divino en tercera persona dentro de una oración dirigida a Dios.
    reason: theological_note
lexical_decisions:
- source_word: וְעַתָּה
  english_pob_choice: And now
  chosen_spanish: Y ahora
  alternatives_spanish:
  - Ahora
  lexicon: HALOT
  rationale: Mantiene la función discursiva y el matiz de continuidad del ו inicial con el adverbio temporal. En español, 'Y ahora' suena natural y conserva el enlace oracional.
- source_word: שְׁמַע
  english_pob_choice: hear
  chosen_spanish: escucha
  alternatives_spanish:
  - oye
  - escucha atentamente
  lexicon: HALOT
  rationale: En una súplica directa a Dios, 'escucha' comunica bien la petición sin sonar mecánico. Conserva el valor de recepción de la oración.
- source_word: אֱלֹהֵינוּ
  english_pob_choice: our God
  chosen_spanish: nuestro Dios
  alternatives_spanish:
  - Dios nuestro
  lexicon: HALOT
  rationale: Refleja el sufijo de primera persona plural y el tono pactual de la invocación.
- source_word: תְּפִלַּת עַבְדְּךָ
  english_pob_choice: the prayer of your servant
  chosen_spanish: la oración de tu siervo
  alternatives_spanish:
  - la oración de tu esclavo
  - la plegaria de tu siervo
  lexicon: HALOT
  rationale: '''Siervo'' es la forma más natural en español para esta fórmula de humillación reverente ante Dios. Aunque ''esclavo'' sería más fuerte lexicalmente, aquí el contexto de oración dirigida a Dios favorece ''siervo'' como equivalente idiomático documentado por el uso devocional.'
- source_word: תַּחֲנוּנָיו
  english_pob_choice: his pleas for mercy
  chosen_spanish: sus súplicas
  alternatives_spanish:
  - sus súplicas de misericordia
  - sus ruegos
  lexicon: HALOT
  rationale: '''תַּחֲנוּנִים'' expresa ruegos intensos, humildes y suplicantes. ''Súplicas'' preserva el registro formal y permite evitar una expansión interpretativa innecesaria, aunque ''súplicas de misericordia'' explicita la fuerza semántica.'
- source_word: וְהָאֵר פָּנֶיךָ
  english_pob_choice: cause your face to shine
  chosen_spanish: haz resplandecer tu rostro
  alternatives_spanish:
  - causa que tu rostro resplandezca
  - haz que tu rostro resplandezca
  lexicon: HALOT
  rationale: '''Haz resplandecer'' reproduce bien el causativo y conserva la imagen bíblica de favor divino. ''Rostro'' traduce פָּנִים de manera directa y solemne.'
- source_word: עַל מִקְדָּשְׁךָ
  english_pob_choice: upon your desolate sanctuary
  chosen_spanish: sobre tu santuario desolado
  alternatives_spanish:
  - sobre tu santuario devastado
  - sobre tu lugar santo desolado
  lexicon: HALOT
  rationale: '''Santuario'' preserva el alcance de מִקְדָּשׁ mejor que ''templo''. ''Desolado'' reproduce el estado ruinoso indicado por הַשָּׁמֵם sin exagerar el término.'
- source_word: הַשָּׁמֵם
  english_pob_choice: desolate
  chosen_spanish: desolado
  alternatives_spanish:
  - arruinado
  - devastado
  lexicon: HALOT
  rationale: Adjetivo sobrio y preciso para el estado del santuario. Mantiene el valor descriptivo del hebreo sin convertirlo en una explicación extensa.
- source_word: לְמַעַן אֲדֹנָי
  english_pob_choice: for the Lord’s sake
  chosen_spanish: por amor del Señor
  alternatives_spanish:
  - por causa del Señor
  - por el Señor mismo
  - por amor de Yahvé
  lexicon: HALOT
  rationale: La construcción hebrea conserva una referencia en tercera persona a un título divino dentro de una oración directa. 'Por amor del Señor' comunica la motivación/basis en español y deja visible el carácter reverente de la expresión, sin suavizar la tensión pragmática del original.
theological_decisions:
- issue: Referencia divina en tercera persona dentro de una oración directa
  english_pob_reading: for the Lord’s sake
  chosen_spanish_reading: por amor del Señor
  alternative_spanish_readings:
  - por causa del Señor
  - por amor de ti, Señor
  rationale: El hebreo dice literalmente 'por causa de Adonay', manteniendo el título en forma no pronominal aun cuando Daniel se dirige a Dios en segunda persona. En español, 'por amor del Señor' conserva la idea de motivación fundada en el Señor y permite no ocultar la estructura retórica del original.
  doctrine_reference: Translation philosophy §1, §3; tratamiento de títulos divinos y conservación de tensiones textuales
translation_notes:
  revision_awareness: La redacción sigue la revisión más reciente del inglés POB al preferir una equivalencia más formal de וְהָאֵר פָּנֶיךָ como 'haz resplandecer tu rostro' y al mantener 'santuario desolado' como adjetivo atributivo. También conserva la decisión auditada de no suavizar la referencia final de לְמַעַן אֲדֹנָי, dejando visible la tensión de tercera persona en un discurso directo.
  spanish_consistency_notes:
  - Se mantiene 'Dios' para אֱלֹהִים y 'Señor' para אֲדֹנָי en la nota final, evitando mezclar con 'Yahvé' donde el texto fuente no lo usa aquí.
  - '''Siervo'' se emplea por el registro orante y reverente del pasaje; no se introduce ''esclavo'' porque el contexto no requiere la fuerza social de δοῦλος.'
  - '''Santuario'' se conserva para מִקְדָּשׁ por su amplitud semántica y para evitar estrechar el término a ''templo'' únicamente.'
