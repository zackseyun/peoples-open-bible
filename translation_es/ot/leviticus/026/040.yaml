review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien la estructura y el sentido general del hebreo: confesión de la propia iniquidad y la de sus padres, la infidelidad pactal contra Dios, y la conducta opositora expresada por בְּקֶרִי. Conserva correctamente la dimensión corporativa y el vínculo léxico entre מַעַל y מָעֲלוּ. Sin embargo, dos giros del español necesitan ajuste para fidelidad idiomática y precisión: ''fueron infieles contra mí'' suena poco natural en español bíblico y puede distorsionar la relación marcada por בִּי; y ''anduvieron contrariamente a mí'' es un calco torpe de ''walked contrary to me''.'
  spanish_quality_summary: 'El texto es mayormente claro y digno, pero presenta calcos que reducen la naturalidad: ''fueron infieles contra mí'' y ''anduvieron contrariamente a mí''. Una redacción como ''me fueron infieles'' y ''anduvieron en oposición a mí'' mantiene mejor el sentido y resulta más legible para un español eclesial amplio. La nota b ya justifica una alternativa hostil/opositora y apoya ese ajuste.'
  glossary_alignment: No hay conflicto con la terminología base del proyecto. 'Iniquidad' e 'infidelidad' están bien elegidas. No aparecen términos sensibles como Yahvé, Mesías, esclavo, etc. La decisión teológica sobre 'la iniquidad de sus padres' está correctamente preservada.
  issues:
  - severity: medium
    issue: Uso de 'fueron infieles contra mí'
    rationale: Aunque comunica oposición, en español suena forzado con 'ser infiel'. La preposición más natural es dativa o directa ('me fueron infieles'), lo que además preserva mejor la idea de quebranto relacional del hebreo מָעֲלוּ בִי.
  - severity: medium
    issue: Uso de 'anduvieron contrariamente a mí'
    rationale: Es un calco poco idiomático. El hebreo expresa conducta opositora/hostil hacia Dios; en español 'anduvieron en oposición a mí' o 'anduvieron contra mí' transmite mejor el sentido sin perder el valor difícil de בְּקֶרִי.
  - severity: low
    issue: Nota a anclada en 'sus padres' en vez de en 'la infidelidad'
    rationale: La nota explica el sintagma 'la infidelidad', no 'sus padres'. Aunque el anclaje no impide comprensión, conviene moverlo al término pertinente para mayor claridad editorial.
  revised_spanish_text: Pero si confiesan su iniquidad y la iniquidad de sus padres, en la infidelidad[a] con que me fueron infieles, y también que anduvieron en oposición a mí[b],
  revised_footnotes:
  - marker: a
    text: 'O ''su traición'' / ''su infidelidad'' para ''la infidelidad''. El hebreo usa formas cognadas para subrayar la ruptura del pacto: ''en su infidelidad con que me fueron infieles''.'
    reason: lexical_alternative
  - marker: b
    text: O 'anduvieron en hostilidad contra mí'. La frase hebrea 'anduvieron conmigo en qeri' usa un término difícil repetido en este capítulo para conducta opositora u hostil.
    reason: lexical_alternative
  revision_rationale: Se hicieron ajustes menores para evitar calcos poco naturales y mejorar la precisión idiomática del español sin alterar la exégesis de base. 'Me fueron infieles' preserva mejor la ruptura relacional de מָעֲלוּ בִי, y 'anduvieron en oposición a mí' expresa con claridad la idea de conducta contraria/hostil contenida en בְּקֶרִי. También se reubicó la nota a al término relevante.
