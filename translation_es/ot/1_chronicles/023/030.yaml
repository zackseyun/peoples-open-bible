translation:
  language: es
  text: y a estar de pie cada mañana para dar gracias y alabar a Yahvé[a], y asimismo al atardecer,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «mañana por mañana», expresión de un deber regular y cotidiano.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְ/לַ/עֲמֹד
  english_pob_choice: and to stand
  chosen_spanish: y a ponerse de pie
  alternatives_spanish:
  - y a estar de pie
  - y a presentarse
  - y a permanecer de pie
  lexicon: HALOT
  rationale: עמד en este contexto describe la postura asignada para el servicio. 'Ponerse de pie' conserva la imagen concreta y suena natural en español, sin perder el matiz de deber ritual.
- source_word: בַּ/בֹּקֶר בַּ/בֹּקֶר
  english_pob_choice: every morning
  chosen_spanish: cada mañana
  alternatives_spanish:
  - mañana tras mañana
  - mañana por mañana
  - cada mañana, de manera regular
  lexicon: HALOT
  rationale: La repetición hebrea es distributiva e iterativa. 'Cada mañana' transmite la regularidad diaria con fluidez moderna; 'mañana tras mañana' sería más literal pero menos natural.
- source_word: לְ/הֹד֥וֹת
  english_pob_choice: to give thanks
  chosen_spanish: para dar gracias
  alternatives_spanish:
  - para agradecer
  - para confesar
  lexicon: HALOT
  rationale: En contexto de adoración, ידה en hifil expresa dar gracias. 'Dar gracias' mantiene el sentido litúrgico y el paralelismo con 'alabar'.
- source_word: וּ/לְ/הַלֵּ֖ל
  english_pob_choice: and to praise
  chosen_spanish: y alabar
  alternatives_spanish:
  - y elogiar
  - y ensalzar
  - y cantar alabanzas
  lexicon: HALOT
  rationale: הלל en piel significa alabar. 'Alabar' es la equivalencia directa y más comprensible; 'cantar alabanzas' añadiría una idea no explícita en el verbo.
- source_word: לַ/יהוָ֑ה
  english_pob_choice: the LORD / Yahweh in audited note
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el SEÑOR
  - Yahveh
  lexicon: HALOT
  rationale: El texto hebreo tiene el Tetragrámaton. Conforme al criterio del proyecto, se vierte como 'Yahvé' en el texto principal, preservando el nombre divino en lugar de sustituirlo por un título genérico.
- source_word: וְ/כֵ֖ן
  english_pob_choice: and likewise
  chosen_spanish: y asimismo
  alternatives_spanish:
  - y así también
  - y del mismo modo
  - y de igual manera
  lexicon: HALOT
  rationale: וכן enlaza la obligación vespertina con la matutina por correspondencia. 'Asimismo' comunica bien esa repetición equivalente en español formal.
- source_word: לָ/עָֽרֶב
  english_pob_choice: at evening
  chosen_spanish: al atardecer
  alternatives_spanish:
  - por la tarde
  - al caer la tarde
  - al anochecer
  lexicon: HALOT
  rationale: עֶרֶב señala la parte del día correspondiente a la tarde/atardecer. 'Al atardecer' es claro y relativamente amplio, adecuado para la liturgia diaria del verso.
theological_decisions:
- issue: Representación del nombre divino יְהוָה
  english_pob_reading: Yahweh / the LORD in the audit trail
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Yahveh
  rationale: El hebreo usa directamente el Tetragrámaton. La convención del proyecto pide preservarlo como nombre propio en español; 'Yahvé' mantiene la identidad del pacto sin ocultarla bajo un título.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
translation_notes:
  revision_awareness: 'El audit trail inglés no exige cambios de fondo: la equivalencia óptima se mantiene al trasladar la repetición distributiva, el par litúrgico ''dar gracias / alabar'' y el nombre divino del Tetragrámaton a un español natural y transparente.'
  spanish_consistency_notes:
  - Se conserva el paralelismo entre la acción de la mañana y la del atardecer.
  - Se usa 'Yahvé' de forma consistente con el estándar del proyecto para יהוה.
  - '''Dar gracias'' y ''alabar'' se mantienen como dos verbos distintos, sin fusionarlos.'
