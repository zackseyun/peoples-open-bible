translation:
  language: es
  text: Entonces el hombre se inclinó y adoró a Yahvé[a][b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «se postró ante Yahvé».'
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: «el hombre», refiriéndose al siervo de Abraham.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּקֹּד
  english_pob_choice: bowed down
  chosen_spanish: se inclinó
  alternatives_spanish:
  - se inclinó profundamente
  - se postró
  lexicon: HALOT
  rationale: קָדַד expresa inclinarse o doblarse; en español, 'se inclinó' comunica el gesto físico con naturalidad. Se evita repetir una imagen más fuerte aquí para dejar que el segundo verbo exprese la reverencia cultual.
- source_word: הָאִישׁ
  english_pob_choice: the man
  chosen_spanish: el hombre
  alternatives_spanish:
  - el siervo
  - el criado
  lexicon: HALOT
  rationale: El hebreo dice literalmente 'el hombre'. Aunque el contexto identifica al personaje como el siervo de Abraham, el texto conserva el sustantivo común, y la traducción lo mantiene.
- source_word: וַיִּשְׁתַּחוּ
  english_pob_choice: worshiped
  chosen_spanish: adoró
  alternatives_spanish:
  - se postró
  - se postró en adoración
  lexicon: HALOT
  rationale: שׁחה en este contexto, dirigido a Yahvé, lleva sentido de reverencia religiosa. 'Adoró' transmite ese valor cultual de manera clara en español, mientras el verbo anterior ya cubre el gesto corporal de inclinarse.
- source_word: לַיהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  lexicon: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
  rationale: La política terminológica del proyecto para el Tetragrámaton es 'Yahvé'. Se conserva el nombre propio divino en lugar de sustituirlo por una cifra reverencial.
theological_decisions:
- issue: Nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: El hebreo usa el Nombre divino directamente. Según la política española del proyecto, se lo vierte como 'Yahvé' para preservar el nombre de pacto y evitar el ocultamiento reverencial.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh / Spanish project default Yahvé'
- issue: Relación entre inclinación física y adoración
  english_pob_reading: bowed down and worshiped
  chosen_spanish_reading: se inclinó y adoró
  alternative_spanish_readings:
  - se postró y adoró
  - se inclinó y se postró
  rationale: 'El hebreo distingue dos acciones: una inclinación corporal y un acto de adoración. En español, ''se inclinó y adoró'' preserva esa distinción sin perder la fuerza religiosa del segundo verbo.'
  doctrine_reference: 'Translation philosophy: optimal equivalence; preserve source sense without unnecessary paraphrase'
translation_notes:
  revision_awareness: 'El contexto fuente y el audit trail en inglés muestran alta concordancia y no registran revisiones aplicadas; se mantiene la lectura estable: dos verbos diferenciados, sujeto literal ''el hombre'' y nombre divino explícito ''Yahvé''.'
  spanish_consistency_notes:
  - Se conserva 'Yahvé' de forma consistente con la política del proyecto para יהוה.
  - '''Adoró'' se usa para el sentido cultual de וַיִּשְׁתַּחוּ, sin borrar la posibilidad corporal marcada por la nota alternativa.'
  - El sujeto se traduce como 'el hombre' para respetar el hebreo, con nota explicativa del referente contextual.
