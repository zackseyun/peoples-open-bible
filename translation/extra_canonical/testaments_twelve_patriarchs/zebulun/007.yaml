  text: VII. ὀθόνην ἐξέτεινα ἐν *ἑτέρῳ ξύλῳ ὀρθῷ⁸ *ἐν μέσῳ⁹. 2. Καὶ ἤμην¹⁰ Γἐν αὐτῷ˥¹¹ διαπορευόμενος¹² *τοὺς αἰγιαλούς¹³, *ἁλιεύων ἰχθύας¹⁴ τῷ¹⁵ *οἴκῳ τοῦ¹⁶ πατρός μου ἕως ὅτου¹⁷ ἤλθομεν εἰς Αἴγυπτον. [3. Καὶ¹⁸ ἐκ τῆς θήρας μου *παντὶ ἀνθρώπῳ ξένῳ¹⁹ σπλαγχνιζόμενος μετεδίδουν²⁰.] [4. *Εἰ δὲ ἦν ξένος, ἢ νοσῶν, ἢ²¹ γηράσας, ἐψήσας²² τοὺς ἰχθύας, καὶ *ποιήσας αὐτὰ ἀγαθῶς²³ κατὰ τὴν ἑκάστου χρείαν προσέφερον πᾶσι, συναλγῶν²⁴ καὶ συμπάσχων.] [5. Διὰ τοῦτο καὶ ὁ Κύριος *πολλοὺς ἰχθύας ἐνέπλησέ με²⁵ ἐν τῇ ἄγρᾳ τῶν ἰχθύων²⁶. Ὁ γὰρ μεταδιδοὺς τῷ πλησίον²⁷, λαμβάνει πολλαπλασίονα²⁸ παρὰ Κυρίου.] 6. *Πέντε οὖν ἔτη²⁹ ἡλίευσα³⁰, [παντὶ ἀνθρώπῳ *ὃν ἑωράκειν³¹ μεταδιδούς, καὶ παντὶ τῷ οἴκῳ τοῦ πατρός μου ἐξαρκῶν]. 7. *Καὶ τὸ μὲν ἥμισυ³² *ἐν τῷ χειμῶνι³³ ἐτοιμαίμην μετὰ τῶν ἀδελφῶν μου. 8. Εἰ δὲ μὴ ἔχετε δοῦναι τῷ χρήζοντι, συμπάσχετε αὐτῷ⁷ ἐν σπλάγχνοις ἐλέους. 9. Οἶδα⁸ ὅτι ἡ χείρ μου *οὐχ εὗρε⁹ ἐπιδοῦναι¹⁰ τῷ χρήζοντι, καὶ ἐπὶ¹¹ ἑπτὰ σταδίους συμπορευόμενος αὐτῷ ἔκλαιον· καὶ τὰ σπλάγχνα μου *ἐστρέφετο ἐπʼ αὐτῷ¹² εἰς συμπάθειαν.
