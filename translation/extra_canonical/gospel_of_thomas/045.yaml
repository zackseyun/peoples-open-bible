translation:
  text: Jesus said, “They do not pick grapes from thorns, nor do they gather figs
    from thistles—for they do not give fruit. A good person brings out a good thing
    from his storehouse; an evil person brings out an evil thing from his storehouse,
    that which is in his heart, and he speaks evil, for from the overflow of the heart
    he brings out evil.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: ⲟⲩⲁ in ⲟⲩⲁⲅⲁⲑⲟⲥ (‘a good [person]’) is partly restored in NH II (Dilley
      marks [ⲟⲩⲁ]).
    reason: lacuna_or_restoration
  - marker: b
    text: ⲕⲛⲧⲉ is a Sahidic/Lycopolitan term for ‘fig(s)’ (Crum s.v. ⲕⲛⲧⲉ).
    reason: dialect_note
  - marker: c
    text: The phrase ‘that is in his heart’ renders ⲉⲧⲉⲣⲉ … ϩⲛ ⲡⲉϥϩⲏⲧ, taken as modifying
      ‘storehouse’ rather than introducing a new clause.
    reason: dialect_note
  - marker: d
    text: ‘And he speaks’ translates ⲛⲧⲉⲛⲧⲟϥ ϫⲱ without adding ‘mouth’ (present in
      the Synoptics).
    reason: cross_reference
lexical_decisions:
- source_word: ϫⲱⲱⲗⲉ ⲉⲗⲟⲟⲗⲉ (as written together in the MS)
  chosen: pick grapes
  alternatives:
  - harvest grapes
  - pluck grapes
  lexicon: Crum; Layton
  rationale: ϫⲱⲗⲉ can mean to pick/glean; ⲗⲟⲟⲗⲉ is ‘grape(s)’. The manuscript writes
    verb+object as a run-on; sense is conventional ‘pick grapes’ from proverbial saying.
- source_word: ϣⲟⲛⲧⲉ
  chosen: thorns
  alternatives:
  - thornbushes
  - brambles
  lexicon: Crum
  rationale: Crum s.v. ϣⲟⲛⲧ ‘thorn, thornbush’. Short ‘thorns’ preserves Thomasine
    terseness.
- source_word: ⲕⲱⲧϥ
  chosen: gather
  alternatives:
  - pick
  - collect
  lexicon: Crum; Layton
  rationale: ⲕⲱⲧⲉ ‘gather, collect (produce)’. With object ‘figs’ the idiom ‘gather
    figs’ is natural.
- source_word: ⲕⲛⲧⲉ
  chosen: figs
  alternatives:
  - fig-fruit
  - figs (Lycopolitan form)
  lexicon: Crum
  rationale: Crum notes ⲕⲛⲧⲉ as ‘fig(s)’ (dialectal/loan). Keep simple ‘figs’; note
    dialectal possibility in textual note.
- source_word: ⲥⲉⲣϭⲁⲙⲟⲩⲗ
  chosen: thistles
  alternatives:
  - thistle-plants
  lexicon: Crum
  rationale: Standard rendering of the plant term; matches proverbial pairing with
    figs.
- source_word: ϯ ⲕⲁⲣⲡⲟⲥ
  chosen: give fruit
  alternatives:
  - bear fruit
  - produce fruit
  lexicon: Crum; Layton
  rationale: ϯ ‘give’ + Greek loan ⲕⲁⲣⲡⲟⲥ ‘fruit’. ‘Give fruit’ keeps the literal
    Coptic; ‘bear’ is idiomatic alternative.
- source_word: ⲟⲩⲁⲅⲁⲑⲟⲥ / ⲟⲩⲕⲁⲕⲟⲥ
  chosen: a good person / an evil person
  alternatives:
  - a good man / a bad man
  - a good human / a wicked person
  lexicon: Layton; Crum
  rationale: Both are Greek loans. Render both with ‘good/evil’ for consistency, avoiding
    implying a contrast between ‘bad’ and ‘evil’ not required by context.
- source_word: ⲁϩⲟ
  chosen: storehouse
  alternatives:
  - treasure
  - treasury
  - store
  lexicon: Crum; Layton
  rationale: Crum s.v. ⲁϩⲟ ‘storehouse, treasure’. ‘Storehouse’ captures the concrete
    container; context then locates it ‘in his heart’.
- source_word: ⲡϩⲟⲩⲟ
  chosen: overflow
  alternatives:
  - abundance
  - fullness
  lexicon: Crum
  rationale: Crum s.v. ⲡϩⲟⲩⲟ ‘fullness, abundance’. ‘Overflow’ preserves vivid metaphor
    of speech issuing from what fills the heart.
- source_word: ⲛⲧⲉⲛⲧⲟϥ ϫⲱ
  chosen: and he speaks
  alternatives:
  - and so he says
  - and he will speak
  lexicon: Layton
  rationale: ϫⲱ ‘say/speak’. The tense sequence here is gnomic; translate as simple
    present to preserve proverbial force.
- source_word: ⲉⲧⲉⲣⲉ … ϩⲛ ⲡⲉϥϩⲏⲧ
  chosen: that is in his heart
  alternatives:
  - which is in his heart
  lexicon: Layton
  rationale: Relative construction modifying ‘storehouse’. Translation clarifies the
    referent without smoothing the syntax.
textual_note: 'No Greek Oxyrhynchus witness overlaps Saying 45. Two small restorations
  in NH II are noted in Dilley’s layout: (1) NHAM02.40 lb 34 reads ⲅⲁⲣ [ⲟⲩⲁ]ⲅⲁⲑⲟⲥ,
  with ⲟⲩⲁ (‘one/a’) supplied; (2) NHAM02.41 lb 1 reads ⲟⲩⲕⲁ[ⲕⲟ]ⲥ, restoring the medial
  -ⲕⲟ-. The manuscript orthography writes the verb+object for ‘pick grapes’ as a run-on
  (ϫⲱⲱⲗⲉⲉⲗⲟⲟⲗⲉ), which is a common scribal practice and does not affect sense. The
  construction ⲉⲧⲉⲣⲉϩⲟⲟⲩ ⲉⲧⲉⲣⲉ ϩⲛ ⲡⲉϥϩⲏⲧ is syntactically awkward; it is taken here
  as a relative clause modifying ⲁϩⲟ (‘storehouse’), ‘which is in his heart’. Dialectally,
  ⲕⲛⲧⲉ for ‘figs’ reflects a Sahidic/Lycopolitan lexeme; the meaning is secure from
  the proverbial context.'
