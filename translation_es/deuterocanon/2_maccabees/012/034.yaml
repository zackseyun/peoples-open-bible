revisions:
- from: Y cuando se habían dispuesto en orden de batalla[a], sucedió que cayeron[b] unos pocos de los judíos.
  to: Y cuando habían entrado en combate[a], sucedió que cayeron[b] unos pocos de los judíos.
  rationale: 'Se revisa el texto principal para alinear παραταξαμένους con la decisión auditada del POB inglés (''joined battle'') en un español más natural: ''habían entrado en combate''. Se conserva en nota la alternativa más formal relacionada con la formación militar. El resto del versículo permanece igual porque ya refleja fielmente el griego y la auditoría inglesa.'
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T23:02:01Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien la estructura y el sentido general del griego: participio temporal militar + συνέβη + πεσεῖν + ὀλίγους τῶν Ἰουδαίων. Sin embargo, la elección principal para παραταξαμένους (''se habían dispuesto en orden de batalla'') privilegia demasiado la formación táctica, mientras que la decisión inglesa auditada eligió como texto principal ''joined battle'' y relegó ''drawn up in battle line'' a nota. Conviene alinear el texto principal español con el sentido más natural de entrada en combate, manteniendo en nota la alternativa más formal de formación militar.'
  spanish_quality_summary: El español es claro y digno, pero 'se habían dispuesto en orden de batalla' suena más pesado y menos natural que 'habían entrado en combate' o 'habían trabado batalla'. El resto ('sucedió', 'cayeron', 'unos pocos de los judíos') es correcto y legible. La nota a debe ajustarse para reflejar la alternativa formal, no la opción principal actual.
  glossary_alignment: No hay conflictos con la terminología teológica del proyecto. 'judíos' concuerda con la auditoría inglesa. 'cayeron' preserva correctamente la ambigüedad de πεσεῖν en contexto bélico.
  issues:
  - severity: medium
    issue: La traducción principal de παραταξαμένους no sigue la jerarquía semántica documentada en la auditoría inglesa.
    rationale: El inglés POB escogió 'when they had joined battle' como texto principal por naturalidad, dejando 'drawn up in battle line' como alternativa más formal. El español actual invierte esa prioridad al usar como texto principal una formulación de despliegue/formación.
  - severity: low
    issue: La redacción principal suena algo rígida en español contemporáneo.
    rationale: '''Se habían dispuesto en orden de batalla'' es comprensible, pero menos idiomático y más pesado que una formulación narrativa natural como ''habían entrado en combate'', especialmente en una traducción de lectura continua.'
  - severity: low
    issue: La nota a necesita reajuste para corresponder al nuevo texto principal.
    rationale: Si el texto principal se corrige a una forma equivalente a 'joined battle', la nota debe conservar la opción más formal de 'formarse/desplegarse en línea de batalla'.
  revised_spanish_text: Y cuando habían entrado en combate[a], sucedió que cayeron[b] unos pocos de los judíos.
  revised_footnotes:
  - marker: a
    text: O, más formalmente, “cuando se habían puesto en línea de batalla”. El participio griego es militar y puede destacar tanto la formación de combate como el hecho de trabar batalla.
    reason: lexical_alternative
  - marker: b
    text: “Cayeron” en un contexto de batalla probablemente implica muerte, pero el griego no dice explícitamente “fueron muertos”.
    reason: lexical_alternative
  revision_rationale: 'Se revisa el texto principal para alinear παραταξαμένους con la decisión auditada del POB inglés (''joined battle'') en un español más natural: ''habían entrado en combate''. Se conserva en nota la alternativa más formal relacionada con la formación militar. El resto del versículo permanece igual porque ya refleja fielmente el griego y la auditoría inglesa.'
