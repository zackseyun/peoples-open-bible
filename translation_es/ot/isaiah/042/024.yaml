translation:
  language: es
  text: ¿Quién entregó a Jacob para el saqueo[a], y a Israel a los despojadores? ¿No fue Yahvé, él[b] contra quien hemos pecado? No quisieron andar en sus caminos, y no escucharon su ley[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: ‘para saqueo/despojo’ y ‘a despojadores’. La imagen presenta a Jacob e Israel entregados para ser despojados.'
    reason: lexical_alternative
  - marker: b
    text: 'La partícula hebrea introduce una cláusula relativa con énfasis: ‘él contra quien hemos pecado’.'
    reason: source_note
  - marker: c
    text: O ‘su instrucción’, para el sentido más amplio de torá.
    reason: lexical_alternative
lexical_decisions:
- source_word: ל/משוסה
  english_pob_choice: to plunder
  chosen_spanish: para el saqueo
  alternatives_spanish:
  - para ser despojado
  - para el despojo
  lexicon: HALOT
  rationale: El sustantivo apunta a una situación de ser entregado como presa o botín. En español, ‘saqueo’ comunica bien la idea de despojo sufrido; ‘para ser despojado’ explicita la pasividad del receptor, pero suena más pesado.
- source_word: לְ/בֹזְזִים
  english_pob_choice: to looters
  chosen_spanish: a los despojadores
  alternatives_spanish:
  - a los saqueadores
  - a los que saquean
  lexicon: HALOT
  rationale: El participio expresa a los agentes que toman botín. ‘Despojadores’ conserva esa fuerza y mantiene el paralelismo con ‘saqueo’ sin volverlo demasiado coloquial.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - SEÑOR
  - Yahweh
  lexicon: HALOT
  rationale: El texto hebreo usa el nombre divino directo. La norma del proyecto pide ‘Yahvé’ en el cuerpo principal, evitando la sustitución por ‘SEÑOR’.
- source_word: זוּ
  english_pob_choice: he against whom
  chosen_spanish: él contra quien
  alternatives_spanish:
  - contra quien
  - a quien
  lexicon: HALOT
  rationale: La partícula demostrativa introduce la cláusula relativa con una fuerza enfática que el audit trail inglés reflejó con ‘he’. En español, ‘él contra quien’ conserva ese énfasis sin borrar la construcción.
- source_word: חָטָאנוּ לּוֹ
  english_pob_choice: we have sinned against
  chosen_spanish: hemos pecado contra él
  alternatives_spanish:
  - hemos pecado contra Yahvé
  - pecamos contra él
  lexicon: HALOT
  rationale: El hebreo usa el giro ‘pecar contra’ una persona. ‘Hemos pecado contra él’ mantiene la relación verbal y la referencia pronominal; ‘hemos pecado contra Yahvé’ sería más explícito pero menos fiel al cambio pronominal del verso.
- source_word: וְלֹא אָבוּ
  english_pob_choice: They were not willing
  chosen_spanish: No quisieron
  alternatives_spanish:
  - No estuvieron dispuestos
  - No quisieron hacerlo
  lexicon: HALOT
  rationale: אָבָה expresa falta de voluntad o disposición. ‘No quisieron’ es natural en español y conserva la fuerza de negativa volitiva sin introducir una interpretación más fuerte de rechazo formal.
- source_word: בִ/דְרָכָי/ו הָל֔וֹךְ
  english_pob_choice: to walk in his ways
  chosen_spanish: andar en sus caminos
  alternatives_spanish:
  - caminar en sus caminos
  - vivir conforme a sus caminos
  lexicon: HALOT
  rationale: ‘Andar en sus caminos’ reproduce de manera idiomática y reverente la imagen bíblica del caminar como conducta. ‘Caminar’ es posible, pero ‘andar’ suena más natural en español bíblico sin ser arcaizante.
- source_word: בְּ/תוֹרָתֽ/וֹ
  english_pob_choice: to his law
  chosen_spanish: su instrucción
  alternatives_spanish:
  - su ley
  - su torá
  lexicon: HALOT
  rationale: תּוֹרָה puede significar instrucción o ley. Dado que el propio audit trail inglés preserva la alternativa ‘instruction’, aquí ‘instrucción’ permite mantener la amplitud del término sin restringirlo de forma innecesaria.
- source_word: שָׁמְע֖וּ
  english_pob_choice: did not listen
  chosen_spanish: no escucharon
  alternatives_spanish:
  - no obedecieron
  - no oyeron
  lexicon: HALOT
  rationale: שׁמע puede abarcar oír y prestar atención con obediencia implícita. ‘No escucharon’ conserva el sentido básico y deja que el contexto cargue la desobediencia implícita, como hace el inglés POB.
- source_word: יַעֲקֹב / יִשְׂרָאֵל
  english_pob_choice: Jacob ... Israel
  chosen_spanish: Jacob ... Israel
  alternatives_spanish:
  - Jacob ... el Israel
  - Jacob ... el pueblo de Israel
  lexicon: HALOT
  rationale: Se conservan los dos nombres propios en paralelo poético, como en el hebreo y en el audit trail inglés, para preservar la identidad pactal y la estructura retórica.
theological_decisions:
- issue: Nombre divino יְהוָה en español
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - Yahweh
  rationale: El proyecto establece ‘Yahvé’ como forma principal en español. Esto respeta el nombre del pacto y evita el reemplazo litúrgico por ‘SEÑOR’.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Tensión entre ‘hemos pecado’ y las acciones en tercera persona plural
  english_pob_reading: Preserve the Hebrew as written
  chosen_spanish_reading: Conservar el cambio de persona
  alternative_spanish_readings:
  - Hemos pecado ... no quisimos ... no escuchamos
  - Ellos no quisieron ... no escucharon
  rationale: El verso pasa de la confesión colectiva a la descripción en tercera persona. La versión española conserva esa oscilación, sin nivelarla, porque forma parte de la textura del texto fuente.
  doctrine_reference: 'DOCTRINE.md Translation philosophy #3: Preserve theological tension rather than resolve it'
translation_notes:
  revision_awareness: El borrador sigue la última revisión inglesa que añadió el pronombre enfático ‘he’ antes de la cláusula relativa sobre el pecado. En español se reflejó con ‘él contra quien’ para no perder la fuerza demostrativa de זו. También se mantuvo la distinción entre la confesión colectiva y la referencia posterior en tercera persona, conforme al audit trail.
  spanish_consistency_notes:
  - Se usó ‘Yahvé’ conforme al estándar del proyecto para יְהוָה.
  - Se evitó ‘SEÑOR’ como máscara del nombre divino.
  - ‘Instrucción’ se eligió para תּוֹרָה por la nota auditada de alternativa semántica.
  - La puntuación y la cadencia siguen un registro bíblico moderno y legible en español latinoamericano.
