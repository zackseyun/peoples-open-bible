    issue: La nota [a] está colocada en «dijo» pero su contenido explica עָרֹב / «enjambre».
    rationale: Las notas deben anclarse exactamente en la palabra o frase relevante del texto español. Tal como está, induce confusión y no cumple la disciplina requerida de marcadores.
  - severity: medium
    issue: «Solo no siga Faraón burlándose» suena poco natural y débilmente estructurado en español.
    rationale: El hebreo introduce una restricción/admonición («רק אַל…»). En español eclesial claro, «Solo que Faraón no siga burlándose…» o «Solo que Faraón no continúe burlándose…» comunica mejor la prohibición con matiz continuativo.
  - severity: low
    issue: La nota [b] sobre «burlándose» es útil pero puede expresarse con mayor precisión.
    rationale: El hebreo apunta a trato engañoso/burlesco, no mera risa. Conviene formularlo con «burlarse con engaño» o «proceder engañosamente» para reflejar mejor el matiz lexical documentado.
