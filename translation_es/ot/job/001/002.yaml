    rationale: El hebreo distingue explícitamente «siete sons» y «tres daughters». En español, «hijos» puede ser inclusivo y diluir la información de sexo que sí está en el original y en el English POB.
  revised_spanish_text: Y le nacieron siete hijos varones y tres hijas.
  revision_rationale: Se ajusta «hijos» a «hijos varones» para conservar la especificidad de género de בָנִים frente a בָּנוֹת, manteniendo al mismo tiempo una formulación natural y digna en español. No se requieren notas.
