translation:
  language: es
  text: 'Y Salomón hizo todos los utensilios destinados a la casa de Dios: el altar de oro, las mesas y sobre ellas el pan de la Presencia[a].'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, tradicionalmente, «pan de la proposición». Hebreo: «pan de la Presencia».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּעַשׂ
  english_pob_choice: made
  chosen_spanish: hizo
  alternatives_spanish:
  - fabricó
  - construyó
  lexicon: HALOT
  rationale: עשה es el verbo común 'hacer'. En español, 'hizo' conserva la acción de producir o preparar los objetos sin volver la frase artificial.
- source_word: כָּל הַכֵּלִים
  english_pob_choice: all the vessels
  chosen_spanish: todos los utensilios
  alternatives_spanish:
  - todos los vasos
  - todos los objetos
  lexicon: HALOT
  rationale: כֵּלִים aquí se refiere a implementos del santuario. 'Utensilios' comunica bien el valor funcional y cultual en español, aunque 'vessels' en inglés sea más literal al marco templario.
- source_word: בֵּית הָאֱלֹהִים
  english_pob_choice: the house of God
  chosen_spanish: la casa de Dios
  alternatives_spanish:
  - el templo de Dios
  lexicon: HALOT
  rationale: Se mantiene la construcción literal 'casa de Dios' para conservar el giro hebreo y la primacía del original. 'Templo' sería claro, pero menos cercano al texto fuente.
- source_word: מִזְבַּח הַזָּהָב
  english_pob_choice: the golden altar
  chosen_spanish: el altar de oro
  alternatives_spanish:
  - el altar dorado
  lexicon: HALOT
  rationale: El hebreo es literalmente un constructo nominal 'altar de oro'. En español, 'altar de oro' preserva mejor esa relación que un adjetivo más interpretativo como 'dorado'.
- source_word: הַשֻּׁלְחָנוֹת
  english_pob_choice: the tables
  chosen_spanish: las mesas
  alternatives_spanish:
  - las tablas
  - las mesas del pan
  lexicon: HALOT
  rationale: El plural se refiere de forma directa a mesas. 'Mesas' es el equivalente más natural y mantiene la referencia a los soportes del pan.
- source_word: וַעֲלֵיהֶם
  english_pob_choice: and on them
  chosen_spanish: y sobre ellas
  alternatives_spanish:
  - y encima de ellas
  - y sobre estos
  lexicon: HALOT
  rationale: La preposición indica colocación física del pan. 'Sobre ellas' suena natural en español y conserva la relación espacial del hebreo.
- source_word: לֶחֶם הַפָּנִים
  english_pob_choice: the bread of the Presence
  chosen_spanish: el pan de la Presencia
  alternatives_spanish:
  - el pan de la presencia
  - el pan de la Faz
  lexicon: HALOT
  rationale: La expresión técnica se traduce de forma transparente como 'pan de la Presencia', evitando la tradición menos clara de 'showbread' y manteniendo el sentido cultual de estar puesto delante de Dios.
theological_decisions:
- issue: Designación del objeto cultual לֶחֶם הַפָּנִים
  english_pob_reading: the bread of the Presence
  chosen_spanish_reading: el pan de la Presencia
  alternative_spanish_readings:
  - el pan de la presencia
  - el pan de la Faz
  - el pan de la proposición
  rationale: Se opta por una fórmula transparente y reverente que conserva el valor cultual del término. 'Pan de la Presencia' comunica la idea de lo puesto delante de Dios sin recurrir a un término tradicional menos transparente.
  doctrine_reference: Translation philosophy §1, §6
- issue: Relación de los utensilios con la casa de Dios
  english_pob_reading: for the house of God
  chosen_spanish_reading: que eran para la casa de Dios
  alternative_spanish_readings:
  - que estaban en la casa de Dios
  - destinados a la casa de Dios
  rationale: La construcción elegida refleja pertenencia o destino, no mera ubicación. Así se sigue la revisión inglesa que corrigió 'in' a 'for', manteniendo la idea de objetos hechos para el santuario.
  doctrine_reference: Translation philosophy §1
translation_notes:
  revision_awareness: La versión inglesa auditada fue revisada de 'were in the house of God' a 'were for the house of God'. La redacción española refleja ese ajuste con 'que eran para la casa de Dios', evitando una lectura meramente locativa. También se preservó la decisión léxica de traducir לֶחֶם הַפָּנִים de manera transparente como 'pan de la Presencia'.
  spanish_consistency_notes:
  - Se prefirió 'casa de Dios' en vez de 'templo' para mantener la huella hebrea del original.
  - '''Utensilios'' se usó para כֵּלִים por su adecuación a implementos del culto, aunque el inglés use ''vessels''.'
  - Se mantuvo la mayúscula en 'Presencia' para señalar el carácter técnico/cultual de la expresión, en continuidad con el tratamiento reverente del POB.
