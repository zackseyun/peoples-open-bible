translation:
  language: es
  text: Abriré ríos sobre las alturas desnudas[a], y manantiales en medio de los valles; haré del desierto un estanque de aguas[b], y de la tierra seca manantiales de agua.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «altos lugares» o «cerros pelados» para «alturas desnudas».'
    reason: lexical_alternative
  - marker: b
    text: 'O: «fuentes de agua» o «salidas de agua»; el hebreo también puede expresar la idea de surgimientos de agua.'
    reason: lexical_alternative
lexical_decisions:
- source_word: אֶפְתַּח
  english_pob_choice: I will open
  chosen_spanish: Abriré
  alternatives_spanish:
  - Yo abriré
  - Abriré de par en par
  lexicon: HALOT
  rationale: El imperfecto 1cs expresa una promesa en primera persona divina; en español, el futuro simple comunica bien esa acción prometida. "Abriré" conserva la sencillez y el valor directo de פתח.
- source_word: שְׁפָיִים
  english_pob_choice: bare heights
  chosen_spanish: las alturas desnudas
  alternatives_spanish:
  - los altos lugares
  - los cerros pelados
  - las alturas barridas
  lexicon: HALOT
  rationale: Se conserva la idea de elevaciones expuestas y sin vegetación. "Alturas desnudas" refleja mejor el matiz descriptivo del hebreo que "altos lugares", que puede sonar cultual y perder la imagen física.
- source_word: נְהָר֔וֹת
  english_pob_choice: rivers
  chosen_spanish: ríos
  alternatives_spanish:
  - corrientes
  - torrentes
  lexicon: HALOT
  rationale: El sustantivo apunta a ríos/corrientes abundantes; "ríos" es la equivalencia natural y mantiene el contraste de abundancia frente a la aridez.
- source_word: וּבְתוֹךְ בְּקָעוֹת
  english_pob_choice: in the midst of the valleys
  chosen_spanish: en medio de los valles
  alternatives_spanish:
  - dentro de los valles
  - en los valles
  lexicon: HALOT
  rationale: '"En medio de" conserva בְתוֹךְ sin volver la frase rígida en español. "Valles" expresa bien בְּקָעוֹת como depresiones o valles amplios en el paralelismo.'
- source_word: מַעְיָנוֹת
  english_pob_choice: springs
  chosen_spanish: manantiales
  alternatives_spanish:
  - fuentes
  - nacientes
  lexicon: HALOT
  rationale: El término designa nacimientos naturales de agua. "Manantiales" es claro, digno y estándar en español bíblico.
- source_word: אָשִׂים
  english_pob_choice: I will make
  chosen_spanish: haré
  alternatives_spanish:
  - pondré
  - transformaré
  lexicon: HALOT
  rationale: En este contexto transformacional, "haré" transmite el cambio producido por Yahvé sin forzar una paráfrasis. Reproduce bien el valor de שׂים como hacer/convertir.
- source_word: מִדְבָּר
  english_pob_choice: the wilderness
  chosen_spanish: el desierto
  alternatives_spanish:
  - el páramo
  - la estepa
  lexicon: HALOT
  rationale: Aunque "wilderness" puede abarcar más que un desierto arenoso, aquí el contraste con la provisión de agua hace que "desierto" sea la opción más transparente y natural en español.
- source_word: לַאֲגַם מַיִם
  english_pob_choice: into a pool of water
  chosen_spanish: un estanque de aguas
  alternatives_spanish:
  - un estanque de agua
  - una laguna de agua
  lexicon: HALOT
  rationale: אגם denota un cuerpo de agua recogida, no necesariamente un gran lago. "Estanque de aguas" comunica acumulación de agua y mantiene el plural intensivo de מַיִם sin sobreespecificar el tamaño.
- source_word: אֶרֶץ צִיָּה
  english_pob_choice: the dry land
  chosen_spanish: la tierra seca
  alternatives_spanish:
  - la tierra árida
  - la tierra reseca
  lexicon: HALOT
  rationale: La expresión describe tierra marcada por sequedad. "Tierra seca" es directa y natural en español, y conserva el paralelo con "desierto".
- source_word: לְמוֹצָאֵי מָיִם
  english_pob_choice: springs of water
  chosen_spanish: manantiales de agua
  alternatives_spanish:
  - fuentes de agua
  - nacientes de agua
  - salidas de agua
  lexicon: HALOT
  rationale: Aunque el inglés auditado mostró la oscilación entre "sources of water" y "springs of water", el hebreo apunta a salidas/orígenes de agua. "Manantiales de agua" mantiene la imagen de surgimiento natural y evita una repetición innecesaria de "estanque".
theological_decisions:
- issue: Naturaleza de la transformación prometida
  english_pob_reading: Render the verse as a divine promise of literal-enough environmental transformation expressed in prophetic-poetic imagery, without allegorizing it in the translation.
  chosen_spanish_reading: Traducirlo como una promesa divina de transformación realista de la creación expresada en lenguaje poético-profético, sin espiritualizarla en el texto principal.
  alternative_spanish_readings:
  - Una metáfora principalmente de renovación espiritual
  - Una imagen principalmente de nueva creación escatológica
  rationale: El hebreo presenta una promesa concreta de Yahvé de hacer surgir agua donde hay sequedad. La traducción debe preservar esa imaginería tangible y dejar las posibles lecturas simbólicas o escatológicas para la interpretación, no para la redacción del versículo.
  doctrine_reference: Preservar la tensión teológica sin resolverla en la traducción.
translation_notes:
  revision_awareness: 'La redacción sigue de cerca el hebreo y el auditorio en inglés: se mantuvo el paralelismo de dos hemistiquios con promesa divina en primera persona, se conservó la imaginería concreta de abundancia de agua en lugares áridos, y se evitó resolver en el texto una interpretación espiritualizante. Se tuvo en cuenta la revisión inglesa que prefirió ''springs of water'' frente a ''sources of water'', por lo que en español se optó por ''manantiales de agua''.'
  spanish_consistency_notes:
  - Se usa «Yahvé» implícito por la primera persona divina, conforme al estándar del proyecto.
  - 'Se prefirió vocabulario natural pero reverente: «desierto», «manantiales», «tierra seca».'
  - 'Se mantuvo el paralelismo con dos acciones divinas: abrir/poner-ríos y hacer/convertir.'
  - El plural «aguas» se conserva en el primer hemistiquio donde el hebreo usa מַיִם como plural léxico.
