review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien la estructura y el sentido general del griego: la fianza/acto de salir fiador destruye, sacude, desarraiga y hace vagar entre naciones extranjeras. También preserva correctamente el masculino específico de ἄνδρας δυνατούς. Sin embargo, hay un punto de ajuste importante en κατευθύνοντας: tras la revisión del audit trail inglés a ''upright'', el español ''que iban rectamente'' suena algo calcado y menos natural que una formulación de rectitud más idiomática en español.'
  spanish_quality_summary: El español es claro y digno, pero 'que iban rectamente' resulta poco natural en registro bíblico contemporáneo y puede sonar adverbialmente forzado. 'Anduvieron entre naciones extranjeras' es comprensible, aunque 'vagaron' refleja mejor ἐπλανήθησαν en este contexto de desarraigo. El resto del verso fluye bien.
  glossary_alignment: No hay conflictos con la terminología del proyecto. 'Fianza' para ἐγγύη es apropiado, y la nota léxica es útil. Conviene corregir en la nota la alternativa 'salir fiador' en lugar de 'salida de fiador'.
  issues:
  - severity: medium
    issue: '''que iban rectamente'' es una formulación poco natural en español'
    rationale: Aunque intenta conservar la imagen de 'ir derecho', en español moderno suena rígida. Dado el audit trail que prioriza 'upright', 'que eran rectos' comunica mejor el valor semántico sin paráfrasis excesiva.
  - severity: low
    issue: La nota al pie incluye 'salida de fiador'
    rationale: Esa alternativa es incorrecta o poco idiomática; la forma natural es 'salir fiador'.
  - severity: low
    issue: '''anduvieron entre naciones extranjeras'' puede afinarse'
    rationale: El griego ἐπλανήθησαν aquí expresa deambular o vagar por desarraigo. 'Vagaron' suena más preciso y natural que 'anduvieron'.
  revised_spanish_text: La fianza[a] ha destruido a muchos que eran rectos, y los ha sacudido como una ola del mar; ha expulsado a hombres poderosos de sus hogares, y vagaron entre naciones extranjeras.
  revised_footnotes:
  - marker: a
    text: O ‘garantía’ o ‘salir fiador’. El término griego se refiere a convertirse en garantía por la deuda de otra persona.
    reason: lexical_alternative
  revision_rationale: Se revisa κατευθύνοντας a 'que eran rectos' para reflejar de forma más natural en español la lectura auditada 'upright'. Se cambia 'anduvieron' por 'vagaron' para expresar mejor el matiz de ἐπλανήθησαν en contexto de desplazamiento. En la nota, se corrige la alternativa no idiomática y se mejora levemente la explicación jurídica.
