base_translation:
  language: en
  yaml_path: translation/ot/ezekiel/016/052.yaml
  text: You also[a], bear your disgrace, because you pronounced judgment in favor of your sisters. By your sins in which you acted more abominably than they, they have become more righteous than you. So you too, be ashamed and bear your disgrace[b], because you made your sisters appear righteous.
  footnotes:
  - marker: a
    text: 'Or ''you judged in favor of your sisters'' / ''you interceded for your sisters.'' The Hebrew is ironic: Jerusalem''s sins have effectively vindicated her sisters by comparison.'
    reason: lexical_alternative
  - marker: b
    text: Or 'they are justified more than you.' The sense is comparative, not that they were righteous in an absolute sense.
    reason: alternative_reading
