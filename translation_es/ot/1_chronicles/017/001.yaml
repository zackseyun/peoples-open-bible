translation:
  language: es
  text: 'Y sucedió[a] que, cuando David vivía en su casa, David dijo a Natán el profeta: «Mira, yo vivo en una casa de cedro, pero el arca del pacto de Yahvé está bajo cortinas».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «Y aconteció». El hebreo וַיְהִי introduce una nueva escena narrativa; ambas opciones son posibles en español.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְהִי
  english_pob_choice: Now it happened
  chosen_spanish: Entonces aconteció
  alternatives_spanish:
  - Y aconteció
  - Y sucedió
  - Ahora bien, aconteció
  lexicon: HALOT
  rationale: La forma narrativa wayyiqtol introduce una nueva escena. «Entonces aconteció» conserva ese arranque discursivo sin sonar arcaico, y mantiene el tono de transición narrativa del hebreo.
- source_word: כַּאֲשֶׁר
  english_pob_choice: when
  chosen_spanish: cuando
  alternatives_spanish:
  - al
  - mientras
  - después que
  lexicon: HALOT
  rationale: Introduce la circunstancia temporal de la acción principal. «Cuando» es la equivalencia natural y exacta en español.
- source_word: יָשַׁב ... יוֹשֵׁב
  english_pob_choice: was living ... am living
  chosen_spanish: habitaba ... habito
  alternatives_spanish:
  - estaba sentado ... estoy sentado
  - moraba ... moro
  - vivía ... vivo
  lexicon: HALOT
  rationale: En este contexto יָשַׁב expresa residencia estable, no postura física. «Habitar» conserva mejor la repetición entre la narración y el discurso de David, y permite un registro digno sin perder claridad.
- source_word: בְּבֵיתוֹ
  english_pob_choice: in his house
  chosen_spanish: en su casa
  alternatives_spanish:
  - en su palacio
  - en su morada
  lexicon: HALOT
  rationale: El hebreo dice literalmente «en su casa». Se mantiene «casa» por fidelidad y por la repetición retórica con «casa de cedro».
- source_word: נָתָן הַנָּבִיא
  english_pob_choice: Nathan the prophet
  chosen_spanish: Natán el profeta
  alternatives_spanish:
  - Natán, el profeta
  - el profeta Natán
  lexicon: HALOT
  rationale: Se conserva la aposición del hebreo que identifica a Natán por su oficio profético. «Natán el profeta» es claro y fiel.
- source_word: הִנֵּה
  english_pob_choice: Look
  chosen_spanish: Mira
  alternatives_spanish:
  - Mira, pues
  - He aquí
  - Observa
  lexicon: HALOT
  rationale: La partícula deíctica llama la atención sobre lo que David percibe. «Mira» es natural en español actual y evita el arcaísmo de «he aquí».
- source_word: בְּבֵית הָאֲרָזִים
  english_pob_choice: in a house of cedar
  chosen_spanish: en una casa de cedro
  alternatives_spanish:
  - en una casa de cedros
  - en una casa de madera de cedro
  - en un palacio de cedro
  lexicon: HALOT
  rationale: La construcción hebrea es literalmente «casa de cedro». «Casa de cedro» preserva la forma nominal y la contraposición con la situación del arca.
- source_word: וַאֲרוֹן בְּרִית יְהוָה
  english_pob_choice: the ark of the covenant of Yahweh
  chosen_spanish: el arca del pacto de Yahvé
  alternatives_spanish:
  - el arca del pacto de Yahveh
  - el arca del convenio de Yahvé
  lexicon: HALOT
  rationale: Se conserva «arca del pacto» como fórmula bíblica transparente y se usa «Yahvé» para el Tetragrámaton según la norma del proyecto. «Pacto» refleja con naturalidad בְּרִית en español bíblico contemporáneo.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  - el SEÑOR
  lexicon: HALOT
  rationale: El nombre divino se vierte como «Yahvé» conforme a la norma del proyecto y al valor propio del Tetragrámaton, evitando la sustitución por un título.
- source_word: תַּחַת יְרִיעוֹת
  english_pob_choice: is under curtains
  chosen_spanish: está debajo de cortinas
  alternatives_spanish:
  - está bajo cortinas
  - está bajo las cortinas
  - está debajo de tiendas
  lexicon: HALOT
  rationale: יְרִיעוֹת designa paños o cortinas, especialmente de tienda/tabernáculo. «Debajo de cortinas» mantiene la imagen sin añadir una interpretación más específica de la que el hebreo exige.
theological_decisions:
- issue: Renderización del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Jehová
  - el SEÑOR
  rationale: El texto hebreo usa el Tetragrámaton directamente. Se conserva el nombre divino con la transliteración establecida por el proyecto, evitando la sustitución litúrgica por «el SEÑOR» y manteniendo la referencia al nombre revelado a Israel.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
translation_notes:
  revision_awareness: 'Se siguió el audit trail inglés: se mantuvo la repetición de «casa» / «casa de cedro», se preservó el contraste entre la residencia de David y la del arca, y se reflejó la decisión doctrinal de traducir יְהוָה como «Yahvé». No hubo cambios revisados adicionales en el pasaje inglés.'
  spanish_consistency_notes:
  - Se emplea «Yahvé» de forma consistente para יְהוָה.
  - Se mantiene «arca del pacto» como fórmula estable y clara.
  - «Habitar» se usa para reproducir la repetición verbal de יָשַׁב sin caer en un calco rígido.
  - «Casa de cedro» conserva la imagen hebrea y la comparación retórica del versículo.
