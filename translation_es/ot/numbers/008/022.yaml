  text: וְ/אַחֲרֵי כֵ֞ן בָּ֣אוּ הַ/לְוִיִּ֗ם לַ/עֲבֹ֤ד אֶת עֲבֹֽדָתָ/ם֙ בְּ/אֹ֣הֶל מוֹעֵ֔ד לִ/פְנֵ֥י אַהֲרֹ֖ן וְ/לִ/פְנֵ֣י בָנָ֑י/ו כַּ/אֲשֶׁר֩ צִוָּ֨ה יְהוָ֤ה אֶת מֹשֶׁה֙ עַל הַ/לְוִיִּ֔ם כֵּ֖ן עָשׂ֥וּ לָ/הֶֽם־־־־׃ס
base_translation:
  language: en
  yaml_path: translation/ot/numbers/008/022.yaml
  text: And after that the Levites came to do their service in the tent of meeting before Aaron and before his sons. Just as Yahweh had commanded Moses concerning the Levites[a], so they did to them.
  footnotes:
  - marker: a
    text: Or 'so they did to them.' The Hebrew is concise and may refer to carrying out the prescribed rites with respect to the Levites.
    reason: lexical_alternative
