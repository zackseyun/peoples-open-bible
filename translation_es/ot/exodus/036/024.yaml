translation:
  language: es
  text: E hizo cuarenta bases de plata bajo los veinte marcos[a], dos bases bajo un marco para sus dos espigas, y dos bases bajo el otro marco para sus dos espigas.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «zócalos» en lugar de «bases» para los soportes de plata bajo los marcos.
    reason: lexical_alternative
lexical_decisions:
- source_word: אַדְנֵי / אֲדָנִים
  english_pob_choice: bases
  chosen_spanish: bases
  alternatives_spanish:
  - zócalos
  - soportes
  - sockets
  lexicon: HALOT
  rationale: En el contexto del tabernáculo, el término designa la pieza de apoyo donde se insertaban los marcos. «Bases» conserva la función estructural con español claro y moderno; «zócalos» o «soportes» son posibles, pero menos precisos o menos naturales aquí. Se evita «sockets» por no ser español.
- source_word: כֶסֶף
  english_pob_choice: silver
  chosen_spanish: plata
  alternatives_spanish:
  - de plata
  - plateadas
  lexicon: HALOT
  rationale: El material es literalmente plata. En español, «bases de plata» es natural y fiel; mantiene la relación material sin añadir interpretación.
- source_word: עָשָׂה
  english_pob_choice: made
  chosen_spanish: hizo
  alternatives_spanish:
  - fabricó
  - realizó
  lexicon: HALOT
  rationale: «Hizo» reproduce el verbo común de fabricación y construcción sin sobrecargar el texto. En una sección técnica como esta, evita una paráfrasis innecesaria.
- source_word: תַּחַת
  english_pob_choice: under
  chosen_spanish: debajo de
  alternatives_spanish:
  - bajo
  - bajo de
  lexicon: HALOT
  rationale: La preposición indica colocación inferior o de sostén. «Debajo de» comunica bien la relación espacial en español y respeta el paralelismo repetido del hebreo.
- source_word: הַקְּרָשִׁים / הַקֶּרֶשׁ
  english_pob_choice: frames / frame
  chosen_spanish: marcos / marco
  alternatives_spanish:
  - tablones / tablón
  - tablas / tabla
  lexicon: HALOT
  rationale: En el contexto del tabernáculo, la POB inglesa ya opta por «frames» para expresar la función arquitectónica de קֶרֶשׁ. «Marcos» es el equivalente español más cercano en una construcción de soporte, y evita el posible malentendido de «tablas» o «tablones» como simples piezas planas.
- source_word: שְׁנֵי
  english_pob_choice: two
  chosen_spanish: dos
  alternatives_spanish:
  - ambos
  lexicon: HALOT
  rationale: Número cardinal directo y sin ambigüedad.
- source_word: הָאֶחָד
  english_pob_choice: the one / the other
  chosen_spanish: un / el otro
  alternatives_spanish:
  - el uno / el otro
  - uno / otro
  lexicon: HALOT
  rationale: 'El hebreo distribuye el conteo entre dos marcos: primero «el uno», luego «el otro». En español, «un marco» en la primera cláusula y «el otro marco» en la segunda preservan el contraste sin sonar forzado.'
- source_word: לִשְׁתֵּי יְדֹתָיו
  english_pob_choice: for its two tenons
  chosen_spanish: para sus dos espigas
  alternatives_spanish:
  - para sus dos tenones
  - para sus dos salientes
  - para sus dos proyecciones
  lexicon: HALOT
  rationale: El término hebreo es literalmente «manos», pero en este contexto describe las prolongaciones que encajan en las bases. «Espigas» es un equivalente arquitectónico natural en español y comunica la pieza de ensamblaje con claridad. Se evita «tenones» por ser menos idiomático; aun así, la equivalencia funcional queda preservada.
- source_word: וּ
  english_pob_choice: and
  chosen_spanish: y
  alternatives_spanish:
  - e
  lexicon: HALOT
  rationale: Conjunción simple de coordinación, repetida en el paralelismo del versículo.
translation_notes:
  revision_awareness: La redacción sigue el texto hebreo de manera cercana y refleja la revisión inglesa más reciente, que eliminó el artículo innecesario en la primera mención de «one frame» mientras conservó el contraste con «the other frame». En español se resuelve como «un marco» / «el otro marco» para mantener el paralelismo y la precisión distributiva sin introducir un artículo definido donde el hebreo no lo exige.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» para el tetragrámaton en coherencia con los defaults del proyecto, aunque este versículo no lo contiene.
  - Se usa «plata» y no un término eclesiástico o tradicional no motivado por el hebreo.
  - «Marcos» se adopta por función estructural; si en versículos vecinos aparece el mismo término, conviene conservar la misma opción para consistencia interna.
  - 'La nota al pie preserva la alternativa lexical documentada en la POB inglesa: «bases» frente a «zócalos»/«sockets».'
