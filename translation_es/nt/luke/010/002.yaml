translation:
  language: es
  text: 'Y él les dijo[a]: «La mies es mucha, pero los obreros son pocos. Por tanto, rueguen al Señor de la mies que[b] envíe obreros a su mies».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «les estaba diciendo». El imperfecto griego puede sugerir un decir continuado, pero en español el pretérito simple es natural en esta introducción narrativa.
    reason: lexical_alternative
  - marker: b
    text: El verbo griego puede ser más fuerte que «enviar» y sugerir un impulso o despachar con energía; se conserva aquí «envíe» por naturalidad, sin perder la nota de fuerza del original.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἔλεγεν
  english_pob_choice: he said
  chosen_spanish: les dijo
  alternatives_spanish:
  - les estaba diciendo
  lexicon: BDAG
  rationale: El imperfecto griego admite valor iterativo o de escena narrativa. En español, el pretérito simple «dijo» es natural y comunica bien la apertura del dicho sin perder el sentido.
- source_word: δὲ
  english_pob_choice: And
  chosen_spanish: Y
  alternatives_spanish:
  - Ahora
  - Pero
  lexicon: BDAG
  rationale: Aquí δέ funciona como conector suave de avance narrativo. «Y» reproduce esa continuidad de forma natural en español.
- source_word: θερισμός
  english_pob_choice: harvest
  chosen_spanish: mies
  alternatives_spanish:
  - cosecha
  - siega
  lexicon: BDAG
  rationale: «Mies» conserva la imagen agrícola y suena bíblico y natural en español. «Cosecha» sería más general; «siega» enfatiza el acto más que el resultado.
- source_word: πολύς
  english_pob_choice: plentiful
  chosen_spanish: mucha
  alternatives_spanish:
  - abundante
  - grande
  lexicon: BDAG
  rationale: Con «mies», «mucha» expresa la abundancia de manera idiomática y directa en español.
- source_word: ἐργάται
  english_pob_choice: workers
  chosen_spanish: obreros
  alternatives_spanish:
  - trabajadores
  - labradores
  lexicon: BDAG
  rationale: «Obreros» mantiene el valor de personas que realizan el trabajo de la mies. Es un equivalente claro y ampliamente entendible en registro bíblico.
- source_word: ὀλίγοι
  english_pob_choice: few
  chosen_spanish: pocos
  alternatives_spanish:
  - no muchos
  lexicon: BDAG
  rationale: «Pocos» es el contraste directo y natural de «mucha».
- source_word: δεήθητε
  english_pob_choice: pray
  chosen_spanish: rueguen
  alternatives_spanish:
  - oren
  - suplicuen
  lexicon: BDAG
  rationale: El verbo griego expresa petición ferviente. «Rueguen» mantiene la fuerza de la súplica y suena más cercano al matiz exhortativo que un simple «oren».
- source_word: κύριος
  english_pob_choice: Lord
  chosen_spanish: Señor
  alternatives_spanish:
  - amo
  - dueño
  lexicon: BDAG
  rationale: «Señor» preserva el título de autoridad y el tono reverente habitual en el discurso bíblico.
- source_word: ὅπως
  english_pob_choice: that
  chosen_spanish: que
  alternatives_spanish:
  - para que
  - a fin de que
  lexicon: BDAG
  rationale: Tras un verbo de súplica, «que» introduce de forma natural el contenido de la petición en español.
- source_word: ἐκβάλῃ
  english_pob_choice: would send out
  chosen_spanish: envíe
  alternatives_spanish:
  - saque
  - despache
  - empuje a salir
  lexicon: BDAG
  rationale: El verbo griego puede ser más fuerte que un simple «enviar». En español, «envíe» conserva la idea de mandar fuera sin introducir una aspereza que resulte extraña en el contexto de una oración. La fuerza mayor queda documentada en nota.
- source_word: εἰς τὸν θερισμὸν αὐτοῦ
  english_pob_choice: into his harvest
  chosen_spanish: a su mies
  alternatives_spanish:
  - en su mies
  - dentro de su mies
  lexicon: BDAG
  rationale: El giro preposicional se vierte de manera fluida como destino/ingreso en el ámbito de la mies. «A su mies» es natural y conserva la relación posesiva sin sobreexplicitar «campo».
theological_decisions:
- issue: Título «Señor de la mies» y su referente
  english_pob_reading: Retain the metaphorical title 'Lord of the harvest' without explicating the referent.
  chosen_spanish_reading: Mantener «Señor de la mies» sin resolver explícitamente si el referente es Dios el Padre o una identificación implícita más amplia.
  alternative_spanish_readings:
  - Dios, dueño y señor de la cosecha
  - Jesús como Señor de la mies
  rationale: El dicho presenta una autoridad divina sobre la mies y la misión, pero no explicita el desarrollo cristológico. La traducción debe preservar esa tensión teológica en vez de resolverla anticipadamente.
  doctrine_reference: Preservar la tensión teológica del pasaje sin interpretarla de más.
translation_notes:
  revision_awareness: 'El texto base en inglés quedó estable en la última revisión; no hubo cambios aplicados. Para el español se mantuvo la misma estructura semántica central: abundancia de la mies, escasez de obreros, exhortación a rogar al Señor de la mies y el verbo de envío con su matiz fuerte documentado.'
  spanish_consistency_notes:
  - Se usa «mies» para θερισμός, coherente con un registro bíblico natural en español.
  - Se usa «obreros» para ἐργάται, evitando suavizar el término a «siervos» o «trabajadores» sin necesidad.
  - Se conserva el título «Señor» para κύριος en armonía con el estándar POB y con el contexto de autoridad.
  - La nota de fuerza verbal se ancla en «envíe» para reflejar la alternativa de ἐκβάλῃ sin sobretraducción.
