translation:
  language: es
  text: ¿Dónde está el rey de Hamat, y el rey de Arpad, y el rey de la ciudad de Sefarvaim, de Hena[a] y de Ivvah[b]?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hena también puede transliterarse «Henah».
    reason: lexical_alternative
  - marker: b
    text: Ivvah también puede aparecer como «Avva» en algunas traducciones.
    reason: lexical_alternative
lexical_decisions:
- source_word: אַיֵּה
  english_pob_choice: Where is
  chosen_spanish: ¿Dónde está
  alternatives_spanish:
  - ¿Dónde se encuentra
  - ¿Dónde queda
  lexicon: HALOT
  rationale: La interjección interrogativa pide una pregunta directa de localización. En español, «¿Dónde está?» es natural y conserva el tono retórico del reproche.
- source_word: מֶלֶךְ
  english_pob_choice: king
  chosen_spanish: rey
  alternatives_spanish:
  - ruler
  - monarca
  lexicon: HALOT
  rationale: «Rey» es el equivalente más directo y conserva la repetición enfática del hebreo en cada miembro de la serie.
- source_word: חֲמָת
  english_pob_choice: Hamath
  chosen_spanish: Hamat
  alternatives_spanish:
  - Hamat
  - Hamath
  lexicon: propio
  rationale: Nombre propio de lugar transliterado al español con adaptación gráfica habitual. Se mantiene la referencia geográfica sin añadir interpretación.
- source_word: אַרְפָּד
  english_pob_choice: Arpad
  chosen_spanish: Arpad
  alternatives_spanish:
  - Arpád
  lexicon: propio
  rationale: Nombre propio transliterado de forma simple y reconocible en español.
- source_word: לָעִיר
  english_pob_choice: of the city of
  chosen_spanish: de la ciudad de
  alternatives_spanish:
  - de ciudad de
  - para la ciudad de
  lexicon: HALOT
  rationale: La relación constructa exige una formulación genitiva en español. «De la ciudad de» reproduce la cadena nominal con claridad y sin forzar un dativo.
- source_word: סְפַרְוָיִם
  english_pob_choice: Sepharvaim
  chosen_spanish: Sefarvaim
  alternatives_spanish:
  - Sefarvaim
  lexicon: propio
  rationale: Se adopta una transliteración española transparente del topónimo, manteniendo su identificación histórica y bíblica.
- source_word: הֵנַע
  english_pob_choice: Hena
  chosen_spanish: Hena
  alternatives_spanish:
  - Hená
  - Henah
  lexicon: propio
  rationale: Se conserva la forma breve «Hena» como transliteración directa. La alternativa inglesa «Henah» no se incorpora al texto principal por no ser la forma base elegida aquí.
- source_word: עִוָּה
  english_pob_choice: Ivvah
  chosen_spanish: Ivvah
  alternatives_spanish:
  - Avva
  lexicon: propio
  rationale: Se mantiene la forma transliterada usada como lectura principal en el audit trail. La variante «Avva» se reserva para nota por ser una alternativa documentada, no la forma principal adoptada.
theological_decisions:
- issue: Lista retórica de reyes y ciudades vencidos como ironía de juicio
  english_pob_reading: The question names multiple defeated rulers and places in a taunt formula.
  chosen_spanish_reading: La pregunta nombra reyes y ciudades derrotados en una fórmula de burla/ironía judicial.
  alternative_spanish_readings:
  - La pregunta solo enumera lugares sin matiz irónico explícito.
  - La frase puede leerse únicamente como interrogación informativa.
  rationale: El contexto del pasaje es un desafío contra la soberbia asiria; el español debe conservar el tono de escarnio implícito sin añadir palabras que excedan el hebreo.
  doctrine_reference: Isaías 37:13 en su contexto literario inmediato; ironía profética del juicio divino.
translation_notes:
  revision_awareness: El audit trail inglés revisó la lista para añadir «of» antes de Hena e Ivvah; en español esa relación se expresa de forma natural con «de Hena y de Ivvah», manteniendo la correspondencia con la serie hebrea sin sobrecargar la sintaxis. También se conservó la repetición de «rey» para reflejar la estructura retórica del original.
  spanish_consistency_notes:
  - Se usó «rey» en las tres repeticiones para conservar el paralelismo hebreo.
  - Se transliteraron los topónimos de manera uniforme y con ortografía española legible.
  - Las notas al pie solo cubren variantes documentadas en el audit trail, sin duplicar información innecesaria.
  - Se evitó traducir el listado con paráfrasis interpretativa más allá de la ironía ya inherente al contexto.
