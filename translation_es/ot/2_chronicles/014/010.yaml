base_translation:
  language: en
  yaml_path: translation/ot/2_chronicles/014/010.yaml
  text: And Asa cried out to Yahweh his God and said[a], “Yahweh, there is none besides you to help between the mighty and the powerless. Help us, Yahweh our God, for we rely on you, and in your name we have come against this multitude. Yahweh our God, you are our God[b]; do not let man prevail against you.”
  footnotes:
  - marker: a
    text: Or, “there is none besides you to help, whether with many or with those who have no power.” The Hebrew of this clause is compact and may emphasize either numbers or strength.
    reason: alternative_reading
  - marker: b
    text: Or, “do not let mortal man retain strength against you” / “do not let man withstand you.”
    reason: lexical_alternative
