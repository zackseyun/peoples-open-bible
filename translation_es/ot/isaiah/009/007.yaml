revisions:
- from: Yahvé envió una palabra a Jacob[a], y cayó sobre Israel.
  to: El Señor envió una palabra en Jacob[a], y cayó sobre Israel.
  rationale: Se corrige 'Yahvé' a 'El Señor' porque la fuente dice אֲדֹנָי, un título divino, no יהוה. Se ajusta 'a Jacob' a 'en Jacob' para aproximarse mejor a la revisión inglesa 'into Jacob' y conservar la tensión del hebreo sin imponer 'contra'. Se mantiene 'palabra' y 'cayó sobre Israel' por fidelidad léxica y naturalidad. La nota conserva la alternativa 'mensaje a Jacob' documentada por el POB, aunque sin desplazar el texto principal.
