review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien la estructura y el sentido general del hebreo: mandato memorial, salida de Egipto, referencia a la esclavitud, acción poderosa de Yahvé y prohibición sobre lo leudado. Sin embargo, hay dos ajustes importantes. Primero, el anclaje [a] en «pueblo[a]» no corresponde a la nota inglesa ni a una ambigüedad relevante del hebreo; además la nota dice «O “al pueblo”» cuando el texto ya dice eso. Segundo, חָמֵץ es más amplio que «pan fermentado»; el propio rastro inglés preserva la alternativa «nada fermentado», y en español conviene llevar esa amplitud al texto principal.'
  spanish_quality_summary: El español es claro y digno. «Recuerden» funciona bien para un mandato colectivo, y «casa de esclavitud» suena natural y fiel. «Con mano fuerte» también es adecuado. La principal mejora de legibilidad/fidelidad es usar «nada fermentado» en vez de «pan fermentado», porque evita estrechar innecesariamente la prohibición.
  glossary_alignment: Se respeta correctamente «Yahvé» para יְהוָה. La elección «casa de esclavitud» mantiene bien la fuerza de עֲבָדִים sin suavizarla. No hay conflictos con la terminología base del proyecto fuera del estrechamiento de חָמֵץ.
  issues:
  - severity: medium
    issue: Nota [a] innecesaria y mal formulada
    rationale: El marcador [a] se ancla en «pueblo» pero la nota ofrece «O “al pueblo”», que no es una alternativa real al texto ya presente. Tampoco corresponde a una ambigüedad significativa del original ni del audit trail inglés.
  - severity: medium
    issue: «pan fermentado» estrecha el alcance de חָמֵץ
    rationale: El hebreo חָמֵץ se refiere a lo leudado/fermentado en general. El inglés principal eligió «leavened bread», pero preservó como alternativa «nothing leavened». En español, «nada fermentado» es más fiel al alcance semántico y más natural para una prohibición general.
