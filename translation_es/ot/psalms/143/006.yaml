    issue: Orden y sintaxis poco natural en 'mi alma es como una tierra fatigada para ti'
    rationale: Aunque reproduce de cerca el hebreo, en español esa secuencia suena torpe y ambigua. Reordenar a 'mi alma es para ti como una tierra fatigada' conserva mejor la orientación de לְךָ y mejora la fluidez.
  - severity: low
