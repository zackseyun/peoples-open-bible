translation:
  language: es
  text: 'Y dirán[a]: “Esta tierra que estaba desolada se ha vuelto como el jardín de Edén; y las ciudades arruinadas, desoladas y demolidas están fortificadas y habitadas.”'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Esta tierra desolada se ha vuelto como el jardín de Edén».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְאָמְרוּ
  english_pob_choice: And they will say
  chosen_spanish: Y dirán
  alternatives_spanish:
  - Entonces dirán
  - Y dirá la gente
  lexicon: HALOT
  rationale: El verbo con waw consecutiva en discurso profético comunica una acción futura dentro de la secuencia de restauración. El plural impersonal 'dirán' conserva el sujeto plural del hebreo sin añadir una glosa innecesaria.
- source_word: הָאָרֶץ הַלֵּזוּ הַנְּשַׁמָּה
  english_pob_choice: This land that was desolate
  chosen_spanish: Esta tierra que estaba desolada
  alternatives_spanish:
  - Esta tierra desolada
  - Esta tierra, la desolada
  lexicon: HALOT
  rationale: Se mantiene el demostrativo 'esta' y el valor descriptivo de נְשַׁמָּה como 'desolada'. La relativa 'que estaba' reproduce bien el matiz de estado previo que el inglés POB expresó con 'that was'.
- source_word: הָיְתָה
  english_pob_choice: has become
  chosen_spanish: se ha vuelto
  alternatives_spanish:
  - ha llegado a ser
  - se ha convertido
  lexicon: HALOT
  rationale: El verbo puede indicar cambio de estado. 'Se ha vuelto' comunica el resultado de la restauración sin forzar una formulación más interpretativa.
- source_word: כְּגַן עֵדֶן
  english_pob_choice: like the garden of Eden
  chosen_spanish: como el jardín de Edén
  alternatives_spanish:
  - como el huerto de Edén
  - como el jardín del Edén
  lexicon: HALOT
  rationale: El hebreo usa comparación explícita con כְּ. 'Jardín de Edén' es claro y natural en español, y conserva el referente propio sin suavizar la imagen.
- source_word: וְהֶעָרִים
  english_pob_choice: and the cities
  chosen_spanish: y las ciudades
  alternatives_spanish:
  - y los poblados
  lexicon: HALOT
  rationale: עִיר normalmente designa 'ciudad'; 'ciudades' mantiene el sentido estándar y el paralelismo del texto.
- source_word: הֶחֳרֵבוֹת
  english_pob_choice: ruined
  chosen_spanish: arruinadas
  alternatives_spanish:
  - en ruinas
  - destruidas
  lexicon: HALOT
  rationale: Como adjetivo referido a ciudades, 'arruinadas' es natural y reproduce la idea de devastación estructural sin exagerar el aspecto militar.
- source_word: הַנְשַׁמּוֹת
  english_pob_choice: desolate
  chosen_spanish: desoladas
  alternatives_spanish:
  - devastadas
  - asoladas
  lexicon: HALOT
  rationale: Se conserva la repetición semántica de desolación con 'desoladas', evitando sustituirla por un término demasiado distinto que borre la acumulación descriptiva.
- source_word: הַנֶּהֱרָסוֹת
  english_pob_choice: demolished
  chosen_spanish: demolidas
  alternatives_spanish:
  - derribadas
  - destruidas
  lexicon: HALOT
  rationale: El participio pasivo de הרס apunta a algo derribado o demolido. 'Demolidas' corresponde bien al matiz concreto de estructuras destruidas mediante derribo.
- source_word: בְּצוּרוֹת
  english_pob_choice: fortified
  chosen_spanish: fortificadas
  alternatives_spanish:
  - amuralladas
  - aseguradas
  lexicon: HALOT
  rationale: El adjetivo significa defendidas o hechas fortaleza. 'Fortificadas' es preciso y evita restringir el medio a muros, como haría 'amuralladas'.
- source_word: יָשָׁבוּ
  english_pob_choice: inhabited
  chosen_spanish: habitadas
  alternatives_spanish:
  - pobladas
  - ocupadas
  lexicon: HALOT
  rationale: Con 'ciudades' como sujeto, 'habitadas' expresa bien el resultado de tener residentes. 'Habitadas' mantiene la naturalidad del español sin perder la noción de permanencia.
translation_notes:
  revision_awareness: El inglés POB revisó la primera parte para mantener 'This land that was desolate' y la cola nominal 'the ruined, desolate, and demolished cities'. El español sigue esa misma estructura descriptiva, preservando la triple acumulación de adjetivos y el resultado final de fortificación e inhabitación.
  spanish_consistency_notes:
  - Se usa 'Yahvé' no aplica aquí porque el versículo no contiene el nombre divino.
  - Se preserva la secuencia adjetival de las ciudades para no diluir la acumulación enfática del hebreo.
  - '''Desolada'' y ''desoladas'' mantienen continuidad léxica entre el singular inicial y el plural posterior.'
