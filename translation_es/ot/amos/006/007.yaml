translation:
  language: es
  text: Por tanto, ahora irán al destierro al frente de los desterrados, y cesará la juerga de los que se echan[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «el banquete de los que están tendidos» o «la juerga de los que se recuestan». La expresión hebrea es compacta y probablemente alude a recostarse en divanes en el versículo anterior.
