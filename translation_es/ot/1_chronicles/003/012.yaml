lexical_decisions:
- source_word: אֲמַצְיָהוּ
  english_pob_choice: Amaziah
  chosen_spanish: Amasías
  alternatives_spanish:
  - Amazías
  lexicon: HALOT
  rationale: Nombre propio hebreo transliterado al español con la forma bíblica más reconocible y eufónica. Se mantiene la identidad nominal sin interpretar ni traducir.
- source_word: בְנוֹ
  english_pob_choice: his son
  chosen_spanish: su hijo
  alternatives_spanish:
  - su descendiente
  lexicon: HALOT
  rationale: La forma con sufijo masculino singular expresa filiación directa; en genealogía se conserva literalmente como «su hijo» para reflejar con transparencia la fórmula hebrea repetida.
- source_word: עֲזַרְיָה
  english_pob_choice: Azariah
  chosen_spanish: Azarías
  alternatives_spanish:
  - Uzzías
  lexicon: HALOT
  rationale: La forma hebrea aquí es עֲזַרְיָה, por lo que se traduce el nombre tal como aparece en el texto fuente. «Uzzías» es un nombre alterno conocido del mismo rey en otros pasajes, pero no debe importarse aquí sin base textual inmediata.
- source_word: בְנוֹ
  english_pob_choice: his son
  chosen_spanish: su hijo
  alternatives_spanish:
  - su descendiente
  lexicon: HALOT
  rationale: Se mantiene el mismo valor genealógico y la misma literalidad que en la primera aparición, evitando generalizar la relación familiar.
- source_word: יוֹתָם
  english_pob_choice: Jotham
  chosen_spanish: Jotam
  alternatives_spanish:
  - Yotam
  lexicon: HALOT
  rationale: Nombre propio transliterado al español con ortografía bíblica usual y legible para lectores de iglesia.
- source_word: בְנוֹ
  english_pob_choice: his son
  chosen_spanish: su hijo
  alternatives_spanish:
  - su descendiente
  lexicon: HALOT
  rationale: Se conserva la repetición de la misma fórmula genealógica para mantener la transparencia del hebreo y la estructura del linaje.
theological_decisions:
- issue: Tratamiento de la fórmula genealógica repetida
  english_pob_reading: Retain the literal filial formula 'his son' throughout.
  chosen_spanish_reading: Conservar la fórmula literal «su hijo» en las tres repeticiones.
  alternative_spanish_readings:
  - «su descendiente» en una o más ocurrencias
  rationale: Aunque las genealogías bíblicas pueden abreviar generaciones, el hebreo usa explícitamente בן con sufijo posesivo. No hay necesidad contextual de expandir el sentido; conservar la literalidad preserva la audibilidad del patrón genealógico.
  doctrine_reference: Translation philosophy §1, §5
translation_notes:
  revision_awareness: 'El pasaje presenta acuerdo alto con la revisión inglesa: no hubo cambios aplicados y el texto fuente mantiene una lectura genealógica lineal con nombres propios transliterados. La versión española sigue esa transparencia sin armonizar el nombre de Azarías con Uzzías.'
  spanish_consistency_notes:
  - Se eligió «Amasías» para el nombre הראשון, «Azarías» para la forma hebrea explícita del segundo nombre y «Jotam» para el tercero.
  - Se conservó la secuencia repetida «su hijo» para reflejar בְנוֹ en cada aparición.
  - Se evitó «SEÑOR» o cualquier terminología no pertinente; el pasaje contiene solo nombres propios y relaciones genealógicas.
