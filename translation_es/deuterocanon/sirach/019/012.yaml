    issue: «Corrige» para Ἔλεγξον
    rationale: El griego puede incluir reprensión, pero en este contexto la lógica es confrontar por indagación, porque quizá el amigo no lo hizo. «Corrige» presupone más culpabilidad de la que el texto todavía no establece.
  - severity: medium
    issue: «no sea que quizás» es poco idiomático
    rationale: Aunque intenta reflejar μή ποτε, en español la combinación resulta torpe. «No sea que no lo haya hecho» o «quizá no lo haya hecho» transmite mejor la cautela sin calco extraño.
  - severity: low
    issue: Tiempo verbal «no lo hizo»
    rationale: No es incorrecto, pero «no lo haya hecho» encaja mejor tras «no sea que» en español estándar y mantiene la posibilidad cautelar.
