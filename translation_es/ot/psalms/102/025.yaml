translation:
  language: es
  text: 'Digo[a]: «Dios mío, no me quites[b] en la mitad de mis días; tus años son de generación en generación[c]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El hebreo puede funcionar aquí como una introducción discursiva en tiempo presente al ruego del salmista.
    reason: translation_note
  - marker: b
    text: O, más literalmente, «no me hagas subir». El verbo hebreo puede significar «hacer subir», pero aquí probablemente expresa ser quitado o removido prematuramente de la vida.
    reason: lexical_alternative
  - marker: c
    text: O «a través de todas las generaciones». La expresión hebrea comunica continuidad a través de generaciones sucesivas.
    reason: lexical_alternative
lexical_decisions:
- source_word: אֹמַר
  english_pob_choice: I say
  chosen_spanish: Yo digo
  alternatives_spanish:
  - Digo
  - Yo dirijo estas palabras
  lexicon: HALOT
  rationale: El hebreo en primera persona imperfecta funciona aquí como introducción viva del ruego. «Yo digo» conserva el valor discursivo y la inmediatez sin forzar un pasado narrativo.
- source_word: אֵלִי
  english_pob_choice: My God
  chosen_spanish: Dios mío
  alternatives_spanish:
  - Mi Dios
  - Oh Dios mío
  lexicon: HALOT
  rationale: 'La forma con sufijo posesivo expresa posesión relacional: «mi Dios». En español, «Dios mío» suena natural y reverente; conserva la relación vocativa sin añadir más de lo que exige el texto.'
- source_word: אַל
  english_pob_choice: do not
  chosen_spanish: 'no'
  alternatives_spanish:
  - que no
  - no permitas
  lexicon: HALOT
  rationale: Con la forma jussiva/prohibitiva del verbo, el imperativo negativo español más directo es «no». Mantiene la súplica sin intensificarla con una perífrasis ajena al hebreo.
- source_word: תַּעֲלֵנִי
  english_pob_choice: take me away
  chosen_spanish: me quites
  alternatives_spanish:
  - me saques
  - me lleves
  - me hagas subir
  lexicon: HALOT
  rationale: El verbo עלה en hifil puede ser literalmente «hacer subir / traer arriba», pero en este contexto poético alude a ser retirado prematuramente de la vida. «Me quites» expresa bien la idea contextual de ser apartado o removido, sin perder la fuerza del pedido. He dejado una nota para la alternativa más literal.
- source_word: בַּחֲצִי יָמָי
  english_pob_choice: in the middle of my days
  chosen_spanish: en la mitad de mis días
  alternatives_spanish:
  - a media vida
  - en medio de mis días
  lexicon: HALOT
  rationale: La imagen literal de «la mitad de mis días» se entiende con naturalidad en español y preserva la metáfora de vida truncada. «En la mitad de mis días» es más fiel que una paráfrasis como «a media vida».
- source_word: בְּדוֹר דּוֹרִים
  english_pob_choice: through all generations
  chosen_spanish: por todas las generaciones
  alternatives_spanish:
  - de generación en generación
  - por generación tras generación
  lexicon: HALOT
  rationale: La expresión hebrea denota continuidad ininterrumpida a través de generaciones sucesivas. «Por todas las generaciones» comunica esa amplitud duradera y mantiene el paralelismo con la eternidad de los años de Dios.
- source_word: שְׁנוֹתֶיךָ
  english_pob_choice: your years
  chosen_spanish: tus años
  alternatives_spanish:
  - los años tuyos
  - tus edades
  lexicon: HALOT
  rationale: El sustantivo plural con sufijo posesivo se traduce de manera directa y sobria como «tus años», en contraste con la brevedad de los días del salmista.
theological_decisions:
- issue: Sentido idiomático del verbo תַּעֲלֵנִי en un contexto de vida truncada
  english_pob_reading: Rendered as 'take me away' to express a plea not to be removed from life prematurely.
  chosen_spanish_reading: «me quites» en el sentido de ser apartado de la vida antes de tiempo
  alternative_spanish_readings:
  - me saques
  - me lleves
  - me hagas subir
  rationale: La forma más literal («hacer subir / traer arriba») puede resultar oscura o incluso confusa en español. Dado el contraste con «la mitad de mis días», la lectura contextual apunta a una remoción prematura, no a un desplazamiento espacial. «Me quites» transmite esa tensión sin domesticarla demasiado.
  doctrine_reference: Translation philosophy §1, §6
- issue: Relación entre la brevedad humana y la permanencia divina
  english_pob_reading: '''your years are through all generations.'''
  chosen_spanish_reading: «tus años son por todas las generaciones»
  alternative_spanish_readings:
  - tus años son de generación en generación
  - tus años son para siempre
  rationale: El hebreo subraya continuidad a través de generaciones; no es solo eternidad abstracta sino duración ininterrumpida frente a la vida truncada del orante. La formulación elegida conserva ese contraste sin convertirlo en una simple declaración doctrinal ampliada.
  doctrine_reference: Psalms theology; Translation philosophy §6
translation_notes:
  revision_awareness: Se revisó el hebreo consonántico y la segmentación morfológica del verso; la versión inglesa auditada fue útil para confirmar el valor idiomático de תַּעֲלֵנִי y la fuerza colectiva de בְּדוֹר דּוֹרִים. No se identificaron revisiones posteriores que alteren el sentido base.
  spanish_consistency_notes:
  - Se mantuvo «Dios mío» como vocativo natural y reverente, evitando introducir «Señor» o «Yahvé», ya que el hebreo aquí dice אֵלִי («mi Dios»).
  - Se prefirió «tus años» frente a perífrasis más largas para conservar el paralelismo poético con «mis días».
  - La nota del verbo se ancló para preservar la tensión entre literalidad y sentido contextual sin ocultarla en el texto principal.
