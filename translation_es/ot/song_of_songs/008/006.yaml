  yaml_path: translation/ot/song_of_songs/008/006.yaml
  text: Set me as a seal upon your heart[a], as a seal upon your arm; for love is as strong as death, jealousy as relentless as Sheol. Its flashes are flashes of fire[c][b], a flame of Yah.
