source:
  edition: WLC
  text: אַֽל תִּ֭תְּנֵ/נִי בְּ/נֶ֣פֶשׁ צָרָ֑/י כִּ֥י קָֽמוּ בִ֥/י עֵֽדֵי שֶׁ֝֗קֶר וִ/יפֵ֥חַ חָמָֽס־־־׃
base_translation:
  language: en
  yaml_path: translation/ot/psalms/027/012.yaml
  text: Do not give me over to the desire of my adversaries[a], for false witnesses have risen against me[c][b], and they breathe out violence.
  footnotes:
  - marker: a
    text: Or 'Do not hand me over to the will of my adversaries.' The Hebrew noun נֶפֶשׁ here likely carries the sense of desire, appetite, or will rather than 'soul' in a narrow sense.
    reason: lexical_alternative
  - marker: b
    text: Or 'false witnesses have risen against me, breathing out violence.' The final clause may describe the false witnesses collectively rather than a single witness.
    reason: lexical_alternative
  - marker: c
    text: Or 'and one who breathes out violence'.
    reason: previous_rendering
