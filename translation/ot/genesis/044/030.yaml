id: GEN.44.30
reference: Genesis 44:30
source:
  edition: WLC
  text: וְ/עַתָּ֗ה כְּ/בֹאִ/י֙ אֶל עַבְדְּ/ךָ֣ אָבִ֔/י וְ/הַ/נַּ֖עַר אֵינֶ֣/נּוּ אִתָּ֑/נוּ וְ/נַפְשׁ֖/וֹ קְשׁוּרָ֥ה בְ/נַפְשֽׁ/וֹ־׃
translation:
  text: Now[a], when I come to your servant my father[b], and the boy is not with us—his life being bound up with the boy’s life—
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, 'his soul is bound up in his soul'; the Hebrew uses נֶפֶשׁ ('soul/life/self') for both persons, with the second pronoun referring contextually to the boy, Benjamin.
    reason: lexical_alternative
  - marker: b
    text: Or 'and the boy is not with us, since his life is bound up with the boy’s life,'.
    reason: previous_rendering
lexical_decisions:
- source_word: וְעַתָּה
  chosen: Now
  alternatives:
  - And now
  lexicon: HALOT
  rationale: Introduces the next step in Judah's plea. 'Now' is natural English here; the conjunctive force of ו is absorbed into the discourse flow.
- source_word: כְּבֹאִי
  chosen: when I come
  alternatives:
  - as I come
  - upon my coming
  lexicon: HALOT
  rationale: 'The prefixed כ with infinitive construct plus 1cs suffix expresses a temporal sense: ''when I come'' or ''when I arrive.'' ''When I come'' is idiomatic and preserves the forward-looking condition.'
- source_word: אֶל עַבְדְּךָ אָבִי
  chosen: to your servant my father
  alternatives:
  - to your servant, my father
  lexicon: HALOT
  rationale: Judah addresses Joseph deferentially, referring to Jacob as 'your servant my father.' The appositional relationship is preserved without overpunctuating.
- source_word: הַנַּעַר
  chosen: the boy
  alternatives:
  - the young man
  - the lad
  lexicon: HALOT
  rationale: Though Benjamin is not a small child, נַעַר commonly denotes a youth/young man. 'The boy' reflects the familial and emotional tone of Judah's speech better than the more formal 'young man.'
- source_word: אֵינֶנּוּ אִתָּנוּ
  chosen: is not with us
  alternatives:
  - is absent from us
  lexicon: HALOT
  rationale: A straightforward existential-negative expression. 'Is not with us' is the plain and idiomatic rendering.
- source_word: וְנַפְשׁוֹ
  chosen: his life
  alternatives:
  - his soul
  - his self
  lexicon: HALOT
  rationale: In this context נֶפֶשׁ refers to the father's very life, not a technical anthropological 'soul.' 'Life' best conveys the emotional dependence in context.
- source_word: קְשׁוּרָה
  chosen: is bound up
  alternatives:
  - is tied
  - is knit
  lexicon: HALOT
  rationale: The passive participial/adjectival sense conveys a strong bond. 'Bound up' is idiomatic English and matches the relational intensity.
- source_word: בְנַפְשׁוֹ
  chosen: with the boy’s life
  alternatives:
  - to his life
  - with his life
  lexicon: HALOT
  rationale: The suffix in the final phrase refers contextually to the boy, Benjamin, not back to the father himself; otherwise the statement would be reflexive and nonsensical. Rendering the referent explicitly in English clarifies the Hebrew pronoun's contextual antecedent.
