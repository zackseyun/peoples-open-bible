  to: Despoja a Aarón de sus vestiduras[a] y ponlas sobre Eleazar su hijo. Luego Aarón será reunido[b] y morirá allí.
  rationale: La revisión elimina la expansión no atestiguada 'con sus padres' para reflejar con fidelidad el hebreo יֵאָסֵף y la decisión teológica del POB de conservar el idiomático de muerte. También corrige la nota sobre 'vestiduras', alinea mejor las notas con el rastro inglés y mejora la naturalidad de la cláusula de transferencia de ropa en español.
