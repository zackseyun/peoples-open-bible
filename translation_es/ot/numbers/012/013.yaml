    rationale: La nota trata sobre la repetición de נָא y debe anclarse a la súplica, no al nombre divino.
  - severity: medium
    issue: Forma gráfica «sana[a]la» incorrecta
    rationale: 'En español el imperativo con pronombre enclítico debe escribirse unido y con acento: «sánala». La inserción del marcador rompe la palabra de manera poco legible.'
  revised_spanish_text: 'Entonces Moisés clamó a Yahvé, diciendo: «¡Oh Dios, por favor, sánala[a]!».'
