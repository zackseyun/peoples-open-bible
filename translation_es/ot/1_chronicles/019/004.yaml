review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien la secuencia y el sentido básico del hebreo: Hanún toma a los hombres de David, los afeita/rasura, corta su ropa por la mitad hasta una zona vergonzosa del cuerpo, y luego los envía. También preserva correctamente la nota de que Crónicas no explicita el objeto del rasurado. Sin embargo, hay dos ajustes de fidelidad y estilo: (1) עַבְדֵי aquí corresponde mejor a ''servidores'' o ''siervos'' en contexto diplomático; ''siervos'' es aceptable pero algo más tradicional/feudal que el inglés auditado. (2) ''los despidió'' puede sonar a terminación de empleo; וַיְשַׁלְּחֵם se refleja mejor con ''los envió de vuelta'' o ''los mandó lejos/los envió''.'
  spanish_quality_summary: El español es claro y legible, pero 'despidió' introduce una connotación moderna no ideal. Además, conviene una puntuación más fluida con coma antes del último verbo. 'Hasta las caderas' mantiene el registro formal del audit trail, aunque la nota debe explicar mejor que el hebreo apunta más específicamente a la parte trasera/nalgas, no simplemente a la cadera.
  glossary_alignment: No hay términos teológicos sensibles en este versículo. La elección 'siervos' no viola el glosario, pero por el contexto de emisarios reales 'servidores' suena más natural en español actual sin perder la relación de servicio. 'Rasuró' es defendible; 'afeitó' también sería posible, pero 'rasuró' preserva bien la indeterminación. 'Vestidos' es aceptable, aunque 'ropas' sería más natural; no es necesario cambiarlo.
  issues:
  - severity: medium
    issue: '''los despidió'' no refleja con precisión natural ''sent them away'''
    rationale: En español actual, 'despedir' suele sugerir cesar a alguien de un cargo o despedirse de alguien. El hebreo וַיְשַׁלְּחֵם expresa simplemente que los envió/mandó después de humillarlos.
  - severity: low
    issue: La nota [b] mezcla 'área trasera/cadera' de forma imprecisa
    rationale: El audit trail inglés aclara que el hebreo se refiere a la zona de las nalgas/parte trasera, con 'hips' como opción de registro más formal en el texto principal. La nota española debe preservar esa especificidad mejor.
  - severity: low
    issue: '''siervos'' es menos natural que ''servidores'' en este contexto diplomático'
    rationale: Aunque no es incorrecto, el contexto es de enviados de David, no de servidumbre doméstica o esclavitud. 'Servidores' mantiene bien el sentido contextual y suena más natural en español neutral.
  revised_spanish_text: Así que Hanún tomó a los servidores de David[a], los rasuró, cortó sus vestidos en dos hasta las caderas[b], y los envió de vuelta.
  revised_footnotes:
  - marker: a
    text: El paralelo de 2 Samuel 10:4 especifica que Hanún les rasuró la mitad de la barba; Crónicas solo dice que 'los rasuró'.
    reason: cross_reference
  - marker: b
    text: O 'hasta las nalgas'. El hebreo se refiere a la parte trasera del cuerpo y subraya la humillación pública por la exposición.
    reason: lexical_alternative
  revision_rationale: Se ajustó 'siervos' a 'servidores' por naturalidad contextual en una misión diplomática; se reemplazó 'los despidió' por 'los envió de vuelta' para reflejar mejor וַיְשַׁלְּחֵם; y se precisó la nota [b] para conservar la especificidad léxica del hebreo sin perder el registro formal del texto principal.
