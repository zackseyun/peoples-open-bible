    rationale: La nota [a] explica 'el apéndice del hígado', por lo que debe ir con 'el lóbulo del hígado', no con 'las entrañas'. La nota [b] explica el verbo sacrificial, por lo que debe ir con el verbo 'quemó', no con 'su grasa'.
