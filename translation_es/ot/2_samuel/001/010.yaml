revisions:
- from: Así que me puse sobre él y lo maté[a], porque sabía que no viviría después de su caída. Luego tomé la corona que estaba sobre su cabeza y el brazalete[b] que estaba sobre su brazo, y los traje aquí a mi señor.
  to: Así que me puse de pie junto a él y lo maté[a], porque sabía que no viviría después de su caída. Luego tomé la corona que estaba sobre su cabeza y el brazalete[b] que estaba sobre su brazo, y los traje aquí a mi señor.
  rationale: Se ajusta la primera cláusula para reflejar de manera más natural y precisa el sentido de עמד על en español, evitando la impresión de que el hablante se colocó físicamente encima de Saúl. También se corrige la nota léxica [a] para eliminar la alternativa 'lo ejecuté', que añade un matiz judicial no sustentado por el hebreo.
