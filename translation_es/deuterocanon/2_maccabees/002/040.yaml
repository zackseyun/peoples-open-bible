translation:
  language: es
  text: Las mismas cosas también se relataban en los registros y en las memorias acerca de Nehemías[a], y cómo, al fundar una biblioteca, reunió los libros sobre los reyes y los profetas, y los escritos de David, y cartas de reyes acerca de ofrendas votivas[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «mientras fundaba una biblioteca». El participio griego puede expresar el acto de fundar o establecer la biblioteca.
    reason: lexical_alternative
  - marker: b
    text: «Ofrendas votativas» designa dones dedicados a Dios; el término griego también puede traducirse «dones dedicados» o «cosas dedicadas».
    reason: lexical_alternative
lexical_decisions:
- source_word: Ἐξηγοῦντο
  english_pob_choice: were related
  chosen_spanish: se relataban
  alternatives_spanish:
  - se narraban
  - se exponían
  - se contaban
  lexicon: LSJ
  rationale: El contexto es documental e introduce lo que decían los registros y memorandos; «se relataban» conserva el valor de transmisión de contenido sin sugerir una explicación técnica.
- source_word: ἀναγραφαῖς
  english_pob_choice: records
  chosen_spanish: registros
  alternatives_spanish:
  - archivos
  - registros públicos
  - escritos
  lexicon: LSJ
  rationale: Es un término general para documentos escritos o archivísticos. «Registros» es claro en español y encaja con el paralelismo con «memorandos».
- source_word: ὑπομνηματισμοῖς
  english_pob_choice: memoirs
  chosen_spanish: memorandos
  alternatives_spanish:
  - memorias
  - notas
  - memoriales
  lexicon: LSJ
  rationale: En este contexto se trata de escritos recordatorios o memoriales, no de «memorias» autobiográficas. «Memorandos» conserva el matiz de nota/memorial documental que el griego puede tener aquí.
- source_word: τοῖς κατὰ τὸν Νεεμίαν
  english_pob_choice: concerning Nehemiah
  chosen_spanish: acerca de Nehemías
  alternatives_spanish:
  - sobre Nehemías
  - relativos a Nehemías
  lexicon: LSJ
  rationale: La frase indica relación temática con Nehemías. «Acerca de» es idiomático y no fuerza una autoría que el texto no afirma explícitamente.
- source_word: καταβαλλόμενος
  english_pob_choice: in founding
  chosen_spanish: al fundar
  alternatives_spanish:
  - al establecer
  - mientras fundaba
  - al poner los cimientos de
  lexicon: LSJ
  rationale: Con βιβλιοθήκην, el verbo expresa el acto de establecer una biblioteca. «Al fundar» reproduce bien la acción iniciada sin sonar artificial en español.
- source_word: βιβλιοθήκην
  english_pob_choice: a library
  chosen_spanish: una biblioteca
  alternatives_spanish:
  - una colección de libros
  - un archivo de libros
  lexicon: LSJ
  rationale: El sentido directo es una colección organizada de libros; «biblioteca» es transparente y fiel.
- source_word: ἐπισυνήγαγεν
  english_pob_choice: he gathered together
  chosen_spanish: reunió
  alternatives_spanish:
  - recopiló
  - juntó
  - agrupó
  lexicon: LSJ
  rationale: El verbo enfatiza reunir en un solo lugar. «Reunió» es natural y mantiene la fuerza de acumulación.
- source_word: τὰ περὶ τῶν βασιλέων καὶ προφητῶν βιβλία
  english_pob_choice: the books about the kings and prophets
  chosen_spanish: los libros sobre los reyes y los profetas
  alternatives_spanish:
  - los libros acerca de los reyes y los profetas
  - los libros de los reyes y los profetas
  lexicon: LSJ
  rationale: περὶ expresa relación temática. «Sobre» es la forma española más directa y no sugiere necesariamente autoría.
- source_word: τὰ τοῦ Δαυείδ
  english_pob_choice: the writings of David
  chosen_spanish: los escritos de David
  alternatives_spanish:
  - las obras de David
  - los libros de David
  - lo de David
  lexicon: LSJ
  rationale: La expresión es elíptica; en español, «los escritos de David» hace explícita la referencia a composiciones asociadas con David sin sobredeterminar su contenido.
- source_word: ἐπιστολὰς βασιλέων
  english_pob_choice: letters of kings
  chosen_spanish: cartas de reyes
  alternatives_spanish:
  - cartas reales
  - cartas de los reyes
  lexicon: LSJ
  rationale: La construcción genitiva es simple. «Cartas de reyes» sigue de cerca el griego y mantiene el registro histórico.
- source_word: περὶ ἀναθεμάτων
  english_pob_choice: concerning votive offerings
  chosen_spanish: acerca de ofrendas votivas
  alternatives_spanish:
  - acerca de dones dedicados
  - acerca de cosas dedicadas
  - acerca de ofrendas dedicadas
  lexicon: LSJ
  rationale: En este contexto templario, ἀναθέματα se refiere a dones dedicados a Dios. «Ofrendas votivas» comunica ese sentido y evita la falsa asociación con «anatema».
theological_decisions:
- issue: Sentido de ἀναθέματα
  english_pob_reading: votive offerings
  chosen_spanish_reading: ofrendas votivas
  alternative_spanish_readings:
  - dones dedicados
  - cosas dedicadas
  rationale: El pasaje trata de cartas de reyes sobre cosas consagradas al culto; el español «ofrendas votivas» conserva el valor de dedicación religiosa sin introducir el sentido posterior y eclesiástico de «anatema».
  doctrine_reference: Principio de primacía del lenguaje fuente y de la semántica histórica sobre la tradición eclesiástica posterior.
translation_notes:
  revision_awareness: La redacción sigue de cerca el texto griego y el aparato auditado en inglés. Se preservó la ambigüedad razonable de καταβαλλόμενος con una nota alternativa, y se evitó el falso amigo teológico de ἀναθέματα, manteniendo el sentido cultual de dedicación.
  spanish_consistency_notes:
  - Se usó «Yahvé» por norma editorial solo cuando el texto lo requiera; este versículo no contiene el nombre divino.
  - Se eligió «ofrendas votivas» para mantener continuidad con el tratamiento auditado de ἀναθέματα en la POB inglesa.
  - «Los escritos de David» preserva la elipsis sin forzar una identificación exclusiva con un libro concreto.
  - «Registros» y «memorandos» mantienen el paralelismo documental del original griego.
