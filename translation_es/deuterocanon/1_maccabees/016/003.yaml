translation:
  language: es
  text: Pero ahora he envejecido[a], y ustedes también, por misericordia, son ya maduros en años. Ocupen mi lugar y el de mi hermano[b], y salgan y luchen en defensa de nuestra nación, y que la ayuda del cielo[c] esté con ustedes.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «he llegado a viejo»; el perfecto griego expresa un estado presente resultante del envejecimiento.
    reason: lexical_alternative
  - marker: b
    text: O «tomen mi lugar y el de mi hermano». El griego expresa sustitución con ἀντί, «en lugar de».
    reason: alternative_reading
  - marker: c
    text: «La ayuda del cielo» es una manera reverente de hablar de la ayuda divina sin nombrar a Dios directamente.
    reason: cultural_note
lexical_decisions:
- source_word: γεγήρακα
  english_pob_choice: I have grown old
  chosen_spanish: he envejecido
  alternatives_spanish:
  - soy viejo
  - he llegado a la vejez
  lexicon: LSJ
  rationale: El perfecto griego expresa un estado presente resultante del envejecimiento; «he envejecido» comunica ese resultado en español natural sin perder el matiz de proceso concluido.
- source_word: ἐν τῷ ἐλέει
  english_pob_choice: by mercy
  chosen_spanish: por misericordia
  alternatives_spanish:
  - por la misericordia de Dios
  - por gracia
  - en misericordia
  lexicon: LSJ
  rationale: La frase griega no nombra explícitamente a Dios como sujeto de la misericordia. «Por misericordia» mantiene esa apertura; «por misericordia» en español resulta más fluido que una construcción más pesada, sin añadir contenido no dicho.
- source_word: ἱκανοί ἐστε ἐν τοῖς ἔτεσιν
  english_pob_choice: are mature in years
  chosen_spanish: son ya maduros en años
  alternatives_spanish:
  - son suficientes en años
  - tienen edad suficiente
  - son aptos en edad
  lexicon: LSJ
  rationale: ἱκανοί implica suficiencia o idoneidad, y con ἐν τοῖς ἔτεσιν apunta a edad/madurez. «Maduros en años» conserva la idea de aptitud por edad sin sonar rígido ni demasiado literal.
- source_word: γίνεσθε ἀντʼ ἐμοῦ καὶ τοῦ ἀδελφοῦ μου
  english_pob_choice: Become my replacements, and my brother’s
  chosen_spanish: Hagan de reemplazo por mí y por mi hermano
  alternatives_spanish:
  - Pónganse en lugar de mí y de mi hermano
  - Tomen nuestro lugar, el mío y el de mi hermano
  lexicon: LSJ
  rationale: ἀντί con genitivo indica sustitución. «Hagan de reemplazo» conserva la idea de actuar en lugar de otros; se evita una paráfrasis excesiva y se mantiene la relación de sustitución del original.
- source_word: ὑπερμαχεῖτε
  english_pob_choice: fight on behalf of
  chosen_spanish: luchen en defensa de
  alternatives_spanish:
  - peleen por
  - defiendan combatiendo por
  lexicon: LSJ
  rationale: El verbo significa luchar a favor de alguien o defender una causa combatiendo. «Luchen en defensa de» preserva el matiz de combate y protección mejor que un simple «luchen por».
- source_word: ἔθνους
  english_pob_choice: nation
  chosen_spanish: nación
  alternatives_spanish:
  - pueblo
  - etnia
  - gente
  lexicon: LSJ
  rationale: En contexto macabeo, ἔθνος designa la comunidad nacional-etnorreligiosa de Israel. «Nación» refleja mejor ese conjunto colectivo que «pueblo», aunque ambas opciones son posibles según el matiz.
- source_word: ἐκ τοῦ οὐρανοῦ βοήθεια
  english_pob_choice: the help from heaven
  chosen_spanish: la ayuda desde el cielo
  alternatives_spanish:
  - la ayuda del cielo
  - la ayuda celestial
  - la ayuda que viene del cielo
  lexicon: LSJ
  rationale: La construcción expresa procedencia «desde/de» el cielo; «desde el cielo» conserva la imagen de origen. Se mantiene la reverencia implícita sin sustituirla por una formulación más interpretativa.
- source_word: ἤτω μεθʼ ὑμῶν
  english_pob_choice: may ... be with you
  chosen_spanish: esté con ustedes
  alternatives_spanish:
  - sea con ustedes
  - permanezca con ustedes
  lexicon: LSJ
  rationale: 'El imperativo jussivo de tercera persona se vierte naturalmente como deseo o bendición en español: «que ... esté con ustedes». Aquí se integra en una estructura fluida y reverente.'
theological_decisions:
- issue: Referencia divina implícita en «misericordia»
  english_pob_reading: Retain the implicit wording without inserting 'God' into the main text.
  chosen_spanish_reading: Mantener «por misericordia» sin explicitar «de Dios» en el texto principal.
  alternative_spanish_readings:
  - por la misericordia de Dios
  - por gracia divina
  rationale: El griego no especifica el sujeto de la misericordia. La traducción conserva esa tensión y deja visible que la benevolencia es real pero no nombrada explícitamente en la cláusula.
  doctrine_reference: 'DOCTRINE.md: primacía del idioma original; preservar tensiones teológicas en vez de resolverlas por adelantado.'
- issue: Alusión reverente a la ayuda divina en «del cielo»
  english_pob_reading: '''Help from heaven'' is a reverent way of speaking of divine aid without naming God directly.'
  chosen_spanish_reading: «la ayuda desde el cielo» como modo reverente de aludir a la asistencia divina sin nombrar a Dios directamente.
  alternative_spanish_readings:
  - la ayuda de Dios
  - la ayuda celestial enviada por Dios
  rationale: La frase griega sitúa el origen en el cielo y deja implícita la agencia divina. El español mantiene esa reserva y evita convertir la alusión en una explicitación interpretativa.
  doctrine_reference: 'DOCTRINE.md: transparencia textual; no añadir más precisión teológica que la que el verso ofrece.'
translation_notes:
  revision_awareness: No se registraron revisiones aplicadas; el texto refleja el pasaje griego con las decisiones auditadas del inglés POB como contexto, preservando la referencia implícita a la misericordia y a la ayuda divina sin sobre-explicarlas.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma general del proyecto, pero este versículo no contiene el tetragrámaton ni un equivalente directo.
  - Se usa «nación» para ἔθνος por el contexto macabeo nacional-colectivo.
  - Se conserva el matiz de sustitución en ἀντί sin convertirlo en una mera equivalencia funcional.
  - Se evita introducir «Dios» en el texto principal donde el griego permanece elíptico.
  - «Desde el cielo» sigue la imagen de procedencia y mantiene la reverencia implícita.
