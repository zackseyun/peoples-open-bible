translation:
  language: es
  text: 'Entonces Yahvé dijo a Moisés[a]: «Extiende tu mano sobre la tierra de Egipto por las langostas[b], para que suban sobre la tierra de Egipto y coman toda planta de la tierra, todo lo que dejó el granizo».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «por/para las langostas»; la preposición es difícil, y también son posibles traducciones más literales como «contra las langostas» o «sobre las langostas».'
    reason: lexical_alternative
  - marker: b
    text: El hebreo tiene singular («langosta») con verbos singulares, usado colectivamente para el enjambre; el español expresa el sentido con el plural «langostas» y «suban ... coman».
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  - el SEÑOR
  lexicon: 'DOCTRINE.md: Contested terms — YHWH'
  rationale: Se mantiene la decisión del proyecto de transliterar el Nombre divino en lugar de sustituirlo por un título. «Yahvé» es la forma española de uso académico y eclesial amplio que preserva el nombre personal de Dios revelado a Israel.
- source_word: נְטֵה
  english_pob_choice: Stretch out
  chosen_spanish: Extiende
  alternatives_spanish:
  - Alarga
  - Tiende
  - Estira
  lexicon: HALOT
  rationale: El imperativo pide una acción física de extender la mano; «extiende» comunica bien la imagen en español sin sonar rígido. «Estira» sería demasiado coloquial, y «alarga» suena menos natural aquí.
- source_word: יָדְךָ
  english_pob_choice: your hand
  chosen_spanish: tu mano
  alternatives_spanish:
  - tu brazo
  lexicon: HALOT
  rationale: Se conserva el sustantivo concreto «mano», como en el hebreo, sin sustituirlo por una parte más amplia del cuerpo.
- source_word: עַל אֶרֶץ מִצְרַיִם
  english_pob_choice: over the land of Egypt
  chosen_spanish: sobre la tierra de Egipto
  alternatives_spanish:
  - sobre Egipto
  - contra la tierra de Egipto
  lexicon: HALOT
  rationale: «Tierra» reproduce bien אֶרֶץ en este contexto y mantiene el paralelismo interno del verso. «Sobre» conserva el valor espacial de עַל; «contra» introduciría una dirección hostil que el hebreo no exige aquí.
- source_word: בָּאַרְבֶּה
  english_pob_choice: for the locusts
  chosen_spanish: por las langostas
  alternatives_spanish:
  - para las langostas
  - contra las langostas
  - sobre las langostas
  lexicon: HALOT
  rationale: La preposición es difícil en hebreo; en español, «por» comunica la referencia o motivo del gesto sin forzar una lectura demasiado interpretativa. Se evita hacerla más explícita de lo que permite el texto.
- source_word: וְיַעַל
  english_pob_choice: so that they may come up
  chosen_spanish: para que suban
  alternatives_spanish:
  - y suba
  - para que suba
  - y suban
  lexicon: HALOT
  rationale: El verbo עלה se expresa naturalmente con «suban» en plural colectivo, dado que «langostas» en español requiere concordancia plural. El sentido final de propósito queda claro con «para que».
- source_word: אַרְבֶּה
  english_pob_choice: the locusts
  chosen_spanish: las langostas
  alternatives_spanish:
  - la langosta
  - el enjambre de langostas
  lexicon: HALOT
  rationale: Aunque el hebreo es singular en forma, funciona colectivamente. En español el plural natural evita una lectura extraña y mantiene la referencia a la plaga.
- source_word: וְיֹאכַל
  english_pob_choice: and eat
  chosen_spanish: y devoren
  alternatives_spanish:
  - y coman
  - y consuman
  lexicon: HALOT
  rationale: «Devoren» comunica con mayor fuerza devastadora el efecto de la plaga, y corresponde bien al consumo total del contexto. Se mantiene el carácter colectivo del sujeto implícito.
- source_word: כָּל עֵשֶׂב הָאָרֶץ
  english_pob_choice: every plant of the land
  chosen_spanish: toda planta de la tierra
  alternatives_spanish:
  - toda vegetación de la tierra
  - toda hierba de la tierra
  - toda planta del país
  lexicon: HALOT
  rationale: עֵשֶׂב puede abarcar vegetación amplia; «planta» es suficientemente general y natural en español. «De la tierra» conserva el hebraísmo de הָאָרֶץ sin perder claridad.
- source_word: אֲשֶׁר הִשְׁאִיר הַבָּרָד
  english_pob_choice: everything that the hail has left
  chosen_spanish: todo lo que dejó el granizo
  alternatives_spanish:
  - todo lo que el granizo dejó atrás
  - todo lo que el granizo perdonó
  lexicon: HALOT
  rationale: «Dejó» refleja היטב el sentido de «dejar / dejar atrás / dejar intacto» sin añadir matices no explícitos. «Granizo» expresa de modo natural la plaga previa mencionada en el contexto.
theological_decisions:
- issue: Traducción del Nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Jehová
  - el SEÑOR
  rationale: Se sigue el principio del proyecto de no ocultar el Nombre con una sustitución titulativa. «Yahvé» mantiene la identidad del referente sin introducir una forma devocional tradicional que no está en el hebreo.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Valor colectivo de אַרְבֶּה con verbos singulares
  english_pob_reading: the locusts / they may come up / and eat
  chosen_spanish_reading: las langostas / para que suban / y devoren
  alternative_spanish_readings:
  - la langosta / para que suba / y devore
  rationale: Aunque la forma hebrea es singular, el uso es colectivo. El español requiere concordancia plural para comunicar con naturalidad la plaga sin perder el dato morfológico subyacente.
  doctrine_reference: HALOT; English audit note on collective singular
- issue: Fuerza semántica de עַל en el encargo a Moisés
  english_pob_reading: over the land of Egypt
  chosen_spanish_reading: sobre la tierra de Egipto
  alternative_spanish_readings:
  - contra la tierra de Egipto
  - por la tierra de Egipto
  rationale: Se preserva el valor espacial principal de עַל sin convertirlo en una hostilidad explícita que el texto no formula de manera directa.
  doctrine_reference: HALOT; English lexical decision on spatial preposition
translation_notes:
  revision_awareness: 'El pasaje coincide en alto grado con la auditoría inglesa y no requiere cambios sustantivos; se conservan las dos tensiones principales documentadas: la preposición difícil con אַרְבֶּה y el singular colectivo de «langosta».'
  spanish_consistency_notes:
  - Se usa «Yahvé» de forma consistente con el estándar del proyecto para יְהוָה.
  - Se evita «SEÑOR» como sustitución del Nombre divino.
  - Se mantiene «tierra de Egipto» para אֶרֶץ מִצְרַיִם y «granizo» para הַבָּרָד.
  - La elección «devoren» conserva mejor el matiz destructivo del contexto de plaga que un simple «coman».
