revisions:
- from: Una asamblea de los inicuos es como un manojo de estopa[a], y su fin es una llama de fuego.
  to: Una asamblea de los sin ley es como un manojo de estopa[a], y su fin es una llama de fuego.
  rationale: Se revisa únicamente ἀνόμων para reflejar de manera más fiel el matiz documentado en el original griego y en el POB inglés. «Los sin ley» preserva mejor la fuerza legal-moral de la expresión que «inicuos», mientras se mantiene intacta la imagen poética y la buena legibilidad del español.
