  text: הַ/בָּשָׂ֗ר עוֹדֶ֨/נּוּ֙ בֵּ֣ין שִׁנֵּי/הֶ֔ם טֶ֖רֶם יִכָּרֵ֑ת וְ/אַ֤ף יְהוָה֙ חָרָ֣ה בָ/עָ֔ם וַ/יַּ֤ךְ יְהוָה֙ בָּ/עָ֔ם מַכָּ֖ה רַבָּ֥ה מְאֹֽד׃
base_translation:
  language: en
  yaml_path: translation/ot/numbers/011/033.yaml
  text: While the meat was still between their teeth[a], before it was consumed, Yahweh’s anger burned against the people, and Yahweh struck the people with a very severe plague.
  footnotes:
