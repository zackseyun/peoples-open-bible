translation:
  language: es
  text: Yo soy Yahvé, tu Dios, que te saqué de la tierra de Egipto. Abre bien tu boca[a], y yo la llenaré.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Abre bien tu boca, para que yo la llene».'
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  - el SEÑOR
  lexicon: HALOT
  rationale: La norma del proyecto para el Tetragrámaton es usar la transliteración del nombre divino. En español, 'Yahvé' conserva el nombre propio revelado, mientras que 'Jehová' refleja una tradición castellana posterior y 'el SEÑOR' lo sustituiría por un título.
- source_word: אֱלֹהֶיךָ
  english_pob_choice: your God
  chosen_spanish: tu Dios
  alternatives_spanish:
  - Dios tuyo
  - tu Dios, en pacto
  lexicon: HALOT
  rationale: El sufijo de 2 ms se expresa con naturalidad en español como 'tu Dios'. La relación de posesión/covenio queda clara sin añadir formulación extra no exigida por el texto.
- source_word: הַמַּעַלְךָ
  english_pob_choice: who brought you up
  chosen_spanish: que te hizo subir
  alternatives_spanish:
  - que te trajo
  - que te sacó
  lexicon: HALOT
  rationale: El participio causativo de עלה apunta al éxodo como acción de hacer subir desde Egipto. 'Te hizo subir' mantiene la imagen verbal de ascenso; 'te trajo' suaviza la metáfora y 'te sacó' desplaza el matiz del verbo.
- source_word: מֵאֶרֶץ מִצְרַיִם
  english_pob_choice: from the land of Egypt
  chosen_spanish: de la tierra de Egipto
  alternatives_spanish:
  - desde la tierra de Egipto
  - de Egipto
  lexicon: HALOT
  rationale: '''De la tierra de Egipto'' reproduce de modo natural la fórmula del éxodo y mantiene el sustantivo ''tierra'' del hebreo. ''Desde'' enfatiza procedencia; ''de Egipto'' es más breve pero pierde el paralelismo de la construcción.'
- source_word: הַרְחֶב
  english_pob_choice: Open your mouth wide
  chosen_spanish: Abre bien
  alternatives_spanish:
  - Ensancha
  - Abre ampliamente
  lexicon: HALOT
  rationale: El imperativo de רחב, con 'tu boca', se vuelve idiomático en español como 'abre bien'. 'Ensancha' sería más literal pero menos natural; 'abre ampliamente' suena pesado.
- source_word: פִּיךָ
  english_pob_choice: your mouth
  chosen_spanish: tu boca
  alternatives_spanish:
  - tu boca
  lexicon: HALOT
  rationale: Mantiene la imagen corporal directa del hebreo sin necesidad de explicación adicional.
- source_word: וַאֲמַלְאֵהוּ
  english_pob_choice: and I will fill it
  chosen_spanish: y yo la llenaré
  alternatives_spanish:
  - y la llenaré
  - para que yo la llene
  lexicon: HALOT
  rationale: El sufijo masculino del hebreo refiere a 'boca' en español, que es femenina; por eso el pronombre debe concordar con 'la'. Se conserva el valor promisor del verbo en futuro. 'Para que yo la llene' expresa la posible lectura resultativa/subjuntiva, pero el futuro simple comunica bien la promesa divina.
- source_word: אָנֹכִי
  english_pob_choice: I am
  chosen_spanish: Yo soy
  alternatives_spanish:
  - Yo
  - Soy yo
  lexicon: HALOT
  rationale: La cláusula nominal hebrea requiere en español un verbo copulativo. 'Yo soy' conserva la identificación enfática del pronombre independiente sin sonar forzado.
theological_decisions:
- issue: Renderización del nombre divino יהוה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Jehová
  - el SEÑOR
  rationale: Se preserva el nombre personal de Dios en vez de sustituirlo por un título. 'Yahvé' es la forma de uso del proyecto en español y corresponde al mismo principio aplicado en inglés con 'Yahweh'.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: 'Valor del verbo final: promesa o finalidad'
  english_pob_reading: and I will fill it
  chosen_spanish_reading: y yo la llenaré
  alternative_spanish_readings:
  - para que yo la llene
  - y la llenaré
  rationale: El hebreo puede leerse como promesa consecutiva o como resultado del mandato anterior. El futuro simple en español conserva la fuerza de promesa directa que adoptó la POB inglesa, sin borrar la posibilidad de la lectura final indicada en la nota.
  doctrine_reference: No doctrinal issue; lexical-syntactic ambiguity preserved in translation note.
translation_notes:
  revision_awareness: 'El pasaje presenta alta concordancia con la edición inglesa revisada: se mantiene la elección del nombre divino, la imagen del éxodo y la exhortación a abrir la boca. La única adaptación necesaria en español es la concordancia de género en «la llenaré», ya que el referente de ''boca'' es femenino en español.'
  spanish_consistency_notes:
  - Se usa 'Yahvé' de manera consistente para יהוה, conforme al estándar del proyecto.
  - '''Tu Dios'' conserva el tono de alianza sin añadir glosas interpretativas.'
  - '''Te hizo subir'' mantiene la imagen exódica sin convertirla en una paráfrasis general.'
  - La nota b preserva la alternativa sintáctica documentada por la POB inglesa.
