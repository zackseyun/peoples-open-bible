translation:
  language: es
  text: El que abre brecha[a] ha subido delante de ellos; ellos han abierto brecha y han pasado por la puerta, y han salido por ella. Su rey pasa delante de ellos[b], y Yahvé va al frente de ellos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «el rompedor». El participio hebreo puede funcionar como un título para quien abre paso o derriba un obstáculo.
    reason: lexical_alternative
  - marker: b
    text: 'La identidad de «el que abre brecha» es discutida: algunos entienden un líder militar, otros al rey, y otros a Yahvé mismo. El hebreo deja implícita la relación.'
    reason: alternative_reading
lexical_decisions:
- source_word: הַפֹּרֵץ
  english_pob_choice: the one who breaks through
  chosen_spanish: el que abre brecha
  alternatives_spanish:
  - el rompedor
  - el que se abre paso
  - el que rompe
  lexicon: HALOT
  rationale: El participio con artículo funciona como designación sustantiva. En español, «el que abre brecha» comunica la imagen de abrir paso en un obstáculo y conserva el valor verbal del hebreo sin volverlo demasiado técnico.
- source_word: עָלָה
  english_pob_choice: has gone up
  chosen_spanish: ha subido
  alternatives_spanish:
  - sube
  - subió
  lexicon: HALOT
  rationale: El perfecto hebreo se conserva con perfecto compuesto en español. «Ha subido» mantiene la secuencia verbal y la imagen direccional de avance.
- source_word: לִפְנֵיהֶם
  english_pob_choice: before them
  chosen_spanish: delante de ellos
  alternatives_spanish:
  - ante ellos
  - en frente de ellos
  lexicon: HALOT
  rationale: Es un modismo espacial. «Delante de ellos» es natural en español y conserva la idea de ir al frente sin añadir interpretación.
- source_word: פָּרְצוּ
  english_pob_choice: they have broken through
  chosen_spanish: han abierto brecha
  alternatives_spanish:
  - han roto
  - han irrumpido
  - han pasado abriendo brecha
  lexicon: HALOT
  rationale: Se conserva la raíz e imagen de פרץ. «Han abierto brecha» enlaza claramente con «el que abre brecha» y suena idiomático en español.
- source_word: וַיַּעֲבֹרוּ
  english_pob_choice: passed through
  chosen_spanish: han pasado por la puerta
  alternatives_spanish:
  - han atravesado
  - han cruzado
  lexicon: HALOT
  rationale: Con «puerta» el verbo עבר se entiende como atravesar o pasar por una apertura. «Han pasado por la puerta» es directo y conserva el movimiento a través de ella.
- source_word: שַׁעַר
  english_pob_choice: the gate
  chosen_spanish: la puerta
  alternatives_spanish:
  - la puerta de la ciudad
  - el portón
  lexicon: HALOT
  rationale: En español, «puerta» comunica bien la abertura de salida en el pasaje. «Portón» sería posible, pero menos natural para la lectura general; no se añade «de la ciudad» porque el hebreo no lo explicita.
- source_word: וַיֵּצְאוּ בּוֹ
  english_pob_choice: gone out by it
  chosen_spanish: han salido por ella
  alternatives_spanish:
  - han salido a través de ella
  - han salido por medio de ella
  lexicon: HALOT
  rationale: יצא con la preposición y el antecedente femenino «la puerta» se expresa con naturalidad como «han salido por ella». Conserva el referente sin sobretraducir la preposición.
- source_word: מַלְכָּם
  english_pob_choice: their king
  chosen_spanish: su rey
  alternatives_spanish:
  - su soberano
  - su gobernante
  lexicon: HALOT
  rationale: El término es claramente real. «Su rey» mantiene la fuerza monárquica y la relación con el pueblo.
- source_word: וַיהוָה
  english_pob_choice: the LORD
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: 'Se sigue el estándar del proyecto: traducir יהוה como «Yahvé» en el texto principal, en vez de sustituirlo por una convención de ocultamiento.'
- source_word: בְּרֹאשָׁם
  english_pob_choice: at their head
  chosen_spanish: a la cabeza de ellos
  alternatives_spanish:
  - encabezándolos
  - delante de ellos
  lexicon: HALOT
  rationale: La expresión idiomática se conserva con una metáfora comprensible en español. «A la cabeza de ellos» retiene la imagen de liderazgo sin convertirla en paráfrasis.
theological_decisions:
- issue: Identidad del que abre brecha
  english_pob_reading: Render descriptively without identifying the figure in the main text.
  chosen_spanish_reading: 'Mantener la figura como una designación descriptiva: «el que abre brecha».'
  alternative_spanish_readings:
  - identificarlo explícitamente como un líder militar
  - identificarlo explícitamente como el Mesías/rey
  - identificarlo explícitamente con Yahvé
  rationale: El hebreo permite distintas lecturas y la secuencia distingue, sin resolver, entre el que abre brecha, su rey y Yahvé. La traducción no debe cerrar esa tensión interpretativa.
  doctrine_reference: Preservar la tensión teológica en lugar de resolverla.
- issue: Relación entre «su rey» y «Yahvé»
  english_pob_reading: Keep both expressions distinct in the main text.
  chosen_spanish_reading: 'Mantener ambas expresiones separadas: «Su rey... y Yahvé...».'
  alternative_spanish_readings:
  - fusionar ambas referencias en una sola figura
  - hacerlas apposicionales en la traducción
  rationale: El hebreo presenta ambos miembros coordinados y el texto no obliga a identificarlos. La traducción conserva la distinción para no borrar la posible relación tipológica o teológica que el lector discierna.
  doctrine_reference: Preservar la tensión teológica en lugar de resolverla.
translation_notes:
  revision_awareness: La revisión más reciente indicó que no hacía falta cambiar el contenido base; esta versión conserva la estructura y las decisiones auditadas, adaptándolas a un español publicable y fiel al hebreo.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» conforme al estándar del proyecto para יהוה.
  - Se conserva la metáfora procesional y de liderazgo sin identificar en exceso al personaje central.
  - Se evita introducir «Mesías» o «Cristo» porque el pasaje no lo explicita y la auditoría inglesa preserva la ambigüedad.
  - La imagen de «abrir brecha» enlaza el participio inicial con la acción repetida del versículo.
