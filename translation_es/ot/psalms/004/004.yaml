translation:
  language: es
  text: Y sepan que Yahvé ha apartado al piadoso[a] para sí; Yahvé oye[b] cuando clamo a él.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «el fiel». El hebreo חָסִיד puede enfatizar la lealtad de pacto o la piedad.
    reason: lexical_alternative
  - marker: b
    text: O «oirá». El verbo hebreo puede entenderse como presente habitual o como futuro confiado.
    reason: lexical_alternative
lexical_decisions:
- source_word: וּדְעוּ
  english_pob_choice: And know
  chosen_spanish: Y sepan
  alternatives_spanish:
  - Pero sepan
  - Sepan
  lexicon: HALOT
  rationale: El imperativo plural pide reconocer una realidad. En español, ‘Y sepan’ conserva la continuidad discursiva del hebreo sin forzar un matiz adversativo que el contexto no exige.
- source_word: כִּי
  english_pob_choice: that
  chosen_spanish: que
  alternatives_spanish:
  - porque
  - pues
  lexicon: HALOT
  rationale: Introduce el contenido de lo que deben saber; ‘que’ es la forma más natural y fiel en español tras un verbo de conocimiento.
- source_word: הִפְלָה
  english_pob_choice: has set apart
  chosen_spanish: ha apartado
  alternatives_spanish:
  - ha distinguido
  - ha hecho especial
  lexicon: HALOT
  rationale: El hifil de פלא aquí expresa hacer distintivo o separar para un propósito especial. ‘Ha apartado’ comunica esa separación de manera clara y sobria en español.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  lexicon: HALOT
  rationale: Se mantiene el nombre divino revelado, conforme al criterio del proyecto, en vez de sustituirlo por un título. ‘Yahvé’ es la forma base establecida para el texto español.
- source_word: חָסִיד
  english_pob_choice: the godly
  chosen_spanish: el piadoso
  alternatives_spanish:
  - el fiel
  - el leal
  - el piadoso
  lexicon: HALOT
  rationale: El término puede abarcar piedad y lealtad de pacto. ‘El piadoso’ es una opción natural en español bíblico y preserva la cualidad religiosa sin estrechar indebidamente el sentido.
- source_word: לוֹ
  english_pob_choice: for himself
  chosen_spanish: para sí
  alternatives_spanish:
  - para él
  - para sí mismo
  lexicon: HALOT
  rationale: El sufijo pronominal con la preposición expresa pertenencia o referencia reflexiva a Yahvé. ‘Para sí’ reproduce bien esa orientación reflexiva en español.
- source_word: יִשְׁמַע
  english_pob_choice: hears
  chosen_spanish: escucha
  alternatives_spanish:
  - oirá
  - oye
  lexicon: HALOT
  rationale: El imperfecto hebreo puede expresar acción habitual o segura. ‘Escucha’ comunica la disposición constante de Yahvé a responder, sin obligar el texto a un futuro explícito.
- source_word: בְּקָרְאִי
  english_pob_choice: when I call
  chosen_spanish: cuando clamo
  alternatives_spanish:
  - cuando invoco
  - al llamar
  lexicon: HALOT
  rationale: La construcción temporal se vierte de modo natural con ‘cuando’. ‘Clamo’ da el tono orante y personal del contexto poético.
- source_word: אֵלָיו
  english_pob_choice: to him
  chosen_spanish: a él
  alternatives_spanish:
  - hacia él
  - a él mismo
  lexicon: HALOT
  rationale: La preposición indica dirección de la oración hacia Yahvé; ‘a él’ es la forma más directa y transparente en español.
theological_decisions:
- issue: Nombre divino יהוה / YHWH
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Jehová
  - SEÑOR
  rationale: El texto hebreo usa el Tetragrámaton de forma explícita. Se conserva el nombre propio divino en español para mantener la transparencia y el valor de pacto del texto, evitando el sustituto litúrgico ‘SEÑOR’.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Sentido de חָסִיד
  english_pob_reading: the godly
  chosen_spanish_reading: el piadoso
  alternative_spanish_readings:
  - el fiel
  - el leal
  - el piadoso
  rationale: El término combina piedad y lealtad de pacto. En este versículo, ‘el piadoso’ conserva el sentido ético-religioso general sin perder la tensión entre devoción y fidelidad.
  doctrine_reference: DOCTRINE.md Translation philosophy §1, §6
- issue: Tiempo verbal de יִשְׁמַע
  english_pob_reading: hears
  chosen_spanish_reading: escucha
  alternative_spanish_readings:
  - oirá
  - oye
  rationale: El imperfecto hebreo admite lectura habitual o confiada. ‘Escucha’ mantiene la idea de respuesta segura y continua, compatible con el valor habitual/prospectivo señalado en el audit trail.
  doctrine_reference: DOCTRINE.md Translation philosophy §1
translation_notes:
  revision_awareness: El control de revisión más reciente indica que no hubo cambios necesarios y que la lectura quedó aprobada con alta concordancia; esta versión española sigue ese estado sin introducir alteraciones interpretativas nuevas.
  spanish_consistency_notes:
  - Se mantiene ‘Yahvé’ de forma consistente para יהוה, conforme al estándar del proyecto.
  - Se usa ‘piadoso’ para חָסִיד, pero se preserva la alternativa ‘fiel’ en nota porque el campo semántico incluye fidelidad de pacto.
  - ‘Escucha’ refleja el imperfecto hebreo con valor habitual/confidente; la nota preserva la posibilidad futura.
  - La puntuación y el orden de cláusulas siguen el paralelismo del hebreo sin añadir contenido explicativo extra.
