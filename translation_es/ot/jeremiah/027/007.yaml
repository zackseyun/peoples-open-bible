base_translation:
  language: en
  yaml_path: translation/ot/jeremiah/027/007.yaml
  text: All the nations will serve him[a], and his son, and his grandson, until the time of his own land comes[c][b]; then many nations and great kings will make even him serve them.
  footnotes:
  - marker: a
    text: Literally, 'and his son and his son's son.'
    reason: lexical_alternative
  - marker: b
    text: Or, more literally, 'until the time of his land comes'—that is, the appointed time concerning Babylon's own land.
    reason: lexical_alternative
  - marker: c
    text: The Hebrew likely means that many nations and great kings will subject Babylon to service; a more wooden rendering would be, 'will work him/use him for service.'
    reason: alternative_reading
