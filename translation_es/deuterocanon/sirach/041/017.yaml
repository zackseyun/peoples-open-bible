translation:
  language: es
  text: Sientan vergüenza ante su padre y su madre por la inmoralidad sexual[a], y ante un gobernante en funciones por la mentira.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El hebreo dice literalmente «ante un gobernante sentado»; el griego paralelo amplía con «ante un líder y un potentado». La traducción sigue el hebreo con una formulación natural en español, manteniendo la referencia a una autoridad pública.
    reason: alternative_reading
lexical_decisions:
- source_word: בוש
  english_pob_choice: Be ashamed
  chosen_spanish: Avergüéncense
  alternatives_spanish:
  - Sean avergonzados
  - Sientan vergüenza
  lexicon: HALOT
  rationale: El imperativo exhortativo pide la reacción moral de vergüenza o recato; «Avergüéncense» conserva la fuerza directiva y resulta natural en español.
- source_word: מאב ואם
  english_pob_choice: before father and mother
  chosen_spanish: ante padre y madre
  alternatives_spanish:
  - delante de padre y madre
  - frente a padre y madre
  lexicon: HALOT
  rationale: La preposición expresa la presencia de aquellos ante quienes se siente vergüenza. «Ante» es idiomático y conserva la relación social de exposición pública o personal.
- source_word: אל זנות
  english_pob_choice: for sexual immorality
  chosen_spanish: por la inmoralidad sexual
  alternatives_spanish:
  - por fornicación
  - por conducta sexual inmoral
  - por prostitución
  lexicon: HALOT
  rationale: זנות abarca conducta sexual ilícita en general; «inmoralidad sexual» mantiene el alcance amplio sin reducirlo a prostitución ni a un tecnicismo eclesial.
- source_word: מנשיא יושב
  english_pob_choice: before a ruler in office
  chosen_spanish: ante un gobernante en funciones
  alternatives_spanish:
  - ante un gobernante sentado en su cargo
  - ante un príncipe en su asiento
  - ante un jefe en funciones
  lexicon: HALOT
  rationale: El hebreo sugiere a un gobernante que ocupa un puesto de autoridad; «en funciones» preserva el sentido de cargo/posición sin forzar la imagen literal de estar sentado.
- source_word: אל כחש
  english_pob_choice: for lying
  chosen_spanish: por la mentira
  alternatives_spanish:
  - por la falsedad
  - por mentir
  - por engaño
  lexicon: HALOT
  rationale: כחש puede abarcar mentira o falsedad; en este listado ético, «la mentira» es claro y directo, y corresponde al sentido general confirmado por el paralelo griego ψεύδους.
theological_decisions:
- issue: Forma de la amonestación moral y término de vergüenza
  english_pob_reading: Be ashamed before father and mother ... and before a ruler in office ...
  chosen_spanish_reading: Avergüéncense ante padre y madre ... y ante un gobernante en funciones ...
  alternative_spanish_readings:
  - Tengan vergüenza ante padre y madre ...
  - Sean avergonzados ante padre y madre ...
  rationale: No hay una tesis doctrinal específica, pero sí una instrucción sapiencial sobre conducta pública y honor. Se conserva el tono exhortativo y la dimensión relacional de la vergüenza.
  doctrine_reference: Sabiduría sapiencial / ética del honor y la vergüenza en literatura deuterocanónica
- issue: Alcance de זנות y ψεύδους
  english_pob_reading: sexual immorality ... lying
  chosen_spanish_reading: inmoralidad sexual ... la mentira
  alternative_spanish_readings:
  - fornicación ... la falsedad
  - conducta sexual inmoral ... el engaño
  rationale: Se evita estrechar זנות a una sola práctica y ψεύδους a una sola forma de decir falso, porque el proverbio apunta a categorías morales amplias.
  doctrine_reference: Ética bíblica de la pureza sexual y la veracidad
translation_notes:
  revision_awareness: El inglés auditado fue revisado de «before a ruler seated in office» a «before a ruler in office». La versión española adopta la misma simplificación natural («gobernante en funciones») sin perder el matiz de cargo/autoridad del hebreo יושב.
  spanish_consistency_notes:
  - Se usa «ante» para reproducir el valor relacional de בוש + מן/ἀπό, como en pasajes de vergüenza pública.
  - Se evita «Cristo», «SEÑOR» u այլ terminología no presente en el verso; el texto es sapiencial y no contiene nombres divinos.
  - «Inmoralidad sexual» conserva el sentido amplio de זנות y evita reducir el término a una sola práctica.
  - «Gobernante en funciones» traduce el hebreo con naturalidad española y deja abierta la imagen de autoridad establecida.
