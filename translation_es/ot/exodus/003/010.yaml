review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien la estructura del hebreo: transición discursiva («Y ahora»), comisión divina («te enviaré a Faraón»), lenguaje pactual («mi pueblo») y designación genealógica («los hijos de Israel»). Sin embargo, «ve» se aparta de la decisión auditada del POB en inglés («come») para לְכָה, y «sacarás» cambia el imperativo hebreo a una forma futura en español, debilitando el mandato directo.'
  spanish_quality_summary: 'El español es claro y legible, pero presenta dos ajustes importantes para mayor fidelidad y naturalidad: «ven» refleja mejor el llamamiento directo del discurso divino que «ve», y «saca» es la forma imperativa correcta frente a «sacarás», que suena predictiva más que comisiva. El resto del versículo fluye bien en español eclesial moderno.'
  glossary_alignment: No hay conflictos con la terminología principal del proyecto. «Faraón», «mi pueblo» y «los hijos de Israel» están bien alineados. La nota que preserva «los israelitas» como alternativa idiomática es adecuada y consistente con la pista de auditoría inglesa.
  issues:
  - severity: medium
    issue: «ve» para לְכָה
    rationale: El hebreo idiomático aquí fue auditado en inglés como «come», no «go». En español, «ven» preserva mejor el tono de convocatoria inmediata del hablante divino; «ve» desplaza el punto de vista y se aparta innecesariamente de la decisión documentada.
  - severity: high
    issue: «sacarás» para וְהוֹצֵא
    rationale: וְהוֹצֵא es un imperativo/mandato en la comisión («y saca»), no un futuro indicativo. «Sacarás» convierte la orden en predicción o resultado, afectando la fuerza verbal del original y la sintaxis coordinada del mandato.
  revised_spanish_text: Y ahora[a], ven, y yo te enviaré a Faraón, y saca a mi pueblo, los hijos de Israel, de Egipto.
  revised_footnotes:
  - marker: a
    text: 'O, más idiomáticamente, «los israelitas». Hebreo: «los hijos de Israel».'
    reason: lexical_alternative
