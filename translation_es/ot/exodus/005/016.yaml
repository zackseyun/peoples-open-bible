  verdict: revise
  source_alignment_summary: 'El borrador refleja bien el sentido global del hebreo: falta de paja, exigencia de hacer ladrillos, castigo a los trabajadores y acusación de culpa contra la gente de Faraón. Sin embargo, se aparta del rastro auditado del POB en dos puntos importantes: עֲבָדֶיךָ aquí debe conservar el matiz cortesano de deferencia como «siervos», no «esclavos»; y varias formulaciones españolas son demasiado calcadas o poco idiomáticas.'
  spanish_quality_summary: El texto es comprensible, pero «dicen a nosotros» y «la culpa está sobre» suenan poco naturales en español. «Y he aquí» es aceptable en registro bíblico-digno. Conviene suavizar calcos sin perder formalidad ni precisión.
  glossary_alignment: 'No hay términos del glosario mayor en juego como Yahvé/Mesías. La decisión clave es contextual: aunque עבד suele tender a «esclavo» en el proyecto, aquí la documentación inglesa justifica la excepción «your servants» por lenguaje de corte; en español «tus siervos» preserva mejor esa deferencia que «tus esclavos».'
  issues:
  - severity: high
    issue: «tus esclavos» para עֲבָדֶיךָ contradice la decisión contextual documentada del POB
    rationale: El expediente inglés explica explícitamente que aquí se usa lenguaje deferente dirigido al faraón. En español, «tus siervos» reproduce mejor esa cortesía subordinada; «tus esclavos» cambia el tono del discurso directo.
  - severity: medium
    issue: «dicen a nosotros» es un calco poco idiomático
    rationale: Aunque el hebreo literalmente permite esa estructura, el español natural y fiel es «nos dicen». Mantener el calco perjudica la legibilidad sin aportar precisión real.
  - severity: medium
    issue: «la culpa está sobre tu propio pueblo» suena forzado en español
    rationale: La idea contextual es imputación de culpa a la gente del faraón. «La culpa es de tu propio pueblo» o «tu propio pueblo tiene la culpa» comunica mejor el sentido auditado.
  - severity: low
    issue: La nota al pie usa «es comprimida»
    rationale: En español natural debe decir «es comprimida/condensada», mejor «es condensada» o «está condensada». Conviene pulir la redacción de la nota.
  revised_spanish_text: 'No se da paja a tus siervos, y nos dicen: «¡Hagan ladrillos!». Y he aquí, tus siervos son golpeados, pero la culpa es de tu propio pueblo.[a]'
