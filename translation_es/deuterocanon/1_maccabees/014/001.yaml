    text: 'The dating formula is usually understood according to the Seleucid era: literally, ''in the second and seventieth and hundredth year.'''
    reason: cultural_note
  - marker: b
    text: Or 'to secure help for himself' / 'to win assistance for himself.' The Greek verb suggests drawing or attracting aid.
    reason: lexical_alternative
