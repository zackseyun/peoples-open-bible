translation:
  language: es
  text: Y les pareció un buen plan derribarlo[a], para que no les fuera motivo de oprobio, porque las naciones lo habían contaminado; y derribaron el altar.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «los gentiles lo habían contaminado». El griego τὰ ἔθνη puede traducirse «las naciones» o, en este contexto judío, «los gentiles».
    reason: lexical_alternative
lexical_decisions:
- source_word: ἔπεσεν αὐτοῖς βουλὴ ἀγαθή
  english_pob_choice: it seemed to them a good plan
  chosen_spanish: les pareció un buen plan
  alternatives_spanish:
  - les vino un buen consejo
  - les pareció una buena decisión
  lexicon: LSJ
  rationale: La expresión griega es idiomática y literalmente dice que una «buena deliberación/consejo» cayó sobre ellos. En español, «les pareció un buen plan» conserva el sentido deliberativo y suena natural sin perder la fuerza de una decisión tomada en consejo.
- source_word: καθελεῖν
  english_pob_choice: to tear down
  chosen_spanish: derribarlo
  alternatives_spanish:
  - demolerlo
  - tirarlo abajo
  lexicon: LSJ
  rationale: El verbo se refiere a desmontar o abatir físicamente el altar. «Derribarlo» mantiene la acción concreta y el registro bíblico sin volverlo técnico en exceso.
- source_word: αὐτό
  english_pob_choice: it
  chosen_spanish: lo
  alternatives_spanish:
  - el altar
  lexicon: LSJ
  rationale: El pronombre retoma el altar mencionado en el contexto inmediato. En español se puede conservar el pronombre y mantener la referencia clara por el flujo del pasaje.
- source_word: μή ποτε γένηται αὐτοῖς εἰς ὄνειδος
  english_pob_choice: lest it become a reproach to them
  chosen_spanish: para que no les fuera motivo de oprobio
  alternatives_spanish:
  - para que no les fuera reproche
  - para que no les resultara vergüenza
  lexicon: LSJ
  rationale: ὄνειδος implica reproche público, deshonra o vergüenza. «Motivo de oprobio» conserva bien la dimensión de deshonra pública y el tono bíblico, con una formulación natural en español.
- source_word: ἐμίαναν
  english_pob_choice: had defiled
  chosen_spanish: habían contaminado
  alternatives_spanish:
  - habían profanado
  - habían manchado
  lexicon: LSJ
  rationale: μιαίνω expresa contaminación o mancha ritual. «Contaminado» comunica la impureza cultual del altar sin desplazarse demasiado hacia una categoría meramente moral o emocional.
- source_word: τὰ ἔθνη
  english_pob_choice: the nations
  chosen_spanish: las naciones
  alternatives_spanish:
  - los gentiles
  - los pueblos
  lexicon: LSJ
  rationale: Se conserva la opción más directa y menos cargada interpretativamente. En este contexto judío, «las naciones» deja abierta la referencia a los no judíos sin imponer un término confesional fijo.
- source_word: καθεῖλον τὸ θυσιαστήριον
  english_pob_choice: they tore down the altar
  chosen_spanish: derribaron el altar
  alternatives_spanish:
  - demolieron el altar
  - lo derribaron
  lexicon: LSJ
  rationale: θυσιαστήριον significa «altar». Se repite el verbo de derribo para mantener coherencia léxica con el infinitivo previo y reflejar la acción completada del aoristo.
theological_decisions:
- issue: Impureza cultual del altar
  english_pob_reading: defiled
  chosen_spanish_reading: contaminado
  alternative_spanish_readings:
  - profanado
  - manchado
  rationale: El pasaje trata de un altar hecho impuro por uso pagano. «Contaminado» preserva el campo semántico ritual de una impureza real sobre el altar, sin reducirlo a una mera ofensa simbólica.
  doctrine_reference: Principios de traducción del POB sobre precisión cultual y registro bíblico
translation_notes:
  revision_awareness: 'El borrador sigue de cerca el texto griego de Swete y el criterio exegético del POB inglés. Se mantuvo la ambigüedad útil de τὰ ἔθνη con «las naciones», y se conservó la secuencia deliberativa: un buen plan, el motivo de evitar oprobio, la contaminación cultual y la acción final de derribar el altar.'
  spanish_consistency_notes:
  - Se usó «Y» al inicio para corresponder al encadenamiento narrativo del original.
  - Se evitó «SEÑOR» u այլ máscaras, porque no aparece el nombre divino en este versículo.
  - «Oprobio» mantiene el registro bíblico y la dimensión pública del deshonor.
  - Se prefirió «las naciones» como término base, con nota para la alternativa «los gentiles».
