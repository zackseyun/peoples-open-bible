translation:
  language: es
  text: 'Entonces midió la longitud del edificio que daba frente al área separada que estaba detrás de él, con sus galerías[a] a un lado y al otro: cien codos; y la nave interior[b] y los pórticos del atrio.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «sus columnatas» o alguna otra estructura lateral arquitectónica; el término hebreo es incierto.
    reason: lexical_alternative
  - marker: b
    text: O «el templo interior» o «el santuario interior» para «la nave interior».
    reason: lexical_alternative
lexical_decisions:
- source_word: וּמָדַד
  english_pob_choice: Then he measured
  chosen_spanish: Entonces midió
  alternatives_spanish:
  - Y midió
  - Luego midió
  lexicon: HALOT
  rationale: El wayyiqtol avanza la secuencia narrativa; «Entonces» conserva ese avance en español con naturalidad.
- source_word: אֹרֶךְ
  english_pob_choice: the length
  chosen_spanish: la longitud
  alternatives_spanish:
  - el largo
  - la medida de largo
  lexicon: HALOT
  rationale: En un contexto arquitectónico de medición, «longitud» es claro y fiel al término de medida.
- source_word: הַבִּנְיָן
  english_pob_choice: the building
  chosen_spanish: el edificio
  alternatives_spanish:
  - la construcción
  - la estructura
  lexicon: HALOT
  rationale: El término hebreo es genérico; «edificio» funciona bien en el contexto del complejo del templo y evita una sobreinterpretación.
- source_word: אֶל־פְּנֵי
  english_pob_choice: facing
  chosen_spanish: que daba frente a
  alternatives_spanish:
  - frente a
  - orientado hacia
  lexicon: HALOT
  rationale: La locución espacial se expresa naturalmente en español con «que daba frente a», preservando la orientación arquitectónica.
- source_word: הַגִּזְרָה
  english_pob_choice: the separate area
  chosen_spanish: el área separada
  alternatives_spanish:
  - el lugar separado
  - la zona separada
  lexicon: HALOT
  rationale: POB inglés mantiene la idea de separación sin precisar excesivamente la función arquitectónica; «área separada» conserva esa reserva.
- source_word: אֲשֶׁר עַל אַחֲרֶיהָ
  english_pob_choice: that was behind it
  chosen_spanish: que estaba detrás de él
  alternatives_spanish:
  - que quedaba a su espalda
  - que estaba en su parte posterior
  lexicon: HALOT
  rationale: La relación espacial posterior se mantiene de manera directa y idiomática.
- source_word: וְאֲתִיקֶיהָ
  english_pob_choice: with its galleries
  chosen_spanish: con sus galerías
  alternatives_spanish:
  - con sus pórticos
  - con sus colonnadas
  lexicon: HALOT
  rationale: Siguiendo la elección auditada de POB, «galerías» preserva una solución arquitectónica plausible sin fijar demasiado el objeto exacto, que sigue siendo incierto.
- source_word: מִפּוֹ וּמִפּוֹ
  english_pob_choice: on this side and on that side
  chosen_spanish: a un lado y al otro
  alternatives_spanish:
  - a ambos lados
  - de un lado y del otro
  lexicon: HALOT
  rationale: La duplicación deíctica se vierte de forma viva y natural en español, conservando la simetría lateral.
- source_word: מֵאָה אַמָּה
  english_pob_choice: one hundred cubits
  chosen_spanish: cien codos
  alternatives_spanish:
  - cien cubitos
  - cien medidas de codo
  lexicon: HALOT
  rationale: Se preserva la unidad antigua de medida; «codos» es la forma española estándar y transparente.
- source_word: הַהֵיכָל הַפְּנִימִי
  english_pob_choice: the inner nave
  chosen_spanish: el templo interior
  alternatives_spanish:
  - la nave interior
  - el santuario interior
  lexicon: HALOT
  rationale: POB deja abierta la oscilación entre nave/santuario/templo; en español, «templo interior» comunica bien la referencia arquitectónica sin cerrar indebidamente la ambigüedad.
- source_word: וְאֻלַמֵּי הֶחָצֵר
  english_pob_choice: and the porches of the court
  chosen_spanish: y los pórticos del atrio
  alternatives_spanish:
  - y los pórticos del patio
  - y los vestíbulos del atrio
  lexicon: HALOT
  rationale: «Atrio» mantiene el registro bíblico para חָצֵר y «pórticos» reproduce adecuadamente אֻלָם en plural.
theological_decisions:
- issue: Referencia al nombre divino ausente en el versículo
  english_pob_reading: No divine-name term is present in the verse.
  chosen_spanish_reading: No se introduce ninguna mención divina en el versículo.
  alternative_spanish_readings:
  - No aplica.
  - —
  rationale: El texto hebreo de este versículo es puramente arquitectónico; no hay decisión teológica sobre el nombre divino que deba imponerse en la traducción.
  doctrine_reference: N/A
translation_notes:
  revision_awareness: El pasaje inglés auditado quedó sin cambios en la última revisión y presenta alto acuerdo general; la versión española sigue de cerca esa solución, conservando las mismas zonas de incertidumbre léxica en forma de notas.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma del proyecto, aunque este versículo no contiene el nombre divino.
  - Se usa «codos» para la unidad de medida, en línea con el estándar bíblico español y con la elección inglesa «cubits».
  - «Atrio» se conserva por su uso bíblico tradicional y transparente en contexto arquitectónico.
  - Se evita fijar demasiado el valor de אֲתִיקִים; por eso la nota permite «colonnadas» como alternativa.
  - «Templo interior» deja la misma ambigüedad que el inglés auditado, evitando imponer una interpretación más cerrada.
