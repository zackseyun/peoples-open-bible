translation:
  language: es
  text: Después salió su hermano[a], y tenía su mano agarrada al talón de Esaú, por eso fue llamado Jacob. E Isaac tenía sesenta años cuando nacieron.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Jacob suena como un nombre asociado con 'talón' y, más adelante, con 'suplantar', en consonancia con el detalle de que su mano estaba agarrada al talón de Esaú.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְאַחֲרֵי כֵן
  english_pob_choice: Afterward
  chosen_spanish: Después
  alternatives_spanish:
  - Luego
  - Más tarde
  lexicon: HALOT
  rationale: Marca la secuencia narrativa de manera natural en español sin añadir matices no presentes en el hebreo.
- source_word: יָצָא
  english_pob_choice: came out
  chosen_spanish: salió
  alternatives_spanish:
  - salió al exterior
  - vino al mundo
  lexicon: HALOT
  rationale: En este contexto de parto, 'salió' conserva la imagen concreta de la salida del vientre sin volverlo más interpretativo que el hebreo.
- source_word: אָחִיו
  english_pob_choice: his brother
  chosen_spanish: su hermano
  alternatives_spanish:
  - su hermano gemelo
  lexicon: HALOT
  rationale: El hebreo dice simplemente 'su hermano'; no se debe importar explícitamente la gemelidad en la palabra misma.
- source_word: וְיָדוֹ אֹחֶזֶת
  english_pob_choice: and his hand was grasping
  chosen_spanish: y su mano estaba asiendo
  alternatives_spanish:
  - y su mano agarraba
  - y su mano estaba sujetando
  lexicon: HALOT
  rationale: '''Estaba asiendo'' refleja el aspecto progresivo del participio y mantiene la acción visible y física del original.'
- source_word: בַּעֲקֵב
  english_pob_choice: Esau’s heel
  chosen_spanish: el talón de Esaú
  alternatives_spanish:
  - el talón de Esaú
  - el calcañar de Esaú
  lexicon: HALOT
  rationale: '''Talón'' es el equivalente natural y claro en español; evita una formulación artificial y conserva el detalle corporal del hebreo.'
- source_word: וַיִּקְרָא שְׁמ֖וֹ
  english_pob_choice: so his name was called
  chosen_spanish: por eso fue llamado
  alternatives_spanish:
  - y fue llamado
  - así fue nombrado
  lexicon: HALOT
  rationale: La pasiva impersonal del hebreo se expresa de forma idiomática en español con 'fue llamado'; 'por eso' reproduce la conexión narrativa señalada por el inglés POB.
- source_word: יַעֲקֹב
  english_pob_choice: Jacob
  chosen_spanish: Jacob
  alternatives_spanish:
  - Yaacob
  lexicon: HALOT
  rationale: Se conserva la forma española establecida del nombre propio.
- source_word: וְיִצְחָק
  english_pob_choice: And Isaac
  chosen_spanish: E Isaac
  alternatives_spanish:
  - Y Isaac
  - Entonces Isaac
  lexicon: HALOT
  rationale: '''E'' es la forma eufónica estándar en español antes de palabra con sonido inicial /i/; mantiene la continuidad narrativa.'
- source_word: בֶּן שִׁשִּׁים שָׁנָה
  english_pob_choice: was sixty years old
  chosen_spanish: tenía sesenta años
  alternatives_spanish:
  - era de sesenta años
  - tenía sesenta años de edad
  lexicon: HALOT
  rationale: Es la manera natural en español de expresar la edad en este contexto, sin alterar el sentido temporal del hebreo.
- source_word: בְּלֶדֶת אֹתָם
  english_pob_choice: when they were born
  chosen_spanish: cuando ellos nacieron
  alternatives_spanish:
  - al nacer ellos
  - cuando nacieron
  lexicon: HALOT
  rationale: Conserva el referente plural del hebreo ('ellos') y expresa el momento del nacimiento de forma clara y sobria.
translation_notes:
  revision_awareness: La revisión inglesa más reciente ajustó la construcción a 'and his hand was grasping' para acercarse más al hebreo. La versión española adopta esa alineación con 'y su mano estaba asiendo', manteniendo además la secuencia narrativa y la pasiva impersonal del nombramiento sin introducir glosas innecesarias en el cuerpo del texto.
  spanish_consistency_notes:
  - Se mantiene 'Jacob' como forma establecida del nombre propio.
  - Se evita traducir 'אָחִיו' como 'gemelo' porque el hebreo no lo explicita aquí.
  - Se conserva la imagen corporal de 'talón' para reflejar el juego nominal sugerido en la nota.
  - Se usa la pasiva 'fue llamado' para reproducir el fórmula de nombramiento del hebreo.
  - La conjunción 'E' en 'E Isaac' responde a eufonía estándar del español ante /i/ inicial.
