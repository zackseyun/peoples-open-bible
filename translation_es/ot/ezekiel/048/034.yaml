translation:
  language: es
  text: 'Del lado occidental, cuatro mil quinientos[a], con sus tres puertas[b]: la puerta de Gad, una; la puerta de Aser, una; la puerta de Neftalí, una.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebreo literalmente, «quinientos y cuatro mil»; el sentido idiomático es 4.500.
    reason: lexical_alternative
  - marker: b
    text: 'O «sus puertas: tres»; el hebreo usa una fórmula de lista sin verbo.'
    reason: lexical_alternative
lexical_decisions:
- source_word: פְּאַת יָמָּה
  english_pob_choice: On the west side
  chosen_spanish: Del lado occidental
  alternatives_spanish:
  - En el lado occidental
  - Al lado occidental
  lexicon: HALOT
  rationale: פְּאַת expresa borde, lado o costado; יָמָּה indica dirección hacia el oeste. En español, «del lado occidental» conserva la referencia locativa y suena natural en un listado arquitectónico.
- source_word: חֲמֵשׁ מֵאוֹת וְאַרְבַּעַת אֲלָפִים
  english_pob_choice: four thousand five hundred
  chosen_spanish: cuatro mil quinientos
  alternatives_spanish:
  - cuatro mil y quinientos
  lexicon: HALOT
  rationale: El hebreo es literalmente una formulación aditiva, pero el valor idiomático es 4,500. El español estándar dice «cuatro mil quinientos», manteniendo la cifra exacta sin forzar el orden hebreo.
- source_word: שַׁעֲרֵיהֶם שְׁלֹשָׁה
  english_pob_choice: with their three gates
  chosen_spanish: con sus tres puertas
  alternatives_spanish:
  - y sus tres puertas
  - 'sus puertas: tres'
  lexicon: HALOT
  rationale: La expresión hebrea es una lista sin verbo y con valor atributivo/aposicional. «Con sus tres puertas» comunica la relación posesiva y la función de enumeración en español sin añadir un verbo inexistente en el hebreo.
- source_word: שַׁעַר גָּד אֶחָד
  english_pob_choice: the gate of Gad, one
  chosen_spanish: la puerta de Gad, una
  alternatives_spanish:
  - una puerta de Gad
  - la puerta gadita, una
  lexicon: HALOT
  rationale: Se conserva la estructura repetida «puerta + nombre tribal + uno» del hebreo. En español, la concordancia natural pide «una» referido a «puerta», y «de Gad» mantiene la relación genitiva.
- source_word: שַׁעַר אָשֵׁר אֶחָד
  english_pob_choice: the gate of Asher, one
  chosen_spanish: la puerta de Aser, una
  alternatives_spanish:
  - una puerta de Aser
  - la puerta aserita, una
  lexicon: HALOT
  rationale: Se mantiene la misma solución que con Gad para conservar la pauta enumerativa del pasaje y la coherencia terminológica en toda la lista.
- source_word: שַׁעַר נַפְתָּלִי אֶחָד
  english_pob_choice: the gate of Naphtali, one
  chosen_spanish: la puerta de Neftalí, una
  alternatives_spanish:
  - una puerta de Neftalí
  - la puerta neftalita, una
  lexicon: HALOT
  rationale: Se translitera el nombre tribal como «Neftalí», forma clara y reconocible en español bíblico, y se conserva el patrón repetitivo del hebreo.
theological_decisions:
- issue: Tratamiento del nombre divino ausente y del tono del pasaje
  english_pob_reading: No theological decisions listed; the verse is a geographical/catalog list.
  chosen_spanish_reading: No se introduce ningún término teológico ajeno al texto; se conserva el tono descriptivo y administrativo del pasaje.
  alternative_spanish_readings:
  - Agregar una glosa interpretativa sobre la distribución tribal
  - Convertir la lista en una explicación más fluida
  rationale: El hebreo presenta una enumeración topográfica. La fidelidad exige mantener el carácter de catálogo sin cargar el verso con interpretaciones que el texto no formula.
  doctrine_reference: Principio de suficiencia textual y no ampliación interpretativa
translation_notes:
  revision_awareness: La revisión inglesa más reciente no cambió el contenido; el seguimiento cruzado indica alta concordancia. No hay variantes textuales relevantes en el paquete proporcionado, así que la redacción española sigue de cerca el valor lexical y la estructura enumerativa del hebreo.
  spanish_consistency_notes:
  - Se usa «puerta» en vez de «portón» para mantener la correspondencia lexical constante con el patrón del hebreo.
  - 'Se transliteran los nombres tribales de modo estándar: Gad, Aser, Neftalí.'
  - La cifra se expresa en la forma natural del español, pero la nota conserva la alternativa literal del hebreo para auditar la decisión.
  - El registro es sobrio y listativo, acorde con una sección de medición y distribución territorial.
