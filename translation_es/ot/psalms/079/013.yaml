review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien la estructura y el sentido básico del hebreo: contraste adversativo («Pero nosotros»), identidad pactual («tu pueblo»), metáfora pastoral, acción futura de gratitud, continuidad temporal y proclamación intergeneracional de la alabanza. También mantiene correctamente la distinción entre נוֹדֶה («dar gracias») y תְּהִלָּתֶךָ («tu alabanza»). Sin embargo, «pastizal» no es la mejor correspondencia para מַרְעִיתֶךָ en este contexto bíblico; suena demasiado zootécnico/ganadero y menos natural que «prado» o «pasto» para la metáfora devocional. Además, la nota b está mal anclada semánticamente: el inglés conserva como alternativa de נְסַפֵּר «we will declare your praise», no una repetición de toda la segunda cola ni una alternativa a «por siempre».'
  spanish_quality_summary: El español es claro y legible, con tono bíblico moderno y digno. «Pero nosotros… te daremos gracias… de generación en generación…» fluye bien. El principal problema de estilo es «las ovejas de tu pastizal», que en español general resulta poco natural para un texto litúrgico; «prado» suena más idiomático y conserva la imagen pastoral. También conviene corregir la nota b para que corresponda con el segmento correcto del texto.
  glossary_alignment: 'No hay conflictos con la terminología base del proyecto. No aparece el nombre divino ni otros términos sensibles del glosario. La decisión de conservar la metáfora pastoral y la diferencia entre «dar gracias» y «alabanza» está alineada con el rastro léxico y teológico del POB inglés. La excepción necesaria es estilística: sustituir «pastizal» por «prado» para representar mejor מַרְעִיתֶךָ en español bíblico natural.'
  issues:
  - severity: medium
    issue: «pastizal» para מַרְעִיתֶךָ suena poco natural en registro bíblico
    rationale: Aunque semánticamente posible, «pastizal» evoca un terreno de pastoreo en sentido técnico o rural moderno. «Prado» preserva mejor la imagen poética y pastoral de «the sheep of your pasture» en español eclesial legible.
  - severity: medium
    issue: La nota b no corresponde al lugar ni al contenido adecuado
    rationale: El inglés tiene una alternativa para נְסַפֵּר («we will declare your praise»), pero la nota española b está colocada tras «por siempre» y dice «O «contaremos tu alabanza»», lo cual duplica la traducción principal de la segunda cola y no ofrece una alternativa real al segmento marcado.
  revised_spanish_text: Pero nosotros, tu pueblo y las ovejas de tu prado[a], te daremos gracias por siempre; de generación en generación contaremos[b] tu alabanza.
  revised_footnotes:
