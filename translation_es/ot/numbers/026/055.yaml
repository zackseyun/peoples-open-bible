review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien el hebreo: אַךְ como restricción exclusiva, בְּגוֹרָל como medio instrumental, יֵחָלֵק en voz pasiva/reflexiva, הָאָרֶץ como «la tierra», לִשְׁמוֹת como estándar de referencia, מַטּוֹת como «tribus», אֲבֹתָם preservado como «padres», e יִנְחָלוּ como «heredarán». La única desalineación relevante está en la nota al pie: la nota inglesa ofrece como alternativa «their ancestors», pero la nota española actual dice «O “sus padres”», que repite el texto principal en vez de dar la alternativa.'
  spanish_quality_summary: El español es claro y digno. «Sólo»/«por sorteo»/«se dividirá la tierra» suena natural. «Ellos la heredarán» es comprensible, aunque el pronombre explícito no es necesario; no obstante, no constituye error. La reparación necesaria es mínima y se limita a la nota al pie para que coincida con la lógica lexical documentada.
  glossary_alignment: No hay conflictos con la terminología del proyecto. No aparece Yahvé ni otra terminología sensible. Se respeta la decisión de mantener «sus padres» en el texto principal por precisión genealógica masculina, con alternativa explicativa en nota.
  issues:
  - severity: medium
    issue: La nota al pie está formulada al revés.
    rationale: 'El texto principal ya dice «sus padres». La nota comienza «O “sus padres”», pero debería ofrecer la alternativa al texto principal, equivalente a la nota inglesa: «O “sus antepasados”». Tal como está, la nota no aporta la alternativa lexical preservada en el rastro de auditoría.'
  revised_spanish_text: Sólo por sorteo[a] se dividirá la tierra; ellos la heredarán conforme a los nombres de las tribus de sus padres.
  revised_footnotes:
  - marker: a
    text: O «sus antepasados». El hebreo dice literalmente «sus padres», refiriéndose a las líneas ancestrales paternas dentro de las tribus.
    reason: lexical_alternative
  revision_rationale: Se conserva intacto el texto principal porque es fiel y natural. Se corrige únicamente la nota al pie para que presente la alternativa lexical correcta y no repita el mismo término del texto principal.
