translation:
  language: es
  text: Para una mala esposa[a], un sello es bueno; y donde hay manos flojas[b], ábrelo[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «mujer». El hebreo אשה y el griego γυνή pueden significar «mujer» o «esposa». Aquí se usa «esposa» por el contexto doméstico del dicho.
    reason: alternative_reading
  - marker: b
    text: El hebreo conservado sugiere «manos flojas/relajadas», mientras que el paralelo griego lee «muchas manos». La lectura griega da un sentido claro sobre acceso compartido o múltiple.
    reason: textual_variant
  - marker: c
    text: El hebreo final parece decir literalmente «ábrelo», mientras que el paralelo griego tiene «ciérralo».
    reason: textual_variant
lexical_decisions:
- source_word: ἐπὶ γυναικὶ πονηρᾷ / אשה רעה
  english_pob_choice: a bad wife
  chosen_spanish: una mujer mala
  alternatives_spanish:
  - una esposa mala
  - una mujer perversa
  - una mala mujer
  lexicon: HALOT; LXX γυνή
  rationale: El hebreo אשה puede significar 'mujer' o 'esposa', y el griego γυναικί también admite ambos matices. En español, 'esposa' sonaría más específico de lo que exige el texto; 'mujer mala' conserva la ambigüedad útil y evita endurecer el dicho más allá de la evidencia. 'Mala' expresa el valor cualitativo de רעה/πονηρᾷ de modo natural.
- source_word: חותם חסם / καλὸν σφραγίς
  english_pob_choice: a seal is good
  chosen_spanish: bueno es el sello
  alternatives_spanish:
  - un sello es bueno
  - el sello es bueno
  - conviene un sello
  lexicon: HALOT; LXX σφραγίς
  rationale: El hebreo y el griego presentan una fórmula proverbial breve. 'Bueno es el sello' reproduce la concisión sin forzar una paráfrasis. En español, el orden enfático con 'bueno es' suena más proverbial y mantiene la idea de que el sello es apropiado/aconsejable.
- source_word: ὅπου / ומקום
  english_pob_choice: and where
  chosen_spanish: y donde hay
  alternatives_spanish:
  - y donde
  - y en donde hay
  - y dondequiera que
  lexicon: HALOT; LXX ὅπου
  rationale: El hebreo y el griego introducen una cláusula locativa. En español, 'donde hay' hace natural la construcción y permite enlazar con el sujeto implícito de 'manos' sin añadir explicación indebida.
- source_word: χеῖρες πολλαί / ידים רפות
  english_pob_choice: many hands
  chosen_spanish: manos flojas
  alternatives_spanish:
  - muchas manos
  - manos débiles
  - manos sueltas
  - manos ociosas
  lexicon: HALOT; LXX χεῖρες πολλαί
  rationale: El hebreo conservado apunta a 'manos flojas/relajadas', mientras que el griego ofrece 'muchas manos'. Dado que el registro fuente muestra tensión textual, el español principal sigue la lectura hebrea visible y mantiene la imagen de 'manos flojas'. 'Flojas' comunica bien la debilidad o falta de firmeza sin introducir un giro ajeno.
- source_word: תפתח / κλεῖσον
  english_pob_choice: lock it up
  chosen_spanish: ciérralo
  alternatives_spanish:
  - álalo
  - ciérralo con llave
  - séllelo
  lexicon: HALOT; LXX κλεῖσον
  rationale: El hebreo final puede leerse literalmente como 'abrirás', pero el paralelo griego manda 'cierra/ciérralo'. En español, 'ciérralo' preserva la fuerza breve del mandato proverbial y resuelve la tensión textual en favor del sentido más claro del paralelo griego, sin expandirlo innecesariamente.
theological_decisions:
- issue: Tratamiento de una sentencia sapiencial que puede sonar despectiva hacia la mujer
  english_pob_reading: The verse uses 'wife' and keeps the domestic warning without universalizing it against women in general.
  chosen_spanish_reading: una mujer mala
  alternative_spanish_readings:
  - una esposa mala
  - una mujer perversa
  - una mala mujer
  rationale: La sentencia pertenece a instrucción sapiencial doméstica y no debe ampliarse a un juicio universal sobre las mujeres. Al mantener 'mujer' en lugar de 'esposa', el español conserva la ambigüedad de la fuente y evita imponer un vínculo conyugal no explícito en el texto hebreo/griego conservado. A la vez, no suaviza el tono difícil del proverbio.
  doctrine_reference: 'DOCTRINE.md: Gender-accurate over gender-neutral; preserve the source''s intent without importing claims the text does not make.'
- issue: Decisión entre lectura hebrea conservada y paralelo griego en la cláusula final
  english_pob_reading: The POB audit trail notes a textual tension and moved between 'many hands / slack hands' and 'open / shut.'
  chosen_spanish_reading: manos flojas ... ciérralo
  alternative_spanish_readings:
  - muchas manos ... ciérralo
  - manos flojas ... ábrelo
  - muchas manos ... ábrelo
  rationale: 'El registro fuente conserva una tensión real entre la forma hebrea y el paralelo griego. El español principal sigue la hebreo-visible en la imagen de ''manos flojas'', pero adopta el mandato de ''cerrar'' conforme al griego, porque así queda una sentencia coherente y reconociblemente proverbial. No se borra la tensión: queda indicada en las notas.'
  doctrine_reference: 'POB textual-criticism principle: preserve documented tension; prefer the clearest source-supported sense while making the variant visible in footnotes.'
translation_notes:
  revision_awareness: 'La redacción española responde a la última tensión del expediente: el texto inglés final volvió a ''hands are slack'' y ''open it'', mientras que la revisión más reciente discutida en el expediente muestra el conflicto textual entre hebreo y griego. Aquí se preserva esa tensión de forma visible: se sigue la imagen hebrea de ''manos flojas'' y se adopta el mandato griego de ''ciérralo'', con notas explícitas para ambas variantes.'
  spanish_consistency_notes:
  - Se mantiene 'mujer' y no 'esposa' en el texto principal para no estrechar el alcance del sustantivo hebreo/griego.
  - '''Sello'' se usa para σφραγίς/חותם por ser el equivalente normal y claro en español.'
  - El imperativo final 'ciérralo' conserva la brevedad proverbial y evita una paráfrasis explicativa.
  - Se evita 'SEÑOR' u otras sustituciones no pertinentes, pues no aparece el nombre divino en este versículo.
  - El tono es sapiencial y sentencioso, con sintaxis breve y pública lectura eclesial.
