- source_word: אֲנָחֲרַת
  english_pob_choice: Anaharath
  chosen_spanish: Anaharat
  alternatives_spanish:
  - Anaharath
  - Anajarat
  lexicon: topónimo
  rationale: Nombre propio de lugar; se translitera al español con una terminación más natural en -at, sin intentar traducir su sentido. Se conserva el valor onomástico del término.
- source_word: וַ / וְ
