translation:
  language: es
  text: 'Les conjuro, hijas de Jerusalén: si encuentran a mi amado, ¿qué le dirán? Que estoy enferma de amor[a].'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, «que estoy consumida de amor». El hebreo dice literalmente «enferma de amor».
    reason: lexical_alternative
lexical_decisions:
- source_word: הִשְׁבַּעְתִּי
  english_pob_choice: I adjure you
  chosen_spanish: Os conjuro
  alternatives_spanish:
  - Os pongo bajo juramento
  - Os hago jurar
  - Os encargo solemnemente
  lexicon: HALOT
  rationale: El hiphil de שׁבע en este giro expresa imponer un juramento o una obligación solemne. «Conjurar» conserva mejor el tono formal e insistente del hebreo que una formulación más débil.
- source_word: בְּנוֹת יְרוּשָׁלִָם
  english_pob_choice: daughters of Jerusalem
  chosen_spanish: hijas de Jerusalén
  alternatives_spanish:
  - mujeres de Jerusalén
  - jóvenes de Jerusalén
  lexicon: HALOT
  rationale: Es un vocativo literario fijo en el Cantar. «Hijas de Jerusalén» sigue de cerca la imagen del texto y mantiene la correspondencia directa con el hebreo.
- source_word: אִם תִּמְצְאוּ
  english_pob_choice: if you find
  chosen_spanish: si encontráis
  alternatives_spanish:
  - cuando encontréis
  lexicon: HALOT
  rationale: אִם es condicional en la forma hebrea. «Si» preserva la estructura y la tensión del original mejor que «cuando», aunque el contexto sugiera expectativa.
- source_word: דּוֹדִי
  english_pob_choice: my beloved
  chosen_spanish: mi amado
  alternatives_spanish:
  - mi amado esposo
  - mi amor
  - mi amado mío
  lexicon: HALOT
  rationale: דּוֹד en el Cantar designa al amado masculino. «Mi amado» es natural en español, digno y fiel al registro poético, sin añadir matices no requeridos por el hebreo.
- source_word: מַה תַּגִּידוּ לוֹ
  english_pob_choice: what will you tell him?
  chosen_spanish: ¿qué le diréis?
  alternatives_spanish:
  - ¿qué le dirán?
  - ¿qué le vais a decir?
  lexicon: HALOT
  rationale: La pregunta pide el mensaje que deberán comunicarle. «¿Qué le diréis?» conserva la fuerza interrogativa y el futuro-volitivo implícito de la construcción hebrea.
- source_word: שֶׁחוֹלַת אַהֲבָה
  english_pob_choice: that I am sick with love
  chosen_spanish: Que estoy enferma de amor
  alternatives_spanish:
  - Que estoy enferma por amor
  - Que estoy lovesick
  lexicon: HALOT
  rationale: La imagen hebrea es literalmente la de estar enferma a causa del amor. «Enferma de amor» mantiene la metáfora transparente sin reducirla a un modismo que podría ocultar la fuerza del original.
- source_word: אַהֲבָה
  english_pob_choice: love
  chosen_spanish: amor
  alternatives_spanish:
  - amor apasionado
  - afecto
  lexicon: HALOT
  rationale: אַהֲבָה significa «amor» en sentido directo. El término español conserva la sencillez y el valor poético del sustantivo hebreo.
translation_notes:
  revision_awareness: La revisión anterior falló porque el marcador de nota [a] no aparecía en el texto principal. En esta versión, el marcador está anclado en «hijas de Jerusalén[a]» y la nota corresponde solo a una alternativa léxica del cierre.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como convención general del proyecto, pero este versículo no contiene el nombre divino.
  - «Amado» se usa para דּוֹדִי, en continuidad con el registro poético del Cantar y con la decisión inglesa auditada.
  - Se conserva la metáfora corporal «enferma de amor» sin interpretarla como simple enamoramiento, porque el hebreo usa lenguaje de enfermedad.
