revisions:
- from: 'Y él presentará su ofrenda a Yahvé: un cordero macho de un año, sin defecto, para holocausto[a], y una cordera de un año, sin defecto, para expiación[b], y un carnero, sin defecto, para ofrendas de paz[c].'
  to: 'Y él presentará su ofrenda a Yahvé: un cordero macho de un año sin defecto para holocausto, y una cordera de un año sin defecto para ofrenda por el pecado[a], y un carnero sin defecto para ofrendas de paz[b].'
  rationale: Se corrigió חַטָּאת a «ofrenda por el pecado» para preservar la categoría sacrificial explícita de la fuente y alinearse con la decisión principal del English POB, dejando «ofrenda de purificación» como alternativa en nota. Se reubicaron las notas en sus términos correctos y se eliminó la nota duplicada sobre שְׁלָמִים. También se aligeró la puntuación para un español más natural sin pérdida de precisión.
