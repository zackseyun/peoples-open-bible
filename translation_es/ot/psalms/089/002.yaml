revisions:
- from: Cantaré de las misericordias de Yahvé para siempre[a]; de generación en generación daré a conocer tu fidelidad con mi boca.
  to: Cantaré para siempre del amor fiel[a] de Yahvé; de generación en generación daré a conocer tu fidelidad con mi boca.
  rationale: Se revisa únicamente la representación principal de חַסְדֵי para alinearla con la evidencia fuente y la decisión lexical auditada del POB inglés. «Amor fiel» preserva mejor el sentido de amor pactual constante; la nota conserva la alternativa de «misericordias» y las manifestaciones concretas de ese amor. El resto del versículo se mantiene porque refleja fielmente el hebreo y lee bien en español.
