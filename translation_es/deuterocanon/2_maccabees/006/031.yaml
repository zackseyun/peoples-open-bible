translation:
  language: es
  text: Así pues, de este modo falleció, dejando su propia muerte como ejemplo de valentía y recuerdo[a] de virtud, no solo para los jóvenes, sino también para la mayor parte de la nación.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «memorial». El griego se refiere a algo que preserva la memoria; «recuerdo» se usa aquí por mayor naturalidad en español.
    reason: lexical_alternative
lexical_decisions:
- source_word: μετήλλαξεν
  english_pob_choice: passed away
  chosen_spanish: falleció
  alternatives_spanish:
  - murió
  - pasó de esta vida
  - partió
  lexicon: LSJ
  rationale: El verbo griego es una forma elevada y eufemística para la muerte. En español, «falleció» conserva ese tono digno sin volverlo artificial, y corresponde mejor que «murió» al registro narrativo solemne del contexto martirial.
- source_word: τοῦτον τὸν τρόπον
  english_pob_choice: in this way
  chosen_spanish: de este modo
  alternatives_spanish:
  - así
  - de esta manera
  lexicon: LSJ
  rationale: La frase adverbial indica modo. «De este modo» reproduce con naturalidad el sentido de manera y mantiene la relación inmediata con la acción anterior.
- source_word: ὑπόδειγμα
  english_pob_choice: example
  chosen_spanish: ejemplo
  alternatives_spanish:
  - modelo
  - patrón
  lexicon: LSJ
  rationale: El término designa algo que se presenta para imitación. «Ejemplo» es la opción más clara y fiel en español contemporáneo.
- source_word: γενναιότητος
  english_pob_choice: courage
  chosen_spanish: valentía
  alternatives_spanish:
  - coraje
  - bravura
  - nobleza
  lexicon: LSJ
  rationale: Aquí el sustantivo expresa temple moral y audacia ante la muerte. «Valentía» comunica bien el matiz de fortaleza admirable en español, y evita cargar el texto con una noción demasiado aristocrática o abstracta.
- source_word: μνημόσυνον
  english_pob_choice: memorial
  chosen_spanish: memorial
  alternatives_spanish:
  - recuerdo
  - conmemoración
  - memoria
  lexicon: LSJ
  rationale: La palabra apunta a algo que preserva la memoria. «Memorial» conserva el tono solemne y conmemorativo del griego.
- source_word: ἀρετῆς
  english_pob_choice: virtue
  chosen_spanish: virtud
  alternatives_spanish:
  - excelencia
  - excelencia moral
  lexicon: LSJ
  rationale: En este contexto helenístico judío, ἀρετή tiene una carga ética clara. «Virtud» es la equivalencia más natural y fiel en español.
- source_word: τοῖς νέοις
  english_pob_choice: the young
  chosen_spanish: los jóvenes
  alternatives_spanish:
  - la juventud
  - los muchachos
  lexicon: LSJ
  rationale: El dativo indica destinatarios o beneficiarios. «Los jóvenes» preserva el sentido colectivo sin forzar precisión de edad o género.
- source_word: τοῖς πλείστοις τοῦ ἔθνους
  english_pob_choice: most of the nation
  chosen_spanish: la mayoría de la nación
  alternatives_spanish:
  - la mayor parte de la nación
  - la mayoría del pueblo
  lexicon: LSJ
  rationale: ἔθνος aquí se refiere al pueblo/nación judía. «La mayoría de la nación» conserva el alcance colectivo y evita diluirlo en un simple «pueblo» genérico.
- source_word: καταλιπών
  english_pob_choice: leaving behind
  chosen_spanish: dejando
  alternatives_spanish:
  - dejando atrás
  - legando
  lexicon: LSJ
  rationale: El participio expresa el legado producido por su muerte. «Dejando» en español es natural y suficiente; el complemento «su propia muerte como...» preserva el sentido de legado sin añadir interpretación.
theological_decisions:
- issue: Tono moral en un relato martirial deuterocanónico
  english_pob_reading: Render ἀρετή as 'virtue' and γενναιότης as 'courage' without importing later doctrinal categories.
  chosen_spanish_reading: Traducir ἀρετή como «virtud» y γενναιότης como «valentía», manteniendo el registro ético y ejemplar del texto sin cargarlo doctrinalmente.
  alternative_spanish_readings:
  - «coraje» y «excelencia moral»
  - «bravura» y «nobleza»
  rationale: El versículo presenta la muerte de Eleazar como modelo moral para otros. La traducción debe conservar esa fuerza ética y conmemorativa, evitando términos que suenen a categorías doctrinales posteriores o que desplacen el énfasis del martirio ejemplar.
  doctrine_reference: Translation philosophy §§1, 5, 6
- issue: Eufemismo para la muerte
  english_pob_reading: Use 'passed away' for μετήλλαξεν.
  chosen_spanish_reading: Usar «falleció» para mantener el carácter elevado del verbo griego.
  alternative_spanish_readings:
  - «murió»
  - «partió de esta vida»
  rationale: El griego no emplea un verbo llano y ordinario para morir. «Falleció» reproduce la dignidad del registro sin oscurecer el sentido.
  doctrine_reference: Translation philosophy §§1, 6
translation_notes:
  revision_awareness: 'La redacción sigue el último estado del audit trail inglés: se conservó el ajuste que favorece «courage» para γενναιότης, pero en español se optó por «valentía» como equivalente idiomático y semánticamente cercano, manteniendo el tono elevado y el equilibrio con «virtud».'
  spanish_consistency_notes:
  - Se usó «Yahvé» por defecto solo cuando aparezca el nombre divino; este versículo no lo requiere.
  - Se mantuvo un registro digno y narrativo, coherente con la sección martirial de 2 Macabeos.
  - No se añadieron notas al pie porque el español elegido no introduce una ambigüedad textual nueva que requiera marcación explícita.
