translation:
  language: es
  text: No llevaré a cabo el ardor de mi ira[a]; no volveré a destruir a Efraín[b]. Porque yo soy Dios y no hombre, el Santo en medio de ti, y no entraré en la ciudad[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «la furia de mi ira».
    reason: lexical_alternative
  - marker: b
    text: O «no volveré para destruir a Efraín».
    reason: lexical_alternative
  - marker: c
    text: 'La frase hebrea final es difícil. Algunos la entienden como una manera de decir que Dios no vendrá como destructor; la traducción principal sigue la lectura más literal: «no entraré en la ciudad».'
    reason: alternative_reading
lexical_decisions:
- source_word: אֶֽעֱשֶׂה
  english_pob_choice: carry out
  chosen_spanish: ejecutaré
  alternatives_spanish:
  - haré
  - llevaré a cabo
  lexicon: HALOT
  rationale: עָשָׂה es amplio, pero con חֲרוֹן אַפִּי expresa la puesta en acto de la ira. «Ejecutaré» conserva el valor de acción efectiva sin volverlo áspero o demasiado literal.
- source_word: חֲרוֹן אַפִּי
  english_pob_choice: the fierceness of my anger
  chosen_spanish: la furia de mi ira
  alternatives_spanish:
  - el ardor de mi ira
  - el calor de mi ira
  lexicon: HALOT
  rationale: La imagen hebrea alude al ardor/intensidad de la ira. «Furia» comunica bien la fuerza, y «de mi ira» mantiene el genitivo sin suavizar la carga emocional.
- source_word: אָשׁוּב לְשַׁחֵת
  english_pob_choice: again destroy
  chosen_spanish: volveré a destruir
  alternatives_spanish:
  - volveré a arruinar
  - retornaré para destruir
  lexicon: HALOT
  rationale: שׁוּב + infinitivo puede expresar repetición; en este contexto, la idea es que no repetirá el acto destructivo contra Efraín. «Volveré a destruir» preserva esa repetición de forma natural en español.
- source_word: לְשַׁחֵת
  english_pob_choice: destroy
  chosen_spanish: destruir
  alternatives_spanish:
  - arruinar
  - llevar a ruina
  lexicon: HALOT
  rationale: El piel de שׁחת denota destrucción/corrupción. «Destruir» es la opción directa y más fiel para el juicio anunciado.
- source_word: אֵל
  english_pob_choice: God
  chosen_spanish: Dios
  alternatives_spanish:
  - el Dios poderoso
  - el Fuerte
  lexicon: HALOT
  rationale: En contraste con «no hombre», אֵל aquí nombra inequívocamente a Dios. «Dios» mantiene el contraste sin añadir matices no exigidos por el texto.
- source_word: אִישׁ
  english_pob_choice: a man
  chosen_spanish: hombre
  alternatives_spanish:
  - ser humano
  - persona
  lexicon: HALOT
  rationale: El contraste semítico entre Dios y el humano se expresa de modo natural con «hombre» en español. Se evita «ser humano» para no diluir la forma antitética del hebreo.
- source_word: בְּקִרְבְּךָ
  english_pob_choice: in your midst
  chosen_spanish: en medio de ti
  alternatives_spanish:
  - en medio de ustedes
  - entre ustedes
  lexicon: HALOT
  rationale: La expresión señala presencia en medio del pueblo. «En medio de ti» conserva el tono relacional y comunitario del hebreo y funciona bien en singular colectivo.
- source_word: קָדוֹשׁ
  english_pob_choice: the Holy One
  chosen_spanish: el Santo
  alternatives_spanish:
  - el Santo Uno
  - el Santo que está
  lexicon: HALOT
  rationale: Aquí funciona sustantivamente como designación divina. «El Santo» mantiene esa función titular sin convertirlo en un mero adjetivo.
- source_word: וְלֹא אָבֹוא בְּעִיר
  english_pob_choice: I will not come into the city
  chosen_spanish: no entraré en la ciudad
  alternatives_spanish:
  - no vendré a la ciudad
  - no llegaré a la ciudad
  lexicon: HALOT
  rationale: La cláusula final es difícil. Siguiendo la revisión auditada, se mantiene la referencia más literal a בְּעִיר con «entrar en la ciudad», evitando resolver el pasaje como «en ira» sin apoyo explícito suficiente en este registro.
theological_decisions:
- issue: Relación entre la santidad divina y el retiro del juicio
  english_pob_reading: God will not execute total destructive wrath against Ephraim, grounded in his being God, not man, and the Holy One in their midst.
  chosen_spanish_reading: Dios no consumará su ira destructiva sobre Efraín; la razón dada es su condición de Dios, no de hombre, y su santidad presente en medio de su pueblo.
  alternative_spanish_readings:
  - Dios cambia de parecer emocionalmente
  - Dios no siente ya ira alguna
  rationale: El hebreo expresa una renuncia a la destrucción total, no una negación de toda ira ni una explicación filosófica de la inmutabilidad. La traducción conserva esa tensión entre juicio y misericordia.
  doctrine_reference: Preservar la tensión teológica sin resolverla artificialmente.
- issue: Sentido de la última cláusula
  english_pob_reading: I will not come into the city.
  chosen_spanish_reading: No entraré en la ciudad.
  alternative_spanish_readings:
  - No vendré con ira
  - No entraré para destruir
  rationale: La frase final es ambigua. Se retiene la lectura más cercana al hebreo, dejando la dificultad visible en español en lugar de imponer una paráfrasis interpretativa.
  doctrine_reference: Preservar la tensión textual y teológica.
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión auditada que optó por una traducción más literal de בְּעִיר («into the city») frente a una paráfrasis interpretativa («in wrath»). La versión española sigue esa decisión y conserva la ambigüedad del hebreo al no resolverla más allá de lo que el texto sostiene.
  spanish_consistency_notes:
  - Se usa «Dios» para אֵל y «hombre» para אִישׁ, manteniendo el contraste explícito.
  - Se usa «el Santo» como designación divina sustantiva, no como adjetivo suelto.
  - Se mantiene «Efraín» como nombre propio sin glosa.
  - Se evita «SEÑOR» para יהוה porque este versículo no contiene el Tetragrámaton.
  - La última cláusula se traduce de manera literal y se documenta su dificultad en nota.
