review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador capta bien la estructura general y el tono sapiencial, pero intercambia los valores de צֶדֶק y מִשְׁפָּט respecto del rastro POB en inglés: donde el inglés distingue ''righteousness'' y ''justice'', el español pone ''justicia'' y ''rectitud''. Eso debilita la correspondencia semántica documentada. Además, ''todo camino bueno'' suena menos natural en español bíblico moderno que ''todo buen camino''.'
  spanish_quality_summary: La redacción es clara y digna, pero 'todo camino bueno' resulta algo rígido y marcado. 'Entonces entenderás la rectitud, la justicia y la equidad[a], todo buen camino' fluye mejor y conserva el paralelismo proverbial. También conviene ajustar la nota para que la alternativa de מֵישָׁרִים no repita sin más un término ya usado en otra posición sin explicar que es alternativa lexical, no reasignación contextual.
  glossary_alignment: No hay conflicto con la terminología base del proyecto. La corrección principal es alinear צֶדֶק con 'rectitud' y מִשְׁפָּט con 'justicia', en coherencia con las decisiones léxicas auditadas en inglés y con un español natural que mantiene la distinción entre moralidad y justicia.
  issues:
  - severity: medium
    issue: Intercambio de 'justicia' y 'rectitud' entre צֶדֶק y מִשְׁפָּט
    rationale: 'El POB inglés documenta una distinción intencional: צֶדֶק = ''righteousness'' y מִשְׁפָּט = ''justice''. El borrador invierte esa relación. Aunque ambos campos semánticos se solapan, la inversión no preserva fielmente la rationale auditada.'
  - severity: low
    issue: '''Todo camino bueno'' es poco idiomático'
    rationale: Es comprensible, pero en español natural la colocación preferida es 'todo buen camino'. Mantiene el distributivo de כָּל y el matiz proverbial de מַעְגָּל טוֹב con mejor fluidez.
  - severity: low
    issue: Nota al pie mejorable para mayor precisión estilística
    rationale: La nota actual es básicamente correcta, pero conviene formularla de manera más natural en español y dejar claro que 'rectitud' es alternativa para מֵישָׁרִים por el sentido de lo derecho o moralmente llano.
  revised_spanish_text: Entonces entenderás la rectitud, la justicia y la equidad[a], todo buen camino.
  revised_footnotes:
  - marker: a
    text: O «rectitud» para מֵישָׁרִים, enfatizando lo que es derecho o moralmente llano.
    reason: lexical_alternative
