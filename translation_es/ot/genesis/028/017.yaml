translation:
  language: es
  text: 'Y tuvo miedo y dijo[a]: «¡Qué asombroso es este lugar! No es sino la casa de Dios, y esta es la puerta del cielo[b]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «¡Qué temible es este lugar!». El término hebreo puede expresar miedo, pavor o reverente asombro.'
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: «la puerta de los cielos». En español, «cielo» suele usarse para el ámbito divino.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּירָא
  english_pob_choice: he was afraid
  chosen_spanish: tuvo miedo
  alternatives_spanish:
  - se asustó
  - temió
  lexicon: HALOT
  rationale: El hebreo narra la reacción emocional de Jacob; «tuvo miedo» conserva el sentido básico de temor sin convertirlo en mera reverencia. Es natural en español moderno y mantiene la tensión entre temor y asombro.
- source_word: מַה נּוֹרָא
  english_pob_choice: How awesome
  chosen_spanish: ¡Qué asombroso
  alternatives_spanish:
  - ¡Qué impresionante
  - ¡Qué terrible
  - ¡Qué temible
  lexicon: HALOT
  rationale: נּוֹרָא puede expresar algo que inspira temor reverente. «Asombroso» mantiene el componente de sobrecogimiento con un tono positivo y solemne; «temible» o «terrible» cargarían demasiado el matiz negativo.
- source_word: הַמָּקוֹם הַזֶּה
  english_pob_choice: this place
  chosen_spanish: este lugar
  alternatives_spanish:
  - este lugar aquí
  lexicon: HALOT
  rationale: La frase es directa; «este lugar» es idiomático en español y conserva la referencia demostrativa sin redundancia.
- source_word: אֵין זֶה כִּי אִם
  english_pob_choice: This is none other than
  chosen_spanish: No es otra cosa que
  alternatives_spanish:
  - No es sino
  - Es nada menos que
  lexicon: HALOT
  rationale: La construcción hebrea es de restricción enfática. «No es otra cosa que» expresa bien la identificación solemne sin perder el relieve retórico del original.
- source_word: בֵּית אֱלֹהִים
  english_pob_choice: the house of God
  chosen_spanish: casa de Dios
  alternatives_spanish:
  - la casa de Dios
  lexicon: HALOT
  rationale: Se mantiene la expresión transparente del constructo. «Casa de Dios» preserva el registro formal y evita introducir una interpretación más desarrollada que la del texto.
- source_word: שַׁעַר הַשָּׁמָיִם
  english_pob_choice: the gate of heaven
  chosen_spanish: la puerta del cielo
  alternatives_spanish:
  - la puerta de los cielos
  - la puerta del cielo
  lexicon: HALOT
  rationale: En español bíblico, «puerta del cielo» comunica de forma natural la imagen de acceso entre la esfera terrenal y la celestial. Aunque el hebreo dice literalmente «los cielos», el singular funciona bien para el ámbito divino y coincide con el sentido auditado del POB en inglés.
theological_decisions:
- issue: Rendering of אֱלֹהִים in a singular referent context
  english_pob_reading: God
  chosen_spanish_reading: Dios
  alternative_spanish_readings:
  - dioses
  rationale: Aunque אֱלֹהִים es morfológicamente plural, aquí designa al Dios único del relato. Traducirlo como «Dios» evita una lectura errónea y sigue el contexto narrativo y covenantal.
  doctrine_reference: Uso contextual de אֱלֹהִים en el relato patriarcal
- issue: Nuance of נוֹרָא in a sacred setting
  english_pob_reading: awesome
  chosen_spanish_reading: asombroso
  alternative_spanish_readings:
  - temible
  - terrible
  - impresionante
  rationale: La escena combina miedo y reverencia ante una presencia santa. «Asombroso» conserva el sobrecogimiento sin resolver la tensión hacia un mero susto o una admiración trivial.
  doctrine_reference: Translation philosophy §3
translation_notes:
  revision_awareness: El texto inglés auditado mostró una revisión desde «awe-inspiring» a «awesome» para נוֹרָא; la versión española adopta un equivalente natural y solemne («asombroso») que conserva esa preferencia por una forma más directa, sin perder la reverencia del pasaje.
  spanish_consistency_notes:
  - Se usa «Dios» para אֱלֹהִים en sentido singular, conforme al contexto.
  - Se mantiene «cielo» en singular para la esfera divina, con nota sobre el plural hebreo «los cielos».
  - La exclamación se conserva con signos dobles en español para reflejar el carácter retórico del hebreo.
  - «Casa de Dios» se mantiene como construcción formal y bíblica, sin sustituirla por una paráfrasis interpretativa.
