translation:
  language: es
  text: 'Y le avisaron a David, diciendo: «Ahitofel está entre los conspiradores con Absalón». Y David dijo: «Oh Yahvé, por favor convierte en necedad[a] el consejo de Ahitofel».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «frustra el consejo de Ahitofel». El hebreo, más literalmente, pide que su consejo sea convertido en necedad.'
    reason: lexical_alternative
lexical_decisions:
- source_word: הִגִּיד
  english_pob_choice: it was told
  chosen_spanish: se informó a David
  alternatives_spanish:
  - fue dicho a David
  - le dijeron a David
  lexicon: HALOT
  rationale: El hebreo usa una fórmula de reporte sin agente explícito. El español natural conserva ese valor impersonal con «se informó a David», evitando añadir un sujeto inexistente y manteniendo el tono formal del relato.
- source_word: לֵאמֹר
  english_pob_choice: saying
  chosen_spanish: diciendo
  alternatives_spanish:
  - que
  - a saber
  lexicon: HALOT
  rationale: Se conserva la estructura quotativa del hebreo con «diciendo», que en español sigue siendo natural en un reporte formal y refleja la transición a la cita directa.
- source_word: בַּקֹּשְׁרִים
  english_pob_choice: among the conspirators
  chosen_spanish: entre los conspiradores
  alternatives_spanish:
  - en la conspiración
  - entre los que conspiran
  lexicon: HALOT
  rationale: El participio plural designa al grupo de los que maquinan una conspiración. «Entre los conspiradores» comunica pertenencia al grupo y mantiene la fuerza concreta del término de traición.
- source_word: עִם
  english_pob_choice: with
  chosen_spanish: con
  alternatives_spanish:
  - junto con
  - al lado de
  lexicon: HALOT
  rationale: La preposición expresa asociación directa con Absalón; «con» es la opción más simple y fiel en español.
- source_word: סַכֶּל
  english_pob_choice: turn ... into foolishness
  chosen_spanish: vuelve necio
  alternatives_spanish:
  - haz insensato
  - frustra
  - convierte ... en necedad
  lexicon: HALOT
  rationale: El verbo en piel pide que Yahvé vuelva la estrategia de Ahitofel en necedad o insensatez. «Vuelve necio» conserva la raíz de ‘necedad/fatuidad’ que la POB inglesa retuvo con «foolishness», sin perder la fuerza imperativa de la súplica.
- source_word: נָא
  english_pob_choice: please
  chosen_spanish: por favor
  alternatives_spanish:
  - te ruego
  - ahora
  lexicon: HALOT
  rationale: Marca ruego cortés e intensidad de la petición. «Por favor» es la forma moderna más natural en español y mantiene el matiz de súplica.
- source_word: עֲצַת
  english_pob_choice: counsel
  chosen_spanish: consejo
  alternatives_spanish:
  - plan
  - prudencia
  lexicon: HALOT
  rationale: En contexto político-estratégico, «consejo» reproduce bien la idea de una deliberación/estrategia de alto nivel y es el equivalente más directo de counsel.
- source_word: יְהוָה
  english_pob_choice: O Yahweh
  chosen_spanish: Oh Yahvé
  alternatives_spanish:
  - Yahvé
  - oh el Señor
  lexicon: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
  rationale: Se conserva el nombre divino con la transliteración establecida por la POB. En invocación directa, el vocativo español «Oh Yahvé» refleja el hebreo y evita la sustitución por un título.
theological_decisions:
- issue: Forma de la petición sobre el consejo de Ahitofel
  english_pob_reading: turn Ahithophel’s counsel into foolishness
  chosen_spanish_reading: vuelve necio el consejo de Ahitofel
  alternative_spanish_readings:
  - frustra el consejo de Ahitofel
  - convierte el consejo de Ahitofel en necedad
  rationale: El hebreo pide que el consejo sea hecho necio/insensato, no solo anulado. La redacción española mantiene esa tensión semántica, aunque sin sonar forzada, y la nota conserva la alternativa interpretativa más dinámica.
  doctrine_reference: HALOT / Hebrew verb שכל in Piel; POB lexical note on foolishness vs. frustrate
translation_notes:
  revision_awareness: El draft sigue la revisión más reciente del audit trail, que ajustó la cláusula final desde una simple idea de ‘hacer necio’ hacia una expresión más natural de ‘volver necio / convertir en necedad’ para reflejar con mayor precisión la construcción verbal hebrea.
  spanish_consistency_notes:
  - Se usa «Yahvé» de manera consistente para el Tetragrammaton, incluso en la invocación directa.
  - Se preserva «Ahitofel» como forma breve y común en español, coherente con el nombre propio hebreo y con la tradición de transliteración bíblica.
  - La expresión impersonal «se informó a David» mantiene la pasiva/impersonal del hebreo sin introducir un sujeto explícito.
  - «Consejo» se mantiene como término político-estratégico, no como simple opinión.
  - La nota al pie se ancla en «necio» para señalar la alternativa ‘frustrar’ sin romper la lectura principal.
