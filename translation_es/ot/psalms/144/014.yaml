revisions:
- from: Nuestros ganados están preñados[a]; no hay brecha, ni salida[b], ni clamor en nuestras calles.
  to: Nuestro ganado está cargado de crías[a]; no hay brecha, ni salida[b][c], ni clamor en nuestras calles.
  rationale: 'Se revisa para mejorar la naturalidad del español y acercar la imagen al hebreo y al POB inglés: «nuestro ganado» es más idiomático que «nuestros ganados», y «cargado de crías» conserva mejor la idea de estar cargado/pesado con crías que «preñados». También se restituye la segunda nota sobre יוֹצֵאת para reflejar completamente el historial auditado de alternativas.'
