revisions:
- from: Y todo Judá estaba de pie[a] delante de Yahvé, incluso sus pequeños, sus esposas y sus hijos.
  to: Y todo Judá estaba de pie delante de Yahvé, incluso sus pequeños, sus esposas y sus niños[a].
  rationale: Se elimina una nota no necesaria sobre la postura y se añade la nota léxica que sí está respaldada por el POB inglés para וּבְנֵיהֶם. Además, 'sus niños[a]' comunica mejor en español la lectura amplia contextual después de 'sus pequeños', evitando una restricción masculina innecesaria sin perder la alternativa documentada.
