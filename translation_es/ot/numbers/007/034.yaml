lexical_decisions:
- source_word: שְׂעִיר עִזִּים
  english_pob_choice: male goat
  chosen_spanish: macho cabrío
  alternatives_spanish:
  - cabra macho
  - hechón de cabra
  - macho de las cabras
  lexicon: HALOT
  rationale: La expresión hebrea designa un macho de la especie cabruna usado en ofrenda. 'Macho cabrío' transmite con naturalidad en español la especificidad del animal sacrificial y evita el calco menos idiomático de 'macho de cabra'.
- source_word: אֶחָד
  english_pob_choice: one
  chosen_spanish: un
  alternatives_spanish:
  - uno
  - una sola
  lexicon: HALOT
  rationale: El numeral se conserva como artículo numeral en la lista de ofrendas, manteniendo el valor enumerativo del texto hebreo y su estilo inventarial.
- source_word: לְחַטָּאת
  english_pob_choice: for a sin offering
  chosen_spanish: para sacrificio por el pecado
  alternatives_spanish:
  - para una ofrenda por el pecado
  - como sacrificio por el pecado
  - para ofrenda por el pecado
  lexicon: HALOT
  rationale: En este contexto cultual, חַטָּאת se refiere a la categoría sacrificial. 'Sacrificio por el pecado' comunica la función ritual sin hacer depender la frase de una terminología eclesiástica fija; 'para' refleja adecuadamente el valor del prefijo ל en la lista de ofrendas.
theological_decisions:
- issue: Valor cultual de חַטָּאת
  english_pob_reading: sin offering
  chosen_spanish_reading: sacrificio por el pecado
  alternative_spanish_readings:
  - ofrenda por el pecado
  - sacrificio expiatorio
  - pecado
  rationale: La secuencia enumera animales ofrecidos en un contexto sacrificial concreto; por eso la lectura es la categoría de ofrenda, no el concepto abstracto de pecado. 'Sacrificio por el pecado' conserva la referencia ritual y evita sobrecargar el término con matices posteriores.
  doctrine_reference: 'Translation philosophy: original-language primacy over translation tradition; preserve the source text''s plain sense.'
translation_notes:
  revision_awareness: El texto inglés auditado se mantuvo sin cambios en la revisión más reciente, con acuerdo alto entre los verificadores; esta versión española sigue esa lectura estable, ajustando solo la naturalidad idiomática en español sin alterar el valor léxico del hebreo.
  spanish_consistency_notes:
  - Se conserva 'pecado' en la expresión cultual solo dentro de la locución sacrificial, no como traducción aislada de חַטָּאת.
  - '''Macho cabrío'' se usa por su claridad y porque mantiene la especificidad de un macho cabrío sacrificial en español bíblico moderno.'
  - La nota al pie preserva la alternativa más literal para reflejar la tensión léxica entre la idiomaticidad y la forma hebrea subyacente.
