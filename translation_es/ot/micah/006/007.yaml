translation:
  language: es
  text: ¿Se complacerá Yahvé con miles de carneros, con diez mil arroyos de aceite[a]? ¿Daré mi primogénito[b] por mi transgresión, el fruto de mi cuerpo por el pecado de mi alma[c]?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «con miríadas de torrentes de aceite». La expresión hebrea es hiperbólica y describe una abundancia inmensa de aceite.
    reason: lexical_alternative
  - marker: b
    text: O «mi hijo primogénito». «Primogénito» es la forma más directa del hebreo; el sustantivo «hijo» queda implícito.
    reason: lexical_alternative
  - marker: c
    text: O «la ofrenda por el pecado de mi alma». Aquí «pecado» encaja mejor con el paralelismo de «mi transgresión».
    reason: alternative_reading
lexical_decisions:
- source_word: הֲיִרְצֶה
  english_pob_choice: Will ... be pleased
  chosen_spanish: ¿Se complacerá...
  alternatives_spanish:
  - ¿Aceptará...
  - ¿Se deleitará...
  lexicon: HALOT
  rationale: El verbo רצה en esta pregunta retórica expresa agrado o aceptación. «Se complacerá» suena natural en español y conserva la idea evaluativa sin reducirla a una aceptación meramente formal.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  - el SEÑOR
  lexicon: HALOT
  rationale: Se usa el nombre divino transliterado «Yahvé» conforme al criterio del proyecto para יהוה, preservando el nombre personal de Dios en vez de sustituirlo por un título.
- source_word: בְּאַלְפֵי אֵילִים
  english_pob_choice: with thousands of rams
  chosen_spanish: con miles de carneros
  alternatives_spanish:
  - con millares de carneros
  - con miles de machos carneros
  lexicon: HALOT
  rationale: אַלְפֵי comunica una gran cantidad, aquí naturalmente «miles». אֵילִים en contexto sacrificial se traduce como «carneros».
- source_word: בְּרִבְבוֹת נַחֲלֵי שָׁמֶן
  english_pob_choice: with ten thousands of streams of oil
  chosen_spanish: con diez mil arroyos de aceite
  alternatives_spanish:
  - con miríadas de torrentes de aceite
  - con diez mil corrientes de aceite
  lexicon: HALOT
  rationale: רִבְבוֹת expresa una cantidad inmensa, «diez mil» en español bíblico claro. נַחֲלֵי es literalmente «arroyos» o «torrentes»; se mantiene la imagen hiperbólica. «Aceite» conserva el sustantivo de masa y la fuerza poética.
- source_word: הַאֶתֵּן
  english_pob_choice: Shall I give
  chosen_spanish: ¿Daré...
  alternatives_spanish:
  - ¿Debo dar...
  - ¿He de dar...
  lexicon: HALOT
  rationale: La segunda pregunta retórica mantiene el paralelismo y el tono solemne con una forma simple y directa en español.
- source_word: בְּכוֹרִי
  english_pob_choice: my firstborn
  chosen_spanish: mi primogénito
  alternatives_spanish:
  - mi hijo primogénito
  - mi primer nacido
  lexicon: HALOT
  rationale: בְּכוֹר denota al primogénito; en español «primogénito» es el equivalente más preciso y natural. No se añade «hijo» porque no está explícito en el hebreo.
- source_word: פִּשְׁעִי
  english_pob_choice: my transgression
  chosen_spanish: mi transgresión
  alternatives_spanish:
  - mi rebelión
  - mi pecado
  lexicon: HALOT
  rationale: פֶּשַׁע puede implicar rebelión o infracción. «Transgresión» conserva el peso moral y jurídico sin sobrecargar el verso.
- source_word: פְּרִי בִטְנִי
  english_pob_choice: the fruit of my body
  chosen_spanish: el fruto de mi cuerpo
  alternatives_spanish:
  - el fruto de mi vientre
  - mi descendencia
  lexicon: HALOT
  rationale: La locución idiomática se vierte de modo que suene natural en español y mantenga la imagen concreta de la progenie. «Cuerpo» funciona bien en español como equivalente amplio y evita restringir innecesariamente el sentido.
- source_word: חַטַּאת נַפְשִׁי
  english_pob_choice: the sin of my soul
  chosen_spanish: el pecado de mi alma
  alternatives_spanish:
  - el pecado de mi vida
  - el sacrificio por el pecado de mi alma
  lexicon: HALOT
  rationale: El paralelo con «mi transgresión» favorece «pecado» antes que «ofrenda por el pecado». נֶפֶשׁ se traduce como «alma» para conservar la dimensión interior y personal del hebreo.
theological_decisions:
- issue: ¿Debe חַטַּאת entenderse como «pecado» o como «ofrenda por el pecado»?
  english_pob_reading: sin
  chosen_spanish_reading: pecado
  alternative_spanish_readings:
  - ofrenda por el pecado
  rationale: En esta pregunta retórica, el paralelismo con «mi transgresión» favorece el sentido moral de «pecado». Traducir «ofrenda por el pecado» introduciría un matiz cultual menos probable aquí y debilitaría la escalada retórica del versículo.
  doctrine_reference: Traslación directa del sentido lexical y del paralelismo poético del texto hebreo
- issue: ¿La formulación puede sugerir que Yahvé aprueba sacrificio infantil?
  english_pob_reading: Render as rhetorical questions without implying divine approval
  chosen_spanish_reading: Se conserva la forma interrogativa retórica sin suavizar la referencia al primogénito
  alternative_spanish_readings:
  - Parafrasear para evitar toda referencia explícita
  - Rebajar la imagen a una ofrenda no humana
  rationale: El texto denuncia la insuficiencia y la perversidad de ofertas externas extremas; la traducción debe mantener la tensión retórica y no convertirla en una aprobación implícita de ese acto.
  doctrine_reference: Micah 6:6–8 en su función exhortativa y profética
- issue: ¿Cómo representar יהוה en español?
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Jehová
  - el SEÑOR
  rationale: El proyecto pide usar el nombre divino transliterado. «Yahvé» conserva el referente personal del Tetragrama sin reemplazarlo por una sustitución editorial.
  doctrine_reference: Convención terminológica del People’s Open Bible en español
translation_notes:
  revision_awareness: Se siguió la lectura del inglés auditado sin cambios sustantivos respecto del último pase aprobado; se mantuvo el paralelismo retórico y la tensión léxica de חַטַּאת como «pecado».
  spanish_consistency_notes:
  - Se usa «Yahvé» para יהוה de forma consistente con el proyecto.
  - Se mantiene el paralelismo entre «mi transgresión» y «el pecado de mi alma».
  - «Primogénito» conserva el matiz de בְּכוֹרִי sin añadir léxico no explícito.
  - La imagen de «arroyos de aceite» preserva la hipérbole del hebreo y sugiere abundancia extrema.
