- from: Él decretó guerra contra Jerusalén y su tierra[a][b].
  to: Decretó guerra contra Jerusalén y su tierra[a][b].
  rationale: Se elimina el pronombre explícito por naturalidad española y se corrige la nota b para preservar la alternativa documentada del POB inglés basada en κρίνω, en vez de repetir la redacción principal.
