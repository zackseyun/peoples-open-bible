translation:
  language: es
  text: Pero tú, siendo dueño de la fuerza, juzgas con gentileza[a], y con gran moderación nos gobiernas; porque tuya es la capacidad[b] cuando quieres.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «con clemencia»; el griego ἐπιείκεια puede denotar lenidad, moderación justa o gentileza.
    reason: lexical_alternative
  - marker: b
    text: Literalmente, «porque el poder estar presente es para ti cuando quieres»; es decir, la capacidad de actuar está siempre a tu disposición.
    reason: lexical_alternative
lexical_decisions:
- source_word: δεσπόζων
  english_pob_choice: being master of
  chosen_spanish: siendo dueño de
  alternatives_spanish:
  - teniendo dominio sobre
  - siendo soberano de
  lexicon: LSJ
  rationale: El participio expresa señorío o dominio activo. «Siendo dueño de» conserva esa fuerza y resulta natural en español, sin trasladar innecesariamente el matiz más duro que puede tener «master» en inglés.
- source_word: ἰσχύος
  english_pob_choice: strength
  chosen_spanish: la fuerza
  alternatives_spanish:
  - el poder
  - la potencia
  lexicon: LSJ
  rationale: El genitivo depende de δεσπόζων y nombra el ámbito de dominio. «La fuerza» mantiene la distinción léxica frente al tramo final con δύνασθαι, evitando fundir ambos términos en una sola idea de poder.
- source_word: ἐν ἐπιεικείᾳ
  english_pob_choice: with gentleness
  chosen_spanish: con mansedumbre
  alternatives_spanish:
  - con clemencia
  - con benignidad
  - con equidad
  lexicon: LSJ
  rationale: ἐπιείκεια puede abarcar clemencia, suavidad o justa moderación. «Con mansedumbre» es claro en español bíblico actual y preserva la tensión entre fuerza y juicio moderado; no impone «clemencia» como única lectura.
- source_word: κρίνεις
  english_pob_choice: judge
  chosen_spanish: juzgas
  alternatives_spanish:
  - dictas sentencia
  - eres juez
  lexicon: LSJ
  rationale: El verbo es el término ordinario para juzgar. «Juzgas» conserva el sentido judicial directo del texto.
- source_word: μετὰ πολλῆς φειδοῦς
  english_pob_choice: with great forbearance
  chosen_spanish: con gran indulgencia
  alternatives_spanish:
  - con gran reserva
  - con gran contención
  - con mucha mesura
  lexicon: LSJ
  rationale: φειδώ denota ahorro, restricción o contención. «Indulgencia» comunica bien en español la idea de trato contenido y benévolo, sin reducirla a una mera técnica doctrinal de «misericordia».
- source_word: διοικεῖς
  english_pob_choice: govern
  chosen_spanish: nos gobiernas
  alternatives_spanish:
  - nos administras
  - nos diriges
  - nos ordenas
  lexicon: LSJ
  rationale: El verbo se refiere a ordenar o administrar con gobierno providencial. «Nos gobiernas» es la forma más natural y elevada en español para este contexto.
- source_word: ἡμᾶς
  english_pob_choice: us
  chosen_spanish: nos
  alternatives_spanish:
  - a nosotros
  lexicon: LSJ
  rationale: El objeto directo debe conservarse explícitamente. «Nos» mantiene la inclusión primera persona del hablante y la comunidad.
- source_word: πάρεστιν γάρ σοι
  english_pob_choice: for ... is present to you
  chosen_spanish: porque tuya es
  alternatives_spanish:
  - porque está a tu disposición
  - porque te pertenece
  lexicon: LSJ
  rationale: El giro idiomático indica disponibilidad plena. En español, «tuya es» expresa de forma breve y natural que esa capacidad está siempre en posesión de Dios.
- source_word: ὅταν θέλῃς
  english_pob_choice: whenever you will
  chosen_spanish: cuando tú quieres
  alternatives_spanish:
  - cuando quieres
  - siempre que quieras
  lexicon: LSJ
  rationale: La frase subraya la dependencia de la voluntad divina. «Cuando tú quieres» conserva esa condición con claridad y sin ambigüedad temporal.
- source_word: τὸ δύνασθαι
  english_pob_choice: the power to act
  chosen_spanish: la capacidad
  alternatives_spanish:
  - el poder de actuar
  - el poder
  - la habilidad
  lexicon: LSJ
  rationale: El infinitivo articular significa «poder ser capaz» o «capacidad». «La capacidad» evita una paráfrasis demasiado interpretativa y deja intacta la idea de disponibilidad efectiva.
theological_decisions:
- issue: Tensión entre fuerza soberana y juicio benigno
  english_pob_reading: The verse preserves that God has overwhelming strength yet judges with gentleness and great forbearance.
  chosen_spanish_reading: El versículo mantiene que Dios posee fuerza soberana, pero juzga con mansedumbre y gobierna con gran indulgencia.
  alternative_spanish_readings:
  - Dios juzga con clemencia
  - Dios gobierna con misericordia
  rationale: El griego yuxtapone capacidad absoluta y ejercicio moderado del juicio. La redacción española conserva ambos polos sin convertir la restricción en un sinónimo de misericordia plena ni debilitar el señorío divino.
  doctrine_reference: DOCTRINE.md §Translation philosophy 3
- issue: Preservación del sujeto explícito 'us'
  english_pob_reading: ‘us’ is retained literally.
  chosen_spanish_reading: Se mantiene el objeto explícito «nos».
  alternative_spanish_readings:
  - se nos gobierna
  - a todos se gobierna
  rationale: 'El texto no es impersonal: incluye a la comunidad que habla. Mantener «nos» preserva la referencia directa del griego ἡμᾶς.'
  doctrine_reference: DOCTRINE.md §Translation philosophy 1
- issue: Disponibilidad de la capacidad divina
  english_pob_reading: the power is yours whenever you will
  chosen_spanish_reading: tuya es la capacidad cuando tú quieres
  alternative_spanish_readings:
  - el poder es tuyo cuando quieres
  - la capacidad está a tu disposición cuando quieres
  rationale: La clausula final expresa que la capacidad de actuar está siempre al alcance de Dios. «Tuya es la capacidad» transmite posesión y disponibilidad sin forzar la frase a una formulación más abstracta.
  doctrine_reference: DOCTRINE.md §Translation philosophy 3
translation_notes:
  revision_awareness: La versión inglesa revisada pasó de «ruling over strength» a «being master of strength» y simplificó la cláusula final a «the power is yours whenever you will». La redacción española sigue esa revisión al usar una expresión más natural para δεσπόζων ἰσχύος y una formulación breve de la disponibilidad de la capacidad divina.
  spanish_consistency_notes:
  - Se mantiene «Dios» implícito por el vocativo de la segunda persona, sin introducir «SEÑOR».
  - «Fuerza» se conserva para ἰσχύος y «capacidad» para τὸ δύνασθαι, a fin de no colapsar dos términos distintos.
  - «Mansedumbre» y «indulgencia» se usan como soluciones diferenciadas para ἐπιείκεια y φειδώ, respectivamente.
  - La puntuación reproduce el contraste del original con coma antes de la cláusula causal y punto y coma antes de la explicación final.
