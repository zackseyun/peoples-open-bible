translation:
  language: es
  text: 'Y el pueblo de Israel comenzó a escribir en documentos y contratos: «Año uno de Simón, el gran sumo sacerdote y general y líder de los judíos[a]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «de los judeanos». El etnónimo griego puede designar al pueblo judío en sentido amplio o, más específicamente, a la población de Judea.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἤρξατο
  english_pob_choice: began
  chosen_spanish: comenzó
  alternatives_spanish:
  - empezó
  - inició
  lexicon: LSJ
  rationale: El aoristo medio de ἄρχω marca el comienzo de una práctica; «comenzó» reproduce bien esa iniciación sin sobrecargar el matiz.
- source_word: ὁ λαὸς Ἰσραήλ
  english_pob_choice: the people of Israel
  chosen_spanish: el pueblo de Israel
  alternatives_spanish:
  - la gente de Israel
  - el pueblo israelita
  lexicon: LSJ
  rationale: La frase nombra explícitamente al colectivo; «pueblo de Israel» conserva el sustantivo colectivo y la referencia étnico-histórica de manera natural en español.
- source_word: γράφειν
  english_pob_choice: to write
  chosen_spanish: escribir
  alternatives_spanish:
  - registrar
  - anotar
  lexicon: LSJ
  rationale: El infinitivo expresa la acción iniciada. «Escribir» es la equivalencia más directa; el contexto documental se aclara por los sustantivos siguientes.
- source_word: ἐν ταῖς συγγραφαῖς
  english_pob_choice: in documents
  chosen_spanish: en documentos
  alternatives_spanish:
  - en registros
  - en escritos oficiales
  lexicon: LSJ
  rationale: συγγραφή puede referirse a un documento escrito o registro. «Documentos» funciona bien en español actual y mantiene el contexto administrativo.
- source_word: καὶ συναλλάγμασιν
  english_pob_choice: and contracts
  chosen_spanish: y contratos
  alternatives_spanish:
  - y acuerdos
  - y transacciones
  lexicon: LSJ
  rationale: συνάλλαγμα puede designar un negocio o arreglo formal. «Contratos» conserva el sentido de instrumentos formales datados junto con «documentos».
- source_word: Ἔτους πρώτου
  english_pob_choice: Year one
  chosen_spanish: Año uno
  alternatives_spanish:
  - En el año uno
  - Año primero
  lexicon: LSJ
  rationale: Es una fórmula de datación. «Año uno» es idiomático en español y preserva el estilo conciso de documento oficial.
- source_word: ἐπὶ Σίμωνος
  english_pob_choice: of Simon
  chosen_spanish: de Simón
  alternatives_spanish:
  - bajo Simón
  - en tiempo de Simón
  lexicon: LSJ
  rationale: En fórmulas de datación, ἐπί con genitivo puede marcar la referencia temporal asociada a una administración o era. La revisión inglesa prefirió «of Simon»; en español, «de Simón» refleja de forma directa esa construcción sin introducir una relación de subordinación que no está explícita.
- source_word: ἀρχιερέως μεγάλου
  english_pob_choice: the great high priest
  chosen_spanish: el gran sumo sacerdote
  alternatives_spanish:
  - el sumo sacerdote grande
  - el gran sacerdote
  lexicon: LSJ
  rationale: Ambos elementos deben representarse. «Sumo sacerdote» es la forma estable en español para ἀρχιερεύς; «gran» conserva μεγάλου como parte del título elevado de Simón.
- source_word: στρατηγοῦ
  english_pob_choice: general
  chosen_spanish: general
  alternatives_spanish:
  - comandante
  - jefe militar
  lexicon: LSJ
  rationale: στρατηγός es un título militar. «General» es la equivalencia más directa y natural.
- source_word: ἡγουμένου
  english_pob_choice: leader
  chosen_spanish: líder
  alternatives_spanish:
  - jefe
  - gobernante
  lexicon: LSJ
  rationale: ἡγούμενος denota uno que guía o gobierna. «Líder» preserva la amplitud del término sin especificar un cargo constitucional que el griego no detalla.
- source_word: Ἰουδαίων
  english_pob_choice: of the Jews
  chosen_spanish: de los judíos
  alternatives_spanish:
  - de los judeanos
  lexicon: LSJ
  rationale: En 1 Macabeos el этnónimo puede entenderse como «judíos» o «judeanos» según el contexto. Aquí funciona como designación pública amplia; «judíos» es la opción más natural en español, manteniendo la alternativa geográfica disponible.
theological_decisions:
- issue: Título completo de Simón y su posible carga institucional
  english_pob_reading: the great high priest and general and leader of the Jews
  chosen_spanish_reading: el gran sumo sacerdote, y general y líder de los judíos
  alternative_spanish_readings:
  - el sumo sacerdote y general y líder de los judíos
  - el gran sumo sacerdote y comandante y líder de los judíos
  rationale: El versículo es administrativo y político, pero el título completo tiene peso histórico. Se conserva «gran sumo sacerdote» porque el adjetivo μεγάλου forma parte del título transmitido por el griego y no debe diluirse. «General» y «líder» reflejan los otros dos cargos/títulos sin sobreinterpretarlos.
  doctrine_reference: 'Translation philosophy: consistency of key terms, with documented exception when the source uses an expanded title.'
- issue: Ethnonym in Simon's title
  english_pob_reading: of the Jews
  chosen_spanish_reading: de los judíos
  alternative_spanish_readings:
  - de los judeanos
  rationale: La frase puede leerse con matiz étnico amplio o geográfico-político. Se mantiene «judíos» por naturalidad y porque el título parece designar al colectivo reconocido; la alternativa «judeanos» queda implícitamente disponible por el trasfondo del término griego.
  doctrine_reference: 'POB ethnonym policy: preserve context-sensitive nuance and document alternatives where the Greek can bear more than one legitimate sense.'
translation_notes:
  revision_awareness: El texto inglés auditado fue revisado de «under Simon» a «of Simon» para reflejar con mayor precisión ἐπὶ Σίμωνος en la fórmula de datación. La versión española sigue esa decisión con «de Simón», manteniendo además la estructura documental del original. Se conservó la lista de títulos completa de Simón y la nota alternativa para Ἰουδαίων, ya que el paquete inglés documenta explícitamente esa ambigüedad léxica.
  spanish_consistency_notes:
  - Se usa «Dios/Yahvé» según corresponda en otros pasajes; aquí no aparece ninguna referencia divina directa.
  - «Sumo sacerdote» se mantiene como equivalente estable de ἀρχιερεύς en la obra.
  - «Judíos» se conserva para Ἰουδαίων por naturalidad en español, con nota alternativa «judeanos» para reflejar la ambigüedad documentada.
  - La puntuación con dos puntos antes de la cita reproduce adecuadamente el giro documental del versículo.
