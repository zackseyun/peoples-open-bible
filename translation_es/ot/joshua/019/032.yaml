review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador capta bien el sentido general de la asignación tribal, pero se aparta innecesariamente de la forma fuente en dos puntos clave: יָצָא se ha interpretado como «les tocó» en vez de reflejar el sentido más literal «salió», y לְמִשְׁפְּחֹתָם se ha suavizado a «familias» donde el contexto tribal favorece «clanes». También «Porque» no está sustentado por el hebreo, que simplemente introduce la siguiente tribu receptora.'
  spanish_quality_summary: 'El español es claro y legible, pero «Porque» suena añadido y «les tocó» introduce una paráfrasis interpretativa más libre de lo necesario. Una redacción más fiel y todavía natural en español bíblico moderno sería: «Para los hijos de Neftalí[a], salió la sexta suerte, para los hijos de Neftalí según sus clanes.»'
  glossary_alignment: Sin términos teológicos mayores en juego. El nombre propio «Neftalí» está bien. Para מִשְׁפְּחֹת conviene «clanes» por coherencia con la decisión léxica inglesa documentada y el contexto de subdivisiones tribales.
  issues:
  - severity: medium
    issue: «Porque» añade una relación lógica no presente en el hebreo.
    rationale: El texto hebreo no contiene conjunción causal; empieza con el destinatario de la suerte. Añadir «Porque» altera el flujo discursivo.
  - severity: medium
    issue: «les tocó» para יָצָא es más interpretativo que la evidencia fuente y el audit trail.
    rationale: La decisión inglesa preserva «came out» con nota para «fell». En español, «salió» mantiene mejor el verbo hebreo y la imagen del sorteo, mientras que «les tocó» se aleja del valor verbal explícito.
  - severity: medium
    issue: «familias» debilita la precisión de לְמִשְׁפְּחֹתָם en contexto tribal.
    rationale: En Josué 19, las subdivisiones tribales se expresan mejor como «clanes»; «familias» puede sonar demasiado doméstico o estrecho.
  - severity: low
    issue: La nota al pie «se fue hacia afuera» suena torpe en español.
    rationale: Aunque intenta reflejar el hebreo, no es una alternativa idiomática útil. «Salió» o «cayó» explican mejor la opción léxica en contexto de suertes.
  revised_spanish_text: Para los hijos de Neftalí[a], salió la sexta suerte, para los hijos de Neftalí según sus clanes.
  revised_footnotes:
  - marker: a
    text: 'O «cayó»: el verbo hebreo es literalmente «salió» o «vino/salió afuera», refiriéndose al resultado de echar la suerte.'
    reason: lexical_alternative
  revision_rationale: Se elimina «Porque» por no estar en la fuente, se cambia «les tocó» a «salió» para seguir más de cerca יָצָא y la decisión inglesa documentada, y se ajusta «familias» a «clanes» para preservar la precisión tribal de לְמִשְׁפְּחֹתָם. La nota se simplifica para sonar natural en español y conservar la alternativa contextual equivalente.
