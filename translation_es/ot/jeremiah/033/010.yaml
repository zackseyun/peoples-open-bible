base_translation:
  language: en
  yaml_path: translation/ot/jeremiah/033/010.yaml
  text: 'Thus says Yahweh: Yet in this place[a], of which you say, ‘It is desolate, without man or beast,’ in the cities of Judah and in the streets of Jerusalem that are desolate, without man or inhabitant or beast[c][b], there shall again be heard'
  footnotes:
  - marker: a
    text: Or 'desolate' for 'a waste' (חָרֵב); the Hebrew uses a devastation term here and a related desolation term later in the verse.
    reason: lexical_alternative
  - marker: b
    text: '''Without man'' uses אָדָם in a representative sense; alternatively, ''without humankind'' or ''with no people.'''
    reason: lexical_alternative
  - marker: c
    text: Or 'squares' for 'streets' (חֻצוֹת), referring to the public thoroughfares or open places of the city.
    reason: lexical_alternative
