translation:
  language: es
  text: Y, padre mío, mira; sí, mira[a] el borde de tu manto en mi mano. Porque al cortar yo el borde de tu manto, no te maté. Sabe y mira que no hay maldad ni transgresión en mi mano, y no he pecado contra ti, aunque tú andas cazando mi vida para quitármela[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «la orilla de tu manto» o «el extremo de tu manto».
    reason: lexical_alternative
  - marker: b
    text: 'Literalmente: «aunque tú estás cazando mi vida para tomarla».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְאָבִי
  english_pob_choice: And, my father
  chosen_spanish: Y, mi padre
  alternatives_spanish:
  - Y, padre mío
  - Y, mi padre, mira
  lexicon: HALOT
  rationale: La forma vocativa conserva el tono deferente y filial de David. Mantener “mi padre” preserva la relación político-familiar sin volverla una simple cortesía religiosa.
- source_word: רְאֵה גַּם רְאֵה
  english_pob_choice: see—yes, see
  chosen_spanish: 'mira: sí, mira'
  alternatives_spanish:
  - 've: sí, ve'
  - mira, mira
  lexicon: HALOT
  rationale: 'La repetición con גַּם exige énfasis. “Mira: sí, mira” transmite insistencia y urgencia en un español natural, sin perder la duplicación hebrea.'
- source_word: כְּנַף מְעִילְךָ
  english_pob_choice: the corner of your robe
  chosen_spanish: el borde de tu manto
  alternatives_spanish:
  - la esquina de tu manto
  - el borde de tu ropa
  lexicon: HALOT
  rationale: כָּנָף aquí designa el extremo de una prenda. “Borde” es más natural en español que “esquina” y evita una imagen extraña; “manto” refleja mejor מְעִיל que “ropa” en este contexto narrativo.
- source_word: בְּיָדִי
  english_pob_choice: in my hand
  chosen_spanish: en mi mano
  alternatives_spanish:
  - en mi poder
  - en mi posesión
  lexicon: HALOT
  rationale: Se conserva la concreción física del signo visible que David muestra a Saúl y, a la vez, la resonancia idiomática de “mano” como agencia o control.
- source_word: כִּי בְּכָרְתִי
  english_pob_choice: For when I cut off
  chosen_spanish: Porque al cortar yo
  alternatives_spanish:
  - Porque cuando corté yo
  - Pues al cortar yo
  lexicon: HALOT
  rationale: La construcción queda bien representada con un infinitivo sustantivado en español. “Al cortar yo” mantiene la referencia temporal y la fuerza explicativa de כִּי sin sonar rígido.
- source_word: וְלֹא הֲרַגְתִּיךָ
  english_pob_choice: I did not kill you
  chosen_spanish: no te maté
  alternatives_spanish:
  - no te maté a ti
  - no te di muerte
  lexicon: HALOT
  rationale: El verbo es directo y claro en español moderno. “Matar” reproduce bien la negación del acto homicida sin arcaísmo.
- source_word: דַּע וּרְאֵה
  english_pob_choice: Know and see
  chosen_spanish: Sabe y mira
  alternatives_spanish:
  - Sabe y ve
  - Reconoce y mira
  lexicon: HALOT
  rationale: Se conservan ambos verbos de reconocimiento y examen. “Sabe” funciona como imperativo de comprensión, y “mira” mantiene la apelación concreta a la evidencia visible.
- source_word: אֵין בְּיָדִי רָעָה וָפֶשַׁע
  english_pob_choice: there is no evil or transgression in my hand
  chosen_spanish: no hay maldad ni transgresión en mi mano
  alternatives_spanish:
  - no hay mal ni transgresión en mi mano
  - no hay maldad ni delito en mi mano
  lexicon: HALOT
  rationale: Se conserva “en mi mano” para mantener la imagen de agencia que une con la mano física del versículo. “Transgresión” sigue la revisión auditada de פֶשַׁע y evita reducir el término a un mero crimen civil.
- source_word: וְלֹא חָטָאתִי לָךְ
  english_pob_choice: and I have not sinned against you
  chosen_spanish: y no he pecado contra ti
  alternatives_spanish:
  - y no te he ofendido
  - y no he faltado contra ti
  lexicon: HALOT
  rationale: “Pecar contra” conserva el peso moral y relacional del hebreo, mejor que un simple “ofender”. La preposición “contra” expresa la dirección del agravio.
- source_word: וְאַתָּה צֹדֶה אֶת נַפְשִׁי
  english_pob_choice: though you are hunting my life
  chosen_spanish: aunque tú andas cazando mi vida
  alternatives_spanish:
  - aunque tú persigues mi vida
  - aunque estás acechando mi vida
  lexicon: HALOT
  rationale: La metáfora de caza se preserva con “cazando”. “Andas” refleja el aspecto progresivo y continuo de la acción, sin perder naturalidad en español.
- source_word: לְקַחְתָּהּ
  english_pob_choice: to take it
  chosen_spanish: para quitármela
  alternatives_spanish:
  - para tomarla
  - para arrebatarla
  lexicon: HALOT
  rationale: El pronombre femenino retoma “mi vida”. “Quitármela” expresa bien el objetivo final de quitar la vida en español y hace explícita la referencia pronominal que el hebreo deja clara por concordancia.
theological_decisions:
- issue: Sentido de פֶשַׁע en la negación de David ante Saúl
  english_pob_reading: transgression
  chosen_spanish_reading: transgresión
  alternative_spanish_readings:
  - maldad
  - delito
  - rebeldía
  rationale: La revisión inglesa ya corrigió “rebellion” a “transgression”, y el hebreo permite ese valor general de falta o quiebre. “Transgresión” conserva la amplitud moral sin imponer de más una lectura estrictamente política.
  doctrine_reference: Translation philosophy §5 (consistency of key terms, or documented exception)
- issue: Relación entre la imagen física de la mano y la declaración moral
  english_pob_reading: there is no evil or transgression in my hand
  chosen_spanish_reading: no hay maldad ni transgresión en mi mano
  alternative_spanish_readings:
  - no hay mal ni transgresión en mi mano
  - no hay maldad ni falta en mi mano
  rationale: Mantener “en mi mano” preserva la tensión documentada entre el hecho visible del manto en la mano y la inocencia moral declarada. No se suaviza la metáfora hacia una mera intención abstracta.
  doctrine_reference: Principio POB de conservar imágenes textuales cuando sostienen el argumento del pasaje
translation_notes:
  revision_awareness: La redacción española sigue de cerca la versión inglesa auditada, pero ajusta la metáfora y la sintaxis para que suenen naturales en español. Se integró la revisión inglesa que prefirió ‘transgression’ sobre ‘rebellion’, por lo que se evitó una lectura políticamente más fuerte de פשע. También se preservó la duplicación enfática ‘see—yes, see’ mediante un paralelo español igualmente enfático.
  spanish_consistency_notes:
  - Se mantiene ‘Yahvé’ como término por defecto solo cuando aparezca el nombre divino; este versículo no lo contiene.
  - 'Se conservan imágenes corporales clave: ‘mano’, ‘borde’, ‘cazando’, sin desactivar el valor forense del testimonio de David.'
  - ‘Manto’ se usa por naturalidad narrativa para מְעִיל; no se sustituyó por ‘ropa’ para no perder especificidad.
  - ‘Transgresión’ se eligió como equivalente estable de פשע en esta unidad, conforme a la revisión auditada.
  - El pronombre de ‘mi vida’ en ‘quitármela’ refleja el referente femenino hebreo de נֶפֶשׁ y evita ambigüedad en español.
