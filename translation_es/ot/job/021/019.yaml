translation:
  language: es
  text: ¿Acaso Dios guarda su iniquidad[a] para sus hijos[b]? Que se la pague al hombre mismo, para que lo sepa[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «su castigo» o «su desgracia». El término hebreo puede referirse a la iniquidad misma o a sus consecuencias, según el contexto.
    reason: lexical_alternative
  - marker: b
    text: «Hijos» es la palabra hebrea; en contexto también puede referirse más ampliamente a sus descendientes.
    reason: lexical_alternative
  - marker: c
    text: 'Más literalmente: «Dios guarda su iniquidad para sus hijos; que le pague, y él sabrá». El hebreo puede traducirse sin la pregunta retórica, pero el contexto favorece oír a Job cuestionando esa idea.'
    reason: alternative_reading
lexical_decisions:
- source_word: אֱלֹהַּ
  english_pob_choice: God
  chosen_spanish: Dios
  alternatives_spanish:
  - Dios Todopoderoso
  lexicon: HALOT
  rationale: En Job, אֱלוֹהַּ es el término singular común para Dios. «Dios» comunica el referente con naturalidad en español sin añadir matices no presentes en la forma.
- source_word: יִצְפֹּן
  english_pob_choice: stores up
  chosen_spanish: guarda
  alternatives_spanish:
  - almacena
  - reserva
  - guarda para
  lexicon: HALOT
  rationale: צפן puede expresar guardar, reservar o almacenar. «Guarda» mantiene la idea de retener para uso futuro y funciona bien con el tono retórico del verso.
- source_word: לְבָנָיו
  english_pob_choice: for his sons
  chosen_spanish: para sus hijos
  alternatives_spanish:
  - para sus hijos varones
  - para sus descendientes
  lexicon: HALOT
  rationale: Aunque el hebreo dice literalmente «sus hijos varones / hijos», en español «hijos» preserva el plural sin sonar artificial. El contexto permite una referencia más amplia a la descendencia, pero la forma básica queda visible.
- source_word: אוֹנוֹ
  english_pob_choice: his iniquity
  chosen_spanish: su iniquidad
  alternatives_spanish:
  - su maldad
  - su trouble
  - su castigo
  lexicon: HALOT
  rationale: La POB inglesa revisada volvió a «his iniquity» para acercarse más al hebreo. En español, «iniquidad» conserva el vínculo léxico y la tensión semántica; «castigo» interpretaría demasiado la palabra.
- source_word: יְשַׁלֵּם
  english_pob_choice: let him repay
  chosen_spanish: que se la pague
  alternatives_spanish:
  - que le retribuya
  - que le devuelva
  lexicon: HALOT
  rationale: El pi‘el de שׁלם expresa pagar, retribuir o compensar. «Que se la pague» reproduce la fuerza jussiva/volitiva del giro en un español idiomático y mantiene la idea de retribución.
- source_word: אֵלָיו
  english_pob_choice: to the man himself
  chosen_spanish: al hombre mismo
  alternatives_spanish:
  - a él mismo
  - a ese hombre
  lexicon: HALOT
  rationale: El pronombre vuelve al hombre impío del contexto. «Al hombre mismo» conserva la oposición con «sus hijos» sin introducir una paráfrasis innecesaria.
- source_word: וְיֵדָע
  english_pob_choice: so that he may know it
  chosen_spanish: para que lo conozca
  alternatives_spanish:
  - y sabrá
  - para que lo sepa
  lexicon: HALOT
  rationale: ידע significa «conocer/saber». En español, «para que lo conozca» expresa bien el valor final o resultativo del hebreo y suena natural, sin perder el objeto implícito.
theological_decisions:
- issue: Si el verso debe sonar como afirmación simple o como una tesis que Job cuestiona retóricamente
  english_pob_reading: 'The opening clause is treated as a question being challenged, followed by Job''s corrective wish: ''God stores up his iniquity for his sons? Let him repay it to the man himself, so that he may know it.'''
  chosen_spanish_reading: ¿Acaso Dios guarda su iniquidad para sus hijos? Que se la pague al hombre mismo, para que lo conozca.
  alternative_spanish_readings:
  - Dios guarda su iniquidad para sus hijos; que se la pague al hombre mismo, para que lo conozca.
  - ¿Dios guarda su iniquidad para sus hijos? Entonces que se la pague al hombre mismo, para que lo conozca.
  rationale: El contexto de Job 21 favorece oír la primera parte como una objeción retórica, no como una afirmación doctrinal final. Mantener la pregunta preserva la tensión argumentativa del pasaje y evita suavizar el contraste con la réplica de Job.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it'
translation_notes:
  revision_awareness: La redacción sigue la revisión más reciente de la POB inglesa, que devolvió la forma más directa «his iniquity» y mantuvo el giro retórico. La versión española conserva esa decisión sin introducir el término interpretativo «castigo».
  spanish_consistency_notes:
  - Se mantuvo «Dios» para אֱלֹהַּ, coherente con la política POB y con el uso común en español.
  - Se prefirió «iniquidad» sobre «castigo» para reflejar de cerca el hebreo אָוֹן/אוֹן y no cerrar la ambigüedad semántica.
  - «Que se la pague» reproduce el valor de retribución del verbo sin convertirlo en una simple equivalencia léxica rígida.
  - No se añadieron notas al pie porque el texto español puede leer con claridad sin marcar variantes textuales adicionales.
