base_translation:
  language: en
  yaml_path: translation/ot/1_kings/014/002.yaml
  text: Jeroboam said to his wife[a], “Please arise and disguise yourself, so that they will not know that you are the wife of Jeroboam, and go to Shiloh. Behold, Ahijah the prophet is there; he is the one who spoke concerning me[b], that I would be king over this people.”
  footnotes:
