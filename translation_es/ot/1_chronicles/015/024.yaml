translation:
  language: es
  text: Y Sebanías, Josafat, Natanael, Amasai, Zacarías, Benaía y Eliezer, los sacerdotes, tocaban[a] las trompetas[b] delante del arca de Dios, y Obed-edom y Jehías eran porteros[c] del arca.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «estaban tocando las trompetas» o «hacían sonar las trompetas».'
    reason: lexical_alternative
  - marker: b
    text: Las trompetas aquí suelen referirse a las trompetas sacerdotales rectas usadas en el culto; no se añade «de plata» porque el texto no lo explicita.
    reason: cultural_note
  - marker: c
    text: 'O: «guardianes» o «guardas de la puerta».'
    reason: lexical_alternative
lexical_decisions:
- source_word: הַכֹּהֲנִים
  english_pob_choice: the priests
  chosen_spanish: los sacerdotes
  alternatives_spanish:
  - los sacerdotes
  lexicon: HALOT
  rationale: El artículo y el sustantivo identifican a los siete nombrados como pertenecientes al grupo sacerdotal; en español, “los sacerdotes” funciona como aposición natural y fiel.
- source_word: מחצצרים
  english_pob_choice: were blowing
  chosen_spanish: tocaban
  alternatives_spanish:
  - estaban tocando
  - hacían sonar
  lexicon: HALOT
  rationale: El participio describe una acción contemporánea en la procesión. “Tocaban” conserva la acción en curso sin forzar un giro demasiado literal o pesado en español.
- source_word: בַּחֲצֹצְרֹות
  english_pob_choice: the trumpets
  chosen_spanish: las trompetas
  alternatives_spanish:
  - las trompetas
  - las trompetas de plata
  lexicon: HALOT
  rationale: El término designa trompetas rituales; “las trompetas” es la equivalencia directa. No se añadió “de plata” porque ese detalle no está explícito en este versículo.
- source_word: לִפְנֵי
  english_pob_choice: before
  chosen_spanish: delante de
  alternatives_spanish:
  - ante
  - en presencia de
  lexicon: HALOT
  rationale: “Delante de” expresa de modo natural la posición espacial en la escena procesional y mantiene la relación de localización.
- source_word: אֲרוֹן הָאֱלֹהִים
  english_pob_choice: the ark of God
  chosen_spanish: el arca de Dios
  alternatives_spanish:
  - el arca de Dios
  - el arca del Dios
  lexicon: HALOT
  rationale: Se conserva la expresión bíblica directa “el arca de Dios”, que reproduce con claridad la construcción hebrea sin sobreinterpretarla.
- source_word: שֹׁעֲרִים
  english_pob_choice: gatekeepers
  chosen_spanish: porteros
  alternatives_spanish:
  - guardianes de la puerta
  - guardianes
  lexicon: HALOT
  rationale: Aunque “porteros” es menos institucional que “gatekeepers”, en español comunica bien la función de vigilancia/servicio de acceso en el contexto del arca. Se evita “guardianes” por ser más genérico.
- source_word: לָאָרוֹן
  english_pob_choice: for the ark
  chosen_spanish: del arca
  alternatives_spanish:
  - para el arca
  - al servicio del arca
  lexicon: HALOT
  rationale: El lamed indica relación funcional o asignación. En español, “porteros del arca” transmite de forma natural que su cargo estaba vinculado al arca, sin añadir una preposición pesada o ambigua.
- source_word: וְעֹבֵד אֱדֹם
  english_pob_choice: Obed-edom
  chosen_spanish: Obed-edom
  alternatives_spanish:
  - Obed-Edom
  lexicon: HALOT
  rationale: Se mantiene la transliteración reconocible del nombre propio conforme al criterio del proyecto.
- source_word: וִיחִיָּה
  english_pob_choice: Jehiah
  chosen_spanish: Jehías
  alternatives_spanish:
  - Yehías
  lexicon: HALOT
  rationale: Se usa una forma española natural y reconocible del nombre propio, manteniendo cercanía fonética con el hebreo.
theological_decisions:
- issue: Relación entre el arca y los nombrados como porteros
  english_pob_reading: Obed-edom and Jehiah were gatekeepers for the ark.
  chosen_spanish_reading: Obed-edom y Jehías eran porteros del arca.
  alternative_spanish_readings:
  - Obed-edom y Jehías eran porteros para el arca
  - Obed-edom y Jehías eran porteros al servicio del arca
  rationale: Se conserva la idea de responsabilidad vinculada al arca sin imponer un matiz doctrinal adicional. La frase española mantiene la función cultual y la relación de servicio implícita en el hebreo y en la lectura inglesa.
  doctrine_reference: Ninguno; decisión de función cultual y sintaxis
- issue: Título divino en la expresión del arca
  english_pob_reading: the ark of God
  chosen_spanish_reading: el arca de Dios
  alternative_spanish_readings:
  - el arca del Dios
  rationale: No hay aquí el Tetragrámaton, sino אֱלֹהִים. Por eso se traduce directamente “Dios” y no se introduce “Yahvé”.
  doctrine_reference: Ninguno; decisión léxica sobre אֱלֹהִים
translation_notes:
  revision_awareness: El texto inglés auditado mantiene alta concordancia con el hebreo y no presenta revisiones pendientes; se ha preservado esa lectura estable en español, con ajustes naturales de estilo y de nombre propio.
  spanish_consistency_notes:
  - Se mantiene “Dios” para אֱלֹהִים, sin sustituirlo por “Yahvé”, porque el hebreo no usa el Tetragrámaton en este versículo.
  - Se traduce la función de los levitas/sacerdotes con términos cultuales habituales en español sin desplazar el sentido técnico del hebreo.
  - Se preserva la alternancia de nombres propios con formas españolas reconocibles, evitando uniformar artificialmente las transliteraciones.
  - La puntuación coordina la lista de nombres de manera natural en español y conserva la estructura sintáctica del original.
