  text: עַ֣ל אֲשֶׁ֣ר לֹֽא שָׁמְע֗וּ בְּ/קוֹל֙ יְהוָ֣ה אֱלֹהֵי/הֶ֔ם וַ/יַּעַבְרוּ֙ אֶת בְּרִית֔/וֹ אֵ֚ת כָּל אֲשֶׁ֣ר צִוָּ֔ה מֹשֶׁ֖ה עֶ֣בֶד יְהוָ֑ה וְ/לֹ֥א שָׁמְע֖וּ וְ/לֹ֥א עָשֽׂוּ׀־־־׃פ
base_translation:
  language: en
  yaml_path: translation/ot/2_kings/018/012.yaml
  text: because they did not listen to the voice of Yahweh their God[a], but transgressed his covenant, all that Moses the servant of Yahweh commanded[c][b]; they neither listened nor did it.
  footnotes:
  - marker: a
    text: Or 'obeyed the voice of the LORD their God.' The Hebrew idiom 'listen to the voice' often carries the sense of obedience.
    reason: lexical_alternative
  - marker: b
    text: Or 'violated his covenant.'
    reason: lexical_alternative
  - marker: c
    text: The repeated 'did not listen' / 'would not listen' echoes the Hebrew for emphasis, stressing persistent refusal rather than a single act of disobedience.
    reason: cultural_note
