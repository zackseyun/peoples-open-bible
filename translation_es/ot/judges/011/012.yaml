translation:
  language: es
  text: 'Entonces Jefté envió mensajeros al rey de los amonitas[a], diciendo: «¿Qué hay entre mí y ti, que has venido contra mí para luchar en mi tierra?»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «¿Qué tengo yo contigo?» El hebraísmo expresa hostilidad o disputa entre las partes.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּשְׁלַח
  english_pob_choice: Then ... sent
  chosen_spanish: Entonces envió
  alternatives_spanish:
  - Y envió
  - Luego envió
  lexicon: HALOT
  rationale: El waw consecutivo avanza la narración; «Entonces» conserva la secuencia de manera natural en español sin perder el valor narrativo.
- source_word: יִפְתָּח
  english_pob_choice: Jephthah
  chosen_spanish: Jefté
  alternatives_spanish:
  - Jefta
  lexicon: convención bíblica española
  rationale: Se usa la forma bíblica establecida en español para el nombre propio.
- source_word: מַלְאָכִים
  english_pob_choice: messengers
  chosen_spanish: mensajeros
  alternatives_spanish:
  - enviados
  - embajadores
  lexicon: HALOT
  rationale: El contexto diplomático indica representantes humanos; «mensajeros» refleja el sentido general sin exagerar el rango oficial.
- source_word: אֶל מֶלֶךְ בְּנֵי עַמּוֹן
  english_pob_choice: to the king of the Ammonites
  chosen_spanish: al rey de los amonitas
  alternatives_spanish:
  - al rey de los hijos de Amón
  - al rey del pueblo amonita
  lexicon: HALOT
  rationale: «Amonitas» es la designación étnica idiomática en español y preserva el referente sin calco innecesario.
- source_word: לֵאמֹר
  english_pob_choice: saying
  chosen_spanish: diciendo
  alternatives_spanish:
  - y le dijo
  lexicon: HALOT
  rationale: Introduce el discurso directo de forma idiomática y fiel al valor de la construcción hebrea.
- source_word: מַה לִּי וָלָךְ
  english_pob_choice: What is there between me and you
  chosen_spanish: ¿Qué hay entre tú y yo?
  alternatives_spanish:
  - ¿Qué tengo yo contigo?
  - ¿Qué hay entre nosotros?
  lexicon: HALOT
  rationale: El hebraísmo expresa distancia o conflicto entre partes; esta versión mantiene la imagen del texto y es natural en español. No se borra la tensión relacional.
- source_word: כִּי
  english_pob_choice: that
  chosen_spanish: que
  alternatives_spanish:
  - porque
  - pues
  lexicon: HALOT
  rationale: Aquí introduce el contenido explicativo de la queja; «que» es la conjunción más directa en español.
- source_word: בָאתָ אֵלַי
  english_pob_choice: you have come against me
  chosen_spanish: has venido contra mí
  alternatives_spanish:
  - has venido a mí
  - has venido sobre mí
  lexicon: HALOT
  rationale: El contexto hostil da fuerza adversativa a «venir a mí»; «contra mí» explicita ese matiz sin apartarse del hebreo.
- source_word: לְהִלָּחֵם
  english_pob_choice: to fight
  chosen_spanish: para luchar
  alternatives_spanish:
  - para pelear
  - para hacer guerra
  lexicon: HALOT
  rationale: El infinitivo denota entrar en combate; «luchar» es claro y suficientemente amplio en español.
- source_word: בְּאַרְצִי
  english_pob_choice: in my land
  chosen_spanish: en mi tierra
  alternatives_spanish:
  - en mi país
  - en mi territorio
  lexicon: HALOT
  rationale: «Tierra» reproduce bien el sentido concreto de posesión/territorio en contexto de conflicto y suena natural en español bíblico.
theological_decisions:
- issue: Valor del hebraísmo de hostilidad «מַה לִּי וָלָךְ»
  english_pob_reading: What is there between me and you
  chosen_spanish_reading: ¿Qué hay entre tú y yo?
  alternative_spanish_readings:
  - ¿Qué tengo yo contigo?
  - ¿Qué hay entre nosotros?
  rationale: La frase no se suaviza a una expresión meramente idiomática de desapego; se conserva la idea de disputa o enemistad entre las partes, como señala el audit trail inglés.
  doctrine_reference: Ninguna; decisión de semántica discursiva y pragmática
- issue: Dirección hostil de «בָאתָ אֵלַי לְהִלָּחֵם»
  english_pob_reading: you have come against me to fight in my land
  chosen_spanish_reading: has venido contra mí para luchar en mi tierra
  alternative_spanish_readings:
  - has venido a mí para luchar en mi tierra
  - has venido sobre mí para pelear en mi tierra
  rationale: Se mantiene el carácter agresivo del movimiento y del propósito bélico, sin neutralizar el conflicto que el contexto exige.
  doctrine_reference: Ninguna; decisión de contexto narrativo
translation_notes:
  revision_awareness: Se corrigió el anclaje de nota al incluir [a] en el texto principal junto a «amonitas», de modo que la nota alternativa quede vinculada explícitamente al punto léxico correspondiente. No se realizaron otros cambios respecto del sentido fuente y del audit trail inglés.
  spanish_consistency_notes:
  - Se mantuvo el tono narrativo sobrio y bíblico, evitando calcos excesivamente ingleses.
  - Se prefirió «amonitas» por idiomaticidad en español, con la nota para preservar la alternativa más literal del etnónimo.
  - Se conservó la tensión hostil de la pregunta hebrea sin convertirla en una simple fórmula de cortesía o desinterés.
