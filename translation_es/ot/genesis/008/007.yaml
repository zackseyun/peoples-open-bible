translation:
  language: es
  text: Entonces envió al cuervo, y este salió, saliendo y regresando[a], hasta que las aguas se secaron de sobre la tierra.[b]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, más formalmente, «y salió, saliendo y regresando». La expresión hebrea comunica movimiento repetido.
    reason: lexical_alternative
  - marker: b
    text: O «iba y venía»; es decir, «yendo de un lado a otro».
    reason: previous_rendering
lexical_decisions:
- source_word: וַיְשַׁלַּח
  english_pob_choice: Then he sent out
  chosen_spanish: Entonces envió
  alternatives_spanish:
  - Y envió
  - Así que envió
  lexicon: HALOT
  rationale: El wayyiqtol marca avance narrativo. «Entonces» comunica bien la secuencia consecutiva en español sin sobrecargar la frase. El verbo «envió» conserva la idea de despachar con intención; el complemento «al cuervo» completa el objeto directo explícito del hebreo.
- source_word: הָעֹרֵב
  english_pob_choice: the raven
  chosen_spanish: el cuervo
  alternatives_spanish:
  - el raven
  - el ave
  lexicon: HALOT
  rationale: La referencia zoológica es directa. «Cuervo» es la equivalencia precisa y natural en español para עֹרֵב.
- source_word: וַיֵּצֵא
  english_pob_choice: it went out
  chosen_spanish: salió
  alternatives_spanish:
  - fue afuera
  - salió fuera
  lexicon: HALOT
  rationale: El verbo יצא expresa salir/ir fuera. En español, «salió» es natural y mantiene el movimiento sin añadir «voló», que el hebreo no dice explícitamente.
- source_word: יָצוֹא וָשׁוֹב
  english_pob_choice: going out and returning
  chosen_spanish: saliendo y regresando
  alternatives_spanish:
  - yendo y viniendo
  - de ida y vuelta
  - salía y volvía
  lexicon: HALOT
  rationale: La construcción intensiva/iterativa se preserva con un gerundio duplicado que refleja el movimiento continuo y repetido. «Saliendo y regresando» sigue de cerca el hebreo sin perder legibilidad. «Yendo y viniendo» sería más idiomático, pero menos explícito respecto de la idea de salida y retorno.
- source_word: עַד
  english_pob_choice: until
  chosen_spanish: hasta que
  alternatives_spanish:
  - hasta
  - hasta el momento en que
  lexicon: HALOT
  rationale: Marca el límite temporal de la acción continua; «hasta que» es la forma más clara en español cuando sigue una cláusula verbal.
- source_word: יְבֹשֶׁת
  english_pob_choice: had dried up
  chosen_spanish: se secaron
  alternatives_spanish:
  - se habían secado
  - se secaron por completo
  - se agotaron
  lexicon: HALOT
  rationale: La raíz יבשׁ expresa secarse. En español, el perfecto simple funciona bien dentro del marco narrativo. Elegir «se secaron» evita imponer un matiz temporal más técnico que el hebreo no exige en sí mismo.
- source_word: הַמַּיִם
  english_pob_choice: the waters
  chosen_spanish: las aguas
  alternatives_spanish:
  - el agua
  - las aguas del diluvio
  lexicon: HALOT
  rationale: El plural hebreo מַיִם conserva el idiomático plural colectivo. «Las aguas» mantiene la forma bíblica y el contexto del diluvio.
- source_word: מֵעַל הָאָרֶץ
  english_pob_choice: from upon the earth
  chosen_spanish: de sobre la tierra
  alternatives_spanish:
  - de encima de la tierra
  - de la superficie de la tierra
  - de sobre la faz de la tierra
  lexicon: HALOT
  rationale: La preposición compuesta מֵעַל conserva la imagen espacial de «sobre/encima de». «De sobre la tierra» suena digno y fiel al relieve espacial del hebreo sin suavizarlo demasiado.
theological_decisions:
- issue: Lenguaje del movimiento repetido del cuervo
  english_pob_reading: it went out, going out and returning / it went back and forth
  chosen_spanish_reading: salió, saliendo y regresando
  alternative_spanish_readings:
  - fue y vino
  - iba y volvía
  - salía y volvía
  rationale: 'No hay carga doctrinal en disputa, pero sí una tensión lexical importante: el hebreo usa una construcción iterativa que no conviene reducir a una simple ida y vuelta si se quiere conservar la forma del texto. La redacción escogida mantiene la repetición verbal y la progresión narrativa.'
  doctrine_reference: Ninguna; decisión de fidelidad lexical y aspectual.
translation_notes:
  revision_awareness: 'La revisión más reciente del inglés prefirió explicitar la expresión iterativa hebrea («it went out, going out and returning») en lugar de suavizarla a «it went back and forth». La versión española sigue esa decisión de mayor explicitud, conservando la secuencia verbal y el carácter repetitivo de la frase original. También se tuvo en cuenta que la traducción inglesa posterior a una revisión previa corrigió la redundancia de separar «went out» de la locución iterativa; en español, por eso se formula como una sola cadena verbal natural: «salió, saliendo y regresando».'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» para el nombre divino cuando corresponda, pero en este versículo no aparece.
  - «Las aguas» conserva el plural hebreo idiomático.
  - «De sobre la tierra» preserva la imagen espacial del hebreo מֵעַל sin convertirla en una paráfrasis más libre.
  - Se evita «paloma» o cualquier otro ave distinta; el hebreo especifica «cuervo».
