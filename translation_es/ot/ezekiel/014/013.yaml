    rationale: El verbo hebreo expresa cortar/eliminar decisivamente, pero no necesariamente añade el matiz moderno totalizante de 'exterminar'.
  - severity: low
    issue: Nota a sobreexplica y formula torpemente el literal
    rationale: La nota dice 'el hijo de hombre', pero el vocativo hebreo es simplemente la fórmula de tratamiento 'hijo de hombre'; conviene más breve y precisa.
