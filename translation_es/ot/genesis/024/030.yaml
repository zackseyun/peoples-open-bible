base_translation:
  language: en
  yaml_path: translation/ot/genesis/024/030.yaml
  text: And it happened[a], when he saw the nose ring and the bracelets on his sister’s hands, and when he heard the words of Rebekah his sister, saying, “This is what the man said to me,” that he went to the man. And behold[d][c][b], he was standing by the camels at the spring.
  footnotes:
  - marker: a
    text: Or, “the ring.” The Hebrew נֶזֶם can mean a ring generally; here “nose ring” is chosen because Genesis 24:47 specifies that it was placed on Rebekah’s nose.
    reason: lexical_alternative
  - marker: b
    text: Or “beside the camels.” The Hebrew preposition can denote location near something, not necessarily on top of it.
    reason: lexical_alternative
  - marker: c
    text: Or “at the well.” The Hebrew עַיִן more specifically means “spring” or “water source.”
    reason: lexical_alternative
  - marker: d
    text: Or 'the words of Rebekah his sister, saying,'.
    reason: previous_rendering
