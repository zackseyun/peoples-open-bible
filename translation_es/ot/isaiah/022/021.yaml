revisions:
- from: Yo lo vestiré con tu túnica[a], y le ceñiré tu cinturón; pondré tu autoridad en su mano, y será padre para los habitantes de Jerusalén y para la casa de Judá.
  to: Lo vestiré con tu túnica[a], y le ceñiré tu faja; pondré tu autoridad en su mano, y será padre para los habitantes de Jerusalén y para la casa de Judá.
  rationale: Se ajusta el texto para reflejar mejor el hebreo y la rationale documentada del POB inglés. ‘Faja’ conserva mejor que ‘cinturón’ el valor ceremonial de אַבְנֵט, y la eliminación de ‘Yo’ mejora la fluidez natural del español sin perder sentido. También se corrige la nota al lugar donde realmente corresponde la alternativa léxica de וְהָיָה לְאָב; el marcador debe anclarse en ‘padre’, no en ‘túnica’.
