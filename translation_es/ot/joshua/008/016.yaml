review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español capta bien la estructura y el sentido general del hebreo: convocatoria para perseguir, persecución de Josué y separación respecto de la ciudad. Sin embargo, hay un desajuste gramatical importante: el sujeto hebreo es plural (''todo el pueblo'' entendido colectivamente, seguido de verbos 3mp), por lo que ''fue llamado'' no concuerda bien con la acción colectiva ni con la continuación plural. Además, ''fueron alejados'' es aceptable, pero ''quedaron apartados de la ciudad'' refleja mejor el efecto resultativo del nifal de נתק en contexto táctico.'
  spanish_quality_summary: 'El texto es mayormente claro y legible, pero ''todo el pueblo ... fue llamado'' suena algo rígido e inconsistente al pasar luego a ''persiguieron''. En español bíblico natural conviene mantener el colectivo con verbo plural: ''todos los del pueblo ... fueron llamados'' o reformular el sujeto. También conviene pulir las notas: ''fue clamado'' no es español idiomático aquí, y ''persiguientes'' debe cambiarse por ''perseguidores'' o una formulación más natural.'
  glossary_alignment: No hay términos teológicos sensibles en este versículo. 'Josué' está bien. No aparecen Yahvé, Mesías, Espíritu, etc. La decisión de no usar 'hombres' para עָם está bien alineada con el expediente inglés.
  issues:
  - severity: high
    issue: Incongruencia de número en 'todo el pueblo ... fue llamado'
    rationale: El hebreo usa un colectivo con verbos en plural, y la oración española cambia torpemente de singular a plural ('fue llamado ... y persiguieron'). Esto afecta la fidelidad formal y la naturalidad.
  - severity: medium
    issue: Nota [a] usa 'fue clamado'
    rationale: '''Fue clamado'' no es una alternativa idiomática en español para este contexto; no representa bien la alternativa inglesa ''cried out''.'
  - severity: medium
    issue: Nota [b] dice 'los persiguientes'
    rationale: '''Persiguientes'' no es natural; debe decir ''los perseguidores'' o reformularse.'
  - severity: low
    issue: '''fueron alejados'' puede sonar algo agentivo'
    rationale: Aunque transmite el sentido general, una formulación como 'quedaron apartados de la ciudad' refleja mejor la separación táctica resultante sin sugerir demasiado un agente explícito.
  revised_spanish_text: Y todos los del pueblo que estaban en la ciudad fueron llamados[a] para perseguirlos, y persiguieron a Josué y quedaron apartados de la ciudad[b].
