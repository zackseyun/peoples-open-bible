revisions:
- from: El Dios de su amor leal irá delante de mí[a]; Dios me dejará mirar a mis enemigos.
  to: El Dios de su amor constante[a] irá delante de mí[b]; Dios me dejará ver a mis enemigos.
  rationale: 'Se hace una reparación menor para mejorar la naturalidad del español y la alineación con el audit trail inglés: se cambia «amor leal» por «amor constante», se ajusta «mirar» a «ver», y se añade la nota léxica sobre hesed además de conservar la nota de lectura alternativa.'
