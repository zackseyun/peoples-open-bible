translation:
  language: es
  text: No descubrirás la desnudez de la hija de la esposa de tu padre, engendrada por tu padre; ella es tu hermana.[a]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «ella es tu media hermana». El hebreo dice literalmente: «ella es tu hermana», mientras que la descripción anterior precisa la relación.'
    reason: lexical_alternative
lexical_decisions:
- source_word: עֶרְוַת / עֶרְוָתָהּ
  english_pob_choice: the nakedness of ... / her nakedness
  chosen_spanish: la desnudez de ... / su desnudez
  alternatives_spanish:
  - la vergüenza de ... / su vergüenza
  - las partes íntimas de ... / sus partes íntimas
  lexicon: HALOT
  rationale: En Levítico 18, el hebreo usa una fórmula legal fija para prohibiciones sexuales. «Desnudez» conserva ese valor idiomático y la cohesión del capítulo mejor que «vergüenza» o una paráfrasis anatómica.
- source_word: בַּת
  english_pob_choice: daughter
  chosen_spanish: hija
  alternatives_spanish:
  - descendiente femenina
  - muchacha
  lexicon: HALOT
  rationale: Es un término de parentesco directo y sencillo; «hija» reproduce con claridad el vínculo familiar del hebreo.
- source_word: אֵשֶׁת אָבִיךָ
  english_pob_choice: your father's wife
  chosen_spanish: la esposa de tu padre
  alternatives_spanish:
  - tu madrastra
  lexicon: HALOT
  rationale: El hebreo dice literalmente «la esposa de tu padre». «Madrastra» sería una inferencia válida, pero la forma más cercana al texto mantiene la relación explícita sin comprimirla.
- source_word: מוֹלֶדֶת אָבִיךָ
  english_pob_choice: born to your father
  chosen_spanish: nacida de tu padre
  alternatives_spanish:
  - nacida para tu padre
  - engendrada por tu padre
  lexicon: HALOT
  rationale: La expresión marca procedencia biológica. «Nacida de tu padre» sigue el sentido y suena natural en español, a la vez que conserva la huella relacional del hebreo.
- source_word: אֲחוֹתְךָ הִוא
  english_pob_choice: she is your sister
  chosen_spanish: ella es tu hermana
  alternatives_spanish:
  - es tu media hermana
  - es tu hermana de sangre
  lexicon: HALOT
  rationale: El hebreo dice de forma directa «tu hermana». Mantener esa formulación conserva el nivel textual sin añadir «media» en el cuerpo del versículo.
- source_word: לֹא תְגַלֶּה
  english_pob_choice: You shall not uncover
  chosen_spanish: No descubrirás
  alternatives_spanish:
  - No revelarás
  - No desvelarás
  lexicon: HALOT
  rationale: «Descubrir» reproduce el verbo legal tradicional de la fórmula bíblica en español y comunica el prohibitivo sin necesidad de ampliación.
theological_decisions:
- issue: Si especificar «media hermana» en el texto principal
  english_pob_reading: Retain the source-level wording 'she is your sister' and let the preceding qualifiers define the relationship.
  chosen_spanish_reading: Conservar «ella es tu hermana» y dejar que las descripciones previas determinen la relación exacta.
  alternative_spanish_readings:
  - ella es tu media hermana
  rationale: El versículo mismo construye la relación por medio de las frases anteriores y concluye con una designación más amplia. Añadir «media» aclara, pero interpreta más allá de la formulación explícita del hebreo.
  doctrine_reference: Principio de primacía del texto original; preservar la tensión o amplitud léxica cuando el hebreo no la resuelve de manera explícita.
translation_notes:
  revision_awareness: La base inglesa revisó «begotten by your father» a «born to your father» por mayor naturalidad formal. La versión española sigue ese ajuste con «nacida de tu padre», manteniendo el sentido biológico sin sobrecargar el registro.
  spanish_consistency_notes:
  - Se mantiene «desnudez» para la fórmula legal de Levítico 18, en consonancia con el POB inglés.
  - Se evita «madrastra» en el cuerpo principal porque el hebreo expresa la relación con mayor literalidad.
  - Se conserva «hermana» sin «media» en el texto principal para respetar la formulación del hebreo y dejar la precisión al contexto.
  - El tono legal-prohibitivo se reproduce con «No descubrirás», de registro bíblico pero comprensible en español actual.
