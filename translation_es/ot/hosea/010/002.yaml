review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura y el sentido general del hebreo: corazón dividido, culpabilidad subsiguiente y destrucción de altares y מַצֵּבוֹת por el sujeto enfático singular. Sin embargo, se aparta del rastro POB en dos puntos significativos: para יֶאְשָׁמוּ el inglés auditado prioriza «bear guilt» con nota alternativa forense, mientras que el español principal escoge «serán hallados culpables», desplazando el matiz hacia un veredicto externo; y para מַצֵּבוֹתָם «piedras sagradas» es menos preciso que «estelas sagradas» o «pilares sagrados» para objetos cultuales erguidos.'
  spanish_quality_summary: El español es claro y digno, pero «Dividido está su corazón» suena algo invertido/literario de forma innecesaria frente a un español más natural. «Piedras sagradas» es comprensible, pero demasiado amplio; en contexto profético, «estelas sagradas» comunica mejor el referente cultual sin volverse ininteligible. El resto fluye bien.
  glossary_alignment: 'No hay conflictos con Yahvé/Mesías/etc. Sí conviene alinear mejor el valor léxico documentado de יֶאְשָׁמוּ y la precisión cultual de מַצֵּבוֹת. La nota b actual no sigue el audit trail: el inglés tiene una alternativa sobre culpabilidad, no sobre «altares de culto». La nota cultural debe acompañar el término revisado.'
  issues:
  - severity: medium
    issue: «serán hallados culpables» como texto principal para יֶאְשָׁמוּ
    rationale: El audit trail inglés eligió «they will bear guilt» y relegó «be held guilty» a nota alternativa. En español, «cargarán con su culpa» o «cargarán con culpa» preserva mejor la combinación de culpabilidad y consecuencia judicial.
  - severity: medium
    issue: Nota b anclada en «altares» no corresponde a las notas POB auditadas
    rationale: La nota inglesa b ofrece alternativas para יֶאְשָׁמוּ, no una glosa sobre «altares». Debe reubicarse al segmento de culpabilidad si se conserva la práctica de notas.
  - severity: medium
    issue: «piedras sagradas» es demasiado inespecífico para מַצֵּבוֹתָם
    rationale: El hebreo se refiere a piedras/estelas cultuales erguidas. «Estelas sagradas» o «pilares sagrados» preserva mejor la referencia a standing stones. En español eclesial general, «estelas sagradas» con nota cultural funciona bien.
  - severity: low
    issue: Orden marcado «Dividido está su corazón»
    rationale: No es incorrecto, pero «Su corazón está dividido» es más natural en español contemporáneo y mantiene el tono profético sin calco estilístico innecesario.
