id: 1CLEM.25
reference: 1 Clement 25
unit: chapter
book: 1 Clement
source:
  edition: Funk 1901 (normalized OCR)
  text: Ἴδωμεν τὸ παράδοξον σημεῖον τὸ γινόμενον ἐν τοῖς ἀνατολικοῖς τόποις, τουτέστιν τοῖς περὶ τὴν Ἀραβίαν. 2. ὄρνεον γάρ ἐστιν, ὃ προσονομάζεται φοῖνιξ· τοῦτο μονογενὲς ὑπάρχον ζῇ ἔτη πεντακόσια, γενόμενόν τε ἤδη πρὸς ἀπόλυσιν τοῦ ἀποθανεῖν αὐτό, σηκὸν ἑαυτῷ ποιεῖ ἐκ λιβάνου καὶ σμύρνης καὶ τῶν λοιπῶν ἀρωμάτων, εἰς ὃν πληρωθέντος τοῦ χρόνου εἰσέρχεται καὶ τελευτᾷ. . σηπομένης δὲ τῆς σαρκὸς σκώληξ τις γεννᾶται, ὃς ἐκ τῆς ἰκμάδος τοῦ τετελευτηκότος ζώου ἀνατρεφόμενος πτεροφυεῖ· εἶτα γενναῖος γενόμενος αἴρει τὸν σηκὸν ἐκεῖνον, ὅπου τὰ ὀστᾶ τοῦ προγεγονότος ἐστίν, καὶ ταῦτα βαστάζων διανύει ἀπὸ τῆς Ἀραβικῆς χώρας ἕως τῆς Αἰγύπτου εἰς τὴν λεγομένην Ἡλιούπολιν. . καὶ ἡμέρας, βλεπόντων πάντων, ἐπιπτὰς ἐπὶ τὸν τοῦ ἡλίου βωμὸν τίθησιν αὐτὰ καὶ οὕτως εἰς τοὐπίσω ἀφορμᾷ. 5. οἱ οὖν ἱερεῖς ἐπισκέπτονται τὰς ἀναγραφὰς τῶν χρόνων καὶ εὑρίσκουσιν αὐτὸν πεντακοσιοστοῦ ἔτους πεπληρωμένου ἐληλυθέναι.
  language: Greek
  pages:
  - 295
  - 297
  note: This chapter comes from the normalized Funk 1901 OCR layer.
translation:
  text: Let us consider the remarkable sign that takes place in the eastern regions[a], that is, in the areas around Arabia. For there is a bird that is called the phoenix. This creature, being the only one of its kind, lives for five hundred years; and when it has now come near to its departure in death, it makes for itself a nest from frankincense and myrrh and the other spices. When the time has been fulfilled, it enters into it and dies. But as its flesh decays, a certain worm is produced, and being nourished from the moisture of the dead creature, it grows wings. Then, when it has become strong, it lifts up that nest in which are the bones of the one that came before, and carrying them it travels from the land of Arabia as far as Egypt, to the city called Heliopolis. And in daytime, in the sight of all, it flies to the altar of the sun and places them there, and so sets out back again. So then the priests inspect the records of the times[b][c][a], and they find that it has come when the five hundredth year has been completed.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The phoenix was a well-known ancient bird tradition used as an example of renewal or return to life.
    reason: cultural_note
    anchor_ref: '25:2'
  - marker: a
    text: The Greek word rendered 'nest' can also denote an enclosed structure or chamber; the imagery here is of a self-made aromatic resting place for death and renewal.
    reason: lexical_alternative
    anchor_ref: '25:2'
  - marker: c
    text: Heliopolis means 'City of the Sun.'
    reason: cultural_note
    anchor_ref: '25:4'
  - marker: b
    text: Or 'the end of its life'.
    reason: previous_rendering
lexical_decisions:
- source_word: παράδοξον σημεῖον
  chosen: remarkable sign
  alternatives:
  - marvelous sign
  - strange sign
  - wondrous sign
  lexicon: LSJ
  rationale: Preserves the sense of something extraordinary or astonishing without overstating it into miracle language not explicit in the phrase itself.
- source_word: γινόμενον
  chosen: takes place
  alternatives:
  - happens
  - comes about
  - occurs
  lexicon: LSJ
  rationale: Idiomatic English for an ongoing phenomenon while retaining the present/middle sense of something occurring.
- source_word: μονογενές
  chosen: the only one of its kind
  alternatives:
  - unique
  - only-begotten
  - single-born
  lexicon: LSJ
  rationale: In this zoological context the sense is uniqueness or singularity, not filial 'only-begotten' language.
- source_word: ἀπόλυσιν τοῦ ἀποθανεῖν
  chosen: the end of its life
  alternatives:
  - its release to die
  - its departure in death
  lexicon: LSJ
  rationale: The Greek is somewhat awkwardly periphrastic; this rendering communicates the approach of death naturally in English without losing the sense of impending dissolution.
- source_word: σηκόν
  chosen: nest
  alternatives:
  - chamber
  - cell
  - shrine
  lexicon: LSJ
  rationale: In the phoenix tradition this is the structure the bird makes for itself; 'nest' best fits the immediate imagery, though the word can denote an enclosure or shrine-like structure.
- source_word: λίβανος
  chosen: frankincense
  alternatives:
  - incense
  lexicon: LSJ
  rationale: More specific and historically accurate than the broader 'incense.'
- source_word: ἀρώματα
  chosen: spices
  alternatives:
  - aromatics
  - fragrant substances
  lexicon: LSJ
  rationale: Readable modern English that still conveys fragrant materials used in the nest.
- source_word: ἰκμάς
  chosen: moisture
  alternatives:
  - fluid
  - humor
  lexicon: LSJ
  rationale: A clear rendering of bodily moisture or dampness from which the worm is nourished.
- source_word: πτεροφυεῖ
  chosen: it grows wings
  alternatives:
  - becomes winged
  - puts forth feathers
  lexicon: LSJ
  rationale: Direct and vivid English preserving the developmental image.
- source_word: γενναῖος γενόμενος
  chosen: when it has become strong
  alternatives:
  - having become mature
  - having become vigorous
  - having become noble
  lexicon: LSJ
  rationale: Here the context is physical development to the point of carrying the nest; 'strong' best fits the narrative function.
- source_word: διανύει
  chosen: it travels
  alternatives:
  - it makes its way
  - it passes through
  lexicon: LSJ
  rationale: Simple narrative verb that preserves the journey motif.
- source_word: βλεπόντων πάντων
  chosen: in the sight of all
  alternatives:
  - while all are watching
  - before everyone
  lexicon: LSJ
  rationale: Retains the public, witnessed character with a slightly elevated cadence fitting the work's rhetoric.
- source_word: ἀφορμᾷ
  chosen: sets out back again
  alternatives:
  - departs again
  - returns
  lexicon: LSJ
  rationale: The verb suggests setting off or making a start; this keeps the motion explicit rather than collapsing it into a simple 'returns.'
- source_word: ἀναγραφὰς τῶν χρόνων
  chosen: the records of the times
  alternatives:
  - chronological records
  - registers of the years
  - archives
  lexicon: LSJ
  rationale: Keeps the formal archival sense while remaining readable.
- source_word: πεντακοσιοστοῦ ἔτους πεπληρωμένου
  chosen: when the five hundredth year has been completed
  alternatives:
  - at the completion of the five hundredth year
  - after five hundred years were fulfilled
  lexicon: LSJ
  rationale: Reflects the genitive absolute and the completed time period with a cadence close to the Greek.
theological_decisions:
- issue: Treatment of the phoenix account
  chosen_reading: Translate the narrative straightforwardly as Clement's illustrative example without endorsing or debunking its historical accuracy in the main text.
  alternative_readings:
  - Render with distancing language such as 'it is said' throughout
  - Paraphrase to signal legendary status
  rationale: The Greek presents the account directly as a 'remarkable sign.' The translation should preserve Clement's rhetorical use of the example and leave historical evaluation to notes or commentary rather than importing skepticism into the text.
  doctrine_reference: 'PHILOSOPHY.md: original-language primacy; preserve rhetorical force'
