  source_alignment_summary: 'El borrador sigue bien el hebreo en sus cuatro movimientos: vocativo a Dios, rechazo, ruptura/brecha, ira, y súplica final de restauración con nota de ambigüedad. Sin embargo, el anclaje de notas no refleja bien el contenido: la nota [a] no corresponde a una alternativa del vocativo principal sino a una posibilidad estilística secundaria, y la nota [b] se usa para una alternativa léxica que no hace falta en el texto principal. La mayor mejora necesaria es estilística y de precisión idiomática en español.'
  spanish_quality_summary: El español es generalmente claro y digno, pero «nos has abierto una brecha» suena algo forzado porque en español normal la brecha se abre en algo, no tanto a alguien. Una formulación más natural y fiel a la imagen es «has abierto brecha entre nosotros», que conserva la violencia de פרץ sin sonar calcada. También conviene eliminar notas innecesarias para no sobrecargar el verso.
  glossary_alignment: 'No hay conflicto con la terminología del proyecto: אֱלֹהִים como «Dios» es correcto; no aparecen Yahvé, Mesías, δοῦλος, etc. La decisión sobre תְּשׁוֹבֵב לָנוּ como «Restáuranos» con nota alternativa «vuélvete a nosotros» está bien alineada con el expediente inglés y la ambigüedad hebrea.'
  issues:
  - severity: medium
    issue: «nos has abierto una brecha» es poco idiomático en español
    rationale: Aunque intenta preservar la imagen de פרץ, en español suena antinatural aplicado directamente a personas. «Has abierto brecha entre nosotros» o «nos has quebrantado abriendo brecha» comunica mejor la ruptura causada por Dios.
  - severity: low
    issue: La nota [a] sobre «Oh Dios» no es necesaria
    rationale: El expediente inglés registra «O God» como alternativa posible, pero no exige nota. En español, marcar «Dios» con una nota estilística menor añade ruido sin resolver ambigüedad real.
  - severity: low
    issue: La nota [b] sobre «nos has quebrantado» no preserva una ambigüedad fuente necesaria
    rationale: Es una explicación léxica secundaria, pero no una alternativa que el lector necesite para interpretar el hebreo. Basta con escoger una formulación española mejor en el texto principal.
  revised_spanish_text: Dios, nos has rechazado; has abierto brecha entre nosotros; has estado airado. Restáuranos[a].
  revised_footnotes:
  - marker: a
    text: 'O: «vuélvete a nosotros». El hebreo puede expresar tanto la restauración del pueblo como el retorno de Dios hacia ellos.'
