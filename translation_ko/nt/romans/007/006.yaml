id: ROM.7.6
reference: Romans 7:6
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: νυνὶ δὲ κατηργήθημεν ἀπὸ τοῦ νόμου, ἀποθανόντες ἐν ᾧ κατειχόμεθα, ὥστε δουλεύειν ἡμᾶς ἐν καινότητι πνεύματος καὶ οὐ παλαιότητι γράμματος.
base_translation:
  language: en
  yaml_path: translation/nt/romans/007/006.yaml
  text: But now we have been released from the law[a], having died to what held us[c][b], so that we serve in newness of the Spirit and not in oldness of the letter.
translation:
  language: ko
  text: 그러나 이제 우리는 우리를 매고 있던 것에 대하여 죽어 율법에서 풀려났습니다. 그래서 우리는 영의 새로움 가운데서 섬기고, 문자의 옛 것 가운데서 섬기지 않습니다.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: κατηργήθημεν
  english_pob_choice: have been released
  chosen_korean: 풀려났습니다
  lexicon: BDAG
  rationale: 7:2 일관.
- source_word: κατειχόμεθα
  english_pob_choice: held us
  chosen_korean: 매고 있던
  lexicon: BDAG
  rationale: '미완료 수동: 지속적으로 잡혀 있던 상태.'
- source_word: δουλεύειν
  english_pob_choice: serve
  chosen_korean: 섬기고
  alternatives_korean:
  - 노예 노릇 하고
  lexicon: BDAG
  rationale: 여기서는 새 영의 자유로운 섬김이라 「섬기다」가 자연스러우나, δουλ- 어근의 강도는 6장과 일관성 위해 의식하여 다룸. 본 절은 긍정적 신자의 삶을 묘사하므로 「섬기다」 채택.
- source_word: καινότητι πνεύματος
  english_pob_choice: newness of the Spirit
  chosen_korean: 영의 새로움
  alternatives_korean:
  - 성령의 새로움
  lexicon: BDAG
  rationale: 앞으로 8장에서 본격화될 πνεῦμα 주제의 도입. 여기서는 문자/영의 대조이므로 「영」으로 옮기되, 신적 영의 함의가 있음.
- source_word: παλαιότητι γράμματος
  english_pob_choice: oldness of the letter
  chosen_korean: 문자의 옛 것
  lexicon: BDAG
  rationale: 평행 대조.
theological_decisions:
- issue: 7:6의 πνεῦμα 번역
  chosen_reading: 「영」으로 옮기되, 8장의 성령론을 예비함을 표시
  alternative_readings:
  - 「성령」으로 명시
  rationale: 7:6은 문자/영의 바울적 대조 구도이며 명시적 「성령 강림」 어휘는 아니다. 8장과 달리 보수적으로 「영」으로 옮겨 본문의 점진성을 보존.
  doctrine_reference: 'DOCTRINE.md: Do not capitalize-by-default; preserve text''s own movement'
