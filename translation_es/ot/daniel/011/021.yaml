translation:
  language: es
  text: Y en su lugar se levantará un hombre despreciado, a quien no le habían conferido la majestad del reinado; entrará discretamente[a] y se apoderará del reino mediante intrigas[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «tranquilamente» o «en paz» para בְשַׁלְוָה; la idea es una entrada con apariencia de calma o seguridad, no de agresión abierta.
    reason: lexical_alternative
  - marker: b
    text: O «por lisonjas» para בַּחֲלַקְלַקּוֹת; el hebreo destaca medios suaves y engañosos para obtener poder.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְעָמַד
  english_pob_choice: will arise
  chosen_spanish: se levantará
  alternatives_spanish:
  - aparecerá
  - tomará su lugar
  - se alzará
  lexicon: HALOT
  rationale: En contextos de sucesión política en Daniel, עמד expresa surgir o llegar al poder. «Se levantará» conserva la idea de irrupción/sucesión sin sonar mecánico en español.
- source_word: עַל כַּנּוֹ
  english_pob_choice: in his place
  chosen_spanish: en su lugar
  alternatives_spanish:
  - en su puesto
  - en su lugar de él
  - en su lugar de reinado
  lexicon: HALOT
  rationale: El modismo apunta a la sucesión en la posición de otro. «En su lugar» transmite bien el sentido dinástico y político del hebreo.
- source_word: נִבְזֶה
  english_pob_choice: a despised man
  chosen_spanish: un hombre despreciado
  alternatives_spanish:
  - un hombre vil
  - una persona despreciada
  - un hombre despreciable
  lexicon: HALOT
  rationale: El valor pasivo/adjetival es «despreciado» o «tenido en poco». «Un hombre despreciado» mantiene el juicio evaluativo sin cargarlo con un matiz moral más fuerte que el hebreo.
- source_word: וְלֹא נָתְנוּ עָלָיו
  english_pob_choice: on whom they had not bestowed
  chosen_spanish: sobre quien no habían conferido
  alternatives_spanish:
  - a quien no habían dado
  - sobre quien no habían otorgado
  - a quien no habían concedido
  lexicon: HALOT
  rationale: El verbo con עַל expresa conferir algo sobre alguien. «Conferido» conserva el tono formal-político del contexto y funciona bien con el complemento siguiente.
- source_word: הוֹד מַלְכוּת
  english_pob_choice: the majesty of kingship
  chosen_spanish: el esplendor del reino
  alternatives_spanish:
  - la majestad del reinado
  - el honor de la realeza
  - la majestad de la realeza
  lexicon: HALOT
  rationale: הוֹד puede ser esplendor, majestad u honor. Aquí la combinación con מַלְכוּת admite el matiz de dignidad real; «esplendor del reino» comunica esa grandeza sin forzar «reino» como territorio exclusivamente. Se mantiene la tensión entre dignidad y gobierno.
- source_word: וּבָא בְשַׁלְוָה
  english_pob_choice: he will come in quietly
  chosen_spanish: entrará en calma
  alternatives_spanish:
  - entrará tranquilamente
  - vendrá en paz
  - vendrá en quietud
  lexicon: HALOT
  rationale: בְשַׁלְוָה puede expresar quietud, tranquilidad o seguridad. Elegí «entrará en calma» para preservar la apariencia de serenidad/ausencia de choque, aunque la frase también puede leerse como «tranquilamente».
- source_word: וְהֶחֱזִיק מַלְכוּת
  english_pob_choice: and seize the kingdom
  chosen_spanish: y se apoderará del reino
  alternatives_spanish:
  - y obtendrá el reino
  - y consolidará el reino
  - y tomará el reino
  lexicon: HALOT
  rationale: El hifil de החזיק puede implicar tomar o afianzar con firmeza. En este contexto de usurpación, «se apoderará del reino» expresa adquisición de poder de forma clara y natural.
- source_word: בַּחֲלַקְלַקּוֹת
  english_pob_choice: by intrigues
  chosen_spanish: mediante intrigas
  alternatives_spanish:
  - por lisonjas
  - mediante halagos
  - por medios astutos
  lexicon: HALOT
  rationale: El término sugiere suavidad engañosa y manipulación. «Mediante intrigas» capta el método político y la astucia implícita; la alternativa más literal «por lisonjas» queda como posibilidad semántica cercana.
translation_notes:
  revision_awareness: Se tuvo en cuenta el último pase de revisión, que no introdujo cambios y mantuvo alta concordancia con la propuesta inglesa auditada.
  spanish_consistency_notes:
  - Se mantuvo el registro político y formal del pasaje.
  - Se evitó «Cristo» o terminología eclesiástica ajena al contexto.
  - «Reino» se conservó por la referencia explícita a מַלְכוּת en un marco de sucesión real.
  - Las alternativas en notas preservan la tensión semántica entre quietud, serenidad, halago e intriga sin borrar el matiz del hebreo.
