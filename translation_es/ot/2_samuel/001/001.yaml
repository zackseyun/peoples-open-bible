review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la secuencia temporal del hebreo: marco narrativo inicial, muerte de Saúl, regreso previo de David, y estancia de dos días en Siclag. Sin embargo, «cuando David había vuelto» introduce una subordinación menos directa que el hebreo y el inglés auditado; además, «de derribar a Amalec» suena poco natural en español y puede oscurecer que se trata del pueblo amalecita en referencia colectiva.'
  spanish_quality_summary: El texto es generalmente legible y digno, pero «cuando David había vuelto» resulta algo forzado donde «después que David volvió/tras volver David» sería más natural. «Derribar a Amalec» no suena idiomático en registro bíblico narrativo; «después de derrotar[a] a Amalec» o «después de abatir[a] a Amalec» fluye mejor. Dado el criterio de no calcar de forma poco natural, conviene suavizar esa construcción. «Siclag» es aceptable como forma tradicional española.
  glossary_alignment: No hay conflictos con la terminología principal del proyecto. La decisión de mantener «Amalec» con nota es defendible por el hebreo singular colectivo y está documentada en la auditoría inglesa. No hay nombres divinos ni términos teológicos sensibles en este versículo.
  issues:
  - severity: medium
    issue: «cuando David había vuelto» suena poco natural y altera levemente la relación temporal
    rationale: El hebreo presenta un marco temporal seguido de una acción anterior a la principal. En español, con «después de la muerte de Saúl, David volvió... y se quedó...» o «después que David volvió...» se expresa mejor la secuencia sin una subordinación pesada con pluscuamperfecto.
  - severity: medium
    issue: «de derribar[a] a Amalec» es una combinación poco idiomática
    rationale: Aunque intenta preservar la fuerza de נכה, «derribar a Amalec» aplicado a un pueblo suena extraño en español. «Derrotar» es más natural, pero algo más débil; «abatir» o «golpear/derrotar» serían opciones mejores. Aquí conviene priorizar legibilidad manteniendo el sentido militar.
  revised_spanish_text: Ahora bien, después de la muerte de Saúl, cuando David volvió de derrotar[a] a Amalec, David se quedó en Siclag dos días.
  revised_footnotes:
  - marker: a
    text: Hebreo «Amalec», un referente colectivo al pueblo amalecita.
    reason: lexical_alternative
  revision_rationale: Se ajusta la sintaxis temporal a un español más natural y se reemplaza «derribar» por «derrotar» para evitar una expresión poco idiomática con objeto colectivo humano. Se conserva «Amalec» con nota para respetar la decisión documentada sobre el etnónimo singular colectivo, y se mantiene «Siclag» como forma española aceptable.
