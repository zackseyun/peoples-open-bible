id: GEN.15.2
reference: Genesis 15:2
source:
  edition: WLC
  text: וַ/יֹּ֣אמֶר אַבְרָ֗ם אֲדֹנָ֤/י יֱהוִה֙ מַה תִּתֶּן לִ֔/י וְ/אָנֹכִ֖י הוֹלֵ֣ךְ עֲרִירִ֑י וּ/בֶן מֶ֣שֶׁק בֵּיתִ֔/י ה֖וּא דַּמֶּ֥שֶׂק אֱלִיעֶֽזֶר־־־׃
translation:
  text: But Abram said[a], “Lord Yahweh, what will you give me, since I am going childless, and the heir of my house is Eliezer of Damascus?”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew 'the son of mesheq of my house,' an unusual expression; possibly 'the steward of my house' or 'the possessor/heir of my house.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמֶר
  chosen: But ... said
  alternatives:
  - And ... said
  - Then ... said
  lexicon: HALOT
  rationale: The waw-consecutive advances the narrative. 'But' fits the discourse turn here, since Abram's speech responds to the preceding divine promise with a concern or objection, while still remaining within normal narrative flow.
- source_word: אֲדֹנָי יֱהוִה
  chosen: Lord GOD
  alternatives:
  - Lord Yahweh
  - Lord GOD
  lexicon: HALOT
  rationale: אֲדֹנָי is the title 'Lord/Master' and יֱהוִה is the divine name. Per doctrine, YHWH is rendered 'the LORD' by default; however, in the fixed Hebrew collocation אֲדֹנָי יֱהוִה, standard English avoids 'Lord LORD.' 'Lord GOD' preserves both elements reverently and idiomatically.
- source_word: מַה תִּתֶּן לִי
  chosen: what will you give me
  alternatives:
  - what can you give me
  - what are you giving me
  lexicon: HALOT
  rationale: 'The imperfect here naturally expresses future sense in context: Abram asks what gift God will yet give in light of the promise. ''Will you give'' is straightforward and idiomatic.'
- source_word: וְאָנֹכִי
  chosen: since I
  alternatives:
  - and I
  - while I
  lexicon: HALOT
  rationale: Though literally 'and I,' the conjunction here introduces the circumstance that motivates Abram's question. 'Since I' brings out the explanatory force in natural English without over-paraphrasing.
- source_word: הוֹלֵךְ
  chosen: am going
  alternatives:
  - go
  - am passing on
  - am about to die
  lexicon: HALOT
  rationale: The participle literally means 'going/walking.' In this idiom with עֲרִירִי it refers to Abram's life-course continuing toward death without offspring. English idiom is best captured by 'am going childless,' preserving the metaphor without forcing a wooden rendering.
- source_word: עֲרִירִי
  chosen: childless
  alternatives:
  - destitute of children
  - without an heir
  - barren
  lexicon: HALOT
  rationale: The adjective denotes being without children/offspring. 'Childless' is the clearest modern equivalent. 'Without an heir' is interpretive and too narrow; 'barren' is less suitable for Abram personally.
- source_word: בֶן מֶשֶׁק בֵּיתִי
  chosen: the heir of my house
  alternatives:
  - the son of possession of my house
  - the steward of my house
  - the possessor of my house
  lexicon: HALOT
  rationale: This phrase is notoriously difficult. In context it refers to the person who would inherit Abram's estate. 'The heir of my house' best captures the likely sense in clear English. Because the underlying expression is unusual and may suggest household stewardship, alternatives are preserved in a footnote.
- source_word: דַּמֶּשֶׂק אֱלִיעֶזֶר
  chosen: Eliezer of Damascus
  alternatives:
  - Damascene Eliezer
  - Eliezer, a man of Damascus
  lexicon: HALOT
  rationale: The apposition is most naturally taken as identifying Eliezer by origin or association with Damascus. 'Eliezer of Damascus' is idiomatic English and preserves the proper name order naturally.
