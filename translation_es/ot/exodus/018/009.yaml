translation:
  language: es
  text: Jetró se alegró[a] por todo el bien que Yahvé había hecho por Israel, a quien había librado de la mano de Egipto[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «se regocijó». El verbo hebreo puede denotar alegría o regocijo.
    reason: lexical_alternative
  - marker: b
    text: 'Literalmente: «de la mano de Egipto», un modismo hebreo para decir que fue librado del poder de Egipto.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּחַדְּ
  english_pob_choice: rejoiced
  chosen_spanish: se alegró
  alternatives_spanish:
  - se regocijó
  - se gozó
  lexicon: HALOT
  rationale: El verbo hebreo puede expresar alegría o regocijo. En español, «se alegró» comunica con naturalidad la reacción de Jetró sin forzar un término demasiado solemne; mantiene bien el valor afectivo del verbo.
- source_word: יִתְרוֹ
  english_pob_choice: Jethro
  chosen_spanish: Jetró
  alternatives_spanish:
  - Jethro
  lexicon: Convención onomástica bíblica
  rationale: Se usa la forma española usual del nombre propio, manteniendo la identificación inequívoca del personaje.
- source_word: עַל כָּל הַטּוֹבָה
  english_pob_choice: over all the good
  chosen_spanish: por todo el bien
  alternatives_spanish:
  - por toda la bondad
  - a causa de todo el bien
  lexicon: HALOT
  rationale: La preposición עַל con verbos de emoción puede señalar el motivo de la reacción. «Por todo el bien» expresa ese motivo en español sin perder la idea de conjunto singular que tiene הַטּוֹבָה.
- source_word: עָשָׂה
  english_pob_choice: had done
  chosen_spanish: había hecho
  alternatives_spanish:
  - hizo
  - había realizado
  lexicon: HALOT
  rationale: El pluscuamperfecto español refleja adecuadamente la anterioridad de la acción de Yahvé respecto de la alegría de Jetró en el relato.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  lexicon: DOCTRINE.md contested term
  rationale: Se conserva el nombre divino en forma transliterada, conforme al criterio del proyecto, en lugar de sustituirlo por un título como «el SEÑOR».
- source_word: לְיִשְׂרָאֵל
  english_pob_choice: for Israel
  chosen_spanish: por Israel
  alternatives_spanish:
  - para Israel
  - a favor de Israel
  lexicon: HALOT
  rationale: Aquí ל expresa beneficio o favor. «Por Israel» comunica el sentido de acción en favor del pueblo y se integra con naturalidad en la frase española.
- source_word: אֲשֶׁר הִצִּילוֹ
  english_pob_choice: whom he had delivered
  chosen_spanish: al cual había librado
  alternatives_spanish:
  - a quien había librado
  - que había librado
  lexicon: HALOT
  rationale: «Librar» es un equivalente natural de נצל en contextos de rescate. «Al cual» conserva el referente colectivo de Israel y mantiene el tono formal del pasaje.
- source_word: מִיַּד מִצְרָיִם
  english_pob_choice: from the hand of Egypt
  chosen_spanish: de la mano de Egipto
  alternatives_spanish:
  - del poder de Egipto
  - de la mano de los egipcios
  lexicon: HALOT
  rationale: Se conserva la imagen hebrea de «mano» como idiomа de poder o dominio. En español es comprensible y auditable, por lo que no se sustituye por una paráfrasis interpretativa.
theological_decisions:
- issue: Nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: El texto hebreo usa el Tetragrama directamente. La traducción mantiene el nombre propio divino para evitar la sustitución por un título y preservar la distinción covenantal del texto.
  doctrine_reference: 'DOCTRINE.md: יְהוָה / YHWH'
- issue: Relación entre Israel y la acción divina
  english_pob_reading: for Israel
  chosen_spanish_reading: por Israel
  alternative_spanish_readings:
  - para Israel
  - a favor de Israel
  rationale: La construcción no describe solo un destinatario, sino una acción benefactora de Yahvé en favor de su pueblo. «Por Israel» conserva esa orientación sin añadir matices no explicitados por el hebreo.
  doctrine_reference: Exodus 18:9 context of deliverance
translation_notes:
  revision_awareness: 'Alineado con el pasaje hebreo y con el audit trail en inglés: se conserva la imagen de la «mano» de Egipto, el nombre divino como Yahvé, y el verbo de respuesta emocional con una solución española natural. No se detectan revisiones previas aplicadas en el contexto provisto.'
  spanish_consistency_notes:
  - Se mantiene la transliteración «Yahvé» como forma estándar del proyecto para יְהוָה.
  - Se evita «Cristo» o terminología eclesiástica no presente en el versículo.
  - «Librado» conserva el campo semántico de rescate sin introducir una ampliación doctrinal.
  - El registro es formal y bíblico, pero en español actual y legible.
