  lexicon: BDAG
  rationale: δουλεύω 동사는 「노예로서 섬기다」 의미를 본디 가지나, 정형화된 「섬기다」가 한국 성경 관행. 정책 글로사리는 δοῦλος→노예를 명사 매임 강조 시에만 적용.
- source_word: εὐάρεστος τῷ θεῷ
  english_pob_choice: pleasing to God
  chosen_korean: 하나님께 기쁨이 되다
  alternatives_korean:
