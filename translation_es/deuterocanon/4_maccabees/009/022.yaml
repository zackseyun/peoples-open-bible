lexical_decisions:
- source_word: ἀλλʼ
  english_pob_choice: but
  chosen_spanish: pero
  alternatives_spanish:
  - sino
  - mas
  lexicon: LSJ
  rationale: Marca contraste adversativo de manera natural en español y conserva el giro del texto griego y del POB inglés.
- source_word: ὥσπερ
  english_pob_choice: as though
  chosen_spanish: como si
  alternatives_spanish:
  - así como
  - como
  lexicon: LSJ
  rationale: Introduce comparación hipotética sin afirmar una transformación literal plena; 'como si' comunica bien la función modal del participio.
- source_word: ἐν πυρί
  english_pob_choice: in the fire
  chosen_spanish: en el fuego
  alternatives_spanish:
  - por el fuego
  - entre el fuego
  lexicon: LSJ
  rationale: Conserva la imagen locativa del griego y la formulación auditada del inglés.
- source_word: μετασχηματιζόμενος
  english_pob_choice: being transformed
  chosen_spanish: siendo transformado
  alternatives_spanish:
  - siendo cambiado
  - siendo transfigurado
  lexicon: LSJ
  rationale: Mantiene el matiz de cambio de forma/condición con tono elevado, sin forzar un sentido litúrgico no documentado.
- source_word: εἰς ἀφθαρσίαν
  english_pob_choice: into incorruptibility
  chosen_spanish: hacia la incorruptibilidad
  alternatives_spanish:
  - en incorruptibilidad
  - hacia la inmortalidad
  - en inmortalidad
  lexicon: LSJ
  rationale: '''Incorruptibilidad'' preserva el campo semántico de ἀφθαρσία; ''hacia'' permite reflejar el movimiento/tendencia del εἰς y deja abierta la tensión escatológica.'
- source_word: ὑπέμεινεν
  english_pob_choice: endured
  chosen_spanish: soportó
  alternatives_spanish:
  - perseveró
  - resistió
  - soportó con firmeza
  lexicon: LSJ
  rationale: '''Soportó'' expresa la resistencia bajo sufrimiento; en español suena natural en un contexto martirial y corresponde al sentido de endurance.'
- source_word: εὐγενῶς
  english_pob_choice: nobly
  chosen_spanish: noblemente
  alternatives_spanish:
  - con nobleza
  - valientemente
  lexicon: LSJ
  rationale: Reproduce el adverbio con el valor de conducta digna y noble resaltado en 4 Macabeos.
- source_word: τὰς
  english_pob_choice: the / these
  chosen_spanish: estas
  alternatives_spanish:
  - las
  - esas
  lexicon: Greek grammar
  rationale: Como el texto griego conservado termina de forma incompleta, 'estas' refleja el demostrativo implícito indicado por la revisión inglesa y evita omitir el objeto final fragmentario.
theological_decisions:
- issue: Alcance de εἰς ἀφθαρσίαν en contexto de martirio
  english_pob_reading: into incorruptibility
  chosen_spanish_reading: hacia la incorruptibilidad
  alternative_spanish_readings:
  - hacia la inmortalidad
  - en incorruptibilidad
  - en inmortalidad
  rationale: '''Incorruptibilidad'' mantiene la densidad del término griego sin reducirlo a ''inmortalidad'', y ''hacia'' preserva la dirección implícita del pasaje sin resolver indebidamente la imagen.'
  doctrine_reference: Preservar la tensión lexical y escatológica del original; primacía del griego sobre una formulación doctrinal cerrada.
translation_notes:
  revision_awareness: La versión inglesa auditada añadió el demostrativo final implícito por τὰς para no omitir el objeto fragmentario. La propuesta española sigue esa decisión con «estas» y conserva la incompletud del testimonio griego, sin intentar completar el final del versículo.
  spanish_consistency_notes:
  - Se usa «incorruptibilidad» para ἀφθαρσία, evitando reemplazarlo por «inmortalidad» como opción principal.
  - Se mantiene «como si» para ὥσπερ, por su valor comparativo e hipotético.
  - El fragmento final se deja abierto con «estas» para reflejar la clausura incompleta del testimonio griego.
  - La puntuación y el orden buscan sonar naturales en español sin borrar el carácter fragmentario del texto.
