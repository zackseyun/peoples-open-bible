id: TIT.2.9
reference: Titus 2:9
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: Δούλους ἰδίοις δεσπόταις ὑποτάσσεσθαι ἐν πᾶσιν, εὐαρέστους εἶναι, μὴ ἀντιλέγοντας,
base_translation:
  language: en
  yaml_path: translation/nt/titus/002/009.yaml
  text: Slaves are to submit to their own masters in everything[a], to be pleasing, not argumentative[b],
  footnotes:
  - marker: a
    text: Or 'servants' or 'bondservants'; Greek doulous can denote those in service, but here the bonded status is likely in view.
    reason: lexical_alternative
  - marker: b
    text: Or 'not talking back' or 'not contradicting.'
    reason: lexical_alternative
translation:
  language: ko
  text: 노예들[a]은 모든 일에서 자기 주인에게 복종해야 합니다. 기쁘게 해 드리고, 말대꾸하지 않으며[b],
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 또는 「종」, 「봉사하는 자」. 헬라어 δούλους는 봉사하는 자들을 가리킬 수 있으나, 본문에서는 매인 신분(bonded status)이 전제된다.
    reason: lexical_alternative
  - marker: b
    text: 또는 「반박하지 않으며」, 「거슬러 말하지 않으며」.
    reason: lexical_alternative
lexical_decisions:
- source_word: Δούλους
  english_pob_choice: Slaves
  chosen_korean: 노예들
  alternatives_korean:
  - 종들
  - 봉사하는 자들
  lexicon: BDAG
  rationale: 영어 POB가 매인 신분을 드러내기 위해 「slaves」를 택했으므로, 한국어에서도 같은 무게를 살려 「노예」로 옮긴다. 한국 전통의 「종」은 봉사의 어감만 남기고 매임의 무게를 약화시킨다. 1세기 가정 코드(household code)의 사회적 실재를 그대로 드러내는 것이 본문에 충실하다.
- source_word: ἰδίοις δεσπόταις
  english_pob_choice: their own masters
  chosen_korean: 자기 주인에게
  alternatives_korean:
  - 자기 상전에게
  - 자신의 주인에게
  lexicon: BDAG
  rationale: δεσπότης는 절대적 권한을 가진 주인. ἴδιος로 「자기 자신의」를 강조. 「주인」이 표준 한국어.
- source_word: ὑποτάσσεσθαι ἐν πᾶσιν
  english_pob_choice: submit ... in everything
  chosen_korean: 모든 일에서 ~ 복종해야
  alternatives_korean:
  - 모든 것에 순복해야
  - 모든 면에서 복종해야
  lexicon: BDAG
  rationale: ὑποτάσσομαι의 표준 등가어 「복종」. 「모든 일에서」가 자연스럽다.
- source_word: εὐαρέστους
  english_pob_choice: pleasing
  chosen_korean: 기쁘게 해 드리고
  alternatives_korean:
  - 마음에 들도록 하고
  - 흡족하게 해 드리고
  lexicon: BDAG
  rationale: εὐάρεστος는 「잘 받아들여지는·기쁨이 되는」. 동사적으로 풀어 「기쁘게 해 드리다」가 자연스럽다.
- source_word: μὴ ἀντιλέγοντας
  english_pob_choice: not argumentative
  chosen_korean: 말대꾸하지 않으며
  alternatives_korean:
  - 반박하지 않으며
  - 거슬러 말하지 않으며
  lexicon: BDAG
  rationale: ἀντιλέγω는 「반대하여 말하다」. 주인-노예 관계 문맥에서 한국어 「말대꾸」가 가장 자연스러운 일상 등가어. 1:9의 「반대하는 자들」(거짓 교사 문맥)과는 어감을 구분한다.
