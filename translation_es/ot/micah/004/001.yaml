revisions:
- from: Y acontecerá en los postreros días que el monte de la casa de Yahvé[a] será establecido como cabeza de los montes[b], y será exaltado sobre las colinas[c], y pueblos fluirán hacia él.
  to: Y acontecerá en los postreros días[a] que el monte de la casa de Yahvé será establecido como el principal de los montes[b], y será exaltado sobre las colinas, y pueblos fluirán[c] hacia él.
  rationale: Se corrige el anclaje de la nota [a] para que corresponda a la expresión temporal que comenta. Se mejora «como cabeza de los montes» a «como el principal de los montes» para preservar la idea de prominencia/rango de בְּרֹאשׁ הֶהָרִים en un español más natural. También se normaliza la redacción de las notas. No se requieren cambios doctrinales ni una reformulación mayor del versículo.
