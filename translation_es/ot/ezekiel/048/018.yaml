translation:
  language: es
  text: Y el resto, a lo largo de la longitud, en correspondencia con la contribución santa, será de diez mil al oriente y de diez mil al occidente[a]; estará en correspondencia con la contribución santa, y su producto será para alimento[b] de los trabajadores de la ciudad.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebreo יָמָּה significa literalmente «hacia el mar»; en la orientación territorial de Israel, eso suele señalar el occidente.
    reason: lexical_alternative
  - marker: b
    text: O «para pan»; aquí «pan» probablemente representa provisiones de alimento en general.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהַנּוֹתָר
  english_pob_choice: And the remainder
  chosen_spanish: Y el resto
  alternatives_spanish:
  - Y lo que queda
  - Y el remanente
  lexicon: HALOT
  rationale: נותר/יתר designa lo que queda después de la porción principal. «El resto» es natural en español y mantiene el sentido de sobrante territorial.
- source_word: בָּאֹרֶךְ
  english_pob_choice: along the length
  chosen_spanish: a lo largo de la extensión
  alternatives_spanish:
  - a lo largo del largo
  - en la longitud
  lexicon: HALOT
  rationale: La expresión describe una franja territorial medida en sentido longitudinal. «A lo largo de la extensión» suena natural en español sin perder el valor espacial.
- source_word: לְעֻמַּת
  english_pob_choice: corresponding to
  chosen_spanish: en correspondencia con
  alternatives_spanish:
  - frente a
  - paralelo a
  lexicon: HALOT
  rationale: El término marca alineación o correspondencia de medida, no solo ubicación visual. «En correspondencia con» preserva ese matiz técnico.
- source_word: תְּרוּמַת הַקֹּדֶשׁ
  english_pob_choice: the holy contribution
  chosen_spanish: la ofrenda santa
  alternatives_spanish:
  - la porción santa
  - la contribución santa
  lexicon: HALOT
  rationale: תְּרוּמָה es una porción apartada/consagrada. «Ofrenda santa» conserva el carácter cultual y sigue de cerca la decisión auditada en inglés sin caer en una terminología eclesiástica ajena al contexto.
- source_word: עֲשֶׂרֶת אֲלָפִים ... קָדִימָה
  english_pob_choice: ten thousand to the east
  chosen_spanish: de diez mil al oriente
  alternatives_spanish:
  - de diez mil hacia el este
  - diez mil hacia el este
  lexicon: HALOT
  rationale: La cifra y la dirección oriental se expresan con claridad en español bíblico actual. «Oriente» es preciso y sobrio.
- source_word: וַעֲשֶׂרֶת אֲלָפִים יָמָּה
  english_pob_choice: and ten thousand to the west
  chosen_spanish: y de diez mil al occidente
  alternatives_spanish:
  - y de diez mil hacia el oeste
  - y de diez mil hacia el mar
  lexicon: HALOT
  rationale: יָמָּה literalmente puede sugerir «hacia el mar», pero en este marco de orientación territorial el sentido es occidental. «Occidente» comunica bien la dirección y evita ambigüedad.
- source_word: וְהָיָה לְעֻמַּת תְּרוּמַת הַקֹּדֶשׁ
  english_pob_choice: it shall correspond to the holy contribution
  chosen_spanish: estará en correspondencia con la ofrenda santa
  alternatives_spanish:
  - quedará paralelo a la ofrenda santa
  - estará junto a la ofrenda santa
  lexicon: HALOT
  rationale: Se repite la idea de alineación medida. «Estará en correspondencia» mantiene la estructura y evita reducir el sentido a mera cercanía.
- source_word: וְהָיְתָה תבואת/ה
  english_pob_choice: and its produce shall be
  chosen_spanish: y su producto será
  alternatives_spanish:
  - y su cosecha será
  - y su fruto será
  lexicon: HALOT
  rationale: תבואה se refiere al producto agrícola del terreno. «Producto» es amplio y exacto en este contexto de abastecimiento.
- source_word: לְלֶחֶם
  english_pob_choice: for food
  chosen_spanish: para alimento
  alternatives_spanish:
  - para pan
  - para comida
  lexicon: HALOT
  rationale: Aunque literalmente significa «pan», aquí funciona como sustento alimentario en general. «Para alimento» conserva esa amplitud y evita restringirlo a pan literal.
- source_word: לְעֹבְדֵי הָעִיר
  english_pob_choice: for the workers of the city
  chosen_spanish: de los trabajadores de la ciudad
  alternatives_spanish:
  - para los que trabajan en la ciudad
  - para los servidores de la ciudad
  lexicon: HALOT
  rationale: עֹבְדֵי puede ser participio sustantivado de trabajar/servir. «Trabajadores» es la opción más directa y no introduce un matiz cultual que el contexto no exige.
translation_notes:
  revision_awareness: Se siguió el texto hebreo consonante/vocalizado del WLC y se mantuvo el paralelismo repetido de לְעֻמַּת תְּרוּמַת הַקֹּדֶשׁ. No se reportan revisiones aplicadas en el audit trail inglés; la versión española conserva la misma decisión direccional para יָמָּה con nota explicativa.
  spanish_consistency_notes:
  - Se mantuvo «ofrenda santa» para תְּרוּמַת הַקֹּדֶשׁ en ambas apariciones para reflejar el paralelismo hebreo.
  - Se usó «occidente» para יָמָּה como equivalente idiomático del valor direccional en español.
  - «Trabajadores de la ciudad» evita un sesgo litúrgico y conserva el participio sustantivado del hebreo.
