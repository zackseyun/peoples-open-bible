translation:
  language: es
  text: Bienaventurados los que temen a Yahvé en su inocencia[a][b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «en su guilelessness» o «en su blamelessness».
    reason: alternative_reading
  - marker: b
    text: «Temen» aquí expresa temor reverente hacia Yahvé, no simple miedo.
    reason: lexical_alternative
lexical_decisions:
- source_word: μακάριοι
  english_pob_choice: Blessed
  chosen_spanish: Bienaventurados
  alternatives_spanish:
  - Felices
  - Dichosos
  lexicon: BDAG
  rationale: «Bienaventurados» conserva mejor el tono sapiencial y de bienaventuranza del griego que «felices», y evita reducir la expresión a un estado emocional.
- source_word: φοβούμενοι
  english_pob_choice: fear
  chosen_spanish: temen
  alternatives_spanish:
  - reverencian
  - sienten reverencia por
  lexicon: BDAG
  rationale: Se mantiene el verbo de temor para no suavizar la tensión bíblica del texto; el contexto indica temor reverente, no simple pánico.
- source_word: τὸν κύριον
  english_pob_choice: Lord
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el Señor
  - el Soberano
  lexicon: BDAG
  rationale: Aunque el griego usa κύριον, en este proyecto el contexto divino y la convención del POB español favorecen «Yahvé» para reflejar el nombre divino sin ocultarlo bajo un título genérico.
- source_word: ἐν ἀκακίᾳ αὐτῶν
  english_pob_choice: in their innocence
  chosen_spanish: en su inocencia
  alternatives_spanish:
  - en su guilelessness
  - en su blamelessness
  - en su sencillez
  lexicon: BDAG
  rationale: «Inocencia» es la opción más natural y clara en español; además puede abarcar la falta de malicia o engaño que el término griego expresa.
theological_decisions:
- issue: Cómo rendir κύριον en un contexto de referencia divina
  english_pob_reading: Lord
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el Señor
  - el Señor Dios
  rationale: Aunque el texto griego usa κύριον, el audit trail lo entiende como título divino. La política del proyecto pide «Yahvé» en el texto principal cuando el referente es el nombre divino, para no enmascararlo.
  doctrine_reference: Convención editorial POB sobre el Tetragrámaton / nombre divino
- issue: Alcance de φοβούμενοι
  english_pob_reading: fear here carries the sense of reverent fear toward the Lord, not mere dread
  chosen_spanish_reading: temen... en el sentido de temor reverente
  alternative_spanish_readings:
  - reverencian
  - veneran con temor
  rationale: Se conserva «temen» para respetar la forma verbal del griego y, a la vez, se entiende en clave reverente por el contexto de sabiduría y piedad.
  doctrine_reference: Temor de Yahvé en la tradición sapiencial bíblica
translation_notes:
  revision_awareness: El pasaje está marcado como unchanged en la última revisión; no se introducen cambios textuales respecto del audit trail inglés, solo una adaptación española fiel al griego y a las convenciones editoriales del POB.
  spanish_consistency_notes:
  - Se mantiene una sola línea semántica para μακάριοι = «Bienaventurados», en armonía con el registro sapiencial.
  - Se evita «el Señor» como máscara automática, siguiendo la política POB para el nombre divino cuando el contexto lo requiere.
  - «Inocencia» conserva la ambigüedad útil del término griego entre ausencia de malicia y pureza de intención.
  - La nota de temor reverente se formula en español sin borrar el verbo «temen», para preservar la tensión lexical documentada.
