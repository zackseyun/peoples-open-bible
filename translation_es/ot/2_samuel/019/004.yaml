base_translation:
  language: en
  yaml_path: translation/ot/2_samuel/019/004.yaml
  text: So the people stole into the city that day[b][a], as people who are ashamed steal away when they flee in battle.
  footnotes:
  - marker: a
    text: Or 'stole into the city' / 'came stealthily into the city'; the Hebrew verb emphasizes furtive movement, not literal theft.
    reason: lexical_alternative
  - marker: b
    text: The comparison is to soldiers returning in shame after fleeing from battle.
    reason: cultural_note
