review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador capta bien la estructura del versículo y varias decisiones auditadas: «el pueblo», la fórmula de maldición y la cláusula temporal de venganza. Sin embargo, falla en dos puntos importantes frente a la evidencia fuente y la pista inglesa: (1) לֶחֶם fue entendido idiomáticamente como «food/alimento» en ambas ocurrencias, pero el español principal lo dejó como «pan»; la nota no compensa del todo porque el texto principal pierde el sentido contextual. (2) לֹא טָעַם כָּל הָעָם está mal expresado como «todo el pueblo no probó pan», construcción poco natural y menos precisa que «ninguno del pueblo probó alimento» o «nadie del pueblo probó alimento». Además, «estaban presionados» para נִגַּשׂ suena calco y menos idiomático que «estaban acosados» o «se hallaban en gran aprieto».'
  spanish_quality_summary: 'El español es generalmente comprensible, pero contiene calcos y giros poco naturales para registro bíblico claro: «estaban presionados» y sobre todo «todo el pueblo no probó pan». «Puso al pueblo bajo juramento» funciona, aunque «puso al pueblo bajo juramento» o «hizo jurar al pueblo» son ambas naturales; la primera puede mantenerse por cercanía con la auditoría. Conviene también ajustar la nota para conservar la alternativa léxica ya documentada sin introducir ambigüedad.'
  glossary_alignment: No hay conflictos con términos teológicos mayores del glosario del proyecto. El problema principal es léxico-contextual con לֶחֶם, donde la auditoría inglesa estableció «food» por sentido idiomático. La revisión debe reflejar «alimento» en ambas ocurrencias del texto principal y mantener la nota sobre el hebreo literal «pan».
  issues:
  - severity: medium
    issue: «pan» en el texto principal para ambas ocurrencias de לֶחֶם
    rationale: La auditoría inglesa documenta que aquí לֶחֶם significa comida/alimento en general, no pan específicamente. Mantener «pan» en español estrecha indebidamente el sentido contextual.
  - severity: medium
    issue: «todo el pueblo no probó pan» es español poco natural
    rationale: La negación colectiva del hebreo se expresa mejor en español como «ninguno del pueblo probó alimento» o «nadie del pueblo probó alimento». La redacción actual suena forzada y puede interpretarse torpemente.
  - severity: low
    issue: «estaban presionados» suena calcado
    rationale: Aunque apunta a la idea correcta de apuro, no es la opción más idiomática en español bíblico contemporáneo. «estaban acosados» o «se hallaban en gran aprieto» transmiten mejor la presión narrativa.
  revised_spanish_text: 'Ahora los hombres de Israel estaban en gran aprieto aquel día,[a] y Saúl puso al pueblo bajo juramento, diciendo: «Maldito el hombre que coma alimento antes del atardecer, antes de que me haya vengado de mis enemigos». Así que ninguno del pueblo probó alimento.'
  revised_footnotes:
