translation:
  language: es
  text: Y comerás y te saciarás[a], y bendecirás a Yahvé tu Dios por la buena tierra que él te ha dado.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O ‘darás gracias’ o ‘alabarás’ a Yahvé tu Dios; el hebreo dice ‘bendecir’, conservando el modismo bíblico de hablar bien de Dios con gratitud.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְאָכַלְתָּ
  english_pob_choice: you shall eat
  chosen_spanish: comerás
  alternatives_spanish:
  - comerás, pues
  - has de comer
  lexicon: HALOT
  rationale: El hebreo perfecto consecutivo en este contexto exhortativo se entiende naturalmente como secuencia futura/instructiva. En español, el futuro simple comunica bien esa obligación o expectativa sin volverse rígido.
- source_word: וְשָׂבָעְתָּ
  english_pob_choice: be satisfied
  chosen_spanish: te saciarás
  alternatives_spanish:
  - quedarás satisfecho
  - te llenarás
  lexicon: HALOT
  rationale: El verbo expresa saciedad plena. 'Te saciarás' conserva la imagen de quedar lleno y evita reducirlo solo a una idea abstracta de satisfacción.
- source_word: וּבֵרַכְתָּ
  english_pob_choice: you shall bless
  chosen_spanish: bendecirás
  alternatives_spanish:
  - alabarás
  - darás gracias
  lexicon: HALOT
  rationale: Se mantiene el verbo 'bendecir' para preservar el modismo bíblico de decir bien de Dios en gratitud. Aunque incluye alabanza y agradecimiento, no se estrecha el sentido a una sola de esas ideas.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: 'Se conserva el nombre divino propio según la convención del proyecto: transliteración de YHWH como ''Yahvé'', no una sustitución titular.'
- source_word: אֱלֹהֶיךָ
  english_pob_choice: your God
  chosen_spanish: tu Dios
  alternatives_spanish:
  - tu Dios y Señor
  lexicon: HALOT
  rationale: La forma posesiva es directa y covenantal; 'tu Dios' es la equivalencia natural y suficiente en español.
- source_word: עַל
  english_pob_choice: for
  chosen_spanish: por
  alternatives_spanish:
  - a causa de
  - sobre
  lexicon: HALOT
  rationale: Con ברך y el objeto divino, על indica motivo u ocasión. En español, 'por la buena tierra' expresa con claridad la razón de la bendición.
- source_word: הָאָרֶץ הַטֹּבָה
  english_pob_choice: the good land
  chosen_spanish: la buena tierra
  alternatives_spanish:
  - la tierra fértil
  - la tierra excelente
  lexicon: HALOT
  rationale: La traducción literal conserva el motivo del pacto y el valor genérico de 'buena' sin sobreinterpretar el tipo de bondad.
- source_word: אֲשֶׁר נָתַן לָךְ
  english_pob_choice: that he has given you
  chosen_spanish: que él te ha dado
  alternatives_spanish:
  - que te dio
  - que te está dando
  lexicon: HALOT
  rationale: El relativo introduce un don ya concedido desde la perspectiva del texto. El perfecto compuesto español expresa bien la acción divina completa y su vigencia presente.
theological_decisions:
- issue: Cómo reflejar el Tetragrámaton יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: La lectura del texto hebreo es el nombre propio de Dios, no un título. 'Yahvé' mantiene la transparencia del nombre divino y sigue la convención establecida del proyecto.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Cómo traducir ברך cuando Dios es el objeto
  english_pob_reading: bless
  chosen_spanish_reading: bendecir
  alternative_spanish_readings:
  - alabar
  - dar gracias
  rationale: Se conserva el lenguaje bíblico de 'bendecir' para no perder la tensión semántica entre bendecir, alabar y agradecer. Esa amplitud es parte del idiomático hebreo y del testimonio del texto.
  doctrine_reference: DOCTRINE.md Translation philosophy §§1, 5
translation_notes:
  revision_awareness: No se registran revisiones aplicadas en el paquete de origen; la concordancia crítica es alta y el texto se mantiene estable respecto del audit trail inglés.
  spanish_consistency_notes:
  - Se usa 'Yahvé' de manera consistente para יְהוָה.
  - Se conserva 'bendecir' para ברך cuando el objeto es Dios, siguiendo el modismo bíblico documentado.
  - El futuro simple ('comerás', 'te saciarás', 'bendecirás') mantiene el tono exhortativo del hebreo sin forzar un giro más interpretativo.
  - '''La buena tierra'' preserva la formulación covenantal del texto.'
