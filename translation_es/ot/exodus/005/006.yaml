revisions:
- from: 'Así que el Faraón mandó aquel día a los capataces del pueblo y a sus oficiales[a], diciendo[b][c]:'
  to: 'Entonces Faraón mandó aquel día[a] a los capataces del pueblo[b] y a sus oficiales[c], diciendo:'
  rationale: Se reemplaza «Así que» por «Entonces» para una transición narrativa más neutral y fiel; se corrigen los anclajes de notas para que cada una aparezca junto a la palabra correspondiente; y se traduce al español la alternativa de la nota sobre שֹׁטְרָיו, eliminando el anglicismo «foremen».
