review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura del hebreo: ubicación en Gabaón, aparición divina, conservación del cambio léxico Yahvé → Dios, y la invitación a pedir. También preserva adecuadamente la nota sobre «en el sueño de la noche». Sin embargo, la cláusula final «Pide lo que yo te daré» no representa fielmente מָה אֶתֶּן לָךְ, que es una pregunta indirecta («qué he de darte / qué debo darte»), no una afirmación futura («lo que yo te daré»).'
  spanish_quality_summary: El español es claro y generalmente natural. «En Gabaón Yahvé se apareció a Salomón» funciona bien. «En un sueño de noche[a]» es comprensible, aunque algo menos idiomático que «en un sueño durante la noche»; puede mantenerse por cercanía al hebreo gracias a la nota. El principal problema de calidad y fidelidad está en la última frase, donde el futuro «te daré» suena como promesa cerrada en vez de invitación abierta.
  glossary_alignment: 'Buena alineación con la terminología del proyecto: יהוה → «Yahvé» y אֱלֹהִים → «Dios», preservando la alternancia del hebreo. No hay conflictos con otras entradas del glosario. La corrección necesaria afecta la sintaxis y el sentido de מָה אֶתֶּן לָךְ, no la terminología doctrinal.'
  issues:
  - severity: high
    issue: La frase «Pide lo que yo te daré» cambia el sentido de מָה אֶתֶּן לָךְ.
    rationale: 'El hebreo expresa una pregunta indirecta dependiente de «Pide»: «pide qué debo/he de darte». El borrador la convierte en una declaración futura («lo que yo te daré»), que suena más determinativa y menos abierta que el original.'
  - severity: low
    issue: «En un sueño de noche» es algo rígido en español actual.
    rationale: La formulación es inteligible y está respaldada por la nota, pero no es la opción más natural. Aun así, no exige adjudicación compleja; puede conservarse o suavizarse mínimamente.
  revised_spanish_text: 'En Gabaón Yahvé se apareció a Salomón en un sueño de noche[a], y Dios dijo: «Pide qué debo darte».'
  revised_footnotes:
