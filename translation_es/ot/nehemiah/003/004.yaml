base_translation:
  language: en
  yaml_path: translation/ot/nehemiah/003/004.yaml
  text: And next to them Meremoth son of Uriah[a], son of Hakkoz, made repairs; and next to them Meshullam son of Berechiah, son of Meshezabel, made repairs[c][b]; and next to them Zadok son of Baana made repairs.
  footnotes:
  - marker: a
    text: Or 'repaired' or more literally 'strengthened.' The Hebrew verb in this chapter is a stock term for carrying out repair work on a section of the wall.
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'and next to their hand,' an idiom meaning 'next to them' or 'beside them.'
    reason: lexical_alternative
  - marker: c
    text: Baana may also be spelled 'Baanah' in English transliteration.
    reason: alternative_reading
