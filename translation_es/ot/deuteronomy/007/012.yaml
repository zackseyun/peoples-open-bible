base_translation:
  language: en
  yaml_path: translation/ot/deuteronomy/007/012.yaml
  text: And because you listen to these judgments[a], and keep and do them[c][b], Yahweh your God will keep for you the covenant and the steadfast love that he swore to your fathers.
  footnotes:
  - marker: a
    text: Or 'these ordinances' or 'these rules' for 'these judgments.'
    reason: lexical_alternative
  - marker: b
    text: '''Steadfast love'' translates Hebrew hesed, a term often used for loyal, covenantal love; alternatively, ''covenant faithfulness'' or ''lovingkindness.'''
    reason: lexical_alternative
  - marker: c
    text: Or 'to your ancestors'; Hebrew specifically says 'to your fathers.'
    reason: lexical_alternative
