  text: וְ/רַחֲמִ֗ין לְ/מִבְעֵא֙ מִן קֳדָם֙ אֱלָ֣הּ שְׁמַיָּ֔/א עַל רָזָ֖/ה דְּנָ֑ה דִּ֣י לָ֤א יְהֹֽבְדוּן֙ דָּנִיֵּ֣אל וְ/חַבְר֔וֹ/הִי עִם שְׁאָ֖ר חַכִּימֵ֥י בָבֶֽל־־־׃
