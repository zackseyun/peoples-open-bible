translation:
  language: es
  text: Busquen a Yahvé y vivan, no sea que estalle[a] como fuego en la casa de José, y la consuma, sin que haya quien lo apague para Betel[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «no sea que él estalle como fuego»; el sujeto del verbo hebreo está implícito, aunque el antecedente más probable es Yahvé por la cláusula anterior.
    reason: alternative_reading
  - marker: b
    text: Betel era un santuario principal en el reino del norte; el hebreo también puede entenderse muy literalmente como «y no hay quien apague para Betel».
    reason: cultural_note
lexical_decisions:
- source_word: דִּרְשׁוּ
  english_pob_choice: Seek
  chosen_spanish: Busquen
  alternatives_spanish:
  - Busquen a
  - Busquen de parte de
  lexicon: HALOT
  rationale: En contexto profético y de pacto, דרשׁ significa buscar a Dios con intención obediente, no solo preguntar por él. En español, «buscar» comunica bien esa relación activa; se mantiene el complemento con «a Yahvé» para preservar el objeto personal del verbo.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  - el SEÑOR
  lexicon: HALOT
  rationale: 'Se sigue la convención del proyecto para el Tetragrámaton: transliterar el nombre divino como «Yahvé», en vez de sustituirlo por un título.'
- source_word: וִחְיוּ
  english_pob_choice: and live
  chosen_spanish: y vivan
  alternatives_spanish:
  - y vivan así
  - para que vivan
  lexicon: HALOT
  rationale: La secuencia imperativa/consecuente se conserva de manera natural en español con un mandato plural y su resultado esperado. «Vivan» mantiene la tersura del hebreo.
- source_word: פֶּן
  english_pob_choice: lest
  chosen_spanish: no sea que
  alternatives_spanish:
  - para que no
  - o de lo contrario
  lexicon: HALOT
  rationale: En español actual, «no sea que» expresa de forma clara la advertencia de consecuencia indeseada que lleva פֶּן.
- source_word: יִצְלַח
  english_pob_choice: he break out
  chosen_spanish: él estalle
  alternatives_spanish:
  - él brote
  - él se lance
  lexicon: HALOT
  rationale: Con la imagen de fuego, el verbo apunta a irrumpir o romper súbitamente. «Estalle» comunica ese desbordamiento violento sin desplazar la metáfora.
- source_word: כָּאֵשׁ
  english_pob_choice: like fire
  chosen_spanish: como fuego
  alternatives_spanish:
  - como un fuego
  - cual fuego
  lexicon: HALOT
  rationale: «Como fuego» es la equivalencia más natural y conserva el símil directo del hebreo.
- source_word: בֵּית יוֹסֵף
  english_pob_choice: the house of Joseph
  chosen_spanish: la casa de José
  alternatives_spanish:
  - la casa de José
  - la casa de José/Efraín
  lexicon: HALOT
  rationale: Se respeta la designación profética del reino del norte con la forma literal «casa de José», evitando explicitar «Efraín» donde el texto no lo dice.
- source_word: וְאָכְלָה
  english_pob_choice: and it consume
  chosen_spanish: y la consuma
  alternatives_spanish:
  - y la devore
  - y la destruya
  lexicon: HALOT
  rationale: El verbo femenino concuerda con «fuego» y en español se expresa de forma natural con objeto directo implícito retomado por el contexto. «Consumir» preserva la fuerza del fuego sin sobreinterpretar.
- source_word: וְאֵין מְכַבֶּה
  english_pob_choice: with no one to quench it
  chosen_spanish: sin que haya quien lo apague
  alternatives_spanish:
  - y no hay quien lo apague
  - sin nadie que lo extinga
  lexicon: HALOT
  rationale: «Apagar» es el equivalente español más idiomático para un fuego; «sin que haya quien» conserva la negación existencial del hebreo y su tono de imposibilidad.
- source_word: לְבֵית אֵל
  english_pob_choice: for Bethel
  chosen_spanish: para Betel
  alternatives_spanish:
  - en Betel
  - para la casa de Dios
  lexicon: HALOT
  rationale: Se conserva el nombre propio «Betel» como centro cultual del norte. La preposición es difícil; «para Betel» sigue la lectura auditada del POB en inglés y mantiene la ambigüedad funcional del hebreo sin convertir el topónimo en un sustantivo común.
theological_decisions:
- issue: Sujeto implícito en «יִצְלַח»
  english_pob_reading: The implied subject is the LORD.
  chosen_spanish_reading: Se deja implícito en la sintaxis española y la cláusula sigue entendiendo que la acción procede de Yahvé.
  alternative_spanish_readings:
  - no sea que ello estalle como fuego
  - no sea que él estalle como fuego
  rationale: El hebreo permite un sujeto implícito; la lectura auditada en inglés entiende que se refiere a Yahvé por el contexto inmediato. En español, el pronombre «él» puede ayudar, pero no es indispensable; mantener la referencia implícita evita forzar una explicitación innecesaria y conserva la tensión del texto profético.
  doctrine_reference: Contexto profético de juicio divino; cf. Amós 5:6 y el antecedente inmediato.
- issue: Sentido de «Betel»
  english_pob_reading: Bethel is the place name, the cult center in the northern kingdom.
  chosen_spanish_reading: «Betel» se conserva como topónimo, el santuario principal del reino del norte.
  alternative_spanish_readings:
  - casa de Dios
  - Betel como 'casa de Dios' sin nota
  rationale: En Amós, Betel es un lugar histórico-religioso bajo juicio. Traducirlo como «casa de Dios» borraría el referente geográfico y cultual que el texto presupone.
  doctrine_reference: Historia profética de Israel; el santuario de Betel en el reino del norte.
translation_notes:
  revision_awareness: Se incorporó la revisión del POB inglés que cambió la relación espacial a «in the house of Joseph»; por eso el español dice «en la casa de José» y no una relación más adversativa. También se conservó la decisión auditada de mantener «for Bethel» como «para Betel», preservando la ambigüedad preposicional del hebreo. No se introdujeron lecturas ajenas al expediente; la formulación española sigue la imagen del fuego que irrumpe y consume, con la posibilidad textual de sujeto implícito indicada en nota.
  spanish_consistency_notes:
  - Se usa «Yahvé» de manera consistente para el Tetragrámaton.
  - Se mantiene «Betel» como topónimo, no como «casa de Dios».
  - «Casa de José» preserva la designación del reino del norte sin armonizarla con otros nombres proféticos.
  - «Apague» se eligió por naturalidad en español para el verbo de extinguir fuego.
  - La puntuación conserva el ritmo de advertencia del hebreo con una sola oración principal y la cláusula de temor introducida por «no sea que».
