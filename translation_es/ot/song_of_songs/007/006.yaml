translation:
  language: es
  text: Tu cabeza sobre ti es como el Carmelo[a], y la cabellera[b] de tu cabeza como púrpura[c]; un rey está cautivado en los mechones.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Carmelo probablemente alude al monte Carmelo, evocando altura majestuosa y belleza.
    reason: cultural_note
  - marker: b
    text: 'O: «los mechones de tu cabeza». El término hebreo es raro y puede referirse al cabello que cuelga o fluye.'
    reason: lexical_alternative
  - marker: c
    text: 'O: «un rey es atado en los corredores» o «en las galerías». El término hebreo final es difícil y ha sido entendido de más de una manera; el texto principal sigue la imagen del cabello en el contexto inmediato.'
    reason: alternative_reading
lexical_decisions:
- source_word: רֹאשֵׁךְ
  english_pob_choice: your head
  chosen_spanish: tu cabeza
  alternatives_spanish:
  - tu cabeza
  - tu coronilla
  lexicon: HALOT
  rationale: El hebreo apunta al sentido básico de 'cabeza'. 'Tu cabeza' conserva la comparación poética sin introducir una paráfrasis como 'coronilla', que sería más interpretativa.
- source_word: עָלַיִךְ
  english_pob_choice: upon you
  chosen_spanish: sobre ti
  alternatives_spanish:
  - sobre ti
  - encima de ti
  lexicon: HALOT
  rationale: La preposición sobre con sufijo femenino singular comunica la relación espacial de modo natural en español y mantiene la imagen poética.
- source_word: כַּכַּרְמֶל
  english_pob_choice: like Carmel
  chosen_spanish: como el Carmelo
  alternatives_spanish:
  - como el Carmelo
  - como el monte Carmelo
  lexicon: HALOT
  rationale: Se conserva el nombre propio y su fuerza visual. 'El Carmelo' funciona bien en español; la identificación con el monte puede aclararse en nota sin cargar el texto principal.
- source_word: דַּלַּת רֹאשֵׁךְ
  english_pob_choice: the flowing hair of your head
  chosen_spanish: la cabellera de tu cabeza
  alternatives_spanish:
  - los mechones de tu cabeza
  - el cabello que cuelga de tu cabeza
  lexicon: HALOT
  rationale: La expresión hebrea es rara y alude al cabello que cae o cuelga. 'Cabellera' comunica el conjunto del cabello de manera natural y poética en español, sin decidir demasiado una forma física específica.
- source_word: כָּאַרְגָּמָן
  english_pob_choice: like purple
  chosen_spanish: como púrpura
  alternatives_spanish:
  - como púrpura
  - como tela púrpura
  - como color púrpura
  lexicon: HALOT
  rationale: אַרְגָּמָן designa el color/tejido púrpura de alto valor. 'Como púrpura' preserva la concisión del hebreo y la asociación de belleza y riqueza.
- source_word: מֶלֶךְ
  english_pob_choice: a king
  chosen_spanish: un rey
  alternatives_spanish:
  - un rey
  - el rey
  lexicon: HALOT
  rationale: El sustantivo no lleva artículo; por eso 'un rey' reproduce mejor el valor indefinido del hebreo.
- source_word: אָסוּר
  english_pob_choice: is held captive
  chosen_spanish: es cautivado
  alternatives_spanish:
  - es cautivado
  - está cautivado
  - está atado
  lexicon: HALOT
  rationale: En este contexto amoroso, el verbo transmite la idea de estar prendido o cautivado. 'Es cautivado' conserva la fuerza metafórica sin desplazarla hacia una prisión literal.
- source_word: בָּרְהָטִים
  english_pob_choice: in the tresses
  chosen_spanish: en los mechones
  alternatives_spanish:
  - en los mechones
  - en las trenzas
  - en los canales
  lexicon: HALOT
  rationale: El término es raro y la POB inglesa adopta una lectura de cabello. 'Mechones' mantiene la imagen capilar en español y deja abierta la alternativa tradicional, que se documenta en nota.
translation_notes:
  revision_awareness: Se siguió la lectura de la POB inglesa con acuerdo alto y sin revisiones aplicadas en el último pase. La decisión principal en español fue mantener la imagen capilar del verso y preservar la ambigüedad del término final mediante nota, en paralelo al audit trail inglés.
  spanish_consistency_notes:
  - Se conservó 'Carmelo' como nombre propio, sin añadir 'monte' al texto principal.
  - Se usó 'cautivado' para reflejar el valor metafórico de אָסוּר en este contexto amoroso.
  - Se evitó 'SEÑOR' o cualquier equivalencia litúrgica, porque este verso no contiene el Tetragrámaton.
  - Se mantuvo un registro poético y readable, sin forzar arcaísmos innecesarios.
