lexical_decisions:
- source_word: ἔγραψεν
  english_pob_choice: wrote
  chosen_spanish: escribió
  alternatives_spanish:
  - redactó
  - compuso
  lexicon: LSJ
  rationale: El aoristo de γράφω se vierte de manera natural como ‘escribió’. Mantiene el valor narrativo simple del griego sin añadir matices de composición que no están exigidos por el contexto.
- source_word: ἐπιστολὰς
  english_pob_choice: letters
  chosen_spanish: cartas
  alternatives_spanish:
  - una carta
  - epístolas
  lexicon: LSJ
  rationale: El plural acusativo pide plural en español. ‘Cartas’ es la forma más directa y natural en este contexto narrativo; ‘epístolas’ suena más literario o técnico de lo que sugiere el griego.
- source_word: ἀπέστειλεν
  english_pob_choice: sent
  chosen_spanish: envió
  alternatives_spanish:
  - mandó
  - despachó
  lexicon: LSJ
  rationale: ἀποστέλλω en aoristo se traduce con claridad por ‘envió’. Es idiomático en español y no añade un tono administrativo que el original no expresa explícitamente.
- source_word: αὐτῷ
  english_pob_choice: to him
  chosen_spanish: a él
  alternatives_spanish:
  - para él
  - a Jonathan
  lexicon: LSJ
  rationale: El dativo pronominal se conserva como pronombre en español, sin suplir el nombre propio en el cuerpo principal. ‘A él’ reproduce la referencia abierta del griego y mantiene el antecedente implícito.
translation_notes:
  revision_awareness: El pasaje presenta una correspondencia directa con el griego de Swete 1909. La única decisión destacable del audit trail inglés es preservar el plural de ἐπιστολὰς; se mantuvo en español con ‘cartas’ y se señaló en nota. No se observan revisiones posteriores que alteren el sentido básico.
  spanish_consistency_notes:
  - Se mantuvo un estilo sobrio y narrativo, acorde con un registro bíblico moderno y digno.
  - Se preservó el plural explícito de ‘cartas’ para reflejar el dato gramatical del griego.
  - No se introdujo el nombre antecedente en la cláusula principal, siguiendo la economía del texto fuente.
