base_translation:
  language: en
  yaml_path: translation/ot/malachi/001/010.yaml
  text: Oh[a], that there were even one among you who would shut the doors, so that you would not kindle my altar in vain! I have no pleasure in you, says Yahweh of hosts[c][b], and I will not accept an offering from your hand.
  footnotes:
  - marker: a
    text: 'Or, ''Who is there even among you who would shut the doors?'' The Hebrew can be read as a rhetorical question, but here it likely expresses a wish: that someone would close the temple doors rather than continue empty worship.'
    reason: alternative_reading
  - marker: b
    text: '''Kindle my altar for nothing'' may also be rendered ''light my altar in vain.'''
    reason: lexical_alternative
  - marker: c
    text: '''Offering'' translates Hebrew minḥah, which can more specifically mean ''grain offering'' in sacrificial contexts.'
    reason: lexical_alternative
