translation:
  language: es
  text: Las aves se alojan con las de su propia especie[a], y la verdad regresa a los que la practican[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «se asientan con las de su propia especie».'
    reason: lexical_alternative
  - marker: b
    text: 'O: «y la verdad vuelve a los que la hacen». El griego personifica la verdad y la presenta como algo que regresa a quienes la ponen en práctica.'
    reason: lexical_alternative
lexical_decisions:
- source_word: πετεινὰ
  english_pob_choice: Birds
  chosen_spanish: Las aves
  alternatives_spanish:
  - Los pájaros
  - Las aves del cielo
  lexicon: LSJ
  rationale: El griego neutro plural designa aves en general. «Aves» es natural en español bíblico contemporáneo y mantiene el valor proverbial sin añadir una especificación innecesaria.
- source_word: πρὸς τὰ ὅμοια αὐτοῖς
  english_pob_choice: with their own kind
  chosen_spanish: con los de su propia especie
  alternatives_spanish:
  - con los semejantes a ellas
  - con su propia clase
  lexicon: LSJ
  rationale: La expresión apunta a semejanza o afinidad. «De su propia especie» comunica bien el sentido proverbial en español y conserva la idea de agrupación entre semejantes.
- source_word: καταλύσει
  english_pob_choice: settle
  chosen_spanish: se posan
  alternatives_spanish:
  - se alojan
  - se asientan
  - se establecen
  lexicon: LSJ
  rationale: El verbo puede significar alojarse o tomar reposo. En un dicho sobre aves, «se posan» resulta idiomático en español y conserva la imagen de descansar entre semejantes.
- source_word: ἀλήθεια
  english_pob_choice: truth
  chosen_spanish: la verdad
  alternatives_spanish:
  - la veracidad
  - la fidelidad
  lexicon: LSJ
  rationale: El sustantivo significa directamente «verdad». En este contexto sapiencial puede implicar verdad vivida, pero «la verdad» preserva mejor el alcance amplio del griego.
- source_word: πρὸς τοὺς ἐργαζομένους αὐτὴν
  english_pob_choice: to those who practice it
  chosen_spanish: a los que la practican
  alternatives_spanish:
  - a los que la hacen
  - a los que la ponen por obra
  - a los que la ejercen
  lexicon: LSJ
  rationale: ἐργάζομαι con objeto directo puede significar hacer, practicar o llevar a cabo. Como el objeto es «la verdad», «la practican» comunica con claridad una verdad vivida y puesta en acción.
- source_word: ἐπανήξει
  english_pob_choice: returns
  chosen_spanish: regresa
  alternatives_spanish:
  - volverá
  - volverá de nuevo
  - vendrá otra vez
  lexicon: LSJ
  rationale: 'El futuro expresa la idea de volver o regresar. «Regresa» conserva la reciprocidad proverbial: la verdad vuelve hacia quienes la practican.'
theological_decisions:
- issue: Personificación de la verdad y reciprocidad moral
  english_pob_reading: Truth is rendered as something that 'returns' to those who practice it, preserving the proverb's personified moral logic.
  chosen_spanish_reading: La verdad aparece personificada como algo que «regresa» a quienes la practican.
  alternative_spanish_readings:
  - La verdad viene a los que la practican
  - La verdad se acerca a los que la ponen en práctica
  rationale: El verbo ἐπανήξει sugiere retorno, no mera asociación. Mantener la personificación conserva la lógica sapiencial del dicho y evita diluirla en una formulación abstracta.
  doctrine_reference: Sabiduría proverbial / personificación literaria
translation_notes:
  revision_awareness: 'El contexto inglés revisado quedó sin cambios sustantivos: la traducción auditada ya estabilizaba el proverbio con «Birds settle with their own kind» y «truth returns to those who practice it», sin necesidad de nuevas correcciones.'
  spanish_consistency_notes:
  - Se prefirió «aves» sobre «pájaros» para un tono más neutro y bíblico, manteniendo naturalidad en español.
  - Se conservó el paralelismo proverbial mediante una sintaxis breve y equilibrada.
  - «La verdad» se mantuvo sin expansión a «veracidad» o «fidelidad» para no estrechar el alcance del sustantivo griego.
  - El orden de las dos hemistiquios respeta el paralelismo del griego y del inglés auditado.
