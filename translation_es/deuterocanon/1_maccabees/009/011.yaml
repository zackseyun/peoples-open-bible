review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien la secuencia militar del griego: la fuerza sale del campamento, toma posición para el encuentro, la caballería se divide, honderos y arqueros van delante, y los δυνατοί quedan asociados con la línea del frente. Sin embargo, «se puso frente a ellos para enfrentarlos» sobretraduce ἔστησαν εἰς συνάντησιν αὐτοῖς al añadir un matiz más agresivo que el de «ponerse en posición/salir al encuentro».'
  spanish_quality_summary: 'El español es claro y natural, pero conviene dos ajustes de precisión y estilo: concordancia plural en «se pusieron», y una formulación más fiel y militarmente idiomática para ἔστησαν εἰς συνάντησιν αὐτοῖς. El resto del verso se lee bien en español eclesial moderno.'
  glossary_alignment: 'No hay términos teológicos del glosario principal en este versículo. Las decisiones militares son mayormente adecuadas: «campamento», «caballería», «honderos», «arqueros». «Ejército» para ἡ δύναμις es aceptable en contexto, aunque «fuerza» también sería posible. La nota debe alinearse mejor con la traducción revisada.'
  issues:
  - severity: high
    issue: 'Error de concordancia verbal: «el ejército salió ... y se puso»'
    rationale: 'El sujeto efectivo tras la primera cláusula se retoma en plural por el griego ἔστησαν («tomaron posición / se plantaron»). En español, con «el ejército» como colectivo, «se puso» no es imposible si se mantiene singular, pero aquí rompe la correspondencia con el verbo griego plural y suena menos natural en la coordinación táctica. Mejor reformular con sujeto plural explícito: «las tropas salieron ... y tomaron posición».'
  - severity: medium
    issue: «para enfrentarlos» sobreinterpreta εἰς συνάντησιν αὐτοῖς
    rationale: La expresión griega apunta a ponerse en posición para salir al encuentro o hacer frente, no necesariamente a intensificar el sentido como «enfrentarlos». «Para hacerles frente» o «para salir a su encuentro» preserva mejor la formulación del original y la decisión inglesa auditada.
  - severity: low
    issue: La nota al pie actual queda menos ajustada a una mejor formulación española
    rationale: Si se revisa la frase principal, la nota debe reflejar la alternativa léxica exacta y explicar el valor de encuentro/formación de combate sin depender de «enfrentarlos».
