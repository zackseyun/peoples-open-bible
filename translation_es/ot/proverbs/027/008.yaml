revisions:
- from: Como un ave que vaga lejos de su nido[a], así es el hombre que vaga lejos de su lugar.
  to: Como un ave que vaga fuera de su nido[a], así es un hombre que vaga fuera de su lugar.
  rationale: Se reemplaza 'lejos de' por 'fuera de' para evitar añadir distancia no expresada en el hebreo, mientras se conserva una construcción natural en español para la idea de apartarse del nido y del lugar propio. Se cambia 'el hombre' a 'un hombre' para reflejar mejor el singular representativo de אִישׁ. Se mantiene 'su lugar' por fidelidad a מָקוֹם y se ajusta la nota al pie para que exprese con claridad la alternativa más estrecha 'hogar' sin perder la amplitud del original.
