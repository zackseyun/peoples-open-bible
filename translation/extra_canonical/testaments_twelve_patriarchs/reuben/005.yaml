theological_decisions:
- issue: Harsh generalizing statements about women in a paraenetic testament
  chosen_reading: Translate the Greek directly as Reuben's warning speech without softening or editorial correction.
  alternative_readings:
  - Mitigate the statements as referring only to immoral women
  - Paraphrase to reduce the generalization
  rationale: The project requires honesty to the Greek witness and preservation of the testament's rhetorical voice. The text's moral and gendered rhetoric should be translated transparently rather than silently revised.
  doctrine_reference: 'PHILOSOPHY.md: original-language primacy; transparency around difficult material'
- issue: πνεῦμα τῆς πορνείας
  chosen_reading: Render as 'the spirit of sexual immorality'
  alternative_readings:
  - '''a spirit of fornication'''
  - '''the impulse of lust'''
  rationale: The Greek naturally supports a spiritualized or personified force. Translating 'spirit' preserves the text's theological texture rather than reducing it to mere psychology.
  doctrine_reference: 'DOCTRINE.md: preserve theological tension rather than resolve it'
- issue: Watchers and giants tradition
  chosen_reading: Retain 'Watchers' and 'giants' in the main text
  alternative_readings:
  - Explain them away as merely powerful men
  - Use paraphrase detached from Enochic tradition
  rationale: These terms are integral to Second Temple Jewish tradition reflected in the Greek and should remain visible for readers.
  doctrine_reference: 'PHILOSOPHY.md: translate the source text honestly and transparently'
