translation:
  language: es
  text: 'Dijiste[a]: «¡Ay de mí ahora! Porque Yahvé ha añadido tristeza a mi dolor. Estoy cansado con mi gemido, y no he hallado descanso».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «¡Alas por mí ahora!». La exclamación hebrea expresa lamento y angustia.'
    reason: lexical_alternative
lexical_decisions:
- source_word: אָמַרְתָּ
  english_pob_choice: You said
  chosen_spanish: Tú dijiste
  alternatives_spanish:
  - Has dicho
  - Dijiste
  lexicon: HALOT
  rationale: El perfecto 2ms de אמר introduce la queja atribuida a Baruc. En español, el pasado simple comunica naturalmente el reporte narrativo sin forzar un aspecto perfecto inexistente en la superficie del idioma.
- source_word: אֽוֹי נָא לִי
  english_pob_choice: Woe is me now
  chosen_spanish: ¡Ay de mí ahora!
  alternatives_spanish:
  - ¡Ay de mí!
  - ¡Alas para mí ahora!
  lexicon: HALOT
  rationale: אוי es una exclamación de lamento. En español, «¡Ay de mí ahora!» conserva el grito de dolor sin introducir una fórmula extraña. Se evita «por favor», porque נָא aquí intensifica el lamento y no funciona como petición cortés.
- source_word: כִּי
  english_pob_choice: for
  chosen_spanish: porque
  alternatives_spanish:
  - pues
  - ya que
  lexicon: HALOT
  rationale: Introduce la razón de la queja; «porque» expresa con claridad la relación causal en español contemporáneo.
- source_word: יָסַף
  english_pob_choice: has added
  chosen_spanish: ha añadido
  alternatives_spanish:
  - ha aumentado
  - ha sumado
  lexicon: HALOT
  rationale: El verbo יסף significa añadir o aumentar. «Ha añadido» mantiene la imagen concreta de un sufrimiento agregado a otro previo.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  lexicon: HALOT
  rationale: Se conserva el nombre divino del Tetragrámaton según la terminología española del proyecto, en vez de sustituirlo por una designación titulativa.
- source_word: יָגוֹן
  english_pob_choice: sorrow
  chosen_spanish: tristeza
  alternatives_spanish:
  - dolor
  - pena
  - aflicción
  lexicon: HALOT
  rationale: יָגוֹן denota pesar, tristeza o aflicción. Aquí «tristeza» funciona bien junto con «dolor» y mantiene el matiz afectivo del sufrimiento interior.
- source_word: עַל מַכְאֹבִי
  english_pob_choice: to my pain
  chosen_spanish: a mi dolor
  alternatives_spanish:
  - sobre mi dolor
  - contra mi dolor
  - para mi dolor
  lexicon: HALOT
  rationale: La preposición עַל con יסף expresa adición sobre una base ya existente. «A mi dolor» reproduce de forma natural la idea de que se añade algo al dolor previo.
- source_word: יָגַעְתִּי
  english_pob_choice: I am weary
  chosen_spanish: Estoy cansado
  alternatives_spanish:
  - Me he fatigado
  - Estoy exhausto
  lexicon: HALOT
  rationale: Aunque formalmente es perfecto, el contexto expresa un estado presente derivado del padecimiento continuo. «Estoy cansado» comunica bien ese estado resultante en español.
- source_word: בְּאַנְחָתִי
  english_pob_choice: with my groaning
  chosen_spanish: de mi gemido
  alternatives_spanish:
  - con mi gemido
  - por mi gemido
  - en mi gemir
  lexicon: HALOT
  rationale: אַנְחָה se refiere a gemido/suspiró/queja. En español, «de mi gemido» expresa que el cansancio proviene de ese continuo gemir; se conserva la relación causal sin sonar forzado.
- source_word: וּמְנוּחָה לֹא מָצָאתִי
  english_pob_choice: and I have found no rest
  chosen_spanish: y no he hallado descanso
  alternatives_spanish:
  - y no encontré descanso
  - y no he encontrado reposo
  lexicon: HALOT
  rationale: מְנוּחָה es reposo o descanso. «He hallado» mantiene un registro sobrio y literario, mientras que «descanso» resulta más natural y claro para lectores en español.
theological_decisions:
- issue: Tratamiento del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  rationale: La política terminológica del proyecto para יהוה es usar «Yahvé» en el texto principal. Esto preserva el nombre propio del Dios de Israel y evita la sustitución por un título.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יהוה / YHWH → Yahvé'
- issue: Valor de נָא en la exclamación «אוי נא לי»
  english_pob_reading: The Hebrew cry expresses lament and distress; 'now' captures its emotive force idiomatically
  chosen_spanish_reading: «ahora» dentro del grito de lamento, no como petición de cortesía
  alternative_spanish_readings:
  - omitir «ahora»
  - usar «por favor»
  rationale: En español, «ahora» ayuda a reproducir la fuerza inmediata del lamento, pero no debe leerse como una solicitud. Se evita cualquier lectura de cortesía, porque el hebreo aquí es exclamativo y doliente.
  doctrine_reference: HALOT / uso contextual de נָא en expresiones de lamentación
translation_notes:
  revision_awareness: El contexto de auditoría inglesa está en acuerdo alto y sin revisiones pendientes; por eso la propuesta española sigue de cerca las decisiones ya fijadas, especialmente el nombre divino, la exclamación de lamento y el cierre con «descanso».
  spanish_consistency_notes:
  - Se mantiene la distinción entre el dolor previo («mi dolor») y la tristeza añadida («ha añadido tristeza»).
  - Se conserva el nombre divino «Yahvé» de forma consistente con la terminología del proyecto.
  - La nota textual/lexical de la exclamación se ancla solo en el primer lamento y no se duplica en otra parte del versículo.
