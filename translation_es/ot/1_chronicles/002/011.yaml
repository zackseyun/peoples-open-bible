  text: Naasón engendró a Salma[a], y Salma engendró a Booz.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebreo Salma; algunas traducciones leen Salmón para armonizar con genealogías relacionadas (por ejemplo, Rut 4:20–21; Mt. 1:4–5).
