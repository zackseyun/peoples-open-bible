revisions:
- from: Así volvió Benjamín en aquel tiempo[a], y les dieron las mujeres que habían mantenido con vida, de entre las mujeres de Jabés de Galaad; pero no hallaron para ellos así.
  to: Entonces Benjamín volvió en aquel tiempo[a], y les dieron las mujeres que habían mantenido con vida de entre las mujeres de Jabés de Galaad; pero no encontraron suficientes para ellos de ese modo.
  rationale: Se ajusta la cláusula final para expresar claramente el sentido elíptico del hebreo, en línea con la decisión auditada en inglés, mientras la nota conserva la alternativa más literal con 'así'. También se suaviza el arranque narrativo con 'Entonces' para mejorar la naturalidad del español sin cambiar el sentido. El resto del versículo se mantiene porque refleja bien las decisiones léxicas de la fuente.
