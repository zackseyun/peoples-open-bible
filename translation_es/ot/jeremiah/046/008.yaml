translation:
  language: es
  text: 'Egipto sube como el Nilo, y sus aguas se agitan como ríos. Dice: «Subiré, cubriré la tierra[a]; destruiré la ciudad y a los que habitan en ella».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «el país». El hebreo אֶרֶץ puede significar «tierra» o «país»; el texto principal conserva la fuerza hiperbólica amplia del orgullo de Egipto.
    reason: lexical_alternative
lexical_decisions:
- source_word: מִצְרַיִם
  english_pob_choice: Egypt
  chosen_spanish: Egipto
  alternatives_spanish:
  - Mizraim
  lexicon: HALOT
  rationale: Nombre geopolítico estándar en español para la nación personificada; el contexto presenta a Egipto como potencia militar.
- source_word: כַּיְאֹר
  english_pob_choice: like the Nile
  chosen_spanish: como el Nilo
  alternatives_spanish:
  - como un río
  - como el río Nilo
  lexicon: HALOT
  rationale: יְאֹר en contexto egipcio alude específicamente al Nilo; en español, 'el Nilo' es más preciso y natural que una referencia genérica a 'río'.
- source_word: יַעֲלֶה
  english_pob_choice: rises
  chosen_spanish: sube
  alternatives_spanish:
  - asciende
  - se levanta
  lexicon: HALOT
  rationale: El verbo comunica el ascenso/inflarse del río o la marcha amenazante de Egipto; 'sube' conserva la imagen verbal con fluidez en español.
- source_word: וְכַנְּהָרֹות יִתְגֹּעֲשׁוּ מָיִם
  english_pob_choice: and its waters surge like rivers
  chosen_spanish: y sus aguas se agitan como ríos
  alternatives_spanish:
  - y como ríos las aguas se revuelven
  - y sus aguas se encrespan como ríos
  lexicon: HALOT
  rationale: Se mantiene el plural de aguas/ríos y el movimiento turbulento de יִתְגֹּעֲשׁוּ; 'se agitan' es natural y suficientemente fuerte para la imagen de crecida.
- source_word: וַיֹּאמֶר
  english_pob_choice: It says
  chosen_spanish: Dice
  alternatives_spanish:
  - Y dijo
  - Dice para sí
  lexicon: HALOT
  rationale: Egipto es personificado y habla en presente poético; 'Dice' mantiene la vivacidad y evita un pasado menos expresivo.
- source_word: אַעֲלֶה
  english_pob_choice: I will rise
  chosen_spanish: Subiré
  alternatives_spanish:
  - Iré arriba
  - Me levantaré
  lexicon: HALOT
  rationale: Conserva el eco verbal de 'sube' y funciona bien en la boca arrogante del hablante personificado.
- source_word: אֲכַסֶּה אֶרֶץ
  english_pob_choice: I will cover the earth
  chosen_spanish: cubriré la tierra
  alternatives_spanish:
  - cubriré la tierra/país
  - cubriré el país
  lexicon: HALOT
  rationale: '''Tierra'' preserva la amplitud hiperbólica del hebreo אֶרֶץ y encaja con la lectura poética adoptada por la POB inglesa; ''país'' estrecharía indebidamente el alcance.'
- source_word: אֹבִידָה
  english_pob_choice: I will destroy
  chosen_spanish: destruiré
  alternatives_spanish:
  - haré perecer
  - arruinaré
  lexicon: HALOT
  rationale: Equivale al sentido bélico del hifil de אבד en una amenaza de conquista; 'destruiré' es directo y claro en español.
- source_word: עִיר
  english_pob_choice: the city
  chosen_spanish: la ciudad
  alternatives_spanish:
  - una ciudad
  - las ciudades
  lexicon: HALOT
  rationale: El singular se conserva porque el hebreo es singular; no se pluraliza sin base textual.
- source_word: וְיֹשְׁבֵי בָהּ
  english_pob_choice: and those who dwell in it
  chosen_spanish: y a los que habitan en ella
  alternatives_spanish:
  - y sus habitantes
  - y los moradores de ella
  lexicon: HALOT
  rationale: Expresa con transparencia el complemento singular 'en ella' y mantiene la referencia a los habitantes sin suavizarla ni volverla demasiado técnica.
theological_decisions:
- issue: Personificación de Egipto con habla directa
  english_pob_reading: It says
  chosen_spanish_reading: Dice
  alternative_spanish_readings:
  - Y dijo
  - Dice para sí
  rationale: El hebreo presenta a Egipto como sujeto personificado; el presente mantiene el efecto profético y poético sin introducir una narración pasada que atenúe la imagen.
  doctrine_reference: Poética profética / personificación literaria
- issue: Alcance de אֶרֶץ
  english_pob_reading: earth
  chosen_spanish_reading: tierra
  alternative_spanish_readings:
  - país
  - mundo
  rationale: La POB inglesa preserva la fuerza hiperbólica. En español, 'tierra' conserva ese rango amplio y evita limitar el texto a un territorio político más estrecho.
  doctrine_reference: Semántica lexical de אֶרֶץ
- issue: Imagen de crecimiento/avance de Egipto
  english_pob_reading: rises like the Nile
  chosen_spanish_reading: sube como el Nilo
  alternative_spanish_readings:
  - se alza como el Nilo
  - asciende como el Nilo
  rationale: '''Sube'' conserva la conexión entre la crecida del río y el avance arrogante de Egipto, manteniendo el paralelismo con las aguas agitadas del segundo hemistiquio.'
  doctrine_reference: Imaginería profética / paralelismo hebreo
translation_notes:
  revision_awareness: Se siguió el texto hebreo consonántico/vocalizado de WLC y el audit trail inglés, sin cambios revisados posteriores; la elección española mantiene el paralelismo, la personificación y la ambigüedad de אֶרֶץ documentada en la POB inglesa.
  spanish_consistency_notes:
  - Se mantiene 'Egipto' como nombre geopolítico estándar.
  - Se evita 'SEÑOR' porque el versículo no contiene el nombre divino.
  - Se conserva el singular de 'la ciudad' y 'habitan en ella' conforme al hebreo.
  - '''Tierra'' se usa para אֶרֶץ con nota de alternativa por la ambigüedad lexical documentada.'
