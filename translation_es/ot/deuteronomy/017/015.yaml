  yaml_path: translation/ot/deuteronomy/017/015.yaml
  text: You shall surely set over yourself a king whom Yahweh your God chooses[a]. From among your brothers you shall set a king over yourself; you may not put over yourself a foreigner[b], one who is not your brother.
  footnotes:
