translation:
  language: es
  text: Así que me levanté de noche, yo, con unos pocos hombres conmigo, y no había dicho a nadie[a] lo que mi Dios estaba poniendo en mi corazón[b] para hacer por Jerusalén. Y no había animal[c] conmigo, sino el animal sobre el que yo cabalgaba.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «a ningún hombre». El hebreo dice literalmente «a un hombre», con sentido indefinido.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «lo que mi Dios había puesto en mi corazón» o «lo que mi Dios estaba impulsando en mi corazón». El participio hebreo admite un matiz de acción en curso o de impulso interior.'
    reason: lexical_alternative
  - marker: c
    text: Hebreo «animal» (o «bestia»), un término general para un animal de montura.
    reason: lexical_alternative
lexical_decisions:
- source_word: וָאָקוּם
  english_pob_choice: So I arose
  chosen_spanish: Así que me levanté
  alternatives_spanish:
  - Entonces me levanté
  - Me levanté
  lexicon: HALOT
  rationale: La forma narrativa wayyiqtol pide un pasado simple en español; 'me levanté' es natural y digno. 'Así que' conserva la fuerza conectiva de la narración, como el 'So' del POB inglés.
- source_word: לַיְלָה
  english_pob_choice: in the night
  chosen_spanish: de noche
  alternatives_spanish:
  - en la noche
  - por la noche
  lexicon: HALOT
  rationale: El hebreo marca el tiempo de la acción nocturna. 'De noche' suena natural en español y conserva el sentido temporal sin sobrecargar la frase.
- source_word: וַאֲנִים מְעַט עִמִּי
  english_pob_choice: I and a few men with me
  chosen_spanish: yo y unos pocos hombres conmigo
  alternatives_spanish:
  - yo y unos pocos varones conmigo
  - yo, con unos pocos hombres
  lexicon: HALOT
  rationale: El texto hebreo hace explícito el pronombre de primera persona y el grupo que lo acompaña. 'Hombres' mantiene el valor masculino del término עֲנָשִׁים; 'unos pocos' conserva la pequeñez del grupo.
- source_word: וְלֹא הִגַּדְתִּי לְאָדָם
  english_pob_choice: and I had not told anyone
  chosen_spanish: y no había dicho a nadie
  alternatives_spanish:
  - y no le había dicho a ningún hombre
  - y no había contado a nadie
  lexicon: HALOT
  rationale: הִגַּדְתִּי significa 'decir, declarar, dar a conocer'. En español, 'no había dicho a nadie' expresa bien la negación total y fluye con naturalidad. Se preserva la idea de confidencialidad sin forzar una traducción demasiado literal.
- source_word: לְאָדָם
  english_pob_choice: anyone / any man
  chosen_spanish: a nadie
  alternatives_spanish:
  - a ningún hombre
  - a ninguna persona
  lexicon: HALOT
  rationale: Aunque el hebreo usa אָדָם en singular indefinido, el español idiomático exige una negación más natural. 'A nadie' comunica el sentido de exclusión total sin perder el valor indefinido del original.
- source_word: מָה אֱלֹהַי נֹתֵן אֶל לִבִּי
  english_pob_choice: what my God was putting into my heart
  chosen_spanish: lo que mi Dios estaba poniendo en mi corazón
  alternatives_spanish:
  - lo que mi Dios había puesto en mi corazón
  - lo que mi Dios me estaba inspirando en el corazón
  lexicon: HALOT
  rationale: El participio נֹתֵן sugiere una acción en curso o vivamente presente. 'Estaba poniendo' reproduce esa dinámica y conserva la imagen hebrea del corazón como centro interior de voluntad y pensamiento. 'Mi Dios' refleja el posesivo directo.
- source_word: אֶל לִבִּי
  english_pob_choice: into my heart
  chosen_spanish: en mi corazón
  alternatives_spanish:
  - en mi mente
  - dentro de mi corazón
  lexicon: HALOT
  rationale: Aunque la preposición hebrea puede sugerir movimiento hacia adentro, en español 'poner en mi corazón' es la forma más natural y fiel a la metáfora bíblica. 'Mente' reduciría indebidamente el alcance afectivo-volitivo del hebreo.
- source_word: לַעֲשׂוֹת לִירוּשָׁלִָם
  english_pob_choice: to do for Jerusalem
  chosen_spanish: para hacer por Jerusalén
  alternatives_spanish:
  - para actuar por Jerusalén
  - para obrar por Jerusalén
  - para hacer en Jerusalén
  lexicon: HALOT
  rationale: La construcción hebrea es amplia y no obliga a explicitar todavía 'reconstruir'. 'Para hacer por Jerusalén' conserva esa amplitud y sigue de cerca el valor abierto del verbo, como en el POB inglés.
- source_word: וּבְהֵמָה אֵין עִמִּי
  english_pob_choice: And there was no animal with me
  chosen_spanish: Y no había animal conmigo
  alternatives_spanish:
  - Y no tenía animal conmigo
  - Y no había bestia conmigo
  lexicon: HALOT
  rationale: בְּהֵמָה aquí designa de forma general una bestia de carga o montura. 'Animal' es claro y conserva el término general sin introducir un matiz despectivo o arcaizante.
- source_word: כִּי אִם הַבְּהֵמָה
  english_pob_choice: except the animal
  chosen_spanish: sino el animal
  alternatives_spanish:
  - excepto el animal
  - sólo el animal
  lexicon: HALOT
  rationale: כִּי אִם introduce una excepción. En español, 'sino' es la forma más natural después de una negación previa y preserva la oposición exclusiva del hebreo.
- source_word: אֲשֶׁר אֲנִי רֹכֵב בָּהּ
  english_pob_choice: on which I was riding
  chosen_spanish: sobre el que yo cabalgaba
  alternatives_spanish:
  - en el que yo iba montado
  - sobre el cual cabalgaba
  lexicon: HALOT
  rationale: רֹכֵב expresa montar/cabalgar. 'Cabalgaba' conserva el aspecto durativo sugerido por el participio y es más preciso que un simple 'iba montado' en este contexto narrativo.
theological_decisions:
- issue: Prompting divino sin sobrerrevelación
  english_pob_reading: Rendered נֹתֵן אֶל לִבִּי as 'was putting into my heart' without expanding it into explicit revelation language.
  chosen_spanish_reading: lo que mi Dios estaba poniendo en mi corazón
  alternative_spanish_readings:
  - lo que mi Dios había puesto en mi corazón
  - lo que mi Dios me estaba inspirando
  rationale: El texto atribuye la iniciativa a Dios, pero no obliga a una fórmula técnica de revelación verbal. La redacción elegida conserva la tensión entre la acción divina y la decisión humana de Nehemías sin resolverla en exceso.
  doctrine_reference: 'Translation philosophy: preservar la tensión teológica en vez de cerrarla prematuramente.'
translation_notes:
  revision_awareness: Se tuvo en cuenta el historial del POB inglés, que revisó 'any man' a 'anyone' por naturalidad. En español se optó por 'a nadie' por ser la negación idiomática equivalente, manteniendo el valor indefinido del hebreo y la fluidez formal del versículo.
  spanish_consistency_notes:
  - Se mantiene 'Dios' con posesivo ('mi Dios') por concordancia con el original.
  - Se evita 'SEÑOR' porque el pasaje usa אֱלֹהַי, no el tetragrámaton.
  - '''Corazón'' conserva el centro interior de pensamiento y voluntad, conforme al uso bíblico.'
  - '''Animal'' se usa de manera general, siguiendo el valor amplio de בְּהֵמָה.'
