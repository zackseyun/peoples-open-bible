    text: Or 'the height of Jerusalem' for 'the exaltation of Jerusalem'; the Greek term evokes being lifted high.
    reason: lexical_alternative
  - marker: b
    text: Or 'the great cause for boasting of our people' for 'the great glory of our people.' The Greek noun can also be rendered 'boast.'
    reason: lexical_alternative
