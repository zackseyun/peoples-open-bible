translation:
  language: es
  text: 'Entonces Samuel vino a Saúl, y Saúl le dijo: «Bendito[a] seas de parte de Yahvé; he cumplido[b] la palabra de Yahvé».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «Bendito seas de Yahvé». La fórmula hebrea de bendición puede expresarse más literalmente así, pero «de parte de Yahvé» comunica mejor el sentido en español contemporáneo.
    reason: lexical_alternative
  - marker: b
    text: O «he llevado a cabo» o «he realizado» la palabra de Yahvé.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּבֹא
  english_pob_choice: came
  chosen_spanish: vino
  alternatives_spanish:
  - llegó
  - se acercó
  lexicon: HALOT
  rationale: El wayyiqtol de בוא expresa la llegada de Samuel a la presencia de Saúl; «vino» conserva el movimiento narrativo con naturalidad en español.
- source_word: אֶל
  english_pob_choice: to
  chosen_spanish: a
  alternatives_spanish:
  - hacia
  - ante
  lexicon: HALOT
  rationale: La preposición direccional se vierte de forma simple como «a» en español moderno.
- source_word: וַיֹּאמֶר לוֹ
  english_pob_choice: said to him
  chosen_spanish: le dijo
  alternatives_spanish:
  - dijo
  lexicon: HALOT
  rationale: El destinatario explícito se conserva con el pronombre dativo «le» para claridad y fidelidad.
- source_word: בָּרוּךְ אַתָּה לַיהוָה
  english_pob_choice: Blessed are you by/to the LORD
  chosen_spanish: Bendito seas para Yahvé
  alternatives_spanish:
  - Bendito seas de Yahvé
  - Que Yahvé te bendiga
  lexicon: HALOT
  rationale: La fórmula de bendición con לַיהוָה se refleja mejor con una construcción final («para Yahvé») que evita la pasiva forzada y mantiene la relación con el nombre divino; «Bendito seas» conserva el carácter de bendición pronunciada sobre Samuel.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  - el SEÑOR
  lexicon: HALOT
  rationale: Se sigue la decisión doctrinal del POB de transliterar el Tetragrámaton como «Yahvé», preservando el nombre propio divino en lugar de sustituirlo por un título.
- source_word: הֲקִימֹתִי
  english_pob_choice: I have carried out
  chosen_spanish: he cumplido
  alternatives_spanish:
  - he realizado
  - he llevado a cabo
  - he establecido
  lexicon: HALOT
  rationale: El hiphil de קום con «la palabra de Yahvé» expresa la pretensión de haberla puesto en efecto; «he cumplido» comunica bien la idea de obediencia y ejecución en español, sin perder el valor de cumplimiento efectivo.
- source_word: דְּבַר יְהוָה
  english_pob_choice: the word of the LORD
  chosen_spanish: la palabra de Yahvé
  alternatives_spanish:
  - el mandato de Yahvé
  - el asunto de Yahvé
  lexicon: HALOT
  rationale: «Palabra» mantiene la expresión hebrea דְּבַר con su amplitud semántica, aquí dentro del reclamo de obediencia de Saúl.
theological_decisions:
- issue: Renderización del nombre divino en la fórmula de bendición
  english_pob_reading: Blessed are you to Yahweh / by the LORD
  chosen_spanish_reading: Bendito seas para Yahvé
  alternative_spanish_readings:
  - Bendito seas de Yahvé
  - Bendito seas por Yahvé
  rationale: La preposición hebrea לַיהוָה en una fórmula de bendición admite un valor relacional que no conviene neutralizar. «Para Yahvé» conserva la dirección de la expresión sin imponer una lectura interpretativa más fuerte de causalidad o pertenencia.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Valor de הֲקִימֹתִי con דְּבַר יְהוָה
  english_pob_reading: I have carried out the word of Yahweh
  chosen_spanish_reading: he cumplido la palabra de Yahvé
  alternative_spanish_readings:
  - he llevado a cabo la palabra de Yahvé
  - he realizado la palabra de Yahvé
  rationale: Saúl afirma obediencia, no simple conocimiento ni mera declaración. «He cumplido» expresa adecuadamente la idea de poner en efecto lo mandado, preservando la tensión narrativa entre su afirmación y la evaluación posterior del relato.
  doctrine_reference: HALOT, קום (hiphil) + uso contextual
translation_notes:
  revision_awareness: 'La redacción sigue el consenso del audit trail inglés: Samuel ‘came to Saul’; Saúl pronuncia una bendición con לַיהוָה que la revisión más reciente acercó a la forma hebrea (‘to the LORD’); y הֲקִימֹתִי se entiende como cumplimiento efectivo de la palabra divina. Se mantiene Yahvé conforme a la política doctrinal del proyecto.'
  spanish_consistency_notes:
  - Se usa «Yahvé» de forma consistente para יְהוָה.
  - «Palabra de Yahvé» conserva la expresión bíblica y su fuerza contextual.
  - La bendición se formula en registro bíblico natural, sin sustituir el nombre divino por un título.
  - «Cumplido» mantiene el matiz de ejecución obediente sin sobrerrepresentar el verbo hebreo.
