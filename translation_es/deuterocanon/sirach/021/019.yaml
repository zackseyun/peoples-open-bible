review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español capta bien la estructura comparativa y la mayoría de las decisiones léxicas del griego: παιδεία como «instrucción», πέδαι con imagen de restricción en los pies, ἀνοήτοις como «insensatos», y la preservación de «mano derecha» en singular. Sin embargo, «como grilletes» añade un matiz comparativo no presente en la primera cláusula nominal del griego, donde la equivalencia es más directa: «La instrucción es grilletes...».'
  spanish_quality_summary: El español es claro y legible, pero puede afinarse para reflejar mejor la fuerza metafórica del original. «Esposas» es comprensible, aunque en registro bíblico-sapiencial «grilletes de manos» o «esposas» ambos sirven; «esposas» mantiene buena naturalidad. La nota al pie actual está mal anclada y mezcla alternativas de dos segmentos bajo un solo marcador colocado sobre «grilletes», cuando una de las alternativas corresponde a «instrucción».
  glossary_alignment: No hay términos teológicos sensibles aquí. Las decisiones sapienciales concuerdan con la línea POB. Conviene conservar «instrucción» como principal para παιδεία, con «disciplina» en nota como alternativa léxica, y mantener la imagen concreta de restricción física.
  issues:
  - severity: medium
    issue: Se añade «como» antes de «grilletes» en la primera cláusula.
    rationale: 'El griego presenta una identificación metafórica directa: παιδεία = πέδαι..., no una comparación introducida por ὡς en esa primera mitad. El «como» solo aparece en la segunda cláusula con χειροπέδαι.'
  - severity: medium
    issue: La nota al pie combina alternativas distintas bajo un solo marcador mal ubicado.
    rationale: El marcador [a] está en «grilletes», pero la alternativa «la disciplina» corresponde a «instrucción». Además, la nota reproduce de forma poco clara una alternativa de frase completa.
  - severity: low
    issue: La formulación de la alternativa «manillas» suena menos natural y menos precisa en español general eclesial.
    rationale: 'Si se conserva una alternativa para χειροπέδαι, «grilletes de manos» o incluso «esposas»/«manillas» debe presentarse con más claridad; no es necesario forzarla si la nota puede limitarse a la alternativa principal documentada: «disciplina» y «grilletes ... manillas» como opción completa.'
  revised_spanish_text: La instrucción[a] es grilletes en los pies de los insensatos, y como esposas en la mano derecha.
  revised_footnotes:
  - marker: a
    text: 'O: «La disciplina es grilletes en los pies de los insensatos, y como manillas en la mano derecha».'
    reason: lexical_alternative
  revision_rationale: Se elimina «como» de la primera cláusula para ajustarse a la metáfora identificativa del griego, y se reubica la nota al pie en «instrucción», donde realmente corresponde la alternativa «disciplina». La nota también conserva la alternativa inglesa de frase completa con «manillas» para χειροπέδαι, sin sobrecargar el texto principal. No se requiere adjudicación adicional.
