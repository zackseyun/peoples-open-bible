    reason: lexical_alternative
  revision_rationale: Se ajusta solo el título divino δεσπότης para mejorar fidelidad léxica y legibilidad eclesial en español, manteniendo su distinción frente a κύριος. También se pule «el mismo lugar» a «el lugar mismo», que suena un poco más natural en español sin cambiar el sentido.
