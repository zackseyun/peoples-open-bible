translation:
  language: es
  text: 'Y la voz que oí del cielo me habló otra vez y dijo[a]: «Ve[b], toma el rollo que está abierto en la mano del ángel que está de pie sobre el mar y sobre la tierra».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «pequeño rollo»; el contexto cercano usa una forma diminutiva, pero este versículo dice βιβλίον, «rollo».
    reason: alternative_reading
  - marker: b
    text: O «tierra firme» para «tierra».
    reason: lexical_alternative
lexical_decisions:
- source_word: φωνὴ
  english_pob_choice: voice
  chosen_spanish: voz
  alternatives_spanish:
  - sonido
  lexicon: BDAG
  rationale: φωνή aquí designa una voz que comunica palabras desde el cielo; «voz» conserva ese valor personal y verbal mejor que «sonido».
- source_word: πάλιν
  english_pob_choice: again
  chosen_spanish: otra vez
  alternatives_spanish:
  - de nuevo
  lexicon: BDAG
  rationale: El adverbio marca repetición inmediata del acto de hablar; «otra vez» es natural en español y mantiene la reiteración.
- source_word: λαλοῦσαν μετ’ ἐμοῦ
  english_pob_choice: spoke to me
  chosen_spanish: me habló
  alternatives_spanish:
  - habló conmigo
  - estaba hablando conmigo
  lexicon: BDAG
  rationale: El participio con μετά + genitivo expresa una acción de hablar dirigida a Juan en este contexto. «Me habló» es idiomático en español y no fuerza una matización relacional innecesaria.
- source_word: λέγουσαν
  english_pob_choice: said
  chosen_spanish: dijo
  alternatives_spanish:
  - decía
  lexicon: BDAG
  rationale: 'Como en el inglés POB, el participio attendant se vierte como verbo finito en estilo natural: «dijo».'
- source_word: Ὕπαγε
  english_pob_choice: Go
  chosen_spanish: Ve
  alternatives_spanish:
  - Anda
  - Vete
  lexicon: BDAG
  rationale: El imperativo funciona como una orden directa de ir; «Ve» es la forma más simple y fiel en español.
- source_word: λάβε
  english_pob_choice: take
  chosen_spanish: toma
  alternatives_spanish:
  - recibe
  - toma en tus manos
  lexicon: BDAG
  rationale: λάβε ordena tomar el objeto. «Toma» preserva la sencillez del mandato sin añadir elementos no explícitos.
- source_word: βιβλίον
  english_pob_choice: scroll
  chosen_spanish: rollo
  alternatives_spanish:
  - libro
  - pequeño rollo
  lexicon: BDAG
  rationale: En este contexto apocalíptico βιβλίον se entiende mejor como un objeto enrollado; «rollo» es el equivalente más natural y preciso en español. Se conserva la posibilidad contextual de «pequeño rollo» en nota, pero el griego de este verso no lleva diminutivo.
- source_word: ἠνεῳγμένον
  english_pob_choice: is opened
  chosen_spanish: está abierto
  alternatives_spanish:
  - ha sido abierto
  - abierto
  lexicon: BDAG
  rationale: El participio perfecto pasivo expresa un estado resultante; «está abierto» conserva ese estado de manera clara y natural.
- source_word: ἐν τῇ χειρὶ
  english_pob_choice: in the hand
  chosen_spanish: en la mano
  alternatives_spanish:
  - en su mano
  lexicon: BDAG
  rationale: La preposición ἐν pide «en»; «en la mano» sigue de cerca el griego y mantiene la imagen visual.
- source_word: ἄγγελος
  english_pob_choice: angel
  chosen_spanish: ángel
  alternatives_spanish:
  - mensajero
  lexicon: BDAG
  rationale: En el contexto visionario del Apocalipsis, ἄγγελος se refiere claramente a un ser celestial, por lo que «ángel» es la elección adecuada.
- source_word: ἑστῶτος
  english_pob_choice: who is standing
  chosen_spanish: que está de pie
  alternatives_spanish:
  - que está parado
  - de pie
  lexicon: BDAG
  rationale: El participio perfecto denota un estado postural continuo; «que está de pie» transmite esa postura de manera clara y digna en español.
- source_word: ἐπὶ τῆς θαλάσσης καὶ ἐπὶ τῆς γῆς
  english_pob_choice: on the sea and on the land
  chosen_spanish: sobre el mar y sobre la tierra
  alternatives_spanish:
  - sobre el mar y sobre la tierra firme
  - sobre el mar y sobre el país
  lexicon: BDAG
  rationale: ἐπί con genitivo puede indicar posición sobre una superficie; en español, «sobre» reproduce bien la imagen. Frente a «land», «tierra» conserva el paralelismo bíblico y la oposición visual con «mar».
theological_decisions:
- issue: γῆ en la escena apocalíptica
  english_pob_reading: land
  chosen_spanish_reading: tierra
  alternative_spanish_readings:
  - tierra firme
  - suelo
  rationale: Aunque el contexto describe una postura física, en español «tierra» mantiene el contraste clásico mar/tierra y no pierde la referencia espacial. Se conserva la ambigüedad posible entre tierra como territorio y tierra como el elemento opuesto al mar.
  doctrine_reference: Translation philosophy §1, §5
- issue: βιβλίον en continuidad con el contexto inmediato
  english_pob_reading: scroll
  chosen_spanish_reading: rollo
  alternative_spanish_readings:
  - libro
  - pequeño rollo
  rationale: El término griego no es el diminutivo usado en los versículos cercanos, por lo que el texto principal evita importar ese detalle. «Rollo» comunica el objeto correctamente en español y preserva la tensión contextual que el aparato inglés señala.
  doctrine_reference: Translation philosophy §1, §5
translation_notes:
  revision_awareness: 'El borrador sigue el ajuste reciente del POB en inglés: la voz del cielo «me habló/me dijo» en lugar de una formulación más relacional. También mantiene la decisión revisada de traducir el imperativo de manera directa y de conservar la referencia a βιβλίον sin imponer el diminutivo del contexto vecino.'
  spanish_consistency_notes:
  - Se usó «rollo» en vez de «libro» para bíblion, consistente con el uso apocalíptico de un objeto enrollado.
  - Se mantuvo «ángel» por el contexto visionario de Apocalipsis.
  - Se eligió «tierra» en la imagen final para dejar abierta la tensión lexical con «land», aunque el texto principal usa «tierra» por fluidez bíblica en español.
  - Se evitó «SEÑOR» u otras sustituciones no presentes; no hay referencia al nombre divino en este verso.
