base_translation:
  language: en
  yaml_path: translation/ot/1_kings/010/007.yaml
  text: But I did not believe the reports until I came and my own eyes saw it; and behold[a], not even half was told to me. You have surpassed the report that I heard in wisdom and prosperity.
  footnotes:
