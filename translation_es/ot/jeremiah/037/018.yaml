    text: 'O: «¿En qué he pecado contra ti, tus siervos y este pueblo?»'
    reason: lexical_alternative
  revision_rationale: Se corrige כִּי de «para que» a «que», eliminando el falso matiz de finalidad y restaurando la lógica de la queja de Jeremías. En consecuencia, «me hayan puesto» pasa a «me han puesto» en indicativo. Se conserva «en la casa de la prisión» por su fidelidad al hebreo formal y al rastro de auditoría inglés. También se ajusta la nota para que refleje la alternativa documentada sobre la repetición de los complementos, no una omisión del cierre del versículo.
