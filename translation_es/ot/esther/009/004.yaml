  to: Porque Mardoqueo era grande en la casa del rey, y la noticia acerca de él[a] se iba extendiendo por todas las provincias, porque el hombre Mardoqueo iba creciendo cada vez más[b].
  rationale: Se corrige el texto principal para seguir mejor la decisión léxica documentada para שָׁמְעוֹ, manteniendo «su fama» como alternativa en nota. Se eliminan los anclajes mal ubicados y se reintroduce la nota explicativa del modismo final הוֹלֵךְ וְגָדוֹל, que la auditoría inglesa consideró significativa. El resultado conserva el sentido fuente, mejora la trazabilidad de las notas y sigue sonando natural en español.
