review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador transmite bien la estructura y el sentido general de la bendición: servicio/sujeción de pueblos y naciones, supremacía sobre los hermanos, postración de los hijos de la madre, y fórmula recíproca de maldición/bendición. Sin embargo, «Sé dueño de tus hermanos» no es la mejor equivalencia de הֱוֵה גְבִיר לְאַחֶיךָ porque «dueño» en español tiende a sugerir posesión más que señorío o autoridad relacional; «sé amo» también sonaría duro o ambiguo. Además, falta en español la nota léxica preservada por el English POB sobre «se postren ante ti / te rindan homenaje» para el verbo השתחוה repetido.'
  spanish_quality_summary: 'El texto es legible y digno, pero «Sé dueño de tus hermanos» suena poco natural y semánticamente desviado en contexto familiar-político. «Sé señor[a] de tus hermanos» no es ideal por la política terminológica del proyecto respecto a títulos divinos, pero aquí el propio audit trail documenta una excepción de nota; en español, una solución más natural y precisa es «Sé el que manda sobre tus hermanos» o «Sé señor[a] sobre tus hermanos». Para un registro bíblico claro y breve, «Sé señor[a] de tus hermanos» en texto principal no conviene; mejor «Sé el señor[a] de tus hermanos» tampoco. La mejor reparación breve es «Sé superior a tus hermanos» o «Sé el amo de tus hermanos», pero ambas pierden matiz. Opto por «Sé señor[a] de tus hermanos» solo si se ancla y explica, pero eso choca con el propio propósito. Mejor aún: «Ten dominio sobre tus hermanos» refleja bien גביר. El resto del versículo fluye bien. También conviene pluralizar la fórmula final para reflejar mejor el
    participio plural colectivo hebreo: «Malditos los que te maldigan, y benditos los que te bendigan».'
  glossary_alignment: 'No hay términos divinos centrales aquí. La decisión sobre גביר debe alinearse con la racionalidad del POB: evitar «Señor» cuando pueda confundirse con título divino, pero sin sacrificar fidelidad. En este contexto humano, «dominio»/«autoridad» es mejor que «dueño». La elección «se postren ante ti» está bien para השתחוה, y debe conservar la alternativa documentada «te rindan homenaje» en nota. «Pueblos» y «naciones» están bien.'
  issues:
  - severity: high
    issue: «Sé dueño de tus hermanos» traduce deficientemente הֱוֵה גְבִיר לְאַחֶיךָ
    rationale: «Dueño» sugiere posesión de personas, mientras que גביר aquí expresa señorío, supremacía o autoridad sobre hermanos. En español bíblico neutral, «ten dominio sobre tus hermanos» comunica mejor la relación jerárquica sin matiz de propiedad.
  - severity: medium
    issue: Falta la nota léxica sobre «se postren ante ti»
    rationale: El English POB preserva una alternativa significativa para השתחוה («pay homage»). El borrador español omite esa nota, aunque la decisión teológica/lexical la documenta. Debe mantenerse como nota para transparencia auditiva y semántica.
  - severity: medium
    issue: La fórmula final en singular genérico debilita el paralelismo colectivo
    rationale: Aunque el singular genérico es posible en español, el hebreo usa participios plurales colectivos y el English POB lo vierte en plural. «Malditos los que… y benditos los que…» preserva mejor el paralelismo y la fuerza de la fórmula.
  revised_spanish_text: ¡Que te sirvan pueblos, y naciones se postren[a] ante ti. Ten dominio sobre tus hermanos[b], y que los hijos de tu madre se postren ante ti. Malditos los que te maldigan, y benditos los que te bendigan.
  revised_footnotes:
