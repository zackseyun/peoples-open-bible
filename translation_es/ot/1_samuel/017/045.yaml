revisions:
- from: 'Entonces David dijo al filisteo[a]: «Tú vienes contra mí con espada, con lanza y con jabalina, pero yo vengo contra ti en el nombre de Yahvé de los Ejércitos, el Dios de los ejércitos de Israel[b], a quien has desafiado[c]».'
  to: 'Entonces David dijo al filisteo: «Tú vienes a mí con espada, con lanza y con jabalina, pero yo vengo a ti en el nombre de Yahvé de los Ejércitos[a], el Dios de los ejércitos de Israel[b], a quien has desafiado[c]».'
  rationale: Se corrigió la traducción de בָּא אֵלַי / בָא אֵלֶיךָ a «vienes a mí / vengo a ti» para seguir más de cerca el hebreo y el audit trail inglés sin perder naturalidad. Se eliminó la nota indebida sobre «filisteo» y se reinstaló una nota correctamente anclada al título divino «Yahvé de los Ejércitos», preservando la alternativa tradicional documentada. Se mantuvieron y ajustaron las otras notas léxicas relevantes.
