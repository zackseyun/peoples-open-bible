translation:
  language: es
  text: Que mi enemigo sea como el malvado[a], y el que se levanta contra mí como el injusto.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «como el malvado, y el que se levanta contra mí como el injusto».'
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהִי
  english_pob_choice: May ... be
  chosen_spanish: Que ... sea
  alternatives_spanish:
  - Ojalá ... sea
  - Sea ...
  lexicon: HALOT
  rationale: El yiqtol jussivo expresa deseo/imprecación. En español, «Que ... sea» comunica bien ese valor volitivo con un registro natural y reverente.
- source_word: כְרָשָׁע
  english_pob_choice: like the wicked
  chosen_spanish: como el malvado
  alternatives_spanish:
  - como el impío
  - como el perverso
  lexicon: HALOT
  rationale: רָשָׁע designa al malvado como categoría moral. «Malvado» mantiene el tono ético sin cargar el término con matices técnicos posteriores de «impío».
- source_word: אֹיְבִי
  english_pob_choice: my enemy
  chosen_spanish: mi enemigo
  alternatives_spanish:
  - el que me odia
  - mi adversario
  lexicon: HALOT
  rationale: El sustantivo אויב con sufijo de 1cs se rinde de forma directa como «mi enemigo», que es claro y fiel.
- source_word: וּמִתְקוֹמְמִי
  english_pob_choice: and the one who rises against me
  chosen_spanish: y el que se levanta contra mí
  alternatives_spanish:
  - y mi adversario
  - y el que se alza contra mí
  - y el que se pone contra mí
  lexicon: HALOT
  rationale: La forma participial expresa a alguien que se alza en oposición. Se conserva la imagen verbal de «levantarse contra» en vez de reducirla a un sustantivo relacional.
- source_word: כְעַוָּל
  english_pob_choice: like the unrighteous
  chosen_spanish: como el injusto
  alternatives_spanish:
  - como el malvado
  - como el inicuo
  - como el que actúa con injusticia
  lexicon: HALOT
  rationale: עַוָּל apunta a quien obra con injusticia o torcedad. «Injusto» es breve y paralelo a «malvado», y refleja bien el campo semántico del término.
translation_notes:
  revision_awareness: El texto inglés POB lee «May my enemy be like the wicked, and the one who rises against me like the unrighteous», con nota alternativa «as the wicked ... as the unjust». La versión española conserva la comparación directa y mantiene la distinción entre malvado/injusto, sin aplanar la imagen verbal del segundo hemistiquio.
  spanish_consistency_notes:
  - Se mantiene «el que se levanta contra mí» para preservar la dinámica verbal de וּמִתְקוֹמְמִי.
  - Se eligió «malvado/injusto» como pareja semántica natural en español, equivalente al contraste moral del hebreo y del POB inglés.
  - La nota al pie ofrece la alternativa de estilo «como ...» para reflejar el margen que preservó el POB inglés.
