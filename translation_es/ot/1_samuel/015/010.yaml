lexical_decisions:
- source_word: וַיְהִי
  english_pob_choice: Then ... came
  chosen_spanish: Entonces ... vino
  alternatives_spanish:
  - Y aconteció que ... vino
  - Y fue que ... vino
  lexicon: HALOT
  rationale: La forma narrativa con waw consecutiva introduce una nueva acción en secuencia. En español, «Entonces ... vino» conserva el avance narrativo sin depender de un calco arcaizante como «aconteció».},{
theological_decisions:
- issue: Renderización del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: El texto hebreo usa el Tetragrama directamente. Siguiendo la política del proyecto, se mantiene el nombre divino como «Yahvé» en español, preservando el nombre propio del pacto en lugar de sustituirlo por un título.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
translation_notes:
  revision_awareness: El testimonio auditado en inglés no requirió revisiones sustantivas; se preserva la misma estructura narrativa breve y la misma decisión de nombrar a יְהוָה como Yahvé.
  spanish_consistency_notes:
  - «palabra de Yahvé» conserva la fórmula profética דְּבַר יְהוָה.
  - «vino a Samuel» refleja el destinatario marcado por אֶל sin sobrecargar la frase.
  - «diciendo» mantiene la introducción estándar del discurso en español bíblico contemporáneo.
