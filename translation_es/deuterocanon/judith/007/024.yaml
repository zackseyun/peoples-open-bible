translation:
  language: es
  text: Que Dios juzgue entre ustedes y nosotros[a], porque han hecho contra nosotros una gran injusticia al no hablar pacíficamente con los hijos de Assur.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «con los hijos de Assur». El griego dice literalmente «con los hijos de Assur».'
    reason: lexical_alternative
lexical_decisions:
- source_word: Κρῖναι ὁ θεὸς
  english_pob_choice: May God judge
  chosen_spanish: Que Dios juzgue
  alternatives_spanish:
  - Juzgue Dios
  - Ojalá Dios juzgue
  lexicon: BDAG
  rationale: El aoristo optativo expresa aquí un deseo o imprecación; en español, «Que Dios juzgue» conserva mejor esa fuerza volitiva que un simple imperativo, y suena natural en registro bíblico moderno.
- source_word: ἀνὰ μέσον ὑμῶν καὶ ἡμῶν
  english_pob_choice: between you and us
  chosen_spanish: entre ustedes y nosotros
  alternatives_spanish:
  - entre vosotros y nosotros
  - en medio de ustedes y nosotros
  lexicon: BDAG
  rationale: La expresión es idiomática de arbitraje entre dos partes. «Entre ustedes y nosotros» comunica con claridad la relación forense sin forzar un calco.
- source_word: ἐποιήσατε ἐν ἡμῖν ἀδικίαν μεγάλην
  english_pob_choice: you have done us great injustice
  chosen_spanish: han hecho contra nosotros una gran injusticia
  alternatives_spanish:
  - nos han hecho una gran injusticia
  - han cometido contra nosotros un gran agravio
  - han obrado muy injustamente contra nosotros
  lexicon: BDAG
  rationale: «ἀδικία» conserva fuerza jurídica y moral; «contra nosotros» ayuda a reflejar el valor adversativo de ἐν ἡμῖν sin perder fluidez. «Injusticia» mantiene el sustantivo de la fuente, y «gran» reproduce μεγάλην.
- source_word: οὐ λαλήσαντες εἰρηνικὰ
  english_pob_choice: by not speaking peaceably
  chosen_spanish: al no hablar pacíficamente
  alternatives_spanish:
  - por no haber hablado en paz
  - sin hablar palabras de paz
  - al no hablar con intención pacífica
  lexicon: BDAG
  rationale: El participio explica en qué consistió la injusticia. «Hablar pacíficamente» es natural en español y preserva el matiz verbal de εἰρηνικά (habla/condiciones de paz) sin ampliar el sentido.
- source_word: μετὰ υἱῶν Ἀσσούρ
  english_pob_choice: with the sons of Asshur
  chosen_spanish: con los hijos de Assur
  alternatives_spanish:
  - con los hijos de Asshur
  - con los asirios
  lexicon: LEH
  rationale: Se retiene la forma literal del griego («hijos de Assur») para no neutralizar la referencia nominativa; en español bíblico, «Assur» es una transliteración transparente y auditable. La alternativa étnica «asirios» queda implícita, pero no se adopta como texto principal.
theological_decisions:
- issue: Fórmula de juicio divino como apelación, no como doctrina desarrollada
  english_pob_reading: May God judge between you and us
  chosen_spanish_reading: Que Dios juzgue entre ustedes y nosotros
  alternative_spanish_readings:
  - Que Dios sea juez entre ustedes y nosotros
  - Que Dios decida entre ustedes y nosotros
  rationale: El verso formula una petición de arbitraje divino. Se conserva el tono de súplica/imprecación sin convertirlo en una afirmación doctrinal más amplia sobre el juicio final o la venganza humana.
  doctrine_reference: 'DOCTRINE.md: Preserve theological tension rather than resolve it; readable modern Spanish.'
translation_notes:
  revision_awareness: El borrador sigue de cerca el texto griego de Swete y el criterio de equivalencia óptima del audit trail inglés. No se registran revisiones previas; se mantiene la lectura literal de «hijos de Assur» y la fuerza volitiva del optativo mediante una construcción desiderativa natural en español.
  spanish_consistency_notes:
  - Se usa «Dios» para θεός, sin máscara reverencial, conforme al criterio del proyecto.
  - Se mantiene «Assur» como transliteración bíblica transparente; la nota aclara la alternativa étnica.
  - «Injusticia» conserva la carga legal-moral de ἀδικία y evita suavizar el término.
  - El registro es bíblico contemporáneo, pero no arcaizante; se evita «vosotros» salvo en la variante anotada.
  - La puntuación refleja una sola cláusula principal con causa explicativa, como en el griego.
