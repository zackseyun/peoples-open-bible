translation:
  language: es
  text: O si se le da a conocer el pecado[a] que ha cometido, entonces traerá como su ofrenda por el pecado que ha cometido una cabra sin defecto, hembra.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «se le informa de su pecado» o «llega a enterarse de su pecado». El pasivo hebreo puede describir tanto una toma de conciencia personal como el hecho de que el pecado le sea comunicado.'
    reason: lexical_alternative
lexical_decisions:
- source_word: א֚וֹ
  english_pob_choice: Or
  chosen_spanish: O si
  alternatives_spanish:
  - O
  lexicon: HALOT
  rationale: En español, la construcción legal necesita explicitar la condición para sonar natural y fiel al sentido del caso alternativo. «O si» conserva la coordinación del hebreo y la lectura condicional que sigue.
- source_word: הוֹדַע אֵלָיו
  english_pob_choice: is made known to him
  chosen_spanish: se le da a conocer
  alternatives_spanish:
  - le es informado
  - llega a conocerlo
  - se le informa
  lexicon: HALOT
  rationale: El pasivo hebreo sugiere que el pecado llega a conocimiento del sujeto, ya sea por convicción personal o por comunicación externa. «Se le da a conocer» conserva esa pasividad sin obligar a una sola interpretación.
- source_word: חַטָּאתוֹ
  english_pob_choice: his sin / the sin
  chosen_spanish: el pecado
  alternatives_spanish:
  - su pecado
  - la falta
  lexicon: HALOT
  rationale: Aquí חַטָּאת se refiere al acto pecaminoso, no a la ofrenda. «El pecado» evita introducir «ofrenda por el pecado» donde el contexto todavía describe la falta.
- source_word: וְהֵבִיא
  english_pob_choice: then he shall bring
  chosen_spanish: entonces traerá
  alternatives_spanish:
  - y traerá
  - deberá traer
  lexicon: HALOT
  rationale: En un marco jurídico, el waw continúa la instrucción. «Entonces traerá» expresa secuencia y obligación implícita con un español claro y sobrio.
- source_word: קָרְבָּנוֹ
  english_pob_choice: as his offering
  chosen_spanish: como su ofrenda
  alternatives_spanish:
  - su ofrenda
  - como su sacrificio
  lexicon: HALOT
  rationale: קָרְבָּן es una ofrenda presentada. «Como su ofrenda» refleja la función del sustantivo sin perder el lenguaje sacrificial.
- source_word: שְׂעִירַת עִזִּים
  english_pob_choice: a female goat
  chosen_spanish: una cabra hembra
  alternatives_spanish:
  - una hembra de cabra
  - una chiva hembra
  lexicon: HALOT
  rationale: La frase denota claramente una hembra de la especie caprina. «Cabra hembra» es transparente en español moderno y preserva el rasgo sexual explícito del hebreo.
- source_word: תְּמִימָה
  english_pob_choice: without blemish
  chosen_spanish: sin defecto
  alternatives_spanish:
  - sin mancha
  - sin tara
  lexicon: HALOT
  rationale: Es el idioma sacrificial estándar para un animal apto para la ofrenda. «Sin defecto» comunica la idea de integridad física sin sonar anticuado.
- source_word: נְקֵבָה
  english_pob_choice: female
  chosen_spanish: hembra
  alternatives_spanish:
  - femenina
  - de sexo femenino
  lexicon: HALOT
  rationale: El hebreo añade una especificación de sexo. «Hembra» es preciso para animales y conserva la redundancia deliberada del texto.
- source_word: עַל חַטָּאתוֹ אֲשֶׁר חָטָא
  english_pob_choice: for his sin that he has committed
  chosen_spanish: por el pecado que ha cometido
  alternatives_spanish:
  - a causa de su pecado que ha cometido
  - por su pecado que ha cometido
  lexicon: HALOT
  rationale: עַל aquí marca relación referencial respecto del pecado. En español, «por el pecado» expresa adecuadamente la ofrenda vinculada a esa falta sin sobrecargar el sintagma.
- source_word: אֲשֶׁר חָטָא
  english_pob_choice: that he has committed
  chosen_spanish: que ha cometido
  alternatives_spanish:
  - que cometió
  - en que pecó
  lexicon: HALOT
  rationale: El perfecto hebreo se rinde naturalmente con un perfecto compuesto español que mantiene la relevancia presente del acto cometido.
theological_decisions:
- issue: Naturaleza de חַטָּאת en esta cláusula
  english_pob_reading: Translate חַטָּאת in this verse as 'sin' in both occurrences, not 'sin offering'.
  chosen_spanish_reading: Traducir חַטָּאת como «pecado» en ambas ocurrencias, no como «ofrenda por el pecado».
  alternative_spanish_readings:
  - ofrenda por el pecado
  - culpa
  rationale: En este versículo, la ofrenda ya está nombrada con קָרְבָּנוֹ («su ofrenda») y luego especificada como una cabra hembra sin defecto. Las dos ocurrencias de חַטָּאת señalan la falta cometida; traducirlas como «ofrenda por el pecado» mezclaría el delito con el sacrificio.
  doctrine_reference: Levítico 4:28; uso contextual de חַטָּאת en el hebreo bíblico
translation_notes:
  revision_awareness: 'La redacción sigue el movimiento del texto hebreo y el ajuste reciente del POB en inglés: primero se formula el caso alternativo, luego la pasiva de conocimiento, después la obligación de traer la ofrenda y finalmente la especificación del animal. Se preserva la tensión lexical entre el pecado cometido y la ofrenda que se presenta por él.'
  spanish_consistency_notes:
  - Se usa «Yahvé» en lugar de la convención de ocultar el nombre divino cuando aparezca en contextos conexos; aquí no aparece.
  - Se mantiene «ofrenda» para קָרְבָּן, reservando vocabulario sacrificial preciso sin convertirlo en paráfrasis.
  - «Cabra hembra» refleja tanto la especie como el sexo explícito del hebreo.
  - «Sin defecto» conserva el valor ritual de תְּמִימָה de manera idiomática en español.
  - No se introduce «Cristo» ni lenguaje cristológico, pues el versículo pertenece a instrucción levítica sin esa referencia.
