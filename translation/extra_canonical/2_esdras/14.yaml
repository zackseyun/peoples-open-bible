translation:
  text: '1 And it happened on the third day that I was sitting under an oak[a].

    2 And behold, a voice came out to me from a bush and said, “Ezra, Ezra!” And I said, “Here I am, Lord.” And I stood on my feet, and it said to me,

    3 “I revealed myself in the bush, and I spoke to Moses when my people were serving in Egypt.

    4 And I sent him, and he led my people out of Egypt, and I brought him up onto Mount Sinai, and I kept him with me many days.

    5 And I told him many wonders, and I showed him the secrets of the times and the end of the times, and I commanded him, saying,

    6 ‘These words you shall make public, and these you shall hide.’

    7 And now I say to you:

    8 Store up in your heart the signs that I have shown, and the dreams that you have seen, and the interpretations that you have heard.

    9 For you will be taken up from among men, and you will dwell with my son and with those like you until the times are finished.

    10 For the age has lost its youth, and the times are drawing near to old age.

    11 For the age has been divided into twelve parts, and ten parts of it have already passed, and half of the tenth part.

    12 But two parts remain after the middle of the tenth part.

    13 Therefore now set your house in order, and reprove your people, and comfort their humble ones, and renounce now the corrupt life.

    14 And put away from yourself mortal thoughts, and cast off from yourself human burdens, and strip off now your weak nature, and set aside the thoughts that are most grievous to you,

    15 and hurry to depart from these times. For the evils that you have now seen happen

    16 will be followed by things worse than these. For the weaker the age becomes through old age, the more evils will multiply

    17 upon those who dwell in it. For truth will be prolonged farther, and falsehood will draw near. For already the eagle that you saw in the vision is hastening to come.”

    18 Then I answered and said before you, Lord,

    19 “Behold, I will go, as you have commanded me, and I will reprove the people who are present.

    20 But those who will be born afterward—who will warn them? For the age has been set in darkness, and those who dwell in it are without light.

    21 For your law has been burned, and therefore no one knows the things done by you

    22 or the things that are about to be done. But if I have found favor before you, send the Holy Spirit into me, and I will write everything that has happened in the age from the beginning, the things that were written in your law, so that men may be able to find the path, and that those who wish

    23 to live in the last days may live.” And he answered me and said, “Go, gather the people, and say to them that they are not to seek you

    24 for forty days. But you, prepare for yourself many boxwood tablets, and take with you Sarea, Dabria, Selemia[b], Ethan, and Asiel,

    25 these five, because they are ready to write quickly. And you shall come here, and I will kindle in your heart a lamp of understanding that will not be extinguished until the things that you begin to write are finished.

    26 And when you have completed them, some things you shall make public, and some things you shall hand over in secret to the wise. Tomorrow at this hour you shall begin to write.” And I went away, as he commanded me, and I gathered all the

    27 people and said, “Hear these words, O Israel:

    28 Our fathers sojourned as sojourners from the beginning in Egypt, and they were delivered from there.

    29 And they received the law of life, which they did not keep, and which you also have transgressed after them.

    30 And the land was given to you as an inheritance in the land of Zion, but you and your fathers committed iniquity and did not keep the ways that the Most High commanded you.

    31 And since he is a righteous judge, he took away from you in due time what he had given.

    32 And now you are here, and your brothers are within you.

    33 Therefore if you will rule your understanding and instruct your heart, you will be kept alive and after death you will obtain mercy.

    34 For judgment will come after death, when we shall live again,

    35 and then the name of the righteous will appear, and the deeds of the ungodly will be disclosed.

    36 But let no one come near me now, nor seek me for forty days.”

    37 And I took the five men, as he commanded me, and we went out into the field and stayed there.

    38 And it happened on the next day, and behold, a voice called me, saying, “Ezra, open your mouth and drink what I give you to drink.” And I opened my mouth, and behold, a full cup was held out to me.

    39 This was full as with water, but its color was like fire.

    40 And I took it and drank, and when I had drunk it, my heart poured forth understanding, and wisdom increased in my breast, for my spirit kept its memory.

    41 And my mouth was opened and was not closed anymore.

    42 And the Most High gave understanding to the five men, and they wrote in order the things that were spoken, in characters that they did not know. And they sat there forty days.

    43 They wrote by day, but at night they ate bread. As for me, I spoke by day, and at night I was not silent.

    44 And in forty days ninety-four books were written.

    45 And it happened when the forty days were completed, the Most High spoke to me, saying, “The first things that you wrote, set them out publicly, and let the worthy and the unworthy read them.

    46 But keep the last seventy, so that you may hand them over to the wise among your people.

    47 For in them is the vein of understanding, the fountain of wisdom[c][d], and the river of knowledge.”'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The Latin 'buxos' literally points to boxwood tablets or writing tablets made of boxwood. The translation gives the functional sense.
    reason: cultural_note
    anchor_ref: '14:24'
  - marker: b
    text: The phrase 'in characters that they did not know' may refer to unfamiliar script-signs, shorthand, or divinely enabled writing forms; the Latin alone does not specify further.
    reason: lexical_alternative
    anchor_ref: '14:42'
  - marker: d
    text: The numeral in the Latin line is textually difficult as transmitted. The chapter's widely recognized sense is ninety-four books, which also fits the division between the public writings and the final seventy kept for the wise.
    reason: textual_variant
    anchor_ref: '14:44'
  - marker: c
    text: The final seventy books are presented as esoteric wisdom reserved for the wise among Ezra's people, a key compositional feature in 4 Ezra's portrayal of hidden revelation.
    reason: compositional_layer
    anchor_ref: '14:46'
lexical_decisions:
- source_word: quercu
  chosen: oak
  alternatives:
  - oak tree
  lexicon: Lewis & Short
  rationale: A straightforward rendering of the Latin tree name; 'oak' is natural English and preserves the scene's concreteness.
- source_word: rubo
  chosen: bush
  alternatives:
  - bramble bush
  lexicon: Lewis & Short
  rationale: The allusion is to the burning bush theophany of Moses. 'Bush' keeps the biblical resonance without over-specifying beyond the Latin.
- source_word: reuelans reuelatus sum
  chosen: I revealed myself
  alternatives:
  - revealing I was revealed
  - I was clearly revealed
  lexicon: Lewis & Short
  rationale: The Latin is a Semitic-style emphatic construction. Idiomatic English needs smoothing, but 'I revealed myself' preserves the self-disclosure sense.
- source_word: temporum secreta et temporum finem
  chosen: the secrets of the times and the end of the times
  alternatives:
  - the hidden things of the ages and their end
  lexicon: Lewis & Short
  rationale: Retains the apocalyptic temporal language and the repetition of 'times' rather than flattening it.
- source_word: reciperis ab hominibus
  chosen: you will be taken up from among men
  alternatives:
  - you will be received away from men
  - you will be taken from mankind
  lexicon: Lewis & Short
  rationale: The phrase points to Ezra's removal from ordinary human society. 'Taken up' preserves the elevated, eschatological tone.
- source_word: saeculum
  chosen: age
  alternatives:
  - world
  - era
  lexicon: Lewis & Short
  rationale: In 4 Ezra this term often denotes the present world-order in its temporal aspect. 'Age' better preserves apocalyptic contrast than the flatter 'world'.
- source_word: senescere
  chosen: drawing near to old age
  alternatives:
  - growing old
  - becoming aged
  lexicon: Lewis & Short
  rationale: The chapter personifies the age as aging. This fuller phrase preserves that imagery.
- source_word: dispone domum tuam
  chosen: set your house in order
  alternatives:
  - arrange your household
  lexicon: Lewis & Short
  rationale: An established but still accurate idiom in English that matches the solemn preparatory command.
- source_word: mortales cogitationes
  chosen: mortal thoughts
  alternatives:
  - thoughts of mortality
  - humanly limited thoughts
  lexicon: Lewis & Short
  rationale: Keeps the stark contrast between mortal limitation and Ezra's coming prophetic commission.
- source_word: inmitte in me spiritum sanctum
  chosen: send the Holy Spirit into me
  alternatives:
  - put a holy spirit into me
  lexicon: Lewis & Short
  rationale: Capitalized rendering reflects the text's divine empowering agency in context. The phrase is presented as a specific gift from God for inspired writing.
- source_word: buxos multos
  chosen: many writing tablets
  alternatives:
  - many boxwood tablets
  - many tablets
  lexicon: Lewis & Short
  rationale: The literal sense likely refers to boxwood writing tablets. 'Writing tablets' communicates the function clearly in modern English while remaining anchored in the material image.
- source_word: lucernam intellectus
  chosen: a lamp of understanding
  alternatives:
  - a lamp of insight
  lexicon: Lewis & Short
  rationale: Preserves the metaphor of illumination rather than reducing it to abstract cognition.
- source_word: peregrinantes peregrinati sunt
  chosen: lived as sojourners
  alternatives:
  - sojourned as strangers
  - wandered as resident aliens
  lexicon: Lewis & Short
  rationale: The doubled Latin stresses alien status. 'Lived as sojourners' keeps the exile/alien motif in readable English.
- source_word: lexem uitae
  chosen: the law of life
  alternatives:
  - the life-giving law
  lexicon: Lewis & Short
  rationale: A close rendering that preserves the genitival force and theological weight of Torah as life-bearing.
- source_word: Altissimus
  chosen: the Most High
  alternatives: []
  lexicon: Lewis & Short
  rationale: Project policy requires preserving this divine title rather than flattening it to 'God.'
- source_word: imperaueritis sensui uestro
  chosen: you will rule your understanding
  alternatives:
  - you will master your mind
  - you will govern your reason
  lexicon: Lewis & Short
  rationale: The Latin speaks of exercising command over one's faculty of perception/judgment. 'Rule your understanding' keeps the moral-intellectual discipline in view.
- source_word: erudieritis cor uestrum
  chosen: instruct your heart
  alternatives:
  - discipline your heart
  - train your heart
  lexicon: Lewis & Short
  rationale: Preserves the biblical anthropology in which the heart is the center of moral understanding, not merely emotion.
- source_word: reuiuiscemus
  chosen: we shall live again
  alternatives:
  - we shall be revived
  - we shall come to life again
  lexicon: Lewis & Short
  rationale: A direct and accessible rendering that clearly signals resurrection without importing later doctrinal formulae.
- source_word: eructuabat intellectum
  chosen: poured forth understanding
  alternatives:
  - belched forth understanding
  - overflowed with understanding
  lexicon: Lewis & Short
  rationale: The Latin verb is vivid and bodily. 'Poured forth' preserves the force without sounding grotesque in English prose.
- source_word: notis quas non sciebant
  chosen: in characters that they did not know
  alternatives:
  - in signs they did not know
  - in letters unknown to them
  lexicon: Lewis & Short
  rationale: The phrase likely refers to divinely enabled script or shorthand unfamiliar to the scribes. 'Characters' keeps the writing-specific sense.
- source_word: libri DCCCClIIII
  chosen: ninety-four books
  alternatives: []
  lexicon: Lewis & Short
  rationale: The numeral in the cleaned Latin corresponds to 94 books in the standard reckoning of the chapter; the English reflects that intended value.
- source_word: uena intellectus
  chosen: the spring of understanding
  alternatives:
  - the vein of understanding
  - the source of understanding
  lexicon: Lewis & Short
  rationale: Although 'vein' is possible literally, the paired metaphors with fountain and river favor a water-source image in English.
theological_decisions:
- issue: Verse 9 'cum filio meo'
  chosen_reading: with my son
  alternative_readings:
  - with my Son
  - with my child
  rationale: The Latin in this chapter reads simply 'with my son' without the explicit 'Messiah' title found elsewhere. Capitalization is interpretive, so the main text leaves it lowercase while preserving the filial figure's significance.
  doctrine_reference: Preserve theological tension rather than resolve it.
- issue: Verse 22 'spiritum sanctum'
  chosen_reading: the Holy Spirit
  alternative_readings:
  - a holy spirit
  rationale: In context Ezra asks for divine inspiration to rewrite the lost law and sacred history. The definite, capitalized rendering best reflects the text's portrayal of a specific divine empowering presence, though the Latin form itself could be read more generically.
  doctrine_reference: Preserve theological tension rather than resolve it.
- issue: Verse 34 resurrection language
  chosen_reading: when we shall live again
  alternative_readings:
  - when we shall be revived
  rationale: The chapter speaks of postmortem judgment followed by renewed life. 'Live again' makes the resurrection sense plain without over-systematizing the anthropology.
  doctrine_reference: Readable modern English, not archaic or academic.
- issue: Verse 44 number of books
  chosen_reading: ninety-four books
  alternative_readings:
  - 904 books if the numeral were read woodenly from the corrupted Latin notation
  rationale: The transmitted numeral in this cleaned Latin line reflects a known corruption/notation issue. The chapter's standard textual sense is 94 books, matching the subsequent division into public and secret writings.
  doctrine_reference: Original-language primacy over translation tradition; transparent handling of textual cruxes.
