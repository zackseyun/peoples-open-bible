  yaml_path: translation/ot/2_samuel/024/010.yaml
  text: After that[a], David’s heart struck him after he had counted the people. And David said to Yahweh, “I have sinned greatly in what I have done. And now, Yahweh, please take away the guilt of your servant[c][b], for I have acted very foolishly.”
