translation:
  language: es
  text: Creció hasta el ejército de los cielos[a], y arrojó a tierra parte del ejército y parte de las estrellas, y los pisoteó.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'la hueste del cielo'. La frase puede referirse simbólicamente a seres celestiales, al pueblo de Dios o a poderes celestes; el hebreo deja abierta la imagen.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַתִּגְדַּל
  english_pob_choice: It grew
  chosen_spanish: Se engrandeció
  alternatives_spanish:
  - Creció
  - Se hizo grande
  lexicon: HALOT
  rationale: גדל en esta forma verbal expresa aumento de grandeza o extensión. En español, 'se engrandeció' conserva ese crecimiento/intensificación y permite el matiz de exaltación del sujeto sin forzar una interpretación más específica que el hebreo no exige aquí.
- source_word: עַד
  english_pob_choice: as high as
  chosen_spanish: hasta
  alternatives_spanish:
  - hasta llegar a
  - a la altura de
  lexicon: HALOT
  rationale: La preposición marca alcance o extensión hacia un límite elevado. En español, 'hasta' comunica ese alcance de manera natural; la altura queda sugerida por el contexto inmediato ('el ejército de los cielos').
- source_word: צְבָא הַשָּׁמַיִם
  english_pob_choice: the host of heaven
  chosen_spanish: el ejército de los cielos
  alternatives_spanish:
  - el hoste del cielo
  - las huestes celestiales
  lexicon: HALOT
  rationale: צָבָא puede significar 'ejército/hueste'. 'Ejército de los cielos' conserva la imagen bélica y la ambigüedad simbólica del hebreo, sin decidir en el texto principal si se trata de seres celestiales, pueblo de Dios o poderes celestes.
- source_word: וַתַּפֵּל
  english_pob_choice: it cast ... down
  chosen_spanish: arrojó ... a tierra
  alternatives_spanish:
  - hizo caer ... a tierra
  - derribó ... a tierra
  lexicon: HALOT
  rationale: 'El hifil de נפל es causativo: hacer caer. ''Arrojó a tierra'' es una forma española fuerte y natural que conserva la acción violenta y la dirección descendente.'
- source_word: אַרְצָה
  english_pob_choice: to the earth
  chosen_spanish: a tierra
  alternatives_spanish:
  - a la tierra
  - al suelo
  lexicon: HALOT
  rationale: La forma direccional de אֶרֶץ indica movimiento hacia abajo. 'A tierra' es idiomático en español y mantiene el contraste cósmico entre los cielos y la caída a la tierra.
- source_word: מִן הַצָּבָא וּמִן הַכּוֹכָבִים
  english_pob_choice: some of the host and some of the stars
  chosen_spanish: parte del ejército y de las estrellas
  alternatives_spanish:
  - algunos del ejército y de las estrellas
  - parte de las huestes y de las estrellas
  lexicon: HALOT
  rationale: Tras un verbo de derribar/arrojar, מִן funciona de manera partititiva. En español, 'parte de' expresa ese valor partitivo y evita la impresión de que cayó todo el conjunto. Se conserva la coordinación 'del ejército y de las estrellas' para reflejar la imagen doble del hebreo.
- source_word: הַכּוֹכָבִים
  english_pob_choice: the stars
  chosen_spanish: las estrellas
  alternatives_spanish:
  - los astros
  lexicon: HALOT
  rationale: כּוֹכָבִים significa 'estrellas'. Se mantiene el término literal, ya que el texto apocalíptico deja abierta su referencia simbólica sin sustituirla por una interpretación.
- source_word: וַתִּרְמְסֵם
  english_pob_choice: and trampled them
  chosen_spanish: y los pisoteó
  alternatives_spanish:
  - y los aplastó con los pies
  - y los holló
  lexicon: HALOT
  rationale: רמס significa 'hollar/pisotear'. 'Pisoteó' es claro, vigoroso y natural en español, y reproduce la violencia del verbo sin añadir intensidad ajena al hebreo.
theological_decisions:
- issue: Identidad de 'el ejército de los cielos' y 'las estrellas'
  english_pob_reading: Retain the literal imagery 'host of heaven' and 'stars' without specifying the referents
  chosen_spanish_reading: 'Conservar la imaginería literal: ''el ejército de los cielos'' y ''las estrellas'', sin identificar sus referentes en el texto principal'
  alternative_spanish_readings:
  - los ángeles
  - los santos / el pueblo de Dios
  - los cuerpos celestes como símbolo
  rationale: El hebreo no determina de forma explícita a qué o a quiénes se refiere la imagen. Siguiendo la filosofía de traducción, la versión española preserva la tensión interpretativa en lugar de resolverla teológicamente en el cuerpo del texto.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: No hubo cambios en la última revisión; el pasaje fue confirmado como de alta concordancia y sin observaciones pendientes.
  spanish_consistency_notes:
  - Se usó 'Yahvé' no porque aparezca explícitamente en el versículo, sino por la convención del proyecto cuando el nombre divino esté en juego; aquí no fue necesario.
  - '''Ejército de los cielos'' mantiene el paralelismo con ''las estrellas'' y evita una aclaración interpretativa prematura.'
  - Se prefirió un español natural ('se engrandeció', 'a tierra', 'pisoteó') sin perder la fuerza del hebreo ni la ambigüedad simbólica del contexto apocalíptico.
