translation:
  language: es
  text: Y ella dio a luz otra vez[a], a su hermano Abel. Abel llegó a ser un pastor de rebaños[b], pero Caín era un trabajador de la tierra[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «continuó dando a luz» / «dio a luz de nuevo». El hebreo usa un modismo con el verbo «añadir» más un infinitivo para expresar repetición o continuación.
    reason: lexical_alternative
  - marker: b
    text: «Rebaños» se refiere al ganado menor, especialmente ovejas y cabras.
    reason: cultural_note
  - marker: c
    text: O «un labrador de la tierra».
    reason: lexical_alternative
lexical_decisions:
- source_word: וַתֹּסֶף לָלֶדֶת
  english_pob_choice: she gave birth again
  chosen_spanish: dio a luz otra vez
  alternatives_spanish:
  - continuó dando a luz
  - dio a luz de nuevo
  lexicon: HALOT
  rationale: El hebreo usa יסף + infinitivo para expresar repetición o continuación. En español, «dio a luz otra vez» comunica de forma natural la repetición narrativa sin copiar mecánicamente la estructura idiomática.
- source_word: אֶת אָחִיו אֶת הָבֶל
  english_pob_choice: to his brother Abel
  chosen_spanish: a su hermano Abel
  alternatives_spanish:
  - a Abel, su hermano
  - a saber, Abel, su hermano
  lexicon: HALOT
  rationale: La construcción con doble objeto introduce al hijo nacido y lo identifica como hermano de Caín. «A su hermano Abel» mantiene esa relación fraterna con sintaxis española fluida.
- source_word: הֶבֶל
  english_pob_choice: Abel
  chosen_spanish: Abel
  alternatives_spanish:
  - —
  lexicon: Convención de transliteración propia del proyecto
  rationale: Los nombres propios se transliteran de manera estándar.
- source_word: וַיְהִי
  english_pob_choice: became
  chosen_spanish: llegó a ser
  alternatives_spanish:
  - era
  - se convirtió en
  lexicon: HALOT
  rationale: Aquí היה introduce el papel u ocupación de Abel. «Llegó a ser» expresa desarrollo narrativo sin perder la fuerza del verbo en español.
- source_word: רֹעֵה צֹאן
  english_pob_choice: a shepherd of flocks
  chosen_spanish: un pastor de rebaños
  alternatives_spanish:
  - un cuidador de ovejas
  - un pastor
  lexicon: HALOT
  rationale: רעה refiere al pastoreo, y צאן nombra ganado menor, especialmente ovejas y cabras. «Pastor de rebaños» conserva el sentido pastoral general y evita restringirlo indebidamente solo a ovejas.
- source_word: קַיִן
  english_pob_choice: Cain
  chosen_spanish: Caín
  alternatives_spanish:
  - —
  lexicon: Convención de transliteración propia del proyecto
  rationale: Los nombres propios se transliteran de manera estándar al español.
- source_word: הָיָה עֹבֵד אֲדָמָה
  english_pob_choice: was a worker of the ground
  chosen_spanish: era un trabajador de la tierra
  alternatives_spanish:
  - era un labrador de la tierra
  - trabajaba la tierra
  - era un campesino
  lexicon: HALOT
  rationale: עבד + אדמה indica trabajar o cultivar la tierra. «Trabajador de la tierra» conserva la relación léxica con אֲדָמָה y evita una interpretación más interpretativa como «campesino».
- source_word: אֲדָמָה
  english_pob_choice: ground
  chosen_spanish: tierra
  alternatives_spanish:
  - suelo
  - campo
  lexicon: HALOT
  rationale: «Tierra» es natural en español y mantiene la conexión temática con el juego de palabras de Génesis entre אדם/adam y אדמה/adamah, aunque «tierra» puede abarcar el campo cultivable de manera amplia.
- source_word: וְ
  english_pob_choice: but
  chosen_spanish: pero
  alternatives_spanish:
  - y
  lexicon: HALOT
  rationale: Aunque la conjunción es formalmente «y», en español «pero» comunica mejor el contraste narrativo entre las ocupaciones de los hermanos, sin agregar una valoración moral.
theological_decisions:
- issue: Presentación de las ocupaciones de Abel y Caín
  english_pob_reading: Render the verse as a simple description of differing occupations without implying moral evaluation.
  chosen_spanish_reading: Presentar el versículo como una descripción simple de ocupaciones distintas, sin sugerir evaluación moral.
  alternative_spanish_readings:
  - Traducir de forma que una ocupación quede implícitamente más noble que la otra.
  - Introducir un matiz interpretativo sobre el valor espiritual de cada oficio.
  rationale: El hebreo describe los oficios de ambos hermanos de manera neutral. La traducción debe conservar esa neutralidad y no anticipar una lectura moral que el versículo no expresa.
  doctrine_reference: Philosophy de traducción §1 y §3
translation_notes:
  revision_awareness: La revisión más reciente indica que no hubo cambios necesarios; esta propuesta sigue la lectura estable con acuerdo alto entre revisiones.
  spanish_consistency_notes:
  - Se usa «Yahvé» como forma estándar del proyecto solo cuando aparezca el nombre divino; en este versículo no aparece.
  - «Abel» y «Caín» se mantienen como nombres propios transliterados de forma consistente.
  - Se preserva el contraste narrativo con «pero» sin sugerir juicio moral.
  - «Tierra» se eligió para mantener la conexión léxica con אדמה en el contexto de Génesis.
