- from: Mano a mano[a], el malo[b] no quedará sin castigo, pero la descendencia de los justos escapará.
  to: Mano con mano[a], el malo no quedará impune, pero la descendencia de los justos escapará.
  rationale: Se ajusta el modismo inicial para conservar mejor la literalidad sin activar la lectura española más común de «mano a mano». También se cambia «no quedará sin castigo» por «no quedará impune» por mayor naturalidad proverbial. Se elimina la nota sobre «el malo» porque no hace falta para la comprensión y no preserva una alternativa textual necesaria.
