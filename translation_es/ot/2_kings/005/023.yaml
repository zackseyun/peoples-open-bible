  to: 'Naamán dijo: «Por favor, toma dos talentos». E insistió con él[a], y ató dos talentos de plata en dos bolsas[b], con dos cambios de ropa, y se los dio a dos de sus sirvientes, y ellos los llevaron delante de él[c].'
