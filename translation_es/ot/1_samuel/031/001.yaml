revisions:
- from: Ahora los filisteos estaban combatiendo contra Israel, y los hombres de Israel huyeron delante de los filisteos, y cayeron muertos en el monte Gilboa.
  to: Los filisteos estaban combatiendo contra Israel, y los hombres de Israel huyeron de delante[a] de los filisteos, y cayeron muertos en el monte Gilboa.
  rationale: Se elimina «Ahora» para un inicio narrativo más natural en español y se ajusta מִפְּנֵי a «de delante de» para reflejar mejor el sentido de retirada desde la presencia del enemigo, preservando además la alternativa más literal en nota, en continuidad con el audit trail inglés.
