translation:
  language: es
  text: La lengua tercera[a] ha sacudido a muchos y los ha lanzado de nación en nación.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'lengua calumniosa', 'lengua doble' o, más generalmente, 'habla divisiva'. El griego dice literalmente 'lengua tercera'; la expresión se deja transparente en el texto principal.
    reason: lexical_alternative
lexical_decisions:
- source_word: γλῶσσα
  english_pob_choice: tongue
  chosen_spanish: lengua
  alternatives_spanish:
  - habla
  - lengua hablada
  - habla maliciosa
  lexicon: LSJ
  rationale: En español, 'lengua' conserva el valor literal del órgano y también su extensión metafórica a la palabra hablada. Mantiene la imagen proverbial de la expresión griega sin reducirla de entrada a una explicación interpretativa.
- source_word: τρίτη
  english_pob_choice: third
  chosen_spanish: tercera
  alternatives_spanish:
  - maliciosa
  - doble
  - divisiva
  lexicon: LSJ
  rationale: El adjetivo griego es ordinal y la POB inglesa preserva esa literalidad. 'Tercera' mantiene la rareza del giro y deja abierta la interpretación idiomática para la nota.
- source_word: ἐσάλευσεν
  english_pob_choice: has shaken
  chosen_spanish: ha sacudido
  alternatives_spanish:
  - ha agitado
  - ha estremecido
  - ha trastornado
  lexicon: LSJ
  rationale: '''Sacudido'' conserva la metáfora concreta de agitación o conmoción y resulta natural en español. No intensifica innecesariamente el verbo.'
- source_word: διέστησεν
  english_pob_choice: driven
  chosen_spanish: los ha llevado
  alternatives_spanish:
  - los ha separado
  - los ha dispersado
  - los ha expulsado
  lexicon: LSJ
  rationale: La POB revisada prefirió 'driven' para enlazar más directamente con la cláusula siguiente. En español, 'los ha llevado' refleja ese movimiento/dislocación sin forzar un matiz de expulsión que el griego no exige de manera explícita.
- source_word: ἀπὸ ἔθνους εἰς ἔθνος
  english_pob_choice: from nation to nation
  chosen_spanish: de nación en nación
  alternatives_spanish:
  - de pueblo en pueblo
  - de una nación a otra
  lexicon: LSJ
  rationale: '''De nación en nación'' reproduce el paralelismo repetido de ἔθνος y suena idiomático en español bíblico contemporáneo. ''Pueblo'' podría suavizar el alcance, pero ''nación'' mantiene la correspondencia léxica.'
theological_decisions:
- issue: Interpretación idiomática de γλῶσσα τρίτη
  english_pob_reading: Retener 'third tongue' de manera transparente, con nota de alternativas interpretativas.
  chosen_spanish_reading: Retener 'lengua tercera' en el texto principal, con nota sobre posibles sentidos como habla calumniosa o divisiva.
  alternative_spanish_readings:
  - lengua calumniosa
  - lengua doble
  - habla divisiva
  rationale: La evidencia griega dada dice literalmente 'lengua tercera'. La traducción española mantiene esa rareza para no borrar la tensión semántica; la nota informa las interpretaciones posibles sin reemplazar el texto base por una paráfrasis.
  doctrine_reference: Principios de transparencia textual y primacía del original; cf. filosofía de traducción POB §§1, 3, 5
translation_notes:
  revision_awareness: La versión inglesa más reciente cambió 'scattered' por 'driven' para reflejar con más precisión διέστησεν junto con 'from nation to nation'. La redacción española adopta ese ajuste con 'los ha llevado de nación en nación', manteniendo también la imagen concreta de ἐσάλευσεν con 'ha sacudido'.
  spanish_consistency_notes:
  - Se conserva la transparencia del giro idiomático sin sustituirlo por una interpretación en el cuerpo del texto.
  - Se usa 'lengua' para γλῶσσα y 'nación' para ἔθνος, en línea con la correspondencia léxica del audit trail.
  - La nota a pie de página ofrece alternativas léxicas documentadas sin introducir términos no sustentados por la fuente.
