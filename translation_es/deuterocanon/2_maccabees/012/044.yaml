translation:
  language: es
  text: Porque, si no esperaba que los que habían caído resucitaran[a], habría sido superfluo y necio orar por los muertos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «los que habían muerto»; literalmente, «los que habían caído».'
    reason: lexical_alternative
lexical_decisions:
- source_word: προπεπτωκότας
  english_pob_choice: those who had fallen
  chosen_spanish: los que habían caído
  alternatives_spanish:
  - los que habían muerto
  - los caídos
  lexicon: LSJ
  rationale: Conservo la imagen verbal de «caer», que corresponde al participio perfecto y mantiene el colorido del griego. En este contexto alude a los muertos en combate, pero «los que habían caído» evita borrar esa imagen al traducir directamente por «los que habían muerto».
- source_word: ἀναστῆναι
  english_pob_choice: to rise again
  chosen_spanish: resucitaran
  alternatives_spanish:
  - volvieran a levantarse
  - fueran levantados
  lexicon: LSJ
  rationale: En este contexto el infinitivo apunta a resurrección. «Resucitaran» expresa la idea con claridad natural en español y evita una formulación mecánica. Mantiene la fuerza escatológica sin añadir explicación extra.
- source_word: προσεδόκα
  english_pob_choice: were not expecting
  chosen_spanish: no esperaba
  alternatives_spanish:
  - no tenía esperanza de
  - no aguardaba
  lexicon: LSJ
  rationale: «Esperar» comunica bien la noción de expectativa. En español, el imperfecto en la prótasis condicional reproduce con naturalidad el sentido de una expectativa continua o estable.
- source_word: περισσὸν
  english_pob_choice: excessive
  chosen_spanish: superfluo
  alternatives_spanish:
  - excesivo
  - innecesario
  lexicon: LSJ
  rationale: «Superfluo» preserva la idea de algo más allá de lo necesario y suena natural junto a «necio». «Excesivo» es posible, pero en español puede sonar menos idiomático en esta construcción.
- source_word: ληρῶδες
  english_pob_choice: foolish
  chosen_spanish: necio
  alternatives_spanish:
  - insensato
  - absurdo
  lexicon: LSJ
  rationale: El adjetivo griego expresa insensatez o necedad. «Necio» mantiene un tono sobrio y fiel al juicio retórico del texto, sin volverlo más fuerte de lo que el griego exige.
- source_word: ὑπὲρ νεκρῶν
  english_pob_choice: for the dead
  chosen_spanish: por los muertos
  alternatives_spanish:
  - a favor de los muertos
  - en favor de los muertos
  lexicon: LSJ
  rationale: «Por los muertos» refleja de forma directa el valor intercesorio de ὑπέρ con genitivo y es la forma más natural en español. «En favor de» sería más explicativo, pero menos sobrio.
- source_word: εὔχεσθαι
  english_pob_choice: to pray
  chosen_spanish: orar
  alternatives_spanish:
  - rezar
  - hacer oración
  lexicon: LSJ
  rationale: «Orar» corresponde bien al verbo de oración en este contexto y es más natural en español bíblico que una fórmula más literal. Evita además la posible estrechez de «rezar» en registros eclesiales diversos.
theological_decisions:
- issue: Lógica de la resurrección como base para orar por los muertos
  english_pob_reading: The sentence states that prayer for the dead would be excessive and foolish unless the fallen are expected to rise again.
  chosen_spanish_reading: La oración por los muertos queda presentada como lógicamente dependiente de la expectativa de que los caídos resuciten.
  alternative_spanish_readings:
  - Si no se esperaba la resurrección de los caídos, la oración por los muertos sería inútil.
  - La frase podría leerse de modo más explícito como referencia a la resurrección corporal.
  rationale: La traducción conserva la relación argumentativa sin desarrollar más allá del griego una doctrina específica sobre el estado intermedio. Así se preserva la tensión teológica del pasaje y su razonamiento explícito.
  doctrine_reference: Preservar la tensión teológica; primacía del texto original sobre la tradición interpretativa.
translation_notes:
  revision_awareness: 'El texto sigue de cerca el griego de Swete y el audit trail inglés: mantiene la imagen de «caer» para προπεπτωκότας, expresa ἀναστῆναι como resurrección con «resucitaran», y conserva el juicio doble de περισσὸν + ληρῶδες con «superfluo y necio». No se introdujeron cambios doctrinales adicionales ni se suavizó la referencia a orar por los muertos.'
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando el texto griego o hebreo lo exige; aquí no aparece.
  - Se eligió «orar» como equivalente bíblico general de εὔχεσθαι, coherente con el registro del pasaje.
  - «Muertos» se mantiene sin glosa porque el griego no distingue aquí más específicamente el tipo de muerte.
  - La nota [a] preserva la alternativa lexical documentada sin multiplicar notas innecesarias.
