translation:
  language: es
  text: que las nubes derraman; llueven copiosamente sobre la humanidad[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «la gente» / «los seres humanos»; el hebreo אָדָם está en singular genérico para la humanidad.
