translation:
  language: es
  text: Si soy malvado[a], ¡ay de mí! Aun si soy justo, no puedo alzar mi cabeza, lleno de deshonra y viendo mi aflicción.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «y mira mi aflicción» / «y contempla mi aflicción». El hebreo aquí es sintácticamente difícil, y algunos lo toman como una apelación directa a Dios más que como parte de la autodescripción de Job.'
    reason: alternative_reading
lexical_decisions:
- source_word: אִם רָשַׁעְתִּי
  english_pob_choice: If I am wicked
  chosen_spanish: Si soy impío
  alternatives_spanish:
  - Si he actuado impíamente
  - Si soy culpable
  lexicon: HALOT
  rationale: 'El hebreo perfecto puede referirse a una acción ya cometida, pero en este lamento condicional la fuerza natural en español es presentar el estado resultante: ''soy impío''. ''Impío'' conserva mejor el matiz moral que ''culpable'', que suena más forense.'
- source_word: אַלְלַי לִי
  english_pob_choice: woe to me
  chosen_spanish: ¡ay de mí!
  alternatives_spanish:
  - ¡ay para mí!
  - ¡ay de mí!
  lexicon: HALOT
  rationale: Es una exclamación de lamento. '¡Ay de mí!' es una fórmula natural en español y transmite la carga emotiva sin volver el verso artificial.
- source_word: וְצָדַקְתִּי
  english_pob_choice: Even if I am righteous
  chosen_spanish: Aun si soy justo
  alternatives_spanish:
  - Y si soy justo
  - Aun si soy recto
  - Aun si estoy en lo justo
  lexicon: HALOT
  rationale: El valor concesivo exige 'aun si'. 'Justo' preserva el campo moral-jurídico de צדק y suena más directo en español que una paráfrasis como 'estar en lo justo'.
- source_word: לֹא אֶשָּׂא רֹאשִׁי
  english_pob_choice: I cannot lift up my head
  chosen_spanish: no puedo alzar mi cabeza
  alternatives_spanish:
  - no levantaré mi cabeza
  - no levanto mi cabeza
  lexicon: HALOT
  rationale: El modismo expresa no poder mantener la cabeza en alto con confianza o dignidad. 'No puedo alzar mi cabeza' comunica bien esa imposibilidad y sigue de cerca el hebreo.
- source_word: שְׂבַע קָלוֹן
  english_pob_choice: full of disgrace
  chosen_spanish: lleno de vergüenza
  alternatives_spanish:
  - pleno de vergüenza
  - colmado de deshonra
  - lleno de deshonra
  lexicon: HALOT
  rationale: 'שְׂבַע funciona adjetivalmente: ''lleno de''. Para קָלוֹן, ''vergüenza'' expresa de forma clara la deshonra pública y la humillación; ''deshonra'' también sería posible, pero ''vergüenza'' suena más natural en español bíblico contemporáneo.'
- source_word: וּרְאֵה עָנְיִי
  english_pob_choice: and seeing my affliction
  chosen_spanish: y viendo mi aflicción
  alternatives_spanish:
  - y mira mi aflicción
  - y contempla mi aflicción
  - y viendo mi miseria
  lexicon: HALOT
  rationale: 'Se conserva la ambigüedad sintáctica: el hebreo permite entenderlo como continuidad de la autodescripción de Job o como una apelación. ''Viendo mi aflicción'' mantiene la dificultad sin forzar una resolución interpretativa.'
theological_decisions:
- issue: Interpretación de וּרְאֵה עָנְיִי
  english_pob_reading: Continuation of Job's self-description ('seeing my affliction') rather than a direct address to God ('and see my affliction').
  chosen_spanish_reading: Continuación de la autodescripción de Job ('viendo mi aflicción') más que un mandato directo a Dios.
  alternative_spanish_readings:
  - '''y mira mi aflicción'' como ruego directo'
  - '''y contempla mi aflicción'' como exclamación'
  rationale: El hebreo es difícil y admite varias lecturas. En el flujo inmediato del verso, después de 'lleno de vergüenza', la continuidad descriptiva es la opción más sobria. A la vez, la redacción no elimina la posibilidad de una lectura apelativa; simplemente no la impone.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it'
translation_notes:
  revision_awareness: 'La redacción sigue la última revisión del audit trail: se prefirió ''seeing my affliction'' frente a una paráfrasis más libre, buscando una correspondencia más cercana y un español formal, natural y publicable.'
  spanish_consistency_notes:
  - Se usa 'Yahvé' cuando el texto fuente requiere el nombre divino; aquí no aparece.
  - Se mantiene 'justo' para צדק por su valor moral-jurídico y su naturalidad en español.
  - Se evita 'culpable' en el primer hemistiquio para no desplazar el énfasis moral de רשע hacia un marco forense.
  - '''Vergüenza'' traduce קָלוֹן en un español claro; ''deshonra'' queda como alternativa lexicográfica.'
  - La nota de pie conserva la tensión interpretativa documentada en el audit trail sin resolverla artificialmente.
