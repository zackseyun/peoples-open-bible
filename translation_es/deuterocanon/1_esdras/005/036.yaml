translation:
  language: es
  text: Estos fueron los que subieron de Thermeleth y Thelersas[a]; sus jefes eran Charaathalan y Allar[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El nombre Thelersas refleja el testimonio griego. El paralelo hebreo en Esdras 2:52 presenta nombres distintos en esta posición, lo que muestra que 1 Esdras aquí no coincide estrechamente con la tradición masorética.
    reason: alternative_reading
  - marker: b
    text: 'O, más formalmente: «Estos, habiendo subido de Thermeleth y Thelersas, teniendo por jefes a Charaathalan y Allar».'
    reason: lexical_alternative
lexical_decisions:
- source_word: οὗτοι
  english_pob_choice: These were the ones
  chosen_spanish: Estos fueron los que
  alternatives_spanish:
  - Estos
  - Éstos fueron los que
  lexicon: LSJ
  rationale: El demostrativo introduce un grupo ya identificado en una lista. «Estos fueron los que» conserva el valor resumptivo del griego con español natural y digno.
- source_word: ἀναβάντες
  english_pob_choice: came up
  chosen_spanish: subieron
  alternatives_spanish:
  - fueron hacia arriba
  - vinieron subiendo
  - ascendieron
  lexicon: LSJ
  rationale: En contextos de retorno o subida a un lugar, ἀναβαίνω admite «subir». En español suena más natural que «vinieron subiendo» y mantiene la idea de movimiento ascendente/retorno.
- source_word: ἀπὸ
  english_pob_choice: from
  chosen_spanish: desde
  alternatives_spanish:
  - de
  - a partir de
  lexicon: LSJ
  rationale: «Desde» expresa origen o procedencia de forma clara en español y conserva el matiz direccional del griego.
- source_word: Θερμέλεθ
  english_pob_choice: Thermeleth
  chosen_spanish: Thermeleth
  alternatives_spanish:
  - Termeleth
  lexicon: transliteración de nombre propio
  rationale: Nombre de lugar transliterado directamente del testigo griego, sin normalizarlo por una tradición hebrea paralela que aquí no es la fuente primaria.
- source_word: Θελερσάς
  english_pob_choice: Thelersas
  chosen_spanish: Thelersas
  alternatives_spanish:
  - Thelersa
  - Telersás
  lexicon: transliteración de nombre propio
  rationale: Se conserva la forma griega transmitida. La tradición paralela hebrea muestra otra forma de nombre, pero en 1 Esdras el texto griego es el ancla principal.
- source_word: ἡγούμενος
  english_pob_choice: their leaders being
  chosen_spanish: sus dirigentes eran
  alternatives_spanish:
  - los guiaban
  - eran sus líderes
  - iban al frente de ellos
  lexicon: LSJ
  rationale: El participio presente tiene aquí valor predicativo y puede expresarse en español con una frase nominal. «Dirigentes» reproduce el sentido de liderazgo sin forzar una estructura participial pesada.
- source_word: αὐτῶν
  english_pob_choice: them
  chosen_spanish: sus
  alternatives_spanish:
  - de ellos
  - a ellos
  lexicon: LSJ
  rationale: 'En combinación con el participio de liderazgo, el genitivo se expresa de manera natural en español con posesivo relacional: «sus dirigentes».'
- source_word: Χαρααθαλὰν
  english_pob_choice: Charaathalan
  chosen_spanish: Charaathalan
  alternatives_spanish:
  - Jaraathalán
  - Harathalan
  lexicon: transliteración de nombre propio
  rationale: Se preserva la transliteración del griego, evitando ajustar el nombre a formas más familiares que no pertenecen al testigo base.
- source_word: Ἀλλάρ
  english_pob_choice: Allar
  chosen_spanish: Allar
  alternatives_spanish:
  - Alar
  - Alar
  lexicon: transliteración de nombre propio
  rationale: Nombre propio conservado según la forma griega.
translation_notes:
  revision_awareness: El borrador sigue de cerca el testimonio griego de Swete LXX 1909, con atención al paralelismo hebreo solo como control de nombres propios. Se preserva la estructura listada del verso y se refleja la relación predicativa del participio ἡγούμενος con una formulación española natural. Se mantiene la diferencia entre la forma griega Thelersas y el paralelo hebreo, tal como lo hace el audit trail en inglés.
  spanish_consistency_notes:
  - Se usa «subieron» para ἀναβάντες en sentido de ascenso/retorno, coherente con listas de repatriados.
  - Se emplea «dirigentes» para ἡγούμενος para evitar una paráfrasis excesiva y conservar el valor de liderazgo.
  - Los nombres propios se transliteran sin armonizarlos con la tradición hebrea paralela.
  - Se mantiene un registro sobrio y publicable, apto para lectura litúrgica o académica.
