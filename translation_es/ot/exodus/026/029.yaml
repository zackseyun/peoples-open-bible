- from: Cubrirás de oro[a] los marcos, harás sus anillos de oro como soportes para las barras[b], y cubrirás de oro las barras.
  to: Recubrirás de oro los marcos[a], harás sus anillos de oro como soportes para las barras[b], y recubrirás de oro las barras.
  rationale: Se corrige el aparato de notas para alinearlo con la auditoría inglesa y con las verdaderas alternativas léxicas del hebreo. También se cambia ‘cubrirás de oro’ por ‘recubrirás de oro’ para reflejar mejor el sentido artesanal de צפה (‘revestir/recubrir’) en este contexto del tabernáculo, sin alterar la estructura ni la claridad del español.
