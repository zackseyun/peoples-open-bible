translation:
  language: es
  text: Si hay una joven, virgen, desposada[a] con un hombre, y otro hombre la encuentra en la ciudad y se acuesta con ella,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «prometida a un hombre». El hebreo denota un compromiso formal y jurídicamente vinculante.
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי / יִהְיֶה
  english_pob_choice: If there is
  chosen_spanish: Si hay
  alternatives_spanish:
  - Cuando hay
  - Si ocurre que hay
  lexicon: HALOT
  rationale: El hebreo introduce un caso legal hipotético; «Si hay» conserva bien la fuerza casuística en español natural.
- source_word: נַעֲרָה
  english_pob_choice: young woman
  chosen_spanish: joven
  alternatives_spanish:
  - muchacha
  - doncella
  lexicon: HALOT
  rationale: En español, «joven» funciona como equivalente natural para una mujer en edad matrimonial sin cargar un matiz demasiado infantil como podría hacerlo «muchacha».
- source_word: בְתוּלָה
  english_pob_choice: a virgin
  chosen_spanish: virgen
  alternatives_spanish:
  - doncella
  - virgen
  lexicon: HALOT
  rationale: «Virgen» preserva el dato legal y social explícito del hebreo sin suavizarlo.
- source_word: מְאֹרָשָׂה לְאִישׁ
  english_pob_choice: pledged to a man
  chosen_spanish: comprometida con un hombre
  alternatives_spanish:
  - desposada con un hombre
  - prometida a un hombre
  lexicon: HALOT
  rationale: El inglés POB documenta un compromiso formal y jurídicamente vinculante. En español, «comprometida» comunica esa vinculación de forma clara y pública; «desposada» o «prometida» pueden sonar más tradicionales o menos precisas según el contexto.
- source_word: וּמְצָאָהּ אִישׁ
  english_pob_choice: and another man finds her
  chosen_spanish: y otro hombre la encuentra
  alternatives_spanish:
  - y un hombre la encuentra
  - y un hombre la halla
  lexicon: HALOT
  rationale: El hebreo dice simplemente «un hombre», pero el contexto contrasta a ese hombre con el hombre al que está comprometida. «Otro hombre» sigue la decisión explicativa del POB inglés.
- source_word: בָּעִיר
  english_pob_choice: in the city
  chosen_spanish: en la ciudad
  alternatives_spanish:
  - en la ciudad
  - en el pueblo
  lexicon: HALOT
  rationale: «Ciudad» reproduce la localización del hebreo y el valor jurídico que el contexto sugiere.
- source_word: וְשָׁכַב עִמָּהּ
  english_pob_choice: and lies with her
  chosen_spanish: y se acuesta con ella
  alternatives_spanish:
  - y yace con ella
  - y tiene relaciones sexuales con ella
  lexicon: HALOT
  rationale: «Se acuesta con ella» es un eufemismo español natural para el acto sexual, conservando el registro discreto del hebreo mejor que una explicación explícita.
theological_decisions:
- issue: Si hacer explícita la coerción sexual en este versículo
  english_pob_reading: Render neutrally as 'lies with her' without adding 'rapes' or 'forces'
  chosen_spanish_reading: Traducir neutralmente como «se acuesta con ella» sin añadir «viola» ni «la fuerza»
  alternative_spanish_readings:
  - y la viola
  - y la fuerza a acostarse con él
  rationale: El hebreo de este versículo no nombra por sí mismo la coerción; el contexto legal posterior es el que distingue las circunstancias. Para no resolver una tensión que el texto no resuelve aquí, se mantiene la neutralidad del original.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: 'Alineado con el POB inglés vigente: no se introdujeron revisiones posteriores; se conservó la lectura casuística, el carácter jurídico de la relación y la neutralidad respecto de la coerción.'
  spanish_consistency_notes:
  - Se mantuvo «hombre» para corresponder al hebreo אִישׁ, con la aclaración contextual «otro hombre» como en el POB inglés.
  - «Virgen» se conservó por su valor legal explícito; no se suavizó a un término meramente social.
  - El eufemismo sexual se mantuvo en un español natural y digno, sin expandir el sentido más allá del hebreo.
