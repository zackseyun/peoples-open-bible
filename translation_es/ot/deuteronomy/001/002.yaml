- from: Son once días desde Horeb por el camino del monte Seir hasta Kadesh-barnea[a][b].
  to: Son once días desde Horeb por la ruta del monte Seir hasta Kadesh-barnea[a][b].
  rationale: 'Se ajusta únicamente la expresión de la ruta: «por la ruta del monte Seir» comunica mejor el valor geográfico de דֶּרֶךְ הַר שֵׂעִיר en español natural y evita la ambigüedad posesiva de «camino del monte». Se mantienen el sentido literal de la cláusula nominal, «Horeb» y las notas existentes.'
