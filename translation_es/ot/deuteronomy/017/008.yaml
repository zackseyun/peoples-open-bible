revisions:
- from: Si un asunto para juicio[a] te resulta demasiado difícil[b] —entre sangre y sangre, entre una causa y otra, y entre una lesión y otra[c], asuntos de controversia dentro de tus puertas[d]—, entonces te levantarás y subirás al lugar que Yahvé tu Dios escogerá.
