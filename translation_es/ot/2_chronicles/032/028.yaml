translation:
  language: es
  text: almacenes para el producto de grano[a], vino nuevo[b] y aceite, y establos para todo tipo de animales, y rediles[c] para los rebaños.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «ciudades de almacenamiento» para מִסְכְּנוֹת, si el término se entiende de manera más literal como complejos de depósito más amplios que simples almacenes.
    reason: lexical_alternative
  - marker: b
    text: «Vino nuevo» traduce תִירוֹשׁ, un término que a menudo se distingue de palabras más generales para vino en listas agrícolas.
    reason: lexical_alternative
  - marker: c
    text: O «corrales» o «cercados» para «rediles».
    reason: lexical_alternative
lexical_decisions:
- source_word: מִסְכְּנוֹת
  english_pob_choice: storehouses
  chosen_spanish: almacenes
  alternatives_spanish:
  - depósitos
  - graneros
  - ciudades de almacenamiento
  lexicon: HALOT
  rationale: En este contexto de provisión, el término designa instalaciones de almacenamiento. «Almacenes» comunica bien la función sin forzar la expresión más literal «ciudades de almacenamiento», que en español suena pesada y menos natural.
- source_word: תְבוּאַת
  english_pob_choice: produce of
  chosen_spanish: producción de
  alternatives_spanish:
  - producto de
  - rendimiento de
  - cosecha de
  lexicon: HALOT
  rationale: El constructo indica el rendimiento o producto agrícola. «Producción de» conserva la relación con la lista siguiente y resulta natural en español.
- source_word: דָּגָן
  english_pob_choice: grain
  chosen_spanish: grano
  alternatives_spanish:
  - cereal
  - trigo
  lexicon: HALOT
  rationale: En listas agrícolas bíblicas, דָּגָן se refiere al grano en general. «Grano» es la equivalencia más amplia y no restringe indebidamente el término a trigo.
- source_word: תִירוֹשׁ
  english_pob_choice: new wine
  chosen_spanish: vino nuevo
  alternatives_spanish:
  - vino joven
  - vino fresco
  lexicon: HALOT
  rationale: El término suele distinguirse del vino en sentido general y se usa en triadas agrícolas. «Vino nuevo» preserva esa distinción tradicional y sigue de cerca el valor léxico del hebreo.
- source_word: יִצְהָר
  english_pob_choice: oil
  chosen_spanish: aceite
  alternatives_spanish:
  - aceite de oliva
  - óleo
  lexicon: HALOT
  rationale: En esta triada agrícola, יִצְהָר designa aceite, normalmente de oliva. «Aceite» es la forma breve y estándar; «aceite de oliva» sería explicativa, pero no es necesaria aquí.
- source_word: אֻרָוֹת
  english_pob_choice: stalls
  chosen_spanish: establos
  alternatives_spanish:
  - cuadras
  - pesebres
  - corrales
  lexicon: HALOT
  rationale: El plural señala lugares para albergar animales. «Establos» es una equivalencia clara y digna; «corrales» o «pesebres» estrecharían o desplazarían el sentido.
- source_word: לְכָל בְּהֵמָה וּבְהֵמָה
  english_pob_choice: for all kinds of animals
  chosen_spanish: para todo tipo de animales
  alternatives_spanish:
  - para todo tipo de ganado
  - para todo animal
  - para todo género de bestias
  lexicon: HALOT
  rationale: בְּהֵמָה es un término amplio para animales domésticos o ganado. La repetición enfática se refleja de modo natural con «todo tipo de animales», sin reducirlo solo a «ganado» ni elevarlo a «bestias».
- source_word: עֲדָרִים
  english_pob_choice: flocks
  chosen_spanish: rebaños
  alternatives_spanish:
  - piaras
  - manadas
  lexicon: HALOT
  rationale: El sustantivo suele referirse a rebaños, especialmente de ovejas y cabras. «Rebaños» mantiene esa imagen pastoral mejor que «manadas».
- source_word: אֲוֵרוֹת
  english_pob_choice: folds
  chosen_spanish: rediles
  alternatives_spanish:
  - corrales
  - apriscos
  - enclosures
  lexicon: HALOT
  rationale: El término denota recintos para guardar los rebaños. «Rediles» es una opción bíblica y natural en español; «corrales» sería posible, pero menos específico para el contexto pastoril.
translation_notes:
  revision_awareness: La redacción sigue de cerca la estructura hebrea y la equivalencia funcional de la POB en inglés, pero ajusta la sintaxis al español natural. Se mantuvo la lista agrícola y pastoril sin suavizar el contraste entre almacenamiento de productos y alojamiento de animales. También se conservó la posibilidad interpretativa de מִסְכְּנוֹת mediante una nota, porque el inglés auditado preserva esa alternativa.
  spanish_consistency_notes:
  - Se usa «almacenes» para מִסְכְּנוֹת, coherente con el valor funcional del contexto.
  - Se mantiene la tríada agrícola con «grano, vino nuevo y aceite» para conservar la distinción léxica.
  - «Rebaños» y «rediles» reflejan la pareja pastoral עֲדָרִים / אֲוֵרוֹת sin introducir términos más técnicos que el texto no exige.
  - La nota solo se ancla en «almacenes», donde existe la alternativa documentada en el audit trail.
