translation:
  language: es
  text: Y la llamó Shibá[a]; por eso el nombre de la ciudad es Beerseba hasta el día de hoy.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Shibá reproduce el nombre hebreo שִׁבְעָה, que suena como la palabra para «siete» y está relacionado con el juego de palabras detrás de Beerseba, que puede entenderse como «pozo de siete» o «pozo del juramento».
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּקְרָא
  english_pob_choice: he called
  chosen_spanish: lo llamó
  alternatives_spanish:
  - lo nombró
  - lo llamó por nombre
  lexicon: HALOT
  rationale: En contexto de poner nombre, קרא funciona como ‘llamar/nombrar’. ‘Lo llamó’ conserva la acción narrativa y suena natural en español sin perder la relación con el acto de nombrar.
- source_word: אֹתָהּ
  english_pob_choice: it
  chosen_spanish: lo
  alternatives_spanish:
  - la
  lexicon: HALOT
  rationale: El pronombre hebreo remite al objeto nombrado en el contexto inmediato. En español, ‘lo’ funciona de manera idiomática para el referente inanimado, aunque el antecedente sea femenino en hebreo.
- source_word: שִׁבְעָה
  english_pob_choice: Shibah
  chosen_spanish: Sibá
  alternatives_spanish:
  - Shibá
  - Sibah
  - Siba
  lexicon: HALOT
  rationale: Se conserva como nombre propio transliterado. Se adapta la grafía al español con acento agudo para marcar la sílaba tónica final. La forma mantiene el juego sonoro con el hebreo para ‘siete’ sin traducir el nombre en el texto principal.
- source_word: עַל כֵּן
  english_pob_choice: therefore
  chosen_spanish: por eso
  alternatives_spanish:
  - por tanto
  - por esta razón
  lexicon: HALOT
  rationale: La locución introduce la conclusión explicativa del nombre de la ciudad. ‘Por eso’ es natural en español y conserva el vínculo causal.
- source_word: שֵׁם הָעִיר
  english_pob_choice: the name of the city
  chosen_spanish: el nombre de la ciudad
  alternatives_spanish:
  - el nombre de aquella ciudad
  - el nombre de la ciudad
  lexicon: HALOT
  rationale: Se mantiene la estructura explicativa del hebreo con una frase directa y clara en español.
- source_word: בְּאֵר שֶׁבַע
  english_pob_choice: Beersheba
  chosen_spanish: Beerseba
  alternatives_spanish:
  - Beerseba
  - Bersabee
  lexicon: HALOT
  rationale: Se translitera el topónimo como nombre propio en español. Se evita traducirlo en el texto principal porque el audit trail inglés preserva el nombre como forma estable, y el juego etimológico se reserva para nota.
- source_word: עַד הַיּוֹם הַזֶּה
  english_pob_choice: to this day
  chosen_spanish: hasta el día de hoy
  alternatives_spanish:
  - hasta hoy
  - hasta este día
  lexicon: HALOT
  rationale: Expresión temporal idiomática en español que reproduce el sentido de permanencia narrativa del hebreo.
translation_notes:
  revision_awareness: El contexto en inglés mantiene la lectura estable sin cambios de revisión; la versión española sigue esa decisión, conservando el nombre propio y la nota explicativa sobre el juego de palabras hebreo.
  spanish_consistency_notes:
  - Se usa Beerseba de forma consistente como topónimo en español.
  - Se conserva un nombre propio transliterado para שִׁבְעָה y se explica el juego etimológico solo en nota.
  - La construcción narrativa breve sigue de cerca el hebreo sin calco excesivo.
