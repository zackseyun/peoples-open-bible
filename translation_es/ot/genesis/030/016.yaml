translation:
  language: es
  text: 'Cuando Jacob llegó del campo al anochecer, Lea salió a su encuentro y le dijo: «Debes venir a mí, porque te he contratado[a] con las mandrágoras de mi hijo». Y se acostó con ella aquella noche.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «te he pagado»; o, «te he contratado por las mandrágoras de mi hijo». El hebreo puede entenderse como precio o medio del arreglo.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּבֹא
  english_pob_choice: came in
  chosen_spanish: venía
  alternatives_spanish:
  - llegó
  - entró
  lexicon: HALOT
  rationale: El verbo בוא puede expresar ‘venir/entrar’; en español, ‘venía’ mantiene el movimiento de regreso desde el campo hacia el ámbito doméstico y fluye bien con el resto de la escena. No se fuerza un ‘entró’ demasiado explícito antes de que Lea lo invite a acercarse a ella.
- source_word: מִן הַשָּׂדֶה
  english_pob_choice: from the field
  chosen_spanish: del campo
  alternatives_spanish:
  - desde el campo
  - del terreno
  lexicon: HALOT
  rationale: ‘Campo’ preserva el entorno agrícola del relato. ‘Del campo’ es la forma natural y directa en español.
- source_word: בָּעֶרֶב
  english_pob_choice: in the evening
  chosen_spanish: al anochecer
  alternatives_spanish:
  - por la tarde
  - en la noche
  lexicon: HALOT
  rationale: La expresión hebrea marca el momento del día de forma general; ‘al anochecer’ comunica bien el cierre del día con un tono bíblico natural en español.
- source_word: לִקְרָאתוֹ
  english_pob_choice: to meet him
  chosen_spanish: a su encuentro
  alternatives_spanish:
  - para encontrarlo
  - a recibirlo
  lexicon: HALOT
  rationale: La combinación de salida + encuentro requiere un giro idiomático en español. ‘A su encuentro’ expresa bien el movimiento intencional de Lea sin endurecer el texto.
- source_word: אֵלַי תָּבוֹא
  english_pob_choice: You must come in to me
  chosen_spanish: Tú debes venir a mí
  alternatives_spanish:
  - Debes venir a mí
  - Tú vendrás a mí
  lexicon: HALOT
  rationale: En contexto, la frase es una invitación/summons sexual directa. ‘Venir a mí’ conserva la fuerza idiomática sin recurrir a una formulación demasiado cruda. Se evitó ‘entrar en mí’ por ser más ambigua en español y más marcada estilísticamente.
- source_word: שָׂכֹר שְׂכַרְתִּיךָ
  english_pob_choice: I have hired you
  chosen_spanish: te he alquilado
  alternatives_spanish:
  - te he contratado
  - te he pagado
  lexicon: HALOT
  rationale: El hebreo usa repetición intensiva del verbo שכר, con sentido transaccional. ‘Alquilar’ refleja mejor el matiz de intercambio/compra-venta de servicio que ‘contratar’ en español moderno, y mantiene la dureza lexical del original. Se omite cualquier intensificación adverbial añadida no requerida por el hebreo, en línea con la revisión inglesa.
- source_word: בְּדוּדָאֵי בְּנִי
  english_pob_choice: with my son’s mandrakes
  chosen_spanish: con las mandrágoras de mi hijo
  alternatives_spanish:
  - por las mandrágoras de mi hijo
  - a cambio de las mandrágoras de mi hijo
  lexicon: HALOT
  rationale: ‘Mandrágoras’ conserva el referente botánico tradicional y comprensible. ‘Con’ refleja la preposición hebrea ב, mientras deja abierta la fuerza instrumental o de precio que el contexto aporta; por eso se conserva la tensión interpretativa en la nota.
- source_word: וַיִּשְׁכַּב עִמָּהּ
  english_pob_choice: he lay with her
  chosen_spanish: se acostó con ella
  alternatives_spanish:
  - yacía con ella
  - durmió con ella
  lexicon: HALOT
  rationale: Es el eufemismo bíblico habitual para relaciones sexuales. ‘Se acostó con ella’ es claro y digno en español moderno, y conserva la fuerza idiomática mejor que ‘durmió con ella’.
- source_word: בַּלַּיְלָה הוּא
  english_pob_choice: that night
  chosen_spanish: aquella noche
  alternatives_spanish:
  - esa noche
  - esa misma noche
  lexicon: HALOT
  rationale: ‘Aquella noche’ traduce naturalmente la referencia temporal puntual y mantiene el valor del demostrativo hebreo sin recargar la frase.
theological_decisions:
- issue: Naturaleza del intercambio entre Lea y Jacob
  english_pob_reading: The Hebrew links Leah’s claim to the mandrakes as the price or means of the arrangement.
  chosen_spanish_reading: El hebreo vincula la afirmación de Lea con las mandrágoras como el precio o el medio del arreglo.
  alternative_spanish_readings:
  - Las mandrágoras fueron el precio del arreglo.
  - Las mandrágoras fueron el medio por el cual se hizo el arreglo.
  rationale: No se debe cerrar la ambigüedad del hebreo entre precio, medio o instrumento. La formulación española conserva esa tensión, que el propio audit trail inglés documenta.
  doctrine_reference: No aplica; cuestión lexical/interpretativa del texto narrativo.
translation_notes:
  revision_awareness: La redacción sigue de cerca el texto hebreo y refleja la revisión inglesa más reciente, que eliminó una intensificación excesiva de la frase verbal. También conserva la ambigüedad documentada sobre la preposición con las mandrágoras, sin decidirla de manera innecesaria.
  spanish_consistency_notes:
  - Se usa ‘Yahvé’ como término por defecto cuando corresponda, pero este versículo no contiene el nombre divino.
  - Se mantiene ‘mandrágoras’ y el campo semántico transaccional del verbo con una nota para no perder la ambigüedad del hebreo.
  - Se conserva un tono bíblico claro y moderno, evitando calcos innecesarios como ‘entra a mí’ o ‘durmió con ella’.
