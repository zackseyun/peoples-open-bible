translation:
  language: es
  text: Pero Alcimo, al percibir la buena disposición mutua y enterarse de los acuerdos[b] que se habían hecho, fue a Demetrio y dijo que Nicanor favorecía intereses contrarios al Estado[a]; porque había designado a Judas, el que conspiraba contra su reino, como sucesor.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, más literalmente: «pensaba cosas ajenas a los asuntos públicos». El giro griego expresa deslealtad política o conducta contraria a los intereses del reino.'
    reason: lexical_alternative
  - marker: b
    text: «Acuerdos» también puede entenderse como «tratados» o «pactos», refiriéndose a las disposiciones hechas entre las partes.
    reason: lexical_alternative
lexical_decisions:
- source_word: συνιδὼν
  english_pob_choice: perceiving
  chosen_spanish: al percibir
  alternatives_spanish:
  - al ver
  - al darse cuenta de
  - al comprender
  lexicon: LSJ
  rationale: El participio expresa reconocer o advertir la situación, no solo verla con los ojos. «Al percibir» conserva ese matiz de toma de conciencia en un español natural.
- source_word: εὔνοιαν
  english_pob_choice: goodwill
  chosen_spanish: buena disposición mutua
  alternatives_spanish:
  - benevolencia mutua
  - amistad mutua
  - favor mutuo
  lexicon: LSJ
  rationale: El contexto es relacional y político. «Buena disposición mutua» comunica benevolencia entre las partes sin cargar el texto con una intimidad que el griego no exige.
- source_word: συνθήκας
  english_pob_choice: agreements
  chosen_spanish: acuerdos
  alternatives_spanish:
  - tratados
  - pactos
  - convenciones
  lexicon: LSJ
  rationale: El término puede ser acuerdos, tratados o términos. «Acuerdos» es amplio, claro y fiel al contexto inmediato.
- source_word: λαβὼν
  english_pob_choice: learning of
  chosen_spanish: enterarse de
  alternatives_spanish:
  - haber recibido noticia de
  - tomar nota de
  - haber sabido de
  lexicon: LSJ
  rationale: Aunque literalmente es «habiendo recibido», con el complemento correspondiente funciona idiomáticamente como recibir noticia. «Enterarse de» conserva la naturalidad española y el matiz de información recibida.
- source_word: ἀλλότρια φρονεῖν τῶν πραγμάτων
  english_pob_choice: was favoring interests contrary to the state
  chosen_spanish: favorecía intereses contrarios al Estado
  alternatives_spanish:
  - pensaba cosas ajenas a los asuntos públicos
  - tomaba partido contrario a los asuntos del Estado
  - obraba contra los intereses públicos
  lexicon: LSJ
  rationale: El giro es idiomático y político. En español, «favorecía intereses contrarios al Estado» preserva la acusación de deslealtad o daño político sin volver el texto oscuro o demasiado literal.
- source_word: τῶν πραγμάτων
  english_pob_choice: the state
  chosen_spanish: el Estado
  alternatives_spanish:
  - los asuntos
  - los asuntos públicos
  - la situación política
  lexicon: LSJ
  rationale: En esta acusación, πράγματα se refiere a asuntos de gobierno o del reino. «El Estado» refleja bien ese alcance político en español contemporáneo.
- source_word: ἐπίβουλον
  english_pob_choice: the plotter against
  chosen_spanish: el que conspiraba contra
  alternatives_spanish:
  - el conspirador contra
  - el que tramaba contra
  - el enemigo de
  lexicon: LSJ
  rationale: El adjetivo denota a quien maquina contra otro. «El que conspiraba contra» conserva la fuerza hostil y evita introducir una formulación más rígida de la necesaria.
- source_word: διάδοχον
  english_pob_choice: as successor
  chosen_spanish: como sucesor
  alternatives_spanish:
  - como heredero
  - como reemplazo
  - como designado sucesor
  lexicon: LSJ
  rationale: El término indica sucesor o designado para seguir. «Como sucesor» es la opción más directa y no fuerza implicaciones hereditarias.
- source_word: ἀπέδειξεν
  english_pob_choice: had appointed
  chosen_spanish: había designado
  alternatives_spanish:
  - había nombrado
  - había señalado
  - había declarado
  lexicon: LSJ
  rationale: En este contexto el verbo implica designar o nombrar para una función de sucesión. «Había designado» transmite bien la intención sin sobreespecificar el cargo.
theological_decisions:
- issue: Sentido político de la acusación contra Nicanor
  english_pob_reading: Nicanor was favoring interests contrary to the state.
  chosen_spanish_reading: Nicanor favorecía intereses contrarios al Estado.
  alternative_spanish_readings:
  - Nicanor obraba contra los intereses públicos.
  - Nicanor seguía una línea contraria a los asuntos del Estado.
  rationale: No es una cuestión doctrinal, sino interpretativa. La formulación elegida conserva el sentido político del idiomático griego sin caer en una traducción mecánica e ininteligible.
  doctrine_reference: Translation philosophy §1, §6
- issue: Fuerza de διάδοχον en relación con Judas
  english_pob_reading: Judas ... as successor
  chosen_spanish_reading: Judas ... como sucesor
  alternative_spanish_readings:
  - Judas ... como heredero
  - Judas ... como reemplazo
  rationale: El griego sugiere designación para la sucesión. «Sucesor» es la equivalencia más directa y evita añadir una idea hereditaria que el texto no exige.
  doctrine_reference: Translation philosophy §1, §5
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión más reciente del auditable inglés, que ajustó la naturalidad de la frase sobre la buena disposición mutua y afinó el valor político de ἀλλότρια φρονεῖν προς/τῶν πραγμάτων. La redacción española conserva ese matiz político y evita un calco demasiado literal.
  spanish_consistency_notes:
  - Se mantuvo «Estado» para πράγματα en el sentido político, coherente con el contexto y con la lectura inglesa auditada.
  - Se usó «sucesor» para διάδοχον sin convertirlo en «heredero», para no añadir una implicación dinástica no asegurada por el griego.
  - Se evitó «Señor» u otras sustituciones teológicas innecesarias, ya que el versículo no contiene terminología divina directa.
