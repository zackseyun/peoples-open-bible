lexical_decisions:
- source_word: וַיִּבֶן
  english_pob_choice: built
  chosen_spanish: construyó
  alternatives_spanish:
  - edificó
  - levantó
  lexicon: HALOT
  rationale: El qal wayyiqtol de בנה en este contexto real de obras urbanas puede abarcar construcción o fortalecimiento, pero el sentido básico es de edificación. En español, "construyó" comunica bien la acción sin forzar una lectura técnica de fortificación que el texto no explicita.
- source_word: שְׁלֹמֹה
  english_pob_choice: Solomon
  chosen_spanish: Salomón
  alternatives_spanish:
  - Solomon
  lexicon: transliteración estándar del nombre propio
  rationale: Se usa la forma española habitual del nombre אישי, manteniendo inteligibilidad y coherencia bíblica en español.
- source_word: גָּזֶר
  english_pob_choice: Gezer
  chosen_spanish: Gezer
  alternatives_spanish:
  - Gézer
  lexicon: transliteración del topónimo
  rationale: Se conserva el nombre geográfico en forma transliterada, como en la edición inglesa, para mantener la identificación del lugar.
- source_word: בֵּית חֹרֹן תַּחְתּוֹן
  english_pob_choice: Lower Beth-horon
  chosen_spanish: Bet-horón la de abajo
  alternatives_spanish:
  - Bet-horón la inferior
  - Bet-horón inferior
  - Bet-horón el de abajo
  lexicon: HALOT
  rationale: La expresión hebrea marca el Beth-horon inferior frente al superior. En español, "la de abajo" conserva la distinción espacial de manera natural y evita una traducción rígida. Se mantiene el topónimo con guion para reflejar la unidad del nombre.
- source_word: אֶת / וְאֶת
  english_pob_choice: '[not translated separately]'
  chosen_spanish: '[no se traduce aparte]'
  alternatives_spanish:
  - acusativos directos implícitos
  lexicon: función gramatical del marcador de objeto directo
  rationale: Los marcadores de objeto directo no tienen equivalente léxico independiente en español; su función queda absorbida por la sintaxis verbal.
translation_notes:
  revision_awareness: El texto se alinea con el paquete fuente hebreo y con la decisión inglesa de mantener el sentido simple de בנה como "built"; no hay revisiones aplicadas en el pasaje y el estado de concordancia es alto.
  spanish_consistency_notes:
  - Se mantiene la coordinación simple con "y" para reproducir la cadena verbal narrativa del hebreo.
  - El topónimo compuesto se conserva sin añadir explicaciones interpretativas al cuerpo del texto.
  - La nota al pie preserva la alternativa lexical principal para el segundo topónimo, como en el audit trail inglés.
