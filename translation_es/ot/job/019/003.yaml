  glossary_alignment: No hay términos teológicos de proyecto implicados. Las decisiones léxicas principales son compatibles con la auditoría inglesa, salvo que «hacerme mal» queda algo por debajo de «wrong me» en precisión; «hacerme injusticia» conserva mejor la fuerza forense/moral y sigue dejando espacio a las alternativas documentadas en nota.
