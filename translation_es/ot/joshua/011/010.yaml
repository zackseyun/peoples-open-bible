base_translation:
  language: en
  yaml_path: translation/ot/joshua/011/010.yaml
  text: At that time Joshua turned back and captured Hazor[a], and he struck its king with the sword[c][b], for formerly Hazor was the head of all these kingdoms.
  footnotes:
  - marker: a
    text: Or 'returned.' The Hebrew verb can be rendered either way; 'turned back' was chosen to preserve the directional nuance of the campaign movement.
    reason: lexical_alternative
  - marker: b
    text: Or 'was chief over all these kingdoms.' The Hebrew literally says 'was the head of all these kingdoms,' using a metaphor for primacy.
    reason: lexical_alternative
  - marker: c
    text: '''Struck ... with the sword'' is a restrained rendering of the Hebrew. In context the phrase likely implies killing, but the verb itself is literally ''struck.'''
    reason: lexical_alternative
