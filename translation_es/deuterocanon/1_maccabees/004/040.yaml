translation:
  language: es
  text: Y cayeron con el rostro en tierra, y tocaron las trompetas de señal[a], y gritaron al cielo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, más literalmente: «las trompetas de las señales». La frase probablemente se refiere a trompetas usadas para dar señales, más que a estandartes o banderas físicos.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἔπεσον ἐπὶ πρόσωπον ἐπὶ τὴν γῆν
  english_pob_choice: fell facedown on the ground
  chosen_spanish: cayeron rostro en tierra
  alternatives_spanish:
  - cayeron postrados en tierra
  - cayeron con el rostro en tierra
  lexicon: LSJ
  rationale: La expresión griega es un modismo de postración física con el rostro hacia el suelo. «Cayeron rostro en tierra» conserva la imagen corporal y suena natural en español bíblico sin añadir una interpretación más amplia de adoración que no está explícita en el texto.
- source_word: ἐσάλπισαν
  english_pob_choice: sounded
  chosen_spanish: tocaron
  alternatives_spanish:
  - sonaron
  - dieron toque
  lexicon: LSJ
  rationale: En español, con trompetas, «tocaron» comunica de forma natural la acción de hacer sonar el instrumento. Mantiene la brevedad del griego sin explicitar un objeto verbal adicional.
- source_word: ταῖς σάλπιγξιν τῶν σημαιῶν
  english_pob_choice: the signal trumpets
  chosen_spanish: las trompetas de señal
  alternatives_spanish:
  - las trompetas de los señalamientos
  - las trompetas para señales
  - las trompetas señaladoras
  lexicon: LSJ
  rationale: El audit trail inglés entiende la frase como trompetas usadas para señales, no necesariamente como «estandartes». «Trompetas de señal» conserva esa función y evita forzar una lectura de banderas o estandartes que el contexto no exige.
- source_word: ἐβόησαν εἰς οὐρανόν
  english_pob_choice: cried out to heaven
  chosen_spanish: gritaron al cielo
  alternatives_spanish:
  - clamaron al cielo
  - gritaron hacia el cielo
  - alzaron un clamor al cielo
  lexicon: LSJ
  rationale: El verbo expresa un grito fuerte o clamor dirigido hacia arriba. «Gritaron al cielo» reproduce la intensidad y la dirección sin sobrecargar el español con una formulación más interpretativa.
translation_notes:
  revision_awareness: El texto griego y la auditoría inglesa coinciden de manera alta y no requieren revisión sustantiva. La única decisión sensible es la expresión τῶν σημαιῶν, que en español se mantiene como una función de señalización, no como un objeto ceremonial diferente.
  spanish_consistency_notes:
  - Se evitó «SEÑOR» u otra sustitución teológica porque el versículo no contiene el Tetragrámaton ni κύριος.
  - «Cielo» se usa como destino/dirección del grito, en paralelo con εἰς οὐρανόν, sin añadir una referencia doctrinal adicional.
  - El registro mantiene sobriedad bíblica contemporánea y evita calcos innecesarios como «de los signos» o «de las señales» si oscurecen la fluidez.
