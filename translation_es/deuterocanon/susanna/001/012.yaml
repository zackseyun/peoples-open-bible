translation:
  language: es
  text: 'Y he aquí[a], ella andaba paseándose como de costumbre, y uno de los ancianos había llegado, y he aquí, llegó el otro; y le preguntó al otro, diciendo[b]: «¿Por qué saliste tan temprano, sin llevarme contigo?»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «mira» para cada ocurrencia del marcador discursivo griego ἰδοὺ.
    reason: lexical_alternative
  - marker: b
    text: El texto griego de este versículo es narrativamente abrupto, con cambios rápidos entre los dos ancianos («uno» y «el otro»). La traducción conserva la secuencia sin suavizar la brusquedad del original.
    reason: textual_variant
lexical_decisions:
- source_word: ἰδοὺ
  english_pob_choice: behold
  chosen_spanish: he aquí
  alternatives_spanish:
  - mira
  - he ahí
  lexicon: BDAG
  rationale: Reproduce el marcador discursivo de sorpresa o atención súbita con una fórmula natural y reverente en español. Como aparece dos veces, se conserva su repetición sin suavizarla.
- source_word: κατὰ τὸ εἰωθὸς
  english_pob_choice: as usual
  chosen_spanish: según su costumbre
  alternatives_spanish:
  - como era su costumbre
  - de ordinario
  lexicon: BDAG
  rationale: El giro expresa una acción habitual; 'según su costumbre' mantiene la idea de práctica regular sin sonar forzado.
- source_word: περιεπάτει
  english_pob_choice: was walking about
  chosen_spanish: caminaba
  alternatives_spanish:
  - iba caminando
  - andaba
  lexicon: BDAG
  rationale: El imperfecto señala acción en curso; en español, 'caminaba' comunica continuidad de forma natural. Se evita recargar con una perífrasis innecesaria.
- source_word: πρεσβυτέρων
  english_pob_choice: elders
  chosen_spanish: ancianos
  alternatives_spanish:
  - presbíteros
  - mayores
  lexicon: BDAG
  rationale: En este relato son hombres mayores con papel de autoridad. 'Ancianos' conserva la referencia a edad y dignidad, sin imponer un término eclesiástico posterior.
- source_word: ἐλληλύθει
  english_pob_choice: had come
  chosen_spanish: había llegado
  alternatives_spanish:
  - había venido
  - había aparecido
  lexicon: BDAG
  rationale: El pluscuamperfecto marca una llegada anterior respecto de la acción siguiente. 'Había llegado' es claro y mantiene el orden narrativo.
- source_word: παρεγένετο
  english_pob_choice: arrived
  chosen_spanish: llegó
  alternatives_spanish:
  - arribó
  - se presentó
  lexicon: BDAG
  rationale: Señala la llegada del segundo anciano. 'Llegó' es la opción más natural en español y conserva la secuencia abrupta del griego.
- source_word: ἀνέκρινε
  english_pob_choice: questioned
  chosen_spanish: preguntó
  alternatives_spanish:
  - interrogó
  - examinó
  lexicon: BDAG
  rationale: Aquí introduce discurso directo entre los dos hombres. 'Preguntó' transmite el planteamiento incisivo sin exagerar un matiz jurídico formal que el contexto inmediato no exige.
- source_word: ὄρθρου
  english_pob_choice: so early
  chosen_spanish: tan temprano
  alternatives_spanish:
  - al alba
  - de madrugada
  lexicon: BDAG
  rationale: El término apunta a la madrugada o muy temprano. 'Tan temprano' sigue la revisión inglesa reciente y funciona de modo idiomático en español, manteniendo la fuerza temporal sin añadir detalle no explicitado.
- source_word: παραλαβὼν με
  english_pob_choice: without taking me along
  chosen_spanish: sin llevarme contigo
  alternatives_spanish:
  - sin tomarme contigo
  - sin llevarme
  lexicon: BDAG
  rationale: En este contexto, παραλαμβάνω implica ir con alguien como compañero. 'Llevarme contigo' expresa naturalmente la expectativa de ir juntos y conserva la relación personal implícita.
theological_decisions:
- issue: Uso del marcador de atención ἰδοὺ repetido sin suavizar la brusquedad narrativa
  english_pob_reading: The translation preserves the sequence without smoothing away the source’s abruptness.
  chosen_spanish_reading: Se conserva la repetición de 'he aquí' y la alternancia rápida entre los dos ancianos.
  alternative_spanish_readings:
  - suavizar la frase con 'entonces' o eliminar una de las repeticiones
  - reordenar la cláusula para hacerla más fluida
  rationale: La prioridad es respetar la textura narrativa del griego, incluida su abrupta transición entre los personajes. No se normaliza la escena a costa de borrar el efecto literario del texto fuente.
  doctrine_reference: Principio de fidelidad textual y literaria; no hay afirmación doctrinal directa en el versículo.
translation_notes:
  revision_awareness: 'La redacción sigue el estado revisado más reciente del audit trail: se mantiene la formalidad de ἰδοὺ con una forma equivalente en español y se preserva la temporalidad breve de ὄρθρου con ''tan temprano'', sin expandir innecesariamente a ''de madrugada'' o ''al amanecer''.'
  spanish_consistency_notes:
  - Se usa 'he aquí' como equivalente consistente del marcador discursivo ἰδοὺ en registros bíblicos solemnes.
  - Se evita 'SEÑOR' u otras sustituciones teológicas no pertinentes porque no aparece el nombre divino en este versículo.
  - Se prefiere 'ancianos' para πρεσβυτέρων por su valor narrativo y de autoridad comunitaria en Susana.
  - La sintaxis conserva la secuencia en cadena del griego para no ocultar el cambio rápido de referente entre 'uno' y 'el otro'.
