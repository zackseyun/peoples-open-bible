translation:
  language: es
  text: 'Entonces tomó el Libro del Pacto y lo leyó a oídos del pueblo, y ellos dijeron: «Todo lo que Yahvé ha hablado haremos, y obedeceremos[a]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, «y escucharemos». El verbo hebreo puede significar «oír/escuchar» y, en contextos de pacto, también «obedecer».
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּקַּח
  english_pob_choice: Then he took
  chosen_spanish: Entonces tomó
  alternatives_spanish:
  - Y tomó
  - Tomó
  lexicon: HALOT
  rationale: El wayyiqtol avanza la narración; «entonces» conserva con naturalidad la secuencia narrativa en español sin añadir contenido ajeno.
- source_word: סֵפֶר הַבְּרִית
  english_pob_choice: the Book of the Covenant
  chosen_spanish: el Libro del Pacto
  alternatives_spanish:
  - el libro del pacto
  - el documento del pacto
  - el rollo del pacto
  lexicon: HALOT
  rationale: «Libro» conserva el sustantivo concreto de סֵפֶר y la capitalización señala un documento pactual específico. Se usa «Pacto» como equivalente de בְּרִית para mantener el término teológico/covenantal del contexto.
- source_word: וַיִּקְרָא
  english_pob_choice: read
  chosen_spanish: lo leyó
  alternatives_spanish:
  - lo proclamó
  - lo leyó en voz alta
  lexicon: HALOT
  rationale: Con un objeto escrito, el verbo significa naturalmente «leer»; el objeto directo clítico «lo» evita repetición y es idiomático en español.
- source_word: בְּאָזְנֵי הָעָם
  english_pob_choice: in the hearing of the people
  chosen_spanish: en presencia del pueblo
  alternatives_spanish:
  - a oídos del pueblo
  - en el oído del pueblo
  lexicon: HALOT
  rationale: La expresión hebrea es idiomática para lectura pública dentro del alcance auditivo. «En presencia de» comunica el acto público de forma natural en español, sin forzar una calca poco idiomática.
- source_word: הָעָם
  english_pob_choice: the people
  chosen_spanish: el pueblo
  alternatives_spanish:
  - la gente
  - el pueblo de Israel
  lexicon: HALOT
  rationale: El hebreo dice simplemente «el pueblo». «Pueblo» es la forma natural y mantiene la referencia sin añadir especificación no presente.
- source_word: וַיֹּאמְרוּ
  english_pob_choice: and they said
  chosen_spanish: y ellos dijeron
  alternatives_spanish:
  - y respondieron
  - y declararon
  lexicon: HALOT
  rationale: Se conserva la introducción simple del discurso. «Ellos» da claridad referencial en español, aunque puede omitirse; aquí se mantiene por fluidez.
- source_word: כֹּל אֲשֶׁר דִּבֶּר יְהוָה
  english_pob_choice: All that Yahweh has spoken
  chosen_spanish: Todo lo que Yahvé ha hablado
  alternatives_spanish:
  - Todo lo que Yahvé dijo
  - Todo cuanto Yahvé ha hablado
  lexicon: HALOT
  rationale: «Todo lo que» preserva la amplitud de כֹּל אֲשֶׁר. «Ha hablado» sigue de cerca דִּבֶּר y mantiene el valor de palabra pronunciada; se evita simplificarlo a «dijo» sin necesidad.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: Se sigue la convención del proyecto para el Tetragrámaton, transliterado como «Yahvé» para preservar el nombre propio divino revelado en el texto.
- source_word: נַעֲשֶׂה
  english_pob_choice: we will do
  chosen_spanish: haremos
  alternatives_spanish:
  - haremos nosotros
  - lo haremos
  lexicon: HALOT
  rationale: El futuro de primera persona plural expresa de manera natural la promesa comprometida. «Haremos» mantiene el verbo concreto hacer sin introducir una paráfrasis interpretativa.
- source_word: וְנִשְׁמָע
  english_pob_choice: and we will obey
  chosen_spanish: y obedeceremos
  alternatives_spanish:
  - y escucharemos
  - y oiremos
  lexicon: HALOT
  rationale: En contexto de pacto, שׁמע puede implicar obedecer. La traducción principal adopta «obedeceremos» para reflejar ese sentido covenantal que el propio audit trail inglés decidió priorizar, sin perder de vista la alternativa auditiva, que se preserva en nota.
theological_decisions:
- issue: Sentido covenantal de וְנִשְׁמָע
  english_pob_reading: and we will obey
  chosen_spanish_reading: y obedeceremos
  alternative_spanish_readings:
  - y escucharemos
  - y oiremos
  rationale: El contexto inmediato es la aceptación pública del libro del pacto; por eso el sentido de שׁמע como obediencia es teológicamente pertinente y más directo en español. La nota conserva la posibilidad auditiva para no borrar la tensión semántica del hebreo.
  doctrine_reference: Translation philosophy §3 (Preserve theological tension rather than resolve it)
translation_notes:
  revision_awareness: La redacción sigue el último ajuste del audit trail inglés, que prefirió «we will obey» sobre «we will listen» para reflejar mejor el sentido pactual de שׁמע. En español se adoptó la misma resolución principal («obedeceremos») y se mantuvo la alternativa semántica en nota para conservar la tensión léxica documentada.
  spanish_consistency_notes:
  - Se usa «Yahvé» de forma consistente con la política del proyecto para יְהוָה.
  - Se emplea «Pacto» para בְּרִית en lugar de «alianza» por ser el término teológico estándar del proyecto en este contexto.
  - La combinación «haremos... obedeceremos» refleja paralelismo verbal sin suavizar la respuesta comprometida del pueblo.
  - Se evitó «oiremos» como texto principal para no debilitar el matiz obediencial que el contexto pactal exige.
