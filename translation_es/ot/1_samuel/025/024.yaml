translation:
  language: es
  text: 'Ella cayó a sus pies y dijo[a]: «Sobre mí sea la culpa, señor mío. Te ruego que tu sierva hable para que la oigas[b], y oye las palabras de tu sierva».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «La culpa es mía, señor mío». El hebreo es una fórmula breve de autoasunción de culpa: literalmente, «sobre mí, señor mío, la culpa».'
    reason: lexical_alternative
  - marker: b
    text: Lit., «en tus oídos»; es un hebraísmo para decir que hable de modo que la oigas.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַתִּפֹּל עַל רַגְלָיו
  english_pob_choice: She fell at his feet
  chosen_spanish: Ella cayó a sus pies
  alternatives_spanish:
  - Ella se postró a sus pies
  - Ella se arrojó a sus pies
  lexicon: HALOT
  rationale: La imagen hebrea describe una caída ante los pies como gesto de súplica o sumisión. «Cayó a sus pies» conserva el gesto sin sobreexplicar ni intensificar más de lo que exige el texto.
- source_word: בִּי אֲנִי אֲדֹנִי הֶעָוֹן
  english_pob_choice: On me, my lord, be the guilt
  chosen_spanish: Sobre mí, señor mío, sea la culpa
  alternatives_spanish:
  - La culpa es mía, señor mío
  - Sobre mí solo, señor mío, recae la culpa
  lexicon: HALOT
  rationale: La frase es un hebraísmo compacto de autoasunción de culpa. «Sobre mí ... sea la culpa» mantiene la fuerza preposicional de בִּי y el matiz formal de la petición. «Culpa» comunica mejor el contexto narrativo que «iniquidad» en español actual.
- source_word: אֲדֹנִי
  english_pob_choice: my lord
  chosen_spanish: señor mío
  alternatives_spanish:
  - mi señor
  - señor
  lexicon: HALOT
  rationale: Aquí Abigail se dirige a David con deferencia social, no al Señor divino. «Señor mío» reproduce el registro respetuoso y evita tanto la frialdad de «mi señor» como la posible ambigüedad de «señor».
- source_word: וּתְדַבֶּר נָא
  english_pob_choice: Please let ... speak
  chosen_spanish: Te ruego que ... hable
  alternatives_spanish:
  - Por favor, deja que ... hable
  - Permite que ... hable
  lexicon: HALOT
  rationale: El hebreo expresa una súplica cortés. En español, «Te ruego que ... hable» transmite mejor la petición respetuosa y su tono formal, sin perder la intención permisiva del verbo.
- source_word: אֲמָתְךָ / אֲמָתֶךָ
  english_pob_choice: your servant
  chosen_spanish: tu sierva
  alternatives_spanish:
  - tu esclava
  - tu servidora
  lexicon: HALOT
  rationale: אמה es un término femenino de servidumbre. En esta escena de humillación, «sierva» conserva el sentido y el registro bíblico con claridad en español, y evita la pérdida de género que tendría simplemente «servant»/«sirviente».
- source_word: בְּאָזְנֶיךָ
  english_pob_choice: in your hearing
  chosen_spanish: a tus oídos
  alternatives_spanish:
  - en tu presencia
  - en tu oído
  lexicon: HALOT
  rationale: La expresión literal es «en tus oídos». En español, «a tus oídos» conserva la metáfora corporal sin volverla torpe; «en tu presencia» suavizaría demasiado el hebraísmo.
- source_word: וּשְׁמַע אֵת דִּבְרֵי
  english_pob_choice: and hear the words of
  chosen_spanish: y oye las palabras de
  alternatives_spanish:
  - y escucha las palabras de
  - y atiende las palabras de
  lexicon: HALOT
  rationale: El imperativo שׁמע pide oír/escuchar. «Oye las palabras de» mantiene la estructura simple y directa del hebreo, con tono suficientemente solemne para el contexto narrativo.
theological_decisions:
- issue: Autoasunción de culpa en lenguaje de sumisión
  english_pob_reading: On me, my lord, be the guilt
  chosen_spanish_reading: Sobre mí, señor mío, sea la culpa
  alternative_spanish_readings:
  - La culpa es mía, señor mío
  - Sobre mí solo, señor mío, recae la culpa
  rationale: La línea no formula una confesión doctrinal, sino una fórmula de humildad y responsabilidad asumida. La opción elegida conserva el compactado hebreo y el matiz de subordinación verbal sin convertirlo en una paráfrasis explicativa.
  doctrine_reference: Narrativa sapiential y lenguaje de humildad; cf. uso idiomático de asumir culpa en relatos del AT.
translation_notes:
  revision_awareness: 'El borrador inglés finalizó en una revisión menor: se sustituyó «your female servant» por «your servant» por naturalidad en inglés, aunque el hebreo conserva la forma femenina. En español se recupera explícitamente el género de אמה con «tu sierva», porque el texto hebreo lo marca y porque el registro de humillación queda más claro sin perder naturalidad.'
  spanish_consistency_notes:
  - Se mantiene «señor mío» para אֲדֹנִי, distinguiéndolo claramente de cualquier referencia divina.
  - «Sierva» se usa para אֲמָתְךָ / אֲמָתֶךָ por ser el femenino explícito del hebreo y por coherencia con la escena.
  - «Culpa» se prefirió a «iniquidad» para reflejar mejor el sentido narrativo de responsabilidad asumida en español actual.
  - La estructura oracional sigue de cerca el hebreo, pero con sintaxis española fluida y publicable.
