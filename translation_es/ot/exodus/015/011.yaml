translation:
  language: es
  text: ¿Quién como tú entre los dioses[a], oh Yahvé? ¿Quién como tú, majestuoso en santidad, imponente en alabanzas[b], hacedor de maravillas?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «entre los poderosos». El hebreo puede aludir tanto a dioses o seres divinos como a poderosos; «entre los dioses» encaja mejor con la retórica del cántico sobre la incomparabilidad de Yahvé.
    reason: alternative_reading
  - marker: b
    text: O «temible en alabanzas» o «asombroso en alabanzas». La expresión hebrea es compacta y poética.
    reason: lexical_alternative
lexical_decisions:
- source_word: מִי
  english_pob_choice: Who
  chosen_spanish: ¿Quién
  alternatives_spanish:
  - ¿Quién es
  lexicon: HALOT
  rationale: La forma interrogativa retórica se reproduce de manera natural con «¿Quién?» en español, conservando el tono de asombro del hebreo.
- source_word: כָמֹכָה
  english_pob_choice: is like you
  chosen_spanish: como tú
  alternatives_spanish:
  - se compara contigo
  - es como tú
  lexicon: HALOT
  rationale: 'En español, la comparación interrogativa queda más idiomática sin verbo explícito: «¿Quién como tú?» mantiene la fuerza retórica del hebreo.'
- source_word: בָּאֵלִם
  english_pob_choice: among the gods
  chosen_spanish: entre los dioses
  alternatives_spanish:
  - entre los poderosos
  - entre los seres divinos
  lexicon: HALOT
  rationale: La lectura principal del contexto poético es polémica respecto de otros dioses/poderes divinos; «entre los dioses» conserva esa tensión. En español «dioses» es la opción más directa y auditable, sin cerrar por completo la posibilidad de «poderosos».
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  lexicon: HALOT
  rationale: 'Se mantiene el nombre propio divino según el principio terminológico del proyecto: transliteración de יהוה como «Yahvé», no sustitución por un título.'
- source_word: נֶאְדָּר
  english_pob_choice: majestic
  chosen_spanish: majestuoso
  alternatives_spanish:
  - glorioso
  - excelso
  lexicon: HALOT
  rationale: El participio/adjetivo expresa esplendor elevado. «Majestuoso» comunica bien esa dignidad exaltada en español contemporáneo sin perder el registro poético.
- source_word: בַּקֹּדֶשׁ
  english_pob_choice: in holiness
  chosen_spanish: en santidad
  alternatives_spanish:
  - en lo santo
  - en el santuario
  lexicon: HALOT
  rationale: Aquí קֹדֶשׁ funciona de modo abstracto, describiendo la cualidad santa de Yahvé más que un lugar. «En santidad» es la equivalencia más clara y fiel en español.
- source_word: נוֹרָא
  english_pob_choice: awesome
  chosen_spanish: asombroso
  alternatives_spanish:
  - temible
  - imponente
  lexicon: HALOT
  rationale: La revisión inglesa prefirió «awesome» por mayor naturalidad, y en español «asombroso» conserva la idea de provocar sobrecogimiento. «Temible» preserva con más fuerza el componente de temor, pero puede sonar demasiado restrictivo aquí.
- source_word: תְהִלֹּת
  english_pob_choice: in praises
  chosen_spanish: en alabanzas
  alternatives_spanish:
  - en alabanzas dignas
  - en cantos de alabanza
  - digno de alabanzas
  lexicon: HALOT
  rationale: La expresión es compacta y poética. «En alabanzas» sigue de cerca la estructura hebrea sin volverla pesada, y en español mantiene la ambigüedad entre ser objeto de alabanza y manifestar su carácter en medio de ella.
- source_word: עֹשֵׂה
  english_pob_choice: doing
  chosen_spanish: hacedor de
  alternatives_spanish:
  - que hace
  - realizador de
  lexicon: HALOT
  rationale: El participio describe una acción característica. «Hacedor de maravillas» es una solución clásica y clara en español que preserva el valor durativo y sustantivizado del participio.
- source_word: פֶלֶא
  english_pob_choice: wonders
  chosen_spanish: maravillas
  alternatives_spanish:
  - portentos
  - prodigios
  lexicon: HALOT
  rationale: «Maravillas» es la forma más natural y tradicional en español para los actos extraordinarios de Dios, manteniendo el tono poético sin perder precisión.
theological_decisions:
- issue: Referente de בָּאֵלִם
  english_pob_reading: among the gods
  chosen_spanish_reading: entre los dioses
  alternative_spanish_readings:
  - entre los poderosos
  rationale: La línea celebra la incomparabilidad de Yahvé frente a otras potestades/divinidades. Traducir «dioses» preserva el trasfondo polémico del cántico y no niega la posibilidad contextual de «poderosos», que se deja como alternativa auditada.
  doctrine_reference: Éxodo 15; tabla de términos disputados; primacía del sentido del mundo fuente.
- issue: Valor de נוֹרָא תְהִלֹּת
  english_pob_reading: awesome in praises
  chosen_spanish_reading: asombroso en alabanzas
  alternative_spanish_readings:
  - temible en alabanzas
  - imponente en alabanzas
  - digno de alabanzas
  rationale: La revisión inglesa ajustó el matiz hacia «awesome» por naturalidad. En español, «asombroso» conserva el efecto de sobrecogimiento y permite una lectura poética sin debilitar el temor reverente implícito.
  doctrine_reference: Poética hebrea; equivalencia óptima y preservación del sobrecogimiento reverente.
translation_notes:
  revision_awareness: La versión inglesa más reciente corrigió el matiz de נוֹרָא desde una formulación más literal («feared in praises») hacia una más natural («awesome in praises»). La presente propuesta española sigue esa revisión con «asombroso en alabanzas», manteniendo el registro poético y la densidad del original.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» para יהוה conforme al estándar del proyecto.
  - Se conserva «dioses» en el texto principal por coherencia con la lectura polemizante del canto, con nota alternativa para «poderosos».
  - «Maravillas» se usa para פֶלֶא siguiendo el uso bíblico natural en español.
  - La estructura interrogativa retórica se ha mantenido breve y directa para conservar el paralelismo hebreo.
