review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español sigue en general el sentido del griego: denuncia a una persona desmedida en su hablar, conspicua en su auto-mostración por encima de los demás, y dura al condenar a pecadores en juicio. Sin embargo, «en exhibición» suena poco idiomático y «sobre todos» queda algo incompleto frente a ὑπὲρ πάντας; además, la nota a está mal anclada, pues comenta σημειώσει pero está colocada en «palabras».'
  spanish_quality_summary: La redacción es comprensible, pero necesita pulido para sonar natural y digno en español eclesial contemporáneo. «Exhibición» puede servir como alternativa en nota, pero en el texto principal «ostentación» comunica mejor el matiz peyorativo y moral de exceso visible. «Por encima de todos» suena más natural que «sobre todos». También conviene simplificar las notas para evitar redundancia y mantener anclajes correctos.
  glossary_alignment: No hay conflictos con terminología teológica principal del proyecto. Las decisiones léxicas principales son aceptables, pero para σημειώσει el español principal debe reflejar mejor el matiz de despliegue conspicuo/ostentoso en contexto denunciatorio. «Duro en palabras» es aceptable para σκληρός ἐν λόγοις, aunque «áspero» o «severo» serían alternativas menos físicas; no obstante, no exige cambio.
  issues:
  - severity: medium
    issue: La nota [a] está anclada en «palabras», pero su contenido explica σημειώσει.
    rationale: Las notas deben aparecer exactamente en la palabra o frase relevante. Aquí induce a confusión porque parece comentar λόγοις en vez de σημειώσει.
  - severity: medium
    issue: «Excesivo en exhibición» es poco natural en español.
    rationale: Aunque formalmente cercano al inglés auditado, en español suena forzado. El contexto moral favorece «ostentación» o «apariencia ostentosa», que transmiten mejor el exceso visible reprobado.
  - severity: low
    issue: «Sobre todos» suena incompleto frente a ὑπὲρ πάντας.
    rationale: «Por encima de todos» o «sobre todos los demás» preserva mejor la fuerza comparativa en español natural.
  - severity: low
    issue: Las notas [b] y [c] son algo redundantes y una de ellas introduce «exhibición visible», que no mejora la claridad.
    rationale: Conviene conservar alternativas significativas sin multiplicar glosas innecesarias o menos idiomáticas.
  revised_spanish_text: Excesivo en palabras, excesivo en ostentación[a] por encima de todos[b], el que es duro en palabras[c] para condenar a los pecadores en el juicio.
