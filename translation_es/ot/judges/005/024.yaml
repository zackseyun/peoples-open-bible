translation:
  language: es
  text: Bendita[a] entre las mujeres es Jael, la esposa de Heber el ceneo; entre las mujeres en la tienda[b], bendita es ella.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Bendita sobre las mujeres». El hebreo usa una construcción comparativa que también puede traducirse con sentido de superioridad.'
    reason: lexical_alternative
  - marker: b
    text: Literalmente, «en la tienda». El hebreo usa el singular, aunque puede evocar a mujeres de vida nómada o de tienda.
    reason: cultural_note
lexical_decisions:
- source_word: תְּבֹרַךְ
  english_pob_choice: Most blessed / most blessed is she
  chosen_spanish: Bendita sea
  alternatives_spanish:
  - Sea la más bendita
  - Muy bendita sea
  - Bendita
  lexicon: HALOT
  rationale: El hebreo es una forma pasiva intensiva con valor comparativo en este contexto poético. En español, 'bendita sea' conserva la fuerza de bendición sin sonar forzado; el comparativo se expresa con 'entre las mujeres'.
- source_word: מִנָּשִׁים
  english_pob_choice: among women
  chosen_spanish: entre las mujeres
  alternatives_spanish:
  - sobre las mujeres
  - más que las mujeres
  lexicon: HALOT
  rationale: La preposición מִן aquí funciona comparativamente. 'Entre las mujeres' reproduce bien el sentido superlativo/comparativo de la construcción sin volverla rígida en español.
- source_word: יָעֵל
  english_pob_choice: Jael
  chosen_spanish: Jael
  alternatives_spanish:
  - Yael
  lexicon: Transliteración estándar
  rationale: Se conserva el nombre propio en forma usual en español bíblico, 'Jael', por claridad y continuidad con la tradición de traducción.
- source_word: אֵשֶׁת חֶבֶר הַקֵּינִי
  english_pob_choice: the wife of Heber the Kenite
  chosen_spanish: la esposa de Heber el ceneo
  alternatives_spanish:
  - la mujer de Heber el ceneo
  - la esposa de Heber, el ceneo
  lexicon: HALOT
  rationale: La cadena constructa identifica a Jael por su relación marital y su pertenencia/clan. 'Esposa' es natural y fiel; 'ceneo' conserva el etnónimo sin explicarlo en exceso.
- source_word: בָּאֹהֶל
  english_pob_choice: in the tent
  chosen_spanish: en la tienda
  alternatives_spanish:
  - en el tentorio
  - en el campamento
  lexicon: HALOT
  rationale: '''אֹהֶל'' significa literalmente ''tienda''; en español bíblico moderno ''tienda'' comunica el entorno nómada con naturalidad. Se evita expandir a una interpretación más amplia que el hebreo no obliga.'
- source_word: תְּבֹרָךְ
  english_pob_choice: most blessed is she
  chosen_spanish: bendita sea
  alternatives_spanish:
  - sea bendita
  - la más bendita sea
  lexicon: HALOT
  rationale: La repetición final mantiene el paralelismo poético. En español, repetir 'bendita sea' conserva el énfasis sin añadir elementos que el hebreo no expresa explícitamente.
theological_decisions:
- issue: Valor comparativo/superlativo de la bendición
  english_pob_reading: Most blessed among women ... among women in the tent, most blessed is she.
  chosen_spanish_reading: Bendita entre las mujeres ... entre las mujeres en la tienda, bendita sea.
  alternative_spanish_readings:
  - Bendita sobre las mujeres ... sobre las mujeres en la tienda, bendita sea.
  - La más bendita entre las mujeres ...
  rationale: El hebreo admite una lectura comparativa ('entre/ sobre'). El español 'entre las mujeres' retiene la ambigüedad poética y el énfasis elevado sin decidir de manera excesiva por una paráfrasis más interpretativa.
  doctrine_reference: Poética hebrea; comparación intensiva en construcciones con מִן
translation_notes:
  revision_awareness: Se siguió el trazo del inglés POB que mantiene el valor comparativo de מִן y la repetición poética de תְּבֹרַךְ. También se respetó la observación editorial de no ampliar indebidamente 'en la tienda' a una pluralidad interpretativa, preservando el singular hebreo.
  spanish_consistency_notes:
  - Se usó 'Yahvé' como convención general del proyecto solo cuando aparece el nombre divino; aquí no aplica.
  - '''Ceneo'' se mantiene como etnónimo estándar en español bíblico.'
  - La repetición de 'bendita sea' conserva el paralelismo del hebreo y la cadencia del versículo.
