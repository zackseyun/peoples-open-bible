translation:
  language: es
  text: Porque he aquí[a], estoy llamando a todos los clanes[b] de los reinos del norte, declara Yahvé, y vendrán; cada uno pondrá su trono a la entrada de las puertas de Jerusalén, contra todos sus muros por todos lados, y contra todas las ciudades de Judá.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «He aquí» refleja el valor deíctico y enfático de הִנְנִי; también podría entenderse como «mira» o «aquí estoy».
    reason: lexical_alternative
  - marker: b
    text: O «las familias». El término hebreo puede designar grupos de parentesco amplios, clanes o unidades sociales semejantes.
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Ya que
  lexicon: HALOT
  rationale: Introduce la relación explicativa con el anuncio previo; en español, «Porque» comunica bien el valor causal/discursivo sin sonar forzado.
- source_word: הִנְנִי
  english_pob_choice: behold, I am
  chosen_spanish: he aquí, estoy
  alternatives_spanish:
  - mira, estoy
  - aquí estoy
  lexicon: HALOT
  rationale: La construcción es deíctica y enfática. «He aquí» conserva el llamado de atención, y «estoy» refleja la inmediatez de la acción divina.
- source_word: קֹרֵא
  english_pob_choice: calling
  chosen_spanish: llamando
  alternatives_spanish:
  - convocando
  - llamando
  lexicon: HALOT
  rationale: El participio expresa acción en curso o inminente. «Llamando» es natural en español y suficientemente fiel al matiz de convocatoria autoritativa.
- source_word: לְכָל מִשְׁפְּחוֹת מַמְלְכוֹת צָפוֹנָה
  english_pob_choice: all the clans of the kingdoms of the north
  chosen_spanish: a todas las familias de los reinos del norte
  alternatives_spanish:
  - a todos los clanes de los reinos del norte
  - a todas las estirpes de los reinos del norte
  lexicon: HALOT
  rationale: מִשְׁפְּחוֹת puede referirse a grupos de parentesco amplios. Aquí se opta por «familias» porque suena natural en español y mantiene el sentido amplio; se conserva la posibilidad de «clanes» en nota porque el término hebreo no se limita al núcleo doméstico.
- source_word: נְאֻם יְהוָה
  english_pob_choice: declares Yahweh
  chosen_spanish: declara Yahvé
  alternatives_spanish:
  - dice Yahvé
  - oráculo de Yahvé
  lexicon: HALOT
  rationale: 'Se conserva la fórmula profética solemne con el nombre divino según el estándar del proyecto: «Yahvé».'
- source_word: וּבָאוּ
  english_pob_choice: they will come
  chosen_spanish: vendrán
  alternatives_spanish:
  - irán
  - llegarán
  lexicon: HALOT
  rationale: Futuro simple natural en español, fiel al valor prospectivo del verbo.
- source_word: וְנָתְנוּ אִישׁ כִּסְאוֹ
  english_pob_choice: each will set his throne
  chosen_spanish: cada uno pondrá su trono
  alternatives_spanish:
  - cada uno colocará su trono
  - cada uno establecerá su trono
  lexicon: HALOT
  rationale: «Pondrá» reproduce bien el gesto de colocar/asentar el trono. «Trono» conserva la imagen real y judicial del original y del audit trail inglés.
- source_word: אִישׁ
  english_pob_choice: each
  chosen_spanish: cada uno
  alternatives_spanish:
  - cada hombre
  - cada cual
  lexicon: HALOT
  rationale: Aquí אִישׁ funciona distributivamente. «Cada uno» es idiomático en español y evita una carga masculina innecesaria sin perder la referencia distributiva.
- source_word: פֶּתַח שַׁעֲרֵי יְרוּשָׁלִַם
  english_pob_choice: at the entrance of the gates of Jerusalem
  chosen_spanish: a la entrada de las puertas de Jerusalén
  alternatives_spanish:
  - en la entrada de las puertas de Jerusalén
  - junto a la entrada de las puertas de Jerusalén
  lexicon: HALOT
  rationale: «Entrada» reproduce פֶּתַח y «puertas» mantiene el plural hebreo y el complejo urbano de acceso.
- source_word: וְעַל כָּל חוֹמֹתֶיהָ סָבִיב
  english_pob_choice: against all her walls all around
  chosen_spanish: contra todos sus muros alrededor
  alternatives_spanish:
  - contra todos sus muros por todos lados
  - contra todos sus muros en derredor
  lexicon: HALOT
  rationale: En contexto militar, עַל tiene fuerza adversativa; «contra» mantiene ese matiz. «Alrededor» conserva סָבִיב como idea de cerco.
- source_word: וְעַל כָּל עָרֵי יְהוּדָה
  english_pob_choice: and against all the cities of Judah
  chosen_spanish: y contra todas las ciudades de Judá
  alternatives_spanish:
  - y contra cada una de las ciudades de Judá
  - y sobre todas las ciudades de Judá
  lexicon: HALOT
  rationale: Se conserva la fuerza adversativa de עַל en un escenario de invasión/juzgamiento y el plural de alcance amplio.
theological_decisions:
- issue: Rendering of the divine name יְהוָה
  english_pob_reading: declares Yahweh
  chosen_spanish_reading: declara Yahvé
  alternative_spanish_readings:
  - declara el SEÑOR
  - oráculo de Yahvé
  rationale: 'Se sigue el estándar confesional y editorial del proyecto para el Tetragrama: traducirlo como «Yahvé», preservando el nombre propio del pacto y evitando el ocultamiento por una mayúscula funcional.'
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Distributive masculine singular אִישׁ with כִּסְאוֹ
  english_pob_reading: each will set his throne
  chosen_spanish_reading: cada uno pondrá su trono
  alternative_spanish_readings:
  - cada hombre pondrá su trono
  - cada cual pondrá su trono
  rationale: El hebreo usa un singular masculino distributivo. «Cada uno» conserva la distribución sin introducir una solución artificial en género; «su trono» mantiene la concordancia posesiva natural en español.
  doctrine_reference: DOCTRINE.md Translation philosophy §4
translation_notes:
  revision_awareness: 'El borrador sigue el sentido confirmado por el audit trail inglés y evita el calco rígido donde el español requiere una construcción más natural. Se mantuvo la secuencia semántica del hebreo: anuncio divino, convocatoria de los reinos del norte, llegada, colocación de tronos en Jerusalén y extensión del juicio sobre Judá.'
  spanish_consistency_notes:
  - Se usa «Yahvé» de manera consistente con el estándar del proyecto para יְהוָה.
  - Se conserva la fuerza militar de עַל como «contra» en las dos cláusulas finales.
  - «Familias» se eligió por naturalidad, pero la nota preserva la alternativa «clanes» para el valor léxico amplio de מִשְׁפְּחוֹת.
  - La puntuación con punto y coma tras «vendrán» ayuda a reflejar la secuencia de acciones sin añadir contenido interpretativo.
