translation:
  language: es
  text: Él conservará los relatos de hombres famosos[a], y entrará en los giros de las parábolas.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «los giros de los proverbios» o «las sutilezas de los dichos figurados». El griego παραβολῶν puede abarcar diversas formas sapienciales, no solo parábolas narrativas.
    reason: lexical_alternative
lexical_decisions:
- source_word: διηγήσεις
  english_pob_choice: accounts
  chosen_spanish: relatos
  alternatives_spanish:
  - cuentos
  - narraciones
  - informes
  lexicon: LSJ
  rationale: El sustantivo griego puede denotar relatos, narraciones o recitales transmitidos. «Relatos» es natural en español y mantiene la amplitud sin volver más específico el género literario.
- source_word: ἀνδρῶν ὀνομαστῶν
  english_pob_choice: famous men
  chosen_spanish: hombres famosos
  alternatives_spanish:
  - hombres renombrados
  - hombres notables
  - varones ilustres
  lexicon: LSJ
  rationale: La frase significa literalmente hombres conocidos o renombrados. «Hombres famosos» conserva el sentido y el referente masculino de manera clara y sobria.
- source_word: συντηρήσει
  english_pob_choice: will preserve
  chosen_spanish: preservará
  alternatives_spanish:
  - guardará
  - conservará
  - mantendrá
  lexicon: LSJ
  rationale: El futuro verbal expresa guardar, conservar o preservar. «Preservará» refleja bien la idea de retener y custodiar cuidadosamente esos relatos.
- source_word: στροφαῖς
  english_pob_choice: intricacies
  chosen_spanish: sutilezas
  alternatives_spanish:
  - giros
  - vueltas
  - entramados
  lexicon: LSJ
  rationale: El término alude a giros, vueltas o complejidades. «Sutilezas» transmite en español la complejidad interpretativa de estas expresiones sapienciales con un registro digno y fluido.
- source_word: παραβολῶν
  english_pob_choice: parables
  chosen_spanish: parábolas
  alternatives_spanish:
  - proverbios
  - comparaciones
  - dichos figurados
  lexicon: LSJ
  rationale: El griego puede abarcar parábolas, proverbios o dichos figurados. «Parábolas» sigue de cerca el término fuente y permite mantener abierta la amplitud sapiencial señalada en la nota inglesa.
- source_word: συνεισελεύσεται
  english_pob_choice: will enter into
  chosen_spanish: se adentrará en
  alternatives_spanish:
  - entrará en
  - penetrará en
  - se internará en
  lexicon: LSJ
  rationale: El verbo compuesto significa ir o entrar dentro de. «Se adentrará en» conserva la metáfora de internarse en el sentido profundo de las parábolas sin sonar forzado en español.
translation_notes:
  revision_awareness: La redacción sigue la revisión inglesa más reciente, que prefirió una formulación más natural y formal para στροφαῖς (“intricacies”) en lugar de una imagen demasiado literal de “twists”. En español se reflejó esa misma decisión con «sutilezas», manteniendo la complejidad del término sin calco áspero.
  spanish_consistency_notes:
  - Se mantuvo el masculino explícito de ἀνδρῶν con «hombres».
  - Se prefirió una expresión verbal dinámica («se adentrará en») para preservar la metáfora direccional de συνεισελεύσεται.
  - «Parábolas» conserva la amplitud de παραβολῶν; la nota aclara las alternativas sapienciales posibles.
  - No se introdujo terminología eclesiástica ajena al texto; el verso se presenta en registro sapiencial sobrio.
