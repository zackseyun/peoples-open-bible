translation:
  language: es
  text: 'a Judea, con cartas: que debía apresar a Judas mismo, dispersar a los que estaban con él, y nombrar a Alcimo como sumo sacerdote del templo más grande[a].'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «del gran templo» o «del supremo santuario». El griego usa una expresión superlativa, literalmente «del templo/santuario más grande».
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐπιστολάς
  english_pob_choice: with letters
  chosen_spanish: con cartas
  alternatives_spanish:
  - con cartas escritas
  - con escritos
  - con órdenes escritas
  lexicon: LSJ
  rationale: El contexto de la acusación o gestión política presupone un envío de cartas; «con cartas» conserva el matiz instrumental sin sobreespecificar «órdenes escritas».
- source_word: ἐπανελέσθαι
  english_pob_choice: seize
  chosen_spanish: apresar
  alternatives_spanish:
  - asir
  - capturar
  - arrestar
  lexicon: LSJ
  rationale: En un contexto hostil, el verbo expresa tomar por la fuerza o poner bajo custodia. «Apresar» mantiene la fuerza del acto y suena natural en español formal.
- source_word: σκορπίσαι
  english_pob_choice: scatter
  chosen_spanish: dispersar
  alternatives_spanish:
  - esparcir
  - desbandar
  - disgregar
  lexicon: LSJ
  rationale: El griego significa dispersar o desparramar. «Dispersar» conserva el valor relacional de romper el grupo que acompaña a Judas.
- source_word: καταστῆσαι
  english_pob_choice: appoint
  chosen_spanish: nombrar
  alternatives_spanish:
  - instalar
  - poner como
  - designar
  lexicon: LSJ
  rationale: En un contexto administrativo, el verbo remite a poner en un cargo. «Nombrar» es idiomático y claro en español.
- source_word: ἀρχιερέα
  english_pob_choice: high priest
  chosen_spanish: sumo sacerdote
  alternatives_spanish:
  - sumo sacerdote
  - gran sacerdote
  lexicon: LSJ
  rationale: «Sumo sacerdote» es la equivalencia estable en español para el oficio judío y preserva el rango sacerdotal sin ambigüedad.
- source_word: τοῦ μεγίστου ἱεροῦ
  english_pob_choice: of the greatest temple
  chosen_spanish: del más grande templo
  alternatives_spanish:
  - del gran templo
  - del supremo santuario
  - del templo más grande
  lexicon: LSJ
  rationale: La forma griega es superlativa. «Del más grande templo» refleja esa fuerza sin normalizarla a «gran templo». La inversión evita una lectura meramente idiomática que diluya el superlativo.
theological_decisions:
- issue: Conservar el superlativo aplicado al santuario de Jerusalén
  english_pob_reading: the greatest temple
  chosen_spanish_reading: el más grande templo
  alternative_spanish_readings:
  - el gran templo
  - el supremo santuario
  rationale: No hay un cruce doctrinal mayor, pero el griego usa un superlativo explícito. Se preserva para no suavizar el énfasis reverencial del texto.
  doctrine_reference: Principio de primacía del idioma original y fidelidad al superlativo léxico
translation_notes:
  revision_awareness: El texto inglés pasó de «capture» a «seize» para ἐπανελέσθαι; por eso se eligió un verbo español más directo y enérgico («apresar») en lugar de una opción más débil. También se mantuvo la superlación de μεγίστου, conforme al audit trail.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» como norma del proyecto, pero este versículo no contiene el tetragrámaton.
  - «Mesías»/«Cristo» no aparecen en el versículo.
  - «Sumo sacerdote» se usa de forma consistente para ἀρχιερεύς en español bíblico entendido, sin introducir terminología eclesiástica posterior.
