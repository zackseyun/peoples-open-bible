revisions:
- from: Cuando Lea vio que había dejado de dar a luz[a], tomó a Zilpa, su sierva[b], y se la dio a Jacob como esposa.
  to: Cuando Lea vio que había dejado de dar a luz[a], tomó a Zilpa, su esclava[b], y se la dio a Jacob como esposa.
