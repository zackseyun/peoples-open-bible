    rationale: La alternativa 'en tierra seca' y la explicación sobre 'sed' o 'sed extrema' pertenecen a la segunda imagen del versículo ('tierra sedienta'), siguiendo el English POB. Dejarlas en 'desierto' induce a pensar erróneamente que comentan מִדְבָּר.
