    reason: lexical_alternative
  - marker: c
    text: La figura suscitada por Dios suele entenderse como Ciro; el hebreo aquí no lo nombra.
    reason: cross_reference
  revision_rationale: 'Se corrigen solo detalles menores de idiomaticidad y gramática sin cambiar la exégesis del borrador: «salida del sol» mejora la naturalidad y fidelidad imagética; se corrige la nota léxica de קרא בשם a un español normal; se arregla la concordancia en la nota sobre Ciro; y se añade «un» antes de «alfarero» para fluidez.'
