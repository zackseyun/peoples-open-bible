review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien el sentido general del hebreo: futuro restaurador, Judá salvada, Jerusalén habitando en seguridad, y la fórmula de nombre aplicada gramaticalmente a Jerusalén. También preserva correctamente Yahvé como el Tetragrámaton. Sin embargo, la redacción principal se aparta innecesariamente de la elección auditada en inglés para וְזֶה אֲשֶׁר / יִקְרָא לָהּ al convertirlo en «este será el nombre con que será llamada», que eleva al texto principal una expansión interpretativa que el POB inglés mantuvo como alternativa de nota. Además, el anclaje de la nota a en «salvada» no corresponde al punto léxico real, que es la fórmula de nombramiento.'
  spanish_quality_summary: El español es claro y digno, pero «habitará segura» suena algo menos natural que «habitará segura»? En contexto es aceptable; no requiere cambio. El problema principal de calidad/fidelidad está en la estructura «este será el nombre con que será llamada», que resulta más pesada y más interpretativa que una opción más cercana como «y esto es lo que será llamada». También conviene mover la nota lexical al segmento pertinente de la fórmula nominal.
  glossary_alignment: 'Buena alineación general con la terminología del proyecto: יְהוָה → «Yahvé», יְהוּדָה → «Judá», יְרוּשָׁלִַם → «Jerusalén», צִדְקֵנוּ → «nuestra justicia». No hay conflicto doctrinal mayor. La única desalineación relevante es metodológica: la alternativa «el nombre con que será llamada» debe quedar en nota, no sustituir la redacción principal auditada.'
  issues:
  - severity: medium
    issue: La redacción principal convierte una alternativa léxica en traducción base
    rationale: El inglés POB usa en el texto principal «and this is what she will be called» y reserva «the name by which she will be called» para nota. El español borrador invierte esa decisión sin nueva justificación desde el hebreo.
  - severity: medium
    issue: La nota a está anclada en la palabra equivocada
    rationale: La nota explica una alternativa para la fórmula de nombramiento, no para «será salvada». El marcador debe ir junto a la cláusula «esto es lo que será llamada» o equivalente.
  revised_spanish_text: 'En aquellos días, Judá será salvada, y Jerusalén habitará segura[a]; y esto es lo que será llamada: «Yahvé es nuestra justicia».[b]'
  revised_footnotes:
