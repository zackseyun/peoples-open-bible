translation:
  language: es
  text: Y en cuanto a tus vasos santos, que están siendo entregados para el uso del templo de tu Dios en Jerusalén.[a]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El griego dice «el templo/santuario de tu Dios en Jerusalén»; la alternativa «la casa de tu Dios» sigue el paralelo semítico y el modo bíblico habitual de referirse al templo de Jerusalén.
    reason: alternative_reading
lexical_decisions:
- source_word: κατὰ
  english_pob_choice: concerning
  chosen_spanish: en cuanto a
  alternatives_spanish:
  - con respecto a
  - acerca de
  lexicon: BDAG
  rationale: En este encabezado administrativo, κατὰ con acusativo introduce el asunto tratado. «En cuanto a» expresa bien el giro tópico en español sin volverlo mecánico.
- source_word: ἱερὰ σκεύη
  english_pob_choice: holy vessels
  chosen_spanish: vasos santos
  alternatives_spanish:
  - vasos sagrados
  - vasos del templo
  lexicon: BDAG
  rationale: σκεύη se refiere a recipientes o utensilios; «vasos» es una opción española natural para objetos cultuales, y «santos» conserva el valor consagrado de ἱερὰ. Se evita «sagrados» por sonar más abstracto y menos bíblico-litúrgico en español actual.
- source_word: τὰ διδόμενα
  english_pob_choice: that are being given
  chosen_spanish: que están siendo entregados
  alternatives_spanish:
  - que se dan
  - que son entregados
  lexicon: BDAG
  rationale: El participio presente pasivo pide una acción en curso. «Están siendo entregados» conserva la fuerza procesual y el matiz administrativo de la cesión.
- source_word: εἰς τὴν χρείαν
  english_pob_choice: for the use of
  chosen_spanish: para el uso de
  alternatives_spanish:
  - para el servicio de
  - para la necesidad de
  lexicon: BDAG
  rationale: χρεία puede significar necesidad, uso o función. Aquí el contexto cultual-administrativo favorece «uso», que suena natural y evita una lectura demasiado literal de «necesidad».
- source_word: τοῦ ἱεροῦ
  english_pob_choice: the temple
  chosen_spanish: del templo
  alternatives_spanish:
  - del santuario
  - de la casa
  lexicon: BDAG
  rationale: Aunque el texto semítico paralelo puede sugerir «casa», el griego ἱεροῦ apunta directamente al templo/santuario. Dado el audit trail inglés, «templo» refleja mejor el anclaje griego principal.
- source_word: τοῦ θεοῦ σου
  english_pob_choice: of your God
  chosen_spanish: de tu Dios
  alternatives_spanish:
  - de tu Dios personal
  - de tu Dios
  lexicon: BDAG
  rationale: Se mantiene la relación posesiva directa y el tono de la carta. «Tu Dios» conserva la referencia covenantal sin añadir explicaciones.
- source_word: τοῦ ἐν Ἰερουσαλήμ
  english_pob_choice: in Jerusalem
  chosen_spanish: en Jerusalén
  alternatives_spanish:
  - que está en Jerusalén
  lexicon: BDAG
  rationale: La localización se expresa de forma idiomática y breve en español. No se hace más pesada la frase con una subordinada relativa innecesaria.
theological_decisions:
- issue: ἱερόν como templo/santuario frente a la posible equivalencia semítica «casa»
  english_pob_reading: the temple of your God in Jerusalem
  chosen_spanish_reading: el templo de tu Dios en Jerusalén
  alternative_spanish_readings:
  - la casa de tu Dios en Jerusalén
  - el santuario de tu Dios en Jerusalén
  rationale: El testigo griego principal usa ἱερόν, y la revisión inglesa posterior optó por «temple» por precisión. En español se sigue esa decisión. Se preserva, sin embargo, la posibilidad semítica en nota, porque el paralelo hebreo/aramaizante puede motivar «casa» como equivalente idiomático.
  doctrine_reference: Uso bíblico del templo de Jerusalén; no hay tensión doctrinal, sino una decisión léxico-textual.
translation_notes:
  revision_awareness: La redacción inglesa pasó de «house» a «temple» para reflejar con más precisión ἱεροῦ y mantener coherencia con «holy vessels». Esta versión española sigue la revisión más reciente y ancla la frase en el griego principal, sin perder en la nota la alternativa semítica documentada.
  spanish_consistency_notes:
  - Se mantiene «Dios» para θεοῦ, conforme al estándar del proyecto.
  - Se evita traducir mecánicamente el genitivo locativo; «en Jerusalén» funciona de manera natural en español.
  - «Vasos santos» conserva el registro cultual sin sustituirlo por una paráfrasis más amplia.
  - La nota preserva la tensión textual entre el griego principal y el paralelo semítico, en lugar de neutralizarla.
