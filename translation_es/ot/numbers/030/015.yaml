review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura y el sentido legal del hebreo: el silencio continuado del marido implica confirmación de los votos y compromisos de la mujer. Conserva adecuadamente «votos», la fuerza jurídica de «confirma», y la relación causal final. Sin embargo, hay dos puntos de fidelidad/mejor ajuste: «que están sobre ella» suena calcado y menos natural que una formulación española que aún preserve la metáfora/legalidad, y «el día que lo oyó» introduce un pronombre objeto no expreso en el hebreo y algo ambiguo en español.'
  spanish_quality_summary: El texto es mayormente claro y digno, pero puede mejorarse para un español más natural y preciso. «Se mantiene en silencio» funciona, aunque «guarda silencio» sería más directo; no obstante, el problema principal está en «que están sobre ella» y en «lo oyó». Además, conviene ajustar la nota al lugar correcto, porque la alternativa anotada corresponde a «obligaciones», no a «de día en día».
  glossary_alignment: No hay conflictos con la terminología base del proyecto. «Marido», «votos» y «obligaciones» concuerdan con las decisiones auditadas. La nota léxica sobre אֱסָרֶיהָ debe anclarse a «obligaciones», no a la expresión temporal.
  issues:
  - severity: medium
    issue: La nota [a] está anclada a «de día en día», pero su contenido explica «obligaciones».
    rationale: La disciplina de notas exige que el marcador aparezca en la palabra o frase pertinente. Tal como está, la nota induce a pensar que comenta la expresión temporal en vez del término legal אֱסָרֶיהָ.
  - severity: medium
    issue: «Que están sobre ella» es demasiado calcado y poco natural en español.
    rationale: Aunque reproduce la metáfora hebrea, en español eclesial general suena forzado. «Que recaen sobre ella» preserva la imagen y el sentido jurídico con mejor legibilidad.
  - severity: low
    issue: «El día que lo oyó» añade un «lo» no expreso en hebreo y genera ambigüedad referencial.
    rationale: El hebreo dice literalmente «en el día de su oír / el día que oyó». «El día en que oyó» o «el día en que lo oyó»; la primera evita añadir objeto no necesario y sigue siendo fiel.
  revised_spanish_text: Pero si su marido se mantiene en silencio de día en día, entonces confirma todos sus votos o todas sus obligaciones[a] que recaen sobre ella; las ha confirmado, porque guardó silencio el día en que oyó.
  revised_footnotes:
  - marker: a
    text: O «todos sus compromisos vinculantes»; el término hebreo se refiere a compromisos que obligan a la persona que los hace.
    reason: lexical_alternative
  revision_rationale: Se reubicó la nota al término correcto («obligaciones»), se mejoró «que están sobre ella» a «que recaen sobre ella» para conservar el sentido legal con español natural, y se evitó el pronombre añadido en la cláusula final. También se ajustó «los ha confirmado» a «las ha confirmado» para concordar con el antecedente femenino más cercano («obligaciones») dentro de la coordinación española; el sentido global sigue siendo que ha confirmado ambos tipos de compromisos.
