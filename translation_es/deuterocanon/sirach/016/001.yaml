review_pass:
  verdict: revise
  source_alignment_summary: El borrador sigue correctamente el hebreo como texto base y preserva bien el contraste con la variante griega en nota. 'No desees la apariencia de...' refleja תֹּאַר de forma fiel, y 'ni te alegres' corresponde bien a וְאַל תִּשְׂמַח. La principal desviación está en 'jóvenes inútiles', que suena más utilitarista que moral y no comunica tan bien שָׁוְא como 'vanos' o 'sin valor'. También 'te alegres en' es poco natural en español para בְּ.
  spanish_quality_summary: 'El español es generalmente claro, pero hay dos puntos de mejora: 1) ''jóvenes inútiles'' resulta algo duro y menos idiomático para una caracterización sapiencial; 2) ''te alegres en hijos de injusticia'' suena calcado. ''Te alegres con'' o ''por'' es más natural en español sin perder el sentido. La nota textual es adecuada, pero puede afinarse para reflejar mejor el inglés auditado: no solo registrar la variante griega, sino señalar que el testimonio hebreo habla de la apariencia exterior de jóvenes vanos.'
  glossary_alignment: 'No hay conflicto con la terminología troncal del proyecto. ''Injusticia'' para עַוְלָה está bien. No hay nombres divinos ni términos doctrinales sensibles. La decisión de conservar ''hijos'' está alineada con la política de precisión léxica. La mejora propuesta es estilística-semántica dentro del mismo marco: ''jóvenes vanos'' y ''te alegres con''.'
  issues:
  - severity: medium
    issue: '''jóvenes inútiles'' no transmite de la mejor manera שָׁוְא'
    rationale: שָׁוְא aquí apunta a vaciedad/vanidad/falsedad con matiz moral, no meramente a inutilidad funcional. 'Jóvenes vanos' o 'jóvenes sin valor' preserva mejor el campo semántico y el tono sapiencial.
  - severity: medium
    issue: '''te alegres en hijos de injusticia'' suena poco natural en español'
    rationale: Aunque 'en' calca más de cerca la preposición, en español eclesial y general se dice más naturalmente 'alegrarse con' o 'alegrarse por'. Esto mejora la legibilidad sin alterar el sentido.
  - severity: low
    issue: La nota al pie podría reflejar con más precisión el contraste hebreo/griego documentado en el POB inglés
    rationale: El rastro auditado inglés explica que el griego habla de una multitud de hijos inútiles, mientras que el hebreo habla de la apariencia exterior de jóvenes vanos. Conviene mantener ese contraste explícito en español.
  revised_spanish_text: No desees la apariencia de jóvenes vanos[a], ni te alegres con hijos de injusticia.
  revised_footnotes:
  - marker: a
    text: 'Griego: «No desees una multitud de hijos inútiles, ni te alegres con hijos impíos». El testimonio hebreo, en cambio, habla de la apariencia exterior de jóvenes vanos.'
    reason: textual_variant
  revision_rationale: Se ajusta 'jóvenes inútiles' a 'jóvenes vanos' para reflejar mejor שָׁוְא en un registro sapiencial natural en español. Se cambia 'te alegres en' por 'te alegres con' para mejorar la idiomaticidad sin perder el paralelismo. La nota se amplía para preservar explícitamente el contraste textual documentado por el POB inglés entre la lectura griega y la hebrea.
