translation:
  language: es
  text: Servirán a Yahvé, su Dios, y él bendecirá su pan[a] y su agua, y quitaré la enfermedad[b] de en medio de ustedes.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebreo «pan» puede referirse de manera más amplia al alimento o a la provisión.
    reason: lexical_alternative
  - marker: b
    text: O «dolencia» en lugar de «enfermedad».
    reason: lexical_alternative
lexical_decisions:
- source_word: וַעֲבַדְתֶּם
  english_pob_choice: You shall serve
  chosen_spanish: Servirán
  alternatives_spanish:
  - Ustedes servirán
  - Ustedes adorarán
  - Servirán y rendirán culto
  lexicon: HALOT
  rationale: עבד en este contexto de pacto expresa servicio debido a Dios; en español, «servir» conserva mejor ese alcance que «adorar», que sería más estrecho. Se usa el futuro simple para reflejar la fuerza injuntiva/promisoria del hebreo y el sujeto colectivo implícito de Israel.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  - Jehová
  lexicon: HALOT
  rationale: 'Se preserva el nombre propio divino del Tetragrámaton según la convención POB en español: «Yahvé». Esto evita sustituir el nombre por un título y mantiene la referencia al nombre del pacto revelado a Israel.'
- source_word: אֱלֹהֵיכֶם
  english_pob_choice: your God
  chosen_spanish: su Dios
  alternatives_spanish:
  - su Dios de ustedes
  - su Dios
  lexicon: HALOT
  rationale: El hebreo marca posesión plural de segunda persona y referencia de pacto; en español, «su Dios» es la forma natural y reverente para un destinatario colectivo. El plural colectivo se entiende por el contexto y por el verbo plural inicial.
- source_word: וּבֵרַךְ
  english_pob_choice: and he will bless
  chosen_spanish: y él bendecirá
  alternatives_spanish:
  - y bendecirá
  - y él habrá de bendecir
  lexicon: HALOT
  rationale: El verbo expresa una consecuencia/promesa divina. En español, «bendecirá» comunica con claridad el valor futuro del perfecto consecutivo en este contexto, y se explicita el sujeto «él» para evitar ambigüedad.
- source_word: לַחְמְךָ
  english_pob_choice: your bread
  chosen_spanish: su pan
  alternatives_spanish:
  - su alimento
  - su pan
  lexicon: HALOT
  rationale: «Pan» reproduce el sentido literal de לֶחֶם y conserva la metáfora básica de provisión material. Se mantiene el singular colectivo en español, como en el inglés POB, sin forzar una paráfrasis más general.
- source_word: מֵימֶיךָ
  english_pob_choice: your water
  chosen_spanish: su agua
  alternatives_spanish:
  - su agua de beber
  - sus aguas
  lexicon: HALOT
  rationale: Aunque el hebreo usa forma plural/colectiva, el referente es el agua como provisión. «Su agua» es natural en español y mantiene el paralelismo con «su pan».
- source_word: וַהֲסִרֹתִי
  english_pob_choice: and I will remove
  chosen_spanish: y quitaré
  alternatives_spanish:
  - y removeré
  - y apartaré
  - y alejaré
  lexicon: HALOT
  rationale: הסיר significa quitar o remover. «Quitaré» es claro, idiomático y suficientemente cercano al valor semántico de eliminar una calamidad del ámbito del pueblo.
- source_word: מַחֲלָה
  english_pob_choice: sickness
  chosen_spanish: la enfermedad
  alternatives_spanish:
  - la dolencia
  - la enfermedad
  lexicon: HALOT
  rationale: El sustantivo admite «sickness/disease» en inglés; en español, «enfermedad» es el equivalente más natural y amplio, adecuado para abarcar el término sin volverlo excesivamente clínico.
- source_word: מִקִּרְבֶּךָ
  english_pob_choice: from your midst
  chosen_spanish: de en medio de ustedes
  alternatives_spanish:
  - de entre ustedes
  - de su medio
  lexicon: HALOT
  rationale: La frase preserva el valor comunitario/covenantal de «de en medio de». Se opta por una forma idiomática en español plural para reflejar el destinatario colectivo del versículo sin perder el sentido de expulsión/remoción del centro del pueblo.
theological_decisions:
- issue: Nombre divino del Tetragrámaton
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - Jehová
  rationale: El texto hebreo usa יְהוָה directamente. Conforme a la política del proyecto en español, se traduce como «Yahvé» para preservar el nombre propio del Dios del pacto en vez de ocultarlo con un título.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Número y destinatario colectivo en las posesiones
  english_pob_reading: your bread ... your water ... your midst
  chosen_spanish_reading: su pan ... su agua ... de en medio de ustedes
  alternative_spanish_readings:
  - tu pan ... tu agua ... de tu medio
  - su pan ... su agua ... de su medio
  rationale: El hebreo combina un verbo plural con posesivos singulares. En español, el plural colectivo «ustedes» comunica mejor el destinatario corporativo de Israel, sin inventar una diferencia doctrinal entre singular y plural que el contexto no exige.
  doctrine_reference: Exodus 23:25 morphology / English audit trail on collective address
- issue: Verbo de remoción de la calamidad
  english_pob_reading: I will remove sickness
  chosen_spanish_reading: quitaré la enfermedad
  alternative_spanish_readings:
  - removeré la enfermedad
  - alejaré la enfermedad
  rationale: El hebreo expresa una acción divina de retirar una calamidad del pueblo. «Quitaré» conserva la fuerza directa de la remoción y suena natural en español bíblico contemporáneo.
  doctrine_reference: HALOT on הסיר / Exodus 23:25
translation_notes:
  revision_awareness: Se revisó el último pase de traducción disponible y no se registraron cambios necesarios; el borrador sigue la decisión auditada de mantener el nombre divino como Yahvé y de conservar el valor colectivo de las posesiones con un español natural.
  spanish_consistency_notes:
  - Se conserva «Yahvé» como forma estándar del nombre divino en el proyecto, no «SEÑOR».
  - Se emplea español colectivo de cortesía/pueblo («ustedes») para reflejar el адрес a Israel en conjunto.
  - Las notas de pie preservan la alternativa léxica documentada para «pan» y la posibilidad de «enfermedad» como matiz del término hebreo.
  - El tono es formal y bíblico sin calco innecesario del inglés; «quitaré» y «de en medio de ustedes» mantienen claridad idiomática.
