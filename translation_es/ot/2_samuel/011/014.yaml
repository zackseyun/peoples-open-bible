translation:
  language: es
  text: Por la mañana[a], David escribió una carta a Joab y la envió por mano de Urías.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «por medio de Urías» o «con Urías». El hebreo dice literalmente «por la mano de Urías», un modismo de agencia o entrega.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְהִי בַבֹּקֶר
  english_pob_choice: In the morning
  chosen_spanish: Por la mañana
  alternatives_spanish:
  - En la mañana
  - En la mañana temprano
  - Por la mañana temprano
  lexicon: HALOT
  rationale: La expresión hebrea introduce una nueva escena temporal de manera narrativa. En español, 'Por la mañana' funciona con naturalidad como adverbial temporal y conserva el arranque secuencial sin calco pesado.
- source_word: וַיִּכְתֹּב
  english_pob_choice: wrote
  chosen_spanish: escribió
  alternatives_spanish:
  - redactó
  - compuso
  - escribió un mensaje
  lexicon: HALOT
  rationale: El verbo español normal para el acto de escribir comunica fielmente la acción narrativa. 'Escribió' mantiene la sencillez del hebreo y la decisión del POB en inglés.
- source_word: סֵפֶר
  english_pob_choice: a letter
  chosen_spanish: una carta
  alternatives_spanish:
  - un documento
  - un escrito
  - una misiva
  lexicon: HALOT
  rationale: Aunque ספר puede significar de forma amplia 'escrito' o 'documento', el contexto de enviar un mensaje a Joab favorece el sentido comunicativo concreto de 'carta'. 'Carta' es la opción más natural y precisa en español.
- source_word: אֶל
  english_pob_choice: to
  chosen_spanish: a
  alternatives_spanish:
  - para
  lexicon: HALOT
  rationale: La preposición marca al destinatario de la carta. En español, 'a Joab' expresa la dirección del mensaje de manera directa y idiomática.
- source_word: וַיִּשְׁלַח
  english_pob_choice: sent
  chosen_spanish: envió
  alternatives_spanish:
  - mandó
  - despachó
  lexicon: HALOT
  rationale: '''Envió'' es el equivalente narrativo más claro y normal para שׁלח en este contexto.'
- source_word: בְּיַד אוּרִיָּה
  english_pob_choice: by the hand of Uriah
  chosen_spanish: por mano de Urías
  alternatives_spanish:
  - por medio de Urías
  - con Urías
  - a través de Urías
  lexicon: HALOT
  rationale: Se conserva el giro hebreo de agencia/conducta sin suavizarlo a una paráfrasis. 'Por mano de' mantiene la tensión e ironía del texto, indicando que Urías es el portador del mensaje.
translation_notes:
  revision_awareness: La revisión en inglés quedó sin cambios tras dos pases y fue aprobada con alto acuerdo; por eso la redacción española sigue de cerca las decisiones auditadas, especialmente el valor temporal inicial, el sentido de ספר como 'carta' y el modismo de בְּיַד conservado por su ironía narrativa.
  spanish_consistency_notes:
  - Se usa 'Yahvé' solo cuando el texto base lo requiera explícitamente; este versículo no contiene el nombre divino.
  - Se mantiene 'Urías' con acento gráfico según la adaptación habitual al español.
  - Se prefiere 'por mano de' en el cuerpo por fidelidad al giro hebreo, con nota alternativa para lectores que prefieran una equivalencia más explícita.
