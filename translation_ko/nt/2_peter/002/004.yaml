  text: Εἰ γὰρ ὁ θεὸς ἀγγέλων ἁμαρτησάντων οὐκ ἐφείσατο, ἀλλὰ ⸀σειραῖς ζόφου ταρταρώσας παρέδωκεν εἰς κρίσιν τηρουμένους,
base_translation:
  language: en
  yaml_path: translation/nt/2_peter/002/004.yaml
  text: For if God did not spare angels when they sinned[a], but cast them into Tartarus and committed them to chains of gloom, to be kept for judgment[b],
  footnotes:
  - marker: a
    text: 'Or: "cast them into hell." The Greek verb specifically means to consign to Tartarus, so the main text preserves that more exact term.'
    reason: lexical_alternative
  - marker: b
    text: Some manuscripts read "pits of gloom/darkness" instead of "chains of gloom."
    reason: textual_variant
translation:
  language: ko
  text: 하나님께서 죄지은 천사들도 아끼지 아니하시고 흑암의 사슬에 던져 지옥(타르타로스)에 가두시고 심판 때까지 지키게 하셨으며,
  philosophy: optimal-equivalence
