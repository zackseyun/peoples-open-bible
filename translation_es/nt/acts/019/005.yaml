translation:
  language: es
  text: Y al oír esto, fueron bautizados en el nombre del Señor Jesús.
  philosophy: optimal-equivalence
  footnotes: []
lexical_decisions:
- source_word: ἀκούσαντες
  english_pob_choice: when they heard this
  chosen_spanish: al oír esto
  alternatives_spanish:
  - después de oírlo
  - cuando oyeron esto
  lexicon: BDAG
  rationale: El participio aoristo funciona temporalmente. En español, «al oír esto» comunica con naturalidad la relación temporal y recupera el objeto implícito del contexto inmediato, como hace el inglés POB con «this».
- source_word: δὲ
  english_pob_choice: And
  chosen_spanish: Y
  alternatives_spanish:
  - Pero
  - Ahora
  lexicon: BDAG
  rationale: δέ introduce continuación narrativa suave. «Y» mantiene el avance del relato sin cargar contraste ni solemnidad adicional.
- source_word: ἐβαπτίσθησαν
  english_pob_choice: they were baptized
  chosen_spanish: fueron bautizados
  alternatives_spanish:
  - se bautizaron
  - recibieron el bautismo
  lexicon: BDAG
  rationale: Se conserva la voz pasiva. «Fueron bautizados» es natural en español y respeta la forma pasiva del griego.
- source_word: εἰς τὸ ὄνομα
  english_pob_choice: in the name
  chosen_spanish: en el nombre
  alternatives_spanish:
  - dentro del nombre
  - hacia el nombre
  lexicon: BDAG
  rationale: Aunque εἰς puede sugerir dirección («hacia/into»), el inglés POB registró la lectura tradicional más natural en contexto. En español, «en el nombre» es la forma idiomática y conserva la fórmula bautismal sin forzar una construcción extraña.
- source_word: τοῦ κυρίου
  english_pob_choice: of the Lord
  chosen_spanish: del Señor
  alternatives_spanish:
  - del Dueño
  lexicon: BDAG
  rationale: κύριος se vierte como «Señor» en este contexto cristológico, donde funciona como título de Jesús.
- source_word: Ἰησοῦ
  english_pob_choice: Jesus
  chosen_spanish: Jesús
  alternatives_spanish:
  - Jesucristo
  lexicon: BDAG
  rationale: Nombre propio estándar en español para Ἰησοῦς.
theological_decisions:
- issue: Fórmula bautismal y el valor de εἰς τὸ ὄνομα
  english_pob_reading: in the name of the Lord Jesus
  chosen_spanish_reading: en el nombre del Señor Jesús
  alternative_spanish_readings:
  - en el nombre del Señor Jesús Cristo
  - hacia el nombre del Señor Jesús
  rationale: La forma griega usa εἰς τὸ ὄνομα, pero la tradición idiomática en español expresa con mayor naturalidad la fórmula como «en el nombre». Esto evita una calca poco natural y mantiene el sentido de identificación/autoridad del bautismo sin introducir armonizaciones litúrgicas ajenas al texto.
  doctrine_reference: 'Translation philosophy §§1, 3, 5; Contested terms: κύριος → Señor'
translation_notes:
  revision_awareness: El texto griego es breve y coincide ampliamente con la tradición textual; el principal punto de decisión es εἰς τὸ ὄνομα, donde el inglés POB osciló entre una rendición más literal y una más natural. La versión española adopta la forma natural «en el nombre», dejando constancia de la alternativa más literal en la nota.
  spanish_consistency_notes:
  - Se mantiene «Señor» para κύριος en contexto cristológico, conforme al uso auditado del POB en inglés.
  - No se usa «Cristo» porque el griego aquí dice Ἰησοῦς y no Χριστός.
  - «Bautizados» conserva la pasiva; no se reexpresa como acción reflexiva.
  - La nota reproduce la alternativa tradicional sin desplazar el texto principal.
