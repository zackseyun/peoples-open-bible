lexical_decisions:
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  - el SEÑOR
  lexicon: HALOT
  rationale: La fuente hebrea usa el Tetragrámaton, y el POB inglés lo resuelve como 'Yahweh'. En español, 'Yahvé' conserva el nombre propio divino sin sustituirlo por un título, siguiendo la misma decisión de fondo.
- source_word: יִמְלֹךְ
  english_pob_choice: will reign
  chosen_spanish: reinará
  alternatives_spanish:
  - reina
  - reinará como rey
  lexicon: HALOT
  rationale: El imperfecto hebreo expresa aquí una proclamación futura de realeza. 'Reinará' comunica bien el valor futurativo y mantiene el sentido real de מלך sin volverlo pesado.
- source_word: לְעֹלָם
  english_pob_choice: forever
  chosen_spanish: por siempre
  alternatives_spanish:
  - para siempre
  - eternamente
  lexicon: HALOT
  rationale: '''עוֹלָם'' en este contexto doxológico expresa duración sin límite. ''Por siempre'' es natural en español y conserva esa idea de continuidad indefinida.'
- source_word: וָעֶד
  english_pob_choice: and ever
  chosen_spanish: y para siempre
  alternatives_spanish:
  - y siempre
  - y por toda la eternidad
  lexicon: HALOT
  rationale: La expresión fija 'לְעֹלָם וָעֶד' intensifica la duración. En español, repetir la idea con 'y para siempre' preserva el énfasis sin sonar forzado.
theological_decisions:
- issue: Traducción del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Jehová
  - el SEÑOR
  rationale: Se mantiene el nombre propio de Dios en vez de una sustitución por título. 'Yahvé' es la forma española correspondiente al criterio del POB y preserva la referencia directa al nombre del pacto.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
translation_notes:
  revision_awareness: 'El contexto auditado coincide plenamente con la revisión más reciente: no hubo cambios necesarios y el consenso de revisión fue alto/agreed. La frase hebrea breve y la intensidad de la fórmula final se reflejan de manera directa en español.'
  spanish_consistency_notes:
  - Se conserva 'Yahvé' como nombre propio divino, coherente con el criterio del proyecto.
  - La duplicación de la idea temporal se expresa con 'por siempre y para siempre' para reflejar la fórmula intensiva hebrea.
  - El texto evita calcos innecesarios como 'por los siglos de los siglos', que no están en la fuente inmediata.
