translation:
  language: es
  text: Así, todos los hombres de Israel subieron[a] dejando de seguir a David para seguir a Seba hijo de Bicri; pero los hombres de Judá se aferraron[b] a su rey, desde el Jordán hasta Jerusalén.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo literalmente: «subieron». En este contexto, la expresión funciona idiomáticamente para indicar que dejaron de seguir a David y pasaron a seguir a Seba.'
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo literalmente: «se aferraron» o «se adhirieron». El verbo expresa apego firme y lealtad a su rey.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּעַל
  english_pob_choice: went up
  chosen_spanish: subió
  alternatives_spanish:
  - se fue
  - se retiró
  lexicon: HALOT
  rationale: עלה conserva el sentido básico de movimiento ascendente; en este contexto narrativo, 'subió' mantiene la forma concreta del hebreo sin forzar una interpretación más fuerte como 'se retiró'.
- source_word: כָּל אִישׁ יִשְׂרָאֵל
  english_pob_choice: every man of Israel
  chosen_spanish: todo hombre de Israel
  alternatives_spanish:
  - todos los hombres de Israel
  - cada hombre de Israel
  lexicon: HALOT
  rationale: La expresión hebrea es distributiva y masculina singular colectiva. 'Todo hombre de Israel' conserva esa fuerza y reproduce de cerca la construcción sin neutralizarla.
- source_word: מֵאַחֲרֵי דָוִד
  english_pob_choice: from following David
  chosen_spanish: de seguir a David
  alternatives_spanish:
  - de detrás de David
  - de andar tras David
  lexicon: HALOT
  rationale: El hebreo expresa apartarse de la lealtad o del seguimiento de David. En español, 'de seguir a David' comunica esa relación de seguimiento sin añadir una paráfrasis interpretativa.
- source_word: אַחֲרֵי שֶׁבַע בֶּן בִּכְרִי
  english_pob_choice: to follow Sheba son of Bichri
  chosen_spanish: para seguir a Seba hijo de Bicri
  alternatives_spanish:
  - tras Seba hijo de Bicri
  lexicon: HALOT
  rationale: La repetición de אַחֲרֵי marca el traspaso de adhesión. 'Para seguir a' expresa bien ese cambio de lealtad en español natural, preservando el paralelismo con la primera mitad del versículo.
- source_word: וְאִישׁ יְהוּדָה
  english_pob_choice: but the men of Judah
  chosen_spanish: pero los hombres de Judá
  alternatives_spanish:
  - y los hombres de Judá
  - pero cada hombre de Judá
  lexicon: HALOT
  rationale: Aunque el hebreo es singular colectivo, el español exige naturalmente plural colectivo. 'Pero' refleja el contraste implícito entre la defección de Israel y la fidelidad de Judá.
- source_word: דָּבְקוּ
  english_pob_choice: held fast
  chosen_spanish: se mantuvieron firmes
  alternatives_spanish:
  - se pegaron
  - se adhirieron
  lexicon: HALOT
  rationale: דבק tiene la idea de adherirse o aferrarse con constancia. 'Se mantuvieron firmes' transmite fidelidad y adhesión leal en un español claro; 'se adhirieron' sería más literal pero menos natural.
- source_word: בְמַלְכָּם
  english_pob_choice: to their king
  chosen_spanish: a su rey
  alternatives_spanish:
  - con su rey
  lexicon: HALOT
  rationale: Con דבק, la preposición ב puede expresarse en español con 'a' para conservar el valor direccional/relacional de la adhesión. El posesivo plural remite al rey de Judá, es decir, David.
- source_word: מִן הַיַּרְדֵּן וְעַד יְרוּשָׁלִָם
  english_pob_choice: from the Jordan to Jerusalem
  chosen_spanish: desde el Jordán hasta Jerusalén
  alternatives_spanish:
  - del Jordán a Jerusalén
  lexicon: HALOT
  rationale: La frase marca el alcance geográfico. 'Desde... hasta...' es la forma española más natural para conservar la extensión sin amplificarla, en línea con la revisión inglesa que retiró cualquier intensificador añadido.
translation_notes:
  revision_awareness: La redacción inglesa revisada eliminó 'all the way' para mantener un tono más formal y no expansivo. La versión española sigue esa línea con 'desde... hasta...' sin añadir intensificación. También conserva el paralelismo del hebreo entre la defección de Israel y la adhesión de Judá, y mantiene la oposición implícita con 'pero'.
  spanish_consistency_notes:
  - Se mantiene 'Dios' solo cuando aparezca un término divino explícito; en este versículo no aplica.
  - '''Hombre/hombres'' reproduce el singular colectivo hebreo sin neutralización, en continuidad con la política POB de precisión gramatical.'
  - '''Seba'' sigue la forma española del nombre propio equivalente a ''Sheba'' en la base inglesa.'
