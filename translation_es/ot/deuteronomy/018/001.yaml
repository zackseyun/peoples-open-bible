review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien la estructura hebrea principal: «los sacerdotes levíticos», «toda la tribu de Leví», la negación de «parte ni herencia con Israel», y la aposición aclaratoria «es decir, su herencia». También respeta correctamente el nombre divino como «Yahvé». Sin embargo, la expresión «ofrendas encendidas» no representa bien el valor documentado en el audit trail inglés, que eligió «food offerings» como sentido principal y dejó «offerings by fire» como alternativa más literal en nota. Además, la nota [a] actual es impropia, porque convierte el propio texto principal «con Israel» en una supuesta alternativa literal en vez de preservar una alternativa real del expediente inglés.'
  spanish_quality_summary: El español es generalmente claro y digno, pero «ofrendas encendidas» suena poco natural y poco idiomático en registro bíblico; puede sugerir simplemente que están encendidas, no una categoría sacrificial. «Ofrendas de alimento» o una formulación equivalente comunica mejor el sentido y suena más natural. La puntuación con rayas y «es decir» funciona bien.
  glossary_alignment: 'Se alinea con la política del proyecto en «Yahvé». «Sacerdotes levíticos» y «toda la tribu de Leví» están bien. La principal desalineación es léxica en אִשֵּׁי יְהוָה: el expediente inglés justifica un sentido principal equivalente a «ofrendas de alimento», con la alternativa literal «ofrendas por fuego» en nota. También falta la nota de cruce/explicación sobre «su herencia», presente en el POB inglés y útil en español.'
  issues:
  - severity: high
    issue: «ofrendas encendidas» para אִשֵּׁי יְהוָה
    rationale: No refleja bien la decisión léxica auditada, que toma como sentido principal «food offerings» y deja «offerings by fire» como alternativa más literal. En español, «encendidas» no es una designación sacrificial natural.
  - severity: medium
    issue: La nota [a] actual es incorrecta
    rationale: Dice «O, más literalmente, “con Israel”», pero eso no es una alternativa distinta; es exactamente lo que ya aparece en el texto. La nota léxica del expediente inglés para este versículo corresponde a אִשֵּׁי יְהוָה, no a «con Israel».
  - severity: medium
    issue: Falta la nota explicativa sobre «su herencia»
    rationale: El audit trail inglés conserva una nota sobre la posible referencia colectiva de «su herencia» a Leví/el levita, con apoyo en Deuteronomio 18:2. Esa aclaración sigue siendo pertinente en español.
  revised_spanish_text: Los sacerdotes levíticos —toda la tribu de Leví— no tendrán parte ni herencia con Israel; comerán las ofrendas de alimento[a] de Yahvé, es decir, su herencia[b].
