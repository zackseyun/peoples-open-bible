    rationale: Aunque «hijos» puede ser masculino en español, aquí el contexto de sucesión real hace importante preservar la especificidad de «sons». «Mis hijos varones» evita ambigüedad innecesaria y se alinea mejor con la decisión inglesa documentada.
  - severity: low
