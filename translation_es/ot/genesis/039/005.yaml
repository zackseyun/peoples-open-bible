translation:
  language: es
  text: Y desde que lo puso a cargo de su casa y de todo lo que tenía[a], Yahvé bendijo la casa del egipcio por causa de José, y la bendición de Yahvé estuvo sobre todo lo que tenía, tanto en la casa como en el campo[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «desde entonces, cuando lo puso a cargo de su casa y de todo lo que tenía».'
    reason: alternative_reading
  - marker: b
    text: 'O: «sobre todo lo que tenía, en la casa y en el campo».'
    reason: alternative_reading
lexical_decisions:
- source_word: מֵאָז
  english_pob_choice: from the time
  chosen_spanish: desde que
  alternatives_spanish:
  - desde entonces
  - a partir de entonces
  lexicon: HALOT
  rationale: El marcador temporal introduce el punto a partir del cual comienza el estado descrito. «Desde que» comunica bien ese valor en español y encaja de manera natural con la cláusula siguiente.
- source_word: הִפְקִיד
  english_pob_choice: appointed
  chosen_spanish: lo puso a cargo
  alternatives_spanish:
  - lo nombró
  - lo designó
  - lo encargó
  lexicon: HALOT
  rationale: El verbo en este contexto expresa asignación de responsabilidad administrativa. «Lo puso a cargo» conserva la idea de autoridad delegada sin sonar artificial en español.
- source_word: בְּבֵיתוֹ
  english_pob_choice: over his house
  chosen_spanish: de su casa
  alternatives_spanish:
  - sobre su casa
  - en su casa
  lexicon: HALOT
  rationale: En combinación con הִפְקִיד, la expresión no es meramente locativa, sino de esfera de administración. En español, «a cargo de su casa» transmite esa relación de gobierno/gestión mejor que una traducción literal con «sobre».
- source_word: וְעַל כָּל אֲשֶׁר יֶשׁ לוֹ
  english_pob_choice: and over all that he had
  chosen_spanish: y de todo lo que tenía
  alternatives_spanish:
  - y sobre todo lo que tenía
  - y de todo lo que era suyo
  lexicon: HALOT
  rationale: Se mantiene el sentido de autoridad extendida a la totalidad de sus posesiones. «Todo lo que tenía» es una fórmula natural y suficientemente precisa en español.
- source_word: וַיְבָרֶךְ
  english_pob_choice: blessed
  chosen_spanish: bendijo
  alternatives_spanish:
  - favoreció
  - prosperó
  lexicon: HALOT
  rationale: La raíz ברך se conserva como verbo de bendecir. Aunque el contexto implica prosperidad material, el texto atribuye la acción a Yahvé y conviene retener el verbo teológico básico.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: Se conserva el nombre divino personal según la norma del proyecto. «Yahvé» preserva la referencia al Tetragrámaton sin sustituirlo por un título.
- source_word: בֵּית הַמִּצְרִי
  english_pob_choice: the Egyptian’s house
  chosen_spanish: la casa del egipcio
  alternatives_spanish:
  - la casa del egipcio
  - la casa del egipcio Potifar
  lexicon: HALOT
  rationale: La construcción posesiva se traduce de modo natural como «la casa del egipcio». Se evita añadir el nombre propio porque el hebreo no lo da aquí.
- source_word: בִּגְלַל יוֹסֵף
  english_pob_choice: because of Joseph
  chosen_spanish: por causa de José
  alternatives_spanish:
  - a causa de José
  - por José
  lexicon: HALOT
  rationale: La preposición causal se expresa bien con «por causa de». Es una formulación clara, formal y fiel a la relación causal del texto.
- source_word: בִּרְכַּת יְהוָה
  english_pob_choice: the LORD’s blessing
  chosen_spanish: la bendición de Yahvé
  alternatives_spanish:
  - la bendición de Yahvé
  - la bendición de Yavé
  lexicon: HALOT
  rationale: Se conserva el sustantivo concreto «bendición», en lugar de parafrasear con prosperidad. La atribución a Yahvé permanece explícita.
- source_word: בְּכָל אֲשֶׁר יֶשׁ לוֹ
  english_pob_choice: on all that he had
  chosen_spanish: sobre todo lo que tenía
  alternatives_spanish:
  - sobre todo lo que poseía
  - en todo lo que tenía
  lexicon: HALOT
  rationale: La idea es de una bendición que recae sobre la totalidad de sus bienes. «Sobre todo lo que tenía» conserva la imagen de cobertura o extensión de la bendición.
- source_word: בַּבַּיִת וּבַשָּׂדֶה
  english_pob_choice: in the house and in the field
  chosen_spanish: en la casa y en el campo
  alternatives_spanish:
  - dentro de la casa y en el campo
  - en el hogar y en el campo
  lexicon: HALOT
  rationale: La expresión funciona como merismo de ámbitos doméstico y agrícola. «En la casa y en el campo» reproduce de manera directa y natural ese contraste.
theological_decisions:
- issue: Traducción del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - Jehová
  rationale: El versículo usa el Tetragrámaton directamente. Siguiendo la norma del proyecto, se preserva el nombre propio divino en español como «Yahvé», evitando la sustitución por un título.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה / YHWH'
- issue: Sentido de ברך en contexto narrativo
  english_pob_reading: blessed
  chosen_spanish_reading: bendijo / bendición
  alternative_spanish_readings:
  - prosperó / prosperidad
  - favoreció / favor
  rationale: Aunque el efecto narrativo es prosperidad material, el hebreo atribuye una acción de bendición a Yahvé. Traducir con «bendijo» y «bendición» mantiene el contenido teológico y no lo reduce a mera prosperidad.
  doctrine_reference: HALOT ברך; uso contextual en Génesis 39:5
translation_notes:
  revision_awareness: La redacción española sigue de cerca la última revisión inglesa, que mantuvo la correspondencia con «all that he had» y simplificó la segunda mitad a «in the house and in the field». En español se conserva esa relación sintáctica y se evita introducir intensificadores ajenos al hebreo.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como forma uniforme del nombre divino.
  - Se usa «bendijo/bendición» para ברך, sin sustituirlo por una paráfrasis de prosperidad.
  - «Por causa de José» conserva la causalidad explícita del hebreo בגלל.
  - La expresión «en la casa y en el campo» conserva el merismo sin expansión interpretativa.
