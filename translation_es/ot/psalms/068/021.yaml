    rationale: «Le pertenecen» suena más idiomático en español al expresar posesión/atribución con complemento preposicional adelantado.
  - severity: medium
    issue: «Las salidas de la muerte» resulta demasiado opaco en español principal.
    rationale: 'Aunque literal, no comunica con suficiente claridad el sentido idiomático documentado: maneras de escapar de la muerte. Una formulación como «las vías de escape de la muerte» preserva mejor el sentido para lectores modernos.'
