translation:
  language: es
  text: Tú sabes que dieron falso testimonio contra mí; y he aquí[a], muero, sin haber hecho nada de lo que estos hombres tramaron perversamente contra mí.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «sin haber hecho nada de lo que estos hombres tramaron contra mí». El verbo griego puede subrayar una maquinación perversa o una acción hostil dirigida contra Susana.
    reason: lexical_alternative
lexical_decisions:
- source_word: σὺ ἐπίστασαι
  english_pob_choice: you know
  chosen_spanish: Tú sabes
  alternatives_spanish:
  - Tú entiendes
  - Tú eres consciente
  lexicon: BDAG
  rationale: El verbo expresa conocimiento o conciencia directa. En español, «Tú sabes» es natural, solemne y fiel al tono de apelación directa a Dios.
- source_word: ψευδῆ μου κατεμαρτύρησαν
  english_pob_choice: they testified falsely against me
  chosen_spanish: dieron falso testimonio contra mí
  alternatives_spanish:
  - testificaron falsamente contra mí
  - declararon falsamente contra mí
  lexicon: BDAG / LSJ
  rationale: El contexto es judicial. «Dieron falso testimonio» conserva el sentido forense con español idiomático y evita un calco rígido.
- source_word: ἰδοὺ
  english_pob_choice: behold
  chosen_spanish: he aquí
  alternatives_spanish:
  - mira
  - mira aquí
  lexicon: BDAG
  rationale: En español bíblico digno, «he aquí» reproduce bien la función de llamar la atención sobre la inmediatez de la situación sin sonar coloquial.
- source_word: ἀποθνῄσκω
  english_pob_choice: I am dying
  chosen_spanish: muero
  alternatives_spanish:
  - estoy muriendo
  - estoy a punto de morir
  lexicon: BDAG
  rationale: El griego presente expresa una muerte inminente o en curso. En español, «muero» es sobrio y no fuerza una progresividad artificial; además mantiene la gravedad del momento.
- source_word: μὴ ποιήσασα μηδὲν ὧν
  english_pob_choice: having done none of the things that
  chosen_spanish: sin haber hecho nada de lo que
  alternatives_spanish:
  - sin haber hecho ninguna de las cosas que
  - no habiendo hecho nada de lo que
  lexicon: BDAG / LSJ
  rationale: La construcción participial se expresa mejor en español con una frase de modo/estado. «Sin haber hecho nada de lo que» preserva la negación total sin añadir una concesión que el griego no exige explícitamente.
- source_word: οὗτοι
  english_pob_choice: these men
  chosen_spanish: estos hombres
  alternatives_spanish:
  - estos
  - ellos
  lexicon: BDAG
  rationale: El demostrativo se refiere a los acusadores ya presentes en el relato. «Estos hombres» hace explícito el referente y mantiene el tono judicial.
- source_word: ἐπονηρεύσαντο
  english_pob_choice: wickedly contrived
  chosen_spanish: tramaron malvadamente
  alternatives_spanish:
  - maquinaban perversamente
  - idearon maliciosamente
  - tramaron perversamente
  lexicon: LSJ
  rationale: El verbo puede abarcar acción malvada y maquinación. «Tramaron malvadamente» conserva la idea de plan hostil sin sobreespecificar más allá de la fuente.
- source_word: κατ᾽ ἐμοῦ
  english_pob_choice: against me
  chosen_spanish: contra mí
  alternatives_spanish:
  - en mi contra
  lexicon: BDAG
  rationale: La preposición con genitivo es claramente adversativa en este contexto judicial. «Contra mí» es la forma más natural y directa en español.
theological_decisions:
- issue: Cómo reflejar la construcción participial μὴ ποιήσασα μηδὲν ὧν οὗτοι ἐπονηρεύσαντο κατ᾽ ἐμοῦ
  english_pob_reading: having done none of the things that these men wickedly contrived against me
  chosen_spanish_reading: sin haber hecho nada de lo que estos hombres tramaron malvadamente contra mí
  alternative_spanish_readings:
  - sin haber hecho ninguna de las cosas que estos hombres tramaron contra mí
  - no habiendo hecho nada de lo que estos hombres idearon maliciosamente contra mí
  rationale: La intención principal es afirmar la inocencia de Susana frente a una acusación fabricada. «Sin haber hecho» comunica la negación del acto con claridad natural en español, sin introducir una concesión excesiva ni suavizar la acusación contra los agresores.
  doctrine_reference: Translation philosophy §§1, 3, 6
- issue: Cómo traducir ἰδοὺ en un registro bíblico actual
  english_pob_reading: behold
  chosen_spanish_reading: he aquí
  alternative_spanish_readings:
  - mira
  - observa
  rationale: El griego funciona como partícula de atención e inmediatez. «He aquí» mantiene un registro reverente y reconocible en español eclesial, alineado con el valor discursivo del original.
  doctrine_reference: Translation philosophy §6
translation_notes:
  revision_awareness: 'El texto español sigue el último estado del audit trail para ἰδοὺ y la construcción participial, pero adapta ambos con una solución idiomática española: «he aquí» para la partícula de atención y «sin haber hecho nada de lo que» para la negación participial. También conserva la carga forense de «dieron falso testimonio» y la malicia de ἐπονηρεύσαντο sin endurecerla más allá de lo que el griego exige.'
  spanish_consistency_notes:
  - Se mantiene «Dios» implícito en la apelación directa con «Tú»; no se añade un vocativo innecesario porque el griego no lo explicita aquí.
  - Se evita «Cristo» o terminología litúrgica ajena, ya que el pasaje no la contiene.
  - «He aquí» se usa como equivalente reverente de ἰδοὺ, no como arcaísmo gratuito.
  - «Falso testimonio» preserva el marco judicial del verbo compuesto.
  - «Muero» traduce la inmediatez del presente griego sin convertirlo en perífrasis moderna más larga.
