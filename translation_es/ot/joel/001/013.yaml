base_translation:
  language: en
  yaml_path: translation/ot/joel/001/013.yaml
  text: Gird yourselves and mourn[a], O priests; wail, you ministers of the altar. Come, spend the night in sackcloth, you ministers of my God[b], because grain offering and drink offering are withheld from the house of your God.
  footnotes:
