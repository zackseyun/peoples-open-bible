  text: And one of the sons of Joiada son of Eliashib the high priest was a son-in-law of Sanballat the Horonite[b][a], so I drove him away from me.
  footnotes:
  - marker: a
    text: Or, more broadly, 'was related by marriage to Sanballat.' The Hebrew term can denote a marriage relation, but in this context 'son-in-law' is the most specific natural reading.
    reason: lexical_alternative
  - marker: b
    text: Or 'I chased him away' or 'I banished him.' The Hebrew verb emphasizes forcible removal; the exact administrative form of the action is not specified.
    reason: lexical_alternative
