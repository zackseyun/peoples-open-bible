lexical_decisions:
- source_word: מֶלֶךְ
  english_pob_choice: the king of
  chosen_spanish: el rey de
  alternatives_spanish:
  - rey de
  lexicon: HALOT
  rationale: 'En esta lista de reyes derrotados, מֶלֶךְ nombra al gobernante de cada ciudad-estado. En español, la fórmula enumerativa suena natural con artículo: «el rey de Jerusalén; el rey de Hebrón». Mantengo la estructura breve del hebreo sin expandirla a una frase interpretativa.'
- source_word: יְרוּשָׁלִַם
  english_pob_choice: Jerusalem
  chosen_spanish: Jerusalén
  lexicon: HALOT
  rationale: Nombre propio de lugar; se traduce por la forma española estándar y reconocible.
- source_word: אֶחָד
  english_pob_choice: one
  chosen_spanish: uno
  alternatives_spanish:
  - un rey
  - uno cada uno
  lexicon: HALOT
  rationale: Aquí אֶחָד funciona como cifra de la lista de conquista. «Uno» conserva la concisión del hebreo y la repetición formulaica del original, sin añadir un sustantivo que el texto no expresa.
- source_word: חֶבְרוֹן
  english_pob_choice: Hebron
  chosen_spanish: Hebrón
  lexicon: HALOT
  rationale: Nombre propio de lugar; se emplea la forma española usual y transparente.
translation_notes:
  revision_awareness: El texto inglés POB mantiene la estructura escueta del hebreo («the king of Jerusalem, one; the king of Hebron, one») y anota como alternativa una lectura más idiomática. La versión española conserva esa misma concisión y el mismo valor contable de אֶחָד, sin forzar una expansión interpretativa.
  spanish_consistency_notes:
  - Se conserva «Jerusalén» y «Hebrón» como topónimos establecidos en español.
  - Se mantiene «uno» para reproducir el tono de lista y el paralelismo del hebreo.
  - No se introduce lenguaje eclesiástico ajeno al pasaje; el verso es un inventario histórico de reyes vencidos.
