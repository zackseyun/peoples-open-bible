base_translation:
  language: en
  yaml_path: translation/ot/2_chronicles/022/005.yaml
  text: He also walked by their counsel[a], and he went with Jehoram son of Ahab, king of Israel, to war against Hazael king of Aram at Ramoth-gilead[c][b]; and the Arameans wounded Joram.
  footnotes:
  - marker: a
    text: Or 'according to their counsel.' The Hebrew idiom 'walked in/by their counsel' means he conducted himself under their advice.
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'Aram'; traditionally 'Syria.' Likewise 'the Arameans' is traditionally rendered 'the Syrians.'
    reason: alternative_reading
  - marker: c
    text: 'The Hebrew uses related name forms: ''Jehoram'' earlier in the verse and ''Joram'' at the end.'
    reason: lexical_alternative
