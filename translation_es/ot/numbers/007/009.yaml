revisions:
- from: Pero a los hijos de Coat no les dio nada[a], porque sobre ellos estaba el servicio de las cosas sagradas; las habían de llevar sobre el hombro.
  to: Pero a los hijos de Coat no les dio nada[a], porque sobre ellos estaba el servicio de las cosas sagradas; debían llevarlas sobre el hombro.
  rationale: Se conserva la interpretación y estructura del borrador, pero se reemplaza 'las habían de llevar' por 'debían llevarlas' para expresar con mayor naturalidad y claridad el deber prescrito por el imperfecto hebreo. Se mantiene la nota léxica con una redacción española más limpia y fiel a la alternativa documentada en el audit trail inglés.
