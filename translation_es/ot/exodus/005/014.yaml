translation:
  language: es
  text: 'Y los capataces[a] israelitas, a quienes los capataces de Faraón habían puesto sobre ellos, fueron golpeados, diciendo: «¿Por qué no han cumplido su cantidad prescrita de ladrillos, como antes, tanto ayer como hoy?»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo literalmente: «los supervisores» o «los oficiales»; aquí se traduce «capataces israelitas» para expresar su función laboral subordinada en este contexto.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֻּכּוּ
  english_pob_choice: were beaten
  chosen_spanish: golpearon
  alternatives_spanish:
  - fueron golpeados
  - fueron azotados
  lexicon: HALOT
  rationale: El pasivo hebreo de נכה indica recibir un castigo físico. En español, para esta línea narrativa, «golpearon» conserva la violencia del acto sin añadir con demasiada precisión un método de castigo que el hebreo no especifica.
- source_word: שֹׁטְרֵי בְּנֵי יִשְׂרָאֵל
  english_pob_choice: the Israelite foremen
  chosen_spanish: los capataces de los hijos de Israel
  alternatives_spanish:
  - los oficiales de los hijos de Israel
  - los supervisores israelitas
  lexicon: HALOT
  rationale: En el contexto laboral de Éxodo, שֹׁטְרִים designa supervisores subordinados del trabajo forzado. «Capataces» comunica bien esa función en español y mantiene la tensión de autoridad y subordinación.
- source_word: אֲשֶׁר שָׂמוּ עֲלֵהֶם נֹגְשֵׂי פַרְעֹה
  english_pob_choice: whom Pharaoh’s taskmasters had set over them
  chosen_spanish: a quienes los capataces de Faraón habían puesto sobre ellos
  alternatives_spanish:
  - a quienes los capataces de Faraón habían colocado sobre ellos
  - a quienes los opresores de Faraón habían puesto sobre ellos
  lexicon: HALOT
  rationale: נֹגְשִׂים tiene el sentido de jefes que impulsan trabajo forzado; «capataces» funciona de forma natural en español y conserva la idea de autoridad coercitiva. «Habían puesto sobre ellos» sigue de cerca la estructura relacional del hebreo.
- source_word: לֵאמֹר
  english_pob_choice: saying
  chosen_spanish: diciendo
  alternatives_spanish:
  - con estas palabras
  - y les dijeron
  lexicon: HALOT
  rationale: Es el infinitivo quotativo normal; «diciendo» mantiene la función discursiva sin sobreinterpretación.
- source_word: מַדּוּעַ
  english_pob_choice: Why
  chosen_spanish: ¿Por qué
  alternatives_spanish:
  - ¿Por qué razón
  - ¿A qué se debe
  lexicon: HALOT
  rationale: La interrogación directa se expresa naturalmente con «¿Por qué».
- source_word: לֹא כִלִּיתֶם
  english_pob_choice: have you not completed
  chosen_spanish: no han cumplido
  alternatives_spanish:
  - no han terminado
  - no han completado
  lexicon: HALOT
  rationale: כִלָּה aquí es llevar a término lo asignado. En esta frase, «cumplido» preserva la idea de ejecutar una cuota/obligación, no solo acabar una tarea.
- source_word: חָקְכֶם
  english_pob_choice: your prescribed amount
  chosen_spanish: su cantidad prescrita
  alternatives_spanish:
  - su cuota prescrita
  - lo prescrito para ustedes
  lexicon: HALOT
  rationale: חֹק puede referirse a una porción fija o asignada. «Cantidad prescrita» refleja bien el valor de una medida fijada por autoridad, como en el audit trail inglés.
- source_word: לִלְבֹּן
  english_pob_choice: of brickmaking
  chosen_spanish: de ladrillos
  alternatives_spanish:
  - para hacer ladrillos
  - de fabricación de ladrillos
  lexicon: HALOT
  rationale: El infinitivo señala la labor de hacer ladrillos. En español, «de ladrillos» suena más natural dentro de «cantidad prescrita» y comunica la materia del trabajo sin cargar la frase.
- source_word: כִּתְמוֹל שִׁלְשֹׁם
  english_pob_choice: as before
  chosen_spanish: como antes
  alternatives_spanish:
  - como ayer y anteayer
  - como antes de ahora
  lexicon: HALOT
  rationale: El hebreo es literalmente un modismo temporal que significa «como antes / como anteriormente». «Como antes» transmite ese valor idiomático con claridad y sin pesadez.
- source_word: גַּם תְּמוֹל גַּם הַיּוֹם
  english_pob_choice: both yesterday and today
  chosen_spanish: tanto ayer como hoy
  alternatives_spanish:
  - ayer y también hoy
  - ambos ayer y hoy
  lexicon: HALOT
  rationale: La correlación גַּם...גַּם intensifica la pareja temporal. «Tanto ayer como hoy» reproduce bien ese paralelismo enfático en español.
theological_decisions:
- issue: No introducir un término más técnico o eclesiástico para los funcionarios laborales
  english_pob_reading: Israelite foremen / Pharaoh’s taskmasters in a forced-labor setting
  chosen_spanish_reading: capataces de los hijos de Israel / capataces de Faraón
  alternative_spanish_readings:
  - oficiales
  - inspectores
  - supervisores
  rationale: El pasaje describe una estructura de trabajo forzado, no una jerarquía civil o litúrgica. «Capataces» comunica mejor la relación coercitiva entre ambos grupos y evita suavizar la escena.
  doctrine_reference: Éxodo 5:14; contexto narrativo de opresión en Éxodo 1–6
translation_notes:
  revision_awareness: La redacción sigue la última revisión inglesa, que ajustó la frase de una equivalencia más libre a una más cercana al hebreo («completed your prescribed amount of bricks»). En español se reflejó esa precisión con «cumplido su cantidad prescrita de ladrillos», manteniendo también el modismo temporal «como antes».
  spanish_consistency_notes:
  - Se mantiene Yahvé como forma predeterminada para el nombre divino, pero este versículo no lo contiene.
  - Se usa «Faraón» como nombre propio sin artículos añadidos.
  - «Capataces» se emplea de manera consistente para שֹׁטְרִים y נֹגְשִׂים, distinguidos solo por el complemento que especifica a qué grupo pertenecen.
  - Se conserva el paralelismo temporal final con una formulación natural en español que no borra el énfasis del hebreo.
