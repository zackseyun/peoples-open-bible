review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura y el sentido del hebreo: llegada de los hijos de Israel/toda la congregación al desierto de Zin en el primer mes, permanencia en Cades, y muerte/sepultura de Miriam allí. Conserva correctamente la repetición enfática de שָׁם ... שָׁם con «allí ... allí». Sin embargo, hay un problema de anclaje de notas: la nota [b] en el texto está colocada en «Cades», pero la nota corresponde léxicamente a «toda la congregación» (כָּל הָעֵדָה), no a קָדֵשׁ.'
  spanish_quality_summary: El español es claro, natural y digno. «Entonces llegaron...» funciona bien narrativamente; «se quedó» transmite adecuadamente וַיֵּשֶׁב; «fue sepultada» mantiene el pasivo con buen registro. «Cades» es una forma española defendible, aunque «Cades»/«Kadesh» puede variar por política editorial. La principal reparación necesaria es mover la nota [b] al sintagma correcto.
  glossary_alignment: No hay conflicto con la terminología principal del proyecto. «los hijos de Israel», «congregación», «desierto», «Miriam» y «sepultada» están alineados con la evidencia y las decisiones auditadas. La alternativa española «los hijos de Jacob» en las decisiones léxicas no está respaldada por el texto fuente para este versículo, pero no afecta el texto principal ni las notas publicadas.
  issues:
