  yaml_path: translation/nt/luke/001/066.yaml
  text: And all who heard it laid it up in their hearts[a], saying[b], “What then will this child become?” For the hand of the Lord was with him.
  footnotes:
  - marker: a
    text: Or, 'will this child be?' The Greek verb is simply 'will be,' but in context it asks about the child's future identity or role.
    reason: lexical_alternative
  - marker: b
    text: '''The hand of the Lord'' is a biblical idiom for God''s active power, favor, or guidance.'
    reason: cultural_note
translation:
  language: ko
  text: 이를 들은 모든 사람이 마음에 새기며 「이 아이가 장차 어떤 사람이 되겠는가?」 하고 말하였습니다. 야훼[a]의 손이 정녕 그와 함께 있었기 때문입니다.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: '본문의 「χεὶρ κυρίου」는 OT의 「YHWH의 손」 정형(예: 왕상 18:46; 사 41:20)을 직접 반영한다.'
    reason: alternative_reading
