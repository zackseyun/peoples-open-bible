review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador capta bien la secuencia ritual del hebreo: sacrificio de la víctima pascual, acción sacerdotal con la sangre y acción concurrente de los levitas. Sin embargo, dos elecciones no preservan óptimamente el matiz del original ni del rastro POB: «degollaron» es más estrecho que שׁחט, que aquí es el verbo sacrificial general ‘sacrificaron/degollaron’, y «rociaban la sangre de sus manos» suena poco natural y algo ambigua en español para מִיָּדָם. Además, el imperfecto «rociaban» pierde la cadena narrativa de wayyiqtol, mejor reflejada por pretérito simple.'
  spanish_quality_summary: El texto es mayormente legible, pero «rociaban la sangre de sus manos» resulta torpe y puede sugerir que la sangre estaba en las manos de los sacerdotes, sin expresar bien la recepción/aplicación ritual. «Les quitaban las pieles» es comprensible, pero «los desollaban» es más directo, más cercano al participio sacrificial, y mantiene el objeto implícito del hebreo mediante pronombre. La revisión mejora naturalidad, precisión ritual y fluidez pública.
  glossary_alignment: 'No hay conflictos con la terminología troncal del proyecto. Las decisiones clave a ajustar son léxicas: preferir «sacrificaron» frente a «degollaron» para שׁחט en sentido cultual amplio; para זרק, «rociaron» es aceptable en español si se conserva el matiz ritual en nota; para מַפְשִׁיטִים, «los desollaban» alinea mejor con la decisión inglesa ‘were skinning them’. «el sacrificio de la Pascua» sigue siendo defendible para הַפָּסַח, con nota alternativa a «el cordero de la Pascua».'
  issues:
  - severity: medium
    issue: «degollaron» restringe innecesariamente el verbo sacrificial שׁחט
    rationale: El hebreo denota el sacrificio ritual de la víctima, no necesariamente enfatiza solo el corte de garganta. «Sacrificaron» preserva mejor el valor cultual general y suena más natural en lectura bíblica.
  - severity: high
    issue: «rociaban la sangre de sus manos» es ambiguo y poco natural para מִיָּדָם
    rationale: La frase española puede entenderse como si la sangre proviniera de las manos de los sacerdotes. El sentido es que los sacerdotes aplicaban la sangre recibiéndola ‘de sus manos’, es decir, de quienes sacrificaban. Conviene reformular sin perder la nota explicativa.
  - severity: medium
    issue: El imperfecto «rociaban» debilita la secuencia narrativa hebrea
    rationale: 'Los wayyiqtol hebreos narrativos se reflejan mejor con pretérito simple en español: «rociaron»/«esparcieron», no imperfecto descriptivo.'
  - severity: low
    issue: La nota c del borrador no coincide con la función de nota inglesa
    rationale: En el rastro POB, la nota asociada a la acción de desollar es principalmente una aclaración cultural sobre lo que implica el verbo, no tanto una alternativa de traducción.
  revised_spanish_text: Y sacrificaron el sacrificio de la Pascua[a], y los sacerdotes rociaron la sangre, recibiéndola de sus manos[b], mientras los levitas los desollaban[c].
  revised_footnotes:
