translation:
  language: es
  text: 'Entonces David huyó de Naiot en Ramá[a], vino ante Jonatán y dijo: «¿Qué he hecho? ¿Cuál es mi culpa y cuál es mi pecado ante tu padre, que busca quitarme la vida?»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «de Naiot en Ramá». El hebreo probablemente se refiere al lugar conocido como Naiot, asociado con Ramá.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּבְרַח
  english_pob_choice: fled
  chosen_spanish: huyó
  alternatives_spanish:
  - fue huyendo
  - escapó
  lexicon: HALOT
  rationale: וַיִּבְרַח expresa huida rápida o escape. «Huyó» es natural en español, conserva la urgencia y evita suavizar el movimiento narrativo.
- source_word: מִנָּוֹת בָּרָמָה
  english_pob_choice: from Naioth in Ramah
  chosen_spanish: de Naiot en Ramá
  alternatives_spanish:
  - desde Naiot en Ramá
  - de las moradas en Ramá
  lexicon: HALOT
  rationale: El contexto anterior sugiere que Naiot es un nombre de lugar asociado con Ramá, no una descripción común. Se translitera «Naiot» y se mantiene la relación locativa con «en Ramá».
- source_word: וַיָּבֹא
  english_pob_choice: came
  chosen_spanish: fue
  alternatives_spanish:
  - vino
  - llegó
  lexicon: HALOT
  rationale: En español, tras «huyó», «fue» enlaza de manera natural con el movimiento narrativo hacia Jonatán. Aunque «llegó» es posible, «fue» conserva la secuencia verbal simple del hebreo sin forzar el foco de llegada.
- source_word: וַיֹּאמֶר לִפְנֵי יְהוֹנָתָן
  english_pob_choice: said before Jonathan
  chosen_spanish: dijo delante de Jonatán
  alternatives_spanish:
  - dijo en presencia de Jonatán
  - dijo ante Jonatán
  lexicon: HALOT
  rationale: לִפְנֵי significa literalmente «delante de / en presencia de». «Delante de Jonatán» conserva la imagen relacional del hebreo y suena natural en español.
- source_word: מֶה עָשִׂיתִי
  english_pob_choice: What have I done?
  chosen_spanish: ¿Qué he hecho?
  alternatives_spanish:
  - ¿Qué hice?
  lexicon: HALOT
  rationale: La pregunta retórica se expresa con perfecta naturalidad en español con el pretérito perfecto compuesto. Mantiene el tono directo e introspectivo del original.
- source_word: עֲוֺנִי
  english_pob_choice: my guilt
  chosen_spanish: mi culpa
  alternatives_spanish:
  - mi iniquidad
  - mi delito
  lexicon: HALOT
  rationale: עָוֹן puede referirse a culpa, culpabilidad o iniquidad. Aquí, dentro de una doble pregunta con חַטָּאת, «mi culpa» comunica bien la carga forense sin usar un término demasiado técnico.
- source_word: חַטָּאתִי
  english_pob_choice: my sin
  chosen_spanish: mi pecado
  alternatives_spanish:
  - mi falta
  - mi ofensa
  lexicon: HALOT
  rationale: חַטָּאת mantiene su valor moral-religioso de pecado. «Mi pecado» conserva la distinción con «mi culpa» y es plenamente transparente en español.
- source_word: לִפְנֵי אָבִיךָ
  english_pob_choice: before your father
  chosen_spanish: delante de tu padre
  alternatives_spanish:
  - ante tu padre
  - en presencia de tu padre
  lexicon: HALOT
  rationale: La expresión hebrea es literalmente «delante de tu padre». Esta forma preserva la relación espacial y judicial implícita, sin perder claridad en español.
- source_word: כִּי
  english_pob_choice: that
  chosen_spanish: para que
  alternatives_spanish:
  - que
  - pues
  lexicon: HALOT
  rationale: 'En este versículo, כִּי introduce la idea de propósito o consecuencia en la pregunta retórica: «¿Cuál es mi culpa... para que ande buscando mi vida?». «Para que» comunica mejor el enlace causal/resultativo en español.'
- source_word: מְבַקֵּשׁ אֶת נַפְשִׁי
  english_pob_choice: he is seeking my life
  chosen_spanish: ande buscando mi vida
  alternatives_spanish:
  - esté buscando mi vida
  - busque mi vida
  - quiera matarme
  lexicon: HALOT
  rationale: El hebreo usa el modismo «buscar la vida de alguien», una forma de decir intentar quitarle la vida. Se conserva el modismo con una construcción verbal natural en español («ande buscando mi vida») para no perder la fuerza idiomática ni reducirlo prematuramente a una paráfrasis.
translation_notes:
  revision_awareness: El texto español sigue de cerca el hebreo, respetando la secuencia narrativa, la repetición retórica de «qué», y la distinción entre עָוֹן («culpa») y חַטָּאת («pecado»). Se mantiene la transliteración de Naiot según el criterio POB para nombres de lugar, y se conserva el modismo de «buscar la vida» sin convertirlo en una explicación más interpretativa.
  spanish_consistency_notes:
  - Se usó «Yahvé» no porque aparezca explícitamente en este versículo, sino como norma del proyecto para el Tetragrámaton cuando corresponda; aquí no aplica.
  - Se prefirió «culpa» para עָוֹן y «pecado» para חַטָּאת, manteniendo una diferenciación semántica visible en español.
  - «Delante de» y «para que» fueron elegidos para reflejar el hebreo relacional y la subordinación con כִּי sin forzar un giro arcaico.
