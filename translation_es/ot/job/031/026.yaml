  to: si miré la luz cuando resplandecía[a], o a la luna moviéndose con esplendor[b],
  rationale: 'Se ajusta el tiempo verbal a un español más natural dentro de la serie condicional de Job y se rehace la segunda cláusula para reflejar mejor el participio hebreo «hōlēḵ» sin rigidez. Se conservan las decisiones léxicas principales del POB: «la luz» en el texto principal y la nota alternativa «el sol», además de una nota para la imagen de la luna en su curso.'
