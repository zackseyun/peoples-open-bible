review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien el sentido general del griego: los hombres de la ciudad ven a los atacantes en la cima, toman armas, salen de la ciudad, y los honderos frenan la subida arrojándoles piedras. Sin embargo, hay dos desajustes de fidelidad: (1) «detuvo su ascenso» pone verbo en singular frente al sujeto plural/distributivo y suena como si un solo hondero lo hiciera; (2) «les arrojaba piedras» no refleja con suficiente claridad el imperfecto plural continuo de ἔβαλλον. También conviene evitar el anclaje de nota en «todo», porque la nota explica σφενδονήτης, no el distributivo πᾶς.'
  spanish_quality_summary: 'El español es generalmente claro y natural, con buen registro bíblico moderno. «En la cima del monte», «tomaron sus armas» y «salieron de la ciudad» funcionan bien. No obstante, «todo hondero entre ellos detuvo su ascenso y les arrojaba piedras» resulta algo áspero en concordancia y fluidez. Una reformulación plural y progresiva mejora la legibilidad: «todos los honderos entre ellos les impedían subir y les seguían arrojando piedras».'
  glossary_alignment: No hay términos del glosario mayor en juego. La elección «hondero» para σφενδονήτης está bien alineada con la evidencia léxica y con la nota alternativa. Se preserva correctamente el masculino explícito de οἱ ἄνδρες. No hay cuestiones teológicas sensibles.
  issues:
  - severity: medium
    issue: Concordancia y fuerza distributiva en «todo hondero entre ellos detuvo su ascenso»
    rationale: πᾶς ἀνὴρ σφενδονήτης puede expresarse distributivamente, pero en español esa formulación con verbo singular suena trabada y menos natural. Además, el griego luego usa plural en διεκράτησαν, por lo que conviene un predicado plural que refleje mejor la acción colectiva.
  - severity: medium
    issue: Aspecto imperfectivo insuficiente en «les arrojaba piedras»
    rationale: ἔβαλλον describe una acción repetida/continua. En español, «les arrojaba piedras» con sujeto singular arrastra el problema anterior; una forma como «les seguían arrojando piedras» o «les arrojaban piedras» refleja mejor el valor iterativo.
  - severity: low
    issue: Marcador de nota colocado en «todo» en vez de en «honderos»/«hondero»
    rationale: La nota explica σφενδονήτης, no πᾶς. El anclaje debe ir sobre el término léxico relevante para evitar ambigüedad.
  revised_spanish_text: Y cuando los hombres de la ciudad los vieron en la cima del monte, tomaron sus armas y salieron de la ciudad hacia la cima del monte; y todos los honderos[a] entre ellos les impedían subir y les seguían arrojando piedras.
  revised_footnotes:
  - marker: a
    text: 'Griego σφενδονήτης: «hondero», más literalmente «el que usa honda».'
    reason: lexical_alternative
  revision_rationale: 'Se ajustó la segunda mitad del versículo para reflejar mejor la sintaxis y el aspecto del griego: acción colectiva de los honderos, resistencia al ascenso, y ataque continuo con piedras. También se movió la nota al término léxico pertinente, «honderos». No se requieren cambios doctrinales ni adjudicación adicional.'
