translation:
  language: es
  text: Mira, su sangre no fue llevada al interior del lugar santo[a]. Ciertamente debieron comerla en el lugar santo[b], como yo mandé.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «en el lugar santo, adentro». El hebreo usa el término para el área sagrada junto con «adentro», enfatizando el interior del santuario.
    reason: lexical_alternative
  - marker: b
    text: 'El hebreo intensifica la obligación con un infinitivo absoluto más verbo finito: literalmente, «comiendo debieron comerla».'
    reason: lexical_alternative
lexical_decisions:
- source_word: הֵן
  english_pob_choice: Look
  chosen_spanish: Mira
  alternatives_spanish:
  - Mira, pues
  - Mira bien
  - He aquí
  lexicon: HALOT
  rationale: La partícula introduce una llamada enfática de atención. «Mira» conserva esa fuerza deíctica en español moderno y natural, sin volver el verso arcaico.
- source_word: הוּבָא
  english_pob_choice: was brought
  chosen_spanish: fue llevada
  alternatives_spanish:
  - fue traída
  - fue introducida
  lexicon: HALOT
  rationale: El pasivo de הובא expresa que la sangre no fue introducida/trasladada al espacio sagrado. «Fue llevada» comunica el movimiento pasivo de manera clara; por contexto, «sangre» en español admite este verbo sin perder naturalidad.
- source_word: דָּמָהּ
  english_pob_choice: its blood
  chosen_spanish: su sangre
  alternatives_spanish:
  - la sangre de ella
  - la sangre de eso
  lexicon: HALOT
  rationale: El sufijo femenino singular remite a la ofrenda/animal, pero en español bíblico actual «su sangre» es la forma más natural y no requiere forzar género personal.
- source_word: אֶל הַקֹּדֶשׁ פְּנִימָה
  english_pob_choice: inside into the holy place
  chosen_spanish: dentro, en el lugar santo
  alternatives_spanish:
  - dentro del lugar santo
  - al interior del lugar santo
  - dentro, en el santuario
  lexicon: HALOT
  rationale: La combinación de dirección más פְּנִימָה marca interioridad. «Dentro, en el lugar santo» refleja esa idea sin sobrecargar el texto; conserva el término cultual «lugar santo» para el área sagrada sin neutralizarla como simple espacio.
- source_word: אָכ֨וֹל תֹּאכְל֥וּ
  english_pob_choice: You certainly should have eaten
  chosen_spanish: Ciertamente debieron comerla
  alternatives_spanish:
  - Seguro debieron comerla
  - Debieron comerla sin falta
  - Tenían que comerla ciertamente
  lexicon: HALOT
  rationale: El infinitivo absoluto con imperfecto intensifica la obligación. En español, «ciertamente debieron» transmite la fuerza exhortativa/reprobatoria del hebreo sin sonar artificial en una recriminación pasada.
- source_word: אֹתָהּ
  english_pob_choice: it
  chosen_spanish: la
  alternatives_spanish:
  - la ofrenda
  - ella
  lexicon: HALOT
  rationale: El objeto directo femenino singular se ajusta bien a «la», referido a la ofrenda/flecha sacrificial implícita por el contexto. Añadir «la ofrenda» en el cuerpo sería explicativo en exceso.
- source_word: בַּקֹּדֶשׁ
  english_pob_choice: in the holy place
  chosen_spanish: en el lugar santo
  alternatives_spanish:
  - en el santuario
  - en un lugar santo
  lexicon: HALOT
  rationale: Se mantiene la misma expresión cultual que en la primera mitad para diferenciar el sitio de consumo del ámbito interior donde no fue llevada la sangre. «Lugar santo» es idiomático y fiel al registro ritual.
- source_word: כַּאֲשֶׁר צִוֵּיתִי
  english_pob_choice: as I commanded
  chosen_spanish: como yo mandé
  alternatives_spanish:
  - como yo había mandado
  - tal como yo mandé
  lexicon: HALOT
  rationale: «Mandé» conserva la referencia a la orden previa con concisión y dignidad. El pluscuamperfecto no es necesario en español para este cierre normativo.
theological_decisions:
- issue: Distinción espacial ritual
  english_pob_reading: Differentiate the inner sacred area ('inside into the holy place') from the place where the priests were to eat ('in the holy place').
  chosen_spanish_reading: Diferenciar «dentro, en el lugar santo» de «en el lugar santo» para mantener la lógica ritual del verso.
  alternative_spanish_readings:
  - «en el lugar santo, dentro»
  - «en el santuario, dentro»
  - hacer las dos frases simplemente con «en el lugar santo»
  rationale: El hebreo usa una combinación de dirección e interioridad en la primera cláusula, y luego el lugar de consumo en la segunda. Mantener una distinción en español evita borrar esa tensión textual y conserva la lógica cultual sin inventar un perímetro más preciso que el dado por el texto.
  doctrine_reference: Levítico 10:18; lógica ritual del santuario y consumo de ofrendas
translation_notes:
  revision_awareness: Tomé como base la revisión más reciente del audit trail inglés, que prefirió una redacción que reflejara más directamente אֶל־הַקֹּדֶשׁ פְּנִימָה sin una aposición torpe. Por eso la versión española conserva la distinción espacial con una formulación breve y natural («dentro, en el lugar santo») y mantiene la fuerza intensiva de אָכוֹל תֹּאכְלוּ con «ciertamente debieron comerla».
  spanish_consistency_notes:
  - Usé «lugar santo» de forma consistente para el término cultual הַקֹּדֶשׁ, evitando alternar con «santuario» en el cuerpo del verso para no diluir el paralelismo.
  - Mantuve «Mira» como interjección de atención, coherente con un estilo bíblico moderno y digno.
  - Elegí «mandé» en lugar de una perífrasis más larga para cerrar el verso con concisión normativa, sin perder el valor de orden divina.
