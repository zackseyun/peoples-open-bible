revisions:
- from: No seas indiferente ante los que lloran, y con los que están de duelo, duele también.[a]
  to: Da un regalo delante de toda persona viva[a], y no retengas la bondad ni aun de los muertos.
  rationale: Se reemplaza el texto principal por una traducción del hebreo conservado, conforme a la política del proyecto y al expediente POB en inglés. Se mantiene la tradición griega divergente en nota textual. «Da un regalo» traduce תֵּן מַתָּן con claridad natural; «delante de toda persona viva» preserva לִפְנֵי כָל חָי; «no retengas la bondad» refleja אַל תִּמְנַע חָסֶד en contexto sapiencial; «ni aun de los muertos» conserva el énfasis inclusivo de וְגַם מִמֵּת.
