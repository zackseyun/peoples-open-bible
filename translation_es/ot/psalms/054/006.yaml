translation:
  language: es
  text: He aquí[a], Dios es mi auxiliador; el Señor[b] está entre los que sostienen mi vida[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «Mira». La partícula hebrea introduce una afirmación enfática y llama la atención.
    reason: alternative_reading
  - marker: b
    text: O «el Señor sostiene mi alma» o «el Señor es el sustentador de mi vida». La frase hebrea con «entre los que sostienen mi vida» es sintácticamente difícil, y algunas traducciones entienden que el Señor mismo es quien sostiene directamente.
    reason: alternative_reading
  - marker: c
    text: Hebreo נֶפֶשׁ (nephesh), que según el contexto puede significar «vida», «ser», «alma» o «persona». Aquí el contexto favorece «vida».
    reason: lexical_alternative
lexical_decisions:
- source_word: הִנֵּה
  english_pob_choice: Behold
  chosen_spanish: ¡Mira!
  alternatives_spanish:
  - He aquí
  - Mira
  lexicon: HALOT
  rationale: La partícula introduce una afirmación enfática y llama la atención. «¡Mira!» conserva ese valor exhortativo y poético en español sin sonar demasiado arcaico como «He aquí».
- source_word: אֱלֹהִים
  english_pob_choice: God
  chosen_spanish: Dios
  alternatives_spanish:
  - el Dios
  lexicon: HALOT
  rationale: Aquí funciona como sujeto del enunciado y requiere sentido singular. «Dios» es la equivalencia natural y fiel al contexto.
- source_word: עֹזֵר
  english_pob_choice: helper
  chosen_spanish: ayudador
  alternatives_spanish:
  - ayuda
  - el que ayuda
  - auxiliador
  lexicon: HALOT
  rationale: 'El participio qal se usa de forma predicativa: «es mi ayudador». «Ayudador» conserva el matiz agentivo personal mejor que «ayuda».'
- source_word: לִי
  english_pob_choice: my
  chosen_spanish: mi
  alternatives_spanish:
  - para mí
  - a mí
  lexicon: HALOT
  rationale: 'Con un sustantivo relacional como «ayudador», el poseído en español transmite mejor la relación de beneficio y cercanía: «mi ayudador».'
- source_word: אֲדֹנָי
  english_pob_choice: the Lord
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el Señor
  lexicon: HALOT
  rationale: Aunque el contexto inglés distingue este título con «the Lord», el texto hebreo aquí usa la forma divina vinculada al nombre propio. Según la norma del proyecto, se traduce por «Yahvé», no por un reemplazo reverencial genérico.
- source_word: בְּסֹמְכֵי
  english_pob_choice: is among those who sustain
  chosen_spanish: está entre los que sostienen
  alternatives_spanish:
  - está con los que sostienen
  - sostiene junto con los que sostienen
  - está entre los sostenedores de
  lexicon: HALOT
  rationale: La construcción con ב + participio plural es sintácticamente difícil. En español, «está entre los que sostienen» preserva la lectura de asociación/grupo que el audit trail inglés consideró la más natural, sin perder el plural participial.
- source_word: נַפְשִׁי
  english_pob_choice: my life
  chosen_spanish: mi vida
  alternatives_spanish:
  - mi alma
  - mi ser
  - mi persona
  lexicon: HALOT
  rationale: En Salmos, נֶפֶשׁ suele referirse a la vida o al propio ser. «Mi vida» mantiene el sentido contextual de preservación y evita imponer la dicotomía alma/cuerpo.
theological_decisions:
- issue: Tratamiento de אֲדֹנָי como título divino
  english_pob_reading: the Lord
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el Señor
  rationale: El hebreo apunta al nombre divino, y el proyecto pide usar «Yahvé» en el texto principal. Esto preserva la referencia al nombre propio sin sustituirlo por una fórmula de ocultamiento.
  doctrine_reference: 'DOCTRINE.md: translate the divine name as Yahvé in the main Spanish text'
- issue: Sentido de נֶפֶשׁ en contexto de preservación
  english_pob_reading: my life
  chosen_spanish_reading: mi vida
  alternative_spanish_readings:
  - mi alma
  - mi ser
  rationale: El versículo trata de apoyo y salvación en peligro; por eso «vida» comunica mejor el valor preservado. Se evita resolver la tensión bíblica con una antropología posterior no exigida por el texto.
  doctrine_reference: 'DOCTRINE.md: Preserve theological tension rather than resolve it'
translation_notes:
  revision_awareness: El borrador sigue de cerca el audit trail inglés y la sintaxis hebrea, pero adapta la construcción difícil de בְּסֹמְכֵי a una frase española natural sin perder la idea de asociación. No se aplicaron revisiones previas adicionales.
  spanish_consistency_notes:
  - Se mantiene «Dios» para אֱלֹהִים y «Yahvé» para אֲדֹנָי conforme a la norma del proyecto.
  - Se prefirió «mi vida» para נַפְשִׁי en coherencia con el uso contextual en Salmos y con el auditoría inglesa.
  - Se usó un registro poético claro, sin calco mecánico del inglés, y con puntuación española.
