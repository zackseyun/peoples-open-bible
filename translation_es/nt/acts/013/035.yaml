review_pass:
  verdict: revise
  source_alignment_summary: El borrador español transmite bien el sentido del griego y sigue de cerca las decisiones del POB en cuanto a inferencia («Por eso»), adición («también»), elipsis explícita («en otro salmo»), fórmula de cita («dice») y referencia mesiánica («tu Santo»). La cláusula principal «No permitirás que tu Santo vea corrupción» refleja fielmente Οὐ δώσεις … ἰδεῖν διαφθοράν.
  spanish_quality_summary: 'El texto es claro, natural y digno en español. Sin embargo, hay un problema en las notas: la nota [c] ofrece «decadencia» como alternativa para διαφθοράν, pero esa opción no corresponde bien al sentido contextual de descomposición/corrupción corporal y además contradice el propio razonamiento léxico del expediente español, donde se reconoce que «corrupción» suena más natural que «decadencia» en este contexto.'
  glossary_alignment: No hay conflicto con la terminología por defecto del proyecto. «Santo» para ὅσιος en contexto mesiánico está bien justificado; «corrupción» es una opción tradicional y fiel en español. La única desalineación es la alternativa de nota «decadencia», que debería ajustarse a «descomposición» o mantenerse como «corrupción/decadencia» solo si hubiera evidencia contextual, la cual aquí no la hay.
  issues:
  - severity: medium
    issue: La nota [c] da «decadencia» como alternativa para διαφθοράν.
    rationale: En Hechos 13:35 el sentido es corrupción o descomposición del cuerpo, no decadencia en sentido general. La auditoría inglesa preserva «corruption» como alternativa a «decay»; en español, si el texto principal usa «corrupción», la alternativa más fiel y útil sería «descomposición», no «decadencia».
  revised_spanish_text: Por eso también dice en otro salmo[a], «No permitirás que tu Santo[b] vea corrupción[c]».
  revised_footnotes:
  - marker: a
    text: O «en otro lugar» o «en otro pasaje»; el griego dice simplemente «en otro».
    reason: lexical_alternative
  - marker: b
    text: O «tu fiel».
    reason: lexical_alternative
  - marker: c
    text: O «descomposición».
    reason: lexical_alternative
  revision_rationale: Se conserva el texto principal porque es fiel y natural; solo se corrige la nota alternativa de διαφθοράν para reflejar mejor el sentido contextual de corrupción/descomposición corporal y alinearla con la evidencia fuente y la lógica léxica documentada.
