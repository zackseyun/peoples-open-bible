translation:
  language: es
  text: Yahvé hizo esto al día siguiente, y murió todo el ganado de Egipto; pero del ganado de los hijos de Israel[a] no murió ni uno.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «los israelitas». Hebreo: «los hijos de Israel».'
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  - el SEÑOR
  lexicon: HALOT
  rationale: El texto hebreo usa el nombre divino propio, no un título. En español, 'Yahvé' conserva el valor del Tetragrámaton sin sustituirlo por una fórmula de ocultación como 'el SEÑOR'.
- source_word: וַיַּעַשׂ ... אֶת־הַדָּבָר הַזֶּה
  english_pob_choice: did this thing
  chosen_spanish: hizo esta cosa
  alternatives_spanish:
  - hizo esto
  - realizó este hecho
  lexicon: HALOT
  rationale: La construcción hebrea es concreta y sencilla. 'Hizo esta cosa' mantiene la literalidad básica de עשה + דבר sin añadir una paráfrasis interpretativa.
- source_word: מִמָּחֳרָת
  english_pob_choice: the next day
  chosen_spanish: al día siguiente
  alternatives_spanish:
  - el día siguiente
  - en el día siguiente
  lexicon: HALOT
  rationale: La expresión temporal señala el día posterior inmediato. 'Al día siguiente' es natural en español y reproduce bien el valor temporal del término.
- source_word: וַיָּמָת
  english_pob_choice: died
  chosen_spanish: murió
  alternatives_spanish:
  - pereció
  lexicon: HALOT
  rationale: מָת es el verbo ordinario 'morir'. 'Murió' es la equivalencia directa y más transparente en español.
- source_word: כֹּל מִקְנֵה מִצְרָיִם
  english_pob_choice: all the livestock of Egypt
  chosen_spanish: todo el ganado de Egipto
  alternatives_spanish:
  - todo el ganado de los egipcios
  - todo el ganado perteneciente a Egipto
  lexicon: HALOT
  rationale: מִקְנֶה abarca ganado/livestock; en español bíblico 'ganado' funciona de manera amplia y natural. 'Ganado de Egipto' conserva el genitivo sin restringirlo solo a bovinos.
- source_word: וּמִמִּקְנֵה בְנֵי יִשְׂרָאֵל
  english_pob_choice: but from the livestock of the sons of Israel
  chosen_spanish: pero del ganado de los hijos de Israel
  alternatives_spanish:
  - pero del ganado de los israelitas
  - pero del ganado de los hijos de Israel
  lexicon: HALOT
  rationale: Se conserva el valor partitivo de מִן con 'del'. 'Hijos de Israel' refleja de manera formal el hebreo בְנֵי יִשְׂרָאֵל y funciona bien en español bíblico.
- source_word: בְנֵי יִשְׂרָאֵל
  english_pob_choice: the sons of Israel
  chosen_spanish: los hijos de Israel
  alternatives_spanish:
  - los israelitas
  - los hijos de Jacob
  lexicon: HALOT
  rationale: La forma plural constructa masculina se conserva con 'hijos de Israel'. Aunque 'israelitas' es más idiomático, esta versión preserva mejor la forma fuente.
- source_word: לֹא מֵת אֶחָד
  english_pob_choice: not one died
  chosen_spanish: no murió uno
  alternatives_spanish:
  - no murió ninguno
  - no murió ni uno
  lexicon: HALOT
  rationale: La negación enfática y el numeral singular se reproducen de manera breve. 'No murió uno' mantiene la estructura compacta del hebreo y la afirmación absoluta.
theological_decisions:
- issue: Tratamiento del nombre divino יהוה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Jehová
  - el SEÑOR
  rationale: La lectura española sigue el criterio del proyecto de rendir el Nombre divino como transliteración del Tetragrámaton, preservando su identidad personal y pactual en lugar de sustituirlo por un título.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Alcance de מִקְנֶה
  english_pob_reading: livestock
  chosen_spanish_reading: ganado
  alternative_spanish_readings:
  - ganado vacuno
  - animales domésticos
  rationale: En este contexto de plaga sobre los animales, 'ganado' comunica el conjunto de animales domésticos afectados sin estrechar indebidamente el campo semántico a bovinos.
  doctrine_reference: HALOT; contexto narrativo de Éxodo 9
- issue: Expresión etnónima בְנֵי יִשְׂרָאֵל
  english_pob_reading: sons of Israel
  chosen_spanish_reading: hijos de Israel
  alternative_spanish_readings:
  - israelitas
  - hijos de Jacob
  rationale: Se conserva la forma masculina plural del hebreo por fidelidad formal, sin perder la referencia corporativa al pueblo del pacto.
  doctrine_reference: 'DOCTRINE.md Translation philosophy §4: Gender-accurate over gender-neutral'
translation_notes:
  revision_awareness: 'La redacción sigue de cerca el texto hebreo y el audit trail en inglés, con una sola adaptación natural en español: ''hizo esta cosa'' se expresa como ''hizo esta cosa'' / ''al día siguiente'' para evitar una construcción demasiado forzada. No se aplicaron revisiones textuales adicionales; el pasaje permanece en alto acuerdo con la revisión más reciente.'
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' para el Nombre divino, conforme al estándar del proyecto.
  - '''Ganado'' se usa como equivalente amplio de מִקְנֶה, evitando restringir el sentido a ''cattle''.'
  - '''Hijos de Israel'' conserva la forma del hebreo y la referencia corporativa al pueblo.'
  - La negación final se traduce con brevedad para reflejar el énfasis absoluto del hebreo.
