id: TOB.3.15
reference: Tobit 3:15
source:
  edition: lxx-swete-1909
  text: καὶ οὐκ ἐμόλυνα τὸ ὄνομά μου οὐδὲ τὸ ὄνομα τοῦ πατρός μου ἐν τῇ γῇ τῆς αἰχμαλωσίας μου. μονογενής εἰμι τῷ πατρί μου, καὶ οὐχ ὑπάρχει αὐτῷ παιδίον, ὃ κληρονομήσει αὐτόν, οὐδὲ ἀδελφὸς ἐγγὺς οὐδὲ ὑπάρχων αὐτῷ υἱὸς ἵνα συντηρήσω ἐμαυτὴν αὐτῷ γυναῖκα. ἤδη ἀπώλοντό μοι ἑπτά· ἵνα τί μοι ζῆν; καὶ εἰ μὴ δοκεῖ σοι ἀποκτεῖναί με, ἐπίταξον ἐπιβλέψαι ἐπʼ ἐμὲ καὶ ἐλεῆσαί με, καὶ μηκέτι ἀκοῦσαί με ὀνειδισμόν.
  language: Greek
  pages:
  - 832
  - 835
  - 836
  - 837
  - 838
  - 839
  - 840
  - 841
  confidence: high
  validation: minor_mismatch
translation:
  text: And I have not defiled my name[a], nor the name of my father, in the land of my captivity. I am my father’s only child, and he has no child who will inherit him, nor a near brother, nor does he have a son so that I might keep myself for him as a wife. Already seven have perished from me; why should I live? But if it does not seem good to you to put me to death, command that you look upon me and have mercy on me[c][b], and that I no longer hear reproach.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'a close kinsman'; the Greek literally says 'a near brother,' likely referring more broadly to a near male relative in the family line.
    reason: lexical_alternative
  - marker: b
    text: That is, seven husbands in the narrative context, though the Greek here says only 'seven.'
    reason: alternative_reading
  - marker: c
    text: The clause about 'a near brother' and 'a son' is textually and syntactically difficult in Greek; this translation stays close to the wording without claiming more certainty than the source allows.
    reason: textual_variant
lexical_decisions:
- source_word: ἐμόλυνα
  chosen: have defiled
  alternatives:
  - have polluted
  - have stained
  lexicon: BDAG
  rationale: μολύνω commonly denotes defilement or pollution, often with moral or ritual force. 'Defiled' preserves the ethical weight of Sarah's protest without over-specifying ritual impurity.
- source_word: ὄνομα
  chosen: name
  alternatives:
  - reputation
  lexicon: BDAG
  rationale: The Greek literally says 'name' twice. In context it includes family honor/reputation, but retaining 'name' preserves the idiom and lets the honor dimension remain implicit.
- source_word: γῇ τῆς αἰχμαλωσίας μου
  chosen: land of my captivity
  alternatives:
  - land of my exile
  - land where I am captive
  lexicon: BDAG
  rationale: A literal rendering best preserves the pathos and diaspora setting. 'Captivity' reflects αἰχμαλωσία directly, though 'exile' is a possible smoother English alternative.
- source_word: μονογενής
  chosen: only child
  alternatives:
  - only-begotten
  - only daughter
  lexicon: BDAG
  rationale: The adjective denotes being the sole offspring. Since the speaker is female, 'only child' is natural English and avoids importing later theological associations of 'only-begotten.' 'Only daughter' is possible by sense, but the Greek itself is not the feminine noun 'daughter' here.
- source_word: παιδίον
  chosen: child
  alternatives:
  - offspring
  lexicon: BDAG
  rationale: The diminutive form here functions broadly for child/offspring, not specifically a small child. 'Child' is the clearest natural equivalent.
- source_word: κληρονομήσει αὐτόν
  chosen: will inherit him
  alternatives:
  - will be his heir
  - will inherit from him
  lexicon: BDAG
  rationale: The Greek object is explicit ('inherit him'). While English often says 'inherit from him,' preserving the direct object keeps closer to the source and reflects heirship language.
- source_word: ἀδελφὸς ἐγγύς
  chosen: a near brother
  alternatives:
  - a close kinsman
  - a near relative
  lexicon: BDAG
  rationale: The phrase is somewhat awkward in Greek and likely points to a close male relative within the family line. 'Near brother' keeps the literal form while signaling the kinship issue; an explanatory footnote preserves the broader kinship sense.
- source_word: συντηρήσω ἐμαυτὴν αὐτῷ γυναῖκα
  chosen: I might keep myself for him as a wife
  alternatives:
  - I might preserve myself for him as a wife
  - I might reserve myself to become his wife
  lexicon: BDAG
  rationale: The clause is difficult, but συντηρέω with ἐμαυτήν suggests preserving/reserving herself, and γυναῖκα indicates the role of wife. This rendering stays close to the Greek while remaining intelligible.
- source_word: ἀπώλοντό μοι ἑπτά
  chosen: seven have perished from me
  alternatives:
  - seven have died on me
  - I have lost seven
  lexicon: BDAG
  rationale: The dative μοι marks personal loss. 'Have perished from me' is slightly formal but preserves the sense that seven husbands have been taken away from her without adding 'husbands,' which is implied from context rather than stated here.
- source_word: δοκεῖ σοι
  chosen: it does not seem good to you
  alternatives:
  - it does not seem right to you
  - it is not your will
  lexicon: BDAG
  rationale: δοκέω here expresses what seems fitting to God. 'Seem good' is a reverent and fairly literal rendering.
- source_word: ἀποκτεῖναί με
  chosen: to put me to death
  alternatives:
  - to kill me
  lexicon: BDAG
  rationale: '''Put me to death'' fits the solemn prayer context better than the blunter ''kill me,'' while remaining accurate.'
- source_word: ἐπίταξον ἐπιβλέψαι ἐπʼ ἐμέ
  chosen: command that you look upon me
  alternatives:
  - order that you regard me
  - deign to look upon me
  lexicon: BDAG
  rationale: The wording is unusual in English because the Greek is rhetorically elevated. 'Look upon me' preserves the prayer idiom of divine regard.
- source_word: ἐλεῆσαί με
  chosen: have mercy on me
  alternatives:
  - show me mercy
  lexicon: BDAG
  rationale: Standard and natural rendering of the plea for divine compassion.
- source_word: ὀνειδισμόν
  chosen: reproach
  alternatives:
  - insult
  - disgrace
  lexicon: BDAG
  rationale: '''Reproach'' captures both verbal insult and social shame, fitting Sarah''s lament.'
