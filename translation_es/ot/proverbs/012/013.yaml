    rationale: En español estándar se dice «el habla»; la forma actual suena incorrecta o muy extraña. La nota debe corregirse para buena legibilidad.
  - severity: low
    issue: «el hombre malo» frente a «un hombre malo»
    rationale: El inglés auditado fue revisado a indefinido por naturalidad. En español, «para un hombre malo» fluye mejor y sigue representando el tipo proverbial sin pérdida de sentido.
  - severity: low
