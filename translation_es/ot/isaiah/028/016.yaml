translation:
  language: es
  text: 'Por tanto, así dice el Señor Yahvé: «He aquí, yo pongo en Sion una piedra[a], piedra probada, piedra angular preciosa, cimiento firme; el que cree[b] no se apresurará[c]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Esta «piedra» se aplica después al Mesías en Romanos 9:33 y 1 Pedro 2:6.
    reason: cross_reference
  - marker: b
    text: 'O: «el que confía». El participio hebreo puede expresar tanto creer como confiar/apoyarse en alguien.'
    reason: lexical_alternative
  - marker: c
    text: 'O: «no tendrá prisa»; algunos entienden la idea de manera más interpretativa como «no se alarmará».'
    reason: lexical_alternative
lexical_decisions:
- source_word: אֲדֹנָי יְהוִה
  english_pob_choice: the Lord GOD
  chosen_spanish: el Señor Yahvé
  alternatives_spanish:
  - el Señor DIOS
  - el Señor Yahvéh
  lexicon: HALOT
  rationale: En la combinación de títulos, el inglés POB usa 'the Lord GOD' para evitar la repetición artificial 'Lord LORD' y preservar el valor solemne del binomio. En español, 'el Señor Yahvé' comunica de manera natural esa misma combinación sin ocultar el nombre divino. Se evita 'el Señor DIOS' por sonar más tipográfico que léxico y por perder la identidad nominal de יהוה.
- source_word: הִנְנִי
  english_pob_choice: Behold, I am
  chosen_spanish: He aquí, yo
  alternatives_spanish:
  - Miren, yo
  - Vean, yo
  lexicon: HALOT
  rationale: '''He aquí'' conserva el tono profético y deíctico del hebreo, y ''yo'' mantiene la fuerza enfática de la forma pronominal. Es más fiel al registro solemne que una formulación más coloquial.'
- source_word: יִסַּד
  english_pob_choice: I am laying
  chosen_spanish: pongo
  alternatives_spanish:
  - estoy poniendo
  - establezco
  - fundó
  lexicon: HALOT
  rationale: Aunque el inglés opta por 'I am laying' para captar la acción performativa, en español 'pongo' expresa de forma natural el acto de colocar una piedra fundamental. 'Establezco' o 'fundó' desvían el matiz hacia abstracción o pasado, mientras que 'estoy poniendo' suena menos idiomático aquí.
- source_word: בְּצִיּוֹן
  english_pob_choice: in Zion
  chosen_spanish: en Sion
  alternatives_spanish:
  - sobre Sion
  lexicon: HALOT
  rationale: '''En Sion'' es la correspondencia directa y natural de la preposición ב con este topónimo. Mantiene el valor locativo sin forzar la imagen arquitectónica.'
- source_word: אָבֶן אֶבֶן בֹּחַן
  english_pob_choice: a stone, a tested stone
  chosen_spanish: una piedra, piedra probada
  alternatives_spanish:
  - una piedra, piedra de prueba
  - una piedra, piedra examinada
  lexicon: HALOT
  rationale: Se conserva la repetición enfática de 'piedra' como en el hebreo y el inglés. 'Probada' reproduce bien בֹּחַן como algo sometido a prueba y aprobado, sin sobreexplicar.
- source_word: פִּנַּת יִקְרַת
  english_pob_choice: a precious cornerstone
  chosen_spanish: piedra angular preciosa
  alternatives_spanish:
  - piedra de ángulo preciosa
  - piedra angular de gran precio
  lexicon: HALOT
  rationale: '''Piedra angular'' es la forma española estable para el valor arquitectónico de פִּנַּת. ''Preciosa'' conserva el matiz de valor/honor de יִקְרַת sin convertirlo en mera rareza estética. Se mantiene el orden natural del español, que coloca el adjetivo después del sustantivo.'
- source_word: מוּסָד מוּסָּד
  english_pob_choice: a sure foundation
  chosen_spanish: cimiento firme
  alternatives_spanish:
  - fundamento seguro
  - base segura
  - cimiento seguro
  lexicon: HALOT
  rationale: El doble intensivo hebreo expresa firmeza y establecimiento seguro. En español, 'cimiento firme' comunica esa solidez con claridad y mantiene la metáfora de construcción. 'Cimiento seguro' también sería posible, pero 'firme' subraya mejor la estabilidad del soporte.
- source_word: הַמַּאֲמִין
  english_pob_choice: the one who believes
  chosen_spanish: el que cree
  alternatives_spanish:
  - el que confía
  - el creyente
  lexicon: HALOT
  rationale: '''El que cree'' es la forma más natural en español para el participio sustantivado y preserva la idea de confianza personal en el contexto profético. ''El que confía'' es una alternativa válida y cercana al campo semántico de אמן, pero ''cree'' mantiene mejor la conexión bíblica habitual sin perder la idea de fiarse.'
- source_word: לֹא יָחִישׁ
  english_pob_choice: will not be in haste
  chosen_spanish: no se apresurará
  alternatives_spanish:
  - no tendrá prisa
  - no correrá
  - no entrará en pánico
  lexicon: HALOT
  rationale: El inglés deja abierta la posibilidad de 'hurry' o incluso 'panic'. En español, 'no se apresurará' conserva el sentido básico del verbo y el tono sobrio del hebreo, sin añadir una interpretación emocional más fuerte en el texto principal.
theological_decisions:
- issue: Lectura mesiánica de la piedra de fundamento
  english_pob_reading: Retain the architectural image in the main text without making the messianic referent explicit.
  chosen_spanish_reading: Conservar la imagen arquitectónica en el texto principal sin explicitar el referente mesiánico.
  alternative_spanish_readings:
  - identificar explícitamente la piedra con el Mesías
  - traducir la piedra como una alusión directa a Cristo
  rationale: El hebreo presenta una imagen de fundación en Sion atribuida a Yahvé. Aunque la tradición del Nuevo Testamento aplica el pasaje al Mesías, esa lectura canónica no debe imponerse en la línea principal si el texto fuente no la explicita. La nota permite preservar la conexión bíblica sin borrar la tensión entre sentido original y recepción canónica.
  doctrine_reference: Principios de traducción POB §§1, 3
- issue: Valor semántico de הַמַּאֲמִין
  english_pob_reading: the one who believes
  chosen_spanish_reading: el que cree
  alternative_spanish_readings:
  - el que confía
  - el creyente
  rationale: La raíz אמן puede abarcar creer y confiar. En español, 'cree' funciona bien en una afirmación sapiencial/profética y deja abierta la dimensión de confianza, que se explicita en la nota como alternativa posible. Así se evita reducir el verbo a un mero asentimiento intelectual.
  doctrine_reference: Principios de traducción POB §3
translation_notes:
  revision_awareness: El texto inglés revisado eliminó una coma innecesaria tras 'Therefore' y mantuvo intacta la estructura del versículo. La versión española sigue esa misma lectura, conservando el paralelismo de 'piedra' y el cierre con el verbo de prisa sin añadir explicaciones doctrinales al cuerpo principal.
  spanish_consistency_notes:
  - Se usa 'Yahvé' para יהוה conforme al estándar del proyecto.
  - Se mantiene 'Sion' sin artículo para reflejar el topónimo bíblico.
  - Se conserva la repetición de 'piedra' para reproducir la intensificación del hebreo.
  - Se prefiere 'el que cree' en el texto principal, dejando 'confía' como alternativa en nota.
  - La puntuación española usa comillas angulares implícitas con dos puntos y cita directa, manteniendo el tono formal y bíblico.
