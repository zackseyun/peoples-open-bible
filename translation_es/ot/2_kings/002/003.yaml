revisions:
- from: 'Entonces salieron los hijos de los profetas que estaban en Betel hacia Eliseo y le dijeron[a]: «¿Sabes que hoy Yahvé está tomando a tu señor de sobre tu cabeza?». Y él respondió: «Yo también lo sé; callen».'
  to: 'Entonces los hijos de los profetas que estaban en Betel salieron a Eliseo y le dijeron[a]: «¿Sabes que hoy Yahvé está tomando a tu maestro de sobre tu cabeza?» Y él respondió: «Yo también lo sé; callen».'
  rationale: Se revisa «tu señor» a «tu maestro» para seguir mejor el sentido contextual de superior humano/mentor reflejado en la auditoría inglesa y evitar ambigüedad con un título divino. También se normaliza la puntuación española de la pregunta y se mejora ligeramente la fluidez con «salieron a Eliseo».
