base_translation:
  language: en
  yaml_path: translation/ot/judges/007/022.yaml
  text: When the three hundred trumpets were blown[a], Yahweh set every man's sword against his companion and against the whole camp, and the camp fled as far as Beth-shittah toward Zererah, as far as the edge of Abel-meholah[d][c][b], by Tabbath.
  footnotes:
  - marker: a
    text: Or 'the three hundred ram's horns were blown.' The Hebrew שׁוֹפָרוֹת refers to horn-trumpets, often made from rams' horns.
    reason: lexical_alternative
  - marker: b
    text: Or 'throughout the whole camp.' The Hebrew may emphasize either that each man turned his sword against the others in the camp or that the panic spread through the entire camp.
    reason: alternative_reading
  - marker: c
    text: Beth-shittah, Zererah, Abel-meholah, and Tabbath are place names in the route of the fleeing army.
    reason: cultural_note
  - marker: d
    text: Or 'the bank' or 'the border' of Abel-meholah for 'the edge of Abel-meholah.'
    reason: lexical_alternative
