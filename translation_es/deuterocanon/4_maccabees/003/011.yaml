revisions:
- from: Pero un deseo irracional por el agua entre los enemigos[a], tensando su presa sobre él, lo resecó, y al aflojarlo[b], lo consumió con fuego.
  to: Pero un deseo irracional por el agua entre los enemigos[a], apretándolo, lo marchitó, y al aflojarlo[b], lo abrasó.
