translation:
  language: es
  text: Miren a Abraham, su padre, y a Sara, que los dio a luz; porque yo lo llamé cuando era uno[a], y lo bendije y lo multipliqué.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «cuando estaba solo». El hebreo literalmente dice «uno».'
    reason: lexical_alternative
lexical_decisions:
- source_word: הַבִּיטוּ
  english_pob_choice: Look to
  chosen_spanish: Miren a
  alternatives_spanish:
  - Pongan la vista en
  - Miren hacia
  lexicon: HALOT
  rationale: El imperativo plural conserva la exhortación figurada de fijar la atención en Abraham y Sara como modelo; en español, 'miren a' es natural y mantiene el matiz relacional de tomar a alguien como referencia.
- source_word: אַבְרָהָם אֲבִיכֶם
  english_pob_choice: Abraham your father
  chosen_spanish: Abraham, su padre
  alternatives_spanish:
  - Abraham, su ancestro
  - Abraham, su antepasado
  lexicon: HALOT
  rationale: '''Padre'' refleja el lenguaje de parentesco y promesa del hebreo. Se conserva la forma representativa sin convertirla en un término más abstracto como ''antepasado''.'
- source_word: שָׂרָה תְּחוֹלֶלְכֶם
  english_pob_choice: Sarah who bore you
  chosen_spanish: Sara que los dio a luz
  alternatives_spanish:
  - Sara que los llevó en el parto
  - Sara que los parió
  lexicon: HALOT
  rationale: El verbo hebreo remite al alumbramiento/parto. 'Dio a luz' mantiene la imagen materna de forma digna y natural en español; 'los bore' sonaría menos idiomático en este contexto.
- source_word: אֶחָד
  english_pob_choice: when he was one
  chosen_spanish: cuando era uno
  alternatives_spanish:
  - cuando estaba solo
  - cuando era uno solo
  lexicon: HALOT
  rationale: Se preserva la dureza expresiva del hebreo literal 'uno', porque el texto subraya el inicio solitario de Abraham antes de la multiplicación prometida. Se evita resolver la tensión interpretativa en el texto principal.
- source_word: קְרָאתִיו
  english_pob_choice: I called him
  chosen_spanish: yo lo llamé
  alternatives_spanish:
  - lo llamé
  - yo lo convocé
  lexicon: HALOT
  rationale: '''Llamé'' reproduce el uso habitual de קרא en llamamiento divino. Se mantiene el sujeto explícito para reforzar la iniciativa divina.'
- source_word: וַאֲבָרְכֵהוּ
  english_pob_choice: I blessed him
  chosen_spanish: lo bendije
  alternatives_spanish:
  - lo bendije con bendición
  - le di mi bendición
  lexicon: HALOT
  rationale: '''Bendije'' es la traducción directa y estándar de ברך en contexto de pacto; conserva la fuerza teológica sin añadir perífrasis.'
- source_word: וְאַרְבֵּהוּ
  english_pob_choice: multiplied him
  chosen_spanish: lo multipliqué
  alternatives_spanish:
  - lo hice muy numeroso
  - lo aumenté
  lexicon: HALOT
  rationale: El hiphil de רבה expresa hacer muchos/aumentar. 'Multipliqué' preserva la resonancia de promesa y mantiene el paralelo con la bendición.
theological_decisions:
- issue: Sentido de אֶחָד aplicado a Abraham
  english_pob_reading: when he was one
  chosen_spanish_reading: cuando era uno
  alternative_spanish_readings:
  - cuando estaba solo
  - cuando era uno solo
  rationale: La versión principal conserva el valor literal y compacto del hebreo, sin suavizarlo prematuramente. Esto deja visible la tensión entre el sentido numérico ('uno') y la interpretación explicativa ('solo') que la nota puede recoger.
  doctrine_reference: Translation philosophy §§1, 3, 5
translation_notes:
  revision_awareness: La redacción toma en cuenta la revisión auditada del inglés, que prefirió 'bore you' por concisión y formalidad; en español se optó por 'dio a luz' como equivalente natural y digno, manteniendo el mismo núcleo semántico del parto. También se preservó 'cuando era uno' para reflejar la literalidad del hebreo y la decisión revisada de no sustituirla por una paráfrasis como 'solo'.
  spanish_consistency_notes:
  - Se usa 'Yahvé' como forma predeterminada solo cuando aparece el nombre divino explícito; este versículo no lo contiene.
  - Se mantiene 'Sara' y no 'Sarah' para la ortografía española habitual.
  - Se conserva el paralelismo con verbos en primera persona singular y pronombres de objeto directo coherentes en español.
  - No se introduce 'Mesías', 'Señor' ni otras sustituciones no presentes en el hebreo.
  - La nota al pie se limita a una alternativa léxica realista, sin desplazar el sentido principal del versículo.
