translation:
  language: es
  text: mientras él se va consumiendo como algo podrido, como una prenda[a] comida por la polilla.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «como podredumbre, como una prenda comida por la polilla».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהוּא
  english_pob_choice: while he
  chosen_spanish: mientras él
  alternatives_spanish:
  - y él
  - aunque él
  - en cuanto a él
  lexicon: HALOT
  rationale: El hebreo con conjunción y pronombre retoma al sujeto y enlaza la imagen del que padece; en español, «mientras él» conserva la continuidad y el matiz progresivo mejor que un simple «y él».
- source_word: כְּרָקָב
  english_pob_choice: like something rotten
  chosen_spanish: como algo podrido
  alternatives_spanish:
  - como podredumbre
  - como algo de podredumbre
  - como algo que se pudre
  lexicon: HALOT
  rationale: רָקָב expresa putrefacción/rotten. «Algo podrido» mantiene la imagen concreta y su fuerza descriptiva sin volver la frase rígida.
- source_word: יִבְלֶה
  english_pob_choice: wastes away
  chosen_spanish: se va desgastando
  alternatives_spanish:
  - se marchita
  - se consume
  - se va consumiendo
  lexicon: HALOT
  rationale: בלה denota desgaste o desvanecimiento progresivo. «Se va desgastando» comunica deterioro continuo de manera natural en español y sin perder el sentido corporal del contexto.
- source_word: כְּבֶגֶד
  english_pob_choice: like a garment
  chosen_spanish: como un vestido
  alternatives_spanish:
  - como una prenda
  - como un ropaje
  - como un traje
  lexicon: HALOT
  rationale: בֶּגֶד es término general para ropa/vestido. «Vestido» es un equivalente público y claro en español; mantiene la imagen singular y poética.
- source_word: אֲכָלוֹ
  english_pob_choice: eaten by
  chosen_spanish: comido por
  alternatives_spanish:
  - devorado por
  - consumido por
  - roído por
  lexicon: HALOT
  rationale: El participio resultativo de אכל describe el vestido como consumido por un agente. «Comido por» sigue de cerca la imagen del hebreo y del audit trail inglés.
- source_word: עָשׁ
  english_pob_choice: moths
  chosen_spanish: la polilla
  alternatives_spanish:
  - una polilla
  - polillas
  - la larva
  lexicon: HALOT
  rationale: Aunque el hebreo es singular, el sustantivo puede funcionar como nombre genérico del insecto. En español, «la polilla» preserva la imagen clásica y evita introducir plural no atestiguado; el singular funciona como clase.
translation_notes:
  revision_awareness: Se corrigió el problema de validación anterior asegurando que el marcador [a] aparezca explícitamente en el texto español. El resto mantiene la misma lectura fuente-concordante, con una ligera preferencia por una formulación española más natural.
  spanish_consistency_notes:
  - Se preserva el paralelismo de dos símiles del hebreo.
  - Se mantiene el tono poético y degradativo del verso sin suavizar la imagen.
  - «La polilla» traduce el singular hebreo como clase genérica, siguiendo el uso natural del español.
