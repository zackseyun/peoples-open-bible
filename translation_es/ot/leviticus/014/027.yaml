translation:
  language: es
  text: Entonces el sacerdote rociará con su dedo derecho algo del aceite que está sobre su palma izquierda siete veces delante de Yahvé.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: וְהִזָּה
  english_pob_choice: Then ... shall sprinkle
  chosen_spanish: Entonces ... rociará
  alternatives_spanish:
  - Y ... rociará
  - Luego ... rociará
  lexicon: HALOT
  rationale: En contexto ritual, נזה en Hifil expresa esparcir o rociar; «rociará» comunica bien esa acción en español y mantiene el registro cultual. «Entonces» reproduce la secuencia procedimental que el inglés POB marcó con 'Then'.
- source_word: הַכֹּהֵן
  english_pob_choice: the priest
  chosen_spanish: el sacerdote
  alternatives_spanish:
  - el sacerdote oficiando
  - el sacerdote aarónico
  lexicon: HALOT
  rationale: Para כֹּהֵן, «sacerdote» es el equivalente natural y público en español. Se evita una glosa más larga que no añade precisión aquí.
- source_word: בְּאֶצְבָּעוֹ הַיְמָנִית
  english_pob_choice: with his right finger
  chosen_spanish: con su dedo derecho
  alternatives_spanish:
  - con el dedo de su mano derecha
  - con su dedo de la mano derecha
  lexicon: HALOT
  rationale: 'El hebreo especifica el instrumento singular: el dedo, y su lateralidad: derecho. «Con su dedo derecho» conserva esa precisión sin sonar forzado en español.'
- source_word: מִן הַשֶּׁמֶן
  english_pob_choice: some of the oil
  chosen_spanish: algo del aceite
  alternatives_spanish:
  - una parte del aceite
  - del aceite
  lexicon: HALOT
  rationale: מִן es partitivo; el sacerdote toma una porción, no todo el aceite. «Algo del aceite» expresa bien la partitividad en español y evita la ambigüedad de un simple «del aceite».
- source_word: אֲשֶׁר עַל כַּפּוֹ הַשְּׂמָאלִית
  english_pob_choice: that is on his left palm
  chosen_spanish: que está en la palma izquierda de su mano
  alternatives_spanish:
  - que está sobre la palma de su mano izquierda
  - que está en su palma izquierda
  lexicon: HALOT
  rationale: כַּף designa aquí la palma, no solo la mano. «Palma izquierda de su mano» preserva esa concreción anatómica y sigue de cerca la imagen ritual del aceite retenido en la palma.
- source_word: שֶׁבַע פְּעָמִים
  english_pob_choice: seven times
  chosen_spanish: siete veces
  alternatives_spanish:
  - siete ocasiones
  lexicon: HALOT
  rationale: La expresión distributiva se traduce de forma directa y natural con «siete veces».
- source_word: לִפְנֵי יְהוָה
  english_pob_choice: before Yahweh
  chosen_spanish: delante de Yahvé
  alternatives_spanish:
  - en presencia de Yahvé
  - ante Yahvé
  lexicon: HALOT
  rationale: El texto hebreo nombra directamente a יְהוָה; según la terminología del proyecto, se conserva el nombre divino como «Yahvé». «Delante de» mantiene el valor espacial/cultual de לִפְנֵי.
theological_decisions:
- issue: Nombre divino יְהוָה / YHWH
  english_pob_reading: before Yahweh
  chosen_spanish_reading: delante de Yahvé
  alternative_spanish_readings:
  - delante del SEÑOR
  - ante el SEÑOR
  rationale: El hebreo usa explícitamente el Tetragrámaton, y la política del proyecto pide transliterarlo como «Yahvé» en el texto principal en vez de ocultarlo con «SEÑOR».
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
translation_notes:
  revision_awareness: El audit trail inglés está en acuerdo alto y no reporta cambios recientes; la redacción española sigue de cerca el hebreo y conserva la decisión terminológica sobre el nombre divino según la política del proyecto.
  spanish_consistency_notes:
  - Se mantiene un registro culto y claro, apto para lectura pública.
  - Se conserva la partitividad de מִן con «algo de», evitando una lectura totalizante.
  - Se preserva la precisión de כַּף como «palma», no simplemente «mano».
  - Se usa «Yahvé» consistentemente para יְהוָה, conforme a la terminología del proyecto.
