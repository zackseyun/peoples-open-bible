translation:
  language: es
  text: Y la gente de Nínive creyó a Dios[a], y proclamó un ayuno y se vistió de cilicio, desde el más importante de ellos hasta el menos importante.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «creyó en Dios». La construcción hebrea puede expresar tanto creer a Dios como confiar en él.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּאֲמִינוּ
  english_pob_choice: believed
  chosen_spanish: creyeron
  alternatives_spanish:
  - confiaron en
  - tuvieron fe en
  lexicon: HALOT
  rationale: La forma hebrea con ב admite la idea de creer/confiar en alguien. En español, 'creyeron a Dios' conserva la relación directa con el objeto personal y suena natural sin añadir una formulación más doctrinal de la que el verso exige.
- source_word: אַנְשֵׁי נִינְוֵה
  english_pob_choice: the people of Nineveh
  chosen_spanish: los habitantes de Nínive
  alternatives_spanish:
  - los hombres de Nínive
  - la gente de Nínive
  lexicon: HALOT
  rationale: אַנְשֵׁי es literalmente 'hombres de', pero en este contexto funciona de manera colectiva para la ciudad. 'Habitantes' preserva ese sentido corporativo sin fijarlo en varones únicamente, y mantiene el alcance universal que sigue en el verso.
- source_word: בֵּאלֹהִים
  english_pob_choice: God
  chosen_spanish: a Dios
  alternatives_spanish:
  - en Dios
  - Dios
  lexicon: HALOT
  rationale: Con אמן + ב, el hebreo puede expresar creer a/algo o creer en alguien. En español, 'creyeron a Dios' reproduce bien la construcción y deja abierta la fuerza de confianza personal sin perder la referencia directa al contenido creído.
- source_word: וַיִּקְרְאוּ צוֹם
  english_pob_choice: they proclaimed a fast
  chosen_spanish: proclamaron un ayuno
  alternatives_spanish:
  - convocaron un ayuno
  - declararon un ayuno
  lexicon: HALOT
  rationale: קרא con צום aquí tiene el sentido de anunciar públicamente un ayuno comunitario. 'Proclamaron un ayuno' mantiene el carácter formal y público del acto.
- source_word: וַיִּלְבְּשׁוּ שַׂקִּים
  english_pob_choice: put on sackcloth
  chosen_spanish: se vistieron de cilicio
  alternatives_spanish:
  - pusieron cilicio
  - se cubrieron con cilicio
  lexicon: HALOT
  rationale: שַׂקִּים designa la prenda penitencial de saco/cilicio. 'Cilicio' es el equivalente español tradicional y claro para lectores eclesiales; 'se vistieron de cilicio' conserva la acción ritual sin sonar arcaico en exceso.
- source_word: מִגְּדוֹלָם וְעַד קְטַנָּם
  english_pob_choice: from their greatest to their least
  chosen_spanish: desde el mayor hasta el menor
  alternatives_spanish:
  - desde los grandes hasta los pequeños
  - de mayor a menor
  lexicon: HALOT
  rationale: La expresión es un merismo que abarca a todos por rango o condición. 'Desde el mayor hasta el menor' reproduce bien esa totalidad en un español natural y breve.
theological_decisions:
- issue: Cómo expresar אמן + ב sin forzar la teología del verso
  english_pob_reading: believed God / believed in God (footnoted lexical alternative)
  chosen_spanish_reading: creyeron a Dios, con nota alternativa que reconoce 'creyeron en Dios'
  alternative_spanish_readings:
  - creyeron en Dios
  - confiaron en Dios
  rationale: El hebreo permite tanto la idea de creer a Dios como confiar en él. La redacción principal preserva la construcción directa, mientras que la nota ofrece la alternativa idiomática española sin convertir el verso en una formulación más interpretativa que el texto base.
  doctrine_reference: Jonás 3:5; lectura léxica de אמן + ב
- issue: Alcance colectivo de אַנְשֵׁי נִינְוֵה
  english_pob_reading: the people of Nineveh
  chosen_spanish_reading: los habitantes de Nínive
  alternative_spanish_readings:
  - los hombres de Nínive
  - la gente de Nínive
  rationale: Aunque el hebreo usa un término masculino plural, el contexto y la revisión inglesa muestran un sentido corporativo para toda la ciudad. 'Habitantes' comunica mejor ese alcance sin borrar la forma masculina subyacente en la lengua fuente.
  doctrine_reference: Jonás 3:5; lectura colectiva del sujeto
translation_notes:
  revision_awareness: La versión inglesa auditada fue revisada desde 'the men of Nineveh' a 'the people of Nineveh' para resaltar el sentido colectivo. La línea española sigue esa decisión con 'los habitantes de Nínive'. También se conserva la nota alternativa sobre אמן + ב, ya que el español admite tanto 'creyeron a Dios' como 'creyeron en Dios'.
  spanish_consistency_notes:
  - Se mantuvo 'Dios' sin máscara reverencial, de acuerdo con la política del proyecto.
  - '''Cilicio'' se eligió como equivalente natural y eclesialmente reconocible para שַׂקִּים.'
  - Se evitó expandir la respuesta de Nínive a 'arrepentimiento' o 'conversión', porque el verso menciona fe, ayuno y cilicio, no la formulación explícita de arrepentimiento.
