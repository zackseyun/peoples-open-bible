translation:
  language: es
  text: 'Mira, ellos me dicen: «¿Dónde está la palabra de Yahvé?[a] ¡Que venga ahora!»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «el mensaje de Yahvé». La frase hebrea es la fórmula profética habitual para una palabra u oráculo divino.
    reason: lexical_alternative
lexical_decisions:
- source_word: הִנֵּה
  english_pob_choice: Look
  chosen_spanish: ¡Miren!
  alternatives_spanish:
  - Miren
  - ¡He aquí!
  - Vean
  lexicon: HALOT
  rationale: La partícula deíctica introduce una llamada de atención. «¡Miren!» conserva la fuerza discursiva en español actual mejor que un calco más arcaico como «He aquí».
- source_word: הֵמָּה
  english_pob_choice: they
  chosen_spanish: ellos
  alternatives_spanish:
  - ellos mismos
  - esas personas
  - aquellos
  lexicon: HALOT
  rationale: El pronombre independiente masculino plural marca énfasis, pero en español puede quedar naturalizado como «ellos» sin perder la referencia al grupo que habla.
- source_word: אֹמְרִים
  english_pob_choice: are saying
  chosen_spanish: dicen
  alternatives_spanish:
  - están diciendo
  - siguen diciendo
  lexicon: HALOT
  rationale: El participio hebreo expresa acción en curso o reiterada. En español, «dicen» comunica con claridad la postura repetida sin forzar una perífrasis menos natural en este contexto oracular.
- source_word: אֵלַי
  english_pob_choice: to me
  chosen_spanish: me
  alternatives_spanish:
  - contra mí
  - a mí
  lexicon: HALOT
  rationale: El hebreo indica dirección hacia Jeremías. En español, el dativo clítico «me» refleja directamente esa relación; «contra mí» añadiría una hostilidad no exigida por la preposición.
- source_word: אַיֵּה
  english_pob_choice: Where is
  chosen_spanish: ¿Dónde está?
  alternatives_spanish:
  - ¿Dónde?
  - ¿Dónde se halla?
  lexicon: HALOT
  rationale: La pregunta hebrea de existencia/localización se expresa de modo natural en español con «¿Dónde está?», manteniendo el tono burlón del desafío.
- source_word: דְבַר יְהוָה
  english_pob_choice: the word of Yahweh
  chosen_spanish: la palabra de Yahvé
  alternatives_spanish:
  - el mensaje de Yahvé
  - la palabra que viene de Yahvé
  lexicon: HALOT
  rationale: «דְבַר יְהוָה» es la fórmula profética estándar para una palabra/oráculo divino. «Palabra de Yahvé» preserva la fórmula y el nombre divino sin reducirla solo a «mensaje».
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  - Jehová
  lexicon: HALOT
  rationale: Se conserva el nombre propio divino según la convención del proyecto en español, en lugar de sustituirlo por un título.
- source_word: יָבוֹא
  english_pob_choice: Let it come
  chosen_spanish: Que venga
  alternatives_spanish:
  - Que venga ahora
  - Venga
  lexicon: HALOT
  rationale: El imperfecto con fuerza volitiva expresa un desafío/jactancia. En español, «Que venga» conserva el matiz exhortativo o desafiante sin sobrerrepresentar la fuerza modal.
- source_word: נָא
  english_pob_choice: now
  chosen_spanish: ahora
  alternatives_spanish:
  - vamos
  - por favor
  - ya
  lexicon: HALOT
  rationale: Aquí נָא intensifica la provocación, no una petición cortés. «Ahora» comunica la urgencia impaciente del reto de forma más fiel que «por favor».
theological_decisions:
- issue: Rendering of the divine name יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - Jehová
  rationale: La fuente hebrea usa explícitamente el Tetragrama. La forma española establecida en el proyecto es «Yahvé», que conserva el nombre propio del pacto en lugar de reemplazarlo por una sustitución litúrgica.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Force of the prophetic formula דְבַר יְהוָה
  english_pob_reading: the word of Yahweh
  chosen_spanish_reading: la palabra de Yahvé
  alternative_spanish_readings:
  - el mensaje de Yahvé
  - el oráculo de Yahvé
  rationale: La frase hebrea es una fórmula profética técnica para una revelación o pronunciamiento divino. «La palabra de Yahvé» preserva esa formulación tradicional y su peso profético sin diluirla en una paráfrasis más general.
  doctrine_reference: 'DOCTRINE.md: Prophetic speech formulas'
translation_notes:
  revision_awareness: El borrador sigue la última revisión del audit trail, que prefirió una forma más directa y neutral para el participio hebreo ('are saying'). En español se refleja con «dicen», evitando una perífrasis excesiva, y se conserva el tono desafiante del resto del versículo según el texto hebreo y la pauta de la POB en inglés.
  spanish_consistency_notes:
  - Se mantiene Yahvé de forma consistente con la convención del proyecto para יְהוָה.
  - «Palabra de Yahvé» conserva la fórmula profética estándar sin sustituirla por un giro más interpretativo.
  - El reto final se expresa con «Que venga ahora», manteniendo el valor volitivo de יָבוֹא y la urgencia de נָא.
  - La puntuación reproduce el discurso directo y el tono burlón del versículo con claridad para lectura pública.
