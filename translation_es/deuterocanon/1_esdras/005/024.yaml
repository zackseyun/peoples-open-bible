translation:
  language: es
  text: 'Los sacerdotes: los hijos de Jeddus, hijo de Jesúa, de los hijos de Sanabeís[a], ochocientos setenta y dos; los hijos de Emerus[b][c], doscientos cincuenta y dos.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El griego tiene «hacia/en los hijos de Sanabeís». La construcción es inusual en esta lista censal; probablemente señala afiliación familiar más que movimiento o propósito.
    reason: lexical_alternative
  - marker: b
    text: El nombre griego «Emerus» puede corresponder a la familia sacerdotal conocida en la tradición hebrea como «Emmer». El texto principal sigue directamente el testimonio griego.
    reason: alternative_reading
  - marker: c
    text: El paralelo masorético provisto para este lugar no coincide estrechamente con esta línea griega, lo que refleja la conocida reorganización y recomposición de 1 Esdras. Por eso, la traducción sigue el griego como texto primario.
    reason: textual_variant
lexical_decisions:
- source_word: οἱ ἱερεῖς
  english_pob_choice: The priests
  chosen_spanish: Los sacerdotes
  alternatives_spanish:
  - Los sacerdotes del linaje
  - La clase sacerdotal
  lexicon: LSJ
  rationale: En un listado censal, el grupo se introduce de manera directa como una sección de sacerdotes. «Los sacerdotes» conserva la estructura breve y natural del griego sin sobreinterpretar el vínculo genealógico.
- source_word: οἱ υἱοὶ Ἰέδδου
  english_pob_choice: the sons of Jeddus
  chosen_spanish: los hijos de Jeddus
  alternatives_spanish:
  - los descendientes de Jeddus
  lexicon: LSJ
  rationale: «Hijos de» mantiene el giro genealógico del listado y refleja bien el plural κensal. Se conserva «Jeddus» por fidelidad a la forma griega del testimonio principal y al audit trail en inglés.
- source_word: τοῦ υἱοῦ Ἰησοῦ
  english_pob_choice: the son of Jeshua
  chosen_spanish: hijo de Jesúa
  alternatives_spanish:
  - hijo de Jesúa/Jesúa
  lexicon: LSJ
  rationale: El nombre Ἰησοῦ aquí corresponde al contexto postexílico de Jesúa/Jeshúa, no al nombre cristiano posterior «Jesús». «Jesúa» es la forma más reconocible y fiel en español para este contexto.
- source_word: εἰς τοὺς υἱοὺς Σαναβείς
  english_pob_choice: of the sons of Sanabeis
  chosen_spanish: de los hijos de Sanabeís
  alternatives_spanish:
  - entre los hijos de Sanabeís
  - pertenecientes a los hijos de Sanabeís
  lexicon: LSJ
  rationale: Sigo la revisión inglesa que entendió la construcción como una afiliación dentro de la lista, no como movimiento. En español, «de los hijos de» expresa con sobriedad esa pertenencia genealógica.
- source_word: ὀκτακόσιοι ἑβδομήκοντα δύο
  english_pob_choice: eight hundred seventy-two
  chosen_spanish: ochocientos setenta y dos
  alternatives_spanish:
  - '872'
  lexicon: LSJ
  rationale: Se traduce el cardinal de forma natural y publicable en español, manteniendo el valor numérico completo.
- source_word: υἱοὶ Ἐρμήρου
  english_pob_choice: the sons of Emerus
  chosen_spanish: los hijos de Emerus
  alternatives_spanish:
  - los hijos de Emmer
  - los descendientes de Emerus
  lexicon: LSJ
  rationale: Se conserva la transliteración griega del testimonio principal. Aunque existe un posible paralelo hebreo más cercano, el texto base aquí sigue la forma griega.
- source_word: διακόσιοι πεντήκοντα δύο
  english_pob_choice: two hundred fifty-two
  chosen_spanish: doscientos cincuenta y dos
  alternatives_spanish:
  - '252'
  lexicon: LSJ
  rationale: Se reproduce el cardinal con estilo natural en español, sin pérdida de precisión.
theological_decisions:
- issue: Tratamiento del nombre Ἰησοῦ en contexto genealógico postexílico
  english_pob_reading: the son of Jeshua
  chosen_spanish_reading: hijo de Jesúa
  alternative_spanish_readings:
  - hijo de Jesús
  rationale: Aunque la forma griega coincide gráficamente con «Jesús», el audit trail inglés identifica el referente histórico como Jeshua/Jeshúa. Mantener «Jesúa» evita una lectura cristológica ajena al contexto de lista sacerdotal.
  doctrine_reference: Nombres propios bíblicos en contexto histórico; distinción entre Jesúa/Jeshúa y Jesús en tradición exegética
- issue: Construcción preposicional de afiliación en la lista censal
  english_pob_reading: of the sons of Sanabeis
  chosen_spanish_reading: de los hijos de Sanabeís
  alternative_spanish_readings:
  - entre los hijos de Sanabeís
  - pertenecientes a los hijos de Sanabeís
  rationale: La revisión inglesa rechazó la idea de movimiento y prefirió una afiliación directa. «De los hijos de» transmite esa pertenencia sin añadir una noción no sustentada por el griego.
  doctrine_reference: Gramática histórica y sintaxis de listados genealógicos
translation_notes:
  revision_awareness: El texto español sigue la revisión final del audit trail inglés, que ajustó la construcción de εἰς τοὺς υἱοὺς Σαναβείς a una relación más directa («of the sons of Sanabeis»). También conserva el seguimiento del testimonio griego para el nombre Ἐρμήρου, con la variante hebrea solo como posibilidad anotada. Se corrigió el problema de validación anterior anclando en el texto los marcadores de nota [a] y [b].
  spanish_consistency_notes:
  - Se mantiene «hijos de» de manera uniforme para reflejar la fórmula genealógica.
  - Se usa «Jesúa» para el referente postexílico, evitando el valor cristiano de «Jesús».
  - Se conserva la transliteración griega «Sanabeís» y «Emerus» por fidelidad al testimonio base.
  - Los números se expresan en palabras, siguiendo el estilo bíblico de lectura pública.
