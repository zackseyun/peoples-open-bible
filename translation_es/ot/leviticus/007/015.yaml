review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador capta bien la estructura básica: carne del sacrificio, consumo el mismo día, y prohibición de dejar restos hasta la mañana. Sin embargo, la cadena constructa זֶבַח תּוֹדַת שְׁלָמָיו no está bien resuelta en español: «su ofrenda de agradecimiento, su ofrenda de paz» duplica y desarticula una sola categoría sacrificial, cuando el sentido es «su sacrificio/ofrenda de paz de acción de gracias» o equivalente. También «en el día de su ofrenda» es comprensible, pero «el día de su ofrenda» suena más natural en español bíblico moderno.'
  spanish_quality_summary: La redacción actual es inteligible, pero algo trabada y redundante por la aposición «su ofrenda de agradecimiento, su ofrenda de paz». La revisión propuesta mejora fluidez, precisión cultual y naturalidad sin perder cercanía al hebreo. «Acción de gracias» suena más idiomático y eclesial que «agradecimiento» en este contexto sacrificial.
  glossary_alignment: Alinea en general con la decisión POB de mantener la categoría sacrificial como «ofrenda/sacrificio de paz» y conservar la alternativa «comunión» solo en nota. La revisión mantiene «paz» como término principal y evita la glosa interpretativa en el texto. No hay conflicto con los términos doctrinales del proyecto.
  issues:
  - severity: high
    issue: La cadena sacrificial hebrea está mal representada por duplicación
    rationale: '«su ofrenda de agradecimiento, su ofrenda de paz» presenta dos expresiones yuxtapuestas donde el hebreo describe una sola subcategoría sacrificial: el sacrificio/ofrenda de paz de acción de gracias.'
  - severity: medium
    issue: «De agradecimiento» es menos idiomático que «de acción de gracias» en registro bíblico-cultual
    rationale: Aunque no es incorrecto, «acción de gracias» refleja mejor תודה en contexto litúrgico y resulta más natural para lectores eclesiales de español.
  - severity: low
    issue: «En el día de su ofrenda» suena algo calcado
    rationale: «El día de su ofrenda» conserva el sentido y fluye mejor en español actual sin perder la forma nominal.
  revised_spanish_text: Y la carne del sacrificio de su ofrenda de paz de acción de gracias[a] se comerá el día de su ofrenda; no dejará nada de ella hasta la mañana.
