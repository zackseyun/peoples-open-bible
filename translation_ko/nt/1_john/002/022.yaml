  text: τίς ἐστιν ὁ ψεύστης εἰ μὴ ὁ ἀρνούμενος ὅτι Ἰησοῦς οὐκ ἔστιν ὁ χριστός; οὗτός ἐστιν ὁ ἀντίχριστος, ὁ ἀρνούμενος τὸν πατέρα καὶ τὸν υἱόν.
base_translation:
  language: en
  yaml_path: translation/nt/1_john/002/022.yaml
  text: 'Who is the liar except the one who denies that Jesus is the Messiah? This is the antichrist: the one who denies the Father and the Son[a][b].'
  footnotes:
  - marker: a
    text: Or, “the Christ.” The Greek title is ὁ χριστός; here it is rendered “the Messiah” because it functions as a title rather than a name.
    reason: alternative_reading
  - marker: b
    text: 'Or simply, “antichrist.” The Greek has the article: “the antichrist.” In John’s letters the term can denote the kind of opponent characterized by denying the Father and the Son.'
    reason: lexical_alternative
