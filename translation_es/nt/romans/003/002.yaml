translation:
  language: es
  text: Mucho, en toda manera. Porque, en primer lugar, les fueron confiados los oráculos de Dios.
  philosophy: optimal-equivalence
  footnotes: []
lexical_decisions:
- source_word: πολὺ
  english_pob_choice: Much
  chosen_spanish: Mucho
  alternatives_spanish:
  - Grandemente
  - Muchísimo
  lexicon: BDAG
  rationale: El adverbio responde a la pregunta implícita sobre la ventaja y en español natural se expresa con «Mucho». Conserva la fuerza cuantitativa sin sobredeterminarla.
- source_word: κατὰ πάντα τρόπον
  english_pob_choice: in every way
  chosen_spanish: en todo sentido
  alternatives_spanish:
  - de todas maneras
  - en todo aspecto
  lexicon: BDAG
  rationale: La locución expresa amplitud total. «En todo sentido» suena natural en español y preserva la idea de comprehensividad del giro griego.
- source_word: πρῶτον μὲν γάρ
  english_pob_choice: first of all
  chosen_spanish: en primer lugar
  alternatives_spanish:
  - primero
  - ante todo
  lexicon: BDAG
  rationale: La secuencia introduce el primer punto de una lista argumentativa. «En primer lugar» comunica bien esa función discursiva en español moderno.
- source_word: ἐπιστεύθησαν
  english_pob_choice: they were entrusted with
  chosen_spanish: les fueron confiados
  alternatives_spanish:
  - se les confió
  - fueron encomendados
  lexicon: BDAG
  rationale: El pasivo de πιστεύω aquí tiene sentido de encomendar algo a alguien. «Les fueron confiados» mantiene el matiz de depósito/administración con buena naturalidad en español.
- source_word: λόγια
  english_pob_choice: oracles
  chosen_spanish: oráculos
  alternatives_spanish:
  - palabras
  - declaraciones
  lexicon: BDAG
  rationale: Aunque «palabras» sería más llano, el contexto y el audit trail inglés favorecen «oráculos» para reflejar la referencia a dichos divinos revelados. Mantiene la tensión lexical y el tono bíblico del término.
- source_word: τοῦ θεοῦ
  english_pob_choice: of God
  chosen_spanish: de Dios
  alternatives_spanish:
  - procedentes de Dios
  - de parte de Dios
  lexicon: BDAG
  rationale: 'El genitivo se vierte de modo directo como pertenencia/origen: «de Dios». Es la opción menos interpretativa y más fiel al texto.'
theological_decisions:
- issue: Sentido de λόγια como revelación divina específica
  english_pob_reading: oracles of God
  chosen_spanish_reading: los oráculos de Dios
  alternative_spanish_readings:
  - las palabras de Dios
  - las declaraciones de Dios
  rationale: Se conserva el matiz de enunciados divinos autoritativos, no solo habla genérica. Esto sigue la revisión inglesa que prefirió 'oracles' y evita aplanar el término.
  doctrine_reference: Romanos 3:2; uso bíblico de λόγια como dichos divinos
- issue: Función discursiva de πρῶτον μὲν γάρ
  english_pob_reading: First of all
  chosen_spanish_reading: en primer lugar
  alternative_spanish_readings:
  - primero
  - ante todo
  rationale: La frase abre el primer beneficio mencionado por Pablo. «En primer lugar» conserva esa estructura argumentativa sin forzar la expectativa de una enumeración inmediata.
  doctrine_reference: Romanos 3:1-2; conectores discursivos paulinos
translation_notes:
  revision_awareness: La versión inglesa revisada cambió de 'words of God' a 'oracles of God' para reflejar mejor λόγια; la draft española sigue esa revisión y conserva la alternativa más llana en nota para no perder la tensión léxica.
  spanish_consistency_notes:
  - Se usa «Dios» para θεός según el estándar del proyecto.
  - Se mantiene «oráculos» para λόγια por consistencia con la decisión inglesa auditada.
  - «Les fueron confiados» preserva el pasivo con sentido de encargo sin añadir contenido ajeno al texto.
