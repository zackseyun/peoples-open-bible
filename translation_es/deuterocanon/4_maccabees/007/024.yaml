  - más duras
  lexicon: LSJ
  rationale: El comparativo se expresa de forma directa con «más severas», manteniendo la comparación de grado sin añadir intensificación innecesaria.
- source_word: βασανιστηρίων
  english_pob_choice: tortures
  chosen_spanish: torturas
  alternatives_spanish:
  - tormentos
  - suplicios
  lexicon: LSJ
  rationale: «Torturas» comunica con fuerza el sufrimiento punzante y el contexto penal del término griego.
- source_word: ἐπεκράτησαν
