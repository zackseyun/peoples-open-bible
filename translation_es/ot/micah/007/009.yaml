translation:
  language: es
  text: Soportaré la indignación de Yahvé, porque he pecado contra él, hasta que él defienda mi causa y haga justicia por mí. Él me sacará a la luz; veré su rectitud[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «su justicia». El término hebreo puede abarcar tanto la justicia como la rectitud, especialmente en un contexto de vindicación legal.
    reason: lexical_alternative
lexical_decisions:
- source_word: זַעַף יְהוָה
  english_pob_choice: the indignation of Yahweh
  chosen_spanish: la indignación de Yahvé
  alternatives_spanish:
  - la ira de Yahvé
  - el enojo de Yahvé
  - la indignación del Yahvé
  lexicon: HALOT
  rationale: זַעַף expresa una idea de ira/indignación con matiz judicial; «indignación» preserva mejor esa tensión que «ira» o «enojo». «Yahvé» sigue el criterio de la serie para el nombre divino, en lugar de una sustitución reverencial.
- source_word: אֶשָּׂא
  english_pob_choice: I will bear
  chosen_spanish: cargaré
  alternatives_spanish:
  - soportaré
  - llevaré
  lexicon: HALOT
  rationale: נשא aquí significa asumir o cargar un peso, una consecuencia o una carga. «Cargaré» mantiene la imagen concreta y funciona de manera natural en español.
- source_word: כִּי חָטָאתִי לֹו
  english_pob_choice: because I have sinned against him
  chosen_spanish: porque he pecado contra él
  alternatives_spanish:
  - porque he pecado de él
  - pues he pecado contra él
  lexicon: HALOT
  rationale: El valor causal de כִּי se expresa bien con «porque». El verbo חטא con ל indica la persona ofendida; «pecado contra él» refleja esa relación de ofensa de forma idiomática en español.
- source_word: עַד אֲשֶׁר
  english_pob_choice: until
  chosen_spanish: hasta que
  alternatives_spanish:
  - hasta el momento en que
  lexicon: HALOT
  rationale: La secuencia marca el límite temporal de la carga asumida. «Hasta que» es la equivalencia española más clara y fiel.
- source_word: יָרִיב רִיבִי
  english_pob_choice: he pleads my case
  chosen_spanish: defienda mi causa
  alternatives_spanish:
  - litigue mi pleito
  - pleitee mi causa
  - sostenga mi causa
  lexicon: HALOT
  rationale: El hebreo forma un giro legal forense. En español, «defienda mi causa» comunica bien la idea de tomar a cargo el caso de alguien sin sonar artificial; «litigar» sería más técnico y menos natural en lectura pública.
- source_word: וְעָשָׂה מִשְׁפָּטִי
  english_pob_choice: and executes justice for me
  chosen_spanish: y haga justicia por mí
  alternatives_spanish:
  - y ejecute justicia por mí
  - y haga mi vindicación
  lexicon: HALOT
  rationale: מִשְׁפָּט aquí señala una decisión/acción judicial favorable, no solo un veredicto abstracto. «Haga justicia por mí» conserva el sentido forense y la fluidez del español; «ejecute» suena más duro y menos idiomático.
- source_word: יוֹצִיאֵנִי לָאוֹר
  english_pob_choice: He will bring me out to the light
  chosen_spanish: Él me sacará a la luz
  alternatives_spanish:
  - Él me traerá a la luz
  - Él me llevará a la luz
  lexicon: HALOT
  rationale: יצא en causativo implica sacar afuera. «Sacará a la luz» conserva la imagen de pasar de la opresión/ocultamiento a la manifestación y vindicación.
- source_word: אֶרְאֶה
  english_pob_choice: I will look upon
  chosen_spanish: veré
  alternatives_spanish:
  - miraré
  - contemplaré
  lexicon: HALOT
  rationale: ראה puede rendirse simplemente como «ver». En español, «veré» es claro y fiel; no hace falta elevarlo más con un verbo poético que añadiría matiz no requerido.
- source_word: בְּצִדְקָתוֹ
  english_pob_choice: his righteousness
  chosen_spanish: su justicia
  alternatives_spanish:
  - su rectitud
  - su justicia vindicadora
  lexicon: HALOT
  rationale: En este contexto de vindicación legal, צדקה puede abarcar justicia y rectitud. La traducción principal usa «su justicia» porque el contexto inmediato enfatiza la acción judicial favorable; esto también armoniza con la nota inglesa sobre la alternativa lexical.
theological_decisions:
- issue: Nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: La política terminológica del proyecto exige «Yahvé» para יְהוָה. Esto preserva el nombre del pacto y evita la sustitución por un título reverencial.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Sentido de צִדְקָתוֹ en un contexto de vindicación
  english_pob_reading: his righteousness
  chosen_spanish_reading: su justicia
  alternative_spanish_readings:
  - su rectitud
  - su justicia vindicadora
  rationale: 'El pasaje es forense: Dios responde a la causa del hablante y lo saca a la luz. En español, «su justicia» expresa con claridad la vindicación divina y conserva la tensión entre justicia y rectitud sin volver el verso demasiado abstracto.'
  doctrine_reference: DOCTRINE.md Translation philosophy §3; Contested terms principle analogous to δικαιοσύνη
translation_notes:
  revision_awareness: Coincide con la última pasada de revisión, que no requirió cambios. La decisión sobre בְּצִדְקָתוֹ sigue la tensión lexical documentada en el audit trail inglés, pero en español se optó por «su justicia» para mantener la claridad forense del verso y la coherencia con el contexto inmediato.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» conforme al estándar del proyecto para el Tetragrámaton.
  - Se conservó el paralelismo legal con «defienda mi causa» / «haga justicia por mí».
  - «A la luz» reproduce la imagen hebrea de salida de la oscuridad hacia la vindicación.
  - La nota de pie de página preserva la alternativa «su justicia»/«su rectitud» sin perder el término principal elegido en el texto.
