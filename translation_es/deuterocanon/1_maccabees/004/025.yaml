  text: Y hubo gran liberación para Israel aquel día.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ἐγενήθη
  english_pob_choice: there was
  chosen_spanish: hubo
  alternatives_spanish:
  - se produjo
  - aconteció
  - surgió
  lexicon: BDAG
  rationale: El aoristo de γίνομαι aquí expresa la ocurrencia de un resultado o estado. En español, «hubo» transmite de forma natural e impersonal la existencia de ese hecho, sin añadir énfasis al proceso de llegar a ser.
- source_word: σωτηρία
  english_pob_choice: deliverance
  chosen_spanish: liberación
  alternatives_spanish:
  - salvación
  - rescate
  - victoria
  lexicon: BDAG
  rationale: En el contexto militar e histórico de 1 Macabeos, σωτηρία se refiere a una liberación concreta del peligro. «Liberación» conserva ese sentido de rescate nacional sin reducirlo solo a «victoria» ni cargarlo primariamente de sentido soteriológico espiritual.
- source_word: μεγάλη
  english_pob_choice: great
  chosen_spanish: gran
  alternatives_spanish:
  - grande
  - mucha
  - poderosa
  lexicon: BDAG
  rationale: El adjetivo intensifica σωτηρία. En español, «gran» es una forma natural antes de un sustantivo y mantiene la fuerza evaluativa del griego.
- source_word: τῷ Ἰσραήλ
  english_pob_choice: for Israel
  chosen_spanish: para Israel
  alternatives_spanish:
  - a Israel
  - en favor de Israel
  - para los israelitas
  lexicon: BDAG
  rationale: El dativo expresa beneficiario. «Para Israel» reproduce bien esa relación y conserva el nombre colectivo/nacional del texto griego.
- source_word: ἐν τῇ ἡμέρᾳ ἐκείνῃ
  english_pob_choice: on that day
  chosen_spanish: aquel día
  alternatives_spanish:
  - en aquel día
  - ese día
  - ese mismo día
  lexicon: BDAG
  rationale: El demostrativo ἐκείνῃ señala un día específico ya conocido por el contexto. «Aquel día» es natural en español bíblico y preserva esa deixis.
translation_notes:
  revision_awareness: El texto griego y la traducción inglesa de referencia muestran pleno acuerdo; no se detectan variantes textuales ni revisiones que alteren el sentido base.
