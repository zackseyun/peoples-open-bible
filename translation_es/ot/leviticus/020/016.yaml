revisions:
- from: Si una mujer se acerca a cualquier animal para unirse con él[a], matarás a la mujer y al animal. Ciertamente serán muertos[b]; su sangre caerá sobre ellos.
  to: Si una mujer se acerca a cualquier animal para aparearse con él[a], matarás a la mujer y al animal. Ciertamente se les dará muerte[b]; su sangre estará sobre ellos.
  rationale: 'La revisión corrige tres puntos: hace explícito el sentido sexual de רבע sin usar un giro vulgar («aparearse con él»), reemplaza una pasiva poco idiomática por una fórmula penal natural en español («se les dará muerte»), y restituye el modismo de responsabilidad legal con una imagen estática más cercana al hebreo («su sangre estará sobre ellos»).'
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T21:30:29Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue de cerca la estructura hebrea y el rastro POB en varios puntos clave: «se acerca» para תִּקְרַב, «animal» para בְּהֵמָה y «matarás» para וְהָרַגְתָּ. Sin embargo, dos decisiones no preservan bien el sentido ni la fuerza del original/documentación: «para unirse con él» suaviza demasiado לְרִבְעָה אֹתָהּ y pierde la explicitud sexual que el POB inglés quiso mantener; y «Ciertamente serán muertos» suena poco natural en español y no expresa bien la fórmula penal fija מוֹת יוּמָתוּ, mejor como «ciertamente se les dará muerte» o «ciertamente serán ejecutados/puestos a muerte». Además, «su sangre caerá sobre ellos» altera innecesariamente el modismo דְּמֵיהֶם בָּם, que es estático («su sangre está/sobre ellos») y expresa responsabilidad por su propia muerte.'
  spanish_quality_summary: 'El texto es comprensible, pero contiene giros poco idiomáticos o demasiado eufemísticos para una Biblia pública: «unirse con él» resulta ambiguo y blando en un contexto legal penal; «serán muertos» es español forzado; «su sangre caerá sobre ellos» introduce una imagen dinámica no presente en el hebreo. Una revisión menor puede dejar el verso claro, digno y fiel: «para aparearse con él», «ciertamente se les dará muerte» y «su sangre estará sobre ellos».'
  glossary_alignment: No hay conflicto con la terminología de proyecto principal. Las decisiones problemáticas son de fidelidad lexical y naturalidad española más que de glosario. Conviene alinear mejor la explicitud sexual documentada para רבע y la fórmula jurídica para מוֹת יוּמָתוּ / דְּמֵיהֶם בָּם.
  issues:
  - severity: medium
    issue: «para unirse con él» suaviza en exceso לְרִבְעָה אֹתָהּ
    rationale: El hebreo se refiere específicamente al acto sexual con un animal; el POB inglés optó por «to mate with it» para evitar oscuridad o eufemismo. «Unirse» en español puede sonar demasiado vago o incluso relacional, no sexual.
  - severity: medium
    issue: «Ciertamente serán muertos» es poco natural en español
    rationale: Aunque intenta reflejar la pasiva penal intensificada, esta formulación suena calcada. Una expresión como «ciertamente se les dará muerte» conserva la fuerza judicial y es mucho más idiomática.
  - severity: medium
    issue: «su sangre caerá sobre ellos» cambia el modismo hebreo
    rationale: דְּמֵיהֶם בָּם no expresa que la sangre ‘caerá’ sobre ellos, sino que su sangre/bloodguilt está sobre ellos; es decir, la responsabilidad les pertenece. La nota inglesa ya explica ese valor idiomático.
  revised_spanish_text: Si una mujer se acerca a cualquier animal para aparearse con él[a], matarás a la mujer y al animal. Ciertamente se les dará muerte[b]; su sangre estará sobre ellos.
  revised_footnotes:
