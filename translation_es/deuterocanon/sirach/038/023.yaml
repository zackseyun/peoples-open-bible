translation:
  language: es
  text: La sabiduría de un escriba aumenta la sabiduría, y el que está libre de ocupación[a] se hará sabio.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «falto de ocupación/negocio». El paralelo griego apunta al sentido de estar en reposo o en ocio, lo cual apoya la traducción «libre de ocupación».'
    reason: lexical_alternative
lexical_decisions:
- source_word: חכמת
  english_pob_choice: wisdom
  chosen_spanish: sabiduría
  alternatives_spanish:
  - habilidad
  - conocimiento
  lexicon: HALOT
  rationale: En este contexto ben siráico, el sustantivo apunta claramente a la cualidad de sabiduría; «sabiduría» mantiene el campo semántico central sin reducirlo a mera pericia técnica.
- source_word: סופר
  english_pob_choice: scribe
  chosen_spanish: escriba
  alternatives_spanish:
  - escritor
  - secretario
  - sabio
  lexicon: HALOT
  rationale: «Escriba» conserva la función social y cultual de un profesional instruido en letras y enseñanza, más ajustada que «escritor» en español bíblico actual.
- source_word: תרבה
  english_pob_choice: increases
  chosen_spanish: aumenta
  alternatives_spanish:
  - multiplica
  - hace crecer
  lexicon: HALOT
  rationale: El causativo expresa incremento; «aumenta» es natural en español y conserva la idea de crecimiento sin forzar una imagen distinta.
- source_word: וחסר עסק
  english_pob_choice: one free from occupation
  chosen_spanish: el que está libre de ocupación
  alternatives_spanish:
  - el que carece de ocupación
  - el que no tiene ocupación
  - el que está libre de busyness
  lexicon: HALOT
  rationale: La frase hebrea indica estar sin ocupaciones absorbentes. «Libre de ocupación» sigue de cerca la revisión inglesa más formal y evita entenderlo como mera falta de empleo.
- source_word: עסק
  english_pob_choice: occupation
  chosen_spanish: ocupación
  alternatives_spanish:
  - negocio
  - asuntos
  - trabajo
  lexicon: HALOT
  rationale: «Ocupación» refleja el valor de actividad, asunto o dedicación que puede estorbar el estudio; es más formal y más preciso que «trabajo» en este contexto.
- source_word: ἐν ἀναπαύσει
  english_pob_choice: free from busyness
  chosen_spanish: libre de ocupación
  alternatives_spanish:
  - en reposo
  - en descanso
  - en ocio
  lexicon: LSJ
  rationale: La paráfrasis griega apunta al estado de reposo/leisure; por eso la cláusula española reproduce la idea con una expresión idiomática y sobria.
- source_word: ἐξόδῳ πνεύματος αὐτοῦ
  english_pob_choice: at the departing of his spirit
  chosen_spanish: se hará sabio
  alternatives_spanish:
  - al salir su espíritu
  - al partir su espíritu
  - cuando su espíritu se aparte
  lexicon: LSJ
  rationale: El hebreo conservado no ofrece aquí un equivalente directo y el contexto inmediato del verso en la tradición recibida se centra en la relación entre ocupación y sabiduría. La redacción española sigue la línea del texto de trabajo inglés, sin añadir una explicación no solicitada en el cuerpo principal.
theological_decisions:
- issue: Relación entre el hebreo conservado y el paralelo griego en la forma del verso
  english_pob_reading: The Greek parallel points toward the sense of being at rest or in leisure, which supports the rendering 'free from busyness.'
  chosen_spanish_reading: La traducción principal conserva la idea de estar libre de ocupación, con una nota que reconoce el matiz de reposo/leisure sugerido por el griego.
  alternative_spanish_readings:
  - libre de busyness
  - en reposo
  - en ocio
  rationale: No se debe borrar la tensión entre el hebreo transmitido y el paralelo griego. La solución española mantiene la lectura principal de la tradición de trabajo y permite el matiz griego mediante nota.
  doctrine_reference: 'Principio textual: preservar la evidencia de fuentes paralelas sin armonizarla artificialmente.'
translation_notes:
  revision_awareness: La redacción española sigue la revisión inglesa más formal («free from occupation») y conserva el enlace con la nota lexical del paralelo griego, evitando la forma más coloquial «ocupado» o la paráfrasis más libre «sin ocupaciones».
  spanish_consistency_notes:
  - Se prefirió «escriba» para סופר por consistencia con el léxico POB ya establecido.
  - Se mantuvo «sabiduría» en ambos miembros de la primera cola para reflejar el paralelismo del hebreo y del inglés auditado.
  - La nota al pie recoge el matiz del griego sin desplazar la base hebrea transmitida.
