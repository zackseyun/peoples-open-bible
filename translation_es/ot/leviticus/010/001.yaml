translation:
  language: es
  text: Entonces Nadab y Abiú, hijos de Aarón, cada uno tomó su incensario[a], puso en él fuego, colocó sobre él incienso, y ofrecieron ante Yahvé fuego no autorizado[b], que él no les había mandado.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Incensario» traduce el recipiente ritual de la escena; también puede entenderse como «brasero».
    reason: lexical_alternative
  - marker: b
    text: Literalmente, «fuego extraño» o «fuego extranjero»; el sentido es fuego no autorizado por el mandato divino, como lo explica la cláusula siguiente.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּקְחוּ
  english_pob_choice: took
  chosen_spanish: tomó
  alternatives_spanish:
  - cogió
  - llevó
  lexicon: HALOT
  rationale: El verbo básico לקח se expresa naturalmente con 'tomó'. Como hay distribución por sujeto compuesto, el singular idiomático en español funciona bien con 'cada uno'.
- source_word: בְנֵי אַהֲרֹן
  english_pob_choice: Aaron’s sons
  chosen_spanish: hijos de Aarón
  alternatives_spanish:
  - los hijos de Aarón
  - los hijos varones de Aarón
  lexicon: HALOT
  rationale: La construcción posesiva se vierte de manera directa y clara en español. 'Hijos de Aarón' conserva la relación familiar sin sobrecarga estilística.
- source_word: אִישׁ מַחְתָּתוֹ
  english_pob_choice: each took his firepan
  chosen_spanish: cada uno tomó su incensario
  alternatives_spanish:
  - cada uno tomó su brasero
  - cada uno tomó su fuego-pan
  lexicon: HALOT
  rationale: אִישׁ tiene fuerza distributiva ('cada uno'). מַחְתָּה designa un recipiente portátil para brasas e incienso; 'incensario' comunica bien el objeto cultual en español sin perder el uso ritual del término.
- source_word: וַיִּתְּנוּ בָהֵן אֵשׁ
  english_pob_choice: put fire in it
  chosen_spanish: puso en él fuego
  alternatives_spanish:
  - encendió fuego en él
  - puso fuego en él
  lexicon: HALOT
  rationale: El hebreo indica colocar fuego/brasas en el recipiente. 'Puso en él fuego' sigue de cerca la imagen; se mantiene el singular por la referencia distributiva al incensario de cada uno.
- source_word: וַיָּשִׂימוּ עָלֶיהָ קְטֹרֶת
  english_pob_choice: placed incense on it
  chosen_spanish: colocó sobre él incienso
  alternatives_spanish:
  - puso sobre él incienso
  - colocó incienso sobre él
  lexicon: HALOT
  rationale: Se conserva el referente singular del incensario en español. 'Colocó sobre él incienso' refleja el gesto cultual sin añadir interpretación.
- source_word: וַיַּקְרִבוּ
  english_pob_choice: presented
  chosen_spanish: ofrecieron
  alternatives_spanish:
  - presentaron
  - acercaron
  lexicon: HALOT
  rationale: En contexto sacrificial, הקריב tiene valor cultual de presentar/ofrecer. 'Ofrecieron' es el equivalente español más natural en este marco ritual.
- source_word: לִפְנֵי יְהוָה
  english_pob_choice: before Yahweh
  chosen_spanish: ante Yahvé
  alternatives_spanish:
  - delante de Yahvé
  - en presencia de Yahvé
  lexicon: HALOT
  rationale: Se sigue el criterio del proyecto para יְהוָה como 'Yahvé'. 'Ante' reproduce bien la fórmula cultual de comparecencia ritual.
- source_word: אֵשׁ זָרָה
  english_pob_choice: unauthorized fire
  chosen_spanish: fuego prohibido
  alternatives_spanish:
  - fuego no autorizado
  - fuego extraño
  - fuego ajeno
  lexicon: HALOT
  rationale: La frase no solo describe algo raro, sino un acto vedado por el mandato divino. 'Fuego prohibido' comunica la transgresión de manera clara y breve en español, manteniendo la tensión legal-cultual.
- source_word: אֲשֶׁר לֹא צִוָּה אֹתָם
  english_pob_choice: which he had not commanded them
  chosen_spanish: que él no les había mandado
  alternatives_spanish:
  - que no les había mandado
  - que él no había ordenado a ellos
  lexicon: HALOT
  rationale: Se conserva el sujeto implícito 'él' referido a Yahvé y el dativo explícito 'les'. 'Mandado' reproduce היטב el campo semántico de צוה en contexto de orden cultual.
theological_decisions:
- issue: Nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - el SEÑOR
  rationale: El paquete auditado del inglés usa la forma del nombre divino, no un ocultamiento litúrgico. En español del proyecto, la forma establecida es 'Yahvé', que preserva el nombre del pacto y evita la sustitución por un título.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Sentido de אֵשׁ זָרָה
  english_pob_reading: unauthorized fire
  chosen_spanish_reading: fuego prohibido
  alternative_spanish_readings:
  - fuego extraño
  - fuego extranjero
  - fuego no autorizado
  rationale: La explicación inmediata 'que él no les había mandado' aclara que el problema es la falta de autorización divina. 'Fuego prohibido' conserva esa fuerza normativa sin reducir el texto a una mera rareza descriptiva.
  doctrine_reference: DOCTRINE.md Translation philosophy §§1, 6
translation_notes:
  revision_awareness: La revisión inglesa reciente corrigió la concordancia de 'in them' a 'in it' para armonizar con el singular distributivo de 'each took his firepan'. La versión española sigue ese ajuste con 'cada uno tomó su incensario' y referencias singulares ('en él', 'sobre él').
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' para יְהוָה conforme al criterio del proyecto.
  - Se usa 'hijos de Aarón' y no una paráfrasis interpretativa.
  - '''Incensario'' se emplea como término cultual claro en español; se deja nota de alternativa semántica.'
  - '''Fuego prohibido'' evita la lectura tradicionalizante de ''fuego extraño'' como si fuera solo una cualidad rara.'
  - La estructura distributiva singular se conserva en español para reflejar el hebreo y la revisión auditada.
