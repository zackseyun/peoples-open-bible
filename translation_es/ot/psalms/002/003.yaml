lexical_decisions:
- source_word: נְנַתְּקָה
  english_pob_choice: Let us tear off
  chosen_spanish: ¡Rompamos...!
  alternatives_spanish:
  - ¡Cortemos...!
  - ¡Desgarremos...!
  lexicon: HALOT
  rationale: La forma cohortativa expresa resolución colectiva; en español, «rompamos» comunica con naturalidad la intención violenta de desprender o arrancar las ataduras.
- source_word: מֽוֹסְרוֹתֵימוֹ
  english_pob_choice: their bonds / their chains
  chosen_spanish: sus cadenas
  alternatives_spanish:
  - sus vínculos
  - sus ataduras
  lexicon: HALOT
  rationale: El sustantivo denota restricción o atadura. «Cadenas» mantiene la imagen concreta de sujeción y es claro en español actual, aunque «ataduras» sería una alternativa más literal y menos específica.
- source_word: וְנַשְׁלִיכָה
  english_pob_choice: and cast away
  chosen_spanish: y echemos lejos
  alternatives_spanish:
  - y arrojemos
  - y lancemos lejos
  lexicon: HALOT
  rationale: El verbo de arrojar con fuerza pide una solución dinámica en español; «echemos lejos» conserva el impulso de rechazo y evita sonar demasiado coloquial.
- source_word: מִמֶּנּוּ
  english_pob_choice: from us
  chosen_spanish: de nosotros
  alternatives_spanish:
  - lejos de nosotros
  - de encima de nosotros
  lexicon: HALOT
  rationale: La preposición indica separación respecto de los hablantes; en español, «de nosotros» mantiene el valor relacional sin añadir interpretación.
- source_word: עֲבֹתֵימוֹ
  english_pob_choice: their cords
  chosen_spanish: sus cuerdas
  alternatives_spanish:
  - sus cordeles
  - sus sogas
  lexicon: HALOT
  rationale: El término puede significar cuerdas o sogas. «Cuerdas» preserva el paralelo poético con «cadenas» y es suficientemente natural para lectores contemporáneos.
theological_decisions:
- issue: Imágenes de liberación/ruptura frente a la rebelión de los pueblos
  english_pob_reading: Render the imagery concretely as physical restraints without interpreting them in the translation itself.
  chosen_spanish_reading: Mantener la imagen concreta de cadenas y cuerdas sin explicarla ni moralizarla dentro del verso.
  alternative_spanish_readings:
  - sus vínculos y sus lazos
  - sus yugos y sus correas
  rationale: El hebreo presenta un discurso de rebelión con metáforas de restricción; la traducción debe conservar esa tensión poética. «Cadenas» y «cuerdas» reproducen la materialidad del cuadro sin añadir una interpretación que el texto no formula.
  doctrine_reference: 'Poética bíblica: conservar la metáfora y la tensión teológica sin resolverlas prematuramente.'
translation_notes:
  revision_awareness: El texto inglés revisado pasó de imágenes más abstractas («bonds», «cords») a una formulación todavía más cercana al hebreo y luego a una forma más pulida. La versión española sigue esa preferencia por una imagen concreta y directa, pero mantiene un registro natural y publicable.
  spanish_consistency_notes:
  - Se usó «cadenas» y «cuerdas» para reflejar el paralelismo hebreo entre dos términos de sujeción relacionados, sin homogenizarlos.
  - El imperativo cohortativo plural se expresó con un exhortativo plural en primera persona («rompamos», «echemos»), que transmite la voz colectiva del original.
  - «Lejos de nosotros» se integró como equivalencia idiomática de מִמֶּנּוּ, preservando la dirección de alejamiento.
