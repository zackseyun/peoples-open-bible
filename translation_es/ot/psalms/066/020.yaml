translation:
  language: es
  text: ¡Bendito sea Dios, que no apartó mi oración ni su amor fiel[a] de mí[b]!
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo חֶסֶד: también «su amor constante», «su amor leal» o «su fidelidad de pacto». El término combina amor, fidelidad y compromiso relacional.'
    reason: lexical_alternative
  - marker: b
    text: Literalmente, «que no removió mi oración y su amor fiel de mí»; el español suaviza la coordinación hebrea para que la negación suene natural.
    reason: lexical_alternative
lexical_decisions:
- source_word: בָּרוּךְ
  english_pob_choice: Blessed be
  chosen_spanish: ¡Bendito sea!
  alternatives_spanish:
  - ¡Alabado sea!
  - ¡Bendito es!
  lexicon: WLC/HALOT
  rationale: La forma hebrea funciona como una doxología exhortativa o exclamativa. En español, «Bendito sea» conserva mejor el valor performativo de alabanza que una simple copula predicativa.
- source_word: אֱלֹהִים
  english_pob_choice: God
  chosen_spanish: Dios
  alternatives_spanish:
  - el Dios
  - el Dios de Israel
  lexicon: HALOT
  rationale: Aquí se refiere al Dios de Israel en un contexto de alabanza directa; «Dios» es la forma natural y fiel en español.
- source_word: הֵסִיר
  english_pob_choice: has not turned away
  chosen_spanish: no apartó
  alternatives_spanish:
  - no retiró
  - no quitó
  - no alejó
  lexicon: HALOT
  rationale: El hiphil de סור implica remover o apartar. En español, «apartó» mantiene bien la idea relacional de no rechazar ni retirar algo de su presencia, y puede gobernar tanto «mi oración» como «su misericordia».
- source_word: תְּפִלָּתִי
  english_pob_choice: my prayer
  chosen_spanish: mi oración
  alternatives_spanish:
  - mi plegaria
  - mi petición
  lexicon: HALOT
  rationale: El sustantivo denota oración/petición dirigida a Dios; «mi oración» es directo, natural y suficientemente amplio.
- source_word: וְחַסְדּוֹ
  english_pob_choice: his steadfast love
  chosen_spanish: su misericordia
  alternatives_spanish:
  - su amor constante
  - su lealtad de pacto
  - su amor leal
  lexicon: HALOT
  rationale: חֶסֶד abarca amor fiel, leal y misericordioso. En español, «misericordia» es una opción clara y reverente; sin embargo, por la carga de pacto/fidelidad del término, se documentan alternativas que preservan esa amplitud semántica. Se evita «amor constante» como frase menos establecida y «lealtad de pacto» por sonar demasiado técnica en el texto principal.
- source_word: מֵאִתִּי
  english_pob_choice: from me
  chosen_spanish: de mí
  alternatives_spanish:
  - lejos de mí
  - apartándola de mí
  lexicon: HALOT
  rationale: La preposición indica separación del hablante. «De mí» es suficiente en español porque el verbo «apartó» ya expresa la dirección de alejamiento.
theological_decisions:
- issue: Valor semántico de חֶסֶד
  english_pob_reading: his steadfast love
  chosen_spanish_reading: su misericordia
  alternative_spanish_readings:
  - su amor leal
  - su lealtad de pacto
  - su amor constante
  rationale: El POB inglés documenta que חֶסֶד incluye fidelidad de pacto y amor leal. En esta línea poética, «misericordia» conserva un registro bíblico claro y devocional para el español general, pero las alternativas se preservan porque ninguna agota por sí sola el alcance del hebreo.
  doctrine_reference: Translation philosophy §5 (consistencia de términos clave, o excepción documentada)
- issue: Coordinación negativa en la segunda mitad del versículo
  english_pob_reading: has not turned away my prayer or his steadfast love from me
  chosen_spanish_reading: no apartó mi oración ni su misericordia de mí
  alternative_spanish_readings:
  - no apartó de mí mi oración ni su misericordia
  - no retiró mi oración ni su misericordia de mí
  rationale: El inglés POB suaviza la coordinación para que la negación suene natural. En español, «ni... ni...» reproduce bien el alcance de la negación sobre ambos objetos y evita una lectura ambigua o pesada.
  doctrine_reference: Translation philosophy §3 (claridad sintáctica sin perder el paralelismo hebreo)
translation_notes:
  revision_awareness: El borrador sigue de cerca el consenso del POB inglés y su nota sobre חֶסֶד. En comparación con la redacción inglesa, se opta por una coordinación negativa más natural en español («ni... ni...») sin introducir contenido nuevo. No se detectaron revisiones posteriores que alteren el sentido base del versículo.
  spanish_consistency_notes:
  - Se usa «Dios» para אֱלֹהִים en alabanza directa.
  - Se evita «SEÑOR» porque el texto hebreo aquí no contiene el nombre divino explícito.
  - «Misericordia» se adopta como término principal para חֶסֶד en este versículo, con alternativas documentadas para futuras armonizaciones.
  - La puntuación exclamativa inicial refleja el tono benedictivo del hebreo.
  - Se mantiene el paralelismo entre «mi oración» y «su misericordia» sin explicar de más el objeto implícito de alejamiento.
