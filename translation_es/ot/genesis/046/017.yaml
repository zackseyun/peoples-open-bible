translation:
  language: es
  text: 'Los hijos de Aser: Imna[a], Isva, Isvi y Beriá; y Sera[b], hermana de ellos. Y los hijos de Beriá: Héber y Malquiel.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Imna corresponde al mismo nombre que en algunas versiones inglesas se traduce tradicionalmente como Jimnah.
    reason: lexical_alternative
  - marker: b
    text: Sera también puede transliterarse Seraj o Serach.
    reason: lexical_alternative
lexical_decisions:
- source_word: וּבְנֵי
  english_pob_choice: The sons of
  chosen_spanish: Los hijos de
  alternatives_spanish:
  - Y los hijos de
  - Los descendientes de
  lexicon: HALOT
  rationale: En genealogías, בְּנֵי se refiere de manera natural a los hijos varones del antepasado. En español, 'Los hijos de' comunica con claridad la relación genealógica sin forzar una paráfrasis. Se omite el valor coordinante inicial porque la lista funciona como encabezado en español.
- source_word: אָשֵׁר
  english_pob_choice: Asher
  chosen_spanish: Asher
  lexicon: HALOT
  rationale: Nombre propio tribal/personal; se translitera de forma estándar.
- source_word: יִמְנָה
  english_pob_choice: Imnah
  chosen_spanish: Imná
  alternatives_spanish:
  - Jimná
  lexicon: HALOT
  rationale: Nombre propio transliterado. Se adapta al patrón gráfico del español con acento agudo para indicar la sílaba tónica. 'Jimná' mantiene una tradición hispánica más antigua, pero 'Imná' refleja mejor la consonantización moderna del hebreo.
- source_word: וְיִשְׁוָה
  english_pob_choice: Ishvah
  chosen_spanish: Isvá
  alternatives_spanish:
  - Isuá
  lexicon: HALOT
  rationale: Nombre propio transliterado. La forma 'Isvá' sigue la vocalización hebrea y evita una grafía demasiado anglicizada. 'Isuá' es una alternativa posible, pero menos directa desde el hebreo masorético.
- source_word: וְיִשְׁוִי
  english_pob_choice: Ishvi
  chosen_spanish: Isví
  alternatives_spanish:
  - Isuí
  lexicon: HALOT
  rationale: Nombre propio transliterado de manera directa desde el hebreo. La terminación '-í' representa mejor la yod final que una adaptación más tradicional.
- source_word: וּבְרִיעָה
  english_pob_choice: Beriah
  chosen_spanish: Beriá
  alternatives_spanish:
  - Beriáh
  lexicon: HALOT
  rationale: Nombre propio transliterado. Se usa acento para marcar la tonicidad española. La forma sin h final es más natural en español y sigue la práctica de transliterar nombres hebreos sin sobrerrepresentar la aspiración.
- source_word: וְשֶׂרַח
  english_pob_choice: and Serah
  chosen_spanish: Seráh
  alternatives_spanish:
  - Seraj
  - Serajh
  lexicon: HALOT
  rationale: Nombre propio femenino transliterado. Se conserva la aspiración final con 'h' para reflejar la tradición transliterativa y distinguirlo de posibles lecturas más hispanizadas.
- source_word: אֲחֹתָם
  english_pob_choice: their sister
  chosen_spanish: su hermana
  alternatives_spanish:
  - era su hermana
  - la hermana de ellos
  lexicon: HALOT
  rationale: 'El hebreo presenta una aposición breve: ''su hermana''. En español, la aposición con coma reproduce mejor la concisión del original que introducir un verbo copulativo.'
- source_word: וּבְנֵי בְרִיעָה
  english_pob_choice: And the sons of Beriah
  chosen_spanish: Y los hijos de Beriá
  alternatives_spanish:
  - Los hijos de Beriá
  lexicon: HALOT
  rationale: Se conserva la transición genealógica con 'Y' porque enlaza un sublinaje nuevo dentro de la lista. El nombre mantiene la misma transliteración que antes para consistencia.
- source_word: חֶבֶר
  english_pob_choice: Heber
  chosen_spanish: Héber
  alternatives_spanish:
  - Heber
  lexicon: HALOT
  rationale: Nombre propio transliterado. Se acentúa en español para reflejar la pronunciación natural y evitar la lectura llana incorrecta.
- source_word: וּמַלְכִּיאֵל
  english_pob_choice: and Malchiel
  chosen_spanish: y Malquiel
  alternatives_spanish:
  - y Malchiél
  lexicon: HALOT
  rationale: Nombre propio transliterado. 'Malquiel' adapta de forma más transparente el grupo hebreo -khi-/-ki- al uso hispano; conserva la forma de nombre propio sin introducir traducción semántica.
translation_notes:
  revision_awareness: 'La redacción sigue de cerca la estructura hebrea y la revisión auditada en inglés: se conserva la aposición breve para Serah (''su hermana'') sin verbo copulativo, y se mantiene la segunda sublista genealógica con una nueva coordinación (''Y'').'
  spanish_consistency_notes:
  - Se mantuvo el registro genealógico conciso y formal.
  - Se unificó la transliteración de nombres propios con acentuación española cuando ayuda a la lectura.
  - No se introdujo lenguaje interpretativo ajeno a la relación genealógica del versículo.
