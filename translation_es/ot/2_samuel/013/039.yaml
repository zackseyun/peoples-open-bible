revisions:
- from: Y David, el rey, dejó de salir hacia Absalón[a], porque se había consolado respecto de Amnón, ya que estaba muerto.
  to: Y el rey David dejó de salir hacia Absalón[a], porque se había consolado por Amnón, porque había muerto.
  rationale: Se ajustó el orden a «el rey David» por naturalidad idiomática; se suavizó «respecto de Amnón» a «por Amnón» para un español más claro; y se cambió «estaba muerto» por «había muerto» para reflejar mejor el valor narrativo causal de כִּי מֵת. Se mantuvo la lectura principal revisada del inglés POB («dejó de salir») y la nota de ambigüedad textual.
