translation:
  language: es
  text: Y con ustedes habrá un hombre[a] por cada tribu, cada uno cabeza de la casa de sus padres.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O bien, ‘el principal de su casa ancestral’. El hebreo dice literalmente ‘la cabeza de la casa de sus padres’, refiriéndose al representante masculino principal de un hogar o clan patrilineal.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְאִתְּכֶם
  english_pob_choice: And with you
  chosen_spanish: Y con ustedes
  alternatives_spanish:
  - Y con vosotros
  - Y junto a ustedes
  lexicon: HALOT
  rationale: La preposición introduce a los que acompañarán a Moisés y Aarón. ‘Con ustedes’ es natural en español y conserva la relación de compañía sin añadir matices innecesarios.
- source_word: יִהְיוּ
  english_pob_choice: there shall be
  chosen_spanish: habrá
  alternatives_spanish:
  - serán
  - deberá haber
  lexicon: HALOT
  rationale: El imperfecto expresa aquí presencia o disposición futura dentro del encargo del censo. ‘Habrá’ comunica bien esa existencia requerida en español moderno.
- source_word: אִישׁ אִישׁ
  english_pob_choice: a man from each
  chosen_spanish: un hombre... por cada tribu
  alternatives_spanish:
  - un hombre de cada tribu
  - un hombre por tribu
  lexicon: HALOT
  rationale: La repetición distributiva se expresa con naturalidad en español por medio de ‘por cada tribu’, manteniendo la idea de un representante por tribu sin calcar la repetición.
- source_word: לַמַּטֶּה
  english_pob_choice: tribe
  chosen_spanish: tribu
  alternatives_spanish:
  - vara
  - rama
  - división tribal
  lexicon: HALOT
  rationale: En el contexto organizativo y censal de Números, מַטֶּה designa una unidad tribal, no una vara literal. ‘Tribu’ es el sentido contextual estándar.
- source_word: אִישׁ רֹאשׁ
  english_pob_choice: each man the head
  chosen_spanish: un hombre que sea cabeza
  alternatives_spanish:
  - un hombre, cabeza
  - un hombre, el jefe
  lexicon: HALOT
  rationale: ‘Cabeza’ conserva la metáfora concreta del hebreo para el representante principal. Se evita ‘jefe’ porque en español puede sonar más administrativo y menos cercano a la imagen original.
- source_word: לְבֵית אֲבֹתָיו
  english_pob_choice: of his fathers’ house
  chosen_spanish: de la casa de sus padres
  alternatives_spanish:
  - de la casa ancestral
  - de la casa paterna
  - de su familia paterna
  lexicon: HALOT
  rationale: La expresión hebrea apunta a la casa/clan patrilineal. ‘Casa de sus padres’ preserva la estructura social y la referencia relacional mejor que ‘familia’ sin más.
- source_word: הוּא
  english_pob_choice: (implicit in English)
  chosen_spanish: (implícito en la sintaxis española)
  alternatives_spanish:
  - él mismo
  - ese hombre
  lexicon: HALOT
  rationale: El pronombre enfático/resuntivo hebreo se puede dejar implícito en español sin pérdida, porque la aposición ‘un hombre que sea cabeza’ ya transmite la identificación.
translation_notes:
  revision_awareness: 'La redacción sigue de cerca el texto hebreo y el criterio del POB en inglés: mantiene la distribución ‘por cada tribu’, conserva la metáfora de ‘cabeza’ y traduce la estructura social de ‘casa de sus padres’ sin suavizarla a ‘familia’. También refleja el ajuste editorial del inglés para una formulación más natural (‘a man’ en vez de ‘one man’), adaptado al español con ‘un hombre’.'
  spanish_consistency_notes:
  - Se usa ‘Yahvé’ sólo cuando aparezca el nombre divino; este versículo no lo contiene.
  - ‘Tribu’ conserva el valor de מַטֶּה en contexto censal.
  - ‘Casa de sus padres’ se mantiene para respetar la organización patrilineal del hebreo.
  - La nota al pie marca una alternativa válida sin diluir la metáfora de ‘cabeza’.
