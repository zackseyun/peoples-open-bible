theological_decisions:
- issue: Mantener la alusión al trasfondo del Éxodo sin añadir elementos no presentes en esta cláusula
  english_pob_reading: 'Keep the wording compressed and allusive: ''they were troubled by muddy blood'' without adding ''water'' or ''Nile.'''
  chosen_spanish_reading: 'Conservar la construcción comprimida y alusiva: ''fueron turbados por sangre lodosa'', sin introducir ''agua'' ni ''Nilo''.'
  alternative_spanish_readings:
  - fueron turbados por el agua vuelta sangre lodosa
  - fueron turbados por el río convertido en sangre lodosa
  rationale: El griego es elíptico y poético; expandir el objeto aclararía el trasfondo, pero añadiría palabras que no están en la cláusula. La versión española mantiene la alusión y respeta la primacía del texto original.
  doctrine_reference: Primacía del idioma original; no sobreparafrasear más allá de lo que el texto exige.
- issue: Elegir un orden español natural para el sintagma genitivo inicial
  english_pob_reading: '''the spring of an ever-flowing river'' rather than ''an ever-flowing river’s spring.'''
  chosen_spanish_reading: '''la fuente de un río siempre caudaloso'' en vez de reordenar de forma menos natural.'
  alternative_spanish_readings:
  - la fuente de un río perenne
  - la fuente de un río incesante
  rationale: El griego presenta una relación de posesión/origen que en español se expresa mejor con 'fuente de un río'. Esto conserva la claridad y evita un giro forzado.
  doctrine_reference: Fidelidad semántica con fluidez idiomática controlada.
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión que prefirió 'the spring of an ever-flowing river' como reflejo más natural del genitivo griego; por eso el español usa 'la fuente de un río siempre caudaloso' y no una inversión más literal. También se preservó el carácter comprimido y alusivo de la cláusula, sin expandirla con 'agua' o 'Nilo'.
  spanish_consistency_notes:
  - Se usó 'fuente' para πηγῆς y 'río' para ποταμοῦ, manteniendo la imagen acuática del griego.
  - '''Turbados'' conserva el valor pasivo de ταραχθέντες y un registro bíblico sobrio.'
  - '''Sangre lodosa'' mantiene la tensión entre el elemento concreto ''sangre'' y el matiz de suciedad/mire del adjetivo griego.'
  - La frase inicial se resolvió de forma natural en español para evitar un calco incómodo del genitivo griego.
