review_pass:
  verdict: revise
  source_alignment_summary: 'El texto anterior usaba «mandó matar» para ἔθυσεν, pero ἔθυσεν ὁ πατήρ σου tiene al padre como sujeto gramatical directo del aorist activo. «Mandó matar» introduce un intermediario no presente en el griego, introduciendo una mediación que el original no tiene. El EN POB eligió «slaughtered» por su directidad; el equivalente español más fiel es «mató», que preserva la agencia directa sin implicar culto.'
  spanish_quality_summary: 'Con «mató el ternero engordado», el español es directo, fiel y natural. «Mató» para un animal de festín es comprensible y evita tanto el matiz cultual de «sacrificó» como el matiz causativo de «mandó matar». El resto del versículo es correcto: «ha llegado», «sano y salvo», «lo ha recibido de vuelta».'
  glossary_alignment: Sin conflictos con el glosario del proyecto. «Sano y salvo» para ὑγιαίνοντα está bien, con alternativa «sano» en nota correctamente preservada.
  issues:
  - severity: high
    issue: «mandó matar» introduce un intermediario no atestado en ἔθυσεν ὁ πατήρ σου
    rationale: El griego tiene al padre como sujeto directo del verbo activo. «Mandó matar» implica que el padre ordenó a otro que matara, mientras que «mató» preserva la agencia directa del padre, en línea con el audit trail inglés que eligió «slaughtered» por su directidad.
  revised_spanish_text: 'Le dijo: «Tu hermano ha llegado, y tu padre mató el ternero engordado, porque lo ha recibido de vuelta sano y salvo[a]».'
  revised_footnotes:
  - marker: a
    text: O «sano». El participio griego ὑγιαίνοντα puede significar «estando sano» o, según el contexto, más ampliamente «sano y salvo».
    reason: lexical_alternative
  revision_rationale: Se corrige «mandó matar» a «mató» para preservar la agencia directa del padre como sujeto de ἔθυσεν, en línea con el aorist activo del griego y con la decisión del audit trail inglés de usar «slaughtered» por su directidad. Sin otros cambios.
