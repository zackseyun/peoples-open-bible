lexical_decisions:
- source_word: ἔλαβεν
  english_pob_choice: took
  chosen_spanish: tomó
  alternatives_spanish:
  - capturó
  - recibió
  lexicon: LSJ
  rationale: En este relato militar, ἔλαβεν con objeto directo se entiende naturalmente como ‘tomó’ o ‘se apoderó de’. ‘Tomó’ mantiene la cercanía al griego sin imponer una expansión interpretativa.
- source_word: Τρύφων
  english_pob_choice: Tryphon
  chosen_spanish: Trifón
  alternatives_spanish:
  - Tryfón
  lexicon: transliteración convencional al español
  rationale: El nombre propio se adapta a la forma habitual en español bíblico, con acento gráfico para respetar la pronunciación y la ortografía española.
- source_word: τὰ θηρία
  english_pob_choice: the elephants
  chosen_spanish: los elefantes
  alternatives_spanish:
  - las bestias
  - los animales
  lexicon: LSJ
  rationale: Aunque literalmente el griego dice ‘las bestias/animales’, el contexto militar de 1 Macabeos muestra que el referente son elefantes de guerra. En español, ‘los elefantes’ comunica directamente ese sentido.
- source_word: κατεκράτησεν
  english_pob_choice: gained control of
  chosen_spanish: se apoderó de
  alternatives_spanish:
  - tomó posesión de
  - ganó control de
  - dominó
  lexicon: LSJ
  rationale: El verbo expresa dominio efectivo sobre la ciudad. ‘Se apoderó de’ refleja la toma de control con fuerza política o militar, sin reducirlo a una mera posesión legal ni intensificarlo indebidamente.
- source_word: Ἀντιοχίας
  english_pob_choice: Antioch
  chosen_spanish: Antioquía
  alternatives_spanish:
  - Antioch
  lexicon: forma española tradicional
  rationale: Se usa la forma española establecida del topónimo, que es clara y reconocible para lectores bíblicos en español.
translation_notes:
  revision_awareness: 'El texto sigue de cerca el griego de Swete y coincide con el audit trail inglés en los dos puntos decisivos: τὰ θηρία como ‘elefantes’ y κατεκράτησεν como dominio efectivo sobre Antioquía. No se registran revisiones aplicadas en el expediente inglés.'
  spanish_consistency_notes:
  - Se prefirió ‘se apoderó de’ para conservar la fuerza de κατεκράτησεν sin perder naturalidad en español.
  - Se usó ‘elefantes’ como traducción contextual de τὰ θηρία, con nota para preservar la tensión entre literalidad y referencialidad.
  - Se mantuvo una sintaxis breve y narrativa acorde con una línea histórica de 1 Macabeos.
