translation:
  text: through which those sheltered by your hand passed[a], the whole nation[b], having seen marvelous wonders.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'those protected by your hand.' The Greek literally says 'those being sheltered/covered by your hand.'
    reason: lexical_alternative
  - marker: b
    text: '''Marvelous wonders'' renders a doubled expression for extraordinary miraculous phenomena; alternatively, ''wonderful portents.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: διʼ οὗ
  chosen: through which
  alternatives:
  - through whom
  - by which
  lexicon: LSJ
  rationale: διά with the genitive and relative pronoun is best rendered instrumentally/locatively here, referring back to the path or medium of passage in context. 'Through which' is the most natural English rendering.
- source_word: πανεθνεὶ
  chosen: as a whole nation
  alternatives:
  - all together as a nation
  - the whole people
  - all the nation
  lexicon: LSJ
  rationale: The adverbial sense conveys collective national passage, not merely many individuals. 'As a whole nation' preserves the corporate force in readable English.
- source_word: διῆλθον
  chosen: passed
  alternatives:
  - went through
  - crossed over
  lexicon: LSJ
  rationale: Aorist of διέρχομαι denotes passing through. 'Passed' is concise and fits the prepositional phrase already carrying 'through'; 'crossed over' would import more interpretation from the broader Exodus setting.
- source_word: οἱ τῇ σῇ σκεπαζόμενοι χειρί
  chosen: those sheltered by your hand
  alternatives:
  - those protected by your hand
  - those covered by your hand
  lexicon: LSJ
  rationale: σκεπάζω literally involves covering/sheltering. 'Sheltered by your hand' preserves the metaphor of divine protection without flattening it to a purely abstract 'protected.'
- source_word: θεωρήσαντες
  chosen: after seeing
  alternatives:
  - having seen
  - beholding
  lexicon: LSJ
  rationale: The participle is antecedent to the main verb in sense. 'After seeing' gives clear English sequence while retaining the participial relationship.
- source_word: θαυμάσια τέρατα
  chosen: marvelous wonders
  alternatives:
  - wonderful portents
  - marvelous signs
  - astonishing marvels
  lexicon: LSJ
  rationale: The paired terms emphasize extraordinary miraculous phenomena. 'Marvelous wonders' preserves the rhetorical doubling without becoming overly technical. 'Portents' could suggest ominous signs too narrowly.
