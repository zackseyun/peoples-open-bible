    text: 'O: «cuando se ofrecía la ofrenda de cereal». El hebreo dice literalmente «al subir la ofrenda de cereal», usando lenguaje sacrificial para su presentación en el altar.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «desde el camino de Edom» o «por la ruta de Edom».'
    reason: lexical_alternative
  - marker: c
    text: El hebreo dice literalmente «la tierra se llenó del agua»; en español se expresa más naturalmente «la tierra se llenó de agua».
    reason: lexical_alternative
  revision_rationale: Se ajustó el verbo principal a narrativo simple («vino») para seguir la revisión inglesa auditada y evitar un imperfecto innecesario; se sustituyó «del agua» por «de agua» por naturalidad idiomática; se eliminó la nota menor sobre el plural de «agua» y se restauró una nota más pertinente sobre דֶּרֶךְ («camino/ruta»); y se simplificó la sintaxis para un español más claro y digno.
