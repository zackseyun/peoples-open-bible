  yaml_path: translation/ot/isaiah/005/002.yaml
  text: He dug it up[a], cleared it of stones, and planted it with choice vines; he built a tower in its midst, and also hewed out a winepress in it. Then he expected it to produce grapes, but it produced wild grapes.
  footnotes:
