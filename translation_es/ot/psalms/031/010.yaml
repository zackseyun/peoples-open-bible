review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador preserva bien la estructura básica del hebreo y mantiene correctamente «Yahvé» y «mi alma / mi vientre». Sin embargo, falla en un punto importante de fidelidad y naturalidad: «Ten gracia de mí» no es español natural ni refleja bien la súplica imperativa; debe ser «Tenme gracia» o mejor «Sé bondadoso conmigo». Además, la nota [a] está anclada en la frase equivocada: en el inglés auditado [a] corresponde a la alternativa de «mi ojo ... se ha debilitado», no a חָנֵּנִי. También conviene ajustar «mis ojos» al singular hebreo «mi ojo» y mejorar «con el dolor» hacia «por el dolor» o «con aflicción» para expresar mejor la causa/instrumento del deterioro.'
  spanish_quality_summary: La redacción es mayormente clara y digna, pero «Ten gracia de mí» suena antinatural en español eclesial general. «Mis ojos se han consumido» también introduce un plural no presente en el texto; «mi ojo se ha consumido» funciona poéticamente en español bíblico moderno. La cláusula final puede mantenerse elíptica, pero queda más fluida con raya o punto y coma. En conjunto requiere una reparación pequeña pero necesaria.
  glossary_alignment: 'Alineación buena en «Yahvé», «alma» y «vientre». No hay conflicto doctrinal mayor. La principal desalineación con el rastro auditado está en la gestión de notas: el borrador convirtió en nota de חָנֵּנִי una nota que en el POB inglés no existe, y omitió la nota léxica sobre el verbo/expresión de deterioro visual. También debe respetarse mejor el singular de עֵינִי.'
  issues:
  - severity: high
    issue: «Ten gracia de mí» es español antinatural y no es la mejor representación de חָנֵּנִי.
    rationale: El hebreo pide favor/gracia de forma directa; en español neutral y digno, «Tenme gracia» o «Sé bondadoso conmigo» transmiten el sentido mejor. «Ten gracia de mí» suena forzado y poco idiomático.
  - severity: high
    issue: La nota [a] está asignada al término equivocado.
    rationale: En el POB inglés, la nota [a] documenta alternativas para «my eye has wasted away ...», no para «Be gracious to me». El borrador altera indebidamente el rastro léxico auditado.
  - severity: medium
    issue: «Mis ojos» cambia el singular hebreo «mi ojo».
    rationale: Aunque el plural puede sonar idiomático, aquí el singular puede mantenerse en español poético sin extrañeza excesiva y preserva mejor la forma fuente.
  - severity: medium
    issue: La nota sobre «mi vientre» está anclada en «angustia».
    rationale: Si se conserva la nota sobre בטן, su marcador debe aparecer junto a «vientre», no junto a «angustia». Actualmente los anclajes [c][b] en la frase causal no corresponden al contenido de las notas.
  revised_spanish_text: Sé bondadoso conmigo, Yahvé, porque estoy en angustia; mi ojo[a] se ha consumido por el dolor, mi alma[b] y también mi vientre[c].
  revised_footnotes:
  - marker: a
    text: O «mi ojo se ha oscurecido por la aflicción» o «mi ojo desfallece de dolor».
    reason: lexical_alternative
  - marker: b
    text: «Mi alma» también puede traducirse «mi vida» o «mi ser».
    reason: lexical_alternative
  - marker: c
    text: Hebreo «mi vientre»; el término también puede referirse más ampliamente a las entrañas o partes internas.
    reason: lexical_alternative
  revision_rationale: Se corrige la súplica inicial a un español natural y fiel, se reubican las notas para que correspondan al rastro auditado, se restituye el singular «mi ojo» del hebreo, y se mantiene la terminología del proyecto («Yahvé», «alma», «vientre») con una sintaxis clara y digna.
