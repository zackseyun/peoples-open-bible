translation:
  language: es
  text: 'Y él les dijo: «Así dice Yahvé, el Dios de Israel: Que cada hombre ponga su espada sobre su muslo. Pasen y vuelvan de puerta en puerta por el campamento, y maten cada hombre a su hermano, y cada hombre a su compañero, y cada hombre a su allegado[a]»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «su cercano»; también puede traducirse «su pariente», «su familiar cercano» o «su vecino».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמֶר לָהֶם
  english_pob_choice: And he said to them
  chosen_spanish: Y él les dijo
  alternatives_spanish:
  - Entonces les dijo
  lexicon: HALOT
  rationale: Se conserva la transición narrativa simple del wayyiqtol sin añadir interpretación temporal extra; el pronombre explícito mantiene claridad en español.
- source_word: כֹּה אָמַר יְהוָה
  english_pob_choice: Thus says Yahweh
  chosen_spanish: Así dice Yahvé
  alternatives_spanish:
  - Esto dice Yahvé
  lexicon: HALOT
  rationale: Se mantiene la fórmula profética autoritativa con el nombre divino transliterado, conforme al criterio del proyecto para יְהוָה.
- source_word: אֱלֹהֵי יִשְׂרָאֵל
  english_pob_choice: the God of Israel
  chosen_spanish: el Dios de Israel
  lexicon: HALOT
  rationale: Es una construcción posesiva/covenantal directa; 'Dios de Israel' preserva el vínculo de alianza sin sobreexplicar.
- source_word: שִׂימוּ אִישׁ חַרְבּוֹ עַל יְרֵכוֹ
  english_pob_choice: Each man, put his sword on his thigh
  chosen_spanish: Ponga cada hombre su espada sobre su muslo
  alternatives_spanish:
  - Cada hombre, ponga su espada sobre su muslo
  - Ciña cada hombre su espada al muslo
  lexicon: HALOT
  rationale: Se conserva el distributivo אִישׁ y la imagen corporal del hebreo. 'Sobre su muslo' refleja la expresión literal; 'ciña' sería más idiomático, pero menos transparente al texto fuente.
- source_word: עִבְרוּ וָשׁוּבוּ
  english_pob_choice: Pass through and return
  chosen_spanish: Pasen y vuelvan
  alternatives_spanish:
  - Pasen y regresen
  - Vayan y vuelvan
  lexicon: HALOT
  rationale: La pareja verbal se traduce de forma breve y natural en español. El matiz de recorrido reiterado queda apoyado por el contexto inmediato 'de puerta en puerta'.
- source_word: מִשַּׁעַר לָשַׁעַר
  english_pob_choice: from gate to gate
  chosen_spanish: de puerta en puerta
  alternatives_spanish:
  - de un portón a otro
  - de puerta a puerta
  lexicon: HALOT
  rationale: En español, 'puerta en puerta' transmite el distributivo espacial con naturalidad. 'Puerta' evita un tecnicismo arquitectónico no necesario en este contexto narrativo.
- source_word: בַּמַּחֲנֶה
  english_pob_choice: throughout the camp
  chosen_spanish: por el campamento
  alternatives_spanish:
  - en el campamento
  - a lo largo del campamento
  lexicon: HALOT
  rationale: Con 'pasen y vuelvan' + 'de puerta en puerta', 'por el campamento' comunica el desplazamiento a través del recinto sin añadir una expansión interpretativa excesiva.
- source_word: וְהִרְגוּ
  english_pob_choice: kill
  chosen_spanish: maten
  alternatives_spanish:
  - maten de muerte
  - maten a
  lexicon: HALOT
  rationale: '''Maten'' es el equivalente directo y claro del verbo; evita suavizar la violencia del mandato o introducir imágenes no presentes en el hebreo.'
- source_word: אִישׁ אֶת אָחִיו
  english_pob_choice: each man kill his brother
  chosen_spanish: cada hombre a su hermano
  alternatives_spanish:
  - cada hombre a su hermano
  - cada uno a su hermano
  lexicon: HALOT
  rationale: Se mantiene la repetición distributiva con 'cada hombre' y el vínculo cercano 'hermano', conservando el impacto del parentesco inmediato.
- source_word: רֵעֵהוּ
  english_pob_choice: his companion
  chosen_spanish: a su compañero
  alternatives_spanish:
  - a su amigo
  - a su prójimo
  lexicon: HALOT
  rationale: '''Compañero'' reproduce bien el campo semántico de רֵעַ sin cargar afectivamente como ''amigo'' ni desplazarse hacia un uso más teológico como ''prójimo''.'
- source_word: קְרֹבוֹ
  english_pob_choice: his neighbor
  chosen_spanish: a su pariente
  alternatives_spanish:
  - a su vecino
  - a su allegado
  - a su pariente cercano
  lexicon: HALOT
  rationale: 'Se opta por ''pariente'' para reflejar la cercanía relacional fuerte de קרוב y para mantener la progresión intensificada: hermano, compañero, pariente.'
theological_decisions:
- issue: Representación de יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - Jehová
  rationale: La fuente hebrea usa el Tetragrama directamente; se conserva el nombre propio divino en español como 'Yahvé', siguiendo la política del proyecto y evitando la sustitución por un título.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Valor distributivo y marcación masculina de אִישׁ
  english_pob_reading: Each man ... each man ... each man
  chosen_spanish_reading: cada hombre ... cada hombre ... cada hombre
  alternative_spanish_readings:
  - cada uno ... cada uno ... cada uno
  - todos ... todos ... todos
  rationale: El hebreo repite אִישׁ con fuerza distributiva y masculina. En este contexto narrativo y judicial, 'cada hombre' preserva tanto el énfasis individual como la precisión de género del original.
  doctrine_reference: 'DOCTRINE.md Translation philosophy §4: Gender-accurate over gender-neutral'
- issue: Alcance relacional de קְרֹב
  english_pob_reading: his neighbor
  chosen_spanish_reading: su pariente
  alternative_spanish_readings:
  - su vecino
  - su allegado
  - su familiar
  rationale: El término hebreo puede abarcar a un pariente cercano o persona próxima; aquí, tras 'hermano' y 'compañero', 'pariente' conserva la escalada de cercanía sin reducirla a una mera vecindad.
  doctrine_reference: HALOT; English POB footnote on 'his near one'
translation_notes:
  revision_awareness: La revisión inglesa más reciente ajustó el par verbal para acercarlo más a los verbos hebreos y añadió conjuntivos repetidos. En español se siguió esa dirección con 'Pasen y vuelvan' y con la repetición explícita de 'y' antes de cada miembro de la tríada final, manteniendo además la progresión relacional del cierre.
  spanish_consistency_notes:
  - Se emplea 'Yahvé' para יְהוָה conforme al estándar del proyecto.
  - Se conserva el distributivo masculino con 'cada hombre' para אִישׁ, sin neutralizarlo.
  - '''Compañero'' y ''pariente'' distinguen רֵעַ y קרוב sin colapsar ambos en un solo término.'
  - La imagen corporal 'sobre su muslo' se mantiene por fidelidad al hebreo, aunque 'ciña' sea una alternativa idiomática.
