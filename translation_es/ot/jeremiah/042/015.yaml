revisions:
- from: 'Ahora pues, oigan la palabra de Yahvé[a], remanente de Judá. Así dice Yahvé de los ejércitos, el Dios de Israel: Si de veras ponen su rostro para entrar en Egipto y para habitar allí,'
  to: 'Ahora pues, oigan la palabra de Yahvé, remanente de Judá. Así dice Yahvé de los ejércitos, el Dios de Israel: Si están decididos[a] a ir a Egipto y a ir a residir allí como forasteros,'
  rationale: Se reemplaza el hebraísmo rígido del texto principal por una formulación española natural («están decididos») y se conserva la imagen hebrea en nota, siguiendo la lógica de la auditoría inglesa. También se restaura el segundo verbo de movimiento («y a ir») y se mejora la precisión de גּוּר con «residir allí como forasteros». No se requiere adjudicación adicional porque es una corrección clara de fidelidad y estilo.
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T22:29:27Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador conserva bien la estructura principal y la terminología clave («Yahvé», «remanente de Judá», «Yahvé de los ejércitos», «el Dios de Israel»), pero no refleja con suficiente fidelidad dos elementos del hebreo y de la auditoría inglesa: לָבֹא מִצְרַיִם se acerca mejor a «ir a Egipto» que a «entrar en Egipto», y especialmente וּבָאתֶם לָגוּר שָׁם exige mantener el segundo verbo de movimiento antes de «residir/sojornar allí», no absorberlo en «y para habitar allí».'
  spanish_quality_summary: El español es mayormente claro y digno, pero «ponen su rostro» suena forzado en texto principal; la propia auditoría inglesa prefirió expresar el sentido en el texto y dejar el hebraísmo en nota. Además, «para habitar allí» pierde el matiz de residencia como forasteros/temporal. Una leve revisión mejora naturalidad y precisión sin parafrasear.
  glossary_alignment: 'Alineación buena en el nombre divino: «Yahvé» está correcto según la política del proyecto. «Yahvé de los ejércitos» también es adecuado. No hay conflicto doctrinal mayor; el ajuste necesario es principalmente léxico-sintáctico para conservar el doble movimiento hebreo y el valor de גּוּר.'
  issues:
  - severity: medium
    issue: «Si de veras ponen su rostro» en el texto principal
    rationale: Aunque reproduce el modismo, suena poco idiomático en español bíblico moderno. La POB inglesa optó por expresar el sentido principal («are determined») y relegar el hebraísmo a nota; conviene hacer lo mismo para legibilidad sin perder la alternativa documentada.
  - severity: high
    issue: Pérdida de וּבָאתֶם como segundo verbo de movimiento
    rationale: El borrador «y para habitar allí» omite el equivalente de «y vendrán/irán» que la revisión inglesa añadió expresamente («and to go to sojourn there»). Esto reduce la correspondencia con la construcción hebrea.
  - severity: medium
    issue: «Entrar en Egipto» para לָבֹא מִצְרַיִם
    rationale: Es posible, pero el contexto y la auditoría inglesa favorecen «ir a Egipto», más natural y suficiente para בוא con destino.
  - severity: medium
    issue: «Habitar allí» debilita el matiz de לָגוּר
    rationale: גור no es simplemente habitar, sino residir como forastero/temporalmente. «Residir allí como forasteros» o una formulación similar conserva mejor el sentido.
  revised_spanish_text: 'Ahora pues, oigan la palabra de Yahvé, remanente de Judá. Así dice Yahvé de los ejércitos, el Dios de Israel: Si están decididos[a] a ir a Egipto y a ir a residir allí como forasteros,'
  revised_footnotes:
  - marker: a
    text: 'Hebreo: «si de veras ponen su rostro para ir a Egipto»; es un modismo que expresa resolución firme.'
    reason: lexical_alternative
  revision_rationale: Se reemplaza el hebraísmo rígido del texto principal por una formulación española natural («están decididos») y se conserva la imagen hebrea en nota, siguiendo la lógica de la auditoría inglesa. También se restaura el segundo verbo de movimiento («y a ir») y se mejora la precisión de גּוּר con «residir allí como forasteros». No se requiere adjudicación adicional porque es una corrección clara de fidelidad y estilo.
