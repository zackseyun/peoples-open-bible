review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien el sentido básico del hebreo: secuencia narrativa, marco temporal, sentido partitivo de מִן הָעָם, propósito de salir a recoger y resultado negativo. Sin embargo, «en el séptimo día» suena poco natural en español para בַּיּוֹם הַשְּׁבִיעִי; «el séptimo día» o «en el séptimo día» no son equivalentes estilísticamente, y aquí la opción natural y fiel es «el séptimo día». Además, el ancla de la nota [a] está colocada en «salieron», cuando la nota explica «algunos del pueblo»/«de entre el pueblo»; debe moverse al sintagma partitivo.'
  spanish_quality_summary: 'El español es generalmente claro y digno, pero tiene dos problemas de calidad: 1) «en el séptimo día» es un calco innecesario y poco idiomático en español bíblico moderno; 2) la nota al pie está mal anclada. «No hallaron nada» es comprensible, pero «no hallaron nada» puede mantenerse; aun así, «no hallaron nada» frente a «found none» no crea una distorsión seria. La revisión necesaria es pequeña.'
  glossary_alignment: 'No hay términos del glosario mayor en juego (Yahvé, Mesías, etc.). Las decisiones léxicas principales están bien orientadas: «Y sucedió», «salieron», «algunos del pueblo», «a recoger». La principal corrección es idiomática y de anclaje de nota, no terminológica.'
  issues:
  - severity: medium
    issue: «en el séptimo día» es una formulación poco natural en español
    rationale: Aunque reproduce de cerca la preposición hebrea, en español moderno y legible la forma natural para un marco temporal así es «el séptimo día». Mantiene fidelidad sin calco rígido.
  - severity: medium
    issue: La nota [a] está anclada en «salieron» en vez de «algunos del pueblo»
    rationale: La nota explica el valor partitivo de מִן הָעָם («de entre el pueblo»), no el verbo «salieron». El marcador debe aparecer donde corresponde semánticamente.
  revised_spanish_text: Y sucedió el séptimo día que algunos[a] del pueblo salieron a recoger, pero no hallaron nada.
  revised_footnotes:
  - marker: a
    text: 'Hebreo: «de entre el pueblo»; el sentido es partitivo, es decir, solo una parte del pueblo salió.'
    reason: lexical_alternative
  revision_rationale: Se ajusta la expresión temporal a un español natural y fiel («el séptimo día») y se reubica el marcador de nota al elemento partitivo que realmente comenta. El resto del versículo puede conservarse.
