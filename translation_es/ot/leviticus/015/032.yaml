translation:
  language: es
  text: Esta es la ley del que tiene una descarga[a], y de aquel de quien sale una emisión de semen, quedando inmundo por ella.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, de manera más formal: «Esta es la ley del que tiene una descarga, y de aquel de quien sale una emisión de semen, de modo que queda inmundo por ella».'
    reason: lexical_alternative
lexical_decisions:
- source_word: זֹאת
  english_pob_choice: This is
  chosen_spanish: Esta es
  alternatives_spanish:
  - Esta
  lexicon: HALOT
  rationale: El demostrativo introduce una fórmula resumen; en español natural conviene explicitar el verbo copulativo para una lectura fluida y fiel al sentido.
- source_word: תּוֹרַת
  english_pob_choice: the law
  chosen_spanish: la ley
  alternatives_spanish:
  - la instrucción
  lexicon: HALOT
  rationale: En este contexto levítico, תּוֹרָה designa la norma legal de un caso. «Ley» conserva mejor el registro jurídico que «instrucción».
- source_word: הַזָּב
  english_pob_choice: the one with a discharge
  chosen_spanish: el que tiene una descarga
  alternatives_spanish:
  - el hombre con una descarga
  - el que padece una descarga
  lexicon: HALOT
  rationale: La forma hebrea funciona como designación de condición; «el que tiene una descarga» es claro y evita una paráfrasis excesiva. Se conserva «descarga» para reflejar el campo semántico corporal del término.
- source_word: וַאֲשֶׁר
  english_pob_choice: and for him from whom
  chosen_spanish: y del que de él
  alternatives_spanish:
  - y del que
  - y de aquel de quien
  lexicon: HALOT
  rationale: La cláusula relativa introduce un segundo caso; en español, «del que de él» reproduce el referente personal y prepara la estructura verbal siguiente sin añadir contenido ajeno.
- source_word: תֵּצֵא מִמֶּנּוּ
  english_pob_choice: an emission of semen goes out
  chosen_spanish: sale una emisión de semen
  alternatives_spanish:
  - sale semen de él
  - tiene una emisión seminal
  lexicon: HALOT
  rationale: Se conserva el movimiento concreto del verbo «salir» y se expresa de forma comprensible en español. «Emisión de semen» refleja el giro base y mantiene la explicitud corporal del original.
- source_word: שִׁכְבַת זֶרַע
  english_pob_choice: an emission of semen
  chosen_spanish: una emisión de semen
  alternatives_spanish:
  - una emisión seminal
  - eyaculación
  lexicon: HALOT
  rationale: El hebreo es un modismo técnico sobre emisión seminal; «emisión de semen» es transparente y no introduce un tono más clínico o más coloquial que el del texto.
- source_word: לְטָמְאָה
  english_pob_choice: making him unclean
  chosen_spanish: quedando inmundo
  alternatives_spanish:
  - para hacerlo inmundo
  - haciéndolo inmundo
  lexicon: HALOT
  rationale: El infinitivo con לְ expresa aquí efecto/resultadо. «Quedando inmundo» comunica el estado resultante de forma natural en español y mantiene el valor ritual de טָמֵא. Se usa «inmundo» en continuidad con la terminología bíblica tradicional del POB para la impureza ritual, no como juicio moral.
- source_word: בָהּ
  english_pob_choice: by it
  chosen_spanish: por ella
  alternatives_spanish:
  - por eso
  - mediante ella
  lexicon: HALOT
  rationale: El sufijo femenino singular remite a la emisión. «Por ella» expresa el medio o la base de la impureza de manera breve y fiel.
theological_decisions:
- issue: Término ritual de impureza
  english_pob_reading: making him unclean / unclean
  chosen_spanish_reading: quedando inmundo / inmundo
  alternative_spanish_readings:
  - quedando impuro
  - haciendo impuro
  rationale: El contexto levítico habla de impureza ritual, no de culpa moral. «Inmundo» conserva la fuerza técnica y la tradición terminológica del POB para este campo.
  doctrine_reference: Impureza ritual en Levítico 15; distinción entre pureza ceremonial y pecado moral
- issue: Forma resumida de la norma
  english_pob_reading: This is the law for the one with a discharge...
  chosen_spanish_reading: Esta es la ley del que tiene una descarga...
  alternative_spanish_readings:
  - Esta es la instrucción del que tiene una descarga...
  rationale: Se mantiene el encabezado legal resumitivo del hebreo. «Ley» es la etiqueta normativa más natural en este género y evita diluir el carácter jurídico del verso.
  doctrine_reference: Género legal de la Torá en Levítico
translation_notes:
  revision_awareness: El texto hebreo y el audit trail inglés muestran alta concordancia y no requieren revisión sustantiva; se preserva la estructura resumitiva y la terminología ritual sin suavizar la literalidad del segundo miembro.
  spanish_consistency_notes:
  - Se mantiene «ley» para תּוֹרָה en contexto jurídico.
  - Se conserva «descarga» para הַזָּב por consistencia con el registro físico del pasaje.
  - Se usa «inmundo» como término técnico ritual, coherente con el POB en contextos de pureza/impureza.
  - La nota al pie ofrece una alternativa más formal sin cambiar el sentido.
