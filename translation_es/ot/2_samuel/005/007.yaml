translation:
  language: es
  text: Pero David capturó la fortaleza de Sion[a], es decir, la Ciudad de David.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «la fortaleza de Sion». El hebreo denomina aquí una plaza fortificada.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּלְכֹּד
  english_pob_choice: captured
  chosen_spanish: capturó
  alternatives_spanish:
  - tomó
  - se apoderó de
  lexicon: HALOT
  rationale: En contexto militar, לכד expresa tomar una plaza por asalto o captura. «Capturó» conserva esa fuerza narrativa en español y suena natural; «tomó» sería demasiado genérico y «se apoderó de» puede sugerir un matiz más interpretativo.
- source_word: וַ
  english_pob_choice: But
  chosen_spanish: Pero
  alternatives_spanish:
  - Y
  - Entonces
  lexicon: Gramática hebrea
  rationale: La waw narrativa aquí enlaza con la escena previa y aporta un contraste suave con la confianza jebusea. «Pero» comunica mejor ese giro discursivo en español que un simple «Y».
- source_word: מְצֻדַת
  english_pob_choice: stronghold
  chosen_spanish: fortaleza
  alternatives_spanish:
  - baluarte
  - ciudadela
  lexicon: HALOT
  rationale: El término designa un lugar fortificado. «Fortaleza» transmite bien la idea de lugar defensivo y es más natural en español bíblico actual; «baluarte» y «ciudadela» son posibles, pero menos directos aquí.
- source_word: צִיּוֹן
  english_pob_choice: Zion
  chosen_spanish: Sion
  alternatives_spanish:
  - Zion
  lexicon: HALOT
  rationale: En español bíblico, el topónimo se vierte normalmente «Sion». Mantiene el nombre propio sin disfrazarlo como título común.
- source_word: הִיא
  english_pob_choice: that is
  chosen_spanish: es decir
  alternatives_spanish:
  - o sea
  - esto es
  lexicon: Gramática hebrea
  rationale: 'El pronombre independiente funciona en aposición explicativa. «Es decir» reproduce con naturalidad esa identificación: la fortaleza de Sion = la Ciudad de David.'
- source_word: עִיר דָּוִד
  english_pob_choice: the City of David
  chosen_spanish: la Ciudad de David
  alternatives_spanish:
  - la ciudad de David
  - la urbe de David
  lexicon: HALOT
  rationale: Es un nombre de lugar con valor titular. «La Ciudad de David» conserva el paralelismo formal y la referencia establecida en español.
translation_notes:
  revision_awareness: El texto inglés auditado no requirió revisiones posteriores y mostró alto acuerdo; esta versión española sigue de cerca las decisiones léxicas aprobadas, ajustándolas a la convención bíblica del español para Sion y la identificación appositiva.
  spanish_consistency_notes:
  - Se usa «Sion» como forma española consagrada del topónimo, manteniendo la referencia al mismo lugar que el inglés llama Zion.
  - «Fortaleza» se elige por claridad idiomática, pero la nota conserva la alternativa «fortaleza de Sion» frente a la identificación con «Ciudad de David».
  - La frase «es decir» preserva la función explicativa de הִיא sin añadir interpretación adicional.
