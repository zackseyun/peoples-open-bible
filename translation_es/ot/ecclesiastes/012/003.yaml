translation:
  language: es
  text: el día en que tiemblen[a] los guardianes de la casa, y se encorven los hombres de fuerza, y cesen las que muelen porque son pocas, y se oscurezcan los que miran por las ventanas[b],
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'La imagen probablemente describe el deterioro de la vejez: los ‘guardianes de la casa’ pueden referirse a los brazos o las manos, los ‘hombres de fuerza’ a las piernas, ‘las que muelen’ a los dientes y los que miran por las ventanas a los ojos.'
    reason: alternative_reading
  - marker: b
    text: O ‘por las celosías’.
    reason: lexical_alternative
lexical_decisions:
- source_word: בַּיּוֹם
  english_pob_choice: on the day
  chosen_spanish: el día en que
  alternatives_spanish:
  - en el día en que
  - cuando
  lexicon: HALOT
  rationale: Conserva el marco temporal del hebreo y su valor introductorio, mientras permite que la serie de imágenes fluya con naturalidad en español.
- source_word: יָזֻעוּ
  english_pob_choice: tremble
  chosen_spanish: tiemblen
  alternatives_spanish:
  - se estremezcan
  - se sacudan
  lexicon: HALOT
  rationale: ‘Temblar’ expresa bien el sacudimiento físico y funciona de modo natural en español poético.
- source_word: שֹׁמְרֵי הַבַּיִת
  english_pob_choice: the keepers of the house
  chosen_spanish: los guardianes de la casa
  alternatives_spanish:
  - los que guardan la casa
  - los cuidadores de la casa
  lexicon: HALOT
  rationale: Mantiene la imagen de ‘casa’ y ‘guardianes’ sin decodificarla en el cuerpo del texto; ‘guardianes’ es una equivalencia clara para el participio plural.
- source_word: הִתְעַוְּתוּ
  english_pob_choice: are bent
  chosen_spanish: se encorven
  alternatives_spanish:
  - se tuerzan
  - se doblen
  lexicon: HALOT
  rationale: ‘Encorvarse’ comunica la deformación corporal de forma idiomática y acorde con la imagen de la vejez.
- source_word: אַנְשֵׁי הֶחָיִל
  english_pob_choice: the men of strength
  chosen_spanish: los hombres de fuerza
  alternatives_spanish:
  - los hombres fuertes
  - los valientes
  lexicon: HALOT
  rationale: Respeta la construcción nominal masculina del hebreo y preserva el énfasis en la fuerza, sin diluir la imagen poética.
- source_word: בָטְלוּ
  english_pob_choice: cease
  chosen_spanish: cesen
  alternatives_spanish:
  - dejen de moler
  - se detengan
  lexicon: HALOT
  rationale: ‘Cesar’ reproduce bien la idea de quedar inactivas; en español suena sobrio y poético.
- source_word: הַטֹּחֲנוֹת
  english_pob_choice: the grinders
  chosen_spanish: las muelas
  alternatives_spanish:
  - las que muelen
  - los dientes
  lexicon: HALOT
  rationale: La POB inglesa mantiene la imagen literal; en español, ‘muelas’ conserva la referencia metafórica probable y resulta más natural que un calco participial.
- source_word: כִּי מִעֵטוּ
  english_pob_choice: because they are few
  chosen_spanish: porque son pocas
  alternatives_spanish:
  - porque han disminuido
  - porque son escasas
  lexicon: HALOT
  rationale: Mantiene la causalidad y la brevedad del hebreo; ‘son pocas’ es una forma concisa y transparente en español.
- source_word: חָשְׁכ֥וּ
  english_pob_choice: grow dark
  chosen_spanish: se oscurezcan
  alternatives_spanish:
  - se nublen
  - queden oscuras
  lexicon: HALOT
  rationale: Expresa el deterioro de la visión con un verbo intransitivo natural en español.
- source_word: הָרֹאוֹת
  english_pob_choice: those looking
  chosen_spanish: los que miran
  alternatives_spanish:
  - las que ven
  - los observadores
  lexicon: HALOT
  rationale: Conserva el participio sin anticipar de manera explícita la identificación metafórica con los ojos, aunque esa sea la lectura probable.
- source_word: בָּאֲרֻבּוֹת
  english_pob_choice: through the windows
  chosen_spanish: por las ventanas
  alternatives_spanish:
  - a través de las ventanas
  - por las celosías
  lexicon: HALOT
  rationale: '‘Ventanas’ es la opción más directa y accesible; ‘por’ funciona bien con el verbo ‘mirar’ y mantiene abierta la imagen. '
theological_decisions:
- issue: Si desarrollar en el texto principal la alegoría corporal implícita
  english_pob_reading: Preserve the poetic household imagery without decoding it into body parts
  chosen_spanish_reading: Conservar la imagen de la casa y sus guardianes sin explicitar en el texto principal la equivalencia con partes del cuerpo
  alternative_spanish_readings:
  - Interpretar a los guardianes como brazos o manos, a los hombres de fuerza como piernas, a las muelas como dientes y a los que miran por las ventanas como ojos
  rationale: El hebreo presenta una metáfora amplia de decadencia, probablemente de la vejez, pero no identifica en el versículo cada elemento. La traducción conserva la imagen y deja la decodificación para nota, evitando importar más de lo que el texto dice explícitamente.
  doctrine_reference: Translation philosophy §§1, 3, 6
- issue: Cómo rendir אַנְשֵׁי הֶחָיִל sin neutralizar el género del hebreo
  english_pob_reading: the men of strength
  chosen_spanish_reading: los hombres de fuerza
  alternative_spanish_readings:
  - los fuertes
  - los hombres fuertes
  rationale: El hebreo usa un término humano masculino; conviene mantener ese rasgo cuando no hay base textual para neutralizarlo. ‘Hombres de fuerza’ conserva forma y énfasis poético.
  doctrine_reference: Translation philosophy §4
translation_notes:
  revision_awareness: El último pase del texto fuente se mantuvo sin cambios y el cotejo externo reportó alta concordancia (agree), por lo que esta versión española sigue de cerca la lectura auditada sin introducir revisiones no documentadas.
  spanish_consistency_notes:
  - Se mantiene ‘Dios/Yahvé’ fuera de este versículo porque no aparece ninguna referencia nominal a la divinidad.
  - ‘Muelas’ se usa para preservar la imagen literal de ‘grinders’ sin convertirla en una explicación interpretativa dentro del cuerpo del texto.
  - Se conserva el paralelismo poético con verbos en presente de subjuntivo para reflejar el valor temporal-prospectivo del hebreo en esta construcción.
