translation:
  language: es
  text: Presta atención[a], Job; escúchame. Guarda silencio[b], y yo hablaré.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «óyeme».
    reason: lexical_alternative
  - marker: b
    text: O «Calla»; el hebreo puede leerse como una orden breve de no hablar.
    reason: lexical_alternative
lexical_decisions:
- source_word: הַקְשֵׁב
  english_pob_choice: Pay attention
  chosen_spanish: Presta atención
  alternatives_spanish:
  - Escucha atentamente
  - Pon atención
  lexicon: HALOT
  rationale: El imperativo de קשב pide atención concentrada, no solo oír. «Presta atención» comunica bien la fuerza exhortativa en español moderno y mantiene un tono natural y digno.
- source_word: אִיּוֹב
  english_pob_choice: Job
  chosen_spanish: Job
  alternatives_spanish:
  - —
  lexicon: Transliteración estándar del nombre propio
  rationale: Se conserva el nombre propio como en el texto fuente y en la tradición bíblica en español.
- source_word: שְׁמַע לִי
  english_pob_choice: listen to me
  chosen_spanish: escúchame
  alternatives_spanish:
  - óyeme
  - escúchame, por favor
  lexicon: HALOT
  rationale: שמע con ל expresa escuchar a alguien, dirigido a la persona. «Escúchame» es la forma más natural y directa en español, y conserva la relación personal del mandato.
- source_word: הַחֲרֵשׁ
  english_pob_choice: Be silent
  chosen_spanish: Guarda silencio
  alternatives_spanish:
  - Calla
  - Permanece en silencio
  lexicon: HALOT
  rationale: El imperativo de חרשׁ aquí pide no hablar. «Guarda silencio» reproduce bien el tono imperativo sin sonar demasiado áspero o arcaico; además preserva el matiz de detener la palabra antes de que él hable.
- source_word: וְאָנֹכִי
  english_pob_choice: and I
  chosen_spanish: y yo
  alternatives_spanish:
  - y entonces yo
  - mientras yo
  lexicon: Pronombre enfático de primera persona
  rationale: El hebreo usa el pronombre enfático. En español, «yo» después de la conjunción basta para mantener la contraposición y el énfasis de la secuencia.
- source_word: אֲדַבֵּר
  english_pob_choice: will speak
  chosen_spanish: hablaré
  alternatives_spanish:
  - diré
  - voy a hablar
  lexicon: HALOT
  rationale: El imperfecto de דבר aquí expresa la acción que Eliú realizará tras el silencio de Job. El futuro simple «hablaré» es claro, solemne y fiel al sentido prospectivo.
translation_notes:
  revision_awareness: 'El pasaje coincide plenamente con el audit trail inglés: se mantiene la secuencia de tres mandatos breves (prestar atención, escuchar, guardar silencio) seguida de la declaración de que el hablante tomará la palabra. No se detectan revisiones textuales ni tensiones teológicas específicas en este versículo.'
  spanish_consistency_notes:
  - Se evita «SEÑOR» porque no aparece el tetragrámaton ni una sustitución divina en este verso.
  - Se conserva un registro sobrio y directo, adecuado para discurso exhortativo entre Eliú y Job.
  - «Escúchame» y «Guarda silencio» preservan la relación de mandato personal sin añadir matices interpretativos no presentes en el hebreo.
