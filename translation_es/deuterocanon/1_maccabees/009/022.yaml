translation:
  language: es
  text: Y el resto de los relatos acerca de Judas, y de sus guerras, y de las hazañas valerosas que hizo, y de su grandeza, no fueron registrados; porque eran muchísimos.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: τὰ περισσὰ
  english_pob_choice: the rest
  chosen_spanish: el resto
  alternatives_spanish:
  - lo restante
  - las demás cosas
  - lo que queda
  lexicon: LSJ
  rationale: La frase funciona de manera resumidora para lo que queda fuera del relato anterior. «El resto» conserva el sentido idiomático y suena natural en español.
- source_word: τῶν λόγων
  english_pob_choice: the accounts
  chosen_spanish: de los relatos
  alternatives_spanish:
  - de los relatos escritos
  - de los asuntos
  - de las palabras
  lexicon: LSJ
  rationale: En un resumen historiográfico, λόγοι no apunta solo a «palabras», sino a los relatos o informes sobre Judas. «Relatos» mantiene ese valor narrativo sin sobretraducir.
- source_word: πολέμων
  english_pob_choice: wars
  chosen_spanish: de sus guerras
  alternatives_spanish:
  - de sus batallas
  - de sus campañas
  lexicon: LSJ
  rationale: «Guerras» reproduce el alcance amplio del plural griego y evita restringirlo a combates aislados o a una sola campaña militar.
- source_word: ἀνδραγαθιῶν
  english_pob_choice: brave deeds
  chosen_spanish: de las hazañas valerosas
  alternatives_spanish:
  - de los actos de valor
  - de los hechos heroicos
  - de las proezas
  lexicon: LSJ
  rationale: El término expresa acciones de valor heroico. «Hazañas valerosas» conserva el elogio y resulta claro en español, sin cargarlo de un matiz demasiado arcaico o técnico.
- source_word: μεγαλωσύνης
  english_pob_choice: greatness
  chosen_spanish: de su grandeza
  alternatives_spanish:
  - de su magnificencia
  - de su majestad
  - de su gran renombre
  lexicon: LSJ
  rationale: Aquí μεγαλωσύνη describe la estatura o grandeza de Judas, no una «majestad» real en sentido técnico. «Grandeza» es la opción más amplia y fiel.
- source_word: οὐ κατεγράφη
  english_pob_choice: were not recorded
  chosen_spanish: no quedó registrado
  alternatives_spanish:
  - no fueron registrados
  - no se escribieron
  - no fueron puestos por escrito
  lexicon: LSJ
  rationale: La pasiva indica que esos hechos no entraron en el registro escrito. «No quedó registrado» es idiomático en español y conserva la idea de ausencia de consignación.
- source_word: πολλὰ γὰρ ἦν σφόδρα
  english_pob_choice: for they were very many
  chosen_spanish: porque eran muchísimos
  alternatives_spanish:
  - porque eran muy muchos
  - porque eran en extremo muchos
  - porque eran demasiados
  lexicon: LSJ
  rationale: La cláusula explica la omisión por la abundancia de materiales. «Muchísimos» comunica bien la intensidad de σφόδρα y mantiene la causalidad del griego.
translation_notes:
  revision_awareness: 'El borrador sigue de cerca el sentido del griego Swete 1909 y coincide sustancialmente con la decisión inglesa auditada: resumen historiográfico, no ampliación interpretativa. No se detectan variantes textuales relevantes en el paquete proporcionado.'
  spanish_consistency_notes:
  - Se evita «SEÑOR» porque no hay aquí un referente del nombre divino.
  - Se usa «Judas» como nombre propio histórico, sin intentar homogeneizarlo con otros usos de «Judas» en contextos distintos.
  - «Hazañas valerosas» mantiene el matiz laudatorio del griego sin caer en un calco rígido.
