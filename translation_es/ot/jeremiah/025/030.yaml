  rationale: 'Se corrigen errores menores pero importantes: se mueve la nota lexical al término correcto («pastizal»), se normaliza el formato de la frase «pisan uvas», y se ajusta «sobre su pastizal» a «contra su pastizal» para alinearlo mejor con el contexto de juicio y con la decisión contextual auditada en inglés. No se requiere una reescritura mayor.'
