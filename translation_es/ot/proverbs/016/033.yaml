translation:
  language: es
  text: La suerte se echa al regazo[a], pero cada una de sus decisiones proviene de Yahvé.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'su veredicto' o 'su juicio'. El hebreo puede llevar un matiz judicial.
    reason: lexical_alternative
lexical_decisions:
- source_word: בַּחֵיק
  english_pob_choice: into the lap
  chosen_spanish: en el regazo
  alternatives_spanish:
  - en el seno
  - en el pliegue
  lexicon: HALOT
  rationale: חֵיק puede significar 'pecho', 'seno', 'regazo' o 'pliegue'. En español, 'regazo' conserva la imagen concreta del lugar donde cae la suerte y suena natural en un proverbio, sin explicitar más de lo que el hebreo dice.
- source_word: יוּטַל
  english_pob_choice: is cast
  chosen_spanish: se echa
  alternatives_spanish:
  - se arroja
  - es echada
  lexicon: HALOT
  rationale: La forma pasiva/causativa expresa que la suerte es lanzada. 'Se echa' reproduce bien el gesto idiomático de echar suertes en español y evita una pasiva demasiado rígida.
- source_word: הַגּוֹרָל
  english_pob_choice: the lot
  chosen_spanish: la suerte
  alternatives_spanish:
  - el sorteo
  - el lote
  lexicon: HALOT
  rationale: גוֹרָל designa la suerte usada para decidir. En español, 'suerte' es el equivalente más asentado para este procedimiento y mantiene el valor concreto del objeto arrojado.
- source_word: מִשְׁפָּטוֹ
  english_pob_choice: its decision
  chosen_spanish: su decisión
  alternatives_spanish:
  - su juicio
  - su veredicto
  - su determinación
  lexicon: HALOT
  rationale: מִשְׁפָּט puede tener matiz jurídico de 'juicio', 'veredicto' o 'sentencia'. Aquí, por el contexto de echar suertes, 'decisión' comunica con claridad el resultado determinado sin perder la resonancia judicial.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: Siguiendo el estándar del proyecto para el Tetragrámaton, se conserva el nombre divino como 'Yahvé' en lugar de sustituirlo por un título.
- source_word: כָּל
  english_pob_choice: every
  chosen_spanish: toda
  alternatives_spanish:
  - cada
  - todo
  lexicon: HALOT
  rationale: Con un sustantivo singular, כָּל puede tener valor distributivo. En español, 'toda' fluye mejor con 'decisión' y transmite que cada resultado procede de Yahvé.
theological_decisions:
- issue: Soberanía divina sobre el resultado de echar suertes
  english_pob_reading: Although humans cast the lot, the outcome/decision belongs to Yahweh.
  chosen_spanish_reading: Aunque la suerte es echada por manos humanas, toda su decisión proviene de Yahvé.
  alternative_spanish_readings:
  - La suerte se echa, pero su decisión es de Yahvé.
  - Toda decisión de la suerte viene de Yahvé.
  rationale: 'La traducción conserva la tensión del proverbio: la acción humana es real, pero el resultado queda atribuido a Yahvé. No amplía el dicho más allá de su alcance ni lo reduce a una mera fórmula religiosa.'
  doctrine_reference: Preservar la tensión teológica del proverbio; providencia divina sin sobreexplicación sistemática.
translation_notes:
  revision_awareness: El pasaje presenta alto acuerdo con el audit trail inglés y no requiere revisión textual adicional. Se ha conservado la imagen concreta de la suerte echada en el regazo y el matiz judicial de מִשְׁפָּט mediante una nota alternativa.
  spanish_consistency_notes:
  - Se usó 'Yahvé' conforme al estándar del proyecto para יהוה.
  - Se eligió 'la suerte' para גּוֹרָל por ser la forma natural en español para este acto ritual/decisorio.
  - Se mantuvo el contraste entre la acción humana y la procedencia divina del resultado, sin convertir el proverbio en una tesis más amplia de providencia.
