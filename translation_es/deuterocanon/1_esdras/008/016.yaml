translation:
  language: es
  text: Y todo lo que tú y tus hermanos quieran hacer con la plata y el oro[a], llévenlo a cabo conforme a la voluntad de tu Dios.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El paralelo hebreo en Esdras 7:18 es más específico y habla de lo que parezca bueno hacer con la plata y el oro sobrantes; aquí 1 Esdras usa una formulación griega más amplia.
    reason: alternative_reading
lexical_decisions:
- source_word: πάντα ὅσα ἂν βούλῃ
  english_pob_choice: whatever ... wish
  chosen_spanish: todo lo que ... quieran
  alternatives_spanish:
  - lo que ... deseen
  - cualquier cosa que ... quieran
  lexicon: BDAG
  rationale: La construcción griega expresa amplitud e indeterminación abierta; en español, «todo lo que» comunica esa amplitud de manera natural. «Quieran» conserva el matiz volitivo sin volver la frase rígida o demasiado fuerte.
- source_word: μετὰ τῶν ἀδελφῶν σου
  english_pob_choice: you and your brothers
  chosen_spanish: tú y tus hermanos
  alternatives_spanish:
  - con tus hermanos
  - junto con tus hermanos
  lexicon: BDAG
  rationale: El griego literalmente dice «con tus hermanos», pero en español resulta más claro explicitar la acción conjunta como «tú y tus hermanos». Se conserva «hermanos» para mantener el masculino plural del original.
- source_word: ποιῆσαι
  english_pob_choice: to do
  chosen_spanish: hacer
  alternatives_spanish:
  - realizar
  - llevar a cabo
  lexicon: BDAG
  rationale: ποιέω es un verbo amplio; «hacer» es la opción más directa y general en español. Aquí la idea principal es la acción que se decide respecto del dinero.
- source_word: χρυσίῳ καὶ ἀργυρίῳ
  english_pob_choice: with the silver and gold
  chosen_spanish: con la plata y el oro
  alternatives_spanish:
  - con el oro y la plata
  - respecto de la plata y el oro
  lexicon: BDAG
  rationale: 'El dativo indica medio o asociación: aquello con lo cual se hará lo que se decida. «Plata y oro» es el equivalente natural y bíblicamente reconocible en español.'
- source_word: ἐπιτέλει
  english_pob_choice: carry it out
  chosen_spanish: realícenlo
  alternatives_spanish:
  - cúmplanlo
  - llévenlo a cabo
  lexicon: BDAG
  rationale: ἐπιτελέω indica ejecutar o llevar a término una acción autorizada. «Realícenlo» transmite bien la idea de ejecución efectiva y encaja con el imperativo plural implícito en el contexto.
- source_word: κατὰ τὸ θέλημα τοῦ θεοῦ σου
  english_pob_choice: according to the will of your God
  chosen_spanish: conforme a la voluntad de tu Dios
  alternatives_spanish:
  - según la voluntad de tu Dios
  - de acuerdo con la voluntad de tu Dios
  lexicon: BDAG
  rationale: «Conforme a» mantiene la relación normativa del griego y suena natural en español bíblico contemporáneo. «Voluntad de tu Dios» conserva el referente teológico sin suavizarlo.
theological_decisions:
- issue: Relación con el paralelo hebreo/arámico de Esdras, donde la formulación es más específica respecto de lo que convenga hacer con el dinero restante.
  english_pob_reading: Translate the Greek directly as a broad authorization to do whatever Ezra and his brothers wish with the silver and gold, qualified by God's will.
  chosen_spanish_reading: Traducir el griego como una autorización amplia para que él y sus hermanos hagan con la plata y el oro lo que quieran, bajo la norma de la voluntad de Dios.
  alternative_spanish_readings:
  - 'Ajustar la redacción al paralelo y decir: «lo que bien les parezca hacer con el resto de la plata y el oro»'
  rationale: Para 1 Esdras, el texto base es el griego; el paralelo semítico funciona como control, no como sustituto. Por eso se mantiene el alcance amplio de la cláusula griega y se deja la referencia a la voluntad divina como límite normativo.
  doctrine_reference: 'PHILOSOPHY.md: primacía de la fuente base de 1 Esdras con control de paralelos; Translation philosophy #1'
translation_notes:
  revision_awareness: 'El borrador sigue la revisión más reciente del audit trail: se mantiene la amplitud del griego («whatever you and your brothers wish») y se evita introducir la idea del «resto» que pertenece más al paralelo hebreo que a la redacción griega de 1 Esdras.'
  spanish_consistency_notes:
  - Se mantiene «plata y oro» sin artículo repetido en español, como en la revisión inglesa.
  - Se usa «tu Dios» para conservar la relación de posesión del original.
  - La frase «tú y tus hermanos» explicita en español el sujeto compartido que en griego aparece con μετὰ + genitivo.
