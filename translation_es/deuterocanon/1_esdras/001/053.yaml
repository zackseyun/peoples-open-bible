    text: La expresión también puede entenderse más literalmente como «hicieron inútil todo su esplendor» o «volvieron sin valor todo su esplendor».
    reason: lexical_alternative
  - marker: b
    text: «Con la espada» también puede entenderse en estrecha relación con la devastación anterior, con la idea de que los restantes fueron llevados bajo una conquista violenta; compárese el paralelo hebreo, que enfatiza la matanza por la espada.
    reason: alternative_reading
