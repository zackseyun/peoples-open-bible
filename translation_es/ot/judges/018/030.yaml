revisions:
- from: Entonces los hijos de Dan se hicieron la imagen tallada para sí, y Jonatán, hijo de Gersón, hijo de Moisés[a], él y sus hijos fueron sacerdotes para la tribu de los danitas hasta el día del cautiverio de la tierra.
  to: Entonces los hijos de Dan erigieron para sí la imagen tallada, y Jonatán, hijo de Gersón, hijo de Moisés[a], él y sus hijos fueron sacerdotes para la tribu de los danitas hasta el día del cautiverio de la tierra.
  rationale: Se reemplaza «se hicieron» por «erigieron» para reflejar con precisión el sentido de וַיָּקִימוּ (‘levantaron/instalaron’) y mejorar la naturalidad del español sin alterar la estructura ni las decisiones textuales del POB. Se conserva la nota sobre «Moisés/Manasés» y el resto del versículo por ser fieles al expediente fuente.
  reviewer_model: gpt-5.4
