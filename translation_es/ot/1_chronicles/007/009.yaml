    rationale: La expresión hebrea incluye no solo valentía sino también fuerza/capacidad. El inglés auditado preserva deliberadamente esa amplitud con «mighty men of valor». En español, «hombres valerosos» pierde el componente de poder o vigor.
  - severity: low
    issue: La nota [b] usa «Casas de los padres» en vez del texto exacto anclado
    rationale: El anclaje en el texto es «casas de sus padres[b]». Para consistencia formal, la nota debe reflejar esa misma expresión, aunque el sentido actual es correcto.
