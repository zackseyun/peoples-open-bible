translation:
  language: es
  text: Cíñete tu espada en tu muslo, guerrero poderoso[a], en tu esplendor y tu majestad[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Ciñe tu espada en tu muslo, poderoso».'
    reason: lexical_alternative
  - marker: b
    text: Los términos «esplendor» y «majestad» expresan magnificencia regia; también pueden entenderse en aposición al guerrero, es decir, «en tu esplendor y tu majestad».
    reason: alternative_reading
lexical_decisions:
- source_word: חֲגוֹר
  english_pob_choice: Strap ... on
  chosen_spanish: Cíñete ... sobre
  alternatives_spanish:
  - Ciñe ...
  - Ajusta ...
  lexicon: HALOT
  rationale: El imperativo de חגר pide una acción concreta de sujetar o ceñir un arma. «Cíñete» es el equivalente español más natural y digno para este mandato militar, y conserva la imagen de llevar la espada puesta al cuerpo.
- source_word: חַרְבְּךָ
  english_pob_choice: your sword
  chosen_spanish: tu espada
  alternatives_spanish:
  - la espada tuya
  - tu arma
  lexicon: HALOT
  rationale: El sufijo de segunda persona señala posesión directa. «Espada» es la correspondencia precisa y clara del hebreo.
- source_word: עַל יָרֵךְ
  english_pob_choice: on your thigh
  chosen_spanish: sobre tu muslo
  alternatives_spanish:
  - en tu muslo
  - junto a tu muslo
  lexicon: HALOT
  rationale: La imagen es espacial y concreta. «Sobre tu muslo» refleja de manera fiel la localización del arma sin suavizarla a una expresión más general como «a tu lado».
- source_word: גִּבּוֹר
  english_pob_choice: mighty warrior
  chosen_spanish: guerrero poderoso
  alternatives_spanish:
  - héroe poderoso
  - poderoso
  lexicon: HALOT
  rationale: El vocativo tiene tono marcial. «Guerrero poderoso» hace explícito el contexto bélico y mantiene el valor de גִּבּוֹר como figura fuerte y capaz en combate.
- source_word: הוֹדְךָ
  english_pob_choice: your splendor
  chosen_spanish: tu esplendor
  alternatives_spanish:
  - tu gloria
  - tu honor
  lexicon: HALOT
  rationale: הוֹד denota esplendor, majestad o gloria en lenguaje regio. «Esplendor» conserva el matiz de magnificencia sin confundirlo con el término paralelo siguiente.
- source_word: וַהֲדָרֶךָ
  english_pob_choice: and your majesty
  chosen_spanish: y tu majestad
  alternatives_spanish:
  - y tu grandeza
  - y tu honor
  lexicon: HALOT
  rationale: הָדָר expresa majestad, belleza o adorno regio. «Majestad» distingue bien el segundo miembro del paralelismo y preserva el tono elevado del poema.
theological_decisions:
- issue: Lectura real y posible lectura mesiánica
  english_pob_reading: Translate the verse as a direct address to a royal warrior without making the messianic identification explicit in the wording.
  chosen_spanish_reading: Traducir como un llamado directo a un guerrero regio, sin explicitar en el texto una identificación mesiánica.
  alternative_spanish_readings:
  - Traducirlo ya como referencia al Mesías
  - Introducir una glosa cristológica en la redacción
  rationale: El hebreo presenta primero una alocución poética a un rey/guerrero. La traducción española conserva ese sentido inmediato y deja la posible lectura mesiánica para notas o referencias canónicas, en vez de resolverla dentro del versículo.
  doctrine_reference: Preservar la tensión teológica sin resolverla artificialmente.
translation_notes:
  revision_awareness: Tomé en cuenta la revisión que prefirió reflejar la construcción hebrea con una relación más explícita que un simple apéndice final; por eso usé «en tu esplendor y tu majestad» para mantener la conexión sintáctica y el paralelismo del hebreo. También cuidé que las notas a y b estén ancladas en el texto principal.
  spanish_consistency_notes:
  - Se mantiene un registro bíblico moderno y digno, sin arcaísmos innecesarios.
  - «Guerrero poderoso» conserva el tono militar del vocativo sin introducir «héroe», que sería menos preciso aquí.
  - Se eligió «esplendor»/«majestad» para distinguir claramente los dos sustantivos poéticos.
  - Los marcadores de nota [a] y [b] aparecen exactamente en el texto principal, como exige la validación.
