base_translation:
  language: en
  yaml_path: translation/ot/2_kings/020/001.yaml
  text: 'In those days Hezekiah became sick and was at the point of death. And Isaiah the prophet[a], the son of Amoz, came to him and said to him, “Thus says Yahweh: Set your house in order, for you shall die; you shall not live.”'
  footnotes:
  - marker: a
    text: Or, more literally, “for you are dying” or “for you are dead”; the Hebrew expression announces certain, imminent death.
    reason: lexical_alternative
