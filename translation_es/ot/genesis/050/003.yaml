    text: Hebreo «Egipto», usado colectivamente por los egipcios.
    reason: lexical_alternative
  revision_rationale: Se corrige la sintaxis para que el español suene natural sin perder el sentido temporal del hebreo; se reemplaza 'lo lloró' por 'lloró por él' para reflejar mejor el uso idiomático de בכה con objeto; y se reubica la nota sobre 'Egipto' en el término correspondiente. También se pule la redacción de la nota alternativa.
