translation:
  language: es
  text: El nivel inferior[a] tenía cinco codos de ancho, el nivel medio seis codos de ancho, y el tercero siete codos de ancho; porque hizo rebajos[b] por todo el exterior del templo[c], para que las vigas no se introdujeran en los muros del templo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'piso' o 'nivel lateral' para la estructura lateral dispuesta en varios niveles alrededor del templo.
    reason: lexical_alternative
  - marker: b
    text: O 'retranqueos' o 'recesos' para este recurso arquitectónico en el muro.
    reason: lexical_alternative
  - marker: c
    text: Literalmente, 'la casa'. Aquí se refiere al edificio del templo.
    reason: source_note
lexical_decisions:
- source_word: היצוע
  english_pob_choice: story
  chosen_spanish: nivel
  alternatives_spanish:
  - planta
  - piso
  - estrato arquitectónico
  lexicon: HALOT
  rationale: En este contexto arquitectónico del templo, la estructura lateral se describe por niveles sucesivos. 'Nivel' comunica con claridad la progresión inferior/medio/tercero sin forzar un término demasiado técnico. 'Planta' o 'piso' son posibles, pero pueden sonar menos precisos en un edificio antiguo con disposición escalonada.
- source_word: הַתַּחְתֹּנָה
  english_pob_choice: the lowest
  chosen_spanish: inferior
  alternatives_spanish:
  - más bajo
  - de abajo
  - inferior
  lexicon: HALOT
  rationale: 'La serie del versículo es ascendente: inferior/medio/tercero. ''Inferior'' conserva bien el valor relacional y suena natural en español arquitectónico.'
- source_word: בָאַמָּה
  english_pob_choice: cubits
  chosen_spanish: codos
  alternatives_spanish:
  - en codos
  lexicon: HALOT
  rationale: Se conserva la unidad antigua de medida para mantener la correspondencia formal y la transparencia del dato textual, como en la base inglesa.
- source_word: רָחְבָּה
  english_pob_choice: wide
  chosen_spanish: de ancho
  alternatives_spanish:
  - ancho
  - en anchura
  lexicon: HALOT
  rationale: La forma predicativa hebrea se vierte de manera idiomática con 'de ancho', más natural que una paráfrasis como 'su anchura era de'.
- source_word: הַתִּיכֹנָה
  english_pob_choice: the middle one
  chosen_spanish: el nivel medio
  alternatives_spanish:
  - el medio
  - el segundo nivel
  lexicon: HALOT
  rationale: La referencia es al nivel arquitectónico intermedio; añadir 'nivel' evita ambigüedad en español y mantiene la repetición estructural del hebreo.
- source_word: הַשְּׁלִישִׁית
  english_pob_choice: the third
  chosen_spanish: el tercero
  alternatives_spanish:
  - el tercer nivel
  - la tercera
  lexicon: HALOT
  rationale: Se preserva la serie ordinal de los tres niveles. 'El tercero' funciona como sustantivación natural en español y mantiene la brevedad del hebreo.
- source_word: מִגְרָעוֹת
  english_pob_choice: offsets
  chosen_spanish: rebajos
  alternatives_spanish:
  - salientes
  - retranqueos
  - recesos
  lexicon: HALOT
  rationale: El término designa un recurso constructivo de retranqueo o rebaje en la obra. 'Rebajos' conserva la idea de un corte o disminución del muro que permite el apoyo sin empotrar la estructura. 'Salientes' invertiría la imagen; 'retranqueos' es posible, pero menos transparente aquí.
- source_word: נָתַן לַבַּיִת סָבִיב חוּצָה
  english_pob_choice: he made offsets around the outside of the temple
  chosen_spanish: hizo rebajos alrededor, por fuera de la casa
  alternatives_spanish:
  - dispuso rebajos alrededor, por fuera de la casa
  - hizo retranqueos alrededor, fuera de la casa
  lexicon: HALOT
  rationale: Se mantiene la sintaxis causal y arquitectónica del hebreo. 'La casa' reproduce el término del original para el edificio sagrado sin imponer aquí la explicación interpretativa 'templo' en el texto principal, aunque el contexto lo implique.
- source_word: לְבִלְתִּי אֲחֹז
  english_pob_choice: so that the beams would not be inserted
  chosen_spanish: para que las vigas no se introdujeran
  alternatives_spanish:
  - para no empotrarse
  - de modo que no se afianzaran
  lexicon: HALOT
  rationale: El infinitivo de propósito expresa que la estructura lateral no debía fijarse en las paredes. En español, 'no se introdujeran' conserva la imagen de inserción; 'se afianzaran' explicita la función, pero con menos cercanía al hebreo.
- source_word: בְּקִירוֹת הַבָּיִת
  english_pob_choice: into the walls of the temple
  chosen_spanish: en las paredes de la casa
  alternatives_spanish:
  - en los muros de la casa
  - en las paredes del templo
  lexicon: HALOT
  rationale: '''Paredes'' es un equivalente comprensible y fiel para קירות. Se conserva ''casa'' como en el hebreo; la identificación con el templo queda por el contexto inmediato, sin sustituir el término del original.'
theological_decisions:
- issue: 'Cómo nombrar el edificio principal: ''casa'' o ''templo'''
  english_pob_reading: The English POB clarifies 'temple' in its main text for הבית in context, while noting the literal 'house' in a footnote-style rationale.
  chosen_spanish_reading: casa en el texto principal, con sentido contextual de la casa del Yahvé
  alternative_spanish_readings:
  - templo
  - casa del templo
  - casa de Yahvé
  rationale: El hebreo dice literalmente 'casa'. Para no borrar el dato lexical ni crear una equivalencia más interpretativa que el original, el texto principal conserva 'casa'. El contexto cultual deja claro que se trata del santuario. En español, esto mantiene la tensión textual que la POB inglesa también documenta entre literalidad y clarificación contextual.
  doctrine_reference: 1 Reyes 6:6; uso contextual de הבית en narrativa del templo
- issue: Sentido de מִגְרָעוֹת y función de la estructura lateral
  english_pob_reading: offsets/recesses around the outside of the temple, so that the beams would not be inserted into the walls.
  chosen_spanish_reading: rebajos alrededor, por fuera de la casa, para que las vigas no se introdujeran en las paredes
  alternative_spanish_readings:
  - retranqueos alrededor
  - salientes/rebajes
  - nichos o recesos
  rationale: 'La POB inglesa conserva la ambigüedad arquitectónica con ''offsets'' y la nota sobre ''ledges'' o ''recesses''. En español, ''rebajos'' mantiene esa noción de rebaje sin decidir de forma excesiva entre todas las opciones. La cláusula final sigue la función: impedir que las vigas se empotren en el muro.'
  doctrine_reference: 1 Reyes 6:6; nota lexical de la POB inglesa sobre el recurso arquitectónico
- issue: Expresión del propósito con לְבִלְתִּי אֲחֹז
  english_pob_reading: so that the beams would not be inserted / not take hold in the walls.
  chosen_spanish_reading: para que las vigas no se introdujeran
  alternative_spanish_readings:
  - para que no agarraran
  - para que no se afianzaran
  - para que no se empotraran
  rationale: La lectura inglesa explicita el propósito técnico. En español, 'introdujeran' mantiene la imagen de inserción; no se fuerza una solución doctrinal, solo una aclaración arquitectónica coherente con el original.
  doctrine_reference: 1 Reyes 6:6; nota lexical inglesa sobre l'בלתי אחז
translation_notes:
  revision_awareness: El pasaje coincide sustancialmente con la base inglesa POB y la revisión más reciente no introdujo cambios. He mantenido la misma estructura de tres niveles, la misma relación causal y la misma solución lexical para el recurso arquitectónico, pero en español he preservado de forma más visible la literalidad de 'casa' allí donde el inglés aclara 'temple'.
  spanish_consistency_notes:
  - Se conserva la progresión 'inferior / medio / tercero' para reflejar el paralelismo del hebreo.
  - '''Casa'' se mantiene como término base del hebreo, sin ocultar su referencia cultual en el contexto.'
  - '''Rebajos'' comunica el valor arquitectónico de מִגְרָעוֹת sin cerrar indebidamente el rango semántico.'
  - La cláusula final expresa propósito técnico, no una interpretación doctrinal adicional.
