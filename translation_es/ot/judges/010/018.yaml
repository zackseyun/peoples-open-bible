translation:
  language: es
  text: 'Y el pueblo, los jefes de Galaad, se decían unos a otros[a]: «¿Quién es el hombre que comenzará a pelear contra los hijos de Amón? Él será cabeza sobre todos los habitantes de Galaad».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «cada hombre a su compañero».'
    reason: lexical_alternative
lexical_decisions:
- source_word: הָעָם שָׂרֵי גִלְעָד
  english_pob_choice: the people, the leaders of Gilead
  chosen_spanish: el pueblo, los jefes de Galaad
  alternatives_spanish:
  - el pueblo de los jefes de Galaad
  - los jefes de Galaad
  lexicon: HALOT
  rationale: 'Conservo en español la yuxtaposición apposicional del hebreo: no solo “los jefes de Galaad”, sino también “el pueblo”. “Jefes” comunica bien שָׂרֵי como término de liderazgo sin imponer una terminología eclesiástica o monárquica más fuerte de lo que exige el contexto.'
- source_word: אִישׁ אֶל רֵעֵהוּ
  english_pob_choice: to one another
  chosen_spanish: unos a otros
  alternatives_spanish:
  - cada uno a su compañero
  - uno al otro
  lexicon: HALOT
  rationale: La expresión hebrea es distributiva y recíproca. “Unos a otros” transmite esa reciprocidad de manera natural en español, sin perder el matiz de conversación dentro del grupo.
- source_word: מִי הָאִישׁ
  english_pob_choice: Who is the man
  chosen_spanish: ¿Quién es el hombre?
  alternatives_spanish:
  - ¿Quién es el varón?
  - ¿Quién es el que?
  lexicon: HALOT
  rationale: Mantengo el sustantivo masculino explícito porque el hebreo dice אִישׁ y el contexto trata de la selección de un líder militar concreto. “Hombre” es claro y contemporáneo, sin neutralizar el rasgo gramatical del original.
- source_word: יָחֵל
  english_pob_choice: will begin
  chosen_spanish: comenzará
  alternatives_spanish:
  - iniciará
  - empezará
  lexicon: HALOT
  rationale: El hifil de חלל aquí tiene el sentido de iniciar o comenzar. “Comenzará” es la equivalencia más natural y directa en español para este uso prospectivo.
- source_word: לְהִלָּחֵם
  english_pob_choice: to fight
  chosen_spanish: pelear
  alternatives_spanish:
  - combatir
  - luchar
  lexicon: HALOT
  rationale: “Pelear” es la opción más directa y idiomática en español para el sentido militar del infinitivo. Evita una solemnidad innecesaria y conserva el valor de acción bélica del verbo.
- source_word: בִּבְנֵי עַמּוֹן
  english_pob_choice: the sons of Ammon
  chosen_spanish: los hijos de Amón
  alternatives_spanish:
  - los hijos de Amón
  - los amonitas
  lexicon: HALOT
  rationale: Sigo el giro más cercano al hebreo (“hijos de Amón”) en lugar de sustituirlo por el etnónimo habitual. Así se preserva la correspondencia lexical preferida por el texto fuente y su audit trail.
- source_word: יִהְיֶה לְרֹאשׁ
  english_pob_choice: He shall become head
  chosen_spanish: será cabeza
  alternatives_spanish:
  - llegará a ser cabeza
  - será jefe
  lexicon: HALOT
  rationale: “Cabeza” reproduce bien la metáfora de liderazgo de רֹאשׁ. Opto por “será” para expresar el resultado futuro en un español fluido, sin añadir una perífrasis que el hebreo no requiere.
- source_word: לְכֹל יֹשְׁבֵי גִלְעָד
  english_pob_choice: over all the inhabitants of Gilead
  chosen_spanish: sobre todos los habitantes de Galaad
  alternatives_spanish:
  - sobre todos los que habitan Galaad
  - sobre toda la población de Galaad
  lexicon: HALOT
  rationale: “Habitantes” es el equivalente claro y estándar para יֹשְׁבֵי. “Sobre” conserva la idea de autoridad/primacía resultante en el contexto.
theological_decisions:
- issue: Mantenimiento del sustantivo masculino en la pregunta de elección de líder
  english_pob_reading: Retain 'the man' in the main text
  chosen_spanish_reading: Retener “el hombre” en el texto principal
  alternative_spanish_readings:
  - “la persona”
  - “el que”
  rationale: El hebreo usa explícitamente אִישׁ, y el contexto es la búsqueda de un líder militar varón. En español, “el hombre” preserva esa explicitud sin introducir una interpretación neutralizante que borre el rasgo del original.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4
translation_notes:
  revision_awareness: El texto español sigue el ajuste final del audit trail al mantener “los hijos de Amón” en vez de “amonitas”, para una correspondencia lexical más cercana al hebreo. También conserva la lectura apposicional de “el pueblo, los jefes de Galaad”, y la fórmula masculina explícita “el hombre” conforme a la decisión teológica auditada.
  spanish_consistency_notes:
  - Usé “Yahvé” como convención del proyecto solo cuando aparece el Tetragrámaton; este versículo no lo contiene.
  - “Galaad” y “Amón” se mantuvieron como topónimos/etnónimo usuales en español bíblico.
  - La puntuación con comillas angulares y el orden sintáctico buscan una lectura pública natural sin desplazar el paralelismo del hebreo.
