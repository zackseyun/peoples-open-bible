    reason: lexical_alternative
  revision_rationale: Se corrige el referente del pronombre final para que apunte a la descendencia y no a Rebeca, en línea con el hebreo y la revisión inglesa final. También se sustituye «miles de miríadas» por una formulación más literal de לְאַלְפֵי רְבָבָה en el texto principal, dejando «miríadas» como alternativa en nota. Se pulen las notas para mantener fidelidad y buen español.
