lexical_decisions:
- source_word: וְאֵלֶּה
  english_pob_choice: And these are
  chosen_spanish: Y estos son
  alternatives_spanish:
  - Estos son
  - Y estos
  lexicon: HALOT
  rationale: La conjunción וְ conserva la continuidad del listado anterior, y אֵלֶּה introduce identificación. «Y estos son» mantiene el enlace discursivo y la estructura hebrea sin sonar forzado en español.
- source_word: שְׁמוֹת
  english_pob_choice: the names of
  chosen_spanish: los nombres de
  alternatives_spanish:
  - los nombres
  - nombres de
  lexicon: HALOT
  rationale: El constructo hebreo con el sustantivo siguiente pide una relación posesiva/explicativa. En español, «los nombres de» reproduce con naturalidad la función introductoria del encabezado.
- source_word: הָאֲנָשִׁים
  english_pob_choice: the men
  chosen_spanish: los hombres
  alternatives_spanish:
  - las personas
  - la gente
  lexicon: HALOT
  rationale: אֲנָשִׁים es masculino plural y aquí se refiere a representantes varones concretos. «Los hombres» es la correspondencia más directa y precisa.
- source_word: לְמַטֵּה
  english_pob_choice: for the tribe of
  chosen_spanish: para la tribu de
  alternatives_spanish:
  - perteneciente a la tribu de
  - de la tribu de
  lexicon: HALOT
  rationale: En contexto de repartición tribal, מַטֶּה significa «tribu» y no el sentido literal de «vara». La preposición ל indica asignación o representación; «para la tribu de» conserva ese matiz.
- source_word: יְהוּדָה
  english_pob_choice: Judah
  chosen_spanish: Judá
  alternatives_spanish:
  - Judah
  lexicon: HALOT
  rationale: Nombre propio tribal estándar en español bíblico.
- source_word: כָּלֵב
  english_pob_choice: Caleb
  chosen_spanish: Caleb
  alternatives_spanish:
  - Kaleb
  lexicon: HALOT
  rationale: Transliteración estable del nombre propio.
- source_word: בֶּן
  english_pob_choice: son of
  chosen_spanish: hijo de
  alternatives_spanish:
  - el hijo de
  lexicon: HALOT
  rationale: La construcción patronímica hebrea se expresa de manera natural y fiel con «hijo de» en español.
- source_word: יְפֻנֶּה
  english_pob_choice: Jephunneh
  chosen_spanish: Jefone
  alternatives_spanish:
  - Jefone
  - Jephunneh
  lexicon: HALOT
  rationale: Se elige una forma castellana tradicional y legible del nombre propio, manteniendo la identificación del personaje sin introducir una transliteración rígida.
