review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español sigue de cerca el hebreo y el rastro auditado de la POB: mantiene la secuencia narrativa, la fuerza representativa de «el filisteo», el sentido degradante de עֲבָדִים como «esclavos», y el masculino singular de אִישׁ como «un hombre». Sin embargo, dos notas no corresponden bien al texto ni a las alternativas preservadas en la auditoría inglesa: [a] anota una variación inexistente/redundante, y [b] explica «para ustedes» en lugar de conservar la alternativa léxica relevante para לַעֲרֹךְ מִלְחָמָה.'
  spanish_quality_summary: El español es claro y digno, pero «llamó a las líneas de batalla» suena menos natural que «clamó a las líneas de batalla» o «llamó a gritos». Además, «a ordenarse para la batalla» resulta algo forzado; «a alinearse para la batalla» suena más idiomático y sigue preservando la imagen de formación militar. La nota [a] debe eliminarse, y conviene reubicar la nota alternativa al sintagma de batalla, como en la POB inglesa.
  glossary_alignment: 'Buena alineación con las políticas del proyecto: no hay nombres divinos en juego; «esclavos» refleja correctamente la preferencia por lenguaje de sujeción fuerte en contexto insultante; «un hombre» conserva el masculino explícito; «el filisteo» preserva el valor representativo del artículo definido. La revisión propuesta mejora naturalidad sin apartarse de la evidencia fuente.'
  issues:
  - severity: medium
    issue: La nota [a] no aporta una alternativa significativa y no corresponde a una necesidad del texto.
    rationale: El inglés auditado solo marca «said to them» como formulación base, no como alternativa a preservar. En español, «y les dijo» ya es completamente natural; anotar «O “les dijo”» es redundante y confuso.
  - severity: medium
    issue: La nota [b] está anclada a «un hombre», pero la alternativa auditada relevante estaba en לַעֲרֹךְ מִלְחָמָה, no en בְּרוּ לָכֶם אִישׁ.
    rationale: La POB inglesa preserva una alternativa para la expresión de formación militar («draw up for battle»), mientras que la nota española actual comenta «para ustedes», que no constituye una alternativa textual útil aquí.
  - severity: low
    issue: «Llamó a las líneas de batalla» y «a ordenarse para la batalla» son comprensibles, pero algo rígidos en español.
    rationale: La combinación verbal y el infinitivo reflexivo suenan menos naturales en español contemporáneo. «Clamó a las líneas de batalla» y «a alinearse para la batalla» comunican mejor el desafío público y la imagen militar.
  revised_spanish_text: 'Se puso de pie y clamó a las líneas de batalla de Israel, y les dijo: «¿Por qué salen a alinearse[a] para la batalla? ¿No soy yo el filisteo, y no son ustedes esclavos de Saúl? Escojan para ustedes un hombre, y que baje hacia mí».'
  revised_footnotes:
