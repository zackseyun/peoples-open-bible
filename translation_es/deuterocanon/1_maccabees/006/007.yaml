translation:
  language: es
  text: y derribaron la abominación[a] que él había construido sobre el altar en Jerusalén, y rodearon el santuario, como antes, con muros altos, y también Bet-sur[b], su ciudad.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «la cosa detestable». El griego dice «la abominación», término con carga cultual para algo ofensivo en el culto.
    reason: lexical_alternative
  - marker: b
    text: La frase «Bet-sur, su ciudad» está comprimida en griego. «Su» probablemente se refiere a Judas en el contexto narrativo; algunos podrían entenderlo de modo más general como una ciudad bajo su control.
    reason: alternative_reading
lexical_decisions:
- source_word: καθεῖλαν
  english_pob_choice: they tore down
  chosen_spanish: derribaron
  alternatives_spanish:
  - tiraron abajo
  - demolieron
  lexicon: LSJ
  rationale: El aoristo de καθαιρέω expresa la remoción violenta de una instalación o estructura. «Derribaron» es natural en español y conserva la acción física en un registro digno.
- source_word: τὸ βδέλυγμα
  english_pob_choice: the abomination
  chosen_spanish: la abominación
  alternatives_spanish:
  - la cosa detestable
  - el objeto detestable
  lexicon: LSJ
  rationale: βδέλυγμα tiene fuerza cultual y polémica. «Abominación» conserva ese peso sin ampliar indebidamente a una fórmula tradicional no presente en el griego.
- source_word: ᾠκοδόμησεν
  english_pob_choice: had built
  chosen_spanish: había construido
  alternatives_spanish:
  - había edificado
  - había levantado
  lexicon: LSJ
  rationale: El verbo es literalmente «construir/edificar». «Había construido» sigue de cerca el valor verbal y encaja con el contexto narrativo en pasado previo.
- source_word: ἐπὶ τὸ θυσιαστήριον
  english_pob_choice: upon the altar
  chosen_spanish: sobre el altar
  alternatives_spanish:
  - encima del altar
  lexicon: LSJ
  rationale: ἐπί con acusativo marca posición encima o sobre. «Sobre» es la forma más natural en español y mantiene la relación espacial con el altar.
- source_word: τὸ ἁγίασμα
  english_pob_choice: the sanctuary
  chosen_spanish: el santuario
  alternatives_spanish:
  - el lugar santo
  - el recinto santo
  lexicon: LSJ
  rationale: En este contexto del templo, ἁγίασμα se refiere al recinto sagrado. «Santuario» es idiomático y preciso en español.
- source_word: καθὼς τὸ πρότερον
  english_pob_choice: as before
  chosen_spanish: como antes
  alternatives_spanish:
  - como anteriormente
  - como en otro tiempo
  lexicon: LSJ
  rationale: La frase indica restauración a un estado previo. «Como antes» es claro, breve y fiel.
- source_word: ἐκύκλωσαν τείχεσιν ὑψηλοῖς
  english_pob_choice: they surrounded ... with high walls
  chosen_spanish: rodearon ... con muros altos
  alternatives_spanish:
  - cercaron ... con altos muros
  - lo fortificaron con muros altos
  lexicon: LSJ
  rationale: ἐκύκλωσαν significa rodear/encerrar. «Rodearon con muros altos» conserva el sentido sin introducir una interpretación más técnica de fortificación.
- source_word: τὴν Βεθσουρὰ πόλιν αὐτοῦ
  english_pob_choice: also Bethsura, his city
  chosen_spanish: y también Bet-sur, su ciudad
  alternatives_spanish:
  - y Bet-sur, su ciudad
  - y la ciudad de Bet-sur, suya
  lexicon: LSJ
  rationale: La frase griega es comprimida. Mantener «su ciudad» conserva la posesión/relación expresada por αὐτοῦ sin resolverla artificialmente; «y también» refleja que se añade otro objeto a la acción anterior.
theological_decisions:
- issue: βδέλυγμα como término cultual ofensivo
  english_pob_reading: the abomination
  chosen_spanish_reading: la abominación
  alternative_spanish_readings:
  - la cosa detestable
  - el objeto detestable
  rationale: El término tiene una carga cultual y polémica reconocible en el uso bíblico. «Abominación» preserva esa densidad sin importar una expresión más extensa que no está en el texto.
  doctrine_reference: Principio de primacía del texto original; mantener fuerza cultual sin expansión interpretativa.
- issue: αὐτοῦ en la frase final
  english_pob_reading: his city
  chosen_spanish_reading: su ciudad
  alternative_spanish_readings:
  - la ciudad de él
  - su ciudadela
  rationale: El posesivo queda en el texto como una relación gramatical real, aunque el antecedente exacto sea narrativamente comprimido. «Su ciudad» mantiene la ambigüedad documentada sin resolverla de más.
  doctrine_reference: Respeto por la ambigüedad textual y por la economía del griego.
translation_notes:
  revision_awareness: 'El borrador sigue el estado más reciente del expediente: el control de revisión indica alta concordancia y sin cambios necesarios. Se mantiene la estructura y la carga cultual del griego, con una solución española directa y publicable.'
  spanish_consistency_notes:
  - Se usó «Yahvé» solo cuando aparece el nombre divino; aquí no aplica.
  - Se evitó «SEÑOR» porque el versículo no contiene el Tetragrámaton.
  - Se mantuvo «santuario» para ἁγίασμα y «abominación» para βδέλυγμα conforme al audit trail.
  - Se conservó la posesión ambigua en «su ciudad» para reflejar αὐτοῦ sin sobreinterpretación.
