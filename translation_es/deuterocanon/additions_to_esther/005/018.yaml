translation:
  language: es
  text: porque el mismo hombre que había realizado estas cosas fue crucificado[a] en la puerta de Susa, junto con toda su casa, ya que Dios, que gobierna sobre todo, le dio rápidamente el juicio que merecía,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «fue empalado» o «fue colgado en un madero». El verbo griego puede indicar ejecución en una estaca o en una cruz; el método persa exacto no tiene por qué coincidir con la crucifixión romana posterior.
    reason: lexical_alternative
lexical_decisions:
- source_word: διὰ τὸ
  english_pob_choice: because
  chosen_spanish: porque
  alternatives_spanish:
  - pues
  - ya que
  lexicon: LSJ
  rationale: La partícula causal introduce la razón de la afirmación anterior; «porque» es natural en español y conserva la fuerza explicativa del griego sin añadir matices no presentes.
- source_word: αὐτὸν τὸν ταῦτα ἐξεργασάμενον
  english_pob_choice: the very man who had brought about these things
  chosen_spanish: el mismo hombre que había realizado estas cosas
  alternatives_spanish:
  - ese mismo hombre que había hecho estas cosas
  - el propio hombre que había llevado a cabo estas cosas
  lexicon: LSJ
  rationale: Se conserva el énfasis de αὐτόν con «el mismo hombre». ἐξεργάζομαι aquí expresa haber llevado a cabo o producido una acción concreta; «había realizado estas cosas» mantiene la referencia sin sobredeterminar el tipo de obra.
- source_word: πρὸς ταῖς Σούσων πύλαις
  english_pob_choice: at the gate of Susa
  chosen_spanish: en la puerta de Susa
  alternatives_spanish:
  - junto a las puertas de Susa
  - cerca de las puertas de Susa
  lexicon: LSJ
  rationale: La preposición con dativo señala localización en torno a la puerta; en español fluye mejor el singular «la puerta de Susa», manteniendo la escena urbana del original.
- source_word: ἐσταυρῶσθαι
  english_pob_choice: was crucified
  chosen_spanish: fue crucificado[a]
  alternatives_spanish:
  - fue empalado
  - fue colgado en un madero
  lexicon: LSJ
  rationale: Se conserva la forma más directa y reconocible del verbo. La nota mantiene la amplitud semántica histórica del griego, que puede abarcar ejecución por estaca o cruz y no exige identificar el método persa exacto con la crucifixión romana.
- source_word: σὺν τῇ πανοικίᾳ
  english_pob_choice: with his whole household
  chosen_spanish: junto con toda su casa
  alternatives_spanish:
  - con toda su familia
  - junto con todo su hogar
  lexicon: LSJ
  rationale: πανοικία abarca la totalidad de la casa/entorno doméstico, no solo la familia nuclear; «toda su casa» es natural en español bíblico y preserva esa amplitud.
- source_word: τὴν καταξίαν
  english_pob_choice: the judgment he deserved
  chosen_spanish: el juicio que merecía
  alternatives_spanish:
  - la justa retribución que merecía
  - el castigo que merecía
  lexicon: LSJ
  rationale: El sustantivo expresa lo adecuado o merecido; en este contexto judicial, «el juicio que merecía» sigue de cerca la revisión inglesa y conserva el matiz formal de κρίσις sin reducirlo solo a castigo.
- source_word: τοῦ τὰ πάντα ἐπικρατοῦντος θεοῦ
  english_pob_choice: God, who rules over all
  chosen_spanish: de Dios, que gobierna sobre todo
  alternatives_spanish:
  - de Dios, que domina sobre todo
  - de Dios, que tiene poder sobre todas las cosas
  lexicon: LSJ
  rationale: ἐπικρατέω comunica dominio o gobierno efectivo. «Que gobierna sobre todo» expresa la soberanía divina de modo claro y reverente, sin introducir una formulación eclesiástica fija que no está en el griego.
- source_word: διὰ τάχους
  english_pob_choice: swiftly
  chosen_spanish: rápidamente
  alternatives_spanish:
  - con rapidez
  - pronto
  lexicon: LSJ
  rationale: El adverbio de rapidez se expresa de forma directa y natural en español con «rápidamente», conservando la urgencia del acto divino.
- source_word: ἀποδόντος αὐτῷ κρίσιν
  english_pob_choice: repaid him with the judgment he deserved
  chosen_spanish: recibiendo ... el juicio que merecía
  alternatives_spanish:
  - devolviéndole el juicio
  - pagándole con juicio
  lexicon: LSJ
  rationale: ἀποδίδωμι + κρίσις comunica retribución judicial. En español, «recibiendo ... el juicio que merecía» preserva la idea de retribución y se integra con naturalidad en la oración, evitando duplicar sin necesidad la imagen de pago o recompensa.
theological_decisions:
- issue: Atribución de la retribución a Dios
  english_pob_reading: God is presented as actively and swiftly repaying the offender with deserved judgment.
  chosen_spanish_reading: Dios aparece como quien activa y rápidamente concede el juicio merecido.
  alternative_spanish_readings:
  - Dios le paga con juicio merecido.
  - Dios lo castiga directamente.
  rationale: El sintagma griego atribuye la retribución a Dios; la redacción española mantiene esa agencia divina sin ampliar el texto hacia una doctrina más amplia de providencia o castigo que el versículo no desarrolla explícitamente.
  doctrine_reference: Mantener la tensión teológica documentada por el original; primacía del lenguaje fuente sobre la tradición de traducción.
translation_notes:
  revision_awareness: La base inglesa fue revisada para reflejar con mayor precisión κρίσιν como ‘judgment’ en lugar de ‘punishment’. La versión española sigue esa revisión con «el juicio que merecía» y conserva la causalidad, el énfasis en «el mismo hombre», la localización en la puerta de Susa y la atribución directa a Dios como gobernante de todo.
  spanish_consistency_notes:
  - Se usó «Dios» para θεός conforme al estándar del proyecto.
  - Se mantuvo «juicio» para κρίσις y «merecía» para la idea de retribución debida.
  - «Toda su casa» conserva la amplitud de πανοικία mejor que una reducción a «familia».
  - Se evitó reemplazar el verbo de ejecución por un término más interpretativo en el texto principal; la alternativa queda en nota.
