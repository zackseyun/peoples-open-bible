translation:
  language: es
  text: 'Porque muchos del pueblo, muchos de Efraín y Manasés, de Isacar y Zabulón, no se habían purificado; sin embargo, comieron la Pascua no conforme a lo escrito[a]. Pero Ezequías oró por ellos, diciendo: «Yahvé, que es bueno, haga expiación por ellos[b]—»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literalmente, «no según lo escrito».
    reason: lexical_alternative
  - marker: b
    text: La oración continúa en el versículo 19; el hebreo termina con una frase incompleta aquí.
    reason: cross_reference
lexical_decisions:
- source_word: מַרְבִּית הָעָם / רַבַּת
  english_pob_choice: a great many of the people / many
  chosen_spanish: la mayoría del pueblo / muchos
  alternatives_spanish:
  - una gran multitud del pueblo
  - muchísimos del pueblo
  lexicon: HALOT
  rationale: La expresión hebrea indica una porción numerosa del pueblo, y la apposición intensifica esa idea. En español, «la mayoría» comunica el carácter partitivo y numeroso sin forzar una afirmación matemática absoluta; «muchos» preserva la intensificación.
- source_word: מֵאֶפְרַיִם וּמְנַשֶּׁה יִשָּׂשכָר וּזְבֻלוּן
  english_pob_choice: from Ephraim and Manasseh, Issachar and Zebulun
  chosen_spanish: de Efraín y de Manasés, de Isacar y de Zabulón
  alternatives_spanish:
  - de Efraín, Manasés, Isacar y Zabulón
  lexicon: HALOT
  rationale: Se conservan los nombres tribales con transliteración española estable y se respeta el orden del hebreo. Las preposiciones repetidas ayudan a la claridad en español y no alteran el contenido.
- source_word: לֹא הִטֶּהָרוּ
  english_pob_choice: had not purified themselves
  chosen_spanish: no se habían purificado
  alternatives_spanish:
  - no estaban purificados
  - no se habían limpiado ritualmente
  lexicon: HALOT
  rationale: El hitpael de טהר es reflexivo y en este contexto es ritual/cultual. «Se habían purificado» mantiene el valor reflexivo y el ámbito de pureza ritual; la forma compuesta en español expresa bien el estado anterior al comer la Pascua.
- source_word: אֶת הַפֶּסַח
  english_pob_choice: the Passover
  chosen_spanish: el Pésaj
  alternatives_spanish:
  - la Pascua
  - el sacrificio de la Pascua
  lexicon: HALOT
  rationale: Aquí el término hebreo nombra la observancia/sacrificio pascual. Se conserva «Pésaj» para reflejar más de cerca el vocablo fuente y evitar que «Pascua» cargue automáticamente asociaciones litúrgicas posteriores; el contexto inmediato ya aclara que se trata de la comida pascual.
- source_word: בְּלֹא כַכָּתוּב
  english_pob_choice: otherwise than as it is written
  chosen_spanish: fuera de lo escrito
  alternatives_spanish:
  - no conforme a lo escrito
  - contrario a lo escrito
  lexicon: HALOT
  rationale: La frase hebrea significa no conforme a la norma escrita. «Fuera de lo escrito» es breve y natural en español, y mantiene la referencia a un mandato escrito sin ampliar el sentido.
- source_word: הִתְפַּלֵּל ... עֲלֵיהֶם
  english_pob_choice: prayed for them
  chosen_spanish: oró por ellos
  alternatives_spanish:
  - intercedió por ellos
  - rogó por ellos
  lexicon: HALOT
  rationale: La construcción indica oración en favor de otros. «Oró por ellos» es directa y fiel; «intercedió» sería posible, pero añade un matiz más técnico que el hebreo no exige.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  lexicon: HALOT
  rationale: 'Se sigue el estándar español del proyecto para el Tetragrámaton: «Yahvé», que preserva el nombre divino y evita la sustitución por un título.'
- source_word: הַטּוֹב
  english_pob_choice: who is good
  chosen_spanish: el bueno
  alternatives_spanish:
  - el que es bueno
  - el bondadoso
  lexicon: HALOT
  rationale: El adjetivo funciona de manera predicativa/appositiva con el nombre divino. «El bueno» es compacto y reproduce esa cualidad como apelativo, sin convertirlo en un título doctrinal ajeno al hebreo.
- source_word: יְכַפֵּר
  english_pob_choice: make atonement
  chosen_spanish: haga expiación
  alternatives_spanish:
  - haga expiación por
  - cubra en expiación
  lexicon: HALOT
  rationale: En contexto pascual y de purificación, el verbo conserva su sentido cultual de expiación. «Haga expiación» mantiene el peso teológico sin sustituirlo por «perdone», que sería más interpretativo.
- source_word: בְּעַד
  english_pob_choice: for them
  chosen_spanish: por ellos
  alternatives_spanish:
  - a favor de ellos
  - en favor de ellos
  lexicon: HALOT
  rationale: La preposición expresa acción en beneficio o en lugar de otros. En español, «por ellos» es la forma más natural y coincide con el valor intercesor del pasaje.
theological_decisions:
- issue: Nombre divino יְהוָה en un contexto de oración de Ezequías
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: El texto hebreo usa directamente el Tetragrámaton. Se mantiene «Yahvé» conforme al estándar del proyecto para preservar el nombre pactual sin enmascararlo como título.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Lenguaje de כפר en contexto pascual y de pureza
  english_pob_reading: make atonement
  chosen_spanish_reading: haga expiación
  alternative_spanish_readings:
  - haga atonación
  - perdone
  rationale: 'El contexto inmediato es cultual: Pascua, purificación y una oración por la falta ritual. «Haga expiación» conserva esa densidad teológica y evita reducirlo a una simple idea de perdón.'
  doctrine_reference: 'DOCTRINE.md Translation philosophy #1, #3, #6'
translation_notes:
  revision_awareness: 'La redacción española sigue la revisión más reciente del POB en inglés en cuanto al referente plural de בְּעַד/עֲלֵיהֶם: se traduce «por ellos» y no con un singular ni con una ampliación como «por todos». También se conserva la incompletitud sintáctica al final del versículo con un guion largo, como en el audit trail inglés.'
  spanish_consistency_notes:
  - Se usó «Yahvé» de manera uniforme para יְהוָה, conforme al estándar del proyecto.
  - Se preservó «Pésaj» para el término pascual, manteniendo la distinción terminológica del hebreo.
  - «Haga expiación» conserva el valor cultual de כפר en lugar de suavizarlo con «perdone».
  - La puntuación con punto y coma y raya final refleja la frase hebrea incompleta que continúa en el versículo siguiente.
