translation:
  language: es
  text: Los hijos de Rubén y los gaditas y la media tribu de Manasés, hombres valientes[a], hombres que llevaban escudo y espada, que tensaban el arco[b] y que estaban entrenados para la guerra, eran cuarenta y cuatro mil setecientos sesenta[c], aptos para salir a la guerra.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'hombres poderosos' o 'hombres de valor' para 'hombres valientes'.
    reason: lexical_alternative
  - marker: b
    text: Literalmente, 'que doblaban/tensaban el arco', un modismo hebreo para tensar el arco a fin de disparar.
    reason: cultural_note
  - marker: c
    text: O 'aptos para el servicio militar' para 'aptos para salir a la guerra'.
    reason: lexical_alternative
lexical_decisions:
- source_word: בְּנֵי רְאוּבֵן
  english_pob_choice: The sons of Reuben
  chosen_spanish: los hijos de Rubén
  alternatives_spanish:
  - los rubenitas
  - los descendientes de Rubén
  lexicon: HALOT
  rationale: Conservo la relación de filiación explícita del hebreo בְּנֵי, que la POB inglesa también mantiene con 'sons of'. En español, 'hijos de' es transparente y fiel, mientras que 'rubenitas' suaviza esa forma de expresión.
- source_word: וְגָדִי
  english_pob_choice: and the Gadites
  chosen_spanish: y los gaditas
  alternatives_spanish:
  - y Gad
  - y los hijos de Gad
  lexicon: HALOT
  rationale: La forma gentilicia señala al grupo tribal de Gad. 'Los gaditas' es el equivalente natural y conserva el valor colectivo del inglés 'the Gadites'.
- source_word: וַחֲצִי שֵׁבֶט מְנַשֶּׁה
  english_pob_choice: and the half-tribe of Manasseh
  chosen_spanish: la media tribu de Manasés
  alternatives_spanish:
  - la mitad de la tribu de Manasés
  - y la semitribu de Manasés
  lexicon: HALOT
  rationale: '''Media tribu'' reproduce la construcción idiomática estándar para חֲצִי שֵׁבֶט y mantiene la referencia tribal clara. ''Semi-tribu'' sería menos natural en español bíblico actual.'
- source_word: מִן בְּנֵי חַיִל
  english_pob_choice: valiant men
  chosen_spanish: hombres valientes
  alternatives_spanish:
  - hombres poderosos
  - hombres de valor
  - guerreros valientes
  lexicon: HALOT
  rationale: El hebreo expresa un grupo caracterizado por חַיִל, y la POB lo vierte como 'valiant men'. 'Hombres valientes' preserva el tono de capacidad y valor sin introducir una traducción más interpretativa como 'guerreros'.
- source_word: נֹשְׂאֵי מָגֵן וְחֶרֶב
  english_pob_choice: who carried shield and sword
  chosen_spanish: que llevaban escudo y espada
  alternatives_spanish:
  - que portaban escudo y espada
  - que cargaban escudo y espada
  - armados con escudo y espada
  lexicon: HALOT
  rationale: נֹשְׂאֵי significa literalmente 'los que llevan/cargan'. 'Llevaban escudo y espada' mantiene la imaginería concreta de portar armas, como en la POB inglesa.
- source_word: וְדֹרְכֵי קֶשֶׁת
  english_pob_choice: who drew the bow
  chosen_spanish: que tensaban el arco
  alternatives_spanish:
  - que doblaban el arco
  - arqueros
  lexicon: HALOT
  rationale: Se conserva el modismo hebreo de 'pisar/tensar el arco' en vez de reducirlo a 'arqueros'. 'Tensaban el arco' es natural en español y refleja la acción descrita por el original y anotada en la POB.
- source_word: וּלְמוּדֵי מִלְחָמָה
  english_pob_choice: who were trained for war
  chosen_spanish: que estaban entrenados para la guerra
  alternatives_spanish:
  - entrenados en la guerra
  - experimentados en la guerra
  - enseñados para la guerra
  lexicon: HALOT
  rationale: לְמוּדֵי tiene sentido pasivo/resultativo, por lo que 'estaban entrenados' comunica bien el estado adquirido. 'Para la guerra' sigue el matiz funcional de la POB 'for war'.
- source_word: אַרְבָּעִים וְאַרְבָּעָה אֶלֶף וּשְׁבַע מֵאוֹת וְשִׁשִּׁים
  english_pob_choice: forty-four thousand seven hundred sixty
  chosen_spanish: cuarenta y cuatro mil setecientos sesenta
  alternatives_spanish:
  - '44.760'
  - cuarenta y cuatro mil setecientos y sesenta
  lexicon: HALOT
  rationale: Se expresa el número en palabras, como en el inglés POB, para una lectura corrida y digna. La forma sigue la numeración estándar del español.
- source_word: יֹצְאֵי צָבָא
  english_pob_choice: able to go out to war
  chosen_spanish: aptos para salir a la guerra
  alternatives_spanish:
  - aptos para el servicio militar
  - capaces de ir a la guerra
  - idóneos para salir a la batalla
  lexicon: HALOT
  rationale: La expresión militar hebrea se refiere a quienes están disponibles/capacitados para campaña. 'Aptos para salir a la guerra' conserva el movimiento idiomático de 'go out' sin perder claridad en español.
theological_decisions:
- issue: Traducción de la designación tribal y su valor colectivo
  english_pob_reading: The sons of Reuben and the Gadites and the half-tribe of Manasseh
  chosen_spanish_reading: Los hijos de Rubén y los gaditas y la media tribu de Manasés
  alternative_spanish_readings:
  - Los rubenitas y los gaditas y la media tribu de Manasés
  - Los descendientes de Rubén y los gaditas y la media tribu de Manasés
  rationale: 'No hay una cuestión doctrinal estrecha aquí, pero sí una decisión de lectura identitaria: el versículo enumera grupos tribales concretos. Mantengo la forma filial ''hijos de Rubén'' para no borrar la forma del hebreo, y ''gaditas'' para el grupo tribal, sin intentar armonizar todo en una etiqueta más libre.'
  doctrine_reference: No aplica; decisión de identidad tribal y fidelidad formal al texto.
translation_notes:
  revision_awareness: El pasaje coincide sustancialmente con la versión inglesa POB auditada; no se observan revisiones aplicadas en el registro de referencia. Se conservan las mismas opciones principales y las notas alternativas relevantes, adaptadas al español.
  spanish_consistency_notes:
  - Se usa 'Yahvé' como convención general del proyecto, pero este versículo no contiene el Tetragrámaton.
  - Se mantiene la forma tribal colectiva ('gaditas') y la filiación explícita ('hijos de Rubén') para conservar el paralelismo del hebreo.
  - '''Tensaban el arco'' preserva el modismo hebreo sin sustituirlo por el sustantivo ''arqueros'', tal como la POB inglesa evitó reducirlo a una mera categoría.'
