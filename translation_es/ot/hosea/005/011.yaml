review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien la estructura básica del hebreo: «Efraín» como nombre propio, los dos participios pasivos («oprimido», «aplastado»), la causal con «porque», y la idea volitiva de הוֹאִיל con «se propuso». También conserva adecuadamente el modismo הָלַךְ אַחֲרֵי como «andar tras». Sin embargo, la nota al pie está mal anclada y no preserva la principal alternativa documentada para צָו; además, el marcador [a] fue colocado en «oprimido» aunque la nota trata de «juicio».'
  spanish_quality_summary: El español es natural, claro y digno. «Oprimido, aplastado en juicio» suena bien en registro bíblico moderno. No obstante, «mandamiento» puede sonar demasiado asociado a mandamiento divino en español; «precepto» comunica mejor un mandato o norma sin implicar de entrada procedencia divina, y permite reflejar mejor la tensión interpretativa del hebreo y de la nota inglesa («command / human precept»).
  glossary_alignment: 'No hay conflicto con los términos de proyecto como Yahvé, Mesías, etc. La principal cuestión léxica es צָו: el audit trail inglés revisado usa «a command» y conserva en nota «after a command / after a human precept». En español conviene alinear con esa decisión mediante «un precepto» en el texto principal y una nota con «un mandamiento» / «un precepto humano».'
  issues:
  - severity: high
    issue: La nota al pie está anclada en la palabra equivocada.
    rationale: El marcador [a] aparece en «oprimido[a]», pero la nota discute מִשְׁפָּט («en sentencia» / «por juicio»). Esto rompe la disciplina de notas y confunde al lector.
  - severity: high
    issue: Falta la alternativa documentada principal para צָו.
    rationale: El POB inglés preserva explícitamente la dificultad de צָו con una nota sobre «command / human precept». El borrador español omite esa tensión en las notas y en cambio crea una nota nueva sobre מִשְׁפָּט, que no corresponde al audit trail principal.
  - severity: medium
    issue: «Mandamiento» puede sobreinterpretar la procedencia del mandato.
    rationale: En español bíblico, «mandamiento» suele evocar mandato divino. Dado que la racionalidad documentada deja abierta la posibilidad de «human precept», «precepto» es más neutral y fiel al expediente.
  revised_spanish_text: Efraín está oprimido, aplastado en juicio, porque se propuso andar tras un precepto[a].
  revised_footnotes:
  - marker: a
    text: 'O también: «tras un mandamiento» o «tras un precepto humano». El hebreo צָו es difícil y se ha entendido de más de una manera.'
    reason: alternative_reading
  revision_rationale: Se corrige el anclaje de la nota para que coincida con el término discutido en fuente y audit trail, y se restituye la alternativa principal documentada para צָו. Además, se ajusta «mandamiento» a «precepto» para evitar una implicación excesivamente divina y mantener en español una neutralidad más cercana al expediente léxico-teológico del POB.
