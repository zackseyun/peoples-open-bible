translation:
  language: es
  text: En cuanto al príncipe[a], porque él es el príncipe, podrá sentarse en ella para comer pan delante de Yahvé. Entrará por el camino del pórtico de la puerta, y saldrá por el mismo camino.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: "saldrá por el camino por donde entró". El hebreo dice literalmente: "de su camino saldrá", probablemente con el sentido del mismo trayecto que acaba de mencionarse.'
    reason: lexical_alternative
lexical_decisions:
- source_word: אֶת הַנָּשִׂיא
  english_pob_choice: As for the prince
  chosen_spanish: En cuanto al príncipe
  alternatives_spanish:
  - Pero en cuanto al príncipe
  - El príncipe
  lexicon: HALOT
  rationale: El marcador de objeto directo con el sustantivo definido introduce al personaje como tópico enfático; en español, 'En cuanto al príncipe' conserva mejor ese desplazamiento temático que un simple 'el príncipe'.
- source_word: נָשִׂיא
  english_pob_choice: prince
  chosen_spanish: príncipe
  alternatives_spanish:
  - líder
  - gobernante
  lexicon: HALOT
  rationale: En Ezequiel, נָשִׂיא designa al regente o príncipe reconocido. 'Príncipe' preserva el uso establecido del libro sin forzar una identificación mesiánica ni rebajar el título a un término genérico.
- source_word: נָשִׂיא הוּא
  english_pob_choice: because he is the prince
  chosen_spanish: porque él es el príncipe
  alternatives_spanish:
  - porque es el príncipe
  - él solo, como príncipe
  lexicon: HALOT
  rationale: La repetición del sustantivo con el pronombre aporta énfasis y razón. 'Porque él es el príncipe' conserva esa fuerza causal y enfática en español natural.
- source_word: יֵשֶׁב בּוֹ
  english_pob_choice: he may sit in it
  chosen_spanish: podrá sentarse allí
  alternatives_spanish:
  - se sentará allí
  - podrá sentarse en ella
  lexicon: HALOT
  rationale: El imperfecto expresa permiso o autorización en este contexto. 'Podrá sentarse allí' comunica la concesión con naturalidad; 'allí' remite al recinto de la puerta sin recargar el texto.
- source_word: לֶאֱכָל לֶחֶם
  english_pob_choice: to eat bread
  chosen_spanish: para comer pan
  alternatives_spanish:
  - para comer un pan
  - para tomar pan
  lexicon: HALOT
  rationale: Se conserva el hebraísmo literal 'comer pan', que en español sigue siendo inteligible y mantiene el tono formal y cultual del pasaje.
- source_word: לִפְנֵי יְהוָה
  english_pob_choice: before Yahweh
  chosen_spanish: delante de Yahvé
  alternatives_spanish:
  - en presencia de Yahvé
  lexicon: HALOT
  rationale: Se mantiene el nombre divino como 'Yahvé' según la pauta del proyecto; 'delante de' conserva el sentido espacial y litúrgico de la expresión hebrea.
- source_word: מִדֶּרֶךְ אֻלָם הַשַּׁעַר
  english_pob_choice: by way of the porch of the gate
  chosen_spanish: por el camino del pórtico de la puerta
  alternatives_spanish:
  - por el acceso del pórtico de la puerta
  - por el camino del vestíbulo de la puerta
  lexicon: HALOT
  rationale: אֻלָם se refiere a un pórtico o vestíbulo; 'pórtico de la puerta' es claro en español. 'Por el camino de' reproduce la idea direccional de מִדֶּרֶךְ.
- source_word: יָבֹוא
  english_pob_choice: He shall enter
  chosen_spanish: Entrará
  alternatives_spanish:
  - Deberá entrar
  - Ha de entrar
  lexicon: HALOT
  rationale: En contexto legal/instructivo, el imperfecto tiene valor directivo. 'Entrará' expresa la norma sin sonar arcaico.
- source_word: וּמִדַּרְכּוֹ יֵצֵא
  english_pob_choice: and shall go out by the same way
  chosen_spanish: y saldrá por el mismo camino
  alternatives_spanish:
  - y saldrá por el camino por donde entró
  - y saldrá por su camino
  lexicon: HALOT
  rationale: El sufijo de 'camino' remite al trayecto recién mencionado; 'el mismo camino' hace explícita la simetría procesal que el hebreo sugiere.
theological_decisions:
- issue: Identidad y estatus del נָשִׂיא en la visión del templo
  english_pob_reading: Render neutrally as 'the prince' without identifying him as the Messiah or as a merely secular official in the translation itself.
  chosen_spanish_reading: Traducir de manera neutral como 'el príncipe', sin identificarlo como Mesías ni como un funcionario puramente secular dentro del texto.
  alternative_spanish_readings:
  - un príncipe mesiánico
  - un gobernante davídico o civil distinto del Mesías
  rationale: El versículo concede un privilegio especial al príncipe, pero no resuelve por sí mismo los debates interpretativos más amplios sobre su identidad. La traducción conserva el título sin añadir una conclusión doctrinal no explícita en el pasaje.
  doctrine_reference: Afirmaciones; Filosofía de traducción §3
translation_notes:
  revision_awareness: La revisión más reciente indicó que no se requerían cambios; la presente propuesta conserva esa línea y ajusta únicamente la expresión al español natural, manteniendo el paralelismo del hebreo y la decisión léxica del POB en torno a 'príncipe', 'delante de Yahvé' y la salida por el mismo camino.
  spanish_consistency_notes:
  - Se usa 'Yahvé' según el estándar del proyecto, no 'SEÑOR'.
  - Se conserva 'príncipe' para נָשִׂיא conforme al uso técnico de Ezequiel.
  - '''Pan'' mantiene el hebraísmo de לֶחֶם, sin expandirlo a ''comida'' o ''banquete''.'
  - La nota al pie marca la alternativa verbal sin debilitar la lectura principal del texto.
