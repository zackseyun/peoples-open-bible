translation:
  language: es
  text: ¡Imítenme, hermanos —dijo—, en el potro[a]! No deserten[b] por abandonar la lucha cuando yo no la he abandonado, ni por causa de mí renuncien a la hermandad del valor. Lleven adelante la campaña santa y noble por la devoción a Dios[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «bajo tortura». El griego evoca específicamente el potro de tortura, por eso el texto principal conserva la imagen concreta.
    reason: lexical_alternative
  - marker: b
    text: O «se hagan desertores» o «abandonen las filas». El verbo tiene tono militar.
    reason: lexical_alternative
  - marker: c
    text: O «piedad». El griego εὐσέβεια es una virtud clave en 4 Macabeos y denota devoción fiel a Dios.
    reason: lexical_alternative
lexical_decisions:
- source_word: Μιμήσασθέ
  english_pob_choice: Imitate
  chosen_spanish: Imítenme
  alternatives_spanish:
  - Sigan mi ejemplo
  - Imítenme como ejemplo
  lexicon: LSJ
  rationale: El imperativo aoristo medio de μιμέομαι pide emulación directa. En español, «imítenme» conserva la fuerza exhortativa y la relación personal del mandato.
- source_word: στρεβλὰς
  english_pob_choice: on the rack
  chosen_spanish: en el potro
  alternatives_spanish:
  - bajo tortura
  - en el tormento
  lexicon: LSJ
  rationale: La imagen concreta remite al instrumento de tortura, no solo a sufrimiento genérico. «Potro» preserva esa concreción en español.
- source_word: ἀδελφοί
  english_pob_choice: brothers
  chosen_spanish: hermanos
  alternatives_spanish:
  - hermanos y hermanas
  - hermanos/as
  lexicon: LSJ
  rationale: El vocativo masculino plural corresponde a los hermanos literales del relato; «hermanos» conserva la dirección fraterna sin neutralizar indebidamente el texto.
- source_word: μὴ λειπὼν τὸν ἀγῶνα
  english_pob_choice: when I have not left the struggle
  chosen_spanish: cuando yo no la he abandonado
  alternatives_spanish:
  - cuando no he abandonado la lucha
  - puesto que no la he dejado
  lexicon: LSJ
  rationale: ἀγών aquí conserva el valor de lucha/contienda. En español, la cláusula temporal-causal se hace natural con «cuando yo no la he abandonado», manteniendo el contraste de perseverancia.
- source_word: λειποτακτήσητε
  english_pob_choice: desert
  chosen_spanish: deserten
  alternatives_spanish:
  - abandonen la fila
  - se retiren
  - abandonen la contienda
  lexicon: LSJ
  rationale: El verbo tiene tono militar de deserción. «Deserten» reproduce esa fuerza sin añadir un complemento que el griego no especifica.
- source_word: ἐξομόσησθέ
  english_pob_choice: renounce
  chosen_spanish: renuncien
  alternatives_spanish:
  - desconozcan
  - abjuren
  lexicon: LSJ
  rationale: El verbo implica repudiar o renegar bajo presión. «Renuncien» funciona en español como opción solemne y suficientemente amplia.
- source_word: τὴν τῆς εὐψυχίας ἀδελφότητα
  english_pob_choice: the brotherhood of courage
  chosen_spanish: la hermandad de la valentía
  alternatives_spanish:
  - la hermandad del valor
  - la fraternidad de la valentía
  lexicon: LSJ
  rationale: εὐψυχία expresa ánimo valiente ante la adversidad. «Hermandad de la valentía» conserva el vínculo fraternal y la cualidad moral compartida.
- source_word: στρατείαν στρατεύσασθε
  english_pob_choice: Wage the holy and noble campaign
  chosen_spanish: Emprendan la campaña santa y noble
  alternatives_spanish:
  - Lleven a cabo la campaña santa y noble
  - Sostengan la guerra santa y noble
  lexicon: LSJ
  rationale: El cognado noun-verb refuerza la metáfora militar. «Emprendan la campaña» mantiene el sentido de iniciar/participar activamente en la empresa bélica sin sobrecargar el español.
- source_word: ἱερὰν καὶ εὐγενῆ
  english_pob_choice: holy and noble
  chosen_spanish: santa y noble
  alternatives_spanish:
  - sagrada y noble
  - santa y honorable
  lexicon: LSJ
  rationale: «Santa» comunica la consagración religiosa de ἱεράν, y «noble» conserva la dignidad honorífica de εὐγενῆ.
- source_word: περὶ τῆς εὐσεβείας
  english_pob_choice: for godliness
  chosen_spanish: por la piedad
  alternatives_spanish:
  - por la devoción a Dios
  - por la reverencia a Dios
  lexicon: LSJ
  rationale: En 4 Macabeos εὐσέβεια es fidelidad reverente a Dios bajo persecución. «Piedad» mantiene el término clave, aunque puede sonar más amplio; se elige por su inteligibilidad eclesial.
theological_decisions:
- issue: εὐσέβεια como virtud martirial
  english_pob_reading: godliness
  chosen_spanish_reading: piedad
  alternative_spanish_readings:
  - devoción a Dios
  - reverencia a Dios
  rationale: El término no describe solo una actitud interior, sino la fidelidad concreta a Dios en contexto de persecución. «Piedad» es el equivalente español tradicional más cercano, aunque puede requerir esta nota para evitar una lectura meramente devocional.
  doctrine_reference: Translation philosophy §6; consistency of key terms §5
- issue: ἀδελφοί en el contexto narrativo
  english_pob_reading: brothers
  chosen_spanish_reading: hermanos
  alternative_spanish_readings:
  - hermanos y hermanas
  - sibilings
  rationale: El pasaje se dirige a hermanos literales. Conservar «hermanos» evita una neutralización innecesaria y sigue la precisión contextual del original.
  doctrine_reference: Translation philosophy §4
- issue: Imagen de tortura concreta
  english_pob_reading: on the rack
  chosen_spanish_reading: en el potro
  alternative_spanish_readings:
  - bajo tortura
  - en el tormento
  rationale: La mención es concreta y corporal. Traducirla como «potro» conserva la imagen del instrumento de suplicio y no la diluye en una abstracción.
  doctrine_reference: Translation philosophy §6
translation_notes:
  revision_awareness: 'El texto español sigue la revisión más reciente del POB: mantiene la imagen concreta del suplicio, evita añadir «post» a la deserción, y prefiere una expresión verbal natural para στρατείαν στρατεύσασθε sin perder la metáfora militar. También conserva la tensión lexical de εὐσέβεια con una opción española reconocible en contexto eclesial.'
  spanish_consistency_notes:
  - Se usó «hermanos» para el vocativo plural masculino, coherente con el contexto literal de los hermanos mártires.
  - «Potro» traduce la imagen de στρεβλὰς sin convertirla en una abstracción.
  - «Piedad» se eligió como equivalente funcional de εὐσέβεια, con nota por su posible estrechez semántica.
  - Se evitó «Cristo» u otra terminología no presente; el pasaje no contiene cristología explícita.
  - Se mantuvo la metáfora militar con «deserten» y «campaña», conforme al griego y al audit trail inglés.
