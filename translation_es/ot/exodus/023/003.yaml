translation:
  language: es
  text: Y no favorecerás al pobre en su pleito[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «honrarás al pobre en su causa». El verbo hebreo puede significar más literalmente «honrar», pero en este contexto jurídico se refiere a mostrar favoritismo o parcialidad.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְ
  english_pob_choice: And
  chosen_spanish: Y
  alternatives_spanish:
  - Y no obstante
  - Pero
  lexicon: conjunción coordinante
  rationale: La conjunción פשוטa une esta prohibición con las leyes judiciales vecinas. «Y» conserva la coordinación hebrea sin introducir contraste.
- source_word: דָל
  english_pob_choice: a poor man
  chosen_spanish: al pobre
  alternatives_spanish:
  - a un hombre pobre
  - al indigente
  - al débil
  lexicon: HALOT
  rationale: דָל designa a una persona pobre, menesterosa o socialmente débil. En español, «al pobre» mantiene la referencia a la condición de pobreza sin volver el enunciado demasiado pesado; el contexto legal ya define que se trata de una persona concreta en juicio.
- source_word: תֶהְדַּר
  english_pob_choice: show partiality
  chosen_spanish: favorecerás
  alternatives_spanish:
  - honrarás
  - harás acepción de personas
  - darás preferencia
  lexicon: HALOT
  rationale: En este contexto judicial, el verbo no comunica un honor general sino trato preferencial indebido. «Favorecerás» expresa de forma natural la idea de parcialidad en español; la nota preserva la alternativa más literal de «honrar».
- source_word: בְּרִיבוֹ
  english_pob_choice: in his lawsuit
  chosen_spanish: en su pleito
  alternatives_spanish:
  - en su disputa
  - en su causa
  - en su litigio
  lexicon: HALOT
  rationale: רִיב puede referirse a disputa o caso legal. «Pleito» funciona bien en español jurídico-bíblico y mantiene el matiz de controversia legal sin exigir un tecnicismo excesivo.
- source_word: לֹא
  english_pob_choice: shall not
  chosen_spanish: 'no'
  alternatives_spanish:
  - no deberás
  - no has de
  lexicon: gramática legal
  rationale: En español, la prohibición ya queda clara con «no» + futuro; «favorecerás» traduce el valor prohibitivo del hebreo legal de manera natural sin sobrecargar la frase.
theological_decisions:
- issue: Imparcialidad judicial respecto del pobre
  english_pob_reading: The verse forbids bias in favor of the poor person in court.
  chosen_spanish_reading: El versículo prohíbe el favoritismo hacia el pobre en un pleito.
  alternative_spanish_readings:
  - El versículo ordena honrar al pobre en general.
  - El versículo prohíbe desatender al pobre en juicio.
  rationale: El contexto inmediato es judicial; por eso «favorecerás» y «pleito» comunican la prohibición de parcialidad, no una regla general sobre el trato social al pobre. La formulación conserva la tensión del hebreo entre un verbo que puede significar «honrar» y su sentido contextual de favoritismo indebido.
  doctrine_reference: 'Principios POB: primacía del texto original y preservación del matiz judicial del mandato.'
translation_notes:
  revision_awareness: 'El borrador sigue de cerca la evaluación auditada del inglés POB: mantiene la coordinación con «Y», conserva el campo semántico de דָל como una persona pobre y traduce תֶהְדַּר según su fuerza contextual judicial, no como honor general. No se detectaron revisiones posteriores que alteren estas decisiones.'
  spanish_consistency_notes:
  - «Pleito» se usa aquí en sentido jurídico, acorde con el hebreo רִיב y con el contexto de leyes judiciales.
  - Se evita «SEÑOR» u այլ masking terms porque no aparece el nombre divino en este versículo.
  - Se mantiene un español sobrio y bíblico, sin arcaísmos innecesarios, pero sin perder el registro legal.
