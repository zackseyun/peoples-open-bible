translation:
  language: es
  text: 'Pero no puso a muerte a los hijos de los matadores[a], conforme a lo que está escrito en el libro de la Ley de Moisés, que Yahvé mandó así, diciendo: «Los padres no serán puestos a muerte por los hijos, ni los hijos serán puestos a muerte por los padres; sino que[b] cada hombre morirá por su propio pecado».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «los hijos de los asesinos». El hebreo dice literalmente «los hijos de los matadores».'
    reason: lexical_alternative
  - marker: b
    text: Esta cita refleja Deuteronomio 24:16.
    reason: cross_reference
lexical_decisions:
- source_word: בְּנֵי הַמַּכִּים
  english_pob_choice: the sons of the killers
  chosen_spanish: los hijos de los matadores
  alternatives_spanish:
  - los hijos de los asesinos
  - los hijos de los que mataron
  lexicon: HALOT
  rationale: מכים es un participio de נכה y, en este contexto judicial, señala a quienes dieron muerte. «Matadores» conserva la relación verbal y el tono más directo sin suavizarlo a una forma genérica.
- source_word: לֹא הֵמִית
  english_pob_choice: did not put ... to death
  chosen_spanish: no hizo morir
  alternatives_spanish:
  - no puso ... a muerte
  - no los mató
  lexicon: HALOT
  rationale: El hiphil de מות expresa causar la muerte en sentido judicial. «No hizo morir» conserva la transitividad causal y evita volverlo un simple «matar» menos marcado.
- source_word: כַּכָּתוּב
  english_pob_choice: according to what is written
  chosen_spanish: conforme a lo que está escrito
  alternatives_spanish:
  - como está escrito
  - según lo que está escrito
  lexicon: HALOT
  rationale: La fórmula introduce conformidad con una autoridad escrita. «Conforme a» preserva esa referencia normativa con un español claro y formal.
- source_word: בְּסֵפֶר תּוֹרַת מֹשֶׁה
  english_pob_choice: in the Book of the Law of Moses
  chosen_spanish: en el Libro de la Ley de Moisés
  alternatives_spanish:
  - en el libro de la ley de Moisés
  - en el rollo de la Ley de Moisés
  lexicon: HALOT
  rationale: «Libro de la Ley de Moisés» reproduce la fórmula jurídica tradicional sin perder la referencia a סֵפֶר + תּוֹרָה.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahveh
  lexicon: HALOT
  rationale: Se mantiene el nombre divino explícito, conforme al criterio del proyecto, en vez de sustituirlo por un título.
- source_word: לֹא יוּמְתוּ
  english_pob_choice: shall not be put to death
  chosen_spanish: no serán puestos a muerte
  alternatives_spanish:
  - no deberán ser ejecutados
  - no morirán
  lexicon: HALOT
  rationale: La forma pasiva/causativa en contexto legal expresa prohibición de ejecución judicial. «Puestos a muerte» conserva ese sentido formal.
- source_word: אָבוֹת ... בָּנִים
  english_pob_choice: Fathers ... sons
  chosen_spanish: los padres ... los hijos
  alternatives_spanish:
  - los padres ... los hijos varones
  - los progenitores ... los hijos
  lexicon: HALOT
  rationale: En español, «padres» e «hijos» es la forma natural y clara para el paralelismo legal. Aunque el hebreo es masculino, la relación jurídica familiar queda mejor expresada así sin perder el contraste estructural.
- source_word: עַל
  english_pob_choice: for
  chosen_spanish: por causa de
  alternatives_spanish:
  - a causa de
  - por
  lexicon: HALOT
  rationale: En esta fórmula legal, עַל indica el fundamento o motivo de la pena. «Por causa de» hace explícita la relación causal y mantiene el registro jurídico.
- source_word: כִּי אִם
  english_pob_choice: rather
  chosen_spanish: más bien
  alternatives_spanish:
  - sino que
  - antes bien
  lexicon: HALOT
  rationale: La expresión introduce el contraste final con la prohibición anterior. «Más bien» conserva la fuerza adversativa sin sonar rígido.
- source_word: אִישׁ
  english_pob_choice: each man
  chosen_spanish: cada hombre
  alternatives_spanish:
  - cada persona
  - cada uno
  lexicon: HALOT
  rationale: El singular distributivo exige una forma que marque individualidad. «Cada hombre» refleja el hebreo masculino y la generalización normativa.
- source_word: בְּחֶטְאוֹ
  english_pob_choice: for his own sin
  chosen_spanish: por su propio pecado
  alternatives_spanish:
  - a causa de su propio pecado
  - por su propia culpa
  lexicon: HALOT
  rationale: El sintagma expresa la base de la muerte individual. «Propio pecado» hace visible la posesión sufija y la oposición a la culpa vicaria.
- source_word: יָמוּת
  english_pob_choice: shall die
  chosen_spanish: morirá
  alternatives_spanish:
  - morirá a muerte
  - será muerto
  lexicon: HALOT
  rationale: El verbo final es qal, no hiphil. «Morirá» preserva ese cambio verbal y sigue siendo natural en español.
theological_decisions:
- issue: Responsabilidad judicial individual frente a culpa familiar
  english_pob_reading: The verse states the legal principle that punishment is not to be imposed on sons for fathers or fathers for sons; each person dies for his own sin.
  chosen_spanish_reading: El versículo enuncia el principio jurídico de que no se debe imponer la muerte a hijos por los padres ni a padres por los hijos; cada uno muere por su propio pecado.
  alternative_spanish_readings:
  - No hay responsabilidad alguna entre generaciones en ningún sentido.
  - La culpa familiar queda totalmente anulada en toda circunstancia.
  rationale: La redacción conserva el foco legal del pasaje y evita ampliar indebidamente la afirmación a una negación total de consecuencias comunitarias del pecado. Se mantiene la tensión doctrinal sin resolverla más allá del contexto inmediato.
  doctrine_reference: Preservar la tensión teológica; no absolutizar más allá del marco legal de Deuteronomio 24:16.
translation_notes:
  revision_awareness: La versión inglesa final no requirió cambios después de la última revisión; el presente borrador sigue de cerca esa redacción y conserva su distinción entre la prohibición judicial (no serán puestos a muerte) y la afirmación final en qal (morirá).
  spanish_consistency_notes:
  - Se usa «Yahvé» para el Tetragrama, conforme al estándar del proyecto.
  - Se evita «SEÑOR» como sustituto del nombre divino.
  - Se mantiene la distinción verbal entre «puestos a muerte» y «morirá».
  - Se conserva un registro jurídico claro y bíblico, pero en español moderno.
  - La cita final se presenta con comillas españolas y estilo publicable.
