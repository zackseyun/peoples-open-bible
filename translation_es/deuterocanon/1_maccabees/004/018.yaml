  rationale: Se corrigió la ubicación y el contenido de la nota b para que corresponda a μετὰ παρρησίας, según el rastro inglés y el griego. También se cambió 'la fuerza' por 'la tropa' para mayor naturalidad militar en español, y 'manténganse frente a' por 'hagan frente a' para una exhortación más idiomática y fiel al tono marcial.
