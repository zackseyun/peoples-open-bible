translation:
  language: es
  text: Y si sigues las palabras de tu sierva[a], Dios cumplirá plenamente el asunto contigo, y mi señor no se apartará de sus propósitos[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «haces caso a las palabras de tu sierva».
    reason: lexical_alternative
  - marker: b
    text: O «mi señor no se apartará de sus planes».
    reason: lexical_alternative
lexical_decisions:
- source_word: κατακολουθήσῃς
  english_pob_choice: follow
  chosen_spanish: sigues
  alternatives_spanish:
  - sigues de cerca
  - haces caso
  - atiendes
  lexicon: LSJ
  rationale: El griego expresa seguir de manera conforme o adherirse a lo dicho. En español, «sigues» conserva la idea básica de seguir la instrucción sin cargar el texto con una paráfrasis excesiva.
- source_word: λόγοις
  english_pob_choice: words
  chosen_spanish: palabras
  alternatives_spanish:
  - palabras dichas
  - consejos
  - dichos
  lexicon: LSJ
  rationale: Aunque el contexto apunta a consejo, el término griego es literalmente «palabras». «Palabras» mantiene esa cercanía al original y sigue siendo natural en español.
- source_word: παιδίσκης
  english_pob_choice: servant girl
  chosen_spanish: sierva
  alternatives_spanish:
  - criada
  - sirvienta
  - muchacha sierva
  lexicon: LSJ
  rationale: El término designa una mujer joven en condición de servicio. «Sierva» conserva el rasgo servil sin introducir necesariamente la matiz explícita de esclavitud, que aquí no es central en el contexto inmediato.
- source_word: τελείως
  english_pob_choice: fully
  chosen_spanish: plenamente
  alternatives_spanish:
  - por completo
  - completamente
  - del todo
  lexicon: LSJ
  rationale: El adverbio intensifica la realización del acto. «Plenamente» reproduce bien esa fuerza enfática en español.
- source_word: πρᾶγμα
  english_pob_choice: the matter
  chosen_spanish: el asunto
  alternatives_spanish:
  - la cosa
  - el plan
  - el negocio
  lexicon: LSJ
  rationale: El sustantivo es amplio y no especifica por sí mismo la naturaleza concreta de la acción. «Asunto» comunica esa amplitud de forma clara en español.
- source_word: ποιήσει μετὰ σοῦ
  english_pob_choice: will fully accomplish the matter with you
  chosen_spanish: cumplirá plenamente el asunto contigo
  alternatives_spanish:
  - llevará a cabo plenamente el asunto contigo
  - hará plenamente el asunto contigo
  - realizará plenamente el asunto contigo
  lexicon: LSJ
  rationale: La frase indica que Dios realizará o llevará a término la acción en relación contigo. «Cumplirá» expresa bien la culminación del plan, y «contigo» conserva el valor relacional de μετά.
- source_word: ὁ θεός
  english_pob_choice: God
  chosen_spanish: Dios
  alternatives_spanish:
  - el Dios
  - Dios mismo
  lexicon: LSJ
  rationale: Correspondencia directa y estándar para θεός.
- source_word: οὐκ ἀποστεῖται
  english_pob_choice: will not depart
  chosen_spanish: no se apartará
  alternatives_spanish:
  - no se desviará
  - no desistirá
  - no se retirará
  lexicon: LSJ
  rationale: El verbo puede expresar alejarse, apartarse o desviarse de una intención. «No se apartará» refleja con naturalidad la imagen de no desviarse de sus propósitos.
- source_word: ὁ κύριός μου
  english_pob_choice: my lord
  chosen_spanish: mi señor
  alternatives_spanish:
  - mi señor y amo
  - mi dueño
  - mi amo
  lexicon: LSJ
  rationale: Aquí el referente es un superior humano. En español, «mi señor» reproduce el título deferencial y evita la connotación demasiado fuerte de «amo» donde el contexto no la exige de manera central.
- source_word: ἐπιτηδευμάτων
  english_pob_choice: plans
  chosen_spanish: propósitos
  alternatives_spanish:
  - planes
  - designios
  - empeños
  lexicon: LSJ
  rationale: El término puede referirse a undertakings, pursuits o designs. «Propósitos» conserva el matiz de intención deliberada y encaja bien con la idea de no apartarse de lo que ha determinado.
theological_decisions:
- issue: Título humano κύριος aplicado a Holofernes
  english_pob_reading: my lord
  chosen_spanish_reading: mi señor
  alternative_spanish_readings:
  - mi amo
  - mi dueño
  rationale: El contexto narrativo muestra un trato deferente hacia un superior humano, no un referente divino. «Mi señor» mantiene la cortesía del título sin elevar indebidamente el estatus del personaje.
  doctrine_reference: 'DOCTRINE.md: κύριος se traduce según el referente; para humanos, el título se mantiene en minúscula y en sentido honorífico.'
translation_notes:
  revision_awareness: 'La redacción sigue de cerca el texto griego de Swete y toma como apoyo el registro auditado en inglés. Se preserva la doble relación del verso: obedecer las palabras de Judit y la afirmación de que Dios completará plenamente el asunto, junto con la nota de que el señor humano no se apartará de sus propósitos.'
  spanish_consistency_notes:
  - Se usó «Dios» para θεός y «mi señor» para κύριος humano, conservando la distinción contextual.
  - «Sierva» se eligió como equivalente sobrio de παιδίσκη, evitando imponer «esclava» donde el contexto inmediato no lo requiere.
  - «Asunto» y «propósitos» mantienen el campo semántico amplio de πρᾶγμα y ἐπιτηδευμάτων sin cerrar innecesariamente el sentido.
