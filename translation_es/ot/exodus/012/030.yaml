  source_alignment_summary: 'El borrador español transmite bien el sentido del hebreo: Faraón se levanta durante la noche, junto con sus siervos y todo Egipto, hay un gran clamor, y la causa es que no había casa sin un muerto. La metonimia de «todo Egipto» y la doble negación final están bien preservadas. Sin embargo, la nota [a] no refleja la alternativa documentada en el rastro inglés: allí la nota alternativa corresponde a la cláusula final («no había una casa donde no hubiera una persona muerta»), no a «de noche / en la noche».'
  spanish_quality_summary: 'El español es claro y digno. «Se levantó», «hubo un gran clamor» y «no había casa en que no hubiera un muerto» son naturales y fieles. «Siervos» es aceptable en este contexto cortesano. El principal problema de calidad editorial es la desalineación de notas: [a] está anclada a «de noche» pero el contenido y la evidencia auditada piden una nota en la cláusula final. También conviene usar una formulación más pulida en la nota alternativa.'
  glossary_alignment: No hay conflicto con la terminología por defecto del proyecto. No aparecen Yahvé, Mesías/Cristo, Espíritu, etc. «Siervos» para עֲבָדָיו concuerda con la decisión contextual documentada en inglés. «Todo Egipto» preserva correctamente la metonimia corporativa.
  issues:
