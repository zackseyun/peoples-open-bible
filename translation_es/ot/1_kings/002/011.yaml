translation:
  language: es
  text: Los días que David reinó sobre Israel fueron cuarenta años. En Hebrón reinó siete años, y en Jerusalén reinó treinta y tres años.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: וְהַיָּמִים
  english_pob_choice: The days
  chosen_spanish: Los días
  alternatives_spanish:
  - El tiempo
  - La duración
  lexicon: HALOT
  rationale: Conservo la idiomática hebrea con un sustantivo plural en español, como hace el POB en inglés. Aunque “tiempo” sería natural, “los días” mantiene mejor la forma del texto fuente y deja que la cláusula siguiente precise que se trata de la duración del reinado.
- source_word: אֲשֶׁר מָלַךְ
  english_pob_choice: that David reigned
  chosen_spanish: que David reinó
  alternatives_spanish:
  - durante el cual David reinó
  - que David fue rey
  lexicon: HALOT
  rationale: “Reinó” reproduce directamente מָלַךְ y conserva el tono regnal del pasaje. “Fue rey” es posible, pero diluye la acción verbal del hebreo y del POB inglés.
- source_word: עַל יִשְׂרָאֵל
  english_pob_choice: over Israel
  chosen_spanish: sobre Israel
  alternatives_spanish:
  - como rey sobre Israel
  - en Israel
  lexicon: HALOT
  rationale: La preposición עַל en este contexto marca gobierno sobre un pueblo. “Sobre Israel” es la correspondencia más directa y idiomática en español.
- source_word: אַרְבָּעִים שָׁנָה
  english_pob_choice: forty years
  chosen_spanish: cuarenta años
  lexicon: HALOT
  rationale: Numeral y expresión temporal estándar; no presenta dificultad de traducción.
- source_word: בְּחֶבְרוֹן
  english_pob_choice: In Hebron
  chosen_spanish: En Hebrón
  alternatives_spanish:
  - En Hebron
  - En la ciudad de Hebrón
  lexicon: HALOT
  rationale: “En” expresa la localización con naturalidad. Uso “Hebrón” con acento gráfico conforme al español, sin alterar el referente geográfico.
- source_word: מָלַךְ שֶׁבַע שָׁנִים
  english_pob_choice: he reigned seven years
  chosen_spanish: reinó siete años
  alternatives_spanish:
  - fue rey siete años
  lexicon: HALOT
  rationale: Repito “reinó” para reflejar la estructura hebrea y mantener la coherencia del resumen del reinado, igual que el POB inglés.
- source_word: וּבִירוּשָׁלִַם
  english_pob_choice: and in Jerusalem
  chosen_spanish: y en Jerusalén
  alternatives_spanish:
  - y en la ciudad de Jerusalén
  lexicon: HALOT
  rationale: La conjunción y la localización se conservan de manera directa; “Jerusalén” es la forma española estable.
- source_word: שְׁלֹשִׁים וְשָׁלֹשׁ שָׁנִים
  english_pob_choice: thirty-three years
  chosen_spanish: treinta y tres años
  alternatives_spanish:
  - treinta y tres años
  lexicon: HALOT
  rationale: El español moderno expresa naturalmente el número compuesto como “treinta y tres”, conservando el total exacto sin arcaísmo.
translation_notes:
  revision_awareness: El texto base en inglés del POB no introduce notas ni revisiones textuales en este versículo; el hebreo masorético coincide plenamente con la lectura reflejada en la traducción inglesa auditada, por lo que la versión española sigue esa misma línea sin necesidad de variantes.
  spanish_consistency_notes:
  - He mantenido “reinó” de forma consistente para מָלַךְ en las tres apariciones, a fin de preservar el paralelismo del verso.
  - He usado “En Hebrón” y “y en Jerusalén” para una localización natural en español sin perder la repetición locativa del hebreo.
  - No he introducido terminología eclesiástica ni equivalencias interpretativas ajenas al resumen cronológico del texto.
