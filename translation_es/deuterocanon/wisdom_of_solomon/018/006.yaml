translation:
  language: es
  text: Aquella noche fue dada a conocer de antemano a nuestros padres[a], para que, sabiendo con certeza los juramentos[b] en los que habían confiado, se animaran[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «fue conocida de antemano por nuestros padres». El verbo griego puede leerse más literalmente así, pero en este contexto parece referirse a que la noche les fue revelada con anticipación.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «antepasados». El griego dice literalmente «padres».'
    reason: lexical_alternative
  - marker: c
    text: 'O: «tomaran ánimo» / «fueran alentados».'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐκείνη ἡ νύξ
  english_pob_choice: That night
  chosen_spanish: Aquella noche
  alternatives_spanish:
  - Esa noche
  - Aquella misma noche
  lexicon: LSJ
  rationale: El demostrativo conserva la referencia deíctica sin forzar énfasis adicional. «Aquella noche» es natural en español y reproduce bien el valor de «That night».
- source_word: προεγνώσθη
  english_pob_choice: was made known beforehand
  chosen_spanish: fue dada a conocer de antemano
  alternatives_spanish:
  - fue conocida de antemano
  - fue preconocida
  lexicon: LSJ
  rationale: El verbo en contexto no expresa solo presciencia abstracta, sino una comunicación previa de la noche a los antepasados. «Fue dada a conocer de antemano» mantiene ese sentido revelatorio.
- source_word: πατράσιν ἡμῶν
  english_pob_choice: to our fathers
  chosen_spanish: a nuestros padres
  alternatives_spanish:
  - a nuestros antepasados
  - a nuestros padres y madres
  lexicon: LSJ
  rationale: Se conserva la referencia literal y masculina/plural del griego, siguiendo la decisión del POB inglés de retener «fathers» por precisión léxica.
- source_word: ἵνα
  english_pob_choice: so that
  chosen_spanish: para que
  alternatives_spanish:
  - a fin de que
  - de modo que
  lexicon: LSJ
  rationale: Introduce claramente la finalidad de la cláusula en español con un giro natural y fiel.
- source_word: ἀσφαλῶς εἰδότες
  english_pob_choice: knowing with certainty
  chosen_spanish: sabiendo con certeza
  alternatives_spanish:
  - conociendo con seguridad
  - estando plenamente seguros
  lexicon: LSJ
  rationale: «Sabiendo con certeza» conserva la idea de conocimiento firme y asegurado, sin perder fluidez en español.
- source_word: οἷς ἐπίστευσαν ὅρκοις
  english_pob_choice: the oaths in which they had trusted
  chosen_spanish: los juramentos en los que habían confiado
  alternatives_spanish:
  - las promesas juradas en las que habían confiado
  - los juramentos en los que habían creído
  lexicon: LSJ
  rationale: «Juramentos» reproduce de forma directa ὅρκοις; «confiado» refleja ἐπίστευσαν como confianza depositada en esos juramentos, siguiendo la lectura auditada del POB.
- source_word: ἐπευθυμήσωσιν
  english_pob_choice: they might be encouraged
  chosen_spanish: fueran animados
  alternatives_spanish:
  - tomaran ánimo
  - se animaran
  - fueran alentados
  lexicon: LSJ
  rationale: El verbo apunta a recibir ánimo/consuelo/coraje. «Fueran animados» es un equivalente formal y natural que conserva la pasividad del griego y la decisión revisada del POB inglés.
theological_decisions:
- issue: Sentido de προεγνώσθη en un contexto de revelación salvífica
  english_pob_reading: The night was disclosed beforehand to the ancestors, not merely foreknown in an abstract sense.
  chosen_spanish_reading: La noche fue dada a conocer de antemano a los padres, no solo prevista mentalmente.
  alternative_spanish_readings:
  - La noche fue preconocida por nuestros padres
  - La noche fue conocida de antemano
  rationale: El contexto narrativo favorece una revelación previa, no solo conocimiento previo. La traducción mantiene esa tensión sin resolverla hacia una abstracción teológica.
  doctrine_reference: Prioridad del contexto original sobre la simplificación doctrinal; mantener la ambigüedad léxica donde el griego la permite.
- issue: Valor de οἷς ἐπίστευσαν ὅρκοις
  english_pob_reading: the oaths in which they had trusted
  chosen_spanish_reading: los juramentos en los que habían confiado
  alternative_spanish_readings:
  - los juramentos que habían creído
  - las promesas juradas en las que habían confiado
  rationale: Se evita convertir «juramentos» en una paráfrasis de «promesas» sin base explícita. La traducción conserva el lenguaje fuerte del juramento y la confianza depositada en él.
  doctrine_reference: Preservar la tensión léxica del texto fuente en lugar de armonizarla con formulaciones eclesiales tradicionales.
translation_notes:
  revision_awareness: Se siguió el último pase de revisión del POB inglés, que prefirió una rendición más natural de ἐπευθυμήσωσιν como «be encouraged». Se mantuvo la decisión auditada de traducir προεγνώσθη como revelación previa y de conservar πατράσιν ἡμῶν como «nuestros padres».
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» como norma general del proyecto, aunque este versículo no contiene el tetragrámaton.
  - Se preservó el tono solemne y bíblico sin recurrir a un calco excesivamente arcaico.
  - «Juramentos» conserva la fuerza del sustantivo griego; no se suavizó a «promesas» en el texto principal.
  - La voz pasiva de ἐπευθυμήσωσιν se reflejó con «fueran animados» para evitar una paraphrase activa no respaldada por el griego.
