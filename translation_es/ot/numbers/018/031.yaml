    reason: cultural_note
  - marker: c
    text: O «recompensa», «pago» o «compensación».
    reason: lexical_alternative
  revision_rationale: 'Se ajusta «su casa» a «su hogar» para preservar el sentido de unidad doméstica de ביתכם con mejor claridad en español. También se restituyen las notas significativas del expediente inglés: alternativa verbal del hebreo legal, aclaración cultural sobre el hogar, y alternativas léxicas para שָׂכָר. El resto del borrador puede mantenerse por ser fiel y natural.'
