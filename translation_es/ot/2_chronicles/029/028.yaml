translation:
  language: es
  text: Y toda la asamblea se postraba, mientras el canto[a] resonaba y las trompetas sonaban; todo esto continuó hasta que terminó el holocausto.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «el canto era cantado»; el hebreo dice literalmente «el canto» con un participio, un giro idiomático que en español se expresa con mayor naturalidad como «el canto resonaba».
    reason: lexical_alternative
lexical_decisions:
- source_word: קָּהָל
  english_pob_choice: assembly
  chosen_spanish: asamblea
  alternatives_spanish:
  - congregación
  - pueblo
  lexicon: HALOT
  rationale: La referencia es al grupo reunido para el culto. «Asamblea» conserva el sentido corporativo y suena natural en español sin imponer una terminología eclesiástica posterior.
- source_word: מִשְׁתַּחֲוִים
  english_pob_choice: was bowing down
  chosen_spanish: se estaba postrando
  alternatives_spanish:
  - estaba adorando
  - se postraba
  lexicon: HALOT
  rationale: El verbo describe una acción corporal de inclinarse o postrarse. «Se estaba postrando» mantiene el gesto físico y el aspecto progresivo del contexto.
- source_word: הַשִּׁיר
  english_pob_choice: the song
  chosen_spanish: el canto
  alternatives_spanish:
  - la canción
  - el canto litúrgico
  lexicon: HALOT
  rationale: Aunque literalmente es «el canto/la canción», en español «el canto» comunica mejor el sustantivo colectivo en este contexto de adoración y evita una formulación artificial.
- source_word: מְשׁוֹרֵר
  english_pob_choice: was being sung
  chosen_spanish: era cantado
  alternatives_spanish:
  - se cantaba
  - estaba siendo cantado
  lexicon: HALOT
  rationale: El participio con הַשִּׁיר funciona idiomáticamente como «el canto [era] cantado/sonaba». «Era cantado» conserva la relación gramatical sin volverlo pesado en español.
- source_word: חֲצֹצְרוֹת
  english_pob_choice: trumpets
  chosen_spanish: trompetas
  alternatives_spanish:
  - trompetas de plata
  - clarines
  lexicon: HALOT
  rationale: El hebreo nombra las trompetas cultuales. Como aquí no se menciona «plata», no se añade en el texto principal.
- source_word: מחצצרים
  english_pob_choice: were sounding
  chosen_spanish: estaban sonando
  alternatives_spanish:
  - estaban tocando
  - estaban haciendo sonar
  lexicon: HALOT
  rationale: El participio indica que las trompetas estaban sonando/siendo sopladas. «Estaban sonando» es la forma más natural en español con el sujeto «las trompetas».
- source_word: הַכֹּל
  english_pob_choice: all this
  chosen_spanish: todo esto
  alternatives_spanish:
  - el conjunto
  - todo
  lexicon: HALOT
  rationale: Es un resumen discursivo de las acciones de adoración mencionadas. «Todo esto» conserva ese carácter de recapitulación.
- source_word: עַד לִכְלוֹת
  english_pob_choice: until ... was finished
  chosen_spanish: hasta que terminó
  alternatives_spanish:
  - hasta que se acabó
  - hasta la terminación de
  lexicon: HALOT
  rationale: El infinitivo marca el punto final de la acción. «Hasta que terminó» expresa bien el límite temporal en español sin perder la referencia al cierre del rito.
- source_word: הָעֹלָה
  english_pob_choice: the burnt offering
  chosen_spanish: el holocausto
  alternatives_spanish:
  - la ofrenda quemada
  - el sacrificio quemado
  lexicon: HALOT
  rationale: En español bíblico, «holocausto» es el término establecido para la ofrenda totalmente quemada. Se mantiene por fidelidad terminológica y claridad litúrgica.
theological_decisions:
- issue: Descripción física de la adoración
  english_pob_reading: all the assembly was bowing down
  chosen_spanish_reading: toda la asamblea se estaba postrando
  alternative_spanish_readings:
  - toda la asamblea adoraba
  - toda la asamblea se inclinaba
  rationale: El hebreo enfatiza el acto corporal de postrarse, no solo una actitud interior. «Se estaba postrando» preserva esa concreción sin convertirlo en un paraphrase doctrinal.
  doctrine_reference: Lexical theology of worship/prostration; cf. uso de שׁחה en contextos cultuales.
- issue: Relación entre «el canto» y el participio
  english_pob_reading: the song was being sung
  chosen_spanish_reading: el canto era cantado
  alternative_spanish_readings:
  - se cantaba el canto
  - la canción sonaba
  rationale: La construcción hebrea es idiomática y algo tensa literalmente. La traducción mantiene la estructura sustantivo + participio, preservando la observación del audit trail de que el texto dice literalmente «el canto» con un participio.
  doctrine_reference: Ninguna doctrinal; se trata de una decisión de expresión del idiomatismo hebreo.
- issue: Terminología sacrificial final
  english_pob_reading: the burnt offering
  chosen_spanish_reading: el holocausto
  alternative_spanish_readings:
  - la ofrenda quemada
  - la ofrenda totalmente quemada
  rationale: El término tradicional español «holocausto» corresponde al hebreo עֹלָה en contexto sacrificial y evita diluir la especificidad del rito.
  doctrine_reference: Ley sacrificial del Pentateuco; terminología cultual estable.
translation_notes:
  revision_awareness: Coincide con el estado de revisión más reciente del texto inglés (sin cambios aplicados) y con el consenso alto del control cruzado; no se detectaron variantes textuales ni necesidades de corrección en el hebreo base.
  spanish_consistency_notes:
  - Se mantiene «asamblea» para קָּהָל y no «congregación», para conservar el matiz corporativo neutral.
  - Se conserva la progresividad verbal («se estaba postrando», «estaban sonando») para reflejar la simultaneidad del verso.
  - «Holocausto» se usa como término técnico sacrificial, consistente con el español bíblico y con la equivalencia de עֹלָה.
