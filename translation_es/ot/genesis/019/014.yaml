base_translation:
  language: en
  yaml_path: translation/ot/genesis/019/014.yaml
  text: So Lot went out and spoke to his sons-in-law[a], who were to marry his daughters, and said, “Get up, get out of this place[b], because Yahweh is about to destroy the city.” But he seemed to his sons-in-law to be joking.
  footnotes:
  - marker: a
    text: Or 'his sons-in-law, who had married his daughters'; the Hebrew phrase can denote either men already married to Lot's daughters or those about to marry them.
    reason: alternative_reading
  - marker: b
    text: Hebrew 'he was like one joking in the eyes of his sons-in-law.'
    reason: lexical_alternative
