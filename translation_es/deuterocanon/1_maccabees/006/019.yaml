translation:
  language: es
  text: Y Judas decidió desarraigarlos[a], y reunió a todo el pueblo para sitiarlos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «rodearlos»; más literalmente, «sentarse alrededor de ellos». La frase es una expresión militar para poner sitio.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐλογίσατο
  english_pob_choice: decided
  chosen_spanish: decidió
  alternatives_spanish:
  - resolvió
  - consideró
  - tomó la decisión
  lexicon: BDAG
  rationale: El medio de λογίζομαι aquí expresa una resolución deliberada, no solo un cálculo mental. «Decidió» comunica en español una intención ya fijada de manera natural y fiel al sentido del pasaje.
- source_word: ἐξᾶραι
  english_pob_choice: to root them out
  chosen_spanish: expulsarlos
  alternatives_spanish:
  - arrancarlos
  - destruirlos
  - quitarlos
  lexicon: LSJ
  rationale: El infinitivo sugiere una remoción enérgica y hostil. En español, «expulsarlos» conserva la fuerza de sacar/expulsar al enemigo sin afirmar más de lo que permite el griego. Se evita suavizarlo a un simple «quitarlos» y también sobretraducirlo como «destruirlos».
- source_word: ἐξεκκλησίασεν
  english_pob_choice: assembled
  chosen_spanish: reunió
  alternatives_spanish:
  - convocó
  - juntó
  - reunió en asamblea
  lexicon: LSJ
  rationale: El verbo significa reunir o convocar una asamblea. «Reunió» es natural en español y mantiene la idea de juntar al pueblo para una acción militar.
- source_word: πάντα τὸν λαόν
  english_pob_choice: all the people
  chosen_spanish: todo el pueblo
  alternatives_spanish:
  - todo el pueblo entero
  - toda la gente
  - todo el ejército
  lexicon: LSJ
  rationale: La expresión es literalmente «todo el pueblo». Aunque el contexto apunta probablemente a la fuerza reunida para la guerra, el griego dice «pueblo», y esa amplitud se conserva en español.
- source_word: τοῦ περικαθίσαι ἐπʼ αὐτούς
  english_pob_choice: to besiege them
  chosen_spanish: para sitiarles
  alternatives_spanish:
  - para rodearlos
  - para cercarlos
  - para acampar contra ellos
  lexicon: LSJ
  rationale: El infinitivo con valor de propósito expresa la finalidad de la reunión. En contexto militar, el giro idiomático corresponde a «asediar/sitiar». «Sitiarles» comunica el sentido bélico con claridad, mientras que una traducción más literal como «sentarse alrededor de ellos» sería poco natural en español.
translation_notes:
  revision_awareness: No se detectaron revisiones aplicadas en el audit trail; la redacción se mantiene alineada con la lectura aprobada y con alta concordancia entre controles.
  spanish_consistency_notes:
  - Se mantuvo el nombre «Judas» para Ἰούδας, con mayúscula inicial conforme al uso bíblico en español.
  - Se optó por «pueblo» y no «gente» para conservar el alcance colectivo y potencialmente militar del término λαός.
  - El verbo final se formuló con «sitiar» por su valor técnico militar, en consonancia con la nota de alternativa literal del texto fuente.
