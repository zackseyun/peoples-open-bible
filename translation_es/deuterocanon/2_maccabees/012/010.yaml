    text: El griego tiene el singular αὐτῷ, literalmente 'a él'. Algunos traductores pueden entender el referente de manera colectiva y verter 'a ellos', pero el testimonio de la fuente aquí es singular.
    reason: alternative_reading
  revision_rationale: Se reubicó la nota al pronombre 'él' porque documenta αὐτῷ, y se ajustó 'mientras avanzaban' a 'mientras hacían su marcha' para reflejar mejor el valor de πορία en contexto militar. No se requieren cambios adicionales.
