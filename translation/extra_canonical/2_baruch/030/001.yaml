lexical_decisions:
- source_word: ܡܐܬܝܬܗ ܕܡܫܝܚܐ
  chosen: the coming of the Messiah
  alternatives:
  - the advent of the Messiah
  - the appearance of the Messiah
  lexicon: Smith
  rationale: The phrase points to the Messiah’s arrival in eschatological manifestation. 'Coming' is clear English and avoids importing later Christian technical nuance more strongly than the Syriac requires.
- source_word: ܢܬܦܣܩ
  chosen: is completed
  alternatives:
  - is fulfilled
  - comes to its end
  lexicon: Smith
  rationale: The sense is temporal completion rather than violent cutting-off. 'Is completed' fits the apocalyptic timetable idiom.
theological_decisions:
- issue: Messianic wording
  chosen_reading: Messiah
  alternative_readings:
  - Anointed One
  - Christ
  rationale: The Syriac ܡܫܝܚܐ is retained as 'Messiah' to preserve Jewish apocalyptic register and avoid importing specifically Christian confessional wording.
  doctrine_reference: Do not import later theological phrasing beyond what the source warrants.
- issue: Resurrection hope
  chosen_reading: those who sleep in hope of him will rise
  alternative_readings:
  - those who died hoping in him will be raised
  - those asleep in hope will awake
  rationale: The translation preserves both the sleep metaphor and explicit hope directed toward the Messiah, rather than flattening the line into a generic statement about life after death.
  doctrine_reference: Preserve theological tension and apocalyptic imagery.
- issue: Intermediate-state imagery
  chosen_reading: storehouses ... souls of the righteous
  alternative_readings:
  - treasuries ... spirits of the righteous
  - hidden chambers ... persons of the righteous
  rationale: The text depicts souls being kept in reserve before resurrection. The translation retains that imagery instead of harmonizing it away.
  doctrine_reference: Do not flatten apocalyptic imagery into generic modern prose.
