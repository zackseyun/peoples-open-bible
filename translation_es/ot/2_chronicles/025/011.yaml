translation:
  language: es
  text: Entonces Amasías se fortaleció[a], condujo a su pueblo y fue al Valle de la Sal, donde derribó a diez mil de los hijos de Seir.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «los descendientes de Seir»; el hebreo dice literalmente «los hijos de Seir», una expresión étnico-genealógica.
    reason: lexical_alternative
lexical_decisions:
- source_word: הִתְחַזַּק
  english_pob_choice: strengthened himself
  chosen_spanish: se fortaleció
  alternatives_spanish:
  - tomó ánimo
  - se hizo fuerte
  - se armó de valor
  lexicon: HALOT
  rationale: El hitpael es reflexivo e inchoativo. «Se fortaleció» conserva esa fuerza reflexiva sin sonar forzado en español, y evita mover el sentido hacia una simple valentía subjetiva.
- source_word: וַיִּנְהַג אֶת־עַמּוֹ
  english_pob_choice: led his people
  chosen_spanish: condujo a su pueblo
  alternatives_spanish:
  - dirigió a su pueblo
  - encabezó a su pueblo
  - llevó a su pueblo
  lexicon: HALOT
  rationale: נהג puede expresar conducir o guiar. «Condujo a su pueblo» mantiene la acción de liderazgo/movimiento sin introducir una lectura táctica más específica de la que el hebreo exige.
- source_word: גֵּיא הַמֶּלַח
  english_pob_choice: the Valley of Salt
  chosen_spanish: el Valle de la Sal
  alternatives_spanish:
  - el valle de sal
  - el Valle Salado
  lexicon: HALOT
  rationale: Se conserva el nombre geográfico de manera transparente y reconocible. La mayúscula marca el topónimo como en la tradición editorial bíblica, sin ocultar el componente semántico del hebreo.
- source_word: וַיַּךְ
  english_pob_choice: struck down
  chosen_spanish: hirió
  alternatives_spanish:
  - derribó
  - mató
  - golpeó
  lexicon: HALOT
  rationale: נכה puede abarcar golpear, herir o abatir según el contexto. «Hirió» mantiene el verbo amplio y permite que la cifra de muertos/caídos quede indicada por el contexto inmediato sin cerrar demasiado el sentido.
- source_word: בְּנֵי שֵׂעִיר
  english_pob_choice: the sons of Seir
  chosen_spanish: los hijos de Seir
  alternatives_spanish:
  - los descendientes de Seir
  - la gente de Seir
  - los hombres de Seir
  lexicon: HALOT
  rationale: Se preserva la expresión genealógica/étnica literal del hebreo. Aunque en español pueda sonar arcaizante, aquí refleja mejor la formulación del texto fuente y la tensión documental notada por la POB en inglés.
- source_word: עֲשֶׂרֶת אֲלָפִים
  english_pob_choice: ten thousand
  chosen_spanish: diez mil
  alternatives_spanish:
  - '10.000'
  lexicon: HALOT
  rationale: Es la equivalencia numérica natural y exacta en español.
- source_word: וַאֲמַצְיָהוּ
  english_pob_choice: Then Amaziah
  chosen_spanish: Entonces Amasías
  alternatives_spanish:
  - Y Amasías
  lexicon: HALOT
  rationale: El waw narrativo se reproduce como conectivo temporal natural en español. «Entonces» mantiene la progresión narrativa sin una rigidez excesivamente literal.
theological_decisions:
- issue: Expresión étnico-genealógica «los hijos de Seir»
  english_pob_reading: The Hebrew reads 'the sons of Seir,' an ethnic-genealogical expression.
  chosen_spanish_reading: los hijos de Seir
  alternative_spanish_readings:
  - los descendientes de Seir
  - la gente de Seir
  rationale: Se mantiene la formulación genealógica literal porque el texto fuente la usa deliberadamente. En español puede resultar menos idiomática, pero preserva la señal étnica y la tensión lexicográfica documentada en la nota inglesa.
  doctrine_reference: Lectura histórico-gramatical del texto; precisión lexical antes que suavización interpretativa.
translation_notes:
  revision_awareness: No se registraron revisiones aplicadas en el pasaje base; el texto inglés auditado permanece sin cambios y ofrece una solución estable para el tono narrativo y las decisiones léxicas clave.
  spanish_consistency_notes:
  - Se usa «Yahvé» para el nombre divino cuando corresponda; este versículo no lo contiene.
  - Se mantiene «Mesías/Cristo» fuera de este pasaje porque no aparece en el texto.
  - «Hirió» conserva la amplitud del hebreo נכה y no se restringe a «mató»; la cifra de víctimas completa el sentido militar.
  - La nota al pie se ancla en «hijos de Seir» para reflejar la alternativa genealógica documentada en la POB inglesa.
