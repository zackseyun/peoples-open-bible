translation:
  language: es
  text: Así el arca de Yahvé rodeó la ciudad[a] una vez. Luego entraron en el campamento y pasaron la noche en el campamento.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «el arca de Yahvé rodeó la ciudad una vez»; el texto personifica el arca como sujeto, aunque la llevaban los sacerdotes.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּסֵּב
  english_pob_choice: went around
  chosen_spanish: rodeó
  alternatives_spanish:
  - dio una vuelta alrededor de
  - se hizo llevar alrededor de
  - circunvaló
  lexicon: HALOT
  rationale: El verbo hebreo describe el movimiento alrededor de la ciudad. «Rodeó» comunica de manera natural la acción circular sin perder el sujeto gramatical del hebreo, que personifica el arca como agente narrativo.
- source_word: אֲרוֹן יְהוָה
  english_pob_choice: the ark of Yahweh
  chosen_spanish: el arca de Yahvé
  alternatives_spanish:
  - el arca de Yahveh
  - el arca de Yahvéh
  lexicon: HALOT
  rationale: 'Se conserva el sustantivo «arca» y el nombre divino según el criterio del proyecto en español: «Yahvé». La construcción de complemento con «de» refleja bien el hebreo en español corriente.'
- source_word: הָעִיר
  english_pob_choice: the city
  chosen_spanish: la ciudad
  alternatives_spanish:
  - la urbe
  lexicon: HALOT
  rationale: Noun definido genérico que en contexto se refiere a Jericó; «la ciudad» es la correspondencia más directa y sobria.
- source_word: הַקֵּף
  english_pob_choice: circling it
  chosen_spanish: dándole una vuelta completa
  alternatives_spanish:
  - circunvalándola
  - dando un círculo alrededor de ella
  lexicon: HALOT
  rationale: El infinitivo absoluto refuerza la idea de rodear; en español, una frase adverbial como «dándole una vuelta completa» conserva la intensificación sin sonar forzada. Se evita una repetición mecánica del objeto si la estructura española lo vuelve torpe.
- source_word: פַּעַם אֶחָת
  english_pob_choice: once
  chosen_spanish: una vez
  alternatives_spanish:
  - una sola vez
  lexicon: HALOT
  rationale: Equivalente idiomático natural en español.
- source_word: וַיָּבֹאוּ
  english_pob_choice: they came
  chosen_spanish: entraron
  alternatives_spanish:
  - vinieron
  - llegaron
  lexicon: HALOT
  rationale: Aunque el verbo básico es «venir/entrar», el complemento «al campamento» permite explicitar el valor direccional como «entraron», que en español comunica mejor el movimiento de regreso al campamento.
- source_word: הַמַּחֲנֶה
  english_pob_choice: the camp
  chosen_spanish: el campamento
  alternatives_spanish:
  - el campamento militar
  - el campamento de Israel
  lexicon: HALOT
  rationale: «Campamento» es la forma más natural en español para el campamento del pueblo. Se evita «campamento»/«campamento militar» según el contexto narrativo.
- source_word: וַיָּלִינוּ
  english_pob_choice: spent the night
  chosen_spanish: pasaron la noche
  alternatives_spanish:
  - se alojaron
  - durmieron
  lexicon: HALOT
  rationale: «Pasaron la noche» expresa con claridad el valor de pernoctar/lodging. Es una equivalencia idiomática amplia y fiel.
- source_word: בַּמַּחֲנֶה
  english_pob_choice: in the camp
  chosen_spanish: en el campamento
  alternatives_spanish:
  - dentro del campamento
  lexicon: HALOT
  rationale: Se mantiene la repetición del sustantivo para reflejar la estructura hebrea y la claridad narrativa en español.
theological_decisions:
- issue: El nombre divino יְהוָה en español
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahveh
  - el SEÑOR
  rationale: El proyecto en español usa «Yahvé» como equivalente principal del Tetragrámaton, preservando el nombre del pacto en lugar de ocultarlo con una forma de sustitución. Esta decisión sigue la política terminológica del proyecto y se alinea con la lectura del texto fuente hebreo.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Personificación del arca como sujeto
  english_pob_reading: the ark ... went around the city
  chosen_spanish_reading: el arca ... rodeó la ciudad
  alternative_spanish_readings:
  - el arca fue llevada alrededor de la ciudad
  - los sacerdotes llevaron el arca alrededor de la ciudad
  rationale: Se conserva la personificación narrativa del hebreo, que presenta el arca como sujeto gramatical aunque la acción fuese ejecutada por los sacerdotes. Esto mantiene la tensión lexical señalada por la tradición auditada sin convertirla en una explicación en el cuerpo del texto.
  doctrine_reference: Nota de auditoría POB sobre personificación narrativa en Josué 6:11
translation_notes:
  revision_awareness: Se siguió la revisión más reciente marcada como sin cambios. La principal diferencia respecto del audit trail inglés es la adaptación natural al español del valor direccional de וַיָּבֹאוּ y de la intensificación de הַקֵּף, manteniendo la personificación del arca y el nombre divino según la política española del proyecto.
  spanish_consistency_notes:
  - Se usó «Yahvé» de forma consistente para יְהוָה.
  - Se preservó la repetición de «campamento» para reflejar la duplicación hebrea de הַמַּחֲנֶה.
  - «Rodeó» conserva la imagen de circunvalación sin añadir sujetos implícitos innecesarios.
  - La nota al pie explica la personificación del arca sin deshacerla en el texto principal.
