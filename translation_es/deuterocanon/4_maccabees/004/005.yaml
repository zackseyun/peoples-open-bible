translation:
  language: es
  text: y después de tomar autoridad sobre ellos[a], vino rápidamente a nuestra patria
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El texto griego conservado para este versículo parece incompleto y carece de un verbo finito explícito después de «rápidamente a nuestra patria». Para hacer inteligible la cláusula en su contexto, la versión española suple «vino».
    reason: textual_variant
lexical_decisions:
- source_word: λαβών
  english_pob_choice: after taking
  chosen_spanish: después de tomar
  alternatives_spanish:
  - habiendo tomado
  - cuando tomó
  lexicon: BDAG
  rationale: El participio aoristo se entiende como acción anterior a la cláusula principal. En español, «después de tomar» conserva la secuencia temporal sin introducir una paráfrasis excesiva.
- source_word: τὴν περὶ αὐτῶν ἐξουσίαν
  english_pob_choice: authority over them
  chosen_spanish: autoridad sobre ellos
  alternatives_spanish:
  - poder sobre ellos
  - dominio sobre ellos
  - jurisdicción sobre ellos
  lexicon: BDAG
  rationale: ἐξουσία tiene un campo semántico de autoridad, derecho o potestad. «Autoridad sobre ellos» sigue de cerca la decisión inglesa y mantiene un tono formal y claro.
- source_word: ταχύ
  english_pob_choice: quickly
  chosen_spanish: rápidamente
  alternatives_spanish:
  - de inmediato
  - velozmente
  - pronto
  lexicon: BDAG
  rationale: El adverbio expresa rapidez. «Rápidamente» es una equivalencia natural en español y no intensifica indebidamente la inmediatez.
- source_word: εἰς τὴν πατρίδα ἡμῶν
  english_pob_choice: into our homeland
  chosen_spanish: hacia nuestra patria
  alternatives_spanish:
  - a nuestra tierra natal
  - a nuestra patria
  - hacia nuestra tierra
  lexicon: LSJ
  rationale: πατρίς denota la tierra natal o patria. En español, «patria» preserva el matiz nacional/cívico de modo más directo que «hogar» o «país»; «hacia» deja abierta la dirección del movimiento, que en el griego aparece con εἰς.
theological_decisions:
- issue: Ausencia de verbo finito explícito en el segmento conservado
  english_pob_reading: The English supplies 'came' to make the clause intelligible in context.
  chosen_spanish_reading: 'Se conserva la elipsis con una frase direccional: «rápidamente hacia nuestra patria», sin añadir un verbo que el texto griego conservado no explicita.'
  alternative_spanish_readings:
  - y rápidamente vino a nuestra patria
  - y rápidamente llegó a nuestra patria
  rationale: El testimonio griego conservado parece fragmentario en este punto; por eso la versión española evita decidir un verbo no atestiguado y mantiene el valor direccional del final de la cláusula. Esto respeta la tensión textual documentada por la nota inglesa.
  doctrine_reference: No aplica; decisión textual, no doctrinal.
translation_notes:
  revision_awareness: 'El pasaje presenta alta concordancia entre el texto griego y la auditoría inglesa, con una sola cuestión relevante: la probable elipsis al final de la cláusula. No se requieren revisiones adicionales más allá de reflejar esa incompletitud en español sin forzar una reconstrucción.'
  spanish_consistency_notes:
  - Se mantiene «patria» para πατρίς, en continuidad con el sentido patriótico/nacional del término.
  - Se usa «autoridad sobre ellos» para ἐξουσία, evitando términos eclesiásticos o jurídicos más estrechos que no aparecen en el contexto.
  - La nota al pie marca la tensión textual y justifica la ausencia de un verbo finito en la traducción española.
