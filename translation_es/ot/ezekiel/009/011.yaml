revisions:
- from: 'Y he aquí[a] el hombre vestido de lino, que llevaba la tintera[b] a su cintura, dio respuesta, diciendo: «He hecho como me mandaste».'
  to: 'Y he aquí[a] el hombre vestido de lino, que tenía el estuche para escribir[b] a su cintura, trajo de vuelta el informe, diciendo: «He hecho como me mandaste».'
  rationale: La revisión ajusta dos elecciones léxicas al hebreo y al audit trail del POB. «Estuche para escribir» reproduce mejor הַקֶּסֶת como contenedor de escritura, mientras que «tintero» queda como alternativa tradicional en nota. «Trajo de vuelta el informe» refleja mejor מֵשִׁיב דָּבָר como reporte devuelto tras completar la comisión, sin perder naturalidad en español. El resto del versículo se conserva porque ya era fiel, claro y teológicamente sobrio.
