    rationale: 'הַגִּידָה לִּי מֶה עָשִׂיתָה pide una declaración concreta: «Dime qué has hecho» o «Cuéntame qué has hecho». La construcción «háblame de» introduce una preposición y un giro menos directo que no refleja tan bien la sintaxis ni la fuerza del original.'
  - severity: low
