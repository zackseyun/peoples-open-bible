  text: These men[a], after bringing them down in chains with abuse, as slaves—or rather, as conspirators—attempted to destroy them without any hearing or examination[c][b], having clothed themselves in a savagery more brutal than the law of the Scythians.
  footnotes:
  - marker: a
    text: Or 'with mistreatment' or 'with outrage'; the Greek phrase denotes abusive, degrading treatment.
    reason: lexical_alternative
  - marker: b
    text: Literally 'as slaves—or rather, as conspirators,' intensifying the accusation from mere subjugation to hostile plotting.
    reason: lexical_alternative
  - marker: c
    text: The Greek expression 'having clothed themselves in a savagery more brutal than the law of the Scythians' is rhetorically vivid; 'law of the Scythians' likely refers to Scythian custom as a proverb for extreme cruelty.
