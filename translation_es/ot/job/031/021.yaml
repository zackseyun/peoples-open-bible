translation:
  language: es
  text: si levanté mi mano contra el huérfano[a], porque vi que tenía respaldo en la puerta[b][c]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El término hebreo se refiere específicamente a quien ha perdido a su padre y, por tanto, es socialmente vulnerable.
    reason: lexical_alternative
  - marker: b
    text: La «puerta» alude a la puerta de la ciudad, donde los ancianos juzgaban los casos y se tomaban decisiones públicas.
    reason: cultural_note
  - marker: c
    text: Literalmente, «mi ayuda»; aquí significa respaldo o apoyo en un contexto legal y público.
    reason: lexical_alternative
lexical_decisions:
- source_word: אִם
  english_pob_choice: if
  chosen_spanish: si
  alternatives_spanish:
  - si acaso
  - si en verdad
  lexicon: HALOT
  rationale: La fórmula condicional de juramento en Job 31 se conserva mejor con una simple condicional española. «Si» reproduce la estructura sin añadir matices no sustentados por el hebreo.
- source_word: הֲנִיפוֹתִי
  english_pob_choice: have raised
  chosen_spanish: levanté
  alternatives_spanish:
  - alcé
  - agité
  - brandí
  lexicon: HALOT
  rationale: El hifil de נוף expresa aquí un gesto hostil con la mano. «Levanté» es natural en español y mantiene la amenaza implícita sin volver demasiado literal o demasiado interpretativo el gesto.
- source_word: עַל
  english_pob_choice: against
  chosen_spanish: contra
  alternatives_spanish:
  - sobre
  - encima de
  lexicon: HALOT
  rationale: Con un gesto agresivo de la mano, el valor adversativo se expresa mejor en español con «contra».
- source_word: יָתוֹם
  english_pob_choice: the fatherless
  chosen_spanish: el huérfano
  alternatives_spanish:
  - el padreless
  - el huérfano de padre
  lexicon: HALOT
  rationale: En español, «huérfano» comunica de manera natural la persona sin padre y vulnerable socialmente. Se conserva el sentido legal y social del término hebreo sin forzar una perífrasis poco idiomática.
- source_word: יָדִי
  english_pob_choice: my hand
  chosen_spanish: mi mano
  alternatives_spanish:
  - mi brazo
  - mi mano alzada
  lexicon: HALOT
  rationale: Se mantiene el cuerpo-partes del hebreo porque la imagen es transparente y tiene fuerza jurídica y violenta en español.
- source_word: כִּי
  english_pob_choice: because
  chosen_spanish: porque
  alternatives_spanish:
  - pues
  - ya que
  lexicon: HALOT
  rationale: Aquí introduce la causa del acto injusto. «Porque» preserva claramente la relación causal.
- source_word: אֶרְאֶה
  english_pob_choice: I saw
  chosen_spanish: veía
  alternatives_spanish:
  - vi
  - percibía
  - me daba cuenta
  lexicon: HALOT
  rationale: El verbo de percepción se adapta al encuadre condicional con imperfecto narrativo en español. «Veía» expresa la percepción continuada de que había respaldo.
- source_word: בַשַּׁעַר
  english_pob_choice: in the gate
  chosen_spanish: en la puerta
  alternatives_spanish:
  - en la puerta de la ciudad
  - en el portal
  lexicon: HALOT
  rationale: «Puerta» conserva el trasfondo cultural de la puerta/entrada urbana como lugar de juicio público y es comprensible para lectores modernos. La nota explica el sentido institucional.
- source_word: עֶזְרָתִי
  english_pob_choice: I had support
  chosen_spanish: tenía apoyo
  alternatives_spanish:
  - tenía ayuda
  - tenía respaldo
  - contaba con apoyo
  lexicon: HALOT
  rationale: El hebreo dice literalmente «mi ayuda», pero en contexto alude a apoyo o respaldo disponible en el foro legal. «Tenía apoyo» comunica esa idea sin perder la fuerza relacional del término.
translation_notes:
  revision_awareness: La versión española sigue de cerca el análisis auditado del texto hebreo y la solución inglesa aprobada, sin depender mecánicamente del inglés. Se conservaron la condicionalidad del juramento, el gesto hostil de la mano, la vulnerabilidad social del huérfano, y el sentido institucional de la «puerta».
  spanish_consistency_notes:
  - Se usa «Yahvé» como norma general cuando aparezca el nombre divino; este versículo no lo contiene.
  - Se prefirió «puerta» frente a «gente/lugar de justicia» para conservar la imagen cultural con nota explicativa.
  - «Huérfano» se eligió por claridad natural en español, con nota para precisar la referencia al hijo sin padre.
  - «Apoyo» traduce el sentido contextual de עֶזְרָתִי sin perder la idea de respaldo en el ámbito judicial.
