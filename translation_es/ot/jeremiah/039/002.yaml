translation:
  language: es
  text: En el undécimo año de Zedequías, en el cuarto mes, a los nueve días[a] del mes, se abrió brecha en la ciudad.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, más literalmente, «a los nueve del mes».
    reason: lexical_alternative
lexical_decisions:
- source_word: בְּ/עַשְׁתֵּי עֶשְׂרֵה שָׁנָה
  english_pob_choice: in the eleventh year
  chosen_spanish: en el undécimo año
  alternatives_spanish:
  - durante el undécimo año
  lexicon: HALOT
  rationale: La construcción temporal con ב más el numeral y שָׁנָה se expresa de forma natural como una ubicación temporal. «En el undécimo año» conserva el valor regnal sin añadir información.
- source_word: לְ/צִדְקִיָּהוּ
  english_pob_choice: of Zedekiah
  chosen_spanish: de Zedequías
  alternatives_spanish:
  - perteneciente a Zedequías
  - de Ṣidqiyyahu
  lexicon: HALOT
  rationale: El ל marca la referencia al reinado; en español, la fórmula idiomática y fiel es «de Zedequías». Se mantiene la forma tradicional del nombre para legibilidad, sin perder el referente histórico.
- source_word: בַּ/חֹדֶשׁ הָ/רְבִיעִ֖י
  english_pob_choice: in the fourth month
  chosen_spanish: en el cuarto mes
  alternatives_spanish:
  - en el cuarto mes del año
  lexicon: HALOT
  rationale: Se conserva la designación ordinal del calendario hebreo. «Mes» debe mantenerse, porque el texto no da una equivalencia calendárica moderna.
- source_word: בְּ/תִשְׁעָ֣ה לַ/חֹ֑דֶשׁ
  english_pob_choice: on the ninth day of the month
  chosen_spanish: a los nueve días del mes
  alternatives_spanish:
  - el nueve del mes
  - al noveno día del mes
  lexicon: HALOT
  rationale: El hebreo expresa literalmente «en/para nueve del mes», con el día implícito. Se opta por una formulación española natural que conserva la literalidad suficiente. La alternativa más explícita sería «al noveno día del mes».
- source_word: הָבְקְעָ֖ה
  english_pob_choice: was breached
  chosen_spanish: fue brechada
  alternatives_spanish:
  - fue abierta una brecha
  - fue quebrantada
  lexicon: HALOT
  rationale: El nifal perfecto femenino singular de בקע, con «la ciudad» como sujeto, indica que la ciudad fue abierta/rota mediante una brecha militar. «Fue brechada» conserva con precisión la imagen de una abertura forzada, aunque es menos común en español; por eso se mantiene su fuerza técnica en un registro bíblico formal.
- source_word: הָ/עִֽיר
  english_pob_choice: the city
  chosen_spanish: la ciudad
  lexicon: HALOT
  rationale: Se conserva el sustantivo definido del hebreo. En contexto se refiere a Jerusalén, pero la traducción mantiene «la ciudad» para no suplir lo que el texto no dice explícitamente.
translation_notes:
  revision_awareness: El texto inglés revisado permanece estable; no se documentan cambios de sentido relevantes. La decisión principal en español fue preservar la cronología regnal y la imagen militar de הָבְקְעָה con un término poco frecuente pero preciso.
  spanish_consistency_notes:
  - Se usa «Yahvé» como norma general cuando corresponda, pero este versículo no contiene el nombre divino.
  - Se mantiene «Zedequías» como forma española del nombre propio para lectura eclesial amplia.
  - Se conserva «la ciudad» en vez de explicitar «Jerusalén» para respetar el hebreo y la auditoría inglesa.
  - La fecha se traduce sin convertirla a calendario moderno, siguiendo el patrón del texto fuente.
