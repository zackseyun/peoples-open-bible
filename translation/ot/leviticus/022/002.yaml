theological_decisions:
- issue: Referent of the relative clause 'which they sanctify for me'
  chosen_reading: The clause refers to 'the holy things of the sons of Israel,' not directly to 'my holy name.'
  alternative_readings:
  - The clause could be taken more loosely with 'my holy name' in the flow of the sentence.
  rationale: Grammatically and contextually, the plural subject 'they' and participle 'sanctify' fit the holy things that the Israelites consecrate to the LORD. This also explains how priestly misuse of those holy things would profane God's holy name.
  doctrine_reference: Preserve theological tension rather than resolve it; ambiguity is limited here, but the syntactic decision is documented.
