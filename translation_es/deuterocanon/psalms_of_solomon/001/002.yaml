    rationale: Si el texto principal pasa a «rectitud», la nota debe ofrecer «justicia» como alternativa, no al revés.
  revised_spanish_text: De repente, un grito de guerra[a] fue acallado ante mí; él me oirá, porque estoy lleno de rectitud[b].
