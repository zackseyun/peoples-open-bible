revisions:
- from: Porque Yahvé te ha llamado como a una esposa abandonada y entristecida en espíritu[a], como a la esposa de la juventud[b], dice tu Dios.
  to: Porque Yahvé te ha llamado como a una esposa abandonada y entristecida en espíritu[a], como a una esposa de juventud cuando es rechazada[b], dice tu Dios.
  rationale: Se restaura en el texto principal la cláusula hebrea כִּי תִמָּאֵס, exigida por la fuente y por la auditoría inglesa. También se ajusta la segunda comparación a un español más natural y completo, manteniendo la imagen marital y la dificultad sintáctica documentada en nota. No se requiere adjudicación especial porque la solución sigue directamente la evidencia y el POB inglés.
