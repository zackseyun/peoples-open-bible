    text: 'Griego: «sucesor de Moisés en profecías», lo que hace más explícita la relación de Josué con Moisés como una de sucesión que lo que hace la redacción hebrea conservada.'
    reason: alternative_reading
  - marker: b
    text: «Una gran salvación» también puede traducirse «una gran liberación» o «una gran victoria»; el hebreo תשועה y el griego σωτηρία pueden tener tanto sentido militar como uno más amplio de salvación.
    reason: lexical_alternative
  revision_rationale: 'Se revisa para alinear el español con el expediente auditado del POB: 1) se cambia «siervo» por «asistente» para reflejar mejor משרת y la decisión léxica documentada; 2) se corrigen las notas al pie para que preserven exactamente las alternativas significativas del inglés, especialmente la lectura griega sobre sucesión y la amplitud semántica de «salvación»; 3) se mantiene el resto del texto, que ya era fiel y natural.'
