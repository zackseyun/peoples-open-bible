review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien la secuencia y el sentido del hebreo: ejecución por apedreamiento, resultado de muerte, fórmula deuteronómica de purga del mal, y efecto disuasorio sobre todo Israel. Conserva acertadamente el masculino explícito de כָּל אַנְשֵׁי עִירוֹ como ''todos los hombres de su ciudad'' y mantiene ''purgarás el mal'' para la fórmula legal. Sin embargo, la nota al pie [a] está defectuosa porque repite la misma lectura en vez de dar la alternativa documentada (''toda la gente'' / ''todo el pueblo''), y hay una inconsistencia interna en las decisiones léxicas sobre la concordancia final, aunque el texto principal ya tiene la forma correcta.'
  spanish_quality_summary: 'El texto principal es claro, natural y de buen registro bíblico-jurídico: ''Entonces todos los hombres de su ciudad lo apedrearán con piedras, y morirá. Así purgarás el mal de en medio de ti, y todo Israel oirá y temerá.'' La redacción es legible en español neutro y digna. El único problema real de calidad visible al lector es la nota al pie mal formulada. No hace falta cambiar la redacción principal.'
  glossary_alignment: No hay conflicto con la terminología del proyecto en este versículo. 'Purgarás' concuerda con la fórmula deuteronómica documentada; 'el mal' preserva הָרָע; y no hay términos sensibles del glosario mayor (Yahvé, Mesías, etc.) en este pasaje.
  issues:
  - severity: medium
    issue: La nota al pie [a] repite la lectura principal en vez de presentar la alternativa documentada.
    rationale: 'El inglés auditado preserva una alternativa significativa: ''all the people of his city'' frente a la lectura principal literal ''all the men of his city''. En español, la nota actual dice esencialmente lo mismo dos veces y por tanto no cumple la función lexical_alternative.'
  - severity: low
    issue: Las decisiones léxicas contienen una inconsistencia de concordancia en la explicación de יִשְׁמְעוּ / וְיִרָאוּ.
    rationale: El texto principal correctamente dice 'oirá y temerá' con sujeto colectivo singular 'todo Israel', pero las notas de decisión mencionan plural y hasta dejan una forma dudosa 'oirá[n]?'. Esto no exige cambiar el texto bíblico mostrado, pero sí confirma que hubo descuido editorial.
  revised_spanish_text: Entonces todos los hombres de su ciudad lo apedrearán[a] con piedras, y morirá. Así purgarás el mal de en medio de ti, y todo Israel oirá y temerá.
  revised_footnotes:
  - marker: a
    text: 'O: ''toda la gente de su ciudad''; el hebreo, literalmente, ''todos los hombres de su ciudad''.'
    reason: lexical_alternative
  revision_rationale: Se conserva intacto el texto principal porque es fiel y natural. Solo se corrige la nota al pie para que refleje la alternativa léxica documentada en el expediente inglés y no repita la misma lectura principal. No se requiere adjudicación adicional.
