review_pass:
  verdict: revise
  source_alignment_summary: El borrador acierta en la pasiva de ὑψώθησαν y en la imagen hiperbólica de ἕως τῶν ἄστρων, pero la cláusula final necesita una reparación de orden y naturalidad en español. La forma griega πέσωσιν es tercera persona plural, por lo que debe evitarse la primera persona; en eso el borrador sí preserva correctamente la gramática frente al inglés auditado inconsistente. Sin embargo, «No caerán ciertamente» suena poco idiomático en español y atenúa la fuerza enfática al ubicar «ciertamente» en posición marcada.
  spanish_quality_summary: '«Fueron exaltados hasta las estrellas; dijeron: “Ciertamente no caerán”» es más natural, claro y digno en español eclesial moderno que «No caerán ciertamente». Mantiene el tono de jactancia sin calco torpe. La puntuación con dos puntos y comillas angulares es adecuada.'
  glossary_alignment: 'No hay términos de glosario mayor involucrados como Yahvé, Mesías o Espíritu. «Exaltados» concuerda con la decisión auditada sobre ὑψώθησαν en contexto de orgullo. «Hasta las estrellas» preserva bien la hipérbole. La corrección principal es estilístico-lexical en la negación enfática: mejor «Ciertamente no caerán».'
  issues:
  - severity: medium
    issue: Orden poco natural en «No caerán ciertamente»
    rationale: Aunque transmite la negación enfática y respeta la tercera persona plural del griego, en español general suena forzado. «Ciertamente no caerán» o «de ningún modo caerán» comunica mejor la fuerza de οὐ μή.
  - severity: low
    issue: No se preservan las alternativas léxicas documentadas en notas
    rationale: El inglés auditado conserva alternativas para «hasta las estrellas» y la negación enfática. No es imprescindible en español para entender el texto principal, pero podría añadirse si el proyecto exige reflejar todas las alternativas. Aquí no es necesario para una reparación menor.
  revised_spanish_text: 'Fueron exaltados hasta las estrellas; dijeron: «Ciertamente no caerán».'
  revision_rationale: Se mantiene la pasiva y la tercera persona plural del griego, pero se reordena el adverbio para producir un español natural que conserve la negación enfática y el tono de jactancia.
