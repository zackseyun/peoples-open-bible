  yaml_path: translation/ot/isaiah/033/004.yaml
  text: And your spoil will be gathered like the gathering of locusts[a]; like the rushing of swarms[b], they rush upon it.
  footnotes:
  - marker: a
    text: Or 'like the gathering of the devouring locust'; the Hebrew term חָסִיל can denote a particular kind or stage of locust.
    reason: lexical_alternative
  - marker: b
    text: The Hebrew in the second comparison is difficult. 'Like the rushing of swarms' could also be rendered 'like an attack of locusts' or 'like locusts rushing about.'
    reason: alternative_reading
