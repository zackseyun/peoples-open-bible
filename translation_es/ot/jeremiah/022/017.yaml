translation:
  language: es
  text: Porque tus ojos y tu corazón no están puestos sino en tu ganancia deshonesta[a], en derramar sangre inocente y en practicar opresión y extorsión[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «tu lucro injusto». El hebreo puede referirse más ampliamente a ganancia obtenida por medios injustos.
    reason: lexical_alternative
  - marker: b
    text: O «y en hacer opresión y violencia». El término hebreo raro detrás de «extorsión» también puede denotar de manera más amplia una maldad violenta o despiadada.
    reason: lexical_alternative
lexical_decisions:
- source_word: אֵין ... כִּי אִם
  english_pob_choice: are set on nothing except
  chosen_spanish: no están sino puestos en
  alternatives_spanish:
  - están puestos solo en
  - no están puestos más que en
  lexicon: HALOT
  rationale: La construcción hebrea expresa exclusividad de enfoque o intención. «No están sino puestos en» conserva esa restricción y suena natural en español, sin perder la fuerza del hebreo sobre ojos y corazón como centro de atención y deseo.
- source_word: עֵינֶיךָ
  english_pob_choice: your eyes
  chosen_spanish: tus ojos
  alternatives_spanish:
  - tu mirada
  lexicon: HALOT
  rationale: Se mantiene el término corporal/metafórico «ojos», porque en el hebreo señala atención, inclinación o propósito. «Mirada» suavizaría la imagen y perdería parte de la literalidad figurada.
- source_word: לִבְּךָ
  english_pob_choice: your heart
  chosen_spanish: tu corazón
  alternatives_spanish:
  - tu mente
  - tu interior
  lexicon: HALOT
  rationale: «Corazón» conserva el sentido hebreo del centro de voluntad, intención y deseo, no solo emoción. «Mente» explicaría solo parcialmente el término.
- source_word: בִּצְעֶךָ
  english_pob_choice: your dishonest gain
  chosen_spanish: tu ganancia deshonesta
  alternatives_spanish:
  - tu ganancia injusta
  - tu lucro ilícito
  - tu codicia
  lexicon: HALOT
  rationale: El sustantivo apunta a ganancia obtenida por medios injustos o codiciosos. «Ganancia deshonesta» preserva el resultado económico y su carga moral, siguiendo la decisión inglesa sin convertirlo en una mera actitud interna.
- source_word: דַּם הַנָּקִי
  english_pob_choice: innocent blood
  chosen_spanish: sangre inocente
  alternatives_spanish:
  - la sangre del inocente
  lexicon: HALOT
  rationale: Es una expresión bíblica estable para la sangre de personas sin culpa. «Sangre inocente» es breve e idiomática en español y mantiene la frase forense y violenta del original.
- source_word: לִשְׁפּוֹךְ
  english_pob_choice: shedding
  chosen_spanish: derramar
  alternatives_spanish:
  - verter
  - derramando
  lexicon: HALOT
  rationale: El verbo hebreo es el habitual para derramar sangre. En español, el infinitivo «derramar» conserva la imagen y funciona bien en la serie de sustantivos/infinitivos del versículo.
- source_word: הָעֹשֶׁק
  english_pob_choice: oppression
  chosen_spanish: opresión
  alternatives_spanish:
  - explotación
  - abuso
  lexicon: HALOT
  rationale: «Opresión» expresa la injusticia social y el daño ejercido sobre otros, que es el alcance más amplio del término en el contexto profético.
- source_word: הַמְּרוּצָה
  english_pob_choice: extortion
  chosen_spanish: extorsión
  alternatives_spanish:
  - violencia
  - rudeza
  - ruthless wrongdoing
  lexicon: HALOT
  rationale: La palabra es rara y el contexto la vincula con explotación violenta o conducta rapaz. Se mantiene «extorsión» como equivalente claro y compatible con el audit trail inglés; en nota se preserva la alternativa más amplia «opresión y violencia».
- source_word: לַעֲשׂוֹת
  english_pob_choice: practicing
  chosen_spanish: practicando
  alternatives_spanish:
  - haciendo
  - llevando a cabo
  lexicon: HALOT
  rationale: El infinitivo final describe conducta continua. «Practicando» transmite hábito o ejercicio sostenido mejor que un simple «hacer».
translation_notes:
  revision_awareness: Se siguió de cerca el audit trail inglés, manteniendo la exclusividad de la construcción hebrea, la metáfora de ojos y corazón, y la decisión de traducir el término raro final con un equivalente principal y una alternativa semántica preservada en nota.
  spanish_consistency_notes:
  - Se usó «Yahvé» como forma por defecto solo cuando el texto lo requiera; este versículo no contiene el tetragrámaton.
  - Se conservaron sustantivos concretos («ojos», «corazón», «sangre») para respetar la imaginería hebrea.
  - Se evitó suavizar la secuencia de delitos; la lista mantiene paralelismo y progresión de culpa.
