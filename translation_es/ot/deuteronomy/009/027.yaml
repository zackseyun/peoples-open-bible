translation:
  language: es
  text: Acuérdate de tus siervos, Abraham, Isaac y Jacob. No vuelvas tu mirada hacia[a] la terquedad[b] de este pueblo, ni hacia su maldad, ni hacia su pecado.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: También puede traducirse «No te fijes en» o «No prestes atención a».
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: «dureza» o «terquedad»; la idea es la de obstinación moral del pueblo, no una expresión técnica como «de dura cerviz».'
    reason: lexical_alternative
lexical_decisions:
- source_word: זְכֹר
  english_pob_choice: Remember
  chosen_spanish: Acuérdate de
  alternatives_spanish:
  - Recuerda
  - Haz memoria de
  lexicon: HALOT
  rationale: En un ruego dirigido a Dios, el hebreo funciona como una súplica pactual. «Acuérdate de» conserva el sentido relacional y es natural en español bíblico contemporáneo sin sonar arcaico.
- source_word: לַעֲבָדֶיךָ
  english_pob_choice: your servants
  chosen_spanish: tus siervos
  alternatives_spanish:
  - tus esclavos
  - tus servidores
  lexicon: HALOT
  rationale: Aquí עבד describe honoríficamente a Abraham, Isaac y Jacob en relación con Dios. «Siervos» comunica el vínculo reverente mejor que «esclavos», que en español resaltaría demasiado la condición de servidumbre física.
- source_word: לְאַבְרָהָם לְיִצְחָק וּלְיַעֲקֹב
  english_pob_choice: Abraham, Isaac, and Jacob
  chosen_spanish: Abraham, Isaac y Jacob
  lexicon: Convención onomástica estándar
  rationale: Los nombres propios se conservan con la forma española habitual, sin añadir glosas ni alteraciones.
- source_word: אַל תֵּפֶן אֶל
  english_pob_choice: Do not turn your attention to
  chosen_spanish: No vuelvas tu mirada hacia
  alternatives_spanish:
  - No te fijes en
  - No vuelvas tu atención hacia
  - No mires
  lexicon: HALOT
  rationale: פנה con אֶל expresa literalmente «volverse hacia». En español, «volver la mirada hacia» preserva la imagen física y la idea de prestar atención o consideración sin cargar la frase con una paráfrasis excesiva.
- source_word: קְשִׁי
  english_pob_choice: the stubbornness
  chosen_spanish: la terquedad
  alternatives_spanish:
  - la dureza
  - la obstinación
  lexicon: HALOT
  rationale: El sustantivo puede significar dureza o terquedad. «Terquedad» comunica bien la obstinación moral en español actual, manteniendo el matiz de resistencia persistente sin importar una expresión técnica ajena al verso.
- source_word: הָעָם הַזֶּה
  english_pob_choice: this people
  chosen_spanish: este pueblo
  alternatives_spanish:
  - esta gente
  - esta nación
  lexicon: HALOT
  rationale: «Pueblo» conserva el referente comunitario y de pacto del hebreo עם mejor que «nación» en este contexto.
- source_word: רִשְׁעֹו
  english_pob_choice: their wickedness
  chosen_spanish: su maldad
  alternatives_spanish:
  - su impiedad
  - su perversidad
  lexicon: HALOT
  rationale: רֶשַׁע/רִשְׁעָה denota maldad o impiedad moral. «Maldad» es una equivalencia directa y clara en español; el singular posesivo conserva el colectivo hebreo de manera natural.
- source_word: חַטָּאתוֹ
  english_pob_choice: their sin
  chosen_spanish: su pecado
  alternatives_spanish:
  - su culpa
  - su pecado
  lexicon: HALOT
  rationale: חַטָּאת puede referirse al pecado concreto o al acto culpable. «Pecado» es la forma más directa y transparente en español; el posesivo singular sigue el patrón colectivo del hebreo.
theological_decisions:
- issue: Cómo traducir עבד aplicado a los patriarcas en oración pactual
  english_pob_reading: your servants
  chosen_spanish_reading: tus siervos
  alternative_spanish_readings:
  - tus esclavos
  rationale: El contexto es la intercesión de Moisés, apelando a la relación pactal de Dios con Abraham, Isaac y Jacob. «Siervos» conserva la deferencia sin introducir una carga de esclavitud física que el contexto no enfatiza.
  doctrine_reference: DOCTRINE.md Translation philosophy §1; tratamiento contextual de términos de servicio/bondad
- issue: Cómo reflejar el verbo פנה con אֶל en un ruego de intercesión
  english_pob_reading: Do not turn your attention to
  chosen_spanish_reading: No vuelvas tu mirada hacia
  alternative_spanish_readings:
  - No vuelvas tu atención hacia
  - No te fijes en
  rationale: El hebreo literalmente habla de girarse hacia algo. En español, la metáfora de «mirada» mantiene el gesto de atender o considerar sin perder el componente imagístico del original.
  doctrine_reference: DOCTRINE.md Translation philosophy §2; principio de imagen conceptual conservada
- issue: Si conviene explicitar la referencia colectiva en los posesivos singulares del hebreo
  english_pob_reading: their wickedness ... their sin
  chosen_spanish_reading: su maldad ... su pecado
  alternative_spanish_readings:
  - la maldad de ellos ... el pecado de ellos
  rationale: El hebreo usa formas singulares con referencia colectiva al pueblo. En español, el posesivo singular «su» con sustantivos singulares suena natural y conserva la referencia comunitaria sin forzar el estilo.
  doctrine_reference: DOCTRINE.md Translation philosophy §6
translation_notes:
  revision_awareness: Se tuvo en cuenta el estado de alta concordancia del control cruzado y la nota de revisión más reciente como sin cambios. La redacción española conserva el valor pactual de «acuérdate», la metáfora de «volver la mirada» y el par semántico «maldad / pecado» sin introducir ampliaciones interpretativas.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» solo cuando el texto fuente lo requiera; aquí no aparece.
  - Se usa «siervos» conforme al valor honorífico del hebreo עבד en este contexto patriarcal.
  - 'Se conserva el paralelismo de tres miembros en la segunda línea: terquedad / maldad / pecado.'
  - Los posesivos singulares («su») reflejan el singular hebreo con referencia colectiva al pueblo.
  - El tono es reverente y apto para lectura pública eclesial sin arcaísmos excesivos.
