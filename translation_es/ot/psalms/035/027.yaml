translation:
  language: es
  text: '¡Griten de alegría y alégrense los que se deleitan en mi vindicación[a]! Que digan siempre: «¡Sea engrandecido Yahvé, que se deleita en la paz[b] de su siervo!»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «mi justicia» o «mi rectitud». El hebreo puede referirse a la reivindicación del salmista en un sentido legal o moral; aquí probablemente apunta a su vindicación.
    reason: lexical_alternative
  - marker: b
    text: «Paz» también puede significar «bienestar» o «prosperidad».
    reason: lexical_alternative
lexical_decisions:
- source_word: יָרֹנּוּ
  english_pob_choice: shout for joy
  chosen_spanish: ¡griten de alegría!
  alternatives_spanish:
  - ¡canten de alegría!
  - ¡clamen con alegría!
  lexicon: HALOT
  rationale: El verbo expresa un clamor gozoso, no solo canto. «Griten de alegría» conserva la fuerza pública y exultante del hebreo, como el inglés auditado 'shout for joy'.
- source_word: וְיִשְׂמְחוּ
  english_pob_choice: and be glad
  chosen_spanish: alégrense
  alternatives_spanish:
  - y estén alegres
  - y regocíjense
  lexicon: HALOT
  rationale: שמח denota alegrarse. «Alégrense» mantiene el paralelismo con el primer verbo y evita una repetición pesada en español.
- source_word: חֲפֵצֵי
  english_pob_choice: those who delight in
  chosen_spanish: los que se deleitan en
  alternatives_spanish:
  - los que toman placer en
  - los que desean
  lexicon: HALOT
  rationale: El participio expresa deleite o agrado. «Se deleitan en» reproduce el matiz afectivo de forma natural en español.
- source_word: צִדְקִי
  english_pob_choice: my vindication
  chosen_spanish: mi vindicación
  alternatives_spanish:
  - mi justicia
  - mi rectitud
  lexicon: HALOT
  rationale: En este contexto de conflicto legal, el término apunta a la reivindicación favorable del salmista. «Vindicación» preserva esa dimensión forense mejor que «justicia» o «rectitud», aunque se conservan como alternativas legítimas.
- source_word: וְיֹאמְרוּ תָמִיד
  english_pob_choice: let them say continually
  chosen_spanish: Que digan siempre
  alternatives_spanish:
  - y que digan continuamente
  - y digan sin cesar
  lexicon: HALOT
  rationale: La construcción mantiene el tono volitivo/jussivo de la línea anterior. «Siempre» es una forma natural de תָמִיד en español y sostiene la idea de repetición constante.
- source_word: יִגְדַּל יְהוָה
  english_pob_choice: May Yahweh be magnified
  chosen_spanish: ¡Sea engrandecido Yahvé!
  alternatives_spanish:
  - ¡Sea exaltado Yahvé!
  - ¡Grande sea Yahvé!
  lexicon: HALOT
  rationale: El imperfecto funciona como deseo o exhortación. «Sea engrandecido» reproduce el sentido verbal de גדל ('ser hecho grande') y preserva la alabanza sin convertirla en simple afirmación.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahvéh
  lexicon: HALOT
  rationale: Se sigue el estándar del proyecto para el Tetragrámaton. «Yahvé» mantiene el nombre propio divino en lugar de sustituirlo por un título.
- source_word: הֶחָפֵץ
  english_pob_choice: who delights
  chosen_spanish: que se deleita
  alternatives_spanish:
  - que toma placer
  - que desea
  lexicon: HALOT
  rationale: El participio retoma el campo semántico de חפץ. «Se deleita» enlaza de manera natural con «los que se deleitan» y conserva la repetición intencional del hebreo.
- source_word: שְׁלוֹם
  english_pob_choice: peace
  chosen_spanish: la paz
  alternatives_spanish:
  - el bienestar
  - la prosperidad
  lexicon: HALOT
  rationale: «Paz» es la traducción más directa y clara. El hebreo puede abarcar bienestar o prosperidad, pero aquí «paz» mantiene el sentido básico sin perder amplitud.
- source_word: עַבְדּוֹ
  english_pob_choice: his servant
  chosen_spanish: su siervo
  alternatives_spanish:
  - su esclavo
  - su servidor
  lexicon: HALOT
  rationale: En salmos, la designación relacional del salmista hacia Dios suele expresarse mejor con «siervo». «Esclavo» sería demasiado fuerte para el tono del verso en español, aunque queda documentada la gama del término עבד.
theological_decisions:
- issue: Sentido de צִדְקִי en contexto forense
  english_pob_reading: my vindication
  chosen_spanish_reading: mi vindicación
  alternative_spanish_readings:
  - mi justicia
  - mi rectitud
  rationale: El verso celebra el desenlace favorable del conflicto con acusadores. «Vindicación» comunica la idea de ser reconocido como el que tenía razón, sin convertir el término en una afirmación abstracta de perfección moral. Las alternativas se conservan porque la palabra hebrea admite un campo semántico más amplio.
  doctrine_reference: Translation philosophy §3; principio de preservar alternativas legítimas cuando la ambigüedad es real
- issue: Tratamiento del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahvéh
  rationale: 'Se sigue el valor doctrinal del proyecto: el Tetragrámaton se traslada como nombre propio y no se enmascara con «SEÑOR». Esto conserva la referencia personal al Dios del pacto.'
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה/YHWH → Yahvé'
- issue: Alcance de שָׁלוֹם
  english_pob_reading: peace
  chosen_spanish_reading: la paz
  alternative_spanish_readings:
  - el bienestar
  - la prosperidad
  rationale: En este contexto, 'paz' es la opción más inmediata y pública para una doxología. Se mantiene abierta la amplitud semántica del hebreo mediante alternativas, sin forzar una paráfrasis interpretativa.
  doctrine_reference: Translation philosophy §3; tratamiento contextual de términos polisémicos
translation_notes:
  revision_awareness: No se registraron revisiones aplicadas; la última pasada de revisión indicó que el texto permanecía sin cambios y el consenso de verificación fue alto.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» para יְהוָה conforme al estándar del proyecto.
  - Se usa «vindicación» para צִדְקִי siguiendo la lectura forense del contexto, sin ocultar las alternativas semánticas.
  - «Siervo» se usa para עַבְדּוֹ por adecuación contextual en español bíblico, mientras que «esclavo» queda solo como alternativa documentada.
  - La puntuación reproduce el tono exhortativo y litúrgico del verso con dos segmentos de júbilo y una cita directa final.
