  source_alignment_summary: 'El hebreo contiene solo tres topónimos en lista: חָצוֹר, רָמָה, גִּתָּיִם. El borrador preserva correctamente que son nombres propios y no los traduce semánticamente. Sin embargo, la nota al pie está anclada en «Hazor[a]» aunque la alternativa léxica documentada corresponde a גִּתָּיִם, no a חָצוֹר. Además, «Ramá» no está bien justificado frente a la forma española bíblica más reconocible «Rama», y la nota española introduce una alternativa adicional («Guitaim») no respaldada por la auditoría inglesa.'
  spanish_quality_summary: 'El texto es legible, pero conviene ajustar dos puntos para mejor fidelidad y naturalidad bíblica en español: usar «Rama» como forma estándar y mover la nota al topónimo pertinente. También es preferible no sobrecargar la nota con variantes no auditadas cuando la evidencia solo documenta «Gittayim» como alternativa fonética inglesa.'
  glossary_alignment: No hay términos teológicos del glosario principal en este versículo. En nombres propios, la política de transliteración se mantiene mejor con «Hazor, Rama, Gitaim[a]». «Rama» encaja mejor con el uso español tradicional y ampliamente inteligible; «Gitaim» puede mantenerse como forma principal, con nota limitada a la alternativa «Gittaim».
  issues:
