translation:
  language: es
  text: Su lengua es una flecha mortífera[a]; habla con engaño. Con su boca cada hombre habla de paz con su prójimo[b], pero dentro de sí pone su emboscada[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «una flecha mortal» o «una flecha afilada para matar». El participio hebreo de «degollar/sacrificar» enfatiza la intención letal, no solo la agudeza.
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: «habla paz con su prójimo»; es decir, le habla de manera amistosa o pacífica mientras planea hacerle daño por dentro.'
    reason: cultural_note
  - marker: c
    text: O «dentro de sí pone una emboscada» o «en su interior tiende una trampa». El hebreo deja implícito el objeto de la emboscada.
    reason: lexical_alternative
lexical_decisions:
- source_word: חֵץ
  english_pob_choice: arrow
  chosen_spanish: flecha
  alternatives_spanish:
  - arco
  - dardo
  lexicon: HALOT
  rationale: El sustantivo designa un proyectil. En español, «flecha» es la equivalencia natural y conserva la imagen violenta del arma, como «arrow» en el texto inglés.
- source_word: שוחט
  english_pob_choice: slaughtering
  chosen_spanish: de matanza
  alternatives_spanish:
  - degolladora
  - mortal
  - asesina
  lexicon: HALOT
  rationale: El participio de שחט expresa acción de sacrificar/degollar con intención letal. «De matanza» conserva la fuerza homicida sin suavizarla a mero filo o agudeza.
- source_word: לְשׁוֹנָם
  english_pob_choice: their tongue
  chosen_spanish: su lengua
  alternatives_spanish:
  - su lengua(s)
  - la lengua de ellos
  lexicon: HALOT
  rationale: El hebreo usa singular colectivo. En español, «su lengua» comunica bien el sujeto metafórico y el reproche corporativo sin sonar forzado.
- source_word: מִרְמָה
  english_pob_choice: deceit
  chosen_spanish: engaño
  alternatives_spanish:
  - decepción
  - fraude
  - traición
  lexicon: HALOT
  rationale: El sustantivo denota habla/conducta engañosa. «Engaño» es claro y natural en español, y mantiene el valor moral del término.
- source_word: דִבֵּר
  english_pob_choice: it speaks
  chosen_spanish: habla
  alternatives_spanish:
  - dice
  - ha hablado
  lexicon: HALOT
  rationale: Aunque la forma es 3ms, el sujeto metafórico inmediato es «lengua». En español, el presente «habla» expresa bien el carácter habitual de la denuncia.
- source_word: בְּפִיו
  english_pob_choice: with his mouth
  chosen_spanish: con su boca
  alternatives_spanish:
  - por su boca
  - de su boca
  lexicon: HALOT
  rationale: La preposición ב es circunstancial/instrumental. «Con su boca» reproduce el contraste entre la exterioridad del habla y la intención interior.
- source_word: שָׁלוֹם
  english_pob_choice: peace
  chosen_spanish: paz
  alternatives_spanish:
  - bienestar
  - shalom
  lexicon: HALOT
  rationale: «Paz» es la equivalencia estándar y mantiene la fórmula relacional de hablar pacíficamente al prójimo.
- source_word: רֵעֵהוּ
  english_pob_choice: to his neighbor
  chosen_spanish: a su prójimo
  alternatives_spanish:
  - a su vecino
  - a su amigo
  - a su compañero
  lexicon: HALOT
  rationale: «Prójimo» preserva el sentido relacional de רֵעַ y es más preciso en español bíblico que «vecino» en este contexto.
- source_word: ידבר
  english_pob_choice: speaks
  chosen_spanish: habla
  alternatives_spanish:
  - dirá
  - está hablando
  lexicon: HALOT
  rationale: El imperfecto expresa acción habitual. «Habla» en presente simple comunica de manera natural el patrón repetido.
- source_word: וּבְקִרְבּוֹ
  english_pob_choice: within himself
  chosen_spanish: dentro de sí
  alternatives_spanish:
  - en su interior
  - por dentro
  - en su corazón
  lexicon: HALOT
  rationale: «Dentro de sí» conserva el contraste interior/exterior sin añadir una localización más interpretativa como «corazón».
- source_word: יָשִׂים
  english_pob_choice: he sets
  chosen_spanish: pone
  alternatives_spanish:
  - coloca
  - dispone
  - tiende
  lexicon: HALOT
  rationale: El verbo שׂים es amplio. «Pone» es idiomático y suficientemente general para el acto de colocar una emboscada.
- source_word: אָרְבוֹ
  english_pob_choice: his ambush
  chosen_spanish: su emboscada
  alternatives_spanish:
  - su acecho
  - su trampa
  - su lazo
  lexicon: HALOT
  rationale: ארב designa acecho/emboscada. «Emboscada» es la opción más directa y mantiene la idea de esperar para dañar; el posesivo refleja el sufijo pronominal.
translation_notes:
  revision_awareness: 'Se siguió el estado de revisión más reciente, que indica que no hubo cambios posteriores y que el acuerdo con la fuente es alto. La redacción española preserva las tres tensiones principales del verso: el sujeto metafórico («lengua»), la violencia implícita en שוחט y la ambigüedad del objeto de «emboscada».'
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» como terminología predeterminada del proyecto solo cuando aparece el nombre divino; en este versículo no aplica.
  - Se prefirió «prójimo» para רֵעַ por su valor relacional bíblico y eclesial amplio.
  - Se evitó suavizar la metáfora bélica con un término genérico como «filosa», porque el hebreo enfatiza letalidad, no solo agudeza.
