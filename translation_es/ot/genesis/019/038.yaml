translation:
  language: es
  text: La menor también dio a luz un hijo y le puso por nombre Ben-ammí[a]; él es el padre de los amonitas[b] hasta hoy.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Ben-ammí probablemente significa «hijo de mi pueblo» o «hijo de mi pariente».
    reason: lexical_alternative
  - marker: b
    text: Literalmente, «los hijos de Amón».
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהַצְּעִירָה
  english_pob_choice: The younger
  chosen_spanish: La menor
  alternatives_spanish:
  - La más joven
  - La hija menor
  lexicon: HALOT
  rationale: El sustantivo/adjetivo con artículo funciona de manera sustantiva, refiriéndose a la hija menor de Lot en el contexto inmediato. «La menor» conserva la comparación y suena natural en español.
- source_word: גַם הִוא
  english_pob_choice: also
  chosen_spanish: también
  alternatives_spanish:
  - ella también
  - incluso ella
  lexicon: HALOT
  rationale: La partícula añade énfasis de que la menor hizo lo mismo que la mayor. «También» expresa bien esa relación sin sobrecargar el verso.
- source_word: יָלְדָה בֵּן
  english_pob_choice: bore a son
  chosen_spanish: dio a luz un hijo
  alternatives_spanish:
  - engendró un hijo
  - tuvo un hijo
  lexicon: HALOT
  rationale: La expresión hebrea es narrativa y literal; «dio a luz un hijo» conserva el sentido biológico y resulta idiomático en español.
- source_word: וַתִּקְרָא שְׁמוֹ
  english_pob_choice: called his name
  chosen_spanish: le puso por nombre
  alternatives_spanish:
  - lo llamó
  - lo nombró
  lexicon: HALOT
  rationale: La fórmula hebrea de nombrar se comunica con naturalidad en español como «le puso por nombre», manteniendo el valor formal del acto de nombrar.
- source_word: בֶּן עַמִּי
  english_pob_choice: Ben-ammi
  chosen_spanish: Ben-ammí
  alternatives_spanish:
  - Ben-ammi
  - Ben Ammi
  lexicon: HALOT
  rationale: Se translitera el nombre propio y se ajusta la acentuación al español para facilitar la lectura. Se conserva el guion como parte del nombre compuesto.
- source_word: הוּא אֲבִי
  english_pob_choice: he is the father
  chosen_spanish: él es el padre
  alternatives_spanish:
  - él fue el padre
  - él es el antepasado
  lexicon: HALOT
  rationale: La cláusula identifica a Ben-ammí como progenitor; «padre» mantiene el valor genealógico de ancestro sin introducir una paráfrasis más distante.
- source_word: בְנֵי עַמּוֹן
  english_pob_choice: the Ammonites
  chosen_spanish: los amonitas
  alternatives_spanish:
  - los hijos de Amón
  - los hijos de Ammon
  lexicon: HALOT
  rationale: Aunque el hebreo dice literalmente «hijos de Amón», en español «amonitas» comunica de forma clara el grupo étnico descendiente, como reflejó la revisión inglesa más natural.
- source_word: עַד הַיּוֹם
  english_pob_choice: to this day
  chosen_spanish: hasta hoy
  alternatives_spanish:
  - hasta el día de hoy
  - hasta este día
  lexicon: HALOT
  rationale: La expresión temporal es idiomática en español bíblico contemporáneo y preserva la referencia a la perspectiva del narrador.
theological_decisions:
- issue: Valor genealógico de «padre» en una línea de descendencia
  english_pob_reading: he is the father of the Ammonites
  chosen_spanish_reading: él es el padre de los amonitas
  alternative_spanish_readings:
  - él fue el padre de los amonitas
  - él fue el antepasado de los amonitas
  rationale: La frase hebrea presenta a Ben-ammí como antecesor del pueblo; en español, «padre» conserva esa función genealógica sin necesidad de explicitar más de lo que el texto dice.
  doctrine_reference: Gn 19:38; uso genealógico de «padre» en narración bíblica
translation_notes:
  revision_awareness: El texto inglés revisado cambió «the sons of Ammon» por «the Ammonites» para una lectura más natural, sin perder el sentido literal de «hijos de Amón». La versión española sigue esa decisión al usar «amonitas» en el cuerpo principal y reservar la literalidad en nota.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» fuera de este versículo porque no aparece el tetragrámaton ni un equivalente directo.
  - Se transliteró el nombre propio como «Ben-ammí» para conservar el valor onomástico y la forma compuesta.
  - Se prefirió «amonitas» en el texto principal por claridad etnónima, con la literalidad hebrea explicada en nota.
  - La expresión «hasta hoy» sigue el valor narrativo estándar de עַד הַיּוֹם.
