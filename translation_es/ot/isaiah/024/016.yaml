  glossary_alignment: No hay conflictos con la terminología proyectual principal. «Gloria al justo» preserva el singular de לַצַּדִּיק conforme a la decisión teológica auditada. «Me consumo» es una buena equivalencia española para la lectura tradicional de רָזִי לִי. «Los traidores traicionan; con traición los traidores traicionan» mantiene bien el efecto cognado del hebreo.
