translation:
  language: es
  text: Porque Yahvé tratará con clemencia a sus fieles[a], y borrará sus transgresiones por medio de la disciplina[b]; porque la vida de los justos es para siempre.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O ''piadosos''; traducción previa: ''sus santos''.'
    reason: lexical_alternative
  - marker: b
    text: O 'mediante la disciplina' o 'con corrección'.
    reason: lexical_alternative
lexical_decisions:
- source_word: φείσεται
  english_pob_choice: will spare
  chosen_spanish: perdonará
  alternatives_spanish:
  - ahorrará
  - se apiadará de
  - perdonará y perdonará
  lexicon: BDAG
  rationale: El griego expresa la idea de dispensar o eximir del juicio pleno. En español, 'perdonará' comunica bien la clemencia divina en el contexto inmediato de corrección disciplinaria. 'Ahorrará' suena menos natural aquí y 'se apiadará de' desplaza el matiz hacia compasión general.
- source_word: ὁσίων
  english_pob_choice: his faithful ones
  chosen_spanish: sus fieles
  alternatives_spanish:
  - sus santos
  - sus piadosos
  - los fieles de él
  lexicon: BDAG
  rationale: En este libro, ὅσιοι apunta al grupo covenantalmente leal, no simplemente a 'santos' en sentido eclesiástico posterior. 'Fieles' reproduce bien esa lealtad devota y evita una carga terminológica ajena al contexto.
- source_word: παραπτώματα
  english_pob_choice: trespasses
  chosen_spanish: transgresiones
  alternatives_spanish:
  - faltas
  - pecados
  - desvíos
  lexicon: BDAG
  rationale: '''Transgresiones'' conserva el sentido de ofensas morales o caídas contra el orden de Dios. ''Faltas'' es más débil y ''pecados'' es más general; ''transgresiones'' mantiene mejor el valor del término sin endurecerlo excesivamente.'
- source_word: ἐξαλείψει
  english_pob_choice: will blot out
  chosen_spanish: borrará
  alternatives_spanish:
  - borrará por completo
  - cancelará
  - extinguirá
  lexicon: BDAG
  rationale: El verbo tiene la imagen de eliminar o suprimir algo escrito o registrado. 'Borrará' es la forma más natural y conserva la imagen de eliminación; 'borrará por completo' explicita demasiado, y 'cancelará' resulta menos imagético.
- source_word: ἐν παιδείᾳ
  english_pob_choice: through discipline
  chosen_spanish: por medio de la disciplina
  alternatives_spanish:
  - mediante la disciplina
  - con corrección
  - con castigo
  lexicon: BDAG
  rationale: '''Disciplina'' expresa mejor el sentido de formación correctiva que simplemente castigo. ''Por medio de'' refleja bien la función instrumental de ἐν aquí, sin perder la tensión entre misericordia y corrección.'
- source_word: δικαίων
  english_pob_choice: the righteous
  chosen_spanish: los justos
  alternatives_spanish:
  - los rectos
  - los justos de Dios
  lexicon: BDAG
  rationale: '''Los justos'' es la equivalencia más natural en español para δίκαιοι en este contexto sapiencial/devocional. Mantiene el valor moral y relacional del término con claridad y sin tecnicismos.'
- source_word: εἰς τὸν αἰῶνα
  english_pob_choice: is forever
  chosen_spanish: es para siempre
  alternatives_spanish:
  - es por siempre
  - es eterno
  - dura para siempre
  lexicon: BDAG
  rationale: '''Es para siempre'' reproduce la duración ilimitada del griego con un español claro y solemne. ''Dura para siempre'' es posible, pero cambia ligeramente la formulación; ''es eterno'' interpreta más que traduce.'
theological_decisions:
- issue: Relación entre perdón y disciplina
  english_pob_reading: The Lord's sparing of his faithful ones includes the corrective removal of their trespasses through discipline.
  chosen_spanish_reading: El perdón divino no elimina la disciplina; más bien, Dios borra las transgresiones por medio de ella.
  alternative_spanish_readings:
  - Yahvé los perdona aparte de disciplinarlos.
  - La disciplina es principalmente castigo retributivo.
  - Dios perdona sin corregir realmente a los suyos.
  rationale: 'La sintaxis une estrechamente el perdón de Yahvé con el borrado de las transgresiones ''por medio de la disciplina''. La traducción conserva esa tensión: misericordia real y corrección formativa, sin convertir la disciplina en mera condena ni separarla del acto de perdonar.'
  doctrine_reference: sabiduría bíblica; corrección divina; santificación/discipulado
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión más reciente que prefirió 'blot out' y 'through discipline', así como la corrección anterior que identifica ὅσιοι en este libro como 'faithful ones' y no como 'holy ones'. La redacción española conserva esa decisión léxica y la traslada a un registro natural y publicable.
  spanish_consistency_notes:
  - Se mantiene Yahvé para Κύριος según el criterio del proyecto.
  - Se evita 'santos' para ὅσιοι porque en este libro el término funciona como 'fieles' o 'piadosos'.
  - '''Disciplina'' se conserva como corrección formativa, no como castigo meramente punitivo.'
  - '''Justos'' traduce δικαίων en un sentido estable y bíblicamente reconocible en español.'
