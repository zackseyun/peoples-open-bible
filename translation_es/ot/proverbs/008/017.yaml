review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien el sentido hebreo y la línea auditada en inglés: mantiene el pronombre enfático inicial, la reciprocidad de «amar», el valor gnómico presente y la nota léxica sobre שׁחר como ‘buscar temprano / con diligencia’. No introduce categorías teológicas ajenas al contexto sapiencial. Sin embargo, «me hallan» en presente suena menos natural en español que «me encuentran», y la nota puede ajustarse para sonar más idiomática en español sin perder la alternativa temporal.'
  spanish_quality_summary: 'El español es claro y digno, pero «hallan» resulta algo más literario y menos natural para lectura amplia. «Encuentran» comunica mejor en español neutral contemporáneo sin perder fidelidad. El resto del verso es legible y sobrio. La nota también se beneficia de un ajuste menor: «puede significar buscar temprano» suena más directo que «puede referirse a buscar de madrugada».'
  glossary_alignment: No hay conflictos con la terminología base del proyecto. No aparecen Yahvé, Mesías/Cristo ni otros términos sensibles del glosario. La decisión de mantener la Sabiduría personificada sin carga cristológica adicional está bien alineada con la auditoría inglesa.
  issues:
  - severity: medium
    issue: «me hallan» suena menos natural que «me encuentran» en español general
    rationale: Aunque «hallar» es válido y bíblico, en presente plural «me hallan» puede sentirse rígido o arcaizante para un público amplio. «Me encuentran» conserva el mismo sentido de מצא y mejora la naturalidad sin perder dignidad.
  - severity: low
    issue: La nota léxica puede expresarse de forma más idiomática
    rationale: La idea está bien, pero «puede significar buscar temprano» y «por extensión, buscar con diligencia o empeño» fluye mejor en español que «puede referirse a buscar de madrugada».
  revised_spanish_text: Yo amo a los que me aman[a], y los que me buscan con diligencia me encuentran.
  revised_footnotes:
  - marker: a
    text: 'O: «los que me buscan temprano me encuentran». El verbo hebreo puede significar buscar temprano y, por extensión, buscar con diligencia o empeño.'
    reason: lexical_alternative
