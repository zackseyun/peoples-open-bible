translation:
  language: es
  text: Al director del coro[a]. Cántico, salmo. Aclamen a Dios, toda la tierra[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «Para el director musical» o «Al maestro de coro».
    reason: lexical_alternative
  - marker: b
    text: O «Griten a Dios, toda la tierra».
    reason: lexical_alternative
lexical_decisions:
- source_word: לַמְנַצֵּחַ
  english_pob_choice: For the choir director
  chosen_spanish: Al director del coro
  alternatives_spanish:
  - Para el director musical
  - Al maestro de coro
  - Para el músico director
  lexicon: מְנַצֵּחַ
  rationale: La expresión señala al encargado de la ejecución musical del salmo. «Al director del coro» conserva la función sin imponer una formulación eclesiástica fija; «para» también sería posible, pero «al» refleja mejor la dirección del encabezado.
- source_word: שִׁיר מִזְמוֹר
  english_pob_choice: A song, a psalm
  chosen_spanish: Cántico, salmo
  alternatives_spanish:
  - Una canción, un salmo
  - Un canto, un salmo
  - Cántico y salmo
  lexicon: שִׁיר / מִזְמוֹר
  rationale: Se mantienen dos sustantivos breves y paralelos como en el hebreo y el inglés POB. «Cántico» es más natural y digno que «canción» en este registro litúrgico.
- source_word: הָרִיעוּ
  english_pob_choice: Shout to / Shout joyfully to
  chosen_spanish: Griten jubilosamente
  alternatives_spanish:
  - Griten a
  - Aclamen
  - Proclamen con júbilo
  lexicon: רוע
  rationale: El hebreo expresa un clamor jubiloso dirigido a Dios. «Griten» conserva la fuerza imperativa; «jubilosamente» explicita el matiz de gozo que el inglés POB retomó en su primera versión y que sigue siendo compatible con el contexto poético.
- source_word: לֵאלֹהִים
  english_pob_choice: to God
  chosen_spanish: a Dios
  alternatives_spanish:
  - a Dios mismo
  - al Dios
  lexicon: אֱלֹהִים
  rationale: Se traduce con el valor normal de referencia a Dios. No se requiere un marcador especial aquí porque el nombre común no presenta ambigüedad de número en el español de este verso.
- source_word: כָּל הָאָרֶץ
  english_pob_choice: all the earth
  chosen_spanish: toda la tierra
  alternatives_spanish:
  - toda la tierra entera
  - todo el mundo
  lexicon: כָּל / אֶרֶץ
  rationale: «Tierra» conserva el paralelismo cósmico y poético del hebreo mejor que «mundo», que podría sonar más abstracto o antropocéntrico en español.
theological_decisions:
- issue: Naturaleza del imperativo dirigido a la creación entera
  english_pob_reading: Shout to God, all the earth
  chosen_spanish_reading: Griten jubilosamente a Dios, toda la tierra
  alternative_spanish_readings:
  - Griten a Dios, toda la tierra
  - Aclamen a Dios, toda la tierra
  rationale: El hebreo convoca a toda la tierra a un clamor público de alabanza. Mantener el imperativo plural y la dirección explícita a Dios preserva la amplitud universal del llamado sin añadir doctrina implícita ajena al texto.
  doctrine_reference: Sal 66:1; Sal 98:4-6; Sal 100:1
translation_notes:
  revision_awareness: La redacción española sigue la revisión más reciente del POB que restauró la cláusula principal omitida y dejó intacta la superscripción. Por eso se incluye tanto el encabezado musical como la orden imperativa final, sin añadir un matiz de «júbilo» más allá del que el hebreo permite y el contexto poético favorece.
  spanish_consistency_notes:
  - Se mantiene «Dios» para אֱלֹהִים en coherencia con el proyecto.
  - Se evita «SEÑOR» porque el texto no contiene יהוה.
  - «Cántico, salmo» conserva la brevedad del encabezado hebreo y el tono del audit trail inglés.
