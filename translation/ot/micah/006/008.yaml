theological_decisions:
- issue: Rendering of חֶסֶד
  chosen_reading: steadfast love
  alternative_readings:
  - mercy
  - kindness
  - covenant loyalty
  rationale: The verse's ethical triad is often traditionally rendered 'love mercy,' but חֶסֶד regularly carries covenantal loyalty and enduring love, not merely compassion. 'Steadfast love' preserves that theological depth while remaining readable. Because 'mercy' is a familiar alternative, it is preserved in a footnote.
  doctrine_reference: Translation philosophy §§1, 5
- issue: Representative masculine address in אָדָם
  chosen_reading: O man
  alternative_readings:
  - humankind
  - human one
  rationale: The Hebrew is singular masculine and functions representatively. Following the doctrine's gender-accurate principle, the translation keeps the masculine singular rather than neutralizing it, while a footnote can clarify the representative sense if needed.
  doctrine_reference: Translation philosophy §4
