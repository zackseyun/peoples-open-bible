translation:
  language: es
  text: Será para él y para su descendencia después de él un pacto de sacerdocio perpetuo[a][b], porque tuvo celo por su Dios[c] e hizo expiación por los hijos de Israel[d].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «un sacerdocio eterno».'
    reason: alternative_reading
  - marker: b
    text: El hebreo puede expresar continuidad duradera del orden sacerdotal.
    reason: lexical_note
  - marker: c
    text: 'O: «fue celoso por su Dios». El hebreo puede expresar celo o celos pactuales por la honra de Dios.'
    reason: lexical_alternative
  - marker: d
    text: «Hijos de Israel» es la designación bíblica tradicional del pueblo de Israel.
    reason: cultural_note
lexical_decisions:
- source_word: וְהָיְתָה
  english_pob_choice: It shall be
  chosen_spanish: Será
  alternatives_spanish:
  - Y será
  - Y llegará a ser
  lexicon: HALOT
  rationale: El verbo imperfectivo en este contexto expresa la asignación futura de la promesa; en español, «Será» comunica de forma natural esa disposición sin agregar matices innecesarios.
- source_word: לּוֹ וּלְזַרְעוֹ אַחֲרָיו
  english_pob_choice: for him and for his offspring after him
  chosen_spanish: para él y para su descendencia después de él
  alternatives_spanish:
  - para él y para su simiente después de él
  - para él y para sus hijos después de él
  lexicon: HALOT
  rationale: «Descendencia» conserva el sentido colectivo de זֶרַע y su sucesión histórica. «Después de él» refleja la continuidad generacional sin endurecer el texto.
- source_word: בְּרִית
  english_pob_choice: a covenant
  chosen_spanish: un pacto
  alternatives_spanish:
  - un convenio
  - una alianza
  lexicon: HALOT
  rationale: En español bíblico «pacto» es el equivalente más claro y estándar para בְּרִית en un contexto de don/promesa divina.
- source_word: כְּהֻנַּת עוֹלָם
  english_pob_choice: of a perpetual priesthood
  chosen_spanish: de sacerdocio perpetuo
  alternatives_spanish:
  - de sacerdocio eterno
  - de sacerdocio para siempre
  lexicon: HALOT
  rationale: «Perpetuo» conserva el valor de continuidad institucional de עוֹלָם sin convertir automáticamente la expresión en una afirmación filosófica de eternidad abstracta.
- source_word: תַּחַת אֲשֶׁר
  english_pob_choice: because
  chosen_spanish: porque
  alternatives_spanish:
  - ya que
  - pues
  lexicon: HALOT
  rationale: La relación causal es la más natural en español aquí, y «porque» comunica bien la base de la concesión.
- source_word: קִנֵּא לֵאלֹהָיו
  english_pob_choice: he was jealous for his God
  chosen_spanish: tuvo celo por su Dios
  alternatives_spanish:
  - fue celoso por su Dios
  - mostró celo por su Dios
  lexicon: HALOT
  rationale: En español «celos» suele sonar demasiado cercano a envidia o posesividad; «celo» preserva mejor la idea de lealtad ardiente/covenantal. Por eso se mantiene la tensión lexical del hebreo sin una lectura emocional estrecha.
- source_word: וַיְכַפֵּר
  english_pob_choice: made atonement
  chosen_spanish: hizo expiación
  alternatives_spanish:
  - hizo propiciación
  - hizo expiación por
  lexicon: HALOT
  rationale: «Hizo expiación» conserva el campo cultual de כפר y evita sustituirlo por una paráfrasis más interpretativa. En español, esta forma mantiene la resonancia sacrificial del texto.
- source_word: עַל בְּנֵי יִשְׂרָאֵל
  english_pob_choice: for the sons of Israel
  chosen_spanish: por los hijos de Israel
  alternatives_spanish:
  - por los hijos de Israel, es decir, el pueblo de Israel
  - por los israelitas
  lexicon: HALOT
  rationale: Se conserva la formulación tradicional y gramaticalmente masculina del hebreo con «hijos de Israel», siguiendo la precisión del source packet y el estilo POB.
theological_decisions:
- issue: Matiz de קנא aplicado a Finees
  english_pob_reading: he was jealous for his God
  chosen_spanish_reading: tuvo celo por su Dios
  alternative_spanish_readings:
  - fue celoso por su Dios
  - mostró celo por su Dios
  rationale: Se evita «celoso» porque en español moderno puede sugerir envidia o sospecha. «Tuvo celo» preserva el sentido de ardor por la honra de Dios y deja visible la tensión entre celo y celos del hebreo.
  doctrine_reference: DOCTRINE.md Translation philosophy §§3, 5
- issue: Alcance de עוֹלָם en el sacerdocio prometido
  english_pob_reading: perpetual priesthood
  chosen_spanish_reading: sacerdocio perpetuo
  alternative_spanish_readings:
  - sacerdocio eterno
  - sacerdocio para siempre
  rationale: «Perpetuo» comunica duración continua y estable en el marco del pacto. Evita ampliar innecesariamente la afirmación a una tesis metafísica más fuerte que la del hebreo.
  doctrine_reference: DOCTRINE.md Translation philosophy §§1, 3, 6
- issue: Designación nacional בני ישראל
  english_pob_reading: sons of Israel
  chosen_spanish_reading: hijos de Israel
  alternative_spanish_readings:
  - pueblo de Israel
  - israelitas
  rationale: Se conserva la forma masculina del original como designación étnico-bíblica tradicional, manteniendo la trazabilidad con el hebreo y la política de precisión gramatical.
  doctrine_reference: DOCTRINE.md Translation philosophy §4
translation_notes:
  revision_awareness: 'El pasaje fue revisado previamente sin cambios sustanciales; el control cruzado indicó alto acuerdo y no requirió ajustes. Esta versión española sigue de cerca el auditable POB en inglés, conservando las mismas tensiones léxicas principales: קנא = celo/jealousy, עוֹלָם = perpetuo/everlasting, y בְּנֵי יִשְׂרָאֵל como designación masculina tradicional.'
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» como norma general del proyecto, pero este versículo no contiene el Tetragrámaton; aparece «su Dios» por fidelidad al hebreo.
  - Se usó «hizo expiación» para כפר, en coherencia con el vocabulario cultual POB.
  - Se conservó «hijos de Israel» por correspondencia directa con el hebreo masculino plural y por coherencia interna con el registro bíblico tradicional.
