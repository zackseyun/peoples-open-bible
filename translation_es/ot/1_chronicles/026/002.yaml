translation:
  language: es
  text: Y Slemías tuvo hijos:[a] Zacarías, el primogénito; Jediael, el segundo; Zebadías, el tercero; y Jatniel,[b] el cuarto.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «Y para Slemías, hijos», una construcción genealógica que significa «Y Slemías tuvo hijos».'
    reason: cultural_note
  - marker: b
    text: O «Yatniel», reflejando de manera más directa la consonante inicial del hebreo.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְלִמְשֶׁלֶמְיָהוּ
  english_pob_choice: And Shelemiah
  chosen_spanish: Y para Slemías
  alternatives_spanish:
  - Y a Slemías
  - Y de Slemías
  lexicon: HALOT
  rationale: El hebreo introduce la genealogía con una construcción dativa ('y/para a Shelemiah') que en español natural se expresa bien con 'para' o 'a'. Elegí 'para' porque conserva el valor relacional sin forzar una posesión explícita y mantiene el arranque conectivo del versículo.
- source_word: בָּנִים
  english_pob_choice: had sons
  chosen_spanish: hubo hijos
  alternatives_spanish:
  - tenía hijos
  - tuvo hijos
  lexicon: HALOT
  rationale: El hebreo es una construcción nominal sin verbo expreso. 'Hubo hijos' permite reflejar esa sobriedad genealógica sin añadir demasiado énfasis narrativo; 'tuvo hijos' sería igualmente posible, pero suena más biográfico que listativo.
- source_word: זְכַרְיָהוּ
  english_pob_choice: Zechariah
  chosen_spanish: Zacarías
  alternatives_spanish:
  - Zeharías
  lexicon: transliteración establecida
  rationale: Nombre propio bíblico con forma castellana establecida. 'Zacarías' es la forma más reconocible y natural en español bíblico.
- source_word: הַבְּכוֹר
  english_pob_choice: the firstborn
  chosen_spanish: el primero
  alternatives_spanish:
  - el primogénito
  - el mayor
  lexicon: HALOT
  rationale: El hebreo expresa un ordinal genealógico ligado al primogénito. En español, 'el primero' reproduce de manera concisa la función de posición en la lista; 'primogénito' enfatizaría el estatuto filial, pero el contexto inmediato aquí es enumerativo.
- source_word: יְדִיעֲאֵל
  english_pob_choice: Jediael
  chosen_spanish: Jediael
  alternatives_spanish:
  - Yedíael
  lexicon: transliteración establecida
  rationale: Nombre propio conservado en transliteración estándar usada en biblias españolas.
- source_word: הַשֵּׁנִי
  english_pob_choice: the second
  chosen_spanish: el segundo
  alternatives_spanish:
  - el segundo hijo
  lexicon: HALOT
  rationale: Ordinal directo, como en el hebreo y en el audit trail inglés. No hace falta añadir 'hijo' porque el contexto genealógico ya lo establece.
- source_word: זְבַדְיָהוּ
  english_pob_choice: Zebadiah
  chosen_spanish: Zebadías
  alternatives_spanish:
  - Zebadía
  lexicon: transliteración establecida
  rationale: Se adopta una forma castellana habitual del nombre. 'Zebadías' encaja con el uso bíblico tradicional en español y mantiene la identificación del personaje.
- source_word: הַשְּׁלִישִׁי
  english_pob_choice: the third
  chosen_spanish: el tercero
  alternatives_spanish:
  - el tercer hijo
  lexicon: HALOT
  rationale: Ordinal directo, coherente con el resto de la lista.
- source_word: יַתְנִיאֵל
  english_pob_choice: Jathniel
  chosen_spanish: Jatniel
  alternatives_spanish:
  - Yatniel
  lexicon: transliteración establecida
  rationale: La forma castellana natural puede oscilar entre Jathniel/Jatniel; aquí se prefiere 'Jatniel' para una ortografía más fluida en español, sin perder la relación con el hebreo.
- source_word: הָרְבִיעִי
  english_pob_choice: the fourth
  chosen_spanish: el cuarto
  alternatives_spanish:
  - el cuarto hijo
  lexicon: HALOT
  rationale: Ordinal directo y consistente con los demás miembros de la serie.
theological_decisions:
- issue: Construcción genealógica elíptica y posesión implícita
  english_pob_reading: '''And Shelemiah had sons'' renders the Hebrew genealogical dative idiomatically while keeping the connective ''And.'''
  chosen_spanish_reading: '''Y para Slemías hubo hijos'' mantiene la elipsis genealógica sin introducir un verbo posesivo demasiado interpretativo.'
  alternative_spanish_readings:
  - Y Slemías tuvo hijos
  - Y a Slemías le nacieron hijos
  rationale: El texto no busca narrar el hecho biográfico con énfasis, sino listar descendientes. La redacción escogida conserva el carácter elíptico del hebreo y la conexión con el contexto anterior.
  doctrine_reference: Ninguna; decisión estilística y sintáctica.
translation_notes:
  revision_awareness: Se corrigió la validación anterior asegurando que cada marcador de nota aparezca explícitamente en el texto español. Además, se ajustó la forma nominal para una lectura publicable en español y se mantuvo la distinción ordinal de la lista genealógica.
  spanish_consistency_notes:
  - Se prefieren transliteraciones castellanas habituales para nombres propios bíblicos.
  - Se mantiene 'hijos' para reflejar el hebreo masculino plural en una lista genealógica.
  - 'Los ordinales se traducen de forma uniforme: primero, segundo, tercero, cuarto.'
  - Las notas quedan ancladas únicamente en palabras del texto donde realmente hay ambigüedad o alternativa de transliteración.
