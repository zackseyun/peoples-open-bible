translation:
  language: es
  text: Moab es mi lavatorio[a]; sobre Edom arrojo mi sandalia; sobre Filistia[b], grita en triunfo por mí.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Lavatorio» traduce la imagen de un recipiente para lavar. Tradicionalmente se ha vertido de forma más arcaica como «washpot» en inglés; la imagen expresa humillación y subyugación.
    reason: lexical_alternative
  - marker: b
    text: El hebreo también puede entenderse, según una traducción más tradicional, como «sobre Filistia yo grito en triunfo». La forma verbal es difícil y puede leerse ya sea como un imperativo dirigido a Filistia o, menos probablemente, como una declaración en primera persona.
    reason: alternative_reading
lexical_decisions:
- source_word: סִיר רַחְצִי
  english_pob_choice: my washbasin
  chosen_spanish: mi lavacro
  alternatives_spanish:
  - mi palangana
  - mi recipiente para lavar
  - mi lavaplatos
  lexicon: HALOT
  rationale: סִיר nombra un recipiente/pote, y רַחְצִי lo vincula con el lavado. En español, "lavacro" conserva la imagen concreta del recipiente de lavado con un tono digno y algo más literario que "palangana"; evita el arcaísmo fuerte de "lavaza" o "ollita" y mantiene la idea de humillación/subyugación.
- source_word: אַשְׁלִיךְ נַעֲלִי
  english_pob_choice: I cast my sandal
  chosen_spanish: arrojo mi sandalia
  alternatives_spanish:
  - lanzo mi sandalia
  - echo mi sandalia
  - arrojo mi zapato
  lexicon: HALOT
  rationale: El hifil de שלך expresa lanzar/arrojar. נַעַל es calzado; "sandalia" encaja mejor con el mundo antiguo que "zapato". "Arrojo" conserva el registro poético y directo del gesto simbólico.
- source_word: עַל אֱדוֹם
  english_pob_choice: on Edom
  chosen_spanish: sobre Edom
  alternatives_spanish:
  - en Edom
  - contra Edom
  - encima de Edom
  lexicon: HALOT
  rationale: La preposición עַל se conserva como "sobre" para reproducir la imagen espacial de poner/arrojar la sandalia sobre Edom como signo de dominio. "Contra" explicaría la hostilidad, pero perdería la imagen corporal concreta.
- source_word: עָלַי פְּלֶשֶׁת
  english_pob_choice: over Philistia ... for me
  chosen_spanish: sobre Filistia
  alternatives_spanish:
  - contra Filistia
  - acerca de Filistia
  - para mí, sobre Filistia
  lexicon: HALOT
  rationale: La secuencia es difícil. En español se mantiene "sobre Filistia" para dejar visible el marco espacial/poético y no resolver prematuramente la sintaxis oscura. El matiz de la sufijación en 1cs queda insinuado por el contexto general y se explicita en la nota.
- source_word: הִתְרֹעָעִי
  english_pob_choice: shout in triumph
  chosen_spanish: da un grito de triunfo
  alternatives_spanish:
  - grita en triunfo
  - eleva un grito de triunfo
  - prorrumpe en gritos
  lexicon: HALOT
  rationale: La forma reflexiva/iterativa de רוע expresa un grito fuerte, a menudo de victoria o batalla. En español, "da un grito de triunfo" conserva la fuerza del grito sin sobrecargar con una paráfrasis militar que el hebreo no exige de manera inequívoca.
- source_word: מוֹאָב / אֱדוֹם / פְּלֶשֶׁת
  english_pob_choice: Moab / Edom / Philistia
  chosen_spanish: Moab / Edom / Filistia
  alternatives_spanish:
  - Moab / Edom / Palestina
  - Moab / Idumea / Filistea
  lexicon: HALOT
  rationale: Se transliteran los nombres propios nacionales/territoriales siguiendo la norma del proyecto. "Filistia" preserva el nombre de la tierra/nación en este pasaje y evita el anacronismo de "Filisteos".
theological_decisions:
- issue: Fuerza del imperativo הִתְרֹעָעִי dirigido a Filistia
  english_pob_reading: 'An ironic/subjugation formula: ''over Philistia, shout in triumph for me.'''
  chosen_spanish_reading: 'Una fórmula irónica de sujeción: ''sobre Filistia, da un grito de triunfo por mí.'''
  alternative_spanish_readings:
  - '''Filistia, triunfa por causa mía'''
  - '''Sobre Filistia, yo doy un grito de triunfo'' (con re-puntuación)'
  rationale: La morfología masorética apunta a un imperativo femenino singular, posible porque las naciones se tratan como femeninas. En contexto de conquista y dominio sobre enemigos, la línea se entiende mejor como un mandato irónico que señala sometimiento, no como una invitación literal a que Filistia se alegre independientemente. La traducción mantiene la tensión visible.
  doctrine_reference: 'Translation philosophy §3: preservar la tensión teológica en vez de resolverla'
translation_notes:
  revision_awareness: Se siguió el último pase de revisión, que indicó que no había cambios necesarios, pero se atendió al señalamiento general de revisión pendiente en la línea, conservando la ambigüedad gramatical de הִתְרֹעָעִי y el carácter humillante de la metáfora.
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando el texto base lo requiere; aquí no aparece el Tetragrámaton.
  - Se prefiere «Filistia» para el nombre territorial/nacional, coherente con la decisión inglesa POB.
  - Se mantiene el paralelismo poético y la dureza de la imaginería sin suavizarla a un lenguaje devocional más familiar.
