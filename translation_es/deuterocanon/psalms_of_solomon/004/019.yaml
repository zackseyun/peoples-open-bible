translation:
  language: es
  text: Y que su casa carezca de todo lo que llenaría[a] su alma.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «llenaría» conserva la imagen de plenitud del griego; también podría entenderse «satisfaría», si se quisiera destacar más el deseo o apetito interior.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐλλιπὴς
  english_pob_choice: lack
  chosen_spanish: carezca de
  alternatives_spanish:
  - le falte
  - esté desprovista de
  - sea deficiente en
  lexicon: LSJ
  rationale: El griego es un adjetivo en una cláusula sin verbo, con valor de deseo o imprecación. En español, «carezca de» expresa de manera natural la carencia pedida sin volverlo demasiado rígido ni introducir un verbo ajeno al sentido.
- source_word: ὁ οἶκος αὐτοῦ
  english_pob_choice: his house
  chosen_spanish: su casa
  alternatives_spanish:
  - su casa y su familia
  - su hogar
  - su casa/linaje
  lexicon: LSJ
  rationale: «οἶκος» puede referirse a la casa física o al hogar/familia. «Su casa» conserva la forma del griego y permite oír también el sentido ampliado de la casa como ámbito de provisión y pertenencia.
- source_word: ἀπὸ παντὸς
  english_pob_choice: everything
  chosen_spanish: de todo
  alternatives_spanish:
  - de cualquier cosa
  - de todo lo
  lexicon: LSJ
  rationale: La preposición con este genitivo expresa privación respecto de toda cosa de ese tipo. En español, «de todo» funciona con naturalidad junto a «carezca» y mantiene la amplitud del griego.
- source_word: οὗ ἐμπλήσει
  english_pob_choice: that would fill
  chosen_spanish: que llenaría
  alternatives_spanish:
  - con lo que llenaría
  - que satisfaría
  lexicon: LSJ
  rationale: La relativa indica aquello que colmaría o llenaría. «Que llenaría» sigue de cerca la imagen de plenitud del texto griego y evita estrechar el sentido a «satisfacer», aunque esa posibilidad queda implícita.
- source_word: ψυχὴν αὐτοῦ
  english_pob_choice: his soul
  chosen_spanish: su alma
  alternatives_spanish:
  - a sí mismo
  - su vida
  - su apetito
  lexicon: LSJ
  rationale: «ψυχή» puede significar alma, vida, yo mismo o apetito según el contexto. Aquí se conserva «alma» para mantener la imagen interna del griego sin reducirla a una sola interpretación psicológica o física.
translation_notes:
  revision_awareness: 'La versión inglesa auditada optó por una equivalencia óptima: hizo idiomática la imprecación («may his house lack everything...») sin perder la imagen de llenura. La propuesta española sigue esa misma línea, usando una construcción de deseo con verbo de carencia («carezca de») y manteniendo el paralelismo entre privación total y plenitud del alma.'
  spanish_consistency_notes:
  - 'Se preserva el campo semántico de carencia/plenitud: carezca / llenaría.'
  - «Casa» se mantiene como término amplio para οἶκος, sin cerrar el sentido a edificio ni a familia exclusivamente.
  - «Alma» traduce ψυχή de forma conservadora, dejando abierta la posibilidad de apetito o interioridad.
