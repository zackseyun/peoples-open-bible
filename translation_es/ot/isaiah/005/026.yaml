review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien la secuencia y el sentido del hebreo: levantar una señal, silbar como convocatoria, procedencia remota, y llegada rápida de la fuerza convocada. También conserva adecuadamente la tensión entre el objeto colectivo previo y el verbo singular final. Sin embargo, «les silbará» suena poco idiomático en español bíblico moderno y puede sugerir un silbido dirigido personalmente a personas, no una señal de convocatoria. Además, en la nota de נֵס conviene priorizar «bandera» antes que «estandarte», más natural en español general.'
  spanish_quality_summary: El texto es generalmente claro y digno, pero requiere una pequeña mejora de naturalidad. «y silbará por ellos» o «y les dará un silbido» no son ideales; la opción más natural y fiel es «y les dará un silbido de convocatoria» o, más conciso, «y les silbará» con nota explicativa. Aun así, en una traducción principal conviene evitar esa construcción marcada. También «velozmente» funciona, pero «rápidamente, con presteza» o «rápidamente, deprisa» serían menos elegantes; por tanto puede mantenerse. La reparación principal es el verbo con complemento.
  glossary_alignment: No hay conflicto con la terminología base del proyecto. No aparecen Yahvé, Mesías, Cristo, Espíritu, etc. Las decisiones «señal», «naciones», «tierra» y «viene» están alineadas con la evidencia y con el rastro POB. La retención del singular final es correcta.
  issues:
  - severity: medium
    issue: «les silbará» es una construcción poco natural en español para una convocatoria militar o a distancia.
    rationale: Aunque calca bien la sintaxis funcional del inglés, en español suena menos idiomática. El hebreo שָׁרַק describe emitir un silbido agudo de llamada; una redacción como «silbará para convocarlas» expresa mejor la función sin perder el sentido.
  - severity: low
    issue: El orden de alternativas en la nota [a] puede mejorarse.
    rationale: Para נֵס, «bandera» suele ser más accesible que «estandarte» en español general, aunque ambas son válidas. Es un ajuste menor de legibilidad.
  revised_spanish_text: Él levantará una señal para las naciones desde lejos[a], y silbará para convocarlas[b] desde el extremo de la tierra; y he aquí, rápidamente, velozmente[c], viene.
  revised_footnotes:
