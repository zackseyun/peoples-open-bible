revisions:
- from: 'Esta es la ley: cuando un hombre muere en una tienda[a], todo el que entra en la tienda y todo el que está en la tienda quedará impuro por siete días.'
  to: 'Esta es la ley: cuando una persona muera en una carpa[a], todo el que entre en la carpa y todo el que esté en la carpa quedará impuro durante siete días.'
  rationale: 'Se hicieron ajustes menores para mejorar la fidelidad funcional y la claridad en español: «carpa» evita la ambigüedad de «tienda»; «una persona» comunica mejor el valor genérico de אָדָם en español actual; «durante siete días» suena más natural que «por siete días». También se armonizó la nota con el nuevo término principal.'
