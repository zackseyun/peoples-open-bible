translation:
  language: es
  text: Y Yahvé tu Dios, él mismo los expulsará de delante de ustedes y los desposeerá de delante de ustedes; y ustedes tomarán posesión de su tierra[a], tal como Yahvé su Dios les dijo[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «y ustedes heredarán su tierra». El verbo hebreo puede significar «heredar» o «tomar posesión de»; aquí se escogió la segunda opción para reflejar el contexto de conquista.
    reason: lexical_alternative
  - marker: b
    text: El hebreo dice literalmente «tal como Yahvé su Dios les habló/dijo»; el sentido incluye una promesa, pero el texto principal conserva el verbo de habla.
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: Se sigue el criterio del proyecto para el nombre divino, preservando el Tetragrámaton en forma auditable y no enmascarada. En español, 'Yahvé' es la forma establecida en el POB y mantiene la referencia de pacto.
- source_word: אֱלֹהֵיכֶם
  english_pob_choice: your God
  chosen_spanish: tu Dios / su Dios
  alternatives_spanish:
  - sus dioses
  - vuestro Dios
  lexicon: HALOT
  rationale: 'El hebreo con sufijo plural y en relación con YHWH es singular: el Dios de Israel. En español se conserva con ''Dios'' en singular; el cambio de ''tu'' a ''su'' en la última ocurrencia sigue el matiz del discurso directo plural hacia el pueblo.'
- source_word: הוּא
  english_pob_choice: he himself
  chosen_spanish: él mismo
  alternatives_spanish:
  - él
  - él es quien
  lexicon: HALOT
  rationale: El pronombre independiente es enfático. 'Él mismo' preserva esa énfasis sin sonar forzado en español.
- source_word: יֶהְדֳּפֵם
  english_pob_choice: will drive them out
  chosen_spanish: los expulsará
  alternatives_spanish:
  - los arrojará
  - los echará fuera
  - los empujará lejos
  lexicon: HALOT
  rationale: La raíz הדף expresa expulsión/expulsar con fuerza. 'Expulsará' comunica el alejamiento violento y funciona bien con el contexto de conquista.
- source_word: מִפְּנֵיכֶם
  english_pob_choice: from before you
  chosen_spanish: de delante de ustedes
  alternatives_spanish:
  - de su presencia
  - delante de ustedes
  lexicon: HALOT
  rationale: La expresión hebrea es idiomática y espacial. 'De delante de ustedes' conserva el valor literal sin volverse opaco; además mantiene el paralelismo con la segunda cláusula.
- source_word: וְהוֹרִישׁ אֹתָם
  english_pob_choice: and dispossess them
  chosen_spanish: y los desposeerá
  alternatives_spanish:
  - y los despojará
  - y los hará perder la posesión
  - y los echará
  lexicon: HALOT
  rationale: El hiphil de ירש aquí causa la pérdida de posesión por parte de los ocupantes previos. 'Desposeer' distingue esta acción de la expulsión anterior y preserva la nuance jurídico-territorial.
- source_word: מִלִּפְנֵיכֶם
  english_pob_choice: from before you
  chosen_spanish: de delante de ustedes
  alternatives_spanish:
  - de su presencia
  - delante de ustedes
  lexicon: HALOT
  rationale: Se mantiene la misma fórmula idiomática del primer hemistiquio para conservar el paralelismo del hebreo.
- source_word: וִירִשְׁתֶּם
  english_pob_choice: and you will take possession of
  chosen_spanish: tomarán posesión de
  alternatives_spanish:
  - heredarán
  - poseerán
  - recibirán en herencia
  lexicon: HALOT
  rationale: Aunque el verbo puede significar 'heredar', en el contexto de conquista el matiz activo de adquirir territorio se expresa mejor con 'tomar posesión de'. Se evita así suavizar el acto histórico-jurídico.
- source_word: אֶת אַרְצָם
  english_pob_choice: their land
  chosen_spanish: su tierra
  alternatives_spanish:
  - la tierra de ellos
  - su país
  lexicon: HALOT
  rationale: La referencia es a la tierra ocupada por esas naciones; 'tierra' es el equivalente natural y bíblicamente adecuado en español.
- source_word: כַּאֲשֶׁר דִּבֶּר
  english_pob_choice: just as ... spoke
  chosen_spanish: tal como ... les dijo
  alternatives_spanish:
  - como ... habló
  - según ... habló
  - tal como ... habló
  lexicon: HALOT
  rationale: El verbo es literalmente 'habló/dijo'. En español, 'les dijo' es natural y mantiene el sentido promesal implícito sin sustituir el verbo por una interpretación ('prometió') que el hebreo no expresa de forma explícita.
- source_word: לָכֶם
  english_pob_choice: to you
  chosen_spanish: les
  alternatives_spanish:
  - a ustedes
  - para ustedes
  lexicon: HALOT
  rationale: El dativo de discurso se integra en español con el pronombre de objeto indirecto 'les', manteniendo el receptor plural del mensaje.
theological_decisions:
- issue: Nombre divino יְהוָה en español
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - Jehová
  rationale: Se conserva el nombre propio del pacto, como exige la política del proyecto. 'Yahvé' es la forma escogida para el texto español y evita ocultar el Tetragrámaton tras una sustitución litúrgica.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Doble uso de ירש con matiz diferente
  english_pob_reading: '''dispossess them'' / ''take possession of their land'''
  chosen_spanish_reading: '''los desposeerá'' / ''tomarán posesión de su tierra'''
  alternative_spanish_readings:
  - usar 'expulsará' en ambas cláusulas
  - usar 'heredarán' para la posesión de Israel
  rationale: El hebreo emplea la misma raíz en dos sentidos relacionados pero no idénticos. Mantener 'desposeer' para la acción sobre los pueblos y 'tomar posesión' para Israel preserva la tensión semántica, legal y teológica del versículo.
  doctrine_reference: 'DOCTRINE.md Translation philosophy §5: consistency of key terms, or documented exception'
- issue: Valor promesal de 'habló'
  english_pob_reading: '''spoke'' with promise sense implicit'
  chosen_spanish_reading: '''tal como ... les dijo'''
  alternative_spanish_readings:
  - '''tal como ... prometió'''
  - '''tal como ... habló'''
  rationale: Se respeta el verbo de habla del original y se deja implícita la promesa, en consonancia con la lectura auditada del POB inglés. Así se evita una paráfrasis excesiva, pero el lector español recibe una oración natural.
  doctrine_reference: 'DOCTRINE.md Translation philosophy §2: source-first equivalence'
translation_notes:
  revision_awareness: Se revisó el pasaje frente al control de revisiones más reciente y no se detectaron cambios pendientes; esta versión sigue la decisión auditada del POB inglés sin introducir novedades no justificadas por el hebreo.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' para el nombre divino en todo el versículo.
  - Se preserva el paralelismo con dos expresiones de localización ('de delante de ustedes').
  - Se distingue entre expulsar/desposeer y tomar posesión, evitando colapsar ambas acciones en un solo verbo.
  - Se usa 'tierra' en singular para אַרְצָם, acorde con el uso bíblico de herencia territorial.
  - Los sujetos pronominales se ajustan al español natural ('él mismo', 'ustedes', 'les') sin perder el énfasis del hebreo.
