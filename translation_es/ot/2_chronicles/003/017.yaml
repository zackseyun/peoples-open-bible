  glossary_alignment: No hay términos teológicos mayores en juego. La principal cuestión de alineación léxica es mantener la decisión documentada para הֵיכָל como «nave» / «sala principal del templo», no «pórtico». Los nombres propios «Jaquín» y «Boaz» son aceptables en español según el rationale dado, aunque «Boaz» frente a la forma tradicional «Booz» es una elección moderna permitida.
