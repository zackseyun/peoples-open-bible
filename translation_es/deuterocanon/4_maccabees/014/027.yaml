translation:
  language: es
  text: y, aunque se vio obligada a sentir compasión por ellos[a] a causa de los muchos dolores que cada uno de ellos sufría, por el temor de Dios desatendió el rescate momentáneo[b] de sus hijos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: ‘Compasión’ conserva la idea de sentir con ellos; también podría traducirse ‘simpatía’.
    reason: lexical_alternative
  - marker: b
    text: O ‘la preservación temporal’ o ‘la seguridad temporal’. El griego habla de rescate o supervivencia inmediata, no necesariamente de ‘salvación’ en sentido teológico.
    reason: lexical_alternative
lexical_decisions:
- source_word: ὠδῖνας
  english_pob_choice: pains
  chosen_spanish: dolores
  alternatives_spanish:
  - penas
  - angustias
  - tormentos
  lexicon: LSJ
  rationale: ὠδίν puede referirse a dolores intensos o agudos. En este contexto martirial, 'dolores' comunica bien el sufrimiento físico de cada hijo sin introducir una imagen más específica como 'dolores de parto'.
- source_word: συμπάθειαν
  english_pob_choice: sympathy
  chosen_spanish: compasión
  alternatives_spanish:
  - simpatía
  - compasión afectiva
  - fellow-feeling
  lexicon: LSJ
  rationale: El término expresa compartir el padecimiento ajeno. En español, 'compasión' comunica ese vínculo de sufrimiento compartido con mayor naturalidad que 'simpatía', sin perder la identificación emocional de la madre con sus hijos.
- source_word: ἠναγκασμένην ... ἔχειν
  english_pob_choice: was compelled to feel
  chosen_spanish: fue compelida a sentir
  alternatives_spanish:
  - fue forzada a sentir
  - se vio obligada a sentir
  - se sintió obligada a
  lexicon: LSJ
  rationale: La construcción indica una presión inevitable causada por el sufrimiento de los hijos. 'Fue compelida a sentir' conserva la fuerza de necesidad externa y el registro sobrio del pasaje.
- source_word: φόβον
  english_pob_choice: fear of God
  chosen_spanish: temor de Dios
  alternatives_spanish:
  - miedo de Dios
  - reverencia hacia Dios
  - awe de Dios
  lexicon: LSJ
  rationale: φόβος hacia Dios puede incluir reverencia, pero el griego dice 'temor'. 'Temor de Dios' preserva esa tensión teológica y resulta idiomático en español bíblico contemporáneo.
- source_word: ὑπερείδειν
  english_pob_choice: disregarded
  chosen_spanish: desatendió
  alternatives_spanish:
  - despreció
  - pasó por alto
  - no priorizó
  lexicon: LSJ
  rationale: El verbo comunica dar menos peso a una cosa en vista de otra más alta. 'Desatendió' expresa que no concedió prioridad a la salvación inmediata de sus hijos, sin sugerir falta de amor materno.
- source_word: πρόσκαιρον σωτηρίαν
  english_pob_choice: the temporary safety
  chosen_spanish: la seguridad temporal
  alternatives_spanish:
  - la salvación temporal
  - el rescate momentáneo
  - la preservación temporal
  lexicon: LSJ
  rationale: Aquí σωτηρία se refiere a rescate o supervivencia física, no a salvación en sentido soteriológico. 'Seguridad temporal' comunica bien la idea de preservación inmediata y evita cargar el texto con un sentido doctrinal ajeno al contexto.
- source_word: καθʼ ἕκαστον αὐτῶν
  english_pob_choice: each one of them
  chosen_spanish: cada uno de ellos
  alternatives_spanish:
  - cada uno
  - uno por uno
  - individualmente
  lexicon: LSJ
  rationale: La frase distribuye el sufrimiento entre los hijos uno por uno. 'Cada uno de ellos' mantiene ese valor distributivo de forma clara y natural.
theological_decisions:
- issue: Sentido de σωτηρία en un contexto de martirio
  english_pob_reading: physical preservation/survival rather than spiritual salvation
  chosen_spanish_reading: preservación o seguridad inmediata, no salvación espiritual
  alternative_spanish_readings:
  - salvación
  - rescate
  - preservación temporal
  rationale: El contexto trata del sufrimiento corporal de los hijos y de la respuesta de la madre ante su posible rescate. 'Seguridad temporal' evita importar una lectura soteriológica que el versículo no exige.
  doctrine_reference: Principio de primacía del texto original; no introducir doctrina ajena al contexto inmediato.
- issue: Fuerza de φόβος θεοῦ
  english_pob_reading: fear toward God, with reverential sense implicit
  chosen_spanish_reading: temor de Dios con reverencia implícita
  alternative_spanish_readings:
  - reverencia hacia Dios
  - awe ante Dios
  - miedo de Dios
  rationale: 'El griego usa φόβος de manera directa. Mantener ''temor de Dios'' conserva la tensión moral del pasaje: la compasión maternal queda subordinada a la piedad.'
  doctrine_reference: Principio de preservar la tensión teológica en lugar de suavizarla.
translation_notes:
  revision_awareness: 'La redacción sigue de cerca el ajuste más reciente del audit trail inglés: ''fear of God'' / ''temporary safety'', pero lo adapta a español con ''temor de Dios'' y ''seguridad temporal'' para mantener naturalidad sin perder la cautela soteriológica. Se evita traducir mecánicamente desde el inglés cuando el griego permite una mejor precisión semántica.'
  spanish_consistency_notes:
  - Se conservó el registro sobrio y formal propio del libro de 4 Macabeos.
  - '''Temor de Dios'' se mantiene como fórmula estable, sin reemplazarla por ''reverencia'' en el texto principal.'
  - '''Compasión'' se eligió por claridad en español, pero la nota preserva la alternativa de simpatía/fellow-feeling.'
  - '''Seguridad temporal'' intenta reflejar σωτηρία en el marco inmediato de supervivencia física, no salvación doctrinal.'
