review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura básica del hebreo: dos verbos de demolición para los muros y torres de Tiro, seguido por la acción divina de quitar el polvo/tierra y dejar la ciudad como roca expuesta. Sin embargo, «barreré» debilita la imagen concreta de «raspar/quitar hasta dejar la roca», y la nota al pie no corresponde al punto léxico real preservado en la auditoría inglesa.'
  spanish_quality_summary: El español es generalmente claro y digno, pero «su polvo de ella» en la nota es antinatural y revela una mala adaptación del aparato inglés. En el texto principal, «de ella» suena forzado; conviene una formulación natural que conserve la personificación de la ciudad sin calco rígido. También es mejor omitir el punto y coma innecesario.
  glossary_alignment: 'No hay términos teológicos del glosario principal en juego. Los nombres y sustantivos clave están bien: «Tiro», «muros», «torres», «polvo». La principal corrección es léxica-estilística: para וְסִחֵיתִי conviene «quitaré/rasparé» antes que «barreré», para alinearse mejor con la racionalidad documentada de ''scrape''.'
  issues:
  - severity: medium
    issue: «barreré» no refleja con suficiente precisión וְסִחֵיתִי
    rationale: La auditoría inglesa justificó específicamente 'scrape' como imagen de retirar la superficie hasta dejar la roca. «Barrer» sugiere limpiar superficialmente más que despojar el sitio hasta la roca madre.
  - severity: high
    issue: La nota [a] está mal construida y no preserva correctamente la alternativa léxica
    rationale: Dice «O “su polvo” en vez de “su polvo de ella”», pero el texto principal ya dice «su polvo». Además, «su polvo de ella» es español antinatural. La nota debería explicar el rango semántico de עָפָר («polvo», «tierra suelta», «suelo») y la imagen de quedar reducida a la roca.
  - severity: low
    issue: «de ella» en el texto principal es rígido
    rationale: Aunque intenta preservar la personificación femenina de la ciudad, en español suena calco. «de sobre ella» o una reestructuración equivalente mantiene el sentido de remoción desde la ciudad de modo más natural.
  revised_spanish_text: Ellos destruirán los muros de Tiro y derribarán sus torres, y yo quitaré[a] su polvo de sobre ella y la convertiré en roca desnuda.
  revised_footnotes:
