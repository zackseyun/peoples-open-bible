translation:
  language: es
  text: ¡Mira! Mi vientre es como vino sin salida[a]; como odres nuevos, está a punto de reventar.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Mis entrañas son como vino que no se abre»; el hebreo dice literalmente: «Mi vientre es como vino no abierto».'
    reason: lexical_alternative
lexical_decisions:
- source_word: הִנֵּה
  english_pob_choice: Look
  chosen_spanish: ¡Mira!
  alternatives_spanish:
  - Mira
  - He aquí
  - ¡Observa!
  lexicon: HALOT
  rationale: La partícula deíctica introduce una imagen vívida y llama la atención del oyente. «¡Mira!» conserva la fuerza apelativa de forma natural en español contemporáneo.
- source_word: בִטְנִי
  english_pob_choice: my belly
  chosen_spanish: Mi vientre
  alternatives_spanish:
  - Mis entrañas
  - Mi interior
  - Mi barriga
  lexicon: HALOT
  rationale: בטן alude literalmente al vientre y, por extensión, al interior. «Mi vientre» preserva mejor la imagen concreta del hebreo que una versión más interpretativa como «mi interior».
- source_word: כְּיַיִן
  english_pob_choice: like wine
  chosen_spanish: como vino
  alternatives_spanish:
  - como vino fermentado
  - como mosto
  lexicon: HALOT
  rationale: El hebreo dice simplemente «vino». Se conserva sin añadir rasgos no expresados explícitamente en el texto fuente.
- source_word: לֹא יִפָּתֵחַ
  english_pob_choice: that has no vent
  chosen_spanish: que no se abre
  alternatives_spanish:
  - que no tiene salida
  - que no puede abrirse
  lexicon: HALOT
  rationale: El nifal de פתח significa «ser abierto». En español, «que no se abre» mantiene la cercanía al hebreo y deja visible la tensión de la imagen sin interpretar demasiado el mecanismo físico.
- source_word: כְּאֹבוֹת
  english_pob_choice: like new wineskins
  chosen_spanish: como odres nuevos
  alternatives_spanish:
  - como pellejos nuevos
  - como pellejos para vino
  lexicon: HALOT
  rationale: אֹבוֹת son recipientes de cuero para líquidos. «Odres» es el equivalente español claro y fiel; «nuevos» conserva el modificador del hebreo.
- source_word: חֲדָשִׁים
  english_pob_choice: new
  chosen_spanish: nuevos
  alternatives_spanish:
  - recién hechos
  - frescos
  lexicon: HALOT
  rationale: Adjetivo directo y sin complicación semántica adicional.
- source_word: יִבָּקֵעַ
  english_pob_choice: it is about to burst
  chosen_spanish: está a punto de reventar
  alternatives_spanish:
  - va a reventar
  - se partirá
  lexicon: HALOT
  rationale: בקע expresa partirse o romperse por presión. «Está a punto de reventar» comunica la inminencia y la presión de la comparación en español natural.
translation_notes:
  revision_awareness: Coincide con el contexto auditado en que la imagen central es física y metafórica a la vez; no se añadió contenido doctrinal ni se suavizó la tensión del símil. Se mantuvo la comparación del vientre con vino bajo presión y el paralelismo con recipientes de cuero nuevos.
  spanish_consistency_notes:
  - 'Se conservó el tratamiento singular de la imagen: «mi vientre» / «está a punto de reventar».'
  - Se eligió «odres» como equivalente culturalmente transparente para el recipiente de cuero.
  - No se sustituyó la imaginería corporal por un término más interpretativo como «interior» en el texto principal.
