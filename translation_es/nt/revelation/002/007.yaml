review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien el sentido del griego en casi todo el versículo: mantiene la exhortación formulística, identifica correctamente τὸ πνεῦμα como el Espíritu, traduce νικῶντι con una forma verbal natural, y conserva la promesa de comer del árbol de la vida en el paraíso de Dios. La única desviación relevante está en la nota al pie: el inglés conserva la alternativa tradicional ''overcomes'', pero la nota española propuesta (''Al que sobrevive vencedor'') no corresponde ni al griego νικάω ni a la alternativa inglesa documentada.'
  spanish_quality_summary: 'El texto principal es claro, natural y digno en español eclesial amplio: ''El que tiene oído, oiga...'' y ''le daré a comer del árbol de la vida'' funcionan bien. La redacción es fluida y no suena acartonada. La reparación necesaria es solo de la nota, que actualmente es poco idiomática y semánticamente inexacta.'
  glossary_alignment: 'Hay buena alineación con las decisiones del proyecto: ''Espíritu'' capitalizado por contexto, ''Dios'' para θεοῦ, y ''paraíso'' para παραδείσῳ. La elección ''vence'' para νικάω es aceptable y fiel, pero la alternativa en nota debe ser ''Al que vence'' / ''Al que salga vencedor'' / ''Al que triunfa'' según el caso; ''sobrevive vencedor'' no está respaldado por el audit trail.'
  issues:
  - severity: medium
    issue: Nota léxica incorrecta para τῷ νικῶντι
    rationale: La nota 'O, «Al que sobrevive vencedor»' introduce el concepto de sobrevivir, ausente del griego y del English POB. La alternativa documentada es 'overcomes', que en español debe representarse con algo como 'Al que salga vencedor' o 'Al que triunfa', no con una paráfrasis extraña.
  revised_spanish_text: El que tiene oído[a], oiga lo que el Espíritu dice a las iglesias. Al que vence le daré a comer del árbol de la vida, que está en el paraíso de Dios.
  revised_footnotes:
  - marker: a
    text: O, «Al que salga vencedor».
    reason: lexical_alternative
  revision_rationale: Se conserva íntegramente el texto principal porque es fiel y natural. Solo se corrige la nota al pie para alinearla con la alternativa inglesa documentada para νικάω ('overcomes') y eliminar el matiz incorrecto de 'sobrevive'.
