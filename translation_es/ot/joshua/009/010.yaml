translation:
  language: es
  text: y todo lo que hizo a los dos reyes de los amorreos que estaban más allá del Jordán, a Sehón, rey de Hesbón, y a Og, rey de Basán, que estaba en Ashtarot[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'También puede entenderse: «que estaba en Astarot».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְאֵת
  english_pob_choice: and
  chosen_spanish: y
  alternatives_spanish:
  - y también
  - e
  lexicon: HALOT
  rationale: El marcador de objeto continúa la enumeración del versículo anterior; en español basta con una conjunción simple para mantener el flujo discursivo natural.
- source_word: כָּל אֲשֶׁר
  english_pob_choice: all that
  chosen_spanish: todo lo que
  alternatives_spanish:
  - todo cuanto
  - todo aquello que
  lexicon: HALOT
  rationale: La expresión totalizadora se conserva de forma idiomática y clara en español sin perder el alcance global del hebreo.
- source_word: עָשָׂה
  english_pob_choice: he did
  chosen_spanish: hizo
  alternatives_spanish:
  - había hecho
  - realizó
  lexicon: HALOT
  rationale: En este relato histórico, 'hizo' reproduce adecuadamente el verbo amplio עשה sin sobreespecificarlo como 'realizó'.
- source_word: לִשְׁנֵי מַלְכֵי הָאֱמֹרִי
  english_pob_choice: to the two kings of the Amorites
  chosen_spanish: a los dos reyes de los amorreos
  alternatives_spanish:
  - contra los dos reyes de los amorreos
  - para los dos reyes de los amorreos
  lexicon: HALOT
  rationale: La preposición española 'a' refleja el valor relacional del dativo hebreo sin interpretar más de lo necesario; 'amorreos' mantiene el etnónimo bíblico usual.
- source_word: אֲשֶׁר בְּעֵבֶר הַיַּרְדֵּן
  english_pob_choice: who were beyond the Jordan
  chosen_spanish: que estaban al otro lado del Jordán
  alternatives_spanish:
  - que estaban más allá del Jordán
  - que estaban del lado de allá del Jordán
  lexicon: HALOT
  rationale: Se preserva la perspectiva geográfica del original con una frase natural en español; 'al otro lado' evita una calca poco fluida y sigue de cerca el sentido de 'beyond/across'.
- source_word: לְסִיחוֹן מֶלֶךְ חֶשְׁבּוֹן
  english_pob_choice: to Sihon king of Heshbon
  chosen_spanish: a Sehón, rey de Hesbón
  alternatives_spanish:
  - a Sehón rey de Hesbón
  - a Sijón, rey de Hesbón
  lexicon: HALOT
  rationale: Se adopta la transliteración bíblica corriente en español para el nombre propio; 'rey de' conserva la aposición regia sin añadir puntuación innecesaria.
- source_word: וּלְעוֹג מֶלֶךְ הַבָּשָׁן
  english_pob_choice: and to Og king of Bashan
  chosen_spanish: y a Og, rey de Basán
  alternatives_spanish:
  - y a Og rey de Basán
  - y a Og, el rey de Basán
  lexicon: HALOT
  rationale: La coordinación paralela con el rey anterior se mantiene; 'Basán' reproduce el topónimo bíblico en forma usual para lectores hispanos.
- source_word: אֲשֶׁר בְּעַשְׁתָּרֹות
  english_pob_choice: who was at Ashtaroth
  chosen_spanish: que estaba en Ashtarot
  alternatives_spanish:
  - que estaba en Astarot
  - que estaba en Ashtarot[a]
  lexicon: HALOT
  rationale: Se conserva el nombre del lugar como transliteración directa y se traduce la relación locativa con 'estaba en', que refleja de manera natural el hebreo בלי forzar una noción institucional o militar.
theological_decisions:
- issue: Referencia implícita del sujeto de 'hizo'
  english_pob_reading: The English leaves the subject as 'he,' matching the Hebrew and relying on context to identify it as the LORD.
  chosen_spanish_reading: Se conserva un sujeto implícito en 'hizo', dejando que el contexto identifique al que actuó.
  alternative_spanish_readings:
  - el Señor hizo
  - Yahvé hizo
  rationale: El hebreo no expresa aquí el sujeto; traducirlo explícitamente introduciría una interpretación que el versículo en sí no formula. Mantener la forma implícita respeta el texto y el encadenamiento del contexto anterior.
  doctrine_reference: Translation philosophy §1, §3
translation_notes:
  revision_awareness: El contexto auditado en inglés no presenta revisiones aplicadas ni cambios posteriores; la versión española sigue de cerca la decisión óptima-equivalente ya aprobada, conservando la ambigüedad locativa de בְּעַשְׁתָּרוֹת sin ampliarla.
  spanish_consistency_notes:
  - Se usa 'Yahvé' como convención general del proyecto solo cuando el texto lo requiera explícitamente; aquí el sujeto queda implícito por fidelidad al hebreo y al audit trail inglés.
  - Se mantiene 'amorreos', 'Hesbón', 'Basán' y 'Ashtarot' como topónimos/etnónimos bíblicos de uso estable y comprensible en español.
  - La puntuación con comas conserva la serie appositiva de los reyes sin convertirla en una paráfrasis explicativa.
