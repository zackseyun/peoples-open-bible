revisions:
- from: ¿Quién como tú entre los dioses[a], Yahvé? ¿Quién como tú, majestuoso en santidad, asombroso en alabanzas[b], hacedor de maravillas?
  to: ¿Quién como tú entre los dioses[a], oh Yahvé? ¿Quién como tú, majestuoso en santidad, imponente en alabanzas[b], hacedor de maravillas?
  rationale: Se añadió «oh» para reflejar con más naturalidad el vocativo dirigido a Yahvé. Se cambió «asombroso» por «imponente» para conservar mejor el matiz de sobrecogimiento reverente de נוֹרָא en un español bíblico natural. Se mantuvieron la estructura poética, «entre los dioses» y «hacedor de maravillas».
