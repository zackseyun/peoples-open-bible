translation:
  text: 'And you hearers, listen to me.

    You who wait for me, take me to yourselves,

    and do not cast me from your sight,

    and do not let your voice hate me, nor your hearing.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: ⲧⲟϣⲧ can mean wait/expect as well as long for/ yearn. The rendering "wait
      for" favors the anticipatory aspect; "long for me" is possible in context.
    reason: lexical_alternative
  - marker: b
    text: ⲡⲱⲧ normally means “run/flee.” Some English traditions have “do not send
      me away from your sight,” reflecting a different construal or a supplementary
      clause in other witnesses.
    reason: alternative_reading
  - marker: c
    text: ⲧⲟⲩⲛ literally “make/be heavy,” often used idiomatically of dull or odious
      speech/senses. “Make hateful” captures the evaluative force; “make heavy” is
      a more literal but opaque option.
    reason: lexical_alternative
  - marker: d
    text: The sequence around ⲡⲉⲧⲛϩⲟⲩⲟ ⲧⲱⲉⲓ … ⲡⲣⲣⲁⲧⲥⲱⲧⲙ is fragmentary here and may
      have referenced “your eye/way.” I translate only the clearly legible voice/hearing
      pair.
    reason: alignment_note
  - marker: e
    text: Or 'and do not run from me;\ndo not make your voice hateful to me — nor
      your hearing.'.
    reason: previous_rendering
lexical_decisions:
- source_word: ⲛⲣⲉϥⲥⲱⲧⲙ
  chosen: hearers
  alternatives:
  - those who hear
  - listeners
  lexicon: Crum; Layton grammar on r̄ef- participles
  rationale: Plural nominal participle r̄ef- + sōtm, yielding a vocative group identity.
    "Hearers" preserves the address and cadence better than a relative clause.
- source_word: ⲥⲱⲧⲙ ⲉⲣⲟⲓ
  chosen: listen to me
  alternatives:
  - hear me
  lexicon: Crum (sōtm)
  rationale: Base meaning is "hear"; in an imperative address to "hearers," English
    "listen" conveys active heeding without domesticating the command.
- source_word: ⲧⲟϣⲧ
  chosen: wait (for)
  alternatives:
  - long for
  - yearn for
  - expect
  lexicon: 'Crum (tošt: wait for, expect; also desire), context in Thunder'
  rationale: Context addresses those anticipating the speaker. "Wait for" is the core
    sense; desire/expect nuances are acknowledged but kept in footnote to avoid over-interpretation.
- source_word: ⲡⲱⲧ
  chosen: run (from)
  alternatives:
  - flee (from)
  - turn away (from)
  - dismiss
  lexicon: 'Crum (pōt: run, flee)'
  rationale: Negative imperative ⲙⲡⲣ- + ⲡⲱⲧ takes object ⲛⲥⲱⲓ "from me." "Run from
    me" preserves the concrete motion implied.
- source_word: ⲧⲟⲩⲛ
  chosen: make hateful
  alternatives:
  - make heavy
  - harden
  - make burdensome
  lexicon: 'Crum (toun: heavy; idiomatically of senses/voice as dull/odious)'
  rationale: In sensory/speech contexts, "heavy" can idiomatically mean unpleasant/odious.
    Rendering as "make hateful" conveys affect without losing the idiom's edge; "heavy"
    noted as alternative.
- source_word: ⲕⲁⲁⲩ
  chosen: voice
  alternatives:
  - sound
  lexicon: 'Crum (kaaⲩ: voice)'
  rationale: Common term for voice/speech; "voice" keeps the directness of the admonition.
- source_word: ⲡⲉⲧⲛⲥⲱⲧⲙ / ⲣⲁⲧⲥⲱⲧⲙ
  chosen: your hearing / ear
  alternatives:
  - your listening
  - ear(s)
  lexicon: 'Crum (rⲁt-sōtm: ear), standard Sahidic possessive construction'
  rationale: The broken line likely reads "your hearing" and explicitly names the
    "ear." We render the pair succinctly as "your hearing" to maintain balance with
    "voice."
parallelism_check: 'The block balances paired imperatives: vocative + imperative (hearers/hear),
  vocative + reception (waiters/take me), and a matched negative pair (do not run;
  do not make your voice/hearing hateful). The voice/hearing dyad preserves the parallelism
  of speech and sense.'
voice_check: The speaker remains the "I/me" of Thunder, addressing a plural "you"
  with direct imperatives. No third-person smoothing; the intimacy and command remain
  intact.
alignment_risk_note: Alignment confidence is medium and the OCR shows fragmentation
  in the latter lines ("ⲡⲉⲧⲛϩⲟⲩⲟ ⲧⲱⲉⲓ ... ⲡⲣⲣⲁⲧⲥⲱⲧⲙ ⲉⲣⲟⲉⲓ ⲕⲁⲧⲁ"). I render the clear
  elements (hearers/hear; wait/take; do not run; voice/hearing admonition). The phrase
  sometimes translated “from your sight” may correspond to a damaged clause here;
  I have not inserted “sight” since the visible ⲡⲱⲧ ⲛⲥⲱⲓ plainly reads “run from me.”
  The partially preserved sequence around ⲡⲉⲧⲛⲥⲱⲧⲙ/ⲣⲁⲧⲥⲱⲧⲙ suggests an explicit mention
  of the ear; I collapse this to “your hearing” to keep the parallel with "voice"
  while noting the likely underlying noun.
