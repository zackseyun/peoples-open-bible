translation:
  language: es
  text: Por causa de mi siervo Jacob[a] y de Israel mi escogido, te llamé por tu nombre; te di un nombre, aunque no me conocías.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «te di un sobrenombre»; el verbo hebreo puede referirse a asignar una designación, un nombre o un apelativo honorífico.'
    reason: lexical_alternative
lexical_decisions:
- source_word: לְמַעַן
  english_pob_choice: For the sake of
  chosen_spanish: Por causa de
  alternatives_spanish:
  - por amor de
  - por el bien de
  - a causa de
  lexicon: HALOT
  rationale: La expresión hebrea comunica motivo o propósito. En español, 'por causa de' mantiene bien la relación causal sin sonar excesivamente literal ni introducir una finalidad distinta.
- source_word: עַבְדִּי
  english_pob_choice: my servant
  chosen_spanish: mi siervo
  alternatives_spanish:
  - mi esclavo
  - mi servidor
  lexicon: HALOT
  rationale: Aquí el contexto profético-covenantal apunta a un título de servicio fiel, pero el español 'siervo' conserva la fuerza del vínculo sin cargar la frase con la dureza de 'esclavo'. 'Servidor' suavizaría demasiado el término.
- source_word: בְּחִירִי
  english_pob_choice: my chosen one
  chosen_spanish: mi escogido
  alternatives_spanish:
  - mi elegido
  - mi elegido de entre otros
  lexicon: HALOT
  rationale: El adjetivo sustantivado funciona como designación personal. 'Mi escogido' es natural en español bíblico y conserva la fuerza de selección divina sin expandirla innecesariamente.
- source_word: וָאֶקְרָא לְךָ בִּשְׁמֶךָ
  english_pob_choice: I called you by your name
  chosen_spanish: te llamé por tu nombre
  alternatives_spanish:
  - te llamé por nombre
  - te convoqué por tu nombre
  lexicon: HALOT
  rationale: La construcción idiomática se expresa con claridad en español como 'llamar por tu nombre'. Mantiene la dimensión personal del llamado y evita un calco rígido.
- source_word: אֲכַנְּךָ
  english_pob_choice: I surnamed you
  chosen_spanish: te puse un sobrenombre
  alternatives_spanish:
  - te di un nombre
  - te asigné un título
  - te impuse un apelativo
  lexicon: HALOT
  rationale: El verbo puede referirse a asignar un nombre de designación o apelativo honorífico. 'Puse un sobrenombre' conserva la idea de añadir una designación, sin resolverla como mero cambio de nombre ni convertirla en una interpretación demasiado explícita como 'título de honor'.
- source_word: וְלֹא יְדַעְתָּנִי
  english_pob_choice: though you did not know me
  chosen_spanish: aunque no me conocías
  alternatives_spanish:
  - aunque no me habías conocido
  - sin que me conocieras
  lexicon: HALOT
  rationale: 'La cláusula es concesiva. ''Aunque no me conocías'' suena natural en español y preserva la tensión teológica: Dios actúa soberanamente a favor de Ciro sin que éste lo conozca.'
theological_decisions:
- issue: Identidad del destinatario y su desconocimiento de Dios
  english_pob_reading: The verse addresses Cyrus and states that God named/called him despite his not knowing the LORD.
  chosen_spanish_reading: El versículo sigue dirigiéndose a Ciro y afirma que Dios lo llamó y lo designó aun sin que él conociera a Dios.
  alternative_spanish_readings:
  - '...aunque no conocías a Yahvé.'
  - '...aunque no me conocías, con una implicación más explícita de que el hablante es Yahvé.'
  rationale: La versión española conserva la referencia al hablante en primera persona ('me') y no desarrolla 'Yahvé' donde el hebreo sólo tiene sufijo de primera persona. Así se mantiene la precisión textual y la tensión teológica de un rey pagano comisionado por Dios.
  doctrine_reference: Translation philosophy §1 Original-language primacy over translation tradition
- issue: Naturaleza de אכנך
  english_pob_reading: I surnamed you / I gave you a name/title.
  chosen_spanish_reading: te puse un sobrenombre
  alternative_spanish_readings:
  - te di un título
  - te impuse un nombre
  rationale: El hebreo admite la idea de asignar una designación o apelativo. 'Sobrenombre' conserva esa flexibilidad semántica sin comprometerse a una sola interpretación, y evita borrar la ambigüedad documentada entre nombre, título o apelativo honorífico.
  doctrine_reference: Translation philosophy §3 Preserve theological tension rather than resolve it
translation_notes:
  revision_awareness: La redacción sigue el texto hebreo de Isaías 45:4 y la revisión inglesa más reciente, que volvió de una expansión interpretativa ('I gave you a title of honor') a una forma más directa ('I surnamed you'). En español, 'te puse un sobrenombre' intenta reflejar esa decisión sin cerrar la ambigüedad del verbo hebreo.
  spanish_consistency_notes:
  - Se usó 'Yahvé' como norma general del proyecto sólo cuando el texto fuente lo exige; aquí el hebreo dice 'me' en primera persona, por lo que no se expandió el referente.
  - Se prefirió 'siervo' para עבד por la carga covenantal del contexto profético.
  - Se mantuvo 'me conocías' para respetar el sufijo de primera persona y la lectura concesiva del final del versículo.
