translation:
  language: es
  text: Así el sol se detuvo, y la luna se detuvo, hasta que la nación se vengó de sus enemigos[a]. ¿No está escrito esto en el Libro de Jasar[b]? El sol se detuvo en medio del cielo y no se apresuró a ponerse[c], por casi un día completo[d].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'También puede entenderse: «hasta que la nación se vengó por sí misma de sus enemigos». El hebreo idiomático puede abarcar la idea de vindicación o venganza.'
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: «el Libro de Jasar»; posiblemente «el Libro de los Rectos».'
    reason: alternative_reading
  - marker: c
    text: 'O: «y no se apresuró a bajar», es decir, a ponerse.'
    reason: lexical_alternative
  - marker: d
    text: 'O: «como un día entero» o «casi un día entero».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּדֹּם
  english_pob_choice: stood still
  chosen_spanish: se detuvo
  alternatives_spanish:
  - quedó inmóvil
  - se quedó quieto
  lexicon: HALOT
  rationale: דמם puede expresar quedar en silencio o inmóvil. En este contexto astronómico, el sentido de cese del movimiento se preserva mejor en español con «se detuvo», que suena natural y conserva la extrañeza del evento.
- source_word: וְיָרֵחַ עָמָד
  english_pob_choice: and the moon stopped
  chosen_spanish: y la luna se paró
  alternatives_spanish:
  - y la luna se detuvo
  - y la luna quedó inmóvil
  lexicon: HALOT
  rationale: עמד aplicado a un cuerpo celeste comunica que dejó de avanzar. «Se paró» mantiene paralelismo con el primer miembro y resulta idiomático en español sin debilitar el sentido.
- source_word: עַד יִקֹּם גּוֹי אֹיְבָיו
  english_pob_choice: until the nation took vengeance on its enemies
  chosen_spanish: hasta que la nación se vengó de sus enemigos
  alternatives_spanish:
  - hasta que la nación tomó venganza de sus enemigos
  - hasta que el pueblo se vengó de sus enemigos
  lexicon: HALOT
  rationale: קם en este giro idiomático con אויבים expresa vindicación/venganza. «Se vengó» comunica bien la acción resultante; «nación» conserva el valor de גוי como entidad corporativa de Israel.
- source_word: גּוֹי
  english_pob_choice: the nation
  chosen_spanish: la nación
  alternatives_spanish:
  - el pueblo
  - la gente
  lexicon: HALOT
  rationale: «Nación» refleja mejor el valor léxico de גוי que «pueblo», aunque el referente sea Israel como colectivo.
- source_word: הֲלֹא הִיא כְתוּבָה
  english_pob_choice: Is this not written
  chosen_spanish: ¿No está escrito esto
  alternatives_spanish:
  - ¿No está escrito ello
  - ¿No se escribió esto
  lexicon: HALOT
  rationale: El pronombre femenino hebreo se refiere al dicho o al relato precedente; en español «esto» es la solución natural y evita una construcción extraña.
- source_word: סֵפֶר הַיָּשָׁר
  english_pob_choice: the Book of Jashar
  chosen_spanish: el Libro de Jasar
  alternatives_spanish:
  - el Libro del Justo
  - el Libro de los Rectos
  lexicon: HALOT
  rationale: Se conserva el título como nombre propio transliterado. Así se evita convertir en adjetivo un encabezado tradicional de obra citada.
- source_word: וַיַּעֲמֹד הַשֶּׁמֶשׁ
  english_pob_choice: The sun stopped
  chosen_spanish: El sol se detuvo
  alternatives_spanish:
  - El sol se paró
  - El sol quedó inmóvil
  lexicon: HALOT
  rationale: El segundo enunciado repite y amplía el milagro; «se detuvo» es claro, solemne y consistente con el primer miembro.
- source_word: בַּחֲצִי הַשָּׁמַיִם
  english_pob_choice: in the middle of the sky
  chosen_spanish: en medio del cielo
  alternatives_spanish:
  - a mitad del cielo
  - en la mitad de los cielos
  lexicon: HALOT
  rationale: La expresión hebrea indica el punto medio del firmamento. «En medio del cielo» conserva el sentido espacial con naturalidad.
- source_word: וְלֹא אָץ לָבוֹא
  english_pob_choice: and did not hurry to set
  chosen_spanish: y no se apresuró a ponerse
  alternatives_spanish:
  - y no se apresuró a descender
  - y no tuvo prisa por ponerse
  lexicon: HALOT
  rationale: Con el sol, בוא alude idiomáticamente al ponerse. «No se apresuró a ponerse» conserva el movimiento implícito y evita explicar demasiado el giro.
- source_word: כְּיוֹם תָּמִים
  english_pob_choice: for about a full day
  chosen_spanish: por cerca de un día completo
  alternatives_spanish:
  - como un día completo
  - por casi un día entero
  lexicon: HALOT
  rationale: כ introduce comparación, y תמים aporta la idea de entero/completo. «Por cerca de» refleja la aproximación sin cerrar el valor exacto del hebreo.
theological_decisions:
- issue: Naturaleza del milagro astronómico
  english_pob_reading: Render the text straightforwardly as describing the sun and moon stopping, without naturalizing or demythologizing the event.
  chosen_spanish_reading: Presentar el texto como una afirmación directa de que el sol y la luna se detuvieron, sin suavizarlo ni explicarlo de forma naturalista.
  alternative_spanish_readings:
  - Traducirlo de manera fenomenológica, sugiriendo solo apariencia observacional
  - Tratarlo como una cita poética sin afirmación narrativa
  rationale: La narración presenta el hecho como extraordinario y lo vincula a una fuente escrita. La traducción debe conservar esa afirmación y no resolver la tensión científica o literaria por cuenta propia.
  doctrine_reference: Preservar la tensión teológica del texto; primacía del original sobre armonizaciones modernas.
translation_notes:
  revision_awareness: Se siguió la revisión más reciente del audit trail, manteniendo la segunda mención del sol coherente con la primera y preservando la decisión de leer el pasaje con lenguaje directo, no naturalizado.
  spanish_consistency_notes:
  - Se usó «sol»/«luna» consistentemente como en el texto fuente.
  - Se mantuvo «nación» para גוי, en línea con la decisión inglesa documentada.
  - Se transliteró el título como «Libro de Jasar» para conservar el carácter de nombre propio.
  - Se evitó «SEÑOR» o fórmulas tradicionales no pertinentes, ya que el versículo no contiene el nombre divino.
  - Se mantuvo el paralelismo verbal con dos ocurrencias de «se detuvo»/«se paró» sin borrar la repetición hebrea.
