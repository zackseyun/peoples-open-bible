translation:
  language: es
  text: Y si alguien anhela aún mucha experiencia[a], ella conoce las cosas de antaño y puede inferir las cosas por venir; entiende los giros del habla y las soluciones a los acertijos[b]; conoce de antemano señales y prodigios, y los desenlaces de las estaciones y de los tiempos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «mucha experiencia», «amplio aprendizaje» o «gran pericia».
    reason: lexical_alternative
  - marker: b
    text: O «puede conjeturar lo que ha de venir» o «puede prever el futuro». El verbo griego aquí es más débil que el posterior «conoce de antemano».
    reason: lexical_alternative
lexical_decisions:
- source_word: πολυπειρίαν
  english_pob_choice: much experience
  chosen_spanish: mucha experiencia
  alternatives_spanish:
  - amplia experiencia
  - gran experiencia
  - extensa experiencia
  lexicon: LSJ
  rationale: El griego denota abundancia de experiencia adquirida. «Mucha experiencia» es natural en español y conserva la amplitud del término sin restringirlo a aprendizaje académico.
- source_word: ποθεῖ
  english_pob_choice: longs
  chosen_spanish: anhela
  alternatives_spanish:
  - desea
  - ansía
  - suspira por
  lexicon: LSJ
  rationale: «Anhela» transmite deseo fuerte y mantiene un tono elevado apropiado para Sabiduría, sin sonar demasiado arcaico.
- source_word: τὰ ἀρχαῖα
  english_pob_choice: the things of old
  chosen_spanish: las cosas de antaño
  alternatives_spanish:
  - las cosas de antes
  - las cosas antiguas
  - las cosas del pasado
  lexicon: LSJ
  rationale: La expresión apunta a realidades antiguas o de tiempos pasados. «Las cosas de antaño» conserva ese sentido temporal con naturalidad en español.
- source_word: τὰ μέλλοντα εἰκάζειν
  english_pob_choice: can infer the things to come
  chosen_spanish: puede inferir las cosas por venir
  alternatives_spanish:
  - puede conjeturar lo venidero
  - puede discernir lo que viene
  - puede prever lo futuro
  lexicon: LSJ
  rationale: εἰκάζω sugiere inferir o conjeturar a partir de indicios. «Inferir» preserva mejor esa fuerza que un verbo más fuerte como «prever»; el complemento «las cosas por venir» sigue el paralelismo con «las cosas de antaño».
- source_word: στροφὰς λόγων
  english_pob_choice: turns of speech
  chosen_spanish: los giros del habla
  alternatives_spanish:
  - los giros de las palabras
  - los rodeos del discurso
  - las vueltas del lenguaje
  lexicon: LSJ
  rationale: La frase señala sutilezas o giros retóricos. «Los giros del habla» es claro y suficientemente amplio para abarcar tanto estilo como argumentación.
- source_word: λύσεις αἰνιγμάτων
  english_pob_choice: solutions to riddles
  chosen_spanish: las soluciones de los acertijos
  alternatives_spanish:
  - las interpretaciones de los enigmas
  - el desciframiento de los enigmas
  - las respuestas a los acertijos
  lexicon: LSJ
  rationale: λύσεις implica solución o desenlace; αἰνίγματα son acertijos o enigmas. «Las soluciones de los acertijos» mantiene la idea de resolver lo que está velado con lenguaje accesible.
- source_word: σημεῖα καὶ τέρατα
  english_pob_choice: signs and wonders
  chosen_spanish: señales y prodigios
  alternatives_spanish:
  - señales y maravillas
  - portentos y maravillas
  - señales y milagros
  lexicon: LSJ
  rationale: La pareja es tradicional en lenguaje bíblico. «Señales y prodigios» conserva el valor extraordinario y demostrativo de ambos términos, aunque «prodigios» deja abierta la fuerza de asombro del segundo miembro.
- source_word: προγινώσκει
  english_pob_choice: knows beforehand
  chosen_spanish: conoce de antemano
  alternatives_spanish:
  - sabe de antemano
  - prevé
  - conoce por adelantado
  lexicon: LSJ
  rationale: El verbo significa saber antes o con anticipación. «Conoce de antemano» es transparente y evita cargar el término con matices técnicos posteriores de «preconocer».
- source_word: ἐκβάσεις
  english_pob_choice: outcomes
  chosen_spanish: los desenlaces
  alternatives_spanish:
  - los resultados
  - los finales
  - las salidas
  lexicon: LSJ
  rationale: El sustantivo indica resultado o desenlace. «Desenlaces» funciona bien en español para el cierre o resolución de procesos, conservando el sentido de resultado final.
- source_word: καιρῶν καὶ χρόνων
  english_pob_choice: seasons and times
  chosen_spanish: de las estaciones y de los tiempos
  alternatives_spanish:
  - de los tiempos oportunos y de los tiempos
  - de los momentos y de los tiempos
  - de las sazones y de los tiempos
  lexicon: LSJ
  rationale: La pareja distingue períodos oportunos o fijados (καιροί) de tiempos/ duraciones más generales (χρόνοι). «Estaciones y tiempos» refleja esa distinción; se mantiene «estaciones» por su resonancia de períodos marcados.
- source_word: οἶδεν / ἐπίσταται / προγινώσκει
  english_pob_choice: knows / understands / knows beforehand
  chosen_spanish: conoce / entiende / conoce de antemano
  alternatives_spanish:
  - sabe / comprende / prevé
  - conoce / comprende / sabe antes
  lexicon: LSJ
  rationale: El verso acumula verbos cognitivos con matices distintos. Variarlos en español ayuda a conservar la riqueza retórica sin nivelarlos en un solo verbo repetido.
- source_word: τις
  english_pob_choice: anyone
  chosen_spanish: alguien
  alternatives_spanish:
  - cualquiera
  - una persona
  - quienquiera
  lexicon: LSJ
  rationale: El pronombre es genérico. «Alguien» suena natural en una cláusula condicional y mantiene la generalidad del original.
- source_word: she
  english_pob_choice: she
  chosen_spanish: ella
  alternatives_spanish:
  - Sabiduría
  - it
  lexicon: context
  rationale: El contexto personifica la Sabiduría como figura femenina activa. «Ella» preserva esa personificación literaria sin convertirla en abstracción impersonal.
theological_decisions:
- issue: Personificación de Sabiduría
  english_pob_reading: Retain feminine personal reference ('she') for Wisdom.
  chosen_spanish_reading: Mantener la referencia personal femenina («ella») para la Sabiduría.
  alternative_spanish_readings:
  - Repetir «Sabiduría» en lugar de un pronombre
  - Usar «ello» o una referencia impersonal
  rationale: El contexto inmediato presenta a la Sabiduría como figura personificada. Conservar «ella» refleja el diseño literario del griego sin añadir una identificación doctrinal extra.
  doctrine_reference: Translation philosophy §1, §6
- issue: Fuerza de εἰκάζειν
  english_pob_reading: Render as 'can infer the things to come' rather than a stronger prophetic term.
  chosen_spanish_reading: Traducirlo como «puede inferir las cosas por venir», no como un verbo profético más fuerte.
  alternative_spanish_readings:
  - puede prever el futuro
  - puede adivinar lo venidero
  - puede profetizar
  rationale: El griego sugiere conjeturar o inferir a partir de indicios, no necesariamente ver el futuro de modo directo. «Inferir» conserva esa diferencia interna del versículo respecto de προγινώσκει.
  doctrine_reference: Translation philosophy §1, §5
translation_notes:
  revision_awareness: 'El texto español sigue el pasaje adjudicado y la revisión final del audit trail, manteniendo la distinción entre πολυπειρίαν y προγινώσκει: la primera queda como «mucha experiencia» y la segunda como «conoce de antemano». También conserva la serie de verbos cognitivos con variación estilística y la personificación femenina de la Sabiduría.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma del proyecto cuando aparezca el nombre divino; en este versículo no aplica.
  - Se preserva «Sabiduría» personificada con pronombre femenino.
  - «Señales y prodigios» sigue la pareja bíblica tradicional sin introducir vocabulario eclesiástico ajeno al griego.
  - «Estaciones y tiempos» intenta reflejar la distinción entre καιροί y χρόνοι sin sobrerinterpretar la cronología.
