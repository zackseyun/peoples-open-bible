  - severity: low
    issue: «Enfrente de» puede sonar algo más coloquial que «frente a» en un registro bíblico digno.
    rationale: Ambas opciones son fieles a נֶגֶד, pero «frente a» mantiene naturalidad y un tono más limpio en español bíblico contemporáneo.
  revised_spanish_text: Entonces Salomón se puso de pie delante del altar de Yahvé, frente a toda la asamblea de Israel, y extendió sus manos hacia el cielo[a].
