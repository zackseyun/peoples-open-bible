revisions:
- from: Entonces volvió desde Sarid hacia el oriente[a], hacia la salida del sol, hasta el límite de Kislot-tabor, y salió a Daberat, y subió a Jafía.
  to: Entonces volvió de Sarid hacia el oriente[a], hacia la salida del sol, hasta el límite de Kislot-tabor; salió a Daberat y subió hasta Jafía.
  rationale: 'Se hacen ajustes menores para reflejar con más precisión el hebreo y el rastro de auditoría del POB: ''de Sarid'' para una fórmula de lindero más natural, ''subió hasta Jafía'' para conservar mejor el valor topográfico de עלה, y una nota más consistente con la doble expresión direccional del original. No se requiere adjudicación adicional.'
