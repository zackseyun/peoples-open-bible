translation:
  language: es
  text: Oh hombres[a], ¿cómo no prevalece el rey, puesto que se le obedece tanto? Y guardó silencio.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Alternativa léxica: «escuchado» o «atendido». La palabra griega ἐπάκουστός puede denotar tanto ser escuchado como ser obedecido; se eligió «obedece» porque el sujeto es el rey y el contexto trata de autoridad.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ὦ ἄνδρες
  english_pob_choice: O men
  chosen_spanish: ¡Oh hombres!
  alternatives_spanish:
  - Hombres
  - Varones
  - Señores
  lexicon: LSJ
  rationale: ὦ ἄνδρες es un vocativo masculino plural explícito. En español, «¡Oh hombres!» conserva el llamado retórico y la marcación de género sin neutralizar el texto.
- source_word: πῶς οὐχ
  english_pob_choice: how does ... not
  chosen_spanish: cómo no
  alternatives_spanish:
  - cómo es que no
  - de qué manera no
  lexicon: LSJ
  rationale: La pregunta retórica en español suena natural como «cómo no», que conserva la fuerza de sorpresa o desafío de πῶς οὐχ sin añadir elementos innecesarios.
- source_word: ὑπερισχύει
  english_pob_choice: prevail
  chosen_spanish: prevalece
  alternatives_spanish:
  - vence
  - tiene superioridad
  - se impone
  lexicon: LSJ
  rationale: El verbo expresa ser más fuerte, prevalecer o tener superioridad. «Prevalece» mantiene el sentido comparativo y retórico sin concretar indebidamente una victoria física.
- source_word: ὁ βασιλεύς
  english_pob_choice: the king
  chosen_spanish: el rey
  alternatives_spanish:
  - el monarca
  - el soberano
  lexicon: LSJ
  rationale: Renderización directa y natural de βασιλεύς en este contexto narrativo.
- source_word: ὅτι
  english_pob_choice: since
  chosen_spanish: puesto que
  alternatives_spanish:
  - porque
  - ya que
  lexicon: LSJ
  rationale: Aquí introduce la razón de la pregunta retórica. «Puesto que» conserva el valor causal con registro digno y claro en español.
- source_word: οὕτως ἐπάκουστός ἐστιν
  english_pob_choice: he is so obeyed
  chosen_spanish: tan obedecido es
  alternatives_spanish:
  - tan escuchado es
  - tan atendido es
  - se le obedece tanto
  lexicon: LSJ
  rationale: ἐπάκουστος puede significar ‘escuchado’, ‘atendido’ u ‘obedecido’. Siguiendo el criterio del contexto de autoridad real, «obedecido» reproduce mejor la fuerza de obediencia; «tan» refleja οὕτως como intensificador.
- source_word: καὶ ἐσίγησεν
  english_pob_choice: And he was silent
  chosen_spanish: Y guardó silencio
  alternatives_spanish:
  - Y calló
  - Y estuvo callado
  - Y se calló
  lexicon: LSJ
  rationale: El aoristo de σιγάω marca el cierre de la intervención. «Guardó silencio» es idiomático en español y evita agregar imagen de caída o cambio dramático no explícito en el griego.
translation_notes:
  revision_awareness: Se siguió el ajuste revisado del inglés auditado, preferiendo una formulación más directa para la pregunta retórica y una clausura verbal que refleje ἐσίγησεν sin añadir imágenes. La decisión principal en español es conservar el valor de autoridad-obediencia de ἐπάκουστός en lugar de suavizarlo a mero ‘escuchado’.
  spanish_consistency_notes:
  - Se mantiene el tratamiento de βασιλεύς como «rey», no como «señor», para no desplazar el campo semántico de autoridad política.
  - El vocativo masculino explícito se conserva como «hombres» en consonancia con la evidencia griega.
  - No se introduce terminología cristológica ni teológica ajena al verso; el tono sigue siendo narrativo y retórico.
