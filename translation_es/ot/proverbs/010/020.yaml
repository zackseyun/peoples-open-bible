review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien el paralelismo y el sentido básico del hebreo: «lengua» por לְשׁוֹן, «plata» por כֶּסֶף, «corazón» por לֵב y una valoración baja para כִּמְעָט. Sin embargo, «plata escogida» suena menos idiomático en español para metal precioso que una formulación como «plata fina», y el contraste valorativo del segundo hemistiquio queda mejor equilibrado con «es de poco valor» que con «vale poco».'
  spanish_quality_summary: El español es claro y legible, pero «plata escogida» resulta algo calcado y poco natural en registro bíblico actual. «Plata fina» mantiene la imagen concreta y suena más proverbial y digno. También conviene alinear la nota con esa mejora y conservar las alternativas documentadas.
  glossary_alignment: No hay conflictos con la terminología del proyecto. «Justo», «impíos», «lengua» y «corazón» son aceptables en contexto. La única corrección recomendada es estilístico-lexical en la expresión de נִבְחָר y una ligera mejora de כִּמְעָט para español más natural y formal.
  issues:
  - severity: medium
    issue: «Plata escogida» es poco idiomático en español bíblico natural.
    rationale: Aunque reproduce de cerca «choice silver», en español la combinación suena forzada. נִבְחָר describe calidad selecta; «plata fina» o «plata selecta» comunica mejor el valor del metal sin perder el sentido.
  - severity: low
    issue: «Vale poco» es correcto, pero «es de poco valor» encaja mejor con el tono proverbial formal.
    rationale: El hebreo כִּמְעָט es conciso y la auditoría inglesa prefirió «is of little worth». En español, «es de poco valor» mantiene mejor el registro y el paralelismo evaluativo con la primera cláusula.
  revised_spanish_text: La lengua del justo es plata fina[a]; el corazón de los impíos es de poco valor.
  revised_footnotes:
  - marker: a
    text: 'También puede entenderse: «plata selecta» o «plata escogida»; el hebreo נִבְחָר destaca la alta calidad del metal.'
    reason: lexical_alternative
  revision_rationale: 'Se revisa para lograr un español más idiomático y digno sin alterar el sentido fuente: «plata fina» expresa mejor la calidad selecta de נִבְחָר en este contexto, y «es de poco valor» refleja con mayor naturalidad formal el valor escaso de כִּמְעָט. Se conserva la nota léxica con alternativas pertinentes documentadas por la auditoría inglesa.'
