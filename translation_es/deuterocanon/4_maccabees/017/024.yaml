    issue: La nota [c] no coincide con la rationale auditada en inglés.
    rationale: El expediente inglés dice que el griego deja comprimido y algo implícito el sujeto de la cláusula final; la nota española actual habla del objeto implícito de «devastarlos», lo cual cambia el foco exegético documentado.
  - severity: low
    issue: «Guerra de sitio» suena menos natural que «guerra de asedio».
    rationale: Ambas pueden entenderse, pero «asedio» es la opción más clara y ampliamente natural en español contemporáneo para πολιορκία en un registro bíblico moderno.
  - severity: low
    issue: «Devastarlos» es aceptable, pero «saquearlos» se ajusta mejor al matiz militar habitual de ἐκπορθήσας.
    rationale: La nota léxica ya preserva «devastar» como alternativa. En el texto principal, «saquearlos» mantiene mejor la idea de tomar y expoliar/arrasar plazas o fortalezas sin sobregeneralizar.
  revised_spanish_text: Y los hizo nobles y valientes para el combate de infantería[a] y la guerra de asedio, y después de saquearlos[b][c], venció a todos los enemigos.
