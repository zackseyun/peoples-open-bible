translation:
  language: es
  text: Los montes brincaron como carneros[a], los collados como corderos del rebaño.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo literalmente: “como hijos del rebaño”, es decir, corderos u ovejas jóvenes.'
    reason: lexical_alternative
lexical_decisions:
- source_word: הָרִים
  english_pob_choice: the mountains
  chosen_spanish: los montes
  alternatives_spanish:
  - las montañas
  - los montes
  lexicon: HALOT
  rationale: El hebreo lleva artículo definido; en español, 'los montes' conserva el valor genérico/poético y suena natural en el paralelismo. 'Montañas' también sería posible, pero 'montes' encaja mejor con el registro bíblico-poético.
- source_word: רָקְדוּ
  english_pob_choice: skipped
  chosen_spanish: brincaron
  alternatives_spanish:
  - saltaron
  - danzaron
  - brincaron
  lexicon: HALOT
  rationale: El verbo expresa un movimiento ágil y vivaz. 'Brincaron' comunica mejor la imagen dinámica de saltar con viveza que 'danzaron', que sería más interpretativo, o 'saltaron', que es correcto pero algo menos expresivo en este contexto poético.
- source_word: כְאֵילִים
  english_pob_choice: like rams
  chosen_spanish: como carneros
  alternatives_spanish:
  - como rams
  - como machos de oveja
  - como carneros
  lexicon: HALOT
  rationale: אֵילִים se refiere a carneros, y esa equivalencia es clara en español. Se evita 'rams' y 'machos de oveja' por menos naturalidad o exceso de explicación.
- source_word: גְּבָעוֹת
  english_pob_choice: the hills
  chosen_spanish: los collados
  alternatives_spanish:
  - los montes
  - las colinas
  - los collados
  lexicon: HALOT
  rationale: Aunque el sustantivo no lleva artículo formal, el paralelismo poético pide una forma definida en español. 'Collados' mantiene la pareja poética con 'montes' y es plenamente idiomático en registro bíblico.
- source_word: כִּבְנֵי צֹאן
  english_pob_choice: like lambs of the flock
  chosen_spanish: como corderos del rebaño
  alternatives_spanish:
  - como hijos del rebaño
  - como corderos
  - como ovejas jóvenes
  lexicon: HALOT
  rationale: La expresión hebrea literal es 'como hijos del rebaño', pero el audit trail inglés ya la identifica como un modismo para animales jóvenes. 'Corderos del rebaño' conserva la imagen y la claridad en español sin perder el trasfondo idiomático.
translation_notes:
  revision_awareness: El texto hebreo y el contexto de auditoría inglesa están en acuerdo alto; no se requieren revisiones textuales o de sentido. La principal decisión fue mantener la imagen poética con equivalencias naturales en español.
  spanish_consistency_notes:
  - Se mantuvo el paralelismo poético entre los dos miembros del versículo.
  - Se usó terminología animal concreta y natural en español para preservar la fuerza visual del hebreo.
  - La nota a pie de página conserva la alternativa literal del hebreo, ya documentada en el audit trail inglés.
