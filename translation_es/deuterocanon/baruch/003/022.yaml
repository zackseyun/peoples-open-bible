lexical_decisions:
- source_word: οὐδὲ
  english_pob_choice: nor
  chosen_spanish: ni
  alternatives_spanish:
  - ni tampoco
  - y no
  lexicon: LSJ
  rationale: En español, 'ni' reproduce de forma natural la coordinación negativa acumulativa del griego y mantiene el paralelismo con la cláusula anterior sin añadir énfasis ajeno al texto.
- source_word: ἠκούσθη
  english_pob_choice: was heard
  chosen_spanish: se oyó
  alternatives_spanish:
  - fue oído
  - se escuchó
  lexicon: BDAG
  rationale: El pasivo aoristo de ἀκούω permite una traducción impersonal y natural en español. 'Se oyó' conserva la idea de que algo llegó a oírse o a ser conocido, sin introducir explícitamente 'de', coherente con la revisión inglesa que eliminó 'of' para acercarse más al griego.
- source_word: ἐν
  english_pob_choice: in
  chosen_spanish: en
  alternatives_spanish:
  - entre
  - dentro de
  lexicon: BDAG
  rationale: Aquí λειτουργa como localizador geográfico. 'En' es la opción más directa y transparente para los nombres propios de lugar.
- source_word: Χαναάν
  english_pob_choice: Canaan
  chosen_spanish: Canaán
  alternatives_spanish:
  - Canaan
  lexicon: LSJ
  rationale: 'Se conserva la transliteración bíblica usual en español, con acento gráfico normativo: ''Canaán''.'
- source_word: ὤφθη
  english_pob_choice: was seen
  chosen_spanish: se vio
  alternatives_spanish:
  - apareció
  - fue visto
  lexicon: BDAG
  rationale: El pasivo de ὁράω se expresa con naturalidad en español como 'se vio', manteniendo la correspondencia con 'se oyó' y evitando sobreinterpretar con 'apareció' o 'fue hallado'.
- source_word: Θαιμάν
  english_pob_choice: Teman
  chosen_spanish: Temán
  alternatives_spanish:
  - Teman
  lexicon: LSJ
  rationale: 'Se adopta la forma bíblica española con acento: ''Temán''. Preserva el topónimo y su pronunciación habitual en español.'
theological_decisions:
- issue: Sujeto implícito de los verbos pasivos
  english_pob_reading: The verse continues speaking of wisdom from the surrounding context, without supplying the noun in English.
  chosen_spanish_reading: El verso mantiene el sujeto implícito del contexto, sin añadir 'sabiduría' en el texto principal.
  alternative_spanish_readings:
  - ni se oyó la sabiduría en Canaán, ni se vio en Temán
  - ni fue oída la sabiduría en Canaán, ni fue vista en Temán
  rationale: El griego no repite el sustantivo; el sentido depende del contexto inmediato. En español, como en el inglés POB, conviene preservar la elipsis en el texto principal y dejar la referencia contextual implícita, sin expandirla más de lo que el versículo dice.
  doctrine_reference: Translación de equivalencia óptima; preservar la elipsis del original y evitar paráfrasis explicativa en el cuerpo del texto.
translation_notes:
  revision_awareness: El texto inglés auditado fue revisado desde 'nor was it heard of in Canaan' a 'nor was it heard in Canaan' para acercarse más al griego y evitar una expansión preposicional. La versión española sigue esa revisión al omitir cualquier equivalente de 'de/of' y usar una construcción impersonal directa.
  spanish_consistency_notes:
  - Se mantiene el paralelismo negativo con 'ni... ni...'.
  - 'Se conservan los topónimos bíblicos en forma española estándar: Canaán y Temán.'
  - No se introduce 'sabiduría' en el cuerpo del versículo para respetar la elipsis del griego, pero se aclara en nota.
  - La elección de 'se oyó' y 'se vio' preserva el tono pasivo sin volver la frase demasiado literal o áspera en español.
