  chosen_spanish: morada
  alternatives_spanish:
  - morada/residencia
  - "habitaci\0f3n"
  - estancia
  lexicon: HALOT
  rationale: "מוֹשַׁב puede expresar residencia, asentamiento o estado de habitar. En espa\0f1ol, \"morada\" conserva el sustantivo abstracto y resulta natural en un registro b\0edblico sin forzar una lectura espacial solamente. \"Residencia\" es posible, pero suena m\0e1s administrativa."
