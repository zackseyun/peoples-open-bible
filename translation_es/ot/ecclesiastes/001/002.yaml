- from: Aliento de alientos[a], dice Qohelet[b]; aliento de alientos, todo es mero aliento.
  to: Vapor de vapores[a], dice Qohelet[b]; vapor de vapores, todo es mero vapor.
  rationale: Se cambia «aliento» por «vapor» para preservar mejor en español la imagen concreta de הֶבֶל como algo efímero y elusivo, en línea con la decisión léxica y teológica del POB de evitar abstracciones como «vanidad», «futilidad» o «sin sentido». Se mantiene «mero vapor» en el predicado para expresar el matiz evaluativo y deflacionario documentado en la auditoría inglesa. Se amplía la nota [a] para reflejar con más fidelidad la justificación POB del superlativo hebreo y del campo semántico de hevel.
