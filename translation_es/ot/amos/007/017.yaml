base_translation:
  language: en
  yaml_path: translation/ot/amos/007/017.yaml
  text: 'Therefore[a], this is what Yahweh says: ‘Your wife will prostitute herself in the city, and your sons and your daughters will fall by the sword, and your land will be divided by measuring line; and you yourself will die on unclean land[c][b], and Israel will surely go into exile from its land.’'
  footnotes:
  - marker: a
    text: Or, “will play the prostitute.” The Hebrew verb can be rendered more literally this way; “will prostitute herself” is chosen for clear modern English.
    reason: lexical_alternative
  - marker: b
    text: Literally, “will be divided by line/cord,” referring to the measuring line used to apportion conquered land.
    reason: lexical_alternative
  - marker: c
    text: “Will surely go into exile” renders an infinitive absolute with a finite verb in Hebrew, expressing emphasis or certainty.
    reason: lexical_alternative
