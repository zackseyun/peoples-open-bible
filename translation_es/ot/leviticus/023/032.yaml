  yaml_path: translation/ot/leviticus/023/032.yaml
  text: It is a Sabbath of complete rest for you[a], and you shall afflict yourselves. On the ninth day of the month, in the evening, from evening to evening[b], you shall keep your Sabbath.
  footnotes:
