translation:
  language: es
  text: Y sus hijos serán pastores[a] en el desierto por cuarenta años, y cargarán con[b] su infidelidad, hasta que sus cadáveres sean consumidos en el desierto[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'errantes' para 'pastores'; la palabra hebrea se relaciona literalmente con el pastoreo, pero algunos la entienden como énfasis en su andar nómada.
    reason: lexical_alternative
  - marker: b
    text: O 'llevarán' o 'sufrirán por'; el hebreo expresa cargar o soportar las consecuencias de la infidelidad.
    reason: lexical_alternative
  - marker: c
    text: O 'hasta que sus cadáveres lleguen a su fin en el desierto'.
    reason: alternative_reading
lexical_decisions:
- source_word: וּבְנֵיכֶם
  english_pob_choice: And your sons
  chosen_spanish: Y tus hijos
  alternatives_spanish:
  - Y tus hijos varones
  - Y tus descendientes
  lexicon: HALOT
  rationale: בנים en plural masculino puede referirse a 'hijos' en español con naturalidad. 'Hijos' comunica el referente familiar sin forzar una precisión de género que en español ya queda implícita en el posesivo y el contexto.
- source_word: יִהְיוּ רֹעִים
  english_pob_choice: will be shepherds
  chosen_spanish: serán pastores
  alternatives_spanish:
  - serán pastoreadores
  - andarán errantes
  lexicon: HALOT
  rationale: רֹעִים se relaciona léxicamente con pastorear. 'Pastores' conserva el vínculo literal mejor que una paráfrasis como 'andarán errantes', aunque el contexto de juicio incluye la idea de vida nómada en el desierto.
- source_word: בַּמִּדְבָּר
  english_pob_choice: in the wilderness
  chosen_spanish: en el desierto
  alternatives_spanish:
  - en el desierto / la estepa
  - en la región desértica
  lexicon: HALOT
  rationale: En español bíblico actual, 'desierto' comunica bien מִדְבָּר y es más natural que 'wilderness'. Se mantiene el sentido de lugar inhóspito y de peregrinación.
- source_word: אַרְבָּעִים שָׁנָה
  english_pob_choice: for forty years
  chosen_spanish: por cuarenta años
  alternatives_spanish:
  - durante cuarenta años
  lexicon: HALOT
  rationale: Expresa duración de manera directa y fiel al hebreo.
- source_word: וְנָשְׂאוּ
  english_pob_choice: and they will bear
  chosen_spanish: y llevarán
  alternatives_spanish:
  - y cargarán
  - y sufrirán
  lexicon: HALOT
  rationale: נשא aquí tiene la idea de soportar o cargar consecuencias. 'Llevarán' preserva la metáfora sin volverla demasiado explícita; 'cargarán' sería posible, pero 'llevarán' fluye mejor con el objeto abstracto.
- source_word: אֶת זְנוּתֵיכֶם
  english_pob_choice: your unfaithfulness
  chosen_spanish: tu infidelidad
  alternatives_spanish:
  - su infidelidad
  - tu deslealtad
  - tu prostitución
  lexicon: HALOT
  rationale: זְנוּת en contexto de pacto expresa infidelidad con imaginería sexual. 'Infidelidad' comunica la deslealtad del pacto en español natural. Se usa singular posesivo porque el hebreo se dirige al pueblo como conjunto en segunda persona plural.
- source_word: עַד תֹּם
  english_pob_choice: until ... are consumed
  chosen_spanish: hasta que ... sean consumidos
  alternatives_spanish:
  - hasta el final de
  - hasta que ... terminen
  lexicon: HALOT
  rationale: תֹּם indica término o consumación. 'Sean consumidos' reproduce con dignidad la idea de agotamiento total y juicio final, en línea con la revisión inglesa más reciente.
- source_word: פִּגְרֵיכֶם
  english_pob_choice: your dead bodies
  chosen_spanish: vuestros cadáveres
  alternatives_spanish:
  - sus cadáveres
  - vuestros cuerpos muertos
  lexicon: HALOT
  rationale: פגר significa cadáver/carcasa. 'Cadáveres' es exacto y más directo que 'cuerpos muertos'. Se mantiene el pronombre plural como en el hebreo.
- source_word: בַּמִּדְבָּר
  english_pob_choice: in the wilderness
  chosen_spanish: en el desierto
  alternatives_spanish:
  - en el desierto otra vez
  - en la estepa
  lexicon: HALOT
  rationale: Se repite el mismo término para conservar la cohesión del versículo y la estructura enfática del hebreo.
theological_decisions:
- issue: Cómo reflejar זְנוּתֵיכֶם sin reducir el lenguaje sexual del pacto a mera 'desobediencia'
  english_pob_reading: your unfaithfulness
  chosen_spanish_reading: tu infidelidad
  alternative_spanish_readings:
  - su infidelidad
  - tu deslealtad
  - tu prostitución
  rationale: El hebreo usa un término de carga sexual aplicado a la infidelidad del pueblo al pacto. 'Infidelidad' mantiene la acusación moral y teológica sin endurecer el español con un término arcaizante. Se conserva la tensión entre metáfora sexual y deslealtad covenantal.
  doctrine_reference: Translation philosophy §3, §6
- issue: Cómo tratar רֹעִים entre su sentido literal de pastorear y su efecto contextual de vagar por el desierto
  english_pob_reading: shepherds
  chosen_spanish_reading: pastores
  alternative_spanish_readings:
  - andarán errantes
  - serán pastores nómadas
  rationale: La decisión prioriza el vínculo léxico con pastorear, como en el audit trail inglés. El contexto de juicio hace visible la vida errante, pero no debe reemplazar el verbo/participio de origen en el texto principal.
  doctrine_reference: Translation philosophy §1, §5
translation_notes:
  revision_awareness: 'La redacción sigue la revisión inglesa más reciente en dos puntos clave: adopta una equivalencia más natural para זְנוּתֵיכֶם como ''infidelidad'' en vez de una formulación más literal y pesada, y refleja תֹּם con ''sean consumidos'' para comunicar consumación/jucio final. También conserva la alternativa reconocida para רֹעִים en nota.'
  spanish_consistency_notes:
  - Se mantiene 'desierto' de forma uniforme para בַּמִּדְבָּר en ambos casos.
  - '''Pastores'' conserva la textura literal del hebreo y evita sustituir el término por una paráfrasis interpretativa en el cuerpo principal.'
  - El posesivo singular 'tu' sigue el uso colectivo del hebreo dirigido al pueblo; no se ha intentado singularizar el referente teológicamente.
