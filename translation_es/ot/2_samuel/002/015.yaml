  glossary_alignment: No hay términos teológicos de alto impacto aquí. La elección «esclavos» para עַבְדֵי es defendible por la política del proyecto de mantener fuerza léxica, aunque en este contexto militar-cortesano podría sonar dura; no exige cambio. El nombre propio puede mantenerse como «Is-boset» si se documenta que el hebreo subyacente es «Ish-bosheth».
