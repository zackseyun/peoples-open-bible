translation:
  language: es
  text: Pero cuando muchos habían sido apresados, un hebreo llamado Eleazar, el primero de la compañía[a], sacerdote por linaje, instruido en la ley[b], de edad avanzada, y conocido por muchos alrededor del tirano a causa de su edad, abrió su boca.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «un hombre, el primero del grupo». El griego dice literalmente «de la manada» o «del rebaño», usando una metáfora para el grupo de hebreos.
    reason: lexical_alternative
  - marker: b
    text: O «experto en la ley». El griego describe a Eleazar como instruido respecto de la ley, no como un profesional jurídico en sentido moderno.
    reason: lexical_alternative
lexical_decisions:
- source_word: συναρπασθέντων
  english_pob_choice: had been seized
  chosen_spanish: habían sido apresados
  alternatives_spanish:
  - habían sido arrebatados
  - habían sido llevados por la fuerza
  lexicon: LSJ
  rationale: El participio expresa captura violenta o aprehensión coercitiva. «Apresados» preserva esa fuerza en español natural; «arrebatados» suena más figurado y «llevados por la fuerza» explicita demasiado el modo.
- source_word: ἀγέλης
  english_pob_choice: company
  chosen_spanish: compañía
  alternatives_spanish:
  - grupo
  - rebaño
  lexicon: LSJ
  rationale: El griego usa literalmente la imagen de un rebaño/manada para el conjunto de hebreos. «Compañía» sigue la revisión inglesa por naturalidad, pero conserva un matiz colectivo más formal que «grupo». «Rebaño» mantendría la metáfora, aunque en español podría sonar despectivo o demasiado marcado.
- source_word: Ἑβραῖος
  english_pob_choice: a Hebrew
  chosen_spanish: un hebreo
  alternatives_spanish:
  - un judío
  - un israelita
  lexicon: LSJ
  rationale: El texto griego dice explícitamente «hebreo». «Judío» sería más interpretativo; «hebreo» se alinea mejor con el léxico de la fuente.
- source_word: τὸ γένος ἱερεύς
  english_pob_choice: a priest by birth
  chosen_spanish: sacerdote por linaje
  alternatives_spanish:
  - sacerdote por nacimiento
  - de linaje sacerdotal
  lexicon: LSJ
  rationale: La frase identifica ascendencia o estirpe sacerdotal. «Por linaje» conserva el valor genealógico con dignidad, sin introducir una categoría profesional moderna.
- source_word: τὴν ἐπιστήμην νομικός
  english_pob_choice: learned in the law
  chosen_spanish: instruido en la ley
  alternatives_spanish:
  - versado en la ley
  - experto en la ley
  lexicon: LSJ
  rationale: Ἐπιστήμη señala conocimiento o formación, y νομικός remite a la ley. «Instruido en la ley» comunica saber adquirido sin convertirlo en «abogado» o en un profesional jurídico moderno, lo cual sería anacrónico.
- source_word: τὴν ἡλικίαν προήκων
  english_pob_choice: advanced in age
  chosen_spanish: avanzado en edad
  alternatives_spanish:
  - de edad avanzada
  - ya entrado en años
  lexicon: LSJ
  rationale: La expresión señala vejez o estar muy adelantado en años. «Avanzado en edad» es sobrio y fiel al tono del griego.
- source_word: πολλοῖς τῶν περὶ τὸν τύραννον
  english_pob_choice: many around the tyrant
  chosen_spanish: muchos de los que estaban alrededor del tirano
  alternatives_spanish:
  - muchos de los del entorno del tirano
  - muchos de los que rodeaban al tirano
  lexicon: LSJ
  rationale: La frase apunta al círculo o séquito del tirano. La forma elegida preserva la relación espacial/social del griego y su referencia al entorno cortesano.
- source_word: γνώριμος
  english_pob_choice: known
  chosen_spanish: conocido
  alternatives_spanish:
  - familiar
  - bien conocido
  lexicon: LSJ
  rationale: El adjetivo significa conocido o familiar. «Conocido» es suficiente y no añade énfasis ausente en la fuente.
- source_word: ἠνῴχετο τὸ στόμιον αὐτοῦ
  english_pob_choice: opened his mouth
  chosen_spanish: abrió su boca
  alternatives_spanish:
  - comenzó a hablar
  - abrió sus labios
  lexicon: LSJ
  rationale: Es un giro idiomático para iniciar el habla. «Abrió su boca» conserva la literalidad solemne del griego; en español puede sonar un poco más semítico, pero respeta bien la textura del original.
theological_decisions:
- issue: Referencia al nombre divino o cristológica
  english_pob_reading: No appears in this verse
  chosen_spanish_reading: No aparece en este versículo
  rationale: El versículo no contiene léxico divino ni cristológico; por tanto, no hay decisión teológica especial que aplicar aquí.
  doctrine_reference: N/A
- issue: Valor de ἀγέλη como metáfora colectiva
  english_pob_reading: The Greek literally says 'from the flock,' using a metaphor for the company of Hebrews.
  chosen_spanish_reading: La metáfora queda atenuada en «compañía», sin forzar un término eclesiástico.
  alternative_spanish_readings:
  - «rebaño» para conservar la metáfora literal
  - «grupo» para mayor neutralidad
  rationale: La fuente inglesa documenta la metáfora zoológica, pero también la revisa por naturalidad. En español, «compañía» evita la posible dureza de «rebaño» sin borrar el sentido de conjunto señalado por el griego.
  doctrine_reference: Poética retórica del texto; no doctrinal
translation_notes:
  revision_awareness: 'La revisión inglesa reciente sustituyó «flock» por «company» y simplificó la expresión sobre la ley a «learned in the law». Esta versión española refleja esas decisiones revisadas sin perder la huella del griego: mantiene el valor colectivo de ἀγέλη y la idea de conocimiento en la ley de νομικός/ἐπιστήμη.'
  spanish_consistency_notes:
  - Se mantuvo «hebreo» para Ἑβραῖος, coherente con el audit trail.
  - «Sacerdote» se conserva por la identificación de linaje, no como oficio general.
  - «Tirano» reproduce τύραννος, siguiendo el tono político del original.
  - La frase final se dejó literal para conservar el idiomatismo y la solemnidad del giro griego.
