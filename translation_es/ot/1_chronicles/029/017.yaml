translation:
  language: es
  text: Y yo sé[a], mi Dios, que tú pruebas el corazón y te complaces en la rectitud. Yo, en la rectitud de mi corazón, he ofrecido voluntariamente todas estas cosas, y ahora he visto con alegría que tu pueblo[b], que está presente aquí, presenta voluntariamente sus ofrendas para ti.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «te deleitas en la integridad» para «te complaces en la rectitud».
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: «tu pueblo que se encuentra aquí», es decir, «tu pueblo que está presente aquí».'
    reason: lexical_alternative
lexical_decisions:
- source_word: בֹּחֵן לֵבָב
  english_pob_choice: test the heart
  chosen_spanish: pruebas el corazón
  alternatives_spanish:
  - examinas el corazón
  - pruebas el interior
  lexicon: HALOT
  rationale: בֹּחֵן expresa la acción de examinar/probar con valor evaluativo. En español, «pruebas el corazón» conserva la fuerza bíblica y la imagen de evaluación divina sin volverlo rebuscado. לֵבָב se mantiene como «corazón», que en este contexto abarca la interioridad y la intención.
- source_word: וּמֵישָׁרִים תִּרְצֶה
  english_pob_choice: take pleasure in uprightness
  chosen_spanish: te complaces en la rectitud
  alternatives_spanish:
  - deléitas en la integridad
  - apruebas lo recto
  lexicon: HALOT
  rationale: מֵישָׁרִים apunta a lo recto/upright, y תִּרְצֶה comunica aceptación o complacencia. «Te complaces en la rectitud» reproduce bien ambos elementos y suena natural en español bíblico contemporáneo.
- source_word: בְּיֹשֶׁר לְבָבִי
  english_pob_choice: in the uprightness of my heart
  chosen_spanish: en la rectitud de mi corazón
  alternatives_spanish:
  - con un corazón íntegro
  - en la integridad de mi corazón
  lexicon: HALOT
  rationale: 'יֹשֶׁר designa rectitud/integridad moral. La preposición y el sustantivo en español permiten una equivalencia directa y clara: «en la rectitud de mi corazón», conservando la manera o cualidad moral del dar.'
- source_word: הִתְנַדַּבְתִּי
  english_pob_choice: have willingly offered
  chosen_spanish: he ofrecido voluntariamente
  alternatives_spanish:
  - he dado libremente
  - me he ofrecido voluntariamente
  lexicon: HALOT
  rationale: El hitpael de נדב expresa dar/ofrecerse de manera libre y voluntaria. «He ofrecido voluntariamente» mantiene el matiz de ofrenda libre, en un registro natural y acorde con el contexto cultual.
- source_word: כָל אֵלֶּה
  english_pob_choice: all these things
  chosen_spanish: todas estas cosas
  alternatives_spanish:
  - todo esto
  - todas estas
  lexicon: HALOT
  rationale: La expresión remite a los dones y aportes mencionados inmediatamente antes. «Todas estas cosas» es idiomático en español y deja abierto el referente sin sobreexplicarlo.
- source_word: עַמְּךָ הַנִּמְצְאוּ פֹה
  english_pob_choice: your people who are present here
  chosen_spanish: tu pueblo, el que está presente aquí
  alternatives_spanish:
  - tu pueblo que se encuentra aquí
  - tu pueblo, los que están aquí
  lexicon: HALOT
  rationale: נמצא en nifal puede significar «estar presente» en este contexto. La formulación con inciso explicativo aclara el hebreo sin perder el valor literal de «hallarse/presentarse».
- source_word: רָאִיתִי בְשִׂמְחָה
  english_pob_choice: I have seen ... with joy
  chosen_spanish: he visto ... con alegría
  alternatives_spanish:
  - he visto ... con gozo
  - he observado con alegría
  lexicon: HALOT
  rationale: La frase indica la actitud con que David mira la ofrenda del pueblo. «Con alegría» comunica bien בְשִׂמְחָה en español moderno y mantiene la idea de una observación gozosa.
- source_word: לְהִתְנַדֶּב לָךְ
  english_pob_choice: willingly offer to you
  chosen_spanish: se ofrece voluntariamente a ti
  alternatives_spanish:
  - ofrecerse voluntariamente a ti
  - presentar voluntariamente su ofrenda a ti
  lexicon: HALOT
  rationale: Se conserva la raíz נדב con el mismo campo semántico de ofrenda libre. En español, el reflexivo «se ofrece voluntariamente» comunica la respuesta del pueblo y mantiene continuidad con «he ofrecido voluntariamente».
- source_word: אֱלֹהַי
  english_pob_choice: my God
  chosen_spanish: mi Dios
  alternatives_spanish:
  - Dios mío
  lexicon: HALOT
  rationale: La vocación directa posesiva es natural en español con «mi Dios», que conserva dignidad y claridad.
theological_decisions:
- issue: Antropología de לֵבָב
  english_pob_reading: heart as the inner person/will
  chosen_spanish_reading: corazón como la sede de la interioridad y la intención
  alternative_spanish_readings:
  - mente
  - ser interior
  rationale: En la Biblia hebrea, «corazón» abarca pensamiento, voluntad e ինտención. Mantener «corazón» evita reducir el concepto a una sola facultad y preserva la amplitud antropológica del pasaje.
  doctrine_reference: Antropología bíblica; uso semántico de לֵבָב en el AT
- issue: Sentido de la ofrenda voluntaria
  english_pob_reading: willingly offered / willingly offer
  chosen_spanish_reading: ofrecer voluntariamente como respuesta libre delante de Dios
  alternative_spanish_readings:
  - donar libremente
  - presentar espontáneamente
  rationale: El hebreo insiste en la voluntariedad tanto del acto de David como del pueblo. La versión española debe mantener ese énfasis sin convertirlo en un mero gesto emocional; «voluntariamente» conserva el matiz de decisión libre.
  doctrine_reference: Teología de la ofrenda y la disposición voluntaria en el culto
- issue: מֵישָׁרִים / יֹשֶׁר
  english_pob_reading: uprightness / integrity
  chosen_spanish_reading: rectitud
  alternative_spanish_readings:
  - integridad
  - justicia
  rationale: «Rectitud» cubre bien la idea moral de lo derecho/integro y funciona tanto para el carácter de Dios como para la disposición del hablante. En este contexto evita la posible restricción ética de «justicia» y la posible abstracción de «integridad».
  doctrine_reference: Ética bíblica; rectitud delante de Dios
translation_notes:
  revision_awareness: El borrador sigue de cerca el texto hebreo masorético de 1 Crónicas 29:17 y la decisión auditada del POB inglés de mantener el lenguaje de prueba/examen del corazón, la complacencia en la uprightness/rectitud y la doble insistencia en la ofrenda voluntaria. No se introdujeron cambios textuales; la revisión previa del inglés quedó sin alteraciones significativas, y la traducción española conserva esa estabilidad.
  spanish_consistency_notes:
  - Se mantiene «corazón» para לֵבָב y no se sustituye por «mente» para no estrechar el antropologismo bíblico.
  - Se usa «rectitud» de forma consistente para מֵישָׁרִים / יֹשֶׁר, siguiendo la línea semántica del inglés POB.
  - «Voluntariamente» traduce el valor voluntativo de נדב en ambos miembros del versículo, para preservar la repetición retórica del hebreo.
  - «Mi Dios» respeta el vocativo directo de אֱלֹהַי sin introducir mayúsculas devocionales no requeridas por el texto.
