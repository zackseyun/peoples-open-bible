translation:
  language: es
  text: los que esperan la muerte[a], y no llega, y cavan por ella más que por tesoros escondidos
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Lit. «y no está», es decir, la muerte no aparece o no llega.
    reason: lexical_alternative
lexical_decisions:
- source_word: הַמְחַכִּים
  english_pob_choice: who wait for
  chosen_spanish: los que esperan
  alternatives_spanish:
  - los que aguardan
  - los que anhelan
  lexicon: HALOT
  rationale: El participio expresa espera con expectativa. «Esperan» conserva el sentido básico de esperar sin convertirlo en puro deseo; «aguardan» sería posible, pero suena un poco más marcado o literario.
- source_word: לַמָּוֶת
  english_pob_choice: for death
  chosen_spanish: la muerte
  alternatives_spanish:
  - a la muerte
  - de muerte
  lexicon: HALOT
  rationale: La preposición con el sustantivo funciona como objeto de la espera. En español, el complemento natural es simplemente «la muerte» dentro de la frase verbal «esperan la muerte».
- source_word: וְאֵינֶנּוּ
  english_pob_choice: but it does not come
  chosen_spanish: y no llega[a]
  alternatives_spanish:
  - y no está
  - y no aparece
  lexicon: HALOT
  rationale: El hebreo dice literalmente «y no es / no está», con el pronombre sufijado referido a la muerte. En contexto, el sentido idiomático es que la muerte no se presenta ni arriba; «no llega» comunica esa ausencia con naturalidad, aunque se conserva una nota para la alternativa literal.
- source_word: וַיַּחְפְּרֻהוּ
  english_pob_choice: and dig for it
  chosen_spanish: y la buscan
  alternatives_spanish:
  - y cavan por ella
  - y la excavan
  lexicon: HALOT
  rationale: El verbo literalmente es «cavar/ahondar», usado aquí de manera metafórica para buscar intensamente. En español, «la buscan» evita un giro forzado, pero la nota mantiene la imagen literal de cavar implícita en el hebreo.
- source_word: מִמַּטְמוֹנִים
  english_pob_choice: more than for hidden treasures
  chosen_spanish: más que a tesoros escondidos
  alternatives_spanish:
  - más que a tesoros ocultos
  - más que tesoros enterrados
  lexicon: HALOT
  rationale: מַטְמוֹן se refiere a tesoro escondido o guardado. «Tesoros escondidos» conserva el valor léxico y la imagen de algo oculto que se busca con esfuerzo. La comparación «más que a» refleja el valor comparativo de מִן.
translation_notes:
  revision_awareness: El texto hebreo y el audit trail inglés concuerdan de forma alta; se mantiene la metáfora de búsqueda intensa, aunque en español se suaviza el verbo «cavar» para lograr lectura natural sin perder el contraste con «tesoros escondidos».
  spanish_consistency_notes:
  - Se usa «la muerte» de manera directa, sin sustituirla por un giro abstracto.
  - Se conserva el paralelismo entre la espera de la muerte y la búsqueda de tesoros escondidos.
  - La nota [a] preserva la alternativa literal del hebreo «y no está».
