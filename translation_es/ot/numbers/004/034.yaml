translation:
  language: es
  text: Entonces Moisés, Aarón y los líderes de la congregación contaron a los hijos de Coat[a][b], por sus clanes y por sus casas paternas[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: También puede entenderse «numeraron» o «hicieron un censo de». El verbo hebreo puede significar «designar» en otros contextos, pero aquí se trata de contar para el servicio.
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: «hijos del coatita», es decir, los descendientes o el grupo de clan de Coat.'
    reason: lexical_alternative
  - marker: c
    text: «Casas paternas» conserva un término de parentesco israelita que designa hogares ancestrales o divisiones familiares.
    reason: cultural_note
lexical_decisions:
- source_word: וַיִּפְקֹד
  english_pob_choice: counted
  chosen_spanish: contaron
  alternatives_spanish:
  - numeraron
  - hicieron un censo de
  - designaron
  lexicon: HALOT
  rationale: En este contexto de enumeración para servicio, פקד se refiere a contar/enlistar personas. «Contaron» es natural en español y conserva el valor censal sin introducir una idea de nombramiento.
- source_word: נְשִׂיאֵי הָעֵדָה
  english_pob_choice: the leaders of the congregation
  chosen_spanish: los líderes de la congregación
  alternatives_spanish:
  - los jefes de la comunidad
  - los príncipes de la asamblea
  lexicon: HALOT
  rationale: «Líderes» comunica la función de נשיאים en español moderno sin perder el matiz de autoridad comunitaria; «congregación» mantiene el uso bíblico usual para עֵדָה en este tipo de contexto.
- source_word: בְּנֵי הַקְּהָתִי
  english_pob_choice: the sons of the Kohathites
  chosen_spanish: los hijos de los coatitas
  alternatives_spanish:
  - los coatitas
  - los descendientes de Coat
  lexicon: HALOT
  rationale: La frase hebrea dice literalmente «hijos de los coatitas/Kohath». «Hijos de los coatitas» preserva la construcción de בני y sigue siendo comprensible en español; se evita reducirlo solo a «coatitas» para no perder la forma genealógica explícita.
- source_word: לְמִשְׁפְּחֹתָם
  english_pob_choice: by their clans
  chosen_spanish: por sus clanes
  alternatives_spanish:
  - según sus familias
  - por sus familias
  lexicon: HALOT
  rationale: En contextos censales y genealógicos, מִשְׁפָּחָה funciona como subdivisión de parentesco. «Clanes» expresa bien esa unidad social en español y conserva el valor clasificatorio de לְ.
- source_word: וּלְבֵית אֲבֹתָם
  english_pob_choice: and by their fathers’ houses
  chosen_spanish: y por sus casas paternas
  alternatives_spanish:
  - y por sus casas de padres
  - y según sus casas ancestrales
  lexicon: HALOT
  rationale: «Casas paternas» mantiene la expresión técnica בית אבות y la relación con el linaje paterno. Aunque es una fórmula algo marcada, en español bíblico es fiel y suficientemente inteligible.
translation_notes:
  revision_awareness: 'La versión sigue el pasaje hebreo con alta concordancia con la auditoría inglesa: mantiene el valor censal de וַיִּפְקֹד, la enumeración de autoridades comunitarias y la estructura genealógica «por sus clanes y por sus casas paternas», sin introducir interpretaciones adicionales.'
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando el hebreo presente el tetragrámaton; en este versículo no aparece.
  - Se preserva «congregación» para עֵדָה conforme al uso del Pentateuco.
  - Se mantiene una sintaxis directa y bíblica, evitando arcaísmos innecesarios pero conservando las fórmulas genealógicas técnicas.
