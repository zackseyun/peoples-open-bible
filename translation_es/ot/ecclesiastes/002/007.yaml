review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura general del hebreo y mantiene correctamente «esclavos» para עבדים/שפחות. Sin embargo, hay dos desalineaciones importantes con la evidencia fuente y la auditoría inglesa: (1) los marcadores de notas están invertidos respecto de sus anclajes reales; la nota sobre «hijos de la casa» debe ir con «nacidos en casa», no con «esclavos varones»; y la nota léxica sobre términos colectivos de ganado debe anclarse en la frase de animales. (2) «Compré» para קָנִיתִי estrecha indebidamente el sentido frente a «adquirí», ya que el hebreo y la decisión inglesa permiten obtención más amplia que compra explícita. Además, «ovejas» reduce צֹאן, que es colectivo de ganado menor, donde «rebaños» o una formulación colectiva preserva mejor el alcance.'
  spanish_quality_summary: 'El español es legible y digno, pero tiene pequeños problemas de naturalidad y precisión: «esclavos varones» suena algo redundante; «esclavos y esclavas» basta para el contraste sexual. «Grandes rebaños de ganado y de ovejas» mezcla colectivos de forma algo torpe. Una redacción como «grandes manadas de ganado y rebaños[a]» suena más natural y conserva mejor los colectivos hebreos. También conviene mantener la nota cultural en el lugar correcto.'
  glossary_alignment: Alineación parcial con los criterios del proyecto. Positivamente, עבדים/שפחות se traduce con «esclavos/esclavas», no «siervos». No hay cuestiones con nombres divinos o terminología mesiánica. Debe ajustarse קָנִיתִי a «adquirí» para seguir la racionalidad documentada, y צֹאן no debe reducirse sin nota a «ovejas» cuando la auditoría preserva el valor colectivo mediante «flocks» y una nota alternativa.
  issues:
  - severity: high
    issue: Marcadores de notas mal colocados
    rationale: La nota [a] en el borrador explica «hijos de la casa», pero está anclada a «esclavos varones»; la nota [b] trata del ganado colectivo, pero está anclada a «nacidos en casa». Esto rompe la trazabilidad exigida entre texto y nota.
  - severity: medium
    issue: «Compré» sobredetermina קָנִיתִי
    rationale: La decisión auditada en inglés eligió «I acquired» para no limitar el verbo a compra. En español «adquirí» preserva mejor ese rango semántico.
  - severity: medium
    issue: «ovejas» reduce el alcance de צֹאן
    rationale: צֹאן puede incluir ovejas y cabras como colectivo de ganado menor. Traducirlo solo como «ovejas» pierde amplitud sin indicarlo; una formulación colectiva o una nota es preferible.
  - severity: low
    issue: «esclavos varones» suena menos natural de lo necesario
    rationale: En español bíblico claro, «esclavos y esclavas» comunica bien el contraste de género sin la redundancia de «varones».
