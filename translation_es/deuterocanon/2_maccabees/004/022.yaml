translation:
  language: es
  text: Y fue recibido con gran esplendor por Jasón y la ciudad[a], y fue acogido con una procesión de antorchas y aclamaciones; luego, de este modo, acampó en Fenicia.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «con portadores de antorchas y gritos». El griego describe un recibimiento ceremonial público marcado por antorchas y voces fuertes.'
    reason: lexical_alternative
lexical_decisions:
- source_word: μεγαλομερῶς
  english_pob_choice: with great splendor
  chosen_spanish: con gran esplendor
  alternatives_spanish:
  - magníficamente
  - con magnificencia
  - de manera espléndida
  lexicon: LSJ
  rationale: El adverbio expresa un recibimiento grandioso o fastuoso. «Con gran esplendor» conserva el matiz ceremonial y solemne del griego sin volverse rebuscado en español.
- source_word: ἀποδεχθεὶς
  english_pob_choice: was received
  chosen_spanish: fue recibido
  alternatives_spanish:
  - fue acogido
  - fue aceptado
  lexicon: LSJ
  rationale: Aquí el verbo indica una recepción formal. «Fue recibido» mantiene el tono ceremonial y refleja bien la pasiva del participio.
- source_word: δᾳδουχίας
  english_pob_choice: a torchlight procession
  chosen_spanish: una procesión de antorchas
  alternatives_spanish:
  - procesión con antorchas
  - desfile de antorchas
  lexicon: LSJ
  rationale: El término apunta a un acto procesional con antorchas, no solo a la presencia de luces. «Procesión de antorchas» es natural en español y conserva la escena pública y ritual.
- source_word: βοῶν
  english_pob_choice: shouts
  chosen_spanish: gritos
  alternatives_spanish:
  - aclamaciones
  - clamores
  lexicon: LSJ
  rationale: El griego describe alaridos o voces fuertes que acompañan la recepción. «Gritos» reproduce el sonido más directamente; «aclamaciones» sería más interpretativo y formal.
- source_word: εἰσεδέχθη
  english_pob_choice: was welcomed
  chosen_spanish: fue acogido
  alternatives_spanish:
  - fue recibido dentro
  - fue introducido
  lexicon: LSJ
  rationale: El verbo añade la idea de ser admitido o introducido en el lugar. «Fue acogido» evita una repetición torpe con «fue recibido» y conserva el sentido de bienvenida.
- source_word: εἶθʼ οὕτως
  english_pob_choice: then in this way
  chosen_spanish: luego, de este modo
  alternatives_spanish:
  - entonces así
  - después, de esta manera
  lexicon: LSJ
  rationale: La frase marca secuencia y enlaza el acto posterior con la manera anterior. «Luego, de este modo» mantiene esa conexión de forma clara y sobria.
- source_word: κατεστρατοπέδευσεν
  english_pob_choice: he encamped
  chosen_spanish: acampó
  alternatives_spanish:
  - estableció su campamento
  - se acantonó
  lexicon: LSJ
  rationale: El verbo literalmente indica establecer campamento. «Acampó» es breve y fiel; «estableció su campamento» explicita demasiado.
- source_word: Φοινίκην
  english_pob_choice: Phoenicia
  chosen_spanish: Fenicia
  alternatives_spanish:
  - Phoenicia
  lexicon: LSJ
  rationale: El topónimo griego se vierte con la forma española habitual «Fenicia».
theological_decisions:
- issue: Doble verbo de recepción/bienvenida en la misma oración
  english_pob_reading: And he was received ... and was welcomed ...
  chosen_spanish_reading: Y fue recibido ... y fue acogido ...
  alternative_spanish_readings:
  - Y fue recibido ... y fue recibido ...
  - Y fue acogido ... y fue recibido ...
  rationale: El griego usa dos verbos emparentados pero no idénticos, y la traducción debe conservar la duplicidad sin sonar redundante en exceso. La solución alterna «recibido» y «acogido» para mantener la progresión ceremonial.
  doctrine_reference: No aplica; decisión de estilo y precisión léxica.
translation_notes:
  revision_awareness: La revisión inglesa más reciente añadió el artículo «a» en «a torchlight procession» por naturalidad. En español se decidió explicitarlo como «una procesión de antorchas», que es igualmente natural y ajustado al griego. Se mantuvo la duplicidad verbal de recepción/bienvenida, pero se evitó repetir exactamente el mismo verbo en español mediante «fue recibido» / «fue acogido».
  spanish_consistency_notes:
  - Se usa «Yahvé» para el nombre divino solo cuando corresponde; este versículo no lo contiene.
  - «Fenicia» sigue la forma española estándar del topónimo.
  - Se preserva un registro solemne y narrativo sin introducir vocabulario eclesiástico ajeno al pasaje.
  - La puntuación intenta reflejar las coordinaciones del griego sin sobrecargar la oración.
