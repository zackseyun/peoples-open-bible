translation:
  language: es
  text: Mientras van, yo tenderé mi red sobre ellos; como las aves de los cielos, los haré descender. Los corregiré[a] según el informe de su asamblea[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Los castigaré» o «Los disciplinaré». El verbo hebreo puede denotar disciplina correctiva o castigo punitivo.'
    reason: lexical_alternative
  - marker: b
    text: 'La última cláusula es difícil. También puede entenderse: «según lo que se proclamó en su asamblea» o «como lo ha oído su asamblea».'
    reason: alternative_reading
lexical_decisions:
- source_word: כַּאֲשֶׁר / יֵלֵכוּ
  english_pob_choice: As they go
  chosen_spanish: Como ellos van
  alternatives_spanish:
  - Cuando van
  - Mientras van
  lexicon: HALOT
  rationale: La cláusula temporal comparativa pide una equivalencia natural en español. «Como ellos van» conserva el sentido de acción en curso y evita volverla más puntual de lo que permite el hebreo.
- source_word: אֶפְרוֹשׂ ... רִשְׁתִּי
  english_pob_choice: I will spread my net
  chosen_spanish: tenderé mi red
  alternatives_spanish:
  - extenderé mi red
  - echaré mi red
  lexicon: HALOT
  rationale: «Tender» expresa bien la imagen de desplegar una red y suena natural en español; mantiene el valor figurado de captura sin suavizarlo.
- source_word: עֲלֵיהֶם
  english_pob_choice: over them
  chosen_spanish: sobre ellos
  alternatives_spanish:
  - encima de ellos
  - contra ellos
  lexicon: HALOT
  rationale: «Sobre ellos» reproduce la relación espacial de la red y conserva la imagen de quedar atrapados bajo ella.
- source_word: כְּעוֹף הַשָּׁמַיִם
  english_pob_choice: like the birds of the heavens
  chosen_spanish: como las aves de los cielos
  alternatives_spanish:
  - como las aves del cielo
  - como las aves del firmamento
  lexicon: HALOT
  rationale: «Aves de los cielos» conserva la metáfora poética y el paralelo con la imagen de caza; en español, «cielos» mantiene dignidad y cercanía al hebreo.
- source_word: אֽוֹרִידֵם
  english_pob_choice: I will bring them down
  chosen_spanish: los haré descender
  alternatives_spanish:
  - los bajaré
  - los haré caer
  lexicon: HALOT
  rationale: El causativo de ירד se refleja mejor con una construcción factitiva en español. «Haré descender» preserva la fuerza causal y la imagen de abatimiento.
- source_word: אַיְסִרֵם
  english_pob_choice: I will chasten them
  chosen_spanish: los corregiré
  alternatives_spanish:
  - los disciplinaré
  - los reprenderé
  - los castigaré
  lexicon: HALOT
  rationale: La decisión inglesa revisada favorece un matiz correctivo más que meramente punitivo. En español, «corregiré» transmite disciplina pactual con un registro claro y sobrio, sin borrar la seriedad judicial.
- source_word: כְּשֵׁמַע
  english_pob_choice: according to the report
  chosen_spanish: según el informe
  alternatives_spanish:
  - según lo oído
  - de acuerdo con la noticia
  lexicon: HALOT
  rationale: שֵׁמַע puede ser oído, informe o noticia. «Informe» conserva el carácter nominal de la expresión y funciona en un castellano formal sin cerrar indebidamente la ambigüedad.
- source_word: לַעֲדָתָם
  english_pob_choice: to their assembly
  chosen_spanish: de su asamblea
  alternatives_spanish:
  - a su asamblea
  - de su congregación
  - según su asamblea
  lexicon: HALOT
  rationale: La preposición es difícil en español y el sintagma admite varias relaciones. «De su asamblea» suena más idiomático en el final del hemistiquio y deja abierta la conexión con lo oído o proclamado, como en la nota inglesa.
theological_decisions:
- issue: Naturaleza de la acción divina en אַיְסִרֵם
  english_pob_reading: I will chasten them
  chosen_spanish_reading: Los corregiré
  alternative_spanish_readings:
  - Los castigaré
  - Los disciplinaré
  - Los reprenderé
  rationale: Se preserva la tensión profética entre juicio y corrección pactual. «Corregiré» evita reducir el verbo a mera retribución y también evita una lectura excesivamente doméstica de «disciplinar» en este contexto.
  doctrine_reference: Translation philosophy §3
- issue: Cláusula final difícil כְּשֵׁמַע לַעֲדָתָם
  english_pob_reading: according to the report to their assembly
  chosen_spanish_reading: según el informe de su asamblea
  alternative_spanish_readings:
  - según lo oído por su asamblea
  - según lo proclamado en su asamblea
  - como lo ha oído su asamblea
  rationale: La sintaxis es ambigua y el audit trail inglés conserva alternativas. Se mantiene una redacción relativamente literal para no resolver en exceso una expresión difícil, preservando la transparencia del original.
  doctrine_reference: Translation philosophy §§1, 3
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión inglesa más reciente, que prefirió «chasten» por encima de «discipline» para un registro más formal y cercano al matiz correctivo/judicial del hebreo. La versión española refleja ese ajuste con «corregiré», manteniendo la tensión entre disciplina y juicio. También se conservó la resolución cautelosa de la cláusula final difícil.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» como norma general del proyecto, pero en este versículo no aparece el tetragrámaton ni un equivalente directo.
  - «Cielos» se eligió por fidelidad poética al hebreo y por coherencia con el registro bíblico en español.
  - «Corregiré» se usó para evitar una lectura exclusivamente penal y conservar el sentido de disciplina correctiva presente en el hebreo.
