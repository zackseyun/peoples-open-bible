translation:
  language: es
  text: Y los filisteos reunieron todos sus campamentos[a] en Afec, mientras Israel estaba acampado junto al manantial[b] que está en Jezreel.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «todas sus fuerzas» o «todos sus ejércitos»; el hebreo dice más literalmente «todos sus campamentos».
    reason: lexical_alternative
  - marker: b
    text: O «junto a la fuente»; la palabra hebrea puede referirse a un manantial o a una fuente.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּקְבְּצוּ
  english_pob_choice: gathered
  chosen_spanish: reunieron
  alternatives_spanish:
  - se juntaron
  - convocaron
  lexicon: HALOT
  rationale: קבץ en narración indica reunir o juntar. «Reunieron» comunica la acción de congregar tropas y mantiene un registro natural en español sin añadir matices de mando que el hebreo no explicita.
- source_word: פְלִשְׁתִּים
  english_pob_choice: the Philistines
  chosen_spanish: los filisteos
  alternatives_spanish:
  - los filisteos
  lexicon: HALOT
  rationale: Es el etnónimo estándar en español para este pueblo. Se conserva el referente colectivo sin necesidad de transliteración.
- source_word: כָּל מַחֲנֵיהֶם
  english_pob_choice: all their camps
  chosen_spanish: todos sus campamentos
  alternatives_spanish:
  - todas sus fuerzas
  - todos sus ejércitos
  lexicon: HALOT
  rationale: מַחֲנֶה significa «campamento» o «campamento militar». «Campamentos» conserva el plural y la imagen concreta del hebreo mejor que «fuerzas» o «ejércitos», que son más interpretativos.
- source_word: אֲפֵקָה
  english_pob_choice: at Aphek
  chosen_spanish: en Afec
  alternatives_spanish:
  - en Apfec
  - en Aphek
  lexicon: HALOT
  rationale: Nombre propio de lugar. Se adapta al uso bíblico en español como «Afec», evitando una transliteración menos natural.
- source_word: וְיִשְׂרָאֵל
  english_pob_choice: while Israel
  chosen_spanish: mientras Israel
  alternatives_spanish:
  - e Israel
  - y Israel
  lexicon: HALOT
  rationale: La conjunción marca simultaneidad o contraste de escena. «Mientras» reproduce mejor esa función discursiva que una simple coordinación en español.
- source_word: חֹנִים
  english_pob_choice: was encamped
  chosen_spanish: estaba acampado
  alternatives_spanish:
  - estaba acampada
  - acampaba
  lexicon: HALOT
  rationale: Aunque el participio es plural, el sujeto colectivo «Israel» en español puede concordar en singular para una lectura idiomática. «Estaba acampado» conserva el sentido militar y el estado resultante.
- source_word: בַּעַיִן
  english_pob_choice: by the spring
  chosen_spanish: junto al manantial
  alternatives_spanish:
  - junto a la fuente
  - junto al ojo de agua
  lexicon: HALOT
  rationale: עַיִן puede significar «manantial» o «fuente». «Manantial» es claro y natural en español contemporáneo para un referente geográfico de agua.
- source_word: אֲשֶׁר בְּיִזְרְעֶאל
  english_pob_choice: that is in Jezreel
  chosen_spanish: que está en Jezreel
  alternatives_spanish:
  - que pertenece a Jezreel
  - en la zona de Jezreel
  lexicon: HALOT
  rationale: La relativa localiza el manantial. «Que está en Jezreel» sigue de cerca el hebreo y evita añadir precisiones geográficas no expresadas por el texto.
translation_notes:
  revision_awareness: El texto inglés auditado mantiene la lectura sencilla y estable del versículo; no se observan revisiones aplicadas ni tensiones textuales adicionales en el pasaje. La versión española sigue esa misma línea, conservando el valor concreto de מַחֲנֶה y de עַיִן sin ampliar innecesariamente el sentido.
  spanish_consistency_notes:
  - Se mantuvo «Afec» como forma española habitual del topónimo.
  - Se prefirió «manantial» frente a «fuente» por claridad contemporánea, sin perder la alternativa léxica documentada.
  - «Estaba acampado» refleja el estado colectivo de Israel con concordancia idiomática en español.
