translation:
  language: es
  text: Entonces la congregación rescatará al homicida de la mano del vengador de la sangre[a], y la congregación lo devolverá a su ciudad de refugio, a la cual huyó; y vivirá en ella hasta la muerte del sumo sacerdote, quien fue ungido con el aceite santo[c][b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O “el vengador de sangre”. La expresión hebrea designa a la persona con responsabilidad legal de vengar el derramamiento de sangre, por lo común un pariente cercano.
    reason: lexical_alternative
  - marker: b
    text: O “permanecerá en ella” o “habitará en ella”.
    reason: lexical_alternative
  - marker: c
    text: 'Hebreo: “a quien ungió con el aceite santo”. El sujeto de “ungió” no se expresa explícitamente en hebreo; la traducción española usa una formulación natural en español sin añadir el agente.'
    reason: alternative_reading
lexical_decisions:
- source_word: וְהִצִּילוּ
  english_pob_choice: shall rescue
  chosen_spanish: rescatará
  alternatives_spanish:
  - liberará
  - salvará
  lexicon: HALOT
  rationale: En este contexto jurídico, el verbo expresa sacar al homicida de la potestad del vengador; “rescatará” conserva la fuerza de intervención protectora mejor que “salvará”, que en español sería más general y menos legal.
- source_word: הָעֵדָה
  english_pob_choice: the congregation
  chosen_spanish: la congregación
  alternatives_spanish:
  - la asamblea
  - la comunidad
  lexicon: HALOT
  rationale: En Números, el término designa al cuerpo comunitario con función judicial. “La congregación” mantiene ese sentido formal y eclesialmente reconocible.
- source_word: הָרֹצֵחַ
  english_pob_choice: the manslayer
  chosen_spanish: el homicida
  alternatives_spanish:
  - el matador
  - el asesino
  lexicon: HALOT
  rationale: El contexto de las ciudades de refugio no exige todavía culpabilidad de asesinato intencional; en español, “homicida” puede funcionar como término legal amplio para quien ha causado una muerte. Se evita “asesino”, que implicaría culpa deliberada.
- source_word: מִיַּד
  english_pob_choice: from the hand of
  chosen_spanish: de la mano de
  alternatives_spanish:
  - del poder de
  lexicon: HALOT
  rationale: Se conserva el hebraísmo concreto “de la mano de”, que en español sigue siendo claro y refleja el idioma legal de protección y amenaza.
- source_word: גֹּאֵל הַדָּם
  english_pob_choice: the avenger of blood
  chosen_spanish: el vengador de la sangre
  alternatives_spanish:
  - el vengador de sangre
  - el redentor de la sangre
  lexicon: HALOT
  rationale: “Vengador de la sangre” reproduce de cerca la fórmula jurídica hebrea y evita introducir “pariente” en el texto principal, ya que no está explícito en la expresión inmediata.
- source_word: וְהֵשִׁיבוּ אֹתוֹ
  english_pob_choice: shall return him
  chosen_spanish: lo devolverá
  alternatives_spanish:
  - lo hará volver
  - lo traerá de vuelta
  lexicon: HALOT
  rationale: El verbo causativo de שוב se expresa naturalmente como “devolver” o “hacer volver”; “lo devolverá” mantiene brevedad y correspondencia formal.
- source_word: עִיר מִקְלָטוֹ
  english_pob_choice: his city of refuge
  chosen_spanish: su ciudad de refugio
  alternatives_spanish:
  - la ciudad de su refugio
  - su ciudad asilo
  lexicon: HALOT
  rationale: “Ciudad de refugio” es la designación legal establecida en el capítulo; el posesivo en español permite una frase natural sin perder la relación con el fugitive.
- source_word: אֲשֶׁר נָס שָׁמָּה
  english_pob_choice: to which he fled
  chosen_spanish: a la cual huyó
  alternatives_spanish:
  - a donde huyó
  - a la que huyó
  lexicon: HALOT
  rationale: La relación del antecedente es con “ciudad de refugio”; “a la cual huyó” expresa con precisión el movimiento hacia ese lugar y evita ambigüedad.
- source_word: וְיָשַׁב בָּהּ
  english_pob_choice: he shall live in it
  chosen_spanish: vivirá en ella
  alternatives_spanish:
  - habitará en ella
  - permanecerá en ella
  lexicon: HALOT
  rationale: יׁשב puede significar habitar o residir. “Vivirá en ella” suena natural en español moderno y conserva la idea de residencia, sin forzar un arcaísmo.
- source_word: עַד מוֹת הַכֹּהֵן הַגָּדֹל
  english_pob_choice: until the death of the high priest
  chosen_spanish: hasta la muerte del sumo sacerdote
  alternatives_spanish:
  - hasta que muera el sumo sacerdote
  lexicon: HALOT
  rationale: Se mantiene la construcción temporal nominal. “Sumo sacerdote” es la equivalencia tradicional y clara para הַכֹּהֵן הַגָּדֹל.
- source_word: אֲשֶׁר מָשַׁח אֹתוֹ
  english_pob_choice: whom he was anointed with
  chosen_spanish: a quien fue ungido
  alternatives_spanish:
  - a quien él ungió
  - que fue ungido
  lexicon: HALOT
  rationale: La POB inglesa refleja aquí el valor pasivo del hebreo, aunque la forma verbal es activa con sujeto implícito. En español, “a quien fue ungido” comunica el sentido sin inventar el agente; se evita “él ungió”, que haría explícito un sujeto no dicho.
- source_word: בְּשֶׁמֶן הַקֹּדֶשׁ
  english_pob_choice: with the holy oil
  chosen_spanish: con el aceite santo
  alternatives_spanish:
  - con el óleo santo
  - con el aceite sagrado
  lexicon: HALOT
  rationale: “Aceite santo” corresponde con naturalidad al hebreo y preserva la terminología de consagración. “Santo” mantiene el enlace con la idea de apartamiento ritual.
theological_decisions:
- issue: Estatus jurídico del homicida en las ciudades de refugio
  english_pob_reading: Rendered as 'manslayer' rather than 'murderer.'
  chosen_spanish_reading: Traducido como “homicida” y no como “asesino”.
  alternative_spanish_readings:
  - asesino
  - matador
  rationale: El pasaje distingue entre muerte intencional y no intencional. “Homicida” conserva una referencia amplia al que ha causado una muerte sin prejuzgar su culpabilidad moral total; “asesino” impondría una condena que el procedimiento aún no ha establecido.
  doctrine_reference: Translation philosophy §1, §3
- issue: Sujeto implícito en la cláusula final de la unción
  english_pob_reading: 'Kept the passive sense: ''whom he was anointed with the holy oil.'''
  chosen_spanish_reading: “a quien fue ungido con el aceite santo”, manteniendo la pasiva implícita sin nombrar un sujeto.
  alternative_spanish_readings:
  - a quien él ungió con el aceite santo
  - que fue ungido con el aceite santo
  rationale: El hebreo no expresa de manera explícita el sujeto de la unción; la redacción española debe reflejar esa tensión sin resolverla artificialmente. La pasiva conserva la audibilidad del dato textual y evita introducir un agente no mencionado.
  doctrine_reference: Translation philosophy §1, §3
translation_notes:
  revision_awareness: 'La redacción sigue el ajuste reciente del POB inglés que precisó la relación con “city of refuge” mediante “to which he fled” y que hizo más explícito el sentido pasivo de la cláusula final. En español se reflejan ambos rasgos: “a la cual huyó” y “a quien fue ungido”.'
  spanish_consistency_notes:
  - Se mantiene “congregación” para הָעֵדָה, conforme al uso legal-cultual del libro de Números.
  - Se evita “SEÑOR” u otras sustituciones para el nombre divino porque este verso no lo contiene.
  - Se conserva “ciudad de refugio” como término técnico fijo del pasaje.
  - Se usa “aceite santo” en vez de “óleo” por claridad moderna y porque el hebreo habla de שֶׁמֶן, aceite.
  - La puntuación separa las cláusulas largas con punto y coma para facilitar lectura pública sin alterar la relación sintáctica.
