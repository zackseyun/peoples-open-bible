  verdict: revise
  source_alignment_summary: 'El borrador refleja bien el hebreo: כִּי como conector causal/explicativo, לֹא como negación simple, יִזְנַח como rechazo/abandono no permanente, לְעוֹלָם como duración indefinida, y אֲדֹנָי correctamente como título divino, no como Yahvé. Sin embargo, en español bíblico y literario, «pues» suena más natural que «porque» al inicio de una explicación parentética o de apoyo en este contexto.'
  spanish_quality_summary: La redacción es clara y fiel, pero «Porque el Señor no rechazará para siempre» suena ligeramente menos natural como oración independiente en español que «Pues el Señor no rechazará para siempre». Además, en la nota, «apartará» y «expulsión» se alejan un poco del campo semántico inmediato de זנח; conviene afinar las alternativas para acercarlas a «rechazar / desechar / abandonar».
  glossary_alignment: 'Alineación correcta con la terminología del proyecto: אֲדֹנָי se traduce como «el Señor», no «Yahvé», porque no aparece el Tetragrámaton. No hay conflicto con otros términos clave del glosario.'
  issues:
