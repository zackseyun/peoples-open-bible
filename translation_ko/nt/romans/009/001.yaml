id: ROM.9.1
reference: Romans 9:1
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: Ἀλήθειαν λέγω ἐν Χριστῷ, οὐ ψεύδομαι, συμμαρτυρούσης μοι τῆς συνειδήσεώς μου ἐν πνεύματι ἁγίῳ,
base_translation:
  language: en
  yaml_path: translation/nt/romans/009/001.yaml
  text: I am telling the truth in Messiah[a]; I am not lying, as my conscience bears witness with me in the Holy Spirit[c][b],
  footnotes:
  - marker: a
    text: Or 'in Christ.' The Greek title Χριστός can function title-like ('Messiah') or name-like ('Christ'); here it is rendered as a title.
    reason: lexical_alternative
  - marker: b
    text: Or 'with my conscience bearing witness' or 'my conscience testifying with me.'
    reason: lexical_alternative
  - marker: c
    text: Or possibly 'in a holy spirit,' though in Paul this is most naturally understood as a reference to the Holy Spirit.
    reason: alternative_reading
translation:
  language: ko
  text: 나는 메시아 안에서 진실을 말합니다. 나는 거짓말하지 않습니다. 내 양심이 성령 안에서 나와 함께 증언합니다.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ἐν Χριστῷ
  english_pob_choice: in Messiah
  chosen_korean: 메시아 안에서
  alternatives_korean:
  - 그리스도 안에서
  lexicon: BDAG
  rationale: Χριστός는 칭호로 기능하므로 「메시아」로 옮긴다. EN POB도 동일하게 「Messiah」를 채택했다.
- source_word: ἐν πνεύματι ἁγίῳ
  english_pob_choice: in the Holy Spirit
  chosen_korean: 성령 안에서
  alternatives_korean:
  - 거룩한 영 안에서
  lexicon: BDAG
  rationale: 바울 용법에서 분명한 성령 지시로 읽는 것이 자연스러우므로 「성령」을 채택한다.
