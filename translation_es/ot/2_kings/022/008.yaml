base_translation:
  language: en
  yaml_path: translation/ot/2_kings/022/008.yaml
  text: Then Hilkiah the high priest said to Shaphan the scribe[a], “I have found the Book of the Law in the house of Yahweh.” And Hilkiah gave the book to Shaphan[c][b], and he read it.
  footnotes:
  - marker: a
    text: Or, “the scroll of the law.” The Hebrew סֵפֶר can refer to a scroll or book document.
    reason: lexical_alternative
