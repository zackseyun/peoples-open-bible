    rationale: En שְׂעִיר עִזִּים, עִזִּים especifica la clase dentro de la expresión fija; en español «macho cabrío» ya comunica naturalmente «male goat». Añadir «de las cabras» no añade sentido y perjudica la legibilidad.
  revised_spanish_text: un macho cabrío para una ofrenda por el pecado.
