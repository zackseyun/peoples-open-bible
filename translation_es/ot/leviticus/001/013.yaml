review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la secuencia hebrea: lavar las entrañas y las patas/extremidades con agua, luego que el sacerdote presente todo y lo haga subir en humo sobre el altar, seguido de la identificación cultual de la ofrenda como עֹלָה / אִשֵּׁה / רֵיחַ נִיחֹחַ para Yahvé. También preserva correctamente «Yahvé». Sin embargo, la nota al pie está anclada en «agua», cuando la alternativa «una ofrenda por fuego» corresponde a אִשֵּׁה, no a בַּמַּיִם. Además, «piernas» es comprensible pero menos natural para un animal sacrificial que «patas» o «piernas traseras»; aun así no constituye error grave. El mayor problema es la colocación incorrecta de la nota.'
  spanish_quality_summary: El español es claro y digno. «Lo hará subir en humo» comunica bien la fuerza cultual de וְהִקְטִיר. «Holocausto» y «olor grato» son formulaciones bíblicamente reconocibles. No obstante, «ofrenda encendida» suena algo menos idiomático que «ofrenda hecha por fuego» u «ofrenda por fuego», y la nota mal ubicada genera confusión de lectura. Conviene reparar el anclaje y optar por una formulación principal más natural en español eclesial.
  glossary_alignment: 'Alineación general buena con la terminología del proyecto: לַיהוָה -> «Yahvé» está correcto. No hay conflicto con Mesías/Cristo ni otros términos troncales. Para אִשֵּׁה, la decisión inglesa preservó una nota con «offering by fire»; en español conviene reflejar esa misma racionalidad con una forma principal natural y una nota alternativa bien anclada. «Holocausto» para עֹלָה es aceptable y tradicional.'
  issues:
  - severity: high
    issue: La nota al pie [a] está anclada en «agua», pero su contenido explica אִשֵּׁה («una ofrenda por fuego»).
    rationale: 'Esto altera la auditabilidad y puede hacer creer al lector que la alternativa literal corresponde a «con agua». La nota debe moverse al sintagma de «ofrenda». '
  - severity: medium
    issue: «Ofrenda encendida» no es la opción más natural ni la mejor respaldada para אִשֵּׁה.
    rationale: El término hebreo denota una ofrenda hecha por fuego. «Encendida» suena menos técnico y menos idiomático en español bíblico. «Ofrenda hecha por fuego» expresa mejor el valor léxico y deja la variante «ofrenda por fuego» para la nota.
  - severity: low
    issue: «Las piernas» para הַכְּרָעַיִם puede sonar antropomórfico aplicado a un animal.
    rationale: No es incorrecto, pero «patas» o una formulación semejante podría ser más natural en contexto sacrificial. Aun así, se puede mantener si se prioriza el tono digno.
  revised_spanish_text: Pero lavará las entrañas y las piernas con agua, y el sacerdote presentará todo ello y lo hará subir en humo sobre el altar. Es un holocausto, una ofrenda hecha por fuego[a], olor grato para Yahvé.
  revised_footnotes:
