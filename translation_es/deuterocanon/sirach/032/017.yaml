translation:
  language: es
  text: El hombre sabio se inclinará a la reprensión[a], pero el que es engañado seguirá su propio deseo. El hombre sabio no ocultará la ira, pero el escarnecedor no refrenará su lengua.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Testimonio griego: «No despreciará la súplica de un huérfano, ni de una viuda cuando derrame su lamento». El testimonio hebreo conservado aquí difiere sustancialmente del griego en este versículo.'
    reason: alternative_reading
lexical_decisions:
- source_word: איש חכם
  english_pob_choice: a wise man
  chosen_spanish: el hombre sabio
  alternatives_spanish:
  - la persona sabia
  lexicon: HALOT
  rationale: Conserva el masculino singular proverbial del hebreo. En español, ‘el hombre sabio’ comunica con naturalidad la forma genérica masculina del refrán sin desdibujar el matiz gramatical original.
- source_word: יטה
  english_pob_choice: will incline himself
  chosen_spanish: se inclinará
  alternatives_spanish:
  - se volverá
  - prestará atención
  lexicon: HALOT
  rationale: ‘Inclinarse’ mantiene la imagen corporal de doblarse hacia algo y reproduce bien el movimiento figurado del verbo hebreo.
- source_word: תוכחות
  english_pob_choice: reproof
  chosen_spanish: reprensión
  alternatives_spanish:
  - corrección
  - amonestación
  lexicon: HALOT
  rationale: ‘Reprensión’ conserva el tono correctivo y proverbial de la palabra hebrea sin hacerla demasiado técnica o suavizada.
- source_word: ואחר צרכו ימשך
  english_pob_choice: will follow his own desire
  chosen_spanish: seguirá su propio deseo
  alternatives_spanish:
  - será arrastrado tras su necesidad
  - irá tras lo que desea
  lexicon: HALOT
  rationale: La frase hebrea es algo idiomática; ‘seguirá su propio deseo’ comunica en español la idea de dejarse llevar por la inclinación propia, como contrapeso de la docilidad del sabio.
- source_word: נפתה
  english_pob_choice: one who is deceived
  chosen_spanish: el que es engañado
  alternatives_spanish:
  - el ingenuo
  - el seducido
  lexicon: HALOT
  rationale: ‘Engañado’ refleja el sentido pasivo de alguien desviado o mal guiado. Se evita ‘ingenuo’ por ser más interpretativo que el hebreo transmitido.
- source_word: לא יכסה כחמה
  english_pob_choice: will not conceal anger
  chosen_spanish: no ocultará la ira
  alternatives_spanish:
  - no encubrirá la ira
  - no ocultará su enojo
  lexicon: HALOT
  rationale: ‘Ocultar la ira’ sigue de cerca el hebreo transmitido y mantiene la tensión interpretativa documentada por el POB inglés. ‘Ira’ preserva el registro sapiencial más fuerte que ‘enojo’.
- source_word: לץ
  english_pob_choice: a scoffer
  chosen_spanish: el escarnecedor
  alternatives_spanish:
  - el burlón
  - el mofador
  lexicon: HALOT
  rationale: ‘Escarnecedor’ reproduce bien el tipo moral de la literatura sapiencial y conserva la dureza del término hebreo mejor que un simple ‘burlón’.
- source_word: לא ישמר לשונו
  english_pob_choice: will not guard his tongue
  chosen_spanish: no guardará su lengua
  alternatives_spanish:
  - no vigilará su lengua
  - no refrenará su lengua
  lexicon: HALOT
  rationale: La imagen de ‘guardar la lengua’ es transparente en español y reproduce el hebreo con economía y precisión.
theological_decisions:
- issue: Texto hebreo principal frente a testimonio griego divergente
  english_pob_reading: Translate the extant Hebrew doublet as the primary text, while preserving the Greek verse as an alternative in a footnote.
  chosen_spanish_reading: Traducir como texto principal el hebreo conservado y señalar en nota la forma griega divergente.
  alternative_spanish_readings:
  - No incluir la variante griega
  - Reemplazar el texto principal por la lectura griega
  rationale: El POB inglés documenta una divergencia sustancial entre el hebreo y el griego. Para Sirácides, el principio editorial es traducir el hebreo donde se conserva, sin ocultar el testimonio griego. La nota mantiene la transparencia textual.
  doctrine_reference: 'PHILOSOPHY.md: traducir del hebreo donde sobrevive; preservar honestamente el paralelo griego como evidencia alternativa.'
translation_notes:
  revision_awareness: El pasaje presenta una divergencia textual importante entre el hebreo conservado y el griego paralelo. Se mantiene el hebreo como base, siguiendo el criterio editorial del POB, y se preserva la lectura griega en nota para auditoría.
  spanish_consistency_notes:
  - Se mantiene ‘Yahvé’ como forma estándar del proyecto, pero este versículo no contiene el nombre divino.
  - ‘Reprensión’ y ‘reprensión/reprender’ se usan para sostener el campo semántico sapiencial sin suavizar el mandato.
  - ‘Ira’ se conserva para reflejar el registro fuerte del hebreo y la tensión interpretativa del texto.
