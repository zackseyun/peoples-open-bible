translation:
  language: es
  text: Y pelearon contra Báquides, y fue aplastado por ellos, y lo presionaban duramente, porque su plan y su ataque eran vanos.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ἐπολέμησαν πρὸς
  english_pob_choice: fought against
  chosen_spanish: pelearon contra
  alternatives_spanish:
  - combatieron contra
  - lucharon contra
  lexicon: LSJ
  rationale: El griego expresa acción hostil dirigida contra Bacquides; «pelearon contra» conserva esa fuerza adversativa en un español natural y claro.
- source_word: συνετρίβη
  english_pob_choice: was crushed
  chosen_spanish: fue aplastado
  alternatives_spanish:
  - fue quebrantado
  - fue derrotado
  - fue destrozado
  lexicon: LSJ
  rationale: El pasivo de συντρίβω sugiere ser quebrado o aplastado. «Fue aplastado» mantiene la imagen vívida del griego sin suavizarla demasiado.
- source_word: ἔθλιβον αὐτὸν σφόδρα
  english_pob_choice: they pressed him hard
  chosen_spanish: lo acosaban con mucha fuerza
  alternatives_spanish:
  - lo presionaban fuertemente
  - lo afligían intensamente
  - lo oprimían mucho
  lexicon: LSJ
  rationale: θλίβω puede expresar presión, aflicción u opresión. En contexto militar, «lo acosaban con mucha fuerza» comunica presión sostenida y hostil; σφόδρα queda reflejado por «con mucha fuerza».
- source_word: βουλή
  english_pob_choice: plan
  chosen_spanish: plan
  alternatives_spanish:
  - consejo
  - propósito
  - estrategia
  lexicon: LSJ
  rationale: Aquí βουλή se refiere al curso de acción intencional de Bacquides en la campaña; «plan» es amplio, claro y fiel.
- source_word: ἔφοδος
  english_pob_choice: attack
  chosen_spanish: ataque
  alternatives_spanish:
  - asalto
  - embestida
  - avance
  lexicon: LSJ
  rationale: ἔφοδος denota un ataque o asalto. «Ataque» es la equivalencia más directa y entendible en español.
- source_word: κενή
  english_pob_choice: were in vain
  chosen_spanish: eran vanos
  alternatives_spanish:
  - estaban vacíos
  - fueron vanos
  - resultaron inútiles
  lexicon: LSJ
  rationale: κενή literalmente significa «vacío», pero en este contexto predicativo indica futilidad. «Eran vanos» conserva la valoración de inutilidad y permite aplicarla naturalmente a «su plan y su ataque».
- source_word: Βακχίδην
  english_pob_choice: Bacchides
  chosen_spanish: Bacquides
  alternatives_spanish:
  - Báquides
  lexicon: project policy transliteration
  rationale: Se translitera el nombre propio según la política del proyecto; «Bacquides» es una forma legible en español y conserva la referencia personal.
translation_notes:
  revision_awareness: Se corrigió el problema de validación anterior eliminando la nota al pie no anclada; el texto ahora no contiene marcadores de nota, por lo que no hay riesgo de pie de página huérfano. Se mantuvo la equivalencia semántica con el audit trail inglés y el griego, especialmente en κενή como futilidad y en θλίβω como presión hostil en combate.
  spanish_consistency_notes:
  - Se usa «Bacquides» de manera uniforme para el nombre propio.
  - Se evita «SEÑOR» u այլ terminología no pertinente; no hay lenguaje divino en el versículo.
  - «Vanos» se aplica a ambos miembros de la frase final para reflejar el predicado griego κενή sobre el conjunto de acciones de Bacquides.
