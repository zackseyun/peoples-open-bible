base_translation:
  language: en
  yaml_path: translation/ot/2_chronicles/026/010.yaml
  text: He built towers in the wilderness and cut out many cisterns[a], for he had much livestock; and in the lowland and in the plain he had farmers and vinedressers, in the hills and in the fertile land[c][b], for he loved the soil.
  footnotes:
  - marker: a
    text: Or 'watchtowers' for 'towers.'
    reason: lexical_alternative
  - marker: b
    text: Or 'the Shephelah' for 'the lowland,' the Judean foothill region.
    reason: cultural_note
  - marker: c
    text: Or 'in Carmel' if taken as a place name rather than 'in the fertile land.'
    reason: alternative_reading
