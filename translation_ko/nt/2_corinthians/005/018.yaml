source:
  edition: SBLGNT
  text: τὰ δὲ πάντα ἐκ τοῦ θεοῦ τοῦ καταλλάξαντος ἡμᾶς ἑαυτῷ ⸀διὰ Χριστοῦ καὶ δόντος ἡμῖν τὴν διακονίαν τῆς καταλλαγῆς,
base_translation:
  language: en
  yaml_path: translation/nt/2_corinthians/005/018.yaml
  text: Now all these things are from God, who reconciled us to himself through Messiah and gave us the ministry of reconciliation,
  footnotes:
  - marker: a
    text: Or 'all things.' The phrase may refer broadly to everything in this new reality, or more specifically to the matters just mentioned in context.
    reason: lexical_alternative
  - marker: b
    text: Greek 'through Christ'; rendered 'through the Messiah' here because Χριστός functions as a title.
    reason: alternative_reading
  - marker: c
    text: '''Us'' may refer broadly to believers, though in the surrounding context Paul especially emphasizes the apostolic commission entrusted to him and his coworkers.'
    reason: alternative_reading
translation:
  language: ko
  text: 이 모든 것은 하나님께로부터 났습니다. 그분께서는 메시아를 통하여 우리를 자기와 화목하게 하시고, 우리에게 화목의 사역을 주셨습니다.
  philosophy: optimal-equivalence
