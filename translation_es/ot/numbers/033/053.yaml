  to: Ustedes tomarán posesión de la tierra y habitarán en ella[a], porque yo les he dado la tierra para poseerla.
  rationale: Se reemplaza «despojarán la tierra» por «tomarán posesión de la tierra» porque esa es la manera fiel y natural de expresar הורשתם cuando el objeto directo es «la tierra». Se conserva la nota léxica sobre «heredarla», que sigue siendo una alternativa válida en contexto de promesa de tierra.
