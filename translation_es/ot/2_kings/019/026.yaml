review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura general del hebreo: habitantes, falta de fuerza, abatimiento/vergüenza, y la cadena de imágenes vegetales frágiles. Sin embargo, hay dos problemas relevantes: (1) ''desmayados'' en español suele sugerir pérdida de conocimiento o desfallecimiento físico, y no comunica tan bien el sentido de חַתּוּ como ''consternados'' o ''abatidos''; (2) ''y quemados antes de crecer'' rompe la concordancia e imagen, porque el hebreo sigue describiendo a los habitantes con metáforas vegetales, no cambia naturalmente a un participio masculino humano. Conviene reformular la última imagen como un sustantivo o comparación vegetal: ''y como vegetación quemada antes de crecer'' o equivalente.'
  spanish_quality_summary: El español es mayormente claro y digno, pero presenta una torpeza sintáctica en la última cláusula y una elección léxica mejorable en 'desmayados'. 'Faltos de fuerza' y 'la hierba del campo' funcionan bien. 'Vegetación tierna' es aceptable, aunque 'verdor' o 'brote verde' también serían posibles. La revisión propuesta mejora naturalidad, coherencia metafórica y legibilidad.
  glossary_alignment: No hay conflictos con la terminología teológica del proyecto. Las decisiones léxicas principales son adecuadas en general. La nota [a] sobre 'cortos de mano' está bien. La nota [b] debe ajustarse al texto revisado para reflejar que שְׁדֵפָה es una imagen agrícola compacta de quemadura/abrasamiento, no simplemente un adjetivo humano 'quemados'.
  issues:
  - severity: medium
    issue: '''desmayados'' para חַתּוּ'
    rationale: En español bíblico contemporáneo, 'desmayados' suele leerse como desfallecidos o casi inconscientes. El hebreo aquí expresa quiebre, consternación o abatimiento; 'consternados' comunica mejor el colapso anímico.
  - severity: high
    issue: '''y quemados antes de crecer'' es gramatical y metafóricamente defectuoso'
    rationale: La frase queda incongruente con la serie de sustantivos vegetales y parece describir a los habitantes directamente con un participio masculino plural. El hebreo presenta una imagen agrícola compacta; en español conviene mantener un referente vegetal explícito.
  - severity: low
    issue: La nota [b] no encaja del todo con la formulación principal
    rationale: La nota ofrece alternativas adjetivales ('abrasados', etc.) pero el mejor español requiere una formulación nominal o comparativa más clara en el texto principal.
