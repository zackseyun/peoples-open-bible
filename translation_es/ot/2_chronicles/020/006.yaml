review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura del hebreo: invocación a Yahvé, pregunta retórica, soberanía sobre los reinos de las naciones, y afirmación de poder. También conserva correctamente «Yahvé» y «Dios de nuestros padres». Sin embargo, la cláusula final וְאֵין עִמְּךָ לְהִתְיַצֵּב no queda fielmente expresada por «ponerse en tu presencia», porque el sentido contextual es oposición/incapacidad de resistir o mantenerse frente a Dios, no mera comparecencia reverente.'
  spanish_quality_summary: El español es claro y digno, pero la frase final suena algo ambigua e incluso puede sugerir acceso reverente a la presencia de Dios, lo cual va en dirección distinta del sentido de resistencia imposible. También «Oh Yahvé» puede sonar aceptable, pero «Oh, Yahvé» o simplemente «Yahvé» sería más natural con puntuación española; aun así, esto es menor. El resto del verso lee bien.
  glossary_alignment: 'Buena alineación con la terminología del proyecto: יְהוָה → «Yahvé»; אֱלֹהֵי אֲבֹתֵינוּ → «Dios de nuestros padres»; imagen de «En tu mano» conservada. La principal desalineación está en לְהִתְיַצֵּב, donde el POB inglés documenta «stand against you / withstand you» y el español elegido atenúa indebidamente la oposición.'
  issues:
  - severity: high
    issue: La cláusula final «y no hay quien pueda ponerse en tu presencia» no transmite bien el sentido de oposición de וְאֵין עִמְּךָ לְהִתְיַצֵּב.
    rationale: El contexto de soberanía universal y la decisión léxica auditada en inglés favorecen «nadie puede hacerte frente / resistirte / mantenerse contra ti». «Ponerse en tu presencia» puede entenderse como presentarse ante Dios, no como oponerse a él.
  - severity: low
    issue: La nota [b] ofrece «mantenerse ante ti», que sigue siendo algo ambigua en español si no se explicita el matiz adversativo.
    rationale: Conviene que la alternativa principal o la glosa deje más claro «hacerte frente» o «resistirte», para evitar lectura reverencial.
  - severity: low
    issue: La puntuación vocativa «Oh Yahvé» podría ajustarse mejor a «Oh, Yahvé» en español.
    rationale: Es un detalle estilístico menor de puntuación, no de fidelidad semántica.
