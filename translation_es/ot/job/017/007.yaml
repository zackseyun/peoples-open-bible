translation:
  language: es
  text: Se me ha oscurecido el ojo por la pena[a], y todos mis miembros[b] son como una sombra.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'También puede entenderse «por la ira», «por la aflicción» o «por el dolor». El hebreo admite varios matices de agitación emocional; aquí se eligió «pena» por el contexto de lamento y sufrimiento.'
    reason: lexical_alternative
  - marker: b
    text: 'También: «mi forma», «mi cuerpo» o «mi constitución». El hebreo probablemente se refiere al conjunto de las partes del cuerpo de Job.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַתֵּכַהּ
  english_pob_choice: has grown dim
  chosen_spanish: se ha oscurecido
  alternatives_spanish:
  - se ha apagado
  - se ha puesto débil
  - se ha debilitado
  lexicon: HALOT
  rationale: כהה expresa volverse tenue, opaco o débil. En español, «se ha oscurecido» conserva la imagen de la vista que pierde claridad sin forzar un giro explicativo.
- source_word: מִכַּעַשׂ
  english_pob_choice: from grief
  chosen_spanish: por la pena
  alternatives_spanish:
  - por la angustia
  - por el dolor
  - por la ira
  lexicon: HALOT
  rationale: כַּעַשׂ admite matices de vexación, dolor emocional, pena o ira. En el lamento de Job, «pena» comunica bien la aflicción interior; se preserva en nota la alternativa de «ira» por la tensión léxica documentada.
- source_word: עֵינִי
  english_pob_choice: My eye
  chosen_spanish: el ojo
  alternatives_spanish:
  - mis ojos
  - mi vista
  lexicon: HALOT
  rationale: El hebreo es singular con sufijo de primera persona. En español, «el ojo» permite una frase natural y poética; el sentido total sigue siendo la vista de Job, como en el inglés auditado.
- source_word: וִיצֻרַי
  english_pob_choice: my members
  chosen_spanish: mis miembros
  alternatives_spanish:
  - mi forma
  - mi cuerpo
  - mi frame
  lexicon: HALOT
  rationale: El término apunta al conjunto de partes o miembros del cuerpo. «Mis miembros» es una correspondencia formal y clara en español, y preserva la posible amplitud del hebreo sin reducirla a una sola parte anatómica.
- source_word: כַּצֵּל
  english_pob_choice: like a shadow
  chosen_spanish: como una sombra
  alternatives_spanish:
  - como sombra
  - cual sombra
  lexicon: HALOT
  rationale: La comparación expresa insustancialidad y desvanecimiento. «Como una sombra» es la equivalencia más natural y conserva la imagen poética.
- source_word: כֻּלָּם
  english_pob_choice: all
  chosen_spanish: todos
  alternatives_spanish:
  - todos ellos
  - el conjunto
  lexicon: HALOT
  rationale: El hebreo tiene fuerza colectiva aplicada a los miembros del cuerpo. «Todos mis miembros» mantiene esa totalidad de forma idiomática en español.
translation_notes:
  revision_awareness: El texto inglés más reciente ajustó «limbs» a «members» para corresponder más de cerca al hebreo. El español adopta «miembros» para reflejar esa revisión y mantener el paralelismo con «el ojo» y la imagen de deterioro corporal.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» como norma general del proyecto, pero este versículo no contiene el nombre divino.
  - 'Se evitó traducir mecánicamente desde el inglés: la sintaxis española se reorganizó para sonar natural sin perder el paralelismo hebreo.'
  - «Pena» conserva el campo semántico de aflicción emocional sin eliminar la tensión léxica de כַּעַשׂ.
  - «Miembros» sigue el ajuste auditado del inglés POB y queda más cerca del hebreo que una versión interpretativa como «cuerpo».
