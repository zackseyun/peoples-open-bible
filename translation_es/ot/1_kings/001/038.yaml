base_translation:
  language: en
  yaml_path: translation/ot/1_kings/001/038.yaml
  text: So Zadok the priest[a], Nathan the prophet, Benaiah son of Jehoiada, and the Cherethites and the Pelethites went down and had Solomon ride on King David’s mule[c][b], and they brought him to Gihon.
  footnotes:
  - marker: a
    text: Or possibly 'the royal guard' for 'the Cherethites and the Pelethites'; the Hebrew uses the group names themselves.
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'the mule of King David.'
    reason: lexical_alternative
  - marker: c
    text: The Hebrew noun for 'mule' is grammatically feminine and may denote a female mule.
    reason: lexical_alternative
