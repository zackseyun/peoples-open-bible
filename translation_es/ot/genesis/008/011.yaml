translation:
  language: es
  text: Y la paloma vino a él al atardecer[a], y he aquí, una hoja de olivo recién arrancada[b] estaba en su boca. Entonces Noé supo que las aguas habían menguado[c] de sobre la tierra.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'volvió a él'; el verbo hebreo significa propiamente 'vino', aunque el contexto implica un regreso.
    reason: lexical_alternative
  - marker: b
    text: '''Recién arrancada'' traduce un adjetivo hebreo que sugiere algo arrancado o desprendido, indicando que la hoja había sido tomada recientemente de un olivo vivo.'
    reason: lexical_alternative
  - marker: c
    text: O 'las aguas habían disminuido'.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַתָּבֹא / וַיֵּדַע
  english_pob_choice: came / So Noah knew
  chosen_spanish: vino / Entonces Noé supo
  alternatives_spanish:
  - llegó / y Noé conoció
  - volvió / y Noé entendió
  lexicon: HALOT
  rationale: וַתָּבֹא expresa el movimiento de la paloma hacia Noé; en español, 'vino a él' mantiene el valor básico sin añadir 'volver' como dato explícito del verbo. וַיֵּדַע se rinde mejor con 'supo' para comunicar la inferencia de Noé a partir de la señal de la hoja.
- source_word: אֵלָיו
  english_pob_choice: to him
  chosen_spanish: a él
  alternatives_spanish:
  - hasta él
  - hacia él
  lexicon: HALOT
  rationale: La preposición marca dirección hacia Noé; 'a él' es la forma más natural y directa en español.
- source_word: הַיּוֹנָה
  english_pob_choice: the dove
  chosen_spanish: la paloma
  alternatives_spanish:
  - la tórtola
  - la paloma mensajera
  lexicon: HALOT
  rationale: El hebreo designa la paloma enviada por Noé; 'paloma' es el equivalente normal y fiel en español.
- source_word: לְעֵת עֶרֶב
  english_pob_choice: at evening time
  chosen_spanish: al atardecer
  alternatives_spanish:
  - al anochecer
  - a la hora de la tarde
  lexicon: HALOT
  rationale: La expresión hebrea señala el momento del día; 'al atardecer' suena natural en español y conserva la referencia temporal sin sobre-explicar.
- source_word: וְהִנֵּה
  english_pob_choice: and behold
  chosen_spanish: y he aquí
  alternatives_spanish:
  - y mira
  - y, he aquí
  lexicon: HALOT
  rationale: '''Y he aquí'' preserva el marcador discursivo de sorpresa o énfasis del hebreo sin volverlo plano.'
- source_word: עֲלֵה זַיִת
  english_pob_choice: an olive leaf
  chosen_spanish: una hoja de olivo
  alternatives_spanish:
  - una hoja olivo
  - una hoja de un olivo
  lexicon: HALOT
  rationale: La construcción hebrea es literalmente 'hoja de olivo'; 'una hoja de olivo' es la equivalencia clara y publicada en español.
- source_word: טָרָף
  english_pob_choice: freshly plucked
  chosen_spanish: recién arrancada
  alternatives_spanish:
  - recién cortada
  - arrancada
  lexicon: HALOT
  rationale: El adjetivo indica algo arrancado o desprendido; 'recién arrancada' conserva el matiz de que la hoja fue tomada de una planta viva y era reciente.
- source_word: בְּפִיהָ
  english_pob_choice: was in her mouth
  chosen_spanish: estaba en su pico
  alternatives_spanish:
  - estaba en su boca
  - estaba en su pico/ boca
  lexicon: HALOT
  rationale: Aunque el hebreo dice literalmente 'en su boca', para un ave el español moderno suele preferir 'pico' cuando se quiere evitar una imagen menos natural; se mantiene el referente corporal del ave sin alterar el sentido.
- source_word: קַלּוּ
  english_pob_choice: had subsided
  chosen_spanish: se habían retirado
  alternatives_spanish:
  - habían menguado
  - se habían calmado
  lexicon: HALOT
  rationale: El verbo expresa que las aguas habían disminuido/retrocedido; 'se habían retirado' comunica bien la imagen de retroceso del agua en español.
- source_word: מֵעַל הָאָרֶץ
  english_pob_choice: from upon the earth
  chosen_spanish: de sobre la tierra
  alternatives_spanish:
  - de la tierra
  - de encima de la tierra
  lexicon: HALOT
  rationale: '''De sobre la tierra'' conserva la preposición compuesta מֵעַל y el relieve espacial del hebreo mejor que un simple ''de la tierra''.'
translation_notes:
  revision_awareness: Se siguió el texto hebreo masorético (WLC) y el audit trail inglés de POB. No se detectaron revisiones aplicadas en el pasaje; la redacción española refleja la lectura estable con las mismas alternativas léxicas relevantes documentadas en el inglés.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' como terminología por defecto cuando aparezca el nombre divino, pero este versículo no lo contiene.
  - Se usa 'paloma' para הַיּוֹנָה y no se introduce lenguaje interpretativo adicional.
  - Se conserva la imagen espacial de מֵעַל con 'de sobre' para no aplanar el hebreo.
  - La elección de 'estaba en su pico' prioriza naturalidad en español para un ave; se documenta la alternativa literal 'boca' en nota.
  - El tono busca ser bíblico y publicable, pero no arcaizante.
