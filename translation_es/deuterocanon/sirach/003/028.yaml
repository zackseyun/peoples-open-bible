translation:
  language: es
  text: No te apresures a curar la herida de un burlón, porque no hay curación para ella, pues fueron plantados de mala planta[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Paralelo griego: “porque una planta de maldad ha echado raíces en él”. La cláusula final del hebreo es textualmente áspera y aparece en plural.'
    reason: alternative_reading
lexical_decisions:
- source_word: אַל תָּרוּץ
  english_pob_choice: Do not hurry
  chosen_spanish: No te apresures
  alternatives_spanish:
  - No corras
  - No te hagas prisa
  lexicon: HALOT
  rationale: En esta construcción prohibitiva, el hebreo רוץ no exige literalmente “correr” en español; expresa actuar con prisa. “No te apresures” conserva la fuerza idiomática y el registro sapiencial.
- source_word: לְרַפְּאוֹת
  english_pob_choice: to heal
  chosen_spanish: curar
  alternatives_spanish:
  - sanar
  lexicon: HALOT
  rationale: El verbo רפא permite “curar” o “sanar”. Aquí el contexto de una herida concreta favorece “curar”, que mantiene con claridad la imagen de reparación de un daño.
- source_word: מַכַּת
  english_pob_choice: the wound
  chosen_spanish: la herida
  alternatives_spanish:
  - el golpe
  - la lesión
  lexicon: HALOT
  rationale: מכה puede ser golpe, herida o lesión. Con el verbo “curar”, “herida” es la equivalencia más natural y conserva la metáfora corporal del dicho.
- source_word: לֵץ
  english_pob_choice: a scoffer
  chosen_spanish: un burlón
  alternatives_spanish:
  - un escarnecedor
  - un mofador
  lexicon: HALOT
  rationale: En la literatura sapiencial, לץ designa a quien desprecia la corrección y se burla con arrogancia. “Burlón” comunica bien ese perfil en español sin elevar innecesariamente el registro.
- source_word: אֵין לָהּ רְפוּאָה
  english_pob_choice: there is no healing for it
  chosen_spanish: no hay sanidad para ella
  alternatives_spanish:
  - no tiene cura
  - no hay remedio para ella
  lexicon: HALOT
  rationale: La frase afirma incurabilidad. “Sanidad” enlaza con “curar” y mantiene el paralelismo interno del verso; el pronombre femenino se ajusta a “la herida”.
- source_word: מִנֶּטַע רַע
  english_pob_choice: from an evil planting
  chosen_spanish: de una mala plantación
  alternatives_spanish:
  - de una mala planta
  - de una siembra mala
  lexicon: HALOT
  rationale: El hebreo usa una imagen de plantío/origen, y el paralelo griego habla de “una planta de maldad”. “Plantación” preserva la metáfora de origen más que concretar una sola planta, y suena natural en español.
- source_word: נִטְעוֹ
  english_pob_choice: they were planted
  chosen_spanish: fueron plantados
  alternatives_spanish:
  - fue plantado
  - ha echado raíces
  lexicon: HALOT
  rationale: El hebreo transmitido presenta forma plural, aunque choca con el singular de la primera mitad del versículo; por eso se conserva el plural en la traducción principal para no normalizar silenciosamente el texto.
theological_decisions:
- issue: Manejo de la tensión textual entre el hebreo transmitido y el paralelo griego en la última cláusula
  english_pob_reading: Retain the Hebrew-based plural sense in the main text while preserving the Greek singular-root image in a footnote.
  chosen_spanish_reading: Mantener en el texto principal la forma plural transmitida (“fueron plantados”) y anotar la alternativa griega de una planta de maldad que echa raíces en el soberbio.
  alternative_spanish_readings:
  - porque una planta de maldad ha echado raíces en él
  - porque una planta de maldad se ha arraigado en él
  rationale: Sirach se transmite con una tensión real entre el hebreo y el griego. La lectura principal respeta el hebreo disponible; la nota conserva la explicación griega, sin borrar la dificultad textual ni forzar una armonización artificial.
  doctrine_reference: 'PHILOSOPHY.md: traducir desde el hebreo donde Sirach sobrevive; usar el paralelo griego como entrada de traducción real; preservar honestamente la incertidumbre textual.'
translation_notes:
  revision_awareness: 'La redacción refleja la revisión más reciente: se eligió “apresures” como registro un poco más formal y se mantuvo la solución principal con plural en la última cláusula, dejando la alternativa griega en nota.'
  spanish_consistency_notes:
  - Se usa “Yahvé” solo cuando el texto lo requiere; este versículo no lo contiene.
  - Se mantuvo “burlón” para לֵץ conforme al tono sapiencial y a la decisión POB inglesa de “scoffer”.
  - Se prefirió “no hay sanidad” para conservar el paralelismo con “curar”.
  - La nota al pie preserva la tensión hebreo-griego sin convertirla en una harmonización interpretativa.
