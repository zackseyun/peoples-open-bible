translation:
  language: es
  text: Cuando Aarón y sus hijos hayan terminado de cubrir el santuario y todos los utensilios del santuario[a], cuando el campamento se ponga en marcha, después de eso vendrán los hijos de Coat para llevarlos; pero no tocarán las cosas santas, no sea que mueran[b][c]. Esta es la carga de los hijos de Coat en la tienda de reunión.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «el santuario». El hebreo «lo santo» puede entenderse colectivamente de los objetos sagrados o, más ampliamente, del santuario.
    reason: alternative_reading
  - marker: b
    text: O «y morirán». El hebreo expresa directamente la consecuencia.
    reason: lexical_alternative
  - marker: c
    text: O «los coatitas». Literalmente, «los hijos de Coat».
    reason: lexical_alternative
lexical_decisions:
- source_word: וְכִלָּה
  english_pob_choice: have finished
  chosen_spanish: hayan terminado
  alternatives_spanish:
  - hayan acabado
  - terminen
  lexicon: HALOT
  rationale: El hebreo expresa una acción completada antes del siguiente paso. En español, el perfecto compuesto de subjuntivo con valor temporal funciona bien tras «cuando», y conserva la idea de terminación de forma natural.
- source_word: לְכַסֹּת
  english_pob_choice: covering
  chosen_spanish: de cubrir
  alternatives_spanish:
  - para cubrir
  - cubrir
  lexicon: HALOT
  rationale: El infinitivo en español encaja después de «haber terminado» y mantiene la relación de finalidad/acción en curso sin añadir sentido ajeno.
- source_word: הַקֹּדֶשׁ
  english_pob_choice: the sanctuary
  chosen_spanish: el santuario
  alternatives_spanish:
  - lo santo
  - el lugar santo
  lexicon: HALOT
  rationale: En el primer miembro la referencia cultual es al conjunto sagrado que está siendo cubierto antes del traslado. «Santuario» comunica bien ese conjunto en español y conserva el paralelo con los utensilios.
- source_word: כָּל כְּלֵי הַקֹּדֶשׁ
  english_pob_choice: all the furnishings of the sanctuary
  chosen_spanish: todos los utensilios del santuario
  alternatives_spanish:
  - todos los enseres del santuario
  - todos los objetos del santuario
  lexicon: HALOT
  rationale: כְּלֵי alude a implementos/vasos/utensilios. «Utensilios» es suficientemente amplio y preciso en contexto tabernacular, sin forzar un vocabulario eclesiástico posterior.
- source_word: בִּנְסֹעַ הַמַּחֲנֶה
  english_pob_choice: when the camp sets out
  chosen_spanish: cuando el campamento se ponga en marcha
  alternatives_spanish:
  - cuando el campamento salga
  - al ponerse en marcha el campamento
  lexicon: HALOT
  rationale: El infinitivo constructo marca el momento de la partida. «Se ponga en marcha» es una expresión natural y fiel al valor temporal.
- source_word: וְאַחֲרֵי כֵן
  english_pob_choice: after that
  chosen_spanish: después de eso
  alternatives_spanish:
  - después
  - luego de eso
  lexicon: HALOT
  rationale: La secuencia procedural queda clara en español con una expresión simple y directa.
- source_word: בְנֵי קְהָת
  english_pob_choice: the sons of Kohath
  chosen_spanish: los hijos de Coat
  alternatives_spanish:
  - los coatitas
  lexicon: HALOT
  rationale: Se conserva la filiación literal del hebreo, como hace el POB inglés, en lugar de convertirlo de inmediato en etnónimo.
- source_word: לָשֵׂאת
  english_pob_choice: to carry them
  chosen_spanish: para llevarlos
  alternatives_spanish:
  - para cargarlos
  - para transportarlos
  lexicon: HALOT
  rationale: El infinitivo expresa su función en el traslado. «Llevarlos» es idiomático en español y suficiente para el contexto de transporte de objetos sagrados.
- source_word: וְלֹא יִגְּעוּ אֶל הַקֹּדֶשׁ
  english_pob_choice: but they shall not touch the holy things
  chosen_spanish: pero no tocarán las cosas santas
  alternatives_spanish:
  - pero no tocarán el santuario
  - pero no tocarán lo santo
  lexicon: HALOT
  rationale: Se preserva la tensión semántica del hebreo. El contexto inmediato favorece entender objetos sagrados concretos, y «cosas santas» permite dejar abierta la ambigüedad entre el conjunto y los objetos.
- source_word: וָמֵתוּ
  english_pob_choice: lest they die
  chosen_spanish: para que no mueran
  alternatives_spanish:
  - y morirán
  - o morirán
  lexicon: HALOT
  rationale: El hebreo presenta la consecuencia de manera directa. En español, una subordinada final negativa comunica la advertencia sin suavizar el peso del texto.
- source_word: אֵלֶּה מַשָּׂא בְנֵי קְהָת
  english_pob_choice: These are the burden of the sons of Kohath
  chosen_spanish: Esta es la carga de los hijos de Coat
  alternatives_spanish:
  - Este es el deber de los hijos de Coat
  - Esta es la responsabilidad de los hijos de Coat
  lexicon: HALOT
  rationale: מַשָּׂא puede ser carga o responsabilidad. «Carga» mantiene el peso concreto del término, en línea con la función de transporte asignada.
- source_word: בְּאֹהֶל מוֹעֵד
  english_pob_choice: in the tent of meeting
  chosen_spanish: en la tienda de reunión
  alternatives_spanish:
  - en el tabernáculo de reunión
  - en la carpa de reunión
  lexicon: HALOT
  rationale: «Tienda de reunión» sigue de cerca el hebreo y es transparente en español. Se evita introducir una denominación más tradicional que no esté exigida por el texto.
theological_decisions:
- issue: Referencia de הַקֹּדֶשׁ en la cláusula de prohibición
  english_pob_reading: the holy things (the sacred objects)
  chosen_spanish_reading: las cosas santas
  alternative_spanish_readings:
  - el santuario
  - las cosas sagradas
  rationale: El contexto inmediato habla de objetos ya cubiertos y listos para el traslado; por eso la prohibición se entiende mejor de contacto directo con los objetos sagrados, no de acceso general al recinto. «Las cosas santas» conserva la ambigüedad útil entre colectivo y objetos concretos.
  doctrine_reference: Preservar la tensión contextual del hebreo; primacía del contexto original sobre la armonización traductora.
- issue: Consecuencia de tocar lo santo
  english_pob_reading: lest they die
  chosen_spanish_reading: para que no mueran
  alternative_spanish_readings:
  - y morirán
  - no sea que mueran
  rationale: La advertencia hebrea formula una consecuencia real e inmediata. La traducción elegida comunica la gravedad normativa sin ocultar el vínculo entre la transgresión y la muerte.
  doctrine_reference: Mantener el valor de advertencia del texto legal-sacrificial.
translation_notes:
  revision_awareness: 'La versión española sigue de cerca el trazado auditado del POB inglés y conserva las decisiones clave: el primer הַקֹּדֶשׁ como «santuario» con nota alternativa, el segundo como referencia a «las cosas santas», la secuencia temporal explícita, y la advertencia de muerte sin suavizarla. No se introdujeron cambios textuales respecto del razonamiento revisado de alta concordancia.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma del proyecto, pero este versículo no contiene el tetragrámaton.
  - Se usa «hijos de Coat» para conservar la filiación literal; no se sustituye por un etnónimo.
  - «Tienda de reunión» se mantiene uniforme con la terminología del tabernáculo en el proyecto.
  - La diferencia entre «santuario» y «cosas santas» responde a la tensión contextual señalada en el audit trail, no a una inconsistencia terminológica.
