translation:
  language: es
  text: Y que me dé la cueva de Macpela[a], que le pertenece, que está al extremo de su campo. Por el precio completo en plata[b], que me la dé entre ustedes como propiedad[c] para sepultura.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'al borde de su campo'. La frase hebrea puede denotar el fin o la orilla/extremidad del campo.
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: ''por plata completa'', un modismo que significa pago íntegro del precio.'
    reason: lexical_alternative
  - marker: c
    text: O 'como posesión para sepultura'. El hebreo enfatiza una posesión legal, no solo el uso del lugar para enterrar.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְיִתֶּן
  english_pob_choice: and let him give
  chosen_spanish: que me dé
  alternatives_spanish:
  - y que dé
  - y que me dé
  lexicon: HALOT
  rationale: El hebreo expresa una petición/jusivo en contexto de negociación. En español, 'que me dé' comunica mejor la súplica o solicitud que un futuro simple.
- source_word: מְעָרַת הַמַּכְפֵּלָה
  english_pob_choice: the cave of Machpelah
  chosen_spanish: la cueva de Macpela
  alternatives_spanish:
  - la cueva de Macpela
  - la cueva de la Doble
  - la cueva de Machpelah
  lexicon: HALOT
  rationale: Se translitera el nombre propio con una forma española natural ('Macpela'). Se conserva 'cueva' por el sustantivo hebreo literal.
- source_word: אֲשֶׁר ל֔וֹ
  english_pob_choice: which belongs to him
  chosen_spanish: que le pertenece
  alternatives_spanish:
  - que es suya
  - que le pertenece
  - que es de él
  lexicon: HALOT
  rationale: La relación es de posesión legal/propietaria; 'le pertenece' mantiene ese matiz sin sonar excesivamente coloquial.
- source_word: אֲשֶׁר בִּקְצֵה שָׂדֵהוּ
  english_pob_choice: which is at the end of his field
  chosen_spanish: que está al extremo de su campo
  alternatives_spanish:
  - que está al final de su campo
  - que está en el borde de su campo
  - que está al extremo de su campo
  lexicon: HALOT
  rationale: קצה puede significar 'fin', 'borde' o 'extremo'. Se eligió 'extremo' porque preserva la amplitud semántica sin fijar solo una orilla física.
- source_word: בְּכֶסֶף מָלֵא
  english_pob_choice: for the full price in silver
  chosen_spanish: por el precio completo en plata
  alternatives_spanish:
  - por plata completa
  - por el precio total en plata
  - por el precio completo en plata
  lexicon: HALOT
  rationale: El hebreo es un modismo de pago íntegro. 'Precio completo en plata' comunica el sentido comercial y evita que suene a metáfora opaca.
- source_word: יִתְּנֶנָּה
  english_pob_choice: let him give it
  chosen_spanish: que me la dé
  alternatives_spanish:
  - que la dé
  - que me la entregue
  - que me la dé
  lexicon: HALOT
  rationale: Se conserva el verbo básico 'dar', como en el hebreo, y el pronombre clítico 'la' retoma la cueva de manera natural en español.
- source_word: בְּתוֹכְכֶם
  english_pob_choice: among you
  chosen_spanish: entre ustedes
  alternatives_spanish:
  - entre ustedes
  - en medio de ustedes
  - entre vosotros
  lexicon: HALOT
  rationale: El plural del trato comunitario queda mejor en 'entre ustedes', que suena natural en español latinoamericano y mantiene el sentido social/legal.
- source_word: לַאֲחֻזַּת קָבֶר
  english_pob_choice: as a burial property
  chosen_spanish: como posesión de sepultura
  alternatives_spanish:
  - como posesión de sepultura
  - como propiedad de sepultura
  - como posesión funeraria
  lexicon: HALOT
  rationale: אֲחֻזָּה denota una posesión/tenencia con fuerza legal. 'Posesión de sepultura' mantiene esa fuerza mejor que una paráfrasis más libre.
theological_decisions:
- issue: Naturaleza jurídica de la compra
  english_pob_reading: For the full price in silver, let him give it to me among you as a burial property.
  chosen_spanish_reading: por el precio completo en plata, que me la dé entre ustedes como posesión de sepultura
  alternative_spanish_readings:
  - por el precio total en plata, que me la entregue entre ustedes como propiedad de sepultura
  - por plata completa, que me la dé entre ustedes como tumba
  rationale: El texto subraya una adquisición legal, no solo permiso para usar una tumba. 'Posesión de sepultura' preserva la idea de tenencia reconocida y permanente.
  doctrine_reference: No aplica doctrina dogmática; decisión de sentido legal-textual conforme al hebreo y al audit trail de POB.
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión del inglés POB que unificó la petición en una sola continuidad con punto y coma y luego con dos oraciones, sin alterar el sentido. En español se optó por una sola frase continua con puntuación interna equivalente, manteniendo la cohesión de la súplica y la relación entre localización y precio.
  spanish_consistency_notes:
  - Se conservó 'Yahvé' implícito no porque aparezca en este versículo, sino porque no corresponde introducirlo aquí.
  - Se prefirió 'posesión' para reflejar el valor jurídico de אֲחֻזָּה.
  - Se eligió 'entre ustedes' por naturalidad en español latinoamericano y por el marco comunitario del trato.
