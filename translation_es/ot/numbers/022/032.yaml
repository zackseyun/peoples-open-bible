translation:
  language: es
  text: 'Y el ángel de Yahvé le dijo: «¿Por qué has golpeado a tu asna[a] estas tres veces? Mira, yo he salido como adversario[b], porque tu camino es perverso[c] delante de mí».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El hebreo אֲתֹנְךָ designa una asna, es decir, una burra hembra.
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo לְשָׂטָן: aquí significa «adversario» u «oponente», no necesariamente el nombre propio «Satanás».'
    reason: lexical_alternative
  - marker: c
    text: El verbo hebreo es raro y también puede entenderse como «contrario» o «torcido».
    reason: alternative_reading
lexical_decisions:
- source_word: מַלְאַךְ יְהוָה
  english_pob_choice: the angel of Yahweh
  chosen_spanish: el ángel de Yahvé
  alternatives_spanish:
  - el mensajero de Yahvé
  lexicon: HALOT
  rationale: En este contexto narrativo se trata del ser celestial que se le opone a Balaam; en español, «ángel» es natural y preciso. Se conserva «Yahvé» para el nombre divino, siguiendo el estándar del proyecto.
- source_word: עַל מָה
  english_pob_choice: Why
  chosen_spanish: ¿Por qué?
  alternatives_spanish:
  - ¿Con qué motivo?
  - ¿Para qué?
  lexicon: HALOT
  rationale: La pregunta hebrea es idiomática; «¿Por qué?» expresa la fuerza interrogativa de forma natural y fiel en español.
- source_word: הִכִּיתָ
  english_pob_choice: have you struck
  chosen_spanish: has golpeado
  alternatives_spanish:
  - has herido
  - has pegado
  lexicon: HALOT
  rationale: El verbo hebreo indica golpear o dar un golpe. «Golpeado» mantiene la fuerza directa sin intensificar innecesariamente a «azotado» o «maltratado».
- source_word: אֲתֹנְךָ
  english_pob_choice: your donkey
  chosen_spanish: tu asna
  alternatives_spanish:
  - tu burra
  - tu burro hembra
  lexicon: HALOT
  rationale: El hebreo especifica una hembra del asno; «asna» preserva ese dato lexical de manera clara y breve. Se evita neutralizarlo con «burro».
- source_word: זֶה שָׁלֹשׁ רְגָלִים
  english_pob_choice: these three times
  chosen_spanish: estas tres veces
  alternatives_spanish:
  - estas tres ocasiones
  lexicon: HALOT
  rationale: La expresión hebrea es idiomática y en contexto significa «tres veces». «Estas tres veces» es la equivalencia más natural y exacta en español.
- source_word: הִנֵּה אָנֹכִי
  english_pob_choice: Look, I
  chosen_spanish: Mira, yo
  alternatives_spanish:
  - He aquí, yo
  - Mira, aquí yo
  lexicon: HALOT
  rationale: «Mira» conserva la función discursiva de llamar la atención sin recurrir a un arcaísmo innecesario. Se mantiene el énfasis del pronombre explícito «yo».
- source_word: יָצָאתִי
  english_pob_choice: have come out
  chosen_spanish: he salido
  alternatives_spanish:
  - he venido
  - he salido al encuentro
  lexicon: HALOT
  rationale: El verbo יצא significa salir o salir hacia afuera; aquí el ángel declara su irrupción en la escena. «He salido» conserva el movimiento verbal sin añadir elementos no presentes.
- source_word: לְשָׂטָן
  english_pob_choice: as an adversary
  chosen_spanish: como adversario
  alternatives_spanish:
  - como opositor
  - para oponerte
  lexicon: HALOT
  rationale: Se conserva el sentido común del sustantivo hebreo שָׂטָן como «adversario/oponente», no como nombre propio. «Como adversario» mantiene esa tensión léxica sin importaciones doctrinales posteriores.
- source_word: יָרַט
  english_pob_choice: is perverse
  chosen_spanish: es perverso
  alternatives_spanish:
  - es torcido
  - es contrario
  - es imprudente
  lexicon: HALOT
  rationale: Siguiendo la revisión más reciente del POB inglés, se opta por «perverso» para reflejar mejor la valoración del camino en hebreo. En español conserva el juicio moral y relacional del texto.
- source_word: הַדֶּרֶךְ
  english_pob_choice: the way
  chosen_spanish: tu camino
  alternatives_spanish:
  - el camino
  - tu senda
  lexicon: HALOT
  rationale: Aunque el hebreo tiene «el camino», el contexto apunta al recorrido o conducta de Balaam. «Tu camino» hace explícita la referencia implícita del pronombre en español sin cambiar el sentido.
- source_word: לְנֶגְדִּי
  english_pob_choice: before me
  chosen_spanish: delante de mí
  alternatives_spanish:
  - ante mí
  - frente a mí
  lexicon: HALOT
  rationale: La expresión indica estar en presencia de, frente a o delante de alguien. «Delante de mí» conserva el matiz espacial y relacional sin sobrecargarlo con una interpretación más fuerte.
theological_decisions:
- issue: Sentido de לְשָׂטָן
  english_pob_reading: 'common noun: ''as an adversary'''
  chosen_spanish_reading: 'sustantivo común: «como adversario»'
  alternative_spanish_readings:
  - «como Satanás» si se tomara como nombre propio
  - «como opositor»
  rationale: El contexto muestra al ángel de Yahvé enfrentando a Balaam, por lo que el hebreo funciona descriptivamente. Traducirlo como nombre propio introduciría una lectura teológica que el verso no exige.
  doctrine_reference: Mantener la tensión léxica sin resolverla artificialmente; no importar una identificación demonológica ajena al contexto inmediato.
- issue: Descripción del camino de Balaam
  english_pob_reading: your way is perverse before me
  chosen_spanish_reading: tu camino es perverso delante de mí
  alternative_spanish_readings:
  - tu camino es torcido delante de mí
  - tu proceder es perverso delante de mí
  rationale: La revisión inglesa más reciente favorece «perverse» sobre «reckless», acercándose más a la evaluación del hebreo. En español, «perverso» conserva el juicio moral y la idea de oposición ante la presencia del ángel.
  doctrine_reference: El texto evalúa el curso de Balaam como contrario ante la autoridad divina; la traducción debe mantener ese juicio sin suavizarlo.
translation_notes:
  revision_awareness: La redacción sigue de cerca la versión inglesa auditada más reciente, especialmente la revisión que sustituyó «reckless» por «perverse». También preserva la decisión consistente del POB de entender לְשָׂטָן como sustantivo común y no como nombre propio. Se mantiene «Yahvé» para el tetragrámaton, conforme al estándar del proyecto.
  spanish_consistency_notes:
  - Se usa «Yahvé» para יְהוָה, conforme al criterio del proyecto.
  - Se prefiere «ángel» y no «mensajero» por el contexto narrativo.
  - «Asna» conserva el dato de sexo del animal que el hebreo especifica.
  - «Como adversario» mantiene la lectura léxica abierta de שָׂטָן.
  - «Delante de mí» reproduce el valor relacional de לְנֶגְדִּי sin elevarlo a una paráfrasis teológica.
