translation:
  language: es
  text: Su grosor era de un palmo menor[a], y su borde era como el borde de una copa, como una flor de lirio[b]. Podía contener dos mil batos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El pasaje paralelo de 2 Crónicas 4:5 dice que el mar contenía tres mil batos. Esto podría reflejar una diferencia textual, de transmisión o interpretativa entre capacidad y contenido habitual.
    reason: cross_reference
  - marker: b
    text: 'O: «su labio ... como el labio de una copa».'
    reason: lexical_alternative
lexical_decisions:
- source_word: עָבְיוֹ
  english_pob_choice: its thickness
  chosen_spanish: su grosor
  alternatives_spanish:
  - su espesor
  - su grosor de pared
  lexicon: HALOT
  rationale: El sustantivo hebreo se refiere al espesor material del objeto. En español, «grosor» es natural y preciso para un recipiente grande; «espesor» también sería posible, pero suena más técnico. Se evita un calco pesado como «su grosor de ello».
- source_word: טֶפַח
  english_pob_choice: a handbreadth
  chosen_spanish: un palmo
  alternatives_spanish:
  - una mano de medida
  - un ancho de mano
  lexicon: HALOT
  rationale: La medida hebrea טֶפַח corresponde a una medida de la mano. «Palmo» comunica bien la unidad de forma breve y comprensible en español bíblico; «ancho de mano» sería más explicativo, pero menos idiomático.
- source_word: שְׂפָתוֹ
  english_pob_choice: its rim
  chosen_spanish: su borde
  alternatives_spanish:
  - su labio
  - su orilla
  lexicon: HALOT
  rationale: Para un gran recipiente de metal, «borde» expresa con claridad la parte superior saliente. «Labio» preserva más literalmente la imagen, pero en español puede sonar menos natural aquí; por eso se deja como alternativa implícita en la comparación de la nota.
- source_word: כְּמַעֲשֵׂה
  english_pob_choice: was made like
  chosen_spanish: era como
  alternatives_spanish:
  - estaba hecho como
  - fue hecho como
  lexicon: HALOT
  rationale: La expresión introduce una comparación de forma. En español, «era como» reproduce la función comparativa de manera fluida sin sobrecargar la oración con pasivos innecesarios.
- source_word: שְׂפַת כּוֹס
  english_pob_choice: the rim of a cup
  chosen_spanish: el borde de una copa
  alternatives_spanish:
  - el labio de una copa
  - el borde de un vaso
  lexicon: HALOT
  rationale: Se mantiene la correspondencia con «borde» para conservar la coherencia de la imagen. «Copa» transmite mejor un recipiente antiguo y formal que «vaso»; «labio» queda como alternativa semántica posible.
- source_word: פֶּרַח שׁוֹשָׁן
  english_pob_choice: a lily blossom
  chosen_spanish: una flor de lirio
  alternatives_spanish:
  - un lirio en flor
  - un capullo de lirio
  lexicon: HALOT
  rationale: La secuencia describe una forma floral. «Flor de lirio» es transparente y conserva la imagen de apertura y ornamentación. «Lirio» solo, sin complemento, podría sonar demasiado genérico en este contexto descriptivo.
- source_word: אַלְפַּיִם בַּת
  english_pob_choice: two thousand baths
  chosen_spanish: dos mil batos
  alternatives_spanish:
  - dos mil medidas de bato
  - dos mil bathes
  lexicon: HALOT
  rationale: Se translitera la unidad de medida antigua como «bato» para preservar el referente cultural y evitar una conversión interpretativa. El plural español regular «batos» es legible y consistente con la práctica de transliteración.
- source_word: יָכִיל
  english_pob_choice: It could hold
  chosen_spanish: Podía contener
  alternatives_spanish:
  - Podía sostener
  - Podía albergar
  lexicon: HALOT
  rationale: El verbo expresa capacidad potencial, no solo contenido presente. «Podía contener» es preciso y natural en español; se evita «contenía» para no perder el matiz de capacidad.
theological_decisions:
- issue: Capacidad del recipiente y la variación paralela en 2 Crónicas 4:5
  english_pob_reading: The parallel description in 2 Chronicles 4:5 says the basin held three thousand baths. This may reflect a textual, transmissional, or interpretive difference between capacity and usual contents.
  chosen_spanish_reading: No se añade aquí nota de discrepancia textual, porque el verso en sí solo afirma que podía contener dos mil batos.
  alternative_spanish_readings:
  - Podía contener dos mil batos; el paralelo de 2 Crónicas 4:5 dice tres mil batos, lo que quizá refleja una diferencia textual, de transmisión o de interpretación entre capacidad y contenido habitual.
  rationale: La observación del inglés POB es importante para la auditoría, pero en este registro español se conserva el texto del versículo sin cargar la línea principal con una nota de armonización. La posible tensión textual queda documentada en el análisis, no en el texto base.
  doctrine_reference: Crítica textual / armonización sinóptica
translation_notes:
  revision_awareness: 'Se siguió el estado de alta concordancia del control cruzado, sin revisiones aplicadas en el paquete fuente. La redacción española conserva las decisiones léxicas del audit trail inglés: medida antigua, comparación ornamental y verbo de capacidad.'
  spanish_consistency_notes:
  - Se mantiene «borde» de forma consistente para שְׂפָת/שְׂפַת, con la alternativa «labio» reservada para la nota.
  - Se translitera «batos» para la unidad de medida, en lugar de convertirla a una medida moderna.
  - La sintaxis evita calcos del inglés y conserva el paralelismo descriptivo del hebreo.
  - Se usa minúscula en «flor de lirio» por tratarse de una descripción común, no de un título.
