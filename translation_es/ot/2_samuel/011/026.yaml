translation:
  language: es
  text: Cuando la mujer de Urías oyó que Urías su marido estaba muerto[a], hizo duelo por su marido.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «que Urías su marido había muerto».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַתִּשְׁמַע
  english_pob_choice: heard
  chosen_spanish: oyó
  alternatives_spanish:
  - escuchó
  - llegó a oír
  lexicon: HALOT
  rationale: שׁמע en qal expresa aquí la recepción de una noticia; en español, 'oyó' es natural, breve y fiel al valor narrativo. 'Llegó a oír' sería más perifrástico y 'escuchó' sugiere más atención voluntaria que el hebreo requiere.
- source_word: אֵשֶׁת אוּרִיָּה
  english_pob_choice: Uriah’s wife
  chosen_spanish: la mujer de Urías
  alternatives_spanish:
  - la esposa de Urías
  - la mujer de Urías
  lexicon: HALOT
  rationale: El constructo hebreo identifica a la mujer por su vínculo con Urías. 'La mujer de Urías' reproduce bien esa designación relacional; 'esposa' es posible, pero 'mujer' sigue de cerca la forma del hebreo y evita añadir matiz conyugal más técnico del necesario.
- source_word: כִּי
  english_pob_choice: that
  chosen_spanish: que
  alternatives_spanish:
  - cuando
  - porque
  lexicon: HALOT
  rationale: Aquí introduce el contenido de lo oído, no una causalidad ni una relación temporal principal. 'Que' refleja de modo directo la función de la cláusula.
- source_word: מֵת
  english_pob_choice: was dead
  chosen_spanish: había muerto
  alternatives_spanish:
  - estaba muerto
  - murió
  lexicon: HALOT
  rationale: El estado resultante de muerte está implícito; en español narrativo, 'había muerto' mantiene bien la anterioridad respecto de su oído. 'Estaba muerto' enfatiza estado, pero suena menos congruente con la noticia recibida; 'murió' desplaza el foco al evento.
- source_word: אוּרִיָּה אִישָׁהּ
  english_pob_choice: Uriah her husband
  chosen_spanish: Urías su marido
  alternatives_spanish:
  - Urías su esposo
  - Uriah su marido
  lexicon: HALOT
  rationale: El hebreo pone el nombre seguido de la apposición 'su esposo/marido'. 'Marido' es una equivalencia clara y bíblica; conserva el orden cercano al hebreo sin la redundancia de repetir 'de Urías'.
- source_word: וַתִּסְפֹּד
  english_pob_choice: she mourned
  chosen_spanish: hizo duelo
  alternatives_spanish:
  - lloró
  - se lamentó
  - guardó luto
  lexicon: HALOT
  rationale: ספד se refiere al acto de lamentar/guardar duelo por un muerto. 'Hizo duelo' comunica con precisión el evento de luto sin exagerar con 'lloró' ni estrechar el sentido a mera emoción. 'Guardó luto' es posible, pero describe más el estado resultante que el acto narrado.
- source_word: עַל בַּעְלָהּ
  english_pob_choice: for her husband
  chosen_spanish: por su marido
  alternatives_spanish:
  - por su esposo
  - sobre su marido
  lexicon: HALOT
  rationale: Con verbos de duelo, עַל se traduce naturalmente 'por'. 'Marido' mantiene la referencia marital explícita del hebreo; 'esposo' sería también válido, pero 'marido' encaja mejor con el registro narrativo y la simetría con la cláusula anterior.
translation_notes:
  revision_awareness: La versión inglesa auditada fue ajustada desde «her husband Uriah» a «Uriah her husband» para acercarse más al orden del hebreo. En español se reflejó esa cercanía manteniendo la apposición «Urías su marido» y la referencia relacional explícita.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' como norma general del proyecto, aunque este versículo no contiene el nombre divino.
  - Se prefirió 'marido' sobre 'esposo' por correspondencia estilística con el registro narrativo y la relación appositiva del hebreo.
  - El participio מֵת se expresa como 'había muerto' para conservar la anterioridad narrativa sin introducir una paráfrasis excesiva.
