  timestamp: '2026-05-07T21:40:38Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien el sentido general del hebreo y del POB inglés: Gedeón tuvo setenta hijos biológicos, y la razón dada es que tenía muchas esposas. Sin embargo, hay un desajuste léxico importante en שִׁבְעִים בָּנִים: el hebreo especifica ''sons'', y el POB inglés también lo preserva; ''hijos'' en español puede funcionar como genérico y pierde la precisión masculina del original.'
  spanish_quality_summary: El español es claro y natural, con buen tono bíblico moderno. 'Ahora Gedeón tuvo' y 'porque tenía muchas esposas' son legibles. No obstante, 'sus propios descendientes' suena algo más amplio que el original inmediato y, junto con 'hijos', crea una leve redundancia semántica. Puede afinarse a una formulación más ceñida y natural.
  glossary_alignment: No hay términos del glosario principal implicados como Yahvé/Mesías/etc. La decisión 'esposas' para נָשִׁים רַבּוֹת concuerda con la justificación auditada. La principal corrección necesaria es mantener la precisión de género en בָּנִים con 'hijos varones'.
  issues:
  - severity: medium
    issue: '''setenta hijos'' no preserva con suficiente precisión el valor masculino de בָּנִים'
    rationale: El original y el POB inglés dicen específicamente 'seventy sons'. En español, 'hijos' puede entenderse como masculino específico, pero también como mixto/genérico en uso actual. 'Setenta hijos varones' evita ambigüedad y refleja mejor la decisión auditada.
  - severity: low
    issue: '''sus propios descendientes'' es algo más amplio y redundante tras ''setenta hijos'''
    rationale: יֹצְאֵי יְרֵכוֹ señala descendencia biológica propia. 'Sus propios descendientes' comunica eso, pero 'descendientes' puede sugerir línea posterior más amplia. 'nacidos de él' o 'de su propia sangre' sería más estrecho; sin embargo, conviene una solución idiomática breve con nota literal para conservar el modismo.
  - severity: low
    issue: La nota 'idiomatismo hebreo' suena menos natural que 'modismo hebreo'
    rationale: Ambas son correctas, pero 'modismo' suele leerse con mayor naturalidad en español general eclesial.
  revised_spanish_text: Ahora Gedeón tuvo setenta hijos varones[a], nacidos de él, porque tenía muchas esposas.
  revised_footnotes:
  - marker: a
    text: Literalmente, «los que salieron de sus lomos», un modismo hebreo para su descendencia biológica.
    reason: lexical_alternative
  revision_rationale: Se ajusta בָּנִים a 'hijos varones' para preservar la especificidad masculina del hebreo y del POB inglés. Se reemplaza 'sus propios descendientes' por 'nacidos de él' para expresar mejor el idiomático יֹצְאֵי יְרֵכוֹ sin sonar demasiado amplio o redundante, manteniendo la alternativa literal en nota. La nota se pule levemente para mayor naturalidad en español.
