translation:
  language: es
  text: 'Y le dijo: «En verdad, en verdad les digo[a], verán el cielo abierto y a los ángeles de Dios subiendo y bajando[b] sobre el Hijo del Hombre».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El «les» en «les digo» y el «verán» del dicho están en plural en griego, aunque el marco narrativo hable primero a una sola persona.
    reason: lexical_alternative
  - marker: b
    text: La imagen recuerda el sueño de Jacob en Génesis 28:12, pero ahora centrada en el Hijo del Hombre.
    reason: cross_reference
lexical_decisions:
- source_word: Ἀμὴν ἀμὴν
  english_pob_choice: Truly, truly
  chosen_spanish: En verdad, en verdad
  alternatives_spanish:
  - Amén, amén
  - Ciertamente, ciertamente
  lexicon: BDAG
  rationale: La fórmula doble intensifica solemnidad y autoridad. En español, «En verdad, en verdad» expresa esa fuerza de manera natural y mantiene el tono enfático sin dejar «Amén» sin traducir en el cuerpo principal.
- source_word: ὑμῖν
  english_pob_choice: you
  chosen_spanish: les
  alternatives_spanish:
  - os
  - te
  - les digo a ustedes
  lexicon: BDAG
  rationale: El griego es plural. En español, el dativo plural «les» conserva ese valor mejor que una forma singular; además permite una redacción fluida en el discurso directo. La nota preserva la tensión entre el destinatario narrativo singular y el plural gramatical.
- source_word: ὄψεσθε
  english_pob_choice: you will see
  chosen_spanish: verán
  alternatives_spanish:
  - veréis
  - van a ver
  lexicon: BDAG
  rationale: Futuro de ὁράω en segunda persona plural. «Verán» comunica el tiempo futuro con naturalidad en español y mantiene el plural del original.
- source_word: τὸν οὐρανὸν ἀνεῳγότα
  english_pob_choice: heaven opened
  chosen_spanish: el cielo abierto
  alternatives_spanish:
  - el cielo abriéndose
  - el cielo que se ha abierto
  - el cielo abierto de par en par
  lexicon: BDAG
  rationale: 'La construcción participial expresa el estado resultante: el cielo aparece abierto. «El cielo abierto» es la forma más natural y fiel en español, sin añadir interpretación innecesaria.'
- source_word: τοὺς ἀγγέλους τοῦ θεοῦ
  english_pob_choice: the angels of God
  chosen_spanish: a los ángeles de Dios
  alternatives_spanish:
  - los ángeles de Dios
  - a los mensajeros de Dios
  lexicon: BDAG
  rationale: En este contexto visionario e intertextual, «ángeles» es el sentido claro. Se mantiene el objeto directo con «a» por requerimiento del español cuando el referente es personal.
- source_word: ἀναβαίνοντας καὶ καταβαίνοντας
  english_pob_choice: ascending and descending
  chosen_spanish: subiendo y bajando
  alternatives_spanish:
  - ascendiendo y descendiendo
  - subiendo y descendiendo
  lexicon: BDAG
  rationale: Para español, «subiendo y bajando» transmite el movimiento de forma inmediata y fluida. «Ascendiendo y descendiendo» preservaría más el paralelismo tradicional, pero suena más marcado y menos natural; el sentido intertextual queda intacto.
- source_word: ἐπὶ
  english_pob_choice: '''on'''
  chosen_spanish: sobre
  alternatives_spanish:
  - sobre
  - en
  - encima de
  lexicon: BDAG
  rationale: Con acusativo, ἐπί aquí marca relación espacial con la figura del Hijo del Hombre. «Sobre» conserva esa imagen con claridad en español; «encima de» sería más explicativo y pesado.
- source_word: ὁ υἱὸς τοῦ ἀνθρώπου
  english_pob_choice: the Son of Man
  chosen_spanish: el Hijo del Hombre
  alternatives_spanish:
  - el Hijo del ser humano
  - el Hijo del hombre
  lexicon: BDAG
  rationale: Se conserva el título tradicional y su carga apocalíptica e intertextual. En español bíblico, «Hijo del Hombre» es la forma más reconocible y fiel al valor titular del griego.
theological_decisions:
- issue: El destinatario pasa de singular narrativo (αὐτῷ, «a él») a plural en el dicho (ὑμῖν, «les/ustedes»).
  english_pob_reading: Main text keeps simple 'you' for readability, with plural force preserved in a footnote.
  chosen_spanish_reading: El texto principal usa «les»; la nota aclara que el plural abarca más que a Natanael.
  alternative_spanish_readings:
  - te digo
  - les digo a ustedes
  - os digo
  rationale: El griego amplía intencionalmente el alcance del dicho. En español, el dativo plural permite conservar esa amplitud sin sobrecargar la línea principal con una explicitación innecesaria.
  doctrine_reference: Translation philosophy §3, §6
- issue: La imagen de los ángeles subiendo y bajando evoca Génesis 28:12 y sitúa al Hijo del Hombre como eje de la revelación divina.
  english_pob_reading: Preserve the imagery without interpretive expansion in the main text.
  chosen_spanish_reading: Se conserva la imagen sin expansión interpretativa en el texto principal; la referencia se documenta en nota.
  alternative_spanish_readings:
  - hacer explícita la alusión a Jacob en el texto
  - parafrasear la escena para aclarar el vínculo con Génesis 28
  rationale: La traducción debe mantener el nivel de explicitud del original. La alusión bíblica es importante, pero pertenece a la anotación, no al cuerpo del versículo.
  doctrine_reference: Translation philosophy §1, §3
translation_notes:
  revision_awareness: 'Coincide con la última revisión disponible: no se registran cambios posteriores al pasaje base, y el estado de concordancia es alto.'
  spanish_consistency_notes:
  - Se mantiene «Dios» para θεοῦ y «Hijo del Hombre» para υἱὸς τοῦ ἀνθρώπου, en línea con la terminología POB.
  - Se evita «Señor» como sustituto de nombres divinos porque este versículo no contiene κύριος ni una cita directa del nombre divino.
  - La nota sobre el plural preserva la tensión exegética entre el destinatario individual de la escena y el alcance plural del dicho.
  - Se eligió «sobre» para ἐπὶ por ser natural en español y suficiente para reflejar la relación espacial sin añadir interpretación.
