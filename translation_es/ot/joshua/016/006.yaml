translation:
  language: es
  text: Entonces el límite se extendió hacia el occidente[a] hasta Michmetat, al norte, y el límite giró hacia el oriente a Taanat-Silo, y pasó por ella al oriente hasta Janoa.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literalmente, «hacia el mar», un modismo hebreo para «hacia el occidente».
    reason: lexical_alternative
lexical_decisions:
- source_word: וְיָצָא
  english_pob_choice: Then ... went out
  chosen_spanish: Entonces ... se extendió
  alternatives_spanish:
  - y ... salió
  - entonces ... salió
  lexicon: HALOT
  rationale: En descripciones de límites, יצא expresa el avance o extensión de la línea. «Se extendió» comunica con naturalidad esa función topográfica en español, sin perder la imagen direccional del hebreo.
- source_word: הַגְּבוּל
  english_pob_choice: the border
  chosen_spanish: el límite
  alternatives_spanish:
  - la frontera
  - el borde
  lexicon: HALOT
  rationale: Aquí se trata del límite territorial de la heredad, no de una frontera política moderna. «Límite» conserva el valor geográfico y suena natural en español bíblico contemporáneo.
- source_word: הַיָּמָּה
  english_pob_choice: westward
  chosen_spanish: hacia el occidente
  alternatives_spanish:
  - hacia el mar
  - mar adentro
  lexicon: HALOT
  rationale: El hebreo usa una locución direccional basada en «mar», pero el sentido geográfico es «hacia el oeste». En el texto principal se expresa el sentido; la nota preserva la literalidad idiomática.
- source_word: הַמִּכְמְתָת
  english_pob_choice: Michmethath
  chosen_spanish: Michmetat
  alternatives_spanish:
  - Mikmetat
  lexicon: HALOT
  rationale: Es un topónimo y debe transliterarse. Se adapta a una forma española legible, sin añadir vocales o letras no sustentadas por el hebreo.
- source_word: מִצָּפוֹן
  english_pob_choice: on the north
  chosen_spanish: al norte
  alternatives_spanish:
  - del norte
  - hacia el norte
  lexicon: HALOT
  rationale: La expresión ubica Michmetat en el lado norte dentro de la descripción de la frontera. «Al norte» es idiomático y conserva la función localizadora.
- source_word: וְנָסַב
  english_pob_choice: turned
  chosen_spanish: dio vuelta
  alternatives_spanish:
  - giró
  - rodeó
  lexicon: HALOT
  rationale: En contextos de demarcación, נסב indica un cambio de dirección de la línea. «Dio vuelta» mantiene el movimiento de la frontera con claridad natural.
- source_word: מִזְרָחָה
  english_pob_choice: eastward
  chosen_spanish: hacia el oriente
  alternatives_spanish:
  - al oriente
  - hacia el este
  lexicon: HALOT
  rationale: El sufijo direccional apunta al oriente. «Oriente» es una opción digna y precisa; evita la oscilación entre «este» como punto cardinal y «este» como pronombre.
- source_word: תַּאֲנַת שִׁלֹה
  english_pob_choice: Taanath-shiloh
  chosen_spanish: Taanat-Silo
  alternatives_spanish:
  - Taanat-Siló
  - Taanat-Siloé
  lexicon: HALOT
  rationale: Se trata de un nombre propio compuesto. «Silo» sigue la forma habitual en español para שִׁלֹה; se evita añadir acento no requerido por la transliteración base.
- source_word: וְעָבַר
  english_pob_choice: passed it
  chosen_spanish: la pasó
  alternatives_spanish:
  - la cruzó
  - pasó por ella
  lexicon: HALOT
  rationale: En listas de límites, עבר indica que la línea continuó más allá del punto nombrado. «La pasó» refleja la relación con el lugar mencionado sin introducir un «by» interpretativo.
- source_word: אוֹתוֹ
  english_pob_choice: it
  chosen_spanish: la
  alternatives_spanish:
  - lo
  lexicon: HALOT
  rationale: Aunque el hebreo usa un pronombre masculino gramatical, en español el referente inmediato es un topónimo femenino implícito por «Taanat». Por eso se traduce con concordancia referencial natural en español.
- source_word: מִמִּזְרַח
  english_pob_choice: on the east
  chosen_spanish: al oriente
  alternatives_spanish:
  - al este
  - desde el oriente
  lexicon: HALOT
  rationale: La frase sitúa el trayecto del límite respecto del lugar nombrado. «Al oriente» mantiene el valor relacional y es consistente con la dirección ya usada en la cláusula previa.
- source_word: יָנוֹחָה
  english_pob_choice: Janoah
  chosen_spanish: Janoa
  alternatives_spanish:
  - Yanoa
  lexicon: HALOT
  rationale: Topónimo transliterado. «Janoa» es la forma española más clara y establecida, y conserva la referencia geográfica sin sobreinterpretación.
translation_notes:
  revision_awareness: 'La redacción inglesa auditada fue revisada para quitar «by» en «passed it on the east», haciendo más directo el reflejo del hebreo. La versión española sigue esa línea: usa una relación directa («la pasó al oriente») sin expandirla con preposiciones añadidas que suavicen en exceso el verbo עבר.'
  spanish_consistency_notes:
  - Se mantiene «límite» para גְּבוּל, en coherencia con textos de repartición territorial de Josué.
  - Se usa «hacia el occidente / hacia el oriente» para las direcciones, preservando la claridad geográfica y evitando ambigüedad con usos litúrgicos tradicionales.
  - Los nombres propios se transliteran de forma sobria y legible en español, sin intentar armonizarlos artificialmente con formas castellanas eclesiásticas si ello oscurece el hebreo.
