translation:
  language: es
  text: Y el rey Salomón fue rey sobre todo Israel.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: וַיְהִי
  english_pob_choice: Now ... was
  chosen_spanish: Ahora ... era
  alternatives_spanish:
  - Y fue
  - Y aconteció
  lexicon: HALOT
  rationale: En este arranque narrativo, וַיְהִי funciona como transición discursiva. «Ahora» conserva ese giro introductorio en español natural; «era» refleja la predicación con el verbo ser, sin convertir el hebreo en una paráfrasis verbal más libre.
- source_word: הַמֶּלֶךְ
  english_pob_choice: King
  chosen_spanish: el rey
  alternatives_spanish:
  - rey
  lexicon: HALOT
  rationale: 'El sustantivo con artículo antes del nombre propio funciona como aposición titulada: «el rey Salomón». En español se mantiene el artículo por naturalidad y fidelidad sintáctica.'
- source_word: שְׁלֹמֹה
  english_pob_choice: Solomon
  chosen_spanish: Salomón
  alternatives_spanish:
  - Salmón
  lexicon: transliteration standard
  rationale: Se usa la forma habitual española del nombre propio, conforme a la práctica de transliterar nombres bíblicos en vez de traducirlos.
- source_word: מֶלֶךְ
  english_pob_choice: was king
  chosen_spanish: era rey
  alternatives_spanish:
  - reinaba
  - fue rey
  lexicon: HALOT
  rationale: La segunda ocurrencia de מלך es predicativa y expresa el estado real de Salomón sobre Israel. «Era rey» preserva la estructura nominal del hebreo y suena natural en español; «reinaba» desplaza el énfasis hacia la acción verbal.
- source_word: עַל
  english_pob_choice: over
  chosen_spanish: sobre
  alternatives_spanish:
  - encima de
  lexicon: HALOT
  rationale: En contexto real y gubernativo, על indica autoridad sobre un pueblo. «Sobre» es el equivalente español más directo y idiomático.
- source_word: כָּל
  english_pob_choice: all
  chosen_spanish: todo
  alternatives_spanish:
  - la totalidad de
  lexicon: HALOT
  rationale: 'El cuantificador expresa integridad colectiva: todo Israel bajo el reinado de Salomón.'
- source_word: יִשְׂרָאֵל
  english_pob_choice: Israel
  chosen_spanish: Israel
  alternatives_spanish:
  - el pueblo de Israel
  lexicon: standard national name
  rationale: Se conserva el nombre nacional estándar sin expandirlo, porque el hebreo simplemente designa al colectivo nacional.
theological_decisions:
- issue: Duplicación de מלך en la frase
  english_pob_reading: 'Retain the emphasis by translating both occurrences: ''King Solomon was king over all Israel.'''
  chosen_spanish_reading: '«el rey Salomón era rey sobre todo Israel» conserva ambos valores de מלך: título y predicado.'
  alternative_spanish_readings:
  - «Salomón reinó sobre todo Israel»
  - «El rey Salomón reinaba sobre todo Israel»
  rationale: El hebreo repite מלך de manera intencional, primero como título/aposición y luego como predicado. La versión española retiene esa duplicación para no borrar el énfasis del texto fuente ni sustituirlo por una formulación más interpretativa.
  doctrine_reference: Translation philosophy §5 (consistency of key terms, or documented exception)
translation_notes:
  revision_awareness: 'Coincide con el pasaje auditado en el contexto inglés: no se introducen notas ni variantes textuales, y se mantiene la repetición de מלך como rasgo estilístico y semántico del hebreo.'
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando el texto fuente lo requiera; este verso no contiene el tetragrámaton.
  - Se conserva «rey» y «era rey» para reflejar la estructura nominal del hebreo.
  - No se añade puntuación explicativa innecesaria, porque el verso es sintácticamente simple y directo.
