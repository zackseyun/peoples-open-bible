translation:
  language: es
  text: ¿Por qué te abates, oh mi alma, y por qué te turbas dentro de mí? Espera en Dios, porque todavía lo alabaré, la salvación de mi rostro[a] y mi Dios.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «la ayuda de mi rostro y mi Dios»; el hebreo dice literalmente «salvaciones de mi rostro y mi Dios», una expresión que probablemente se refiere a Dios como quien restaura el semblante abatido del salmista.
    reason: lexical_alternative
lexical_decisions:
- source_word: תִּשְׁתּוֹחֲחִי
  english_pob_choice: are you cast down
  chosen_spanish: te abates
  alternatives_spanish:
  - te inclinas
  - te deprimes
  - estás abatida
  lexicon: HALOT
  rationale: El verbo expresa estar encorvado, deprimido o abatido. «Te abates» conserva la imagen de descenso interior y suena natural en español bíblico moderno sin suavizar la fuerza del lamento.
- source_word: נַפְשִׁי
  english_pob_choice: my soul
  chosen_spanish: mi alma
  alternatives_spanish:
  - mi ser
  - mi vida
  - mi interior
  lexicon: HALOT
  rationale: En los Salmos, נפש suele referirse al yo interior. «Mi alma» preserva el auto-reproche poético y la resonancia tradicional, y es claro en español eclesial.
- source_word: תֶּהֱמִי
  english_pob_choice: are you in turmoil
  chosen_spanish: te turbas
  alternatives_spanish:
  - te agitas
  - estás en tumulto
  - te inquietas
  lexicon: HALOT
  rationale: El verbo comunica agitación o conmoción interior. «Te turbas» transmite bien la inquietud interna en un español natural y digno.
- source_word: עָלַי
  english_pob_choice: within me
  chosen_spanish: dentro de mí
  alternatives_spanish:
  - sobre mí
  - en mí
  lexicon: HALOT
  rationale: Aunque literalmente es «sobre mí», el contexto introspectivo señala agitación interior. «Dentro de mí» comunica la fuerza idiomática sin perder la referencia a la esfera personal.
- source_word: הוֹחִילִי
  english_pob_choice: Hope
  chosen_spanish: Espera
  alternatives_spanish:
  - Ten esperanza
  - Espera confiadamente
  - Pon tu esperanza
  lexicon: HALOT
  rationale: La forma imperativa llama al alma a una espera confiada en Dios. «Espera» es breve, bíblico y suficientemente amplio para la expectativa paciente implicada.
- source_word: לֵאלֹהִים
  english_pob_choice: in God
  chosen_spanish: en Dios
  alternatives_spanish:
  - para Dios
  - hacia Dios
  lexicon: HALOT
  rationale: Con este verbo, el sentido apunta al objeto de la esperanza. «En Dios» es la equivalencia idiomática normal en español.
- source_word: עוֹד
  english_pob_choice: yet
  chosen_spanish: todavía
  alternatives_spanish:
  - aún
  - otra vez
  lexicon: HALOT
  rationale: El adverbio marca continuidad futura a pesar de la aflicción presente. «Todavía» conserva ese matiz adversativo-futuro en español.
- source_word: אוֹדֶנּוּ
  english_pob_choice: I will yet praise him
  chosen_spanish: lo alabaré
  alternatives_spanish:
  - le daré gracias
  - lo celebraré
  lexicon: HALOT
  rationale: La forma en hiphil de ידה suele significar alabar o dar gracias. En este contexto de adoración, «alabaré» es la opción más natural y fiel.
- source_word: יְשׁוּעוֹת
  english_pob_choice: the salvation
  chosen_spanish: la salvación
  alternatives_spanish:
  - la ayuda
  - los actos de salvación
  - las victorias
  lexicon: HALOT
  rationale: El plural puede funcionar como plural intensivo o abstracto. En español, el singular «la salvación» comunica con claridad la acción salvadora de Dios sin perder el valor colectivo del hebreo.
- source_word: פָּנַי
  english_pob_choice: my face
  chosen_spanish: mi rostro
  alternatives_spanish:
  - mi faz
  - mi semblante
  - mi cara
  lexicon: HALOT
  rationale: El hebreo dice literalmente «mi rostro». «Rostro» mantiene la imagen concreta y es más solemne y publicable que «cara» en este registro.
- source_word: וֵאלֹהָי
  english_pob_choice: and my God
  chosen_spanish: y mi Dios
  alternatives_spanish:
  - e mi Dios
  - y Dios mío
  lexicon: HALOT
  rationale: La conjunción es aditiva y simple. «Y mi Dios» conserva el paralelismo final del hebreo.
theological_decisions:
- issue: Interpretación de יְשׁוּעוֹת פָּנַי
  english_pob_reading: the salvation of my countenance / the help of my countenance
  chosen_spanish_reading: la salvación de mi rostro
  alternative_spanish_readings:
  - la ayuda de mi rostro
  - la salvación de mi semblante
  - mi salvación y mi Dios
  rationale: 'El hebreo presenta una expresión difícil: literalmente «salvaciones de mi rostro y mi Dios». En lugar de resolverla con una paráfrasis que borre la tensión, la versión española conserva la imagen. «De mi rostro» mantiene el vínculo con la restauración del semblante abatido del salmista, dejando abierta la misma ambigüedad controlada que el texto fuente.'
  doctrine_reference: 'Translation philosophy #3: preservar la tensión teológica en vez de resolverla por paráfrasis.'
translation_notes:
  revision_awareness: El audit trail inglés pasó de una traducción muy literal de יְשׁוּעוֹת פָּנַי («the salvation of my face») a una formulación más idiomática («the salvation of my countenance»). En español, se mantuvo la imagen concreta con «mi rostro», porque «semblante» o «rostro» siguen siendo naturales y la versión podía conservar mejor la tensión del hebreo sin volverse opaca. Se evitó «ayuda» en el texto principal porque desplaza el valor lexical de יְשׁוּעוֹת, aunque se reconoce como alternativa válida en la nota.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como designación del nombre divino en el proyecto, pero aquí el hebreo usa אֱלֹהִים, por lo que corresponde «Dios».
  - «Mi alma» conserva la auto-interpelación poética y evita reducir נפש a un mero estado emocional.
  - «Todavía lo alabaré» refleja la esperanza futura de עוֹד + אוֹדֶנּוּ sin introducir un matiz ajeno de simple repetición.
