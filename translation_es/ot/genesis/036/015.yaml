translation:
  language: es
  text: 'Estos son los jefes[a] de los hijos de Esaú: los hijos de Elifaz, primogénito de Esaú: jefe Temán, jefe Omar, jefe Zefo, jefe Kenaz.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «caudillos de clan» para el título אַלּוּף; «jefes» conserva bien la función titular en español actual.
    reason: lexical_alternative
lexical_decisions:
- source_word: אַלּוּפֵי / אַלּוּף
  english_pob_choice: chiefs / Chief
  chosen_spanish: jefes / jefe
  alternatives_spanish:
  - caudillos
  - líderes de clan
  - duques
  lexicon: HALOT
  rationale: En estos listados genealógicos de Edom, אַלּוּף designa un jefe o caudillo de clan. «Jefes» conserva la función titular con español natural y evita «duques», que sería histórico pero menos transparente.
- source_word: בְנֵי
  english_pob_choice: sons of
  chosen_spanish: hijos de
  alternatives_spanish:
  - descendientes de
  - hijos/descendientes de
  lexicon: HALOT
  rationale: El hebreo dice literalmente «hijos de». En una genealogía, «hijos de» es fiel y claro en español; «descendientes de» explicita el sentido, pero se aparta más del giro del texto.
- source_word: בְּכוֹר
  english_pob_choice: firstborn
  chosen_spanish: primogénito
  alternatives_spanish:
  - primero nacido
  - hijo mayor
  lexicon: HALOT
  rationale: «Primogénito» reproduce el valor de nacimiento y estatus implicado por בְּכוֹר con un registro bíblico natural en español.
- source_word: אֵלֶּה
  english_pob_choice: These are
  chosen_spanish: Estos son
  alternatives_spanish:
  - Éstos son
  - Estas son
  lexicon: HALOT
  rationale: La fórmula introductoria sin verbo se vierte naturalmente como «Estos son» en una enumeración genealógica.
- source_word: עֵשָׂו
  english_pob_choice: Esau
  chosen_spanish: Esaú
  alternatives_spanish:
  - Esaú
  lexicon: N/A nombre propio
  rationale: Se conserva la transliteración estándar en español bíblico «Esaú».
- source_word: אֱלִיפַז
  english_pob_choice: Eliphaz
  chosen_spanish: Elifaz
  alternatives_spanish:
  - Elifaz
  lexicon: N/A nombre propio
  rationale: Se usa la forma habitual en español bíblico «Elifaz».
- source_word: תֵּימָן
  english_pob_choice: Teman
  chosen_spanish: Temán
  alternatives_spanish:
  - Teman
  lexicon: N/A nombre propio
  rationale: Se mantiene el nombre propio en su forma usual en español, con tilde por acentuación natural.
- source_word: אוֹמָר
  english_pob_choice: Omar
  chosen_spanish: Omar
  alternatives_spanish:
  - Omar
  lexicon: N/A nombre propio
  rationale: Nombre propio transliterado de forma directa y reconocible.
- source_word: צְפוֹ
  english_pob_choice: Zepho
  chosen_spanish: Zefo
  alternatives_spanish:
  - Zefo
  - Zefo
  lexicon: HALOT / convención onomástica
  rationale: La forma hebrea se representa en español de modo más transparente como «Zefo»; esto conserva la consonancia general del nombre sin depender del molde inglés «Zepho».
- source_word: קְנַז
  english_pob_choice: Kenaz
  chosen_spanish: Quenaz
  alternatives_spanish:
  - Kenaz
  lexicon: N/A nombre propio
  rationale: Se adapta la grafía a la ortografía española con «Qu-» ante /k/ inicial antes de e, para una lectura más natural en español, manteniendo el nombre propio bíblico.
translation_notes:
  revision_awareness: El inglés auditado fue ajustado para reflejar la pausa hebrea con dos segmentos unidos por dos puntos. En español se conserva esa relación discursiva con una sola oración y dos puntos tras «Esaú», manteniendo el encabezado genealógico y la lista subordinada de los hijos de Elifaz.
  spanish_consistency_notes:
  - Se mantiene «Esaú» como forma estándar española para el nombre propio.
  - 'Se prefieren nombres bíblicos habituales en español cuando son bien establecidos: Elifaz, Temán, Omar, Zefo, Quenaz.'
  - «Jefes/jefe» traduce consistentemente אַלּוּפֵי / אַלּוּף en este contexto edomita.
  - La puntuación usa dos puntos para respetar la dependencia sintáctica observada en el hebreo y en la revisión inglesa.
