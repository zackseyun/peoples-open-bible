  rationale: Se conserva el texto principal casi intacto porque refleja fielmente el hebreo y la auditoría inglesa. Solo se corrige la ubicación del marcador [a] para que quede anclado en «el lugar de David», que es la frase a la que realmente corresponde la alternativa léxica, y se ajusta la nota para representar mejor la alternativa documentada («was missing») sin perder la explicación contextual.
