review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien el sentido básico del hebreo: José tuvo/soñó un sueño, lo contó a sus hermanos, y su odio aumentó. Sin embargo, la combinación de texto principal y nota al pie no preserva coherentemente la decisión auditada del POB inglés sobre la construcción cognada. El inglés mantiene literalmente ''dreamed a dream'' en el texto principal y usa nota para explicitar que es literal hebreo; en español, ''soñó un sueño'' suena forzado en texto corrido. Conviene usar la forma idiomática española ''tuvo un sueño'' en el texto principal y reservar la literalidad hebrea para la nota.'
  spanish_quality_summary: El español es claro y legible, pero 'Ahora José soñó un sueño' suena poco natural en español bíblico contemporáneo. 'Ahora' también es menos idiomático que 'Entonces' o simplemente omitir el marcador; como equivalente discursivo de waw narrativa en este contexto, 'Entonces' fluye mejor. El resto ('se lo contó a sus hermanos', 'lo odiaron todavía más') es natural y fiel.
  glossary_alignment: No hay términos teológicos de glosario mayor en este versículo. 'José', 'hermanos' y 'odiaron' están bien. La revisión propuesta mejora la correspondencia entre la decisión léxica documentada y el español idiomático sin afectar terminología del proyecto.
  issues:
  - severity: medium
    issue: La construcción 'soñó un sueño' es demasiado calcada en el texto principal.
    rationale: Aunque refleja el hebreo חָלַם חֲלוֹם, en español suena rígida. Dado que la nota ya puede preservar la construcción literal, el texto principal debe preferir una forma idiomática como 'tuvo un sueño'.
  - severity: low
    issue: El marcador discursivo 'Ahora' no es la mejor opción narrativa en español para este contexto.
    rationale: '''Ahora'' puede sonar deíctico o contrastivo; ''Entonces'' encaja mejor como avance narrativo de waw en relato bíblico.'
  - severity: low
    issue: La nota al pie actual duplica exactamente el texto principal en vez de ofrecer una alternativa significativa.
    rationale: 'Si el texto principal permanece ''soñó un sueño'', la nota ''Hebreo literalmente: «José soñó un sueño»'' no añade información útil. La nota debe conservar la literalidad solo si el texto principal se vuelve idiomático.'
  revised_spanish_text: Entonces José tuvo un sueño[a], y se lo contó a sus hermanos, y ellos lo odiaron todavía más.
  revised_footnotes:
