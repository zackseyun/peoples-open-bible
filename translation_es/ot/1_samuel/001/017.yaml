translation:
  language: es
  text: 'Entonces Elí respondió y dijo[a]: «Ve en paz, y que el Dios de Israel conceda tu petición[b] que le has pedido».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «contestó». El hebreo usa un verbo de respuesta en diálogo.
    reason: lexical_alternative
  - marker: b
    text: O «tu solicitud». El término hebreo se refiere a lo pedido en oración.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּעַן
  english_pob_choice: answered
  chosen_spanish: respondió
  alternatives_spanish:
  - contestó
  - respondió y dijo
  lexicon: HALOT
  rationale: ענה en este contexto introduce la réplica de Elí en un diálogo. «Respondió» es natural en español y conserva el valor narrativo de contestación sin añadir matices innecesarios.
- source_word: וַיֹּאמֶר
  english_pob_choice: said
  chosen_spanish: dijo
  alternatives_spanish:
  - habló
  - dijo y
  lexicon: HALOT
  rationale: אמר es el verbo común de habla. «Dijo» mantiene el registro directo y sobrio del relato.
- source_word: לְכִי
  english_pob_choice: Go
  chosen_spanish: Ve
  alternatives_spanish:
  - Anda
  - Sal
  lexicon: HALOT
  rationale: Es el imperativo femenino singular de הלך dirigido a Ana. «Ve» es la equivalencia directa y natural en español.
- source_word: לְשָׁלוֹם
  english_pob_choice: in peace
  chosen_spanish: en paz
  alternatives_spanish:
  - pacíficamente
  - con paz
  lexicon: HALOT
  rationale: La fórmula idiomática לְשָׁלוֹם se expresa de forma más natural en español como «en paz», manteniendo el sentido de bendición y bienestar.
- source_word: וֵאלֹהֵי יִשְׂרָאֵל
  english_pob_choice: the God of Israel
  chosen_spanish: el Dios de Israel
  alternatives_spanish:
  - Dios de Israel
  lexicon: HALOT
  rationale: La construcción de estado constructo nombra al Dios de Israel. «El Dios de Israel» preserva el referente divino sin recurrir a una paráfrasis.
- source_word: יִתֵּן
  english_pob_choice: may ... grant
  chosen_spanish: conceda
  alternatives_spanish:
  - dé
  - otorgue
  lexicon: HALOT
  rationale: En contexto de bendición y deseo, נתן funciona con fuerza volitiva. «Conceda» comunica bien la idea de conceder una petición en español.
- source_word: שֵׁלָתֵךְ
  english_pob_choice: your petition
  chosen_spanish: tu petición
  alternatives_spanish:
  - tu ruego
  - tu solicitud
  lexicon: HALOT
  rationale: שֵׁלָה/שְׁאֵלָה aquí se refiere a lo pedido en oración. «Petición» conserva el tono formal y devocional del hebreo y del POB inglés.
- source_word: אֲשֶׁר שָׁאַלְתְּ
  english_pob_choice: that you have asked
  chosen_spanish: que has pedido
  alternatives_spanish:
  - que pediste
  - que has solicitado
  lexicon: HALOT
  rationale: El relativo modifica «petición». «Has pedido» refleja una acción pasada con relevancia presente y funciona de modo natural en español.
- source_word: מֵעִמּוֹ
  english_pob_choice: from him
  chosen_spanish: de él
  alternatives_spanish:
  - de parte de él
  - de su parte
  lexicon: HALOT
  rationale: El pronombre se entiende por el contexto como referido a Dios. «De él» preserva esa referencia y evita una expansión explicativa innecesaria.
theological_decisions:
- issue: Referencia del pronombre en מֵעִמּוֹ
  english_pob_reading: The pronoun refers to God, not Eli.
  chosen_spanish_reading: El pronombre se refiere a Dios, no a Elí.
  alternative_spanish_readings:
  - El pronombre podría quedar ambiguo si se traduce de forma más literal sin contexto.
  - Podría explicitarse 'de parte de Dios'.
  rationale: El contexto inmediato ya ha situado la súplica delante de Yahvé; por eso la bendición de Elí naturalmente apunta a Dios. Mantener «de él» conserva el pronombre sin borrar la claridad contextual.
  doctrine_reference: Preservar la referencia contextual sin artificializar una ambigüedad no necesaria.
translation_notes:
  revision_awareness: La versión inglesa auditada quedó estable sin cambios en la última revisión, con acuerdo alto entre revisores; esta propuesta sigue esa lectura y traslada sus decisiones léxicas al español sin introducir reinterpretaciones.
  spanish_consistency_notes:
  - Se mantuvo «Dios» para אֱלֹהִים y no se usó «SEÑOR» como máscara del nombre divino, conforme a la política del proyecto.
  - Se optó por «petición» para reflejar el campo semántico de lo pedido en oración, coherente con la nota inglesa.
  - Se conservó el tono de bendición breve y directo del hebreo, evitando amplificación estilística.
  - El pronombre final se dejó como «de él» para respetar la referencia contextual a Dios sin sobredeterminarla.
