base_translation:
  language: en
  yaml_path: translation/ot/isaiah/064/004.yaml
  text: You meet the one who gladly does righteousness[a], those who remember you in your ways. Behold, you were angry, and we sinned; in them we have been a long time[b], and shall we be saved?
  footnotes:
  - marker: a
    text: Or 'You meet the one who rejoices and does righteousness.' The Hebrew participles can be taken together as describing the person God receives favorably.
    reason: lexical_alternative
  - marker: b
    text: The clause 'in them for a long time—and shall we be saved?' is textually and syntactically difficult. Alternatives include 'in them is continuance, and we shall be saved' or 'we have been in them a long time, and shall we be saved?'
    reason: alternative_reading
