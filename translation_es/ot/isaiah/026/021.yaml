translation:
  language: es
  text: Porque he aquí[a] Yahvé sale de su lugar para castigar la iniquidad del habitante de la tierra[c] sobre él[b], y la tierra descubrirá su sangre[d] y no cubrirá más a sus caídos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «Miren». El hebreo usa una partícula de atención que introduce la declaración con viveza solemne.
    reason: lexical_alternative
  - marker: b
    text: O «para pedir cuentas por la iniquidad del habitante de la tierra contra él». La expresión hebrea es compacta y puede traducirse de manera más formal que en el texto principal.
    reason: lexical_alternative
  - marker: c
    text: «Tierra» también puede traducirse «land»/«país» en hebreo, pero aquí el contexto más amplio de juicio favorece «tierra».
    reason: lexical_alternative
  - marker: d
    text: 'Hebreo: «sus sangres», un plural que puede referirse a sangre derramada o a culpa de sangre.'
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Ya que
  lexicon: HALOT
  rationale: Conserva la conexión explicativa o causal del hebreo al inicio del versículo. «Porque» es claro en español y mantiene el enlace con el contexto anterior.
- source_word: הִנֵּה
  english_pob_choice: behold
  chosen_spanish: he aquí
  alternatives_spanish:
  - miren
  - vean
  lexicon: HALOT
  rationale: Es una fórmula reverencial y vívida que reproduce la función deíctica del hebreo sin perder tono bíblico.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: Se sigue el valor propio del nombre divino en la línea editorial del proyecto, preservando el Tetragrámaton en lugar de ocultarlo con un sustituto.
- source_word: יֹצֵא מִמְּקוֹמוֹ
  english_pob_choice: is coming out from his place
  chosen_spanish: sale de su lugar
  alternatives_spanish:
  - está saliendo de su lugar
  - sale desde su lugar
  lexicon: HALOT
  rationale: El participio expresa una acción inminente o en curso; en español, «sale» mantiene la imagen concreta y resulta natural sin añadir matices no presentes.
- source_word: לִפְקֹד
  english_pob_choice: to punish
  chosen_spanish: para castigar
  alternatives_spanish:
  - para pedir cuentas
  - para tomar en cuenta
  lexicon: HALOT
  rationale: En contexto judicial, פקד puede significar visitar con castigo o llamar a cuentas. «Castigar» comunica bien la fuerza judicial que el POB inglés explicitó con «punish».
- source_word: עֲוֺן
  english_pob_choice: iniquity
  chosen_spanish: iniquidad
  alternatives_spanish:
  - culpa
  - pecado
  lexicon: HALOT
  rationale: «Iniquidad» conserva el peso moral y judicial de עוון mejor que opciones más generales o menos solemnes.
- source_word: יֹשֵׁב הָאָרֶץ
  english_pob_choice: the inhabitant of the earth
  chosen_spanish: el habitante de la tierra
  alternatives_spanish:
  - el que habita la tierra
  - los habitantes de la tierra
  lexicon: HALOT
  rationale: Se mantiene el singular del participio y la imagen de un único habitante genérico. «Tierra» sigue la lectura contextual amplia del POB inglés, sin forzar «país».
- source_word: עָלָיו
  english_pob_choice: upon him
  chosen_spanish: sobre él
  alternatives_spanish:
  - contra él
  - sobre aquel
  lexicon: HALOT
  rationale: Retiene la relación preposicional del hebreo con una formulación española natural. «Sobre él» deja abierta la tensión entre carga/recambio de castigo y dirección del juicio.
- source_word: וְגִלְּתָה הָאָרֶץ
  english_pob_choice: and the earth will uncover
  chosen_spanish: y la tierra descubrirá
  alternatives_spanish:
  - y la tierra destapará
  - y la tierra pondrá al descubierto
  lexicon: HALOT
  rationale: גלה tiene el sentido concreto de quitar cobertura o revelar lo oculto; «descubrirá» funciona bien en español y conserva el valor imagístico.
- source_word: אֶת דָּמֶיהָ
  english_pob_choice: her blood
  chosen_spanish: su sangre
  alternatives_spanish:
  - sus sangres
  - la sangre derramada en ella
  - su sangre derramada
  lexicon: HALOT
  rationale: El hebreo usa plural «sangres», que puede implicar sangre derramada o culpa de sangre. En español, el singular «su sangre» es más idiomático y mantiene la imagen principal; la tensión del plural se documenta en nota.
- source_word: וְלֹא תְכַסֶּה עוֹד
  english_pob_choice: and will no longer cover
  chosen_spanish: y no cubrirá más
  alternatives_spanish:
  - y no volverá a cubrir
  - y ya no ocultará
  lexicon: HALOT
  rationale: Expresa la cesación de la ocultación previa con un futuro simple natural en español.
- source_word: עַל הֲרוּגֶיהָ
  english_pob_choice: her slain
  chosen_spanish: a sus muertos
  alternatives_spanish:
  - a los que han sido muertos
  - a sus asesinados
  lexicon: HALOT
  rationale: El participio pasivo se refiere a los que fueron muertos. «Muertos» conserva brevedad poética en español; «a» refleja el objeto verbal de «cubrir» en una construcción idiomática.
theological_decisions:
- issue: Nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: Se preserva el nombre del pacto tal como lo identifica la línea editorial del proyecto, evitando la sustitución litúrgica que lo enmascara.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Alcance de הָאָרֶץ
  english_pob_reading: earth
  chosen_spanish_reading: la tierra
  alternative_spanish_readings:
  - el país
  - el mundo
  rationale: El contexto de juicio y exposición de sangre favorece una lectura amplia, pero en español «tierra» sigue siendo suficientemente amplio y mantiene la imagen del hebreo sin cerrar innecesariamente la referencia.
  doctrine_reference: DOCTRINE.md Translation philosophy §1, original-language primacy and contextual sense
- issue: Valor de דָּמֶיהָ
  english_pob_reading: her blood / bloods
  chosen_spanish_reading: su sangre
  alternative_spanish_readings:
  - sus sangres
  - su sangre derramada
  - su sangre y su culpa de sangre
  rationale: Se evita una calca extraña en español, pero se conserva la tensión del plural hebreo en la nota textual para no borrar la posibilidad de sangre derramada o sangre culpable.
  doctrine_reference: DOCTRINE.md Translation philosophy §1, lexical precision and auditable tension
translation_notes:
  revision_awareness: El borrador sigue de cerca la última revisión inglesa que prefirió un registro más formal en la partícula de atención («behold»). También conserva las decisiones auditadas del POB sobre el valor judicial de פקד, el sentido amplio de ארץ y la tensión del plural hebreo de דם, expresándolos de manera natural en español sin borrar las ambigüedades documentadas.
  spanish_consistency_notes:
  - Se mantiene Yahvé como forma del nombre divino, en coherencia con el proyecto.
  - «Tierra» conserva el valor contextual amplio sin imponer «mundo» ni «país».
  - «Castigar» refleja la fuerza judicial de לִפְקֹד en este contexto.
  - La construcción «sobre él» mantiene la tensión preposicional de עָלָיו sin normalizarla a una lectura exclusivamente idiomática.
  - «Su sangre» es idiomático en español, pero la nota documenta el plural hebreo «sangres».
