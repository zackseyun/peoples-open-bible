translation:
  language: es
  text: Dios derribó el trono de los soberbios[a], y sentó a los humildes en su lugar.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Paralelo griego: «el Señor» en vez de «Dios».'
    reason: alternative_reading
lexical_decisions:
- source_word: כִּסֵּא / θρόνους
  english_pob_choice: throne / thrones
  chosen_spanish: trono
  alternatives_spanish:
  - tronos
  - asiento
  - silla
  lexicon: HALOT; LXX θρόνος
  rationale: Aunque el hebreo es singular, la imagen es la de un poder real derribado; en español, el singular colectivo 'el trono' suena natural y fiel al sentido, y evita una pluralización innecesaria. Mantiene la fuerza simbólica de autoridad y gobierno.
- source_word: גֵאִים / ἀρχόντων
  english_pob_choice: the proud
  chosen_spanish: los soberbios
  alternatives_spanish:
  - los orgullosos
  - los arrogantes
  - los poderosos
  lexicon: HALOT; LXX ἄρχοντες
  rationale: El hebreo describe a los altivos/soberbios; 'soberbios' conserva el matiz moral. 'Poderosos' seguiría más de cerca el griego ἄρχοντες, pero el texto hebreo y el contraste con 'humildes' favorecen el campo de soberbia/arrogancia.
- source_word: הָפַך / καθεῖλεν
  english_pob_choice: overturned
  chosen_spanish: derribó
  alternatives_spanish:
  - derribó y trastornó
  - volcó
  - volteó
  lexicon: HALOT; LSJ
  rationale: El hebreo dice 'volteó/derribó'; en español, 'derribó' comunica bien la caída de un poder o trono. Evita una imagen demasiado física de 'volcar' que puede sonar extraña aplicada a un trono.
- source_word: אֱלֹהִים
  english_pob_choice: God
  chosen_spanish: Dios
  alternatives_spanish:
  - el Señor
  lexicon: HALOT
  rationale: Se conserva 'Dios' porque el hebreo atestiguado lo dice explícitamente. La variante griega 'el Señor' queda documentada en la nota, sin sustituir el testimonio principal.
- source_word: וַיֹּשֶׁב / ἐκάθισεν
  english_pob_choice: seated
  chosen_spanish: sentó
  alternatives_spanish:
  - colocó
  - hizo sentar
  - entronizó
  lexicon: HALOT; LSJ
  rationale: '''Sentó'' reproduce la acción de hacer ocupar un lugar. ''Entronizó'' sería más específico de realeza de lo que el hebreo exige, y ''hizo sentar'' es más pesado en español.'
- source_word: עֲנָוִים / πραεῖς
  english_pob_choice: the humble
  chosen_spanish: los humildes
  alternatives_spanish:
  - los mansos
  - los apacibles
  - los pobres
  lexicon: HALOT; LXX πραΰς
  rationale: '''Humildes'' sigue el hebreo עֲנָוִים y conserva el contraste moral con los soberbios. ''Mansos'' podría reflejar el griego, pero en español moderno puede perder el eje de humildad/exaltación que domina la línea.'
- source_word: תַּחְתָּם / ἀντʼ αὐτῶν
  english_pob_choice: in their place
  chosen_spanish: en su lugar
  alternatives_spanish:
  - en lugar de ellos
  - en vez de ellos
  - debajo de ellos
  lexicon: HALOT; LSJ
  rationale: La preposición hebrea literalmente sería 'debajo de ellos', pero el sentido contextual y el paralelo griego indican sustitución. 'En su lugar' es la forma más natural y fiel en español.
theological_decisions:
- issue: Divergencia entre el título divino del hebreo y el del paralelo griego
  english_pob_reading: Main text uses 'God'; footnote notes Greek parallel 'the Lord' instead of 'God'.
  chosen_spanish_reading: El texto principal dice 'Dios'; la nota indica que el paralelo griego dice 'el Señor'.
  alternative_spanish_readings:
  - el Señor
  rationale: Dado que el hebreo conservado es la testigo principal en esta sección y lee אֱלֹהִים, el texto español sigue 'Dios'. La diferencia con el griego se preserva como variante auditable, sin armonizarla artificialmente.
  doctrine_reference: 'PHILOSOPHY.md: traducir desde el hebreo cuando se conserva; el paralelo griego se usa como control y variante documentada.'
translation_notes:
  revision_awareness: La redacción española sigue la revisión más reciente que prefirió el singular 'trono' para reflejar el singular hebreo כִּסֵּא, manteniendo la imagen de autoridad derribada y la estructura de contraste con 'los humildes'.
  spanish_consistency_notes:
  - Se mantiene la terminología POB 'Dios' para אֱלֹהִים y se documenta la variante griega sin desplazar el texto principal.
  - '''Humildes'' y ''soberbios'' preservan el contraste moral del hebreo.'
  - '''En su lugar'' expresa en español la fuerza substitutiva de תַּחְתָּם sin calco duro.'
  - El singular 'trono' armoniza con el hebreo singular y sigue siendo idiomático en español.
