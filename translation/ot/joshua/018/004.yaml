id: JOS.18.4
reference: Joshua 18:4
source:
  edition: WLC
  text: הָב֥וּ לָ/כֶ֛ם שְׁלֹשָׁ֥ה אֲנָשִׁ֖ים לַ/שָּׁ֑בֶט וְ/אֶשְׁלָחֵ֗/ם וְ/יָקֻ֜מוּ וְ/יִֽתְהַלְּכ֥וּ בָ/אָ֛רֶץ וְ/יִכְתְּב֥וּ אוֹתָ֛/הּ לְ/פִ֥י נַֽחֲלָתָ֖/ם וְ/יָבֹ֥אוּ אֵלָֽ/י׃
translation:
  text: Provide for yourselves three men from each tribe[a], and I will send them out; they shall arise and walk through the land and write it down according to their inheritance[b], and they shall come to me.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'appoint for yourselves three men per tribe.'
    reason: lexical_alternative
  - marker: b
    text: That is, they were to record the land in relation to the inheritance allotments.
    reason: cultural_note
lexical_decisions:
- source_word: הָבוּ
  chosen: Provide
  alternatives:
  - Give
  - Appoint
  lexicon: HALOT
  rationale: Imperative plural of יהב/הב in this context calls for supplying or appointing persons. 'Provide' fits the idiom 'for yourselves three men' better than the more wooden 'give,' while still staying close to the source.
- source_word: לָכֶם
  chosen: for yourselves
  alternatives:
  - for you
  lexicon: HALOT
  rationale: 'The preposition plus 2mp pronoun has a reflexive/pragmatic force in English here: the hearers are to furnish the men from among themselves.'
- source_word: שְׁלֹשָׁה אֲנָשִׁים
  chosen: three men
  alternatives:
  - three persons
  lexicon: HALOT
  rationale: The Hebrew is explicitly masculine and refers to male representatives. Per gender-accurate philosophy, 'men' is preferred over a neutral term.
- source_word: לַשָּׁבֶט
  chosen: from each tribe
  alternatives:
  - for the tribe
  - per tribe
  lexicon: HALOT
  rationale: Although formally singular with article, in distributive context it means one set for each tribe. English idiom requires making the distributive sense explicit.
- source_word: וְאֶשְׁלָחֵם
  chosen: and I will send them out
  alternatives:
  - and I will send them
  lexicon: HALOT
  rationale: The verb שלח means 'send'; 'send them out' naturally conveys dispatching them on a mission without adding content beyond the context.
- source_word: וְיָקֻמוּ
  chosen: they shall arise
  alternatives:
  - they shall set out
  - they shall get up
  lexicon: HALOT
  rationale: The verb קום is literally 'arise.' Here it introduces the next actions. 'Arise' preserves the Hebrew sequence; the more idiomatic 'set out' is possible but slightly interpretive.
- source_word: וְיִתְהַלְּכוּ בָאָרֶץ
  chosen: and walk through the land
  alternatives:
  - and go about in the land
  - and travel through the land
  lexicon: HALOT
  rationale: The hitpael of הלך conveys moving about/traversing. 'Walk through the land' is natural and retains the exploratory sense.
- source_word: וְיִכְתְּבוּ אֹתָהּ
  chosen: and write a description of it
  alternatives:
  - and write it
  - and record it
  lexicon: HALOT
  rationale: The object pronoun refers to the land, and in context of surveying territory the sense is to write down its description or survey. English needs the implied object made explicit for clarity.
- source_word: לְפִי נַחֲלָתָם
  chosen: according to their inheritance
  alternatives:
  - according to its inheritance divisions
  - in proportion to their inheritance
  lexicon: HALOT
  rationale: Literally 'according to the mouth of their inheritance,' an idiom meaning in accordance with the inheritance allotments/divisions. 'According to their inheritance' is concise and faithful, with the plural pronoun reflecting the tribes represented.
- source_word: וְיָבֹאוּ אֵלַי
  chosen: and they shall come to me
  alternatives:
  - and return to me
  lexicon: HALOT
  rationale: The Hebrew says simply 'come to me.' 'Return' is contextually true but not explicit, so 'come to me' is preferred.
