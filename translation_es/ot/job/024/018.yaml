revisions:
- from: Ágil es él sobre la superficie de las aguas[a]; su porción en la tierra está maldita[c][b]; no se vuelve hacia el camino de las viñas.
  to: Él es veloz sobre la superficie de las aguas[a]; la porción de ellos en la tierra está maldita[b]; no se vuelve hacia el camino de las viñas[c].
  rationale: 'La revisión corrige el punto principal de fidelidad: restituye el plural de חֶלְקָתָם en el texto principal y deja la variante singular en nota, conforme al audit trail. También mejora la naturalidad de la apertura con ‘Él es veloz’ y mantiene las alternativas léxicas y la dificultad del verso sin sobreinterpretarlo.'
