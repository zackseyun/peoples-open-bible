review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español sigue bien el sentido general del griego: un subgrupo de personas desprecia con ligereza la piedad cívica y se entrega esperando prestigio por su futura relación con el rey. Sin embargo, dos elecciones no preservan del todo el matiz fuente: ''con facilidad'' es menos adecuado que una expresión de prontitud/disposición para εὐχερῶς, y ''el rey que estaba por venir'' sugiere la llegada futura del rey mismo, cuando el griego califica la asociación/trato futuro con el rey.'
  spanish_quality_summary: El español es claro y digno, pero 'como si fueran a participar' con imperfecto 'se entregaban' produce una leve falta de cohesión aspectual, y 'la asociación con el rey que estaba por venir' suena calcado y ambiguo. Una formulación más natural y fiel en español es 'se entregaban de buena gana' y 'por el trato con el rey que habrían de tener'.
  glossary_alignment: No hay conflictos con la terminología doctrinal principal del proyecto. 'Piedad' para εὐσεβεία está bien justificado. La nota léxica sobre ἐπιβάθρας se conserva apropiadamente. No se requiere ajuste de nombres divinos ni títulos mesiánicos.
  issues:
  - severity: medium
    issue: εὐχερῶς traducido como 'con facilidad'
    rationale: El griego expresa prontitud/disposición voluntaria ('readily'), no solo facilidad. 'De buena gana' o 'prontamente' conserva mejor el matiz.
  - severity: high
    issue: '''la asociación con el rey que estaba por venir'' atribuye erróneamente el rasgo futuro al rey'
    rationale: ἐσομένης modifica συναναστροφῆς, no βασιλεῖ. El sentido es 'el trato/asociación futura con el rey', no 'el rey venidero'.
  - severity: low
    issue: '''asociación'' suena poco idiomático en este contexto'
    rationale: Aunque semánticamente defendible, en español bíblico-natural 'trato' o 'relación' comunica mejor συναναστροφή como convivencia o interacción social.
  revised_spanish_text: Pero algunos[a], despreciando superficialmente los fundamentos de la piedad de la ciudad, se entregaban de buena gana, como si fueran a participar de alguna gran fama por el trato con el rey que habrían de tener.
  revised_footnotes:
  - marker: a
    text: O 'los soportes de la piedad de la ciudad' o 'las bases de la piedad de la ciudad'. El griego usa un término metafórico para fundamentos o apoyos.
    reason: lexical_alternative
  revision_rationale: Se corrige el sintagma final para que el elemento futuro recaiga sobre el trato con el rey, como en el griego, y no sobre el rey mismo. También se reemplaza 'con facilidad' por 'de buena gana' para reflejar mejor εὐχερῶς como disposición pronta/voluntaria. 'Trato' mejora la naturalidad española para συναναστροφή sin apartarse del sentido fuente. La nota se simplifica para evitar repetir exactamente la lectura principal como alternativa.
