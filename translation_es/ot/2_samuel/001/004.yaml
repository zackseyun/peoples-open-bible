translation:
  language: es
  text: 'David le dijo[a]: «¿Qué sucedió? Por favor, dime». Y él respondió: «El pueblo huyó de la batalla, y también muchos del pueblo cayeron y murieron[b]; y Saúl y Jonatán su hijo también han muerto[c]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «¿Qué fue el asunto?». Literalmente: «¿Qué fue la cosa?».'
    reason: lexical_alternative
  - marker: b
    text: «Cayeron» es una expresión hebrea frecuente de combate para ser derribados; el verbo siguiente («murieron») hace explícito el resultado.
    reason: lexical_alternative
  - marker: c
    text: 'O: «Saúl y Jonatán su hijo también murieron».'
    reason: lexical_alternative
lexical_decisions:
- source_word: מֶה הָיָה הַדָּבָר
  english_pob_choice: What happened?
  chosen_spanish: ¿Qué sucedió?
  alternatives_spanish:
  - ¿Qué pasó?
  - ¿Qué fue el asunto?
  lexicon: HALOT
  rationale: La expresión hebrea es idiomática y, en contexto, pide el resultado de los acontecimientos. «¿Qué sucedió?» conserva el valor natural de reporte sin volver la frase pesada ni demasiado literal. «¿Qué fue el asunto?» reproduce más de cerca la literalidad, pero suena poco natural en español.
- source_word: הַגֶּד נָא לִי
  english_pob_choice: Please tell me
  chosen_spanish: Por favor, dime
  alternatives_spanish:
  - Te ruego, dime
  - Por favor, házmelo saber
  lexicon: HALOT
  rationale: El imperativo hebreo pide que se relate la noticia, y נָא añade cortesía/insistencia. «Por favor, dime» transmite ambas ideas de manera clara y natural en español.
- source_word: נָס הָעָם מִן הַמִּלְחָמָה
  english_pob_choice: The people fled from the battle
  chosen_spanish: El pueblo huyó de la batalla
  alternatives_spanish:
  - La gente huyó de la batalla
  - El pueblo escapó de la batalla
  lexicon: HALOT
  rationale: נָס significa «huir». En este contexto colectivo, הָעָם se refiere al grupo combatiente; «pueblo» preserva esa referencia grupal sin introducir una lectura militar demasiado técnica. «Huyó de la batalla» mantiene la imagen del texto.
- source_word: הַרְבֵּה נָפַל מִן הָעָם
  english_pob_choice: many of the people also fell
  chosen_spanish: muchos del pueblo cayeron
  alternatives_spanish:
  - muchos del pueblo también fueron derribados
  - muchos del pueblo también cayeron
  lexicon: HALOT
  rationale: En lenguaje de guerra, נפל conserva la imagen de «caer» con sentido de ser abatidos. Elegí «cayeron» para mantener la figura hebrea; el resultado mortal se explicita enseguida con «murieron».
- source_word: וַיָּמֻתוּ
  english_pob_choice: and died
  chosen_spanish: y murieron
  alternatives_spanish:
  - y fallecieron
  - y perecieron
  lexicon: HALOT
  rationale: El verbo añade explícitamente la muerte, así que conviene conservarlo separado de «cayeron». «Murieron» es la equivalencia directa y más transparente.
- source_word: שָׁאוּל וִיהוֹנָתָן בְּנוֹ מֵתוּ
  english_pob_choice: Saul and Jonathan his son are also dead
  chosen_spanish: Saúl y Jonatán, su hijo, también han muerto
  alternatives_spanish:
  - Saúl y Jonatán, su hijo, también murieron
  - Saúl y Jonatán, su hijo, también están muertos
  lexicon: HALOT
  rationale: El hebreo informa el hecho consumado con un perfecto plural. En español, «han muerto» comunica bien la noticia reciente y encaja con el tono de reporte. Mantengo «su hijo» porque el texto lo especifica.
translation_notes:
  revision_awareness: Se siguió de cerca el expediente auditado en inglés, manteniendo la distinción entre «cayeron» y «murieron» y conservando el énfasis narrativo del anuncio. No hubo revisiones previas aplicadas en el expediente inglés, y el consenso de revisión fue de alta concordancia.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» como norma del proyecto solo cuando corresponda; este verso no contiene el tetragrámaton.
  - Se evitó sustituir la imaginería hebrea de combate («cayeron») por una paráfrasis que la elimine.
  - «Pueblo» se usa para reflejar הָעָם como colectivo narrativo; no se restringe a una unidad militar técnica.
  - El estilo general es moderno y digno, con puntuación española y comillas angulares adaptadas al uso habitual en publicación bíblica.
