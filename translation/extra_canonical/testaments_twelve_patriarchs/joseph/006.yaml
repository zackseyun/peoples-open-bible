translation:
  text: 1 And after this she sent me food mixed with sorcery[a]. 2 But when the eunuch who was bringing it came, I looked up and saw a terrifying man handing me, together with the dish, a sword; and I understood that it was a scheme to lead me astray. 3 So after he had gone out, I ate neither that food nor any of her other foods, but wept without tasting them. 4 Then after one day she came to me, and when she recognized the food, she said to me, “Why is it that you did not eat the food?” 5 And I said to her, “Because you filled it with deadly sorcery. And how did you say, ‘I do not draw near to idols, but to the Lord alone’? 6 Know now, then, that the God of my father, through his angel, revealed your wickedness to me; and for this reason I kept it as evidence against you, to expose you, in hope that perhaps, when you saw it[b][a], you might repent.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The 'terrifying man' is not identified in the Greek text; the figure may be visionary, symbolic, or connected with the attempted sorcery.
    reason: alternative_reading
    anchor_ref: '6:2'
  - marker: a
    text: Or 'a trick' / 'a magical contrivance' for leading me astray' for the phrase rendered 'a scheme to lead me astray.'
    reason: lexical_alternative
    anchor_ref: '6:2'
  - marker: b
    text: Or 'for your reproof' / 'for your conviction' for 'as evidence against you, to expose you.'
    reason: lexical_alternative
    anchor_ref: '6:6'
lexical_decisions:
- source_word: βρῶμα
  chosen: food
  alternatives:
  - meal
  - dish
  lexicon: LSJ
  rationale: Broad term for food rather than a specific prepared dish in every occurrence; 'food' keeps the narrative plain and consistent.
- source_word: γοητεία / ἐν γοητείᾳ πεφυρμένον
  chosen: mixed with sorcery
  alternatives:
  - mixed with magic
  - drugged by enchantment
  lexicon: LSJ
  rationale: γοητεία denotes sorcery/magic arts; 'mixed with sorcery' reflects both the occult sense and the participle πεφυρμένον ('mixed, kneaded together').
- source_word: φοβερὸν ἄνδρα
  chosen: a terrifying man
  alternatives:
  - a fearful man
  - an awe-inspiring man
  lexicon: LSJ
  rationale: In context Joseph sees a threatening figure associated with danger and deception; 'terrifying' best conveys the ominous force of φοβερός.
- source_word: τρύβλιον
  chosen: dish
  alternatives:
  - bowl
  - platter
  lexicon: LSJ
  rationale: A vessel for food; 'dish' is natural English and avoids over-specifying shape.
- source_word: μάχαιρα
  chosen: sword
  alternatives:
  - knife
  - dagger
  lexicon: LSJ
  rationale: Though the term can cover a large knife, 'sword' preserves the visionary menace and matches common Koine usage in symbolic scenes.
- source_word: περιέργεια
  chosen: a scheme
  alternatives:
  - trickery
  - curious practice
  - magic working
  lexicon: LSJ
  rationale: The sense here is not mere curiosity but meddlesome, manipulative contrivance aimed at seduction; 'scheme' communicates intentional deceit.
- source_word: εἰς ἀποπλάνησίν μου
  chosen: to lead me astray
  alternatives:
  - for my deception
  - to seduce me away
  lexicon: LSJ
  rationale: ἀποπλανάω language often carries moral/spiritual misdirection; 'lead me astray' preserves that ethical force.
- source_word: μὴ γευσάμενος
  chosen: without tasting
  alternatives:
  - not having eaten
  - without partaking
  lexicon: LSJ
  rationale: The participle is specifically 'taste'; retaining it preserves Joseph's deliberate refusal.
- source_word: ἐπιγνοῦσα τὸ βρῶμα
  chosen: when she recognized the food
  alternatives:
  - when she noticed the food
  - when she examined the food
  lexicon: LSJ
  rationale: ἐπιγινώσκω here is best taken as noticing/recognizing the untouched food; 'recognized' is slightly formal and fits the register.
- source_word: γοητείας θανάτου
  chosen: deadly sorcery
  alternatives:
  - sorcery of death
  - death-dealing magic
  lexicon: LSJ
  rationale: Genitive likely expresses quality or effect; 'deadly sorcery' is idiomatic and preserves the lethal accusation.
- source_word: οὐ προσεγγίζω τοῖς εἰδώλοις
  chosen: I do not draw near to idols
  alternatives:
  - I do not approach idols
  - I do not associate with idols
  lexicon: LSJ
  rationale: προσεγγίζω is 'draw near/approach'; retaining spatial-religious language preserves the contrast with devotion to the Lord.
- source_word: Κυρίῳ μόνῳ
  chosen: the Lord alone
  alternatives:
  - the Lord only
  - only the Lord
  lexicon: LSJ
  rationale: Natural English preserving the exclusivity claim.
- source_word: δι’ ἀγγέλου αὐτοῦ
  chosen: through his angel
  alternatives:
  - by means of his angel
  lexicon: LSJ
  rationale: Straightforward instrumental phrasing; no need to generalize to 'messenger' in this revelatory context.
- source_word: ἀπεκάλυψέ μοι τὴν κακίαν σου
  chosen: revealed your wickedness to me
  alternatives:
  - uncovered your evil to me
  - made known your malice to me
  lexicon: LSJ
  rationale: κακία here is moral evil/wicked intent; 'revealed' matches the disclosure language of ἀποκαλύπτω.
- source_word: εἰς ἔλεγχόν σου
  chosen: as evidence against you, to expose you
  alternatives:
  - for your reproof
  - for your conviction
  lexicon: LSJ
  rationale: ἔλεγχος can mean exposure, proof, or reproof. Because Joseph kept the food to confront her wrongdoing, the expanded rendering captures both evidentiary and rebuking force.
- source_word: μετανοήσεις
  chosen: repent
  alternatives:
  - change your mind
  - change your thinking
  lexicon: LSJ
  rationale: Per project guidance, specific-sin contexts favor 'repent.' Here Joseph confronts a concrete act of wickedness and hopes for moral turning.
