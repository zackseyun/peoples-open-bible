    text: Or "After seven years." The Hebrew expression can be understood as marking the completion of a seven-year period.
    reason: lexical_alternative
  - marker: b
    text: Or "his fellow Hebrew" or "his Hebrew kinsman."
    reason: lexical_alternative
  - marker: c
    text: Or "who sells himself to you"; the Hebrew form may be understood in a passive or reflexive sense in this legal context.
    reason: lexical_alternative
