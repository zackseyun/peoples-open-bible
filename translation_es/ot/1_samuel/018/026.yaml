translation:
  language: es
  text: Entonces sus siervos dijeron a David estas palabras[a], y el asunto le pareció bien a David, para llegar a ser yerno del rey[b]; y los días aún no se habían cumplido[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «el asunto agradó a David». El hebreo dice literalmente: «el asunto fue recto en los ojos de David».'
    reason: lexical_alternative
  - marker: b
    text: 'O: «para emparentarse por matrimonio con el rey». La expresión hebrea es literalmente «para contraer parentesco por matrimonio con el rey».'
    reason: lexical_alternative
  - marker: c
    text: Es decir, el tiempo señalado todavía no había terminado.
    reason: cultural_note
lexical_decisions:
- source_word: וַיַּגִּדוּ
  english_pob_choice: told
  chosen_spanish: le dijeron
  alternatives_spanish:
  - le informaron
  - le comunicaron
  lexicon: HALOT
  rationale: El Hiphil de נגד aquí significa hacer saber o decir. «Le dijeron» es natural en español y conserva la transmisión directa de las palabras del rey mediante sus siervos.
- source_word: עֲבָדָיו
  english_pob_choice: his servants
  chosen_spanish: sus siervos
  alternatives_spanish:
  - sus servidores
  - sus oficiales
  lexicon: HALOT
  rationale: En este contexto cortesano, עֲבָדָיו se refiere a los servidores de Saúl. «Siervos» mantiene la relación de servicio sin forzar el matiz más fuerte de «esclavos».
- source_word: הַדְּבָרִים הָאֵלֶּה
  english_pob_choice: these words
  chosen_spanish: estas palabras
  alternatives_spanish:
  - estas cosas
  - esta propuesta
  lexicon: HALOT
  rationale: Aquí los servidores están comunicando una propuesta verbal; «palabras» preserva mejor el contexto inmediato de habla que una traducción más general como «cosas».
- source_word: וַיִּשַׁר הַדָּבָר בְּעֵינֵי דָוִד
  english_pob_choice: the matter seemed right in David’s eyes
  chosen_spanish: el asunto pareció recto a los ojos de David
  alternatives_spanish:
  - el asunto agradó a David
  - la propuesta fue aceptable para David
  lexicon: HALOT
  rationale: La expresión ישר בעיני conserva la idea de juicio/aprobación. «Pareció recto a los ojos de David» mantiene el modismo hebreo con claridad en español.
- source_word: לְהִתְחַתֵּן בַּמֶּלֶךְ
  english_pob_choice: to become the king’s son-in-law
  chosen_spanish: para llegar a ser yerno del rey
  alternatives_spanish:
  - para emparentarse por matrimonio con el rey
  - para casarse con la familia del rey
  lexicon: HALOT
  rationale: El hitpael de חתן con ב indica entrar en una relación de parentesco por matrimonio. «Yerno del rey» expresa con precisión la relación resultante y es más natural que una paráfrasis larga.
- source_word: וְלֹא מָלְאוּ הַיָּמִים
  english_pob_choice: and the days had not yet been fulfilled
  chosen_spanish: y los días aún no se habían cumplido
  alternatives_spanish:
  - y el tiempo aún no había expirado
  - y los días aún no se habían llenado
  lexicon: HALOT
  rationale: El hebreo usa un modismo temporal sobre la llegada del plazo. «Se habían cumplido» conserva la fuerza formal de מָלְאוּ הַיָּמִים y evita una redacción demasiado libre.
translation_notes:
  revision_awareness: La redacción española sigue la revisión inglesa más reciente al reflejar el cierre temporal con «se habían cumplido», equivalente funcional de «had not yet been fulfilled», y mantiene la idiomática hebrea de ישר בעיני en lugar de neutralizarla como mera aprobación.
  spanish_consistency_notes:
  - Se mantiene «siervos» para עבדים en un contexto de corte real, coherente con el valor de servicio del término sin convertirlo en «esclavos».
  - Se usa «Yerno del rey» como equivalencia funcional de la relación de parentesco por matrimonio, en línea con la decisión inglesa de expresar el sentido resultante.
  - «Días» conserva el modismo temporal hebreo; no se reemplaza por «tiempo» en el texto principal para no perder la imagen original.
