base_translation:
  language: en
  yaml_path: translation/ot/ezekiel/043/013.yaml
  text: 'And these are the measurements of the altar in cubits (the cubit being a cubit and a handbreadth): its gutter shall be one cubit[a], and one cubit its width, and its border on its rim all around shall be one span[c][b]. And this shall be the base of the altar.'
  footnotes:
  - marker: a
    text: 'Hebrew: ''a cubit, a cubit and a handbreadth,'' i.e., the longer cubit used for these measurements.'
    reason: cultural_note
  - marker: b
    text: Or 'trench' or 'base' for 'gutter' (Hebrew חֵיק); the exact architectural feature is uncertain.
    reason: lexical_alternative
  - marker: c
    text: Or 'this is the height/back-structure of the altar' for 'this shall be the base of the altar' (Hebrew גַּב).
    reason: lexical_alternative
