base_translation:
  language: en
  yaml_path: translation/deuterocanon/sirach/032/018.yaml
  text: A wise man will not take a bribe[c][b][a], but a proud scoffer will not keep the law.
  footnotes:
  - marker: a
    text: Hebrew זד ולץ may also be read as two character labels, 'the insolent and the scoffer,' rather than the combined expression 'an insolent scoffer.'
    reason: alternative_reading
  - marker: b
    text: Or 'instruction' for 'the law'; Hebrew תורה can denote authoritative teaching more broadly, not only legal statute.
    reason: lexical_alternative
  - marker: c
    text: The Greek parallel supplied here does not align with this Hebrew line, so the translation follows the extant Hebrew witness primarily.
    reason: textual_variant
