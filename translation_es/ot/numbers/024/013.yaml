  text: אִם יִתֶּן לִ֨/י בָלָ֜ק מְלֹ֣א בֵית/וֹ֮ כֶּ֣סֶף וְ/זָהָב֒ לֹ֣א אוּכַ֗ל לַ/עֲבֹר֙ אֶת פִּ֣י יְהוָ֔ה לַ/עֲשׂ֥וֹת טוֹבָ֛ה א֥וֹ רָעָ֖ה מִ/לִּבִּ֑/י אֲשֶׁר יְדַבֵּ֥ר יְהוָ֖ה אֹת֥/וֹ אֲדַבֵּֽר־־־־׃
