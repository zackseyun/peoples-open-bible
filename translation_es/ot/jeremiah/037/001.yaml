    rationale: Aunque calca aceptablemente la secuencia hebrea, en español suena más natural y plenamente fiel decir «Y el rey Sedequías ... reinó», sin pérdida de sentido ni de formalidad.
  - severity: medium
    issue: Uso de «Jehoiaquim» en vez de «Joaquín»
    rationale: El hebreo יְהוֹיָקִים suele verterse en español bíblico como «Joaquín». «Jehoiaquim» resulta más transliterado y menos legible para el lector hispanohablante, y no hay una justificación auditada que exija conservarlo aquí.
  revised_spanish_text: Y el rey Sedequías, hijo de Josías, reinó en lugar de Conías[a], hijo de Joaquín, a quien Nabucodonosor[b], rey de Babilonia, había hecho rey en la tierra de Judá.
  revised_footnotes:
