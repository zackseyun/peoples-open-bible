    text: Or 'O proud one' or 'O insolent one.' The Hebrew זָדוֹן names Babylon by its arrogance.
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'the time I visited you'; here 'visited' carries the sense of calling to account in judgment, hence 'punish you.'
    reason: lexical_alternative
