  yaml_path: translation/ot/jeremiah/050/032.yaml
  text: And the arrogant one will stumble and fall[a], with no one to raise him up; and I will kindle a fire in his cities[b], and it will consume all around him.
  footnotes:
  - marker: a
    text: Or 'pride' or 'insolence'; the Hebrew זָדוֹן is often abstract, but here it is rendered personally as 'the arrogant one' because the surrounding verbs and pronouns are masculine singular.
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'his cities.' The verse personifies Babylon as a singular male figure.
    reason: cultural_note
