translation:
  language: es
  text: 'Josué dijo a la casa de José —a Efraín y a Manasés—, diciendo[a]: «Eres un pueblo numeroso y tienes gran fuerza[b]; no tendrás una sola porción».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «un pueblo grande». La frase hebrea puede denotar tanto tamaño numérico como grandeza; en este contexto de reparto de tierras, se favorece «numeroso».
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: «lote» o «suerte». En Josué, este término suele referirse a una porción de herencia asignada por sorteo; por eso aquí se traduce «porción».'
    reason: lexical_alternative
lexical_decisions:
- source_word: בֵּית יוֹסֵף
  english_pob_choice: the house of Joseph
  chosen_spanish: la casa de José
  alternatives_spanish:
  - los descendientes de José
  - el clan de José
  lexicon: HALOT
  rationale: Conserva el idiomático tribal/familiar del hebreo y corresponde al valor de 'house of Joseph' en el contexto inmediato, que luego se especifica con Efraín y Manasés.
- source_word: לְאֶפְרַיִם וְלִמְנַשֶּׁה
  english_pob_choice: to Ephraim and Manasseh
  chosen_spanish: a Efraín y a Manasés
  alternatives_spanish:
  - es decir, Efraín y Manasés
  lexicon: HALOT
  rationale: Mantiene explícitos los dos nombres tribales y refleja la aclaración appositiva del hebreo con una construcción natural en español.
- source_word: עַם רַב
  english_pob_choice: a numerous people
  chosen_spanish: un pueblo numeroso
  alternatives_spanish:
  - un pueblo grande
  - mucho pueblo
  lexicon: HALOT
  rationale: La fuerza principal aquí es cuantitativa en el marco de la repartición de la tierra; 'numeroso' reproduce mejor esa idea que 'grande', que en español podría sugerir solo importancia.
- source_word: וְכֹחַ גָּדוֹל לָךְ
  english_pob_choice: and you have great strength
  chosen_spanish: tienes gran fuerza
  alternatives_spanish:
  - y tienes mucho poder
  - y eres muy fuerte
  lexicon: HALOT
  rationale: '''Fuerza'' mantiene el sustantivo del hebreo כֹחַ y funciona bien en español moderno; evita convertir prematuramente el sustantivo en adjetivo, aunque la idea de capacidad/fortaleza sigue presente.'
- source_word: לֹא יִהְיֶה לְךָ גּוֹרָל אֶחָד
  english_pob_choice: you shall not have only one allotment
  chosen_spanish: no tendrás un solo lote
  alternatives_spanish:
  - no tendrás una sola porción
  - no te tocará un solo lote
  lexicon: HALOT
  rationale: '''Lote'' conserva la relación con gôral en Josué, donde el reparto se hace por sorteo. Se evita ''herencia'' para no borrar el matiz de asignación por sorteo; el contexto ya implica la porción territorial.'
- source_word: לֵאמֹר
  english_pob_choice: saying
  chosen_spanish: diciendo
  alternatives_spanish:
  - y dijo
  lexicon: HALOT
  rationale: Reproduce la forma discursiva hebrea de introducción de cita directa sin volver la frase más pesada en español. Se mantiene la subordinación al verbo de habla.
translation_notes:
  revision_awareness: El borrador sigue de cerca el texto hebreo WLC y el criterio óptimo-equivalente del POB inglés. Se preserva la ambigüedad controlada de עַם רַב mediante una nota textual/lexical, y se mantiene גּוֹרָל con un equivalente español que conserva el trasfondo de reparto por sorteo. No se detectan revisiones previas aplicadas en el expediente inglés.
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando el texto fuente lo exige; aquí no aparece el tetragrámaton.
  - «Mesías/Cristo» no interviene en este versículo.
  - Se mantiene la puntuación con rayas para reflejar la apposición explicativa del hebreo.
  - «Lote» se usa de manera consistente con el valor técnico de גּוֹרָל en Josué.
