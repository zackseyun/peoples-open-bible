translation:
  language: es
  text: 'Y él les mandó[a], diciendo: «Miren, ustedes deben ponerse en emboscada contra la ciudad, detrás de la ciudad[b]. No se alejen mucho de la ciudad, y todos ustedes estén listos».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «Miren» al comienzo del mandato; el imperativo hebreo funciona como llamada de atención.
    reason: lexical_alternative
  - marker: b
    text: O «desde detrás de la ciudad»; la frase hebrea también puede expresar la posición relativa con ese matiz.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְצַו
  english_pob_choice: he commanded
  chosen_spanish: les mandó
  alternatives_spanish:
  - les ordenó
  - les dio la orden
  lexicon: HALOT
  rationale: צוה expresa una orden o mandato con fuerza directiva. «Mandó» conserva esa fuerza en español moderno y resulta natural en el relato.
- source_word: לֵאמֹר
  english_pob_choice: saying
  chosen_spanish: diciendo
  alternatives_spanish:
  - y dijo
  - así
  lexicon: HALOT
  rationale: Es la fórmula estándar de introducción al discurso; «diciendo» es fiel y fluido en español.
- source_word: רְאוּ
  english_pob_choice: See
  chosen_spanish: Miren
  alternatives_spanish:
  - Vean
  - Vean ustedes
  lexicon: HALOT
  rationale: El imperativo funciona como llamada de atención. En español, «Miren» reproduce bien el carácter exhortativo y mantiene el tono inmediato.
- source_word: אַתֶּם
  english_pob_choice: you
  chosen_spanish: ustedes
  alternatives_spanish:
  - vosotros
  - ustedes mismos
  lexicon: HALOT
  rationale: El pronombre explícito enfatiza al grupo. «Ustedes» es la forma neutral y clara para español amplio.
- source_word: אֹרְבִים
  english_pob_choice: are to lie in ambush
  chosen_spanish: han de estar en emboscada
  alternatives_spanish:
  - deben estar en emboscada
  - van a estar en emboscada
  lexicon: HALOT
  rationale: El participio describe la función asignada a los hombres. «Han de estar en emboscada» conserva el valor de encargo/estado previsto sin volverlo mecánicamente verbal.
- source_word: לָעִיר
  english_pob_choice: against the city
  chosen_spanish: contra la ciudad
  alternatives_spanish:
  - para la ciudad
  - junto a la ciudad
  lexicon: HALOT
  rationale: Con lenguaje de emboscada, la orientación es hostil; «contra» refleja mejor ese valor que una simple ubicación.
- source_word: מֵאַחֲרֵי הָעִיר
  english_pob_choice: behind the city
  chosen_spanish: detrás de la ciudad
  alternatives_spanish:
  - desde detrás de la ciudad
  - por la parte de atrás de la ciudad
  lexicon: HALOT
  rationale: La frase indica posición relativa. «Detrás de la ciudad» es la forma más clara y sobria en español.
- source_word: אַל תַּרְחִיקוּ
  english_pob_choice: Do not go very far
  chosen_spanish: No se alejen mucho
  alternatives_spanish:
  - No se distancien mucho
  - No vayan muy lejos
  lexicon: HALOT
  rationale: El hebreo prohíbe aumentar la distancia. «No se alejen mucho» expresa bien la advertencia en español natural.
- source_word: מִן הָעִיר מְאֹד
  english_pob_choice: from the city
  chosen_spanish: de la ciudad
  alternatives_spanish:
  - de cerca de la ciudad
  - lejos de la ciudad
  lexicon: HALOT
  rationale: El sentido global con מְאֹד es no quedar muy lejos de la ciudad. En español, esa idea ya queda expresada por «no se alejen mucho»; la referencia se mantiene con «de la ciudad».
- source_word: וִהְיִיתֶם
  english_pob_choice: must be
  chosen_spanish: estén
  alternatives_spanish:
  - deben estar
  - han de estar
  lexicon: HALOT
  rationale: La secuencia imperativa continúa. «Estén» mantiene la fuerza exhortativa sin sobrecargar la frase.
- source_word: כֻּלְּכֶם
  english_pob_choice: all of you
  chosen_spanish: todos ustedes
  alternatives_spanish:
  - todos
  - cada uno de ustedes
  lexicon: HALOT
  rationale: Se preserva el énfasis colectivo del hebreo con una expresión natural y completa en español.
- source_word: נְכֹנִים
  english_pob_choice: ready
  chosen_spanish: listos
  alternatives_spanish:
  - preparados
  - dispuestos
  lexicon: HALOT
  rationale: En contexto militar, «listos» transmite de forma concisa el estado de preparación exigido.
translation_notes:
  revision_awareness: 'La redacción sigue el sentido confirmado por el texto hebreo y coincide con el contexto auditado en inglés: un mandato seguido de un imperativo de atención, la orden de emboscarse detrás de la ciudad, la advertencia de no alejarse mucho y la exigencia de estar listos. Se prefirió un español natural que conserve la fuerza directiva y la orientación espacial.'
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» fuera del versículo porque no aparece el nombre divino en este texto.
  - Se tradujo el imperativo inicial con una forma de atención en plural («Miren») para reflejar el valor discursivo de רְאוּ.
  - «Contra la ciudad» conserva la orientación hostil implícita en el contexto de emboscada.
  - No se introdujeron términos eclesiásticos ajenos al registro militar del pasaje.
