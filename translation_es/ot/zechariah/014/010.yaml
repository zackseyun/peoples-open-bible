  yaml_path: translation/ot/zechariah/014/010.yaml
  text: All the land will be turned into a plain[a], from Geba to Rimmon south of Jerusalem. But Jerusalem will be raised up and will remain in its place, from the Benjamin Gate to the place of the First Gate, to the Corner Gate, and from the Tower of Hananel to the king’s winepresses.
  footnotes:
