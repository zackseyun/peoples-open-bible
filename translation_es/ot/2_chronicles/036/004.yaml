  to: Y el rey de Egipto hizo rey a Eliaquim, su hermano, sobre Judá y Jerusalén, y le cambió el nombre a Joacim. Y Neco[a] tomó a su hermano Joacaz y lo llevó a Egipto.
  rationale: Se reubicó la nota al nombre «Neco», que es el elemento al que realmente se refiere. También se mejoró la sintaxis de la primera cláusula para un español más natural y se ajustó la expresión del cambio de nombre a una forma más idiomática, sin alterar el sentido del hebreo ni las decisiones léxicas auditadas.
