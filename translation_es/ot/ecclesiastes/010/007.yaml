review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura y el sentido básico del hebreo: observación personal, contraste entre esclavos exaltados y personas de alto rango humilladas, y la comparación ''como esclavos''. Sin embargo, la frase final ''sobre la tierra'' suena poco natural en español en este contexto y no comunica con claridad el contraste práctico de ir desmontados. Además, el anclaje de la nota [c] está colocado en ''caballos'' cuando la nota explica la frase final עַל הָאָרֶץ, no ''sobre caballos''.'
  spanish_quality_summary: El español es mayormente claro y digno, pero 'príncipes' puede sonar demasiado dinástico para שָׂרִים en un registro contemporáneo; aun así es defendible por el expediente inglés. El problema principal de legibilidad es 'sobre la tierra' al final, que resulta rígido y algo extraño. 'Por el suelo' expresa mejor el contraste concreto con ir montados sin sobreinterpretar tanto como 'a pie'. También conviene mover la nota [c] a la frase final correspondiente.
  glossary_alignment: Alinea bien con la política del proyecto en עֲבָדִים -> 'esclavos'. No hay términos teológicos sensibles aquí. Se conserva adecuadamente la alternativa 'siervos' en nota y la alternativa 'nobles' para שָׂרִים.
  issues:
  - severity: medium
    issue: La nota [c] está anclada en 'caballos' en vez de en la frase final que traduce עַל הָאָרֶץ.
    rationale: La nota explica el sintagma final 'sobre la tierra / on the ground', no 'sobre caballos'. Tal como está, el lector recibe la aclaración en el lugar equivocado.
  - severity: medium
    issue: La traducción 'sobre la tierra' para עַל הָאָרֶץ es poco natural en español en este versículo.
    rationale: Aunque es más literal, en español moderno suena rígida y no transmite bien el contraste con los esclavos montados. 'Por el suelo' conserva la imagen concreta de estar abajo/en tierra y lee mejor.
  - severity: low
    issue: La puntuación alrededor de 'como esclavos' puede mejorarse eliminando la coma antes del complemento final.
    rationale: 'Con la revisión propuesta, una redacción continua suena más natural: ''... que andan como esclavos por el suelo''.'
  revised_spanish_text: He visto esclavos[a] sobre caballos, y príncipes[b] que andan como esclavos por el suelo[c].
