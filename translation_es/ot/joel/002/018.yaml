translation:
  language: es
  text: Entonces Yahvé se puso celoso por su tierra y tuvo compasión de su pueblo[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «tuvo celo por su tierra». El verbo hebreo puede expresar tanto celos como celo; aquí denota la ardiente preocupación de pacto de Yahvé por lo que le pertenece.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְקַנֵּא
  english_pob_choice: became jealous
  chosen_spanish: se mostró celoso
  alternatives_spanish:
  - estuvo celoso
  - fue celoso
  - se llenó de celo
  lexicon: HALOT
  rationale: קנא puede expresar tanto celos como celo ardiente. En este contexto, con לְאַרְצוֹ ('por su tierra'), la idea es el interés protector y exclusivo de Yahvé por lo que le pertenece. 'Se mostró celoso' conserva esa fuerza relacional sin reducirla a una emoción meramente humana.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  lexicon: HALOT
  rationale: El Tetragrámaton se vierte como 'Yahvé' para conservar el nombre divino propio, en lugar de sustituirlo por un título. Esta es la terminología base del proyecto.
- source_word: לְאַרְצוֹ
  english_pob_choice: for his land
  chosen_spanish: por su tierra
  alternatives_spanish:
  - por su país
  - por su país/territorio
  - por su tierra prometida
  lexicon: HALOT
  rationale: אֶרֶץ aquí apunta naturalmente a la tierra del pacto, no a la tierra en sentido planetario. En español, 'por su tierra' comunica bien el objeto del celo/solicitud divina y mantiene la amplitud del hebreo.
- source_word: וַיַּחְמֹל
  english_pob_choice: had compassion
  chosen_spanish: tuvo compasión
  alternatives_spanish:
  - se compadeció
  - se apiadó
  - mostró compasión
  lexicon: HALOT
  rationale: חמל expresa compasión, piedad o el acto de perdonar/ahorrar. 'Tuvo compasión' es claro y natural en español, y preserva el matiz afectivo-restaurador del contexto de Joel 2.
- source_word: עַל
  english_pob_choice: 'on'
  chosen_spanish: de
  alternatives_spanish:
  - sobre
  - con respecto a
  lexicon: HALOT
  rationale: 'Con ''tener compasión'', el complemento en español se expresa de forma idiomática con ''de'': ''tuvo compasión de su pueblo''. Esto reproduce la relación semántica del hebreo sin sonar forzado.'
- source_word: עַמּוֹ
  english_pob_choice: his people
  chosen_spanish: su pueblo
  alternatives_spanish:
  - su nación
  - su gente
  lexicon: HALOT
  rationale: עַם en contexto de pacto designa la comunidad perteneciente a Dios. 'Pueblo' preserva ese sentido relacional y covenantal mejor que 'nación', que sonaría más político.
theological_decisions:
- issue: Celo/jealousy divino en קנא
  english_pob_reading: Then Yahweh became jealous for his land
  chosen_spanish_reading: Entonces Yahvé se mostró celoso por su tierra
  alternative_spanish_readings:
  - Entonces Yahvé fue celoso por su tierra
  - Entonces Yahvé se llenó de celo por su tierra
  rationale: El hebreo permite el rango 'celoso/celoso de celo'. Se conserva 'celoso' para mantener la tensión teológica de la exclusividad del pacto y el afecto posesivo divino, sin neutralizarla en una mera 'dedicación'.
  doctrine_reference: Preservar la tensión lexical y teológica del original; no resolver קנא solo como entusiasmo piadoso.
translation_notes:
  revision_awareness: La revisión auditada en inglés no introdujo cambios posteriores; el texto español sigue el mismo análisis léxico-teológico de la fuente hebrea y mantiene la alternativa semántica de קנא en nota.
  spanish_consistency_notes:
  - Se mantuvo 'Yahvé' como forma constante para יהוה.
  - '''Pueblo'' se usa en sentido comunitario/covenantal, no étnico-político.'
  - La compasión se expresó con una construcción idiomática española ('tuvo compasión de'), equivalente al hebreo con עַל.
  - No se suavizó el matiz de celo/jelosía divina; se conservó en el cuerpo y se explicó la alternativa en nota.
