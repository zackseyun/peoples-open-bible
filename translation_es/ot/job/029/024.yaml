    text: Hebreo «la luz de mi rostro», un modismo para una expresión facial radiante o favorable.
    reason: cultural_note
  revision_rationale: Se ajusta la sintaxis a un español natural («Les sonreí»), se alinea la primera cláusula con la decisión auditada más literal («no lo creían» en vez de «no lo podían creer»), y se sustituye el calco rígido «hicieron caer» por «abatieron», que conserva la imagen hebrea con mejor legibilidad. Se añaden notas para preservar la alternativa léxica y explicar el modismo.
