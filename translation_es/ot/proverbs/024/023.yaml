translation:
  language: es
  text: 'Estos también son dichos de los sabios: mostrar parcialidad en el juicio no es bueno[a][b].'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo literalmente: «Estos también, para/los sabios». El sentido probable es: «Estos también son dichos de los sabios».'
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo literalmente: «reconocer rostros en el juicio», un modismo que significa mostrar favoritismo o parcialidad.'
    reason: cultural_note
lexical_decisions:
- source_word: גַּם
  english_pob_choice: also
  chosen_spanish: también
  alternatives_spanish:
  - además
  - igualmente
  lexicon: HALOT
  rationale: La partícula añade esta línea al conjunto anterior; «también» conserva mejor la fuerza conectiva natural del hebreo que un calco más pesado.
- source_word: אֵלֶּה
  english_pob_choice: these
  chosen_spanish: estos
  alternatives_spanish:
  - estas cosas
  - éste
  - estos dichos
  lexicon: HALOT
  rationale: El demostrativo introduce la unidad siguiente. En español, «estos» funciona de modo natural con el sustantivo elíptico que completa el sentido del encabezado.
- source_word: לַחֲכָמִים
  english_pob_choice: are sayings of the wise
  chosen_spanish: son dichos de los sabios
  alternatives_spanish:
  - pertenecen a los sabios
  - son para los sabios
  - son dichos sabios
  lexicon: HALOT
  rationale: Sigo la lectura de encabezado sugerida por el audit trail. «Dichos de los sabios» expresa bien la función de título y evita un giro artificial como «para los sabios».
- source_word: הַכֵּר פָּנִים
  english_pob_choice: to show partiality
  chosen_spanish: mostrar parcialidad
  alternatives_spanish:
  - reconocer rostros
  - mostrar favoritismo
  - ser parcial
  lexicon: HALOT
  rationale: El hebreo es idiomático y literalmente dice «reconocer rostros». En español, «mostrar parcialidad» reproduce el sentido judicial sin perder la fuerza del modismo.
- source_word: בְּמִשְׁפָּט
  english_pob_choice: in judgment
  chosen_spanish: en el juicio
  alternatives_spanish:
  - en el juicio legal
  - al juzgar
  - en la sentencia
  lexicon: HALOT
  rationale: «Mishpat» aquí apunta al ámbito forense; «juicio» mantiene ese contexto en español y resulta más fluido que «en juicio» con artículo implícito.
- source_word: בַּל
  english_pob_choice: is not
  chosen_spanish: no es
  alternatives_spanish:
  - no resulta
  - no será
  lexicon: HALOT
  rationale: La negación hebrea forma una cláusula nominal. En español conviene suplir el verbo copulativo para una oración natural y precisa.
- source_word: טוֹב
  english_pob_choice: good
  chosen_spanish: bueno
  alternatives_spanish:
  - recto
  - apropiado
  - conveniente
  lexicon: HALOT
  rationale: «Bueno» conserva el valor evaluativo amplio del hebreo sin restringirlo a una sola noción ética o pragmática.
theological_decisions:
- issue: Función de לַחֲכָמִים como encabezado o superscripción
  english_pob_reading: 'Treat as a heading introducing additional wise sayings: ''These also are sayings of the wise.'''
  chosen_spanish_reading: 'Tratarlo como encabezado: «Estos también son dichos de los sabios».'
  alternative_spanish_readings:
  - Estos también pertenecen a los sabios
  - Estos también son para los sabios
  rationale: El contexto editorial del libro y el audit trail inglés apoyan una lectura de encabezado. La formulación española explícita hace visible la función sin añadir contenido ajeno al hebreo.
  doctrine_reference: Sabiduría bíblica / estructura literaria de Proverbios
- issue: Valor ético-jurídico de la parcialidad en el juicio
  english_pob_reading: to show partiality in judgment is not good
  chosen_spanish_reading: mostrar parcialidad en el juicio no es bueno
  alternative_spanish_readings:
  - ser parcial al juzgar no es bueno
  - hacer acepción de personas en el juicio no es bueno
  rationale: Conservo la valoración moral general del texto y el marco jurídico. «Acepción de personas» es bíblico-tradicional, pero «parcialidad» comunica mejor el modismo hebreo a un público amplio sin perder el sentido.
  doctrine_reference: Imparcialidad en el juicio; justicia bíblica
translation_notes:
  revision_awareness: Coincido con el pasaje inglés de audit trail en tratar la primera mitad como un encabezado elíptico y la segunda como un modismo judicial. No se aplicaron revisiones posteriores; el estado más reciente indica acuerdo alto y sin cambios.
  spanish_consistency_notes:
  - Usé «Yahvé» solo cuando el texto lo exige; este versículo no contiene el nombre divino.
  - Mantuve «sabios» para חֲכָמִים en sentido literario de colección sapiencial, no como una categoría doctrinal distinta.
  - Preferí «parcialidad» sobre «favoritismo» porque encaja mejor con el ámbito de juicio y puede abarcar la fuerza del modismo hebreo.
  - «Juicio» se tomó en sentido forense, no como juicio final ni mera opinión.
