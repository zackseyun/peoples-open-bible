    reason: lexical_alternative
  - marker: b
    text: 'O: «vino de su cacería» o «vino de la caza». El hebreo puede referirse a la actividad de cazar o a la presa obtenida; aquí el contexto favorece la idea de que Esaú regresaba de cazar.'
    reason: lexical_alternative
  revision_rationale: Se revisa para preservar mejor la inmediatez temporal del hebreo con 'tan pronto como', para expresar de manera natural en español el intensificador יָצֹא יָצָא con 'acababa de salir', y para reemplazar el giro poco idiomático 'entró de su caza' por 'vino de cazar', que comunica correctamente la procedencia desde la actividad de cazar. También se aligera la puntuación para mejorar legibilidad sin perder el orden narrativo.
