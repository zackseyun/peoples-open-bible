translation:
  language: es
  text: Fue para los hijos de Aarón[a], de las familias de los coatitas, de los hijos de Leví, porque a ellos les tocó la primera suerte.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «de los clanes coatitas».
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְהִי
  english_pob_choice: It was
  chosen_spanish: Fue
  alternatives_spanish:
  - Y fue
  - Y aconteció
  lexicon: HALOT
  rationale: El hebreo introduce una afirmación narrativa con היה en forma consecutiva. En español, «Fue» conserva la sencillez existencial sin forzar un calco inicial innecesario.
- source_word: לִבְנֵי אַהֲרֹן
  english_pob_choice: for the sons of Aaron
  chosen_spanish: para los hijos de Aarón
  alternatives_spanish:
  - para los hijos de Aarón
  - para Aarón y sus hijos
  lexicon: HALOT
  rationale: «Hijos de» reproduce con transparencia la fórmula genealógica del hebreo y sigue el valor de asignación de la preposición ל en este contexto de reparto.
- source_word: מִמִּשְׁפְּחוֹת
  english_pob_choice: from the families of
  chosen_spanish: de las familias de
  alternatives_spanish:
  - de los clanes de
  - entre las familias de
  lexicon: HALOT
  rationale: מִשְׁפָּחוֹת puede abarcar unidades familiares extensas o clanes. «Familias» mantiene la transparencia y evita elegir demasiado pronto una equivalencia más interpretativa.
- source_word: הַקְּהָתִי
  english_pob_choice: the Kohathites
  chosen_spanish: los coatitas
  alternatives_spanish:
  - la familia coatita
  - los descendientes de Coat
  lexicon: HALOT
  rationale: El término designa la subdivisión levítica descendiente de Coat. «Coatitas» es el etnónimo natural en español y preserva la referencia tribal.
- source_word: מִבְּנֵי לֵוִי
  english_pob_choice: from the sons of Levi
  chosen_spanish: de los hijos de Leví
  alternatives_spanish:
  - de los levitas
  - de la tribu de Leví
  lexicon: HALOT
  rationale: Se conserva la formulación genealógica del hebreo, como en el inglés POB, en vez de simplificarla a «levitas».
- source_word: כִּי
  english_pob_choice: because
  chosen_spanish: porque
  alternatives_spanish:
  - pues
  - ya que
  lexicon: HALOT
  rationale: 'Aquí introduce la razón de la afirmación anterior: la primera suerte les correspondió a ellos. «Porque» expresa claramente esa relación causal.'
- source_word: לָהֶם
  english_pob_choice: for them
  chosen_spanish: para ellos
  alternatives_spanish:
  - les correspondió
  - a ellos
  lexicon: HALOT
  rationale: La preposición ל con pronombre marca asignación o pertenencia en este contexto de sorteo. «Para ellos» conserva esa idea sin añadir un verbo no presente en el hebreo.
- source_word: הַגּוֹרָל
  english_pob_choice: the lot
  chosen_spanish: la suerte
  alternatives_spanish:
  - el sorteo
  - la porción
  lexicon: HALOT
  rationale: En español bíblico, «suerte» comunica naturalmente el resultado del sorteo por lote. Mantiene el sentido de asignación distributiva del hebreo גּוֹרָל.
- source_word: רִאשֹׁנָה
  english_pob_choice: the first
  chosen_spanish: la primera
  alternatives_spanish:
  - primera
  - la primera suerte
  lexicon: HALOT
  rationale: La forma femenina concuerda con el sustantivo implícito en el contexto. «La primera» reproduce la referencia al orden de los lotes con naturalidad en español.
translation_notes:
  revision_awareness: El texto hebreo y el audit trail inglés concuerdan de forma alta; no se requieren revisiones de sentido. Se mantiene la formulación genealógica y distributiva sin suavizar la referencia al sorteo.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma del proyecto, pero este versículo no contiene el tetragrámaton ni una mención divina explícita.
  - Se conserva la terminología genealógica («hijos de», «familias») para alinearse con la estructura del hebreo.
  - «Suerte» se usa en sentido técnico de reparto por sorteo, no como mera fortuna.
