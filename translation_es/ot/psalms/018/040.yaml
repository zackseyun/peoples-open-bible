revisions:
- from: Me ceñiste de fuerza para la batalla; hiciste caer debajo de mí a los que se levantan contra mí.
  to: Me ceñiste de fuerza para la batalla; pusiste debajo de mí a los que se levantaron contra mí.
  rationale: Se mantiene la imagen hebrea de ceñir con fuerza y la metáfora espacial de sometimiento, pero se corrige el presente «se levantan» a «se levantaron» para una referencia contextual más natural en español, y se mejora la fluidez de la segunda cláusula con «pusiste debajo de mí», que expresa bien la derrota y subordinación sin la rigidez de «hiciste caer debajo de mí».
