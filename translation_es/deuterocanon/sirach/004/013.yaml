translation:
  language: es
  text: Los que se aferran a ella hallarán honor de parte de Yahvé, y serán favorecidos con la bendición de Yahvé.[a]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'La LXX dice: «el que la sostiene heredará gloria, y dondequiera que entre, el Señor bendecirá»; el hebreo dice: «hallarán honor de Yahvé» y «serán favorecidos con la bendición de Yahvé».'
    reason: alternative_reading
lexical_decisions:
- source_word: וְתֹמְכֶיהָ / ὁ κρατῶν αὐτῆς
  english_pob_choice: those who hold fast to her
  chosen_spanish: los que se aferran a ella
  alternatives_spanish:
  - los que la sostienen
  - los que la apoyan
  lexicon: HALOT; LXX κρατέω
  rationale: תמך y κρατέω expresan sujeción firme y adhesión activa. «Se aferran a ella» conserva esa fuerza relacional mejor que «sostienen», que puede sonar más externo o material.
- source_word: יִמְצְאוּ / κληρονομήσει
  english_pob_choice: will find
  chosen_spanish: hallarán
  alternatives_spanish:
  - obtendrán
  - heredarán
  lexicon: HALOT; LSJ
  rationale: El hebreo dice literalmente «encontrarán»; la LXX introduce «heredará». En español, «hallarán» mantiene el hebreo base y sigue siendo natural. No se traslada «heredarán» al texto principal porque el hebreo es la fuente prioritaria aquí.
- source_word: כָבוֹד / δόξαν
  english_pob_choice: honor
  chosen_spanish: honor
  alternatives_spanish:
  - gloria
  - gloria/honor
  lexicon: HALOT; BDAG
  rationale: «Honor» encaja mejor con el marco sapiencial y con la recepción de estima concedida por Dios. «Gloria» es viable por la LXX, pero en español puede desplazar el sentido hacia esplendor más que reconocimiento conferido.
- source_word: מֵיהֹוָה / Κύριος
  english_pob_choice: from Yahweh
  chosen_spanish: de Yahvé
  alternatives_spanish:
  - de Yahvé
  - del Señor
  lexicon: HALOT; project terminology default
  rationale: El nombre divino aparece explícitamente en hebreo y el proyecto pide «Yahvé» en el texto principal. «De Yahvé» conserva el valor de origen/atribución del preposición min sin ocultar el nombre.
- source_word: וְיֻחַנּוּ
  english_pob_choice: they will be favored
  chosen_spanish: serán favorecidos
  alternatives_spanish:
  - recibirán favor
  - serán tratados con favor
  lexicon: HALOT
  rationale: La pasiva de חנן pide una forma pasiva en español. «Serán favorecidos» mantiene la pasividad y la brevedad del hebreo, sin introducir un agente distinto al contexto divino.
- source_word: בְּבִרְכַּת יְהֹוָה
  english_pob_choice: with the blessing of Yahweh
  chosen_spanish: con la bendición de Yahvé
  alternatives_spanish:
  - por la bendición de Yahvé
  - mediante la bendición de Yahvé
  lexicon: HALOT
  rationale: La preposición beth admite matiz asociativo o instrumental. «Con la bendición de Yahvé» reproduce bien la cercanía entre favor y bendición divina y suena natural en español.
theological_decisions:
- issue: Tratamiento del nombre divino YHWH
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el Señor
  - Jehová
  rationale: El texto hebreo contiene el Tetragrámaton, y el proyecto español usa «Yahvé» como forma principal. Esto preserva la referencia directa al nombre pactual sin la sustitución litúrgica de «SEÑOR».
  doctrine_reference: 'DOCTRINE.md: Contested terms — יהוה YHWH'
- issue: Relación entre el hebreo y la LXX en la primera mitad del versículo
  english_pob_reading: Those who hold fast to her will find honor from Yahweh
  chosen_spanish_reading: Los que se aferran a ella hallarán honor de Yahvé
  alternative_spanish_readings:
  - El que se aferra a ella heredará gloria
  - Los que la sostienen recibirán gloria
  rationale: La LXX dice «el que la sostiene heredará gloria», pero el hebreo preservado dice «los que la sostienen hallarán honor de Yahvé». Mantener el hebreo en el texto principal evita borrar la tensión documentada entre testigos.
  doctrine_reference: Sirach 4:13 source packet; English footnote a
translation_notes:
  revision_awareness: Se siguió el texto hebreo como base principal, con la LXX registrada como lectura alternativa en nota, en paralelo al tratamiento del audit trail en inglés. Se conservó la pasiva de חנן como «serán favorecidos» y el nombre divino como «Yahvé», conforme al estándar del proyecto. No se trasladó al cuerpo principal la variación de la LXX «heredará gloria», porque el hebreo es el testimonio primario en este expediente.
  spanish_consistency_notes:
  - Se usó «Yahvé» de forma consistente para YHWH, conforme al estándar del proyecto.
  - Se mantuvo un tono sapiencial sobrio y publicable, sin expandir el sentido más allá del hebreo.
  - «Se aferran a ella» conserva la imagen de adhesión firme a la sabiduría personificada.
  - «Honor» y «bendición» se mantuvieron como pares semánticos distintos, sin fusionarlos.
