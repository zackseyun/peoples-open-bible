translation:
  language: es
  text: Por tanto, los impíos no estarán en pie en el juicio[a], ni los pecadores en la asamblea de los justos[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «en juicio». El hebreo puede referirse en sentido amplio a una rendición de cuentas judicial, ya sea en el orden presente o en el juicio final.
    reason: lexical_alternative
  - marker: b
    text: O «congregación de los justos».
    reason: lexical_alternative
lexical_decisions:
- source_word: עַל כֵּן
  english_pob_choice: Therefore
  chosen_spanish: Por tanto
  alternatives_spanish:
  - Por eso
  - Así que
  lexicon: HALOT
  rationale: La frase introduce una conclusión lógica respecto de lo anterior. «Por tanto» conserva bien la relación inferencial y suena natural en español bíblico contemporáneo.
- source_word: יָקֻמוּ
  english_pob_choice: will not stand
  chosen_spanish: no se mantendrán
  alternatives_spanish:
  - no estarán en pie
  - no podrán sostenerse
  - no se levantarán
  lexicon: HALOT
  rationale: El hebreo literalmente dice «levantarse/estar en pie», pero en este contexto forense implica permanecer firmes ante el juicio. «No se mantendrán» conserva la idea de no poder permanecer de pie sin forzar una lectura demasiado literal.
- source_word: רְשָׁעִים
  english_pob_choice: the wicked
  chosen_spanish: los impíos
  alternatives_spanish:
  - los malvados
  - los culpables
  lexicon: HALOT
  rationale: «Impíos» es el equivalente bíblico más natural para רשעים en español y mantiene la categoría moral general, no solo la culpabilidad jurídica.
- source_word: בַּמִּשְׁפָּט
  english_pob_choice: in the judgment
  chosen_spanish: en el juicio[a]
  alternatives_spanish:
  - en juicio
  - ante el juicio
  - en el tribunal
  lexicon: HALOT
  rationale: '«Juicio» conserva el campo judicial de מִשְׁפָּט y permite la misma amplitud que la nota inglesa: puede aludir al examen judicial presente o al juicio final. Se evita cerrar el sentido con una especificación innecesaria.'
- source_word: חַטָּאִים
  english_pob_choice: sinners
  chosen_spanish: los pecadores
  alternatives_spanish:
  - los que pecan
  - los transgresores
  lexicon: HALOT
  rationale: «Pecadores» es el equivalente directo y natural en español para quienes se caracterizan por el pecado, manteniendo el paralelismo con «los impíos».
- source_word: בַּעֲדַת
  english_pob_choice: in the assembly of
  chosen_spanish: en la asamblea de
  alternatives_spanish:
  - en la congregación de
  - entre la asamblea de
  lexicon: HALOT
  rationale: «Asamblea» refleja היטב la idea de una comunidad reunida y evita reducir el término a un uso eclesiástico técnico que el hebreo no exige.
- source_word: צַדִּיקִים
  english_pob_choice: the righteous
  chosen_spanish: los justos
  alternatives_spanish:
  - los rectos
  - los rectos de corazón
  lexicon: HALOT
  rationale: «Justos» es el equivalente bíblico estándar para צדיקים y preserva el matiz moral y relacional del término en el marco sapiencial.
theological_decisions:
- issue: Alcance de «el juicio»
  english_pob_reading: Rendered generically as 'the judgment' without specifying whether it is present judicial scrutiny, final judgment, or both.
  chosen_spanish_reading: «En el juicio» se deja de forma genérica, sin decidir si se trata de una evaluación judicial presente, del juicio final, o de ambos.
  alternative_spanish_readings:
  - en el juicio final
  - ante el tribunal
  - en el examen judicial
  rationale: El hebreo permite un sentido judicial amplio, y el contexto sapiencial sostiene la tensión entre evaluación inmediata y rendición de cuentas última. La traducción en español conserva esa amplitud sin resolverla prematuramente.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: El borrador sigue de cerca la revisión inglesa más reciente, que se mantuvo sin cambios tras la verificación cruzada de alta concordancia; por tanto, no hay ajustes textuales adicionales que reflejar.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como forma predeterminada cuando aparece el nombre divino, pero este versículo no lo contiene.
  - Se evita «Señor» como sustituto no presente en el hebreo.
  - «Impíos», «pecadores», «justos» y «juicio» conservan el registro bíblico y la distinción moral/judicial del texto fuente.
  - La nota [a] en el texto marca la ambigüedad semántica de מִשְׁפָּט; la nota [b] preserva la alternativa léxica para עֵדָה.
