    text: Or 'like a tender shoot.' The Hebrew יוֹנֵק can denote a tender sprout/shoot in this plant image.
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'before him'; the referent may be understood as the LORD, but the text does not restate it explicitly.
    reason: alternative_reading
  - marker: c
    text: Or more literally, 'and we saw him, and there was no appearance that we should desire him.'
    reason: alternative_reading
