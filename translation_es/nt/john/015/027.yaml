translation:
  language: es
  text: Y ustedes también dan testimonio[a][b], porque han estado conmigo desde el principio.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «testifican».
    reason: lexical_alternative
  - marker: b
    text: El griego dice literalmente «ustedes son»; se vierte «han estado» para expresar en español una condición continua desde el principio hasta ahora.
    reason: lexical_alternative
lexical_decisions:
- source_word: καὶ
  english_pob_choice: And
  chosen_spanish: Y
  alternatives_spanish:
  - También
  - Y además
  lexicon: BDAG
  rationale: Conecta de manera simple con la afirmación anterior; en español, la conjunción inicial «Y» conserva la coordinación sin añadir énfasis innecesario.
- source_word: ὑμεῖς δὲ
  english_pob_choice: you also
  chosen_spanish: ustedes también
  alternatives_spanish:
  - también ustedes
  - y ustedes
  lexicon: BDAG
  rationale: El pronombre explícito y enfático se expresa naturalmente con «ustedes también», manteniendo el contraste/continuación suave de δέ y el énfasis sobre los discípulos como testigos.
- source_word: μαρτυρεῖτε
  english_pob_choice: testify
  chosen_spanish: dan testimonio
  alternatives_spanish:
  - testifican
  - son testigos
  lexicon: BDAG
  rationale: «Dan testimonio» comunica bien el sentido forense de μαρτυρέω en español bíblico actual sin sonar artificial; preserva la idea de declarar como testigos.
- source_word: ὅτι
  english_pob_choice: because
  chosen_spanish: porque
  alternatives_spanish:
  - pues
  - ya que
  lexicon: BDAG
  rationale: Aquí introduce la razón de su testimonio; «porque» es la manera más clara y natural de expresar esa relación causal en español.
- source_word: ἀπ’ ἀρχῆς
  english_pob_choice: from the beginning
  chosen_spanish: desde el principio
  alternatives_spanish:
  - desde el comienzo
  - desde el inicio
  lexicon: BDAG
  rationale: Es una equivalencia idiomática fiel y natural. En el contexto de Juan, la frase alude al comienzo histórico de la relación y del ministerio de Jesús con los discípulos.
- source_word: μετ’ ἐμοῦ
  english_pob_choice: with me
  chosen_spanish: conmigo
  alternatives_spanish:
  - en mi compañía
  - junto a mí
  lexicon: BDAG
  rationale: «Conmigo» es la forma más directa y natural para expresar la asociación personal de los discípulos con Jesús.
- source_word: ἐστε
  english_pob_choice: you have been
  chosen_spanish: han estado
  alternatives_spanish:
  - están
  - han permanecido
  lexicon: BDAG
  rationale: Aunque el griego usa presente, el español requiere normalmente un perfecto para expresar una condición continua «desde el principio» hasta ahora. «Han estado» conserva el estado durativo sin borrar el presente griego.
theological_decisions:
- issue: Alcance de «desde el principio»
  english_pob_reading: Se refiere contextualmente a la presencia de los discípulos con Jesús desde el comienzo de su ministerio/discipulado, no a un inicio metafísico absoluto.
  chosen_spanish_reading: La frase se deja como «desde el principio» y se entiende por el contexto como una referencia histórica al comienzo de la relación con Jesús.
  alternative_spanish_readings:
  - desde el principio de todo
  - desde el comienzo absoluto
  rationale: El contexto inmediato trata de la capacidad de los discípulos para dar testimonio por su convivencia histórica con Jesús. La traducción no amplía la frase hacia una afirmación doctrinal más específica que el pasaje no exige.
  doctrine_reference: Preservar la tensión interpretativa sin resolverla en el texto principal.
translation_notes:
  revision_awareness: El pasaje presenta alto acuerdo en el audit trail inglés y no registra cambios recientes sustantivos; se mantiene la decisión óptima de equivalencia para expresar en español el valor durativo de ἐστε sin perder la literalidad contextual.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma general del proyecto, pero este versículo no la activa.
  - Se evita «Cristo» porque el texto no contiene Χριστός.
  - Se usa «testimonio»/«testigo» por coherencia forense con μαρτυρέω y con la nota alternativa preservada.
  - Se conserva el matiz continuo de ἐστε mediante «han estado», siguiendo la lógica del audit trail inglés y una construcción natural en español.
