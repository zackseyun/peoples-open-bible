  to: Entonces el rey subió a la casa de Yahvé[a], y todo hombre de Judá, y los habitantes de Jerusalén, y los sacerdotes y los levitas, y todo el pueblo, desde el mayor hasta el menor; y leyó a oídos de ellos[b] todas las palabras del libro del pacto que había sido hallado en la casa de Yahvé.
