revisions:
- from: Así, los sacerdotes y los levitas se consagraron para subir el arca[a] de Yahvé, el Dios de Israel.
  to: Así, los sacerdotes y los levitas se consagraron[a] para llevar el arca de Yahvé, el Dios de Israel, hacia arriba.
  rationale: Se revisa «para subir el arca» a «para llevar el arca … hacia arriba» para reflejar con más claridad el hiphil causativo לְהַעֲלוֹת y la elección auditada «to bring up». También se mueve el marcador de nota a «se consagraron», que es el elemento léxico realmente comentado por la nota. Se mantiene «Yahvé» según la norma del proyecto.
