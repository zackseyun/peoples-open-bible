base_translation:
  language: en
  yaml_path: translation/ot/genesis/042/007.yaml
  text: When Joseph saw his brothers[a], he recognized them, but he disguised himself to them and spoke harshly to them. He said to them, “Where have you come from?” And they said, “From the land of Canaan[b], to buy food.”
  footnotes:
  - marker: a
    text: Or, “he disguised himself to them” / “he made himself unrecognizable to them.” The Hebrew can denote presenting himself as foreign or unknown to them.
    reason: lexical_alternative
  - marker: b
    text: Or, “to buy grain.” In this famine context the Hebrew verb often refers specifically to purchasing grain, though the noun here is the broader “food.”
    reason: lexical_alternative
