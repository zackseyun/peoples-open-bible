translation:
  language: es
  text: 'Y de entre los hijos de Emer: Ananías[a], Zabdaios, Manes, Thamaios, Jereel[b] y Azarías.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El paralelo hebreo suele preservar este nombre en una forma más familiar, como «Immer»; aquí se traduce según el griego de 1 Esdras, que da «Emer».
    reason: cross_reference
  - marker: b
    text: Algunos nombres de este versículo son difíciles de alinear exactamente con el paralelo hebreo, porque 1 Esdras a veces rehace o reordena sus listas fuente.
    reason: cultural_note
lexical_decisions:
- source_word: καὶ ἐκ τῶν υἱῶν
  english_pob_choice: from the sons of
  chosen_spanish: de entre los hijos de
  alternatives_spanish:
  - de los hijos de
  - entre los hijos de
  lexicon: LSJ
  rationale: En una lista genealógica, la expresión griega indica pertenencia dentro de un grupo familiar. «De entre» conserva la idea de extracción/membresía del conjunto sin sonar forzado en español.
- source_word: Ἐμὴρ
  english_pob_choice: Emer
  chosen_spanish: Emer
  alternatives_spanish:
  - Immer
  - Emmer
  lexicon: LSJ
  rationale: Se sigue la forma griega del texto base, como hace el POB inglés. Aunque el paralelo hebreo sugiere «Immer», la fuente primaria aquí es el griego de 1 Esdras.
- source_word: Ἀνανίας
  english_pob_choice: Ananias
  chosen_spanish: Ananías
  alternatives_spanish:
  - Hananías
  lexicon: LSJ
  rationale: Se translitera la forma griega con la adaptación habitual al español bíblico. «Hananías» reflejaría más de cerca el hebreo paralelo, pero el testimonio griego es el ancla principal.
- source_word: Ζαβδαῖος
  english_pob_choice: Zabdaios
  chosen_spanish: Zabdaios
  alternatives_spanish:
  - Zabdías
  - Zabdai
  lexicon: LSJ
  rationale: Se conserva la forma griega sin normalizarla a una reconstrucción hebrea. Así se mantiene la trazabilidad al texto fuente.
- source_word: Μάνης
  english_pob_choice: Manes
  chosen_spanish: Manes
  alternatives_spanish:
  - Mane
  - Maanes
  lexicon: LSJ
  rationale: Transliteración directa de la forma griega. Otras opciones irían más allá de lo que la grafía presente permite afirmar.
- source_word: Θαμαῖος
  english_pob_choice: Thamaios
  chosen_spanish: Thamaios
  alternatives_spanish:
  - Tamaios
  - Thamais
  lexicon: LSJ
  rationale: Se mantiene la transliteración del griego para preservar la forma del nombre en esta lista.
- source_word: Ἰερεὴλ
  english_pob_choice: Jereel
  chosen_spanish: Jereel
  alternatives_spanish:
  - Jerel
  - Jereel
  lexicon: LSJ
  rationale: El nombre griego es difícil de representar en español. «Jereel» sigue de cerca la forma del POB inglés revisado y refleja mejor Ἰερεὴλ que una simplificación como «Jerel».
- source_word: Ἀζαρίας
  english_pob_choice: Azarias
  chosen_spanish: Azarías
  alternatives_spanish:
  - Azarias
  lexicon: LSJ
  rationale: Se usa la forma española bíblica habitual, sin perder el vínculo con la transliteración griega. Aquí la forma con acento es natural y claramente reconocible en español.
translation_notes:
  revision_awareness: La redacción sigue de cerca el texto griego de Swete y mantiene la decisión del POB inglés de transliterar los nombres según la forma griega. Se ajustó «Azarías» a la forma española natural, y se conservó «Jereel» para reflejar mejor la revisión inglesa reciente que corrigió la forma anterior más corta.
  spanish_consistency_notes:
  - Se mantuvo la fórmula genealógica con un giro natural en español («de entre»).
  - Se preservó la tensión entre la forma griega primaria y el paralelo hebreo en notas breves.
  - Los nombres propios se trataron de manera consistente como transliteraciones auditables, con solo la adaptación española habitual en Azarías.
