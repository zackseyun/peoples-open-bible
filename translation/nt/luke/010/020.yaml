id: LUK.10.20
reference: Luke 10:20
source:
  edition: SBLGNT
  text: πλὴν ἐν τούτῳ μὴ χαίρετε ὅτι τὰ πνεύματα ὑμῖν ὑποτάσσεται, χαίρετε δὲ ὅτι τὰ ὀνόματα ὑμῶν ⸀ἐγγέγραπται ἐν τοῖς οὐρανοῖς.
translation:
  text: Nevertheless[a], do not rejoice in this, that the spirits submit to you[c][b], but rejoice that your names have been written in the heavens.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Or, more traditionally, ''in heaven.'' The Greek is plural: ''in the heavens.'''
    reason: lexical_alternative
  - marker: b
    text: Or 'are subject to you.'
    reason: lexical_alternative
  - marker: c
    text: The context implies hostile spiritual beings; alternatively, 'demons' or 'evil spirits,' though the Greek here says simply 'the spirits.'
    reason: lexical_alternative
lexical_decisions:
- source_word: πλὴν
  chosen: Nevertheless
  alternatives:
  - However
  - But
  lexicon: BDAG
  rationale: Marks a strong qualification or corrective contrast to the disciples' prior joy; 'Nevertheless' preserves the adversative force with suitable gravity.
- source_word: ἐν τούτῳ
  chosen: in this
  alternatives:
  - about this
  - over this
  lexicon: BDAG
  rationale: A fairly literal rendering that keeps the demonstrative focus of Jesus' correction. English idiom allows 'rejoice in this' naturally enough.
- source_word: μὴ χαίρετε ... χαίρετε δὲ
  chosen: do not rejoice ... but rejoice
  alternatives:
  - do not be glad ... but be glad
  - do not celebrate ... but celebrate
  lexicon: BDAG
  rationale: Using the same English verb for both imperatives preserves the rhetorical contrast and lexical repetition of χαίρω.
- source_word: τὰ πνεύματα
  chosen: the spirits
  alternatives:
  - spirits
  - evil spirits
  - demons
  lexicon: BDAG
  rationale: The article is retained. Although the context implies hostile spirits, πνεύματα itself is broader than 'demons'; 'the spirits' preserves the Greek wording without over-specifying.
- source_word: ὑμῖν ὑποτάσσεται
  chosen: submit to you
  alternatives:
  - are subject to you
  - are subjected to you
  lexicon: BDAG
  rationale: '''Submit to you'' is clear modern English and captures the present passive/middle sense of being placed under their authority.'
- source_word: τὰ ὀνόματα ὑμῶν
  chosen: your names
  alternatives:
  - the names of you
  lexicon: BDAG
  rationale: Natural English possessive rendering of the genitive pronoun with no loss of meaning.
- source_word: ἐγγέγραπται
  chosen: have been written
  alternatives:
  - are written
  - stand written
  - have been recorded
  lexicon: BDAG
  rationale: The perfect tense indicates a completed action with abiding result. 'Have been written' communicates that force more transparently than the simple present 'are written.'
- source_word: ἐν τοῖς οὐρανοῖς
  chosen: in the heavens
  alternatives:
  - in heaven
  - in the heavenly realms
  lexicon: BDAG
  rationale: The Greek is plural, and 'the heavens' preserves that form more closely than the traditional singular 'in heaven.' This follows original-language primacy over translation tradition.
