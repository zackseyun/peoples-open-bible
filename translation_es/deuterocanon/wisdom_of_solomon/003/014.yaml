translation:
  language: es
  text: Y el eunuco que no ha cometido iniquidad con su mano, ni ha concebido cosas malas contra el Señor, recibirá la gracia escogida de la fe[a] y una herencia más agradable[b] en el templo del Señor.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «un don escogido de fe», «la gracia escogida de la fidelidad» o «la gracia más selecta de la confianza». La frase griega es compacta y permite más de un matiz tanto para «gracia» como para «fe».
    reason: lexical_alternative
  - marker: b
    text: O «una porción más agradable» o «una herencia más deseable» en el templo del Señor.
    reason: lexical_alternative
lexical_decisions:
- source_word: εὐνοῦχος
  english_pob_choice: eunuch
  chosen_spanish: eunuco
  alternatives_spanish:
  - castrado
  - hombre eunuco
  lexicon: LSJ
  rationale: El griego nombra específicamente a un eunuco; conservar el término concreto mantiene la fuerza social y literal del texto. En español, 'eunuco' es la forma más directa y reconocible.
- source_word: ἐργασάμενος ἐν χειρὶ ἀνόμημα
  english_pob_choice: who has not committed lawlessness with his hand
  chosen_spanish: que no ha cometido iniquidad con su mano
  alternatives_spanish:
  - que no ha hecho maldad con su mano
  - que no ha cometido ilegalidad con su mano
  lexicon: LSJ
  rationale: El original une acción concreta ('con su mano') con un acto sin ley. 'Iniquidad' conserva el peso moral y legal de ἀνόμημα; 'cometido' expresa mejor la acción culpable que un calco como 'trabajado'.
- source_word: ἐνθυμηθεὶς
  english_pob_choice: nor conceived
  chosen_spanish: ni ha concebido
  alternatives_spanish:
  - ni ha pensado
  - ni ha maquinado
  lexicon: BDAG
  rationale: El participio señala una elaboración interior, no solo una ocurrencia pasajera. 'Ha concebido' preserva el proceso interno de formar maldad en la mente.
- source_word: κατὰ τοῦ κυρίου πονηρά
  english_pob_choice: evil things against the Lord
  chosen_spanish: cosas malas contra el Señor
  alternatives_spanish:
  - maldades contra el Señor
  - cosas perversas contra el Señor
  lexicon: LSJ
  rationale: La construcción expresa hostilidad dirigida contra el Señor. 'Cosas malas' es una opción natural en español, aunque algo menos fuerte que 'evil things'; se mantiene el contraste con la acción interna y externa.
- source_word: τῆς πίστεως χάρις ἐκλεκτὴ
  english_pob_choice: the chosen grace of faith
  chosen_spanish: la gracia elegida de la fe
  alternatives_spanish:
  - el don elegido de la fe
  - la gracia escogida de la fe
  - la gracia electa de la fe
  lexicon: BDAG
  rationale: La frase griega es compacta y admite más de una relación genitiva. 'Gracia elegida de la fe' mantiene la tensión entre gracia/don y la calificación de elección, sin forzar una paráfrasis doctrinal.
- source_word: κλῆρος
  english_pob_choice: inheritance
  chosen_spanish: herencia
  alternatives_spanish:
  - porción
  - lote
  - heredad
  lexicon: BDAG
  rationale: En el contexto de recompensa, κλῆρος puede entenderse como porción asignada. 'Herencia' es idiomática y comunica bien la idea de una participación concedida.
- source_word: ἐν ναῷ Κυρίου
  english_pob_choice: in the temple of the Lord
  chosen_spanish: en el templo del Señor
  alternatives_spanish:
  - en el santuario del Señor
  lexicon: LSJ
  rationale: ναός refiere al templo/santuario. 'Templo del Señor' es la equivalencia más transparente y natural en español.
- source_word: θυμηρέστερος
  english_pob_choice: more delightful
  chosen_spanish: más deleitosa
  alternatives_spanish:
  - más agradable
  - más placentera
  - más deseable
  lexicon: LSJ
  rationale: El comparativo comunica mayor deleite o deseabilidad. 'Deleitosa' conserva el matiz positivo y ligeramente elevado del adjetivo.
theological_decisions:
- issue: Renderización de πίστις en τῆς πίστεως χάρις ἐκλεκτὴ
  english_pob_reading: faith
  chosen_spanish_reading: fe
  alternative_spanish_readings:
  - fidelidad
  - confianza
  rationale: Se conserva 'fe' como equivalente principal, siguiendo el valor doctrinal por defecto del proyecto. La frase sigue siendo compacta y admite lectura tanto de fe como de cualidad relacionada; por eso no se elimina la ambigüedad del griego.
  doctrine_reference: 'DOCTRINE.md Contested terms: πίστις → faith'
- issue: Renderización de κύριος
  english_pob_reading: Lord
  chosen_spanish_reading: Señor
  alternative_spanish_readings:
  - el Señor
  - Yahvé
  rationale: En este contexto de Sabiduría, κύριος se traduce de manera estándar como 'Señor'. Aunque el proyecto prefiere 'Yahvé' para יהוה, aquí el texto fuente griego usa κύριος y la forma litúrgica/convencional resulta adecuada.
  doctrine_reference: 'DOCTRINE.md Contested terms: κύριος → Lord'
translation_notes:
  revision_awareness: Se siguió la última revisión inglesa que corrigió 'worked lawlessness' por 'committed lawlessness'; por ello en español se eligió 'ha cometido iniquidad' para reflejar una acción culpable más natural que un calco verbal. También se mantuvo la compacidad de τῆς πίστεως χάρις ἐκλεκτή sin resolver en exceso su relación genitiva, pues el griego permite más de una lectura.
  spanish_consistency_notes:
  - Se mantuvo 'Señor' para κύριος, coherente con el contexto griego de la obra.
  - '''Fe'' se conservó para πίστις, evitando sustituirla por ''fidelidad'' en el texto principal.'
  - '''Eunuco'' se preservó como término concreto y no se paraphraseó.'
  - '''Templo del Señor'' reproduce de forma natural ναός Κυρίου sin introducir ''santuario'' como opción principal.'
