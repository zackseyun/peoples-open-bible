  text: בֶּן אִשָּׁ֞ה מִן בְּנ֣וֹת דָּ֗ן וְ/אָבִ֣י/ו אִישׁ צֹרִ֡י יוֹדֵ֡עַ לַ/עֲשׂ֣וֹת בַּ/זָּֽהָב וּ֠/בַ/כֶּסֶף בַּ/נְּחֹ֨שֶׁת בַּ/בַּרְזֶ֜ל בָּ/אֲבָנִ֣ים וּ/בָ/עֵצִ֗ים בָּ/אַרְגָּמָ֤ן בַּ/תְּכֵ֨לֶת֙ וּ/בַ/בּ֣וּץ וּ/בַ/כַּרְמִ֔יל וּ/לְ/פַתֵּ֨חַ֙ כָּל פִּתּ֔וּחַ וְ/לַ/חְשֹׁ֖ב כָּל מַחֲשָׁ֑בֶת אֲשֶׁ֤ר יִנָּֽתֶן ל/וֹ֙ עִם חֲכָמֶ֔י/ךָ וְֽ/חַכְמֵ֔י אֲדֹנִ֖/י דָּוִ֥יד אָבִֽי/ךָ־־־־־־־־׃
