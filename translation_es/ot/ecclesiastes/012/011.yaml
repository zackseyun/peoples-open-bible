  to: Las palabras de los sabios son como aguijones, y como clavos firmemente fijados son los dichos recopilados[a]; son dados de un solo pastor[b].
  rationale: 'Se reubicaron y corrigieron las notas para que correspondan a los dos puntos debatidos documentados en la auditoría inglesa: בַּעֲלֵי אֲסֻפּוֹת y מֵרֹעֶה אֶחָד. Se cambió «por un solo pastor» a «de un solo pastor» para reflejar mejor el valor de origen de מִן en español. También se mejoró la naturalidad y dignidad del castellano con «clavos firmemente fijados» y «dichos recopilados», manteniendo la ambigüedad del hebreo sin sobreinterpretar.'
