review_pass:
  verdict: revise
  source_alignment_summary: 'La primera mitad refleja bien el hebreo: futuro promisor, sustantivación de יָשָׁן y matiz intensivo de נוֹשָׁן. El problema principal está en מִפְּנֵי, que aquí expresa causa/desplazamiento por la llegada de lo nuevo, no posición espacial literal. ''Delante de lo nuevo'' cambia el sentido. ''Sacarán'' para תּוֹצִיאוּ es aceptable, aunque en contexto conviene explicitar el desplazamiento práctico.'
  spanish_quality_summary: El español es generalmente claro, pero 'delante de lo nuevo' suena poco natural y semánticamente errado en este contexto agrícola. 'Lo viejo' funciona, aunque 'las provisiones viejas' sería más explícito; no es necesario cambiarlo. La frase mejora con 'a causa de lo nuevo' o 'por lo nuevo'.
  glossary_alignment: 'No hay términos del glosario mayor en juego. La decisión sobre מִפְּנֵי debe alinearse con la razón lexical documentada en el POB inglés: causa/desplazamiento, no localización espacial. Se puede conservar la concisión hebrea con ''lo nuevo''.'
