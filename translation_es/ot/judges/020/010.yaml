  text: וְ/לָקַ֣חְנוּ עֲשָׂרָה֩ אֲנָשִׁ֨ים לַ/מֵּאָ֜ה לְ/כֹ֣ל שִׁבְטֵ֣י יִשְׂרָאֵ֗ל וּ/מֵאָ֤ה לָ/אֶ֨לֶף֙ וְ/אֶ֣לֶף לָ/רְבָבָ֔ה לָ/קַ֥חַת צֵדָ֖ה לָ/עָ֑ם לַ/עֲשׂ֗וֹת לְ/בוֹאָ/ם֙ לְ/גֶ֣בַע בִּנְיָמִ֔ן כְּ/כָל הַ֨/נְּבָלָ֔ה אֲשֶׁ֥ר עָשָׂ֖ה בְּ/יִשְׂרָאֵֽל׀־׃
base_translation:
  language: en
  yaml_path: translation/ot/judges/020/010.yaml
  text: And we will take ten men out of a hundred from all the tribes of Israel[a], and a hundred out of a thousand, and a thousand out of ten thousand, to get provisions for the people, so that when they come to Gibeah of Benjamin[b], they may do according to all the outrage that it committed in Israel.
  footnotes:
  - marker: a
    text: Or 'vile deed' or 'disgraceful act' for 'outrage.' The Hebrew term denotes a shocking, disgraceful act.
    reason: lexical_alternative
  - marker: b
    text: The Hebrew literally says 'to do at their coming to Gibeah of Benjamin,' a compressed expression for taking action once they arrive.
    reason: lexical_alternative
