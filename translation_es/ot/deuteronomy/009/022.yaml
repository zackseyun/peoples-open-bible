translation:
  language: es
  text: Y en Taberá, y en Masá, y en Kibrot-hatavá[a], provocaban la ira de Yahvé.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Kibrot-hatavá es un nombre de lugar; literalmente, 'tumbas del deseo' o 'tumbas del anhelo'.
    reason: lexical_alternative
lexical_decisions:
- source_word: וּ/בְ/תַבְעֵרָה
  english_pob_choice: and at Taberah
  chosen_spanish: y en Taberá
  alternatives_spanish:
  - y en Taberah
  - y en Taberáh
  lexicon: HALOT
  rationale: La frase marca ubicación en una lista de lugares; en español natural se expresa con 'en'. Se conserva el topónimo como transliteración breve y reconocible, ajustado a ortografía española.
- source_word: וּ/בְ/מַסָּה
  english_pob_choice: and at Massah
  chosen_spanish: y en Masá
  alternatives_spanish:
  - y en Massah
  - y en Masáh
  lexicon: HALOT
  rationale: Se trata de un nombre de lugar, no de una cualidad; por eso se translitera y no se traduce. 'En' conserva el valor locativo del hebreo.
- source_word: וּ/בְ/קִבְרֹת הַתַּאֲוָה
  english_pob_choice: and at Kibroth-hattaavah
  chosen_spanish: y en Kibrot-hatavá
  alternatives_spanish:
  - y en Kibrot-hattaavá
  - y en las tumbas del deseo
  lexicon: HALOT
  rationale: El hebreo funciona como topónimo fijo; por eso se conserva el nombre del lugar. La forma española adapta la transliteración a una lectura natural en español, sin perder la referencia al sitio narrativo.
- source_word: מַקְצִפִים
  english_pob_choice: were provoking ... to anger
  chosen_spanish: estuvieron provocando ... a ira
  alternatives_spanish:
  - estaban provocando ... a ira
  - provocaban ... a ira
  - los provocaban a ira
  lexicon: HALOT
  rationale: El participio hifil expresa una acción causativa y sostenida. 'Estuvieron provocando' conserva el aspecto durativo/iterativo mejor que un simple pretérito puntual. 'A ira' reproduce el objeto de la provocación en español bíblico claro.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  - el SEÑOR
  lexicon: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
  rationale: Según el estándar del proyecto, el Tetragrámaton se vierte 'Yahvé' en el texto principal, no como una sustitución devocional tipo 'SEÑOR'. Esto preserva el nombre del pacto presente en el hebreo.
theological_decisions:
- issue: Nombre divino יְהוָה / YHWH
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - el SEÑOR
  rationale: La decisión doctrinal del proyecto es transparentar el nombre divino en el texto. En español, 'Yahvé' es la forma de uso estable y readable que preserva la intención de no ocultar el nombre propio de Dios.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Valor del participio causativo מַקְצִפִים
  english_pob_reading: you were provoking Yahweh to anger
  chosen_spanish_reading: estuvieron provocando a Yahvé a ira
  alternative_spanish_readings:
  - estaban provocando a Yahvé a ira
  - provocaban a Yahvé a ira
  rationale: El hebreo no describe un acto aislado sino una conducta continuada o característica. 'Estuvieron provocando' mantiene la fuerza causal y el carácter sostenido del reproche.
  doctrine_reference: Gramática aspectual del participio hifil en el texto hebreo
translation_notes:
  revision_awareness: 'El borrador sigue de cerca el último estado auditado del inglés POB, pero reexpresa el valor participial hebreo con una solución verbal más natural en español y aplica la convención española del proyecto para el nombre divino: Yahvé. También conserva Kibroth-hattaavah como topónimo, con nota del sentido literal subyacente.'
  spanish_consistency_notes:
  - Se mantuvo 'Yahvé' de forma consistente con el estándar del proyecto para יְהוָה.
  - Se usó 'en' para todos los lugares por uniformidad locativa.
  - Se evitó traducir los topónimos como frases comunes, porque el contexto exige reconocerlos como nombres propios.
  - '''A ira'' preserva el registro bíblico sin recurrir a una perífrasis más interpretativa como ''enfurecer'' o ''hacer enojar''.'
