translation:
  language: es
  text: Ha cercado mi camino, de modo que no puedo pasar[a], y ha puesto tinieblas sobre mis senderos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El sujeto queda implícito en hebreo; en el contexto Job habla de Dios, aunque el versículo solo dice «él».
    reason: alternative_reading
lexical_decisions:
- source_word: אָרְחִי
  english_pob_choice: my way
  chosen_spanish: mi camino
  alternatives_spanish:
  - mi senda
  - mi ruta
  lexicon: HALOT
  rationale: El sustantivo puede referirse a un camino o trayectoria. «Camino» es natural en español y conserva tanto la imagen concreta como el valor figurado del curso de vida de Job.
- source_word: גָדַר
  english_pob_choice: has walled up
  chosen_spanish: ha cercado
  alternatives_spanish:
  - ha amurallado
  - ha vallado
  lexicon: HALOT
  rationale: El verbo expresa la idea de cercar, cercar con muro o valla. «Ha cercado» mantiene la imagen de obstrucción física sin sonar forzado en español, y sigue de cerca la concreción del hebreo y del inglés POB.
- source_word: וְלֹא אֶעֱבֹר
  english_pob_choice: so that I cannot pass
  chosen_spanish: de modo que no pueda pasar
  alternatives_spanish:
  - y no puedo pasar
  - para que no pase
  lexicon: HALOT
  rationale: La cláusula expresa el resultado de la acción anterior. «De modo que no pueda pasar» hace explícita la relación causal/resultativa que el hebreo sugiere, sin añadir contenido nuevo.
- source_word: נְתִיבוֹתַי
  english_pob_choice: my paths
  chosen_spanish: mis senderos
  alternatives_spanish:
  - mis caminos
  - mis huellas
  lexicon: HALOT
  rationale: El plural hebreo habla de sendas o caminos. «Senderos» conserva el plural poético y evita repetir «camino» en ambas mitades del verso, manteniendo variedad estilística sin perder sentido.
- source_word: חֹשֶׁךְ
  english_pob_choice: darkness
  chosen_spanish: tinieblas
  alternatives_spanish:
  - oscuridad
  - noche
  lexicon: HALOT
  rationale: La palabra designa oscuridad/tinieblas. «Tinieblas» es plenamente bíblico y poético en español, y comunica bien la carga de juicio y desorientación presente en el verso.
- source_word: יָשִׂים
  english_pob_choice: has set
  chosen_spanish: ha puesto
  alternatives_spanish:
  - ha colocado
  - pone
  lexicon: HALOT
  rationale: El verbo significa poner o colocar. «Ha puesto» es directo, natural y conserva el carácter de acción ya realizada que el inglés POB refleja con el perfecto.
- source_word: וְעַל נְתִיבוֹתַי חֹשֶׁךְ יָשִׂים
  english_pob_choice: and he has set darkness upon my paths
  chosen_spanish: y ha puesto tinieblas sobre mis senderos
  alternatives_spanish:
  - y ha puesto oscuridad sobre mis caminos
  - y oscurece mis senderos
  lexicon: HALOT
  rationale: La preposición עַל se rinde con «sobre» para mantener la imagen de algo extendido encima del camino. Se conserva la estructura verbal concreta del hebreo, evitando una paráfrasis como «oscurece» que debilitaría el cuadro poético.
theological_decisions:
- issue: Sujeto implícito de la acción
  english_pob_reading: he
  chosen_spanish_reading: Él
  alternative_spanish_readings:
  - Dios
  - el SEÑOR
  rationale: El hebreo omite el sujeto, y el contexto de Job apunta a Dios, pero el versículo no lo nombra. En español se mantiene el pronombre implícito/enfático «Él» para respetar el flujo literario y no introducir un nombre divino no presente en la línea.
  doctrine_reference: Translation philosophy §1, §3
translation_notes:
  revision_awareness: 'El texto coincide con la lectura auditada de alta concordancia: se mantiene la imagen de cercar el camino, el resultado de imposibilidad de pasar y la segunda imagen de tinieblas sobre los senderos. No se detectaron revisiones pendientes en el paquete fuente.'
  spanish_consistency_notes:
  - Se conserva el tratamiento poético y concreto del hebreo sin convertirlo en una paráfrasis abstracta.
  - «Camino» / «senderos» evita la repetición exacta y preserva el paralelismo.
  - «Tinieblas» mantiene un registro bíblico natural en español y no sustituye innecesariamente la imaginería del texto.
