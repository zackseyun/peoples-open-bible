translation:
  language: es
  text: 'Hay unos hombres judíos[a] que has nombrado para administrar la provincia de Babilonia: Sadrac, Mesac y Abed-nego. Estos hombres no te han prestado atención, oh rey; no sirven a tus dioses[b] y no adoran la imagen de oro que has levantado.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, «ciertos hombres judíos» o «unos judíos». El arameo literalmente dice «hombres judíos».
    reason: lexical_alternative
  - marker: b
    text: 'El arameo emplea verbos distintos aquí: no «sirven» a tus dioses y no «adoran» la imagen. El segundo verbo también puede expresar la idea de postrarse o rendir homenaje ante ella.'
    reason: lexical_alternative
lexical_decisions:
- source_word: אִיתַי
  english_pob_choice: There are
  chosen_spanish: Hay
  alternatives_spanish:
  - Existen
  - Hay unos
  lexicon: HALOT
  rationale: La partícula existencial aramea introduce la acusación de manera directa. En español, 'Hay' es la forma natural y fiel para abrir la afirmación.
- source_word: גֻּבְרִין יְהוּדָאיִן
  english_pob_choice: certain Jewish men
  chosen_spanish: unos hombres judíos
  alternatives_spanish:
  - ciertos judíos
  - unos judíos
  lexicon: HALOT
  rationale: גֻּבְרִין expresa 'hombres' y יְהוּדָאיִן los identifica como judíos/judeanos. 'Hombres judíos' conserva ambos elementos; 'unos' refleja el matiz indefinido acusatorio sin sobrecargar el texto.
- source_word: דִּי מַנִּיתָ יָתְהוֹן עַל עֲבִידַת מְדִינַת בָּבֶל
  english_pob_choice: whom you have appointed over the administration of the province of Babylon
  chosen_spanish: que has puesto sobre la administración de la provincia de Babilonia
  alternatives_spanish:
  - que has nombrado sobre los asuntos de la provincia de Babilonia
  - que has nombrado sobre el servicio de la provincia de Babilonia
  lexicon: HALOT
  rationale: מַנִּיתָ admite 'nombrar' o 'poner'; 'has puesto' es natural y mantiene la idea de designación. עֲבִידַת, en contexto administrativo, se entiende mejor como 'administración' que como 'servicio', y מְדִינַת בָּבֶל se traduce como 'provincia de Babilonia'.
- source_word: שַׁדְרַךְ מֵישַׁךְ וַעֲבֵד נְגוֹ
  english_pob_choice: Shadrach, Meshach, and Abed-nego
  chosen_spanish: Sadrac, Mesac y Abed-nego
  alternatives_spanish:
  - Sadrac, Mesac y Abed-nego
  lexicon: Transliteration
  rationale: Se usan las formas habituales en español para los nombres propios, conservando la transliteración estable del capítulo.
- source_word: גֻּבְרַיָּא אִלֵּךְ
  english_pob_choice: These men
  chosen_spanish: Estos hombres
  alternatives_spanish:
  - Esos hombres
  - Aquellos hombres
  lexicon: HALOT
  rationale: El demostrativo retoma a los nombrados con fuerza deíctica. 'Estos hombres' reproduce bien la referencia inmediata y la carga acusatoria.
- source_word: לָא שָׂמוּ ... טְעֵם
  english_pob_choice: have paid no attention to you
  chosen_spanish: no te han prestado atención
  alternatives_spanish:
  - no te han hecho caso
  - no te han mostrado respeto
  lexicon: HALOT
  rationale: La expresión aramea literalmente habla de no 'poner' atención/consideración. 'No te han prestado atención' transmite el sentido idiomático sin fijar indebidamente 'mandato' cuando el objeto explícito es el rey.
- source_word: מַלְכָּא
  english_pob_choice: O king
  chosen_spanish: oh rey
  alternatives_spanish:
  - rey
  lexicon: HALOT
  rationale: Es un vocativo cortesano; 'oh rey' conserva la dirección directa y el tono ceremonial del discurso.
- source_word: לָא פָלְחִין
  english_pob_choice: they do not serve your gods
  chosen_spanish: no sirven a tus dioses
  alternatives_spanish:
  - no adoran a tus dioses
  - no rinden servicio a tus dioses
  lexicon: HALOT
  rationale: פָלַח denota servicio cultual a una deidad. 'Servir' preserva la distinción con סָגַד y mantiene el contraste intencional del versículo.
- source_word: וּלְצֶלֶם דַּהֲבָא
  english_pob_choice: the golden image
  chosen_spanish: la imagen de oro
  alternatives_spanish:
  - el ídolo de oro
  - la estatua de oro
  lexicon: HALOT
  rationale: La construcción expresa una imagen hecha de oro. 'Imagen de oro' sigue de cerca la forma del original y evita introducir un matiz más interpretativo como 'ídolo'.
- source_word: דִּי הֲקֵימְתָּ
  english_pob_choice: that you have set up
  chosen_spanish: que has levantado
  alternatives_spanish:
  - que has erigido
  - que has establecido
  lexicon: HALOT
  rationale: הֲקֵים significa levantar, poner en pie o erigir. 'Has levantado' es natural en español y conserva la imagen de una estatua alzada.
- source_word: לָא סָגְדִין
  english_pob_choice: they do not worship
  chosen_spanish: no se postran
  alternatives_spanish:
  - no adoran
  - no se inclinan
  lexicon: HALOT
  rationale: סְגַד implica postración reverente ante una imagen. 'No se postran' preserva el gesto físico y mantiene la distinción con el verbo anterior de servicio cultual.
theological_decisions:
- issue: Distinguir dos verbos distintos para la negativa religiosa
  english_pob_reading: Render פָלְחִין as 'serve' and סָגְדִין as 'worship'
  chosen_spanish_reading: Renderizar פָלְחִין como 'sirven' y סָגְדִין como 'se postran'
  alternative_spanish_readings:
  - usar 'adoran' para ambos
  - usar 'rinden culto' para ambos
  rationale: 'El arameo usa dos verbos distintos: uno para el servicio cultual a los dioses y otro para la postración ante la imagen. En español, ''servir'' y ''postrarse'' preservan esa distinción sin confundir los actos religiosos señalados por la acusación.'
  doctrine_reference: Translation philosophy §5 (Consistency of key terms, or documented exception)
translation_notes:
  revision_awareness: El texto sigue de cerca el packet fuente y el audit trail inglés. Se mantuvo la distinción verbal entre פָלְחִין y סָגְדִין, se tradujo מְדִינַת בָּבֶל como 'provincia de Babilonia', y se evitó suavizar la acusación original más allá de lo que permite el arameo.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' como norma del proyecto cuando aparece el Nombre divino; en este versículo no aparece.
  - Se conserva 'Babilonia' con la forma española estándar del topónimo.
  - 'Los nombres propios se transliteran con la forma usual en español: Sadrac, Mesac y Abed-nego.'
  - Se preserva el tono judicial/acusatorio del pasaje con una sintaxis clara y publicable.
