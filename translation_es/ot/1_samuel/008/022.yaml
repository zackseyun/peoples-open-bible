translation:
  language: es
  text: 'Y Yahvé dijo a Samuel[a]: «Escucha su voz y ponles un rey». Entonces Samuel dijo a los hombres de Israel[b]: «Vayan, cada hombre a su ciudad».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «hazles caso» / «obedece su voz». El hebreo «escuchar su voz» es un modismo que puede implicar conformarse con lo que piden.
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: «los hombres de Israel». La expresión puede referirse representativamente a los israelitas reunidos.'
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  - el SEÑOR
  lexicon: HALOT
  rationale: El Tetragrámaton se conserva como nombre propio divino en español, siguiendo la política del proyecto. "Yahvé" evita la sustitución por un título y refleja la decisión auditable del POB en inglés.
- source_word: שְׁמַע בְּקוֹלָם
  english_pob_choice: Listen to their voice
  chosen_spanish: Escucha su voz
  alternatives_spanish:
  - Obedece su voz
  - Haz caso a su voz
  - Escucha lo que dicen
  lexicon: HALOT
  rationale: La construcción hebrea es un modismo para prestar atención y atender lo pedido. "Escucha su voz" preserva el giro idiomático sin sobreinterpretarlo como un mandato explícito de obediencia, aunque el contexto sí implica conformidad.
- source_word: וְהִמְלַכְתָּ לָהֶם מֶלֶךְ
  english_pob_choice: make a king for them
  chosen_spanish: hazles un rey
  alternatives_spanish:
  - ponles un rey
  - establece para ellos un rey
  - haz un rey para ellos
  lexicon: HALOT
  rationale: El verbo causativo de מלך expresa instalar o constituir rey. "Hazles un rey" conserva la fuerza causativa y suena natural en español; "un rey" mantiene el sustantivo explícito del hebreo.
- source_word: אַנְשֵׁי יִשְׂרָאֵל
  english_pob_choice: the men of Israel
  chosen_spanish: los hombres de Israel
  alternatives_spanish:
  - los israelitas
  - el pueblo de Israel
  lexicon: HALOT
  rationale: Se mantiene el masculino plural del hebreo, en línea con la decisión del POB de no neutralizar esta expresión. En este contexto funciona representativamente para el grupo reunido.
- source_word: לְכוּ
  english_pob_choice: Go
  chosen_spanish: Vayan
  alternatives_spanish:
  - Vayanse
  - Id
  - Salgan
  lexicon: HALOT
  rationale: Imperativo plural natural y digno en español. "Vayan" transmite adecuadamente la despedida breve del original.
- source_word: אִישׁ לְעִירוֹ
  english_pob_choice: each man to his city
  chosen_spanish: cada hombre a su ciudad
  alternatives_spanish:
  - cada uno a su ciudad
  - cada hombre a su pueblo
  - cada uno a su ciudad
  lexicon: HALOT
  rationale: La distribución de אִישׁ se expresa con "cada hombre"; "ciudad" conserva el sustantivo del hebreo. La frase funciona como fórmula de dispersión o regreso a casa.
theological_decisions:
- issue: Nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Jehová
  - el SEÑOR
  rationale: Se preserva el nombre propio del pacto en lugar de una sustitución titular. Esto sigue la doctrina del proyecto para el Tetragrámaton y evita ocultar el texto original.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Tratamiento del mandato divino en שְׁמַע בְּקוֹלָם
  english_pob_reading: listen to their voice / obey their voice
  chosen_spanish_reading: escucha su voz
  alternative_spanish_readings:
  - obedece su voz
  - haz caso a su voz
  rationale: 'Se mantiene la ambigüedad del hebreo: la expresión puede significar oír, atender o acatar. La redacción española deja visible esa tensión sin resolverla demasiado pronto.'
  doctrine_reference: HALOT / nota lexical del POB
- issue: Lenguaje masculino en אַנְשֵׁי יִשְׂרָאֵל y אִישׁ
  english_pob_reading: the men of Israel / each man
  chosen_spanish_reading: los hombres de Israel / cada hombre
  alternative_spanish_readings:
  - los israelitas / cada uno
  - el pueblo de Israel / cada persona
  rationale: Se retiene la forma masculina explícita del hebreo, siguiendo la política de precisión gramatical del proyecto. En el contexto narrativo, la expresión tiene valor representativo y colectivo.
  doctrine_reference: 'DOCTRINE.md Translation philosophy #4: Gender-accurate over gender-neutral'
translation_notes:
  revision_awareness: La redacción sigue la última revisión del POB inglés, que prefirió "make a king for them" para reflejar más directamente el valor causativo de הִמְלַכְתָּ. En español se optó por "hazles un rey", manteniendo ese valor causativo, la naturalidad sintáctica y el registro bíblico sobrio.
  spanish_consistency_notes:
  - Se usa "Yahvé" para יְהוָה de forma consistente con el estándar del proyecto.
  - '"voz" conserva el modismo hebreo sin convertirlo en una paráfrasis interpretativa más fuerte.'
  - '"los hombres de Israel" y "cada hombre" mantienen el masculino explícito del hebreo.'
  - La puntuación reproduce una división natural del discurso directo en español y respeta el cierre narrativo del versículo.
