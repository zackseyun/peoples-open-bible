translation:
  language: es
  text: Y Judas se desvió hacia Azoto[a], la tierra de extranjeros, y derribó sus altares, y quemó con fuego las imágenes esculpidas de sus dioses, y saqueó el botín de las ciudades, y regresó a Judea.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, más específicamente en el contexto histórico, «la tierra de los filisteos». El griego dice más literalmente «la tierra de extranjeros».
    reason: alternative_reading
lexical_decisions:
- source_word: ἐξέκλινεν
  english_pob_choice: turned aside
  chosen_spanish: se desvió
  alternatives_spanish:
  - se apartó
  - torció su camino
  - se desvió del camino
  lexicon: LSJ
  rationale: El verbo expresa cambio de dirección o apartarse de una ruta. «Se desvió» conserva esa fuerza sin añadir motivo no explícito y suena natural en español narrativo.
- source_word: Ἄζωτον
  english_pob_choice: Azotus
  chosen_spanish: Azoto
  alternatives_spanish:
  - Ashdod
  lexicon: LSJ
  rationale: El texto griego usa la forma helenizada Ἄζωτος. En la línea principal se sigue esa forma en español como «Azoto», manteniendo la huella del original; «Ashdod» queda como equivalente histórico posible, pero no es la forma del texto fuente.
- source_word: γῆν ἀλλοφύλων
  english_pob_choice: the land of foreigners
  chosen_spanish: la tierra de extranjeros
  alternatives_spanish:
  - la tierra de los filisteos
  - tierra extranjera
  lexicon: LSJ
  rationale: ἀλλόφυλοι significa literalmente «los de otra tribu / raza» y aquí el griego dice «tierra de extranjeros». «La tierra de extranjeros» preserva la literalidad; la identificación histórica con los filisteos se mantiene en nota.
- source_word: καθεῖλεν
  english_pob_choice: tore down
  chosen_spanish: derribó
  alternatives_spanish:
  - destruyó
  - derribó y demolió
  lexicon: LSJ
  rationale: Aplicado a altares, el verbo pide una imagen concreta de demolición. «Derribó» es breve, claro y fiel al acto físico descrito.
- source_word: βωμοὺς
  english_pob_choice: altars
  chosen_spanish: altares
  alternatives_spanish:
  - altares rituales
  - santuarios
  lexicon: LSJ
  rationale: βωμός designa un altar. «Altares» es la correspondencia directa y no introduce ampliaciones interpretativas.
- source_word: γλυπτὰ
  english_pob_choice: carved images
  chosen_spanish: imágenes esculpidas
  alternatives_spanish:
  - imágenes talladas
  - ídolos
  lexicon: LSJ
  rationale: El término apunta a representaciones talladas o labradas. «Imágenes esculpidas» conserva el rasgo material y evita perderlo al traducir simplemente «ídolos».
- source_word: κατέκαυσαν
  english_pob_choice: they burned
  chosen_spanish: quemó
  alternatives_spanish:
  - quemaron
  - las quemó
  lexicon: LSJ
  rationale: Aunque el griego transmitido presenta un plural, el flujo narrativo sigue con Judas como sujeto. En español se opta por mantener la continuidad sintáctica del relato con «quemó», sin ocultar la cuestión textual; el plural queda documentado en la nota.
- source_word: ἐσκύλευσεν τὰ σκῦλα
  english_pob_choice: plundered the spoil
  chosen_spanish: saqueó el botín
  alternatives_spanish:
  - despojó el botín
  - tomó el botín
  lexicon: LSJ
  rationale: La combinación verbal-nominal expresa saqueo o despojo de los despojos de guerra. «Saqueó el botín» comunica el sentido militar de forma idiomática en español.
- source_word: ἐπέστρεψεν
  english_pob_choice: returned
  chosen_spanish: regresó
  alternatives_spanish:
  - volvió
  - retornó
  lexicon: LSJ
  rationale: En contexto narrativo, «regresó» es la forma más natural y transparente para el movimiento de vuelta.
- source_word: Ἰουδαίαν
  english_pob_choice: Judea
  chosen_spanish: Judea
  alternatives_spanish:
  - Judea (región)
  - la región de Judea
  lexicon: LSJ
  rationale: Ἰουδαία en este período se vierte normalmente como «Judea». Mantener el topónimo estándar en español evita una perífrasis innecesaria.
theological_decisions:
- issue: Sentido de ἀλλόφυλοι en un contexto históricamente asociado con Filistea
  english_pob_reading: the land of foreigners
  chosen_spanish_reading: la tierra de extranjeros
  alternative_spanish_readings:
  - la tierra de los filisteos
  rationale: El griego usa una designación amplia, no el etnónimo directo. La traducción principal conserva esa amplitud; la identificación histórica con Filistea se reserva para la nota, evitando importar una especificación que el texto no explicita.
  doctrine_reference: Translation philosophy §1, §5
- issue: Número verbal en κατέκαυσαν tras verbos singulares
  english_pob_reading: they burned
  chosen_spanish_reading: quemó
  alternative_spanish_readings:
  - quemaron
  rationale: El testimonio griego presenta una forma plural, pero el contexto inmediato mantiene a Judas como sujeto narrativo. Para español, se privilegia la fluidez y la continuidad del sujeto, mientras la nota deja constancia de la forma plural del original y de la posible referencia a sus fuerzas.
  doctrine_reference: PHILOSOPHY.md transparency principle
translation_notes:
  revision_awareness: Se incorporó la observación de revisión sobre la coordinación verbal, pero se evaluó que en español la continuidad narrativa se expresa mejor manteniendo a Judas como sujeto implícito de toda la serie verbal. Por eso el texto principal usa singular («quemó») y la nota documenta el plural griego, preservando transparencia ante la variante sin introducir una ruptura sintáctica innecesaria.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» como norma general del proyecto en otros contextos, pero aquí no aparece el nombre divino.
  - Se usó «Judea» como topónimo estándar y «Azoto» para la forma helenizada del griego.
  - «Imágenes esculpidas» preserva el matiz material de γλυπτά sin caer en un término arcaizante.
  - 'La secuencia verbal sigue el orden del griego: se desvió, derribó, quemó, saqueó, regresó.'
