    text: Es decir, la cabeza no debía quedar totalmente desprendida del cuerpo.
    reason: cultural_note
  revision_rationale: Se corrigió el plural exigido por אֹתָם con ‘las llevará’; se reubicó la nota sobre חַטָּאת al sintagma correcto; se añadió una nota léxica para el verbo ritual מלק; y se suavizó ‘arrancará’ a ‘desprenderá’ para reflejar mejor la acción ritual sin contradecir la cláusula final. También se aligeró ligeramente la expresión espacial para mejorar la legibilidad.
