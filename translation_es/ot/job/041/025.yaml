translation:
  language: es
  text: En la tierra no hay nadie como él[a], hecho sin temor[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «en la tierra no hay su igual»; el hebreo puede expresar semejanza o igualdad en este contexto.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «hecho para no tener miedo», es decir, creado de manera que no esté sujeto al terror.'
    reason: lexical_alternative
lexical_decisions:
- source_word: אֵין
  english_pob_choice: there is none
  chosen_spanish: no hay nadie
  alternatives_spanish:
  - no existe ninguno
  - no hay ninguno
  lexicon: HALOT
  rationale: La partícula existencial negativa pide una negación absoluta; en español, 'no hay nadie' suena natural y preserva esa fuerza sin añadir matices ajenos.
- source_word: עַל עָפָר
  english_pob_choice: on earth
  chosen_spanish: en la tierra
  alternatives_spanish:
  - sobre el polvo
  - sobre la tierra
  lexicon: HALOT
  rationale: El hebreo literalmente dice 'sobre polvo/tierra', pero en el contexto contrasta al ser con el ámbito terrenal; 'en la tierra' comunica el sentido idiomático con claridad.
- source_word: מָשְׁלוֹ
  english_pob_choice: like him
  chosen_spanish: como él
  alternatives_spanish:
  - su igual
  - semejante a él
  lexicon: HALOT
  rationale: Aquí el término expresa comparación/igualdad; 'como él' conserva la relación comparativa de modo natural en español.
- source_word: הֶעָשׂוּ
  english_pob_choice: made
  chosen_spanish: hecho
  alternatives_spanish:
  - formado
  - fabricado
  lexicon: HALOT
  rationale: El pasivo/impersonal de עשה se refleja bien con 'hecho', que es directo y fiel al hecho de haber sido creado o producido.
- source_word: לִבְלִי
  english_pob_choice: without
  chosen_spanish: para no
  alternatives_spanish:
  - sin
  - sin ser
  lexicon: HALOT
  rationale: La construcción puede expresar ausencia o finalidad negativa; elegí una formulación final ('para no') para reflejar la opción auditada 'made to be without fear' y mantener la tensión del hebreo.
- source_word: חָת
  english_pob_choice: fear
  chosen_spanish: temer
  alternatives_spanish:
  - terror
  - miedo
  lexicon: HALOT
  rationale: El sustantivo denota temor, terror o pavor. En español, el infinitivo 'temer' permite conservar la idea de no ser sujeto al miedo/terror sin forzar un sustantivo poco fluido.
theological_decisions:
- issue: 'El valor de לִבְלִי חָת: estado sin temor o finalidad ''hecho para no temer'''
  english_pob_reading: one made without fear; or, 'made to be without fear,' that is, created as one not subject to terror.
  chosen_spanish_reading: hecho para no temer
  alternative_spanish_readings:
  - hecho sin temor
  - hecho sin miedo
  - hecho para no tener miedo
  rationale: El texto hebreo permite tanto una descripción del estado como una lectura teleológica; la forma elegida conserva la ambigüedad útil y deja ver que la criatura fue hecha de tal modo que no está bajo el dominio del terror.
  doctrine_reference: Job 41:25
- issue: מָשְׁלוֹ como comparación o igualdad
  english_pob_reading: like him; or, 'his equal'; the Hebrew term may express likeness or equalness in this context.
  chosen_spanish_reading: como él
  alternative_spanish_readings:
  - su igual
  - igual a él
  rationale: La cláusula niega cualquier semejanza/equivalencia en la tierra. 'Como él' preserva esa amplitud semántica sin decidir indebidamente entre 'semejanza' e 'igualdad'.
  doctrine_reference: Job 41:25
translation_notes:
  revision_awareness: El texto inglés auditado fue revisado solo en puntuación, pasando de un guion largo a una coma; no hay cambio de contenido. La versión española sigue el mismo contenido y conserva la doble posibilidad semántica indicada en la nota.
  spanish_consistency_notes:
  - Se mantiene 'tierra' para עָפָר según el valor idiomático del contexto, no como calco de 'polvo'.
  - Se evita 'Señor' o 'Cristo' porque no aparecen en el versículo.
  - La frase final conserva la ambigüedad de estado/finalidad de לִבְלִי חָת, sin reducirla a una sola explicación.
