translation:
  language: es
  text: y hacia su placenta[a], que sale de entre sus piernas, y hacia sus hijos que dará a luz, porque los comerá en secreto, por falta de todo[b], durante el sitio y la angustia con que tu enemigo te oprimirá dentro de tus puertas[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O ‘su posalumbramiento’. El hebreo se refiere específicamente a lo que sale del vientre durante el parto; también puede traducirse ‘su afterbirth’.
    reason: lexical_alternative
  - marker: b
    text: O ‘por carencia de todo’. La frase expresa una privación extrema durante el sitio.
    reason: lexical_alternative
  - marker: c
    text: ‘Tus puertas’ alude a la ciudad o al poblado bajo asedio, no solo a la estructura de la puerta.
    reason: cultural_note
lexical_decisions:
- source_word: שִׁלְיָתָהּ
  english_pob_choice: her afterbirth
  chosen_spanish: su posparto
  alternatives_spanish:
  - su afterbirth
  - su placenta
  lexicon: HALOT
  rationale: El término hebreo designa el alumbramiento/la criatura expulsada después del parto, con referencia concreta al tejido expulsado. En español, 'posparto' comunica la realidad ligada al parto, pero es menos anatómico que 'placenta'. Para conservar la fuerza del pasaje y la legibilidad, se opta por un equivalente natural; la nota preserva la alternativa más técnica.
- source_word: הַיּוֹצֵת מִבֵּין רַגְלֶיהָ
  english_pob_choice: that comes out from between her legs
  chosen_spanish: que sale de entre sus piernas
  alternatives_spanish:
  - que emerge de entre sus pies
  - que sale de entre sus piernas
  lexicon: HALOT
  rationale: La imagen corporal es deliberadamente directa. 'Piernas' corresponde al uso idiomático del hebreo aquí y evita el falso literalismo de 'pies'. La formulación mantiene el tono crudo del original sin exagerarlo.
- source_word: וּבְבָנֶיהָ אֲשֶׁר תֵּלֵד
  english_pob_choice: and toward her children whom she bears
  chosen_spanish: y hacia sus hijos que ella dará a luz
  alternatives_spanish:
  - y hacia sus niños que ella dará a luz
  - y hacia sus hijos que ella pare
  lexicon: HALOT
  rationale: בנים puede referirse a hijos/descendencia en general. 'Hijos' es la opción más natural y amplia en español. 'Dar a luz' preserva la relación con el nacimiento que trae el verbo ילד sin volver la frase torpe.
- source_word: כִּי תֹאכְלֵם
  english_pob_choice: because she will eat them
  chosen_spanish: porque los comerá
  alternatives_spanish:
  - porque los consumirá
  - pues los comerá
  lexicon: HALOT
  rationale: Se conserva el verbo básico 'comer' para mantener la crudeza del hebreo. 'Consumirá' suavizaría la imagen y perdería concreción. El pronombre directo 'los' es claro en español.
- source_word: בְּחֹסֶר כֹּל
  english_pob_choice: for lack of everything
  chosen_spanish: por falta de todo
  alternatives_spanish:
  - por carencia de todo
  - a causa de total escasez
  lexicon: HALOT
  rationale: La expresión indica privación extrema. 'Por falta de todo' reproduce con naturalidad la idea totalizante y mantiene el sentido causal del hebreo y del POB en inglés.
- source_word: בַּסָּתֶר
  english_pob_choice: in secret
  chosen_spanish: en secreto
  alternatives_spanish:
  - a escondidas
  - ocultamente
  lexicon: HALOT
  rationale: El adverbio hebreo es inequívocamente clandestino. 'En secreto' es la opción más idiomática y sobria en español, acorde con la revisión inglesa más reciente.
- source_word: בְּמָצוֹר וּבְמָצ֔וֹק
  english_pob_choice: during the siege and distress
  chosen_spanish: durante el sitio y la angustia
  alternatives_spanish:
  - durante el asedio y la angustia
  - en el sitio y la angustia
  lexicon: HALOT
  rationale: מָצוֹר es 'sitio' en español militar; 'asedio' también sería válido, pero 'sitio' conserva mejor la dicción más directa. מָצוֹק expresa presión/angustia, por lo que 'angustia' recoge el peso opresivo del término.
- source_word: אֲשֶׁר יָצִיק לְךָ אֹיִבְךָ
  english_pob_choice: with which your enemy will oppress you
  chosen_spanish: con que tu enemigo te oprimirá
  alternatives_spanish:
  - con que tu enemigo te angustiará
  - con que tu enemigo te apretará
  lexicon: HALOT
  rationale: El verbo hiphil comunica hacer presión, constriñendo o afligiendo de manera hostil. 'Oprimir' expresa bien esa presión coercitiva y encaja con el contexto de asedio. 'Con que' traduce la preposición relativa sin forzar la sintaxis.
- source_word: בִּשְׁעָרֶיךָ
  english_pob_choice: within your gates
  chosen_spanish: dentro de tus puertas
  alternatives_spanish:
  - dentro de tus ciudades
  - dentro de tus portones
  lexicon: HALOT
  rationale: La expresión hebrea alude a la ciudad/entorno urbano bajo asedio, no al objeto material de la puerta. 'Dentro de tus puertas' conserva la imagen bíblica; la nota explica que el sentido es urbano/comunitario.
theological_decisions:
- issue: Crude childbirth imagery preserved rather than softened
  english_pob_reading: The verse keeps the concrete, shocking description of afterbirth, childbirth, and cannibalism under siege.
  chosen_spanish_reading: Se conserva la imaginería corporal y perturbadora sin atenuarla.
  alternative_spanish_readings:
  - Se suaviza la imagen para lectura devocional
  - Se reemplaza por una formulación más general
  rationale: El pasaje depende de su crudeza retórica para comunicar la gravedad del juicio del pacto. Suavizarla debilitaría la fuerza del texto y ocultaría la tensión lexical-documentada del hebreo.
  doctrine_reference: Deuteronomio 28; teología de las maldiciones del pacto
- issue: ‘Within your gates’ as city-under-siege idiom
  english_pob_reading: '''Within your gates'' refers to the city or town under siege, not merely the gate structure itself.'
  chosen_spanish_reading: '''Dentro de tus puertas'' se entiende como el espacio urbano de la ciudad sitiada, no solo la estructura física.'
  alternative_spanish_readings:
  - dentro de tus ciudades
  - en tus puertas
  rationale: La expresión hebrea es un idiomático urbano-jurídico. En español, traducirla literalmente preserva el color bíblico, mientras la nota evita una lectura materialista reductiva.
  doctrine_reference: Uso idiomático de 'puertas' en Deuteronomio y literatura deuteronómica
translation_notes:
  revision_awareness: La redacción inglesa más reciente cambió 'secretly' por 'in secret' y 'in the lack of everything' por 'for lack of everything'. La versión española sigue esa revisión con 'en secreto' y 'por falta de todo', manteniendo además la concreción del resto del versículo y la referencia urbana de 'within your gates'.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' como norma general del proyecto, pero este versículo no contiene el tetragrámaton.
  - Se conserva 'sitio' como traducción natural de מָצוֹר y 'angustia' para מָצוֹק, evitando arcaísmos innecesarios.
  - La estructura con 'y hacia...' refleja el paralelismo del hebreo y facilita la correspondencia auditiva con el texto fuente.
