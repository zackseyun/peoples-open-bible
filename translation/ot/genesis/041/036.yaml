  from: for the land for the seven years of famine
  to: for the land against the seven years of famine
  rationale: The repetition of the preposition 'for' is slightly awkward in English. The Hebrew preposition 'לְ' can be translated as 'against' when indicating provision for a future contingency. Using 'against' here improves the English flow and clarifies the purpose of the reserve in relation to the famine, which is a valid interpretation of the Hebrew.
