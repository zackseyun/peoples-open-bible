translation:
  language: es
  text: Toda cama[a] en la que se acueste durante todos los días de su flujo será para ella como la cama de su menstruación, y todo objeto[b] sobre el que se siente quedará impuro, como la impureza de su menstruación.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «lecho». El hebreo מִשְׁכָּב designa el lugar donde uno se acuesta; «cama» es la equivalencia natural en español.
    reason: lexical_alternative
  - marker: b
    text: '«Objeto» traduce aquí כְּלִי en sentido amplio: cualquier artículo o implemento sobre el que ella se siente, no solo un recipiente.'
    reason: lexical_alternative
lexical_decisions:
- source_word: מִשְׁכָּב
  english_pob_choice: bed
  chosen_spanish: cama
  alternatives_spanish:
  - lecho
  - lugar donde se acuesta
  lexicon: HALOT
  rationale: En este contexto legal y corporal, מִשְׁכָּב designa el lugar donde la mujer se acuesta. «Cama» es la equivalencia natural y clara en español, sin perder el referente físico.
- source_word: תִּשְׁכַּב עָלָיו
  english_pob_choice: she lies on
  chosen_spanish: se acueste
  alternatives_spanish:
  - se tienda sobre
  - se recueste sobre
  lexicon: HALOT
  rationale: El verbo con עַל expresa acostarse sobre algo. «Se acueste» conserva el sentido de posición física y funciona bien en español jurídico-bíblico.
- source_word: כָּל יְמֵי זוֹבָהּ
  english_pob_choice: during all the days of her discharge
  chosen_spanish: durante todos los días de su flujo
  alternatives_spanish:
  - durante todos los días de su secreción
  - durante todos los días de su derrame
  lexicon: HALOT
  rationale: זוֹב es un flujo corporal anormal dentro del capítulo. «Flujo» mantiene el valor semántico sin sonar excesivamente técnico; evita reducirlo a una interpretación médica moderna más fuerte que la del hebreo.
- source_word: כְּמִשְׁכַּב נִדָּתָהּ
  english_pob_choice: like the bed of her menstruation
  chosen_spanish: como la cama de su menstruación
  alternatives_spanish:
  - como la cama de su impureza menstrual
  - como su cama menstrual
  lexicon: HALOT
  rationale: נִדָּה aquí se refiere al estado menstrual en el marco ritual. «Menstruación» hace explícito el referente y conserva la comparación sin moralizarla.
- source_word: יִהְיֶה לָּהּ
  english_pob_choice: shall be to her
  chosen_spanish: será para ella
  alternatives_spanish:
  - le será
  - será considerado para ella
  lexicon: HALOT
  rationale: La construcción hebrea expresa clasificación o estado relativo. «Será para ella» reproduce de modo claro la relación establecida por el hebreo.
- source_word: כְּלִי
  english_pob_choice: vessel
  chosen_spanish: vasija
  alternatives_spanish:
  - utensilio
  - objeto
  - recipiente
  lexicon: HALOT
  rationale: כְּלִי es un término amplio para un artículo u objeto. «Vasija» mantiene la amplitud ritual y el registro bíblico, sin limitar indebidamente el objeto a un asiento o a un recipiente específico.
- source_word: תֵּשֵׁב עָלָיו
  english_pob_choice: she sits on
  chosen_spanish: se siente
  alternatives_spanish:
  - se siente sobre
  - se siente encima de
  lexicon: HALOT
  rationale: El hebreo indica sentarse sobre algo. En español, el complemento puede quedar implícito porque ya se menciona la vasija; «se siente» suena más natural y sigue siendo fiel al acto descrito.
- source_word: טָמֵא
  english_pob_choice: unclean
  chosen_spanish: inmunda
  alternatives_spanish:
  - impura
  - no limpia
  lexicon: HALOT
  rationale: En la legislación levítica, טָמֵא expresa impureza ritual, no culpa moral. «Inmunda» conserva el registro tradicional de impureza cultual y mantiene la correspondencia con «impureza» en la segunda mitad del versículo.
- source_word: כְּטֻמְאַת נִדָּתָהּ
  english_pob_choice: like the uncleanness of her menstruation
  chosen_spanish: como la impureza de su menstruación
  alternatives_spanish:
  - como la inmundicia de su menstruación
  - como la impureza menstrual
  lexicon: HALOT
  rationale: טֻמְאָה se refiere a impureza ritual. «Impureza» es el sustantivo natural en español y conserva la conexión lexical con «inmunda».
theological_decisions:
- issue: Impureza ritual vs. pecado moral
  english_pob_reading: Render טָמֵא / טֻמְאָה as ritual 'unclean/uncleanness' rather than moralized language.
  chosen_spanish_reading: 'Traducir טָמֵא / טֻמְאָה como impureza ritual: «inmunda» / «impureza», no como culpa moral.'
  alternative_spanish_readings:
  - pecaminosa/pecado
  - manchada/mancha
  rationale: El pasaje pertenece a leyes de pureza ceremonial. En español, «inmunda» e «impureza» comunican mejor el estatus ritual sin sugerir pecado personal donde el texto no lo hace.
  doctrine_reference: Pureza ritual en Levítico 15; cf. distinción entre estado cultual y culpa ética.
- issue: Sentido de נִדָּה en el contexto
  english_pob_reading: Translate concretely as 'menstruation' in this verse.
  chosen_spanish_reading: Entender נִדָּה aquí como menstruación, no como un concepto más amplio de separación ritual.
  alternative_spanish_readings:
  - impureza menstrual
  - estado menstrual
  rationale: El contexto inmediato remite al ciclo menstrual ya introducido en la sección. «Menstruación» evita cargar el texto con una explicación interpretativa adicional y mantiene visible la comparación.
  doctrine_reference: Levítico 15; uso contextual de נִדָּה en leyes de pureza.
translation_notes:
  revision_awareness: Sin revisiones previas aplicadas en el expediente inglés; el presente borrador sigue la lectura aprobada sin cambios sustanciales respecto del análisis auditado.
  spanish_consistency_notes:
  - Se preserva la distinción léxica entre «inmunda» (estado) e «impureza» (sustantivo) para reflejar טָמֵא / טֻמְאָה.
  - Se usa «menstruación» para נִדָּה siguiendo el contexto de Levítico 15 y la decisión inglesa auditada.
  - «Flujo» se emplea para זוֹב como término amplio y comprensible en español, evitando una especificación médica no exigida por el hebreo.
  - 'La coordinación final mantiene paralelismo: «cama» / «vasija», «inmunda» / «impureza».'
