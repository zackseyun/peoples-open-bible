translation:
  language: es
  text: No contaminen[a] la tierra en la que ustedes están, porque la sangre contamina la tierra, y no se hará expiación[b] por la tierra a causa de la sangre que fue derramada en ella, excepto por la sangre del que la derramó.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'profanen la tierra'. El verbo hebreo comunica la idea de volver moral o sacralmente impura la tierra.
    reason: lexical_alternative
  - marker: b
    text: O 'no podrá hacerse expiación por la tierra respecto de la sangre derramada en ella'.
    reason: lexical_alternative
lexical_decisions:
- source_word: תַחֲנִיפוּ / יַחֲנִיף (חנף, Hiphil)
  english_pob_choice: pollute
  chosen_spanish: contaminar
  alternatives_spanish:
  - profanar
  - manchar ritualmente
  lexicon: HALOT
  rationale: El verbo hebreo expresa volver moral o sacralmente impura la tierra por derramamiento de sangre. 'Contaminar' comunica bien esa idea en español contemporáneo y mantiene la fuerza de contaminación moral sin sonar demasiado técnico. 'Profanar' sería posible, pero desplaza el énfasis hacia lo sagrado de forma más fuerte que el contexto inmediato.
- source_word: הָאָרֶץ
  english_pob_choice: the land
  chosen_spanish: la tierra
  alternatives_spanish:
  - el país
  - el territorio
  lexicon: HALOT
  rationale: En Números se trata de la tierra habitada por Israel dentro del marco del pacto, no de la tierra como planeta. 'La tierra' conserva ese sentido territorial y teológico.
- source_word: כִּי הַדָּם הוּא
  english_pob_choice: for blood itself
  chosen_spanish: porque la sangre
  alternatives_spanish:
  - porque la sangre misma
  - pues es la sangre
  lexicon: HALOT
  rationale: El hebreo usa el pronombre de manera enfática. En español, la repetición inmediata 'la sangre contamina la tierra' ya transmite esa insistencia sin forzar una construcción como 'la sangre misma', que podría sonar más pesada.
- source_word: יְכֻפַּר
  english_pob_choice: atonement can be made
  chosen_spanish: se hará expiación
  alternatives_spanish:
  - se podrá hacer expiación
  - puede ser expiada
  lexicon: HALOT
  rationale: El pasivo de כפר en este contexto apunta a expiación/remoción de culpa de sangre. 'Se hará expiación' conserva el registro cultual y jurídico del término, y es más natural en español bíblico que una frase perifrástica más larga.
- source_word: וְלָאָרֶץ לֹא יְכֻפַּר לַדָּם
  english_pob_choice: and no atonement can be made for the land for the blood
  chosen_spanish: y no se hará expiación por la tierra a causa de la sangre
  alternatives_spanish:
  - y no podrá hacerse expiación por la tierra por la sangre
  - y la tierra no será expiada por la sangre
  lexicon: HALOT
  rationale: La sintaxis hebrea presenta a la tierra como la entidad afectada por la sangre derramada. 'A causa de' hace explícita la relación causal implícita en el hebreo y suena natural en español, sin perder el vínculo entre la sangre y la necesidad de expiación.
- source_word: שֻׁפַּךְ
  english_pob_choice: was shed
  chosen_spanish: fue derramada
  alternatives_spanish:
  - fue vertida
  - se derramó
  lexicon: HALOT
  rationale: Para sangre en contexto legal, 'derramar' es la equivalencia idiomática normal en español y mantiene el tono jurídico del versículo.
- source_word: כִּי אִם
  english_pob_choice: except
  chosen_spanish: excepto
  alternatives_spanish:
  - sino
  - salvo
  lexicon: HALOT
  rationale: '''Excepto'' introduce con claridad la única vía o excepción indicada por el hebreo. En español moderno es preciso y fluido.'
- source_word: בְּדַם שֹׁפְכוֹ
  english_pob_choice: by the blood of the one who shed it
  chosen_spanish: por la sangre del que la derramó
  alternatives_spanish:
  - con la sangre del que la derramó
  - por la sangre del homicida
  lexicon: HALOT
  rationale: El sufijo refiere a la sangre derramada, por lo que el pronombre femenino 'la' en español puede remitir a 'la sangre' o a 'la tierra' según el flujo del texto. Aquí se entiende como la sangre derramada, y 'del que la derramó' conserva esa referencia sin recurrir a una paráfrasis más interpretativa.
theological_decisions:
- issue: Contaminación moral/sacral de la tierra por sangre derramada
  english_pob_reading: The verse teaches that unlawful bloodshed brings real moral-sacral defilement upon the land, and that this bloodguilt is removed only through the execution of the murderer.
  chosen_spanish_reading: El versículo enseña que el derramamiento de sangre contamina realmente la tierra en sentido moral y sacral, y que esa culpa de sangre sólo se remueve mediante la sangre del homicida.
  alternative_spanish_readings:
  - El lenguaje es sólo figurado para el desorden social
  - El enfoque es exclusivamente civil, sin alcance cultual
  rationale: La repetición del mismo verbo y el uso de expiación indican más que una observación civil. La traducción conserva el peso moral y cultual del texto sin introducir categorías posteriores ajenas al versículo.
  doctrine_reference: Translation philosophy §§1, 3, 6
translation_notes:
  revision_awareness: La redacción sigue el pasaje hebreo directamente y toma en cuenta la revisión auditada del inglés POB, que pasó de 'defile' a 'pollute' para reflejar con mayor consistencia el mismo verbo hebreo en ambas ocurrencias. En español se optó por 'contaminar', que mantiene esa repetición verbal y el sentido moral-sacral sin perder naturalidad.
  spanish_consistency_notes:
  - Se mantiene 'la tierra' de forma uniforme para הארץ.
  - Se conserva 'expiación' para כפר, evitando sustituirlo por 'perdón' o 'purificación', que no reflejarían tan bien el marco cultual-jurídico.
  - Se usa 'derramó' para sangre según el uso bíblico normal en español.
  - La nota a explica la alternativa lexical principal sin rebasar lo que el hebreo permite.
