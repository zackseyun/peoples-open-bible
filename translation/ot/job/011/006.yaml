theological_decisions:
- issue: Interpretation of Zophar's claim about God's treatment of Job
  chosen_reading: God has overlooked or not fully called to account part of Job's iniquity
  alternative_readings:
  - God has made you forget your iniquity
  - God exacts from you less than your guilt deserves
  rationale: The Hebrew verb is lexically difficult, but the context strongly favors Zophar's accusation that Job is receiving less punishment than he deserves. The translation preserves that claim without importing a doctrinal endorsement of Zophar's theology; it simply renders his speech faithfully.
  doctrine_reference: Translation philosophy §1, §3
