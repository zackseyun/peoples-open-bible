translation:
  language: es
  text: Pues toda cabeza está calva, y toda barba está cortada; sobre todas las manos[a] hay cortes, y sobre la cintura[b] hay cilicio.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «en cada mano hay cortes». El hebreo dice literalmente «manos», pero puede abarcar también los brazos o antebrazos como zona marcada por cortaduras de duelo.
    reason: lexical_alternative
  - marker: b
    text: Hebreo «lomos»; se traduce «cintura» para un español más claro, conservando la idea del cilicio llevado alrededor de la parte media del cuerpo.
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Ya que
  lexicon: HALOT
  rationale: Introduce la explicación o motivo del lamento con una conjunción causal natural en español; «porque» conserva el valor explicativo sin sonar forzado.
- source_word: כָל רֹאשׁ קָרְחָה
  english_pob_choice: every head is bald
  chosen_spanish: toda cabeza está calva
  alternatives_spanish:
  - cada cabeza está calva
  - toda cabeza está rapada
  lexicon: HALOT
  rationale: קָרְחָה expresa baldura como señal de duelo. «Está calva» conserva el resultado visible de la acción y funciona de manera idiomática en español sin añadir explícitamente la idea de rapado, que el hebreo no exige.
- source_word: וְכָל זָקָן גְּרֻעָה
  english_pob_choice: every beard is cut off
  chosen_spanish: toda barba está cortada
  alternatives_spanish:
  - toda barba está recortada
  - toda barba está cercenada
  lexicon: HALOT
  rationale: גְּרֻעָה comunica disminución o remoción de la barba en contexto de duelo. «Está cortada» preserva la acción/resultante de forma natural y evita un giro demasiado técnico.
- source_word: עַל כָּל יָדַיִם גְּדֻדֹת
  english_pob_choice: on all the hands are gashes
  chosen_spanish: sobre todas las manos hay cortes
  alternatives_spanish:
  - en todas las manos hay heridas
  - sobre todos los brazos hay incisiones
  lexicon: HALOT
  rationale: גְּדֻדֹת son incisiones o cortaduras rituales de luto. «Cortes» es claro y sobrio en español. Mantengo «manos» como el hebreo, sin convertirlo en «brazos» en el texto principal, porque la imagen original permite el sentido amplio sin necesitarlo explícitamente.
- source_word: וְעַל מָתְנַיִם שָׂק
  english_pob_choice: on the waist is sackcloth
  chosen_spanish: sobre la cintura hay cilicio
  alternatives_spanish:
  - sobre los lomos hay cilicio
  - en la cintura hay saco
  lexicon: HALOT
  rationale: מָתְנַיִם designa la zona de la cintura/lomos. Opto por «cintura» por claridad moderna, y por «cilicio» para שָׂק porque en español bíblico esa palabra comunica el vestido de duelo de manera reconocible y no introduce una imagen ajena.
theological_decisions:
- issue: Señales de duelo y autoaflicción en la lamentación
  english_pob_reading: 'The verse describes visible mourning practices: baldness, cut-off beard, gashes on the body, and sackcloth on the waist.'
  chosen_spanish_reading: 'El versículo describe prácticas visibles de duelo: calvicie, barba cortada, cortes en las manos y cilicio en la cintura.'
  alternative_spanish_readings:
  - 'El versículo describe señales de luto: cabeza rasurada, barba cercenada, heridas en las manos y saco en la cintura.'
  - 'El versículo describe signos de duelo: cabeza calva, barba cortada, incisiones en las manos y cilicio en los lomos.'
  rationale: No hay una decisión doctrinal controvertida, pero sí una decisión interpretativa sobre cómo hacer comprensible el repertorio de duelo sin suavizarlo. «Cilicio» mantiene el carácter ritual del signo; «cortes» conserva la crudeza del gesto. Se evita normalizarlo a meras metáforas para no borrar la fuerza del lamento profético.
  doctrine_reference: Lamentaciones proféticas y prácticas de duelo en el Antiguo Testamento; cf. contexto cultural de duelo ritual.
translation_notes:
  revision_awareness: 'Coincide con el sentido estable de la última revisión inglesa: mantener el paralelismo del duelo y la ambigüedad moderada de «hands» sin sobreespecificar la anatomía. No se documentan revisiones textuales que alteren el contenido base.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» para el tetragrámaton en coherencia con el proyecto, aunque este versículo no lo contiene.
  - Se usa «cilicio» como equivalente tradicional y comprensible de שָׂק en un contexto de duelo.
  - Se conserva «manos» en el texto principal y se explica en nota la posible amplitud semántica.
  - La puntuación reproduce el paralelismo del hebreo con una coordinación clara y sobria.
