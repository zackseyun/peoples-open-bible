translation:
  language: es
  text: 'Y Moisés subió a Dios, y Yahvé le llamó desde el monte, diciendo: «Así dirás a la casa de Jacob, y anunciarás a los hijos[a] de Israel:»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «los hijos de Israel» / «el pueblo de Israel». El hebreo dice «hijos de Israel», una expresión colectiva masculina.
    reason: lexical_alternative
lexical_decisions:
- source_word: עָלָה
  english_pob_choice: went up
  chosen_spanish: subió
  alternatives_spanish:
  - ascendió
  - subió
  lexicon: HALOT
  rationale: El verbo expresa movimiento hacia arriba. «Subió» es natural en español moderno y conserva el sentido espacial sin endurecer el estilo con un verbo más elevado de lo necesario.
- source_word: הָאֱלֹהִים
  english_pob_choice: God
  chosen_spanish: Dios
  alternatives_spanish:
  - el Dios
  - Dios
  lexicon: HALOT
  rationale: Con artículo, el hebreo puede leerse de manera literal como «el Dios», pero en español la forma natural en este contexto es «Dios», refiriéndose al Dios de Israel.
- source_word: וַיִּקְרָא אֵלָיו
  english_pob_choice: called to him
  chosen_spanish: le llamó
  alternatives_spanish:
  - le llamó
  - llamó a él
  - lo llamó
  lexicon: HALOT
  rationale: El complemento preposicional hebreo marca dirección hacia Moisés. En español, «le llamó» comunica de forma natural la llamada dirigida a él; el sentido de «a él» queda implícito en el objeto indirecto.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahvé
  - Yahveh
  lexicon: HALOT
  rationale: Se mantiene la transliteración del nombre divino en español como «Yahvé», conforme al estándar del proyecto para יְהוָה, evitando la sustitución por un título.
- source_word: מִן הָהָר
  english_pob_choice: from the mountain
  chosen_spanish: desde el monte
  alternatives_spanish:
  - desde el monte
  - desde la montaña
  lexicon: HALOT
  rationale: «Monte» suena más idiomático en español bíblico para un monte sagrado identificado con Sinaí, sin perder el valor topográfico de הָהָר.
- source_word: כֹּה תֹאמַר
  english_pob_choice: Thus you shall say
  chosen_spanish: Así dirás
  alternatives_spanish:
  - Así dirás
  - De este modo dirás
  - Esto dirás
  lexicon: HALOT
  rationale: La fórmula introduce un encargo formal de comunicación divina. «Así dirás» conserva la solemnidad y la estructura imperativa del hebreo con buena naturalidad en español.
- source_word: לְבֵית יַעֲקֹב
  english_pob_choice: to the house of Jacob
  chosen_spanish: a la casa de Jacob
  alternatives_spanish:
  - a la casa de Jacob
  - a la familia de Jacob
  - a la casa/linaje de Jacob
  lexicon: HALOT
  rationale: Se conserva «casa de Jacob» de forma literal porque expresa la unidad colectiva y pactal del pueblo; es suficientemente transparente en español.
- source_word: וְתַגֵּיד
  english_pob_choice: and tell
  chosen_spanish: y anunciarás
  alternatives_spanish:
  - y anunciarás
  - y dirás
  - y declararás
  lexicon: HALOT
  rationale: El hifil de נגד puede significar «declarar» o «dar a conocer». «Anunciarás» mantiene el peso formal del mandato y evita repetir mecánicamente «dirás»; además suena adecuado para una comunicación solemne.
- source_word: לִבְנֵי יִשְׂרָאֵל
  english_pob_choice: the sons of Israel
  chosen_spanish: a los hijos de Israel
  alternatives_spanish:
  - a los hijos de Israel
  - a los hijos de Israel / a los hijos varones de Israel
  - a los hijos de Israel
  lexicon: HALOT
  rationale: Se conserva el valor masculino colectivo del hebreo con «hijos», en línea con la política del proyecto de no neutralizar automáticamente formas masculinas cuando son representativas y literales. En español «hijos de Israel» es claro y tradicionalmente inteligible.
theological_decisions:
- issue: Nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahvé
  - Yahveh
  rationale: El texto hebreo emplea el Tetragrama de modo directo. Se preserva el nombre propio divino como «Yahvé» en lugar de sustituirlo por una designación como «Señor», manteniendo la transparencia del texto fuente y la coherencia del proyecto.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Expresión colectiva masculina לִבְנֵי יִשְׂרָאֵל
  english_pob_reading: the sons of Israel
  chosen_spanish_reading: los hijos de Israel
  alternative_spanish_readings:
  - los hijos de Israel
  - los hijos/los varones de Israel
  - el pueblo de Israel
  rationale: Se conserva la forma masculina del hebreo para no borrar la estructura original ni la correspondencia con «casa de Jacob». Aunque en uso español puede oírse como colectivo, aquí refleja de forma suficientemente fiel la expresión hebrea.
  doctrine_reference: DOCTRINE.md Translation philosophy §4
translation_notes:
  revision_awareness: 'La redacción sigue de cerca el texto hebreo y coincide sustancialmente con el audit trail inglés: movimiento ascendente de Moisés, llamada de Yahvé desde el monte, y el doble encargo de hablar a la casa de Jacob y de anunciar a los hijos de Israel. Se mantuvo la decisión auditada de preservar el nombre divino y la expresión masculina colectiva, adaptando solo la sintaxis para que resulte fluida y publicable en español.'
  spanish_consistency_notes:
  - Se usó «Yahvé» de manera consistente para יְהוָה, conforme al estándar del proyecto.
  - Se mantuvo la distinción entre «casa de Jacob» y «hijos de Israel» para reflejar el paralelismo hebreo.
  - «Monte» se eligió por naturalidad bíblica en español, sin alterar el referente al Sinaí en el contexto inmediato.
  - El tono reproduce la formalidad del encargo divino sin añadir explicación interpretativa externa.
