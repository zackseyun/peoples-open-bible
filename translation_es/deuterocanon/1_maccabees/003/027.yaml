translation:
  language: es
  text: Cuando Antíoco el rey oyó estas palabras, se enojó mucho, y envió y reunió todas las fuerzas de su reino, un campamento del ejército[a] muy fuerte.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «un campamento muy fuerte» o «una fuerza acampada muy fuerte». El griego παρεμβολή puede referirse al campamento mismo o a la fuerza acampada.
    reason: lexical_alternative
lexical_decisions:
- source_word: Ὡς δὲ
  english_pob_choice: When
  chosen_spanish: Pero cuando
  alternatives_spanish:
  - Y cuando
  - Cuando
  lexicon: LSJ
  rationale: La partícula introductoria marca transición narrativa; «Pero cuando» conserva el avance del relato y el matiz adversativo leve que puede sugerir δέ.
- source_word: ἤκουσεν
  english_pob_choice: heard
  chosen_spanish: oyó
  alternatives_spanish:
  - escuchó
  - se enteró de
  lexicon: LSJ
  rationale: «Oyó» refleja de manera directa la recepción de las palabras y funciona naturalmente en español para un aviso o reporte oído por el rey.
- source_word: τοὺς λόγους τούτους
  english_pob_choice: these words
  chosen_spanish: estas palabras
  alternatives_spanish:
  - este informe
  - estas cosas
  lexicon: LSJ
  rationale: El griego dice literalmente «estas palabras»; se conserva esa formulación sin suavizarla a «informe», aunque el sentido narrativo sea el de un mensaje.
- source_word: ὠργίσθη θυμῷ
  english_pob_choice: became very angry
  chosen_spanish: se enojó mucho
  alternatives_spanish:
  - se enfureció
  - se llenó de ira
  - se irritó mucho
  lexicon: LSJ
  rationale: La combinación intensiva con θυμῷ pide una intensificación real; «se enojó mucho» mantiene la fuerza sin forzar una equivalencia demasiado idiomática o exagerada.
- source_word: ἀπέστειλεν
  english_pob_choice: sent
  chosen_spanish: envió
  alternatives_spanish:
  - mandó
  - despachó
  - mandó a
  lexicon: LSJ
  rationale: «Envió» conserva la acción de remitir o despachar instrucciones o mensajeros, como en el contexto militar implícito.
- source_word: συνήγαγεν
  english_pob_choice: gathered
  chosen_spanish: reunió
  alternatives_spanish:
  - juntó
  - convocó
  - mustered
  lexicon: LSJ
  rationale: «Reunió» expresa bien el acto de congregar fuerzas; en español es claro y no añade un tecnicismo militar innecesario.
- source_word: τὰς δυνάμεις πάσας τῆς βασιλείας αὐτοῦ
  english_pob_choice: all the forces of his kingdom
  chosen_spanish: todas las fuerzas de su reino
  alternatives_spanish:
  - todas las tropas de su reino
  - todo el poder de su reino
  lexicon: LSJ
  rationale: δυνάμεις aquí es militar; «fuerzas» conserva amplitud y exactitud sin reducirlo sólo a tropas regulares.
- source_word: παρεμβολὴν
  english_pob_choice: army camp
  chosen_spanish: campamento militar
  alternatives_spanish:
  - campamento del ejército
  - campamento
  - ejército acampado
  lexicon: LSJ
  rationale: παρεμβολή puede designar el campamento o la fuerza acampada; «campamento militar» refleja el valor campal y mantiene la apposición con lo reunido.
- source_word: ἰσχυρὰν σφόδρα
  english_pob_choice: very strong
  chosen_spanish: muy fuerte
  alternatives_spanish:
  - sumamente fuerte
  - extremadamente fuerte
  - muy poderoso
  lexicon: LSJ
  rationale: La doble intensificación se vierte naturalmente con «muy fuerte», que conserva la fuerza descriptiva del griego sin sobretraducir a «poderoso».
translation_notes:
  revision_awareness: 'La revisión inglesa más reciente suavizó «furiously angry» a «very angry», simplificó «sent out» a «sent» y aclaró παρεμβολή como «army camp». La versión española sigue esa línea: evita una intensificación excesiva, usa «envió» y resuelve παρεμβολή como «campamento militar» para conservar el valor campal y militar del término.'
  spanish_consistency_notes:
  - Se conserva el nombre propio como «Antíoco» y el título «el rey» en orden natural del español.
  - 'Se mantiene la secuencia verbal coordinada del griego: oyó, se enojó, envió y reunió.'
  - «Fuerzas» se usa en sentido militar, no abstracto.
  - «Campamento militar» evita la ambigüedad de un simple «campamento» y respeta la apposición del original.
