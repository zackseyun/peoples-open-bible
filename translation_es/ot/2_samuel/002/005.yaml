revisions:
- from: 'Entonces David envió mensajeros a los hombres de Jabés de Galaad y les dijo: «[a]Benditos sean ustedes de Yahvé, porque han mostrado esta [b]bondad a su señor, a Saúl, y lo han sepultado».'
  to: 'Entonces David envió mensajeros a los hombres de Jabés de Galaad y les dijo: «Benditos son ustedes por Yahvé[a], porque han mostrado esta bondad[b] a su señor, a Saúl, y lo han sepultado».'
  rationale: Se ajusta la fórmula de bendición para reflejar mejor el valor declarativo del participio hebreo y para mejorar la naturalidad del español. También se reubican los marcadores de nota para que anclen exactamente las expresiones comentadas.
