review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura del hebreo: מִנְחָה como ofrenda cultual no animal, una efa con/para el carnero, cantidad variable con los corderos, y un hin de aceite con cada efa. También preserva adecuadamente las notas sobre ל y sobre el modismo מַתַּת יָדוֹ. Sin embargo, la frase principal ''según la dádiva de su mano'' suena demasiado calcada y opaca en español corriente, aunque la nota ya explica el modismo.'
  spanish_quality_summary: La redacción es generalmente clara y digna, pero 'ofrenda vegetal' puede sonar aceptable aunque menos transparente que 'ofrenda de grano' o 'ofrenda de cereal' para lectores generales. El problema principal es 'según la dádiva de su mano', que resulta poco natural y menos legible de lo deseable en español eclesial amplio. Una formulación como 'según lo que su mano pueda dar' mantiene la imagen hebrea y mejora mucho la inteligibilidad.
  glossary_alignment: No hay conflicto con las terminologías troncales del proyecto. 'Ofrenda vegetal' no contradice nada, pero para la claridad del POB en español conviene preferir una expresión más transparente. 'Efa', 'hin', 'aceite', 'carnero' y 'corderos' están bien alineados. La nota b debe limpiarse de comillas sobrantes.
  issues:
  - severity: medium
    issue: La expresión 'según la dádiva de su mano' es demasiado literal y poco natural en español.
    rationale: Aunque reproduce el modismo hebreo, en español moderno suena forzada y menos clara que una alternativa que conserve la imagen de 'mano' y exprese capacidad de dar.
  - severity: low
    issue: La nota b tiene formato torpe con comillas y redacción poco pulida.
    rationale: 'La explicación es correcta, pero la puntuación actual (''Hebreo: ''''la dádiva de su mano''''...'') distrae y debe normalizarse.'
  - severity: low
    issue: '''Ofrenda vegetal'' es comprensible pero menos transparente para lectores generales que ''ofrenda de grano''.'
    rationale: El original se refiere específicamente a una minjá cultual asociada a medida seca; 'de grano' comunica mejor el referente sin perder tecnicidad.
  revised_spanish_text: Y la ofrenda de grano será de una efa con el carnero[a], y con los corderos una ofrenda de grano según lo que su mano pueda dar[b], y un hin de aceite con cada efa.
  revised_footnotes:
  - marker: a
    text: O 'para el carnero'; la preposición hebrea puede marcar asociación o asignación en las instrucciones sacrificiales.
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: ''la dádiva de su mano'', un modismo que significa según lo que puede dar.'
    reason: lexical_alternative
  revision_rationale: Se ajusta el español para mejorar claridad y naturalidad sin perder el sentido fuente ni la auditabilidad del hebreo. 'Ofrenda de grano' comunica mejor מִנְחָה en este contexto sacrificial, y 'según lo que su mano pueda dar' conserva la imagen de 'mano' mientras expresa con claridad el modismo de capacidad. También se normaliza la nota b.
