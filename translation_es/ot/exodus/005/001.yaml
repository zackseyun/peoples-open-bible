    reason: alternative_reading
  - marker: b
    text: O «guarden un festival para mí» o «celebren un festival para mí»; el verbo hebreo se refiere a observar una fiesta o festival.
    reason: lexical_alternative
  revision_rationale: 'Se corrigen dos problemas de alta prioridad: el anclaje de la nota sobre el nombre divino y el contenido de la nota léxica, para que sigan exactamente la evidencia del POB inglés y el hebreo. Además, se ajusta «fueron a hablar con Faraón» a «entraron y le dijeron a Faraón» para reflejar mejor בָּאוּ + וַיֹּאמְרוּ, y se mejora la naturalidad de «me celebren una fiesta» a «celebren una fiesta para mí».'
