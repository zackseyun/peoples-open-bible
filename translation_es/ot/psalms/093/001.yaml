translation:
  language: es
  text: Yahvé reina[a]; está revestido de majestad[b]; Yahvé está revestido de fuerza[e]; se ha ceñido[c]. Ciertamente, el mundo[d] está establecido; no se moverá.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «ha llegado a ser rey». El hebreo puede entenderse de manera ingresiva, pero aquí se toma como proclamación de su reinado presente.'
    reason: alternative_reading
  - marker: b
    text: 'O: «esplendor» para «majestad».'
    reason: lexical_alternative
  - marker: c
    text: 'Literalmente: «se ha ceñido». La imagen es la de ceñirse la fuerza como un cinturón o una armadura.'
    reason: cultural_note
  - marker: d
    text: 'O: «la tierra habitada está firmemente fijada; no vacilará».'
    reason: lexical_alternative
  - marker: e
    text: 'O: «Yahvé está revestido y se ha ceñido de fuerza».'
    reason: previous_rendering
lexical_decisions:
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  - el SEÑOR
  lexicon: HALOT
  rationale: Se conserva el nombre divino del Tetragrámaton como nombre propio, no como título sustituido. 'Yahvé' mantiene la decisión doctrinal y es la forma de uso estándar en el proyecto.
- source_word: מָלָךְ
  english_pob_choice: reigns
  chosen_spanish: reina
  alternatives_spanish:
  - ha llegado a ser rey
  - ha sido entronizado
  lexicon: HALOT
  rationale: En un salmo de entronización, el qatal comunica aquí una realeza presente y declarativa. 'Reina' expresa esa vigencia actual sin forzar el matiz inceptivo.
- source_word: גֵּאוּת
  english_pob_choice: majesty
  chosen_spanish: majestad
  alternatives_spanish:
  - esplendor
  - exaltación
  lexicon: HALOT
  rationale: Para YHWH, el sustantivo denota grandeza real y elevada dignidad. 'Majestad' conserva el tono regio y solemne del hebreo.
- source_word: לָבֵשׁ
  english_pob_choice: is clothed
  chosen_spanish: está revestido
  alternatives_spanish:
  - está vestido
  - se viste
  lexicon: HALOT
  rationale: '''Revestido'' reproduce la metáfora de vestirse como imagen de investidura y dignidad, y suena más elevado en español bíblico que ''vestido''.'
- source_word: עֹז
  english_pob_choice: strength
  chosen_spanish: fuerza
  alternatives_spanish:
  - poder
  - mighty strength
  lexicon: HALOT
  rationale: '''Fuerza'' es la equivalencia más directa y natural en español para el campo semántico de עֹז en este contexto real y teofánico.'
- source_word: הִתְאַזָּר
  english_pob_choice: has girded himself
  chosen_spanish: se ha ceñido
  alternatives_spanish:
  - se ha armado
  - se ha ceñido de
  lexicon: HALOT
  rationale: El hitpael expresa ceñirse a sí mismo; 'se ha ceñido' preserva la imagen corporal de ajustarse el cinturón o las armas. Se evita simplificarlo a 'es fuerte'.
- source_word: אַף
  english_pob_choice: Indeed
  chosen_spanish: Ciertamente
  alternatives_spanish:
  - Sí
  - También
  - Por cierto
  lexicon: HALOT
  rationale: La partícula introduce una afirmación enfática y continuativa. 'Ciertamente' es natural en español y mantiene ese impulso declarativo.
- source_word: תִּכּוֹן
  english_pob_choice: is established
  chosen_spanish: está establecido
  alternatives_spanish:
  - está firmemente fijado
  - permanece firme
  lexicon: HALOT
  rationale: El nifal expresa ser puesto/establecido con firmeza. 'Está establecido' es claro y concuerda con el tono del versículo.
- source_word: תֵּבֵל
  english_pob_choice: the world
  chosen_spanish: el mundo
  alternatives_spanish:
  - la tierra habitada
  - el orbe
  lexicon: HALOT
  rationale: '''Mundo'' comunica bien la tierra habitada y ordenada sin perder naturalidad en español, y distingue este término de ''tierra'' en general.'
- source_word: בַּל תִּמּוֹט
  english_pob_choice: it will not be moved
  chosen_spanish: no se moverá
  alternatives_spanish:
  - no vacilará
  - no será tambaleado
  lexicon: HALOT
  rationale: La idiomática hebrea de estabilidad se vierte con un futuro negativo natural en español. 'No se moverá' mantiene la fuerza bíblica de firmeza y permanencia.
theological_decisions:
- issue: Nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Jehová
  - el SEÑOR
  rationale: Se preserva el nombre personal de Dios revelado a Israel, en coherencia con la política del proyecto y con la transliteración del Tetragrámaton.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Aspecto de מָלָךְ en un salmo de entronización
  english_pob_reading: present 'reigns'
  chosen_spanish_reading: presente 'reina'
  alternative_spanish_readings:
  - ha reinado
  - ha llegado a ser rey
  rationale: El salmo proclama la realeza de Yahvé como realidad actual. 'Reina' evita reducir el verbo a un evento pasado y conserva el valor declarativo del verso.
  doctrine_reference: DOCTRINE.md Translation philosophy §1, §3
translation_notes:
  revision_awareness: 'El texto español sigue la revisión más reciente del inglés auditado: separa las dos acciones del medio con orden paralelo, primero «está revestido de fuerza» y luego «se ha ceñido», reflejando más de cerca el hebreo. También conserva la lectura presente de la realeza y la estabilidad del mundo, en línea con el último pase de revisión.'
  spanish_consistency_notes:
  - Se usa 'Yahvé' para יְהוָה conforme al estándar del proyecto.
  - '''Majestad'' y ''fuerza'' mantienen el tono regio y la imaginería del poema.'
  - '''Se ha ceñido'' conserva la metáfora corporal sin explicarla dentro del texto principal.'
  - '''El mundo'' traduce תֵּבֵל como la tierra habitada/ordenada, no simplemente el planeta abstracto.'
