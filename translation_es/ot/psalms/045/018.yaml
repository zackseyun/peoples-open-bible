translation:
  language: es
  text: Haré que tu nombre sea recordado[a] en cada generación; por eso los pueblos te alabarán[b] por siempre jamás.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «haré mención de tu nombre» o «recordaré tu nombre». El verbo hebreo es causativo, de modo que sugiere no solo recordar, sino hacer que el nombre sea recordado o conmemorado.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «te darán gracias». El verbo hebreo puede denotar alabanza o acción de gracias en contextos de adoración.'
    reason: lexical_alternative
lexical_decisions:
- source_word: אַזְכִּירָה
  english_pob_choice: I will cause ... to be remembered
  chosen_spanish: Haré que ... sea recordado
  alternatives_spanish:
  - haré memoria de
  - haré mención de
  - recordaré
  lexicon: HALOT
  rationale: El hebreo en hifil es causativo; el español «haré que ... sea recordado» conserva esa fuerza activa sin sonar forzado. «Haré mención de» o «haré memoria de» pueden reflejar la idea de mencionar, pero atenúan la causalidad. «Recordaré» perdería el matiz causativo.
- source_word: שִׁמְךָ
  english_pob_choice: your name
  chosen_spanish: tu nombre
  alternatives_spanish:
  - tu fama
  - tu renombre
  - tu memoria
  lexicon: HALOT
  rationale: «Nombre» mantiene el sentido literal e idiomático de reputación/renombre. En español bíblico «tu nombre» es natural y no necesita sustitución por una abstracción.
- source_word: בְּכָל דֹּר וָדֹר
  english_pob_choice: in every generation
  chosen_spanish: en cada generación
  alternatives_spanish:
  - de generación en generación
  - por todas las generaciones
  - en toda generación
  lexicon: HALOT
  rationale: La expresión hebrea es distributiva e intensiva. «En cada generación» preserva bien el valor de sucesión continua y suena natural en español. «De generación en generación» también es posible, pero aquí la forma distributiva responde mejor al hebreo.
- source_word: עַל כֵּן
  english_pob_choice: therefore
  chosen_spanish: por eso
  alternatives_spanish:
  - por tanto
  - así que
  - por consiguiente
  lexicon: HALOT
  rationale: «Por eso» expresa con naturalidad la relación causal o consecutiva del hebreo. «Por tanto» es más formal; «por eso» resulta más fluido en español moderno sin perder la inferencia.
- source_word: עַמִּים
  english_pob_choice: the peoples
  chosen_spanish: los pueblos
  alternatives_spanish:
  - las naciones
  - los pueblos y las naciones
  lexicon: HALOT
  rationale: El plural hebreo apunta a múltiples pueblos. «Los pueblos» respeta el plural y es idiomático en español bíblico; además mantiene el matiz colectivo mejor que un singular genérico.
- source_word: יְהוֹדֻךָ
  english_pob_choice: will praise you
  chosen_spanish: te alabarán
  alternatives_spanish:
  - te darán gracias
  - te confesarán
  - te celebrarán
  lexicon: HALOT
  rationale: La raíz ידה puede incluir alabanza y acción de gracias en contextos de culto. En este verso, «te alabarán» es la opción más clara y natural; «te darán gracias» conserva una alternativa válida que el inglés POB también dejó abierta.
- source_word: לְעוֹלָם וָעֶד
  english_pob_choice: forever and ever
  chosen_spanish: por siempre y para siempre
  alternatives_spanish:
  - para siempre
  - eternamente
  - por los siglos de los siglos
  lexicon: HALOT
  rationale: La pareja hebrea intensifica la duración. «Por siempre y para siempre» reproduce bien esa intensificación y evita el registro más eclesiástico de «por los siglos de los siglos» sin perder solemnidad.
theological_decisions:
- issue: Referencia del pronombre de segunda persona
  english_pob_reading: Retain the direct second-person address without specifying beyond the text
  chosen_spanish_reading: Mantener el trato directo en segunda persona sin identificar al destinatario más allá del verso
  alternative_spanish_readings:
  - dirigido al rey davídico
  - dirigido mesiánicamente al Mesías
  rationale: El verso habla directamente a un «tú». La traducción no debe resolver la cuestión interpretativa que el propio texto deja abierta en el marco del salmo. Mantener el адресamiento directo preserva esa tensión teológica.
  doctrine_reference: Preservar la tensión teológica sin resolverla.
translation_notes:
  revision_awareness: El contexto auditado muestra alta concordancia con el original hebreo y sin revisiones pendientes; la versión española conserva esa relación causal, el plural de «los pueblos» y la intensificación final sin resolver la tensión sobre el destinatario.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» solo cuando el tetragrámaton aparece explícitamente; aquí no aparece, por lo que no se introduce.
  - Se conserva el tratamiento directo «tu/te» para reflejar la segunda persona singular del hebreo.
  - Se evita «Cristo» y lenguaje litúrgico añadido porque el verso no lo exige y el audit trail no documenta una excepción fija.
