  text: וְ/אַ֤ף הֲסִיתְ/ךָ֨ מִ/פִּי צָ֗ר רַ֭חַב לֹא מוּצָ֣ק תַּחְתֶּ֑י/הָ וְ/נַ֥חַת שֻׁ֝לְחָנְ/ךָ֗ מָ֣לֵא דָֽשֶׁן׀־־׃
