base_translation:
  language: en
  yaml_path: translation/ot/jeremiah/031/036.yaml
  text: If these fixed ordinances depart from before me[a], declares Yahweh[c][b], then the offspring of Israel also will cease from being a nation before me forever.
  footnotes:
  - marker: a
    text: Or 'these statutes' or 'these decrees'; the phrase refers in context to the fixed order established for creation.
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'the seed of Israel,' a collective expression meaning Israel's offspring or descendants.
    reason: lexical_alternative
  - marker: c
    text: Or 'forever'; Hebrew 'all the days' is a literal idiom for enduring continuance.
    reason: lexical_alternative
