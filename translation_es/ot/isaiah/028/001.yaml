    text: 'O: «la corona del orgullo ... y la flor que se marchita de su gloriosa hermosura». El hebreo permite leves variaciones en el encuadre de las metáforas para referirse al mismo objeto.'
    reason: lexical_alternative
  - marker: b
    text: «Valle fértil» traduce de manera idiomática «valle de riquezas/fecundidad»; el hebreo dice literalmente «valle de grosuras».
    reason: cultural_note
  - marker: c
    text: 'O: «los que están vencidos por el vino». La expresión hebrea es más vívida y sugiere personas derribadas o golpeadas por el vino.'
    reason: lexical_alternative
  revision_rationale: Se ajustó la topografía a un español más natural («parte alta del valle») y se mejoró la sintaxis de la cláusula final para que el lector entienda que «vencidos por el vino» describe a los borrachos de Efraín. También se cambió el texto principal a «vencidos» para alinearlo mejor con la nota alternativa existente y con la revisión inglesa «overcome by wine», manteniendo la vividez del hebreo sin dureza innecesaria.
