revisions:
- from: Pero si hay un hombre que aborrece a su prójimo, y le acecha, y se levanta contra él, y lo hiere de modo que muere, y huye a una de estas ciudades,
  to: Pero si hay un hombre que aborrece a su prójimo, y le acecha, y se levanta contra él, y lo golpea[a] de modo que muere, y huye a una de estas ciudades,
  rationale: Se conserva la estructura jurídica y la progresión del hebreo, pero se añade la nota léxica exigida por el rastro POB inglés para el modismo de golpe letal. También se ajusta «hiere» a «golpea» para reflejar más directamente נכה, manteniendo el resultado explícito «de modo que muere». No se requiere adjudicación adicional.
