translation:
  language: es
  text: Tu padre hizo más pesado nuestro yugo[a]. Ahora, alivia el duro servicio[b] de tu padre y su pesado yugo que puso sobre nosotros, y te serviremos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «hizo duro nuestro yugo». El hebreo usa la imagen del yugo para obligaciones opresivas.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «la dura servidumbre» o «el duro servicio».'
    reason: lexical_alternative
lexical_decisions:
- source_word: הִקְשָׁה
  english_pob_choice: made our yoke heavy
  chosen_spanish: hizo pesado
  alternatives_spanish:
  - hizo duro
  - volvió pesado
  - agravó
  lexicon: HALOT
  rationale: El hebreo causal de קשׁה expresa hacer pesado/duro/áspero. En español, "hizo pesado" conserva la imagen del yugo y sigue la revisión inglesa que prefirió "heavy" para acercarse más al texto.
- source_word: עֻלֵּנוּ
  english_pob_choice: our yoke
  chosen_spanish: nuestro yugo
  alternatives_spanish:
  - nuestra carga
  - nuestro yugo opresivo
  lexicon: HALOT
  rationale: '"Yugo" preserva la metáfora concreta de opresión y obligación, en paralelo con el segundo hemistiquio. "Carga" sería más interpretativo.'
- source_word: הָקֵל
  english_pob_choice: lighten
  chosen_spanish: alivia
  alternatives_spanish:
  - aligera
  - haz más ligero
  - suaviza
  lexicon: HALOT
  rationale: El imperativo pide hacer menos pesado el régimen. "Alivia" es natural en español y mantiene la fuerza de la petición sin perder la relación conceptual con "pesado".
- source_word: מֵעֲבֹדַת ... הַקָּשָׁה
  english_pob_choice: the hard service of your father
  chosen_spanish: la dura servidumbre de tu padre
  alternatives_spanish:
  - el duro servicio de tu padre
  - la dura labor de tu padre
  - la severa servidumbre de tu padre
  lexicon: HALOT
  rationale: עֲבֹדָה aquí apunta a servicio/trabajo forzado bajo carga política. "Servidumbre" comunica mejor la dimensión de sometimiento que "servicio" solo, y mantiene el matiz de dureza indicado por el adjetivo.
- source_word: וּמֵעֻלּוֹ הַכָּבֵד
  english_pob_choice: and his heavy yoke
  chosen_spanish: y su pesado yugo
  alternatives_spanish:
  - y su yugo pesado
  - y su yugo gravoso
  - y su yugo oneroso
  lexicon: HALOT
  rationale: Se conserva el paralelismo del hebreo entre "yugo" y "pesado". "Pesado" es el equivalente más directo y mantiene la cercanía con la primera cláusula.
- source_word: אֲשֶׁר נָתַן עָלֵינוּ
  english_pob_choice: that he put on us
  chosen_spanish: que puso sobre nosotros
  alternatives_spanish:
  - que echó sobre nosotros
  - que impuso sobre nosotros
  - que nos puso encima
  lexicon: HALOT
  rationale: נתן על en este contexto es imponer una carga. "Puso sobre nosotros" reproduce la imagen de algo colocado encima sin añadir un término más técnico que el hebreo no exige.
- source_word: וְנַעַבְדֶךָּ
  english_pob_choice: and we will serve you
  chosen_spanish: y te serviremos
  alternatives_spanish:
  - y seremos tus servidores
  - y te serviremos a ti
  lexicon: HALOT
  rationale: La forma cohortativa/promisiva se vierte naturalmente como futuro en español. "Serviremos" conserva la promesa de lealtad y dependencia.
- source_word: אָבִיךָ
  english_pob_choice: your father
  chosen_spanish: tu padre
  alternatives_spanish:
  - vuestro padre
  lexicon: HALOT
  rationale: Vocativo singular directo a Roboam; se mantiene la repetición enfática del hebreo en ambos lugares.
- source_word: עַתָּה
  english_pob_choice: So now
  chosen_spanish: Ahora
  alternatives_spanish:
  - Pues ahora
  - Y ahora
  - Así que ahora
  lexicon: HALOT
  rationale: La partícula introduce la transición de queja a petición. "Ahora" es suficiente en español y suena más natural que una fórmula más pesada.
translation_notes:
  revision_awareness: 'La redacción sigue la revisión más reciente del POB inglés: se prefirió "heavy" sobre "harsh" para el yugo y "service" sobre "labor" en el segmento paralelo. Por eso el español mantiene "pesado" y opta por "servidumbre" como equivalente contextual de עֲבֹדָה, reforzando el paralelismo sin abandonar la fuerza opresiva del texto.'
  spanish_consistency_notes:
  - Se mantuvo "yugo" de forma consistente para עֻלֵּנוּ y עֻלּוֹ, evitando sustituirlo por "carga" salvo en nota.
  - Se evitó "SEÑOR" u otros reemplazos teológicos porque el versículo no contiene el nombre divino.
  - '"Servidumbre" se eligió por claridad contextual; no debe leerse como simple cortesía o servicio voluntario.'
  - El paralelismo entre "pesado" y "dura" refleja la duplicación intensificadora del hebreo.
