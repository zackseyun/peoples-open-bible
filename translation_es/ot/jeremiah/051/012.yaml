translation:
  language: es
  text: Contra las murallas de Babilonia, levanten una señal[a]; refuercen la guardia; pongan centinelas; preparen las emboscadas[b]. Porque Yahvé ha planeado y también ha hecho lo que habló contra[c] los habitantes de Babilonia.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «levanten un estandarte» o «levanten una bandera». El hebreo נֵס designa una señal militar elevada.
    reason: lexical_alternative
  - marker: b
    text: O «preparen a los emboscadores». El hebreo puede referirse tanto a los hombres tendidos al acecho como a los puestos de emboscada.
    reason: lexical_alternative
  - marker: c
    text: Hebreo «lo que habló a los habitantes de Babilonia»; en contexto, esto significa una palabra de juicio hablada contra ellos.
    reason: lexical_alternative
lexical_decisions:
- source_word: אֶל חוֹמֹת בָּבֶל
  english_pob_choice: Against the walls of Babylon
  chosen_spanish: Contra las murallas de Babilonia
  alternatives_spanish:
  - A las murallas de Babilonia
  - Junto a las murallas de Babilonia
  lexicon: HALOT
  rationale: En un contexto de asedio, אֶל puede expresar dirección hostil. «Contra» conserva el forcejeo bélico que el inglés POB expresa con «Against», y «murallas» es natural en español para חוֹמֹת.
- source_word: שְׂאוּ נֵס
  english_pob_choice: lift up a signal
  chosen_spanish: levanten una señal
  alternatives_spanish:
  - levanten un estandarte
  - eleven una bandera
  lexicon: HALOT
  rationale: נֵס es un emblema elevado con función militar; «señal» mantiene la amplitud semántica de «signal» sin perder la idea de un marcador visible para la tropa.
- source_word: הַחֲזִיקוּ הַמִּשְׁמָר
  english_pob_choice: strengthen the watch
  chosen_spanish: refuercen la guardia
  alternatives_spanish:
  - fortalezcan la vigilancia
  - sostengan la guardia
  lexicon: HALOT
  rationale: El hifil de חזק pide intensificar o reforzar; «guardia» comunica bien מִשְׁמָר en español militar, y «refuercen» conserva la fuerza imperativa.
- source_word: הָקִימוּ שֹׁמְרִים
  english_pob_choice: station watchmen
  chosen_spanish: pongan centinelas
  alternatives_spanish:
  - establezcan vigilantes
  - coloquen guardias
  lexicon: HALOT
  rationale: הקים en hifil puede significar establecer o colocar; «centinelas» da un matiz militar claro para שֹׁמְרִים y encaja bien con la secuencia de órdenes.
- source_word: הָכִינוּ הָאֹרְבִים
  english_pob_choice: prepare the ambushes
  chosen_spanish: preparen las emboscadas
  alternatives_spanish:
  - preparen a los emboscados
  - preparen a los que acechan
  lexicon: HALOT
  rationale: אָרְבִים puede aludir a quienes emboscan o a las posiciones de emboscada; «emboscadas» reproduce la ambigüedad útil del hebreo y suena natural en español bélico.
- source_word: כִּי גַּם זָמַם יְהוָה
  english_pob_choice: For Yahweh has both planned
  chosen_spanish: Porque Yahvé ha planeado
  alternatives_spanish:
  - Porque Yahvé ha determinado
  - Porque Yahvé ha ideado
  lexicon: HALOT
  rationale: זמם expresa una intención deliberada; «planeado» es claro y formal, y deja intacta la correlación con el siguiente perfecto «ha hecho».
- source_word: גַּם עָשָׂה
  english_pob_choice: and done
  chosen_spanish: y también ha hecho
  alternatives_spanish:
  - y también lo ha realizado
  - y también lo ha cumplido
  lexicon: HALOT
  rationale: La pareja גַּם ... גַּם pide mantener el paralelismo; «también ha hecho» reproduce la concisión del hebreo y la idea de ejecución efectiva.
- source_word: אֵת אֲשֶׁר דִּבֶּר אֶל יֹשְׁבֵי בָבֶל
  english_pob_choice: what he spoke against the inhabitants of Babylon
  chosen_spanish: lo que habló contra los habitantes de Babilonia
  alternatives_spanish:
  - lo que habló a los habitantes de Babilonia
  - lo que declaró contra los habitantes de Babilonia
  lexicon: HALOT
  rationale: En el contexto judicial de la profecía, אֶל puede tener sentido hostil; «contra» preserva la dirección de juicio que el inglés POB resuelve con «against». «Habitantes» refleja יֹשְׁבֵי de forma idiomática.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  - Jehová
  lexicon: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
  rationale: Se conserva el nombre divino propio en español como «Yahvé», conforme al estándar del proyecto, en lugar de sustituirlo por un título.
theological_decisions:
- issue: Alcance profético de la frase final
  english_pob_reading: what he spoke against the inhabitants of Babylon
  chosen_spanish_reading: lo que habló contra los habitantes de Babilonia
  alternative_spanish_readings:
  - lo que habló a los habitantes de Babilonia
  - lo que declaró contra los habitantes de Babilonia
  rationale: La expresión no describe mera comunicación neutral sino palabra profética de juicio. «Contra» mantiene esa carga sin eliminar la observación auditada de que el hebreo usa אֶל.
  doctrine_reference: Jeremiah 51:12 audit trail; lexical note on אֶל יֹשְׁבֵי בָבֶל
- issue: Nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - Jehová
  rationale: El texto hebreo contiene el Tetragrámaton. La forma española del proyecto es «Yahvé», preservando el nombre del pacto sin el disfraz de «SEÑOR».
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
translation_notes:
  revision_awareness: La revisión más reciente indica que no hubo cambios necesarios y el estado de concordancia fue alto; por eso este borrador sigue de cerca el trazado auditado del inglés POB, especialmente en la secuencia militar y en la frase final de juicio.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» como forma principal del nombre divino, coherente con el estándar del proyecto.
  - Se conservó la serie imperativa breve del hebreo con verbos coordinados en español para reflejar el tono militar.
  - «Emboscadas» mantiene la ambigüedad útil del hebreo entre posiciones de acecho y agentes que emboscan.
