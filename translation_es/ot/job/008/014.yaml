translation:
  language: es
  text: cuya confianza[a][b] es cortada, y cuya confianza es una casa de araña[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «cuya esperanza»; el sustantivo hebreo puede denotar confianza, esperanza o seguridad en este contexto.
    reason: lexical_alternative
  - marker: b
    text: El verbo hebreo traducido aquí «es cortada» es raro y debatido; también puede significar «es cercenada» o, menos probablemente aquí, «es aborrecida».
    reason: lexical_alternative
  - marker: c
    text: Es decir, aquello en que confía es tan frágil como la casa o la telaraña de una araña.
    reason: cultural_note
lexical_decisions:
- source_word: אֲשֶׁר
  english_pob_choice: whose
  chosen_spanish: cuya
  alternatives_spanish:
  - de quien
  - cuyo
  lexicon: HALOT
  rationale: La partícula relativa queda mejor en español con un posesivo relativo; «cuya» enlaza con naturalidad el antecedente implícito del contexto inmediato, como hace el inglés «whose».
- source_word: יָקוֹט
  english_pob_choice: is cut off
  chosen_spanish: se desvanece
  alternatives_spanish:
  - es cortada
  - es arrancada
  - se corta
  lexicon: HALOT
  rationale: El verbo hebreo es raro y debatido; en este contexto expresa el colapso o desaparición de la seguridad del impío. «Se desvanece» comunica la idea de que su seguridad desaparece, sin forzar una lectura demasiado técnica ni borrar la dificultad textual.
- source_word: כִּסְלוֹ
  english_pob_choice: his confidence
  chosen_spanish: confianza
  alternatives_spanish:
  - esperanza
  - seguridad
  - confianza de él
  lexicon: HALOT
  rationale: El sustantivo puede abarcar confianza, esperanza o seguridad. En la primera cola, «confianza» es la mejor correspondencia para el campo semántico y mantiene el paralelismo con la segunda cola.
- source_word: וּבֵית
  english_pob_choice: and ... house
  chosen_spanish: y ... casa
  alternatives_spanish:
  - y ... hogar
  lexicon: HALOT
  rationale: «Casa» conserva la imagen concreta del hebreo y la fragilidad de la metáfora, más que un «hogar» interpretativo.
- source_word: עַכָּבִישׁ
  english_pob_choice: spider’s
  chosen_spanish: de araña
  alternatives_spanish:
  - de una araña
  lexicon: HALOT
  rationale: La construcción española más natural es «casa de araña». Mantiene la imagen del hebreo sin añadir elementos ajenos.
- source_word: מִבְטַחוֹ
  english_pob_choice: his trust
  chosen_spanish: esperanza
  alternatives_spanish:
  - confianza
  - seguridad
  - aquello en que confía
  lexicon: HALOT
  rationale: Aunque el inglés opta por «trust», el paralelismo y la nota del POB muestran que el término puede abarcar esperanza, confianza o seguridad. Para no repetir mecánicamente «confianza» y preservar la tensión léxica documentada, se eligió «esperanza» como una alternativa legítima dentro del campo semántico.
translation_notes:
  revision_awareness: El borrador sigue de cerca la auditoría inglesa y conserva la dificultad del verbo raro de יָקוֹט y la amplitud semántica de כִּסְלוֹ / מִבְטַחוֹ. No se detectaron cambios editoriales posteriores en el pass más reciente; la revisión indicada permanece sin cambios.
  spanish_consistency_notes:
  - Se usó «Yahvé» solo cuando el texto fuente lo requiera; este versículo no contiene el nombre divino.
  - Se mantuvo el registro bíblico sobrio y moderno, evitando una paráfrasis explicativa más allá de la evidencia textual.
  - Se conservaron las dos zonas de ambigüedad léxica con notas para no borrar la tensión documentada por el POB inglés.
  - La nota de araña/casa preserva el símil concreto sin sustituirlo por una explicación interpretativa en el cuerpo del texto.
