translation:
  language: es
  text: Pero cuando quedaron libres de la urgencia[a] y se retiraban con gozo[b], reconocieron a Nicanor caído[c] con su armadura.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «libres de la necesidad», «aliviados de la presión» o «liberados de la crisis»; la expresión griega es algo idiomática.
    reason: lexical_alternative
  - marker: b
    text: O «partían con gozo» o «se marchaban con gozo»; el verbo puede denotar salida o retirada.
    reason: lexical_alternative
  - marker: c
    text: O «caído por tierra» o «tendido después de caer»; el griego también puede sugerir la idea de haber caído hacia adelante.
    reason: lexical_alternative
lexical_decisions:
- source_word: γεγυμνωμένοι
  english_pob_choice: free from the urgency
  chosen_spanish: quedaron libres de la urgencia
  alternatives_spanish:
  - liberados de la necesidad
  - despojados de la necesidad
  - aliviados de la urgencia
  lexicon: LSJ
  rationale: El participio perfecto pasivo, con ἀπὸ τῆς χρείας, expresa estar liberados de una necesidad o presión apremiante. «Quedaron libres de la urgencia» conserva la idea de alivio sin suavizar demasiado el matiz de presión situacional.
- source_word: χρείας
  english_pob_choice: the urgency
  chosen_spanish: la urgencia
  alternatives_spanish:
  - la necesidad
  - la necesidad apremiante
  - la crisis
  lexicon: LSJ
  rationale: χρεία puede significar necesidad o necesidad apremiante. En este contexto bélico, «urgencia» comunica mejor la fuerza inmediata de la situación y evita una abstracción demasiado general.
- source_word: ἀναλύοντες
  english_pob_choice: were returning
  chosen_spanish: regresaban
  alternatives_spanish:
  - se retiraban
  - partían
  - se alejaban
  lexicon: LSJ
  rationale: ἀναλύω puede significar partir, retirarse o levantarse para irse. En esta escena, «regresaban» sigue la revisión del inglés POB y mantiene un movimiento narrativo natural en español, sin perder el valor de desplazamiento del verbo.
- source_word: ἐπέγνωσαν
  english_pob_choice: recognized
  chosen_spanish: reconocieron
  alternatives_spanish:
  - advirtieron
  - percibieron claramente
  - identificaron
  lexicon: LSJ
  rationale: ἐπιγινώσκω aquí tiene el sentido de reconocer plenamente a alguien. «Reconocieron» es la correspondencia más directa y sobria en español.
- source_word: προπεπτωκότα
  english_pob_choice: fallen
  chosen_spanish: caído
  alternatives_spanish:
  - caído de frente
  - caído hacia adelante
  - derribado
  lexicon: LSJ
  rationale: El participio perfecto de προπίπτω indica haber caído antes o yacer caído; el inglés POB mantuvo solo «fallen». En español, «caído» conserva la idea principal sin añadir una dirección explícita no necesaria para la claridad.
- source_word: πανοπλίᾳ
  english_pob_choice: armor
  chosen_spanish: armadura
  alternatives_spanish:
  - armamento completo
  - panoplia
  - armadura completa
  lexicon: LSJ
  rationale: πανοπλία designa la armadura completa o el equipo de guerra. «Armadura» es la opción moderna más clara y digna; el matiz de totalidad queda implícito por el término griego y el contexto.
translation_notes:
  revision_awareness: 'La redacción sigue de cerca el texto griego y toma en cuenta la auditoría inglesa: mantiene el sentido idiomático de γεγυμνωμένοι + χρεία como estar liberados de una presión/urgencia, traduce ἀναλύοντες como un desplazamiento narrativo de regreso, y conserva el participio de προπεπτωκότα con un castellano natural («caído») sin introducir una precisión direccional no exigida por el español.'
  spanish_consistency_notes:
  - Se prefirió «Nicanor» con la ortografía habitual en español, aunque el inglés POB usa «Nikanor»; no cambia la referencia.
  - No se añadieron notas al pie porque el español no introduce una ambigüedad adicional decisiva más allá de las alternativas ya reflejadas en las decisiones léxicas.
  - Se evitó «SEÑOR» y otras terminologías no pertinentes; el versículo no contiene vocabulario divino.
  - «Armadura» mantiene la dignidad del registro y es suficientemente exacta para πανοπλία en este contexto militar.
