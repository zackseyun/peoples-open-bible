- from: 'Hicieron la placa[a], la corona santa, de oro puro, e inscribieron sobre ella, como el grabado de un sello: «Santo para Yahvé».'
  to: 'Hicieron la lámina[a], la santa corona, de oro puro, e inscribieron sobre ella, como el grabado de un sello: «Santo para Yahvé».'
