    rationale: Las instrucciones exigen marcadores únicos por nota dentro del mismo registro. El texto actual usa [a] tanto tras 'pozo' como tras 'uno', pero la nota a solo explica שחת.
  - severity: high
    issue: '''de la muerte de uno muerto'' no es español natural ni representa bien חָלָל'
    rationale: חָלָל no es simplemente 'muerto' sino alguien abatido/caído/slain. La formulación actual suena defectuosa y oscurece el modismo hebreo en vez de aclararlo con fidelidad.
  - severity: medium
    issue: '''al pozo'' para שחת es menos preciso en este contexto que ''a la fosa'''
    rationale: Aunque 'pozo' es defendible, en un contexto de descenso a muerte/juicio 'fosa' comunica mejor la imagen hebrea de sepulcro/pit sin sugerir un simple hueco o pozo de agua.
  revised_spanish_text: Te harán descender a la fosa[a], y morirás la muerte de uno caído[b], en el corazón de los mares[c].
