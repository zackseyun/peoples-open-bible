lexical_decisions:
- source_word: אַנְשֵׁי
  english_pob_choice: the men of
  chosen_spanish: los hombres de
  alternatives_spanish:
  - la gente de
  - los habitantes de
  lexicon: HALOT
  rationale: El constructo plural de אִישׁ en un registro de lista/censo se refiere aquí a representantes varones o cabezas de familia de un lugar. En español, «los hombres de» reproduce con naturalidad esa relación posesiva y el tono de enumeración.
- source_word: נְבוֹ
  english_pob_choice: Nebo
  chosen_spanish: Nebo
  alternatives_spanish:
  - Nebo
  lexicon: HALOT
  rationale: Es un nombre propio de lugar y se translitera sin traducir.
- source_word: אַחֵר
  english_pob_choice: the other
  chosen_spanish: el otro
  alternatives_spanish:
  - otro
  - el otro Nebo
  lexicon: HALOT
  rationale: El adjetivo distingue este Nebo de otro Nebo mencionado en la lista. En español, «el otro Nebo» conserva mejor esa función distintiva que una simple repetición del nombre.
- source_word: חֲמִשִּׁים וּשְׁנָיִם
  english_pob_choice: fifty-two
  chosen_spanish: cincuenta y dos
  alternatives_spanish:
  - '52'
  - cincuenta y dos
  lexicon: HALOT
  rationale: La secuencia numeral se expresa con el cardinal normal en español para máxima claridad y legibilidad.
