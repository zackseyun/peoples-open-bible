base_translation:
  language: en
  yaml_path: translation/ot/2_kings/023/033.yaml
  text: And Pharaoh Neco imprisoned him at Riblah in the land of Hamath[a], so that he might not reign in Jerusalem[c][b]; and he imposed on the land a tribute of a hundred talents of silver and a talent of gold.
  footnotes:
