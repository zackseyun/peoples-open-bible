    reason: lexical_alternative
  revision_rationale: 'Se movió la nota al término que realmente presenta ambigüedad léxica en la evidencia fuente (אָ לָה), y se ajustó el texto principal para mayor fidelidad y claridad en español: ''dice'' mejora la fórmula profética; ''cuando vayan a Egipto'' refleja mejor el movimiento del hebreo y la revisión inglesa; ''objeto de maldición'' expresa mejor el resultado ejemplar/byword que ''para maldición''; y ''no volverán a ver'' suena más natural en español manteniendo la fuerza de ''no... más''.'
