translation:
  language: es
  text: 'Y de entre los sacerdotes: los hijos de Hobaía[a], los hijos de Hacoz, los hijos de Barzilai, que había tomado por esposa a una de las hijas de Barzilai el galaadita, y fue llamado por el nombre de ellos.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «que tomó como esposa a una de las hijas de Barzilai el galaadita y fue nombrado según ellos».'
    reason: alternative_reading
lexical_decisions:
- source_word: וּמִן הַכֹּהֲנִים
  english_pob_choice: And from the priests
  chosen_spanish: Y de entre los sacerdotes
  alternatives_spanish:
  - Y de los sacerdotes
  - Y también de los sacerdotes
  lexicon: HALOT
  rationale: En un registro genealógico, מִן expresa pertenencia parcial al grupo; «de entre» comunica mejor ese valor partitivo en español que un simple «de».
- source_word: בְּנֵי
  english_pob_choice: the sons of
  chosen_spanish: los hijos de
  alternatives_spanish:
  - los descendientes de
  - la casa de
  lexicon: HALOT
  rationale: Se conserva la fórmula genealógica repetida del hebreo y del POB inglés. «Hijos de» mantiene el paralelismo de lista sin forzar una paráfrasis.
- source_word: חֳבַיָּה
  english_pob_choice: Hobaiah
  chosen_spanish: Hobaía
  alternatives_spanish:
  - Jobaía
  - Hobaya
  lexicon: Transliteración estándar del nombre propio
  rationale: Se translitera el nombre propio en forma legible para español, conservando la identidad del linaje sacerdotal.
- source_word: הַקּוֹץ
  english_pob_choice: Hakkoz
  chosen_spanish: Hacoz
  alternatives_spanish:
  - Hakkoz
  - Koz
  lexicon: Transliteración convencional del nombre propio
  rationale: Se adapta la transliteración al español con una grafía más natural, sin perder la forma reconocible del apellido sacerdotal.
- source_word: אֲשֶׁר לָקַח
  english_pob_choice: who had taken
  chosen_spanish: que había tomado
  alternatives_spanish:
  - que tomó
  - que había tomado por esposa
  lexicon: HALOT
  rationale: El pretérito pluscuamperfecto expresa con claridad que la acción de tomar esposa es anterior al resultado nominal final. «Había tomado» evita ambigüedad temporal.
- source_word: מִבְּנוֹת ... אִשָּׁה
  english_pob_choice: a wife from the daughters of
  chosen_spanish: por esposa a una de las hijas de
  alternatives_spanish:
  - como esposa a una de las hijas de
  - a una de las hijas de ... como esposa
  lexicon: HALOT
  rationale: El hebreo indica matrimonio con una mujer de esa familia; en español, «tomar por esposa a» es una manera natural y fiel de conservar esa relación sin suavizarla.
- source_word: הַגִּלְעָדִי
  english_pob_choice: the Gileadite
  chosen_spanish: el galaadita
  alternatives_spanish:
  - el de Galaad
  - el gileadita
  lexicon: HALOT
  rationale: Se vierte el gentilicio con el equivalente usual en español bíblico, «galaadita», que comunica el origen regional de Barzilai.
- source_word: וַיִּקָּרֵא עַל שְׁמָם
  english_pob_choice: and was called by their name
  chosen_spanish: y fue llamado por su nombre
  alternatives_spanish:
  - y fue llamado por su nombre de familia
  - y tomó su nombre
  lexicon: HALOT
  rationale: La construcción hebrea puede entenderse como recibir el nombre de esa familia. En español, «fue llamado por su nombre» conserva el pasivo y el vínculo nominal sin interpretar de más el mecanismo exacto del renombramiento.
theological_decisions:
- issue: Nombramiento familiar y linaje sacerdotal
  english_pob_reading: and was called by their name
  chosen_spanish_reading: y fue llamado por su nombre
  alternative_spanish_readings:
  - y tomó su nombre
  - y fue nombrado con su nombre
  rationale: 'No hay una carga doctrinal especial, pero sí una tensión textual: el hebreo deja abierta la forma precisa del cambio de nombre. La redacción española mantiene esa ambigüedad sin resolverla de modo interpretativo.'
  doctrine_reference: Onomástica bíblica / genealogía sacerdotal
translation_notes:
  revision_awareness: El contexto auditado del POB inglés muestra alta concordancia y sin revisiones aplicadas. La versión española sigue de cerca la estructura hebrea y la decisión inglesa de conservar la cadena genealógica y la cláusula relativa, ajustando solo lo necesario para una sintaxis natural en español.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma general del proyecto, pero este versículo no contiene el nombre divino.
  - Se preserva la fórmula genealógica «los hijos de» para continuidad interna con listados bíblicos.
  - «Hobaía» y «Hacoz» se adaptan a una grafía española legible, sin alterar la identificación de los nombres propios.
  - La nota al pie conserva la alternativa documentada por el POB inglés para reflejar la ambigüedad del pasivo y del sintagma de parentesco.
