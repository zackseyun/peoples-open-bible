translation:
  language: es
  text: Entonces Yahvé Dios formó al hombre del polvo de la tierra[b], e insufló en su nariz el aliento de vida, y el hombre llegó a ser un ser viviente[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'un ser vivo'; tradicionalmente, 'un alma viviente'.
    reason: lexical_alternative
  - marker: b
    text: O 'de polvo tomado de la tierra'.
    reason: previous_rendering
lexical_decisions:
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  - SEÑOR
  lexicon: —
  rationale: Se mantiene el nombre propio divino del texto hebreo con la forma estándar del proyecto en español. Se evita el reemplazo por un título enmascarado, y 'Yahvé' conserva la referencia al nombre del pacto.
- source_word: אֱלֹהִים
  english_pob_choice: God
  chosen_spanish: Dios
  alternatives_spanish:
  - el Dios
  lexicon: —
  rationale: En aposición con el nombre divino, el término funciona como título común. 'Dios' reproduce con naturalidad la expresión 'Yahvé Dios' sin perder el sentido.
- source_word: וַיִּיצֶר
  english_pob_choice: formed
  chosen_spanish: formó
  alternatives_spanish:
  - moldeó
  - diseñó
  - modeló
  lexicon: HALOT
  rationale: El verbo expresa acción de formar con imagen concreta, casi artesanal. 'Formó' es fiel, natural en español y conserva la fuerza material del verbo hebreo sin exagerar la metáfora.
- source_word: הָאָדָם
  english_pob_choice: the man
  chosen_spanish: el hombre
  alternatives_spanish:
  - el ser humano
  - la humanidad
  lexicon: HALOT
  rationale: Aquí el referente es el individuo narrativo formado por Dios. 'El hombre' mantiene la referencia personal y el juego con 'tierra' / 'suelo' en el verso.
- source_word: עָפָר
  english_pob_choice: dust
  chosen_spanish: polvo
  alternatives_spanish:
  - polvo fino
  - tierra suelta
  lexicon: HALOT
  rationale: '''Polvo'' conserva la imagen física y la fragilidad humana asociada al término. En español bíblico es claro y suficientemente concreto.'
- source_word: מִן הָאֲדָמָה
  english_pob_choice: from the ground
  chosen_spanish: de la tierra
  alternatives_spanish:
  - del suelo
  - del terreno
  lexicon: HALOT
  rationale: La relación con אָדָם se refleja mejor en español con 'tierra', que mantiene el juego de palabras más perceptible que 'suelo' en este contexto. Aunque 'ground' en inglés fue resuelto como 'ground', aquí 'tierra' resulta la opción más natural y amplia en español.
- source_word: וַיִּפַּח בְּאַפָּיו
  english_pob_choice: breathed into his nostrils
  chosen_spanish: sopló en sus narices
  alternatives_spanish:
  - sopló en su nariz
  - insufló en sus narices
  lexicon: HALOT
  rationale: La expresión hebrea describe un acto corporal e idiomático; 'sopló en sus narices' es una traducción directa y digna que conserva la concreción del gesto. 'Insufló' sería más técnico pero menos transparente.
- source_word: נִשְׁמַת חַיִּים
  english_pob_choice: the breath of life
  chosen_spanish: el aliento de vida
  alternatives_spanish:
  - el soplo de vida
  - la respiración de vida
  lexicon: HALOT
  rationale: '''Aliento'' comunica bien la imagen de נשמה en español y mantiene el vínculo con el acto de soplar. ''Aliento de vida'' es idiomático, claro y suficientemente cercano al hebreo constructo.'
- source_word: וַיְהִי
  english_pob_choice: became
  chosen_spanish: llegó a ser
  alternatives_spanish:
  - se hizo
  - se convirtió en
  lexicon: HALOT
  rationale: El verbo marca transición a un nuevo estado. 'Llegó a ser' expresa el cambio sin sugerir una transformación excesiva ni un matiz ajeno al texto.
- source_word: לְנֶפֶשׁ חַיָּה
  english_pob_choice: a living being
  chosen_spanish: un ser viviente
  alternatives_spanish:
  - un ser vivo
  - una criatura viviente
  - un alma viviente
  lexicon: HALOT
  rationale: '''Nefesh'' aquí no exige ''alma'' en sentido dualista. ''Ser viviente'' preserva la totalidad animada del ser humano y evita imponer una antropología posterior; además responde bien al ajuste reciente del POB en inglés hacia ''living being''.'
theological_decisions:
- issue: Nombre divino y título en Génesis 2:7
  english_pob_reading: Yahweh God
  chosen_spanish_reading: Yahvé Dios
  alternative_spanish_readings:
  - el SEÑOR Dios
  - Jehová Dios
  rationale: La decisión mantiene el nombre divino en forma audible y evita el ocultamiento del tetragrámaton. El título común 'Dios' se conserva como aposición, siguiendo la lectura auditada del POB en inglés.
  doctrine_reference: DOCTRINE.md §Translation philosophy 2, 5
- issue: Sentido de נֶפֶשׁ חַיָּה
  english_pob_reading: a living being
  chosen_spanish_reading: un ser viviente
  alternative_spanish_readings:
  - un alma viviente
  - una criatura viviente
  rationale: La expresión hebrea describe al hombre como un ser animado, no como una parte inmortal separable. 'Ser viviente' evita una lectura doctrinal no exigida por el texto y conserva la tensión antropológica documentada por el POB.
  doctrine_reference: DOCTRINE.md §Translation philosophy 1, 3, 6
- issue: Relación hombre/tierra y juego de palabras אָדָם / אֲדָמָה
  english_pob_reading: the man ... from the dust of the ground
  chosen_spanish_reading: el hombre ... de la tierra
  alternative_spanish_readings:
  - el ser humano ... del suelo
  - el hombre ... del polvo de la tierra
  rationale: En español, 'tierra' comunica con más fuerza el vínculo etimológico y narrativo entre אָדָם y אֲדָמָה. Se prefiere esta solución porque mantiene el juego de palabras sin volver la frase pesada o artificial.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4
translation_notes:
  revision_awareness: 'El auditorio en inglés fue revisado para mejorar la correspondencia sintáctica con el hebreo y para afinar ''living being'' en lugar de ''living creature''. La versión española sigue esa línea revisada, pero adapta con naturalidad los recursos idiomáticos del español: ''de la tierra'' para reforzar אָדָם / אֲדָמָה, ''sopló'' para la acción física de וַיִּפַּח y ''ser viviente'' para נֶפֶשׁ חַיָּה. También se conserva el nombre divino con la política del proyecto.'
  spanish_consistency_notes:
  - Se usa 'Yahvé' para יְהוָה conforme al estándar del proyecto.
  - '''Dios'' se mantiene como título, no como sustituto del nombre divino.'
  - '''Ser viviente'' evita ''alma'' para no introducir dualismo ajeno al hebreo.'
  - La preposición 'de la tierra' permite una frase fluida y a la vez conserva el paralelismo conceptual con אָדָם / אֲדָמָה.
  - No se usa 'Cristo' ni terminología cristológica porque no corresponde al pasaje.
