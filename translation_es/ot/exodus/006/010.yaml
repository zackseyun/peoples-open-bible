  source_alignment_summary: 'El borrador refleja fielmente la fórmula hebrea: avance narrativo («Entonces»), verbo de habla («habló»), destinatario («a Moisés») y fórmula introductoria («diciendo»). La elección de «Yahvé» concuerda con el proyecto y con el uso directo de יְהוָה en la fuente.'
  spanish_quality_summary: 'El español es claro, natural y digno. La única reparación necesaria está en la nota al pie: actualmente presenta «Yahvé» como alternativa a «YHWH», pero «Yahvé» ya es la forma usada en el texto principal; la nota debe señalar alternativas reales distintas del texto principal.'
  glossary_alignment: 'Alineado con la terminología del proyecto: יְהוָה → «Yahvé», מֹשֶׁה → «Moisés», לֵאמֹר → «diciendo». No hay conflictos léxicos ni teológicos aparte del ajuste de la nota.'
  issues:
  - severity: low
    issue: La nota al pie enumera «Yahvé» como una transcripción alternativa, aunque es precisamente la forma adoptada en el texto principal.
    rationale: Las notas de alternativas deben informar variantes reales frente a la elección principal. Mantener «Yahvé» como alternativa crea redundancia y confusión editorial.
  revised_spanish_text: Entonces Yahvé habló a Moisés[a], diciendo,
  revised_footnotes:
  - marker: a
    text: 'Hebreo: «YHWH»; también puede transcribirse «Yahweh» o «Jehová».'
    reason: alternative_reading
  revision_rationale: Se conserva el texto principal porque es fiel y natural; solo se corrige la nota para que las alternativas no repitan la forma principal «Yahvé» y reflejen variantes reales de transliteración.
