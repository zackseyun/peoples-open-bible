revisions:
- from: 'lo cual Yahvé mandó que se les diera de los hijos de Israel, el día en que los ungió: estatuto perpetuo por sus generaciones.'
  to: 'Esto es lo que Yahvé mandó que se les diera de parte de los hijos de Israel[a] el día en que los ungió: estatuto perpetuo[b] a través de sus generaciones.'
  rationale: Se ajusta la redacción para mayor naturalidad y claridad sintáctica en español sin apartarse del hebreo ni del POB inglés. Se conserva 'Yahvé', 'ungió' y 'estatuto perpetuo'. Se añade 'de parte de' para expresar con más naturalidad el origen de las porciones desde los hijos de Israel, y se incorporan las notas alternativas ya documentadas en el inglés. 'A través de sus generaciones' refleja mejor la continuidad de לְדֹרֹתָם.
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T21:29:17Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja correctamente el sentido general del hebreo: Yahvé como sujeto del mandato, las porciones dadas a los sacerdotes, su procedencia de los hijos de Israel, el momento de la unción y la fórmula legal de duración. Sin embargo, el orden y la puntuación en español oscurecen ligeramente la relación temporal y legal del original, y faltan las notas alternativas preservadas por el POB inglés para ''hijos de Israel/israelitas'' y ''estatuto perpetuo''.'
  spanish_quality_summary: El español es mayormente natural y digno, pero 'lo cual' suena algo pesado como arranque de continuación contextual, y la coma antes de 'el día en que' rompe innecesariamente la frase. 'Por sus generaciones' es comprensible, pero 'a través de sus generaciones' o 'por todas sus generaciones' expresa mejor el valor distributivo continuo. Conviene pulir la fluidez manteniendo la cercanía formal.
  glossary_alignment: 'Alineación buena con la terminología del proyecto: יְהוָה → ''Yahvé'' está correcto; חֻקַּת עוֹלָם como ''estatuto perpetuo'' es aceptable y consistente con la decisión inglesa; מָשְׁחוֹ אֹתָם → ''los ungió'' preserva bien el verbo específico. Deben añadirse las notas léxicas alternativas que el POB inglés ya documentó para מֵאֵת בְּנֵי יִשְׂרָאֵל y חֻקַּת עוֹלָם.'
  issues:
  - severity: medium
    issue: Faltan las dos notas al pie del POB inglés
    rationale: El expediente inglés conserva alternativas significativas para 'from the sons of Israel' y 'an everlasting statute'. El revisor español debe preservarlas también, especialmente porque en español 'hijos de Israel' y 'estatuto perpetuo' admiten alternativas idiomáticas relevantes.
  - severity: low
    issue: '''Lo cual'' resulta algo menos natural en esta continuación'
    rationale: Aunque no es incorrecto, en español bíblico continuo suele fluir mejor 'Esto es lo que...' o simplemente una reestructuración que integre la cláusula relativa sin rigidez.
  - severity: low
    issue: La puntuación y el orden pueden mejorarse
    rationale: La coma antes de 'el día en que' separa de forma poco natural el complemento temporal; además, colocar 'el día en que los ungió' antes de 'de parte/de los hijos de Israel' puede clarificar la estructura.
  - severity: low
    issue: '''Por sus generaciones'' suena algo escueto'
    rationale: No es erróneo, pero 'a través de sus generaciones' comunica con mayor claridad el sentido continuo de לְדֹרֹתָם en español moderno.
  revised_spanish_text: 'Esto es lo que Yahvé mandó que se les diera de parte de los hijos de Israel[a] el día en que los ungió: estatuto perpetuo[b] a través de sus generaciones.'
  revised_footnotes:
