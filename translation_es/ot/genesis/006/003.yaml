base_translation:
  language: en
  yaml_path: translation/ot/genesis/006/003.yaml
  text: Then Yahweh said[a], “My Spirit will not abide in man forever, for he is flesh[c][b]; his days will be one hundred and twenty years.”
  footnotes:
