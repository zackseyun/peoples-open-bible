id: JDG.14.19
reference: Judges 14:19
source:
  edition: WLC
  text: וַ/תִּצְלַ֨ח עָלָ֜י/ו ר֣וּחַ יְהוָ֗ה וַ/יֵּ֨רֶד אַשְׁקְל֜וֹן וַ/יַּ֥ךְ מֵ/הֶ֣ם שְׁלֹשִׁ֣ים אִ֗ישׁ וַ/יִּקַּח֙ אֶת חֲלִ֣יצוֹתָ֔/ם וַ/יִּתֵּן֙ הַ/חֲלִיפ֔וֹת לְ/מַגִּידֵ֖י הַ/חִידָ֑ה וַ/יִּ֣חַר אַפּ֔/וֹ וַ/יַּ֖עַל בֵּ֥ית אָבִֽי/הוּ׀־׃פ
translation:
  text: And the Spirit of Yahweh rushed upon him[a], and he went down to Ashkelon and struck down thirty men from among them, and took their spoil garments and gave the changes of clothes to those who had explained the riddle. And his anger burned, and he went up to his father's house.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'their garments.' The Hebrew term may refer more specifically to clothing stripped from the slain and taken as spoil.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַתִּצְלַח עָלָיו רוּחַ יְהוָה
  chosen: the Spirit of the LORD rushed upon him
  alternatives:
  - came powerfully upon him
  - prospered upon him
  lexicon: HALOT
  rationale: צלח with רוּחַ יְהוָה in Judges commonly denotes a sudden, forceful coming of divine empowerment, not prosperity. 'Rushed upon' preserves the vividness and event-like force of the idiom. יְהוָה follows the doctrinal default 'the LORD'.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: וַיֵּרֶד אַשְׁקְלוֹן
  chosen: he went down to Ashkelon
  alternatives:
  - he went down into Ashkelon
  lexicon: HALOT
  rationale: ירד is the standard narrative verb 'went down.' 'To Ashkelon' is natural English and preserves the directional sense without overtranslating.
- source_word: וַיַּךְ מֵהֶם שְׁלֹשִׁים אִישׁ
  chosen: struck down thirty men from among them
  alternatives:
  - killed thirty men of them
  - struck thirty men among them
  lexicon: HALOT
  rationale: נכה here refers to lethal violence in context. 'Struck down' is idiomatic English that conveys killing without unnecessary bluntness. מֵהֶם is retained as 'from among them,' indicating these men were taken from the people of Ashkelon/Philistines.
- source_word: חֲלִיצוֹתָם
  chosen: their spoil garments
  alternatives:
  - their garments
  - their stripped-off clothing
  lexicon: HALOT
  rationale: The noun refers to clothing removed from the slain, likely garments taken as spoil. Rendering simply 'garments' would miss the contextual sense that these were taken from the dead. 'Spoil garments' communicates both the object and the circumstance.
- source_word: הַחֲלִיפוֹת
  chosen: the changes of clothes
  alternatives:
  - the festal garments
  - the sets of garments
  lexicon: HALOT
  rationale: In the riddle context, Samson owed clothing outfits; 'changes of clothes' is the standard sense of חליפות here and matches the earlier wager context.
- source_word: לְמַגִּידֵי הַחִידָה
  chosen: to those who had explained the riddle
  alternatives:
  - to the tellers of the riddle
  - to those who declared the riddle
  lexicon: HALOT
  rationale: The participle of נגד here means those who made the answer known, i.e., explained/declared it. 'Explained the riddle' is the clearest idiomatic English in context.
- source_word: וַיִּחַר אַפּוֹ
  chosen: his anger burned
  alternatives:
  - his anger was kindled
  - he became very angry
  lexicon: HALOT
  rationale: This Hebrew idiom literally speaks of anger burning. 'His anger burned' preserves the metaphor while remaining natural modern English.
- source_word: וַיַּעַל בֵּית אָבִיהוּ
  chosen: he went up to his father's house
  alternatives:
  - he returned to his father's house
  lexicon: HALOT
  rationale: עלה is literally 'went up.' Although context implies return, the Hebrew verb should be preserved unless English becomes awkward. 'Went up' also fits the topographical/narrative style.
