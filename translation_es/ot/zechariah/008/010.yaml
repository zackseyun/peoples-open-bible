translation:
  language: es
  text: Porque antes de aquellos días no había salario para el hombre, ni salario para el animal; y para el que salía y para el que entraba no había paz[a] por causa del adversario[b], y puse a cada hombre contra su prójimo[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'no había seguridad/bienestar'; שָׁלוֹם puede incluir paz, seguridad y bienestar.
    reason: lexical_alternative
  - marker: b
    text: O 'por causa del enemigo' o 'del adversario'; el término hebreo puede designar un adversario en sentido hostil.
    reason: lexical_alternative
  - marker: c
    text: Literalmente, 'envié a todo hombre, cada uno contra su prójimo'; el sentido es que Dios los puso en hostilidad mutua.
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Ya que
  lexicon: HALOT
  rationale: Introduce la explicación del estado anterior; en español, 'Porque' conserva con naturalidad el valor causal/explanatorio.
- source_word: לִפְנֵי הַיָּמִים הָהֵם
  english_pob_choice: before those days
  chosen_spanish: antes de aquellos días
  alternatives_spanish:
  - antes de esos días
  - antes de aquellos tiempos
  lexicon: HALOT
  rationale: '''Días'' mantiene la imagen temporal concreta del hebreo sin volverla abstracta; ''aquellos'' conserva la referencia remota.'
- source_word: שְׂכַר הָאָדָם
  english_pob_choice: wage for man
  chosen_spanish: salario para el hombre
  alternatives_spanish:
  - pago para el hombre
  - salario para la humanidad
  lexicon: HALOT
  rationale: שׂכר es 'salario/sueldo/pago'; 'salario' es idiomático en español y conserva el valor de retribución laboral. 'El hombre' preserva el sentido representativo/genericamente humano del hebreo frente a 'animal'.
- source_word: הָאָדָם
  english_pob_choice: man
  chosen_spanish: el hombre
  alternatives_spanish:
  - la humanidad
  - la gente
  lexicon: HALOT
  rationale: Se conserva la fuerza representativa masculina/genérica del hebreo en el contraste hombre/animal, sin restringir el referente a varones.
- source_word: לֹא נִהְיָה
  english_pob_choice: there was no
  chosen_spanish: no había
  alternatives_spanish:
  - no existía
  - no se encontraba
  lexicon: HALOT
  rationale: La forma existencial en español expresa con naturalidad que tal salario no se daba o no estaba disponible.
- source_word: וּשְׂכַר הַבְּהֵמָה אֵינֶנָּה
  english_pob_choice: and no wage for beast
  chosen_spanish: ni salario para el animal
  alternatives_spanish:
  - ni salario para la bestia
  - ni retribución para el ganado
  lexicon: HALOT
  rationale: '''Animal'' comunica el sentido amplio de בְּהֵמָה en español moderno sin sonar arcaico; conserva el paralelo con ''el hombre''.'
- source_word: וְלַיּוֹצֵא וְלַבָּא
  english_pob_choice: for the one going out and the one coming in
  chosen_spanish: para el que salía y para el que entraba
  alternatives_spanish:
  - para el que iba y venía
  - para el que salía y el que entraba
  lexicon: HALOT
  rationale: Mantiene el participio sustantivado como una referencia amplia a la actividad cotidiana de moverse, comerciar o viajar, con español natural.
- source_word: אֵין שָׁלוֹם
  english_pob_choice: there was no peace
  chosen_spanish: no había paz
  alternatives_spanish:
  - no había seguridad
  - no había bienestar
  lexicon: HALOT
  rationale: '''Paz'' es la equivalencia base de שָׁלוֹם y preserva la amplitud de paz/seguridad/bienestar; el matiz alternativo se deja implícito en el término.'
- source_word: מִן הַצָּר
  english_pob_choice: because of the adversary
  chosen_spanish: por causa del adversario
  alternatives_spanish:
  - por causa del enemigo
  - a causa del enemigo
  - por el opresor
  lexicon: HALOT
  rationale: '''Adversario'' reproduce la posibilidad semántica personal del término y evita imponer de entrada ''enemigo''; ''por causa de'' expresa de modo natural la relación causal.'
- source_word: וַאֲשַׁלַּח
  english_pob_choice: I set
  chosen_spanish: puse
  alternatives_spanish:
  - envié
  - solté
  lexicon: HALOT
  rationale: El hebreo puede leerse literalmente como 'envié', pero la construcción resultante expresa que Dios los dejó o puso en hostilidad mutua; 'puse' funciona en español como causal idiomático sin borrar la agencia divina.
- source_word: אֶת כָּל הָאָדָם אִישׁ בְּרֵעֵהוּ
  english_pob_choice: every man against his neighbor
  chosen_spanish: a todo hombre uno contra su prójimo
  alternatives_spanish:
  - a cada hombre contra su prójimo
  - a todos, cada uno contra su prójimo
  lexicon: HALOT
  rationale: '''Todo hombre'' mantiene el distributivo; ''prójimo'' es la forma usual de רֵעַ en este contexto interpersonal. ''Uno contra'' refleja el sentido de hostilidad recíproca que el inglés POB explicita con la nota c.'
theological_decisions:
- issue: Tensión entre retribución laboral y preservación del sentido genérico de אָדָם
  english_pob_reading: wage for man
  chosen_spanish_reading: salario para el hombre
  alternative_spanish_readings:
  - salario para la humanidad
  - salario para la gente
  rationale: Se conserva el contraste hebreo entre humanidad y bestia, usando una forma española natural que no diluye el rasgo representativo del término.
  doctrine_reference: 'DOCTRINE.md §Translation philosophy 4; Contested terms: אָדָם'
- issue: Agencia divina en la desunión social
  english_pob_reading: and I set every man against his neighbor
  chosen_spanish_reading: y puse a todo hombre uno contra su prójimo
  alternative_spanish_readings:
  - y envié a todo hombre contra su prójimo
  - y dejé a todo hombre contra su prójimo
  rationale: El hebreo atribuye explícitamente a Yahvé el resultado de hostilidad social. La traducción mantiene esa agencia sin suavizarla ni convertirla en simple permisividad.
  doctrine_reference: DOCTRINE.md §Translation philosophy 3
translation_notes:
  revision_awareness: 'El borrador sigue de cerca el texto hebreo y el acuerdo alto del audit trail inglés, sin cambios sustanciales respecto de la lectura base. Se han ajustado las elecciones al español natural: ''salario'' por שׂכר, ''animal'' por בְּהֵמָה, y ''por causa del adversario'' para mantener la ambigüedad hostil del término sin perder fluidez.'
  spanish_consistency_notes:
  - Se usa 'Yahvé' solo cuando el texto lo requiera explícitamente; en este versículo no aparece el tetragrámaton.
  - '''Hombre'' se conserva por el contraste humano/animal y por consistencia con la política POB de no neutralizar sin razón el sujeto genérico.'
  - '''Paz'' mantiene la amplitud semántica de שָׁלוֹם, aclarada en nota.'
  - La puntuación conserva una cadena explicativa continua, acorde con la sintaxis hebrea y con el estilo bíblico en español.
