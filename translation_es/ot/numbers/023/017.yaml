revisions:
- from: 'Vino a él[a], y he aquí que estaba de pie junto a su holocausto, con los príncipes de Moab con él. Y Balac le dijo: «¿Qué ha hablado Yahvé?»'
  to: 'Vino a él, y he aquí que estaba de pie junto a su holocausto, y los príncipes[a] de Moab estaban con él. Y Balac le dijo: «¿Qué ha dicho Yahvé?»'
  rationale: Se reubica la nota al sintagma correcto, se suaviza la construcción redundante para un español más natural sin alterar el sentido hebreo, y se cambia «¿Qué ha hablado Yahvé?» por «¿Qué ha dicho Yahvé?» para mejorar la idiomaticidad en español manteniendo la referencia a la palabra divina.
