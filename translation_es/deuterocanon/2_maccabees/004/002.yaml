    issue: «al celoso por las leyes» es una formulación poco natural en español
    rationale: Aunque intenta reflejar ζηλωτήν, en español «celoso» usado sustantivamente con «por» suena forzado y puede entenderse mal. Una forma como «al celoso defensor de las leyes» conserva el sentido de celo ardiente y mejora la legibilidad.
  revised_spanish_text: y se atrevió a llamar al benefactor de la ciudad[a], al guardián de sus compatriotas y al celoso defensor de las leyes, un conspirador contra los asuntos públicos.
