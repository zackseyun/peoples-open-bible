theological_decisions:
- issue: Meaning of πίστις in a potentially contested context
  chosen_reading: faith
  alternative_readings:
  - trust
  - faithfulness
  rationale: The doctrine file specifies 'faith' as the default rendering for πίστις, with alternatives preserved where contested. In Hebrews 4:2 the contrast is between hearing and believing response, so 'faith' best fits the context without importing a denominationally loaded account of perseverance or covenantal faithfulness.
  doctrine_reference: 'DOCTRINE.md Contested terms: πίστις → faith'
- issue: Interpretation of the final clause
  chosen_reading: the hearers in the wilderness were not united by faith with those who listened
  alternative_readings:
  - the message did not benefit them because it was not mixed with faith in those who heard
  rationale: The SBLGNT reading uses the accusative participle συγκεκερασμένους, which most naturally modifies ἐκείνους ('them'). A well-known variant supports the traditional sense that the message was not united with faith in the hearers. To preserve transparency and theological tension, the main text follows the provided source text while the traditional alternative is retained in a footnote.
  doctrine_reference: 'DOCTRINE.md Translation philosophy #1 and #3'
