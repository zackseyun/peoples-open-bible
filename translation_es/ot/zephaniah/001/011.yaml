translation:
  language: es
  text: ¡Aúllen, habitantes del Mortero[a], porque todo el pueblo de mercaderes[b] ha sido destruido; todos los que pesan plata han sido eliminados!
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebreo Maktesh, literalmente «mortero»; probablemente es el nombre de un barrio de Jerusalén, quizá llamado así por su forma cóncava o por la actividad comercial que allí abundaba.
    reason: alternative_reading
  - marker: b
    text: O «todo el pueblo de Canaán». Aquí «Canaán» probablemente se usa con el sentido de «mercader(es)», un uso hebreo conocido en contextos comerciales.
    reason: lexical_alternative
lexical_decisions:
- source_word: הֵילִילוּ
  english_pob_choice: Wail
  chosen_spanish: ¡Aullad!
  alternatives_spanish:
  - Lamenten
  - Giman
  - Clamen
  lexicon: HALOT
  rationale: El imperativo plural de ילל expresa un grito de duelo o desastre. «Aullad» conserva la fuerza profética y la intensidad sonora que el inglés POB buscó con «Wail».
- source_word: יֹשְׁבֵי
  english_pob_choice: inhabitants of
  chosen_spanish: habitantes de
  alternatives_spanish:
  - los que habitan en
  - residentes de
  lexicon: HALOT
  rationale: Es un sustantivo colectivo en constructo. «Habitantes de» es natural en español y mantiene el sentido de un grupo colectivo dirigido.
- source_word: הַמַּכְתֵּשׁ
  english_pob_choice: the Mortar
  chosen_spanish: el Mortero
  alternatives_spanish:
  - el mortero
  - Maktesh
  lexicon: HALOT
  rationale: El hebreo significa literalmente «mortero» y probablemente funciona como nombre de lugar. En español, la mayúscula en «Mortero» permite tratarlo como topónimo sin perder el sentido léxico; la alternativa transliterada se preserva en nota.
- source_word: כִּי
  english_pob_choice: for
  chosen_spanish: porque
  alternatives_spanish:
  - pues
  - ya que
  lexicon: HALOT
  rationale: Introduce la razón del lamento. En español, «porque» comunica con claridad la causalidad sin volver la línea demasiado rígida.
- source_word: נִדְמָה
  english_pob_choice: are destroyed
  chosen_spanish: ha sido destruido
  alternatives_spanish:
  - está arruinado
  - ha perecido
  - está silenciado
  lexicon: HALOT
  rationale: El nifal de דמה en este contexto expresa ruina/aniquilación. Aunque el hebreo es formalmente singular, puede gobernar un colectivo; por eso se conserva el singular impersonal/collectivo en español para no borrar la forma del original.
- source_word: כָּל עַם כְּנַעַן
  english_pob_choice: all the merchant people
  chosen_spanish: todo el pueblo mercader
  alternatives_spanish:
  - todo el pueblo de Canaán
  - todos los comerciantes
  - todo el pueblo de mercaderes
  lexicon: HALOT
  rationale: «Canaán» puede funcionar como metonimia para «mercader» en contextos comerciales. En español, «pueblo mercader» conserva el sustantivo colectivo עַם y hace explícita la lectura comercial que el POB inglés documenta, sin ocultar la tensión entre el etnónimo y el oficio.
- source_word: נִכְרְתוּ
  english_pob_choice: are cut off
  chosen_spanish: han sido cortados
  alternatives_spanish:
  - son cortados
  - han sido exterminados
  - han sido arrancados
  lexicon: HALOT
  rationale: כרת en pasivo/jusivo profético suele significar «ser cortado» como fórmula judicial de destrucción. «Han sido cortados» preserva la imagen y el matiz técnico del juicio divino.
- source_word: כָּל נְטִילֵי כָסֶף
  english_pob_choice: all who weigh out silver
  chosen_spanish: todos los que pesan plata
  alternatives_spanish:
  - todos los plateros
  - todos los que cargan plata
  - todos los que tasan plata
  lexicon: HALOT
  rationale: El participio apunta a personas que manipulan o pesan plata en el comercio. «Pesan plata» es una traducción directa y comprensible; mantiene la referencia mercantil que el contexto exige.
theological_decisions:
- issue: Sentido de כְּנַעַן como etnónimo vs. oficio comercial
  english_pob_reading: '''Canaan'' is likely used in the sense of ''merchant(s)'''
  chosen_spanish_reading: «pueblo mercader» refleja el valor comercial sin borrar la posibilidad etimológica del etnónimo
  alternative_spanish_readings:
  - «todo el pueblo de Canaán»
  - «todos los comerciantes»
  rationale: La nota inglesa preserva la ambigüedad lexical y la lectura mercantil probable. En español conviene explicitar el sentido comercial para la lectura pública, pero sin convertirlo en una paráfrasis total que elimine el eco de «Canaán».
  doctrine_reference: Lexical ambiguity; prophetic judgment oracle
- issue: Topónimo y sentido literal de הַמַּכְתֵּשׁ
  english_pob_reading: likely the name of a market district in Jerusalem, perhaps so called because of its hollow shape or bustling trade
  chosen_spanish_reading: «el Mortero» como nombre de lugar, con sentido literal preservado
  alternative_spanish_readings:
  - «Maktesh»
  - «el mortero»
  rationale: El texto puede referirse a un barrio de Jerusalén con nombre descriptivo. En español, la mayúscula permite tratarlo como topónimo y a la vez conservar el valor semántico del sustantivo común.
  doctrine_reference: Toponymy / lexical note
translation_notes:
  revision_awareness: Sin revisiones aplicadas; la versión inglesa auditada permanece sin cambios y el consenso de revisión fue de alta concordancia.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como forma estándar del proyecto cuando aparezca el nombre divino; este versículo no lo contiene.
  - Se preserva la imagen de juicio «cortados» en lugar de suavizarla con un equivalente más genérico.
  - Se evita traducir mecánicamente desde el inglés donde el español requiere resolver número y orden sintáctico, pero sin perder la ambigüedad lexical documentada.
