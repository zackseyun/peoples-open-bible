translation:
  language: es
  text: Ante su resplandor[a], ardieron brasas de fuego.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Desde el resplandor delante de él, flamearon brasas de fuego».'
