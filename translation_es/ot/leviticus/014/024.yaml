translation:
  language: es
  text: Entonces el sacerdote tomará el cordero de la ofrenda por la culpa[a] y el log de aceite[b], y el sacerdote los mecerá como ofrenda mecida delante de Yahvé.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, «el cordero expiatorio de culpa»; tradicionalmente, «el cordero de la ofrenda por la transgresión».
    reason: lexical_alternative
  - marker: b
    text: Un «log» era una pequeña unidad de medida líquida usada en el sistema ritual de Israel.
    reason: cultural_note
lexical_decisions:
- source_word: וְלָקַח
  english_pob_choice: Then ... shall take
  chosen_spanish: Entonces ... tomará
  alternatives_spanish:
  - Y ... tomará
  - Tomará
  lexicon: HALOT
  rationale: La waw consecutiva en la secuencia ritual marca continuación procedimental; «Entonces» conserva el avance del rito sin volver la frase pesada.
- source_word: הַכֹּהֵן
  english_pob_choice: the priest
  chosen_spanish: el sacerdote
  alternatives_spanish:
  - el sacerdote oficiante
  - el presbítero
  lexicon: HALOT
  rationale: En contexto levítico cultual, «sacerdote» comunica con claridad el oficio ritual sin introducir terminología eclesiástica ajena al hebreo.
- source_word: כֶּבֶשׂ הָאָשָׁם
  english_pob_choice: the guilt-offering lamb
  chosen_spanish: el cordero de la ofrenda por la culpa
  alternatives_spanish:
  - el cordero de la ofrenda por el pecado
  - el cordero de la ofrenda de culpa
  - el cordero de la ofrenda por la culpa
  lexicon: HALOT
  rationale: Se preserva la relación constructa y el valor sacrificial específico de אָשָׁם. «Ofrenda por la culpa» mantiene la carga semántica de responsabilidad/culpa sin recurrir de forma automática a «ofrenda por la transgresión».
- source_word: לֹג הַשָּׁמֶן
  english_pob_choice: the log of oil
  chosen_spanish: el log de aceite
  alternatives_spanish:
  - la medida de aceite
  - el log de aceite
  lexicon: HALOT
  rationale: «Log» se conserva como unidad técnica de medida ritual; añadir «aceite» reproduce el sustantivo determinado por el hebreo sin explicarlo en el texto principal.
- source_word: וְהֵנִיף
  english_pob_choice: shall wave
  chosen_spanish: los mecerá
  alternatives_spanish:
  - los agitará
  - los alzará y mecerá
  lexicon: HALOT
  rationale: «Mecer» expresa en español el gesto ritual de la ofrenda mecida con suficiente naturalidad y mantiene la dimensión ceremonial del verbo.
- source_word: אֹתָם
  english_pob_choice: them
  chosen_spanish: los
  alternatives_spanish:
  - los dos
  - ambos
  lexicon: HALOT
  rationale: El pronombre plural se refiere conjuntamente al cordero y al log de aceite; el clítico español concuerda con ambos objetos.
- source_word: תְּנוּפָה
  english_pob_choice: as a wave offering
  chosen_spanish: como ofrenda mecida
  alternatives_spanish:
  - como ofrenda alzada
  - como ofrenda mecida
  lexicon: HALOT
  rationale: «Ofrenda mecida» es la forma más directa en español para el sustantivo técnico derivado de נוּף; conserva el vínculo léxico con el verbo sin perder legibilidad.
- source_word: לִפְנֵי יְהוָה
  english_pob_choice: before Yahweh
  chosen_spanish: delante de Yahvé
  alternatives_spanish:
  - ante Yahvé
  - en presencia de Yahvé
  lexicon: HALOT
  rationale: Se sigue el criterio del POB de traducir el Tetragrámaton por «Yahvé», y la locución cultual se vierte con la preposición española natural «delante de».
theological_decisions:
- issue: Rendering of the divine name יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - el SEÑOR
  rationale: El proyecto POB español usa «Yahvé» como forma principal para el Nombre del pacto; se evita la máscara tradicional «SEÑOR» para conservar la visibilidad del Tetragrámaton.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Technical sacrificial term אָשָׁם
  english_pob_reading: guilt offering
  chosen_spanish_reading: ofrenda por la culpa
  alternative_spanish_readings:
  - ofrenda por el pecado
  - ofrenda de culpa
  - ofrenda de reparación
  rationale: «Ofrenda por la culpa» comunica el campo semántico de culpa/responsabilidad ritual sin sustituir la categoría por una glosa interpretativa más amplia. Mantiene la tensión entre culpa y ofrenda sacrificial propia del texto.
  doctrine_reference: Levítico 14:24; HALOT s.v. אָשָׁם
translation_notes:
  revision_awareness: 'Coincide con el estado más reciente del texto fuente en inglés: la revisión indicada no introdujo cambios y el cotejo posterior reporta acuerdo alto, sin observaciones pendientes.'
  spanish_consistency_notes:
  - Se mantuvo el término técnico «log» por consistencia con la tradición de traducción auditada y para no borrar la precisión metrológica.
  - Se prefirió «mecido / ofrenda mecida» para conservar la relación verbal-sustantiva de נוּף / תְּנוּפָה en español.
  - Se usó «delante de Yahvé» para reflejar la fórmula cultual sin recurrir a sustitutos eclesiásticos.
  - El singular colectivo del par «el cordero ... y el log de aceite» se resolvió con el pronombre plural «los».
