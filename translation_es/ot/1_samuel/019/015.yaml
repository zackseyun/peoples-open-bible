translation:
  language: es
  text: 'Entonces Saúl envió a los mensajeros para ver a David[a], diciendo: «Tráiganmelo en la cama, para que yo le dé muerte».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: También puede entenderse «sobre la cama» o «con la cama». La preposición hebrea permite más de una relación espacial; la orden probablemente significa que David debía ser transportado mientras seguía acostado.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּשְׁלַח
  english_pob_choice: Then Saul sent
  chosen_spanish: Entonces Saúl envió
  alternatives_spanish:
  - Y Saúl envió
  - Así que Saúl envió
  lexicon: HALOT
  rationale: El waw consecutivo marca avance narrativo; «Entonces» conserva la secuencia con fluidez natural en español.
- source_word: הַמַּלְאָכִים
  english_pob_choice: the messengers
  chosen_spanish: los mensajeros
  alternatives_spanish:
  - los enviados
  - los agentes
  lexicon: HALOT
  rationale: מַלְאָךְ aquí designa a hombres enviados por Saúl, no ángeles; «mensajeros» es el equivalente más claro y fiel.
- source_word: לִרְאוֹת
  english_pob_choice: to see
  chosen_spanish: para ver
  alternatives_spanish:
  - para inspeccionar
  - para comprobar
  lexicon: HALOT
  rationale: Aunque el verbo puede implicar verificar o constatar, «ver» preserva la literalidad básica sin cargar más sentido del que exige el hebreo.
- source_word: לֵאמֹר
  english_pob_choice: saying
  chosen_spanish: diciendo
  alternatives_spanish:
  - y dijo
  - con esta orden
  lexicon: HALOT
  rationale: Es la forma estándar para introducir el discurso directo; «diciendo» mantiene la relación formal con la orden citada.
- source_word: הַעֲלוּ
  english_pob_choice: Bring ... up
  chosen_spanish: Subidlo hacia mí
  alternatives_spanish:
  - Traedlo arriba
  - Subidlo
  lexicon: HALOT
  rationale: El hifil de עלה expresa hacer subir. En español, «Subidlo hacia mí» conserva la idea direccional y el tono imperativo del mandato.
- source_word: בַמִּטָּה
  english_pob_choice: in the bed
  chosen_spanish: en la cama
  alternatives_spanish:
  - sobre la cama
  - con la cama
  lexicon: HALOT
  rationale: El prefijo ב admite varias relaciones espaciales. En este contexto, «en la cama» refleja que David estaba tendido allí y debía ser llevado sin moverlo de esa postura.
- source_word: אֵלַי
  english_pob_choice: to me
  chosen_spanish: hacia mí
  alternatives_spanish:
  - a mí
  - ante mí
  lexicon: HALOT
  rationale: La dirección personal es central en el mandato de Saúl. «Hacia mí» conserva el movimiento hacia la presencia del rey; «a mí» también sería posible.
- source_word: לַהֲמִתוֹ
  english_pob_choice: so that I may put him to death
  chosen_spanish: para que yo lo mate
  alternatives_spanish:
  - para darle muerte
  - para que yo lo haga morir
  lexicon: HALOT
  rationale: El infinitivo con ל expresa propósito. «Matar» es la forma natural en español y preserva el valor intencional y letal de la orden; «darle muerte» sería más formal pero menos directo.
translation_notes:
  revision_awareness: Se tuvo en cuenta el audit trail inglés y su nota sobre la ambigüedad de בַמִּטָּה. No hubo revisiones aplicadas en el pass más reciente; la formulación española sigue la misma decisión de sentido con adaptación natural al español.
  spanish_consistency_notes:
  - Se mantuvo «mensajeros» para מַלְאָךְ en el sentido no celestial.
  - Se evitó «SEÑOR» o «Cristo» porque no aparecen en este versículo.
  - La nota textual se ancla en «en la cama», que es el punto de ambigüedad reconocido por el POB en inglés.
  - Se prefirió el presente de cita directa «diciendo» y el imperativo plural «Subidlo» para reflejar el hebreo.
  - «Para que yo lo mate» conserva el propósito explícito del infinitivo de לַהֲמִתוֹ.
