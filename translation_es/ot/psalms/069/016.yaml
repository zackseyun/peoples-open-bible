translation:
  language: es
  text: No permitas que el torrente de aguas[a] me arrastre, ni permitas que el abismo me trague, ni permitas que la fosa[b] cierre su boca sobre mí.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «la inundación de aguas». El hebreo también puede expresar la idea de una crecida o flujo impetuoso de aguas.
    reason: lexical_alternative
  - marker: b
    text: O «el pozo». El hebreo puede significar «pozo», pero aquí probablemente lleva el sentido de una fosa mortal en el paralelismo poético.
    reason: lexical_alternative
lexical_decisions:
- source_word: תִּשְׁטְפֵנִי
  english_pob_choice: sweep me away
  chosen_spanish: me arrastre
  alternatives_spanish:
  - me lleve
  - me arrase
  lexicon: HALOT
  rationale: El verbo hebreo expresa la acción destructiva de una masa de agua que sobrepasa y desplaza a la persona. En español, «me arrastre» comunica bien ese efecto de ser llevado por la fuerza del agua sin sonar forzado.
- source_word: שִׁבֹּלֶת מַיִם
  english_pob_choice: the flood of waters
  chosen_spanish: la corriente[a] de aguas
  alternatives_spanish:
  - la inundación de aguas
  - el torrente de aguas
  lexicon: HALOT
  rationale: שִׁבֹּלֶת puede referirse a una corriente, torrente o flujo de agua. «Corriente de aguas» conserva la imagen dinámica y permite un español natural; la nota preserva la alternativa léxica de «torrente» que el audit trail inglés también contempla.
- source_word: תִּבְלָעֵנִי
  english_pob_choice: swallow me up
  chosen_spanish: me trague
  alternatives_spanish:
  - me devore
  - me engulla
  lexicon: HALOT
  rationale: בלע significa «tragar, engullir». En español, «me trague» transmite el sentido de ser completamente absorbido, manteniendo la fuerza metafórica del hebreo.
- source_word: מְצוּלָה
  english_pob_choice: the deep
  chosen_spanish: el abismo
  alternatives_spanish:
  - las profundidades
  - el profundo
  lexicon: HALOT
  rationale: מְצוּלָה designa las profundidades, a menudo de aguas peligrosas. «Abismo» comunica el carácter amenazante y poético de la imagen en español con naturalidad; no pretende neutralizar la tensión del término.
- source_word: תֶּאְטַר
  english_pob_choice: close
  chosen_spanish: cierre
  alternatives_spanish:
  - se cierre
  - se clausure
  lexicon: HALOT
  rationale: El verbo expresa cerrar o sellar la abertura. «Cierre su boca» preserva la personificación del pozo y el movimiento de cierre sobre el hablante.
- source_word: בְּאֵר
  english_pob_choice: the pit
  chosen_spanish: el pozo
  alternatives_spanish:
  - la cisterna
  - el hoyo
  lexicon: HALOT
  rationale: Aunque בְּאֵר puede significar «pozo», en el paralelo poético también puede funcionar como imagen de una fosa o cavidad mortal. Se conserva «pozo» porque permite mantener el posible trasfondo literal sin perder la personificación de la boca.
- source_word: פִּיהָ
  english_pob_choice: its mouth
  chosen_spanish: su boca
  alternatives_spanish:
  - su abertura
  - su boca
  lexicon: HALOT
  rationale: La metáfora del pozo como algo con «boca» está en el hebreo y debe conservarse. En español, «su boca» reproduce esa personificación de modo claro y fiel.
- source_word: עָלַי
  english_pob_choice: over me
  chosen_spanish: sobre mí
  alternatives_spanish:
  - encima de mí
  - contra mí
  lexicon: HALOT
  rationale: «Sobre mí» conserva la idea de cubrir y cerrar por encima del hablante, que es el valor imagístico principal en este verso.
theological_decisions:
- issue: Imagen del pozo como amenaza mortal en el paralelismo poético
  english_pob_reading: the pit close its mouth over me
  chosen_spanish_reading: el pozo cierre su boca sobre mí
  alternative_spanish_readings:
  - la cisterna cierre su boca sobre mí
  - el hoyo cierre su boca sobre mí
  rationale: 'El inglés POB retiene la imagen personificada del pozo y explica que el término puede sugerir un pozo o una fosa mortal. En español se conserva esa tensión sin suavizarla: «pozo» mantiene la lectura más literal, mientras el contexto poético permite oír también la idea de una fosa amenazante.'
  doctrine_reference: Psalm 69 lament imagery; poetic metaphor without doctrinal alteration
- issue: Ritmo de negaciones repetidas en el hebreo
  english_pob_reading: Do not let... and do not let... and do not let...
  chosen_spanish_reading: No permitas que... ni permitas que... ni permitas que...
  alternative_spanish_readings:
  - No dejes que... ni dejes que... ni dejes que...
  - No permitas que... y no permitas que... y no permitas que...
  rationale: Se conserva la triple negativa paralela del hebreo y del inglés POB. «Ni» enlaza con claridad las dos cláusulas finales en español y mantiene el tono de súplica intensificada del salmo.
  doctrine_reference: Hebrew poetic parallelism
translation_notes:
  revision_awareness: El texto inglés auditado permanece sin cambios en la revisión más reciente; se mantiene la solución óptimo-equivalente y la nota léxica sobre la imagen del pozo, sin introducir ajustes textuales adicionales.
  spanish_consistency_notes:
  - Se usó «Yahvé» como forma por defecto solo cuando el texto lo requiera; este versículo no contiene el nombre divino.
  - Se mantuvo el paralelismo con tres negaciones para reflejar la estructura hebrea.
  - Se preservó la personificación de «boca» en el pozo para no borrar la tensión poética documentada en el audit trail en inglés.
