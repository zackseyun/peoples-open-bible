translation:
  language: es
  text: Aarón presentará el toro de la ofrenda por el pecado que es para él[a], y hará expiación por sí y por su casa[b]; luego degollará el toro de la ofrenda por el pecado que es para él.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «el toro para la ofrenda por el pecado».
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: «por sí y por su casa»; aquí «casa» significa los de su casa, es decir, su familia o los de su hogar.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהִקְרִיב
  english_pob_choice: shall present
  chosen_spanish: presentará
  alternatives_spanish:
  - ofrecerá
  - acercará
  lexicon: HALOT
  rationale: En contexto sacrificial, el hiphil de קרב expresa traer/presentar ante Dios el animal designado. «Presentará» conserva el valor ritual sin adelantar el acto completo, que el versículo distingue después con el degüello.
- source_word: פַּר הַחַטָּאת
  english_pob_choice: the bull of the sin offering
  chosen_spanish: el toro de la ofrenda por el pecado
  alternatives_spanish:
  - el toro del sacrificio por el pecado
  - el toro de la ofrenda por el pecado
  lexicon: HALOT
  rationale: Se mantiene la relación de construcción hebrea con una formulación natural en español. «Toro» comunica el animal sacrificial y «ofrenda por el pecado» conserva la terminología cultual sin suavizarla a un giro más interpretativo.
- source_word: אֲשֶׁר ל֔וֹ
  english_pob_choice: that is for himself
  chosen_spanish: que es para sí
  alternatives_spanish:
  - que le pertenece
  - que es suyo
  lexicon: HALOT
  rationale: La frase marca la destinación ritual del animal para el propio Aarón. «Para sí» reproduce bien la función beneficiaria/on behalf of sin reducirla solo a posesión.
- source_word: וְכִפֶּר
  english_pob_choice: shall make atonement
  chosen_spanish: hará expiación
  alternatives_spanish:
  - hará atonamiento
  - hará propiciación
  lexicon: HALOT
  rationale: En español bíblico contemporáneo, «hará expiación» conserva el campo sacerdotal de כפר mejor que una paráfrasis explicativa. «Propiciación» sería posible, pero aquí estrecha innecesariamente el acto ritual descrito.
- source_word: בַּעֲד֖וֹ וּבְעַד בֵּיתוֹ
  english_pob_choice: for himself and for his household
  chosen_spanish: por sí y por su casa
  alternatives_spanish:
  - por sí mismo y por su casa
  - en favor de sí y de su casa
  lexicon: HALOT
  rationale: «ביתו» puede ser «casa» o «familia/hogar». Se conserva «casa» para seguir de cerca el hebreo y mantener la resonancia cultual; «por» expresa el sentido de beneficio/intercesión del בעד.
- source_word: וְשָׁחַט
  english_pob_choice: then he shall slaughter
  chosen_spanish: luego degollará
  alternatives_spanish:
  - y degollará
  - y sacrificará
  lexicon: HALOT
  rationale: «Degollar» es el equivalente más preciso del término sacrificial; «sacrificar» sería demasiado general y «matar» demasiado amplio. «Luego» refleja la secuencia marcada en el original.
- source_word: פַּר הַֽ/חַטָּ֖את אֲשֶׁר לֽוֹ
  english_pob_choice: the bull of the sin offering that is for himself
  chosen_spanish: el toro de la ofrenda por el pecado que es para sí
  alternatives_spanish:
  - el toro de la ofrenda por el pecado que le pertenece
  - el toro para la ofrenda por el pecado que es para él
  lexicon: HALOT
  rationale: Se repite en español la misma fórmula para respetar la repetición enfática del hebreo. La auto-referencia se mantiene con «para sí» para no perder el carácter ritual y personal de la designación.
theological_decisions:
- issue: כפר como acto ritual de expiación sin reducirlo a una sola teoría soteriológica
  english_pob_reading: make atonement
  chosen_spanish_reading: hará expiación
  alternative_spanish_readings:
  - hará propiciación
  - purificará
  rationale: La frase describe la acción sacerdotal y sus beneficiarios, no una explicación doctrinal exhaustiva del mecanismo. «Harà expiación» conserva la tensión bíblica sin imponer una síntesis teológica externa.
  doctrine_reference: Translation philosophy §3; mantener la tensión teológica documentada
translation_notes:
  revision_awareness: El texto sigue de cerca el audit trail inglés sin depender mecánicamente de él; se verificaron las decisiones clave sobre קרב, כפר, בעד, בית y שחט, y no hubo revisiones posteriores que alteraran el sentido.
  spanish_consistency_notes:
  - Se evita «SEÑOR» porque no aparece el Tetragrámaton en este versículo.
  - Se conserva la terminología sacrificial «ofrenda por el pecado» como equivalente estable de החטאת.
  - «Casa» se usa en sentido de casa/hogar/familia según el contexto ritual, no como edificio.
  - La secuencia verbal queda clara en español con «presentará... hará expiación... luego degollará» para reflejar el orden del hebreo.
