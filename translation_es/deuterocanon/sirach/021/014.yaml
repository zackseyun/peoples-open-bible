  rationale: Se cambia «vaso» por «vasija» para reflejar mejor ἄγγιον y sonar más natural en español bíblico contemporáneo, manteniendo intacta la imagen de un recipiente quebrado que no retiene conocimiento. El resto del verso puede conservarse.
