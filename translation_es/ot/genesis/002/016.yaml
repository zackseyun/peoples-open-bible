translation:
  language: es
  text: 'Yahvé Dios mandó al hombre, diciendo: «De todo árbol del jardín podrás comer[a]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «podrás comer libremente». El hebreo usa un infinitivo absoluto con el verbo finito para intensificar la idea.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְצַו
  english_pob_choice: commanded
  chosen_spanish: mandó
  alternatives_spanish:
  - ordenó
  - comandó
  lexicon: HALOT
  rationale: צוה expresa dar una orden o mandato. En español, «mandó» comunica bien la fuerza autoritativa del verbo sin sonar tan rígido como «ordenó» en este contexto narrativo.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  lexicon: HALOT
  rationale: Se conserva el nombre divino del Tetragrámaton con la forma establecida del proyecto en español, «Yahvé», en vez de sustituirlo por un título.
- source_word: אֱלֹהִים
  english_pob_choice: God
  chosen_spanish: Dios
  alternatives_spanish:
  - el Dios
  lexicon: HALOT
  rationale: En la designación compuesta יְהוָה אֱלֹהִים, «Dios» es la equivalencia natural y fiel en español.
- source_word: עַל הָאָדָם
  english_pob_choice: the man
  chosen_spanish: al hombre
  alternatives_spanish:
  - al ser humano
  - a Adán
  lexicon: HALOT
  rationale: Aquí se refiere al individuo humano colocado en el jardín, no a la humanidad en general. En español, «al hombre» conserva el referente narrativo singular y el valor gender-accurate.
- source_word: לֵאמֹר
  english_pob_choice: saying
  chosen_spanish: diciendo
  alternatives_spanish:
  - y dijo
  lexicon: HALOT
  rationale: Es la fórmula quotativa normal para introducir discurso directo. «Diciendo» es literal y natural en español.
- source_word: מִכֹּל
  english_pob_choice: from every
  chosen_spanish: de todo
  alternatives_spanish:
  - de cada
  - de todo cuanto
  lexicon: HALOT
  rationale: Con el verbo de comer, la expresión transmite permiso sobre cada árbol del jardín. «De todo» suena natural y preserva la amplitud distributiva.
- source_word: עֵץ הַגָּן
  english_pob_choice: tree of the garden
  chosen_spanish: árbol del jardín
  alternatives_spanish:
  - árbol del huerto
  - árbol del jardín
  lexicon: HALOT
  rationale: «Jardín» mantiene la correspondencia con el uso bíblico y el texto fuente; «árbol del jardín» conserva la estructura del hebreo sin forzar un calco innecesario.
- source_word: אָכֹל תֹּאכֵל
  english_pob_choice: you may surely eat
  chosen_spanish: ciertamente podrás comer
  alternatives_spanish:
  - podrás comer libremente
  - podrás comer sin duda
  lexicon: HALOT
  rationale: El infinitivo absoluto con el verbo finito intensifica la afirmación. En español, «ciertamente podrás comer» refleja bien la seguridad/enfasis del hebreo y mantiene el sentido de permiso, no de mandato.
theological_decisions:
- issue: Rendering of the divine name יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Jehová
  rationale: Se sigue la convención doctrinal del proyecto para el Nombre divino, preservando el valor propio del Tetragrámaton en lugar de ocultarlo tras una sustitución litúrgica.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Rendering of הָאָדָם
  english_pob_reading: the man
  chosen_spanish_reading: el hombre
  alternative_spanish_readings:
  - el ser humano
  - la persona
  rationale: El contexto narrativo es el individuo creado y puesto en el jardín; por eso se mantiene el singular masculino en vez de neutralizar el referente.
  doctrine_reference: 'DOCTRINE.md Contested terms: אָדָם adam → man / humankind (context); Gender-accurate over gender-neutral'
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión del audit trail que ajustó la puntuación inglesa final; en español se cerró la cita con punto dentro de las comillas para una presentación natural y consistente.
  spanish_consistency_notes:
  - Se usa «Yahvé» conforme al estándar del proyecto en español, no «SEÑOR».
  - Se conserva el singular «el hombre» porque el contexto es el individuo Adán, no la humanidad en general.
  - La fuerza intensiva de אָכֹל תֹּאכֵל se expresa con «ciertamente podrás comer», manteniendo el matiz de permiso reforzado sin volverlo imperativo.
  - Las comillas angulares y la puntuación final siguen la norma tipográfica del español.
