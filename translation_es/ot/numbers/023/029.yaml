translation:
  language: es
  text: 'Entonces Balaam dijo a Balac: «Construye aquí siete altares para mí, y prepara aquí siete toros y siete carneros para mí».'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: וַיֹּאמֶר
  english_pob_choice: Then ... said
  chosen_spanish: Entonces ... dijo
  alternatives_spanish:
  - Y ... dijo
  - Luego ... dijo
  lexicon: HALOT
  rationale: La forma consecutiva avanza la narración; «Entonces» conserva mejor ese valor secuencial que un simple «y», con español natural.
- source_word: בִּלְעָם
  english_pob_choice: Balaam
  chosen_spanish: Balaam
  alternatives_spanish:
  - Bileam
  lexicon: convención onomástica bíblica
  rationale: Se conserva el nombre propio en la forma bíblica ya establecida en español, sin alterar la identificación del personaje.
- source_word: אֶל
  english_pob_choice: to
  chosen_spanish: a
  alternatives_spanish:
  - hacia
  lexicon: HALOT
  rationale: En discurso directo, la preposición de dirección se expresa naturalmente en español con «a».
- source_word: בָּלָק
  english_pob_choice: Balak
  chosen_spanish: Balac
  alternatives_spanish:
  - Balak
  lexicon: convención onomástica bíblica en español
  rationale: Se adopta la forma habitual en español bíblico, manteniendo la referencia al personaje sin ambigüedad.
- source_word: בְּנֵה
  english_pob_choice: Build
  chosen_spanish: Edifícame
  alternatives_spanish:
  - Construye para mí
  - Hazme
  lexicon: HALOT
  rationale: El imperativo de בנה aplicado a altares se entiende como «edificar»; se añade el pronombre dativo del hebreo («para mí») como enclítico natural en español («-me»), y el mandato se vuelve más idiomático.
- source_word: לִי
  english_pob_choice: for me
  chosen_spanish: -me
  alternatives_spanish:
  - para mí
  - a mí
  lexicon: HALOT
  rationale: El valor beneficiario se expresa en español con clítico dativo unido al verbo imperativo, que es la forma más natural y fiel aquí.
- source_word: בָּזֶה
  english_pob_choice: here
  chosen_spanish: aquí
  alternatives_spanish:
  - en este lugar
  - acá
  lexicon: HALOT
  rationale: El deíctico locativo se traduce por «aquí», que preserva la referencia espacial inmediata y suena natural en mandato.
- source_word: שִׁבְעָה מִזְבְּחֹת
  english_pob_choice: seven altars
  chosen_spanish: siete altares
  alternatives_spanish:
  - siete sacrificatorios
  lexicon: HALOT
  rationale: «Altares» reproduce el término cultual básico de מִזְבְּחֹת sin tecnicismos innecesarios.
- source_word: וְהָכֵן
  english_pob_choice: and prepare
  chosen_spanish: y prepárame
  alternatives_spanish:
  - y prepara para mí
  - y dispón
  lexicon: HALOT
  rationale: El Hifil de כון aquí implica preparar/dejar listo; en contexto sacrificial, «preparar» es claro y fiel, con el beneficiario expresado por clítico.
- source_word: פָרִים
  english_pob_choice: bulls
  chosen_spanish: toros
  alternatives_spanish:
  - bueyes
  - novillos
  lexicon: HALOT
  rationale: «Toros» comunica el animal sacrificial macho con fuerza léxica adecuada en español. «Bueyes» podría sugerir animal de labor; «novillos» añade una edad no explícita.
- source_word: אֵילִים
  english_pob_choice: rams
  chosen_spanish: carneros
  alternatives_spanish:
  - machos oveja
  - rams
  lexicon: HALOT
  rationale: «Carneros» es el equivalente español natural de male sheep en contexto sacrificial; preserva la especificidad zoológica sin explicar de más.
translation_notes:
  revision_awareness: 'La redacción sigue de cerca el hebreo y el audit trail inglés: conserva la secuencia narrativa, el mandato directo a Balac, el deíctico locativo y la lista sacrificial sin añadidos interpretativos. No se registraron revisiones previas ni notas textuales en el paquete fuente.'
  spanish_consistency_notes:
  - 'Se mantiene la terminología cultual en español estándar: «altares», «toros», «carneros».'
  - Se usa «Balaam» y «Balac» en formas bíblicas asentadas en español.
  - Se preserva el orden y paralelismo del hebreo con un ritmo natural de discurso directo en español.
