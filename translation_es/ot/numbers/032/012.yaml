translation:
  language: es
  text: excepto Caleb hijo de Jefone, el quenizita[a], y Josué hijo de Nun, porque siguieron a Yahvé de todo corazón.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «el kenezita». El hebreo usa un gentilicio; la forma española puede variar según la transliteración.'
    reason: lexical_alternative
lexical_decisions:
- source_word: בִּלְתִּי
  english_pob_choice: except
  chosen_spanish: excepto
  alternatives_spanish:
  - salvo
  - fuera de
  lexicon: HALOT
  rationale: La partícula introduce la excepción respecto del juicio previo. «Excepto» es natural en español y conserva la función exclusivizante del hebreo.
- source_word: כָּלֵב בֶּן יְפֻנֶּה
  english_pob_choice: Caleb son of Jephunneh
  chosen_spanish: Caleb hijo de Jefone
  alternatives_spanish:
  - Caleb hijo de Jephunneh
  lexicon: convención onomástica / uso bíblico español
  rationale: Se conserva el nombre propio en forma reconocible para español bíblico, y בֶּן se rinde con «hijo de» para mantener la relación genealógica.
- source_word: הַקְּנִזִּי
  english_pob_choice: the Kenizzite
  chosen_spanish: el quenizita
  alternatives_spanish:
  - el kenezita
  lexicon: HALOT
  rationale: Es un gentilicio que identifica el linaje o asociación étnica de Caleb. «Quenizita» conserva la forma transliterada y la referencia etnónica sin sustituirla por una glosa interpretativa.
- source_word: וִיהוֹשֻׁעַ בִּן נוּן
  english_pob_choice: and Joshua son of Nun
  chosen_spanish: y Josué hijo de Nun
  alternatives_spanish:
  - y Josué hijo de Nun
  lexicon: convención onomástica / uso bíblico español
  rationale: Se mantiene la coordinación con la segunda excepción y la fórmula genealógica estándar en español.
- source_word: מִלְאוּ אַחֲרֵי
  english_pob_choice: fully followed
  chosen_spanish: siguieron plenamente
  alternatives_spanish:
  - siguieron de todo corazón
  - fueron completamente leales en seguir
  lexicon: HALOT
  rationale: El hebreo es idiomático, literalmente «llenar después de». «Siguieron plenamente» transmite la idea de lealtad completa sin perder la fuerza del seguimiento total. Se evita una paráfrasis excesiva, pero se conserva la noción de fidelidad integral.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  - SEÑOR
  lexicon: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
  rationale: Se traduce el Tetragrámaton como «Yahvé», siguiendo la política del POB español de no ocultar el nombre divino tras una sustitución titular. En español, «Yahvé» es la forma idiomática de la transliteración del nombre personal divino.
theological_decisions:
- issue: Renderización del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Jehová
  - SEÑOR
  rationale: El verso usa directamente el Tetragrámaton. Para preservar el nombre pactual de Dios en una forma natural para el español, se elige «Yahvé» en lugar de sustituirlo por un título.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Fuerza del idiomático מִלְאוּ אַחֲרֵי
  english_pob_reading: fully followed / followed wholeheartedly
  chosen_spanish_reading: siguieron plenamente
  alternative_spanish_readings:
  - siguieron de todo corazón
  - fueron completamente leales en seguir
  rationale: La expresión hebrea no es meramente espacial; comunica entrega total y lealtad completa. «Siguieron plenamente» conserva esa tensión entre seguimiento y fidelidad total sin nivelarla a una frase más interpretativa.
  doctrine_reference: HALOT; nota lexical del POB inglés sobre el modismo
translation_notes:
  revision_awareness: La revisión más reciente del contexto inglés no introdujo cambios; el texto fue confirmado sin modificaciones. La versión española sigue la decisión estable del POB inglés para بִּלְתִּי, los nombres propios, el gentilicio y el modismo מִלְאוּ אַחֲרֵי, adaptando únicamente la forma natural del español y la política del nombre divino.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» para יְהוָה conforme a la terminología base del proyecto.
  - Se usa «hijo de» para בֶּן en genealogías, manteniendo legibilidad bíblica en español.
  - «Siguieron plenamente» preserva la fuerza de seguimiento total sin añadir elementos no presentes en el hebreo.
  - El gentilicio «quenizita» se ancla con nota alternativa para reflejar la variación transliterativa posible en español.
