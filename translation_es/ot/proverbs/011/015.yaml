review_pass:
  verdict: revise
  source_alignment_summary: El borrador capta bien la estructura general y el sentido jurídico de עָרַב con «sale fiador», así como el contraste final con «está seguro». Sin embargo, «Malo se dañará» no preserva bien el valor idiomático de רַע יֵרֹועַ; suena antinatural en español y puede sugerir una valoración moral del sujeto. Además, «dar palmadas de garantía» no refleja con naturalidad el modismo תֹקְעִים ni el inglés auditado «striking hands»; conviene una formulación más clara con nota cultural.
  spanish_quality_summary: El texto necesita un ajuste menor pero importante para la legibilidad y naturalidad proverbial en español. «Sufrirá ciertamente daño» y «aborrece estrechar manos» mantienen mejor el tono sapiencial y la claridad. También conviene eliminar la nota sobre «Malo», porque la solución revisada ya expresa el sentido sin ambigüedad.
  glossary_alignment: No hay términos del glosario mayor en juego. Se mantiene correctamente «extraño» para זָר, aunque «desconocido» sería posible; «sale fiador» alinea bien con «becomes surety». «Aborrece» preserva la fuerza de שֹׂנֵא. La principal mejora terminológica es representar תֹקְעִים con una expresión idiomática española apoyada por nota cultural, en vez de «palmadas de garantía».
  issues:
  - severity: high
    issue: «Malo[a] se dañará» es una formulación poco natural y potencialmente equívoca.
    rationale: רַע con יֵרֹועַ expresa un resultado adverso («sufrirá daño / le irá mal»), no «malo» como adjetivo moral. La nota intenta corregirlo, pero el texto principal debe comunicarlo por sí mismo.
  - severity: medium
    issue: «dar palmadas de garantía» suena forzado y no representa bien el modismo hebreo.
    rationale: תֹקְעִים alude al gesto de golpear/estrechar manos para sellar una garantía. En español, «estrechar manos» o «darse la mano» con nota explica mejor el gesto sin perder legibilidad.
  - severity: low
    issue: La nota a sobrecarga el texto para resolver un problema creado por la propia redacción.
    rationale: Si se revisa el primer hemistiquio a una expresión idiomática española clara, la nota deja de ser necesaria.
  revised_spanish_text: Sufrirá ciertamente daño quien sale fiador por un extraño, pero el que aborrece estrechar manos[a] está seguro.
  revised_footnotes:
  - marker: a
    text: Literalmente, «golpear/estrechar manos»; se trata de un gesto usado para sellar una prenda, garantía o compromiso.
    reason: cultural_note
  revision_rationale: 'La revisión corrige dos puntos principales: 1) reemplaza «Malo se dañará» por «Sufrirá ciertamente daño», que expresa con claridad y naturalidad el valor adversativo-intensivo de רַע יֵרֹועַ sin sugerir maldad moral; 2) sustituye «dar palmadas de garantía» por «estrechar manos», una formulación española más inteligible para el modismo תֹקְעִים, conservando la explicación cultural en nota. El resto del versículo ya era fiel y de buen registro.'
