translation:
  language: es
  text: Toma el escudo y la adarga[a], y levántate en mi ayuda.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «escudo grande» para «adarga»; el hebreo usa dos términos distintos para armas defensivas, probablemente para indicar clases diferentes de escudo.
    reason: lexical_alternative
lexical_decisions:
- source_word: הַחֲזֵק
  english_pob_choice: Take hold of
  chosen_spanish: Toma
  alternatives_spanish:
  - Toma en mano
  - Agárralo
  - Sujeta
  lexicon: HALOT
  rationale: El imperativo pide a Yahvé que entre en acción con una imagen concreta de combate. En español, "toma" comunica de manera natural la idea de tomar en la mano o asumir un arma, sin perder la inmediatez del verbo hebreo.
- source_word: מָגֵן
  english_pob_choice: shield
  chosen_spanish: escudo
  alternatives_spanish:
  - escudo pequeño
  - broquel
  lexicon: HALOT
  rationale: מָגֵן es el término común para escudo. "Escudo" mantiene el sentido directo y es transparente en español contemporáneo.
- source_word: צִנָּה
  english_pob_choice: buckler
  chosen_spanish: adarga
  alternatives_spanish:
  - escudo grande
  - broquel
  lexicon: HALOT
  rationale: La pareja hebrea distingue dos clases de arma defensiva. "Adarga" permite conservar una distinción real entre מָגֵן y צִנָּה en español, sin nivelarlas ambas como "escudo". Dado que "buckler" en inglés del POB puede sugerir un escudo pequeño, aquí se elige un término español históricamente asociado con un escudo de distinta factura para señalar que no son idénticos.
- source_word: וְקוּמָה
  english_pob_choice: and rise up
  chosen_spanish: y levántate
  alternatives_spanish:
  - y alzate
  - y levántate en pie
  - y surge
  lexicon: HALOT
  rationale: קוּם con fuerza exhortativa expresa levantarse para intervenir. "Levántate" es idiomático en español y conserva el valor dinámico de la súplica.
- source_word: בְּעֶזְרָתִי
  english_pob_choice: for my help
  chosen_spanish: para ayudarme
  alternatives_spanish:
  - en mi ayuda
  - para socorrerme
  - como mi ayuda
  lexicon: HALOT
  rationale: La construcción con ב + עֶזְרָה se entiende idiomáticamente como entrar en acción en favor del orante. "Para ayudarme" expresa con naturalidad esa relación de finalidad y preserva la noción de ayuda sin forzar una fórmula más literal que suene extraña en español.
theological_decisions:
- issue: Imaginería bélica aplicada a Yahvé
  english_pob_reading: Retain the literal imagery of God taking up defensive weapons and rising to aid the psalmist.
  chosen_spanish_reading: Conservar la imagen literal de Yahvé tomando armas defensivas y levantándose en favor del salmista.
  alternative_spanish_readings:
  - Suavizar a una petición general de protección
  - Parafrasear como una súplica de rescate sin imágenes militares
  rationale: El hebreo es claramente marcial y metafórico. La traducción debe dejar visible esa imaginería de guerrero-defensor, porque reducirla a una mera petición abstracta de protección borrarían un rasgo importante del texto.
  doctrine_reference: Principio POB de primacía del idioma original y preservación de la imagen textual cuando el hebreo la expresa de forma explícita.
translation_notes:
  revision_awareness: 'Coincide con la última revisión disponible: no se reportan cambios aplicados y el pasaje quedó confirmado en el control cruzado más reciente.'
  spanish_consistency_notes:
  - Se mantiene "Yahvé" en la base terminológica del proyecto, aunque en este versículo el nombre divino no aparece explícitamente en el hebreo.
  - Se usa "adarga" para preservar la distinción léxica entre los dos términos de defensa; si el contexto editorial prefiriera un término más moderno, la alternativa anotada sería "escudo grande".
  - '"Levántate" conserva el tono imperativo y urgente del hebreo mejor que una formulación más explicativa.'
