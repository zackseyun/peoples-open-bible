translation:
  language: es
  text: 'Entonces gritó: «¡Un león![a] En la torre de vigía, mi señor, permanezco de pie continuamente de día, y en mi puesto estoy apostado todas las noches[b]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebreo literalmente, «¡Un león!»; la expresión es difícil. El texto principal conserva la lectura masorética sin resolver la ambigüedad con una paráfrasis interpretativa.
    reason: alternative_reading
  - marker: b
    text: 'O «cada noche» / «toda la noche». El hebreo tiene el plural: «todas las noches».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּקְרָא
  english_pob_choice: Then he cried
  chosen_spanish: Entonces gritó
  alternatives_spanish:
  - Entonces llamó
  - Entonces clamó
  lexicon: HALOT
  rationale: El wayyiqtol de קרא aquí expresa un grito o exclamación repentina. «Gritó» comunica mejor la urgencia que «llamó», y mantiene la secuencia narrativa con «Entonces».
- source_word: אַרְיֵה
  english_pob_choice: A lion!
  chosen_spanish: ¡Un león!
  alternatives_spanish:
  - ¡León!
  - ¡Como un león!
  lexicon: HALOT
  rationale: La forma hebrea es literalmente un sustantivo aislado y difícil. Siguiendo la decisión auditada de mantener la lectura masorética, en español se conserva la exclamación literal «¡Un león!», dejando la ambigüedad textual sin forzar una paráfrasis interpretativa.
- source_word: עַל מִצְפֶּה
  english_pob_choice: On the watchtower
  chosen_spanish: En la torre de vigía
  alternatives_spanish:
  - Sobre la atalaya
  - En el puesto de observación
  lexicon: HALOT
  rationale: מִצְפֶּה designa un lugar elevado de vigilancia. «Torre de vigía» transmite bien la imagen en español y es natural para un contexto de centinela.
- source_word: אֲדֹנָי
  english_pob_choice: my lord
  chosen_spanish: mi señor
  alternatives_spanish:
  - señor mío
  - mi dueño
  lexicon: HALOT
  rationale: Con sufijo de 1ª persona, el término no es el nombre divino sino una forma de tratamiento hacia un superior. «Mi señor» conserva ese valor relacional sin confundirlo con Yahvé.
- source_word: עֹמֵד
  english_pob_choice: stand
  chosen_spanish: estoy de pie
  alternatives_spanish:
  - permanezco
  - estoy parado
  lexicon: HALOT
  rationale: El participio expresa postura continua. «Estoy de pie» mantiene la imagen corporal y el carácter durativo mejor que un simple presente verbal.
- source_word: תָּמִיד
  english_pob_choice: continually
  chosen_spanish: continuamente
  alternatives_spanish:
  - sin cesar
  - siempre
  lexicon: HALOT
  rationale: תָּמִיד indica continuidad ininterrumpida o habitual. «Continuamente» reproduce esa vigilia persistente con registro claro y digno.
- source_word: יוֹמָם
  english_pob_choice: by day
  chosen_spanish: de día
  alternatives_spanish:
  - durante el día
  - por el día
  lexicon: HALOT
  rationale: El adverbio señala el periodo diurno. «De día» es la forma más natural en español y contrasta bien con «todas las noches».
- source_word: וְעַל מִשְׁמַרְתִּי
  english_pob_choice: and at my post
  chosen_spanish: y en mi puesto
  alternatives_spanish:
  - y en mi guardia
  - y en mi puesto de guardia
  lexicon: HALOT
  rationale: מִשְׁמֶרֶת puede ser guardia, vigilancia o puesto. «Mi puesto» suena idiomático en español y preserva la noción de responsabilidad asignada.
- source_word: נִצָּב
  english_pob_choice: I am stationed
  chosen_spanish: estoy apostado
  alternatives_spanish:
  - estoy colocado
  - estoy establecido
  lexicon: HALOT
  rationale: El participio nifal comunica estar puesto o situado con función asignada. «Apostado» conserva bien el matiz de centinela, más preciso que repetir «estoy de pie».
- source_word: כָּל הַלֵּילוֹת
  english_pob_choice: all the nights
  chosen_spanish: todas las noches
  alternatives_spanish:
  - toda la noche
  - cada noche
  lexicon: HALOT
  rationale: El hebreo usa plural explícito. En español, «todas las noches» mantiene ese plural y la idea de vigilancia repetida, como en la nota auditada del texto inglés.
theological_decisions:
- issue: Ambigüedad de אַרְיֵה
  english_pob_reading: A lion!; the phrase is difficult, and the main text preserves the Masoretic reading as an exclamation.
  chosen_spanish_reading: ¡Un león!
  alternative_spanish_readings:
  - ¡León!
  - ¡Como un león!
  rationale: No se suaviza la dificultad del hebreo con una comparación interpretativa. Se conserva la exclamación breve y ambigua, coherente con la decisión auditada de no resolver el problema textualmente en el cuerpo principal.
  doctrine_reference: Principio de transparencia textual / lectura masorética
- issue: Tratamiento de אֲדֹנָי con sufijo
  english_pob_reading: my lord, addressed to the superior receiving the report, not the divine name.
  chosen_spanish_reading: mi señor
  alternative_spanish_readings:
  - señor mío
  - mi dueño
  rationale: La forma con sufijo apunta a un superior humano en la escena, no al nombre divino. Traducir «mi señor» evita introducir una mayúscula teológica no sustentada por el contexto inmediato.
  doctrine_reference: Distinción entre tratamiento humano y nombre divino Yahvé
translation_notes:
  revision_awareness: La redacción española sigue la revisión auditada que prefirió una exclamación literal («A lion!») en vez de una comparación («Like a lion!»). Se conserva la fuerza abrupta del hebreo y la nota explicativa sobre la dificultad del miembro inicial. También se preserva el plural de «all the nights» mediante «todas las noches», de acuerdo con el control de revisiones y la nota léxica inglesa.
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando el texto lo requiera; aquí no aparece el Tetragrámaton.
  - Se evita «Señor» con mayúscula para אֲדֹנָי con sufijo, porque el referente inmediato es humano.
  - Se conserva el plural explícito de las noches en la nota para reflejar el hebreo.
  - El tono es formal pero natural para lectura pública e iglesia amplia.
