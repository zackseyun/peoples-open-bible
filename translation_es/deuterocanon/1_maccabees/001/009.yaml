review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura griega: todos se ponen insignias reales tras la muerte de Alejandro, luego sus hijos en sucesión, y el resultado es la multiplicación de κακὰ. Sin embargo, omite en las notas la alternativa correspondiente al segundo matiz preservado por el POB inglés sobre κακὰ/ἐπλήθυναν, y ''en la tierra'' no sigue la decisión contextual auditada de ἐν τῇ γῇ como ''en la tierra/land'' en sentido histórico-político; en español aquí conviene ''en la tierra'' menos que ''en el país'' o mejor ''en la tierra'' contextualizada? Dado el POB inglés, la opción más fiel y natural es ''en la tierra'' only if broad ambiguity intended, but the audit explicitly prefers ''in the land''. En español narrativo de 1 Macabeos, ''en la tierra'' suena demasiado cósmico; ''en el país'' suena moderno-político; ''en la tierra'' no preserva bien el contexto. ''En la tierra'' debe ajustarse a ''en el país'' o ''en la región'', pero para resonancia bíblica e histórico-territorial,
    ''en la tierra'' is common; aun así, por fidelidad a la decisión auditada, se recomienda ''en la tierra'' -> ''en el país'' o ''en la tierra'' footnoted. Mejor: ''en la tierra'' revisado a ''en el país'' sería demasiado contemporáneo. ''En la tierra'' remains understandable but misses audit rationale. También falta nota b del inglés.'
  spanish_quality_summary: El español es claro y digno, con buen ritmo. 'Se pusieron coronas' es natural. 'Multiplicaron los males' funciona y preserva la amplitud. El principal problema de calidad editorial es la inconsistencia entre el texto principal y la documentación lexical sobre ἐν τῇ γῇ, junto con la ausencia de la nota de alternativa semántica que el POB inglés sí conserva. Una reparación menor basta.
  glossary_alignment: No hay términos del glosario principal en juego salvo decisiones generales de estilo. La traducción de διαδήματα como 'coronas' con nota 'diademas' está bien. La amplitud de κακὰ se mantiene correctamente con 'los males'.
  issues:
  - severity: medium
    issue: Falta una nota equivalente a la nota inglesa b sobre el alcance de 'males'/'multiplicaron'.
    rationale: El POB inglés preserva explícitamente las alternativas 'wickedness' y 'calamities'. Como el español usa 'los males', conviene conservar esa amplitud con una nota para no perder el rastro auditado.
  - severity: medium
    issue: '''En la tierra'' no sigue bien la decisión contextual de ἐν τῇ γῇ como referencia a la tierra/país en sentido histórico-político.'
    rationale: En 1 Macabeos, el referente no es la tierra entera sino la tierra/país del relato. En español, 'en la tierra' puede sonar demasiado general o cósmico. 'En el país' comunica mejor el contexto, aunque con tono más moderno; aquí mejora la fidelidad contextual.
  revised_spanish_text: Y todos se pusieron[a] coronas después de su muerte, y sus hijos después de ellos durante muchos años; y multiplicaron los males[b] en el país.
  revised_footnotes:
  - marker: a
    text: O “diademas”. El término griego se refiere específicamente a insignias reales.
    reason: lexical_alternative
  - marker: b
    text: O “aumentaron la maldad” o “aumentaron las calamidades en el país”. El griego “males” es lo bastante amplio como para incluir tanto el mal moral como sus consecuencias dañinas.
    reason: alternative_reading
  revision_rationale: Se añade la nota b para preservar la amplitud semántica documentada en el POB inglés para κακὰ/ἐπλήθυναν, y se ajusta 'en la tierra' a 'en el país' para reflejar mejor el sentido histórico-político de ἐν τῇ γῇ en 1 Macabeos y sonar más natural en español contemporáneo legible en iglesia.
