translation:
  language: es
  text: No había nada en el arca, excepto las dos tablas de piedra,[a] que Moisés había puesto allí en Horeb,[b][c] donde Yahvé hizo un pacto con los hijos de Israel,[d] cuando salieron de la tierra de Egipto.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «las dos tablas de piedra».'
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: literalmente, «cortó» un pacto; la expresión significa «hizo un pacto».'
    reason: lexical_alternative
  - marker: c
    text: 'O: «en Horeb».'
    reason: lexical_alternative
  - marker: d
    text: 'O: «los israelitas» o «los hijos de Israel».'
    reason: lexical_alternative
lexical_decisions:
- source_word: אֵין
  english_pob_choice: There was nothing
  chosen_spanish: No había nada
  alternatives_spanish:
  - No estaba nada
  - No había
  lexicon: HALOT
  rationale: La negación existencial se expresa de manera natural en español con 'No había nada', manteniendo el sentido de ausencia total sin forzar una construcción literal poco idiomática.
- source_word: בָּאָרוֹן
  english_pob_choice: in the ark
  chosen_spanish: en el arca
  alternatives_spanish:
  - dentro del arca
  lexicon: HALOT
  rationale: '''Arca'' conserva el referente cultual bíblico; ''en'' reproduce la localización sin exceso explicativo.'
- source_word: רַק
  english_pob_choice: except
  chosen_spanish: excepto
  alternatives_spanish:
  - solo
  lexicon: HALOT
  rationale: Tras una negación, 'excepto' expresa con claridad la idea de excepción que introduce רַק.
- source_word: שְׁנֵי לֻחֹת הָאֲבָנִים
  english_pob_choice: the two stone tablets
  chosen_spanish: las dos tablas de piedra
  alternatives_spanish:
  - las dos tablas de piedra
  - las dos losas de piedra
  lexicon: HALOT
  rationale: '''Tablas de piedra'' es la manera más clara y fiel en español para לֻחֹת הָאֲבָנִים. Mantiene el orden natural del español sin perder la referencia a las tablas del pacto.'
- source_word: אֲשֶׁר הִנִּחַ שָׁם מֹשֶׁה
  english_pob_choice: that Moses had placed there
  chosen_spanish: que Moisés había puesto allí
  alternatives_spanish:
  - que Moisés había colocado allí
  - que Moisés dejó allí
  lexicon: HALOT
  rationale: הִנִּיחַ significa 'poner/colocar/dejar'. 'Había puesto allí' conserva el valor de depósito y el pluperfecto narrativo que marca anterioridad respecto a la descripción presente.
- source_word: בְּחֹרֵב
  english_pob_choice: at Horeb
  chosen_spanish: en Horeb
  alternatives_spanish:
  - en el Horeb
  - al Horeb
  lexicon: HALOT
  rationale: Se conserva el nombre propio transliterado. 'En Horeb' es una preposición natural en español para ubicar el evento en ese lugar.
- source_word: אֲשֶׁר כָּרַת יְהוָה עִם
  english_pob_choice: where Yahweh made a covenant with
  chosen_spanish: donde Yahvé hizo pacto con
  alternatives_spanish:
  - donde Yahvé hizo un pacto con
  - donde Yahvé cortó pacto con
  lexicon: HALOT
  rationale: כָּרַת בְּרִית implica literalmente 'cortar pacto', pero en español 'hizo pacto' comunica bien la idea sin sonar artificial. Se mantiene 'Yahvé' según la convención textual del proyecto.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahveh
  lexicon: HALOT
  rationale: Se usa la forma española establecida por el proyecto para el Tetragrámaton, preservando el nombre divino en lugar de sustituirlo por un título.
- source_word: בְּנֵי יִשְׂרָאֵל
  english_pob_choice: the sons of Israel
  chosen_spanish: los hijos de Israel
  alternatives_spanish:
  - los israelitas
  - los hijos de Jacob
  lexicon: HALOT
  rationale: Se conserva la expresión hebrea tradicional y transparente. 'Hijos de Israel' respeta el paralelismo con la forma fuente y evita neutralizar el masculino genérico del hebreo.
- source_word: בְּצֵאתָם מֵאֶרֶץ מִצְרַיִם
  english_pob_choice: when they came out from the land of Egypt
  chosen_spanish: cuando salieron de la tierra de Egipto
  alternatives_spanish:
  - cuando salieron de la tierra de Egipto
  - al salir de la tierra de Egipto
  lexicon: HALOT
  rationale: El infinitivo temporal con sufijo se vierte de modo natural como una cláusula temporal. 'Salieron de la tierra de Egipto' preserva el motivo del éxodo.
theological_decisions:
- issue: Nombre divino YHWH / יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahveh
  - SEÑOR
  rationale: El texto hebreo contiene el Tetragrámaton de forma directa. Se preserva el nombre propio divino en español como 'Yahvé', conforme al estándar del proyecto y evitando la sustitución litúrgica por un título.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: קָרַת / בְּרִית idiomático
  english_pob_reading: made a covenant
  chosen_spanish_reading: hizo pacto
  alternative_spanish_readings:
  - hizo un pacto
  - cortó pacto
  rationale: El hebreo emplea el idiomático 'cortar pacto'. En español, 'hizo pacto' transmite fielmente el acto pactal sin introducir una imagen demasiado literal que distraería al lector.
  doctrine_reference: DOCTRINE.md Translation philosophy §2
translation_notes:
  revision_awareness: La revisión más reciente no introdujo cambios sustantivos; el texto permanece en alta concordancia con el control cruzado y no requiere ajustes adicionales. Se mantuvo la tensión lexical de כָּרַת בְּרִית mediante una nota explicativa, y se preservó el nombre divino como Yahvé/Yahvé en coherencia con el audit trail inglés.
  spanish_consistency_notes:
  - Se mantuvo 'Yahvé' para יְהוָה, conforme a la terminología predeterminada del proyecto.
  - Se prefirió 'hijos de Israel' por transparencia y continuidad con la expresión hebrea.
  - '''Arca'' se conserva como término técnico cultual bíblico.'
  - '''Tablas de piedra'' evita calco duro y sigue siendo plenamente fiel al hebreo.'
