translation:
  language: es
  text: David tomó la cabeza del filisteo y la llevó a Jerusalén[a], y puso sus armas[b] en su tienda.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Algunos lectores perciben una tensión cronológica en 'la llevó a Jerusalén', porque Jerusalén aún no estaba plenamente bajo control israelita en este punto del relato. La traducción conserva el hebreo sin armonizarlo.
    reason: cultural_note
  - marker: b
    text: También podría entenderse 'sus armas' como 'su equipo' o 'sus pertrechos'; el hebreo es amplio y puede abarcar armas, armadura o artículos militares.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּקַּח
  english_pob_choice: took
  chosen_spanish: tomó
  alternatives_spanish:
  - agarró
  - se llevó
  lexicon: HALOT
  rationale: לקח en narrativa suele expresarse con un verbo simple de tomar; 'tomó' es natural en español y conserva el valor directo del acto.
- source_word: רֹאשׁ
  english_pob_choice: head
  chosen_spanish: cabeza
  alternatives_spanish:
  - testa
  lexicon: HALOT
  rationale: El sentido corporal literal es claro tras la muerte de Goliat; 'cabeza' es la equivalencia directa y transparente.
- source_word: הַפְּלִשְׁתִּי
  english_pob_choice: the Philistine
  chosen_spanish: el filisteo
  alternatives_spanish:
  - el filisteo guerrero
  - aquel filisteo
  lexicon: HALOT
  rationale: El hebreo usa la designación étnica sustantivada para referirse a Goliat; 'el filisteo' mantiene esa forma nominal sin añadir explicaciones innecesarias.
- source_word: וַיְבִאֵהוּ
  english_pob_choice: brought it
  chosen_spanish: la llevó
  alternatives_spanish:
  - la trajo
  - la transportó
  lexicon: HALOT
  rationale: בוא en hifil aquí expresa llevar/traer algo a un lugar. En español, 'la llevó' funciona con naturalidad y preserva el referente femenino de 'cabeza'.
- source_word: יְרוּשָׁלִָם
  english_pob_choice: Jerusalem
  chosen_spanish: Jerusalén
  lexicon: HALOT
  rationale: Nombre propio estándar en español.
- source_word: כֵּלָיו
  english_pob_choice: his weapons
  chosen_spanish: sus armas
  alternatives_spanish:
  - su equipo
  - sus pertrechos
  - su armamento
  lexicon: HALOT
  rationale: כֵּלִים es amplio, pero en este contexto bélico apunta a equipo militar; 'armas' comunica bien el conjunto de objetos de guerra sin forzar una lista específica.
- source_word: שָׂם
  english_pob_choice: put
  chosen_spanish: puso
  alternatives_spanish:
  - colocó
  - dejó
  lexicon: HALOT
  rationale: Verbo simple de colocar; 'puso' conserva la linealidad narrativa del hebreo.
- source_word: בְּאָהֳלוֹ
  english_pob_choice: in his tent
  chosen_spanish: en su tienda
  alternatives_spanish:
  - en su tienda de campaña
  - en la tienda
  lexicon: HALOT
  rationale: אָהֶל significa 'tienda'; 'tienda' es la forma natural en español bíblico moderno. El posesivo se mantiene como en el hebreo, con la lectura más directa del contexto.
theological_decisions:
- issue: Tensión cronológica implícita en 'la llevó a Jerusalén'
  english_pob_reading: The translation preserves the Hebrew wording rather than harmonizing it.
  chosen_spanish_reading: Se conserva 'la llevó a Jerusalén' sin intentar armonizar la cronología del relato.
  alternative_spanish_readings:
  - la llevaría a Jerusalén
  - la llevó luego a Jerusalén
  - la llevó hacia Jerusalén
  rationale: El hebreo afirma la acción de manera directa. La traducción debe mantener esa lectura, aunque produzca una tensión narrativa con el desarrollo histórico más amplio.
  doctrine_reference: Preservar la tensión textual sin resolverla por paráfrasis
- issue: Referente del sufijo posesivo en el tramo final
  english_pob_reading: The equipment belongs to the Philistine, and the tent belongs to David.
  chosen_spanish_reading: Las armas son del filisteo, y la tienda se entiende de David por el contexto inmediato de depósito de trofeos.
  alternative_spanish_readings:
  - sus armas en la tienda del filisteo
  - sus armas en su propia tienda
  - sus armas en la tienda
  rationale: El contexto favorece que las armas sean las del filisteo vencido, mientras que 'su tienda' puede entenderse como la de David. El español conserva esa ambigüedad leve sin explicarla en exceso.
  doctrine_reference: Decisión contextual de referentes, no doctrinal
translation_notes:
  revision_awareness: Esta redacción sigue de cerca el texto hebreo y la decisión revisada del POB inglés de unir las acciones con 'y' en lugar de 'pero'. También conserva la tensión histórica señalada en el aparato inglés, sin suavizarla ni reordenarla.
  spanish_consistency_notes:
  - Se usó 'Yahvé' como convención del proyecto cuando no aparece en este versículo; no aplica aquí de forma directa.
  - '''Filisteo'' se mantiene como designación étnica sustantivada, coherente con el uso bíblico en español.'
  - '''Tienda'' traduce אָהֶל de modo natural y digno, sin recurrir a formulaciones más modernas que debiliten el registro bíblico.'
