  from: They have named me “Law,” and you have named me “Lawlessness.”
  to: I am she whom they call “Law,” and you have called me “Lawlessness.”
  rationale: 'The draft again omits the "I am she" formula in the first clause. The
    Coptic explicitly reads ⲁⲛⲟⲕ ⲧⲉ ⲧⲉ ϣⲁⲩⲙⲟⲩⲧⲉ ⲉⲣⲟⲥ ("I am she whom they call").
