  text: וַ/יְכַ֞ס אֶת עֵ֣ין כָּל הָ/אָרֶץ֮ וַ/תֶּחְשַׁ֣ךְ הָ/אָרֶץ֒ וַ/יֹּ֜אכַל אֶת כָּל עֵ֣שֶׂב הָ/אָ֗רֶץ וְ/אֵת֙ כָּל פְּרִ֣י הָ/עֵ֔ץ אֲשֶׁ֥ר הוֹתִ֖יר הַ/בָּרָ֑ד וְ/לֹא נוֹתַ֨ר כָּל יֶ֧רֶק בָּ/עֵ֛ץ וּ/בְ/עֵ֥שֶׂב הַ/שָּׂדֶ֖ה בְּ/כָל אֶ֥רֶץ מִצְרָֽיִם־־־־־־־־׃
