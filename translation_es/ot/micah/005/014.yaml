translation:
  language: es
  text: Y ejecutaré venganza en ira y furor sobre las naciones que no han escuchado[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «no han obedecido» o «no han atendido». El verbo hebreo puede significar tanto oír como responder con obediencia.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְעָשִׂיתִי
  english_pob_choice: And I will execute
  chosen_spanish: Y haré
  alternatives_spanish:
  - Y ejecutaré
  - Y llevaré a cabo
  lexicon: HALOT
  rationale: El hebreo עשה, con el objeto נָקָם, expresa la realización/cumplimiento de la venganza. En español, «haré» conserva la fuerza directa del verbo sin sobrecargarlo con un tecnicismo jurídico que sería menos natural aquí. El matiz de ejecución queda sostenido por el sustantivo «venganza» y el contexto profético.
- source_word: בְּאַף
  english_pob_choice: in anger
  chosen_spanish: en ira
  alternatives_spanish:
  - con ira
  - en enojo
  lexicon: HALOT
  rationale: אַף funciona idiomáticamente como «ira/enojo». «En ira» reproduce el valor preposicional del hebreo y mantiene el tono profético elevado. «Ira» es más fiel al registro bíblico que «enojo».
- source_word: וּבְחֵמָה
  english_pob_choice: and wrath
  chosen_spanish: y furor
  alternatives_spanish:
  - y ira
  - y furia
  lexicon: HALOT
  rationale: חֵמָה intensifica el término anterior. «Furor» conserva esa intensificación y distingue este término de אַף sin perder solemnidad. «Ira» sería posible, pero podría diluir la diferencia semántica entre ambos sustantivos.
- source_word: נָקָם
  english_pob_choice: vengeance
  chosen_spanish: venganza
  alternatives_spanish:
  - vindicació n
  - castigo
  lexicon: HALOT
  rationale: נָקָם designa venganza o acto vengador en un contexto judicial-divino. «Venganza» es la equivalencia más directa y preserva la carga retributiva; «castigo» suavizaría indebidamente el término.
- source_word: אֶת הַגּוֹיִם
  english_pob_choice: on the nations
  chosen_spanish: sobre las naciones
  alternatives_spanish:
  - contra las naciones
  - a las naciones
  lexicon: HALOT
  rationale: Aunque אֶת marca objeto directo, en español la construcción natural con «hacer venganza» admite «sobre». Esta opción conserva el blanco del juicio y suena más fluida que una trasposición demasiado literal.
- source_word: אֲשֶׁר לֹא שָׁמֵעוּ
  english_pob_choice: that have not listened
  chosen_spanish: que no han escuchado
  alternatives_spanish:
  - que no han obedecido
  - que no han atendido
  lexicon: HALOT
  rationale: שׁמע puede significar oír, escuchar o obedecer. «Han escuchado» preserva la base léxica del verbo y deja abierta la tensión entre oír y responder obedientemente, tal como lo mantiene el POB inglés. «Obedecido» explicitaría más de la cuenta la implicación covenantal.
theological_decisions:
- issue: Tensión entre «escuchar» y «obedecer» en שׁמע
  english_pob_reading: that have not listened
  chosen_spanish_reading: que no han escuchado
  alternative_spanish_readings:
  - que no han obedecido
  - que no han atendido
  rationale: La forma hebrea permite tanto la falta de audición como la de respuesta obediente. Mantener «escuchado» preserva esa ambigüedad productiva sin resolverla prematuramente. Las alternativas se conservan como opciones legítimas pero menos neutrales.
  doctrine_reference: DOCTRINE.md Translation philosophy §3 (Preserve theological tension rather than resolve it)
translation_notes:
  revision_awareness: El POB inglés revisó «did not listen» a «have not listened» para reflejar mejor el perfecto hebreo en contexto. La versión española adopta el presente perfecto «no han escuchado» para seguir esa revisión y mantener la referencia a una situación vigente.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma general del proyecto, pero este versículo no contiene el tetragrámaton.
  - «Venganza» se conserva por su valor retributivo fuerte; no se sustituye por «castigo» para no debilitar el matiz judicial.
  - «Escuchado» se prefiere a «obedecido» en el texto principal para preservar la tensión semántica de שׁמע.
  - El par «ira y furor» reproduce la intensificación de אַף / חֵמָה sin fusionar ambos términos.
