translation:
  language: es
  text: Alégrese el monte de Sión[a]; regocíjense las hijas de Judá, a causa de tus juicios.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'las ciudades' o 'los pueblos de Judá', ya que 'hijas' puede referirse poéticamente a asentamientos dependientes.
    reason: lexical_alternative
lexical_decisions:
- source_word: יִשְׂמַח
  english_pob_choice: let Mount Zion rejoice
  chosen_spanish: Alégrese
  alternatives_spanish:
  - Que se alegre
  - Gócese
  lexicon: HALOT
  rationale: El imperfecto qal de שׂמח en poesía puede expresar exhortación o deseo; en español, el subjuntivo exhortativo 'Alégrese' conserva bien ese matiz volitivo sin volverse rígido.
- source_word: הַר צִיּוֹן
  english_pob_choice: Mount Zion
  chosen_spanish: el monte de Sion
  alternatives_spanish:
  - el monte Sion
  - el monte de Zion
  lexicon: HALOT
  rationale: Mantengo la imagen topográfica literal del hebreo. 'Sion' es la forma más natural y reconocible en español bíblico, y 'monte de Sion' conserva el valor constructo sin forzar una fórmula más litúrgica de lo necesario.
- source_word: תָּגֵלְנָה
  english_pob_choice: let ... be glad
  chosen_spanish: gócense
  alternatives_spanish:
  - alégrense
  - regocíjense
  lexicon: HALOT
  rationale: El verbo גיל expresa gozo/exultación. 'Gócense' comunica ese matiz con buen registro bíblico en español y evita repetir exactamente el primer verbo, como hace el hebreo con variación sinonímica.
- source_word: בְּנוֹת יְהוּדָה
  english_pob_choice: the daughters of Judah
  chosen_spanish: las hijas de Judá
  alternatives_spanish:
  - las ciudades de Judá
  - las aldeas de Judá
  - las mujeres de Judá
  lexicon: HALOT
  rationale: Conservo la expresión literal para no borrar la metáfora hebrea. En poesía, 'hijas de Judá' puede aludir a poblaciones dependientes o asentamientos, pero esa ambigüedad debe quedar visible en el texto y no resolverse prematuramente.
- source_word: לְמַעַן
  english_pob_choice: because of
  chosen_spanish: a causa de
  alternatives_spanish:
  - por
  - por causa de
  lexicon: HALOT
  rationale: La relación causal es la adecuada aquí. 'A causa de' es una equivalencia natural en español que mantiene el sentido motivador del gozo sin sonar demasiado explicativa.
- source_word: מִשְׁפָּטֶיךָ
  english_pob_choice: your judgments
  chosen_spanish: tus juicios
  alternatives_spanish:
  - tu justicia
  - tus sentencias
  - tus decretos judiciales
  lexicon: HALOT
  rationale: '''משפט'' en este contexto apunta a actos judiciales decisivos de Dios, no principalmente a mandamientos. ''Juicios'' preserva esa fuerza y permite la tensión entre acto de juzgar y decisión justa.'
theological_decisions:
- issue: Valor de מִשְׁפָּטֶיךָ en el contexto del salmo
  english_pob_reading: your judgments
  chosen_spanish_reading: tus juicios
  alternative_spanish_readings:
  - tu justicia
  - tus decretos
  - tus mandamientos
  rationale: El contexto celebra la intervención real y judicial de Yahvé en favor de Sion. 'Tus juicios' mantiene ese énfasis en actos soberanos de Dios, sin desplazarlos hacia la idea de ley revelada.
  doctrine_reference: La justicia judicial de Dios en el canto de Sion; cf. la función de Yahvé como juez y rey en el salmo.
translation_notes:
  revision_awareness: 'El texto sigue de cerca el hebreo WLC y el audit trail inglés: conserva la exhortación poética con dos verbos de gozo diferenciados, mantiene la metáfora de ''hijas de Judá'' y traduce מִשְׁפָּטֶיךָ como ''tus juicios'' para preservar su sentido judicial. No se introdujeron cambios respecto del pasaje auditado.'
  spanish_consistency_notes:
  - Se emplea 'Sion' como forma española estándar para צִיּוֹן en un contexto bíblico solemne.
  - '''Juicios'' se eligió para no neutralizar la fuerza judicial de מִשְׁפָּטֶיךָ.'
  - La nota al pie conserva la alternativa geográfica documentada en el audit trail inglés.
  - El estilo evita calcos excesivos pero mantiene transparencia respecto del hebreo.
