translation:
  language: es
  text: ¿Dónde estabas cuando fundé la tierra? Dime[a], si sabes de entendimiento.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «cuando puse los cimientos de la tierra».'
    reason: lexical_alternative
lexical_decisions:
- source_word: אֵיפֹה
  english_pob_choice: Where
  chosen_spanish: ¿Dónde
  alternatives_spanish:
  - ¿En dónde
  - ¿Dónde entonces
  lexicon: HALOT
  rationale: Interrogativo de ubicación; «¿Dónde» es la forma natural y directa en español y conserva el reto divino sin añadir matices innecesarios.
- source_word: הָיִיתָ
  english_pob_choice: were you
  chosen_spanish: estabas
  alternatives_spanish:
  - fuiste
  - habías estado
  lexicon: HALOT
  rationale: 'Aunque el hebreo está en perfecto, en esta pregunta retrospectiva el español natural pide imperfecto: «estabas». Mantiene la escena pasada sin volverla más pesada.'
- source_word: בְּיָסְדִי
  english_pob_choice: when I founded
  chosen_spanish: cuando yo fundaba
  alternatives_spanish:
  - cuando yo fundé
  - cuando eché el cimiento de
  lexicon: HALOT
  rationale: La construcción temporal con ב + infinitivo expresa el momento de la acción creadora. «Fundaba» refleja la acción de establecer la tierra y deja abierta la metáfora de fundación, sin forzar un giro más interpretativo.
- source_word: אָרֶץ
  english_pob_choice: the earth
  chosen_spanish: la tierra
  alternatives_spanish:
  - la tierra habitable
  - el mundo
  lexicon: HALOT
  rationale: En este contexto cósmico de creación, «la tierra» comunica mejor que «la tierra» en sentido local o agrícola; conserva el alcance universal del pasaje.
- source_word: הַגֵּד
  english_pob_choice: Tell me
  chosen_spanish: Declara…
  alternatives_spanish:
  - Dime
  - Hazme saber
  lexicon: HALOT
  rationale: El imperativo de נגד tiene fuerza de exhortación/declaración. «Declara» conserva mejor el tono solemne y confrontativo que «Dime»; el objeto directo se completa de forma natural en español.
- source_word: אִם
  english_pob_choice: if
  chosen_spanish: si
  alternatives_spanish:
  - en caso de que
  - si es que
  lexicon: HALOT
  rationale: 'Conserva la condición retórica: no es una concesión sino un desafío condicional.'
- source_word: יָדַעְתָּ
  english_pob_choice: you know
  chosen_spanish: tienes
  alternatives_spanish:
  - sabes
  - conoces
  lexicon: HALOT
  rationale: 'En la cláusula condicional, el español idiomático requiere un verbo que complete naturalmente «entendimiento»: «si tienes entendimiento». Aunque el hebreo usa «saber», la idea es de capacidad real para responder.'
- source_word: בִינָה
  english_pob_choice: understanding
  chosen_spanish: entendimiento
  alternatives_spanish:
  - comprensión
  - discernimiento
  lexicon: HALOT
  rationale: «Entendimiento» es el equivalente más transparente y reverente en español para la facultad de discernir a la que apunta בינה en literatura sapiencial.
theological_decisions:
- issue: Metáfora de creación/fundación
  english_pob_reading: Render יסד with 'founded' rather than a more interpretive paraphrase.
  chosen_spanish_reading: «fundaba» mantiene la metáfora de establecimiento/fundación de la tierra.
  alternative_spanish_readings:
  - «fundé»
  - «eché el cimiento de»
  rationale: La frase presenta a Dios como el que establece la tierra; no conviene disolver la imagen con una paráfrasis demasiado explicativa. «Fundaba» preserva el acto creador como proceso fundacional y encaja con el paralelismo interrogativo del verso.
  doctrine_reference: 'Translation philosophy: original-language primacy; preserve theological tension rather than resolve it'
translation_notes:
  revision_awareness: El texto sigue de cerca el paquete fuente hebreo y el criterio POB en inglés, con ajuste idiomático natural en español para el imperfecto retrospectivo («estabas», «fundaba»). Se conserva la alternativa léxica de יסד en nota, como en el auditor inglés.
  spanish_consistency_notes:
  - Se usa «tierra» para אָרֶץ en sentido cósmico, coherente con Job 38.
  - Se evita «SEÑOR» o sustitutos devocionales; aquí no aparece el Tetragrámaton ni κύριος.
  - Se mantiene un tono de reprensión solemne acorde con el discurso divino.
  - La nota a ofrece una alternativa concreta de metáfora de construcción, sin introducir terminología eclesiástica tradicional.
