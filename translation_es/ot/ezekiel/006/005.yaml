translation:
  language: es
  text: Y pondré los cadáveres de los hijos de Israel delante de sus ídolos[a], y esparciré sus huesos alrededor de sus altares.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebreo גִּלּוּלִים es un término burlón para los ídolos; puede llevar un matiz de desprecio, como “ídolos inmundos” o incluso “ídolos de estiércol”.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְנָתַתִּי
  english_pob_choice: And I will place
  chosen_spanish: Y pondré
  alternatives_spanish:
  - Y colocaré
  - Y pondré allí
  lexicon: HALOT
  rationale: נתן es amplio ('dar, poner, colocar'). En este contexto de juicio, con un objeto concreto y un complemento locativo, 'poner' suena natural en español y conserva la acción material sin volverse artificial.
- source_word: פִּגְרֵי
  english_pob_choice: the corpses
  chosen_spanish: los cadáveres
  alternatives_spanish:
  - los cuerpos muertos
  - los restos
  lexicon: HALOT
  rationale: פגר designa un cadáver o cuerpo muerto. 'Cadáveres' comunica con precisión el sentido humano y la crudeza del pasaje; 'cuerpos muertos' es válido pero menos idiomático.
- source_word: בְּנֵי יִשְׂרָאֵל
  english_pob_choice: of the sons of Israel
  chosen_spanish: los hijos de Israel
  alternatives_spanish:
  - los israelitas
  - el pueblo de Israel
  lexicon: HALOT
  rationale: La expresión hebrea es literalmente 'hijos de Israel'. 'Hijos de Israel' preserva la forma covenantal y el paralelismo con el original, sin borrar la textura hebrea.
- source_word: לִפְנֵי
  english_pob_choice: before
  chosen_spanish: delante de
  alternatives_spanish:
  - ante
  - en presencia de
  lexicon: HALOT
  rationale: '''Delante de'' transmite la relación espacial de לִפְנֵי de modo natural en español y conserva la escena de contraste irónico frente a los ídolos.'
- source_word: גִּלּוּלֵיהֶם
  english_pob_choice: their idols
  chosen_spanish: sus ídolos
  alternatives_spanish:
  - sus ídolos de estiércol
  - sus ídolos inmundos
  lexicon: HALOT
  rationale: El sustantivo es un término despectivo para ídolos. En el texto principal, 'ídolos' es claro y publicable; la carga burlesca se preserva en nota para no forzar un insulto no necesario en la línea principal.
- source_word: וְזֵרִיתִי
  english_pob_choice: and I will scatter
  chosen_spanish: y esparciré
  alternatives_spanish:
  - y dispersaré
  - y aventaré
  lexicon: HALOT
  rationale: זרה puede significar 'esparcir' o 'aventar'. Con huesos como objeto y altares como entorno, 'esparcir' es la opción más clara y fiel en español.
- source_word: עַצְמוֹתֵיכֶם
  english_pob_choice: your bones
  chosen_spanish: sus huesos
  alternatives_spanish:
  - vuestros huesos
  - los huesos de ustedes
  lexicon: HALOT
  rationale: El sufijo de segunda persona plural se refleja con 'sus' en un español reverencial/neutro de plural dirigido al pueblo. 'Huesos' mantiene el término directo del hebreo.
- source_word: סְבִיבוֹת
  english_pob_choice: around
  chosen_spanish: alrededor de
  alternatives_spanish:
  - en torno a
  - rodeando
  lexicon: HALOT
  rationale: La idea es la circunferencia o entorno de los altares. 'Alrededor de' es idiomático y preciso en español.
- source_word: מִזְבְּחוֹתֵיכֶם
  english_pob_choice: your altars
  chosen_spanish: sus altares
  alternatives_spanish:
  - vuestros altares
  - los altares de ustedes
  lexicon: HALOT
  rationale: מִזְבֵּחַ significa 'altar'. El posesivo plural se mantiene para señalar que son los altares vinculados a la idolatría del pueblo.
theological_decisions:
- issue: Preservación del insulto despectivo de גִּלּוּלִים sin sobrecargar el texto principal
  english_pob_reading: their idols
  chosen_spanish_reading: sus ídolos
  alternative_spanish_readings:
  - sus ídolos de estiércol
  - sus ídolos inmundos
  rationale: El hebreo usa un término de desprecio para los ídolos. En español, el cuerpo del texto debe ser legible y no exagerar el insulto; por eso se traduce con el término normal y se explica la burla léxica en nota.
  doctrine_reference: DOCTRINE.md §Translation philosophy 6
- issue: Mantenimiento de la fórmula étnico-covenantal בְּנֵי יִשְׂרָאֵל
  english_pob_reading: sons of Israel
  chosen_spanish_reading: los hijos de Israel
  alternative_spanish_readings:
  - los israelitas
  - el pueblo de Israel
  rationale: La expresión conserva la forma hebrea tradicional sin reducirla a una paráfrasis. En español, 'hijos de Israel' es inteligible y respeta la textura del original.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4
translation_notes:
  revision_awareness: 'El borrador sigue de cerca el texto hebreo y coincide con la decisión del POB en inglés: mantener la escena de juicio concreta, conservar la expresión covenantal ''hijos de Israel'', y dejar el matiz despectivo de גִּלּוּלִים en nota. No se detectaron revisiones pendientes en el pass más reciente.'
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' como forma estándar del proyecto cuando el nombre divino aparezca; en este versículo no está presente.
  - Se usa 'sus' para reflejar el plural posesivo del hebreo de forma natural y sin regionalismos marcados.
  - '''Cadáveres'' y ''huesos'' preservan la materialidad intensa del juicio sin suavizarla.'
  - La nota al pie explica el matiz léxico de 'ídolos' sin introducir una glosa innecesariamente áspera en el texto principal.
