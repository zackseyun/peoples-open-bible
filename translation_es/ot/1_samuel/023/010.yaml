translation:
  language: es
  text: 'Entonces David dijo[a]: «Oh Yahvé, Dios de Israel, tu siervo ciertamente ha oído[b] que Saúl busca venir a Queila para destruir la ciudad a causa de mí».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «YHWH»; tradicionalmente se traduce «el SEÑOR».'
    reason: alternative_reading
  - marker: b
    text: El hebreo usa un infinitivo absoluto con verbo finito para intensificar la afirmación.
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: El Tetragrámaton se conserva como nombre propio divino. En español del proyecto, la forma base es «Yahvé», evitando la sustitución por un título y manteniendo la decisión teológica documentada en el audit trail inglés.
- source_word: אֱלֹהֵי יִשְׂרָאֵל
  english_pob_choice: God of Israel
  chosen_spanish: Dios de Israel
  alternatives_spanish:
  - el Dios de Israel
  lexicon: HALOT
  rationale: Es una construcción posesiva directa y natural en español. «Dios de Israel» preserva la relación de pertenencia/pacto sin introducir matices adicionales.
- source_word: שָׁמֹעַ שָׁמַע
  english_pob_choice: has surely heard
  chosen_spanish: ha oído con certeza
  alternatives_spanish:
  - ha oído seguramente
  - ha oído en verdad
  lexicon: HALOT
  rationale: La combinación infinitivo absoluto + verbo finito intensifica la afirmación. «Ha oído con certeza» comunica la fuerza enfática de manera clara y formal en español sin perder la duplicación semítica.
- source_word: עַבְדְּךָ
  english_pob_choice: your servant
  chosen_spanish: tu siervo
  alternatives_spanish:
  - tu esclavo
  lexicon: HALOT
  rationale: En este contexto de súplica a Dios, el término funciona como fórmula reverente de autoidentificación. «Siervo» conserva el registro devocional mejor que «esclavo» en español, aun cuando la raíz tenga fuerza de dependencia servil.
- source_word: מְבַקֵּשׁ
  english_pob_choice: is seeking
  chosen_spanish: busca
  alternatives_spanish:
  - está buscando
  - pretende
  lexicon: HALOT
  rationale: El participio expresa intención o acción en curso. «Busca» es conciso y adecuado en español, y evita sobrecargar la frase con una perífrasis innecesaria.
- source_word: לָבוֹא אֶל קְעִילָה
  english_pob_choice: to come to Keilah
  chosen_spanish: venir a Queila
  alternatives_spanish:
  - ir a Queila
  - llegar a Queila
  lexicon: HALOT
  rationale: «Venir» reproduce de cerca el valor básico de בוא y mantiene la perspectiva del hablante. Se usa «Queila» como transliteración española coherente del topónimo.
- source_word: לְשַׁחֵת
  english_pob_choice: to destroy
  chosen_spanish: para destruir
  alternatives_spanish:
  - para arrasar
  - para devastar
  lexicon: HALOT
  rationale: En este contexto militar, el verbo denota destrucción intencional. «Destruir» es la forma más directa y sobria en español.
- source_word: לָעִיר
  english_pob_choice: the city
  chosen_spanish: la ciudad
  alternatives_spanish:
  - el pueblo
  - la urbe
  lexicon: HALOT
  rationale: El sustantivo con artículo definido se refiere al asentamiento de Queila. «La ciudad» mantiene la referencia literal y el tono formal del pasaje.
- source_word: בַּעֲבוּרִי
  english_pob_choice: because of me
  chosen_spanish: a causa de mí
  alternatives_spanish:
  - por mi causa
  - por mí
  lexicon: HALOT
  rationale: La expresión causal se conserva de forma transparente. «A causa de mí» refleja bien el valor de responsabilidad/circunstancia sin interpretarlo como finalidad.
theological_decisions:
- issue: Nombre divino יְהוָה en un discurso de oración
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: Se mantiene el nombre divino como transliteración del Tetragrámaton, en continuidad con la doctrina del proyecto y con la decisión inglesa de no sustituirlo por un título. En una oración directa, esto preserva el carácter personal del apelativo.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Fórmula intensiva del hebreo en 'has surely heard'
  english_pob_reading: has surely heard
  chosen_spanish_reading: ha oído con certeza
  alternative_spanish_readings:
  - ha oído seguramente
  - ha oído ciertamente
  rationale: La intensificación no se suaviza a una mera afirmación simple; se expresa con una construcción natural en español que conserve el énfasis del infinitivo absoluto sin volverla artificiosa.
  doctrine_reference: 'Hebreo bíblico: infinitivo absoluto con verbo finito para énfasis, sin implicación doctrinal adicional'
translation_notes:
  revision_awareness: 'La redacción sigue el dictamen de alta concordancia del audit trail inglés y adopta la revisión más reciente: se prefirió una equivalencia más natural para la intensidad de «שָׁמֹעַ שָׁמַע» sin alterar el resto de la frase. También se conserva la decisión revisada de traducir el nombre divino como transliteración en vez de sustitución por título.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como forma estándar del Tetragrámaton en español, coherente con el proyecto.
  - Se usa «Queila» para el topónimo, siguiendo la transliteración hispana más estable.
  - «Siervo» se reserva aquí para una fórmula reverente dirigida a Dios, en línea con el uso contextual y sin forzar «esclavo».
  - La puntuación y las comillas siguen el uso español, con vocativo inicial marcado por exclamación para reflejar el tono orante.
