translation:
  language: es
  text: La visión de los sueños es esto frente a aquello[a], como la semejanza de un rostro frente a un rostro.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «La visión de los sueños es esto frente a aquello; como la semejanza de un rostro frente a un rostro». El griego es breve y algo elíptico, de modo que la fuerza comparativa exacta también puede entenderse como correspondencia o reflejo.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ὅρασις ἐνυπνίων
  english_pob_choice: dream-vision / vision of dreams
  chosen_spanish: visión de los sueños
  alternatives_spanish:
  - visión de sueños
  - sueño-visión
  lexicon: LSJ
  rationale: La construcción genitiva es compacta y proverbial; «visión de los sueños» conserva la relación estrecha entre ὅρασις y ἐνύπνια sin expandir indebidamente la frase. «Sueño-visión» sería demasiado artificial en español.
- source_word: τοῦτο κατὰ τούτου
  english_pob_choice: this against that
  chosen_spanish: esto frente a aquello
  alternatives_spanish:
  - esto contra aquello
  - esto en relación con aquello
  lexicon: LSJ
  rationale: El griego es elíptico y de fuerza comparativa/correspondiente. «Frente a» mantiene la idea de yuxtaposición o correspondencia sin cargar la frase con un matiz de conflicto que «contra» podría sugerir.
- source_word: κατέναντι προσώπου
  english_pob_choice: opposite a face
  chosen_spanish: frente a un rostro
  alternatives_spanish:
  - opuesto a un rostro
  - cara a cara
  lexicon: LSJ
  rationale: κατέναντι indica estar enfrente u opuesto. «Frente a un rostro» preserva la estructura visual del griego y evita anticipar una expresión idiomática más cerrada como «cara a cara».
- source_word: ὁμοίωμα προσώπου
  english_pob_choice: the likeness of a face
  chosen_spanish: la semejanza de un rostro
  alternatives_spanish:
  - la imagen de un rostro
  - el parecido de un rostro
  lexicon: LSJ
  rationale: Ὁμοίωμα significa «semejanza» o «imagen». «Semejanza» expresa mejor la idea de correspondencia sin identidad, que es el punto proverbial del texto.
theological_decisions:
- issue: Fuerza interpretiva del proverbio sobre los sueños
  english_pob_reading: The verse states that dreams are only a likeness or counterpart of reality, not reality itself.
  chosen_spanish_reading: El versículo afirma que los sueños son solo una semejanza o correspondencia de la realidad, no la realidad misma.
  alternative_spanish_readings:
  - Los sueños se reflejan unos en otros
  - Los sueños muestran una correspondencia entre unas cosas y otras
  rationale: El contexto inmediato de Sirácides 34 advierte contra confiar en los sueños. La traducción conserva la metáfora de semejanza sin convertirla en una tesis filosófica más fuerte que la del griego.
  doctrine_reference: Preservar la tensión teológica en vez de resolverla.
translation_notes:
  revision_awareness: 'La redacción sigue de cerca el griego de Swete: mantiene la apertura nominal («la visión de los sueños»), conserva la simetría elíptica de «esto frente a aquello» y reproduce la clausula paralela final sin ampliarla interpretativamente. La nota corrige la posible ambigüedad comparativa señalada en el aparato inglés.'
  spanish_consistency_notes:
  - Se usó «sueños» en plural para ἐνυπνίων, conservando el valor genérico del sustantivo griego.
  - Se prefirió «rostro» en vez de «cara» para mantener un registro bíblico sobrio y evitar coloquialismo.
  - «Frente a» traduce la relación espacial/comparativa sin introducir una lectura polémica de oposición estricta.
