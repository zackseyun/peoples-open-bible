revisions:
- from: En todas tus obras sé preeminente[a]; no des un defecto a tu honor.
  to: En todas tus obras sé preeminente[a]; no pongas una mancha en tu honor.
  rationale: Se conserva «sé preeminente» por alineación con la revisión inglesa de ὑπεράγων. Se cambia «no des un defecto a tu honor» por «no pongas una mancha en tu honor» para reflejar mejor μῶμον como metáfora de tacha/descrédito y para producir un español más natural sin perder el vínculo con el griego. La nota se mantiene y se completa con «buen nombre» para reproducir mejor la explicación léxica de δόξα.
