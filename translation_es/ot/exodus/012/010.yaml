review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien la estructura del hebreo: una prohibición directa seguida de una instrucción obligatoria sobre lo que quede. Sin embargo, la nota al pie [a] está anclada en «la mañana», cuando la alternativa léxica documentada corresponde a הַנֹּתָר («lo que quede / lo que sobra»), no a עַד בֹּקֶר. Además, «de él» es posible, pero en español bíblico legible aquí suena más natural «del animal» o simplemente omitir la repetición; no obstante, no es un error de fidelidad.'
  spanish_quality_summary: El texto es claro y digno, pero la colocación de la nota crea confusión semántica. También puede mejorarse ligeramente la naturalidad del segundo miembro evitando la repetición pesada de «de él» y manteniendo el mandato con buen español.
  glossary_alignment: 'No hay términos del glosario mayor en juego como Yahvé, Mesías o Espíritu. Las decisiones principales concuerdan con el expediente inglés: תוֹתִירוּ = «dejar», הַנֹּתָר = «lo que quede», בָּאֵשׁ = «con fuego». La única desalineación real es de aparato crítico: la alternativa léxica debe acompañar a «lo que quede», no a «la mañana».'
  issues:
  - severity: medium
    issue: La nota [a] está anclada en la frase equivocada.
    rationale: La nota inglesa «Or 'what is left over of it.'» explica הַנֹּתָר, no עַד בֹּקֶר. En español, colocar [a] después de «la mañana» hace pensar erróneamente que la variante afecta la expresión temporal.
  - severity: low
    issue: Repetición algo rígida de «de él».
    rationale: Aunque «de él» es fiel a מִמֶּנּוּ, en español la segunda repetición puede aligerarse sin perder referencia, especialmente porque el referente ya está claro en contexto.
  revised_spanish_text: No dejarán nada de él hasta la mañana, y lo que quede[a] hasta la mañana lo quemarán con fuego.
