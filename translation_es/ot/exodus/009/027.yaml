translation:
  language: es
  text: 'Entonces el faraón envió a llamar a Moisés y a Aarón, y les dijo: «He pecado esta vez. Yahvé[a] tiene la razón, y yo y mi pueblo somos los malvados».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, «Yahvé es justo»; o, «Yahvé está en lo justo».
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּשְׁלַח
  english_pob_choice: sent
  chosen_spanish: mandó llamar
  alternatives_spanish:
  - envió
  - mandó
  lexicon: HALOT
  rationale: El hebreo expresa primero que Faraón ‘envió’ y luego que ‘llamó’ a Moisés y Aarón. En español, ‘mandó llamar’ transmite de forma natural ambas acciones sin perder que Faraón los hizo venir ante él.
- source_word: וַיִּקְרָא לְ
  english_pob_choice: called for
  chosen_spanish: mandó llamar
  alternatives_spanish:
  - llamó
  - convocó
  - llamó para sí
  lexicon: HALOT
  rationale: Con לְ + personas, el verbo tiene sentido de llamar/convocar a alguien. ‘Mandó llamar’ conserva la idea de que Faraón hizo traer a Moisés y a Aarón.
- source_word: חָטָאתִי
  english_pob_choice: I have sinned
  chosen_spanish: He pecado
  alternatives_spanish:
  - Pequé
  lexicon: HALOT
  rationale: El perfecto hebreo funciona como confesión actual de culpa. ‘He pecado’ reproduce bien esa admisión presente de una acción ya cometida.
- source_word: הַפָּעַם
  english_pob_choice: this time
  chosen_spanish: esta vez
  alternatives_spanish:
  - ahora
  - en esta ocasión
  lexicon: HALOT
  rationale: Es una expresión temporal idiomática. ‘Esta vez’ es la forma más natural en español y conserva el matiz puntual.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  lexicon: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
  rationale: Se sigue la convención del proyecto de verter el Tetragrámaton como ‘Yahvé’, preservando el nombre propio divino en lugar de sustituirlo por un título.
- source_word: הַצַּדִּיק
  english_pob_choice: is in the right
  chosen_spanish: es el justo
  alternatives_spanish:
  - está en lo justo
  - es justo
  lexicon: HALOT
  rationale: En este contexto confesional y judicial, el hebreo afirma que Yahvé tiene la razón y actúa rectamente. ‘Es el justo’ conserva la fuerza del término sin caer en una formulación demasiado abstracta.
- source_word: וַאֲנִי וְעַמִּי
  english_pob_choice: I and my people
  chosen_spanish: yo y mi pueblo
  alternatives_spanish:
  - mi pueblo y yo
  lexicon: HALOT
  rationale: Se mantiene el orden del hebreo para resaltar la autoimplicación de Faraón en la confesión.
- source_word: הָרְשָׁעִים
  english_pob_choice: the wicked ones
  chosen_spanish: los malvados
  alternatives_spanish:
  - los impíos
  - los culpables
  - los perversos
  lexicon: HALOT
  rationale: El plural expresa culpabilidad moral directa. ‘Los malvados’ conserva el peso ético del término y funciona de manera clara en español contemporáneo.
theological_decisions:
- issue: Rendición del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - SEÑOR
  rationale: El texto hebreo usa directamente el Nombre. La lectura española sigue la política del proyecto de preservar ese nombre propio, evitando la sustitución litúrgica por ‘SEÑOR’.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Sentido de la confesión de Faraón sobre Yahvé
  english_pob_reading: Yahweh is in the right
  chosen_spanish_reading: Yahvé es el justo
  alternative_spanish_readings:
  - Yahvé tiene la razón
  - Yahvé es recto
  - Yahvé es justo
  rationale: La frase hebrea contrapone la justicia de Yahvé con la culpabilidad de Faraón y su pueblo. ‘Es el justo’ mantiene el contraste moral-judicial y evita una paráfrasis demasiado amplia.
  doctrine_reference: 'DOCTRINE.md Translation philosophy: preserve source text''s plain sense; readable modern Spanish'
translation_notes:
  revision_awareness: 'El borrador sigue de cerca el hebreo y el audit trail inglés: conserva la secuencia ‘envió/llamó’, traduce la confesión en perfecto con valor actual, mantiene el Nombre divino como Yahvé y reproduce el contraste judicial entre Yahvé y Faraón sin añadir elementos ajenos al versículo. Se ha optado por una formulación española más natural que no sacrifica la fuerza léxica del original.'
  spanish_consistency_notes:
  - Se mantiene ‘Yahvé’ como forma del Nombre divino, coherente con la política del proyecto.
  - Se usa ‘He pecado’ para conservar el valor confesional del perfecto hebreo.
  - ‘Los malvados’ refleja el plural moral del hebreo y el equivalente inglés ‘the wicked ones’.
  - El orden ‘yo y mi pueblo’ sigue el hebreo y destaca la autoimplicación de Faraón.
