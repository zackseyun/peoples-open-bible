translation:
  language: es
  text: Ahora Acab tenía setenta hijos en Samaria. Y Jehú escribió cartas y las envió a Samaria, a los gobernantes de Jezreel[a], a los ancianos y a los guardianes[b] de los hijos de Acab, diciendo,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «a los gobernantes de Jezreel». Como se dice que las cartas fueron enviadas a Samaria, algunos entienden que esto se refiere a funcionarios relacionados con Jezreel que residían allí, mientras que algunas versiones antiguas y algunos intérpretes prefieren «los gobernantes de Samaria». El texto principal conserva la redacción masorética.'
    reason: textual_variant
  - marker: b
    text: O «padres de crianza» o «cuidadores». El hebreo se refiere a quienes eran responsables de criar o supervisar a los hijos de Acab.
    reason: lexical_alternative
lexical_decisions:
- source_word: וּלְאַחְאָב
  english_pob_choice: Now Ahab had
  chosen_spanish: Ahora Ahab tenía
  alternatives_spanish:
  - Y Ahab tenía
  - Ahab tenía
  lexicon: HALOT
  rationale: La construcción con waw + lamed introduce aquí el marco de la escena, no una relación posesiva literal. «Ahora Ahab tenía» comunica bien el cambio discursivo y conserva la naturalidad del español.
- source_word: שִׁבְעִים בָּנִים
  english_pob_choice: seventy sons
  chosen_spanish: setenta hijos
  alternatives_spanish:
  - setenta hijos varones
  - setenta descendientes
  lexicon: HALOT
  rationale: בָּנִים significa literalmente «hijos/varones». En español, «hijos» mantiene la referencia filial; el contexto real de sucesión deja claro que se trata de varones, aunque no hace falta forzarlo en el texto principal.
- source_word: בְּשֹׁמְרוֹן
  english_pob_choice: in Samaria
  chosen_spanish: en Samaria
  alternatives_spanish:
  - en la ciudad de Samaria
  - en Samaría
  lexicon: HALOT
  rationale: La preposición señala ubicación; «en Samaria» es la forma natural y fiel para el lugar de residencia.
- source_word: וַיִּכְתֹּב ... סְפָרִים
  english_pob_choice: wrote letters
  chosen_spanish: escribió cartas
  alternatives_spanish:
  - escribió documentos
  - escribió mensajes
  lexicon: HALOT
  rationale: סְפָרִים aquí designa comunicaciones escritas. «Cartas» es el equivalente más preciso y fluido en español.
- source_word: וַיִּשְׁלַח שֹׁמְרוֹן
  english_pob_choice: sent them to Samaria
  chosen_spanish: las envió a Samaria
  alternatives_spanish:
  - las mandó a Samaria
  - las despachó a Samaria
  lexicon: HALOT
  rationale: El objeto directo implícito son las cartas; en español se expresa de manera natural con el pronombre «las». Se conserva el destino geográfico tal como aparece en el hebreo.
- source_word: אֶל שָׂרֵי יִזְרְעֶאל
  english_pob_choice: to the rulers of Jezreel
  chosen_spanish: a los jefes de Jezreel
  alternatives_spanish:
  - a los gobernantes de Jezreel
  - a los príncipes de Jezreel
  lexicon: HALOT
  rationale: שָׂרֵי denota jefes/líderes/funcionarios. «Jefes» es una opción amplia y natural en español, sin estrechar indebidamente el rango del término.
- source_word: הַזְּקֵנִים
  english_pob_choice: the elders
  chosen_spanish: a los ancianos
  alternatives_spanish:
  - a los mayores
  - a los ancianos de la ciudad
  lexicon: HALOT
  rationale: En contexto cívico, זְקֵנִים designa a los líderes reconocidos de la comunidad. «Ancianos» conserva el término tradicional y su fuerza de autoridad local.
- source_word: הָאֹמְנִים אַחְאָב
  english_pob_choice: the guardians of Ahab's sons
  chosen_spanish: a los encargados de los hijos de Ahab
  alternatives_spanish:
  - a los tutores de los hijos de Ahab
  - a los cuidadores de los hijos de Ahab
  - a los padres de crianza de los hijos de Ahab
  lexicon: HALOT
  rationale: הָאֹמְנִים refiere a quienes crían, cuidan o supervisan a los hijos reales. «Encargados» es suficientemente amplio para abarcar esa función sin sobreespecificar el oficio; se explicita la relación con «los hijos de Ahab» para evitar ambigüedad.
- source_word: לֵאמֹר
  english_pob_choice: saying,
  chosen_spanish: diciendo[d],
  alternatives_spanish:
  - diciendo
  - y dijo
  lexicon: HALOT
  rationale: La fórmula introduce el contenido de la carta. «Diciendo» reproduce el enlace narrativo de manera directa y natural en español.
translation_notes:
  revision_awareness: La redacción española sigue la revisión más reciente del POB en inglés, que mantuvo la secuencia general y prefirió «rulers» para שָׂרֵי. También conserva la tensión textual de «Samaria» frente a «jefes de Jezreel» sin armonizarla, tal como indica el aparato auditado.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como convención general del proyecto, pero este versículo no contiene el Tetragrámaton.
  - «Ahab» se conserva como nombre propio bíblico ya asentado en español del proyecto; no se castellaniza a «Acab» para mantener consistencia interna con el expediente auditado en inglés.
  - Se usa «hijos» en vez de una paráfrasis más amplia para no debilitar el dato numérico y genealógico del hebreo.
  - Se eligió «encargados» en el cuerpo del texto para una solución neutral; la nota aclara las alternativas lexicográficas donde el español puede sugerir distintos matices de cuidado o tutoría.
