translation:
  language: es
  text: Me introdujo en la casa del vino[a], y su bandera sobre mí fue amor.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «la casa del banquete». El hebreo dice más literalmente «la casa del vino».
    reason: lexical_alternative
lexical_decisions:
- source_word: הֱבִיאַנִי
  english_pob_choice: He brought me
  chosen_spanish: Me llevó
  alternatives_spanish:
  - Me trajo
  - Me condujo
  lexicon: HALOT
  rationale: El verbo causativo expresa introducir o hacer entrar a alguien; en español, «llevar» comunica bien el movimiento hacia un lugar en un contexto poético, sin perder la idea de guía/traslado implícita en el hebreo.
- source_word: אֶל
  english_pob_choice: into
  chosen_spanish: a
  alternatives_spanish:
  - hacia
  - hasta
  - en
  lexicon: HALOT
  rationale: Con un verbo de movimiento y un destino concreto, el español natural es «a»; no hace falta forzar «en» o «hacia» para transmitir la dirección.
- source_word: בֵּית הַיָּיִן
  english_pob_choice: the house of wine
  chosen_spanish: la casa del vino
  alternatives_spanish:
  - la casa de vino
  - el banquete
  - la sala del vino
  lexicon: HALOT
  rationale: Se conserva la imagen metafórica literal del hebreo, igual que la POB inglesa, en vez de sustituirla por una expansión interpretativa como «banquete» o «sala de banquetes».
- source_word: וְדִגְלוֹ
  english_pob_choice: and his banner
  chosen_spanish: y su bandera
  alternatives_spanish:
  - y su estandarte
  - y su pendón
  lexicon: HALOT
  rationale: דֶּגֶל nombra una insignia o estandarte; «bandera» es la equivalencia más natural y clara en español para mantener la imagen poética de exhibición pública.
- source_word: עָלַי
  english_pob_choice: over me
  chosen_spanish: sobre mí
  alternatives_spanish:
  - encima de mí
  - por encima de mí
  lexicon: HALOT
  rationale: 'La preposición preserva la relación espacial de la imagen: algo extendido o colocado por encima de la persona amada.'
- source_word: אַהֲבָה
  english_pob_choice: love
  chosen_spanish: amor
  alternatives_spanish:
  - amoroso
  - amor de él
  lexicon: HALOT
  rationale: El sustantivo se mantiene como «amor» para reproducir el predicado nominal del hebreo y la decisión inglesa de no introducir un posesivo no expresado explícitamente.
translation_notes:
  revision_awareness: La versión española sigue la lectura y las decisiones léxicas de la POB inglesa para este versículo, sin cambios detectados en la revisión más reciente; se conserva la metáfora de «la casa del vino» y la predicación final con «amor».
  spanish_consistency_notes:
  - Se mantiene «vino» como traducción de יַיִן, en línea con la imagen literal documentada.
  - Se evita introducir «Cristo», «Señor» u այլ terminología ajena al hebreo del verso.
  - La estructura breve y paralela de dos miembros se conserva para reflejar el tono poético del original.
