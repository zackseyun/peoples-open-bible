revisions:
- from: Ciertamente[b] su carne sobre él sufre dolor[a], y su alma sobre él se lamenta.
  to: Ciertamente[a] su carne en él sufre dolor, y su alma[b] en él se lamenta.
  rationale: Se reemplaza «sobre él» por «en él» en ambos hemistiquios para conservar la referencia personal repetida del hebreo de un modo natural y claro en español. Se añade una nota en «alma» para reflejar el rango semántico de נֶפֶשׁ, en conformidad con el expediente del POB inglés. Se conserva «carne» / «alma», «ciertamente» y «se lamenta» por su fidelidad al paralelismo y al registro poético.
