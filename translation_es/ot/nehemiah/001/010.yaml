review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura del hebreo y preserva la redención, el poder y la imagen de la mano fuerte. Sin embargo, se aparta del rastro auditado del POB en un punto importante: עֲבָדֶיךָ aquí fue decidido en inglés como ''your servants'' por razón contextual de pacto y oración, y el español ''tus esclavos'' endurece indebidamente el matiz. Además, los marcadores de notas están anclados en ''tu pueblo'', pero las notas corresponden a ''redimiste'' y ''mano fuerte'', por lo que no preservan correctamente la evidencia documentada.'
  spanish_quality_summary: 'El español es claro y digno, pero ''tus esclavos'' suena menos natural y menos apropiado en una oración dirigida a Dios en este contexto. También hay un problema formal serio de anclaje de notas: los marcadores no aparecen junto a las expresiones anotadas. El resto fluye bien: ''Pero ellos son... a quienes redimiste con tu gran poder y con tu mano fuerte''.'
  glossary_alignment: Alineación parcial. 'redimiste' concuerda con la decisión teológica y léxica del POB. 'mano fuerte' también concuerda con la preferencia por la transparencia del hebreo. Pero en este versículo la documentación inglesa justificó 'servants', y en español corresponde 'siervos' o 'servidores'; 'esclavos' aquí no sigue la razón contextual documentada, aunque la pauta general del proyecto favorezca 'esclavo' en otros contextos.
  issues:
  - severity: high
    issue: עֲבָדֶיךָ fue traducido como 'tus esclavos' en vez de una opción contextual como 'tus siervos'.
    rationale: La auditoría inglesa decidió explícitamente 'your servants' porque aquí se destaca la relación de pacto con Dios, no el estatus social de esclavitud. En español, 'tus esclavos' introduce una dureza semántica no apoyada por la decisión auditada para este contexto.
  - severity: high
    issue: Los marcadores de notas [a][b] están colocados tras 'tu pueblo' en vez de junto a las expresiones anotadas.
    rationale: La nota a explica 'redimiste' y la nota b explica 'mano fuerte'; según la disciplina requerida, cada marcador debe aparecer exactamente en la palabra o frase pertinente del texto español.
  - severity: low
    issue: La nota sobre 'mano fuerte' repite la misma expresión como alternativa.
    rationale: Decir 'O «mano fuerte»' no aporta una alternativa real. Conviene reformularla para explicar que también puede entenderse como 'mano poderosa', manteniendo la literalidad hebrea en el texto.
  revised_spanish_text: Pero ellos son tus siervos y tu pueblo, a quienes redimiste[a] con tu gran poder y con tu mano fuerte[b].
