translation:
  language: es
  text: ¿No eres tú, oh Dios, quien nos ha rechazado,[a] y no sales, oh Dios,[c][b] con nuestros ejércitos?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «nos has desechado».
    reason: lexical_alternative
  - marker: b
    text: '«Salir» es un modismo militar aquí: salir a la batalla con nuestros ejércitos.'
    reason: cultural_note
  - marker: c
    text: O «y ¿no sales?».
    reason: previous_rendering
lexical_decisions:
- source_word: הֲלֹא
  english_pob_choice: Have you not
  chosen_spanish: ¿No es así
  alternatives_spanish:
  - ¿Acaso no
  - ¿No es cierto que
  lexicon: HALOT
  rationale: La partícula introduce una pregunta retórica que espera afirmación. «¿No es así» mantiene ese valor interrogativo en español sin volver la frase demasiado áspera.
- source_word: אֱלֹהִים
  english_pob_choice: O God
  chosen_spanish: oh Dios
  alternatives_spanish:
  - Dios
  - oh, Dios
  lexicon: HALOT
  rationale: Está en vocativo directo; «oh Dios» refleja la apelación al destinatario y conserva la repetición enfática del hebreo en ambas cláusulas.
- source_word: זְנַחְתָּנוּ
  english_pob_choice: rejected us
  chosen_spanish: nos has rechazado
  alternatives_spanish:
  - nos has desechado
  - nos has apartado
  - nos has echado fuera
  lexicon: HALOT
  rationale: El verbo זנח suele expresar rechazar o desechar. «Nos has rechazado» es claro y conserva la fuerza de lamentación sin suavizar la atribución directa a Dios.
- source_word: וְלֹא
  english_pob_choice: and do you not
  chosen_spanish: y no
  alternatives_spanish:
  - y ¿no
  - y no es que
  lexicon: HALOT
  rationale: La negativa coordina la segunda pregunta con la primera. En español, dentro de la misma interrogación retórica, «y no sales» comunica la construcción sin introducir una negación de mandato.
- source_word: תֵצֵא
  english_pob_choice: go out
  chosen_spanish: sales
  alternatives_spanish:
  - salgas
  - saldrás
  - salías
  lexicon: HALOT
  rationale: El verbo literalmente significa «salir / salir a». En contexto militar, el español «sales» puede funcionar como imagen viva de salir a campaña, manteniendo la concreción del hebreo.
- source_word: בְּצִבְאוֹתֵינוּ
  english_pob_choice: with our armies
  chosen_spanish: con nuestros ejércitos
  alternatives_spanish:
  - con nuestras huestes
  - con nuestras tropas
  lexicon: HALOT
  rationale: צְבָאוֹת aquí se refiere a fuerzas militares. «Ejércitos» es natural en español y preserva el sentido bélico mejor que una opción más arcaizante.
theological_decisions:
- issue: Lenguaje de rechazo divino en un lamento comunitario
  english_pob_reading: Retain the psalm's direct claim that God has rejected his people and is not going out with their armies as covenant-lament language.
  chosen_spanish_reading: Conservar la afirmación directa de que Dios ha rechazado al pueblo y no sale con sus ejércitos, como lenguaje de lamento del pacto.
  alternative_spanish_readings:
  - Suavizar a «nos permitiste ser rechazados»
  - Interpretar como «pareces habernos rechazado»
  rationale: El hebreo atribuye directamente a Dios el rechazo y la ausencia en batalla. La traducción conserva esa tensión teológica propia del lamento, en vez de resolverla o atenuarla.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: El texto español sigue la revisión más reciente del inglés al mantener toda la pregunta en forma interrogativa y no como mandato negativo. También conserva la repetición vocativa de «oh Dios» y el paralelismo entre las dos cláusulas, con la imagen militar explícita de «salir con nuestros ejércitos».
  spanish_consistency_notes:
  - Se usó «Dios» para אֱלֹהִים en vocativo directo, conforme al criterio POB.
  - Se prefirió «ejércitos» para צבאות por su claridad bélica en español.
  - Se mantuvo el valor de lamento sin suavizar el rechazo divino.
  - La puntuación conserva la pregunta retórica de una sola unidad, con segundo vocativo separado por coma.
