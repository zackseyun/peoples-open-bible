id: ECC.2.11
reference: Ecclesiastes 2:11
source:
  edition: WLC
  text: וּ/פָנִ֣יתִֽי אֲנִ֗י בְּ/כָל מַעֲשַׂ/י֙ שֶֽׁ/עָשׂ֣וּ יָדַ֔/י וּ/בֶֽ/עָמָ֖ל שֶׁ/עָמַ֣לְתִּי לַ/עֲשׂ֑וֹת וְ/הִנֵּ֨ה הַ/כֹּ֥ל הֶ֨בֶל֙ וּ/רְע֣וּת ר֔וּחַ וְ/אֵ֥ין יִתְר֖וֹן תַּ֥חַת הַ/שָּֽׁמֶשׁ־׃
translation:
  text: Then I turned to consider all the works that my hands had done[a], and the labor that I had labored to do; and behold, all was vanity and a chasing after wind[c][b], and there was no profit under the sun.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'vapor' or 'breath'; the Hebrew hebel often conveys what is fleeting, insubstantial, or frustratingly elusive.
    reason: lexical_alternative
  - marker: b
    text: Or 'striving after wind.' The Hebrew idiom depicts futile effort or pursuit.
    reason: lexical_alternative
  - marker: c
    text: Or 'gain' or 'advantage.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וּפָנִיתִי
  chosen: Then I turned to consider
  alternatives:
  - So I turned
  - Then I looked at
  - Then I considered
  lexicon: HALOT
  rationale: פנה literally means 'turn.' In context it introduces reflective evaluation of what has been accomplished, so 'turned to consider' preserves the concrete metaphor while making the mental shift explicit in natural English.
- source_word: מַעֲשַׂי
  chosen: the works
  alternatives:
  - my deeds
  - my accomplishments
  lexicon: HALOT
  rationale: מַעֲשֶׂה commonly denotes deeds or works. 'Works' fits the concrete projects in the immediate context and pairs naturally with 'my hands had done.'
- source_word: שֶׁעָשׂוּ יָדַי
  chosen: that my hands had done
  alternatives:
  - that my hands had made
  - which my hands had accomplished
  lexicon: HALOT
  rationale: The idiom 'my hands had done' is retained because it is transparent in English and preserves the Hebrew emphasis on personal agency and craftsmanship.
- source_word: וּבֶעָמָל
  chosen: and the labor
  alternatives:
  - and the toil
  - and the effort
  lexicon: HALOT
  rationale: עָמָל in Ecclesiastes often carries the sense of burdensome labor or toil. 'Labor' is chosen here for readability while still conveying exertion; 'toil' remains a strong alternative and is preserved in the decision record.
- source_word: שֶׁעָמַלְתִּי
  chosen: that I had labored
  alternatives:
  - that I had toiled
  - in which I had worked hard
  lexicon: HALOT
  rationale: Using 'labored' keeps the verbal cognate with the preceding noun and reflects the Hebrew repetition for emphasis.
- source_word: לַעֲשׂוֹת
  chosen: to do
  alternatives:
  - to make
  - to accomplish
  lexicon: HALOT
  rationale: The infinitive of עשה is broad. 'To do' is formally close and avoids over-specifying whether the focus is making, performing, or accomplishing.
- source_word: וְהִנֵּה
  chosen: and behold
  alternatives:
  - and look
  - and see
  lexicon: HALOT
  rationale: הִנֵּה marks a vivid presentation of the conclusion. 'Behold' preserves the discourse force, though slightly elevated; it remains intelligible in modern literary English.
- source_word: הַכֹּל
  chosen: all was
  alternatives:
  - everything was
  - the whole was
  lexicon: HALOT
  rationale: The phrase sums up the entirety of the speaker's projects and labor. 'All was' is concise and idiomatic in this clause.
- source_word: הֶבֶל
  chosen: vanity
  alternatives:
  - vapor
  - breath
  - meaninglessness
  lexicon: HALOT
  rationale: הֶבֶל is a key Ecclesiastes term with a semantic range including breath, vapor, transience, and futility. 'Vanity' preserves traditional resonance and the book's thematic vocabulary, while avoiding the over-interpretive totalization of 'meaninglessness.' A lexical footnote preserves 'vapor' as a viable nuance.
- source_word: וּרְעוּת רוּחַ
  chosen: and a chasing after wind
  alternatives:
  - and striving after wind
  - and shepherding wind
  lexicon: HALOT
  rationale: This idiom expresses futile pursuit. 'Chasing after wind' communicates the image clearly in contemporary English. 'Striving after wind' is traditional, but 'chasing' is more immediately understandable. The underlying noun may suggest feeding/shepherding or striving depending on vocalization and interpretation; the chosen rendering captures the idiomatic sense.
- source_word: וְאֵין יִתְרוֹן
  chosen: and there was no profit
  alternatives:
  - and there was no gain
  - and there was no advantage
  lexicon: HALOT
  rationale: יִתְרוֹן in Ecclesiastes denotes surplus, advantage, or profit. 'Profit' fits the book's evaluative, almost economic register, though 'gain' is also possible.
- source_word: תַּחַת הַשָּׁמֶשׁ
  chosen: under the sun
  alternatives:
  - beneath the sun
  lexicon: HALOT
  rationale: This is a programmatic Ecclesiastes expression for life in the earthly human sphere. 'Under the sun' is the standard and natural rendering.
