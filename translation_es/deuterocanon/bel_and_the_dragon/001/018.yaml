translation:
  language: es
  text: 'Y sucedió que, al abrirse las puertas, el rey miró la mesa y clamó a gran voz: «¡Grande eres, Bel, y no hay engaño contigo!»'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: καὶ ἐγένετο
  english_pob_choice: And it happened
  chosen_spanish: Y sucedió que
  alternatives_spanish:
  - Y aconteció
  - Y ocurrió
  lexicon: BDAG
  rationale: Reproduce la transición narrativa sin sonar arcaico. «Sucedió que» comunica el giro de escena de forma natural en español moderno.
- source_word: ἅμα τῷ ἀνοῖξαι
  english_pob_choice: when the doors were opened
  chosen_spanish: al abrirse
  alternatives_spanish:
  - cuando se abrieron
  - en el abrirse
  lexicon: BDAG
  rationale: La construcción griega expresa simultaneidad inmediata con una acción pasiva. «Al abrirse» conserva esa inmediatez y evita cargar el texto con una perífrasis más pesada.
- source_word: τὰς θύρας
  english_pob_choice: the doors
  chosen_spanish: las puertas
  alternatives_spanish:
  - las entradas
  - las compuertas
  lexicon: BDAG
  rationale: θύραι significa normalmente «puertas». «Puertas» es la opción más directa y fiel al término griego.
- source_word: ἐπιβλέψας
  english_pob_choice: looked at
  chosen_spanish: miró
  alternatives_spanish:
  - observó
  - volvió la vista hacia
  lexicon: BDAG
  rationale: El participio marca una acción visual simple. «Miró» es natural en español y no añade una intensidad que el griego no exige.
- source_word: τὴν τράπεζαν
  english_pob_choice: the table
  chosen_spanish: la mesa
  alternatives_spanish:
  - la tabla
  - la mesa de ofrendas
  lexicon: BDAG
  rationale: El sustantivo básico es «mesa». Aunque el contexto es cultual, el texto griego no lo explicita en esta frase, así que la traducción mantiene la referencia mínima.
- source_word: ἐβόησεν φωνῇ μεγάλῃ
  english_pob_choice: cried out with a loud voice
  chosen_spanish: exclamó con voz fuerte
  alternatives_spanish:
  - gritó con voz fuerte
  - clamó en alta voz
  lexicon: BDAG
  rationale: La combinación verbal comunica una proclamación audible y enfática. «Exclamó con voz fuerte» conserva el valor retórico y evita un calco demasiado rígido.
- source_word: Μέγας εἶ
  english_pob_choice: Great are you
  chosen_spanish: ¡Grande eres tú!
  alternatives_spanish:
  - Tú eres grande
  - ¡Eres grande!
  lexicon: BDAG
  rationale: El orden enfático del griego se refleja mejor con la inversión «Grande eres tú». Se conserva el tono exclamativo de la dirección al ídolo.
- source_word: Βήλ
  english_pob_choice: Bel
  chosen_spanish: Bel
  alternatives_spanish:
  - Bél
  lexicon: transliteration
  rationale: Se conserva el nombre propio transliterado como en el texto fuente y en la tradición POB.
- source_word: οὐκ ἔστιν παρὰ σοὶ δόλος
  english_pob_choice: there is no deceit with you
  chosen_spanish: no hay engaño contigo
  alternatives_spanish:
  - no hay fraude en ti
  - no se encuentra engaño en ti
  - no hay dolo contigo
  lexicon: BDAG
  rationale: δόλος puede ser «engaño», «fraude» o «dolo». «Engaño» es claro y natural en español. «Contigo» refleja de forma idiomática la relación expresada por παρὰ σοὶ, sin perder la referencia a la presencia o asociación del engaño con el destinatario.
theological_decisions:
- issue: Mantener la ironía narrativa sin corregir la falsa afirmación del rey sobre Bel
  english_pob_reading: The line is translated as the king's direct speech without narratorial endorsement
  chosen_spanish_reading: La línea se traduce como discurso directo del rey, sin aprobación narratorial
  alternative_spanish_readings:
  - El narrador añade una aclaración que relativiza la afirmación
  - El texto se parafrasea para insinuar que el rey solo cree esto
  rationale: El griego presenta una alabanza directa del rey a Bel. La traducción conserva esa voz para mantener la tensión dramática y no resolver la ironía del pasaje en el texto principal.
  doctrine_reference: Preservar la tensión teológica y narrativa del relato sin suavizarla.
translation_notes:
  revision_awareness: La versión española sigue la revisión más reciente del inglés POB, que prefirió «when the doors were opened» sobre «as soon as», por considerarlo una rendición más directa de ἅμα τῷ ἀνοῖξαι sin intensificar el matiz temporal.
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando el texto lo requiera; aquí no aparece.
  - Se mantiene «Bel» como nombre propio.
  - Se evita introducir términos interpretativos como «ídolo» o «ofrendas» en la línea principal, porque el griego de esta frase no los explicita.
  - «No hay engaño contigo» conserva la carga de δόλος sin recurrir a una formulación más técnica como «dolo».
