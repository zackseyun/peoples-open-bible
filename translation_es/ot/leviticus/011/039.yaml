translation:
  language: es
  text: Y si muere alguno de los animales que les son permitidos para alimento[a], el que toque su carcasa quedará impuro hasta la tarde.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, más literalmente: «que es para ustedes para alimento». La frase hebrea identifica animales permitidos como alimento.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְכִי
  english_pob_choice: And if
  chosen_spanish: Y si
  alternatives_spanish:
  - Si
  - Y cuando
  lexicon: HALOT
  rationale: Conserva la fuerza condicional y la conexión discursiva del ו inicial sin volver el español demasiado pesado.
- source_word: יָמוּת
  english_pob_choice: dies
  chosen_spanish: muere
  alternatives_spanish:
  - muriera
  - llegara a morir
  lexicon: HALOT
  rationale: En una cláusula legal condicional, el presente español expresa bien el valor prospectivo del hebreo y suena natural.
- source_word: מִן הַבְּהֵמָה
  english_pob_choice: any of the livestock
  chosen_spanish: alguna de las reses
  alternatives_spanish:
  - alguno de los animales domésticos
  - alguna de las bestias
  lexicon: HALOT
  rationale: ‘Reses’ comunica el conjunto de animales domésticos comestibles en un registro bíblico claro, y ‘alguna de’ preserva el valor partitivo de מן.
- source_word: אֲשֶׁר הִיא לָכֶם לְאָכְלָה
  english_pob_choice: that may be used for food
  chosen_spanish: que les sirven de alimento
  alternatives_spanish:
  - que son para ustedes alimento
  - que les son para comer
  - que pueden comer
  lexicon: HALOT
  rationale: El hebreo señala la clase de animales aptos para alimento; ‘sirven de alimento’ conserva esa categoría permisiva sin volver la frase rígidamente literal. ‘Les’ mantiene el destinatario plural del hebreo.
- source_word: הַנֹּגֵעַ
  english_pob_choice: the one who touches
  chosen_spanish: el que toque
  alternatives_spanish:
  - el que toca
  - quien toque
  - el que entra en contacto
  lexicon: HALOT
  rationale: El participio sustantivado en contexto legal se expresa de manera natural con una cláusula relativa; ‘toque’ conserva el valor general/prospectivo.
- source_word: בְּנִבְלָתָהּ
  english_pob_choice: its carcass
  chosen_spanish: su cadáver
  alternatives_spanish:
  - su carroña
  - su carroña muerta
  - su cuerpo muerto
  lexicon: HALOT
  rationale: ‘Cadáver’ comunica la idea de un cuerpo muerto de forma clara en español. Aunque ‘carcasa/carroña’ podría acercarse a matices de ‘carcass’, ‘cadáver’ evita una connotación peyorativa innecesaria y sigue siendo fiel en este contexto legal.
- source_word: יִטְמָא
  english_pob_choice: shall be unclean
  chosen_spanish: quedará impuro
  alternatives_spanish:
  - será impuro
  - se hará impuro
  - quedará inmundo
  lexicon: HALOT
  rationale: ‘Quedará’ refleja bien el estado resultante de contaminación ritual. ‘Impuro’ mantiene el vocabulario bíblico de pureza sin cargar el texto con un tecnicismo más fuerte que el original.
- source_word: עַד הָעָרֶב
  english_pob_choice: until the evening
  chosen_spanish: hasta la tarde
  alternatives_spanish:
  - hasta el atardecer
  - hasta la noche
  lexicon: HALOT
  rationale: La fórmula legal hebrea se expresa de forma idiomática en español con ‘hasta la tarde’; es clara y conserva la referencia temporal establecida.
translation_notes:
  revision_awareness: La revisión reciente no introdujo cambios; este borrador sigue el estado de alta concordancia del texto fuente y del audit trail en inglés.
  spanish_consistency_notes:
  - Se mantiene ‘Yahvé’ como norma del proyecto solo cuando aparezca el tetragrámaton; este versículo no lo contiene.
  - ‘Impuro’ se usa en sentido ritual/legal, no moral.
  - Se preserva el matiz partitivo de מִן con ‘alguna de las reses’.
  - La nota al pie recoge la alternativa literal del hebreo sin duplicar el sentido principal del texto.
