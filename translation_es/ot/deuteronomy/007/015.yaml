translation:
  language: es
  text: Yahvé apartará de ti toda enfermedad, y no pondrá sobre ti ninguna de las enfermedades dañinas de Egipto[a] que has conocido[b]; pero las pondrá sobre todos los que te odian.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O ‘las malas/graves enfermedades de Egipto’. El adjetivo hebreo puede significar malo, dañino o grave.
    reason: lexical_alternative
  - marker: b
    text: O ‘que has experimentado’. El verbo hebreo para ‘conocer’ puede tener aquí fuerza experiencial.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהֵסִיר / יְהוָה
  english_pob_choice: will remove / Yahweh
  chosen_spanish: apartará / Yahvé
  alternatives_spanish:
  - quitará
  - alejará
  lexicon: HALOT
  rationale: El hifil de סור expresa hacer que algo se aparte; en español, 'apartar' comunica bien la idea de retirar o hacer salir algo de una persona. 'Yahvé' preserva el nombre divino del texto hebreo sin sustituirlo por un título.
- source_word: מִמְּךָ
  english_pob_choice: from you
  chosen_spanish: de ti
  alternatives_spanish:
  - lejos de ti
  - apartado de ti
  lexicon: HALOT
  rationale: La preposición con sufijo marca separación. 'De ti' es la forma natural y fiel en español.
- source_word: כָּל חֹלִי
  english_pob_choice: all sickness
  chosen_spanish: toda enfermedad
  alternatives_spanish:
  - toda dolencia
  - toda enfermedad
  lexicon: HALOT
  rationale: חֹלִי denota enfermedad o dolencia. 'Enfermedad' es claro y estándar en español; el sentido colectivo de 'all' se expresa con 'toda'.
- source_word: מַדְוֵי מִצְרַיִם הָרָעִים
  english_pob_choice: the evil diseases of Egypt
  chosen_spanish: las malas enfermedades de Egipto
  alternatives_spanish:
  - las dañinas enfermedades de Egipto
  - las graves enfermedades de Egipto
  lexicon: HALOT
  rationale: הָרָעִים puede significar malas, dañinas o graves. 'Malas enfermedades' conserva la cercanía formal al hebreo y mantiene la tensión semántica sin interpretarla de más.
- source_word: אֲשֶׁר יָדַעְתָּ
  english_pob_choice: that you have known
  chosen_spanish: que has conocido
  alternatives_spanish:
  - que conociste
  - que has experimentado
  lexicon: HALOT
  rationale: יָדַע puede incluir conocimiento por experiencia. 'Has conocido' sigue de cerca el hebreo y deja abierta esa posible fuerza experiencial, como en el audit trail inglés.
- source_word: לֹא יְשִׂימָם בָּךְ
  english_pob_choice: will he not put on you
  chosen_spanish: no pondrá sobre ti
  alternatives_spanish:
  - no los pondrá sobre ti
  - no los colocará sobre ti
  lexicon: HALOT
  rationale: שׂים con ב expresa poner sobre alguien. En español, 'poner sobre ti' reproduce esa imagen de imposición; se omite la inversión sintáctica inglesa para mantener fluidez sin perder sentido.
- source_word: וּנְתָנָם
  english_pob_choice: but he will lay them on
  chosen_spanish: pero las pondrá
  alternatives_spanish:
  - sino que las pondrá
  - y las pondrá
  lexicon: HALOT
  rationale: נתן aquí funciona en paralelo con la idea de imponer o poner. 'Pero' expresa el contraste implícito del contexto y del inglés revisado; 'las pondrá' mantiene la referencia a las enfermedades.
- source_word: בְּכָל שֹׂנְאֶיךָ
  english_pob_choice: on all who hate you
  chosen_spanish: sobre todos los que te odian
  alternatives_spanish:
  - sobre todos tus enemigos
  - sobre todos los que te aborrecen
  lexicon: HALOT
  rationale: El participio significa 'los que odian/aborrecen'. 'Los que te odian' es preciso y evita ampliar indebidamente a 'enemigos'.
theological_decisions:
- issue: Nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - Jehová
  rationale: Se conserva el nombre propio del pacto en transliteración española, conforme a la línea editorial del proyecto y al valor del Tetragrama en el hebreo.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Alcance de la promesa sobre enfermedades
  english_pob_reading: A covenantal promise of protection from sickness/disease without expanding it into a universal or unconditional doctrine of health.
  chosen_spanish_reading: Promesa pactal de protección contra enfermedad, sin convertirla en una doctrina universal de salud.
  alternative_spanish_readings:
  - Promesa de inmunidad total ante toda enfermedad en cualquier circunstancia
  - Referencia puramente metafórica a aflicciones no físicas
  rationale: El hebreo habla concretamente de enfermedad y de las enfermedades de Egipto dentro del contexto del pacto. La traducción debe conservar esa concreción sin extrapolar una afirmación doctrinal más amplia que el verso no formula.
  doctrine_reference: 'DOCTRINE.md Translation philosophy: Never import doctrinal claims the text does not make; preserve the source text''s plain sense'
translation_notes:
  revision_awareness: 'La redacción sigue la revisión más reciente del inglés auditado: mantiene la secuencia hebrea del sujeto divino, evita una negación global tipo ‘ninguna de’, y conserva el paralelismo de imponer las enfermedades sobre los adversarios. También conserva la tensión lexical de הָרָעִים y de יָדַעְתָּ mediante notas alternativas.'
  spanish_consistency_notes:
  - Se usa ‘Yahvé’ para יְהוָה de manera consistente con el estándar del proyecto.
  - Se prefirió ‘enfermedad’ como término amplio y natural, en lugar de ‘dolencia’, para mantener claridad pública.
  - ‘Odian’ reproduce el participio hebreo sin ampliar a ‘enemigos’.
  - El marcado de notas al pie aparece solo donde hay alternativa lexical real en el texto español.
