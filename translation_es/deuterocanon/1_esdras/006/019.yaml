revisions:
- from: Entonces Sanabassar vino y echó los cimientos de la casa del Señor en Jerusalén[a], y desde aquel tiempo hasta ahora ha estado en construcción y no ha llegado a su término.
  to: Entonces Sanabassar vino y puso los cimientos de la casa del Señor en Jerusalén[a], y desde aquel tiempo hasta ahora ha estado en construcción y no ha llegado a su fin.
  rationale: Se ajusta εἰσεβάλλετο a una expresión española más idiomática y fiel al contexto arquitectónico («puso los cimientos»). También se suaviza la clausula final a «no ha llegado a su fin», que mantiene el valor de συντέλεια con mejor naturalidad en español. No se requieren cambios doctrinales ni de notas.
