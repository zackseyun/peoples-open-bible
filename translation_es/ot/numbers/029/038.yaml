translation:
  language: es
  text: y un macho cabrío[a] como ofrenda por el pecado, además del holocausto continuo[b] y su ofrenda de cereal y su libación.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «un chivo». El hebreo שׂעיר puede denotar más específicamente un macho cabrío en contextos sacrificiales.
    reason: lexical_alternative
  - marker: b
    text: O «el holocausto regular». El hebreo הַתָּמִיד destaca la idea de continuidad o regularidad del sacrificio.
    reason: lexical_alternative
lexical_decisions:
- source_word: וּ/שְׂעִ֥יר
  english_pob_choice: and one goat
  chosen_spanish: y un chivo
  alternatives_spanish:
  - y un macho cabrío
  - y una cabra
  lexicon: HALOT
  rationale: En contexto sacrificial, שְׂעִיר puede referirse a un macho cabrío; en español, «chivo» comunica naturalmente el animal y conserva la posibilidad de especificación masculina sin sobrecargar el texto. El numeral «uno» queda implícito en el artículo indefinido, como en el flujo natural del español.
- source_word: חַטָּאת
  english_pob_choice: for a sin offering
  chosen_spanish: como ofrenda por el pecado
  alternatives_spanish:
  - como ofrenda por el pecado
  - para ofrenda por el pecado
  - ofrenda por el pecado
  lexicon: HALOT
  rationale: En contexto cultual, חַטָּאת nombra la ofrenda por el pecado, no el pecado abstracto. El español «como ofrenda por el pecado» conserva la función sacrificial sin añadir una preposición artificialmente rígida.
- source_word: מִלְּבַד
  english_pob_choice: besides
  chosen_spanish: además de
  alternatives_spanish:
  - aparte de
  - además de
  - fuera de
  lexicon: HALOT
  rationale: 'La idea es aditiva: esta ofrenda se suma a otra ya establecida. «Además de» es natural en español y mantiene la relación de suplemento.'
- source_word: עֹלַת הַתָּמִיד
  english_pob_choice: the regular burnt offering
  chosen_spanish: el holocausto continuo
  alternatives_spanish:
  - el holocausto regular
  - el holocausto diario
  - la ofrenda quemada continua
  lexicon: HALOT
  rationale: Para עֹלָה, «holocausto» es el equivalente cultual tradicional en español bíblico y expresa el sacrificio totalmente quemado. הַתָּמִיד señala continuidad/regularidad; «continuo» conserva esa fuerza sin limitarla solo a «diario».
- source_word: וּ/מִנְחָתָ֖/הּ
  english_pob_choice: and its grain offering
  chosen_spanish: y su ofrenda de cereal
  alternatives_spanish:
  - y su ofrenda de grano
  - y su ofrenda vegetal
  - y su oblación
  lexicon: HALOT
  rationale: מִנְחָה en contexto sacrificial designa la ofrenda vegetal o de cereal que acompaña al holocausto. «Ofrenda de cereal» es clara y sobria en español, y evita la vaguedad de «oblación».
- source_word: וְ/נִסְכָּֽ/הּ
  english_pob_choice: and its drink offering
  chosen_spanish: y su libación
  alternatives_spanish:
  - y su ofrenda líquida
  - y su bebida ritual
  - y su libación
  lexicon: HALOT
  rationale: נֶסֶךְ es la libación que acompaña el sacrificio. «Libación» es el término más preciso y clásico en español bíblico; aquí se prefiere por fidelidad cultual y concisión.
theological_decisions:
- issue: Cómo rendir la terminología sacrificial de עֹלָה, מִנְחָה y נֶסֶךְ sin perder la relación entre ofrendas
  english_pob_reading: the regular burnt offering and its grain offering and its drink offering
  chosen_spanish_reading: el holocausto continuo y su ofrenda de cereal y su libación
  alternative_spanish_readings:
  - el holocausto continuo y su ofrenda vegetal y su libación
  - el holocausto regular y su ofrenda de cereal y su libación
  rationale: 'El versículo enumera ofrendas vinculadas entre sí: el holocausto permanente y los elementos que lo acompañan. «Holocausto continuo» preserva la idea de un sacrificio establecido y repetido; «ofrenda de cereal» y «libación» conservan los nombres cultuales específicos sin neutralizarlos.'
  doctrine_reference: Pentateuco sacrificial; Levítico 1–7; Números 28–29
- issue: Si reflejar explícitamente el posible matiz masculino de שְׂעִיר
  english_pob_reading: one goat
  chosen_spanish_reading: un chivo
  alternative_spanish_readings:
  - un macho cabrío
  - un macho cabrío como ofrenda por el pecado
  rationale: La fuente hebrea puede denotar un macho cabrío en contexto sacrificial, pero el español bíblico común admite «chivo» con buena naturalidad. Se conserva la posibilidad masculina sin recargar el verso con una glosa innecesaria en el texto principal.
  doctrine_reference: Terminología sacrificial del Pentateuco
translation_notes:
  revision_awareness: La revisión inglesa más reciente no introdujo cambios y el cotejo final informó alto acuerdo. Por eso no se incorporan variantes textuales nuevas; solo se traslada al español el mismo valor léxico y cultual ya auditado.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como forma de la Tetragrámaton en este proyecto, pero este versículo no lo contiene.
  - Se emplea «holocausto» para עֹלָה por coherencia con el registro cultual del Pentateuco en español.
  - Se usa «libación» en lugar de una paráfrasis más general para conservar la precisión ritual.
  - Los sufijos posesivos «su» reflejan que las ofrendas de cereal y libación pertenecen al holocausto mencionado, no a la cabra/chivo.
