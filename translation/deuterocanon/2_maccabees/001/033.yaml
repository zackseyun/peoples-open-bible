theological_decisions:
- issue: Cultic sense of ἥγνισαν τὰς θυσίας
  chosen_reading: rendered as 'purified the sacrifices'
  alternative_readings:
  - consecrated the sacrifices
  - purified the offerings
  rationale: The verse describes ritual action involving the newly appeared water. 'Purified' preserves the cultic cleansing sense without importing a more developed theological category than the Greek states.
  doctrine_reference: Translation philosophy §§1, 6
- issue: Reference of ἀφ' οὗ
  chosen_reading: taken to refer to the water as the means/source used in the purification
  alternative_readings:
  - taken more loosely as 'after which' referring to the event as a whole
  rationale: The nearest antecedent is τὸ ὕδωρ, and the narrative logic supports the water being used for the ritual action. This is a contextual decision rather than a doctrinal one, but it affects how the miracle is understood.
  doctrine_reference: Translation philosophy §3
