translation:
  language: es
  text: Entonces Ezequías volvió su rostro a la pared[a] y oró a Yahvé[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «hacia la pared».
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: «YHWH»; tradicionalmente se traduce «el SEÑOR».'
    reason: alternative_reading
lexical_decisions:
- source_word: וַיַּסֵּב
  english_pob_choice: turned
  chosen_spanish: volvió
  alternatives_spanish:
  - giró
  - se volvió
  lexicon: HALOT
  rationale: El hebreo expresa un giro físico deliberado del rostro. «Volvió» conserva el movimiento concreto en español natural sin sobretraducirlo.
- source_word: חִזְקִיָּהוּ
  english_pob_choice: Hezekiah
  chosen_spanish: Ezequías
  alternatives_spanish:
  - Ezequías
  lexicon: Convención bíblica hispana
  rationale: El nombre propio se adapta a la forma bíblica usual en español, clara y reconocible para lectores eclesiales.
- source_word: פָּנָיו
  english_pob_choice: his face
  chosen_spanish: su rostro
  alternatives_spanish:
  - su cara
  - su semblante
  lexicon: HALOT
  rationale: «Rostro» preserva la imagen corporal explícita del hebreo y su carga narrativa, sin reducirla a una referencia genérica a la persona.
- source_word: אֶל הַקִּיר
  english_pob_choice: to the wall
  chosen_spanish: hacia la pared
  alternatives_spanish:
  - a la pared
  - contra la pared
  lexicon: HALOT
  rationale: La dirección física se expresa de forma natural en español con «hacia». «Pared» comunica la escena con claridad; «muro» sería posible pero menos doméstico en este contexto.
- source_word: וַיִּתְפַּלֵּל
  english_pob_choice: and prayed
  chosen_spanish: y oró
  alternatives_spanish:
  - y oró fervientemente
  - y se puso a orar
  lexicon: HALOT
  rationale: «Oró» es la traducción directa y digna del verbo de oración; evita añadir matices no explicitados por el hebreo.
- source_word: אֶל יְהוָה
  english_pob_choice: to Yahweh
  chosen_spanish: a Yahvé
  alternatives_spanish:
  - a Yahvé
  - al Dios Yahvé
  lexicon: 'DOCTRINE.md: Contested terms — יהוה / YHWH → Yahvé'
  rationale: Se sigue la norma del proyecto para el Nombre divino, manteniéndolo en la forma «Yahvé» en el texto principal, en lugar de sustituirlo por «Señor».
theological_decisions:
- issue: Representación del Nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: El hebreo usa el Tetragrámaton de manera directa. La forma española del proyecto es «Yahvé», que preserva el nombre del pacto sin la convención de enmascararlo con un título.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Imágenes corporales en la oración
  english_pob_reading: his face to the wall
  chosen_spanish_reading: su rostro hacia la pared
  alternative_spanish_readings:
  - se volvió hacia la pared
  - dirigió su oración a la pared
  rationale: 'Se conserva la imagen corporal concreta del hebreo porque forma parte del énfasis narrativo: el rey no sólo oró, sino que giró su rostro hacia la pared.'
  doctrine_reference: HALOT on פָּנִים and directional construction with אֶל
translation_notes:
  revision_awareness: 'El texto coincide con el cierre de revisión más reciente: no se documentaron cambios posteriores en el pasaje, y el cotejo reporta acuerdo alto (1.0) entre las pasadas de revisión.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» para יְהוָה conforme a la terminología del proyecto.
  - Se usa pasado narrativo simple en español para reflejar el wayyiqtol hebreo.
  - «Rostro» y «pared» conservan la imaginería concreta sin convertirla en paráfrasis.
  - La puntuación final y los corchetes de nota siguen el formato editorial esperado.
