translation:
  language: es
  text: Hay un amigo que se vuelve enemigo[a], y pondrá al descubierto tu pleito vergonzoso.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, más literalmente: «y pondrá al descubierto el pleito de tu afrenta». El hebreo es muy breve; la traducción refleja el sentido probable de un conflicto que termina siendo motivo de vergüenza pública.'
    reason: lexical_alternative
lexical_decisions:
- source_word: יֵשׁ אוֹהֵב / φίλος
  english_pob_choice: There is a friend
  chosen_spanish: Hay un amigo
  alternatives_spanish:
  - Hay uno que ama
  - Hay un amigo/amante
  lexicon: HALOT
  rationale: En este contexto sapiencial, אוֹהֵב no se refiere a amor romántico sino a un amigo, en concordancia con φίλος. «Hay un amigo» suena natural en español y conserva el valor relacional del término.
- source_word: נֶהְפָּךְ לְשׂוֹנֵא / μετατιθέμενος εἰς ἔχθραν
  english_pob_choice: who turns into an enemy
  chosen_spanish: que se vuelve enemigo
  alternatives_spanish:
  - que se convierte en enemigo
  - que pasa a ser enemigo
  - que se torna en enemigo
  lexicon: HALOT
  rationale: El hebreo y el griego expresan un cambio de relación, de amistad a enemistad. «Se vuelve enemigo» comunica ese giro de manera clara y fiel sin suavizarlo.
- source_word: רִיב / μάχην
  english_pob_choice: the quarrel
  chosen_spanish: pleito
  alternatives_spanish:
  - disputa
  - contienda
  - riña
  lexicon: HALOT
  rationale: רִיב puede abarcar pleito, disputa o contienda; aquí el paralelismo con «enemigo» y la exposición pública de la vergüenza favorecen un término interpersonal. «Pleito» conserva la fuerza conflictiva con un tono natural en español.
- source_word: חֶרְפָּתְךָ / ὀνειδισμοῦ σου
  english_pob_choice: your disgraceful quarrel
  chosen_spanish: vergonzoso
  alternatives_spanish:
  - de tu vergüenza
  - que te deshonra
  - de tu oprobio
  lexicon: HALOT
  rationale: 'El hebreo es compacto: literalmente, «el pleito de tu afrenta/reproche». Siguiendo la revisión inglesa, «pleito vergonzoso» refleja la construcción sin forzar una perífrasis larga, y conserva la idea de deshonra pública.'
- source_word: יַחְשֹׂף / ἀποκαλύψει
  english_pob_choice: he will expose
  chosen_spanish: descubrirá
  alternatives_spanish:
  - expondrá
  - revelará
  - pondrá al descubierto
  lexicon: HALOT
  rationale: חשׂף y ἀποκαλύψει significan desvelar o poner al descubierto. «Descubrirá» mantiene la imagen de quitar el velo y funciona bien en español bíblico contemporáneo.
translation_notes:
  revision_awareness: La redacción sigue la revisión inglesa más reciente, que prefirió una formulación concisa y formal («your disgraceful quarrel») frente a una paráfrasis más explícita. Se respetó esa concisión en español con «pleito vergonzoso», manteniendo la ambigüedad útil del hebreo entre conflicto y deshonra.
  spanish_consistency_notes:
  - Se mantuvo «amigo» para אוֹהֵב en vez de «amante», por el contexto sapiencial y el paralelo griego φίλος.
  - Se eligió «descubrirá» para conservar la imagen de revelar/poner al descubierto, coherente con la nota sobre חשׂף y ἀποκαλύψει.
  - «Pleito vergonzoso» intenta equilibrar la concisión de la revisión inglesa con la literalidad subyacente del hebreo, sin borrar la tensión semántica entre conflicto y vergüenza.
