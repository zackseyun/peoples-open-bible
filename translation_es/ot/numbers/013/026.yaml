revisions:
- from: Ellos fueron y llegaron a Moisés, a Aarón y a toda la congregación de los hijos de Israel, en el desierto de Parán, en Cades[a]. Y les dieron palabra, y a toda la congregación, y les mostraron el fruto de la tierra.
  to: Ellos fueron y llegaron a Moisés, a Aarón y a toda la congregación de los hijos de Israel[a], en el desierto de Parán, en Cades. Les dieron noticias a ellos y a toda la congregación, y les mostraron el fruto de la tierra.
  rationale: Se corrige la expresión inidiomática «les dieron palabra» por «Les dieron noticias», que comunica de forma natural y fiel la idea de devolver palabra/informar. También se reubica la nota [a] al sintagma «hijos de Israel», que es donde pertenece su alternativa léxica. Se mantiene el resto de las decisiones principales del borrador porque reflejan bien el hebreo y el expediente inglés.
  reviewer_model: gpt-5.4
