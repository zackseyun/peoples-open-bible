  glossary_alignment: 'No hay conflictos con los términos troncales del proyecto. La principal desviación léxica está en παροικία: debe evitarse «peregrinación» y preferirse «estancia como extranjeros», «condición de forasteros» o equivalente. «Jejenes» puede mantenerse si se documenta la amplitud semántica; «multitud de ranas» y «vomitó» están bien alineados con el expediente inglés.'
