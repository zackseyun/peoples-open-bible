translation:
  language: es
  text: Porque te has olvidado del Dios de tu salvación, y no te has acordado de la Roca de tu refugio[c]; por tanto, plantas plantas deleitosas[a] y la plantas con una vid extranjera[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «plantíos selectos»; posiblemente una alusión a plantas cultivadas usadas en práctica religiosa extranjera.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «un sarmiento extraño» o «un brote ajeno».'
    reason: lexical_alternative
  - marker: c
    text: La imaginería agrícola puede implicar confianza en cultos o alianzas extranjeras en lugar de confiar en Dios, pero el hebreo no lo dice explícitamente.
    reason: cultural_note
lexical_decisions:
- source_word: שָׁכַחַתְּ
  english_pob_choice: have forgotten
  chosen_spanish: te has olvidado
  alternatives_spanish:
  - has olvidado
  - te olvidaste
  lexicon: HALOT
  rationale: El perfecto qal 2fs expresa una acción concluida con efecto vigente; en español, el perfecto compuesto ‘te has olvidado’ conserva bien esa fuerza causal en el contexto profético.
- source_word: אֱלֹהֵי יִשְׁעֵךְ
  english_pob_choice: the God of your salvation
  chosen_spanish: el Dios de tu salvación
  alternatives_spanish:
  - tu Dios salvador
  - el Dios que te salva
  lexicon: HALOT
  rationale: La cadena constructa se vierte de forma literal y transparente. ‘Salvación’ preserva el sustantivo יֵשַׁע sin añadir interpretación.
- source_word: צוּר
  english_pob_choice: Rock
  chosen_spanish: Roca
  alternatives_spanish:
  - Peña
  - Roca firme
  lexicon: HALOT
  rationale: ‘Roca’ mantiene la imagen bíblica estable de Dios como protección sólida, con naturalidad en español contemporáneo.
- source_word: מָעֻזֵּךְ
  english_pob_choice: your refuge
  chosen_spanish: tu refugio
  alternatives_spanish:
  - tu fortaleza
  - tu baluarte
  lexicon: HALOT
  rationale: El término denota un lugar o fuente de protección; ‘refugio’ funciona bien con ‘Roca’ y conserva el sentido de amparo sin militarizar la imagen.
- source_word: לֹא זָכָרְתְּ
  english_pob_choice: have not remembered
  chosen_spanish: no te has acordado
  alternatives_spanish:
  - no has recordado
  - no te acordaste
  lexicon: HALOT
  rationale: El paralelo con ‘te has olvidado’ pide una forma equivalente de memoria activa. ‘Acordarse’ suena natural y mantiene el contraste sin paráfrasis excesiva.
- source_word: עַל כֵּן
  english_pob_choice: therefore
  chosen_spanish: por tanto
  alternatives_spanish:
  - por eso
  - así que
  lexicon: HALOT
  rationale: Conector inferencial estándar que introduce la consecuencia del olvido de Dios.
- source_word: תִּטְּעִי
  english_pob_choice: you plant
  chosen_spanish: plantas
  alternatives_spanish:
  - plantarás
  - vas a plantar
  lexicon: HALOT
  rationale: El imperfecto 2fs puede leerse de forma presente profética o descriptiva; ‘plantas’ expresa con naturalidad la conducta consecuente en el español de registro bíblico.
- source_word: נִטְעֵי נַעֲמָנִים
  english_pob_choice: delightful plants
  chosen_spanish: plantíos deleitosos
  alternatives_spanish:
  - plantíos agradables
  - plantaciones encantadoras
  - plantas deleitables
  lexicon: HALOT
  rationale: נַעֲמָנִים comunica lo agradable, deleitoso o atractivo. ‘Plantíos deleitosos’ conserva el carácter poético y la ambigüedad sin forzar un referente cultual explícito en el texto principal.
- source_word: זְמֹרַת זָר
  english_pob_choice: a foreign vine
  chosen_spanish: una vid extranjera
  alternatives_spanish:
  - un sarmiento extranjero
  - un brote extraño
  - una cepa extranjera
  lexicon: HALOT
  rationale: זְמֹרָה designa una vara o sarmiento de vid; ‘vid extranjera’ comunica el campo agrícola de modo claro en español y preserva el valor de זָר como ‘extranjera’/‘ajena’.
- source_word: תִּזְרָעֶנּוּ
  english_pob_choice: set it with
  chosen_spanish: lo siembras con
  alternatives_spanish:
  - lo plantas con
  - lo estableces con
  lexicon: HALOT
  rationale: El verbo viene de זרע, ‘sembrar’. Aunque el inglés optó por ‘set it with’ para la imagen de plantar una vid, en español ‘lo siembras con’ conserva la raíz verbal y la construcción imagética del cultivo.
theological_decisions:
- issue: Si la imaginería agrícola debe explicitarse como idolátrica en el texto principal
  english_pob_reading: The agricultural imagery may imply reliance on foreign cults or alliances rather than on the LORD, but the Hebrew does not state this explicitly.
  chosen_spanish_reading: Se conserva la imaginería agrícola sin especificar en el texto principal un culto idolátrico; esa posibilidad queda sugerida por el contexto y una nota.
  alternative_spanish_readings:
  - plantas de culto
  - plantíos para ritos extranjeros
  - jardines idólatras
  rationale: El hebreo es elíptico y mantiene una imagen agrícola literal. Dado que el contexto sugiere, pero no formula explícitamente, la lectura cultual, conviene preservar la tensión teológica en vez de resolverla en el cuerpo del versículo.
  doctrine_reference: 'Translation philosophy §3: preservar la tensión teológica en lugar de resolverla.'
translation_notes:
  revision_awareness: La versión española sigue la revisión más reciente del inglés POB al mantener la estructura causal y el paralelismo de memoria/olvido, pero adapta ‘plantíos deleitosos’ y la imagen final para que el español suene natural sin perder la ambigüedad original.
  spanish_consistency_notes:
  - Se usa ‘Dios’ y no una sustitución litúrgica como ‘SEÑOR’, conforme al criterio base para אֱלֹהִים.
  - Se conserva ‘Roca’ como metáfora estable de protección divina.
  - Se mantiene ‘vid extranjera’/‘vid ajena’ en sentido agrícola, evitando una explicación interpretativa prematura en el texto principal.
  - Se emplea ‘te has olvidado’ y ‘no te has acordado’ para reflejar el paralelismo verbal del hebreo con buen español bíblico moderno.
