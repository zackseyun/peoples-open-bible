  text: And you[a], even by yourself, will let go of your inheritance that I gave you, and I will make you serve your enemies in a land that you have not known; for you have kindled a fire in my anger[d][c][b]; it will burn forever.
  footnotes:
  - marker: a
    text: Or 'you will release/let drop your inheritance'; the Hebrew verb carries the image of letting go or relinquishing.
    reason: lexical_alternative
  - marker: b
    text: The Hebrew shifts from singular ('you') to plural ('you all') in 'you have kindled,' likely moving from Judah personified to the people collectively.
    reason: alternative_reading
  - marker: c
    text: Or 'in my wrath.' Literally, 'in my nose/nostril,' a Hebrew idiom for anger.
    reason: lexical_alternative
  - marker: d
    text: Or 'for an age' / 'perpetually'; the Hebrew עוֹלָם can denote enduring or indefinite duration depending on context.
    reason: lexical_alternative
