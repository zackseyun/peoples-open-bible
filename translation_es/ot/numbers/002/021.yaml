translation:
  language: es
  text: 'y su división[a], los contados de entre ellos: treinta y dos mil doscientos.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «y su ejército» o «y su hueste»; el hebreo צָבָא aquí se refiere al contingente tribal dispuesto para el campamento y la marcha.
    reason: lexical_alternative
lexical_decisions:
- source_word: וּצְבָאוֹ
  english_pob_choice: and his division
  chosen_spanish: y su división
  alternatives_spanish:
  - y su ejército
  - y su hueste
  - y su compañía
  lexicon: HALOT
  rationale: En Números 2 el término צָבָא no describe necesariamente un ejército en combate, sino el contingente tribal ordenado para el campamento y la marcha. «División» conserva la idea organizativa y evita cargar el texto con una imagen bélica más fuerte de lo que el contexto exige.
- source_word: וּפְקֻדֵיהֶם
  english_pob_choice: those numbered from them
  chosen_spanish: los que fueron contados de ellos
  alternatives_spanish:
  - los contados de ellos
  - y los contados de ellos
  - los registrados de entre ellos
  lexicon: HALOT
  rationale: El sustantivo derivado de פקד se refiere a los miembros censados o pasados revista. «Los que fueron contados de ellos» conserva el matiz de un censo/muster sin introducir una lectura más técnica que el español común no exigiría aquí.
- source_word: שְׁנַיִם וּשְׁלֹשִׁים אֶלֶף וּמָאתָיִם
  english_pob_choice: thirty-two thousand two hundred
  chosen_spanish: treinta y dos mil doscientos
  alternatives_spanish:
  - dos y treinta mil y doscientos
  lexicon: HALOT
  rationale: Se mantiene el valor cardinal normal en español contemporáneo. El orden hebreo no se traslada de forma mecánica porque en español resultaría artificial y menos claro.
translation_notes:
  revision_awareness: El texto fuente y el audit trail inglés están en alto acuerdo; no se registraron revisiones aplicadas. La versión española sigue de cerca la decisión inglesa de leer צָבָא como una unidad tribal organizada, no como un ejército en sentido estrictamente bélico.
  spanish_consistency_notes:
  - Se conservó el sujeto posesivo implícito en «su división» para reflejar la referencia al grupo asociado al líder nombrado en el contexto inmediato.
  - «Los que fueron contados de ellos» mantiene la relación interna entre el conjunto y el total censado, equivalente al inglés auditado.
  - La cifra se normalizó al orden natural del español sin alterar el valor numérico.
