translation:
  language: es
  text: Y para el segundo lado del tabernáculo, en el lado norte, veinte marcos[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «tablas». El término hebreo puede referirse a las piezas estructurales verticales del tabernáculo.
    reason: lexical_alternative
lexical_decisions:
- source_word: וּ/לְ/צֶלַע
  english_pob_choice: And for the ... side
  chosen_spanish: Y para el ... lado
  alternatives_spanish:
  - Y en el ... lado
  - Y hacia el ... lado
  - Y para el ... flanco
  lexicon: HALOT
  rationale: La preposición y la conjunción introducen una nueva especificación arquitectónica. 'Lado' expresa con naturalidad צֶלַע en este contexto del tabernáculo; 'para el' conserva la fuerza funcional de la construcción hebrea mejor que una traducción meramente locativa.
- source_word: הַמִּשְׁכָּן
  english_pob_choice: the tabernacle
  chosen_spanish: el tabernáculo
  alternatives_spanish:
  - la morada
  - la tienda sagrada
  lexicon: HALOT
  rationale: En Éxodo, מִשְׁכָּן designa el santuario portátil. 'Tabernáculo' es el término técnico más reconocido y fiel para este contexto.
- source_word: הַשֵּׁנִית
  english_pob_choice: the second
  chosen_spanish: el segundo
  alternatives_spanish:
  - el otro
  lexicon: HALOT
  rationale: El adjetivo ordinal señala que se trata del segundo de los lados largos correspondientes; 'segundo' es más preciso que 'otro' y preserva la relación numérica del pasaje.
- source_word: לִפְאַת צָפוֹן
  english_pob_choice: on the north side
  chosen_spanish: hacia el lado norte
  alternatives_spanish:
  - en el lado norte
  - al norte
  - hacia el norte
  lexicon: HALOT
  rationale: La frase hebrea orienta la posición. 'Hacia el lado norte' mantiene el valor direccional de לִפְאַת y evita suavizarlo a una simple ubicación estática.
- source_word: עֶשְׂרִים
  english_pob_choice: twenty
  chosen_spanish: veinte
  lexicon: HALOT
  rationale: Número cardinal directo y sin ambigüedad.
- source_word: קָרֶשׁ
  english_pob_choice: frames
  chosen_spanish: marcos
  alternatives_spanish:
  - tablas
  - tablones
  - tableros
  lexicon: HALOT
  rationale: POB opta por 'frames' para reflejar la función estructural de קָרֶשׁ. En español, 'marcos' transmite mejor la idea de pieza estructural vertical que 'tablas', que suena más plana y menos técnica. Se conserva así la decisión funcional del audit trail sin imponer 'boards' como calco.
translation_notes:
  revision_awareness: 'El texto sigue de cerca el pasaje hebreo de Éxodo 26:20 y armoniza con la decisión auditada del POB en inglés: mantener la especificación arquitectónica del ''segundo lado'' del tabernáculo, orientado al norte, con el equivalente español de la pieza estructural como ''marcos''. No se introdujeron cambios doctrinales ni se amplió el sentido más allá de la evidencia textual.'
  spanish_consistency_notes:
  - Se mantuvo 'tabernáculo' como término técnico establecido para מִשְׁכָּן.
  - '''Marcos'' busca reproducir la función estructural de קָרֶשׁ sin perder la nota alternativa sobre ''tablas''.'
  - La preposición 'para' conserva el matiz de especificación constructiva presente en el hebreo.
  - La orientación se expresó con 'hacia el lado norte' para reflejar lִפְאַת צָפוֹן de manera natural en español.
