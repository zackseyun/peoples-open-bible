revisions:
- from: Si hay entre ustedes un hombre que no esté limpio[a] a causa de una emisión nocturna, saldrá fuera del campamento; no entrará en medio del campamento.
  to: Si hay entre ustedes un hombre que esté impuro[a] a causa de una emisión nocturna, saldrá afuera del campamento; no entrará en medio del campamento.
  rationale: 'La revisión hace dos ajustes menores sin cambiar el sentido: reemplaza «que no esté limpio» por «que esté impuro», que es la forma más natural y precisa en español para impureza ritual en este contexto, y mejora la fluidez de «saldrá fuera del campamento» a «saldrá afuera del campamento», conservando la idea explícita de salir al exterior del campamento. También se pule levemente la nota para que suene más natural en español.'
