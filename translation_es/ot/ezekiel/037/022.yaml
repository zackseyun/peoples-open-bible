    issue: «un solo pueblo» para לְגוֹי אֶחָד
    rationale: Aunque «pueblo» es posible en abstracto, el hebreo usa גוי y luego repite גוים en «dos naciones». En este contexto, la consistencia semántica y el paralelismo favorecen claramente «una sola nación».
  - severity: low
    issue: La última cláusula no refleja plenamente la repetición de עוֹד
    rationale: El hebreo repite עוֹד para enfatizar la cesación definitiva. «Ni estarán divididos en dos reinos» comunica el sentido básico, pero «y ya no estarán divididos en dos reinos» preserva mejor el ritmo y la fuerza de la promesa.
  - severity: low
    issue: Conector adversativo/final mejor como «y» que «ni»
    rationale: El hebreo coordina con waw más negación en una nueva cláusula. «Ni» no es incorrecto en español, pero «y ya no...» refleja más de cerca la estructura del original y del English POB.
