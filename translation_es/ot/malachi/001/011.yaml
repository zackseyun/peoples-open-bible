base_translation:
  language: en
  yaml_path: translation/ot/malachi/001/011.yaml
  text: For from the rising of the sun to its setting[a], my name is great among the nations, and in every place incense is offered, and a pure offering is brought, to my name; for my name is great among the nations[d][c][b], says Yahweh of hosts.
  footnotes:
  - marker: a
    text: Or 'from the east to the west'; literally, 'from the rising of the sun to its setting.'
    reason: lexical_alternative
  - marker: b
    text: Or 'among the Gentiles.'
    reason: lexical_alternative
  - marker: c
    text: The Hebrew may be read as describing present reality, a prophetic present, or future certainty; the translation preserves the Hebrew wording without resolving the timing.
    reason: alternative_reading
  - marker: d
    text: '''A pure offering'' translates Hebrew minchah, a term that can denote an offering generally, often a grain offering in sacrificial contexts.'
    reason: lexical_alternative
