translation:
  language: es
  text: 'Jacob les dijo: «Mis hermanos, ¿de dónde son ustedes?[a]». Ellos dijeron: «Somos de Harán».[b]'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, más literalmente: «¿de dónde son?»'
    reason: lexical_alternative
  - marker: b
    text: «Mis hermanos» es aquí un trato fraternal cortés, no necesariamente una afirmación de parentesco literal.
    reason: cultural_note
lexical_decisions:
- source_word: וַיֹּאמֶר
  english_pob_choice: said
  chosen_spanish: dijo
  alternatives_spanish:
  - preguntó
  lexicon: HALOT
  rationale: אָמַר es el verbo general de decir; en español, «dijo» mantiene el valor neutro de habla y deja que la pregunta siguiente exprese la forma interrogativa sin sobreinterpretar el verbo como «preguntó».
- source_word: לָהֶם
  english_pob_choice: to them
  chosen_spanish: les
  alternatives_spanish:
  - a ellos
  lexicon: HALOT
  rationale: El dativo pronominal de 3ª plural se expresa naturalmente en español con «les», que conserva la función indirecta de destinatarios del habla.
- source_word: יַעֲקֹב
  english_pob_choice: Jacob
  chosen_spanish: Jacob
  lexicon: convención onomástica
  rationale: Nombre propio mantenido en la forma habitual en español.
- source_word: אַחַי
  english_pob_choice: My brothers
  chosen_spanish: Mis hermanos
  alternatives_spanish:
  - Hermanos míos
  - Mis parientes
  lexicon: HALOT
  rationale: La forma hebrea es literalmente «mis hermanos». En este contexto de saludo cortés a varones desconocidos, «Mis hermanos» conserva el matiz fraternal y la cercanía social sin exigir parentesco literal.
- source_word: מֵאַיִן
  english_pob_choice: where are you from
  chosen_spanish: ¿de dónde son ustedes?
  alternatives_spanish:
  - ¿de dónde vienen?
  - ¿de dónde son?
  lexicon: HALOT
  rationale: La construcción hebrea pregunta por origen/procedencia. En español, «¿de dónde son ustedes?» es idiomático y reproduce el sentido de procedencia sin el calco «¿de dónde son ustedes de?».
- source_word: אַתֶּם
  english_pob_choice: you
  chosen_spanish: ustedes
  alternatives_spanish:
  - vosotros
  lexicon: HALOT
  rationale: El plural masculino se expresa de forma neutral latinoamericana con «ustedes».
- source_word: וַיֹּאמְרוּ
  english_pob_choice: They said
  chosen_spanish: respondieron
  alternatives_spanish:
  - dijeron
  lexicon: HALOT
  rationale: Aunque el verbo hebreo es el mismo verbo general de decir, el contexto inmediato muestra una contestación a la pregunta de Jacob; «respondieron» comunica mejor el valor discursivo sin alterar el contenido.
- source_word: מֵחָרָן
  english_pob_choice: from Haran
  chosen_spanish: de Harán
  alternatives_spanish:
  - desde Harán
  lexicon: HALOT
  rationale: La preposición hebrea marca procedencia; «de Harán» es la forma más natural y fiel en español.
- source_word: אֲנָחְנוּ
  english_pob_choice: We are
  chosen_spanish: Somos
  alternatives_spanish:
  - Nosotros somos
  - Somos nosotros
  lexicon: HALOT
  rationale: El pronombre independiente hebreo funciona como respuesta completa. En español, la cópula implícita en la respuesta se expresa naturalmente con «somos».
theological_decisions:
- issue: Tratamiento de «mis hermanos» como apelación cortés, no necesariamente literal
  english_pob_reading: “My brothers” is a courteous fraternal address here, not necessarily a claim of literal kinship.
  chosen_spanish_reading: «Mis hermanos» se entiende como un trato fraternal cortés.
  alternative_spanish_readings:
  - «Mis hermanos» como parentesco literal
  - «Hermanos míos» como apelación afectiva
  rationale: El texto no exige parentesco de sangre; la observación auditada en inglés subraya el uso social del vocativo. La traducción conserva la forma fraternal y evita cerrar el sentido a una relación biológica.
  doctrine_reference: Uso pragmático del vocativo en el texto narrativo, sin implicación doctrinal.
translation_notes:
  revision_awareness: Se corrigió el problema de validación anterior anclando ambos marcadores de nota en el texto español y manteniendo la distinción auditada entre la pregunta idiomática y el valor cortés de «mis hermanos».
  spanish_consistency_notes:
  - Se usa español neutral latinoamericano con «ustedes» y «les».
  - Se mantiene la toponimia bíblica estándar «Harán».
  - Se evita el calco «de dónde are ustedes» y se traduce la procedencia con una pregunta natural.
  - Los marcadores de nota [a] y [b] aparecen exactamente en el texto y corresponden a las notas registradas.
