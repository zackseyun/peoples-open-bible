translation:
  language: es
  text: Aun eso será llevado a Asiria como tributo para el rey Yareb[a]; Efraín recibirá vergüenza[b], e Israel se avergonzará de su consejo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «rey Yareb». El nombre también puede entenderse como un título, por ejemplo «el rey vengador» o «el rey contencioso».'
    reason: alternative_reading
  - marker: b
    text: 'O: «por su consejo» / «por su plan». El hebreo puede referirse al propio consejo o política de Israel.'
    reason: lexical_alternative
lexical_decisions:
- source_word: גַּם
  english_pob_choice: Even
  chosen_spanish: Incluso
  alternatives_spanish:
  - también
  - aun
  lexicon: HALOT
  rationale: La partícula inicial es enfática; «Incluso» conserva mejor el matiz de intensificación que un simple «también».
- source_word: אוֹתוֹ
  english_pob_choice: it
  chosen_spanish: él
  alternatives_spanish:
  - lo
  - eso
  lexicon: HALOT
  rationale: En el contexto inmediato el referente es el becerro/ídolo de Bet-avén; en español, aunque puede tratarse como objeto, «él» evita una discordancia con la personificación implícita del ídolo y mantiene la ambigüedad del referente sin forzar el género.
- source_word: לְאַשּׁוּר
  english_pob_choice: to Assyria
  chosen_spanish: a Asiria
  alternatives_spanish:
  - para Asiria
  lexicon: HALOT
  rationale: Con el pasivo de «llevar», la preposición marca destino; «a Asiria» es la construcción natural en español.
- source_word: יוּבָל
  english_pob_choice: will be carried
  chosen_spanish: será llevado
  alternatives_spanish:
  - será traído
  - será conducido
  lexicon: HALOT
  rationale: El hofal de יבל expresa ser llevado o transportado. «Será llevado» conserva bien el sentido pasivo y resulta natural en español.
- source_word: מִנְחָה
  english_pob_choice: as tribute
  chosen_spanish: como tributo
  alternatives_spanish:
  - como ofrenda
  - como regalo
  lexicon: HALOT
  rationale: En este marco político con Asiria y un rey, מִנְחָה señala tributo a un soberano superior, no ofrenda cultual.
- source_word: לְמֶלֶךְ יָרֵב
  english_pob_choice: for King Yareb
  chosen_spanish: para el rey Yareb
  alternatives_spanish:
  - para el rey contencioso
  - para el rey vengador
  - a Yareb, rey
  lexicon: HALOT
  rationale: Se conserva la forma transliterada «Yareb» porque el hebreo permite entenderlo como nombre o título. El español mantiene esa ambigüedad sin resolverla en el texto principal.
- source_word: בָּשְׁנָה
  english_pob_choice: will receive shame
  chosen_spanish: recibirá vergüenza
  alternatives_spanish:
  - tomará vergüenza
  - cargará vergüenza
  lexicon: HALOT
  rationale: Con לקח y un objeto abstracto, el idioma natural en español es «recibir vergüenza», que conserva la imagen de «tomar/recibir» una realidad humillante.
- source_word: יִקָּח
  english_pob_choice: will receive
  chosen_spanish: recibirá
  alternatives_spanish:
  - tomará
  lexicon: HALOT
  rationale: Para un complemento abstracto como «vergüenza», «recibirá» evita una literalidad áspera y preserva el valor del verbo.
- source_word: וְיֵבֹשׁ
  english_pob_choice: will be ashamed
  chosen_spanish: se avergonzará
  alternatives_spanish:
  - será avergonzado
  - quedará avergonzado
  lexicon: HALOT
  rationale: El qal de בוש puede ser reflexivo o pasivo. Aquí la forma española más natural y fiel al paralelo es «se avergonzará».
- source_word: מֵעֲצָתוֹ
  english_pob_choice: of its counsel
  chosen_spanish: de su consejo
  alternatives_spanish:
  - por su consejo
  - de su plan
  - por su plan
  lexicon: HALOT
  rationale: La preposición מן con בוש puede señalar causa o fuente. «De su consejo» conserva la construcción breve del hebreo y mantiene la posibilidad de referirlo corporativamente a Efraín/Israel o al becerro en el contexto inmediato.
theological_decisions:
- issue: Identidad y sentido de יָרֵב
  english_pob_reading: 'Treat as a proper royal designation and transliterate: ''King Yareb.'''
  chosen_spanish_reading: Mantener «rey Yareb» como designación transliterada en el texto principal.
  alternative_spanish_readings:
  - rey vengador
  - rey contencioso
  - rey grande
  rationale: El hebreo admite una lectura como nombre propio o como título descriptivo. Para no imponer una interpretación especulativa, el texto principal conserva la forma transliterada y deja las opciones semánticas para la nota.
  doctrine_reference: Translation philosophy §§2–3
translation_notes:
  revision_awareness: Se incorporó la revisión auditada que corrige el posesivo implícito del final para mantener un referente corporativo o contextual («su consejo») sin asumir un masculino personal innecesario. También se preservó la ambigüedad documentada de Yareb como nombre o título.
  spanish_consistency_notes:
  - Se usó «Asiria» como nombre propio sin artículo, en coherencia con el uso habitual en español bíblico.
  - Se prefirió «vergüenza» / «se avergonzará» para mantener el paralelismo semántico entre el sustantivo y el verbo en la segunda mitad del versículo.
  - Se evitó «SEÑOR» u otra sustitución para el nombre divino porque este versículo no contiene el Tetragrámaton.
