translation:
  language: es
  text: Y el primer día tomarán para ustedes el fruto de árboles majestuosos[a], ramas de palmeras, ramas de árboles frondosos y sauces del arroyo, y se alegrarán delante de Yahvé su Dios por siete días.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O posiblemente, según la tradición judía posterior, «fruto de cidro» (etrog). El hebreo habla literalmente del «fruto de árboles espléndidos/majestuosos».
    reason: alternative_reading
lexical_decisions:
- source_word: וּלְקַחְתֶּם לָכֶם
  english_pob_choice: you shall take for yourselves
  chosen_spanish: tomarán para ustedes
  alternatives_spanish:
  - tomarán para sí
  - deberán tomar para ustedes
  lexicon: HALOT
  rationale: La forma verbal tiene fuerza directiva en contexto legal/instruccional. «Tomarán» preserva el mandato sin sobrecargarlo, y «para ustedes» conserva לָכֶם con naturalidad en español.
- source_word: בַּיּוֹם הָרִאשׁוֹן
  english_pob_choice: on the first day
  chosen_spanish: en el primer día
  alternatives_spanish:
  - el primer día
  - en el día primero
  lexicon: HALOT
  rationale: Es una frase temporal directa. Se mantiene literalidad suficiente sin añadir «de la fiesta», que no está expresado en este versículo.
- source_word: פְּרִי עֵץ הָדָר
  english_pob_choice: the fruit of majestic trees
  chosen_spanish: el fruto de árboles majestuosos
  alternatives_spanish:
  - el fruto de árboles hermosos
  - el fruto de árboles espléndidos
  - fruto de árbol de cidro
  lexicon: HALOT
  rationale: El hebreo habla literalmente del «fruto de árbol de esplendor/majestad». «Árboles majestuosos» conserva el campo semántico de הָדָר sin importar en el texto principal la identificación ritual posterior con el etrog/cidro.
- source_word: כַּפֹּת תְּמָרִים
  english_pob_choice: branches of palm trees
  chosen_spanish: ramas de palmeras
  alternatives_spanish:
  - ramas de palmas
  - frondas de palmera
  lexicon: HALOT
  rationale: La expresión designa follaje de palmera. «Ramas de palmeras» es claro, natural y suficientemente cercano al hebreo.
- source_word: וַעֲנַף עֵץ עָבֹת
  english_pob_choice: boughs of leafy trees
  chosen_spanish: ramas de árboles frondosos
  alternatives_spanish:
  - ramas de árboles espesos
  - ramas de árboles de follaje denso
  lexicon: HALOT
  rationale: עָבֹת sugiere densidad o espesura de follaje. «Frondosos» comunica bien ese sentido en español, sin la aspereza de una calca como «árboles gruesos».
- source_word: וְעַרְבֵי נָחַל
  english_pob_choice: willows of the brook
  chosen_spanish: sauces del arroyo
  alternatives_spanish:
  - sauces del torrente
  - sauces del riachuelo
  - sauces del valle
  lexicon: HALOT
  rationale: עַרְבֵי se refiere a sauces o árboles afines, y נָחַל puede aludir a un cauce o arroyo estacional. «Del arroyo» reproduce la imagen de forma clara y recibible en español.
- source_word: וּשְׂמַחְתֶּם
  english_pob_choice: you shall rejoice
  chosen_spanish: se alegrarán
  alternatives_spanish:
  - se gozarán
  - se regocijarán
  lexicon: HALOT
  rationale: El verbo expresa alegría/rejocijo. «Se alegrarán» es idiomático y mantiene el valor exhortativo sin sonar arcaico.
- source_word: לִפְנֵי יְהוָה אֱלֹהֵיכֶם
  english_pob_choice: before Yahweh your God
  chosen_spanish: delante de Yahvé su Dios
  alternatives_spanish:
  - en presencia de Yahvé su Dios
  - ante Yahvé su Dios
  lexicon: HALOT
  rationale: 'Se conserva el nombre divino según la terminología del proyecto: יְהוָה → Yahvé. «Delante de» refleja לִפְנֵי como presencia personal/cultual, y «su Dios» mantiene el sufijo plural.'
- source_word: שִׁבְעַת יָמִים
  english_pob_choice: for seven days
  chosen_spanish: por siete días
  alternatives_spanish:
  - durante siete días
  - siete días
  lexicon: HALOT
  rationale: En español, la duración se expresa naturalmente con «por» o «durante». «Por siete días» comunica la extensión temporal sin añadir elementos ajenos.
theological_decisions:
- issue: Nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - Jehová
  rationale: El texto hebreo contiene el Tetragrámaton. Siguiendo el estándar del proyecto en español, se traduce por «Yahvé» para preservar el nombre de pacto sin la convención de máscara litúrgica «SEÑOR».
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Identificación de פְּרִי עֵץ הָדָר
  english_pob_reading: generic 'the fruit of majestic trees' with a footnote for citron fruit (etrog)
  chosen_spanish_reading: «el fruto de árboles majestuosos» con nota sobre la posible identificación tradicional con el cidro/etrog
  alternative_spanish_readings:
  - «fruto de cidro»
  - «fruto del árbol de cidro»
  - «fruto de árboles hermosos»
  rationale: El hebreo es más general que la identificación posterior tradicional. La traducción principal conserva el sentido léxico abierto, y la nota permite registrar la tradición del etrog sin convertirla en lectura obligatoria del versículo.
  doctrine_reference: DOCTRINE.md Translation philosophy §1, §3
translation_notes:
  revision_awareness: La redacción sigue la revisión más reciente del inglés POB, que prefirió «majestic trees» sobre «splendid trees» por mayor naturalidad y adecuación formal. También conserva la decisión revisada de no introducir «citron fruit» en el cuerpo principal, sino solo en nota.
  spanish_consistency_notes:
  - Se usa «Yahvé» de manera consistente para יְהוָה conforme a la pauta del proyecto.
  - Se evita «Cristo» y otras fórmulas ajenas al versículo.
  - «Tomarán» mantiene fuerza normativa sin sobretraducción.
  - «Arbores majestuosos» se ha vertido con un adjetivo que preserve el matiz de esplendor/majestad y permita la nota sobre la tradición del etrog.
  - La sintaxis busca ser publicable y bíblica sin calcar innecesariamente el orden del hebreo.
