  glossary_alignment: No hay conflictos con la terminología base del proyecto en este versículo. Se preserva 'Isaac' frente a una simplificación interpretativa a 'Israel'. No aparecen términos sensibles como Yahvé/Mesías/esclavo. Las decisiones léxicas concuerdan con el POB inglés y con la evidencia hebrea.
