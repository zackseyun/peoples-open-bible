  glossary_alignment: No hay conflicto con la terminología troncal del proyecto. La decisión sobre הֲמוֹנָהּ debe seguir reflejando la personificación femenina; en español esto puede hacerse con «su multitud» apoyado por nota, aunque el femenino no sea visible en el posesivo. Las notas deben conservar la alternativa «su riqueza» y la explicación de la personificación.
