revisions:
- from: Ahora, el resto de los hechos de Pekaj[a], y todo lo que hizo—miren, están escritos en el Libro de las Crónicas de los reyes de Israel.
  to: Ahora el resto de los hechos de Pécaj[a], y todo lo que hizo—he aquí, están escritos en el Libro de las Crónicas de los reyes de Israel.
  rationale: Se ajusta הִנָּם a ‘he aquí’ para preservar el tono formular y evitar el imperativo poco natural ‘miren’. Se cambia ‘Pekaj’ por ‘Pécaj’ para una transliteración más legible y reconocible en español bíblico. Se suaviza la puntuación inicial para mejorar la naturalidad sin alterar el sentido.
  reviewer_model: gpt-5.4
