review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien la estructura básica del hebreo: ubicación en el candelabro, cuatro copas, diseño de flor de almendro, y los elementos ornamentales finales. Sin embargo, la secuencia española actual queda algo trabada por la puntuación y por la aposición final, y "botones" no refleja tan bien como "brotes" o "capullos" la decisión auditada de buds dentro de la imaginería floral.'
  spanish_quality_summary: El texto es comprensible, pero "cuatro copas, en forma de flores de almendro, sus botones y sus flores" suena poco natural en español y puede leerse como una lista mal ensamblada. Una leve recast con dos puntos o sin coma interna mejora mucho la legibilidad. "Brotes" encaja mejor que "botones" en registro bíblico moderno y en la imagen vegetal.
  glossary_alignment: No hay conflictos con la terminología troncal del proyecto. "Candelabro" para מְנֹרָה es aceptable en este contexto. La nota alternativa debe ajustarse para reflejar mejor la alternativa inglesa "almond-shaped cups" y "knobs/blossoms" sin introducir una formulación menos natural.
  issues:
  - severity: medium
    issue: La construcción española de la frase final es torpe
    rationale: 'El hebreo presenta una aposición simple, pero en español la puntuación actual produce una serie poco fluida: "cuatro copas, en forma de flores de almendro, sus botones y sus flores".'
  - severity: medium
    issue: '"Botones" es menos fiel a la imaginería floral que la decisión auditada'
    rationale: El inglés POB escogió "buds" para כפתור a fin de mantener la imagen de almendros en flor. En español, "brotes" o "capullos" comunica mejor esa relación que "botones", que puede sonar más mecánico o ambiguo.
  - severity: low
    issue: La nota al pie puede afinarse
    rationale: '"Copas de almendro" suena más elíptico y menos claro que "copas en forma de almendra" o "copas con forma de almendra"; además conviene conservar "brotes"/"flores" en el texto principal y dejar "nudos" como alternativa.'
  revised_spanish_text: 'Y en el candelabro había cuatro copas en forma de flores de almendro[a]: sus brotes y sus flores.'
  revised_footnotes:
  - marker: a
    text: 'También puede entenderse: «cuatro copas en forma de almendra, sus nudos y sus flores» o «cuatro copas en forma de almendra, sus nudos y sus flores».'
    reason: lexical_alternative
