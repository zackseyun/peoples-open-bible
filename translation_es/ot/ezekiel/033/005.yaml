translation:
  language: es
  text: Oyó el sonido de la trompeta y no hizo caso de la advertencia; su sangre estará sobre él mismo[a]. Pero si hace caso de la advertencia[b], salvará su vida.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, ‘su sangre estará sobre él’ — un modismo hebreo que indica que él mismo carga con la responsabilidad de su propia muerte.
    reason: lexical_alternative
  - marker: b
    text: O, ‘librará su alma/ser’. Aquí ‘vida’ encaja mejor con el contexto de escapar de la muerte.
    reason: lexical_alternative
lexical_decisions:
- source_word: ק֨וֹל הַשּׁוֹפָר
  english_pob_choice: the sound of the trumpet
  chosen_spanish: el sonido del cuerno de alarma
  alternatives_spanish:
  - el sonido de la trompeta
  - el sonido del cuerno
  - el toque del cuerno de alarma
  lexicon: HALOT
  rationale: קוֹל es 'sonido/voz' y שׁוֹפָר es un cuerno usado como señal de aviso. En español, 'cuerno de alarma' comunica mejor la función de advertencia del contexto de vigilante que 'trompeta', sin perder la imagen del instrumento.
- source_word: שָׁמַע
  english_pob_choice: heard
  chosen_spanish: oyó
  alternatives_spanish:
  - escuchó
  - oyó el sonido
  lexicon: HALOT
  rationale: El verbo aquí indica recepción auditiva del aviso. 'Oyó' es directo, natural y fiel al sentido contextual.
- source_word: נִזְהָר
  english_pob_choice: take warning
  chosen_spanish: tomó advertencia
  alternatives_spanish:
  - se dejó advertir
  - se puso en guardia
  - tomó la advertencia
  lexicon: HALOT
  rationale: El nifal de זהר en este contexto expresa ser advertido o tomar precaución. 'Tomó advertencia' conserva la responsabilidad personal y permite repetir la misma idea en ambas cláusulas del versículo.
- source_word: דָּמ֖וֹ בּ֣וֹ יִהְיֶה
  english_pob_choice: his blood will be on himself
  chosen_spanish: su sangre caerá sobre él
  alternatives_spanish:
  - su sangre estará sobre él
  - él cargará con su sangre
  - su sangre recaerá sobre él
  lexicon: HALOT
  rationale: El hebreo usa un modismo jurídico-moral de responsabilidad por la propia muerte. 'Caerá sobre él' transmite esa carga idiomática en español sin desactivar la metáfora ni convertirla en paráfrasis explicativa.
- source_word: נַפְשׁוֹ
  english_pob_choice: his life
  chosen_spanish: su vida
  alternatives_spanish:
  - su alma
  - su ser
  - él mismo
  lexicon: HALOT
  rationale: נֶפֶשׁ puede significar vida, alma o persona. Aquí el contraste es con la muerte inminente, por lo que 'su vida' es la equivalencia más clara y contextual.
- source_word: מִלֵּט
  english_pob_choice: will save
  chosen_spanish: salvará
  alternatives_spanish:
  - librará
  - rescatará
  - lo librará
  lexicon: HALOT
  rationale: El piel expresa causar escape o liberación. 'Salvará' es natural en español y mantiene el sentido de preservación de la vida.
- source_word: וְה֥וּא
  english_pob_choice: But if he
  chosen_spanish: Pero si
  alternatives_spanish:
  - Y si
  - Pero él
  lexicon: HALOT
  rationale: Aunque literalmente es una simple conjunción con pronombre, el contraste con la cláusula anterior es claro. 'Pero si' hace explícita la oposición natural del hebreo sin añadir contenido nuevo.
theological_decisions:
- issue: Modismo de responsabilidad por la sangre / juicio personal
  english_pob_reading: his blood will be upon himself
  chosen_spanish_reading: su sangre caerá sobre él
  alternative_spanish_readings:
  - su sangre estará sobre él
  - él será responsable de su muerte
  - su sangre recaerá sobre él
  rationale: El hebreo comunica responsabilidad personal por rechazar la advertencia. Mantener una formulación idiomática en español preserva la fuerza judicial y ética del texto, evitando reducirlo a una explicación abstracta.
  doctrine_reference: Responsabilidad humana y juicio justo; preservar tensión textual sin suavizar el modismo hebreo.
translation_notes:
  revision_awareness: 'La redacción española sigue la última revisión inglesa en tono más formal y conserva la estructura contrastiva del versículo: oído del aviso, falta de advertencia, juicio de responsabilidad, y respuesta obediente que conduce a la preservación de la vida.'
  spanish_consistency_notes:
  - Se usa 'Yahvé' solo cuando aparezca el Tetragrámaton; aquí no aplica.
  - Se mantiene 'vida' para נֶפֶשׁ por el contexto inmediato de muerte/escape.
  - '''Cuerno de alarma'' evita confusión con trompeta litúrgica y refleja la función del שׁוֹפָר en el pasaje.'
  - '''Tomó advertencia'' conserva la repetición del verbo y su carga de responsabilidad personal en ambas mitades del versículo.'
