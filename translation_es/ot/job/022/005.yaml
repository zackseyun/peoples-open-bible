- from: ¿No es grande tu maldad[a], y no tiene fin tu iniquidad[b]?
  to: ¿No es mucha tu maldad[a], y no hay fin para tus iniquidades[b]?
  rationale: La revisión conserva la acusación moral del hebreo, refleja mejor רַבָּה con 'mucha', y restituye el plural 'tus iniquidades' para mantener la fuerza acumulativa de עוונותיך. También simplifica la sintaxis española y alinea mejor las notas con el texto revisado y con el rastro léxico del POB.
