translation:
  language: es
  text: Mira[a], estos son los bordes[b] de sus caminos, y apenas un susurro[c] oímos de él. Pero el trueno de su poder, ¿quién puede comprenderlo?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «He aquí»; la partícula hebrea introduce una llamada enfática a prestar atención.
    reason: alternative_reading
  - marker: b
    text: O «los extremos» o «las afueras»; el hebreo sugiere solo las zonas más externas de sus caminos.
    reason: lexical_alternative
  - marker: c
    text: O «qué leve indicio oímos de él»; la expresión hebrea es rara y enfatiza cuán poco se percibe de él en contraste con el «trueno» de su poder.
    reason: lexical_alternative
lexical_decisions:
- source_word: הֶן
  english_pob_choice: Look
  chosen_spanish: ¡Mira!
  alternatives_spanish:
  - Mira
  - Mira, pues
  - He aquí
  lexicon: HALOT
  rationale: La partícula introductoria exige atención enfática. «¡Mira!» comunica de modo natural el llamado deíctico sin sonar arcaico, y conserva la fuerza retórica del hebreo.
- source_word: קְצוֹת
  english_pob_choice: the fringes
  chosen_spanish: las orillas
  alternatives_spanish:
  - los extremos
  - los bordes
  - las extremidades
  lexicon: HALOT
  rationale: El sustantivo alude a los límites exteriores o extremos. «Las orillas» funciona en español como imagen de borde marginal y expresa bien que solo se ve la periferia de sus caminos.
- source_word: דְּרָכָיו
  english_pob_choice: his ways
  chosen_spanish: sus caminos
  alternatives_spanish:
  - sus sendas
  - sus obras
  - su proceder
  lexicon: HALOT
  rationale: «Caminos» es la correspondencia más directa y común para la metáfora hebrea de דרכים, manteniendo la imagen del modo de obrar de Dios sin convertirla en una explicación abstracta.
- source_word: שֵּׁמֶץ
  english_pob_choice: a mere whisper
  chosen_spanish: un leve murmullo
  alternatives_spanish:
  - un susurro tenue
  - un mínimo indicio
  - una leve señal
  lexicon: HALOT
  rationale: La expresión es rara y sugiere pequeñez extrema con un matiz auditivo. «Un leve murmullo» conserva la idea de sonido apenas perceptible y encaja con el contraste con «trueno».
- source_word: נִשְׁמַע בּוֹ
  english_pob_choice: we hear of him
  chosen_spanish: oímos de él
  alternatives_spanish:
  - oímos acerca de él
  - se oye de él
  - lo percibimos apenas
  lexicon: HALOT
  rationale: 'La construcción se entiende de manera colectiva e impersonal: la humanidad apenas capta algo respecto de Dios. «Oímos de él» reproduce esa limitación sin cargar el verso con una paráfrasis explicativa.'
- source_word: רַעַם
  english_pob_choice: the thunder
  chosen_spanish: el trueno
  alternatives_spanish:
  - el estruendo
  - el rugido
  - el fragor
  lexicon: HALOT
  rationale: «Trueno» preserva el contraste poético con el «leve murmullo» y refleja el valor normal del término en este contexto.
- source_word: גְּבוּרָתוֹ
  english_pob_choice: his power
  chosen_spanish: su poder
  alternatives_spanish:
  - su fuerza
  - su gran poder
  - su potencia
  lexicon: HALOT
  rationale: El sustantivo expresa fuerza, poder o vigor. «Poder» es breve, natural y mantiene el paralelismo con el trueno como imagen de fuerza abrumadora.
- source_word: יִתְבּוֹנָן
  english_pob_choice: can understand
  chosen_spanish: puede comprender
  alternatives_spanish:
  - puede entender
  - puede discernir
  - puede captar plenamente
  lexicon: HALOT
  rationale: El verbo implica comprensión atenta y discernimiento. «Comprender» transmite bien la pregunta retórica sobre la incapacidad humana de abarcar plenamente el poder divino.
theological_decisions:
- issue: Límite del conocimiento humano de Dios en la poesía
  english_pob_reading: What humans perceive of God's ways is only a minimal outer edge, not the totality of his being or action.
  chosen_spanish_reading: Lo que se percibe de los caminos de Dios es solo la periferia más externa; el texto no pretende agotar su ser ni sus obras.
  alternative_spanish_readings:
  - La frase podría entenderse solo de sus obras en la creación.
  - Podría leerse como una observación sobre la revelación parcial, sin extenderla más allá del contexto inmediato.
  rationale: El paralelismo entre «orillas» y «trueno» mantiene la tensión poética entre lo poco que se oye y la grandeza incomprensible de Dios. La traducción evita resolver la imagen en una explicación filosófica o doctrinal más amplia de la que el verso exige.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: El audit trail inglés revisó la redacción para evitar añadir una glosa innecesaria equivalente a «of a word». En español se siguió ese ajuste, dejando solo «un leve murmullo» y no una expansión como «de una palabra», para no sobrecargar el hebreo raro שֵּׁמֶץ דָּבָר.
  spanish_consistency_notes:
  - Se usó «Dios» implícito por el pronombre «él», coherente con el contexto de Job y con el uso reverente del texto.
  - Se mantuvo el contraste auditivo «murmullo / trueno» para preservar la poética del verso.
  - «Comprender» se eligió como equivalente amplio y culto, evitando una paráfrasis que debilitara la pregunta retórica.
