  to: Y la responsabilidad[a] de los hijos de Gersón en la tienda de reunión era el tabernáculo, la tienda, su cubierta, y la cortina[b] de la entrada de la tienda de reunión.
  rationale: Se corrige la distinción clave entre אֹהֶל מוֹעֵד («tienda de reunión») y מִשְׁכָּן («tabernáculo»), se reubica la nota [a] al término que realmente explica (מִשְׁמֶרֶת), y se mejora la naturalidad con «cubierta». Se mantiene «cortina» como opción española legible para מָסַךְ, preservando alternativas en nota.
