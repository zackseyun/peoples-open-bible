  text: יַ֗עַן אֲשֶׁ֤ר לֹֽא זכרתי אֶת יְמֵ֣י נְעוּרַ֔יִ/ךְ וַ/תִּרְגְּזִי לִ֖/י בְּ/כָל אֵ֑לֶּה וְ/גַם אֲנִ֨י הֵ֜א דַּרְכֵּ֣/ךְ בְּ/רֹ֣אשׁ נָתַ֗תִּי נְאֻם֙ אֲדֹנָ֣/י יְהוִ֔ה וְ/לֹ֤א עשיתי אֶת הַ/זִּמָּ֔ה עַ֖ל כָּל תּוֹעֲבֹתָֽיִ/ךְ־־־־־׀־־׃
base_translation:
  language: en
  yaml_path: translation/ot/ezekiel/016/043.yaml
  text: Because you did not remember the days of your youth[a], but enraged me with all these things, I also have put your way on your head, declares the Lord GOD; have you not committed lewdness in addition to all your abominations?
  footnotes:
