translation:
  language: es
  text: 'Entonces los hombres de Israel dijeron a Gedeón[a]: «Gobierna sobre nosotros: tú, tu hijo y tu nieto también, porque nos has salvado de la mano de Madián».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «tú, tu hijo y también el hijo de tu hijo». El hebreo nombra explícitamente generaciones sucesivas.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמְרוּ
  english_pob_choice: Then ... said
  chosen_spanish: Entonces ... dijeron
  alternatives_spanish:
  - Y ... dijeron
  lexicon: HALOT
  rationale: El waw consecutivo avanza la narración. “Entonces” conserva el valor secuencial de modo natural en español y evita un enlace demasiado débil con “y”. El plural verbal se refleja con “dijeron”.
- source_word: אִישׁ יִשְׂרָאֵל
  english_pob_choice: the men of Israel
  chosen_spanish: los hombres de Israel
  alternatives_spanish:
  - los israelitas
  - el hombre de Israel
  lexicon: HALOT
  rationale: Aunque אִישׁ está en singular formal, la construcción funciona colectivamente con el verbo plural. “Los hombres de Israel” preserva mejor la fuerza colectiva y el matiz masculino del hebreo que el más general “los israelitas”.
- source_word: מְשָׁל בָּנוּ
  english_pob_choice: Rule over us
  chosen_spanish: Gobierna sobre nosotros
  alternatives_spanish:
  - Rige sobre nosotros
  - Domina sobre nosotros
  lexicon: HALOT
  rationale: El imperativo de משל aquí pide autoridad política o dominio. “Gobierna sobre nosotros” es idiomático en español y mantiene esa fuerza sin suavizarla en mera dirección o liderazgo.
- source_word: גַּם אַתָּה גַּם בִּנְךָ גַּם בֶּן בְּנֶךָ
  english_pob_choice: you, your son, and your grandson as well
  chosen_spanish: tú, tu hijo y también el hijo de tu hijo
  alternatives_spanish:
  - tú, tu hijo y tu nieto también
  - tú, tu hijo y el hijo de tu hijo asimismo
  lexicon: HALOT
  rationale: El hebreo nombra explícitamente generaciones sucesivas. Se conserva esa formulación para no borrar la progresión dinástica; “el hijo de tu hijo” refleja el original con transparencia, mientras “nieto” sería una equivalencia válida pero menos literal.
- source_word: כִּי
  english_pob_choice: for
  chosen_spanish: porque
  alternatives_spanish:
  - pues
  - ya que
  lexicon: HALOT
  rationale: Introduce la razón de la petición. “Porque” expresa con claridad la relación causal en español actual.
- source_word: הוֹשַׁעְתָּנוּ
  english_pob_choice: you have saved us
  chosen_spanish: nos has salvado
  alternatives_spanish:
  - nos has librado
  - nos has rescatado
  lexicon: HALOT
  rationale: La raíz ישׁע puede implicar salvar, librar o rescatar. “Nos has salvado” conserva la conexión léxica con el campo bíblico de salvación, como en la decisión inglesa, sin exagerar el alcance teológico en este contexto militar.
- source_word: מִיַּד מִדְיָן
  english_pob_choice: from the hand of Midian
  chosen_spanish: de la mano de Madián
  alternatives_spanish:
  - del poder de Madián
  - de Madián
  lexicon: HALOT
  rationale: Se conserva el hebraísmo “mano” para mantener el color bíblico y la imagen de poder/control. “Madián” sigue la forma española del nombre propio.
theological_decisions:
- issue: Alcance de la petición a Gedeón
  english_pob_reading: 'Render the request as dynastic political rule: ''Rule over us—you, your son, and your grandson as well.'''
  chosen_spanish_reading: 'La petición se entiende como gobierno político y dinástico: “Gobierna sobre nosotros: tú, tu hijo y también el hijo de tu hijo.”'
  alternative_spanish_readings:
  - Una petición más general de liderazgo sin énfasis dinástico
  - Una solicitud de autoridad temporal solo para Gedeón
  rationale: El imperativo de משל, unido a la fórmula explícita de sucesión (“tú... tu hijo... el hijo de tu hijo”), señala un pedido de dominio continuado y hereditario, no solo de dirección militar momentánea. La traducción mantiene esa implicación sin introducir vocabulario de monarquía que el hebreo no usa aquí.
  doctrine_reference: Translation philosophy §§1, 3, 5
translation_notes:
  revision_awareness: La revisión inglesa más reciente no introdujo cambios; el inglés POB y el control cruzado muestran alto acuerdo, así que la versión española sigue de cerca las decisiones léxicas y teológicas ya auditadas sin necesidad de reajustes textuales.
  spanish_consistency_notes:
  - Se conserva el tono narrativo sobrio y directo, apto para publicación.
  - Se mantiene el hebraísmo “mano de Madián” por fidelidad al original y coherencia con el estilo POB.
  - Se evita “SEÑOR” porque en este versículo no aparece el nombre divino.
  - Se usa “Madián” con la forma española habitual del topónimo bíblico.
  - La secuencia generacional se expresa de manera transparente para preservar la tensión dinástica del pasaje.
