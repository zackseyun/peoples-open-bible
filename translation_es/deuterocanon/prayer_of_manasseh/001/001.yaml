  source_alignment_summary: 'El borrador refleja bien la invocación griega: «Κύριε παντοκράτωρ» como apelación divina, la fórmula pactal «Dios de nuestros padres», la triada «Abraham, Isaac y Jacob», y σπέρμα como linaje/descendencia. Sin embargo, «su descendencia» debilita la referencia plural explícita de αὐτῶν («de ellos/de ellos tres»), y los signos de exclamación no corresponden al tono ni a la sintaxis del original.'
  spanish_quality_summary: 'El español es claro y eclesialmente legible, pero puede mejorarse para sonar más natural y más fiel al griego: conviene quitar las exclamaciones enfáticas y ajustar «su descendencia» a «la descendencia de ellos» para evitar ambigüedad singular en español. La puntuación con comas funciona bien.'
  glossary_alignment: 'La terminología principal está bien alineada con el proyecto: κύριος como «Señor», παντοκράτωρ como «Todopoderoso», θεός como «Dios», y τῶν πατέρων ἡμῶν como «nuestros padres». La decisión «descendencia» para σπέρμα es adecuada, manteniendo nota alternativa «simiente». No hay conflicto con la política de «Yahvé», ya que aquí el griego dice κύριε como tratamiento divino y no aparece el Tetragrámaton en la fuente dada.'
  issues:
  - severity: medium
    issue: «su descendencia» no refleja con suficiente precisión el plural de αὐτῶν
    rationale: En español, «su» puede leerse como singular o plural, y aquí el antecedente inmediato es la serie plural «Abraham, Isaac y Jacob». «La descendencia de ellos» o equivalente preserva mejor la referencia plural explícita del griego.
  - severity: medium
    issue: Los signos de exclamación inicial y final no están motivados por la fuente
    rationale: El griego presenta una invocación solemne, no una exclamación marcada. En español bíblico moderno, la frase funciona mejor sin exclamaciones añadidas.
  - severity: low
    issue: La nota léxica sobre παντοκράτωρ añade matiz no presente en la nota inglesa auditada
    rationale: La alternativa «Soberano de todo» es válida, pero la explicación extensa sobre poder absoluto y gobierno universal va más allá del rastro inglés. Conviene simplificarla para mantenerse más cerca del audit trail.
  revised_spanish_text: Señor Todopoderoso[a], Dios de nuestros padres, de Abraham, Isaac y Jacob, y de la descendencia[b] justa de ellos,
