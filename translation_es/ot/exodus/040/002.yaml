translation:
  language: es
  text: El primer día del primer mes[a], erigirás el tabernáculo, la tienda de reunión.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, de manera más formal, «el tabernáculo de la tienda de reunión». El hebreo une dos términos del santuario que pueden entenderse en aposición o como una expresión más compacta de relación estrecha.
    reason: alternative_reading
lexical_decisions:
- source_word: בְּ/יוֹם
  english_pob_choice: On the ... day
  chosen_spanish: El día ...
  alternatives_spanish:
  - En el día ...
  - A ...
  lexicon: HALOT
  rationale: El hebreo marca tiempo con ב + יוֹם; en español, «El día ...» expresa de manera natural la fecha sin perder el valor temporal.
- source_word: הַ/חֹדֶשׁ הָ/רִאשׁוֹן
  english_pob_choice: the first month
  chosen_spanish: del primer mes
  alternatives_spanish:
  - del mes primero
  - del primer nuevo mes
  lexicon: HALOT
  rationale: En contexto calendárico, חֹדֶשׁ significa «mes», y הָרִאשׁוֹן indica orden. «Primer mes» conserva ese sentido de forma clara y sobria.
- source_word: בְּ/אֶחָד לַ/חֹדֶשׁ
  english_pob_choice: on the first day of the month
  chosen_spanish: el día primero
  alternatives_spanish:
  - el primer día del mes
  - en el día uno del mes
  lexicon: HALOT
  rationale: La fórmula hebrea es idiomática para «el primer día del mes». En español, «el día primero» mantiene la fecha sin forzar un calco.
- source_word: תָּקִים
  english_pob_choice: you shall set up
  chosen_spanish: pondrás en pie
  alternatives_spanish:
  - levantarás
  - erigirás
  - montarás
  lexicon: HALOT
  rationale: El hifil de קום significa hacer que algo quede en pie. «Pondrás en pie» conserva la imagen de erección/puesta en posición vertical con un español natural.
- source_word: מִשְׁכַּן
  english_pob_choice: tabernacle
  chosen_spanish: el tabernáculo
  alternatives_spanish:
  - la morada
  - el santuario portátil
  lexicon: HALOT
  rationale: מִשְׁכָּן es el término técnico del santuario portátil en Éxodo; «tabernáculo» es el equivalente castellano más establecido y preciso.
- source_word: אֹהֶל מוֹעֵד
  english_pob_choice: the tent of meeting
  chosen_spanish: la tienda de reunión
  alternatives_spanish:
  - la tienda del encuentro
  - la tienda de cita
  lexicon: HALOT
  rationale: Para אֹהֶל מוֹעֵד, «tienda de reunión» comunica el uso cultual del lugar. «Reunión» es más natural en español bíblico actual que un calco más rígido.
theological_decisions:
- issue: Relación entre מִשְׁכַּן y אֹהֶל מוֹעֵד
  english_pob_reading: 'Appositional: ''the tabernacle, the tent of meeting'''
  chosen_spanish_reading: 'Apposicional: «el tabernáculo, la tienda de reunión»'
  alternative_spanish_readings:
  - «el tabernáculo de la tienda de reunión»
  - «la tienda de reunión, es decir, el tabernáculo»
  rationale: El hebreo yuxtapone dos designaciones del mismo santuario sin preposición explícita. La apposición en español evita sugerir dos estructuras distintas y preserva la tensión documental del original.
  doctrine_reference: Ex 40:2; cf. la terminología cultual de Éxodo para el santuario portátil.
translation_notes:
  revision_awareness: 'Se sigue la lectura estable del paquete fuente: la fecha se expresa idiomáticamente y la relación entre מִשְׁכַּן y אֹהֶל מוֹעֵד se mantiene abierta, como en el audit trail inglés. No se introducen variantes textuales ni cambios revisionales.'
  spanish_consistency_notes:
  - Se usa «Yahvé» como forma por defecto en el proyecto, pero este versículo no contiene el nombre divino.
  - «Tabernáculo» conserva el término técnico tradicional sin sustituirlo por perífrasis menos precisas.
  - «Tienda de reunión» refleja el designador cultual estándar de אֹהֶל מוֹעֵד en español claro.
