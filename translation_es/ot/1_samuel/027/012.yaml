review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien la estructura y el sentido general del hebreo: Aquís confía en David, razona que David se ha vuelto detestable para su propio pueblo, y concluye que quedará en servicio permanente. Sin embargo, hay dos desajustes relevantes con la evidencia y el rastro POB: (1) בְּעַמּוֹ בְּיִשְׂרָאֵל se vierte mejor como «entre su pueblo, Israel» o «entre su pueblo de Israel», no «entre su pueblo en Israel», que suena torpe en español; (2) el inglés POB documentó y eligió «servant» por matiz vasallático/cortesano, y el español debería reflejar esa decisión con «siervo» o «servidor», no invertirla a «esclavo» como texto principal.'
  spanish_quality_summary: El texto es mayormente claro, pero «entre su pueblo en Israel» no es idiomático, y colocar [a][b] al final de toda la cita no ancla bien cada nota a la palabra o frase pertinente. Además, la nota a dice «se ha hecho hedor», formulación poco natural; conviene explicar el modismo con «se ha hecho apestoso» o «ha llegado a ser hediondo» en sentido literal. «Siervo» aquí suena digno, bíblico y natural para lectura eclesial amplia.
  glossary_alignment: 'No hay términos teológicos mayores en juego. El punto principal de alineación léxica es עֶבֶד: aunque el proyecto suele favorecer «esclavo» donde el inglés elige «slave», aquí el audit trail inglés eligió explícitamente «servant» por matiz contextual; por eso el español debe seguir «siervo» en el texto principal y mencionar «esclavo» solo como alternativa de nota si se desea. Los demás términos están bien alineados.'
  issues:
  - severity: medium
    issue: «entre su pueblo en Israel» es una construcción poco natural en español
    rationale: El hebreo בְּעַמּוֹ בְּיִשְׂרָאֵל expresa el marco social/nacional; en español eclesial natural funciona mejor «entre su pueblo, Israel» o «entre su pueblo de Israel». La redacción actual suena calcada.
  - severity: high
    issue: El texto principal usa «esclavo» donde el POB inglés decidió «servant» por razón contextual
    rationale: La revisión auditada del inglés y su decisión léxica explican que aquí no se enfatiza condición de propiedad sino servicio dependiente duradero tipo vasallo. El español no debe revertir esa decisión sin necesidad.
  - severity: low
    issue: Las notas [a][b] están ancladas al final de la cita en vez de junto a las palabras pertinentes
    rationale: La instrucción del proyecto pide que el marcador aparezca en la palabra o frase relevante. Aquí [a] debe ir con «aborrecible/detestable» y [b] con «siervo».
  - severity: low
    issue: La redacción de la nota literal «se ha hecho hedor» no es español natural
    rationale: Para explicar el modismo hebreo, conviene una formulación literal comprensible, como «se ha hecho apestoso» o «se ha hecho hediondo», aclarando que significa volverse detestable.
  revised_spanish_text: 'Y Aquís confió en David, diciendo: «Ciertamente se ha hecho aborrecible[a] entre su pueblo, Israel; así que será mi siervo[b] para siempre».'
  revised_footnotes:
