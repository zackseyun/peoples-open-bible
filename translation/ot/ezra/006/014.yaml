theological_decisions:
- issue: Relationship between divine and imperial authorization
  chosen_reading: The temple's completion is attributed both to the decree of the God of Israel and to the decrees of Persian kings.
  alternative_readings:
  - The royal decrees are subordinate expressions of the divine decree.
  rationale: The verse explicitly places God's decree first and then the decrees of Cyrus, Darius, and Artaxerxes. The translation preserves this dual attribution without collapsing the human decrees into mere paraphrase or making an unstated theological claim beyond the text.
  doctrine_reference: Preserve theological tension rather than resolve it.
