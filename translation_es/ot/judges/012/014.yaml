translation:
  language: es
  text: Tuvo cuarenta hijos y treinta nietos, que iban montados en setenta asnos[a], y juzgó a Israel ocho años.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «setenta asnos jóvenes». El término hebreo puede referirse específicamente a asnos jóvenes en algunos contextos.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְהִי לוֹ
  english_pob_choice: He had
  chosen_spanish: Tuvo
  alternatives_spanish:
  - Y le había
  - Y fue para él
  lexicon: HALOT
  rationale: El hebreo expresa posesión mediante un giro idiomático de existencia/posesión. En español, «tuvo» comunica la posesión de manera natural y fiel, sin perder el valor relacional del hebreo.
- source_word: אַרְבָּעִים בָּנִים
  english_pob_choice: forty sons
  chosen_spanish: cuarenta hijos
  alternatives_spanish:
  - cuarenta varones
  - cuarenta hijos varones
  lexicon: HALOT
  rationale: בָּנִים puede referirse a hijos varones, pero en español «hijos» es el término normal y suficiente dentro de la enumeración familiar; el contexto inmediato con «nietos» deja clara la referencia masculina sin necesidad de forzar una fórmula pesada.
- source_word: וּשְׁלֹשִׁים בְּנֵי בָנִים
  english_pob_choice: and thirty grandsons
  chosen_spanish: y treinta nietos
  alternatives_spanish:
  - y treinta hijos de hijos
  - y treinta nietos varones
  lexicon: HALOT
  rationale: La construcción literal «hijos de hijos» se entiende idiomáticamente como «nietos». En español, «nietos» es la equivalencia natural; el masculino plural conserva la referencia masculina del hebreo y evita una paráfrasis innecesaria.
- source_word: רֹכְבִים עַל שִׁבְעִים עֲיָרִם
  english_pob_choice: who rode on seventy donkeys
  chosen_spanish: que montaban setenta asnos
  alternatives_spanish:
  - que cabalgaban sobre setenta asnos
  - que iban montados en setenta burros
  - que montaban setenta pollinos
  lexicon: HALOT
  rationale: עֲיָרִם puede designar asnos y, en algunos contextos, animales jóvenes. «Asnos» mantiene el registro bíblico sin recurrir al arcaísmo de «asnos» como simple calco doctrinal; «montaban» reproduce el participio descriptivo del hebreo.
- source_word: וַיִּשְׁפֹּט אֶת יִשְׂרָאֵל
  english_pob_choice: and he judged Israel
  chosen_spanish: y juzgó a Israel
  alternatives_spanish:
  - y gobernó a Israel como juez
  - y fue juez de Israel
  lexicon: HALOT
  rationale: La fórmula narrativa de Jueces usa שׁפט para la función de juez/gobernante. «Juzgó a Israel» conserva la expresión tradicional y el valor técnico del verbo sin añadir explicación interpretativa.
- source_word: שְׁמֹנֶה שָׁנִים
  english_pob_choice: eight years
  chosen_spanish: ocho años
  alternatives_spanish:
  - durante ocho años
  lexicon: HALOT
  rationale: Expresión numérica directa y sin marca aspectual adicional en español; el contexto ya establece la duración del gobierno/juzgado.
theological_decisions:
- issue: Función de שׁפט en el libro de Jueces
  english_pob_reading: and he judged Israel
  chosen_spanish_reading: y juzgó a Israel
  alternative_spanish_readings:
  - y gobernó a Israel como juez
  - y fue juez de Israel
  rationale: 'Mantener «juzgó» preserva la ambigüedad productiva del hebreo: no sólo emitir sentencias, sino ejercer la función de juez/caudillo en el período de los jueces. La redacción evita reducir el oficio a un mero tribunal o a una paráfrasis sociopolítica más amplia.'
  doctrine_reference: Jueces 12:8-15; uso técnico de שׁפט en Jueces
- issue: Referencia de עֲיָרִם
  english_pob_reading: seventy donkeys
  chosen_spanish_reading: setenta asnos
  alternative_spanish_readings:
  - setenta asnos jóvenes
  - setenta pollinos
  rationale: El contexto no obliga a especificar «jóvenes», aunque el término hebreo puede admitir esa matización en otros pasajes. En español, «asnos» conserva la amplitud del término y deja abierta la posible especificación semántica sin imponerla.
  doctrine_reference: Jueces 12:14; léxico de עַיִר / עֲיָרִם
translation_notes:
  revision_awareness: 'La redacción sigue de cerca el texto hebreo y concuerda con el audit trail inglés en las decisiones clave: posesión idiomática («tuvo»), descendencia masculina («hijos» / «nietos»), participio descriptivo («montaban») y la fórmula técnica de Jueces («juzgó a Israel»). Se incorporó una nota léxica porque el hebreo עֲיָרִם admite la alternativa «asnos jóvenes», preservando la tensión semántica documentada por el POB inglés.'
  spanish_consistency_notes:
  - Se usa «asnos» de forma consistente para עֲיָרִם, evitando «burros» por registro demasiado coloquial y «pollinos» por exceso de especificación.
  - Se prefirió «hijos» y «nietos» como equivalentes idiomáticos naturales del hebreo, manteniendo el referente masculino implícito sin sobrecargar el verso.
  - La fórmula «juzgó a Israel» sigue la terminología canónica del libro y no la sustituye por una paráfrasis explicativa.
