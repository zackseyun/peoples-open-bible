translation:
  language: es
  text: Por tanto, he aquí, les haré saber[a]; esta vez les haré saber mi mano y mi poder[b], y sabrán que mi nombre es Yahvé[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «les daré a conocer ... les daré a conocer». El verbo hebreo es causativo («hacer saber») y puede reflejarse con un objeto personal («hacerles saber») o con una formulación impersonal («dar a conocer a ellos»).'
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: «mi mano», una figura común para el poder activo; por eso se conserva la imagen junto con «mi poder».'
    reason: cultural_note
  - marker: c
    text: Hebreo יְהוָה, tradicionalmente vertido «el SEÑOR». Aquí se conserva el nombre divino como «Yahvé».
    reason: alternative_reading
lexical_decisions:
- source_word: לָכֵן
  english_pob_choice: Therefore
  chosen_spanish: Por tanto
  alternatives_spanish:
  - Así que
  - Por ello
  lexicon: HALOT
  rationale: Introduce una conclusión consecuente y suena natural en español bíblico contemporáneo sin perder el valor inferencial del hebreo.
- source_word: הִנְנִי
  english_pob_choice: behold, I am
  chosen_spanish: he aquí
  alternatives_spanish:
  - mira
  - he aquí yo
  lexicon: HALOT
  rationale: Conserva el tono de anuncio enfático y solemne; en español bíblico 'he aquí' comunica bien la deixis y el énfasis divino.
- source_word: מֽוֹדִיעָ֔/ם
  english_pob_choice: I am making them know
  chosen_spanish: los haré saber
  alternatives_spanish:
  - les haré saber
  - los haré conocer
  - les daré a conocer
  lexicon: HALOT
  rationale: El hifil de ידע es causativo. 'Hacer saber' preserva esa fuerza verbal sin mecanicismo, y el objeto personal plural queda claro en español.
- source_word: בַּ/פַּ֣עַם הַ/זֹּ֔את
  english_pob_choice: this time
  chosen_spanish: esta vez
  alternatives_spanish:
  - en esta ocasión
  - ahora
  lexicon: HALOT
  rationale: Equivale de manera idiomática y directa al matiz temporal demostrativo del hebreo.
- source_word: יָדִ֖/י
  english_pob_choice: my hand
  chosen_spanish: mi mano
  alternatives_spanish:
  - mi poder
  lexicon: HALOT
  rationale: Se conserva la metáfora corporal literal, porque el texto la empareja con 'mi poder' y el hebreo no la explica ni la sustituye por un abstracto.
- source_word: גְּבֽוּרָתִ֑/י
  english_pob_choice: my might
  chosen_spanish: mi poder
  alternatives_spanish:
  - mi fuerza
  - mi poderío
  - mi might
  lexicon: HALOT
  rationale: En español, 'poder' comunica con claridad la idea de fuerza eficaz y mantiene la diferencia con 'mano' sin forzar un calco demasiado rígido.
- source_word: וְ/יָדְע֖וּ
  english_pob_choice: and they will know
  chosen_spanish: y sabrán
  alternatives_spanish:
  - y conocerán
  - y llegarán a saber
  lexicon: HALOT
  rationale: El futuro simple expresa bien el resultado esperado. 'Sabrán' es natural y conserva el vínculo con el verbo ידע.
- source_word: שְׁמִ֥/י
  english_pob_choice: my name
  chosen_spanish: mi nombre
  alternatives_spanish:
  - mi nombre propio
  lexicon: HALOT
  rationale: Traducción literal y transparente, adecuada para la fórmula de autoidentificación divina.
- source_word: יְהוָֽה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  lexicon: HALOT
  rationale: 'Sigue el estándar del proyecto para el Tetragrámaton: transliteración del nombre divino en lugar de una sustitución por título.'
theological_decisions:
- issue: Nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - el SEÑOR
  rationale: El hebreo contiene explícitamente el nombre propio del pacto, no un título. 'Yahvé' preserva esa identificación y sigue la terminología del proyecto.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: La metáfora 'mi mano' junto con 'mi poder'
  english_pob_reading: my hand ... my might
  chosen_spanish_reading: mi mano ... mi poder
  alternative_spanish_readings:
  - mi poder ... mi fuerza
  - mi mano ... mi fuerza
  rationale: Mantener 'mano' conserva la imagen hebrea de agencia activa; 'poder' aclara el segundo término sin colapsar ambas expresiones en una sola idea abstracta.
  doctrine_reference: 'DOCTRINE.md Translation philosophy #1, #5'
translation_notes:
  revision_awareness: 'La redacción sigue el último pase de revisión: mantiene la repetición causativa de ''hacer saber'', conserva la metáfora de ''mano'' y usa la transliteración del nombre divino en lugar de la sustitución tradicional. Se ajusta el registro a un español bíblico moderno y publicable.'
  spanish_consistency_notes:
  - Se usa 'Yahvé' para יְהוָה según el estándar del proyecto.
  - Se conserva la distinción entre la metáfora concreta 'mano' y el término más abstracto 'poder'.
  - '''He aquí'' se emplea como fórmula de anuncio solemne, no como mera interjección.'
  - '''Esta vez'' refleja el demostrativo temporal del hebreo sin añadir interpretación.'
