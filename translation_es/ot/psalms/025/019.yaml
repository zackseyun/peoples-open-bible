review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien la estructura básica del hebreo: imperativo dirigido a Dios, razón causal, pluralidad de enemigos y su odio violento. Sin embargo, la nota al pie no preserva con suficiente precisión la literalidad documentada en la auditoría inglesa: el hebreo dice literalmente «y un odio de violencia me odian», no «y con odio de violencia me odian».'
  spanish_quality_summary: El texto principal es claro y natural en español eclesial contemporáneo. «Mira a mis enemigos... me odian con odio violento» es legible y fiel. La única reparación necesaria es la redacción de la nota para que corresponda mejor al hebreo y al razonamiento lexical auditado.
  glossary_alignment: No hay términos del glosario mayor en juego salvo mantener un español natural y fiel. «Mira», «enemigos», «porque», «son muchos» y «me odian» están bien elegidos. «Con odio violento» comunica adecuadamente וְשִׂנְאַת חָמָס de forma idiomática, con apoyo de nota.
  issues:
  - severity: medium
    issue: La nota al pie altera la forma literal documentada
    rationale: La auditoría inglesa registra literalmente «and a hatred of violence they hate me». La nota española dice «y con odio de violencia me odian», que introduce una preposición no reflejada en la forma nominal hebrea y debilita la conexión con la justificación lexical del POB.
  revised_spanish_text: Mira a mis enemigos[a], porque son muchos, y me odian con odio violento.
  revised_footnotes:
  - marker: a
    text: 'Literalmente: «y un odio de violencia me odian». La expresión hebrea subraya el carácter violento y despiadado de su odio.'
    reason: lexical_alternative
  revision_rationale: Se conserva el texto principal, que ya es fiel y natural, y se corrige la nota para alinearla con mayor precisión al hebreo y a la auditoría inglesa.
