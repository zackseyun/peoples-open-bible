translation:
  language: es
  text: 'Entonces los sacerdotes y los profetas dijeron a los oficiales y a todo el pueblo: «Este hombre merece la sentencia de muerte[a], porque ha profetizado contra esta ciudad[b], tal como ustedes mismos han oído».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Este hombre merece la pena de muerte». El hebreo dice literalmente «una sentencia/juicio de muerte para este hombre», conservando un tono judicial formal.'
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo literal: «a esta ciudad»; en este contexto de juicio profético, el sentido es «contra esta ciudad».'
    reason: lexical_alternative
lexical_decisions:
- source_word: הַכֹּהֲנִים וְהַנְּבִאִים
  english_pob_choice: the priests and the prophets
  chosen_spanish: los sacerdotes y los profetas
  alternatives_spanish:
  - los clérigos y los profetas
  - los sacerdotes y los videntes
  lexicon: HALOT
  rationale: Se mantiene la coordinación explícita de dos grupos definidos. «Sacerdotes» y «profetas» son los equivalentes más directos y transparentes en español.
- source_word: הַשָּׂרִים
  english_pob_choice: the officials
  chosen_spanish: los oficiales
  alternatives_spanish:
  - los gobernantes
  - los príncipes
  - los líderes
  lexicon: HALOT
  rationale: El contexto es cívico-judicial; «oficiales» comunica autoridad administrativa sin introducir un matiz monárquico más fuerte que el hebreo.
- source_word: כָּל הָעָם
  english_pob_choice: all the people
  chosen_spanish: todo el pueblo
  alternatives_spanish:
  - toda la gente
  - toda la población
  lexicon: HALOT
  rationale: «Pueblo» conserva el sustantivo colectivo bíblico de manera natural en español y mantiene la inclusión total de כָּל.
- source_word: מִשְׁפַּט מָוֶת
  english_pob_choice: This man deserves the sentence of death
  chosen_spanish: la sentencia de muerte
  alternatives_spanish:
  - la pena de muerte
  - un juicio de muerte
  - la sentencia capital
  lexicon: HALOT
  rationale: Se conserva el tono judicial formal del hebreo. «Sentencia de muerte» refleja el valor forense de מִשְׁפַּט y evita suavizarlo en una formulación meramente idiomática.
- source_word: לָאִישׁ הַזֶּה
  english_pob_choice: for this man
  chosen_spanish: Este hombre
  alternatives_spanish:
  - a este hombre
  - para este hombre
  lexicon: HALOT
  rationale: 'En español la estructura natural es una construcción predicativa directa: «Este hombre merece…». El sujeto explícito preserva el sentido acusatorio y evita una traducción demasiado literal del dativo.'
- source_word: נִבָּא
  english_pob_choice: he has prophesied
  chosen_spanish: ha profetizado
  alternatives_spanish:
  - profetizó
  - está profetizando
  lexicon: HALOT
  rationale: El perfecto hebreo se expresa bien con el perfecto compuesto español para ligar el hecho con la acusación presente.
- source_word: אֶל הָעִיר הַזֹּאת
  english_pob_choice: against this city
  chosen_spanish: contra esta ciudad
  alternatives_spanish:
  - a esta ciudad
  - sobre esta ciudad
  - acerca de esta ciudad
  lexicon: HALOT
  rationale: Aunque el hebreo dice literalmente «a esta ciudad», el contexto de denuncia judicial exige expresar la fuerza adversativa. «Contra» preserva la lectura acusatoria documentada por la POB inglesa.
- source_word: כַּאֲשֶׁר שְׁמַעְתֶּם בְּאָזְנֵיכֶם
  english_pob_choice: just as you have heard with your own ears
  chosen_spanish: tal como ustedes han oído con sus propios oídos
  alternatives_spanish:
  - como ustedes mismos han oído
  - tal como lo oyeron ustedes mismos
  lexicon: HALOT
  rationale: Se conserva el énfasis en la audición personal y directa. «Con sus propios oídos» es una equivalencia natural del hebreo enfático y del inglés auditable.
theological_decisions:
- issue: Valor judicial de מִשְׁפַּט מָוֶת
  english_pob_reading: sentence of death / death penalty
  chosen_spanish_reading: sentencia de muerte
  alternative_spanish_readings:
  - pena de muerte
  - sentencia capital
  rationale: No se atenúa la gravedad del veredicto; «sentencia de muerte» mantiene el registro formal y judicial que la POB inglesa documenta.
  doctrine_reference: Lexical/forensic sense; no doctrinal dispute implied.
- issue: Dirección de נבא con la ciudad
  english_pob_reading: prophesied against this city
  chosen_spanish_reading: ha profetizado contra esta ciudad
  alternative_spanish_readings:
  - ha profetizado acerca de esta ciudad
  - ha profetizado a esta ciudad
  rationale: 'Se conserva la tensión contextual: el hebreo usa אֶל, pero el pasaje funciona como acusación hostil. «Contra» expresa la fuerza pragmática sin borrar la base hebrea.'
  doctrine_reference: Prophetic judgment context; syntax + discourse force.
translation_notes:
  revision_awareness: 'La redacción sigue la revisión más reciente del POB inglés, que prefirió una formulación más natural de la carga judicial de מִשְׁפַּט מָוֶת y eliminó la redundancia de «saying». En español se adopta la misma línea: una acusación directa, formal y fluida, sin añadir notas donde no hay nueva ambigüedad textual en la traducción española.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» sólo cuando aparezca el tetragrámaton; en este versículo no ocurre.
  - Se conserva el registro judicial con «sentencia de muerte» en lugar de «pena de muerte» para alinearse con la nota auditada del inglés.
  - «Contra esta ciudad» refleja la decisión contextual ya documentada en la POB inglesa, no una mera literalidad del hebreo.
  - No se usa «Cristo», «SEÑOR» ni vocabulario eclesiástico no presente en el versículo.
