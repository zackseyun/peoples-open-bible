translation:
  language: es
  text: Porque Yahvé defenderá su causa, y despojará de la vida a los que los despojan[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Porque Yahvé contenderá por su causa y quitará la vida a quienes los despojan»'
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Porque
  lexicon: HALOT
  rationale: La partícula introduce la base causal o explicativa del dicho anterior; «Porque» conserva esa relación y suena natural en español proverbial.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - El SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: 'Se sigue el criterio del proyecto para el Tetragrámaton: transliteración del nombre divino, no sustitución por un título. «Yahvé» es la forma base en el texto español.'
- source_word: יָרִיב
  english_pob_choice: will plead
  chosen_spanish: pleiteará
  alternatives_spanish:
  - defenderá su causa
  - litigará
  lexicon: HALOT
  rationale: El verbo ריב en contexto forense expresa disputar o defender en juicio. «Pleiteará» conserva el campo legal y la fuerza combativa del hebreo sin sonar demasiado técnico.
- source_word: רִיבָם
  english_pob_choice: their case
  chosen_spanish: por ellos
  alternatives_spanish:
  - su causa
  - su pleito
  lexicon: HALOT
  rationale: El sustantivo cognado puede significar causa, pleito o controversia. En español, al decir «pleiteará por ellos» se recoge de modo idiomático la idea de actuar en su favor en el litigio implícito.
- source_word: וְקָבַע
  english_pob_choice: and rob of life
  chosen_spanish: y quitará la vida
  alternatives_spanish:
  - y despojará de la vida
  - y arrebatará la vida
  lexicon: HALOT
  rationale: 'El verbo קבע se entiende aquí como despojar, robar o quitar; con נֶפֶשׁ como complemento, la noción es retributiva: privar de la vida. «Quitará la vida» expresa bien el resultado sin forzar una metáfora extraña en español.'
- source_word: קֹבְעֵיהֶם
  english_pob_choice: those who rob them
  chosen_spanish: a quienes los despojan
  alternatives_spanish:
  - a sus despojadores
  - a los que les roban
  lexicon: HALOT
  rationale: Se conserva el vínculo lexical con el verbo anterior mediante «despojan», que corresponde al sentido de robar o despojar y preserva la reciprocidad poética del hebreo.
- source_word: נָפֶשׁ
  english_pob_choice: life
  chosen_spanish: la vida
  alternatives_spanish:
  - el alma
  - la persona
  lexicon: HALOT
  rationale: Aquí נֶפֶשׁ designa la vida misma, no un alma inmortal. «La vida» evita imponer una lectura doctrinal ajena al proverbio y sigue el valor contextual del hebreo.
theological_decisions:
- issue: Traducción del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - El SEÑOR
  - Jehová
  rationale: 'Se mantiene la política del proyecto para el Nombre divino: transliterarlo como nombre propio y no ocultarlo tras una sustitución reverencial. En este proverbio, Yahvé es el sujeto que garantiza justicia retributiva.'
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה / YHWH → Yahvé'
- issue: Sentido retributivo de נֶפֶשׁ con קבע
  english_pob_reading: rob of life
  chosen_spanish_reading: quitará la vida
  alternative_spanish_readings:
  - tomará la vida
  - arrebatará la vida
  rationale: La combinación verbal expresa privación de vida como juicio justo. «Quitar la vida» comunica esa retribución de manera clara en español sin diluir la imagen legal-poética del hebreo.
  doctrine_reference: Proverbios 22:23 — juicio retributivo divino en contexto sapiencial
translation_notes:
  revision_awareness: Se revisó el paralelismo legal del hebreo y la repetición del campo semántico de ריב/קבע. La versión española conserva la idea de litigio y retribución, y evita suavizar el despojo de vida presente en el texto fuente.
  spanish_consistency_notes:
  - Se usó «Yahvé» conforme al estándar del proyecto para יְהוָה.
  - Se prefirió «pleiteará» para mantener el marco forense de ריב.
  - «Despojan» mantiene la correspondencia lexical con קבע y con el sustantivo/participio relacionado.
  - «La vida» traduce נֶפֶשׁ en su sentido contextual, no como «alma».
