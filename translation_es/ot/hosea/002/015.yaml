translation:
  language: es
  text: Y la castigaré por los días de los Baales[a], cuando les quemó incienso, se adornó con su anillo y con sus joyas, y fue tras sus amantes, pero me olvidó, declara Yahvé.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O posiblemente 'su anillo de nariz'. El hebreo נֶזֶם puede referirse a un anillo, a menudo específicamente un anillo de nariz o un arete.
    reason: lexical_alternative
lexical_decisions:
- source_word: וּפָקַדְתִּי עָלֶיהָ
  english_pob_choice: I will punish her
  chosen_spanish: la castigaré
  alternatives_spanish:
  - haré recaer sobre ella el castigo
  - la visitaré
  lexicon: HALOT
  rationale: פָקַד con עַל en contexto judicial comunica rendición de cuentas o castigo. En español, 'castigaré' transmite con naturalidad esa fuerza judicial sin perder el valor punitivo del hebreo.
- source_word: יְמֵי הַבְּעָלִים
  english_pob_choice: the days of the Baals
  chosen_spanish: los días de los Baales
  alternatives_spanish:
  - los días de los baales-idolos
  - las jornadas de los Baales
  lexicon: HALOT
  rationale: Se conserva el plural 'Baales' para reflejar la pluralidad hebrea הַבְּעָלִים y mantener la referencia a las manifestaciones/idolatrías de Baal. 'Días de' preserva la expresión literal y su posible sentido de ocasiones o períodos dedicados al culto.
- source_word: אֲשֶׁר תַּקְטִיר לָהֶם
  english_pob_choice: when she burned incense to them
  chosen_spanish: cuando les quemaba incienso
  alternatives_spanish:
  - cuando les ofrecía humo de sacrificio
  - cuando les hacía humo de incienso
  lexicon: HALOT
  rationale: הקטיר en hifil abarca hacer humo sacrificial, a menudo mediante incienso. 'Quemaba incienso' es idiomático en español y conserva el sentido de culto idólatra dirigido a ellos.
- source_word: וַתַּעַד
  english_pob_choice: adorned herself
  chosen_spanish: se adornó
  alternatives_spanish:
  - se atavió
  - se engalanó
  lexicon: HALOT
  rationale: El verbo indica adornarse o engalanarse. 'Se adornó' mantiene el matiz reflexivo y es claro en español contemporáneo.
- source_word: נִזְמָהּ
  english_pob_choice: her ring
  chosen_spanish: su anillo
  alternatives_spanish:
  - su aro
  - su anillo de nariz
  - su arete
  lexicon: HALOT
  rationale: נֶזֶם/נִזְם puede referirse a un anillo, a menudo de nariz o de oreja. Como el tipo preciso no está explicitado aquí, 'anillo' es un equivalente amplio y natural; la posible especificidad queda abierta en la nota textual.
- source_word: וְחֶלְיָתָהּ
  english_pob_choice: her jewelry
  chosen_spanish: sus joyas
  alternatives_spanish:
  - sus adornos
  - su aderezo
  lexicon: HALOT
  rationale: חֶלְיָה designa ornamentos o joyería en general. 'Sus joyas' comunica con naturalidad el conjunto de adornos personales.
- source_word: מְאַהֲבֶיהָ
  english_pob_choice: her lovers
  chosen_spanish: sus amantes
  alternatives_spanish:
  - los que la amaban
  - sus amados
  lexicon: HALOT
  rationale: En la metáfora matrimonial de Oseas, 'amantes' es la forma española más directa para los vínculos ilícitos y las alianzas idolátricas implicadas.
- source_word: וְאֹתִי שָׁכְחָה
  english_pob_choice: but forgot me
  chosen_spanish: pero me olvidó
  alternatives_spanish:
  - y me olvidó
  - aunque me olvidó
  lexicon: HALOT
  rationale: El hebreo contrasta su búsqueda de amantes con el olvido de Yahvé. 'Pero' reproduce en español ese matiz adversativo que la POB expresó en inglés con 'but'.
- source_word: נְאֻם יְהוָה
  english_pob_choice: declares Yahweh
  chosen_spanish: declara Yahvé
  alternatives_spanish:
  - dice Yahvé
  - oráculo de Yahvé
  lexicon: HALOT
  rationale: Se conserva 'Yahvé' por la norma del proyecto para יְהוָה. 'Declara' traduce la fórmula profética נְאֻם con un registro natural y solemne en español.
theological_decisions:
- issue: Traducción del Nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - Jehová
  rationale: El texto hebreo usa el Tetragrama directamente; conforme a la pauta del proyecto, se preserva el nombre del pacto como 'Yahvé' en vez de una sustitución reverencial.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Sentido punitivo de פָקַד con עַל
  english_pob_reading: I will punish her
  chosen_spanish_reading: la castigaré
  alternative_spanish_readings:
  - la visitaré
  - haré cuenta con ella
  rationale: En contexto de juicio profético, la acción no es neutral sino retributiva. 'Castigaré' deja claro el valor judicial sin suavizar la amonestación del pasaje.
  doctrine_reference: HALOT / uso profético de פקד
- issue: Pluralidad de הַבְּעָלִים
  english_pob_reading: the Baals
  chosen_spanish_reading: los Baales
  alternative_spanish_readings:
  - los baales
  - los ídolos de Baal
  rationale: Se mantiene la pluralidad del hebreo para no borrar la referencia a diversas expresiones del culto a Baal; 'Baales' es comprensible y refleja la forma tradicional usada en español bíblico crítico.
  doctrine_reference: Lexema plur. הַבְּעָלִים en Oseas
translation_notes:
  revision_awareness: El contexto de revisión indica alto acuerdo y sin cambios sustantivos en la base inglesa; por eso la versión española sigue de cerca la estructura del hebreo y conserva las tensiones léxicas principales, en especial el plural 'Baales' y la ambigüedad de נִזְמָהּ.
  spanish_consistency_notes:
  - Se usa 'Yahvé' de manera consistente para יְהוָה, conforme al criterio del proyecto.
  - Se conserva la metáfora con 'amantes' para מְאַהֲבֶיהָ, alineada con la lectura profética de Oseas.
  - '''Baales'' mantiene el plural hebreo y no se reduce a un singular genérico.'
  - La nota textual sobre נִזְמָהּ evita fijar indebidamente si el ornamento era anillo de nariz, arete o anillo simple.
