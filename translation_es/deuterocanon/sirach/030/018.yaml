translation:
  language: es
  text: Manjares selectos derramados ante una boca cerrada son como una ofrenda puesta delante de un ídolo[a][b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebreo גלול es un término despectivo para un ídolo; alternativamente, 'un ídolo inmundo' o 'un ídolo de estiércol'.
    reason: lexical_alternative
  - marker: b
    text: El paralelo griego dice 'porciones de comida puestas junto a una tumba', en lugar del hebreo 'una ofrenda puesta delante de un ídolo'; ambas imágenes comunican la misma futilidad.
    reason: textual_variant
lexical_decisions:
- source_word: ἀγαθὰ / טובה
  english_pob_choice: delicacies
  chosen_spanish: dulces manjares
  alternatives_spanish:
  - buenas cosas
  - manjares selectos
  - delicias
  lexicon: HALOT / LXX parallel sense
  rationale: El hebreo y el griego apuntan aquí a comida deseable, no a bondad abstracta. En español, 'dulces manjares' conserva el valor concreto y apetitoso del contexto sin sonar demasiado técnico ni desviado.
- source_word: ἐκκεχυμένα / שפוכה
  english_pob_choice: poured out
  chosen_spanish: derramados
  alternatives_spanish:
  - vertidos
  - esparcidos
  lexicon: HALOT / LSJ
  rationale: El participio describe algo vertido o derramado; 'derr amados' mantiene la imagen física y se ajusta naturalmente al español.
- source_word: ἐπὶ στόματι κεκλεισμένῳ / על פה סתום
  english_pob_choice: before a shut mouth
  chosen_spanish: sobre una boca cerrada
  alternatives_spanish:
  - ante una boca cerrada
  - sobre una boca sellada
  - para una boca cerrada
  lexicon: HALOT / LSJ
  rationale: La idea es una boca que no puede recibir lo ofrecido. 'Sobre una boca cerrada' reproduce la proximidad espacial del griego y sigue siendo claro en español.
- source_word: θέμα βρωμάτων / תנופה
  english_pob_choice: an offering
  chosen_spanish: una ofrenda
  alternatives_spanish:
  - una ofrenda mecida
  - una ofrenda presentada
  - una ofrenda ritual
  lexicon: HALOT / LXX usage
  rationale: Aunque תנופה puede ser un término técnico cultual, el proverbio usa la imagen para expresar inutilidad. 'Ofrenda' mantiene el trasfondo cultual sin estrechar indebidamente el sentido.
- source_word: παρακείμενα / מצגת
  english_pob_choice: set
  chosen_spanish: puesta
  alternatives_spanish:
  - colocada
  - presentada
  - dispuesta
  lexicon: LSJ / HALOT
  rationale: El participio indica algo colocado o dispuesto; 'puesta' es breve, natural y fiel al tono proverbial.
- source_word: ἐπὶ τάφῳ / לפני גלול (paralelo hebreo divergente)
  english_pob_choice: before an idol
  chosen_spanish: delante de un ídolo
  alternatives_spanish:
  - delante de un ídolo abominable
  - delante de un ídolo inmundo
  - delante de un dios falso
  lexicon: HALOT / Greek parallel
  rationale: El texto hebreo preservado difiere del griego, pero la tradición de la POB en inglés opta por el sentido hebreo principal. 'Ídolo' es la forma más clara; la nota explica la variante griega con 'sepulcro'. En la comparación principal, la inutilidad es lo esencial.
theological_decisions:
- issue: Tratamiento de la variante textual entre el hebreo y el griego
  english_pob_reading: The Greek parallel reads 'food portions laid beside a tomb' instead of the Hebrew's 'an offering set before an idol,' showing a notable difference in the second comparison while preserving the same idea of futility.
  chosen_spanish_reading: Se conserva la lectura hebrea principal en el texto, y se señala en nota que el griego dice 'porciones de comida junto a una tumba'.
  alternative_spanish_readings:
  - '... como porciones de comida puestas junto a una tumba.'
  - '... como una ofrenda puesta junto a una tumba.'
  rationale: 'La comparación sapiencial permanece en ambas tradiciones: ofrecer algo valioso a quien no puede recibirlo. Mantener el hebreo en el texto principal sigue la base del audit trail, mientras la nota transparenta la variante griega sin borrarla.'
  doctrine_reference: Transparencia textual / crítica textual de la POB
- issue: Término despectivo para ídolo
  english_pob_reading: translate as 'idol' in the main text
  chosen_spanish_reading: delante de un ídolo
  alternative_spanish_readings:
  - delante de un ídolo de estiércol
  - delante de un ídolo asqueroso
  rationale: גלול es claramente peyorativo, pero la forma más publicable y comprensible en español es 'ídolo'. La carga despectiva se puede preservar en nota, sin volver la línea principal áspera o interpretativa.
  doctrine_reference: Transparencia léxica / respeto al lector
translation_notes:
  revision_awareness: El borrador sigue la lectura principal de la POB en inglés y su nota de variante textual, pero incorpora el paralelo griego de forma explícita en la documentación. No se detectaron revisiones adicionales en el registro más reciente; el pasaje permanece estable.
  spanish_consistency_notes:
  - Se mantiene 'í­dolo' como término principal, en concordancia con la opción inglesa documentada y la política de evitar calcos mecánicos.
  - '''Ofrenda'' conserva el trasfondo cultual sin imponer un tecnicismo innecesario en el cuerpo del verso.'
  - La variante griega se documenta en nota para no borrar la tensión textual del expediente.
  - El estilo es sobrio y proverbial, con vocabulario inteligible para lectores eclesiales de español neutro.
