    text: Or possibly, 'the sons of Ophi'; the Hebrew personal name is textually/translationally uncertain in English representation.
    reason: lexical_alternative
  - marker: b
    text: Jezaniah may also be rendered 'Jezaniahu'; some relate the name to forms elsewhere translated 'Jaazaniah.'
    reason: lexical_alternative
