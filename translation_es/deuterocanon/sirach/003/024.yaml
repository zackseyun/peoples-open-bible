    rationale: Si se corrige el texto principal, la nota debe reflejar la nueva formulación literal/semiliteral para mantener coherencia interna.
  revised_spanish_text: Porque muchas son las especulaciones[a] de los hijos del hombre[b], y las imaginaciones malas hacen errar.
