translation:
  language: es
  text: Pero envió a Apolonio, el principal profanador, con un ejército de veintidós mil, ordenándole masacrar a todos los que estaban en la flor de la vida y vender[a] a las mujeres y a los más jóvenes.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, más explícitamente en contexto, «vender como esclavos». El griego dice simplemente «vender», aunque la esclavitud probablemente está implícita.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἔπεμψεν
  english_pob_choice: he sent
  chosen_spanish: envió
  alternatives_spanish:
  - mandó
  - despachó
  lexicon: LSJ
  rationale: El aoristo de πέμπω expresa enviar o despachar. «Envió» es natural, formal y fiel al valor básico del verbo.
- source_word: μυσάρχην
  english_pob_choice: chief polluter
  chosen_spanish: el jefe de la profanación
  alternatives_spanish:
  - el principal profanador
  - el caudillo de la impureza
  - el líder de la contaminación
  lexicon: LSJ
  rationale: El término es raro y despectivo; no nombra un cargo neutro. «Jefe de la profanación» conserva la carga de impureza/defilement sin inventar una función administrativa no explicitada por el griego.
- source_word: μετὰ στρατεύματος
  english_pob_choice: with an army
  chosen_spanish: con un ejército
  alternatives_spanish:
  - con una fuerza
  - con tropas
  lexicon: LSJ
  rationale: στράτευμα designa una fuerza militar. «Ejército» es idiomático en español y coherente con el número grande que sigue.
- source_word: δισμυρίους δὲ τοῖς δισχιλίοις
  english_pob_choice: twenty-two thousand
  chosen_spanish: veintidós mil
  alternatives_spanish:
  - veinte mil y dos mil
  - veintidós mil hombres
  lexicon: LSJ
  rationale: La expresión suma veinte mil y dos mil; «veintidós mil» comunica el sentido numérico de forma natural. Se omite «hombres» porque no está explícito en el griego.
- source_word: προστάξας
  english_pob_choice: commanding him
  chosen_spanish: ordenándole
  alternatives_spanish:
  - mandándole
  - habiéndole ordenado
  lexicon: LSJ
  rationale: El participio introduce el contenido de la instrucción dada a Apolonio. «Ordenándole» conecta bien con el verbo principal y mantiene la relación verbal.
- source_word: τοὺς ἐν ἡλικίᾳ πάντας
  english_pob_choice: all those in their prime
  chosen_spanish: a todos los que estaban en la plenitud de la edad
  alternatives_spanish:
  - a todos los de edad
  - a todos los que estaban en la edad adulta
  - a todos los que estaban en su mejor edad
  lexicon: LSJ
  rationale: La frase apunta a quienes están en edad o fuerza plena, especialmente aptos para ser objetivo del ataque. «Plenitud de la edad» preserva el sentido de madurez/prime sin restringirlo artificialmente a una categoría legal.
- source_word: κατασφάξαι
  english_pob_choice: to slaughter
  chosen_spanish: matar a espada
  alternatives_spanish:
  - degollar
  - masacrar
  - descuartizar
  lexicon: LSJ
  rationale: El verbo compuesto es muy violento. En español, «matar a espada» reproduce el carácter cruento del ataque sin introducir una imagen más específica que el texto no exige; la alternativa «masacrar» sería más interpretativa.
- source_word: τὰς δὲ γυναῖκας
  english_pob_choice: the women
  chosen_spanish: a las mujeres
  alternatives_spanish:
  - a las esposas
  - a las mujeres de la familia
  lexicon: LSJ
  rationale: γυναῖκες puede significar mujeres o esposas; aquí el contraste con los que deben ser muertos y los más jóvenes vendidos favorece el sentido amplio «mujeres».
- source_word: τοὺς νεωτέρους
  english_pob_choice: the younger ones
  chosen_spanish: a los más jóvenes
  alternatives_spanish:
  - a los jóvenes
  - a los muchachos
  - a los niños
  lexicon: LSJ
  rationale: El comparativo de νέος indica personas más jóvenes, sin fijar una edad exacta. «Los más jóvenes» conserva la comparatividad y evita estrechar el rango a «niños» o «muchachos» sin base suficiente.
- source_word: πωλεῖν
  english_pob_choice: to sell
  chosen_spanish: vender
  alternatives_spanish:
  - venderlos como esclavos
  - venderlos en esclavitud
  lexicon: LSJ
  rationale: El verbo significa simplemente «vender». Dado que el contexto bélico implica esclavitud, se conserva el verbo simple en el texto principal, sin sobreexplicar lo no dicho explícitamente por el griego.
theological_decisions:
- issue: Si hacer explícita la esclavitud implícita en πωλεῖν
  english_pob_reading: to sell; enslavement is likely implied
  chosen_spanish_reading: vender
  alternative_spanish_readings:
  - venderlos como esclavos
  - venderlos en esclavitud
  rationale: El contexto histórico sugiere esclavización, pero el verbo griego solo dice «vender». Para respetar la primacía del original, el texto principal mantiene la forma breve y deja la implicación en nota.
  doctrine_reference: 'Principio de transparencia textual: no ampliar el sentido más allá de lo que el griego formula explícitamente.'
- issue: Cómo traducir μυσάρχην sin convertirlo en un título honorífico o administrativo
  english_pob_reading: chief polluter
  chosen_spanish_reading: el jefe de la profanación
  alternative_spanish_readings:
  - el principal profanador
  - el caudillo de la impureza
  rationale: El griego es peyorativo y construye una etiqueta de deshonra. La versión española conserva ese tono y evita neutralizarlo con un título institucional.
  doctrine_reference: Lexical transparency in pejorative epithets; maintain the source’s evaluative force.
translation_notes:
  revision_awareness: 'Se tomó en cuenta la revisión del inglés POB que reordenó el epíteto en aposición («Apolonio, el chief polluter») para una sintaxis más natural. En español se siguió ese orden natural: nombre propio primero y epíteto después. También se mantuvo la decisión revisada de no añadir «hombres» al número total, porque no está en el griego.'
  spanish_consistency_notes:
  - Se conservó un registro sobrio y formal, adecuado para el flujo narrativo de 2 Macabeos.
  - Se mantuvo el nombre «Apolonio» según la forma española habitual del nombre propio.
  - Se evitó «SEÑOR» u otra máscara porque el versículo no contiene el nombre divino.
  - La expresión «a los más jóvenes» preserva el comparativo griego sin precisar edades no indicadas.
  - El participio griego se vertió con una estructura gerundiva española natural («ordenándole») para mantener la dependencia sintáctica del mandato.
