  source_alignment_summary: 'El borrador refleja bien el sentido del hebreo: condición sobre lo que quede de la carne y del pan hasta la mañana, mandato de quemar el sobrante, prohibición de comerlo y razón cultual. También preserva adecuadamente הַמִּלֻּאִים como «ofrenda de ordenación» con nota alternativa válida.'
  spanish_quality_summary: 'El español es claro y mayormente natural, pero hay dos detalles mejorables: «en el fuego» suena menos idiomático que «con fuego» en este giro, y «porque santo es» resulta algo invertido y poco natural para español moderno digno; «porque es santo» conserva mejor la legibilidad sin pérdida de solemnidad.'
  glossary_alignment: 'Alineación buena con la terminología del proyecto: «carne», «ofrenda de ordenación», «pan» y «santo» corresponden bien a las decisiones documentadas. La nota léxica sobre «consagración» está bien preservada.'
  issues:
