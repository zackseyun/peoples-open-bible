id: PSA.76.0
reference: Psalms 76:0
source:
  edition: WLC
  text: לַ/מְנַצֵּ֥חַ בִּ/נְגִינֹ֑ת מִזְמ֖וֹר לְ/אָסָ֣ף שִֽׁיר׃
translation:
  text: For the choirmaster[a]; with stringed instruments. A psalm of Asaph[b], a song.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The phrase 'of Asaph' may indicate authorship, association with the Asaphite guild, or dedication to Asaph rather than strictly personal authorship.
    reason: alternative_reading
  - marker: b
    text: 'Or ''For the choirmaster: with stringed instruments.''.'
    reason: previous_rendering
lexical_decisions:
- source_word: לַמְנַצֵּחַ
  chosen: For the choirmaster
  alternatives:
  - For the director
  - For the leader
  lexicon: HALOT
  rationale: In psalm superscriptions this term conventionally denotes the person overseeing musical performance. 'Choirmaster' is idiomatic modern English and fits the liturgical-musical context better than the more generic 'leader' or 'director'.
- source_word: בִּנְגִינֹת
  chosen: with stringed instruments
  alternatives:
  - on stringed instruments
  - with instrumental music
  lexicon: HALOT
  rationale: The noun refers specifically to stringed music/instruments in psalm headings. 'With stringed instruments' is natural English and preserves the instrumental sense without over-specifying performance technique.
- source_word: מִזְמוֹר
  chosen: A psalm
  alternatives:
  - Psalm
  - melody
  lexicon: HALOT
  rationale: The term is the standard genre label for a psalm. Rendering it as 'A psalm' preserves the superscriptional style and distinguishes it from the following genre term 'song'.
- source_word: לְאָסָף
  chosen: of Asaph
  alternatives:
  - for Asaph
  - belonging to Asaph
  lexicon: HALOT
  rationale: The preposition ל in psalm headings can indicate authorship, association, or dedication. 'Of Asaph' is the standard concise rendering that preserves the ambiguity without forcing a narrower interpretation such as authorship alone or dedication alone.
- source_word: שִׁיר
  chosen: a song
  alternatives:
  - song
  lexicon: HALOT
  rationale: This is a second genre label paired with 'psalm.' Rendering it explicitly as 'a song' preserves the Hebrew appositional sequence and the dual classification of the composition.
