  source_alignment_summary: 'El borrador español refleja bien la estructura y el sentido general del griego: captura forzosa de muchos, identificación appositiva de Eleazar, su ascendencia sacerdotal, conocimiento de la ley, edad avanzada, reconocimiento en el entorno del tirano, y la clausura solemne ''abrió su boca''. Sin embargo, hay dos desajustes menores: el marcador [a] está anclado a ''apresados'' pero la nota explica una alternativa para ''uno primero de la compañía''; y ''de muchos de los que estaban alrededor del tirano'' suena más pesado de lo necesario frente al griego ''muchos alrededor del tirano''.'
