review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien la estructura y el sentido general del hebreo: contraste inicial («Pero yo»), pareja «pobre y necesitado», título divino אֲדֹנָי como «el Señor», petición final urgente, y la relación paralela «mi ayuda y mi libertador». Sin embargo, la nota al pie no preserva fielmente las alternativas documentadas en el rastro inglés para יַחֲשָׁב לִי, porque introduce «mi causa», que no está explícito en el hebreo ni en la auditoría inglesa.'
  spanish_quality_summary: El español es claro, natural y eclesialmente legible. «Pero yo soy pobre y necesitado; el Señor piensa en mí. Tú eres mi ayuda y mi libertador; mi Dios, no tardes» fluye bien y mantiene dignidad bíblica. Solo conviene ajustar la nota para evitar expansión interpretativa.
  glossary_alignment: 'La terminología está bien alineada con el proyecto: אֲדֹנָי se traduce correctamente como «el Señor» y no como «Yahvé»; אֱלֹהַי como «mi Dios»; no hay conflictos con términos doctrinales principales. «Libertador» es aceptable para מְפַלְטִי en este contexto.'
  issues:
  - severity: medium
    issue: La nota al pie añade «mi causa» como alternativa de יַחֲשָׁב לִי.
    rationale: El hebreo y la auditoría inglesa ofrecen alternativas como «tiene consideración por mí / me tiene en cuenta / pensará en mí», pero «mi causa» introduce un objeto no expresado, estrechando y reinterpretando el sentido.
  revised_spanish_text: Pero yo soy pobre y necesitado; el Señor piensa en mí. Tú eres mi ayuda y mi libertador; mi Dios[a], no tardes.
  revised_footnotes:
  - marker: a
    text: O «el Señor tiene consideración por mí» o «el Señor pensará en mí».
    reason: lexical_alternative
  revision_rationale: Se conserva el texto principal, que es fiel y natural, y se corrige únicamente la nota al pie para ajustarla a las alternativas léxicas documentadas sin añadir interpretación no explícita en el hebreo.
