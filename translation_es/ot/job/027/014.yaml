review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura condicional, el sentido de multiplicación, el destino violento de los hijos y la amplitud de «descendientes». Sin embargo, no preserva con suficiente precisión la decisión léxica del POB sobre בָנָיו como «sons»: «sus hijos» en español puede sonar genérico y diluye el masculino explícito del hebreo. Además, falta trasladar la nota alternativa preservada en el rastro inglés sobre la expresión idiomática «no se saciarán de pan».'
  spanish_quality_summary: El español es claro, natural y digno. «Será para la espada» y «no se saciarán de pan» son legibles y fieles. La única mejora principal es especificar «sus hijos varones» para mantener la precisión semántica sin perder claridad, y añadir la nota para explicar el valor idiomático de «pan».
  glossary_alignment: No hay términos del glosario mayor en conflicto. La revisión necesaria es de exactitud de género léxico («sons») y de conservación de la nota lexical del POB. «Espada», «descendientes» y «pan» están bien alineados con el análisis fuente.
  issues:
  - severity: medium
    issue: «sus hijos» no refleja con suficiente precisión el hebreo masculino explícito בָנָיו
    rationale: El rastro inglés decidió mantener «his sons» por política de precisión de género. En español, «hijos» puede funcionar como masculino específico, pero también se oye con frecuencia como inclusivo/genérico; «sus hijos varones» evita esa ambigüedad en un lugar donde la fuente sí especifica sexo masculino.
  - severity: medium
    issue: Falta la nota léxica sobre «no se saciarán de pan»
    rationale: El POB inglés conserva una nota que explica el hebraísmo literal «ser satisfechos de/con pan» como modismo de falta de alimento suficiente. Debe preservarse en español para mantener el mismo rastro interpretativo y evitar posible opacidad.
  revised_spanish_text: Si sus hijos varones se multiplican, será para la espada, y sus descendientes no se saciarán de pan[a].
  revised_footnotes:
  - marker: a
    text: O «no quedarán satisfechos con pan». La expresión hebrea es literalmente «no serán llenados/satisfechos [con] pan», un modismo que indica falta de alimento suficiente.
    reason: lexical_alternative
