revisions:
- from: Si se levanta en medio de ti un profeta o un soñador de sueños, y te da una señal o un prodigio[a],
  to: Si se levanta entre ustedes un profeta o un soñador de sueños, y te da una señal o un prodigio[a],
  rationale: Se ajusta una frase de ubicación para mejorar la legibilidad comunitaria en español sin apartarse del hebreo, y se amplía la nota léxica para reflejar con más fidelidad la alternativa documentada en la auditoría inglesa.
