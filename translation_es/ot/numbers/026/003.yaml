    issue: La frase principal adopta 'frente a Jericó' en vez de una formulación más neutral para עַל יַרְדֵּן יְרֵחוֹ.
    rationale: La auditoría inglesa eligió como texto principal 'by the Jordan at Jericho' y preservó 'opposite Jericho' solo como alternativa en nota. El español debería reflejar esa jerarquía de decisiones, salvo razón fuerte en contra, que aquí no aparece.
  - severity: low
