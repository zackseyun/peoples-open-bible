review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español sigue el antiguo texto griego de Sirácida 9:10 (''No abandones a un amigo antiguo...''), pero el rastro de auditoría del POB en inglés fue revisado para esta tarea y ahora traduce la línea hebrea suministrada: ''By the beauty of a woman many have been ruined, and her lovers burn like fire.'' Por tanto, el borrador no está alineado con la traducción inglesa auditada ni con la revisión aplicada registrada.'
  spanish_quality_summary: El español del borrador es claro y legible, pero traduce el versículo equivocado para este registro. Además, 'amigo antiguo' suena algo poco idiomático frente a 'amigo de hace tiempo' si ese fuera el texto correcto, pero ese detalle queda superado por el problema principal de contenido.
  glossary_alignment: 'No hay conflictos relevantes con la terminología base del proyecto en el texto revisado propuesto. La nueva redacción usa español natural y digno: ''la belleza de una mujer'', ''muchos han sido arruinados'', ''sus amantes arden como fuego''.'
  issues:
  - severity: high
    issue: El borrador traduce un texto distinto del que consta en la auditoría inglesa actual.
    rationale: La auditoría aplicada reemplazó explícitamente la versión del amigo antiguo por 'By the beauty of a woman many have been ruined, and her lovers burn like fire.' El español debe seguir ese estado auditado del registro.
  - severity: medium
    issue: La nota textual actual contradice el texto principal del borrador.
    rationale: 'La nota dice que la línea hebrea no coincide con Sirácida 9:10 y que por eso se sigue el griego, pero la revisión aplicada del POB inglés hizo lo contrario: adoptó la línea hebrea para este registro. Aunque la situación textual es extraña, el español debe reflejar el expediente auditado presente.'
  revised_spanish_text: Por la belleza de una mujer, muchos han sido arruinados, y sus amantes arden como fuego.
  revision_rationale: 'Se reemplaza todo el texto porque el borrador español traduce la lectura griega anterior, mientras que el expediente auditado para este registro ahora usa la línea hebrea suministrada. La redacción española sigue de cerca el sentido documentado: בְּתֹאַר אִשָּׁה = ''por la belleza de una mujer''; הָשְׁחְתוּ רַבִּים = ''muchos han sido arruinados''; וְכֵן אֹהֲבֶיהָ בְּאֵשׁ תְּלַהֵט = ''y sus amantes arden como fuego''. No se añade nota porque la versión inglesa revisada ya no conserva la nota textual en su texto final para este registro.'
