base_translation:
  language: en
  yaml_path: translation/ot/jeremiah/020/016.yaml
  text: Let that man be like the cities that Yahweh overthrew without relenting[b][a], and let him hear a cry in the morning and an alarm at noon.
  footnotes:
  - marker: a
    text: Or 'an alarm' or 'a trumpet blast' for 'battle shout' (Hebrew teru'ah).
    reason: lexical_alternative
  - marker: b
    text: The wording likely echoes the cities the LORD overthrew in judgment, such as Sodom and Gomorrah.
    reason: cross_reference
