translation:
  language: es
  text: 'Cuando tu hijo te pregunte en el futuro[a], diciendo[b]: «¿Qué son los testimonios, los estatutos y los juicios que Yahvé nuestro Dios les mandó a ustedes?»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «mañana»; aquí se usa idiomáticamente para un tiempo futuro, por eso se traduce «en el futuro».'
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo literalmente: «¿Qué son los testimonios, los estatutos y los juicios...?». La pregunta no añade explícitamente «significado», aunque ese sentido puede estar implícito en el contexto.'
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  english_pob_choice: When
  chosen_spanish: Cuando
  alternatives_spanish:
  - Si
  - Porque
  lexicon: HALOT
  rationale: Aquí introduce una situación futura prevista; «Cuando» conserva el valor eventual sin volverla meramente condicional ni explicativa.
- source_word: בִנְךָ
  english_pob_choice: your son
  chosen_spanish: tu hijo
  alternatives_spanish:
  - tu niño
  - tu descendiente
  lexicon: HALOT
  rationale: El hebreo es masculino singular y el contexto familiar es directo; «hijo» mantiene la referencia precisa y natural en español.
- source_word: מָחָר
  english_pob_choice: in time to come
  chosen_spanish: en el futuro
  alternatives_spanish:
  - mañana
  - más adelante
  lexicon: HALOT
  rationale: Aunque literalmente es «mañana», aquí funciona idiomáticamente como referencia a un tiempo venidero; «en el futuro» comunica bien el valor temporal sin perder la distancia prevista.
- source_word: לֵאמֹר
  english_pob_choice: saying
  chosen_spanish: diciendo
  alternatives_spanish:
  - y diciendo
  - al decir
  lexicon: HALOT
  rationale: Introduce el contenido de la pregunta; «diciendo» es una forma transparente y fiel en español.
- source_word: מָה
  english_pob_choice: What are
  chosen_spanish: ¿Qué son
  alternatives_spanish:
  - ¿Cuál es el significado de
  - ¿Qué significan
  lexicon: HALOT
  rationale: La hebrea pregunta de forma directa por los elementos mencionados. «¿Qué son?» preserva la estructura básica sin añadir una glosa interpretativa que el texto no expresa explícitamente.
- source_word: הָעֵדֹת
  english_pob_choice: the testimonies
  chosen_spanish: los testimonios
  alternatives_spanish:
  - los preceptos
  - las evidencias
  lexicon: HALOT
  rationale: «Testimonios» conserva el término distintivo del conjunto legal-covenantal y evita diluirlo en un vocablo más general.
- source_word: הַחֻקִּים
  english_pob_choice: the statutes
  chosen_spanish: los estatutos
  alternatives_spanish:
  - los decretos
  - las ordenanzas
  lexicon: HALOT
  rationale: «Estatutos» es un equivalente estable en español bíblico y mantiene la diferenciación entre los tres sustantivos.
- source_word: הַמִּשְׁפָּטִים
  english_pob_choice: the judgments
  chosen_spanish: los juicios
  alternatives_spanish:
  - las decisiones
  - las sentencias
  lexicon: HALOT
  rationale: מִשְׁפָּטִים puede referirse a decisiones o juicios legales; «juicios» conserva la fuerza jurídica y la tríada del texto.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahveh
  - el SEÑOR
  lexicon: HALOT
  rationale: 'Se sigue la convención del proyecto para el Tetragrámaton: transliterar el nombre divino como «Yahvé» en lugar de sustituirlo por un título.'
- source_word: אֱלֹהֵינוּ
  english_pob_choice: our God
  chosen_spanish: nuestro Dios
  alternatives_spanish:
  - nuestro Dios y Señor
  lexicon: HALOT
  rationale: La posesión expresa relación de pacto; «nuestro Dios» reproduce esa relación de manera directa y natural.
- source_word: צִוָּה ... אֶתְכֶם
  english_pob_choice: commanded you
  chosen_spanish: les ha mandado
  alternatives_spanish:
  - les mandó
  - os ha mandado
  lexicon: HALOT
  rationale: El verbo en perfecto hebreo con objeto plural se vierte con un perfecto compuesto fluido en español; «les» permite mantener el plural de destinatarios en castellano general. En lectura pública, el referente es el grupo de Israel interpelado en segunda persona plural implícita.
theological_decisions:
- issue: Tratamiento del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahveh
  - el SEÑOR
  rationale: La política del proyecto exige preservar el nombre propio revelado y no ocultarlo tras una sustitución. «Yahvé» es la forma española adoptada para el Tetragrámaton en el texto principal.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Precisión en la tríada legal 'testimonies / statutes / judgments'
  english_pob_reading: the testimonies and the statutes and the judgments
  chosen_spanish_reading: los testimonios, y los estatutos, y los juicios
  alternative_spanish_readings:
  - los testimonios, los estatutos y los juicios
  - los preceptos, los estatutos y las sentencias
  rationale: Se conserva la tríada diferenciada del hebreo y del audit trail inglés. No se colapsan los tres términos en una sola categoría general, porque el texto los distingue deliberadamente.
  doctrine_reference: DOCTRINE.md Translation philosophy §2
- issue: Referencia plural de los destinatarios en 'commanded you'
  english_pob_reading: commanded you
  chosen_spanish_reading: les ha mandado
  alternative_spanish_readings:
  - les mandó
  - os ha mandado
  rationale: El hebreo usa objeto plural, y el discurso se dirige al pueblo. En español de uso amplio, «les» expresa el plural sin marcar regionalmente el voseo; se evita singularizar el mandato.
  doctrine_reference: DOCTRINE.md Translation philosophy §4
translation_notes:
  revision_awareness: La versión inglesa auditada revisó una glosa interpretativa más amplia («What is the meaning of») para acercarse a la pregunta literal del hebreo («What are»). La redacción española sigue esa revisión y evita introducir una paráfrasis explicativa ajena al texto. También se mantuvo la distinción terminológica de la tríada legal y la transliteración del nombre divino conforme a la política del proyecto.
  spanish_consistency_notes:
  - Se conserva el paralelismo y la enumeración del hebreo con comas y una sola conjunción final implícita en estilo español fluido.
  - «Yahvé» se usa consistentemente para יְהוָה.
  - La expresión «en el futuro» refleja el valor idiomático de מָחָר sin convertirlo en una referencia temporal vaga.
  - Se evita neutralizar «hijo» a «hijo/a» o «hijo» genérico, por fidelidad al masculino singular del hebreo.
