base_translation:
  language: en
  yaml_path: translation/ot/judges/002/020.yaml
  text: So the anger of Yahweh burned against Israel[a], and he said, “Because this nation has transgressed my covenant that I commanded their fathers[b], and they have not listened to my voice,”
  footnotes:
  - marker: a
    text: Or 'has broken my covenant.' The Hebrew verb literally means 'crossed over' and in covenant context carries the sense of violating or transgressing.
    reason: lexical_alternative
  - marker: b
    text: Or 'they have not obeyed my voice.' The Hebrew idiom 'listen to my voice' often includes the sense of obedience.
    reason: lexical_alternative
