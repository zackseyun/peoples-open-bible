translation:
  language: es
  text: A ti[a], Dios de mis padres, te doy gracias y te alabo, porque me has dado sabiduría y poder, y ahora me has hecho saber lo que te pedimos[b], pues nos has hecho saber el asunto[c] del rey.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'Dios de mis antepasados'. El arameo dice literalmente 'Dios de mis padres', una expresión pactual que vincula a Daniel con quienes le precedieron.
    reason: lexical_alternative
  - marker: b
    text: O 'lo que buscamos de ti'. El arameo expresa una petición hecha en plural; por eso el español mantiene 'te pedimos'.
    reason: lexical_alternative
  - marker: c
    text: O 'la palabra del rey'. El término arameo es amplio y puede significar 'palabra', 'asunto' o 'cosa'; aquí se refiere a lo que el rey había planteado.
    reason: lexical_alternative
lexical_decisions:
- source_word: אֱלָהּ אֲבָהָתִי
  english_pob_choice: O God of my fathers
  chosen_spanish: oh Dios de mis padres
  alternatives_spanish:
  - oh Dios de mis antepasados
  lexicon: HALOT
  rationale: La expresión aramea es literalmente 'Dios de mis padres'. En español, 'de mis padres' conserva la continuidad pactual y la fórmula bíblica sin suavizarla a un término más general como 'antepasados'.
- source_word: מְהוֹדֵא וּמְשַׁבַּח אֲנָה
  english_pob_choice: I give thanks and praise
  chosen_spanish: doy gracias y alabo
  alternatives_spanish:
  - te doy gracias y alabo
  - doy gracias y te alabo
  lexicon: HALOT
  rationale: 'Los dos participios expresan dos acciones coordinadas: agradecer y alabar. ''Doy gracias y alabo'' reproduce ambas de manera natural en español y mantiene el tono solemne de la doxología.'
- source_word: חָכְמְתָא וּגְבוּרְתָא
  english_pob_choice: wisdom and might
  chosen_spanish: sabiduría y poder
  alternatives_spanish:
  - sabiduría y fuerza
  - sabiduría y valentía
  lexicon: HALOT
  rationale: '''Sabiduría'' es directo. Para גְבוּרְתָא, ''poder'' comunica mejor la capacidad divina otorgada en este contexto que una fuerza meramente física, y mantiene el registro elevado del pasaje.'
- source_word: וּכְעַן
  english_pob_choice: and now
  chosen_spanish: y ahora
  alternatives_spanish:
  - ahora
  - y en este momento
  lexicon: HALOT
  rationale: La partícula marca el paso a la acción inmediata de Dios. 'Y ahora' es una equivalencia natural y fiel al valor discursivo del arameo.
- source_word: הוֹדַעְתַּנִי
  english_pob_choice: you have made known to me
  chosen_spanish: me has hecho saber
  alternatives_spanish:
  - me has dado a conocer
  - me has revelado
  lexicon: HALOT
  rationale: '''Hacer saber'' sigue de cerca el verbo causativo de ידע y evita añadir una connotación más interpretativa como ''revelar'', aunque esta sea posible.'
- source_word: דִּי בְעֵינָא מִנָּךְ
  english_pob_choice: what we requested from you
  chosen_spanish: lo que te pedimos
  alternatives_spanish:
  - lo que te solicitamos
  - lo que te pedimos a ti
  lexicon: HALOT
  rationale: El texto arameo usa primera persona plural, por lo que conviene conservar el plural en español. 'Te pedimos' comunica con naturalidad la petición hecha por Daniel y sus compañeros.
- source_word: מִלַּת מַלְכָּא
  english_pob_choice: the king’s matter
  chosen_spanish: la palabra del rey
  alternatives_spanish:
  - el asunto del rey
  - el asunto que el rey planteó
  lexicon: HALOT
  rationale: מִלָּה puede significar 'palabra', 'asunto' o 'cosa'. Aquí el contexto inmediato remite al contenido planteado por el rey, y 'palabra' preserva la amplitud semántica del término con una conexión posible al encargo real.
- source_word: הוֹדַעְתֶּנָא
  english_pob_choice: you have made known to us
  chosen_spanish: nos has hecho saber
  alternatives_spanish:
  - nos lo has dado a conocer
  - nos has revelado
  lexicon: HALOT
  rationale: 'Se preserva el plural explícito: Dios ha hecho saber esto ''a nosotros'', no solo a Daniel. ''Nos has hecho saber'' mantiene esa referencia comunitaria y la correspondencia con el plural de la petición.'
theological_decisions:
- issue: Continuidad pactual en la invocación a Dios
  english_pob_reading: O God of my fathers
  chosen_spanish_reading: oh Dios de mis padres
  alternative_spanish_readings:
  - oh Dios de mis antepasados
  rationale: La fórmula evoca la continuidad de Daniel con la historia del pueblo de Dios. En español, 'mis padres' conserva mejor el eco bíblico y la relación de pacto que 'antepasados', aunque esta última sea posible.
  doctrine_reference: Translation philosophy §1, §6
- issue: Preservación del plural en la petición y la respuesta
  english_pob_reading: what we requested from you ... you have made known to us
  chosen_spanish_reading: lo que te pedimos ... nos has hecho saber
  alternative_spanish_readings:
  - lo que te pedí ... me has hecho saber
  rationale: El arameo pasa explícitamente al plural en la segunda mitad del versículo. Mantenerlo evita armonizar el texto con el singular cercano y preserva la dimensión comunitaria de la oración de Daniel con sus compañeros.
  doctrine_reference: Translation philosophy §1, §5
translation_notes:
  revision_awareness: La redacción sigue de cerca la revisión final inglesa, que prefirió 'requested' en vez de 'asked' por un registro más formal. En español se reflejó ese tono con 'te pedimos' y no con una paráfrasis más expansiva. También se conservó el plural explícito de la segunda mitad del versículo, coherente con el audit trail inglés y con el arameo.
  spanish_consistency_notes:
  - Se mantuvo 'Dios' en mayúscula por referencia directa al Dios de Israel.
  - Se eligió 'sabiduría y poder' para conservar el paralelismo y el registro elevado.
  - La frase 'de mis padres' se conserva como fórmula bíblica transparente; la nota ofrece la alternativa 'antepasados'.
  - Se preserva el plural ('te pedimos', 'nos has hecho saber') conforme al arameo.
  - '''La palabra del rey'' queda anotada como alternativa semántica amplia, sin cerrar el sentido a una sola opción.'
