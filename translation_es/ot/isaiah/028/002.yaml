translation:
  language: es
  text: He aquí[a], el Señor tiene uno poderoso y fuerte; como una tormenta de granizo, una tempestad destructora, como una tormenta de aguas poderosas que se desbordan, lo arroja[b] a la tierra con su mano.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «para el Señor hay uno poderoso y fuerte». El hebreo puede enfatizar que este agente pertenece al Señor o está disponible para su uso.
    reason: lexical_alternative
  - marker: b
    text: O «lo pone por tierra con la mano». El verbo hebreo puede entenderse de manera menos violenta, pero la imagen de tormenta favorece un sentido enérgico.
    reason: alternative_reading
lexical_decisions:
- source_word: הִנֵּה
  english_pob_choice: Behold
  chosen_spanish: ¡Mira!
  alternatives_spanish:
  - He aquí
  - Mira
  lexicon: HALOT
  rationale: Es un marcador discursivo de anuncio profético que llama la atención. En español, «¡Mira!» conserva el impulso exhortativo y la inmediatez mejor que una fórmula más arcaica.
- source_word: חָזָק וְאַמִּץ
  english_pob_choice: mighty and strong
  chosen_spanish: poderoso y fuerte
  alternatives_spanish:
  - fuerte y poderoso
  - poderoso y valiente
  lexicon: HALOT
  rationale: Los dos adjetivos refuerzan la capacidad y la intensidad del agente. «Poderoso y fuerte» comunica bien la doble cualidad sin sonar forzado en español.
- source_word: לַאדֹנָי
  english_pob_choice: the Lord
  chosen_spanish: el Señor
  alternatives_spanish:
  - para el Señor
  - del Señor
  lexicon: HALOT
  rationale: La construcción hebrea puede expresar pertenencia, disponibilidad o relación con Yahvé. En español, «el Señor tiene» expresa de forma natural esa idea de posesión/disposición sin resolver en exceso la ambigüedad.
- source_word: כְּזֶרֶם
  english_pob_choice: like a storm
  chosen_spanish: como un torbellino
  alternatives_spanish:
  - como una tormenta
  - como un aguacero violento
  lexicon: HALOT
  rationale: זֶרֶם puede referirse a una irrupción violenta de lluvia o aguas. Dado que el verso encadena granizo, tempestad y aguas desbordadas, «torbellino» ayuda a mantener la energía destructiva de la imagen meteorológica.
- source_word: בָּרָד
  english_pob_choice: hail
  chosen_spanish: granizo
  alternatives_spanish:
  - pedrisco
  lexicon: HALOT
  rationale: Es el equivalente directo y claro del término hebreo.
- source_word: שַׂעַר קָטֶב
  english_pob_choice: a destroying tempest
  chosen_spanish: una tempestad destructora
  alternatives_spanish:
  - una tempestad de destrucción
  - un vendaval devastador
  lexicon: HALOT
  rationale: La secuencia constructa describe una tempestad caracterizada por destrucción. «Tempestad destructora» preserva ese valor sin suavizar la fuerza del término קָטֶב.
- source_word: מַיִם כַּבִּירִים שֹׁטְפִים
  english_pob_choice: mighty, overflowing waters
  chosen_spanish: aguas poderosas que se desbordan
  alternatives_spanish:
  - aguas caudalosas que inundan
  - aguas abundantes y torrentosas
  lexicon: HALOT
  rationale: כַּבִּירִים expresa grandeza o potencia, y שֹׁטְפִים comunica el desbordamiento. La formulación elegida conserva ambos matices en español fluido.
- source_word: הִנִּיחַ
  english_pob_choice: he casts it down
  chosen_spanish: lo arroja
  alternatives_spanish:
  - lo echa por tierra
  - lo derriba
  lexicon: HALOT
  rationale: En este contexto de juicio, el verbo tiene fuerza causativa y de abatimiento. «Lo arroja» preserva la violencia de la imagen, aunque en español el complemento implícito se entiende por contexto.
- source_word: לָאָרֶץ
  english_pob_choice: to the earth
  chosen_spanish: a la tierra
  alternatives_spanish:
  - al suelo
  - a la tierra/terreno
  lexicon: HALOT
  rationale: La escena describe una caída violenta hacia abajo; «a la tierra» conserva la amplitud del hebreo y el tono elevado del pasaje.
- source_word: בְּיָד
  english_pob_choice: with his hand
  chosen_spanish: con su mano
  alternatives_spanish:
  - por su mano
  - mediante su mano
  lexicon: HALOT
  rationale: La imagen antropomórfica subraya la agencia directa. «Con su mano» es la forma más natural y fiel en español.
theological_decisions:
- issue: Identidad del «poderoso y fuerte»
  english_pob_reading: Rendered generically as 'one who is mighty and strong' without specifying whether the referent is Assyria, a divinely appointed conqueror, or the Lord himself acting in judgment.
  chosen_spanish_reading: 'Se mantiene la referencia abierta: «El Señor tiene uno poderoso y fuerte».'
  alternative_spanish_readings:
  - «El Señor tiene a Asiria como instrumento poderoso y fuerte»
  - «Para el Señor hay uno poderoso y fuerte»
  - «El Señor mismo aparece como el poderoso y fuerte»
  rationale: El hebreo no identifica de inmediato al agente, aunque el contexto sugiere un instrumento del juicio divino. La versión española conserva esa tensión y evita resolver interpretativamente lo que el texto deja abierto.
  doctrine_reference: Preservar la ambigüedad teológica y contextual del sujeto implícito.
- issue: Continuidad del sujeto y del objeto en la cláusula final
  english_pob_reading: Used 'he casts it down' with an implicit masculine subject continuing from the mighty and strong one, while leaving the object implicit except for English 'it.'
  chosen_spanish_reading: Se traduce «lo arroja», con sujeto implícito que continúa del «poderoso y fuerte» y objeto implícito recuperable por el contexto.
  alternative_spanish_readings:
  - «lo pone por tierra»
  - «lo derriba a tierra»
  - «arroja [eso] a la tierra»
  rationale: El hebreo permite mantener un sujeto singular personal. El español necesita un objeto explícito; «lo» funciona de manera sobria sin especificar más de lo que el contexto inmediato autoriza.
  doctrine_reference: Conservar la referencia ambigua del agente y del objeto sin sobreinterpretar.
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión final del POB inglés, que prefirió «casts it down» sobre «hurls it down» por un registro ligeramente más formal. La versión española responde con «lo arroja», manteniendo la fuerza del juicio sin perder naturalidad. También se respetó la decisión inglesa de no identificar explícitamente al agente, preservando la ambigüedad del hebreo.
  spanish_consistency_notes:
  - Se usó «el Señor» para לַאדֹנָי siguiendo la convención de la fuente inglesa y el registro bíblico estándar en español, sin introducir «Yahvé» porque aquí el hebreo no contiene el tetragrámaton.
  - 'Se mantuvo la imaginería meteorológica acumulativa del versículo: granizo, tempestad destructora y aguas que se desbordan.'
  - No se añadió un sujeto explícito adicional al final; el referente queda unido al «poderoso y fuerte» de la primera cláusula.
  - Se prefirió una construcción española fluida pero cercana al orden y a la intensidad del hebreo, evitando una paráfrasis explicativa.
