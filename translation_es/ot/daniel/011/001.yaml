translation:
  language: es
  text: Y en cuanto a mí[a], en el primer año de Darío el medo[b], yo me puse en pie para fortalecerlo y ser para él una fortaleza.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O más literalmente: «Y yo, en el primer año de Darío el medo, estuve de pie para fortalecer y ser una fortaleza para él».'
    reason: lexical_alternative
  - marker: b
    text: En la tradición hebrea este versículo corresponde a Daniel 11:1; en algunas versificaciones se cuenta como Daniel 10:21b–11:1 o como Daniel 11:1 con una división de capítulo ligeramente distinta.
    reason: textual_variant
lexical_decisions:
- source_word: וַאֲנִי
  english_pob_choice: And as for me
  chosen_spanish: Y en cuanto a mí
  alternatives_spanish:
  - Y yo
  - Ahora bien, yo
  lexicon: HALOT
  rationale: La conjunción con el pronombre independiente introduce un giro discursivo de retorno al hablante con énfasis leve. ‘En cuanto a mí’ conserva mejor ese matiz que un simple ‘yo’.
- source_word: בִּשְׁנַת אַחַת
  english_pob_choice: in the first year
  chosen_spanish: en el primer año
  alternatives_spanish:
  - en el año uno
  - en un año
  lexicon: HALOT
  rationale: En datación regnal, la expresión hebrea significa ‘en el primer año’, no ‘en un año’. Es la equivalencia natural en español.
- source_word: לְדָרְיָוֶשׁ הַמָּדִי
  english_pob_choice: of Darius the Mede
  chosen_spanish: de Darío el meda
  alternatives_spanish:
  - para Darío el meda
  lexicon: HALOT
  rationale: El nombre propio se translitera y el etnónimo se traduce como adjetivo gentilicio. ‘De’ expresa con naturalidad la datación regnal en español.
- source_word: עָמְדִי
  english_pob_choice: I stood up
  chosen_spanish: yo me puse en pie
  alternatives_spanish:
  - yo me levanté
  - yo me puse de pie
  - yo tomé mi lugar
  lexicon: HALOT
  rationale: El verbo עמד puede significar ‘estar en pie’ o ‘ponerse de pie/tomar postura’. ‘Me puse en pie’ comunica acción y disposición activa sin perder el sentido básico.
- source_word: לְמַחֲזִיק
  english_pob_choice: to strengthen
  chosen_spanish: para fortalecerlo
  alternatives_spanish:
  - para sostenerlo
  - para darle fuerza
  lexicon: HALOT
  rationale: El hifil de חזק expresa dar fuerza o sostén. ‘Fortalecerlo’ reproduce bien la fuerza lexical y la relación con el objeto implícito.
- source_word: וּלְמָעוֹז
  english_pob_choice: and be a fortress
  chosen_spanish: y ser para él una fortaleza
  alternatives_spanish:
  - y serle una fortaleza
  - y ser para él un baluarte
  - y serle un refugio fortificado
  lexicon: HALOT
  rationale: מָעוֹז designa un lugar o medio de fortaleza/defensa. En español, ‘ser para él una fortaleza’ mantiene la imagen nominal y evita convertirla en una paráfrasis verbal.
- source_word: לוֹ
  english_pob_choice: to him
  chosen_spanish: para él
  alternatives_spanish:
  - a él
  - para Darío
  lexicon: HALOT
  rationale: El pronombre remite naturalmente a Darío. ‘Para él’ encaja con ‘ser una fortaleza’, mientras que ‘a él’ sería menos idiomático en esta construcción.
theological_decisions:
- issue: Identidad del hablante y referente del pronombre
  english_pob_reading: The speaker is the angelic figure continuing from the preceding context, and 'him' refers to Darius the Mede.
  chosen_spanish_reading: El hablante sigue siendo la figura angelical del contexto previo, y el ‘él’ se refiere a Darío el meda.
  alternative_spanish_readings:
  - Podría leerse con una división discursiva distinta en algunas tradiciones, lo que afectaría el enlace con el contexto anterior.
  rationale: La sintaxis hebrea no plantea un problema doctrinal, pero la traducción debe conservar el sentido narrativo inmediato sin añadir identificación especulativa. ‘Él’ deja el referente natural y contextual.
  doctrine_reference: Daniel 10–11; división textual/versicular de la tradición hebrea y algunas versificaciones inglesas
translation_notes:
  revision_awareness: La redacción española sigue la revisión más reciente del POB inglés, que corrigió ‘protect him’ a una formulación más literal de מָעוֹז (‘fortress/stronghold’). Por eso se evita un verbo como ‘proteger’ y se conserva la imagen nominal ‘ser para él una fortaleza’.
  spanish_consistency_notes:
  - Se mantuvo ‘Darío el meda’ para conservar la transliteración del nombre propio y el gentilicio traducido.
  - Se eligió ‘fortaleza’ para מָעוֹז por ser transparente y fiel; ‘baluarte’ o ‘bastión’ quedarían posibles, pero menos cercanos al registro base.
  - Se usó ‘en cuanto a mí’ para reflejar el énfasis discursivo de וַאֲנִי sin sonar artificial en español.
  - Se evitó ‘SEÑOR’ o cualquier sustitución por máscara teológica, porque no aparece aquí el tetragrámaton ni una cita directa de YHWH.
