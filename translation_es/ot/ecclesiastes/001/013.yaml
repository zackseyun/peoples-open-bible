base_translation:
  language: en
  yaml_path: translation/ot/ecclesiastes/001/013.yaml
  text: And I set my heart to seek and to explore by wisdom all that is done under heaven[b][a]. It is an unhappy task God has given to the sons of man to be occupied with.
  footnotes:
  - marker: a
    text: Or 'to humankind' / 'to human beings.' The Hebrew reads 'to the sons of man,' a masculine expression used generically for humanity.
    reason: lexical_alternative
  - marker: b
    text: Or 'to be afflicted by it' or 'to toil in it.' The Hebrew can carry both the sense of being occupied with something and of being burdened by it.
    reason: lexical_alternative
