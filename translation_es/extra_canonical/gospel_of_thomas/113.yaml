base_translation:
  language: en
  yaml_path: translation/extra_canonical/gospel_of_thomas/113.yaml
  text: 'His disciples said to him[1], "On what day will the kingship[1] come?"


    [He said], "It will not come by watching. They will not say, ‘Look, here!’ or ‘Look, there![2]’ Rather, the Father’s kingship is spread out upon the earth[3][a][3][2], and people do not see it."'
  footnotes:
  - marker: '1'
    text: ⲡⲙⲛⲧⲣⲣⲟ can be rendered ‘kingdom’; ‘kingship’ reflects the abstract ‘reign/rule’ nuance (Crum; Layton).
    reason: lexical_alternative
  - marker: '2'
    text: The ms line-level shows ⲧⲏ ‘there’; the normalized line prints ⲡⲏ ‘sky/heaven.’ The deictic pairing ‘here/there’ fits the immediate syntax; ‘heaven’ would be contextually awkward here.
    reason: textual_variant
  - marker: '3'
    text: ‘Earth’ (ⲡⲕⲁϩ) can also mean ‘land.’ The image is of something already diffused across the ground.
    reason: cultural_note
  - marker: a
    text: Or 'He said,'.
    reason: previous_rendering
