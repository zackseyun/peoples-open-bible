review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura general del hebreo y preserva la agencia divina explícita: Dios es quien provoca y hace venir la coalición contra Babilonia. También mantiene bien el sentido militar de ordenar/formar contra ella y el pasivo de ''ser capturada''. Sin embargo, hay dos problemas de fidelidad fina: (1) «despierto» para מֵעִיר suena menos natural en español para naciones movilizadas que «incito» o «provoco», y puede sugerir despertar del sueño más que suscitar para la guerra; (2) «no volverá vacío» deja un sujeto singular ambiguo no presente en la solución auditada inglesa, que prefirió una formulación impersonal/plural para evitar fijar indebidamente si vuelve la flecha, el guerrero o el atacante. Conviene reparar esto en español.'
  spanish_quality_summary: 'El texto es legible y digno, pero «yo despierto ... una asamblea» resulta algo tieso y poco idiomático en español bíblico natural. «Sus flechas son como las de un guerrero hábil» funciona bien. La última cláusula, «no volverá vacío», suena abrupta y gramaticalmente ambigua en español; una formulación como «ninguna vuelve con las manos vacías» o «ninguno vuelve con las manos vacías» aclara demasiado un referente posible. Lo más natural y fiel al audit trail es mantener la imagen de resultado eficaz con una construcción impersonal/plural aplicada al antecedente inmediato «flechas»: «ninguna vuelve vacía».'
  glossary_alignment: No hay términos del glosario mayor en disputa aquí. Se preserva Babilonia y la referencia geográfica. No aparecen Yahvé/Mesías/etc. La elección «guerrero hábil» está alineada con la justificación léxica documentada para מַשְׂכִּיל.
  issues:
  - severity: medium
    issue: «despierto» para מֵעִיר
    rationale: Aunque formalmente posible, en español suena poco natural con naciones o ejércitos. El hebreo hifil aquí es de suscitar/poner en movimiento para la acción; «incito» o «levanto» comunica mejor la movilización bélica sin perder la agencia divina.
  - severity: high
    issue: «no volverá vacío» introduce un sujeto singular ambiguo
    rationale: El hebreo comprimido ya es ambiguo, pero la POB inglesa decidió no fijar un sujeto singular y lo resolvió con «none returns empty-handed». En español, «no volverá vacío» sugiere que un sujeto masculino singular concreto vuelve, lo cual puede distorsionar la relación entre «flechas» y «guerrero».
  - severity: low
    issue: Notas al pie invertidas respecto del audit trail inglés
    rationale: La nota sobre la compresión hebrea corresponde a la comparación de flechas/guerrero, y la otra a la cláusula final. El borrador español lo maneja razonablemente, pero puede afinarse para reflejar mejor que la alternativa más literal incluye toda la secuencia y no solo el adjetivo «hábil».
  revised_spanish_text: Porque, he aquí, yo incito y hago subir contra Babilonia una asamblea de grandes naciones desde la tierra del norte. Se dispondrán contra ella; desde allí será capturada. Sus flechas son como las de un guerrero hábil[a]; ninguna vuelve vacía[b].
  revised_footnotes:
  - marker: a
    text: 'O: «Sus flechas son como un guerrero hábil que no vuelve vacío». El hebreo comprime la comparación, y la relación exacta entre «flechas» y «guerrero hábil» puede expresarse de manera más literal.'
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: «desde allí», probablemente refiriéndose al lugar desde donde las naciones atacantes se ponen en formación contra Babilonia.'
    reason: cultural_note
  revision_rationale: 'Se revisó «despierto» a «incito» para expresar mejor en español la idea de suscitar naciones para la guerra. Se cambió la cláusula final a «ninguna vuelve vacía» para evitar un sujeto singular engañoso y mantener la eficacia de las flechas como imagen inmediata. También se alinearon las notas con el audit trail inglés: la nota [a] conserva la alternativa literal de la comparación comprimida, y la nota [b] explica «desde allí» en el lugar correspondiente del texto.'
