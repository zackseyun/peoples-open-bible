translation:
  language: es
  text: Él no ha tratado con nosotros conforme a nuestros pecados[a], ni nos ha retribuido conforme a nuestras iniquidades.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «No ha hecho con nosotros como merecen nuestros pecados, ni nos ha retribuido como merecen nuestras iniquidades»'
    reason: lexical_alternative
lexical_decisions:
- source_word: כַּ/חֲטָאֵינוּ
  english_pob_choice: according to our sins
  chosen_spanish: conforme a nuestros pecados
  alternatives_spanish:
  - según nuestros pecados
  - de acuerdo con nuestros pecados
  - como merecen nuestros pecados
  lexicon: HALOT
  rationale: El prefijo כ expresa comparación o medida; por eso conviene una solución con valor proporcional. «Conforme a» comunica bien la idea de correspondencia sin volverla una identidad simple. «Pecados» conserva el sentido de חטאים como actos pecaminosos.
- source_word: עָשָׂה לָנוּ
  english_pob_choice: has dealt with us
  chosen_spanish: ha tratado con nosotros
  alternatives_spanish:
  - ha hecho con nosotros
  - ha actuado hacia nosotros
  - ha obrado con nosotros
  lexicon: HALOT
  rationale: עָשָׂה es amplio, pero en este contexto de trato divino se entiende como la manera en que Dios se ha conducido con su pueblo. «Ha tratado con nosotros» es natural en español y conserva el sentido idiomático sin exagerar el matiz.
- source_word: וְלֹא
  english_pob_choice: nor
  chosen_spanish: ni
  alternatives_spanish:
  - y no
  - ni tampoco
  lexicon: HALOT
  rationale: La negación repetida enlaza dos miembros paralelos. «Ni» reproduce con naturalidad la coordinación negativa del hebreo y del inglés POB.
- source_word: כַּ/עֲוֺנֹתֵינוּ
  english_pob_choice: according to our iniquities
  chosen_spanish: conforme a nuestras iniquidades
  alternatives_spanish:
  - según nuestras iniquidades
  - de acuerdo con nuestras culpas
  - conforme a nuestra culpa
  lexicon: HALOT
  rationale: Se mantiene la distinción léxica entre חטאֵינוּ y עֲוֺנֹתֵינוּ con «pecados» / «iniquidades». «Iniquidades» conserva el paralelo poético y el alcance de עון como iniquidad o culpa.
- source_word: גָּמַל עָלֵינוּ
  english_pob_choice: repaid us
  chosen_spanish: nos ha pagado
  alternatives_spanish:
  - nos ha retribuido
  - nos ha retribuido conforme
  - nos ha devuelto
  lexicon: HALOT
  rationale: גמל puede significar obrar, recompensar o retribuir según el contexto. En sentido negativo, «nos ha pagado» comunica la idea de dar lo debido en retribución. En español bíblico puede sonar fuerte, pero aquí mantiene la fuerza del verbo sin perder claridad.
- source_word: עָלֵינוּ
  english_pob_choice: us
  chosen_spanish: nos
  alternatives_spanish:
  - sobre nosotros
  - a nosotros
  lexicon: HALOT
  rationale: Aunque la preposición es literalmente «sobre», con el verbo de retribución el español natural pide objeto directo. «Nos» preserva el sentido relacional y evita una construcción forzada.
- source_word: לֹא ... וְלֹא
  english_pob_choice: has not ... nor
  chosen_spanish: no ... ni
  alternatives_spanish:
  - no ... y no
  - no ... tampoco
  lexicon: HALOT
  rationale: La doble negación paralela queda bien con «no ... ni». Es la forma más fluida y fiel para reproducir el ritmo del hebreo.
theological_decisions:
- issue: Si la afirmación expresa solo juicio temporal o una negación absoluta de todo castigo divino
  english_pob_reading: A general statement that God does not treat his people in proportion to their sins and iniquities
  chosen_spanish_reading: Una afirmación general de que Dios no trata a su pueblo en proporción a sus pecados e iniquidades
  alternative_spanish_readings:
  - Una afirmación limitada a castigos temporales
  - Una negación de todo juicio o disciplina divina
  rationale: El hebreo habla de la manera misericordiosa en que Dios trata a su pueblo, sin precisar si se refiere solo a consecuencias temporales ni convertirlo en una negación absoluta de todo juicio. La traducción conserva esa amplitud.
  doctrine_reference: Translation philosophy §3
translation_notes:
  revision_awareness: 'Coincide con el control de revisión más reciente: no hubo cambios necesarios y el nivel de acuerdo fue alto. La redacción española mantiene esa lectura estable, conservando la paralelismo y la tensión léxica entre «pecados» e «iniquidades».'
  spanish_consistency_notes:
  - Se mantiene Yahvé como norma general del proyecto, pero este versículo no contiene el nombre divino explícito.
  - Se conserva la distinción entre «pecados» e «iniquidades» para reflejar חטא / עוון.
  - Se evita «SEÑOR» como sustituto del nombre divino porque aquí no aparece el tetragrámaton.
  - La nota textual se expresa como alternativa de traducción, no como variante manuscrita.
