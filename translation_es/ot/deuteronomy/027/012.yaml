translation:
  language: es
  text: 'Estos estarán de pie en el monte Gerizim para bendecir al pueblo cuando crucen ustedes el Jordán: Simeón, Leví, Judá, Isacar, José[a] y Benjamín.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: José aquí representa a las tribus de José, Efraín y Manasés, en la lista tribal.
    reason: cross_reference
lexical_decisions:
- source_word: אֵלֶּה
  english_pob_choice: These
  chosen_spanish: Estos
  alternatives_spanish:
  - Estas
  - Estos mismos
  lexicon: HALOT
  rationale: El demostrativo plural introduce a las tribus señaladas. «Estos» es natural en español y conserva la deíxis del texto sin añadir énfasis innecesario.
- source_word: יַֽעַמְד֞וּ
  english_pob_choice: shall stand
  chosen_spanish: se pondrán en pie
  alternatives_spanish:
  - estarán en pie
  - se mantendrán en pie
  lexicon: HALOT
  rationale: En este contexto legal/instructivo, el verbo expresa la colocación ritual de las tribus. «Se pondrán en pie» preserva la idea de estar de pie sin sonar forzado en español.
- source_word: לְבָרֵךְ
  english_pob_choice: to bless
  chosen_spanish: para bendecir
  alternatives_spanish:
  - para bendecir a
  - con el fin de bendecir
  lexicon: HALOT
  rationale: El infinitivo con ל indica propósito. «Para bendecir» refleja esa finalidad de manera directa y fiel.
- source_word: הָעָם
  english_pob_choice: the people
  chosen_spanish: al pueblo
  alternatives_spanish:
  - al pueblo de Israel
  - a la gente
  lexicon: HALOT
  rationale: «Pueblo» mantiene el tono de comunidad pactal del contexto deuteronómico y suena más preciso que «gente».
- source_word: עַל הַר גְּרִזִים
  english_pob_choice: on Mount Gerizim
  chosen_spanish: sobre el monte Gerizim
  alternatives_spanish:
  - en el monte Gerizim
  - sobre el monte Gerizín
  lexicon: HALOT
  rationale: «Sobre el monte Gerizim» reproduce el valor locativo de עַל y conserva el nombre propio transliterado conforme al criterio del proyecto.
- source_word: בְּעָבְרְכֶם אֶת הַיַּרְדֵּן
  english_pob_choice: when you cross the Jordan
  chosen_spanish: cuando crucen el Jordán
  alternatives_spanish:
  - cuando pasen el Jordán
  - cuando hayan cruzado el Jordán
  lexicon: HALOT
  rationale: La construcción temporal con infinitivo en hebreo se vierte de forma natural con una subordinada temporal en español. El plural refleja la referencia colectiva a Israel.
- source_word: שִׁמְעוֹן
  english_pob_choice: Simeon
  chosen_spanish: Simeón
  alternatives_spanish:
  - Simeón
  lexicon: HALOT
  rationale: Transliteración estándar del nombre tribal en español.
- source_word: לֵוִי
  english_pob_choice: Levi
  chosen_spanish: Leví
  alternatives_spanish:
  - Leví
  lexicon: HALOT
  rationale: Transliteración estándar del nombre tribal en español con acentuación gráfica natural en español.
- source_word: וִֽיהוּדָה
  english_pob_choice: Judah
  chosen_spanish: Judá
  alternatives_spanish:
  - Judá
  lexicon: HALOT
  rationale: Nombre tribal estándar en español.
- source_word: וְיִשָּׂשכָר
  english_pob_choice: Issachar
  chosen_spanish: Isacar
  alternatives_spanish:
  - Isacar
  lexicon: HALOT
  rationale: Forma española usual del nombre tribal, más natural que una transliteración más cercana al hebreo.
- source_word: וְיוֹסֵף
  english_pob_choice: Joseph
  chosen_spanish: José
  alternatives_spanish:
  - José
  lexicon: HALOT
  rationale: El hebreo nombra a José directamente; en español, la forma establecida es «José». Se mantiene la referencia textual sin expandirla en el texto principal.
- source_word: וּבִנְיָמִן
  english_pob_choice: Benjamin
  chosen_spanish: Benjamín
  alternatives_spanish:
  - Benjamín
  lexicon: HALOT
  rationale: Nombre tribal estándar en español.
theological_decisions:
- issue: Rol ritual de las tribus en la bendición
  english_pob_reading: 'Directive instruction: ''These shall stand ... to bless the people'''
  chosen_spanish_reading: 'Instrucción directiva: «Estos se pondrán en pie ... para bendecir al pueblo»'
  alternative_spanish_readings:
  - «Estos estarán en pie ...»
  - «Estos se alzarán ...»
  rationale: La forma imperativa/ordenada del pasaje se conserva con un futuro de mandato natural en español. «Se pondrán en pie» comunica mejor la disposición ritual que un simple futuro predictivo.
  doctrine_reference: Translation philosophy §1, §6
- issue: Sentido representativo de José en la lista tribal
  english_pob_reading: Retained 'Joseph' in the main text without expansion
  chosen_spanish_reading: Se retiene «José» en el texto principal sin expandirlo
  alternative_spanish_readings:
  - «las tribus de José»
  - «Efraín y Manasés»
  rationale: El hebreo dice literalmente José. Expandir en el texto principal introduciría explicación ausente del original. La representación tribal puede anotarse, pero no reemplazar la forma del texto.
  doctrine_reference: Translation philosophy §1, §5
translation_notes:
  revision_awareness: 'Se corrigió el anclaje de nota al pie: la marca [b] ahora aparece junto a «José» en el texto español, eliminando la validación previa que fallaba por ausencia de marcador en la traducción.'
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» como término por defecto del proyecto, pero en este versículo no aparece el nombre divino.
  - «monte Gerizim» conserva el nombre propio sin adaptación litúrgica.
  - «Jordán» se deja sin expandir a «río» porque el original no lo explicita y el uso bíblico español lo entiende con naturalidad.
  - Se prefirió «pueblo» frente a alternativas más genéricas para sostener el matiz comunitario pactal.
