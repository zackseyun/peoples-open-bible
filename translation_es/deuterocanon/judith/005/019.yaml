translation:
  language: es
  text: Y ahora, habiéndose vuelto a su Dios, subieron de los lugares donde habían sido esparcidos, tomaron posesión de Jerusalén, donde estaba su santuario, y se establecieron en la región montañosa[a], porque había quedado desierta[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «en la serranía» o «en las alturas». La expresión griega designa la zona alta o montañosa.
    reason: lexical_alternative
  - marker: b
    text: O «porque estaba desolada» o «porque estaba sin habitantes».
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐπιστρέψαντες ἐπὶ τὸν θεὸν αὐτῶν
  english_pob_choice: having turned back to their God
  chosen_spanish: habiéndose vuelto a su Dios
  alternatives_spanish:
  - habiendo regresado a su Dios
  - habiéndose convertido a su Dios
  lexicon: BDAG
  rationale: ἐπιστρέφω con ἐπί expresa volver la orientación o lealtad hacia Dios. En español, «haberse vuelto a» conserva la idea direccional y de retorno fiel sin forzar el sentido técnico de «convertirse».
- source_word: ἀνέβησαν
  english_pob_choice: they came up
  chosen_spanish: subieron
  alternatives_spanish:
  - subieron hacia
  - ascendieron
  lexicon: BDAG
  rationale: ἀναβαίνω normalmente significa subir/ascender. «Subieron» es natural en español y conserva el movimiento geográfico asociado con Jerusalén y la tierra alta.
- source_word: ἐκ τῆς διασπορᾶς
  english_pob_choice: from the dispersion
  chosen_spanish: de entre la dispersión
  alternatives_spanish:
  - desde la dispersión
  - de su dispersión
  lexicon: BDAG
  rationale: «Dispersión» reproduce el sustantivo διασπορά y mantiene el valor colectivo del término. «De entre» ayuda a reflejar el matiz de procedencia y el movimiento desde el grupo dispersado.
- source_word: οὗ διεσπάρησαν ἐκεῖ
  english_pob_choice: where they had been scattered there
  chosen_spanish: donde habían sido esparcidos
  alternatives_spanish:
  - donde habían sido dispersados
  - de donde habían sido esparcidos
  lexicon: BDAG
  rationale: El griego es redundante con una marca locativa reforzada. Siguiendo el criterio revisado del POB en inglés, se omite el «allí»/«ahí» redundante para un español más fluido, sin perder la ubicación del esparcimiento.
- source_word: κατέσχον
  english_pob_choice: took possession of
  chosen_spanish: tomaron posesión de
  alternatives_spanish:
  - ocuparon
  - se apoderaron de
  lexicon: BDAG
  rationale: «Tomaron posesión de» refleja con precisión la idea de adquirir control o tenencia. Evita el tono más bélico de «ocuparon» y el más cargado de «se apoderaron de».
- source_word: τὴν Ἰερουσαλὴμ οὗ τὸ ἁγίασμα αὐτῶν
  english_pob_choice: Jerusalem, where their sanctuary was
  chosen_spanish: Jerusalén, donde estaba su santuario
  alternatives_spanish:
  - Jerusalén, donde estaba su santuario sagrado
  - Jerusalén, donde estaba su lugar santo
  lexicon: LEH
  rationale: ἁγίασμα designa un lugar santo o santuario. «Santuario» es la equivalencia más natural y fiel en este contexto; «estaba» sigue la simple localización del original.
- source_word: κατῳκίσθησαν
  english_pob_choice: settled
  chosen_spanish: se establecieron
  alternatives_spanish:
  - se asentaron
  - habitaron
  lexicon: BDAG
  rationale: La forma pasiva puede traducirse de manera idiomática como un hecho de residencia establecida. «Se establecieron» comunica la instalación duradera sin alejarse del valor del verbo.
- source_word: ἐν τῇ ὀρεινῇ
  english_pob_choice: in the hill country
  chosen_spanish: en la región montañosa
  alternatives_spanish:
  - en la zona montañosa
  - en la serranía
  lexicon: LEH
  rationale: ἡ ὀρεινή es una expresión geográfica para el territorio alto o montañoso. «Región montañosa» es claro y digno en español; se evita un calco demasiado idiomático si «colinas» resultara impreciso.
- source_word: ὅτι ἦν ἔρημος
  english_pob_choice: because it had been deserted
  chosen_spanish: porque había quedado desolada
  alternatives_spanish:
  - porque estaba desolada
  - porque había quedado desierta
  lexicon: BDAG
  rationale: ἔρημος puede significar desolado, desierto o sin habitantes. «Había quedado desolada» conserva el sentido de un lugar vaciado y apto para ser habitado de nuevo, en línea con el contexto narrativo.
theological_decisions:
- issue: Retorno a Dios como restauración de fidelidad del pueblo
  english_pob_reading: having turned back to their God
  chosen_spanish_reading: habiéndose vuelto a su Dios
  alternative_spanish_readings:
  - habiéndose convertido a su Dios
  - habiéndose regresado a su Dios
  rationale: El texto no presenta un cambio de deidad, sino una reorientación del pueblo hacia su propio Dios. «Volverse a» conserva el matiz de arrepentimiento/retorno relacional sin imponer terminología doctrinal posterior.
  doctrine_reference: DOCTRINE.md §Translation philosophy 1, 3
translation_notes:
  revision_awareness: 'He seguido la revisión inglesa más reciente al evitar una reproducción torpe de la locución redundante sobre la dispersión y al mantener un español más natural: «de entre la dispersión, donde habían sido esparcidos». También he conservado la secuencia narrativa y la referencia al santuario en Jerusalén sin ampliar el texto más allá del griego.'
  spanish_consistency_notes:
  - Yahvé no aparece en este versículo; por eso se usa «Dios» conforme al griego θεός y al audit trail.
  - «Santuario» mantiene la elección del POB para τὸ ἁγίασμα, en lugar de una formulación eclesiástica más amplia.
  - «Se establecieron» conserva el valor narrativo de asentamiento sin añadir matices inexistentes de edificación o conquista.
