  glossary_alignment: 'No hay términos del glosario base en disputa. Las decisiones léxicas principales son consistentes con el POB: «las palabras», «diez mil hombres», «salió de Jerusalén», y «para ayudarlo». La revisión propuesta mantiene el matiz mental de διάνοια sin desplazarlo a «espíritu» ni sobreinterpretarlo como ira o temor.'
