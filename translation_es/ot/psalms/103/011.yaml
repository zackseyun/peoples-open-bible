review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja correctamente la estructura causal y comparativa del hebreo: כִּי = ''Porque'', כִגְבֹהַּ...עַל הָאָרֶץ = comparación de altura entre cielos y tierra, y יְרֵאָיו = ''los que le temen''. Sin embargo, ''como los cielos son más altos que la tierra'' añade ''más'' y cambia levemente la imagen de ''tan altos... sobre la tierra''. Además, ''amor constante'' capta parte de חסד pero debilita el matiz de amor fiel/constante y su trasfondo pactual mejor preservado por una opción más establecida en español bíblico.'
  spanish_quality_summary: El español es legible y digno, pero la frase 'así de grande es' suena menos natural que 'tan grande es', y 'para con' resulta algo rígido aunque aceptable. La principal mejora de estilo y fidelidad es usar una comparación más idiomática ('tan altos están los cielos sobre la tierra') y una formulación más natural del segundo hemistiquio.
  glossary_alignment: 'No hay conflicto con los términos de proyecto obligatorios. La cuestión principal es חסד: el inglés auditado escogió ''steadfast love''. En español, ''amor fiel'' preserva mejor esa combinación de afecto y fidelidad que ''amor constante'', sin caer en tecnicismo. La nota léxica debe conservar las alternativas ''misericordia'' y ''lealtad de pacto/covenantal''.'
  issues:
  - severity: medium
    issue: La comparación 'como los cielos son más altos que la tierra' no refleja con precisión la construcción comparativa hebrea.
    rationale: כִגְבֹהַּ שָׁמַיִם עַל הָאָרֶץ expresa la altura de los cielos sobre la tierra, no una comparación explícita 'más altos que'. 'Tan altos están los cielos sobre la tierra' o similar conserva mejor la imagen fuente.
  - severity: medium
    issue: '''Amor constante'' debilita el valor léxico-teológico de חסד frente al inglés auditado ''steadfast love''.'
    rationale: Aunque no es incorrecto, 'amor constante' enfatiza duración más que fidelidad leal. 'Amor fiel' o 'amor constante y fiel' transmite mejor la mezcla de amor y lealtad que la nota explica.
  - severity: low
    issue: '''Así de grande es'' es menos natural en este contexto poético que ''tan grande es''.'
    rationale: La correlación comparativa en español fluye mejor con 'tan... como/así'. Es un ajuste estilístico menor pero mejora la dignidad y legibilidad.
  revised_spanish_text: Porque tan altos están los cielos sobre la tierra, tan grande es su amor fiel[a] hacia los que le temen.
  revised_footnotes:
  - marker: a
    text: O 'su misericordia' o 'su lealtad de pacto'; el hebreo חֶסֶד abarca amor leal y fiel dentro de una relación de pacto.
    reason: lexical_alternative
  revision_rationale: Se ajusta la comparación para reflejar mejor el hebreo, se mejora la naturalidad poética del español, y se fortalece la correspondencia de חסד con una expresión que preserve mejor el matiz de 'steadfast love' documentado en la auditoría inglesa.
