translation:
  language: es
  text: Yo fui joven y ahora he envejecido; pero no he visto al justo desamparado, ni a su descendencia[a] pidiendo pan[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: ''su descendencia'', es decir, sus hijos o sus descendientes.'
    reason: lexical_alternative
  - marker: b
    text: O 'buscando pan'. El verbo hebreo literalmente significa 'buscar' o 'pedir', pero aquí probablemente alude a pedir comida en situación de necesidad.
    reason: lexical_alternative
lexical_decisions:
- source_word: נַעַר
  english_pob_choice: young
  chosen_spanish: joven
  alternatives_spanish:
  - un muchacho
  - un joven
  lexicon: HALOT
  rationale: Como en el hebreo aquí funciona predicativamente con היה ('yo fui'), en español natural conviene 'yo fui joven' y no 'yo fui un muchacho'. 'Joven' conserva el contraste autobiográfico con la vejez.
- source_word: הָיִיתִי
  english_pob_choice: I was
  chosen_spanish: fui
  alternatives_spanish:
  - era
  - he sido
  lexicon: HALOT
  rationale: El perfecto de היה expresa la afirmación pasada del estado de vida; en español, 'fui' comunica bien la vivencia retrospectiva de la frase.
- source_word: גַּם
  english_pob_choice: and now
  chosen_spanish: y ahora
  alternatives_spanish:
  - también
  - incluso
  lexicon: HALOT
  rationale: En esta secuencia de etapa de vida, 'y ahora' expresa con naturalidad la progresión temporal que el inglés POB captó con 'and now'.
- source_word: זָקַנְתִּי
  english_pob_choice: I am old
  chosen_spanish: soy viejo
  alternatives_spanish:
  - he envejecido
  - ya soy anciano
  lexicon: HALOT
  rationale: El perfecto describe un estado ya alcanzado. 'Soy viejo' es una forma directa y natural; 'ya soy anciano' sería más marcado y menos neutro.
- source_word: צַדִּיק
  english_pob_choice: the righteous
  chosen_spanish: al justo
  alternatives_spanish:
  - al recto
  - al hombre justo
  lexicon: HALOT
  rationale: El sustantivo/adjetivo sustantivado singular mantiene fuerza representativa. 'Justo' conserva el valor ético-forense sin añadir 'hombre' innecesariamente.
- source_word: נֶעֱזָב
  english_pob_choice: forsaken
  chosen_spanish: abandonado
  alternatives_spanish:
  - dejado
  - desamparado
  lexicon: HALOT
  rationale: El pasivo de עזב implica ser dejado o abandonado. 'Abandonado' transmite bien el peso relacional y existencial de 'forsaken' sin sonar demasiado técnico.
- source_word: וְזַרְעוֹ
  english_pob_choice: or his offspring
  chosen_spanish: ni a su descendencia
  alternatives_spanish:
  - ni a su linaje
  - ni a sus hijos
  lexicon: HALOT
  rationale: זֶרַע puede significar 'semilla, descendencia, linaje'. 'Descendencia' es amplio y natural en español. La coordinación negativa con 'ni' refleja que el hebreo niega también esta segunda observación dentro del mismo testimonio.
- source_word: מְבַקֶּשׁ
  english_pob_choice: begging
  chosen_spanish: pidiendo
  alternatives_spanish:
  - buscando
  - mendigando
  lexicon: HALOT
  rationale: Aunque el verbo básico es 'buscar', con לֶחֶם en este contexto social de necesidad puede expresar pedir comida. 'Pidiendo' mantiene la fuerza de necesidad sin cargar el texto con una glosa demasiado interpretativa como 'mendigando'.
- source_word: לָחֶם
  english_pob_choice: for bread
  chosen_spanish: pan
  alternatives_spanish:
  - comida
  - alimento
  lexicon: HALOT
  rationale: Se conserva el sustantivo concreto 'pan' para preservar la imagen de sustento básico. En español, 'pidiendo pan' funciona con naturalidad y mantiene la concreción del hebreo.
theological_decisions:
- issue: Alcance de la afirmación sobre los justos y su descendencia
  english_pob_reading: Rendered as a first-person experiential statement ('I have not seen') without strengthening it into an unconditional promise.
  chosen_spanish_reading: 'Se mantiene como testimonio personal: ''no he visto'', sin convertirlo en promesa absoluta.'
  alternative_spanish_readings:
  - no será abandonado
  - nunca es abandonado
  rationale: El hebreo está en forma de observación autobiográfica. La traducción española conserva ese marco experiencial y no resuelve la tensión bíblica convirtiéndolo en garantía universal.
  doctrine_reference: Preservar la tensión teológica y el género testimonial del salmo.
- issue: Valor representativo del singular masculino en צַדִּיק y זַרְעוֹ
  english_pob_reading: Used 'the righteous' and retained singular 'his offspring.'
  chosen_spanish_reading: Se mantiene 'al justo' y 'su descendencia'.
  alternative_spanish_readings:
  - a los justos y su descendencia
  - al justo y sus hijos
  rationale: El hebreo usa singular masculino con fuerza representativa. El español conserva esa forma para no diluir el paralelismo ni introducir un plural que el texto no usa.
  doctrine_reference: Precisión gramatical con respeto al sentido genérico del hebreo.
translation_notes:
  revision_awareness: El pasaje coincide con el último control revisado como sin cambios necesarios; se ha mantenido la equivalencia óptima ya aprobada y solo se ha trasladado a un español idiomático y audit-able.
  spanish_consistency_notes:
  - Se conservó 'Yahvé' no porque aparezca en este versículo, sino conforme a la convención del proyecto cuando el texto lo requiera; aquí no aplica.
  - Se evitó 'SEÑOR' y 'Cristo' porque no pertenecen al contenido del versículo.
  - '''Justo'' se mantuvo para צַדִּיק por claridad y porque conserva la carga ética-forense del término.'
  - '''Pan'' se preservó en lugar de ''comida'' para retener la imagen concreta del hebreo.'
  - Las notas a pie usan marcadores únicos y aparecen ancladas en el texto donde corresponde.
