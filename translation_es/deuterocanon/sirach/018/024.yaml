review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien la estructura y el sentido básico del griego: imperativo de memoria/exhortación, ira, días del fin, tiempo de venganza y una cláusula final que mantiene implícito el sujeto del ''rostro''. Sin embargo, la nota b y, en menor medida, la frase principal pueden alinearse mejor con el audit trail inglés, que enfatiza la literalidad de ''turning away of a face'' y la preservación de la imagen sin sonar forzado en español.'
  spanish_quality_summary: El texto es generalmente claro y digno, pero 'en el apartamiento del rostro' suena algo duro y poco idiomático en español eclesial general. 'Cuando el rostro se aparte' sería más natural, pero el audit trail revisado prefirió un sintagma nominal más literal. Una solución intermedia como 'al apartarse el rostro' conserva mejor la imagen y mejora la legibilidad. Además, la nota b actualmente dice 'de un rostro', lo cual no corresponde bien al español anclado ni es la mejor forma de explicar la anartrosidad griega.
  glossary_alignment: No hay conflictos con la terminología base del proyecto. 'Ira' para θυμοῦ y 'venganza' para ἐκδικήσεως son elecciones adecuadas. La decisión teológica de no explicitar a Dios en el texto principal está correctamente preservada.
  issues:
  - severity: medium
    issue: La expresión 'en el apartamiento del rostro' es poco natural en español.
    rationale: Aunque intenta reflejar el sustantivo griego ἀποστροφή, el resultado suena rígido. Una formulación como 'al apartarse el rostro' conserva la imagen y la ambigüedad sin caer en calco tosco.
  - severity: medium
    issue: La nota b dice 'de un rostro', formulación que no encaja bien con el anclaje textual español.
    rationale: El audit trail inglés dice literalmente 'in the turning away of a face', pero en español la explicación debe servir al lector hispanohablante. 'Al apartarse un rostro' o una nota que explique la literalidad sin forzar el artículo indefinido sería más fiel y clara.
  - severity: low
    issue: La ubicación de las notas en el inglés aparece cruzada, pero el español ya las asigna correctamente al contenido relevante.
    rationale: No requiere cambio doctrinal ni estructural, solo mantener coherencia interna en español.
  revised_spanish_text: Recuerda la ira[a] en los días de tu fin, y el tiempo de venganza al apartarse el rostro[b].
  revised_footnotes:
