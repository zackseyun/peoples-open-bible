translation:
  language: es
  text: 'Y a la casa del rey de Judá: Oigan la palabra de Yahvé[a].'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Y concerniente a la casa del rey de Judá». El hebreo con ל puede introducir un nuevo destinatario o una referencia acerca de la casa real.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וּ/לְ/בֵית
  english_pob_choice: And to the house of
  chosen_spanish: Y a la casa de
  alternatives_spanish:
  - Y concerniente a la casa de
  - Ahora, a la casa de
  lexicon: HALOT
  rationale: El hebreo con ו + ל introduce un nuevo tramo de la amonestación dirigido a la casa real. En español, «Y a la casa de» conserva el valor de enlace y de dirección/adresatario sin volver innecesariamente explícita la preposición como «concerniente a».
- source_word: מֶלֶךְ יְהוּדָה
  english_pob_choice: the king of Judah
  chosen_spanish: el rey de Judá
  alternatives_spanish:
  - el rey judío
  - el rey de la tierra de Judá
  lexicon: HALOT
  rationale: La cadena constructa se vierte de forma directa y transparente. «El rey de Judá» mantiene la identificación formal del destinatario y evita interpretaciones demasiado libres como «rey judío».
- source_word: שִׁמְע֖וּ
  english_pob_choice: Hear
  chosen_spanish: Oigan
  alternatives_spanish:
  - Escuchen
  - Atiendan
  lexicon: HALOT
  rationale: El imperativo plural pide una forma natural en español que conserve el tono profético y colectivo. «Oigan» mantiene la fuerza de la orden sin sonar tan arcaico como «Oíd» y sin debilitarse como una mera sugerencia.
- source_word: דְּבַר
  english_pob_choice: the word
  chosen_spanish: la palabra
  alternatives_spanish:
  - el mensaje
  - la palabra/mensaje
  lexicon: HALOT
  rationale: En la fórmula profética, דבר se entiende como «word/message». «La palabra» preserva el giro establecido de «oigan la palabra de Yahvé» y conserva su resonancia bíblica en español.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  - Jehová
  lexicon: HALOT
  rationale: 'Se sigue la decisión doctrinal del proyecto para el Tetragrámaton: «Yahvé» como transliteración del nombre divino, evitando la sustitución por un título como «el SEÑOR».'
theological_decisions:
- issue: Tratamiento del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - Jehová
  rationale: El texto hebreo usa directamente el Nombre divino. La tradición POB lo rinde como transliteración del nombre propio; en español, «Yahvé» es la forma de uso más estable y legible para conservar ese valor nominal.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Alcance de לְ/בֵית en una fórmula de dirección
  english_pob_reading: And to the house of the king of Judah.
  chosen_spanish_reading: Y a la casa del rey de Judá.
  alternative_spanish_readings:
  - Y concerniente a la casa del rey de Judá.
  - Ahora, a la casa del rey de Judá.
  rationale: La preposición puede marcar tanto destinatario como referencia temática. La forma principal mantiene abierta esa tensión sin forzar una paráfrasis interpretativa; el vocativo implícito queda suficientemente claro en español.
  doctrine_reference: Jeremiah 21:11 audit trail — lexical_alternative for לְ
translation_notes:
  revision_awareness: El borrador sigue el pasaje hebreo directo y la solución auditada en inglés, sin cambios textuales recientes registrados en la revisión más reciente; se mantiene la misma decisión para el Nombre divino y para el valor de לְ en la apertura.
  spanish_consistency_notes:
  - Se conserva la fórmula profética «la palabra de Yahvé» para mantener continuidad con el resto del corpus.
  - «Casa del rey de Judá» se mantiene literalmente para respetar el matiz de entidad real/colectiva que ya refleja el inglés POB.
  - El tratamiento de «Yahvé» es consistente con el estándar del proyecto para יְהוָה en español.
