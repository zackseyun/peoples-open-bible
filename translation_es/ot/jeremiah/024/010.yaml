translation:
  language: es
  text: Y enviaré contra ellos la espada[a], la hambruna y la peste, hasta que sean consumidos de la tierra que les di a ellos y a sus padres.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «la plaga». El hebreo puede denotar más ampliamente una enfermedad epidémica.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְשִׁלַּחְתִּי
  english_pob_choice: And I will send
  chosen_spanish: Y enviaré
  alternatives_spanish:
  - Y mandaré
  - Y despacharé
  lexicon: HALOT
  rationale: En el piel, שׁלח con agentes de juicio expresa enviar o lanzar contra. «Enviaré» conserva la acción divina y suena natural en español sin suavizar el tono de juicio.
- source_word: בָם
  english_pob_choice: against them
  chosen_spanish: contra ellos
  alternatives_spanish:
  - sobre ellos
  - a ellos
  lexicon: HALOT
  rationale: Con verbos de juicio, la preposición marca dirección hostil. «Contra ellos» transmite mejor el matiz adversativo que una simple dative o localización.
- source_word: הַחֶרֶב
  english_pob_choice: the sword
  chosen_spanish: la espada
  alternatives_spanish:
  - la guerra
  - la violencia
  lexicon: HALOT
  rationale: El hebreo es literal «espada»; en contexto profético funciona como metonimia de violencia bélica, pero conviene conservar la imagen concreta.
- source_word: הָרָעָב
  english_pob_choice: the famine
  chosen_spanish: el hambre
  alternatives_spanish:
  - la hambruna
  - la escasez
  lexicon: HALOT
  rationale: Aunque el inglés POB eligió «famine», en español «hambre» expresa bien el juicio y mantiene el paralelismo con los otros agentes. «Hambruna» también sería posible, pero resulta menos directo en una tríada formulística.
- source_word: הַדָּבֶר
  english_pob_choice: the pestilence
  chosen_spanish: la peste
  alternatives_spanish:
  - la plaga
  - la pestilencia
  lexicon: HALOT
  rationale: דבר en fórmulas de juicio puede referirse a enfermedad epidémica. «Peste» es una equivalencia digna y natural en español; «plaga» o «pestilencia» también son posibles, pero «peste» conserva la fuerza del término.
- source_word: עַד תֻּמָּם
  english_pob_choice: until they are consumed
  chosen_spanish: hasta que sean consumidos
  alternatives_spanish:
  - hasta que se acaben
  - hasta que lleguen a su fin
  lexicon: HALOT
  rationale: El valor resultativo de תמם indica quedar llevado al fin. «Sean consumidos» mantiene la idea de destrucción total y encaja con la secuencia de espada, hambre y peste.
- source_word: מֵעַל הָאֲדָמָה
  english_pob_choice: from the land
  chosen_spanish: de la tierra
  alternatives_spanish:
  - de sobre la tierra
  - de la tierra
  lexicon: HALOT
  rationale: Aunque el hebreo literalmente dice «de sobre la tierra», el español puede expresar el movimiento de salida con «de la tierra» sin perder claridad. La forma más literal sonaría forzada.
- source_word: הָאֲדָמָה
  english_pob_choice: the land
  chosen_spanish: la tierra
  alternatives_spanish:
  - el suelo
  - el terreno
  lexicon: HALOT
  rationale: En contexto de promesa territorial y pacto, אֲדָמָה se entiende mejor como «tierra» que como suelo físico. Esto mantiene la resonancia covenantal del pasaje.
- source_word: אֲשֶׁר נָתַתִּי לָהֶם וְלַאֲבוֹתֵיהֶם
  english_pob_choice: that I gave to them and to their fathers
  chosen_spanish: que di a ellos y a sus padres
  alternatives_spanish:
  - que les di a ellos y a sus padres
  - que di a ellos y a sus antepasados
  lexicon: HALOT
  rationale: Se conserva «padres» para reflejar el hebreo אבותיהם y la continuidad generacional del don de la tierra. «Antepasados» sería interpretativo y menos fiel al giro del texto.
theological_decisions:
- issue: Lenguaje de juicio con tríada espada/hambre/peste
  english_pob_reading: the sword, the famine, and the pestilence
  chosen_spanish_reading: la espada, el hambre y la peste
  alternative_spanish_readings:
  - la espada, la hambruna y la peste
  - la espada, el hambre y la plaga
  rationale: La tríada profética se conserva como fórmula de juicio divino. «Peste» mantiene la gravedad del hebreo דָּבֶר sin diluirlo en una categoría más genérica.
  doctrine_reference: DOCTRINE.md Translation philosophy §§4–5
- issue: Herencia pactal de la tierra
  english_pob_reading: the land that I gave to them and to their fathers
  chosen_spanish_reading: la tierra que di a ellos y a sus padres
  alternative_spanish_readings:
  - la tierra que les di a ellos y a sus padres
  - la tierra que di a ellos y a sus antepasados
  rationale: Se preserva el vínculo entre la tierra y la promesa dada a varias generaciones. Mantener «padres» evita neutralizar un rasgo textual importante del hebreo.
  doctrine_reference: DOCTRINE.md Translation philosophy §§4–5
translation_notes:
  revision_awareness: La revisión inglesa reciente eliminó «upon» por naturalidad en «from the land», pero conservó el sentido de salida desde la tierra. En español se adoptó directamente «de la tierra» para evitar una calca rígida y mantener la misma decisión semántica.
  spanish_consistency_notes:
  - Se mantuvo el orden de la tríada como en el hebreo y en el POB inglés.
  - «Tierra» se usa de manera consistente para אָדָמָה en este contexto territorial.
  - Se preservó «padres» para reflejar la referencia generacional del texto fuente.
  - La nota [a] está anclada en «espada[a]» para cumplir la trazabilidad requerida.
