id: 1CLEM.1.1
reference: 1 Clement 1:1
unit: verse
book: 1 Clement
source:
  edition: Funk 1901 (normalized OCR)
  text: Διὰ τὰς αἰφνιδίους καὶ ἐπαλλήλους γενομένας ἡμῖν συμφορὰς καὶ περιστάσεις, ἀδελφοί, βράδιον νομίζομεν ἐπιστροφὴν πεποιῆσθαι περὶ τῶν ἐπιζητουμένων παρʼ ὑμῖν πραγμάτων, ἀγαπητοί, τῆς τε ἀλλοτρίας καὶ ξένης τοῖς ἐκλεκτοῖς τοῦ θεοῦ, μιαρᾶς καὶ ἀνοσίου στάσεως, ἣν ὀλίγα πρόσωπα προπετῆ καὶ αὐθάδη ὑπέρχοντα εἰς τοσοῦτον ἀπονοίας ἐξέκαυσαν, ὥστε τὸ σεμνὸν καὶ περιβόητον καὶ πᾶσιν ἀνθρώποις ἀξιαγάπητον ὄνομα ὑμῶν μεγάλως βλασφημηθῆναι. 2. τίς γὰρ παρεπιδημήσας πρὸς ὑμᾶς τὴν πανάρετον καὶ βεβαίαν ὑμῶν πίστιν οὐκ ἐδοκίμασεν; τήν τε σώφρονα καὶ ἐπιεικῆ ἐν Χριστῷ εὐσέβειαν οὐκ ἐθαύμασεν; καὶ τὸ μεγαλοπρεπὲς τῆς φιλοξενίας ὑμῶν ἦθος οὐκ ἐκήρυξεν; καὶ τὴν τελείαν καὶ ἀσφαλῆ γνῶσιν οὐκ ἐμακάρισεν; 3. ἀπροσωπολήμπτως γὰρ πάντα ἐποιεῖτε καὶ ἐν τοῖς νομίμοις τοῦ θεοῦ ἐπορεύεσθε, ὑποτασσόμενοι τοῖς ἡγουμένοις ὑμῶν καὶ τιμὴν τὴν καϑήκουσαν ἀπονέμοντες τοῖς παρ’ ὑμῖν πρεσβυτέροις· νέοις τε μέτρα καὶ σεμνὰ νοεῖν ἐπετρέπετε· γυναξὶν τε ἐν ἀμώμῳ καὶ σεμνῇ καὶ ἁγνῇ συνειδήσει πάντα ἐπιτελεῖν παρηγγέλλετε, στεργούσας καϑηκόντως τοὺς ἄνδρας ἑαυτῶν· ἐν τε τῷ κανόνι τῆς ὑποταγῆς ὑπάρχουσας τὰ κατὰ τὸν οἶκον σεμνῶς οἰκουρεῖν ἐδιδάσκετε, πάνυ σωφρονούσας.
  language: Greek
  pages:
  - 261
  - 263
  note: This chapter comes from the normalized Funk 1901 OCR layer.
  verse: 1
translation:
  text: "Because of the sudden and repeated misfortunes and crises that have happened to us, brothers, we consider that we have been somewhat slow in turning our attention to the matters being sought from us among you, beloved—namely, the alien and strange uprising, defiled and unholy, foreign to the chosen of God, which a few rash and self-willed persons have kindled to such a pitch of madness that your dignified and widely spoken-of name, worthy of love among all people, has been greatly blasphemed.\n\nFor who, after staying among you, did not approve your all-virtuous and steadfast faith? Who did not admire your sober and gentle godliness in Messiah? Who did not proclaim the magnificent character of your hospitality? And who did not count blessed your complete and sure knowledge?\n\nFor you did everything without partiality, and you walked in the lawful ordinances of God, submitting yourselves to your leaders and giving the honor that is fitting to the elders among you. You were directing the younger men to think thoughts marked by moderation and dignity. And you were instructing the women to carry out all things with a blameless and dignified and pure conscience, loving their own husbands as is fitting; and, being within the rule of submission, to manage the affairs of the household with dignity, showing complete self-control."
  philosophy: optimal-equivalence
status: revised
lexical_decisions:
- source_word: βράδιον
  chosen: somewhat slow
  alternatives:
  - slowly
  - delayed
  - tardy
  lexicon: LSJ
  rationale: Used adverbially with νομίζομεν to express perceived delay in responding. 'Somewhat slow' preserves the apologetic tone without sounding archaic.
- source_word: ἐπιστροφὴν πεποιῆσθαι
  chosen: to turn our attention
  alternatives:
  - to make a return
  - to turn back
  - to address
  lexicon: LSJ
  rationale: The idiom here concerns directing oneself back to a matter rather than physical return. 'Turn our attention' captures the epistolary sense of resuming concern for the Corinthians' situation.
- source_word: ἐπιζητουμένων
  chosen: being sought from us
  alternatives:
  - under inquiry
  - being asked about
  - being pressed
  lexicon: LSJ
  rationale: The participle indicates matters the Corinthians have raised or are seeking a response about. This rendering keeps the relational direction implicit in the context.
- source_word: στάσεως
  chosen: uprising
  alternatives:
  - sedition
  - faction
  - rebellion
  - dissension
  lexicon: BDAG
  rationale: The term denotes a serious communal rupture, not mere disagreement. 'Uprising' preserves the gravity and public character of the disturbance while fitting the rhetoric of a church revolt.
- source_word: ἀλλοτρίας καὶ ξένης
  chosen: alien and strange
  alternatives:
  - foreign and alien
  - belonging to another and foreign
  lexicon: LSJ
  rationale: The paired adjectives intensify the idea that the στάσις is utterly out of character for God's elect. Keeping both terms preserves the rhetorical force.
- source_word: μιαρᾶς καὶ ἀνοσίου
  chosen: defiled and unholy
  alternatives:
  - polluted and profane
  - foul and impious
  lexicon: LSJ
  rationale: The pair marks moral and cultic offensiveness. 'Defiled and unholy' is readable modern English while retaining the strong condemnation.
- source_word: προπετῆ
  chosen: rash
  alternatives:
  - reckless
  - headstrong
  lexicon: LSJ
  rationale: Describes impulsive overboldness. 'Rash' is concise and idiomatic.
- source_word: αὐθάδη
  chosen: self-willed
  alternatives:
  - arrogant
  - self-pleasing
  - stubborn
  lexicon: BDAG
  rationale: Highlights obstinate self-assertion rather than generic pride. 'Self-willed' preserves the ethical nuance important in ecclesial disorder.
- source_word: ἀπονοίας
  chosen: madness
  alternatives:
  - folly
  - insolence
  - recklessness
  lexicon: LSJ
  rationale: The context suggests extreme senseless audacity. 'Madness' conveys the rhetorical intensity of the accusation.
- source_word: σεμνὸν
  chosen: dignified
  alternatives:
  - venerable
  - grave
  - noble
  lexicon: BDAG
  rationale: Applied to the Corinthians' name/reputation, 'dignified' communicates honorable seriousness without archaic tone.
- source_word: περιβόητον
  chosen: widely spoken-of
  alternatives:
  - famous
  - renowned
  - celebrated
  lexicon: LSJ
  rationale: A literal-leaning rendering preserves the public-report nuance and avoids overstatement.
- source_word: βλασφημηθῆναι
  chosen: has been greatly blasphemed
  alternatives:
  - has been slandered
  - has been reviled
  lexicon: BDAG
  rationale: Though the object is the Corinthians' name, the Greek verb carries the strong sense of abusive defamation. 'Blasphemed' preserves the severity and biblical cadence.
- source_word: πανάρετον
  chosen: all-virtuous
  alternatives:
  - completely virtuous
  - excellent in every virtue
  lexicon: LSJ
  rationale: The compound intensifies moral excellence. 'All-virtuous' is slightly marked English but fitting for the elevated style.
- source_word: βεβαίαν
  chosen: steadfast
  alternatives:
  - firm
  - sure
  - secure
  lexicon: BDAG
  rationale: Describes the stability of their faith. 'Steadfast' preserves paraenetic and ecclesial resonance.
- source_word: πίστιν
  chosen: faith
  alternatives:
  - faithfulness
  - trust
  lexicon: BDAG
  rationale: In this commendation of the church's standing, 'faith' is the default and most natural rendering, while still allowing the undertone of fidelity.
- source_word: σώφρονα
  chosen: sober
  alternatives:
  - self-controlled
  - sound-minded
  lexicon: BDAG
  rationale: Retains the moral seriousness and restraint conveyed by the Greek, and pairs well with 'gentle.'
- source_word: ἐπιεικῆ
  chosen: gentle
  alternatives:
  - forbearing
  - kind
  - considerate
  lexicon: BDAG
  rationale: A standard ethical term for measured, yielding conduct. 'Gentle' is accessible and ecclesially appropriate.
- source_word: εὐσέβειαν
  chosen: godliness
  alternatives:
  - piety
  - devotion
  lexicon: BDAG
  rationale: '''Godliness'' preserves the God-directed ethical-religious sense without sounding merely ceremonial.'
- source_word: ἐν Χριστῷ
  chosen: in Messiah
  alternatives:
  - in Christ
  lexicon: BDAG
  rationale: Following project policy, Χριστός as title is translated 'Messiah' where context supports title sense. Here it qualifies Christian godliness rather than functioning as a fixed name.
- source_word: μεγαλοπρεπὲς ... ἦθος
  chosen: magnificent character
  alternatives:
  - noble bearing
  - splendid conduct
  lexicon: LSJ
  rationale: Captures both the grandeur and ethical cast of their hospitality.
- source_word: φιλοξενίας
  chosen: hospitality
  alternatives:
  - love of strangers
  - welcome of guests
  lexicon: BDAG
  rationale: Standard and natural rendering for the virtue praised in early Christian communities.
- source_word: τελείαν καὶ ἀσφαλῆ γνῶσιν
  chosen: complete and sure knowledge
  alternatives:
  - perfect and secure knowledge
  - mature and reliable understanding
  lexicon: BDAG
  rationale: Preserves both adjectives and avoids importing later technical meanings into γνῶσις.
- source_word: ἀπροσωπολήμπτως
  chosen: without partiality
  alternatives:
  - impartially
  - without favoritism
  lexicon: BDAG
  rationale: A biblically resonant phrase that clearly conveys the ethical sense.
- source_word: νομίμοις τοῦ θεοῦ
  chosen: lawful ordinances of God
  alternatives:
  - appointed rules of God
  - God's statutes
  lexicon: LSJ
  rationale: νομίμοις here refers to what is proper/ordained within God's order. 'Lawful ordinances' preserves the formal ecclesial tone.
- source_word: ἡγουμένοις
  chosen: leaders
  alternatives:
  - those leading
  - rulers
  lexicon: BDAG
  rationale: Appropriate for community authorities without importing later monarchical structures.
- source_word: πρεσβυτέροις
  chosen: elders
  alternatives:
  - presbyters
  - older men
  lexicon: BDAG
  rationale: In this church-order context, 'elders' best preserves the ecclesial office/community role while remaining readable.
- source_word: μέτρα καὶ σεμνὰ νοεῖν
  chosen: to think thoughts marked by moderation and dignity
  alternatives:
  - to think modest and serious things
  - to have moderate and dignified minds
  lexicon: LSJ
  rationale: Expands the idiom enough for clear English while preserving the moral emphasis on disciplined thought.
- source_word: γυναξὶν
  chosen: the women
  alternatives:
  - wives
  - women
  lexicon: BDAG
  rationale: The following reference to 'their own husbands' shows married women are in view, but the plural noun itself is 'women.' The English keeps the broader term while the context specifies marital relation.
- source_word: συνειδήσει
  chosen: conscience
  alternatives:
  - awareness
  - moral consciousness
  lexicon: BDAG
  rationale: Standard ethical-religious rendering in early Christian literature.
- source_word: στεργούσας
  chosen: loving
  alternatives:
  - having affection for
  - cherishing
  lexicon: LSJ
  rationale: Denotes familial affection. 'Loving' is simple and natural, with the domestic nuance supplied by the object 'their own husbands.'
- source_word: κανόνι τῆς ὑποταγῆς
  chosen: the rule of submission
  alternatives:
  - the standard of subordination
  - the order of submission
  lexicon: BDAG
  rationale: κανών suggests a norm or rule. This rendering preserves the structured, paraenetic sense without softening the term.
- source_word: οἰκουρεῖν
  chosen: to manage the affairs of the household
  alternatives:
  - to keep house
  - to stay at home
  - to work at home
  lexicon: LSJ
  rationale: The verb concerns domestic management, not mere location. This rendering avoids reduction to seclusion while preserving household responsibility.
- source_word: πάνυ σωφρονούσας
  chosen: showing complete self-control
  alternatives:
  - being very self-controlled
  - being altogether sober-minded
  lexicon: BDAG
  rationale: Conveys the intensifying πάνυ and the ethical sense of σωφρονέω in idiomatic English.
theological_decisions:
- issue: Rendering Χριστός in ἐν Χριστῷ
  chosen_reading: in Messiah
  alternative_readings:
  - in Christ
  rationale: Project policy prefers translating Χριστός as 'Messiah' where title sense is active. In this paraenetic phrase, the title remains meaningful rather than merely name-like.
  doctrine_reference: 'DOCTRINE.md: Translate titles; transliterate names.'
- issue: Ecclesial force of πρεσβυτέροις
  chosen_reading: elders
  alternative_readings:
  - presbyters
  - older men
  rationale: The chapter addresses church order and communal submission. 'Elders' preserves ecclesial texture without overcommitting to later technical office language.
  doctrine_reference: 'PHILOSOPHY.md: Preserve ecclesial language and make reasoning auditable.'
- issue: Gendered address ἀδελφοί
  chosen_reading: brothers
  alternative_readings:
  - brothers and sisters
  - siblings
  rationale: The Greek is grammatically masculine and the project prefers gender-accurate rendering. A footnote can note likely mixed audience if needed, but the main text keeps 'brothers.'
  doctrine_reference: 'DOCTRINE.md: Gender-accurate over gender-neutral.'
