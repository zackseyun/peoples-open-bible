lexical_decisions:
- source_word: רַק
  english_pob_choice: only
  chosen_spanish: solo
  alternatives_spanish:
  - solo
  - únicamente
  - solamente
  lexicon: HALOT
  rationale: La partícula restrictiva se conserva con un adverbio natural en español. Se repite al final del versículo, por eso también se mantiene allí para reflejar la misma restricción.
- source_word: לְמַעַן
  english_pob_choice: so that
  chosen_spanish: para que
  alternatives_spanish:
  - a fin de que
  - para que
  lexicon: HALOT
  rationale: Introduce finalidad; 'para que' es la forma más natural y clara en español para una cláusula de propósito.
- source_word: דַּעַת
  english_pob_choice: might know
  chosen_spanish: conozcan
  alternatives_spanish:
  - lleguen a conocer
  - sepan
  lexicon: HALOT
  rationale: Con לְמַעַן, la construcción expresa propósito. 'Conozcan' preserva el valor de ידע sin volverlo demasiado explicativo.
- source_word: דֹּרוֹת
  english_pob_choice: the generations of
  chosen_spanish: las generaciones de
  alternatives_spanish:
  - las generaciones entre
  - las futuras generaciones de
  lexicon: HALOT
  rationale: '''Generaciones'' corresponde directamente al sustantivo hebreo. No se añade ''futuras'', porque el hebreo no lo dice de manera explícita.'
- source_word: בְּנֵי יִשְׂרָאֵל
  english_pob_choice: the sons of Israel
  chosen_spanish: los hijos de Israel[a]
  alternatives_spanish:
  - los israelitas
  - los hijos de Israel
  lexicon: HALOT
  rationale: Se conserva la expresión literal y corporativa del hebreo. En español bíblico, 'hijos de Israel' es comprensible y mantiene la forma del original; la nota ofrece la alternativa idiomática.
- source_word: לְלַמְּדָם
  english_pob_choice: to teach them
  chosen_spanish: para enseñarles
  alternatives_spanish:
  - para instruirlos
  - para entrenarlos
  lexicon: HALOT
  rationale: El piel de למד significa 'enseñar'. 'Para enseñarles' reproduce bien la finalidad y permite que 'guerra' aporte el matiz militar del contexto.
- source_word: מִלְחָמָה
  english_pob_choice: war
  chosen_spanish: guerra
  alternatives_spanish:
  - guerra
  - combate
  - guerra militar
  lexicon: HALOT
  rationale: El sustantivo singular abstracto se traduce de manera directa por 'guerra'. 'Combate' estrecharía demasiado el sentido.
- source_word: אֲשֶׁר לְפָנִים
  english_pob_choice: who formerly
  chosen_spanish: los que antes
  alternatives_spanish:
  - los que anteriormente
  - los que antes
  lexicon: HALOT
  rationale: La combinación temporal señala a quienes no la habían conocido en un tiempo previo. En español, 'los que antes' mantiene la referencia temporal sin sobreexplicar.
- source_word: לֹא יְדָעוּם
  english_pob_choice: had not known it
  chosen_spanish: no la habían conocido[b]
  alternatives_spanish:
  - no la habían conocido
  - no la habían experimentado
  lexicon: HALOT
  rationale: Se conserva el verbo 'conocer', como en el hebreo ידע, y el objeto femenino singular concuerda con 'guerra'. La nota recoge la lectura alternativa 'experimentado' que el POB inglés preservó.
theological_decisions:
- issue: Expresión corporativa masculina בְּנֵי יִשְׂרָאֵל
  english_pob_reading: the sons of Israel
  chosen_spanish_reading: los hijos de Israel
  alternative_spanish_readings:
  - los israelitas
  - los hijos de Israel
  rationale: El hebreo usa una designación masculina plural que funciona como nombre del pueblo del pacto. Se mantiene la forma literal para no diluir el paralelismo ni la textura del original; la alternativa idiomática queda señalada en nota.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4
- issue: Sentido de 'conocer guerra'
  english_pob_reading: had not known it
  chosen_spanish_reading: no la habían conocido
  alternative_spanish_readings:
  - no la habían experimentado
  - no habían aprendido guerra
  rationale: El hebreo emplea ידע, verbo amplio de 'conocer'. Se conserva ese valor semántico sin reducirlo a 'experimentar' o 'aprender', aunque esas opciones siguen siendo posibles en contexto.
  doctrine_reference: DOCTRINE.md §Translation philosophy 3
translation_notes:
  revision_awareness: La versión inglesa revisada ajustó la puntuación del primer tramo sin cambiar el contenido. La redacción española conserva esa estructura de propósito y la repetición de la partícula restrictiva רַק, manteniendo el valor semántico del original hebreo.
  spanish_consistency_notes:
  - Se mantiene el paralelismo entre la cláusula de propósito y la restricción final con 'solo'.
  - '''Guerra'' se deja en singular abstracto, como en el hebreo.'
  - La nota sobre 'hijos de Israel' aparece anclada en el texto para cumplir el formato de notas del proyecto.
