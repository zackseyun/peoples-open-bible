id: REV.21.22
reference: Revelation 21:22
source:
  edition: SBLGNT
  text: Καὶ ναὸν οὐκ εἶδον ἐν αὐτῇ, ὁ γὰρ κύριος, ὁ θεός, ὁ παντοκράτωρ, ναὸς αὐτῆς ἐστιν, καὶ τὸ ἀρνίον.
translation:
  text: And I saw no temple in it[a], for the Lord God, the Almighty[b], is its temple, and the Lamb.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'sanctuary.' The Greek ναός can refer more specifically to the inner temple/shrine.
    reason: lexical_alternative
  - marker: b
    text: The Greek pronouns are feminine because they refer to the city; contemporary English uses 'it/its' rather than 'her.'
    reason: cultural_note
lexical_decisions:
- source_word: ναὸν / ναὸς
  chosen: temple
  alternatives:
  - sanctuary
  lexicon: BDAG
  rationale: ναός refers specifically to the temple/shrine rather than a generic sacred building. 'Temple' is the clearest natural English rendering here and preserves the contrast between the absence of a physical temple and God and the Lamb themselves being the city's temple. 'Sanctuary' is possible but narrower and less idiomatic in this context.
- source_word: οὐκ εἶδον
  chosen: I saw no
  alternatives:
  - I did not see a
  lexicon: BDAG
  rationale: This directly reflects the aorist of ὁράω with negation. 'I saw no temple' is concise, natural English and preserves the emphatic absence better than the more periphrastic 'I did not see a temple.'
- source_word: ἐν αὐτῇ
  chosen: in it
  alternatives:
  - in her
  lexicon: BDAG
  rationale: The referent is the city, grammatically feminine in Greek. English normally refers to a city as 'it' in contemporary usage. 'In her' would preserve grammatical gender but sound marked and potentially over-interpretive in modern English.
- source_word: κύριος
  chosen: Lord
  alternatives: []
  lexicon: BDAG
  rationale: Per doctrine default, κύριος is rendered 'Lord.' Here it functions as a divine title within the compound designation 'the Lord God, the Almighty.'
- source_word: θεός
  chosen: God
  alternatives: []
  lexicon: BDAG
  rationale: Standard and direct rendering of θεός. The appositional sequence identifies the one who is the city's temple.
- source_word: παντοκράτωρ
  chosen: the Almighty
  alternatives:
  - the All-Powerful
  lexicon: BDAG
  rationale: '''The Almighty'' is the established and accurate rendering of παντοκράτωρ in Revelation, conveying sovereign omnipotence in readable English.'
- source_word: αὐτῆς
  chosen: its
  alternatives:
  - her
  lexicon: BDAG
  rationale: The genitive pronoun refers to the city. As with ἐν αὐτῇ, contemporary English prefers 'its' for a city in straightforward prose.
- source_word: καὶ τὸ ἀρνίον
  chosen: and the Lamb
  alternatives:
  - even the Lamb
  lexicon: BDAG
  rationale: 'A straightforward coordinate construction: both ''the Lord God, the Almighty'' and ''the Lamb'' together are identified as the temple. ''And the Lamb'' preserves the syntax without adding interpretive nuance.'
