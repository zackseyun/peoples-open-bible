translation:
  language: es
  text: 'Le dicen a un árbol: «Tú eres mi padre», y a una piedra: «Tú me diste a luz[a]». Porque me han vuelto la espalda[b] y no el rostro; pero en el tiempo de su angustia[c] dicen: «Levántate y sálvanos».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «Tú me has dado a luz».
    reason: lexical_alternative
  - marker: b
    text: Hebreo literalmente, «me han vuelto la nuca/espalda y no el rostro», un modismo de rechazo.
    reason: lexical_alternative
  - marker: c
    text: O «en el tiempo de su calamidad».
    reason: lexical_alternative
lexical_decisions:
- source_word: אֹמְרִים
  english_pob_choice: They say
  chosen_spanish: Le dicen
  alternatives_spanish:
  - Dicen
  - Están diciendo
  lexicon: HALOT
  rationale: El participio hebreo funciona de manera descriptiva/habitual; en español, «le dicen» comunica de forma natural la escena profética presente.
- source_word: לָעֵץ
  english_pob_choice: to a tree
  chosen_spanish: a un árbol
  alternatives_spanish:
  - al árbol
  - a la madera
  lexicon: HALOT
  rationale: «עֵץ» puede ser árbol o madera; aquí conviene «árbol» para conservar la imagen concreta de hablar a un objeto creado como si fuera divino, sin suavizarla.
- source_word: אָבִי אַתָּה
  english_pob_choice: You are my father
  chosen_spanish: Tú eres mi padre
  alternatives_spanish:
  - Eres mi padre
  - Mi padre eres tú
  lexicon: HALOT
  rationale: Se mantiene la afirmación filial literal y directa, necesaria para preservar la fuerza de la acusación contra la idolatría.
- source_word: וְלָאֶבֶן
  english_pob_choice: and to a stone
  chosen_spanish: y a una piedra
  alternatives_spanish:
  - y a la piedra
  - y a una roca
  lexicon: HALOT
  rationale: «אֶבֶן» es «piedra» de manera directa; «piedra» conserva el paralelismo con «árbol» y el contraste material.
- source_word: אַתְּ יְלַדְתִּנִי
  english_pob_choice: You gave birth to me
  chosen_spanish: Tú me has dado a luz
  alternatives_spanish:
  - Tú me diste a luz
  - Tú me has engendrado
  lexicon: HALOT
  rationale: El verbo con sujeto femenino apunta al lenguaje de parto. «Dar a luz» es la forma más natural en español y mantiene el sentido literal; se evita «engendrar» porque oscurece la imagen maternal implícita.
- source_word: פָנוּ אֵלַי עֹרֶף וְלֹא פָנִים
  english_pob_choice: they have turned their back to me and not their face
  chosen_spanish: me han vuelto la espalda y no el rostro
  alternatives_spanish:
  - me han dado la espalda y no la cara
  - se han vuelto hacia mí la nuca y no el rostro
  lexicon: HALOT
  rationale: Se conserva el contraste idiomático entre espalda/nuca y rostro, pero en un español natural. «Volver la espalda» expresa rechazo; «rostro» preserva el paralelo con «espalda».
- source_word: וּבְעֵת רָעָתָם
  english_pob_choice: in the time of their trouble
  chosen_spanish: en el tiempo de su angustia
  alternatives_spanish:
  - en el tiempo de su calamidad
  - en el tiempo de su mal
  lexicon: HALOT
  rationale: «רָעָה» puede ser mal, calamidad o angustia. Aquí, por el contexto de súplica por rescate, «angustia» comunica bien la necesidad apremiante sin perder el matiz de calamidad.
- source_word: יֹאמְרוּ
  english_pob_choice: they say
  chosen_spanish: dicen
  alternatives_spanish:
  - dirán
  - solicitan
  lexicon: HALOT
  rationale: El imperfecto funciona como respuesta habitual o futura en la escena profética; en español, el presente histórico «dicen» mantiene la vividez del reproche.
- source_word: קוּמָה
  english_pob_choice: Rise up
  chosen_spanish: Levántate
  alternatives_spanish:
  - Despierta
  - Alzate
  lexicon: HALOT
  rationale: Imperativo enfático; «Levántate» es claro, digno y fiel al llamado urgente del texto.
- source_word: וְהוֹשִׁיעֵנוּ
  english_pob_choice: and save us
  chosen_spanish: y sálvanos
  alternatives_spanish:
  - y líbranos
  - y rescatamos
  lexicon: HALOT
  rationale: El hifil de ישׁע se traduce de forma directa como «salvar»; «sálvanos» conserva la petición breve e imperativa del hebreo.
theological_decisions:
- issue: Mantener el lenguaje literal de atribuir paternidad/parto a ídolos
  english_pob_reading: The people are depicted as directly attributing parenthood/creative origin to idols made of wood and stone.
  chosen_spanish_reading: El texto presenta a la gente atribuyendo origen filial y maternal a un árbol y una piedra.
  alternative_spanish_readings:
  - Solo dicen que adoran ídolos
  - Los ídolos les dieron origen
  rationale: La acusación profética depende del lenguaje concreto de «padre» y «dar a luz». Suavizarlo a una mera descripción de idolatría reduciría la fuerza del reproche y borraría la ironía del pasaje.
  doctrine_reference: Idolatría denunciada en la profecía de Jeremías; ver también Éxodo 20:3-5 y Deuteronomio 32:18.
translation_notes:
  revision_awareness: 'La versión inglesa POB mantiene una traducción de equivalencia óptima con notas sobre el modismo de «espalda/rostro», la posible alternancia de «trouble/calamity» y la alternativa léxica de «gave birth/bore me». La propuesta española conserva esas tensiones: traduce literalmente la acusación a árbol y piedra, mantiene el contraste corporal idiomático con una expresión natural en español, y deja una nota para la ambigüedad de רָעָה. No se introducen cambios doctrinales ni se atenúa la ironía profética.'
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando el hebreo lo exija; este versículo no lo contiene.
  - «Piedra» y «árbol» se mantienen concretos para conservar la imagen idolátrica material.
  - Se evita «SEÑOR» o una paráfrasis devocional que ocultaría el sarcasmo profético.
  - «Salvar» se conserva para הוֹשִׁיעַ, en línea con el valor léxico directo del verbo.
