translation:
  language: es
  text: Y cuando el impío hubo recibido esto[a], se enfureció tanto que no solo estaba airado con los de Alejandría, sino que también se oponía con mayor violencia a los de la región[b]; y, después de mandar que se reunieran rápidamente todos en un mismo lugar, intentó apartarlos de la vida con la muerte más cruel[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, «hubo aprendido esto» o «hubo recibido este informe»; μεταλαβών puede significar recibir información o tomarla en sentido más general.
    reason: lexical_alternative
  - marker: b
    text: Literalmente, «los de la χώρα». Aquí probablemente se refiere a los que estaban fuera de Alejandría, en los distritos del país o la región circundante.
    reason: cultural_note
  - marker: c
    text: Literalmente, «apartarlos de la vida»; es decir, darles muerte.
    reason: lexical_alternative
lexical_decisions:
- source_word: μεταλαβὼν
  english_pob_choice: had learned this
  chosen_spanish: hubo recibido esto
  alternatives_spanish:
  - hubo aprendido esto
  - hubo recibido este informe
  - hubo tomado esto en cuenta
  lexicon: LSJ
  rationale: μεταλαμβάνω puede significar recibir información o tomar algo en sentido más amplio. «Hubo recibido esto» conserva esa amplitud mejor que una interpretación demasiado específica, y mantiene el valor perfectivo del participio en la narración.
- source_word: δυσσεβὴς
  english_pob_choice: impious man
  chosen_spanish: el impío
  alternatives_spanish:
  - el impío hombre
  - el malvado
  - el irreligioso
  lexicon: LSJ
  rationale: δυσσεβής tiene una carga religiosa de impiedad, no solo inmoralidad general. «El impío» reproduce esa caracterización breve y solemne en español.
- source_word: ἐξεχόλησεν
  english_pob_choice: became so enraged
  chosen_spanish: se enfureció tanto
  alternatives_spanish:
  - se irritó sobremanera
  - se llenó de furia
  - se embraveció
  lexicon: LSJ
  rationale: El verbo expresa una intensificación fuerte de la ira. «Se enfureció tanto» encaja naturalmente con la cláusula consecutiva ὥστε y conserva la escalada emocional.
- source_word: τοῖς κατὰ Ἀλεξάνδρειαν
  english_pob_choice: those in Alexandria
  chosen_spanish: los de Alejandría
  alternatives_spanish:
  - los que estaban en Alejandría
  - los habitantes de Alejandría
  lexicon: LSJ
  rationale: La frase señala a los que están ubicados en Alejandría. «Los de Alejandría» es natural en español y no añade una precisión inexistente en el griego.
- source_word: τοῖς ἐν τῇ χώρᾳ
  english_pob_choice: those in the country
  chosen_spanish: los del país
  alternatives_spanish:
  - los del campo
  - los de la región
  - los del territorio
  lexicon: LSJ
  rationale: Aquí χώρα contrasta con la ciudad de Alejandría y designa a los del ámbito exterior o regional. «Los del país» sigue el registro del auditable inglés revisado y evita una lectura demasiado rural si el contexto abarca más que el campo propiamente dicho.
- source_word: βαρυτέρως ἐναντιοῦσθαι
  english_pob_choice: opposed ... more violently
  chosen_spanish: se oponía con mayor violencia
  alternatives_spanish:
  - se oponía más duramente
  - mostraba una oposición más severa
  - se enfrentaba más encarnizadamente
  lexicon: LSJ
  rationale: βαρυτέρως intensifica la hostilidad. «Con mayor violencia» recoge bien la revisión inglesa final y mantiene la fuerza comparativa del adverbio.
- source_word: προστάξας σπεύδοντας συναγαγεῖν πάντας ἐπὶ τὸ αὐτό
  english_pob_choice: after ordering that they quickly gather all together in one place
  chosen_spanish: después de mandar que se reunieran rápidamente todos en un mismo lugar
  alternatives_spanish:
  - tras ordenar que todos se reunieran de prisa en un solo lugar
  - después de ordenar que congregaran a todos cuanto antes
  lexicon: LSJ
  rationale: La sintaxis es condensada. «Mandar que se reunieran rápidamente todos en un mismo lugar» conserva la urgencia, la totalidad y el sentido de reunión conjunta sin forzar una reconstrucción excesiva.
- source_word: χειρίστῳ μόρῳ
  english_pob_choice: by the cruelest death
  chosen_spanish: con la muerte más cruel
  alternatives_spanish:
  - por la muerte más cruel
  - con el final más cruel
  - mediante la muerte más atroz
  lexicon: LSJ
  rationale: El griego habla de un final/muerte de extremo rigor. «Con la muerte más cruel» sigue la revisión inglesa hacia death y expresa bien el medio o modo de la intención asesina.
- source_word: τοῦ ζῇν μεταστῆσαι
  english_pob_choice: to remove them from life
  chosen_spanish: apartarlos de la vida
  alternatives_spanish:
  - hacerlos salir de la vida
  - quitarlos de la vida
  - matarlos
  lexicon: LSJ
  rationale: La expresión es un circunloquio para matar. «Apartarlos de la vida» conserva la imagen literal de traslado desde la vida y suena natural en español sin perder la implicación de muerte.
theological_decisions:
- issue: Caracterización moral-religiosa de ὁ δυσσεβής
  english_pob_reading: impious man
  chosen_spanish_reading: el impío
  alternative_spanish_readings:
  - el malvado
  - el irreligioso
  rationale: El texto no usa un simple adjetivo moral, sino una etiqueta religiosa de impiedad. «El impío» mantiene esa carga teológica y funciona bien como apelativo narrativo.
  doctrine_reference: Piedad/impiedad en contraste con reverencia debida a Dios.
translation_notes:
  revision_awareness: La versión inglesa revisó μεταλαβών de «had taken this in» a «had learned this» por claridad; cambió «in the countryside» a «in the country» para un registro más formal; ajustó βαρυτέρως de «more harshly» a «more violently»; y corrigió μόρῳ de «fate» a «death». La redacción española sigue esas revisiones, especialmente en el matiz de violencia y en la referencia explícita a la muerte.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma general del proyecto, pero este versículo no contiene el nombre divino.
  - Se preserva el tono histórico-narrativo solemne sin introducir vocabulario eclesiástico ajeno al griego.
  - «Los de Alejandría» y «los del país» siguen la oposición ciudad/región del original sin sobredeterminarla.
