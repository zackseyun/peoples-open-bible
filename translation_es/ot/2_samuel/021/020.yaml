    rationale: Es una forma incorrecta en español y requiere corrección obligatoria para legibilidad y calidad editorial.
  - severity: medium
    issue: Sintaxis torpe en «cuyoas dedos de las manos y dedos de los pies»
    rationale: Aunque el sentido se entiende, la frase necesita artículo repetido o reestructuración para sonar natural en español sin perder fidelidad.
  - severity: medium
    issue: La nota c dice «descendió del Rapha»
    rationale: «Descendió» expresa movimiento, no linaje. Debe decir «descendía de Rapha» o «era descendiente de Rapha».
  - severity: low
