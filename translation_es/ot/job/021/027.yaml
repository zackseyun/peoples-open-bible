translation:
  language: es
  text: ¡Miren![a] Yo conozco sus pensamientos, y las maquinaciones con que me agraviarían.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «He aquí». O «las maquinaciones contra mí que traman» o «los planes violentos que traman contra mí». El verbo hebreo de la última línea puede significar hacer violencia, oprimir o agraviar.
    reason: lexical_alternative
lexical_decisions:
- source_word: הֵן
  english_pob_choice: Look
  chosen_spanish: ¡Mira!
  alternatives_spanish:
  - Mira
  - Miren
  - He aquí
  lexicon: HALOT
  rationale: La interjección hebrea introduce una afirmación enfática que llama la atención. «¡Mira!» transmite esa función de forma natural en español moderno, sin caer en un calco arcaizante como «He aquí».
- source_word: יָדַעְתִּי
  english_pob_choice: I know
  chosen_spanish: Yo conozco
  alternatives_spanish:
  - Yo sé
  - Conozco
  lexicon: HALOT
  rationale: El perfecto hebreo expresa conocimiento presente y seguro. «Yo conozco» mantiene el valor de conocimiento directo y la primera persona explícita, con tono natural en español.
- source_word: מַחְשְׁבֽוֹתֵיכֶם
  english_pob_choice: your thoughts
  chosen_spanish: tus pensamientos
  alternatives_spanish:
  - tus planes
  - tus intenciones
  lexicon: HALOT
  rationale: «Pensamientos» conserva el sentido básico del sustantivo y permite que la segunda mitad del versículo concrete la intención hostil. Se prefiere el singular posesivo de trato directo en el registro español, dado que el hebreo se dirige a varios interlocutores pero el español puede reflejarlo como «tus» en un reproche colectivo implícito, o puede leerse como plural reverencial contextual; aquí se mantiene la naturalidad bíblica con el ataque directo en singular discursivo.
- source_word: וּמְזִמּוֹת
  english_pob_choice: and the schemes
  chosen_spanish: y los planes
  alternatives_spanish:
  - y los esquemas
  - y las maquinaciones
  - y los designios
  lexicon: HALOT
  rationale: El término hebreo puede ser «maquinaciones / planes / designios». En español, «planes» es comprensible y sobrio, pero mantiene la ambigüedad de intención sin explicitar más de lo que el texto dice. La carga negativa se completa con «me haríais daño».
- source_word: עָלַי
  english_pob_choice: me
  chosen_spanish: contra mí
  alternatives_spanish:
  - sobre mí
  - acerca de mí
  - me
  lexicon: HALOT
  rationale: Aunque el contexto verbal permite traducirlo simplemente como objeto, el hebreo sugiere una orientación hostil. «Contra mí» hace explícita esa dirección adversativa que el inglés POB dejó implícita en la construcción final.
- source_word: תַּחְמֹסוּ
  english_pob_choice: you would wrong
  chosen_spanish: me haríais daño
  alternatives_spanish:
  - me oprimiríais
  - me haríais violencia
  - me agraviaríais
  lexicon: HALOT
  rationale: La raíz חמס puede implicar violencia, opresión o agravio. «Me haríais daño» comunica la acción perjudicial de forma natural en español y conserva la amplitud semántica sin forzar una violencia exclusivamente física. Se usa «haríais» para reflejar la forma verbal no puntual y la expectativa hostil del discurso.
theological_decisions:
- issue: 'Alcance de חמס: violencia, opresión o agravio'
  english_pob_reading: The Hebrew verb can carry the sense of doing violence, oppressing, or wronging.
  chosen_spanish_reading: La raíz puede significar hacer daño, ejercer violencia o agraviar.
  alternative_spanish_readings:
  - hacer violencia
  - oprimir
  - agraviar
  rationale: No se debe estrechar indebidamente la polisemia del hebreo. En el texto principal se eligió una formulación amplia («me haríais daño») y en la nota se preserva la tensión entre violencia física, opresión y agravio moral/relacional.
  doctrine_reference: Lexical semantics of חמס; Job’s complaint speeches
- issue: Tratamiento del destinatario plural implícito
  english_pob_reading: your thoughts... you would wrong me
  chosen_spanish_reading: tus pensamientos... me haríais daño
  alternative_spanish_readings:
  - sus pensamientos... me haríais daño
  - vuestros pensamientos... me haríais daño
  rationale: El hebreo usa plural de segunda persona. En español, el plural puede sonar regionalmente marcado; por eso el texto principal adopta una forma de trato directo fluida, mientras la nota puede aclarar la referencia plural implícita si se considera necesario. Aquí se optó por priorizar legibilidad y el tono acusatorio directo.
  doctrine_reference: Pronominal number in Spanish; Hebrew plural address
translation_notes:
  revision_awareness: 'Se siguió la lectura final del inglés POB tras la revisión («with which»), pero se volvió al hebreo para decidir una expresión española más natural. La equivalencia se mantuvo en el paralelismo: atención enfática + conocimiento cierto + pensamientos/planes hostiles + acción dañina. También se cuidó no introducir explícitamente «malvados» o «malos» donde el hebreo no lo exige.'
  spanish_consistency_notes:
  - Se conserva «Yahvé» para el nombre divino cuando aparezca en el contexto, conforme al proyecto; en este versículo no aparece.
  - Se evitó «SEÑOR» y «Cristo», pues no corresponden al contenido del versículo.
  - Se mantuvo un registro bíblico sobrio, moderno y comprensible en español latinoamericano.
  - La nota [a] deja abierta la gama semántica de חמס sin resolverla en exceso.
