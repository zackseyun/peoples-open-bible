translation:
  language: es
  text: 'Y Jacob dijo: «Oh Dios de mi padre Abraham y Dios de mi padre Isaac, oh Yahvé, que me dijo: “Vuelve a tu tierra y a tu parentela, y yo te haré bien[a]”»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «y haré bien contigo»; la expresión también puede entenderse como «y te trataré bien».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמֶר
  english_pob_choice: And Jacob said
  chosen_spanish: Y Jacob dijo
  alternatives_spanish:
  - Entonces Jacob dijo
  - Así dijo Jacob
  lexicon: HALOT
  rationale: La waw consecutiva avanza la narración; en español, 'Y' conserva ese flujo sin forzar una inferencia temporal adicional.
- source_word: אֱלֹהֵי אָבִי אַבְרָהָם וֵאלֹהֵי אָבִי יִצְחָק
  english_pob_choice: O God of my father Abraham and God of my father Isaac
  chosen_spanish: Oh Dios de mi padre Abraham y Dios de mi padre Isaac
  alternatives_spanish:
  - Dios de mi padre Abraham y Dios de mi padre Isaac
  - Oh Dios de mi padre Abraham, y Dios de mi padre Isaac
  lexicon: HALOT
  rationale: Se mantiene la construcción vocativa con 'Oh' para reflejar la dirección a Dios en oración, y se conserva la repetición de 'Dios de mi padre' como en el hebreo.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  - el SEÑOR
  lexicon: HALOT
  rationale: Se sigue el principio del POB de no ocultar el Tetragrámaton; 'Yahvé' es la forma española establecida para el nombre divino y preserva su valor propio frente a un título genérico.
- source_word: הָאֹמֵר אֵלַי
  english_pob_choice: who said to me
  chosen_spanish: que me dijiste
  alternatives_spanish:
  - que me dijo
  - el que me habló
  lexicon: HALOT
  rationale: El participio con artículo funciona descriptivamente; en español, una relativa directa con pasado resulta natural y mantiene la referencia al Dios que habló previamente a Jacob.
- source_word: שׁוּב
  english_pob_choice: Return
  chosen_spanish: Vuélvete
  alternatives_spanish:
  - Vuelve
  - Regresa
  lexicon: HALOT
  rationale: '''שׁוּב'' expresa retorno; ''Vuélvete'' conserva el matiz de volver al punto de origen o a la tierra señalada, con un tono bíblico claro en español.'
- source_word: לְאַרְצְךָ
  english_pob_choice: to your land
  chosen_spanish: a tu tierra
  alternatives_spanish:
  - a tu país
  - a tu territorio
  lexicon: HALOT
  rationale: '''Tierra'' es la opción más fiel y bíblicamente cargada para הארץ en este contexto patriarcal, sin sustituirla por un término político moderno.'
- source_word: וּלְמוֹלַדְתְּךָ
  english_pob_choice: and to your kindred
  chosen_spanish: y a tu parentela
  alternatives_spanish:
  - y a tu familia
  - y a tu gente
  lexicon: HALOT
  rationale: '''מוֹלֶדֶת'' puede referirse al grupo de origen o parentesco; ''parentela'' conserva esa amplitud familiar/originaria sin reducirla a solo ''familia'' nuclear.'
- source_word: וְאֵיטִיבָה עִמָּךְ
  english_pob_choice: and I will do you good
  chosen_spanish: y yo te haré bien
  alternatives_spanish:
  - y te trataré bien
  - y te haré el bien
  lexicon: HALOT
  rationale: La Hifil de יטב con עִם expresa trato benéfico. 'Te haré bien' comunica de modo natural en español el favor benevolente prometido, sin calcar la preposición hebrea de forma extraña.
theological_decisions:
- issue: Traducción del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - el SEÑOR
  rationale: La decisión doctrinal del POB es preservar el nombre personal de Dios en lugar de sustituirlo por un título. En español, 'Yahvé' es la forma más reconocible y funcional para ese propósito.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Valor de la expresión final וְאֵיטִיבָה עִמָּךְ
  english_pob_reading: and I will do you good
  chosen_spanish_reading: y yo te haré bien
  alternative_spanish_readings:
  - y te trataré bien
  - y haré bien contigo
  rationale: Se evita una lectura mecánica de 'con'/'con-tigo' porque el hebreo expresa beneficencia, no compañía. 'Te haré bien' conserva la promesa de favor sin perder la fuerza semántica del verbo.
  doctrine_reference: HALOT on יטב with עִם; English POB revision notes favoring idiomatic beneficence
translation_notes:
  revision_awareness: 'He seguido la revisión más reciente del POB inglés al preferir una formulación idiomática para וְאֵיטִיבָה עִמָּךְ: en español, «te haré bien» corresponde mejor al sentido benefactivo que un calco como «haré bien contigo». También mantengo el nombre divino como Yahvé, conforme a la línea doctrinal del proyecto, y conservo la vocatividad de la frase.'
  spanish_consistency_notes:
  - Se usa «Yahvé» de manera consistente para יְהוָה.
  - Se conserva la estructura vocativa con «Oh» para reflejar la oración directa.
  - «Tierra» se mantiene para אֶרֶץ en contexto patriarcal.
  - «Parentela» preserva el matiz de origen/linaje de מוֹלֶדֶת.
  - La nota [a] marca la alternativa hebrea del último sintagma sin forzar un calco extraño en el texto principal.
