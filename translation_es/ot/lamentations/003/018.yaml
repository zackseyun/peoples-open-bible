translation:
  language: es
  text: 'Entonces dije: «Mi aguante[a] ha perecido, y mi esperanza de Yahvé[b]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Mi esplendor ha perecido», si נִצְחִי se entiende en el sentido de eminencia o gloria más que de aguante o resistencia.'
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo literalmente: «mi esperanza de Yahvé», una expresión elíptica que puede significar esperanza que viene de Yahvé o esperanza puesta en Yahvé.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וָאֹמַר
  english_pob_choice: So I said
  chosen_spanish: Entonces dije
  alternatives_spanish:
  - Y dije
  - Y entonces dije
  lexicon: HALOT
  rationale: La waw consecutiva introduce la continuación o conclusión del lamento; «Entonces dije» conserva la secuencia narrativa y su matiz inferencial en un español natural.
- source_word: אָבַד
  english_pob_choice: has perished
  chosen_spanish: se ha perdido
  alternatives_spanish:
  - ha perecido
  - se ha desvanecido
  lexicon: HALOT
  rationale: El hebreo expresa pérdida completa. «Se ha perdido» comunica esa desaparición o ruina en registro de lamento; «ha perecido» sería más literal, pero menos natural aquí.
- source_word: נִצְחִי
  english_pob_choice: my endurance
  chosen_spanish: mi resistencia
  alternatives_spanish:
  - mi endurecimiento
  - mi gloria
  - mi esplendor
  - mi fortaleza
  lexicon: HALOT
  rationale: El término puede abarcar permanencia, resistencia o, en otros contextos, eminencia/esplendor. En este contexto de abatimiento personal, «mi resistencia» transmite mejor la capacidad de perseverar sin forzar el sentido hacia gloria o fuerza física.
- source_word: וְתוֹחַלְתִּי
  english_pob_choice: and my hope
  chosen_spanish: y mi esperanza
  alternatives_spanish:
  - y mi expectativa
  lexicon: HALOT
  rationale: תּוֹחֶלֶת suele significar esperanza o expectativa. «Esperanza» es la equivalencia más clara y digna en español contemporáneo.
- source_word: מֵיְהוָה
  english_pob_choice: from Yahweh
  chosen_spanish: en Yahvé
  alternatives_spanish:
  - de Yahvé
  - desde Yahvé
  - por Yahvé
  lexicon: HALOT
  rationale: Aunque el hebreo usa מִן («de/desde/desde el punto de origen»), la frase es elíptica y admite la idea de esperanza dirigida a o fundada en Yahvé. En español, «en Yahvé» expresa mejor la relación de confianza implícita sin perder el referente del nombre divino. La opción se aparta del calco de «desde/de» para evitar una oscuridad innecesaria.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahveh
  lexicon: HALOT
  rationale: 'Se mantiene el nombre propio divino en forma transliterada estándar del proyecto: «Yahvé», conforme al criterio de renderizar el Tetragrámaton por su nombre y no por un sustituto reverencial.'
theological_decisions:
- issue: Representación del Tetragrámaton
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahveh
  - SEÑOR
  rationale: El texto hebreo usa el nombre propio de Dios. Siguiendo la práctica del proyecto, se conserva como nombre explícito en español, no como título sustitutivo.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Sentido de la esperanza ligada a מִן
  english_pob_reading: hope from the LORD
  chosen_spanish_reading: mi esperanza en Yahvé
  alternative_spanish_readings:
  - mi esperanza de Yahvé
  - mi esperanza desde Yahvé
  rationale: El hebreo es elíptico y puede sugerir esperanza que proviene de Yahvé o esperanza puesta en él. «En Yahvé» mantiene esa tensión sin resolverla artificialmente hacia una sola dirección.
  doctrine_reference: Lógica léxica del contexto; ver nota lexical sobre מֵיְהוָה
translation_notes:
  revision_awareness: El audio/traza inglesa mantiene la idea de una afirmación conclusiva en el lamento y conserva la tensión de נִצְחִי como posible “endurance” frente a “splendor”. La versión española sigue esa misma decisión de no reducir el término a una sola acepción tradicional y de mantener la frase elíptica sobre la esperanza vinculada a Yahvé.
  spanish_consistency_notes:
  - Se usa «Yahvé» de manera consistente para יְהוָה.
  - Se eligió un español sobrio y de registro bíblico contemporáneo, evitando calcos como «mi esperanza desde Yahvé» que sonarían extraños.
  - La alternancia entre «resistencia» y «esperanza» conserva el paralelismo del verso sin añadir contenido no atestiguado.
