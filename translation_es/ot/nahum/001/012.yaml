translation:
  language: es
  text: 'Así dice Yahvé: Aunque estén en pleno vigor y sean numerosos[a], aun así serán cortados y desaparecerán. Aunque te he afligido[b], no te afligiré más.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O “Aunque estén en paz y sean muchos, aun así serán cortados”. Esta cláusula hebrea es compacta y difícil, y admite varias traducciones posibles.
    reason: alternative_reading
  - marker: b
    text: El “te” es femenino singular en hebreo, probablemente referido a Sion o Judá personificada como mujer.
    reason: cultural_note
lexical_decisions:
- source_word: כֹּה אָמַר יְהוָה
  english_pob_choice: Thus says Yahweh
  chosen_spanish: Así dice Yahvé
  alternatives_spanish:
  - Esto dice Yahvé
  - Así habla Yahvé
  lexicon: HALOT
  rationale: Fórmula profética estándar; en español, 'Así dice' conserva la solemnidad y la inmediatez del mensajero. 'Yahvé' sigue el criterio del proyecto para el Nombre divino.
- source_word: שְׁלֵמִים
  english_pob_choice: at full strength
  chosen_spanish: en pleno vigor
  alternatives_spanish:
  - enteros
  - íntegros
  - en paz
  lexicon: HALOT
  rationale: El hebreo comunica integridad/completitud en un contexto de poder aparente. 'En pleno vigor' expresa mejor esa fuerza efectiva en español contemporáneo sin volverlo moralizante.
- source_word: וְכֵן רַבִּים
  english_pob_choice: and likewise many
  chosen_spanish: y sean numerosos
  alternatives_spanish:
  - y asimismo muchos
  - y además numerosos
  lexicon: HALOT
  rationale: La cláusula mantiene el paralelismo y la acumulación de abundancia. 'Sean numerosos' suena natural y conserva el matiz cuantitativo.
- source_word: וְכֵן נָגֹזּוּ
  english_pob_choice: even so they will be cut down
  chosen_spanish: aun así serán cortados
  alternatives_spanish:
  - aun así serán segados
  - así serán cortados
  lexicon: HALOT
  rationale: El pasivo sugiere remoción/juzgamiento violento. 'Serán cortados' conserva la fuerza metafórica sin introducir una imagen más específica de la que el contexto exige.
- source_word: וְעָבָר
  english_pob_choice: and pass away
  chosen_spanish: y pasarán
  alternatives_spanish:
  - y desaparecerán
  - y se irán
  lexicon: HALOT
  rationale: El verbo singular/plural del hebreo es difícil; la idea global es la desaparición del enemigo bajo juicio. 'Pasarán' mantiene la brevedad y la continuidad del ritmo hebreo.
- source_word: וְעִנִּתִךְ
  english_pob_choice: Though I have afflicted you
  chosen_spanish: Aunque te he afligido
  alternatives_spanish:
  - Y te he humillado
  - Aunque te he humillado
  lexicon: HALOT
  rationale: ענה en piel suele ser 'afligir/humillar'. Aquí 'afligido' sigue la tradición semántica de dolor/opresión, y el 'te' singular respeta el sufijo femenino singular del hebreo.
- source_word: לֹא אֲעַנֵּךְ עוֹד
  english_pob_choice: I will afflict you no more
  chosen_spanish: no te afligiré más
  alternatives_spanish:
  - no te humillaré más
  - ya no te afligiré
  lexicon: HALOT
  rationale: '''Más'' comunica adecuadamente עוֹד en una promesa de cese definitivo. Se conserva el contraste con el verbo previo para que la repetición retórica se perciba con claridad.'
theological_decisions:
- issue: Referencia del 'te' femenino singular
  english_pob_reading: Addressed to Zion/Judah as a feminine singular entity
  chosen_spanish_reading: Dirigido a Sion/Judá personificada como mujer, preservando el 'te' singular
  alternative_spanish_readings:
  - Dirigido al pueblo de Dios en general
  - Dirigido a Jerusalén personificada
  rationale: El sufijo femenino singular en hebreo apunta a una entidad personificada; el español puede conservar simplemente el trato directo en singular sin resolver demasiado la identificación. Esto preserva la tensión literaria y profética.
  doctrine_reference: 'POB principle: preserve documented referential tension'
- issue: Nombre divino
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - Jehová
  rationale: El texto hebreo usa explícitamente el Tetragrámaton. Siguiendo el criterio del proyecto, se translitera como 'Yahvé' y no se enmascara con un equivalente titular.
  doctrine_reference: Project terminology default for יהוה / YHWH
- issue: Sentido de שְׁלֵמִים en contexto
  english_pob_reading: at full strength
  chosen_spanish_reading: en pleno vigor
  alternative_spanish_readings:
  - enteros
  - íntegros
  - en paz
  rationale: La revisión inglesa favorece la idea de fuerza plena. En español, 'pleno vigor' comunica mejor una condición de potencia completa en un contexto militar/judicial sin perder la compactación del hebreo.
  doctrine_reference: 'Revision awareness: lexical update from ''whole'' to ''at full strength'''
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión inglesa más reciente, que ajustó שְׁלֵמִים de 'whole' a 'at full strength'. Por eso el español evita 'enteros' como opción principal y usa 'en pleno vigor', manteniendo también el resto del cierre del versículo como promesa de cese definitivo de la aflicción.
  spanish_consistency_notes:
  - Se conserva 'Yahvé' conforme al estándar del proyecto para יהוה.
  - Se mantiene el trato directo singular ('te') para reflejar el sufijo femenino singular del hebreo.
  - Se usa 'afligir' en ambos miembros finales para preservar la antítesis retórica del original.
  - 'La puntuación reproduce el giro oracular con dos unidades: declaración general y promesa final.'
