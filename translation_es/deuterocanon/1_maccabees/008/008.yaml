revisions:
- from: y la tierra de la India, de Media y de Lidia[a], y de entre sus mejores tierras; las tomaron de él y se las dieron al rey Eumenes.
  to: y la tierra de la India, de Media y de Lidia[a], y algunas de sus mejores tierras, las tomaron de él y se las dieron al rey Eumenes.
  rationale: Se ajusta la construcción partitiva para que el español exprese con claridad el sentido de ἀπὸ τῶν καλλίστων χωρῶν αὐτῶν como 'algunas de sus mejores tierras', tal como el inglés POB explicitó con 'some of'. También se elimina la puntuación que fragmentaba indebidamente la oración y se mantiene la nota léxica existente, que sigue justificando bien la elección de 'mejores' frente a una traducción demasiado literal de καλλίστων.
