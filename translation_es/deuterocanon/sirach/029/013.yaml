translation:
  language: es
  text: Más que un escudo fuerte y más que una lanza poderosa[a], combatirá por ti contra el enemigo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El griego no repite el sujeto aquí; el sentido es que aquello elogiado en el versículo anterior queda personificado como actuando en tu favor. Posibles ampliaciones contextuales incluyen «tu bondad» o «tu prenda».
    reason: alternative_reading
lexical_decisions:
- source_word: ὑπὲρ
  english_pob_choice: more than
  chosen_spanish: más que
  alternatives_spanish:
  - por encima de
  - más allá de
  lexicon: BDAG
  rationale: En este contexto comparativo con dos armas, la fuerza del griego es de superioridad; «más que» comunica esa comparación de manera natural en español sin perder el paralelismo.
- source_word: ἀσπίδα
  english_pob_choice: shield
  chosen_spanish: escudo
  alternatives_spanish:
  - broquel
  lexicon: LSJ
  rationale: «Escudo» es el equivalente moderno claro y fiel; «broquel» sería demasiado arcaico para el registro buscado.
- source_word: κράτους
  english_pob_choice: strong
  chosen_spanish: fuerte
  alternatives_spanish:
  - poderoso
  - de fuerza
  lexicon: LSJ
  rationale: El genitivo califica al escudo con una cualidad de fuerza o capacidad. «Fuerte» resulta natural en español y conserva la idea de potencia defensiva.
- source_word: δόρυ
  english_pob_choice: spear
  chosen_spanish: lanza
  alternatives_spanish:
  - spear
  - venablo
  lexicon: LSJ
  rationale: En español, «lanza» es el término común y comprensible para el arma de asta que designa δόρυ; «venablo» sería más específico y menos general.
- source_word: ἀλκῆς
  english_pob_choice: mighty
  chosen_spanish: poderosa
  alternatives_spanish:
  - fuerte
  - de gran fuerza
  - valerosa
  lexicon: LSJ
  rationale: El sustantivo expresa vigor, fortaleza y capacidad de resistencia. «Poderosa» mantiene el paralelismo con «escudo fuerte» y suena idiomática en español.
- source_word: κατέναντι ἐχθροῦ
  english_pob_choice: against the enemy
  chosen_spanish: frente al enemigo
  alternatives_spanish:
  - contra el enemigo
  - ante el enemigo
  lexicon: BDAG
  rationale: La preposición compuesta marca posición/hostilidad en presencia del adversario. «Frente al enemigo» conserva el matiz de confrontación y evita una repetición dura de «contra» con el verso siguiente si se leyera en contexto.
- source_word: πολεμήσει
  english_pob_choice: will fight
  chosen_spanish: peleará
  alternatives_spanish:
  - combatirá
  - hará guerra
  - luchará
  lexicon: BDAG
  rationale: El verbo futuro indica acción bélica. «Peleará» es directo y claro para el lector moderno, sin elevar innecesariamente el registro.
- source_word: ὑπὲρ σοῦ
  english_pob_choice: for you
  chosen_spanish: por ti
  alternatives_spanish:
  - a tu favor
  - en tu favor
  - en tu nombre
  lexicon: BDAG
  rationale: 'Aquí ὑπέρ es benefactivo: acción realizada en favor del destinatario. «Por ti» es la expresión más breve y natural en español.'
- source_word: implicit subject of πολεμήσει
  english_pob_choice: it
  chosen_spanish: — (implícito en el verbo)
  alternatives_spanish:
  - él
  - ella
  - eso
  lexicon: Greek grammar/context
  rationale: El griego omite el sujeto explícito. En español, puede mantenerse la elipsis en una cláusula poética y evitar resolver indebidamente si el referente es una persona, un acto o una ayuda previa.
theological_decisions:
- issue: Sujeto implícito de «peleará»
  english_pob_reading: Use the neutral pronoun 'it' rather than specifying the antecedent.
  chosen_spanish_reading: Mantener el sujeto implícito en español, sin especificar si el antecedente es una persona, una acción o una ayuda previa.
  alternative_spanish_readings:
  - él peleará por ti
  - tu bondad peleará por ti
  - tu prenda peleará por ti
  rationale: El griego no repite el sujeto; la POB inglesa preserva esa indeterminación con «it». En español, la elipsis verbal permite conservar mejor la ambigüedad literaria sin introducir un referente no explicitado por el verso.
  doctrine_reference: Preservar la tensión contextual y la primacía del texto original sobre una resolución interpretativa prematura.
translation_notes:
  revision_awareness: El texto inglés revisado pasó de «against an enemy» a «against the enemy» para reflejar el artículo griego y mejorar la consistencia formal. En español, «frente al enemigo» conserva la referencia definida sin forzar una repetición mecánica de «el» donde la fluidez y el paralelismo poético son más naturales.
  spanish_consistency_notes:
  - Se mantuvo Yahvé en la convención general del proyecto, pero este versículo no contiene el nombre divino.
  - 'Se prefirió un registro moderno y digno: «escudo», «lanza», «peleará», evitando arcaísmos innecesarios.'
  - Se conservó la ambigüedad del sujeto implícito, en continuidad con el tratamiento auditado de la POB inglesa.
