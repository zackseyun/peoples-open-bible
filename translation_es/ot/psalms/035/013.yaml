  text: וַ/אֲנִ֤י בַּ/חֲלוֹתָ֡/ם לְב֬וּשִׁ/י שָׂ֗ק עִנֵּ֣יתִי בַ/צּ֣וֹם נַפְשִׁ֑/י וּ֝/תְפִלָּתִ֗/י עַל חֵיקִ֥/י תָשֽׁוּב׀־׃
base_translation:
  language: en
  yaml_path: translation/ot/psalms/035/013.yaml
  text: But as for me[a], when they were sick, my clothing was sackcloth; I humbled myself with fasting[c][b], and my prayer returned to my own bosom.
  footnotes:
  - marker: a
    text: Or, 'my prayer came back unanswered,' or 'my prayer returned to benefit me.' The Hebrew expression is idiomatic and may indicate that his intercession did not change their hostility, or that its benefit returned to him.
    reason: alternative_reading
  - marker: b
    text: Sackcloth was coarse mourning attire, expressing grief, distress, or penitence.
    reason: cultural_note
  - marker: c
    text: Literally, 'I afflicted my soul with fasting,' a Hebrew idiom for self-humbling through fasting.
    reason: lexical_alternative
