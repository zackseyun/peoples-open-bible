review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español sigue bien la estructura y el sentido del hebreo: caso condicional, entrada en estado matrimonial, votos que siguen ''sobre ella'', y una categoría distinta de expresión verbal impulsiva por la que ella se autoobligó. Sin embargo, hay dos ajustes importantes: (1) ''de un hombre'' es demasiado genérico frente a לְאִישׁ en este contexto legal; ''de un esposo'' o construcción equivalente preserva mejor la relación matrimonial. (2) ''se ha ligado a sí misma'' suena poco natural en español jurídico-bíblico; ''se ha obligado'' conserva mejor el sentido de אָסַר en contexto de votos. También conviene evitar una nota separada para ''a sí misma'' porque el español revisado puede incorporar el valor reflexivo sin sobrecargar el texto.'
  spanish_quality_summary: El texto es legible, pero 'la expresión precipitada de sus labios' resulta algo rígido y 'se ha ligado a sí misma' suena forzado. Una formulación más natural y fiel para español eclesial general es 'la expresión precipitada de sus labios, con la cual se ha obligado'. Asimismo, 'esposa de un hombre' puede sonar impropio o demasiado literal; 'esposa de un esposo' es torpe, así que una solución idiomática como 'llega a ser esposa' no expresa por sí sola el complemento legal. 'llega a tener esposo' lee mejor y mantiene el cambio de estado matrimonial.
  glossary_alignment: No hay términos de glosario mayor en conflicto. La revisión propuesta mantiene la literalidad jurídica sin introducir paraphraseo indebido. Se preserva bien la decisión teológica de נֶפֶשׁ como reflexivo personal y no como 'alma'.
  issues:
  - severity: medium
    issue: '''de un hombre'' en ''llega a ser esposa de un hombre'''
    rationale: Aunque formalmente posible, en este contexto legal-matrimonial לְאִישׁ no significa simplemente 'de un hombre' sino entrar en relación de esposo. El español actual lee más natural y preciso con 'llega a tener esposo' o equivalente.
  - severity: medium
    issue: '''se ha ligado a sí misma'' suena poco natural'
    rationale: El verbo 'ligarse' en español no comunica con claridad una autoobligación legal de voto. 'Se ha obligado' conserva mejor la fuerza de אָסַר y mejora la inteligibilidad.
  - severity: low
    issue: Nota c innecesaria tras revisar el texto
    rationale: Si el texto principal ya expresa adecuadamente el sentido reflexivo con 'se ha obligado', una nota adicional para 'sobre su alma/vida' no es necesaria en español y añade carga explicativa no preservada en el inglés como nota.
