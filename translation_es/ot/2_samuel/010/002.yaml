  yaml_path: translation/ot/2_samuel/010/002.yaml
  text: And David said[a], “I will show kindness to Hanun son of Nahash, just as his father showed kindness to me.” So David sent by the hand of his servants to comfort him concerning his father, and David’s servants came into the land of the Ammonites.
  footnotes:
