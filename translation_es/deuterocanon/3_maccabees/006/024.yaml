translation:
  language: es
  text: Han excedido a los reyes y superado a los tiranos en crueldad; y ahora incluso intentan apartarme a mí personalmente[a], su benefactor, del poder y de la vida, maquinando a escondidas lo que no conviene al reino.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'del espíritu' o 'del aliento'. El griego πνεῦμα puede significar 'espíritu', 'aliento' o, por extensión, 'vida'.
    reason: lexical_alternative
lexical_decisions:
- source_word: Παραβεβασιλεύετε
  english_pob_choice: You have overstepped kingship / You have exceeded kings
  chosen_spanish: Habéis excedido a los reyes
  alternatives_spanish:
  - Habéis sobrepasado los límites del reinar
  - Habéis actuado más allá de la conducta propia de los reyes
  lexicon: LSJ
  rationale: El griego con παρα- y βασιλεύω expresa ir más allá de lo debido en conducta real; el comparativo con reyes se conserva mejor en español como 'habéis excedido a los reyes', siguiendo la revisión inglesa que afinó el sentido comparativo.
- source_word: τυράννους
  english_pob_choice: tyrants
  chosen_spanish: los tiranos
  alternatives_spanish:
  - los déspotas
  lexicon: LSJ
  rationale: '''Tiranos'' es el equivalente directo y mantiene el contraste político-moral con ''reyes''.'
- source_word: ὑπερβεβήκατε ὠμότητι
  english_pob_choice: surpassed ... in cruelty
  chosen_spanish: superado ... en crueldad
  alternatives_spanish:
  - sobrepasado ... en brutalidad
  - superado ... en ferocidad
  lexicon: LSJ
  rationale: La expresión idiomática indica exceder a otros en una cualidad; 'crueldad' traduce ὠμότης con claridad y fidelidad.
- source_word: ἐμὲ αὐτὸν
  english_pob_choice: me myself
  chosen_spanish: a mí mismo
  alternatives_spanish:
  - incluso a mí
  - a mí personalmente
  lexicon: LSJ
  rationale: El pronombre enfático se conserva con 'a mí mismo', que suena natural en español y mantiene la fuerza retórica sin añadir interpretación.
- source_word: τὸν ὑμῶν εὐεργέτην
  english_pob_choice: your benefactor
  chosen_spanish: vuestro benefactor
  alternatives_spanish:
  - el que os ha hecho bien
  - vuestro bienhechor
  lexicon: LSJ
  rationale: εὐεργέτης es un título helenístico para un benefactor; 'benefactor' preserva el valor personal y político del término.
- source_word: ἐπιχειρεῖτε
  english_pob_choice: you are now even attempting
  chosen_spanish: intentáis
  alternatives_spanish:
  - estáis intentando
  - os proponéis
  lexicon: LSJ
  rationale: El presente denota una acción en curso; 'intentáis' es conciso y mantiene el carácter acusatorio.
- source_word: τῆς ἀρχῆς
  english_pob_choice: from power
  chosen_spanish: del poder
  alternatives_spanish:
  - del mando
  - de la autoridad
  lexicon: LSJ
  rationale: En este contexto ἀρχή alude al poder de gobierno; 'del poder' es idiomático en español y encaja con el paralelismo de la cláusula.
- source_word: τοῦ πνεύματος
  english_pob_choice: from life / from spirit/breath
  chosen_spanish: de la vida
  alternatives_spanish:
  - del espíritu
  - del aliento
  lexicon: LSJ
  rationale: Como en el audit trail inglés, πνεῦμα admite 'espíritu', 'aliento' o 'vida'; aquí el contexto de despojo político y agresión contra la persona favorece 'vida', que comunica la amenaza de muerte con naturalidad en español.
- source_word: μεθιστᾶν
  english_pob_choice: to remove
  chosen_spanish: apartar
  alternatives_spanish:
  - remover
  - desplazar
  - deponer
  lexicon: LSJ
  rationale: El verbo expresa mover a alguien de una posición o estado; 'apartar' funciona bien en español con ambos complementos ('del poder' y 'de la vida') sin forzar la frase.
- source_word: λάθρα μηχανώμενοι
  english_pob_choice: secretly plotting
  chosen_spanish: maquinando a escondidas
  alternatives_spanish:
  - tramando en secreto
  - maquinando secretamente
  lexicon: LSJ
  rationale: La combinación de participio y adverbio describe una conspiración oculta; 'maquinando a escondidas' es natural, acusatorio y fiel al matiz de intriga.
- source_word: τὰ μὴ συμφέροντα τῇ βασιλείᾳ
  english_pob_choice: what is not advantageous to the kingdom
  chosen_spanish: lo que no conviene al reino
  alternatives_spanish:
  - lo que no beneficia al reino
  - las cosas perjudiciales para el reino
  lexicon: LSJ
  rationale: La expresión indica lo que no resulta provechoso para el reino; 'lo que no conviene al reino' mantiene la cercanía semántica y suena más idiomático que una versión demasiado literal.
theological_decisions:
- issue: Sentido de πνεῦμα en la cláusula de despojo
  english_pob_reading: Rendered as 'life' rather than 'spirit'
  chosen_spanish_reading: Traducido como 'vida' más que como 'espíritu'
  alternative_spanish_readings:
  - espíritu
  - aliento
  rationale: El contexto inmediato es una acusación política de intento de derrocamiento y daño personal. Siguiendo la lectura contextual del inglés, 'vida' comunica mejor el sentido de una agresión mortal; no se está resolviendo una doctrina antropológica, sino un valor léxico contextual.
  doctrine_reference: Mantener la tensión léxica sin convertirla en afirmación doctrinal sobre el alma o la antropología.
translation_notes:
  revision_awareness: La versión inglesa revisó 'overstepped kingship' a 'exceeded kings' para ajustarse mejor al comparativo del griego; la presente redacción española sigue esa revisión con 'habéis excedido a los reyes'. También mantiene la tensión léxica de πνεῦμα, optando por 'vida' en el cuerpo del texto y ofreciendo alternativas en nota.
  spanish_consistency_notes:
  - Se preserva el contraste 'reyes / tiranos' del original griego.
  - '''Benefactor'' se mantiene como término helenístico, no sustituido por un equivalente devocional.'
  - '''Poder y vida'' reproduce la estructura paralela del inglés auditado y del griego, con ''vida'' como solución contextual para πνεῦμα.'
  - El registro busca ser bíblico y público en español moderno, sin depender de fórmulas eclesiásticas tradicionales.
