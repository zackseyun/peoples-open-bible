review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura y el sentido general del hebreo: oposición de la familia, exigencia de entregar al hijo, muerte retributiva, eliminación del heredero y metáfora de la brasa restante. Sin embargo, hay un desajuste modal importante en el discurso citado: וְנַשְׁמִידָה expresa intención volitiva paralela a וּנְמִתֵהוּ, por lo que «y destruiríamos también al heredero» suena condicional/hipotético y rompe la secuencia directa de la amenaza. Debe ser «y destruiremos» o equivalente. También conviene alinear la nota de «nombre ni remanente» con la auditoría inglesa, ya que esa explicación se conserva allí pero falta como nota en español.'
  spanish_quality_summary: El español es claro, digno y en general natural. «Tu sierva», «se ha levantado contra», «Entrega» y «sobre la faz de la tierra» funcionan bien en registro bíblico legible. «Y he aquí» es aceptable, aunque algo rígido; no requiere cambio. «Así apagarían mi brasa que aún queda» se entiende, pero puede fluir mejor como «Así apagarían mi brasa restante» o «la brasa que me queda». El problema principal de calidad sigue siendo «destruiríamos», que no encaja con la cita directa. Además, falta una nota para «nombre ni remanente», que en español puede leerse solo como reputación si no se aclara.
  glossary_alignment: 'No hay conflictos con la terminología base del proyecto. No aparecen Yahvé/Mesías/etc. Las decisiones léxicas principales son fieles: שִׁפְחָתֶךָ -> «tu sierva»; מַכֵּה אָחִיו -> «al que hirió a su hermano» preserva bien la progresión; הַיּוֹרֵשׁ -> «el heredero» es correcto; גַּחַלְתִּי -> «mi brasa» preserva la metáfora. Se recomienda ajustar solo la modalidad verbal y añadir la aclaración de «nombre ni remanente».'
  issues:
  - severity: high
    issue: Modo verbal incorrecto en «y destruiríamos también al heredero»
    rationale: 'El hebreo וְנַשְׁמִידָה es cohortativo/volitivo en coordinación con «para que lo matemos» dentro de la cita de la familia. «Destruiríamos» introduce un matiz condicional o potencial que no está en el original. Debe expresar intención directa: «y destruiremos también al heredero».'
  - severity: medium
    issue: Falta una nota para «sin nombre ni remanente»
    rationale: La auditoría inglesa preserva explícitamente la explicación cultural de que la frase alude a memoria y línea sobreviviente, no solo a reputación. En español esta ambigüedad permanece y conviene conservar la nota.
  - severity: low
    issue: «mi brasa que aún queda» es comprensible pero algo pesada
    rationale: La metáfora está bien preservada, pero una formulación más compacta como «mi brasa restante» o «la brasa que me queda» mejora la naturalidad sin perder el sentido.
