review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura y el sentido del hebreo: pregunta de lamento, plural explícito de חֲסָדֶיךָ mediante «actos», vocativo divino, juramento a David y la frase final «en tu fidelidad» con nota alternativa. Sin embargo, hay un problema terminológico importante con אֲדֹנָי: el texto español usa «Señor», pero el proyecto pide «Yahvé» solo para יהוה, mientras que אֲדֹנָי debe traducirse como título, normalmente «Señor». Aquí eso coincide con el borrador, pero la nota [b] está mal colocada: no comenta «Señor», sino la frase «en tu fidelidad». Además, la redacción puede pulirse para sonar más natural y más cercana al inglés auditado.'
  spanish_quality_summary: El español es claro y digno, pero «de antes» es algo coloquial en este contexto poético; «de antaño» o «primeros» suena más bíblico y natural. También conviene recolocar la nota [b] al segmento correcto. «Oh Señor» es inteligible, pero «Señor» sin «oh» fluye mejor en español moderno. La nota [a] necesita mejorar la formulación del plural literal, porque «amor(es) leal(es)» se ve artificioso.
  glossary_alignment: 'Buena alineación general con las decisiones del POB: חֶסֶד como «amor leal» es defendible en contexto pactal; el plural se preserva con «actos». «Fidelidad» para אֱמוּנָה también concuerda. No hay conflicto con Yahvé, porque la fuente tiene אֲדֹנָי, no יהוה. La principal corrección es técnica y estilística: marcador de nota y mejora de «de antes».'
  issues:
  - severity: high
    issue: La nota [b] está anclada a «Señor», pero su contenido explica «en tu fidelidad / por tu fidelidad».
    rationale: Los marcadores deben aparecer en la palabra o frase pertinente. Tal como está, induce a pensar erróneamente que la alternativa afecta al título divino.
  - severity: medium
    issue: «de antes» suena demasiado coloquial para este lamento poético.
    rationale: Aunque semánticamente correcto, «de antaño» o «anteriores» conserva mejor la dignidad literaria y el contraste temporal del hebreo הָרִאשֹׁנִים.
  - severity: low
    issue: La nota [a] formula de manera torpe el literal hebreo con «amor(es) leal(es)».
    rationale: Puede expresarse mejor como «tus amores leales de antaño» o aclarar que el hebreo usa un plural poco natural en español.
  revised_spanish_text: ¿Dónde están tus actos de amor leal[a] de antaño, Señor, que juraste a David en tu fidelidad[b]?
  revised_footnotes:
