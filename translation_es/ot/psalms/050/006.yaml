translation:
  language: es
  text: Y los cielos declaran su rectitud[a], porque Dios mismo es juez. Selah
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «su justicia».
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּגִּידוּ
  english_pob_choice: declare
  chosen_spanish: declaran
  alternatives_spanish:
  - proclaman
  - anuncian
  - dan a conocer
  lexicon: HALOT
  rationale: El verbo en hifil de נגד expresa hacer saber públicamente. «Declaran» conserva el matiz proclamatorio y solemne en un español natural y publicable.
- source_word: שָׁמַיִם
  english_pob_choice: the heavens
  chosen_spanish: los cielos
  alternatives_spanish:
  - el cielo
  - los cielos
  lexicon: HALOT
  rationale: En poesía hebrea, el plural funciona colectivamente; «los cielos» mantiene el registro elevado y la imagen del texto mejor que un singular más abstracto.
- source_word: צִדְקוֹ
  english_pob_choice: his righteousness
  chosen_spanish: su justicia
  alternatives_spanish:
  - su rectitud
  - su justicia/righteousness
  lexicon: HALOT
  rationale: צדק puede abarcar justicia y rectitud. En español, «justicia» es la opción más natural aquí y preserva el posible matiz forense del contexto de juicio, sin negar la amplitud moral del término.
- source_word: כִּי
  english_pob_choice: for
  chosen_spanish: porque
  alternatives_spanish:
  - pues
  - ya que
  - porque/for
  lexicon: HALOT
  rationale: Aquí introduce la razón de la declaración de los cielos; «porque» expresa con claridad la relación causal en español.
- source_word: אֱלֹהִים
  english_pob_choice: God
  chosen_spanish: Dios
  alternatives_spanish:
  - Dios mismo
  - el Dios
  lexicon: HALOT
  rationale: El sentido singular es inequívoco por el predicado y el pronombre. «Dios» es la traducción directa y reverente.
- source_word: שֹׁפֵט
  english_pob_choice: is judge
  chosen_spanish: es juez
  alternatives_spanish:
  - juzga
  - es el juez
  lexicon: HALOT
  rationale: El participio funciona como predicado nominal. «Es juez» preserva esa fuerza nominal sin convertirlo en una acción verbal más explícita de la que el hebreo da.
- source_word: הוּא
  english_pob_choice: himself
  chosen_spanish: mismo
  alternatives_spanish:
  - él mismo
  - él
  lexicon: HALOT
  rationale: El pronombre independiente añade énfasis. En español, «Dios mismo» reproduce con naturalidad esa intensificación y evita una redundancia pesada.
- source_word: סֶלָה
  english_pob_choice: Selah
  chosen_spanish: Selah
  alternatives_spanish:
  - Selá
  lexicon: HALOT
  rationale: El término se translitera tradicionalmente y su función precisa es incierta; conservar «Selah» respeta el marcador litúrgico hebreo.
theological_decisions:
- issue: צדק en el marco del juicio divino
  english_pob_reading: his righteousness
  chosen_spanish_reading: su justicia
  alternative_spanish_readings:
  - su rectitud
  - su justicia/rectitud
  rationale: La POB inglesa conserva la tensión entre righteousness y justice. En español, «justicia» encaja mejor con el contexto inmediato de Dios como juez, mientras que la nota preserva la alternativa semántica.
  doctrine_reference: 'DOCTRINE.md: términos contestados sobre justicia/rectitud; mantener la amplitud semántica de δικαιοσύνη y términos afines cuando el contexto lo exige.'
- issue: Intensificación con el pronombre independiente
  english_pob_reading: God himself is judge
  chosen_spanish_reading: Dios mismo es juez
  alternative_spanish_readings:
  - Él es juez
  - Dios es juez
  rationale: El hebreo subraya enfáticamente al sujeto. «Dios mismo» comunica ese énfasis de modo idiomático en español y mantiene la fuerza teológica del verso.
  doctrine_reference: 'Gramática hebrea: pronombre independiente enfático; no implica una doctrina adicional, sino una intensificación retórica del sujeto.'
translation_notes:
  revision_awareness: El texto inglés auditado no mostró cambios en la última pasada y fue considerado de alto acuerdo; esta propuesta sigue su lectura principal, pero en español elige «su justicia» como opción más natural y conserva la alternativa semántica en nota.
  spanish_consistency_notes:
  - Se preserva «Selah» como transliteración litúrgica.
  - Se usa «Dios» para אֱלֹהִים, no una mayúscula perifrástica.
  - «Los cielos» mantiene el plural poético del hebreo.
  - No se introduce «SEÑOR» para יהוה porque este versículo no contiene el nombre divino; el sujeto es אֱלֹהִים.
