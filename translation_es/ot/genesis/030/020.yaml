- from: 'Y dijo Lea[a]: «Dios me ha favorecido con un buen favor. Esta vez mi marido me honrará, porque le he dado a luz seis hijos». Y llamó su nombre Zabulón.'
  to: 'Y Lea dijo: «Dios me ha dado un buen don. Esta vez mi marido me honrará[a], porque le he dado seis hijos». Y le puso por nombre Zabulón.'
  rationale: 'Se revisa para preservar mejor el campo léxico de זבד/זבד con «me ha dado un buen don», corregir el anclaje de la nota al verbo «me honrará», mejorar la naturalidad de «le he dado seis hijos» y usar una fórmula de nombramiento más idiomática en español: «le puso por nombre Zabulón».'
