  language: en
  yaml_path: translation/ot/exodus/015/016.yaml
  text: Terror and dread will fall on them[a]; by the greatness of your arm they will be still as a stone, until your people pass by, O Yahweh[c][b], until this people whom you acquired pass by.
  footnotes:
