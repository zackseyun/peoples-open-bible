translation:
  language: es
  text: Ahora, manda que se corten para mí cedros del Líbano, y que mis siervos estén con tus siervos; y daré el salario de tus siervos conforme a todo lo que digas; porque tú sabes que entre nosotros no hay hombre[a] que sepa cortar madera[b] como los sidonios.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «no hay hombre entre nosotros». La expresión se refiere a la ausencia de alguien con habilidad comparable, no necesariamente a una exclusión de género como afirmación social.'
    reason: lexical_alternative
  - marker: b
    text: O «que sepa cortar árboles». El hebreo literalmente dice «cortar maderas/árboles», pero el contexto es la tala de madera para construcción.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְעַתָּה
  english_pob_choice: Now
  chosen_spanish: Ahora
  alternatives_spanish:
  - Y ahora
  lexicon: HALOT
  rationale: Como marcador discursivo, introduce la petición. «Ahora» conserva la transición inmediata y suena natural en español.
- source_word: צַוֵּה
  english_pob_choice: command
  chosen_spanish: manda
  alternatives_spanish:
  - ordena
  - da la orden
  lexicon: HALOT
  rationale: El imperativo expresa una solicitud real y directa al rey. «Manda» mantiene el tono de autoridad sin volver la frase pesada.
- source_word: וְיִכְרְתוּ לִי אֲרָזִים
  english_pob_choice: that cedars ... be cut for me
  chosen_spanish: que corten para mí cedros
  alternatives_spanish:
  - que se corten para mí cedros
  - que talen para mí cedros
  lexicon: HALOT
  rationale: El hebreo pide la acción de cortar sobre los cedros. «Que corten» conserva la voz volitiva y el objeto solicitado; «cedros» reproduce אֲרָזִים con el término español natural.
- source_word: מִן הַלְּבָנוֹן
  english_pob_choice: from Lebanon
  chosen_spanish: del Líbano
  alternatives_spanish:
  - de Líbano
  lexicon: HALOT
  rationale: La preposición y el nombre propio se expresan de forma idiomática en español sin alterar el sentido de procedencia.
- source_word: וַעֲבָדַי יִהְיוּ עִם עֲבָדֶיךָ
  english_pob_choice: let my servants be with your servants
  chosen_spanish: y que mis siervos estén con tus siervos
  alternatives_spanish:
  - y que mis esclavos estén con tus esclavos
  - y mis siervos estarán con tus siervos
  lexicon: HALOT
  rationale: Se mantiene «siervos» en el contexto de trabajo organizado, donde el POB inglés usa «servants» y no pretende subrayar esclavitud jurídica. La construcción con «que... estén» preserva el valor jussivo.
- source_word: וּשְׂכַר עֲבָדֶיךָ
  english_pob_choice: the wages of your servants
  chosen_spanish: el salario de tus siervos
  alternatives_spanish:
  - la paga de tus siervos
  - la compensación de tus siervos
  lexicon: HALOT
  rationale: שׂכר denota pago por trabajo. «Salario» comunica con claridad la idea de remuneración, manteniendo el matiz laboral.
- source_word: אֶתֵּן לְךָ
  english_pob_choice: I will give you
  chosen_spanish: daré
  alternatives_spanish:
  - te daré
  - yo te daré
  lexicon: HALOT
  rationale: El español puede omitir el pronombre sujeto sin perder énfasis. La forma futura simple conserva la promesa.
- source_word: כְּכֹל אֲשֶׁר תֹּאמֵר
  english_pob_choice: according to all that you say
  chosen_spanish: conforme a todo lo que digas
  alternatives_spanish:
  - según todo lo que digas
  - como tú digas
  lexicon: HALOT
  rationale: «Conforme a» reproduce bien la amplitud de la cláusula y mantiene un registro claro y formal.
- source_word: אֵין בָּנוּ אִישׁ
  english_pob_choice: among us there is no man
  chosen_spanish: entre nosotros no hay hombre
  alternatives_spanish:
  - entre nosotros no hay nadie
  - no hay entre nosotros hombre
  lexicon: HALOT
  rationale: Se conserva «hombre» para reflejar אִישׁ, como en el POB inglés. En español la frase funciona idiomáticamente como una afirmación de ausencia de alguien con esa habilidad.
- source_word: יֹדֵעַ לִכְרָת עֵצִים
  english_pob_choice: who knows how to cut timber
  chosen_spanish: que sepa cortar madera
  alternatives_spanish:
  - que sepa cortar árboles
  - que conozca cómo cortar madera
  lexicon: HALOT
  rationale: El contexto es la tala para construcción; «madera» expresa el resultado práctico mejor que la literalidad de «árboles». «Sepa» transmite habilidad, no solo conocimiento.
- source_word: כַּצִּדֹנִים
  english_pob_choice: like the Sidonians
  chosen_spanish: como los sidonios
  alternatives_spanish:
  - como los de Sidón
  - igual que los sidonios
  lexicon: HALOT
  rationale: La comparación a la pericia de los sidonios se mantiene de forma directa. «Sidonios» conserva el gentilicio.
theological_decisions:
- issue: Traducción de עֲבָדִים en un contexto de trabajo negociado
  english_pob_reading: servants
  chosen_spanish_reading: siervos
  alternative_spanish_readings:
  - esclavos
  - trabajadores
  rationale: Aquí el inglés POB eligió «servants» porque el foco está en la colaboración laboral y el pago, no en definir estatus social o jurídico. En español, «siervos» preserva esa neutralidad contextual mejor que «esclavos», sin perder la relación de dependencia bajo autoridad.
  doctrine_reference: No doctrinal; decisión contextual y lexical sobre estatus social.
- issue: Valor de אִישׁ en la expresión negativa
  english_pob_reading: no man
  chosen_spanish_reading: no hay hombre
  alternative_spanish_readings:
  - no hay nadie
  - no hay persona
  rationale: El POB inglés conserva «man» para reflejar el hebreo אִישׁ y añade una nota para evitar una lectura excluyente. En español se conserva «hombre» por fidelidad léxica, entendiendo la expresión como ausencia de alguien con la habilidad requerida.
  doctrine_reference: Antropología bíblica y fidelidad léxica al hebreo אִישׁ.
translation_notes:
  revision_awareness: 'La versión inglesa auditada permanece sin cambios en la última revisión («unchanged: true»), con acuerdo alto y solo observaciones menores. La redacción española sigue de cerca esa lectura, manteniendo las decisiones léxicas clave: mandato directo, jussivo en la petición, «siervos» para el contexto laboral, «salario» para שׂכר y la comparación explícita con los sidonios.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» solo cuando el texto fuente lo requiere; este versículo no lo contiene.
  - Se preserva «siervos» por coherencia con el uso laboral del POB y para no introducir «esclavos» sin apoyo contextual.
  - «Sidonios» se usa como gentilicio estándar y coherente con la comparación del original.
  - La puntuación sigue el español moderno, con comas y punto y coma para reflejar las cláusulas del hebreo sin sobrefragmentarlas.
