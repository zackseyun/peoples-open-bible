review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja correctamente la estructura de advertencia de פֶּן, conserva bien «Yahvé» para יְהוָה y mantiene el sentido global: si Yahvé ve eso y lo considera malo, quitará su enojo del enemigo. Sin embargo, dos formulaciones españolas no son fieles ni naturales del todo: «le parezca malo en sus ojos» mezcla el modismo hebreo con una construcción poco idiomática en español, y «aparte de sobre él su enojo» es un calco innecesariamente rígido de מֵעָלָיו que perjudica la claridad.'
  spanish_quality_summary: La legibilidad necesita un ajuste menor. «No sea que» funciona bien. Pero «vea [a]» deja el pie de nota separado del referente y sin objeto expreso; «vea[a]» o mejor una nota anclada en toda la cláusula evaluativa sería más limpio. «Le parezca malo en sus ojos» suena forzado en español; «sea malo a sus ojos» conserva el modismo con buena dignidad. «Aparte de él su enojo» es natural y suficiente; añadir «de sobre» suena calcado.
  glossary_alignment: 'Alineado en lo principal con la terminología del proyecto: יְהוָה -> «Yahvé» correctamente; אַף -> «enojo» es aceptable en este contexto sapiencial. No hay conflictos doctrinales. La principal corrección es estilístico-lexical para reflejar mejor el modismo hebreo sin sacrificar español natural.'
  issues:
  - severity: medium
    issue: «y le parezca malo en sus ojos» es una construcción española poco idiomática
    rationale: El hebreo וְרַע בְּעֵינָיו significa literalmente «y sea malo en/sus ojos», un modismo evaluativo. En español, «le parezca malo en sus ojos» combina dos giros y suena torpe. «Sea malo a sus ojos» preserva el modismo y la fuerza semántica de רַע.
  - severity: medium
    issue: «y aparte de sobre él su enojo» es un calco innecesario
    rationale: Aunque מֵעָלָיו contiene la idea de «de sobre él», en español esa reproducción literal resulta antinatural. «Aparte de él su enojo» transmite fielmente la remoción del enojo divino y mantiene buena legibilidad.
  - severity: low
    issue: La nota [a] está anclada de forma poco precisa
    rationale: La alternativa se refiere a la cláusula evaluativa, no solo al verbo «vea». Conviene ubicar el marcador en la frase correspondiente para mayor claridad editorial.
  revised_spanish_text: No sea que Yahvé vea que eso[a] sea malo a sus ojos, y aparte de él su enojo.
  revised_footnotes:
  - marker: a
    text: 'O: «le sea desagradable a sus ojos».'
    reason: lexical_alternative
  revision_rationale: 'Se ajustó el español para conservar el sentido hebreo con mayor naturalidad: «sea malo a sus ojos» refleja mejor el modismo evaluativo que «le parezca malo en sus ojos», y «aparte de él su enojo» evita el calco rígido «de sobre él» sin perder el sentido. También se reubicó la nota para que ancle la cláusula a la que realmente corresponde la alternativa.'
