translation:
  language: es
  text: Cuando David y sus hombres llegaron a la ciudad, y he aquí que estaba quemada[a], y sus esposas, hijos e hijas habían sido llevados cautivos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Estaba quemada» traduce el estado resultante descrito por el participio pasivo hebreo; también podría entenderse como «había sido quemada». El hebreo añade explícitamente «con/fuego», pero en español se expresa de forma más natural en la línea principal como «quemada».
    reason: alternative_reading
lexical_decisions:
- source_word: וַיָּבֹא
  english_pob_choice: came
  chosen_spanish: llegaron
  alternatives_spanish:
  - vinieron
  - vinieron a
  lexicon: HALOT
  rationale: El verbo narra el desplazamiento de David y su grupo; en español, el plural natural con sujeto compuesto es «llegaron». Mantiene el movimiento y la secuencia narrativa sin añadir matices.
- source_word: וַאֲנָשָׁיו
  english_pob_choice: his men
  chosen_spanish: sus hombres
  alternatives_spanish:
  - los hombres con él
  - su gente
  lexicon: HALOT
  rationale: «Sus hombres» reproduce la relación posesiva de manera idiomática y conserva la referencia al grupo de guerra de David.
- source_word: אֶל הָעִיר
  english_pob_choice: to the city
  chosen_spanish: a la ciudad
  alternatives_spanish:
  - hasta la ciudad
  - a la urbe
  lexicon: HALOT
  rationale: «Ciudad» es la correspondencia directa y natural de עִיר; no se fuerza un término más específico sin base contextual suficiente.
- source_word: וְהִנֵּה
  english_pob_choice: behold
  chosen_spanish: he aquí
  alternatives_spanish:
  - y mira
  - y he aquí
  lexicon: HALOT
  rationale: «He aquí» conserva el valor discursivo de sorpresa o señalamiento repentino que la POB inglesa marcó con «behold».
- source_word: שְׂרוּפָה בָּאֵשׁ
  english_pob_choice: was burned with fire
  chosen_spanish: estaba quemada por el fuego
  alternatives_spanish:
  - estaba incendiada
  - había sido quemada por el fuego
  lexicon: HALOT
  rationale: El participio pasivo femenino describe el estado visible de la ciudad al llegar David. «Estaba quemada por el fuego» conserva el resultado presente sin sobrerrefinar el aspecto; se mantiene el complemento explícito «por el fuego» para reflejar בָּאֵשׁ.
- source_word: וּנְשֵׁיהֶם
  english_pob_choice: their wives
  chosen_spanish: sus mujeres
  alternatives_spanish:
  - sus esposas
  - sus esposas y mujeres
  lexicon: HALOT
  rationale: Aquí el hebreo puede referirse específicamente a las esposas, pero en español «sus mujeres» resulta fiel y menos interpretativo que imponer «esposas»; la POB inglesa optó por «wives» por el contexto familiar.
- source_word: וּבְנֵיהֶם וּבְנֹתֵיהֶם
  english_pob_choice: sons, and daughters
  chosen_spanish: hijos e hijas
  alternatives_spanish:
  - hijos, y hijas
  - varones e hijas
  lexicon: HALOT
  rationale: El hebreo distingue hijos varones e hijas, pero en español «hijos e hijas» comunica la totalidad de los descendientes de forma natural. En este contexto, «hijos» mantiene la referencia genérica al componente masculino/filiativo sin perder el paralelismo con «hijas».
- source_word: נִשְׁבּוּ
  english_pob_choice: had been taken captive
  chosen_spanish: habían sido llevados cautivos
  alternatives_spanish:
  - habían sido capturados
  - habían sido hechos cautivos
  lexicon: HALOT
  rationale: El nifal de שׁבה expresa quedar en cautiverio. «Llevados cautivos» conserva el sentido bélico y el desplazamiento forzado; se evita «capturados» por ser más general y menos preciso respecto al cautiverio.
translation_notes:
  revision_awareness: 'El texto inglés auditado fue revisado de «it had been burned with fire» a «it was burned with fire» para una lectura más directa del hebreo. La versión española sigue esa misma preferencia aspectual: expresa el estado visible de la ciudad sin convertirlo en una narración más analítica de anterioridad.'
  spanish_consistency_notes:
  - Se usa «Yahvé» como terminología fija del proyecto solo cuando el hebreo lo exige; este versículo no contiene el nombre divino.
  - Se mantiene un registro bíblico claro y sobrio, sin arcaísmos innecesarios.
  - Se evita traducir «captive» como simple «capturados» para conservar la fuerza de cautiverio de נִשְׁבּוּ.
