- from: Se servían bebidas en vasos de oro[a], y los vasos eran distintos unos de otros, y el vino real era abundante, conforme a la mano del rey.
  to: Se servían bebidas en vasos de oro, y los vasos eran distintos unos de otros, y el vino real era abundante, según la generosidad del rey[a].
  rationale: Se cambia el modismo final a una formulación española natural que comunica el sentido de provisión generosa documentado por el audit trail inglés. Se conserva la literalidad hebrea en nota. También se corrige la ubicación del anclaje de la nota para que corresponda al sintagma explicado.
