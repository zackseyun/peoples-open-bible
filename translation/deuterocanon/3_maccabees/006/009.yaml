theological_decisions:
- issue: Rendering covenantal designation τοῖς ἁγίοις for Israel
  chosen_reading: the holy ones
  alternative_readings:
  - the saints
  - your holy people
  rationale: The term denotes those set apart to God within Israel. 'The holy ones' preserves the lexical sense without importing later Christianized title usage. The context is ethnic Israel under oppression, so the phrase is not generalized beyond what the text states.
  doctrine_reference: DOCTRINE.md §Translation philosophy 1, 6
- issue: Rendering γένος with ethnic force
  chosen_reading: Israel’s race
  alternative_readings:
  - Israel's people
  - Israel's stock
  rationale: The Greek explicitly marks descent/peoplehood. The translation preserves that ethnic-genealogical emphasis rather than flattening it to a purely religious category. This follows original-language primacy even where modern English may prefer a softer term.
  doctrine_reference: DOCTRINE.md §Translation philosophy 1, 5
