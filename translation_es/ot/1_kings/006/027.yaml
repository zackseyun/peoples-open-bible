translation:
  language: es
  text: Puso los querubines dentro de la casa interior[a], y los querubines extendieron sus alas, y el ala del uno tocaba el muro, y el ala del segundo querubín tocaba el otro muro; y sus alas, hacia el centro de la casa, tocaban ala con ala.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «en la casa interior»; el hebreo dice literalmente «dentro de la casa interior», refiriéndose a la parte más interna del templo.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּתֵּן
  english_pob_choice: He placed
  chosen_spanish: Puso
  alternatives_spanish:
  - colocó
  - puso en su lugar
  lexicon: HALOT
  rationale: נתן en este contexto arquitectónico expresa poner o situar algo. «Puso» es natural en español y conserva el acto de ubicación sin introducir una explicación adicional.
- source_word: הַכְּרוּבִים
  english_pob_choice: the cherubim
  chosen_spanish: los querubines
  alternatives_spanish:
  - los querubines celestiales
  - los querubines
  lexicon: HALOT
  rationale: Se mantiene el término tradicional «querubines» para el ser cultual/heavenly del texto, sin reducirlo a «querubes» o a una glosa interpretativa.
- source_word: בְּתוֹךְ הַבַּיִת הַפְּנִימִי
  english_pob_choice: inside the inner house
  chosen_spanish: dentro de la casa interior
  alternatives_spanish:
  - dentro de la casa más interior
  - en el santuario interior
  lexicon: HALOT
  rationale: Se conserva la literalidad de בַּיִת como «casa», siguiendo la decisión inglesa de no sustituirla por «santuario» como equivalente interpretativo. «Interior» transmite הַפְּנִימִי y mantiene la referencia al espacio más interno del templo.
- source_word: וַיִּפְרְשׂוּ אֶת כַּנְפֵי הַכְּרֻבִים
  english_pob_choice: and the cherubim spread out their wings
  chosen_spanish: los querubines extendieron las alas
  alternatives_spanish:
  - extendieron las alas de los querubines
  - desplegaron sus alas
  lexicon: HALOT
  rationale: La construcción hebrea, aunque formalmente puede leerse como «extendieron las alas de los querubines», en contexto describe la acción de los propios querubines. «Extendieron las alas» conserva la imagen con fluidez española.
- source_word: וַתִּגַּע
  english_pob_choice: touched
  chosen_spanish: tocaba
  alternatives_spanish:
  - alcanzaba
  - llegaba a tocar
  lexicon: HALOT
  rationale: נגע denota contacto físico. «Tocaba» reproduce de manera directa la relación espacial continua entre el ala y el muro.
- source_word: כְּנַף הָאֶחָד
  english_pob_choice: the wing of the one
  chosen_spanish: el ala del uno
  alternatives_spanish:
  - el ala del primero
  - una de las alas
  lexicon: HALOT
  rationale: Se conserva la indefinición relativa del hebreo («el uno») sin forzar «primero», que el texto no dice. «Ala» mantiene el singular distributivo.
- source_word: בַּקִּיר
  english_pob_choice: the wall
  chosen_spanish: el muro
  alternatives_spanish:
  - la pared
  - el muro
  lexicon: HALOT
  rationale: «Muro» es fiel al sentido arquitectónico y suena más apropiado en un contexto de construcción sagrada que «pared», que en español puede sentirse más doméstico.
- source_word: הַכְּרוּב הַשֵּׁנִי
  english_pob_choice: the second cherub
  chosen_spanish: el segundo querubín
  alternatives_spanish:
  - el otro querubín
  - el segundo querubín
  lexicon: HALOT
  rationale: Se conserva el ordinal del hebreo («segundo») para respetar la estructura paralela del verso y la simetría entre ambos querubines.
- source_word: הַקִּיר הַשֵּׁנִי
  english_pob_choice: the other wall
  chosen_spanish: el otro muro
  alternatives_spanish:
  - el segundo muro
  - la otra pared
  lexicon: HALOT
  rationale: Aunque el hebreo dice literalmente «el segundo muro», el español idiomático en una oposición de dos lados es «el otro muro», que comunica la relación sin sonar forzado.
- source_word: וְכַנְפֵיהֶם אֶל תּוֹךְ הַבַּיִת
  english_pob_choice: their wings toward the middle of the house
  chosen_spanish: sus alas, hacia el centro de la casa
  alternatives_spanish:
  - sus alas, hacia el interior de la casa
  - sus alas, hacia el medio de la casa
  lexicon: HALOT
  rationale: תּוֹךְ apunta al interior/centro. «Centro» aquí ayuda a visualizar el punto medio hacia el cual se orientan las alas, en consonancia con la cláusula final.
- source_word: נֹגְעֹת כָּנָף אֶל כָּנָף
  english_pob_choice: were touching wing to wing
  chosen_spanish: estaban tocándose ala con ala
  alternatives_spanish:
  - tocaban ala con ala
  - estaban en contacto ala con ala
  lexicon: HALOT
  rationale: Se preserva la fórmula concreta del hebreo «ala con ala». «Estaban tocándose» refleja el participio con sentido progresivo/estativo del cierre del verso.
theological_decisions:
- issue: Traducción de בית como «casa» en vez de «santuario» o «templo»
  english_pob_reading: inside the inner house
  chosen_spanish_reading: dentro de la casa interior
  alternative_spanish_readings:
  - dentro del santuario interior
  - dentro del templo interior
  rationale: La tradición auditada en inglés decidió conservar «house» para reflejar el hebreo y evitar una interpretación más técnica. En español se mantiene «casa» por la misma razón, aunque el referente sea el espacio interno del templo.
  doctrine_reference: No aplica; decisión de precisión lexical y arquitectónica.
- issue: Conservación de «querubines» como término técnico
  english_pob_reading: the cherubim
  chosen_spanish_reading: los querubines
  alternative_spanish_readings:
  - los querubes
  - los ángeles querubines
  rationale: El texto presenta seres cultuales específicos; «querubines» preserva el registro bíblico y evita una reducción a categorías angelológicas posteriores.
  doctrine_reference: No aplica; terminología bíblico-cultual.
translation_notes:
  revision_awareness: La redacción sigue de cerca la lectura inglesa auditada y la valora como de alta concordancia con el hebreo; no se registran revisiones aplicadas en el contexto inglés, por lo que no se introduce una innovación interpretativa adicional.
  spanish_consistency_notes:
  - Se conserva «querubines» de manera uniforme para הַכְּרוּבִים.
  - Se mantiene «casa» para בַּיִת, en línea con la decisión auditada de no sustituir por «santuario» en el texto principal.
  - Se traduce el paralelismo espacial con una sintaxis española natural, sin perder la repetición de «ala» y «muro» del hebreo.
