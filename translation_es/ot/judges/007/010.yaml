translation:
  language: es
  text: Pero si temes bajar, baja al campamento con Purá, tu siervo[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: La nota alternativa de la POB inglesa para נַעַר reconoce varias posibilidades; aquí se adopta «siervo» siguiendo la revisión más reciente del audit trail.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְאִם
  english_pob_choice: But if
  chosen_spanish: Pero si
  alternatives_spanish:
  - Y si
  - Ahora si
  lexicon: HALOT
  rationale: La conjunción condicional introduce una concesión respecto de la instrucción anterior; en español, «Pero si» conserva mejor el matiz de contraste suave que un simple «si».
- source_word: יָרֵא
  english_pob_choice: are afraid
  chosen_spanish: temes
  alternatives_spanish:
  - tienes miedo
  - estás asustado
  lexicon: HALOT
  rationale: El hebreo describe el estado de temor de Gedeón; «temes» suena natural en español y mantiene el valor verbal del original sin endurecerlo.
- source_word: לָרֶדֶת / רֵד
  english_pob_choice: to go down / go down
  chosen_spanish: bajar / baja
  alternatives_spanish:
  - descender / desciende
  lexicon: HALOT
  rationale: Se conserva la repetición del verbo hebreo para mantener el énfasis retórico. «Bajar» es más natural en español narrativo que «descender».
- source_word: וּפֻרָה
  english_pob_choice: with Purah
  chosen_spanish: Purá
  alternatives_spanish:
  - con Purá
  lexicon: HALOT
  rationale: El hebreo aquí funciona como acompañamiento con el siguiente nombre; en español el nombre se coordina de modo natural dentro de la frase («baja tú y Purá»), sin perder la idea de acompañamiento.
- source_word: נַעַרְךָ
  english_pob_choice: your servant
  chosen_spanish: tu siervo
  alternatives_spanish:
  - tu joven
  - tu asistente
  lexicon: HALOT
  rationale: La revisión inglesa favorece «servant» sobre «young man» por ser más natural y preciso en este contexto. En español, «siervo» conserva esa relación subordinada y refleja mejor la decisión auditada que «joven».
- source_word: אֶל הַמַּחֲנֶה
  english_pob_choice: to the camp
  chosen_spanish: al campamento
  alternatives_spanish:
  - al campamento de guerra
  - hacia el campamento
  lexicon: HALOT
  rationale: אֶל expresa dirección; «al campamento» es la forma más directa y clara en español, manteniendo el movimiento hacia el lugar sin añadir interpretación.
translation_notes:
  revision_awareness: La revisión inglesa cambió de «your young man» a «your servant» por mayor naturalidad y precisión para נַעַר. La versión española sigue esa revisión y evita una nota anclada a una lectura que no quedó en el texto principal. Se corrigió además el anclaje de la nota para que el marcador aparezca exactamente en el texto traducido.
  spanish_consistency_notes:
  - Se mantiene el tono de instrucción directa y concisa del hebreo.
  - «Purá» conserva la acentuación española del nombre propio.
  - No se introduce «con» antes de Purá porque la coordinación verbal ya expresa acompañamiento de manera natural.
  - Se evita «descender» para no volver el estilo demasiado formal.
  - La frase final «al campamento» conserva la direccionalidad de אֶל sin sobrerinterpretación.
