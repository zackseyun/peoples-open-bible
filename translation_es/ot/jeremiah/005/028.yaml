review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien el sentido general del hebreo y del POB inglés: prosperidad indulgente, exceso en la maldad, falta de justicia para el huérfano y negación del derecho de los pobres. Sin embargo, hay dos puntos a reparar: ''han pasado de las obras malas'' no suena natural ni expresa con claridad ''han ido más allá/sobrepasado'' en español; y ''para que prosperen'' sugiere con demasiada fuerza propósito intencional, cuando el expediente inglés conserva la ambigüedad de una cláusula difícil. También conviene mejorar ''Se han engordado'' a una forma más idiomática.'
  spanish_quality_summary: 'El español es mayormente claro y digno, pero contiene giros poco naturales: ''Se han engordado'' suena torpe; ''han pasado de las obras malas'' en muchos contextos hispanos puede entenderse como ''dejaron atrás'' o ''ya no les importan'', en vez de ''han sobrepasado''; y la nota c explica al revés la relación entre ''huérfano'' y ''sin padre''. La estructura jurídica del versículo se puede expresar con mayor fluidez sin perder fidelidad.'
  glossary_alignment: No hay conflictos con la terminología de proyecto. 'Dios/Yahvé/Mesías' no aparecen. 'Huérfano' es aceptable como equivalente contextual de יָתוֹם, siempre que la nota aclare que también puede traducirse 'sin padre'. 'Derecho' para מִשְׁפָּט es defendible y natural en español.
  issues:
  - severity: medium
    issue: '''Se han engordado'' es poco idiomático'
    rationale: Aunque refleja la imagen corporal del hebreo, en español bíblico natural 'Han engordado' suena mejor y conserva la crítica profética.
  - severity: high
    issue: '''También han pasado de las obras malas'' es ambiguo y poco fiel en español'
    rationale: '''Pasar de'' normalmente significa ignorar algo o dejarlo atrás, no excederlo. El hebreo עָבְרוּ con דִבְרֵי רָע expresa sobrepasar límites en la maldad.'
  - severity: medium
    issue: '''para que prosperen'' sobredefine una cláusula sintácticamente difícil'
    rationale: El POB inglés mantiene la ambigüedad entre propósito, resultado o concesión. En español, 'de modo que prosperan' conserva mejor esa tensión, mientras las alternativas siguen en nota.
  - severity: low
    issue: La nota c está conceptualmente invertida
    rationale: No es que 'huérfano' traduzca el sentido de 'sin padre' subyacente, sino que el hebreo dice más específicamente 'sin padre', y 'huérfano' es una alternativa castellana idiomática.
  revised_spanish_text: Han engordado[a]; están lustrosos. También han sobrepasado las obras malas. No juzgan con justicia la causa del huérfano[c], de modo que prosperan[b], y no defienden el derecho de los pobres.
  revised_footnotes:
  - marker: a
    text: 'O: ''Incluso han sobrepasado cosas/materias malas''; el hebreo dice literalmente: ''han sobrepasado palabras de mal''.'
    reason: lexical_alternative
  - marker: b
    text: La cláusula 'de modo que prosperan' es difícil. También puede entenderse como 'y prosperan' o 'aunque prosperen'.
    reason: alternative_reading
  - marker: c
    text: '''Huérfano'' también puede traducirse ''sin padre''.'
    reason: lexical_alternative
  revision_rationale: 'Se hicieron ajustes menores pero importantes para mejorar fidelidad y naturalidad: ''Han engordado'' en vez de ''Se han engordado''; ''han sobrepasado'' en vez de ''han pasado de'' para reflejar el cruce de límites en el hebreo; y ''de modo que prosperan'' para no imponer un matiz de propósito demasiado estrecho en una cláusula reconocidamente difícil. También se corrigió la formulación de la nota sobre ''huérfano/sin padre''.'
