review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien el sentido básico del hebreo: invitación afectuosa, salida al ámbito rural y pernocta en asentamientos rurales. Las decisiones principales para לְכָה, דוֹדִי, נֵצֵא, הַשָּׂדֶה, נָלִינָה y בַּכְּפָרִים son fieles al contexto y al rastro de auditoría inglés. Sin embargo, la nota [a] está anclada en «Ven» pero ofrece como alternativa «ve», lo que no corresponde al inglés POB, donde la alternativa documentada pertenece al sintagma final (''in the villages''), no a לְכָה. Además, el borrador omitió la nota sobre la alternativa ''en las aldeas''/''en los pueblos'' para בַּכְּפָרִים.'
  spanish_quality_summary: 'El español es natural, claro y poético: «Ven, amado mío, salgamos al campo; pasemos la noche entre las aldeas». La formulación es ampliamente legible en español eclesial. Aun así, «mi amado» suena algo más idiomático y poético que «amado mío» en este contexto. También conviene corregir la distribución de notas para evitar confusión y alinear mejor las notas con sus palabras ancla.'
  glossary_alignment: No hay términos del glosario doctrinal mayor en este versículo que requieran ajuste. «amado» para דוֹדִי, «campo» para הַשָּׂדֶה y «aldeas» para בַּכְּפָרִים son adecuados. La alternativa botánica ('flores de alheña') debe mantenerse en nota, y la alternativa locativa 'en las aldeas' debe preservarse también, conforme al POB inglés.
  issues:
  - severity: high
    issue: La nota [a] está mal asignada.
    rationale: En el POB inglés, la nota a ('Or in the villages') corresponde a בַּכְּפָרִים, no a «Come». En español, anclar [a] en «Ven» y ofrecer «ve» introduce una alternativa no documentada como nota y desplaza una alternativa sí documentada.
  - severity: medium
    issue: Falta una nota para la alternativa locativa de בַּכְּפָרִים.
    rationale: 'El POB inglés preserva la alternativa ''in the villages''. En español debe conservarse como «O: “en las aldeas”» o equivalente, anclada al sintagma final.'
  - severity: low
    issue: «amado mío» es correcto pero menos idiomático que «mi amado».
    rationale: Ambas opciones son fieles, pero «mi amado» suena más natural en español bíblico-poético contemporáneo sin pérdida de sentido.
  revised_spanish_text: Ven, mi amado, salgamos al campo; pasemos la noche entre las aldeas[a].[b]
  revised_footnotes:
  - marker: a
    text: 'O: «en las aldeas».'
    reason: lexical_alternative
  - marker: b
    text: Algunos interpretan aquí «entre las flores de alheña», relacionando el término hebreo con la planta mencionada en Cantar 1:14; sin embargo, el contexto inmediato apunta más probablemente a aldeas del campo.
    reason: alternative_reading
  revision_rationale: La revisión corrige la asignación errónea de la nota [a], restaura la alternativa léxica documentada para בַּכְּפָרִים, conserva la nota interpretativa sobre «flores de alheña» y mejora levemente la naturalidad poética con «mi amado».
