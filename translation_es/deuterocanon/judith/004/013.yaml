revisions:
- from: Y cubrieron el altar con saco[a], y clamaron al Dios de Israel unánimemente y con insistencia, para que no entregara a sus pequeños hijos para saqueo, y a sus mujeres para botín, y a las ciudades de su herencia para destrucción, y a las cosas santas para profanación y oprobio[b], motivo de gozo para las naciones.
  to: Y cubrieron el altar con saco[a], y clamaron al Dios de Israel unánimemente y con insistencia, que no entregara a sus pequeños al saqueo, ni a sus mujeres como botín, ni las ciudades de su herencia a la destrucción, ni las cosas santas a profanación y oprobio[b], motivo de gozo para las naciones.
  rationale: 'Ajusté solo lo necesario para mejorar la naturalidad española sin perder el paralelismo ni la fuerza del griego: cambié «para que no entregara» por «que no entregara» como contenido de la súplica; «sus pequeños hijos para saqueo» por «sus pequeños al saqueo» para una construcción más idiomática; y «a sus mujeres para botín» por «a sus mujeres como botín», que expresa mejor προνομή en español. También regularicé la serie paralela con «ni ... ni ... ni ... ni ...».'
  reviewer_model: gpt-5.4
