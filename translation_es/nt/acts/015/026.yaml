translation:
  language: es
  text: hombres que han entregado sus vidas por el nombre de nuestro Señor Jesús Mesías[a][b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: ‘O: «han puesto en riesgo sus vidas»; el griego es más literalmente «habiendo entregado sus vidas», un giro idiomático para exponerse a peligro mortal.’
    reason: lexical_alternative
  - marker: b
    text: El griego dice ‘Jesús Cristo’; aquí se traduce ‘Jesús Mesías’ porque Χριστός funciona como título con el sentido de ‘Mesías’.
    reason: alternative_reading
lexical_decisions:
- source_word: ἀνθρώποις
  english_pob_choice: men
  chosen_spanish: hombres
  alternatives_spanish:
  - personas
  - hombres y mujeres
  lexicon: BDAG
  rationale: En el contexto inmediato se refiere a Bernabé y Pablo; por eso ‘hombres’ conserva la especificidad del referente y el tono encomiástico, sin volver genérico lo que el griego aquí aplica a varones concretos.
- source_word: παραδεδωκόσι
  english_pob_choice: have given up their lives
  chosen_spanish: han entregado sus vidas
  alternatives_spanish:
  - han puesto en riesgo sus vidas
  - han dado sus vidas
  - han cedido sus vidas
  lexicon: BDAG
  rationale: El participio perfecto de παραδίδωμι conserva la idea literal de ‘entregar/poner en manos de otro’; en este giro idiomático con ψυχὰς y ὑπέρ, ‘han entregado sus vidas’ refleja la fuerza de haberlas expuesto a peligro mortal sin suavizarla a una mera disposición interior.
- source_word: τὰς ψυχὰς αὐτῶν
  english_pob_choice: their lives
  chosen_spanish: sus vidas
  alternatives_spanish:
  - sus almas
  - ellos mismos
  lexicon: BDAG
  rationale: ψυχή aquí tiene el sentido de ‘vida’ en un contexto de riesgo y sacrificio; ‘vidas’ evita una lectura errónea como ‘almas’ en sentido inmaterial.
- source_word: ὑπὲρ
  english_pob_choice: for
  chosen_spanish: por
  alternatives_spanish:
  - a favor de
  - por causa de
  - por amor a
  lexicon: BDAG
  rationale: Con genitivo, ὑπέρ expresa finalidad/beneficio o causa; ‘por’ es natural en español y mantiene la brevedad del griego.
- source_word: τοῦ ὀνόματος
  english_pob_choice: the name
  chosen_spanish: el nombre
  alternatives_spanish:
  - la autoridad
  - la reputación
  lexicon: BDAG
  rationale: Se conserva ‘nombre’ porque en el uso bíblico incluye identidad, honor y autoridad; una paráfrasis estrecharía ese alcance.
- source_word: τοῦ κυρίου ἡμῶν
  english_pob_choice: of our Lord
  chosen_spanish: de nuestro Señor
  alternatives_spanish:
  - de nuestro Maestro
  lexicon: BDAG
  rationale: ‘Señor’ preserva el valor cristológico de κύριος y su uso neotestamentario estándar.
- source_word: Ἰησοῦ Χριστοῦ
  english_pob_choice: Jesus Messiah
  chosen_spanish: Jesús Mesías
  alternatives_spanish:
  - Jesús Cristo
  lexicon: BDAG
  rationale: En esta secuencia titulativa, Χριστός funciona como título, no como mero apellido; ‘Mesías’ traduce el valor semántico de forma más auditable y coherente con la política de traducir títulos.
theological_decisions:
- issue: Traducción de Χριστοῦ como título mesiánico
  english_pob_reading: Jesus Messiah
  chosen_spanish_reading: Jesús Mesías
  alternative_spanish_readings:
  - Jesús Cristo
  rationale: Se mantiene el sentido titular de Χριστός. En español, ‘Mesías’ comunica directamente el valor de ungido/mesianidad sin convertir el término en un nombre fijo.
  doctrine_reference: 'DOCTRINE.md: traducir títulos; transliterar nombres. Tabla de términos debatidos para Χριστός'
- issue: Intensidad de παραδεδωκόσι en el contexto de peligro
  english_pob_reading: have given up their lives
  chosen_spanish_reading: han entregado sus vidas
  alternative_spanish_readings:
  - han arriesgado sus vidas
  - han dado sus vidas
  rationale: El griego literal apunta a ‘entregar’ la vida, con la implicación de exposición a peligro mortal. ‘Han entregado’ conserva la tensión entre entrega voluntaria y riesgo real.
  doctrine_reference: BDAG / uso idiomático de παραδίδωμι con ψυχή y ὑπέρ
translation_notes:
  revision_awareness: 'El borrador sigue la revisión más reciente del POB: se mantiene la lectura titulativa de Χριστός como ‘Mesías’ y se evita la paráfrasis ‘arriesgado’ para reflejar mejor la fuerza de παραδεδωκόσι. También se conserva la referencia al nombre, no una equivalencia interpretativa más estrecha.'
  spanish_consistency_notes:
  - Uso de ‘Mesías’ para Χριστός en función titulativa, conforme a la política del proyecto y al expediente de revisión.
  - ‘Hombres’ se usa por la especificidad del referente en este contexto, no como genérico universal.
  - ‘Vida(s)’ para ψυχή en contexto de sacrificio y peligro; se evita ‘alma’.
  - ‘Señor’ para κύριος mantiene el registro cristológico estándar.
  - Se conserva la estructura nominal ‘por el nombre de...’ para no diluir el giro bíblico del griego.
