translation:
  language: es
  text: Entonces volverá a su tierra con gran riqueza[a], pero su corazón estará en contra del pacto santo; y actuará y volverá a su tierra.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «con grandes posesiones»; el término hebreo puede denotar bienes, propiedad o riqueza.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְיָשֹׁב
  english_pob_choice: Then he will return
  chosen_spanish: Entonces volverá
  alternatives_spanish:
  - Y volverá
  - Así que volverá
  lexicon: HALOT
  rationale: El imperfecto de שוב funciona narrativamente como secuencia de acciones. «Entonces» refleja mejor el avance discursivo que un simple «y»; «volverá» conserva el sentido básico de retorno sin añadir matices no presentes.
- source_word: אַרְצוֹ
  english_pob_choice: to his land
  chosen_spanish: a su tierra
  alternatives_spanish:
  - a su país
  - a su país de origen
  lexicon: HALOT
  rationale: אֶרֶץ puede significar «tierra» o «país», pero en este contexto político-geográfico «tierra» es natural en español y mantiene la amplitud del hebreo sin especificar más de lo que dice el texto.
- source_word: בִּרְכוּשׁ גָּדוֹל
  english_pob_choice: with great wealth
  chosen_spanish: con gran riqueza
  alternatives_spanish:
  - con grandes posesiones
  - con mucho botín
  lexicon: HALOT
  rationale: רְכוּשׁ puede abarcar bienes, propiedad o riqueza. «Riqueza» reproduce bien el valor amplio y evita forzar «botín», que no está explícito en el hebreo.
- source_word: וּלְבָבוֹ עַל
  english_pob_choice: but his heart will be against
  chosen_spanish: pero su corazón estará contra
  alternatives_spanish:
  - y su corazón estará contra
  - pero su corazón será hostil a
  lexicon: HALOT
  rationale: לֵבָב con עַל expresa disposición interna dirigida en contra. «Estará contra» es una forma clara y directa en español, y conserva la oposición interna sin suavizarla.
- source_word: בְּרִית קֹדֶשׁ
  english_pob_choice: the holy covenant
  chosen_spanish: el pacto santo
  alternatives_spanish:
  - el pacto sagrado
  - la alianza santa
  lexicon: HALOT
  rationale: בְּרִית se puede rendir como «pacto» o «alianza»; aquí «pacto» es más transparente y ampliamente entendible. «Santo» conserva קֹדֶשׁ como cualidad consagrada, siguiendo la terminología bíblica sin interpretarla más allá del texto.
- source_word: וְעָשָׂה
  english_pob_choice: and he will act
  chosen_spanish: y actuará
  alternatives_spanish:
  - y hará
  - y tomará acción
  lexicon: HALOT
  rationale: עשה es semánticamente amplio. «Actuará» preserva la indefinición del hebreo y suena natural en español; evita precisar qué hará exactamente el sujeto.
- source_word: וְשָׁב לְאַרְצוֹ
  english_pob_choice: and return to his land
  chosen_spanish: y volverá a su tierra
  alternatives_spanish:
  - y regresará a su tierra
  - y retornará a su tierra
  lexicon: HALOT
  rationale: La repetición de שוב merece conservarse. «Volverá» mantiene la paralelía verbal del hebreo y es idiomático en español; «a su tierra» repite la imagen geográfica de la primera cláusula.
theological_decisions:
- issue: Sentido de «el pacto santo»
  english_pob_reading: Retain the covenant language without interpretive expansion.
  chosen_spanish_reading: Conservar «el pacto santo» sin expandirlo interpretativamente.
  alternative_spanish_readings:
  - la religión judía
  - el pueblo de Dios
  - el orden del pacto santo
  rationale: El hebreo habla de ברית קֹדֶשׁ y no explicita una paráfrasis más amplia. Traducirlo con lenguaje de pacto preserva la tensión teológica y evita cerrar el sentido a una sola identificación histórica o doctrinal.
  doctrine_reference: Preservar la tensión teológica sin resolverla de antemano.
translation_notes:
  revision_awareness: La redacción sigue la revisión final del POB en inglés al preferir una formulación directa para la oposición del corazón («estará contra») y al mantener la repetición de «volverá». También evita sobreespecificar el tipo de riqueza, conservando la amplitud semántica de רְכוּשׁ.
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando el texto lo requiere; aquí no aparece el nombre divino.
  - Se mantiene «pacto santo» como término bíblico transparente y no se sustituye por una formulación eclesiástica más interpretativa.
  - «Tierra» traduce אֶרֶץ de forma consistente con el contexto geopolítico de Daniel.
  - El paralelismo de שוב se conserva con dos verbos de retorno en español.
