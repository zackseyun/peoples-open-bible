review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien el hebreo y el rastro POB en casi todo: mantiene «Y en Susa», traduce correctamente בִּירָה como «ciudadela» con nota alternativa, conserva la doble predicación «mataron y destruyeron», y retiene «quinientos hombres» conforme a אִישׁ como sustantivo contado masculino. La única mejora necesaria es estilística-sintáctica en español: con objeto personal humano contado, «destruyeron a quinientos hombres» suena menos natural y puede leerse como si el complemento perteneciera solo al segundo verbo.'
  spanish_quality_summary: 'El español es claro y fiel, pero la coordinación verbal con un solo complemento humano queda algo forzada. Reordenar a «mataron a quinientos hombres y los destruyeron» sería peor; lo más natural y fiel es colocar el complemento tras ambos verbos: «los judíos mataron y destruyeron a quinientos hombres». Además, conviene simplificar la nota: «acrópolis» añade una precisión técnica no presente en la nota inglesa.'
  glossary_alignment: No hay conflictos con la terminología del proyecto. «los judíos» coincide con el criterio contextual para הַיְּהוּדִים. No aparecen términos teológicos especiales del glosario. «ciudadela» es una buena equivalencia de בִּירָה, con «fortaleza» en nota como alternativa válida.
  issues:
  - severity: medium
    issue: Orden sintáctico algo poco natural en español
    rationale: «Y en Susa, la ciudadela, los judíos mataron y destruyeron a quinientos hombres» es comprensible, pero la aposición y la posición del complemento hacen la frase más rígida de lo necesario. «Y en Susa, la ciudadela[a], los judíos mataron y destruyeron a quinientos hombres» fluye mejor.
  - severity: low
    issue: La nota añade «acrópolis», que va más allá de la nota auditada en inglés
    rationale: La nota inglesa dice «fortified palace complex or citadel». «Acrópolis» no es necesariamente erróneo, pero introduce una especificación adicional no documentada en el rastro POB y puede resultar menos clara para lectores generales.
  revised_spanish_text: Y en Susa, la ciudadela[a], los judíos mataron y destruyeron a quinientos hombres.
  revised_footnotes:
  - marker: a
    text: O «la fortaleza». El término hebreo puede designar un complejo palaciego fortificado o una ciudadela.
    reason: lexical_alternative
  revision_rationale: Se hace una reparación menor de estilo y ajuste de nota. El texto base era sustancialmente fiel, pero esta redacción suena más natural en español y la nota queda más ceñida al razonamiento léxico documentado en el POB inglés.
