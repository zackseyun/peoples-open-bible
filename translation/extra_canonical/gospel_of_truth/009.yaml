    text: Or 'he uttered it outside, in the place of the One Light. Yet an ignorance
      remained beside him.\n\nWhen the Light spoke through his mouth and by his voice
      brought forth life, he gave to them Thought, understanding, mercy, salvation,
      and the Spirit of power, from the infinity and sweetness of the Father. The
      Beginning is the Father, the immeasurable one.'.
