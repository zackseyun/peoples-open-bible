    reason: lexical_alternative
  - marker: c
    text: «La casa de nuestro padre» puede referirse no solo al hogar físico, sino también a la familia, la hacienda o el patrimonio familiar.
    reason: cultural_note
  revision_rationale: Se reemplaza «y dijeron a él» por «y le dijeron» para lograr un español natural sin perder la referencia explícita al destinatario presente en el hebreo. También se reordenan y mejoran las notas para reflejar una alternativa léxica más útil («porción») y para conservar la nota cultural sobre «la casa de nuestro padre».
