translation:
  language: es
  text: El hombre sabio no odiará la ley[a], pero el que es hipócrita respecto de ella es como un barco en una tormenta.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «el hipócrita respecto de ella es como un barco en una tempestad». El participio griego puede expresarse de manera más compacta como un sustantivo.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀνὴρ
  english_pob_choice: man
  chosen_spanish: el hombre
  alternatives_spanish:
  - la persona
  lexicon: LSJ
  rationale: El griego usa ἀνὴρ, masculino singular. En español, «el hombre» conserva ese valor gramatical y el tono proverbial de la sentencia sapiental.
- source_word: σοφὸς
  english_pob_choice: wise
  chosen_spanish: sabio
  alternatives_spanish:
  - prudente
  - hábil
  lexicon: LSJ
  rationale: En este contexto sapiencial, «sabio» es el equivalente natural y mantiene el registro de sabiduría.
- source_word: μισήσει
  english_pob_choice: will not hate
  chosen_spanish: no odiará
  alternatives_spanish:
  - no despreciará
  lexicon: LSJ
  rationale: μισέω significa ordinariamente «odiar». «Odiará» conserva la fuerza directa del contraste con el resto del versículo.
- source_word: νόμον
  english_pob_choice: the law
  chosen_spanish: la ley
  alternatives_spanish:
  - la instrucción
  - la Ley
  lexicon: LSJ
  rationale: En Sirácida, νόμος suele referirse a la ley de Dios/Torá. «La ley» preserva ese sentido sin añadir explicaciones ajenas al texto.
- source_word: ὑποκρινόμενος
  english_pob_choice: the one who is hypocritical
  chosen_spanish: el que es hipócrita
  alternatives_spanish:
  - el hipócrita
  - el que finge
  lexicon: LSJ
  rationale: El participio expresa conducta de disimulo o representación. «El que es hipócrita» mantiene la idea sin forzar un giro demasiado idiomático en español.
- source_word: ἐν αὐτῷ
  english_pob_choice: in it
  chosen_spanish: en ella
  alternatives_spanish:
  - respecto de ella
  - en relación con ella
  lexicon: LSJ
  rationale: El pronombre remite a νόμον («la ley»), que en español es femenino. «En ella» conserva la concisión del griego y la referencia inmediata.
- source_word: καταιγίδι
  english_pob_choice: storm
  chosen_spanish: tormenta
  alternatives_spanish:
  - tempestad
  - borrasca
  lexicon: LSJ
  rationale: «Tormenta» es claro y natural en español moderno; comunica bien la violencia de καταιγίς.
- source_word: πλοῖον
  english_pob_choice: ship
  chosen_spanish: nave
  alternatives_spanish:
  - barco
  - buque
  lexicon: LSJ
  rationale: «Nave» funciona bien en el símil y es suficientemente general para πλοῖον; evita restringir la imagen a una embarcación de tamaño específico.
theological_decisions:
- issue: Referencia de «la ley» (νόμον)
  english_pob_reading: Torah/the law in a Jewish sapiential sense, rendered simply as 'the law'
  chosen_spanish_reading: Torá/ley de Dios, expresada simplemente como «la ley»
  alternative_spanish_readings:
  - instrucción
  - la Ley
  rationale: En Sirácida, la referencia es probablemente la ley divina en sentido judío sapiencial. «La ley» conserva el marco bíblico sin expandir el texto innecesariamente.
  doctrine_reference: 'Translation philosophy: original-language primacy; consistency of key terms'
- issue: Fuerza de ὑποκρινόμενος
  english_pob_reading: active dissembling toward the law ('is hypocritical in it')
  chosen_spanish_reading: conducta de hipocresía o disimulo respecto de la ley
  alternative_spanish_readings:
  - fingimiento en la ley
  - hipocresía respecto de ella
  rationale: El participio no solo etiqueta a una persona, sino que describe una conducta. «El que es hipócrita» conserva esa tensión y mantiene el contraste moral con el sabio.
  doctrine_reference: 'Translation philosophy: preserve significant lexical decisions explicitly'
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión más reciente del POB inglés, que prefirió «the one who is hypocritical» por encima de una forma más literal como «plays the hypocrite», buscando naturalidad sin perder la fuerza del participio ὑποκρινόμενος. La versión española refleja esa decisión con una construcción equivalente y natural.
  spanish_consistency_notes:
  - Se mantuvo «la ley» para νόμος, en coherencia con el marco judío sapiencial del libro.
  - Se tradujo ὑποκρινόμενος con una construcción personal («el que es hipócrita») para conservar el matiz activo del participio.
  - Se eligió «nave» para πλοῖον por claridad general y tono literario adecuado al símil.
  - Se evitó sustituir «ley» por «instrucción» en el texto principal para no diluir el referente probable a la Torá.
