translation:
  language: es
  text: Sabiduría escondida y tesoro oculto—¿qué provecho tienen ambos?[a][b]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literalmente, «¿qué provecho hay en ambos?» o «en los dos?». La redacción española «¿qué provecho tienen ambos?» expresa de forma más natural la misma pregunta retórica sobre las dos cosas escondidas.
    reason: lexical_alternative
  - marker: b
    text: 'El paralelo griego añade una línea introductoria: «Conservad la instrucción en paz, hijos», antes del dicho sobre la sabiduría escondida y el tesoro oculto. El testimonio hebreo usado para el texto principal comienza directamente con esta línea sobre la sabiduría escondida.'
    reason: textual_variant
lexical_decisions:
- source_word: חכמה / σοφία
  english_pob_choice: wisdom
  chosen_spanish: sabiduría
  alternatives_spanish:
  - sabiduría práctica
  - conocimiento
  lexicon: HALOT; LSJ
  rationale: La voz central del proverbio es la sabiduría como realidad valiosa; en español, «sabiduría» expresa de forma natural y fiel la misma noción que el hebreo חכמה y el griego σοφία.
- source_word: טמונה / κεκρυμμένη
  english_pob_choice: hidden
  chosen_spanish: escondida
  alternatives_spanish:
  - oculta
  - escondida
  lexicon: HALOT; LSJ
  rationale: «Escondida» conserva el matiz de algo guardado fuera de la vista y suena natural en español poético. Se mantiene la distinción con «oculto» en la segunda cola.
- source_word: אוצר / θησαυρός
  english_pob_choice: treasure
  chosen_spanish: tesoro
  alternatives_spanish:
  - riqueza
  - acopio
  lexicon: HALOT; LSJ
  rationale: El paralelo con sabiduría apunta al objeto valioso en sí, no al lugar de almacenamiento. «Tesoro» reproduce bien el valor y el paralelismo del término griego θησαυρός.
- source_word: מוסתר / ἀφανής
  english_pob_choice: concealed / unseen
  chosen_spanish: oculto
  alternatives_spanish:
  - escondido
  - invisible
  - no visto
  lexicon: HALOT; LSJ
  rationale: Para el segundo miembro, «oculto» mantiene la imagen de algo no patente o no visible, sin repetir exactamente la primera cola y sin añadir un matiz más fuerte del necesario.
- source_word: מה תועלה
  english_pob_choice: what benefit is in
  chosen_spanish: ¿qué provecho hay en
  alternatives_spanish:
  - ¿qué beneficio hay en
  - ¿de qué sirve
  lexicon: HALOT
  rationale: La pregunta retórica pide por utilidad o ganancia práctica. «¿Qué provecho hay en…?» conserva el sentido idiomático y el tono proverbial con buena naturalidad en español.
- source_word: בשׁתיהם / ἐν ἀμφοτέροις
  english_pob_choice: in either of them
  chosen_spanish: en ambos
  alternatives_spanish:
  - en los dos
  - en cualquiera de los dos
  lexicon: HALOT; LSJ
  rationale: Dado que el hebreo y el griego apuntan a la pareja completa, «en ambos» refleja con más precisión el valor literal del cierre que la opción inglesa idiomática «either of them». En español evita la posible ambigüedad de una lectura distributiva.
theological_decisions:
- issue: Relación entre el texto hebreo base y la línea introductoria del griego
  english_pob_reading: The Hebrew witness used for the main translation begins with the line about hidden wisdom; the Greek parallel adds an introductory instruction to children about keeping instruction in peace.
  chosen_spanish_reading: 'Se traduce solo la línea compartida por el hebreo principal: «Sabiduría escondida y tesoro oculto…», sin incorporar la exhortación griega introductoria.'
  alternative_spanish_readings:
  - «Conservad la instrucción en paz, hijos…» seguido del dicho sobre la sabiduría escondida
  - Incluir la línea griega como nota textual en vez del cuerpo principal
  rationale: La base principal del registro es el testimonio hebreo, confirmado por el paralelo griego. Siguiendo el audit trail, la frase introductoria griega se reserva para nota textual y no se mezcla con el cuerpo principal, para no desplazar la línea hebrea que fundamenta la traducción.
  doctrine_reference: Textual criticism / Vorlage priority
translation_notes:
  revision_awareness: 'El borrador sigue la revisión más reciente del expediente: el giro inglés pasó de «what benefit is there in both of them?» a una formulación más directa («what benefit is in either of them?») sin alterar el sentido. En español se optó por una forma naturalmente directa y fiel al hebreo: «¿qué provecho hay en ambos?».'
  spanish_consistency_notes:
  - Se evitó «SEÑOR» o terminología litúrgica ajena, porque el versículo no contiene el tetragrámaton ni vocabulario divino.
  - «Sabiduría» se mantiene como término principal para חכמה/σοφία, en continuidad con el expediente inglés.
  - El cierre en plural «ambos» refleja mejor el hebreo בשתיהם y el griego ἐν ἀμφοτέροις que una opción distributiva en español.
