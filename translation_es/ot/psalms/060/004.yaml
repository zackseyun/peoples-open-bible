translation:
  language: es
  text: Tú has sacudido la tierra[a]; la has abierto en grietas. Sana sus fracturas, porque se tambalea.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «el país». El hebreo אֶרֶץ puede referirse tanto a toda la tierra como a un territorio concreto; el contexto poético admite ambos matices.
    reason: lexical_alternative
lexical_decisions:
- source_word: הִרְעַשְׁתָּה
  english_pob_choice: you have shaken
  chosen_spanish: has sacudido
  alternatives_spanish:
  - has hecho temblar
  - has estremecido
  lexicon: HALOT
  rationale: El causativo hebreo expresa provocar un temblor o sacudida. «Has sacudido» comunica bien ese valor causativo en español sin sonar forzado.
- source_word: אֶרֶץ
  english_pob_choice: the earth
  chosen_spanish: la tierra
  alternatives_spanish:
  - la tierra
  - el país
  lexicon: HALOT
  rationale: «אֶרֶץ» puede significar «tierra» o «país/territorio». En este paralelismo poético, «la tierra» conserva el alcance amplio y permite también la resonancia de un territorio concreto.
- source_word: פְּצַמְתָּהּ
  english_pob_choice: you have split it open
  chosen_spanish: la has partido
  alternatives_spanish:
  - la has resquebrajado
  - la has quebrado
  lexicon: HALOT
  rationale: El verbo sugiere abrir o fracturar con fuerza. «La has partido» es breve y natural en español, y mantiene la imagen de ruptura sin repetir demasiado «fracturas» en la siguiente línea.
- source_word: רְפָה
  english_pob_choice: heal
  chosen_spanish: sana
  alternatives_spanish:
  - cura
  - repara
  lexicon: HALOT
  rationale: El imperativo de רָפָא se expresa normalmente como «sanar». Aquí se preserva la personificación poética de la tierra herida.
- source_word: שְׁבָרֶיהָ
  english_pob_choice: its fractures
  chosen_spanish: sus fracturas
  alternatives_spanish:
  - sus brechas
  - sus grietas
  lexicon: HALOT
  rationale: «שֶׁבֶר» denota ruptura, fractura o brecha. «Fracturas» se ajusta bien al campo semántico de terremoto y mantiene la relación con «sana».
- source_word: כִי
  english_pob_choice: for
  chosen_spanish: porque
  alternatives_spanish:
  - pues
  - ya que
  lexicon: HALOT
  rationale: Introduce la razón de la súplica. «Porque» es natural en español y refleja la relación causal del hebreo.
- source_word: מָטָה
  english_pob_choice: it is tottering
  chosen_spanish: está tambaleándose
  alternatives_spanish:
  - está a punto de caer
  - se está inclinando
  lexicon: HALOT
  rationale: El verbo comunica inestabilidad, desequilibrio o ceder. «Está tambaleándose» conserva la idea de movimiento inseguro e inacabado mejor que una caída ya consumada.
translation_notes:
  revision_awareness: La versión española sigue la lectura inglesa auditada y mantiene el paralelismo de sacudida / fractura / sanidad / inestabilidad. No se detectaron revisiones aplicadas en el expediente fuente, y el control cruzado reportó alta concordancia.
  spanish_consistency_notes:
  - Se usó «tierra» para אֶרֶץ, manteniendo el rango semántico abierto entre mundo y territorio.
  - «Fracturas» preserva la metáfora de lesión del suelo y armoniza con «sana».
  - Se evitó una traducción que cerrara demasiado el sentido de «tamaleándose», para conservar la inestabilidad continua de מָטָה.
