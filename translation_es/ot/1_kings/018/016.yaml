translation:
  language: es
  text: Así que Abdías fue al encuentro de Acab y le informó[a], y Acab fue al encuentro de Elías.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «le dijo». El verbo hebreo puede significar «decir», «informar» o «reportar».
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֵּלֶךְ
  english_pob_choice: went
  chosen_spanish: fue
  alternatives_spanish:
  - fue
  - se encaminó
  - partió
  lexicon: HALOT
  rationale: El wayyiqtol de הלך avanza la narración con el sentido básico de movimiento. En español, «fue» comunica ese avance de manera natural y breve, sin añadir matices no explícitos en el hebreo.
- source_word: עֹבַדְיָהוּ
  english_pob_choice: Obadiah
  chosen_spanish: Abdías
  alternatives_spanish:
  - Obadías
  - Abdías
  lexicon: Convención bíblica española
  rationale: Se usa la forma bíblica española tradicional «Abdías», más reconocible y natural para lectores de Biblia en español que una transliteración más rígida del inglés.
- source_word: לִקְרַאת
  english_pob_choice: to meet
  chosen_spanish: al encuentro de
  alternatives_spanish:
  - para encontrarse con
  - a encontrarse con
  lexicon: HALOT
  rationale: La construcción con לקראת expresa movimiento hacia alguien para un encuentro. «Al encuentro de» conserva ese valor direccional de manera fiel y idiomática en español.
- source_word: וַיַּגֶּד לוֹ
  english_pob_choice: told him
  chosen_spanish: le dio aviso
  alternatives_spanish:
  - le contó
  - le informó
  - le dijo
  lexicon: HALOT
  rationale: נגד en hifil puede significar «contar, informar, declarar, reportar». Dado que aquí el contenido está implícito por el contexto, «le dio aviso» mantiene la brevedad del hebreo y el sentido de informar sin forzar un objeto explícito.
- source_word: אַחְאָב
  english_pob_choice: Ahab
  chosen_spanish: Acab
  alternatives_spanish:
  - Ahab
  lexicon: Convención bíblica española
  rationale: Se adopta la forma bíblica española habitual «Acab», que es la equivalente establecida en español.
- source_word: אֵלִיָּהוּ
  english_pob_choice: Elijah
  chosen_spanish: Elías
  alternatives_spanish:
  - Elijah
  lexicon: Convención bíblica española
  rationale: Se usa la forma bíblica española tradicional «Elías», conforme al uso eclesial y bíblico en español.
translation_notes:
  revision_awareness: El inglés POB presenta el sentido narrativo directo «went to meet ... and told him ... and Ahab went to meet Elijah», con nota léxica para וַיַּגֶּד לוֹ. La versión española conserva esa secuencia y refleja la misma alternativa verbal mediante una nota breve.
  spanish_consistency_notes:
  - 'Se mantienen los nombres bíblicos usuales en español: Abdías, Acab y Elías.'
  - Se preserva la relación direccional de לִקְרַאת con una expresión española natural («al encuentro de»).
  - Se evita explicitar el contenido del aviso, porque el hebreo y el POB inglés lo dejan implícito.
