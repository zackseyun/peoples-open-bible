translation:
  language: es
  text: Efraín está herido; su raíz[a] está seca; no dará fruto. Aun si dan a luz, yo daré muerte a los amados[b] de su vientre.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «la raíz de ellos». El hebreo tiene un sufijo plural («de ellos»), aunque «Efraín» es un nombre colectivo en singular.
    reason: lexical_alternative
  - marker: b
    text: O «los queridos» o «los preciosos» de su vientre.
    reason: lexical_alternative
lexical_decisions:
- source_word: הֻכָּה
  english_pob_choice: is stricken
  chosen_spanish: está herido
  alternatives_spanish:
  - está golpeado
  - ha sido herido
  - está llagado
  lexicon: HALOT
  rationale: El pasivo de נכה comunica un golpe/judicio ya efectivo. En español, «está herido» conserva el estado resultante sin sonar demasiado mecánico; «está golpeado» suena menos natural en este contexto profético.
- source_word: אֶפְרַיִם
  english_pob_choice: Ephraim
  chosen_spanish: Efraín
  alternatives_spanish:
  - —
  lexicon: N/A nombre propio
  rationale: Se conserva el nombre propio como designación del reino del norte, siguiendo el valor del original.
- source_word: שָׁרְשָׁם
  english_pob_choice: their root
  chosen_spanish: su raíz
  alternatives_spanish:
  - su propia raíz
  - la raíz de ellos
  lexicon: HALOT
  rationale: El sufijo hebreo es plural («su raíz» referido al grupo). En español, «su raíz» mantiene la referencia colectiva sin forzar una forma poco natural; la nota[a] preserva la alternativa singular de sentido.
- source_word: יָבֵשׁ
  english_pob_choice: is dried up
  chosen_spanish: está seca
  alternatives_spanish:
  - se ha secado
  - está marchita
  lexicon: HALOT
  rationale: «Está seca» transmite el estado consumado de la metáfora agrícola y resulta más natural que «se ha secado» en la estructura paralela del verso.
- source_word: פְּרִי
  english_pob_choice: fruit
  chosen_spanish: fruto
  alternatives_spanish:
  - produce
  - cosecha
  lexicon: HALOT
  rationale: «Fruto»/«fruto» preserva la imagen agrícola central y permite el contraste con el nacimiento en la segunda mitad del verso.
- source_word: בלי יַעֲשׂוּן
  english_pob_choice: they will bear no fruit
  chosen_spanish: no dará fruto
  alternatives_spanish:
  - no producirán fruto
  - no habrá fruto que den
  lexicon: HALOT
  rationale: La construcción expresa negación de resultado. «No dará fruto» condensa bien el hebreo y mantiene el paralelismo poético; la singularidad concuerda con Efraín como colectivo.
- source_word: גַּם כִּי
  english_pob_choice: Even if
  chosen_spanish: Aun si
  alternatives_spanish:
  - Aunque
  - Incluso si
  lexicon: HALOT
  rationale: La fuerza concesiva-escalante se conserva con «Aun si», que suena natural en español y refleja la intensificación del juicio.
- source_word: יֵלֵדוּן
  english_pob_choice: they give birth
  chosen_spanish: dan a luz
  alternatives_spanish:
  - tienen hijos
  - paren
  lexicon: HALOT
  rationale: El verbo pasa de la metáfora vegetal al ámbito de la procreación. «Dan a luz» es claro, digno y corresponde al nacimiento que el contexto presupone.
- source_word: וְהֵמַתִּי
  english_pob_choice: I will put to death
  chosen_spanish: yo mataré
  alternatives_spanish:
  - yo haré morir
  - yo daré muerte
  lexicon: HALOT
  rationale: Se conserva la primera persona divina y la acción directa del juicio. «Yo mataré» es más transparente en español actual; la nota teológica mantiene la agencia divina sin suavizarla.
- source_word: מַחֲמַדֵּי
  english_pob_choice: the cherished ones
  chosen_spanish: los amados
  alternatives_spanish:
  - los queridos
  - los preciosos
  - los entrañables
  lexicon: HALOT
  rationale: El sustantivo denota lo precioso/deseable/beloved. «Los amados» mantiene ese valor afectivo y evita una reformulación demasiado interpretativa; la nota[b] deja abierta la opción de «beloved/precious ones».
- source_word: בִטְנָם
  english_pob_choice: of their womb
  chosen_spanish: de su vientre
  alternatives_spanish:
  - de su seno
  - de su matriz
  - de su útero
  lexicon: HALOT
  rationale: En este contexto corporal y materno, «vientre» reproduce bien el hebreo y es idiomático en español bíblico contemporáneo. Mantiene el valor concreto de la imagen sin tecnicismos.
theological_decisions:
- issue: Agencia divina en la muerte de los hijos
  english_pob_reading: 'Retain first-person divine action: ''I will put to death'''
  chosen_spanish_reading: 'Conservar la acción divina en primera persona: «yo mataré»'
  alternative_spanish_readings:
  - ellos morirán
  - serán muertos
  - haré morir
  rationale: El hebreo atribuye explícitamente la sentencia a Dios en primera persona. La traducción no debe diluir esa responsabilidad judicial; «yo mataré» la deja clara en español actual.
  doctrine_reference: Juicio divino; soberanía y agencia de Dios en la profecía
- issue: Sufijo plural con sujeto colectivo singular
  english_pob_reading: their root / its root
  chosen_spanish_reading: su raíz
  alternative_spanish_readings:
  - su raíz propia
  - la raíz de ellos
  - su raíz (plural implícito)
  rationale: El hebreo presenta un sufijo plural referido a Efraín como colectividad. En español, «su raíz» permite esa lectura colectiva sin romper la fluidez; la nota[a] conserva la tensión entre forma plural y nombre singular.
  doctrine_reference: Precisión textual; referencia colectiva de Efraín
translation_notes:
  revision_awareness: Este borrador sigue de cerca el paquete fuente hebreo y el audit trail inglés. Mantiene la metáfora agrícola («fruto», «raíz seca») y la intensificación concesiva («Aun si»), preservando también la agencia divina en primera persona. Se optó por español natural y digno, sin neutralizar la tensión entre el nombre singular colectivo Efraín y el sufijo plural hebreo.
  spanish_consistency_notes:
  - Se usa «Yahvé» como forma estándar cuando el texto lo requiera; aquí no aparece el Tetragrámaton.
  - «Fruto» conserva la metáfora agrícola y el contraste con el nacimiento.
  - «Vientre» se mantiene para reproducir el hebreo בטן en un contexto materno.
  - «Yo mataré» conserva la primera persona divina del hebreo.
  - El nombre propio se translitera como «Efraín» según uso bíblico en español.
