translation:
  language: es
  text: Así que ahora[a], no permitas que mi sangre caiga a tierra lejos de la presencia de Yahvé, porque el rey de Israel ha salido a buscar una sola pulga, como quien persigue una perdiz en las montañas.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'lejos de delante de Yahvé'.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְעַתָּה
  english_pob_choice: So now
  chosen_spanish: Así que ahora
  alternatives_spanish:
  - Y ahora
  - Pues ahora
  lexicon: HALOT
  rationale: Conserva la transición discursiva y el matiz de inmediatez sin sonar rígido en español.
- source_word: דָּמִי
  english_pob_choice: my blood
  chosen_spanish: mi sangre
  alternatives_spanish:
  - mi sangre derramada
  - mi vida
  lexicon: HALOT
  rationale: Se mantiene la imagen concreta de sangre derramada; 'mi vida' suavizaría demasiado la expresión hebrea.
- source_word: אַל יִפֹּל ... אַרְצָה
  english_pob_choice: do not let ... fall to the ground
  chosen_spanish: no permitas que ... caiga a tierra
  alternatives_spanish:
  - no dejes que ... caiga al suelo
  - que ... no caiga a tierra
  lexicon: HALOT
  rationale: Reproduce la fuerza negativa y la imagen física de caer al suelo/tierra con sintaxis natural en español.
- source_word: מִנֶּגֶד פְּנֵי יְהוָה
  english_pob_choice: away from the presence of Yahweh
  chosen_spanish: lejos de la presencia de Yahvé
  alternatives_spanish:
  - apartada de la presencia de Yahvé
  - fuera de la presencia de Yahvé
  lexicon: HALOT
  rationale: '''Presencia'' expresa bien פָּנִים en este giro; ''lejos de'' conserva la separación espacial/covenantal que destaca el hebreo y que el POB inglés ya había evaluado como ''presence''.'
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el SEÑOR
  - Jehová
  lexicon: DOCTRINE.md contested terms
  rationale: Se conserva el nombre divino del texto hebreo, conforme al criterio del proyecto, en vez de sustituirlo por un título.
- source_word: יָצָא
  english_pob_choice: has come out
  chosen_spanish: ha salido
  alternatives_spanish:
  - ha salido fuera
  - ha ido a salir
  lexicon: HALOT
  rationale: '''Ha salido'' comunica el movimiento del rey sin forzar una paráfrasis interpretativa.'
- source_word: לְבַקֵּשׁ
  english_pob_choice: to seek
  chosen_spanish: a buscar
  alternatives_spanish:
  - para buscar
  - a procurar
  lexicon: HALOT
  rationale: En este contexto de persecución, 'buscar' es natural y mantiene el alcance léxico de 'seek' sin adelantar más interpretación que la necesaria.
- source_word: פַּרְעֹשׁ אֶחָד
  english_pob_choice: a single flea
  chosen_spanish: una sola pulga
  alternatives_spanish:
  - una pulga única
  - una sola pulga
  lexicon: HALOT
  rationale: Se conserva la metáfora autodepreciativa y el énfasis de אֶחָד con 'una sola'.
- source_word: הַקֹּרֵא
  english_pob_choice: a partridge
  chosen_spanish: una perdiz
  alternatives_spanish:
  - una codorniz
  - una perdiz de monte
  lexicon: HALOT
  rationale: '''Perdiz'' es la equivalencia tradicional y suficientemente clara para el ave de la comparación en español.'
- source_word: בֶּהָרִים
  english_pob_choice: in the mountains
  chosen_spanish: en las montañas
  alternatives_spanish:
  - en los montes
  - por los montes
  lexicon: HALOT
  rationale: '''Montañas'' refleja bien הָרִים y suena natural en español moderno.'
theological_decisions:
- issue: Representación del nombre divino יהוה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: El texto hebreo contiene el Tetragrammaton; la política del proyecto pide transliterarlo como 'Yahvé' en el texto principal para no ocultar el nombre propio divino.
  doctrine_reference: 'DOCTRINE.md contested terms: יְהוָה YHWH'
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión inglesa que prefería 'presence' frente a la construcción más literal con 'before', y la corrección estilística de 'as one hunts' frente a 'like one hunting'. En español se reflejó esa misma naturalidad con 'presencia' y 'como quien persigue', sin perder la comparación de caza ni la imagen concreta del versículo.
  spanish_consistency_notes:
  - Se mantuvo 'Yahvé' conforme al estándar del proyecto para יהוה.
  - Se conservó la imagen corporal de 'mi sangre' en lugar de suavizarla como 'mi vida'.
  - '''Perdiz'' se eligió como equivalente idiomático claro para הַקֹּרֵא en esta comparación de caza.'
  - '''Montañas'' se prefirió para mantener la correspondencia con הָרִים sin arcaísmo excesivo.'
