translation:
  language: es
  text: Entonces el rey se levantó, enfurecido, del banquete del vino y se fue al jardín del palacio[c], pero Amán se quedó[a] para suplicar por su vida a la reina Ester, porque vio que la calamidad[b] estaba ya determinada por el rey.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «se puso de pie para buscar su vida de Ester la reina». El hebreo es más literalmente «estuvo de pie para buscar por su vida de Ester la reina».'
    reason: lexical_alternative
  - marker: b
    text: 'O: «porque vio que el desastre contra él estaba decidido/consumado por parte del rey». La expresión hebrea comunica que el juicio del rey contra Amán ya estaba fijado.'
    reason: lexical_alternative
  - marker: c
    text: «Jardín del palacio» traduce una frase que también podría rendirse como «jardín del pabellón» o «jardín del complejo palaciego».
    reason: cultural_note
lexical_decisions:
- source_word: בַּחֲמָתוֹ
  english_pob_choice: in his wrath
  chosen_spanish: enfurecido
  alternatives_spanish:
  - en su ira
  - en su furor
  lexicon: HALOT
  rationale: חֵמָה expresa una ira intensa y ardiente. En español, «enfurecido» comunica esa intensidad de modo natural y digno; «ira» y «furor» quedan como alternativas posibles, pero «enfurecido» funciona mejor en el flujo narrativo.
- source_word: מִמִּשְׁתֵּה הַיַּיִן
  english_pob_choice: from the wine banquet
  chosen_spanish: del banquete del vino
  alternatives_spanish:
  - del banquete de vino
  - de la fiesta del vino
  lexicon: HALOT
  rationale: מִשְׁתֶּה es un banquete o festín, y aquí el texto explicita el vino. «Banquete del vino» mantiene la referencia directa y refleja bien la forma del hebreo sin volverla demasiado rígida.
- source_word: גִּנַּת הַבִּיתָן
  english_pob_choice: the palace garden
  chosen_spanish: el jardín del palacio
  alternatives_spanish:
  - el jardín del pabellón
  - el jardín del complejo real
  lexicon: HALOT
  rationale: גִּנָּה es «jardín» y בִּיתָן alude al conjunto palaciego/pabellón. «Jardín del palacio» es claro en español y conserva el referente del entorno real persa, aunque la expresión también admite otras formulaciones.
- source_word: עָמַד
  english_pob_choice: remained
  chosen_spanish: se quedó
  alternatives_spanish:
  - permaneció
  - se detuvo
  lexicon: HALOT
  rationale: Aunque el verbo básico es «estar de pie», en este contexto la contraposición narrativa con la salida del rey favorece el sentido de permanencia. «Se quedó» comunica la fuerza del pasaje con naturalidad.
- source_word: לְבַקֵּשׁ עַל נַפְשׁוֹ
  english_pob_choice: to beg ... for his life
  chosen_spanish: para suplicar por su vida
  alternatives_spanish:
  - para pedir por su vida
  - para rogar por su vida
  lexicon: HALOT
  rationale: La expresión hebrea es idiomática y apunta a implorar por la propia vida. «Suplicar por su vida» conserva la urgencia de la escena y evita una traducción demasiado literal como «buscar su vida».
- source_word: מֵאֶסְתֵּר הַמַּלְכָּה
  english_pob_choice: Queen Esther
  chosen_spanish: a la reina Ester
  alternatives_spanish:
  - de la reina Ester
  - ante la reina Ester
  lexicon: HALOT
  rationale: El hebreo coloca el nombre con título real. En español, «la reina Ester» es la forma referencial natural y fiel al contenido. La preposición «a» con «suplicar» expresa bien el destinatario de la súplica.
- source_word: כִּי רָאָה
  english_pob_choice: for he saw
  chosen_spanish: porque vio
  alternatives_spanish:
  - pues vio
  - ya que vio
  lexicon: HALOT
  rationale: כִּי introduce la razón de la reacción de Amán. «Porque vio» conserva la causalidad de manera directa y fluida.
- source_word: כִּי כָלְתָה
  english_pob_choice: had been determined
  chosen_spanish: estaba ya determinada
  alternatives_spanish:
  - había sido decidida
  - estaba concluida
  lexicon: HALOT
  rationale: El hebreo comunica que el asunto ya estaba fijado, consumado. «Estaba ya determinada» mantiene la idea de resolución judicial sin exagerar el aspecto verbal más allá de lo que el contexto requiere.
- source_word: הָרָעָה
  english_pob_choice: the evil
  chosen_spanish: la calamidad
  alternatives_spanish:
  - el mal
  - el desastre
  - la ruina
  lexicon: HALOT
  rationale: En este contexto, רָעָה se refiere al daño o juicio inminente sobre Amán. «Calamidad» preserva el peso negativo y narrativo del término sin cargarlo innecesariamente con una abstracción moral en español.
- source_word: מֵאֵת הַמֶּלֶךְ
  english_pob_choice: by the king
  chosen_spanish: por el rey
  alternatives_spanish:
  - del rey
  - desde el rey
  lexicon: HALOT
  rationale: La partícula indica origen/autoridad. En pasiva implícita, «por el rey» comunica mejor la agencia judicial del rey en español que una reproducción más mecánica.
theological_decisions:
- issue: Sentido de הָרָעָה como juicio/calamidad más que mal moral absoluto
  english_pob_reading: the evil against him had been determined by the king
  chosen_spanish_reading: la calamidad estaba ya determinada por el rey
  alternative_spanish_readings:
  - el mal contra él había sido determinado por el rey
  - el desastre contra él estaba decidido por el rey
  rationale: El contexto trata del decreto real contra Amán, no de un mal moral abstracto. «Calamidad» deja ver la dimensión de juicio y ruina inminente, manteniendo la tensión del hebreo sin oscurecer la escena.
  doctrine_reference: Contexto narrativo-jurídico de Ester 7:7; cf. uso de רָעָה como calamidad/daño en contexto judicial
- issue: Valor de כָלְתָה como determinación ya fijada
  english_pob_reading: had been determined
  chosen_spanish_reading: estaba ya determinada
  alternative_spanish_readings:
  - había sido decidida
  - estaba consumada
  rationale: La formulación enfatiza que el fallo del rey ya estaba cerrado. «Estaba ya determinada» conserva esa finalización sin introducir una reinterpretación doctrinal o excesivamente técnica.
  doctrine_reference: Finalidad del decreto real en la narrativa de Ester; cf. lectura de determinación fija en el audit trail inglés
translation_notes:
  revision_awareness: Se siguió de cerca el audit trail inglés y el hebreo, especialmente en la fuerza de חֵמָה, el carácter idiomático de לְבַקֵּשׁ עַל נַפְשׁוֹ y la ambigüedad de גִּנַּת הַבִּיתָן. La redacción española evita una calca innecesaria, pero conserva la tensión narrativa y la determinación judicial del final del versículo.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» como terminología por defecto solo cuando aplica; este versículo no contiene el nombre divino.
  - Se prefirió «la reina Ester» por naturalidad referencial en español, manteniendo el título explícito del hebreo.
  - Se eligió un registro narrativo bíblico moderno, sin arcaísmos innecesarios, pero con dignidad literaria.
