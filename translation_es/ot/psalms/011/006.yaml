translation:
  language: es
  text: Él hará llover sobre los impíos lazos[a]; fuego y azufre y un viento abrasador serán la porción de su copa.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O ‘carbones’ en vez de ‘lazos’; el texto consonántico hebreo dice ‘trampas/lazos’, pero algunos testigos antiguos y traducciones reflejan una lectura que encaja con la imagen de fuego.
    reason: alternative_reading
lexical_decisions:
- source_word: יַמְטֵר
  english_pob_choice: He will rain down
  chosen_spanish: hará llover
  alternatives_spanish:
  - derramará
  - hará caer como lluvia
  lexicon: HALOT
  rationale: 'El hifil de מטר tiene fuerza causativa: ‘hacer llover’. En español, ‘hará llover’ conserva la imagen y la causalidad sin sonar forzado. No se añadió un objeto explícito porque el hebreo presenta el verbo de forma directa.'
- source_word: רְשָׁעִים
  english_pob_choice: the wicked
  chosen_spanish: los impíos
  alternatives_spanish:
  - los malvados
  - los malhechores
  lexicon: HALOT
  rationale: ‘Impíos’ conserva la categoría moral y bíblica del término con un registro digno y claro en español. ‘Malvados’ sería natural, pero ‘impíos’ corresponde mejor al lenguaje de juicio divino del salmo.
- source_word: פַּחִים
  english_pob_choice: snares
  chosen_spanish: trampas
  alternatives_spanish:
  - lazos
  - redes
  lexicon: HALOT
  rationale: El texto consonántico apunta a פַּחִים, normalmente ‘trampas’ o ‘lazos’. Como la tradición auditada en inglés retuvo la lectura de ‘snares’ y preservó una nota sobre la alternativa de ‘coals’, en español se optó por ‘trampas’ para mantener la lectura principal del hebreo. ‘Lazos’ sería posible, pero ‘trampas’ es más directo y transparente para lectores modernos.
- source_word: אֵשׁ וְגָפְרִית
  english_pob_choice: fire and sulfur
  chosen_spanish: fuego y azufre
  alternatives_spanish:
  - fuego y azufre ardiente
  - fuego y azufre (brimstone)
  lexicon: HALOT
  rationale: Se conserva el par literal ‘fuego y azufre’. ‘Azufre’ comunica el referente sin depender del arcaísmo ‘azufre/brimstone’; evita parafrasear la imagen de juicio.
- source_word: רוּחַ זִלְעָפֹות
  english_pob_choice: a scorching wind
  chosen_spanish: un viento abrasador
  alternatives_spanish:
  - un viento ardiente
  - un viento de furia
  lexicon: HALOT
  rationale: La expresión denota un viento destructor y quemante. ‘Viento abrasador’ transmite bien el efecto térmico y mantiene el valor imagístico del hebreo. Se evita ‘Espíritu’ porque aquí רוּחַ es claramente ‘viento’.
- source_word: מְנָת כּוֹסָם
  english_pob_choice: the portion of their cup
  chosen_spanish: la porción de su copa
  alternatives_spanish:
  - la parte asignada de su copa
  - su copa asignada
  lexicon: HALOT
  rationale: Se preserva la metáfora de la ‘copa’ como porción asignada de juicio. ‘Porción de su copa’ suena natural en español y mantiene la resonancia bíblica sin convertir la imagen en explicación.
theological_decisions:
- issue: Preservar la imagen de juicio de la copa en vez de explicitarla como castigo
  english_pob_reading: Retain 'the portion of their cup' in the main text
  chosen_spanish_reading: Mantener ‘la porción de su copa’ en el texto principal
  alternative_spanish_readings:
  - su castigo asignado
  - la medida de su condena
  rationale: La imagen de la copa es un símbolo bíblico importante del juicio divino. Mantenerla respeta la intertextualidad del salmo y evita una paráfrasis que borre la metáfora.
  doctrine_reference: Translation philosophy §1, §3, §6
- issue: Resolver la posible tensión textual entre ‘snares/trampas’ y la lectura alternativa relacionada con el fuego
  english_pob_reading: Main text keeps 'snares' with footnote for alternative 'coals'
  chosen_spanish_reading: Texto principal con ‘trampas’ y nota sobre la alternativa textual relacionada con ‘carbones’
  alternative_spanish_readings:
  - carbones
  - ascuas
  rationale: La evidencia auditada favorece la lectura consonántica de ‘trampas/lazos’, mientras que algunos testigos antiguos reflejan otra tradición coherente con el lenguaje de fuego. La nota mantiene visible esa tensión sin eliminarla.
  doctrine_reference: Textual criticism / translation philosophy §2, §5
translation_notes:
  revision_awareness: La revisión auditada en inglés cambió ‘traps’ por ‘snares’ para reflejar con mayor normalidad el hebreo פַּחִים, sin alterar el resto del versículo. En español se reflejó esa preferencia mediante ‘trampas’, con nota sobre la alternativa textual relacionada con ‘carbones’, para no perder la tensión documentada entre la lectura principal y los testigos antiguos.
  spanish_consistency_notes:
  - Se usó ‘Yahvé’ solo cuando el texto lo requiera explícitamente; aquí no aparece el nombre divino.
  - Se mantuvo ‘fuego y azufre’ como par literal, evitando ‘azufre ardiente’ o ‘azufre y fuego’ que alterarían el orden hebreo sin necesidad.
  - ‘רוּחַ’ se tradujo como ‘viento’, no como ‘espíritu’, por el contexto de juicio natural-imagístico.
  - La metáfora de la copa se conservó sin explicitarla como condena para respetar el lenguaje bíblico del pasaje.
  - El marcador de nota [a] se colocó en el punto donde afecta la decisión léxica principal sobre פַּחִים.
