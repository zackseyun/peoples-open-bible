translation:
  language: es
  text: 'Entonces el rey dijo al hombre de Dios[a]: «Ven a casa conmigo y come, y yo te daré un regalo».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «y come» / «y toma alimento»; el verbo hebreo puede significar fortalecerse o sustentarse, a menudo mediante una comida.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְדַבֵּר
  english_pob_choice: Then ... said
  chosen_spanish: Entonces ... dijo
  alternatives_spanish:
  - Y ... habló
  - Y ... dijo
  lexicon: HALOT
  rationale: La forma consecutiva avanza la narración; en español natural, «Entonces ... dijo» conserva la secuencia mejor que un simple «Y ... habló».
- source_word: הַמֶּלֶךְ
  english_pob_choice: the king
  chosen_spanish: el rey
  alternatives_spanish:
  - el monarca
  lexicon: HALOT
  rationale: Corresponde directamente al sustantivo definido con artículo.
- source_word: אִישׁ הָאֱלֹהִים
  english_pob_choice: the man of God
  chosen_spanish: el hombre de Dios
  alternatives_spanish:
  - el profeta de Dios
  lexicon: HALOT
  rationale: Se preserva el giro hebreo idiomático sin interpretarlo como «profeta», siguiendo la decisión auditada de no sustituir la expresión por una equivalencia teológica más específica.
- source_word: בֹּאָה
  english_pob_choice: Come
  chosen_spanish: Ven
  alternatives_spanish:
  - Por favor, ven
  - Entra
  lexicon: HALOT
  rationale: El imperativo de בוא con he paragógica funciona aquí como invitación; «Ven» es natural y fiel, sin añadir una cortesía no explícita.
- source_word: אִתִּי הַבַּיְתָה
  english_pob_choice: home with me
  chosen_spanish: a casa conmigo
  alternatives_spanish:
  - a mi casa conmigo
  - a la casa conmigo
  lexicon: HALOT
  rationale: El valor direccional de הַבַּיְתָה se expresa de modo idiomático en español como «a casa», manteniendo la invitación personal «conmigo».
- source_word: וּסְעָדָה
  english_pob_choice: and eat
  chosen_spanish: y come
  alternatives_spanish:
  - y recupérate
  - y tómate alimento
  lexicon: HALOT
  rationale: La revisión inglesa optó por «eat» para reflejar más directamente el matiz de tomar alimento/sostenerse; en español «come» reproduce ese sentido de manera simple y natural, sin perder la alternativa semántica de fortalecerse con una comida.
- source_word: וְאֶתְּנָה לְךָ
  english_pob_choice: and I will give you
  chosen_spanish: y yo te daré
  alternatives_spanish:
  - y te daré
  lexicon: HALOT
  rationale: El verbo cohortativo/futuro en contexto de oferta se expresa con futuro simple; el pronombre explícito «yo» conserva la fuerza de la oferta personal.
- source_word: מַתָּת
  english_pob_choice: a gift
  chosen_spanish: un regalo
  alternatives_spanish:
  - un presente
  - una dádiva
  lexicon: HALOT
  rationale: «Regalo» es el equivalente más neutral y común en español actual. «Dádiva» suena más elevado o institucional y podría sobrerrepresentar el registro.
translation_notes:
  revision_awareness: La versión española sigue la revisión más reciente del inglés POB, que prefirió «eat» frente a «refresh yourself» para reflejar con mayor precisión el verbo hebreo סעד. También conserva la decisión estable de traducir אִישׁ הָאֱלֹהִים como «el hombre de Dios» y no como «profeta».
  spanish_consistency_notes:
  - Se mantiene «hombre de Dios» como fórmula técnica, en continuidad con el audit trail inglés.
  - «A casa conmigo» reproduce de forma idiomática la invitación direccional sin introducir un matiz extra de posesión.
  - El pie de nota preserva la alternativa semántica de סעד sin desplazar la lectura principal.
  - Se usa «regalo» en registro neutral y comprensible para lectores de amplio ámbito hispanohablante.
