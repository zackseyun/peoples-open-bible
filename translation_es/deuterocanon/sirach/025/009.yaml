translation:
  language: es
  text: Bienaventurado el hombre que convive con una esposa[a] sensata, y que no ha tropezado al hablar[b], y que no ha servido a uno indigno de él[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «una esposa prudente» o «una esposa sensata»; el griego describe a una esposa marcada por entendimiento práctico.'
    reason: lexical_alternative
  - marker: b
    text: 'Literalmente: «no ha resbalado/tropezado con la lengua»; es un modismo para no fallar en el habla.'
    reason: lexical_alternative
  - marker: c
    text: 'O: «no ha sido esclavo de uno indigno de él»; el verbo griego puede implicar servidumbre o sujeción.'
    reason: alternative_reading
lexical_decisions:
- source_word: μακάριος
  english_pob_choice: Blessed
  chosen_spanish: Bienaventurado
  alternatives_spanish:
  - Dichoso
  - Feliz
  lexicon: BDAG
  rationale: En español bíblico, 'Bienaventurado' conserva el tono sapiencial y de beatitud mejor que 'Feliz', que suena más subjetivo, o 'Dichoso', que puede sonar menos solemne.
- source_word: ὁ συνοικῶν
  english_pob_choice: lives with
  chosen_spanish: que convive con
  alternatives_spanish:
  - que vive con
  - que habita con
  lexicon: LSJ
  rationale: El verbo expresa convivencia doméstica y, por el contexto, marital. 'Convive con' comunica bien esa relación en español moderno sin perder el sentido de hogar compartido.
- source_word: γυναικὶ συνετῇ
  english_pob_choice: an intelligent wife
  chosen_spanish: una esposa sensata
  alternatives_spanish:
  - una esposa prudente
  - una esposa inteligente
  - una esposa entendida
  lexicon: LSJ
  rationale: '''Esposa'' refleja mejor el contexto marital que ''mujer''. ''Sensata'' recoge la prudencia práctica de συνετή sin forzar un tecnicismo ni reducirlo solo a inteligencia abstracta.'
- source_word: ἐν γλώσσῃ οὐκ ὠλίσθησεν
  english_pob_choice: has not slipped with his tongue
  chosen_spanish: no ha tropezado con su lengua
  alternatives_spanish:
  - no ha resbalado con su lengua
  - no ha tropezado en su habla
  - no ha pecado con su lengua
  lexicon: LSJ
  rationale: Se conserva la imagen idiomática de un tropiezo o desliz verbal. 'Tropezado con su lengua' es natural en español y mantiene el valor metafórico sin explicitar más de lo que dice el griego.
- source_word: ἐδούλευσεν
  english_pob_choice: has not served
  chosen_spanish: no ha servido
  alternatives_spanish:
  - no ha sido esclavo de
  - no se ha esclavizado a
  - no ha sido siervo de
  lexicon: BDAG
  rationale: El verbo puede tener fuerza de esclavitud, pero aquí el objeto es una persona. 'Ha servido' conserva la relación de sometimiento o dependencia sin imponer una lectura más fuerte que el contexto inmediato.
- source_word: ἀναξίῳ αὐτοῦ
  english_pob_choice: one unworthy of him
  chosen_spanish: uno indigno de él
  alternatives_spanish:
  - uno no digno de él
  - uno inferior a él
  - alguien indigno de él
  lexicon: LSJ
  rationale: '''Indigno de él'' traduce de manera directa y sobria la evaluación comparativa del griego. ''Uno'' preserva el indefinido personal del original.'
theological_decisions:
- issue: Beatitud sapiencial con sujeto masculino singular
  english_pob_reading: the man
  chosen_spanish_reading: el hombre
  alternative_spanish_readings:
  - la persona
  - quien
  rationale: El griego usa formas masculinas singulares (ὁ... ὃς). 'El hombre' mantiene la correspondencia gramatical y el carácter representativo de la máxima sapiencial sin neutralizar indebidamente el género del texto fuente.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4
- issue: δουλεύω en relación interpersonal
  english_pob_reading: served
  chosen_spanish_reading: ha servido
  alternative_spanish_readings:
  - ha sido esclavizado a
  - ha sido esclavo de
  - se ha sometido a
  rationale: La audit trail inglesa evita sobrecargar el verbo con 'enslaved'. En español, 'ha servido' conserva la ambigüedad controlada entre servicio y sometimiento, sin borrar la tensión semántica del término griego.
  doctrine_reference: 'DOCTRINE.md Contested terms: δοῦλος'
translation_notes:
  revision_awareness: La revisión más reciente no introdujo cambios y confirmó el texto como estable; el borrador español sigue el mismo valor de acuerdo alto, sin ajustes adicionales.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma general del proyecto, aunque este versículo no contiene el nombre divino.
  - Se conserva el paralelismo de tres miembros del griego y el sujeto masculino singular representativo.
  - Se evita traducir γυνή de forma genérica como «mujer» porque aquí el contexto matrimonial de συνοικῶν pide «esposa».
  - Se preserva la tensión de ἐδούλευσεν con una opción menos sobrecargada ('ha servido') y una nota que recoge la alternativa más fuerte.
