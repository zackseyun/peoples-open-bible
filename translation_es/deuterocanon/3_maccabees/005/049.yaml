revisions:
- from: Considerando que aquel momento era para ellos el último giro de la vida[a], el fin de su esperanza más miserable, se volvieron al compasión[b] y al llanto, y seguían besándose unos a otros, abrazando a sus parientes, cayendo sobre sus cuellos[c] —padres sobre hijos y madres sobre jóvenes hijas; y otras, teniendo a los bebés recién nacidos junto a sus pechos, estaban sacando su última leche.
  to: Considerando que aquel momento era para ellos el punto final de la vida, el fin de su expectativa más miserable[a], se entregaron a la pena y a los lamentos, y seguían besándose unos a otros, abrazando a sus parientes, echándose al cuello[b] —padres sobre hijos y madres sobre hijas jóvenes; y otras, teniendo a sus bebés recién nacidos contra sus pechos, mamaban por última vez.
  rationale: Se corrige el error gramatical, se ajusta προσδοκία a "expectativa" con alternativa "espera" en nota, se reemplaza el calco duro por un modismo español natural conservando la nota cultural, y se reformula la escena de lactancia para reflejar con claridad que los bebés mamaban/extraían la última leche. También se pule el orden y varias expresiones para un español más natural sin apartarse del griego ni de la auditoría POB.
