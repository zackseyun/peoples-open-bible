    reason: lexical_alternative
  - marker: c
    text: O “como un león rapaz” o “como un león que destruye”.
    reason: lexical_alternative
  revision_rationale: Se revisa para mantener coherencia con la segunda persona plural del original en un español neutral latinoamericano, evitando la mezcla de 'sus' con 'vuestra/vuestros'. También se pule la nota a para que quede completamente en español y más fiel a la explicación léxica auditada.
