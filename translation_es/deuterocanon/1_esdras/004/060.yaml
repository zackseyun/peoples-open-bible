revisions:
- from: Bendito[a] eres tú, que me has dado sabiduría; y a ti te doy gracias[b], Maestro de los padres.
  to: Bendito eres tú, que me has dado sabiduría; y a ti te doy gracias, Soberano[a] de los padres.
  rationale: Se mantiene la formulación española que ya era fiel y natural en casi todo el versículo, pero se cambia «Maestro» por «Soberano» para reflejar mejor δέσποτα en español y evitar una lectura docente impropia. También se ajustan las notas para que apoyen la decisión léxica verdaderamente significativa del pasaje.
