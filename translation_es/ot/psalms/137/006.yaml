translation:
  language: es
  text: Que mi lengua se pegue a mi paladar[a] si no te recuerdo, si no exalto a Jerusalén por encima de mi mayor alegría[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Literalmente: "Que mi lengua se pegue a mi paladar".'
    reason: lexical_alternative
  - marker: b
    text: 'O: "si no pongo a Jerusalén por encima de mi mayor alegría"; literalmente: "si no hago subir a Jerusalén por encima de la cabeza de mi alegría".'
    reason: lexical_alternative
lexical_decisions:
- source_word: תִּדְבַּק
  english_pob_choice: May ... cling
  chosen_spanish: May ... se pegue
  alternatives_spanish:
  - Que ... se adhiera
  - Que ... se quede pegada
  lexicon: HALOT
  rationale: El verbo דבק expresa adherirse o pegarse; en un juramento autoimprecatorio, "se pegue" comunica con naturalidad la imagen corporal sin perder la fuerza del deseo de inmovilidad de la lengua.
- source_word: לְשׁוֹנִי
  english_pob_choice: my tongue
  chosen_spanish: mi lengua
  alternatives_spanish:
  - mi lengua
  lexicon: HALOT
  rationale: '"Lengua" es el equivalente normal y claro en español para el órgano del habla; mantiene la imagen directa del texto hebreo.'
- source_word: לְחִכִּי
  english_pob_choice: to the roof of my mouth
  chosen_spanish: al paladar
  alternatives_spanish:
  - al techo de mi boca
  - al techo de mi paladar
  lexicon: HALOT
  rationale: חֵךְ designa el paladar; "al paladar" es la forma más natural y fiel en español, sin perder la imagen concreta del órgano interno de la boca.
- source_word: אִם לֹא
  english_pob_choice: if I do not
  chosen_spanish: si no
  alternatives_spanish:
  - si no llego a
  - a menos que no
  lexicon: HALOT
  rationale: La construcción condicional del juramento se conserva con "si no", que reproduce la forma hebrea sin reinterpretarla como simple excepción.
- source_word: אֶזְכְּרֵכִי
  english_pob_choice: I do not remember you
  chosen_spanish: me acuerdo de ti
  alternatives_spanish:
  - te recuerdo
  - te tengo presente
  lexicon: HALOT
  rationale: זכר aquí expresa recordar activamente; en español, "me acuerdo de ti" conserva el sentido relacional y la dirección personal hacia Jerusalén personificada.
- source_word: אַעֲלֶה אֶת יְרוּשָׁלַם
  english_pob_choice: I do not exalt Jerusalem above
  chosen_spanish: no pongo a Jerusalén por encima
  alternatives_spanish:
  - no exalto a Jerusalén por encima
  - no levanto a Jerusalén por encima
  lexicon: HALOT
  rationale: עלה en causativo con עַל רֹאשׁ comunica elevar o colocar en primer lugar. "Pongo ... por encima" expresa esa prioridad en español sin desdibujar la imagen de elevación.
- source_word: עַל רֹאשׁ
  english_pob_choice: above
  chosen_spanish: por encima
  alternatives_spanish:
  - sobre
  - por sobre
  lexicon: HALOT
  rationale: La locución idiomática hebrea indica supremacía o rango superior; "por encima" transmite con claridad ese valor comparativo en español.
- source_word: שִׂמְחָתִי
  english_pob_choice: my highest joy
  chosen_spanish: mi mayor alegría
  alternatives_spanish:
  - mi alegría principal
  - mi alegría más alta
  lexicon: HALOT
  rationale: El hebreo no solo dice "mi alegría", sino una alegría en cuya cima se sitúa Jerusalén. "Mayor alegría" expresa bien el valor superlativo en español contemporáneo.
theological_decisions:
- issue: Referencia del pronombre de segunda persona en "me acuerdo de ti"
  english_pob_reading: The addressee is Jerusalem, personified and directly addressed.
  chosen_spanish_reading: La destinataria es Jerusalén, personificada y tratada directamente como "ti".
  alternative_spanish_readings:
  - Podría leerse de modo más general como referencia a Sion o a la ciudad santa
  rationale: El antecedente inmediato es Jerusalén, y el femenino singular del hebreo concuerda con la ciudad personificada. Mantener el tratamiento directo preserva la intensidad del juramento y la carga afectiva del verso.
  doctrine_reference: Personificación poética de Jerusalén; fidelidad al antecedente contextual
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión inglesa que prefirió "exalt Jerusalem above" para reflejar con más precisión el valor de "hacer subir/elevar" del hebreo; por eso el español conserva la idea de prioridad con "por encima" y la nota ofrece la alternativa más cercana al giro causal de עלה + עַל רֹאשׁ.
  spanish_consistency_notes:
  - Se mantiene "Jerusalén" como referencia personificada en todo el verso.
  - Se traduce el juramento condicional de forma transparente, sin convertirlo en una simple amenaza genérica.
  - Se evita "SEÑOR" o sustituciones cultuales, porque el verso no contiene el nombre divino.
  - '"Paladar" se usa como término anatómico claro y fiel para חֵךְ.'
