    rationale: La auditoría inglesa escogió 'we will put them to death' precisamente para reflejar mejor el hiphil de מות y el sentido ejecutivo, no simplemente violencia genérica. En español, 'los ejecutaremos' comunica mejor ese matiz.
  - severity: low
    issue: El nombre propio aparece como 'Saul' sin tilde
    rationale: La forma española estándar y eclesial es 'Saúl'.
  - severity: low
