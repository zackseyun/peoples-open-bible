  text: וְ/לֹֽא אַסְתִּ֥יר ע֛וֹד פָּנַ֖/י מֵ/הֶ֑ם אֲשֶׁ֨ר שָׁפַ֤כְתִּי אֶת רוּחִ/י֙ עַל בֵּ֣ית יִשְׂרָאֵ֔ל נְאֻ֖ם אֲדֹנָ֥/י יְהוִֽה־־־׃פ
base_translation:
  language: en
  yaml_path: translation/ot/ezekiel/039/029.yaml
  text: And I will no longer hide my face from them[a], because I have poured out my Spirit on the house of Israel[b], declares the Lord GOD.
  footnotes:
  - marker: a
    text: Or 'because I have poured out my Spirit on the house of Israel.' The Hebrew relative particle can be understood causally as well as temporally here.
    reason: alternative_reading
  - marker: b
    text: Literally 'my face,' a Hebrew idiom for favorable presence or relational openness.
    reason: lexical_alternative
