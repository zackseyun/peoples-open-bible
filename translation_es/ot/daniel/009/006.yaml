review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja fielmente la estructura y el sentido del hebreo: la negación perfecta confesional, el objeto de שׁמע con אֶל, la aposición ''tus siervos, los profetas'', el modismo ''hablar en tu nombre'', y la lista de destinatarios. También preserva correctamente la tensión semántica de שָׁמַעְנוּ mediante una nota alternativa a ''obedecido''.'
  spanish_quality_summary: El español es claro y digno, pero 'todo el pueblo de la tierra' suena algo calcado y puede malentenderse como 'toda la tierra' en sentido global. 'Todo el pueblo del país' comunica mejor en español contemporáneo el sentido de הָאָרֶץ aquí como país/tierra nacional, sin perder naturalidad. La nota a 'padres' está bien. Conviene además quitar comillas sobrantes en las notas para estilo más limpio.
  glossary_alignment: 'No hay conflicto con los términos troncales del proyecto. ''Siervos'' para עֲבָדֶיךָ está bien justificado en este contexto profético. ''Nuestros padres'' mantiene la preferencia de género-accurate del POB, con alternativa ''antepasados'' en nota. La única mejora recomendada es contextual para הָאָרֶץ: aquí ''del país'' en español transmite mejor el referente colectivo nacional que ''de la tierra''.'
  issues:
  - severity: medium
    issue: '''todo el pueblo de la tierra'' suena poco natural y potencialmente ambiguo'
    rationale: Aunque formalmente cercano al hebreo, en español puede sugerir 'la humanidad' o sonar rígido. En Daniel 9:6 el sentido es la población del país/la tierra de Judá, por lo que 'todo el pueblo del país' o 'de la tierra' contextualizado sería mejor; 'del país' es más idiomático.
  - severity: low
    issue: Estilo de notas con comillas y puntuación innecesariamente pesados
    rationale: Las notas actuales son comprensibles, pero un estilo más limpio mejora legibilidad editorial sin cambiar contenido.
  revised_spanish_text: No hemos escuchado[a] a tus siervos, los profetas, que hablaron en tu nombre a nuestros reyes, a nuestros oficiales, a nuestros padres[b] y a todo el pueblo del país.
