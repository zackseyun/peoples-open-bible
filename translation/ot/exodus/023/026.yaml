id: EXO.23.26
reference: Exodus 23:26
source:
  edition: WLC
  text: לֹ֥א תִהְיֶ֛ה מְשַׁכֵּלָ֥ה וַ/עֲקָרָ֖ה בְּ/אַרְצֶ֑/ךָ אֶת מִסְפַּ֥ר יָמֶ֖י/ךָ אֲמַלֵּֽא־׃
translation:
  text: There shall not be one miscarrying or barren in your land[b][a]; I will fill up the number of your days.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'bereaved.' The Hebrew term can refer more broadly to being deprived of children, but in this context, paired with 'barren,' it likely refers specifically to miscarriage or loss of offspring in childbirth.
    reason: lexical_alternative
  - marker: b
    text: Literally 'I will fill the number of your days,' that is, 'I will bring your lifespan to its full measure.'
    reason: lexical_alternative
lexical_decisions:
- source_word: מְשַׁכֵּלָה
  chosen: one miscarrying
  alternatives:
  - one who miscarries
  - bereaved
  lexicon: HALOT
  rationale: From שׁכל in the causative/participle form, in this context paired with 'barren' and followed by a fertility/blessing promise. The sense is not general bereavement but loss of offspring through miscarriage or failure to carry to term. 'One miscarrying' preserves the adjectival/participial force without over-paraphrasing.
- source_word: עֲקָרָה
  chosen: barren
  alternatives:
  - infertile
  - sterile
  lexicon: HALOT
  rationale: Standard rendering for a woman unable to bear children. 'Barren' is concise, idiomatic, and matches the covenant-blessing context.
- source_word: בְּאַרְצֶךָ
  chosen: in your land
  alternatives:
  - in your country
  lexicon: HALOT
  rationale: אֶרֶץ here refers to the land occupied by Israel rather than the abstract earth. 'In your land' fits the covenantal setting and is the most natural English equivalent.
- source_word: אֶת מִסְפַּר יָמֶיךָ
  chosen: the number of your days
  alternatives:
  - the full count of your days
  - your lifespan
  lexicon: HALOT
  rationale: A direct rendering of the object phrase. It refers to the allotted span of life; the more literal wording preserves the Hebrew idiom while remaining understandable.
- source_word: אֲמַלֵּא
  chosen: I will fill up
  alternatives:
  - I will fulfill
  - I will make full
  - I will complete
  lexicon: HALOT
  rationale: From מלא, 'to fill, make full.' In context it means God will bring the person's lifespan to its full measure. 'Fill up' keeps the metaphor of fullness more clearly than the interpretive 'grant a full lifespan,' while still reading naturally.
- source_word: לֹא תִהְיֶה
  chosen: There shall not be
  alternatives:
  - There will not be
  lexicon: HALOT
  rationale: This existential rendering best captures the Hebrew verbal clause introducing the condition within the land.
