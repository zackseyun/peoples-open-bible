translation:
  language: es
  text: 'y para el sacrificio de las ofrendas de paz[a]: dos reses, cinco carneros, cinco machos cabríos y cinco corderos machos de un año. Esta fue la ofrenda de Eliab hijo de Helón.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'También puede traducirse: «ofrendas de comunión» o «ofrendas de bienestar» para «ofrendas de paz».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וּ/לְ/זֶבַח
  english_pob_choice: and for the sacrifice of
  chosen_spanish: y para el sacrificio de
  alternatives_spanish:
  - y para una ofrenda de
  - y como sacrificio de
  lexicon: HALOT
  rationale: La preposición y la conjunción continúan la lista ritual; en español, 'para el sacrificio de' conserva la función introductoria y el matiz cultual sin volver la frase pesada.
- source_word: הַשְּׁלָמִים
  english_pob_choice: peace offerings
  chosen_spanish: ofrendas de paz
  alternatives_spanish:
  - ofrendas de comunión
  - ofrendas de bienestar
  lexicon: HALOT
  rationale: En español, 'ofrendas de paz' mantiene la correspondencia tradicional con el término sacrificial, pero sin ocultar la gama semántica del hebreo que incluye comunión o bienestar.
- source_word: בָּקָר שְׁנַיִם
  english_pob_choice: two cattle
  chosen_spanish: dos cabezas de ganado
  alternatives_spanish:
  - dos reses
  - dos bovinos
  lexicon: HALOT
  rationale: El hebreo usa un colectivo para bovinos sin especificar sexo; 'cabezas de ganado' preserva esa indeterminación mejor que 'toros' u 'bueyes'.
- source_word: אֵילִם חֲמִשָּׁה
  english_pob_choice: five rams
  chosen_spanish: cinco carneros
  alternatives_spanish:
  - cinco machos de oveja
  lexicon: HALOT
  rationale: '''Carneros'' es el equivalente natural y fiel para אֵילִם en listas sacrificiales.'
- source_word: עַתֻּדִים חֲמִשָּׁה
  english_pob_choice: five male goats
  chosen_spanish: cinco machos cabríos
  alternatives_spanish:
  - cinco cabritos machos
  - cinco cabras
  lexicon: HALOT
  rationale: '''Machos cabríos'' preserva la especificación de sexo que el hebreo indica y mantiene el registro cultual.'
- source_word: כְּבָשִׂים בְּנֵי שָׁנָה חֲמִשָּׁה
  english_pob_choice: five male lambs a year old
  chosen_spanish: cinco corderos de un año
  alternatives_spanish:
  - cinco corderos de un año de edad
  - cinco corderos añales
  lexicon: HALOT
  rationale: '''Corderos de un año'' expresa con naturalidad el modismo hebreo בְּנֵי שָׁנָה. Se omite ''machos'' porque el español ya suele entender ''corderos'' en este contexto sacrificial como animales jóvenes sin necesidad de marcar el sexo explícitamente.'
- source_word: זֶה קָרְבַּן
  english_pob_choice: This was the offering of
  chosen_spanish: Esta fue la ofrenda de
  alternatives_spanish:
  - Esta es la ofrenda de
  - Ésta fue la ofrenda de
  lexicon: HALOT
  rationale: '''Ofrenda'' traduce קָרְבָּן de forma sobria y precisa. El pasado (''fue'') sigue la fluidez narrativa del español, como en la versión inglesa auditada.'
- source_word: אֱלִיאָב בֶּן חֵלֹן
  english_pob_choice: Eliab son of Helon
  chosen_spanish: Eliab hijo de Helón
  alternatives_spanish:
  - Eliab, hijo de Helón
  lexicon: transliteration
  rationale: Se conserva la transliteración de los nombres propios. 'Hijo de' reproduce de manera clara el patronímico hebreo.
theological_decisions:
- issue: Terminología sacrificial de הַשְּׁלָמִים
  english_pob_reading: peace offerings with lexical alternatives noted
  chosen_spanish_reading: ofrendas de paz
  alternative_spanish_readings:
  - ofrendas de comunión
  - ofrendas de bienestar
  rationale: La expresión española tradicional 'ofrendas de paz' mantiene continuidad bíblica y litúrgica, pero la nota preserva alternativas que reflejan mejor el campo semántico de שְׁלָמִים. Esto evita borrar la tensión lexical señalada por el original y por el audit trail inglés.
  doctrine_reference: Levítico 3; Levítico 7
- issue: Tipo de animal para בָּקָר
  english_pob_reading: two cattle
  chosen_spanish_reading: dos cabezas de ganado
  alternative_spanish_readings:
  - dos reses
  - dos bovinos
  rationale: El hebreo no especifica sexo ni una especie más concreta; por eso una expresión colectiva en español conserva la amplitud del término y evita precisar más de lo que el texto dice.
  doctrine_reference: Números 7:29; HALOT בָּקָר
- issue: Edad de los corderos
  english_pob_reading: five male lambs a year old
  chosen_spanish_reading: cinco corderos de un año
  alternative_spanish_readings:
  - cinco corderos de un año de edad
  - cinco corderos añales
  rationale: El hebreo usa una fórmula idiomática de edad. En español, 'de un año' es natural y suficientemente exacto; no se fuerza un marcado de sexo que el español ya no necesita aquí para la claridad del inventario ritual.
  doctrine_reference: Números 7:29
translation_notes:
  revision_awareness: Se corrigió la validación anterior asegurando que el marcador de nota [a] aparezca exactamente en el texto principal junto a la expresión correspondiente.
  spanish_consistency_notes:
  - Se conserva un registro culto y sobrio, adecuado para una lista ritual.
  - Se evita 'SEÑOR' porque este versículo no contiene el tetragrámaton ni una cita que lo requiera.
  - Los nombres propios siguen transliteración estable y legible para lectores bíblicos en español.
  - Se mantuvo la correspondencia de inventario animal sin añadir detalles no presentes en el hebreo.
