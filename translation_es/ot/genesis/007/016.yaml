    text: 'O: «tal como Dios había mandado».'
    reason: lexical_alternative
  - marker: d
    text: 'O: «Yahvé lo encerró». El hebreo no menciona explícitamente «la puerta», aunque el contexto lo sugiere.'
    reason: lexical_alternative
  revision_rationale: 'Se corrigen los dos cambios de número que alteraban el sentido fuente: ambos pronombres deben permanecer en singular (''le'', ''él''). Se mejora la naturalidad y fidelidad con ''los que entraron'' y se evita la sobreinterpretación de וַיִּסְגֹּר mediante ''cerró tras él'', manteniendo en nota la alternativa idiomática ''lo encerró''. También se recoloca la nota [c] para que ancle correctamente a ''como''.'
