review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien el griego: «Bendito» para εὐλογητὸς, «muestra misericordia» para ὁ ποιῶν ἔλεος, y «a los que lo aman en verdad» para τοῖς ἀγαπῶσιν αὐτὸν ἐν ἀληθείᾳ preservan adecuadamente el sentido y la ambigüedad del original. Sin embargo, la nota al pie no está en español y por eso no preserva correctamente la documentación léxica del POB en el texto meta.'
  spanish_quality_summary: 'El texto principal es claro, natural y digno en español eclesial contemporáneo. La única deficiencia relevante es de legibilidad/editorial: la nota al pie quedó parcialmente en inglés, lo que rompe la coherencia del aparato en español.'
  glossary_alignment: Hay una excepción necesaria al valor por defecto del proyecto para κύριος→«Yahvé». Aquí la fuente griega dice Κύριος en una fórmula doxológica, y el rastro léxico inglés documenta «Lord» como título divino, no como sustitución explícita del tetragrámaton en una cita identificable. Por eso «Señor» es defendible y fiel en este contexto. El resto de la terminología («misericordia», «en verdad») concuerda con las decisiones auditadas.
  issues:
  - severity: medium
    issue: La nota al pie está parcialmente en inglés.
    rationale: 'El contenido de la nota dice «También: “truly”, “with sincerity” o “faithfully”». En una edición española, las alternativas léxicas deben presentarse en español para mantener legibilidad y coherencia editorial.'
  revised_spanish_text: Bendito es el Señor[a], que muestra misericordia a los que lo aman en verdad.
  revised_footnotes:
  - marker: a
    text: O «verdaderamente», «con sinceridad» o «fielmente».
    reason: lexical_alternative
  revision_rationale: Se mantiene intacto el texto principal porque es fiel al griego, idiomático en español y consistente con las decisiones léxicas del POB. Solo se corrige la nota al pie para poner las alternativas en español y preservar la ambigüedad documentada de ἐν ἀληθείᾳ.
