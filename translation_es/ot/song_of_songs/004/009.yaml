translation:
  language: es
  text: Me has cautivado[a], hermana mía, novia mía; me has cautivado con una sola mirada de tus ojos[b], con una sola joya de tu collar[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «me has arrebatado el corazón» (tradicional). El verbo hebreo es raro y expresa que la amada ha conmovido o sobrecogido poderosamente el corazón del hablante.'
    reason: lexical_alternative
  - marker: b
    text: Lit. «con uno de tus ojos». El sentido probable es «con una sola mirada» o «con un solo vistazo».
    reason: lexical_alternative
  - marker: c
    text: El hebreo también puede entenderse como «con una sola cadena/adorno de tu cuello» o «con uno de los adornos de tu cuello».
    reason: lexical_alternative
lexical_decisions:
- source_word: לִבַּבְתִּנִי
  english_pob_choice: you have captured my heart
  chosen_spanish: me has cautivado
  alternatives_spanish:
  - me has robado el corazón
  - me has arrebatado el corazón
  - me has enloquecido de amor
  lexicon: HALOT
  rationale: El verbo hebreo es raro y expresa que la amada afecta poderosamente el corazón del hablante. «Me has cautivado» conserva ese impacto emocional en un español natural y digno, sin recurrir a un calco demasiado literal ni perder la intensidad poética.
- source_word: אֲחֹתִי
  english_pob_choice: my sister
  chosen_spanish: hermana mía
  alternatives_spanish:
  - mi hermana
  lexicon: HALOT
  rationale: Se mantiene el valor literal del término como apelativo afectuoso de intimidad en Cantar, no como parentesco biológico. «Hermana mía» suena más natural y poético en español que «mi hermana» en esta invocación.
- source_word: כַלָּה
  english_pob_choice: my bride
  chosen_spanish: esposa mía
  alternatives_spanish:
  - novia mía
  - mi novia
  - mi esposa
  lexicon: HALOT
  rationale: El contexto apunta al vínculo amoroso-esponsal. En español, «esposa mía» comunica con claridad esa relación sin introducir una palabra más ambigua o menos solemne. Se evita forzar «novia», que puede sonar moderno pero debilita el matiz nupcial.
- source_word: בְאֶחָד מֵעֵינַיִךְ
  english_pob_choice: with one glance of your eyes
  chosen_spanish: con una sola mirada de tus ojos
  alternatives_spanish:
  - con un solo vistazo de tus ojos
  - con una mirada de tus ojos
  lexicon: HALOT
  rationale: La expresión hebrea literalmente significa «con uno de tus ojos» / «con uno de [algo] de tus ojos», pero el sentido probable es un solo vistazo o mirada. «Una sola mirada de tus ojos» preserva la imagen ocular y comunica el valor idiomático sin sonar extraño en español.
- source_word: בְּאַחַד עֲנָק
  english_pob_choice: with one jewel
  chosen_spanish: con una sola joya
  alternatives_spanish:
  - con una sola pieza
  - con un solo adorno
  - con un solo collar
  lexicon: HALOT
  rationale: עֲנָק denota adorno de cuello o collar. Dado que la frase siguiente alude al adorno del cuello, «joya» ofrece en español una equivalencia más amplia y poética que evita estrechar innecesariamente el objeto a una pieza concreta. Se conserva el singular enfático con «una sola».
- source_word: מִצַּוְּרֹנָיִךְ
  english_pob_choice: of your necklace
  chosen_spanish: de tu collar
  alternatives_spanish:
  - de tu cuello
  - de tus collares
  - de tus adornos del cuello
  lexicon: HALOT
  rationale: El término hebreo puede referirse a lo que se lleva en el cuello más que al cuello anatómico. «Collar» es la solución española más natural para el contexto de ornamento y mantiene la imaginería del adorno sin añadir explicación excesiva en el texto principal.
theological_decisions:
- issue: Registro del lenguaje afectivo y esponsal
  english_pob_reading: 'Literal affectionate address: ''my sister, my bride'''
  chosen_spanish_reading: «hermana mía, esposa mía» como apelativo afectuoso y esponsal
  alternative_spanish_readings:
  - «mi hermana, mi esposa»
  - «hermana mía, novia mía»
  rationale: 'No hay una doctrina en juego, pero sí una tensión interpretativa: el lenguaje no describe parentesco, sino intimidad poética y vínculo nupcial. Se conserva la literalidad funcional para no borrar el matiz afectivo del hebreo.'
  doctrine_reference: Poética bíblica / sentido literal-figurativo
- issue: Intensidad del verbo raro לבב
  english_pob_reading: '''captured my heart'' with note that ''ravished my heart'' is traditional'
  chosen_spanish_reading: «me has cautivado»
  alternative_spanish_readings:
  - «me has arrebatado»
  - «me has robado el corazón»
  rationale: El hebreo deja espacio para una fuerza emocional intensa y no conviene suavizarla. «Cautivado» conserva la idea de dominación afectiva sin introducir connotaciones modernas demasiado coloquiales o una expresión arcaica que hoy podría malentenderse.
  doctrine_reference: Poética bíblica / semántica verbal
translation_notes:
  revision_awareness: 'Se revisó la repetición del verbo hebreo para conservar el paralelismo poético: la misma idea aparece dos veces en el verso. También se mantuvo la secuencia de apelativos («hermana mía, esposa mía») y la doble imagen ornamental del final sin fusionarlas.'
  spanish_consistency_notes:
  - Se usa «Yahvé» para el nombre divino en este proyecto, pero aquí el versículo no contiene el Tetragrámaton.
  - Se mantuvo un español moderno y digno, evitando el calco rígido de la sintaxis hebrea.
  - Se preservó la repetición enfática del verbo principal y la estructura paralela del verso.
