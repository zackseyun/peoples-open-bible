review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español transmite bien el sentido general del hebreo y sigue de cerca la auditoría inglesa: conserva ''abominaciones'', mantiene la metáfora concreta de ''prostituciones'', expresa correctamente ''no te acordaste de los días de tu juventud'' y refleja la condición de vulnerabilidad pasada. Sin embargo, el orden y anclaje de las notas no preserva plenamente la relación del inglés POB: en la auditoría inglesa hay una nota para ''naked and bare'' y otra distinta para el verbo ''wallowing'', mientras que el español solo ancla [b] en ''descubierta'' y [c] en ''revolcándote''. Conviene anclar ambas notas en la frase correspondiente para evitar ambigüedad.'
  spanish_quality_summary: 'El español es claro, natural y digno. ''Y en todas tus abominaciones y tus prostituciones'' suena bíblico sin ser acartonado. ''No te acordaste'' es idiomático. ''Desnuda y descubierta'' funciona bien; ''revolcándote en tu sangre'' es vívido y fiel. La principal mejora necesaria es técnica-editorial: ajustar los anclajes de notas para que correspondan exactamente a las alternativas documentadas y no pierdan información.'
  glossary_alignment: 'Alineación buena con la terminología del proyecto: no hay términos del glosario principal en disputa aquí. Se preserva correctamente la fuerza de תּוֹעֵבָה como ''abominaciones'' y de תַזְנוּת como ''prostituciones'', conforme a la decisión teológica de no abstraer la metáfora sexual profética.'
  issues:
  - severity: medium
    issue: Los marcadores de notas no reflejan completamente la estructura de alternativas del POB inglés.
    rationale: La nota inglesa [b] corresponde a 'naked and exposed' para la pareja עֵרֹם וְעֶרְיָה, y la [c] al verbo מִתְבּוֹסֶסֶת. En español, [b] quedó solo sobre 'descubierta' y [c] solo sobre 'revolcándote'; es mejor anclar ambas en la frase relevante para que el lector vea con claridad qué expresión cubre cada nota.
  - severity: low
    issue: La nota c incluye 'removiéndote', alternativa menos natural en español bíblico contemporáneo.
    rationale: Aunque no es infiel, 'removiéndote en tu sangre' suena algo extraño. Puede conservarse como alternativa secundaria, pero 'retorciéndote' o 'agitándote' son más claras. Dado que la traducción principal ya usa 'revolcándote', el ajuste prioritario sigue siendo el anclaje de notas.
  revised_spanish_text: Y en todas tus abominaciones y tus prostituciones[a], no te acordaste de los días de tu juventud, cuando estabas desnuda y descubierta[b], revolcándote[c] en tu sangre.
  revised_footnotes:
  - marker: a
    text: O 'tus actos de prostitución'; el hebreo usa el lenguaje de prostitución para la infidelidad pactal e idólatra de Jerusalén.
    reason: lexical_alternative
  - marker: b
    text: O 'desnuda y expuesta'.
    reason: lexical_alternative
  - marker: c
    text: O 'retorciéndote en tu sangre' o 'agitándote en tu sangre'; el verbo hebreo describe una condición indefensa, agitada y cubierta de sangre.
    reason: lexical_alternative
  revision_rationale: El texto base es sustancialmente fiel y natural, pero requiere una pequeña reparación editorial para asegurar que las notas correspondan con precisión a las alternativas léxicas preservadas por la auditoría inglesa. También se mejora levemente la naturalidad de una alternativa en la nota c.
