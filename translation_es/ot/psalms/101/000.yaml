review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien la estructura del hebreo: superscripción «De David», género «Salmo», el tema «חסד ומשפט», y la invocación directa a Yahvé con un verbo final de alabanza cantada. Sin embargo, el anclaje de notas no sigue del todo la lógica del expediente inglés: la nota [a] corresponde correctamente a «De David», pero la nota [b] en el inglés auditado está mal rotulada y en realidad comenta «Yahweh», no debe trasladarse mecánicamente como si fuera una nota nueva teológica sin necesidad. Además, falta en español la alternativa léxica documentada para «misericordia/juicio».'
  spanish_quality_summary: El texto es claro y digno, pero «misericordia fiel» suena algo forzado en español natural y no comunica tan bien como «amor fiel» o «amor constante» el valor pactual amplio de חֶסֶד. También «cantaré alabanzas» es aceptable, aunque ligeramente redundante tras «Cantaré de…»; aun así funciona bien en registro bíblico. La mejor mejora pequeña es usar una expresión más idiomática para חֶסֶד y añadir la nota léxica alternativa preservada por el POB.
  glossary_alignment: 'Se alinea bien con la política del proyecto al usar «Yahvé» para יהוה. «Justicia» para מִשְׁפָּט también concuerda con el expediente inglés. La principal desalineación está en «misericordia fiel» para חֶסֶד: no es errónea, pero no es la opción más natural ni la mejor correspondencia de «steadfast love» en español eclesial amplio.'
  issues:
  - severity: medium
    issue: «misericordia fiel» suena poco natural para חֶסֶד
    rationale: Aunque intenta conservar benevolencia y fidelidad, en español la combinación es rígida y menos idiomática que «amor fiel», que transmite mejor el sentido pactual amplio reflejado en «steadfast love».
  - severity: medium
    issue: Falta la nota léxica alternativa sobre «misericordia y juicio»
    rationale: El expediente inglés conserva explícitamente la alternativa más estrecha; el español debe preservar esa información, idealmente anclada en la expresión correspondiente.
  - severity: low
    issue: La nota [b] del borrador no refleja la razón documental más útil
    rationale: La nota sobre Yahvé es verdadera, pero el expediente inglés ya contiene una nota asociada a ese punto de forma confusa; en este versículo es preferible usar la nota disponible para la alternativa léxica realmente significativa y dejar «Yahvé» sin nota, ya que es política general del proyecto.
  revised_spanish_text: De David[a]. Salmo. Cantaré del amor fiel[b] y de la justicia; a ti, Yahvé, cantaré alabanzas.
