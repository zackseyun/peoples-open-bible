translation:
  language: es
  text: Un[a] trabajador vano para su obra, un guardia vano para quien produce el mal.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'El griego dice en cambio: «Y sobre todas estas cosas, ruega al Altísimo, para que dirija tu camino en verdad». El hebreo y el griego difieren sustancialmente aquí.'
    reason: textual_variant
lexical_decisions:
- source_word: פועל
  english_pob_choice: laborer / worker
  chosen_spanish: laborioso
  alternatives_spanish:
  - trabajador
  - obrero
  - laborante
  lexicon: HALOT
  rationale: El hebreo designa a una persona que trabaja o actúa; en español, 'laborioso' permite conservar el valor agentivo del sustantivo/adjetivo proverbial y su brevedad, sin forzar una perífrasis innecesaria.
- source_word: שוא
  english_pob_choice: vain
  chosen_spanish: vano
  alternatives_spanish:
  - inútil
  - vacío
  - fútil
  lexicon: HALOT
  rationale: '''Vano'' conserva el matiz de inutilidad/futilidad y mantiene el paralelismo conciso de la línea.'
- source_word: מלאכתו
  english_pob_choice: his work / his task
  chosen_spanish: su obra
  alternatives_spanish:
  - su trabajo
  - su tarea
  - su labor
  lexicon: HALOT
  rationale: '''מלאכתו'' puede referirse al trabajo o labor asignada; ''obra'' da una equivalencia natural en español y preserva el sustantivo concreto sin repetir ''laborioso'' de modo pesado.'
- source_word: שומר
  english_pob_choice: guard
  chosen_spanish: guardia
  alternatives_spanish:
  - vigía
  - guardián
  - custodio
  lexicon: HALOT
  rationale: El participio nombra a uno que vigila o guarda; 'guardia' es breve y suficientemente agentivo en español moderno.
- source_word: מוציא רע
  english_pob_choice: one who brings forth evil
  chosen_spanish: quien saca mal
  alternatives_spanish:
  - quien trae mal
  - quien produce mal
  - malhechor
  lexicon: HALOT
  rationale: La expresión hebrea es difícil y el alcance exacto es incierto; 'quien saca mal' conserva la imagen verbal de 'sacar/poner fuera' algo malo sin resolver interpretativamente el giro a 'malhechor'.
theological_decisions:
- issue: Divergencia textual entre el hebreo conservado y el paralelo griego
  english_pob_reading: Main text follows the extant Hebrew; Greek reading is preserved in a footnote as a major alternative.
  chosen_spanish_reading: 'El texto principal sigue el hebreo conservado; la nota documenta la lectura griega sustancialmente distinta: «Y sobre todas estas cosas, ruega al Altísimo, para que dirija tu camino en verdad».'
  alternative_spanish_readings:
  - Y sobre todas estas cosas, ruega al Altísimo, para que dirija tu camino en verdad.
  - Y sobre todo esto, ora al Altísimo para que enderece tu camino con verdad.
  rationale: Como el propio aparato marca un desajuste mayor, la traducción principal refleja honestamente el hebreo existente y no absorbe la línea griega en el cuerpo del texto. La nota permite al lector ver la tensión textual sin ocultarla.
  doctrine_reference: 'PHILOSOPHY.md: traducir del hebreo donde existe; usar el griego paralelo como testimonio real y preservar la incertidumbre con honestidad.'
translation_notes:
  revision_awareness: La redacción española sigue la línea revisada del audit trail al preferir una formulación breve y natural para מלאכתו, pero adapta el paralelismo al español con 'laborioso vano' / 'guardia vano' y conserva la divergencia textual con la nota al pie.
  spanish_consistency_notes:
  - Se mantiene 'Altísimo' en la nota por corresponder al ὑψίστου del griego.
  - No se usa 'SEÑOR' ni 'Cristo'; el versículo no contiene el Tetragrámaton ni lenguaje mesiánico.
  - La puntuación y el orden mantienen el carácter proverbial y paralelo del hebreo.
  - El marcador [a] se coloca solo donde la nota textual pertinente amplía el sentido del verso.
