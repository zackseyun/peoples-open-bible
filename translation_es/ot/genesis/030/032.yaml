  to: Deja que pase por todo tu rebaño hoy[a], apartando de allí toda oveja moteada y manchada, toda oveja de color oscuro[a] entre las ovejas, y todo el que esté manchado y moteado entre las cabras[b]; y ese será mi salario.
  rationale: Se ajusta la frase central para sonar más natural y más cercana a la serie nominal del hebreo, y se restaura la nota léxica exigida por el rastro de auditoría para חוּם. Como la nota ahora ancla en 'color oscuro', se elimina la antigua nota sobre הַיּוֹם, que no formaba parte de las notas preservadas del POB inglés y era menos necesaria que la variante cromática documentada.
