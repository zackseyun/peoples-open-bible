id: ROM.5.19
reference: Romans 5:19
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: ὥσπερ γὰρ διὰ τῆς παρακοῆς τοῦ ἑνὸς ἀνθρώπου ἁμαρτωλοὶ κατεστάθησαν οἱ πολλοί, οὕτως καὶ διὰ τῆς ὑπακοῆς τοῦ ἑνὸς δίκαιοι κατασταθήσονται οἱ πολλοί.
base_translation:
  language: en
  yaml_path: translation/nt/romans/005/019.yaml
  text: For just as through the disobedience of the one man the many were made sinners[c][b][a], so also through the obedience of the one man the many will be made righteous.
  footnotes:
  - marker: a
    text: Or “were constituted sinners.”
    reason: lexical_alternative
  - marker: b
    text: Greek “through the obedience of the one”; “man” is supplied for clear English parallelism.
    reason: lexical_alternative
  - marker: c
    text: Or “will be constituted righteous.”
    reason: lexical_alternative
translation:
  language: ko
  text: 한 사람의 불순종을 통해 많은 사람이 죄인이 된 것 같이, 그렇게 한 사람의 순종을 통해 많은 사람이 의인이 될 것입니다.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: παρακοῆς
  english_pob_choice: disobedience
  chosen_korean: 불순종
  lexicon: BDAG
  rationale: ὑπακοή와 짝을 이루는 어휘.
- source_word: τοῦ ἑνὸς ἀνθρώπου
  english_pob_choice: of the one man
  chosen_korean: 한 사람
  lexicon: BDAG
  rationale: 아담을 가리키는 대표 형식. 5:12-21 정형.
- source_word: ἁμαρτωλοὶ
  english_pob_choice: sinners
  chosen_korean: 죄인
  lexicon: BDAG
  rationale: 표준.
- source_word: κατεστάθησαν
  english_pob_choice: were made
  chosen_korean: 되었습니다
  alternatives_korean:
  - 세워졌습니다
  - 임명되었습니다
  lexicon: BDAG
  rationale: 신분 부여의 동사. 「되었다」로 자연스럽게 표현하되, 더 강한 의미는 보존.
- source_word: ὑπακοῆς
  english_pob_choice: obedience
  chosen_korean: 순종
  lexicon: BDAG
  rationale: 표준.
- source_word: δίκαιοι
  english_pob_choice: righteous
  chosen_korean: 의인
  lexicon: BDAG
  rationale: 용어집 일관.
theological_decisions:
- issue: κατασταθήσονται δίκαιοι의 의미
  chosen_reading: 「의인이 될 것입니다」(신분 변화) — 「선언적 칭의」나 「본질적 의화」 둘 다로 해석적 환원하지 않음
  alternative_readings:
  - 「의롭다 선언받을 것」
  - 「의롭게 만들어질 것」
  rationale: 헬라어는 καθίστημι + δίκαιοι(형용사)이지 δικαιόω 동사가 아니다. 본문이 명시하지 않은 교파적 형식을 본문에 강요하지 않는다.
  doctrine_reference: 'DOCTRINE.md: Original-language primacy'
