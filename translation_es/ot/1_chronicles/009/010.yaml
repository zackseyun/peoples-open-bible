lexical_decisions:
- source_word: וּמִן
  english_pob_choice: And from
  chosen_spanish: Y de
  alternatives_spanish:
  - De
  - Y de entre
  lexicon: HALOT
  rationale: La forma hebrea une la preposición con una partícula conjuntiva. En español, «Y de» conserva el valor conectivo del listado y suena natural en una enumeración genealógica.
- source_word: הַכֹּהֲנִים
  english_pob_choice: the priests
  chosen_spanish: los sacerdotes
  alternatives_spanish:
  - los sacerdotes
  - el grupo sacerdotal
  lexicon: HALOT
  rationale: כֹּהֲנִים designa el cuerpo sacerdotal. «Sacerdotes» es el equivalente más directo y público en español; mantiene la referencia al oficio sin añadir matices no presentes en el hebreo.
- source_word: יְדַעְיָה
  english_pob_choice: Jedaiah
  chosen_spanish: Jedaías
  alternatives_spanish:
  - Jedaya
  lexicon: convención onomástica
  rationale: Nombre propio hebreo transliterado al uso español bíblico. «Jedaías» conserva la forma tradicional y es claro para lectores en español.
- source_word: וִיהוֹיָרִיב
  english_pob_choice: Jehoiarib
  chosen_spanish: Joiarib
  alternatives_spanish:
  - Jehoiarib
  - Yehoyarib
  lexicon: convención onomástica
  rationale: El nombre personal se adapta a la transliteración española más fluida. La forma con 'Jeho-' de la tradición inglesa no es necesaria en español; «Joiarib» preserva el nombre sin sobrecargarlo con una grafía ajena.
- source_word: וְיָכִין
  english_pob_choice: and Jakin
  chosen_spanish: Jakin
  alternatives_spanish:
  - Yakin
  lexicon: convención onomástica
  rationale: El hebreo trae una conjunción antes del último nombre. En español, la coordinación ya queda marcada por la estructura de la lista, y el nombre se translitera como «Jakin», forma breve y reconocible.
theological_decisions:
- issue: Enumeración sacerdotal sin expansión interpretativa
  english_pob_reading: 'And from the priests: Jedaiah, Jehoiarib, and Jakin.'
  chosen_spanish_reading: 'Y de los sacerdotes: Jedaías, Joiarib y Jakin.'
  alternative_spanish_readings:
  - Y de entre los sacerdotes...
