id: 1KI.16.15
reference: 1 Kings 16:15
source:
  edition: WLC
  text: בִּ/שְׁנַת֩ עֶשְׂרִ֨ים וָ/שֶׁ֜בַע שָׁנָ֗ה לְ/אָסָא֙ מֶ֣לֶךְ יְהוּדָ֔ה מָלַ֥ךְ זִמְרִ֛י שִׁבְעַ֥ת יָמִ֖ים בְּ/תִרְצָ֑ה וְ/הָ/עָ֣ם חֹנִ֔ים עַֽל גִּבְּת֖וֹן אֲשֶׁ֥ר לַ/פְּלִשְׁתִּֽים־׃
translation:
  text: In the twenty-seventh year of Asa king of Judah[a], Zimri became king for seven days in Tirzah, while the people were camped against Gibbethon, which belonged to the Philistines.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'at Gibbethon'; in this military context, 'against Gibbethon' likely conveys that the people were encamped in opposition to the city.
    reason: lexical_alternative
lexical_decisions:
- source_word: בִּ/שְׁנַת עֶשְׂרִים וָשֶׁבַע שָׁנָה
  chosen: In the twenty-seventh year
  alternatives:
  - In year twenty-seven
  - During the twenty-seventh year
  lexicon: HALOT
  rationale: Standard regnal-year dating formula. English idiom naturally compresses the Hebrew construct expression into 'in the twenty-seventh year.'
- source_word: לְאָסָא מֶלֶךְ יְהוּדָה
  chosen: of Asa king of Judah
  alternatives:
  - of Asa, the king of Judah
  lexicon: HALOT
  rationale: Preserves the regnal synchronism and appositional title without unnecessary expansion.
- source_word: מָלַךְ
  chosen: became king
  alternatives:
  - reigned
  - was king
  lexicon: HALOT
  rationale: The verb denotes accession to kingship here. 'Became king' captures the ingressive sense better than 'reigned,' especially since the duration follows immediately.
- source_word: שִׁבְעַת יָמִים
  chosen: for seven days
  alternatives:
  - seven days
  lexicon: HALOT
  rationale: English requires 'for' to express duration naturally.
- source_word: בְּתִרְצָה
  chosen: in Tirzah
  lexicon: HALOT
  rationale: Simple locative preposition with place name.
- source_word: וְהָעָם
  chosen: while the people
  alternatives:
  - and the people
  lexicon: HALOT
  rationale: The conjunction links the background circumstance to Zimri's brief reign. 'While' makes the temporal/circumstantial force explicit in natural English.
- source_word: חֹנִים
  chosen: were camped
  alternatives:
  - were encamped
  - were camping
  lexicon: HALOT
  rationale: Qal participle indicates ongoing state/action. 'Were camped' is readable modern English and fits the military context.
- source_word: עַל גִּבְּתוֹן
  chosen: against Gibbethon
  alternatives:
  - at Gibbethon
  - besieging Gibbethon
  lexicon: HALOT
  rationale: In military context, עַל with a city under attack commonly carries the sense 'against' rather than merely spatial 'at.' 'Besieging' is possible but slightly more specific than the Hebrew alone requires.
- source_word: אֲשֶׁר לַפְּלִשְׁתִּים
  chosen: which belonged to the Philistines
  alternatives:
  - which was the Philistines'
  - which was held by the Philistines
  lexicon: HALOT
  rationale: The lamed indicates possession/association. 'Belonged to the Philistines' is clear and idiomatic, without over-specifying military control.
