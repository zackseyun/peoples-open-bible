translation:
  language: es
  text: Porque, ¿quién sabe qué es bueno para el hombre en la vida, durante el número de los días de su vida fugaz[a], que él pasa como una sombra? Porque, ¿quién puede decirle al hombre qué habrá después de él, bajo el sol?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «los días de su hevel»; hevel también puede traducirse «vanidad», «vapor» o «aliento», subrayando la transitoriedad y la elusividad de la vida.'
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Porque entonces
  lexicon: HALOT
  rationale: Introduce la pregunta retórica como continuación explicativa del argumento anterior. «Porque» conserva la relación discursiva de modo natural en español.
- source_word: מִי יוֹדֵעַ
  english_pob_choice: who knows
  chosen_spanish: ¿quién sabe?
  alternatives_spanish:
  - ¿quién puede saber?
  - ¿quién conoce?
  lexicon: HALOT
  rationale: Reproduce la fuerza retórica gnómica del hebreo con un giro natural en español, sin volverlo demasiado literal.
- source_word: מַה טּוֹב
  english_pob_choice: what is good
  chosen_spanish: qué es bueno
  alternatives_spanish:
  - qué es lo mejor
  - qué es beneficioso
  lexicon: HALOT
  rationale: Mantiene el sentido amplio de טוֹב como lo bueno o adecuado, sin reducirlo solo a utilidad práctica.
- source_word: לָאָדָם
  english_pob_choice: for a man
  chosen_spanish: para el hombre
  alternatives_spanish:
  - para una persona
  - para la humanidad
  lexicon: HALOT
  rationale: Conserva el singular genérico del hebreo con un español sobrio y fiel al registro del texto.
- source_word: בַּחַיִּים
  english_pob_choice: in life
  chosen_spanish: en la vida
  alternatives_spanish:
  - durante la vida
  - mientras vive
  lexicon: HALOT
  rationale: Es la correspondencia directa y natural de la esfera vital general indicada por el hebreo.
- source_word: מִסְפַּר יְמֵי חַיֵּי
  english_pob_choice: during the number of the days of
  chosen_spanish: durante el número de los días de
  alternatives_spanish:
  - a lo largo de los días de
  - durante los días de
  lexicon: HALOT
  rationale: Conserva explícitamente la idea de conteo y limitación presente en מִסְפַּר, que el POB inglés también retiene.
- source_word: הֶבְלֹו
  english_pob_choice: his fleeting life
  chosen_spanish: su vida fugaz[a]
  alternatives_spanish:
  - su vanidad
  - su vapor
  - su aliento
  lexicon: HALOT
  rationale: «Vida fugaz» comunica en español la transitoriedad e insustancialidad de הֶבֶל en este contexto. Se conserva una nota para la alternativa más literal y tradicional, dado el valor técnico del término en Eclesiastés.
- source_word: וְיַעֲשֵׂם
  english_pob_choice: which he spends
  chosen_spanish: que él pasa
  alternatives_spanish:
  - que él consume
  - que él emplea
  lexicon: HALOT
  rationale: El verbo hebreo literalmente es «hacer», pero en contexto idiomático refiere al transcurrir o pasar los días. «Pasa» expresa esa idea de manera idiomática en español.
- source_word: כַּצֵּל
  english_pob_choice: like a shadow
  chosen_spanish: como sombra
  alternatives_spanish:
  - como una sombra
  lexicon: HALOT
  rationale: Preserva la comparación hebrea y el matiz de fugacidad; se omite el artículo por estilo español posible y natural.
- source_word: יַגִּיד
  english_pob_choice: can tell
  chosen_spanish: puede decir
  alternatives_spanish:
  - puede declarar
  - puede explicar
  lexicon: HALOT
  rationale: En la pregunta retórica, «puede decir» transmite la capacidad de comunicar o informar, equivalente al valor de יַגִּיד en este contexto.
- source_word: מַה יִּהְיֶה אַחֲרָיו
  english_pob_choice: what will be after him
  chosen_spanish: qué habrá después de él
  alternatives_spanish:
  - qué será después de él
  - qué acontecerá después de él
  lexicon: HALOT
  rationale: Mantiene la apertura del hebreo sin precisar indebidamente a herencia, posteridad u otros desarrollos.
- source_word: תַּחַת הַשָּׁמֶשׁ
  english_pob_choice: under the sun
  chosen_spanish: debajo del sol
  alternatives_spanish:
  - bajo el sol
  - en la tierra
  lexicon: HALOT
  rationale: Conserva la fórmula característica de Eclesiastés en una forma reconocible y fiel.
theological_decisions:
- issue: Valor de הֶבֶל en Eclesiastés
  english_pob_reading: fleeting life
  chosen_spanish_reading: vida fugaz
  alternative_spanish_readings:
  - vanidad
  - vapor
  - aliento
  rationale: El contexto inmediato enfatiza la brevedad y la insustancialidad de la vida humana. «Vida fugaz» conserva esa carga sin perder inteligibilidad en español, mientras la nota mantiene visible la alternativa lexical tradicional.
  doctrine_reference: DOCTRINE.md §Translation philosophy 1, 5
- issue: Renderizado genérico de אָדָם
  english_pob_reading: a man
  chosen_spanish_reading: el hombre
  alternative_spanish_readings:
  - una persona
  - la persona humana
  rationale: El hebreo usa un singular genérico representativo. «El hombre» en español puede funcionar de modo genérico y mantiene la concisión y el tono sapiencial del texto.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4; Contested terms table for אָדָם
translation_notes:
  revision_awareness: La redacción sigue de cerca el texto hebreo y el audit trail inglés, preservando la estructura de dos preguntas retóricas, la referencia a la limitación de los días y la fórmula «debajo del sol». Se adoptó «vida fugaz» como solución idiomática para הֶבֶל, con nota que mantiene auditable la alternativa más literal.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma del proyecto cuando corresponda; este versículo no contiene el nombre divino.
  - Se evitó «Cristo/Mesías» porque no aplica en este pasaje.
  - «Debajo del sol» conserva la fórmula sapiencial estable del libro.
  - Se usó «hombre» como genérico singular para אָדָם, coherente con el registro sapiencial y con la política del proyecto.
