translation:
  language: es
  text: 'Habla a los hijos de Israel[a], diciendo: Si una persona peca por inadvertencia[b] respecto de cualquiera de los mandamientos de Yahvé, acerca de cosas que no se deben hacer, y hace una de ellas,'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'los israelitas'; el hebreo dice literalmente 'los hijos de Israel'.
    reason: lexical_alternative
  - marker: b
    text: O 'por error' o 'sin intención'; el hebreo indica un pecado cometido inadvertidamente y no de manera desafiante.
    reason: lexical_alternative
lexical_decisions:
- source_word: דַּבֵּר
  english_pob_choice: Speak
  chosen_spanish: Habla
  alternatives_spanish:
  - Di
  - Habla
  lexicon: HALOT
  rationale: El imperativo introduce instrucción divina directa; en español, 'Habla' conserva la inmediatez del mandato sin forzar un calco excesivamente inglés.
- source_word: בְּנֵי יִשְׂרָאֵל
  english_pob_choice: the sons of Israel
  chosen_spanish: los hijos de Israel
  alternatives_spanish:
  - los hijos de Israel
  - los israelitas
  lexicon: HALOT
  rationale: Se conserva la expresión filial literal del hebreo. 'Israelitas' sería más idiomático, pero borra la forma marcada que el POB ya decide preservar en inglés.
- source_word: נֶפֶשׁ
  english_pob_choice: a person
  chosen_spanish: una persona
  alternatives_spanish:
  - una persona
  - alguien
  - un alma
  lexicon: HALOT
  rationale: Aquí נֶפֶשׁ designa al individuo legalmente responsable, no al 'alma' en sentido antropológico. 'Una persona' comunica bien el valor idiomático.
- source_word: תֶחֱטָא
  english_pob_choice: sins
  chosen_spanish: peca
  alternatives_spanish:
  - peca
  - comete pecado
  lexicon: HALOT
  rationale: La forma verbal sencilla preserva la cláusula condicional legal sin añadir explicación innecesaria.
- source_word: בִשְׁגָגָה
  english_pob_choice: unintentionally
  chosen_spanish: por inadvertencia
  alternatives_spanish:
  - sin intención
  - por error
  - por inadvertencia
  lexicon: HALOT
  rationale: '''Por inadvertencia'' refleja mejor el matiz legal de error no deliberado que el mero ''accidentalmente''; mantiene la tensión con el pecado involuntario documentada en el POB inglés.'
- source_word: מִכֹּל מִצְוֺת יְהוָה
  english_pob_choice: in regard to any of the commandments of Yahweh
  chosen_spanish: en cualquiera de los mandamientos de Yahvé
  alternatives_spanish:
  - respecto de cualquiera de los mandamientos de Yahvé
  - en cualquiera de los mandamientos de Yahvé
  - contra cualquiera de los mandamientos de Yahvé
  lexicon: HALOT
  rationale: La construcción hebrea con מִן se vierte aquí de forma relacional, 'en cualquiera de', siguiendo la revisión inglesa que prefirió 'in regard to' sobre 'against' para una correspondencia más cercana y natural.
- source_word: אֲשֶׁר לֹא תֵעָשֶׂינָה
  english_pob_choice: concerning things that should not be done
  chosen_spanish: que no deben hacerse
  alternatives_spanish:
  - que no deben hacerse
  - que no han de hacerse
  - que no se deben hacer
  lexicon: HALOT
  rationale: Se conserva el valor impersonal de la relativa, con una pasiva/impersonal natural en español que expresa prohibición sin añadir interpretación.
- source_word: וְעָשָׂה
  english_pob_choice: and does
  chosen_spanish: y hace
  alternatives_spanish:
  - y hace
  - y comete
  lexicon: HALOT
  rationale: '''Hace'' mantiene la continuidad verbal de la condición legal; no se introduce ''comete'' para no cargar el verbo con un matiz más interpretativo que el hebreo inmediato.'
- source_word: מֵאַחַת מֵהֵנָּה
  english_pob_choice: one of them
  chosen_spanish: una de ellas
  alternatives_spanish:
  - una de ellas
  - una de estas
  - una de ellas mismas
  lexicon: HALOT
  rationale: '''Ellas'' retoma naturalmente los mandamientos/actos prohibidos mencionados; se mantiene la referencia anafórica sin sobreexplicar.'
theological_decisions:
- issue: Nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahvé
  - el SEÑOR
  - Jehová
  rationale: 'Se adopta la convención del proyecto para el Tetragrámaton: ''Yahvé'', preservando el nombre del pacto en vez de una sustitución litúrgica.'
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Naturaleza del pecado en בִשְׁגָגָה
  english_pob_reading: unintentionally / by mistake / in error
  chosen_spanish_reading: por inadvertencia
  alternative_spanish_readings:
  - sin intención
  - por error
  - por inadvertencia
  rationale: La frase debe conservar el contraste teológico con el pecado deliberado o de mano alzada; 'por inadvertencia' expresa mejor el carácter no intencional del acto.
  doctrine_reference: Leviticus 4 sacrificial/legal context
- issue: Alcance de נֶפֶשׁ
  english_pob_reading: a person
  chosen_spanish_reading: una persona
  alternative_spanish_readings:
  - una persona
  - un alma
  rationale: No se espiritualiza נֶפֶשׁ; en este contexto legal designa a un individuo responsable ante la ley sacrificial.
  doctrine_reference: Anthropological usage in Torah legal texts
translation_notes:
  revision_awareness: Se incorporó la revisión inglesa que cambió 'against' por 'in regard to'; por eso la preposición española evita 'contra' y opta por una relación más cercana al hebreo. También se mantuvo la preferencia del POB por el nombre divino 'Yahweh', adaptado al español como 'Yahvé'.
  spanish_consistency_notes:
  - Se conserva la estructura jurídica-condicional del hebreo sin añadir sujetos implícitos innecesarios.
  - '''los hijos de Israel'' mantiene la imagen filial literal; no se reemplaza por ''israelitas'' en el texto principal.'
  - '''por inadvertencia'' preserva la inadvertencia, no la mera casualidad.'
  - '''Yahvé'' sigue la terminología del proyecto para יְהוָה.'
  - '''una de ellas'' retoma el conjunto de mandamientos/prohibiciones con un referente natural en español.'
