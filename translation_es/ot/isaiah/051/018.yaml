translation:
  language: es
  text: No hay quien la guíe entre todos los hijos que ha dado a luz[a], y no hay quien la tome de la mano entre todos los hijos que ha criado.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «de entre todos los hijos que ha dado a luz ... de entre todos los hijos que ha criado». El hebreo dice específicamente «hijos».
    reason: lexical_alternative
lexical_decisions:
- source_word: מְנַהֵל
  english_pob_choice: to guide
  chosen_spanish: guiar
  alternatives_spanish:
  - llevar
  - conducir
  lexicon: HALOT
  rationale: El participio expresa dirigir o conducir; en este contexto de Jerusalén personificada como mujer desamparada, «guiar» comunica dirección y cuidado con naturalidad en español.
- source_word: לָהּ
  english_pob_choice: her
  chosen_spanish: la / ella
  alternatives_spanish:
  - le
  - su
  lexicon: HALOT
  rationale: El sufijo femenino singular se refiere a la ciudad personificada. En español, el objeto directo femenino «la» mantiene la referencia sin oscurecer el sujeto implícito.
- source_word: מִכָּל בָּנִים
  english_pob_choice: among all the sons
  chosen_spanish: entre todos los hijos
  alternatives_spanish:
  - de entre todos los hijos
  - entre todos los varones
  lexicon: HALOT
  rationale: Aunque el hebreo dice literalmente «hijos/sons» en masculino plural, en español «hijos» puede conservar el valor genérico masculino sin sonar forzado. Se mantiene la marca masculina del original sin neutralizarla a «hijos e hijas» ni ampliar a «niños».
- source_word: יָלָדָה
  english_pob_choice: she has borne
  chosen_spanish: ha dado a luz
  alternatives_spanish:
  - ha parido
  - ha alumbrado
  lexicon: HALOT
  rationale: El perfecto expresa una acción completada con relevancia presente. «Ha dado a luz» preserva el sentido materno y resulta idiomático y digno en español contemporáneo.
- source_word: מַחֲזִיק בְּיָדָהּ
  english_pob_choice: to take her by the hand
  chosen_spanish: tomar de la mano
  alternatives_spanish:
  - sostener su mano
  - agarrar su mano
  lexicon: HALOT
  rationale: La imagen literal es de sostener o fortalecer la mano, pero el uso español más natural y cercano al valor idiomático de apoyo y guía es «tomar de la mano».
- source_word: גִּדֵּלָה
  english_pob_choice: she has raised
  chosen_spanish: ha criado
  alternatives_spanish:
  - ha educado
  - ha levantado
  lexicon: HALOT
  rationale: El piel de גדל significa criar o educar hijos. «Ha criado» es el equivalente español más directo y fiel, y además armoniza con el paralelismo con «ha dado a luz».
- source_word: אֵין ... וְאֵין
  english_pob_choice: There is no one ... and no one
  chosen_spanish: No hay ... ni hay ...
  alternatives_spanish:
  - No existe ... ni existe ...
  - No hay quien ... y no hay quien ...
  lexicon: HALOT
  rationale: La repetición de la negación existencial se conserva en español con «No hay ... ni hay ...», una construcción natural que mantiene el énfasis de abandono total.
theological_decisions:
- issue: Renderización del masculino plural בָּנִים
  english_pob_reading: sons
  chosen_spanish_reading: hijos
  alternative_spanish_readings:
  - hijos varones
  - niños
  rationale: El hebreo usa masculino plural explícito. En español, «hijos» preserva la forma masculina sin sustituirla por un genérico más amplio que diluya el dato lexical del original.
  doctrine_reference: Translation philosophy §4
- issue: Personificación femenina de Jerusalén/Sion
  english_pob_reading: her
  chosen_spanish_reading: la / ella
  alternative_spanish_readings:
  - le
  - su
  rationale: El contexto profético personifica a Jerusalén como mujer. La concordancia femenina en español mantiene esa personificación y evita ambigüedad.
  doctrine_reference: Isaías 51:17-23 contexto literario
translation_notes:
  revision_awareness: 'El auditorio inglés no requirió cambios en la última revisión: el veredicto fue de alta concordancia y no hubo revisiones aplicadas. La versión española sigue esa lectura estable, manteniendo la repetición negativa, la personificación femenina y el masculino plural explícito del hebreo.'
  spanish_consistency_notes:
  - Se conservó el orden paralelístico del hebreo en dos miembros coordinados.
  - «Ha dado a luz» / «ha criado» mantiene la correspondencia maternal de los dos verbos.
  - Se evitó «SEÑOR» o terminología no presente en este versículo.
  - La nota al pie recoge la alternativa lexical documentada sin borrar el dato masculino del hebreo.
