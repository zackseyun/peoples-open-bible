  to: Sus hijos se alzarán y reunirán una multitud de grandes fuerzas; y uno ciertamente vendrá[a], desbordará y pasará. Luego volverá y provocará guerra hasta su fortaleza[b].
  rationale: Se corrige la cláusula final para expresar con fidelidad y buen español עַד מָעֻזֹּה, preservando la ambigüedad del poseedor mediante nota en vez de producir una frase ininteligible. También se reubica la nota [a] al cambio de plural a singular, donde realmente pertenece según el rastro de auditoría inglés. Se mantiene la mayor parte del borrador, pero se mejora la segunda instancia de יִתְגָּרוּ con 'provocará guerra' para reflejar el sentido militar explícito documentado por el POB inglés.
