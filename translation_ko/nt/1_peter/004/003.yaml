reference: 1 Peter 4:3
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: ἀρκετὸς γὰρ ὁ παρεληλυθὼς χρόνος τὸ βούλημα τῶν ἐθνῶν κατειργάσθαι, πεπορευμένους ἐν ἀσελγείαις, ἐπιθυμίαις, οἰνοφλυγίαις, κώμοις, πότοις, καὶ ἀθεμίτοις εἰδωλολατρίαις.
base_translation:
  language: en
  yaml_path: translation/nt/1_peter/004/003.yaml
  text: 'For the time that has passed is enough to have carried out the will of the Gentiles, having walked in sensualities, lusts, drunkenness, carousing, drinking parties, and lawless idolatries.'
translation:
  language: ko
  text: '지나간 때는 이방인들의 뜻을 행하기에 충분합니다. 곧 호색과 정욕과 술 취함과 방탕한 잔치와 술자리와 무법한 우상숭배 가운데서 살아왔습니다.'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: τὸ βούλημα τῶν ἐθνῶν κατειργάσθαι
  english_pob_choice: to have carried out the will of the Gentiles
  chosen_korean: 이방인들의 뜻을 행하기에
  alternatives_korean:
  - 열방의 의도를 이루기에
  - 이방인의 욕망을 좇기에
  lexicon: BDAG
  rationale: βούλημα는 「의도·결정」. 「뜻」으로 옮긴다.
- source_word: ἀσελγείαις
  english_pob_choice: sensualities
  chosen_korean: 호색
  alternatives_korean:
  - 음란
  - 방탕
  lexicon: BDAG
  rationale: ἀσέλγεια는 「방종한 성적 행위」. 한국 성서 전통의 「호색」 채택.
- source_word: οἰνοφλυγίαις
  english_pob_choice: drunkenness
  chosen_korean: 술 취함
  alternatives_korean:
  - 만취
  - 폭주
  lexicon: BDAG
  rationale: οἰνοφλυγία는 「과음·만취」. 「술 취함」으로 평이하게.
- source_word: κώμοις
  english_pob_choice: carousing
  chosen_korean: 방탕한 잔치
  alternatives_korean:
  - 흥청거림
  - 떠들썩한 향연
  lexicon: BDAG
  rationale: κῶμος는 「떠들썩한 술잔치」. 「방탕한 잔치」로 옮긴다.
- source_word: πότοις
  english_pob_choice: drinking parties
  chosen_korean: 술자리
  alternatives_korean:
  - 음주 모임
  lexicon: BDAG
  rationale: πότος는 「술 마시는 모임」. 「술자리」로 평이하게.
- source_word: ἀθεμίτοις εἰδωλολατρίαις
  english_pob_choice: lawless idolatries
  chosen_korean: 무법한 우상숭배
  alternatives_korean:
  - 금지된 우상 숭배
  - 가증한 우상 섬김
  lexicon: BDAG
  rationale: ἀθέμιτος의 「법·관습이 금한」을 「무법한」으로 옮긴다.
