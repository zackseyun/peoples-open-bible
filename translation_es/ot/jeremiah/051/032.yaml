translation:
  language: es
  text: Los cruces[a] han sido tomados, los pantanos[b] han sido quemados con fuego, y los hombres de guerra[c] están aterrados.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «los vados han sido tomados». El hebreo puede referirse a lugares de cruce, especialmente vados.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «las lagunas» o «las charcas»; el término hebreo puede designar zonas pantanosas o encharcadas.'
    reason: lexical_alternative
  - marker: c
    text: 'O: «los guerreros» o «los combatientes». Literalmente: «los hombres de guerra».'
    reason: lexical_alternative
lexical_decisions:
- source_word: הַמַּעְבָּרוֹת
  english_pob_choice: the crossings
  chosen_spanish: las calzadas
  alternatives_spanish:
  - los cruces
  - los vados
  - los pasos
  lexicon: HALOT
  rationale: מַעְבָּר denota un lugar de paso o de cruce. En español, "calzadas" comunica un paso estratégico o vía de tránsito sin limitarlo solo a vados fluviales; conserva la idea de accesos/caminos tomados en contexto militar.
- source_word: נִתְפָּשׂוּ
  english_pob_choice: have been seized
  chosen_spanish: han sido tomadas
  alternatives_spanish:
  - han sido capturadas
  - son tomadas
  - han sido apoderadas
  lexicon: HALOT
  rationale: El nifal expresa que algo fue tomado o aprehendido. "Han sido tomadas" mantiene la pasividad/resultatividad y suena natural en español; no se fuerza una lectura más estrecha como "capturadas".
- source_word: הָאֲגַמִּים
  english_pob_choice: the marshes
  chosen_spanish: los pantanos
  alternatives_spanish:
  - las lagunas
  - las charcas
  - los marjales
  lexicon: HALOT
  rationale: אֲגַמִּים puede referirse a zonas pantanosas o cuerpos de agua encharcados. "Pantanos" es claro y suficientemente amplio en español para conservar la imagen geográfica y la posibilidad de ser incendiados.
- source_word: שָׂרְפוּ בָאֵשׁ
  english_pob_choice: have been burned with fire
  chosen_spanish: han sido quemados con fuego
  alternatives_spanish:
  - han ardido en el fuego
  - han sido incendiados
  - los quemaron con fuego
  lexicon: HALOT
  rationale: La secuencia verbal con בָּאֵשׁ enfatiza el acto de quemar por medio del fuego. "Han sido quemados con fuego" refleja esa fuerza sin suavizarla; aunque el hebreo usa una forma activa indefinida, el español puede expresar el resultado de la acción en pasiva perifrástica.
- source_word: אַנְשֵׁי הַמִּלְחָמָה
  english_pob_choice: the men of war
  chosen_spanish: los hombres de guerra
  alternatives_spanish:
  - los guerreros
  - los hombres guerreros
  - los combatientes
  lexicon: HALOT
  rationale: Literalmente es "hombres de la guerra". "Hombres de guerra" conserva la transparencia léxica y el registro militar masculino del hebreo, alineado con la decisión inglesa de no sustituirlo por un término más general como "combatientes".
- source_word: נִבְהָלוּ
  english_pob_choice: are terrified
  chosen_spanish: están aterrados
  alternatives_spanish:
  - están aterrorizados
  - están consternados
  - están llenos de pánico
  lexicon: HALOT
  rationale: בהל en nifal expresa estar alarmado, perturbado o aterrorizado. "Están aterrados" comunica bien la intensidad en español moderno y preserva el estado resultante descrito por el verbo.
translation_notes:
  revision_awareness: 'Se mantuvo sin cambios respecto del testimonio hebreo y del audit trail inglés: la frase presenta una serie de calamidades en paralelo (tomas de pasos/cruces, quema de pantanos y terror de los hombres de guerra), sin indicios de revisión textual que alteren el sentido básico.'
  spanish_consistency_notes:
  - Se preservó el paralelismo verbal del hebreo con tres miembros coordinados por comas y una última cláusula con "y".
  - Se optó por un español neutro y publicable, evitando "SEÑOR" o terminología eclesiástica no presente en el versículo.
  - Los términos militares y geográficos se mantuvieron transparentes para que el lector perciba la fuerza descriptiva del texto.
