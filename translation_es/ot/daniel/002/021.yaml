translation:
  language: es
  text: Él cambia los tiempos y las estaciones[a]; depone reyes y establece reyes; da sabiduría a los sabios y conocimiento a los que tienen entendimiento[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «los tiempos señalados» para «las estaciones». La pareja aramea puede designar tanto tiempos en general como sus ocasiones fijadas o apropiadas.
    reason: lexical_alternative
  - marker: b
    text: Literalmente, «a los que conocen entendimiento».
    reason: lexical_alternative
lexical_decisions:
- source_word: מְהַשְׁנֵא
  english_pob_choice: changes
  chosen_spanish: cambia
  alternatives_spanish:
  - altera
  lexicon: HALOT
  rationale: El participio expresa una acción causativa de cambio. «Cambia» es natural en español y conserva el sentido activo y continuo del original sin volverlo más técnico de lo necesario.
- source_word: עִדָּנַיָּא
  english_pob_choice: times
  chosen_spanish: los tiempos
  alternatives_spanish:
  - los períodos
  - los momentos
  lexicon: HALOT
  rationale: En arameo, el término puede referir tiempos o períodos. «Los tiempos» es la equivalencia directa y más idiomática en español para el primer miembro de la pareja.
- source_word: זִמְנַיָּא
  english_pob_choice: seasons
  chosen_spanish: las estaciones
  alternatives_spanish:
  - los tiempos señalados
  - los períodos fijados
  lexicon: HALOT
  rationale: La segunda palabra añade la idea de ocasiones fijadas o apropiadas. «Estaciones» conserva la pareja tradicional de sentido sin reducirla a clima; en español puede funcionar como correlato de «tiempos» para expresar la dualidad semítica.
- source_word: מְהַעְדֵּה
  english_pob_choice: removes
  chosen_spanish: quita
  alternatives_spanish:
  - remueve
  - depuesta
  lexicon: HALOT
  rationale: El verbo significa hacer pasar, quitar o remover. «Quita» mantiene la fuerza directa del acto sobre los reyes y evita introducir de antemano un matiz político más específico como «deponer».
- source_word: מַלְכִין
  english_pob_choice: kings
  chosen_spanish: reyes
  alternatives_spanish:
  - monarcas
  - gobernantes
  lexicon: HALOT
  rationale: El sustantivo es literal y plural. «Reyes» preserva la concreción del texto y la simetría con el siguiente miembro.
- source_word: מְהָקֵים
  english_pob_choice: sets up
  chosen_spanish: pone
  alternatives_spanish:
  - establece
  - levanta
  lexicon: HALOT
  rationale: El verbo puede significar levantar o establecer. En español, «pone reyes» reproduce bien el paralelismo con «quita reyes» y mantiene la expresión sobria del original sin sobreinterpretarla.
- source_word: חָכְמְתָא
  english_pob_choice: wisdom
  chosen_spanish: sabiduría
  alternatives_spanish:
  - prudencia
  lexicon: HALOT
  rationale: El sustantivo corresponde de forma estándar a sabiduría. No hay presión contextual para un sentido más estrecho.
- source_word: לְחַכִּימִין
  english_pob_choice: to the wise
  chosen_spanish: a los sabios
  alternatives_spanish:
  - a los hombres sabios
  - a los inteligentes
  lexicon: HALOT
  rationale: El adjetivo funciona sustantivamente. «A los sabios» es breve, natural y conserva el paralelo con el siguiente miembro.
- source_word: מַנְדְּעָא
  english_pob_choice: knowledge
  chosen_spanish: conocimiento
  alternatives_spanish:
  - saber
  - entendimiento
  lexicon: HALOT
  rationale: El término denota conocimiento y conviene distinguirlo de בִינָה, que ya aporta la idea de entendimiento/discernimiento. «Conocimiento» preserva esa diferencia léxica.
- source_word: לְיָדְעֵי בִינָה
  english_pob_choice: to those who have understanding
  chosen_spanish: a los que tienen entendimiento
  alternatives_spanish:
  - a los que entienden
  - a los conocedores de entendimiento
  lexicon: HALOT
  rationale: La frase es semítica y algo enfática, literalmente cercana a «a los conocedores de entendimiento». «A los que tienen entendimiento» sigue de cerca el sentido mientras suena natural en español y mantiene la distinción entre conocimiento y entendimiento.
theological_decisions:
- issue: Soberanía divina sobre los gobernantes
  english_pob_reading: Retain the direct statement that God removes and sets up kings without softening or expanding it.
  chosen_spanish_reading: Mantener la afirmación directa de que Dios quita y pone reyes, sin atenuarla ni expandirla.
  alternative_spanish_readings:
  - Dios permite que los reyes asciendan y caigan
  - Dios influye en los cambios políticos
  rationale: El versículo atribuye explícitamente estas acciones a Dios. La traducción debe conservar esa afirmación fuerte de soberanía divina sin introducir un sistema teológico más determinista o más permisivo que el que el texto expresa.
  doctrine_reference: Afirmaciones; filosofía de traducción §3
translation_notes:
  revision_awareness: La redacción sigue de cerca la revisión más reciente del inglés POB, que aclaró la última frase para expresar de modo natural «those who have understanding». En español se refleja con «a los que tienen entendimiento», manteniendo la semítica relación entre conocimiento y entendimiento.
  spanish_consistency_notes:
  - Se mantuvo «Dios» implícito en el sujeto pronominal «Él» conforme al contexto del capítulo, sin añadir el nombre divino porque el versículo arameo usa pronombre enfático en tercera persona.
  - 'Se preservó el paralelismo verbal breve del original: cambia / quita / pone / da.'
  - Se distinguió «sabiduría» de «conocimiento» y «entendimiento» para no fusionar los tres términos arameos.
  - La pareja «tiempos y estaciones» se tradujo con una formulación natural en español y con nota para conservar la alternativa «tiempos señalados».
