translation:
  language: es
  text: Para el director del coro. Salmo de David[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O posiblemente 'por David' o 'para David'; el encabezamiento hebreo puede indicar autoría, asociación o dedicación.
    reason: alternative_reading
lexical_decisions:
- source_word: לַמְנַצֵּחַ
  english_pob_choice: For the choirmaster
  chosen_spanish: Para el director del coro
  alternatives_spanish:
  - Para el maestro de coro
  - Para el músico director
  - Para el líder musical
  lexicon: HALOT
  rationale: El término de encabezamiento señala a la persona encargada de la ejecución musical. En español, 'director del coro' comunica con naturalidad esa función sin perder el matiz litúrgico y musical del hebreo. 'Para' conserva el valor de ל en fórmulas de superscripción.
- source_word: מִזְמוֹר
  english_pob_choice: A psalm
  chosen_spanish: Salmo
  alternatives_spanish:
  - Cántico
  - Canción
  - Melodía
  lexicon: HALOT
  rationale: מִזְמוֹר es el rótulo genérico del género salmódico. 'Salmo' es el equivalente más preciso y reconocible en español bíblico, y evita precisar indebidamente el tipo musical.
- source_word: לְדָוִד
  english_pob_choice: of David
  chosen_spanish: de David
  alternatives_spanish:
  - por David
  - para David
  - perteneciente a David
  lexicon: HALOT
  rationale: La preposición ל en los encabezamientos de los salmos puede indicar autoría, dedicación o asociación. 'De David' preserva esa ambigüedad de forma natural en español, sin cerrar el sentido a una sola relación.
theological_decisions:
- issue: Ambigüedad del encabezamiento davídico
  english_pob_reading: of David
  chosen_spanish_reading: de David
  alternative_spanish_readings:
  - por David
  - para David
  rationale: El hebreo no obliga a decidir entre autoría, dedicación o asociación. Mantener 'de David' conserva la tensión textual y evita sobreinterpretar el encabezamiento.
  doctrine_reference: Translation philosophy §3 (Preserve theological tension rather than resolve it)
translation_notes:
  revision_awareness: 'Se tuvo en cuenta la revisión que corrigió la ubicación del marcador: la nota se asocia a ''David'' y no al encabezamiento inicial. También se respetó el consenso alto del control cruzado, con la única cuestión menor relativa a la ambigüedad de לְדָוִד.'
  spanish_consistency_notes:
  - Se mantuvo un registro sobrio y funcional para encabezamientos poéticos.
  - '''Salmo'' se usa como término de género, no como interpretación devocional.'
  - La nota textual se ancla en 'David' para reflejar correctamente la decisión auditada.
