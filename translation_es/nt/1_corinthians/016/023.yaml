translation:
  language: es
  text: La gracia del Señor Jesús sea con ustedes.
  philosophy: optimal-equivalence
  footnotes: []
lexical_decisions:
- source_word: χάρις
  english_pob_choice: grace
  chosen_spanish: gracia
  alternatives_spanish:
  - favor
  - gracioso favor
  lexicon: BDAG
  rationale: En esta bendición paulina, χάρις conserva su valor habitual de don benévolo de Dios. «Gracia» es el equivalente español natural y teológicamente preciso, sin debilitar el peso de la fórmula.
- source_word: κύριος
  english_pob_choice: Lord
  chosen_spanish: Señor
  alternatives_spanish:
  - Maestro
  lexicon: BDAG
  rationale: En el contexto cristológico del saludo final, «Señor» comunica mejor el título reverencial y su uso establecido en el NT. «Maestro» sería posible lexicalmente, pero resulta menos idiomático y menos fiel al valor titular.
- source_word: Ἰησοῦ
  english_pob_choice: Jesus
  chosen_spanish: Jesús
  lexicon: BDAG
  rationale: Es el nombre propio de Jesús; en español se translitera normalmente como «Jesús».
- source_word: μεθ’ ὑμῶν
  english_pob_choice: be with you
  chosen_spanish: sea con ustedes
  alternatives_spanish:
  - esté con ustedes
  - con ustedes
  lexicon: BDAG
  rationale: El griego es una fórmula benedictoria sin verbo explícito; en español conviene suplirlo para que la bendición suene natural. «Sea con ustedes» conserva el sentido de presencia/bendición sin añadir contenido ajeno al texto.
- source_word: τοῦ κυρίου Ἰησοῦ
  english_pob_choice: of the Lord Jesus
  chosen_spanish: del Señor Jesús
  alternatives_spanish:
  - del Señor Jesús Cristo
  lexicon: BDAG
  rationale: El genitivo expresa relación posesiva o de procedencia dentro de la frase nominal. «Del Señor Jesús» reproduce bien la estructura griega y mantiene la referencia cristológica.
theological_decisions:
- issue: Fórmula benedictoria sin verbo explícito
  english_pob_reading: 'Supply ''be'' in English: ''The grace of the Lord Jesus be with you.'''
  chosen_spanish_reading: 'Suplir el verbo implícito con «sea» en español: «La gracia del Señor Jesús sea con ustedes».'
  alternative_spanish_readings:
  - La gracia del Señor Jesús con ustedes.
  - La gracia del Señor Jesús esté con ustedes.
  rationale: El griego es verbless, pero el español requiere una forma verbal para una bendición natural. «Sea» mantiene la fuerza benedictoria sin exagerar ni reinterpretar el texto.
  doctrine_reference: Convención gramatical de las bendiciones paulinas; equivalencia óptima y claridad litúrgica.
translation_notes:
  revision_awareness: 'El texto griego y el rastro auditado en inglés muestran alta concordancia: la única decisión sensible es la traducción benedictoria de la construcción sin verbo. La versión española sigue el mismo juicio semántico que la POB inglesa, pero con un verbo copulativo natural en español.'
  spanish_consistency_notes:
  - Se mantiene «gracia» para χάρις, en coherencia con el valor paulino y con la POB inglesa.
  - Se usa «Señor» para κύριος según la convención cristológica del proyecto.
  - Se preserva el tono de bendición final breve y sobrio, sin ampliar el contenido del versículo.
