translation:
  language: es
  text: Vienen días[a], declara Yahvé, cuando cumpliré la buena palabra que hablé a la casa de Israel y a la casa de Judá.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «He aquí, vienen días». El hebreo usa una expresión de atención al inicio.
    reason: lexical_alternative
lexical_decisions:
- source_word: הִנֵּה
  english_pob_choice: Look
  chosen_spanish: Mira
  alternatives_spanish:
  - Mira bien
  - Atiende
  - He aquí
  lexicon: HALOT
  rationale: Es una exhortación deíctica para llamar la atención. «Mira» conserva la fuerza inmediata y es natural en español moderno; «He aquí» sería más tradicional pero más marcado y menos conversacional.
- source_word: יָמִים בָּאִים
  english_pob_choice: days are coming
  chosen_spanish: vienen días
  alternatives_spanish:
  - los días vienen
  - están viniendo días
  - se acercan días
  lexicon: HALOT
  rationale: La fórmula profética anuncia un tiempo futuro. «Vienen días» mantiene el movimiento futuro y suena natural en español, sin sobrecargar con un artículo innecesario.
- source_word: נְאֻם יְהוָה
  english_pob_choice: declares Yahweh
  chosen_spanish: dice Yahvé
  alternatives_spanish:
  - declara Yahvé
  - oráculo de Yahvé
  - así dice Yahvé
  lexicon: HALOT
  rationale: YHWH se rinde como «Yahvé» según el proyecto. Para נְאֻם, «dice» mantiene la fórmula profética de modo sobrio y claro; «declara» sería posible, pero menos directo en esta construcción española.
- source_word: וַהֲקִמֹתִי
  english_pob_choice: I will fulfill
  chosen_spanish: cumpliré
  alternatives_spanish:
  - estableceré
  - confirmaré
  - haré realidad
  lexicon: HALOT
  rationale: En esta construcción con «la buena palabra», el sentido es hacer que la palabra/promesa permanezca y se realice. «Cumpliré» expresa bien ese valor idiomático en español y evita perder el matiz promesal.
- source_word: הַדָּבָר הַטּוֹב
  english_pob_choice: the good word
  chosen_spanish: la buena palabra
  alternatives_spanish:
  - la buena promesa
  - la buena cosa
  - el buen dicho
  lexicon: HALOT
  rationale: Se conserva «palabra» para reflejar el hebreo דָּבָר y la conexión inmediata con «hablé». «Promesa» recoge la implicación contextual, pero es más interpretativa; se deja como alternativa.
- source_word: דִּבַּרְתִּי
  english_pob_choice: I spoke
  chosen_spanish: hablé
  alternatives_spanish:
  - dije
  - había hablado
  - prometí
  lexicon: HALOT
  rationale: El verbo básico es «hablar». «Hablé» preserva la relación lexical con «palabra» y evita sustituirla por «prometí», que resolvería demasiado el sentido.
- source_word: אֶל בֵּית יִשְׂרָאֵל וְעַל בֵּית יְהוּדָה
  english_pob_choice: to the house of Israel and the house of Judah
  chosen_spanish: a la casa de Israel y a la casa de Judá
  alternatives_spanish:
  - para la casa de Israel y la casa de Judá
  - respecto de la casa de Israel y la casa de Judá
  - a la casa de Israel y sobre la casa de Judá
  lexicon: HALOT
  rationale: Se conserva el idiomático «casa de…» para mantener el lenguaje pactual y nacional. Aunque el hebreo usa preposiciones distintas, en español la repetición de «a» da una lectura natural y comunica adecuadamente a ambos destinatarios.
theological_decisions:
- issue: Rendering of the divine name YHWH
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahvé
  - Jehová
  rationale: El texto hebreo emplea el Tetragrámaton, y la pauta del proyecto es verterlo como «Yahvé». Se evita «SEÑOR» porque ocultaría el nombre propio del pacto.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Whether to render הַדָּבָר הַטּוֹב as 'word' or the more interpretive 'promise'
  english_pob_reading: the good word
  chosen_spanish_reading: la buena palabra
  alternative_spanish_readings:
  - la buena promesa
  - la buena cosa
  rationale: «Palabra» reproduce con más fidelidad el sustantivo hebreo y mantiene la tensión entre lo dicho y su cumplimiento. «Promesa» sería comprensible, pero explicita demasiado el valor contextual.
  doctrine_reference: 'DOCTRINE.md Translation philosophy: original-language primacy; preserve theological tension rather than resolve it'
translation_notes:
  revision_awareness: La versión inglesa más reciente se mantuvo sin cambios tras la revisión final (gpt-5.4), con acuerdo alto del revisor; por eso el español sigue de cerca la lectura óptimo-equivalente ya estabilizada, especialmente en la tensión entre «palabra» y el sentido contextual de promesa.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» como nombre divino principal, de acuerdo con la terminología del proyecto.
  - Se conservó «casa de Israel / casa de Judá» para reflejar la fórmula pactual y nacional.
  - Se eligió «palabra» en vez de «promesa» en el texto principal para no resolver demasiado el hebreo דָּבָר.
  - El verbo «cumpliré» comunica la realización eficaz de la palabra sin sustituir la base léxica de «hablé».
