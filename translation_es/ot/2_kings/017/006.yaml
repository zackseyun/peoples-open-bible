translation:
  language: es
  text: En el noveno año de Oseas[a], el rey de Asiria capturó Samaria y llevó a Israel a Asiria[b], y los asentó en Halah, y junto al Habor, el río de Gozán[c], y en las ciudades de Media.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'Hoshea'. Se conserva aquí la forma española habitual del nombre del rey.
    reason: lexical_alternative
  - marker: b
    text: O 'deportó a Israel a Asiria' o 'exilió a Israel a Asiria'. El verbo hebreo expresa una remoción forzada al exilio.
    reason: lexical_alternative
  - marker: c
    text: O 'y junto al Habor, río de Gozán'. El hebreo también puede describir el asentamiento a lo largo del río Habor en la región de Gozán.
    reason: lexical_alternative
lexical_decisions:
- source_word: בִּ/שְׁנַ֨ת הַ/תְּשִׁיעִ֜ית
  english_pob_choice: In the ninth year
  chosen_spanish: En el noveno año
  alternatives_spanish:
  - En el año nueve
  - En el noveno año
  lexicon: HALOT
  rationale: La construcción temporal hebrea con ב + 'año' + ordinal se expresa de forma natural en español con 'En el noveno año', conservando el valor cronológico exacto.
- source_word: לְ/הוֹשֵׁ֗עַ
  english_pob_choice: of Hoshea
  chosen_spanish: de Oseas
  alternatives_spanish:
  - de Osea
  - de Hoshea
  lexicon: HALOT
  rationale: El referente es el rey Oseas; se usa la forma castellana habitual 'Oseas' para claridad lectora en español, sin alterar el valor regnal del complemento.
- source_word: לָכַ֤ד מֶֽלֶךְ אַשּׁוּר֙
  english_pob_choice: the king of Assyria captured
  chosen_spanish: el rey de Asiria capturó
  alternatives_spanish:
  - el rey de Asiria tomó
  - el rey de Asiria se apoderó de
  lexicon: HALOT
  rationale: '''Capturó'' reproduce bien el sentido militar de la conquista de una ciudad y preserva el tono histórico del relato.'
- source_word: שֹׁ֣מְר֔וֹן
  english_pob_choice: Samaria
  chosen_spanish: Samaria
  alternatives_spanish:
  - Samaría
  lexicon: HALOT
  rationale: Nombre propio tradicional y claro en español bíblico.
- source_word: וַ/יֶּ֥גֶל
  english_pob_choice: carried ... away
  chosen_spanish: llevó a ... a
  alternatives_spanish:
  - exilió a
  - deportó a
  - llevó al cautiverio a
  lexicon: HALOT
  rationale: Se conserva la idea de desplazamiento forzoso del verbo גלה sin sobrecargar el texto con una paráfrasis. El español 'llevó a ... a' mantiene el movimiento hacia el destierro; el matiz de exilio queda implícito en el contexto.
- source_word: אֶת יִשְׂרָאֵ֖ל
  english_pob_choice: Israel
  chosen_spanish: Israel
  alternatives_spanish:
  - los israelitas
  lexicon: HALOT
  rationale: Se mantiene el nombre colectivo 'Israel' para conservar el sujeto nacional del destierro.
- source_word: אַשּׁ֑וּרָ/ה
  english_pob_choice: to Assyria
  chosen_spanish: a Asiria
  alternatives_spanish:
  - hacia Asiria
  - a Asiria
  lexicon: HALOT
  rationale: La he direccional se refleja naturalmente con 'a'; en español resulta idiomático y mantiene el destino geográfico del traslado.
- source_word: וַ/יֹּ֨שֶׁב אֹתָ֜/ם
  english_pob_choice: settled them
  chosen_spanish: los estableció
  alternatives_spanish:
  - los asentó
  - los hizo habitar
  lexicon: HALOT
  rationale: El hifil de ישב expresa causar que habiten en un lugar. 'Los estableció' es una forma natural en español que conserva la acción de instalación forzada sin añadir información.
- source_word: בַּ/חְלַ֧ח
  english_pob_choice: in Halah
  chosen_spanish: en Halah
  alternatives_spanish:
  - en Jalaj
  - en Halah
  lexicon: HALOT
  rationale: Se conserva el nombre propio transliterado para no imponer una identificación secundaria no explicitada por el texto.
- source_word: וּ/בְ/חָב֛וֹר
  english_pob_choice: and on the Habor
  chosen_spanish: y junto al Habor
  alternatives_spanish:
  - y en el Habor
  - y sobre el Habor
  - y junto al Habor
  lexicon: HALOT
  rationale: La preposición permite la idea de asentamiento a lo largo del río; 'junto al' comunica bien esa relación topográfica en español sin forzar una lectura más precisa de la que exige el hebreo.
- source_word: נְהַ֥ר גּוֹזָ֖ן
  english_pob_choice: the river of Gozan
  chosen_spanish: el río de Gozán
  alternatives_spanish:
  - el río de Gozán
  - el río Gozán
  lexicon: HALOT
  rationale: Se mantiene la construcción de relación ('río de Gozán') y se usa la forma española de Gozán.
- source_word: וְ/עָרֵ֥י מָדָֽי
  english_pob_choice: and in the cities of Media
  chosen_spanish: y en las ciudades de Media
  alternatives_spanish:
  - y en las ciudades de los medos
  - y en las ciudades de Media
  lexicon: HALOT
  rationale: '''Media'' conserva el valor geográfico del nombre propio y encaja bien en la lista de lugares de deportación.'
translation_notes:
  revision_awareness: La revisión inglesa reciente prefirió 'to Assyria' en lugar de 'into Assyria' por naturalidad direccional; por eso el español usa 'a Asiria'. También se mantuvo la lista de lugares y la lectura narrativa sin cambios sustanciales.
  spanish_consistency_notes:
  - Se usa 'Asiria' como topónimo estándar en español.
  - Se conserva el nombre propio 'Israel' como entidad colectiva, siguiendo el valor nacional del original.
  - '''Estableció'' refleja el hifil causativo sin añadir detalle interpretativo indebido.'
  - 'Los dos marcadores de nota están anclados exactamente en el texto: [a] y [b].'
