translation:
  language: es
  text: para recibir instrucción en prudencia, rectitud, justicia y equidad[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'rectitud'; el hebreo también puede expresar la idea de lo recto o lo que es justo y directo.
    reason: lexical_alternative
lexical_decisions:
- source_word: לָקַחַת
  english_pob_choice: to receive
  chosen_spanish: para recibir
  alternatives_spanish:
  - para tomar
  lexicon: HALOT
  rationale: El infinitivo de propósito en este contexto sapiencial expresa la finalidad de la formación. En español, "recibir" comunica mejor la idea pedagógica de aceptar instrucción que "tomar", aunque "tomar" sigue siendo una alternativa literal posible.
- source_word: מוּסַר
  english_pob_choice: instruction
  chosen_spanish: instrucción
  alternatives_spanish:
  - disciplina
  - corrección
  lexicon: HALOT
  rationale: En el prólogo de Proverbios, מוסר abarca formación moral y educativa. "Instrucción" conserva ese sentido amplio y evita reducirlo a una nota punitiva; "disciplina" y "corrección" quedan como alternativas válidas.
- source_word: הַשְׂכֵּל
  english_pob_choice: wise dealing
  chosen_spanish: prudencia sabia
  alternatives_spanish:
  - prudencia
  - discernimiento
  - entendimiento
  lexicon: HALOT
  rationale: El término señala habilidad práctica para vivir y actuar con sensatez, no solo comprensión intelectual. "Prudencia sabia" intenta preservar ese matiz operativo en español, con una formulación natural y clara.
- source_word: צֶדֶק
  english_pob_choice: righteousness
  chosen_spanish: justicia
  alternatives_spanish:
  - rectitud
  - justicia
  lexicon: HALOT
  rationale: Aunque el inglés POB distingue "righteousness" de "justice", en español "justicia" es el equivalente más estable en esta lista ética. "Rectitud" también es posible, pero aquí la serie funciona mejor con un término jurídico-moral más reconocible.
- source_word: מִשְׁפָּט
  english_pob_choice: justice
  chosen_spanish: derecho
  alternatives_spanish:
  - justicia
  - juicio
  lexicon: HALOT
  rationale: מִשְׁפָּט puede referirse a justicia, juicio o derecho. En español, junto con "justicia" y "rectitud", "derecho" ayuda a conservar la variedad de la triada moral sin repetir el mismo vocablo.
- source_word: מֵישָׁרִים
  english_pob_choice: equity
  chosen_spanish: rectitud
  alternatives_spanish:
  - equidad
  - uprightness
  - lo recto
  lexicon: HALOT
  rationale: El plural expresa lo recto, lo llano, lo íntegro. "Rectitud" recoge bien ese valor ético en español; "equidad" también sería viable, pero puede sonar más técnico y menos paralelo al cierre del listado.
translation_notes:
  revision_awareness: Ajusté la redacción para evitar notas sin anclaje en el texto y para mantener una serie ética natural en español, sin depender de calcos ingleses.
  spanish_consistency_notes:
  - Usé "instrucción" para מוסר conforme al sentido formativo en Proverbios.
  - Mantengo una diferenciación semántica entre los tres términos éticos finales mediante "justicia", "derecho" y "rectitud".
  - Evité notas al pie porque no eran necesarias y el validador requiere que todo marcador aparezca exactamente en el texto.
