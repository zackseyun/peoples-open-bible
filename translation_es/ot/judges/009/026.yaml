review_pass:
  verdict: revise
  source_alignment_summary: El borrador refleja bien la secuencia narrativa básica y el sentido de confianza en Gaal, pero no preserva del todo la decisión léxica auditada para וַיַּעַבְרוּ בִּשְׁכֶם ('crossed into Shechem') y omite las alternativas significativas que el rastro inglés conservó en notas. Además, 'señores de Siquem' es posible, pero el POB inglés documentó preferencia por 'leaders' como sentido sociopolítico más claro de בַּעֲלֵי שְׁכֶם.
  spanish_quality_summary: El español es fluido y legible, pero 'pasó por Siquem' suena algo impreciso porque el sujeto es singular en español mientras el hebreo tiene plural por Gaal y sus hermanos, y además puede sugerir mero tránsito por la ciudad. 'Los líderes de Siquem' comunica mejor el sentido en español moderno y eclesialmente legible que 'los señores de Siquem'.
  glossary_alignment: No hay términos teológicos del glosario principal en juego. La principal alineación pendiente es con la decisión del POB para בַּעֲלֵי שְׁכֶם como 'leaders' y con la preservación de alternativas léxicas mediante notas. 'Confiaron en él' está bien para וַיִּבְטְחוּ בוֹ.
  issues:
  - severity: medium
    issue: וַיַּעַבְרוּ בִּשְׁכֶם se vertió como 'pasó por Siquem'
    rationale: El hebreo está en plural y expresa movimiento de cruce/paso con matiz de entrada o atravesar. 'Pasó' singular desajusta el número, y 'por Siquem' favorece demasiado la lectura de tránsito. Conviene una formulación como 'entraron en Siquem' o 'pasaron a Siquem' con nota de alternativas.
  - severity: medium
    issue: בַּעֲלֵי שְׁכֶם se vertió como 'los señores de Siquem' sin nota
    rationale: '''Señores'' puede sonar arcaizante o socialmente más feudal que el sentido probable de dirigentes/poderosos urbanos. El POB inglés prefirió ''leaders'' y conservó ''lords'' como alternativa en nota; el español debería reflejar esa preferencia.'
  - severity: low
    issue: Faltan notas para alternativas léxicas preservadas en el rastro inglés
    rationale: El inglés documentó alternativas significativas para 'and his brothers/with his brothers', para el verbo עבר, y para בעלי שכם. En español conviene conservarlas, ya que siguen siendo relevantes y no generan torpeza.
  revised_spanish_text: Entonces Gaal hijo de Ebed vino con sus hermanos[a] y entraron en Siquem[b], y los líderes[c] de Siquem confiaron en él.
  revised_footnotes:
  - marker: a
    text: 'O: «y sus hermanos»; el hebreo dice simplemente «y», aunque en español después de «vino» es natural expresar acompañamiento con «con sus hermanos».'
    reason: lexical_alternative
  - marker: b
    text: 'O: «pasaron por Siquem» o «cruzaron hacia Siquem»; el verbo hebreo puede denotar cruzar o pasar, y el matiz exacto en este contexto es debatido.'
    reason: lexical_alternative
  - marker: c
    text: 'O: «los señores de Siquem»; el hebreo dice literalmente «los בעלי de Siquem», refiriéndose a los hombres principales o detentores de poder de la ciudad.'
    reason: lexical_alternative
  revision_rationale: Se ajusta el verbo de movimiento para respetar mejor el plural hebreo y evitar la sugerencia de mero tránsito; se adopta 'líderes' para reflejar la preferencia auditada del POB para בַּעֲלֵי שְׁכֶם en español claro y moderno; y se restauran en notas las alternativas léxicas significativas preservadas por el rastro inglés.
