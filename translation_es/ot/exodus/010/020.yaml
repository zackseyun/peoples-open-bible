translation:
  language: es
  text: Pero Yahvé endureció el corazón[a] de Faraón, y no dejó salir a los hijos de Israel[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «hizo firme el corazón de Faraón» o «fortaleció el corazón de Faraón»; el verbo hebreo literalmente significa «hacer fuerte» o «hacer firme».
    reason: lexical_alternative
  - marker: b
    text: O «los israelitas»; tradicionalmente «los hijos de Israel».
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְחַזֵּק
  english_pob_choice: hardened
  chosen_spanish: endureció
  alternatives_spanish:
  - fortaleció
  - hizo firme
  lexicon: HALOT
  rationale: El hebreo חזק tiene el sentido básico de hacer fuerte o firme, pero en esta fórmula repetida del Éxodo el efecto narrativo es el de una resistencia interior que se vuelve rígida. En español, «endureció» comunica esa fuerza idiomática sin perder la tensión teológica del pasaje. Se conservan alternativas más literales en nota porque el verbo también puede leerse como «fortaleció» o «hizo firme».
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  - el SEÑOR
  lexicon: HALOT
  rationale: Se mantiene el nombre divino personal revelado en el texto hebreo como «Yahvé», conforme al criterio del proyecto. No se sustituye por un título genérico ni por una convención de ocultamiento.
- source_word: לֵב
  english_pob_choice: heart
  chosen_spanish: corazón
  alternatives_spanish:
  - mente
  - voluntad interior
  lexicon: HALOT
  rationale: «Corazón» es el equivalente natural de לֵב en español bíblico y conserva el centro de decisión, disposición e ինտencionalidad que el hebreo atribuye al interior humano.
- source_word: פַּרְעֹה
  english_pob_choice: Pharaoh’s
  chosen_spanish: de Faraón
  alternatives_spanish:
  - del Faraón
  lexicon: uso estándar
  rationale: «Faraón» funciona en español como nombre/título propio y la construcción posesiva se expresa de forma natural con «de Faraón». La mayúscula corresponde al uso bíblico convencional.
- source_word: שִׁלַּח
  english_pob_choice: did not let ... go
  chosen_spanish: no dejó salir
  alternatives_spanish:
  - no lo soltó
  - no lo despidió
  - no envió
  lexicon: HALOT
  rationale: En el contexto del éxodo, שׁלח no se reduce a «enviar», sino que expresa la liberación efectiva de Israel. «No dejó salir» reproduce con claridad la fuerza idiomática del verbo sin caer en una traducción mecánica.
- source_word: בְּנֵי יִשְׂרָאֵל
  english_pob_choice: the sons of Israel
  chosen_spanish: los hijos de Israel
  alternatives_spanish:
  - los israelitas
  - los hijos de Jacob
  lexicon: HALOT
  rationale: Se conserva la expresión genealógica del hebreo. En español, «los hijos de Israel» es transparente y fiel al original; «los israelitas» sería más fluido, pero menos explícito respecto de la forma hebrea.
theological_decisions:
- issue: Agencia divina en el endurecimiento del corazón de Faraón
  english_pob_reading: But the LORD hardened Pharaoh’s heart
  chosen_spanish_reading: Pero Yahvé endureció el corazón de Faraón
  alternative_spanish_readings:
  - Pero Yahvé hizo firme el corazón de Faraón
  - Pero Yahvé fortaleció el corazón de Faraón
  rationale: El versículo atribuye de manera directa la acción a Yahvé; por eso la traducción no atenúa esa agencia. Al mismo tiempo, «endureció» preserva la tensión bíblica del relato sin intentar resolverla con una explicación doctrinal externa al texto.
  doctrine_reference: Preservar la tensión teológica del texto; YHWH como agente explícito en la narración.
translation_notes:
  revision_awareness: El pasaje del source packet coincide plenamente con el contexto auditado en inglés; no hay revisiones aplicadas ni divergencias textuales relevantes en el expediente más reciente.
  spanish_consistency_notes:
  - Se usa «Yahvé» en lugar de una sustitución reverencial, siguiendo el estándar del proyecto.
  - Se mantiene «corazón» para לֵב y «hijos de Israel» para la expresión genealógica hebrea.
  - La nota a pie de página a documenta la alternativa léxica de וַיְחַזֵּק; la nota b documenta la variante para בְּנֵי יִשְׂרָאֵל.
  - «No dejó salir» traduce la función contextual de שִׁלַּח en el éxodo mejor que un «envió» literal.
