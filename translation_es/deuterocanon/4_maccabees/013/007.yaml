translation:
  language: es
  text: Así, la nobleza de siete torreones[a] de los jóvenes, habiendo fortificado el puerto de la piedad, venció la licenciosidad de las pasiones.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, «la nobleza de siete bastiones de los jóvenes»; o, de forma más interpretativa, «el bendito propósito de los siete jóvenes». La frase griega es sumamente figurativa.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἑπτάπυργος
  english_pob_choice: seven-towered
  chosen_spanish: de los siete torreones
  alternatives_spanish:
  - siete-torreado
  - de siete bastiones
  lexicon: LSJ
  rationale: Conservo la imagen compuesta y fortificada del griego, pero la adapto a una construcción natural en español. «De los siete torreones» mantiene el efecto figurativo de una estructura defensiva sin sonar forzado.
- source_word: εὐλογιστία
  english_pob_choice: blessedness
  chosen_spanish: bienaventuranza
  alternatives_spanish:
  - bendición
  - recto juicio
  - buen consejo
  lexicon: LSJ
  rationale: El término es raro y encomiástico. «Bienaventuranza» comunica una cualidad praiseworthy/afortunada sin reducirla a una simple capacidad mental, y encaja con el tono elevado del pasaje.
- source_word: νεανίσκων
  english_pob_choice: young men
  chosen_spanish: los jóvenes
  alternatives_spanish:
  - los muchachos
  - los jóvenes varones
  lexicon: LSJ
  rationale: El plural masculino se refiere a los hermanos. «Los jóvenes» es natural en español actual y conserva el referente sin añadir solemnidad innecesaria.
- source_word: ὀχυρώσασα
  english_pob_choice: having fortified
  chosen_spanish: habiendo fortificado
  alternatives_spanish:
  - habiendo hecho segura
  - habiendo reforzado
  lexicon: LSJ
  rationale: Sostiene la metáfora militar/arquitectónica del verso. «Fortificado» reproduce mejor la fuerza de ὀχυρόω que opciones más generales.
- source_word: λιμένα
  english_pob_choice: harbor
  chosen_spanish: puerto
  alternatives_spanish:
  - refugio
  - bahía
  lexicon: LSJ
  rationale: «Puerto» es idiomático en español y puede funcionar como imagen de abrigo seguro. Aunque «puerto» no repite exactamente «harbor» en la misma carga moderna, aquí preserva el valor de haven/port dentro de la metáfora de fortaleza.
- source_word: εὐσεβείας
  english_pob_choice: godliness
  chosen_spanish: piedad
  alternatives_spanish:
  - devoción a Dios
  - reverencia
  lexicon: LSJ
  rationale: En este contexto 4 Macabeos usa εὐσέβεια como devoción reverente a Dios. «Piedad» conserva el registro religioso y permite mantener el genitivo metafórico «el puerto de la piedad» sin sobreexplicar.
- source_word: πάθη
  english_pob_choice: passions
  chosen_spanish: las pasiones
  alternatives_spanish:
  - los deseos
  - las emociones
  lexicon: LSJ
  rationale: Aquí πάθη son pasiones desordenadas, no sufrimientos. «Pasiones» es la equivalencia española directa y filosófico-moralmente precisa.
- source_word: ἀκολασίαν
  english_pob_choice: licentiousness
  chosen_spanish: la licenciosidad
  alternatives_spanish:
  - la disipación
  - la falta de dominio propio
  - la disolución
  lexicon: LSJ
  rationale: «Licenciosidad» reproduce el matiz de exceso sin freno y el tono moral del texto. Es más amplio que lo meramente sexual, como en el griego.
- source_word: ἐνίκησεν
  english_pob_choice: conquered
  chosen_spanish: venció
  alternatives_spanish:
  - conquistó
  - derrotó
  lexicon: LSJ
  rationale: El verbo es triunfal y marcial. «Venció» es más natural en español que «conquistó» y mantiene el clímax de victoria del verso.
theological_decisions:
- issue: Traducción de εὐσεβεία en un contexto de virtud religiosa central
  english_pob_reading: godliness
  chosen_spanish_reading: piedad
  alternative_spanish_readings:
  - devoción a Dios
  - reverencia
  rationale: En 4 Macabeos, εὐσέβεια nombra la devoción reverente hacia Dios expresada en fidelidad. «Piedad» conserva el contenido religioso sin introducir una formulación más interpretativa.
  doctrine_reference: Translation philosophy §§1, 6
- issue: Conservación de la metáfora fortaleza/puerto en la cláusula principal
  english_pob_reading: the seven-towered blessedness ... having fortified the harbor of godliness
  chosen_spanish_reading: la bienaventuranza de los siete torreones ... habiendo fortificado el puerto de la piedad
  alternative_spanish_readings:
  - la nobleza fortificada de los siete jóvenes
  - el bendito propósito de los siete jóvenes
  rationale: El griego es altamente figurativo y personifica la virtud de los siete hermanos como una estructura defensiva. La redacción española mantiene esa tensión imagística en lugar de resolverla en una paráfrasis abstracta.
  doctrine_reference: Translation philosophy §§1, 3, 6
translation_notes:
  revision_awareness: La revisión más reciente no cambió el texto. El control cruzado indicó que hay que revisar la solución por la gran figuratividad de ἑπτάπυργος / εὐλογιστία; por eso la versión española mantiene la imagen fortificada, pero la naturaliza con una sintaxis española clara y una nota alternativa para la lectura más interpretativa.
  spanish_consistency_notes:
  - Se conserva «Yahvé» como norma del proyecto, pero este versículo no contiene el tetragrámaton ni una cita explícita del nombre divino.
  - «Piedad» se usa aquí como equivalente contextual de εὐσεβεία; no se entiende en sentido meramente sentimental.
  - «Pasiones» y «licenciosidad» mantienen el registro moral-filosófico del griego.
  - La nota al pie marca la alternativa interpretativa porque la expresión griega es notoriamente oscura y metafórica.
