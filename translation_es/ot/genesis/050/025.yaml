revisions:
- from: 'Entonces José hizo jurar a los hijos de Israel, diciendo: «Dios ciertamente los visitará[a], y ustedes sacarán mis huesos de aquí».'
  to: 'Entonces José hizo jurar a los hijos de Israel, diciendo: «Dios ciertamente los visitará[a], y ustedes harán subir mis huesos de aquí».'
  rationale: Se reemplaza «sacarán» por «harán subir» para reflejar con mayor fidelidad el hiphil de עלה y su sentido narrativo de traslado hacia arriba desde Egipto. Se corrige la nota para que ofrezca una alternativa real, en línea con el audit trail inglés, en vez de repetir el texto principal.
