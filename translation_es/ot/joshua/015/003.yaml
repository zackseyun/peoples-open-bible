base_translation:
  language: en
  yaml_path: translation/ot/joshua/015/003.yaml
  text: Then it went out southward to the ascent of Akrabbim[a], crossed over to Zin, went up from the south to Kadesh-barnea, crossed over Hezron, went up to Addar[b], and turned toward Karka.
  footnotes:
  - marker: a
    text: Akrabbim likely means 'scorpions'; the Hebrew name is transliterated because it functions here as a place name.
    reason: lexical_alternative
  - marker: b
    text: Or 'toward Karkaa'; the place name's English spelling is uncertain.
    reason: alternative_reading
