    issue: La nota [a] está anclada en «Elim» pero su contenido explica «hijos de Israel».
    rationale: Las instrucciones exigen que cada marcador aparezca en la palabra o frase pertinente. Aquí la nota lexical sobre בְּנֵי יִשְׂרָאֵל debe ir anclada a «hijos de Israel», no a «Elim».
  - severity: medium
    issue: «llegó» está en singular con un sujeto colectivo donde el hebreo lleva verbo plural.
    rationale: Aunque el singular puede tolerarse con colectivos en español, «llegaron» suena más natural y preserva mejor la concordancia y la forma verbal plural del original.
  - severity: low
    issue: La expresión calendárica podría ser más formal.
    rationale: «El día quince del segundo mes» es entendible, pero «el decimoquinto día del segundo mes» refleja mejor el estilo de datación bíblica. No es un error grave, pero conviene pulirlo.
