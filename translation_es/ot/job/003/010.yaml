lexical_decisions:
- source_word: כִּי
  english_pob_choice: because
  chosen_spanish: porque
  alternatives_spanish:
  - pues
  - ya que
  lexicon: HALOT
  rationale: Conserva la fuerza causal del hebreo y suena natural en español al introducir la razón del lamento.
- source_word: סָגַר
  english_pob_choice: shut
  chosen_spanish: cerró
  alternatives_spanish:
  - abrió
  - selló
  lexicon: HALOT
  rationale: El verbo expresa la acción de cerrar o clausurar; en español 'cerró' comunica de forma directa la imagen de una puerta cerrada.
- source_word: דַּלְתֵי
  english_pob_choice: doors
  chosen_spanish: las puertas
  alternatives_spanish:
  - las hojas
  - los portales
  lexicon: HALOT
  rationale: '''Puertas'' mantiene la imagen concreta del hebreo. ''Hojas'' sería más técnico y menos transparente para el lector general.'
- source_word: בִטְנִי
  english_pob_choice: my womb
  chosen_spanish: mi vientre[a]
  alternatives_spanish:
  - mi útero
  - mi barriga
  lexicon: HALOT
  rationale: El hebreo puede significar 'vientre' o 'vientre materno/womb'. En este contexto de nacimiento y gestación, 'vientre' conserva la imagen corporal en español sin imponer un término demasiado técnico. La nota a aclara la posibilidad de 'vientre materno' en sentido contextual.
- source_word: וַיַּסְתֵּר
  english_pob_choice: nor hide
  chosen_spanish: ni ocultó
  alternatives_spanish:
  - ni escondió
  - y no ocultó
  lexicon: HALOT
  rationale: 'La coordinación negativa en español reproduce naturalmente la continuidad del miembro anterior: ''no cerró... ni ocultó...''. ''Ocultó'' expresa bien el campo de cubrir/esconder del verbo hebreo.'
- source_word: עָמָל
  english_pob_choice: trouble
  chosen_spanish: la angustia[b]
  alternatives_spanish:
  - el sufrimiento
  - la miseria
  - el dolor
  lexicon: HALOT
  rationale: El término abarca trouble, misery, toil o sorrow. En Job, el contexto de aflicción personal hace que 'angustia' sea una opción amplia y natural, sin perder la carga de sufrimiento. La nota a conserva la alternativa semántica más amplia de 'miseria/sufrimiento/trabajo penoso'.
- source_word: מֵעֵינָי
  english_pob_choice: from my eyes
  chosen_spanish: de mis ojos
  alternatives_spanish:
  - ante mis ojos
  - de mi vista
  lexicon: HALOT
  rationale: Una traducción bastante literal preserva el hebraísmo y la imagen de la experiencia que Job no pudo dejar de ver. En español, 'de mis ojos' comunica de forma idiomática la referencia a la percepción y al padecimiento presenciado.
translation_notes:
  revision_awareness: La versión inglesa POB eligió 'womb' para בִטְנִי y 'trouble' para עָמָל, con nota de alternativas léxicas. Esta propuesta mantiene la lectura contextual de nacimiento para בִטְנִי, pero en español prefiere 'vientre' como equivalente natural y evita el tecnicismo de 'útero'. Para עָמָל, en lugar de un genérico como 'problema', se usa 'angustia' para preservar el tono del lamento de Job, respetando la amplitud semántica señalada por el audit trail.
  spanish_consistency_notes:
  - Se evitó 'SEÑOR' o terminología de sustitución porque el versículo no contiene el nombre divino.
  - Se mantuvo una sintaxis coordinada negativa natural en español para reflejar el hebreo sin recargar el verso.
  - El registro es sobrio y bíblico moderno, sin arcaísmos innecesarios.
