translation:
  language: es
  text: 'Los discípulos dijeron a Jesús[a]: «Dinos a qué se parece el reino de los cielos[b]». Él les dijo: «Se parece a una semilla de mostaza[c], la más pequeña de todas las semillas; pero cuando cae sobre tierra trabajada[d], produce una gran rama[f] y llega a ser un refugio[e] para las aves del cielo».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Literalmente: «Dinos como-qué es el reino de los cielos». ⲉⲛⲓⲙ funciona como una interrogación de semejanza («cómo / como qué»).'
    reason: alternative_reading
  - marker: b
    text: El copto lee «cielos» en plural (ⲡⲡⲉ). Se mantiene esa forma en el texto principal por fidelidad al original.
    reason: source_note
  - marker: c
    text: Literalmente, «un grano de mostaza». El copto ⲃⲗⲃⲓⲗⲉ designa un grano o semilla; en el texto principal se usa «semilla» por mayor naturalidad en español.
    reason: lexical_alternative
  - marker: d
    text: La cláusula relativa alude a tierra labrada o preparada para sembrar.
    reason: cultural_note
  - marker: e
    text: ⲥⲕⲉⲡⲏ también puede significar «sombra» o «cobertura».
    reason: lexical_alternative
  - marker: f
    text: La revisión léxica seguida aquí entiende ⲧⲁⲣ como «rama» o «brote», no como «planta».
    reason: lexical_decision
lexical_decisions:
- source_word: ϫⲱⲛⲧⲟⲥ ⲉⲁⲛⲟⲛ
  english_pob_choice: tell us
  chosen_spanish: dinos
  alternatives_spanish:
  - háblanos
  - dinos a nosotros
  lexicon: Layton; Lambdin
  rationale: La forma imperativa con dativo se naturaliza en español como «dinos», conservando la función de pedir una explicación de comparación.
- source_word: ⲡⲙⲛⲧⲣⲣⲟ
  english_pob_choice: kingdom
  chosen_spanish: reino
  alternatives_spanish:
  - reinado
  - dominio
  lexicon: Crum; Layton
  rationale: «Reino» preserva el sentido idiomático de ⲙⲛⲧⲣⲣⲟ como esfera o dominio real, y es el término más inteligible en español eclesial.
- source_word: ⲛⲡⲡⲉ
  english_pob_choice: of the heavens
  chosen_spanish: de los cielos
  alternatives_spanish:
  - del cielo
  - de los cielos
  lexicon: Crum
  rationale: Se mantiene el plural «cielos» porque el copto usa una forma plural y el dicho habla del «reino de los cielos», no una máscara de «Señor» ni una singularización innecesaria.
- source_word: ⲉⲛⲓⲙ
  english_pob_choice: what … is like
  chosen_spanish: a qué se parece
  alternatives_spanish:
  - cómo es
  - de qué manera es
  lexicon: Crum; Layton
  rationale: La pregunta copta es de semejanza; «a qué se parece» transmite con claridad el valor comparativo sin exagerar la forma interrogativa.
- source_word: ⲁⲟⲩⲃⲗⲃⲓⲗⲉ ⲛϣⲗⲧⲁⲙ
  english_pob_choice: a mustard seed
  chosen_spanish: un grano de mostaza
  alternatives_spanish:
  - una semilla de mostaza
  - un grano de mostaza
  lexicon: Crum
  rationale: El copto indica literalmente «grano de mostaza»; en español, «grano» refleja mejor ⲃⲗⲃⲓⲗⲉ que «semilla», y evita forzar una forma más técnica que el original no exige.
- source_word: ⲛⲧⲟⲥ ⲥⲃⲟⲕ ⲡⲁⲣⲁⲡϭⲣⲟϭ ⲧⲏⲣⲛⲧⲟⲟⲩ
  english_pob_choice: the smallest of all seeds
  chosen_spanish: el más pequeño de todas las semillas
  alternatives_spanish:
  - la menor de todas las semillas
  - el más pequeño de todas las semillas
  lexicon: Crum
  rationale: Se preserva el superlativo comparativo con «el más pequeño de todas las semillas», que reproduce la fuerza totalizante de ⲡⲁⲣⲁ + «todas».
- source_word: ⲉⲣϣⲁⲛ ⲛⲧⲟⲥ ϩⲉ
  english_pob_choice: when it falls
  chosen_spanish: cuando cae
  alternatives_spanish:
  - si cae
  - cuando cae
  lexicon: Layton
  rationale: La cláusula temporal se expresa naturalmente con «cuando cae», manteniendo el valor temporal de la construcción copta.
- source_word: ⲉϫⲛ ⲡⲕⲁϩ
  english_pob_choice: upon the earth/soil
  chosen_spanish: sobre tierra
  alternatives_spanish:
  - sobre el suelo
  - sobre la tierra
  lexicon: Crum
  rationale: «Tierra» funciona en español agrícola y conserva la imagen concreta del terreno receptor.
- source_word: ⲉⲧⲉⲣⲉ ⲛⲧⲟⲟⲩ ⲣϩⲱⲃ ⲉⲛⲧⲟϥ
  english_pob_choice: worked soil
  chosen_spanish: trabajada
  alternatives_spanish:
  - arada
  - labrada
  - trabajada
  lexicon: Crum (rḥōb)
  rationale: El participio relativo se condensa en «trabajada», que suena natural en español y conserva el matiz agrícola de tierra preparada para sembrar.
- source_word: ϣⲁⲣⲉⲛⲧⲟϥ ⲧⲉⲩⲟ ⲉⲃⲟⲗ
  english_pob_choice: it produces a plant
  chosen_spanish: produce
  alternatives_spanish:
  - da
  - produce
  - saca
  lexicon: Crum; Layton
  rationale: El verbo copto de causar/sacar al exterior se traduce con «produce», que en español permite un sujeto vegetal que despliega su crecimiento.
- source_word: ⲛⲟⲩⲛⲟϭ
  english_pob_choice: a great
  chosen_spanish: una gran
  alternatives_spanish:
  - una grande
  - una gran
  lexicon: Crum
  rationale: «Gran» mantiene el tono elevado y evita una literalidad menos idiomática.
- source_word: ⲛⲧⲁⲣ
  english_pob_choice: a great branch
  chosen_spanish: rama
  alternatives_spanish:
  - rama
  - brote
  - renuevo
  lexicon: Crum; Coptic Scriptorium audit trail
  rationale: 'Se adopta la revisión documentada del audio-trabajo: ⲧⲁⲣ significa «rama/brote/ramita», no «planta». «Rama» es la opción española más clara y fiel al símbolo de refugio para las aves.'
- source_word: ⲥⲕⲉⲡⲏ
  english_pob_choice: a shelter
  chosen_spanish: un refugio
  alternatives_spanish:
  - una sombra
  - un cobijo
  - un refugio
  lexicon: Crum (skepē; Gk σκέπη)
  rationale: «Refugio» expresa la función de cobertura/protección del término griego prestado; en español es más natural que «shelter» literal.
- source_word: ⲛϩⲁⲗⲏⲧ
  english_pob_choice: birds
  chosen_spanish: aves
  alternatives_spanish:
  - aves
  - pájaros
  - aves
  lexicon: Crum
  rationale: «Aves» conserva dignidad estilística y evita la reducción coloquial de «pájaros».
- source_word: ⲛⲡⲡⲉ
  english_pob_choice: of the sky
  chosen_spanish: del cielo
  alternatives_spanish:
  - del cielo
  - de los cielos
  lexicon: Crum
  rationale: Aquí «cielo» singular en español transmite la imagen concreta y evita una repetición innecesaria de «cielos» en la misma frase.
translation_notes:
  revision_awareness: Se siguió la revisión más reciente del expediente que corrige el sentido de ⲧⲁⲣ de «planta» a «rama». También se conservó la distinción entre «cielos» en la pregunta y «cielo» en la imagen final para evitar una repetición poco natural en español, sin perder el valor del original.
  spanish_consistency_notes:
  - Se mantuvo «Jesús» como nombre propio y «reino de los cielos» como fórmula estable del dicho.
  - Se prefirió «grano de mostaza» y no «semilla de mostaza» para reflejar mejor el sustantivo copto.
  - No se introdujeron términos eclesiásticos ajenos al original; el lenguaje permanece descriptivo y de imagen agrícola.
  - Las notas distinguen entre alternativa léxica, variante textual y observación cultural para conservar la trazabilidad auditiva.
