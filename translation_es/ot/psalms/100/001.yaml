translation:
  language: es
  text: Salmo para acción de gracias[a]. ¡Aclamen con júbilo a Yahvé[b][c], toda la tierra!
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «para acción de gracias». El encabezamiento también puede entenderse como «para una ofrenda de acción de gracias» o «salmo de acción de gracias».'
    reason: lexical_alternative
  - marker: b
    text: Se conserva «Yahvé» para el nombre divino יהוה, conforme al criterio del proyecto para el Tetragrámaton.
    reason: theological_note
  - marker: c
    text: 'También puede traducirse: «¡Den gritos de júbilo a Yahvé!»'
    reason: lexical_alternative
lexical_decisions:
- source_word: מִזְמוֹר
  english_pob_choice: A psalm
  chosen_spanish: Salmo
  alternatives_spanish:
  - Cántico
  - Poema
  lexicon: HALOT
  rationale: En un encabezamiento poético, מִזְמוֹר nombra un género de salmo/canto. «Salmo» es el equivalente natural y ya convencional en español bíblico, sin añadir contenido ajeno al hebreo.
- source_word: לְתוֹדָה
  english_pob_choice: for thanksgiving
  chosen_spanish: de acción de gracias
  alternatives_spanish:
  - para acción de gracias
  - de agradecimiento
  - para un sacrificio de acción de gracias
  lexicon: HALOT
  rationale: תוֹדָה puede referirse a gratitud, alabanza o a una ofrenda de agradecimiento. En un título de salmo, «de acción de gracias» conserva el valor de gratitud sin precisar indebidamente un contexto sacrificial que el hebreo no obliga aquí.
- source_word: הָרִיעוּ
  english_pob_choice: Shout joyfully
  chosen_spanish: ¡Aclamen con júbilo!
  alternatives_spanish:
  - ¡Alcen una voz de júbilo!
  - ¡Hagan un grito de júbilo!
  - ¡Den un grito alegre!
  lexicon: HALOT
  rationale: El imperativo hifil de רוע exige una proclamación sonora y celebrativa. «Aclamen con júbilo» comunica bien la fuerza vocal y el tono festivo, de manera más natural que un calco como «hagan un ruido alegre».
- source_word: לַיהוָה
  english_pob_choice: to Yahweh
  chosen_spanish: a Yahvé
  alternatives_spanish:
  - a Yahveh
  - al SEÑOR
  lexicon: HALOT
  rationale: 'Se sigue la terminología proyectual establecida para יהוה: «Yahvé». La preposición ל indica dirección del clamor: el júbilo se dirige a Yahvé, no solo se pronuncia en su presencia.'
- source_word: כָּל הָאָרֶץ
  english_pob_choice: all the earth
  chosen_spanish: toda la tierra
  alternatives_spanish:
  - toda la tierra habitada
  - todo el mundo
  - toda la tierra
  lexicon: HALOT
  rationale: אָרֶץ puede significar tierra/país o tierra en sentido amplio. En esta convocatoria universal, «toda la tierra» refleja mejor el alcance global del llamado que «todo el mundo», sin restringirlo a un territorio concreto.
theological_decisions:
- issue: Traducción del nombre divino יהוה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - Jehová
  rationale: El texto fuente usa explícitamente el Tetragrámaton. Según el marco del proyecto, se debe preservar el nombre divino en forma audible; «Yahvé» mantiene esa referencia covenantal y evita la convención de ocultamiento por mayúsculas.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Sentido de לְתוֹדָה en el encabezamiento
  english_pob_reading: for thanksgiving
  chosen_spanish_reading: de acción de gracias
  alternative_spanish_readings:
  - para acción de gracias
  - de una ofrenda de gratitud
  - de alabanza
  rationale: El hebreo permite tanto gratitud verbal como ofrenda agradecida. En español, «de acción de gracias» es una fórmula clara y fiel al género del título, sin introducir de forma obligatoria una lectura cultual específica.
  doctrine_reference: HALOT, lema תוֹדָה; suprescripción poética
- issue: Alcance universal de כָּל הָאָרֶץ
  english_pob_reading: all the earth
  chosen_spanish_reading: toda la tierra
  alternative_spanish_readings:
  - la tierra entera
  - todo el mundo
  rationale: La expresión hebrea convoca universalmente a toda la creación humana, y «toda la tierra» conserva el universalismo del llamado con un eco bíblico natural en español.
  doctrine_reference: Uso poético de אָרֶץ en salmos
translation_notes:
  revision_awareness: El audit trail inglés muestra oscilación entre «for thanksgiving» y «of thanksgiving» en el encabezamiento, así como entre «Yahweh» y la convención antigua de «the LORD». La presente versión sigue la decisión proyectual vigente de usar el nombre divino audible en español («Yahvé») y mantiene para לְתוֹדָה una formulación idiomática que no fuerza el matiz sacrificial. También se preserva el carácter vocativo y universal del segundo hemistiquio.
  spanish_consistency_notes:
  - Se usa «Yahvé» para יהוה de forma consistente, evitando la convención de «SEÑOR».
  - «Salmo» se reserva para el género del encabezamiento; no se amplía a una paráfrasis más libre.
  - «Acción de gracias» mantiene la ambigüedad productiva de תוֹדָה sin cerrar el sentido a una ofrenda concreta.
  - «Toda la tierra» conserva el alcance universal del llamado poético.
