    rationale: Aunque el perfecto hebreo puede resumir experiencia pasada, en este contexto de recapitulación histórica el pretérito simple español («no comieron… ni bebieron») comunica mejor el sentido y suena más natural para una audiencia hispanohablante amplia.
  - severity: medium
    issue: La nota [a] está anclada a «pan» pero explica שֵׁכָר / «bebida fuerte»
    rationale: El marcador debe aparecer en la palabra o frase pertinente. Tal como está, crea confusión exegética y editorial, porque la nota no trata de «pan» sino de la bebida intoxicante.
  revised_spanish_text: No comieron pan ni bebieron vino ni bebida fuerte[a], para que sepan que yo soy Yahvé su Dios.
