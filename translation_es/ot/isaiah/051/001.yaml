translation:
  language: es
  text: 'Escúchenme[a], ustedes que persiguen la rectitud, ustedes que buscan a Yahvé: miren a la roca de la cual fueron cortados[c][b], y a la cantera de donde fueron excavados.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «justicia» para «rectitud».
    reason: lexical_alternative
  - marker: b
    text: El versículo 2 identifica esta imagen con Abraham y Sara.
    reason: cross_reference
  - marker: c
    text: O «de la cual fueron labrados».
    reason: lexical_alternative
lexical_decisions:
- source_word: שִׁמְעוּ
  english_pob_choice: Listen
  chosen_spanish: Escúchenme
  alternatives_spanish:
  - Oiganme
  - Atiéndanme
  lexicon: HALOT
  rationale: El imperativo plural pide atención directa. «Escúchenme» suena natural en español y conserva el llamado a escuchar con cuidado mejor que una forma más arcaica.
- source_word: אֵלַי
  english_pob_choice: to me
  chosen_spanish: me
  alternatives_spanish:
  - a mí
  lexicon: HALOT
  rationale: El sufijo de primera persona singular se expresa de manera directa con el clítico «me» unido al verbo en español.
- source_word: רֹדְפֵי צֶדֶק
  english_pob_choice: you who pursue righteousness
  chosen_spanish: ustedes que persiguen la justicia
  alternatives_spanish:
  - ustedes que persiguen la rectitud
  - perseguidores de la justicia
  lexicon: HALOT
  rationale: La forma participial caracteriza al grupo por su búsqueda activa. «Justicia» conserva el campo semántico de צֶדֶק y, en español, resulta natural en esta construcción; «rectitud» también es posible, pero aquí «justicia» comunica bien el ideal moral y covenantal.
- source_word: מְבַקְשֵׁי יְהוָה
  english_pob_choice: you who seek Yahweh
  chosen_spanish: ustedes que buscan a Yahvé
  alternatives_spanish:
  - buscadores de Yahvé
  - ustedes que buscan a Jehová
  lexicon: HALOT
  rationale: La frase participial expresa una identidad marcada por la búsqueda de Dios. Se mantiene «Yahvé» según la política del proyecto para el Tetragrámaton, en vez de sustituirlo por un título.
- source_word: הַבִּיטוּ
  english_pob_choice: look
  chosen_spanish: miren
  alternatives_spanish:
  - miren con atención
  - fíjense
  lexicon: HALOT
  rationale: «Miren» es una orden clara y idiomática. Conserva la invitación a dirigir la atención hacia la imagen sin cargarla con una interpretación añadida.
- source_word: צ֣וּר
  english_pob_choice: the rock
  chosen_spanish: la peña
  alternatives_spanish:
  - la roca
  - el peñasco
  lexicon: HALOT
  rationale: Aunque «roca» es posible, «peña» preserva el valor concreto e imagético del sustantivo y funciona bien en el paralelismo con la excavación.
- source_word: חֻצַּבְתֶּם
  english_pob_choice: from which you were cut
  chosen_spanish: de la cual fueron cortados
  alternatives_spanish:
  - de la cual fueron labrados
  - de la cual fueron hewn
  lexicon: HALOT
  rationale: Se conserva el pasivo de cortar/extraer en lenguaje natural. «Cortados» refleja el acto de separación desde la peña sin forzar un tecnicismo.
- source_word: מַקֶּבֶת בּוֹר
  english_pob_choice: the quarry from which you were dug
  chosen_spanish: al cantero de donde fueron excavados
  alternatives_spanish:
  - a la cantera de donde fueron excavados
  - al lugar de excavación de donde fueron sacados
  lexicon: HALOT
  rationale: El hebreo presenta una imagen de excavación relacionada con cantera y hoyo/pit. «Cantero» permite conservar la idea de un lugar o agente de talla/excavación, pero en español resulta algo menos directo; por eso se opta por «excavados» para el verbo, manteniendo la metáfora de origen material.
- source_word: נֻקַּרְתֶּם
  english_pob_choice: from which you were dug
  chosen_spanish: fueron excavados
  alternatives_spanish:
  - fueron sacados
  - fueron labrados
  lexicon: HALOT
  rationale: El pasivo expresa la extracción desde la cantera o excavación. «Excavados» conserva la imagen concreta y evita aplanar la metáfora.
theological_decisions:
- issue: Cómo traducir יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: Se sigue la decisión del proyecto de representar el Nombre divino con «Yahvé», manteniendo la transparencia del texto y evitando la sustitución por un título.
  doctrine_reference: Política terminológica del proyecto para יהוה / YHWH
- issue: Cómo rendir צֶדֶק en este contexto exhortativo
  english_pob_reading: righteousness
  chosen_spanish_reading: justicia
  alternative_spanish_readings:
  - rectitud
  - justicia/rrectitud
  rationale: Aunque צֶדֶק puede abarcar «rectitud» y «justicia», aquí la exhortación a perseguir lo correcto delante de Dios queda bien expresada con «justicia», sin perder el peso moral y relacional del término.
  doctrine_reference: Entrada léxica contextual de צֶדֶק
- issue: Si identificar o no la peña/cantera con Abraham y Sara en el versículo mismo
  english_pob_reading: Preserve the metaphor without interpretation in the main text
  chosen_spanish_reading: Preservar la metáfora sin interpretarla en el texto principal
  alternative_spanish_readings:
  - Nombrar explícitamente a Abraham y Sara en el versículo
  - Añadir la explicación dentro del texto
  rationale: La identificación explícita pertenece al versículo siguiente. Mantener la imagen aquí respeta la progresión argumental y evita adelantar una explicación que el hebreo de este versículo no formula.
  doctrine_reference: Diseño exegético del pasaje Isaías 51:1-2
translation_notes:
  revision_awareness: Se siguió la última revisión inglesa que eliminó «of the pit» por no estar representado en el hebreo. En español se evitó añadir un equivalente extra y se mantuvo solo la doble imagen de peña/cantera-excavación. También se conservó la decisión auditada de no interpretar la metáfora en el texto principal.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como forma estándar del Nombre divino en el proyecto.
  - «Justicia» se usa para צֶדֶק en concordancia con el contexto exhortativo; no se fuerza «rectitud» aunque sea una alternativa válida.
  - La imagen se conserva como metáfora de origen material, sin aclaración intratextual sobre Abraham y Sara.
  - 'La puntuación y el paralelismo reflejan dos llamados coordinados: escuchar/mirar.'
