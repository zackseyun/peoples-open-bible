translation:
  language: es
  text: Y al oírlo los diez, comenzaron a indignarse[a] contra Jacobo y Juan.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «sobre Jacobo y Juan» / «por Jacobo y Juan» / «a causa de Jacobo y Juan». La preposición griega puede señalar el objeto o la ocasión de la indignación.
    reason: lexical_alternative
lexical_decisions:
- source_word: Καὶ
  english_pob_choice: And
  chosen_spanish: Y
  alternatives_spanish:
  - Entonces
  - Pero
  lexicon: BDAG
  rationale: La conjunción mantiene la simple continuidad narrativa del griego sin añadir matiz temporal o adversativo no presente en el texto.
- source_word: ἀκούσαντες
  english_pob_choice: when ... heard it
  chosen_spanish: al oírlo
  alternatives_spanish:
  - cuando lo oyeron
  - después de oírlo
  lexicon: BDAG
  rationale: El participio aoristo expresa una acción anterior a la principal; en español, 'al oírlo' conserva esa relación temporal de forma natural y breve. El objeto implícito se recupera del contexto.
- source_word: οἱ δέκα
  english_pob_choice: the ten
  chosen_spanish: los diez
  alternatives_spanish:
  - los otros diez
  - los diez discípulos
  lexicon: BDAG
  rationale: Se preserva la referencia literal 'los diez' sin explicitar más de lo que dice el griego, aunque el contexto permite entender que se trata de los otros discípulos.
- source_word: ἤρξαντο
  english_pob_choice: began
  chosen_spanish: comenzaron
  alternatives_spanish:
  - empezaron
  lexicon: BDAG
  rationale: '''Comenzaron'' reproduce el valor ingresivo de ἄρχομαι con infinitivo, marcando el inicio de la reacción.'
- source_word: ἀγανακτεῖν
  english_pob_choice: to be indignant
  chosen_spanish: a indignarse
  alternatives_spanish:
  - a enojarse
  - a resentirse
  - a molestarse
  lexicon: BDAG
  rationale: '''Indignarse'' conserva mejor la carga de fuerte desagrado moral que ''enojarse'' o ''molestarse''. La construcción con infinitivo en español requiere ''a'' para fluidez idiomática.'
- source_word: περὶ Ἰακώβου καὶ Ἰωάννου
  english_pob_choice: with James and John
  chosen_spanish: contra Jacobo y Juan
  alternatives_spanish:
  - por Jacobo y Juan
  - sobre Jacobo y Juan
  - a causa de Jacobo y Juan
  lexicon: BDAG
  rationale: La preposición περί puede señalar el objeto u ocasión de la indignación. Dado el contexto narrativo, 'contra' hace explícita la dirección del desagrado sin implicar necesariamente un conflicto físico; 'por' o 'a causa de' serían posibles, pero menos directos en español para esta reacción interpersonal.
- source_word: Ἰακώβου
  english_pob_choice: James
  chosen_spanish: Jacobo
  alternatives_spanish:
  - Santiago
  lexicon: Onomasticon / POB name policy
  rationale: Se sigue la convención del POB en español de usar 'Jacobo' para Ἰάκωβος, manteniendo uniformidad nominal con el registro del proyecto.
- source_word: Ἰωάννου
  english_pob_choice: John
  chosen_spanish: Juan
  lexicon: Onomasticon / POB name policy
  rationale: Nombre propio estándar en español para Ἰωάννης.
theological_decisions:
- issue: Valor de περί con una emoción dirigida
  english_pob_reading: with James and John
  chosen_spanish_reading: contra Jacobo y Juan
  alternative_spanish_readings:
  - por Jacobo y Juan
  - a causa de Jacobo y Juan
  rationale: No hay doctrina en juego directa, pero sí una decisión semántica con efecto interpretativo. 'Contra' refleja que la indignación de los diez se dirige hacia estos dos discípulos; 'por/a causa de' mantiene más abierta la relación causal u objetiva del sentimiento. Se opta por la lectura más clara en español sin negar la ambigüedad posible del griego.
  doctrine_reference: Semántica del texto; no doctrinal
- issue: Identificación nominal de Ἰακώβος
  english_pob_reading: James
  chosen_spanish_reading: Jacobo
  alternative_spanish_readings:
  - Santiago
  rationale: La elección no altera la enseñanza del pasaje, pero sí la coherencia terminológica del proyecto. Se conserva 'Jacobo' como forma estable para Ἰάκωβος en este corpus español.
  doctrine_reference: Convención onomástica del POB
translation_notes:
  revision_awareness: El texto griego y el audit trail inglés muestran alta concordancia y no registran revisiones sustantivas; esta versión española sigue esa lectura estable, ajustando solo la preposición griega περί a una solución idiomática en español.
  spanish_consistency_notes:
  - Se mantiene la convención del POB de 'Jacobo' para Ἰάκωβος.
  - Se conserva la referencia literal 'los diez' sin añadir explicaciones que el griego no expresa explícitamente.
  - '''Indignarse'' recoge mejor el matiz de ἀγανακτεῖν que simples opciones como ''enojarse''.'
  - La puntuación y el orden de la oración buscan fluidez natural en español sin desplazar el contenido del original.
