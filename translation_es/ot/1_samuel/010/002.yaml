translation:
  language: es
  text: 'Cuando te vayas de mi lado hoy, encontrarás a dos hombres junto a la tumba de Raquel, en el territorio[a] de Benjamín, en Zelzah; y ellos te dirán: «Las asnas que fuiste a buscar han sido halladas, y mira, tu padre ha dejado de ocuparse del asunto de las asnas y está inquieto por ustedes[b], diciendo: “¿Qué haré con respecto a mi hijo?”»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «en la frontera de Benjamín». El hebreo puede significar «territorio» o «frontera/límite».
    reason: lexical_alternative
  - marker: b
    text: 'El hebreo está en plural, probablemente refiriéndose a Saúl y al criado que lo acompaña: «por ustedes dos».'
    reason: lexical_alternative
lexical_decisions:
- source_word: בְּלֶכְתְּךָ הַיּוֹם מֵעִמָּדִי
  english_pob_choice: When you leave me today
  chosen_spanish: Cuando te apartes de mí hoy
  alternatives_spanish:
  - Cuando salgas de mi presencia hoy
  - Cuando te vayas de mí hoy
  lexicon: HALOT
  rationale: La construcción con ב + infinitivo expresa temporalidad; en español, «cuando te apartes de mí» comunica bien el movimiento de separación personal sin sonar mecánico. Mantiene la idea de alejamiento desde la presencia de Samuel.
- source_word: וּמָצָאתָ
  english_pob_choice: you will find
  chosen_spanish: encontrarás
  alternatives_spanish:
  - y encontrarás
  - hallarás
  lexicon: HALOT
  rationale: El perfecto narrativo en contexto profético se vierte naturalmente con futuro en español. «Encontrarás» es claro y conserva el valor predictivo.
- source_word: שְׁנֵי אֲנָשִׁים
  english_pob_choice: two men
  chosen_spanish: a dos hombres
  alternatives_spanish:
  - dos hombres
  - dos varones
  lexicon: HALOT
  rationale: Número + sustantivo común sin carga técnica especial; «hombres» es la equivalencia natural y precisa.
- source_word: עִם קְבֻרַת רָחֵל
  english_pob_choice: near Rachel’s tomb
  chosen_spanish: junto a la tumba de Raquel
  alternatives_spanish:
  - cerca de la tumba de Raquel
  - junto al sepulcro de Raquel
  lexicon: HALOT
  rationale: עִם en este contexto es locativo y admite «junto a/cerca de». «Tumba» es idiomático y fiel al sitio memorial nombrado.
- source_word: בִּגְבוּל בִּנְיָמִן
  english_pob_choice: in the territory of Benjamin
  chosen_spanish: en el territorio de Benjamín
  alternatives_spanish:
  - en el límite de Benjamín
  - en la frontera de Benjamín
  lexicon: HALOT
  rationale: גְּבוּל puede ser «frontera/límite» o «territorio». Aquí la lectura geográfica más fluida en español es «territorio», sin negar la posible connotación fronteriza.
- source_word: בְּצֶלְצַח
  english_pob_choice: at Zelzah
  chosen_spanish: en Zelzaj
  alternatives_spanish:
  - en Zelzah
  - junto a Zelzaj
  lexicon: HALOT
  rationale: Es un topónimo; se translitera. «Zelzaj» adapta de forma sobria la forma al español y mantiene la referencia geográfica.
- source_word: וְאָמְרוּ אֵלֶיךָ
  english_pob_choice: and they will say to you
  chosen_spanish: y ellos te dirán
  alternatives_spanish:
  - y te dirán
  - y te hablarán
  lexicon: HALOT
  rationale: Introducción directa de discurso; «te dirán» preserva la sencillez y la estructura del hebreo.
- source_word: נִמְצְאוּ הָאֲתֹנוֹת אֲשֶׁר הָלַכְתָּ לְבַקֵּשׁ
  english_pob_choice: The donkeys that you went to look for have been found
  chosen_spanish: Las asnas que fuiste a buscar han sido halladas
  alternatives_spanish:
  - Las asnas que buscabas han sido encontradas
  - Las burras que fuiste a buscar han sido halladas
  lexicon: HALOT
  rationale: אֲתֹנוֹת son hembras de asno; «asnas» conserva el rasgo léxico que el inglés generalizó a «donkeys». «Han sido halladas» reproduce bien el pasivo resultativo.
- source_word: וְהִנֵּה
  english_pob_choice: and look
  chosen_spanish: y mira
  alternatives_spanish:
  - y he aquí
  - y mira bien
  lexicon: HALOT
  rationale: Funciona como deíctico discursivo que introduce una nueva información sorprendente. «Y mira» es natural, vivo y no arcaizante.
- source_word: נָטַשׁ אָבִיךָ אֶת דִּבְרֵי הָאֲתֹנוֹת
  english_pob_choice: your father has stopped caring about the donkeys
  chosen_spanish: tu padre ha dejado de preocuparse por las asnas
  alternatives_spanish:
  - tu padre ha dejado el asunto de las asnas
  - tu padre ha abandonado la preocupación por las asnas
  lexicon: HALOT
  rationale: דִּבְרֵי puede significar «asunto/materia», no solo «palabras». En contexto, la idea es que Saúl deja de lado la preocupación por las asnas; «ha dejado de preocuparse» transmite el sentido sin forzar literalidad.
- source_word: וְדָאַג לָכֶם
  english_pob_choice: and is anxious about you
  chosen_spanish: y está inquieto por ustedes
  alternatives_spanish:
  - y se preocupa por ustedes
  - y siente ansiedad por ustedes
  lexicon: HALOT
  rationale: דאג expresa inquietud/ansiedad por alguien. El sufijo plural se conserva explícitamente con «ustedes», porque el hebreo se dirige a Saúl y a su siervo.
- source_word: לֵאמֹר מָה אֶעֱשֶׂה לִבְנִי
  english_pob_choice: saying, “What shall I do about my son?”
  chosen_spanish: 'diciendo: “¿Qué haré por mi hijo?”'
  alternatives_spanish:
  - 'diciendo: “¿Qué haré por mi hijo?”'
  - 'diciendo: “¿Qué debo hacer por mi hijo?”'
  lexicon: HALOT
  rationale: La frase expresa la angustia paternal. «¿Qué haré por mi hijo?» mantiene el valor de acción/solicitud implícita y evita endurecer el matiz de preocupación afectiva.
theological_decisions:
- issue: Tratamiento del nombre divino y del lenguaje de pacto
  english_pob_reading: No direct divine-name masking issue in this verse
  chosen_spanish_reading: Sin marca de reemplazo; no aplica en este versículo
  alternative_spanish_readings:
  - usar SEÑOR por convención
  - introducir Yahvé por consistencia general
  rationale: Este versículo no contiene יהוה ni un claro eco inmediato que obligue a una decisión de nombre divino. Por tanto, no se introduce ninguna equivalencia teológica adicional.
  doctrine_reference: N/A
translation_notes:
  revision_awareness: 'Se tuvo en cuenta la revisión inglesa más reciente: «has stopped caring about the donkeys». En español se reflejó como «ha dejado de preocuparse por las asnas», una formulación cercana al sentido de cesar la preocupación por ellas, manteniendo el rasgo léxico de la especie animal femenina que el hebreo especifica.'
  spanish_consistency_notes:
  - Se conservó el tratamiento plural en la cláusula de preocupación («ustedes») para reflejar לָכֶם.
  - Se mantuvo «asnas» para preservar la especificidad de אֲתֹנוֹת, aun cuando el inglés generalizó a «donkeys».
  - El topónimo se transliteró como «Zelzaj» para un registro español sobrio y consistente.
