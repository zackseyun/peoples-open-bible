review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español transmite bien el sentido general del hebreo: causalidad inicial, pertenencia de Israel a Yahvé, referencia al éxodo y prohibición de una venta propia de esclavo. Sin embargo, la nota [b] está mal anclada: el marcador aparece en ''Egipto'' aunque la explicación corresponde a la cláusula final מִמְכֶּרֶת עָבֶד, no a ''de la tierra de Egipto''. Además, la redacción final puede alinearse mejor con el inglés POB auditado (''como se vende a los esclavos'' / ''como se venden los esclavos'') que con el singular comparativo.'
  spanish_quality_summary: 'El español es claro, digno y legible. ''Porque ellos son mis esclavos'' suena natural y conserva el énfasis. ''A quienes saqué de la tierra de Egipto'' funciona bien. La principal reparación es de presentación y precisión exegética: reubicar la nota [b] al segmento final y ajustar levemente la cláusula comparativa para reflejar mejor una venta esclavista ordinaria sin sugerir un individuo concreto.'
  glossary_alignment: 'Buena alineación con la terminología del proyecto: עֲבָדַי = ''mis esclavos'' está correctamente preservado conforme a la política de bonded-status; no hay conflicto con Yahvé en este versículo porque el nombre divino no aparece. La alternativa ''mis siervos'' se conserva apropiadamente en nota. El tratamiento de la cláusula legal final también sigue razonablemente el rastro POB, pero conviene mejorar el anclaje de la nota y la formulación comparativa.'
  issues:
  - severity: medium
    issue: La nota [b] está anclada en 'Egipto' pero explica la cláusula final.
    rationale: En el inglés POB, la nota b explica 'they shall not be sold as slaves are sold' / literalmente 'with the sale of a slave'. En español, colocar [b] después de 'Egipto' induce a pensar que comenta 'de la tierra de Egipto', lo cual es incorrecto.
  - severity: low
    issue: La nota [b] mezcla una glosa literal de la frase anterior con la explicación de la cláusula final.
    rationale: El texto de la nota empieza con 'Lit. de la tierra de Egipto', pero el motivo documentado de la nota en el POB audit trail es la alternativa literal para מִמְכֶּרֶת עָבֶד. Conviene que la nota trate solo esa expresión para evitar confusión.
  - severity: low
    issue: La cláusula final puede expresarse de manera más natural y más cercana al audit trail inglés.
    rationale: '''Como se vende a un esclavo'' es comprensible, pero ''como se venden los esclavos'' o ''como se vende a los esclavos'' refleja mejor la idea de transacción esclavista ordinaria y la redacción inglesa auditada ''as slaves are sold''.'
  revised_spanish_text: Porque ellos son mis esclavos[a], a quienes saqué de la tierra de Egipto; no serán vendidos como se venden los esclavos[b].
  revised_footnotes:
