translation:
  language: es
  text: Porque hay una vergüenza que lleva iniquidad[a], y hay una vergüenza que es gloria y favor[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: ‘que conduce al pecado’, siguiendo más de cerca el griego ἐπάγουσα ἁμαρτίαν. La frase hebrea es condensada y también puede entenderse como ‘lleva iniquidad’.'
    reason: alternative_reading
  - marker: b
    text: 'O: ‘gloria y gracia’; también, ‘honor y favor’.'
    reason: lexical_alternative
lexical_decisions:
- source_word: בֹּשֶׁת / αἰσχύνη
  english_pob_choice: shame
  chosen_spanish: vergüenza
  alternatives_spanish:
  - deshonra
  - afrenta
  lexicon: HALOT; LXX αἰσχύνη
  rationale: ‘Vergüenza’ conserva el peso moral y social del término en español y corresponde de manera natural a αἰσχύνη. ‘Deshonra’ es posible, pero desplaza el foco hacia pérdida de honor; ‘afrenta’ suena más marcado o arcaizante.
- source_word: מַשְׂאֵת עָוֹן / ἐπάγουσα ἁμαρτίαν
  english_pob_choice: bears iniquity
  chosen_spanish: lleva iniquidad
  alternatives_spanish:
  - porta iniquidad
  - lleva culpa
  - conduce al pecado
  lexicon: HALOT; Greek parallel
  rationale: La elección ‘lleva iniquidad’ refleja el hebreo comprimido מַשְׂאֵת עָוֹן y mantiene la imagen de cargar o llevar. ‘Lleva culpa’ interpreta el efecto resultante, pero pierde la conexión verbal con ‘llevar’. ‘Conduce al pecado’ sigue más de cerca la versión griega, aunque atenúa la ambigüedad hebrea.
- source_word: עָוֹן
  english_pob_choice: iniquity
  chosen_spanish: iniquidad
  alternatives_spanish:
  - culpa
  - pecado
  - maldad
  lexicon: HALOT
  rationale: ‘Iniquidad’ preserva el paralelismo con el hebreo y la fuerza moral del término sin reducirlo simplemente a ‘pecado’. ‘Culpa’ explicita la consecuencia, pero interpreta más que el original. ‘Pecado’ sigue la línea griega, aunque no reproduce tan bien עָוֹן.
- source_word: כָּבוֹד
  english_pob_choice: glory
  chosen_spanish: gloria
  alternatives_spanish:
  - honor
  lexicon: HALOT; LXX δόξα
  rationale: ‘Gloria’ mantiene el registro elevado y corresponde a δόξα. ‘Honor’ es válido y más idiomático en algunos contextos, pero aquí la pareja con ‘gracia’ favorece la resonancia más solemne de ‘gloria’.
- source_word: חֵן
  english_pob_choice: favor
  chosen_spanish: gracia
  alternatives_spanish:
  - favor
  - benevolencia
  - aceptación
  lexicon: HALOT; LXX χάρις
  rationale: Aunque la base hebrea admite ‘favor’, se opta por ‘gracia’ porque la tradición del texto paralelo griego usa χάρις y el español puede conservar bien esa amplitud semántica. ‘Favor’ sería una alternativa más neutral; ‘aceptación’ estrecha demasiado el sentido.
theological_decisions:
- issue: 'Sentido de la primera cola difícil: relación entre ‘lleva iniquidad’ y el paralelo griego ‘que trae pecado’'
  english_pob_reading: One kind of shame results in guilt/blameworthiness, preserving the Hebrew witness while using the Greek as a consistency check.
  chosen_spanish_reading: Una vergüenza lleva iniquidad, manteniendo la imagen hebrea y dejando abierta la relación causal que el griego explicita como llevar al pecado.
  alternative_spanish_readings:
  - Una vergüenza conduce al pecado
  - Una vergüenza carga con iniquidad
  - Hay una vergüenza que trae culpa
  rationale: 'El hebreo es breve y algo comprimido; el griego aclara un matiz causal. La formulación española conserva la tensión: no simplifica todo a ‘pecado’, pero sí deja claro que se trata de una vergüenza moralmente dañina o culpable. Así se respeta tanto el testimonio hebreo como el paralelo griego.'
  doctrine_reference: 'PHILOSOPHY.md: traducir desde el hebreo donde se conserva, usando el paralelo griego como control real'
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión más reciente del inglés POB, que prefirió ‘bears iniquity’ frente a ‘brings guilt’ para acercarse más a מַשְׂאֵת עָוֹן. Por eso la versión española mantiene la imagen de ‘llevar’ y no la sustituye por una interpretación causal más explícita. También se conservó la pareja elevada ‘gloria y gracia’, siguiendo el último estado del texto inglés y el paralelismo hebreo/griego.
  spanish_consistency_notes:
  - Se usa ‘vergüenza’ para בֹּשֶׁת / αἰσχύνη, en línea con el valor moral del término.
  - Se prefirió ‘iniquidad’ para עָוֹן y no ‘culpa’, para no borrar la ambigüedad del hebreo.
  - ‘Gracia’ se conserva por correspondencia con χάρις, aunque ‘favor’ siga siendo una alternativa válida.
  - La estructura paralela ‘hay ... y hay ...’ mantiene la simetría del original.
  - Los marcadores [a] y [b] aparecen solo donde corresponden a notas alternativas reales.
