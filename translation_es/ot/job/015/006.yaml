translation:
  language: es
  text: Tu propia boca te condena[a], y no yo; tus propios labios dan testimonio contra ti.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'También puede traducirse: «Tus propios labios responden contra ti». El verbo hebreo puede significar «responder», pero aquí probablemente tiene el matiz forense de «dar testimonio».'
    reason: lexical_alternative
lexical_decisions:
- source_word: יַרְשִֽׁיעֲךָ
  english_pob_choice: condemns you
  chosen_spanish: te condena
  alternatives_spanish:
  - te declara culpable
  - te declara impío
  - te acusa
  lexicon: HALOT
  rationale: El hifil de רשע expresa declarar culpable o condenar. En español, «te condena» conserva el sentido forense y suena natural. No se usó una paráfrasis más fuerte como «te declara impío», porque añadiría una valoración que el hebreo no exige aquí.
- source_word: פִיךָ
  english_pob_choice: your own mouth
  chosen_spanish: Tu propia boca
  alternatives_spanish:
  - tu boca
  - tu mismo hablar
  lexicon: HALOT
  rationale: El hebreo dice literalmente «tu boca». Se añadió «propia» para conservar el énfasis reflexivo que el inglés POB expresa con «your own». «Boca» es el equivalente más directo y natural en español.
- source_word: וְלֹא אָנִי
  english_pob_choice: and not I
  chosen_spanish: y no yo
  alternatives_spanish:
  - y no soy yo
  - y no es a mí
  lexicon: HALOT
  rationale: Se mantiene la contraposición breve y enfática del hebreo. «Y no yo» reproduce mejor la dureza del paralelismo que una forma más explicativa.
- source_word: וּשְׂפָתֶיךָ
  english_pob_choice: your own lips
  chosen_spanish: tus propios labios
  alternatives_spanish:
  - tus labios
  - tus mismas palabras
  lexicon: HALOT
  rationale: «Labios» conserva el paralelismo con «boca» y mantiene la imagen concreta del hebreo. «Propios» reproduce el énfasis de autoacusación que el POB marca con «own».
- source_word: יַעֲנוּ
  english_pob_choice: testify
  chosen_spanish: testifican
  alternatives_spanish:
  - responden
  - dan testimonio
  lexicon: HALOT
  rationale: Aunque el verbo puede significar «responder», aquí el contexto forense favorece el sentido de dar testimonio contra alguien. «Testifican» comunica esa fuerza jurídica mejor que «responden» en español moderno.
- source_word: בָךְ
  english_pob_choice: against you
  chosen_spanish: contra ti
  alternatives_spanish:
  - sobre ti
  - respecto de ti
  lexicon: HALOT
  rationale: La preposición se entiende adversativamente en el contexto judicial del verso. «Contra ti» expresa con claridad la idea de incriminación que el inglés POB preserva.
translation_notes:
  revision_awareness: Coincide plenamente con el sentido del texto hebreo y con la decisión del POB inglés; se mantiene la opción forense («testifican») y el énfasis reflexivo («propia/propios») sin añadir interpretación doctrinal.
  spanish_consistency_notes:
  - Se preservó el paralelismo «boca / labios» para reflejar la poesía hebrea.
  - Se evitó «SEÑOR» u otras sustituciones no pertinentes, porque el versículo no contiene el nombre divino.
  - La nota al pie recoge la ambigüedad de יַעֲנוּ entre «responder» y «testificar», paralela a la nota inglesa.
