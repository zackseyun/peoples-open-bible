review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien el sentido general del hebreo y del POB inglés: estado resultante (''Nos hemos vuelto''), falta de señorío divino sobre ''aquellos'', identidad de pacto en ''llamados por tu nombre'', deseo optativo con ''Ojalá'', y descenso teofánico. Sin embargo, las notas al pie están invertidas respecto de sus anclajes: [a] está colocado en ''gobernado'' pero su nota trata de מִפָּנֶיךָ; [b] está en ''se conmoverían'' y su nota sí corresponde a la cláusula final. Además, la traducción de הָרִים נָזֹלּוּ como ''se conmoverían'' es comprensible, pero ''temblarían'' refleja mejor el inglés auditado ''would quake'' y su efecto teofánico en español natural.'
  spanish_quality_summary: 'El español es claro, digno y ampliamente legible. ''Nos hemos vuelto'' y ''Ojalá rasgaras los cielos y descendieras'' suenan naturales. ''Sobre quienes tú nunca has gobernado'' es aceptable, aunque algo pesado; se puede conservar. El principal problema de calidad es técnico-editorial: la nota [a] no corresponde al lugar marcado. También conviene afinar ''se conmoverían'' a ''temblarían'' para una imagen más nítida y menos abstracta.'
  glossary_alignment: No hay conflictos con los términos base del proyecto en este versículo. No aparece el nombre divino ni otros términos glosarios sensibles. La decisión de pertenencia pactal en 'llamados por tu nombre' está bien alineada con la rationale documentada.
  issues:
  - severity: high
    issue: La nota al pie [a] está mal anclada.
    rationale: En el texto español [a] aparece tras 'gobernado', pero la nota explica la alternativa para מִפָּנֶיךָ ('delante de tu rostro/presencia'), que corresponde a 'delante de ti', no al verbo 'gobernado'. Esto rompe la auditabilidad y contradice la instrucción de que cada marcador aparezca exactamente en el punto relevante.
  - severity: medium
    issue: La nota [a] omite la alternativa principal documentada en inglés para מִפָּנֶיךָ.
    rationale: El POB inglés da 'Or, more literally, at your presence (lit. from before your face/presence)'. La nota española actual solo dice 'delante de tu rostro/presencia', que no refleja bien la alternativa principal 'ante tu presencia' o 'a tu presencia', ni la literalidad completa.
  - severity: medium
    issue: '''Se conmoverían'' es más débil y abstracto que la decisión auditada ''would quake''.'
    rationale: Aunque es interpretable, 'se conmoverían' puede sugerir emoción o perturbación general. 'Temblarían' comunica mejor el efecto teofánico y sigue de cerca la decisión inglesa revisada, manteniendo además la nota con 'fluirían'/'se derretirían' como alternativas más literales.
  revised_spanish_text: Nos hemos vuelto como aquellos sobre quienes tú nunca has gobernado, como los que nunca fueron llamados por tu nombre. ¡Ojalá rasgaras los cielos y descendieras; delante de ti[a] las montañas temblarían[b]!
  revised_footnotes:
  - marker: a
    text: O, más literalmente, 'ante tu presencia' (lit. 'de delante de tu rostro/presencia').
    reason: lexical_alternative
  - marker: b
    text: O, más literalmente, 'las montañas fluirían' o 'se derretirían'.
    reason: lexical_alternative
  revision_rationale: Se corrige el anclaje de la nota [a] para que corresponda a מִפָּנֶיךָ en 'delante de ti', se mejora su redacción para reflejar la alternativa auditada ('ante tu presencia') junto con la literalidad hebrea, y se ajusta 'se conmoverían' a 'temblarían' para alinearlo mejor con el POB inglés ('would quake') y con un español más preciso en contexto teofánico.
