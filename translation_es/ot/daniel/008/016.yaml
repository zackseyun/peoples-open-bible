translation:
  language: es
  text: 'Y oí la voz de un hombre entre las orillas del Ulay[a], y llamó y dijo: «Gabriel, haz que este[b] comprenda la visión»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «entre las riberas del Ulay» / «entre los lados del Ulay», probablemente refiriéndose al espacio entre sus orillas.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «haz comprender a este» / «haz que este entienda». El hebreo tiene un valor causativo.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וָאֶשְׁמַע
  english_pob_choice: And I heard
  chosen_spanish: Y oí
  alternatives_spanish:
  - Entonces oí
  - Y escuché
  lexicon: HALOT
  rationale: El wayyiqtol narrativo expresa secuencia; en español, «Y oí» conserva el avance del relato sin sobrecargar el tono. «Escuché» es posible, pero «oí» refleja mejor el hecho de percibir la voz.
- source_word: קוֹל אָדָם
  english_pob_choice: the voice of a man
  chosen_spanish: la voz de un hombre
  alternatives_spanish:
  - una voz humana
  - la voz de un ser humano
  lexicon: HALOT
  rationale: קוֹל es «voz» y אָדָם aquí funciona de modo concreto como «hombre». Se mantiene la referencia personal y se evita neutralizar la formulación con una abstracción que atenúe la fuerza lexical.
- source_word: בֵּין אוּלָי
  english_pob_choice: between the banks of the Ulai
  chosen_spanish: entre las orillas del Ulay
  alternatives_spanish:
  - entre las riberas del Ulay
  - entre los lados del Ulay
  lexicon: HALOT
  rationale: בֵּין indica «entre»; el nombre propio se translitera como Ulay. En español, «entre las orillas» comunica naturalmente la imagen del espacio delimitado por el cauce, sin añadir más de lo que el hebreo exige.
- source_word: וַיִּקְרָא וַיֹּאמַר
  english_pob_choice: and he called out and said
  chosen_spanish: y gritó y dijo
  alternatives_spanish:
  - y llamó y dijo
  - y clamó y dijo
  lexicon: HALOT
  rationale: Los dos verbos consecutivos intensifican la introducción del discurso. «Gritó y dijo» preserva esa duplicación y su tono en español contemporáneo.
- source_word: גַּבְרִיאֵל
  english_pob_choice: Gabriel
  chosen_spanish: Gabriel
  lexicon: Nombre propio
  rationale: Nombre propio transliterado sin cambio.
- source_word: הָבֵן
  english_pob_choice: make this one understand
  chosen_spanish: haz que este entienda
  alternatives_spanish:
  - haz entender a este
  - causa que este entienda
  lexicon: HALOT
  rationale: El imperativo hifil es causativo. «Haz que este entienda» conserva la fuerza de causar comprensión con español natural y sin perder el matiz activo.
- source_word: לְהַלָּז
  english_pob_choice: this one
  chosen_spanish: este
  alternatives_spanish:
  - este hombre
  - a este
  lexicon: HALOT
  rationale: El demostrativo se refiere a Daniel en la escena, pero el hebreo no añade sustantivo. «Este» respeta esa concisión; en español puede apoyarse por el contexto sin introducir «hombre» que no aparece en la frase.
- source_word: אֶת הַמַּרְאֶה
  english_pob_choice: the vision
  chosen_spanish: la visión
  alternatives_spanish:
  - la apariencia
  - lo que se ve
  lexicon: HALOT
  rationale: En el contexto apocalíptico de Daniel, מַרְאֶה se entiende con naturalidad como revelación visionaria; «visión» es la equivalencia más clara y fiel.
theological_decisions:
- issue: Tratamiento de אָדָם en dos puntos de la frase
  english_pob_reading: First as 'a man' in 'the voice of a man'; second as 'this one' referring to Daniel
  chosen_spanish_reading: Primero «un hombre»; luego «este» como demostrativo referido a Daniel
  alternative_spanish_readings:
  - voz humana
  - este hombre
  rationale: La escena presenta referentes concretos masculinos. Se conserva esa concreción sin convertir el segundo demostrativo en un sustantivo no explícito en el hebreo. Esto respeta la precisión del texto sin cargarlo innecesariamente.
  doctrine_reference: 'DOCTRINE.md §Translation philosophy 4; Contested terms: אָדָם'
translation_notes:
  revision_awareness: La redacción sigue el último estado revisado del POB inglés, que ajustó el demostrativo de 'this man' a 'this one' para reflejar más directamente el hebreo לְהַלָּז sin añadir sustantivo. La versión española adopta esa misma precisión con «este», manteniendo el causativo del hifil y la duplicación verbal del original.
  spanish_consistency_notes:
  - Se mantiene «Ulay» como transliteración del topónimo, en línea con el tratamiento de nombres propios.
  - Se conserva «visión» para מַרְאֶה por coherencia con el uso apocalíptico en Daniel.
  - «Oí» y «dijo» sostienen un registro sobrio y bíblico sin caer en arcaísmos innecesarios.
  - La elección de «este» evita resolver por adelantado el referente con un sustantivo que el hebreo no expresa en esa posición.
