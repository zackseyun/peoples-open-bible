    issue: 'Falta el nexo optativo explícito en la cita: «Yahvé me añada otro hijo».'
    rationale: Aunque el subjuntivo transmite parte de la fuerza desiderativa, en español la oración independiente sin «que» resulta poco natural. «Que Yahvé me añada otro hijo» preserva mejor el valor de deseo/oración del hebreo y mejora la legibilidad sin añadir sentido.
