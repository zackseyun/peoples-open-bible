revisions:
- from: Ustedes que han escapado de la espada[a], vayan; no se queden quietos. Recuerden a Yahvé desde lejos, y que Jerusalén suba a su corazón.
  to: Ustedes que han escapado de la espada[a], vayan; no se queden quietos. Recuerden a Yahvé desde lejos, y que Jerusalén les suba al corazón.
  rationale: Se conserva el sentido del original y la decisión del POB de mantener la metáfora del hebreo, pero se ajusta la última cláusula a un español más natural y más cercano a עַל לְבַבְכֶם mediante «les suba al corazón». También se pule la nota para que su alternativa suene idiomática en español.
