    text: O «rectitud». El griego también puede entenderse como «justicia» en sentido ético.
    reason: lexical_alternative
  - marker: b
    text: O «iniquidad». El contraste sigue la pareja «justicia / injusticia» o «rectitud / iniquidad».
    reason: lexical_alternative
