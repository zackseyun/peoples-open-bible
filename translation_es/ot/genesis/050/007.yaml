review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien el sentido del hebreo: mantiene la subida geográfica de עָלָה, el propósito de sepultar al padre, y la doble referencia a los ancianos de la casa de Faraón y de la tierra de Egipto. La nota cultural sobre ‘subió’ está bien preservada. Sin embargo, ‘Así que’ introduce una inferencia discursiva no exigida por וַיַּעַל, y ‘su casa’ para בֵיתוֹ puede sonar demasiado doméstico en español, cuando el contexto real pide ‘casa real’ o ‘corte’ para expresar mejor ‘household’.'
  spanish_quality_summary: El texto es claro y legible, pero puede mejorarse para sonar más natural y preciso en español bíblico moderno. ‘José subió’ funciona bien con la nota. ‘Los siervos de Faraón’ es aceptable en este contexto, aunque ‘servidores’ también sería posible; no requiere cambio. El principal ajuste estilístico es evitar ‘Así que’ y aclarar ‘su casa’ como ‘su casa real’, lo que mejora la referencia sin alejarse del hebreo.
  glossary_alignment: No hay conflictos con la terminología principal del proyecto. No aparece Yahvé ni terminología mesiánica. ‘Siervos’ para עַבְדֵי en contexto cortesano es una excepción contextual razonable frente al valor por defecto más fuerte de ‘esclavo’. ‘Ancianos’ para זִקְנֵי y ‘tierra de Egipto’ para אֶרֶץ מִצְרַיִם están bien alineados con la evidencia fuente y con la auditoría inglesa.
  issues:
  - severity: medium
    issue: ‘Así que’ añade un matiz inferencial no presente en el hebreo.
    rationale: וַיַּעַל introduce la acción narrativa (‘y subió/fue’) pero no requiere la conexión lógica explícita de ‘Así que’. En español basta comenzar con ‘José subió…’.
  - severity: medium
    issue: ‘Los ancianos de su casa’ puede sonar demasiado doméstico y ambiguo.
    rationale: En contexto de Faraón, בֵיתוֹ se refiere a su casa/household real. ‘Su casa real’ comunica mejor el referente cortesano sin perder fidelidad al hebreo.
  revised_spanish_text: José subió[a] para enterrar a su padre, y con él subieron todos los siervos de Faraón, los ancianos de su casa real, y todos los ancianos de la tierra de Egipto.
  revised_footnotes:
  - marker: a
    text: El hebreo ‘subió’ refleja la manera habitual de describir el viaje desde Egipto hacia Canaán.
    reason: cultural_note
  revision_rationale: Se elimina ‘Así que’ por añadir una relación inferencial no explícita en el hebreo, y se ajusta ‘su casa’ a ‘su casa real’ para expresar con mayor claridad el sentido cortesano de בֵיתוֹ en referencia a Faraón. Se conserva ‘subió’ con nota, la repetición verbal, ‘siervos’, ‘ancianos’ y ‘tierra de Egipto’ por su fidelidad al texto fuente y a la auditoría inglesa.
