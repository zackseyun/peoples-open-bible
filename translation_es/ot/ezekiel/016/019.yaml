  text: וְ/לַחְמִ/י֩ אֲשֶׁר נָתַ֨תִּי לָ֜/ךְ סֹ֣לֶת וָ/שֶׁ֤מֶן וּ/דְבַשׁ֙ הֶֽאֱכַלְתִּ֔י/ךְ וּ/נְתַתִּ֧י/הוּ לִ/פְנֵי/הֶ֛ם לְ/רֵ֥יחַ נִיחֹ֖חַ וַ/יֶּ֑הִי נְאֻ֖ם אֲדֹנָ֥/י יְהוִֽה־׃
base_translation:
  language: en
  yaml_path: translation/ot/ezekiel/016/019.yaml
  text: And my bread that I gave you—fine flour[a], oil, and honey with which I fed you—you set before them as a pleasing aroma, and so it was[c][b], declares the Lord GOD.
  footnotes:
  - marker: a
    text: Or 'my food that I gave you.' Hebrew 'bread' can sometimes stand more broadly for food.
    reason: lexical_alternative
  - marker: b
    text: '''A pleasing aroma'' is standard sacrificial language, here used ironically of what was offered before idols.'
    reason: cultural_note
  - marker: c
    text: Hebrew 'Lord GOD' represents אֲדֹנָי יְהוִה; the divine name יְהוָה is rendered 'the LORD' by translation policy.
    reason: lexical_alternative
