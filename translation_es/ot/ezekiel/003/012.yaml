translation:
  language: es
  text: 'Entonces el Espíritu me levantó, y oí detrás de mí el sonido de un gran estruendo[a]: «¡Bendita sea la gloria de Yahvé desde su lugar![b]»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «un gran temblor», «un fuerte ruido de sacudida» o «un sonido como de terremoto». El hebreo רַעַשׁ puede referirse tanto al sacudimiento físico como al ruido asociado con él.
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: «Bendita sea la gloria de Yahvé desde su lugar». La frase puede significar que la gloria de Yahvé es bendecida al salir de su lugar, o que la bendición se pronuncia desde el lugar donde habita su gloria.'
    reason: alternative_reading
lexical_decisions:
- source_word: וַתִּשָּׂאֵנִי
  english_pob_choice: lifted me up
  chosen_spanish: me levantó
  alternatives_spanish:
  - me alzó
  - me llevó
  - me tomó
  lexicon: HALOT
  rationale: El hebreo expresa que el sujeto sobrenatural hace que el profeta sea alzado/trasladado; en español, «me levantó» comunica bien la elevación visionaria sin forzar un detalle de transporte que el contexto no explicita.
- source_word: רוּחַ
  english_pob_choice: the Spirit
  chosen_spanish: el Espíritu
  alternatives_spanish:
  - un espíritu
  - el viento
  lexicon: HALOT
  rationale: En este contexto de visión y comisión, la referencia más probable es al Espíritu divino. Mantener mayúscula respeta esa identificación contextual sin añadir más de lo que el pasaje exige.
- source_word: אַחֲרַי
  english_pob_choice: behind me
  chosen_spanish: detrás de mí
  alternatives_spanish:
  - tras de mí
  - después de mí
  lexicon: HALOT
  rationale: El sentido espacial es claro en la escena auditiva; «detrás de mí» es natural y precisa en español.
- source_word: קוֹל
  english_pob_choice: a sound
  chosen_spanish: el sonido
  alternatives_spanish:
  - una voz
  - un ruido
  lexicon: HALOT
  rationale: Aquí קוֹל designa el fenómeno audible que precede a la cita; «el sonido» conserva amplitud semántica y evita restringirlo prematuramente a «voz».
- source_word: רַעַשׁ גָּדוֹל
  english_pob_choice: a great rumbling
  chosen_spanish: un gran estruendo
  alternatives_spanish:
  - un gran temblor
  - un fuerte ruido de sacudida
  - un gran terremoto
  lexicon: HALOT
  rationale: El término hebreo puede denotar sacudida, tumulto o ruido estremecedor. Como aquí se oye, «estruendo» preserva el carácter auditivo y la intensidad sin introducir «terremoto» donde no se nombra explícitamente.
- source_word: בָּרוּךְ
  english_pob_choice: Blessed be
  chosen_spanish: Bendita sea
  alternatives_spanish:
  - Bendito sea
  - Sea bendita
  lexicon: HALOT
  rationale: La fórmula doxológica en español bíblico suena más natural como «Bendita sea» al concordar con «la gloria». Conserva el tono litúrgico y el valor pasivo de la expresión hebrea.
- source_word: כְּבוֹד יְהוָה
  english_pob_choice: the glory of Yahweh
  chosen_spanish: la gloria de Yahvé
  alternatives_spanish:
  - la gloria de Yahweh
  - la gloria del Yahvé
  lexicon: HALOT
  rationale: Se mantiene el término teológico «gloria» y el nombre divino «Yahvé» conforme al criterio del proyecto. El genitivo español es la forma más clara para expresar כבוד יְהוָה.
- source_word: מִמְּקוֹמוֹ
  english_pob_choice: from his place
  chosen_spanish: desde su lugar
  alternatives_spanish:
  - desde su puesto
  - desde su morada
  lexicon: HALOT
  rationale: «Desde su lugar» reproduce con naturalidad el valor de origen del hebreo y deja abierta la referencia exacta, como en el texto fuente.
theological_decisions:
- issue: Identificación de רוּחַ
  english_pob_reading: the Spirit refers to the divine Spirit in Ezekiel's visionary experience
  chosen_spanish_reading: el Espíritu se entiende como el Espíritu divino en la experiencia visionaria de Ezequiel
  alternative_spanish_readings:
  - un espíritu
  - el viento
  rationale: El marco narrativo de Ezequiel favorece una referencia personal y divina, no meramente atmosférica o indefinida. La mayúscula ayuda a comunicar esa lectura contextual sin convertirla en una afirmación doctrinal extraña al versículo.
  doctrine_reference: Translation philosophy §1, §3
- issue: Relación entre el sonido y la aclamación
  english_pob_reading: The quoted blessing is presented as the content associated with the sound Ezekiel hears behind him
  chosen_spanish_reading: La aclamación se presenta como el contenido asociado al sonido que Ezequiel oye detrás de sí
  alternative_spanish_readings:
  - La frase final puede leerse como comentario narrativo
  - La expresión puede entenderse sin comillas explícitas
  rationale: Las comillas ayudan a indicar que se trata de una proclamación oclamatoria o de alabanza oída por el profeta. No agregan contenido doctrinal; solo clarifican la estructura del versículo en español.
  doctrine_reference: Translation philosophy §6
- issue: Uso del nombre divino
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - Jehová
  rationale: Se sigue el estándar del proyecto para el Tetragrámaton, preservando el nombre propio divino en lugar de sustituirlo por un título.
  doctrine_reference: Project terminology defaults
translation_notes:
  revision_awareness: Se corrigió la validación previa asegurando que los marcadores de nota [a] y [b] aparezcan exactamente en el texto español, junto con una formulación natural y fiel al hebreo y al audit trail en inglés.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» para יְהוָה conforme al estándar del proyecto.
  - Se usa «Espíritu» con mayúscula por el contexto visionario; no se fuerza una interpretación más amplia que la del pasaje.
  - «Desde su lugar» conserva la ambigüedad del hebreo sobre el punto de procedencia de la alabanza.
  - La puntuación con dos puntos y comillas refleja adecuadamente la transición a la aclamación.
  - No se emplea «Cristo» ni sustituciones eclesiásticas que no correspondan al texto.
