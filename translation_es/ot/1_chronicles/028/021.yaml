translation:
  language: es
  text: Y he aquí[a], las divisiones de los sacerdotes y de los levitas son para todo el servicio de la casa de Dios, y estará contigo en toda la obra todo hombre dispuesto, con habilidad, para toda clase de servicio; también los oficiales y todo el pueblo[b] estarán a tu disposición en todos tus asuntos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «mira». El hebreo introduce la frase como llamado de atención.
    reason: alternative_reading
  - marker: b
    text: Literalmente, «para todas tus palabras»; es decir, listos para ejecutar tus instrucciones o atender todos tus asuntos.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהִנֵּה
  english_pob_choice: And behold
  chosen_spanish: Y he aquí
  alternatives_spanish:
  - Y mira
  - Y ahora
  lexicon: HALOT
  rationale: Conserva la fuerza deíctica y de llamada de atención del hebreo sin omitirla. «He aquí» es natural en español bíblico digno y mantiene el énfasis retórico.
- source_word: מַחְלְקוֹת
  english_pob_choice: divisions
  chosen_spanish: divisiones
  alternatives_spanish:
  - turnos
  - grupos
  - secciones
  lexicon: HALOT
  rationale: Se refiere a las distribuciones u ordenamientos sacerdotales y levíticos para el servicio. «Divisiones» es claro y refleja bien la organización del texto.
- source_word: הַכֹּהֲנִים וְהַלְוִיִּם
  english_pob_choice: the priests and the Levites
  chosen_spanish: los sacerdotes y los levitas
  alternatives_spanish:
  - los sacerdotes y los levitas
  lexicon: HALOT
  rationale: Equivale de manera directa y transparente a los dos grupos de servicio del templo. Se conserva la especificidad institucional del hebreo.
- source_word: לְכָל עֲבוֹדַת בֵּית הָאֱלֹהִים
  english_pob_choice: for all the service of the house of God
  chosen_spanish: para todo el servicio de la casa de Dios
  alternatives_spanish:
  - para todo el trabajo de la casa de Dios
  - para todo el servicio del casa de Dios
  lexicon: HALOT
  rationale: «Servicio» reproduce bien עֲבוֹדָה en contexto cultual. «Casa de Dios» conserva la expresión concreta del original, sin sustituirla por un término más interpretativo.
- source_word: וְעִמְּךָ
  english_pob_choice: and with you
  chosen_spanish: y contigo
  alternatives_spanish:
  - y a tu lado
  - y con respecto a ti
  lexicon: HALOT
  rationale: Mantiene la idea de apoyo y presencia junto a Salomón con una forma natural en español.
- source_word: בְכָל מְלָאכָה
  english_pob_choice: in all the work
  chosen_spanish: en toda la obra
  alternatives_spanish:
  - en todo el trabajo
  - en toda clase de labor
  lexicon: HALOT
  rationale: Aquí מְלָאכָה alude a la labor concreta del proyecto; «obra» suena natural en español y conserva el alcance general de la tarea.
- source_word: לְכָל נָדִיב
  english_pob_choice: every willing man
  chosen_spanish: todo hombre dispuesto
  alternatives_spanish:
  - todo voluntario
  - toda persona dispuesta
  lexicon: HALOT
  rationale: La forma hebrea es masculina singular. Se conserva ese rasgo con «hombre», y «dispuesto» comunica la disposición voluntaria/noble del término.
- source_word: בַּחָכְמָה
  english_pob_choice: with skill
  chosen_spanish: con habilidad
  alternatives_spanish:
  - con sabiduría
  - con pericia
  lexicon: HALOT
  rationale: En este contexto, חָכְמָה expresa destreza práctica más que mera reflexión abstracta. «Con habilidad» evita una traducción demasiado literal y suena natural en español, sin perder la idea de competencia.
- source_word: לְכָל עֲבוֹדָה
  english_pob_choice: for every kind of service
  chosen_spanish: para toda clase de servicio
  alternatives_spanish:
  - para todo servicio
  - para cualquier labor
  lexicon: HALOT
  rationale: Mantiene el valor amplio y repetido de עֲבוֹדָה, diferenciándola ligeramente de מְלָאכָה. «Toda clase de servicio» conserva esa amplitud.
- source_word: וְהַשָּׂרִים
  english_pob_choice: the officials also
  chosen_spanish: y los oficiales
  alternatives_spanish:
  - y los jefes
  - y los gobernantes
  lexicon: HALOT
  rationale: En este marco real-administrativo, שָׂרִים son funcionarios o encargados. «Oficiales» comunica mejor ese sentido que «príncipes» en español moderno.
- source_word: וְכָל הָעָם
  english_pob_choice: and all the people
  chosen_spanish: y todo el pueblo
  alternatives_spanish:
  - y toda la gente
  lexicon: HALOT
  rationale: Traducción directa que conserva la amplitud de la expresión.
- source_word: לְכָל דְּבָרֶיךָ
  english_pob_choice: at your command in all your matters
  chosen_spanish: a tu disposición en todos tus asuntos
  alternatives_spanish:
  - para todas tus palabras
  - para todos tus mandatos
  - a tu mando en todos tus asuntos
  lexicon: HALOT
  rationale: La expresión hebrea literalmente dice «para todas tus palabras», es decir, para cumplir tus instrucciones o asuntos. «A tu disposición en todos tus asuntos» mantiene la fuerza idiomática sin sonar forzado en español.
theological_decisions:
- issue: Renderización de בֵּית הָאֱלֹהִים
  english_pob_reading: the house of God
  chosen_spanish_reading: la casa de Dios
  alternative_spanish_readings:
  - el templo
  rationale: Se preserva la imagen concreta y cultual del hebreo. «Casa de Dios» sigue de cerca la expresión fuente y evita una generalización interpretativa.
  doctrine_reference: Translation philosophy 1, 5
- issue: Valor de נָדִיב en contexto de servicio
  english_pob_reading: every willing man
  chosen_spanish_reading: todo hombre dispuesto
  alternative_spanish_readings:
  - todo voluntario
  - toda persona dispuesta
  rationale: El hebreo usa una forma masculina singular; se mantiene esa marcación. Al mismo tiempo, «dispuesto» conserva el matiz de voluntad y disponibilidad para el servicio.
  doctrine_reference: Translation philosophy 4
translation_notes:
  revision_awareness: La redacción sigue la última revisión del POB inglés al preferir una equivalencia más natural para חָכְמָה como «con habilidad» y al cerrar la cláusula final con un sentido idiomático de disponibilidad en los asuntos de Salomón, sin introducir «wholly» ni intensificar más allá del hebreo. También se preserva la llamada de atención inicial de וְהִנֵּה y la estructura paralela del versículo.
  spanish_consistency_notes:
  - Se mantiene «casa de Dios» para בֵּית הָאֱלֹהִים, en consonancia con el criterio del proyecto de no sustituir automáticamente por «templo».
  - Se usa «Yahvé» solo cuando aparece el nombre divino; aquí el hebreo tiene אֱלֹהִים, por eso se traduce «Dios».
  - «Servicio» y «obra» se distinguen de manera leve para reflejar עֲבוֹדָה y מְלָאכָה sin forzar una diferencia excesiva en español.
  - Se conserva el tono formal y público del discurso de David, adecuado para lectura eclesial moderna.
