translation:
  text: Jesus said[3][2][1], "Why do you wash the outside of the cup?[1] Do you not
    know[2] that the one who made[3] the inside is also the one who made[3] the outside?"
  philosophy: optimal-equivalence
  footnotes:
  - marker: '1'
    text: Literally, ‘the side outside of the cup’ (ⲡⲥⲁ ⲛⲃⲟⲗ ⲛⲡⲡⲟⲧⲏⲣⲓⲟⲛ). A matched
      phrase occurs for ‘the inside’ (ⲡⲥⲁ ⲛϩⲟⲩⲛ).
    reason: dialect_note
  - marker: '2'
    text: Coptic ⲛⲟⲉⲓ can also mean ‘understand’ or ‘realize’. ‘Know’ is kept here
      to maintain the straightforward cognitive sense.
    reason: lexical_alternative
  - marker: '3'
    text: Coptic ⲧⲁⲙⲓⲟ in the relative clause means ‘make, fashion’; alternatives
      include ‘fashioned’ or ‘formed’. It does not repeat the earlier verb for ‘wash/cleanse,’
      preserving the contrast between washing and making.
    reason: lexical_alternative
lexical_decisions:
- source_word: ϫⲉⲉⲧⲃⲉⲟⲩ
  chosen: why
  alternatives:
  - for what reason
  lexicon: Layton, Coptic Grammar; Crum s.v. ⲉⲧⲃⲉ
  rationale: ⲉⲧⲃⲉ with interrogative ⲟⲩ functions idiomatically as “why?” in Sahidic;
    preserving the direct interrogative keeps Thomas’s terse tone.
- source_word: ⲉⲓⲱⲉ
  chosen: wash
  alternatives:
  - cleanse
  lexicon: Crum s.v. ⲉⲓⲱⲉ; Lambdin, Introduction to Sahidic Coptic
  rationale: Basic sense is to wash (vessels, body). In a cup context, “wash” is the
    natural rendering; “cleanse” would be more ecclesial in tone and less concrete.
- source_word: ⲡⲥⲁ ⲛⲃⲟⲗ
  chosen: the outside
  alternatives:
  - the outside surface
  - the side outside
  lexicon: Crum s.v. ⲥⲁ; Layton, Coptic Grammar (directionals ⲛⲃⲟⲗ/ⲛϩⲟⲩⲛ)
  rationale: ⲥⲁ ‘side’ with directional ⲛⲃⲟⲗ (‘outwards’) yields the idiomatic ‘outside’.
    Rendering succinctly avoids unnecessary technicality while preserving contrast
    with ‘inside’.
- source_word: ⲡⲥⲁ ⲛϩⲟⲩⲛ
  chosen: the inside
  alternatives:
  - the interior
  - the side within
  lexicon: Crum s.v. ⲥⲁ; Layton, Coptic Grammar
  rationale: Parallel to ⲡⲥⲁ ⲛⲃⲟⲗ; ⲛϩⲟⲩⲛ means ‘within, inside’. ‘Inside’ is concise
    and captures the spatial sense.
- source_word: ⲡⲡⲟⲧⲏⲣⲓⲟⲛ
  chosen: cup
  alternatives:
  - drinking cup
  - vessel
  lexicon: Crum s.v. (Greek loanwords); Layton, NHS 20 notes
  rationale: Standard Greek loanword (ποτήριον). ‘Cup’ is the ordinary, unmarked English
    equivalent.
- source_word: ⲛⲧⲱⲧⲛ ⲣ̄ⲛⲟⲉⲓ
  chosen: do you not know
  alternatives:
  - do you not understand
  - do you not realize
  lexicon: Crum s.v. ⲛⲟⲉⲓ; Lambdin
  rationale: ⲛⲟⲉⲓ ‘know’ is straightforward. We keep the cognitive sense neutral;
    ‘realize/understand’ are possible but slightly interpretive.
- source_word: ⲡⲉⲧⲉⲣⲉⲁⲛⲧⲟϥⲧⲁⲙⲓⲟ
  chosen: the one who made
  alternatives:
  - the one who fashioned
  - the maker (of)
  lexicon: Crum s.v. ⲧⲁⲙⲓ/ⲧⲁⲙⲉ ‘to make, fashion’; Layton, Coptic Grammar (relative
    ⲡⲉⲧⲉⲣⲉ + infinitive)
  rationale: Relative construction ⲡⲉⲧⲉⲣⲉ + subject + infinitive. ⲧⲁⲙⲓⲟ here means
    ‘make/form,’ not ‘cleanse’ (a different verb has already been used for washing).
- source_word: ⲟⲛ
  chosen: also
  alternatives:
  - too
  - again
  lexicon: Crum s.v. ⲟⲛ
  rationale: Adverb marking addition; ‘also’ conveys the inclusive force succinctly.
textual_note: 'No lacunae in NH II for this saying. The manuscript exhibits orthographic
  anomalies at NHAM02.48 l.15–16: the scribe writes ⲡⲉⲛⲧⲁϩⲧⲁⲙⲓⲟ (l.15) and ⲡⲉⲛⲧⲁϥⲧⲁⲙⲓⲟ
  (l.16). Dilley normalizes both as the relative construction ⲡⲉⲧⲉⲣⲉⲁⲛⲧⲟϥⲧⲁⲙⲓⲟ ‘the
  one who made …’, which fits context and Coptic syntax. The pairs ⲡⲥⲁ ⲛϩⲟⲩⲛ / ⲡⲥⲁ
  ⲛⲃⲟⲗ use directional adverbs ‘inside/outside’ with ⲥⲁ ‘side’; translation compresses
  these to ‘inside/outside’ while preserving the contrast. Person is plural second
  (ⲛⲧⲱⲧⲛ), addressing a group.'
