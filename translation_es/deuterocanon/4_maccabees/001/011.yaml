translation:
  language: es
  text: Porque aquellos hombres llegaron a ser todavía más admirables, no solo para todos los hombres por su valentía y perseverancia, sino también para los que los torturaban; se convirtieron en causa de que fuera derribada la tiranía contra la nación, habiendo vencido al tirano con perseverancia, de modo que por medio de ellos la patria[a] fue purificada[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «la tierra natal». El griego πατρίς denota la tierra natal; se eligió «patria» para conservar el tono elevado del pasaje.
    reason: lexical_alternative
  - marker: b
    text: «Fue purificada» también puede entenderse como «fue limpiada», con posibles matices morales, rituales o de restauración nacional.
    reason: alternative_reading
lexical_decisions:
- source_word: θαυμαστότεροι
  english_pob_choice: even more admirable
  chosen_spanish: todavía más admirables
  alternatives_spanish:
  - más admirables
  - aún más admirables
  lexicon: LSJ
  rationale: El comparativo intensivo θαυμαστότεροι se expresa de forma natural con «todavía más». «Admirables» comunica el juicio moral de estima mejor que «maravillosos» o «notables» en este contexto.
- source_word: ἀνδρίᾳ
  english_pob_choice: courage
  chosen_spanish: valentía
  alternatives_spanish:
  - courage
  - bravura
  - virilidad
  lexicon: LSJ
  rationale: Aunque el término está emparentado etimológicamente con ἀνήρ, aquí designa virtud de firmeza y valor. «Valentía» evita un calco de género y conserva la cualidad heroica.
- source_word: ὑπομονῇ
  english_pob_choice: endurance
  chosen_spanish: perseverancia
  alternatives_spanish:
  - resistencia
  - paciencia perseverante
  - constancia
  lexicon: LSJ
  rationale: El término aparece dos veces y señala constancia firme bajo sufrimiento. «Perseverancia» es claro en español y mantiene la idea de mantenerse firme.
- source_word: ὑπὸ τῶν αἰκισαμένων
  english_pob_choice: those who tortured them
  chosen_spanish: para los que los torturaban
  alternatives_spanish:
  - ante sus torturadores
  - a los que los torturaban
  - por parte de los que los torturaban
  lexicon: LSJ
  rationale: La preposición ὑπό con personas marca referencia/jucio ante quienes los consideraban así. «Para los que los torturaban» preserva el valor relacional del griego y la violencia explícita de αἰκισαμένων.
- source_word: αἴτιοι κατέστησαν
  english_pob_choice: they became the cause
  chosen_spanish: se convirtieron en causa de
  alternatives_spanish:
  - llegaron a ser causa de
  - fueron causa de
  - resultaron ser causa de
  lexicon: LSJ
  rationale: La construcción idiomática se reproduce con naturalidad en español. «Se convirtieron en causa de» conserva la agencia causal sin sobreinterpretar el mecanismo.
- source_word: καταλυθῆναι
  english_pob_choice: the overthrow
  chosen_spanish: fuera derribada
  alternatives_spanish:
  - fuera destruida
  - fuera abolida
  - cayera
  lexicon: LSJ
  rationale: En contexto de tiranía política, la pasiva infinitiva expresa caída/derrocamiento. «Fuera derribada» mantiene la imagen de abatimiento y evita reducirla solo a «destrucción».
- source_word: τὴν κατὰ τοῦ ἔθνους τυραννίδα
  english_pob_choice: the tyranny against the nation
  chosen_spanish: la tiranía contra la nación
  alternatives_spanish:
  - la tiranía dirigida contra el pueblo
  - la opresión contra la nación
  - el yugo tiránico contra la nación
  lexicon: LSJ
  rationale: «Nación» traduce ἔθνος de manera directa, y «contra» conserva la orientación hostil del sintagma. Se evita suavizar τυραννίς en una palabra más general como «opresión».
- source_word: νικήσαντες τὸν τύραννον τῇ ὑπομονῇ
  english_pob_choice: having conquered the tyrant by endurance
  chosen_spanish: venciendo al tirano con perseverancia
  alternatives_spanish:
  - habiendo vencido al tirano con perseverancia
  - al vencer al tirano con perseverancia
  - derrotando al tirano con perseverancia
  lexicon: LSJ
  rationale: El participio aoristo se vierte de modo subordinado y fluido en español. «Venciendo» conserva la relación causal/medial sin añadir un matiz demasiado técnico.
- source_word: καθαρσθῆναι
  english_pob_choice: was purified
  chosen_spanish: fue purificada
  alternatives_spanish:
  - fue limpiada
  - fue purgada
  - fue purificada ritualmente
  lexicon: LSJ
  rationale: «Purificada» conserva la posible resonancia moral, ritual y nacional del verbo sin cerrar el sentido a una sola lectura. El pasivo mantiene la ambigüedad del original.
- source_word: πατρίδα
  english_pob_choice: fatherland
  chosen_spanish: la patria
  alternatives_spanish:
  - la tierra natal
  - la patria ancestral
  - el padre/patria
  lexicon: LSJ
  rationale: Aunque el inglés optó por «fatherland» por tono elevado, en español «patria» transmite la elevación retórica con naturalidad. Evita un calco poco idiomático y sigue el valor de πατρίς.
theological_decisions:
- issue: El alcance de la «purificación» de la patria
  english_pob_reading: The text preserves that through the sufferers' endurance the homeland was purified, without specifying a later doctrinal mechanism beyond the verse itself.
  chosen_spanish_reading: El texto deja en pie que, por medio de su sufrimiento perseverante, la patria fue purificada, sin precisar un mecanismo doctrinal posterior al versículo.
  alternative_spanish_readings:
  - la patria fue solo liberada políticamente
  - la patria fue limpiada en un sentido moral o ritual
  - el sufrimiento tuvo un sentido expiatorio
  rationale: El verbo καθαρσθῆναι permite una gama de sentidos que incluye lo moral, lo ritual y lo nacional-restaurativo. La traducción conserva esa tensión con «purificada» y evita restringirla a una mera liberación política o a una doctrina de expiación sistematizada.
  doctrine_reference: Preservar la tensión teológica sin resolverla.
translation_notes:
  revision_awareness: 'Se siguió de cerca el ajuste de la revisión inglesa que prefería una relación más directa con ὑπό («to all people»), pero en español se optó por una formulación idiomática equivalente: «para todos los hombres». También se mantuvo la tensión semántica de καθαρσθῆναι y πατρίς/patria sin reducirlas a una sola lectura.'
  spanish_consistency_notes:
  - Se usó «Yahvé» como convención general del proyecto, pero este versículo no contiene el nombre divino.
  - Se mantuvo «Mesías/Cristo» fuera de este texto porque no aparece en el versículo.
  - Se evitó «siervo» para δοῦλος porque el pasaje no contiene ese término.
  - «Patria» se emplea como equivalente retórico de πατρίς, coherente con el tono elevado del contexto.
  - «Valentía» y «perseverancia» preservan el par virtud/sufrimiento del griego sin cargar el texto de tecnicismos.
