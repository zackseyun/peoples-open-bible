source:
  edition: SBLGNT
  text: λέγοντες φωνῇ μεγάλῃ· Ἄξιόν ἐστιν τὸ ἀρνίον τὸ ἐσφαγμένον λαβεῖν τὴν δύναμιν ⸀καὶ πλοῦτον καὶ σοφίαν καὶ ἰσχὺν καὶ τιμὴν καὶ δόξαν καὶ εὐλογίαν.
base_translation:
  language: en
  yaml_path: translation/nt/revelation/005/012.yaml
  text: 'saying with a loud voice[c][b][a], “Worthy is the Lamb who was slain to receive power and wealth and wisdom and might and honor and glory and blessing.”'
  footnotes:
  - marker: a
    text: Or “who was slaughtered.” The Greek participle can be rendered more graphically, but “slain” better fits the elevated worship setting here.
    reason: lexical_alternative
  - marker: b
    text: Or “riches” for “wealth.”
    reason: lexical_alternative
  - marker: c
    text: Or “strength” for “might.” The translation uses “might” to distinguish this term from the earlier “power.”
    reason: lexical_alternative
translation:
  language: ko
  text: '그들은 큰 음성으로 말하였습니다. 「죽임을 당하신 어린 양은 권능과 부와 지혜와 힘과 존귀와 영광과 찬송을 받으시기에 합당하시도다.」'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: δύναμιν…καὶ πλοῦτον καὶ σοφίαν καὶ ἰσχὺν καὶ τιμὴν καὶ δόξαν καὶ εὐλογίαν
  english_pob_choice: power, wealth, wisdom, might, honor, glory, blessing
  chosen_korean: 권능과 부와 지혜와 힘과 존귀와 영광과 찬송
  alternatives_korean:
  - 능력, 부귀, 지혜, 위엄, 존귀, 영광, 찬송
  lexicon: BDAG
  rationale: 어린 양께 돌리는 일곱 겹 송영의 순서와 일곱이라는 수를 그대로 보존한다. δύναμις(권능)와 ἰσχύς(힘)을 구별하여 옮긴다.
theological_decisions:
- issue: '5:12의 일곱 겹 송영 정형 보존'
  chosen_reading: '「권능과 부와 지혜와 힘과 존귀와 영광과 찬송」 일곱 항목 순서 그대로'
  alternative_readings:
