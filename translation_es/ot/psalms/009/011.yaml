review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien el hebreo: mantiene el enlace inicial («Y»), el sentido de confianza de וְיִבְטְחוּ, la expresión literal y teológicamente cargada «los que conocen tu nombre», la causalidad de כִּי, y la referencia explícita a יְהוָה como «Yahvé». También conserva adecuadamente «los que te buscan» para דֹרְשֶׁיךָ. La única desalineación relevante con el rastro auditado inglés está en la colocación de las notas al pie: la nota b en inglés acompaña «have not forsaken/have not abandoned», pero en el borrador español quedó anclada a «te buscan», lo que altera su referente.'
  spanish_quality_summary: El español es claro, natural y digno. «Y confiarán en ti los que conocen tu nombre» suena bíblico sin ser acartonado. «No has abandonado a los que te buscan» es idiomático y fiel. La calidad general es buena; solo necesita corregirse el anclaje de la nota léxica y, para mayor precisión editorial, conviene mantener juntas las marcas junto a «Yahvé» en el mismo orden documentado en el inglés si se conservan ambas notas allí.
  glossary_alignment: 'Buena alineación con la terminología del proyecto: יְהוָה → «Yahvé» correctamente en texto principal; שֵׁם → «nombre» conservado con nota explicativa; דרשׁ → «buscar» bien resuelto. No hay conflictos con la glosa doctrinal del proyecto. La excepción necesaria es puramente editorial: reubicar la nota b para que explique «abandonado/desamparado», no «te buscan».'
  issues:
  - severity: medium
    issue: La nota [b] está anclada a la frase equivocada.
    rationale: En el inglés POB, la nota b («Or 'have not abandoned.'») corresponde a לֹא עָזַבְתָּ / «no has abandonado / no has desamparado». En el borrador español, [b] aparece tras «te buscan», lo que hace que la alternativa parezca referirse a דרשׁ y no a עזב.
  - severity: low
    issue: El orden de las marcas junto a «Yahvé» no reproduce exactamente el patrón auditado inglés.
    rationale: El inglés pone «O Yahweh[c][b]», con c para YHWH y b para la alternativa léxica del verbo anterior. En español no es obligatorio copiar ese orden exacto, pero si se mantiene la nota c en «Yahvé», la nota b debe moverse al verbo o frase verbal relevante para evitar ambigüedad editorial.
  revised_spanish_text: Y confiarán en ti los que conocen tu nombre[a], porque tú, Yahvé[c], no has abandonado[b] a los que te buscan.
