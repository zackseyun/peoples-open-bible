translation:
  language: es
  text: 'Y me dijo[a]: «Ven y ve las abominaciones perversas que están haciendo aquí».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «las cosas detestables».
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמֶר אֵלַי
  english_pob_choice: And he said to me
  chosen_spanish: Y él me dijo
  alternatives_spanish:
  - Entonces me dijo
  - Y me dijo
  lexicon: HALOT
  rationale: El waw narrativo se conserva con «Y» para mantener el flujo hebreo. Se explicita «él» porque el español exige un sujeto claro y el contexto ya lo identifica.
- source_word: בֹּא
  english_pob_choice: Come
  chosen_spanish: Ven
  alternatives_spanish:
  - Ven aquí
  - Entra
  lexicon: HALOT
  rationale: «Ven» reproduce el imperativo directo y natural en español. «Entra» añade más espacialidad que la del hebreo explícito, aunque el contexto la sugiera.
- source_word: וּרְאֵה
  english_pob_choice: and see
  chosen_spanish: y mira
  alternatives_spanish:
  - y ve
  - y observa
  lexicon: HALOT
  rationale: «Mira» es una orden natural en español y preserva el sentido exhortativo de ראה en un llamado profético. «Ve» podría sonar menos perceptivo; «observa» es más explicativo.
- source_word: הַתּוֹעֵבוֹת
  english_pob_choice: the abominations
  chosen_spanish: las abominaciones
  alternatives_spanish:
  - las cosas detestables
  - los actos abominables
  lexicon: HALOT
  rationale: Se mantiene «abominaciones» para conservar la fuerza cultual y moral del término en Ezequiel, coherente con el tratamiento auditado de la POB.
- source_word: הָרָעוֹת
  english_pob_choice: wicked
  chosen_spanish: malvadas
  alternatives_spanish:
  - malas
  - perversas
  lexicon: HALOT
  rationale: Como adjetivo que intensifica «abominaciones», «malvadas» expresa el carácter moralmente perverso sin perder la naturalidad española. «Malas» sería más débil; «perversas» más marcado pero menos inmediato.
- source_word: אֲשֶׁר הֵם עֹשִׂים
  english_pob_choice: that they are doing
  chosen_spanish: que están haciendo
  alternatives_spanish:
  - que hacen
  - que ellos están haciendo
  lexicon: HALOT
  rationale: El participio señala acción en curso; «están haciendo» conserva ese aspecto progresivo con fluidez en español. La forma simple «hacen» sería menos explícita respecto de la continuidad.
- source_word: פֹּה
  english_pob_choice: here
  chosen_spanish: aquí
  alternatives_spanish:
  - en este lugar
  - acá
  lexicon: HALOT
  rationale: «Aquí» es el equivalente deíctico más directo y sobrio. «En este lugar» sería más expansivo de lo requerido.
theological_decisions:
- issue: Fuerza moral-cultual de תּוֹעֵבוֹת en una visión del templo
  english_pob_reading: abominations
  chosen_spanish_reading: abominaciones
  alternative_spanish_readings:
  - cosas detestables
  - actos abominables
  rationale: La escena denuncia prácticas idolátricas dentro del complejo del templo. «Abominaciones» conserva la condena del pacto y la gravedad cultual sin añadir detalles interpretativos que el versículo no explicita.
  doctrine_reference: Pureza cultual; condena de la idolatría en el lenguaje profético de Ezequiel
- issue: Intensificación moral de הָרָעוֹת
  english_pob_reading: wicked
  chosen_spanish_reading: malvadas
  alternative_spanish_readings:
  - malas
  - perversas
  rationale: El adjetivo modifica a «abominaciones» y refuerza su carácter moral. «Malvadas» comunica bien esa valoración sin convertir el término en una paráfrasis excesiva.
  doctrine_reference: Responsabilidad moral y corrupción idolátrica
translation_notes:
  revision_awareness: 'La traducción española sigue el estado más reciente del audit trail inglés: se conserva «abominations» y se refleja el ajuste de «evil» a un adjetivo más natural para modificarlo; por eso se eligió «malvadas» en vez de una forma demasiado abstracta. También se mantuvo la progresión narrativa («Y») y el llamado directo («Ven y mira») en línea con la revisión aprobada.'
  spanish_consistency_notes:
  - Se mantiene «abominaciones» para continuidad con la terminología profética del proyecto.
  - Se prefirió un imperativo breve y natural («Ven y mira») conforme al registro bíblico español moderno.
  - La deíctica «aquí» conserva la referencia inmediata de פֹּה sin expansión interpretativa.
