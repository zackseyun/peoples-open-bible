translation:
  language: es
  text: Aquel día transcurrió en calma. Pero, cuando halló una oportunidad[a] favorable para su propia necedad, y fue convocado al consejo por Demetrio, y se le preguntó en qué disposición y propósito estaban los judíos,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Más literalmente: «habiendo tomado una ocasión como colaboradora de su propia necedad»; el griego es muy comprimido y expresa que aprovechó una oportunidad que servía a su plan insensato.'
    reason: lexical_alternative
lexical_decisions:
- source_word: τὴν ἡμέραν ἐκείνην ἡσυχίαν ἔσχεν
  english_pob_choice: That day was quiet
  chosen_spanish: Aquel día estuvo en calma
  alternatives_spanish:
  - Aquel día estuvo tranquilo
  - Aquel día pasó en paz
  lexicon: LSJ
  rationale: 'La expresión griega es idiomática y literal: ''tuvo quietud''. En español, ''estuvo en calma'' conserva la idea de ausencia de disturbio sin forzar una formulación extraña.'
- source_word: καιρὸν δὲ λαβών
  english_pob_choice: when he found an opportunity
  chosen_spanish: cuando halló una oportunidad
  alternatives_spanish:
  - cuando aprovechó la ocasión
  - cuando tomó una ocasión
  lexicon: LSJ
  rationale: La frase participial indica que encontró/aprovechó una apertura oportuna. 'Halló una oportunidad' es natural y mantiene el matiz de ocasión providencial o circunstancial.
- source_word: τῆς ἰδίας ἀνοίας συνεργόν
  english_pob_choice: suitable for his own folly
  chosen_spanish: favorable para su propia necedad
  alternatives_spanish:
  - acorde con su propia locura
  - de ayuda para su propia insensatez
  lexicon: LSJ
  rationale: El griego es comprimido y dice, literalmente, algo como 'un colaborador de su propia necedad'. En español, 'favorable para su propia necedad' preserva la idea de que la oportunidad servía a su plan insensato sin añadir una paráfrasis excesiva. 'Necedad' refleja bien ἀνοία en este contexto político.
- source_word: προσκληθεὶς εἰς συνέδριον
  english_pob_choice: had been summoned ... to the council
  chosen_spanish: fue convocado al consejo
  alternatives_spanish:
  - fue llamado al consejo
  - fue citado al consejo
  lexicon: LSJ
  rationale: συνέδριον designa un consejo deliberativo. 'Convocado al consejo' es claro y mantiene el tono formal del contexto.
- source_word: ὑπὸ τοῦ Δημητρίου
  english_pob_choice: by Demetrius
  chosen_spanish: por Demetrio
  alternatives_spanish:
  - por Demetrio
  lexicon: LSJ
  rationale: Nombre propio transliterado de manera estándar en español bíblico.
- source_word: ἐπερωτηθεὶς
  english_pob_choice: asked
  chosen_spanish: se le preguntó
  alternatives_spanish:
  - fue preguntado
  - se le interrogó
  lexicon: LSJ
  rationale: El verbo puede ser más fuerte que 'preguntar', pero el contexto es una consulta oficial. La pasiva impersonal en español transmite con naturalidad la acción sin endurecerla en 'interrogó'.
- source_word: ἐν τίνι διαθέσει καὶ βουλῇ καθεστήκασιν
  english_pob_choice: in what disposition and purpose the Jews stood
  chosen_spanish: en qué disposición y propósito estaban los judíos
  alternatives_spanish:
  - en qué actitud y propósito estaban los judíos
  - en qué ánimo y plan se hallaban los judíos
  lexicon: LSJ
  rationale: 'διάθεσις y βουλή conservan dos aspectos: disposición/actitud e intención/propósito. ''Estaban'' reproduce bien καθεστήκασιν en el sentido de estado o postura establecida.'
- source_word: οἱ Ἰουδαῖοι
  english_pob_choice: the Jews
  chosen_spanish: los judíos
  alternatives_spanish:
  - los judeanos
  lexicon: LSJ
  rationale: En 2 Macabeos el término suele referirse al pueblo judío como grupo etnorreligioso. 'Los judíos' es la forma más clara y natural en español.
theological_decisions:
- issue: Designación de οἱ Ἰουδαῖοι
  english_pob_reading: the Jews
  chosen_spanish_reading: los judíos
  alternative_spanish_readings:
  - los judeanos
  rationale: En este contexto macabeo la referencia es etnopolítica y religiosa, no solo geográfica. 'Los judíos' comunica mejor el referente al lector español y sigue la lectura auditada del POB inglés.
  doctrine_reference: Translation philosophy §1, §6
- issue: Matiz de τῆς ἰδίας ἀνοίας συνεργόν
  english_pob_reading: suitable for his own folly
  chosen_spanish_reading: favorable para su propia necedad
  alternative_spanish_readings:
  - acorde con su propia locura
  - de ayuda para su propia insensatez
  rationale: No conviene suavizar el juicio moral del texto ni convertirlo en una explicación libre. La formulación elegida conserva la tensión de que la ocasión servía al plan necio del personaje, sin resolver de manera interpretativa lo que el griego deja comprimido.
  doctrine_reference: Translation philosophy §2, §5
translation_notes:
  revision_awareness: El audit trail inglés indica que no hubo cambios en la última revisión. La presente redacción sigue esa lectura estable, pero ajusta el castellano para que suene natural sin perder la compresión del griego ni el tono narrativo formal.
  spanish_consistency_notes:
  - Se mantiene 'Dios/Yahvé' según corresponda en otros pasajes; aquí no aparece lenguaje divino.
  - '''Consejo'' traduce συνέδριον como cuerpo deliberativo, no como ''sanedrín'', porque el contexto inmediato no exige el tecnicismo tradicional.'
  - '''Judíos'' se conserva por fidelidad al referente etnorreligioso habitual de 2 Macabeos.'
