translation:
  language: es
  text: ¡Alaben a Yahvé desde la tierra, criaturas marinas y todas las profundidades[a]!
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «abismos». El hebreo evoca las aguas profundas.
    reason: lexical_alternative
lexical_decisions:
- source_word: הַֽלְל֣וּ
  english_pob_choice: Praise
  chosen_spanish: ¡Alaben!
  alternatives_spanish:
  - ¡Alaben a Dios!
  - ¡Den alabanza!
  lexicon: HALOT
  rationale: El hebreo es un imperativo plural exhortando al culto; en español, «Alaben» conserva el tono directo y poético del mandato mejor que una perífrasis.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: Se mantiene el nombre divino del Tetragrámaton con la forma de proyecto «Yahvé», no una sustitución por título. Es la equivalencia española transparente y auditada para יְהוָה.
- source_word: מִן הָאָרֶץ
  english_pob_choice: from the earth
  chosen_spanish: desde la tierra
  alternatives_spanish:
  - desde el mundo
  - desde la tierra firme
  lexicon: HALOT
  rationale: En este himno cósmico, אֶרֶץ se refiere al ámbito terrestre en contraste con los cielos; «desde la tierra» reproduce bien ese alcance sin añadir interpretación.
- source_word: תַּנִּינִים
  english_pob_choice: sea creatures
  chosen_spanish: criaturas marinas
  alternatives_spanish:
  - monstruos marinos
  - dragones
  - serpientes marinas
  lexicon: HALOT
  rationale: תנינים puede abarcar grandes seres del mar o del caos acuático. «Criaturas marinas» preserva la referencia amplia y resulta clara en español, sin forzar la imaginería de «dragones» ni sobredeterminar «monstruos».
- source_word: תְּהֹמוֹת
  english_pob_choice: deeps
  chosen_spanish: abismos
  alternatives_spanish:
  - profundidades
  - abismos marinos
  - profundidades del mar
  lexicon: HALOT
  rationale: El plural de תהום evoca las aguas profundas primordiales. «Abismos» conserva la resonancia poética y el trasfondo acuático; en nota se explicita la alternativa «profundidades».
theological_decisions:
- issue: Renderización del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - Jehová
  rationale: Se sigue la decisión doctrinal de conservar el nombre personal de Dios revelado en el texto, evitando la sustitución por un título. «Yahvé» es el equivalente español estándar dentro de este proyecto.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Sentido poético de תַּנִּינִים y תְּהֹמוֹת
  english_pob_reading: sea creatures and all deeps
  chosen_spanish_reading: criaturas marinas y todos los abismos
  alternative_spanish_readings:
  - monstruos marinos y todos los abismos
  - dragones y todas las profundidades
  rationale: La lectura de la POB en inglés evita imponer un valor mitológico demasiado fuerte a תַּנִּינִים, pero reconoce su asociación acuática; «criaturas marinas» hace eso explícito en español. Para תְּהֹמוֹת, «abismos» mantiene la imagen de las aguas profundas sin perder el tono cósmico.
  doctrine_reference: PSA 148:7 lexical audit trail; HALOT on תַּנִּינִים / תְּהֹמוֹת
translation_notes:
  revision_awareness: La revisión inglesa más reciente eliminó «great» porque no está explícito en el hebreo; por eso el español no lo añade. También se conservó la decisión revisada de traducir תַּנִּינִים de manera transparente y no mitológica, y de mantener תְּהֹמוֹת como referencia a las aguas profundas.
  spanish_consistency_notes:
  - Se usa «Yahvé» de manera consistente para יְהוָה, conforme al estándar del proyecto.
  - Se evitó «SEÑOR» como máscara del nombre divino para no borrar la distinción textual.
  - «Criaturas marinas» mantiene la amplitud semántica de תַּנִּינִים sin sobreinterpretar.
  - «Abismos» funciona como equivalente poético de תְּהֹמוֹת; la nota preserva la alternativa «profundidades».
  - La puntuación y el imperativo plural en español conservan el tono litúrgico del hebreo.
