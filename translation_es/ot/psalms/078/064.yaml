translation:
  language: es
  text: Sus sacerdotes cayeron a filo de espada[a], y sus viudas no pudieron llorar.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «no lloraron». El hebreo dice literalmente «no lloraron», lo cual puede declarar simplemente el hecho o sugerir que la devastación no dejó oportunidad para el lamento acostumbrado.'
    reason: lexical_alternative
lexical_decisions:
- source_word: כֹּהֲנָיו
  english_pob_choice: his priests
  chosen_spanish: sus sacerdotes
  alternatives_spanish:
  - sus ministros
  lexicon: HALOT
  rationale: כֹּהֵן designa normalmente a un sacerdote. En español, «sacerdotes» conserva el oficio cultual y la fuerza histórica del juicio descrito; «ministros» sería más interpretativo y menos preciso para este término.
- source_word: בַּחֶרֶב
  english_pob_choice: by the sword
  chosen_spanish: a espada
  alternatives_spanish:
  - por la espada
  - con la espada
  lexicon: HALOT
  rationale: La preposición hebrea con «espada» expresa el instrumento o medio de muerte. «A espada» es una forma natural y fiel en español bíblico para comunicar que murieron por arma de guerra.
- source_word: נָפָלוּ
  english_pob_choice: fell
  chosen_spanish: cayeron
  alternatives_spanish:
  - fueron muertos
  - murieron
  lexicon: HALOT
  rationale: El verbo significa literalmente «caer». «Cayeron» preserva la imagen hebrea y, en este contexto bélico, comunica la muerte sin reemplazarla por una explicación más plana.
- source_word: וְאַלְמְנֹתָיו
  english_pob_choice: and his widows
  chosen_spanish: y sus viudas
  alternatives_spanish:
  - y las viudas de él
  - y sus esposas viudas
  lexicon: HALOT
  rationale: El sufijo es masculino singular, pero en español «sus viudas» expresa de modo natural la posesión y conserva la personificación singular del pueblo. «Las viudas de él» sería más literal pero torpe.
- source_word: לֹא תִבְכֶּינָה
  english_pob_choice: could not weep
  chosen_spanish: no pudieron llorar
  alternatives_spanish:
  - no lloraron
  - no podían llorar
  lexicon: HALOT
  rationale: La forma hebrea dice literalmente «no lloraron», pero el contexto de devastación sugiere imposibilidad o falta de oportunidad para el lamento. «No pudieron llorar» recoge esa fuerza contextual sin alejarse del sentido básico.
theological_decisions:
- issue: Sentido de la falta de llanto de las viudas
  english_pob_reading: 'The line expresses the disruption of normal mourning under divine judgment: the widows were unable to perform lament.'
  chosen_spanish_reading: 'La línea expresa la interrupción del lamento normal bajo juicio divino: las viudas quedaron impedidas de llorar.'
  alternative_spanish_readings:
  - Las viudas simplemente no lloraron.
  - La línea es una hipérbole poética para una devastación abrumadora.
  rationale: El hebreo admite una lectura simple («no lloraron»), pero el marco del salmo apunta a un desastre tan grande que el duelo ordinario quedó truncado. «No pudieron llorar» comunica ese efecto sin borrar la ambigüedad poética.
  doctrine_reference: Juicio divino en el Salmo 78; duelo/lamento en contexto de calamidad
- issue: Referencia pronominal singular en «sus viudas»
  english_pob_reading: The singular possessive reflects the psalm's personification of Israel/Ephraim as a singular entity.
  chosen_spanish_reading: Se conserva el posesivo plural natural «sus» en español, manteniendo la personificación singular implícita del pueblo.
  alternative_spanish_readings:
  - sus viudas
  - las viudas de él
  rationale: El hebreo usa sufijo singular masculino; el español exige aquí una solución idiomática. «Sus» no elimina la referencia corporativa/personificada y evita una construcción poco natural.
  doctrine_reference: Personificación del pueblo en la poesía bíblica
translation_notes:
  revision_awareness: Se ha seguido el dictamen de alta concordancia del audit trail inglés sin cambios necesarios en la lectura base; la principal decisión en español fue mantener la imagen hebrea de caída y la fuerza contextual de la imposibilidad de llorar.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma del proyecto cuando corresponda; este versículo no contiene el tetragrámaton.
  - Se usa «sacerdotes» para כֹּהֲנָיו, conforme al valor léxico normal del término.
  - Se conserva un español sobrio y bíblico sin recurrir a fórmulas eclesiásticas añadidas.
