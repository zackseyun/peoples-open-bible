source:
  edition: WLC
  text: וָ/אֲטַמֵּ֤א אוֹתָ/ם֙ בְּ/מַתְּנוֹתָ֔/ם בְּ/הַעֲבִ֖יר כָּל פֶּ֣טֶר רָ֑חַם לְמַ֣עַן אֲשִׁמֵּ֔/ם לְמַ֨עַן֙ אֲשֶׁ֣ר יֵֽדְע֔וּ אֲשֶׁ֖ר אֲנִ֥י יְהוָֽה־׃ס
base_translation:
  language: en
  yaml_path: translation/ot/ezekiel/020/026.yaml
  text: And I defiled them through their gifts[a], by making every firstborn pass through the fire, so that I might devastate them[d][c][b], so that they might know that I am Yahweh.
  footnotes:
  - marker: a
    text: Literally, 'every opener of the womb.' This Hebrew idiom refers to every firstborn.
    reason: lexical_alternative
  - marker: b
    text: Or 'I made them unclean' / 'I polluted them.'
    reason: lexical_alternative
  - marker: c
    text: The phrase 'made ... pass through' refers to the ritual passing over of the firstborn, likely alluding to child sacrifice.
    reason: cultural_note
  - marker: d
    text: Or 'so that I might make them desolate' or 'so that I might horrify them.'
    reason: lexical_alternative
