translation:
  language: es
  text: 'Y los jefes[a] de todo el pueblo, de todas las tribus de Israel, tomaron su puesto en la asamblea del pueblo de Dios: cuatrocientos mil soldados de a pie que desenvainaban la espada.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebreo literalmente «las esquinas de todo el pueblo», un modismo para los jefes o los hombres principales.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּתְיַצְּבוּ
  english_pob_choice: took their stand
  chosen_spanish: se pusieron de pie
  alternatives_spanish:
  - tomaron su puesto
  - se presentaron
  - se plantaron
  lexicon: HALOT
  rationale: El hitpael de יצב expresa colocarse firmemente o ponerse en posición. «Se pusieron de pie» conserva la idea de postura resuelta y de disponibilidad para una acción pública o militar, sin sonar forzado en español.
- source_word: פִּנּוֹת
  english_pob_choice: chiefs
  chosen_spanish: jefes
  alternatives_spanish:
  - líderes
  - principales
  - jefes principales
  lexicon: HALOT
  rationale: El hebreo dice literalmente «las esquinas» de todo el pueblo, un modismo para los hombres prominentes o de apoyo estructural. «Jefes» comunica bien la función de liderazgo en español, manteniendo la nota idiomática en la información de apoyo.
- source_word: כָּל הָעָם
  english_pob_choice: all the people
  chosen_spanish: todo el pueblo
  alternatives_spanish:
  - todo el pueblo entero
  - la totalidad del pueblo
  lexicon: HALOT
  rationale: La expresión es directa y colectiva; «todo el pueblo» refleja la amplitud del grupo reunido sin añadir matices innecesarios.
- source_word: כֹּל שִׁבְטֵי יִשְׂרָאֵל
  english_pob_choice: all the tribes of Israel
  chosen_spanish: de todas las tribus de Israel
  alternatives_spanish:
  - de todas las tribus de Israel
  - todas las tribus de Israel
  lexicon: HALOT
  rationale: Se conserva la aclaración appositiva que identifica quiénes integran «todo el pueblo». «De todas las tribus de Israel» es natural y fiel a la estructura hebrea.
- source_word: בִּקְהַל
  english_pob_choice: in the assembly
  chosen_spanish: en la asamblea
  alternatives_spanish:
  - en la congregación
  - en la reunión
  lexicon: HALOT
  rationale: קהל designa una reunión convocada. «Asamblea» es claro, moderno y suficientemente solemne; «congregación» podría sonar eclesiástico de forma no requerida por el contexto.
- source_word: עַם הָאֱלֹהִים
  english_pob_choice: the people of God
  chosen_spanish: el pueblo de Dios
  alternatives_spanish:
  - el pueblo de Dios
  - el pueblo perteneciente a Dios
  lexicon: HALOT
  rationale: La construcción posesiva se mantiene de manera transparente. «El pueblo de Dios» preserva la resonancia covenantal sin sobreexplicar.
- source_word: אִישׁ רַגְלִי
  english_pob_choice: foot soldiers
  chosen_spanish: hombres de a pie
  alternatives_spanish:
  - soldados de infantería
  - hombres a pie
  lexicon: HALOT
  rationale: La expresión hebrea significa literalmente «hombre de pie/pie», en contraste con tropas montadas. «Hombres de a pie» conserva la distinción militar y evita un tecnicismo innecesario.
- source_word: שֹׁלֵף חָרֶב
  english_pob_choice: drawing the sword
  chosen_spanish: portadores de espada
  alternatives_spanish:
  - desenvainando la espada
  - que desenvainan la espada
  - armados con espada
  lexicon: HALOT
  rationale: El participio singular es distributivo y describe a los combatientes como personas armadas y listas para la acción. «Portadores de espada» mantiene la imagen marcial de forma sobria en español, aunque la alternativa más literal «desenvainando la espada» también es posible.
theological_decisions:
- issue: Renderización de עַם הָאֱלֹהִים
  english_pob_reading: the people of God
  chosen_spanish_reading: el pueblo de Dios
  alternative_spanish_readings:
  - el pueblo perteneciente a Dios
  rationale: La frase identifica a Israel en relación de pacto con Dios. No hay controversia doctrinal, pero conviene mantener la estructura solemne y transparente del hebreo.
  doctrine_reference: Pacto / identidad del pueblo de Dios
translation_notes:
  revision_awareness: 'Se ha seguido el sentido revisado del inglés POB: se conserva la lectura distributiva sin añadir un «cada uno» explícito, y se mantiene un registro formal y sobrio para la descripción militar. También se respeta la solución ya depurada para שֹׁלֵף חָרֶב, evitando una expansión innecesaria.'
  spanish_consistency_notes:
  - Se usó «Dios» en lugar de una paráfrasis más larga para עַם הָאֱלֹהִים, manteniendo la terminología POB.
  - Se prefirió «asamblea» a «congregación» por claridad y por evitar una carga eclesiástica ajena al contexto.
  - «Jefes» se eligió como equivalente funcional de פִּנּוֹת, con nota explicativa para no perder el modismo hebreo.
  - La frase final se ajustó para sonar natural en español sin introducir un equivalente demasiado técnico como «infantería».
