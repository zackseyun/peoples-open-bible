    rationale: El inglés auditado ancla primero la alternativa de «rejoice/exult» y luego la de «fear/reverence». En español, si se conservan ambas notas, deben aparecer con marcadores únicos en orden y en los términos pertinentes del texto.
  - severity: low
    issue: La nota «O «con exultación» para «alégrense»» usa una alternativa poco natural por desajuste de categoría verbal/nominal.
    rationale: «Alégrense» es verbo imperativo; la alternativa debe conservar esa función. «Regocíjense» o «exulten» representan mejor la alternativa léxica documentada.
  revised_spanish_text: Sirvan a Yahvé con temor[b][a], y alégrense con temblor.
