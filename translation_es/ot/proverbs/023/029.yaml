translation:
  language: es
  text: ¿Quién tiene ay? ¿Quién tiene pena[a]? ¿Quién tiene contiendas? ¿Quién tiene quejas? ¿Quién tiene heridas sin causa[b]? ¿Quién tiene enrojecimiento de los ojos[c]?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «aflicción» para אֲבוֹי, preservando el matiz de lamento del hebreo.
    reason: lexical_alternative
  - marker: b
    text: O «sin motivo» o «de balde» para חִנָּם.
    reason: lexical_alternative
  - marker: c
    text: O «ojos enrojecidos» o «ojos inyectados de sangre» para «enrojecimiento de los ojos».
    reason: lexical_alternative
lexical_decisions:
- source_word: א֥וֹי
  english_pob_choice: woe
  chosen_spanish: ay
  alternatives_spanish:
  - ¡ay!
  - dolor
  - desgracia
  lexicon: HALOT
  rationale: Como interjección de lamento o aflicción, 'ay' conserva mejor que un sustantivo la fuerza breve y proverbial del hebreo.
- source_word: אֲב֡וֹי
  english_pob_choice: sorrow
  chosen_spanish: dolor
  alternatives_spanish:
  - pena
  - tristeza
  - lamento
  lexicon: HALOT
  rationale: Se distingue de 'ay' manteniendo el paralelismo lamentoso. 'Dolor' comunica sufrimiento interior sin volver la línea demasiado interpretativa.
- source_word: מדונים
  english_pob_choice: strife
  chosen_spanish: contiendas
  alternatives_spanish:
  - pleitos
  - riñas
  - disputas
  lexicon: HALOT
  rationale: El plural sugiere conflictos repetidos; 'contiendas' conserva el matiz de choques y disputas en un registro sapiencial.
- source_word: שִׂ֗יחַ
  english_pob_choice: complaining
  chosen_spanish: quejas
  alternatives_spanish:
  - murmuración
  - habla amarga
  - lamentación
  lexicon: HALOT
  rationale: Aquí el campo semántico admite habla, queja o meditación afligida. 'Quejas' encaja con la secuencia de efectos sociales y físicos sin imponer un sentido más estrecho.
- source_word: פְּצָעִ֣ים
  english_pob_choice: wounds
  chosen_spanish: heridas
  alternatives_spanish:
  - llagas
  - lesiones
  lexicon: HALOT
  rationale: Término corporal concreto. 'Heridas' es la equivalencia natural y fiel.
- source_word: חִנָּ֑ם
  english_pob_choice: for nothing
  chosen_spanish: sin causa
  alternatives_spanish:
  - de balde
  - sin motivo
  - gratuitamente
  lexicon: HALOT
  rationale: El hebreo puede indicar gratuidad o ausencia de causa. Se mantiene la tensión con una nota alternativa, y en el texto 'sin causa' preserva mejor la idea de daño injustificado.
- source_word: חַכְלִל֥וּת עֵינָֽיִם
  english_pob_choice: redness of eyes
  chosen_spanish: enrojecimiento de los ojos
  alternatives_spanish:
  - ojos enrojecidos
  - ojos colorados
  - ojos inyectados de sangre
  lexicon: HALOT
  rationale: La expresión hebrea describe el aspecto alterado de los ojos, asociado al exceso de bebida. 'Enrojecimiento de los ojos' sigue de cerca la forma del original sin forzar una expresión demasiado coloquial.
- source_word: לְ/מִי
  english_pob_choice: Who has
  chosen_spanish: ¿Quién tiene... ?
  alternatives_spanish:
  - ¿De quién es... ?
  - ¿A quién le toca... ?
  lexicon: HALOT
  rationale: La pregunta retórica idiomática se rinde naturalmente en español con '¿Quién tiene...?', manteniendo el valor proverbial de la serie.
translation_notes:
  revision_awareness: Coincide con la revisión más reciente sin cambios sustanciales; se mantiene la estructura interrogativa repetida y la lista proverbial de consecuencias, con una formulación española natural y auditable.
  spanish_consistency_notes:
  - Se mantuvo 'Yahvé' no aplicable aquí porque el verso no contiene el nombre divino.
  - Se preservó el paralelismo por medio de preguntas repetidas con '¿Quién tiene...?'
  - Se evitó 'SEÑOR' y también 'Cristo/Mesías' por no aparecer en el texto.
  - '''Contiendas'' y ''quejas'' conservan un registro sapiencial amplio sin sobreinterpretar el hebreo.'
  - La puntuación con múltiples interrogaciones sigue la estructura acumulativa del hebreo y del inglés auditado.
