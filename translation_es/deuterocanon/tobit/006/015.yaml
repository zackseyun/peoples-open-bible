review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue de cerca el griego y el rastro POB en la mayoría de los puntos: ''el único hijo'', ''un demonio'', ''la ama'', y la cláusula final sobre no tener otro hijo que los sepulte están bien alineados. Sin embargo, hay dos fallas importantes de fidelidad/claridad: (1) la nota [a] está anclada en ''único hijo'' pero su contenido explica ''los anteriores'', por lo que el anclaje de nota es incorrecto; (2) ''llevaré la vida de mi padre y de mi madre... hasta su sepulcro'' suena poco natural y además debilita el valor idiomático de κατάξω, que aquí expresa causarles la muerte en dolor por causa de él. También ''en dolor'' es menos natural que ''con dolor'' o ''en duelo''.'
  spanish_quality_summary: El español es generalmente comprensible y digno, pero presenta torpeza en la segunda mitad del versículo. 'Llevaré la vida...' no suena idiomático en español bíblico actual, y la nota [a] mal ubicada confunde la lectura. 'Perjudica' es aceptable, aunque 'daña' o 'hace daño' sería más directo; no obstante no exige cambio por sí solo. La revisión propuesta mejora naturalidad sin apartarse del griego.
  glossary_alignment: No hay conflictos con la terminología del proyecto. 'Demonio' refleja bien δαιμόνιον. No aparecen términos sensibles como Yahvé/Mesías/esclavo. La decisión 'la ama' preserva correctamente φιλεῖ con la nota explicativa sobre apego posesivo.
  issues:
  - severity: high
    issue: La nota [a] está colocada en la frase equivocada.
    rationale: El marcador [a] aparece tras 'mi padre', pero la nota habla de la alternativa para οἱ πρότεροι ('los anteriores' / 'los de antes'). Esto rompe la trazabilidad entre texto y nota y debe corregirse.
  - severity: medium
    issue: La frase 'llevaré la vida de mi padre y de mi madre... hasta su sepulcro' es poco natural en español.
    rationale: Aunque intenta conservar la imagen griega, en español resulta forzada y puede sonar como traslado físico de 'la vida'. El sentido idiomático, ya documentado en el POB inglés, es causarles la muerte en duelo por causa de él.
  - severity: medium
    issue: '''en dolor'' no es la mejor opción idiomática para μετʼ ὀδύνης.'
    rationale: En español neutro de lectura eclesial, 'con dolor', 'en duelo' o 'de dolor' suenan más naturales y comunican mejor la pena intensa del pasaje.
  revised_spanish_text: Y ahora yo soy el único hijo de mi padre, y temo que, si entro, moriré, como también los anteriores[a]; porque un demonio la ama[b], y no daña a nadie, salvo a los que vienen a ella. Y ahora temo morir y hacer que la vida de mi padre y de mi madre descienda con dolor, por causa de mí, a su sepulcro[c]; y no tienen otro hijo que los sepulte.
  revised_footnotes:
