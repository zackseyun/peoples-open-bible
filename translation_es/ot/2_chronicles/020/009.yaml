    reason: lexical_alternative
  revision_rationale: 'Se corrigieron tres puntos para alinearse mejor con el hebreo y con el rastro POB: «desastre» refleja mejor רָעָה en este contexto de calamidad; «nos pondremos en pie» expresa adecuadamente la respuesta comprometida en la condición; y «hambruna» comunica mejor רָעָב como escasez colectiva severa. Se mantuvo «casa» y el modismo principal «tu nombre está en esta casa», añadiendo la nota alternativa ya documentada en inglés.'
