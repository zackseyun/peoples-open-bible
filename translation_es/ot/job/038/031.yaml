translation:
  language: es
  text: ¿Puedes atar[a][b] las cadenas de las Pléyades, o aflojar las cuerdas de Orión[c]?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Atar» conserva la imagen de sujeción; también podría traducirse «amarrar» o «ligar».
    reason: lexical_alternative
  - marker: b
    text: O «bandas» para ambos términos de ligadura; el hebreo usa dos imágenes afines de restricciones o conexiones celestes.
    reason: lexical_alternative
  - marker: c
    text: כְּסִיל probablemente nombra a Orión aquí; en otros contextos puede significar «necio».
    reason: lexical_alternative
lexical_decisions:
- source_word: הֲתְקַשֵּׁר
  english_pob_choice: Can you bind
  chosen_spanish: ¿Puedes atar
  alternatives_spanish:
  - ¿Puedes amarrar
  - ¿Puedes ligar
  lexicon: HALOT
  rationale: La forma interrogativa retórica pide una traducción natural en español que exprese imposibilidad humana. «Atar» comunica la acción básica de sujetar o unir con ligaduras y, en este contexto cósmico, conserva la fuerza del verbo mejor que una paráfrasis más interpretativa.
- source_word: מַעֲדַנּוֹת
  english_pob_choice: the chains
  chosen_spanish: las cadenas
  alternatives_spanish:
  - las bandas
  - los lazos
  - las ataduras
  lexicon: HALOT
  rationale: El sustantivo raro se entiende aquí como algo que une o restringe, en paralelo con «cuerdas». «Cadenas» expresa con claridad moderna la imagen de vínculos de sujeción, sin depender de la antigua lectura interpretativa de «influencias suaves».
- source_word: כִּימָה
  english_pob_choice: the Pleiades
  chosen_spanish: las Pléyades
  alternatives_spanish:
  - el cúmulo de las Pléyades
  lexicon: HALOT
  rationale: Se trata de un nombre astronómico propio. En español, la equivalencia convencional es «las Pléyades», que conserva la referencia a la constelación/cúmulo estelar reconocible para el lector.
- source_word: מֹשְׁכ֖וֹת
  english_pob_choice: the cords
  chosen_spanish: las cuerdas
  alternatives_spanish:
  - los cordeles
  - las ligaduras
  lexicon: HALOT
  rationale: El término denota algo extendido para tirar o sujetar. «Cuerdas» mantiene la imagen concreta y el paralelismo con «cadenas» en la primera mitad del verso.
- source_word: כְּסִיל
  english_pob_choice: Orion
  chosen_spanish: Orión
  alternatives_spanish:
  - el necio
  lexicon: HALOT
  rationale: En este contexto astronómico, el sentido propio es el nombre de la constelación. «Orión» es la equivalencia estándar en español y preserva el paralelo con «Pléyades».
- source_word: תְּפַתֵּֽחַ
  english_pob_choice: loosen
  chosen_spanish: soltar
  alternatives_spanish:
  - desatar
  - aflojar
  lexicon: HALOT
  rationale: Aunque el verbo básico puede significar «abrir», aquí con objetos de sujeción la idea es liberar. «Soltar» es natural en español y mantiene el contraste con «atar».
theological_decisions:
- issue: Lectura de כְּסִיל como nombre astronómico frente a sentido común 'necio'
  english_pob_reading: Orion
  chosen_spanish_reading: Orión
  alternative_spanish_readings:
  - el necio
  rationale: La estructura del versículo enumera cuerpos celestes en paralelo con las Pléyades; por eso se conserva el nombre astronómico. Traducir «el necio» rompería el paralelismo y no encaja con el contexto poético.
  doctrine_reference: Job 38:31; uso contextual y poético del término
- issue: Imagen de restricción celeste en vez de una lectura figurada moral
  english_pob_reading: chains / cords
  chosen_spanish_reading: cadenas / cuerdas
  alternative_spanish_readings:
  - lazos / ataduras
  rationale: El hebreo presenta imágenes concretas de amarre y liberación. La traducción debe preservar esa tensión poética sin moralizarla ni espiritualizarla.
  doctrine_reference: Job 38:31; poesía sapiencial
- issue: Uso de nombres astronómicos establecidos en español
  english_pob_reading: the Pleiades / Orion
  chosen_spanish_reading: las Pléyades / Orión
  alternative_spanish_readings:
  - las Cabrillas / el Escorpión
  rationale: La equivalencia estándar en español bíblico y astronómico hace transparente el paralelo del texto. Otras equivalencias populares regionales no se prefieren aquí por falta de universalidad.
  doctrine_reference: Job 38:31; referencia cultural y astronómica
translation_notes:
  revision_awareness: 'La revisión más reciente indicó que no se requerían cambios y el cotejo cruzado mostró alto acuerdo. Se mantuvo la solución léxica ya validada: verbos concretos de sujeción/liberación, nombres astronómicos estándar y sin incorporar la antigua lectura de «sweet influences».'
  spanish_consistency_notes:
  - Se preservó el paralelismo verbal atar/soltar para reflejar bind/loosen.
  - Se mantuvo el registro poético y retórico del versículo, sin añadir explicaciones al cuerpo principal.
  - Se usaron nombres astronómicos consolidados en español para asegurar inteligibilidad y correspondencia contextual.
