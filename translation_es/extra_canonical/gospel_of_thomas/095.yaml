base_translation:
  language: en
  yaml_path: translation/extra_canonical/gospel_of_thomas/095.yaml
  text: Jesus said[a], “If you have money, do not lend at interest; rather[f][e][d][c][b], give it to the one from whom you will not take it back.”
  footnotes:
  - marker: a
    text: ‘Interest’ renders Coptic ⲙⲏⲥⲉ (Crum s.v.), often equivalent to ‘usury’ in antiquity; historically ‘usury’ meant any interest, not just excessive rates.
    reason: cultural_note
  - marker: b
    text: The object pronoun is plural (‘them’), likely because ‘money’ is conceptualized as coins; the translation preserves the plural in ‘them back’.
    reason: dialect_note
  - marker: c
    text: 'The recipient phrase is uncertain: the manuscript shows possible ⲙ[ⲙⲟϥ] (‘give it’), while the normalized text reads ϯ ⲛⲛⲧⲟϥ (‘give to him’). The overall sense—directing the gift to a particular kind of person defined by the relative clause—is unchanged.'
    reason: textual_variant
  - marker: d
    text: ‘Jesus said’ at the start is restored due to minor damage in NHAM02.48/lb35.
    reason: lacuna_or_restoration
  - marker: e
    text: The relative clause can also be rendered ‘to one who will not give them back to you’; the chosen translation follows the common reading ‘from whom you will not take them back’.
    reason: lexical_alternative
  - marker: f
    text: Or 'give to the one from whom you will not take them back.'.
    reason: previous_rendering
