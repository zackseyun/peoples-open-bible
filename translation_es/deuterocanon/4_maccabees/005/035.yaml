review_pass:
  verdict: revise
  source_alignment_summary: El borrador conserva la estructura de vocativos personificados y el sentido general de no avergonzar ni renunciar a esos ideales. Sin embargo, φιλόσοφε λόγε no se preserva fielmente como «filosofía»; λόγε exige «razón» o equivalente, y el inglés auditado fijó «philosophical reason». Además, «te renunciaré» no es español natural con objeto directo personal; aquí conviene «renegaré de ti» o «te repudiaré».
  spanish_quality_summary: 'El texto actual suena forzado en dos puntos clave: «oh filosofía» borra un componente semántico central del griego, y «te renunciaré» es poco idiomático. Una reparación breve puede mejorar fidelidad y legibilidad sin alterar la retórica elevada del versículo.'
  glossary_alignment: 'No hay conflictos con la terminología principal del proyecto. «Sacerdocio» y «conocimiento de la ley» están bien alineados. La corrección principal es léxica: φιλόσοφε λόγε debe reflejar «razón filosófica», no solo «filosofía».'
  issues:
  - severity: high
    issue: «filosofía» para φιλόσοφε λόγε
    rationale: El griego contiene λόγε, ‘razón/discurso’, no el sustantivo abstracto ‘filosofía’. El borrador pierde una parte esencial del sintagma personificado y se aparta de la decisión auditada «philosophical reason».
  - severity: medium
    issue: «te renunciaré» es poco natural en español
    rationale: Aunque intenta reflejar ‘renounce you’, en español estándar no suena idiomático con objeto directo personal. «Renegaré de ti» expresa mejor una renuncia fuerte de lealtad y encaja con ἑξαρνήσομαί.
  - severity: low
    issue: Nota alternativa [b] demasiado técnica y pesada
    rationale: «Oficio sacerdotal honrado y conocimiento experto de la ley» es posible, pero «sacerdocio estimado y pericia en la ley» o similar comunica mejor la alternativa sin rigidez innecesaria.
  revised_spanish_text: Ni te avergonzaré, oh razón filosófica[a], ni renegaré de ti[b], sacerdocio honrado y conocimiento de la ley.
