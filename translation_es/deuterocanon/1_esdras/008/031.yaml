translation:
  language: es
  text: De los hijos de Pahat-moab[a], Eliaonías hijo de Zareú, y con él doscientos hombres;
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El griego dice ‘Eliaonías hijo de Zareú’; el paralelo hebreo en Esdras 8:4 tiene ‘Elihoenai hijo de Zeraías’.
    reason: alternative_reading
lexical_decisions:
- source_word: ἐκ τῶν Μααθμωάβ
  english_pob_choice: From the sons of Pahath-moab
  chosen_spanish: De los hijos de Pahat-moab
  alternatives_spanish:
  - De los descendientes de Pahat-moab
  - De Maat-moab
  lexicon: LSJ
  rationale: El griego Μααθμωάβ corresponde al nombre/clan conocido en el paralelo hebreo de Esdras 8:4. En español, ‘hijos de Pahat-moab’ comunica naturalmente el valor de pertenencia/clan y evita tratar la forma griega como un topónimo opaco.
- source_word: Ἐλιαλωνίας
  english_pob_choice: Eliaonias
  chosen_spanish: Eliaonías
  alternatives_spanish:
  - Eli(a)lonías
  - Elihoenai
  lexicon: LSJ
  rationale: Se conserva la transliteración basada en el testimonio griego primario. La forma hebrea paralela sugiere ‘Elihoenai’, pero no debe reemplazar la lectura griega en el texto principal.
- source_word: Ζαραιου
  english_pob_choice: Zareou
  chosen_spanish: Zareú
  alternatives_spanish:
  - Zaraíu
  - Zerahías
  lexicon: LSJ
  rationale: Como en el nombre anterior, se sigue la forma griega con transliteración al español. Se mantiene la referencia auditada al paralelo hebreo, pero sin sustituir el nombre del texto griego.
- source_word: καὶ μετʼ αὐτοῦ
  english_pob_choice: and with him
  chosen_spanish: y con él
  alternatives_spanish:
  - y acompañándolo
  - y junto con él
  lexicon: BDAG
  rationale: La frase se vierte de manera directa y natural en español, conservando la estructura de lista del versículo.
- source_word: ἄνδρες διακόσιοι
  english_pob_choice: two hundred men
  chosen_spanish: doscientos hombres
  alternatives_spanish:
  - doscientos varones
  - doscientos hombres adultos
  lexicon: BDAG
  rationale: ἄνδρες aquí significa ‘hombres’; ‘hombres’ es la forma más directa y natural en español para este contexto de enumeración.
translation_notes:
  revision_awareness: La versión mantiene el anclaje en el griego de Swete 1909 y refleja la decisión auditada de conservar la transliteración griega principal, con el paralelo hebreo solo como apoyo identificador para los nombres propios.
  spanish_consistency_notes:
  - Se usa ‘hijos de’ para el clan/familia, siguiendo el valor de pertenencia del paralelo semítico sin forzar una paráfrasis.
  - Se conserva la transliteración griega de los nombres propios en el texto principal, reservando la forma hebrea paralela para la nota.
  - El cierre numérico ‘doscientos hombres’ reproduce el orden y la sobriedad del listado griego.
