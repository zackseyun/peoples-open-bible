review_pass:
  verdict: revise
  source_alignment_summary: El borrador refleja bien la estructura temporal del hebreo, la coordinación entre querubines y ruedas, y la idea de que las ruedas no se separan del lado de los querubines. Sin embargo, la colocación de «también» con «no» en «también no se apartaban» suena poco natural en español y debilita la claridad del énfasis de גַּם הֵם. Además, la nota al pie actual repite la traducción principal en vez de preservar la alternativa inglesa documentada («no giraban / no se volvían de junto a ellos»).
  spanish_quality_summary: El español es generalmente claro y digno, pero requiere un ajuste menor de naturalidad sintáctica. «Las ruedas tampoco se apartaban…» o «las ruedas no se apartaban tampoco…» suena más idiomático que «también no». El resto del verso es legible y fiel al tono visionario.
  glossary_alignment: No hay conflictos con la terminología base del proyecto. «Querubines», «ruedas», «alas» y «elevarse» son adecuados. La decisión de usar «se apartaban» para לֹא יִסַּבּוּ es aceptable si la nota preserva la alternativa más cercana a «no giraban / no se volvían de junto a ellos».
  issues:
  - severity: medium
    issue: Colocación poco natural de «también» con la negación
    rationale: «Las ruedas también no se apartaban» no es la formulación idiomática normal en español bíblico contemporáneo. גַּם הֵם se expresa mejor como «las ruedas tampoco…» o «las ruedas no se apartaban tampoco…».
  - severity: medium
    issue: La nota al pie no preserva la alternativa léxica del inglés auditado
    rationale: La nota dice «O ‘no se apartaban de junto a ellos’», que esencialmente duplica la redacción principal. La auditoría inglesa preserva una alternativa más cercana a «did not turn from beside them», por lo que la nota española debe reflejar esa posibilidad, por ejemplo «O ‘no se volvían de junto a ellos’».
  revised_spanish_text: Cuando los querubines se movían[a], las ruedas se movían junto a ellos; y cuando los querubines levantaban sus alas para elevarse de la tierra, las ruedas tampoco se apartaban de junto a ellos.
  revised_footnotes:
  - marker: a
    text: O «no se volvían de junto a ellos». El hebreo recalca que las ruedas no dejaban el lado de los querubines al elevarse estos.
    reason: lexical_alternative
  revision_rationale: Se hizo una reparación menor para mejorar la naturalidad del español y alinear la nota con la alternativa léxica documentada en la auditoría inglesa, sin cambiar el sentido básico del verso.
