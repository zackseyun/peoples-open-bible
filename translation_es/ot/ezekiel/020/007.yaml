translation:
  language: es
  text: 'Y les dije[a]: «Que cada uno arroje las cosas detestables delante de sus ojos, y no se contaminen con los ídolos de Egipto[b]. Yo soy Yahvé, su Dios»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «las cosas detestables de sus ojos», un giro idiomático para los objetos abominables que cada persona contempla o desea; probablemente se trata de objetos idolátricos.'
    reason: lexical_alternative
  - marker: b
    text: El término hebreo para «ídolos» aquí es muy despectivo en Ezequiel; también podría expresarse como «ídolos inmundos» o, más literalmente, «ídolos de estiércol».
    reason: lexical_alternative
lexical_decisions:
- source_word: וָאֹמַר
  english_pob_choice: And I said
  chosen_spanish: Y les dije
  alternatives_spanish:
  - Entonces les dije
  - Y dije
  lexicon: HALOT
  rationale: La forma narrativa con waw consecutiva introduce una acción pasada enlazada al contexto. «Y les dije» conserva la secuencia y el destinatario explícito sin añadir matiz innecesario.
- source_word: אִישׁ
  english_pob_choice: Each man
  chosen_spanish: Cada uno
  alternatives_spanish:
  - Cada hombre
  - Todo hombre
  lexicon: HALOT
  rationale: El hebreo usa un singular distributivo antes de mandatos plurales. «Cada uno» expresa bien la distribución individual en español neutral; evita una marcación de género más fuerte que la exigida por el contexto.
- source_word: שִׁקּוּצֵי עֵינָיו
  english_pob_choice: the detestable things before his eyes
  chosen_spanish: las cosas detestables delante de sus ojos
  alternatives_spanish:
  - las abominaciones delante de sus ojos
  - los objetos detestables ante sus ojos
  - las cosas detestables de sus ojos
  lexicon: HALOT
  rationale: Se conserva la imagen hebrea de algo colocado ante la vista, pero en español se formula de manera natural como «delante de sus ojos». «Cosas detestables» refleja שִׁקּוּץ sin endurecerlo con un calco innecesario como «abominaciones».
- source_word: הַשְׁלִיכוּ
  english_pob_choice: throw away
  chosen_spanish: arroje lejos de sí
  alternatives_spanish:
  - arrojen
  - echen fuera
  - tiren lejos
  lexicon: HALOT
  rationale: El imperativo exige rechazo decisivo. «Arroje lejos de sí» mantiene la fuerza verbal y explicita la separación personal que implica el mandato.
- source_word: גִּלּוּלֵי מִצְרַיִם
  english_pob_choice: the idols of Egypt
  chosen_spanish: los ídolos de Egipto
  alternatives_spanish:
  - los ídolos inmundos de Egipto
  - los ídolos sucios de Egipto
  - los ídolos de estiércol de Egipto
  lexicon: HALOT
  rationale: גִּלּוּלִים es un término despectivo para ídolos. «Ídolos» comunica el referente principal con claridad; el tono peyorativo queda en el conjunto del versículo y puede explicarse en nota si se desea.
- source_word: אַל תִּטַּמָּאוּ
  english_pob_choice: do not defile yourselves
  chosen_spanish: no se contaminen
  alternatives_spanish:
  - no se manchen
  - no se vuelvan impuros
  - no se hagan impuros
  lexicon: HALOT
  rationale: La forma reflexiva expresa contaminación ritual/moral por idolatría. «No se contaminen» es natural en español y conserva el valor de impurificación sin excesiva tecnificación.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  - el SEÑOR
  lexicon: HALOT
  rationale: 'Se sigue el criterio del proyecto para el Tetragrámaton: transliteración del nombre divino, no sustitución por un título. «Yahvé» es la forma española establecida en este marco.'
- source_word: אֱלֹהֵיכֶם
  english_pob_choice: your God
  chosen_spanish: su Dios
  alternatives_spanish:
  - su Dios
  - vuestro Dios
  lexicon: HALOT
  rationale: Aunque el hebreo conserva la referencia de pacto con Israel, en español moderno latinoamericano «su Dios» es más amplio y natural que «vuestro Dios». La relación posesiva/covenantal sigue clara por el contexto.
theological_decisions:
- issue: Idiomatic rendering of שִׁקּוּצֵי עֵינָיו
  english_pob_reading: the detestable things before his eyes
  chosen_spanish_reading: las cosas detestables delante de sus ojos
  alternative_spanish_readings:
  - las abominaciones delante de sus ojos
  - los objetos detestables ante sus ojos
  rationale: La frase hebrea parece referirse a objetos idólatras deseados o contemplados. En español se preserva la imagen sin convertirla en paráfrasis explicativa; «delante de sus ojos» mantiene el valor idiomático resaltado en el audit trail.
  doctrine_reference: Translation philosophy §§1, 3, 4, 6
- issue: Renderizing Ezekiel’s contemptuous term גִּלּוּלִים
  english_pob_reading: the idols of Egypt
  chosen_spanish_reading: los ídolos de Egipto
  alternative_spanish_readings:
  - los ídolos inmundos de Egipto
  - los ídolos de estiércol de Egipto
  rationale: El término hebreo es despectivo, pero la línea principal debe seguir siendo legible. Se mantiene «ídolos» en el texto y se deja abierta la posibilidad de anotar el matiz peyorativo sin sobrecargar la lectura.
  doctrine_reference: Translation philosophy §§1, 6
- issue: Divine name יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - el Señor
  rationale: Se conserva el nombre propio divino conforme al estándar del proyecto y frente a la sustitución tradicional por un título. Esto mantiene visible el uso del Tetragrámaton en la fuente hebrea.
  doctrine_reference: Project terminology defaults
translation_notes:
  revision_awareness: Se siguió la revisión más reciente del audit trail que prefirió la expresión más natural y precisa «before his eyes» para el hebreo שִׁקּוּצֵי עֵינָיו. La versión española conserva esa misma relación idiomática con «delante de sus ojos», mantiene el tono imperativo y no introduce paráfrasis ajenas al texto fuente.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» para יְהוָה conforme al criterio del proyecto.
  - Se prefirió «Dios» en la fórmula final por la naturaleza singular/covenantal de אֱלֹהֵיכֶם en este contexto.
  - Se evitó «abominaciones» en el texto principal para no endurecer innecesariamente el estilo; el matiz queda disponible en la nota.
  - Se optó por un español neutral latinoamericano, con «su Dios» en vez de «vuestro Dios» para mayor naturalidad y amplitud eclesial.
