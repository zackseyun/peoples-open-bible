translation:
  language: es
  text: Así que se levantaron y huyeron al anochecer[a], y dejaron sus tiendas, sus caballos y sus asnos, el campamento tal como estaba[b], y huyeron para salvar sus vidas[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «al atardecer» / «al crepúsculo».
    reason: lexical_alternative
  - marker: b
    text: Literalmente, «el campamento tal como era», es decir, lo dejaron tal como lo encontraron.
    reason: lexical_alternative
  - marker: c
    text: Literalmente, «huyeron a sus vidas», un giro idiomático que significa «huyeron para salvar sus vidas».
    reason: lexical_alternative
lexical_decisions:
- source_word: בַנֶּשֶׁף
  english_pob_choice: at twilight
  chosen_spanish: al anochecer
  alternatives_spanish:
  - al crepúsculo
  - al atardecer
  - en el crepúsculo
  lexicon: HALOT
  rationale: נֶשֶׁף designa el tiempo de luz tenue entre el día y la noche. «Al anochecer» comunica de manera natural ese tramo temporal en español, sin precisar indebidamente si se trata de tarde o madrugada.
- source_word: וַיַּעַזְבוּ
  english_pob_choice: they left
  chosen_spanish: dejaron
  alternatives_spanish:
  - abandonaron
  - dejaron atrás
  - se desentendieron de
  lexicon: HALOT
  rationale: עזב puede significar ‘dejar’, ‘abandonar’ o ‘desamparar’. En este contexto de huida militar, «dejaron» mantiene la sencillez del original y deja que el contexto aporte la idea de abandono.
- source_word: אָהֳלֵיהֶם
  english_pob_choice: their tents
  chosen_spanish: sus tiendas
  alternatives_spanish:
  - sus tiendas de campaña
  lexicon: HALOT
  rationale: El sentido literal es el de tiendas en un campamento; «tiendas» es fiel, natural y suficientemente claro en español bíblico contemporáneo.
- source_word: סוּסֵיהֶם
  english_pob_choice: their horses
  chosen_spanish: sus caballos
  alternatives_spanish:
  - sus monturas
  lexicon: HALOT
  rationale: Equivalencia léxica directa para סוסים. «Caballos» conserva el referente concreto del texto sin introducir generalización.
- source_word: חֲמֹרֵיהֶם
  english_pob_choice: their donkeys
  chosen_spanish: sus asnos
  alternatives_spanish:
  - sus burros
  - sus mulas
  lexicon: HALOT
  rationale: חֲמֹרִים son animales de carga, normalmente ‘asnos’ o ‘burros’. Elegí «asnos» por su cercanía al registro bíblico y por mantener la distinción con los caballos.
- source_word: הַמַּחֲנֶה כַּאֲשֶׁר הִיא
  english_pob_choice: the camp as it was
  chosen_spanish: el campamento tal como estaba
  alternatives_spanish:
  - el campamento como estaba
  - el campamento intacto
  lexicon: HALOT
  rationale: La expresión enfatiza que el campamento fue dejado en el estado en que se encontraba. «Tal como estaba» reproduce bien ese valor sin volverlo excesivamente interpretativo.
- source_word: וַיָּנֻסוּ אֶל נַפְשָׁם
  english_pob_choice: fled for their lives
  chosen_spanish: huyeron para salvar su vida
  alternatives_spanish:
  - huyeron por sus vidas
  - huyeron para conservar la vida
  lexicon: HALOT
  rationale: El hebreo contiene un giro idiomático que expresa huida para preservar la vida. En español, «para salvar su vida» comunica el sentido idiomático de forma natural y fiel.
- source_word: וַיָּקוּמוּ
  english_pob_choice: they arose
  chosen_spanish: se levantaron
  alternatives_spanish:
  - se pusieron en pie
  - se alzaron
  lexicon: HALOT
  rationale: קום aquí marca el inicio urgente de la acción. «Se levantaron» es una opción natural y narrativa en español, cercana al valor de «arose».
- source_word: וַיָּנ֣וּסוּ ... וַיָּנֻסוּ
  english_pob_choice: fled ... fled
  chosen_spanish: huyeron ... huyeron
  alternatives_spanish:
  - escaparon ... escaparon
  - salieron huyendo ... huyeron
  lexicon: HALOT
  rationale: El hebreo repite נוּס para enfatizar la rapidez y la urgencia. Mantener la repetición con «huyeron ... huyeron» preserva ese efecto estilístico en español.
translation_notes:
  revision_awareness: Coincide con la auditoría inglesa de alta concordancia; no se observaron revisiones aplicadas en el pasaje base. La redacción española conserva la repetición verbal, el giro idiomático final y la nota sobre el estado del campamento, con una formulación natural en español.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma del proyecto, aunque este versículo no contiene el Nombre divino.
  - Se preserva la repetición de «huyeron» para reflejar la urgencia del hebreo y la decisión auditada en inglés.
  - «Asnos» se conserva como equivalente bíblico natural, sin sustituirlo por términos más modernos que borren el matiz de animales de carga.
  - La nota b conserva el valor resultativo del hebreo sin convertir «tal como estaba» en una interpretación excesiva.
