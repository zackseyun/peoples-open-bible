translation:
  language: es
  text: 'David, el compositor de himnos[a], nos cantó, diciendo[b]: «Muchas son las aflicciones de los justos».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, más idiomáticamente: «David el salmista nos cantó, diciendo: “Muchas son las aflicciones de los justos”».'
    reason: lexical_alternative
  - marker: b
    text: La cita evoca Sal 33:20 LXX (Sal 34:19 en muchas versificaciones en inglés).
    reason: cross_reference
lexical_decisions:
- source_word: τὸν ὑμνογράφον
  english_pob_choice: the hymn-writer
  chosen_spanish: el compositor de himnos
  alternatives_spanish:
  - el himnógrafo
  - el salmista
  lexicon: LSJ
  rationale: ὑμνογράφος designa a quien compone himnos; en español, «compositor de himnos» conserva el sentido literal y resulta natural. «Salmista» sería una glosa interpretativa más tradicional, pero atenúa la imagen léxica del griego.
- source_word: ἐμελῴδει
  english_pob_choice: sang
  chosen_spanish: cantó
  alternatives_spanish:
  - cantó en voz alta
  - entonó
  lexicon: LSJ
  rationale: El verbo expresa cantar o entonar una melodía. «Cantó» es la equivalencia más directa y fluida en español para este contexto literario.
- source_word: ἡμῖν
  english_pob_choice: to us
  chosen_spanish: para nosotros
  alternatives_spanish:
  - a nosotros
  lexicon: BDAG
  rationale: El dativo comunica aquí la audiencia/beneficio del canto. «Para nosotros» suena natural en español y conserva esa función pragmática.
- source_word: Δαυείδ
  english_pob_choice: David
  chosen_spanish: David
  lexicon: Transliteración estándar
  rationale: Nombre propio estándar en español bíblico.
- source_word: Πολλαὶ
  english_pob_choice: Many are
  chosen_spanish: Muchas son
  alternatives_spanish:
  - Numerosas son
  lexicon: LSJ
  rationale: Reproduce el predicado inicial de la cita con un orden natural en español y sin intensificar indebidamente.
- source_word: αἱ θλίψεις
  english_pob_choice: the afflictions
  chosen_spanish: las aflicciones
  alternatives_spanish:
  - las tribulaciones
  - las angustias
  lexicon: BDAG
  rationale: «Aflicciones» mantiene el registro elevado y el matiz de presión o sufrimiento del término griego.
- source_word: τῶν δικαίων
  english_pob_choice: of the righteous
  chosen_spanish: de los justos
  alternatives_spanish:
  - de los rectos
  - de los justos y rectos
  lexicon: BDAG
  rationale: «Los justos» es la forma más concisa y bíblica en español para referirse a personas rectas ante Dios, conservando el valor genitivo plural del griego.
theological_decisions:
- issue: Identificación de David como compositor del himno citado
  english_pob_reading: The phrase refers to David as the composer of the quoted sacred song.
  chosen_spanish_reading: David aparece identificado como el compositor de himnos, no como el tema del canto.
  alternative_spanish_readings:
  - David, el salmista
  - David cantó sobre el compositor de himnos
  rationale: El griego pone en aposición τὸν ὑμνογράφον con Δαυείδ. La traducción mantiene esa relación y evita una relectura devocional que borre la fuerza léxica del término.
  doctrine_reference: Translation philosophy §§1, 5
translation_notes:
  revision_awareness: El texto sigue la revisión más reciente del audit trail al colocar en aposición «el compositor de himnos» con David, reflejando que David es el himnógrafo. También conserva la cita bíblica sin expandirla más allá de lo que el griego y el inglés auditado justifican.
  spanish_consistency_notes:
  - Se usa «aflicciones» para θλίψεις, en línea con el registro bíblico elevado del pasaje.
  - Se evita «SEÑOR» o una sustitución litúrgica similar porque aquí no aparece el Tetragrámaton ni κύριος.
  - «Los justos» mantiene la referencia colectiva del genitivo plural sin añadir explicaciones.
  - Se conserva una puntuación de cita clara y publicable en español, con el inciso «para nosotros» separado del verbo principal.
