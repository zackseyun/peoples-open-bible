    text: Hebrew literally, 'I gave my soul after her,' an idiom of devoted pursuit.
    reason: lexical_alternative
  - marker: b
    text: Or 'forever and ever'; Hebrew, 'for everlasting ages.'
    reason: lexical_alternative
  - marker: c
    text: The Hebrew reads 'I acquired a heart for her from the beginning.' The Greek parallel differs somewhat in this clause, reading more like 'I acquired a heart from the beginning together with them/with it,' but both witnesses support the sense of an inward disposition toward wisdom from the outset.
