translation:
  language: es
  text: Mamarás la leche de las naciones[a], y mamarás del pecho de reyes; y sabrás que yo, Yahvé, soy tu Salvador y tu Redentor, el Poderoso de Jacob.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, más literalmente: «Chuparás la leche de las naciones, y chuparás del pecho de reyes». El hebreo conserva una imagen vívida de lactancia para expresar que Sion recibirá sustento y honor de las naciones.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְיָנַקְתְּ
  english_pob_choice: you will nurse on
  chosen_spanish: Mamarás
  alternatives_spanish:
  - chuparás
  - mamarás de
  lexicon: HALOT
  rationale: El verbo ינק expresa la acción de mamar/succionar en imagen de nutrición. En español, 'mamarás' conserva la imagen concreta y suena natural en el registro poético-profético; 'chuparás' sería más áspero y menos adecuado en español bíblico contemporáneo.
- source_word: חֲלֵב
  english_pob_choice: milk
  chosen_spanish: la leche
  alternatives_spanish:
  - la abundancia
  - las riquezas
  lexicon: HALOT
  rationale: El sentido léxico básico es 'leche'. El texto hebreo mantiene una imagen corporal explícita, por lo que conviene conservarla en vez de convertirla de inmediato en una abstracción como 'riquezas' o 'abundancia'.
- source_word: גּוֹיִם
  english_pob_choice: nations
  chosen_spanish: las naciones
  alternatives_spanish:
  - los pueblos
  - los gentiles
  lexicon: HALOT
  rationale: '''Naciones'' reproduce bien el referente político-colectivo del hebreo en este contexto profético y es la opción más transparente en español.'
- source_word: וְשֹׁד
  english_pob_choice: the breast
  chosen_spanish: el pecho
  alternatives_spanish:
  - el seno
  - la teta
  lexicon: HALOT
  rationale: שֹׁד en este contexto de lactancia apunta al pecho materno. 'Pecho' es una equivalencia digna y comprensible en español; evita un coloquialismo excesivo y mantiene la imaginería de nutrición.
- source_word: מְלָכִים
  english_pob_choice: kings
  chosen_spanish: de los reyes
  alternatives_spanish:
  - de los monarcas
  - de los gobernantes
  lexicon: HALOT
  rationale: El plural literal 'reyes' preserva la imagen de prestigio y poder del hebreo sin suavizarla.
- source_word: תִּינָקִי
  english_pob_choice: you will suck
  chosen_spanish: mamarás
  alternatives_spanish:
  - chuparás
  - succionarás
  lexicon: HALOT
  rationale: La repetición del verbo ינק refuerza la metáfora. 'Mamarás' funciona bien como repetición poética en español y mantiene el paralelismo con la primera cola.
- source_word: וְיָדַעַתְּ
  english_pob_choice: and you will know
  chosen_spanish: y sabrás
  alternatives_spanish:
  - y conocerás
  - entonces sabrás
  lexicon: HALOT
  rationale: El hebreo expresa una secuencia simple; 'y sabrás' conserva la coordinación sin añadir matiz inferencial que el texto no exige.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: Se mantiene la transliteración del Nombre divino conforme al criterio del proyecto. 'Yahvé' evita la sustitución por un título y conserva la referencia directa al Tetragrámaton.
- source_word: מוֹשִׁיעֵךְ
  english_pob_choice: your Savior
  chosen_spanish: tu Salvador
  alternatives_spanish:
  - el que te salva
  - tu Libertador
  lexicon: HALOT
  rationale: 'El participio causativo con sufijo expresa una designación estable: ''tu Salvador'' es idiomático en español y conserva el valor de título/función continua.'
- source_word: וְגֹאֲלֵךְ
  english_pob_choice: your Redeemer
  chosen_spanish: tu Redentor
  alternatives_spanish:
  - el que te redime
  - tu rescatador
  lexicon: HALOT
  rationale: '''Redentor'' es la equivalencia más asentada para גאל en Isaías y mantiene la carga covenantal de rescate/reclamación familiar sin forzar una explicación más larga.'
- source_word: אֲבִיר יַעֲקֹב
  english_pob_choice: the Mighty One of Jacob
  chosen_spanish: el Poderoso de Jacob
  alternatives_spanish:
  - el Fuerte de Jacob
  - el Poderoso de Israel
  lexicon: HALOT
  rationale: אֲבִיר denota fuerza/poder. 'Poderoso' es una solución natural en español y preserva el título divino unido al nombre 'Jacob', que se mantiene porque el hebreo no dice 'Israel'.
theological_decisions:
- issue: Tratamiento del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - Jehová
  rationale: El versículo usa explícitamente el Tetragrámaton. La forma 'Yahvé' sigue la decisión doctrinal del proyecto de no ocultar el Nombre detrás de una sustitución reverencial.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Conservación de la imagen de lactancia
  english_pob_reading: Retain the maternal/nursing metaphor in the main text
  chosen_spanish_reading: Mantener la metáfora materna de lactancia en el texto principal
  alternative_spanish_readings:
  - parafrasear como 'gozarás de las riquezas de las naciones'
  - interpretar 'leche' como abundancia
  rationale: El hebreo repite vocabulario corporal y de amamantamiento. En español, la metáfora sigue siendo inteligible y conservarla evita borrar una tensión imagística que el texto sí presenta.
  doctrine_reference: 'DOCTRINE.md Translation philosophy: original-language primacy over translation tradition; never paraphrase beyond what the source warrants'
translation_notes:
  revision_awareness: 'Se revisó el pasaje más reciente y no se detectaron cambios necesarios respecto del estado aprobado: el hebreo sigue favoreciendo la imagen concreta de lactancia, el Nombre divino se mantiene como Yahvé, y el paralelismo poético se conserva en español.'
  spanish_consistency_notes:
  - Se usa 'Yahvé' de forma consistente con el estándar del proyecto para יְהוָה.
  - '''Redentor'' se mantiene por coherencia con Isaías y con el campo semántico de גאל.'
  - '''Poderoso de Jacob'' preserva el nombre propio ''Jacob'' porque el hebreo lo especifica así.'
  - Se evita reemplazar la imaginería corporal por una abstracción como 'riquezas' en el texto principal.
