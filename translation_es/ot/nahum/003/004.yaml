review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien la estructura y el sentido causal del hebreo: el juicio viene por la abundancia de las prostituciones de la figura personificada, descrita además por su atractivo seductor, su hechicería y su explotación de naciones y grupos de parentesco. Sin embargo, hay dos desalineaciones importantes con la evidencia y la auditoría inglesa: (1) el inglés POB fija גּוֹיִם // וּמִשְׁפָּחוֹת como «nations ... clans», con nota alternativa para «families», pero el español principal puso «familias» y luego la nota b repite «familias», lo que pierde el contraste principal y vuelve incoherente la nota; (2) «hermosa en encanto» suena poco natural en español y no transmite con claridad el valor idiomático de טוֹבַת חֵן como atractivo seductor/favorecido.'
  spanish_quality_summary: El español es en general claro y digno, pero contiene una frase poco idiomática («hermosa en encanto») y una nota al pie mal configurada. «Señora de hechicerías» es comprensible, aunque «dueña» o «maestra» serían más marcadas; no obstante, no requiere cambio. «Por medio de» funciona bien para el instrumental, aunque es algo más largo de lo necesario. La revisión propuesta mejora naturalidad y coherencia sin alejarse del hebreo.
  glossary_alignment: No hay conflicto con la terminología de proyecto principal. «Prostituta/prostituciones» preserva bien זונה/זנונים. «Hechicerías» corresponde adecuadamente a כּשפים. La principal corrección léxica necesaria es usar «clanes» en el texto principal para מִשְׁפָּחוֹת, manteniendo «familias» como alternativa en la nota, en línea con la decisión auditada.
  issues:
  - severity: high
    issue: מִשְׁפָּחוֹת fue traducido en el texto principal como «familias» en lugar de «clanes».
    rationale: La auditoría inglesa escogió «clans» como lectura principal y reservó «families» como alternativa. En español, «familias» reduce la precisión sociológica y además hace incoherente la nota b, que ofrece exactamente la misma palabra que ya está en el texto.
  - severity: high
    issue: La nota b no corresponde al texto anclado.
    rationale: El texto principal ya dice «familias», pero la nota b dice «O «familias»». Una nota alternativa no puede repetir la misma forma del texto; esto debe corregirse para que el aparato sea funcional.
  - severity: medium
    issue: «hermosa en encanto» es poco idiomático en español.
    rationale: Aunque intenta conservar el doble matiz de belleza/encanto de טוֹבַת חֵן, la expresión suena forzada. «Hermosa y encantadora» o «bella y encantadora» comunica mejor el atractivo seductor sin perder el sentido idiomático.
  revised_spanish_text: a causa de las muchas prostituciones de la prostituta[a], hermosa y encantadora, señora de hechicerías, la que vende naciones por medio de sus prostituciones y clanes[b] por medio de sus hechicerías.
