base_translation:
  language: en
  yaml_path: translation/ot/judges/003/031.yaml
  text: After him was Shamgar son of Anath[a], and he struck down six hundred Philistines with an ox goad[b]; he too saved Israel.
  footnotes:
  - marker: a
    text: Or 'delivered Israel.' The Hebrew verb can denote rescue or deliverance in a military context.
    reason: lexical_alternative
  - marker: b
    text: An 'ox goad' was a pointed stick used to drive cattle.
    reason: cultural_note
