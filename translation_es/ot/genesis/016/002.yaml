translation:
  language: es
  text: 'Entonces Sarai dijo a Abram[a]: «Mira ahora, Yahvé me ha impedido dar a luz. Por favor, llégate a mi esclava; quizá seré edificada por medio de ella». Y Abram escuchó la voz de Sarai.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, de manera más idiomática, «quizá obtenga hijos por medio de ella» o «quizá sea establecida por medio de ella». El hebreo dice, literalmente, «quizá seré edificada por medio de ella».
    reason: lexical_alternative
lexical_decisions:
- source_word: וַתֹּאמֶר
  english_pob_choice: Then ... said
  chosen_spanish: Entonces ... dijo
  alternatives_spanish:
  - Y ... dijo
  lexicon: HALOT
  rationale: La waw consecutiva avanza la narración; «entonces» conserva la secuencia de manera natural en español.
- source_word: הִנֵּה נָא
  english_pob_choice: Look now
  chosen_spanish: Mira ahora
  alternatives_spanish:
  - Mira, por favor
  - He aquí, por favor
  lexicon: HALOT
  rationale: La combinación deíctica y apelativa pide captar la atención; «mira ahora» mantiene ese impulso sin volver al registro arcaico de «he aquí».
- source_word: עֲצָרַנִי
  english_pob_choice: has kept me from
  chosen_spanish: me ha impedido
  alternatives_spanish:
  - me ha retenido de
  - me ha detenido de
  lexicon: HALOT
  rationale: El verbo expresa prevención o impedimento; «me ha impedido» comunica bien la idea sin suavizar la atribución directa a Yahvé.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  lexicon: Project default
  rationale: Se sigue el término por defecto del proyecto para el nombre divino, manteniendo transparencia respecto del hebreo.
- source_word: מִלֶּדֶת
  english_pob_choice: from bearing children
  chosen_spanish: dar a luz
  alternatives_spanish:
  - parir
  - tener hijos
  lexicon: HALOT
  rationale: El infinitivo alude al acto de concebir/traer hijos al mundo; en español «dar a luz» es inteligible y digno en este contexto de esterilidad, aunque no elimina del todo la amplitud semántica del hebreo.
- source_word: בֹּא נָא אֶל
  english_pob_choice: Please go in to
  chosen_spanish: Por favor, entra a
  alternatives_spanish:
  - Por favor, acércate a
  - Por favor, ve a
  lexicon: HALOT
  rationale: Se conserva el eufemismo relacional-sexual del hebreo con un giro español natural y entendible; «entra a» evita una paráfrasis demasiado explícita.
- source_word: שִׁפְחָתִי
  english_pob_choice: my female slave
  chosen_spanish: mi esclava femenina
  alternatives_spanish:
  - mi esclava
  - mi sierva
  lexicon: HALOT
  rationale: Se preserva el valor servil fuerte de שִׁפְחָה. «Esclava femenina» es poco idiomático, pero reproduce con claridad la categoría social del término, en línea con la preferencia del POB por no suavizarlo.
- source_word: אוּלַי
  english_pob_choice: perhaps
  chosen_spanish: quizá
  alternatives_spanish:
  - tal vez
  - a lo mejor
  lexicon: HALOT
  rationale: «Quizá» expresa bien la esperanza tentativa y mantiene un registro sobrio.
- source_word: אִבָּנֶה מִמֶּנָּה
  english_pob_choice: I will be built up through her
  chosen_spanish: yo sea edificada por medio de ella
  alternatives_spanish:
  - seré edificada por ella
  - seré construida por medio de ella
  - obtenga hijos por medio de ella
  lexicon: HALOT
  rationale: Se conserva la metáfora de edificación, vinculada al juego de palabras hebreo con בנה. «Por medio de ella» transmite la mediación de la esclava en lugar de convertir de inmediato la frase en un simple idiomático sobre hijos, que se deja implícito como eco del hebreo.
- source_word: וַיִּשְׁמַע ... לְקוֹל
  english_pob_choice: And ... listened to the voice of
  chosen_spanish: escuchó la voz de
  alternatives_spanish:
  - oyó la voz de
  - obedeció a
  lexicon: HALOT
  rationale: La expresión hebrea es literalmente «escuchó la voz de». Se mantiene «voz» para conservar el eco intertextual y no reducirlo a «obedeció», que sería más interpretativo.
theological_decisions:
- issue: Atribución de la barrenness to Yahweh
  english_pob_reading: the LORD has kept me from bearing children
  chosen_spanish_reading: Yahvé me ha impedido dar a luz
  alternative_spanish_readings:
  - Yahvé me ha retenido de dar a luz
  - Yahvé me ha impedido tener hijos
  rationale: El hebreo atribuye explícitamente a Yahvé la prevención de la maternidad de Sarai. La traducción conserva esa afirmación sin atenuarla ni explicarla de más.
  doctrine_reference: Affirmations; Translation philosophy §1 y §3
- issue: Eufemismo para unión sexual
  english_pob_reading: Please go in to my female slave
  chosen_spanish_reading: Por favor, entra a mi esclava femenina
  alternative_spanish_readings:
  - Por favor, ten relaciones con mi esclava femenina
  - Por favor, acércate a mi esclava femenina
  rationale: El hebreo usa un eufemismo convencional. La versión española conserva el registro indirecto sin volverlo opaco o excesivamente moderno.
  doctrine_reference: Translation philosophy §1 y §6
- issue: Juego de palabras con «edificada»
  english_pob_reading: I will be built up through her
  chosen_spanish_reading: yo sea edificada por medio de ella
  alternative_spanish_readings:
  - seré edificada por medio de ella
  - obtendré hijos por medio de ella
  - seré establecida por medio de ella
  rationale: Se preserva la metáfora de edificación para no borrar la tensión léxica del hebreo entre el sentido literal y el idiomático de descendencia/familia.
  doctrine_reference: Lexical transparency; source-form preservation
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión más reciente del inglés POB, que prefirió «through her» frente a «from her» para reflejar con más naturalidad מִמֶּנָּה en la imagen de «ser edificada», sin perder el carácter literal de la metáfora. La versión española adopta «por medio de ella» para expresar esa mediación de forma natural y auditable.
  spanish_consistency_notes:
  - Se mantiene Yahvé para el nombre divino, conforme al estándar del proyecto.
  - Se conserva «esclava» para שִׁפְחָה, evitando suavizarla con «sierva».
  - La metáfora de edificación se preserva con «edificada» para no borrar el juego léxico hebreo.
  - «Escuchó la voz de» retiene el giro idiomático del hebreo y su posible resonancia intertextual.
