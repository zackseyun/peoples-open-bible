base_translation:
  language: en
  yaml_path: translation/deuterocanon/1_esdras/006/002.yaml
  text: Then Zerubbabel son of Salathiel and Jeshua son of Josedek stood up and began to build the house of the Lord in Jerusalem[a], while the prophets of the Lord were with them[c][b], helping them.
  footnotes:
  - marker: a
    text: Or 'arose.' The Greek participle can mark taking action as well as the physical act of standing.
    reason: lexical_alternative
  - marker: b
    text: Greek 'Jeshua' is Ἰησοῦς, the same form often rendered 'Jesus' in Greek contexts; here it refers to the postexilic high priest, not Jesus of Nazareth.
    reason: lexical_alternative
  - marker: c
    text: The Hebrew parallel context names Haggai and Zechariah among the prophets supporting the rebuilding, though this Greek verse refers to them simply as 'the prophets of the Lord.'
    reason: cross_reference
