translation:
  language: es
  text: ¿Por qué nos complacemos en planes vacíos[a] y nos atrevemos a una desobediencia mortal[b]?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: También puede traducirse «planes vanos» o «propósitos fútiles».
    reason: lexical_alternative
  - marker: b
    text: Literalmente, «una desobediencia que trae muerte».
    reason: lexical_alternative
lexical_decisions:
- source_word: τί
  english_pob_choice: Why
  chosen_spanish: ¿Por qué
  alternatives_spanish:
  - ¿Qué [es lo que]
  - ¿Por qué razón
  lexicon: LSJ
  rationale: En una pregunta retórica de reprensión, τί funciona como un ‘¿por qué?’ admonitorio. En español, «¿Por qué» conserva bien ese tono de reproche y evita una construcción artificial.
- source_word: βουλήμασιν
  english_pob_choice: schemes
  chosen_spanish: planes
  alternatives_spanish:
  - proyectos
  - propósitos
  - maquinaciones
  lexicon: LSJ
  rationale: βουλήματα puede significar planes, propósitos o resoluciones. «Planes» es claro, natural y mantiene el sentido deliberativo sin intensificarlo innecesariamente con una connotación más oscura.
- source_word: κενοῖς
  english_pob_choice: empty
  chosen_spanish: vacíos
  alternatives_spanish:
  - vanos
  - fútiles
  - inútiles
  lexicon: LSJ
  rationale: κενοῖς expresa falta de contenido o valor. «Vacíos» preserva la imagen de vaciedad de manera directa en español; «vanos» o «fútiles» serían posibles, pero algo más interpretativos.
- source_word: ἑαυτοὺς εὐφραινόμεν
  english_pob_choice: we delight ourselves
  chosen_spanish: nos deleitamos
  alternatives_spanish:
  - nos alegramos
  - nos complacemos
  - hallamos placer
  lexicon: LSJ
  rationale: La forma media expresa un gozo que uno se procura a sí mismo. «Nos deleitamos» conserva el matiz reflexivo y la ironía moral de disfrutar lo que no tiene valor.
- source_word: θανατηφόρον
  english_pob_choice: deadly
  chosen_spanish: mortal
  alternatives_spanish:
  - muerte-trayente
  - mortífero
  - que trae muerte
  lexicon: LSJ
  rationale: El compuesto significa literalmente algo que trae muerte. En español, «mortal» comunica con naturalidad la gravedad del efecto sin sonar forzado; mantiene el valor destructivo del término.
- source_word: ἀπειθίαν
  english_pob_choice: disobedience
  chosen_spanish: desobediencia
  alternatives_spanish:
  - rebeldía
  - desobediencia obstinada
  - rebeldía contra
  lexicon: LSJ
  rationale: ἀπειθία denota negativa a obedecer. «Desobediencia» es la equivalencia más directa y evita cargar el término con una intensidad mayor que la requerida por el griego.
- source_word: τολμῶμεν
  english_pob_choice: dare
  chosen_spanish: nos atrevemos
  alternatives_spanish:
  - osamos
  - nos aventuramos
  - presumimos
  lexicon: LSJ
  rationale: τολμῶμεν expresa audacia arriesgada. «Nos atrevemos» reproduce de modo idiomático ese matiz de osadía y encaja bien con la pregunta retórica.
theological_decisions:
- issue: La fuerza moral de ἀπειθία
  english_pob_reading: disobedience
  chosen_spanish_reading: desobediencia
  alternative_spanish_readings:
  - rebeldía
  - desafío
  rationale: El griego señala una negativa a obedecer, y el contexto la presenta como conducta condenable que conduce a la muerte. «Desobediencia» preserva esa fuerza moral sin añadir un matiz doctrinal más fuerte que el del original.
  doctrine_reference: Translation philosophy §§1, 3, 6
translation_notes:
  revision_awareness: La traducción sigue de cerca el análisis del griego y la revisión inglesa más reciente, que prefirió una formulación natural sin perder el sentido de θανατηφόρον. En español se optó por «mortal» en vez de una calca como «que trae muerte», para mantener lectura pública fluida; aun así, la nota conserva la alternativa literal. También se mantuvo el paralelismo retórico y el tono de reprensión.
  spanish_consistency_notes:
  - Se evitó «SEÑOR» o terminología litúrgica no pertinente, pues no hay nombres divinos en el versículo.
  - Se prefirió «desobediencia» frente a «rebeldía» para no intensificar innecesariamente ἀπειθία.
  - «Planes vacíos» conserva la evaluación negativa sin introducir una interpretación más psicológica o moralizante que el griego no exige.
  - El tono interrogativo se mantiene como reproche retórico, no como consulta informativa.
