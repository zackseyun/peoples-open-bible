translation:
  language: es
  text: Y vivió Serug doscientos años después de haber engendrado a Nahor, y engendró hijos e hijas.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: וַיְחִי
  english_pob_choice: lived
  chosen_spanish: vivió
  alternatives_spanish:
  - estuvo vivo
  - vivió por
  lexicon: HALOT
  rationale: En fórmulas genealógicas, חיה expresa la duración de la vida. «Vivió» es la equivalencia natural en español y conserva el tono de registro genealógico sin añadir matices no presentes en el hebreo.
- source_word: שְׂרוּג
  english_pob_choice: Serug
  chosen_spanish: Serug
  lexicon: Convención onomástica
  rationale: Nombre propio transliterado de forma estándar; no se traduce.
- source_word: אַחֲרֵי
  english_pob_choice: after
  chosen_spanish: después de
  alternatives_spanish:
  - tras
  lexicon: HALOT
  rationale: La preposición temporal marca posterioridad; «después de» es claro y natural en español, y preserva la relación temporal exacta del hebreo.
- source_word: הוֹלִידוֹ
  english_pob_choice: he fathered
  chosen_spanish: haber engendrado a
  alternatives_spanish:
  - haber sido padre de
  - haber engendrado
  lexicon: HALOT
  rationale: En genealogías, ילד en hifil denota causar el nacimiento de un hijo. «Haber engendrado» conserva el valor causativo y es idiomático en español; se mantiene el objeto introducido por «a» para Nahor.
- source_word: אֶת
  english_pob_choice: '[direct object marker not translated]'
  chosen_spanish: a
  alternatives_spanish:
  - —
  lexicon: Gramática hebrea
  rationale: El marcador de objeto directo no se traduce como tal, pero en español la construcción pide la preposición personal «a» ante un objeto humano.
- source_word: נָחוֹר
  english_pob_choice: Nahor
  chosen_spanish: Nahor
  lexicon: Convención onomástica
  rationale: Nombre propio transliterado de forma estándar.
- source_word: מָאתַיִם שָׁנָה
  english_pob_choice: two hundred years
  chosen_spanish: doscientos años
  alternatives_spanish:
  - doscientos año
  lexicon: HALOT
  rationale: La construcción numeral + sustantivo singular en hebreo expresa duración; en español se requiere el plural natural «años».
- source_word: וַיּוֹלֶד
  english_pob_choice: he fathered
  chosen_spanish: engendró
  alternatives_spanish:
  - engendró hijos
  - fue padre de
  lexicon: HALOT
  rationale: Se conserva el paralelo genealógico con el verbo anterior y el valor de paternidad causal. «Engendró» es más preciso que «tuvo» y más conciso que una perífrasis.
- source_word: בָּנִים וּבָנוֹת
  english_pob_choice: sons and daughters
  chosen_spanish: hijos e hijas
  alternatives_spanish:
  - hijos y hijas
  - descendencia
  lexicon: HALOT
  rationale: El hebreo distingue explícitamente varones y mujeres; «hijos e hijas» reproduce esa distinción de modo natural en español. «Hijos» aquí puede abarcar hijos varones o descendencia, pero con «e hijas» se mantiene la explicitación del original.
translation_notes:
  revision_awareness: Coincide con el sentido genealógico del hebreo y con la elección auditada en inglés de «fathered» para ambos usos de ילד; no se detectan tensiones textuales ni variantes relevantes en este versículo.
  spanish_consistency_notes:
  - Se mantiene un registro genealógico sobrio y directo.
  - Se conserva la distinción explícita entre los dos verbos de procreación del hebreo mediante «haber engendrado» y «engendró».
  - Se evita cualquier fórmula eclesiástica o interpretativa añadida que no esté en el texto fuente.
