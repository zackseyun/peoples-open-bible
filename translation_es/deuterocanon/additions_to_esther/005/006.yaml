translation:
  language: es
  text: por el falso razonamiento de la malicia, habiendo juzgado mal la sincera benevolencia de quienes están en el poder[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «habiendo sido engañados acerca de la pura benevolencia de los gobernantes». El griego usa términos cognados para «falso razonamiento» y «juzgar mal», subrayando una conclusión equivocada.'
    reason: lexical_alternative
lexical_decisions:
- source_word: κακοηθείας
  english_pob_choice: malice
  chosen_spanish: malicia
  alternatives_spanish:
  - maldad
  - malevolencia
  - malignidad
  lexicon: LSJ
  rationale: En español, «malicia» conserva el matiz de mala disposición o intención dañina que el inglés POB captó con 'malice', sin volverlo demasiado general como «maldad» ni demasiado técnico como «malevolencia».
- source_word: ψευδεῖ
  english_pob_choice: 'false'
  chosen_spanish: falso
  alternatives_spanish:
  - engañoso
  - mentiroso
  lexicon: LSJ
  rationale: El adjetivo califica directamente el razonamiento como no verdadero; «falso» reproduce con naturalidad la fuerza descriptiva del griego y del inglés POB.
- source_word: παραλογισμῷ
  english_pob_choice: reasoning
  chosen_spanish: razonamiento
  alternatives_spanish:
  - cálculo
  - argumento
  - delirio
  lexicon: LSJ
  rationale: El sustantivo apunta al acto o proceso de razonar de modo incorrecto. «Razonamiento» mantiene el sentido cognitivo y evita sobrecargar con un término más interpretativo.
- source_word: παραλογισαμένων
  english_pob_choice: having misjudged
  chosen_spanish: habiendo errado respecto de
  alternatives_spanish:
  - habiendo juzgado mal a
  - habiendo sido engañados acerca de
  - habiendo razonado falsamente acerca de
  lexicon: LSJ
  rationale: El participio cognado expresa llegar a una conclusión equivocada. «Habiendo errado respecto de» conserva el error en la valoración y permite ligar con el objeto inmediato sin forzar una paráfrasis más amplia.
- source_word: ἐπικρατούντων
  english_pob_choice: those in power
  chosen_spanish: los que están en el poder
  alternatives_spanish:
  - los gobernantes
  - los que ejercen autoridad
  - los dominadores
  lexicon: LSJ
  rationale: La expresión griega describe a quienes prevalecen o ejercen dominio. «Los que están en el poder» es idiomático en español y mantiene la referencia a autoridades sin estrecharla a un título institucional.
- source_word: ἀκέραιον
  english_pob_choice: sincere
  chosen_spanish: sincera
  alternatives_spanish:
  - pura
  - íntegra
  - sin mezcla
  lexicon: LSJ
  rationale: Aquí modifica a εὐγνωμοσύνην y comunica una disposición no corrupta ni mezclada. «Sincera» funciona con naturalidad en español junto a «benevolencia» y preserva la idea de integridad interior.
- source_word: εὐγνωμοσύνην
  english_pob_choice: goodwill
  chosen_spanish: benevolencia
  alternatives_spanish:
  - buena disposición
  - gratitud
  - bondad
  lexicon: LSJ
  rationale: En este contexto la palabra apunta a una actitud favorable o benigna hacia otros. «Benevolencia» refleja mejor esa disposición que «gratitud», y encaja con la lectura genitiva adoptada por el POB inglés.
theological_decisions:
- issue: Lectura del sintagma τὴν τῶν ἐπικρατούντων ἀκέραιον εὐγνωμοσύνην
  english_pob_reading: the sincere goodwill belonging to those in power
  chosen_spanish_reading: la sincera benevolencia de los que están en el poder
  alternative_spanish_readings:
  - la gratitud sincera hacia los que están en el poder
  - la benevolencia sincera mostrada hacia los que están en el poder
  rationale: 'Se sigue la lectura en la que τῶν ἐπικρατούντων funciona como genitivo subjetivo: la buena disposición pertenece a quienes tienen el poder. Esto coincide con el auditable inglés POB y evita desplazar el sentido hacia una gratitud dirigida a ellos, que es posible gramaticalmente pero menos natural y menos coherente con el contexto.'
  doctrine_reference: Sintaxis griega / genitivo subjetivo
translation_notes:
  revision_awareness: El texto español sigue la lectura y la nota del audit trail inglés, manteniendo la relación cognada entre el razonamiento falso y el juicio equivocado. No se introdujeron revisiones adicionales al pasaje fuente ni se modificó la valoración genitiva adoptada por el POB inglés.
  spanish_consistency_notes:
  - Se prefirió «los que están en el poder» para reproducir el alcance amplio de ἐπικρατούντων sin limitarlo a un oficio concreto.
  - Se conservó la tensión semántica entre juicio erróneo y benevolencia sincera mediante la nota alternativa, en paralelo con la nota inglesa.
  - «Benevolencia» se usó para εὐγνωμοσύνην porque en español comunica mejor una disposición favorable que «gratitud» en este contexto.
