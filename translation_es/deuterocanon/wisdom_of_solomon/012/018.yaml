base_translation:
  language: en
  yaml_path: translation/deuterocanon/wisdom_of_solomon/012/018.yaml
  text: But you[a], being master of strength, judge with gentleness, and with great forbearance you govern us[b]; for the power is yours whenever you will.
  footnotes:
  - marker: a
    text: Or 'with clemency' for 'with gentleness'; the Greek ἐπιείκεια can denote lenience or mild fairness as well as gentleness.
    reason: lexical_alternative
  - marker: b
    text: Literally, 'for the being able is present to you whenever you will'—that is, the capacity to act is always at your disposal.
    reason: lexical_alternative
