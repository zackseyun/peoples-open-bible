  to: Yo me volví[a], yo y mi corazón, para conocer, indagar y buscar sabiduría y una explicación[b], y para saber[c] que la maldad es necedad y la necedad es locura.
  rationale: Se ajusta לָתוּר a «indagar» para reflejar mejor el matiz de búsqueda examinadora confirmado por la revisión inglesa; se restaura «una explicación» como equivalente principal de חֶשְׁבּוֹן conforme al expediente léxico del POB; se corrige la nota alternativa para que ofrezca una lectura verdaderamente distinta; y se mejora la naturalidad española con «para saber que» en la cláusula final sin perder el sentido del hebreo.
