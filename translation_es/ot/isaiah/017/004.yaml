  yaml_path: translation/ot/isaiah/017/004.yaml
  text: And in that day the glory of Jacob will become thin[b][a], and the fatness of his flesh will waste away.
  footnotes:
  - marker: a
    text: Or 'will be diminished.' The Hebrew verb can denote becoming small, weak, or thin; the translation 'grow thin' follows the bodily imagery of the next line.
    reason: lexical_alternative
  - marker: b
    text: Or 'the richness of his body will become lean.' The Hebrew uses physical imagery of fatness and leanness to portray Jacob's loss of strength and prosperity.
    reason: lexical_alternative
