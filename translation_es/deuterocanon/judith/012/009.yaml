translation:
  language: es
  text: Y cuando entró[a], permaneció en la tienda purificada hasta que trajo su alimento hacia el atardecer.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «limpia» o «ritualmente limpia». El adjetivo griego puede denotar pureza en sentido general o ritual.
    reason: lexical_alternative
lexical_decisions:
- source_word: εἰσπορευομένη
  english_pob_choice: when she went in
  chosen_spanish: cuando entraba
  alternatives_spanish:
  - cuando iba entrando
  - cuando ingresaba
  - al entrar
  lexicon: BDAG
  rationale: El participio presente se vierte temporalmente en español de forma natural. «Entraba» conserva el movimiento de ingreso sin sonar forzado; el valor de acción en curso queda bien reflejado.
- source_word: καθαρὰ
  english_pob_choice: purified
  chosen_spanish: purificada
  alternatives_spanish:
  - limpia
  - pura
  - ritualmente limpia
  lexicon: LSJ
  rationale: La forma española más concisa y fiel al matiz adoptado por el POB inglés es «purificada». Mantiene la posible resonancia ritual sin explicitarla de manera más fuerte que el griego.
- source_word: παρέμενεν
  english_pob_choice: she remained
  chosen_spanish: permanecía
  alternatives_spanish:
  - se quedaba
  - se mantenía
  - permanecía allí
  lexicon: BDAG
  rationale: El imperfecto pide continuidad; «permanecía» conserva la duración de la acción en una forma clara y formal.
- source_word: τῇ σκηνῇ
  english_pob_choice: in the tent
  chosen_spanish: en la tienda
  alternatives_spanish:
  - en la tienda de campaña
  - en el pabellón
  - en la carpa
  lexicon: LSJ
  rationale: σκηνή significa literalmente «tienda»/«tienda de campaña». «Tienda» es la opción más directa y sobria en español bíblico contemporáneo.
- source_word: μέχρι οὗ
  english_pob_choice: until
  chosen_spanish: hasta que
  alternatives_spanish:
  - hasta el momento en que
  - hasta que llegara el momento en que
  lexicon: BDAG
  rationale: La expresión temporal se traduce de modo idiomático con «hasta que», que conserva con claridad el límite temporal.
- source_word: προσηνέγκατο
  english_pob_choice: she brought in
  chosen_spanish: llevaba
  alternatives_spanish:
  - traía
  - presentaba
  - ofrecía
  lexicon: BDAG
  rationale: En este contexto el verbo expresa el acto de llevar consigo o introducir su comida. «Llevaba» evita connotaciones sacrificiales que «ofrecía» podría sugerir y mantiene la relación con su permanencia en la tienda.
- source_word: τὴν τροφὴν αὐτῆς
  english_pob_choice: her food
  chosen_spanish: su alimento
  alternatives_spanish:
  - su comida
  - sus provisiones
  - su alimento cotidiano
  lexicon: BDAG
  rationale: «τροφὴ» denota alimento/nutrición; «alimento» es suficientemente amplio y digno, sin reducirlo innecesariamente a una sola comida.
- source_word: πρὸς ἑσπέραν
  english_pob_choice: toward evening
  chosen_spanish: hacia la tarde
  alternatives_spanish:
  - al atardecer
  - hacia el anochecer
  - por la tarde
  lexicon: LSJ
  rationale: La preposición πρός con expresión temporal indica aproximación. «Hacia la tarde» preserva mejor esa dirección temporal que una formulación más cerrada.
theological_decisions:
- issue: 'Matiz de καθαρά: pureza general o ritual'
  english_pob_reading: '''purified'' with ritual nuance left implicit'
  chosen_spanish_reading: '''purificada'' con posible trasfondo ritual implícito'
  alternative_spanish_readings:
  - '''limpia'''
  - '''ritualmente limpia'''
  - '''pura'''
  rationale: La escena sugiere una práctica de pureza, pero el griego no obliga a una glosa técnica explícita. «Purificada» comunica bien el estado y permite que el contexto determine si la referencia es ritual.
  doctrine_reference: Translation philosophy §§1, 3, 6
translation_notes:
  revision_awareness: El texto español sigue la revisión más reciente del audit trail al optar por una forma breve y natural para καθαρά («purificada»), manteniendo sin cambios la estructura temporal y narrativa de la versión inglesa revisada.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma general del proyecto, pero este versículo no contiene el nombre divino.
  - Se usa «tienda» para σκηνή por transparencia léxica y coherencia con el relato.
  - Se conserva «purificada» para evitar endurecer el matiz ritual en el cuerpo principal, dejando la alternativa en nota.
  - La correspondencia temporal de πρός ἑσπέραν se refleja con «hacia la tarde», evitando un cierre excesivamente puntual.
