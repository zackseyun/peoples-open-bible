      my disciple; and whoever does not love his father and his mother in my way will
      not become my disciple. For my mother, truly, […], but my true mother gave me
      life.
    philosophy: optimal-equivalence
    footnotes:
    - marker: a
      text: The Coptic has a lacuna after “For my mother, truly,” before the contrasting
        clause. Many editors conjecture “[gave me death]” to balance “but my true
        mother gave me life,” but Dilley marks the text as uncertain. The gap is left
        as […].
      reason: lacuna_or_restoration
    - marker: b
      text: Only the tail “…ⲟⲗ” of the adverb is preserved; it likely belongs to ⲁⲙⲏⲓⲟⲗ
        (“truly/indeed”), a common Thomasine adverb.
      reason: textual_variant
    - marker: c
      text: Some English versions read “cannot be my disciple,” but the Coptic construction
        is a simple negative future (“will not become my disciple”).
      reason: lexical_alternative
