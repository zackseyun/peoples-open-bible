translation:
  language: es
  text: Estaba tranquilo, pero él me hizo pedazos[a]; me agarró por el cuello y me destrozó; me puso como blanco para sí.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El verbo hebreo es raro y puede entenderse también como «me sacudió violentamente» o «me desgarró».
    reason: lexical_alternative
lexical_decisions:
- source_word: שָׁלֵו
  english_pob_choice: at ease
  chosen_spanish: tranquilo
  alternatives_spanish:
  - en paz
  - en calma
  - sin sobresalto
  lexicon: HALOT
  rationale: El hebreo describe un estado de quietud, seguridad o bienestar. “Tranquilo” es natural en español y conserva la idea de calma previa frente al ataque repentino.
- source_word: וַיְפַרְפְּרֵנִי
  english_pob_choice: he shattered me
  chosen_spanish: me hizo pedazos
  alternatives_spanish:
  - me sacudió violentamente
  - me desgarró
  - me estremeció
  lexicon: HALOT
  rationale: El verbo es raro y su sentido exacto es incierto; el contexto exige una acción violenta que rompe la estabilidad anterior. “Me hizo pedazos” expresa destrucción fuerte sin cerrar indebidamente la ambigüedad del hebreo.
- source_word: וְאָחַז
  english_pob_choice: he seized
  chosen_spanish: me agarró
  alternatives_spanish:
  - me tomó
  - me sujetó
  - me asió
  lexicon: HALOT
  rationale: El verbo indica tomar o sujetar con fuerza. “Me agarró” comunica con claridad la acción hostil en español contemporáneo.
- source_word: בְּעָרְפִּי
  english_pob_choice: by my neck
  chosen_spanish: por el cuello
  alternatives_spanish:
  - por la nuca
  - por la parte de atrás del cuello
  lexicon: HALOT
  rationale: עֹרֶף se refiere al cuello o la nuca. “Por el cuello” es natural y mantiene la imagen de dominio físico.
- source_word: וַיְפַצְפְּצֵנִי
  english_pob_choice: dashed me to pieces
  chosen_spanish: me lanzó en pedazos
  alternatives_spanish:
  - me quebró en pedazos
  - me destrozó
  - me hizo añicos
  lexicon: HALOT
  rationale: El verbo intensivo comunica ruptura violenta. “Me lanzó en pedazos” intenta reflejar tanto la destrucción como el movimiento brusco del cuadro poético, en línea con la revisión inglesa que prefirió un verbo más preciso y natural.
- source_word: וַיְקִימֵנִי
  english_pob_choice: he set me up
  chosen_spanish: me puso
  alternatives_spanish:
  - me colocó
  - me levantó
  - me estableció
  lexicon: HALOT
  rationale: La forma causativa de קום puede significar poner, hacer estar en pie o colocar. Aquí el contexto de blanco/objetivo favorece “me puso” como preparación para la imagen final.
- source_word: ל֝֗/וֹ
  english_pob_choice: for himself
  chosen_spanish: delante de él
  alternatives_spanish:
  - para sí mismo
  - para él
  - en su presencia
  lexicon: HALOT
  rationale: El sufijo pronominal puede expresar relación posesiva o finalidad. En español, “delante de él” hace explícita la escena sin forzar una interpretación reflexiva demasiado estrecha; la relación con el sujeto sigue visible en el contexto.
- source_word: לְמַטָּרָה
  english_pob_choice: as a target
  chosen_spanish: como blanco
  alternatives_spanish:
  - como objetivo
  - como diana
  - como meta
  lexicon: HALOT
  rationale: El término designa un blanco o señal para ataque. “Como blanco” es la opción más idiomática y militarmente vívida en español.
theological_decisions:
- issue: Referente implícito del agresor en la cadena verbal
  english_pob_reading: Rendered simply as 'he' without identifying the referent in the translation.
  chosen_spanish_reading: Se mantiene “él” sin explicitar si se trata de Dios o de un adversario.
  alternative_spanish_readings:
  - Dios me hizo pedazos...
  - él, es decir, Dios, me hizo pedazos...
  - un enemigo me hizo pedazos...
  rationale: El hebreo solo ofrece formas verbales de tercera persona y el poema mantiene la tensión retórica. En español conviene preservar esa ambigüedad textual sin resolverla en la traducción.
  doctrine_reference: Preservar la tensión teológica y literaria del libro de Job.
translation_notes:
  revision_awareness: 'Se siguió la revisión más reciente del inglés POB en el punto léxico más incierto: el segundo verbo violento se entendió con mayor precisión dinámica. La traducción española refleja ese mismo ajuste, manteniendo el resto del verso estable y sin resolver la ambigüedad del sujeto implícito.'
  spanish_consistency_notes:
  - Se usó “Yahvé” solo cuando el texto lo requiera; en este versículo no aparece el nombre divino explícito.
  - Se evitó “SEÑOR” como sustituto, y también “Cristo/Mesías”, porque no pertenecen al pasaje.
  - Se mantuvo el tono poético y judicial del hebreo con un español claro y contemporáneo.
  - “Blanco” conserva la metáfora de ataque mejor que una formulación abstracta como “objetivo”.
