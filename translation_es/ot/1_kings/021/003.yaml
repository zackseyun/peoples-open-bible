translation:
  language: es
  text: 'Pero Nabot dijo a Acab[a]: «Lejos de mí, por Yahvé, darte la herencia de mis padres».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, de manera más idiomática: «Que Yahvé no permita que yo te dé la herencia de mis padres»'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמֶר
  english_pob_choice: But ... said
  chosen_spanish: Pero ... dijo
  alternatives_spanish:
  - Y ... dijo
  - Entonces ... dijo
  lexicon: HALOT
  rationale: La waw consecutiva avanza la narración y, en contexto, el giro adversativo ‘pero’ refleja mejor el contraste con la propuesta de Ahab en el versículo anterior que una simple coordinación.
- source_word: נָבוֹת
  english_pob_choice: Naboth
  chosen_spanish: Nabot
  alternatives_spanish:
  - Nabot
  lexicon: Transliteración estándar del nombre propio
  rationale: Se mantiene el nombre propio con transliteración castellana habitual y sin adaptación interpretativa.
- source_word: אֶל
  english_pob_choice: to
  chosen_spanish: a
  alternatives_spanish:
  - hacia
  - para
  lexicon: HALOT
  rationale: La preposición de dirección/introducción del destinatario se expresa naturalmente en español con ‘a’.
- source_word: אַחְאָב
  english_pob_choice: Ahab
  chosen_spanish: Ahab
  alternatives_spanish:
  - Ajab
  lexicon: Transliteración estándar del nombre propio
  rationale: Se conserva la forma habitual en español bíblico, sin añadir una equivalencia interpretativa.
- source_word: חָלִילָה לִּי
  english_pob_choice: Far be it from me
  chosen_spanish: Lejos de mí
  alternatives_spanish:
  - Ni pensarlo
  - Lejos esté de mí
  - Nunca haría tal cosa
  lexicon: HALOT
  rationale: La locución hebrea expresa rechazo enérgico. ‘Lejos de mí’ preserva el valor idiomático sin forzar una traducción explicativa que ya vendría desarrollada en la continuación.
- source_word: מֵיהוָה
  english_pob_choice: from the LORD
  chosen_spanish: por Yahvé
  alternatives_spanish:
  - de parte de Yahvé
  - de Yahvé
  lexicon: HALOT
  rationale: El texto hebreo introduce el nombre divino con מִן en una fórmula de tipo juramentario o de apelación. En español, ‘por Yahvé’ comunica mejor esa relación instrumental/apelativa que un literal ‘de Yahvé’, y mantiene el nombre divino conforme al criterio del proyecto.
- source_word: מִתִּתִּי
  english_pob_choice: to give
  chosen_spanish: entregarte
  alternatives_spanish:
  - darte
  - cederte
  - dar
  lexicon: HALOT
  rationale: En este contexto de cesión de herencia, ‘entregar’ expresa con precisión la acción de transferir una posesión hereditaria; el enclítico ‘-te’ conserva el destinatario directo del verbo.
- source_word: נַחֲלַת
  english_pob_choice: the inheritance
  chosen_spanish: la herencia
  alternatives_spanish:
  - la posesión heredada
  - el patrimonio heredado
  lexicon: HALOT
  rationale: En contexto de tierra/familia, נַחֲלָה designa una posesión heredada con valor legal y familiar. ‘Herencia’ es natural en español y conserva esa doble fuerza.
- source_word: אֲבֹתַי
  english_pob_choice: of my fathers
  chosen_spanish: de mis padres
  alternatives_spanish:
  - de mis antepasados
  - de mis padres y mayores
  lexicon: HALOT
  rationale: Aunque el hebreo dice literalmente ‘mis padres’, en español ‘padres’ comunica de forma más clara la línea familiar de origen dentro de una herencia ancestral. Se mantiene la referencia generacional sin neutralizar innecesariamente el término.
theological_decisions:
- issue: Rendering of the divine name יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - el SEÑOR
  rationale: El Tetragrámaton se traslada con el nombre propio del pacto, no con una sustitución reverencial. ‘Yahvé’ es la forma estándar adoptada en este proyecto para mantener la visibilidad del nombre divino en español.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Interpretation of חָלִילָה לִּי מֵיהוָה as an oath-like repudiation
  english_pob_reading: Far be it from me by Yahweh
  chosen_spanish_reading: Lejos de mí, por Yahvé
  alternative_spanish_readings:
  - Lejos de mí, ante Yahvé
  - Ni pensarlo, por Yahvé
  - Que Yahvé me libre
  rationale: La frase no se resuelve como un simple ‘no’; conserva una fuerza idiomática de rechazo solemne. ‘Lejos de mí, por Yahvé’ mantiene tanto la repulsa como la apelación al nombre divino sin aplanar la tensión retórica.
  doctrine_reference: 'DOCTRINE.md Translation philosophy: original-language primacy over translation tradition; preserve theological tension rather than resolve it'
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión más reciente del audit trail, que corrigió una lectura menos natural de la frase hebrea de repudio. La presente redacción sigue esa dirección, pero en español opta por ‘por Yahvé’ para reflejar mejor la función apelativa/juramentaria de מִן con el nombre divino, sin convertir la expresión en una paráfrasis devocional.
  spanish_consistency_notes:
  - Se mantiene ‘Yahvé’ como forma del nombre divino, coherente con el criterio del proyecto.
  - Se usa ‘herencia’ para נַחֲלָה, preservando el sentido legal y familiar de la posesión.
  - ‘Padres’ se conserva por fidelidad al hebreo y por la referencia genealógica explícita.
  - La puntuación de la cita y el uso del diálogo siguen el registro bíblico en español moderno.
