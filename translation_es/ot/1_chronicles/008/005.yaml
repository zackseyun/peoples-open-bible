- source_word: חוּרָם
  english_pob_choice: Huram
  chosen_spanish: Huram
  alternatives_spanish:
  - Juram
  - Hiram
  lexicon: nombre propio
  rationale: Se translitera el nombre como aparece en este versículo. Se evita sustituirlo por la variante más conocida 'Hiram', porque el testimonio hebreo de este pasaje favorece 'Huram'.
- source_word: וְ
  english_pob_choice: and
  chosen_spanish: y
  alternatives_spanish:
  - e
  lexicon: conjunción coordinante
  rationale: La serie nominal en español se expresa naturalmente con 'y' antes del último elemento. No se requiere 'e' porque la siguiente palabra no empieza con sonido /i/.
