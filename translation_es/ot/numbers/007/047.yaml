    rationale: El hebreo dice literalmente 'para el sacrificio de los šelamim', pero en español 'el sacrificio de paz' suena más natural y suficiente en este contexto repetitivo. La nota puede seguir explicando alternativas como 'comunión' o 'bienestar'.
  revised_spanish_text: 'y para el sacrificio de paz[a]: dos reses, cinco carneros, cinco machos cabríos y cinco corderos de un año. Esta fue la ofrenda de Eliasaf hijo de Deuel.'
