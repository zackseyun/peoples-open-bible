translation:
  language: es
  text: 'Y el profeta, el sacerdote o el pueblo, quien diga: «La carga[a] de Yahvé», yo castigaré a aquel hombre y a los de su casa.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «el oráculo de Yahvé». En este contexto, Jeremías aprovecha el sentido más literal de מַשָּׂא como «carga» para su reprensión.
    reason: lexical_alternative
lexical_decisions:
- source_word: הַנָּבִיא
  english_pob_choice: the prophet
  chosen_spanish: el profeta
  alternatives_spanish:
  - el profeta
  lexicon: HALOT
  rationale: נָבִיא se refiere normalmente a un profeta. Con el artículo hebreo, el español natural es «el profeta».
- source_word: הַכֹּהֵן
  english_pob_choice: the priest
  chosen_spanish: el sacerdote
  alternatives_spanish:
  - el sacerdote
  - el presbítero
  lexicon: HALOT
  rationale: כֹּהֵן designa al sacerdote del culto israelita; «sacerdote» es la equivalencia directa y más transparente en español.
- source_word: הָעָם
  english_pob_choice: the people
  chosen_spanish: el pueblo
  alternatives_spanish:
  - el pueblo
  - la gente
  lexicon: HALOT
  rationale: עָם puede ser colectivo. «El pueblo» mantiene el valor colectivo y encaja bien con la serie de sujetos.
- source_word: אֲשֶׁר יֹאמַר
  english_pob_choice: who say
  chosen_spanish: que digan
  alternatives_spanish:
  - que diga
  - quien diga
  lexicon: HALOT
  rationale: Aunque el verbo hebreo está en singular, la frase se aplica distributivamente a la serie coordinada («el profeta, el sacerdote y el pueblo»). En español, el plural «que digan» conserva mejor esa aplicación colectiva.
- source_word: מַשָּׂא יְהוָה
  english_pob_choice: The burden of Yahweh
  chosen_spanish: La carga de Yahvé
  alternatives_spanish:
  - El oráculo de Yahvé
  - La carga de Yahvé
  - El mensaje de Yahvé
  lexicon: HALOT
  rationale: En Jeremías 23 el término מַשָּׂא funciona polémicamente con su sentido literal de «carga», no solo como fórmula profética. «Carga» preserva el juego de palabras y la censura del contexto.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahvé
  lexicon: HALOT
  rationale: Siguiendo la política del proyecto para el nombre divino, se translitera como «Yahvé» en el texto principal.
- source_word: וּפָקַדְתִּי עַל
  english_pob_choice: I will punish
  chosen_spanish: yo castigaré
  alternatives_spanish:
  - yo castigaré
  - yo tomaré cuentas de
  - yo visitaré con castigo
  lexicon: HALOT
  rationale: פָּקַד con עַל en contexto judicial significa intervenir con juicio/castigo. «Castigaré» comunica con claridad el sentido en español moderno.
- source_word: הָאִישׁ הַהוּא
  english_pob_choice: that man
  chosen_spanish: aquel hombre
  alternatives_spanish:
  - ese hombre
  - aquel hombre
  - esa persona
  lexicon: HALOT
  rationale: El hebreo es masculino singular; «aquel hombre» conserva la deíxis y el tono judicial del pasaje.
- source_word: בֵּיתוֹ
  english_pob_choice: his household
  chosen_spanish: su casa
  alternatives_spanish:
  - su casa
  - su familia
  - su casa y su casa
  lexicon: HALOT
  rationale: בַּיִת aquí puede incluir la casa/hogar del hombre y, por extensión, su grupo doméstico. «Su casa» es breve y puede abarcar ese sentido en español bíblico.
theological_decisions:
- issue: Sentido polémico de מַשָּׂא יְהוָה
  english_pob_reading: The burden of Yahweh
  chosen_spanish_reading: La carga de Yahvé
  alternative_spanish_readings:
  - El oráculo de Yahvé
  - El mensaje de Yahvé
  rationale: 'Jeremías 23:33–40 juega con el doble sentido de מַשָּׂא. Traducirlo como «carga» mantiene la ironía profética: no es una fórmula neutra, sino una palabra que el pasaje denuncia y reinterpreta.'
  doctrine_reference: Translation philosophy §§1, 3, 5
- issue: Nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahvé
  rationale: El texto hebreo conserva el nombre propio divino. En español, «Yahvé» sigue la convención del proyecto y evita la sustitución por un título genérico.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
translation_notes:
  revision_awareness: Se revisó el texto a la luz del audit trail inglés y del hebreo masorético. No se detectaron revisiones textuales sustantivas en el pass más reciente; se mantuvo la decisión de reflejar el juego de palabras de מַשָּׂא y el juicio judicial de פָּקַד.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» conforme a la política del proyecto para el nombre divino.
  - Se prefirió «sacerdote» por correspondencia directa con כֹּהֵן.
  - Se optó por «carga» para conservar la ironía profética de Jeremías 23.
  - Se usó «su casa» para un equivalente breve y natural de בֵּיתוֹ en este contexto judicial.
