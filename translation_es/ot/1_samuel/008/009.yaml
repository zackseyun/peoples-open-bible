  glossary_alignment: No hay conflicto con los términos globales del proyecto. 'Justicia del rey' sigue la revisión inglesa auditada, aunque sigue siendo una opción tensa en español; conviene conservar la nota léxica sobre מִשְׁפָּט para no cerrar el sentido. 'Reinará sobre ellos' está bien alineado.
