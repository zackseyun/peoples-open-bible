translation:
  language: es
  text: Pero en cuanto a ti, no ores por este pueblo; no alces por ellos clamor ni oración, y no me ruegues[a], porque no te estoy escuchando[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «no intercedas ante mí» / «no me presiones». El verbo hebreo puede transmitir súplica insistente o intercesión.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «porque no te escucharé». El hebreo puede verterse con matiz futuro, aunque la forma participial también sostiene «no te estoy escuchando».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְאַתָּה
  english_pob_choice: But as for you
  chosen_spanish: Pero en cuanto a ti
  alternatives_spanish:
  - Y tú
  - Pero tú
  lexicon: HALOT
  rationale: La partícula contrastiva y el pronombre independiente introducen un contraste enfático con Jeremías; «pero en cuanto a ti» conserva ese giro y su foco directo en el profeta.
- source_word: אַל תִּתְפַּלֵּל
  english_pob_choice: do not pray
  chosen_spanish: no ores
  alternatives_spanish:
  - no ruegues
  - no intercedas en oración
  lexicon: HALOT
  rationale: אַל con imperfecto expresa prohibición. «No ores» es la equivalencia natural en español y mantiene el valor básico de la raíz sin sobrecargarla.
- source_word: בְּעַד הָעָם הַזֶּה
  english_pob_choice: for this people
  chosen_spanish: por este pueblo
  alternatives_spanish:
  - por este pueblo, en favor de él
  - a favor de este pueblo
  lexicon: HALOT
  rationale: בְּעַד expresa aquí la idea de actuar en favor de alguien. «Por este pueblo» es breve y natural; el matiz representativo queda reforzado en la cláusula siguiente.
- source_word: וְאַל תִּשָּׂא
  english_pob_choice: and do not lift up
  chosen_spanish: no alces
  alternatives_spanish:
  - no levantes
  - no alces al cielo
  lexicon: HALOT
  rationale: נשא conserva la imagen de «levantar» aplicable a la oración/clamor. «No alces» preserva la metáfora hebrea sin volverla torpe en español.
- source_word: רִנָּה
  english_pob_choice: a cry
  chosen_spanish: clamor
  alternatives_spanish:
  - grito
  - grito de súplica
  lexicon: HALOT
  rationale: רִנָּה puede denotar un clamor vocal intenso; dado el contexto de súplica prohibida, «clamor» preserva la fuerza audible sin restringirla indebidamente a un sentido de gozo.
- source_word: וּתְפִלָּה
  english_pob_choice: or prayer
  chosen_spanish: ni oración
  alternatives_spanish:
  - y oración
  - ni ruego
  lexicon: HALOT
  rationale: La serie negativa reúne dos términos casi sinónimos. «Ni oración» reproduce de forma natural la exclusión total de ambos tipos de súplica.
- source_word: בַעֲדָם
  english_pob_choice: on their behalf
  chosen_spanish: por ellos
  alternatives_spanish:
  - en favor de ellos
  - en su nombre
  lexicon: HALOT
  rationale: El sufijo pronominal con בְּעַד vuelve a expresar intercesión en favor de terceros. «Por ellos» es idiomático en español y se entiende como intercesión por su causa.
- source_word: וְאַל תִּפְגַּע בִּי
  english_pob_choice: and do not intercede with me
  chosen_spanish: y no intercedas conmigo
  alternatives_spanish:
  - y no me ruegues
  - y no me importunes
  lexicon: HALOT
  rationale: פגע en este contexto apunta a una súplica insistente dirigida a Dios. «Intercedas conmigo» conserva la relación personal y la fuerza de mediación sin mover el sentido hacia mero encuentro físico.
- source_word: כִּי אֵינֶנִּי שֹׁמֵעַ אֹתָךְ
  english_pob_choice: for I am not listening to you
  chosen_spanish: porque no te estoy escuchando
  alternatives_spanish:
  - porque no te escucharé
  - porque no te oigo
  lexicon: HALOT
  rationale: El participio negado expresa una negativa en curso; «no te estoy escuchando» refleja bien el valor durativo y la dureza del rechazo divino.
theological_decisions:
- issue: Prohibición divina de la intercesión de Jeremías
  english_pob_reading: A direct divine prohibition of prophetic intercession for Judah at this moment of judgment
  chosen_spanish_reading: Una prohibición divina directa de que Jeremías interceda por este pueblo en este momento de juicio
  alternative_spanish_readings:
  - Una advertencia hiperbólica más que una prohibición absoluta
  - Una negativa solo momentánea sin alcance real
  rationale: El triple אַל y la cláusula final sostienen una negativa real y enfática. La traducción mantiene esa severidad sin añadir conclusiones doctrinales ajenas al versículo.
  doctrine_reference: Preserve theological tension rather than resolve it.
translation_notes:
  revision_awareness: Revisado frente al pasaje fuente hebreo y al control auditado en inglés; se conserva la prohibición triple, el contraste inicial y el matiz durativo de la negativa final sin suavizarlos.
  spanish_consistency_notes:
  - Se mantiene «intercedas conmigo» para conservar el valor relacional y mediador de פגע en este contexto.
  - Se usa «clamor ni oración» para reflejar la pareja de términos de súplica sin introducir una distinción no marcada en el hebreo.
  - Se evita «SEÑOR» u otra sustitución reverencial porque el versículo no contiene el Tetragrámaton.
