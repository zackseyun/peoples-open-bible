translation:
  language: es
  text: De los hijos de Secanías, hijo de Jahaziel, y con él trescientos varones[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «males». El hebreo especifica sexo masculino más que edad o condición social.
    reason: lexical_alternative
lexical_decisions:
- source_word: מִ/בְּנֵי
  english_pob_choice: From the sons of
  chosen_spanish: De los hijos de
  alternatives_spanish:
  - De entre los hijos de
  - De los descendientes de
  lexicon: HALOT
  rationale: La construcción con מִן + בְּנֵי introduce un subgrupo dentro de la lista genealógica. En español, «De los hijos de» conserva la fórmula de pertenencia/listado sin endurecerla innecesariamente; «descendientes» suavizaría demasiado el valor genealógico del hebreo.
- source_word: שְׁכַנְיָה
  english_pob_choice: Shecaniah
  chosen_spanish: Secaías
  alternatives_spanish:
  - Secanías
  - Shecanías
  lexicon: Convención transliterada
  rationale: Se adopta una transliteración castellana común y legible. «Secaías» mantiene la referencia onomástica sin anglicismo y resulta natural en español bíblico.
- source_word: בֶּן
  english_pob_choice: the son of
  chosen_spanish: hijo de
  alternatives_spanish:
  - el hijo de
  lexicon: HALOT
  rationale: En español, la relación constructa se expresa con naturalidad mediante «hijo de». El artículo explícito no es necesario y haría la frase más pesada.
- source_word: יַחֲזִיאֵל
  english_pob_choice: Jahaziel
  chosen_spanish: Jahaziel
  alternatives_spanish:
  - Yajaziel
  lexicon: Convención transliterada
  rationale: Se conserva el nombre propio por transliteración estándar. «Jahaziel» es suficientemente reconocible y fiel al hebreo sin forzar una grafía menos establecida.
- source_word: וְ/עִמּוֹ
  english_pob_choice: and with him
  chosen_spanish: y con él
  alternatives_spanish:
  - con él
  lexicon: HALOT
  rationale: La coordinación hebrea se refleja con «y con él» para mantener el paralelismo de la lista. La expresión indica acompañamiento, no mera posesión.
- source_word: שְׁלֹשׁ מֵא֖וֹת
  english_pob_choice: three hundred
  chosen_spanish: trescientos
  alternatives_spanish:
  - trescientas
  lexicon: HALOT
  rationale: Cardinal directo y transparente. En español, el numeral concuerda con el sustantivo explícito que sigue implícito en la enumeración.
- source_word: הַ/זְּכָרִים
  english_pob_choice: males
  chosen_spanish: varones
  alternatives_spanish:
  - hombres
  - males
  lexicon: HALOT
  rationale: «Varones» comunica bien el rasgo de sexo masculino en un registro bíblico natural y evita la posible dureza técnica de «males». Preserva la distinción del hebreo frente a una lectura meramente social de «hombres».
translation_notes:
  revision_awareness: El texto inglés POB mantiene la estructura genealógica y la nota lexical sobre הַזְּכָרִים; la versión española conserva esa misma tensión semántica, optando por «varones» en el texto principal y señalando la alternativa literal «males» en nota.
  spanish_consistency_notes:
  - 'Se mantiene el orden genealógico del hebreo: grupo de procedencia, filiación, acompañantes y cantidad.'
  - La elección de «varones» armoniza con un español bíblico claro, mientras la nota preserva la alternativa más literal.
  - Se evita «SEÑOR» u otras sustituciones no pertinentes, ya que el verso no contiene el Tetragrámaton ni lenguaje teológico especial.
