base_translation:
  language: en
  yaml_path: translation/ot/1_samuel/022/014.yaml
  text: Ahimelech answered the king and said[a], “And who among all your servants is as faithful as David, the king’s son-in-law, who has access to your council[b], and is honored in your house?”
  footnotes:
