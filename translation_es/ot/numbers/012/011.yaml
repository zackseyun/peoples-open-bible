translation:
  language: es
  text: 'Y Aarón dijo a Moisés[a]: «Por favor, mi señor, no cargues sobre nosotros pecado, en lo que hemos obrado neciamente y en lo que hemos pecado».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «no cargues sobre nosotros culpa».
    reason: lexical_alternative
lexical_decisions:
- source_word: בִּי אֲדֹנִי
  english_pob_choice: Please, my lord
  chosen_spanish: Por favor, mi señor
  alternatives_spanish:
  - Te ruego, mi señor
  - Oh, mi señor
  lexicon: HALOT
  rationale: בִּי es una súplica cortés; en español natural y respetuoso, «Por favor» transmite la petición sin volverla arcaica. אֲדֹנִי es un tratamiento humano hacia Moisés, por lo que «mi señor» conserva la deferencia sin convertirlo en un título divino.
- source_word: אַל נָא
  english_pob_choice: do not
  chosen_spanish: no pongas
  alternatives_spanish:
  - por favor, no pongas
  - no coloques
  lexicon: HALOT
  rationale: La nota de cortesía ya quedó expresada en «Por favor», así que el negativo simple «no» mantiene el flujo natural del español y evita redundancia, igual que en el inglés POB.
- source_word: תָשֵׁת עָלֵינוּ חַטָּאת
  english_pob_choice: lay sin on us
  chosen_spanish: pongas sobre nosotros pecado
  alternatives_spanish:
  - eches sobre nosotros pecado
  - pongas sobre nosotros culpa
  - cargues sobre nosotros culpa
  lexicon: HALOT
  rationale: El verbo con עַל conserva la imagen de poner o colocar algo sobre alguien. «Pecado» sigue la elección principal del POB; «culpa» queda como alternativa contextual porque חַטָּאת puede apuntar a la culpa imputada o al acto mismo.
- source_word: חַטָּאת
  english_pob_choice: sin
  chosen_spanish: pecado
  alternatives_spanish:
  - culpa
  lexicon: HALOT
  rationale: En este ruego de intercesión tras una falta, la palabra puede referirse tanto al pecado como a su responsabilidad. «Pecado» es más directo y transparente en español, mientras que «culpa» conserva la alternativa semántica reconocida por el POB.
- source_word: אֲשֶׁר נוֹאַלְנוּ
  english_pob_choice: in which we have acted foolishly
  chosen_spanish: en lo cual hemos obrado neciamente
  alternatives_spanish:
  - en lo que hemos actuado neciamente
  - en lo cual hemos sido necios
  - porque hemos obrado neciamente
  lexicon: HALOT
  rationale: El verbo en nifal comunica necedad o conducta insensata. «Hemos obrado neciamente» es natural en español y conserva el matiz moral de la confesión; «en lo cual» refleja mejor el valor relativo de אֲשֶׁר que una causalidad explícita.
- source_word: וַאֲשֶׁר חָטָאנוּ
  english_pob_choice: and in which we have sinned
  chosen_spanish: y en lo cual hemos pecado
  alternatives_spanish:
  - y en lo que hemos pecado
  - y hemos pecado
  - y en eso hemos pecado
  lexicon: HALOT
  rationale: La segunda cláusula refuerza la confesión. «Y en lo cual hemos pecado» mantiene la coordinación y el paralelo con la primera cláusula, preservando el valor relativo que el POB decidió reflejar en inglés.
theological_decisions:
- issue: Tratamiento honorífico de Moisés
  english_pob_reading: my lord
  chosen_spanish_reading: mi señor
  alternative_spanish_readings:
  - señor mío
  - sir
  rationale: Aquí אֲדֹנִי es un título de respeto hacia un superior humano, no el nombre divino. «Mi señor» conserva la relación jerárquica y la urgencia de la súplica mejor que un simple «señor» o el menos preciso «sir».
  doctrine_reference: Translate titles; transliterate names.
translation_notes:
  revision_awareness: 'El texto español sigue la revisión más reciente del POB en el punto clave de אֲשֶׁר: se preserva el valor relativo con «en lo cual» en vez de reinterpretarlo como causalidad con «porque». También se mantiene la distinción entre el ruego cortés inicial y la prohibición breve del verbo negativo.'
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando el texto lo exija; aquí no aparece.
  - Se mantiene «pecado» como término principal y «culpa» solo como alternativa anotada, conforme al expediente inglés.
  - La súplica se presenta con un español sobrio y publicable, sin arcaísmos innecesarios.
  - No se introduce «Cristo» ni vocabulario eclesiástico ajeno al hebreo del versículo.
