translation:
  language: es
  text: Y Yahvé[a] habló a Moisés en el monte Sinaí, diciendo,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «YHWH»; también puede transliterarse «Yahvé» o «Jehová».'
    reason: alternative_reading
lexical_decisions:
- source_word: וַיְדַבֵּר
  english_pob_choice: And ... spoke
  chosen_spanish: habló
  alternatives_spanish:
  - y habló
  - entonces habló
  - y dijo
  lexicon: HALOT
  rationale: El verbo hebreo דבר introduce el siguiente acto narrativo con el matiz de comunicación formal. En español, "habló" comunica el evento de manera natural y mantiene la distinción frente a אמר, que suele rendirse como "decir".
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  - el SEÑOR
  lexicon: HALOT
  rationale: El texto hebreo usa el nombre propio divino יְהוָה. En la POB en inglés se opta por transliterarlo; en español, "Yahvé" preserva ese nombre personal y evita la sustitución por un título.
- source_word: אֶל
  english_pob_choice: to
  chosen_spanish: a
  alternatives_spanish:
  - para
  - hacia
  lexicon: HALOT
  rationale: La preposición marca el destinatario del discurso. En español, "a" es la equivalencia directa y más natural con el objeto indirecto introducido por אֶל.
- source_word: מֹשֶׁה
  english_pob_choice: Moses
  chosen_spanish: Moisés
  alternatives_spanish:
  - Moisés
  lexicon: HALOT
  rationale: Nombre propio bíblico estándar en español.
- source_word: בְּהַר סִינַי
  english_pob_choice: on Mount Sinai
  chosen_spanish: en el monte Sinaí
  alternatives_spanish:
  - en el monte Sinaí
  - sobre el monte Sinaí
  - en el Sinaí
  lexicon: HALOT
  rationale: El ב locativo indica ubicación. En español, "en el monte Sinaí" expresa con claridad la localización del habla sin forzar un calco de "on".
- source_word: לֵאמֹר
  english_pob_choice: saying,
  chosen_spanish: diciendo,
  alternatives_spanish:
  - 'para decir:'
  - 'y dijo:'
  lexicon: HALOT
  rationale: El infinitivo funciona como fórmula introductoria de la cita que sigue. "Diciendo," conserva el enlace discursivo convencional sin añadir contenido interpretativo.
theological_decisions:
- issue: Traducción del nombre divino YHWH
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Jehová
  - el SEÑOR
  rationale: La POB documenta la decisión de no enmascarar el Tetragrámaton con un título. "Yahvé" mantiene el nombre propio del pacto y es la forma más establecida en español bíblico para esa transliteración.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יהוה / YHWH → Yahvé'
translation_notes:
  revision_awareness: El pasaje en inglés quedó sin cambios en la revisión más reciente (alta concordancia, sin observaciones). La propuesta española sigue esa lectura estable y conserva la estructura narrativa y la fórmula introductoria del original hebreo.
  spanish_consistency_notes:
  - Se mantiene "Yahvé" de forma consistente para יְהוָה, conforme al criterio doctrinal del proyecto.
  - '"Monte Sinaí" conserva el nombre geográfico tradicional en español, con preposición locativa natural.'
  - '"Diciendo," mantiene la función de enlace hacia la cita siguiente sin convertirla en paráfrasis.'
