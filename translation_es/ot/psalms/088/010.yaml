review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien la estructura y el sentido general del hebreo: singular poético «mi ojo», causa de la aflicción, invocación diaria a Yahvé y el gesto de extender las manos en oración. Sin embargo, «a ti clamo» intensifica ligeramente קְרָאתִיךָ frente a la decisión auditada «I call on you» y rompe la relación sintáctica natural con «Yahvé» vocativo; además, «extiendo» debilita un poco el matiz de «extender/desplegar hacia» ya presente en el hebreo con אֵלֶיךָ.'
  spanish_quality_summary: 'El texto es claro y digno, y usa bien «Yahvé». La frase inicial y final son naturales en español. La mejora principal es ajustar la oración media a una formulación más fiel y fluida: «te invoco cada día, Yahvé» mantiene el valor oracional sin sobrecargarlo, y «extiendo hacia ti mis manos» reproduce mejor el gesto direccional.'
  glossary_alignment: 'Buen alineamiento general con la terminología del proyecto: יְהוָה → «Yahvé» está correcto; no hay conflictos con otros términos doctrinales. La única desviación léxica relevante es קְרָאתִיךָ, donde conviene «te invoco» en lugar de «a ti clamo» para seguir más de cerca la decisión POB y evitar una intensificación no exigida por el verbo.'
  issues:
  - severity: medium
    issue: «a ti clamo» intensifica innecesariamente קְרָאתִיךָ
    rationale: El hebreo básico es «te llamo/invoco» en contexto de oración. «Clamo» puede sugerir mayor intensidad emocional que la explicitada por el verbo, mientras que el inglés auditado eligió deliberadamente «I call on you».
  - severity: low
    issue: La colocación de «Yahvé» suena menos natural tras «a ti clamo»
    rationale: «A ti clamo cada día, Yahvé» es comprensible, pero «te invoco cada día, Yahvé» o «Yahvé, te invoco cada día» encaja mejor en español y conserva el vocativo con mayor fluidez.
  - severity: low
    issue: «extiendo mis manos hacia ti» puede afinarse para reflejar mejor la dirección del gesto
    rationale: No es incorrecto, pero «extiendo hacia ti mis manos» o «extiendo mis manos a ti» reproduce más de cerca la relación verbal + complemento del hebreo y mantiene buena naturalidad.
  revised_spanish_text: Mi ojo se debilita[a] a causa de la aflicción; te invoco cada día, Yahvé; extiendo hacia ti mis manos.
