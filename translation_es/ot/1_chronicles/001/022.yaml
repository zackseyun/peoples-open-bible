  - (no se traduce de manera separada)
  lexicon: HALOT
  rationale: En una lista genealógica, וְאֶת marca cada integrante del conjunto; en español, la coordinación normal con comas y la conjunción final 'y' comunica adecuadamente la relación sin sobrecargar el texto.
- source_word: עֵיבָל
  english_pob_choice: Ebal
  chosen_spanish: Ebal
  alternatives_spanish:
  - Obal
  lexicon: HALOT
  rationale: Nombre propio transliterado desde la forma hebrea. Se conserva 'Ebal' como forma principal, y se documenta la variante 'Obal' atestiguada en el paralelo de Génesis 10:28.
- source_word: אֲבִימָאֵל
  english_pob_choice: Abimael
  chosen_spanish: Abimael
  lexicon: HALOT
  rationale: Nombre propio transliterado directamente del hebreo, sin traducir, siguiendo la convención del proyecto para antropónimos.
- source_word: שְׁבָא
  english_pob_choice: Sheba
  chosen_spanish: Sheba
  alternatives_spanish:
  - Seba
  lexicon: HALOT
  rationale: Nombre propio transliterado según la forma hebrea שְׁבָא. Se mantiene 'Sheba' como forma estándar para esta grafía; 'Seba' corresponde a otro nombre afín y no se adopta aquí.
