revisions:
- from: Y cuando habían entrado en su interior[a], no se notó que habían entrado en su interior; y su aspecto era malo, como al principio. Entonces desperté.
  to: Y entraron en su vientre[a], pero no se notó que habían entrado en su vientre, y su aspecto era malo, como al principio. Entonces desperté.
  rationale: 'Se corrige la expresión clave para alinearla con la decisión léxica documentada del POB: en este contexto, קֶרֶב debe expresarse de manera corporal concreta. También se elimina ''cuando'' para seguir más de cerca la secuencia narrativa hebrea. El resto del versículo se conserva porque es fiel y natural en español.'
