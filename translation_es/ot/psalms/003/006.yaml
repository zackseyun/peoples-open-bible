review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien la secuencia hebrea básica: acostarse, dormir, despertar, y la causa expresada por כִּי. También preserva correctamente יהוה como «Yahvé» y סמך como «sostiene». Sin embargo, la distribución de las notas al pie no sigue fielmente la auditoría inglesa: la nota [a] se ancla en «dormí», pero la alternativa documentada en inglés corresponde a הֱקִיצוֹתִי («desperté / me desperté / desperté»), no a «dormí». Además, la nota [b] se ancla en «desperté» pero su contenido mezcla la alternativa de הֱקִיצוֹתִי con una glosa lexical genérica, mientras que la auditoría inglesa reserva la segunda nota para יִסְמְכֵנִי («sostiene / sustenta / sostiene firmemente»).'
  spanish_quality_summary: El español es claro, natural y de registro digno. «Yo me acosté y dormí; desperté, porque Yahvé me sostiene» suena bien en español bíblico contemporáneo. La única reparación necesaria es de consistencia editorial y de anclaje de notas; opcionalmente puede omitirse «Yo» por fluidez, pero no es un error. Conviene también ajustar la nota sobre «desperté» para no sugerir innecesariamente reflexividad como preferente.
  glossary_alignment: 'Buena alineación con el glosario del proyecto: יהוה -> «Yahvé» está correctamente aplicado; no hay términos doctrinalmente conflictivos adicionales. «Me sostiene» encaja bien para יִסְמְכֵנִי, con «me sustenta» o «me sostiene firmemente» como alternativas posibles en nota. No se observan conflictos con terminología mesiánica, pneumatológica ni de otros términos controlados.'
  issues:
  - severity: medium
    issue: La nota [a] está anclada a «dormí», pero la alternativa preservada por la auditoría inglesa corresponde al verbo «desperté».
    rationale: El inglés documenta para הֱקִיצוֹתִי una alternativa tipo «I awoke / I awakened», no para «and slept». La nota española actual introduce una alternativa distinta («me dormí») que no refleja esa decisión auditada.
  - severity: medium
    issue: Falta una nota lexical equivalente para «me sostiene».
    rationale: La auditoría inglesa conserva una alternativa para יִסְמְכֵנִי («upholds me»). El borrador español no la preserva en el lugar correspondiente, por lo que se pierde una alternativa significativa del expediente POB.
  - severity: low
    issue: La redacción de la nota sobre «desperté» puede simplificarse.
    rationale: '«El contexto muestra que el sujeto se despierta a sí mismo» no es la mejor formulación en español ni refleja con precisión que el verbo se toma aquí intransitivamente: el salmista despertó.'
  revised_spanish_text: Yo me acosté y dormí; desperté[a], porque Yahvé me sostiene[b].
