review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura del hebreo: el lamento colectivo de ''toda la tierra'', el cruce continuo de ''todo el pueblo'', el cruce puntual del rey, y la ruta hacia el desierto. También conserva correctamente נחל קדרון como referencia topográfica con nota cultural. Sin embargo, dos elecciones debilitan la fidelidad idiomática y la legibilidad: ''lloraba con fuerte voz'' suena poco natural en español, y la nota [a] no corresponde al matiz alternativo documentado en el POB inglés, que en realidad se refiere a la última frase sobre ''el camino del desierto'', no al llanto.'
  spanish_quality_summary: El texto es generalmente claro y digno, pero 'con fuerte voz' resulta torpe en español bíblico moderno; 'a gran voz' o 'en alta voz' sería más idiomático conservando la imagen. Además, la ubicación de la nota [a] en 'lloraba' es errónea respecto del expediente inglés. El resto del verso fluye bien en español neutral y mantiene un registro apropiado.
  glossary_alignment: No hay conflictos con la terminología teológica del proyecto. 'Cedrón' y 'desierto' son adecuados. 'Pueblo' para עָם y 'tierra' para אָרֶץ son defendibles. El verbo 'pasó' / 'iba pasando' es aceptable, aunque 'cruzó' / 'iban cruzando' también podría funcionar; no es necesario cambiarlo.
  issues:
  - severity: medium
    issue: La nota [a] está anclada en el segmento equivocado y su contenido no sigue el expediente inglés.
    rationale: En el POB inglés, la nota a ofrece una alternativa para la frase final ('by the way of the wilderness'), no para 'was weeping with a loud voice'. La revisión debe mover la nota al tramo 'por el camino hacia el desierto' y ajustar su texto.
  - severity: medium
    issue: La expresión 'lloraba con fuerte voz' es poco natural en español.
    rationale: Aunque intenta conservar la imagen hebrea de קול גדול, en español suena forzada. 'Lloraba a gran voz' preserva mejor el matiz auditivo y la dignidad del registro.
  revised_spanish_text: Y toda la tierra lloraba a gran voz, y todo el pueblo iba pasando. El rey también pasó el valle de Cedrón[b], y todo el pueblo iba pasando por el camino hacia el desierto[a].
  revised_footnotes:
  - marker: a
    text: 'O, más formalmente: «por el camino del desierto».'
    reason: lexical_alternative
  - marker: b
    text: 'Cedrón: tradicionalmente «el torrente Cedrón». נחל puede referirse a un valle, barranco, uadi o curso de agua estacional.'
    reason: cultural_note
  revision_rationale: Se corrige la ubicación y el contenido de la nota [a] para que coincidan con la evidencia y el expediente del POB inglés, y se mejora 'con fuerte voz' a 'a gran voz' para un español más natural sin perder la imagen hebrea. El resto del texto se mantiene por ser fiel y claro.
