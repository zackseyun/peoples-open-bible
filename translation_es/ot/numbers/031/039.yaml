- from: Los asnos fueron 30.500[a], y su tributo para Yahvé fue 61.
  to: Los asnos fueron 30.500[a], y su tributo a Yahvé fue 61.
  rationale: Se corrige una nota al pie gravemente errónea ('levadura' → 'leva') para alinearla con el hebreo מִכְסָם y con la auditoría inglesa ('levy'). También se ajusta 'para Yahvé' a 'a Yahvé' por mayor naturalidad y precisión en español al expresar el destinatario del tributo. El resto del versículo puede mantenerse.
  reviewer_model: gpt-5.4
