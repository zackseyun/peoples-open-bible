translation:
  language: es
  text: 'Entonces él fue a los hombres de Sucot y dijo[a]: «Aquí están Zebah y Zalmunna, acerca de quienes ustedes se burlaron de mí, diciendo: “¿Acaso ya están Zebah y Zalmunna en tu mano[b], para que demos pan a tus hombres cansados?”»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «por quienes me insultaron» o «acerca de quienes me reprocharon». El verbo hebreo lleva el sentido de reproche o burla despectiva.'
    reason: lexical_alternative
  - marker: b
    text: 'Lit.: «¿Está la mano/palma de Zebah y Zalmunna ahora en tu mano...?»; es un modismo que significa: «¿Ya los has capturado?»'
    reason: lexical_alternative
lexical_decisions:
- source_word: אַנְשֵׁי סֻכּוֹת
  english_pob_choice: the men of Succoth
  chosen_spanish: los hombres de Sucot
  alternatives_spanish:
  - la gente de Sucot
  lexicon: HALOT
  rationale: אַנְשֵׁי es literalmente «hombres de». En este contexto, Gideón se dirige a los varones/dirigentes de la localidad, por lo que «los hombres de Sucot» conserva mejor el matiz social y de género que una forma más general.
- source_word: הִנֵּה
  english_pob_choice: Here are
  chosen_spanish: Aquí están
  alternatives_spanish:
  - Miren
  - He aquí
  lexicon: HALOT
  rationale: La partícula deíctica presenta a los cautivos como una realidad inmediata. «Aquí están» reproduce ese valor demostrativo en un español natural y digno.
- source_word: זֶבַח וְצַלְמֻנָּע
  english_pob_choice: Zebah and Zalmunna
  chosen_spanish: Zebah y Zalmunna
  lexicon: Transliteración estándar
  rationale: Son nombres propios y se transliteran para conservar la forma del texto fuente y la consistencia del proyecto.
- source_word: אֲשֶׁר חֵרַפְתֶּם אֹתִי
  english_pob_choice: about whom you taunted me
  chosen_spanish: a quienes ustedes me ultrajaron
  alternatives_spanish:
  - a quienes ustedes me reprocharon
  - a quienes ustedes se burlaron de mí
  lexicon: HALOT
  rationale: חֵרַף expresa reproche despectivo, insultante. «Ultrajaron» comunica con fuerza ese tono de menosprecio; se mantiene el referente directo «a quienes» porque la afrenta se hizo en relación con estos reyes.
- source_word: לֵאמֹר
  english_pob_choice: saying
  chosen_spanish: diciendo
  lexicon: HALOT
  rationale: Fórmula quotativa estándar para introducir la cita previa.
- source_word: הֲכַף ... בְּיָדֶךָ
  english_pob_choice: Are ... already in your hand
  chosen_spanish: ¿Acaso ya están ... en tu mano
  alternatives_spanish:
  - ¿Ya tienes ... en tu poder
  - ¿Está ... en tu mano
  lexicon: HALOT
  rationale: La expresión hebrea es idiomática y alude a captura/control. «En tu mano» conserva la imagen del original; «ya» refleja עַתָּה en el contexto retórico.
- source_word: כִּי נִתֵּן
  english_pob_choice: that we should give
  chosen_spanish: para que demos
  alternatives_spanish:
  - para que diéramos
  - a fin de dar
  lexicon: HALOT
  rationale: Aquí כִּי funciona dentro de la pregunta retórica con sentido de resultado/propósito. «Para que demos» expresa el valor pragmático de la negativa sin forzar la sintaxis española.
- source_word: לַאֲנָשֶׁיךָ הַיְּעֵפִים
  english_pob_choice: to your weary men
  chosen_spanish: a tus hombres cansados
  alternatives_spanish:
  - a tus hombres fatigados
  - a tus hombres agotados
  lexicon: HALOT
  rationale: יְעֵפִים denota cansancio por la marcha/persecución. «Cansados» es claro y natural en español; «hombres» mantiene el paralelo con אַנְשֵׁי.
- source_word: לָחֶם
  english_pob_choice: bread
  chosen_spanish: pan
  alternatives_spanish:
  - alimento
  - comida
  lexicon: HALOT
  rationale: La equivalencia directa es «pan». En español bíblico y moderno, puede representar alimento básico de modo metonímico, sin perder la concreción del original.
translation_notes:
  revision_awareness: 'Coincide con la evaluación de alta concordancia: no se registraron revisiones aplicadas en el paso auditado más reciente.'
  spanish_consistency_notes:
  - Se conserva «Yahvé» como norma del proyecto, pero este versículo no contiene el tetragrámaton ni un sustituto contextual.
  - Se usa «pan» para לָחֶם siguiendo la equivalencia directa y la imagen concreta del original, aunque en contexto significa el alimento pedido a los cansados.
  - Se mantiene «en tu mano» por fidelidad al modismo hebreo, acompañado de nota explicativa para evitar una lectura demasiado literal.
