base_translation:
  language: en
  yaml_path: translation/ot/zechariah/010/002.yaml
  text: For the household idols speak wickedness[a], and the diviners see lies; they speak empty dreams and give vain comfort. Therefore they wander like sheep[b]; they are afflicted because there is no shepherd.
  footnotes:
  - marker: a
    text: Or “the teraphim,” a Hebrew term for household cult objects or idols.
    reason: lexical_alternative
  - marker: b
    text: Or “they are oppressed” for “they are afflicted.”
    reason: lexical_alternative
