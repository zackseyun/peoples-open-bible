  glossary_alignment: No hay términos teológicos del glosario global en juego. Los nombres propios y la prosa narrativa están en línea general con el proyecto, aunque la revisión se centra en alinear correctamente las notas léxicas con el hebreo y con el rastro de auditoría inglés.
