    issue: «la guerra lo oprimía» traduce demasiado ampliamente ὁ πόλεμος en este contexto
    rationale: La documentación inglesa justifica «battle» por tratarse de la presión del combate inmediato. «Guerra» es posible léxicamente, pero aquí pierde precisión narrativa.
  - severity: medium
    issue: «su campamento estaba quebrantado» es poco idiomático en español
    rationale: Aunque intenta conservar «broken», en español aplicado a «campamento» suena rígido. El sentido auditado es que su fuerza/campamento se estaba desmoronando o estaba deshecha bajo presión.
  - severity: low
    issue: «fue quebrantado de corazón» puede mejorarse estilísticamente
    rationale: «Quedó quebrantado de corazón» o «quedó destrozado de corazón» suena más natural en español sin perder la imagen del griego.
  - severity: low
    issue: Error ortográfico en la rationale léxica española
    rationale: En la explicación aparece «Quedrantado» en lugar de «Quebrantado». No afecta el texto bíblico, pero conviene corregirlo en revisión editorial.
  revised_spanish_text: Y Judas vio que su campamento[a] se estaba desmoronando, porque la batalla lo oprimía; y quedó quebrantado de corazón, porque no tenía tiempo para reunirlos.
