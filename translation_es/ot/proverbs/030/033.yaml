translation:
  language: es
  text: Porque al batir la leche produce mantequilla[a], y al apretar la nariz produce sangre[b], y al apretar la ira produce contienda.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «cuajada»; el término hebreo designa en general un producto lácteo obtenido por batido o coagulación.
    reason: lexical_alternative
  - marker: b
    text: 'El hebreo hace un juego de palabras: «apretar la nariz» y «apretar la ira» usan formas de אַף, que puede significar «nariz» o, idiomáticamente, «ira».'
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Porque entonces
  lexicon: HALOT
  rationale: Introduce la relación causal o explicativa con el dicho anterior. «Porque» mantiene esa conexión de forma natural en español.
- source_word: מִיץ
  english_pob_choice: churning / pressing
  chosen_spanish: batir / apretar
  alternatives_spanish:
  - exprimir
  - presionar
  - estrujar
  lexicon: HALOT
  rationale: El sustantivo expresa la acción de presionar o sacar por compresión. En el contexto de la leche, «batir» comunica bien el proceso idiomático; en los paralelos siguientes, «apretar» conserva la imagen concreta y el juego verbal.
- source_word: חָלָב
  english_pob_choice: milk
  chosen_spanish: leche
  alternatives_spanish:
  - leche
  lexicon: HALOT
  rationale: Equivalente directo y natural en español.
- source_word: יוֹצִיא
  english_pob_choice: produces
  chosen_spanish: se produce / sale
  alternatives_spanish:
  - produce
  - hace salir
  - trae
  lexicon: HALOT
  rationale: El verbo hifil expresa causar un resultado. «Se produce» funciona bien con el primer miembro; «sale» hace natural el resultado visible en los dos siguientes.
- source_word: חֶמְאָה
  english_pob_choice: butter
  chosen_spanish: mantequilla
  alternatives_spanish:
  - cuajada
  - nata
  - manteca
  lexicon: HALOT
  rationale: El término hebreo puede abarcar un producto lácteo coagulando o batido. «Mantequilla» es la opción más transparente y tradicional en español, aunque «cuajada» sigue siendo una posibilidad léxica.
- source_word: אַף
  english_pob_choice: the nose
  chosen_spanish: la nariz
  alternatives_spanish:
  - la nariz
  - las narices
  lexicon: HALOT
  rationale: Aquí se necesita el sentido concreto del órgano corporal para mantener el paralelo con la sangre. En español, «nariz» es más natural que la forma plural literal.
- source_word: דָם
  english_pob_choice: blood
  chosen_spanish: sangre
  alternatives_spanish:
  - sangre
  lexicon: HALOT
  rationale: Correspondencia directa.
- source_word: אַפַּיִם
  english_pob_choice: anger
  chosen_spanish: la ira
  alternatives_spanish:
  - el enojo
  - la indignación
  - la cólera
  lexicon: HALOT
  rationale: Aunque literalmente alude a las «narices», el dual funciona como idiomismo para la ira. «La ira» preserva el sentido proverbial en español.
- source_word: רִיב
  english_pob_choice: strife
  chosen_spanish: contienda
  alternatives_spanish:
  - pleito
  - discusión
  - rencilla
  - querella
  lexicon: HALOT
  rationale: Denota disputa o contención. «Contienda» es un término bíblico y suficientemente amplio para el cierre proverbial.
translation_notes:
  revision_awareness: 'Coincide con el sentido y la estructura del texto hebreo, y refleja la lectura auditada del inglés POB: acción concreta en el primer paralelismo, juego de palabras en el segundo y tercer miembros, y cierre proverbial en «contienda».'
  spanish_consistency_notes:
  - Se mantiene el paralelismo triádico del hebreo con tres miembros coordinados.
  - Se conserva el juego entre un sentido corporal y otro idiomático de אַף mediante «nariz» / «ira».
  - «Mantequilla» se usa como equivalente idiomático principal, con nota para la alternativa léxica hebrea.
  - El tono es proverbial y apto para lectura pública en español contemporáneo.
