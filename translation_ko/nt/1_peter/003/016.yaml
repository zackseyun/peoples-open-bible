source:
  edition: SBLGNT
  text: ἀλλὰ μετὰ πραΰτητος καὶ φόβου, συνείδησιν ἔχοντες ἀγαθήν, ἵνα ἐν ᾧ καταλαλεῖσθε καταισχυνθῶσιν οἱ ἐπηρεάζοντες ὑμῶν τὴν ἀγαθὴν ἐν Χριστῷ ἀναστροφήν.
base_translation:
  language: en
  yaml_path: translation/nt/1_peter/003/016.yaml
  text: 'but with gentleness and fear, having a good conscience, so that in what you are slandered, those who revile your good conduct in Messiah may be put to shame.'
translation:
  language: ko
  text: '온유함과 두려움으로 그리하며, 선한 양심을 가지십시오. 이는 여러분이 비방당하는 일에서, 메시아 안의 여러분의 선한 행실을 모욕하는 자들이 부끄러움을 당하게 하려는 것입니다.'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: μετὰ πραΰτητος καὶ φόβου
  english_pob_choice: with gentleness and fear
  chosen_korean: 온유함과 두려움으로
  alternatives_korean:
  - 부드러움과 경외함으로
  lexicon: BDAG
  rationale: 3:4·1:17의 어휘와 통일. φόβος는 하나님에 대한 두려움.
- source_word: καταλαλεῖσθε
  english_pob_choice: you are slandered
  chosen_korean: 비방당하는
  alternatives_korean:
  - 헐뜯음당하는
  lexicon: BDAG
  rationale: 2:1·2:12와 통일하여 「비방」 사용.
- source_word: ἐπηρεάζοντες
  english_pob_choice: those who revile
  chosen_korean: 모욕하는 자들
  alternatives_korean:
  - 학대하는 자들
  - 욕보이는 자들
  lexicon: BDAG
  rationale: ἐπηρεάζω의 「악의적 학대·비방」을 「모욕하다」로 옮긴다.
- source_word: τὴν ἀγαθὴν ἐν Χριστῷ ἀναστροφήν
  english_pob_choice: your good conduct in Messiah
  chosen_korean: 메시아 안의 여러분의 선한 행실
  alternatives_korean:
  - 너희의 그리스도 안에서의 선한 처신
  lexicon: BDAG
  rationale: 「메시아 안의」 정형 표현 유지.
