translation:
  language: es
  text: Pero ahora, por favor, vuelvan a mí[a], y delante de sus rostros[b], ¿mentiría yo[c]?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «miren hacia mí» para «vuelvan a mí».
    reason: lexical_alternative
  - marker: b
    text: Literalmente, «delante de sus rostros»; es decir, «en su presencia» o «a la vista de ustedes».
    reason: lexical_alternative
  - marker: c
    text: O «¿hablaría falsamente yo?». El verbo hebreo puede significar «mentir» o «hablar falsamente».
    reason: lexical_alternative
lexical_decisions:
- source_word: וְעַתָּה
  english_pob_choice: But now
  chosen_spanish: Pero ahora
  alternatives_spanish:
  - Y ahora
  - Ahora bien
  lexicon: HALOT
  rationale: El waw introduce contraste con el contexto previo y עַתָּה añade inmediatez temporal. «Pero ahora» conserva el valor adversativo y suena natural en español.
- source_word: הוֹאִילוּ
  english_pob_choice: please
  chosen_spanish: por favor
  alternatives_spanish:
  - quieran
  - hagan el favor de
  - sean bondadosos
  lexicon: HALOT
  rationale: Es un imperativo de disposición o condescendencia usado como ruego cortés. «Por favor» transmite bien la fuerza apelativa sin volver la frase rígida.
- source_word: פְנוּ בִי
  english_pob_choice: turn to me
  chosen_spanish: vuelvan a mí
  alternatives_spanish:
  - dirijan su atención a mí
  - mírenme
  - vuélvanse hacia mí
  lexicon: HALOT
  rationale: פנה con ב puede expresar volverse o dirigirse hacia alguien. «Vuelvan a mí» conserva la imagen verbal y resulta idiomático en español.
- source_word: וְעַל פְּנֵיכֶם
  english_pob_choice: before your faces
  chosen_spanish: delante de sus rostros
  alternatives_spanish:
  - en su presencia
  - ante sus caras
  - a la vista de ustedes
  lexicon: HALOT
  rationale: La expresión es literalmente concreta («sobre/delante de sus rostros»). «Delante de sus rostros» mantiene la imagen hebrea; «en su presencia» sería más libre.
- source_word: אִם אֲכַזֵּב
  english_pob_choice: would I lie?
  chosen_spanish: ¿mentiría yo?
  alternatives_spanish:
  - ¿si mentiría yo?
  - ¿diría yo falsedad?
  - ¿decebiría yo?
  lexicon: HALOT
  rationale: Aquí אִם funciona retóricamente, no como simple condicional. כזב en piel puede significar mentir o hablar falsamente; «¿mentiría yo?» reproduce la pregunta desafiante de Job de manera clara.
translation_notes:
  revision_awareness: Coincide con la revisión más reciente sin cambios sustanciales necesarios; se mantiene la lectura desafiante y directa del hebreo, con el matiz literal de la imagen facial preservado en nota.
  spanish_consistency_notes:
  - Se mantuvo «por favor» para הוֹאִילוּ, en línea con el valor de súplica cortés documentado por la POB en inglés.
  - Se conservó «mentiría» en lugar de suavizar a «engañaría», porque el audit trail destaca la ambigüedad entre mentir y hablar falsamente, y la apelación de Job pide una acusación directa.
  - «Delante de sus rostros» se dejó en el texto principal para reflejar la concreción hebrea, aunque la nota ofrece la equivalencia idiomática «en su presencia».
