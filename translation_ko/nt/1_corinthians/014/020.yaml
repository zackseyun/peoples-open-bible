  text: Ἀδελφοί, μὴ παιδία γίνεσθε ταῖς φρεσίν, ἀλλὰ τῇ κακίᾳ νηπιάζετε, ταῖς δὲ φρεσὶν τέλειοι γίνεσθε.
base_translation:
  language: en
  yaml_path: translation/nt/1_corinthians/014/020.yaml
  text: Brothers[a], do not become children in your thinking, but be infants in evil[b]; yet in your thinking become mature.
  footnotes:
  - marker: a
    text: Or 'Brothers and sisters'; the Greek uses the masculine plural 'brothers' as a congregational address.
    reason: lexical_alternative
  - marker: b
    text: Or 'in malice'; the Greek κακία can denote evil, badness, or malice.
    reason: lexical_alternative
translation:
  language: ko
  text: 형제 여러분, 생각하는 데에서는 어린아이가 되지 말고, 악에 대해서만 어린아이가 되십시오. 그러나 생각하는 데에서는 어른이 되십시오.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 헬라어 κακία는 「악, 악함」을 가리키며, 본 문맥에서는 죄성과 악의를 모두 포괄한다.
    reason: lexical_alternative
