translation:
  language: es
  text: Pero este argumento es completamente ridículo[a], pues la razón evidentemente no prevalece sobre sus propias pasiones, sino sobre pasiones corporales[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «razonamiento» o «línea de razonamiento»; el griego λογισμός puede denotar el proceso de razonar, la facultad racional o el argumento que se está proponiendo.
    reason: lexical_alternative
  - marker: b
    text: Lit. «las corporales»; el griego usa el adjetivo «corporales» de manera sustantivada, refiriéndose por el contexto a pasiones o apetitos corporales.
    reason: lexical_alternative
lexical_decisions:
- source_word: κομιδῇ
  english_pob_choice: utterly
  chosen_spanish: completamente
  alternatives_spanish:
  - totalmente
  - del todo
  - absolutamente
  lexicon: LSJ
  rationale: El adverbio intensifica γελοῖος. «Completamente» transmite una intensificación fuerte y natural en español moderno, sin sonar demasiado coloquial ni exageradamente abstracto.
- source_word: γελοῖος
  english_pob_choice: ridiculous
  chosen_spanish: ridículo
  alternatives_spanish:
  - absurdo
  - risible
  - de risa
  lexicon: LSJ
  rationale: El sentido es que el argumento merece ser rechazado con fuerza. «Ridículo» comunica bien esa valoración en español y conserva el tono crítico del texto.
- source_word: λογισμός
  english_pob_choice: argument
  chosen_spanish: argumento
  alternatives_spanish:
  - razonamiento
  - línea de razonamiento
  - razón
  lexicon: LSJ
  rationale: Aquí el término designa la afirmación o tesis bajo examen, no solo la facultad racional en abstracto. «Argumento» sigue de cerca la revisión del texto inglés y resulta claro en español.
- source_word: τῶν ἑαυτοῦ παθῶν
  english_pob_choice: its own passions
  chosen_spanish: sus propias pasiones
  alternatives_spanish:
  - sus propias emociones
  - sus propios impulsos
  - sus propias pasiones o apetitos
  lexicon: LSJ
  rationale: En 4 Macabeos πάθη suele referirse a pasiones o impulsos, no a sufrimientos. «Sus propias pasiones» conserva ese valor y mantiene el reflexivo ἑαυτοῦ con naturalidad en español.
- source_word: ἐπικρατεῖν
  english_pob_choice: to prevail over
  chosen_spanish: prevalece sobre
  alternatives_spanish:
  - domina sobre
  - se impone sobre
  - vence sobre
  lexicon: LSJ
  rationale: El verbo expresa dominio o superioridad efectiva. «Prevalece sobre» es una equivalencia fiel y idiomática para el registro filosófico del pasaje.
- source_word: φαίνεται
  english_pob_choice: is evidently
  chosen_spanish: evidentemente
  alternatives_spanish:
  - se ve
  - parece
  - queda claro
  lexicon: LSJ
  rationale: El verbo marca una inferencia a partir de lo observable. En español, el adverbio «evidentemente» preserva esa fuerza inferencial sin añadir perífrasis innecesarias.
- source_word: τῶν σωματικῶν
  english_pob_choice: bodily ones
  chosen_spanish: las corporales
  alternatives_spanish:
  - las cosas corporales
  - las realidades corporales
  - los apetitos corporales
  lexicon: LSJ
  rationale: El adjetivo está usado sustantivamente en contraste con «sus propias pasiones». «Las corporales» reproduce la brevedad griega y permite entender por el contexto que se trata de las realidades o impulsos del cuerpo.
theological_decisions:
- issue: Contraste antropológico entre razón y pasiones
  english_pob_reading: Reason evidently does not prevail over its own passions, but over bodily ones.
  chosen_spanish_reading: La razón no prevalece sobre sus propias pasiones, sino sobre las corporales.
  alternative_spanish_readings:
  - La razón no domina sus propias pasiones, sino las corporales.
  - La razón no vence sobre sus propias pasiones, sino sobre las corporales.
  rationale: 'El versículo presenta una observación antropológica y filosófica: la razón no tiene dominio efectivo sobre las pasiones internas. Se mantiene el contraste entre pasiones propias y realidades corporales, sin suavizarlo ni convertirlo en una afirmación doctrinal ajena al texto.'
  doctrine_reference: Translation philosophy §5 (consistency of key terms, or documented exception)
translation_notes:
  revision_awareness: La redacción sigue la última revisión inglesa al preferir «argumento» para λογισμός y al expresar φαίνεται ἐπικρατεῖν con una negación directa y natural («no prevalece»), manteniendo el contraste con τῶν σωματικῶν mediante una nota que explicita el uso sustantivado del adjetivo.
  spanish_consistency_notes:
  - Se usa «argumento» para λογισμός en coherencia con la última revisión del texto inglés.
  - Se conserva la distinción entre «pasiones» y «lo corporal/corporales» para reflejar el contraste griego.
  - La puntuación reproduce la estructura causal del original con «pues» y el contraste adversativo con «sino».
