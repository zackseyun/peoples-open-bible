translation:
  language: es
  text: 'Y en aquel año fueron nombrados dos ancianos del pueblo como jueces, acerca de quienes el Soberano[a] había hablado: «La iniquidad salió de Babilonia, de ancianos que eran jueces[b], que parecían gobernar al pueblo».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «el Señor» o «el Dueño» para δεσπότης; el texto principal usa «el Soberano» para conservar la distinción frente a κύριος.
    reason: lexical_alternative
  - marker: b
    text: La redacción griega al final del versículo es muy comprimida; «que parecían gobernar al pueblo» también puede entenderse como «que fueron tenidos por gobernantes del pueblo».
    reason: alternative_reading
lexical_decisions:
- source_word: ἀπεδείχθησαν
  english_pob_choice: were appointed
  chosen_spanish: fueron nombrados
  alternatives_spanish:
  - fueron designados
  - fueron establecidos
  - fueron señalados
  lexicon: LSJ
  rationale: En el contexto de un cargo público junto con κριταί, la idea es de asignación o nombramiento para una función, no solo de manifestación o demostración.
- source_word: πρεσβύτεροι
  english_pob_choice: elders
  chosen_spanish: ancianos
  alternatives_spanish:
  - hombres mayores
  lexicon: LSJ
  rationale: Aquí el término parece referirse a líderes de la comunidad, no meramente a edad avanzada; 'ancianos' mantiene esa función social y eclesial amplia en español.
- source_word: κριταὶ
  english_pob_choice: judges
  chosen_spanish: jueces
  alternatives_spanish:
  - magistrados
  lexicon: LSJ
  rationale: La función judicial es explícita y directa; 'jueces' es la equivalencia natural y precisa en español.
- source_word: δεσπότης
  english_pob_choice: the Master
  chosen_spanish: el Dueño
  alternatives_spanish:
  - el Señor
  - el Soberano
  - el Maestro
  lexicon: LSJ
  rationale: Se preserva la distinción léxica frente a κύριος. 'Dueño' comunica autoridad y dominio sin colapsar el término con el habitual 'Señor'; en español, 'Maestro' podría sonar menos natural en una declaración divina, y 'Señor' borraría la diferencia señalada por la tradición editorial inglesa.
- source_word: ἀνομία
  english_pob_choice: lawlessness
  chosen_spanish: iniquidad
  alternatives_spanish:
  - ilegalidad
  - desorden
  - maldad
  lexicon: LSJ
  rationale: '''Iniquidad'' conserva el peso moral-jurídico del término y suena más idiomático en español bíblico que una forma literal como ''sin ley'' o ''ilegalidad'', sin perder el trasfondo de violación del orden justo.'
- source_word: ἐξῆλθεν
  english_pob_choice: came out
  chosen_spanish: salió
  alternatives_spanish:
  - salió fuera
  - emanó
  - brotó
  lexicon: LSJ
  rationale: '''Salió'' reproduce de manera natural la imagen de algo que emerge desde Babilonia, manteniendo la concreción del verbo griego.'
- source_word: ἐκ Βαβυλῶνος
  english_pob_choice: from Babylon
  chosen_spanish: de Babilonia
  alternatives_spanish:
  - desde Babilonia
  - fuera de Babilonia
  lexicon: LSJ
  rationale: La preposición con el topónimo se vierte de forma estándar y fluida en español.
- source_word: οἱ ἐδόκουν κυβερνᾷν τὸν λαόν
  english_pob_choice: who seemed to govern the people
  chosen_spanish: que parecían gobernar al pueblo
  alternatives_spanish:
  - que se suponía que gobernaban al pueblo
  - que fueron tenidos por gobernantes del pueblo
  - que parecían regir al pueblo
  lexicon: LSJ
  rationale: '''Parecían'' conserva la distancia irónica del griego ἐδόκουν, y ''gobernar al pueblo'' mantiene la idea de autoridad sobre la comunidad; la forma no fuerza una simplificación doctrinal del matiz de apariencia frente a realidad.'
theological_decisions:
- issue: Rendering of δεσπότης as a distinct divine title
  english_pob_reading: the Master
  chosen_spanish_reading: el Dueño
  alternative_spanish_readings:
  - el Señor
  - el Soberano
  - el Maestro
  rationale: El griego usa δεσπότης y no κύριος; por eso se evita 'Señor' para no borrar la distinción léxica preservada por la POB en inglés. 'El Dueño' mantiene la idea de autoridad soberana en español y deja visible que se trata de un título distinto del habitual.
  doctrine_reference: 'DOCTRINE.md: Translate titles; preserve source meaning rather than translation tradition.'
- issue: Compressed ending clause with irony about corrupt officials
  english_pob_reading: who seemed to govern the people
  chosen_spanish_reading: que parecían gobernar al pueblo
  alternative_spanish_readings:
  - que eran tenidos por gobernantes del pueblo
  - que se suponía que gobernaban al pueblo
  rationale: 'La cláusula final del griego es sintácticamente compacta y puede entenderse con el matiz de apariencia o de opinión ajena. ''Parecían'' retiene esa ambigüedad sin eliminar la ironía: tenían la apariencia de gobernar, pero el contexto denuncia su corrupción.'
  doctrine_reference: 'DOCTRINE.md: Preserve source ambiguity when meaningful; do not collapse textual tension.'
translation_notes:
  revision_awareness: El borrador sigue la revisión más reciente del inglés POB, que ajustó la cola del versículo para reflejar con más claridad πρεσβυτέρων y κριτῶν como «ancianos que eran jueces», preservando la estructura fuente y la ironía de οἱ ἐδόκουν κυβερνᾶν τὸν λαόν. En español se mantuvo esa doble referencia mediante «ancianos del pueblo como jueces» y una cláusula final que conserva la ambigüedad de apariencia/opinión.
  spanish_consistency_notes:
  - Se usa «ancianos» para πρεσβύτεροι en coherencia con la función comunitaria del término, no solo la edad.
  - Se usa «jueces» para κριταί por su valor judicial explícito.
  - Se preserva la distinción entre δεσπότης y κύριος evitando 'Señor' en el texto principal.
  - «Iniquidad» se eligió por su fuerza moral-jurídica y por su registro bíblico inteligible en español.
  - La puntuación con comillas angulares y el orden de cláusulas buscan reproducir el discurso directo del original sin añadir explicación interpretativa.
