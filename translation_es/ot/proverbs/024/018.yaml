translation:
  language: es
  text: No sea que Yahvé vea que eso[a] sea malo a sus ojos, y aparte de él su enojo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «le sea desagradable a sus ojos».'
    reason: lexical_alternative
lexical_decisions:
- source_word: פֶּן
  english_pob_choice: lest
  chosen_spanish: No sea que
  alternatives_spanish:
  - para que no
  - de otro modo
  lexicon: HALOT
  rationale: En una advertencia, פֶּן introduce una consecuencia negativa. «No sea que» comunica bien ese matiz preventivo en español moderno y conserva el tono admonitorio mejor que una simple secuencia causal.
- source_word: יִרְאֶה
  english_pob_choice: will see
  chosen_spanish: vea
  alternatives_spanish:
  - vea esto
  - llegue a ver
  lexicon: HALOT
  rationale: El imperfecto en esta construcción expresa una posibilidad/resultado futuro. «Vea» mantiene la contingencia sin forzar una paráfrasis.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  - el SEÑOR
  lexicon: HALOT
  rationale: Se conserva el nombre divino personal como «Yahvé», conforme al criterio del proyecto para יְהוָה, en vez de sustituirlo por un título.
- source_word: וְרַע בְּעֵינָיו
  english_pob_choice: and it be evil in his eyes
  chosen_spanish: y le parezca malo en sus ojos
  alternatives_spanish:
  - y sea malo a sus ojos
  - y sea desagradable a sus ojos
  lexicon: HALOT
  rationale: La expresión hebrea es un modismo evaluativo. «Le parezca malo en sus ojos» conserva la imagen original y el juicio moral/valorativo; «desagradable» suaviza demasiado el campo semántico de רַע.
- source_word: וְהֵשִׁיב מֵעָלָיו אַפּוֹ
  english_pob_choice: and he turn his anger away from him
  chosen_spanish: y aparte de sobre él su enojo
  alternatives_spanish:
  - y aparte de él su ira
  - y retire de sobre él su furor
  lexicon: HALOT
  rationale: El hiphil de שוב expresa hacer volver/retirar. En español, «aparte de sobre él» reproduce la imagen de alejamiento «de sobre» él; «enojo» traduce el ímpetu idiomático de אַף como afecto airado sin elevarlo innecesariamente a «ira» o «furor».
theological_decisions:
- issue: Tratamiento del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: La lectura del texto fuente incluye explícitamente el Tetragrámaton. Mantener «Yahvé» preserva la identidad del nombre revelado y evita la sustitución por un título.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
translation_notes:
  revision_awareness: Se corrigió el problema de validación anterior asegurando que el marcador de nota [a] aparezca exactamente en el texto principal. También se mantuvo la correspondencia con פֶּן mediante «No sea que», en línea con la revisión más reciente del audit trail inglés.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» para יְהוָה de forma consistente con el proyecto.
  - Se conserva la imagen hebrea de «sus ojos» como modismo evaluativo.
  - «Enojo» se usa para אַף por ser natural en español y suficientemente cercano al sentido contextual.
  - La sintaxis española evita calco excesivo sin perder la estructura de advertencia y resultado del hebreo.
