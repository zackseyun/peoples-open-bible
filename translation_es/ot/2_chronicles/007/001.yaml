review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja con fidelidad la secuencia y el sentido del hebreo: cláusula temporal con ''cuando'', descenso del fuego desde el cielo, consumo del holocausto y los sacrificios, y la gloria de Yahvé llenando la casa. También preserva correctamente ''Yahvé'' y ''la casa'' frente a sustituciones menos literales.'
  spanish_quality_summary: 'El español es claro, natural y digno. Sin embargo, la nota [a] está mal anclada y mal formulada: repite exactamente la lectura principal (''descendió del cielo'') en vez de ofrecer la alternativa documentada equivalente a ''came down'' / ''bajó'' o una forma más literal distinta. Esto requiere reparación menor.'
  glossary_alignment: 'Buena alineación con la terminología del proyecto: יְהוָה -> ''Yahvé''; הָעֹלָה -> ''holocausto''; זְבָחִים -> ''sacrificios''; הַבָּיִת -> ''la casa'' con nota aclaratoria sobre ''templo''. No hay conflictos teológicos significativos.'
  issues:
  - severity: medium
    issue: La nota [a] ofrece la misma redacción que el texto principal
    rationale: El texto principal dice 'descendió del cielo', y la nota [a] también dice 'O «descendió del cielo»'. Una nota de alternativa léxica debe presentar una variante real; de lo contrario, es errónea y confunde al lector.
  - severity: low
    issue: El anclaje de la nota [a] recae sobre 'sacrificios' en vez del verbo relevante
    rationale: La alternativa documentada corresponde a יָרְדָה מֵהַשָּׁמַיִם ('came down/descended from heaven'), no a 'sacrificios'. El marcador debe ir junto a 'descendió'.
  revised_spanish_text: Y cuando Salomón terminó de orar, el fuego descendió[a] del cielo y consumió el holocausto y los sacrificios, y la gloria de Yahvé llenó la casa[b].
  revised_footnotes:
  - marker: a
    text: O «bajó del cielo».
    reason: lexical_alternative
  - marker: b
    text: Es decir, el templo; el hebreo dice «la casa».
    reason: cultural_note
  revision_rationale: 'Se corrige una nota léxica defectuosa: el marcador [a] se traslada al verbo ''descendió'' y la nota ahora ofrece una alternativa real y pertinente (''bajó del cielo''). Se mantiene intacta la traducción principal porque es fiel al hebreo, idiomática en español y coherente con la terminología del proyecto.'
