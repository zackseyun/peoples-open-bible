    text: Or “another’s land” for “foreign land”; the Greek emphasizes land belonging to others.
    reason: lexical_alternative
  - marker: b
    text: Or “was arbitrarily taken” or “was taken without due process”; the Greek adverb can stress lack of proper judgment as well as injustice.
