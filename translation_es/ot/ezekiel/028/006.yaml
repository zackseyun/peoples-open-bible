translation:
  language: es
  text: 'Por tanto, así dice el Señor Yahvé: Porque has hecho tu corazón como el corazón de un dios[a],'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «como el corazón de Dios». El hebreo אֱלֹהִים puede significar «Dios», «un dios» o «dioses», según el contexto.
    reason: alternative_reading
lexical_decisions:
- source_word: לָכֵן
  english_pob_choice: Therefore
  chosen_spanish: Por tanto
  alternatives_spanish:
  - Por eso
  - Por consiguiente
  - Por tanto
  lexicon: HALOT
  rationale: Marca la consecuencia inferida del reproche anterior. «Por tanto» suena natural en español bíblico actual y conserva bien la relación lógica.
- source_word: כֹּה אָמַר
  english_pob_choice: thus says
  chosen_spanish: así dice
  alternatives_spanish:
  - así ha dicho
  - así dice
  - esto dice
  lexicon: HALOT
  rationale: Es la fórmula profética convencional. En español, el presente «así dice» mantiene el valor formular y la inmediatez profética.
- source_word: אֲדֹנָי יְהוִה
  english_pob_choice: the Lord GOD
  chosen_spanish: el Señor DIOS
  alternatives_spanish:
  - el Señor Yahvé
  - el Señor DIOS
  - el Señor Dios
  lexicon: HALOT
  rationale: Se conserva la distinción entre אֲדֹנָי y el nombre divino יהוה con una convención tipográfica reverente y legible. «DIOS» en mayúsculas refleja el componente del nombre divino sin ocultarlo bajo «SEÑOR».
- source_word: יַעַן
  english_pob_choice: Because
  chosen_spanish: Porque
  alternatives_spanish:
  - Porque
  - Ya que
  - Puesto que
  lexicon: HALOT
  rationale: Introduce la razón de la sentencia. «Porque» es claro, directo y plenamente fiel al valor causal del hebreo.
- source_word: תִּתְּךָ אֶת לְבָבְךָ
  english_pob_choice: you have made your heart
  chosen_spanish: has puesto tu corazón
  alternatives_spanish:
  - has puesto tu corazón
  - has dado tu corazón
  - has hecho tu corazón
  lexicon: HALOT
  rationale: El hebreo expresa la idea de dar/poner el corazón. «Has puesto tu corazón» conserva la imagen idiomática y es más natural que una traducción literal rígida.
- source_word: לְבָבְךָ
  english_pob_choice: your heart
  chosen_spanish: tu corazón
  alternatives_spanish:
  - tu corazón
  - tu mente
  - tu interior
  lexicon: HALOT
  rationale: «Corazón» mantiene el centro hebreo de pensamiento, voluntad y disposición interior, sin reducirlo a «mente».
- source_word: כְּלֵב אֱלֹהִים
  english_pob_choice: like the heart of a god
  chosen_spanish: como el corazón de un dios
  alternatives_spanish:
  - como el corazón de un dios
  - como el corazón de Dios
  - como un corazón divino
  lexicon: HALOT
  rationale: En este contexto de soberbia y autoexaltación, אֱלֹהִים puede referirse naturalmente a «un dios» en sentido comparativo. La traducción principal preserva esa tensión y evita resolverla prematuramente a favor de «Dios».
theological_decisions:
- issue: Valor de אֱלֹהִים en la comparación כְּלֵב אֱלֹהִים
  english_pob_reading: a god
  chosen_spanish_reading: un dios
  alternative_spanish_readings:
  - Dios
  - dioses
  rationale: El contexto es una reprensión al orgullo del gobernante de Tiro, no una afirmación de que su corazón sea semejante al del Dios verdadero. «Un dios» conserva el matiz de pretensión divina sin borrar la ambigüedad léxica del hebreo, que la nota deja abierta.
  doctrine_reference: Translation philosophy §3 (preserve tension rather than silently resolving it); contested divine-term handling for אֱלֹהִים.
translation_notes:
  revision_awareness: 'El registro coincide con la revisión más reciente indicada en el paquete fuente: no se documentan cambios aplicados y el control cruzado reporta alto acuerdo.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» en el sistema general del proyecto, pero aquí la forma compuesta אֲדֹנָי יְהוִה se vierte de modo reverente y distintivo como «el Señor DIOS» para conservar ambos elementos del título sin crear una repetición torpe.
  - Se conserva «corazón» en lugar de «mente» para reflejar el antropologismo hebreo y la imagen del texto.
  - La puntuación reproduce el cierre con dos puntos tras la fórmula profética, siguiendo el tono oracular del hebreo y del audit trail en inglés.
