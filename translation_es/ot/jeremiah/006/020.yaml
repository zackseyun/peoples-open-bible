translation:
  language: es
  text: '¿Por qué esto para mí: el franquincienso viene de Saba[a], y la caña aromática[b] de una tierra distante? Vuestros holocaustos no son aceptables, y vuestros sacrificios no me agradan.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «¿Qué utilidad tiene esto para mí: franquincienso de Saba y caña aromática de una tierra distante?»'
    reason: alternative_reading
  - marker: b
    text: 'También puede entenderse: «caña dulce» o «cálamo dulce».'
    reason: lexical_alternative
lexical_decisions:
- source_word: לָמָּה זֶּה לִי
  english_pob_choice: Why is this to me
  chosen_spanish: ¿Por qué esto para mí?
  alternatives_spanish:
  - ¿Qué utilidad tiene esto para mí?
  - ¿Por qué es esto para mí?
  lexicon: HALOT
  rationale: La pregunta retórica mantiene el valor del dativo לִי (“para mí / a mí”) y el golpe de rechazo. En español, la formulación más natural y fiel es una pregunta breve que conserve la estructura de extrañeza o inutilidad sin explicitar más de lo que el hebreo dice.
- source_word: לְבוֹנָה
  english_pob_choice: frankincense
  chosen_spanish: incienso
  alternatives_spanish:
  - franquincienso
  - olíbano
  lexicon: HALOT
  rationale: El término hebreo designa específicamente la resina aromática de culto. Aunque “franquincienso” sería más preciso técnicamente, “incienso” es el término natural y ampliamente comprensible en español, sin perder el sentido cultual del pasaje.
- source_word: מִשְּׁבָא
  english_pob_choice: from Sheba
  chosen_spanish: de Saba
  alternatives_spanish:
  - de Sheba
  lexicon: HALOT
  rationale: Para un registro bíblico en español, “Saba” es una transliteración común y legible. Se conserva el nombre propio de la región sin sustituirlo por una equivalencia interpretativa.
- source_word: קָנֶה הַטּוֹב
  english_pob_choice: sweet cane
  chosen_spanish: caña aromática
  alternatives_spanish:
  - caña dulce
  - cálamo dulce
  - caña buena
  lexicon: HALOT
  rationale: La expresión apunta a una planta/aroma valioso, no a una caña “buena” en sentido moral. “Caña aromática” preserva el valor olfativo implícito en הטּוֹב y evita una literalidad extraña en español. El matiz de dulzura queda incluido como posible lectura, pero no se impone como única opción.
- source_word: מֵאֶרֶץ מֶרְחָק
  english_pob_choice: from a distant land
  chosen_spanish: de una tierra distante
  alternatives_spanish:
  - de una tierra lejana
  - de un país remoto
  lexicon: HALOT
  rationale: “Tierra distante” reproduce bien la imagen geográfica del hebreo y mantiene un español natural. “Distante” conserva el tono más elevado del texto poético.
- source_word: עֹלוֹתֵיכֶם
  english_pob_choice: your burnt offerings
  chosen_spanish: vuestros holocaustos
  alternatives_spanish:
  - vuestras ofrendas quemadas
  - vuestros sacrificios totalmente quemados
  lexicon: HALOT
  rationale: Se mantiene el término cultual fuerte del hebreo. “Holocausto” es el equivalente tradicional para עֹלָה en español bíblico y expresa con claridad la ofrenda completamente consumida por el fuego. Se conserva el plural posesivo de segunda persona.
- source_word: לֹא לְרָצוֹן
  english_pob_choice: are not acceptable
  chosen_spanish: no son aceptables
  alternatives_spanish:
  - no son de agrado
  - no son para aceptación
  lexicon: HALOT
  rationale: La frase sacrificial expresa falta de aceptación/favor ante Yahvé. “No son aceptables” reproduce de forma clara el juicio cultual sin agregar interpretación. En español, el plural verbal conecta naturalmente con “holocaustos”.
- source_word: זִבְחֵיכֶם
  english_pob_choice: your sacrifices
  chosen_spanish: vuestros sacrificios
  alternatives_spanish:
  - vuestras víctimas
  - vuestros oficios sacrificiales
  lexicon: HALOT
  rationale: Es el término general para sacrificios y no requiere especificación adicional. Se conserva el paralelo sintáctico con “vuestros holocaustos”.
- source_word: לֹא עָרְבוּ לִי
  english_pob_choice: do not please me
  chosen_spanish: no me agradan
  alternatives_spanish:
  - no me son gratos
  - no me complacen
  lexicon: HALOT
  rationale: עָרַב aquí expresa agrado o placer. “No me agradan” comunica la respuesta divina de rechazo con naturalidad en español y mantiene el matiz relacional de “para mí / a mí”.
theological_decisions:
- issue: Término para עֹלָה en un contexto de rechazo cultual
  english_pob_reading: your burnt offerings are not acceptable
  chosen_spanish_reading: vuestros holocaustos no son aceptables
  alternative_spanish_readings:
  - vuestras ofrendas quemadas no son aceptables
  - vuestros sacrificios no son aceptables
  rationale: El hebreo usa el término técnico de ofrenda quemada. “Holocaustos” conserva la fuerza cultual y la precisión sacrificial. Aunque en español moderno la palabra puede evocar otros usos históricos, en este contexto bíblico sigue siendo un término tradicional y transparente para la clase de ofrenda.
  doctrine_reference: Lexical theology of sacrificial terminology; translation philosophy §1, §3
- issue: Rechazo divino de ofrendas costosas importadas
  english_pob_reading: Why is this to me... Your burnt offerings are not acceptable, and your sacrifices do not please me.
  chosen_spanish_reading: ¿Por qué esto para mí... vuestros holocaustos no son aceptables, y vuestros sacrificios no me agradan.
  alternative_spanish_readings:
  - ¿Qué utilidad tiene esto para mí...
  - ¿Por qué es esto para mí...
  rationale: La traducción conserva el reproche retórico sin expandirlo en una explicación moral más allá de lo que el texto dice. La estructura deja visible la tensión entre el valor material de los bienes y su falta de aceptación ante Yahvé.
  doctrine_reference: Translation philosophy §1, §3
translation_notes:
  revision_awareness: 'Se siguió de cerca el audit trail en inglés, sin depender mecánicamente de él: se preservó la pregunta retórica, el léxico cultual y la oposición entre ofrendas valiosas y rechazo divino. El texto inglés no requirió revisiones sustantivas; la versión española intenta reflejar esa estabilidad con equivalencia óptima y estilo bíblico natural.'
  spanish_consistency_notes:
  - Se mantuvo el registro bíblico sobrio y contemporáneo, evitando arcaísmos innecesarios.
  - Se usó “Saba” como transliteración española estándar del nombre propio.
  - Se conservó la segunda persona plural (“vuestros”) para armonizar con el hebreo y con el paralelo de las dos ofrendas.
  - Los términos sacrificiales se trataron con precisión cultual, sin generalizarlos indebidamente.
