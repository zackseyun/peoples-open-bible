review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura del griego: negación pasiva, continuación de la obra, límite temporal hasta informar a Darío y emisión de una respuesta. Sin embargo, «se recibiera una respuesta» desvía el sentido de προσφωνηθῆναι, que en contexto administrativo apunta a que se diera/devolviera una respuesta, no a que alguien la recibiera. También «en la construcción» es menos preciso que una formulación verbal o de separación con κωλύω.'
  spanish_quality_summary: El español es generalmente claro y natural, pero «estorbados en la construcción» suena algo menos idiomático y menos exacto que «impedidos de construir» o «estorbados de seguir construyendo». La corrección propuesta mejora fluidez y fidelidad sin perder dignidad ni legibilidad eclesial.
  glossary_alignment: No hay términos teológicos de glosario mayor en este versículo. Los nombres propios y el registro son adecuados. La nota léxica debe conservar la alternativa sobre «dar/devolver una respuesta» en vez de una formulación centrada en «recibir».
  issues:
  - severity: medium
    issue: «se recibiera una respuesta» para προσφωνηθῆναι
    rationale: El griego pasivo en esta secuencia administrativa se entiende mejor como que se emitiera/diera una respuesta oficial tras el informe a Darío. «Recibir una respuesta» cambia la perspectiva y añade una idea no presente en el verbo escogido por la auditoría inglesa.
  - severity: low
    issue: «estorbados en la construcción»
    rationale: Aunque comprensible, con κωλύω + genitivo la idea es ser impedidos de realizar la acción. «Impedidos de construir» suena más natural y preciso en español moderno.
  revised_spanish_text: y no fueron impedidos de construir hasta que se enviara noticia a Darío acerca de ellos y se diera una respuesta[a].
