  text: וּ/בָ֣אוּ הַ/כַּשְׂדִּ֗ים הַ/נִּלְחָמִים֙ עַל הָ/עִ֣יר הַ/זֹּ֔את וְ/הִצִּ֜יתוּ אֶת הָ/עִ֥יר הַ/זֹּ֛את בָּ/אֵ֖שׁ וּ/שְׂרָפ֑וּ/הָ וְ/אֵ֣ת הַ/בָּתִּ֡ים אֲשֶׁר֩ קִטְּר֨וּ עַל גַּגּֽוֹתֵי/הֶ֜ם לַ/בַּ֗עַל וְ/הִסִּ֤כוּ נְסָכִים֙ לֵ/אלֹהִ֣ים אֲחֵרִ֔ים לְמַ֖עַן הַכְעִסֵֽ/נִי־־־׃
