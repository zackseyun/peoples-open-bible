  text: And she said to him[a], “Be quiet; do not mislead me. My child has perished.” And every day she would go out to the road by which he had departed, and by day she would eat no bread, and at night she did not cease mourning for Tobias her son, until the fourteen days of the wedding feast were completed[b], which Raguel had sworn that he should spend there.
