id: ISA.53.11
reference: Isaiah 53:11
source:
  edition: WLC
  text: מֵ/עֲמַ֤ל נַפְשׁ/וֹ֙ יִרְאֶ֣ה יִשְׂבָּ֔ע בְּ/דַעְתּ֗/וֹ יַצְדִּ֥יק צַדִּ֛יק עַבְדִּ֖/י לָֽ/רַבִּ֑ים וַ/עֲוֺנֹתָ֖/ם ה֥וּא יִסְבֹּֽל׃
translation:
  text: From the anguish of his soul he will see and be satisfied[a]; by his knowledge my righteous servant will justify many[b], and he will bear their iniquities.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'by knowledge of him,' taking the phrase to refer to others coming to know the servant rather than to the servant's own knowledge.
    reason: alternative_reading
  - marker: b
    text: Some ancient witnesses read 'he will see light and be satisfied.' The Masoretic Text reads simply 'he will see and be satisfied.'
    reason: textual_variant
lexical_decisions:
- source_word: מֵעֲמַל
  chosen: From the anguish
  alternatives:
  - From the labor
  - From the toil
  - Out of the suffering
  lexicon: HALOT
  rationale: עָמָל can denote toil, trouble, misery, or suffering. In this servant-song context, the sense is not mere work but painful affliction. 'Anguish' captures the experiential suffering while preserving the concrete force of the noun. The prefixed מִן is rendered 'From' to preserve the Hebrew construction rather than smoothing it away.
- source_word: נַפְשׁוֹ
  chosen: of his soul
  alternatives:
  - of himself
  - of his life
  lexicon: HALOT
  rationale: נֶפֶשׁ often refers to the whole self or life, but 'soul' remains a transparent and theologically weighty rendering here, especially in a context of deep inner suffering. It also preserves the Hebrew idiom 'anguish of his soul' without over-paraphrase.
- source_word: יִרְאֶה
  chosen: he will see
  alternatives:
  - he will look upon
  - he will see light
  lexicon: HALOT
  rationale: The MT reads simply 'he will see.' Some ancient witnesses add 'light,' but that is not present in the provided Hebrew text, so the main text follows MT. The verb is left broad rather than specifying the object.
- source_word: יִשְׂבָּע
  chosen: be satisfied
  alternatives:
  - be content
  - be filled
  lexicon: HALOT
  rationale: The verb means to be satisfied or sated. 'Be satisfied' is idiomatic English and preserves the resultative sense following 'he will see.'
- source_word: בְּדַעְתּוֹ
  chosen: by his knowledge
  alternatives:
  - by knowledge of him
  - through his knowing
  lexicon: HALOT
  rationale: 'The suffix most naturally reads as subjective genitive/instrumental: ''by his knowledge.'' Because the phrase is genuinely debated, the main text preserves the straightforward grammatical reading while an alternative is noted in a footnote. This avoids importing an interpretive expansion into the text itself.'
- source_word: יַצְדִּיק
  chosen: will justify
  alternatives:
  - will declare righteous
  - will make righteous
  lexicon: HALOT
  rationale: In the Hiphil, צדק commonly means to declare or treat as righteous, hence 'justify.' This is the most concise and theologically established English equivalent, while not forcing the mechanism beyond the Hebrew.
- source_word: צַדִּיק עַבְדִּי
  lemma: צַדִּיק
  chosen: my righteous servant
  alternatives:
  - my servant, the righteous one
  - the righteous one, my servant
  lexicon: HALOT
  rationale: The adjective צַדִּיק is taken attributively with 'my servant.' 'My righteous servant' is the most natural English order and preserves both descriptors.
- source_word: לָרַבִּים
  chosen: many
  alternatives:
  - the many
  - for many
  lexicon: HALOT
  rationale: רַבִּים means 'many' or 'the many.' English normally omits the article here. The phrase is not weakened to 'all,' since the Hebrew specifically says 'many.'
- source_word: וַעֲוֺנֹתָם
  chosen: their iniquities
  alternatives:
  - their sins
  - their guilt
  lexicon: HALOT
  rationale: עָוֺן carries the sense of iniquity/guilt, not merely generic sin. 'Iniquities' preserves the moral weight and aligns with the servant's bearing of culpability.
- source_word: הוּא
  chosen: he himself
  alternatives:
  - he
  - he indeed
  lexicon: HALOT
  rationale: The independent pronoun adds emphasis. 'He himself' brings that emphasis into English without sounding overly wooden.
- source_word: יִסְבֹּל
  chosen: will bear
  alternatives:
  - will carry
  - will endure
  lexicon: HALOT
  rationale: The verb can mean bear/carry/endure. In parallel with iniquities, 'will bear' best conveys vicarious burden-bearing and matches the immediate object.
