translation:
  language: es
  text: Oración de Moisés[a], el hombre de Dios. Señor, tú has sido para nosotros una morada[b] de generación en generación.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «por Moisés» o «para Moisés» en el encabezado; la preposición hebrea puede indicar autoría, asociación o dedicación.
    reason: alternative_reading
  - marker: b
    text: O «refugio» o «habitación» para el sentido de מָעוֹן.
    reason: lexical_alternative
lexical_decisions:
- source_word: תְּפִלָּה
  english_pob_choice: A prayer
  chosen_spanish: Oración
  alternatives_spanish:
  - Una oración
  lexicon: HALOT
  rationale: En el encabezado poético, תְּפִלָּה nombra la pieza como una oración; en español, «Oración» es natural y fiel al género. Se omite el artículo para reflejar el carácter titular del superscrito sin forzar una traducción demasiado explicativa.
- source_word: לְמֹשֶׁה
  english_pob_choice: of Moses
  chosen_spanish: de Moisés
  alternatives_spanish:
  - por Moisés
  - para Moisés
  lexicon: HALOT
  rationale: El prefijo ל en los superscritos puede expresar asociación, autoría o dedicación. «De Moisés» conserva esa ambigüedad en español, tal como la POB inglesa eligió «of Moses» para no resolverla de manera indebida.
- source_word: אִישׁ הָאֱלֹהִים
  english_pob_choice: the man of God
  chosen_spanish: el hombre de Dios
  alternatives_spanish:
  - un hombre de Dios
  lexicon: HALOT
  rationale: La forma con artículo en hebreo sostiene un título formal; «el hombre de Dios» reproduce esa designación reconocible para Moisés. «Un hombre de Dios» debilitaría la fuerza titular del hebreo.
- source_word: אֲדֹנָי
  english_pob_choice: Lord
  chosen_spanish: Señor
  alternatives_spanish:
  - mi Señor
  - Soberano Señor
  lexicon: HALOT
  rationale: Aquí אֲדֹנָי funciona como título divino de invocación. En español, «Señor» es la forma más natural y reverente. Se evita «Yahvé» porque el hebreo no usa el tetragrámaton en este versículo, sino un título de dirección a Dios.
- source_word: מָעוֹן
  english_pob_choice: dwelling place
  chosen_spanish: refugio
  alternatives_spanish:
  - morada
  - habitación
  - lugar de morada
  lexicon: HALOT
  rationale: La POB inglesa conservó la metáfora espacial con la nota «Or 'refuge' or 'habitation'». En español, «refugio» recoge una opción semántica explícitamente admitida por el audit trail y suena natural en el contexto poético de seguridad divina. Se mantiene la nota para no borrar la alternativa «morada/habitación» que también pertenece al campo léxico.
- source_word: הָיִיתָ לָּנוּ
  english_pob_choice: you have been for us
  chosen_spanish: has sido para nosotros
  alternatives_spanish:
  - has sido para nuestro bien
  - has sido para nosotros como
  lexicon: HALOT
  rationale: El perfecto hebreo expresa una relación duradera y continua; «has sido para nosotros» comunica bien esa continuidad en español. Se evita un futuro o un presente simple que alteraría el valor aspectual del verbo.
- source_word: בְּדֹר וָדֹר
  english_pob_choice: from generation to generation
  chosen_spanish: de generación en generación
  alternatives_spanish:
  - por generación y generación
  - a través de generación tras generación
  lexicon: HALOT
  rationale: Es un modismo hebreo de continuidad sucesiva. La fórmula establecida «de generación en generación» es idiomática en español y preserva el valor repetitivo sin añadir interpretación.
theological_decisions:
- issue: Ambigüedad de לְמֹשֶׁה en el superscrito
  english_pob_reading: Rendered neutrally as 'of Moses' in the heading
  chosen_spanish_reading: «de Moisés» en el encabezado
  alternative_spanish_readings:
  - «por Moisés»
  - «para Moisés»
  rationale: 'La preposición hebrea permite varias relaciones: autoría, asociación o dedicación. Mantener «de Moisés» conserva la tensión documental sin decidir más de lo que el texto prueba. Esto sigue la política de la POB de preservar ambigüedades teológicas o históricas cuando el hebreo las deja abiertas.'
  doctrine_reference: Translation philosophy §3, Preserve theological tension rather than resolve it.
- issue: Título divino אֲדֹנָי frente al nombre propio de Dios
  english_pob_reading: Lord
  chosen_spanish_reading: Señor
  alternative_spanish_readings:
  - Soberano Señor
  - mi Señor
  rationale: Aunque la política del proyecto usa «Yahvé» para יהוה, aquí el texto hebreo no contiene el nombre divino sino el título אֲדֹנָי. Traducirlo por «Señor» respeta el dato original y evita reemplazar un título con un nombre propio sin base textual.
  doctrine_reference: Project terminology defaults; Hebrew source distinction between divine title and divine name.
translation_notes:
  revision_awareness: El audit trail inglés indica estado de alta concordancia, sin revisiones aplicadas y con decisión estable sobre la ambigüedad de לְמֹשֶׁה y el valor léxico de מָעוֹן. La redacción española sigue esa estabilidad y no introduce nuevas resoluciones doctrinales.
  spanish_consistency_notes:
  - Se mantiene el orden del encabezado poético y la puntuación sobria propia de un superscrito bíblico.
  - «Señor» se usa aquí como título divino de אֲדֹנָי; no sustituye la política de «Yahvé» para יהוה, porque este versículo no contiene el tetragrámaton.
  - Las notas a y c preservan alternativas léxicas sin multiplicar indebidamente las opciones; la nota b cubre la alternativa textual principal de מָעוֹן.
