revisions:
- from: 'Entonces Yahvé dijo a Moisés y a Aarón[a]: «Tomen para ustedes puñados[b] de hollín de un horno, y Moisés lo lanzará hacia el cielo[c], ante los ojos de Faraón».'
  to: 'Entonces Yahvé dijo a Moisés y a Aarón: «Tomen para ustedes puñados[a] de hollín[b] de un horno, y que Moisés lo lance hacia el cielo[c], ante los ojos de Faraón».'
  rationale: Se elimina la nota espuria en «Aarón», se restaura la nota léxica documentada para פִּיחַ, y se ajusta «lo lanzará» a «que Moisés lo lance» para reflejar mejor en español la instrucción específica dirigida a Moisés. También se mantiene la nota direccional para הַשָּׁמַיְמָה con una alternativa idiomática en español.
