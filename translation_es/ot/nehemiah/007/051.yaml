  text: los hijos de Gazzam[a], los hijos de Uzza, los hijos de Paseah.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «descendientes de» en cada ocurrencia de «hijos de»; la fórmula genealógica hebrea puede denotar una línea familiar más amplia, no solo hijos varones inmediatos.
