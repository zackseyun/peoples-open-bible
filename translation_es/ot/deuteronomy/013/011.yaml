translation:
  language: es
  text: Lo apedrearás con piedras, y morirá, porque procuró apartarte de Yahvé tu Dios[a], que te sacó de la tierra de Egipto[b], de la casa de esclavitud.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O ‘desviarte de Yahvé tu Dios’ o ‘seducirte para apartarte de Yahvé tu Dios’.
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: ‘de la casa de esclavitud’, fórmula del pacto que recuerda la liberación de Israel de Egipto.'
    reason: cultural_note
lexical_decisions:
- source_word: וּסְקַלְתּוֹ
  english_pob_choice: You shall stone him
  chosen_spanish: Lo apedrearás
  alternatives_spanish:
  - Debes apedrearlo
  - Apedréalo
  lexicon: HALOT
  rationale: El verbo legal expresa ejecución por lapidación. En español, ‘apedrear’ comunica de manera directa y natural el acto judicial, y el futuro injuntivo conserva el tono normativo del hebreo en contexto legal.
- source_word: בָאֲבָנִים
  english_pob_choice: with stones
  chosen_spanish: con piedras
  alternatives_spanish:
  - a piedras
  - con rocas
  lexicon: HALOT
  rationale: La frase indica el medio de ejecución. ‘Con piedras’ es la equivalencia natural y fiel en español; mantiene la concreción del medio sin añadir explicación.
- source_word: וָמֵת
  english_pob_choice: and he shall die
  chosen_spanish: y morirá
  alternatives_spanish:
  - y debe morir
  - y así morirá
  lexicon: HALOT
  rationale: Se conserva el resultado como cláusula independiente, en forma breve y solemne, como en el hebreo.
- source_word: כִּי
  english_pob_choice: because
  chosen_spanish: porque
  alternatives_spanish:
  - pues
  - ya que
  lexicon: HALOT
  rationale: Introduce la causa de la pena. ‘Porque’ es la opción más clara y directa en español moderno.
- source_word: בִקֵּשׁ
  english_pob_choice: he sought
  chosen_spanish: procuró
  alternatives_spanish:
  - intentó
  - buscó
  lexicon: HALOT
  rationale: Aquí el verbo señala una acción deliberada orientada a un fin. ‘Procuró’ conserva la idea de empeño intencional sin sonar demasiado interpretativo.
- source_word: לְהַדִּיחֲךָ
  english_pob_choice: to drive you away
  chosen_spanish: apartarte
  alternatives_spanish:
  - hacerte apartar
  - desviarte
  lexicon: HALOT
  rationale: El hiphil de נדח expresa causar apartamiento o alejamiento de la lealtad pactal. ‘Apartarte’ en español transmite esa separación sin sobrecargar el verso con una paráfrasis explicativa.
- source_word: מֵעַל יְהוָה אֱלֹהֶיךָ
  english_pob_choice: from Yahweh your God
  chosen_spanish: de Yahvé tu Dios
  alternatives_spanish:
  - de sobre Yahvé tu Dios
  - de apartarte de Yahvé tu Dios
  lexicon: HALOT
  rationale: Se mantiene el nombre divino ‘Yahvé’ conforme a la pauta del proyecto. La relación de alejamiento implícita en מֵעַל se integra con ‘apartarte’, que en español comunica la ruptura de lealtad sin forzar una construcción extraña.
- source_word: הַמּוֹצִיאֲךָ
  english_pob_choice: who brought you out
  chosen_spanish: que te sacó
  alternatives_spanish:
  - que te hizo salir
  - que te sacó fuera
  lexicon: HALOT
  rationale: El participio relativo describe a Yahvé por su acto redentor pasado. ‘Te sacó’ es la manera más natural y fiel de expresar la salida histórica de Egipto en español.
- source_word: מֵאֶרֶץ מִצְרַיִם
  english_pob_choice: from the land of Egypt
  chosen_spanish: de la tierra de Egipto
  alternatives_spanish:
  - de la tierra egipcia
  - de Egipto
  lexicon: HALOT
  rationale: Se conserva la fórmula geográfica completa del hebreo. ‘Tierra de Egipto’ mantiene el paralelismo con la cláusula siguiente y su registro bíblico.
- source_word: מִבֵּית עֲבָדִים
  english_pob_choice: out of the house of slavery
  chosen_spanish: de la casa de esclavitud
  alternatives_spanish:
  - de la casa de servidumbre
  - de la casa de esclavos
  lexicon: HALOT
  rationale: La expresión es una fórmula de liberación del pacto. ‘Casa de esclavitud’ conserva el sustantivo abstracto y la fuerza histórica del hebreo, siguiendo el valor lexical elegido para עֲבָדִים.
theological_decisions:
- issue: Nombre divino יהוה / YHWH
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - Jehová
  rationale: El texto hebreo contiene el Tetragrámaton directamente. Conforme a la terminología del proyecto, se translitera como ‘Yahvé’ para preservar el nombre propio del Dios del pacto y evitar la sustitución por un título.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יהוה YHWH → Yahvé'
- issue: Sentido pactal de לְהַדִּיחֲךָ מֵעַל
  english_pob_reading: drive you away from Yahweh
  chosen_spanish_reading: apartarte de Yahvé
  alternative_spanish_readings:
  - alejarte de Yahvé
  - desviarte de Yahvé
  - arrastrarte lejos de Yahvé
  rationale: El versículo no habla solo de distancia física, sino de apartamiento de la lealtad al pacto. ‘Apartarte’ preserva la fuerza relacional y exhortativa sin introducir categorías externas al texto.
  doctrine_reference: Translation philosophy §1, §3
- issue: Fórmula de liberación ‘house of slavery’
  english_pob_reading: house of slavery
  chosen_spanish_reading: casa de esclavitud
  alternative_spanish_readings:
  - casa de servidumbre
  - casa de bondage
  rationale: Se conserva la fórmula con ‘esclavitud’ por su fidelidad léxica y por la claridad del contraste redentor con Egipto. El término mantiene la memoria de la liberación histórica de Israel.
  doctrine_reference: 'DOCTRINE.md: Lexical consistency — עֲבָדִים / slavery'
translation_notes:
  revision_awareness: 'Se siguió el tramo final del audit trail inglés sin cambios sustantivos: se mantuvieron la lectura legal de la lapidación, el valor causal de כי, el matiz deliberado de בקש, el apartamiento pactal de לְהַדִּיחֲךָ y la fórmula de liberación ‘casa de esclavitud’.'
  spanish_consistency_notes:
  - Se conservó ‘Yahvé’ como forma fija para יהוה, en coherencia con la pauta del proyecto.
  - ‘Apedrear’ se prefirió por su naturalidad jurídica en español y por corresponder al valor de סקל.
  - ‘Casa de esclavitud’ mantiene la fórmula covenantal sin sustituirla por un equivalente eclesiástico tradicional.
  - Se evitó ‘SEÑOR’ para no ocultar el nombre divino explícito del hebreo.
