translation:
  language: es
  text: Y cuando Ajior vio todo lo que el Dios de Israel había hecho[a], creyó mucho a Dios, y se circuncidó la carne de su prepucio, y fue añadido[b] a la casa de Israel hasta este día.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «confió mucho en Dios». El verbo griego πιστεύω puede expresar creer, tener fe o confiar, según el contexto.
    reason: lexical_alternative
  - marker: b
    text: O «fue unido a la casa de Israel». La frase describe la incorporación de Ajior al pueblo de Israel.
    reason: alternative_reading
lexical_decisions:
- source_word: ἰδὼν δὲ
  english_pob_choice: And when ... saw
  chosen_spanish: Y cuando ... vio
  alternatives_spanish:
  - Y al ver
  - Y después de ver
  lexicon: BDAG
  rationale: El participio aoristo introduce la circunstancia temporal de las acciones principales; en español, «Y cuando ... vio» conserva bien la relación temporal y resulta natural y bíblico.
- source_word: πάντα ὅσα ἐποίησεν
  english_pob_choice: all that ... had done
  chosen_spanish: todo lo que ... había hecho
  alternatives_spanish:
  - todas las cosas que ... había hecho
  - todo cuanto ... hizo
  lexicon: BDAG
  rationale: La expresión abarca la totalidad de los actos narrados de Dios; «todo lo que ... había hecho» mantiene el valor totalizador y el pluscuamperfecto narrativo.
- source_word: ὁ θεὸς τοῦ Ἰσραήλ
  english_pob_choice: the God of Israel
  chosen_spanish: el Dios de Israel
  alternatives_spanish:
  - el Dios de Israel
  lexicon: BDAG
  rationale: Título genitivo estándar; en español la forma tradicional y clara es «el Dios de Israel».
- source_word: ἐπίστευσεν τῷ θεῷ σφόδρα
  english_pob_choice: he believed God greatly
  chosen_spanish: creyó a Dios con mucha fuerza
  alternatives_spanish:
  - creyó en Dios profundamente
  - tuvo mucha fe en Dios
  - confió mucho en Dios
  lexicon: BDAG
  rationale: El verbo πιστεύω con dativo puede expresar creer/poner confianza en Dios. Se conservó el valor verbal de «creer» y el intensificador σφόδρα con una frase adverbial natural en español; «creyó a Dios» evita diluir el objeto dativo y deja abierta la tensión entre creer y confiar.
- source_word: περιέτεμετο
  english_pob_choice: he circumcised
  chosen_spanish: se circuncidó
  alternatives_spanish:
  - fue circuncidado
  - circuncidó su carne
  lexicon: BDAG
  rationale: El medio puede expresarse de forma reflexiva en español; «se circuncidó» comunica la acción sobre sí mismo sin forzar una pasiva que sería menos ajustada al contexto inmediato.
- source_word: τὴν σάρκα τῆς ἀκροβυστίας αὐτοῦ
  english_pob_choice: the flesh of his foreskin
  chosen_spanish: la carne de su prepucio
  alternatives_spanish:
  - la carne de su foreskin
  - la carne de su incircuncisión
  lexicon: BDAG
  rationale: «Prepucio» es el término español claro y preciso para ἀκροβυστία. Se mantuvo la concreción anatómica del griego sin eufemizar ni abstraer con «incircuncisión».
- source_word: προσετέθη πρὸς τὸν οἶκον Ἰσραήλ
  english_pob_choice: was joined to the house of Israel
  chosen_spanish: fue añadido a la casa de Israel
  alternatives_spanish:
  - fue unido a la casa de Israel
  - pasó a formar parte de la casa de Israel
  lexicon: BDAG
  rationale: El pasivo de προστίθημι puede significar ser incorporado a un pueblo; «fue añadido» conserva la metáfora verbal de «add» que el inglés POB documentó, mientras «casa de Israel» preserva la expresión bíblica.
- source_word: ἕως τῆς ἡμέρας ταύτης
  english_pob_choice: to this day
  chosen_spanish: hasta este día
  alternatives_spanish:
  - hasta el día de hoy
  - hasta hoy
  lexicon: BDAG
  rationale: Equivalente idiomático natural en español que preserva la perspectiva narrativa presente.
theological_decisions:
- issue: πιστεύω en contexto de conversión tras la liberación divina
  english_pob_reading: he believed God greatly / he trusted God greatly
  chosen_spanish_reading: creyó a Dios con mucha fuerza
  alternative_spanish_readings:
  - creyó en Dios profundamente
  - tuvo mucha fe en Dios
  - confió mucho en Dios
  rationale: El texto presenta una respuesta de fe/confianza ante lo que Dios ha hecho. «Creyó a Dios» mantiene la relación verbal con πιστεύω y el dativo, sin convertirlo prematuramente en una formulación doctrinal más tardía. La intensificación conserva σφόδρα.
  doctrine_reference: 'DOCTRINE.md: πίστις-family terms; translation philosophy on lexical transparency and contextual nuance'
- issue: Incorporación de Achior al pueblo de Israel
  english_pob_reading: was joined to the house of Israel
  chosen_spanish_reading: fue añadido a la casa de Israel
  alternative_spanish_readings:
  - fue unido a la casa de Israel
  - pasó a formar parte de la casa de Israel
  rationale: La frase indica incorporación comunitaria después de la fe y la circuncisión. «Fue añadido» conserva la metáfora del original y la lectura auditada del POB inglés, sin imponer terminología técnica no explícita en el versículo.
  doctrine_reference: 'DOCTRINE.md: communal incorporation language; translation philosophy on preserving source metaphors'
translation_notes:
  revision_awareness: Se tomó en cuenta la revisión más reciente del inglés POB, que afinó ἐπίστευσεν τῷ θεῷ hacia una relación verbal más directa con el dativo. En español se preservó esa cercanía con «creyó a Dios», evitando una paráfrasis que borrara la tensión entre creer y confiar. También se mantuvo la incorporación de Achior al pueblo con una metáfora verbal de añadición, y se eligió un equivalente anatómico explícito para ἀκροβυστία.
  spanish_consistency_notes:
  - Se mantuvo «Dios de Israel» y «casa de Israel» para conservar el paralelismo bíblico.
  - Se usó el reflexivo «se circuncidó» para reflejar el medio griego sin ambigüedad.
  - Se evitó «SEÑOR» para el nombre divino, conforme al criterio del proyecto de usar «Yahvé» cuando corresponda; aquí el texto dice «Dios», no el tetragrámaton.
  - La puntuación y el orden de cláusulas siguen el flujo narrativo del griego sin sobrecargar la sintaxis española.
