  - único
  lexicon: HALOT
  rationale: Aquí funciona como fórmula de cómputo en una lista. Se conserva la brevedad de «uno» para no introducir el sustantivo «rey», que el hebreo no repite en esa posición.
- source_word: מְגִדּוֹ
