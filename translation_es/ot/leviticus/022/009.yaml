translation:
  language: es
  text: Guardarán mi encargo[a], para que no lleven pecado por ello y mueran por ello cuando lo profanen[c][b]. Yo soy Yahvé, quien los santifica[d].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «mi obligación». El hebreo מִשְׁמֶרֶת puede expresar deber, custodia o cargo confiado.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «mueran a causa de ello».'
    reason: lexical_alternative
  - marker: c
    text: 'O: «lo contaminen» o «lo traten como común».'
    reason: lexical_alternative
  - marker: d
    text: 'O: «quien los hace santos».'
    reason: lexical_alternative
lexical_decisions:
- source_word: שָׁמְרוּ
  english_pob_choice: shall keep
  chosen_spanish: Guardarán
  alternatives_spanish:
  - Deben guardar
  - Han de guardar
  - Observarán
  lexicon: HALOT
  rationale: שׁמר en contexto legal-cultual expresa guardar, observar o custodiar. «Guardarán» mantiene el valor obligacional y la imagen de custodia, con un español natural y fiel.
- source_word: מִשְׁמַרְתִּי
  english_pob_choice: my charge
  chosen_spanish: mi encargo
  alternatives_spanish:
  - mi cargo
  - mi obligación
  - mi mandato
  lexicon: HALOT
  rationale: מִשְׁמֶרֶת en contexto sacerdotal puede denotar deber, custodia o encargo confiado. «Mi encargo» conserva la idea de una responsabilidad encomendada sin volverla demasiado abstracta; «mi cargo» podría sonar más institucional y menos preciso al mandato concreto.
- source_word: יִשְׂאוּ עָלָיו חֵטְא
  english_pob_choice: bear sin because of it
  chosen_spanish: carguen con culpa por él
  alternatives_spanish:
  - lleven pecado por él
  - incurran en culpa por él
  - carguen con pecado por él
  lexicon: HALOT
  rationale: El hebreo נשׂא + חטא puede significar «llevar pecado/culpa» o «incurrir en culpa». En español, «carguen con culpa por él» comunica bien la responsabilidad culpable y evita una traducción demasiado extraña, sin perder la metáfora de carga. «Pecado» sería posible, pero «culpa» expresa mejor la responsabilidad jurídica implícita.
- source_word: וּמֵתוּ ב֖וֹ
  english_pob_choice: and die by it
  chosen_spanish: y mueran por él
  alternatives_spanish:
  - y mueran a causa de él
  - y mueran por causa de ello
  - y mueran debido a él
  lexicon: HALOT
  rationale: La preposición ב con pronombre puede indicar consecuencia o conexión causal. «Mueran por él» es breve y natural en español, y deja abierta la relación causal que el contexto establece; además preserva la tensión del texto sin especificar de más el referente.
- source_word: יְחַלְּלֻהוּ
  english_pob_choice: they profane it
  chosen_spanish: lo profanen
  alternatives_spanish:
  - lo profanen y lo traten como común
  - lo mancillen
  - lo desacralicen
  lexicon: HALOT
  rationale: חלל en contexto de santidad cultual significa profanar, tratar como común o contaminar lo santo. «Lo profanen» conserva el registro bíblico y la oposición santo/común sin agregar explicación interpretativa al cuerpo del versículo.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  lexicon: HALOT
  rationale: El Tetragrámaton se rinde como «Yahvé» según la terminología del proyecto, preservando el nombre divino propio en lugar de sustituirlo por un título.
- source_word: מְקַדְּשָׁם
  english_pob_choice: who sanctifies them
  chosen_spanish: quien los santifica
  alternatives_spanish:
  - quien los hace santos
  - quien los consagra
  lexicon: HALOT
  rationale: קדשׁ en participio aquí describe a Yahvé como el que aparta y hace santos a los sacerdotes. «Santifica» mantiene el valor teológico de la santidad con una forma idiomática y reverente en español.
theological_decisions:
- issue: Referente de los pronombres «por él» / «lo profanen»
  english_pob_reading: The pronouns remain unspecific, referring to the sacred obligation/holy matter just mentioned rather than being over-specified.
  chosen_spanish_reading: Los pronombres se dejan genéricos («por él», «lo profanen»), refiriéndolos al encargo o asunto sagrado mencionado inmediatamente, sin fijar en exceso el referente.
  alternative_spanish_readings:
  - referirlos específicamente al alimento santo del contexto inmediato
  - entenderlos como referidos al encargo mismo de Yahvé
  rationale: El hebreo usa pronombres singulares sin repetir el sustantivo. Dado el contexto sacerdotal y la referencia previa a «mi encargo», el español conserva la ambigüedad textual en vez de resolverla de manera más precisa de lo que permite el verso.
  doctrine_reference: 'Translation philosophy §3: Preservar la tensión textual en vez de resolverla indebidamente.'
translation_notes:
  revision_awareness: No hay revisiones aplicadas en el pase más reciente; el texto se mantiene conforme al juicio de alta concordancia del control cruzado.
  spanish_consistency_notes:
  - Se usa «Yahvé» de manera consistente para יְהוָה, según el estándar del proyecto.
  - Se prefirió «santifica» a alternativas más explicativas para conservar el registro cultual.
  - Se mantuvo la ambigüedad pronominal del hebreo sin sobreespecificar el objeto del pecado/profanación.
