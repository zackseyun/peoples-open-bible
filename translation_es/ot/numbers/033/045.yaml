    issue: La nota [a] repite el mismo término del texto principal («acamparon»), por lo que no aporta una alternativa real.
    rationale: La nota inglesa preserva una alternativa léxica distinta («encamped») frente al texto principal («camped»). En español, la nota debe ofrecer una formulación realmente alternativa o explicativa, no duplicar la lectura principal.
