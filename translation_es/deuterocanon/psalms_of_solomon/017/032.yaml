translation:
  language: es
  text: Y tendrá pueblos de las naciones que le sirvan bajo su yugo,[a] y glorificará al Señor en un lugar visible a toda la tierra.[b]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «que le sirvan como súbditos bajo su yugo».
    reason: lexical_alternative
  - marker: b
    text: O «en un lugar renombrado en toda la tierra». La frase griega con ἐπίσημος puede destacar prominencia visible o renombre.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἕξει
  english_pob_choice: he will have
  chosen_spanish: tendrá
  alternatives_spanish:
  - tendrá en posesión
  - poseerá
  lexicon: LSJ
  rationale: ἔχω en futuro con infinitivo expresa posesión/control de una situación; en español, «tendrá» conserva la relación verbal natural sin añadir una causativa ajena al griego.
- source_word: λαοὺς ἐθνῶν
  english_pob_choice: the peoples of the nations
  chosen_spanish: pueblos de las naciones
  alternatives_spanish:
  - los pueblos de las naciones
  - pueblos gentiles
  lexicon: LSJ
  rationale: Se conserva la doble capa semántica de λαοί + ἔθνη sin reducir prematuramente a «gentiles», que en español introduciría una lectura interpretativa más cerrada.
- source_word: δουλεύειν
  english_pob_choice: serve
  chosen_spanish: que le sirvan
  alternatives_spanish:
  - que estén esclavizados
  - que lo sirvan como súbditos
  lexicon: LSJ
  rationale: El verbo puede abarcar servicio o sujeción; aquí el contexto del «yugo» ya comunica la subordinación, por lo que «sirvan» mantiene fluidez sin borrar la fuerza del término.
- source_word: ζυγὸν
  english_pob_choice: yoke
  chosen_spanish: yugo
  alternatives_spanish:
  - dominio
  - señorío
  lexicon: LSJ
  rationale: «Yugo» preserva la metáfora concreta de sometimiento presente en el griego y evita abstraer la imagen.
- source_word: τὸν κύριον
  english_pob_choice: the Lord
  chosen_spanish: al Señor
  alternatives_spanish:
  - al Maestro
  lexicon: LSJ
  rationale: Según la terminología del proyecto, κύριος se traduce por «Señor»; el acusativo con artículo se expresa naturalmente como «al Señor».
- source_word: δοξάσει
  english_pob_choice: will glorify
  chosen_spanish: glorificará
  alternatives_spanish:
  - honrará
  - dará gloria a
  lexicon: LSJ
  rationale: «Glorificará» reproduce con claridad la acción de dar gloria y conserva el peso teológico del verbo.
- source_word: ἐν ἐπισήμῳ πάσης τῆς γῆς
  english_pob_choice: in a place conspicuous to all the earth
  chosen_spanish: en un lugar conspicuo para toda la tierra
  alternatives_spanish:
  - en un lugar renombrado en toda la tierra
  - en un lugar distinguido a la vista de toda la tierra
  lexicon: LSJ
  rationale: ἐπίσημος indica algo marcado, notable o conspicuo; el genitivo de πάσης τῆς γῆς se entiende de forma objetiva, de modo que «para toda la tierra» refleja la visibilidad general sin forzar un comparativo que el griego no exige.
theological_decisions:
- issue: κύριος como título divino
  english_pob_reading: the Lord
  chosen_spanish_reading: el Señor
  alternative_spanish_readings:
  - el Dueño
  rationale: En este contexto, κύριος funciona como título reverente y se mantiene el equivalente consagrado por el proyecto en español.
  doctrine_reference: Terminología estándar del proyecto para κύριος
- issue: δουλεύειν y la fuerza de la subordinación
  english_pob_reading: serve under his yoke
  chosen_spanish_reading: que le sirvan bajo su yugo
  alternative_spanish_readings:
  - que estén sometidos bajo su yugo
  - que le sirvan como súbditos
  rationale: 'Se evita suavizar la imagen de dominación: el yugo conserva la coerción implícita, mientras que «sirvan» mantiene la relación verbal del texto.'
  doctrine_reference: Lectura semántica del verbo δουλεύειν y de la metáfora del yugo
translation_notes:
  revision_awareness: 'La versión española sigue la revisión más reciente del inglés: conserva la construcción de posesión con infinitivo implícito en sentido natural, mantiene el valor de ἐπίσημος como ubicación conspicua y no introduce un artículo o una paráfrasis que el griego no requiera. También evita mecanizar desde el inglés al respetar el original griego en la relación entre sujeto, objeto e infinitivo.'
  spanish_consistency_notes:
  - Se usa «Señor» para κύριος conforme al estándar del proyecto.
  - Se preserva «yugo» como imagen concreta de sujeción.
  - «Pueblos de las naciones» mantiene la duplicidad léxica de λαοὺς ἐθνῶν.
  - Las notas [a] y [b] están ancladas exactamente en el texto español y no se añaden notas sin anclaje.
