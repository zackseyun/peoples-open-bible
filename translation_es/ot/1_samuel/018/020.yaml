translation:
  language: es
  text: Mical[a], hija de Saúl, amó a David, y se lo dijeron a Saúl, y el asunto le pareció bien.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literalmente, «el asunto fue recto/agradable en sus ojos».
    reason: lexical_alternative
lexical_decisions:
- source_word: וַתֶּאֱהַב
  english_pob_choice: loved
  chosen_spanish: amaba
  alternatives_spanish:
  - amó
  - se enamoró de
  lexicon: HALOT
  rationale: אהב expresa amor de manera directa. En español, "amaba" conserva el sentido simple de afecto/amor sin añadir la carga inceptiva de "se enamoró de" ni la aspereza narrativa de "amó" en este contexto continuo.
- source_word: מִיכַל
  english_pob_choice: Michal
  chosen_spanish: Mical
  alternatives_spanish:
  - Mical
  - Michal
  lexicon: Convención española bíblica/trasliteración
  rationale: Se adapta el nombre al uso español habitual de transliteración bíblica como "Mical", manteniendo la referencia al personaje sin depender de la grafía inglesa.
- source_word: בַּת שָׁאוּל
  english_pob_choice: Saul's daughter
  chosen_spanish: la hija de Saúl
  alternatives_spanish:
  - hija de Saúl
  - la hija del rey Saúl
  lexicon: HALOT
  rationale: La cadena constructa se vierte de forma natural como relación filial. "La hija de Saúl" preserva la identificación familiar sin introducir el título "rey" que el hebreo no expresa aquí.
- source_word: וַיַּגִּדוּ לְשָׁאוּל
  english_pob_choice: they told Saul
  chosen_spanish: se lo dijeron a Saúl
  alternatives_spanish:
  - le dijeron a Saúl
  - informaron a Saúl
  - se informó a Saúl
  lexicon: HALOT
  rationale: El verbo נגד en hiphil puede significar decir o informar. Dado el sujeto plural indefinido, "se lo dijeron a Saúl" conserva la indefinición narrativa y la referencia al hecho reportado, con un español natural.
- source_word: וַיִּשַׁר הַדָּבָר בְּעֵינָיו
  english_pob_choice: the matter pleased him
  chosen_spanish: el asunto le pareció bien
  alternatives_spanish:
  - la cosa le agradó
  - el asunto fue recto a sus ojos
  - el asunto le pareció agradable
  lexicon: HALOT
  rationale: El hebreo usa el modismo 'ser recto/agradable en los ojos de alguien'. En español, "le pareció bien" comunica esa evaluación favorable sin borrar el matiz literal. "El asunto" traduce דבר como el hecho o situación comunicada.
theological_decisions:
- issue: El modismo hebreo 'en sus ojos' (בְּעֵינָיו) expresa evaluación o juicio, no visión física.
  english_pob_reading: 'the matter pleased him, with a footnote: Literally, ''the matter was right/pleasing in his eyes.'''
  chosen_spanish_reading: el asunto le pareció bien
  alternative_spanish_readings:
  - el asunto fue recto a sus ojos
  - el asunto le agradó
  rationale: Se conserva el sentido evaluativo del hebreo en la línea principal, mientras la nota puede preservar la literalidad del modismo. Esto evita una traducción extraña en el texto principal sin perder la transparencia auditiva.
  doctrine_reference: Proverbios 21:2; 1 Samuel 16:7
translation_notes:
  revision_awareness: 'El audit trail inglés no requiere cambios sustanciales: mantiene אהב como ''loved'', נגד como ''told'', y el modismo final como ''pleased him'' con nota literal. La versión española sigue esas decisiones, adaptando solo la naturalidad sintáctica al español y conservando la transparencia del modismo final.'
  spanish_consistency_notes:
  - Se mantiene el nombre bíblico como «Mical» para coherencia en español.
  - Se evita «SEÑOR» porque el versículo no contiene el Tetragrámaton ni una sustitución devocional.
  - «El asunto» conserva el valor de דבר como situación/materia reportada, no como «palabra».
  - La nota de pie de página corresponde al modismo final y debe anclarse en «bien» mediante [a].
