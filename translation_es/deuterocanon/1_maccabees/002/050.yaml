  - marker: b
    text: O 'por causa de la alianza de nuestros padres' o 'por el bien de la alianza de nuestros padres'.
    reason: lexical_alternative
  revision_rationale: Se corrige la nota [b] para que corresponda a ὑπὲρ διαθήκης πατέρων ἡμῶν y no a 'la ley'. Se sustituye 'pacto' por 'alianza' para reflejar mejor διαθήκη en contexto bíblico judío y alinearse con la decisión POB 'covenant'. Se mejora la nota [a] para que aporte una alternativa real y explique el valor de τέκνα sin redundancia.
