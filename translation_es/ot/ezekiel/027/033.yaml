translation:
  language: es
  text: Cuando tus mercancías[a] salían de los mares, saciaste a muchos pueblos; con la abundancia de tus riquezas y de tu mercadería enriqueciste a los reyes de la tierra[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O ‘tus bienes’ para עִזְבוֹנַיִךְ; ambos términos se refieren a la carga comercial de Tiro en este lamento.
    reason: lexical_alternative
  - marker: b
    text: O ‘los reyes del país’; ארץ puede significar ‘tierra’ o ‘país’ según el contexto.
    reason: lexical_alternative
lexical_decisions:
- source_word: בְּצֵאת
  english_pob_choice: When ... went out
  chosen_spanish: Cuando ... salían
  alternatives_spanish:
  - al salir
  - cuando salían
  lexicon: HALOT
  rationale: La construcción temporal con ב + infinitivo se vierte naturalmente con 'cuando' en español. 'Salían' mantiene el sentido durativo/general del movimiento comercial sin forzar una literalidad rígida.
- source_word: עִזְבוֹנַיִךְ
  english_pob_choice: your wares
  chosen_spanish: tus mercancías
  alternatives_spanish:
  - tus bienes
  - tus géneros
  lexicon: HALOT
  rationale: '''Mercancías'' encaja bien en el contexto de comercio marítimo de Tiro y comunica el valor comercial de la palabra sin sonar arcaico. ''Bienes'' sería más general; ''géneros'' es menos claro para lectores amplios.'
- source_word: מִיַּמִּים
  english_pob_choice: from the seas
  chosen_spanish: de los mares
  alternatives_spanish:
  - del mar
  - desde los mares
  lexicon: HALOT
  rationale: Se conserva el plural hebreo 'mares', que refuerza la imaginería marítima y corresponde mejor a la forma original que un singular suavizado.
- source_word: הִשְׂבַּעַתְּ
  english_pob_choice: you satisfied
  chosen_spanish: saciaste
  alternatives_spanish:
  - satisficiste
  - llenaste
  lexicon: HALOT
  rationale: '''Saciaste'' transmite el valor de satisfacer o colmar presente en el hifil de שבע y funciona con naturalidad en español. ''Llenaste'' pierde algo de la idea de satisfacción; ''satisficiste'' suena menos idiomático.'
- source_word: עַמִּים רַבִּים
  english_pob_choice: many peoples
  chosen_spanish: a muchos pueblos
  alternatives_spanish:
  - a muchas naciones
  - a muchos pueblos y naciones
  lexicon: HALOT
  rationale: '''Pueblos'' conserva el matiz étnico-colectivo de עמים y evita imponer la categoría moderna de ''naciones''. ''Muchos'' corresponde a רבים.'
- source_word: בְּרֹב הוֹנַיִךְ
  english_pob_choice: with your abundant wealth
  chosen_spanish: con la abundancia de tus riquezas
  alternatives_spanish:
  - con tus abundantes riquezas
  - por la abundancia de tus riquezas
  lexicon: HALOT
  rationale: '''Abundancia de tus riquezas'' expresa bien el instrumento/circunstancia de בְּרֹב y mantiene el valor de הוֹן como riqueza. La formulación evita una repetición demasiado pesada de adjetivos.'
- source_word: וּמַעֲרָבַיִךְ
  english_pob_choice: your merchandise
  chosen_spanish: y de tus mercancías
  alternatives_spanish:
  - y de tu comercio
  - y de tus productos
  lexicon: HALOT
  rationale: Se conserva el campo semántico comercial con 'mercancías'. Dado que עִזְבוֹנַיִךְ ya se traduce como 'mercancías', aquí se repite el sustantivo con la coordinación 'y de tus' para no introducir un término menos seguro sin base textual suficiente.
- source_word: הֶעֱשַׁרְתְּ
  english_pob_choice: you enriched
  chosen_spanish: enriqueciste
  alternatives_spanish:
  - hiciste ricos
  - prosperaste
  lexicon: HALOT
  rationale: El hifil de עשר significa 'hacer rico' o 'enriquecer'. 'Enriqueciste' es directo, bíblico y claro en español.
- source_word: מַלְכֵי אָרֶץ
  english_pob_choice: the kings of the earth
  chosen_spanish: a los reyes de la tierra
  alternatives_spanish:
  - a los reyes del país
  - a los reyes del mundo
  lexicon: HALOT
  rationale: Se mantiene 'tierra' porque es la equivalencia más transparente de ארץ en este contexto amplio. El artículo y la preposición completan el sentido verbal en español.
theological_decisions:
- issue: Alcance de ארץ en la clausura del versículo
  english_pob_reading: the kings of the earth
  chosen_spanish_reading: los reyes de la tierra
  alternative_spanish_readings:
  - los reyes de la tierra habitada
  - los reyes del país
  rationale: En este lamento comercial el hebreo puede abarcar un horizonte internacional. 'Tierra' preserva esa amplitud sin restringirla indebidamente a un territorio local; la nota inglesa ya reconoce la alternativa 'land'.
  doctrine_reference: no doctrinal issue; lexical scope only
translation_notes:
  revision_awareness: La revisión más reciente no introdujo cambios y el cotejo de control reporta alto acuerdo; por tanto, este borrador sigue de cerca la lectura aprobada, preservando las decisiones léxicas principales del inglés POB y explicitándolas en español.
  spanish_consistency_notes:
  - Se mantiene 'mercancías' para el léxico comercial de Tiro y 'riquezas' para הוֹן, evitando mezclar con terminología eclesiástica ajena al contexto.
  - '''Pueblos'' conserva el matiz colectivo de עמים, y ''reyes de la tierra'' mantiene la amplitud geográfica del cierre.'
  - La puntuación separa claramente los dos hemistiquios poéticos sin añadir contenido interpretativo.
