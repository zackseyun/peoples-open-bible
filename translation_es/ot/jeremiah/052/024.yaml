    rationale: 'El POB inglés conserva una nota explícita: ''Or the high priest.'' Si el español mantiene nota en este versículo, debe preservar esa alternativa léxica relevante; ''sacerdote principal'' puede llevar nota con ''sumo sacerdote''.'
  - severity: low
    issue: Hay un residuo lingüístico erróneo en las decisiones léxicas ('el sacerdote نائب').
    rationale: No afecta el texto bíblico ni las notas publicables, pero conviene corregirlo en la capa editorial interna.
  revised_spanish_text: Y el capitán de la guardia tomó a Seraía, el sacerdote principal[a], y a Sefanías, el segundo sacerdote[b], y a los tres guardianes del umbral[c].
