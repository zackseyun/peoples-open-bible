review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien la estructura y el sentido general del hebreo: actos asombrosos, respuesta divina, vocativo, y alcance universal hasta los confines de la tierra y el mar lejano. Sin embargo, no sigue la decisión principal del POB en בְּצֶדֶק, que en el texto base quedó como ''in righteousness'' con ''justice'' solo como alternativa. En español, la nota también desplaza indebidamente la alternativa a ''rectitud'' en lugar de preservar ''justicia'' como alternativa principal si se corrige el texto.'
  spanish_quality_summary: 'La redacción es natural y digna. ''Con hechos asombrosos ... tú nos respondes'' suena bien en español bíblico contemporáneo, y ''los confines de la tierra'' es idiomático. El ajuste principal necesario es léxico-teológico: ''en justicia'' debe alinearse con ''en rectitud'' o mejor ''en justicia'' como nota alternativa si el texto principal pasa a ''en rectitud''.'
  glossary_alignment: No hay conflictos con la terminología principal del proyecto salvo la elección de צֶדֶק. 'Dios', 'salvación' y el resto del léxico están bien. La revisión debe respetar la preferencia documentada por 'righteousness' en el texto principal, que en español se representa mejor aquí como 'rectitud' que como 'justicia'.
  issues:
  - severity: medium
    issue: בְּצֶדֶק fue traducido en el texto principal como 'en justicia'
    rationale: El expediente inglés fijó 'in righteousness' como lectura principal y dejó 'justice' como alternativa. La versión española invierte esa prioridad sin justificar una necesidad idiomática fuerte.
  - severity: low
    issue: La nota al pie para צֶדֶק ofrece 'en rectitud' en vez de preservar la alternativa documentada 'en justicia'
    rationale: Si el texto principal se corrige para reflejar 'righteousness', la alternativa documentada debe conservarse en la nota; de lo contrario, se pierde la trazabilidad del razonamiento léxico del POB.
  revised_spanish_text: Con hechos asombrosos en rectitud[a] tú nos respondes, oh Dios de nuestra salvación, la confianza de todos los confines de la tierra y del mar lejano.
  revised_footnotes:
  - marker: a
    text: 'O: «en justicia».'
    reason: lexical_alternative
  revision_rationale: Se ajusta צֶדֶק para que el texto principal siga la decisión auditada del POB ('righteousness') y se preserva 'justicia' como alternativa léxica en nota. El resto del versículo ya era fiel al hebreo y natural en español.
