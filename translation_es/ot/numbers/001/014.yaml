lexical_decisions:
- source_word: לְ/גָד
  english_pob_choice: from Gad
  chosen_spanish: de Gad
  alternatives_spanish:
  - para Gad
  lexicon: HALOT
  rationale: El prefijo לְ aquí marca afiliación tribal dentro de la lista de jefes del censo; en español, «de Gad» comunica de modo natural que Eliasaf pertenece a la tribu de Gad.
- source_word: אֶלְיָסָף
  english_pob_choice: Eliasaph
  chosen_spanish: Eliasaf
  alternatives_spanish:
  - Eliásaf
  lexicon: Transliteración de nombre propio
  rationale: Se translitera el nombre propio, adaptando la forma al español con una terminación más natural y legible, sin alterar la identidad del nombre.
- source_word: בֶּן
  english_pob_choice: son of
  chosen_spanish: hijo de
  alternatives_spanish:
  - el hijo de
  lexicon: HALOT
  rationale: La construcción genealógica hebrea se rinde de manera concisa y idiomática en español como «hijo de».
- source_word: דְּעוּאֵל
  english_pob_choice: Deuel
  chosen_spanish: Deuel
  alternatives_spanish:
  - Reuel
  lexicon: Transliteración de nombre propio
  rationale: La forma del texto masorético aquí es דְּעוּאֵל, por lo que la transliteración principal es «Deuel». Se conserva la variante «Reuel» como nota textual por su presencia en un pasaje paralelo.
translation_notes:
  revision_awareness: 'Coincide con la revisión más reciente: no se registraron cambios necesarios; el versículo mantiene la misma lectura base del texto hebreo y la misma nota de variante nominal.'
  spanish_consistency_notes:
  - Se mantuvo un estilo breve y de lista genealógica, acorde con el contexto del censo.
  - Se evitó «SEÑOR» o equivalentes de sustitución porque aquí no aparece el nombre divino.
  - Se preservó la nota de variante para reflejar la tensión textual entre Deuel y Reuel sin resolverla artificialmente.
