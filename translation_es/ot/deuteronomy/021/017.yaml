translation:
  language: es
  text: Pero reconocerá[a] al primogénito, el hijo de la esposa no amada, dándole una porción doble[b] de todo lo que se halle ser suyo; porque él es la primicia[c] de su vigor; a él pertenece el derecho del primogénito.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «reconocerá jurídicamente». El verbo hebreo implica admitir el estatus del verdadero primogénito, no solo identificarlo.
    reason: lexical_alternative
  - marker: b
    text: Literalmente, «una boca de dos», un modismo que significa una parte doble o porción doble.
    reason: lexical_alternative
  - marker: c
    text: O «la primera de su fuerza». La expresión hebrea se refiere al primer fruto de la capacidad generativa del padre.
    reason: lexical_alternative
lexical_decisions:
- source_word: יַכִּיר
  english_pob_choice: shall acknowledge
  chosen_spanish: reconocerá[a]
  alternatives_spanish:
  - deberá reconocer
  - acknowledge (reconocer jurídicamente)
  lexicon: HALOT
  rationale: En este contexto legal, el verbo expresa reconocer la condición y el derecho del primogénito. En español, «reconocer» transmite bien ese acto jurídico; se mantiene la nota para indicar que el sentido es más que simple percepción.
- source_word: הַבְּכֹר
  english_pob_choice: the firstborn
  chosen_spanish: el primogénito
  alternatives_spanish:
  - el hijo mayor
  - el hijo primogénito
  lexicon: HALOT
  rationale: «Primogénito» conserva el valor técnico de herencia y derecho de nacimiento mejor que «hijo mayor», que puede sonar menos jurídico.
- source_word: בֶּן הַשְּׂנוּאָה
  english_pob_choice: the son of the unloved wife
  chosen_spanish: el hijo de la esposa no amada
  alternatives_spanish:
  - el hijo de la esposa odiada
  - el hijo de la esposa menos amada
  lexicon: HALOT
  rationale: «No amada» refleja el contraste relacional del hebreo sin endurecerlo a «odiada», que podría sugerir más de lo que el contexto legal exige.
- source_word: לָתֶת לוֹ פִּי שְׁנַיִם
  english_pob_choice: by giving him a double portion
  chosen_spanish: dándole una porción doble[b]
  alternatives_spanish:
  - dándole dos partes
  - dándole una doble herencia
  lexicon: HALOT
  rationale: La expresión idiomática hebrea designa una doble cuota de herencia. «Porción doble» es claro y natural en español, y conserva el sentido jurídico.
- source_word: בְּכֹל אֲשֶׁר יִמָּצֵא לוֹ
  english_pob_choice: of all that is found to belong to him
  chosen_spanish: de todo lo que se halle que le pertenece
  alternatives_spanish:
  - de todo lo que tenga
  - de todo lo que posea
  lexicon: HALOT
  rationale: La forma pasiva del hebreo sugiere lo que se encuentra en su posesión o patrimonio. «Se halle que le pertenece» intenta mantener esa fuerza sin perder claridad en español.
- source_word: רֵאשִׁית אֹנוֹ
  english_pob_choice: the firstfruits of his vigor
  chosen_spanish: la primicia[c] de su vigor
  alternatives_spanish:
  - el primero de su fuerza
  - el inicio de su vigor
  lexicon: HALOT
  rationale: «Primicia» preserva la metáfora de inicio/primero fruto del poder generativo paterno; «vigor» expresa bien אֹן como fuerza viril o generativa, sin hacer la frase demasiado cruda.
- source_word: מִשְׁפַּט הַבְּכֹרָה
  english_pob_choice: the right of the firstborn
  chosen_spanish: el derecho del primogénito
  alternatives_spanish:
  - el derecho de primogenitura
  - el derecho hereditario del primogénito
  lexicon: HALOT
  rationale: La expresión denota el derecho legal ligado a la primogenitura. «Derecho del primogénito» es breve, natural y fiel al sentido jurídico.
- source_word: כִּי ... כִּי
  english_pob_choice: But ... for
  chosen_spanish: Pero ... porque
  alternatives_spanish:
  - Pues ... porque
  - Sin embargo ... ya que
  lexicon: HALOT
  rationale: El primer כִּי funciona de modo adversativo en el contexto inmediato; el segundo introduce la razón de la norma. «Pero ... porque» reproduce bien esa relación en español.
theological_decisions:
- issue: Sentido de שְּׂנוּאָה en un contexto legal de herencia
  english_pob_reading: unloved wife
  chosen_spanish_reading: esposa no amada
  alternative_spanish_readings:
  - esposa odiada
  - esposa menos amada
  rationale: El pasaje regula herencia, no evalúa moralmente el matrimonio. «No amada» conserva la contraposición con la esposa amada sin sobredeterminar una hostilidad emocional que el hebreo no exige aquí.
  doctrine_reference: Translation philosophy §1, §6
- issue: Valor jurídico de la primogenitura
  english_pob_reading: the right of the firstborn
  chosen_spanish_reading: el derecho del primogénito
  alternative_spanish_readings:
  - el derecho de primogenitura
  - el privilegio del primogénito
  rationale: La cláusula final es legal y establece una titularidad. «Derecho» mantiene la fuerza normativa del texto y evita suavizarla a un mero privilegio.
  doctrine_reference: Translation philosophy §1, §6
translation_notes:
  revision_awareness: El texto sigue de cerca la revisión final en inglés, que mantiene la lectura jurídica de יַכִּיר, conserva «unloved wife» para שְּׂנוּאָה, y explica פִּי שְׁנַיִם y רֵאשִׁית אֹנוֹ con notas alternativas. La traducción española refleja esa misma estructura y sus tensiones léxicas sin nivelarlas.
  spanish_consistency_notes:
  - Se usa «Yahvé» por norma del proyecto cuando el Tetragrámaton aparezca, pero este versículo no lo contiene.
  - Se mantiene «primogénito» como término técnico de herencia, coherente con el resto del corpus POB en español.
  - «Porción doble» y «derecho del primogénito» conservan el campo legal, evitando reemplazos eclesiásticos más tradicionales.
  - Las notas a, b y c se anclan en las expresiones clave para preservar las alternativas documentadas del audit trail inglés.
