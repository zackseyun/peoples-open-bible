translation:
  language: es
  text: Entonces se reunió a ellos una compañía de asideos[a], poderosa en fuerza, procedente de Israel, todo el que se dedicaba voluntariamente a la ley.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O ‘hasidim’ o ‘asideos’, un grupo judío nombrado y asociado con celo por la ley.
    reason: lexical_alternative
lexical_decisions:
- source_word: συνήχθησαν
  english_pob_choice: gathered
  chosen_spanish: se reunió
  alternatives_spanish:
  - se juntó
  - se congregó
  - se reunió con ellos
  lexicon: LSJ
  rationale: El aoristo pasivo expresa llegada y reunión de un grupo con los ya mencionados. En español, ‘se reunió’ comunica de manera natural ese movimiento colectivo sin añadir matices ajenos como incorporación formal o adhesión institucional.
- source_word: πρὸς αὐτούς
  english_pob_choice: to them
  chosen_spanish: junto a ellos
  alternatives_spanish:
  - a ellos
  - con ellos
  - para ellos
  lexicon: LSJ
  rationale: La preposición indica movimiento hacia el grupo previo; ‘junto a ellos’ conserva la cercanía de asociación y evita forzar un sentido técnico de unión. En la fluidez española, complementa bien ‘se reunió’.
- source_word: συναγωγὴ
  english_pob_choice: company
  chosen_spanish: una compañía
  alternatives_spanish:
  - una asamblea
  - un grupo
  - una congregación
  lexicon: LSJ
  rationale: ‘Compañía’ evita asociaciones eclesiales posteriores que ‘congregación’ podría sugerir y mantiene el sentido de un cuerpo reunido de personas. También conserva el tono narrativo del texto.
- source_word: Ἀσιδαίων
  english_pob_choice: Hasideans
  chosen_spanish: asideos
  alternatives_spanish:
  - hasidim
  - asideos
  lexicon: LSJ
  rationale: Se translitera como nombre de grupo histórico. ‘Asideos’ sigue de cerca la forma griega y mantiene la designación étnico-religiosa sin convertirla en un adjetivo como ‘los piadosos’.
- source_word: ἰσχυρὰ δυνάμει
  english_pob_choice: mighty in strength
  chosen_spanish: poderosa en fuerza
  alternatives_spanish:
  - fuerte en poder
  - muy fuerte
  - poderosa en poder
  lexicon: LSJ
  rationale: La frase griega es enfática y algo redundante. ‘Poderosa en fuerza’ preserva esa intensidad en español, aunque suene reforzada, sin suavizarla demasiado.
- source_word: ἀπὸ Ἰσραήλ
  english_pob_choice: from Israel
  chosen_spanish: procedente de Israel
  alternatives_spanish:
  - de Israel
  - desde Israel
  - salida de Israel
  lexicon: LSJ
  rationale: ‘Procedente de’ expresa bien el origen y la procedencia del grupo, sin sobreinterpretar si el matiz es geográfico, étnico o nacional. Mantiene la claridad del español formal.
- source_word: πᾶς ὁ ἑκουσιαζόμενος
  english_pob_choice: everyone who willingly devoted himself
  chosen_spanish: todos los que voluntariamente se entregaban
  alternatives_spanish:
  - todos los que se ofrecían voluntariamente
  - todos los que libremente se consagraban
  - todos los que voluntariamente se dedicaban
  lexicon: LSJ
  rationale: El participio señala disposición voluntaria y entrega activa. ‘Se entregaban’ conserva el acto personal de dedicación y, al mismo tiempo, deja abierta la intensidad de compromiso que el contexto requiere.
- source_word: τῷ νόμῳ
  english_pob_choice: to the law
  chosen_spanish: a la ley
  alternatives_spanish:
  - para la ley
  - a la Ley
  - por la ley
  lexicon: LSJ
  rationale: El dativo apunta al objeto de la entrega. ‘La ley’ en español mantiene la referencia a la Torá o ley mosaica sin necesidad de mayúscula obligatoria; el contexto histórico ya delimita el referente.
theological_decisions:
- issue: Nombre histórico Ἀσιδαίων como designación de grupo
  english_pob_reading: Hasideans; transliterated Jewish group associated with zeal for the law
  chosen_spanish_reading: asideos; grupo histórico judío asociado con celo por la ley
  alternative_spanish_readings:
  - hasidim
  - los piadosos
  - asideos
  rationale: Se preserva el nombre propio del grupo para no diluir una identidad histórica concreta en una descripción general. En español, ‘asideos’ comunica el carácter de designación tradicional y deja intacta la asociación con el celo por la ley.
  doctrine_reference: Translate names as names; preserve historical distinctions.
- issue: ἑκουσιαζόμενος τῷ νόμῳ como entrega voluntaria
  english_pob_reading: everyone who willingly devoted himself to the law
  chosen_spanish_reading: todos los que voluntariamente se entregaban a la ley
  alternative_spanish_readings:
  - todos los que se ofrecían voluntariamente a la ley
  - todos los que libremente se consagraban a la ley
  - todos los que voluntariamente se dedicaban a la ley
  rationale: La frase no describe solo observancia externa, sino adhesión voluntaria. ‘Se entregaban’ conserva la tensión entre libertad personal y compromiso real, sin convertir el texto en una formulación doctrinal posterior.
  doctrine_reference: Preserve theological tension rather than resolve it.
translation_notes:
  revision_awareness: El texto griego y el audit trail inglés muestran alta concordancia y no requieren cambios sustanciales. La versión española sigue de cerca las decisiones léxicas del POB inglés, pero ajusta la sintaxis para un español natural y conserva la tensión histórica del nombre de grupo y de la entrega voluntaria a la ley.
  spanish_consistency_notes:
  - Se usa ‘ley’ sin mayúscula en el cuerpo para reflejar el griego y evitar una convención no exigida por el texto.
  - Se conserva la transliteración del grupo como nombre propio, con nota de alternativa histórica.
  - ‘Procedente de’ traduce el origen expresado por ἀπὸ sin forzar una lectura territorial exclusiva.
  - La construcción ‘se entregaban a la ley’ mantiene el matiz voluntario y no lo reduce a obediencia genérica.
