translation:
  language: es
  text: Los hijos de Israel acamparán[a], cada uno en su campamento y cada uno junto a su bandera, según sus divisiones.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Los israelitas acamparán, cada uno en su campamento y cada uno junto a su estandarte, según sus compañías»'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְחָנוּ
  english_pob_choice: shall camp
  chosen_spanish: acamparán
  alternatives_spanish:
  - acamparán
  - deberán acampar
  - se acamparán
  lexicon: HALOT
  rationale: El hebreo en contexto instruccional tiene valor prescriptivo/futuro. «Acamparán» mantiene la fuerza normativa con español natural y digno, sin añadir obligación explícita que el texto no expresa.
- source_word: בְּנֵי יִשְׂרָאֵל
  english_pob_choice: The sons of Israel
  chosen_spanish: Los hijos de Israel
  alternatives_spanish:
  - Los hijos de Israel
  - Los israelitas
  - Los hijos de Jacob
  lexicon: HALOT
  rationale: Se conserva la expresión fuente de manera transparente. «Hijos» es el equivalente natural de בְּנֵי y mantiene la forma relacional del hebreo mejor que «israelitas», que sería más interpretativo.
- source_word: אִישׁ ... וְאִישׁ
  english_pob_choice: each man ... and each man
  chosen_spanish: cada uno ... y cada uno
  alternatives_spanish:
  - cada uno ... y cada uno
  - cada hombre ... y cada hombre
  - cada persona ... y cada persona
  lexicon: HALOT
  rationale: Aunque אִישׁ es masculino singular, en español «cada uno» comunica bien la distribución individual sin sonar forzado. Se evita «cada hombre» por posible dureza innecesaria y para no absolutizar género en una fórmula distributiva.
- source_word: עַל מַחֲנֵהוּ
  english_pob_choice: by his camp
  chosen_spanish: junto a su campamento
  alternatives_spanish:
  - junto a su campamento
  - al lado de su campamento
  - en su campamento
  lexicon: HALOT
  rationale: עַל aquí señala ubicación/asignación respecto al campamento. «Junto a» expresa la relación espacial y organizativa sin sugerir interioridad («en») ni exactitud topográfica excesiva.
- source_word: דִּגְלוֹ
  english_pob_choice: his banner
  chosen_spanish: su bandera
  alternatives_spanish:
  - su bandera
  - su estandarte
  - su enseña
  lexicon: HALOT
  rationale: דֶּגֶל refiere a un estandarte tribal o militar. «Bandera» es clara y contemporánea en español, y conserva la función identificadora; «estandarte» sería más técnico o solemne.
- source_word: לְצִבְאֹתָם
  english_pob_choice: according to their divisions
  chosen_spanish: según sus divisiones
  alternatives_spanish:
  - según sus divisiones
  - por sus compañías
  - de acuerdo con sus cuerpos
  lexicon: HALOT
  rationale: En este contexto de organización campamental, צָבָא apunta a unidades ordenadas o agrupaciones. «Divisiones» transmite la disposición estructurada sin sobrecargar con lenguaje bélico de «ejércitos».
translation_notes:
  revision_awareness: Se revisó el pasaje contra el hebreo masorético (WLC) y el auditable inglés POB; no hubo cambios de sentido sustantivos respecto del estado más reciente del proyecto, y se preservó la lectura organizativa/campamental del versículo.
  spanish_consistency_notes:
  - Se usó «campamento» para מַחֲנֶה y «bandera» para דֶּגֶל, manteniendo consistencia con la terminología militar/tribal del pasaje.
  - «Divisiones» se prefirió a opciones más arcaicas como «compañías» para un registro moderno y claro.
  - La nota al pie preserva la alternativa tradicional «estandarte» y «compañías» porque el español crea una ambigüedad léxica legítima sin alterar el sentido.
