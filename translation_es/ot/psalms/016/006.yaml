revisions:
- from: Las cuerdas[a] me han caído en lugares agradables; sí[b], mi herencia es hermosa para mí.
  to: Los linderos[a] me han caído en lugares agradables; ciertamente, mi herencia[b] es hermosa para mí.
  rationale: Se ajusta חֲבָלִים a 'linderos' para reflejar mejor el sentido principal documentado de líneas divisorias de una heredad, manteniendo la alternativa de 'líneas de medición' en nota. También se repone la nota alternativa sobre la segunda cláusula, conforme al audit trail inglés. 'Ciertamente' da al אַף un énfasis más digno y natural en español eclesial general.
