id: ISA.54.16
reference: Isaiah 54:16
source:
  edition: WLC
  text: הן אָֽנֹכִי֙ בָּרָ֣אתִי חָרָ֔שׁ נֹפֵ֨חַ֙ בְּ/אֵ֣שׁ פֶּחָ֔ם וּ/מוֹצִ֥יא כְלִ֖י לְ/מַעֲשֵׂ֑/הוּ וְ/אָנֹכִ֛י בָּרָ֥אתִי מַשְׁחִ֖ית לְ/חַבֵּֽל׃
translation:
  text: Look[a], I myself have created the craftsman who blows on the fire of coals and brings out a weapon for his work[c][b]; and I myself have created the destroyer to destroy.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'smith' for 'craftsman'; the Hebrew term can be broader, but the context of coals and weapon-making points to a metalworker.
    reason: lexical_alternative
  - marker: b
    text: Or 'implement' or 'article' for 'weapon'; the Hebrew word is broad, but here likely refers to an instrument of war.
    reason: lexical_alternative
  - marker: c
    text: Or 'for his work.' The Hebrew suffix in 'for its/his work' may refer either to the produced object or to the craftsman.
    reason: alternative_reading
lexical_decisions:
- source_word: הן
  chosen: Look
  alternatives:
  - Behold
  - See
  lexicon: HALOT
  rationale: An attention-getting particle introducing emphatic divine speech. 'Look' is natural modern English while preserving the deictic force better than the more archaic 'Behold.'
- source_word: אָנֹכִי
  chosen: I myself
  alternatives:
  - I
  lexicon: HALOT
  rationale: The independent pronoun is emphatic. Rendering as 'I myself' preserves the stress on the LORD as the direct creator of both figures named in the verse.
- source_word: בָּרָאתִי
  chosen: have created
  alternatives:
  - created
  lexicon: HALOT
  rationale: Qal perfect 1cs of ברא, here expressing completed divine action with present relevance in context. English present perfect reads naturally and retains the force of God's sovereign authorship.
- source_word: חָרָשׁ
  chosen: the craftsman
  alternatives:
  - smith
  - artisan
  lexicon: HALOT
  rationale: The noun can denote a craftsman generally, but the immediate context of blowing coals and producing a weapon points specifically to a metalworker. 'Craftsman' keeps the lexical breadth while fitting the context.
- source_word: נֹפֵחַ בְּאֵשׁ פֶּחָם
  chosen: who blows on the fire of coals
  alternatives:
  - who fans the coals into flame
  - who blows the charcoal fire
  lexicon: HALOT
  rationale: The participle נֹפֵחַ describes the smith's action of blowing/fanning; בְּאֵשׁ פֶּחָם is literally 'in/with a fire of coal.' 'Blows on the fire of coals' is close to the Hebrew imagery and readable English.
- source_word: וּמוֹצִיא כְלִי
  chosen: and brings out a weapon
  alternatives:
  - and produces an כלי
  - and brings forth an implement
  - and produces a weapon
  lexicon: HALOT
  rationale: כְלִי is broad ('vessel, implement, article, weapon'). In this context of a smith and the following mention of a destroyer, 'weapon' best captures the likely sense without over-paraphrasing.
- source_word: לְמַעֲשֵׂהוּ
  chosen: for its work
  alternatives:
  - for his work
  - for the work assigned to it
  - for its purpose
  lexicon: HALOT
  rationale: The suffix may be taken with the produced object or with the craftsman. 'For its work' naturally links to the weapon/implement being made for use. This avoids unnecessary specification while preserving the Hebrew's compactness.
- source_word: וְאָנֹכִי
  chosen: and I myself
  alternatives:
  - and I
  lexicon: HALOT
  rationale: Repeated emphatic pronoun mirrors the first clause and underscores divine sovereignty over both maker and destroyer.
- source_word: מַשְׁחִית
  chosen: the destroyer
  alternatives:
  - the ravager
  - the one who destroys
  lexicon: HALOT
  rationale: Hiphil participial form used substantivally. 'Destroyer' is the most direct and idiomatic English equivalent.
- source_word: לְחַבֵּל
  chosen: to ruin
  alternatives:
  - to destroy
  - to devastate
  - to wreck
  lexicon: HALOT
  rationale: The infinitive expresses purpose/result. 'To ruin' gives a natural English complement after 'destroyer' while avoiding an awkward repetition ('destroyer to destroy'); the semantic field remains intact.
