  text: And if the skin disease breaks out all over the skin[a], and the skin disease covers all the skin of the affected person from his head to his feet, as far as the priest can see[b],
  footnotes:
  - marker: a
    text: Hebrew צָרַעַת (tzaraath) refers to a range of ritual skin afflictions in Leviticus and should not be equated too narrowly with modern leprosy (Hansen's disease).
    reason: cultural_note
  - marker: b
    text: Or, more literally, 'all the skin of the lesion.' The Hebrew expression refers to the person's skin as affected by the outbreak.
    reason: lexical_alternative
