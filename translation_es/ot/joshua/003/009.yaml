translation:
  language: es
  text: 'Josué dijo a los hijos de Israel[a]: «Vengan aquí y escuchen las palabras de Yahvé, su Dios».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «los israelitas». El hebreo dice literalmente «los hijos de Israel».
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהוֹשֻׁעַ
  english_pob_choice: Joshua
  chosen_spanish: Josué
  alternatives_spanish:
  - Josué
  lexicon: N/A
  rationale: Nombre propio bíblico estándar en español; conserva la identidad del personaje sin añadir interpretación.
- source_word: בְּנֵי יִשְׂרָאֵל
  english_pob_choice: the sons of Israel
  chosen_spanish: los hijos de Israel
  alternatives_spanish:
  - los hijos de Israel
  - los israelitas
  - los hijos de Jacob
  lexicon: HALOT
  rationale: La expresión hebrea es literalmente masculina plural. En español, «hijos de Israel» preserva la forma y el paralelismo bíblico mejor que una colectivización neutralizada. «Israelitas» es idiomático, pero menos transparente respecto de la expresión del original.
- source_word: גֹּשׁוּ הֵנָּה
  english_pob_choice: Come here
  chosen_spanish: Acérquense
  alternatives_spanish:
  - Vengan aquí
  - Acérquense aquí
  - Arrímense
  lexicon: HALOT
  rationale: El imperativo plural de נגשׁ pide acercamiento físico. «Acérquense» expresa bien el movimiento hacia el hablante; el matiz direccional de הֵנָּה queda implícito por el contexto y por la forma exhortativa.
- source_word: וְשִׁמְעוּ
  english_pob_choice: hear
  chosen_spanish: escuchen
  alternatives_spanish:
  - oigan
  - atiendan
  - escuchen atentamente
  lexicon: HALOT
  rationale: En español, «escuchen» comunica mejor el sentido de oír con atención y obediencia implícita que «oigan», que suena más pasivo. Mantiene la fuerza imperativa del hebreo.
- source_word: דִּבְרֵי
  english_pob_choice: the words of
  chosen_spanish: las palabras de
  alternatives_spanish:
  - las palabras de
  - el mensaje de
  - las declaraciones de
  lexicon: HALOT
  rationale: «Palabras de» reproduce directamente la construcción en cadena sin interpretar el contenido como «mensaje». Es natural y fiel al hebreo.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahvé
  - Yahveh
  lexicon: HALOT
  rationale: Se mantiene el nombre divino en la forma española auditable «Yahvé», conforme al estándar del proyecto, en lugar de sustituirlo por un título como «Señor».
- source_word: אֱלֹהֵיכֶם
  english_pob_choice: your God
  chosen_spanish: su Dios
  alternatives_spanish:
  - su Dios
  - vuestro Dios
  lexicon: HALOT
  rationale: El poseedor plural hebreo se expresa con pronombre de tercera persona en español por concordancia con el sujeto formal «los hijos de Israel», evitando un tuteo o voseo no presente en el texto.
theological_decisions:
- issue: Tratamiento del nombre divino YHWH
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahvé
  - Yahveh
  - Señor
  rationale: El hebreo usa el Tetragrama directamente; el proyecto español conserva el nombre propio divino en vez de ocultarlo con una sustitución litúrgica. «Yahvé» mantiene la decisión teológica y la transparencia del original.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Forma de dirigirse a Israel
  english_pob_reading: the sons of Israel
  chosen_spanish_reading: los hijos de Israel
  alternative_spanish_readings:
  - los hijos de Israel
  - los israelitas
  rationale: Se conserva la forma masculina plural del original, que es una designación étnica convencional. No se neutraliza a un colectivo genérico sin necesidad textual.
  doctrine_reference: 'DOCTRINE.md Translation philosophy §4: Gender-accurate over gender-neutral'
translation_notes:
  revision_awareness: El texto sigue de cerca el paquete fuente hebreo y el criterio inglés auditado. No hay revisiones aplicadas en el registro base; la única decisión relevante para el español fue mantener la transparencia del nombre divino como «Yahvé» y conservar la expresión masculina plural «los hijos de Israel» con una alternativa idiomática anotada.
  spanish_consistency_notes:
  - Se mantiene el registro bíblico sobrio y moderno, evitando arcaísmos innecesarios.
  - «Yahvé» se usa de manera consistente como representación del Tetragrama.
  - «los hijos de Israel» preserva la forma hebrea y queda explicado en nota.
  - El imperativo plural se expresa con tratamiento de ustedes, coherente con el español neutro latinoamericano.
