translation:
  language: es
  text: Y edificó Belén, Etam y Tecoa[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «Tekoah».
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּבֶן
  english_pob_choice: built
  chosen_spanish: edificó
  alternatives_spanish:
  - construyó
  - edificó/fortificó
  lexicon: HALOT
  rationale: El qal wayyiqtol de בנה denota acción de edificar o construir. En español, «edificó» conserva el sentido básico y suena natural en un registro bíblico digno. «Fortificó» sería posible por el contexto inmediato, pero no está explícito en este verso; por eso no se introduce como traducción principal.
- source_word: אֶת
  english_pob_choice: '[not translated]'
  chosen_spanish: '[no se traduce]'
  alternatives_spanish:
  - —
  lexicon: gramática hebrea
  rationale: Es el marcador de objeto directo sin equivalente independiente en español; se omite por razones de naturalidad.
- source_word: בֵּית לֶחֶם
  english_pob_choice: Bethlehem
  chosen_spanish: Belén
  alternatives_spanish:
  - Bethlehem
  lexicon: HALOT
  rationale: Como topónimo bíblico, en español la forma establecida y más reconocible es «Belén». Mantiene la identidad del lugar con una convención ya asentada en la tradición bíblica española.
- source_word: עֵיטָם
  english_pob_choice: Etam
  chosen_spanish: Etam
  alternatives_spanish:
  - Eitam
  lexicon: HALOT
  rationale: Nombre propio transliterado de forma estándar al español. «Etam» conserva la forma breve y reconocible del topónimo.
- source_word: תְּקוֹעַ
  english_pob_choice: Tekoa
  chosen_spanish: Tecoa
  alternatives_spanish:
  - Tekoa
  - Tecoa
  lexicon: HALOT
  rationale: El topónimo se adapta a la ortografía española con «c» ante «o» para reflejar la pronunciación /k/ en español. «Tecoa» es claro y natural sin alterar la identidad del lugar.
theological_decisions:
- issue: Si el verbo implica simplemente construir o también reforzar defensas
  english_pob_reading: built; the context may imply strengthening, but the verse itself does not explicitly say fortified.
  chosen_spanish_reading: edificó
  alternative_spanish_readings:
  - fortificó
  - construyó
  rationale: 'Se preserva la misma cautela del texto base: el verso afirma que edificó estas ciudades, sin añadir una afirmación explícita de fortificación. Así se evita sobreinterpretar el verbo hebreo.'
  doctrine_reference: Exégesis contextual del verbo בנה en narrativa histórica
translation_notes:
  revision_awareness: El inglés POB mantiene una traducción sencilla («built») y una nota léxica para la variante de transliteración de Tekoa; no se observan revisiones sustantivas en el pasaje. El español sigue esa misma línea, conservando la simplicidad verbal y trasladando la variante a una nota de nombre propio.
  spanish_consistency_notes:
  - Se usa «Belén» como topónimo bíblico español estándar, no la transliteración inglesa.
  - Se conserva la lista coordinada con una sola «y» final, natural en español.
  - Se evita añadir «fortificó» en el texto principal para no introducir un matiz no explícito en el verso.
