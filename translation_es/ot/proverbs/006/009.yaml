review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador capta bien la estructura bipartita y el tono de reprensión del hebreo: עַד מָתַי / מָתַי se refleja correctamente con «¿Hasta cuándo?» / «¿Cuándo?», עָצֵל con «perezoso», y תָּקוּם מִשְּׁנָתֶךָ con «te levantarás de tu sueño». Sin embargo, תִּשְׁכָּב aquí no se entiende mejor como futuro de movimiento «vas a acostarte», sino como estado continuo: «seguirás acostado» o equivalente. El hebreo y el inglés auditado apuntan a permanecer echado/en cama, no a iniciar la acción de acostarse.'
  spanish_quality_summary: El español es claro y legible, pero «vas a acostarte» suena semánticamente desviado en contexto, porque el reproche no pregunta cuándo se irá a la cama sino cuánto tiempo seguirá allí acostado. «Seguirás acostado» mejora precisión y naturalidad proverbial. El resto del verso suena bien en español neutral y digno.
  glossary_alignment: No hay términos teológicos de glosario mayor en este verso. La elección «perezoso» para עָצֵל es aceptable y bien justificada para español general, preservando la nota alternativa del inglés POB. La nota al pie puede simplificarse para centrarse en alternativas españolas pertinentes sin depender del inglés como metalenguaje principal.
