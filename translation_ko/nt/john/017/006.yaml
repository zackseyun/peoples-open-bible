id: JHN.17.6
reference: 'John 17:6'
language:
  code: ko
  name: Korean
  variant: '표준어 / modern formal-polite (합쇼체)'
source:
  edition: SBLGNT
  text: Ἐφανέρωσά σου τὸ ὄνομα τοῖς ἀνθρώποις οὓς ⸀ἔδωκάς μοι ἐκ τοῦ κόσμου. σοὶ ἦσαν κἀμοὶ αὐτοὺς ⸁ἔδωκας, καὶ τὸν λόγον σου τετήρηκαν.
base_translation:
  language: en
  yaml_path: translation/nt/john/017/006.yaml
  text: I have made your name known to the men whom you gave me out of the world. They were yours, and you gave them to me, and they have kept your word.
  footnotes:
  - marker: a
    text: Or 'I revealed your name.'
    reason: lexical_alternative
  - marker: b
    text: '''Your name'' refers to God''s revealed identity and character, not merely a spoken designation.'
    reason: cultural_note
  - marker: c
    text: Or 'to the people,' if taken generically; here the immediate referent is Jesus' male disciples.
    reason: lexical_alternative
  - marker: d
    text: Or 'from the world.'
    reason: lexical_alternative
  - marker: e
    text: Or 'they have obeyed your word'; the Greek more literally says 'they have kept your word.'
    reason: lexical_alternative
translation:
  language: ko
  text: 나는 아버지께서 세상에서 내게 주신 사람들에게 아버지의 이름을 나타내었습니다. 그들은 아버지의 것이었으며, 아버지께서 그들을 내게 주셨고, 그들은 아버지의 말씀을 지켰습니다.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 또는 「아버지의 이름을 드러내었다」.
    reason: lexical_alternative
  - marker: b
    text: 「아버지의 이름」은 단순한 호칭이 아니라, 하나님의 계시된 정체성과 성품을 가리킨다.
    reason: theological_clarification
  - marker: c
    text: 본 「사람들」은 일반적으로 사람을 가리킬 수도 있으나, 직접적 지시는 예수의 (남성) 제자들이다.
    reason: lexical_alternative
  - marker: d
    text: 또는 「세상에서 (분리하여)」.
    reason: lexical_alternative
  - marker: e
    text: 또는 「그들은 아버지의 말씀에 순종하였다」. 헬라어는 문자적으로 「그들은 아버지의 말씀을 지켰다」.
    reason: lexical_alternative
lexical_decisions:
- source_word: Ἐφανέρωσά
  english_pob_choice: made known
  chosen_korean: 나타내다
  alternatives_korean:
