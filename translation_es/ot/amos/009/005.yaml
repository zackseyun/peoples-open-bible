  language: en
  yaml_path: translation/ot/amos/009/005.yaml
  text: And the Lord GOD of hosts is the one who touches the earth[a], and it melts, and all who dwell in it mourn; and all of it rises like the Nile and sinks like the Nile of Egypt.
  footnotes:
