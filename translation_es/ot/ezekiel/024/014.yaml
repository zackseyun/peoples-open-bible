review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura y el sentido general del hebreo: afirmación solemne de Yahvé, inminencia del juicio, determinación de ejecutarlo, triple negación de retraerse/compadecerse/ceder, y cierre judicial según caminos y hechos. Sin embargo, dos decisiones no siguen bien el rastro auditado ni el mejor sentido contextual: la nota [a] está anclada en «viene» pero explica una alternativa de אֶפְרַע («no me detendré»), y «me arrepentiré» para אֶנָּחֵם introduce en español una implicación demasiado fuerte de arrepentimiento moral que el English POB evitó con “relent”.'
  spanish_quality_summary: El español es generalmente claro y digno, pero conviene ajustar dos puntos para mayor naturalidad y precisión teológica. «No tendré compasión» puede pasar, aunque «no perdonaré» o «no tendré piedad» sería más judicial; no es imprescindible cambiarlo. Sí es importante corregir la nota mal colocada y preferir «no cederé» o «no cambiaré de parecer» sobre «no me arrepentiré». También mejora la puntuación final sin guion largo innecesario antes de «declara».
  glossary_alignment: '«Yahvé» concuerda con la política del proyecto para יהוה. «el Señor Yahvé» es una buena solución para אֲדֹנָי יְהוִה en español. «te juzgarán» preserva correctamente el plural no especificado. La principal desalineación terminológica/doctrinal está en נָחַם: el proyecto documenta evitar una formulación que sugiera arrepentimiento moral divino; en español «no me arrepentiré» lo sugiere más que el inglés.'
  issues:
  - severity: high
    issue: La nota [a] está anclada en «viene[a]» pero su contenido corresponde a אֶפְרַע («no me detendré»).
    rationale: Esto desordena el aparato crítico y atribuye una alternativa léxica al término equivocado. Debe moverse al lugar correspondiente o eliminarse.
  - severity: high
    issue: «ni me arrepentiré» para אֶנָּחֵם es teológicamente y léxicamente menos fiel al criterio auditado.
    rationale: El English POB eligió “relent” precisamente para evitar implicar pecado o error moral en Dios. En español, «arrepentirse» suena más fuertemente moral que en inglés y puede inducir una lectura impropia.
  - severity: medium
    issue: La puntuación con raya en «—declara el Señor Yahvé—» es poco natural aquí.
    rationale: En español bíblico corriente basta una coma antes de «declara el Señor Yahvé» o una raya de apertura sin cierre si se tratara de inciso; la forma actual es torpe.
  revised_spanish_text: Yo, Yahvé, he hablado; viene, y yo lo haré. No me detendré[a], ni tendré compasión, ni cederé[b]. Conforme a tus caminos y conforme a tus hechos te juzgarán[c], declara el Señor Yahvé.
  revised_footnotes:
