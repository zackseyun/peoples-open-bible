translation:
  language: es
  text: Porque jamás[a] será conmovido; el justo[b] será recordado para siempre.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «para siempre» intensifica la negación, de modo que la idea es permanencia absoluta: «jamás».'
    reason: lexical_alternative
  - marker: b
    text: 'El singular masculino hebreo es representativo: se refiere al justo como categoría general, no necesariamente a un varón específico.'
    reason: theological_note
lexical_decisions:
- source_word: כִּי
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Ya que
  - Porque
  lexicon: HALOT
  rationale: La partícula introduce la razón o explicación del enunciado anterior. «Porque» conserva bien esa relación causal/explanatoria en un español natural y solemne.
- source_word: לְעוֹלָם לֹא יִמּוֹט
  english_pob_choice: will never be shaken
  chosen_spanish: jamás será conmovido
  alternatives_spanish:
  - nunca será sacudido
  - no será movido jamás
  - no vacilará nunca
  lexicon: HALOT
  rationale: El hebreo expresa permanencia enfática mediante la negación con לְעוֹלָם. «Jamás» comunica esa fuerza intensiva; «será conmovido» conserva la imagen de inestabilidad/firmeza de יִמּוֹט sin volverla demasiado literal o extraña.
- source_word: לְזֵכֶר עוֹלָם
  english_pob_choice: will be remembered forever
  chosen_spanish: será recordado para siempre
  alternatives_spanish:
  - quedará en memoria eterna
  - será para recuerdo eterno
  - permanecerá en recuerdo perpetuo
  lexicon: HALOT
  rationale: La expresión denota memoria duradera. «Será recordado para siempre» comunica directamente el sentido memorial en español y mantiene el alcance permanente de עוֹלָם.
- source_word: צַדִּיק
  english_pob_choice: the righteous
  chosen_spanish: el justo
  alternatives_spanish:
  - el recto
  - el justo hombre
  - los justos
  lexicon: HALOT
  rationale: El adjetivo funciona sustantivamente y en singular masculino, pero con valor representativo. «El justo» es la forma más natural y fiel en español para ese uso genérico, sin añadir «hombre» que el texto hebreo no exige.
- source_word: יִהְיֶה
  english_pob_choice: will be
  chosen_spanish: será
  alternatives_spanish:
  - estará
  - quedará
  lexicon: HALOT
  rationale: Copulativo futuro simple. «Será» es la opción más directa y adecuada en español.
theological_decisions:
- issue: Singular masculino representativo en צַדִּיק
  english_pob_reading: the righteous
  chosen_spanish_reading: el justo
  alternative_spanish_readings:
  - el justo hombre
  - la persona justa
  - los justos
  rationale: El hebreo usa una forma masculina singular que funciona de modo proverbial o representativo. En español, «el justo» preserva ese valor general sin forzar una explicitación de género ni pluralizar indebidamente.
  doctrine_reference: DOCTRINE.md Translation philosophy §4
translation_notes:
  revision_awareness: El inglés POB pasó de «the righteous man» a «the righteous» para respetar el singular genérico del hebreo y evitar añadir «man». La versión española sigue esa revisión al usar «el justo», que conserva la singularidad representativa sin sobreespecificar el género.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» como norma del proyecto cuando aparezca el Nombre Divino; en este versículo no aparece.
  - «Jamás» se usa para reflejar el alcance enfático de לְעוֹלָם junto con la negación.
  - «El justo» es consistente con el tratamiento POB de singular representativo en proverbios y salmos de sabiduría.
