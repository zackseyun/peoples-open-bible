revisions:
- from: 'Sirvieron a los ídolos[a], respecto de los cuales Yahvé había dicho a ellos: «No hagan esta cosa».'
  to: 'Sirvieron a los ídolos[a], acerca de los cuales Yahvé les había dicho: «No hagan esto».'
  rationale: Se ajusta la sintaxis a un español más natural («les había dicho»), se reemplaza la expresión calcada «esta cosa» por «esto», que comunica fielmente el referente prohibido, y se suaviza la relativa a «acerca de los cuales» para mejor fluidez manteniendo el registro formal. Se conserva «sirvieron», «ídolos» con nota, y «Yahvé» conforme al proyecto.
