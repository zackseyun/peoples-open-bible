  text: But when Peter saw it[a], he answered the people, “Men of Israel, why do you marvel at this[b], or why do you stare at us as though by our own power or godliness we had made him walk?”
  footnotes:
  - marker: a
    text: Or “why are you looking intently at us?” The verb implies a fixed or sustained gaze.
    reason: lexical_alternative
  - marker: b
    text: Or “piety” for “godliness.” Peter denies that the man's healing came from the apostles' own religious devotion or spiritual quality.
    reason: lexical_alternative
