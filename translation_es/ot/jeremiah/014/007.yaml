translation:
  language: es
  text: Aunque nuestras iniquidades testifican contra nosotros[a], Yahvé, actúa por amor de tu nombre; porque nuestras apostasías[b] son muchas; contra ti hemos pecado.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «Si nuestras iniquidades testifican contra nosotros». El hebreo אִם puede leerse de manera condicional («si») o concesiva («aunque»); el contexto de esta oración favorece el sentido concesivo.
    reason: lexical_alternative
  - marker: b
    text: O «nuestros extravíos». El término hebreo se refiere a actos de apartarse o volverse atrás en infidelidad hacia Yahvé.
    reason: lexical_alternative
lexical_decisions:
- source_word: אִם
  english_pob_choice: Though
  chosen_spanish: Aunque
  alternatives_spanish:
  - Si
  lexicon: HALOT
  rationale: El hebreo puede leerse condicionalmente o con valor concesivo. En este contexto de oración confesional, el matiz concesivo es el más natural y fiel; en español, «Aunque» transmite mejor esa concesión que un simple «Si».
- source_word: עֲוֺנֵינוּ
  english_pob_choice: our iniquities
  chosen_spanish: nuestras iniquidades
  alternatives_spanish:
  - nuestra culpa
  - nuestros pecados
  lexicon: HALOT
  rationale: עָוֹן incluye culpa e iniquidad, no solo actos aislados de pecado. «Iniquidades» conserva mejor ese peso moral y judicial, en línea con la decisión inglesa.
- source_word: עָנוּ בָנוּ
  english_pob_choice: testify against us
  chosen_spanish: testifican contra nosotros
  alternatives_spanish:
  - responden contra nosotros
  - dan testimonio contra nosotros
  lexicon: HALOT
  rationale: 'El verbo con ב aquí tiene un matiz forense: hablar/testificar en contra. «Testifican contra nosotros» mantiene esa fuerza jurídica de forma natural en español.'
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - SEÑOR
  - Yahweh
  lexicon: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
  rationale: La consigna del proyecto pide renderizar el Tetragrámaton como «Yahvé» en el texto principal, preservando el nombre propio del pacto en vez de sustituirlo por un título.
- source_word: עֲשֵׂה
  english_pob_choice: act
  chosen_spanish: actúa
  alternatives_spanish:
  - haz
  - intervén
  lexicon: HALOT
  rationale: El imperativo es amplio («hacer»), pero en esta súplica pide acción salvadora de Yahvé. «Actúa» es idiomático y no restringe indebidamente la acción.
- source_word: לְמַעַן שְׁמֶךָ
  english_pob_choice: for your name’s sake
  chosen_spanish: por amor de tu nombre
  alternatives_spanish:
  - por causa de tu nombre
  - por el bien de tu nombre
  lexicon: HALOT
  rationale: La expresión es un modismo hebreo que apela a la reputación y al carácter de Dios. «Por amor de tu nombre» es una formulación reverente, clara y ampliamente inteligible en español.
- source_word: כִּי
  english_pob_choice: for
  chosen_spanish: porque
  alternatives_spanish:
  - pues
  lexicon: HALOT
  rationale: Aquí introduce la razón de la petición y la confesión subsiguiente. «Porque» expresa con claridad esa relación causal en español moderno.
- source_word: רַבּוּ
  english_pob_choice: are many
  chosen_spanish: son muchas
  alternatives_spanish:
  - se han multiplicado
  - son numerosas
  lexicon: HALOT
  rationale: El perfecto describe el estado actual de abundancia de las apostasías. «Son muchas» conserva esa lectura resultativa y suena natural en español.
- source_word: מְשׁוּבֹתֵינוּ
  english_pob_choice: our apostasies
  chosen_spanish: nuestras apostasías
  alternatives_spanish:
  - nuestros extravíos
  - nuestros alejamientos
  - nuestras rebeliones
  lexicon: HALOT
  rationale: El término designa apartarse de la fidelidad al pacto. «Apostasías» preserva esa gravedad teológica mejor que opciones más suaves como «extravíos» o «alejamientos».
- source_word: לְךָ
  english_pob_choice: against you
  chosen_spanish: contra ti
  alternatives_spanish:
  - a ti
  lexicon: HALOT
  rationale: Con חטא, la preposición marca a la persona ofendida. En español, la construcción natural y fiel es «pecar contra ti».
- source_word: חָטָאנוּ
  english_pob_choice: we have sinned
  chosen_spanish: hemos pecado
  alternatives_spanish:
  - pecamos
  lexicon: HALOT
  rationale: El perfecto presenta una confesión con vigencia presente. «Hemos pecado» es la forma confesional más clara y fiel en español.
theological_decisions:
- issue: Valor concesivo de אִם en una confesión penitencial
  english_pob_reading: Though our iniquities testify against us
  chosen_spanish_reading: Aunque nuestras iniquidades testifican contra nosotros
  alternative_spanish_readings:
  - Si nuestras iniquidades testifican contra nosotros
  rationale: La oración admite culpa real y, a la vez, pide intervención divina. «Aunque» refleja mejor ese giro concesivo que una condición simple, sin borrar la ambigüedad documentada.
  doctrine_reference: DOCTRINE.md §Translation philosophy 1, 5
- issue: Naturaleza de מְשׁוּבֹתֵינוּ
  english_pob_reading: our apostasies
  chosen_spanish_reading: nuestras apostasías
  alternative_spanish_readings:
  - nuestros extravíos
  - nuestros retrocesos
  rationale: El contexto es una confesión de ruptura del pacto. «Apostasías» conserva la gravedad de apartarse de Yahvé sin suavizar el término.
  doctrine_reference: DOCTRINE.md §Translation philosophy 1, 5
- issue: Renderización del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - Yahweh
  rationale: 'Se sigue el estándar del proyecto para el Tetragrámaton en español: mantener el nombre propio divino en lugar de una sustitución litúrgica.'
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
translation_notes:
  revision_awareness: El audit trail inglés no requiere cambios textuales; se mantiene la lectura concesiva de אִם y el sustantivo fuerte מְשׁוּבֹתֵינוּ. La única adaptación sistemática al español es el uso de «Yahvé» según la terminología del proyecto, con equivalente funcional a la decisión inglesa sobre el nombre divino.
  spanish_consistency_notes:
  - Se mantuvo el registro confesional y solemne del versículo sin arcaísmos innecesarios.
  - Se preservó la fuerza forense de «testifican contra nosotros» y la gravedad de «apostasías».
  - «Por amor de tu nombre» conserva el modismo hebreo de finalidad/reputación con español idiomático.
  - No se usó «SEÑOR» para יהוה, conforme a la norma terminológica del proyecto.
