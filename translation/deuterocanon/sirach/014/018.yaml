translation:
  text: 'Like the leaves budding on a luxuriant tree—one withers and another sprouts—so are the generations of flesh and blood: one dies and another is born[a].'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew 'another matures' or similar is possible from גּוֹמֵל, but the Greek witness reads 'another is born,' which fits the comparison of successive generations and is followed here.
    reason: alternative_reading
lexical_decisions:
- source_word: כְּפֶרַח עָלֶה
  chosen: Like the leaves budding
  alternatives:
  - Like a leaf-blossom
  - Like foliage in bloom
  lexicon: HALOT
  rationale: The Hebrew phrase is somewhat compressed. With the Greek parallel ὡς φύλλον θάλλον supporting a singular collective image of leafage budding/flourishing, English plural 'the leaves budding' best captures the sense naturally. This preserves the vegetal image without over-literal awkwardness.
- source_word: עֵץ רַעֲנָן
  chosen: a luxuriant tree
  alternatives:
  - a green tree
  - a flourishing tree
  - a leafy tree
  lexicon: HALOT
  rationale: רַעֲנָן denotes freshness/luxuriance/verdure. The Greek δασέος points toward a thick, leafy tree. 'Luxuriant tree' conveys vigorous, full growth better than the more ambiguous 'green tree.'
- source_word: שֶׁזֶּה נוֹבֵל וְאַחֵר צוֹמֵחַ
  chosen: one withers and another sprouts
  alternatives:
  - this one falls and another grows
  - one fades and another grows
  lexicon: HALOT
  rationale: נוֹבֵל is 'wither/fade,' and צוֹמֵחַ is 'sprout/grow.' The Greek τὰ μὲν καταβάλλει, ἄλλα δὲ φύει reflects loss and renewed growth. 'Withers ... sprouts' preserves the plant metaphor more clearly than 'dies ... is born' at this stage of the verse.
- source_word: כֵּן דּוֹרוֹת
  chosen: so are the generations
  alternatives:
  - so it is with generations
  - thus the generations
  lexicon: HALOT
  rationale: A straightforward comparative transition from the simile. 'Generations' matches דּוֹרוֹת and aligns with the Greek γενεά in collective succession sense.
- source_word: בָּשָׂר וָדָם
  chosen: of flesh and blood
  alternatives:
  - of humanity
  - of human beings
  - of man
  lexicon: HALOT
  rationale: The idiom literally means mortal human beings. 'Flesh and blood' preserves the Hebrew idiom and the Greek σαρκός καὶ αἵματος, while naturally signaling human mortality.
- source_word: אֶחַד גֹּוֵעַ
  chosen: one dies
  alternatives:
  - one expires
  - one perishes
  lexicon: HALOT
  rationale: גוע commonly denotes dying/breathing one's last. 'Dies' is clear, idiomatic, and fits the mortality theme without sounding archaic.
- source_word: וְאֶחַד גּוֹמֵל
  chosen: another is born
  alternatives:
  - another comes to maturity
  - another grows up
  lexicon: HALOT
  rationale: The Hebrew גּוֹמֵל can suggest maturing/weaning, but the Greek parallel ἑτέρα δὲ γεννᾶται strongly supports the sense of a new generation coming into being. Given the comparative structure and Greek witness, 'another is born' best represents the intended meaning in this verse.
