translation:
  language: es
  text: Le hablarás y pondrás las palabras en su boca, y yo estaré con tu boca y con su boca[a], y yo les instruiré lo que ustedes han de hacer[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo literalmente: «estaré con tu boca y con su boca».'
    reason: lexical_alternative
  - marker: b
    text: El «ustedes» final y el verbo hebreo están en plural y se refieren a Moisés y Aarón juntos.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְדִבַּרְתָּ אֵלָיו
  english_pob_choice: You shall speak to him
  chosen_spanish: Hablarás a él
  alternatives_spanish:
  - Debes hablarle
  - Le hablarás
  lexicon: HALOT
  rationale: El hebreo expresa una orden/instrucción con forma verbal perfecta prefijada; en español, el futuro simple funciona naturalmente como mandato. Mantengo el destinatario directo con a él para conservar la relación de habla sin sobrecargar el estilo.
- source_word: וְשַׂמְתָּ אֶת־הַדְּבָרִים בְּפִיו
  english_pob_choice: and put the words in his mouth
  chosen_spanish: y pondrás las palabras en su boca
  alternatives_spanish:
  - y colocarás las palabras en su boca
  - y pondrás estas palabras en su boca
  lexicon: HALOT
  rationale: שׂים conserva el sentido concreto de poner/colocar. Boca reproduce el hebreo idiomático sin parafrasear a una expresión más interpretativa como decirle qué decir.
- source_word: הַדְּבָרִים
  english_pob_choice: the words
  chosen_spanish: las palabras
  alternatives_spanish:
  - estas palabras
  - el mensaje
  lexicon: HALOT
  rationale: El plural definido se refleja de modo transparente con las palabras. Mensaje sería más dinámico, pero menos cercano a la forma hebrea.
- source_word: וְאָנֹכִי אֶהְיֶה עִם־פִּיךָ וְעִם־פִּיהוּ
  english_pob_choice: and I will be with your mouth and with his mouth
  chosen_spanish: y yo estaré con tu boca y con su boca
  alternatives_spanish:
  - y yo estaré contigo al hablar y con él al hablar
  - y yo estaré con tu palabra y con la suya
  lexicon: HALOT
  rationale: Conservo la imagen concreta de la boca para mantener el antropomorfismo y la fuerza de la habilitación divina para hablar. Aunque en español suena figurado, sigue siendo claro y fiel al hebreo.
- source_word: וְהוֹרֵיתִי אֶתְכֶם
  english_pob_choice: and I will instruct you
  chosen_spanish: y yo les instruiré
  alternatives_spanish:
  - y yo los enseñaré
  - y yo los dirigiré
  lexicon: HALOT
  rationale: ירה en hifil puede significar enseñar/instruir. Les permite reflejar con naturalidad el plural de אֶתְכֶם, que en este contexto incluye a Moisés y Aarón.
- source_word: אֵת אֲשֶׁר תַּעֲשׂוּן
  english_pob_choice: what you shall do
  chosen_spanish: acerca de lo que ustedes deben hacer
  alternatives_spanish:
  - lo que ustedes harán
  - lo que deben hacer
  lexicon: HALOT
  rationale: La construcción relativa pide una formulación española clara. Deben hacer hace explícita la fuerza directiva del contexto; ustedes conserva el plural sin ambigüedad, ya que el hebreo pasa al plural.
theological_decisions:
- issue: Imagen corporal de la presencia divina en el habla
  english_pob_reading: Retain the concrete wording 'I will be with your mouth and with his mouth' in the main text.
  chosen_spanish_reading: Mantener «estaré con tu boca y con su boca» en el texto principal.
  alternative_spanish_readings:
  - estaré contigo cuando hables y con él cuando hable
  - ayudaré a ambos a hablar
  rationale: El hebreo usa imagen corporal concreta para expresar presencia y habilitación divina. Conservarla evita suavizar una figura intencional del texto y mantiene visible la textura original.
  doctrine_reference: Filosofía de traducción §1, §3, §6
- issue: Valor plural del pronombre y del verbo final
  english_pob_reading: Render final 'you' in idiomatic English while understanding it as plural (Moses and Aaron).
  chosen_spanish_reading: Expresar de manera explícita el plural con «ustedes» y «les».
  alternative_spanish_readings:
  - te
  - vosotros
  rationale: El hebreo termina en plural, refiriéndose a Moisés y Aarón juntos. En español, ustedes evita ambigüedad regional y comunica con claridad el cambio de número.
  doctrine_reference: Filosofía de traducción §6
translation_notes:
  revision_awareness: El borrador sigue de cerca el texto hebreo y el audit trail en inglés. No se registran revisiones aplicadas en el antecedente; se mantiene la decisión de conservar la imagen concreta de la boca y de hacer explícito el plural final en español.
  spanish_consistency_notes:
  - Usé Yahvé solo cuando el texto fuente lo requiera explícitamente; aquí no aparece el nombre divino.
  - Mantuve boca para preservar la imagen hebrea, aunque en español resulte más corporal que una paráfrasis como hablar.
  - Elegí ustedes/les para reflejar el plural hebreo sin regionalismos marcados.
  - No sustituí instruir por enseñar, porque instruir conserva mejor la intención directiva del contexto.
