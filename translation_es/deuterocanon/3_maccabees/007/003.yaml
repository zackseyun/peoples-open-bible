translation:
  language: es
  text: Algunos de nuestros amigos, que estaban más constantemente junto a nosotros por malicia, nos persuadieron de que los judíos bajo nuestro dominio, después de haber sido reunidos en grupos[a], fueran castigados con penas extraordinarias[b] como rebeldes.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O ‘en asociaciones’ o ‘en cuerpos organizados’. El término griego puede referirse a grupos organizados, pero aquí su fuerza exacta no es del todo segura.
    reason: lexical_alternative
  - marker: b
    text: O ‘con penas inusuales’. El griego describe castigos o penas como extraños, foráneos o extraordinarios.
    reason: lexical_alternative
lexical_decisions:
- source_word: τῶν φίλων
  english_pob_choice: Some of our friends
  chosen_spanish: Algunos de nuestros amigos
  alternatives_spanish:
  - Algunos de nuestros allegados
  - Algunos de nuestros compañeros
  lexicon: LSJ
  rationale: φίλων en genitivo plural suele significar ‘amigos’. El español conserva ese sentido natural sin sobreespecificar un cargo cortesano que el griego no obliga a explicitar aquí.
- source_word: κατὰ κακοήθειαν
  english_pob_choice: out of malice
  chosen_spanish: por malicia
  alternatives_spanish:
  - maliciosamente
  - por mala voluntad
  lexicon: LSJ
  rationale: La expresión indica motivo o disposición dañada. ‘Por malicia’ transmite bien la causalidad y suena natural en español.
- source_word: πυκνότερον ἡμῖν παρακείμενοι
  english_pob_choice: being more constantly at our side
  chosen_spanish: que estaban más constantemente a nuestro lado
  alternatives_spanish:
  - que estaban más cerca de nosotros
  - que nos acompañaban con mayor frecuencia
  lexicon: LSJ
  rationale: παράκειμαι expresa cercanía o estar al lado; πυκνότερον añade frecuencia o constancia. La traducción mantiene ambas ideas en español idiomático.
- source_word: συνέπεισαν ἡμᾶς
  english_pob_choice: persuaded us
  chosen_spanish: nos persuadieron
  alternatives_spanish:
  - nos convencieron
  - nos indujeron
  lexicon: LSJ
  rationale: El verbo compuesto significa persuadir o ganar para una postura. ‘Nos persuadieron’ es claro y corresponde al valor básico del griego.
- source_word: τοὺς ὑπὸ τὴν βασιλείαν Ἰουδαίους
  english_pob_choice: the Jews under our rule
  chosen_spanish: los judíos bajo nuestro dominio
  alternatives_spanish:
  - los judíos sujetos a nuestro reinado
  - los judíos bajo nuestro gobierno
  lexicon: LSJ
  rationale: La frase describe a quienes están bajo el poder del rey. ‘Bajo nuestro dominio’ preserva el sentido político con una formulación natural en español.
- source_word: συναθροίσαντας
  english_pob_choice: after being gathered together
  chosen_spanish: después de haber sido reunidos
  alternatives_spanish:
  - una vez reunidos
  - habiendo sido congregados
  lexicon: LSJ
  rationale: El participio aoristo antecede a la acción de castigo. Se expresa como una acción previa en pasiva contextual, coherente con el marco narrativo.
- source_word: τὰ συστήματα
  english_pob_choice: in groups
  chosen_spanish: en grupos
  alternatives_spanish:
  - en asociaciones
  - en cuerpos organizados
  lexicon: LSJ
  rationale: σύστημα puede denotar un cuerpo, conjunto u ორგანიზación. El audit trail inglés revisó la redacción hacia ‘in groups’; el español sigue esa solución, manteniendo la incertidumbre de forma legible.
- source_word: κολάζεσθαι
  english_pob_choice: should be punished
  chosen_spanish: fueran castigados
  alternatives_spanish:
  - fueran castigados
  - recibieran castigo
  lexicon: LSJ
  rationale: El infinitivo expresa la acción propuesta contra los judíos. ‘Ser castigados’/‘fueran castigados’ es el equivalente más directo y adecuado.
- source_word: ξενιζούσαις ... τιμωρίαις
  english_pob_choice: with unusual penalties
  chosen_spanish: con penas extrañas
  alternatives_spanish:
  - con castigos extraños
  - con penas extraordinarias
  lexicon: LSJ
  rationale: ξενίζω/ξενίζουσαις aquí significa extraño, foráneo o inusual. ‘Penas extrañas’ conserva la rareza de la expresión sin endurecer el español.
- source_word: ἀποστάντων
  english_pob_choice: as rebels
  chosen_spanish: como rebeldes
  alternatives_spanish:
  - por haberse rebelado
  - como desertores
  lexicon: LSJ
  rationale: En este contexto político-administrativo el participio se entiende mejor como rebelión o deserción, no como apostasía religiosa específica. ‘Como rebeldes’ refleja la conclusión del audit trail inglés y mantiene la tensión política.
theological_decisions:
- issue: Force of ἀποστάντων
  english_pob_reading: political revolt/defection
  chosen_spanish_reading: rebeldía política
  alternative_spanish_readings:
  - apostasía religiosa
  - deserción
  rationale: El pasaje presenta la acusación estatal contra los judíos bajo dominio real. Por el contexto, la lectura política es la más probable; se evita importar un matiz religioso que el griego no exige aquí.
  doctrine_reference: Contexto histórico-político de la persecución en 3 Macabeos; matiz léxico de ἀφίστημι según LSJ.
- issue: Sentido de τὰ συστήματα
  english_pob_reading: organized associations/groups
  chosen_spanish_reading: grupos reunidos
  alternative_spanish_readings:
  - asociaciones organizadas
  - cuerpos colectivos
  rationale: El sustantivo es poco preciso en este contexto. El español conserva la ambigüedad razonable con ‘grupos’, sin fijar de más una estructura organizativa que el texto no determina con certeza.
  doctrine_reference: Cautela textual ante un sustantivo de sentido incierto; coherencia con la revisión inglesa.
translation_notes:
  revision_awareness: 'La traducción sigue la revisión inglesa más reciente: se adoptó ‘en grupos’ para τὰ συστήματα y se evitó una paráfrasis causal al final. También se respetó la lectura política de ἀποστάντων (‘como rebeldes’) frente a una posible lectura religiosa de ‘apostasía’.'
  spanish_consistency_notes:
  - Se usa ‘Dios’/‘Yahvé’ según el pasaje, pero aquí no aparecen esos nombres; no se requiere normalización adicional.
  - Se mantiene un registro formal y sobrio, con sintaxis clara para lectura eclesial.
  - Las notas al pie conservan la ambigüedad léxica donde el griego y el audit trail inglés no fijan un único valor.
