  source_alignment_summary: 'El borrador refleja bien la mayor parte del hebreo: mantiene los dos imperativos rituales, el nombre divino «Yahvé», el adverbio «mañana», la estructura de resultado con «Entonces», el singular representativo «el hombre», y el valor nominal de הַקָּדוֹשׁ como «el santo». Sin embargo, la cláusula final רַב לָכֶם en este contexto ya está auditada por el POB como una reprensión idiomática fuerte («You have gone too far»), con la opción más literal relegada a nota. El español principal invierte esa decisión y pone en el texto la alternativa más literal.'
  spanish_quality_summary: El español es en general claro y digno. No obstante, «¡Mucho es para ustedes!» suena poco idiomático en español contemporáneo y debilita el filo retórico del reproche. Además, conviene mantener la nota alternativa anclada en la frase correcta al final, no en «ellos». El resto del verso lee bien.
  glossary_alignment: 'Buen alineamiento con la terminología del proyecto: יְהוָה → «Yahvé», בני לוי → «hijos de Leví». No hay conflicto de glosario salvo que la decisión principal para רַב לָכֶם debería seguir la línea documentada por el POB y dejar la formulación más literal en nota.'
  issues:
