  revision_rationale: Se corrige el anclaje de la nota para que recaiga sobre la expresión correspondiente a שָׁאט («los desprecian»), se alisa el orden de la cláusula relativa para un español más natural, y se elimina la coma en «Yahvé su Dios» para una formulación bíblica más fiel y fluida.
