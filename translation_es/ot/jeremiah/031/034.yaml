translation:
  language: es
  text: 'Y ya no enseñará cada hombre[a] a su prójimo ni cada hombre a su hermano, diciendo: «Conozcan a Yahvé», porque todos me conocerán, desde el más pequeño de ellos hasta el más grande de ellos, declara Yahvé. Porque perdonaré su iniquidad, y no recordaré más su pecado.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «cada hombre a su prójimo y cada hombre a su hermano». La forma masculina singular se usa distributivamente para los miembros de la comunidad del pacto.'
    reason: lexical_alternative
lexical_decisions:
- source_word: יְלַמְּדוּ
  english_pob_choice: they will ... teach
  chosen_spanish: enseñarán
  alternatives_spanish:
  - instruirán
  - seguirán enseñando
  lexicon: HALOT
  rationale: El piel imperfecto de למד expresa enseñar/instruir. «Enseñarán» es directo, natural y conserva el valor verbal básico sin añadir matices no presentes.
- source_word: עוֹד
  english_pob_choice: no longer
  chosen_spanish: más
  alternatives_spanish:
  - ya no
  - nunca más
  lexicon: HALOT
  rationale: Con la negación, עוֹד indica cesación de una acción habitual. En español, «ya no» o «más» con negación expresan bien ese valor; aquí «más» mantiene la fluidez con «no enseñarán».
- source_word: אִישׁ
  english_pob_choice: each man
  chosen_spanish: cada hombre
  alternatives_spanish:
  - cada uno
  - cada persona
  lexicon: HALOT
  rationale: El hebreo usa singular masculino distributivo. «Cada hombre» preserva la forma y el sentido distributivo, sin neutralizar innecesariamente el rasgo gramatical del original.
- source_word: רֵעֵהוּ
  english_pob_choice: his neighbor
  chosen_spanish: su prójimo
  alternatives_spanish:
  - su vecino
  - su compañero
  lexicon: HALOT
  rationale: רֵעַ puede significar prójimo, compañero o asociado. En este contexto comunitario, «prójimo» comunica bien la relación interpersonal sin restringirla a amistad o vecindad literal.
- source_word: אָחִיו
  english_pob_choice: his brother
  chosen_spanish: su hermano
  alternatives_spanish:
  - su hermano de sangre
  - su pariente
  lexicon: HALOT
  rationale: אָח significa literalmente «hermano» y puede extenderse a lazos de pacto. «Su hermano» preserva esa fuerza y corresponde de cerca al hebreo.
- source_word: דְּעוּ
  english_pob_choice: Know
  chosen_spanish: Conozcan
  alternatives_spanish:
  - Conozcan bien
  - Reconozcan
  lexicon: HALOT
  rationale: El imperativo plural de ידע pide un verbo imperativo natural en español. «Conozcan» mantiene el valor cognitivo-relacional del mandato sin sobreexplicarlo.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  lexicon: HALOT
  rationale: Se conserva el nombre divino como transliteración en español, de acuerdo con la práctica del proyecto. «Yahvé» es la forma de uso más estable y legible en español bíblico contemporáneo.
- source_word: יֵדְעוּ אֹתִי
  english_pob_choice: they will all know me
  chosen_spanish: todos me conocerán
  alternatives_spanish:
  - todos sabrán quién soy
  - todos me sabrán
  lexicon: HALOT
  rationale: ידע con objeto personal expresa conocimiento relacional. «Me conocerán» conserva esa densidad; el orden español «todos me conocerán» es natural y claro.
- source_word: לְמִקְטַנָּם וְעַד גְּדוֹלָם
  english_pob_choice: from the least of them to the greatest of them
  chosen_spanish: desde el más pequeño de ellos hasta el más grande de ellos
  alternatives_spanish:
  - desde el menor de ellos hasta el mayor de ellos
  - desde los más pequeños hasta los más grandes
  lexicon: HALOT
  rationale: La expresión es un merismo que abarca a toda la comunidad. «Desde el más pequeño de ellos hasta el más grande de ellos» conserva el rango completo y la referencia a los miembros del grupo.
- source_word: נְאֻם יְהוָה
  english_pob_choice: declares Yahweh
  chosen_spanish: declara Yahvé
  alternatives_spanish:
  - dice Yahvé
  - oráculo de Yahvé
  lexicon: HALOT
  rationale: Es una fórmula profética fija. «Declara Yahvé» suena solemne y natural en español moderno, sin perder el tono oracular.
- source_word: אֶסְלַח
  english_pob_choice: I will forgive
  chosen_spanish: perdonaré
  alternatives_spanish:
  - perdonaré completamente
  - absuelve-ré
  lexicon: HALOT
  rationale: סלח es el verbo estándar para perdón divino. «Perdonaré» es la equivalencia española más clara y fiel.
- source_word: עֲוֺנָם
  english_pob_choice: their iniquity
  chosen_spanish: su iniquidad
  alternatives_spanish:
  - su culpa
  - su maldad
  lexicon: HALOT
  rationale: עָוֹן puede denotar iniquidad, culpa o la consecuencia de la culpa. «Iniquidad» conserva el peso moral del término y distingue este sustantivo del siguiente «pecado».
- source_word: חַטָּאתָם
  english_pob_choice: their sin
  chosen_spanish: su pecado
  alternatives_spanish:
  - sus pecados
  - su falta
  lexicon: HALOT
  rationale: El sustantivo funciona aquí de forma colectiva. «Su pecado» mantiene el valor colectivo singular y el paralelo con «su iniquidad».
- source_word: לֹא אֶזְכָּר עוֹד
  english_pob_choice: I will remember ... no more
  chosen_spanish: no recordaré más
  alternatives_spanish:
  - no me acordaré más
  - no volveré a recordar
  lexicon: HALOT
  rationale: זכר con negación y עוֹד expresa una no-rememoración decisiva. «No recordaré más» es natural y conserva la fuerza del compromiso divino.
theological_decisions:
- issue: Alcance del conocimiento de Yahvé
  english_pob_reading: Retain 'know' as relational-covenantal knowledge without expanding it to mere cognition or saving knowledge terminology.
  chosen_spanish_reading: Conservar «conocer» como conocimiento relacional y de pacto, sin convertirlo en una fórmula doctrinal más estrecha.
  alternative_spanish_readings:
  - saber acerca de
  - reconocer a
  - estar en relación salvadora con
  rationale: El hebreo ידע aquí tiene fuerza relacional y pactual. «Conocerán» preserva esa densidad sin resolver la tensión teológica en una paráfrasis más explícita.
  doctrine_reference: Translation philosophy §3
- issue: Lenguaje distributivo masculino
  english_pob_reading: Render אִישׁ as 'each man' in both occurrences.
  chosen_spanish_reading: Traducir אִישׁ como «cada hombre» en ambas ocurrencias.
  alternative_spanish_readings:
  - cada uno
  - toda persona
  rationale: El original usa singular masculino distributivo. Mantenerlo en español respeta la forma y el patrón del hebreo, conforme a la prioridad de precisión formal cuando el texto lo permite.
  doctrine_reference: Translation philosophy §4
- issue: Nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  rationale: Se traduce el Tetragrámaton con el nombre divino transliterado en español, preservando el nombre propio de pacto en lugar de sustituirlo por un título.
  doctrine_reference: 'Contested terms: יְהוָה YHWH'
translation_notes:
  revision_awareness: 'Se tuvo en cuenta la revisión auditada del inglés POB que ajustó la frase de alcance comunitario a «from the least of them to the greatest of them» por mayor cercanía al hebreo. La versión española conserva ese sentido con una estructura natural: «desde el más pequeño de ellos hasta el más grande de ellos».'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» de manera consistente para יְהוָה.
  - Se conserva el paralelismo «su iniquidad / su pecado» para reflejar עָוֹן y חטאת como términos distintos.
  - «Conozcan a Yahvé» reproduce el mandato plural y el conocimiento de pacto sin expandirlo a una paráfrasis doctrinal.
