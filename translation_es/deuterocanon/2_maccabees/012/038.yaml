translation:
  language: es
  text: Entonces Judas, tomando el ejército, llegó a la ciudad de Odolam. Y cuando la semana [a] estaba terminando, se purificaron allí según la costumbre y pasaron el sábado.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, más literalmente: "cuando la semana iba llegando"; el contexto y la mención siguiente del sábado muestran que se trata de la cercanía del séptimo día.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀναλαβών
  english_pob_choice: taking the army
  chosen_spanish: tomando el ejército
  alternatives_spanish:
  - llevando el ejército
  - tomando consigo al ejército
  - reuniendo al ejército
  lexicon: BDAG
  rationale: El participio introduce la acción de Judas con valor circunstancial. "Tomando el ejército" sigue de cerca la imagen verbal sin sonar tan artificial como un calco más rígido; mantiene la idea de que Judas lleva consigo la fuerza militar.
- source_word: στράτευμα
  english_pob_choice: army
  chosen_spanish: ejército
  alternatives_spanish:
  - fuerza
  - tropas
  lexicon: LSJ
  rationale: στράτευμα designa un cuerpo militar. "Ejército" es el equivalente más directo y natural en español contemporáneo, y conserva bien el valor militar del término.
- source_word: ἧκεν
  english_pob_choice: came
  chosen_spanish: llegó
  alternatives_spanish:
  - vino
  - arribó
  lexicon: BDAG
  rationale: El verbo indica la llegada a un lugar. "Llegó" es más natural en español que "vino" y conserva el sentido narrativo de arribo.
- source_word: Ὀδολλὰμ πόλιν
  english_pob_choice: the city of Odollam
  chosen_spanish: la ciudad de Odolam
  alternatives_spanish:
  - la ciudad de Odollam
  - la villa de Odolam
  lexicon: LSJ
  rationale: Se conserva el nombre propio transliterado en forma española usual y se mantiene πόλιν con "ciudad", porque el griego lo explicita.
- source_word: τῆς δὲ ἑβδομάδος ἐπιβαλλούσης
  english_pob_choice: as the week was ending
  chosen_spanish: cuando la semana estaba terminando
  alternatives_spanish:
  - cuando la semana iba terminando
  - al acercarse el séptimo día
  - cuando se acercaba el sábado
  lexicon: LSJ
  rationale: La expresión griega literalmente sugiere que la semana "va llegando" o "se va poniendo encima"; el audit trail inglés decidió reflejar el cierre de la semana. En español, "cuando la semana estaba terminando" preserva ese matiz sin forzar un giro idiomático extraño.
- source_word: κατὰ τὸν ἐθισμόν
  english_pob_choice: according to the custom
  chosen_spanish: según la costumbre
  alternatives_spanish:
  - conforme a la costumbre
  - como era costumbre
  lexicon: LSJ
  rationale: ἐθισμός indica práctica habitual. "Según la costumbre" es claro, formal y fiel al valor de norma consuetudinaria.
- source_word: ἁγνισθέντες
  english_pob_choice: they purified themselves
  chosen_spanish: se purificaron
  alternatives_spanish:
  - se limpiaron ritualmente
  - se santificaron
  lexicon: BDAG
  rationale: El participio pasivo tiene fuerza ritual/cultual. "Se purificaron" conserva esa dimensión mejor que una simple limpieza física, y evita introducir un sujeto explícito que el español no necesita.
- source_word: αὐτόθι
  english_pob_choice: there
  chosen_spanish: allí
  alternatives_spanish:
  - en ese lugar
  - ahí
  lexicon: LSJ
  rationale: Es un adverbio locativo simple; "allí" es natural y suficiente.
- source_word: τὸ σάββατον διῆγεν
  english_pob_choice: spent the Sabbath there
  chosen_spanish: pasaron el sábado allí
  alternatives_spanish:
  - transcurrieron allí el sábado
  - guardaron allí el sábado
  lexicon: BDAG
  rationale: διῆγεν significa pasar o transcurrir el tiempo. "Pasaron el sábado allí" es idiomático en español y no añade una afirmación litúrgica más fuerte que la del verbo, aunque el contexto sí implica observancia sabática.
theological_decisions:
- issue: Lenguaje ritual antes del sábado
  english_pob_reading: they purified themselves there according to the custom
  chosen_spanish_reading: se purificaron allí según la costumbre
  alternative_spanish_readings:
  - se limpiaron allí según la costumbre
  - se santificaron allí según la costumbre
  rationale: El griego usa lenguaje cultual marcado (ἁγνισθέντες). La traducción conserva "purificaron" para no reducirlo a higiene y para respetar el contexto judío de preparación ritual sin añadir detalles no explícitos.
  doctrine_reference: Translation philosophy §§1, 6
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión inglesa que prefirió "as the week was ending" frente a una paráfrasis del séptimo día, por lo que el español sigue esa decisión con "cuando la semana estaba terminando" y no la convierte en "cuando se acercaba el séptimo día". También se respetó la opción cultual de "purified themselves" con "se purificaron".
  spanish_consistency_notes:
  - Se usa "Odolam" como forma española del topónimo, coherente con transliteración bíblica estable.
  - Se mantiene "sábado" para σάββατον, sin sustituirlo por perífrasis explicativas.
  - La voz reflexiva "se purificaron" reproduce la pasiva griega con naturalidad en español.
  - El marcador [a] aparece en el texto y queda anclado a la alternativa temporal más literal.
