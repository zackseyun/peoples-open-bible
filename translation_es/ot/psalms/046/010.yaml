review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura y el sentido general del hebreo: Yahvé hace cesar las guerras hasta el extremo de la tierra, rompe el arco, destruye la lanza y quema los vehículos asociados a la guerra. Sin embargo, el punto léxico más importante del versículo es עֲגָלוֹת, que en el expediente inglés fue fijado como ''wagons'' frente a la tradición ''chariots''. El español principal ''carros'' en contexto bíblico hispano se oye fácilmente como ''carros de guerra'', lo que borra parcialmente la decisión fuente-céntrica documentada. Además, la nota actual presenta la alternativa principal de forma invertida.'
  spanish_quality_summary: El español es claro y digno, con buena cadencia poética. 'Hace cesar', 'hasta el extremo de la tierra', 'rompe el arco' y 'corta la lanza en dos' son naturales y fieles. La única reparación necesaria es usar un término más transparente para עֲגָלוֹת y ajustar la nota para que la lectura principal sea la más literal y la alternativa tradicional quede en nota.
  glossary_alignment: No hay conflictos con la terminología de proyecto salvo la decisión léxica sobre עֲגָלוֹת. Para preservar la primacía del original, conviene traducirlo como 'carretas' (o 'carrosa/vagones', pero 'carretas' es lo más natural y claro en español general) y dejar 'carros de guerra' como alternativa contextual en nota. 'Lanza' para חֲנִית es aceptable y natural; 'con fuego' también.
  issues:
  - severity: medium
    issue: El texto principal usa 'carros' para עֲגָלוֹת.
    rationale: En español bíblico y eclesial, 'carros' suele evocar carros de guerra/chariots. Eso atenúa la decisión auditada de evitar la lectura tradicional y conservar el sentido más literal de 'wagons/carts'.
  - severity: medium
    issue: La nota lexical está orientada al revés.
    rationale: La nota dice 'O «carros de guerra»' y luego menciona 'carros, vagones o carretas', cuando el expediente inglés establece como principal 'wagons' y reserva 'chariots' como alternativa. La nota española debería reflejar esa jerarquía.
  revised_spanish_text: Hace cesar las guerras hasta el extremo de la tierra; rompe el arco y corta la lanza en dos; quema las carretas[a] con fuego.
  revised_footnotes:
  - marker: a
    text: O «carros de guerra». El hebreo aquí más literalmente significa «carretas» o «carros de carga», aunque muchas traducciones lo vierten como «carros de guerra» por el contexto militar.
    reason: lexical_alternative
  revision_rationale: Se cambia 'carros' por 'carretas' para preservar en el texto principal la decisión fuente-céntrica sobre עֲגָלוֹת, evitando que el lector español oiga automáticamente 'carros de guerra'. Se ajusta la nota para que la lectura tradicional quede como alternativa y no como sentido principal. El resto del versículo puede mantenerse tal como está.
