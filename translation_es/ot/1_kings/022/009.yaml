translation:
  language: es
  text: 'Entonces el rey de Israel llamó a un oficial[a] y le dijo: «Trae pronto a Micaías hijo de Imla».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebreo saris puede significar «eunuco» o, más ampliamente, «oficial de la corte» o «funcionario». Aquí el sentido administrativo es el más probable.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּקְרָא
  english_pob_choice: called
  chosen_spanish: llamó
  alternatives_spanish:
  - hizo llamar
  - convocó
  lexicon: HALOT
  rationale: El verbo en este contexto narrativo expresa la acción de llamar para que alguien acuda. «Llamó» reproduce bien la brevedad del hebreo y mantiene el tono narrativo; «hizo llamar» sería más explícito, pero añade una mediación que el hebreo no exige.
- source_word: מֶלֶךְ יִשְׂרָאֵל
  english_pob_choice: the king of Israel
  chosen_spanish: el rey de Israel
  alternatives_spanish:
  - el rey de Israel
  lexicon: HALOT
  rationale: La cadena constructa se mantiene de forma directa y natural en español como identificación del hablante. No requiere paráfrasis adicional.
- source_word: סָרִיס אֶחָד
  english_pob_choice: one officer
  chosen_spanish: un oficial
  alternatives_spanish:
  - un eunuco
  - un oficial de la corte
  - un cortesano
  lexicon: HALOT
  rationale: La POB inglesa optó por el sentido administrativo probable de סָרִיס, no por «eunuco». En español, «oficial» conserva ese sentido funcional. Se evita «eunuco» porque la situación no enfatiza condición física sino cargo, aunque la ambigüedad queda señalada en la nota.
- source_word: מַהֲרָה
  english_pob_choice: Bring Micaiah son of Imlah quickly
  chosen_spanish: Apresura, Micaías hijo de Imla
  alternatives_spanish:
  - Trae rápidamente a Micaías hijo de Imla
  - Date prisa y trae a Micaías hijo de Imla
  - Trae a Micaías hijo de Imla pronto
  lexicon: HALOT
  rationale: El hebreo presenta una expresión imperativa de urgencia. «Apresura» conserva la fuerza del mandato de manera breve y formal; el complemento objeto se mantiene sin añadir un verbo explícito distinto del necesario en español. Otras opciones son posibles, pero esta reproduce mejor la inmediatez del original.
- source_word: מִיכָיְהוּ
  english_pob_choice: Micaiah
  chosen_spanish: Micaías
  alternatives_spanish:
  - Micaiahu
  lexicon: convención onomástica española
  rationale: Se usa la forma castellana habitual del nombre propio. «Micaías» es la equivalencia tradicional y comprensible en español, manteniendo la identificación del personaje.
- source_word: בֶן יִמְלָה
  english_pob_choice: son of Imlah
  chosen_spanish: hijo de Imla
  alternatives_spanish:
  - hijo de Yimlá
  lexicon: convención patronímica
  rationale: La construcción patronímica se vierte de forma literal y natural. «Imla» reproduce el nombre propio de manera transparente y estable en español.
translation_notes:
  revision_awareness: La redacción sigue de cerca el ajuste de la POB inglesa en 2026-04-23, que colocó el adverbio de urgencia al final del mandato («Bring ... quickly»). En español, esa misma prioridad se expresa con una forma imperativa breve que conserva la urgencia sin sobrecargar la sintaxis.
  spanish_consistency_notes:
  - Se mantiene «Micaías» con acento en la forma española usual del nombre.
  - Se evita «SEÑOR» porque no aparece el tetragrama en este verso.
  - «Oficial» se usa en sentido de cargo administrativo, no militar.
  - El mandato queda en estilo directo y breve, acorde con el hebreo narrativo.
