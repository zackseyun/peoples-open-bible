translation:
  language: es
  text: Caín conoció a su esposa[a], y ella concibió y dio a luz a Enoc. Estaba edificando una ciudad[b], y le puso a la ciudad el nombre de su hijo Enoc[c][d].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El hebreo dice «conoció a su esposa», un eufemismo común para relaciones sexuales.
    reason: cultural_note
  - marker: b
    text: 'La construcción hebrea puede sugerir acción en curso: «estaba edificando una ciudad», no solo «edificó una ciudad».'
    reason: lexical_alternative
  - marker: c
    text: O, más literalmente, «llamó el nombre de la ciudad por el nombre de su hijo».
    reason: previous_rendering
  - marker: d
    text: También puede expresarse de forma idiomática como «nombró la ciudad en honor de su hijo Enoc».
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֵּדַע
  english_pob_choice: knew
  chosen_spanish: conoció
  alternatives_spanish:
  - tuvo relaciones con
  - se unió a
  lexicon: HALOT
  rationale: יָדַע es un eufemismo común para relaciones sexuales. En español, 'conoció' conserva el idiomatismo bíblico y el tono sobrio sin explicitar de más.
- source_word: אִשְׁתּוֹ
  english_pob_choice: his wife
  chosen_spanish: su esposa
  alternatives_spanish:
  - su mujer
  lexicon: HALOT
  rationale: En este contexto matrimonial, 'esposa' es el equivalente natural y preciso en español; mantiene el sentido relacional de אִשָּׁה con sufijo posesivo.
- source_word: וַתַּהַר
  english_pob_choice: conceived
  chosen_spanish: concibió
  alternatives_spanish:
  - quedó embarazada
  lexicon: HALOT
  rationale: '''Concibió'' refleja bien el inicio del embarazo y encaja con el paralelismo narrativo bíblico.'
- source_word: וַתֵּלֶד
  english_pob_choice: bore
  chosen_spanish: dio a luz
  alternatives_spanish:
  - parió
  - engendró
  lexicon: HALOT
  rationale: '''Dar a luz'' es el equivalente natural y digno en español para el nacimiento; evita la posible dureza de ''parió'' y no fuerza un arcaísmo.'
- source_word: חֲנוֹךְ
  english_pob_choice: Enoch
  chosen_spanish: Enoc
  lexicon: conventional proper-name equivalence
  rationale: Se usa la forma tradicional en español para el nombre propio.
- source_word: וַיְהִי בֹנֶה עִיר
  english_pob_choice: He was building a city
  chosen_spanish: Él estaba edificando una ciudad
  alternatives_spanish:
  - estaba construyendo una ciudad
  - edificaba una ciudad
  lexicon: HALOT
  rationale: La forma היה + participio sugiere acción en curso. 'Estaba edificando' conserva ese aspecto progresivo y mantiene un registro bíblico claro.
- source_word: עִיר
  english_pob_choice: city
  chosen_spanish: ciudad
  alternatives_spanish:
  - poblado
  - villa
  lexicon: HALOT
  rationale: '''Ciudad'' es la equivalencia estándar y más amplia para עִיר.'
- source_word: וַיִּקְרָא שֵׁם הָעִיר
  english_pob_choice: he named the city
  chosen_spanish: llamó a la ciudad
  alternatives_spanish:
  - puso nombre a la ciudad
  - nombró a la ciudad
  lexicon: HALOT
  rationale: En español, 'llamó a la ciudad' transmite de forma natural el idiomático 'llamar el nombre de'. 'Nombró' también sería posible, pero 'llamó' conserva mejor el eco formal del hebreo.
- source_word: כְּשֵׁם בְּנוֹ
  english_pob_choice: after his son
  chosen_spanish: por el nombre de su hijo
  alternatives_spanish:
  - con el nombre de su hijo
  - según el nombre de su hijo
  lexicon: HALOT
  rationale: El hebreo expresa correspondencia nominal. 'Por el nombre de' preserva la repetición de 'nombre' y el enlace formal con la expresión hebrea, aunque en español suene más literal que la opción idiomática.
theological_decisions:
- issue: Eufemismo sexual de 'conoció a su esposa'
  english_pob_reading: The Hebrew says 'knew his wife,' a common idiom for sexual relations.
  chosen_spanish_reading: conoció a su esposa
  alternative_spanish_readings:
  - tuvo relaciones con su esposa
  - se unió a su esposa
  rationale: Se conserva el eufemismo bíblico en vez de una explicitación más directa, para respetar el registro narrativo y la transparencia al hebreo.
  doctrine_reference: No aplica; decisión de registro y fidelidad idiomática.
- issue: Aspecto progresivo en היה + participio
  english_pob_reading: 'The Hebrew construction can suggest ongoing action: ''he was building a city.'''
  chosen_spanish_reading: estaba edificando una ciudad
  alternative_spanish_readings:
  - edificó una ciudad
  - construía una ciudad
  rationale: La perífrasis progresiva refleja mejor la acción en curso sugerida por el participio hebreo y evita convertirla sin necesidad en un hecho puramente puntual.
  doctrine_reference: No aplica; decisión aspectual.
translation_notes:
  revision_awareness: La versión inglesa más reciente eliminó 'Then' para acercarse más al hebreo y suavizó la apposición final; la versión española sigue ese ajuste sin añadir una partícula temporal innecesaria. También conserva la repetición de 'nombre' en la fórmula final mediante una redacción más literal, aunque con una nota que ofrece la formulación idiomática.
  spanish_consistency_notes:
  - Se mantiene 'Enoc' como forma española convencional del nombre propio.
  - Se usa 'ciudad' para עִיר, en coherencia con el valor léxico normal.
  - La progresividad de 'estaba edificando' refleja la construcción verbal hebrea con היה + participio.
  - No se usa 'SEÑOR' ni terminología sustitutiva ajena al texto; este versículo no contiene el nombre divino.
