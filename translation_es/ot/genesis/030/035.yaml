review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien la estructura del hebreo y del POB inglés: separación de machos cabríos, cabras, y corderos; preserva la distinción sexual entre תישים y עזים; y mantiene el sentido idiomático de וַיִּתֵּן בְּיַד. Sin embargo, debilita dos decisiones léxicas importantes del registro auditado: 1) no distingue con suficiente claridad הַנְּקֻדּוֹת (‘speckled’) de הַטְּלֻאֹת (‘spotted’), porque usa «moteadas» y «salpicadas», donde «salpicadas» no corresponde tan bien a manchas/parches; 2) «todo lo que tenía blanco en sí» suena poco natural y no refleja bien el distributivo referido a cada animal. También «y los puso en manos de sus hijos» es comprensible, pero menos natural y menos preciso que una formulación de custodia/cuidado, especialmente dado que la nota ya preserva el modismo literal.'
  spanish_quality_summary: 'El español es mayormente claro, pero presenta giros algo duros o poco idiomáticos: «todo lo que tenía blanco en sí» suena calcado; «en manos de sus hijos» es comprensible, aunque menos natural aquí que «al cuidado de sus hijos». «Machos cabríos» es aceptable, pero «cabritos machos» no sería mejor; por tanto puede mantenerse. La frase mejora si se ordena con mayor fluidez y si se usa una pareja léxica más natural para distinguir ‘speckled’ y ‘spotted’: «salpicadas» / «moteadas» o «punteadas» / «moteadas».'
  glossary_alignment: 'No hay conflictos con la terminología teológica del proyecto. Las decisiones relevantes son léxicas/zoológicas. Conviene alinear mejor con la racionalidad del POB inglés: distinguir términos de pelaje, mantener «corderos» para כְּשָׂבִים, y expresar el modismo בְיַד como custodia en el texto principal, dejando lo literal en nota.'
  issues:
  - severity: medium
    issue: La cláusula «todo lo que tenía blanco en sí» es poco natural en español.
    rationale: כֹּל אֲשֶׁר לָבָן בּוֹ califica distributivamente a los animales con blanco en el pelaje. En español, «todo animal que tenía blanco» o «cada una que tenía blanco» suena más natural y fiel.
  - severity: medium
    issue: «En manos de sus hijos» conserva demasiado literalmente el modismo en el texto principal.
    rationale: El POB inglés decidió expresar el sentido idiomático (‘into the care of’) en el texto y dejar la literalidad en nota. En español, «los puso al cuidado de sus hijos» preserva mejor el sentido y la legibilidad.
  - severity: medium
    issue: La distinción entre הַנְּקֻדּוֹת y הַטְּלֻאֹת puede mejorarse.
    rationale: El hebreo usa dos términos distintos para el patrón del pelaje. «Moteadas y salpicadas» no representa tan bien la diferencia entre ‘speckled’ y ‘spotted’ como «salpicadas y moteadas» o «punteadas y moteadas».
  - severity: low
    issue: La nota a sobre «bandados» usa una opción española poco natural.
    rationale: Como alternativa léxica, «listados» o «estriados» resulta más claro que «bandados» para marcas en bandas.
