translation:
  language: es
  text: Pero Jonás se levantó para huir a Tarsis de la presencia de Yahvé[a]. Bajó a Jope y halló una nave que iba a Tarsis. Pagó su pasaje y bajó a la nave para ir con ellos a Tarsis[b][c], lejos de la presencia de Yahvé.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'lejos de Yahvé'; literalmente, 'de la presencia de Yahvé'.
    reason: lexical_alternative
  - marker: b
    text: El hebreo repite 'bajó' aquí; la repetición contribuye al movimiento descendente de la narración en este capítulo.
    reason: cross_reference
  - marker: c
    text: O 'con destino a Tarsis'. La expresión hebrea es literalmente 'una nave que venía/iba a Tarsis'.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּקָם
  english_pob_choice: rose
  chosen_spanish: se levantó
  alternatives_spanish:
  - se alzó
  - se puso en pie
  lexicon: HALOT
  rationale: El verbo hebreo indica levantarse para iniciar una acción; 'se levantó' conserva el movimiento narrativo natural en español sin añadir interpretación.
- source_word: לִבְרֹחַ
  english_pob_choice: to flee
  chosen_spanish: para huir
  alternatives_spanish:
  - para escapar
  - para correr lejos
  lexicon: HALOT
  rationale: '''Huir'' comunica el intento deliberado de escapar y mantiene la fuerza del verbo hebreo mejor que una paráfrasis más suave.'
- source_word: תַּרְשִׁישָׁה
  english_pob_choice: to Tarshish
  chosen_spanish: a Tarsis
  alternatives_spanish:
  - hacia Tarsis
  - para Tarsis
  lexicon: HALOT
  rationale: El sufijo direccional se expresa naturalmente con 'a' en español; se conserva el nombre propio bíblico 'Tarsis'.
- source_word: מִלִּפְנֵי יְהוָה
  english_pob_choice: from the presence of Yahweh
  chosen_spanish: de la presencia de Yahvé
  alternatives_spanish:
  - lejos de la presencia de Yahvé
  - de delante de Yahvé
  lexicon: HALOT
  rationale: '''Presencia'' refleja literalmente פנים/לִפְנֵי y mantiene la ironía teológica de intentar alejarse de Dios. Se usa ''Yahvé'' conforme al criterio del proyecto para יהוה.'
- source_word: יָפוֹ
  english_pob_choice: Joppa
  chosen_spanish: Jope
  alternatives_spanish:
  - Jaffa
  lexicon: uso bíblico tradicional
  rationale: '''Jope'' es la forma bíblica castellana más reconocible y directa para el lugar de Jaffa en contexto bíblico.'
- source_word: אָנִיָּה
  english_pob_choice: ship
  chosen_spanish: nave
  alternatives_spanish:
  - barco
  - buque
  lexicon: HALOT
  rationale: '''Nave'' es una opción digna y amplia para un buque marítimo; evita una familiaridad excesiva de ''barco'' y mantiene el referente de embarcación de travesía.'
- source_word: בָּאָה תַרְשִׁישׁ
  english_pob_choice: going to Tarshish
  chosen_spanish: que iba a Tarsis
  alternatives_spanish:
  - con destino a Tarsis
  - que se dirigía a Tarsis
  lexicon: HALOT
  rationale: '''Iba a Tarsis'' expresa con claridad el sentido direccional del participio sin forzar una construcción más técnica.'
- source_word: שְׂכָרָהּ
  english_pob_choice: its fare
  chosen_spanish: su pasaje
  alternatives_spanish:
  - su tarifa
  - el precio del viaje
  lexicon: HALOT
  rationale: En español, para una travesía marítima, 'pasaje' comunica de forma natural el costo pagado por el viaje; mantiene la idea de precio/hire del hebreo.
- source_word: וַיֵּרֶד בָּהּ
  english_pob_choice: went down into it
  chosen_spanish: bajó en ella
  alternatives_spanish:
  - bajó a bordo
  - se embarcó en ella
  lexicon: HALOT
  rationale: Se conserva el verbo 'bajar', que es importante en la progresión descendente del capítulo. 'En ella' resulta más natural en español con una nave que 'dentro de ella'.
- source_word: לָבוֹא עִמָּהֶם
  english_pob_choice: to go with them
  chosen_spanish: para ir con ellos
  alternatives_spanish:
  - para viajar con ellos
  - para acompañarlos
  lexicon: HALOT
  rationale: '''Para ir con ellos'' sigue de cerca la finalidad del infinitivo y no añade matices ajenos como compañía afectiva.'
- source_word: מִלִּפְנֵי יְהוָה
  english_pob_choice: away from the presence of Yahweh
  chosen_spanish: lejos de la presencia de Yahvé
  alternatives_spanish:
  - de la presencia de Yahvé
  lexicon: HALOT
  rationale: La repetición final expresa el mismo motivo con una ligera explicitación de dirección ('lejos de') que ayuda al español y conserva el énfasis del hebreo.
theological_decisions:
- issue: Representación del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - Jehová
  rationale: Se sigue la norma del proyecto de traducir YHWH como 'Yahvé', preservando el nombre propio del pacto en lugar de la sustitución litúrgica por 'SEÑOR'.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: La repetición de 'bajar' en la narración
  english_pob_reading: He went down... went down into it
  chosen_spanish_reading: Bajó a Jope... bajó en ella
  alternative_spanish_readings:
  - Fue a Jope... se embarcó
  - Descendió a Jope... descendió en ella
  rationale: Jonás 1 subraya literariamente un movimiento de descenso; mantener 'bajó' dos veces conserva esa tensión narrativa y no la aplana con un verbo diferente.
  doctrine_reference: Jonás 1:3, estructura narrativa descendente
- issue: Sentido de 'from the presence of Yahweh'
  english_pob_reading: from the presence of Yahweh
  chosen_spanish_reading: de la presencia de Yahvé
  alternative_spanish_readings:
  - de delante de Yahvé
  - alejándose de Yahvé
  rationale: '''Presencia'' conserva la concreción de לִפְנֵי/פנים y la tensión teológica de que Jonás intenta huir no solo de una tarea, sino de la presencia misma de Dios.'
  doctrine_reference: Teología bíblica de la presencia divina
translation_notes:
  revision_awareness: El contexto auditado en inglés presenta una lectura de alta concordancia y no requiere cambios sustanciales; se conservan el paralelismo narrativo, la repetición de 'bajó' y la expresión concreta de la presencia divina, con ajuste natural al español.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' para יְהוָה en todo el versículo, conforme al estándar del proyecto.
  - '''Tarsis'' y ''Jope'' siguen la forma bíblica castellana y no modernizan innecesariamente los topónimos.'
  - '''Pasaje'' se usa para el costo del viaje marítimo, equivalente funcional de ''fare'' en este contexto.'
  - Se conserva la progresión descendente con dos ocurrencias de 'bajó'.
