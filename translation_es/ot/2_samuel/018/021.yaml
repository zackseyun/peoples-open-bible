    issue: «anuncia al rey» sobretraduce הַגֵּד
    rationale: El verbo נגד en hiphil aquí significa hacer saber/reportar. «Anunciar» en español suele sugerir proclamación o anuncio formal, más fuerte que el simple encargo de informar al rey lo visto.
  revised_spanish_text: 'Entonces Joab dijo al cusita[a]: «Ve, informa al rey lo que has visto». Y el cusita se inclinó ante Joab y corrió.'
