translation:
  language: es
  text: Porque es de Israel; un artesano lo hizo, y no es Dios[a]. Ciertamente[b], el becerro de Samaria se convertirá en astillas.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «no es un dios». El hebreo dice literalmente: «y no es Dios», negando la verdadera deidad del ídolo.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «será hecho pedazos» o «se convertirá en fragmentos».'
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  english_pob_choice: For / Indeed
  chosen_spanish: Porque / Ciertamente
  alternatives_spanish:
  - Pues
  - Ya que
  - En verdad
  lexicon: HALOT
  rationale: El primer כִּי introduce la base explicativa de la denuncia anterior, y en español «Porque» mantiene bien ese valor causal. El segundo כִּי añade énfasis o explicación del juicio; «Ciertamente» conserva ese matiz enfático sin volverse demasiado interpretativo.
- source_word: מִיִּשְׂרָאֵל
  english_pob_choice: from Israel
  chosen_spanish: de Israel
  alternatives_spanish:
  - desde Israel
  - procedente de Israel
  lexicon: HALOT
  rationale: La preposición מִן apunta al origen procedencial; en español «de Israel» comunica ese origen de manera natural y fiel. «Desde Israel» sonaría más espacial que fuente-originaria, y «procedente de Israel» es correcto pero más pesado.
- source_word: וְהוּא
  english_pob_choice: it
  chosen_spanish: esto
  alternatives_spanish:
  - y ello
  - y él
  lexicon: HALOT
  rationale: El pronombre retoma al becerro/ídolo, no a una persona. En español, «esto» permite conservar la referencia impersonal sin forzar género y sin hacer torpe la frase.
- source_word: חָרָשׁ
  english_pob_choice: a craftsman
  chosen_spanish: un artesano
  alternatives_spanish:
  - un artesano hábil
  - un obrero
  - un herrero
  lexicon: HALOT
  rationale: El término denota un fabricante experto. «Artesano» preserva la idea de habilidad manual y mantiene más amplitud que «herrero», que sería demasiado específico.
- source_word: עָשָׂהוּ
  english_pob_choice: made it
  chosen_spanish: lo hizo
  alternatives_spanish:
  - lo fabricó
  - lo formó
  - lo confeccionó
  lexicon: HALOT
  rationale: 'La forma verbal es directa: el artesano produjo el ídolo. «Lo hizo» es breve, transparente y suficientemente literal.'
- source_word: וְלֹא אֱלֹהִים הוּא
  english_pob_choice: and it is not God
  chosen_spanish: y no es Dios
  alternatives_spanish:
  - y no es un dios
  - y no es divino
  lexicon: HALOT
  rationale: El hebreo niega de manera frontal la verdadera deidad del ídolo. En español, «no es Dios» conserva esa fuerza polémica y la oposición entre el objeto fabricado y el Dios verdadero; «no es un dios» suaviza el contraste, y «no es divino» se aleja del sustantivo del original.
- source_word: שְׁבָבִים
  english_pob_choice: splinters
  chosen_spanish: astillas
  alternatives_spanish:
  - fragmentos
  - pedazos
  - astillas rotas
  lexicon: HALOT
  rationale: El vocablo señala trozos quebrados, pequeños y dispersos. «Astillas» transmite bien la imagen concreta de ruptura en español bíblico actual.
- source_word: יִהְיֶה
  english_pob_choice: will become
  chosen_spanish: se convertirá en
  alternatives_spanish:
  - será
  - llegará a ser
  lexicon: HALOT
  rationale: Con un predicado de resultado, la idea es transformación. «Se convertirá en» expresa de modo natural el paso a un estado de fragmentación.
- source_word: עֵגֶל שֹׁמְרוֹן
  english_pob_choice: the calf of Samaria
  chosen_spanish: el becerro de Samaria
  alternatives_spanish:
  - el ternero de Samaria
  - el becerro samaritano
  lexicon: HALOT
  rationale: «עֵגֶל» suele referirse al becerro asociado con idolatría en este contexto. «Becerro» reproduce mejor el tono bíblico y polémico que «ternero», y «de Samaria» mantiene la identificación geográfica/política.
theological_decisions:
- issue: Negación de la deidad del ídolo en וְלֹא אֱלֹהִים הוּא
  english_pob_reading: and it is not God
  chosen_spanish_reading: y no es Dios
  alternative_spanish_readings:
  - y no es un dios
  - y no tiene divinidad
  rationale: 'La lectura elegida mantiene la negación directa del hebreo y la fuerza teológica: el ídolo no comparte la condición del Dios verdadero. No se suaviza a «un dios» para no rebajar el contraste, ni se abstracta a «divinidad» porque el texto ataca la pretensión de deidad del objeto.'
  doctrine_reference: 'Translation philosophy: preserve theological tension rather than resolve it; original-language primacy over translation tradition.'
- issue: Valor del juicio final sobre el becerro de Samaria
  english_pob_reading: will become splinters
  chosen_spanish_reading: se convertirá en astillas
  alternative_spanish_readings:
  - será hecho pedazos
  - será quebrado en fragmentos
  - se hará pedazos
  rationale: La imagen profética es la de destrucción total del ídolo. «Se convertirá en astillas» conserva el resultado final y la imaginería concreta del hebreo, sin explicitar más de lo que el texto dice.
  doctrine_reference: 'Translation philosophy: retain vivid prophetic imagery with minimal smoothing.'
translation_notes:
  revision_awareness: 'El borrador sigue el texto hebreo de WLC y coincide sustancialmente con la decisión inglesa auditada: origen desde Israel, fabricación humana del ídolo, negación frontal de su deidad y anuncio de que el becerro de Samaria terminará reducido a fragmentos. No se introdujeron cambios textuales ni se requirió resolver ninguna variante adicional.'
  spanish_consistency_notes:
  - Se mantiene «Dios» con mayúscula en la negación para reflejar el contraste con el Dios verdadero, sin cambiar el sentido del hebreo.
  - Se usa «becerro» como equivalente de עֵגֶל en este contexto idolátrico, coherente con el uso bíblico tradicional y con la carga polémica del pasaje.
  - Se conserva una sintaxis breve y profética, evitando añadir sujetos o verbos que el hebreo no exige.
