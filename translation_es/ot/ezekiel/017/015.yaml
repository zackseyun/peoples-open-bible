translation:
  language: es
  text: Pero se rebeló contra él al enviar sus mensajeros a Egipto, para que le dieran caballos y mucha gente[a]. ¿Prosperará? ¿Escapará el que hace estas cosas? ¿Podrá quebrantar una alianza[b] y aun así escapar?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «caballos y una gran hueste» / «caballos y muchas tropas»; el hebreo dice literalmente «caballos y mucha gente», refiriéndose en este contexto al apoyo militar de Egipto.
    reason: lexical_alternative
  - marker: b
    text: O «violar una alianza».
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּמְרָד
  english_pob_choice: rebelled
  chosen_spanish: se rebeló
  alternatives_spanish:
  - se sublevó
  - se rebeló traicioneramente
  lexicon: HALOT
  rationale: מרד expresa rebelión contra una autoridad superior. En español, «se rebeló» comunica bien la ruptura de lealtad sin añadir matices no presentes en el hebreo.
- source_word: בּוֹ
  english_pob_choice: against him
  chosen_spanish: contra él
  alternatives_spanish:
  - contra ello
  lexicon: HALOT
  rationale: El pronombre retoma al soberano/relación de vasallaje del contexto. «Contra él» es la forma natural en español para expresar el sentido adversativo de מרד.
- source_word: לִשְׁלֹחַ מַלְאָכָיו
  english_pob_choice: by sending his messengers
  chosen_spanish: enviando sus mensajeros
  alternatives_spanish:
  - enviando sus enviados
  - por medio de sus mensajeros
  lexicon: HALOT
  rationale: מלאכים puede significar mensajeros, enviados o embajadores. «Mensajeros» conserva el valor léxico amplio y permite la lectura diplomática sin sobreespecificar.
- source_word: מִצְרַיִם
  english_pob_choice: to Egypt
  chosen_spanish: a Egipto
  alternatives_spanish:
  - a Egipto
  lexicon: HALOT
  rationale: Nombre propio geográfico estándar. La preposición «a» marca el destino del envío en español.
- source_word: לָתֶת לוֹ סוּסִים וְעַם רָב
  english_pob_choice: that they might give him horses and many people
  chosen_spanish: para que le dieran caballos y mucha gente
  alternatives_spanish:
  - para que le dieran caballos y mucho pueblo
  - para que le dieran caballos y muchos hombres
  - para que le proporcionaran caballos y mucha tropa
  lexicon: HALOT
  rationale: El hebreo dice literalmente «caballos y mucha gente». Mantener «mucha gente» preserva la forma del original y evita imponer una especificación militar demasiado cerrada; el contexto permite entender la ayuda como apoyo bélico. Se usa el subjuntivo de finalidad en español.
- source_word: הֲיִצְלָח
  english_pob_choice: Will he prosper?
  chosen_spanish: ¿Prosperará?
  alternatives_spanish:
  - ¿Tendrá éxito?
  - ¿Le irá bien?
  lexicon: HALOT
  rationale: צלח pregunta por el éxito o buen resultado de la acción. «Prosperará» conserva el alcance amplio del verbo, que incluye más que un mero éxito práctico.
- source_word: הֲיִמָּלֵט
  english_pob_choice: Will he escape?
  chosen_spanish: ¿Escapará?
  alternatives_spanish:
  - ¿Se librará?
  - ¿Logrará escapar?
  lexicon: HALOT
  rationale: נמלט denota escape/liberación de peligro. «Escapará» es directo y mantiene la fuerza retórica de la pregunta.
- source_word: הָעֹשֶׂה אֵלֶּה
  english_pob_choice: the one who does these things
  chosen_spanish: el que hace estas cosas
  alternatives_spanish:
  - quien hace estas cosas
  - el que obra estas cosas
  lexicon: HALOT
  rationale: El participio sustantivado se vierte de modo natural en español con «el que». «Estas cosas» conserva la referencia resumida a los actos ya descritos.
- source_word: וְהֵפֵר בְּרִית
  english_pob_choice: Can he break a covenant
  chosen_spanish: ¿Podrá quebrantar un pacto?
  alternatives_spanish:
  - ¿Podrá violar un pacto?
  - ¿Podrá quebrantar el pacto?
  lexicon: HALOT
  rationale: הפר significa romper/quebrantar/violar. En español, «quebrantar» refleja bien la gravedad formal del acto; «pacto» es una alternativa posible, pero se mantiene «un pacto» para respetar la ausencia de artículo del hebreo, aunque el contexto apunte a un pacto ya conocido.
- source_word: וְנִמְלָט
  english_pob_choice: and yet escape
  chosen_spanish: y escapar
  alternatives_spanish:
  - y aun así escapar
  - y escapar de todos modos
  lexicon: HALOT
  rationale: La repetición de נמלט cierra la pregunta con incredulidad retórica. En español, el paralelismo se conserva con «y escapar»; la fuerza de «y aun así» queda implícita por la estructura interrogativa y el contexto.
theological_decisions:
- issue: Naturaleza de בְּרִית en contexto político
  english_pob_reading: covenant
  chosen_spanish_reading: pacto
  alternative_spanish_readings:
  - tratado
  - acuerdo
  rationale: Aunque el trasfondo es político, el texto profético carga el término con peso de obligación vinculante. En español, «pacto» conserva mejor esa seriedad que «tratado», sin diluir la denuncia moral de la ruptura.
  doctrine_reference: Translation philosophy §1, §5
translation_notes:
  revision_awareness: 'La redacción sigue la revisión más reciente del POB en inglés: se mantiene la cláusula de finalidad con «para que», se evita ampliar innecesariamente la segunda pregunta y se conserva el paralelismo retórico final con «y escapar».'
  spanish_consistency_notes:
  - Se usa «Yahvé» como forma preferente del Tetragrámaton en el proyecto, pero este versículo no lo contiene.
  - Se mantiene la diferencia entre «pacto» y «tratado» como decisión lexical-teológica; en el texto principal se optó por «pacto» para reflejar la carga del hebreo.
  - «Mensajeros» se conserva para no estrechar el campo semántico de מלאכים a una sola función diplomática.
