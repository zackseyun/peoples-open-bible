translation:
  language: es
  text: Por tanto, darás regalos de despedida[a] por Moreset-gat; las casas de Aczib[b] resultarán engañosas para los reyes de Israel.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «regalos de despedida»; el hebreo también puede sugerir regalos dados al despedir a alguien, con posible eco de una imagen de divorcio.
    reason: lexical_alternative
  - marker: b
    text: 'Aczib suena parecido a la palabra hebrea para «engaño» o «desilusión», creando un juego de palabras: las casas de la ciudad resultarán engañosas para los reyes de Israel.'
    reason: lexical_alternative
lexical_decisions:
- source_word: לָכֵן
  english_pob_choice: Therefore
  chosen_spanish: Por tanto
  alternatives_spanish:
  - Por eso
  - Así que
  - Por lo tanto
  lexicon: HALOT
  rationale: La partícula inferencial introduce una consecuencia del juicio precedente; «Por tanto» mantiene el valor consecuencial con registro digno y natural en español.
- source_word: תִּתְּנִי
  english_pob_choice: you will give
  chosen_spanish: darás
  alternatives_spanish:
  - darás tú
  - vas a dar
  lexicon: HALOT
  rationale: El imperfecto 2fs apunta a un destinatario femenino singular. «Darás» conserva el futuro profético y evita sobrecargar el texto con marcas innecesarias.
- source_word: שִׁלּוּחִים
  english_pob_choice: parting gifts
  chosen_spanish: regalos de despedida
  alternatives_spanish:
  - regalos de partida
  - obsequios de despedida
  - regalos de separación
  lexicon: HALOT
  rationale: Se preserva el sentido de obsequios dados al partir o al ser despedido. «Regalos de despedida» comunica el valor básico sin fijar demasiado la posible alusión jurídica de divorcio.
- source_word: עַל
  english_pob_choice: for
  chosen_spanish: por
  alternatives_spanish:
  - para
  - a favor de
  - en favor de
  lexicon: HALOT
  rationale: En esta construcción, el inglés POB ajustó la preposición a «for»; en español, «por Moreset-gat» conserva el matiz relacional y el flujo natural de la frase sin forzar un «para» menos idiomático aquí.
- source_word: מוֹרֶשֶׁת גַּת
  english_pob_choice: Moresheth-gath
  chosen_spanish: Moreset-gat
  alternatives_spanish:
  - Moreset de Gat
  lexicon: HALOT
  rationale: Topónimo transliterado en forma española estándar. Se mantiene el guion para reflejar el nombre compuesto tradicionalmente reconocido.
- source_word: בָּתֵּי אַכְזִיב
  english_pob_choice: the houses of Achzib
  chosen_spanish: las casas de Aczib
  alternatives_spanish:
  - las casas de Aczib
  - los hogares de Aczib
  - las familias de Aczib
  lexicon: HALOT
  rationale: Se conserva la literalidad de «casas» para preservar el paralelismo y el juego verbal con el siguiente término. «Aczib» reproduce el topónimo con ortografía española habitual.
- source_word: לְאַכְזָב
  english_pob_choice: will prove deceptive
  chosen_spanish: se volverán engaño
  alternatives_spanish:
  - resultarán engañosas
  - se mostrarán engañosas
  - serán engaño
  lexicon: HALOT
  rationale: El sustantivo/abstracción hebrea ligado al topónimo se expresa como predicado verbal en español para hacer inteligible el juego de palabras. «Se volverán engaño» conserva la ironía sin perder el vínculo semántico con «Aczib».
- source_word: לְמַלְכֵי יִשְׂרָאֵל
  english_pob_choice: to the kings of Israel
  chosen_spanish: para los reyes de Israel
  alternatives_spanish:
  - a los reyes de Israel
  - para los reyes de Israel
  lexicon: HALOT
  rationale: La relación dativa se expresa naturalmente con «para» en español, reflejando la lectura revisada del inglés POB y manteniendo el destinatario del engaño.
theological_decisions:
- issue: Addressee implied by the feminine singular verb
  english_pob_reading: The verse addresses Judah/Jerusalem/Zion personified as a woman.
  chosen_spanish_reading: El verso mantiene implícita una destinataria femenina singular, sin explicitarla en el texto principal.
  alternative_spanish_readings:
  - Dirigido explícitamente a Judá/Jerusalén/Sion personificada como mujer
  - Dirigido a la ciudad Moreset-gat personificada
  rationale: El hebreo exige un sujeto femenino singular, pero el contexto permite más de una identificación. El español conserva esa ambigüedad, evitando añadir una especificación que el texto no obliga a fijar.
  doctrine_reference: 'Principio POB: preservar la ambigüedad real del original y no importar una identificación no explicitada por el texto.'
- issue: Wordplay between Achzib and deception
  english_pob_reading: Achzib sounds like the Hebrew word for deception or disappointment, creating a wordplay.
  chosen_spanish_reading: Aczib mantiene el juego de palabras mediante la cercanía sonora con la idea de engaño que el predicado expresa.
  alternative_spanish_readings:
  - Aczib sonará como engaño o desilusión
  - Las casas de Aczib resultarán decepcionantes
  rationale: Conviene conservar el topónimo y traducir el predicado de modo que el lector perciba el contraste irónico. «Se volverán engaño» preserva el paralelismo entre nombre propio y contenido semántico.
  doctrine_reference: 'Principio POB: cuando hay un juego verbal, la traducción debe hacerlo perceptible sin inventarlo.'
translation_notes:
  revision_awareness: Se siguió la revisión más reciente del inglés POB, que cambió la preposición a «for Moresheth-gath»; por eso se optó por «por Moreset-gat» en lugar de un dativo más directo. También se respetó la decisión de mantener el juego de palabras con Aczib sin convertirlo en una paráfrasis explicativa.
  spanish_consistency_notes:
  - Se usó «Yahvé» como forma base en el proyecto, pero este versículo no contiene el nombre divino.
  - Se prefirió «Aczib» para el topónimo, consistente con transliteración española común y con el juego de palabras del hebreo.
  - Se mantuvo «reyes de Israel» en plural, siguiendo el hebreo y el POB inglés.
