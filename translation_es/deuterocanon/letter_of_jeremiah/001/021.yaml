review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien la estructura y el sentido literal del griego: animales que se posan sobre los cuerpos y cabezas de los ídolos, mostrando su impotencia. Los términos principales están bien resueltos: ''sobre'', ''cuerpos'', ''cabezas'', ''murciélagos'', ''golondrinas'', ''las aves'' y ''los gatos'' corresponden adecuadamente al texto fuente y al rastro de auditoría inglés.'
  spanish_quality_summary: El texto es claro y natural en español, pero la nota al pie actual es defectuosa porque repite 'se posan' como alternativa de 'alight', que ya es la traducción principal, y no preserva bien las alternativas documentadas en inglés. Conviene reparar solo esa nota. La frase 'y asimismo también' es algo cargada, pero sigue siendo aceptable como reflejo del énfasis aditivo griego.
  glossary_alignment: No hay conflictos con la terminología base del proyecto. No aparecen términos sensibles como Yahvé, Mesías, Espíritu, etc. La decisión 'se posan' para ἐφίπτανται es fiel y idiomática en español.
  issues:
  - severity: medium
    issue: Nota al pie léxica mal formulada
    rationale: 'La nota dice: "O ''se posan'' o ''vuelan sobre'' para ''alight''", pero ''se posan'' no es una alternativa, sino la propia traducción adoptada en español. Debe reflejar alternativas reales, paralelas a las documentadas en el inglés auditado, como ''se posan sobre'' o ''vuelan sobre''.'
  revised_spanish_text: Sobre sus cuerpos y sobre sus cabezas se posan murciélagos[a], golondrinas y las aves, y asimismo también los gatos.
  revised_footnotes:
  - marker: a
    text: O 'se posan sobre' o 'vuelan sobre' para 'se posan'.
    reason: lexical_alternative
  revision_rationale: Se conserva el texto principal porque es fiel al griego y natural en español. Solo se corrige la nota al pie para que presente alternativas léxicas reales para ἐφίπτανται, en línea con la auditoría inglesa.
