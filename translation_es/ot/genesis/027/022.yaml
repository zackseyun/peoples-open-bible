lexical_decisions:
- source_word: וַיִּגַּשׁ
  english_pob_choice: went near
  chosen_spanish: se acercó
  alternatives_spanish:
  - se aproximó
  - vino cerca
  lexicon: HALOT
  rationale: נגשׁ expresa acercarse o aproximarse. «Se acercó» comunica el movimiento narrativo de manera natural en español y conserva el valor de la forma wayyiqtol sin sobrecargar el texto.
- source_word: וַיְמֻשֵּׁהוּ
  english_pob_choice: he felt him
  chosen_spanish: lo palpó
  alternatives_spanish:
  - lo tocó
  - lo examinó al tacto
  lexicon: HALOT
  rationale: מושׁ aquí implica una exploración táctil para verificar la identidad. «Lo palpó» transmite mejor esa comprobación deliberada que un simple «lo tocó».
- source_word: הַקֹּל / קוֹל יַעֲקֹב
  english_pob_choice: The voice is Jacob’s voice
  chosen_spanish: La voz es la voz de Jacob
  alternatives_spanish:
  - La voz es voz de Jacob
  - La voz es la voz de Jacob
  lexicon: HALOT
  rationale: קול puede significar «voz» o «sonido»; en este contexto la oposición es entre la identidad vocal y la evidencia táctil. Mantener «voz» preserva el contraste del hebreo. La repetición «la voz... la voz de Jacob» refleja el énfasis del original.
- source_word: וְהַיָּדַיִם יְדֵי עֵשָׂו
  english_pob_choice: but the hands are Esau’s hands
  chosen_spanish: pero las manos son las manos de Esaú
  alternatives_spanish:
  - y las manos son las manos de Esaú
  - mas las manos son las manos de Esaú
  lexicon: HALOT
  rationale: El hebreo presenta una cláusula nominal con repetición enfática. En español, «las manos son las manos de Esaú» mantiene esa fuerza retórica. «Pero» explicita el contraste que en hebreo queda implícito en la simple conjunción waw.
- source_word: אָבִיו
  english_pob_choice: his father
  chosen_spanish: su padre
  alternatives_spanish:
  - a su padre
  - el padre de él
  lexicon: HALOT
  rationale: La referencia posesiva es directa y relacional. «Su padre» es la forma natural y fiel en español, manteniendo la información explícita del hebreo.
theological_decisions:
- issue: Conservar el contraste entre voz e identidad táctil sin suavizar la tensión narrativa
  english_pob_reading: The voice is Jacob’s voice, but the hands are Esau’s hands.
  chosen_spanish_reading: La voz es la voz de Jacob, pero las manos son las manos de Esaú.
  alternative_spanish_readings:
  - La voz es la voz de Jacob, y las manos son las manos de Esaú
  - La voz es de Jacob, pero las manos son de Esaú
  rationale: 'La frase hebrea usa repetición enfática y oposición directa. La traducción elegida conserva ambas: la repetición nominal y el contraste. Evita neutralizar la tensión del reconocimiento parcial de Isaac.'
  doctrine_reference: Narrativa patriarcal; fidelidad textual al hebreo sin implicación doctrinal específica
translation_notes:
  revision_awareness: 'Coincide con el estado de alta concordancia del expediente inglés; no se registran revisiones aplicadas. Se conserva la solución óptima-equivalente del audit trail: acercamiento físico, palpación deliberada y cláusulas nominales enfáticas. '
  spanish_consistency_notes:
  - Se usa «Jacob» y «Isaac» como nombres propios estándar.
  - Se mantiene «Esaú» con acentuación habitual en español.
  - «Palpó» se eligió para reflejar una exploración táctil más específica que «tocó».
  - La nota a preserva la alternativa de la cláusula nominal completa, como en el inglés POB.
