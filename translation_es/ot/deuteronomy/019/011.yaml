translation:
  language: es
  text: Pero si hay un hombre que aborrece a su prójimo, y le acecha, y se levanta contra él, y lo golpea[a] de modo que muere, y huye a una de estas ciudades,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «lo hiere mortalmente» o «lo golpea de modo que muere». La expresión hebrea es literalmente «lo golpea [en] vida/alma», un modismo para dar un golpe letal.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְכִי
  english_pob_choice: But if
  chosen_spanish: Pero si
  alternatives_spanish:
  - Y si
  - Ahora bien, si
  lexicon: HALOT
  rationale: La partícula abre un caso legal contrastivo. «Pero si» conserva el giro adversativo y la condicionalidad de forma natural en español.
- source_word: יִהְיֶה אִישׁ
  english_pob_choice: there is a man
  chosen_spanish: hay un hombre
  alternatives_spanish:
  - existe un hombre
  - si un hombre
  lexicon: HALOT
  rationale: La construcción existencial hebrea se expresa de manera natural con «hay». Se mantiene «hombre» porque el hebreo es masculino y presenta un caso jurídico representativo.
- source_word: שֹׂנֵא לְרֵעֵהוּ
  english_pob_choice: who hates his neighbor
  chosen_spanish: que aborrece a su prójimo
  alternatives_spanish:
  - que odia a su vecino
  - que es hostil a su prójimo
  lexicon: HALOT
  rationale: «Aborrece» recoge con fuerza el participio de odio y evita una debilidad semántica. «Prójimo» transmite bien el valor relacional y legal de רֵעַ sin reducirlo a amistad íntima.
- source_word: וְאָרַב לוֹ
  english_pob_choice: and lies in wait for him
  chosen_spanish: y le acecha
  alternatives_spanish:
  - y le tiende una emboscada
  - y está al acecho de él
  lexicon: HALOT
  rationale: El verbo implica acecho premeditado. «Le acecha» preserva la deliberación y la imagen de emboscada sin recargar el texto.
- source_word: וְקָם עָלָיו
  english_pob_choice: and rises up against him
  chosen_spanish: y se levanta contra él
  alternatives_spanish:
  - y se alza contra él
  - y lo ataca
  lexicon: HALOT
  rationale: La locución idiomática se conserva con «se levanta contra él», que suena natural y mantiene el paralelismo del hebreo.
- source_word: וְהִכָּהוּ נֶפֶשׁ
  english_pob_choice: and strikes him so that he dies
  chosen_spanish: y lo hiere de modo que muere
  alternatives_spanish:
  - y lo golpea mortalmente
  - y le da un golpe que le quita la vida
  lexicon: HALOT
  rationale: La POB inglesa revisó la frase para evitar añadir una interpretación más fuerte. En español, «lo hiere de modo que muere» refleja el resultado sin forzar una lectura técnica adicional ni ocultar la construcción idiomática.
- source_word: וָמֵת
  english_pob_choice: so that he dies
  chosen_spanish: de modo que muere
  alternatives_spanish:
  - y muere
  - con el resultado de que muere
  lexicon: HALOT
  rationale: Se conserva la relación consecutiva entre el golpe y la muerte, de manera clara y sobria.
- source_word: וְנָס
  english_pob_choice: and he flees
  chosen_spanish: y huye
  alternatives_spanish:
  - y escapa
  - y sale huyendo
  lexicon: HALOT
  rationale: El verbo básico es «huir». Se omite el pronombre explícito porque el español ya lo recupera por la conjugación verbal.
- source_word: אֶל אַחַת הֶעָרִים הָאֵל
  english_pob_choice: to one of these cities
  chosen_spanish: a una de estas ciudades
  alternatives_spanish:
  - a una de esas ciudades
  - a una de estas poblaciones
  lexicon: HALOT
  rationale: «Ciudades» es la equivalencia directa de עָרִים. «Estas» refleja el demostrativo proximal en el contexto de las ciudades de refugio mencionadas inmediatamente antes.
theological_decisions:
- issue: Descripción legal del homicidio intencional frente al homicidio accidental
  english_pob_reading: The verse is rendered to emphasize premeditation and lethal intent through the sequence 'hates ... lies in wait ... rises up against ... strikes him so that he dies.'
  chosen_spanish_reading: La secuencia «aborrece ... le acecha ... se levanta contra ... lo hiere de modo que muere» mantiene la premeditación y el resultado mortal sin resumirlo con una etiqueta interpretativa como «asesina» en el texto principal.
  alternative_spanish_readings:
  - «y lo mata»
  - «y comete homicidio contra él»
  rationale: El hebreo presenta una cadena de acciones, no una sola síntesis. Mantener esa cadena evita añadir una paráfrasis más fuerte que el enunciado fuente, aunque el sentido jurídico sea claramente homicidio intencional.
  doctrine_reference: Principio de fidelidad semántica y preservación de la progresión legal del texto.
translation_notes:
  revision_awareness: La POB inglesa revisó la frase final desde una formulación más interpretativa («strikes him fatally») a una más cercana al hebreo («strikes him so that he dies»). La versión española sigue esa revisión y evita añadir un adverbio interpretativo que no está explícito en el texto fuente.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» en la tradición POB cuando aparezca el nombre divino; aquí no aparece.
  - Se usa «prójimo» como término relacional legal para רֵעַ, en lugar de «amigo» o «vecino», siguiendo el valor contextual del hebreo.
  - Se conserva el paralelismo verbal del original en una línea sintáctica natural para el español.
  - No se introduce nota al pie porque el matiz lexical queda suficientemente reflejado en el texto principal y en las decisiones léxicas.
