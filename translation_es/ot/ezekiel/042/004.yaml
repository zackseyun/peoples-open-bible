revisions:
- from: Delante de las cámaras había un pasillo de diez codos de ancho hacia el patio interior[a], y un corredor de un codo de ancho[b]; y sus entradas daban al norte.
  to: Delante de las cámaras había una vía de paso de diez codos de ancho hacia la parte interior[a], y un paso de un codo de ancho[b], y sus entradas daban al norte.
  rationale: Se ajusta el texto principal para reflejar con más fidelidad la elipsis de אֶל הַפְּנִימִית, evitando introducir «patio» como si fuera explícito en el hebreo. También se mejora la distinción entre מַהֲלַךְ y דֶּרֶךְ con dos expresiones españolas relacionadas pero no idénticas, y se pule la fluidez de la puntuación. Las notas conservan la información auditada sobre la alternativa «patio interior» y la dificultad textual de la segunda medida.
