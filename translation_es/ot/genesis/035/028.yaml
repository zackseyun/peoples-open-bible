revisions:
- from: Y fueron los días de Isaac de cien años y ochenta años[a].
  to: Y los días de Isaac fueron ciento ochenta años[a].
  rationale: 'Se conserva el modismo fuente «los días de Isaac», en línea con el POB inglés, pero se corrige la expresión numérica a un español natural y fiel: «ciento ochenta años». También se mejora el orden de la oración para que suene digno y claro sin perder la forma semítica relevante. La nota sigue documentando el hebreo subyacente y el valor idiomático de «días».'
