translation:
  language: es
  text: 'Pero, inclinándose hacia él, y burlándose del cruel tirano, habló en su lengua nativa[a] así: «Hijo mío, ten misericordia de mí, que te llevé en el vientre durante nueve meses, te amamanté durante tres años[b], te crié, te conduje hasta esta edad y te cuidé».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «en su lengua ancestral» / «en la lengua de sus padres». El griego alude literalmente a la lengua propia o heredada de la familia.
    reason: lexical_alternative
  - marker: b
    text: O «te crié al pecho durante tres años».
    reason: lexical_alternative
lexical_decisions:
- source_word: προσκύψασα
  english_pob_choice: bending down
  chosen_spanish: inclinándose hacia él
  alternatives_spanish:
  - inclinándose
  - doblándose hacia él
  - agachándose hacia él
  lexicon: LSJ
  rationale: El participio describe un movimiento corporal concreto hacia el hijo. «Inclinándose hacia él» conserva la cercanía física y la naturalidad del español sin añadir una intención no explicitada.
- source_word: χλενάσασα
  english_pob_choice: mocking
  chosen_spanish: burlándose
  alternatives_spanish:
  - mofándose
  - ridiculizándolo
  - scoffing at
  lexicon: LSJ
  rationale: El contexto expresa desprecio valeroso contra el tirano. «Burlándose» comunica bien el matiz de escarnio en español y mantiene la fuerza del gesto.
- source_word: τὸν ὠμὸν τύραννον
  english_pob_choice: the savage tyrant
  chosen_spanish: el cruel tirano
  alternatives_spanish:
  - el tirano salvaje
  - el tirano cruel
  - el tirano despiadado
  lexicon: LSJ
  rationale: ὠμός puede abarcar crueldad y rudeza violenta. «Cruel» es la opción más natural y comprensible en español bíblico actual; «tirano» conserva τύραννος. Se evita «salvaje» por sonar más cargado en español que en el contexto griego.
- source_word: τῇ πατρίᾳ φωνῇ
  english_pob_choice: in her native tongue
  chosen_spanish: en su lengua nativa
  alternatives_spanish:
  - en la lengua de sus padres
  - en su lengua ancestral
  - en su habla paterna
  lexicon: LSJ
  rationale: La frase señala la lengua propia de la familia o del pueblo, no una fórmula litúrgica. «Lengua nativa» en español es claro, neutral y reproduce el valor étnico-cultural del giro griego.
- source_word: ἐλέησόν με
  english_pob_choice: have mercy on me
  chosen_spanish: ten misericordia de mí
  alternatives_spanish:
  - ten compasión de mí
  - apiádate de mí
  - muestra misericordia conmigo
  lexicon: BDAG
  rationale: La apelación directa se expresa de modo natural en español con «ten misericordia de mí». Conserva la fuerza verbal del imperativo sin suavizar el clamor de la madre.
- source_word: τὴν ἐν γαστρὶ περιενέγκασάν σε
  english_pob_choice: who carried you in the womb
  chosen_spanish: que te llevé en el vientre
  alternatives_spanish:
  - que te llevé en el vientre materno
  - que te porté en el vientre
  - que te llevé en mi seno
  lexicon: LSJ
  rationale: El griego alude al embarazo de modo corporal. «Llevé en el vientre» es idiomático en español, fiel y suficientemente solemne; «vientre» evita una paráfrasis excesiva.
- source_word: θηλάσασάν σε ἔτη τρία
  english_pob_choice: nursed you for three years
  chosen_spanish: te amamanté durante tres años
  alternatives_spanish:
  - te crié con el pecho durante tres años
  - te lacté durante tres años
  - te crié mamándote durante tres años
  lexicon: LSJ
  rationale: θῆλαζω se refiere específicamente a amamantar/succionar del pecho. «Amamanté» expresa con precisión el acto y evita ambigüedad con «criar».
- source_word: ἐκθρέψασάν σε
  english_pob_choice: raised you
  chosen_spanish: te crié
  alternatives_spanish:
  - te eduqué
  - te levanté
  - te crié y alimenté
  lexicon: LSJ
  rationale: El verbo implica alimentar y criar hasta la madurez. «Te crié» es la equivalencia más natural y breve en español, y encaja con la serie de cuidados maternos.
- source_word: ἀγαγοῦσαν εἰς τὴν ἡλικίαν ταύτην
  english_pob_choice: brought you to this age
  chosen_spanish: te conduje hasta esta edad
  alternatives_spanish:
  - te llevé hasta esta edad
  - te traje a esta edad
  - te guié hasta esta edad
  lexicon: LSJ
  rationale: El griego presenta una acción de llevar/introducir hasta el momento presente de madurez. «Conduje hasta esta edad» mantiene el valor de guía y culminación; se conserva la referencia temporal explícita.
- source_word: τροφοφορήσασαν
  english_pob_choice: cared for you
  chosen_spanish: y te he cuidado
  alternatives_spanish:
  - y te he sustentado
  - y te he proveído
  - y te he alimentado
  lexicon: LSJ
  rationale: El término expresa sostén y cuidado continuo. «Te he cuidado» recoge bien el sentido amplio sin duplicar exactamente «te crié», y evita forzar un matiz más específico que el texto no exige.
theological_decisions:
- issue: La madre se dirige al hijo y le pide misericordia
  english_pob_reading: have mercy on me
  chosen_spanish_reading: ten misericordia de mí
  alternative_spanish_readings:
  - ten compasión de mí
  - apiádate de mí
  rationale: No hay problema doctrinal controvertido; la decisión busca preservar la intensidad emocional y la forma directa del ruego materno en un español plenamente idiomático.
  doctrine_reference: Translation philosophy §1, §6
- issue: Sentido de τῇ πατρίᾳ φωνῇ
  english_pob_reading: in her native tongue
  chosen_spanish_reading: en su lengua nativa
  alternative_spanish_readings:
  - en la lengua de sus padres
  - en su lengua ancestral
  rationale: La expresión subraya identidad familiar y cultural. Se evita imponer una lectura litúrgica o eclesiástica; el español debe reflejar el carácter étnico y doméstico del giro griego.
  doctrine_reference: Translation philosophy §6
translation_notes:
  revision_awareness: 'La redacción sigue el acuerdo alto del POB inglés y su revisión más reciente, pero reequilibra varios puntos léxicos para el español: se prefirió «inclinándose hacia él» frente a «bending down», «burlándose» para el escarnio, «lengua nativa» para τῇ πατρίᾳ φωνῇ, «ten misericordia de mí» para ἐλέησόν με, y «te amamanté» como alternativa explícita a «te crié durante tres años», manteniendo el valor físico del verbo griego.'
  spanish_consistency_notes:
  - Se preserva el tono narrativo elevado sin arcaísmos innecesarios.
  - Se mantiene la distinción entre «lengua nativa» y el contenido del habla, sin convertirla en una nota interpretativa dentro del texto.
  - Se usa «misericordia» para conservar la fórmula bíblica directa del imperativo griego.
  - Se evita «SEÑOR» u otras sustituciones no presentes en el versículo.
  - 'La secuencia de cuidados maternos refleja el acumulado del griego: embarazo, lactancia, crianza, conducción a la madurez y cuidado continuo.'
