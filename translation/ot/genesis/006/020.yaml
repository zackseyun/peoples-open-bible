id: GEN.6.20
reference: Genesis 6:20
source:
  edition: WLC
  text: מֵ/הָ/ע֣וֹף לְ/מִינֵ֗/הוּ וּ/מִן הַ/בְּהֵמָה֙ לְ/מִינָ֔/הּ מִ/כֹּ֛ל רֶ֥מֶשׂ הָֽ/אֲדָמָ֖ה לְ/מִינֵ֑/הוּ שְׁנַ֧יִם מִ/כֹּ֛ל יָבֹ֥אוּ אֵלֶ֖י/ךָ לְ/הַֽחֲיֽוֹת־׃
translation:
  text: From the birds according to their kinds[a], and from the livestock according to their kinds, from every creeping thing of the ground according to its kind, two of each will come to you to keep them alive.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'after their kind,' a traditional rendering of לְמִין that preserves the same basic sense.
    reason: lexical_alternative
lexical_decisions:
- source_word: הָעוֹף
  chosen: the birds
  alternatives:
  - the flying creatures
  - the fowl
  lexicon: HALOT
  rationale: עוֹף denotes flying creatures/birds. In this context, 'birds' is the most natural modern English rendering and fits the animal categories listed.
- source_word: לְמִינֵהוּ / לְמִינָהּ
  chosen: according to their kinds / according to its kind
  alternatives:
  - after their kind
  - by their kind
  lexicon: HALOT
  rationale: מִין refers to a kind or species-category. 'According to' is clear modern English and preserves the classificatory sense without importing modern biological taxonomy.
- source_word: הַבְּהֵמָה
  chosen: the livestock
  alternatives:
  - the cattle
  - the beasts
  lexicon: HALOT
  rationale: בְּהֵמָה here refers to land animals in the domestic-animal category, contrasted with birds and creeping things. 'Livestock' is clearer and more natural than the traditional but narrower 'cattle' or broader 'beasts.'
- source_word: רֶמֶשׂ הָאֲדָמָה
  chosen: every creeping thing of the ground
  alternatives:
  - every creeping thing on the earth
  - every swarming thing of the ground
  lexicon: HALOT
  rationale: רֶמֶשׂ denotes small moving/creeping creatures. 'Of the ground' reflects הָאֲדָמָה more precisely than 'earth,' especially in contrast with birds and livestock.
- source_word: שְׁנַיִם מִכֹּל
  chosen: two of every sort
  alternatives:
  - two of each
  - two from all
  lexicon: HALOT
  rationale: The phrase means two from every category mentioned. 'Two of every sort' is idiomatic English that preserves distributive force; 'of each' is possible but slightly less explicit after the repeated category markers.
- source_word: יָבֹאוּ אֵלֶיךָ
  chosen: will come to you
  alternatives:
  - shall come to you
  - will enter to you
  lexicon: HALOT
  rationale: בוא with אֶל indicates movement toward Noah. 'Will come to you' is the plain sense and avoids over-specifying entry into the ark, which is implied by context but not stated in this clause.
- source_word: לְהַחֲיוֹת
  chosen: to keep them alive
  alternatives:
  - to preserve alive
  - to let live
  lexicon: HALOT
  rationale: The Hiphil of חיה means to keep alive or preserve life. 'To keep them alive' is clear modern English and captures the purposive force of the infinitive.
