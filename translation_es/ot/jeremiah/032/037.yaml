translation:
  language: es
  text: He aquí[a], los estoy reuniendo de todas las tierras adonde los arrojé en mi enojo y en mi furor y en gran indignación[b], y los haré volver a este lugar y los haré habitar seguros.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «He aquí, los reuniré». La construcción hebrea puede expresar una acción futura inminente o segura.'
    reason: lexical_alternative
  - marker: b
    text: «Gran indignación» traduce un tercer término hebreo para la ira divina, y preserva la acumulación de lenguaje de juicio en el versículo.
    reason: lexical_alternative
lexical_decisions:
- source_word: הִנְנִי
  english_pob_choice: Behold
  chosen_spanish: He aquí
  alternatives_spanish:
  - Mira
  - Miren
  lexicon: HALOT
  rationale: La fórmula profética introduce la declaración con énfasis e inmediatez. «He aquí» conserva mejor ese tono solemne que un «mira» más coloquial.
- source_word: מְקַבְּצָם
  english_pob_choice: I am gathering them
  chosen_spanish: los estoy reuniendo
  alternatives_spanish:
  - los reuniré
  - los reúno
  lexicon: HALOT
  rationale: Con הִנְנִי + participio, el hebreo puede expresar acción inminente o segura. «Los estoy reuniendo» mantiene esa fuerza aspectual sin volverla rígidamente futura.
- source_word: מִכָּל הָאֲרָצוֹת
  english_pob_choice: from all the lands
  chosen_spanish: de todas las tierras
  alternatives_spanish:
  - de todos los países
  - de todas las naciones
  lexicon: HALOT
  rationale: Aquí אֲרָצוֹת se refiere a territorios de destierro, no a la tierra en sentido cósmico. «Tierras» es natural y suficientemente amplio en español.
- source_word: הִדַּחְתִּים
  english_pob_choice: I drove them
  chosen_spanish: los arrojé
  alternatives_spanish:
  - los expulsé
  - los desterré
  lexicon: HALOT
  rationale: El verbo expresa expulsión forzada por parte de Dios. «Arrojé» transmite con mayor viveza esa severidad; «expulsé» y «desterré» suavizan o especifican más de lo que exige el texto.
- source_word: בְּאַפִּי
  english_pob_choice: in my anger
  chosen_spanish: en mi enojo
  alternatives_spanish:
  - en mi ira
  - en mi furor
  lexicon: HALOT
  rationale: El hebreo usa un modismo de ira divina. «En mi enojo» es claro en español moderno; mantiene el valor afectivo sin volverlo técnico.
- source_word: וּבַחֲמָתִי
  english_pob_choice: and in my wrath
  chosen_spanish: en mi furor
  alternatives_spanish:
  - en mi ira
  - en mi indignación
  lexicon: HALOT
  rationale: Conviene variar el segundo término para no aplanar la acumulación hebrea de sinónimos. «Furor» conserva solemnidad y una intensidad mayor que «enojo».
- source_word: וּבְקֶצֶף גָּדוֹל
  english_pob_choice: and in great indignation
  chosen_spanish: y en gran indignación
  alternatives_spanish:
  - y en gran ira
  - y en gran furor
  lexicon: HALOT
  rationale: El texto suma un tercer término para intensificar el juicio. «Gran indignación» reproduce bien esa tercera capa semántica, manteniendo la distinción con «enojo» y «furor».
- source_word: וַהֲשִׁבֹתִים
  english_pob_choice: I will bring them back
  chosen_spanish: los haré volver
  alternatives_spanish:
  - los traeré de vuelta
  - los devolveré
  lexicon: HALOT
  rationale: En contexto de exilio y retorno, el causativo de שוב se expresa mejor con «hacer volver». Es más fiel y más natural que «traer de vuelta» en un registro bíblico digno.
- source_word: אֶל הַמָּקוֹם הַזֶּה
  english_pob_choice: to this place
  chosen_spanish: a este lugar
  alternatives_spanish:
  - a este sitio
  - a este lugar mismo
  lexicon: HALOT
  rationale: La frase señala el lugar concreto del pacto y del retorno. «A este lugar» conserva la deixis sin añadir identificación interpretativa.
- source_word: וְהֹשַׁבְתִּים
  english_pob_choice: make them dwell
  chosen_spanish: los haré habitar
  alternatives_spanish:
  - los asentaré
  - les haré vivir
  lexicon: HALOT
  rationale: El causativo de ישׁב significa causar que habiten o se establezcan. «Los haré habitar» preserva la fuerza causativa y suena natural en español.
- source_word: לָבֶטַח
  english_pob_choice: in safety
  chosen_spanish: en seguridad
  alternatives_spanish:
  - con seguridad
  - seguros
  lexicon: HALOT
  rationale: El adverbio indica una permanencia sin amenaza. «En seguridad» reproduce de modo sobrio y formal el sentido de protección estable.
theological_decisions:
- issue: Conservación de la pila de términos de juicio divino
  english_pob_reading: anger / wrath / great indignation
  chosen_spanish_reading: enojo / furor / gran indignación
  alternative_spanish_readings:
  - ira / furor / gran ira
  - enojo / ira / gran indignación
  rationale: El hebreo acumula tres expresiones cercanas pero no idénticas para el disgusto judicial de Yahvé. Mantener tres términos distintos en español evita borrar la intensificación retórica y preserva la tensión del texto.
  doctrine_reference: Translation philosophy §3, §5
- issue: Valor de הִנְנִי + participio al inicio
  english_pob_reading: Behold, I am gathering them
  chosen_spanish_reading: He aquí, los estoy reuniendo
  alternative_spanish_readings:
  - He aquí, los reuniré
  - Miren, los estoy reuniendo
  rationale: La construcción puede señalar acción futura inminente o segura. El presente progresivo en español conserva mejor esa cercanía de cumplimiento sin perder la dimensión profética de certeza.
  doctrine_reference: Translation philosophy §1, §6
translation_notes:
  revision_awareness: La redacción sigue de cerca el texto hebreo y coincide con la decisión inglesa auditada de conservar el valor aspectual de הִנְנִי + participio y la acumulación de términos de juicio. No se aplicaron revisiones posteriores en el expediente inglés, y el cotejo final reportó alto acuerdo.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» reservado para casos donde el hebreo tenga el tetragrámaton; este versículo no lo contiene.
  - Se conservó la variación léxica entre «enojo», «furor» y «gran indignación» para no neutralizar la progresión retórica.
  - «He aquí» funciona como fórmula profética y no como simple marcador coloquial.
  - El destino del retorno se dejó en «este lugar» sin identificarlo explícitamente para respetar la deixis del hebreo.
