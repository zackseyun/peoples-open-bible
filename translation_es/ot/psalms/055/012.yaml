translation:
  language: es
  text: Destrucción[a] está dentro de ella; la opresión y el engaño no se apartan de su plaza[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «males destructores». El hebreo usa un sustantivo plural; el español adopta un singular colectivo por fluidez y porque el pasaje describe una condición de ruina omnipresente.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «de sus calles». רְחוֹב puede designar de forma más específica una plaza o lugar público abierto dentro de la ciudad.'
    reason: lexical_alternative
lexical_decisions:
- source_word: הַוּוֹת
  english_pob_choice: Destruction
  chosen_spanish: Destrucción
  alternatives_spanish:
  - ruina
  - males destructores
  - calamidades
  lexicon: HALOT
  rationale: 'El sustantivo plural puede denotar ruina, males destructivos o actos destructivos. En este contexto de personificación de una ciudad, el español natural y fiel es un singular colectivo: «Destrucción», que conserva la idea de una condición devastadora y generalizada.'
- source_word: בְּקִרְבָּהּ
  english_pob_choice: within her
  chosen_spanish: dentro de ella
  alternatives_spanish:
  - en medio de ella
  - en su interior
  - en su seno
  lexicon: HALOT
  rationale: La expresión indica interioridad espacial. «Dentro de ella» preserva la personificación femenina de la ciudad y su sentido locativo sin sonar forzado en español.
- source_word: יָמִישׁ
  english_pob_choice: do not depart
  chosen_spanish: no se apartan
  alternatives_spanish:
  - no se alejan
  - no cesan
  - no salen
  lexicon: HALOT
  rationale: Aunque el verbo hebreo está en singular, el sujeto coordinado «opresión y engaño» funciona naturalmente en plural distributivo en español. «No se apartan» comunica continuidad y permanencia, en paralelo con la lectura auditada en inglés.
- source_word: מֵרְחֹבָהּ
  english_pob_choice: from her square
  chosen_spanish: de su plaza
  alternatives_spanish:
  - de sus calles
  - de su espacio público
  - de su plaza abierta
  lexicon: HALOT
  rationale: רְחוֹב puede referirse a un espacio público abierto, incluso una plaza. «Plaza» es la opción española más natural y concreta para mantener el matiz urbano del hebreo, aunque «calles» sea una alternativa más amplia.
- source_word: תֹּךְ
  english_pob_choice: oppression
  chosen_spanish: la opresión
  alternatives_spanish:
  - la extorsión
  - la violencia
  - el abuso
  lexicon: HALOT
  rationale: El término puede expresar opresión, extorsión o daño social. «La opresión» es la equivalencia general más clara en español y encaja bien con la pareja léxica con «engaño».
- source_word: וּמִרְמָה
  english_pob_choice: and deceit
  chosen_spanish: y el engaño
  alternatives_spanish:
  - y la traición
  - y el fraude
  - y la falsedad
  lexicon: HALOT
  rationale: מִרְמָה suele significar engaño, fraude o traición. «El engaño» es la traducción más directa y transparente en español, sin perder el matiz moral negativo del término.
translation_notes:
  revision_awareness: El texto sigue de cerca el audit trail inglés y no introduce cambios sustantivos respecto de la revisión más reciente, que quedó marcada como sin cambios. Se conserva la personificación femenina de la ciudad y la pareja de evils/urban-public-space con una solución española natural.
  spanish_consistency_notes:
  - Se mantuvo «ella/su» para reflejar la personificación de la ciudad, como en el inglés auditado.
  - Se prefirió un singular colectivo («Destrucción») para el plural hebreo הַוּוֹת, siguiendo la lógica semántica documentada en la auditoría.
  - Se usó «plaza» para רְחוֹב por consistencia con la decisión inglesa y por ser el equivalente urbano más plausible en español.
  - «Opresión» y «engaño» conservan la tensión social y moral del hebreo sin suavizarla.
