translation:
  language: es
  text: Y pondré la llave de la casa de David sobre su hombro; él abrirá[a], y nadie cerrará; él cerrará, y nadie abrirá.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Esta imagen de abrir y cerrar como autoridad incontestable se refleja en Apocalipsis 3:7.
    reason: cross_reference
lexical_decisions:
- source_word: וְנָתַתִּי
  english_pob_choice: And I will place
  chosen_spanish: Y pondré
  alternatives_spanish:
  - Y daré
  - Y colocaré
  lexicon: HALOT
  rationale: נתן puede significar ‘dar’, ‘poner’, ‘colocar’. Aquí, con ‘sobre su hombro’, ‘pondré’ comunica de manera natural y concreta la acción de asignar o situar la llave como símbolo de autoridad, sin expandir el sentido.
- source_word: מַפְתֵּחַ
  english_pob_choice: the key
  chosen_spanish: la llave
  alternatives_spanish:
  - la clave
  - una llave
  lexicon: HALOT
  rationale: El sustantivo designa una llave literal y simbólica de autoridad. En español, ‘llave’ conserva mejor el valor concreto y el simbolismo que ‘clave’.
- source_word: בֵּית דָּוִד
  english_pob_choice: the house of David
  chosen_spanish: la casa de David
  alternatives_spanish:
  - la casa real de David
  - la dinastía de David
  lexicon: HALOT
  rationale: ‘Casa de David’ mantiene la forma formal y la referencia dinástica/administrativa del hebreo. No se amplía en el texto principal para no introducir explicación interpretativa.
- source_word: עַל שִׁכְמוֹ
  english_pob_choice: on his shoulder
  chosen_spanish: sobre su hombro
  alternatives_spanish:
  - en su hombro
  - sobre el hombro de él
  lexicon: HALOT
  rationale: Es una correspondencia directa y natural en español. Preserva la imagen concreta de la autoridad llevada sobre el hombro sin interpretar más allá de lo que el hebreo expresa.
- source_word: וּפָתַח
  english_pob_choice: he will open
  chosen_spanish: él abrirá
  alternatives_spanish:
  - abrirá él
  - y abrirá
  lexicon: HALOT
  rationale: El hebreo continúa la secuencia de futuro/resultado. ‘Él abrirá’ es claro y mantiene el paralelismo con la cláusula siguiente.
- source_word: וְאֵין סֹגֵר
  english_pob_choice: and no one will shut
  chosen_spanish: y nadie cerrará
  alternatives_spanish:
  - y no habrá quien cierre
  - y nadie lo cerrará
  lexicon: HALOT
  rationale: La construcción expresa que no hay persona capaz de revertir su acción. ‘Nadie cerrará’ conserva la fuerza de autoridad irresistible y suena natural en español.
- source_word: וְסָגַר
  english_pob_choice: he will shut
  chosen_spanish: él cerrará
  alternatives_spanish:
  - y cerrará
  - cerrará él
  lexicon: HALOT
  rationale: Se mantiene el paralelismo con ‘él abrirá’. ‘Cerrar’ corresponde al valor básico del verbo en este contexto de autoridad sobre acceso.
- source_word: וְאֵין פֹּתֵחַ
  english_pob_choice: and no one will open
  chosen_spanish: y nadie abrirá
  alternatives_spanish:
  - y no habrá quien abra
  - y nadie lo abrirá
  lexicon: HALOT
  rationale: Repite la estructura anterior para expresar que su acción de cerrar no puede ser anulada. ‘Nadie abrirá’ conserva la brevedad y el balance poético del hebreo.
theological_decisions:
- issue: Si hacer explícita la resonancia mesiánica o neotestamentaria en el texto principal
  english_pob_reading: Keep the verse at its immediate historical-literary level without inserting explicit messianic interpretation.
  chosen_spanish_reading: Mantener el versículo en su nivel histórico-literario inmediato, sin insertar una interpretación mesiánica explícita en el texto principal.
  alternative_spanish_readings:
  - Traducir de modo que resalte de forma explícita su uso posterior en Apocalipsis 3:7
  - Ampliar ‘la casa de David’ a ‘la casa real de David’ para subrayar la significación mesiánica
  rationale: El texto de Isaías habla directamente de autoridad delegada vinculada a la casa davídica. Esa resonancia posterior puede preservarse en nota, pero no debe incorporarse en la traducción principal para no cargar el versículo con una lectura posterior que el hebreo inmediato no exige.
  doctrine_reference: Primacía del texto original; conservar la tensión teológica sin resolverla en la traducción.
translation_notes:
  revision_awareness: No se registran revisiones aplicadas en el paquete de origen; la concordancia del control cruzado fue alta y el pasaje quedó sin cambios en la última pasada.
  spanish_consistency_notes:
  - Se usó ‘llave’ y no ‘clave’ para mantener el valor concreto del hebreo.
  - Se conservó ‘casa de David’ como fórmula dinástica estable, sin expansión interpretativa.
  - Se eligió lenguaje simple y digno, con paralelismo repetido en ‘él abrirá / él cerrará’ y ‘nadie cerrará / nadie abrirá’.
  - La nota cruza con Apocalipsis 3:7 sin introducir esa referencia en el cuerpo del versículo.
