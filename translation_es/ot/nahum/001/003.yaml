translation:
  language: es
  text: Yahvé es lento para la ira y grande en poder[a]; y de ningún modo dejará sin castigo al culpable. Yahvé—su camino está en el torbellino y en la tempestad, y las nubes son el polvo de sus pies.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, más formalmente: «y de ningún modo absolverá al culpable» o «y ciertamente no lo dejará impune».'
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהֹוָה / יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: La fuente hebrea usa el Tetragrámaton directamente, y el contexto auditado del POB inglés ya decidió no ocultarlo tras un sustituto reverencial. En español, 'Yahvé' preserva el nombre del pacto de manera natural y reconocible, evitando 'el SEÑOR' como máscara convencional.
- source_word: אֶרֶךְ אַפַּיִם
  english_pob_choice: slow to anger
  chosen_spanish: lento para la ira
  alternatives_spanish:
  - paciente
  - tardo en airarse
  lexicon: HALOT
  rationale: El modismo hebreo expresa longanimidad o tardanza en el enojo. 'Lento para la ira' comunica bien el sentido idiomático en español sin perder la referencia al carácter divino.
- source_word: וְגָדוֹל כֹּחַ
  english_pob_choice: and great in power
  chosen_spanish: grande en poder
  alternatives_spanish:
  - y poderoso en fuerza
  - y grande en fuerza
  lexicon: HALOT
  rationale: '''כֹּחַ'' abarca fuerza/poder; ''grande en poder'' mantiene la construcción breve y solemne del hebreo y corresponde al sentido del texto base y del POB inglés.'
- source_word: וְנַקֵּה לֹא יְנַקֶּה
  english_pob_choice: and he will by no means leave the guilty unpunished
  chosen_spanish: y de ningún modo dejará sin castigo al culpable
  alternatives_spanish:
  - y de ningún modo absolverá
  - y ciertamente no dejará inocente al culpable
  lexicon: HALOT
  rationale: La construcción enfática con נקה no debe suavizarse. 'De ningún modo' refleja la negación reforzada; 'dejará sin castigo al culpable' expresa la responsabilidad implícita del juicio divino, preservando la tensión entre paciencia y justicia.
- source_word: בְּסוּפָה וּבִשְׂעָרָה
  english_pob_choice: in the whirlwind and the storm
  chosen_spanish: en el torbellino y en la tempestad
  alternatives_spanish:
  - en el torbellino y en la tormenta
  - en la tempestad y en la tormenta
  lexicon: HALOT
  rationale: Ambos sustantivos describen fenómenos violentos del viento y la tormenta. 'Torbellino' y 'tempestad' conservan la imaginería poética con buena naturalidad en español.
- source_word: דַּרְכּוֹ
  english_pob_choice: his way
  chosen_spanish: su camino
  alternatives_spanish:
  - su senda
  - su proceder
  lexicon: HALOT
  rationale: '''Camino'' es el equivalente más directo y amplio de דֶּרֶךְ en este contexto metafórico; evita limitar innecesariamente la imagen a una ruta física o a un mero comportamiento.'
- source_word: וְעָנָן אֲבַק רַגְלָיו
  english_pob_choice: and clouds are the dust of his feet
  chosen_spanish: y las nubes son el polvo de sus pies
  alternatives_spanish:
  - y la nube es el polvo de sus pies
  lexicon: HALOT
  rationale: 'El sustantivo colectivo puede verterse naturalmente en plural en español. ''Polvo de sus pies'' preserva la imagen de majestad: las nubes como polvo levantado por el andar divino.'
theological_decisions:
- issue: Nombre divino YHWH
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: El texto hebreo nombra explícitamente a YHWH. Siguiendo la decisión de fondo del POB auditado y la política del proyecto, se conserva el nombre propio en español para no ocultar el dato textual ni diluir el pacto de Yahvé con su pueblo.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh (adaptado al español como Yahvé)'
- issue: Fuerza de la cláusula judicial נקה לא ינקה
  english_pob_reading: he will by no means leave the guilty unpunished
  chosen_spanish_reading: de ningún modo dejará sin castigo al culpable
  alternative_spanish_readings:
  - de ningún modo absolverá
  - ciertamente no dejará inocente al culpable
  rationale: La frase sostiene la tensión teológica entre la paciencia de Dios y su justicia retributiva. 'Sin castigo' evita reducir el hebreo a un tecnicismo forense y mantiene claro el resultado judicial implícito en el contexto.
  doctrine_reference: 'DOCTRINE.md Translation philosophy §3: Preserve theological tension rather than resolve it'
translation_notes:
  revision_awareness: Se siguió la revisión más reciente del POB inglés que intensifica la negación enfática de נקה לֹא יְנַקֶּה con 'by no means'. La redacción española refleja esa misma fuerza con 'de ningún modo', sin perder naturalidad ni añadir interpretación ajena al texto.
  spanish_consistency_notes:
  - Se mantuvo 'Yahvé' como forma constante para el nombre divino, conforme al estándar del proyecto.
  - 'Se preservó el paralelismo poético con dos miembros: carácter de Yahvé y manifestación cósmica de su andar.'
  - '''Torbellino'' y ''tempestad'' se eligieron para mantener el campo semántico de fenómenos violentos del viento.'
  - La nota al pie conserva la alternativa más formal de la cláusula judicial, como en el audit trail inglés.
