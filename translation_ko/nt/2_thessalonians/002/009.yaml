id: 2TH.2.9
reference: 2 Thessalonians 2:9
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: οὗ ἐστιν ἡ παρουσία κατ’ ἐνέργειαν τοῦ Σατανᾶ ἐν πάσῃ δυνάμει καὶ σημείοις καὶ τέρασιν ψεύδους
base_translation:
  language: en
  yaml_path: translation/nt/2_thessalonians/002/009.yaml
  text: whose coming is according to the working of Satan[b][a], with all power and signs and wonders of falsehood.
translation:
  language: ko
  text: 그의 오심[a]은 사탄의 활동을 따라 모든 능력과 표적과 거짓의 기사를[b] 동반합니다.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 또는 「임함」, 「강림」. 헬라어 παρουσία는 본 정황에서 불법의 자의 도래를 가리키며, 그리스도의 재림(2:1)을 흉내내는 패러디적 표현이다.
    reason: lexical_alternative
  - marker: b
    text: 또는 「거짓 표적과 기사」. 헬라어 ψεύδους(속격)는 표적·기사 모두를 한정한다고 볼 수 있다.
    reason: lexical_alternative
lexical_decisions:
- source_word: οὗ ἐστιν ἡ παρουσία
  english_pob_choice: whose coming is
  chosen_korean: 그의 오심은
  alternatives_korean:
  - 그의 임함은
  - 그의 도래는
  lexicon: BDAG
  rationale: 앞 8절의 그리스도의 παρουσία와 평행되는 패러디적 표현. 「오심」으로 옮겨 그 평행을 살리고 「재림」은 그리스도에게만 사용하여 구별한다.
- source_word: κατ’ ἐνέργειαν
  english_pob_choice: according to the working
  chosen_korean: 활동을 따라
  alternatives_korean:
  - 작용에 따라
  - 역사하심을 따라
  lexicon: BDAG
  rationale: κατά + 대격의 「표준·방식」 의미를 「따라」로 자연스럽게 표현한다. ἐνέργεια의 활동성을 「활동」으로 살린다.
- source_word: Σατανᾶ
  english_pob_choice: Satan
  chosen_korean: 사탄
  alternatives_korean:
  - 대적자
  lexicon: BDAG
  rationale: 표준 한국어 음역.
- source_word: ἐν πάσῃ δυνάμει
  english_pob_choice: with all power
  chosen_korean: 모든 능력과
  alternatives_korean:
  - 온갖 능력과
  - 모든 권능과
  lexicon: BDAG
  rationale: δύναμις를 「능력」으로 옮긴다(「기적」으로 좁히지 않음).
- source_word: σημείοις
  english_pob_choice: signs
  chosen_korean: 표적과
  alternatives_korean:
  - 표징과
  lexicon: BDAG
  rationale: 한국 성경 전통의 정착어 「표적」.
- source_word: τέρασιν
  english_pob_choice: wonders
  chosen_korean: 기사
  alternatives_korean:
  - 이적
  - 경이
  lexicon: BDAG
  rationale: 「표적과 기사」 짝의 정형 표현을 따른다.
- source_word: ψεύδους
  english_pob_choice: of falsehood
  chosen_korean: 거짓의
  alternatives_korean:
  - 거짓된
  - 허위의
  lexicon: BDAG
  rationale: 속격으로 「표적과 기사」를 한정하므로 「거짓의 기사」로 옮긴다. 영어 POB의 「wonders of falsehood」 직역 구조를 따른다.
- source_word: ἐν πάσῃ δυνάμει καὶ σημείοις καὶ τέρασιν ψεύδους
  english_pob_choice: with all power and signs and wonders of falsehood
  chosen_korean: 모든 능력과 표적과 거짓의 기사를 동반합니다
  alternatives_korean:
  - 모든 능력과 거짓 표적과 기사로 임합니다
  lexicon: BDAG
  rationale: 한국어 흐름상 「동반합니다」 동사를 보충하여 자연스럽게 한다. ἐν의 동반적 의미를 살린다.
theological_decisions:
- issue: 사탄적 현상의 본질(전적 위조 / 실재 초자연 작용)
  chosen_reading: 본문이 결정하지 않는다는 점을 보존 — 「거짓의」가 표적·기사를 한정하나 그 정확한 형이상학적 본질을 단정하지 않음
  alternative_readings:
  - 단지 가짜 술수
  - 사탄의 실제 초자연적 능력
  rationale: 헬라어 본문은 그 오심이 사탄의 활동을 따르며 능력·표적·기사가 거짓에 속함을 진술할 뿐, 그 양상을 완전히 해명하지 않는다.
  doctrine_reference: 'Preserve theological tension'
- issue: παρουσία를 그리스도와 적-그리스도에 동일 어휘로 옮길지
  chosen_reading: 그리스도(2:1)는 「재림」, 본 절(불법의 자)은 「오심」 — 차별화
  alternative_readings:
  - 두 경우 모두 「오심」
  - 두 경우 모두 「강림」
  rationale: 헬라어는 의도적 패러디로 동일 어휘를 사용하나, 한국어 「재림」은 그리스도에게만 적용되는 정착어이다. 평행을 표시하기 위해 「오심」으로 본 절을 옮긴다. 그리스도-측은 신학 전통의 「재림」을 유지.
  doctrine_reference: 'KOREAN_PIPELINE Glossary: παρουσία (case-by-case)'
