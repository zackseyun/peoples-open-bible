review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español sigue bien la secuencia y el sentido del hebreo: deseo culpable de campos, despojo de campos, apropiación de casas, y opresión de un hombre con su casa y su heredad. Conserva correctamente el singular masculino representativo en גבר / איש y mantiene ‘heredad’ para נחלה con su matiz patrimonial. Sin embargo, la puntuación y una alternativa de nota al pie debilitan la naturalidad y precisión.'
  spanish_quality_summary: El texto es generalmente claro y fiel, pero ‘y casas, y se las llevan’ suena algo trabado en español; es mejor ‘y de las casas se apoderan’ o una reestructuración similar que preserve el paralelismo sin sonar forzado. Además, la nota ‘se las cargan’ no es apropiada en registro neutral y puede sonar coloquial o ambigua. Conviene también aligerar la puntuación para mayor fluidez bíblica en español.
  glossary_alignment: No hay conflicto con la terminología del proyecto. ‘Codician’, ‘campos’, ‘oprimen’, ‘hombre’ y ‘heredad’ están alineados con las decisiones del POB y con el valor del hebreo. ‘Heredad’ es una buena excepción contextual frente a una opción más plana como ‘herencia’.
  issues:
  - severity: medium
    issue: La cláusula ‘y casas, y se las llevan’ es poco natural en español.
    rationale: Aunque refleja el hebreo de forma cercana, en español moderno suena entrecortado y algo calcado. Una leve reestructuración puede conservar el paralelismo y la fuerza sin perder fidelidad.
  - severity: medium
    issue: La nota al pie b incluye ‘se las cargan’, que no es adecuada en registro neutro y puede resultar ambigua.
    rationale: En gran parte del español contemporáneo ‘cargarse’ puede sugerir destruir, matar o coloquialismo fuerte, no simplemente ‘llevarse’ o ‘cargar con algo’. No representa bien la alternativa léxica ‘carry them off’.
  - severity: low
    issue: La puntuación con comas antes de cada ‘y’ endurece innecesariamente la lectura.
    rationale: El estilo bíblico en español puede conservar coordinación abundante sin reproducir una puntuación demasiado mecánica. Una puntuación más limpia mejora la legibilidad.
  revised_spanish_text: Codician campos y se apoderan de ellos[a], y casas y se las llevan[b]; oprimen a un hombre y a su casa, a un hombre y su heredad[c].
  revised_footnotes:
  - marker: a
    text: O ‘roban’ / ‘toman por la fuerza’ para ‘se apoderan de’.
    reason: lexical_alternative
  - marker: b
    text: O ‘se las llevan’ / ‘se las llevan consigo’ / ‘se las cargan consigo’ para ‘se las llevan’.
    reason: lexical_alternative
  - marker: c
    text: ‘Heredad’ puede referirse especialmente a tierra heredada o patrimonio familiar, no solo a posesiones en general.
    reason: cultural_note
  revision_rationale: Se conserva la fidelidad al hebreo y a las decisiones léxicas del POB, pero se corrige la puntuación para una lectura más natural y se reemplaza la alternativa coloquial o ambigua de la nota b por opciones más claras y neutras en español. No se requiere cambio de fondo en la traducción principal.
