revisions:
- from: Yo te he puesto como crisol[a] entre mi pueblo, como fortaleza[b], para que conozcas y examines su camino.
  to: Yo te he puesto como probador[a] entre mi pueblo, como fortaleza, para que conozcas y examines su camino[b].
  rationale: Se reemplaza «crisol» por «probador» para conservar el referente personal de בָּחוֹן y alinearse con la decisión auditada «a tester». La nota [a] preserva la alternativa especializada «ensayador» y reconoce la compacidad del hebreo. Se añade una nota a «camino» para mantener la alternativa contextual documentada en el inglés POB. Se conserva «fortaleza» sin nota porque ya expresa fielmente מִבְצָר y la nota inglesa [b] en realidad correspondía a «their way».
  reviewer_model: gpt-5.4
