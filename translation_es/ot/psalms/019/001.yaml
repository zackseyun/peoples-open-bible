translation:
  language: es
  text: Para el director del coro[a]. Salmo de David.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «por David» o «para David»; la expresión hebrea puede indicar autoría, asociación o dedicación.
    reason: alternative_reading
lexical_decisions:
- source_word: לַמְנַצֵּחַ
  english_pob_choice: For the choirmaster
  chosen_spanish: Para el director del coro
  alternatives_spanish:
  - Para el maestro de música
  - Para el líder
  - Para el director musical
  lexicon: HALOT
  rationale: El término de los encabezados de salmos apunta al encargado de la ejecución musical. En español, «director del coro» comunica con naturalidad esa función cultual y musical sin perder la idea direccional de la ל prefijada, que aquí se entiende como destino o dedicación del salmo.
- source_word: מִזְמוֹר
  english_pob_choice: A psalm
  chosen_spanish: Salmo
  alternatives_spanish:
  - Cántico
  - Canción
  - Melodía
  lexicon: HALOT
  rationale: מִזְמוֹר es el rótulo genérico de género para un salmo. «Salmo» conserva el valor literario establecido en español y evita ampliar indebidamente el sentido con términos más generales como «cántico» o «canción».
- source_word: לְדָוִד
  english_pob_choice: of David
  chosen_spanish: de David
  alternatives_spanish:
  - por David
  - para David
  - perteneciente a David
  lexicon: HALOT
  rationale: La preposición ל en estos encabezados puede señalar autoría, pertenencia, dedicación o relación. «De David» preserva esa ambigüedad mejor que «por David» o «para David», y coincide con el modo natural de expresar ese vínculo en español.
theological_decisions:
- issue: Ambigüedad de לְדָוִד en el encabezado
  english_pob_reading: of David
  chosen_spanish_reading: de David
  alternative_spanish_readings:
  - por David
  - para David
  rationale: El hebreo no obliga a resolver de forma tajante si el salmo es de autoría davídica, dedicado a David, o asociado con él. La traducción conserva esa tensión documental con «de David» en lugar de cerrar la interpretación.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: La revisión más reciente indicó que no eran necesarios cambios; el borrador español sigue esa lectura alta de concordancia y mantiene la ambigüedad del encabezado tal como lo hace el texto base en inglés.
  spanish_consistency_notes:
  - Se mantuvo «Salmo» como género técnico establecido.
  - Se evitó «SEÑOR» u otra máscara para el nombre divino porque este versículo no contiene el Tetragrámaton.
  - La nota al pie se ancla en «de David» para reflejar la ambigüedad de לְ en el encabezado.
