translation:
  language: es
  text: ¡Vuelve[a], oh Israel, a Yahvé tu Dios, porque has tropezado en tu iniquidad!
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «por tu iniquidad». La preposición hebrea puede expresar causa, además de la esfera en la que Israel ha tropezado.'
    reason: lexical_alternative
lexical_decisions:
- source_word: שׁוּבָה
  english_pob_choice: Return
  chosen_spanish: Vuélvete
  alternatives_spanish:
  - Vuelve
  - Retorna
  - Arrepiéntete
  lexicon: HALOT
  rationale: El hebreo שוב expresa el movimiento de volver/regresar. En español, 'vuélvete' conserva ese dinamismo de retorno hacia Dios sin reducirlo solo a la dimensión moral de 'arrepiéntete', que sería más interpretativa.
- source_word: יִשְׂרָאֵל
  english_pob_choice: Israel
  chosen_spanish: Israel
  alternatives_spanish:
  - Israél
  lexicon: Nombre propio bíblico
  rationale: Es nombre propio; se conserva sin adaptar.
- source_word: עַד
  english_pob_choice: to
  chosen_spanish: a
  alternatives_spanish:
  - hacia
  - hasta
  lexicon: HALOT
  rationale: Con verbo de retorno, la preposición marca meta/dirección. 'A' es la forma natural en español y mantiene el sentido de movimiento hacia Yahvé.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahveh
  - el SEÑOR
  lexicon: Convención POB para el Tetragrámaton
  rationale: Se sigue el término base del proyecto para YHWH, preservando el nombre divino en vez de ocultarlo con un título.
- source_word: אֱלֹהֶיךָ
  english_pob_choice: your God
  chosen_spanish: tu Dios
  alternatives_spanish:
  - tu Dios y Señor
  - tu Dios
  lexicon: HALOT
  rationale: 'El constructo con sufijo de 2ms es apposicional a Yahvé: relación pactual directa. ''Tu Dios'' reproduce esa cercanía de pacto de manera natural en español.'
- source_word: כִּי
  english_pob_choice: for
  chosen_spanish: porque
  alternatives_spanish:
  - pues
  - ya que
  lexicon: HALOT
  rationale: Aquí introduce la razón de la exhortación. 'Porque' expresa la causalidad de forma clara y fiel.
- source_word: כָשַׁלְתָּ
  english_pob_choice: have stumbled
  chosen_spanish: has tropezado
  alternatives_spanish:
  - has vacilado
  - has caído
  lexicon: HALOT
  rationale: כשל connota tropezar/flaquear. 'Has tropezado' conserva la imagen física y moral sin intensificarla hasta 'caído', que puede sonar más definitivo.
- source_word: בַּעֲוֺנֶךָ
  english_pob_choice: in your iniquity
  chosen_spanish: en tu iniquidad
  alternatives_spanish:
  - por tu iniquidad
  - a causa de tu iniquidad
  - en tu culpa
  lexicon: HALOT
  rationale: La preposición ב puede ser locativa o causal en este contexto. Se conserva la compactación hebrea con 'en tu iniquidad', mientras el sentido causal queda disponible en la nota.
theological_decisions:
- issue: Tratamiento del nombre divino YHWH
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahveh
  - el Señor
  rationale: El texto hebreo usa יְהוָה directamente. El proyecto pide mantener el nombre divino en la forma principal española, y 'Yahvé' es la forma normativa del POB en español.
  doctrine_reference: 'DOCTRINE.md: Contested terms — YHWH → Yahvé'
- issue: Sentido de שוב en un llamado profético
  english_pob_reading: Return
  chosen_spanish_reading: Vuélvete
  alternative_spanish_readings:
  - Vuelve
  - Arrepiéntete
  rationale: '''Vuélvete'' conserva el valor básico de regresar/volver al punto de origen y, en el contexto profético, deja implicada la idea de arrepentimiento sin sustituirla por un equivalente doctrinal más estrecho.'
  doctrine_reference: 'DOCTRINE.md Translation philosophy #1 y #3'
- issue: Valor de ב en בַּעֲוֺנֶךָ
  english_pob_reading: in your iniquity / because of your iniquity
  chosen_spanish_reading: en tu iniquidad
  alternative_spanish_readings:
  - por tu iniquidad
  - a causa de tu iniquidad
  rationale: Se mantiene la ambigüedad hebrea entre esfera y causa, igual que en el audit trail inglés. La nota preserva la alternativa causal sin eliminar la lectura más cercana al hebreo.
  doctrine_reference: HALOT; decisión lexical del POB inglés
translation_notes:
  revision_awareness: El draft sigue el último pase de revisión sin cambios necesarios; mantiene alta concordancia con el control cruzado y conserva la ambigüedad léxica documentada para בַּעֲוֺנֶךָ mediante nota.
  spanish_consistency_notes:
  - Se mantiene Yahvé para YHWH, conforme al estándar del proyecto.
  - Se usa un imperativo de retorno ('Vuélvete') para reflejar שוב sin sobretraducirlo como simple arrepentimiento.
  - '''Iniquidad'' se conserva por su peso bíblico y por coherencia con la terminología del proyecto; la nota explica la posible lectura causal.'
  - El registro es sobrio, publicable y de lectura eclesial amplia, sin depender de fórmula litúrgica tradicional que oculte el nombre divino.
