  yaml_path: translation/ot/2_chronicles/028/001.yaml
  text: Ahaz was twenty years old when he became king[a], and he reigned sixteen years in Jerusalem. He did not do what was right in the eyes of Yahweh, as David his father had done.
  footnotes:
