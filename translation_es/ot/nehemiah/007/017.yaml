  lexicon: HALOT
  rationale: En contextos genealógicos o censales, בְּנֵי suele designar un linaje o grupo familiar. En español, «los hijos de» conserva la fórmula formal y es plenamente natural; «descendientes» explicita el valor colectivo, pero pierde la correspondencia formal del hebreo.
- source_word: עַזְגָּד
  english_pob_choice: Azgad
  chosen_spanish: Azgad
  alternatives_spanish:
  - Azgad
  lexicon: Nombre propio (transliteración)
  rationale: Es un nombre propio de familia/persona; se conserva la transliteración estable «Azgad» para mantener la trazabilidad con el hebreo y con la tradición auditada en inglés.
- source_word: אַלְפַּיִם שְׁלֹשׁ מֵא֖וֹת עֶשְׂרִ֥ים וּשְׁנָֽיִם
  english_pob_choice: 2,322
  chosen_spanish: '2.322'
  alternatives_spanish:
  - dos mil trescientos veintidós
  - 2,300 y 22
  lexicon: HALOT
  rationale: La secuencia hebrea suma dos mil trescientos veintidós; en español un numeral arábigo comunica el total con precisión y naturalidad. Se usa punto como separador de miles según la convención tipográfica del español.
translation_notes:
