    issue: La base «en obras de justicia» no sigue la decisión principal auditada para ἐν ἔργοις δικαιοσύνης.
    rationale: El expediente inglés eligió «in works of righteousness» y dejó «in works of justice» como alternativa. En español, «obras de rectitud» preserva mejor ese matiz principal sin caer en calco torpe.
  - severity: medium
