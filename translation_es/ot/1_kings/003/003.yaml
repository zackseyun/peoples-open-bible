translation:
  language: es
  text: Salomón amó a Yahvé, andando en los estatutos de David su padre; solo[a], él sacrificaba y quemaba incienso en los lugares altos[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «excepto que sacrificaba y quemaba incienso en los lugares altos».'
    reason: alternative_reading
  - marker: b
    text: «Lugares altos» se refiere a sitios locales de culto en elevaciones.
    reason: cultural_note
lexical_decisions:
- source_word: וַיֶּאֱהַב
  english_pob_choice: loved
  chosen_spanish: amó
  alternatives_spanish:
  - mostró amor por
  - amaba
  lexicon: HALOT
  rationale: אהב expresa amor/afecto de manera directa. «Amó» conserva la afirmación evaluativa del narrador y suena natural en español bíblico moderno.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  - el SEÑOR
  lexicon: HALOT
  rationale: 'Se sigue la convención del proyecto para el Tetragrámaton: transliteración del nombre divino, no sustitución por un título. «Yahvé» preserva el nombre personal de Dios revelado a Israel.'
- source_word: לָלֶכֶת
  english_pob_choice: walking
  chosen_spanish: andando
  alternatives_spanish:
  - al andar
  - mientras andaba
  - caminando
  lexicon: HALOT
  rationale: El infinitivo constructo expresa la manera o evidencia del amor de Salomón. «Andando» conserva la idea de conducta continua y funciona con naturalidad después de la cláusula principal.
- source_word: בְּחֻקּוֹת
  english_pob_choice: in the statutes
  chosen_spanish: en los estatutos
  alternatives_spanish:
  - según los estatutos
  - en las ordenanzas
  lexicon: HALOT
  rationale: חֻקּוֹת alude a estatutos/decretos prescritos. «Estatutos» retiene el matiz legal y pactual mejor que opciones más generales como «caminos».
- source_word: דָּוִד אָבִיו
  english_pob_choice: of David his father
  chosen_spanish: de David su padre
  alternatives_spanish:
  - de su padre David
  lexicon: HALOT
  rationale: Mantiene la apposición hebrea con claridad y suena natural en español.
- source_word: רַק
  english_pob_choice: only
  chosen_spanish: solo
  alternatives_spanish:
  - excepto que
  - sin embargo
  lexicon: HALOT
  rationale: רַק introduce una limitación a la evaluación positiva previa. «Solo» conserva la restricción adversativa sin resolver la tensión narrativa.
- source_word: בַּבָּמוֹת
  english_pob_choice: at the high places
  chosen_spanish: en los lugares altos
  alternatives_spanish:
  - en los altos lugares
  - en los santuarios de las alturas
  lexicon: HALOT
  rationale: בָּמוֹת designa sitios elevados de culto. «Lugares altos» preserva el sentido histórico y evita una paráfrasis interpretativa excesiva.
- source_word: מְזַבֵּחַ
  english_pob_choice: was sacrificing
  chosen_spanish: sacrificaba
  alternatives_spanish:
  - estaba sacrificando
  - ofrecía sacrificios
  lexicon: HALOT
  rationale: El participio describe una acción habitual o en curso; en español bíblico, el imperfecto «sacrificaba» transmite bien esa duratividad.
- source_word: וּמַקְטִיר
  english_pob_choice: and burning incense
  chosen_spanish: y quemaba incienso
  alternatives_spanish:
  - y hacía subir humo
  - y ofrecía humo
  lexicon: HALOT
  rationale: En contexto de culto, קטר se refiere a quemar incienso u ofrendas aromáticas. «Quemaba incienso» es la forma más clara y natural en español, distinguiéndola del verbo anterior.
theological_decisions:
- issue: Valoración narrativa del culto de Salomón
  english_pob_reading: The verse gives a genuinely positive assessment of Solomon's love for the LORD while also qualifying it with the note that he worshiped at the high places.
  chosen_spanish_reading: El versículo ofrece una valoración realmente positiva del amor de Salomón por Yahvé, pero la matiza con la observación de que sacrificaba en los lugares altos.
  alternative_spanish_readings:
  - El versículo es principalmente crítico y la apertura es irónica o muy atenuada.
  - El versículo aprueba plenamente el culto en los lugares altos en esta etapa.
  rationale: La sintaxis presenta primero la commendación y luego la limitación introducida por רַק. La traducción conserva esa tensión, sin convertir el texto en una aprobación sin reservas ni en una condena total.
  doctrine_reference: Preservar la tensión teológica/narrativa sin resolverla artificialmente.
translation_notes:
  revision_awareness: La revisión más reciente no introdujo cambios; el estado final coincide con el texto auditado de alta concordancia.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» conforme al estándar del proyecto para יהוה.
  - Se conserva la distinción entre «sacrificaba» y «quemaba incienso» para reflejar los dos verbos hebreos.
  - «Lugares altos» se deja como término técnico con nota cultural, en lugar de sustituirlo por una paráfrasis explicativa dentro del texto principal.
