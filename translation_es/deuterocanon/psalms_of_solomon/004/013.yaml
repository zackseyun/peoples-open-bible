translation:
  language: es
  text: No se detuvo hasta lograr dispersarlos, como en orfandad[c][b][a], y asoló una casa por causa de deseo ilícito.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «como en duelo» / «como entre los huérfanos» para ὡς ἐν ὀρφανίᾳ.
    reason: lexical_alternative
  - marker: b
    text: «Casa» probablemente tiene aquí el sentido más amplio de «hogar» o «familia», dado el contexto de destrucción de familias.
    reason: cultural_note
  - marker: c
    text: O «dispersándolos como a una casa en orfandad»; el griego no expresa un objeto directo explícito en esta cola.
    reason: alternative_reading
lexical_decisions:
- source_word: οὐκ ἀπέστη
  english_pob_choice: He did not stop
  chosen_spanish: No se detuvo
  alternatives_spanish:
  - No cesó
  - No dejó de hacerlo
  - No se apartó
  lexicon: LSJ
  rationale: En este contexto el verbo expresa persistencia en una acción predatoria; «No se detuvo» comunica esa insistencia en español con naturalidad y sin sugerir alejamiento físico.
- source_word: ἐνίκησεν
  english_pob_choice: had prevailed
  chosen_spanish: prevalecer
  alternatives_spanish:
  - vencer
  - triunfar
  - salir vencedor
  lexicon: LSJ
  rationale: La fuerza del verbo aquí es la de lograr su propósito, no una victoria militar literal. «Prevalecer» conserva esa idea de logro persistente y permite la construcción con infinitivo siguiente.
- source_word: σκορπίσαι
  english_pob_choice: in scattering
  chosen_spanish: dispersarlos
  alternatives_spanish:
  - esparcirlos
  - dispersar
  - esparcir
  lexicon: LSJ
  rationale: El infinitivo indica el objetivo logrado; en español conviene verbalizar el objeto implícito como pronombre «los», siguiendo el contexto de personas o familia dispersadas sin anticipar «casa» en la primera cola.
- source_word: ὡς ἐν ὀρφανίᾳ
  english_pob_choice: as in orphanhood
  chosen_spanish: como en orfandad
  alternatives_spanish:
  - como en bereavimiento
  - como entre huérfanos
  - como en estado de desamparo
  lexicon: LSJ
  rationale: «Orfandad» conserva la imagen concreta y extraña del griego, manteniendo el matiz de familia quebrada y sin amparo. Es más fiel que suavizarlo a una paráfrasis explicativa.
- source_word: ἠρήμωσεν οἶκον
  english_pob_choice: he laid waste a house
  chosen_spanish: asoló una casa
  alternatives_spanish:
  - devastó una casa
  - dejó desolada una casa
  - asoló un hogar
  lexicon: LSJ
  rationale: «Asoló» recoge bien la fuerza desoladora de ἠρήμωσεν. «Casa» preserva la concreción del sustantivo griego, con posibilidad de leer el conjunto familiar en el contexto sin forzarlo en la traducción principal.
- source_word: ἕνεκεν ἐπιθυμίας παρανόμου
  english_pob_choice: because of lawless desire
  chosen_spanish: por causa de deseo sin ley
  alternatives_spanish:
  - por causa de deseo ilegal
  - a causa de deseo impío
  - por causa de deseo ilícito
  lexicon: LSJ
  rationale: «Deseo sin ley» preserva el matiz moral de παρανόμου mejor que una simple descripción psicológica. La expresión mantiene la tensión entre apetito y transgresión legal/covenantal.
translation_notes:
  revision_awareness: 'La redacción sigue de cerca la revisión más reciente del audit trail: se evita anticipar el objeto de σκορπίσαι con «la casa», se conserva la relación de finalidad con «prevalecer», y se mantiene la segunda cola con una imagen fuerte y formal («asoló una casa») alineada con la última pasarela revisada.'
  spanish_consistency_notes:
  - Se mantiene «orfandad» para reflejar la rareza y concreción de ὀρφανίᾳ, como ya sugería el audit trail en inglés.
  - Se preserva «casa» en la segunda cola para no eliminar la tensión entre el objeto literal y el posible sentido ampliado de hogar/familia.
  - La frase «deseo sin ley» conserva la cualidad moral de παρανόμου sin introducir una interpretación doctrinal adicional.
  - Se evita «Cristo», «SEÑOR» u otros equivalentes no presentes en el texto fuente.
  - El pronombre enclítico en «dispersarlos» respeta el objeto implícito sin sobreespecificar el referente.
