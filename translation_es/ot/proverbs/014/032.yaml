  text: בְּֽ֭/רָעָת/וֹ יִדָּחֶ֣ה רָשָׁ֑ע וְ/חֹסֶ֖ה בְ/מוֹת֣/וֹ צַדִּֽיק׃
base_translation:
  language: en
  yaml_path: translation/ot/proverbs/014/032.yaml
  text: By his evil the wicked is driven away[c][b][a], but the righteous finds refuge in his death.
  footnotes:
  - marker: a
    text: Or 'In his calamity the wicked man is driven away.' The Hebrew רָעָה can mean either 'evil' or 'calamity/disaster' depending on context.
    reason: lexical_alternative
  - marker: b
    text: Or 'takes refuge' for 'finds refuge.'
    reason: lexical_alternative
  - marker: c
    text: Literally 'in his death'; alternatively, 'at his death' or 'when he dies.' Some translations interpret more explicitly, 'has hope at his death,' but the Hebrew does not state 'hope' directly.
    reason: alternative_reading
