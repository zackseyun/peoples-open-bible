translation:
  language: es
  text: La rectitud y la justicia son el fundamento de tu trono[a]; el amor leal y la fidelidad van delante de ti.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'tu presencia'. El hebreo dice literalmente 'tu rostro'.
    reason: lexical_alternative
lexical_decisions:
- source_word: צֶדֶק
  english_pob_choice: Righteousness
  chosen_spanish: rectitud
  alternatives_spanish:
  - justicia
  - derecho
  lexicon: HALOT
  rationale: En este paralelismo con מִשְׁפָּט, 'rectitud' conserva la distinción entre la cualidad moral de lo recto y el ámbito judicial de la siguiente palabra. En español, 'justicia y rectitud' suena natural y reproduce mejor el equilibrio del hebreo que duplicar 'justicia'.
- source_word: מִשְׁפָּט
  english_pob_choice: justice
  chosen_spanish: justicia
  alternatives_spanish:
  - juicio
  - sentencia
  lexicon: HALOT
  rationale: '''Justicia'' expresa bien la dimensión judicial y de gobierno del término en este contexto del trono. ''Juicio'' es posible, pero en español contemporáneo suena menos natural aquí.'
- source_word: מְכוֹן
  english_pob_choice: foundation
  chosen_spanish: fundamento
  alternatives_spanish:
  - base
  - lugar establecido
  lexicon: HALOT
  rationale: El sustantivo denota un lugar/base firmemente establecida. 'Fundamento' es la equivalencia española más clara y idiomática para la imagen del trono.
- source_word: כִּסְאֶךָ
  english_pob_choice: your throne
  chosen_spanish: tu trono
  alternatives_spanish:
  - tu asiento real
  - tu trono
  lexicon: HALOT
  rationale: Se conserva el sentido real del símbolo del gobierno divino y el sufijo de segunda persona singular con 'tu'.
- source_word: חֶסֶד
  english_pob_choice: steadfast love
  chosen_spanish: misericordia leal
  alternatives_spanish:
  - amor leal
  - amor constante
  - misericordia
  lexicon: HALOT
  rationale: חֶסֶד es un término de lealtad relacional y pactual; 'misericordia leal' intenta preservar tanto el componente afectivo como el de fidelidad, sin reducirlo a una sola idea. 'Misericordia' sola sería insuficiente, y 'amor leal' puede sonar menos natural en español.
- source_word: אֱמֶת
  english_pob_choice: faithfulness
  chosen_spanish: fidelidad
  alternatives_spanish:
  - verdad
  - fiabilidad
  lexicon: HALOT
  rationale: En la pareja חֶסֶד וֶאֱמֶת, el sentido relacional de אֱמֶת es mejor captado por 'fidelidad' que por 'verdad' en español. Así se mantiene la fuerza de confiabilidad/cumplimiento del pacto.
- source_word: יְקַדְּמ֥וּ
  english_pob_choice: go before
  chosen_spanish: van delante de
  alternatives_spanish:
  - preceden a
  - van antes de
  lexicon: HALOT
  rationale: '''Van delante de'' comunica de manera natural la imagen poética de acompañamiento y anticipación. También evita un calco rígido y conserva el movimiento hacia la presencia divina.'
- source_word: פָנֶיךָ
  english_pob_choice: your face
  chosen_spanish: de ti
  alternatives_spanish:
  - ante ti
  - tu rostro
  - tu presencia
  lexicon: HALOT
  rationale: La expresión hebrea es literalmente 'tu rostro', pero el propio contexto permite una equivalencia idiomática. Siguiendo la revisión inglesa, 'de ti' comunica con naturalidad la idea de ir delante de la persona divina sin forzar una imagen que en español podría sonar extraña en la clausula final.
theological_decisions:
- issue: Paridad semántica entre צֶדֶק y מִשְׁפָּט
  english_pob_reading: righteousness and justice
  chosen_spanish_reading: justicia y rectitud
  alternative_spanish_readings:
  - rectitud y justicia
  - justicia y justicia
  rationale: Se preserva la doble cualidad del gobierno de Dios sin colapsar ambos términos en una sola idea. 'Rectitud' ayuda a distinguir צֶדֶק de מִשְׁפָּט, como hace el inglés POB con 'righteousness' y 'justice'.
  doctrine_reference: Salmo 89:14-15; traducción poética del gobierno justo de Dios
- issue: Pareja pactual חֶסֶד וֶאֱמֶת
  english_pob_reading: steadfast love and faithfulness
  chosen_spanish_reading: misericordia leal y fidelidad
  alternative_spanish_readings:
  - amor leal y fidelidad
  - misericordia y verdad
  - amor constante y verdad
  rationale: La pareja es una fórmula teológicamente densa de lealtad pactual. 'Misericordia leal' intenta conservar el componente de gracia benévola y el de lealtad estable; 'fidelidad' traduce bien la confiabilidad activa de אֱמֶת en este contexto.
  doctrine_reference: Ex. 34:6; Sal. 89:14-15
- issue: Cómo reflejar פָנֶיךָ en la clausula final
  english_pob_reading: go before you
  chosen_spanish_reading: van delante de ti
  alternative_spanish_readings:
  - van delante de tu rostro
  - te preceden
  - van ante tu presencia
  rationale: La revisión inglesa optó por una forma más natural sin perder el sentido hebreo. En español, 'van delante de ti' conserva esa naturalidad y mantiene la idea de que las cualidades divinas acompañan y preceden al Señor.
  doctrine_reference: Salmo 89:15; poética de la presencia divina
translation_notes:
  revision_awareness: El texto español sigue la lectura revisada del inglés POB en la frase final, evitando una calca literal de 'tu rostro' donde el español de publicación se beneficia de una equivalencia más natural. También toma en cuenta que el inglés conservó la distinción entre 'righteousness' y 'justice' y la pareja covenantal 'steadfast love and faithfulness'.
  spanish_consistency_notes:
  - Se mantiene el tratamiento reverente de Dios en segunda persona singular ('tu', 'ti'), coherente con el hebreo.
  - Se evita 'SEÑOR' porque el versículo no contiene el Tetragrámaton como palabra independiente en la traducción aquí trabajada; el foco está en el trono y la presencia divina.
  - La solución 'misericordia leal' busca ser comprensible y a la vez teológicamente precisa; si el proyecto prefiere una fórmula más tradicional, 'amor leal' es la alternativa más cercana.
