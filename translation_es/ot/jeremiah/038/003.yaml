translation:
  language: es
  text: 'Así dice Yahvé: Esta ciudad será ciertamente entregada en manos del ejército del rey de Babilonia[a], y la capturará.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «en poder del ejército del rey de Babilonia». El hebreo dice literalmente: «en la mano de».'
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el SEÑOR
  - Jehová
  lexicon: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
  rationale: Se preserva el nombre propio del pacto conforme al criterio del proyecto; en español, la forma establecida y reverente es 'Yahvé', más natural que calcar 'Yahweh' o reemplazarlo por un título impersonal.
- source_word: כֹּה אָמַר
  english_pob_choice: Thus says
  chosen_spanish: Así dice
  alternatives_spanish:
  - Así ha dicho
  - Esto dice
  lexicon: HALOT
  rationale: La fórmula profética se vierte de modo natural en español como introducción solemne y actual de proclamación, manteniendo el tono oracular sin forzar un calco arcaico.
- source_word: הִנָּתוֹן תִּנָּתֵן
  english_pob_choice: will surely be given
  chosen_spanish: será ciertamente entregada
  alternatives_spanish:
  - será entregada con toda seguridad
  - será sin duda dada
  lexicon: HALOT
  rationale: El infinitivo absoluto con verbo finito intensifica la certeza; 'será ciertamente entregada' conserva el valor enfático y el pasivo, evitando suavizar la fuerza del hebreo.
- source_word: הָעִיר הַזֹּאת
  english_pob_choice: This city
  chosen_spanish: esta ciudad
  alternatives_spanish:
  - esta misma ciudad
  lexicon: HALOT
  rationale: La demostración es directa y clara; 'esta ciudad' es el equivalente natural en español y mantiene la referencia inmediata del hebreo.
- source_word: בְּיַד
  english_pob_choice: into the hand of
  chosen_spanish: en manos de
  alternatives_spanish:
  - en la mano de
  - bajo el poder de
  lexicon: HALOT
  rationale: Se conserva la imagen idiomática semítica de control y dominio. 'En manos de' es idiomático en español y comunica la idea de entrega a la autoridad de otro.
- source_word: חֵיל
  english_pob_choice: the army
  chosen_spanish: el ejército
  alternatives_spanish:
  - las tropas
  - la fuerza militar
  lexicon: HALOT
  rationale: En este contexto militar, 'ejército' refleja de manera clara y digna el colectivo armado; evita una expresión demasiado genérica como 'fuerza'.
- source_word: מֶלֶךְ בָּבֶל
  english_pob_choice: the king of Babylon
  chosen_spanish: del rey de Babilonia
  alternatives_spanish:
  - del rey babilonio
  lexicon: HALOT
  rationale: Se mantiene la relación constructa de posesión y la referencia histórica concreta, en un español fluido y preciso.
- source_word: וּלְכָדָהּ
  english_pob_choice: and he will capture it
  chosen_spanish: y él la capturará
  alternatives_spanish:
  - y la tomará
  - y la conquistará
  lexicon: HALOT
  rationale: '''Capturará'' reproduce bien el valor de לכד aplicado a una ciudad sitiada; el pronombre explícito ''él'' ayuda a identificar al rey como sujeto gramatical sin perder la referencia al ejército como instrumento.'
theological_decisions:
- issue: Tratamiento del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: La traducción al español sigue el principio doctrinal del proyecto de no ocultar el nombre del pacto. 'Yahvé' es la forma más reconocible y reverente en español, y preserva la decisión teológica de traducir el Tetragrámaton como nombre propio.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
translation_notes:
  revision_awareness: 'Coincide con la revisión más reciente: no se documentaron cambios necesarios en el texto inglés auditado, y la versión española mantiene esa lectura alta de acuerdo con el hebreo sin introducir variantes no atestiguadas.'
  spanish_consistency_notes:
  - Se mantuvo el registro profético solemne, pero natural en español.
  - Se conservó la imagen hebrea de 'en manos de' como equivalente idiomático de בְּיַד.
  - Se evitó 'SEÑOR' para el Tetragrámaton, siguiendo la política del proyecto y el audit trail inglés.
  - '''Capturará'' traduce el verbo de conquista de modo comprensible sin añadir matices no presentes en el texto.'
