    rationale: El hebreo y el POB inglés apuntan a «Pethor/Petor». «Pator» introduce una forma no justificada por la evidencia presentada y puede confundir la identificación geográfica.
  - severity: medium
    issue: «la superficie de la tierra» suaviza demasiado כִסָּה אֶת עֵין הָאָרֶץ.
