translation:
  language: es
  text: O como un[a] aborto escondido, yo no habría sido[b], como los infantes que no vieron la luz.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'como un niño nacido muerto'. El hebreo נפל puede referirse a una pérdida gestacional o a un niño nacido muerto; ambas opciones comunican la idea de alguien que nunca llegó a vivir en el mundo.
    reason: lexical_alternative
  - marker: b
    text: Literalmente, 'no sería'. El hebreo expresa no existencia en el deseo de Job; en español, 'no habría sido' comunica esa fuerza de manera más natural en este contexto.
    reason: source_note
lexical_decisions:
- source_word: א֤וֹ
  english_pob_choice: Or
  chosen_spanish: O
  alternatives_spanish:
  - O bien
  lexicon: HALOT
  rationale: Introduce la alternativa en la serie de comparaciones de Job; en español, 'O' basta y suena natural al inicio de la cláusula.
- source_word: כְ/נֵ֣פֶל
  english_pob_choice: like a miscarriage
  chosen_spanish: como un aborto
  alternatives_spanish:
  - como un aborto espontáneo
  - como un mortinato
  - como un niño nacido muerto
  lexicon: HALOT
  rationale: La forma nominal hebrea puede abarcar aborto o muerte antes de vivir plenamente. 'Aborto' es directo y mantiene la fuerza del término; el contexto de vida no iniciada queda reforzado por la nota sobre la alternativa de mortinato.
- source_word: טָ֭מוּן
  english_pob_choice: hidden
  chosen_spanish: escondido
  alternatives_spanish:
  - oculto
  - enterrado
  lexicon: HALOT
  rationale: El participio de טמן expresa algo escondido/concealado. 'Escondido' conserva la imagen sin especificar sepultura, que sería una inferencia más marcada.
- source_word: לֹ֣א אֶהְיֶ֑ה
  english_pob_choice: I would not be
  chosen_spanish: yo no sería
  alternatives_spanish:
  - yo no existiría
  - yo no estaría
  lexicon: HALOT
  rationale: La construcción expresa no-ser/no-existencia en el deseo de Job. 'Yo no sería' sigue más de cerca la forma verbal y suena natural en español; 'existiría' explicita demasiado el sentido.
- source_word: כְּ֝/עֹלְלִ֗ים
  english_pob_choice: like infants
  chosen_spanish: como los infantes
  alternatives_spanish:
  - como los bebés
  - como los pequeños
  lexicon: HALOT
  rationale: עֹלְלִים designa niños muy pequeños. 'Infantes' es preciso, digno y más formal que 'bebés'.
- source_word: לֹא רָ֥אוּ אֽוֹר
  english_pob_choice: who never saw light
  chosen_spanish: que no vieron la luz
  alternatives_spanish:
  - que nunca vieron la luz
  - que no vieron la luz del día
  lexicon: HALOT
  rationale: El hebreo usa un modismo para no entrar en la vida terrenal. 'No vieron la luz' reproduce la imagen y es comprensible en español; 'la luz del día' explicita más de lo que el texto dice.
translation_notes:
  revision_awareness: La versión inglesa auditada pasó de 'would not exist' a 'would not be' para acercarse más al hebreo. La redacción española sigue esa misma cercanía formal con 'yo no sería', manteniendo además el paralelismo con las comparaciones del versículo.
  spanish_consistency_notes:
  - Se conserva 'Yahvé' como término base del proyecto cuando corresponda; este versículo no lo contiene.
  - Se mantiene una distinción entre imagen poética ('la luz') y explicación implícita del modismo; la nota explica sin desactivar la metáfora.
  - '''Infantes'' se eligió por registro bíblico formal y porque evita un tono demasiado coloquial.'
