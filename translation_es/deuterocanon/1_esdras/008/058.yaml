translation:
  language: es
  text: 'Y les dije: «También ustedes son santos para Yahvé, y los utensilios son santos, y la plata y el oro son una ofrenda de voto[a] para Yahvé[b], Señor de nuestros padres».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, más literalmente desde el griego, «una ofrenda»; el paralelo hebreo tiene «una ofrenda voluntaria».
    reason: lexical_alternative
  - marker: b
    text: El griego dice aproximadamente «para el Señor, Señor de nuestros padres», mientras que el paralelo hebreo tiene «para Yahvé, el Dios de sus padres». El texto principal conserva la perspectiva griega de «nuestros padres» y usa «Yahvé» conforme a la política del proyecto para el nombre divino.
    reason: textual_variant
lexical_decisions:
- source_word: ἅγιοί
  english_pob_choice: holy
  chosen_spanish: santos
  alternatives_spanish:
  - consagrados
  - apartados
  lexicon: BDAG
  rationale: ἅγιοί expresa condición sagrada o dedicada. En español, «santos» conserva la fuerza cultual y teológica directa del predicado, mientras que «consagrados» o «apartados» son más explicativos y menos inmediatos.
- source_word: τῷ κυρίῳ
  english_pob_choice: to the Lord
  chosen_spanish: para Yahvé
  alternatives_spanish:
  - al Señor
  - para el Señor
  lexicon: BDAG
  rationale: El proyecto usa «Yahvé» para יהוה cuando el trasfondo es el nombre divino; aquí el paralelo hebreo apoya esa referencia. La dativa expresa dedicación o pertenencia, por lo que «para Yahvé» comunica bien la relación sin ocultar el nombre divino.
- source_word: τὰ σκεύη
  english_pob_choice: vessels
  chosen_spanish: los utensilios
  alternatives_spanish:
  - los vasos
  - los objetos
  lexicon: BDAG
  rationale: En contexto del templo, σκεύη se refiere a objetos de uso sagrado. «Utensilios» suena natural en español y mantiene el sentido de implementos cultuales; «vasos» sería más restrictivo y «objetos» demasiado general.
- source_word: τὸ ἀργύριον
  english_pob_choice: silver
  chosen_spanish: la plata
  alternatives_spanish:
  - el dinero
  - la plata acuñada
  lexicon: BDAG
  rationale: El emparejamiento con «el oro» favorece el sentido material. «La plata» preserva la referencia concreta mejor que «el dinero».
- source_word: τὸ χρυσίον
  english_pob_choice: gold
  chosen_spanish: el oro
  alternatives_spanish:
  - oro en metal
  - oro
  lexicon: BDAG
  rationale: El sustantivo tiene sentido material directo en este inventario sagrado. «El oro» es la forma natural y fiel en español.
- source_word: εὐχή
  english_pob_choice: vow offering
  chosen_spanish: ofrenda de voto
  alternatives_spanish:
  - ofrenda votiva
  - ofrenda
  - voto ofrendado
  lexicon: BDAG
  rationale: El griego εὐχή puede sugerir «voto» u «ofrenda»; el paralelo hebreo indica una entrega dedicada. «Ofrenda de voto» conserva la tensión entre la lectura más literal de εὐχή y el valor cultual de un don comprometido, evitando resolverla de manera demasiado libre.
- source_word: κυρίῳ τῶν πατέρων ἡμῶν
  english_pob_choice: the Lord of our fathers
  chosen_spanish: para Yahvé, el Yahvé de nuestros padres
  alternatives_spanish:
  - para el Señor de nuestros padres
  - para Yahvé, el Dios de nuestros padres
  lexicon: BDAG
  rationale: El griego transmitido y el paralelo hebreo no coinciden plenamente, y el audit trail señala una discrepancia importante. Se mantiene «de nuestros padres» por el griego, pero se explicita la identidad divina con «Yahvé» en continuidad con el trasfondo hebreo. La repetición de «Yahvé» refleja de manera transparente la estructura del texto recibido y su tensión textual.
theological_decisions:
- issue: Cómo rendir εὐχή a la luz del griego y del paralelo hebreo
  english_pob_reading: vow offering
  chosen_spanish_reading: ofrenda de voto
  alternative_spanish_readings:
  - ofrenda votiva
  - ofrenda
  - voto ofrendado
  rationale: El texto griego puede leerse como voto u ofrenda, mientras que el paralelo hebreo apunta a una ofrenda voluntaria/dedicada. «Ofrenda de voto» preserva la ambigüedad útil sin borrar el matiz cultual. No se impone una explicación teológica posterior que cierre la tensión del original.
  doctrine_reference: 'Translation philosophy: preservar la tensión entre testigos y no aplanar la semántica cultual'
- issue: Cómo tratar la clausula final con κύριος / el paralelo hebreo
  english_pob_reading: the Lord of our fathers
  chosen_spanish_reading: para Yahvé, el Yahvé de nuestros padres
  alternative_spanish_readings:
  - para el Señor de nuestros padres
  - para Yahvé, el Dios de nuestros padres
  rationale: El griego recibido es corto y el paralelo hebreo añade una apposición más explícita. Como el encargo exige usar el paralelo hebreo como entrada real pero sin perder la primacía del griego, la solución española conserva el vínculo con 'nuestros padres' y hace visible el nombre divino. La repetición puede sonar enfática, pero refleja la tensión documental en vez de ocultarla.
  doctrine_reference: 'PHILOSOPHY.md: primacía de la fuente original con uso auditable de paralelos; preservar incertidumbre textual honestamente'
translation_notes:
  revision_awareness: El borrador sigue el griego como ancla primaria y toma el paralelo hebreo como control de sentido, especialmente en εὐχή y en la clausula final. La revisión más reciente en inglés optó por una literalidad mayor ('vow offering' y 'the Lord of our fathers'), pero el estado de validación marca discrepancia importante; por eso la propuesta española mantiene la ambigüedad cultual y hace visible el nombre divino con una construcción que no borra el dato hebreo. Se evita traducir mecánicamente desde el inglés y se preserva la tensión documental en el texto y en las notas.
  spanish_consistency_notes:
  - Se usa «Yahvé» conforme al estándar del proyecto para el nombre divino.
  - Se mantiene «santos» para ἅγιοί y «utensilios» para σκεύη en contexto cultual.
  - «Ofrenda de voto» conserva la ambigüedad entre voto y don dedicado, con nota explicativa.
  - La repetición de «Yahvé» en la clausula final es deliberada y responde al cruce entre griego y hebreo.
