id: ROM.9.28
reference: Romans 9:28
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: λόγον γὰρ συντελῶν καὶ ⸀συντέμνων ποιήσει κύριος ἐπὶ τῆς γῆς.
base_translation:
  language: en
  yaml_path: translation/nt/romans/009/028.yaml
  text: For the Lord will carry out his word on the earth[c][b][a], finishing it and cutting it short.
  footnotes:
  - marker: a
    text: Or 'the Lord will execute the matter/sentence on the earth.'
    reason: lexical_alternative
  - marker: b
    text: '''Cutting it short'' may also be understood as ''shortening it'' or, by implication, ''executing it swiftly.'''
    reason: lexical_alternative
  - marker: c
    text: Some translate ἐπὶ τῆς γῆς as 'in the land,' reflecting the wording of Isaiah in its original setting; Romans here reads 'on the earth.'
    reason: cross_reference
translation:
  language: ko
  text: 주께서 말씀을 마치시고 단축하여 땅 위에서 행하실 것이기 때문입니다.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: LXX 이사야 10:22-23 인용. 헬라어 κύριος는 히브리어 본문의 יהוה(야훼)를 옮긴 것이지만, 신약 인용 본문은 이를 명시하지 않으므로 본문은 「주」로 두고 인용 배경을 각주에 밝힌다.
    reason: cross_reference
lexical_decisions:
- source_word: κύριος
  english_pob_choice: the Lord
  chosen_korean: 주
  alternatives_korean:
