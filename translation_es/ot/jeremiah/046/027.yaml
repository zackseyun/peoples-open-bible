translation:
  language: es
  text: Pero en cuanto a ti, no temas, mi siervo Jacob[c], y no te desalientes, Israel; porque, mira, yo te salvaré[a] desde lejos, y a tu descendencia desde la tierra de su cautiverio[b]. Jacob volverá y estará tranquilo y seguro, y no habrá quien lo atemorice.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «te estoy salvando». El hebreo usa un participio, que puede enfatizar una acción inminente o segura.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «desde la tierra donde ellos son cautivos».'
    reason: lexical_alternative
  - marker: c
    text: «Jacob» e «Israel» aquí personifican al pueblo del pacto.
    reason: cultural_note
lexical_decisions:
- source_word: וְאַתָּה
  english_pob_choice: But as for you
  chosen_spanish: Pero en cuanto a ti
  alternatives_spanish:
  - Y tú
  - Pero tú
  lexicon: HALOT
  rationale: La construcción con conjunción más pronombre independiente marca contraste enfático; «en cuanto a ti» conserva esa oposición discursiva de forma natural en español.
- source_word: אַל תִּירָא
  english_pob_choice: do not fear
  chosen_spanish: no temas
  alternatives_spanish:
  - no tengas miedo
  - no temas ni tengas temor
  lexicon: HALOT
  rationale: Es el equivalente imperativo habitual de ירא en una prohibición, breve y claro en español moderno.
- source_word: עַבְדִּי יַעֲקֹב
  english_pob_choice: my servant Jacob
  chosen_spanish: mi siervo Jacob
  alternatives_spanish:
  - Jacob, mi siervo
  - mi esclavo Jacob
  lexicon: HALOT
  rationale: «Siervo» refleja el título de pacto y preserva el matiz honorífico del hebreo aquí; «esclavo» sería demasiado fuerte para esta fórmula profética.
- source_word: וְאַל תֵּחַת
  english_pob_choice: and do not be dismayed
  chosen_spanish: y no te desalientes
  alternatives_spanish:
  - y no te turbes
  - y no te quebrantes
  lexicon: HALOT
  rationale: חתת en este contexto expresa desánimo/abatimiento ante el peligro; «desalentarse» funciona bien en paralelo con «no temas».
- source_word: יִשְׂרָאֵל
  english_pob_choice: Israel
  chosen_spanish: Israel
  alternatives_spanish:
  - el pueblo de Israel
  - los israelitas
  lexicon: HALOT
  rationale: Se mantiene el nombre propio como personificación del pueblo del pacto, tal como en el original y en el POB inglés.
- source_word: כִּי הִנְנִי
  english_pob_choice: for behold
  chosen_spanish: porque, mira
  alternatives_spanish:
  - porque he aquí
  - pues, mira
  lexicon: HALOT
  rationale: «Mira» reproduce bien el valor deíctico e introductorio de הִנְנִי; el «porque» expresa la relación causal del discurso.
- source_word: מוֹשִׁיעֲךָ
  english_pob_choice: I will save you
  chosen_spanish: yo te salvaré
  alternatives_spanish:
  - yo te estoy salvando
  - yo te rescataré
  lexicon: HALOT
  rationale: El participio con הִנְנִי presenta una acción segura e inminente; en español, el futuro expresa adecuadamente esa promesa. Se evita un presente progresivo poco natural aquí.
- source_word: מֵרָחוֹק
  english_pob_choice: from far away
  chosen_spanish: desde lejos
  alternatives_spanish:
  - de lejos
  - desde un lugar distante
  lexicon: HALOT
  rationale: «Desde lejos» es natural y conserva la referencia espacial amplia del hebreo.
- source_word: וְאֶת זַרְעֲךָ
  english_pob_choice: and your offspring
  chosen_spanish: y a tu descendencia
  alternatives_spanish:
  - y a tus hijos
  - y a tu semilla
  lexicon: HALOT
  rationale: «Descendencia» transmite el sentido colectivo de זֶרַע sin sonar demasiado biológico o literal en español.
- source_word: מֵאֶרֶץ שִׁבְיָם
  english_pob_choice: from the land of their captivity
  chosen_spanish: desde la tierra de su cautiverio
  alternatives_spanish:
  - desde la tierra donde están cautivos
  - desde la tierra de su exilio
  lexicon: HALOT
  rationale: «Cautiverio» refleja היטב שְׁבִי como condición de cautivos; «su» respeta el sufijo plural de la forma hebrea, como en el inglés POB.
- source_word: וְשָׁב יַעֲקֹב
  english_pob_choice: Jacob will return
  chosen_spanish: Jacob volverá
  alternatives_spanish:
  - Jacob regresará
  - Jacob tornará
  lexicon: HALOT
  rationale: שׁוּב se expresa naturalmente con «volver» en este contexto de restauración.
- source_word: וְשָׁקַט
  english_pob_choice: and be quiet
  chosen_spanish: y estará tranquilo
  alternatives_spanish:
  - y descansará
  - y quedará en calma
  lexicon: HALOT
  rationale: «Estará tranquilo» comunica la paz resultante; en español evita la posible ambigüedad de un mero silencio.
- source_word: וְשַׁאֲנַן
  english_pob_choice: and at ease
  chosen_spanish: y seguro
  alternatives_spanish:
  - y en paz
  - y confiado
  lexicon: HALOT
  rationale: El término añade seguridad/quietud confiada; «seguro» preserva bien esa idea en español, en paralelo con «tranquilo».
- source_word: וְאֵין מַחֲרִיד
  english_pob_choice: with no one to make him afraid
  chosen_spanish: y no habrá quien lo atemorice
  alternatives_spanish:
  - y nadie lo aterrorizará
  - y no habrá quien lo espante
  lexicon: HALOT
  rationale: La expresión final comunica ausencia total de amenaza; «atemorice» conserva el matiz causativo del verbo.
theological_decisions:
- issue: «Jacob»/«Israel» como referent colectivo
  english_pob_reading: Corporate personification of the covenant people, addressed through the patriarchal name.
  chosen_spanish_reading: Personificación corporativa del pueblo del pacto mediante los nombres patriarcales.
  alternative_spanish_readings:
  - El patriarca Jacob como figura individual simbólica
  - Israel como simple nombre nacional
  rationale: En este contexto profético, los dos nombres funcionan en paralelo como designaciones del pueblo exiliado/restaurado; mantenerlos sin glosa conserva la personificación bíblica.
  doctrine_reference: Covenant restoration motif in prophetic literature
translation_notes:
  revision_awareness: La revisión inglesa más reciente ajustó el participio hebreo con הִנְנִי desde un presente progresivo a un futuro («I will save you») por mejor adecuación al valor promisor e inminente. La redacción española sigue esa decisión con «yo te salvaré», manteniendo el tono de promesa segura. También se conservó la lectura colectiva de «Jacob»/«Israel» y el sustantivo de cautiverio con sufijo plural.
  spanish_consistency_notes:
  - Se emplea «Yahvé» solo cuando aparezca el tetragrámaton; en este versículo no aparece.
  - Se mantiene «siervo» para עבד en la fórmula profética, no «esclavo», por el valor de título de pacto.
  - «Descendencia» se usa para זרע como colectivo singular en español.
  - La pareja «tranquilo y seguro» intenta reproducir la secuencia de quietud y seguridad de שָׁקַט / שַׁאֲנַן sin perder naturalidad.
  - Los nombres propios «Jacob» e «Israel» se preservan como personificación del pueblo, sin sustituirlos por una paráfrasis interpretativa.
