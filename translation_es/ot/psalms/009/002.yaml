translation:
  language: es
  text: Daré gracias a Yahvé con todo mi corazón[a]; contaré todas tus maravillas.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «tus maravillas» o «tus obras maravillosas».'
    reason: lexical_alternative
lexical_decisions:
- source_word: אוֹדֶה
  english_pob_choice: I will give thanks
  chosen_spanish: Daré gracias
  alternatives_spanish:
  - Alabaré
  - Te daré gracias
  lexicon: HALOT
  rationale: El hifil de ידה expresa dar gracias o alabar en contexto de culto. En español, 'daré gracias' conserva mejor la idea de gratitud explícita que 'alabaré', sin perder el tono litúrgico del salmo.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: El texto hebreo usa el Nombre divino (Tetragrámaton). Siguiendo la decisión editorial del POB, se lo translitera como 'Yahvé' en vez de sustituirlo por un título como 'el SEÑOR'.
- source_word: בְּכָל לִבִּי
  english_pob_choice: with all my heart
  chosen_spanish: con todo mi corazón
  alternatives_spanish:
  - con mi corazón entero
  - de todo corazón
  lexicon: HALOT
  rationale: La expresión idiomática hebrea comunica devoción total e interior. 'Con todo mi corazón' es la formulación natural en español y preserva el alcance de כָּל.
- source_word: אֲסַפְּרָה
  english_pob_choice: I will recount
  chosen_spanish: contaré
  alternatives_spanish:
  - relataré
  - narraré
  - contaré en detalle
  lexicon: HALOT
  rationale: El verbo ספר en este contexto significa narrar o relatar las obras de Dios. 'Contaré' es natural en español y mantiene la idea testimonial de enumerar/relatar sus actos.
- source_word: כָּל
  english_pob_choice: all
  chosen_spanish: todas
  alternatives_spanish:
  - cada una de
  - todas las
  lexicon: HALOT
  rationale: Se conserva la fuerza de totalidad presente en el hebreo. En español, 'todas' funciona con naturalidad junto a 'maravillas' y mantiene el alcance global del enunciado.
- source_word: נִפְלְאוֹתֶיךָ
  english_pob_choice: your wondrous deeds
  chosen_spanish: tus maravillas
  alternatives_spanish:
  - tus obras maravillosas
  - tus obras prodigiosas
  - tus prodigios
  lexicon: HALOT
  rationale: El término deriva de פלא y puede referirse a actos extraordinarios que causan asombro. 'Maravillas' conserva bien el sentido de cosas portentosas/que inspiran asombro sin introducir una interpretación más estrecha que el hebreo.
theological_decisions:
- issue: Cómo representar el Nombre divino en el salmo
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: La decisión del POB es preservar el Nombre propio del pacto. 'Yahvé' mantiene esa distinción en español y evita la sustitución por un título, de acuerdo con la lectura fuente del Tetragrámaton.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יהוה YHWH → Yahvé'
translation_notes:
  revision_awareness: El contexto inglés indica alta concordancia y ninguna revisión aplicada; la redacción española sigue de cerca las decisiones léxicas ya auditadas, manteniendo el paralelismo del hebreo y la nota alternativa sobre נִפְלְאוֹתֶיךָ.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' para יהוה, conforme al estándar del proyecto.
  - Se usa 'daré gracias' para אָדֶה y no 'alabaré', para conservar la fuerza de gratitud cultual.
  - '''Maravillas'' reproduce el campo semántico de נִפְלְאוֹתֶיךָ sin añadir una glosa interpretativa en el texto principal.'
