translation:
  language: es
  text: Pero muestra bondad a los hijos de Barzilái el galaadita[a], y que estén entre los que comen de tu mesa[b], porque así fue como se acercaron a mí[c] cuando huí de Absalón tu hermano.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «trata lealmente a los hijos de Barzilái»; la expresión hebrea «hacer/mostrar hesed» puede implicar bondad leal, no solo sentimiento.
    reason: lexical_alternative
  - marker: b
    text: Literalmente, «que estén entre los que comen de tu mesa», un modismo de provisión y favor regio continuos.
    reason: cultural_note
  - marker: c
    text: O «vinieron a mí» o «se pusieron de mi lado»; el verbo hebreo dice literalmente «se acercaron», aquí con sentido de apoyo durante la huida.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְלִבְנֵי
  english_pob_choice: But ... to the sons of
  chosen_spanish: Pero ... a los hijos de
  alternatives_spanish:
  - Y ... a los hijos de
  - Pero ... a los hijos de
  lexicon: BDB / HALOT
  rationale: El hebreo enlaza con la instrucción anterior; en español, 'Pero' reproduce bien la transición discursiva. 'בנים' se traduce aquí como 'hijos' porque el contexto narrativo apunta a los descendientes varones de Barzilai, aunque 'hijos' en español también puede ser genérico de descendencia.
- source_word: בַרְזִלַּי הַגִּלְעָדִי
  english_pob_choice: Barzillai the Gileadite
  chosen_spanish: Barzilai el galaadita
  alternatives_spanish:
  - Barzilai el de Galaad
  - Barzilai el gileadita
  lexicon: BDB / HALOT
  rationale: Se translitera el nombre propio y se traduce el gentilicio de forma natural en español. 'Galaadita' comunica el origen regional sin forzar un calco extraño.
- source_word: תַּעֲשֶׂה חֶסֶד
  english_pob_choice: show kindness
  chosen_spanish: muestra bondad
  alternatives_spanish:
  - haz misericordia
  - muestra lealtad
  - obra con bondad
  lexicon: HALOT
  rationale: חֶסֶד puede incluir bondad leal o benevolencia concreta. 'Muestra bondad' conserva el acto favorable mandado por David sin convertirlo automáticamente en terminología eclesiástica más cargada. Se evita 'misericordia' por su sesgo semántico hacia compasión, menos preciso aquí.
- source_word: וְהָיוּ
  english_pob_choice: and let them be
  chosen_spanish: y que estén
  alternatives_spanish:
  - y sean
  - y estén
  - y queden
  lexicon: HALOT
  rationale: La forma funciona con valor exhortativo/resultativo. 'Que estén' expresa bien el mandato sin sonar rígido o arcaizante.
- source_word: בְּאֹכְלֵי שֻׁלְחָנֶךָ
  english_pob_choice: among those who eat at your table
  chosen_spanish: entre los que comen de tu mesa
  alternatives_spanish:
  - entre los que se sientan a tu mesa
  - entre los comensales de tu mesa
  - a tu mesa
  lexicon: HALOT
  rationale: Se mantiene la imagen idiomática de quienes comen de la mesa del rey. 'Comen de tu mesa' conserva la provisión sostenida y el favor real que el inglés POB preservó con una nota cultural.
- source_word: כִּי כֵן
  english_pob_choice: for ... this is how
  chosen_spanish: porque así
  alternatives_spanish:
  - pues así
  - porque de este modo
  - ya que así
  lexicon: HALOT
  rationale: 'La partícula explica la razón: ellos procedieron de esa manera con David. ''Porque así'' es compacto y fiel al vínculo causal y modal del hebreo.'
- source_word: קָרְב֣וּ אֵלַ֔י
  english_pob_choice: they came near to me
  chosen_spanish: se acercaron a mí
  alternatives_spanish:
  - vinieron a mí
  - se presentaron ante mí
  - se pusieron de mi lado
  lexicon: HALOT
  rationale: קרב significa literalmente 'acercarse'. En contexto implica apoyo durante la huida, pero 'se acercaron a mí' mantiene el verbo base sin cerrar innecesariamente la amplitud semántica.
- source_word: בְּבָרְחִי
  english_pob_choice: when I fled
  chosen_spanish: cuando huía
  alternatives_spanish:
  - cuando escapaba
  - al huir
  - mientras huía
  lexicon: HALOT
  rationale: La construcción temporal con infinitivo encaja naturalmente como 'cuando huía'. En español suena fluido y conserva la simultaneidad de la acción.
- source_word: מִפְּנֵי
  english_pob_choice: from
  chosen_spanish: de
  alternatives_spanish:
  - de delante de
  - de la presencia de
  - a causa de
  lexicon: HALOT
  rationale: Aunque literalmente puede significar 'de delante de / de la presencia de', aquí la idea de huida se expresa idiomáticamente con 'de'. Mantiene naturalidad sin añadir interpretación.
- source_word: אַבְשָׁלוֹם אָחִיךָ
  english_pob_choice: Absalom your brother
  chosen_spanish: Absalón tu hermano
  alternatives_spanish:
  - Absalón, tu hermano
  - Absalón, el hermano tuyo
  lexicon: BDB / HALOT
  rationale: Se conserva el nombre propio y el parentesco explícito, importante para el tono de la advertencia de David y el trasfondo político-familiar.
theological_decisions:
- issue: Valor de חֶסֶד en una orden real
  english_pob_reading: '''show kindness'' with note that hesed can also imply loyal kindness, not mere sentiment'
  chosen_spanish_reading: '''muestra bondad'' con nota de posible lealtad/clemencia leal implícita'
  alternative_spanish_readings:
  - haz lealtad
  - muestra lealtad
  - obra con misericordia
  rationale: No conviene borrar la posible tensión entre benevolencia general y lealtad pactal. La formulación principal es más natural en español, y la nota preserva que חֶסֶד puede exceder simple amabilidad.
  doctrine_reference: Éxodo 34:6; Oseas 6:6
- issue: Sentido de 'comer de tu mesa' como favor regio sostenido
  english_pob_reading: idiom for ongoing royal provision and favor
  chosen_spanish_reading: imagen de provisión y favor continuo del rey
  alternative_spanish_readings:
  - hospitalidad permanente
  - comer en tu mesa
  - ser mantenidos por tu mesa
  rationale: La frase no describe solo una comida literal, sino una inclusión duradera en el sostenimiento del rey. La traducción mantiene la metáfora y la nota explicita el trasfondo cultural.
  doctrine_reference: 2 Samuel 9:7; 1 Reyes 4:27
translation_notes:
  revision_awareness: La versión inglesa auditada pasó de 'for they came near to me in this way' a 'for this is how they came near to me' para reflejar mejor כִּי כֵן. La redacción española adopta directamente 'porque así' para preservar ese ajuste final y la relación causal-moderadora del hebreo.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' como norma del proyecto solo cuando aparezca el nombre divino; este versículo no lo contiene.
  - '''Hijos'' se usa aquí en sentido de descendencia masculina contextual, coherente con la escena dinástica.'
  - Se evita 'SEÑOR' o fórmulas litúrgicas no presentes en el texto fuente.
  - '''Mesa'' conserva el valor idiomático real, no una simple referencia doméstica.'
