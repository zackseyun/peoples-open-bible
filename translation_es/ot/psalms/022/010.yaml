translation:
  language: es
  text: Pues tú eres el que me hiciste salir del vientre,[a] dándome seguridad en los pechos de mi madre.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «haciéndome confiar» en los pechos de mi madre.
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Ya que
  lexicon: HALOT
  rationale: Introduce la razón del clamor anterior. En español, «Porque» conserva bien el valor explicativo/causal sin sonar forzado, y mantiene el flujo argumentativo del verso.
- source_word: אַתָּה
  english_pob_choice: you
  chosen_spanish: tú
  alternatives_spanish:
  - tú mismo
  - eres tú
  lexicon: HALOT
  rationale: Se conserva el pronombre explícito para destacar que Dios mismo es el sujeto de la acción, como en el audit trail inglés.
- source_word: גֹחִי
  english_pob_choice: the one who brought me out
  chosen_spanish: el que me hiciste salir
  alternatives_spanish:
  - el que me sacaste
  - el que me hiciste brotar
  lexicon: HALOT
  rationale: En contexto de nacimiento, גחה comunica hacer salir del vientre. «Me hiciste salir» conserva la imagen concreta del parto y suena natural en español. «Sacar» es posible, pero puede sonar menos marcado en el registro del nacimiento.
- source_word: מִבָּטֶן
  english_pob_choice: from the womb
  chosen_spanish: del vientre
  alternatives_spanish:
  - del seno materno
  - del útero
  lexicon: HALOT
  rationale: «Vientre» reproduce con claridad la imagen corporal y el contexto de nacimiento. «Seno materno» puede sonar más interpretativo y «útero» más técnico que poético.
- source_word: מַבְטִיחִי
  english_pob_choice: making me secure
  chosen_spanish: haciéndome estar seguro
  alternatives_spanish:
  - haciéndome confiar
  - haciéndome seguro
  lexicon: HALOT
  rationale: El Hifil de בטח puede expresar seguridad/confianza. En este contexto de lactancia, «haciéndome estar seguro» preserva la tensión entre seguridad física y confianza, sin imponer una fe consciente del lactante. Se evita resolver el matiz solo como «confiar», aunque esa lectura sigue siendo viable.
- source_word: עַל
  english_pob_choice: at
  chosen_spanish: a
  alternatives_spanish:
  - sobre
  - junto a
  lexicon: HALOT
  rationale: Con «pechos de mi madre», el español idiomático pide una preposición breve y natural. «A» refleja el entorno de lactancia sin cargar el verso con una imagen extraña.
- source_word: שְׁדֵי
  english_pob_choice: breasts
  chosen_spanish: pechos
  alternatives_spanish:
  - senos
  - mamas
  lexicon: HALOT
  rationale: «Pechos» es preciso y comprensible en español bíblico contemporáneo; evita el eufemismo de «seno» y el tecnicismo de «mamas».
- source_word: אִמִּי
  english_pob_choice: my mother’s
  chosen_spanish: de mi madre
  alternatives_spanish:
  - maternos
  - de mi mamá
  lexicon: HALOT
  rationale: Se conserva la relación posesiva de forma natural en español. «De mi madre» es el equivalente directo y más digno para este registro.
theological_decisions:
- issue: Si מַבְטִיחִי debe entenderse como confianza consciente o como seguridad/protección en la infancia
  english_pob_reading: making me secure
  chosen_spanish_reading: haciéndome estar seguro
  alternative_spanish_readings:
  - haciéndome confiar
  - causándome a confiar
  rationale: 'Se preserva la tensión documentada por el POB: el verbo puede leerse como causar confianza, pero el contexto de la lactancia apunta también a seguridad/protección concreta. La redacción española evita afirmar de forma explícita una confianza reflexiva del recién nacido.'
  doctrine_reference: Preservar la tensión léxica y teológica; equivalencia óptima
- issue: Cómo reflejar la agencia divina explícita resaltada por el pronombre אַתָּה
  english_pob_reading: you are the one who...
  chosen_spanish_reading: tú eres el que...
  alternative_spanish_readings:
  - tú eres quien...
  - eres tú el que...
  rationale: 'La forma con pronombre explícito mantiene el énfasis retórico del hebreo: Yahvé es el agente directo de la salida del vientre y del cuidado temprano.'
  doctrine_reference: Énfasis retórico y agencia divina
translation_notes:
  revision_awareness: El texto sigue de cerca el paquete fuente hebreo y el audit trail inglés; no se detectaron revisiones previas aplicadas en esta instancia, y se preservó la alternativa léxica documentada para מַבְטִיחִי en nota.
  spanish_consistency_notes:
  - Se usó «Yahvé» como nombre divino según la terminología del proyecto, aunque en este versículo el hebreo fuente no contiene el Tetragrámaton explícito.
  - Se mantuvo un registro poético y bíblico, evitando una paráfrasis expansiva.
  - Se conservaron el paralelismo y la imaginería corporal del nacimiento y la lactancia.
  - La nota al pie se ancló únicamente en la alternativa documentada para מַבְטִיחִי.
