    text: Los nombres geográficos griegos son difíciles y varían en la tradición inglesa; esta redacción conserva una transliteración cercana al texto de Swete en vez de armonizarlos con formas más familiares.
    reason: cultural_note
  revision_rationale: 'Se conserva el sentido y la transliteración del borrador, pero se ajusta la última cláusula a un español más natural: ''todas estas son ciudades fortificadas y grandes'' expresa mejor el valor descriptivo de ὀχυραὶ καὶ μεγάλαι que ''son fortificadas y grandes''. No se requieren cambios doctrinales ni textuales complejos.'
