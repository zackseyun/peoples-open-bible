translation:
  language: es
  text: Un hombre de lengua[a] no quedará firme en el país; el mal cazará al hombre de violencia hasta empellones[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «un calumniador», por «un hombre de lengua».'
    reason: lexical_alternative
  - marker: b
    text: 'O: «con empellones repetidos», tomando la frase final de modo adverbial o instrumental; el hebreo es difícil.'
    reason: lexical_alternative
lexical_decisions:
- source_word: אִישׁ לָשׁוֹן
  english_pob_choice: a man of the tongue
  chosen_spanish: el hombre de lengua
  alternatives_spanish:
  - un hombre de lengua
  - un calumniador
  - un hombre hablador
  lexicon: HALOT
  rationale: Conserva la imagen breve y metafórica del hebreo, como hizo la POB en inglés. 'Hombre de lengua' suena algo inusual, pero mantiene la tensión entre la metáfora literal y la posible referencia idiomática a la calumnia. Se evita sustituirla de entrada por una interpretación más explícita.
- source_word: בַּל
  english_pob_choice: will not
  chosen_spanish: no será
  alternatives_spanish:
  - no quedará
  - no permanecerá
  - no se afirmará
  lexicon: HALOT
  rationale: La negación poética se expresa con futuro en español para reflejar el valor predictivo/jusivo del hebreo. 'Será establecido' reproduce el matiz de firmeza o estabilidad de כון en pasiva/reflexiva sin forzar una paráfrasis.
- source_word: יִכּוֹן
  english_pob_choice: be established
  chosen_spanish: será establecido
  alternatives_spanish:
  - será afirmado
  - permanecerá firme
  - será fijado
  lexicon: HALOT
  rationale: '''Establecido'' es la correspondencia más directa y conserva la idea de firmeza jurídica/social. En español suena natural dentro del paralelismo del salmo.'
- source_word: בָּאָרֶץ
  english_pob_choice: in the land
  chosen_spanish: en la tierra
  alternatives_spanish:
  - en el país
  - en la tierra habitada
  - en la región
  lexicon: HALOT
  rationale: Se eligió 'tierra' por su amplitud semántica y porque el hebreo puede referirse tanto a territorio como a tierra en general. 'País' sería demasiado específico; 'tierra' mantiene la sobriedad del poema.
- source_word: אִישׁ חָמָס
  english_pob_choice: violent man
  chosen_spanish: el hombre de violencia
  alternatives_spanish:
  - un hombre violento
  - el violento
  - el opresor
  lexicon: HALOT
  rationale: Se prefirió una construcción de genitivo para preservar la correspondencia con el hebreo 'hombre de violencia'. 'Hombre violento' es posible, pero suaviza un poco la contundencia nominal del original.
- source_word: רָע
  english_pob_choice: evil
  chosen_spanish: el mal
  alternatives_spanish:
  - la maldad
  - lo malo
  - el perverso
  lexicon: HALOT
  rationale: La revisión inglesa aclara que רָע funciona aquí como sujeto personificado que caza al hombre de violencia. En español, 'el mal' conserva esa personificación y evita leerlo como adjetivo del hombre.
- source_word: יְצוּדֶנּוּ
  english_pob_choice: may it hunt him down
  chosen_spanish: cazará
  alternatives_spanish:
  - lo cazará
  - lo perseguirá
  - lo acechará
  lexicon: HALOT
  rationale: '''Cazar'' reproduce el campo semántico de צוד mejor que ''perseguir''. Se omite una formulación optativa en favor de un futuro poético coherente con la revisión del POB: el sujeto es ''el mal'' y la acción recae sobre ''el hombre de violencia''.'
- source_word: לְמַדְחֵפֹת
  english_pob_choice: to thrustings
  chosen_spanish: hasta las empellones
  alternatives_spanish:
  - hasta empellones repetidos
  - hasta los empujones
  - hasta las sacudidas
  lexicon: HALOT
  rationale: El hebreo es raro y difícil; la POB inglesa preserva la aspereza del plural concreto. En español, 'empellones' mantiene la idea de empujes o embestidas, aunque con naturalidad limitada. Se añade 'hasta' para reflejar el valor final/resultado del complemento.
theological_decisions:
- issue: Personificación del mal como agente que caza
  english_pob_reading: evil will hunt down a man of violence
  chosen_spanish_reading: el mal cazará al hombre de violencia
  alternative_spanish_readings:
  - la maldad perseguirá al hombre violento
  - el mal lo alcanzará
  rationale: La revisión del POB insiste en que רָע es el sujeto y que hay personificación del mal. En español se conserva esa lectura para no diluir la fuerza poética y moral del verso.
  doctrine_reference: 'Poética bíblica: personificación del mal en juicio moral'
- issue: Sentido de אִישׁ לָשׁוֹן como metáfora o etiqueta moral
  english_pob_reading: a man of the tongue
  chosen_spanish_reading: el hombre de lengua
  alternative_spanish_readings:
  - un calumniador
  - un hombre hablador
  rationale: La POB opta por mantener la metáfora principal y dejar la interpretación idiomática en nota. El español sigue esa estrategia para no cerrar prematuramente el sentido.
  doctrine_reference: 'Estrategia de traducción lexical: conservar metáfora con nota'
- issue: Dificultad final de לְמַדְחֵפֹת
  english_pob_reading: to thrustings
  chosen_spanish_reading: hasta las empellones
  alternative_spanish_readings:
  - hasta empellones repetidos
  - hasta los empujones
  - hasta las sacudidas
  rationale: El hebreo es oscuro y la POB conserva esa dificultad con una solución también áspera. El español mantiene la rareza sin inventar una claridad que el texto no ofrece.
  doctrine_reference: Respeto a la indeterminación del texto fuente
translation_notes:
  revision_awareness: La redacción sigue la revisión más reciente del POB, que reordena la segunda cola para que 'el mal' sea claramente el sujeto de 'cazar' y evita tratar רָע como adjetivo del hombre de violencia. También conserva la decisión de no domesticar 'a man of tongue' en el cuerpo principal, reservando la explicación idiomática para la nota.
  spanish_consistency_notes:
  - Se usa 'tierra' para בָּאָרֶץ conforme al valor territorial general del hebreo.
  - Se mantiene 'el mal' como sujeto personificado, coherente con la revisión auditada.
  - Se conserva una estructura nominal cercana a 'hombre de lengua' y 'hombre de violencia' para reflejar la compactación hebrea.
  - La elección de 'empellones' intenta respetar la rareza de לְמַדְחֵפֹת sin convertirla en una paráfrasis interpretativa.
