theological_decisions:
- issue: Whether ἐπιστροφῇ ψυχῆς ἡμῶν should be rendered explicitly as repentance
  chosen_reading: when our soul turns back
  alternative_readings:
  - when we repent
  - at the return of our life
  - in the conversion of our soul
  rationale: The phrase carries likely penitential force, but the Greek expression itself is more literally a 'turning back/return' of the soul. The chosen rendering preserves that theological tension rather than resolving it into the more explicit 'repent.'
  doctrine_reference: Preserve theological tension rather than resolve it.
