base_translation:
  language: en
  yaml_path: translation/ot/isaiah/031/004.yaml
  text: 'For thus Yahweh said to me: As the lion or the young lion growls over its prey[a], and though a multitude of shepherds is called out against it, it is not dismayed by their voice or intimidated by their noise[b], so Yahweh of hosts will come down to wage war on Mount Zion and on its hill.'
  footnotes:
  - marker: a
    text: Or 'the lion and the young lion'; the Hebrew pairing may be read as a poetic doublet rather than a strict alternative.
    reason: lexical_alternative
  - marker: b
    text: Or 'nor does it answer to their noise'; the Hebrew verb can be understood more literally as 'answer/respond,' though in context it likely means being subdued or intimidated.
    reason: lexical_alternative
