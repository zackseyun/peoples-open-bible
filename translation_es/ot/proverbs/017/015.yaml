translation:
  language: es
  text: El que absuelve[a] al malvado y el que condena al justo, ambos por igual son una abominación para Yahvé.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «El que justifica al malvado y el que declara culpable al justo».'
    reason: lexical_alternative
lexical_decisions:
- source_word: מַצְדִּיק
  english_pob_choice: the one who acquits
  chosen_spanish: el que absuelve
  alternatives_spanish:
  - el que justifica
  - el que declara justo
  lexicon: HALOT
  rationale: El participio causativo de צדק aquí tiene sentido forense, en paralelo con ‘condena’. ‘Absuelve’ comunica con claridad la decisión judicial de declarar libre de culpa, sin cargar el texto con el peso doctrinal que a veces acompaña a ‘justifica’.
- source_word: רָשָׁע
  english_pob_choice: the wicked
  chosen_spanish: el malvado
  alternatives_spanish:
  - el impío
  - el culpable
  lexicon: HALOT
  rationale: Designa a una persona moralmente culpable. ‘Malvado’ es natural en el tono proverbial y conserva el contraste ético; ‘culpable’ estrecha demasiado el matiz hacia lo forense.
- source_word: וּמַרְשִׁיעַ
  english_pob_choice: and the one who condemns
  chosen_spanish: y el que condena
  alternatives_spanish:
  - y el que declara culpable
  lexicon: HALOT
  rationale: En uso judicial, el verbo expresa declarar culpable/condenar. ‘Condena’ es el contrapunto español más claro de ‘absuelve’ y mantiene la antítesis forense.
- source_word: צַדִּיק
  english_pob_choice: the righteous
  chosen_spanish: al justo
  alternatives_spanish:
  - al inocente
  - al recto
  lexicon: HALOT
  rationale: En este contraste legal-moral, צַדִּיק nombra al que está en lo correcto. ‘Justo’ conserva la amplitud ética y forense mejor que ‘inocente’, que es más estrecho.
- source_word: תּוֹעֲבַת
  english_pob_choice: an abomination
  chosen_spanish: una abominación
  alternatives_spanish:
  - algo detestable
  - una cosa detestable
  lexicon: HALOT
  rationale: Es un término fuerte de repulsión moral y de pacto. ‘Abominación’ preserva esa intensidad bíblica mejor que una traducción suavizada.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  lexicon: HALOT
  rationale: Se conserva el nombre divino con la transliteración estándar del proyecto, en lugar de sustituirlo por un título.
- source_word: גַּם שְׁנֵיהֶם
  english_pob_choice: both alike
  chosen_spanish: ambos por igual
  alternatives_spanish:
  - los dos por igual
  - ambos
  lexicon: HALOT
  rationale: La frase distribuye la misma valoración sobre las dos acciones/personas. ‘Ambos por igual’ expresa con naturalidad ese énfasis distributivo.
theological_decisions:
- issue: Sentido forense de צדק/רשע en el paralelismo
  english_pob_reading: 'Judicial language: ''acquits'' and ''condemns'''
  chosen_spanish_reading: 'Lenguaje judicial: ‘absuelve’ y ‘condena’'
  alternative_spanish_readings:
  - ‘justifica’ y ‘condena’
  - ‘declara justo’ y ‘declara culpable’
  rationale: El paralelismo apunta a una inversión de justicia en ámbito judicial. ‘Absuelve/condena’ preserva esa tensión legal sin introducir una carga doctrinal posterior en ‘justifica’.
  doctrine_reference: 'Translation philosophy: preserve source text''s plain sense; avoid importing doctrinal claims the proverb does not state.'
translation_notes:
  revision_awareness: El inglés POB llegó a una revisión estable sin cambios; esta versión española sigue esa lectura auditada y conserva el paralelismo forense con una formulación natural en español.
  spanish_consistency_notes:
  - Se mantiene Yahvé para el Tetragrama, conforme al estándar del proyecto.
  - Se evita ‘SEÑOR’ como sustitución; el nombre divino permanece explícito.
  - Se usa vocabulario judicial (‘absuelve’, ‘condena’) para reflejar el contraste forense del hebreo.
  - Se conserva ‘abominación’ por su fuerza pactal y moral en la literatura sapiencial.
