id: GEN.29.15
reference: Genesis 29:15
source:
  edition: WLC
  text: וַ/יֹּ֤אמֶר לָבָן֙ לְ/יַעֲקֹ֔ב הֲ/כִי אָחִ֣/י אַ֔תָּה וַ/עֲבַדְתַּ֖/נִי חִנָּ֑ם הַגִּ֥ידָ/ה לִּ֖/י מַה מַּשְׂכֻּרְתֶּֽ/ךָ־־׃
translation:
  text: Then Laban said to Jacob[a], “Because you are my relative, should you work for me for nothing? Tell me, what your wages should be.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew 'my brother'; here used in the broader sense of a relative or kinsman.
    reason: lexical_alternative
lexical_decisions:
- source_word: הֲכִי
  chosen: Because
  alternatives:
  - Is it because
  - Should it be because
  - Just because
  lexicon: HALOT
  rationale: 'Introduces the rhetorical basis of Laban’s question. In context the clause is not a simple information question but the premise for what follows: Jacob should not work unpaid merely on account of kinship.'
- source_word: אָחִי
  chosen: my relative
  alternatives:
  - my brother
  - my kinsman
  lexicon: HALOT
  rationale: Although אָח often literally means 'brother,' it can denote a broader kinship relation. Since Jacob is Laban’s nephew, 'my relative' best reflects the actual relationship in clear modern English without falsely specifying a sibling bond. 'My kinsman' is possible but less natural.
- source_word: וַעֲבַדְתַּנִי
  chosen: should you work for me
  alternatives:
  - will you serve me
  - have you worked for me
  lexicon: HALOT
  rationale: The verb עבד here refers to labor rendered to Laban. 'Work for me' is natural English and fits the employment context signaled by the following mention of wages. The form is taken rhetorically with the preceding particle, not as a simple past statement.
- source_word: חִנָּם
  chosen: for nothing
  alternatives:
  - without pay
  - gratis
  - free of charge
  lexicon: HALOT
  rationale: Conveys unpaid labor. 'For nothing' preserves the idiomatic force and pairs well with the subsequent question about wages. 'Without pay' is slightly more explicit but less literary.
- source_word: הַגִּידָה לִּי
  chosen: Tell me
  alternatives:
  - Declare to me
  - Inform me
  lexicon: HALOT
  rationale: Imperative plus indirect object rendered in straightforward modern English. 'Tell me' is the most natural equivalent.
- source_word: מַה מַשְׂכֻּרְתֶּךָ
  chosen: what should your wages be
  alternatives:
  - what is your wage
  - what shall your pay be
  - what is your compensation
  lexicon: HALOT
  rationale: מַשְׂכֹּרֶת denotes wages/pay. The modal 'should ... be' fits the negotiation context better than a flat present tense, since Laban is asking Jacob to name the compensation to be set.
