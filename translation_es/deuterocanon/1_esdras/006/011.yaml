translation:
  language: es
  text: Entonces les preguntamos, para hacértelo saber y para escribirte los nombres de los hombres que los dirigían[a], y les pedimos la lista de nombres de los que estaban al frente de ellos[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, 'que iban al frente de ellos'; el participio griego es algo difícil y puede enfatizar tanto el liderazgo como a quienes presentaban el informe formal.
    reason: lexical_alternative
  - marker: b
    text: La expresión 'la lista de nombres de los que estaban al frente de ellos' se refiere a un registro oficial de los dirigentes que supervisaban la obra.
    reason: cultural_note
lexical_decisions:
- source_word: ἐπερωτήσαμεν
  english_pob_choice: we questioned
  chosen_spanish: les preguntamos
  alternatives_spanish:
  - les cuestionamos
  - les interrogamos
  lexicon: BDAG
  rationale: El verbo griego expresa preguntar de manera formal o investigativa. En español, 'les preguntamos' mantiene el carácter de indagación sin sonar excesivamente forense; 'cuestionamos' o 'interrogamos' serían posibles, pero más duros o marcados.
- source_word: ἕνεκεν τοῦ γνωρίσαι σοι
  english_pob_choice: in order to make it known to you
  chosen_spanish: para hacértelo saber
  alternatives_spanish:
  - para informártelo
  - con el fin de hacértelo conocer
  lexicon: BDAG
  rationale: La construcción expresa propósito. 'Para hacértelo saber' conserva la finalidad comunicativa en español natural y evita una formulación demasiado literal y pesada.
- source_word: γράψαι σοι
  english_pob_choice: to write to you
  chosen_spanish: para escribirte
  alternatives_spanish:
  - para escribirte acerca de ello
  - para dejarte por escrito
  lexicon: BDAG
  rationale: El infinitivo de propósito epistolar se expresa con naturalidad como 'para escribirte'. En contexto, el objeto implícito ya queda recogido en lo anterior, por lo que no hace falta repetirlo.
- source_word: τοὺς ἀνθρώπους
  english_pob_choice: the names of the men
  chosen_spanish: los nombres de los hombres
  alternatives_spanish:
  - los hombres
  - los nombres de las personas
  lexicon: BDAG
  rationale: Dado que la acción de escribir está dirigida a registrar identidades, conviene trasladar el complemento como 'los nombres de los hombres'. Así se conserva la función administrativa del pasaje y se evita convertir ἀνθρώπους en un genérico que diluya el referente masculino concreto del contexto.
- source_word: τοὺς ἀφηγουμένους
  english_pob_choice: who were leading them
  chosen_spanish: que iban al frente
  alternatives_spanish:
  - que los guiaban
  - que estaban dirigiéndolos
  - que encabezaban
  lexicon: LSJ
  rationale: El participio es algo difícil y puede sugerir liderazgo o guía. 'Iban al frente' conserva la imagen espacial de estar delante, compatible con el sentido de liderazgo, sin resolver de manera excesiva la ambigüedad del griego.
- source_word: ὀνοματογραφίαν
  english_pob_choice: the list of names
  chosen_spanish: la lista de nombres
  alternatives_spanish:
  - el registro de nombres
  - la relación de nombres
  lexicon: LSJ
  rationale: El término raro apunta a un registro o listado escrito. 'Lista de nombres' es la equivalencia española más clara y administrativamente natural.
- source_word: τῶν προκαθηγουμένων
  english_pob_choice: those who were at their head
  chosen_spanish: de los que estaban a su cabeza
  alternatives_spanish:
  - de sus jefes
  - de los que los presidían
  lexicon: LSJ
  rationale: La expresión preserva la imagen relacional del griego y evita reducir demasiado pronto el matiz a un simple título. 'A su cabeza' mantiene la idea de dirección o presidencia sobre el grupo.
translation_notes:
  revision_awareness: Se siguió el anclaje principal del griego de Swete, con apoyo del audit trail en inglés para resolver la dificultad de ἀφηγουμένους y de ὀνοματογραφίαν. La traducción española conserva la ambigüedad funcional del liderazgo sin forzar una interpretación más específica de la que permite el texto.
  spanish_consistency_notes:
  - Se mantuvo un registro administrativo y sobrio, acorde con el contexto de informe oficial.
  - Se evitó un calco excesivo que sonara poco natural en español, especialmente en las construcciones de propósito.
  - Se preservó la distinción entre una acción de preguntar y el contenido del listado solicitado.
