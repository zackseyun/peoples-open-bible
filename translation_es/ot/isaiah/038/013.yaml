translation:
  language: es
  text: Esperé hasta la mañana[a]; como un león, así quiebra[b] todos mis huesos. Del día a la noche me llevas a mi fin.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Me compuse hasta la mañana». El verbo inicial es difícil y algunos lo entienden como autocontrol más que como espera.'
    reason: lexical_alternative
  - marker: b
    text: El hebreo pasa de «él quiebra» a «tú me llevas a mi fin»; se conserva en la traducción el cambio poético de destinatario.
    reason: alternative_reading
lexical_decisions:
- source_word: שִׁוִּיתִי
  english_pob_choice: I waited
  chosen_spanish: Esperé
  alternatives_spanish:
  - Me compuse
  - Me mantuve en calma
  - Me quedé esperando
  lexicon: HALOT
  rationale: El verbo es difícil y admite matices de espera o de autocontrol. En el flujo de la queja de Ezequías, "Esperé" comunica de manera natural la permanencia sufrida hasta la mañana, sin resolver indebidamente la ambigüedad del hebreo.
- source_word: עַד בֹּקֶר
  english_pob_choice: until morning
  chosen_spanish: hasta la mañana
  alternatives_spanish:
  - hasta el amanecer
  - hasta el alba
  lexicon: HALOT
  rationale: La expresión temporal es directa. "Mañana" funciona bien en español moderno y conserva el tramo de tiempo señalado por el hebreo.
- source_word: כָּאֲרִי
  english_pob_choice: like a lion
  chosen_spanish: como un león
  alternatives_spanish:
  - cual león
  - como león
  lexicon: HALOT
  rationale: La comparación se mantiene de forma literal, porque el hebreo presenta un símil violento que conviene conservar sin parafrasear.
- source_word: כֵּן
  english_pob_choice: so
  chosen_spanish: así
  alternatives_spanish:
  - entonces
  - de ese modo
  lexicon: HALOT
  rationale: '"Así" reproduce bien la relación de consecuencia/comparación entre la imagen del león y la acción siguiente.'
- source_word: יְשַׁבֵּר
  english_pob_choice: he breaks
  chosen_spanish: me rompe
  alternatives_spanish:
  - me quiebra
  - me destroza
  - me despedaza
  lexicon: HALOT
  rationale: El piel de שבר expresa quebrar con fuerza. En español, "rompe" es claro y mantiene la imagen corporal de los huesos, sin intensificar más allá de lo que el texto exige.
- source_word: כָּל עַצְמוֹתָי
  english_pob_choice: all my bones
  chosen_spanish: todos los huesos
  alternatives_spanish:
  - todos mis huesos
  - cada uno de mis huesos
  lexicon: HALOT
  rationale: Se conserva la imagen corporal extrema. En español, el posesivo explícito puede omitirse por fluidez cuando el sentido ya queda claro por el verbo de primera persona.
- source_word: מִיּוֹם עַד לַיְלָה
  english_pob_choice: From day to night
  chosen_spanish: De día hasta la noche
  alternatives_spanish:
  - De la mañana a la noche
  - Del día a la noche
  lexicon: HALOT
  rationale: La secuencia hebrea describe el transcurso del día. "De día hasta la noche" suena natural en español y mantiene el alcance temporal amplio.
- source_word: תַּשְׁלִימֵנִי
  english_pob_choice: you bring me to an end
  chosen_spanish: me llevas a mi fin
  alternatives_spanish:
  - me consumes
  - me das fin
  - me conduces a la ruina
  lexicon: HALOT
  rationale: El hiphil de שלם aquí expresa llevar a término, es decir, a un final. "Me llevas a mi fin" conserva el cambio a segunda persona y la fuerza del cierre sin introducir una interpretación doctrinal ajena.
theological_decisions:
- issue: Cambio de tercera a segunda persona en el verso
  english_pob_reading: 'Retain the Hebrew shift: ''he breaks ... you bring me to an end'''
  chosen_spanish_reading: 'Mantener el cambio: «como un león, así me rompe... / ... me llevas a mi fin»'
  alternative_spanish_readings:
  - Unificar todo en tercera persona
  - Hacer que ambas cláusulas se dirijan directamente a Dios
  rationale: El hebreo alterna entre referencia en tercera persona y dirección en segunda persona. En español conviene preservar esa tensión poética en vez de armonizarla, porque forma parte del efecto lamentatorio del pasaje.
  doctrine_reference: Preservar la tensión teológica en lugar de resolverla.
translation_notes:
  revision_awareness: Se siguió la lectura del inglés POB y su auditoría léxica, manteniendo la ambigüedad de שִׁוִּיתִי y el cambio de persona del verso. No se aplicaron revisiones posteriores porque el expediente indica que no hubo cambios necesarios.
  spanish_consistency_notes:
  - Se usa «Yahvé» en la obra cuando el contexto lo requiera, pero en este versículo no aparece el nombre divino explícito en el hebreo.
  - Se prefirió «rompe» por ser claro y suficientemente fuerte en español, evitando sobreintensificar el cuadro.
  - Se mantuvo el registro bíblico contemporáneo y digno, sin arcaísmos innecesarios.
