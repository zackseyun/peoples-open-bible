  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: καὶ γὰρ ὅτε πρὸς ὑμᾶς ἦμεν, προελέγομεν ὑμῖν ὅτι μέλλομεν θλίβεσθαι, καθὼς καὶ ἐγένετο καὶ οἴδατε.
base_translation:
  language: en
  yaml_path: translation/nt/1_thessalonians/003/004.yaml
  text: For even when we were with you[a], we kept telling you beforehand that we were going to suffer affliction, just as it also happened, and you know it.
  footnotes:
  - marker: a
    text: Or 'be afflicted' or 'suffer tribulation.' The Greek verb can denote experiencing pressure, distress, or persecution.
    reason: lexical_alternative
translation:
  language: ko
  text: 우리가 여러분과 함께 있을 때에도 우리는 환난을 당할 것[a]이라고 여러분에게 미리 말해 왔으며, 실제로 그렇게 되었고 여러분도 그것을 알고 있습니다.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 또는 「압박을 받을 것」, 「고난을 당할 것」. 헬라어 동사는 압박·고난·박해의 경험을 포괄한다.
    reason: lexical_alternative
lexical_decisions:
- source_word: προελέγομεν
  english_pob_choice: we kept telling you beforehand
  chosen_korean: 미리 말해 왔으며
  alternatives_korean:
  - 미리 일러 두었으며
  - 거듭 예고해 왔으며
  lexicon: BDAG
  rationale: 미완료 과거형의 반복·지속을 「말해 왔다」로 자연스럽게 담는다.
- source_word: μέλλομεν θλίβεσθαι
  english_pob_choice: we were going to suffer affliction
  chosen_korean: 환난을 당할 것
  alternatives_korean:
  - 압박을 받을 것
  - 고난을 받을 것
  lexicon: BDAG
  rationale: μέλλω + 부정사의 「~할 것」 미래 표현과 θλίβομαι 수동의 「당하다」 의미. 「환난」 어휘로 일관성 유지.
- source_word: καθὼς καὶ ἐγένετο καὶ οἴδατε
  english_pob_choice: just as it also happened, and you know it
  chosen_korean: 실제로 그렇게 되었고 여러분도 그것을 알고 있습니다
  alternatives_korean:
  - 그대로 일어났고 여러분도 알고 있습니다
  - 그러한 대로 되었고 여러분이 알고 있습니다
  lexicon: BDAG
  rationale: 강조 「καί ... καί」 구조를 「실제로 ... 여러분도 ...」로 자연스럽게 옮긴다.
