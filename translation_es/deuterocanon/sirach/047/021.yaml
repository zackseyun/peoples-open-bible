translation:
  language: es
  text: para dividir al pueblo en dos tribus[a], y de Efraín un reino sin ley[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Griego: «para que el gobierno se dividiera y de Efraín comenzara un reino desobediente». El hebreo dice más explícitamente: «para dividir al pueblo en dos tribus».'
    reason: alternative_reading
  - marker: b
    text: También puede entenderse como «violento» o «rebelde». חמס puede denotar violencia o maldad; el paralelo griego enfatiza desobediencia o rebelión.
    reason: lexical_alternative
lexical_decisions:
- source_word: לחלק
  english_pob_choice: to divide
  chosen_spanish: dividir
  alternatives_spanish:
  - partir
  - separar
  lexicon: HALOT
  rationale: El infinitivo constructo expresa provocar una división; «dividir» reproduce de forma natural la idea de una escisión política, en línea con el griego δίχα.
- source_word: העם
  english_pob_choice: the people
  chosen_spanish: al pueblo
  alternatives_spanish:
  - a la gente
  - a la nación
  lexicon: HALOT
  rationale: «Pueblo» comunica el conjunto comunitario/covenantal y suena más natural en español que repetir «la gente» o cargar con «nación».
- source_word: לשני שבטים
  english_pob_choice: into two tribes
  chosen_spanish: en dos tribus
  alternatives_spanish:
  - en dos grupos tribales
  - en dos clanes
  lexicon: HALOT
  rationale: «Tribus» conserva el valor formal de שבטים; se evita añadir explicaciones históricas que el hebreo no explicita.
- source_word: ומאפרים
  english_pob_choice: and from Ephraim
  chosen_spanish: y de Efraín
  alternatives_spanish:
  - y desde Efraín
  - y a partir de Efraín
  lexicon: HALOT
  rationale: La preposición מן se vierte de manera directa con «de», manteniendo la amplitud de origen/locus y la correspondencia con ἐξ Ἐφραὶμ.
- source_word: ממלכת
  english_pob_choice: kingdom
  chosen_spanish: monarquía
  alternatives_spanish:
  - reino
  - reinado
  lexicon: HALOT
  rationale: Aunque «reino» es posible, «monarquía» ayuda a reflejar el matiz político de la línea, evitando que suene a territorio solamente; mantiene la tensión con el griego βασιλεία.
- source_word: חמס
  english_pob_choice: lawless
  chosen_spanish: sin ley
  alternatives_spanish:
  - violenta
  - rebelde
  - injusta
  lexicon: HALOT
  rationale: «Sin ley» preserva la amplitud semántica de חמס y evita decidir de antemano entre violencia, rebelión o injusticia; además traduce con claridad la valoración moral negativa que el contexto exige.
- source_word: γενέσθαι δίχα τυραννίδα
  english_pob_choice: to divide the people into two tribes
  chosen_spanish: para dividir al pueblo en dos tribus
  alternatives_spanish:
  - para que el gobierno se dividiera
  - para dividir el dominio en dos
  lexicon: BDAG
  rationale: El griego habla de una división del dominio/gobierno, pero el hebreo es la base principal aquí. La traducción española sigue el hebreo y deja visible el efecto político con una construcción final natural.
- source_word: ἄρξαι βασιλείαν ἀπειθῆ
  english_pob_choice: a lawless kingdom
  chosen_spanish: una monarquía sin ley
  alternatives_spanish:
  - un reino rebelde
  - un reino desobediente
  lexicon: BDAG
  rationale: El griego ἀπειθῆ sugiere desobediencia/rebeldía, mientras que el hebreo חמס sugiere violencia/iniquidad. «Monarquía sin ley» conserva una valoración negativa amplia sin cerrar indebidamente la tensión lexical entre ambos testigos.
theological_decisions:
- issue: Cómo reflejar la condena moral del surgimiento del reino de Efraín
  english_pob_reading: lawless kingdom
  chosen_spanish_reading: monarquía sin ley
  alternative_spanish_readings:
  - reino violento
  - reino rebelde
  - reino desobediente
  rationale: La fuente hebrea y la griega convergen en una caracterización negativa, pero con matices distintos. «Sin ley» mantiene la desaprobación moral sin reducirla solo a violencia física o solo a rebelión política.
  doctrine_reference: Preservar la tensión léxica documentada entre חמס y ἀπειθῆ; no armonizar en exceso.
translation_notes:
  revision_awareness: 'La versión inglesa revisada eliminó «to raise up» por no estar representado en el hebreo y dejó una segunda cláusula más elíptica. En español, la redacción sigue esa economía sintáctica: no añade un verbo de alzamiento y mantiene el contraste entre la división del pueblo y la procedencia de Efraín como núcleo del enunciado.'
  spanish_consistency_notes:
  - Se usó «Yahvé» por defecto en el proyecto, pero este versículo no contiene el nombre divino.
  - Se prefirió «monarquía» en vez de «reino» para conservar el matiz político del contexto, aunque «reino» sigue siendo una alternativa válida en notas.
  - «Sin ley» se eligió como equivalente amplio de חמס para no fijar prematuramente una sola lectura semántica.
  - La nota [a] recoge la diferencia de base entre el hebreo y el griego; la nota [b] preserva la alternativa lexical documentada por la POB inglesa.
