id: TIT.1.12
reference: Titus 1:12
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: εἶπέν τις ἐξ αὐτῶν, ἴδιος αὐτῶν προφήτης, Κρῆτες ἀεὶ ψεῦσται, κακὰ θηρία, γαστέρες ἀργαί·
base_translation:
  language: en
  yaml_path: translation/nt/titus/001/012.yaml
  text: One of them[a], their own prophet, said, “Cretans are always liars, evil beasts, lazy gluttons.”
  footnotes:
  - marker: a
    text: Literally, “lazy bellies.”
    reason: lexical_alternative
translation:
  language: ko
  text: 그들 중 한 사람, 곧 그들 자신의 예언자가 이렇게 말했습니다. 「크레타 사람들은 언제나 거짓말쟁이요, 악한 짐승이요, 게으른 배[a]다.」
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 헬라어 직역. 게으르고 먹는 일에만 빠져 있는 자를 가리키는 풍자적 표현. 「게으른 먹보」로도 옮길 수 있으나, 인용된 시구의 통렬한 풍자를 살리기 위해 직역을 본문에 둔다.
    reason: lexical_alternative
theological_decisions:
- issue: 크레타 시인의 인용구를 부드럽게 옮기지 않고 풍자의 통렬함을 보존
  chosen_reading: 언제나 거짓말쟁이요, 악한 짐승이요, 게으른 배다
  alternative_readings:
  - 늘 거짓말을 하고 사나운 짐승 같으며 게으른 먹보다
  - 항상 거짓되고 짐승 같고 게으른 자들이다
  rationale: 본 인용구는 크레타의 시인 에피메니데스로 알려진 자의 시구로, 바울이 그것을 본문에 도입하여 거짓 교사들의 실상을 적나라하게 드러내는 수사적 장치이다. 한국어 번역에서 「먹보」 등의 완곡한 표현으로 부드럽게 만들면, 바울이 의도한 풍자의 무게가 사라진다. 북극성 원칙(저자 의도와 본문의 진실하고 강한 의미 보존)에 따라 「거짓말쟁이·악한 짐승·게으른 배」의 직설적 표현을 본문에 살린다.
  doctrine_reference: 'CLAUDE.md (cartha-translation): North star — render true and powerful meaning, as close to the original scribe as possible'
lexical_decisions:
- source_word: ἴδιος αὐτῶν προφήτης
  english_pob_choice: their own prophet
  chosen_korean: 그들 자신의 예언자
  alternatives_korean:
  - 그들의 친 예언자
  - 그들 가운데 한 예언자
  lexicon: BDAG
  rationale: ἴδιος + αὐτῶν의 이중 강조를 「그들 자신의」로 살린다.
- source_word: Κρῆτες
  english_pob_choice: Cretans
  chosen_korean: 크레타 사람들
  alternatives_korean:
  - 그레데인
  lexicon: BDAG
  rationale: 1:5에서 「크레타」로 표기한 것과 일관되게 「크레타 사람들」로 옮긴다.
- source_word: ἀεὶ ψεῦσται
  english_pob_choice: always liars
  chosen_korean: 언제나 거짓말쟁이
  alternatives_korean:
  - 항상 거짓말하는 자들
  - 늘 거짓말을 일삼는 자들
  lexicon: BDAG
  rationale: ψεύστης는 거짓을 일삼는 자. 「거짓말쟁이」가 풍자의 강도를 살린다.
- source_word: κακὰ θηρία
  english_pob_choice: evil beasts
  chosen_korean: 악한 짐승
  alternatives_korean:
  - 사나운 짐승
  - 흉악한 짐승
  lexicon: BDAG
  rationale: θηρίον은 야수·짐승. 「악한 짐승」이 모욕적 강도를 그대로 살린다.
- source_word: γαστέρες ἀργαί
  english_pob_choice: lazy gluttons
  chosen_korean: 게으른 배
  alternatives_korean:
  - 게으른 먹보
  - 일하지 않는 배
  lexicon: BDAG
  rationale: γαστήρ(배) + ἀργός(게으른)의 환유. 영어 POB는 「lazy gluttons」로 의역했으나, 한국어는 풍자의 시각적 강도를 살려 직역 「게으른 배」를 본문에 두고 각주로 의역을 둔다.
