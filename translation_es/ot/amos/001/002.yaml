translation:
  language: es
  text: 'Y dijo: Yahvé ruge desde Sión y da[a] su voz desde Jerusalén; los pastos[b] de los pastores se enlutan, y se seca la cima[c] del Carmelo.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «emite su voz». El hebreo dice literalmente: «da su voz».'
    reason: lexical_alternative
  - marker: b
    text: 'O: «las pasturas» o «las praderas de los pastores».'
    reason: lexical_alternative
  - marker: c
    text: 'Hebreo: «la cabeza del Carmelo», es decir, su cima o altura más alta.'
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el SEÑOR
  - Yahveh
  lexicon: HALOT
  rationale: Se conserva el nombre propio del pacto, como exige la política española del proyecto. 'Yahvé' comunica directamente el Tetragrámaton sin ocultarlo bajo una convención litúrgica.
- source_word: יִשְׁאָג
  english_pob_choice: roars
  chosen_spanish: ruge
  alternatives_spanish:
  - brama
  - ruge como un león
  lexicon: HALOT
  rationale: El verbo hebreo expresa el rugido de un león; 'ruge' mantiene la imagen profética con naturalidad en español.
- source_word: יִתֵּן קוֹלוֹ
  english_pob_choice: gives his voice
  chosen_spanish: da su voz
  alternatives_spanish:
  - emite su voz
  - hace oír su voz
  - truena
  lexicon: HALOT
  rationale: Se preserva el modismo hebreo literalmente, como en el audit trail inglés, para no perder el paralelismo entre 'ruge' y 'da su voz'.
- source_word: נְא֣וֹת
  english_pob_choice: pastures
  chosen_spanish: moradas
  alternatives_spanish:
  - pastos
  - dehesas
  - prados
  lexicon: HALOT
  rationale: En el contexto de pastores y juicio, el término puede referir tanto a pastos como a lugares habitados. 'Moradas' sigue la lectura del POB inglés de 'habitations' como posibilidad contextual, pero en español se deja una alternativa interpretativa en nota para no cerrar el sentido.
- source_word: הָרֹעִים
  english_pob_choice: the shepherds
  chosen_spanish: los pastores
  alternatives_spanish:
  - los ganaderos
  - los cuidadores de rebaños
  lexicon: HALOT
  rationale: Es la equivalencia más natural y precisa para el participio hebreo aplicado a quienes pastorean rebaños.
- source_word: אָבְלוּ
  english_pob_choice: mourn
  chosen_spanish: se enlutan
  alternatives_spanish:
  - se lamentan
  - muestran duelo
  - se marchitan
  lexicon: HALOT
  rationale: El verbo se personifica en la tierra; 'se enlutan' conserva el matiz de duelo/lamento que el inglés POB enfatiza sin reducirlo sólo a un fenómeno agrícola.
- source_word: רֹאשׁ
  english_pob_choice: the summit
  chosen_spanish: la cima
  alternatives_spanish:
  - la cumbre
  - la cabeza
  - la parte alta
  lexicon: HALOT
  rationale: Para una elevación geográfica, 'cima' comunica bien el hebreo 'cabeza' sin perder el sentido topográfico. Se mantiene la nota de altura y prominencia.
- source_word: הַכַּרְמֶל
  english_pob_choice: Carmel
  chosen_spanish: el Carmelo
  alternatives_spanish:
  - Carmel
  - Monte Carmelo
  lexicon: HALOT
  rationale: En español bíblico, 'el Carmelo' es natural y reconocible. Se evita añadir 'Monte' porque el hebreo no lo explicita.
- source_word: וַיֹּאמַר
  english_pob_choice: And he said
  chosen_spanish: Y dijo
  alternatives_spanish:
  - Y él dijo
  - Y habló
  lexicon: HALOT
  rationale: Se conserva la apertura narrativa directa; en español, el sujeto puede omitirse sin pérdida.
theological_decisions:
- issue: Nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: La política del proyecto exige transliterar el nombre divino cuando aparece explícitamente en hebreo. 'Yahvé' preserva esa decisión y evita la sustitución por un título.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Imagen de juicio sobre la creación y el territorio
  english_pob_reading: the pastures of the shepherds mourn; the summit of Carmel dries up
  chosen_spanish_reading: las moradas de los pastores se enlutan, y se seca la cima del Carmelo
  alternative_spanish_readings:
  - los pastos de los pastores se lamentan, y se seca la cabeza del Carmelo
  - las dehesas de los pastores se enlutan, y se seca el vértice del Carmelo
  rationale: 'Se conserva la personificación poética del juicio: el territorio responde con duelo y sequedad. La traducción evita domesticar la metáfora a un mero dato agrícola.'
  doctrine_reference: Poética profética y juicio sobre la tierra en Amós 1:2; cf. el paralelismo del versículo.
translation_notes:
  revision_awareness: La versión inglesa auditada mantuvo el nombre divino como Yahweh, conservó el modismo 'gives his voice', y explicó en nota la alternativa 'meadows/pastures' y la expresión 'head of Carmel'. El español sigue esas decisiones, pero adapta 'pastures of the shepherds' a una formulación que conserve la personificación y no fuerce una sola lectura terminológica.
  spanish_consistency_notes:
  - Se mantiene Yahvé para יְהוָה en coherencia con el estándar español del proyecto.
  - Se conserva el paralelo verbal 'ruge / da su voz' para reflejar el hebreo.
  - Las notas siguen la numeración funcional del audit trail inglés, con equivalentes españoles claros y sin ampliar indebidamente el sentido.
