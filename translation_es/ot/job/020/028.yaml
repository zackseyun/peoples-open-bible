translation:
  language: es
  text: El producto de su casa será llevado,[b] corriendo como agua en el día de su ira[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Probablemente se refiere a la ira de Dios, aunque el hebreo deja implícito el referente.
    reason: theological_note
  - marker: b
    text: O «se irá al exilio»; el verbo puede denotar irse o ser removido, aquí del producto o riqueza de la casa del malvado.
    reason: lexical_alternative
lexical_decisions:
- source_word: יִגֶל
  english_pob_choice: will be carried away
  chosen_spanish: será llevado
  alternatives_spanish:
  - será removido
  - será llevado al exilio
  - será apartado
  lexicon: HALOT
  rationale: El verbo puede expresar irse, salir o ser removido; en este contexto, con "el producto" como sujeto, el español natural y fiel es "será llevado", conservando la idea de desplazamiento sin introducir un agente explícito.
- source_word: יְב֣וּל
  english_pob_choice: produce
  chosen_spanish: producto
  alternatives_spanish:
  - producción
  - fruto
  - cosecha
  lexicon: HALOT
  rationale: Se refiere al rendimiento o producto de una casa/propiedad. "Producto" conserva el sentido económico-material y funciona bien con el registro sobrio del verso.
- source_word: בֵּיתוֹ
  english_pob_choice: of his house
  chosen_spanish: de su casa
  alternatives_spanish:
  - de su hogar
  - de su familia
  - de su casa/estirpe
  lexicon: HALOT
  rationale: La imagen hebrea de "casa" puede abarcar hogar, patrimonio y linaje. "De su casa" preserva esa amplitud sin explicitar más de lo que el texto dice.
- source_word: נִגָּרוֹת
  english_pob_choice: flowing away
  chosen_spanish: fluyendo
  alternatives_spanish:
  - derramándose
  - corriendo
  - escurriéndose
  lexicon: HALOT
  rationale: El participio transmite la imagen de algo que corre o se derrama. "Fluyendo" conserva la metáfora hídrica y la relación con la revisión inglesa reciente, sin volverla demasiado interpretativa.
- source_word: בְּיוֹם
  english_pob_choice: in the day of
  chosen_spanish: en el día de
  alternatives_spanish:
  - el día de
  - cuando
  - al día de
  lexicon: HALOT
  rationale: Se mantiene la fórmula temporal hebrea para conservar el tono solemne y la estructura del original.
- source_word: אַפּוֹ
  english_pob_choice: his anger
  chosen_spanish: su enojo
  alternatives_spanish:
  - su ira
  - su furor
  - su enojo
  lexicon: HALOT
  rationale: אַף suele designar ira o enojo. "Enojo" es claro en español y mantiene la ambigüedad del referente, que el contexto sugiere como divino sin nombrarlo explícitamente.
theological_decisions:
- issue: Referente implícito del enojo
  english_pob_reading: kept as 'his anger' without explicitly supplying 'God's' in the main text
  chosen_spanish_reading: se mantiene como "su enojo" sin añadir "de Dios" en el texto principal
  alternative_spanish_readings:
  - el enojo de Dios
  - su ira
  rationale: El contexto apunta con fuerza al juicio divino, pero el hebreo deja el referente implícito. Se conserva esa tensión en el texto principal y se deja constancia mediante nota, sin resolverla prematuramente.
  doctrine_reference: Preservar la tensión textual y la ambigüedad referencial; no suplir sujetos implícitos sin necesidad.
translation_notes:
  revision_awareness: Se tomó en cuenta la revisión inglesa más reciente, que sustituyó una imagen más abrupta por "flowing away" para acercarse al matiz de derramarse o correr del hebreo. Por eso el español usa "fluyendo" para reflejar esa metáfora líquida, manteniendo además la posibilidad de desplazamiento en "será llevado".
  spanish_consistency_notes:
  - Se evitó "SEÑOR" y se conservó la referencia implícita al agente del enojo, conforme al criterio POB para no resolver el referente sin base explícita.
  - '"Producto" y "casa" mantienen la imagen económica y doméstica del hebreo; no se expandió a "familia" o "patrimonio" en el texto principal.'
  - La puntuación busca reproducir la pausa del hebreo con una cadencia formal y publicable en español.
