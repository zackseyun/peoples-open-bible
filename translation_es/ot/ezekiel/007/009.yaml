revisions:
- from: Mi ojo no perdonará[a], ni tendré compasión. Pondré tus caminos[b] sobre ti, y tus abominaciones estarán en medio de ti. Entonces sabrán que yo soy Yahvé[c], el que hiere.
  to: Mi ojo no perdonará[a], ni tendré compasión. Pondré tus caminos[b] sobre ti, y tus abominaciones estarán en medio de ti. Entonces sabrán ustedes que yo soy Yahvé[c], el que hiere.
  rationale: Se corrige «Entonces sabrán» a «Entonces sabrán ustedes» para reflejar la 2ª persona plural del hebreo y mantener la fuerza directa del anuncio profético. También se ajusta la nota sobre YHWH para describir correctamente la relación entre el hebreo y la forma española «Yahvé». Se conservan las demás decisiones léxicas porque son fieles al hebreo y legibles en español.
