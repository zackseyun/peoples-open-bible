translation:
  language: es
  text: Y Joás durmió con sus padres y fue sepultado en Samaria con los reyes de Israel, y Jeroboam su hijo reinó en su lugar.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: וַיִּשְׁכַּב
  english_pob_choice: slept
  chosen_spanish: durmió
  alternatives_spanish:
  - se acostó
  - murió
  lexicon: HALOT
  rationale: En fórmulas regias funerarias, שׁכב con 'con sus padres' funciona como eufemismo de muerte. 'Durmió' conserva el giro formulístico sin volverlo demasiado interpretativo; 'murió' explicita el sentido, pero pierde la huella idiomática.
- source_word: עִם אֲבֹתָיו
  english_pob_choice: with his fathers
  chosen_spanish: con sus padres
  alternatives_spanish:
  - con sus antepasados
  lexicon: HALOT
  rationale: '''Padres'' refleja de forma directa la expresión hebrea recurrente y mantiene la fórmula tradicional del libro. ''Antepasados'' aclara el sentido, pero suaviza la correspondencia léxica con el hebreo.'
- source_word: וַיִּקָּבֵר
  english_pob_choice: was buried
  chosen_spanish: fue sepultado
  alternatives_spanish:
  - fue enterrado
  - y fue sepultado
  lexicon: HALOT
  rationale: El niphal pide una pasiva natural en español. 'Sepultado' es formal y bíblico, y encaja bien con el registro regio; 'enterrado' es posible, pero menos solemne.
- source_word: בְּשֹׁמְרוֹן
  english_pob_choice: in Samaria
  chosen_spanish: en Samaria
  alternatives_spanish:
  - en la ciudad de Samaria
  lexicon: HALOT
  rationale: La preposición locativa ב se rinde naturalmente por 'en'. 'Samaria' funciona como topónimo estable en español bíblico y no requiere expansión.
- source_word: עִם מַלְכֵי יִשְׂרָאֵל
  english_pob_choice: with the kings of Israel
  chosen_spanish: con los reyes de Israel
  alternatives_spanish:
  - entre los reyes de Israel
  - junto con los reyes de Israel
  lexicon: HALOT
  rationale: '''Con'' preserva la relación asociativa de עִם en el contexto de sepultura. No se fuerza un sentido de ubicación física adicional; la frase mantiene la asociación funeraria con reyes anteriores.'
- source_word: וַיִּמְלֹךְ
  english_pob_choice: reigned
  chosen_spanish: reinó
  alternatives_spanish:
  - comenzó a reinar
  - fue hecho rey
  lexicon: HALOT
  rationale: '''Reinó'' reproduce la fórmula narrativa estándar de sucesión real y corresponde al valor del verbo en este contexto.'
- source_word: תַּחְתָּיו
  english_pob_choice: in his place
  chosen_spanish: en su lugar
  alternatives_spanish:
  - en vez de él
  - después de él
  lexicon: HALOT
  rationale: La expresión idiomática de sucesión se naturaliza como 'en su lugar', que conserva el valor de reemplazo dinástico sin resultar rígida.
translation_notes:
  revision_awareness: La versión inglesa auditada está en alta concordancia con el hebreo y no presenta notas textuales ni revisiones aplicadas; por eso la propuesta española sigue la misma lectura formulística sin introducir variantes.
  spanish_consistency_notes:
  - Se mantiene el nombre Joás para יְהוֹאָשׁ, conforme al uso castellano habitual para el rey de Israel.
  - Se conserva el paralelismo de la fórmula funeraria real con un verbo eufemístico ('durmió') y una pasiva formal ('fue sepultado').
  - No se añade puntuación explicativa ni glosa, para respetar el carácter breve del aviso regnal.
