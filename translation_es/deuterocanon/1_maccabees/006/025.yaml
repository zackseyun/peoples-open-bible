translation:
  language: es
  text: Eran ejecutados, y nuestras herencias eran saqueadas. Y no solo extendieron la mano contra nosotros, sino también contra todos sus territorios[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «todas sus fronteras» o «todas las regiones a su alrededor». El término griego puede denotar líneas fronterizas o los territorios definidos por ellas.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐθανατοῦντο
  english_pob_choice: were being put to death
  chosen_spanish: estaban siendo muertos
  alternatives_spanish:
  - eran matados
  - estaban siendo asesinados
  lexicon: LSJ
  rationale: El imperfecto pasivo sugiere acción continua o repetida en el pasado; en español, "estaban siendo muertos" conserva mejor la pasividad y la fuerza del verbo que una forma más general como "eran matados".
- source_word: κληρονομίαι
  english_pob_choice: inheritances
  chosen_spanish: herencias
  alternatives_spanish:
  - posesiones heredadas
  - patrimonios
  lexicon: LSJ
  rationale: El término griego puede referirse a bienes heredados o posesión ancestral. "Herencias" mantiene el sentido familiar y patrimonial sin añadir un matiz más técnico que no exige el contexto.
- source_word: διηρπάζοντο
  english_pob_choice: were being plundered
  chosen_spanish: estaban siendo saqueadas
  alternatives_spanish:
  - eran saqueadas
  - estaban siendo despojadas
  lexicon: LSJ
  rationale: El verbo expresa captura violenta o pillaje. "Saqueadas" reproduce bien esa violencia y se ajusta al contexto bélico.
- source_word: ἐξέτειναν χεῖρα
  english_pob_choice: stretched out their hand against
  chosen_spanish: extendieron la mano contra
  alternatives_spanish:
  - alzaron la mano contra
  - atacaron
  lexicon: LSJ
  rationale: La expresión es idiomática para una acción hostil. "Extendieron la mano contra" conserva la imagen original y sigue siendo comprensible en español.
- source_word: ὅρια
  english_pob_choice: all their territories
  chosen_spanish: todos sus territorios
  alternatives_spanish:
  - todos sus límites
  - todas sus fronteras
  - todas sus regiones
  lexicon: LSJ
  rationale: El griego puede significar límites, fronteras o territorios definidos por ellos. Dado el contexto, "territorios" comunica mejor la extensión espacial afectada y sigue de cerca la revisión inglesa final.
- source_word: αὐτῶν
  english_pob_choice: their
  chosen_spanish: sus
  alternatives_spanish:
  - de ellos
  lexicon: LSJ
  rationale: El pronombre se refiere naturalmente al grupo hostil mencionado en la frase. "Sus" mantiene la referencia y funciona con naturalidad en español.
theological_decisions:
- issue: Expresión de pasividad y violencia en la persecución
  english_pob_reading: They were being put to death... were being plundered
  chosen_spanish_reading: Estaban siendo muertos... estaban siendo saqueadas
  alternative_spanish_readings:
  - eran matados... eran saqueadas
  - estaban siendo asesinados... estaban siendo despojadas
  rationale: No se suaviza la violencia del pasivo; se conserva la idea de acción continuada en el pasado. Esto mantiene la intensidad histórica del lamento sin convertirlo en una formulación más interpretativa.
  doctrine_reference: Ninguna doctrina específica; fidelidad semántica al relato histórico.
translation_notes:
  revision_awareness: La revisión inglesa más reciente sustituyó 'neighboring territories' por 'all their territories' para ajustarse mejor a πάντα τὰ ὅρια αὐτῶν; por eso la versión española evita cualquier idea de 'vecinos' o 'alrededores' y usa 'todos sus territorios'.
  spanish_consistency_notes:
  - Se mantiene "herencias" para κληρονομίαι, en línea con la decisión inglesa de 'inheritances'.
  - Se usa "territorios" para ὅρια siguiendo la revisión final inglesa y evitando agregar un matiz no explícito de 'vecinos'.
  - El paralelismo verbal en imperfecto progresivo ('estaban siendo...') refleja la acumulación de acciones hostiles en el versículo.
