review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien la estructura griega y refleja adecuadamente la mayor parte del sentido: Demetrio ve la tranquilidad del país, despide sus fuerzas, retiene las extranjeras reclutadas de las islas y luego las fuerzas heredadas se le vuelven hostiles. Sin embargo, hay dos desajustes importantes con el expediente inglés y con el griego: la nota [a] fue anclada en la cláusula equivocada (debería corresponder a «fuerzas extranjeras», no a «nada se le oponía»), y falta la nota explicativa cultural sobre «las fuerzas de sus padres», que el POB inglés preserva para aclarar el contraste con las tropas extranjeras.'
  spanish_quality_summary: El español es generalmente claro y digno. No obstante, «cada una a su propio lugar» suena algo forzado en español para referirse a contingentes militares; «cada una a su lugar» o «cada cual a su lugar» fluye mejor. Además, «se volvieron hostiles a él» es comprensible pero menos idiomático que «se le volvieron hostiles».
  glossary_alignment: No hay términos teológicos sensibles aquí. Las decisiones léxicas principales («la tierra», «quieta», «fuerzas extranjeras», «reclutado») son coherentes con el POB. Conviene conservar «fuerzas extranjeras» en el texto principal y dejar «mercenarias» en nota, y añadir nota para «de sus padres» explicando el sentido dinástico/heredado.
  issues:
  - severity: high
    issue: La nota [a] está colocada sobre «nada se le oponía» pero su contenido explica «fuerzas mercenarias / fuerzas extranjeras».
    rationale: Esto rompe la trazabilidad nota-texto exigida y desinforma al lector sobre qué expresión está siendo aclarada.
  - severity: medium
    issue: Falta una nota para «de sus padres».
    rationale: 'El expediente inglés conserva una nota cultural importante: probablemente se refiere a las tropas tradicionales heredadas del dominio de sus antepasados, en contraste con las extranjeras retenidas.'
  - severity: low
    issue: «Cada una a su propio lugar» suena algo pesado.
    rationale: Aunque fiel, en español militar-narrativo suena más natural «cada una a su lugar» sin pérdida de sentido.
  - severity: low
    issue: «Se volvieron hostiles a él» es menos natural que «se le volvieron hostiles».
    rationale: La segunda formulación mantiene el mismo sentido y mejora la fluidez idiomática.
