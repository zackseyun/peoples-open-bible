translation:
  language: es
  text: En cuanto a ti, oh rey, tus pensamientos vinieron a tu mente en tu lecho acerca de lo que habría de suceder después de esto, y el que revela misterios te ha dado a conocer lo que habría de suceder.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: אַ֣נְתְּה
  english_pob_choice: As for you
  chosen_spanish: En cuanto a ti
  alternatives_spanish:
  - Tú
  - En lo que a ti toca
  lexicon: HALOT
  rationale: El pronombre independiente es enfático y tópico; «En cuanto a ti» conserva esa puesta en foco mejor que un simple «tú».
- source_word: מַלְכָּא
  english_pob_choice: O king
  chosen_spanish: oh rey
  alternatives_spanish:
  - rey
  - oh, rey
  lexicon: HALOT
  rationale: Es un vocativo directo; «oh rey» mantiene el registro cortesano y natural en español.
- source_word: רַעְיוֹנָךְ
  english_pob_choice: your thoughts
  chosen_spanish: tus pensamientos
  alternatives_spanish:
  - tus reflexiones
  - tus ideas
  lexicon: HALOT
  rationale: El sustantivo se refiere a pensamientos o reflexiones mentales; «pensamientos» es la opción más amplia y clara.
- source_word: עַל מִשְׁכְּבָךְ
  english_pob_choice: on your bed
  chosen_spanish: en tu lecho
  alternatives_spanish:
  - sobre tu cama
  - mientras estabas en tu lecho
  lexicon: HALOT
  rationale: La imagen es locativa; «en tu lecho» suena natural en español bíblico contemporáneo y conserva el contexto de reposo nocturno.
- source_word: סְלִקוּ
  english_pob_choice: came up
  chosen_spanish: subieron
  alternatives_spanish:
  - ascendieron
  - se levantaron
  lexicon: HALOT
  rationale: El verbo arameo literalmente expresa subir/ascender; con «pensamientos» en plural, «subieron» conserva la metáfora y la concordancia.
- source_word: מָה דִּי לֶהֱוֵא אַחֲרֵי דְנָה
  english_pob_choice: about what would happen after this
  chosen_spanish: acerca de lo que habría de suceder después de esto
  alternatives_spanish:
  - sobre lo que sucedería después de esto
  - acerca de lo que ocurriría luego
  lexicon: HALOT
  rationale: La cláusula expresa el contenido de los pensamientos y su orientación futura; «habría de suceder» mantiene el matiz prospectivo sin endurecerlo.
- source_word: וְגָלֵא רָזַיָּא
  english_pob_choice: he who reveals mysteries
  chosen_spanish: el que revela misterios
  alternatives_spanish:
  - el que desvela misterios
  - el que descubre misterios
  lexicon: HALOT
  rationale: La expresión participial funciona descriptivamente; se evita convertirla en un título más rígido de lo que exige el arameo.
- source_word: הוֹדְעָךְ
  english_pob_choice: has made known to you
  chosen_spanish: te ha dado a conocer
  alternatives_spanish:
  - te ha hecho saber
  - te ha revelado
  lexicon: HALOT
  rationale: El causativo significa hacer saber o dar a conocer; «te ha dado a conocer» es idiomático en español y conserva el valor perfectivo.
- source_word: מָה דִי לֶהֱוֵא
  english_pob_choice: what would happen
  chosen_spanish: lo que habría de suceder
  alternatives_spanish:
  - lo que sucedería
  - lo que iba a pasar
  lexicon: HALOT
  rationale: La repetición final retoma el contenido revelado; se unifica con la primera ocurrencia para claridad y coherencia estilística.
theological_decisions:
- issue: Expresión aramea para Dios en וְגָלֵא רָזַיָּא
  english_pob_reading: he who reveals mysteries
  chosen_spanish_reading: el que revela misterios
  alternative_spanish_readings:
  - el Revelador de misterios
  - el que desvela misterios
  rationale: La forma participial se traduce descriptivamente para no introducir un título sustantivado no explícito en el arameo, pero sí conservar la acción reveladora atribuida a Dios.
  doctrine_reference: Translation philosophy §§1, 5
translation_notes:
  revision_awareness: La versión inglesa fue revisada desde «the Revealer of mysteries» a «he who reveals mysteries» para evitar una titulación más fuerte que el arameo. La presente redacción española sigue esa decisión y mantiene la misma solución descriptiva sin capitalización titulativa.
  spanish_consistency_notes:
  - Se mantiene «misterios» en plural como en el original.
  - Se conserva el paralelismo entre la primera y la última cláusula con «lo que habría de suceder».
  - Se usa un registro bíblico sobrio sin recurrir a «SEÑOR» u այլ sustituciones no sustentadas por el texto.
