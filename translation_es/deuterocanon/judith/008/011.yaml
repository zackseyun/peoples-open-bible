translation:
  language: es
  text: 'Y ellos vinieron a ella, y ella les dijo: «Escúchenme, gobernantes de los habitantes de Betulia, porque no es correcta la palabra que hablaron contra el pueblo en este día, y han establecido el juramento que pronunciaron entre Dios y ustedes mismos, y dijeron que entregarían la ciudad a nuestros enemigos, si en estos días[a] Yahvé no vuelve para ayudarlos».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Griego literalmente: «si no en ellas»; el pronombre probablemente se refiere a los días mencionados antes en el juramento.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἄρχοντες
  english_pob_choice: rulers
  chosen_spanish: gobernantes
  alternatives_spanish:
  - dirigentes
  - jefes
  lexicon: LSJ
  rationale: ἄρχοντες designa a quienes ejercen autoridad. «Gobernantes» conserva ese peso de mando sin introducir una connotación monárquica o aristocrática demasiado específica.
- source_word: τῶν κατοικούντων ἐν Βαιτυλουά
  english_pob_choice: of the inhabitants of Bethulia
  chosen_spanish: de los habitantes de Betulia
  alternatives_spanish:
  - de los que habitan en Betulia
  - de los moradores de Betulia
  lexicon: LSJ
  rationale: El participio κατοικούντων expresa a quienes residen allí. «Habitantes» es natural en español y conserva el referente colectivo del griego.
- source_word: οὐκ εὐθὺς ὁ λόγος ὑμῶν
  english_pob_choice: the word that you spoke ... is not right
  chosen_spanish: no es recta la palabra que hablaron
  alternatives_spanish:
  - no es correcta la palabra que hablaron
  - no es recta su palabra
  lexicon: LSJ
  rationale: εὐθύς literalmente es «recto», y en este contexto tiene sentido moral o práctico. Se conserva la imagen con «recta» para no suavizar la fuerza de la evaluación, aunque suene más literal que «correcta».
- source_word: ἐναντίον τοῦ λαοῦ
  english_pob_choice: against the people
  chosen_spanish: contra el pueblo
  alternatives_spanish:
  - ante el pueblo
  - en presencia del pueblo
  lexicon: LSJ
  rationale: 'Aquí ἐναντίον es adversativo: la palabra fue dicha de modo hostil respecto del pueblo. «Contra» expresa mejor esa oposición que una mera localización.'
- source_word: ἐστήσατε τὸν ὅρκον
  english_pob_choice: you have imposed the oath
  chosen_spanish: han establecido el juramento
  alternatives_spanish:
  - han impuesto el juramento
  - han fijado el juramento
  lexicon: LSJ
  rationale: El verbo significa literalmente «poner/establecer». «Establecido» mantiene la idea de instituir formalmente el juramento. «Impuesto» es posible, pero en español sugiere una acción más coercitiva que no está explícita en el griego.
- source_word: ἀνὰ μέσον τοῦ θεοῦ καὶ ὑμῶν
  english_pob_choice: between God and yourselves
  chosen_spanish: entre Dios y ustedes mismos
  alternatives_spanish:
  - entre Dios y ustedes
  lexicon: LSJ
  rationale: Se conserva la estructura relacional del griego. «Ustedes mismos» refleja el valor reflexivo de ὑμῶν y mantiene la solemnidad del pacto/juramento.
- source_word: ἐκδώσειν τὴν πόλιν
  english_pob_choice: hand over the city
  chosen_spanish: entregarían la ciudad
  alternatives_spanish:
  - pondrían la ciudad en manos de
  - cederían la ciudad
  lexicon: LSJ
  rationale: ἐκδίδωμι aquí es «surrender/hand over». «Entregarían» es natural en español y preserva la idea de ceder la ciudad a un tercero.
- source_word: ἐὰν μὴ ἐν αὐταῖς
  english_pob_choice: if within these days
  chosen_spanish: si en estos días
  alternatives_spanish:
  - si dentro de estos días
  - si en ellos
  lexicon: LSJ
  rationale: El pronombre femenino plural es temporalmente ambiguo; el contexto del juramento implica un período de días. En español se explicita mínimamente con «en estos días» sin exceder la evidencia del texto.
- source_word: ἐπιστρέψῃ ὁ κύριος βοήθειαν ὑμῖν
  english_pob_choice: the Lord does not return to help you
  chosen_spanish: el Señor no vuelve a ayudarlos
  alternatives_spanish:
  - el Señor no regresa a ayudarles
  - el Señor no retorna para ayudarlos
  lexicon: LSJ
  rationale: ἐπιστρέφω conserva su valor de retorno/vuelta. «Vuelve a ayudar» comunica el movimiento de retorno con naturalidad en español. «Señor» sigue la decisión del POB para κύριος en contexto bíblico-teísta.
theological_decisions:
- issue: Renderización de κύριος en contexto judío-scriptural
  english_pob_reading: the Lord
  chosen_spanish_reading: el Señor
  alternative_spanish_readings:
  - el Dueño
  - el Maestro
  rationale: En este contexto se refiere a Dios dentro del marco bíblico; la tradición del POB en inglés usa «Lord» y en español la equivalencia idiomática y reverente es «Señor». No se usa el nombre divino aquí porque el término fuente es κύριος y el audit trail lo trata como título teológico.
  doctrine_reference: 'DOCTRINE.md contested terms: κύριος → Lord'
translation_notes:
  revision_awareness: 'He seguido la revisión más reciente del audit trail al preferir «habitantes», «establecido» y «vuelve a ayudar», pero mantuve una formulación española más natural y fiel al griego: «han establecido» en lugar de una coerción implícita demasiado fuerte, y «no es recta» para conservar εὐθύς. La nota de tiempo implícito se conserva con el valor temporal del pronombre femenino plural.'
  spanish_consistency_notes:
  - Se mantuvo «Betulia» como toponimia transliterada estable.
  - Se usó «Dios» para θεός y «el Señor» para κύριος según el contexto teísta del pasaje.
  - Se conservó una estructura formal, con segunda persona plural de respeto/generalización («ustedes») acorde al diálogo colectivo.
  - La nota al pie marca la ambigüedad temporal del pronombre femenino plural sin sobreexplicar el pasaje.
