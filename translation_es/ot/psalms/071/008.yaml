translation:
  language: es
  text: Mi boca estará llena de tu alabanza[a], de tu esplendor[b] todo el día.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Mi boca está llena de tu alabanza, de tu esplendor todo el día»; o quizás: «Que mi boca se llene de tu alabanza...». El imperfecto hebreo puede leerse con matiz futuro, presente o jussivo en este contexto poético.'
    reason: alternative_reading
  - marker: b
    text: 'O: «tu gloria», «tu hermosura» o «tu majestad» para «tu esplendor».'
    reason: lexical_alternative
lexical_decisions:
- source_word: יִמָּלֵא
  english_pob_choice: will be filled
  chosen_spanish: estará llena
  alternatives_spanish:
  - está llena
  - llénese
  - sea llena
  lexicon: HALOT
  rationale: El nifal imperfecto de מלא admite valor futuro, presente o volitivo en poesía. En español, «estará llena» conserva el sentido resultativo/prospectivo sin forzar una lectura de ruego que el contexto no exige.
- source_word: פִי
  english_pob_choice: my mouth
  chosen_spanish: mi boca
  alternatives_spanish:
  - mi boca/mis labios
  - mi habla
  lexicon: HALOT
  rationale: Se mantiene la imagen corporal concreta del hebreo. «Mi boca» es el equivalente natural en español para el órgano de la խոս语/palabra en poesía.
- source_word: תְּהִלָּתֶךָ
  english_pob_choice: your praise
  chosen_spanish: tu alabanza
  alternatives_spanish:
  - alabanza de ti
  - tu elogio
  - tu fama
  lexicon: HALOT
  rationale: El sustantivo en constructo con sufijo de 2ms expresa alabanza dirigida a Dios. «Tu alabanza» preserva la relación posesiva y la fuerza devocional sin diluirla en una paráfrasis.
- source_word: כָּל הַיּוֹם
  english_pob_choice: all day long
  chosen_spanish: todo el día
  alternatives_spanish:
  - todo el día entero
  - a lo largo de todo el día
  lexicon: HALOT
  rationale: «Todo el día» expresa de manera natural la duración continua del hebreo y suena más idiomático en español que un giro calcado.
- source_word: תִּפְאַרְתֶּךָ
  english_pob_choice: your splendor
  chosen_spanish: tu esplendor
  alternatives_spanish:
  - tu gloria
  - tu hermosura
  - tu majestad
  lexicon: HALOT
  rationale: תפארת abarca belleza, honor, gloria y esplendor. «Esplendor» conserva la imagen poética y evita cargar el término con un sentido litúrgico más fijo que el del original.
theological_decisions:
- issue: 'Valor verbal de יִמָּלֵא: futuro, presente o ruego'
  english_pob_reading: My mouth will be filled with your praise...
  chosen_spanish_reading: Mi boca estará llena de tu alabanza...
  alternative_spanish_readings:
  - Mi boca está llena de tu alabanza...
  - Llénese mi boca de tu alabanza...
  - Que mi boca sea llena de tu alabanza...
  rationale: El hebreo permite más de una matización aspectual/modal. La redacción principal conserva la lectura declarativa/prospectiva, mientras la nota recoge las alternativas reconocidas por el texto.
  doctrine_reference: Poética hebrea; aspecto verbal imperfectivo y modalidad en Salmos
- issue: 'Naturaleza de תִּפְאַרְתֶּךָ: gloria/esplendor/majestad'
  english_pob_reading: your splendor
  chosen_spanish_reading: tu esplendor
  alternative_spanish_readings:
  - tu gloria
  - tu hermosura
  - tu majestad
  rationale: No conviene fijar prematuramente el término en una sola glosa teológica. «Esplendor» preserva el paralelismo con «alabanza» y mantiene abierta la gama semántica atestiguada por el hebreo.
  doctrine_reference: Lexicografía poética de תפארת; teología doxológica
- issue: Direccionalidad de תְּהִלָּתֶךָ
  english_pob_reading: your praise
  chosen_spanish_reading: tu alabanza
  alternative_spanish_readings:
  - alabanza de ti
  - alabanza hacia ti
  rationale: La construcción hebrea puede entenderse como alabanza perteneciente a Dios o dirigida a Dios. En español, «tu alabanza» reproduce la ambigüedad funcional sin perder la referencia teocéntrica.
  doctrine_reference: Gramática de constructo con sufijo en poesía hebrea
translation_notes:
  revision_awareness: El contexto de revisión indica que no se aplicaron cambios recientes y que el acuerdo con el control cruzado fue alto. Por eso se mantiene una solución conservadora, siguiendo la lectura principal del texto hebreo y reflejando en nota la ambigüedad verbal documentada por el audit trail inglés.
  spanish_consistency_notes:
  - Se preserva el paralelismo poético con «alabanza / esplendor».
  - Se evita sustituir el lenguaje de la imagen corporal por una paráfrasis abstracta.
  - Se usa «Yahvé» cuando el texto explícitamente lo requiera; aquí no aparece el nombre divino, por lo que no se introduce.
  - La nota al pie usa el único marcador necesario y corresponde exactamente al punto de ambigüedad verbal del versículo.
