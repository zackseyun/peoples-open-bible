  yaml_path: translation/nt/acts/014/005.yaml
  text: And when an attempt was made by both the Gentiles and the Jews[a], together with their rulers, to mistreat them and to stone them[b],
  footnotes:
  - marker: a
    text: Or 'a rush' or 'an assault' was made. The Greek ὁρμή can denote a violent movement or onset; 'attempt' is chosen here because the hostile actions are expressed as intended acts ('to mistreat' and 'to stone') rather than completed ones.
    reason: lexical_alternative
  - marker: b
    text: Or 'the Jews' could be rendered 'the Judeans' in some contexts. Here it likely refers to Jewish opponents as a group rather than specifically people from Judea.
    reason: lexical_alternative
