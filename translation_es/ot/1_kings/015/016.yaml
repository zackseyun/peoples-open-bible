    text: 'También puede traducirse: «todos sus días» o «todos los días de sus vidas». El hebreo dice literalmente: «todos sus días».'
    reason: lexical_alternative
  revision_rationale: Se ajusta la expresión temporal a un español más natural ('durante todos sus días') mientras la nota conserva la literalidad hebrea y corrige el plural de la alternativa expansiva.
