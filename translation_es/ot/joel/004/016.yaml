  yaml_path: translation/ot/joel/004/016.yaml
  text: And Yahweh roars from Zion and gives his voice from Jerusalem[a], and the heavens and the earth quake; but Yahweh is a refuge for his people[b], and a stronghold for the sons of Israel.
  footnotes:
