    text: 'O: «de las cosas escondidas de la arena». La frase probablemente alude a recursos asociados con la costa o regiones arenosas.'
    reason: lexical_alternative
  revision_rationale: 'La revisión hace un ajuste mínimo pero necesario: reubica el verbo ''sacarán'' para que gobierne naturalmente ambos complementos y elimine la sensación de frase incompleta en español, preservando la metáfora documentada en el POB. Se conservan ''monte'' y ''sacrificios de justicia'' para respetar la ambigüedad y la racionalidad léxica ya establecidas. Las notas se simplifican y alinean mejor con las alternativas significativas del expediente inglés.'
