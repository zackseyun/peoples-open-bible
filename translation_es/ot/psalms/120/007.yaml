translation:
  language: es
  text: Yo estoy por la paz[a]; pero cuando hablo[b], ellos están por la guerra.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo literalmente: "Yo—paz"; la traducción lo vierte como "Yo estoy por la paz" para expresar en español la postura o disposición del hablante.'
    reason: lexical_alternative
  - marker: b
    text: 'O: "y cuando". La conjunción hebrea puede leerse de manera más simple, pero el contexto favorece un valor adversativo.'
    reason: alternative_reading
lexical_decisions:
- source_word: אֲנִי
  english_pob_choice: I
  chosen_spanish: Yo
  alternatives_spanish:
  - Yo mismo
  - Yo soy
  lexicon: HALOT
  rationale: El pronombre de primera persona se mantiene explícito para conservar el énfasis del hebreo. En español, 'Yo soy' en la primera cláusula ayuda a sostener la estructura enfática de la frase nominal.
- source_word: שָׁלוֹם
  english_pob_choice: for peace
  chosen_spanish: por la paz
  alternatives_spanish:
  - paz
  - pacífico
  - a favor de la paz
  lexicon: HALOT
  rationale: El hebreo dice literalmente 'yo—paz', un giro nominal. En español, 'por la paz' comunica mejor la orientación o postura del hablante sin convertirlo en una afirmación ontológica ('yo soy paz').
- source_word: וְכִי
  english_pob_choice: but when
  chosen_spanish: pero cuando
  alternatives_spanish:
  - y cuando
  - sin embargo, cuando
  - y aunque
  lexicon: HALOT
  rationale: La partícula conjuntiva adquiere fuerza adversativa por el contraste del verso. 'Pero cuando' expresa con naturalidad esa oposición en español, como hace el inglés POB.
- source_word: אֲדַבֵּר
  english_pob_choice: I speak
  chosen_spanish: hablo
  alternatives_spanish:
  - hablara
  - hablara yo
  - hablo de paz
  lexicon: HALOT
  rationale: El verbo en primera persona se vierte en presente simple, adecuado para el enunciado poético. No se añade 'de paz', porque el hebreo no lo explicita.
- source_word: הֵמָּה
  english_pob_choice: they
  chosen_spanish: ellos
  alternatives_spanish:
  - ellos mismos
  - esos
  - aquellos
  lexicon: HALOT
  rationale: El pronombre de tercera persona plural se conserva de manera directa. 'Ellos' mantiene la referencia a los oponentes y el contraste enfático del verso.
- source_word: לַמִּלְחָמָה
  english_pob_choice: for war
  chosen_spanish: para la guerra
  alternatives_spanish:
  - para la guerra
  - a la guerra
  - bentidos a la guerra
  lexicon: HALOT
  rationale: La preposición ל indica orientación o disposición. 'Para la guerra' reproduce el paralelismo con 'por la paz' y mantiene la fuerza de orientación hostil sin ampliar el sentido.
translation_notes:
  revision_awareness: Se sigue el texto hebreo masorético (WLC) y el audit trail inglés POB, que ya resuelve el hebraísmo nominal 'I—peace' como una declaración de disposición a favor de la paz y entiende וְכִי con contraste contextual. No se documentan cambios de revisión en el material proporcionado.
  spanish_consistency_notes:
  - Se usa 'paz' y 'guerra' en sustantivos abstractos, conservando el paralelismo semántico del hebreo.
  - Se evita 'Cristo', 'SEÑOR' u otra terminología teológica ajena porque el verso no la contiene.
  - La puntuación con dos puntos no se emplea para no forzar una explicación; la cláusula mantiene el estilo poético breve del original.
