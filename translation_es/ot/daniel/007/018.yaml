translation:
  language: es
  text: Pero los santos[a] del Altísimo recibirán el reino y poseerán el reino para siempre, por los siglos de los siglos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «los seres santos del Altísimo». La expresión aramea puede referirse al pueblo santo de Dios; algunos intérpretes también entienden aquí una referencia celestial.
    reason: lexical_alternative
lexical_decisions:
- source_word: וִיקַבְּלוּן
  english_pob_choice: will receive
  chosen_spanish: recibirán
  alternatives_spanish:
  - tomarán
  - les será dado
  lexicon: HALOT
  rationale: El peal imperfecto de קבל en arameo bíblico expresa aquí la recepción del reino. «Recibirán» conserva ese sentido directo sin introducir la idea de tomar por la fuerza ni hacer explícita una pasiva que no está en la forma verbal.
- source_word: מַלְכוּתָא
  english_pob_choice: the kingdom
  chosen_spanish: el reino
  alternatives_spanish:
  - la realeza
  - el dominio real
  lexicon: HALOT
  rationale: En Daniel, el sustantivo puede abarcar reino como ámbito y como ejercicio de gobierno. «El reino» es la opción más natural en español y mantiene el contraste con los reinos bestiales del contexto.
- source_word: קַדִּישֵׁי
  english_pob_choice: the holy ones
  chosen_spanish: los santos
  alternatives_spanish:
  - los santos del Altísimo
  - los seres santos
  lexicon: HALOT
  rationale: El arameo sustantivado significa literalmente «los santos / los santos-uno(s)». En español, «santos» es una forma clara y bíblica; sin embargo, aquí se conserva la equivalencia con la nota porque el referente sigue siendo debatido y puede abarcar al pueblo de Dios o a seres celestiales.
- source_word: עֶלְיוֹנִין
  english_pob_choice: of the Most High
  chosen_spanish: del Altísimo
  alternatives_spanish:
  - del Más Alto
  lexicon: HALOT
  rationale: Es un título divino en Daniel. «Altísimo» reproduce bien el valor superlativo y es la forma idiomática y reverente en español.
- source_word: וְיַחְסְנּוּן
  english_pob_choice: and possess
  chosen_spanish: y poseerán
  alternatives_spanish:
  - y heredarán
  - y tendrán
  lexicon: HALOT
  rationale: El verbo חסן expresa posesión duradera como propiedad. «Poseerán» mantiene el paralelo con «recibirán» y comunica la permanencia del derecho sobre el reino mejor que una traducción más interpretativa como «heredarán».
- source_word: עַד עָלְמָא
  english_pob_choice: forever
  chosen_spanish: para siempre
  alternatives_spanish:
  - por la eternidad
  - por siempre
  lexicon: HALOT
  rationale: La expresión idiomática señala duración sin fin. «Para siempre» es natural en español y preserva el sentido temporal sin calcar la forma semítica.
- source_word: וְעַד עָלַם עָלְמַיָּא
  english_pob_choice: forever and ever
  chosen_spanish: por los siglos de los siglos
  alternatives_spanish:
  - para siempre y para siempre
  - por edades de edades
  lexicon: HALOT
  rationale: La repetición intensifica la idea de permanencia absoluta. «Por los siglos de los siglos» es una fórmula estable en español bíblico, comprensible y suficientemente enfática para reflejar la escalada del hebraísmo/arameísmo.
theological_decisions:
- issue: Identidad de קַדִּישֵׁי עֶלְיוֹנִין
  english_pob_reading: '''the holy ones of the Most High'' without specifying whether they are angelic beings, faithful Israelites, or the people of God more broadly.'
  chosen_spanish_reading: «los santos del Altísimo» sin cerrar el referente
  alternative_spanish_readings:
  - los santos como el pueblo de Dios
  - los seres santos del cielo / ángeles
  rationale: El pasaje no obliga a resolver la referencia. Se conserva la ambigüedad teológica del original y de la POB inglesa, permitiendo las lecturas de pueblo santo o de seres celestiales según el contexto interpretativo.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: La versión española sigue de cerca el consenso auditado de la POB inglesa para Daniel 7:18, manteniendo el valor de «receive/possess» y la doble fórmula de duración indefinida. Se adapta la cadencia a un español bíblico moderno y se conserva la ambigüedad referente de «los santos» mediante nota.
  spanish_consistency_notes:
  - Se usa «Altísimo» para עֶלְיוֹנִין, coherente con el título divino en el resto de la obra.
  - «Para siempre, por los siglos de los siglos» mantiene la intensificación semítica sin forzar un giro demasiado literal.
  - «Santos» se elige como equivalente bíblico claro, con nota para no cerrar el debate interpretativo.
