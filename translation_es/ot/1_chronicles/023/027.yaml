revisions:
- from: Porque, en las últimas palabras de David[a], se contó a los hijos de Leví, desde los veinte años y más.
  to: Pues, según las últimas palabras de David[a], los hijos de Leví fueron contados de veinte años para arriba.
  rationale: Se ajusta la preposición para reflejar mejor el sentido contextual de base/directiva, se reemplaza la impersonal singular por una formulación más clara en español, y se mejora la expresión del rango de edad con una fórmula idiomática y fiel. «Pues» también encaja mejor que «Porque» en conexión explicativa interna del discurso bíblico español.
