  yaml_path: translation/ot/jeremiah/012/004.yaml
  text: How long will the land mourn[a], and the grass of every field dry up? Because of the evil of those who dwell in it, beasts and birds are swept away, for they say, “He will not see our latter end.”
  footnotes:
