translation:
  language: es
  text: Entonces Ebed-melec salió de la casa del rey y habló al rey[a], diciendo,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «del palacio». El hebreo dice literalmente «de la casa del rey».
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֵּצֵא
  english_pob_choice: went out
  chosen_spanish: salió
  alternatives_spanish:
  - se fue
  - salió afuera
  lexicon: HALOT
  rationale: El wayyiqtol de יצא expresa movimiento hacia afuera. «Salió» conserva la secuencia narrativa y el sentido direccional sin añadir matices innecesarios.
- source_word: עֶבֶד מֶלֶךְ
  english_pob_choice: Ebed-melech
  chosen_spanish: Ebed-melec
  alternatives_spanish:
  - Ebed-melech
  - Ebed-Melec
  lexicon: HALOT
  rationale: Aquí funciona como nombre propio. Se translitera para no convertirlo en una frase común. «Ebed-melec» mantiene la forma del nombre en español con adaptación ortográfica mínima.
- source_word: מִבֵּית הַמֶּלֶךְ
  english_pob_choice: from the king’s house
  chosen_spanish: de la casa del rey
  alternatives_spanish:
  - del palacio
  - de la casa real
  lexicon: HALOT
  rationale: בַּיִת significa literalmente «casa». En contexto real puede referirse al palacio, pero «casa del rey» sigue de cerca el hebreo y evita cerrar prematuramente la posible equivalencia semántica.
- source_word: וַיְדַבֵּר אֶל הַמֶּלֶךְ
  english_pob_choice: and spoke to the king
  chosen_spanish: y habló al rey
  alternatives_spanish:
  - y dijo al rey
  - y se dirigió al rey
  lexicon: HALOT
  rationale: דבר con אֶל se rinde naturalmente como «habló a/al». «Habló al rey» conserva la relación verbal sin sustituirla por una fórmula más interpretativa.
- source_word: לֵאמֹר
  english_pob_choice: saying,
  chosen_spanish: diciendo,
  alternatives_spanish:
  - y dijo,
  lexicon: HALOT
  rationale: La fórmula introduce el discurso directo que continúa en el siguiente versículo. «Diciendo,» es la equivalencia más transparente y formal.
translation_notes:
  revision_awareness: Se siguió el texto hebreo masorético (WLC) y el audit trail inglés confirma la lectura de una salida desde «la casa del rey», con nota léxica sobre la posible equivalencia contextual «palacio». No se introdujeron cambios textuales ni interpretativos adicionales.
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando el texto lo requiera; este versículo no contiene el nombre divino.
  - Se mantiene la transliteración del nombre propio «Ebed-melec» para conservar el valor onomástico del hebreo.
  - La estructura narrativa conserva la conexión verbal con el siguiente versículo mediante «diciendo,» como fórmula de introducción del discurso.
