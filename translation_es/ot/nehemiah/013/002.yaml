review_pass:
  verdict: revise
  source_alignment_summary: 'La mayor parte del versículo está bien encaminada: «porque no salieron al encuentro de los hijos de Israel con pan y agua», «nuestro Dios», y «la maldición en bendición» reflejan adecuadamente el hebreo y el audit trail inglés. Sin embargo, la cláusula central tiene un error grave de sentido: וַיִּשְׂכֹּר significa «contrató/alquiló», no «hirieron». Eso altera el evento narrado y contradice explícitamente la evidencia fuente y la decisión léxica inglesa documentada.'
  spanish_quality_summary: El español es generalmente legible y digno, pero «e hirieron a Balaam contra ellos» es a la vez semánticamente incorrecto y poco natural. Una reparación mínima y fiel es «y contrataron a Balaam contra ellos para maldecirlos[a]». También conviene incluir el artículo en «en una bendición», que suena más natural en español bíblico actual.
  glossary_alignment: 'No hay conflicto con los términos troncales del proyecto. «Dios» y «los hijos de Israel» están alineados. La nota sobre el singular colectivo debe mantenerse. La revisión principal es léxica: sustituir el falso equivalente «hirieron» por «contrataron».'
  issues:
  - severity: high
    issue: «hirieron a Balaam» traduce incorrectamente וַיִּשְׂכֹּר
    rationale: El hebreo significa «contrató/alquiló» y se refiere a contratar a Balaam para maldecir a Israel. «Hirieron» cambia completamente el sentido del texto.
  - severity: medium
    issue: La construcción «e hirieron a Balaam contra ellos» es poco natural en español
    rationale: Además del error léxico, la frase no fluye idiomáticamente. «Contrataron a Balaam contra ellos» o similar reproduce mejor la función sintáctica y el sentido narrativo.
  - severity: low
    issue: «la maldición en bendición» puede mejorarse a «la maldición en una bendición»
    rationale: Ambas son comprensibles, pero con artículo indefinido la frase suena más natural y completa en español contemporáneo sin alejarse del hebreo.
  revised_spanish_text: porque no salieron al encuentro de los hijos de Israel con pan y agua, y contrataron a Balaam contra ellos para maldecirlos[a], pero nuestro Dios cambió la maldición en una bendición.
  revised_footnotes:
