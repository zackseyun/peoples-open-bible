translation:
  language: es
  text: Les enseñaré acerca de la mano de Dios[a]; lo que está con el Todopoderoso[b] no lo ocultaré.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: "acerca de la mano de Dios". La expresión puede referirse al poder, la actividad o los tratos de Dios.'
    reason: lexical_alternative
  - marker: b
    text: 'O: "lo que pertenece al Todopoderoso", "el consejo del Todopoderoso" o "lo que procede del Todopoderoso". La frase hebrea es breve y algo elíptica.'
    reason: alternative_reading
lexical_decisions:
- source_word: אוֹרֶה
  english_pob_choice: I will teach
  chosen_spanish: Les enseñaré
  alternatives_spanish:
  - Yo enseñaré
  - Les instruiré
  lexicon: HALOT
  rationale: El verbo hifil de ירה tiene sentido instructivo; en español, 'enseñar' comunica naturalmente la acción declarada por Job. El futuro mantiene el valor de compromiso discursivo del original.
- source_word: בְּיַד אֵל
  english_pob_choice: concerning the hand of God
  chosen_spanish: acerca de la mano de Dios
  alternatives_spanish:
  - con respecto a la mano de Dios
  - sobre la mano de Dios
  - acerca del poder de Dios
  lexicon: HALOT
  rationale: Se conserva la imagen 'mano de Dios' como metáfora bíblica de poder, acción o trato divino. 'Acerca de' reproduce el valor de tema/sujeto de enseñanza sin convertir la frase en instrumento ni explicitar demasiado el sentido.
- source_word: אֵל
  english_pob_choice: God
  chosen_spanish: Dios
  alternatives_spanish:
  - el Dios poderoso
  - el Poderoso
  lexicon: HALOT
  rationale: En este contexto אֵל funciona como designación divina general; 'Dios' es el equivalente natural y claro en español.
- source_word: אֲשֶׁר עִם שַׁדַּי
  english_pob_choice: what is with the Almighty
  chosen_spanish: lo que está con el Todopoderoso
  alternatives_spanish:
  - lo que pertenece al Todopoderoso
  - lo que viene del Todopoderoso
  - lo que está junto al Todopoderoso
  lexicon: HALOT
  rationale: La cláusula es concisa y algo elíptica; 'lo que está con el Todopoderoso' preserva esa amplitud sin especificar indebidamente 'consejo' o 'propósito'. 'Todopoderoso' sigue la práctica estable para שדי en Job.
- source_word: לֹא אֲכַחֵד
  english_pob_choice: I will not hide
  chosen_spanish: no lo ocultaré
  alternatives_spanish:
  - no lo esconderé
  - no lo encubriré
  lexicon: HALOT
  rationale: כחד en piel suele significar ocultar/encubrir; 'ocultar' mantiene la fuerza y suena natural en español. El pronombre 'lo' recoge el objeto elíptico de la segunda cláusula.
theological_decisions:
- issue: La metáfora de 'la mano de Dios'
  english_pob_reading: Retain the metaphor 'the hand of God' rather than interpret it as mere power or judgment.
  chosen_spanish_reading: Conservar 'la mano de Dios' como metáfora, sin sustituirla por 'poder' o 'obra'.
  alternative_spanish_readings:
  - el poder de Dios
  - la acción de Dios
  - el trato de Dios
  rationale: La frase bíblica es teológicamente rica y puede abarcar poder, actividad o intervención; mantener la metáfora evita estrechar el sentido y respeta la transparencia del original.
  doctrine_reference: Translation philosophy §1, §6
- issue: La amplitud de 'lo que está con el Todopoderoso'
  english_pob_reading: Render literally as 'what is with the Almighty' rather than specifying 'counsel,' 'purpose,' or 'judgment.'
  chosen_spanish_reading: Traducir literalmente 'lo que está con el Todopoderoso' sin concretar 'consejo' ni 'propósito'.
  alternative_spanish_readings:
  - el consejo del Todopoderoso
  - lo que el Todopoderoso dispone
  - los caminos del Todopoderoso
  rationale: El hebreo es elíptico; precisar más de la cuenta introduciría una interpretación no exigida por el texto. La formulación española conserva esa ambigüedad productiva.
  doctrine_reference: Translation philosophy §3
translation_notes:
  revision_awareness: 'La redacción sigue de cerca el pasaje hebreo y el trazado auditado en inglés: se conserva la metáfora ''mano de Dios'', se mantiene la cláusula elíptica de שַׁדַּי sin especificarla, y se refleja el matiz instructivo de אוֹרֶה con un futuro de intención/compromiso.'
  spanish_consistency_notes:
  - Se usa 'Todopoderoso' para שַׁדַּי, en continuidad con el uso estándar del libro de Job.
  - Se evita 'SEÑOR' porque el texto hebreo contiene אֵל / שַׁדַּי, no el tetragrámaton.
  - '''Ocultar'' conserva el valor de ''hide/conceal'' de כחד y suena idiomático en español.'
  - La anteposición de 'Les' mantiene el objeto directo de segunda persona plural explícito y natural.
