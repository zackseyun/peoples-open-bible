review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura retórica del griego y preserva correctamente el contraste hombres/mujeres, así como la alternativa de ἰσχύει en nota. Sin embargo, la clausura final no es fiel: οὐχ αἱ γυναῖκες? pide una respuesta singular implícita del tipo «¿no son las mujeres?» en inglés, pero en español, tras «¿Quién… es el que…?», la forma idiomática y coherente es «¿No son las mujeres?» solo si se acepta una discordancia retórica poco natural; conviene ajustarlo a «¿No son las mujeres?» o mejor reestructurar mínimamente el tramo previo. Además, «domina sobre» suena menos natural en español que «domina» o «gobierna», y «ejerce dominio sobre» resulta algo pesado.'
  spanish_quality_summary: 'El español es mayormente claro y digno, pero presenta dos problemas de naturalidad: «domina sobre» es un giro innecesariamente calcado, y la secuencia «¿Quién... es el que... o quién es el que...?» más «¿No son las mujeres?» queda áspera en español. Una pequeña revisión mejora la fluidez sin apartarse del original.'
  glossary_alignment: 'No hay términos del glosario mayor comprometidos. Se mantiene bien «hombres/mujeres» conforme a la decisión documentada. La diferenciación entre δεσπόζων y κυριεύων debe conservarse, pero con español más idiomático: «gobierna sobre» / «tiene dominio sobre».'
  issues:
  - severity: medium
    issue: «domina sobre ellos» es poco idiomático
    rationale: En español estándar, «dominar» normalmente toma objeto directo; «domina sobre» suena calcado. «Gobierna sobre ellos» o «los domina» comunica mejor δεσπόζων.
  - severity: medium
    issue: «ejerce dominio sobre ellos» es pesado
    rationale: Aunque semánticamente correcto, el giro resulta redundante y menos natural. «Tiene dominio sobre ellos» preserva mejor la distinción con el primer participio y suena más limpio.
  - severity: medium
    issue: La cadena interrogativa completa queda poco natural en español
    rationale: La repetición «quién es el que...» dos veces seguida de «¿No son las mujeres?» funciona en traducción muy literal, pero puede suavizarse mínimamente manteniendo la fuerza retórica del original.
  revised_spanish_text: Hombres[a], ¿no es grande el rey, y no son muchos los hombres, y no tiene fuerza el vino? ¿Quién, pues, es el que gobierna sobre ellos[b], o quién es el que tiene dominio sobre ellos? ¿No son las mujeres?
  revised_footnotes:
  - marker: a
    text: 'O: «y no es fuerte el vino». El verbo griego puede verterse de modo más directo como «es fuerte» en lugar de «tiene fuerza».'
    reason: lexical_alternative
  - marker: b
    text: El griego usa aquí «hombres» porque el argumento contrasta a los hombres con las mujeres en la cláusula siguiente; un valor más genérico como «personas» es posible léxicamente, pero menos adecuado en este contexto.
    reason: lexical_alternative
