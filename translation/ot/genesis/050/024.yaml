theological_decisions:
- issue: Nature of God's promised action in פָּקֹד יִפְקֹד
  chosen_reading: A strong assurance that God will decisively attend to and act for Joseph's descendants.
  alternative_readings:
  - God will surely visit you
  - God will surely take note of you
  rationale: The Hebrew construction expresses emphatic certainty. The translation avoids narrowing the action to a merely physical 'visit' while preserving covenantal intervention language appropriate to the patriarchal promise context.
  doctrine_reference: Translation philosophy §3, §5
