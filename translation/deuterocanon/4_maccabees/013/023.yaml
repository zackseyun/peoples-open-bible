translation:
  text: and in our discipline under the law of God. Therefore[a], since brotherly affection had thus been established, sharing sympathy, the seven brothers joined together—
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The Greek source provided for this verse ends mid-word (συνπα-). The final expression is therefore translated provisionally and marked with a dash to reflect the incomplete witness.
    reason: textual_variant
lexical_decisions:
- source_word: ἀσκήσεως
  chosen: discipline
  alternatives:
  - training
  - practice
  - ascetic discipline
  lexicon: LSJ
  rationale: The noun denotes disciplined practice or training. 'Discipline' fits the moral and law-shaped context without importing later technical asceticism too strongly, though an ascetic nuance is present.
- source_word: ἐν νόμῳ θεοῦ
  chosen: under the law of God
  alternatives:
  - in the law of God
  - according to God's law
  lexicon: LSJ
  rationale: The phrase locates their discipline within the sphere and authority of God's law. 'Under the law of God' communicates both framework and submission more naturally in English than a bare literal 'in the law of God.'
- source_word: φιλαδελφίας
  chosen: brotherly affection
  alternatives:
  - brotherly love
  - love of brothers
  lexicon: LSJ
  rationale: The term specifically denotes familial affection among siblings. 'Brotherly affection' preserves the sibling focus and avoids flattening it into a more general 'love.'
- source_word: συμπαθούσης
  chosen: in sympathy
  alternatives:
  - sharing feeling
  - sympathizing
  - with fellow-feeling
  lexicon: LSJ
  rationale: The participle conveys shared feeling or mutual sympathy. Rendering it adverbially in English gives a natural sense while preserving the idea that their brotherly affection was mutually responsive and compassionate.
- source_word: καθεστηκυίας
  chosen: had been so firmly established
  alternatives:
  - had been constituted
  - was in such a settled state
  - was established
  lexicon: LSJ
  rationale: The perfect participle indicates a settled, established condition. 'Had been so firmly established' captures the resultant state in idiomatic English.
- source_word: οἱ ἑπτὰ ἀδελφοὶ
  chosen: the seven brothers
  alternatives:
  - the seven siblings
  lexicon: LSJ
  rationale: The Greek is explicitly masculine and refers to the known seven brothers in the narrative. Per project philosophy, the gendered term is retained.
- source_word: συνπα-
  chosen: joined together—
  alternatives:
  - suffered together—
  - were united—
  lexicon: LSJ
  rationale: The source line is cut off mid-word in the provided witness, but the visible prefix συνπα- clearly signals a compound beginning with 'together/with.' Given the immediate context of solidarity among the brothers, 'joined together—' is a cautious provisional rendering that reflects communal action without overclaiming the exact lost continuation. The dash marks the incomplete source.
