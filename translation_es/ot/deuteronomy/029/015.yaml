translation:
  language: es
  text: Porque ustedes saben cómo vivimos en la tierra de Egipto, y cómo pasamos[a] en medio de las naciones por las cuales pasaron ustedes.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «y qué pasamos por las naciones por las cuales pasaron ustedes». El hebreo puede traducirse de manera más literal, pero el texto principal expresa el sentido de forma más idiomática.'
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Ya que
  lexicon: HALOT
  rationale: Introduce la base explicativa de lo anterior; «Porque» conserva la fuerza causal/explanativa de manera natural en español.
- source_word: יְדַעְתֶּם
  english_pob_choice: you know
  chosen_spanish: saben
  alternatives_spanish:
  - han sabido
  - sabían
  lexicon: HALOT
  rationale: El perfecto hebreo expresa conocimiento vigente a partir de experiencia previa; «saben» comunica ese valor en español actual.
- source_word: אֵת אֲשֶׁר יָשַׁבְנוּ
  english_pob_choice: how we lived
  chosen_spanish: cómo vivimos
  alternatives_spanish:
  - cómo habitamos
  - qué vivimos
  lexicon: HALOT
  rationale: La construcción apunta al modo o circunstancia conocida; «cómo vivimos» reproduce ese sentido de manera idiomática sin volverlo literal y áspero.
- source_word: יָשַׁבְנוּ
  english_pob_choice: lived
  chosen_spanish: vivimos
  alternatives_spanish:
  - habitamos
  - estuvimos
  lexicon: HALOT
  rationale: ישב suele significar ‘habitar/vivir’; en español, «vivimos» es natural y conserva la idea de residencia.
- source_word: בְּאֶרֶץ מִצְרָיִם
  english_pob_choice: in the land of Egypt
  chosen_spanish: en la tierra de Egipto
  alternatives_spanish:
  - en Egipto
  lexicon: HALOT
  rationale: Mantiene la expresión bíblica estable «tierra de Egipto», más fiel a la formulación hebrea que una simplificación geográfica.
- source_word: וְאֵת אֲשֶׁר עָבַרְנוּ
  english_pob_choice: and how we passed through
  chosen_spanish: y cómo pasamos
  alternatives_spanish:
  - y por dónde pasamos
  - y cómo atravesamos
  lexicon: HALOT
  rationale: עָבַר puede expresar pasar/atravesar; aquí el contexto de recorrido favorece «cómo pasamos» como equivalente idiomático del inglés POB.
- source_word: בְּקֶרֶב הַגּוֹיִם
  english_pob_choice: through the midst of the nations
  chosen_spanish: por en medio de las naciones
  alternatives_spanish:
  - en medio de las naciones
  - entre las naciones
  lexicon: HALOT
  rationale: קֶרֶב indica ‘en medio de/entre’; con un verbo de movimiento, «por en medio de» refleja bien la trayectoria y evita perder el matiz espacial.
- source_word: הַגּוֹיִם
  english_pob_choice: the nations
  chosen_spanish: las naciones
  alternatives_spanish:
  - los pueblos
  - los gentiles
  lexicon: HALOT
  rationale: En Deuteronomio, גּוֹיִם refiere normalmente a naciones/pueblos; «naciones» es la opción más directa y no introduce una connotación posterior ajena.
- source_word: אֲשֶׁר עֲבַרְתֶּם
  english_pob_choice: through which you passed
  chosen_spanish: por las cuales pasaron ustedes
  alternatives_spanish:
  - por donde ustedes pasaron
  - que ustedes atravesaron
  lexicon: HALOT
  rationale: Conserva la referencia a las mismas naciones y refleja el relativo hebreo con una estructura natural en español, manteniendo la repetición enfatizada del original.
translation_notes:
  revision_awareness: Se siguió el acuerdo alto del auditoría inglesa y no se aplicaron revisiones posteriores; la redacción española conserva la duplicación enfática del hebreo con fluidez idiomática.
  spanish_consistency_notes:
  - Se usó «Egipto» con «tierra de» para reflejar la fórmula bíblica estable.
  - Se prefirió «las naciones» y no «los pueblos» para mantener la correspondencia más directa con גּוֹיִם.
  - Se mantuvo la repetición de «pasamos/pasaron» para respetar el paralelismo enfático del hebreo.
