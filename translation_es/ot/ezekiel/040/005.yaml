translation:
  language: es
  text: 'Y he aquí un muro fuera de la casa, todo alrededor; y en la mano del hombre había una caña de medir, de seis codos[a], siendo cada codo un codo y un palmo. Y midió el ancho de la construcción[b]: una caña, y la altura: una caña.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «seis codos por el codo y un palmo», es decir, usando un codo largo compuesto de un codo normal más un palmo.'
    reason: cultural_note
  - marker: b
    text: 'O: «el ancho del edificio».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהִנֵּה
  english_pob_choice: And behold
  chosen_spanish: Y he aquí
  alternatives_spanish:
  - Y mira
  - Y he aquí ahora
  lexicon: HALOT
  rationale: Conserva la fuerza deíctica y visionaria del hebreo, introduciendo una nueva escena con solemnidad natural en español.
- source_word: חוֹמָה
  english_pob_choice: wall
  chosen_spanish: un muro
  alternatives_spanish:
  - una pared
  - una muralla
  lexicon: HALOT
  rationale: ‘Muro’ comunica una estructura arquitectónica sólida sin forzar el matiz defensivo de ‘muralla’, que el contexto inmediato no exige.
- source_word: מִחוּץ לַבַּיִת
  english_pob_choice: outside the house
  chosen_spanish: fuera de la casa
  alternatives_spanish:
  - fuera del edificio
  - fuera del templo
  lexicon: HALOT
  rationale: Se mantiene la literalidad básica de ‘casa’ para respetar el hebreo, sin especificar ‘templo’ más allá de lo que el texto dice.
- source_word: סָבִיב סָבִיב
  english_pob_choice: all around
  chosen_spanish: todo alrededor
  alternatives_spanish:
  - por todos lados
  - en derredor
  lexicon: HALOT
  rationale: La duplicación intensiva se vierte de modo idiomático en español, preservando la idea de circunferencia completa.
- source_word: וּבְיַד הָאִישׁ
  english_pob_choice: in the hand of the man
  chosen_spanish: en la mano del hombre
  alternatives_spanish:
  - en la mano del varón
  - el hombre tenía en la mano
  lexicon: HALOT
  rationale: Se conserva la expresión concreta del original y la continuidad con la figura visionaria ya introducida como ‘el hombre’.
- source_word: קְנֵה הַמִּדָּה
  english_pob_choice: a measuring reed
  chosen_spanish: una caña de medir
  alternatives_spanish:
  - una vara de medir
  - una caña medidora
  lexicon: HALOT
  rationale: ‘Caña de medir’ mantiene el objeto antiguo con naturalidad en español y refleja mejor קנה que ‘vara’ en este contexto.
- source_word: שֵׁשׁ אַמּוֹת
  english_pob_choice: of six cubits
  chosen_spanish: de seis codos
  alternatives_spanish:
  - de seis medidas
  - de seis codos de longitud
  lexicon: HALOT
  rationale: ‘Codos’ preserva la unidad antigua sin conversión, siguiendo la decisión inglesa de mantener la medida histórica.
- source_word: בָּאַמָּה וָטֹפַח
  english_pob_choice: each cubit being a cubit and a handbreadth
  chosen_spanish: cada codo de un codo y un palmo
  alternatives_spanish:
  - cada codo, es decir, un codo y un palmo
  - cada codo siendo un codo y un palmo
  lexicon: HALOT
  rationale: 'Se vierte el valor explicativo del hebreo como una aclaración del sistema de medida: un codo ‘largo’ compuesto por codo más palmo.'
- source_word: וַיָּמָד
  english_pob_choice: And he measured
  chosen_spanish: Y midió
  alternatives_spanish:
  - Entonces midió
  - Y él midió
  lexicon: HALOT
  rationale: Forma narrativa breve y natural que conserva la secuencia del wayyiqtol sin añadir énfasis innecesario.
- source_word: רֹחַב הַבִּנְיָן
  english_pob_choice: the width of the structure
  chosen_spanish: el ancho de la construcción
  alternatives_spanish:
  - la anchura de la estructura
  - el ancho del edificio
  lexicon: HALOT
  rationale: ‘Construcción’ refleja bien בִּנְיָן como obra edificada; ‘ancho’ es una equivalencia clara y actual para רֹחַב.
- source_word: קָנֶה אֶחָד
  english_pob_choice: one reed
  chosen_spanish: una caña
  alternatives_spanish:
  - una caña de medir
  - una vara
  lexicon: HALOT
  rationale: Se repite el mismo objeto de medida ya introducido para mantener coherencia léxica dentro del versículo.
- source_word: וְקוֹמָה
  english_pob_choice: and the height
  chosen_spanish: y la altura
  alternatives_spanish:
  - y su altura
  - y la elevación
  lexicon: HALOT
  rationale: ‘Altura’ es la equivalencia arquitectónica más natural para la dimensión vertical de la construcción.
- source_word: קָנֶה אֶחָד
  english_pob_choice: one reed
  chosen_spanish: una caña
  alternatives_spanish:
  - una caña de medir
  - una vara
  lexicon: HALOT
  rationale: Se conserva la repetición del mismo resultado de medición en la unidad antigua, sin reformularla como perífrasis.
theological_decisions:
- issue: Preservación de la figura visionaria y del lenguaje arquitectónico sin identificación interpretativa adicional
  english_pob_reading: The verse describes what the prophet sees and measures; it does not explicitly identify the structure as a later theological abstraction in this line.
  chosen_spanish_reading: 'El texto se presenta como descripción visionaria concreta: un muro, una caña de medir y dimensiones precisas.'
  alternative_spanish_readings:
  - una lectura más interpretativa que diga ‘el templo’
  - una paráfrasis que explicite el simbolismo
  rationale: No se debe añadir una identificación teológica que el versículo no formula explícitamente. La traducción conserva la concreción del hebreo y deja el simbolismo para el contexto mayor del libro.
  doctrine_reference: Principio de suficiencia textual y respeto del sentido inmediato del pasaje
translation_notes:
  revision_awareness: Se siguió el acuerdo alto entre la versión inglesa auditada y el hebreo masorético; no se detectaron revisiones textuales relevantes ni cambios de sentido necesarios respecto del pasaje base.
  spanish_consistency_notes:
  - Se mantiene ‘caña’ para קנה de modo coherente en toda la línea, evitando alternar con ‘vara’ sin razón contextual.
  - ‘Casa’ se conserva para לַבַּיִת, aunque en el contexto visionario puede referirse al complejo del templo; no se especifica más de lo que el texto dice.
  - El sistema de medidas se vierte con ‘codo’ y ‘palmo’ para conservar la medida antigua y la explicación interna del verso.
