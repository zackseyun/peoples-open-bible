translation_notes:
  revision_awareness: 'La versión inglesa de trabajo pasó de un inglés más literal (''encircling'', ''was struck by them'') a una formulación más natural (''surrounding'', ''was impressed by them''). La redacción española sigue esa revisión: evita un calco duro y mantiene el valor contextual de ᾔσθετο ἐπʼ αὐτοῖς junto con el asombro explícito de ἐκπλαγεὶς.'
  spanish_consistency_notes:
  - Se mantiene 'tirano' como término evaluativo consistente con la política POB para τύραννος.
  - Se usa 'Dios' no aplica en este versículo; no hay terminología divina que ajustar.
  - El registro es digno y publicable, con puntuación española estándar y sin arcaísmos innecesarios.
