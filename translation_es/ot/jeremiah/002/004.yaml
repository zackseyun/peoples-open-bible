translation:
  language: es
  text: Escuchen la palabra de Yahvé, casa de Jacob, y todos los clanes[a] de la casa de Israel.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «familias» o «clanes»; el término se refiere a grupos de parentesco dentro de Israel.'
    reason: lexical_alternative
lexical_decisions:
- source_word: שִׁמְעוּ
  english_pob_choice: Hear
  chosen_spanish: Escuchen
  alternatives_spanish:
  - Oigan
  - Escuchen atentamente
  lexicon: HALOT
  rationale: El imperativo plural de שׁמע funciona como un llamado profético directo a atender y obedecer. En español, «Escuchen» conserva ese valor exhortativo con un registro natural y digno; «Oigan» es posible, pero puede sonar menos solemne.
- source_word: דְבַר
  english_pob_choice: the word
  chosen_spanish: la palabra
  alternatives_spanish:
  - el mensaje
  - la palabra hablada
  lexicon: HALOT
  rationale: La construcción fija con YHWH en el hebreo profético se expresa de manera más fiel con «la palabra», que mantiene la fórmula teológica y literaria. «Mensaje» suaviza demasiado el término.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  - el SEÑOR
  lexicon: HALOT
  rationale: Se mantiene el nombre divino en la forma española establecida por el proyecto, «Yahvé», para preservar el nombre personal del pacto y evitar la sustitución por un título.
- source_word: בֵּית יַעֲקֹב
  english_pob_choice: O house of Jacob
  chosen_spanish: casa de Jacob
  alternatives_spanish:
  - casa de Jacob,
  - ¡casa de Jacob!
  lexicon: HALOT
  rationale: El hebreo tiene una invocación directa; en español, el vocativo puede darse sin «oh» para mantener naturalidad. «Casa de Jacob» conserva el paralelismo con la línea siguiente y el sentido corporativo.
- source_word: מִשְׁפְּחוֹת
  english_pob_choice: the clans
  chosen_spanish: las familias
  alternatives_spanish:
  - los clanes
  - las tribus
  lexicon: HALOT
  rationale: Aunque el POB inglés optó por «clans» para el sentido de grupos de parentesco, en español «familias» comunica mejor esa unidad social sin sonar técnico o extrañamente tribal. Se conserva el matiz de grupos de parentesco dentro de Israel.
- source_word: בֵּית יִשְׂרָאֵל
  english_pob_choice: the house of Israel
  chosen_spanish: la casa de Israel
  alternatives_spanish:
  - Israel
  - la casa de Israel
  lexicon: HALOT
  rationale: Se mantiene la expresión corporativa y paralela a «casa de Jacob». «La casa de Israel» conserva mejor la estructura del hebreo que una simplificación a «Israel».
theological_decisions:
- issue: Tratamiento del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - el SEÑOR
  rationale: El texto hebreo usa el Tetragrámaton de forma directa. La POB inglesa lo resuelve como «Yahweh»; en español, la forma canónica del proyecto es «Yahvé», que preserva el nombre revelado sin la sustitución por un título.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
translation_notes:
  revision_awareness: 'Coincide con el pasaje fuente y con el audit trail inglés: se preserva el imperativo profético, la fórmula «palabra de Yahvé/Yahvé», y el doble paralelismo «casa de Jacob / casa de Israel». No se detectan revisiones posteriores que alteren el criterio base.'
  spanish_consistency_notes:
  - Se mantiene el nombre divino como «Yahvé», conforme al estándar del proyecto en español.
  - «Casa de Jacob» y «casa de Israel» conservan el paralelismo corporativo del hebreo.
  - «Familias» traduce el matiz social de מִשְׁפְּחוֹת sin introducir un tecnicismo innecesario; la nota aclara la alternativa «clanes».
