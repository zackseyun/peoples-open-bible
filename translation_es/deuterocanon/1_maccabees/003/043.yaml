translation:
  language: es
  text: 'Y cada uno dijo a su prójimo: «Restauremos[a] la ruina de nuestro pueblo y de los lugares santos».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «levantemos la ruina de nuestro pueblo y de las cosas santas». El griego une un verbo de ‘levantar’ con un sustantivo de ‘derribo/ruina’, por lo que expresa la restauración de lo devastado.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἕκαστος πρὸς τὸν πλησίον αὐτοῦ
  english_pob_choice: each ... to his neighbor
  chosen_spanish: cada uno dijo a su prójimo
  alternatives_spanish:
  - uno dijo al otro
  - cada uno dijo al que estaba cerca de él
  lexicon: LSJ
  rationale: El griego distribuye la acción entre individuos y usa un giro relacional normal. En español, «cada uno ... a su prójimo» conserva el sentido mutuo y suena natural en registro bíblico contemporáneo.
- source_word: Ἀναστήσωμεν
  english_pob_choice: Let us restore
  chosen_spanish: Restablezcamos
  alternatives_spanish:
  - Levantemos
  - Reedifiquemos
  lexicon: LSJ
  rationale: El verbo puede sugerir ‘levantar/poner en pie’, pero en este contexto el valor restaurativo es central. «Restablezcamos» preserva la idea de devolver a un estado anterior sin perder la imagen de reversión de la ruina.
- source_word: τὴν καθαίρεσιν
  english_pob_choice: the ruin
  chosen_spanish: la ruina
  alternatives_spanish:
  - la destrucción
  - la caída
  - la demolición
  lexicon: LSJ
  rationale: 'καθαίρεσις expresa derribo, demolición o ruina. «Ruina» es breve, natural y mantiene la tensión del binomio verbal: restaurar lo arruinado.'
- source_word: τοῦ λαοῦ ἡμῶν
  english_pob_choice: of our people
  chosen_spanish: de nuestro pueblo
  alternatives_spanish:
  - de nuestra nación
  - de nuestro pueblo israelita
  lexicon: LSJ
  rationale: λαός se refiere al pueblo como colectividad del pacto. «Nuestro pueblo» refleja bien la pertenencia comunitaria sin introducir una precisión no explicitada por el griego.
- source_word: τῶν ἁγίων
  english_pob_choice: of the holy places
  chosen_spanish: de los lugares santos
  alternatives_spanish:
  - de las cosas santas
  - del santuario
  lexicon: LSJ
  rationale: En contexto macabeo, el plural puede abarcar los espacios sagrados y la esfera cultual profanada. «Lugares santos» conserva el plural y evita reducir el referente a un solo edificio cuando el griego es más amplio.
theological_decisions:
- issue: Alcance de τῶν ἁγίων
  english_pob_reading: the temple sancta / holy places
  chosen_spanish_reading: los lugares santos
  alternative_spanish_readings:
  - las cosas santas
  - el santuario
  rationale: La escena trata de la restauración tras la profanación. «Lugares santos» mantiene el referente cultual en plural y deja abierta la amplitud del griego sin imponer una interpretación más estrecha de la requerida por el texto.
  doctrine_reference: Restauración del culto y de los espacios consagrados en el contexto macabeo; cf. la profanación del templo en 1 Macabeos 1.
translation_notes:
  revision_awareness: La redacción sigue la revisión inglesa más reciente, que prefirió ‘restore’ frente a ‘raise up’ para Ἀναστήσωμεν, pero conserva en español una equivalencia dinámica controlada («Restablezcamos») que transmite el mismo valor restaurativo. También se mantiene el plural cultual de τῶν ἁγίων como «lugares santos», acorde con el audit trail inglés.
  spanish_consistency_notes:
  - Se usó «pueblo» para λαός en coherencia con el uso bíblico comunitario.
  - Se evitó «SEÑOR» u otros sustitutos irrelevantes; no aparece el tetragrámaton en este versículo.
  - «Lugares santos» conserva el plural y la amplitud cultual del griego.
  - El tono es sobrio y publicable, sin calcos excesivamente duros.
