translation:
  language: es
  text: ¿Acaso el que contiende con el Todopoderoso lo corregirá? El que discute con Dios[a] que responda a esto[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Discute» mantiene el campo legal-disputacional de מוֹכִיחַ; también puede entenderse como «arguye», «presenta su caso» o «reprende».
    reason: lexical_alternative
  - marker: b
    text: O «que responda esto» o «que le responda». El sufijo hebreo puede referirse a la cuestión planteada, no necesariamente a Dios directamente.
    reason: lexical_alternative
lexical_decisions:
- source_word: הֲרֹב
  english_pob_choice: Will one who contends
  chosen_spanish: el que contiende
  alternatives_spanish:
  - el contendiente
  - el que disputa
  - el que litiga
  lexicon: HALOT
  rationale: El hebreo presenta a una persona en disputa legal o polémica. En español, «el que contiende» conserva el valor verbal y el tono forense sin volver la frase pesada o artificial.
- source_word: עִם
  english_pob_choice: with
  chosen_spanish: con
  alternatives_spanish:
  - contra
  lexicon: HALOT
  rationale: La preposición hebrea es «con», aunque en el contexto implica oposición. Mantener «con» conserva el texto fuente; la hostilidad se entiende por el conjunto de la pregunta retórica.
- source_word: שַׁדַּי
  english_pob_choice: the Almighty
  chosen_spanish: el Todopoderoso
  alternatives_spanish:
  - el Omnipotente
  - Shaddai
  lexicon: HALOT
  rationale: En Job, el título divino שַׁדַּי suele expresar poder soberano. «El Todopoderoso» comunica ese sentido de manera natural en español y sigue la decisión del POB en inglés de traducir el título.
- source_word: יִסּוֹר
  english_pob_choice: correct him
  chosen_spanish: lo corregirá
  alternatives_spanish:
  - lo instruirá
  - lo reprenderá
  - lo disciplinará
  lexicon: HALOT
  rationale: El verbo יסר admite matices de instruir, reprender y disciplinar. Aquí, por el paralelismo con «el que discute con Dios», «corregirá» expresa mejor la presunción de corregir al propio Dios sin perder la fuerza correctiva del hebreo.
- source_word: מוֹכִיחַ
  english_pob_choice: one who argues
  chosen_spanish: el que discute
  alternatives_spanish:
  - el que reprende
  - el que arguye
  - el que presenta su caso
  lexicon: HALOT
  rationale: La raíz יכח puede abarcar disputar, refutar o probar una causa. «El que discute» conserva el tono de contienda del contexto y es natural en español, mientras que las alternativas más técnicas quedan como posibles matices.
- source_word: אֱלֹוּהַּ
  english_pob_choice: God
  chosen_spanish: Dios
  alternatives_spanish:
  - Dios mismo
  - el Dios
  lexicon: HALOT
  rationale: El singular poético אֱלוֹהַּ se traduce simplemente «Dios». No se requiere énfasis añadido ni transliteración, porque el contexto ya identifica al destinatario de la disputa.
- source_word: יַעֲנֶנָּה
  english_pob_choice: answer it
  chosen_spanish: que responda esto
  alternatives_spanish:
  - que responda a esto
  - que responda a él
  - que responda eso
  lexicon: HALOT
  rationale: El sufijo femenino singular puede referirse a la cuestión planteada más que a Dios directamente. «Esto» conserva esa ambigüedad referencial y resulta idiomático en español.
theological_decisions:
- issue: ¿A quién intenta corregir el disputante?
  english_pob_reading: The human disputant presumptuously tries to correct the Almighty.
  chosen_spanish_reading: El interrogante acusa al ser humano de pretender corregir al Todopoderoso.
  alternative_spanish_readings:
  - El que contiende con el Todopoderoso debe dejarse corregir
  - ¿Acaso Dios corrige al que contiende?
  rationale: La sintaxis y el paralelismo favorecen leer al disputante humano como sujeto de «corregir». La segunda cola reafirma la idea al pedir que el que discute con Dios responda. La traducción mantiene el tono de reprensión divina sin suavizarlo.
  doctrine_reference: Translation philosophy §1, §3
translation_notes:
  revision_awareness: La revisión más reciente indicó que no se requerían cambios; esta versión mantiene la lectura auditada del inglés POB y la ajusta a un español natural, conservando las tensiones léxicas del hebreo.
  spanish_consistency_notes:
  - Se usa «Todopoderoso» para שַׁדַּי conforme al criterio del POB en inglés y la terminología española del proyecto.
  - Se mantiene «Dios» para אֱלוֹהַּ sin añadir glosas innecesarias.
  - Se preserva el carácter forense de רֹב/מוֹכִיחַ con un español fluido y digno.
