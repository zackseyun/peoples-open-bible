  text: עַ֭צְלָה תַּפִּ֣יל תַּרְדֵּמָ֑ה וְ/נֶ֖פֶשׁ רְמִיָּ֣ה תִרְעָֽב׃
base_translation:
  language: en
  yaml_path: translation/ot/proverbs/019/015.yaml
  text: Laziness brings on deep sleep[b][a], and a slack person will go hungry.
  footnotes:
  - marker: a
    text: 'Or ''a lazy soul will hunger.'' Hebrew: ''soul'' (נֶפֶשׁ) can mean the person or self in context.'
    reason: lexical_alternative
  - marker: b
    text: '''Slack person'' renders Hebrew רְמִיָּה here in the sense of negligence or slackness; elsewhere the word can carry the sense ''deceitful.'''
    reason: lexical_alternative
