translation:
  language: es
  text: Y los que queden[a] oirán y temerán, y no volverán a hacer una cosa mala como esta[b] en medio de ti[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «los restantes» o «los que hayan quedado».
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: «como esta cosa mala», es decir, una acción mala de este tipo.'
    reason: lexical_alternative
  - marker: c
    text: 'Hebreo en singular, dirigiéndose a Israel como un todo: «en medio de ti».'
    reason: lexical_alternative
lexical_decisions:
- source_word: הַנִּשְׁאָרִים
  english_pob_choice: those who remain
  chosen_spanish: los que queden
  alternatives_spanish:
  - los restantes
  - los que hayan quedado
  - los que quedan
  lexicon: HALOT
  rationale: El participio nifal expresa a los que sobreviven o permanecen tras el juicio. En español, «los que queden» conserva esa idea de remanente sin volverlo rígido ni demasiado técnico; «los restantes» suena más estático.
- source_word: יִשְׁמְעוּ
  english_pob_choice: shall hear
  chosen_spanish: oirán
  alternatives_spanish:
  - escucharán
  - oirán de ello
  - lo oirán
  lexicon: HALOT
  rationale: La raíz שמע aquí es simplemente «oír», en un contexto de advertencia jurídica donde oír implica enterarse del castigo. «Oirán» mantiene la sencillez del hebreo sin añadir una glosa innecesaria.
- source_word: וְיִרָאוּ
  english_pob_choice: and fear
  chosen_spanish: temerán
  alternatives_spanish:
  - tendrán temor
  - se asustarán
  - quedarán con temor
  lexicon: HALOT
  rationale: ירא expresa el temor producido como efecto disuasorio del castigo. «Temerán» conserva el tono legal y reverencial; «se asustarán» sería demasiado coloquial.
- source_word: וְלֹא יֹסִפוּ לַעֲשׂוֹת עוֹד
  english_pob_choice: and shall never again do
  chosen_spanish: y no volverán a hacer
  alternatives_spanish:
  - y no seguirán haciendo
  - y no harán otra vez
  - y no añadirán a hacer
  lexicon: HALOT
  rationale: La construcción verbal comunica no repetir la acción. En español, «no volverán a hacer» reproduce bien el valor iterativo/prohibitivo sin calcar de forma extraña el hebreo.
- source_word: כַּדָּבָר הָרָע הַזֶּה
  english_pob_choice: such an evil thing
  chosen_spanish: cosa mala como esta
  alternatives_spanish:
  - tal cosa mala
  - este mal asunto
  - esta mala acción
  lexicon: HALOT
  rationale: דבר puede ser «cosa, asunto, hecho»; el comparativo כ pide expresar semejanza. «Cosa mala como esta» preserva la idea de un acto de este tipo. Se evita cargarlo con «acto» para no ir más allá del sustantivo amplio del hebreo.
- source_word: בְּקִרְבֶּךָ
  english_pob_choice: in your midst
  chosen_spanish: en medio de ti
  alternatives_spanish:
  - entre ustedes
  - en tu seno
  - dentro de ti
  lexicon: HALOT
  rationale: El sufijo singular segunda persona se conserva con «ti», siguiendo la lectura corporativa de Israel como un solo interlocutor. «En medio de ti» reproduce la fórmula comunitaria y mantiene la tensión del singular colectivo.
theological_decisions:
- issue: El singular hebreo en la dirección a Israel como comunidad
  english_pob_reading: retain singular 'your' in English
  chosen_spanish_reading: conservar el singular corporativo con «de ti»
  alternative_spanish_readings:
  - neutralizar a «entre ustedes»
  - explicitar «en medio de ustedes»
  rationale: El hebreo usa segunda persona singular para dirigirse a Israel como entidad pactal. Mantener el singular en español preserva esa forma de адресación sin necesidad de explicar demasiado dentro del verso.
  doctrine_reference: 'Translation philosophy #4 and #5'
translation_notes:
  revision_awareness: Concordancia alta con el audit trail inglés; no se registran revisiones aplicadas en el paquete fuente. La redacción española sigue la lectura óptima-equivalente del pasaje legal sin introducir paráfrasis adicionales.
  spanish_consistency_notes:
  - Se mantiene Yahvé como terminología por defecto solo cuando el texto lo requiera; este versículo no la contiene.
  - Se preserva el singular corporativo de la segunda persona hebrea con «ti».
  - «Temerán» se usa en sentido disuasorio-legal, no como simple miedo emocional.
  - «Cosa mala» conserva el valor amplio de דבר sin sobredeterminarlo como «acto» en el cuerpo principal.
