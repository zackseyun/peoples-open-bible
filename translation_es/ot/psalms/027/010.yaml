- from: Porque mi padre y mi madre me han abandonado[a], pero Yahvé me recibirá.
  to: Porque mi padre y mi madre me han abandonado[a], pero Yahvé me acogerá.
  rationale: Se ajusta יַאַסְפֵנִי de «me recibirá» a «me acogerá» para reflejar mejor la acogida protectora implícita en el hebreo y en la auditoría inglesa. Se elimina la nota anterior sobre «recoger» por la ambigüedad que crea en español. Se conserva una nota léxica útil en «abandonado», donde «desamparado» sigue siendo una alternativa española valiosa y bíblicamente resonante.
