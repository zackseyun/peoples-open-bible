id: HOS.4.10
reference: Hosea 4:10
source:
  edition: WLC
  text: וְ/אָֽכְלוּ֙ וְ/לֹ֣א יִשְׂבָּ֔עוּ הִזְנ֖וּ וְ/לֹ֣א יִפְרֹ֑צוּ כִּֽי אֶת יְהוָ֥ה עָזְב֖וּ לִ/שְׁמֹֽר־־׃
translation:
  text: They will eat[a], but not be satisfied; they will commit sexual immorality, but not increase, because they have abandoned Yahweh[c][b], to cherish prostitution.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'play the prostitute' / 'commit whoredom.' The Hebrew verb can denote prostitution specifically and, in Hosea, often carries overtones of covenant unfaithfulness.
    reason: lexical_alternative
  - marker: b
    text: Or 'multiply.' The Hebrew literally has 'break out,' here likely meaning increase in offspring or population.
    reason: lexical_alternative
  - marker: c
    text: 'Hebrew is terse: ''they have abandoned the LORD, to keep.'' The sense is likely that they have stopped giving heed to or observing the LORD; some understand an implied object such as ''his law'' or ''his ways.'''
    reason: alternative_reading
lexical_decisions:
- source_word: אָכְלוּ
  chosen: they will eat
  alternatives:
  - they eat
  - they have eaten
  lexicon: HALOT
  rationale: Qal perfect with prefixed conjunction in prophetic/judgment context is naturally rendered as future in English to express the announced consequence.
- source_word: יִשְׂבָּעוּ
  chosen: be satisfied
  alternatives:
  - be filled
  - have enough
  lexicon: HALOT
  rationale: The verb שׂבע commonly denotes being sated or satisfied after eating. 'Be satisfied' is idiomatic and preserves the deprivation motif.
- source_word: הִזְנוּ
  chosen: commit sexual immorality
  alternatives:
  - play the prostitute
  - commit whoredom
  - be promiscuous
  lexicon: HALOT
  rationale: זנה can denote literal prostitution or broader illicit sexual conduct, often with metaphorical covenant overtones in Hosea. Here the parallel with failure to increase suggests literal sexual misconduct, while 'commit sexual immorality' is readable modern English without over-specifying prostitution.
- source_word: יִפְרֹצוּ
  chosen: increase
  alternatives:
  - multiply
  - break out
  - burst forth
  lexicon: HALOT
  rationale: Though פרץ literally means break through/burst out, in this context after sexual activity it idiomatically refers to increase in offspring or population growth. 'Increase' captures the result-oriented sense in natural English.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: עָזְבוּ
  chosen: have abandoned
  alternatives:
  - have forsaken
  - left
  lexicon: HALOT
  rationale: '''Abandoned'' conveys covenantal desertion in clear modern English and fits Hosea''s accusatory tone.'
- source_word: לִשְׁמֹר
  chosen: to give heed to him
  alternatives:
  - to keep
  - to observe
  - to heed
  lexicon: HALOT
  rationale: The infinitive construct of שמר after 'abandoned the LORD' is difficult elliptically. In context it expresses ceasing to attend to or keep oneself devoted to the LORD. 'To give heed to him' makes the implied object explicit in English and reflects the sense of attentive observance.
