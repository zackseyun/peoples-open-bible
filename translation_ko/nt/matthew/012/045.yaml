  text: '그때 그가 가서, 자기보다 더 악한 일곱 다른 영을 데리고 들어와 거기에 산다. 그러면 그 사람의 마지막 상태가 처음보다 더 나빠진다. 이 악한 세대도 그렇게 될 것이다.」'
