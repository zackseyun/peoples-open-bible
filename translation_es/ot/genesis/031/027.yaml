    text: O «arpa», aunque el hebreo designa más específicamente una lira.
    reason: lexical_alternative
  revision_rationale: 'Se cambia la expresión principal de וַתִּגְנֹב אֹתִי a «te escabulliste de mí» para preservar el sentido idiomático del hebreo en español natural, dejando la literalidad «me robaste» en nota. También se ajustan las notas para alinearlas con el expediente inglés auditado: «con canto» como alternativa de «cantos», «tímpano» como equivalente tradicional de תֹף, y «arpa» como alternativa menos precisa para כִּנּוֹר. Además, se reubican los marcadores a los términos correspondientes.'
