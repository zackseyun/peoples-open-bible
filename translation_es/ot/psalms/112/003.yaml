review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura hebrea y el sentido general: bienes materiales en la casa del justo y la permanencia de su צדקה. Sin embargo, introduce un problema en la nota al pie: el marcador [a] está anclado en «riqueza», pero la nota «O «justicia»» corresponde claramente a «su justicia»/צדקתו, no a הון. Además, el inglés POB da como principal ''righteousness'' con alternativa ''justice''; en español conviene invertir eso para mayor fidelidad al valor moral principal del contexto y dejar «justicia» como alternativa, o al menos no perder esa distinción.'
  spanish_quality_summary: «Hay riqueza y bienes en su casa» suena natural y claro. «Permanece para siempre» también es idiomático. No obstante, «su justicia» puede leerse más judicialmente en español que el sentido más amplio de rectitud moral en este salmo; «su rectitud» como texto principal lee mejor en español bíblico moderno y permite reservar «justicia» como alternativa léxica en nota.
  glossary_alignment: 'No hay conflictos con la terminología global del proyecto. La decisión clave es צִדְקָה: según las pautas, puede ser «justicia» o «rectitud» por contexto. Aquí el contexto sapiencial favorece «rectitud» como principal, manteniendo «justicia» en nota. El resto («riqueza», «bienes», «casa», «permanece», «para siempre») está alineado con la evidencia y es legible en español neutral.'
  issues:
  - severity: high
    issue: La nota al pie está anclada en el lugar equivocado.
    rationale: El marcador [a] aparece en «riqueza», pero el contenido de la nota («O «justicia»») corresponde a צִדְקָתוֹ, no a הוֹן. Esto desinforma al lector sobre la alternativa léxica preservada por el POB inglés.
  - severity: medium
    issue: La elección principal «su justicia» puede no reflejar tan bien el valor contextual de צִדְקָה como «su rectitud».
    rationale: En Salmo 112 se describe el carácter perdurable del justo, no principalmente un concepto forense. «Rectitud» comunica mejor la cualidad moral duradera en español actual, mientras que «justicia» puede conservarse como alternativa legítima.
  revised_spanish_text: Hay riqueza y bienes en su casa, y su rectitud[a] permanece para siempre.
  revised_footnotes:
  - marker: a
    text: O «su justicia».
    reason: lexical_alternative
