revisions:
- from: Pero los que temen al Señor se levantarán para vida eterna, y su vida en la luz del Señor no cesará jamás.
  to: Pero los que temen a Yahvé resucitarán para vida eterna, y su vida en la luz de Yahvé no cesará jamás.
  rationale: Se revisa «el Señor» a «Yahvé» para cumplir la terminología española del proyecto cuando κύριος se refiere al Dios de Israel. Se cambia «se levantarán» por «resucitarán» porque, en este contexto escatológico con «para vida eterna», el sentido de resurrección futura está suficientemente marcado y así se preserva mejor la decisión teológica auditada en el POB inglés. El resto del versículo es fiel y natural, por lo que se conserva.
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T23:02:14Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura y el sentido general del griego: φοβούμενοι como grupo caracterizado por temor reverente, ἀναστήσονται con orientación escatológica, εἰς ζωὴν αἰώνιον como destino/resultado, y οὐκ ἐκλείψει ἔτι como continuidad sin fin. Sin embargo, hay dos ajustes necesarios para alinearse mejor con el proyecto y con la fuerza del original: κύριος debe revisarse a «Yahvé» en el texto principal por la política terminológica española cuando se refiere a Dios, y «se levantarán» conviene afinarse a «resucitarán» aquí porque el propio expediente teológico inglés documenta que el verso expresa directamente resurrección futura a vida eterna.'
  spanish_quality_summary: El español es claro y natural, con buen ritmo bíblico. «No cesará jamás» funciona bien. La única mejora estilística importante es que «resucitarán para vida eterna» comunica con mayor precisión y naturalidad en contexto que «se levantarán para vida eterna», evitando una posible lectura meramente figurada.
  glossary_alignment: 'Desalineación media con la terminología del proyecto: el borrador usa «el Señor» donde el default español del proyecto para el referente divino es «Yahvé». No hay razón contextual suficiente aquí para mantener la excepción, ya que κύριος se refiere a Dios en un texto judío y el proyecto pide explicar excepciones, no asumirlas. No hay otros conflictos glosariales importantes.'
  issues:
  - severity: high
    issue: Uso de «el Señor» en lugar de «Yahvé» para κύριος referido a Dios
    rationale: La guía del proyecto para español establece «Yahvé» en el texto principal, no «SEÑOR», salvo razón contextual específica. El expediente inglés usa «the Lord» por convención inglesa, pero eso no anula la política española.
  - severity: medium
    issue: «Se levantarán» debilita la decisión teológica auditada sobre resurrección
    rationale: Aunque ἀναστήσονται puede traducirse literalmente como «se levantarán», el expediente inglés documenta que aquí se expresa directamente una resurrección futura a vida eterna. «Resucitarán» preserva mejor esa fuerza en español y evita ambigüedad.
  revised_spanish_text: Pero los que temen a Yahvé resucitarán para vida eterna, y su vida en la luz de Yahvé no cesará jamás.
  revision_rationale: Se revisa «el Señor» a «Yahvé» para cumplir la terminología española del proyecto cuando κύριος se refiere al Dios de Israel. Se cambia «se levantarán» por «resucitarán» porque, en este contexto escatológico con «para vida eterna», el sentido de resurrección futura está suficientemente marcado y así se preserva mejor la decisión teológica auditada en el POB inglés. El resto del versículo es fiel y natural, por lo que se conserva.
