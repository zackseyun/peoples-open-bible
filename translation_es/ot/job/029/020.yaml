translation:
  language: es
  text: Mi gloria se mantenía fresca conmigo[a][b], y mi arco se renovaba en mi mano.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'También puede traducirse: «Mi gloria estaba nueva conmigo». El adjetivo hebreo puede significar «nuevo/nueva», aunque en este contexto probablemente expresa frescura o lozanía continua.'
    reason: lexical_alternative
  - marker: b
    text: «Arco» probablemente funciona como imagen de fuerza o vigor, aunque el hebreo conserva la imagen concreta.
    reason: cultural_note
lexical_decisions:
- source_word: כְּבוֹדִי
  english_pob_choice: my glory
  chosen_spanish: mi gloria
  alternatives_spanish:
  - mi honor
  - mi dignidad
  lexicon: HALOT
  rationale: כָּבוֹד puede significar gloria, honor o peso. "Mi gloria" conserva la imagen hebrea y la amplitud del término sin reducirlo solo a reputación social.
- source_word: חָדָשׁ
  english_pob_choice: fresh
  chosen_spanish: siempre fresca
  alternatives_spanish:
  - nueva
  - renovada
  lexicon: HALOT
  rationale: El adjetivo predicativo comunica aquí una cualidad continua de vigor o lozanía. "Siempre fresca" expresa mejor en español la idea de algo no marchito ni apagado que "nueva".
- source_word: עִמָּדִי
  english_pob_choice: with me
  chosen_spanish: conmigo
  alternatives_spanish:
  - junto a mí
  - permanecía conmigo
  lexicon: HALOT
  rationale: La preposición indica presencia cercana. "Conmigo" es una equivalencia natural y fiel que conserva la idea de permanencia y compañía.
- source_word: קַשְׁתִּי
  english_pob_choice: my bow
  chosen_spanish: mi arco
  alternatives_spanish:
  - mi flecha
  - mi arma
  lexicon: HALOT
  rationale: קֶשֶׁת es literalmente "arco". Se conserva la imagen concreta que el texto poético mantiene para sugerir fuerza o vigor.
- source_word: בְּיָדִי
  english_pob_choice: in my hand
  chosen_spanish: en mi mano
  alternatives_spanish:
  - por mi mano
  - a mi mano
  lexicon: HALOT
  rationale: La expresión es locativa e imagística. "En mi mano" sigue de cerca el hebreo y preserva la escena de fuerza disponible y activa.
- source_word: תַחֲלִיף
  english_pob_choice: was renewed
  chosen_spanish: se renovaba
  alternatives_spanish:
  - era renovado
  - volvía a estar vigoroso
  lexicon: HALOT
  rationale: En Hifil, la raíz aquí sugiere renovación o frescura, no mera sustitución. "Se renovaba" mantiene el paralelismo con "siempre fresca" y fluye bien en español.
translation_notes:
  revision_awareness: 'El texto sigue de cerca el hebreo y coincide con la lectura inglesa auditada: כְּבוֹדִי como "mi gloria", חָדָשׁ como una frescura continua, עִמָּדִי como presencia cercana, קַשְׁתִּי como "mi arco" y תַחֲלִיף como renovación activa. No se detectaron cambios de revisión adicionales en el expediente inglés.'
  spanish_consistency_notes:
  - Se evitó "SEÑOR" o terminología eclesiástica no presente en el versículo.
  - Se mantuvo el paralelismo poético entre la frescura de la gloria y la renovación del arco.
  - '"Conmigo" y "en mi mano" conservan la proximidad y la concreción del hebreo sin añadir interpretaciones.'
