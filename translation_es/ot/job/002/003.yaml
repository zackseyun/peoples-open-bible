  glossary_alignment: 'La terminología principal está bien alineada con el proyecto: יְהוָה -> ''Yahvé''; הַשָּׂטָן -> ''el Acusador''; עַבְדִּי -> ''mi siervo''; תֻמָּה -> ''integridad''. No hay conflictos con los defaults doctrinales. La revisión propuesta solo añade la alternativa documentada para ''¿Has puesto tu corazón en...?'' y ajusta la conjunción concesiva.'
