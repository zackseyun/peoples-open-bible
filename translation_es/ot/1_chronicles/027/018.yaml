translation:
  language: es
  text: Para Judá, Elihú[a], uno de los hermanos de David; para Isacar, Omri hijo de Micael.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «Elihú». Algunas versiones antiguas e intérpretes leen «Eliab», probablemente por armonización con el hermano de David llamado así en otros pasajes.'
    reason: alternative_reading
lexical_decisions:
- source_word: לִיהוּדָה
  english_pob_choice: For Judah
  chosen_spanish: Para Judá
  alternatives_spanish:
  - Para la tribu de Judá
  - Perteneciente a Judá
  lexicon: HALOT
  rationale: El ל prefijado marca el encabezado tribal en una lista administrativa. En español, «Para Judá» conserva la función de encabezado de asignación sin añadir explicaciones que el hebreo no expresa.
- source_word: אֱלִיהוּ
  english_pob_choice: Elihu
  chosen_spanish: Elihú
  alternatives_spanish:
  - Eliab
  lexicon: HALOT
  rationale: El texto consonántico hebreo apunta a אֱלִיהוּ, que se translitera con naturalidad como «Elihú». «Eliab» queda como alternativa textual tradicional, pero no como lectura principal del texto base.
- source_word: מֵאֲחֵי דָוִיד
  english_pob_choice: one of David’s brothers
  chosen_spanish: uno de los hermanos de David
  alternatives_spanish:
  - de los hermanos de David
  - procedente de los hermanos de David
  lexicon: HALOT
  rationale: La construcción partitiva con מִן + «hermanos de David» pide en español una expresión de pertenencia al conjunto. «Uno de los hermanos de David» reproduce con claridad el valor partitivo sin perder naturalidad.
- source_word: לְיִשָׂשכָר
  english_pob_choice: for Issachar
  chosen_spanish: para Isacar
  alternatives_spanish:
  - Para la tribu de Isacar
  lexicon: HALOT
  rationale: Como en Judá, el ל introduce al representante tribal dentro del registro. «Para Isacar» mantiene la estructura paralela del listado.
- source_word: עָמְרִי
  english_pob_choice: Omri
  chosen_spanish: Omrí
  alternatives_spanish:
  - Omri
  lexicon: HALOT
  rationale: Se conserva el nombre propio con transliteración española coherente; el acento final ayuda a la pronunciación en español sin alterar la identificación del nombre.
- source_word: בֶּן מִיכָאֵל
  english_pob_choice: son of Michael
  chosen_spanish: hijo de Micael
  alternatives_spanish:
  - hijo de Miguel
  lexicon: HALOT
  rationale: La relación patronímica se expresa de forma directa con «hijo de». Se elige «Micael» para reflejar el nombre hebreo מִיכָאֵל sin sustituirlo por la forma tradicional «Miguel», que trasladaría el nombre a una equivalencia litúrgica posterior.
theological_decisions:
- issue: Lectura textual del nombre de Elihu frente a Eliab
  english_pob_reading: The MT reads Elihu, with a footnote noting some ancient versions and interpreters read Eliab, likely by harmonization with David’s brother named elsewhere.
  chosen_spanish_reading: Elihú con nota de alternativa textual a Eliab
  alternative_spanish_readings:
  - Eliab sin nota
  - Elihú sin mención de la variante
  rationale: La decisión principal sigue el texto masorético, mientras que la nota preserva la tensión documental con la tradición que armoniza con el hermano de David mencionado en otros pasajes. Así se mantiene la transparencia textual.
  doctrine_reference: Textual criticism / integridad del texto base
translation_notes:
  revision_awareness: La base inglesa fue revisada y quedó sin cambios; el cotejo reporta alta concordancia (1.0) entre el texto base y la revisión, por lo que esta versión española sigue de cerca la lectura masorética con la única nota textual relevante sobre el nombre propio.
  spanish_consistency_notes:
  - Se mantiene el paralelismo administrativo del versículo con dos encabezados tribales.
  - Se evita sustituir nombres propios hebreos por equivalentes tradicionales cuando el texto base preserva la forma hebrea.
  - La nota textual se ancla en el nombre Elihú para reflejar la variante atestiguada sin alterar el cuerpo principal del versículo.
