translation:
  language: es
  text: Como José[a], nació un hombre; y hasta su cuerpo fue atendido[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Paralelo griego: «Pero José llegó a ser un hombre, jefe de sus hermanos, sostén del pueblo, y sus huesos fueron atendidos». El testimonio hebreo aquí es más breve.'
    reason: alternative_reading
  - marker: b
    text: La expresión «su cuerpo fue atendido» probablemente alude al honor y al entierro posteriores de los restos de José; compárese Éxodo 13:19 y Josué 24:32.
    reason: cross_reference
lexical_decisions:
- source_word: כיוסף
  english_pob_choice: Like Joseph
  chosen_spanish: Como José
  alternatives_spanish:
  - Al igual que José
  - Así como José
  lexicon: HALOT
  rationale: El כ comparativo se conserva de manera natural con «Como». El nombre propio se mantiene sin añadir expansión interpretativa.
- source_word: אם נולד גבר
  english_pob_choice: a man was born
  chosen_spanish: nació un hombre
  alternatives_spanish:
  - fue nacido un hombre
  - nació un varón
  lexicon: HALOT
  rationale: La secuencia hebrea es breve y el pasivo de נולד admite una traducción natural por «nació». «Un hombre» conserva el valor de גבר sin cargarlo innecesariamente con una glosa de fuerza o heroicidad que el hebreo aquí no obliga.
- source_word: גויתו
  english_pob_choice: his body
  chosen_spanish: su cuerpo
  alternatives_spanish:
  - su cadáver
  - sus restos
  lexicon: HALOT
  rationale: גוייה puede referirse al cuerpo, especialmente al cuerpo muerto. En español, «cuerpo» permite mantener la referencia sin cerrar demasiado el sentido hacia «cadáver», que sería más específico de lo que el hebreo exige.
- source_word: נפקדה
  english_pob_choice: was cared for
  chosen_spanish: fue atendido
  alternatives_spanish:
  - fue cuidado
  - fue visitado
  - fue recordado
  lexicon: HALOT
  rationale: פקד en pasivo puede implicar ser atendido, cuidado o tomado en cuenta. «Fue atendido» comunica con sobriedad el sentido de trato post mortem sin imponer todavía una explicación interpretativa en el texto principal.
theological_decisions:
- issue: Texto hebreo breve frente al paralelo griego más desarrollado
  english_pob_reading: Main text follows the extant Hebrew wording, with the Greek expansion preserved in a footnote.
  chosen_spanish_reading: El texto principal sigue el hebreo conservado; la expansión griega se conserva en una nota.
  alternative_spanish_readings:
  - 'Traducir en el cuerpo principal el griego más amplio: «Pero José llegó a ser un hombre, jefe de sus hermanos, sostén del pueblo, y sus huesos fueron atendidos».'
  - Incorporar parte del griego en el texto principal como expansión interpretativa.
  rationale: En Sirácida, el hebreo tiene prioridad cuando está conservado. Aquí el hebreo es más corto y el griego presenta una forma encomiástica ampliada. Para no introducir en la línea principal material no atestiguado por el hebreo, se mantiene la concisión hebrea y se deja constancia del paralelo griego en nota.
  doctrine_reference: 'PHILOSOPHY.md: Hebrew Sirach is translated from the Hebrew where it survives; parallel Greek is used as actual input and consistency check.'
translation_notes:
  revision_awareness: 'La revisión más reciente no propuso cambios: el pase indicó que no hacía falta modificar el borrador.'
  spanish_consistency_notes:
  - Se mantuvo «José» como nombre propio estándar en español.
  - Se evitó traducir el hebreo con un calco rígido que sonara extraño, pero sin ampliar más allá del testimonio hebreo.
  - «Atendido» se eligió para conservar la ambigüedad entre cuidado, honor y sepultura, tal como sugiere el contexto y el paralelo griego.
