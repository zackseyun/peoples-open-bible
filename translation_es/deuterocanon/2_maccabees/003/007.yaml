base_translation:
  language: en
  yaml_path: translation/deuterocanon/2_maccabees/003/007.yaml
  text: After conferring with the king[a], Apollonius informed him about the money that had been reported to him. Then the king appointed Heliodorus, who was over the affairs of state[c][b], and sent him with orders to carry out the removal of the aforementioned money.
  footnotes:
  - marker: a
    text: Or 'after meeting with the king' or 'after consulting the king.' The Greek participle suggests a formal audience or consultation.
    reason: lexical_alternative
  - marker: b
    text: Literally, 'the one over the affairs,' an administrative title for a high official overseeing state business.
    reason: cultural_note
  - marker: c
    text: Or 'to effect the carrying off of the aforementioned money.' The Greek emphasizes executing its removal from the place where it was kept.
    reason: lexical_alternative
