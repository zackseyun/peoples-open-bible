- from: Sácame del lodo, y no me dejes hundirme[a]. Líbrame de los que me odian y de las profundidades de las aguas.
  to: Rescátame del lodo, y no me dejes hundirme[a]. Que yo sea librado de los que me odian y de las profundidades de las aguas.
