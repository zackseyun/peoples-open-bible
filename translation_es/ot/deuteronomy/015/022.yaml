review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador comunica correctamente el sentido general del hebreo: permiso para comerlo en el ámbito local, accesible tanto al ritualmente impuro como al limpio, con la comparación a la gacela y al ciervo. Sin embargo, la sintaxis española duplica innecesariamente el verbo ''comerlo'' y hace menos natural la relación entre ''tú'' y ''el impuro y el limpio''.'
  spanish_quality_summary: 'El español es claro y digno, pero ''dentro de tus ciudades'' suena algo menos idiomático que ''dentro de tus poblaciones'' o mantener ''dentro de tus puertas'' con nota. La mayor dificultad es estilística/sintáctica: ''Podrás comerlo...; el impuro y el limpio, ambos por igual, podrán comerlo'' resulta repetitivo y algo torpe. Conviene simplificar para que el verso fluya mejor sin perder el contraste ritual.'
  glossary_alignment: No hay conflicto con la terminología base del proyecto. 'Impuro/limpio' preserva bien la distinción ritual, y 'gacela' / 'ciervo' concuerdan con las decisiones léxicas auditadas. La nota sobre 'puertas' como modismo debe mantenerse. Se recomienda ajustar la redacción principal para reflejar mejor el distributivo de יַחְדָּו.
  issues:
  - severity: medium
    issue: Sintaxis redundante con doble 'comerlo'
    rationale: El hebreo tiene primero un verbo dirigido al singular ('tú lo comerás/puedes comerlo') y luego una aclaración sobre quiénes pueden comerlo. En español, repetir 'comerlo' dos veces en la misma oración suena pesado y menos natural.
  - severity: low
    issue: '''Dentro de tus ciudades'' es comprensible pero no ideal como equivalente idiomático'
    rationale: El hebreo 'en/dentro de tus puertas' es un modismo de ámbito local. 'Ciudades' funciona, pero 'poblaciones' o 'dentro de tus puertas' con nota conserva mejor el sabor y evita una concreción algo estrecha.
  - severity: low
    issue: La nota a conserva comillas y formulación algo rígida
    rationale: Puede pulirse para sonar más natural en español editorial bíblico, sin cambiar el contenido.
  revised_spanish_text: Podrás comerlo dentro de tus puertas[a]; tanto el impuro como el limpio podrán comerlo[b], como la gacela y el ciervo.
  revised_footnotes:
