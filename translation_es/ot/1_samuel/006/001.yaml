translation:
  language: es
  text: Y el arca de Yahvé estuvo en el territorio de los filisteos siete meses[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «en el campo de los filisteos». El hebreo dice literalmente «en el campo de los filisteos».
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְהִי
  english_pob_choice: And ... was
  chosen_spanish: Y ... estuvo
  alternatives_spanish:
  - Y ... fue
  - Y sucedió que ... estuvo
  lexicon: HALOT
  rationale: La forma narrativa con וַיְהִי introduce un nuevo desarrollo en la historia. En español, «Y ... estuvo» conserva la secuencia narrativa sin añadir una perífrasis innecesaria como «sucedió que».
- source_word: אֲרוֹן יְהוָה
  english_pob_choice: the ark of Yahweh
  chosen_spanish: el arca de Yahvé
  alternatives_spanish:
  - el arca de Yahvé
  - el arca de Yavé
  lexicon: HALOT
  rationale: «Arca» es el equivalente establecido para אֲרוֹן en este contexto cultual. Se mantiene «Yahvé» conforme al criterio del proyecto para el nombre divino, en lugar de una sustitución por «Señor».
- source_word: בִּשְׂדֵה פְלִשְׁתִּים
  english_pob_choice: in the territory of the Philistines
  chosen_spanish: en el territorio de los filisteos
  alternatives_spanish:
  - en el campo de los filisteos
  - en la tierra de los filisteos
  lexicon: HALOT
  rationale: שָׂדֶה literalmente es «campo», pero aquí funciona de manera extensiva para el ámbito geográfico controlado por los filisteos. «Territorio» conserva bien ese sentido colectivo y coincide con la revisión inglesa más reciente.
- source_word: שִׁבְעָה חֳדָשִׁים
  english_pob_choice: seven months
  chosen_spanish: siete meses
  alternatives_spanish:
  - siete meses
  lexicon: HALOT
  rationale: La expresión numérica es directa y no requiere ajuste idiomático. Se traduce literalmente como «siete meses».
theological_decisions:
- issue: Renderización del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Señor
  - Jehová
  rationale: Se sigue el principio del proyecto de transliterar el Tetragrámaton como un nombre propio, no de ocultarlo tras un título. «Yahvé» es la forma estándar adoptada en español para esta convención de traducción.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Sentido de בִּשְׂדֵה פְלִשְׁתִּים
  english_pob_reading: in the territory of the Philistines
  chosen_spanish_reading: en el territorio de los filisteos
  alternative_spanish_readings:
  - en el campo de los filisteos
  - en la tierra de los filisteos
  rationale: Aunque el hebreo dice literalmente «en el campo», el contexto geográfico apunta al dominio filisteo en general. «Territorio» evita una imagen demasiado literal que en español podría sonar limitada o extraña.
  doctrine_reference: Principios de equivalencia óptima para topónimos y expresiones espaciales
- issue: Valor narrativo de וַיְהִי
  english_pob_reading: And ... was
  chosen_spanish_reading: Y ... estuvo
  alternative_spanish_readings:
  - Y ... estaba
  - Y aconteció que ... estuvo
  rationale: El verbo hebreo funciona como avance narrativo. «Estuvo» preserva el estado resultante sin forzar un giro impersonal que el español no exige.
  doctrine_reference: Principios de estilo narrativo bíblico en español
translation_notes:
  revision_awareness: La versión inglesa más reciente ajustó «field» a «territory» para expresar mejor el sentido geográfico colectivo; la propuesta española sigue ese ajuste con «territorio», sin perder de vista que el hebreo literal conserva «campo».
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como forma del nombre divino, en coherencia con el criterio del proyecto.
  - «Filisteos» va en minúscula por tratarse de un etnónimo común en español.
  - La nota al pie conserva la alternativa literal relevante del hebreo sin introducir una paráfrasis amplia.
