base_translation:
  language: en
  yaml_path: translation/nt/luke/023/011.yaml
  text: But Herod also[a], together with his soldiers, treated him with contempt and mocked him. Dressing him in splendid clothing, he sent him back to Pilate.
  footnotes:
  - marker: a
    text: Or 'a splendid robe'; λαμπρὰν can also mean 'bright,' and the clothing likely serves Herod's mockery by giving Jesus an appearance of mock honor.
    reason: lexical_alternative
