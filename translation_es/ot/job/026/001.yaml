lexical_decisions:
- source_word: וַיַּ֥עַן
  english_pob_choice: answered
  chosen_spanish: respondió
  alternatives_spanish:
  - contestó
  - respondió y dijo
  lexicon: HALOT
  rationale: El hebreo וַיַּעַן introduce una respuesta en discurso directo. En español, «respondió» comunica bien la función dialogal y evita la repetición innecesaria si se mantiene también «y dijo».
- source_word: אִיּוֹב
  english_pob_choice: Job
  chosen_spanish: Job
  lexicon: convención onomástica
  rationale: Se conserva el nombre propio según la convención estándar en español bíblico.
- source_word: וַיֹּאמַר
  english_pob_choice: and said
  chosen_spanish: y dijo
  alternatives_spanish:
  - diciendo
  lexicon: HALOT
  rationale: אמר funciona aquí como fórmula narrativa de habla. «Y dijo» preserva la estructura binaria del hebreo sin volverla forzada en español.
- source_word: וַ
  english_pob_choice: Then
  chosen_spanish: Entonces
  alternatives_spanish:
  - Y
  lexicon: valor discursivo del waw consecutivo
  rationale: El waw consecutivo marca avance secuencial. «Entonces» conserva la sucesión de manera natural en español; «Y» sería más literal, pero menos fluido al inicio de una intervención.
translation_notes:
  revision_awareness: El texto inglés mantiene la fórmula completa «answered and said» sin notas ni revisiones; el español la conserva con una equivalencia funcional natural («respondió y dijo») o, en la redacción final, con una sintaxis igualmente transparente («Entonces Job respondió y dijo»). No hay variantes textuales ni tensiones teológicas en este versículo.
  spanish_consistency_notes:
  - Se mantiene el estilo narrativo bíblico sobrio y directo.
  - No se añade puntuación interpretativa más allá de los dos puntos que introducen el discurso.
  - La elección de «Entonces» refleja el valor secuencial del waw inicial sin sobrerrepresentar la coordinación hebrea.
