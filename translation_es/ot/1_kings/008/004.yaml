translation:
  language: es
  text: Llevaron el arca de Yahvé[a], la tienda de reunión y todos los utensilios sagrados que estaban en la tienda; los sacerdotes y los levitas[b] los subieron.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'la subieron'. El verbo hebreo puede indicar traer o llevar hacia arriba en una procesión.
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: ''los sacerdotes y los levitas''. Algunos entienden esto más específicamente como el sacerdocio levítico, pero la formulación hebrea nombra ambos grupos.'
    reason: alternative_reading
lexical_decisions:
- source_word: וַיַּעֲלוּ
  english_pob_choice: They brought up
  chosen_spanish: Subieron
  alternatives_spanish:
  - los llevaron hacia arriba
  - los hicieron subir
  - los cargaron
  lexicon: HALOT
  rationale: עלה en el hifil expresa subir, hacer subir o llevar hacia arriba. En español, 'subieron' comunica de forma natural la acción procesional sin añadir un matiz más técnico que el hebreo no exige.
- source_word: אֲרוֹן יְהוָה
  english_pob_choice: the ark of Yahweh
  chosen_spanish: el arca de Yahvé
  alternatives_spanish:
  - el arca de Yahvé
  - el arca de Jehová
  lexicon: HALOT
  rationale: אֲרוֹן se refiere al arca del pacto, y יְהוָה debe preservarse como nombre divino. Se usa 'Yahvé' según la terminología del proyecto, manteniendo el nombre propio y no una sustitución reverencial.
- source_word: אֹהֶל מוֹעֵד
  english_pob_choice: the tent of meeting
  chosen_spanish: la tienda de reunión
  alternatives_spanish:
  - la tienda de encuentro
  - el tabernáculo
  lexicon: HALOT
  rationale: La expresión es el nombre técnico del santuario. 'Tienda de reunión' conserva bien el valor cultual y resulta natural en español; 'tabernáculo' sería más tradicional pero menos directo al hebreo.
- source_word: כָּל כְּלֵי הַקֹּדֶשׁ
  english_pob_choice: all the holy vessels
  chosen_spanish: todos los utensilios sagrados
  alternatives_spanish:
  - todos los vasos sagrados
  - todos los objetos sagrados
  - todos los utensilios del santuario
  lexicon: HALOT
  rationale: כְּלִים abarca utensilios, instrumentos u objetos. 'Utensilios sagrados' transmite la amplitud del término y su carácter consagrado sin restringirlo indebidamente a vasos de uso estrecho.
- source_word: אֲשֶׁר בָּאֹהֶל
  english_pob_choice: that were in the tent
  chosen_spanish: que estaban en la tienda
  alternatives_spanish:
  - que estaban en la tienda de reunión
  - que se hallaban en la tienda
  lexicon: HALOT
  rationale: El relativo modifica naturalmente a los utensilios sagrados. 'Que estaban en la tienda' evita la repetición pesada y mantiene el referente inmediato a la 'tienda de reunión' ya mencionada.
- source_word: וַיַּעֲלוּ אֹתָם
  english_pob_choice: brought them up
  chosen_spanish: los subieron
  alternatives_spanish:
  - los llevaron hacia arriba
  - los cargaron
  lexicon: HALOT
  rationale: La repetición del verbo se conserva en español para reflejar la estructura del hebreo. 'Los subieron' mantiene la idea de traslado ascendente y el matiz de procesión.
- source_word: הַכֹּהֲנִים וְהַלְוִיִּם
  english_pob_choice: the priests and the Levites
  chosen_spanish: los sacerdotes y los levitas
  alternatives_spanish:
  - los sacerdotes y los levitas
  - el sacerdocio levítico
  lexicon: HALOT
  rationale: El hebreo nombra explícitamente dos grupos. Se mantiene esa duplicación en vez de resolverla interpretativamente, preservando la distinción o designación doble que el texto presenta.
theological_decisions:
- issue: Rendering of the divine name יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahvé
  - Jehová
  rationale: El texto hebreo usa el Tetragrámaton de forma directa. Conforme a la política del proyecto, se translitera como 'Yahvé' para conservar el nombre propio del Dios de Israel, no una sustitución titular.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Relationship of 'the priests and the Levites' to the transport action
  english_pob_reading: Retain both groups explicitly in the main text without harmonizing away the wording
  chosen_spanish_reading: Mantener ambos grupos explícitamente en el texto principal
  alternative_spanish_readings:
  - los sacerdotes levitas
  - los levitas sacerdotales
  rationale: El hebreo conserva 'los sacerdotes y los levitas'. En español conviene respetar esa formulación sin fusionarla, para no borrar la tensión o posible doble designación que el versículo presenta.
  doctrine_reference: 'DOCTRINE.md Translation philosophy #3: Preserve theological tension rather than resolve it'
translation_notes:
  revision_awareness: La revisión más reciente indicó que no eran necesarios cambios; por eso la redacción conserva la correspondencia alta con el hebreo y con el audit trail inglés, manteniendo sin resolver la posible doble designación de 'los sacerdotes y los levitas'.
  spanish_consistency_notes:
  - Se usa 'Yahvé' como nombre divino principal, conforme a la terminología del proyecto.
  - '''Tienda de reunión'' evita el término tradicional ''tabernáculo'' cuando el hebreo ofrece una designación técnica más literal.'
  - '''Utensilios sagrados'' preserva la amplitud de כְּלִים sin forzarla a ''vasos''.'
  - Se mantiene la repetición verbal en español ('subieron' / 'los subieron') para reflejar la estructura del hebreo.
  - No se armoniza 'los sacerdotes y los levitas' con una sola categoría, a fin de preservar la tensión textual documentada.
