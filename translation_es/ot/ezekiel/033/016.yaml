    issue: La negación principal del hebreo no está expresada directamente en el texto español.
    rationale: לֹא תִזָּכַרְנָה לוֹ exige una negación explícita. Aunque «ninguno» aporta polaridad negativa, la construcción actual no reproduce bien la cláusula verbal negativa y se combina torpemente con el singular «será recordado».
  - severity: high
    issue: Problema de concordancia/sintaxis en «Ninguno de los pecados que cometió será recordado».
    rationale: El español suena forzado porque «ninguno de los pecados» seguido de relativa y pasiva singular produce una frase poco natural; una reformulación plural («no serán recordados») preserva mejor el sentido distributivo del hebreo y la fluidez en español.
  - severity: low
    issue: La nota al pie sigue siendo válida, pero conviene ajustarla a la nueva formulación plural del texto.
    rationale: Si el texto principal cambia a «no serán recordados[a] contra él», la nota debe mantener la alternativa judicial sin crear desajuste entre singular y plural.
