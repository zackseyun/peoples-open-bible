translation:
  language: es
  text: Porque así como, en su propia alma como en una sala de consejo, veía consejeros temibles—la naturaleza, el haberlos dado a luz, el amor por sus hijos y la tortura[a] de sus hijos—
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Más literalmente, «el potro de sus hijos», donde «potro» representa por metonimia la tortura que ellos sufrían.
    reason: lexical_alternative
lexical_decisions:
- source_word: καθάπερ γὰρ
  english_pob_choice: For just as
  chosen_spanish: Porque así como
  alternatives_spanish:
  - Porque como
  - Así como
  lexicon: LSJ
  rationale: Conserva la fuerza comparativa y el enlace explicativo de γάρ sin sonar forzado en español.
- source_word: ἐν βουλευτηρίῳ
  english_pob_choice: as in a council chamber
  chosen_spanish: como en una sala de consejo
  alternatives_spanish:
  - como en una cámara de consejo
  - como en una sala deliberativa
  lexicon: LSJ
  rationale: βουλευτήριον designa un lugar de deliberación; 'sala de consejo' comunica la imagen institucional con naturalidad en español.
- source_word: τῇ ἑαυτῆς ψυχῇ
  english_pob_choice: in her own soul
  chosen_spanish: en su propia alma
  alternatives_spanish:
  - en su propia mente
  - dentro de sí misma
  lexicon: LSJ
  rationale: ψυχή aquí es el centro interior donde se deliberan impulsos y decisiones; 'alma' preserva mejor ese peso antropológico que 'mente'.
- source_word: δεινοὺς ... συμβούλους
  english_pob_choice: fearsome counselors
  chosen_spanish: consejeros temibles
  alternatives_spanish:
  - consejeros formidables
  - consejeros terribles
  lexicon: LSJ
  rationale: δεινός puede ser temible, terrible o formidable; 'temibles' mantiene el valor fuerte y la imagen de consejeros interiores que presionan con poder.
- source_word: ὁρῶσα
  english_pob_choice: she saw
  chosen_spanish: veía
  alternatives_spanish:
  - vio
  - al ver
  lexicon: LSJ
  rationale: El participio se vierte de modo natural en imperfecto para sostener el flujo narrativo y la escena continua.
- source_word: φύσιν
  english_pob_choice: nature
  chosen_spanish: la naturaleza
  alternatives_spanish:
  - el instinto natural
  - la condición natural
  lexicon: LSJ
  rationale: En esta lista de impulsos internos, φύσις apunta a la inclinación o constitución natural; 'la naturaleza' es breve y fiel.
- source_word: γένεσιν
  english_pob_choice: birth
  chosen_spanish: el nacimiento
  alternatives_spanish:
  - el hecho de haber dado a luz
  - la generación
  lexicon: LSJ
  rationale: En contexto materno, γένεσις remite al origen por nacimiento; 'el nacimiento' conserva esa relación sin sobreexplicar.
- source_word: φιλοτεκνίαν
  english_pob_choice: love for her children
  chosen_spanish: el amor por sus hijos
  alternatives_spanish:
  - el cariño por sus hijos
  - el amor materno
  lexicon: LSJ
  rationale: La POB inglesa corrigió una lectura más interpretativa hacia una correspondencia más directa con φιλοτεκνίαν; en español, 'amor por sus hijos' sigue esa correspondencia sin añadir matiz no explicitado.
- source_word: τέκνων στρέβλαν
  english_pob_choice: the torture of her children
  chosen_spanish: la tortura de sus hijos
  alternatives_spanish:
  - el potro de sus hijos
  - el suplicio de sus hijos
  lexicon: LSJ
  rationale: στρέβλα alude literalmente al potro/torno de tortura y por metonimia al tormento sufrido; 'tortura' comunica el sentido principal en español moderno sin perder la dureza del término.
translation_notes:
  revision_awareness: La redacción sigue la revisión más reciente del audit trail inglés, que sustituyó una paráfrasis de φιλοτεκνίαν por una correspondencia más cercana ('love for her children'). En español se mantuvo esa mayor proximidad, y se conservó el paralelismo enumerativo del griego con una sintaxis natural.
  spanish_consistency_notes:
  - Se usó 'alma' para ψυχή por su valor antropológico, coherente con el uso bíblico-literario de la obra.
  - Se evitó 'Cristo', 'Señor' u otra terminología no pertinente al versículo.
  - Se mantuvo el tono de enumeración con guiones para reproducir la lista interna de impulsos/cousantes.
  - '''La tortura de sus hijos'' conserva la dureza del griego mejor que una suavización como ''dolor'' o ''tormento''.'
