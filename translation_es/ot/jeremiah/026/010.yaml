    text: O «los príncipes de Judá». El término hebreo puede designar gobernantes de alto rango o funcionarios.
    reason: lexical_alternative
  - marker: b
    text: O «fueron subiendo». El verbo hebreo conserva la idea direccional de subir hacia el recinto del templo.
    reason: lexical_alternative
  - marker: c
    text: Es decir, una puerta del complejo del templo conocida como «la Puerta Nueva».
    reason: cultural_note
  revision_rationale: Se mantiene la traducción principal casi intacta por su buena fidelidad al hebreo y a la auditoría inglesa. Se corrige la nota [b] para que explique de forma idiomática y precisa el valor de וַיַּעֲלוּ sin introducir una alternativa española artificial. También se ajusta a «Puerta Nueva» para una designación más natural y coherente en español.
