  to: 'Y también vinieron los siervos del rey para bendecir a nuestro señor, el rey David, diciendo: «Que tu Dios haga más grande el nombre de Salomón que el tuyo[a], y que haga mayor su trono que tu trono». Y el rey se postró en la cama[b].'
  rationale: Se ajusta la comparación de «nombre» para que el español suene natural sin perder la imagen hebrea, y se reubican las notas para que sus marcadores coincidan con las palabras pertinentes del texto revisado. También se cambia «sobre la cama» por «en la cama» por mayor fluidez en español, manteniendo la misma escena y sentido general. Se añade una coma en aposición en «nuestro señor, el rey David» para mejorar la lectura.
  reviewer_model: gpt-5.4
