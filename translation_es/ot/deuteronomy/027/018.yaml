revisions:
- from: 'Maldito[a] el que hace que se extravíe un ciego en el camino. Y todo el pueblo dirá: «Amén».'
  to: 'Maldito el que desvía[a] a un ciego en el camino. Y todo el pueblo dirá: «Amén».'
  rationale: Se corrige el anclaje de la nota para que recaiga sobre el verbo que realmente tiene la alternativa léxica, y se mejora la naturalidad de la cláusula causativa con «desvía», que sigue siendo fiel a מַשְׁגֶּה en este contexto concreto. No se requiere adjudicación adicional.
