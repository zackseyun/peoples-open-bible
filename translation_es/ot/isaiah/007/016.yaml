revisions:
- from: Porque antes de que el muchacho sepa rechazar lo malo y escoger lo bueno, la tierra[a] ante cuyos dos reyes tú tienes temor será abandonada.
  to: Porque antes de que el muchacho sepa rechazar lo malo y escoger lo bueno, la tierra ante cuyos dos reyes temes[b] será abandonada[a].
  rationale: Se ajusta la cláusula relativa a un español más natural ('temes') y se restaura la nota léxica significativa sobre קָץ מִפְּנֵי, preservando la misma tensión semántica documentada en el POB inglés. El resto del verso puede mantenerse.
