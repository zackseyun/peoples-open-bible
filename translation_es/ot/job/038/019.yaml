translation:
  language: es
  text: ¿Dónde está el camino[a] a la morada de la luz, y dónde está el lugar de las tinieblas?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, más formalmente: «¿Cuál es el camino en que habita la luz, y las tinieblas, dónde está su lugar?»'
    reason: lexical_alternative
lexical_decisions:
- source_word: אֵי זֶה
  english_pob_choice: Where is
  chosen_spanish: ¿Dónde está
  alternatives_spanish:
  - ¿Cuál es
  - ¿Dónde queda
  lexicon: HALOT
  rationale: La pregunta hebrea pide ubicación o dirección. En español, «¿Dónde está» expresa con naturalidad ese valor locativo sin forzar una construcción demasiado literal.
- source_word: הַדֶּרֶךְ
  english_pob_choice: the way
  chosen_spanish: el camino
  alternatives_spanish:
  - la senda
  - la ruta
  lexicon: HALOT
  rationale: דֶּרֶךְ puede ser «camino», «ruta» o «senda». «Camino» es claro y conserva la imagen de acceso o dirección que desarrolla la pregunta.
- source_word: יִשְׁכָּן
  english_pob_choice: to the dwelling of
  chosen_spanish: hacia la morada de
  alternatives_spanish:
  - donde mora
  - para la morada de
  - al lugar donde habita
  lexicon: HALOT
  rationale: שׁכן significa «habitar, morar, residir». El inglés POB eligió una formulación nominal; en español, «hacia la morada de» mantiene la idea de destino del camino y evita un giro pesado, sin borrar la imagen de habitar.
- source_word: א֑וֹר
  english_pob_choice: light
  chosen_spanish: la luz
  alternatives_spanish:
  - luz
  lexicon: HALOT
  rationale: «Luz» es el equivalente directo y natural en español; el artículo definido sigue el paralelismo hebreo y la personificación poética del término.
- source_word: וְחֹשֶׁךְ
  english_pob_choice: and ... darkness
  chosen_spanish: las tinieblas
  alternatives_spanish:
  - la oscuridad
  - la noche
  lexicon: HALOT
  rationale: חֹשֶׁךְ se puede traducir por «oscuridad» o «tinieblas». Aquí opto por «tinieblas» para mantener el contraste poético con «la luz» y respetar la resonancia bíblica del paralelo.
- source_word: מְקוֹמוֹ
  english_pob_choice: the place of darkness
  chosen_spanish: el lugar de las tinieblas
  alternatives_spanish:
  - su lugar
  - su morada
  - el lugar de oscuridad
  lexicon: HALOT
  rationale: מָקוֹם es «lugar». El sufijo posesivo retoma a «las tinieblas»; «el lugar de las tinieblas» conserva ese vínculo semítico de modo más claro en español que un simple «su lugar».
translation_notes:
  revision_awareness: El contexto auditado muestra alta concordancia con la lectura inglesa; no hay revisiones aplicadas. La decisión principal en español es solo de naturalidad sintáctica, manteniendo la imagen de camino, morada, luz y tinieblas sin expandir el sentido.
  spanish_consistency_notes:
  - Se usa «Yahvé» para el tetragrámaton cuando aparezca; aquí no aplica.
  - Se mantiene el paralelismo entre «la luz» y «las tinieblas» como contraste poético.
  - La nota a recoge la alternativa más formal preservada por el POB inglés, adaptada a sintaxis española.
