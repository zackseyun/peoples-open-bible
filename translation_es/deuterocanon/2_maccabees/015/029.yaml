translation:
  language: es
  text: Y cuando se levantó un grito y tumulto, bendecían al Soberano[a] en la lengua de sus antepasados[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: También puede entenderse como «el Poderoso» o «el Gobernante», porque el título griego δυνάστης designa a uno que posee poder o autoridad.
    reason: lexical_alternative
  - marker: b
    text: Literalmente, «con la voz ancestral»; la frase probablemente significa que clamaban en su idioma tradicional o nativo.
    reason: lexical_alternative
lexical_decisions:
- source_word: γενομένης
  english_pob_choice: when ... arose
  chosen_spanish: cuando se levantó
  alternatives_spanish:
  - cuando surgió
  - después de que se levantó
  lexicon: γίνομαι (genitive absolute usage)
  rationale: La construcción absoluta de genitivo pide una relación circunstancial temporal. «Cuando se levantó» expresa con naturalidad el inicio del clamor y mantiene el valor eventivo sin forzar una paráfrasis.
- source_word: κραυγῆς
  english_pob_choice: a cry
  chosen_spanish: un grito
  alternatives_spanish:
  - un clamor
  - un alarido
  lexicon: 'BDAG: κραυγή'
  rationale: «Grito» conserva el singular y la fuerza auditiva de κραυγή, sin especificar indebidamente si se trata de grito de guerra, de alarma o de júbilo.
- source_word: ταραχῆς
  english_pob_choice: turmoil
  chosen_spanish: confusión
  alternatives_spanish:
  - tumulto
  - agitación
  lexicon: 'BDAG: ταραχή'
  rationale: En contexto narrativo-bélico, «confusión» comunica bien el desorden y la agitación del momento; evita un español demasiado abstracto y sigue siendo fiel al campo semántico.
- source_word: εὐλόγουν
  english_pob_choice: they blessed
  chosen_spanish: bendecían
  alternatives_spanish:
  - bendijeron
  - alababan
  lexicon: 'BDAG: εὐλογέω'
  rationale: El imperfecto narrativo pide una acción en curso; «bendecían» preserva el vínculo léxico con la bendición dirigida a Dios, más preciso que «alababan».
- source_word: τὸν δυνάστην
  english_pob_choice: the Sovereign
  chosen_spanish: al Soberano
  alternatives_spanish:
  - al Poderoso
  - al Gobernante
  lexicon: 'BDAG: δυνάστης'
  rationale: Se mantiene el matiz de autoridad y poder como título reverente para Dios. «Soberano» es idiomático en español y evita reducir el término a un mero cargo político.
- source_word: τῇ πατρίῳ φωνῇ
  english_pob_choice: in their ancestral language
  chosen_spanish: en la lengua de sus antepasados
  alternatives_spanish:
  - con la voz de sus padres
  - en su lengua ancestral
  - en su lengua nativa
  lexicon: 'BDAG: πατρίος, φωνή'
  rationale: La frase puede indicar voz/idioma tradicional. «En la lengua de sus antepasados» conserva el rasgo heredado/ancestral y traduce φωνή de modo natural como lengua idiomática.
theological_decisions:
- issue: Título divino τὸν δυνάστην
  english_pob_reading: the Sovereign
  chosen_spanish_reading: el Soberano
  alternative_spanish_readings:
  - el Poderoso
  - el Gobernante
  rationale: El griego presenta un título de poder aplicado a Dios; «Soberano» conserva majestad y autoridad sin borrar la posible amplitud semántica del término.
  doctrine_reference: 'DOCTRINE.md: Translate titles; preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: 'Se corrigió el problema de validación anterior: el marcador [a] ahora aparece explícitamente en el texto español junto a la palabra correspondiente.'
  spanish_consistency_notes:
