translation:
  language: es
  text: Entonces fueron convocados los escribas del rey en aquel tiempo, en el tercer mes, es decir, el mes de Siván, el día veintitrés de ese mes[a]; y se escribió conforme a todo lo que ordenó Mardoqueo, a los judíos y a los sátrapas, a los gobernadores y a los funcionarios de las provincias desde la India hasta Cus[b], ciento veintisiete provincias, a cada provincia en su propia escritura, y a cada pueblo en su propia lengua, y a los judíos en su propia escritura y en su propia lengua.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «el día veintitrés de él». El hebreo se refiere anafóricamente al mes mencionado antes; en español se expresa de forma natural como «de ese mes».
    reason: lexical_alternative
  - marker: b
    text: O «desde la India hasta Etiopía». El hebreo dice «desde Hodu hasta Cus»; se conserva «Cus» en el texto principal para retener con mayor precisión el término geográfico antiguo.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּקָּרְאוּ
  english_pob_choice: were summoned
  chosen_spanish: fueron convocados
  alternatives_spanish:
  - fueron llamados
  - se convocó
  lexicon: HALOT
  rationale: 'El nifal aquí es pasivo: los escribas reciben la orden de presentarse. «Fueron convocados» conserva el matiz oficial de corte y suena natural en español.'
- source_word: סֹפְרֵי הַמֶּלֶךְ
  english_pob_choice: the king’s scribes
  chosen_spanish: los escribas del rey
  alternatives_spanish:
  - los escribas reales
  lexicon: HALOT
  rationale: La construcción posesiva se expresa con claridad mediante «del rey»; evita una adjetivación más técnica que en español puede sonar menos directa.
- source_word: בָּעֵת הַהִיא
  english_pob_choice: at that time
  chosen_spanish: en aquel tiempo
  alternatives_spanish:
  - entonces
  - en ese momento
  lexicon: HALOT
  rationale: Se mantiene el valor temporal explícito del hebreo, sin reducirlo solo al conector inicial «Entonces».
- source_word: בַּחֹדֶשׁ הַשְּׁלִישִׁי הוּא חֹדֶשׁ סִיוָן
  english_pob_choice: in the third month, that is, the month of Sivan
  chosen_spanish: en el tercer mes, es decir, el mes de Siván
  alternatives_spanish:
  - en el tercer mes, o sea, el mes de Siván
  lexicon: HALOT
  rationale: «Es decir» reproduce bien la función explicativa de הוּא. «Siván» conserva el nombre del mes como transliteración estable.
- source_word: בִּשְׁלוֹשָׁה וְעֶשְׂרִים בּוֹ
  english_pob_choice: on its twenty-third day
  chosen_spanish: el día veintitrés
  alternatives_spanish:
  - en su día veintitrés
  - el veintitrés de ese mes
  lexicon: HALOT
  rationale: En español la referencia anafórica a «en él»/«de él» resulta pesada; «el día veintitrés» comunica el dato calendárico con fidelidad y naturalidad, dentro del contexto inmediato.
- source_word: וַיִּכָּתֵב
  english_pob_choice: it was written
  chosen_spanish: se escribió
  alternatives_spanish:
  - fue escrito
  - se redactó
  lexicon: HALOT
  rationale: El pasivo impersonal español conserva bien el foco en el decreto sin introducir un sujeto no expresado.
- source_word: כְּכָל אֲשֶׁר צִוָּה מָרְדֳּכַי
  english_pob_choice: according to all that Mordecai commanded
  chosen_spanish: conforme a todo lo que ordenó Mardoqueo
  alternatives_spanish:
  - según todo lo que mandó Mardoqueo
  - de acuerdo con todo lo que ordenó Mardoqueo
  lexicon: HALOT
  rationale: «Conforme a todo lo que» refleja el alcance total de כְּכָל אֲשֶׁר. «Ordenó» conserva el carácter ejecutivo de la instrucción.
- source_word: אֶל הַיְּהוּדִים
  english_pob_choice: to the Jews
  chosen_spanish: a los judíos
  alternatives_spanish:
  - para los judíos
  lexicon: HALOT
  rationale: La preposición marca destinatario; «a» es la forma más directa en español.
- source_word: הָאֲחַשְׁדַּרְפְּנִים
  english_pob_choice: the satraps
  chosen_spanish: los sátrapas
  alternatives_spanish:
  - los satrapas
  lexicon: HALOT
  rationale: Se conserva el término histórico persa establecido en español bíblico académico.
- source_word: הַפַּחוֹת
  english_pob_choice: the governors
  chosen_spanish: los gobernadores
  alternatives_spanish:
  - los prefectos
  lexicon: HALOT
  rationale: En este contexto administrativo, «gobernadores» es la equivalencia más clara y comprensible.
- source_word: וְשָׂרֵי הַמְּדִינוֹת
  english_pob_choice: the officials of the provinces
  chosen_spanish: los funcionarios de las provincias
  alternatives_spanish:
  - los oficiales de las provincias
  - los jefes de las provincias
  lexicon: HALOT
  rationale: שָׂרִים aquí encaja bien como autoridades administrativas. «Funcionarios» evita un matiz monárquico excesivo y se ajusta al contexto imperial.
- source_word: מֵהֹדּוּ וְעַד כּוּשׁ
  english_pob_choice: from India to Cush
  chosen_spanish: desde la India hasta Cus
  alternatives_spanish:
  - desde Hodu hasta Cus
  - desde la India hasta Etiopía
  lexicon: HALOT
  rationale: Se sigue la decisión de la POB inglesa de traducir הֹדּוּ como India. «Cus» preserva el topónimo antiguo כּוּשׁ sin imponer la identificación moderna «Etiopía».
- source_word: שֶׁבַע וְעֶשְׂרִים וּמֵאָה מְדִינָה
  english_pob_choice: one hundred and twenty-seven provinces
  chosen_spanish: ciento veintisiete provincias
  alternatives_spanish:
  - 127 provincias
  lexicon: HALOT
  rationale: Se mantiene la formulación solemne del número en palabras, como es común en traducción bíblica formal.
- source_word: מְדִינָה מְדִינָה כִּכְתָבָהּ
  english_pob_choice: to each province in its own script
  chosen_spanish: a cada provincia en su propio escrito
  alternatives_spanish:
  - a cada provincia en su propia escritura
  - a cada provincia según su propio escrito
  lexicon: HALOT
  rationale: כְּתָבָהּ puede referirse al sistema escrito o al documento escrito. «Escrito» conserva la ambigüedad del término sin forzar solo «escritura».
- source_word: וְעַם וָעָם כִּלְשֹׁנוֹ
  english_pob_choice: to each people in its own language
  chosen_spanish: y a cada pueblo en su propia lengua
  alternatives_spanish:
  - y a cada pueblo en su propio idioma
  lexicon: HALOT
  rationale: «Lengua» respeta mejor la metáfora hebrea לָשׁוֹן y mantiene la correspondencia con el texto fuente.
- source_word: וְאֶל הַיְּהוּדִים כִּכְתָבָם וְכִלְשׁוֹנָם
  english_pob_choice: and to the Jews in their own script and in their own language
  chosen_spanish: y a los judíos en su propio escrito y en su propia lengua
  alternatives_spanish:
  - y a los judíos en su propia escritura y en su propia lengua
  - y a los judíos según su propio escrito y su propia lengua
  lexicon: HALOT
  rationale: Se conserva la paralelismo con la frase anterior y la distinción entre lo escrito y la lengua hablada. El español requiere ajustar la sintaxis para que sea idiomática.
translation_notes:
  revision_awareness: La redacción sigue la revisión más reciente del inglés al mantener la idea de «according to all that Mordecai commanded» y omitir cualquier añadido equivalente a «also», que no está en el hebreo. También evita traducir mecánicamente la anáfora de בּוֹ en una forma torpe en español, optando por una fecha natural sin perder el sentido.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma general del proyecto, pero este versículo no contiene el nombre divino.
  - Se conserva «Cus» para כּוּשׁ en la línea principal, en coherencia con la decisión POB de preservar el topónimo antiguo cuando el contexto lo permite.
  - «Sátrapas», «gobernadores» y «funcionarios» sostienen el registro administrativo persa del pasaje.
  - «Escrito» se usa para כְּתָבָהּ/כְּתָבָם porque el hebreo puede abarcar tanto la forma escrita como el documento mismo; aquí el contexto favorece esa amplitud.
