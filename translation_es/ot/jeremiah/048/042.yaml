    issue: «como pueblo» suena poco natural en español en esta construcción
    rationale: Aunque reproduce de cerca «as a people», en español bíblico moderno «será destruido como pueblo» resulta más rígido. «Como nación» expresa con mayor naturalidad la desaparición de Moab como entidad nacional distinta, que es justamente el valor de מֵעָם según la documentación.
  - severity: low
    issue: Formato defectuoso de la nota al pie
    rationale: 'La nota empieza con una comilla simple innecesaria: ''O: «porque…». Debe normalizarse a «O: …» o «O bien: …» para buena presentación editorial.'
