translation:
  language: es
  text: 'Entonces Abraham se postró sobre su rostro y se rió, y dijo en su corazón: «¿Le nacerá un niño[a] a un hombre de cien años? ¿Y Sara, que tiene noventa años, dará a luz?»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «¿Le nacerá un hijo a un hombre de cien años?». El hebreo usa aquí lenguaje de «hijo/niño».
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּפֹּל
  english_pob_choice: fell
  chosen_spanish: se postró
  alternatives_spanish:
  - cayó
  - se arrojó al suelo
  lexicon: HALOT
  rationale: El hebreo expresa una caída con postura de humillación/prostración; en español, «se postró» comunica mejor ese gesto que un simple «cayó», y conserva el matiz reverente del contexto.
- source_word: עַל פָּנָיו
  english_pob_choice: on his face
  chosen_spanish: sobre su rostro
  alternatives_spanish:
  - de cara al suelo
  - postrado
  lexicon: HALOT
  rationale: La imagen hebrea es literal y se puede conservar en español. «Sobre su rostro» mantiene el paralelo formal con el original y su fuerza idiomática.
- source_word: וַיִּצְחָק
  english_pob_choice: laughed
  chosen_spanish: se rió
  alternatives_spanish:
  - rió
  - se echó a reír
  lexicon: HALOT
  rationale: El verbo צחק significa reír/lanzar una risa. «Se rió» es natural en español y no decide por sí mismo si la risa fue de incredulidad o de gozo.
- source_word: וַיֹּאמֶר בְּלִבּוֹ
  english_pob_choice: said in his heart
  chosen_spanish: dijo en su corazón
  alternatives_spanish:
  - pensó
  - se dijo a sí mismo
  lexicon: HALOT
  rationale: La expresión hebrea es idiomática y conviene conservarla. «Dijo en su corazón» es comprensible en español bíblico moderno y preserva el carácter interior e inaudible de lo que sigue.
- source_word: הַלְּבֶן
  english_pob_choice: Will a child be born
  chosen_spanish: ¿Le nacerá un hijo
  alternatives_spanish:
  - ¿Nacerá un hijo
  - ¿Le nacerá un niño
  lexicon: HALOT
  rationale: El hebreo usa lenguaje de בן, con posible sentido de «hijo» o, más ampliamente, «descendencia/niño». Aquí «un hijo» sigue de cerca la forma más marcada del original y encaja con la construcción impersonal de nacer.
- source_word: יִוָּלֵד
  english_pob_choice: be born
  chosen_spanish: nacerá
  alternatives_spanish:
  - será engendrado
  - nacerá un hijo
  lexicon: HALOT
  rationale: El nifal de ילד expresa nacimiento pasivo/intransitivo. «Nacerá» es la forma más natural y directa en español.
- source_word: מֵאָה שָׁנָה
  english_pob_choice: a hundred years old
  chosen_spanish: de cien años
  alternatives_spanish:
  - de edad de cien años
  - que tiene cien años
  lexicon: HALOT
  rationale: La expresión de edad se vierte de manera natural en español con «de cien años», sin perder el valor idiomático del hebreo.
- source_word: וְאִם
  english_pob_choice: And will
  chosen_spanish: ¿Y
  alternatives_spanish:
  - ¿Y si
  - ¿O
  lexicon: HALOT
  rationale: En la segunda pregunta retórica, el hebreo enlaza dos miembros coordinados. «¿Y» mantiene el paralelismo interrogativo sin introducir una condicional que desvíe el sentido.
- source_word: הֲבַת תִּשְׁעִים שָׁנָה
  english_pob_choice: who is ninety years old
  chosen_spanish: que tiene noventa años
  alternatives_spanish:
  - de noventa años
  - a sus noventa años
  lexicon: HALOT
  rationale: El hebreo usa una construcción idiomática de edad sin añadir un sustantivo como «mujer». «Que tiene noventa años» refleja la frase con naturalidad y evita sobretraducirla.
- source_word: תֵּלֵד
  english_pob_choice: give birth
  chosen_spanish: dará a luz
  alternatives_spanish:
  - parirá
  - tendrá un hijo
  lexicon: HALOT
  rationale: El qal de ילד con sujeto femenino se refiere a parir/dar a luz. «Dará a luz» es claro, actual y suficientemente fiel sin volverse coloquial.
theological_decisions:
- issue: La risa de Abraham
  english_pob_reading: Render the laughter neutrally as 'laughed' without importing either cynical unbelief or joyful faith into the translation itself.
  chosen_spanish_reading: Traducir la risa de Abraham de manera neutral como «se rió», sin añadir una interpretación de incredulidad o de gozo.
  alternative_spanish_readings:
  - se rió en disbelief
  - se rió con alegría
  - rió con incredulidad
  rationale: El verso narra el gesto y el discurso interior, pero no lo evalúa explícitamente. La traducción conserva esa tensión teológica en vez de resolverla interpretativamente.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: 'El texto sigue la revisión más reciente del audit trail: en la segunda pregunta se evita añadir un sustantivo como «mujer» y se conserva una formulación más pegada al hebreo («que tiene noventa años»). También se mantiene la neutralidad de la risa de Abraham, sin cargarla interpretativamente.'
  spanish_consistency_notes:
  - Se usa «Yahvé» como forma predeterminada del proyecto solo cuando aparezca el nombre divino; en este versículo no aparece.
  - Se mantiene «hijo» en la nota porque el hebreo usa בן; en el cuerpo se traduce de forma natural según el contexto de nacimiento.
  - «Se postró» y «sobre su rostro» preservan la duplicación hebrea de caída/prostración sin redundancia innecesaria en español.
  - La segunda pregunta conserva el paralelismo retórico con «¿Y Sara…?» en lugar de reescribirla como una condición o una afirmación.
