  chosen_korean: 이미 자기들의 상을 다 받았습니다
  alternatives_korean:
  - 자기 상을 다 받았습니다
  lexicon: BDAG
  rationale: ἀπέχω의 상업 용어적 함의(영수증을 떼다, 완납)를 살려 「이미…다 받았다」로 옮긴다.
