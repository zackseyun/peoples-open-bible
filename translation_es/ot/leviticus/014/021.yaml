translation:
  language: es
  text: Pero si es pobre y sus medios no le alcanzan[a], entonces tomará un cordero macho como ofrenda por la culpa, para ser presentado como ofrenda mecida, para hacer expiación por él; y una décima de efa de flor de harina, mezclada con aceite, para ofrenda vegetal, y un log[b] de aceite.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo literalmente: «su mano no alcanza»; es decir, carece de medios suficientes.'
    reason: lexical_alternative
  - marker: b
    text: Un «log» es una pequeña medida de líquido usada en la ley ritual de Israel.
    reason: cultural_note
lexical_decisions:
- source_word: דַּל
  english_pob_choice: poor
  chosen_spanish: pobre
  alternatives_spanish:
  - de escasos recursos
  - necesitado
  lexicon: HALOT
  rationale: En este contexto legal-ritual, דַּל describe condición económica. 'Pobre' es natural, directo y fiel al valor social del término.
- source_word: וְאֵין יָדוֹ מַשֶּׂגֶת
  english_pob_choice: his means are insufficient
  chosen_spanish: no le alcanzan los medios
  alternatives_spanish:
  - no puede alcanzar con su mano
  - no tiene suficientes recursos
  lexicon: HALOT
  rationale: La imagen literal de la 'mano' que no alcanza expresa incapacidad económica. En español, 'no le alcanzan los medios' preserva el sentido idiomático sin perder la referencia a insuficiencia material.
- source_word: כֶּבֶשׂ אֶחָד
  english_pob_choice: one male lamb
  chosen_spanish: un cordero macho
  alternatives_spanish:
  - un cordero
  - un macho de cordero
  lexicon: HALOT
  rationale: כֶּבֶשׂ especifica un cordero macho; 'cordero macho' mantiene la precisión léxica del original.
- source_word: אָשָׁם
  english_pob_choice: guilt offering
  chosen_spanish: ofrenda por la culpa
  alternatives_spanish:
  - ofrenda de culpa
  - ofrenda de expiación
  lexicon: HALOT
  rationale: Se conserva la categoría sacrificial sin imponer una tradición terminológica rígida. 'Por la culpa' comunica el vínculo con אָשָׁם y sigue siendo comprensible en español bíblico actual.
- source_word: לִתְנוּפָה
  english_pob_choice: to be waved
  chosen_spanish: para ser mecido
  alternatives_spanish:
  - para ser agitado
  - para ser ofrecido por mecimiento
  lexicon: HALOT
  rationale: La revisión inglesa muestra que el rito recae sobre la víctima/ofrenda, no como categoría separada. 'Para ser mecido' refleja el gesto ritual de la תְּנוּפָה con una formulación natural en español.
- source_word: לְכַפֵּר עָלָיו
  english_pob_choice: to make atonement for him
  chosen_spanish: para hacer expiación por él
  alternatives_spanish:
  - para hacer atonamiento por él
  - para efectuar expiación por él
  lexicon: HALOT
  rationale: '''Hacer expiación'' conserva la fuerza cultual de כפר y evita reducirlo a una sola teoría doctrinal. Es el equivalente más asentado y fiel en español bíblico.'
- source_word: וְעִשָּׂרוֹן סֹלֶת אֶחָד
  english_pob_choice: one-tenth of an ephah of fine flour
  chosen_spanish: una décima de efa de flor de harina
  alternatives_spanish:
  - una décima parte de efa de flor de harina
  - un décimo de efa de flor de harina
  lexicon: HALOT
  rationale: La medida se expresa de modo transparente y técnico. 'Flor de harina' es el equivalente tradicional y claro para סֹלֶת.
- source_word: בָּלוּל בַּשֶּׁמֶן
  english_pob_choice: mixed with oil
  chosen_spanish: mezclada con aceite
  alternatives_spanish:
  - mezclado con aceite
  - macerada con aceite
  lexicon: HALOT
  rationale: En español, el participio concuerda con 'flor de harina' y expresa bien la mezcla ritual. Se evita un tecnicismo innecesario.
- source_word: לְמִנְחָה
  english_pob_choice: for a grain offering
  chosen_spanish: para ofrenda vegetal
  alternatives_spanish:
  - para ofrenda de cereal
  - para oblación
  lexicon: HALOT
  rationale: Se mantiene la terminología POB de 'ofrenda vegetal' para מִנְחָה, preservando la decisión lexical auditada y su distancia de fórmulas eclesiásticas más tradicionales.
- source_word: לֹג שָׁמֶן
  english_pob_choice: one log of oil
  chosen_spanish: un log de aceite
  alternatives_spanish:
  - un log de aceite de oliva
  - una medida de aceite llamada log
  lexicon: HALOT
  rationale: Se conserva la unidad ritual 'log' como medida técnica, tal como en la base auditada, sin convertirla en una equivalencia moderna incierta.
theological_decisions:
- issue: Conservar categorías sacrificiales específicas sin simplificarlas
  english_pob_reading: Retain established cultic terms such as 'guilt offering' and 'make atonement' in the main text.
  chosen_spanish_reading: Mantener 'ofrenda por la culpa' y 'hacer expiación' en el texto principal.
  alternative_spanish_readings:
  - '''ofrenda de reparación'''
  - '''purificar por él'''
  rationale: El pasaje pertenece a instrucción levítica precisa; conservar la terminología cultual evita borrar la estructura sacrificial del rito y respeta la tensión teológica del texto.
  doctrine_reference: Levítico 14; filosofía de traducción POB §§1, 5, 6
- issue: Relación entre la víctima y el rito de תנופה
  english_pob_reading: The lamb is the guilt offering presented with a wave rite, not a separate wave offering.
  chosen_spanish_reading: El cordero es la ofrenda por la culpa y se presenta 'para ser mecido'.
  alternative_spanish_readings:
  - '''como ofrenda mecida'''
  - '''para mecerlo como ofrenda'''
  rationale: La construcción hebrea vincula el mecimiento al sacrificio mismo. La redacción española evita convertir el rito en una ofrenda distinta.
  doctrine_reference: Levítico 14:21; revisión auditada 2026-04-23
translation_notes:
  revision_awareness: 'La versión sigue la última revisión auditada del inglés POB: la víctima es un cordero macho ''para ser mecido'', no una ''wave offering'' separada. También conserva la medida técnica ''log'' y la terminología cultual estable de אָשָׁם, כפר y מִנְחָה.'
  spanish_consistency_notes:
  - Se usa 'Yahvé' no aplica en este versículo.
  - '''Ofrenda vegetal'' se conserva como término POB para מִנְחָה.'
  - '''Hacer expiación'' mantiene el paralelo con el inglés auditable y con el uso sacerdotal del texto.'
  - '''Log'' se deja sin equivalencia moderna para no perder la medida ritual precisa.'
