translation:
  language: es
  text: Si hubiera abrigado iniquidad en mi corazón[a], el Señor no me habría escuchado.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Si hubiera considerado iniquidad en mi corazón, el Señor no me habría oído».'
    reason: lexical_alternative
lexical_decisions:
- source_word: אָוֶן
  english_pob_choice: iniquity
  chosen_spanish: iniquidad
  alternatives_spanish:
  - maldad
  - mal
  - injusticia
  lexicon: HALOT
  rationale: En contexto moral y cultual, אָוֶן señala maldad o culpa que estorba la oración. «Iniquidad» conserva con precisión ese valor ético y suena natural en español bíblico contemporáneo.
- source_word: אִם
  english_pob_choice: if
  chosen_spanish: si
  alternatives_spanish:
  - si acaso
  - cuando
  lexicon: HALOT
  rationale: La partícula introduce una condición real o hipotética; «si» reproduce de manera directa y clara la estructura del hebreo.
- source_word: רָאִיתִי
  english_pob_choice: had cherished
  chosen_spanish: hubiera yo guardado
  alternatives_spanish:
  - hubiera yo visto
  - hubiera yo considerado
  - hubiera yo mirado con agrado
  lexicon: HALOT
  rationale: El hebreo literalmente dice «ver», pero en la expresión idiomática con «en el corazón» comunica dar cabida interior a algo. «Hubiera yo guardado» expresa esa idea de retener o albergar en el interior sin perder el matiz de deliberación moral.
- source_word: בְלִבִּי
  english_pob_choice: in my heart
  chosen_spanish: en mi corazón
  alternatives_spanish:
  - dentro de mí
  - en mi interior
  lexicon: HALOT
  rationale: «Corazón» es el equivalente habitual de לֵב en español bíblico y conserva la referencia al centro interior de pensamiento y voluntad.
- source_word: לֹא יִשְׁמַע
  english_pob_choice: would not have listened
  chosen_spanish: no me habría escuchado
  alternatives_spanish:
  - no habría oído
  - no me habría atendido
  - no habría respondido
  lexicon: HALOT
  rationale: En contexto de oración, שׁמע implica oír favorablemente. «Escuchado» comunica la recepción atenta y relacional que el verso niega, sin adelantar explícitamente «respondido».
- source_word: אֲדֹנָי
  english_pob_choice: the Lord
  chosen_spanish: el Señor
  alternatives_spanish:
  - el Señor Yahvé
  - mi Señor
  lexicon: HALOT
  rationale: Aunque la política general de la obra favorece «Yahvé» para el nombre divino, aquí el hebreo trae אֲדֹנָי como título reverencial fijo. En español, «el Señor» mantiene ese valor titular y reproduce con naturalidad la función del término en la oración.
theological_decisions:
- issue: Cómo reflejar el valor idiomático de «ver iniquidad en el corazón»
  english_pob_reading: Interpret the idiom as inwardly cherishing or regarding sin
  chosen_spanish_reading: Interpretar la expresión como haber dado cabida interior a la iniquidad
  alternative_spanish_readings:
  - si hubiera yo visto iniquidad en mi corazón
  - si hubiera yo considerado iniquidad en mi corazón
  rationale: El verso no trata de mera percepción visual, sino de una disposición interior que tolera el mal. «Hubiera yo guardado» preserva la fuerza moral del hebreo sin caer en una traducción mecánica.
  doctrine_reference: Translation philosophy §1, §3, §6
- issue: Cómo traducir לֹא יִשְׁמַע en un contexto de oración
  english_pob_reading: the Lord would not have listened
  chosen_spanish_reading: el Señor no me habría escuchado
  alternative_spanish_readings:
  - el Señor no habría oído
  - el Señor no me habría atendido
  - el Señor no habría respondido
  rationale: El hebreo expresa que Yahvé no recibiría favorablemente la oración. «Escuchado» conserva esa relación de audiencia favorable sin convertirlo en una afirmación más fuerte de respuesta explícita.
  doctrine_reference: Translation philosophy §6
translation_notes:
  revision_awareness: El contexto textual y la revisión automática muestran alto acuerdo y no requieren cambios adicionales; la redacción sigue de cerca el hebreo y el audit trail inglés, preservando la ambigüedad idiomática principal mediante una nota alternativa.
  spanish_consistency_notes:
  - Se mantiene «el Señor» como título reverencial para אֲדֹנָי, en armonía con su función fija en el hebreo.
  - Se usa «corazón» para בְלִבִּי, conservando la antropología bíblica del centro interior de pensamiento y voluntad.
  - «Escuchado» se eligió por su naturalidad en español, sin cerrar la alternativa semántica con «oído» que la nota preserva.
  - La construcción condicional en pluscuamperfecto de subjuntivo refleja bien la apódosis hipotética del hebreo y el valor de la traducción inglesa.
