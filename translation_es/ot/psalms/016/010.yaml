translation:
  language: es
  text: Porque no abandonarás mi alma al Seol[b], ni permitirás que tu fiel[a] vea la fosa.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «tu santo». El hebreo puede denotar a uno que es fiel, leal, piadoso o santo.
    reason: lexical_alternative
  - marker: b
    text: O «corrupción». La Septuaginta y la cita neotestamentaria de este versículo usan una formulación que enfatiza la corrupción o la descomposición.
    reason: alternative_reading
lexical_decisions:
- source_word: כִּי
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Ya que
  lexicon: HALOT
  rationale: Introduce la base o razón del enunciado precedente; «porque» expresa bien esa relación causal en español y mantiene el tono poético.
- source_word: תַעֲזֹב
  english_pob_choice: will not abandon
  chosen_spanish: no abandonarás
  alternatives_spanish:
  - no dejarás
  - no forsacarás
  lexicon: HALOT
  rationale: עָזַב suele significar dejar, abandonar o forsacar. «Abandonarás» conserva la fuerza de no entregar a la persona al dominio de la muerte sin sonar arcaico.
- source_word: נַפְשִׁי
  english_pob_choice: my soul
  chosen_spanish: mi alma
  alternatives_spanish:
  - mi vida
  - a mí
  lexicon: HALOT
  rationale: נֶפֶשׁ puede significar alma, vida o persona. «Mi alma» preserva la forma hebrea y la correspondencia poética con la segunda línea, dejando implícito el sentido ampliado de vida/persona.
- source_word: לִשְׁאוֹל
  english_pob_choice: to Sheol
  chosen_spanish: en el Seol
  alternatives_spanish:
  - al Seol
  - en el reino de los muertos
  - en la tumba
  lexicon: HALOT
  rationale: Se conserva el término técnico hebreo «Seol» para no diluir el concepto del mundo de los muertos en «tumba» o una perífrasis más general. La preposición «en» comunica bien el ámbito al que no será entregada el alma.
- source_word: תִתֵּן
  english_pob_choice: will you let
  chosen_spanish: permitirás
  alternatives_spanish:
  - dejarás
  - harás que
  lexicon: HALOT
  rationale: Con infinitivo, נתן puede funcionar idiomáticamente como «permitir/dejar». «Permitirás» expresa con naturalidad esa idea de no conceder que ocurra la acción.
- source_word: חֲסִידְךָ
  english_pob_choice: your faithful one
  chosen_spanish: tu fiel
  alternatives_spanish:
  - tu santo
  - tu piadoso
  - tu leal
  lexicon: HALOT
  rationale: חָסִיד designa a quien es leal, piadoso o fiel por pacto. «Tu fiel» es una solución breve y precisa que preserva la tensión lexical sin importar de entrada la formulación cristológica tradicional de «tu santo».
- source_word: לִרְאוֹת
  english_pob_choice: see
  chosen_spanish: vea
  alternatives_spanish:
  - ver
  - conocer
  lexicon: HALOT
  rationale: El infinitivo לראות se expresa de manera natural en español con la subordinada final «vea», manteniendo el sentido directo de «ver».
- source_word: שָׁחַת
  english_pob_choice: the pit
  chosen_spanish: el pozo
  alternatives_spanish:
  - la fosa
  - la corrupción
  - la tumba
  lexicon: HALOT
  rationale: שַׁחַת puede significar pozo/fosa, destrucción o corrupción según el contexto. «El pozo» mantiene un referente concreto y poético para el ámbito de la muerte; la alternativa «corrupción» queda atestiguada en la nota por la tradición de la Septuaginta y la cita neotestamentaria.
theological_decisions:
- issue: Relación entre el sentido hebreo inmediato y la recepción mesiánica posterior
  english_pob_reading: Translate according to the Hebrew psalm's immediate lexical sense without importing explicit messianic interpretation into the main text.
  chosen_spanish_reading: Traducir según el sentido inmediato del hebreo, sin cargar la línea principal con una lectura mesiánica explícita.
  alternative_spanish_readings:
  - «tu Santo» en lugar de «tu fiel»
  - «corrupción» en lugar de «pozo»
  rationale: La versión principal debe reflejar el texto hebreo tal como está, preservando la tensión histórica que permite tanto la lectura poética original como su uso posterior en el Nuevo Testamento. Las opciones tradicionalmente cristológicas quedan mejor como alternativas documentadas, no como texto principal.
  doctrine_reference: Translation philosophy §1, §3
- issue: Valor teológico de חֲסִידְךָ
  english_pob_reading: your faithful one / Or 'your holy one.' The Hebrew can denote one who is faithful, loyal, godly, or holy.
  chosen_spanish_reading: tu fiel
  alternative_spanish_readings:
  - tu santo
  - tu piadoso
  - tu leal
  rationale: «Fiel» conserva la amplitud semántica de la raíz sin cerrar prematuramente la posibilidad de una aplicación posterior a un justo por excelencia. «Santo» se reserva como alternativa documentada porque puede sonar más técnica o mesiánicamente cargada de lo que exige el hebreo inmediato.
  doctrine_reference: Translation philosophy §2, §3
- issue: Valor de שָׁחַת y su eco en la Septuaginta/Hechos
  english_pob_reading: the pit / Or 'corruption.' The Septuagint and the New Testament citation of this verse use wording that emphasizes corruption/decay.
  chosen_spanish_reading: el pozo
  alternative_spanish_readings:
  - la corrupción
  - la fosa
  - la tumba
  rationale: «Pozo» conserva el sentido léxico concreto y poético del hebreo, mientras que «corrupción» refleja la tradición interpretativa griega y apostólica. Mantener ambas posibilidades documenta la tensión sin resolverla artificialmente en el texto principal.
  doctrine_reference: Translation philosophy §1, §4
translation_notes:
  revision_awareness: 'Concordancia alta con la auditoría inglesa: se mantuvo el sentido léxico inmediato del hebreo, se preservó la tensión entre «fiel/santo» y «pozo/corrupción», y no se introdujo una interpretación mesiánica explícita en la línea principal. No hubo revisiones aplicadas en el paquete de origen.'
  spanish_consistency_notes:
  - Se conservó «Seol» como transliteración estable para el mundo de los muertos, en lugar de sustituirlo por una glosa interpretativa.
  - Se evitó «SEÑOR» porque el hebreo aquí no contiene el tetragrámaton; el versículo se dirige directamente a Dios mediante el pronombre «tú».
  - Se eligió «alma» para נַפְשִׁי por fidelidad al paralelismo poético y para mantener la amplitud semántica de נפש en español.
  - «Tu fiel» equilibra naturalidad y precisión; la alternativa «tu santo» queda documentada en nota para preservar la tensión lexical y teológica.
  - «El pozo» es una traducción poética y concreta de שַׁחַת; la alternativa «corrupción» queda señalada por su peso en la recepción textual posterior.
