translation:
  language: es
  text: Aunque el mal es dulce en su boca[a], lo esconde debajo de su lengua.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Si el mal es dulce en su boca». El hebreo permite una lectura condicional o concesiva; el contexto favorece la concesiva.'
    reason: lexical_alternative
lexical_decisions:
- source_word: אִם
  english_pob_choice: Though
  chosen_spanish: Aunque
  alternatives_spanish:
  - Si
  lexicon: HALOT
  rationale: El hebreo puede leerse de modo concesivo o condicional; aquí, como en el audit trail inglés, el contexto favorece una relación concesiva. «Aunque» comunica esa fuerza con naturalidad en español.
- source_word: תַּמְתִּיק
  english_pob_choice: is sweet
  chosen_spanish: le es dulce
  alternatives_spanish:
  - endulza
  - es dulce
  - tiene sabor dulce
  lexicon: HALOT
  rationale: La forma causativa hebrea puede expresar aquí un valor estativo/idiomático. En español, «le es dulce» conserva la imagen gustativa sin volverla torpe ni demasiado interpretativa.
- source_word: בְּפִיו
  english_pob_choice: in his mouth
  chosen_spanish: en la boca
  alternatives_spanish:
  - en su boca
  - en su paladar
  lexicon: HALOT
  rationale: Se mantiene la metáfora concreta de la boca como lugar donde el mal resulta agradable. «Le» ayuda a reflejar el sentido idiomático del hebreo sin perder literalidad.
- source_word: רָעָה
  english_pob_choice: evil
  chosen_spanish: el mal
  alternatives_spanish:
  - la maldad
  - la perversidad
  - el malvado
  lexicon: HALOT
  rationale: En este contexto sapiencial, el sustantivo denota mal moral. «El mal» es la opción más directa y amplia en español.
- source_word: יַכְחִידֶנָּה
  english_pob_choice: he hides it
  chosen_spanish: lo esconde
  alternatives_spanish:
  - lo oculta
  - lo mantiene oculto
  lexicon: HALOT
  rationale: El verbo expresa ocultar/concealir. «Lo esconde» es natural en español y conserva la acción concreta de guardar el mal bajo la lengua.
- source_word: תַּחַת
  english_pob_choice: under
  chosen_spanish: debajo de
  alternatives_spanish:
  - bajo
  - sub
  lexicon: HALOT
  rationale: La preposición es espacial y forma parte de la imagen del escondite. «Debajo de» reproduce el movimiento figurado con claridad.
- source_word: לְשׁוֹנוֹ
  english_pob_choice: his tongue
  chosen_spanish: su lengua
  alternatives_spanish:
  - la lengua de él
  - su boca
  lexicon: HALOT
  rationale: «Lengua» conserva el paralelismo con «boca» y mantiene la imagen idiomática del hebreo de guardar algo oculto bajo la lengua.
translation_notes:
  revision_awareness: El borrador sigue el sentido concesivo preferido en el audit trail inglés y conserva la imagen corporal de boca/lengua sin suavizarla. No se introdujeron revisiones textuales adicionales.
  spanish_consistency_notes:
  - Se mantuvo «mal» para רָעָה conforme al valor moral del contexto.
  - Se prefirió «lengua» en lugar de una paráfrasis más libre para conservar la metáfora hebrea.
  - La nota al pie preserva la alternativa condicional documentada por el POB inglés.
