translation:
  language: es
  text: Cántico de ascenso. Cuando Yahvé restauró la suerte de Sion[a], fuimos como quienes sueñan.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O “trajo de vuelta a los cautivos de Sion” o “restauró la cautividad de Sion”. La expresión hebrea puede referirse específicamente al regreso del exilio o, más ampliamente, a la restauración de la suerte de Sion.
    reason: alternative_reading
lexical_decisions:
- source_word: שִׁיר הַמַּעֲלוֹת
  english_pob_choice: A Song of Ascents
  chosen_spanish: Cántico de las Ascensiones
  alternatives_spanish:
  - Un canto de las subidas
  - Un cántico de peregrinación
  lexicon: HALOT
  rationale: Conserva el título tradicional del encabezado poético y refleja de manera bastante literal מַעֲלוֹת como 'Ascensiones'. 'Peregrinación' interpreta el sentido histórico pero pierde la correspondencia léxica del título.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: Sigue el criterio del proyecto para el nombre divino, preservando el Tetragrámaton en español como 'Yahvé'. Evita la sustitución litúrgica por 'SEÑOR' sin base textual en este pasaje.
- source_word: בְּשׁוּב
  english_pob_choice: When ... restored
  chosen_spanish: Cuando ... restauró
  alternatives_spanish:
  - Cuando ... volvió
  - Al restaurar
  lexicon: HALOT
  rationale: La construcción con ב + infinitivo funciona temporalmente; 'Cuando' expresa bien esa relación. 'Restauró' comunica el valor de retorno/restablecimiento que el verbo puede tener en este contexto.
- source_word: שִׁיבַת צִיּוֹן
  english_pob_choice: the fortunes of Zion
  chosen_spanish: la fortuna de Sion
  alternatives_spanish:
  - la cautividad de Sion
  - los cautivos de Sion
  - el retorno de Sion
  lexicon: HALOT
  rationale: En español, 'fortuna' reproduce de forma idiomática el matiz de 'fortunes' y mantiene la amplitud semántica de la expresión hebrea, que puede referirse tanto a prosperidad/restablecimiento como a regreso del exilio. Se evita estrecharla solo a 'cautividad' en el cuerpo del texto.
- source_word: הָיִינוּ
  english_pob_choice: we were
  chosen_spanish: éramos
  alternatives_spanish:
  - fuimos
  - estábamos
  lexicon: HALOT
  rationale: El perfecto de היה aquí se vierte naturalmente con imperfecto de estado en español ('éramos'), que suena más idiomático en la comparación y conserva el carácter descriptivo del hebreo.
- source_word: כְּחֹלְמִים
  english_pob_choice: like those who dream
  chosen_spanish: como los que sueñan
  alternatives_spanish:
  - como soñadores
  - como quienes sueñan
  lexicon: HALOT
  rationale: '''Los que sueñan'' mantiene la imagen participial de personas en acto de soñar y suena natural en español. Se prefiere sobre ''soñadores'' por ser más transparente y menos nominalizado.'
theological_decisions:
- issue: Traducción del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: La pauta del proyecto exige preservar el nombre propio divino y no esconderlo tras un título. 'Yahvé' es la forma española estándar del nombre revelado, coherente con el auditorio eclesial amplio y con la política del POB.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Alcance de שִׁיבַת צִיּוֹן
  english_pob_reading: restored the fortunes of Zion
  chosen_spanish_reading: restauró la fortuna de Sion
  alternative_spanish_readings:
  - trajo de vuelta a los cautivos de Sion
  - restauró la cautividad de Sion
  rationale: La frase hebrea puede aludir a la restitución de la suerte/bienestar de Sion o específicamente al regreso del exilio. El cuerpo principal conserva esa amplitud con 'fortuna', y la nota preserva la lectura alternativa sin resolver la tensión interpretativa.
  doctrine_reference: 'DOCTRINE.md Translation philosophy §3: Preserve theological tension rather than resolve it'
translation_notes:
  revision_awareness: La revisión más reciente no introdujo cambios; el cotejo final mostró alta concordancia y ninguna objeción textual. La presente propuesta mantiene esa lectura estable, con una elección española idiomática que conserva la tensión semántica documentada en el audit trail inglés.
  spanish_consistency_notes:
  - Se mantiene Yahvé como forma del nombre divino, conforme al criterio del proyecto.
  - Se conserva el título poético con 'Ascensiones' para reflejar la colección de salmos.
  - '''Sion'' se escribe sin tilde por uso bíblico estable en español.'
  - La nota al pie preserva la alternativa exílica sin sustituir el sentido principal del cuerpo del texto.
