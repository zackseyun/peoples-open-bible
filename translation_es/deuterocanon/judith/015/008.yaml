translation:
  language: es
  text: Y Joakim, el sumo sacerdote, y el consejo de los hijos de Israel[a], que habitaban en Jerusalén, vinieron a ver las cosas buenas que Yahvé había hecho para Israel, y a ver a Judit y hablar con ella en paz[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'los israelitas'. El griego dice literalmente 'los hijos de Israel', designación tradicional del pueblo en sentido pactual.
    reason: lexical_alternative
  - marker: b
    text: Literalmente 'hablar paz con ella', es decir, hablar con ella en paz o expresarle felicitaciones pacíficas.
    reason: lexical_alternative
lexical_decisions:
- source_word: Ἰωακειὶμ
  english_pob_choice: Joakim
  chosen_spanish: Joakim
  alternatives_spanish:
  - Joaquim
  - Joiakim
  lexicon: Transliteración del nombre propio según la forma griega del texto base.
  rationale: Se conserva la forma propia del nombre sin traducirlo; 'Joakim' refleja de cerca la grafía griega y coincide con la práctica del POB inglés.
- source_word: ὁ ἱερεὺς ὁ μέγας
  english_pob_choice: the high priest
  chosen_spanish: el sumo sacerdote
  alternatives_spanish:
  - el gran sacerdote
  lexicon: Uso estable en español bíblico para el cargo sacerdotal supremo.
  rationale: '''Sumo sacerdote'' comunica con naturalidad el oficio jerárquico que el griego designa; ''gran sacerdote'' sería más literal pero menos idiomático en español.'
- source_word: ἡ γερουσία
  english_pob_choice: the council
  chosen_spanish: el consejo
  alternatives_spanish:
  - la asamblea de ancianos
  - el senado
  lexicon: LSJ
  rationale: '''Consejo'' expresa bien un cuerpo gobernante de ancianos sin cargar el texto con un término demasiado romano como ''senado''.'
- source_word: τῶν υἱῶν Ἰσραήλ
  english_pob_choice: of the sons of Israel
  chosen_spanish: de los hijos de Israel
  alternatives_spanish:
  - de Israel
  - de los israelitas
  lexicon: Expresión covenantal/étnica tradicional preservada de modo literal.
  rationale: Se conserva la designación masculina/corporativa del griego, tal como lo hace el POB inglés, por fidelidad al enunciado tradicional del pueblo.
- source_word: οἱ κατοικοῦντες ἐν Ἰερουσαλήμ
  english_pob_choice: who dwelt in Jerusalem
  chosen_spanish: que habitaban en Jerusalén
  alternatives_spanish:
  - que moraban en Jerusalén
  - residentes en Jerusalén
  lexicon: LSJ
  rationale: El participio se vierte como una cláusula relativa natural en español; 'habitaban' mantiene un registro formal y claro equivalente a 'dwelt'.
- source_word: τὰ ἀγαθὰ
  english_pob_choice: the good things
  chosen_spanish: las cosas buenas
  alternatives_spanish:
  - los bienes
  - las buenas obras
  - las bendiciones
  lexicon: LSJ
  rationale: Se mantiene la amplitud semántica del griego sin especificar indebidamente si se trata de bienes, beneficios o acciones benéficas.
- source_word: Κύριος
  english_pob_choice: the Lord
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el Señor
  lexicon: 'DOCTRINE.md contested terms: κύριος → Yahvé cuando el referente es el nombre divino.'
  rationale: Aquí el griego habla de la acción divina sobre Israel; en español se sigue la convención del proyecto de usar 'Yahvé' para el nombre divino, en vez de enmascararlo con 'Señor'.
- source_word: τοῦ ἰδεῖν τὴν Ἰουδεὶθ
  english_pob_choice: to see Judith
  chosen_spanish: a ver a Judit
  alternatives_spanish:
  - para ver a Judit
  - para encontrarse con Judit
  lexicon: Nombre propio y construcción final de infinitivo.
  rationale: La preposición 'a' con objeto animado es natural en español; se conserva el sentido de propósito del infinitivo griego.
- source_word: λαλῆσαι μετʼ αὐτῆς εἰρήνην
  english_pob_choice: speak peaceably with her
  chosen_spanish: hablar con ella en paz
  alternatives_spanish:
  - hablarle pacíficamente
  - decirle palabras de paz
  - saludarla en paz
  lexicon: LSJ
  rationale: Se retiene la expresión semítica 'hablar ... en paz' para no perder la fuerza idiomática de 'hablar paz con ella', pero se formula en español claro y natural.
theological_decisions:
- issue: Traducción del nombre divino Κύριος
  english_pob_reading: the Lord
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el Señor
  rationale: Siguiendo la norma del proyecto, cuando κύριος se refiere al Dios de Israel en un contexto narrativo directo, se explicita el nombre divino en español como 'Yahvé', evitando el cifrado litúrgico 'Señor'.
  doctrine_reference: 'DOCTRINE.md Contested terms: κύριος → Yahvé'
- issue: Designación étnico-covenantal τῶν υἱῶν Ἰσραήλ
  english_pob_reading: of the sons of Israel
  chosen_spanish_reading: de los hijos de Israel
  alternative_spanish_readings:
  - de Israel
  - de los israelitas
  rationale: Se preserva la formulación masculina/corporativa del texto griego, porque funciona como designación tradicional del pueblo pactal y no simplemente como marca de varones literales.
  doctrine_reference: DOCTRINE.md §4 Gender-accurate over gender-neutral
translation_notes:
  revision_awareness: Se siguió la lectura final del audit trail inglés ('dwelt' / 'speak peaceably with her') para un registro más formal, pero se tradujo con español natural. Se evitó suavizar el nombre divino con 'Señor' para mantener la política del proyecto con respecto a Κύριος en este contexto narrativo. También se conservó la expresión pactual 'hijos de Israel' por fidelidad al griego y al POB inglés.
  spanish_consistency_notes:
  - Se usa 'Yahvé' para Κύριος en contextos donde el referente es el Dios de Israel.
  - '''sumo sacerdote'' se prefiere a calcos menos idiomáticos.'
  - '''de los hijos de Israel'' mantiene la designación corporativa masculina del texto base.'
  - '''hablar con ella en paz'' conserva la imagen semítica sin perder claridad en español.'
