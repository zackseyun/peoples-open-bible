  text: שָׁמְנ֣וּ עָשְׁת֗וּ גַּ֚ם עָֽבְר֣וּ דִבְרֵי רָ֔ע דִּ֣ין לֹא דָ֔נוּ דִּ֥ין יָת֖וֹם וְ/יַצְלִ֑יחוּ וּ/מִשְׁפַּ֥ט אֶבְיוֹנִ֖ים לֹ֥א שָׁפָֽטוּ־־׃
base_translation:
  language: en
  yaml_path: translation/ot/jeremiah/005/028.yaml
  text: They have grown fat[a]; they are sleek. They also have gone beyond evil deeds. They do not judge with justice the case of the fatherless, that they may prosper[c][b], and they do not uphold the justice of the poor.
  footnotes:
  - marker: a
    text: Or 'They have even surpassed evil matters/deeds'; Hebrew literally, 'they have gone beyond words of evil.'
    reason: lexical_alternative
  - marker: b
    text: The clause 'so that they might prosper' is difficult. It may also be understood as 'yet they prosper' or 'though they prosper.'
    reason: alternative_reading
  - marker: c
    text: '''Fatherless'' may also be rendered ''orphan.'''
    reason: lexical_alternative
  ai_draft:
