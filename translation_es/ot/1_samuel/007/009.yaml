translation:
  language: es
  text: Entonces Samuel tomó un cordero lechal[a] y lo ofreció como holocausto entero a Yahvé. Y Samuel clamó a Yahvé en favor de Israel, y Yahvé le respondió.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «un cordero que aún mama». La expresión hebrea se refiere a un cordero todavía alimentado con leche.
    reason: lexical_alternative
lexical_decisions:
- source_word: טְלֵה חָלָב אֶחָד
  english_pob_choice: one nursing lamb
  chosen_spanish: un cordero lechal
  alternatives_spanish:
  - un cordero mamando
  - un cordero de leche
  - un cordero que aún mama
  lexicon: HALOT
  rationale: טְלֶה designa un cordero joven, y חָלָב indica la relación con la leche; en español, "lechal" expresa de forma natural que es un cordero todavía alimentado con leche, preservando la idea de juventud y dependencia materna.
- source_word: וַיַּעֲלֵה
  english_pob_choice: offered it
  chosen_spanish: lo ofreció
  alternatives_spanish:
  - lo ofreció en holocausto
  - lo presentó como ofrenda
  lexicon: HALOT
  rationale: El verbo hifil de עלה es el verbo sacrificial normal para ofrecer un sacrificio. En español, "lo ofreció" es formal y suficiente aquí; el contexto de "holocausto" ya aclara la acción cultual.
- source_word: עוֹלָה
  english_pob_choice: burnt offering
  chosen_spanish: holocausto
  alternatives_spanish:
  - ofrenda quemada
  - ofrenda totalmente consumida
  lexicon: HALOT
  rationale: עוֹלָה es el término sacrificial establecido para el sacrificio totalmente consumido por el fuego. "Holocausto" es el equivalente bíblico tradicional y claro en español; se evita "ofrenda ascendiente" por artificial.
- source_word: כָּלִיל
  english_pob_choice: whole
  chosen_spanish: completo
  alternatives_spanish:
  - entero
  - total
  lexicon: HALOT
  rationale: 'כָּלִיל indica que la ofrenda fue presentada íntegramente. En español, "completo" transmite bien esa totalidad en una construcción natural: "holocausto completo".'
- source_word: לַֽ/יהוָה
  english_pob_choice: to Yahweh
  chosen_spanish: a Yahvé
  alternatives_spanish:
  - para Yahvé
  - a Yavé
  lexicon: HALOT
  rationale: 'Se sigue el criterio del proyecto para יהוה: "Yahvé". La preposición de destinatario sacrificial en español se expresa de forma natural con "a".'
- source_word: וַ/יִּזְעַ֨ק
  english_pob_choice: cried out
  chosen_spanish: clamó
  alternatives_spanish:
  - gritó
  - clamó con fuerza
  lexicon: HALOT
  rationale: זעק expresa un clamor urgente de súplica. "Clamó" conserva la intensidad sin sonar coloquial ni diluirse en "oró".
- source_word: בְּעַ֣ד יִשְׂרָאֵ֔ל
  english_pob_choice: on behalf of Israel
  chosen_spanish: en favor de Israel
  alternatives_spanish:
  - por Israel
  - a favor de Israel
  lexicon: HALOT
  rationale: בְּעַד aquí indica intercesión o representación. "En favor de Israel" comunica bien esa mediación sin imponer un matiz más técnico que el hebreo.
- source_word: וַֽ/יַּעֲנֵ֖/הוּ יְהוָֽה
  english_pob_choice: Yahweh answered him
  chosen_spanish: Yahvé le respondió
  alternatives_spanish:
  - Yahvé lo respondió
  - Yahvé respondió a Samuel
  lexicon: HALOT
  rationale: El sufijo pronominal señala que Samuel es quien recibe la respuesta. "Le respondió" es la forma española natural y mantiene la referencia personal.
theological_decisions:
- issue: Renderización del nombre divino יהוה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - Jehová
  rationale: El texto hebreo usa directamente el Tetragrámaton. Conforme a la política del proyecto, se conserva el nombre divino con la forma española "Yahvé" en vez de ocultarlo con un sustituto litúrgico.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יהוה YHWH → Yahvé'
- issue: Naturaleza del gesto sacrificial
  english_pob_reading: whole burnt offering
  chosen_spanish_reading: holocausto completo
  alternative_spanish_readings:
  - holocausto total
  - ofrenda totalmente quemada
  rationale: עוֹלָה con כָּלִיל subraya una ofrenda enteramente consumida. "Holocausto completo" mantiene el término sacrificial tradicional y explicita la totalidad indicada por el adjetivo hebreo.
  doctrine_reference: HALOT, עוֹלָה + כָּלִיל
- issue: Carácter intercesor de la frase בְּעַד יִשְׂרָאֵל
  english_pob_reading: on behalf of Israel
  chosen_spanish_reading: en favor de Israel
  alternative_spanish_readings:
  - por Israel
  - en representación de Israel
  rationale: El hebreo señala una acción de intercesión/representación, no solo una referencia temática a Israel. "En favor de Israel" preserva ese valor sin sobredeterminarlo doctrinalmente.
  doctrine_reference: HALOT, בְּעַד
translation_notes:
  revision_awareness: 'La redacción sigue el acuerdo alto del audit trail inglés y refleja la revisión más reciente: se evitó un giro redundante tipo "lo ofreció en holocausto" como base principal, pero se preservó el sentido sacrificial pleno de עוֹלָה con una formulación natural en español. También se respetó la decisión actual del proyecto de traducir יהוה como Yahvé, no como SEÑOR.'
  spanish_consistency_notes:
  - Se mantuvo el nombre divino "Yahvé" de manera consistente con el estándar del proyecto para יהוה.
  - '"Holocausto" se usa como término sacrificial técnico y no en sentido moderno no bíblico.'
  - '"Clamó" conserva el valor de súplica urgente de זעק sin suavizarlo a "oró".'
  - '"En favor de Israel" preserva el matiz intercesor de בְּעַד.'
  - El marcador de nota [a] aparece en el sustantivo principal para documentar la alternativa léxica de טְלֵה חָלָב.
