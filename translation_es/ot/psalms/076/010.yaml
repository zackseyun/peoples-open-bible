translation:
  language: es
  text: cuando Dios se levanta para juicio, para salvar a todos los humildes[a] de la tierra[b]. Selah
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: “los mansos” o “los afligidos”.'
    reason: lexical_alternative
  - marker: b
    text: 'O: “el país”.'
    reason: lexical_alternative
lexical_decisions:
- source_word: בְּ/קוּם
  english_pob_choice: when God rises
  chosen_spanish: cuando Dios se levanta
  alternatives_spanish:
  - al levantarse Dios
  - cuando Dios se alza
  lexicon: HALOT
  rationale: El infinitivo constructo con ב tiene valor temporal aquí. En español, “cuando Dios se levanta” comunica de manera natural y fiel la acción divina en curso, sin perder el matiz poético del hebreo.
- source_word: לַ/מִּשְׁפָּט
  english_pob_choice: for judgment
  chosen_spanish: para juicio
  alternatives_spanish:
  - para justicia
  - para sentencia
  lexicon: HALOT
  rationale: מִשְׁפָּט puede ser “juicio” o “justicia”. Dado el contexto judicial del verso, “juicio” conserva el sentido forense sin cerrar indebidamente la amplitud semántica.
- source_word: אֱלֹהִים
  english_pob_choice: God
  chosen_spanish: Dios
  alternatives_spanish:
  - el Dios
  lexicon: HALOT
  rationale: La forma plural con referencia singular se traduce de manera directa como “Dios”, que es el equivalente normal y claro en español.
- source_word: לְ/הוֹשִׁיעַ
  english_pob_choice: to save
  chosen_spanish: para salvar
  alternatives_spanish:
  - para rescatar
  - para librar
  lexicon: HALOT
  rationale: El infinitivo hifil de ישׁע admite “salvar” o “librar”. “Para salvar” es la opción más directa y natural en español, manteniendo la amplitud de rescate implícita.
- source_word: כָּל
  english_pob_choice: all
  chosen_spanish: todos
  alternatives_spanish:
  - todo
  lexicon: HALOT
  rationale: כָּל con un sustantivo en plural constructo se expresa naturalmente como “todos”, en sentido colectivo.
- source_word: עַנְוֵי
  english_pob_choice: the humble
  chosen_spanish: los humildes
  alternatives_spanish:
  - los mansos
  - los afligidos
  lexicon: HALOT
  rationale: עָנָו puede significar humilde, manso o afligido según el contexto. “Los humildes” preserva el matiz moral y espiritual que encaja bien en los Salmos, sin reducirlo solo a sufrimiento social.
- source_word: אֶרֶץ
  english_pob_choice: the earth
  chosen_spanish: la tierra
  alternatives_spanish:
  - el país
  - el territorio
  lexicon: HALOT
  rationale: En poesía hebrea, אֶרֶץ puede ser “tierra” o “país”. Aquí “la tierra” expresa con naturalidad el alcance universal sugerido por el contexto y la construcción del verso.
- source_word: סֶלָה
  english_pob_choice: Selah
  chosen_spanish: Selah
  lexicon: HALOT
  rationale: Se mantiene la transliteración porque el valor exacto del término es incierto y probablemente funciona como indicación litúrgica o musical.
theological_decisions:
- issue: Nuance semántica de עַנְוֵי
  english_pob_reading: the humble
  chosen_spanish_reading: los humildes
  alternative_spanish_readings:
  - los mansos
  - los afligidos
  rationale: La frase apunta a un grupo de baja condición ante Dios, y la traducción “los humildes” conserva tanto la dimensión ética como la social. Se preserva la tensión semántica mediante alternativas, en lugar de cerrar el sentido a una sola acepción.
  doctrine_reference: Preservar la tensión lexical sin resolverla dogmáticamente.
- issue: Valor de מִשְׁפָּט en contexto divino
  english_pob_reading: for judgment
  chosen_spanish_reading: para juicio
  alternative_spanish_readings:
  - para justicia
  - para sentencia
  rationale: En un contexto de intervención divina, “juicio” mantiene el aspecto forense y gubernativo del término. No se lo reduce a una abstracción ética de “justicia”, aunque esa posibilidad sigue presente en el hebreo.
  doctrine_reference: Juicio divino como acto real de gobierno y evaluación.
translation_notes:
  revision_awareness: 'Se revisó el texto para seguir de cerca el hebreo: el valor temporal de בְּקוּם se vertió con una construcción natural en español; מִשְׁפָּט se mantuvo como “juicio” para conservar el matiz judicial; עַנְוֵי se tradujo “los humildes” y se preservaron sus alternativas semánticas en nota; אֶרֶץ se resolvió como “la tierra” con nota alternativa. No hubo cambios textuales previos a incorporar.'
  spanish_consistency_notes:
  - Se usa “Dios” para אֱלֹהִים conforme al estándar del proyecto.
  - Se mantiene “Selah” sin traducir, por ser un marcador litúrgico/musical incierto.
  - La puntuación reproduce el ritmo poético del verso y conserva el corte fuerte antes de Selah.
  - No se emplea “SEÑOR” para el nombre divino porque aquí el hebreo dice אֱלֹהִים, no יהוה.
