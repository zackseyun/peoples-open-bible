    rationale: «Tenencia» no comunica por sí sola con suficiente claridad la idea de una posesión territorial permanente. Una formulación como «posesión de tierra», «propiedad» o «propiedad territorial» transmite mejor la rationale documentada en la auditoría inglesa.
