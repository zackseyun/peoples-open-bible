translation:
  language: es
  text: 'Abner dijo a David: «Me levantaré y me iré, y reuniré a todo Israel a mi señor el rey, para que hagan un pacto[a] contigo, y tú reinarás sobre todo lo que tu alma desea[b]». Entonces David despidió a Abner, y se fue en paz[c].'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo, literalmente: «cortar un pacto contigo».'
    reason: lexical_alternative
  - marker: b
    text: 'O: «sobre todo lo que deseas»; hebreo: «sobre todo lo que tu alma desea».'
    reason: lexical_alternative
  - marker: c
    text: «Se fue en paz» es un hebraísmo que indica una partida segura y en buenos términos.
    reason: cultural_note
lexical_decisions:
- source_word: אָק֣וּמָה
  english_pob_choice: I will arise
  chosen_spanish: Me levantaré
  alternatives_spanish:
  - me alzaré
  - me pondré en pie
  lexicon: HALOT
  rationale: La forma cohortativa expresa intención resuelta. En español, «me levantaré» comunica bien esa determinación y mantiene un tono digno y natural; «alzarme» o «ponerme en pie» serían más literales, pero menos idiomáticos aquí.
- source_word: וְֽאֵלֵ֡כָה
  english_pob_choice: and go
  chosen_spanish: y me iré
  alternatives_spanish:
  - y iré
  - y partiré
  lexicon: HALOT
  rationale: Sigue la secuencia de intención iniciada por el cohortativo anterior. «Me iré» conserva el movimiento voluntario sin forzar un calco del hebreo.
- source_word: וְאֶקְבְּצָה
  english_pob_choice: and I will gather
  chosen_spanish: y reuniré
  alternatives_spanish:
  - y congregaré
  - y juntaré
  lexicon: HALOT
  rationale: קבץ indica reunir o juntar políticamente a las tribus bajo David. «Reuniré» es claro y fiel; «congregaré» es más eclesiástico y «juntaré» demasiado coloquial.
- source_word: אֶל אֲדֹנִי הַמֶּלֶךְ
  english_pob_choice: to my lord the king
  chosen_spanish: ante mi señor el rey
  alternatives_spanish:
  - a mi señor el rey
  - a mi señor, el rey
  lexicon: HALOT
  rationale: La dirección del movimiento de Abner hacia David se expresa mejor con «ante». «Mi señor el rey» conserva el tratamiento cortesano sin convertirlo en «amo», que no corresponde al contexto político.
- source_word: כָּל יִשְׂרָאֵל
  english_pob_choice: all Israel
  chosen_spanish: a todo Israel
  alternatives_spanish:
  - a Israel entero
  - a todo el Israel
  lexicon: HALOT
  rationale: El colectivo nacional/tribal se expresa naturalmente como «todo Israel». Se mantiene la amplitud política del término.
- source_word: וְיִכְרְתוּ אִתְּךָ בְּרִית
  english_pob_choice: so that they may make a covenant with you
  chosen_spanish: para que hagan un pacto contigo
  alternatives_spanish:
  - para que corten un pacto contigo
  - para que entren en pacto contigo
  lexicon: HALOT
  rationale: כרת ברית es el giro técnico de «hacer un pacto». «Hagan un pacto» es idiomático en español y transparente; se preserva la nota de alternativa literal en el aparato.
- source_word: וּמָלַכְתָּ
  english_pob_choice: and you shall reign
  chosen_spanish: y tú reinarás
  alternatives_spanish:
  - y serás rey
  - y gobernarás como rey
  lexicon: HALOT
  rationale: El verbo expresa ejercicio de realeza. «Reinarás» reproduce bien la función regia sin añadir matices no presentes en el hebreo.
- source_word: בְּכֹל אֲשֶׁר תְּאַוֶּה נַפְשֶׁךָ
  english_pob_choice: over all that your soul desires
  chosen_spanish: sobre todo lo que tu alma desea
  alternatives_spanish:
  - sobre todo lo que deseas
  - sobre todo lo que tu corazón desea
  lexicon: HALOT
  rationale: Se conserva «alma» para reflejar נפש, como en el inglés auditado «soul». Es una expresión antropológica real del texto; «corazón» sería más idiomático en español, pero menos transparente.
- source_word: וַיְשַׁלַּח ... אֶת אַבְנֵר
  english_pob_choice: David sent Abner away
  chosen_spanish: David despidió a Abner
  alternatives_spanish:
  - David envió a Abner
  - David dejó ir a Abner
  lexicon: HALOT
  rationale: En este contexto וַיְשַׁלַּח significa despedir o enviar fuera con el sentido de dejarlo partir. «Despidió» recoge mejor el acto de dar salida que un simple «envió».
- source_word: וַיֵּלֶךְ בְּשָׁלוֹם
  english_pob_choice: and he went in peace
  chosen_spanish: y él se fue en paz
  alternatives_spanish:
  - y se fue pacíficamente
  - y partió en paz
  lexicon: HALOT
  rationale: Se conserva el giro idiomático hebreo de salida segura y sin hostilidad. «Se fue en paz» es natural en español y preserva la carga convencional de la expresión.
theological_decisions:
- issue: Tratamiento de אַבְנֵרָ ... אֲדֹנִי הַמֶּלֶךְ como fórmula cortesana
  english_pob_reading: to my lord the king
  chosen_spanish_reading: ante mi señor el rey
  alternative_spanish_readings:
  - a mi señor el rey
  - a mi señor, el rey
  rationale: La frase es un título de respeto político, no una declaración doctrinal. «Señor» conserva la deferencia; «ante» refleja mejor el movimiento de Abner hacia David antes de hablar de reunir a Israel.
  doctrine_reference: Translation philosophy §1, §6
- issue: Covenant language כרת ברית
  english_pob_reading: make a covenant with you
  chosen_spanish_reading: hagan un pacto contigo
  alternative_spanish_readings:
  - corten un pacto contigo
  - entren en pacto contigo
  rationale: El texto describe una alianza política. «Pacto» es el equivalente más claro en español; la alternativa más literal «corten un pacto» se reserva como nota léxica para no perder el trasfondo semítico.
  doctrine_reference: Translation philosophy §1, §5
- issue: נפשׁ as seat of desire
  english_pob_reading: your soul desires
  chosen_spanish_reading: tu alma desea
  alternative_spanish_readings:
  - tú deseas
  - tu corazón desea
  rationale: Se mantiene la antropología explícita del hebreo. «Alma» preserva la metáfora de deseo ligada a נפש y evita suavizarla a una simple paráfrasis psicológica.
  doctrine_reference: Translation philosophy §1, §5
translation_notes:
  revision_awareness: 'La revisión más reciente se mantuvo sin cambios; el cotejo indicó alta concordancia con el texto fuente y con el audit trail en inglés. Esta versión española sigue ese mismo perfil estable, conservando las decisiones léxicas claves: el lenguaje de pacto, el tratamiento cortesano, y la expresión antropológica «alma desea».'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma general del proyecto, aunque este versículo no contiene el nombre divino.
  - Se usa «pacto» para בְּרִית por claridad española; la alternativa literal se documenta en nota.
  - Se conserva la distinción entre «alma» y las posibles paráfrasis idiomáticas para no perder la fuerza de נפש.
  - «Despidió» expresa mejor en español el valor de וַיְשַׁלַּח en este contexto que un simple «envió».
