translation:
  language: es
  text: 'Él les respondió[a]: «Ya les dije, y no escucharon; ¿por qué quieren oírlo de nuevo? ¿Acaso ustedes también quieren llegar a ser sus discípulos[b]?».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, «Ya les dije, y no oyeron». El verbo griego puede significar tanto «oír» como «escuchar»; aquí probablemente tiene el sentido de no hacer caso a lo dicho.
    reason: lexical_alternative
  - marker: b
    text: O, «Seguramente ustedes no también quieren llegar a ser sus discípulos, ¿verdad?». La pregunta con μή espera una respuesta negativa.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀπεκρίθη
  english_pob_choice: He answered
  chosen_spanish: Él les respondió
  alternatives_spanish:
  - Él les contestó
  - Él les respondió a ellos
  lexicon: BDAG
  rationale: ἀποκρίνομαι introduce una respuesta en diálogo. «Respondió» mantiene el enlace formal con el griego y es natural en español bíblico contemporáneo.
- source_word: οὐκ ἠκούσατε
  english_pob_choice: you did not listen
  chosen_spanish: no escucharon
  alternatives_spanish:
  - no oyeron
  - no hicieron caso
  lexicon: BDAG
  rationale: Aquí ἀκούω no es mera recepción auditiva, sino falta de atención a lo dicho. «Escuchar» conserva ese matiz de prestar oído y obedecer lo escuchado.
- source_word: τί πάλιν θέλετε ἀκούειν;
  english_pob_choice: Why do you want to hear it again?
  chosen_spanish: ¿por qué quieren oírlo de nuevo?
  alternatives_spanish:
  - ¿qué quieren oír de nuevo?
  - ¿por qué quieren escucharlo otra vez?
  lexicon: BDAG
  rationale: τί con θέλετε expresa una pregunta con sentido de «por qué». «Oírlo de nuevo» refleja el objeto implícito en español y conserva la fuerza de repetición de πάλιν.
- source_word: μὴ καὶ ὑμεῖς θέλετε αὐτοῦ μαθηταὶ γενέσθαι;
  english_pob_choice: You do not also want to become his disciples, do you?
  chosen_spanish: ¿Acaso ustedes también quieren llegar a ser sus discípulos[b]?
  alternatives_spanish:
  - ¿Ustedes también quieren llegar a ser sus discípulos?
  - ¿Seguro que ustedes también quieren llegar a ser sus discípulos?
  lexicon: BDAG
  rationale: μαθηταί se traduce naturalmente como «discípulos». γίνομαι conserva mejor el sentido ingrese de «llegar a ser» que un simple «ser». La partícula μή en pregunta directa da expectativa de respuesta negativa; «¿Acaso...?» preserva la fuerza retórica sin forzar un tag question poco natural en español.
theological_decisions:
- issue: Fuerza retórica de la pregunta final con μή
  english_pob_reading: 'A sarcastic question expecting a negative answer: ''You do not also want to become his disciples, do you?'''
  chosen_spanish_reading: 'Una pregunta retórica que espera una respuesta negativa: «¿Acaso ustedes también quieren llegar a ser sus discípulos?»'
  alternative_spanish_readings:
  - «¿Seguro que ustedes también quieren llegar a ser sus discípulos?»
  - «¿Ustedes también quieren llegar a ser sus discípulos, verdad?»
  rationale: La partícula μή en una pregunta directa normalmente anticipa una respuesta negativa. En español, «¿Acaso...?» reproduce bien esa expectativa y mantiene el tono irónico o desafiante del hablante sin agregar contenido doctrinal.
  doctrine_reference: Preservar la fuerza gramatical y retórica del griego; no neutralizar el sarcasmo ni resolverlo en una afirmación suave.
translation_notes:
  revision_awareness: 'Coincide con el pasaje griego y con el audit trail inglés: se mantiene la distinción entre ἀκούω como «escuchar/oír», el valor idiomático de τί πάλιν θέλετε ἀκούειν y la expectativa negativa de μή en la última pregunta. No hubo revisiones aplicadas en el último pase.'
  spanish_consistency_notes:
  - Se usa «discípulos» para μαθηταί, en línea con el uso joánico y con la tradición POB.
  - Se evita «Cristo/Señor» porque no aparecen en el versículo.
  - Se conserva «llegar a ser» para reflejar el valor ingrésivo de γενέσθαι.
  - Se evita un calco de inglés tipo «¿no también ustedes...?», privilegiando una interrogación natural en español con la misma fuerza retórica.
