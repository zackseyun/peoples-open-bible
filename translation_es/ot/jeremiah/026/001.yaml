translation:
  language: es
  text: Al comienzo del reinado de Joacim, hijo de Josías[a], rey de Judá, esta palabra vino de Yahvé, diciendo[b][c],
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Al inicio del reinado de Joacim».'
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: «esta palabra fue de Yahvé»; «vino» refleja la fórmula profética habitual en español.'
    reason: lexical_alternative
  - marker: c
    text: Yahvé traduce el nombre divino YHWH; el proyecto evita sustituirlo por un título como «SEÑOR».
    reason: theological_note
lexical_decisions:
- source_word: בְּרֵאשִׁית
  english_pob_choice: At the beginning of
  chosen_spanish: Al comienzo de
  alternatives_spanish:
  - Al principio de
  - Al inicio de
  lexicon: HALOT
  rationale: La preposición ב con רֵאשִׁית marca el periodo inicial de algo. «Al comienzo de» conserva la fuerza temporal de manera natural en español y evita una formulación demasiado literal o arcaica.
- source_word: מַמְלְכוּת
  english_pob_choice: the reign of
  chosen_spanish: el reinado de
  alternatives_spanish:
  - el reino de
  - la realeza de
  lexicon: HALOT
  rationale: En el contexto de un rey nombrado, el término señala el periodo del ejercicio real, no el territorio. «Reinado» reproduce bien esa fuerza en español.
- source_word: יְהוֹיָקִים
  english_pob_choice: Jehoiakim
  chosen_spanish: Joaquín
  alternatives_spanish:
  - Jehoiaquim
  lexicon: Convención bíblica española
  rationale: En español bíblico, la forma más reconocible y extendida de este nombre es «Joaquín». Mantiene la identificación propia del personaje sin perder inteligibilidad.
- source_word: בֶּן יֹאשִׁיָּהוּ
  english_pob_choice: son of Josiah
  chosen_spanish: hijo de Josías
  alternatives_spanish:
  - descendiente de Josías
  lexicon: HALOT
  rationale: La expresión genealógica normal se traduce de forma directa. «Hijo de» conserva la relación familiar explícita del hebreo.
- source_word: מֶלֶךְ יְהוּדָה
  english_pob_choice: king of Judah
  chosen_spanish: rey de Judá
  alternatives_spanish:
  - el rey de Judá
  lexicon: HALOT
  rationale: Título apposicional que identifica a Joaquín. «Rey de Judá» es la fórmula natural y fiel en español.
- source_word: הָיָה הַדָּבָר הַזֶּה
  english_pob_choice: this word came
  chosen_spanish: esta palabra vino
  alternatives_spanish:
  - esta palabra fue
  - este asunto sucedió
  lexicon: HALOT
  rationale: El hebreo dice literalmente «fue este דבר», pero en la fórmula profética el español admite con naturalidad «vino» para expresar la llegada de la revelación. Se preserva el sustantivo «palabra» para mantener el peso profético del término.
- source_word: דָּבָר
  english_pob_choice: word
  chosen_spanish: palabra
  alternatives_spanish:
  - mensaje
  - asunto
  lexicon: HALOT
  rationale: En fórmulas proféticas, דָּבָר suele referirse a una palabra o mensaje divino. «Palabra» mantiene el eco bíblico mejor que una paráfrasis más general.
- source_word: מֵאֵת יְהוָה
  english_pob_choice: from Yahweh
  chosen_spanish: de Yahvé
  alternatives_spanish:
  - procedente de Yahvé
  - de parte de Yahvé
  lexicon: HALOT
  rationale: מֵאֵת indica procedencia o fuente. En la norma del proyecto, el nombre divino se expresa como «Yahvé»; en español, «de Yahvé» comunica con naturalidad la fuente de la palabra.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahveh
  lexicon: DOCTRINE.md contested terms
  rationale: Se sigue la terminología del proyecto para el Tetragrámaton. «Yahvé» preserva el nombre personal del Dios de Israel sin sustituirlo por un título.
- source_word: לֵאמֹר
  english_pob_choice: saying
  chosen_spanish: diciendo
  alternatives_spanish:
  - y dijo
  - 'así:'
  - 'en estos términos:'
  lexicon: HALOT
  rationale: La partícula introduce discurso directo. «Diciendo» conserva la estructura hebrea y prepara la cita que continúa en el versículo siguiente.
theological_decisions:
- issue: Representación del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahveh
  - el SEÑOR
  rationale: El texto hebreo usa el Tetragrámaton de forma explícita. En coherencia con la doctrina y la terminología del proyecto, se conserva el nombre propio de Dios como «Yahvé», en lugar de reemplazarlo por un título.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Fórmula profética «esta palabra vino de Yahvé»
  english_pob_reading: this word came from Yahweh
  chosen_spanish_reading: esta palabra vino de Yahvé
  alternative_spanish_readings:
  - esta palabra fue de Yahvé
  - esta palabra procedía de Yahvé
  rationale: El hebreo tiene una fórmula de origen y llegada revelatoria. «Vino de Yahvé» conserva la dinámica profética que el audit trail inglés describe como una expresión idiomática normal, sin perder la procedencia divina del mensaje.
  doctrine_reference: Uso profético de דָּבָר en introducciones revelatorias
translation_notes:
  revision_awareness: 'El audit trail inglés no muestra revisiones textuales sustantivas: la lectura quedó confirmada como de alta concordancia. La versión española mantiene esa estabilidad y solo ajusta la idiomaticidad necesaria para una lectura publicable.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» de forma consistente para יהוה.
  - Se usa «palabra» para דָּבָר, conservando el matiz profético.
  - «Reinado» se emplea para מַמְלְכוּת por tratarse del periodo de gobierno, no del territorio.
  - La puntuación final con coma reproduce la apertura de discurso del hebreo y la continuidad hacia el versículo siguiente.
