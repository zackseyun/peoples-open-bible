review_pass:
  verdict: revise
  source_alignment_summary: El borrador transmite correctamente la fórmula de nacimiento y la lista de tres hijos varones, pero se aparta innecesariamente del sentido y de la práctica onomástica al hispanizar dos nombres de manera poco justificada. El hebreo dice simplemente que ella le dio a luz hijos, a saber, Jeús/Jeush, Semarías/Shemariah y Zaham. La estructura básica está bien preservada.
  spanish_quality_summary: El español es legible, pero «Y ella le dio a luz» suena algo cargado; puede simplificarse a «Y ella le dio hijos» o conservar la fórmula de parto de manera más natural. Además, «Semarías» resulta una adaptación poco estable y potencialmente confusa; conviene una forma más transparente y cercana al nombre fuente. La puntuación general es correcta.
  glossary_alignment: No hay términos teológicos sensibles en este versículo. La principal cuestión es la transliteración de nombres propios. El proyecto favorece preservar el valor del original y no crear adaptaciones españolas innecesarias sin respaldo claro. «Zaham» está bien; «Jeús» es aceptable como adaptación española, pero «Semarías» debería ajustarse mejor a שְׁמַרְיָה, por ejemplo «Shemarías» o «Shemaría».
  issues:
  - severity: medium
    issue: «Semarías» no refleja bien שְׁמַרְיָה
    rationale: La forma propuesta omite innecesariamente la aspiración/transliteración inicial representada en inglés por Shem-, y la adaptación a «-ías» no basta para justificar una forma española establecida. Puede dificultar el reconocimiento del nombre fuente.
  - severity: low
    issue: «Y ella le dio a luz hijos» suena algo pesado en español bíblico actual
    rationale: Aunque es comprensible, la combinación de sujeto explícito más dativo más perífrasis de alumbramiento es menos natural que una formulación más fluida. En contexto genealógico, «le dio hijos» conserva bien el sentido relacional del hebreo.
  - severity: low
    issue: La decisión léxica sobre «hijos» debería explicitar que aquí significa varones
    rationale: Aunque «hijos» puede ser inclusivo en español moderno, aquí el contexto onomástico masculino fija el sentido. La traducción puede mantenerse, pero la justificación debe reconocerlo con más precisión.
  revised_spanish_text: 'Y ella le dio hijos: Jeús, Shemarías y Zaham.'
  revision_rationale: Se ajusta la fórmula verbal a un español más natural en contexto genealógico sin perder el dativo relacional de לוֹ, y se corrige la transliteración de שְׁמַרְיָה a «Shemarías» para reflejar mejor el nombre hebreo y la decisión auditada de no parafrasear nombres propios. No se requieren notas al pie.
