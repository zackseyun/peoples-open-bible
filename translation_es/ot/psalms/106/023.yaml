review_pass:
  verdict: revise
  source_alignment_summary: El borrador transmite el sentido general del juicio divino evitado por la mediación de Moisés, pero no preserva suficientemente la metáfora central עָמַד בַּפֶּרֶץ ('estar de pie en la brecha'). 'Se hubiera interpuesto' interpreta la imagen en vez de conservarla, en contra del rastro inglés documentado. También la cláusula condicional puede sonar más natural y formal en español con 'de no haber...' o estructura equivalente.
  spanish_quality_summary: 'El español es claro y digno, pero la sintaxis ''si no se hubiera interpuesto Moisés'' resulta algo menos elegante en este registro, y la combinación ''apartar su ira de destruirlos'' suena algo trabada. Una revisión menor puede mejorar fidelidad y fluidez: conservar ''estar en la brecha'' en el texto principal y ajustar la prevención final a ''para hacer volver su ira y no destruirlos'' o equivalente cercano.'
  glossary_alignment: 'No hay conflictos con la terminología base del proyecto. ''Su escogido'' es aceptable para בְחִירוֹ; ''ira'' para חֲמָתוֹ también. El problema principal es de imagen léxica, no de glosario: debe mantenerse la metáfora de la brecha como decidió explícitamente el POB inglés.'
  issues:
  - severity: high
    issue: La metáfora 'stood in the breach' fue reemplazada por 'se hubiera interpuesto'.
    rationale: El hebreo עָמַד בַּפֶּרֶץ y la decisión teológica inglesa exigen preservar la imagen intercesora, no solo su función. La nota al pie no compensa del todo que el texto principal la elimine.
  - severity: medium
    issue: La construcción condicional 'si no se hubiera...' es correcta pero menos natural/formal que otras opciones en este contexto poético.
    rationale: לוּלֵי expresa una condición contrafactual. En español bíblico legible, 'de no haber...' o 'si no hubiera sido por...' fluye mejor con el orden del versículo.
  - severity: medium
    issue: La frase 'para apartar su ira de destruirlos' suena poco idiomática.
    rationale: Aunque refleja la estructura hebrea, en español la secuencia con 'de destruirlos' tras 'apartar su ira' resulta rígida. Conviene una formulación que conserve la prevención de la destrucción con mejor naturalidad.
  revised_spanish_text: Y dijo que los destruiría, de no haber sido por Moisés, su escogido[a], que estuvo en la brecha delante de él para hacer volver su ira y no destruirlos.
  revised_footnotes:
  - marker: a
    text: O «estuvo en el hueco». La imagen hebrea es la de ocupar una abertura en un muro; aquí describe la intercesión de Moisés.
    reason: lexical_alternative
  revision_rationale: Se revisa para alinear el español con la evidencia hebrea y con la decisión auditada del POB de conservar la metáfora 'en la brecha'. También se mejora la fluidez de la condición contrafactual y de la cláusula final, sin perder el sentido de que Moisés desvió la ira divina para impedir la destrucción.
