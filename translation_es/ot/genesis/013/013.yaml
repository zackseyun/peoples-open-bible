translation:
  language: es
  text: Ahora los hombres de Sodoma eran sumamente perversos y pecadores contra Yahvé[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «ante Yahvé» o «delante de Yahvé». La preposición hebrea también puede expresar conducta hecha en su presencia, no solo ofensa dirigida contra él.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְ/אַנְשֵׁי
  english_pob_choice: Now the men of
  chosen_spanish: Ahora los hombres de
  alternatives_spanish:
  - Y los hombres de
  - Los hombres de
  lexicon: HALOT
  rationale: אַנְשֵׁי es el constructo plural de אִישׁ, por lo que se refiere a varones concretos de Sodoma. En español, «los hombres de» es preciso; «Ahora» reproduce de manera natural el valor discursivo de transición/explanación que el inglés POB expresó con «Now».
- source_word: סְדֹם
  english_pob_choice: Sodom
  chosen_spanish: Sodoma
  alternatives_spanish:
  - Sodom
  lexicon: convención toponímica española
  rationale: Es un nombre propio de lugar; «Sodoma» es la forma estable y clara en español bíblico.
- source_word: רָעִים
  english_pob_choice: wicked
  chosen_spanish: perversos
  alternatives_spanish:
  - malvados
  - malos
  lexicon: HALOT
  rationale: El término expresa mal moral, no mera inconveniencia. «Perversos» comunica con fuerza ética la cualidad del grupo en un español digno y comprensible.
- source_word: וְ/חַטָּאִים
  english_pob_choice: and sinful
  chosen_spanish: y pecadores
  alternatives_spanish:
  - y pecaminosos
  - y que pecaban
  lexicon: HALOT
  rationale: La forma paralela a רָעִים describe caracterización moral. «Pecadores» preserva bien el predicado sin forzar una paráfrasis verbal; «pecaminosos» sonaría más abstracto y menos natural.
- source_word: לַ/יהוָה
  english_pob_choice: against Yahweh
  chosen_spanish: contra Yahvé
  alternatives_spanish:
  - ante Yahvé
  - delante de Yahvé
  lexicon: HALOT
  rationale: El lamed con lenguaje de pecado puede marcar el objeto contra quien se comete la ofensa. «Contra Yahvé» mantiene la fuerza relacional y evita neutralizar la tensión del texto; la alternativa espacial/referencial queda disponible como lectura posible.
- source_word: מְאֹד
  english_pob_choice: exceedingly
  chosen_spanish: sumamente
  alternatives_spanish:
  - en gran manera
  - muchísimo
  lexicon: HALOT
  rationale: מְאֹד intensifica todo el predicado. «Sumamente» es un adverbio sobrio y fuerte que conserva la intensificación sin sonar arcaico.
theological_decisions:
- issue: Nombre divino יהוה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: El texto hebreo contiene el Tetragrámaton. La política del proyecto pide «Yahvé» en el texto principal, preservando el nombre propio divino en lugar de ocultarlo tras un título.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יהוה YHWH → Yahvé'
- issue: Sentido de לַיהוָה con lenguaje de pecado
  english_pob_reading: against the LORD
  chosen_spanish_reading: contra Yahvé
  alternative_spanish_readings:
  - ante Yahvé
  - delante de Yahvé
  rationale: Con חטא, la preposición puede señalar ofensa dirigida a Dios o simple relación de comparecencia ante él. «Contra Yahvé» conserva la tensión moral y la dirección ofensiva sin excluir que el acto sea también visible ante Dios.
  doctrine_reference: 'Translation philosophy #3: preserve theological tension rather than resolve it where ambiguity is genuine'
translation_notes:
  revision_awareness: Revisado contra el packet hebreo y el audit trail inglés; no se detectaron cambios posteriores que exigieran ajuste adicional. La redacción conserva la intensidad moral del paralelismo y la ambigüedad de לַיהוָה en nota.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» conforme al estándar del proyecto para יהוה.
  - Se evita «SEÑOR» como máscara editorial, salvo en nota de alternativa.
  - «Perversos y pecadores» reproduce el paralelismo de dos predicados morales del hebreo.
  - La puntuación y el orden buscan un español bíblico claro, sin calco excesivo.
