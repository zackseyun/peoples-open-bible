translation:
  language: es
  text: 'y Maarat[a], y Bet-anot, y Eltecón: seis ciudades con sus aldeas.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'con sus asentamientos' / 'con sus caseríos'. El término hebreo se refiere a lugares rurales dependientes asociados con las ciudades nombradas.
    reason: lexical_alternative
lexical_decisions:
- source_word: וּ/מַעֲרָת
  english_pob_choice: and Maarath
  chosen_spanish: y Maarat
  alternatives_spanish:
  - y Maarat
  - y Ma'arat
  lexicon: HALOT
  rationale: Es un nombre propio de lugar; en español conviene transliterarlo, no traducirlo. Se mantiene la consonancia con la forma inglesa auditada, pero ajustada a la ortografía española sin apóstrofo.
- source_word: וּ/בֵית עֲנֹות
  english_pob_choice: and Beth-anoth
  chosen_spanish: y Bet-anot
  alternatives_spanish:
  - y Beth-anot
  - y Bet Anot
  lexicon: HALOT
  rationale: Se trata de un topónimo compuesto. La parte בית funciona aquí como componente del nombre propio, por lo que se conserva transliterada dentro del nombre, en vez de verterla como 'casa de'.
- source_word: וְ/אֶלְתְּקֹן
  english_pob_choice: and Eltekon
  chosen_spanish: y Eltecón
  alternatives_spanish:
  - y Eltekón
  - y Eltekon
  lexicon: HALOT
  rationale: Nombre propio de lugar; se translitera al español con acento gráfico para reflejar la pronunciación esperable en español y mantener lectura natural.
- source_word: עָרִים
  english_pob_choice: cities
  chosen_spanish: ciudades
  alternatives_spanish:
  - pueblos
  - aldeas
  lexicon: HALOT
  rationale: En listas territoriales, עָרִים designa asentamientos habitados; 'ciudades' reproduce bien el valor administrativo-geográfico usado por la POB inglesa.
- source_word: שֵׁשׁ
  english_pob_choice: six
  chosen_spanish: seis
  lexicon: HALOT
  rationale: Equivale de forma directa al cardinal que modifica a 'ciudades'.
- source_word: וְ/חַצְרֵי/הֶן
  english_pob_choice: with their villages
  chosen_spanish: con sus aldeas
  alternatives_spanish:
  - y sus aldeas
  - con sus asentamientos
  - con sus caseríos
  lexicon: HALOT
  rationale: El término חַצְרֵי־ en estos listados de repartos territoriales apunta a dependencias rurales asociadas a las ciudades mencionadas. 'Aldeas' expresa ese sentido de manera clara y natural en español.
translation_notes:
  revision_awareness: La versión inglesa auditada no registra revisiones aplicadas ni cambios pendientes; el texto español sigue de cerca la lectura base del hebreo masorético, conservando el listado toponímico y la frase final administrativa sin expansión interpretativa.
  spanish_consistency_notes:
  - Se ha mantenido la conjunción inicial repetida con 'y' para reflejar la cadena hebrea de localidades.
  - Se usa transliteración consistente para los topónimos, evitando traducciones como 'casa de' que desdibujarían el carácter de nombre propio.
  - '''Aldeas'' se eligió para חַצְרֵי־ como opción clara y sobria; la nota conserva alternativas semánticas documentadas.'
