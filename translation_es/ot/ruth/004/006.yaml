translation:
  language: es
  text: 'Entonces el redentor[a] dijo: «No puedo redimirlo para mí, no sea que arruine mi propia heredad. Redime para ti mi derecho de redención[b], porque no puedo redimirlo».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Redentor» traduce el hebreo גֹּאֵל en su sentido legal de quien tiene el derecho y deber de redimir; no alude aquí al uso soteriológico posterior del término.
    reason: lexical_alternative
  - marker: b
    text: Lit. «mi redención»; aquí el sustantivo designa el derecho u obligación de redimir la propiedad y mantener la línea familiar, no una redención abstracta.
    reason: lexical_alternative
lexical_decisions:
- source_word: הַגֹּאֵל
  english_pob_choice: the redeemer
  chosen_spanish: el redentor
  alternatives_spanish:
  - el redimidor
  - el pariente redentor
  lexicon: HALOT
  rationale: El participio גֹּאֵל designa al hombre con el derecho y deber legal de redimir. «Redentor» conserva esa función en español y evita añadir por definición la relación de parentesco, que aquí pertenece al contexto narrativo más amplio.
- source_word: לִגְאֹל / גְּאַל / גְּאֻלָּתִי
  english_pob_choice: redeem / redeem / my right of redemption
  chosen_spanish: redimir / redime / mi derecho de redención
  alternatives_spanish:
  - rescatar / rescata / mi rescate
  - comprar de vuelta / compra de vuelta / mi redención
  lexicon: HALOT
  rationale: La raíz גאל se mantiene con «redimir» para reflejar de manera consistente el campo legal-teológico. En el sustantivo, «derecho de redención» explicita que no se trata solo de un acto abstracto, sino de un derecho u obligación legal ligado a la propiedad y a la continuidad familiar.
- source_word: לִי
  english_pob_choice: for myself
  chosen_spanish: para mí
  alternatives_spanish:
  - para mí mismo
  - en mi propio favor
  lexicon: HALOT
  rationale: El dativo expresa interés personal. «Para mí» es natural en español y preserva la idea de que el acto afectaría directamente su propio patrimonio.
- source_word: פֶּן
  english_pob_choice: lest
  chosen_spanish: no sea que
  alternatives_spanish:
  - para que no
  - o si no
  lexicon: HALOT
  rationale: Introduce la razón preventiva o de temor. «No sea que» conserva bien en español la cautela implícita sin volverlo explicativo en exceso.
- source_word: אַשְׁחִית
  english_pob_choice: I ruin
  chosen_spanish: arruine
  alternatives_spanish:
  - dañe
  - perjudique
  - destruya
  lexicon: HALOT
  rationale: El hiphil de שׁחת aquí expresa causar daño grave a la heredad. «Arruine» comunica con claridad el perjuicio económico/legal sin forzar una destrucción literal.
- source_word: נַחֲלָתִי
  english_pob_choice: my own inheritance
  chosen_spanish: mi heredad
  alternatives_spanish:
  - mi herencia
  - mi patrimonio
  lexicon: HALOT
  rationale: En Rut se trata de tierra/heredad familiar. «Heredad» conserva ese valor patrimonial y familiar mejor que una expresión más general como «herencia».
- source_word: לְךָ אַתָּה
  english_pob_choice: for yourself
  chosen_spanish: para ti
  alternatives_spanish:
  - tú mismo
  - para ti mismo
  lexicon: HALOT
  rationale: La combinación de pronombre y enfático en hebreo subraya la transferencia del derecho. «Para ti» es idiomático y suficiente en este contexto, sin sonar forzado.
- source_word: כִּי
  english_pob_choice: for
  chosen_spanish: porque
  alternatives_spanish:
  - pues
  - ya que
  lexicon: HALOT
  rationale: Introduce una reiteración explicativa de la imposibilidad. «Porque» mantiene la relación causal de manera clara y natural en español.
translation_notes:
  revision_awareness: La redacción sigue de cerca el texto hebreo y el audit trail en inglés, manteniendo el juego reiterado de la raíz גאל con una sola familia léxica en español. Se adoptó una equivalencia óptima para hacer legible el valor jurídico de גְּאֻלָּה sin perder la tensión entre «redención» como término y su aplicación concreta al derecho sobre la propiedad y el linaje.
  spanish_consistency_notes:
  - Se mantiene uniformemente la raíz «redimir/redención/redentor» para reflejar la recurrencia de גאל.
  - «Heredad» se usa para el valor patrimonial/familiar de נַחֲלָה en Rut, evitando oscilar entre varios equivalentes.
  - La puntuación reproduce el tono de discurso directo y la repetición final del verbo hebreo.
  - Las comillas españolas y la colocación de los marcadores de nota siguen la convención de lectura pública.
