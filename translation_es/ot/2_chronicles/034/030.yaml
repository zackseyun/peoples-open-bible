  yaml_path: translation/ot/2_chronicles/034/030.yaml
  text: Then the king went up to the house of Yahweh[a], and every man of Judah, and the inhabitants of Jerusalem, and the priests and the Levites, and all the people, from great to small[b]; and he read in their hearing all the words of the book of the covenant that had been found in the house of Yahweh.
