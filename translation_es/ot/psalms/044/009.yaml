review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien el hebreo y el rastro de auditoría inglés: «En Dios» preserva correctamente בֵּאלֹהִים como esfera/fundamento; «nos gloriamos» comunica bien הִלַּלְנוּ en esta construcción; «todo el día», «a tu nombre», «para siempre» y «daremos gracias» siguen fielmente el sentido documentado. «Selah» transliterado también es correcto.'
  spanish_quality_summary: 'El español es claro y digno, pero hay dos detalles mejorables: en la nota [a], «nos alabamos» suena reflexivo y semánticamente extraño en español; conviene «alabamos» o reformular. Además, para el marcador litúrgico, «Selah» puede conservarse si así lo hace el proyecto, pero en español bíblico es más natural «Selá»; sin embargo, dado el rastro inglés y la decisión léxica existente, no hace falta forzar ese cambio aquí. El texto principal está bien; la reparación necesaria es la nota.'
  glossary_alignment: No hay conflicto con los términos base del proyecto. No aparece Yahvé ni Mesías. «Dios», «gloriamos» y «daremos gracias» son coherentes con las decisiones léxicas auditadas.
  issues:
  - severity: medium
    issue: La nota [a] usa «nos alabamos todo el día en Dios».
    rationale: Esa alternativa española no corresponde bien a las opciones inglesas ni al hebreo; «nos alabamos» sugiere autoalabanza reflexiva y resulta poco natural. Debe decir «alabamos todo el día en Dios» o una reformulación equivalente.
  revised_spanish_text: En Dios nos gloriamos todo el día[a], y a tu nombre daremos gracias para siempre[b]. Selah
  revised_footnotes:
  - marker: a
    text: O «alabamos todo el día en Dios» o «nos gloriamos en Dios todo el día». El verbo hebreo puede expresar alabanza o jactancia exultante según el contexto.
    reason: lexical_alternative
  - marker: b
    text: Hebreo «a tu nombre», una manera bíblica de referirse al carácter revelado y la reputación de Dios.
    reason: cultural_note
  revision_rationale: Se conserva intacto el texto principal porque es fiel y natural. Solo se corrige la nota [a] para eliminar una formulación reflexiva impropia en español y alinear mejor la alternativa con el hebreo y la auditoría inglesa.
