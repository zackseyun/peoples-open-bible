translation:
  language: es
  text: 'Entonces Abimelec llamó a Isaac y le dijo: «¡Ciertamente[a], ella es tu esposa! ¿Y cómo pudiste decir: “Es mi hermana”?» E Isaac le respondió: «Porque dije[b][c]: “No sea que muera a causa de ella”».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «sin duda, ella es tu esposa»; la frase hebrea combina una partícula de énfasis con una deíctica que aquí se integra en la exclamación.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «No sea que muera a causa de ella»; es decir, no fuera que alguien me matara por causa de ella.'
    reason: lexical_alternative
  - marker: c
    text: 'O: «Porque pensé: “No sea que muera a causa de ella”».'
    reason: alternative_reading
lexical_decisions:
- source_word: וַיִּקְרָא
  english_pob_choice: called
  chosen_spanish: llamó
  alternatives_spanish:
  - convocó
  - hizo llamar
  lexicon: HALOT
  rationale: קרא con לְ + persona expresa aquí el acto de llamar a alguien para hablarle; «llamó» es natural en español y conserva la sencillez narrativa.
- source_word: אַךְ
  english_pob_choice: Surely
  chosen_spanish: ciertamente
  alternatives_spanish:
  - de verdad
  - sin duda
  lexicon: HALOT
  rationale: La partícula aporta énfasis y reconocimiento repentino; «ciertamente» reproduce bien ese valor aseverativo sin volverlo interrogativo.
- source_word: הִנֵּה
  english_pob_choice: look
  chosen_spanish: —
  alternatives_spanish:
  - mira
  - he aquí
  lexicon: HALOT
  rationale: En español, mantener un segundo imperativo/exclamación («mira»/«he aquí») junto a «ciertamente» sonaría más pesado que en hebreo; el efecto deíctico queda absorbido por la exclamación resultante. No se marca aparte para evitar sobrecargar la frase.
- source_word: אִשְׁתְּךָ הִוא
  english_pob_choice: she is your wife
  chosen_spanish: ella es tu esposa
  alternatives_spanish:
  - ella es tu mujer
  lexicon: HALOT
  rationale: «Esposa» conserva el sentido relacional y resulta más sobrio y claro en registro bíblico contemporáneo que «mujer».
- source_word: וְאֵיךְ
  english_pob_choice: So how could
  chosen_spanish: ¿Cómo, entonces, dijiste...?
  alternatives_spanish:
  - ¿Y cómo pudiste decir...?
  - ¿Cómo dijiste entonces...?
  lexicon: HALOT
  rationale: La combinación de waw + interrogativo introduce reproche e incredulidad; «¿Cómo, entonces, dijiste...?» mantiene el tono de reprensión sin añadir más contenido del que el hebreo da.
- source_word: אֲחֹתִי הִוא
  english_pob_choice: She is my sister
  chosen_spanish: Es mi hermana
  alternatives_spanish:
  - Ella es mi hermana
  lexicon: HALOT
  rationale: La frase se cita como discurso directo de Isaac; en español, la omisión del sujeto es natural y fiel al hebreo, que subraya la identidad declarada.
- source_word: כִּי
  english_pob_choice: Because
  chosen_spanish: Porque
  alternatives_spanish:
  - pues
  lexicon: HALOT
  rationale: Introduce la explicación de Isaac; «porque» es directo y plenamente idiomático.
- source_word: פֶּן
  english_pob_choice: Lest
  chosen_spanish: No sea que
  alternatives_spanish:
  - para que no
  - por temor a que
  lexicon: HALOT
  rationale: El hebreo expresa temor ante un posible resultado; «No sea que» comunica bien ese matiz preventivo en español bíblico y moderno.
- source_word: אָמ֖וּת
  english_pob_choice: I die
  chosen_spanish: muera
  alternatives_spanish:
  - muera yo
  - llegue a morir
  lexicon: HALOT
  rationale: Dentro del propósito temido, el español fluido exige subjuntivo; «muera» conserva el valor potencial del hebreo sin forzar un futuro o condicional ajenos al contexto.
- source_word: עָלֶיהָ
  english_pob_choice: because of her
  chosen_spanish: a causa de ella
  alternatives_spanish:
  - por ella
  - por su causa
  lexicon: HALOT
  rationale: La preposición עַל indica aquí causa/ocasión; «a causa de ella» mantiene la referencia al peligro que Rebeca representa en la situación.
translation_notes:
  revision_awareness: 'Se tuvo en cuenta el audit trail inglés y sus correcciones: se evitó la lectura interrogativa incorrecta para אַךְ, se preservó el contraste entre la afirmación enfática y la pregunta reprochadora, y se mantuvo la explicación preventiva de Isaac con un subjuntivo natural en español.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como convención general del proyecto, pero este versículo no contiene el tetragrámaton.
  - Se usa «esposa» para אִשְׁתְּךָ por claridad y registro, sin perder la relación matrimonial.
  - «No sea que» conserva el valor prevenido de פֶּן en una forma adecuada para español bíblico.
  - Se evita «Cristo/Mesías» por irrelevancia contextual.
  - Las comillas españolas y la puntuación reproducen fielmente el diálogo directo y su jerarquía interna.
