base_translation:
  language: en
  yaml_path: translation/ot/daniel/004/032.yaml
  text: And all the inhabitants of the earth are regarded as nothing[a], and he does according to his will among the host of heaven and among the inhabitants of the earth; and there is no one who can restrain his hand or say to him[b], “What have you done?”
  footnotes:
