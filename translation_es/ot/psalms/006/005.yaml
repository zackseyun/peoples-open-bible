    issue: «Vuélvete» para שׁוּבָה
    rationale: Aunque posible, suena menos idiomático en español bíblico moderno y añade un matiz reflexivo innecesario. «Vuelve» comunica mejor la súplica por el retorno del favor/presencia de Yahvé.
  - severity: high
    issue: «tu misericordia» para חַסְדֶּךָ
    rationale: Reduce demasiado el sentido de חסד, que en el expediente auditado se entiende como amor leal, constante, de pacto. «Misericordia» puede aparecer en nota como alternativa, pero no debería ser la única representación en el texto principal.
  - severity: low
    issue: Vocativo «oh Yahvé»
    rationale: No es incorrecto, pero «Yahvé» sin «oh» suele leerse con más naturalidad en español contemporáneo y mantiene el tono solemne.
