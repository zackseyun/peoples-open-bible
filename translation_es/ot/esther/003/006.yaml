  to: Pero le pareció despreciable poner la mano sobre Mardoqueo solo, porque le habían dicho de qué pueblo era Mardoqueo. Así que Amán buscó destruir a todos los judíos que había en todo el reino de Asuero, el pueblo de Mardoqueo[a].
