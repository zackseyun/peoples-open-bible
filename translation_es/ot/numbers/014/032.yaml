translation:
  language: es
  text: Pero en cuanto a ustedes, sus cadáveres[a] caerán en este desierto.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Heb. פִגְרֵיכֶם; también puede traducirse 'sus cuerpos sin vida' o 'sus despojos.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וּ/פִגְרֵי/כֶם
  english_pob_choice: your dead bodies
  chosen_spanish: sus cadáveres
  alternatives_spanish:
  - sus cuerpos sin vida
  - sus restos
  - sus despojos
  lexicon: HALOT
  rationale: פֶּגֶר (HALOT 6297) denotes a dead body or corpse. 'Cadáveres' is the most natural, dignified, and widely understood Spanish equivalent; it preserves the sobering physical concreteness of the judgment without the morbid overtone of 'carroña' (which would import an animal-carcass connotation beyond the source). 'Sus cuerpos sin vida' is descriptively accurate but wordy; 'sus despojos' is softer and may obscure the starkness. 'Cadáveres' aligns with HALOT's primary gloss and the English POB's 'dead bodies.' The prefixed conjunction וּ and the possessive suffix כֶם are handled by 'sus' (possessive) within the clause introduced by 'pero en cuanto a ustedes.'
- source_word: אַתֶּם
  english_pob_choice: as for you
  chosen_spanish: en cuanto a ustedes
  alternatives_spanish:
  - ustedes mismos
  - ustedes
  lexicon: HALOT
  rationale: The independent pronoun אַתֶּם (2mp) is syntactically emphatic and contrastive here — it appears after the fronted subject (פִגְרֵיכֶם) to highlight the addressees in contrast to the children mentioned in the preceding verse. 'En cuanto a ustedes' is the standard Spanish topic-marking construction ('as for you') and accurately represents this contrastive force. A bare 'ustedes' would underrepresent the emphasis. 'Ustedes mismos' adds a reflexive nuance not required by the pronoun alone. Neutral Latin American 'ustedes' is used throughout (not 'vosotros') per the project's target register.
- source_word: יִפְּלוּ
  english_pob_choice: will fall
  chosen_spanish: caerán
  alternatives_spanish:
  - habrán de caer
  - caerán muertos
  lexicon: HALOT
  rationale: נפל (Qal impf. 3mp, HALOT 5307) means 'to fall'; in a context where the subject is 'dead bodies,' the falling refers to dying and being left in the wilderness. 'Caerán' is the direct, natural Spanish future of 'caer' and renders the predictive imperfect faithfully. 'Habrán de caer' adds a modal nuance of inevitability that is not strictly present in the Hebrew. 'Caerán muertos' would be redundant given that 'cadáveres' already encodes death.
- source_word: בַּ/מִּדְבָּר
  english_pob_choice: in this wilderness
  chosen_spanish: en este desierto
  alternatives_spanish:
  - en este páramo
  - en este yermo
  - en esta soledad
  lexicon: HALOT
  rationale: מִדְבָּר (HALOT 4057b) denotes uninhabited wasteland or wilderness, not necessarily a sandy desert. The English POB chose 'wilderness' precisely to avoid limiting the term to an arid desert landscape. In Spanish, 'desierto' covers both senses (uninhabited wilderness and arid desert) in standard and biblical usage and is the most widely recognized term in this context. 'Páramo' or 'yermo' are more obscure regionally. 'Desierto' is consistent with established Spanish Bible tradition and broadly intelligible. The preposition and article (בַּ = בְּ + הַ) combine naturally with the demonstrative to give 'en este desierto.'
- source_word: הַ/זֶּה
  english_pob_choice: this
  chosen_spanish: este
  alternatives_spanish:
  - este mismo
  lexicon: HALOT
  rationale: The demonstrative הַזֶּה (HALOT 2088) points to the specific wilderness where Israel currently stands. 'Este' is sufficient and natural in Spanish. 'Este mismo' would add an emphatic force ('this very') beyond what the demonstrative strictly warrants, as the English POB also noted.
theological_decisions:
- issue: Severity and physical concreteness of the judgment image in פגריכם
  english_pob_reading: your dead bodies
  chosen_spanish_reading: sus cadáveres
  alternative_spanish_readings:
  - sus cuerpos sin vida
  - sus despojos
  - sus restos
  rationale: 'The verse announces divine judgment on the unbelieving generation: their bodies will not enter the promised land but will fall in the wilderness. ''Cadáveres'' in Spanish carries the same gravity and physical directness as ''dead bodies'' in English — it is sobering and plain without being gratuitously harsh. Softer alternatives like ''sus restos'' or ''sus despojos'' would mute the starkness of the divine sentence. ''Carroña,'' by contrast, would import an animal-remains connotation exceeding the source. ''Cadáveres'' is the theologically appropriate rendering: it preserves the weight of the judgment while remaining within the register of dignified, modern Spanish.'
  doctrine_reference: 'Translation philosophy: preserve the source text''s plain sense with its full sobering force; do not soften judgment language beyond what the source warrants.'
translation_notes:
  revision_awareness: 'The English POB record for NUM.14.32 shows no applied revisions and was confirmed unchanged in the latest revision pass (model: gpt-5.4, 2026-04-23). The cross-check returned high agreement (score 1.0, reviewer: gemini-3.1-pro-preview, 1 pass, 0 issues). The Spanish draft follows the same optimal-equivalence philosophy, working from the WLC Hebrew source and using the English audit trail as audited context rather than a base text for mechanical translation.'
  spanish_consistency_notes:
  - Second-person plural rendered with 'ustedes' (not 'vosotros') throughout, consistent with the neutral Latin American Spanish target register.
  - Yahvé is not applicable in this verse; no divine name decision is required.
  - '''Desierto'' used for מִדְבָּר, covering both ''wilderness'' and ''desert'' senses in Spanish biblical usage, consistent with the English POB''s preference for the broader ''wilderness'' gloss.'
  - Footnote marker [a] is anchored on 'cadáveres' in the Spanish text, where the Hebrew lexical tension (dead bodies / corpses / carcasses) is located — slightly repositioned from the English POB where the marker appeared on 'you,' following the principle that the marker should appear at the word or phrase it glosses.
