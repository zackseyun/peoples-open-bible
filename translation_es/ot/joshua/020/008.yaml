translation:
  language: es
  text: Y al otro lado del Jordán, al oriente de Jericó, designaron a Bézer en el desierto, en la meseta, de la tribu de Rubén; y a Ramot[a] en Galaad, de la tribu de Gad; y a Golán en Basán, de la tribu de Manasés.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Tradicionalmente, «Ramot-galaad». El hebreo dice literalmente «Ramot en Galaad».
    reason: lexical_alternative
lexical_decisions:
- source_word: וּמֵעֵבֶר
  english_pob_choice: And beyond
  chosen_spanish: Y al otro lado de
  alternatives_spanish:
  - Y más allá de
  - Y del otro lado de
  lexicon: HALOT
  rationale: La expresión hebrea indica posición al otro lado de un punto de referencia; en español, «al otro lado de» comunica el sentido espacial con naturalidad y conserva la relación de orientación del texto.
- source_word: לְיַרְדֵּן
  english_pob_choice: the Jordan
  chosen_spanish: el Jordán
  alternatives_spanish:
  - el río Jordán
  lexicon: HALOT
  rationale: Como nombre geográfico, «el Jordán» es natural y fiel al uso bíblico en español; «río» sería explicativo pero no necesario en este contexto.
- source_word: יְרִיחוֹ מִזְרָחָה
  english_pob_choice: east of Jericho
  chosen_spanish: al oriente de Jericó
  alternatives_spanish:
  - al este de Jericó
  - hacia el oriente de Jericó
  lexicon: HALOT
  rationale: La construcción direccional hebrea funciona adverbialmente. «Al oriente de Jericó» conserva el valor geográfico y evita una paráfrasis excesiva.
- source_word: נָתְנוּ
  english_pob_choice: they designated
  chosen_spanish: designaron
  alternatives_spanish:
  - asignaron
  - establecieron
  - dieron
  lexicon: HALOT
  rationale: En este contexto administrativo-jurídico, el verbo no es simple «dar»; «designaron» refleja la acción oficial de apartar ciudades para un propósito específico.
- source_word: בֶּצֶר
  english_pob_choice: Bezer
  chosen_spanish: Bézer
  alternatives_spanish:
  - Bezer
  lexicon: HALOT
  rationale: Nombre propio transliterado de forma estándar al español; se acentúa gráficamente para reflejar el acento prosódico natural en la lectura española.
- source_word: בַּמִּדְבָּר
  english_pob_choice: in the wilderness
  chosen_spanish: en el desierto
  alternatives_spanish:
  - en la soledad
  - en la estepa
  lexicon: HALOT
  rationale: Aquí el término señala una región no cultivada y árida. «Desierto» es la opción más comprensible en español sin perder el valor geográfico general.
- source_word: בַּמִּישֹׁר
  english_pob_choice: on the plateau
  chosen_spanish: en la meseta
  alternatives_spanish:
  - en el llano
  - en la planicie
  lexicon: HALOT
  rationale: El sustantivo denota una zona elevada y nivelada del territorio transjordano. «Meseta» comunica mejor ese relieve que «llano», que puede sonar demasiado genérico.
- source_word: מִמַּטֵּה רְאוּבֵן
  english_pob_choice: from the tribe of Reuben
  chosen_spanish: de la tribu de Rubén
  alternatives_spanish:
  - de entre la tribu de Rubén
  - perteneciente a la tribu de Rubén
  lexicon: HALOT
  rationale: La fórmula marca procedencia/adscripción tribal. «De la tribu de» es la manera más directa y estable en español bíblico contemporáneo.
- source_word: רָאמֹת בַּגִּלְעָד
  english_pob_choice: Ramoth in Gilead
  chosen_spanish: Ramot en Galaad
  alternatives_spanish:
  - Ramot de Galaad
  - Ramot-galaad
  lexicon: HALOT
  rationale: El hebreo presenta el nombre de la ciudad seguido de la localización regional. «En Galaad» sigue de cerca la estructura original; se evita imponer la forma compuesta tradicional en el texto principal.
- source_word: מִמַּטֵּה גָד
  english_pob_choice: from the tribe of Gad
  chosen_spanish: de la tribu de Gad
  alternatives_spanish:
  - perteneciente a la tribu de Gad
  lexicon: HALOT
  rationale: Se mantiene la misma fórmula tribal que en los otros miembros del versículo para conservar la coherencia semántica y sintáctica.
- source_word: גלון
  english_pob_choice: Golan
  chosen_spanish: Golán
  alternatives_spanish:
  - Golan
  lexicon: HALOT
  rationale: Nombre propio geográfico; la forma castellana tradicional normalizada es «Golán».
- source_word: בַּבָּשָׁן
  english_pob_choice: in Bashan
  chosen_spanish: en Basán
  alternatives_spanish:
  - en Bashán
  lexicon: HALOT
  rationale: Se adopta la forma asentada en español bíblico «Basán», que conserva el referente geográfico reconocido.
- source_word: מִמַּטֵּה מְנַשֶּׁה
  english_pob_choice: from the tribe of Manasseh
  chosen_spanish: de la tribu de Manasés
  alternatives_spanish:
  - perteneciente a la tribu de Manasés
  lexicon: HALOT
  rationale: Se conserva la fórmula de adscripción tribal con el nombre bíblico usual en español, «Manasés».
theological_decisions:
- issue: Designación oficial de las ciudades de refugio
  english_pob_reading: they designated
  chosen_spanish_reading: designaron
  alternative_spanish_readings:
  - las dieron
  - las establecieron
  rationale: El contexto de Josué 20 es la asignación formal de ciudades de refugio. «Designaron» mantiene el matiz administrativo y evita reducir la acción a una simple entrega material.
  doctrine_reference: Josué 20:1-9; Números 35:9-15
translation_notes:
  revision_awareness: 'El texto base en inglés ya refleja una decisión de equivalencia óptima: «Ramoth in Gilead» se conserva como estructura analítica, con nota sobre la forma tradicional compuesta. En español se siguió la misma línea: se preserva la localización explícita «en Galaad» en el cuerpo principal y se añade nota para la forma tradicional «Ramot-galaad». No se detectan revisiones aplicadas en el registro inglés final; por tanto, la versión española se alinea con el estado auditado sin introducir cambios interpretativos adicionales.'
  spanish_consistency_notes:
  - Se mantiene la fórmula repetida «de la tribu de...» para las tres asignaciones tribales.
  - 'Se usa la transliteración castellana estándar de los topónimos bíblicos: Bézer, Ramot, Golán, Basán, Galaad, Manasés.'
  - Se conserva el valor geográfico-relacional de «al otro lado del Jordán» sin convertirlo en una paráfrasis explicativa más amplia.
  - La nota sobre Ramot evita sustituir la estructura del texto principal por la forma compuesta tradicional, en coherencia con el audit trail inglés.
