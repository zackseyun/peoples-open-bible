  text: מַֽעֲלֶ֣ה נְשִׂאִים֮ מִ/קְצֵ֪ה הָ֫/אָ֥רֶץ בְּרָקִ֣ים לַ/מָּטָ֣ר עָשָׂ֑ה מֽוֹצֵא ר֝וּחַ מֵ/אֽוֹצְרוֹתָֽי/ו־׃
base_translation:
  language: en
  yaml_path: translation/ot/psalms/135/007.yaml
  text: He makes clouds rise from the ends of the earth[a]; he makes lightning for the rain[c][b]; he brings out the wind from his storehouses.
  footnotes:
  - marker: a
    text: Or 'vapors' for 'clouds.' The Hebrew term can denote rising mist or vapor, but in this storm context 'clouds' best fits the sense.
    reason: lexical_alternative
  - marker: b
    text: Or 'from the end of the earth.' The Hebrew idiom can be singular in form while expressing the earth's farthest reaches collectively.
    reason: lexical_alternative
  - marker: c
    text: Or 'from his treasuries.' The image is of God storing and releasing the winds at will.
    reason: lexical_alternative
