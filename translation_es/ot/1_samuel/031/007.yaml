base_translation:
  language: en
  yaml_path: translation/ot/1_samuel/031/007.yaml
  text: When the men of Israel who were on the other side of the valley[a], and those on the other side of the Jordan, saw that the men of Israel had fled and that Saul and his sons were dead, they abandoned the cities and fled[b]; and the Philistines came and lived in them.
  footnotes:
  - marker: a
    text: Or 'settled in them.' The Hebrew verb can denote dwelling or settling.
    reason: lexical_alternative
  - marker: b
    text: Or 'across the valley' / 'across the Jordan.' The Hebrew expression means 'on the far side of.'
    reason: lexical_alternative
