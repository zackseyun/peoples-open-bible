translation:
  language: es
  text: Pues, así como un hombre ha destruido su enemigo, así tú has destruido la amistad[a] de tu prójimo;
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: ‘así has arruinado la amistad de tu prójimo’ o ‘así has destruido la amistad con tu prójimo’. El genitivo griego τοῦ πλησίον puede entenderse como la amistad que pertenece al prójimo o como la amistad mantenida con el prójimo.'
    reason: lexical_alternative
lexical_decisions:
- source_word: καθὼς γὰρ
  english_pob_choice: For just as
  chosen_spanish: Porque, así como
  alternatives_spanish:
  - Pues, así como
  - Porque tal como
  lexicon: LSJ
  rationale: Conserva la relación explicativa y comparativa del griego, y en español ‘Porque, así como’ introduce bien la comparación proverbial sin endurecer innecesariamente el orden.
- source_word: ἀπώλεσεν
  english_pob_choice: has destroyed
  chosen_spanish: ha destruido
  alternatives_spanish:
  - destruyó
  - ha arruinado
  - ha hecho desaparecer
  lexicon: BDAG
  rationale: ‘Destruido’ mantiene la fuerza de ἀπόλλυμι, que va más allá de una mera ruptura o enfriamiento, y preserva el peso del contraste retórico.
- source_word: ἄνθρωπος
  english_pob_choice: a man
  chosen_spanish: un hombre
  alternatives_spanish:
  - una persona
  - alguien
  - un ser humano
  lexicon: LSJ
  rationale: Se conserva el singular masculino genérico del proverbio, como en el griego y en la decisión inglesa, sin neutralizar indebidamente la forma proverbial.
- source_word: τὸν ἐχθρὸν αὐτοῦ
  english_pob_choice: his enemy
  chosen_spanish: a su enemigo
  alternatives_spanish:
  - a su adversario
  - al que le es hostil
  lexicon: BDAG
  rationale: ‘Enemigo’ es el equivalente directo y natural; el posesivo refleja el vínculo relacional del griego y mantiene el paralelismo con la segunda mitad del verso.
- source_word: ἀπώλεσας
  english_pob_choice: you have destroyed
  chosen_spanish: has destruido
  alternatives_spanish:
  - destruiste
  - has arruinado
  lexicon: BDAG
  rationale: Mantiene la misma raíz verbal que en la primera cláusula y la acusación directa del texto, con un perfecto español natural y solemne.
- source_word: τὴν φιλίαν
  english_pob_choice: the friendship
  chosen_spanish: la amistad
  alternatives_spanish:
  - el vínculo de amistad
  - la relación de amistad
  lexicon: LSJ
  rationale: ‘Amistad’ es el equivalente más claro y fiel de φιλία. No se añade una paráfrasis que debilite la concreción del sustantivo griego.
- source_word: τοῦ πλησίον
  english_pob_choice: of your neighbor
  chosen_spanish: de tu prójimo
  alternatives_spanish:
  - con tu prójimo
  - de tu vecino
  lexicon: BDAG
  rationale: ‘Prójimo’ es el término bíblico más adecuado para πλησίον en un contexto ético sapiencial; conserva la proximidad relacional sin reducirlo a un vecino meramente geográfico.
theological_decisions:
- issue: Fuerza del verbo de destrucción aplicada a una relación
  english_pob_reading: destroyed the friendship
  chosen_spanish_reading: ha destruido la amistad
  alternative_spanish_readings:
  - ha arruinado la amistad
  - ha roto la amistad
  rationale: Se mantiene la severidad del griego ἀπόλλυμι y la lectura inglesa, evitando suavizar la acusación a una simple ruptura de trato o enfriamiento emocional.
  doctrine_reference: DOCTRINE.md §Translation philosophy 1, 5
- issue: Valor genérico de ἄνθρωπος en un dicho sapiencial
  english_pob_reading: a man
  chosen_spanish_reading: un hombre
  alternative_spanish_readings:
  - una persona
  - alguien
  rationale: El masculino singular funciona proverbialmente y preserva la forma del dicho sin imponer una neutralización que el griego no exige.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4
- issue: Genitivo de relación en φιλίαν τοῦ πλησίον
  english_pob_reading: the friendship of your neighbor
  chosen_spanish_reading: la amistad de tu prójimo
  alternative_spanish_readings:
  - la amistad con tu prójimo
  - la amistad de tu vecino
  rationale: 'Se conserva la ambigüedad del genitivo: puede entenderse como la amistad perteneciente al prójimo o como amistad con el prójimo. En español, ‘de tu prójimo’ permite ambas lecturas sin resolver artificialmente la tensión.'
  doctrine_reference: DOCTRINE.md §Lexical and syntactic transparency
translation_notes:
  revision_awareness: El texto griego coincide sustancialmente con el audit trail inglés; la revisión más reciente indicó que no se requirieron cambios. Se conservó la severidad de ἀπόλλυμι y la ambigüedad del genitivo de πλησίον, trasladándolas a un español claro sin diluir el paralelismo sapiencial.
  spanish_consistency_notes:
  - Se prefirió ‘prójimo’ para πλησίον en continuidad con el uso bíblico ético.
  - Se usó ‘amistad’ para φιλία sin expandir a ‘vínculo’ en el texto principal, dejando esa posibilidad en nota.
  - Se mantuvo ‘has destruido’ para reflejar la repetición de ἀπώλεσεν/ἀπώλεσας y la fuerza del verbo.
  - Se empleó puntuación española y estilo sobrio, apto para publicación.
