translation:
  language: es
  text: 'Entonces la palabra de Yahvé vino a Elías el tisbita[a], diciendo:'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Y aconteció que la palabra de Yahvé vino a Elías el tisbita, diciendo».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְהִי
  english_pob_choice: Then ... came
  chosen_spanish: Entonces ... vino
  alternatives_spanish:
  - Y aconteció
  - Y sucedió
  lexicon: HALOT
  rationale: La forma consecutiva introduce la siguiente acción en la narración. En español, «Entonces ... vino» comunica con naturalidad la progresión temporal sin recurrir a una fórmula arcaizante.
- source_word: דְּבַר יְהוָה
  english_pob_choice: the word of Yahweh
  chosen_spanish: la palabra de Yahvé
  alternatives_spanish:
  - el mensaje de Yahvé
  lexicon: HALOT
  rationale: «Palabra» conserva la fuerza profética y revelatoria del hebreo y coincide con la decisión POB de no neutralizar el término en «mensaje».
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - SEÑOR
  lexicon: HALOT
  rationale: Se mantiene el nombre divino propio, conforme al criterio POB de reflejar el Tetragrámaton con una transliteración y no con una sustitución titulada.
- source_word: אֶל
  english_pob_choice: to
  chosen_spanish: a
  alternatives_spanish:
  - para
  lexicon: HALOT
  rationale: En una fórmula de revelación dirigida a una persona, el equivalente natural en español es «a».
- source_word: אֵלִיָּהוּ
  english_pob_choice: Elijah
  chosen_spanish: Elías
  alternatives_spanish:
  - Eliyahu
  lexicon: HALOT
  rationale: Se usa la forma bíblica tradicional y plenamente reconocible en español para el nombre propio.
- source_word: הַתִּשְׁבִּי
  english_pob_choice: the Tishbite
  chosen_spanish: el tisbita
  alternatives_spanish:
  - el de Tisbe
  lexicon: HALOT
  rationale: Se conserva el gentilicio compacto del hebreo. «Tisbita» es transparente en español bíblico y evita expandir innecesariamente el título.
- source_word: לֵאמֹר
  english_pob_choice: saying
  chosen_spanish: diciendo
  alternatives_spanish:
  - y dijo
  lexicon: HALOT
  rationale: «Diciendo» reproduce la función de introducción a la cita directa con una equivalencia formal y natural en español.
theological_decisions:
- issue: Rendering of the divine name יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - Jehová
  rationale: Se traslada al español la decisión doctrinal/auditada del POB de no ocultar el nombre divino bajo una sustitución. «Yahvé» preserva el nombre personal de pacto de forma legible en español.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Formula profética דְּבַר יְהוָה
  english_pob_reading: the word of Yahweh
  chosen_spanish_reading: la palabra de Yahvé
  alternative_spanish_readings:
  - el mensaje de Yahvé
  rationale: La expresión mantiene el peso teológico de una comunicación divina formal, no solo una idea o contenido informativo. «Palabra» conserva mejor la resonancia bíblica del hebreo.
  doctrine_reference: HALOT / prophetic formula usage
translation_notes:
  revision_awareness: El texto fuente, la traducción inglesa auditada y la revisión más reciente coinciden en alto grado; no se registran cambios aplicados. Se conserva la estructura narrativa y la fórmula profética sin ampliar el contenido del versículo.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» en consonancia con la terminología POB para יְהוָה.
  - Se prefirió «palabra» frente a «mensaje» por consistencia con el uso profético bíblico.
  - «Tisbita» reproduce el gentilicio breve del hebreo y coincide con el equivalente auditado en inglés.
  - La puntuación final con dos puntos prepara la cita introducida por «diciendo».
