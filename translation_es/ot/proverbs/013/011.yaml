review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español capta bien el sentido general del proverbio: riqueza vinculada a lo vano/insustancial disminuye, mientras que la acumulación gradual crece. Sin embargo, no preserva completamente el rastro de auditoría del POB en dos puntos: (1) añade «obtenidas», que explicita una adquisición no presente de forma directa en el texto principal revisado en inglés («from vanity»), aunque sí reflejada en racionales previos; y (2) omite en notas la alternativa para עַל־יָד («literalmente, ‘por mano’ / ‘a mano’») que el POB inglés preserva explícitamente.'
  spanish_quality_summary: El español es claro y natural, pero «Las riquezas obtenidas de la vanidad» suena algo pesado y menos proverbial que «La riqueza de la vanidad» o «La riqueza de lo vano». También conviene alinear mejor la colocación de notas con los segmentos que comentan. «La riqueza» suena más idiomático y gnómico que «Las riquezas» en un proverbio de este tipo.
  glossary_alignment: 'No hay términos teológicos sensibles aquí. Las decisiones léxicas clave requieren mejor alineación con el POB: הוֹן se expresa mejor como «la riqueza»; מֵהֶבֶל debe mantener «vanidad/lo vano» sin forzar «obtenidas» en el texto principal; עַל־יָד debe conservar «poco a poco» en el texto, pero con nota que preserve la literalidad «por mano / a mano».'
  issues:
  - severity: medium
    issue: Se añade «obtenidas» en el texto principal para מֵהֶבֶל.
    rationale: Aunque la explicación contextual de adquisición es defendible, el texto inglés auditado fue revisado a «from vanity» precisamente para reflejar más de cerca el hebreo. En español, «de la vanidad» conserva mejor esa relación sin introducir una idea verbal adicional en el cuerpo principal.
  - severity: medium
    issue: Falta una nota para עַל־יָד que preserve la alternativa literal.
    rationale: 'El POB inglés mantiene una nota: «Literally ‘by hand’». El borrador español solo nota מֵהֶבֶל y omite esa alternativa significativa del segundo hemistiquio.'
  - severity: low
    issue: «Las riquezas» suena menos proverbial que «la riqueza».
    rationale: הוֹן funciona bien como sustantivo colectivo/genérico. En español sapiencial, «la riqueza» da una formulación más fluida y sentenciosa.
  - severity: low
    issue: La nota b actual duplica en parte la nota a sobre מֵהֶבֶל.
    rationale: Es preferible distribuir las notas entre los dos puntos léxicos principales del verso en vez de usar dos notas para el mismo segmento y dejar sin nota el segundo modismo.
