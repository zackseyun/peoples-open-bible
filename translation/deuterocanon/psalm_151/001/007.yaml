id: PS151.1.7
reference: Psalm 151 1:7
source:
  edition: lxx-swete-1909
  text: ἐγὼ δὲ σπασάμενος τὴν παρ' αὐτοῦ μάχαιραν ἀπεκεφάλισα αὐτόν, καὶ ἦρα ὄνειδος ἐξ υἱῶν Ἰσραήλ.
  language: Greek
  pages:
  - 432
  confidence: high
translation:
  text: But I drew his own sword and cut off his head[b][a], and I removed disgrace from the sons of Israel.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'beheaded him.'
    reason: lexical_alternative
  - marker: b
    text: Greek 'from the sons of Israel'; this is a traditional collective expression for Israel.
    reason: cultural_note
lexical_decisions:
- source_word: σπασάμενος
  chosen: drew
  alternatives:
  - pulled out
  - unsheathed
  lexicon: LSJ
  rationale: The aorist middle participle from σπάω here refers to drawing a weapon. 'Drew' is idiomatic modern English and fits the military context without overformal wording.
- source_word: τὴν παρ' αὐτοῦ μάχαιραν
  chosen: his own sword
  alternatives:
  - the sword from him
  - the sword at his side
  lexicon: LSJ
  rationale: μάχαιρα is a blade/short sword. The phrase παρ' αὐτοῦ indicates taking it from his person or possession. 'His own sword' captures both possession and the dramatic reversal more naturally than a woodenly literal rendering.
- source_word: ἀπεκεφάλισα
  chosen: cut off his head
  alternatives:
  - beheaded
  lexicon: LSJ
  rationale: The verb means to decapitate. 'Cut off his head' is slightly more explicit and vivid, matching the narrative force and common English understanding.
- source_word: ἦρα
  chosen: removed
  alternatives:
  - lifted away
  - took away
  lexicon: LSJ
  rationale: From αἴρω, here used figuratively with ὄνειδος. 'Removed' communicates the idiomatic sense of taking away reproach/disgrace in clear modern English.
- source_word: ὄνειδος
  chosen: disgrace
  alternatives:
  - reproach
  - shame
  lexicon: LSJ
  rationale: ὄνειδος denotes reproach or disgrace. 'Disgrace' reads naturally in English and fits the public-honor context of Israel's humiliation by Goliath.
- source_word: ἐξ υἱῶν Ἰσραήλ
  chosen: from the sons of Israel
  alternatives:
  - from Israel's sons
  - from the people of Israel
  lexicon: LSJ
  rationale: The Greek is explicitly 'sons of Israel.' Per project philosophy, the masculine form is preserved where present rather than neutralized. 'People of Israel' would smooth away the source wording.
