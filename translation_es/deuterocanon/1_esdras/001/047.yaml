translation:
  language: es
  text: Y los dirigentes del pueblo y de los sacerdotes también cometieron mucha impiedad e iniquidad, por encima de todas las impurezas de todas las naciones, y profanaron el santuario del Señor[a], que había sido santificado en Jerusalén.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'el templo del Señor'. ἱερόν puede referirse al santuario o al conjunto del templo; aquí se ha preferido 'santuario' para mantener el foco en el espacio sagrado profanado.
    reason: lexical_alternative
lexical_decisions:
- source_word: οἱ ἡγούμενοι
  english_pob_choice: the leaders
  chosen_spanish: los dirigentes
  alternatives_spanish:
  - los líderes
  - los que guiaban
  lexicon: BDAG
  rationale: ἡγούμενοι designa a quienes encabezan o dirigen. 'Dirigentes' conserva el sentido de liderazgo sin introducir un cargo más específico de lo que el griego exige.
- source_word: τοῦ λαοῦ καὶ τῶν ἱερέων
  english_pob_choice: of the people and of the priests
  chosen_spanish: del pueblo y de los sacerdotes
  alternatives_spanish:
  - del pueblo y de los sacerdotes
  - del pueblo, incluso de los sacerdotes
  lexicon: BDAG
  rationale: La estructura de dos genitivos implica dos grupos implicados. 'Del pueblo y de los sacerdotes' mantiene esa doble referencia de forma natural en español.
- source_word: πολλὰ ἠσέβησαν
  english_pob_choice: committed much impiety
  chosen_spanish: cometieron mucha impiedad
  alternatives_spanish:
  - obraron con gran impiedad
  - cometieron muchos actos de impiedad
  lexicon: BDAG
  rationale: ἀσεβέω expresa conducta impía o irreverente; en español 'impiedad' conserva bien el registro religioso. 'Mucha' refleja el valor intensivo de πολλὰ con un sustantivo abstracto.
- source_word: καὶ ἠνόμησαν
  english_pob_choice: and lawlessness
  chosen_spanish: y anarquía
  alternatives_spanish:
  - y cometieron actos de iniquidad
  - y obraron sin ley
  lexicon: BDAG
  rationale: ἀνομέω alude a actuar sin ley o contra la ley. 'Anarquía' busca preservar la fuerza de 'sin ley', aunque suene menos literal; se usa como equivalente breve y fuerte para el estado de rechazo de la norma divina.
- source_word: ὑπὲρ πάσας τὰς ἀκαθαρσίας πάντων τῶν ἐθνῶν
  english_pob_choice: beyond all the uncleannesses of all the nations
  chosen_spanish: por encima de todas las impurezas de todas las naciones
  alternatives_spanish:
  - más que todas las impurezas de todas las naciones
  - por encima de todas las inmundicias de todas las naciones
  lexicon: BDAG
  rationale: ὑπέρ aquí expresa superación/exceso, y ἀκαθαρσίαι puede ser 'impurezas', 'inmundicias' o 'defilements'. 'Impurezas' es idiomático y conserva el registro cultual; 'por encima de' mantiene la comparación intensiva.
- source_word: ἐμίαναν
  english_pob_choice: they defiled
  chosen_spanish: profanaron
  alternatives_spanish:
  - contaminaron
  - mancharon
  lexicon: BDAG
  rationale: μιαίνω significa contaminar o profanar, especialmente en contexto sagrado. 'Profanaron' comunica con fuerza la violación de lo santo y queda muy bien en el entorno del santuario.
- source_word: τὸ ἱερὸν τοῦ κυρίου
  english_pob_choice: the sanctuary of the Lord
  chosen_spanish: el santuario del Señor
  alternatives_spanish:
  - el templo del Señor
  - el recinto sagrado del Señor
  lexicon: BDAG
  rationale: ἱερόν puede referirse al santuario o al recinto del templo. 'Santuario' sigue de cerca la decisión inglesa y mantiene el foco en el espacio sagrado profanado.
- source_word: τὸ ἁγιαζόμενον
  english_pob_choice: which had been sanctified
  chosen_spanish: que había sido santificado
  alternatives_spanish:
  - que estaba siendo santificado
  - santificado
  lexicon: BDAG
  rationale: El participio presenta el lugar como consagrado/santificado. En español, 'había sido santificado' expresa con claridad el estado resultante sin perder la relación con el participio griego.
- source_word: ἐν Ἰερουσαλήμ
  english_pob_choice: in Jerusalem
  chosen_spanish: en Jerusalén
  lexicon: BDAG
  rationale: Traducción locativa directa y estándar del topónimo.
theological_decisions:
- issue: κύριος aplicado al Dios de Israel en un contexto del templo
  english_pob_reading: Lord
  chosen_spanish_reading: Señor
  alternative_spanish_readings:
  - Yahvé
  - el Señor
  rationale: Aunque el proyecto general prefiere 'Yahvé' para el nombre divino, aquí el texto griego usa κύριος y el inglés auditado mantiene 'Lord'. En español, 'Señor' preserva esa correspondencia directa con el griego y el registro del contexto del templo, sin imponer una transliteración donde el testimonio inmediato es griego.
  doctrine_reference: 'DOCTRINE.md: κύριος → Lord; distinción entre nombre divino y título griego'
- issue: ἱερόν y la defilement language around sacred space
  english_pob_reading: sanctuary
  chosen_spanish_reading: santuario
  alternative_spanish_readings:
  - templo
  - recinto sagrado
  rationale: El versículo enfatiza la profanación de un espacio consagrado. 'Santuario' preserva el valor cultual y la tensión de un lugar hecho santo en Jerusalén, sin reducirlo necesariamente al edificio en sentido arquitectónico.
  doctrine_reference: POB lexical note on ἱερόν as sacred space
- issue: ἁγιαζόμενον as a completed sanctification in context
  english_pob_reading: which had been sanctified in Jerusalem
  chosen_spanish_reading: que había sido santificado en Jerusalén
  alternative_spanish_readings:
  - que estaba siendo santificado en Jerusalén
  - santificado en Jerusalén
  rationale: El inglés revisado optó por una construcción más natural que sigue entendiendo el participio como estado resultante. El español refleja esa lectura, dejando claro que el lugar ya estaba consagrado en Jerusalén antes de ser profanado.
  doctrine_reference: Revision awareness on participial naturalness
translation_notes:
  revision_awareness: 'La versión inglesa revisada suavizó ''many acts of impiety and lawlessness'' a ''much impiety and lawlessness'' por la fuerza abstracta de πολλὰ, y reemplazó ''the one sanctified in Jerusalem'' por ''which had been sanctified in Jerusalem'' por naturalidad. El español sigue esas decisiones: ''mucha impiedad y anarquía'' y ''que había sido santificado en Jerusalén''.'
  spanish_consistency_notes:
  - Se mantiene una equivalencia formal-óptima, con atención al registro cultual del pasaje.
  - '''Impiedad'' y ''anarquía'' conservan la doble acusación moral-jurídica del griego.'
  - '''Señor'' se usa por correspondencia con el κύριος griego del texto fuente.'
  - Las notas a pie de página señalan alternativas léxicas sin debilitar la línea principal de traducción.
  - '''Santuario'' se eligió para ἱερόν por coherencia con el contexto de profanación sacra.'
