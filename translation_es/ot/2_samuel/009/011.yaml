translation:
  language: es
  text: 'Ziba dijo al rey: «Según todo lo que mi señor el rey ordene a su siervo, así hará tu siervo». Y Mefiboset comía en mi mesa[a], como uno de los hijos del rey.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «mi mesa». Algunas versiones traducen «la mesa del rey» para suavizar el cambio de persona, pero el Texto Masorético conserva la primera persona, probablemente reflejando la perspectiva de David.'
    reason: textual_variant
lexical_decisions:
- source_word: וַיֹּאמֶר
  english_pob_choice: said
  chosen_spanish: dijo
  alternatives_spanish:
  - habló
  - respondió
  lexicon: HALOT
  rationale: La forma wayyiqtol introduce discurso directo de modo narrativo estándar; «dijo» es la equivalencia natural y sobria en español.
- source_word: אֶל הַמֶּלֶךְ
  english_pob_choice: to the king
  chosen_spanish: al rey
  alternatives_spanish:
  - ante el rey
  - al monarca
  lexicon: HALOT
  rationale: La preposición y el sustantivo se mantienen de forma directa y clara; «rey» conserva el valor del hebreo sin añadir matices ceremoniales extra.
- source_word: כְכֹל אֲשֶׁר
  english_pob_choice: According to all that
  chosen_spanish: Según todo lo que
  alternatives_spanish:
  - De acuerdo con todo lo que
  - Conforme a todo lo que
  lexicon: HALOT
  rationale: Se preserva el alcance comprehensivo de la expresión comparativa sin volverla demasiado literal o pesada en español.
- source_word: יְצַוֶּה
  english_pob_choice: commands
  chosen_spanish: ordene
  alternatives_spanish:
  - mande
  - comande
  lexicon: HALOT
  rationale: En una fórmula deferente de obediencia, el subjuntivo expresa bien la dependencia de la acción respecto de la orden real.
- source_word: אֲדֹנִי הַמֶּלֶךְ
  english_pob_choice: my lord the king
  chosen_spanish: mi señor el rey
  alternatives_spanish:
  - mi señor, el rey
  - mi amo el rey
  lexicon: HALOT
  rationale: «Señor» reproduce el valor honorífico de אֲדֹנִי en contexto cortesano; «mi señor el rey» es idiomático y digno en español. Se evita «amo» por sonar más duro de lo que pide el contexto, aunque la relación de servidumbre queda explícita en עבד.
- source_word: עַבְדּוֹ / עַבְדֶּךָ
  english_pob_choice: his servant / your servant
  chosen_spanish: su esclavo / tu esclavo
  alternatives_spanish:
  - su siervo / tu siervo
  - su servidor / tu servidor
  lexicon: HALOT
  rationale: Se conserva la fuerza lexical de עבד como término de dependencia/subordinación. En esta escena de corte, «esclavo» mantiene la tensión histórica y semántica que POB documenta para δοῦλος/עבד cuando no conviene suavizarla a «siervo».
- source_word: כֵּן יַעֲשֶׂה
  english_pob_choice: so ... will do
  chosen_spanish: así hará
  alternatives_spanish:
  - de ese modo hará
  - así lo hará
  lexicon: HALOT
  rationale: La correlación entre «según... así» y la respuesta de obediencia queda bien reflejada con una construcción breve y natural.
- source_word: וּמְפִיבֹשֶׁת
  english_pob_choice: And Mephibosheth
  chosen_spanish: Y Mefiboset
  alternatives_spanish:
  - Y luego Mefiboset
  - Y Mefiboshet
  lexicon: HALOT
  rationale: Se translitera el nombre conforme a la política del proyecto para nombres propios bíblicos al español, sin añadir matiz interpretativo.
- source_word: אֹכֵל
  english_pob_choice: was eating
  chosen_spanish: comía
  alternatives_spanish:
  - estaba comiendo
  - comió
  lexicon: HALOT
  rationale: El participio hebreo expresa una situación habitual/continua; en español, el imperfecto «comía» comunica bien el estado de la acción sin forzar perífrasis.
- source_word: עַל שֻׁלְחָנִי
  english_pob_choice: at my table
  chosen_spanish: en mi mesa
  alternatives_spanish:
  - a mi mesa
  - sobre mi mesa
  lexicon: HALOT
  rationale: Para mesa de comida, «en mi mesa» es el equivalente más natural en español y conserva el sentido relacional del hebreo. Se mantiene la primera persona del posesivo porque el texto masorético la preserva.
- source_word: כְּאַחַד מִבְּנֵי הַמֶּלֶךְ
  english_pob_choice: like one of the king’s sons
  chosen_spanish: como uno de los hijos del rey
  alternatives_spanish:
  - como uno de los hijos del rey
  - como si fuera uno de los hijos del rey
  lexicon: HALOT
  rationale: «Hijos del rey» es la forma idiomática y fiel para expresar el rango comparativo y familiar; «como» conserva la comparación del hebreo.
theological_decisions:
- issue: Preservación del posesivo de primera persona en «mi mesa»
  english_pob_reading: Retain first-person 'my table,' understood as David speaking in the quoted or resumed sense preserved by the Masoretic Text.
  chosen_spanish_reading: Mantener «mi mesa», entendida conforme al texto masorético como voz primera de David conservada sin armonización.
  alternative_spanish_readings:
  - la mesa del rey
  - la mesa de David
  rationale: El hebreo dice שֻׁלְחָנִי, con sufijo de primera persona. La traducción conserva esa forma para no borrar la tensión textual; el contexto deja claro que se trata de la mesa real de David.
  doctrine_reference: Translation philosophy §§1, 3, 5
translation_notes:
  revision_awareness: 'El auditorio en inglés pasó por una revisión importante en la cláusula final: se corrigió una versión que decía «at the king''s table» para volver al texto hebreo «my table». La presente redacción española sigue esa decisión revisada y conserva la primera persona, además de reflejar el imperfecto participial con el imperfecto «comía».'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como término por defecto, aunque este versículo no lo contiene.
  - Se usa «esclavo» para עבד, en línea con la política POB cuando el valor lexical de subordinación debe permanecer visible.
  - Se translitera «Mefiboset» de forma uniforme.
  - Se conserva el tono cortesano sin recurrir a arcaísmos innecesarios.
