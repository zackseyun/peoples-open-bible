translation:
  language: es
  text: Pasan la noche desnudos[a], sin ropa, y no tienen abrigo contra el frío.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Se alojan desnudos, sin vestido, y no tienen abrigo en el frío».'
    reason: lexical_alternative
lexical_decisions:
- source_word: עָרוֹם
  english_pob_choice: naked
  chosen_spanish: desnudos
  alternatives_spanish:
  - sin ropa
  - desnudos completamente
  lexicon: HALOT
  rationale: El adjetivo describe falta de vestimenta; «desnudos» es el equivalente directo, natural y suficientemente vívido en español, sin añadir matices no presentes en el hebreo.
- source_word: יָלִינוּ
  english_pob_choice: spend the night
  chosen_spanish: pasaron la noche
  alternatives_spanish:
  - durmieron
  - alojaron
  lexicon: HALOT
  rationale: לין expresa pasar la noche o alojarse. «Pasaron la noche» conserva la fuerza temporal de permanencia nocturna sin sonar arcaico.
- source_word: מִבְּלִי
  english_pob_choice: without
  chosen_spanish: sin
  alternatives_spanish:
  - careciendo de
  - sin tener
  lexicon: HALOT
  rationale: La combinación expresa ausencia o privación. «Sin» es la forma más directa y natural en español.
- source_word: לְבוּשׁ
  english_pob_choice: clothing
  chosen_spanish: vestido
  alternatives_spanish:
  - ropa
  - ropa puesta
  lexicon: HALOT
  rationale: Aunque el inglés auditó «clothing», en español «vestido» comunica bien la ausencia de prenda/vestimenta en un registro bíblico claro. Se evita «ropa» por sonar más doméstico y menos preciso en paralelo poético.
- source_word: כְּסוּת
  english_pob_choice: covering
  chosen_spanish: cobertura
  alternatives_spanish:
  - cobijo
  - cobertor
  - cobertura contra el frío
  lexicon: HALOT
  rationale: כְּסוּת denota una cobertura o prenda de protección. «Cobertura» mantiene el sentido general sin restringirlo a una manta o a una pieza específica.
- source_word: בַּקָּרָה
  english_pob_choice: against the cold
  chosen_spanish: contra el frío
  alternatives_spanish:
  - en el frío
  - del frío
  lexicon: HALOT
  rationale: El sustantivo indica frío; «contra el frío» refleja la función protectora de la cobertura, siguiendo la lectura auditada del inglés.
translation_notes:
  revision_awareness: La revisión más reciente indica alta concordancia y sin cambios necesarios; esta propuesta mantiene el sentido del hebreo con la equivalencia óptima ya validada en la auditoría inglesa, ajustando solo la formulación española para naturalidad y claridad.
  spanish_consistency_notes:
  - Se mantiene el contraste poético entre falta de vestido y falta de cobertura térmica.
  - No se introduce terminología eclesiástica ajena al texto.
  - «Contra el frío» conserva la función protectora implícita en כְּסוּת y la propuesta inglesa auditada.
