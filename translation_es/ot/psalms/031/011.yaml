review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien la estructura y el sentido general del hebreo: causalidad inicial, vida/años consumidos, fuerza que falla por causa de la iniquidad y huesos que se deterioran. Sin embargo, dos elecciones principales requieren ajuste para alinearse mejor con el rastro auditado: «en dolor» no corresponde tan bien a בְיָגוֹן como «con aflicción/tristeza», y «se debilitan» atenúa la imaginería más fuerte de עָשֵׁשׁוּ (‘desgastarse/consumirse’).'
  spanish_quality_summary: 'El texto es legible y digno, pero algunas combinaciones suenan algo poco idiomáticas en español bíblico natural: «se consume en dolor» y «mis años en gemido» resultan más rígidas de lo necesario. Una ligera revisión mejora fluidez y mantiene la poesía: «se consume con aflicción» y «mis huesos se consumen».'
  glossary_alignment: No hay conflictos con la terminología de proyecto principal. «Iniquidad» preserva adecuadamente עָוֹן según la decisión teológica auditada. No hay términos como Yahvé/Mesías/espíritu que requieran atención especial en este versículo.
  issues:
  - severity: medium
    issue: «en dolor» para בְיָגוֹן
    rationale: Aunque posible, «dolor» desplaza el campo semántico hacia padecimiento general o físico; el hebreo y el English POB enfatizan grief/sorrow. «Aflicción» o «tristeza» preservan mejor el matiz de pesar.
  - severity: medium
    issue: «en gemido» suena poco natural
    rationale: La construcción es comprensible, pero en español resulta más idiomático «con gemidos» o «entre gemidos». Esto conserva el valor nominal de אֲנָחָה y mejora la lectura.
  - severity: medium
    issue: «se debilitan» para עָשֵׁשׁוּ reduce la fuerza de la imagen
    rationale: El verbo hebreo describe desgaste o consumición, no mera debilidad. «Se consumen» o «se desgastan» mantienen mejor la imagen corporal intensa del original y del English POB (‘waste away’).
  revised_spanish_text: Porque mi vida se consume[a] con aflicción, y mis años con gemidos; mi fuerza ha fallado[b] a causa de mi iniquidad, y mis huesos se consumen.
  revised_footnotes:
  - marker: a
    text: O «con tristeza»; el hebreo יָגוֹן puede referirse a aflicción, tristeza o pesar profundo.
    reason: lexical_alternative
  - marker: b
    text: O «ha tropezado» o «se ha tambaleado»; el verbo hebreo es literalmente «tropezar/tambalearse», usado aquí de manera metafórica.
    reason: lexical_alternative
  revision_rationale: Se ajusta «en dolor» a «con aflicción» para reflejar mejor el matiz de grief/sorrow de יָגוֹן, se hace más natural «con gemidos», y se fortalece «se consumen» para preservar la imaginería de desgaste de עָשֵׁשׁוּ. Se mantiene «a causa de mi iniquidad» por fidelidad a la decisión léxica y teológica auditada.
