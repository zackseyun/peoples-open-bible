translation:
  language: es
  text: 'Y en cuanto a los males[a] que el rey Demetrio les hace, le escribimos, diciendo: «¿Por qué has hecho pesado tu yugo sobre nuestros amigos y aliados, los judíos?»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: También puede entenderse como «las injusticias» o «los daños». El griego κακά puede referirse a actos injuriosos u opresivos, no solo al mal moral en abstracto.
    reason: lexical_alternative
lexical_decisions:
- source_word: περὶ τῶν κακῶν
  english_pob_choice: concerning the wrongs
  chosen_spanish: en cuanto a los males[a]
  alternatives_spanish:
  - acerca de las injusticias
  - en cuanto a los daños
  - sobre los males
  lexicon: LSJ
  rationale: κακά puede expresar males, daños o actos injuriosos. «Males» mantiene la amplitud semántica del griego y evita limitarlo a una sola categoría moral o jurídica. Se marca la alternativa porque el texto también puede leerse como injusticias o daños concretos.
- source_word: συντελεῖται εἰς αὐτούς
  english_pob_choice: is doing to them
  chosen_spanish: les hace
  alternatives_spanish:
  - está haciendo contra ellos
  - está cometiendo contra ellos
  - les está infligiendo
  lexicon: LSJ
  rationale: La construcción comunica acciones dañinas dirigidas a ellos. «Les hace» es breve y natural en español, y conserva la idea de un trato hostil sin añadir matices no obligados por el griego.
- source_word: ἐγράψαμεν αὐτῷ
  english_pob_choice: we wrote to him
  chosen_spanish: le escribimos
  alternatives_spanish:
  - le escribimos una carta
  - le escribimos a él
  lexicon: LSJ
  rationale: El aoristo narrativo admite pasado simple en español. «Le escribimos» es fiel y fluido; el complemento dativo se expresa naturalmente sin redundancia.
- source_word: Διὰ τί ἐβάρυνας
  english_pob_choice: Why have you made ... heavy
  chosen_spanish: ¿Por qué has pesado...
  alternatives_spanish:
  - ¿Por qué has hecho pesado...
  - ¿Por qué has cargado...
  - ¿Por qué has agobiado...
  lexicon: LSJ
  rationale: El verbo conserva la metáfora de hacer pesado o cargar. «Has pesado» reproduce directamente la imagen del griego en relación con el yugo, sin sustituirla por una explicación más interpretativa.
- source_word: τὸν ζυγόν σου
  english_pob_choice: your yoke
  chosen_spanish: tu yugo
  alternatives_spanish:
  - tu carga
  - tu opresión
  lexicon: LSJ
  rationale: ζυγός es literalmente «yugo» y funciona como metáfora de dominio opresivo. Se conserva la imagen porque está lexicalmente presente en el original y da fuerza al reproche.
- source_word: ἐπὶ τοὺς φίλους ἡμῶν τοὺς συμμάχους Ἰουδαίους
  english_pob_choice: upon our friends and allies, the Jews
  chosen_spanish: sobre nuestros amigos y aliados, los judíos
  alternatives_spanish:
  - sobre los judíos, nuestros amigos y aliados
  - sobre nuestros amigos, los judíos, aliados
  lexicon: LSJ
  rationale: La apposición identifica a los judíos como «nuestros amigos y aliados». «Sobre» expresa bien el peso metafórico del yugo en español. Se mantiene el orden cercano al griego y la identificación explícita del grupo.
translation_notes:
  revision_awareness: La redacción sigue el sentido confirmado por la versión inglesa revisada, que entiende la frase como un daño o trato hostil concreto contra los judíos, y conserva la metáfora del yugo pesado sin suavizarla.
  spanish_consistency_notes:
  - Se prefirió «Yahvé» en otros contextos del proyecto, pero aquí no aparece el nombre divino.
  - Se mantuvo «judíos» como etnónimo directo, coherente con el griego Ἰουδαίους y con el valor identitario de la apposición.
  - Se conservó la metáfora del yugo para no perder la carga política y opresiva del texto.
