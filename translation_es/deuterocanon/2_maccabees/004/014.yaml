translation:
  language: es
  text: de modo que los sacerdotes ya no estaban deseosos de los servicios del altar, sino que, despreciando el templo y descuidando los sacrificios, se apresuraban a participar en la práctica ilícita[a] en la palestra, después de la convocatoria al lanzamiento del disco[b];
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «provisión ilícita», «patrocinio ilegal» o «sostén prohibido». La expresión griega es difícil y puede referirse al apoyo o suministro vinculado con las actividades atléticas; aquí se ha traducido según el contexto atlético inmediato.
    reason: lexical_alternative
  - marker: b
    text: Literalmente, «después de la convocatoria del disco». Se refiere al llamado para participar en el evento atlético.
    reason: cultural_note
lexical_decisions:
- source_word: λειτουργίας
  english_pob_choice: services
  chosen_spanish: servicios
  alternatives_spanish:
  - ministerios
  - liturgias
  - oficios
  lexicon: LSJ
  rationale: En este contexto cultual, λειτουργία alude al servicio sacerdotal junto al altar. «Servicios» conserva el valor ritual sin imponer un tecnicismo eclesiástico posterior.
- source_word: προθύμους
  english_pob_choice: eager
  chosen_spanish: deseosos
  alternatives_spanish:
  - entusiastas
  - prontos
  - dispuestos
  lexicon: LSJ
  rationale: El adjetivo expresa disposición activa e interés; «deseosos» mantiene la idea de inclinación y fervor, en contraste con el descuido posterior.
- source_word: νεὼ
  english_pob_choice: temple
  chosen_spanish: templo
  alternatives_spanish:
  - santuario
  - recinto sagrado
  lexicon: LSJ
  rationale: Aquí se refiere al templo de Jerusalén como edificio sagrado; «templo» es la equivalencia clara y estándar en español.
- source_word: καταφρονοῦντες
  english_pob_choice: despising
  chosen_spanish: despreciando
  alternatives_spanish:
  - desdeñando
  - tratando con desprecio
  lexicon: LSJ
  rationale: El participio indica menosprecio real, no mera indiferencia. «Despreciando» conserva la fuerza moral del término griego.
- source_word: ἀμελοῦντες
  english_pob_choice: neglecting
  chosen_spanish: descuidando
  alternatives_spanish:
  - desatendiendo
  - haciendo caso omiso de
  lexicon: LSJ
  rationale: La palabra expresa falta de atención debida a los sacrificios. «Descuidando» reproduce bien esa omisión culpable en español.
- source_word: παλαίστρῃ
  english_pob_choice: wrestling school
  chosen_spanish: palestra
  alternatives_spanish:
  - escuela de lucha
  - gimnasio
  lexicon: LSJ
  rationale: Aunque «escuela de lucha» explicita el sentido, «palestra» ya es un préstamo asentado y más cercano al término griego; además deja visible el contexto atlético.
- source_word: παρανόμου χορηγίας
  english_pob_choice: unlawful exercise
  chosen_spanish: ilegal provisión
  alternatives_spanish:
  - provisión ilegal
  - sostén ilícito
  - patrocinio ilícito
  lexicon: LSJ
  rationale: La secuencia es difícil y puede apuntar a una provisión o apoyo ligado a la actividad atlética. Mantener «provisión» conserva la ambigüedad lexical documentada, aunque el contexto sea deportivo.
- source_word: ἔσπευδον μετέχειν
  english_pob_choice: they hurried to take part
  chosen_spanish: se apresuraban a participar de
  alternatives_spanish:
  - se daban prisa por participar en
  - se apresuraban a tomar parte en
  lexicon: LSJ
  rationale: La frase expresa prisa activa hacia la participación. «Se apresuraban a participar de» reproduce el movimiento narrativo con español natural.
- source_word: μετὰ τὴν τοῦ δίσκου πρόσκλησιν
  english_pob_choice: after the summons to the discus throw
  chosen_spanish: después de la convocatoria al lanzamiento del disco
  alternatives_spanish:
  - tras la convocatoria para el lanzamiento del disco
  - después de la llamada al disco
  lexicon: LSJ
  rationale: Πρόσκλησις es una convocatoria o llamado; δίσκος remite al evento atlético del disco. «Convocatoria al lanzamiento del disco» comunica el contexto deportivo para lectores hispanos.
theological_decisions:
- issue: Valor de παρανόμου en relación con la ley ancestral y el contexto helenizante
  english_pob_reading: Rendered as 'unlawful' without specifying whether the unlawfulness is civil, moral, or specifically Torah-based in the English text.
  chosen_spanish_reading: «ilegal» sin precisar si la ilegalidad es civil, moral o conforme a la Ley de Moisés.
  alternative_spanish_readings:
  - sin ley
  - prohibida
  - contraria a la Ley
  rationale: El griego es amplio y el contexto denuncia la participación como contraria al orden debido. «Ilegal» preserva la valoración negativa sin cerrar indebidamente el matiz exacto de la infracción.
  doctrine_reference: Primacía del texto original; preservar la tensión léxica sin resolverla de forma doctrinal.
translation_notes:
  revision_awareness: La redacción española sigue la última revisión inglesa al reflejar un sentido atlético para χορηγία/χορηγίας como provisión o apoyo ligado a la palestra, pero conserva en la nota la ambigüedad léxica documentada por el audit trail. También mantiene la referencia cultural al disco como convocatoria al evento.
  spanish_consistency_notes:
  - Se usa «Yahvé» por defecto solo cuando aparezca el nombre divino; en este versículo no aparece.
  - «Mesías/Cristo» no intervienen aquí.
  - «esclavo», «arrepentimiento» y otros términos de política general no aplican a este pasaje.
  - Se ha preferido «palestra» para mantener cercanía al griego y al contexto atlético; la nota aclara el sentido para lectores no especialistas.
