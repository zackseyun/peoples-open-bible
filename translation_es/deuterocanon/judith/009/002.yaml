  to: 'Y dijo[a]: «Oh Señor, Dios de mi padre Simeón, a quien diste una espada en su mano para venganza contra extranjeros, que soltaron el vientre de una virgen para contaminación y descubrieron su muslo para vergüenza y profanaron su vientre para oprobio; aunque dijiste: “No será así”[c][b], ellos lo hicieron».'
  rationale: Se cambia «Yahvé» por «Señor» para ajustarse a la fuente griega inmediata (Κύριε) y al audit trail documentado. Se refuerza μίασμα con «contaminación», más cercano a la carga de impureza/contaminación ritual y moral. Se sustituye «porque dijiste» por «aunque dijiste» y «y lo hicieron» por «ellos lo hicieron» para preservar el contraste concesivo-adversativo del pasaje. También se añade «su» en «profanaron su vientre» para claridad referencial.
