review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura enumerativa del hebreo y conserva correctamente los dos grupos contados: las diez מְכֹנוֹת y las diez כִּיֹּרוֹת colocadas sobre aquellas. La preposición עַל está bien representada por «sobre». Sin embargo, la nota al pie española no corresponde bien al anclaje ni está plenamente localizada al español: la alternativa «bases» aplica a «soportes», mientras que «traditionally “lavers” for “basins”» se refiere a «palanganas» y no al término marcado.'
  spanish_quality_summary: El español es claro y natural. «Soportes» y «palanganas» son legibles, aunque «palanganas» puede sonar algo doméstico; aun así, es aceptable para כִּיֹּרוֹת en una lista de mobiliario. El problema principal es de nota y consistencia editorial, no de gramática ni de fidelidad general.
  glossary_alignment: No hay términos teológicos de glosario mayor en este versículo. La decisión de traducir מְכֹנוֹת como «soportes» es compatible con el razonamiento auditado («stands/bases»). Conviene ajustar la nota para que solo documente la alternativa léxica pertinente al término marcado, o bien reanclar una segunda nota; dado que el borrador solo tiene una, la reparación mínima es dejar la nota sobre «bases».
  issues:
  - severity: medium
    issue: La nota al pie mezcla dos alternativas léxicas para dos términos distintos bajo un solo anclaje.
    rationale: El marcador [a] está en «soportes», pero la nota también comenta «lavers»/«basins», que corresponde a «palanganas». Esto crea desalineación entre texto y nota y no sigue la disciplina de anclaje requerida.
  - severity: low
    issue: La nota está parcialmente en inglés.
    rationale: «Or» y «traditionally» no están plenamente adaptados al español objetivo del proyecto.
  revised_spanish_text: y los diez soportes[a], y las diez palanganas sobre los soportes,
  revised_footnotes:
  - marker: a
    text: O «bases».
    reason: lexical_alternative
  revision_rationale: Se mantiene el texto principal, que es fiel y natural, y se corrige la nota para que coincida exactamente con el término anclado y esté plenamente en español. No hace falta adjudicación adicional.
