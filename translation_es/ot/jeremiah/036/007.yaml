revisions:
- from: Quizás su súplica caiga[a] delante de Yahvé, y cada hombre[b] se vuelva de su mal camino, porque grande es la ira y el furor[c] que Yahvé ha dicho contra este pueblo.
  to: Quizá su súplica caiga[a] delante de Yahvé, y cada hombre[b] se vuelva de su mal camino, porque grande es la ira y el furor que Yahvé ha hablado contra este pueblo[c].
  rationale: Se conserva la traducción base porque representa bien el hebreo y la terminología del proyecto, pero se corrige la nota [c] para alinearla con el audit trail inglés y con una decisión exegética importante. También se mejora levemente la naturalidad de «ha dicho» a «ha hablado» y se hace un ajuste estilístico menor de «Quizás» a «Quizá».
  reviewer_model: gpt-5.4
