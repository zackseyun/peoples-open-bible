  text: Therefore[a], having been exalted to the right hand of God, and having received from the Father the promise of the Holy Spirit[b], he has poured out this that you yourselves are seeing and hearing.
  footnotes:
  - marker: a
    text: Or 'by the right hand of God.' The Greek dative can be understood either as location/exaltation ('to the right hand') or instrument ('by the right hand').
    reason: alternative_reading
  - marker: b
    text: Or 'the promise of the Holy Spirit.' The Greek may be read either as the Spirit himself being the promised gift or as the promise concerning the Spirit.
    reason: lexical_alternative
