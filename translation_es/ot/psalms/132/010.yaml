translation:
  language: es
  text: Por causa de David tu siervo, no apartes el rostro de tu ungido.[a][b]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «no rechaces a tu ungido»; literalmente: «no apartes el rostro de tu ungido».'
    reason: lexical_alternative
  - marker: b
    text: «Tu ungido» también puede traducirse «tu Mesías», especialmente a la luz del contexto davídico y canónico.
    reason: alternative_reading
lexical_decisions:
- source_word: בַּעֲבוּר
  english_pob_choice: For the sake of
  chosen_spanish: Por amor de
  alternatives_spanish:
  - Por causa de
  - Por el bien de
  - A favor de
  lexicon: HALOT
  rationale: La expresión preposicional marca motivo o apelación basada en David. En español, «por amor de» comunica bien la idea de un ruego fundado en la consideración de David, sin volverse tan causal como «por causa de».
- source_word: דָּוִד
  english_pob_choice: David
  chosen_spanish: David
  lexicon: nombre propio
  rationale: Nombre propio conservado por transliteración estándar en español.
- source_word: עַבְדֶּךָ
  english_pob_choice: your servant
  chosen_spanish: tu siervo
  alternatives_spanish:
  - tu esclavo
  lexicon: HALOT
  rationale: Aunque el campo léxico puede ser «esclavo/siervo», en un contexto real y de oración la forma tradicional y natural en español es «siervo». Aquí mantiene la relación de sometimiento y servicio sin sonar innecesariamente duro.
- source_word: אַל
  english_pob_choice: do not
  chosen_spanish: 'no'
  alternatives_spanish:
  - no sea que
  - jamás
  lexicon: HALOT
  rationale: La partícula negativa en una súplica prohibitiva se expresa naturalmente con «no» en español.
- source_word: תָּשֵׁב
  english_pob_choice: turn away
  chosen_spanish: apartes
  alternatives_spanish:
  - rechaces
  - vuelvas aparte
  lexicon: HALOT
  rationale: El hebreo usa una imagen concreta de «volver aparte/retirar». «Apartes el rostro» preserva la metáfora de manera natural en español y evita volverla demasiado interpretativa con «rechaces» en el texto principal.
- source_word: פְּנֵי
  english_pob_choice: the face
  chosen_spanish: el rostro
  alternatives_spanish:
  - la presencia
  - el favor
  lexicon: HALOT
  rationale: Se conserva la imagen concreta de «rostro», equivalente idiomático claro en español. «Presencia» o «favor» explicitan el sentido pero suavizan la metáfora hebrea.
- source_word: מְשִׁיחֶךָ
  english_pob_choice: your anointed one
  chosen_spanish: tu ungido
  alternatives_spanish:
  - tu Mesías
  - tu rey ungido
  lexicon: HALOT
  rationale: «Ungido» reproduce con fidelidad el título hebreo y mantiene la resonancia real y teológica sin resolver de antemano la lectura mesiánica más amplia. En español, «Mesías» queda como alternativa cuando el contexto canónico lo hace explícito.
theological_decisions:
- issue: Si מְשִׁיחֶךָ debe sonar como título mesiánico explícito en el texto principal
  english_pob_reading: your anointed one
  chosen_spanish_reading: tu ungido
  alternative_spanish_readings:
  - tu Mesías
  rationale: El contexto inmediato habla de David y de la línea davídica; por eso el término principal debe conservar el título real hebreo. «Tu ungido» mantiene la tensión entre referencia histórica y alcance canónico posterior, sin cerrarla prematuramente.
  doctrine_reference: Translate titles; preserve canonical tension.
translation_notes:
  revision_awareness: El borrador sigue el paquete fuente hebreo y la auditoría inglesa sin cambios relevantes en la revisión más reciente; se conserva la metáfora concreta del rostro y la tensión entre «ungido» y la posible lectura mesiánica.
  spanish_consistency_notes:
  - Se mantuvo «siervo» para עבד en un registro de oración real/covenantal.
  - Se prefirió «rostro» frente a «presencia» para no perder la imagen hebrea.
  - Se usó «ungido» en el cuerpo y «Mesías» solo como alternativa anotada, conforme a la preferencia del proyecto de traducir títulos.
