    text: 'Arameo: «comer la sal del palacio», un modismo que significa recibir sustento de la corte o estar al servicio del palacio real.'
    reason: cultural_note
  - marker: b
    text: Literalmente, «la desnudez del rey», un modismo para la deshonra, el perjuicio o el daño del rey.
    reason: lexical_alternative
  revision_rationale: Se corrige la nota literal para que coincida con la evidencia fuente y el rastro inglés; se reemplaza «no nos conviene» por «no es apropiado para nosotros» para reflejar mejor el matiz de propiedad; y se cambia «dado aviso» por «informado» para una correspondencia léxica más precisa y un registro más natural. También se usa «presenciar» para armonizar con la revisión inglesa auditada sin perder naturalidad en español.
