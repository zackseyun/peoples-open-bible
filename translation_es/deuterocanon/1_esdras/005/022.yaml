translation:
  language: es
  text: Los hijos de Kalamókalos y de Onús[a], setecientos veinticinco; los hijos de Jericó, doscientos cuarenta y cinco.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'El paralelo hebreo en la tradición de Esdras/Nehemías difiere notablemente aquí, y lee aproximadamente: «los hombres de Betel y Hai, doscientos veintitrés». 1 Esdras preserva en el testimonio griego un conjunto distinto de nombres y totales.'
    reason: alternative_reading
lexical_decisions:
- source_word: υἱοὶ
  english_pob_choice: the sons of
  chosen_spanish: los hijos de
  alternatives_spanish:
  - los descendientes de
  - los miembros de
  lexicon: LSJ
  rationale: En esta lista censal, υἱοὶ funciona como fórmula genealógica o de agrupación. «Los hijos de» preserva la estructura formal del griego y sigue siendo natural en español bíblico.
- source_word: Καλαμωκάλου
  english_pob_choice: Kalamokalos
  chosen_spanish: Kalamókalos
  alternatives_spanish:
  - Calamókalos
  - Kalamocalos
  lexicon: LSJ
  rationale: Es un nombre propio transliterado desde el testimonio griego. Se conserva la forma griega en español con acento para facilitar la lectura, sin armonizarla con paralelos hebreos distintos.
- source_word: Ὠνούς
  english_pob_choice: Onous
  chosen_spanish: Onús
  alternatives_spanish:
  - Onous
  - Ono
  lexicon: LSJ
  rationale: También es un nombre propio en el testimonio griego. Se translitera de manera directa al español, manteniendo el valor propio del texto fuente.
- source_word: ἑπτακόσιοι εἴκοσι πέντε
  english_pob_choice: seven hundred twenty-five
  chosen_spanish: setecientos veinticinco
  alternatives_spanish:
  - setecientos veinticinco
  - setecientos veinticinco
  lexicon: LSJ
  rationale: Es el cardinal simple del griego. «Setecientos veinticinco» es la forma clara y natural en español moderno.
- source_word: Ἰερήχου
  english_pob_choice: Jericho
  chosen_spanish: Jericó
  alternatives_spanish:
  - Jericho
  lexicon: LSJ
  rationale: Se usa la forma castellana habitual del topónimo, plenamente inteligible y fiel al referente del griego.
- source_word: διακόσιοι τεσσεράκοντα πέντε
  english_pob_choice: two hundred forty-five
  chosen_spanish: doscientos cuarenta y cinco
  alternatives_spanish:
  - doscientos cuarenta y cinco
  lexicon: LSJ
  rationale: Es el cardinal simple del griego. La forma española moderna reproduce con precisión el número sin añadidos.
theological_decisions:
- issue: Desajuste entre el testimonio griego de 1 Esdras y el paralelo aproximado en Esdras/Nehemías hebreo
  english_pob_reading: Translate the Greek names and numbers as given, without harmonizing to the MT's 'Bethel and Ai ... two hundred twenty-three.'
  chosen_spanish_reading: Traducir los nombres y números griegos tal como están, sin armonizarlos con el paralelo hebreo aproximado.
  alternative_spanish_readings:
  - Ajustar el versículo a los nombres y la cifra del paralelo hebreo.
  rationale: La prioridad textual es el griego de 1 Esdras. Armonizarlo con el paralelo hebreo borraría una diferencia real del testimonio recibido y oscurecería la lectura de este libro deuterocanónico.
  doctrine_reference: 'PHILOSOPHY.md: Deuterocanonical / Apocrypha; Translation philosophy §1'
translation_notes:
  revision_awareness: Se corrigió el problema anterior eliminando notas al pie no ancladas en el texto. La presente redacción mantiene el testimonio griego primario y presenta los nombres en transliteración española legible.
  spanish_consistency_notes:
  - Se mantiene «hijos de» como fórmula genealógica estable.
  - Se evita «SEÑOR» u otras sustituciones teológicas porque no aparecen nombres divinos en este versículo.
  - Los nombres propios se transliteran de modo consistente y publicable en español.
  - Los números se presentan en cardinales españoles naturales, sin comas ni conjunciones innecesarias.
