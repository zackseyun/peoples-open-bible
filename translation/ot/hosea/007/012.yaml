theological_decisions:
- issue: Nature of divine action in אַיְסִרֵם
  chosen_reading: Render as 'I will discipline them' rather than a purely punitive gloss.
  alternative_readings:
  - I will punish them
  - I will chastise them
  rationale: The Hebrew יסר often includes corrective discipline, not only retribution. This preserves the prophetic tension of judgment with covenantal correction rather than resolving it into sheer punishment.
  doctrine_reference: Translation philosophy §3
- issue: Interpretation of the difficult final clause כְּשֵׁמַע לַעֲדָתָם
  chosen_reading: Keep a relatively literal rendering in the main text and preserve a smoother alternative in a footnote.
  alternative_readings:
  - according to what was proclaimed in their assembly
  - as their congregation has heard
  rationale: The clause is syntactically difficult and admits multiple construals. A transparent rendering in the main text best reflects original-language primacy while preserving ambiguity rather than over-resolving it.
  doctrine_reference: Translation philosophy §§1, 3
