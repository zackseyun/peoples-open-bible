review_pass:
  verdict: revise
  source_alignment_summary: El borrador refleja bien la estructura causal del griego, el participio «habiéndole provocado», el pecado «contra», la entrega judicial «en manos de», y conserva los dos títulos reales de Nabucodonosor. Sin embargo, altera indebidamente «τὸν κύριον τοῦ Ἰσραὴλ τὸν οὐράνιον» al introducir «Yahvé» en el texto principal donde la fuente griega tiene κύριον, no el nombre divino explícito. La aposición también queda mejor como «el celestial» aplicada al «Señor de Israel», no separando «Yahvé» y «el Señor de Israel» como si fueran dos designaciones yuxtapuestas distintas.
  spanish_quality_summary: El español es mayormente claro y digno, pero «contra Yahvé, el Señor de Israel» suena interpretativo y sobrecargado frente al griego. Una redacción más fiel y natural es «contra el Señor de Israel, el celestial». El resto del verso lee bien en español bíblico moderno.
  glossary_alignment: 'Buen alineamiento general con la terminología del proyecto, salvo una excepción importante: la política de usar «Yahvé» aplica para יהוה/YHWH, pero aquí la fuente base es griega y dice κύριον. Dado que el propio audit trail inglés documenta «Lord of Israel» y subraya no importar «God» desde tradiciones paralelas, también debe evitarse importar «Yahvé» aquí. «Nabucodonosor», «caldeos», «pecaron» y «el celestial» están bien encaminados.'
  issues:
  - severity: high
    issue: Se introdujo «Yahvé» en el texto principal sin respaldo del griego base.
    rationale: La fuente primaria para 1 Esdras es el griego, y aquí lee «τὸν κύριον τοῦ Ἰσραήλ», no el tetragrámaton. Añadir «Yahvé» sobretraduce e incorpora información no expresada en esta línea.
  - severity: medium
    issue: La frase «Yahvé, el Señor de Israel, el celestial» distorsiona la relación appositiva del original.
    rationale: El griego presenta «el Señor de Israel, el celestial» como una secuencia continua. La inserción de «Yahvé» crea una estructura menos precisa y más pesada en español.
  - severity: low
    issue: La nota teológica sobre κύριος y Yahvé justifica una decisión que no debería aplicarse en este versículo.
    rationale: La explicación doctrinal mezcla la política general sobre YHWH con un contexto donde el texto fuente usa κύριος. Conviene corregir el texto y dejar que la nota alternativa sobre «Dios del cielo» siga cubriendo la principal cuestión léxica.
  revised_spanish_text: Y porque nuestros padres[a], habiéndole provocado, pecaron contra el Señor de Israel, el celestial[b], él los entregó en manos de Nabucodonosor, rey de Babilonia, rey de los caldeos.
  revised_footnotes:
