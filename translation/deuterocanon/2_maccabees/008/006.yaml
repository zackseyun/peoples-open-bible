translation:
  text: And coming upon cities and countryside unexpectedly[a], he would set them on fire; and by seizing strategic places, he put not a few of the enemies to flight,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'advantageous positions' for 'strategic places' (ἐπικαίρους τόπους).
    reason: lexical_alternative
lexical_decisions:
- source_word: πόλεις
  chosen: cities
  alternatives:
  - towns
  lexicon: LSJ
  rationale: Standard sense of urban settlements; 'cities' is the most natural broad rendering in context.
- source_word: χώρας
  chosen: countryside
  alternatives:
  - regions
  - country districts
  - lands
  lexicon: LSJ
  rationale: Contrasts with πόλεις and refers to rural territory rather than political 'countries'; 'countryside' preserves the urban/rural pairing idiomatically.
- source_word: ἀπροσδοκήτως
  chosen: unexpectedly
  alternatives:
  - suddenly
  - without warning
  lexicon: LSJ
  rationale: Conveys the sense of arriving when not expected. 'Unexpectedly' is close to the adverb's plain force without overinterpreting the manner.
- source_word: ἐρχόμενος
  chosen: would come upon
  alternatives:
  - coming
  - arriving
  - making raids on
  lexicon: LSJ
  rationale: The participle describes repeated action in narrative sequence. 'Would come upon' captures iterative force in smooth English and fits the surprise-attack context.
- source_word: ἐνεπίμπρα
  chosen: set ... on fire
  alternatives:
  - burned
  - was burning
  lexicon: LSJ
  rationale: The verb means to burn or set ablaze. 'Set them on fire' makes the transitive force explicit and reads naturally in English.
- source_word: ἐπικαίρους τόπους
  chosen: strategic places
  alternatives:
  - opportune positions
  - critical locations
  - advantageous places
  lexicon: LSJ
  rationale: The adjective denotes what is suitable or advantageous at the right moment; in military context 'strategic places' best conveys tactically important positions.
- source_word: ἀπολαμβάνων
  chosen: seizing
  alternatives:
  - occupying
  - taking possession of
  - capturing
  lexicon: LSJ
  rationale: In context of places, the sense is taking control of them. 'Seizing' is concise and militarily appropriate.
- source_word: οὐκ ὀλίγους
  chosen: not a few
  alternatives:
  - many
  - quite a number
  lexicon: LSJ
  rationale: This litotes is worth preserving because it reflects the Greek rhetorical style while remaining intelligible in English.
- source_word: τῶν πολεμίων
  chosen: of the enemies
  alternatives:
  - of the enemy
  lexicon: LSJ
  rationale: The plural article and noun are naturally rendered 'the enemies'; this avoids collapsing the Greek plural into a collective singular.
- source_word: τροπούμενος
  chosen: put to flight
  alternatives:
  - routing
  - turning back
  - defeating
  lexicon: LSJ
  rationale: The middle/passive-form participle here carries the sense of causing enemies to turn in flight or be routed. 'Put to flight' preserves the military nuance better than the more general 'defeating'.
