translation:
  language: es
  text: Se apoya en su casa[a], pero no se sostiene; la toma[b], pero no perdura.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «confía en su casa». El verbo hebreo puede denotar tanto apoyarse físicamente en algo como depender de ello para sostén.'
    reason: lexical_alternative
  - marker: b
    text: El hebreo repite la imagen de algo que no se mantiene en pie, preservando el paralelismo poético; el sentido es que aquello de lo que depende resulta inestable.
    reason: cross_reference
lexical_decisions:
- source_word: יִשָּׁעֵ֣ן
  english_pob_choice: leans
  chosen_spanish: se apoya
  alternatives_spanish:
  - se inclina
  - se recuesta
  - depende
  lexicon: HALOT
  rationale: El nifal de שׁען puede expresar tanto apoyarse físicamente como depender de algo para sostén. «Se apoya» conserva la imagen concreta y también deja abierta la idea de confianza o dependencia sin explicitarla de más.
- source_word: בֵּ֭ית/וֹ
  english_pob_choice: his house
  chosen_spanish: su casa
  alternatives_spanish:
  - su casa
  - su hogar
  - su familia
  lexicon: HALOT
  rationale: בַּיִת normalmente significa «casa». En este símil conviene mantener la imagen concreta antes que interpretarla como «hogar» o «familia».
- source_word: יַעֲמֹ֑ד
  english_pob_choice: but it does not stand
  chosen_spanish: no se sostiene
  alternatives_spanish:
  - no permanece en pie
  - no se mantiene
  - no queda firme
  lexicon: HALOT
  rationale: עמד significa «estar de pie, permanecer». En español, «no se sostiene» comunica de forma natural la idea de no mantenerse firme en el paralelismo poético.
- source_word: יַחֲזִ֥יק
  english_pob_choice: takes hold of it
  chosen_spanish: se aferra a ella
  alternatives_spanish:
  - la toma con fuerza
  - la sujeta
  - la agarra
  lexicon: HALOT
  rationale: El hiphil de חזק puede significar tomar o agarrar con firmeza. «Se aferra a ella» mantiene la fuerza del gesto y deja visible el matiz de insistencia o dependencia.
- source_word: בּ֝֗/וֹ
  english_pob_choice: of it
  chosen_spanish: a ella
  alternatives_spanish:
  - de ella
  - sobre ella
  - en ella
  lexicon: HALOT
  rationale: Con חזק, el complemento en español puede expresarse de manera más natural con «a ella» tras «se aferra», sin perder la referencia al objeto de la acción.
- source_word: וְ/לֹ֣א יָקֽוּם
  english_pob_choice: but it does not endure
  chosen_spanish: pero no permanece
  alternatives_spanish:
  - pero no se levanta
  - pero no dura
  - pero no queda en pie
  lexicon: HALOT
  rationale: קום aquí, en paralelo con עמד, describe la incapacidad de quedar establecido o erguido. «No permanece» respeta el paralelismo y evita repetir exactamente la misma idea de la primera cola.
translation_notes:
  revision_awareness: La versión inglesa revisada pasó de «grasps hold of» y «does not remain standing» a «takes hold of» y «does not endure». La versión española sigue esa intención de mayor naturalidad, pero conserva el paralelismo hebreo con un verbo distinto en la segunda cola y evita un giro excesivamente literal.
  spanish_consistency_notes:
  - Se mantiene «casa» para בַּיִת, conforme al valor léxico más directo y a la imagen poética.
  - «Se apoya» y «se aferra» distinguen los dos verbos hebreos sin borrar su campo semántico compartido de sostén/dependencia.
  - «No permanece» funciona como equivalente español de la inestabilidad final y permite una lectura continua con el paralelismo del versículo.
