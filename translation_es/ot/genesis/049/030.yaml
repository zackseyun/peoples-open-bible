translation:
  language: es
  text: en la cueva que está en el campo de Macpela, que está frente a Mamre[a], en la tierra de Canaán, que Abraham compró junto con el campo de Efrón el hitita, como propiedad para sepultura[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «mirando a Mamre» o «ante Mamre»; la expresión hebrea indica una ubicación en relación con Mamre.
    reason: lexical_alternative
  - marker: b
    text: Lit. «como posesión para sepultura»; el hebreo subraya una propiedad legal destinada al entierro.
    reason: lexical_alternative
lexical_decisions:
- source_word: בַּמְּעָרָה
  english_pob_choice: in the cave
  chosen_spanish: en la cueva
  alternatives_spanish:
  - en la gruta
  lexicon: HALOT
  rationale: מְעָרָה designa una cavidad natural o excavación; en español, «cueva» es la equivalencia más natural y fiel al uso narrativo.
- source_word: אֲשֶׁר בִּשְׂדֵה הַמַּכְפֵּלָה
  english_pob_choice: that is in the field of Machpelah
  chosen_spanish: que está en el campo de Macpela
  alternatives_spanish:
  - que está en el campo de la Doble Cueva
  - que está en el campo de Machpelah
  lexicon: HALOT
  rationale: Se mantiene el nombre propio transliterado como «Macpela»; «campo» reproduce שָׂדֶה de forma directa y natural. La cláusula relativa conserva la identificación locativa de la cueva.
- source_word: עַל פְּנֵי מַמְרֵא
  english_pob_choice: opposite Mamre
  chosen_spanish: frente a Mamre
  alternatives_spanish:
  - opuesto a Mamre
  - mirando a Mamre
  lexicon: HALOT
  rationale: La locución espacial עַל־פְּנֵי expresa relación de ubicación; «frente a» comunica bien el sentido locativo sin reducirlo solo a cercanía.
- source_word: בְּאֶרֶץ כְּנָעַן
  english_pob_choice: in the land of Canaan
  chosen_spanish: en la tierra de Canaán
  alternatives_spanish:
  - en el país de Canaán
  lexicon: HALOT
  rationale: «Tierra de Canaán» es la equivalencia natural y estándar para בְּאֶרֶץ כְּנָעַן en un contexto bíblico geográfico.
- source_word: אֲשֶׁר קָנָה אַבְרָהָם
  english_pob_choice: which Abraham bought
  chosen_spanish: que Abraham compró
  alternatives_spanish:
  - que Abraham adquirió
  lexicon: HALOT
  rationale: קָנָה en este contexto se refiere a compra; «compró» preserva el acto legal y narrativo con claridad idiomática.
- source_word: אֶת הַשָּׂדֶה
  english_pob_choice: with the field
  chosen_spanish: junto con el campo
  alternatives_spanish:
  - el campo
  lexicon: HALOT
  rationale: Aunque el hebreo marca «el campo» como objeto directo, el contexto de Génesis 23 muestra que la cueva se adquiere con el campo. «Junto con el campo» preserva esa coordinación sin borrar el objeto textual.
- source_word: מֵאֵת עֶפְרֹן הַחִתִּי
  english_pob_choice: from Ephron the Hittite
  chosen_spanish: de manos de Efrón el hitita
  alternatives_spanish:
  - a Efrón el hitita
  - de Efrón el hitita
  lexicon: HALOT
  rationale: מֵאֵת indica la procedencia del vendedor en una transacción; «de manos de» expresa bien el traspaso de propiedad. «Hitita» traduce el gentilicio.
- source_word: לַאֲחֻזַּת קָבֶר
  english_pob_choice: as a burial property
  chosen_spanish: como posesión funeraria
  alternatives_spanish:
  - como posesión de sepultura
  - como propiedad de sepultura
  lexicon: HALOT
  rationale: אֲחֻזָּה tiene fuerza jurídica de posesión; קָבֶר alude a tumba/entierro. «Posesión funeraria» conserva la idea de propiedad destinada a sepultura, sin volverla un simple «sitio».
theological_decisions:
- issue: Valor jurídico de la compra y de la propiedad sepulcral
  english_pob_reading: the Hebrew emphasizes a legally held property designated for burial
  chosen_spanish_reading: el hebreo enfatiza una posesión legal destinada a sepultura
  alternative_spanish_readings:
  - un lugar de entierro
  - una tumba familiar
  rationale: Se conserva el énfasis legal de אֲחֻזָּה y no se diluye en una fórmula meramente espacial. Esto sigue la lectura auditada del POB.
  doctrine_reference: propiedad pactal y memoria de la sepultura patriarcal (Génesis 23; 49:30)
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión del POB inglés que corrige la relación entre «el campo» y la cláusula relativa final, preservando que Abraham compró el campo y que la cueva queda situada dentro de él. La redacción española evita convertir el objeto del verbo en una preposición, y retiene la fuerza jurídica de la expresión final.
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando aparezca el tetragrámaton; en este versículo no aparece.
  - «Macpela» se translitera como nombre propio del lugar, coherente con el tratamiento de topónimos en el proyecto.
  - «Hitita» traduce el gentilicio, manteniendo el valor étnico-histórico.
  - Se evitó «sepultura» como simple lugar físico para no perder el matiz de posesión legal documentado en el POB inglés.
