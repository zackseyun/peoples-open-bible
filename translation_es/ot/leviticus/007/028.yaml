lexical_decisions:
- source_word: וַיְדַבֵּר
  english_pob_choice: And ... spoke
  chosen_spanish: Y habló
  alternatives_spanish:
  - Entonces habló
  - Y dijo
  lexicon: HALOT
  rationale: El wayyiqtol de דבר introduce la siguiente unidad narrativa y de habla. En español, 'Y habló' conserva la progresión narrativa y distingue 'hablar' de los verbos de introducción de discurso como 'decir', sin sonar forzado.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  - el SEÑOR
  lexicon: HALOT
  rationale: 'Se preserva el nombre propio divino del hebreo en la forma establecida por la política del proyecto: ''Yahvé''. No se sustituye por un título como ''el SEÑOR'', para no borrar el nombre del pacto.'
- source_word: אֶל
  english_pob_choice: to
  chosen_spanish: a
  alternatives_spanish:
  - hacia
  - para
  lexicon: HALOT
  rationale: La preposición marca el destinatario del habla. En español, 'a' es la equivalencia natural y precisa para introducir el complemento indirecto.
- source_word: מֹשֶׁה
  english_pob_choice: Moses
  chosen_spanish: Moisés
  alternatives_spanish:
  - Moisés
  lexicon: HALOT
  rationale: Nombre propio bíblico en la forma española estándar.
- source_word: לֵּאמֹר
  english_pob_choice: saying
  chosen_spanish: diciendo
  alternatives_spanish:
  - para decir
  lexicon: HALOT
  rationale: La fórmula infinitiva de introducción de discurso se vierte de forma idiomática con 'diciendo', que conserva la función formal de encabezar el discurso directo.
theological_decisions:
- issue: Rendering the divine name יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Jehová
  - el SEÑOR
  rationale: El texto hebreo usa directamente el Tetragrámaton; por fidelidad auditada al nombre del pacto, el español debe reflejarlo como 'Yahvé' y no como una sustitución titulativa.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
translation_notes:
  revision_awareness: El borrador corrige la validación anterior asegurando que el marcador de nota [a] aparece exactamente en el texto español, anclado sobre el nombre divino.
