translation:
  language: es
  text: Pero al impío, Dios le dice:[a] «¿Qué derecho tienes para recitar mis estatutos y para tomar[b] mi pacto sobre tus labios?»
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, más literalmente: «¿Qué tienes tú que ver con recitar mis estatutos?»'
    reason: lexical_alternative
  - marker: b
    text: 'Más literalmente: «y tomar mi pacto sobre tu boca».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְלָרָשָׁע
  english_pob_choice: But to the wicked
  chosen_spanish: Pero al impío
  alternatives_spanish:
  - Pero al malvado
  - Pero al perverso
  - Pero al culpable
  lexicon: HALOT
  rationale: El hebreo introduce un contraste adversativo con la línea anterior; «Pero» conserva ese giro. «Impío» comunica bien la categoría moral de רָשָׁע en un registro bíblico claro y natural en español, sin reducirlo a una mera noción forense de culpa.
- source_word: אָמַר אֱלֹהִים
  english_pob_choice: God says
  chosen_spanish: Dios le dice
  alternatives_spanish:
  - Dios dice
  - Dios dijo
  lexicon: HALOT
  rationale: Aunque el verbo hebreo está en perfecto, en la introducción de discurso directo poético funciona como una fórmula viva. En español, «le dice» mantiene esa fuerza inmediata y reproduce bien el tono de reproche divino.
- source_word: מַה לְּךָ
  english_pob_choice: What right do you have
  chosen_spanish: ¿Qué derecho tienes
  alternatives_spanish:
  - ¿Qué tienes que ver
  - ¿Qué te corresponde
  - ¿Qué derecho tienes tú
  lexicon: HALOT
  rationale: La expresión es idiomática y cuestiona la legitimidad o idoneidad del destinatario, no pide información. «¿Qué derecho tienes?» preserva esa fuerza de desafío en un español natural y preciso.
- source_word: לְסַפֵּר
  english_pob_choice: to recount
  chosen_spanish: para recitar
  alternatives_spanish:
  - para contar
  - para declarar
  - para enumerar
  lexicon: HALOT
  rationale: Aquí סָפַר alude a repetir o verbalizar los mandatos divinos. «Recitar» conserva la idea de formular de memoria o en voz alta, más cercana al acto denunciado que un simple «contar».
- source_word: חֻקַּי
  english_pob_choice: my statutes
  chosen_spanish: mis estatutos
  alternatives_spanish:
  - mis decretos
  - mis ordenanzas
  - mis preceptos
  lexicon: HALOT
  rationale: «Estatutos» es la correspondencia más estable para חֻקִּים y conserva el matiz legal-covenantal. Mantiene además la conexión con el lenguaje bíblico tradicional sin perder claridad moderna.
- source_word: וַתִּשָּׂא
  english_pob_choice: and to take
  chosen_spanish: y para poner
  alternatives_spanish:
  - y para tomar
  - y para levantar
  - y para llevar
  lexicon: HALOT
  rationale: 'Aunque literalmente es «levantar/cargar», en esta construcción con «boca/labios» el sentido es idiomático: asumir o colocar el pacto en la խոսka/speech. «Poner» evita una calca extraña en español y preserva la imagen de portar el pacto en la boca.'
- source_word: בְרִיתִי
  english_pob_choice: my covenant
  chosen_spanish: mi pacto
  alternatives_spanish:
  - mi alianza
  - mi convenio
  - mi pacto sagrado
  lexicon: HALOT
  rationale: «Pacto» es la opción más natural y fiel en español para בְּרִית en este contexto. Conserva el peso teológico y relacional del término sin introducir una terminología eclesiástica menos precisa.
- source_word: עֲלֵי פִיךָ
  english_pob_choice: on your lips
  chosen_spanish: sobre tus labios
  alternatives_spanish:
  - en tu boca
  - sobre tu boca
  - en tus labios
  lexicon: HALOT
  rationale: El hebreo dice literalmente «sobre tu boca». «Sobre tus labios» mantiene la imagen corporal y el paralelo idiomático en una forma más idiomática en español, como ya reflejaba el audit trail inglés con «on your lips».
theological_decisions:
- issue: Alcance de la reprensión al impío
  english_pob_reading: The line challenges the wicked person's moral standing to recite God's laws and covenant, not the legitimacy of speaking about God in every sense.
  chosen_spanish_reading: La línea cuestiona la legitimidad moral del impío para recitar los estatutos de Dios y tomar en sus labios su pacto, no prohíbe toda referencia verbal a Dios en cualquier contexto.
  alternative_spanish_readings:
  - Prohibición absoluta de mencionar el pacto de Dios
  - Rechazo de cualquier habla religiosa por parte del impío
  rationale: La forma idiomática de מַה לְּךָ apunta a una objeción de derecho o idoneidad. Por eso la traducción mantiene el reproche centrado en la incoherencia moral y pactal, no en un veto general al habla religiosa.
  doctrine_reference: Translation philosophy §1, §3, §6
translation_notes:
  revision_awareness: El pasaje presenta un alto acuerdo entre el texto hebreo, la traducción inglesa auditada y la revisión posterior; no se registraron cambios de fondo en la última pasada, por lo que esta versión española conserva las decisiones léxicas y la fuerza retórica ya validadas.
  spanish_consistency_notes:
  - Se mantiene «pacto» para בְּרִית por consistencia con el valor teológico del término.
  - Se evita «SEÑOR» para אֱלֹהִים porque aquí el sujeto es simplemente «Dios».
  - «Impío» preserva el contraste moral con el justo del contexto inmediato.
  - La construcción «¿Qué derecho tienes?» refleja la fuerza idiomática de מַה לְּךָ sin endurecerla en una paráfrasis excesiva.
