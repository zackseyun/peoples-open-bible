  glossary_alignment: No hay términos del glosario mayor en juego como Yahvé o Mesías. En pureza ritual, el expediente inglés usa «clean/unclean» con aclaración ritual; en español, la pareja actual «limpia / impuro» queda algo asimétrica. «Pura / impuro» alinea mejor la lógica ritual y la nota explicativa, sin introducir arcaísmo innecesario.
