translation:
  language: es
  text: En verdad[a], sé que así es; pero ¿cómo puede un ser humano[b] ser justo[c] delante de Dios?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Ciertamente». El hebreo expresa una afirmación enfática y concesiva.'
    reason: alternative_reading
  - marker: b
    text: «Un ser humano» traduce אֱנוֹשׁ como singular representativo de la humanidad frágil; también podría decirse «un mortal» o «un hombre».
    reason: lexical_alternative
  - marker: c
    text: 'O: «ser justificado ante Dios»; lit. «con Dios».'
    reason: lexical_alternative
lexical_decisions:
- source_word: אָמְנָם
  english_pob_choice: Truly
  chosen_spanish: De veras
  alternatives_spanish:
  - Ciertamente
  - En verdad
  lexicon: HALOT
  rationale: Expresa la afirmación enfática y concesiva con naturalidad en español, sin sonar artificial ni perder el tono solemne del hebreo.
- source_word: יָדַעְתִּי
  english_pob_choice: I know
  chosen_spanish: sé
  alternatives_spanish:
  - he sabido
  - conozco
  lexicon: HALOT
  rationale: El perfecto hebreo aquí comunica una afirmación asentada; en español, el presente 'sé' transmite mejor esa convicción actual.
- source_word: כִי כֵן
  english_pob_choice: that it is so
  chosen_spanish: que así es
  alternatives_spanish:
  - que es así
  - que eso es cierto
  lexicon: HALOT
  rationale: Mantiene la fuerza confirmatoria de la cláusula hebrea en una forma idiomática y clara.
- source_word: וּמַה
  english_pob_choice: but how can
  chosen_spanish: pero ¿cómo puede
  alternatives_spanish:
  - y ¿cómo puede
  - y sin embargo ¿cómo puede
  - mas ¿cómo puede
  lexicon: HALOT
  rationale: El waw más interrogativo introduce contraste argumentativo; 'pero' comunica mejor el giro desde la concesión hacia la pregunta.
- source_word: יִּצְדַּק
  english_pob_choice: be righteous
  chosen_spanish: ser justo
  alternatives_spanish:
  - ser declarado justo
  - ser justificado
  - estar en lo justo
  lexicon: HALOT
  rationale: La raíz צדק en qal apunta a estar en lo justo / ser justo. 'Ser justo' preserva la relación con justicia sin resolver el matiz en una formulación doctrinal más cerrada.
- source_word: אֱנוֹשׁ
  english_pob_choice: a man
  chosen_spanish: un ser humano
  alternatives_spanish:
  - un hombre
  - un mortal
  - una persona humana
  lexicon: HALOT
  rationale: Aunque el inglés conservó 'a man' como singular representativo, en español 'ser humano' expresa mejor el valor genérico de אֱנוֹשׁ y evita una restricción de género innecesaria.
- source_word: עִם אֵל
  english_pob_choice: before God
  chosen_spanish: delante de Dios
  alternatives_spanish:
  - ante Dios
  - con Dios
  - en presencia de Dios
  lexicon: HALOT
  rationale: El hebreo dice literalmente 'con Dios', pero en este contexto forense/comparativo la relación natural en español es 'delante de Dios', que preserva la fuerza de confrontación y evaluación.
theological_decisions:
- issue: Matiz forense de la pregunta sobre la rectitud humana
  english_pob_reading: how can a man be righteous before God?
  chosen_spanish_reading: ¿cómo puede un ser humano ser justo delante de Dios?
  alternative_spanish_readings:
  - ¿cómo puede un ser humano ser justificado delante de Dios?
  - ¿cómo puede un mortal estar en lo justo delante de Dios?
  rationale: La pregunta de Job conserva la tensión entre justicia relacional y posible lenguaje forense. 'Ser justo' mantiene abierta la cuestión sin imponer una formulación doctrinal posterior ni borrar la ambigüedad del verbo hebreo.
  doctrine_reference: Preservar la tensión teológica sin resolverla anticipadamente.
translation_notes:
  revision_awareness: 'El audio textual coincide con la revisión más reciente del POB inglés: no se registran cambios aplicados y el juicio editorial quedó en alto acuerdo. La presente versión española sigue esa lectura sin añadir resolución doctrinal al giro interrogativo.'
  spanish_consistency_notes:
  - Se conserva el nombre divino como 'Dios' porque el hebreo aquí usa אֵל, no el tetragrama.
  - '''Justo'' mantiene la familia léxica de justicia y evita introducir ''justificado'' como lectura principal, aunque se reconoce como alternativa posible.'
  - Se opta por un castellano neutral y publicable, con puntuación interrogativa y enclíticos modernos propios del español.
  - Las notas al pie reflejan alternativas reales del hebreo y del seguimiento POB; no se añaden glosas especulativas.
