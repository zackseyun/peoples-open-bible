    reason: lexical_alternative
  - marker: b
    text: O «lleva un manto». El hebreo sugiere más vívidamente que va envuelto o cubierto con él.
    reason: lexical_alternative
  - marker: c
    text: O «se inclinó profundamente»; en algunos contextos, también puede traducirse «adoró». Aquí denota un acto de profunda postración ante la figura identificada como Samuel.
    reason: alternative_reading
  revision_rationale: 'La revisión corrige tres puntos: (1) hace más visible el aspecto progresivo de עֹלֶה con «está subiendo»; (2) restaura la nota lexical sobre עֹטֶה מְעִיל, como en el rastro inglés POB; y (3) mejora la naturalidad de «rostro a tierra» sin perder la imagen hebrea. También cambia «entendió» por «supo» para alinearse mejor con וַיֵּדַע y con la traducción auditada.'
