theological_decisions:
- issue: Relation of Adam's son to Adam's likeness and image
  chosen_reading: Render the phrase straightforwardly as resemblance to Adam, without importing doctrinal conclusions about the image of God being lost or altered.
  alternative_readings:
  - Interpret the wording as implying a diminished divine image after the fall
  - Interpret the wording as merely stylistic repetition with no theological resonance
  rationale: The verse intentionally echoes Genesis 1:26-27, but it does not itself explain the theological implications of that echo. The translation preserves the wording and tension without resolving broader doctrinal debates.
  doctrine_reference: Preserve theological tension rather than resolve it.
