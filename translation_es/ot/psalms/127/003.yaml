translation:
  language: es
  text: He aquí[a], los hijos son una herencia de parte de Yahvé; el fruto del vientre, una recompensa.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «los hijos son la herencia de Yahvé».'
