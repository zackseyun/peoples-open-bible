review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien el sentido básico del hebreo: causaron ira con sus במות y provocaron los celos divinos con sus פסילים. Sin embargo, el anclaje de notas no respeta bien las correspondencias del inglés auditado: la nota alternativa de «carved images/idols/graven images» fue colocada sobre «imágenes talladas» pero en el inglés aparece anclada junto a «high places» por acumulación de marcadores, y además falta una nota para la alternativa de יַקְנִיאוּהוּ (‘provocaron a celos’). Más importante para el español, «lo hicieron celoso» suena poco natural y puede sugerir un cambio de carácter más que una provocación covenantal.'
  spanish_quality_summary: El español es mayormente claro, pero «provocaron a ira» y sobre todo «lo hicieron celoso» resultan algo rígidos o poco idiomáticos. «Lo provocaron a ira» es más natural conservando el causativo; «provocaron sus celos» o «le provocaron celos» expresa mejor קנא en este contexto. También conviene eliminar la nota b actual porque repite sin valor una lectura ya adoptada.
  glossary_alignment: No hay conflicto con terminología de proyecto principal. «Lugares altos» para בָּמוֹת y «imágenes talladas» para פְּסִילִים están bien. La decisión teológica debe preservar celos divinos; en español eso se logra mejor con «provocaron sus celos» que con «lo hicieron celoso».
  issues:
  - severity: medium
    issue: «Lo hicieron celoso» es poco natural en español bíblico contemporáneo
    rationale: Aunque formalmente cercano al inglés, en español sugiere que ellos lo volvieron celoso, no que suscitaron sus celos de pacto ante la idolatría. «Provocaron sus celos» preserva mejor la fuerza de קנא y la legibilidad.
  - severity: low
    issue: «Provocaron a ira» suena más calcado que idiomático
    rationale: El causativo de כעס puede conservarse de manera más natural con «lo provocaron a ira».
  - severity: medium
    issue: La nota b actual es redundante y no refleja una alternativa léxica real
    rationale: 'Dice «También puede entenderse: “con sus lugares altos”», que es exactamente la lectura principal. No aporta información útil al lector.'
  - severity: medium
    issue: Falta nota para la alternativa de יַקְנִיאוּהוּ
    rationale: El audit trail inglés preserva la alternativa «they provoked him to jealousy». En español conviene conservar una nota equivalente, especialmente si el texto principal usa una formulación más idiomática.
  revised_spanish_text: Ellos lo provocaron a ira con sus lugares altos[a], y con sus imágenes talladas[b] provocaron sus celos[c].
  revised_footnotes:
  - marker: a
    text: «Lugares altos» se refiere a santuarios locales de culto, a menudo asociados con adoración ilícita e idolatría.
    reason: cultural_note
  - marker: b
    text: 'O: «sus ídolos» o «sus imágenes esculpidas».'
    reason: lexical_alternative
  - marker: c
    text: 'O: «lo provocaron a celos».'
    reason: lexical_alternative
  revision_rationale: La revisión mantiene el sentido hebreo y las decisiones léxicas de la POB, pero mejora la naturalidad en español y corrige el aparato de notas. «Provocaron sus celos» comunica mejor la idea de קנא aplicada a Dios en contexto de idolatría, sin suavizar el lenguaje teológico.
