revisions:
- from: El apetito del trabajador labora para él[a][b], porque su boca lo impulsa[c].
  to: El apetito[a] del trabajador trabaja para él[b][c], porque su boca lo impulsa.
  rationale: 'Se hace una reparación menor para mejorar la naturalidad del español y la claridad auditiva: «trabaja» en lugar de «labora». Se conserva el sentido, el paralelismo básico y las decisiones léxicas clave del POB. También se reordenan las notas para que los marcadores en el texto correspondan mejor a las alternativas documentadas y se mejora la nota sobre אָכַף con opciones más naturales en español actual.'
