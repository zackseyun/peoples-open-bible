translation:
  language: es
  text: 'Diré a Dios[a]: «No me condenes[b]; hazme saber por qué contiendes conmigo[c]»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «a Eloah»; el hebreo usa un título singular para Dios en Job.
    reason: lexical_alternative
  - marker: b
    text: O «me declares culpable»; el verbo hebreo tiene un matiz judicial.
    reason: lexical_alternative
  - marker: c
    text: O «por qué me llevas pleito» o «por qué disputas conmigo».
    reason: lexical_alternative
lexical_decisions:
- source_word: אֹמַר
  english_pob_choice: I will say
  chosen_spanish: Diré
  alternatives_spanish:
  - Diré yo
  - Yo diré
  - Voy a decir
  lexicon: HALOT
  rationale: El imperfecto 1cs en este contexto expresa una acción proyectada o voluntaria; en español, el futuro simple comunica con naturalidad la intención de Job de dirigirse a Dios.
- source_word: אֶל אֱלוֹהַּ
  english_pob_choice: to God
  chosen_spanish: a Dios
  alternatives_spanish:
  - al Dios
  - a Eloah
  lexicon: HALOT
  rationale: אֱלוֹהַּ es un título/nombre singular para Dios en Job. En español, ‘Dios’ es la equivalencia idiomática más clara y reverente, sin transliterar el término hebreo.
- source_word: אַל
  english_pob_choice: Do not
  chosen_spanish: 'No'
  alternatives_spanish:
  - No hagas
  - No me
  lexicon: HALOT
  rationale: 'Con verbo jussivo/imperfecto en prohibición, el español normal expresa la negativa con ‘No’ seguido del imperativo negativo: ‘No me condenes’.'
- source_word: תַּרְשִׁיעֵנִי
  english_pob_choice: condemn me
  chosen_spanish: me condenes
  alternatives_spanish:
  - me declares culpable
  - me declares impío
  - me tengas por malvado
  lexicon: HALOT
  rationale: 'El hifil de רשע tiene sentido judicial: declarar culpable o condenar. ‘Condenes’ mantiene la fuerza forense y la brevedad natural del español, sin perder la tensión jurídica del verso.'
- source_word: הוֹדִיעֵנִי
  english_pob_choice: let me know
  chosen_spanish: hazme saber
  alternatives_spanish:
  - dame a saber
  - infórmame
  - haz que sepa
  lexicon: HALOT
  rationale: 'El hifil de ידע es causativo: ‘hacer saber’ reproduce bien ese valor. ‘Hazme saber’ es una solución clara y digna en español.'
- source_word: עַל מַה
  english_pob_choice: why
  chosen_spanish: por qué
  alternatives_spanish:
  - por qué razón
  - con qué motivo
  - sobre qué
  lexicon: HALOT
  rationale: La construcción interrogativa pide la razón o causa; ‘por qué’ es la equivalencia más natural y precisa en español.
- source_word: תְּרִיבֵנִי
  english_pob_choice: you contend with me
  chosen_spanish: contiendes conmigo
  alternatives_spanish:
  - disputas conmigo
  - me llevas pleito
  - litigas conmigo
  lexicon: HALOT
  rationale: ריב puede abarcar contienda, disputa o lenguaje de pleito. ‘Contiendes conmigo’ conserva el doble matiz interpersonal y forense sin volverlo excesivamente técnico.
theological_decisions:
- issue: Tensión judicial en la que Job se dirige a Dios
  english_pob_reading: Render תַּרְשִׁיעֵנִי as 'condemn me' and תְּרִיבֵנִי as 'contend with me'
  chosen_spanish_reading: ‘No me condenes’ ... ‘contiendes conmigo’
  alternative_spanish_readings:
  - ‘No me declares culpable’ ... ‘llevas pleito conmigo’
  - ‘No me tengas por malvado’ ... ‘disputas conmigo’
  rationale: 'El verso usa lenguaje de juicio y conflicto, pero no obliga a una paráfrasis técnica de tribunal. La traducción elegida conserva la tensión teológica: Job habla a Dios en términos judiciales sin resolver de antemano el sentido de su sufrimiento.'
  doctrine_reference: Preservar la tensión teológica en lugar de resolverla.
translation_notes:
  revision_awareness: El texto inglés y el control de revisión muestran acuerdo alto y sin cambios aplicados; por ello, el español mantiene la misma estructura de sentido, conservando el tono judicial y la brevedad del original.
  spanish_consistency_notes:
  - Se usa «Dios» para אֱלוֹהַּ por claridad idiomática, sin perder el valor de título divino singular.
  - Se conserva el lenguaje forense con «condenes» y «contiendes» para reflejar el paralelismo del hebreo.
  - La puntuación reproduce la relación directa entre la dirección a Dios, la prohibición y la petición de explicación.
