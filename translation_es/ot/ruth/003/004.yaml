    reason: lexical_alternative
  - marker: b
    text: La forma hebrea escrita dice «y yo me acostaré», pero el contexto y la lectura tradicional entienden «y tú te acostarás».
    reason: textual_variant
  revision_rationale: Se ajusta «conocerás» a «fíjate en» para reflejar mejor la instrucción práctica de identificar el lugar; se cambia «Entra» por «Luego ve» para evitar añadir una noción espacial no explicitada en el hebreo; y se pule la nota textual para un español más natural sin alterar la información del expediente inglés.
