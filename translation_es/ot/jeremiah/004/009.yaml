translation:
  language: es
  text: Y sucederá en aquel día[a] —declara Yahvé— que el corazón del rey y el corazón de los oficiales perecerán, y los sacerdotes quedarán consternados, y los profetas quedarán asombrados.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O «el valor del rey y de los oficiales fallará». El hebreo dice literalmente: «perecerá el corazón del rey y el corazón de los oficiales».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהָיָה
  english_pob_choice: And it will happen
  chosen_spanish: Y sucederá
  alternatives_spanish:
  - Y acontecerá
  - Y pasará
  lexicon: HALOT
  rationale: La fórmula introduce un evento futuro profético. «Sucederá» conserva el sentido de ocurrencia futura y suena natural en español bíblico contemporáneo sin volverse arcaico.
- source_word: בַּיּוֹם הַהוּא
  english_pob_choice: on that day
  chosen_spanish: en aquel día
  alternatives_spanish:
  - en ese día
  - aquel día
  lexicon: HALOT
  rationale: «En aquel día» es la equivalencia más estable para la fórmula profética y mantiene el valor temporal y solemne del hebreo.
- source_word: נְאֻם יְהוָה
  english_pob_choice: declares Yahweh
  chosen_spanish: declara Yahvé
  alternatives_spanish:
  - dice Yahvé
  - oráculo de Yahvé
  lexicon: HALOT
  rationale: Se conserva la fórmula profética con el nombre divino en la forma proyectada para el español. «Declara» mantiene el tono formal de anuncio autorizado.
- source_word: יֹאבַד לֵב הַמֶּלֶךְ וְלֵב הַשָּׂרִים
  english_pob_choice: the heart of the king and the heart of the officials will perish
  chosen_spanish: el corazón del rey y el corazón de los oficiales perecerá
  alternatives_spanish:
  - el corazón del rey y el corazón de los oficiales se perderá
  - el ánimo del rey y el ánimo de los oficiales desfallecerá
  lexicon: HALOT
  rationale: Se mantiene «corazón» para conservar la imagen hebrea de la sede de valor, resolución y entendimiento. «Perecerá» sigue de cerca יֹאבַד y refleja la fuerte afirmación del texto.
- source_word: הַמֶּלֶךְ
  english_pob_choice: the king
  chosen_spanish: el rey
  alternatives_spanish:
  - el monarca
  lexicon: HALOT
  rationale: Traducción directa y natural en este contexto.
- source_word: הַשָּׂרִים
  english_pob_choice: the officials
  chosen_spanish: los oficiales
  alternatives_spanish:
  - los príncipes
  - los gobernantes
  lexicon: HALOT
  rationale: «Oficiales» comunica adecuadamente la función de gobierno de שָׂרִים en español moderno sin introducir la connotación hereditaria de «príncipes».
- source_word: וְנָשַׁמּוּ
  english_pob_choice: will be appalled
  chosen_spanish: quedarán consternados
  alternatives_spanish:
  - serán desolados
  - quedarán pasmados
  - quedarán horrorizados
  lexicon: HALOT
  rationale: El verbo expresa quedar sobrecogidos, aturdidos o atónitos. «Quedarán consternados» comunica bien el impacto emocional y evita una traducción demasiado literal o extraña.
- source_word: הַכֹּהֲנִים
  english_pob_choice: the priests
  chosen_spanish: los sacerdotes
  alternatives_spanish:
  - los sacerdotes del templo
  lexicon: HALOT
  rationale: Equivalente directo y establecido en español bíblico.
- source_word: וְהַנְּבִיאִים יִתְמָהוּ
  english_pob_choice: and the prophets will be astonished
  chosen_spanish: y los profetas quedarán asombrados
  alternatives_spanish:
  - y los profetas se asombrarán
  - y los profetas estarán atónitos
  lexicon: HALOT
  rationale: «Asombrados» recoge el sentido de sorpresa desconcertada de תמה. Se evita un verbo reflexivo para no desplazar el foco hacia la reacción voluntaria.
theological_decisions:
- issue: Nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - Jehová
  rationale: El texto hebreo usa directamente el Tetragrama. En español, la línea editorial pide «Yahvé» como forma principal, preservando el nombre propio del pacto en vez de sustituirlo por un título.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: לֵב como sede de valor, ánimo o entendimiento
  english_pob_reading: heart ... will perish / courage ... will fail (footnote alternative)
  chosen_spanish_reading: corazón ... perecerá
  alternative_spanish_readings:
  - ánimo ... desfallecerá
  - valor ... fallará
  rationale: Se retiene «corazón» para no borrar la imagen corporal y conceptual del hebreo. La alternativa interpretativa existe, pero la lectura principal mantiene la tensión lexical documentada.
  doctrine_reference: Lexical decision consistent with HALOT and English POB footnote on literal Hebrew imagery
translation_notes:
  revision_awareness: La revisión más reciente indicó que no se requerían cambios respecto del estado anterior; esta propuesta sigue ese estado de alta concordancia y conserva la nota léxica ya documentada para לֵב.
  spanish_consistency_notes:
  - Se usa «Yahvé» de manera consistente con el estándar del proyecto para el nombre divino.
  - Se mantiene el paralelismo hebreo con la repetición de «el corazón de» para rey y oficiales.
  - «Oficiales» evita cargar el texto con una noción nobiliaria que no exige el hebreo.
  - «Consternados» y «asombrados» distinguen dos reacciones cercanas pero no idénticas, reflejando el paralelismo del versículo.
