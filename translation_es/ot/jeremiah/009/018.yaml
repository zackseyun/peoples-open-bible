    changes_summary: Changed 'have been devastated' to 'are devastated' to better reflect the exclamatory perfect in natural English while preserving the sense. No other changes needed.
translation:
  language: es
  text: 'Porque se oye desde Sión el sonido de lamentación: «¡Cómo estamos devastados[a]! Estamos muy avergonzados, porque hemos dejado la tierra[b], porque han derribado nuestras moradas[c]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «hemos sido saqueados». El verbo hebreo puede enfatizar tanto la ruina general como el despojo por un enemigo.
    reason: lexical_alternative
  - marker: b
    text: O «hemos abandonado la tierra». El verbo hebreo puede describir salida forzada o abandono; el contexto de lamento favorece la primera lectura, pero la ambigüedad se conserva.
    reason: lexical_alternative
  - marker: c
    text: O «nuestras casas» o «nuestras viviendas» para «nuestras moradas».
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Ya que
  lexicon: HALOT
  rationale: Aquí introduce la explicación del clamor de duelo; «Porque» conserva la relación discursiva causal/explanatoria sin forzar un giro más solemne que el español actual.
- source_word: ק֥וֹל נְהִ֛י
  english_pob_choice: the sound of wailing
  chosen_spanish: el sonido de lamentación
  alternatives_spanish:
  - la voz de lamentación
  - el sonido de llanto
  lexicon: HALOT
  rationale: קוֹל es «sonido/voz» y נְהִי denota lamentación o lamento. «Sonido de lamentación» mantiene el énfasis auditivo y el tono poético.
- source_word: נִשְׁמַ֥ע
  english_pob_choice: is heard
  chosen_spanish: se oye
  alternatives_spanish:
  - es escuchado
  - ha sido oído
  lexicon: HALOT
  rationale: El nifal expresa pasividad; «se oye» suena natural en español y conserva la vividez profética del presente.
- source_word: מִצִּיּוֹן
  english_pob_choice: from Zion
  chosen_spanish: desde Sión
  alternatives_spanish:
  - de Sión
  - desde Sion
  lexicon: HALOT
  rationale: «Desde Sión» reproduce el valor locativo/origen del hebreo y conserva el nombre propio bíblico con su resonancia poética.
- source_word: אֵיךְ
  english_pob_choice: How
  chosen_spanish: ¡Cómo!
  alternatives_spanish:
  - ¡Ay, cómo!
  - ¡Cuán!
  lexicon: HALOT
  rationale: Introduce una exclamación de duelo; «¡Cómo!» preserva la fuerza lamentativa sin añadir matiz interpretativo excesivo.
- source_word: שֻׁדָּדְנוּ
  english_pob_choice: we are devastated
  chosen_spanish: estamos devastados
  alternatives_spanish:
  - hemos sido devastados
  - estamos arruinados
  - hemos sido saqueados
  lexicon: HALOT
  rationale: El verbo puede abarcar ruina general o despojo enemigo. «Estamos devastados» conserva esa amplitud, siguiendo la decisión inglesa revisada a un presente exclamativo natural.
- source_word: בֹּשְׁנֽוּ מְאֹד
  english_pob_choice: We are utterly ashamed
  chosen_spanish: Estamos muy avergonzados
  alternatives_spanish:
  - Estamos totalmente avergonzados
  - Estamos profundamente avergonzados
  - Estamos muy confundidos
  lexicon: HALOT
  rationale: בושׁ expresa vergüenza/deshonra; מְאֹד intensifica. «Muy avergonzados» es claro y sobrio en español, sin perder el peso del reproche.
- source_word: עָזַבְנוּ
  english_pob_choice: we have left
  chosen_spanish: hemos dejado
  alternatives_spanish:
  - hemos abandonado
  - hemos partido de
  - nos hemos ido de
  lexicon: HALOT
  rationale: עזב puede significar dejar, abandonar o forsake. «Hemos dejado» preserva la ambigüedad de salida forzada o abandono, como en la decisión inglesa de no cargar demasiado la interpretación.
- source_word: אָ֔רֶץ
  english_pob_choice: the land
  chosen_spanish: la tierra
  alternatives_spanish:
  - el país
  - la tierra natal
  - el territorio
  lexicon: HALOT
  rationale: En contexto se refiere a la patria/judea, no al planeta. «La tierra» es la equivalencia bíblica natural en español y mantiene el registro del lamento nacional.
- source_word: הִשְׁלִ֖יכוּ
  english_pob_choice: they have cast down
  chosen_spanish: han derribado
  alternatives_spanish:
  - han echado abajo
  - han arrojado abajo
  - han tirado
  lexicon: HALOT
  rationale: Con objeto arquitectónico, השליך comunica acción violenta de echar abajo. «Han derribado» es más idiomático en español y conserva la idea de demolición/destrucción.
- source_word: מִשְׁכְּנוֹתֵינוּ
  english_pob_choice: our dwellings
  chosen_spanish: nuestras moradas
  alternatives_spanish:
  - nuestras viviendas
  - nuestros hogares
  - nuestras habitaciones
  lexicon: HALOT
  rationale: מִשְׁכָּן puede referir a morada/habitación. «Moradas» mantiene el tono elevado y colectivo del lamento, sin domesticarlo demasiado.
translation_notes:
  revision_awareness: La revisión inglesa reciente ajustó «have been devastated» a «are devastated» para reflejar mejor el perfecto exclamativo hebreo en un presente idiomático. La versión española sigue esa decisión con «estamos devastados», y mantiene la lectura de lamento sin sobreespecificar si la devastación enfatiza ruina o saqueo.
  spanish_consistency_notes:
  - Se mantiene «Sión» como topónimo bíblico y «la tierra» para אָרֶץ en este contexto nacional.
  - «Devastados» conserva la amplitud semántica de שׁדד, evitando restringirlo solo a saqueo.
  - «Moradas» refleja el registro colectivo y poético de מִשְׁכְּנוֹתֵינוּ; se ofrece alternativa en nota.
  - Los marcadores [a], [b] y [c] aparecen exactamente en el texto donde corresponden.
