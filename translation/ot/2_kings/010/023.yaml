id: 2KI.10.23
reference: 2 Kings 10:23
source:
  edition: WLC
  text: וַ/יָּבֹ֥א יֵה֛וּא וִ/יהוֹנָדָ֥ב בֶּן רֵכָ֖ב בֵּ֣ית הַ/בָּ֑עַל וַ/יֹּ֜אמֶר לְ/עֹבְדֵ֣י הַ/בַּ֗עַל חַפְּשׂ֤וּ וּ/רְאוּ֙ פֶּן יֶשׁ פֹּ֤ה עִמָּ/כֶם֙ מֵ/עַבְדֵ֣י יְהוָ֔ה כִּ֛י אִם עֹבְדֵ֥י הַ/בַּ֖עַל לְ/בַדָּֽ/ם־־־־׃
translation:
  text: Then Jehu and Jehonadab son of Rechab entered the house of Baal[a], and he said to the worshipers of Baal, “Search and see that there is no servant of the LORD here among you, but only worshipers of Baal.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “the temple of Baal.” Hebrew literally, “the house of Baal.”
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּבֹא
  chosen: entered
  alternatives:
  - went in
  - came
  lexicon: HALOT
  rationale: The verb בוא broadly means 'come/go/enter.' With the destination 'the house of Baal,' English 'entered' best captures the motion into the building in natural modern English.
- source_word: בֵּית הַבָּעַל
  chosen: the house of Baal
  alternatives:
  - the temple of Baal
  lexicon: HALOT
  rationale: Formally the Hebrew is 'house of Baal.' While this refers to a cultic shrine/temple, 'house' preserves the source wording and remains clear in context.
- source_word: עֹבְדֵי הַבַּעַל
  chosen: worshipers of Baal
  alternatives:
  - servants of Baal
  - those serving Baal
  lexicon: HALOT
  rationale: The participial form from עבד can mean 'servants' or 'worshipers' in cultic contexts. Here the referent is religious adherents gathered in Baal's sanctuary, so 'worshipers' communicates the cultic sense more clearly than the more ambiguous 'servants.'
- source_word: חַפְּשׂוּ
  chosen: Search
  alternatives:
  - look carefully
  - examine
  lexicon: HALOT
  rationale: The imperative calls for active inspection. 'Search' is concise and suitably forceful.
- source_word: וּרְאוּ
  chosen: and see
  alternatives:
  - and make sure
  - and inspect
  lexicon: HALOT
  rationale: A straightforward rendering of the second imperative. In combination with 'Search,' it conveys verification without over-paraphrase.
- source_word: פֶּן יֶשׁ פֹּה
  chosen: that there is no ... here
  alternatives:
  - lest there be ... here
  - make sure there is no ... here
  lexicon: HALOT
  rationale: The Hebrew construction expresses precaution ('lest there be'). In idiomatic English after the imperatives, 'that there is no ... here' conveys the intended warning naturally while preserving the sense.
- source_word: מֵעַבְדֵי יְהוָה
  chosen: servant of the LORD
  alternatives:
  - worshiper of the LORD
  - one of the servants of the LORD
  lexicon: HALOT
  rationale: The noun עבד with YHWH commonly denotes a servant of the LORD. Singular English after 'there is no' is idiomatic though the Hebrew is partitive plural ('from the servants of'). 'Servant' is preferable here because the phrase is a stock expression and not limited to cultic action.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: כִּי אִם
  chosen: but only
  alternatives:
  - except
  - rather only
  lexicon: HALOT
  rationale: 'In this exclusionary construction, ''but only'' clearly expresses the contrast: no servants of the LORD, only Baal worshipers.'
- source_word: לְבַדָּם
  chosen: only
  alternatives:
  - alone
  - by themselves
  lexicon: HALOT
  rationale: Here the adverbial sense is exclusivity, not physical separation. 'Only' is the most natural English equivalent in this clause.
