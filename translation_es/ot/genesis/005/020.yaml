translation:
  language: es
  text: Así, todos los días de Yered fueron novecientos sesenta y dos años[a], y murió.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebreo Yered; muchas traducciones tradicionales ponen «Jared».
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּהְיוּ
  english_pob_choice: So ... were
  chosen_spanish: Así, ... fueron
  alternatives_spanish:
  - Y ... fueron
  - Entonces ... fueron
  lexicon: HALOT
  rationale: El wayyiqtol introduce la fórmula de resumen genealógico; «Así» conserva la fuerza consecutiva de manera natural en español y evita una calca rígida.
- source_word: כָּל יְמֵי
  english_pob_choice: all the days of
  chosen_spanish: todos los días de
  alternatives_spanish:
  - la vida entera de
  - toda la vida de
  lexicon: HALOT
  rationale: Se mantiene el modismo genealógico hebreo con una expresión clara y fiel en español.
- source_word: יֶרֶד
  english_pob_choice: Yered
  chosen_spanish: Yered
  alternatives_spanish:
  - Jared
  lexicon: conventional transliteration
  rationale: Se conserva la forma más cercana al hebreo, en línea con la decisión inglesa POB de reflejar la forma hebrea directamente, no la tradición castellana/inglesa tradicional.
- source_word: שְׁתַּיִם וְשִׁשִּׁים שָׁנָה וּתְשַׁע מֵאוֹת שָׁנָה
  english_pob_choice: nine hundred and sixty-two years
  chosen_spanish: novecientos sesenta y dos años
  alternatives_spanish:
  - novecientos y sesenta y dos años
  - novecientos sesenta y dos años de edad
  lexicon: HALOT
  rationale: El valor total del sintagma numérico se expresa de forma idiomática en español. Se evita repetir «años» dos veces, como hace el inglés al condensar la suma numérica en un solo total.
- source_word: וַיָּמֹת
  english_pob_choice: and he died
  chosen_spanish: y murió
  alternatives_spanish:
  - y falleció
  - entonces murió
  lexicon: HALOT
  rationale: Se conserva la fórmula final estándar de Génesis 5 con un verbo simple y directo, sin suavizar el enunciado.
translation_notes:
  revision_awareness: 'Se corrigió el problema de validación anterior: ahora el marcador [a] aparece explícitamente en el texto principal, anclado a «años» para sostener la nota lexical sobre el nombre propio Yered/Jared.'
  spanish_consistency_notes:
  - Se mantiene la puntuación simple de la fórmula genealógica.
  - «Yered» sigue la forma hebrea auditada; «Jared» queda solo como alternativa nota.
  - No se introdujo terminología doctrinal ni explicativa ajena al versículo.
