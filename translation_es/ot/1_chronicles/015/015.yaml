translation:
  language: es
  text: Y los hijos de los levitas llevaron el arca de Dios sobre sus hombros, con las varas[a] sobre ellos, tal como Moisés había mandado, conforme a la palabra de Yahvé.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, «con las varas descansando sobre ellos». La frase hebrea describe las varas sobre los hombros de ellos mientras llevaban el arca.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּשְׂאוּ
  english_pob_choice: carried
  chosen_spanish: llevaron
  alternatives_spanish:
  - cargaron
  - transportaron
  - llevaron a cuestas
  lexicon: HALOT
  rationale: En este contexto narrativo, נשא expresa el porte continuo del arca. «Llevaron» comunica el acto de trasladarla de manera natural en español y conserva la idea de sostenerla durante el recorrido.
- source_word: בְנֵי הַלְוִיִּם
  english_pob_choice: the sons of the Levites
  chosen_spanish: los hijos de los levitas
  alternatives_spanish:
  - los levitas
  - los hijos de Leví
  lexicon: HALOT
  rationale: Se conserva la expresión filial y tribal del hebreo, que es más específica que «los levitas» a secas. «Hijos de los levitas» refleja la forma del original sin borrar su matiz genealógico.
- source_word: אֲרוֹן הָאֱלֹהִים
  english_pob_choice: the ark of God
  chosen_spanish: el arca de Dios
  alternatives_spanish:
  - el arca del pacto de Dios
  lexicon: HALOT
  rationale: El hebreo dice simplemente «arca de Dios». No se añade «del pacto» porque ese elemento no está en este versículo y sería una ampliación no sustentada por el texto.
- source_word: כַּאֲשֶׁר צִוָּה מֹשֶׁה
  english_pob_choice: just as Moses had commanded
  chosen_spanish: tal como Moisés lo había mandado
  alternatives_spanish:
  - como Moisés había mandado
  - justamente como Moisés lo mandó
  lexicon: HALOT
  rationale: «Tal como» expresa adecuadamente conformidad. El pluscuamperfecto («había mandado») sitúa el mandato previo respecto del traslado del arca.
- source_word: כִּדְבַר יְהוָה
  english_pob_choice: according to the word of Yahweh
  chosen_spanish: conforme a la palabra de Yahvé
  alternatives_spanish:
  - según la palabra de Yahvé
  - de acuerdo con la palabra de Yahvé
  lexicon: HALOT
  rationale: Se mantiene la relación formal de דבר como «palabra» y no se sustituye por «mandamiento», porque el hebreo no usa aquí ese término. «Conforme a» preserva el valor de ajuste a la palabra divina.
- source_word: בִּכְתֵפָם
  english_pob_choice: on their shoulders
  chosen_spanish: sobre sus hombros
  alternatives_spanish:
  - en sus hombros
  - a sus hombros
  lexicon: HALOT
  rationale: La imagen corporal del soporte se comunica mejor con «sobre sus hombros», una forma natural y fiel para el lugar donde descansaban las varas.
- source_word: בַּמֹּטוֹת עֲלֵיהֶם
  english_pob_choice: with the poles upon them
  chosen_spanish: con las varas encima de ellos
  alternatives_spanish:
  - con las varas sobre ellos
  - con las varas descansando sobre ellos
  lexicon: HALOT
  rationale: 'Se conserva la secuencia del hebreo: las varas estaban «encima de ellos», es decir, sobre los hombros de quienes cargaban el arca. «Varas» es un equivalente idiomático claro para מֹטוֹת en este contexto.'
theological_decisions:
- issue: Rendering of יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: El proyecto pide verter directamente el nombre divino como «Yahvé». Se evita la sustitución por «SEÑOR» para no ocultar el Tetragrámaton presente en el hebreo.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Gender-accurate rendering of בְנֵי הַלְוִיִּם
  english_pob_reading: the sons of the Levites
  chosen_spanish_reading: los hijos de los levitas
  alternative_spanish_readings:
  - los levitas
  rationale: Se conserva el lenguaje filial y masculino del hebreo, en vez de reducirlo a un colectivo genérico. Esto sigue la preferencia de precisión de género del proyecto cuando el texto lo expresa explícitamente.
  doctrine_reference: DOCTRINE.md Translation philosophy §4 (Gender-accurate over gender-neutral)
translation_notes:
  revision_awareness: 'La redacción sigue de cerca el texto hebreo y coincide con la lectura del POB inglés: el arca es llevada por los hijos de los levitas sobre los hombros, con las varas encima de ellos, conforme al mandato de Moisés y a la palabra de Yahvé. No se introdujeron ampliaciones como «del pacto», y se preservó la distinción entre «palabra» y «mandato».'
  spanish_consistency_notes:
  - Se usa «Yahvé» en lugar de «SEÑOR», conforme a la política del proyecto.
  - «Arca» se mantiene como equivalente de אֲרוֹן; no se sustituyó por una paráfrasis.
  - «Varas» refleja bien מֹּטוֹת en este contexto cultual de transporte.
  - La puntuación separa con comas las dos cláusulas de conformidad para mantener claridad sintáctica.
