translation:
  language: es
  text: Pondrás el propiciatorio[a] sobre el arca, y dentro del arca pondrás el testimonio que yo te daré.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «cubierta de expiación». El término hebreo designa la cubierta del arca y lleva asociaciones sacrificiales y de expiación.
    reason: lexical_alternative
lexical_decisions:
- source_word: כַּפֹּרֶת
  english_pob_choice: mercy seat
  chosen_spanish: propiciatorio
  alternatives_spanish:
  - cubierta de expiación
  - tapa
  lexicon: HALOT
  rationale: En español, «propiciatorio» es el equivalente tradicional y culto más cercano a la función ritual del término, y conserva la asociación con expiación sin sonar tan explicativo como «cubierta de expiación». «Tapa» sería demasiado genérico y perdería el valor cultual del objeto.
- source_word: עַל הָאָרֹן מִלְמָעְלָה
  english_pob_choice: on top of the ark
  chosen_spanish: sobre el arca
  alternatives_spanish:
  - encima del arca
  - arriba del arca
  lexicon: HALOT
  rationale: La relación espacial queda clara en español con «sobre». Es natural y suficientemente precisa para indicar la colocación del propiciatorio respecto del arca.
- source_word: עֵדֻת
  english_pob_choice: the testimony
  chosen_spanish: el testimonio
  alternatives_spanish:
  - el pacto
  - las tablas del testimonio
  - el documento del testimonio
  lexicon: HALOT
  rationale: «El testimonio» preserva la abstracción del hebreo y no añade una especificación no explícita en este versículo. Mantiene la conexión con el uso técnico del término en el contexto del tabernáculo.
- source_word: נָתַתָּ / תִּתֵּן / אֶתֵּן
  english_pob_choice: put / shall put / will give
  chosen_spanish: pondrás / pondrás / daré
  alternatives_spanish:
  - colocarás / colocarás / daré
  - meterás / meterás / daré
  lexicon: HALOT
  rationale: «Poner» funciona bien para objetos cultuales y es natural en español. Para el sujeto divino, «daré» conserva el valor básico de נתן sin forzar una paraphrasis.
- source_word: אֶל הָאָרֹן
  english_pob_choice: into the ark
  chosen_spanish: dentro del arca
  alternatives_spanish:
  - en el arca
  - al arca
  lexicon: HALOT
  rationale: Aunque el hebreo usa una preposición que puede ser más amplia, el contexto de introducir el testimonio hace claro el sentido de interioridad. «Dentro del arca» expresa esa idea de modo natural en español.
theological_decisions:
- issue: Rendering of כַּפֹּרֶת in a cultic context with sacrificial associations
  english_pob_reading: mercy seat
  chosen_spanish_reading: propiciatorio
  alternative_spanish_readings:
  - cubierta de expiación
  rationale: «Propiciatorio» mantiene la carga cultual del objeto y su relación con la propiciación/expiación, sin introducir una interpretación más desarrollada de la que el versículo exige. Se conserva la alternativa más transparente en una nota para dejar visible la tensión lexical.
  doctrine_reference: Translation philosophy §§1, 5, 6
translation_notes:
  revision_awareness: El texto inglés final no requirió revisiones; esta propuesta sigue el estado auditado de alta concordancia y conserva las decisiones léxicas ya justificadas en el expediente en inglés.
  spanish_consistency_notes:
  - Se mantiene «arca» para הָאָרֹן y «testimonio» para עֵדֻת de manera consistente con el registro técnico del tabernáculo.
  - Se evita traducir כַּפֹּרֶת como «mercy seat» literalizado; en español se usa el término cultual asentado «propiciatorio», con nota alternativa para transparencia.
  - 'La sintaxis sigue de cerca el hebreo sin sonar forzada en español: dos mandatos futuros y una relativa final causal/objeto («que yo te daré»).'
