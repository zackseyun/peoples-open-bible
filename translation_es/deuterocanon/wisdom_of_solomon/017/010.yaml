lexical_decisions:
- source_word: διώλλυντο
  english_pob_choice: were being destroyed
  chosen_spanish: estaban siendo destruidos
  alternatives_spanish:
  - perecían
  - estaban pereciendo
  - se arruinaban
  lexicon: LSJ
  rationale: El imperfecto medio/pasivo expresa un proceso continuo de destrucción o pérdida. «Estaban siendo destruidos» conserva la fuerza y la pasividad del griego sin introducir un agente explícito que el texto no nombra.
- source_word: ἔντρομοι
  english_pob_choice: trembling
  chosen_spanish: temblando
  alternatives_spanish:
  - aterrados
  - en terror
  lexicon: LSJ
  rationale: El adjetivo comunica tanto temblor físico como pavor. «Temblando» preserva la imagen corporal vívida y encaja con la sintaxis participial del versículo.
- source_word: μηδαμόθεν
  english_pob_choice: from which there was nowhere to flee
  chosen_spanish: no había por dónde huir de él
  alternatives_spanish:
  - no había escape de él
  - no había manera de huir
  lexicon: LSJ
  rationale: El griego indica ausencia total de vía de escape desde ningún lado. En español hace falta explicitar la idea para que sea natural y clara; «no había por dónde huir de él» reproduce la inescapabilidad.
- source_word: φευκτὸν
  english_pob_choice: to flee
  chosen_spanish: huir
  alternatives_spanish:
  - escapar
  - ser escapado
  lexicon: LSJ
  rationale: El adjetivo verbal significa algo que puede ser huido o escapado. «Huir» transmite la acción práctica de escape que el texto niega.
- source_word: ἀέρα
  english_pob_choice: the air
  chosen_spanish: el aire
  alternatives_spanish:
  - la atmósfera
  - el viento
  lexicon: LSJ
  rationale: «El aire» es el sentido ordinario y el más fiel aquí. Otras opciones serían demasiado técnicas o demasiado específicas.
- source_word: προσιδεῖν
  english_pob_choice: to look at
  chosen_spanish: mirar
  alternatives_spanish:
  - contemplar
  - ver
  lexicon: LSJ
  rationale: El verbo significa mirar hacia o fijar la vista en. «Mirar» es la opción más natural y directa en español.
- source_word: ἀρνούμενοι
  english_pob_choice: refusing even
  chosen_spanish: negándose incluso
  alternatives_spanish:
  - rehusando incluso
  - rechazando
  lexicon: LSJ
  rationale: El participio expresa negativa o rechazo. «Negándose incluso» mantiene el matiz intensivo de que no llegaban ni a mirar el aire.
theological_decisions:
- issue: Agencia de la destrucción
  english_pob_reading: Experiential and ongoing destruction under divine judgment, without specifying a direct agent in the English text.
  chosen_spanish_reading: Destrucción continua e insoportable, sin nombrar explícitamente al agente en el versículo.
  alternative_spanish_readings:
  - muerte física inmediata
  - destrucción explícitamente causada por Dios
  rationale: 'El pasivo/medio griego deja implícito el agente. La versión española conserva esa tensión: el contexto permite leer juicio divino, pero el versículo no lo formula de manera explícita.'
  doctrine_reference: DOCTRINE.md §3 Preservar la tensión teológica en lugar de resolverla
translation_notes:
  revision_awareness: La redacción sigue la revisión final del inglés auditado, especialmente en la relación entre el aire y la imposibilidad de huir de él. La opción española mantiene esa estructura sin endurecer innecesariamente el orden de las frases.
  spanish_consistency_notes:
  - Se conserva «aire» de forma uniforme para ἀέρα, sin sustituirlo por «atmósfera» o «viento».
  - Se evita introducir un agente explícito para la destrucción, en coherencia con el pasivo/medio griego.
  - «Temblando y negándose» reproduce el encadenamiento participial del original sin volverlo más interpretativo.
  - La nota textual alternativa se ofrece solo donde el inglés POB preservó una opción lexical relevante.
