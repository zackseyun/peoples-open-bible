translation:
  language: es
  text: 'Los hijos de Merari: Mahli y Mushi. Estos fueron los clanes de los levitas según sus casas paternas[a].'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebreo literalmente «según sus padres»; en este contexto genealógico, la referencia es a la clasificación por casas paternas o casas ancestrales.
    reason: cultural_note
lexical_decisions:
- source_word: בְּנֵי
  english_pob_choice: The sons of
  chosen_spanish: Los hijos de
  alternatives_spanish:
  - Los descendientes de
  lexicon: HALOT
  rationale: En fórmulas genealógicas, בן en plural introduce la línea de descendencia. «Hijos de» es natural en español bíblico y conserva la relación inmediata de filiación que el hebreo presenta; «descendientes de» sería más amplio de lo necesario.
- source_word: מְרָרִי
  english_pob_choice: Merari
  chosen_spanish: Merari
  lexicon: Nombre propio
  rationale: Nombre propio transliterado de forma estable.
- source_word: מַחְלִי
  english_pob_choice: Mahli
  chosen_spanish: Mahli
  lexicon: Nombre propio
  rationale: Nombre propio transliterado.
- source_word: וּמֻשִׁי
  english_pob_choice: and Mushi
  chosen_spanish: y Mushi
  lexicon: Nombre propio
  rationale: Nombre propio con la conjunción coordinante normal en español.
- source_word: וְאֵלֶּה
  english_pob_choice: These were
  chosen_spanish: Estos fueron
  alternatives_spanish:
  - Y estos fueron
  - Estos son
  lexicon: HALOT
  rationale: La deíxis plural introduce un resumen genealógico. En español, «Estos fueron» resulta idiomático para un recuento pasado y conserva el matiz demostrativo sin sobreactuar la conjunción.
- source_word: מִשְׁפְּחוֹת
  english_pob_choice: the clans
  chosen_spanish: los clanes
  alternatives_spanish:
  - las familias
  lexicon: HALOT
  rationale: En contextos tribales y genealógicos, la unidad social es más amplia que la familia nuclear. «Clanes» recoge mejor ese valor; se conserva «familias» como alternativa posible en español, pero menos precisa aquí.
- source_word: הַלֵּוִי
  english_pob_choice: of the Levites
  chosen_spanish: de los levitas
  alternatives_spanish:
  - del levita
  - de Leví
  lexicon: HALOT
  rationale: Sigo la revisión inglesa que entendió el sentido colectivo. En español, el plural «levitas» comunica naturalmente el grupo tribal colectivo presente en el contexto, sin forzar una lectura singular.
- source_word: לַאֲבוֹתֵיהֶם
  english_pob_choice: according to their fathers’ houses
  chosen_spanish: según sus casas paternas[a]
  alternatives_spanish:
  - según las casas de sus padres
  - según sus casas ancestrales
  lexicon: HALOT
  rationale: La expresión hebrea es literal «a/según sus padres», pero en registro genealógico alude a la clasificación por casas paternas. «Casas paternas» mantiene la imagen y hace explícita la categoría social; la nota explica el sentido genealógico.
theological_decisions:
- issue: Clasificación genealógica de los levitas
  english_pob_reading: These were the clans of the Levites according to their fathers’ houses.
  chosen_spanish_reading: Estos fueron los clanes de los levitas según sus casas paternas.
  alternative_spanish_readings:
  - Estos fueron las familias de los levitas según sus casas paternas.
  - Estos fueron los clanes de Leví según sus casas paternas.
  rationale: No hay tensión doctrinal, pero sí una decisión interpretativa sobre el valor de מִשְׁפְּחוֹת y el colectivo de הַלֵּוִי. La redacción elegida conserva la organización tribal y evita reducir indebidamente la unidad social a familia nuclear o singularizar el grupo.
  doctrine_reference: Genealogía tribal/levítica en el marco histórico de Israel
translation_notes:
  revision_awareness: La versión inglesa auditada pasó de «the Levite» a «the Levites» por una revisión que favoreció el sentido colectivo del hebreo. La draft española adopta directamente ese sentido colectivo con «los levitas» y mantiene la explicación genealógica de לַאֲבוֹתֵיהֶם en una nota anclada al texto.
  spanish_consistency_notes:
  - Se mantiene «Merari», «Mahli» y «Mushi» de manera uniforme como nombres propios transliterados.
  - «Clanes» se usa para מִשְׁפְּחוֹת en coherencia con el valor social del término en contextos genealógicos.
  - «Casas paternas» conserva el color hebreo sin caer en un calco opaco; la nota evita perder el sentido clasificatorio.
  - No se usa «SEÑOR» ni terminología litúrgica no presente en el pasaje.
