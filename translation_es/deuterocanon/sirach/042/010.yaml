review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español sigue bien el hebreo primario y respeta el apoyo del griego: conserva las cuatro advertencias sobre seducción, desviación, embarazo y esterilidad. Sin embargo, el giro repetido «para que no» cambia innecesariamente el valor de פן / lest; en español bíblico-natural corresponde mejor «no sea que» o «no vaya a». Además, la nota [a] invierte el testimonio textual: no es el hebreo el que dice «no sea seducida» frente al griego, sino el griego el que lee «no sea profanada» donde el hebreo tiene «no sea seducida».'
  spanish_quality_summary: El texto es claro y legible, con buen nivel de dignidad. «En su virginidad», «en la casa de su padre» y «sea estéril» funcionan bien. La principal mejora estilística es reemplazar «para que no» por «no sea que», que suena más natural y fiel a una advertencia preventiva, no a un propósito positivo. Las notas necesitan ajuste de precisión y concisión.
  glossary_alignment: No hay conflictos con la terminología base del proyecto. Las decisiones léxicas principales («virginidad», «seducida», «desvíe», «encinta», «estéril») están alineadas con la auditoría inglesa y con la evidencia fuente. No aparecen términos sensibles del glosario general que requieran corrección.
  issues:
  - severity: medium
    issue: Uso repetido de «para que no» para traducir פן
    rationale: «פן» introduce prevención/temor ('lest'), no propósito. «No sea que» reproduce mejor la fuerza semántica y mejora la naturalidad del español bíblico moderno.
  - severity: high
    issue: La nota [a] describe incorrectamente la relación entre hebreo y griego
    rationale: La nota actual dice «El hebreo dice “para que no sea seducida”, mientras que el griego expresa “para que no sea profanada”» pero la lógica pedida por la auditoría inglesa es que el griego lee «lest she be defiled» donde el hebreo tiene «lest she be seduced». Debe señalarse como lectura griega alternativa, no como formulación española frente al hebreo.
  - severity: low
    issue: La razón de la nota [a] como «textual_variant» podría expresarse mejor como lectura alternativa
    rationale: No es un problema grave, pero la nota funciona como preservación de una lectura griega alternativa, en línea con la POB inglesa.
  revised_spanish_text: En su virginidad[a], no sea que sea seducida, y en la casa de su marido, no sea que se desvíe; en la casa de su padre, no sea que quede encinta, y en la casa de su marido[b], no sea que sea estéril.
  revised_footnotes:
  - marker: a
    text: El griego dice «no sea que sea profanada», donde el hebreo tiene «no sea que sea seducida», haciendo explícito el sentido sexual.
    reason: alternative_reading
  - marker: b
    text: La última cláusula también puede traducirse más literalmente como «no sea que sea retenida», pero el paralelo griego favorece el sentido «no sea que sea estéril».
    reason: lexical_alternative
  revision_rationale: Se corrige el español para reflejar mejor el valor preventivo de פן mediante «no sea que», y se repara la nota [a] para que represente con precisión la relación entre el hebreo y el griego documentada por la auditoría inglesa. El resto de las decisiones léxicas se conserva porque son fieles, claras y alineadas con la evidencia fuente.
