  text: וְ/נָתַתִּ֗י אֶת כָּל חֹ֨סֶן֙ הָ/עִ֣יר הַ/זֹּ֔את וְ/אֶת כָּל יְגִיעָ֖/הּ וְ/אֶת כָּל יְקָרָ֑/הּ וְ/אֵ֨ת כָּל אוֹצְר֜וֹת מַלְכֵ֣י יְהוּדָ֗ה אֶתֵּן֙ בְּ/יַ֣ד אֹֽיְבֵי/הֶ֔ם וּ/בְזָזוּ/ם֙ וּ/לְקָח֔וּ/ם וֶ/הֱבִיא֖וּ/ם בָּבֶֽלָ/ה־־־־־־־׃
base_translation:
  language: en
  yaml_path: translation/ot/jeremiah/020/005.yaml
  text: And I will give all the wealth of this city[a], all its produce, all its precious things, and all the treasures of the kings of Judah into the hand of their enemies. They will plunder them, seize them[c][b], and bring them to Babylon.
  footnotes:
  - marker: a
    text: Or 'all its labor' or 'all its produce' for 'all its gains.' The Hebrew term can refer either to labor itself or to what that labor yields.
    reason: lexical_alternative
  - marker: b
    text: Or 'all its valuables' for 'all its precious things.'
    reason: lexical_alternative
  - marker: c
    text: Hebrew 'into the hand of,' an idiom meaning into the control or power of.
    reason: cultural_note
