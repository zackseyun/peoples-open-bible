translation:
  language: es
  text: La casa quedó terminada para el día veintitrés del mes de Adar[a][b], en el sexto año del rey Darío.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, más literalmente: «hasta el tercero y el vigésimo del mes de Adar».'
    reason: lexical_alternative
  - marker: b
    text: Es decir, el templo; el griego dice simplemente «la casa».
    reason: cross_reference
lexical_decisions:
- source_word: συνετελέσθη
  english_pob_choice: was completed
  chosen_spanish: fue completada
  alternatives_spanish:
  - fue terminada
  - llegó a su término
  - fue llevada a su conclusión
  lexicon: BDAG / LSJ
  rationale: El aoristo pasivo de συντελέω expresa que la casa llegó a su estado final. "Fue completada" conserva el pasivo y suena natural en español bíblico moderno.
- source_word: ὁ οἶκος
  english_pob_choice: the house
  chosen_spanish: la casa
  alternatives_spanish:
  - el templo
  - la casa de Dios
  lexicon: BDAG
  rationale: El griego dice simplemente "la casa". Mantengo esa formulación para no sustituir la forma del texto por una explicitación interpretativa, aunque el referente sea el templo en el contexto.
- source_word: ἕως τρίτης καὶ εἰκάδος
  english_pob_choice: by the twenty-third day
  chosen_spanish: el día veintitrés
  alternatives_spanish:
  - hasta el día veintitrés
  - el veintitrés
  lexicon: LSJ
  rationale: La expresión idiomática equivale al día veintitrés. En español, "el día veintitrés" comunica con naturalidad el valor cronológico sin perder la referencia al día específico.
- source_word: μηνὸς Ἀδὰρ
  english_pob_choice: of the month Adar
  chosen_spanish: del mes de Adar
  alternatives_spanish:
  - de Adar
  lexicon: LSJ
  rationale: Se conserva el nombre propio del mes como transliteración estable y se expresa la relación genitiva con "del mes de" para una fecha clara y sobria.
- source_word: τοῦ ἕκτου ἔτους
  english_pob_choice: in the sixth year
  chosen_spanish: en el sexto año
  alternatives_spanish:
  - del sexto año
  lexicon: BDAG
  rationale: Es una fórmula regnal estándar. "En el sexto año" corresponde al sentido temporal del dativo/genitivo de datación y resulta idiomático en español.
- source_word: βασιλέως Δαρείου
  english_pob_choice: of King Darius
  chosen_spanish: del rey Darío
  alternatives_spanish:
  - de Darío el rey
  lexicon: BDAG
  rationale: Se mantiene el título real con el nombre propio en forma española usual. La construcción posesiva en español refleja la datación del texto griego.
theological_decisions:
- issue: Referente de ὁ οἶκος
  english_pob_reading: the house; the temple referent is clear from context, but the Greek text reads simply 'the house.'
  chosen_spanish_reading: la casa
  alternative_spanish_readings:
  - el templo
  - la casa de Dios
  rationale: Conservar "la casa" respeta el texto griego y evita borrar la tensión entre la forma literal y el referente contextual. La identificación con el templo queda implícita, como en el audit trail inglés.
  doctrine_reference: Contexto narrativo de la reconstrucción del templo; cf. uso de οἶκος en relatos del templo.
translation_notes:
  revision_awareness: Se sigue el pass más reciente con estado unchanged y la conclusión de high_agreement/minor-issues; no se detectaron cambios de contenido necesarios respecto del texto fuente ni del audit trail inglés.
  spanish_consistency_notes:
  - Se mantiene "Adar" como nombre propio del mes, sin adaptar la forma a una equivalencia litúrgica tradicional.
  - Se conserva "la casa" para reflejar el griego; la aclaración del referente queda en nota, no en el cuerpo del texto.
  - La datación regnal se formula con estilo natural en español y sin expandir el contenido del verso.
