translation:
  language: es
  text: 'Ester dijo[a]: «Si agrada al rey, que se conceda también mañana a los judíos que están en Susa actuar conforme al decreto de hoy, y que los diez hijos de Amán sean colgados en el madero».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, «colgados en el árbol» o «empalados en el poste». El hebreo dice literalmente «sobre el madero/árbol», lo cual en este contexto se refiere a un instrumento de ejecución.
    reason: lexical_alternative
lexical_decisions:
- source_word: אִם עַל־הַמֶּלֶךְ טוֹב
  english_pob_choice: If it pleases the king
  chosen_spanish: Si agrada al rey
  alternatives_spanish:
  - Si le parece bien al rey
  - Si es bueno al rey
  lexicon: HALOT
  rationale: La expresión hebrea es un modismo de corte que comunica aprobación o favor real, no una evaluación moral. «Agrada al rey» conserva el tono cortesano y suena natural en español.
- source_word: יִנָּתֵן
  english_pob_choice: let it be granted
  chosen_spanish: que se conceda
  alternatives_spanish:
  - que se dé
  - que se otorgue
  lexicon: HALOT
  rationale: El pasivo con matiz jussivo expresa una solicitud formal. «Conceder» comunica autorización oficial en un contexto real y jurídico.
- source_word: גַּם מָחָר
  english_pob_choice: tomorrow also
  chosen_spanish: también mañana
  alternatives_spanish:
  - mañana también
  - incluso mañana
  lexicon: HALOT
  rationale: Se mantiene la extensión temporal del permiso al día siguiente. «También mañana» reproduce bien el énfasis aditivo de גַּם sin sonar forzado.
- source_word: לַיְּהוּדִים אֲשֶׁר בְּשׁוּשָׁן
  english_pob_choice: to the Jews who are in Susa
  chosen_spanish: a los judíos que están en Susa
  alternatives_spanish:
  - para los judíos que están en Susa
  - a los judíos en Susa
  lexicon: HALOT
  rationale: El dativo señala a los beneficiarios de la concesión. «Que están en Susa» preserva la relativa del hebreo y mantiene claridad.
- source_word: לַעֲשׂוֹת כְּדָת הַיּוֹם
  english_pob_choice: to do tomorrow also according to today’s decree
  chosen_spanish: hacer según el decreto de hoy
  alternatives_spanish:
  - actuar según el decreto de hoy
  - obrar conforme al decreto de hoy
  lexicon: HALOT
  rationale: En Ester, דָּת designa una disposición o decreto real. «Decreto» es más preciso que «ley» en este contexto persa; «hacer» conserva la amplitud del infinitivo sin sobreespecificar la acción.
- source_word: דָּת
  english_pob_choice: decree
  chosen_spanish: decreto
  alternatives_spanish:
  - ley
  - edicto
  lexicon: HALOT
  rationale: La referencia en Ester es a una orden oficial del rey. «Decreto» es la forma más natural y fiel en español para ese marco administrativo.
- source_word: עֲשֶׂרֶת בְּנֵי הָמָן
  english_pob_choice: Haman’s ten sons
  chosen_spanish: los diez hijos de Amán
  alternatives_spanish:
  - los diez hijos de Haman
  - los diez hijos de Hamán
  lexicon: HALOT
  rationale: Se conserva el nombre propio en forma española habitual «Amán» y la relación posesiva se expresa de modo natural con «los diez hijos de…».
- source_word: יִתְלוּ עַל־הָעֵץ
  english_pob_choice: let Haman’s ten sons be hanged on the gallows
  chosen_spanish: que sean colgados en el madero
  alternatives_spanish:
  - que sean ahorcados en la horca
  - que sean colgados en el árbol
  lexicon: HALOT
  rationale: El hebreo dice literalmente «sobre el árbol/madero», pero en este relato se refiere a un instrumento de ejecución. «Madero» conserva la imagen material sin imponer una lectura tradicional que no esté explícita en el texto.
theological_decisions:
- issue: Instrumento de ejecución en עֵץ
  english_pob_reading: '''on the wood/tree,'' which in context refers to an execution structure'
  chosen_spanish_reading: «en el madero»
  alternative_spanish_readings:
  - «en la horca»
  - «en el árbol»
  - «en el poste»
  rationale: El POB inglés conserva la tensión entre el sentido literal («wood/tree») y el referente contextual de ejecución. En español, «madero» permite mantener esa literalidad relativa sin cerrar indebidamente la imagen a una horca moderna ni perder el vínculo con el hebreo.
  doctrine_reference: Lexical/theological note; no doctrinal issue.
translation_notes:
  revision_awareness: El texto sigue de cerca el análisis del WLC y el auditor inglés sin depender mecánicamente de la redacción inglesa. Se conserva la estructura de petición formal, el valor jurídico de דָּת como «decreto», y la ambigüedad controlada de עֵץ mediante una nota que mantiene la alternativa literal del hebreo.
  spanish_consistency_notes:
  - Se usa «Amán» como forma española consistente del nombre.
  - Se evita «SEÑOR» u otra sustitución, porque aquí no aparece el Tetragrámaton.
  - «Decreto» se mantiene para דָּת en sintonía con el uso de Ester en contexto persa.
  - «Madero» preserva mejor la tensión textual que una equivalencia cerrada como «horca».
