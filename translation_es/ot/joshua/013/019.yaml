translation:
  language: es
  text: y Quiriataim, y Sibma, y Zéret-sáhar[a], en el monte del valle.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O posiblemente «Zéret del alba», si el nombre se analiza semánticamente en vez de conservarse como topónimo transliterado.
