translation:
  language: es
  text: Tus testimonios son muy confiables[a]; la santidad conviene a tu casa, Yahvé[b], por largos días.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «para siempre». El hebreo dice literalmente: «por largos días».'
    reason: lexical_alternative
  - marker: b
    text: O «oh Yahvé, por largos días».
    reason: previous_rendering
lexical_decisions:
- source_word: עֵדֹתֶיךָ
  english_pob_choice: your testimonies
  chosen_spanish: tus testimonios
  alternatives_spanish:
  - tus decretos
  - tus estatutos
  lexicon: HALOT
  rationale: «Testimonios» conserva el campo semántico de עֵדוֹת y mantiene el vínculo con declaraciones divinas de pacto. En español suena natural y no reduce el término a una sola categoría jurídica.
- source_word: נֶאֶמְנוּ
  english_pob_choice: are trustworthy
  chosen_spanish: son muy confiables
  alternatives_spanish:
  - son seguros
  - son fieles
  - son confirmados
  lexicon: HALOT
  rationale: El niphal de אמן expresa firmeza y fiabilidad. «Confiables» comunica bien esa cualidad en español; se añadió «muy» para reflejar מְאֹד sin sonar forzado.
- source_word: מְאֹד
  english_pob_choice: very
  chosen_spanish: muy
  alternatives_spanish:
  - en gran manera
  - sumamente
  lexicon: HALOT
  rationale: Es un intensificador estándar. «Muy» es la opción más natural y fiel en español contemporáneo.
- source_word: לְבֵיתְךָ
  english_pob_choice: your house
  chosen_spanish: tu casa
  alternatives_spanish:
  - tu templo
  - tu morada
  lexicon: HALOT
  rationale: Se conserva la imagen literal de בַּיִת como «casa». En este contexto puede aludir al santuario, pero «casa» permite que ese sentido cultual permanezca implícito sin sobreinterpretarlo.
- source_word: נַאֲוָה
  english_pob_choice: befits
  chosen_spanish: conviene
  alternatives_spanish:
  - es apropiada
  - es adecuada
  - le queda bien
  lexicon: HALOT
  rationale: El verbo expresa conveniencia o belleza apropiada. «Conviene» reproduce bien la idea de que la santidad corresponde a la casa de Dios.
- source_word: קֹדֶשׁ
  english_pob_choice: holiness
  chosen_spanish: la santidad
  alternatives_spanish:
  - la santidad sagrada
  - la pureza sagrada
  lexicon: HALOT
  rationale: Aquí funciona como sustantivo abstracto que describe lo adecuado para la casa de Dios. «La santidad» mantiene esa cualidad sin añadir matices ajenos.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahveh
  lexicon: HALOT
  rationale: 'Se sigue la convención del proyecto para el Tetragrámaton: transliterar el nombre divino como «Yahvé», preservando el nombre personal de Dios y no sustituyéndolo por un título.'
- source_word: לְאֹרֶךְ יָמִים
  english_pob_choice: for length of days
  chosen_spanish: por la duración de los días
  alternatives_spanish:
  - para larga duración
  - por largo tiempo
  - para siempre
  lexicon: HALOT
  rationale: Se conserva el giro hebreo de duración prolongada en lugar de resolverlo de inmediato como «para siempre». «Por la duración de los días» es transparente y legible en español.
theological_decisions:
- issue: Traducción del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahveh
  - el SEÑOR
  rationale: El texto hebreo usa el Tetragrámaton directamente. Siguiendo la convención del proyecto, se mantiene el nombre divino en forma transliterada, no una sustitución por título. «Yahvé» es la forma establecida en este borrador español.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Valor de לְאֹרֶךְ יָמִים
  english_pob_reading: for length of days
  chosen_spanish_reading: por la duración de los días
  alternative_spanish_readings:
  - para siempre
  - por muchos días
  rationale: La frase se conserva de manera bastante literal para no borrar su textura hebrea. La opción interpretativa «para siempre» queda implícita como posibilidad, pero no se impone en el texto principal.
  doctrine_reference: 'DOCTRINE.md Translation philosophy #3, #5'
translation_notes:
  revision_awareness: 'El borrador toma en cuenta la revisión que movió el vocativo al final en inglés para reflejar mejor el hebreo. En español se sigue la misma relación sintáctica: «la santidad conviene a tu casa, Yahvé, por la duración de los días», evitando separar de modo artificial el complemento temporal de la cláusula principal.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» conforme al estándar del proyecto para יְהוָה.
  - Se usa «testimonios» en plural para עֵדֹתֶיךָ, en línea con el valor covenantal del término.
  - «Conviene» conserva la idea de idoneidad sin volver el verso demasiado explicativo.
  - El complemento temporal «por la duración de los días» se deja visible en el texto principal para preservar la literalidad y la transparencia auditiva.
