translation:
  language: es
  text: Por eso, me aterro ante él[a]; cuando lo considero[b], le tengo miedo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «delante de él» o «por causa de él»; el hebreo literalmente involucra «de su rostro/presencia».
    reason: lexical_alternative
  - marker: b
    text: O «reflexiono» o «medito» para «cuando lo considero».
    reason: lexical_alternative
lexical_decisions:
- source_word: עַל כֵּן
  english_pob_choice: Therefore
  chosen_spanish: Por eso
  alternatives_spanish:
  - Por tanto
  - Por consiguiente
  lexicon: HALOT
  rationale: La frase introduce una conclusión lógica. «Por eso» comunica bien el valor inferencial de עַל כֵּן en un español natural y sobrio.
- source_word: מִפָּנָיו
  english_pob_choice: before him
  chosen_spanish: estar delante de él
  alternatives_spanish:
  - ante él
  - en su presencia
  - frente a él
  lexicon: HALOT
  rationale: La imagen literal de מִן + פנים es ‘de delante de su rostro/presencia’. «Estar delante de él» conserva la relación espacial/personal sin ocultar el matiz de presencia que el hebreo expresa.
- source_word: אֶבָּהֵל
  english_pob_choice: I am terrified
  chosen_spanish: me horroriza
  alternatives_spanish:
  - me aterra
  - quedo aterrorizado
  - me lleno de pavor
  lexicon: HALOT
  rationale: El nifal de בהל indica quedar consternado, alarmado o aterrado. «Me horroriza» expresa con fuerza esa reacción de sobresalto y desasosiego ante Dios sin suavizarla.
- source_word: אֶתְבּוֹנֵן
  english_pob_choice: when I consider
  chosen_spanish: cuando reflexiono
  alternatives_spanish:
  - cuando considero
  - cuando medito
  - cuando lo contemplo
  lexicon: HALOT
  rationale: La forma reflexiva de בין aquí es claramente cognitiva. «Reflexiono» preserva ese sentido de pensar detenidamente, como alternativa natural a «considero».
- source_word: וְאֶפְחַד
  english_pob_choice: I am afraid
  chosen_spanish: siento temor
  alternatives_spanish:
  - temo
  - me da miedo
  - me invade el temor
  lexicon: HALOT
  rationale: פחד expresa miedo real. «Siento temor» mantiene el paralelismo con la primera cola y transmite la respuesta emocional continua sin volverla abstracta.
- source_word: מִמֶּנּוּ
  english_pob_choice: of him
  chosen_spanish: de él
  alternatives_spanish:
  - ante él
  - por él
  lexicon: HALOT
  rationale: Con פחד, la preposición funciona de modo natural como complemento de objeto del temor. «De él» conserva la relación directa y no añade una explicación interpretativa.
theological_decisions:
- issue: Referencia implícita al sujeto divino
  english_pob_reading: Rendered as 'his'/'him,' referring to God without substituting a divine title in the text.
  chosen_spanish_reading: Mantener los pronombres «él» y no sustituirlos por «Dios» en el cuerpo del versículo.
  alternative_spanish_readings:
  - Explicitar «Dios» en el texto
  - Repetir «Yahvé»
  rationale: El hebreo usa sufijos pronominales y el contexto inmediato identifica claramente al referente. Mantener el pronombre preserva el flujo discursivo y evita añadir un título que no aparece en el verso.
  doctrine_reference: Translation philosophy §1, §6
- issue: Intensidad del temor de Job ante Dios
  english_pob_reading: Used strong fear language ('terrified' ... 'afraid') without softening or doctrinally resolving Job's experience.
  chosen_spanish_reading: 'Conservar un lenguaje fuerte de temor: «me horroriza» ... «siento temor».'
  alternative_spanish_readings:
  - «me impresiono» ... «me admiro»
  - «siento reverencia»
  rationale: El verso describe una reacción real de temor ante Dios, no solo asombro devocional. La redacción preserva esa tensión sin suavizarla teológicamente.
  doctrine_reference: Translation philosophy §3
translation_notes:
  revision_awareness: El auditorial inglés pasó de «at his presence» a «before him» para hacer más directa la relación del hebreo con la presencia de Dios. En español se optó por una formulación equivalente y natural («estar delante de él»), manteniendo la fuerza del temor y la referencia implícita a Dios sin explicitarla en el cuerpo del verso.
  spanish_consistency_notes:
  - Se usa «él» como referente divino implícito, coherente con el tratamiento pronominal del hebreo y con el audit trail inglés.
  - Se evitó «SEÑOR» o «Dios» en el texto principal porque el versículo no los nombra explícitamente.
  - Se preserva la duplicación semántica del temor con dos verbos distintos, reflejando la paralelismo del hebreo.
