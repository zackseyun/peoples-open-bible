translation:
  language: es
  text: Todo varón[a] entre los hijos de Aarón podrá comer de ello. Es un estatuto perpetuo por todas sus generaciones, de las ofrendas de alimento de Yahvé. Todo lo que los toque[b] quedará santificado.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Todo hombre»; el hebreo usa un masculino distributivo aplicado a la aptitud sacerdotal.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «será santo». El hebreo puede denotar que algo llega a ser santo por contacto; algunos lo entienden más restrictivamente, como que solo lo santo puede tocarlos.'
    reason: theological_note
lexical_decisions:
- source_word: כָּל זָכָר
  english_pob_choice: Every male
  chosen_spanish: Todo varón
  alternatives_spanish:
  - Todo hombre
  - Todo macho
  lexicon: HALOT
  rationale: En un contexto de elegibilidad sacerdotal, «varón» comunica el rasgo masculino sin introducir la connotación general de «hombre» ni la aspereza de «macho». El distributivo כָּל se mantiene con «Todo».
- source_word: בִּבְנֵי אַהֲרֹן
  english_pob_choice: among the sons of Aaron
  chosen_spanish: entre los hijos de Aarón
  alternatives_spanish:
  - de los hijos de Aarón
  - entre la descendencia de Aarón
  lexicon: HALOT
  rationale: «Hijos de Aarón» preserva la expresión sacerdotal literal y «entre» reproduce el valor inclusivo/distributivo del hebreo en este contexto de quienes tienen derecho a comer.
- source_word: יֹאכֲלֶנָּה
  english_pob_choice: may eat of it
  chosen_spanish: podrá comer de ello
  alternatives_spanish:
  - comerá de ello
  - puede comer de ello
  lexicon: HALOT
  rationale: El futuro modal en español comunica permiso o derecho legal. «De ello» evita estrechar el referente y suena natural para una porción sacrificial.
- source_word: חָק עוֹלָם
  english_pob_choice: a permanent statute
  chosen_spanish: estatuto perpetuo
  alternatives_spanish:
  - estatuto permanente
  - estatuto para siempre
  lexicon: HALOT
  rationale: «Estatuto perpetuo» es una fórmula jurídica bíblica sobria y fiel; conserva la fuerza durativa sin volverlo meramente devocional.
- source_word: לְדֹרֹתֵיכֶם
  english_pob_choice: throughout your generations
  chosen_spanish: para vuestras generaciones
  alternatives_spanish:
  - por vuestras generaciones
  - de generación en generación
  lexicon: HALOT
  rationale: La fórmula española tradicional «para vuestras generaciones» refleja bien la continuidad legal a través del linaje, sin añadir un matiz temporal ajeno.
- source_word: מֵאִשֵּׁי יְהוָה
  english_pob_choice: from the food offerings of Yahweh
  chosen_spanish: de las ofrendas encendidas de Yahvé
  alternatives_spanish:
  - de las ofrendas hechas por fuego a Yahvé
  - de las ofrendas ígneas de Yahvé
  lexicon: HALOT
  rationale: Se conserva la relación con el fuego en אִשֵּׁי mediante «ofrendas encendidas», una opción española clara y reverente. «De» expresa el origen/porción de la que se habla.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: Se sigue el estándar del proyecto para el nombre divino, sin sustituirlo por una convención de ocultamiento.
- source_word: כֹּל אֲשֶׁר יִגַּע בָּהֶם
  english_pob_choice: Whatever touches them
  chosen_spanish: Todo lo que toque a ellos
  alternatives_spanish:
  - Cualquiera que los toque
  - Todo cuanto los toque
  lexicon: HALOT
  rationale: El hebreo es amplio y no obliga a restringir a personas u objetos. «Todo lo que» preserva esa amplitud; «a ellos» mantiene la referencia pronominal del hebreo con claridad española.
- source_word: יִקְדָּשׁ
  english_pob_choice: shall become holy
  chosen_spanish: será santo
  alternatives_spanish:
  - quedará santificado
  - será consagrado
  lexicon: HALOT
  rationale: En español, «será santo» mantiene el resultado de estado indicado por el verbo sin imponer de entrada una formulación interpretativa más técnica. El contexto sacrificial deja abierta la tensión entre volverse santo y quedar bajo condición de santidad.
theological_decisions:
- issue: Transferencia de santidad por contacto en la cláusula final
  english_pob_reading: Whatever touches them shall become holy.
  chosen_spanish_reading: Todo lo que toque a ellos será santo.
  alternative_spanish_readings:
  - Todo lo que los toque será santificado.
  - Todo lo que los toque quedará consagrado.
  rationale: La lectura principal conserva la afirmación de santidad por contacto sin resolverla excesivamente. «Será santo» deja intacta la lógica de santidad contagiosa propia del pasaje, mientras permite que el contexto determine si se trata de consagración, estado sagrado o restricción de contacto.
  doctrine_reference: 'Translation philosophy §3: preserve theological tension rather than resolve it'
translation_notes:
  revision_awareness: El inglés POB de referencia no requirió cambios de revisión en el último pase; se mantuvo la decisión de traducir el alcance amplio de כֹּל אֲשֶׁר y de preservar la tensión teológica en יִקְדָּשׁ. La versión española sigue ese mismo criterio, ajustándolo a una sintaxis natural y legible en español.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» para el nombre divino en coherencia con el estándar del proyecto.
  - Se usa «ofrendas encendidas» para reflejar el valor sacrificial de אִשֵּׁי sin recurrir a una paráfrasis extensa.
  - «Santo» se deja como equivalente de la santificación resultante, en consonancia con la terminología del proyecto y con la ambigüedad controlada del texto hebreo.
