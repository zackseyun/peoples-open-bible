translation:
  language: es
  text: 'Estas eran las divisiones[a] de los hijos de Aarón: los hijos de Aarón eran Nadab y Abiú, Eleazar e Itamar.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'cursos' para 'divisiones'; el hebreo se refiere a agrupaciones sacerdotales ordenadas.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְ/לִ/בְנֵי אַהֲרֹ֖ן
  english_pob_choice: Now these were the ... of the sons of Aaron
  chosen_spanish: Ahora bien, estas eran las divisiones de los hijos de Aarón
  alternatives_spanish:
  - Y para los hijos de Aarón
  - Y estas eran las divisiones de los hijos de Aarón
  lexicon: HALOT
  rationale: El hebreo con וְ/לִ/בְנֵי introduce una sección con valor discursivo, no solo una coordinación literal. 'Ahora bien' comunica ese cambio de tramo y 'de los hijos de Aarón' conserva la relación constructa sin volver la frase rígida.
- source_word: מַחְלְקוֹתָ֑/ם
  english_pob_choice: divisions
  chosen_spanish: divisiones
  alternatives_spanish:
  - cursos
  - grupos
  - ordenamientos
  lexicon: HALOT
  rationale: La forma denota grupos ordenados o distribuidos. 'Divisiones' sigue de cerca la decisión inglesa auditada, mantiene transparencia y evita el término eclesiástico más técnico 'cursos' como opción principal.
- source_word: בְּנֵ֣י אַהֲרֹ֔ן
  english_pob_choice: the sons of Aaron
  chosen_spanish: los hijos de Aarón
  alternatives_spanish:
  - los hijos varones de Aarón
  - los descendientes de Aarón
  lexicon: HALOT
  rationale: '''Hijos'' reproduce con precisión el hebreo בני y es la forma natural en español bíblico para esta relación genealógica. ''Descendientes'' sería más interpretativo que el texto.'
- source_word: נָדָב
  english_pob_choice: Nadab
  chosen_spanish: Nadab
  alternatives_spanish:
  - Nadad
  lexicon: Transliteración tradicional española
  rationale: Se conserva el nombre propio en la forma usual en español bíblico, que coincide con la tradición de transliteración más estable.
- source_word: וַאֲבִיהוּא
  english_pob_choice: Abihu
  chosen_spanish: Abiú
  alternatives_spanish:
  - Abihú
  - Abihu
  lexicon: Transliteración tradicional española
  rationale: '''Abiú'' es la forma asentada en español; además, evita una transliteración demasiado cercana al inglés que resultaría menos natural para el lector hispanohablante.'
- source_word: אֶלְעָזָר
  english_pob_choice: Eleazar
  chosen_spanish: Eleazar
  alternatives_spanish:
  - Eleázar
  lexicon: Transliteración tradicional española
  rationale: Nombre propio bien establecido en español bíblico, sin necesidad de ajustes.
- source_word: וְאִיתָמָר
  english_pob_choice: Ithamar
  chosen_spanish: Itamar
  alternatives_spanish:
  - Itamár
  - Ithamar
  lexicon: Transliteración tradicional española
  rationale: '''Itamar'' es la forma usual en español y corresponde al nombre bíblico conocido.'
theological_decisions:
- issue: Valor de מַחְלְקוֹת en un contexto sacerdotal
  english_pob_reading: divisions; Or 'courses' for 'divisions'; the Hebrew refers to arranged priestly groupings.
  chosen_spanish_reading: divisiones
  alternative_spanish_readings:
  - cursos
  - grupos sacerdotales
  - turnos
  rationale: El texto describe agrupamientos sacerdotales ordenados. 'Divisiones' conserva la amplitud semántica sin imponer el tecnicismo litúrgico 'cursos' como lectura principal, aunque esa alternativa se reconoce como posible.
  doctrine_reference: Orden y ministerio sacerdotal en el templo; cf. 1 Crónicas 24:2-19.
translation_notes:
  revision_awareness: La revisión inglesa más reciente no cambió el sentido del versículo y mantuvo el acuerdo alto con la fuente; por ello la redacción española sigue de cerca la estructura y las decisiones léxicas auditadas, con adaptación natural al español.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' como norma del proyecto, pero este versículo no contiene el nombre divino.
  - Se conserva la enumeración genealógica con nombres propios en formas españolas tradicionales y transparentes.
  - '''Divisiones'' se usa en sentido organizativo, no doctrinal; la nota preserva la alternativa ''cursos'' sin sobrecargar el texto principal.'
