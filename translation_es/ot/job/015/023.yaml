translation:
  language: es
  text: 'Vaga en busca de pan[a]: «¿Dónde está?» Sabe que un día de tinieblas está cerca[b] para él.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «en busca de alimento». Hebreo «pan» puede designar comida en sentido más amplio.
    reason: lexical_alternative
  - marker: b
    text: Lit. «en su mano»; la expresión probablemente significa que el día de tinieblas está cerca de él o le aguarda de inmediato.
    reason: lexical_alternative
lexical_decisions:
- source_word: נֹדֵד
  english_pob_choice: wanders about
  chosen_spanish: anda errante
  alternatives_spanish:
  - vaga
  - anda de un lado a otro
  - anda errante de aquí para allá
  lexicon: HALOT
  rationale: El participio qal expresa un ir y venir inquieto y sin asiento. «Anda errante» conserva la idea de movimiento inestable sin convertirlo innecesariamente en «fugitivo» ni suavizarlo a un simple «camina».
- source_word: לַלֶּחֶם
  english_pob_choice: for bread
  chosen_spanish: por pan
  alternatives_spanish:
  - por alimento
  - por comida
  - por pan de comer
  lexicon: HALOT
  rationale: לֶחֶם puede designar literalmente pan y, por extensión, comida. Se mantiene «pan» en el texto principal por fidelidad y concreción; el sentido ampliado queda disponible por contexto y en la nota.
- source_word: אַיֵּה
  english_pob_choice: Where is it?
  chosen_spanish: ¿Dónde está?
  alternatives_spanish:
  - ¿Dónde?
  - ¿Dónde está el pan?
  lexicon: HALOT
  rationale: El interrogativo significa «¿dónde?». En español, la formulación natural requiere suplir el referente implícito; «¿Dónde está?» preserva la búsqueda desesperada sin añadir más que el antecedente ya sugerido por el contexto.
- source_word: יָדַע
  english_pob_choice: He knows
  chosen_spanish: Sabe
  alternatives_spanish:
  - Él sabe
  - Reconoce
  - Se da cuenta
  lexicon: HALOT
  rationale: El perfecto expresa conocimiento asentado. En español, «Sabe» mantiene la sobriedad del original y funciona bien en el encabalgamiento del verso.
- source_word: נָכוֹן
  english_pob_choice: is ready
  chosen_spanish: está preparado
  alternatives_spanish:
  - está listo
  - está dispuesto
  - está fijo
  lexicon: HALOT
  rationale: La forma pasiva/adjetival comunica algo ya dispuesto, preparado o establecido. «Está preparado» recoge esa inminencia sin perder el matiz de algo ya dispuesto de antemano.
- source_word: בְּיָדוֹ
  english_pob_choice: at hand for him
  chosen_spanish: para él
  alternatives_spanish:
  - en su mano
  - a su alcance
  - cerca de él
  lexicon: HALOT
  rationale: La expresión literal «en su mano» resulta poco natural en español para este contexto. La POB inglesa ya documenta que la fuerza idiomática es la cercanía/inminencia; «para él» conserva esa relación sin borrar la imagen subyacente, que se explica en la nota.
- source_word: יוֹם חֹשֶׁךְ
  english_pob_choice: a day of darkness
  chosen_spanish: un día de tinieblas
  alternatives_spanish:
  - un día de oscuridad
  - un día oscuro
  - el día de tinieblas
  lexicon: HALOT
  rationale: La construcción nominal mantiene su fuerza imagística. En español, «tinieblas» comunica mejor el carácter ominoso y poético que «oscuridad», sin explicitar más de lo que el hebreo dice.
theological_decisions:
- issue: Fuerza metafórica de "día de tinieblas"
  english_pob_reading: Rendered as 'a day of darkness' without explicating it as divine judgment in the main text.
  chosen_spanish_reading: un día de tinieblas
  alternative_spanish_readings:
  - un día de calamidad
  - un día de juicio
  - un día de perdición
  rationale: El contexto sugiere desastre inminente, pero la frase hebrea permanece imagística. Se conserva esa tensión en español sin resolverla doctrinalmente en el cuerpo del texto.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: El cotejo final indica alta concordancia con el audit trail inglés; no se registraron revisiones aplicadas y el sentido quedó estable.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como forma estándar cuando aparezca el nombre divino en este proyecto; aquí el versículo no lo contiene.
  - Se conserva la metáfora de «tinieblas» sin sustituirla por una explicación interpretativa.
  - «Pan» en el texto principal y «alimento» en la nota respetan la polisemia hebrea documentada por el audit trail.
