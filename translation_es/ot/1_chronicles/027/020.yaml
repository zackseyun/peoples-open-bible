translation:
  language: es
  text: 'Para los hijos de Efraín: Hoshea[a] hijo de Azaziah; para la media tribu de Manasés: Joel hijo de Pedaiah.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Hoshea» corresponde más de cerca a la forma hebrea; «Oseas» es una forma española habitual del nombre.
    reason: lexical_alternative
lexical_decisions:
- source_word: לִ/בְנֵי
  english_pob_choice: For the sons of
  chosen_spanish: Para los hijos de
  alternatives_spanish:
  - Para los descendientes de
  - Sobre los hijos de
  lexicon: HALOT
  rationale: En esta lista administrativa, el prefijo ל expresa asignación o pertenencia a un grupo. En español, «para» conserva mejor esa relación que una fórmula más abstracta. Se mantiene «hijos» como designación tribal tradicional, sin reducirla a «descendientes».
- source_word: אֶפְרַיִם
  english_pob_choice: Ephraim
  chosen_spanish: Efraín
  alternatives_spanish:
  - Ephraim
  lexicon: HALOT
  rationale: Nombre tribal propio. En español bíblico estándar, «Efraín» es la forma natural y reconocible del nombre.
- source_word: הוֹשֵׁעַ
  english_pob_choice: Hoshea
  chosen_spanish: Oseas
  alternatives_spanish:
  - Hoshea
  - Josué
  lexicon: HALOT
  rationale: El hebreo admite una transliteración cercana como «Hoshea», pero en español el nombre tradicional y más inteligible es «Oseas». Se conserva la forma con aspiración y vocalismo aproximados al evitar una traducción mecánica del inglés.
- source_word: בֶּן
  english_pob_choice: son of
  chosen_spanish: hijo de
  alternatives_spanish:
  - hijo de
  lexicon: HALOT
  rationale: Relación genealógica estándar. «Hijo de» es la equivalencia normal y transparente en español.
- source_word: עֲזַזְיָהוּ
  english_pob_choice: Azaziah
  chosen_spanish: Azazías
  alternatives_spanish:
  - Azaziah
  lexicon: HALOT
  rationale: Nombre propio transliterado en forma española usual. «Azazías» mantiene la terminación nominal bíblica más natural en español.
- source_word: לַ/חֲצִי שֵׁבֶט
  english_pob_choice: for the half-tribe
  chosen_spanish: para la media tribu
  alternatives_spanish:
  - para la mitad de la tribu
  - para la semitribu
  lexicon: HALOT
  rationale: «Media tribu» es la forma más clara y fiel en español para expresar la unidad tribal dividida en dos mitades. «Semitribu» suena menos natural y puede oscurecer la referencia histórica.
- source_word: מְנַשֶּׁה
  english_pob_choice: Manasseh
  chosen_spanish: Manasés
  alternatives_spanish:
  - Manasseh
  lexicon: HALOT
  rationale: Nombre tribal propio en forma española estándar. Aquí designa específicamente la mitad de la tribu, no la persona.
- source_word: יוֹאֵל
  english_pob_choice: Joel
  chosen_spanish: Joel
  alternatives_spanish:
  - Yoel
  lexicon: HALOT
  rationale: Nombre propio ya asentado en español bíblico; la forma «Joel» es clara y fiel.
- source_word: פְּדָיָהוּ
  english_pob_choice: Pedaiah
  chosen_spanish: Pedaías
  alternatives_spanish:
  - Pedaiah
  lexicon: HALOT
  rationale: Nombre propio adaptado a la ortografía española bíblica usual. «Pedaías» conserva la forma del nombre con una terminación natural en español.
translation_notes:
  revision_awareness: El texto inglés auditado es estable y de alta concordancia con el hebreo; no se registran revisiones aplicadas. La versión española sigue directamente el patrón administrativo del original, conservando las dos asignaciones tribales y la estructura genealógica.
  spanish_consistency_notes:
  - Se mantiene la designación tribal con «hijos de» y «media tribu» para reflejar la estructura del hebreo.
  - Los nombres propios se adaptan a formas españolas bíblicas cuando existen y son reconocibles.
  - Se evita introducir mayúsculas innecesarias fuera de nombres propios y comienzo de frase.
  - La nota a pie de página marca la alternativa de transliteración, siguiendo el aparato inglés auditado.
