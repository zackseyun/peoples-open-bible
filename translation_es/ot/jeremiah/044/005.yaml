translation:
  language: es
  text: Pero no escucharon ni inclinaron su oído para volverse de su maldad, a fin de no hacer ofrendas[a] a otros dioses.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O más literalmente, «no quemar incienso a otros dioses».
    reason: lexical_alternative
lexical_decisions:
- source_word: שָׁמְעוּ
  english_pob_choice: did not listen
  chosen_spanish: no escucharon
  alternatives_spanish:
  - no oyeron
  - no obedecieron
  lexicon: HALOT
  rationale: שׁמע puede abarcar oír, prestar atención y obedecer. En este reproche profético, el sentido es la negativa a atender el mensaje; 'escucharon' conserva esa fuerza sin volverlo excesivamente técnico.
- source_word: הִטּוּ אֶת אָזְנָם
  english_pob_choice: incline their ear
  chosen_spanish: inclinaron su oído
  alternatives_spanish:
  - volvieron su oído
  - prestaron atención
  lexicon: HALOT
  rationale: La imagen hebrea es corporal y metafórica. 'Inclinaron su oído' reproduce bien la expresión y mantiene el tono solemne.
- source_word: לָשׁוּב
  english_pob_choice: to turn
  chosen_spanish: volverse
  alternatives_spanish:
  - volver
  - arrepentirse
  lexicon: HALOT
  rationale: Aquí el verbo expresa apartarse de una conducta mala. 'Volverse' mantiene el movimiento de cambio sin introducir de manera explícita el matiz teológico más fuerte de 'arrepentirse'.
- source_word: מֵרָעָתָם
  english_pob_choice: from their evil
  chosen_spanish: de su maldad
  alternatives_spanish:
  - de su mal
  - de su perversidad
  - de sus malas obras
  lexicon: HALOT
  rationale: רָעָה puede referirse a maldad, mal o conducta perversa. 'Maldad' comunica bien tanto la disposición como la práctica culpable en este contexto.
- source_word: לְבִלְתִּי קַטֵּר
  english_pob_choice: so as not to make offerings
  chosen_spanish: a fin de no hacer ofrendas
  alternatives_spanish:
  - para no quemar incienso
  - a fin de no quemar incienso
  lexicon: HALOT
  rationale: El verbo קטר en este contexto cultual puede traducirse más literalmente como 'quemar incienso', pero el sentido en la denuncia profética es la práctica idolátrica del culto. 'Hacer ofrendas' comunica de forma natural esa acción, mientras que la alternativa más literal queda preservada en la nota.
- source_word: לֵאלֹהִים אֲחֵרִים
  english_pob_choice: to other gods
  chosen_spanish: a dioses ajenos
  alternatives_spanish:
  - a otros dioses
  - para dioses ajenos
  lexicon: HALOT
  rationale: La construcción apunta a dedicación cultual a deidades distintas de Yahvé. 'Dioses ajenos' es una fórmula clara en español bíblico y conserva la idea de alteridad e infidelidad del texto.
theological_decisions:
- issue: Traducción del final cultual con קטר en contexto idolátrico
  english_pob_reading: so as not to make offerings to other gods
  chosen_spanish_reading: a fin de no hacer ofrendas a dioses ajenos
  alternative_spanish_readings:
  - para no quemar incienso a dioses ajenos
  - a fin de no quemar incienso a dioses ajenos
  rationale: La forma elegida expresa el propósito negativo de לְבִלְתִּי y mantiene la referencia al acto cultual sin sobrecargar el texto principal con una literalidad que en español podría sonar demasiado estrecha. La nota conserva la lectura más literal para auditoría.
  doctrine_reference: 'Translation philosophy: optimal equivalence; preserve meaningful lexical alternatives in notes.'
translation_notes:
  revision_awareness: 'Se corrigió la relación entre la nota y el texto principal: el marcador [a] aparece ahora exactamente en la frase «a fin de no [a]hacer ofrendas», de modo que la alternativa literal queda anclada al verbo cultual correspondiente. La redacción principal también ajusta el valor final de לְבִלְתִּי como propósito/resultado.'
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» según el estándar del proyecto cuando aparezca el nombre divino; este versículo no lo contiene.
  - Se evitó «SEÑOR» como sustituto, pues no corresponde aquí.
  - Se conservó «dioses ajenos» como fórmula bíblica clara y no se sustituyó por términos eclesiásticos más interpretativos.
  - El registro es sobrio y publicable, con sintaxis natural en español latinoamericano.
