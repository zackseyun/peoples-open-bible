translation:
  language: es
  text: Y ordenó que la cabeza de Nicanor[a], y la mano con el hombro, se cortaran y se llevaran a Jerusalén—él, que con todo su cuerpo y alma había combatido en primera línea por los ciudadanos, y que desde su juventud había conservado su buena voluntad hacia sus compatriotas.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «el brazo con el hombro»; el griego dice literalmente «la mano con el hombro», probablemente refiriéndose al miembro superior amputado.
    reason: lexical_alternative
lexical_decisions:
- source_word: προσέταξεν
  english_pob_choice: he ordered
  chosen_spanish: ordenó
  alternatives_spanish:
  - mandó
  - dio la orden
  lexicon: LSJ
  rationale: El aoristo de προστάσσω expresa emitir una orden con autoridad. «Ordenó» es natural en español moderno y conserva la fuerza directiva sin volver el texto innecesariamente solemne.
- source_word: πρωταγωνιστὴς
  english_pob_choice: had fought in the forefront
  chosen_spanish: había combatido en primera línea
  alternatives_spanish:
  - había sido el principal defensor
  - había luchado al frente
  - había actuado como campeón
  lexicon: LSJ
  rationale: El término alude al que ocupa el primer lugar en la acción. «Había combatido en primera línea» preserva la imagen militar y la idea de liderazgo activo mejor que una abstracción como «líder».
- source_word: καθʼ ὅλον σώματι καὶ ψυχῇ
  english_pob_choice: with his whole body and soul
  chosen_spanish: con todo su cuerpo y alma
  alternatives_spanish:
  - con todo su ser
  - con todo el cuerpo y el alma
  - con toda su persona
  lexicon: LSJ
  rationale: La expresión griega intensifica la entrega total. Se mantiene la imagen antropológica de «cuerpo y alma» para no aplanar el paralelismo ni perder el tono retórico.
- source_word: πολιτῶν
  english_pob_choice: citizens
  chosen_spanish: los ciudadanos
  alternatives_spanish:
  - sus compatriotas
  - la gente de la ciudad
  - el pueblo
  lexicon: LSJ
  rationale: πολίτης conserva un matiz cívico-político. «Los ciudadanos» refleja mejor ese campo semántico que una opción más general como «pueblo».
- source_word: εὔνοιαν
  english_pob_choice: goodwill
  chosen_spanish: buena voluntad
  alternatives_spanish:
  - benevolencia
  - afecto leal
  - favor
  lexicon: LSJ
  rationale: εὔνοια denota una disposición favorable estable. «Buena voluntad» es transparente en español y conserva el sentido de actitud benévola mantenida.
- source_word: ὁμοεθνεῖς
  english_pob_choice: fellow countrymen
  chosen_spanish: sus compatriotas
  alternatives_spanish:
  - los de su misma nación
  - sus correligionarios étnicos
  - sus paisanos
  lexicon: LSJ
  rationale: El término indica a los de la misma nación o pueblo. «Compatriotas» comunica esa solidaridad étnico-nacional de modo claro y no excesivamente moderno.
- source_word: διαφυλάξας
  english_pob_choice: had preserved
  chosen_spanish: había conservado
  alternatives_spanish:
  - había mantenido
  - había guardado
  - había preservado
  lexicon: LSJ
  rationale: El participio expresa una conservación continuada. «Había conservado» funciona bien en español y mantiene la idea de fidelidad sostenida desde la juventud.
- source_word: ἀποτεμόντας
  english_pob_choice: be cut off
  chosen_spanish: fueran cortadas
  alternatives_spanish:
  - se cortaran
  - fueran separadas
  - les quitaran
  lexicon: LSJ
  rationale: El participio acusa el contenido del mandato. En español, la pasiva perifrástica expresa con claridad la acción ordenada sin añadir sujeto agente no explicitado en el griego.
- source_word: τὴν χεῖρα σὺν τῷ ὤμῳ
  english_pob_choice: the hand with the shoulder
  chosen_spanish: la mano con el hombro
  alternatives_spanish:
  - el brazo con el hombro
  - el miembro con el hombro
  - la mano junto con el hombro
  lexicon: LSJ
  rationale: Se conserva la literalidad del griego. Como el sentido probable apunta al miembro superior amputado, la traducción principal no resuelve la ambigüedad, pero la nota la explicita.
- source_word: περιφέρειν εἰς Ἰερουσαλήμ
  english_pob_choice: be carried to Jerusalem
  chosen_spanish: ser llevadas a Jerusalén
  alternatives_spanish:
  - ser llevadas alrededor a Jerusalén
  - ser transportadas a Jerusalén
  - ser llevadas en procesión a Jerusalén
  lexicon: LSJ
  rationale: Con εἰς el movimiento es hacia Jerusalén, y no necesariamente «alrededor». En español, «ser llevadas a Jerusalén» comunica el destino sin sobreinterpretar el modo de exhibición.
theological_decisions:
- issue: Identificación del referente de las descripciones appositivas
  english_pob_reading: The descriptive phrases refer to Judas Maccabeus, the implied subject of 'he ordered.'
  chosen_spanish_reading: Las descripciones se entienden como referidas a Judas Macabeo, sujeto implícito de «ordenó».
  alternative_spanish_readings:
  - Podrían leerse como una inserción elogiosa del narrador sin fijar con tanta fuerza el referente.
  - Podrían dejarse más ambiguas para no decidir el sujeto implícito.
  rationale: La sintaxis griega con participios y artículo introduce una descripción del mismo referente que da la orden. La versión española mantiene esa lectura sin añadir un nombre que el verso no explicita.
  doctrine_reference: Translation philosophy §1, §6
- issue: Sentido de σώματι καὶ ψυχῇ
  english_pob_reading: '''body and soul'' is retained as anthropological language without importing later doctrinal precision.'
  chosen_spanish_reading: «cuerpo y alma» se conserva como lenguaje antropológico, sin imponer una precisión doctrinal posterior.
  alternative_spanish_readings:
  - «todo su ser»
  - «toda su persona»
  rationale: La expresión resalta entrega total y no requiere una reformulación abstracta. Mantener «cuerpo y alma» conserva la textura bíblica y evita borrar el paralelismo original.
  doctrine_reference: Translation philosophy §1, §3
translation_notes:
  revision_awareness: La redacción sigue la revisión más reciente del POB en inglés, que reordenó la descripción appositiva para mayor claridad, cambió la imagen de πρωταγωνιστής hacia una expresión de combate en primera línea, redujo «carried around» a «carried to» por la presencia de εἰς, y ajustó el valor temporal de τῆς ἡλικίας hacia «from youth». La versión española refleja esas decisiones sin depender mecánicamente del inglés.
  spanish_consistency_notes:
  - Se usa «Yahvé» como forma por defecto en este proyecto, pero aquí no aparece el nombre divino.
  - Se mantiene «Nicanor» y no «Nikanor» para la ortografía española estándar.
  - Se conserva la ambigüedad de «la mano con el hombro» en el texto principal, con nota aclaratoria.
  - Se emplea una estructura verbal que permite leer la frase appositiva como explicación del mismo sujeto implícito.
