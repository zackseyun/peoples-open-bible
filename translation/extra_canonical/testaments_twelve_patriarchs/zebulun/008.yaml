translation:
  text: |-
    And so, my children, have compassion toward every person with mercy, so that the Lord also, having had compassion on you, may show you mercy. For indeed in the last days God will send his compassion upon the earth, and wherever he finds merciful compassion, there he dwells. For as much as a man has compassion on his neighbor, so much also the Lord has compassion on him.
    
    And when we went down into Egypt, Joseph did not hold a grudge against us. Giving heed to him, then, you also, my children, love one another, and let each one not reckon evil against his brother. For this divides unity, and scatters every kinship, and troubles the soul, and disfigures the face.
