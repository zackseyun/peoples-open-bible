revisions:
- from: Le dio la porción más escogida de las cosas santas[a]; ellos comerán las ofrendas encendidas[b] de Yahvé. El pan de la Presencia[c] es su porción, un regalo para él y para su descendencia.
  to: Le dio el pan santo más escogido[a]; ellos comerán las ofrendas de alimento[b] de Yahvé. El pan de la Presencia[c] es su porción, un regalo para él y para su descendencia.
  rationale: La revisión restaura 'pan' en la primera cola para reflejar explícitamente לחם, en línea con el hebreo y con la decisión auditada del POB. También sustituye 'ofrendas encendidas' por 'ofrendas de alimento', que comunica mejor en español la categoría cultual de אשי יהוה sin perder la nota alternativa 'ofrendas por fuego'. Se conservan 'Yahvé', 'pan de la Presencia' y 'descendencia' por su buena alineación terminológica y legibilidad.
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T23:10:22Z'
