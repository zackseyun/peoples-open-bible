translation:
  language: es
  text: Y cuando todos los hombres de guerra habían muerto de entre el pueblo,[a]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'los combatientes'. El hebreo dice literalmente 'los hombres de guerra'.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְהִי
  english_pob_choice: And ... it happened / And when
  chosen_spanish: Y cuando
  alternatives_spanish:
  - Y aconteció que
  - Entonces, cuando
  lexicon: HALOT
  rationale: La forma hebrea introduce una nueva etapa narrativa; en español, 'Y cuando' integra de manera natural el valor temporal sin forzar una fórmula más pesada como 'Y aconteció que'.
- source_word: כַאֲשֶׁר
  english_pob_choice: when
  chosen_spanish: cuando
  alternatives_spanish:
  - como
  - después que
  lexicon: HALOT
  rationale: La partícula marca una cláusula temporal circunstancial; 'cuando' reproduce con claridad y fidelidad ese valor.
- source_word: תַּמּוּ
  english_pob_choice: had died
  chosen_spanish: hubieron muerto
  alternatives_spanish:
  - habían muerto
  - habían llegado a su fin
  lexicon: HALOT
  rationale: El hebreo expresa que la generación de combatientes llegó a su término en la muerte. 'Hubieron muerto' conserva la idea de un hecho completado antes del evento principal, sin añadir paráfrasis interpretativa.
- source_word: כָּל
  english_pob_choice: all
  chosen_spanish: todos
  alternatives_spanish:
  - la totalidad de
  - todos y cada uno de
  lexicon: HALOT
  rationale: El cuantificador se mantiene explícito con el equivalente natural 'todos'.
- source_word: אַנְשֵׁי הַמִּלְחָמָה
  english_pob_choice: the men of war
  chosen_spanish: los hombres de guerra
  alternatives_spanish:
  - los hombres guerreros
  - los combatientes
  lexicon: HALOT
  rationale: Se preserva la expresión más literal del hebreo. 'Hombres de guerra' refleja la construcción nominal y evita suavizar el matiz militar que el POB inglés también retuvo con 'men of war'.
- source_word: לָמוּת
  english_pob_choice: dying
  chosen_spanish: muerto
  alternatives_spanish:
  - de morir
  - al morir
  lexicon: HALOT
  rationale: Aunque el inglés POB usa un giro idiomático, el hebreo subraya el завершamiento del proceso de morir. En español, 'hubieron muerto' comunica ese cierre de forma natural y formal.
- source_word: מִקֶּרֶב
  english_pob_choice: from among
  chosen_spanish: de entre
  alternatives_spanish:
  - de en medio de
  - del seno de
  lexicon: HALOT
  rationale: '''De entre'' conserva la idea de extracción desde el interior de un grupo y suena natural en español bíblico contemporáneo.'
- source_word: הָעָם
  english_pob_choice: the people
  chosen_spanish: el pueblo
  alternatives_spanish:
  - la gente
  - la nación
  lexicon: HALOT
  rationale: En Deuteronomio, el referente colectivo es Israel como comunidad del pacto; 'el pueblo' es la manera más clara y tradicionalmente inteligible en español.
translation_notes:
  revision_awareness: La versión inglesa revisada pasó de 'had finished dying' a 'had died'; el español adopta directamente la forma completiva más natural ('hubieron muerto') sin perder la idea de que el proceso de morir ya había concluido antes del siguiente acontecimiento.
  spanish_consistency_notes:
  - Se mantuvo 'hombres de guerra' para reflejar con precisión el sustantivo hebreo y la elección léxica del POB inglés.
  - '''De entre el pueblo'' sigue el valor espacial-relacional de מִקֶּרֶב sin recargar la frase.'
  - No se introdujo 'Cristo', 'SEÑOR' ni otras terminologías no presentes en el versículo.
  - La nota al pie preserva la alternativa léxica documentada en inglés ('the fighting men') y explica la literalidad hebrea.
