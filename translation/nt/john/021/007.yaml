theological_decisions:
- issue: Rendering of κύριος in direct recognition of Jesus
  chosen_reading: Lord
  alternative_readings:
  - Master
  rationale: Per DOCTRINE.md contested terms, κύριος defaults to 'Lord.' In this resurrection-recognition context, 'Lord' best preserves both the ordinary title and its christological weight without over-explication.
  doctrine_reference: 'DOCTRINE.md Contested terms: κύριος → Lord'
- issue: Sense of γυμνός regarding Peter's state
  chosen_reading: lightly clothed
  alternative_readings:
  - naked
  rationale: The verse does not require the stronger sense of total nakedness. Choosing 'lightly clothed' avoids importing unnecessary sensational detail while remaining faithful to common Koine usage in work/labor contexts. The alternative is preserved in a footnote because readers may expect the traditional rendering.
  doctrine_reference: DOCTRINE.md Translation philosophy §1, §6
