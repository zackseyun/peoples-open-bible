base_translation:
  language: en
  yaml_path: translation/ot/ezekiel/018/018.yaml
  text: As for his father[a], because he practiced extortion, robbed his brother, and did what was not good among his people, behold[d][c][b], he shall die in his iniquity.
  footnotes:
  - marker: a
    text: Or 'practiced oppression.' The Hebrew uses a verb-noun pairing for emphasis.
    reason: lexical_alternative
  - marker: b
    text: Or 'robbed a brother.' 'Brother' may be read generically for a fellow member of the community.
    reason: lexical_alternative
  - marker: c
    text: Hebrew 'behold,' an emphatic discourse marker.
    reason: lexical_alternative
  - marker: d
    text: Or 'he dies in his iniquity' or 'he is dead in his iniquity'; the Hebrew perfect presents the outcome as certain.
    reason: lexical_alternative
