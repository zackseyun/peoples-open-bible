revisions:
- from: Pero, sin embargo, cuando también vieron las ayudas provenientes del cielo que les habían ocurrido antes, todos a una se echaron rostro en tierra, y separaron a los lactantes de los pechos[a].
  to: Pero aun así, cuando también vieron el auxilio del cielo que antes les había llegado, todos a una se echaron rostro en tierra, y separaron a los lactantes de los pechos[a].
  rationale: Se ajusta la frase sobre ἀντιλήψεις para expresar en español un auxilio recibido previamente, sin el giro impropio «les habían ocurrido». Se suaviza la doble conjunción enfática a una forma más natural en español conservando el contraste fuerte. Se corrige la nota para que explique la literalidad y el sentido implícito, en vez de duplicar el texto principal.
