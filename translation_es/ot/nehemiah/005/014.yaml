revisions:
- from: También[a], desde el día en que me nombró para ser gobernador en la tierra de Judá, desde el año veinte hasta el año treinta y dos del rey Artajerjes —doce años—, yo y mis hermanos no comimos el pan del gobernador.
  to: También[a], desde el día en que me nombró para ser gobernador en la tierra de Judá, desde el año veinte hasta el año treinta y dos del rey Artajerjes —doce años— mis hermanos y yo no comimos la asignación de comida del gobernador.
  rationale: Se cambia «el pan del gobernador» por «la asignación de comida del gobernador» para reflejar la decisión documentada de que לֶחֶם aquí es idiomático-administrativo, no pan literal; la alternativa literal se conserva en nota. También se ajusta «yo y mis hermanos» a «mis hermanos y yo» por naturalidad del español, y se pule la puntuación del inciso.
