  text: אַל תִּבְטְח֣וּ בְ/עֹשֶׁק֮ וּ/בְ/גָזֵ֪ל אַל תֶּ֫הְבָּ֥לוּ חַ֤יִל כִּֽי יָנ֑וּב אַל תָּשִׁ֥יתוּ לֵֽב־־׀־־׃
base_translation:
  language: en
  yaml_path: translation/ot/psalms/062/011.yaml
  text: Do not trust in oppression[a], and do not put vain hope in robbery; if wealth increases, do not set your heart on it.
  footnotes:
