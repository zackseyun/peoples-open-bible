base_translation:
  language: en
  yaml_path: translation/ot/jeremiah/032/011.yaml
  text: Then I took the deed of purchase[a], the sealed copy, containing the terms and conditions[b], and the open copy.
  footnotes:
  - marker: a
    text: Or 'the sealed document, the command and the statutes'; the Hebrew legal terms likely refer to the deed's stipulations and provisions.
    reason: lexical_alternative
  - marker: b
    text: That is, the unsealed or publicly accessible copy, in contrast to the sealed copy.
    reason: cultural_note
