translation:
  language: es
  text: Y el temor de Dios vino sobre todos los reinos de aquellos países, cuando oyeron que Yahvé había peleado contra los enemigos de Israel[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «terror de Dios». La frase hebrea puede denotar temor asociado con la presencia o la acción de Dios.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְהִי
  english_pob_choice: came
  chosen_spanish: vino
  alternatives_spanish:
  - llegó
  - se produjo
  - sucedió
  lexicon: HALOT
  rationale: El waw consecutivo introduce aquí la entrada de un estado nuevo; «vino» reproduce bien en español el inicio efectivo del temor, sin volverlo un simple enlace copulativo.
- source_word: פַּחַד אֱלֹהִים
  english_pob_choice: the fear of God
  chosen_spanish: el temor de Dios
  alternatives_spanish:
  - el terror de Dios
  - un temor piadoso
  - temor causado por Dios
  lexicon: HALOT
  rationale: '«Temor de Dios» conserva la estructura del hebreo y la ambigüedad lexical: puede ser reverencia o pavor producido por la acción divina. «Temor» es más natural que «terror» para el español bíblico, pero no elimina la fuerza del pasaje.'
- source_word: עַל
  english_pob_choice: upon
  chosen_spanish: sobre
  alternatives_spanish:
  - en
  - contra
  - encima de
  lexicon: HALOT
  rationale: En esta construcción de descenso o irrupción, «sobre» comunica la idea de que el temor recayó en los reinos.
- source_word: כָּל מַמְלְכֹות הָאֲרָצוֹת
  english_pob_choice: all the kingdoms of the lands
  chosen_spanish: todos los reinos de las tierras
  alternatives_spanish:
  - todos los reinos de los países
  - todos los reinos de la tierra
  lexicon: HALOT
  rationale: «Tierras» refleja el plural hebreo אַרָצוֹת mejor que «tierra» singular, y evita convertir indebidamente la expresión en una referencia universal.
- source_word: בְּשָׁמְעָם
  english_pob_choice: when they heard
  chosen_spanish: cuando oyeron
  alternatives_spanish:
  - al oír
  - al escuchar
  - cuando escucharon
  lexicon: HALOT
  rationale: La frase preposicional temporal se vierte con naturalidad como «cuando oyeron», conservando la relación circunstancial del hebreo.
- source_word: כִּי
  english_pob_choice: that
  chosen_spanish: que
  alternatives_spanish:
  - porque
  - pues
  lexicon: HALOT
  rationale: Después de «oyeron», כִּי introduce el contenido de lo oído; en español corresponde «que».
- source_word: נִלְחַם
  english_pob_choice: had fought
  chosen_spanish: había peleado
  alternatives_spanish:
  - había combatido
  - luchó
  - estaba peleando
  lexicon: HALOT
  rationale: El perfecto hebreo señala una acción ya completada en el reporte recibido por las naciones. «Había peleado» mantiene ese valor y suena idiomático en español.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahveh
  - Jehová
  lexicon: HALOT
  rationale: 'Se sigue la convención del proyecto para el Tetragrama: «Yahvé», preservando el nombre personal divino y evitando la sustitución por un título.'
- source_word: עִם
  english_pob_choice: against
  chosen_spanish: contra
  alternatives_spanish:
  - con
  lexicon: HALOT
  rationale: Aunque עִם suele significar «con», en combinación con la raíz de combatir expresa el bando contrario; en español, «contra» comunica de forma directa el sentido adversativo.
- source_word: אוֹיְבֵי יִשְׂרָאֵל
  english_pob_choice: the enemies of Israel
  chosen_spanish: los enemigos de Israel
  alternatives_spanish:
  - los adversarios de Israel
  - los opuestos a Israel
  lexicon: HALOT
  rationale: La cadena constructa se traduce de forma directa y clara con «los enemigos de Israel», manteniendo la carga relacional y bélica del hebreo.
theological_decisions:
- issue: Nombre divino YHWH
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahveh
  - Jehová
  rationale: El hebreo contiene el Tetragrama; la política del proyecto en español usa «Yahvé» para conservar el nombre propio del Dios de Israel, en lugar de sustituirlo por un título.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יהוה / YHWH → Yahvé'
- issue: פַּחַד אֱלֹהִים
  english_pob_reading: the fear of God; lexical note allows 'terror from God'
  chosen_spanish_reading: el temor de Dios
  alternative_spanish_readings:
  - el terror de Dios
  - un temor causado por Dios
  rationale: La expresión hebrea admite tanto reverencia como pavor provocado por la intervención divina. En español, «temor de Dios» conserva esa tensión sin resolverla prematuramente; el contexto histórico inclina hacia un miedo impuesto por la acción de Yahvé.
  doctrine_reference: 'DOCTRINE.md: Lexical caution — retain documented ambiguity where Hebrew permits multiple senses'
translation_notes:
  revision_awareness: Se tuvo en cuenta el estado de alta concordancia del auditoría inglesa y la ausencia de revisiones aplicadas; la redacción española sigue fielmente las decisiones léxicas y teológicas ya documentadas, sin introducir variantes no respaldadas por el hebreo.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» de manera consistente con la política del proyecto para יְהוָה.
  - «Temor de Dios» preserva la ambigüedad lexical señalada en el inglés POB y la nota de alternativa.
  - «Tierras» traduce el plural hebreo הָאֲרָצוֹת sin convertirlo en singular abstracto.
  - Se evitó el calco «con» en עִם, porque aquí el contexto bélico exige «contra».
