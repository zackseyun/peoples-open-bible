translation:
  language: es
  text: Además del holocausto continuo y su ofrenda de cereal[a], las ofrecerán; serán sin defecto[b], junto con sus libaciones.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'También: «el holocausto regular» o «el holocausto diario».'
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: «serán para ustedes sin defecto», es decir, los animales presentados han de estar libres de defectos.'
    reason: lexical_alternative
lexical_decisions:
- source_word: מִלְּבַד
  english_pob_choice: Besides
  chosen_spanish: Además de
  alternatives_spanish:
  - Aparte de
  - Fuera de
  lexicon: HALOT
  rationale: Expresa con naturalidad que estas ofrendas se suman a la ofrenda continua previa. En español, 'además de' conserva la relación aditiva sin sonar forzado.
- source_word: עֹלַת הַתָּמִיד
  english_pob_choice: the regular burnt offering
  chosen_spanish: el holocausto regular
  alternatives_spanish:
  - el holocausto continuo
  - el holocausto diario
  lexicon: HALOT
  rationale: '''עֹלָה'' en contexto sacrificial se corresponde mejor con ''holocausto'' en español bíblico. ''תָּמִיד'' comunica el carácter establecido y recurrente; ''regular'' reproduce bien el matiz funcional del inglés POB sin perder claridad.'
- source_word: וּמִנְחָתוֹ
  english_pob_choice: and its grain offering
  chosen_spanish: y su ofrenda de cereal
  alternatives_spanish:
  - y su ofrenda vegetal
  - y su oblación
  lexicon: HALOT
  rationale: '''מִנְחָה'' en contexto cultual designa la ofrenda acompañante de grano/cereal. ''Ofrenda de cereal'' es claro y evita la ambigüedad de ''oblación'' para lectores modernos.'
- source_word: תַּעֲשׂוּ
  english_pob_choice: you shall prepare
  chosen_spanish: lo prepararán
  alternatives_spanish:
  - lo ofrecerán
  - lo harán
  lexicon: HALOT
  rationale: El verbo puede abarcar la acción de disponer o llevar a cabo la ofrenda. 'Prepararán' mantiene la amplitud del hebreo y encaja con el objeto directo implícito en el contexto sacrificial.
- source_word: תְּמִימִם
  english_pob_choice: without blemish
  chosen_spanish: sin defecto
  alternatives_spanish:
  - sin mancha
  - perfectos
  lexicon: HALOT
  rationale: En la ley sacrificial describe animales aptos, libres de defecto físico. 'Sin defecto' es una forma natural y precisa en español, equivalente funcional de 'without blemish'.
- source_word: וְנִסְכֵּיהֶם
  english_pob_choice: along with their drink offerings
  chosen_spanish: junto con sus libaciones
  alternatives_spanish:
  - y sus libaciones
  - junto con sus ofrendas líquidas
  lexicon: HALOT
  rationale: '''נֶסֶךְ'' remite al derramamiento ritual de vino u otra bebida. ''Libaciones'' conserva el término técnico y respeta el registro cultual del pasaje.'
translation_notes:
  revision_awareness: La redacción española sigue la revisión inglesa más reciente que eliminó un 'for you' redundante en el inglés natural; en hebreo permanece el matiz de destinatario implícito en לָכֶם, pero en español no se fuerza con una dativa explícita porque resultaría artificial. Se mantiene la estructura aditiva y la secuencia sacrificial del original.
  spanish_consistency_notes:
  - Se usa 'Yahvé' solo cuando el texto lo requiera explícitamente; este versículo no lo contiene.
  - Se mantiene 'holocausto' para עֹלָה por ser el término cultual más estable en español bíblico.
  - '''Libaciones'' se conserva como término técnico para וְנִסְכֵּיהֶם.'
  - '''Sin defecto'' preserva el requisito sacrificial de תְּמִימִם sin introducir lenguaje moral no presente en el contexto.'
