  chosen_reading: 'Treat as a proper royal designation and transliterate: ''King Yareb.'''
  alternative_readings:
  - an epithet meaning 'the avenging/contending king'
  - a descriptive title for the Assyrian king rather than a proper name
  rationale: The Hebrew form can be read either as a name-like title or as a descriptive epithet. To avoid importing a speculative interpretation into the main text, the draft preserves the Hebrew form by transliteration, while noting the semantic alternatives in a footnote. This follows the project's preference to transliterate names and preserve ambiguity rather than resolve it unnecessarily.
