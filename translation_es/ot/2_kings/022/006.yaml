translation:
  language: es
  text: para los artesanos, y para los constructores, y para los albañiles[c], y para comprar madera y piedra de cantera[b] para fortalecer la casa[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Es decir, el templo, la casa de Yahvé en este contexto.
    reason: cross_reference
  - marker: b
    text: O «piedra labrada» / «piedra cortada».
    reason: lexical_alternative
  - marker: c
    text: «Albañiles» traduce un término que, con más literalidad, se refiere a quienes levantan o reparan muros y cercas.
    reason: lexical_alternative
lexical_decisions:
- source_word: לֶחָרָשִׁים
  english_pob_choice: for the craftsmen
  chosen_spanish: para los artesanos
  alternatives_spanish:
  - para los craftsmen
  - para los carpinteros
  lexicon: HALOT
  rationale: חָרָשִׁים puede referirse a trabajadores hábiles en general, no solo a carpinteros. «Artesanos» conserva el sentido amplio de oficio especializado en un contexto de construcción.
- source_word: וְלַבֹּנִים
  english_pob_choice: and for the builders
  chosen_spanish: y para los constructores
  alternatives_spanish:
  - y para los albañiles
  - y para los trabajadores
  lexicon: HALOT
  rationale: Deriva de בנה y nombra a quienes edifican. «Constructores» es natural en español y mantiene el valor ocupacional directo.
- source_word: וְלַגֹּדְרִים
  english_pob_choice: and for the masons
  chosen_spanish: y para los albañiles
  alternatives_spanish:
  - y para los reparadores de muros
  - y para los constructores de muros
  lexicon: HALOT
  rationale: El término proviene de גדר, con la idea de levantar o reparar cercas y muros. «Albañiles» comunica de forma idiomática el oficio de construcción/repairación en español, aunque el trasfondo léxico apunta más específicamente a muros o enclosures.
- source_word: וְלִקְנוֹת
  english_pob_choice: and for buying
  chosen_spanish: y para comprar
  alternatives_spanish:
  - y para la compra de
  - y para adquirir
  lexicon: HALOT
  rationale: El infinitivo con ל expresa finalidad. «Para comprar» reproduce de manera clara y natural la secuencia de propósito del versículo.
- source_word: עֵצִים
  english_pob_choice: timber
  chosen_spanish: madera
  alternatives_spanish:
  - madera de construcción
  - madera aserrada
  - maderos
  lexicon: HALOT
  rationale: En una lista de materiales de obra, el sentido práctico es madera para construcción. «Madera» es comprensible y suficientemente amplio; «madera de construcción» sería más explicativo pero menos fluido.
- source_word: וְאַבְנֵי מַחְצֵב
  english_pob_choice: and quarried stone
  chosen_spanish: y piedra de cantera
  alternatives_spanish:
  - y piedra labrada
  - y piedra tallada
  - y piedra de cantera extraída
  lexicon: HALOT
  rationale: La frase indica piedra procedente de cantera, preparada para la obra. «Piedra de cantera» preserva la idea de material extraído para construcción sin forzar una sola técnica de talla.
- source_word: לְחַזֵּק
  english_pob_choice: to strengthen
  chosen_spanish: para fortalecer
  alternatives_spanish:
  - para reparar
  - para reforzar
  lexicon: HALOT
  rationale: חזק significa «hacer fuerte/fortalecer». En este contexto contribuye a la reparación del edificio, pero «fortalecer» conserva mejor la fuerza léxica sin añadir una paráfrasis más interpretativa.
- source_word: אֶת הַבָּיִת
  english_pob_choice: the house
  chosen_spanish: la casa
  alternatives_spanish:
  - el templo
  - la casa del SEÑOR
  lexicon: HALOT
  rationale: בַּיִת significa literalmente «casa». Aunque el referente contextual es el templo, el hebreo dice «la casa»; se mantiene esa formulación y el contexto inmediato permite identificarla.
translation_notes:
  revision_awareness: El borrador sigue de cerca la lectura aprobada del POB inglés y no introduce cambios sustantivos respecto del pasaje auditado. Se conserva la progresión de oficios y materiales, así como la ambigüedad útil de «la casa», con nota explicativa para el referente templario.
  spanish_consistency_notes:
  - Se usa «Yahvé» en la nota para mantener la terminología POB estándar del nombre divino.
  - Se conserva el paralelismo de propósito con «para» en toda la frase.
  - «Piedra de cantera» mantiene abierta la alternativa tradicional de «piedra labrada/cortada» sin borrar la tensión lexical del hebreo.
  - «La casa» se deja en el texto principal para respetar la forma hebrea literal y evitar una sustitución interpretativa prematura.
