  yaml_path: translation/nt/john/016/021.yaml
  text: When a woman is giving birth[a], she has sorrow because her hour has come; but when she has given birth to the child, she no longer remembers the distress because of the joy that a child has been born into the world.
  footnotes:
  - marker: a
    text: Or, 'a man has been born into the world.' The Greek ἄνθρωπος can mean 'man' or more generally 'human being'; here it is generic, not specifically male.
    reason: lexical_alternative
translation:
  language: ko
  text: 여인이 해산할 때에는 자기 때가 왔으므로 슬픔을 가지지만, 아기를 낳고 나면 한 사람이 세상에 태어났다는 기쁨 때문에 더 이상 그 고통을 기억하지 않습니다.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 또는 「한 사람이 세상에 태어났다」. 헬라어 ἄνθρωπος는 「남자」나 더 일반적으로 「사람」을 뜻하며, 여기서는 성별을 가리지 않는 일반 의미이다.
    reason: lexical_alternative
