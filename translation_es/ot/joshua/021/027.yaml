    text: 'Hebreo: Beestera; compárese 1 Crónicas 6:71, donde aparece Ashtarot.'
    reason: alternative_reading
  revision_rationale: Se conserva sustancialmente la traducción porque es fiel y natural. Solo se corrige el anclaje de la nota textual para que recaiga sobre «Beestera», que es el elemento al que la nota se refiere.
