translation:
  language: es
  text: 'Y ahora[a], así dice Yahvé, Dios de los ejércitos, Dios de Israel: ¿Por qué hacen este gran mal contra ustedes mismos, para extirpar de entre Judá a hombre y mujer, niño y lactante, sin dejarles ningún remanente?'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'También podría entenderse: «¿Por qué hacen este gran mal a ustedes mismos?». El hebreo רָעָה puede referirse tanto a maldad moral como a desastre dañino; aquí las dos ideas están estrechamente vinculadas.'
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: Se conserva el nombre divino propio con la forma ya establecida para español en este proyecto, en lugar de sustituirlo por un título. Esto mantiene la distinción entre el nombre personal de Dios y la traducción tradicional sustitutiva.
- source_word: אֱלֹהֵי צְבָא֜וֹת
  english_pob_choice: the God of hosts
  chosen_spanish: Dios de los ejércitos
  alternatives_spanish:
  - Dios de los ejércitos celestiales
  - Dios de las huestes
  lexicon: HALOT
  rationale: El hebreo expresa un título en genitivo que puede entenderse como dominio sobre las huestes. En español, 'Dios de los ejércitos' conserva la fuerza lexical y es más natural que un calco más pesado, sin perder la referencia a las huestes.
- source_word: אֱלֹהֵי יִשְׂרָאֵל
  english_pob_choice: the God of Israel
  chosen_spanish: Dios de Israel
  alternatives_spanish:
  - el Dios de Israel
  lexicon: HALOT
  rationale: Se mantiene el título relacional directo del hebreo con una formulación natural y sobria en español.
- source_word: לָמָה
  english_pob_choice: Why
  chosen_spanish: ¿Por qué
  alternatives_spanish:
  - ¿Para qué razón?
  lexicon: HALOT
  rationale: La interrogación causal se refleja de manera directa y natural en español.
- source_word: רָעָה גְדוֹלָה
  english_pob_choice: this great evil
  chosen_spanish: este gran mal
  alternatives_spanish:
  - este gran mal/daño
  - esta gran maldad
  lexicon: HALOT
  rationale: En este contexto profético, רָעָה conserva una tensión entre mal moral y desastre dañino. 'Mal' reproduce mejor la amplitud semántica que 'daño', y 'gran' mantiene el énfasis intensivo del adjetivo.
- source_word: אֶל נַפְשֹׁתֵיכֶם
  english_pob_choice: against yourselves
  chosen_spanish: contra ustedes mismos
  alternatives_spanish:
  - a ustedes mismos
  - sobre ustedes mismos
  lexicon: HALOT
  rationale: El hebreo usa una construcción reflexiva que apunta al daño autoinfligido. 'Contra ustedes mismos' expresa con claridad la dirección adversa y evita reducir נֶפֶשׁ a 'alma' en un sentido ajeno al contexto.
- source_word: לְהַכְרִית
  english_pob_choice: to cut off
  chosen_spanish: para exterminar
  alternatives_spanish:
  - para cortar de raíz
  - para eliminar
  lexicon: HALOT
  rationale: Aunque 'cortar' conserva la metáfora hebrea, aquí el resultado descrito exige un verbo español que comunique con fuerza la destrucción total. 'Exterminar' refleja la severidad del juicio sin añadir una idea extra al contexto.
- source_word: אִישׁ וְאִשָּׁה
  english_pob_choice: man and woman
  chosen_spanish: a hombre y mujer
  alternatives_spanish:
  - a varón y mujer
  - a hombre y esposa
  lexicon: HALOT
  rationale: Se conserva la pareja distributiva del hebreo con un español natural dentro de la enumeración de personas afectadas.
- source_word: עוֹלֵל וְיוֹנֵק
  english_pob_choice: child and infant
  chosen_spanish: niño y lactante
  alternatives_spanish:
  - niño y bebé
  - pequeño y lactante
  lexicon: HALOT
  rationale: עוֹלֵל se refiere a un niño pequeño; יוֹנֵק al que aún mama. 'Lactante' preserva con precisión la referencia a la etapa de amamantamiento, mientras 'niño' cubre el rango del primero.
- source_word: מִתּוֹךְ יְהוּדָה
  english_pob_choice: from among Judah
  chosen_spanish: de entre Judá
  alternatives_spanish:
  - del medio de Judá
  - de en medio de Judá
  lexicon: HALOT
  rationale: '''De entre'' expresa bien la extracción o eliminación desde el interior de un grupo, con naturalidad en español.'
- source_word: לְבִלְתִּי הוֹתִיר
  english_pob_choice: leaving ... no remnant
  chosen_spanish: sin dejarles remanente
  alternatives_spanish:
  - sin dejarles resto
  - para no dejarles remanente
  lexicon: HALOT
  rationale: La construcción final de resultado se vierte de forma compacta en español. 'Remanente' conserva el término profético שְׁאֵרִית con su resonancia bíblica específica.
- source_word: שְׁאֵרִית
  english_pob_choice: remnant
  chosen_spanish: remanente
  alternatives_spanish:
  - resto
  - restante
  lexicon: HALOT
  rationale: '''Remanente'' mantiene la idea de lo que queda después del juicio y preserva el campo semántico profético del término. En español, funciona con dignidad bíblica sin perder claridad.'
theological_decisions:
- issue: Término profético שְׁאֵרִית
  english_pob_reading: remnant
  chosen_spanish_reading: remanente
  alternative_spanish_readings:
  - resto
  - supervivientes
  rationale: Se preserva la carga profética del concepto de un grupo preservado o lo que queda tras el juicio, sin explicitar más de lo que el versículo dice. 'Remanente' es suficientemente transparente y mantiene la tensión teológica del texto.
  doctrine_reference: Preservar la resonancia profética del término sin resolverla; consistencia terminológica en pasajes de Jeremías.
- issue: 'Rָעָה גְדוֹלָה: mal moral y desastre autoinducido'
  english_pob_reading: this great evil against yourselves
  chosen_spanish_reading: este gran mal contra ustedes mismos
  alternative_spanish_readings:
  - esta gran maldad contra ustedes mismos
  - este gran daño contra ustedes mismos
  rationale: El hebreo permite tanto la dimensión ética como la de calamidad. 'Mal' mantiene ambas posibilidades; la frase reflexiva preserva que el daño recae sobre los mismos destinatarios.
  doctrine_reference: No reducir la ambigüedad lexical cuando el contexto profético la sostiene.
translation_notes:
  revision_awareness: La redacción sigue de cerca el pasaje hebreo y toma en cuenta la revisión inglesa que prefirió 'this great evil' frente a 'great harm' para רָעָה גְדוֹלָה. En español se conservó esa preferencia semántica con 'este gran mal', manteniendo a la vez la lectura reflexiva del daño sobre los propios destinatarios. Se evitó traducir mecánicamente desde el inglés en los títulos divinos y en el final con שְׁאֵרִית, procurando una equivalencia óptima y auditable.
  spanish_consistency_notes:
  - Se usa 'Yahvé' para יְהוָה según el estándar del proyecto.
  - '''Dios de los ejércitos'' mantiene el título sin recurrir a ''SEÑOR''.'
  - '''Remanente'' se reserva para שְׁאֵרִית por su valor profético.'
  - 'Se preserva la enumeración distributiva: hombre y mujer, niño y lactante.'
  - La puntuación sigue el orden retórico del hebreo con dos puntos tras la fórmula divina.
