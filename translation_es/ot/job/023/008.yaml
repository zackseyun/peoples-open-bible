translation:
  language: es
  text: ¡Mira![a] Voy hacia el oriente, pero no está allí; y hacia el occidente, pero no lo percibo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Oriente» y «occidente» siguen aquí el valor direccional del hebreo; también podría entenderse «adelante ... atrás».
    reason: lexical_alternative
lexical_decisions:
- source_word: הֵן
  english_pob_choice: Look
  chosen_spanish: ¡Mira!
  alternatives_spanish:
  - Mira
  - Miren
  - He aquí
  lexicon: HALOT
  rationale: La partícula introduce la declaración con fuerza deíctica o de atención. En español, «¡Mira!» conserva ese llamado directo y natural mejor que una forma más arcaica como «He aquí».
- source_word: קֶדֶם
  english_pob_choice: east
  chosen_spanish: oriente
  alternatives_spanish:
  - este
  - adelante
  - oriente
  lexicon: HALOT
  rationale: En este paralelismo poético con אָחוֹר, el valor direccional/geográfico es el más probable. «Oriente» mantiene la idea espacial sin sonar tan técnico como «este» en una frase poética.
- source_word: אֶהֱלֹךְ
  english_pob_choice: I go
  chosen_spanish: voy
  alternatives_spanish:
  - camino
  - avanzo
  - me dirijo
  lexicon: HALOT
  rationale: El imperfecto 1cs de הלך expresa el desplazamiento de búsqueda. «Voy» es natural en español y conserva el movimiento sin sobredeterminar el modo.
- source_word: וְאֵינֶנּוּ
  english_pob_choice: but he is not there
  chosen_spanish: no está allí
  alternatives_spanish:
  - y no está allí
  - pero no está allí
  - y no se lo encuentra allí
  lexicon: HALOT
  rationale: El referente implícito es Dios en el contexto. En español, «no está allí» comunica de forma clara la búsqueda frustrada; el contraste adversativo queda sugerido por la estructura de la frase y el paralelismo.
- source_word: אָחוֹר
  english_pob_choice: west
  chosen_spanish: occidente
  alternatives_spanish:
  - poniente
  - atrás
  - occidente
  lexicon: HALOT
  rationale: Como contraparte de קדם en un par direccional, conviene expresar la dirección opuesta con un término geográfico en español. «Occidente» refleja bien el contraste poético y es comprensible para lectores amplios.
- source_word: לֹא אָבִין לוֹ
  english_pob_choice: I do not perceive him
  chosen_spanish: no lo percibo
  alternatives_spanish:
  - no lo discierno
  - no lo entiendo
  - no puedo percibirlo
  lexicon: HALOT
  rationale: בין puede significar comprender o discernir, pero aquí el contexto es la incapacidad de detectar la presencia de Dios. «Percibo» reproduce bien esa percepción fallida sin volverla demasiado interpretativa.
theological_decisions:
- issue: Referente pronominal masculino singular
  english_pob_reading: The pronouns refer to God, rendered as 'he'/'him.'
  chosen_spanish_reading: Los pronombres se entienden como referidos a Dios, aunque en español se evita repetir explícitamente «él» salvo donde la sintaxis lo requiere.
  alternative_spanish_readings:
  - referente implícito no explicitado
  - usar «él» en ambas cláusulas
  rationale: El contexto inmediato es la búsqueda de Dios por parte de Job. El español permite mantener la referencia con pronombres objeto y con la omisión natural del sujeto, sin añadir redundancia.
  doctrine_reference: Contexto narrativo y pronominal de Job 23:8; coherencia con el lector de referencia en el pasaje.
translation_notes:
  revision_awareness: No se registraron revisiones en el paquete inglés; se mantiene alta concordancia con la lectura auditada y sin cambios sustantivos respecto del sentido direccional y del referente implícito.
  spanish_consistency_notes:
  - Se mantiene «Dios» implícito por el contexto, sin añadirlo al texto principal.
  - Se evita «SEÑOR» porque aquí el hebreo no contiene יהוה ni una convención de máscara necesaria.
  - «Percibo» conserva el matiz de discernimiento fallido sin convertirlo en interpretación intelectual pura.
