    text: O, «porque se consideraba más justo que Dios».
    reason: alternative_reading
  revision_rationale: 'Se hicieron ajustes menores de estilo y precisión: se mejoró la naturalidad idiomática (''de ira''), se alineó mejor el aspecto verbal con la narración hebrea (''se justificó''), se suavizó una construcción comparativa rígida (''en vez de a Dios'') sin perder el contraste teológico, y se eliminó una nota redundante mientras se conservó la alternativa interpretativa importante documentada por la POB inglesa.'
