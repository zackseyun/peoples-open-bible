  to: Cada uno, cuídese de su prójimo, y no confíe en ningún hermano[a]; porque todo hermano ciertamente engaña[b], y todo prójimo anda como calumniador[c].
  rationale: Se corrigieron los anclajes de las notas para que correspondan exactamente a las palabras explicadas. Se reemplazó «Cada hombre» por «Cada uno» para lograr español más natural sin perder el distributivo individual. Se sustituyó «engaña con engaño» por «ciertamente engaña», que comunica mejor la intensificación verbal de עָקוֹב יַעְקֹב en español fluido, preservando las alternativas léxicas en nota. Se mantuvo «prójimo», «hermano» y «calumniador» por fidelidad semántica y buena legibilidad eclesial.
