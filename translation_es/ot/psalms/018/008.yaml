  glossary_alignment: 'No hay conflictos con la terminología principal del proyecto. La revisión propuesta mantiene lenguaje poético natural en español y alinea la decisión sobre la ira divina con el audit trail inglés: lectura principal más directa en el texto, y alternativa literal en nota.'
