translation:
  language: es
  text: Heleb hijo de Baaná el netofatita, Ittai hijo de Ribai de Gueba[a], de los hijos de Benjamín;
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: "de Gueba de los benjaminitas". El hebreo dice literalmente "de Gueba de los hijos de Benjamín".'
    reason: lexical_alternative
lexical_decisions:
- source_word: חֵלֶב
  english_pob_choice: Heleb
  chosen_spanish: Heleb
  alternatives_spanish:
  - Helev
  lexicon: transliteración propia
  rationale: Es un nombre propio; conviene transliterarlo sin traducirlo. Mantengo la forma cercana a la inglesa POB y al hebreo, con grafía legible en español.
- source_word: בֶּן
  english_pob_choice: son of
  chosen_spanish: hijo de
  alternatives_spanish:
  - hijo de
  - descendiente de
  lexicon: HALOT
  rationale: En listas genealógicas, la equivalencia natural y formal en español es 'hijo de'. Conserva la relación filial sin añadir matices no presentes en el hebreo.
- source_word: בַּעֲנָה
  english_pob_choice: Baanah
  chosen_spanish: Baaná
  alternatives_spanish:
  - Baanah
  - Baana
  lexicon: transliteración propia
  rationale: Nombre propio transliterado. La tilde final ayuda a la pronunciación española y refleja la vocal final abierta sin alterar el nombre.
- source_word: הַנְּטֹפָתִי
  english_pob_choice: the Netophathite
  chosen_spanish: el netofatita
  alternatives_spanish:
  - el netofatita
  - el de Netofa
  - el netofateo
  lexicon: HALOT
  rationale: El gentilicio indica procedencia o asociación con Netofá/Netofa. 'Netofatita' es el equivalente directo y ya funciona como gentilicio en español bíblico, sin pasar por una paráfrasis más larga.
- source_word: אִתַּי
  english_pob_choice: Ittai
  chosen_spanish: Ittai
  alternatives_spanish:
  - Ithai
  lexicon: transliteración propia
  rationale: Nombre propio; se conserva la transliteración estándar y reconocible en español.
- source_word: רִיבַי
  english_pob_choice: Ribai
  chosen_spanish: Ribai
  alternatives_spanish:
  - Ribay
  lexicon: transliteración propia
  rationale: Nombre propio; se conserva la forma más directa y legible en español.
- source_word: מִגִּבְעַת
  english_pob_choice: from Gibeah
  chosen_spanish: de Gueba
  alternatives_spanish:
  - de Guibeá
  - desde Gueba
  lexicon: HALOT
  rationale: Prefiero 'Gueba' como forma española breve y estable para גבעה en este contexto toponímico. La preposición 'de' reproduce la relación de origen expresada por מִן, y evita sobrecargar la frase con una glosa.
- source_word: בְּנֵי בִנְיָמִן
  english_pob_choice: of the sons of Benjamin
  chosen_spanish: de los hijos de Benjamín
  alternatives_spanish:
  - de los benjaminitas
  - perteneciente a Benjamín
  lexicon: HALOT
  rationale: La literalidad 'hijos de Benjamín' preserva la expresión hebrea y la conexión tribal. En español mantiene la tensión entre genealogía y designación grupal sin suavizarla a un etnónimo más interpretativo.
translation_notes:
  revision_awareness: El texto sigue de cerca el hebreo y coincide con la auditoría inglesa en la estructura nominal de la lista. Se mantiene la alternativa textual de 'from Gibeah of the sons of Benjamin' en nota, porque el hebreo permite leer el topónimo como procedencia local o como identificación tribal de Gueba.
  spanish_consistency_notes:
  - Se conserva un registro sobrio y listado, adecuado para una nómina militar/genealógica.
  - '''Netofatita'' se usa como gentilicio bíblico ya lexicalizado en español, no como paráfrasis.'
  - '''Hijo de'' se mantiene uniforme para los marcadores genealógicos.'
  - Se evita 'Señor' u otros equivalentes teológicos porque el versículo no contiene lenguaje divino.
