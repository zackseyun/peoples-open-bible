    reason: lexical_alternative
  - marker: b
    text: O «tu justicia». El término hebreo puede abarcar tanto la rectitud moral como la justicia judicial.
    reason: alternative_reading
  revision_rationale: Se corrige מִדָּמִים a «culpa de sangre» para seguir la decisión contextual del POB inglés y del hebreo en un salmo penitencial. Se cambia צִדְקָתֶךָ a «tu rectitud» en el texto principal para reflejar la prioridad de «righteousness», dejando «tu justicia» como alternativa en nota. También se ajusta levemente la puntuación del vocativo para un español más natural.
