translation:
  language: es
  text: Él rededicará a Yahvé los días de su voto nazareo[a], y traerá un cordero macho de un año como sacrificio por la culpa. Pero los días anteriores quedarán anulados[b], porque su voto nazareo fue profanado.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O “los días de su separación” o “los días de su consagración”.
    reason: lexical_alternative
  - marker: b
    text: Lit. “los primeros días caerán”; es decir, los días anteriores del voto ya no cuentan.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהִזִּיר
  english_pob_choice: he shall rededicate
  chosen_spanish: rededicará
  alternatives_spanish:
  - consagrará de nuevo
  - volverá a consagrar
  lexicon: HALOT
  rationale: En el contexto nazareo, el verbo expresa reingresar a un estado de consagración/separación después de una interrupción. «Rededicará» conserva esa idea de restauración del período votivo sin perder el matiz cultual.
- source_word: לַֽיהוָה
  english_pob_choice: to Yahweh
  chosen_spanish: a Yahvé
  alternatives_spanish:
  - a Yahveh
  - al Señor
  lexicon: HALOT
  rationale: 'Se sigue la convención del proyecto para יהוה: «Yahvé», manteniendo la referencia directa al nombre divino y evitando la sustitución por un título encubridor.'
- source_word: יְמֵי נִזְרֹו
  english_pob_choice: the days of his Nazirite vow
  chosen_spanish: los días de su voto nazareo
  alternatives_spanish:
  - los días de su separación nazarea
  - los días de su consagración nazarea
  lexicon: HALOT
  rationale: En Números 6 el término designa la institución técnica del nazareato. «Voto nazareo» comunica mejor en español esa realidad legal-ritual que una mera traducción abstracta de «separación» o «consagración».
- source_word: וְהֵבִיא
  english_pob_choice: and he shall bring
  chosen_spanish: y traerá
  alternatives_spanish:
  - y presentará
  - y llevará
  lexicon: HALOT
  rationale: «Traerá» reproduce el idioma sacrificial normal de ofrecer un animal ante el santuario; es natural en español y fiel al valor de la forma verbal.
- source_word: כֶּבֶשׂ בֶּן שְׁנָתוֹ
  english_pob_choice: a male lamb a year old
  chosen_spanish: un cordero macho de un año
  alternatives_spanish:
  - un cordero de un año
  - un cordero macho en su primer año
  lexicon: HALOT
  rationale: La expresión idiomática hebrea señala un animal en su primer año. «De un año» es claro y preciso; «macho» preserva la especificación sacrificial.
- source_word: לְאָשָׁם
  english_pob_choice: as a guilt offering
  chosen_spanish: como sacrificio por la culpa
  alternatives_spanish:
  - como ofrenda por la culpa
  - como sacrificio de reparación
  lexicon: HALOT
  rationale: «Sacrificio por la culpa» conserva la categoría sacrificial אָשָׁם y es comprensible en español contemporáneo. Se evita una paráfrasis que diluya la terminología cultual.
- source_word: וְהַיָּמִים הָרִאשֹׁנִים
  english_pob_choice: the former days
  chosen_spanish: los días anteriores
  alternatives_spanish:
  - los días previos
  - los primeros días
  lexicon: HALOT
  rationale: El sintagma se refiere a los días ya transcurridos del voto antes de la contaminación. «Días anteriores» es natural en español y mantiene la relación temporal sin añadir más de lo que dice el texto.
- source_word: יִפְּלוּ
  english_pob_choice: shall be void
  chosen_spanish: quedarán anulados
  alternatives_spanish:
  - serán nulos
  - no contarán
  - quedarán sin efecto
  lexicon: HALOT
  rationale: La imagen literal de «caer» en contexto jurídico indica que los días previos dejan de valer. «Quedarán anulados» conserva el efecto legal y se ajusta al matiz formal preferido por la revisión inglesa.
- source_word: טָמֵא נִזְרוֹ
  english_pob_choice: his Nazirite vow was defiled
  chosen_spanish: su voto nazareo fue contaminado
  alternatives_spanish:
  - su voto nazareo quedó impuro
  - su consagración quedó contaminada
  lexicon: HALOT
  rationale: Se conserva la tensión entre impureza ritual y efecto sobre el voto. «Contaminado» expresa la idea de טמא en registro legal-cultual sin reducirla a mera mancha moral.
theological_decisions:
- issue: Rendering of YHWH in Numbers 6:12
  english_pob_reading: to Yahweh
  chosen_spanish_reading: a Yahvé
  alternative_spanish_readings:
  - al Señor
  - a Yahveh
  rationale: Se sigue la norma del proyecto para el nombre divino, manteniendo la transparencia textual y el acceso auditable al término hebreo.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Technical sense of נזר/נזרו in Nazirite legislation
  english_pob_reading: Nazirite vow
  chosen_spanish_reading: voto nazareo
  alternative_spanish_readings:
  - separación nazarea
  - consagración nazarea
  rationale: En este contexto, el término no es genérico sino institucional y legal. «Nazareo» preserva la referencia al nazareato como práctica votiva específica, sin sustituirla por una fórmula eclesiástica ajena.
  doctrine_reference: Translation philosophy §§1, 5
translation_notes:
  revision_awareness: La redacción inglesa revisada pasó de «be lost» a «be void» para יִפְּלוּ; por eso el español adopta «quedarán anulados», que conserva el sentido jurídico-formal de nulidad. También se mantuvo la lectura técnica de Números 6 como legislación del nazareato, con el nombre divino transliterado según la convención del proyecto.
  spanish_consistency_notes:
  - Se usó «Yahvé» en el texto principal conforme a la convención del proyecto para יהוה.
  - Se eligió «voto nazareo» para mantener la especificidad institucional del pasaje; no se suavizó a una mera idea de separación.
  - «Sacrificio por la culpa» conserva el valor cultual de אָשָׁם sin perder inteligibilidad.
  - La impureza se expresó con «contaminado» para reflejar טמא en su efecto ritual, no moral.
  - Los marcadores de nota [a] y [b] se colocan en los dos sintagmas con alternativa lexical relevante.
