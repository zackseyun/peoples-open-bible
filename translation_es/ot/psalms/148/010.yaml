translation:
  language: es
  text: animales salvajes y todo ganado, los animales que se arrastran y las aves aladas
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: הַחַיָּה
  english_pob_choice: wild animals
  chosen_spanish: animales salvajes
  alternatives_spanish:
  - bestias
  - animales
  lexicon: HALOT
  rationale: חַיָּה aquí contrasta con בְּהֵמָה, por lo que conviene distinguir animales salvajes de ganado o animales domésticos. 'Animales salvajes' comunica bien esa oposición sin arcaísmo.
- source_word: וְכָל בְּהֵמָה
  english_pob_choice: and all livestock
  chosen_spanish: y todo ganado
  alternatives_spanish:
  - y todo el ganado
  - y todo animal doméstico
  - y todo bestiar
  lexicon: HALOT
  rationale: בְּהֵמָה en este contexto señala animales domesticados. 'Ganado' preserva la idea colectiva y la oposición con 'animales salvajes'. 'Todo' refleja כָּל.
- source_word: רֶמֶשׂ
  english_pob_choice: creeping things
  chosen_spanish: los animales que se arrastran
  alternatives_spanish:
  - las criaturas que se arrastran
  - los seres que se arrastran
  lexicon: HALOT
  rationale: רֶמֶשׂ abarca criaturas pequeñas que se mueven arrastrándose. 'Los animales que se arrastran' expresa el sentido de forma natural en español y evita una categoría zoológica demasiado técnica.
- source_word: וְצִפּוֹר כָּנָף
  english_pob_choice: and winged birds
  chosen_spanish: y las aves aladas
  alternatives_spanish:
  - y las aves de alas
  - y las aves que vuelan
  lexicon: HALOT
  rationale: La expresión hebrea literalmente es algo como 'ave de ala'. 'Aves aladas' conserva la imagen de las alas y mantiene la construcción descriptiva sin volverla demasiado interpretativa.
translation_notes:
  revision_awareness: El texto inglés auditado quedó sin cambios en la revisión más reciente y mantiene alta concordancia con el chequeo cruzado; por tanto, la versión española sigue de cerca las decisiones léxicas consolidadas en el expediente inglés.
  spanish_consistency_notes:
  - Se mantuvo la oposición léxica entre animales salvajes y ganado para reflejar la distinción hebrea entre חַיָּה y בְּהֵמָה.
  - Se eligió un español claro y bíblico, sin depender de fórmulas eclesiásticas tradicionales que oculten el matiz zoológico del hebreo.
  - No se añadieron notas de pie porque el sentido puede expresarse de manera directa en español sin crear ambigüedad residual.
