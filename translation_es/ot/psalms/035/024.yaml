revisions:
- from: Hazme justicia conforme a tu justicia[a], Yahvé, mi Dios, y no permitas que se alegren por mí.
  to: Hazme justicia conforme a tu rectitud[a], Yahvé, mi Dios, y no permitas que se alegren de mí.
  rationale: Se conserva «Hazme justicia» por su fidelidad idiomática a שָׁפְטֵנִי. Se cambia «justicia» a «rectitud» en כְצִדְקְךָ para reflejar la elección principal auditada de «righteousness» y se mantiene «justicia» como alternativa significativa en nota. Se sustituye «por mí» por «de mí» para expresar con más claridad el regocijo hostil dirigido contra el salmista, evitando la posible lectura positiva de «alegrarse por alguien».
