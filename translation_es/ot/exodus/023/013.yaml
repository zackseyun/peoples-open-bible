translation:
  language: es
  text: En todo lo que les he dicho, tengan cuidado[a]; y el nombre de otros dioses no mencionarán[b]; no se oirá en sus labios[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Lit. «guárdense» o «manténganse en guardia».
    reason: lexical_alternative
  - marker: b
    text: O, más específicamente, «no invocarán el nombre de otros dioses».
    reason: lexical_alternative
  - marker: c
    text: Lit. «no será oído sobre tu boca».
    reason: lexical_alternative
lexical_decisions:
- source_word: וּבְכֹל
  english_pob_choice: In all
  chosen_spanish: En todo
  alternatives_spanish:
  - En todo lo que
  - En cada cosa
  lexicon: HALOT
  rationale: La preposición con כֹּל expresa el alcance total de la advertencia. «En todo» conserva esa amplitud de manera natural en español y evita añadir matices no presentes en el hebreo.
- source_word: אֲשֶׁר אָמַרְתִּי אֲלֵיכֶם
  english_pob_choice: that I have said to you
  chosen_spanish: lo que yo les he dicho
  alternatives_spanish:
  - lo que les dije
  - lo que yo les he hablado
  lexicon: HALOT
  rationale: El perfecto hebreo se entiende bien en español con presente perfecto por continuidad discursiva. «Les he dicho» mantiene el carácter de instrucciones ya pronunciadas sin forzar una paráfrasis.
- source_word: תִּשָּׁמֵרוּ
  english_pob_choice: be careful
  chosen_spanish: tengan cuidado
  alternatives_spanish:
  - estén alerta
  - cuídense
  lexicon: HALOT
  rationale: El nifal de שׁמר aquí tiene fuerza exhortativa de cuidarse/guardarse respecto de lo mandado. «Tengan cuidado» es idiomático y conserva el llamado a la vigilancia.
- source_word: וְשֵׁם אֱלֹהִים אֲחֵרִים
  english_pob_choice: and the name of other gods
  chosen_spanish: y el nombre de otros dioses
  alternatives_spanish:
  - y el nombre de dioses ajenos
  - y el nombre de otros dioses
  lexicon: HALOT
  rationale: Se conserva la construcción «nombre de» y la referencia directa a deidades distintas de Yahvé. «Otros dioses» es la forma más inmediata y fiel al hebreo y al audit trail inglés.
- source_word: לֹא תַזְכִּירוּ
  english_pob_choice: you shall not mention
  chosen_spanish: no lo mencionarán
  alternatives_spanish:
  - no mencionarán
  - no invocarán
  lexicon: HALOT
  rationale: El hifil de זכר puede ser «mencionar» o, más específicamente, «invocar». Se mantiene «mencionar» como lectura principal por seguir el valor general del texto y no resolver de antemano una implicación cultual más estrecha.
- source_word: לֹא יִשָּׁמַע עַל פִּיךָ
  english_pob_choice: it shall not be heard on your lips
  chosen_spanish: no se oirá sobre tu boca
  alternatives_spanish:
  - no se oirá en tu boca
  - no saldrá de tu boca
  lexicon: HALOT
  rationale: La expresión hebrea es literalmente «sobre tu boca». Aunque en español «sobre tu boca» suena extraña, se conserva la imagen con un giro cercano al del POB inglés. La forma «no se oirá» reproduce la pasiva y mantiene la fuerza legal de la prohibición.
theological_decisions:
- issue: Alcance de la prohibición sobre los nombres de otros dioses
  english_pob_reading: Render as a prohibition against mentioning/speaking the names of other gods, without expanding it into a broader doctrinal claim about their ontological status.
  chosen_spanish_reading: Se entiende como prohibición de mencionar o pronunciar los nombres de otros dioses, sin convertirla en una afirmación doctrinal más amplia sobre su existencia o naturaleza.
  alternative_spanish_readings:
  - Se prohíbe invocar los nombres de otros dioses
  - Se prohíbe toda referencia verbal a otros dioses
  rationale: El hebreo prohíbe la mención y que ese nombre sea oído en la boca del pueblo. La traducción conserva esa tensión textual y no la amplía más allá de lo que el versículo afirma explícitamente.
  doctrine_reference: Preservar la tensión teológica del texto sin resolverla artificialmente.
translation_notes:
  revision_awareness: La redacción sigue de cerca el texto hebreo y el audit trail inglés del POB, sin cambios sustanciales respecto al sentido principal ya validado en la última revisión; se mantiene la misma tensión lexical entre «mencionar» e «invocar» y la imagen final de la boca.
  spanish_consistency_notes:
  - Se usa «Yahvé» para el nombre divino en coherencia con los estándares del proyecto, aunque en este versículo no aparezca explícitamente.
  - Se mantiene «otros dioses» como equivalente directo de אֱלֹהִים אֲחֵרִים.
  - La imagen final «sobre tu boca» conserva la literalidad de עַל פִּיךָ, aunque resulte menos idiomática que una versión plenamente naturalizada.
