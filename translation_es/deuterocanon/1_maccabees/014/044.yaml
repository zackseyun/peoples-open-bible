translation:
  language: es
  text: Y no le está permitido a nadie del pueblo ni de los sacerdotes invalidar nada de esto, ni contradecir lo que él diga, ni convocar una asamblea en el país sin él[a], ni vestirse de púrpura ni usar un broche de oro[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O posiblemente, «organizar una facción en el país sin él». La expresión griega con συστροφή puede sugerir una asamblea, una coalición o una agrupación facciosa.
    reason: lexical_alternative
  - marker: b
    text: La ropa púrpura y un broche de oro eran señales de rango o de honor oficial.
    reason: cultural_note
lexical_decisions:
- source_word: οὐκ ἔξεστιν
  english_pob_choice: it is not permitted
  chosen_spanish: no le es permitido
  alternatives_spanish:
  - no está permitido
  - nadie puede
  lexicon: LSJ
  rationale: La fórmula expresa una prohibición formal. En español, «no le es permitido» conserva el tono jurídico-administrativo sin volverlo demasiado coloquial.
- source_word: ἀθετῆσαί
  english_pob_choice: to set aside
  chosen_spanish: invalidar
  alternatives_spanish:
  - dejar de lado
  - anular
  - rechazar
  lexicon: LSJ
  rationale: El verbo puede sugerir desautorizar o dejar sin efecto. «Invalidar» preserva la fuerza de anular o desestimar una disposición ya establecida.
- source_word: τούτων
  english_pob_choice: these things
  chosen_spanish: estas cosas
  alternatives_spanish:
  - estas disposiciones
  - estos decretos
  lexicon: LSJ
  rationale: El pronombre remite a las resoluciones ya emitidas. «Estas cosas» sigue de cerca el griego y mantiene la referencia abierta sin forzar una especificación.
- source_word: ἀντειπεῖν
  english_pob_choice: to contradict
  chosen_spanish: contradecir
  alternatives_spanish:
  - oponerse a
  - hablar contra
  lexicon: LSJ
  rationale: La idea central es hablar en contra u objetar. «Contradecir» comunica bien esa resistencia verbal en español actual.
- source_word: τοῖς ὑπʼ αὐτοῦ ῥηθησομένοις
  english_pob_choice: what is spoken by him
  chosen_spanish: lo que sea dicho por él
  alternatives_spanish:
  - lo que será dicho por él
  - lo que él diga
  - las palabras que él pronuncie
  lexicon: LSJ
  rationale: La forma futura pasiva apunta a lo que habrá de ser dicho por él. «Lo que sea dicho por él» conserva esa referencia futura y pasiva, sin perder naturalidad en español legal.
- source_word: ἐπιστρέψαι συστροφὴν
  english_pob_choice: to convene an assembly
  chosen_spanish: promover una asamblea
  alternatives_spanish:
  - convocar una asamblea
  - formar una facción
  - incitar una reunión
  lexicon: LSJ
  rationale: La frase es difícil y puede aludir a una asamblea o a una coalición. «Promover una asamblea» mantiene el valor de reunión convocada sin cargar de entrada el sentido de facción o sedición.
- source_word: ἐν τῇ χώρᾳ
  english_pob_choice: in the country
  chosen_spanish: en el país
  alternatives_spanish:
  - en la región
  - en la tierra
  lexicon: LSJ
  rationale: En este contexto administrativo, «país» funciona de manera natural en español y puede abarcar el territorio gobernado.
- source_word: περιβαλέσθαι πορφύραν
  english_pob_choice: to put on purple
  chosen_spanish: vestirse de púrpura
  alternatives_spanish:
  - ponerse púrpura
  - clotearse con púrpura
  lexicon: LSJ
  rationale: La púrpura indica rango u honor oficial. «Vestirse de púrpura» conserva el valor simbólico sin añadir explicaciones al texto principal.
- source_word: ἐνπορποῦσθαι πόρπην χρυσῆν
  english_pob_choice: wear a gold clasp
  chosen_spanish: ceñirse una hebilla de oro
  alternatives_spanish:
  - ponerse un broche de oro
  - usar un broche de oro
  - adornarse con una fíbula de oro
  lexicon: LSJ
  rationale: El conjunto sugiere una pieza ornamental de rango, probablemente una fíbula, broche o hebilla. «Hebilla de oro» es comprensible en español y conserva el carácter de insignia sin tecnicismo excesivo.
theological_decisions:
- issue: Naturaleza de la prohibición en el decreto civil
  english_pob_reading: The verse is rendered as a legal-political restriction establishing Simon's exclusive authority, not as a theological claim.
  chosen_spanish_reading: El versículo se vierte como una restricción jurídico-política que establece la autoridad exclusiva de Simón, no como una afirmación doctrinal.
  alternative_spanish_readings:
  - Una lectura más fuerte podría insinuar rebelión o sedición en la cláusula sobre la asamblea.
  - Podría traducirse con un matiz más severo, pero el contexto no lo exige.
  rationale: El contexto del capítulo es un decreto público de honores y autoridad. La traducción evita endurecer el tono hacia sedición o rebelión, a menos que el griego lo requiera claramente.
  doctrine_reference: Principio de primacía de la lengua original; conservar tensiones textuales sin resolverlas artificialmente
translation_notes:
  revision_awareness: 'Tomé como base el último pase revisado del audit trail inglés, que ajustó «what is said by him» a «what is spoken by him» para reflejar mejor el participio futuro pasivo griego. En español, opté por una forma igualmente futura/pasiva: «lo que sea dicho por él». También conservé la ambigüedad documentada de συστροφή con una nota, sin resolverla de manera más fuerte que el texto fuente.'
  spanish_consistency_notes:
  - Mantuve «Yahvé» como norma general del proyecto, pero este versículo no contiene el nombre divino.
  - Usé «pueblo» y «sacerdotes» de manera directa, sin introducir terminología eclesiástica posterior.
  - Elegí «púrpura» y «hebilla de oro» para preservar los signos visibles de rango u honor.
  - No apliqué «Mesías/Cristo» ni vocabulario doctrinal ajeno al decreto civil del pasaje.
