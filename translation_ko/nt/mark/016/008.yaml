id: MRK.16.8
reference: Mark 16:8
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: καὶ ἐξελθοῦσαι ἔφυγον ἀπὸ τοῦ μνημείου, εἶχεν ⸀γὰρ αὐτὰς τρόμος καὶ ἔκστασις· καὶ οὐδενὶ οὐδὲν εἶπαν, ἐφοβοῦντο ⸁γάρ. ⟦Πάντα δὲ τὰ παρηγγελμένα τοῖς περὶ τὸν Πέτρον συντόμως ἐξήγγειλαν. μετὰ δὲ ταῦτα καὶ αὐτὸς ὁ Ἰησοῦς ἀπὸ ἀνατολῆς καὶ ἄχρι δύσεως ἐξαπέστειλεν δι’ αὐτῶν τὸ ἱερὸν καὶ ἄφθαρτον κήρυγμα τῆς αἰωνίου σωτηρίας. ἀμήν.⟧
base_translation:
  language: en
  yaml_path: translation/nt/mark/016/008.yaml
  text: And they went out and fled from the tomb[a], for trembling and astonishment had seized them. And they said nothing to anyone, for they were afraid.
  footnotes:
  - marker: a
    text: 'Some manuscripts add the so-called shorter ending: ''And they reported briefly to those around Peter all that they had been commanded. And after these things, Jesus himself also sent out through them, from east to west, the sacred and imperishable proclamation of eternal salvation. Amen.'''
    reason: textual_variant
translation:
  language: ko
  text: 그리고 그들이 나가 무덤에서 도망쳤습니다. 이는 떨림과 놀라움이 그들을 사로잡았기 때문입니다. 그리고 그들은 누구에게도 아무 말도 하지 않았으니, 이는 그들이 두려워했기 때문입니다.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 마가복음의 가장 오래된 사본들(시내, 바티칸 등)은 이 절에서 끝납니다. 16:9-20과 「짧은 끝맺음」은 모두 후대 첨가로, 부록에서 별도로 다룹니다.
    reason: textual_variant
theological_decisions:
- issue: 16:8을 마가복음 본문의 종결로 채택, 16:9-20과 짧은 끝맺음은 부록 처리
  chosen_reading: 16:8에서 본문 종결
  alternative_readings:
  - 16:9-20을 본문에 포함
  - 짧은 끝맺음을 본문에 포함
  - 두 끝맺음을 모두 본문에 인쇄
  rationale: 마가복음의 가장 오래된 헬라어 사본(시내, 바티칸)과 다수의 초기 라틴·시리아·아르메니아·조지아 사본들은 16:8에서 끝난다. 16:9-20(긴 끝맺음)은 어휘·문체·신학에서 마가의 다른 부분과 분명히 구별되며, 4세기 이전 사본들에는 없다. SBLGNT가 이중 대괄호로 표시한 본문비평적 판단을 존중하여, 본문은 16:8에서 종결하고 16:9-20은 후대 첨가로 명시하여 부록 형식(대괄호 + 본문비평 각주)으로 보존한다. 짧은 끝맺음(시내 등의 일부 사본에 보존)도 16:8 직후의 대괄호 자료로 보존한다.
  doctrine_reference: 'DOCTRINE.md: render the source''s strongest plain meaning; preserve textual transparency'
