  text: '그러므로 메시아께서 육체로 고난을 당하셨으니, 여러분도 같은 마음으로 무장하십시오. 육체로 고난당한 자는 죄에서 멈추었기 때문입니다.'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: τὴν αὐτὴν ἔννοιαν ὁπλίσασθε
  english_pob_choice: arm yourselves with the same mindset
  chosen_korean: 같은 마음으로 무장하십시오
  alternatives_korean:
  - 같은 생각으로 무장하라
