translation:
  language: es
  text: Elías fue escondido en el depósito[a], y Eliseo fue lleno de su espíritu. El doble de señales[b], y muchas maravillas, salieron de su boca.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Griego: «Elías, que fue cubierto en un torbellino». El testimonio hebreo, en cambio, dice: «Elías fue escondido en el depósito».'
    reason: textual_variant
  - marker: b
    text: 'O: «dos veces más señales» o «signos dobles». El hebreo es abreviado y puede aludir a la porción doble asociada con Eliseo.'
    reason: lexical_alternative
lexical_decisions:
- source_word: שבאוצר נסתר
  english_pob_choice: was hidden in the storehouse
  chosen_spanish: fue escondido en el almacén
  alternatives_spanish:
  - fue ocultado en el granero
  - fue escondido en la tesorería
  - fue cubierto en el torbellino
  lexicon: HALOT
  rationale: El hebreo transmitido por Kahana entiende a Elías como «escondido» en un אוצר, que en español puede expresarse naturalmente como «almacén» para conservar la imagen de un lugar de depósito sin forzar una equivalencia técnica ajena al contexto. Se evita sustituir esta lectura por la del griego en el texto principal, pero se preserva la variante griega en nota.
- source_word: ונמלא רוחו אלישע
  english_pob_choice: and Elisha was filled with his spirit
  chosen_spanish: y Eliseo fue lleno de su espíritu
  alternatives_spanish:
  - y Eliseo fue lleno de su Espíritu
  - y Eliseo fue llenado de su espíritu
  - y Eliseo quedó lleno de su aliento
  lexicon: HALOT
  rationale: La relación pronominal apunta a Elías como antecedente del pronombre; por eso se mantiene «su espíritu» en minúscula. «Fue lleno de» conserva el pasivo y la plenitud del hebreo/greco sin introducir una formulación más interpretativa.
- source_word: פי שנים
  english_pob_choice: Twice as many
  chosen_spanish: Dos veces más
  alternatives_spanish:
  - doble
  - el doble
  - dos veces
  lexicon: HALOT
  rationale: La expresión es elíptica y su sentido en contexto es cuantitativo. «Dos veces más» reproduce con claridad la idea de duplicación sin añadir un objeto inexistente en el español de la línea principal.
- source_word: אותות הרבה
  english_pob_choice: many signs
  chosen_spanish: muchas señales
  alternatives_spanish:
  - muchos signos
  - muchas maravillas
  - muchas maravillas y señales
  lexicon: HALOT
  rationale: Se traduce con «señales» porque el hebreo suele referirse a actos significativos o portentosos, y así se mantiene la pareja con «maravillas» en la segunda cola. «Signos» también es posible, pero «señales» resulta más transparente en español bíblico contemporáneo.
- source_word: ומופתים
  english_pob_choice: many wonders
  chosen_spanish: muchas maravillas
  alternatives_spanish:
  - muchos prodigios
  - muchos portentos
  - maravillas
  lexicon: HALOT
  rationale: «Maravillas» comunica bien el matiz de hechos extraordinarios y encaja con el binomio bíblico señales/maravillas. Se evita duplicar el sentido de «señales» con un término demasiado técnico.
- source_word: כל מוצא פיהו
  english_pob_choice: came from his mouth
  chosen_spanish: salieron de su boca
  alternatives_spanish:
  - procedieron de su boca
  - salían de su boca
  - fueron pronunciadas por su boca
  lexicon: HALOT
  rationale: La expresión hebrea es comprimida y alude a lo que procede de la boca, es decir, la palabra profética. «Salieron de su boca» conserva la imagen y suena natural en español sin explicitar de más el referente.
theological_decisions:
- issue: 'Lectura inicial de Sirácida 48:12: hebreo frente a paralelo griego'
  english_pob_reading: The English POB follows the Hebrew witness in the main text and preserves the Greek whirlwind reading in a footnote.
  chosen_spanish_reading: 'Se mantiene el hebreo: «fue escondido en el almacén»; la lectura griega queda en nota.'
  alternative_spanish_readings:
  - «fue cubierto en un torbellino»
  - «fue arrebatado en un torbellino»
  - «fue tomado en el torbellino»
  rationale: El testimonio hebreo disponible es la base principal del texto, mientras que el griego ofrece una tradición paralela coherente. En español conviene seguir el hebreo en la línea principal para respetar la política del proyecto y dejar explícita la variante griega en nota, sin resolver artificialmente la tensión textual.
  doctrine_reference: 'PHILOSOPHY.md: translate from Hebrew where it survives; preserve ancient textual variants in notes'
- issue: Referente de «su espíritu»
  english_pob_reading: Elijah's spirit passed to Elisha
  chosen_spanish_reading: «su espíritu» se entiende como el espíritu de Elías, no como una afirmación explícita del Espíritu Santo.
  alternative_spanish_readings:
  - «su Espíritu»
  - «el Espíritu»
  - «el aliento de Elías»
  rationale: El pronombre y el contexto narrativo apuntan de forma natural a Elías como antecedente. Capitalizar «Espíritu» importaría una lectura pneumatológica más fuerte que la que el texto exige. Se preserva así la tensión léxica sin sobreinterpretación.
  doctrine_reference: 'DOCTRINE.md: preserve theological tension rather than resolve it'
translation_notes:
  revision_awareness: Este borrador toma en cuenta la revisión más reciente del inglés POB, que prefirió «Twice as many signs, and many wonders» frente a «He doubled many signs». Por eso el español adopta una formulación cuantitativa clara («Dos veces más señales») y añade «muchas maravillas» para reflejar גם הרבה («muchas») sin perder fluidez. También conserva la decisión editorial de seguir el hebreo principal y reservar la lectura griega del torbellino en nota.
  spanish_consistency_notes:
  - Se usa «Elías» y «Eliseo» de forma estable para los nombres propios.
  - Se mantiene la minúscula en «su espíritu» para no convertir automáticamente la frase en una referencia al Espíritu Santo.
  - «Almacén» se elige como equivalente funcional de אוצר; no se fuerza «tesorería» porque sugiere un matiz demasiado administrativo.
  - «Señales» y «maravillas» se distinguen para respetar la pareja hebrea sin colapsarla en un solo término.
  - 'La puntuación conserva la cadencia de dos miembros: una afirmación sobre Elías/Eliseo y otra sobre las señales y maravillas.'
