  lexicon: HALOT
  rationale: Es un nombre propio en una genealogía, por lo que se translitera en lugar de traducirse. Se conserva la forma breve y reconocible del nombre, adaptada a la ortografía española con acento para indicar la sílaba tónica.
- source_word: פֶּלֶג
  english_pob_choice: Peleg
  chosen_spanish: Péleg
  alternatives_spanish:
  - Peleg
  lexicon: HALOT
  rationale: También es un nombre propio en secuencia genealógica. Aunque el lexema común puede significar 'división' o 'canal', aquí funciona como antropónimo; por eso se mantiene como transliteración y no como traducción semántica.
- source_word: רְעוּ
  english_pob_choice: Reu
  chosen_spanish: Reú
  alternatives_spanish:
  - Re'u
  lexicon: HALOT
  rationale: Es un nombre propio. Se adopta una transliteración legible para el español, conservando la vocal final marcada con acento. La forma 'Re'u' es una transliteración más técnica, pero menos natural para una edición bíblica de lectura continua.
