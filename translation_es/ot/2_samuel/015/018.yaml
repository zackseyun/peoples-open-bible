translation:
  language: es
  text: Y todos sus siervos iban pasando a su lado, y todos los cereteos, y todos los peleteos, y todos los giteos, seiscientos hombres que habían venido a pie con él desde Gat[a], iban pasando delante del rey.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «que lo habían seguido desde Gat»; el hebreo literalmente dice «que habían venido con su pie desde Gat», un giro idiomático para acompañar a alguien en su séquito o a pie.
    reason: lexical_alternative
lexical_decisions:
- source_word: עֲבָדָיו
  english_pob_choice: his servants
  chosen_spanish: sus siervos
  alternatives_spanish:
  - sus servidores
  - sus oficiales
  - sus asistentes
  lexicon: HALOT
  rationale: עֶבֶד puede significar siervo, servidor o funcionario según el contexto. Aquí el contraste con los grupos nombrados después sugiere el séquito habitual de David; «siervos» mantiene la base léxica sin añadir una función específica que el hebreo no explicita.
- source_word: עֹבְרִים עַל יָדוֹ
  english_pob_choice: were passing by at his side
  chosen_spanish: iban pasando a su lado
  alternatives_spanish:
  - iban pasando junto a él
  - iban pasando a su costado
  - iban pasando a su mano
  lexicon: HALOT
  rationale: El giro עַל יָד puede expresar proximidad lateral. «A su lado» reproduce la idea espacial de manera natural en español y evita el calco menos idiomático «a su mano».
- source_word: הַכְּרֵתִי
  english_pob_choice: the Cherethites
  chosen_spanish: los cereteos
  alternatives_spanish:
  - los quereteos
  lexicon: HALOT
  rationale: Se trata de un etnónimo/grupo de servicio conocido en la corte de David. En español conviene transliterar el nombre del grupo; «cereteos» conserva el valor propio del término sin interpretarlo.
- source_word: הַפְּלֵתִי
  english_pob_choice: the Pelethites
  chosen_spanish: los peleteos
  alternatives_spanish:
  - los peleteos
  lexicon: HALOT
  rationale: Como el anterior, es un designador de grupo y se conserva como nombre étnico/propiamente designativo. «Peleteos» mantiene la forma transliterada con lectura fluida en español.
- source_word: הַגִּתִּים
  english_pob_choice: the Gittites
  chosen_spanish: los giteos
  alternatives_spanish:
  - los geteos
  - los hombres de Gat
  lexicon: HALOT
  rationale: El término designa gente de Gat. «Giteos» conserva el etnónimo compacto y sigue la decisión de mantener los grupos transliterados; «hombres de Gat» sería más explicativo, pero menos consistente con el resto del verso.
- source_word: שֵׁשׁ מֵאוֹת אִישׁ
  english_pob_choice: six hundred men
  chosen_spanish: seiscientos hombres
  alternatives_spanish:
  - seiscientos soldados
  - seiscientos varones
  lexicon: HALOT
  rationale: אִישׁ aquí funciona como término de conteo. «Hombres» es la correspondencia directa y no añade el matiz militar que el hebreo no expresa de manera explícita, aunque el contexto lo sugiera.
- source_word: אֲשֶׁר בָּאוּ בְרַגְלוֹ מִגַּת
  english_pob_choice: who had come on foot with him from Gath
  chosen_spanish: que habían venido a pie con él desde Gat
  alternatives_spanish:
  - que habían venido caminando con él desde Gat
  - que habían llegado en su séquito desde Gat
  - que lo habían seguido desde Gat
  lexicon: HALOT
  rationale: La expresión literal involucra «su pie», pero el uso idiomático describe acompañar a alguien a pie o en su comitiva. «A pie» conserva la imagen concreta y resulta natural en español; «lo habían seguido» explicita la idea, pero suaviza la imagen corporal del hebreo.
- source_word: עֹבְרִים עַל פְּנֵי הַמֶּלֶךְ
  english_pob_choice: were passing on before the king
  chosen_spanish: iban pasando delante del rey
  alternatives_spanish:
  - iban pasando ante el rey
  - iban desfilando delante del rey
  - iban pasando en presencia del rey
  lexicon: HALOT
  rationale: עַל פְּנֵי suele equivaler a «delante de» o «ante». «Delante del rey» es claro y procesional en español, y conserva el movimiento del participio en contexto.
translation_notes:
  revision_awareness: El texto en inglés POB se mantiene sustancialmente sin cambios en la revisión más reciente; no se documentan modificaciones aplicadas. La versión española sigue esa misma línea de estabilidad, conservando la estructura procesional del verso y la transliteración de los grupos étnicos.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma general del proyecto, pero este versículo no contiene el nombre divino.
  - Se conserva la transliteración de los grupos étnicos/cuerpos de servicio para reflejar la decisión auditada del POB inglés.
  - «A pie» y la nota mantienen visible la tensión idiomática del hebreo sin perder fluidez en español.
