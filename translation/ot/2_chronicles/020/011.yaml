theological_decisions:
- issue: Divine ownership and Israel's inheritance of the land
  chosen_reading: of your possession, which you gave us as an inheritance
  alternative_readings:
  - from your inheritance, which you caused us to inherit
  rationale: The Hebrew distinguishes between God's ultimate ownership of the land and Israel's derivative inheritance. The chosen rendering preserves both ideas without collapsing them into a single English term.
