translation:
  language: es
  text: Entonces Ebed-melec tomó consigo a los hombres y entró en la casa del rey, a un lugar debajo del almacén[a], y de allí tomó trapos raídos[b] y prendas raídas, y se los envió a Jeremías, a la cisterna[c], por medio de cuerdas.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'al lugar bajo el almacén'. El hebreo אוֹצָר puede referirse a un tesoro, almacén o depósito; aquí el contexto favorece un área de almacenamiento.
    reason: lexical_alternative
  - marker: b
    text: O 'harapos raídos'. El hebreo סחבות se refiere a trapos o retazos; la frase describe telas viejas y desgastadas.
    reason: lexical_alternative
  - marker: c
    text: O 'pozo' o 'foso'. El hebreo בּוֹר puede significar pozo, cisterna o foso; aquí 'cisterna' encaja mejor con el contexto narrativo.
    reason: lexical_alternative
lexical_decisions:
- source_word: עֶבֶד מֶלֶךְ
  english_pob_choice: Ebed-melech
  chosen_spanish: Ebed-melec
  alternatives_spanish:
  - Ebed-melech
  lexicon: HALOT
  rationale: Es nombre propio; se translitera y se adapta mínimamente a la ortografía española para una lectura más natural, sin traducirlo como 'siervo del rey'.
- source_word: הָאֲנָשִׁים בְּיָדוֹ
  english_pob_choice: the men with him
  chosen_spanish: a los hombres
  alternatives_spanish:
  - a los hombres que llevaba consigo
  - a los hombres bajo su mando
  lexicon: HALOT
  rationale: La construcción hebrea indica los hombres que lo acompañaban o estaban bajo su dirección. En español, con el verbo 'tomó consigo', el sentido queda claro sin forzar un giro literal.
- source_word: בֵית הַמֶּלֶךְ
  english_pob_choice: the king’s house
  chosen_spanish: la casa del rey
  alternatives_spanish:
  - el palacio
  lexicon: HALOT
  rationale: '''Casa del rey'' reproduce con fidelidad la expresión hebrea y mantiene el matiz del original mejor que ''palacio''.'
- source_word: אֶל תַּחַת הָאוֹצָר
  english_pob_choice: to a place below the storeroom
  chosen_spanish: a un lugar debajo del almacén
  alternatives_spanish:
  - al lugar bajo el almacén
  - a la parte inferior del almacén
  lexicon: HALOT
  rationale: אוצר puede referirse a tesoro, almacén o depósito; por el contexto de buscar telas viejas, 'almacén' comunica mejor la función del lugar. 'Debajo de' conserva el valor locativo de תַּחַת.
- source_word: בְּלוֹיֵ הַסְּחָבוֹת
  english_pob_choice: worn-out rags
  chosen_spanish: trapos raídos
  alternatives_spanish:
  - harapos raídos
  - trapos gastados
  lexicon: HALOT
  rationale: La frase combina la idea de desgaste con la de retazos/trapos. 'Trapos raídos' es natural en español y conserva la fuerza descriptiva.
- source_word: וּבְלוֹיֵ מְלָחִים
  english_pob_choice: worn-out garments
  chosen_spanish: vestidos raídos
  alternatives_spanish:
  - vestiduras raídas
  - prendas raídas
  lexicon: HALOT
  rationale: El segundo término es raro y el contexto favorece prendas o vestidos viejos usados como protección bajo las cuerdas. 'Vestidos raídos' mantiene la distinción con 'trapos'.
- source_word: וַיְשַׁלְּחֵם
  english_pob_choice: sent them down
  chosen_spanish: los envió
  alternatives_spanish:
  - los hizo bajar
  - los mandó bajar
  lexicon: HALOT
  rationale: El verbo base es 'enviar'; el movimiento descendente se sobreentiende por el complemento 'por cuerdas' y el contexto del pozo. En español, 'los envió' resulta más idiomático y suficientemente preciso.
- source_word: אֶל יִרְמְיָהוּ אֶל הַבּוֹר
  english_pob_choice: to Jeremiah in the cistern
  chosen_spanish: a Jeremías, al pozo
  alternatives_spanish:
  - a Jeremías en el pozo
  - a Jeremías, a la cisterna
  lexicon: HALOT
  rationale: בּוֹר puede ser pozo, cisterna o foso. Aquí el sentido narrativo es un pozo/cisterna de confinamiento; 'pozo' es claro y amplio en español, mientras que 'cisterna' sería también defendible.
- source_word: בַּחֲבָלִים
  english_pob_choice: by ropes
  chosen_spanish: por cuerdas
  alternatives_spanish:
  - con cuerdas
  - mediante cuerdas
  lexicon: HALOT
  rationale: El beth instrumental expresa medio. 'Por cuerdas' es una forma breve y natural para indicar el medio de envío.
theological_decisions:
- issue: Nombre divino ausente; mantener el relato narrativo sin introducir títulos teológicos no presentes
  english_pob_reading: The verse is purely narrative and contains no explicit divine-name rendering issue.
  chosen_spanish_reading: El versículo se mantiene narrativo, sin añadir títulos religiosos ajenos al hebreo.
  alternative_spanish_readings:
  - Agregar explicaciones devocionales implícitas
  - Usar una formulación más litúrgica
  rationale: No hay contenido doctrinal específico que requiera desarrollo; la fidelidad consiste en no sobrecargar el texto con interpretación.
  doctrine_reference: Principio de suficiencia textual y no-expansión interpretativa
translation_notes:
  revision_awareness: Se tomó en cuenta la revisión más reciente del inglés POB, que afinó el segundo miembro de la pareja lexical de 'clothes' a 'garments'. En español se reflejó esta distinción con 'vestidos raídos' frente a 'trapos raídos'. También se respetó la preferencia del audit trail por un término de almacenamiento práctico en lugar de 'tesoro'.
  spanish_consistency_notes:
  - Se mantuvo Ebed-melec como transliteración estable del nombre propio.
  - Se distinguió entre 'trapos raídos' y 'vestidos raídos' para reflejar la pareja hebrea de dos materiales diferentes.
  - Se usó 'pozo' como equivalente contextual de בּוֹר, con nota alternativa a 'cisterna'.
  - Se evitó 'SEÑOR' u otra sustitución porque el versículo no contiene el Tetragrámaton.
