  to: 'Entonces Jehú y Jonadab hijo de Recab entraron en la casa de Baal[a], y dijo a los siervos de Baal: «Busquen y vean que no haya aquí entre ustedes ningún siervo de Yahvé, sino solo siervos de Baal».'
  rationale: Se ajusta ‘servidores’ a ‘siervos’ por mejor fidelidad al registro bíblico español y por naturalidad en la expresión ‘siervo de Yahvé’. Se elimina el pronombre ‘él’ por fluidez. No se requieren cambios de sentido ni notas adicionales.
