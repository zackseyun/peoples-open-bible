translation:
  language: es
  text: ¡Mira[a], concibe[b] desgracia[c], está encinta de miseria[d], y da a luz falsedad[e].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «He aquí»; la forma hebrea es una partícula deíctica que introduce con fuerza lo que sigue.
    reason: alternative_reading
  - marker: b
    text: O «se retuerce con» o «está de parto con»; el verbo puede sugerir dolores de parto además de la imagen de concebir.
    reason: lexical_alternative
  - marker: c
    text: «Desgracia» (אָוֶן) también puede traducirse «iniquidad» o «maldad».
    reason: lexical_alternative
  - marker: d
    text: O «aflicción», «penuria» o «trabajo penoso»; el término hebreo admite varios matices de daño y opresión.
    reason: lexical_alternative
  - marker: e
    text: O «mentira», «engaño» o «una mentira»; el hebreo apunta a falsedad en sentido amplio.
    reason: lexical_alternative
lexical_decisions:
- source_word: הִנֵּה
  english_pob_choice: Look
  chosen_spanish: ¡Mira!
  alternatives_spanish:
  - ¡Mira ahí!
  - ¡He aquí!
  - ¡Miren!
  lexicon: HALOT
  rationale: Es una interjección deíctica que llama la atención sobre lo que sigue. «Mira» conserva la fuerza inmediata y natural del hebreo sin caer en un arcaísmo innecesario.
- source_word: יְחַבֶּל
  english_pob_choice: conceives
  chosen_spanish: concibe
  alternatives_spanish:
  - está de parto con
  - se retuerce con
  - está de dolores con
  lexicon: HALOT
  rationale: El contexto mantiene la imagen de gestación y nacimiento. Aunque el verbo puede incluir la idea de travail/dolor, «concibe» encaja bien en la secuencia poética y preserva el desarrollo figurado del mal como algo que se forma internamente.
- source_word: אָוֶן
  english_pob_choice: trouble
  chosen_spanish: el mal
  alternatives_spanish:
  - iniquidad
  - maldad
  - trouble
  lexicon: HALOT
  rationale: En español, «mal» comunica de modo amplio el valor dañino y perverso del término en esta cadena poética. Mantiene la carga moral sin forzar una sola categoría técnica.
- source_word: הָרָה
  english_pob_choice: is pregnant with
  chosen_spanish: está encinta de
  alternatives_spanish:
  - está embarazada de
  - está preñada de
  lexicon: HALOT
  rationale: La expresión hebrea es corporal y concreta. «Está encinta de» conserva la metáfora de embarazo con tono digno y bíblico, sin volverla mecánica.
- source_word: עָמָל
  english_pob_choice: misery
  chosen_spanish: miseria
  alternatives_spanish:
  - angustia
  - trabajo penoso
  - maldad
  lexicon: HALOT
  rationale: «Miseria» refleja el peso aflictivo y destructivo del término en el paralelo poético, y diferencia este vocablo de אָוֶן sin perder su campo semántico de sufrimiento/aflicción.
- source_word: יָלַד
  english_pob_choice: gives birth to
  chosen_spanish: da a luz
  alternatives_spanish:
  - engendra
  - pare
  - alumbra
  lexicon: HALOT
  rationale: Es la continuación natural de la metáfora de embarazo y parto. «Da a luz» es claro, idiomático y mantiene la imagen concreta del hebreo.
- source_word: שָׁקֶר
  english_pob_choice: falsehood
  chosen_spanish: falsedad
  alternatives_spanish:
  - mentira
  - engaño
  - falacia
  lexicon: HALOT
  rationale: «Falsedad» conserva el carácter abstracto y colectivo del sustantivo hebreo mejor que «mentira», que en español puede sonar más individual o coloquial.
translation_notes:
  revision_awareness: La revisión en inglés osciló entre una lectura más literal del verbo inicial («writhes with») y la formulación metafórica integrada («conceives»). Para el español, se ha seguido la decisión más reciente del texto base inglés —conservar la secuencia gestación/parto—, pero dejando visible en nota que el verbo hebreo también puede sugerir dolor de parto. Se mantiene la cadena poética completa sin suavizarla ni reinterpretarla.
  spanish_consistency_notes:
  - 'Se conserva una progresión figurada coherente: atención -> concepción -> embarazo -> parto.'
  - Se evita traducir אָוֶן y עָמָל con el mismo equivalente para no borrar la distinción semántica del paralelismo hebreo.
  - «Falsedad» se usa para reflejar el sustantivo abstracto final y mantener un cierre poético más elevado que «mentira».
  - La puntuación con comas mantiene el ritmo encadenado del hebreo y del texto auditado en inglés.
