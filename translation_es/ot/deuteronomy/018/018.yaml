    rationale: 'Conviene presentar la nota en español editorial limpio: ''O "..." o "..."; hebreo literalmente, "...".'' Esto mejora legibilidad y consistencia con el audit trail sin cambiar el contenido.'
  - severity: low
    issue: El punto y coma en el texto principal es algo rígido.
    rationale: 'No contradice el sentido, pero una coma fluye mejor en español actual: ''... como tú, de entre sus hermanos[a], y pondré...''.'
  revised_spanish_text: Levantaré para ellos un profeta como tú, de entre sus hermanos[a], y pondré mis palabras en su boca, y él les hablará todo lo que yo le mande.
