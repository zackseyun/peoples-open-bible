review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura básica del griego: una súplica negativa dirigida a Dios, con un solo verbo que rige dos complementos coordinados por μηδέ. «No apartes de mí tu misericordia» corresponde bien a μὴ ἀποστήσῃς τὸ ἔλεός σου ἀπʼ ἐμοῦ. Sin embargo, «ni la memoria de ti de mi corazón hasta la muerte» reproduce demasiado literalmente la sintaxis y resulta poco natural en español, además de oscurecer que se trata del recuerdo/remembranza de Dios en el corazón del orante. Conviene mantener el paralelismo sin añadir un segundo verbo, pero con una formulación idiomática.'
  spanish_quality_summary: La primera mitad es clara y digna. La segunda mitad suena forzada por el calco «la memoria de ti de mi corazón». En español eclesial natural, «el recuerdo de ti en mi corazón» o «la memoria de ti en mi corazón» funcionan mejor; «recuerdo» es más idiomático que «memoria» en este contexto devocional. También es preferible «¡oh Dios!» con puntuación española más natural para la invocación.
  glossary_alignment: 'No hay conflictos con la terminología del proyecto: θεός = «Dios», ἔλεος = «misericordia». No aparecen términos sensibles como Yahvé/Mesías. La decisión principal es estilística y sintáctica: conservar el verbo elidido en la segunda cláusula, pero expresar μνήμην περὶ σοῦ de forma idiomática en español.'
  issues:
  - severity: medium
    issue: Calco poco natural en «la memoria de ti de mi corazón»
    rationale: Aunque sigue de cerca el griego, en español esta secuencia suena incorrecta o al menos muy torpe. La idea es «el recuerdo de ti en mi corazón / desde mi corazón», no una doble cadena de genitivos.
  - severity: low
    issue: La invocación «oh Dios» puede puntuarse mejor
    rationale: «Oh Dios» no es erróneo, pero «¡oh Dios!» o «oh Dios,» mejora la legibilidad y el tono oracional en español moderno digno.
  - severity: low
    issue: Falta nota léxica para una alternativa preservada en el inglés POB
    rationale: El inglés conserva la alternativa más literal «remembrance concerning you». Como en español se opta por una forma más idiomática, conviene anotar la literalidad para no perder el matiz auditado.
  revised_spanish_text: No apartes de mí tu misericordia[a], ¡oh Dios!, ni el recuerdo de ti[b] en mi corazón hasta la muerte.
  revised_footnotes:
