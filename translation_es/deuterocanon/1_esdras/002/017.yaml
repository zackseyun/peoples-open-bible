base_translation:
  language: en
  yaml_path: translation/deuterocanon/1_esdras/002/017.yaml
  text: And now let it be known to my lord the king that the Judeans who came up from you to us have come to Jerusalem and are living in that rebellious and wicked city[a]; they are restoring its streets and walls[c][b], and are laying the foundation of the temple.
  footnotes:
  - marker: a
    text: Or 'the Jews.' The Greek Ἰουδαῖοι can denote Judeans in an ethnogeographic sense or Jews more broadly.
    reason: lexical_alternative
  - marker: b
    text: Greek 'marketplaces' or 'public squares'; some parallel traditions in Ezra emphasize the rebuilding of the city rather than specifically its market areas.
    reason: alternative_reading
  - marker: c
    text: Or 'are undertaking/rebuilding the temple.' The Greek phrase is somewhat compressed and may refer to beginning temple construction, especially laying its substructure.
    reason: lexical_alternative
