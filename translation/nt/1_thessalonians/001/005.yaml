id: 1TH.1.5
reference: 1 Thessalonians 1:5
source:
  edition: SBLGNT
  text: ὅτι τὸ εὐαγγέλιον ἡμῶν οὐκ ἐγενήθη εἰς ὑμᾶς ἐν λόγῳ μόνον ἀλλὰ καὶ ἐν δυνάμει καὶ ἐν πνεύματι ἁγίῳ ⸀καὶ πληροφορίᾳ πολλῇ, καθὼς οἴδατε οἷοι ἐγενήθημεν ⸀ἐν ὑμῖν δι’ ὑμᾶς·
translation:
  text: because our gospel did not come to you in word only[a], but also in power and in the Holy Spirit and with great conviction[b], just as you know what kind of men we proved to be among you for your sake.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or ‘with great conviction’ or ‘with much certainty’ for ‘with great full assurance.’
    reason: lexical_alternative
  - marker: b
    text: Or ‘what sort of people we proved to be among you.’
    reason: lexical_alternative
lexical_decisions:
- source_word: εὐαγγέλιον
  chosen: gospel
  alternatives:
  - good news
  lexicon: BDAG
  rationale: ‘Gospel’ is the established and still-natural English rendering in Pauline contexts, preserving the term’s technical sense for the apostolic message; ‘good news’ is possible but can sound less specific here.
- source_word: ἐγενήθη εἰς ὑμᾶς
  chosen: did not come to you
  alternatives:
  - did not happen among you
  - did not prove to be to you
  lexicon: BDAG
  rationale: γίνομαι with εἰς here is idiomatic for the gospel’s arrival/effect among the Thessalonians. ‘Did not come to you’ is clear modern English and matches the missionary context better than a wooden ‘did not become to you.’
- source_word: ἐν λόγῳ μόνον
  chosen: in word only
  alternatives:
  - in speech only
  - with words only
  lexicon: BDAG
  rationale: λόγος here contrasts mere verbal proclamation with accompanying divine efficacy. ‘In word only’ preserves the Greek structure and Pauline contrast.
- source_word: ἐν δυνάμει
  chosen: in power
  alternatives:
  - with power
  lexicon: BDAG
  rationale: The repeated ἐν phrases are best preserved for rhythm and emphasis. ‘In power’ keeps the parallelism with the following phrases.
- source_word: ἐν πνεύματι ἁγίῳ
  chosen: in the Holy Spirit
  alternatives:
  - in Holy Spirit
  lexicon: BDAG
  rationale: Anarthrous πνεύματι ἁγίῳ is still definite in sense here, referring to the divine person rather than a generic holy spirit or spiritual quality. Standard English idiom requires the article.
- source_word: πληροφορίᾳ πολλῇ
  chosen: with great full assurance
  alternatives:
  - with great conviction
  - with much certainty
  lexicon: BDAG
  rationale: πληροφορία can denote fullness of certainty/assurance. ‘Full assurance’ preserves that semantic range better than ‘conviction,’ though the latter is a viable contextual rendering. ‘Great’ reflects πολλῇ.
- source_word: καθὼς οἴδατε
  chosen: just as you know
  alternatives:
  - as you know
  lexicon: BDAG
  rationale: καθώς introduces confirmation from the Thessalonians’ own knowledge. ‘Just as’ slightly better preserves the comparative force.
- source_word: οἷοι ἐγενήθημεν
  chosen: what kind of men we became
  alternatives:
  - what sort of people we proved to be
  - how we behaved
  lexicon: BDAG
  rationale: οἷοι asks about the character/quality of Paul and his companions, and ἐγενήθημεν again uses γίνομαι in the sense of becoming/proving to be. ‘Men’ is gender-accurate to the actual missionary band, not generic humanity.
- source_word: ἐν ὑμῖν
  chosen: among you
  alternatives:
  - with you
  - in your midst
  lexicon: BDAG
  rationale: In context this refers to conduct in the Thessalonians’ midst, not inward location. ‘Among you’ is the most natural English equivalent.
- source_word: δι’ ὑμᾶς
  chosen: for your sake
  alternatives:
  - because of you
  - for you
  lexicon: BDAG
  rationale: 'διά with the accusative here most naturally expresses purpose/benefit in context: Paul’s manner among them was for their benefit. ‘Because of you’ is possible but less fitting to the pastoral sense.'
