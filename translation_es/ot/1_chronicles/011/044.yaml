translation:
  language: es
  text: Uzzía, el asteratita[a], Shama y Jeiel[b], los hijos de Hotham, el aroerita.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: También puede entenderse «el ashtarotita»; el gentilicio probablemente se refiere a un hombre procedente de Ashtarot/Asterot.
    reason: lexical_alternative
  - marker: b
    text: El nombre puede reflejarse también como «Jeuel» según tradiciones de transliteración; aquí se sigue la forma revisada «Jeiel».
    reason: lexical_alternative
lexical_decisions:
- source_word: עֻזִּיָּא
  english_pob_choice: Uzzia
  chosen_spanish: Uzzía
  alternatives_spanish:
  - Uzía
  - Uzzia
  lexicon: nombre propio
  rationale: Se translitera el nombre personal. En español bíblico es natural conservar la forma propia con acento gráfico para la pronunciación, sin añadir elementos no presentes en el hebreo.
- source_word: הָעֲשְׁתְּרָתִי
  english_pob_choice: the Ashterathite
  chosen_spanish: el asteratita
  alternatives_spanish:
  - el ashtarotita
  - el de Asterot
  lexicon: gentilicio
  rationale: El hebreo forma un gentilicio de lugar. Se opta por una transliteración española que conserve la relación con Ashtarot/Astarté sin sustituirla por un equivalente interpretativo más amplio.
- source_word: שָׁמָע
  english_pob_choice: Shama
  chosen_spanish: Samaa
  alternatives_spanish:
  - Sama
  - Shama
  lexicon: nombre propio
  rationale: Se translitera el nombre según la forma consonántica hebrea. La duplicación vocálica ayuda a leer la terminación -a en español sin cambiar el nombre.
- source_word: ויעואל
  english_pob_choice: Jeiel
  chosen_spanish: Jeiel
  alternatives_spanish:
  - Jeuel
  lexicon: nombre propio
  rationale: Se conserva la forma adoptada por la revisión inglesa reciente y la tradición onomástica relacionada. En español, Jeiel es legible y sigue de cerca la forma del nombre.
- source_word: בְּנֵי
  english_pob_choice: the sons of
  chosen_spanish: los hijos de
  alternatives_spanish:
  - los hijos de
  - los descendientes de
  lexicon: constructo familiar
  rationale: El constructo hebreo indica filiación o pertenencia familiar. 'Los hijos de' es la equivalencia más directa y natural en español, sin convertirla en una paráfrasis genealógica más amplia.
- source_word: חוֹתָם
  english_pob_choice: Hotham
  chosen_spanish: Hotam
  alternatives_spanish:
  - Jotam
  - Hotham
  lexicon: nombre propio
  rationale: Se translitera el nombre propio. Se evita la h aspirada inicial para una grafía más fluida en español, manteniendo el valor identificatorio del hebreo.
- source_word: הָעֲרֹעֵרִי
  english_pob_choice: the Aroerite
  chosen_spanish: el aroerita
  alternatives_spanish:
  - el aroarita
  - el de Aroer
  lexicon: gentilicio
  rationale: Se conserva el gentilicio derivado de Aroer con una forma transparente en español. Esto mantiene el vínculo con el topónimo sin expandirlo en una explicación dentro del texto principal.
translation_notes:
  revision_awareness: La revisión inglesa reciente cambió Jeuel por Jeiel para reflejar mejor la forma subyacente. La versión española sigue esa decisión y mantiene el resto del versículo sin cambios sustanciales respecto al sentido del hebreo.
  spanish_consistency_notes:
  - Se prefieren transliteraciones estables y legibles para nombres propios, con acentuación solo cuando ayuda a la pronunciación española.
  - 'Se conserva el patrón enumerativo breve del hebreo: nombre + gentilicio, nombre + nombre, relación familiar, gentilicio final.'
  - No se sustituye el gentilicio por una glosa interpretativa en el cuerpo principal, para preservar la transparencia textual.
