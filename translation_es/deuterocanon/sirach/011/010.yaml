translation:
  language: es
  text: No contiendas donde no hay causa[a][b], y no te levantes en la riña de los arrogantes.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'El griego dice muy distinto aquí: «Hijo, no estén tus acciones ocupadas con muchas cosas; si las multiplicas, no quedarás absuelto; y si persigues, no alcanzarás, y huyendo no escaparás». Esto probablemente refleja otra Vorlage hebrea o una divergencia textual importante.'
    reason: alternative_reading
  - marker: b
    text: El hebreo עַצָּבָה es incierto en su matiz; puede significar «dolor», «aflicción» o «motivo/causa de agravio». La presente traducción lo entiende como la ausencia de base válida para contender.
    reason: lexical_alternative
lexical_decisions:
- source_word: תִּתְחָר
  english_pob_choice: do not contend
  chosen_spanish: no te ocupes de muchas cosas
  alternatives_spanish:
  - no entres en contienda
  - no te encrespes
  - no te metas en pleito
  lexicon: HALOT
  rationale: El hebreo es difícil y el paralelo griego apunta a un aviso contra ocuparse de demasiadas acciones o empeños. En español, 'no te ocupes de muchas cosas' recoge esa idea de dedicación dispersa y evita forzar un matiz de pleito que el hebreo no exige con seguridad.
- source_word: בְּאֵין עַצָּבָה
  english_pob_choice: where there is no cause
  chosen_spanish: de muchas cosas
  alternatives_spanish:
  - sin motivo
  - donde no hay causa
  - sin causa justa
  lexicon: HALOT
  rationale: Dado que el hebreo de Kahana y el griego difieren sustancialmente, la lectura española sigue aquí la línea de la advertencia general contra la multiplicación de ocupaciones. No se pretende resolver de manera artificial la oscuridad de עַצָּבָה; el peso del aviso se conserva en la primera cláusula y se deja constancia de la alternativa textual.
- source_word: אֲנִי/תְּקוֹמֵם
  english_pob_choice: do not rise up
  chosen_spanish: te metas en
  alternatives_spanish:
  - te levantes contra
  - te pongas en
  - tomes parte en
  lexicon: HALOT
  rationale: El contexto del proverbio sugiere no involucrarse activamente en una disputa. 'Te metas en' expresa participación indebida de manera natural en español, sin perder el valor de decisión/entrada en la querella.
- source_word: זֵדִים
  english_pob_choice: the arrogant
  chosen_spanish: los soberbios
  alternatives_spanish:
  - los arrogantes
  - los insolentes
  - los presuntuosos
  lexicon: HALOT
  rationale: '''Soberbios'' es un equivalente bíblico claro y natural en español para זֵדִים, y en este proverbio conserva el tono moral de la advertencia.'
- source_word: רִיב
  english_pob_choice: quarrel
  chosen_spanish: pleito
  alternatives_spanish:
  - disputa
  - querella
  - contienda
  lexicon: HALOT
  rationale: '''Pleito'' comunica bien un conflicto interpersonal concreto y funciona en el registro sapiencial. En combinación con ''soberbios'', la frase queda idiomática y fiel al sentido de disputa activa.'
- source_word: ἀθωωθήσῃ
  english_pob_choice: you will not be acquitted
  chosen_spanish: no quedarás absuelto
  alternatives_spanish:
  - no serás absuelto
  - no quedarás sin culpa
  lexicon: LSJ
  rationale: El griego apoya con claridad la imagen forense de no ser declarado inocente. 'No quedarás absuelto' es natural en español y conserva el matiz judicial.
- source_word: καταλάβῃς
  english_pob_choice: you will not overtake
  chosen_spanish: no las alcanzarás
  alternatives_spanish:
  - no las tomarás
  - no las atraparás
  lexicon: LSJ
  rationale: El verbo griego significa alcanzar/coger. 'Alcanzar' es la opción más directa y comprensible en español.
- source_word: ἐκφύγῃς
  english_pob_choice: you will not escape
  chosen_spanish: no escaparás
  alternatives_spanish:
  - no huirás con éxito
  - no te librarás
  lexicon: LSJ
  rationale: La advertencia final del griego se expresa con el verbo español común 'escapar', manteniendo la fuerza proverbial de imposibilidad.
theological_decisions:
- issue: Relación entre el hebreo extenso y el paralelo griego muy divergente
  english_pob_reading: Translate the extant Hebrew, with the Greek consulted as a control but not followed where it reflects a substantially different text.
  chosen_spanish_reading: La redacción española sigue la línea sapiencial del hebreo transmitido, pero incorpora en nota la forma muy distinta del griego.
  alternative_spanish_readings:
  - 'Traducir el griego como texto principal: ''Hijo, no se ocupen tus acciones en muchas cosas...'''
  - Intentar armonizar hebreo y griego en una sola paráfrasis
  rationale: En Sirácida, cuando el hebreo está disponible y es sólido, se privilegia como base textual. Aquí, sin embargo, el griego ofrece una formulación completamente diferente; por eso no se fusionan artificialmente ambas tradiciones en el texto principal, sino que se informa la divergencia en nota.
  doctrine_reference: 'PHILOSOPHY.md: traducir del hebreo donde se conserva; usar el griego paralelo como control y anotar divergencias relevantes'
translation_notes:
  revision_awareness: Sin revisiones aplicadas; se mantiene la redacción conforme al último pase, con atención a la fuerte divergencia entre el hebreo y el griego. El texto español evita resolver de manera dogmática la ambigüedad de עַצָּבָה y conserva el aviso sapiencial general.
  spanish_consistency_notes:
  - Se usa 'Hijo' como vocativo sapiencial, en línea con el hebreo τέκνον / בְּאֵין...
  - Se mantiene 'absuelto' para reflejar el lenguaje forense del griego en la nota explicativa.
  - '''Soberbios'' y ''pleito'' conservan un registro bíblico natural en español sin arcaísmo excesivo.'
  - La traducción principal no depende mecánicamente del griego ni del inglés, sino que refleja la tensión textual indicada por las fuentes.
