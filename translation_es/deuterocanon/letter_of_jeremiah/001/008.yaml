translation:
  language: es
  text: Y tal como una mujer que ama los adornos[a], tomando oro, hacen coronas para las cabezas de sus dioses;
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Griego: «virgen» o «doncella»; la comparación se refiere a una figura femenina aficionada al adorno.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ὥσπερ
  english_pob_choice: as for / as
  chosen_spanish: y como
  alternatives_spanish:
  - así como
  - tal como
  lexicon: LSJ
  rationale: La partícula introduce una comparación. En español, «y como» conserva el valor comparativo y fluye de manera natural al inicio de la cláusula.
- source_word: παρθένῳ
  english_pob_choice: a woman
  chosen_spanish: una mujer
  alternatives_spanish:
  - una virgen
  - una doncella
  lexicon: LSJ
  rationale: Aunque el griego puede significar «virgen» o «doncella», el contexto aquí destaca a la figura femenina en la comparación, no su estado sexual. «Mujer» evita añadir un matiz no requerido por el pasaje.
- source_word: φιλοκόσμῳ
  english_pob_choice: who loves adornment
  chosen_spanish: que ama el adorno
  alternatives_spanish:
  - aficionada al ornamento
  - amante de la ornamentación
  lexicon: LSJ
  rationale: El compuesto expresa gusto o inclinación por el adorno. «Ama el adorno» mantiene la fuerza semántica del verbo en una forma clara y digna en español.
- source_word: λαμβάνοντες
  english_pob_choice: taking
  chosen_spanish: tomando
  alternatives_spanish:
  - al tomar
  - tomando en
  lexicon: LSJ
  rationale: El participio se refleja de manera directa con «tomando», que conserva la secuencia de acciones sin sobreexplicar la relación sintáctica.
- source_word: χρυσίον
  english_pob_choice: gold
  chosen_spanish: oro
  alternatives_spanish:
  - oro puro
  - metal de oro
  lexicon: LSJ
  rationale: El sustantivo denota oro. «Oro» es la correspondencia natural y suficiente; no hace falta concretar más que el texto griego.
- source_word: κατασκευάζουσιν
  english_pob_choice: they make
  chosen_spanish: hacen
  alternatives_spanish:
  - fabrican
  - forjan
  lexicon: LSJ
  rationale: El verbo puede abarcar hacer, preparar o fabricar. Aquí el objeto son coronas; «hacen» es simple, fiel e idiomático.
- source_word: στεφάνους
  english_pob_choice: crowns
  chosen_spanish: coronas
  alternatives_spanish:
  - guirnaldas
  - diademas
  lexicon: LSJ
  rationale: El término puede referirse a coronas o guirnaldas. En este contexto de adornos colocados sobre cabezas, «coronas» resulta la mejor opción en español.
- source_word: ἐπὶ τὰς κεφαλάς
  english_pob_choice: for the heads
  chosen_spanish: para las cabezas
  alternatives_spanish:
  - sobre las cabezas
  - en las cabezas
  lexicon: LSJ
  rationale: La preposición con acusativo expresa destino o colocación. «Para las cabezas» conserva la finalidad de hacer coronas destinadas a ellas, como en el audit trail inglés.
- source_word: τῶν θεῶν αὐτῶν
  english_pob_choice: of their gods
  chosen_spanish: de sus dioses
  alternatives_spanish:
  - de sus ídolos
  - para sus dioses
  lexicon: LSJ
  rationale: El griego dice literalmente «de sus dioses». Mantener «dioses» evita introducir una interpretación que el texto aquí no formula explícitamente.
theological_decisions:
- issue: 'θεῶν: conservar «dioses» o interpretar como «ídolos»'
  english_pob_reading: their gods
  chosen_spanish_reading: sus dioses
  alternative_spanish_readings:
  - sus ídolos
  rationale: El contexto es polémico contra la idolatría, pero el sintagma griego mantiene «dioses». Se conserva esa formulación para no resolver interpretativamente la tensión del original.
  doctrine_reference: Principio de primacía del idioma original; mantener la tensión léxica sin suavizarla con una paráfrasis interpretativa.
translation_notes:
  revision_awareness: 'El audit trail inglés optó por una formulación dinámica controlada («a woman who loves adornment») para evitar sobrecargar el contexto con «virgin/maiden». En español se siguió el mismo criterio: se preserva la comparación, el participio y el sustantivo «oro», y se mantiene «dioses» en lugar de interpretar «ídolos».'
  spanish_consistency_notes:
  - Se usó «coronas» para στεφάνους por ser la opción más natural en este contexto.
  - Se evitó «SEÑOR» o cualquier sustitución litúrgica, ya que el texto aquí no contiene el nombre divino.
  - Se prefirió «sus dioses» frente a «sus ídolos» para respetar el léxico explícito del griego.
  - La nota al pie marca la alternativa lexical de παρθένῳ sin recargar el texto principal.
