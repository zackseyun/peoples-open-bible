translation:
  language: es
  text: Y en aquel tiempo edificaron el monte Sión con muros altos alrededor y torres fuertes, para que las naciones[a] no vinieran a pisotearlo, como lo habían hecho antes.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'los gentiles'. El griego τὰ ἔθνη puede significar 'las naciones' o 'los gentiles'.
    reason: lexical_alternative
lexical_decisions:
- source_word: ᾠκοδόμησαν
  english_pob_choice: they built up
  chosen_spanish: edificaron
  alternatives_spanish:
  - construyeron
  - levantaron
  lexicon: LSJ
  rationale: El verbo griego significa literalmente 'construyeron'. En este contexto militar de defensa, 'edificaron' comunica la acción de levantar una obra fortificada sin introducir una paráfrasis más fuerte que el texto base. Evita forzar 'fortificaron' como si fuera el verbo principal, aunque la finalidad defensiva esté clara por el contexto.
- source_word: ἐν τῷ καιρῷ ἐκείνῳ
  english_pob_choice: at that time
  chosen_spanish: en aquel tiempo
  alternatives_spanish:
  - entonces
  - en ese tiempo
  lexicon: LSJ
  rationale: Es una fórmula temporal narrativa directa y natural en español bíblico contemporáneo. 'En aquel tiempo' conserva el valor de marco histórico sin sonar arcaizante.
- source_word: τὸ ὄρος Σιὼν
  english_pob_choice: Mount Zion
  chosen_spanish: el monte Sión
  alternatives_spanish:
  - el monte de Sión
  - Sión
  lexicon: LSJ
  rationale: '''ὄρος'' es ''monte''; la construcción usual en español es ''monte Sión''. Se mantiene el nombre tradicional del lugar con una forma clara y sobria.'
- source_word: κυκλόθεν
  english_pob_choice: all around
  chosen_spanish: alrededor
  alternatives_spanish:
  - en derredor
  - por todos lados
  lexicon: LSJ
  rationale: Adverbio espacial que modifica los muros. 'Alrededor' es la forma más natural y precisa en español actual.
- source_word: τείχη ὑψηλά
  english_pob_choice: high walls
  chosen_spanish: muros altos
  alternatives_spanish:
  - muros elevados
  - paredes altas
  lexicon: LSJ
  rationale: '''τείχη'' puede ser ''muros'' o ''murallas''. Aquí ''muros altos'' conserva la imagen defensiva y evita una posible rigidez si se repitiera ''murallas'' más adelante en el pasaje. ''Altos'' corresponde bien a ὑψηλά.'
- source_word: πύργους ἰσχυρούς
  english_pob_choice: strong towers
  chosen_spanish: torres fuertes
  alternatives_spanish:
  - torres robustas
  - torres poderosas
  lexicon: LSJ
  rationale: ἰσχυρούς expresa fuerza/solidez, no tamaño. 'Torres fuertes' preserva esa cualidad en un español sencillo y fiel.
- source_word: μή ποτε
  english_pob_choice: lest
  chosen_spanish: para que no
  alternatives_spanish:
  - no sea que
  - a fin de que no
  lexicon: LSJ
  rationale: En español bíblico natural, la idea precautoria se expresa con una final negativa. 'Para que no' comunica con claridad el propósito preventivo sin perder el matiz de advertencia.
- source_word: παραγενηθέντα τὰ ἔθνη
  english_pob_choice: the nations come
  chosen_spanish: las naciones llegaran
  alternatives_spanish:
  - los gentiles llegaran
  - las naciones vinieran
  lexicon: LSJ
  rationale: τὰ ἔθνη puede ser 'las naciones' o 'los gentiles'. Se mantiene 'las naciones' por ser la opción más directa y menos cargada teológicamente en este relato histórico. El participio se vierte de manera natural en una subordinada temporal/condicional implícita en español.
- source_word: καταπατήσωσιν
  english_pob_choice: trample it
  chosen_spanish: pisotearlo
  alternatives_spanish:
  - aplastarlo
  - arrasarlo
  lexicon: LSJ
  rationale: El verbo significa 'pisotear, hollar'. 'Pisotearlo' es la correspondencia más directa y mantiene la imagen corporal y despectiva del griego.
- source_word: αὐτά
  english_pob_choice: it
  chosen_spanish: lo
  alternatives_spanish:
  - los
  - las
  lexicon: LSJ
  rationale: Aunque el pronombre es plural en griego, en español conviene referirlo al conjunto fortificado como unidad (el monte Sión defendido). El masculino singular 'lo' es el referente natural de 'el monte Sión' y evita una construcción torpe.
- source_word: ὡς ἐποίησαν τὸ πρότερον
  english_pob_choice: as they had done before
  chosen_spanish: como lo habían hecho antes
  alternatives_spanish:
  - como habían hecho antes
  - como lo hicieron antes
  lexicon: LSJ
  rationale: La cláusula retrospectiva se traduce de manera idiomática y fiel. 'Lo habían hecho antes' conserva el valor de anterioridad y la referencia a una acción previa ya conocida por el lector.
theological_decisions:
- issue: 'τὰ ἔθνη: ''nations'' versus ''Gentiles'' in a Jewish historical narrative'
  english_pob_reading: the nations
  chosen_spanish_reading: las naciones
  alternative_spanish_readings:
  - los gentiles
  rationale: En este contexto de 1 Macabeos, el griego designa a los pueblos no judíos hostiles alrededor de Judea. 'Las naciones' es la opción más transparente y fiel al valor básico del término, sin introducir un tecnicismo cristiano posterior. Se conserva la alternativa tradicional en nota porque el término también puede entenderse como 'gentiles'.
  doctrine_reference: Principio POB de primacía de la lengua original y preservación de alternativas significativas cuando el término admite más de una lectura.
translation_notes:
  revision_awareness: La versión inglesa auditada pasó de 'fortified' a 'built up' para reflejar con más cercanía ᾠκοδόμησαν, aunque conservando el sentido defensivo. La redacción española sigue esa revisión al usar 'edificaron' y mantener el contexto de murallas y torres, evitando una paráfrasis excesiva.
  spanish_consistency_notes:
  - Se mantiene 'las naciones' en el texto principal, con nota alternativa 'los gentiles' para preservar la amplitud semántica de τὰ ἔθνη.
  - Se eligió 'edificaron' en vez de 'fortificaron' para reflejar el verbo griego principal sin borrar el matiz defensivo aportado por el contexto.
  - La puntuación y el orden de los complementos siguen el flujo narrativo natural del español, manteniendo la relación entre construcción, finalidad y recuerdo histórico.
