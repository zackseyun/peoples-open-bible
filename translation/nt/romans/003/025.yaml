id: ROM.3.25
reference: Romans 3:25
source:
  edition: SBLGNT
  text: ὃν προέθετο ὁ θεὸς ἱλαστήριον ⸀διὰ πίστεως ἐν τῷ αὐτοῦ αἵματι εἰς ἔνδειξιν τῆς δικαιοσύνης αὐτοῦ διὰ τὴν πάρεσιν τῶν προγεγονότων ἁμαρτημάτων
translation:
  text: whom God put forward as an atoning sacrifice[a] through faith in his blood[b], to demonstrate his righteousness[c], because of the passing over of previously committed sins.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or "propitiation" (Reformation-era god-ward emphasis); or "mercy seat" (the OT כפרת / ἱλαστήριον in LXX Lev — the gold cover of the ark where atoning blood was sprinkled). Both are preserved per DOCTRINE.md, which mandates "atoning sacrifice" as the default rendering to preserve the term's full functional range without committing to a single interpretive strand.
    reason: lexical_alternative
  - marker: b
    text: Or "through faith, by his blood"; the phrase may also be understood as "through faith in his blood."
    reason: alternative_reading
  - marker: c
    text: Or "justice."
    reason: lexical_alternative
lexical_decisions:
- source_word: προέθετο
  chosen: put forward
  alternatives:
  - presented
  - purposed
  lexicon: BDAG
  rationale: '"Put forward" preserves the public-setting-forth sense in context and sounds natural in modern English without importing a narrower theological nuance.'
- source_word: ἱλαστήριον
  chosen: atoning sacrifice
  alternatives:
  - propitiation
  - mercy seat
  lexicon: BDAG
  doctrine_reference: DOCTRINE.md contested-terms — ἱλαστήριον
  rationale: This follows the doctrinal default for accessibility while preserving the sacrificial/expiatory sense. The major alternatives are preserved in a footnote because the term is contested and theologically weighty. DOCTRINE.md's contested-terms table binds "atoning sacrifice" as the main-text default — "propitiation" (god-ward) and "mercy seat" (place) are footnoted alternatives, not main-text replacements.
- source_word: διὰ πίστεως
  chosen: through faith
  alternatives:
  - through faithfulness
  - through trust
  lexicon: BDAG
  rationale: The project default for πίστις is "faith." Here that rendering is clear and natural, while alternatives are noted because the construction of the whole phrase is debated.
- source_word: ἐν τῷ αὐτοῦ αἵματι
  chosen: in his blood
  alternatives:
  - by his blood
  lexicon: BDAG
  rationale: A formally transparent rendering preserves the Greek wording and leaves open whether the phrase modifies "atoning sacrifice" or the means of access. The instrumental alternative is preserved in a footnote.
- source_word: εἰς ἔνδειξιν
  chosen: to demonstrate
  alternatives:
  - for a demonstration
  - as proof
  lexicon: BDAG
  rationale: This converts the prepositional phrase into natural English while retaining the purposive/resultative force.
- source_word: δικαιοσύνης
  chosen: righteousness
  alternatives:
  - justice
  lexicon: BDAG
  rationale: This follows the project's default rendering for Pauline usage. "Justice" remains a viable nuance and is preserved in a footnote per doctrine guidance.
- source_word: πάρεσιν
  chosen: passing over
  alternatives:
  - forbearance toward
  - remission
  lexicon: BDAG
  rationale: '"Passing over" best reflects the distinct sense of temporary non-punishment or overlooking here, and avoids collapsing the term into full forgiveness.'
- source_word: προγεγονότων ἁμαρτημάτων
  chosen: previously committed sins
  alternatives:
  - sins committed beforehand
  - former sins
  lexicon: BDAG
  rationale: This communicates temporal priority clearly in current English while keeping the participial force.
