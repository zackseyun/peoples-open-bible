translation:
  language: es
  text: 'La visión de Abdías. Así dice el Señor Dios Yahvé acerca de Edom: Hemos oído una noticia de parte de Yahvé, y un mensajero[a] ha sido enviado entre las naciones: «¡Levántense[b], y levantémonos contra ella[c] para la batalla!»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Mensajero» también puede rendirse como «enviado» o «embajador».
    reason: lexical_alternative
  - marker: b
    text: El hebreo no identifica a los hablantes del plural ni precisa quiénes se incluyen en «levantémonos».
    reason: alternative_reading
  - marker: c
    text: El hebreo dice «contra ella», refiriéndose a Edom como nación; en español también podría traducirse «contra ello» o «contra Edom».
    reason: lexical_alternative
lexical_decisions:
- source_word: חֲזוֹן
  english_pob_choice: vision
  chosen_spanish: visión
  alternatives_spanish:
  - oráculo
  - revelación
  lexicon: HALOT
  rationale: חֲזוֹן en encabezamientos proféticos suele referirse a una visión profética o a una revelación recibida. «Visión» es la forma más directa y natural en español, y conserva el valor de superscripción del hebreo sin introducir una interpretación más específica de la modalidad de la revelación.
- source_word: עֹבַדְיָה
  english_pob_choice: Obadiah
  chosen_spanish: Abdías
  alternatives_spanish:
  - Obadías
  lexicon: HALOT
  rationale: En español bíblico, el nombre del profeta se transmite tradicionalmente como «Abdías». Se mantiene la convención onomástica hispana estándar, claramente reconocible para lectores de Biblia en español.
- source_word: כֹּה אָמַר
  english_pob_choice: Thus says
  chosen_spanish: Así dice
  alternatives_spanish:
  - Así ha dicho
  - Esto dice
  lexicon: HALOT
  rationale: La fórmula profética pide un presente formular. «Así dice» reproduce con naturalidad la fuerza oracular del hebreo y evita una forma excesivamente literaria o arcaizante.
- source_word: אֲדֹנָי יְהוִה
  english_pob_choice: the Lord GOD
  chosen_spanish: el Señor Yahvé
  alternatives_spanish:
  - el Señor Dios
  - el Señor Yahveh
  lexicon: HALOT
  rationale: El hebreo une el título אֲדֹנָי con el nombre divino YHWH. En español se conserva el nombre propio «Yahvé» según la terminología del proyecto, y se traduce אֲדֹנָי por «Señor» como título reverencial. No se usa «SEÑOR» en mayúsculas porque el proyecto pide no enmascarar el nombre divino.
- source_word: לֶאֱדוֹם
  english_pob_choice: concerning Edom
  chosen_spanish: acerca de Edom
  alternatives_spanish:
  - contra Edom
  - para Edom
  lexicon: HALOT
  rationale: La preposición ל aquí introduce el destinatario/tema del oráculo. «Acerca de» comunica bien que la profecía trata sobre Edom, sin forzar un matiz de ataque o dirección que no es el principal en esta construcción.
- source_word: שְׁמוּעָה
  english_pob_choice: report
  chosen_spanish: mensaje
  alternatives_spanish:
  - noticia
  - rumor
  - informe
  lexicon: HALOT
  rationale: שְׁמוּעָה es algo oído, una noticia o reporte. «Mensaje» funciona en el registro profético español y permite que el verso fluya con naturalidad, aunque «noticia» o «informe» también serían posibles.
- source_word: שָׁמַעְנוּ
  english_pob_choice: we have heard
  chosen_spanish: hemos oído
  alternatives_spanish:
  - oímos
  lexicon: HALOT
  rationale: 'El perfecto hebreo se vierte bien con pretérito perfecto compuesto en español: «hemos oído». Mantiene la referencia a un hecho recibido con vigencia actual en el discurso.'
- source_word: מֵאֵת יְהוָה
  english_pob_choice: from the LORD
  chosen_spanish: de parte de Yahvé
  alternatives_spanish:
  - de Yahvé
  - procedente de Yahvé
  lexicon: HALOT
  rationale: La locución marca origen. «De parte de Yahvé» expresa con precisión que el mensaje procede de él, en un español claro y idiomático.
- source_word: וְצִיר
  english_pob_choice: and a messenger
  chosen_spanish: y un mensajero
  alternatives_spanish:
  - y un enviado
  - y un embajador
  lexicon: HALOT
  rationale: צִיר puede designar un mensajero o enviado. «Mensajero» es la opción más amplia y comprensible en español, y conserva la ambigüedad funcional del hebreo sin decidir innecesariamente por un oficio diplomático técnico.
- source_word: בַּגּוֹיִם
  english_pob_choice: among the nations
  chosen_spanish: entre las naciones
  alternatives_spanish:
  - entre los pueblos
  - entre los gentiles
  lexicon: HALOT
  rationale: En contexto profético, גּוֹיִם apunta a las naciones. «Entre las naciones» refleja bien el ámbito internacional del anuncio y resulta más natural que un calco menos fluido.
- source_word: שֻׁלָּח
  english_pob_choice: has been sent
  chosen_spanish: ha sido enviado
  alternatives_spanish:
  - fue enviado
  - es enviado
  lexicon: HALOT
  rationale: El pasivo perfectivo se expresa de forma adecuada con «ha sido enviado», preservando el valor de acción completada con relevancia presente.
- source_word: קוּמוּ
  english_pob_choice: Rise up
  chosen_spanish: ¡Levántense!
  alternatives_spanish:
  - ¡Levantaos!
  - ¡Levantaos ya!
  lexicon: HALOT
  rationale: El imperativo plural en un contexto de convocatoria bélica se vierte con una forma natural y enérgica en español. «Levántense» comunica el llamado con claridad y dignidad.
- source_word: וְנָקוּמָה
  english_pob_choice: and let us rise
  chosen_spanish: y levantémonos
  alternatives_spanish:
  - y subamos
  - y alcémonos
  lexicon: HALOT
  rationale: La cohortativa expresa exhortación y decisión compartida. «Levantémonos» conserva el valor exhortativo/solidario del hebreo y su ritmo dentro del llamado militar.
- source_word: עָלֶיהָ
  english_pob_choice: against her
  chosen_spanish: contra ella
  alternatives_spanish:
  - contra él
  - contra eso
  lexicon: HALOT
  rationale: El sufijo femenino singular se conserva con «ella», manteniendo la forma gramatical del hebreo. En español es válido para una nación personificada; la alternativa «eso» perdería esa resonancia.
- source_word: לַמִּלְחָמָה
  english_pob_choice: for battle
  chosen_spanish: para la guerra
  alternatives_spanish:
  - para el combate
  - para la batalla
  lexicon: HALOT
  rationale: מִלְחָמָה denota guerra, no solo un enfrentamiento puntual. «Para la guerra» refleja con más fuerza el alcance bélico del llamado, mientras que «para la batalla» podría sonar algo más restringido.
theological_decisions:
- issue: Representación del nombre divino YHWH
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Señor
  - Yahveh
  rationale: El proyecto español establece que יהוה se traduzca como «Yahvé» en el texto principal. En este versículo, el nombre aparece explícitamente y se conserva como nombre propio divino, en vez de enmascararlo con un sustituto tipográfico.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יהוה / YHWH → Yahvé'
- issue: Sentido del plural en «Hemos oído» / «levantémonos»
  english_pob_reading: retain the Hebrew first-person plurals without specifying the speakers
  chosen_spanish_reading: conservar los plurales sin identificar a los hablantes
  alternative_spanish_readings:
  - nosotros profético
  - consejo celestial
  - voz colectiva de las naciones
  rationale: El hebreo no identifica a los hablantes del plural. La traducción mantiene «hemos oído» y «levantémonos» sin aclarar quién habla, preservando la ambigüedad literaria y teológica documentada por el audit trail.
  doctrine_reference: 'DOCTRINE.md Translation philosophy #3: Preserve theological tension rather than resolve it'
translation_notes:
  revision_awareness: 'El contexto auditado muestra alta concordancia entre el texto fuente, la revisión inglesa y el control cruzado; no se registraron cambios de revisión aplicados. Se ha seguido la lectura inglesa aprobada, pero ajustando la terminología al estándar español del proyecto: YHWH como «Yahvé», mantenimiento de la ambigüedad del plural y uso de equivalencias naturales para el registro profético.'
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» conforme al estándar del proyecto para יהוה.
  - Se evitó «SEÑOR» como máscara tipográfica del nombre divino.
  - Se conservó la ambigüedad del plural hebreo en «hemos oído» y «levantémonos».
  - Se empleó «ella» para Edom siguiendo el sufijo femenino singular del hebreo.
  - Se prefirió un español bíblico moderno y digno, sin calcos innecesarios.
