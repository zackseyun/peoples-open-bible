revisions:
- from: 'Entonces miré[a], y vi: una figura con apariencia de fuego; desde lo que parecía ser su cintura y hacia abajo, fuego; y desde su cintura y hacia arriba, como la apariencia de brillo, como ámbar resplandeciente.'
  to: 'Entonces miré, y he aquí, una figura con apariencia de fuego: desde lo que parecía ser su cintura y hacia abajo, fuego; y desde su cintura y hacia arriba, como la apariencia de resplandor, como ámbar resplandeciente[a].'
  rationale: Se corrige el anclaje de la nota para que corresponda al término raro חַשְׁמַלָה, se mejora la representación de וְהִנֵּה con «y he aquí» en vez de la repetición «y vi», y se pule «brillo» a «resplandor» para una lectura más natural y elevada sin apartarse del sentido fuente.
