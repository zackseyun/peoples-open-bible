translation:
  language: es
  text: Él suelta las ataduras de los reyes[a] y les ata un cinturón alrededor de la cintura[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O ‘disciplina de reyes’; el sustantivo hebreo puede significar ‘disciplina’ o ‘ataduras/grilletes’, pero ‘ataduras’ encaja mejor con el paralelismo con ‘ata un cinturón’.
    reason: lexical_alternative
  - marker: b
    text: 'La imagen puede sugerir humillación o subyugación: Dios despoja a los reyes de su poder y los ata como a hombres comunes o cautivos.'
    reason: cultural_note
lexical_decisions:
- source_word: מוּסַר
  english_pob_choice: bonds
  chosen_spanish: ataduras
  alternatives_spanish:
  - disciplina
  - frenos
  - grilletes
  lexicon: HALOT
  rationale: El sustantivo puede significar disciplina/castigo o vínculo/freno. En este contexto, con el verbo siguiente de soltar y en paralelo con ceñir un cinturón, el sentido concreto de 'ataduras' comunica mejor la imagen de algo que se afloja o se quita. 'Disciplina' haría perder la metáfora física.
- source_word: פִּתֵּחַ
  english_pob_choice: loosens
  chosen_spanish: suelta
  alternatives_spanish:
  - afloja
  - libera
  - abre
  lexicon: HALOT
  rationale: El verbo puede significar abrir o soltar. Aquí, junto con מוּסַר, expresa la idea de aflojar lo que ata; 'suelta' conserva la imagen con naturalidad en español.
- source_word: מְלָכִים
  english_pob_choice: kings
  chosen_spanish: reyes
  alternatives_spanish:
  - monarcas
  - gobernantes
  lexicon: HALOT
  rationale: El sentido ordinario es 'reyes'. 'Gobernantes' generalizaría innecesariamente el hebreo.
- source_word: וַיֶּאְסֹר
  english_pob_choice: binds
  chosen_spanish: ciñe
  alternatives_spanish:
  - ata
  - liga
  - faja
  lexicon: HALOT
  rationale: El verbo significa atar o ceñir. 'Ciñe' preserva la acción concreta de poner algo alrededor de la cintura y funciona bien con el sustantivo siguiente.
- source_word: אֵזוֹר
  english_pob_choice: belt
  chosen_spanish: cinturón
  alternatives_spanish:
  - cinto
  - faja
  - ceñidor
  lexicon: HALOT
  rationale: Denota un cinturón o ceñidor. 'Cinturón' es la equivalencia moderna más clara y natural en español.
- source_word: בְּמָתְנֵיהֶם
  english_pob_choice: around their waists
  chosen_spanish: a la cintura
  alternatives_spanish:
  - en los lomos
  - en la cintura
  - a sus lomos
  lexicon: HALOT
  rationale: La frase se refiere a la cintura/lomos. 'A la cintura' es claro y evita una expresión demasiado arcaica para el lector actual.
theological_decisions:
- issue: Imagen de reversión y humillación de los reyes
  english_pob_reading: 'The verse depicts God''s sovereignty in reversing the status of kings: he removes their restraints or authority and then binds them in a humbling way.'
  chosen_spanish_reading: 'El versículo presenta la soberanía de Dios al invertir la condición de los reyes: les quita sus ataduras y luego los ciñe de manera humillante o subordinada.'
  alternative_spanish_readings:
  - Él libera a los reyes para la acción y luego los prepara con un cinturón de fuerza.
  - Él despoja a los reyes de su poder para atar a otros y después los ata a ellos mismos.
  rationale: La poesía hebrea es breve y metafórica. Conviene mantener la tensión entre liberar y ceñir sin resolverla en una sola paráfrasis. En español, la imagen puede sugerir humillación, subordinación o despojo de autoridad; la traducción principal conserva esa ambigüedad controlada.
  doctrine_reference: Preservar la tensión teológica en lugar de resolverla; soberanía divina sobre reyes.
translation_notes:
  revision_awareness: Se mantuvo el sentido confirmado por la revisión más reciente sin cambios sustantivos; la decisión clave sigue siendo leer מוּסַר como un término concreto de ataduras en este contexto, en paralelo con el gesto de ceñir un cinturón.
  spanish_consistency_notes:
  - Se usa 'Dios' para el sujeto implícito, coherente con el contexto inmediato de Job.
  - Se evita 'SEÑOR' como sustituto del nombre divino porque aquí el verso no contiene el tetragrámaton; el sujeto queda implícito en la línea poética.
  - '''Reyes'' se conserva literalmente, sin ampliar a ''gobernantes''.'
  - '''Cinturón'' se mantiene como equivalente moderno de אֵזוֹר; no se usa ''cinto'' por preferencia estilística, aunque sería posible.'
  - La construcción española mantiene dos cola poéticas coordinadas y una imagen física de sujeción/ceñimiento.
