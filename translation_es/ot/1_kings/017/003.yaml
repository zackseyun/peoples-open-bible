translation:
  language: es
  text: Sal de aquí, y gira hacia el oriente; escóndete junto al torrente Querit[a][c][b], que está frente al Jordán.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «arroyo Querit». El hebreo נחל puede referirse a un wadi, cauce o curso de agua estacional.
    reason: lexical_alternative
  - marker: b
    text: La expresión hebrea significa literalmente «frente al Jordán»; en este contexto puede indicar la zona oriental del Jordán, aunque también cabe «opuesto al Jordán».
    reason: lexical_alternative
  - marker: c
    text: Querit también puede transliterarse «Kerit».
    reason: alternative_reading
lexical_decisions:
- source_word: לֵךְ
  english_pob_choice: Go
  chosen_spanish: Sal
  alternatives_spanish:
  - Ve
  - Vete
  - Parte
  lexicon: HALOT
  rationale: El imperativo de הלך pide salida o partida. En español, «Sal» comunica bien el desplazamiento fuera del lugar actual y encaja con el mandato de abandonar el sitio.
- source_word: מִזֶּה
  english_pob_choice: from here
  chosen_spanish: de aquí
  alternatives_spanish:
  - desde aquí
  - de este lugar
  lexicon: HALOT
  rationale: La partícula indica separación desde la ubicación presente. «De aquí» es natural y fiel al valor deíctico.
- source_word: וּפָנִיתָ לְּךָ קֵדְמָה
  english_pob_choice: turn eastward
  chosen_spanish: gira hacia el oriente
  alternatives_spanish:
  - vuélvete al oriente
  - toma rumbo al oriente
  - gira al este
  lexicon: HALOT
  rationale: פנה con קֵדְמָה expresa cambio de dirección hacia el este. En español, «gira hacia el oriente» preserva la orientación geográfica con tono digno y claro.
- source_word: וְנִסְתַּרְתָּ
  english_pob_choice: hide yourself
  chosen_spanish: escóndete
  alternatives_spanish:
  - escóndete a ti mismo
  - permanece escondido
  - ocúltate
  lexicon: HALOT
  rationale: 'El nifal tiene sentido reflexivo/pasivo: colocarse en ocultamiento. En español, el imperativo simple «escóndete» expresa bien esa acción sin forzar una reflexividad redundante.'
- source_word: בְּנַחַל
  english_pob_choice: by the Wadi
  chosen_spanish: junto al torrente
  alternatives_spanish:
  - junto al wadi
  - junto al arroyo
  - junto al cauce
  lexicon: HALOT
  rationale: נחל puede ser wadi, cauce estacional o torrente. «Torrente» comunica en español la idea de curso de agua estacional sin depender de un término geográfico poco transparente para lectores generales.
- source_word: כְּרִית
  english_pob_choice: Cherith
  chosen_spanish: Querit
  alternatives_spanish:
  - Kerit
  - Cherit
  lexicon: HALOT
  rationale: Es un nombre propio de lugar. «Querit» adapta la transliteración al español bíblico estándar, manteniendo la identificación del topónimo.
- source_word: אֲשֶׁר עַל פְּנֵי הַיַּרְדֵּן
  english_pob_choice: which is before the Jordan
  chosen_spanish: que está frente al Jordán
  alternatives_spanish:
  - que está antes del Jordán
  - que está en frente del Jordán
  - que queda opuesto al Jordán
  lexicon: HALOT
  rationale: La expresión idiomática עַל־פְּנֵי puede significar «frente a», «delante de» u «opuesto a». Siguiendo la cautela del audit trail inglés, «frente al Jordán» evita sobreinterpretar la ubicación precisa y conserva el valor relacional del hebreo.
theological_decisions:
- issue: Dirección geográfica y posible implicación de la ubicación del arroyo
  english_pob_reading: which is before the Jordan
  chosen_spanish_reading: que está frente al Jordán
  alternative_spanish_readings:
  - que está al este del Jordán
  - que está del otro lado del Jordán
  - que está opuesto al Jordán
  rationale: El hebreo no exige explícitamente «al este», aunque ese sea el sentido probable en contexto. La redacción española mantiene la ambigüedad controlada del original y no convierte la inferencia geográfica en una certeza del texto.
  doctrine_reference: Precisión exegética y cautela hermenéutica en la traducción bíblica.
translation_notes:
  revision_awareness: 'Se tuvo en cuenta la revisión más reciente del audit trail en inglés: se prefirió una formulación que no añadiera reflexividad innecesaria al verbo de giro y se evitó traducir la localización con un «al este» demasiado interpretativo. La versión española conserva esa cautela mientras sigue siendo natural y publicable.'
  spanish_consistency_notes:
  - Se usó «Yahvé» para el nombre divino solo cuando aparezca explícitamente; aquí no corresponde.
  - Se mantuvo «Jordán» con artículo y preposición idiomática en español bíblico.
  - Se prefirió «Querit» como transliteración española, con nota de variante «Kerit».
  - Se evitó «SEÑOR» porque el versículo no contiene el Tetragrámaton.
