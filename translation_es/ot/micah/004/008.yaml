base_translation:
  language: en
  yaml_path: translation/ot/micah/004/008.yaml
  text: And you[a], tower of the flock, hill of daughter Zion—to you it will come, yes, the former dominion will come[c][b], the kingdom of the daughter of Jerusalem.
  footnotes:
  - marker: a
    text: Or 'Migdal-eder' (a place name); also possibly 'watchtower of the flock.'
    reason: alternative_reading
  - marker: b
    text: Or 'Ophel of daughter Zion,' taking 'Ophel' as a place name rather than the common noun 'hill.'
    reason: alternative_reading
  - marker: c
    text: '''The former dominion'' likely refers to the restoration of Jerusalem''s earlier royal rule.'
    reason: cross_reference
