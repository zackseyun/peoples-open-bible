translation:
  language: es
  text: y vuelve toda mente al banquete y a la alegría[a], y no recuerda ninguna tristeza ni deuda[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «todo pensamiento», para πᾶσαν διάνοιαν.
    reason: lexical_alternative
  - marker: b
    text: O «ninguna tristeza ni nada de lo que se debe». El griego ὀφείλημα significa literalmente «deuda» y puede extenderse más ampliamente a obligaciones.
    reason: lexical_alternative
lexical_decisions:
- source_word: πᾶσαν διάνοιαν
  english_pob_choice: every mind
  chosen_spanish: todo pensamiento
  alternatives_spanish:
  - toda mente
  - toda intención
  - el pensamiento entero
  lexicon: BDAG
  rationale: διάνοια puede abarcar mente, entendimiento o pensamiento. En español, “todo pensamiento” conserva mejor la naturalidad y la amplitud distributiva del griego sin forzar una personificación de “mente” que aquí suena menos idiomática que en inglés.
- source_word: μεταστρέφει
  english_pob_choice: turns
  chosen_spanish: convierte
  alternatives_spanish:
  - vuelve
  - cambia
  - redirige
  lexicon: LSJ
  rationale: El verbo expresa giro o cambio de dirección. “Convierte” transmite el efecto resultante sobre el pensamiento de manera clara y fluida en español, sin intensificarlo hasta “transforma”.
- source_word: εἰς εὐωχίαν
  english_pob_choice: to feasting
  chosen_spanish: en banquete
  alternatives_spanish:
  - en fiesta
  - en festín
  - en regocijo
  lexicon: LSJ
  rationale: εὐωχία apunta a un comer festivo, un banquete. “Banquete” preserva mejor ese matiz concreto que “fiesta” o “regocijo”.
- source_word: καὶ εὐφροσύνην
  english_pob_choice: and gladness
  chosen_spanish: y alegría
  alternatives_spanish:
  - y regocijo
  - y contento
  - y gozo
  lexicon: LSJ
  rationale: εὐφροσύνη expresa alegría o buen ánimo. “Alegría” es la opción más natural en español y mantiene el sentido positivo paralelo a “banquete”.
- source_word: οὐ μέμνηται
  english_pob_choice: one remembers no
  chosen_spanish: no recuerda
  alternatives_spanish:
  - no se acuerda de
  - nadie recuerda
  - no tiene memoria de
  lexicon: BDAG
  rationale: El griego usa una forma singular genérica. En español, “no recuerda” comunica el valor impersonal de manera natural; el sujeto tácito se entiende por el contexto.
- source_word: πᾶσαν λύπην
  english_pob_choice: sorrow
  chosen_spanish: ni tristeza
  alternatives_spanish:
  - ni dolor
  - ni aflicción
  - ni pena
  lexicon: BDAG
  rationale: λύπη puede ser tristeza, pena o aflicción. “Tristeza” es un equivalente amplio y claro en español, y encaja bien con la cadencia de la frase.
- source_word: πᾶν ὀφείλημα
  english_pob_choice: debt
  chosen_spanish: ni deuda
  alternatives_spanish:
  - ni lo que se debe
  - ni obligación
  - ni adeudo
  lexicon: BDAG
  rationale: ὀφείλημα es literalmente una deuda o algo debido. “Deuda” conserva la concreción del término y su posible extensión a obligaciones, como señala la nota inglesa.
theological_decisions:
- issue: Tono proverbial sobre el efecto del vino sin sobrerreligiosizar el lenguaje
  english_pob_reading: Wine turns every mind to feasting and gladness, and one remembers no sorrow and no debt.
  chosen_spanish_reading: El vino convierte todo pensamiento en banquete y alegría, y no recuerda ni tristeza ni deuda.
  alternative_spanish_readings:
  - El vino vuelve toda mente a banquete y alegría, y no se acuerda de tristeza ni deuda.
  - El vino cambia todo pensamiento en fiesta y alegría, y no recuerda tristeza ni obligación.
  rationale: No hay aquí un término específicamente teológico; el verso formula una observación sapiencial o proverbial. La traducción conserva ese tono descriptivo sin añadir moralización ni suavizar la fuerza concreta de “deuda”.
  doctrine_reference: Sabiduría proverbial; sin afirmación doctrinal directa
translation_notes:
  revision_awareness: 'La redacción sigue de cerca el griego de Swete y coincide con la lectura auditada del POB en sus decisiones principales: διάνοια como un término de mente/pensamiento, μεταστρέφει como acción de giro/cambio, εὐωχία como banquete/feasting, εὐφροσύνη como alegría/gladness, y ὀφείλημα como deuda con posible extensión a obligaciones. Se mantiene la tensión entre una traducción más concreta (“banquete”, “deuda”) y el alcance más amplio que admite el griego.'
  spanish_consistency_notes:
  - Se usa “banquete” para εὐωχία y “alegría” para εὐφροσύνη, evitando la mezcla de registros con “merriment” o “revelry”.
  - Se opta por “deuda” en el cuerpo principal porque el término griego es literal; la nota recoge la alternativa semántica de obligación.
  - La frase impersonal “no recuerda” conserva el carácter gnómico del griego sin imponer un sujeto masculino explícito.
