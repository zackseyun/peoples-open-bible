lexical_decisions:
- source_word: יִשְׂמְחוּ
  english_pob_choice: Let the heavens rejoice
  chosen_spanish: Que se alegren
  alternatives_spanish:
  - Que regocijen
  - Que se regocijen
  - Que se goce
  lexicon: HALOT
  rationale: El imperfecto qal en esta secuencia poética tiene fuerza volitiva; en español, «Que se alegren» transmite bien la exhortación sin perder el tono litúrgico. Mantiene además el paralelo con la siguiente cola.
- source_word: הַשָּׁמַיִם
  english_pob_choice: the heavens
  chosen_spanish: los cielos
  alternatives_spanish:
  - los cielos
  - el cielo
  - los cielos
  lexicon: HALOT
  rationale: «Los cielos» conserva el plural hebreo y el registro elevado/cósmico mejor que «el cielo». En español bíblico actual es claro y natural.
- source_word: וְתָגֵל
  english_pob_choice: and let the earth be glad
  chosen_spanish: y que se goce
  alternatives_spanish:
  - y que se alegre
  - y exulte
  - y regocije
  lexicon: HALOT
  rationale: גיל expresa gozo/exultación; «que se goce» preserva una ligera variación respecto de «alegren» y mantiene el paralelismo poético sin volverlo repetitivo.
- source_word: הָאָרֶץ
  english_pob_choice: the earth
  chosen_spanish: la tierra
  alternatives_spanish:
  - la tierra
  - la tierra habitada
  - el mundo
  lexicon: HALOT
  rationale: En este contexto de alabanza cósmica, «la tierra» funciona como equivalente natural de «the earth» y mantiene la tríada cielo-tierra-mar.
- source_word: יִרְעַם
  english_pob_choice: let the sea thunder
  chosen_spanish: que retumbe
  alternatives_spanish:
  - que truene
  - que ruja
  - que resuene
  lexicon: HALOT
  rationale: רעם denota trueno o estruendo poderoso. «Retumbe» conserva el sentido sonoro y la intensidad poética; en español resulta más idiomático que un literal «truene» aplicado al mar.
- source_word: הַיָּם
  english_pob_choice: the sea
  chosen_spanish: el mar
  alternatives_spanish:
  - el mar
  - el océano
  lexicon: HALOT
  rationale: «Mar» es el equivalente estándar y natural para ים en este tipo de paralelismo poético.
- source_word: וּמְלֹאוֹ
  english_pob_choice: and all that fills it
  chosen_spanish: y cuanto lo llena
  alternatives_spanish:
  - y todo lo que contiene
  - y toda su plenitud
  - y todo lo que hay en él
  lexicon: HALOT
  rationale: La construcción idiomática significa literalmente «su plenitud». «Cuanto lo llena» conserva la idea de totalidad concreta y suena más vivo que una calca como «su plenitud», que en español puede sonar abstracta.
theological_decisions:
- issue: Fuerza volitiva de los imperfectos poéticos
  english_pob_reading: 'Render the sequence as exhortative: ''Let the heavens rejoice ... let the sea thunder.'''
  chosen_spanish_reading: 'Traducir la serie como exhortación: «Que se alegren... que se goce... que retumbe...»'
  alternative_spanish_readings:
  - Los cielos se alegrarán... la tierra se gozará... el mar retumbará...
  - Que los cielos se alegren... y la tierra se regocije...
  rationale: El hebreo emplea imperfectos en una secuencia de alabanza que funciona de modo volitivo/jussivo. La versión española debe preservar esa convocatoria a la creación, no solo un futuro descriptivo.
  doctrine_reference: Poética bíblica; equivalencia óptima; preservación del valor discursivo del original.
translation_notes:
  revision_awareness: El texto inglés auditado ofrece alta concordancia y no registra cambios recientes. La decisión principal en español fue mantener la fuerza exhortativa del hebreo y ajustar el tercer colon con un verbo idiomático español que conserve el estruendo del mar sin perder el paralelismo.
  spanish_consistency_notes:
  - Se mantiene la terminología cósmica («cielos», «tierra», «mar») coherente con el registro poético bíblico.
  - Se evita una traducción puramente futura, porque el contexto de alabanza convoca a la creación.
  - «Cuanto lo llena» conserva el valor de totalidad de וּמְלֹאוֹ sin convertirlo en una abstracción poco natural.
