base_translation:
  language: en
  yaml_path: translation/ot/jeremiah/003/016.yaml
  text: And it shall be[a], when you have multiplied and been fruitful in the land in those days, declares Yahweh, they will no longer say, ‘The ark of the covenant of Yahweh.’ It will not come to mind, and they will not remember it or miss it[b], nor will it be made again.
  footnotes:
  - marker: a
    text: Or, 'or attend to it,' 'or seek it out.' The Hebrew verb can carry several related senses; here it likely means they will no longer feel the need for the ark or note its absence.
    reason: lexical_alternative
  - marker: b
    text: Or, 'nor will another one be made.' The Hebrew is passive and leaves the object implicit; the sense is that no replacement ark will be constructed.
    reason: alternative_reading
