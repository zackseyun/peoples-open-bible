revisions:
- from: Noé[a], hombre de la tierra[b], comenzó a plantar una viña.
  to: Noé[a], hombre del suelo, comenzó[a] a plantar una viña.
  rationale: Se ajusta «de la tierra» a «del suelo» para reflejar mejor אֲדָמָה en este contexto agrícola y para alinearse más estrechamente con la decisión inglesa «of the soil». También se elimina la nota separada «comenzó y plantó una viña», porque la alternativa principal ya está suficientemente cubierta por la nota interpretativa y la versión española gana claridad evitando una segunda nota menos necesaria. El anclaje [a] se coloca en el verbo para que la nota corresponda directamente a la alternativa de lectura sobre וַיָּחֶל, manteniendo el nombre dentro de la misma frase señalada.
