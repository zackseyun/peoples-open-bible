translation:
  language: es
  text: Pero tú has desechado y rechazado; te has enfurecido con tu ungido[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «tu ungido» o «tu Mesías». Es la misma palabra que más tarde se traduce «Mesías», pero aquí se refiere inmediatamente al rey davídico bajo el pacto de Dios.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְ/אַתָּה
  english_pob_choice: But you
  chosen_spanish: Pero tú
  alternatives_spanish:
  - Y tú
  - Mas tú
  lexicon: HALOT
  rationale: La partícula + pronombre introduce un giro adversativo fuerte después de las afirmaciones anteriores; «Pero tú» conserva ese contraste de manera natural en español.
- source_word: זָנַחְתָּ
  english_pob_choice: have cast off
  chosen_spanish: has desechado
  alternatives_spanish:
  - has rechazado
  - has arrojado
  lexicon: HALOT
  rationale: זָנַח transmite la idea de apartar o descartar. «Desechado» conserva la fuerza de apartar/abandonar con un matiz algo más natural que un calco rígido.
- source_word: וַ/תִּמְאָ֑ס
  english_pob_choice: and rejected
  chosen_spanish: y rechazado
  alternatives_spanish:
  - y despreciado
  - y desdeñado
  lexicon: HALOT
  rationale: מָאַס añade la noción de rechazo con desdén. «Rechazado» mantiene la duplicación enfática del hebreo sin cargar el español con un arcaísmo innecesario.
- source_word: הִ֝תְעַבַּ֗רְתָּ
  english_pob_choice: have become enraged
  chosen_spanish: te has enojado
  alternatives_spanish:
  - te has enfurecido
  - has estallado en ira
  lexicon: HALOT
  rationale: El hitpael de עבר expresa un arrebato de ira o enojo intenso. «Te has enojado» comunica el sentido básico con claridad; la intensidad queda reforzada por el paralelismo y por la elección de «desechado / rechazado».
- source_word: עִם
  english_pob_choice: with
  chosen_spanish: con
  alternatives_spanish:
  - contra
  - hacia
  lexicon: HALOT
  rationale: La preposición es literalmente «con». En español, «enojarse con» es la construcción idiomática que mejor preserva la relación del hebreo sin forzar una preposición hostil más explícita.
- source_word: מְשִׁיחֶךָ
  english_pob_choice: your anointed one
  chosen_spanish: tu ungido
  alternatives_spanish:
  - tu Mesías
  - tu ungido rey
  lexicon: HALOT
  rationale: El término designa al ungido de Yahvé, aquí en referencia inmediata al rey davídico bajo pacto. «Ungido» conserva la carga lexical y la resonancia mesiánica sin resolverla prematuramente en el texto principal.
theological_decisions:
- issue: Referencia de מְשִׁיחֶךָ en un lamento real con resonancia mesiánica
  english_pob_reading: your anointed one
  chosen_spanish_reading: tu ungido
  alternative_spanish_readings:
  - tu Mesías
  rationale: En este versículo el referente inmediato es el rey davídico como el ungido de Yahvé. Traducir «tu ungido» mantiene esa referencia histórica y deja abierta la conexión lexical con «Mesías» para una nota, en lugar de imponer una identificación cristológica más explícita de la que exige el hebreo aquí.
  doctrine_reference: 'DOCTRINE.md: traducir títulos; transliterar nombres. Mantener la tensión teológica donde el texto la deja abierta.'
translation_notes:
  revision_awareness: La versión inglesa revisada sustituyó «furious» por «enraged» para un registro más formal y un ajuste más estrecho al hebreo. La redacción española sigue esa orientación con una forma verbal sobria («te has enojado») y conserva la referencia inmediata al ungido davídico mediante «tu ungido».
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como forma estándar del nombre divino en este proyecto, aunque en este versículo no aparezca directamente.
  - «Ungido» se prefiere aquí a «Mesías» en el cuerpo principal para respetar el referente inmediato del salmo; la nota preserva la relación lexical.
  - 'El paralelismo de los dos verbos de rechazo se conserva con dos participios coordinados: «has desechado y rechazado».'
