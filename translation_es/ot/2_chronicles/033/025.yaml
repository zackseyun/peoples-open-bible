    text: 'O: «todos los conspiradores».'
    reason: lexical_alternative
  - marker: b
    text: «El pueblo de la tierra» es una expresión hebrea que puede designar a la población del país, quizá con matices socio-políticos.
    reason: cultural_note
  revision_rationale: Se reemplaza «hirió» por «dio muerte a» para reflejar mejor la fuerza narrativa de וַיַּכּוּ en este contexto. Se conserva «el pueblo de la tierra» por fidelidad léxica y la nota cultural. Se ajusta el segundo verbo a una formulación más idiomática con sujeto colectivo repetido; idealmente, toda la cláusula puede también reestructurarse como «y el pueblo de la tierra hizo rey a Josías, su hijo, en su lugar», pero el cambio principal necesario es el del primer verbo.
