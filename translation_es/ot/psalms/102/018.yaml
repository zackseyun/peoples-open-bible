translation:
  language: es
  text: Se volvió hacia la oración del desamparado[a] y no despreció la oración de ellos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «del indigente», «del desvalido»; el hebreo עַרְעָר puede denotar en otros contextos un arbusto del desierto, imagen que probablemente subyace a la idea de alguien despojado o aislado, pero aquí el sentido es humano.
    reason: lexical_alternative
lexical_decisions:
- source_word: פָּנָה
  english_pob_choice: turned to
  chosen_spanish: volvió su mirada a
  alternatives_spanish:
  - se volvió hacia
  - atendió a
  - miró hacia
  lexicon: HALOT
  rationale: El hebreo expresa un giro concreto de dirección hacia el objeto. En español, «volvió su mirada a» conserva la imagen de orientación atenta sin sonar rígido. Mantiene el valor de respuesta compasiva que la POB inglesa quiso preservar con «turned to».
- source_word: תְּפִלַּת
  english_pob_choice: the prayer of
  chosen_spanish: la oración del
  alternatives_spanish:
  - la plegaria del
  - la súplica del
  lexicon: HALOT
  rationale: «Oración» es el equivalente más natural y fiel para el sustantivo en este contexto, y permite conservar la repetición del mismo lexema más adelante en el versículo.
- source_word: הָעַרְעָר
  english_pob_choice: the destitute
  chosen_spanish: el desamparado
  alternatives_spanish:
  - el indigente
  - el pobre
  - el desvalido
  lexicon: HALOT
  rationale: La POB inglesa opta por un referente humano, no por la imagen literal del arbusto. «Desamparado» comunica bien la condición de abandono, aislamiento y despojo sugerida por el término, sin perder el matiz de vulnerabilidad humana.
- source_word: בָזָה
  english_pob_choice: despise
  chosen_spanish: despreció
  alternatives_spanish:
  - menospreció
  - desoyó
  - tuvo en poco
  lexicon: HALOT
  rationale: «Despreció» reproduce la fuerza evaluativa y emocional de בזה con buena naturalidad en español. «Desoyó» sería demasiado interpretativo y desplazaría el sentido hacia la escucha más que hacia el desdén.
- source_word: תְּפִלָּתָם
  english_pob_choice: their prayer
  chosen_spanish: su oración
  alternatives_spanish:
  - su plegaria
  - la oración de ellos
  lexicon: HALOT
  rationale: Aunque el sufijo hebreo es plural, en español la posesión puede expresarse naturalmente con «su» sin forzar una pluralidad extraña. Se conserva la repetición de «oración», como en la POB inglesa, para reflejar el paralelismo del verso.
theological_decisions:
- issue: Sentido humano de הָעַרְעָר
  english_pob_reading: humanly destitute persons
  chosen_spanish_reading: persona desamparada / condición humana de abandono
  alternative_spanish_readings:
  - un arbusto del desierto
  - el solitario
  - el indigente
  rationale: El paralelismo con la oración y la cláusula final muestra que el referente es humano o personificado, no botánico. Por eso la traducción principal evita la imagen literal del arbusto y expresa la condición humana de abandono, siguiendo la lectura auditada de la POB inglesa.
  doctrine_reference: Salmo 102:17-18; paralelismo poético hebreo
translation_notes:
  revision_awareness: La revisión más reciente del testigo inglés quedó sin cambios y con acuerdo alto; por eso se mantuvo la decisión de leer הָעַרְעָר como referencia humana y de repetir el sustantivo «oración» para conservar el paralelismo del hebreo.
  spanish_consistency_notes:
  - Se emplea «Yahvé» en lugar de SEÑOR cuando aparezca el nombre divino; en este versículo no aparece.
  - Se mantiene un español bíblico moderno y sobrio, evitando arcaísmos innecesarios.
  - Se conservó la repetición de «oración» para reflejar la estructura del versículo y no diluir el paralelismo.
