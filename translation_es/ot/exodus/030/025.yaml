translation:
  language: es
  text: Y lo harás un aceite de santa unción, un perfume compuesto[a], obra de perfumista; será un aceite de santa unción.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «un ungüento compuesto» o «un perfume mezclado»; el hebreo enfatiza una preparación aromática expertamente compuesta.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְעָשִׂיתָ
  english_pob_choice: And you shall make
  chosen_spanish: Y harás
  alternatives_spanish:
  - Y tú harás
  - Y debes hacer
  lexicon: HALOT
  rationale: La forma hebrea en contexto instructivo tiene fuerza de mandato. En español, «harás» conserva el valor directivo sin sonar forzado, y evita una perífrasis más pesada.
- source_word: אֹתוֹ
  english_pob_choice: it
  chosen_spanish: de ello
  alternatives_spanish:
  - de esto
  - de él
  lexicon: HALOT
  rationale: El pronombre retoma la preparación aromática descrita en el contexto inmediato. «De ello» mantiene la referencia sin introducir un sustantivo no explicitado en este verso.
- source_word: שֶׁמֶן מִשְׁחַת קֹדֶשׁ
  english_pob_choice: a holy anointing oil
  chosen_spanish: un aceite de santa unción
  alternatives_spanish:
  - un aceite santo de unción
  - un aceite para santa unción
  lexicon: HALOT
  rationale: La cadena constructa expresa aceite destinado a la unción sagrada. «Santa unción» conserva el matiz consagratorio y el vínculo con la unción, con un giro natural en español bíblico actual.
- source_word: רֹקַח
  english_pob_choice: a perfume blended
  chosen_spanish: una mezcla aromática
  alternatives_spanish:
  - un perfume compuesto
  - una composición aromática
  lexicon: HALOT
  rationale: El sustantivo señala una preparación aromática mezclada. «Mezcla aromática» comunica el carácter compuesto y fragante sin volver al calco rígido de «perfume mezclado».
- source_word: מִרְקַחַת
  english_pob_choice: blend
  chosen_spanish: mezcla
  alternatives_spanish:
  - compuesto
  - composición
  lexicon: HALOT
  rationale: El cognado intensifica la idea de mezclar o componer. «Mezcla» reproduce bien la repetición y el énfasis artesanal del hebreo.
- source_word: מַעֲשֵׂה רֹקֵחַ
  english_pob_choice: the work of a perfumer
  chosen_spanish: obra de un perfumista
  alternatives_spanish:
  - trabajo de un perfumista
  - obra de un mezclador de aromas
  lexicon: HALOT
  rationale: «Perfumista» transmite el oficio experto de preparar sustancias aromáticas. «Obra» refleja mejor מַעֲשֵׂה que «trabajo» en un registro bíblico digno y fluido.
- source_word: יִהְיֶה
  english_pob_choice: it shall be
  chosen_spanish: será
  alternatives_spanish:
  - ha de ser
  - quedará siendo
  lexicon: HALOT
  rationale: El imperfecto aquí expresa el estado resultante de la preparación. «Será» conserva la simplicidad del hebreo y la reiteración final del verso.
theological_decisions:
- issue: Repetición de «aceite de santa unción» al inicio y al final del verso
  english_pob_reading: it shall be a holy anointing oil
  chosen_spanish_reading: será aceite de santa unción
  alternative_spanish_readings:
  - será un aceite de santa unción
  - será el mismo aceite de santa unción
  rationale: El hebreo repite la denominación para enfatizar la identidad sagrada del preparado. Mantener la repetición evita suavizar ese énfasis y respeta la estructura del verso.
  doctrine_reference: Consagración ritual del tabernáculo; cf. Ex 30:25-30
- issue: Rendición de רֹקַח / מִרְקַחַת
  english_pob_reading: a perfume blended by the work of a perfumer
  chosen_spanish_reading: una mezcla aromática, obra de un perfumista
  alternative_spanish_readings:
  - un perfume compuesto, obra de un perfumista
  - una composición aromática hecha por un perfumista
  rationale: El hebreo subraya una preparación aromática compuesta con habilidad técnica. «Mezcla aromática» y «obra de un perfumista» preservan tanto el producto como el oficio sin imponer una lectura doctrinal adicional.
  doctrine_reference: Lexicografía de preparaciones aromáticas sagradas; cf. Ex 30:22-25
translation_notes:
  revision_awareness: 'La redacción sigue de cerca el texto hebreo: mantiene el mandato, la referencia pronominal al preparado inmediato y la repetición enfática de la designación sagrada. Se tomó en cuenta la revisión inglesa que eliminó «into» y reforzó el lenguaje de mezcla/perfumería, por lo que en español se prefirió una construcción directa y la dupla «mezcla aromática / obra de un perfumista».'
  spanish_consistency_notes:
  - Se usa «Yahvé» no corresponde en este versículo porque no aparece el Tetragrámaton.
  - Se mantiene «santa unción» de manera consistente para la expresión constructa שמן משחת קדש.
  - «Perfumista» se elige por claridad contemporánea; no se usa «ungüentario» por ser menos transparente para lectores actuales.
