translation:
  language: es
  text: Moisés habló estas palabras a todos los hijos de Israel[a], y el pueblo hizo gran duelo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «a todos los israelitas».
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְדַבֵּר
  english_pob_choice: spoke
  chosen_spanish: habló
  alternatives_spanish:
  - dijo
  - pronunció
  lexicon: HALOT
  rationale: El piel wayyiqtol de דבר introduce el acto de comunicar. «Habló» es natural en español y conserva el valor verbal sin añadir matiz interpretativo como «declaró».
- source_word: הַדְּבָרִים הָאֵלֶּה
  english_pob_choice: these words
  chosen_spanish: estas palabras
  alternatives_spanish:
  - estas cosas
  - este mensaje
  lexicon: HALOT
  rationale: דְּבָרִים puede ser «palabras», «asuntos» o «cosas». Aquí Moisés transmite el pronunciamiento previo; «estas palabras» preserva el sentido verbal y la cercanía al hebreo.
- source_word: אֶל כָּל בְּנֵי יִשְׂרָאֵל
  english_pob_choice: to all the sons of Israel
  chosen_spanish: a todos los hijos de Israel
  alternatives_spanish:
  - a todos los israelitas
  - a todos los hijos de Jacob
  lexicon: HALOT
  rationale: בְּנֵי יִשְׂרָאֵל es un etnónimo pactual estándar. «Hijos de Israel» mantiene la forma hebrea con claridad en español y conserva la referencia colectiva tradicional sin neutralizar el término.
- source_word: וַיִּתְאַבְּלוּ
  english_pob_choice: mourned
  chosen_spanish: se enlutó
  alternatives_spanish:
  - lloró
  - estuvo de duelo
  lexicon: HALOT
  rationale: El hitpael de אבל expresa entrar en luto. «Se enlutó» comunica bien la respuesta de duelo comunitario; en este contexto el sujeto colectivo «el pueblo» permite el singular distributivo natural en español.
- source_word: הָעָם
  english_pob_choice: the people
  chosen_spanish: el pueblo
  alternatives_spanish:
  - la gente
  - la nación
  lexicon: HALOT
  rationale: עָם designa al colectivo. «El pueblo» es la equivalencia natural y digna en español bíblico contemporáneo.
- source_word: מְאֹד
  english_pob_choice: greatly
  chosen_spanish: mucho
  alternatives_spanish:
  - grandemente
  - en gran manera
  lexicon: HALOT
  rationale: מְאֹד intensifica el luto. «Mucho» suena natural con «se enlutó» y conserva la intensidad sin elevar el registro de forma innecesaria.
theological_decisions:
- issue: Alcance colectivo de בְּנֵי יִשְׂרָאֵל
  english_pob_reading: to all the sons of Israel
  chosen_spanish_reading: a todos los hijos de Israel
  alternative_spanish_readings:
  - a todos los israelitas
  - a todos los hijos de Israel (tradicional)
  rationale: 'No hay un problema doctrinal, pero sí una decisión de forma: mantener el etnónimo pactual como en hebreo. «Hijos de Israel» conserva la referencia comunitaria y evita aplanar el término en una denominación más genérica.'
  doctrine_reference: Terminología pactual / etnónimo de Israel
translation_notes:
  revision_awareness: El texto hebreo y el audit trail inglés están en alto acuerdo y no muestran revisiones sustantivas. La versión española sigue el mismo contenido sin introducir ampliaciones interpretativas.
  spanish_consistency_notes:
  - He mantenido «Yahvé» fuera del versículo porque no aparece en este segmento.
  - Elegí «hijos de Israel» para preservar el eco hebreo del etnónimo, coherente con el estilo auditado del proyecto.
  - «Se enlutó mucho» reproduce la intensidad de מְאֹד y mantiene un español bíblico natural.
