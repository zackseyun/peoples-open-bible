translation:
  language: es
  text: y quisiste destruir por mano de nuestros padres a progenitores que asesinaron vidas indefensas[a],
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O ‘progenitores, asesinos de vidas, almas o personas indefensas’. El griego ψυχῶν puede verterse ‘vidas’, ‘almas’ o ‘personas’; aquí el sentido parece concreto, referido a víctimas vulnerables.
    reason: lexical_alternative
lexical_decisions:
- source_word: αὐθέντας
  english_pob_choice: who murdered / who killed
  chosen_spanish: que mataron
  alternatives_spanish:
  - asesinos de
  - homicidas de
  - que asesinaron
  lexicon: LSJ
  rationale: El término griego señala a los responsables directos de una muerte violenta; en español, 'que mataron' comunica con claridad la acción culpable sin introducir un sustantivo más técnico que el texto no exige.
- source_word: γονεῖς
  english_pob_choice: parents
  chosen_spanish: padres
  alternatives_spanish:
  - progenitores
  - padres y madres
  - ascendientes
  lexicon: LSJ
  rationale: En este contexto 'padres' reproduce de manera natural el valor familiar e histórico del término, y concuerda con la frase fijada 'nuestros padres' en la misma cláusula.
- source_word: ψυχῶν
  english_pob_choice: lives
  chosen_spanish: vidas
  alternatives_spanish:
  - almas
  - personas
  lexicon: LSJ
  rationale: Como en la nota inglesa, ψυχή aquí apunta a seres vivientes víctimas de muerte violenta. 'Vidas' mantiene el sentido concreto y evita una lectura filosófica de 'almas'.
- source_word: ἀβοηθήτων
  english_pob_choice: helpless
  chosen_spanish: indefensas
  alternatives_spanish:
  - sin ayuda
  - desamparadas
  - sin defensa
  lexicon: LSJ
  rationale: '''Indefensas'' expresa bien la falta de auxilio o protección y conserva el matiz compasivo del adjetivo griego en español natural.'
- source_word: ἐβουλήθης
  english_pob_choice: you intended
  chosen_spanish: quisiste
  alternatives_spanish:
  - te propusiste
  - intentaste
  - resolviste
  lexicon: LSJ
  rationale: El verbo indica una decisión deliberada. 'Quisiste' es una forma idiomática y reverente en español bíblico para expresar propósito divino sin rigidez excesiva.
- source_word: ἀπολέσαι
  english_pob_choice: to destroy
  chosen_spanish: destruir
  alternatives_spanish:
  - arruinar
  - aniquilar
  - hacer perecer
  lexicon: LSJ
  rationale: '''Destruir'' conserva la amplitud del verbo griego y funciona bien en un contexto de juicio. ''Aniquilar'' sería más fuerte de lo que la cláusula obliga.'
- source_word: διὰ χειρῶν πατέρων ἡμῶν
  english_pob_choice: by the hands of our fathers
  chosen_spanish: por mano de nuestros padres
  alternatives_spanish:
  - por las manos de nuestros padres
  - mediante nuestros padres
  - a manos de nuestros padres
  lexicon: LSJ
  rationale: '''Por mano de'' conserva el instrumental idiomático y suena más natural en español que una repetición literal del plural ''las manos'', manteniendo además la imagen vívida del agente humano.'
theological_decisions:
- issue: Referencia de ψυχῶν ἀβοηθήτων
  english_pob_reading: helpless lives
  chosen_spanish_reading: vidas indefensas
  alternative_spanish_readings:
  - almas indefensas
  - personas indefensas
  rationale: La POB inglesa evita 'souls' para no cargar el texto con una dicotomía alma/cuerpo que el pasaje no requiere. 'Vidas indefensas' mantiene el foco en víctimas concretas de violencia.
  doctrine_reference: Primacía del sentido original; evitar sobrelecturas doctrinales no exigidas por el griego.
translation_notes:
  revision_awareness: La versión inglesa revisada ajustó el orden para una fluidez más natural y reforzó el matiz de culpabilidad de αὐθέντας con 'murdered'. La traducción española refleja ese mismo peso semántico con una construcción natural ('que mataron') y conserva el instrumental 'por mano de'.
  spanish_consistency_notes:
  - Se usa 'padres' para γονεῖς siguiendo el valor inclusivo del griego, aunque en español 'padres' puede sonar masculino; el contexto histórico y la coordinación con 'nuestros padres' lo hacen claro.
  - Se prefirió 'vidas' para ψυχῶν en coherencia con la decisión inglesa de evitar 'almas' donde el énfasis es la vida concreta de las víctimas.
  - El orden español antepone 'a los padres' para mantener claridad sintáctica sin perder la relación instrumental con 'por mano de nuestros padres'.
