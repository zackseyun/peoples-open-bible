  text: ὁ δʼ οὐδαμῶς τῆς ἀγερωχίας ἔληγεν, ἔτι δὲ καὶ τῆς ὑπερηφανίας ἐπεπλήρωτο, πῦρ πνέων τοῖς θυμοῖς ἐπὶ τοὺς Ἰουδαίους, καὶ κελεύων ἐποξύνειν τὴν πορίαν. συνέβη δὲ καὶ πεσεῖν αὐτὸν ἀπὸ τοῦ ἅρματος φερομένου ῥοίζῳ, καὶ δυσχερεῖ πτώματι περιπεσόντα πάντα τὰ μέλη τοῦ σώματος ἀποσφύζειν.
