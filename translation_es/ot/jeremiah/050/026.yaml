  to: Vengan contra ella desde el extremo[a]; abran sus bodegas[b]; amontónenla como montones, y dedíquenla a la destrucción[c]; que no le quede remanente.
  rationale: Se corrige el verbo correspondiente a סָלּוּהָ para reflejar fielmente el hebreo ‘amontonar/apilar’ y la traducción inglesa auditada ‘pile her up’. El resto del verso puede mantenerse, pues comunica bien el sentido militar y judicial del original en un español claro y eclesialmente legible.
