    rationale: En español, 'sea aceptado por vosotros' normalmente significa que ustedes son quienes lo aceptan. El hebreo y la auditoría inglesa apuntan a aceptación delante de Yahvé/en favor de los adoradores, no a aceptación ejercida por ellos.
  - severity: medium
    issue: La nota al pie conserva una alternativa válida, pero el texto de la nota empieza con comilla y formato torpe
    rationale: 'Conviene normalizar la nota en español: ''O, «para que seáis aceptados»...'' para legibilidad y consistencia editorial.'
  revised_spanish_text: Y mecerá la gavilla ante Yahvé, para vuestra aceptación[a]; al día siguiente del sábado la mecerá el sacerdote.
