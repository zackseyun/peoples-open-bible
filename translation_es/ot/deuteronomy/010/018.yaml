translation:
  language: es
  text: Él hace justicia al huérfano y a la viuda[a], y ama al extranjero residente[b], dándole pan[c] y ropa.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «el huérfano de padre». Hebreo יָתוֹם se refiere a quien ha quedado sin padre; «huérfano» expresa de manera natural en español esta categoría social y legal.
    reason: lexical_alternative
  - marker: b
    text: O «el residente extranjero» o «el forastero residente». Hebreo גֵּר designa a un no nativo que vive entre Israel, no meramente a un extraño pasajero.
    reason: lexical_alternative
  - marker: c
    text: Lit. «pan». En esta pareja, «pan y ropa» expresa la provisión básica de sustento y vestido.
    reason: lexical_alternative
lexical_decisions:
- source_word: עֹשֶׂה
  english_pob_choice: executes
  chosen_spanish: hace
  alternatives_spanish:
  - ejecuta
  - realiza
  - administra
  lexicon: HALOT
  rationale: En español, con מִשְׁפָּט como objeto, «hace justicia» conserva bien el valor idiomático y evita una rigidez poco natural. «Ejecuta» sería más forense, pero en español puede sonar más técnico que el hebreo aquí.
- source_word: מִשְׁפַּט
  english_pob_choice: justice
  chosen_spanish: justicia
  alternatives_spanish:
  - juicio
  - sentencia
  - derecho
  lexicon: HALOT
  rationale: Aquí el término apunta a la justicia debida a personas vulnerables, no simplemente a un veredicto. «Justicia» comunica mejor el alcance ético-jurídico del pasaje.
- source_word: יָתוֹם
  english_pob_choice: the fatherless
  chosen_spanish: el huérfano
  alternatives_spanish:
  - el padreless
  - el huérfano de padre
  lexicon: HALOT
  rationale: En español, «huérfano» es la forma natural y reconocible. Aunque el matiz literal es «privado de padre», el término transmite la categoría social vulnerable sin torpeza estilística; se mantiene la nota para la precisión semántica.
- source_word: אַלְמָנָה
  english_pob_choice: the widow
  chosen_spanish: la viuda
  alternatives_spanish:
  - la mujer viuda
  lexicon: HALOT
  rationale: Es la correspondencia directa y estable para la categoría social del texto.
- source_word: גֵּר
  english_pob_choice: the sojourner
  chosen_spanish: el extranjero residente
  alternatives_spanish:
  - el forastero residente
  - el inmigrante residente
  - el extranjero
  lexicon: HALOT
  rationale: '«Extranjero residente» intenta conservar el matiz legal-covenantal del גֵּר: no es un transeúnte, sino alguien no nativo que vive entre Israel. Se evita «forastero» por su posible ambigüedad y «extranjero» a secas por ser demasiado amplio.'
- source_word: לָתֶת לוֹ
  english_pob_choice: giving him
  chosen_spanish: dándole
  alternatives_spanish:
  - para darle
  - al darle
  - dando a él
  lexicon: HALOT
  rationale: El infinitivo expresa el modo concreto en que se muestra el amor. «Dándole» conserva el flujo verbal y la relación de medio sin añadir palabras innecesarias.
- source_word: לֶחֶם
  english_pob_choice: food
  chosen_spanish: pan
  alternatives_spanish:
  - alimento
  - comida
  lexicon: HALOT
  rationale: Literalmente es «pan». Aquí el binomio con «vestido» permite mantener la imagen concreta de provisión básica. A diferencia del inglés POB, en español «pan» no resulta excesivamente estrecho en esta fórmula proverbial/legal.
- source_word: שִׂמְלָה
  english_pob_choice: clothing
  chosen_spanish: vestido
  alternatives_spanish:
  - ropa
  - vestidura
  - clothing
  lexicon: HALOT
  rationale: «Vestido» conserva la idea de prenda/ropa de manera suficientemente concreta y evita la abstracción de «ropa» si se busca un paralelo más compacto con «pan». En un registro bíblico español, también puede entenderse como vestido/prenda necesaria.
theological_decisions:
- issue: Acción divina concreta hacia grupos vulnerables
  english_pob_reading: Render the verse as describing God's concrete acts of justice and provision for socially vulnerable persons without importing broader doctrinal claims.
  chosen_spanish_reading: Presentar a Dios como quien hace justicia y provee materialmente a personas vulnerables, sin reducir el texto solo a compasión emocional ni solo a defensa legal.
  alternative_spanish_readings:
  - Enfatizar únicamente la defensa jurídica
  - Enfatizar únicamente la misericordia afectiva
  rationale: 'El hebreo sostiene ambas dimensiones: acción judicial («hace justicia») y amor efectivo expresado en provisión material. La redacción española preserva esa tensión sin resolverla artificialmente.'
  doctrine_reference: 'Translation philosophy §3: Preservar la tensión teológica en vez de resolverla.'
translation_notes:
  revision_awareness: El texto sigue de cerca el último pase de revisión, que fue marcado como sin cambios y con alto grado de acuerdo; no se incorporaron revisiones adicionales.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como término predeterminado del proyecto para el nombre divino cuando aparezca, aunque este versículo no lo contiene explícitamente.
  - Se usa «huérfano» por naturalidad española, con nota para preservar el matiz social-jurídico de יָתוֹם.
  - Se evita «SEÑOR» como sustituto del nombre divino, coherente con la política del proyecto, aunque aquí no aplica directamente.
  - 'Se conserva la estructura binaria del versículo: justicia a vulnerables + amor expresado en provisión material.'
