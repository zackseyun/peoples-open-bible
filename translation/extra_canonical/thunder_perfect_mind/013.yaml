lexical_decisions:
- source_word: ⲧϣⲉⲗⲉⲉⲧ
  chosen: midwife
  alternatives:
  - birth-helper
  - deliverer (of children)
  lexicon: Crum, Coptic Dictionary; CDO (Coptic Dictionary Online)
  rationale: Standard Sahidic term for a midwife; fits the obstetric paradoxes common
    in this section.
- source_word: ⲧⲙⲁⲁⲩ
  chosen: the mother
  alternatives:
  - she who bears (a child)
  - the one who gives birth
  lexicon: Crum; CDO
  rationale: Common noun for ‘mother’; while some English traditions render this pair
    as ‘midwife and she who bears not,’ the Coptic here reads ‘mother,’ which preserves
    a clear paradox with ‘midwife.’
- source_word: ⲧⲥⲱⲛⲉ
  chosen: the virgin
  alternatives:
  - the maiden
  lexicon: Crum; CDO
  rationale: In Nag Hammadi Sahidic, ⲥⲱⲛⲉ regularly denotes a virgin/maiden; pairing
    with ⲥϩⲓⲙⲉ (woman) yields the expected paradox of virgin vs. non-virgin woman.
- source_word: ⲧⲥϩⲓⲙⲉ
  chosen: the woman
  alternatives:
  - the wife
  lexicon: Crum; CDO
  rationale: Generic term for adult female; ‘woman’ preserves the broader, paradoxical
    contrast with ‘virgin.’
- source_word: ⲧⲉ … ⲁⲛⲟⲕ (cleft construction)
  chosen: I am the …
  alternatives:
  - It is the … that I am
  lexicon: Layton, Coptic Grammar (usage); Crum (syntax examples)
  rationale: The Coptic cleft ‘ⲧⲉ … ⲁⲛⲟⲕ’ functions as a focused identification; English
    ‘I am the …’ preserves cadence and voice.
- source_word: ⲧⲙⲁⲁⲩ ⲛⲧⲉ ⲡⲁⲉⲓⲱⲧ
  chosen: the mother of my father
  alternatives: []
  lexicon: Crum; CDO
  rationale: Straightforward genitival construction; preserves the striking familial
    paradox.
- source_word: ⲧⲥⲱⲛⲉ ⲙⲡⲁ—
  chosen: the virgin of my—
  alternatives:
  - the maiden of my—
  lexicon: Crum; CDO
  rationale: The line breaks off after ⲙⲡⲁ (‘of my …’). We render what is present
    and mark the lacuna without inventing a completion.
