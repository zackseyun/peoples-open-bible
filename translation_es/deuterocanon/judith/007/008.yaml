translation:
  language: es
  text: 'Y todos los gobernantes de los hijos de Esaú[a], y todos los dirigentes del pueblo de Moab, y los generales de la costa[b], vinieron a él y dijeron:'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «los edomitas» para «los hijos de Esaú», un equivalente étnico implícito en la expresión griega.
    reason: lexical_alternative
  - marker: b
    text: O «la región costera» para «la costa».
    reason: lexical_alternative
lexical_decisions:
- source_word: προσελθόντες
  english_pob_choice: came to him
  chosen_spanish: vinieron a él
  alternatives_spanish:
  - se acercaron a él
  - fueron a él
  lexicon: BDAG
  rationale: El participio aoristo introduce la acción principal de acercamiento antes del verbo de habla. «Vinieron a él» conserva el movimiento hacia la persona aludida con español natural y sin volver la frase demasiado pesada.
- source_word: ἄρχοντες
  english_pob_choice: rulers
  chosen_spanish: gobernantes
  alternatives_spanish:
  - jefes
  - príncipes
  - líderes
  lexicon: BDAG
  rationale: ἄρχοντες expresa autoridad política o de mando. «Gobernantes» comunica esa autoridad con mayor naturalidad en español y mantiene la distinción respecto de ἡγούμενοι, traducido luego como «dirigentes».
- source_word: υἱῶν Ἠσαῦ
  english_pob_choice: the sons of Esau
  chosen_spanish: los hijos de Esaú
  alternatives_spanish:
  - los edomitas
  lexicon: BDAG
  rationale: Se conserva la expresión literal del griego. Aunque «edomitas» es un equivalente étnico implícito, la forma fuente «hijos de Esaú» mantiene la transparencia textual que la POB inglesa preservó.
- source_word: ἡγούμενοι
  english_pob_choice: leaders
  chosen_spanish: dirigentes
  alternatives_spanish:
  - líderes
  - gobernadores
  - jefes
  lexicon: BDAG
  rationale: El término se solapa con autoridad pero no es idéntico a ἄρχοντες. «Dirigentes» suena natural en español y conserva la diferencia de matiz con «gobernantes».
- source_word: λαοῦ Μωὰβ
  english_pob_choice: the people of Moab
  chosen_spanish: el pueblo de Moab
  alternatives_spanish:
  - Moab
  - el pueblo moabita
  lexicon: BDAG
  rationale: La construcción genitiva se refleja de forma directa. «El pueblo de Moab» mantiene la referencia completa sin comprimirla innecesariamente.
- source_word: στρατηγοὶ
  english_pob_choice: generals
  chosen_spanish: generales
  alternatives_spanish:
  - comandantes
  - jefes militares
  lexicon: BDAG
  rationale: En contexto bélico, στρατηγοί son oficiales militares. «Generales» es conciso, formal y fiel al valor jerárquico del término.
- source_word: παραλίας
  english_pob_choice: the seacoast
  chosen_spanish: la costa
  alternatives_spanish:
  - la región costera
  - la ribera
  - la zona costera
  lexicon: LSJ
  rationale: παραλία designa una región junto al mar. «La costa» es la opción más natural y breve en español; la alternativa inglesa «coastal region» queda implícita sin perder el sentido geográfico.
- source_word: εἶπαν
  english_pob_choice: said
  chosen_spanish: dijeron
  alternatives_spanish:
  - hablaron
  - pronunciaron
  lexicon: BDAG
  rationale: Verbo narrativo estándar para introducir discurso directo; «dijeron» es la equivalencia normal en español y no requiere matiz adicional.
theological_decisions:
- issue: Referencia étnica de «hijos de Esaú»
  english_pob_reading: Literal 'the sons of Esau' with a footnoted ethnic equivalent 'the Edomites'
  chosen_spanish_reading: Se mantiene «los hijos de Esaú» y se anota como alternativa «los edomitas»
  alternative_spanish_readings:
  - «los edomitas» en el texto principal
  rationale: La lectura principal conserva la forma fuente del griego. La nota permite el equivalente étnico implícito sin sustituir el texto transparente por una interpretación tradicional.
  doctrine_reference: Transparencia textual / equivalencia étnica implícita
- issue: Geografía de παραλία
  english_pob_reading: '''the seacoast'' with footnote ''Or the coastal region'''
  chosen_spanish_reading: Se traduce «la costa» y se conserva una nota con «región costera» como alternativa
  alternative_spanish_readings:
  - «la región costera»
  - «la costa marítima»
  rationale: El término griego refiere a una zona litoral. «La costa» comunica el referente de forma natural; la nota preserva la posibilidad de un alcance geográfico más amplio sin forzar el texto.
  doctrine_reference: Geografía bíblica / precisión léxica
translation_notes:
  revision_awareness: 'El análisis auditado indica alta concordancia y no requiere cambios respecto del sentido base: el griego presenta un sujeto plural compuesto que llega y habla, con distinciones léxicas entre autoridades, dirigentes y oficiales militares preservadas en español. No hay revisiones aplicadas en el paquete fuente.'
  spanish_consistency_notes:
  - Se evita «SEÑOR» y cualquier sustitución teológica no presente en el texto.
  - Se mantiene la distinción entre «gobernantes» y «dirigentes» para reflejar dos términos griegos distintos.
  - «Hijos de Esaú» se conserva literalmente para respetar la transparencia del fuente; la equivalencia étnica queda en nota.
  - «La costa» se usa como traducción breve y natural de παραλία, sin perder el matiz litoral.
