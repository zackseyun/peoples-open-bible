review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien la estructura temporal, la confesión continua de desobediencia y la referencia a la voz de Dios. Sin embargo, no sigue la preferencia terminológica del proyecto para κύριος/YHWH en el texto principal: aquí debe usarse «Yahvé», y no «el Señor», incluso en contexto griego, salvo razón documentada de excepción que aquí no supera la directriz global. Además, «hemos sido obstinados en no escuchar» es entendible, pero en español suena algo rígido; una formulación más natural conserva mejor la fuerza confesional.'
  spanish_quality_summary: El español es claro y digno, pero «el Señor» choca con la terminología por defecto del proyecto y «hemos sido obstinados en no escuchar» resulta menos idiomático que «nos hemos obstinado en no escuchar». También conviene ajustar la nota para que la alternativa española suene natural y para anclarla en la expresión discutida, no en «este día».
  glossary_alignment: Alinear κύριος con «Yahvé» en ambas apariciones del versículo. Mantener «nuestros padres», «la tierra de Egipto», «hemos sido desobedientes» y «su voz». Para ἐσχεδιάζομεν, «nos hemos obstinado» preserva mejor la idea de resistencia voluntaria en español; la nota puede mantener la alternativa de negligencia/cuidado insuficiente.
  issues:
  - severity: high
    issue: Uso de «el Señor» en lugar de «Yahvé»
    rationale: Las instrucciones del proyecto establecen como default «Yahvé» para יהוה / YHWH en el texto principal, y piden explicar excepciones. El borrador justifica «el Señor» por tratarse de griego κύριος, pero esa justificación contradice la directriz base y no parece una excepción necesaria en este caso, donde el referente es claramente el Dios de Israel en marco éxodo-pactual.
  - severity: medium
    issue: Anclaje de la nota [a] en «hasta este día»
    rationale: La nota trata sobre ἐσχεδιάζομεν y la alternativa de «descuido/negligencia», no sobre la expresión temporal «hasta este día». Debe colocarse junto a la frase española correspondiente.
  - severity: medium
    issue: «hemos sido obstinados en no escuchar» suena poco idiomático
    rationale: 'Aunque fiel en sentido general, en español es más natural expresar esa conducta verbalmente: «nos hemos obstinado en no escuchar». Esto preserva la fuerza de resistencia voluntaria y mejora la fluidez.'
  - severity: low
    issue: Redacción de la nota alternativa mejorable
    rationale: «hemos sido descuidados en no escuchar» no es la alternativa más natural en español. «Hemos actuado con descuido al no escuchar su voz» comunica mejor el matiz léxico alternativo documentado.
