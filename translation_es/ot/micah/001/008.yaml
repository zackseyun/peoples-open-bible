translation:
  language: es
  text: A causa de esto me lamentaré y gemiré; iré despojado[a] y desnudo. Haré un lamento como los chacales, y duelo como las hijas del avestruz[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «iré descalzo y desnudo». El término hebreo traducido «despojado» es difícil y puede aludir a ir descalzo como señal de duelo y humillación.'
    reason: lexical_alternative
  - marker: b
    text: Lit. «como las hijas del avestruz», expresión poética hebrea para avestruces o hembras de avestruz.
    reason: lexical_alternative
lexical_decisions:
- source_word: אֶסְפְּדָה
  english_pob_choice: I will lament
  chosen_spanish: me lamentaré
  alternatives_spanish:
  - me doleré
  - haré duelo
  lexicon: HALOT
  rationale: El verbo ספד expresa lamento fúnebre o duelo. «Me lamentaré» conserva ese matiz de duelo y suena natural en español, manteniendo la distinción con el verbo siguiente.
- source_word: וְאֵילִילָה
  english_pob_choice: and wail
  chosen_spanish: y gemiré
  alternatives_spanish:
  - y aullaré
  - y clamaré
  lexicon: HALOT
  rationale: ילל comunica un lamento más intenso y penetrante. «Gemiré» transmite un gemido audible y desgarrado sin volver el texto demasiado zoológico en español.
- source_word: אֵילְכָה שילל וְעָרוֹם
  english_pob_choice: I will go stripped and naked
  chosen_spanish: iré desnudo y descalzo
  alternatives_spanish:
  - iré desnudo y despojado
  - iré descalzo y desnudo
  lexicon: HALOT
  rationale: El término difícil שילל admite la idea de «despojado/stripped» y la nota inglesa preserva la opción «barefoot». En español, «descalzo» comunica una señal reconocible de duelo y humillación, mientras «desnudo» traduce claramente עָרוֹם. La combinación mantiene la tensión lexical sin forzar un calco oscuro.
- source_word: מִסְפֵּד
  english_pob_choice: a lament
  chosen_spanish: un lamento
  alternatives_spanish:
  - duelo
  - una lamentación
  lexicon: HALOT
  rationale: מִסְפֵּד es una expresión de duelo o lamentación. «Un lamento» es breve y distingue esta palabra del sustantivo siguiente.
- source_word: כַּתַּנִּים
  english_pob_choice: like the jackals
  chosen_spanish: como los chacales
  alternatives_spanish:
  - como los perros salvajes
  - como los dragones
  lexicon: HALOT
  rationale: En la poesía profética, תַּנִּים suele referirse a chacales. «Chacales» es la lectura zoológica más probable y conserva la imagen de criaturas asociadas con desolación y aullidos.
- source_word: וְאֵבֶל
  english_pob_choice: and mourning
  chosen_spanish: y duelo
  alternatives_spanish:
  - y luto
  - y tristeza
  lexicon: HALOT
  rationale: אֵבֶל denota duelo o estado de luto. «Duelo» mantiene un matiz distinto de «lamento» y conserva la progresión semántica del verso.
- source_word: כִּבְנוֹת יַעֲנָה
  english_pob_choice: like the daughters of the ostrich
  chosen_spanish: como las hijas del avestruz
  alternatives_spanish:
  - como avestruces
  - como las crías del avestruz
  lexicon: HALOT
  rationale: La expresión hebrea es literalmente «hijas del avestruz». «Hijas» conserva la forma poética y el paralelismo del hebreo, y «avestruz» comunica la referencia zoológica al lector español.
translation_notes:
  revision_awareness: La redacción sigue de cerca el texto hebreo WLC y preserva la ambigüedad de שילל mediante la nota alternativa «descalzo», tal como lo hace el audit trail inglés. No se detectaron revisiones aplicadas en el pass más reciente.
  spanish_consistency_notes:
  - Se usó «Yahvé» como convención del proyecto solo cuando aparezca el nombre divino; este versículo no lo contiene.
  - Se mantuvo una distinción entre «lamento» y «duelo» para reflejar el paralelismo hebreo.
  - La imagen de los animales se tradujo zoológicamente como «chacales» y «avestruz», evitando el arcaísmo «dragones».
