translation:
  language: es
  text: 'Cada vez que se cortaba el cabello—al final de cada año lo cortaba, porque le pesaba—cuando lo cortaba, pesaba el cabello de su cabeza: doscientos siclos según la piedra del rey[a].'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo literalmente: “según la piedra del rey”, es decir, según el peso patrón real.'
    reason: cultural_note
lexical_decisions:
- source_word: וּבְגַלְּחוֹ
  english_pob_choice: Whenever he cut
  chosen_spanish: Cada vez que se cortaba
  alternatives_spanish:
  - Cuando se cortaba
  - Siempre que se cortaba
  lexicon: HALOT
  rationale: La forma con prefijo y el infinitivo de גלח expresa acción repetida y circunstancial. En español, “Cada vez que se cortaba” comunica mejor la iteración que un simple “cuando”. Se mantiene la referencia reflexiva implícita del sujeto.
- source_word: אֶת רֹאשׁוֹ
  english_pob_choice: the hair of his head
  chosen_spanish: el cabello de su cabeza
  alternatives_spanish:
  - su cabeza
  - su cabello
  lexicon: HALOT
  rationale: Aunque el hebreo dice literalmente “su cabeza”, el contexto muestra que lo que se corta es el cabello. “El cabello de su cabeza” conserva la especificación enfática sin la literalidad extraña de cortar la cabeza.
- source_word: וְהָיָה מִקֵּץ יָמִים לַיָּמִים
  english_pob_choice: at the end of every year
  chosen_spanish: al fin de cada año
  alternatives_spanish:
  - de año en año
  - al término de cada año
  lexicon: HALOT
  rationale: La expresión idiomática indica un intervalo anual regular. “Al fin de cada año” es natural en español y mantiene la idea temporal periódica del original.
- source_word: אֲשֶׁר יְגַלֵּחַ
  english_pob_choice: he would cut it
  chosen_spanish: lo cortaba
  alternatives_spanish:
  - lo cortaría
  - lo cortara
  lexicon: HALOT
  rationale: El imperfecto aquí expresa acción habitual. En español narrativo, “lo cortaba” transmite esa repetición de manera directa y fluida.
- source_word: כִּי כָבֵד עָלָיו
  english_pob_choice: because it was heavy on him
  chosen_spanish: porque le pesaba
  alternatives_spanish:
  - porque era pesado para él
  - porque le resultaba una carga
  lexicon: HALOT
  rationale: כבד con על conserva la imagen de peso o carga. “Le pesaba” mantiene esa metáfora en español sin volverla explicativa de más.
- source_word: וְגִלְּחוֹ
  english_pob_choice: when he cut it
  chosen_spanish: cuando lo cortaba
  alternatives_spanish:
  - y lo cortaba
  - después de cortarlo
  lexicon: HALOT
  rationale: La forma verbal retoma la secuencia temporal. “Cuando lo cortaba” evita una repetición rígida de “y” y sigue bien el hilo narrativo.
- source_word: וְשָׁקַל
  english_pob_choice: he weighed
  chosen_spanish: pesaba
  alternatives_spanish:
  - pesó
  - lo pesaba
  lexicon: HALOT
  rationale: El verbo de pesar describe la acción narrativa. “Pesaba” en imperfecto acompaña el marco habitual y la repetición del relato.
- source_word: שְׂעַר רֹאשׁוֹ
  english_pob_choice: the hair of his head
  chosen_spanish: el cabello de su cabeza
  alternatives_spanish:
  - su cabello
  lexicon: HALOT
  rationale: Se conserva la especificación hebrea “de su cabeza” para no perder el énfasis del texto, aunque en español podría abreviarse a “su cabello”.
- source_word: מָאתַיִם שְׁקָלִים
  english_pob_choice: two hundred shekels
  chosen_spanish: doscientos siclos
  alternatives_spanish:
  - doscientos shekels
  lexicon: HALOT
  rationale: “Siclos” es la forma tradicional en español bíblico para la unidad de peso, y comunica el valor numérico con claridad.
- source_word: בְּאֶבֶן הַמֶּלֶךְ
  english_pob_choice: by the king’s stone
  chosen_spanish: según la piedra del rey
  alternatives_spanish:
  - con la piedra del rey
  - según el peso del rey
  lexicon: HALOT
  rationale: אֶבֶן es literalmente “piedra”, aludiendo a una pesa o patrón de peso real. “Según la piedra del rey” preserva el dato material y evita sustituirlo sin necesidad por una abstracción más interpretativa.
translation_notes:
  revision_awareness: La redacción sigue de cerca el texto hebreo y el sentido establecido en el audit trail inglés, pero ajusta la última expresión para reflejar más directamente אֶבֶן (“piedra”) mediante “según la piedra del rey”, en lugar de normalizarla a “peso” o “balanza”. Se mantuvo el valor iterativo de los verbos y la metáfora de la carga (“le pesaba”).
  spanish_consistency_notes:
  - Se usó “cabello” para רֹאשׁ/שְׂעַר en lugar de “pelo” por registro bíblico más natural y mayor dignidad estilística.
  - Se mantuvo “siclos” como unidad de peso tradicional en español bíblico.
  - La construcción temporal se hizo iterativa (“Cada vez que…”, “al fin de cada año”) para reproducir el carácter habitual del hebreo.
