translation:
  language: es
  text: ¿No está Yahvé, su Dios, con ustedes? ¿Y no les ha dado descanso por todas partes? Porque ha entregado en mi mano a los habitantes de la tierra, y la tierra ha sido sometida delante de Yahvé y delante de su pueblo[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, 'a la vista de su pueblo'. El pronombre en 'su pueblo' se entiende mejor como referido a Yahvé, aunque algunos pueden entenderlo como referido a David.
    reason: alternative_reading
lexical_decisions:
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahvé
  - Yahveh
  lexicon: HALOT
  rationale: Se conserva el nombre propio divino del Tetragrámaton, siguiendo la política del POB de no enmascararlo como título. 'Yahvé' es la forma estándar en español bíblico del nombre revelado.
- source_word: אֱלֹהֵיכֶם
  english_pob_choice: your God
  chosen_spanish: su Dios
  alternatives_spanish:
  - tu Dios
  - vuestro Dios
  lexicon: HALOT
  rationale: En contexto plural, el posesivo español debe concordar con ustedes; 'su Dios' mantiene la referencia al Dios de Israel sin introducir un posesivo singular.
- source_word: עִמָּכֶם
  english_pob_choice: with you
  chosen_spanish: con ustedes
  alternatives_spanish:
  - entre ustedes
  - a su lado
  lexicon: HALOT
  rationale: La presencia divina se expresa de manera natural en español con 'con ustedes', conservando el sentido de acompañamiento y favor.
- source_word: וְהֵנִיחַ לָכֶם מִסָּבִיב
  english_pob_choice: And has he not given you rest on every side
  chosen_spanish: ¿Y no les ha dado descanso por todos lados?
  alternatives_spanish:
  - ¿Y no les ha concedido reposo por todos lados?
  - ¿Y no les ha dado reposo alrededor?
  lexicon: HALOT
  rationale: '''הֵנִיחַ'' aquí denota conceder descanso o reposo frente a amenazas circundantes. ''Descanso'' comunica bien el resultado, y ''por todos lados'' refleja מִסָּבִיב de forma idiomática.'
- source_word: נָתַן בְּיָדִי
  english_pob_choice: he has given ... into my hand
  chosen_spanish: ha entregado en mi mano
  alternatives_spanish:
  - ha puesto en mi mano
  - ha dado en mi mano
  lexicon: HALOT
  rationale: Se conserva el modismo hebreo de entrega de enemigos al poder de alguien. 'Ha entregado en mi mano' es natural en español y mantiene la fuerza idiomática.
- source_word: יֹשְׁבֵי הָאָרֶץ
  english_pob_choice: the inhabitants of the land
  chosen_spanish: a los habitantes de la tierra
  alternatives_spanish:
  - a los moradores de la tierra
  - a los que habitan la tierra
  lexicon: HALOT
  rationale: La construcción participial se vierte con un sustantivo claro y bíblicamente inteligible en español. 'Tierra' conserva el término del texto sin sobredeterminarlo.
- source_word: וְנִכְבְּשָׁה הָאָרֶץ
  english_pob_choice: and the land has been subdued
  chosen_spanish: y la tierra ha sido sometida
  alternatives_spanish:
  - y la tierra fue sometida
  - y la tierra ha quedado sometida
  lexicon: HALOT
  rationale: El nifal de כבש expresa quedar bajo dominio. 'Sometida' es un equivalente natural en español y evita un calco duro.
- source_word: לִפְנֵי יְהוָה
  english_pob_choice: before Yahweh
  chosen_spanish: delante de Yahvé
  alternatives_spanish:
  - ante Yahvé
  - en presencia de Yahvé
  lexicon: HALOT
  rationale: '''Delante de'' reproduce con claridad el valor relacional/escénico de לִפְנֵי, manteniendo la estructura paralela del verso.'
- source_word: וְלִפְנֵי עַמּוֹ
  english_pob_choice: and before his people
  chosen_spanish: y delante de su pueblo
  alternatives_spanish:
  - y ante su pueblo
  - y en presencia de su pueblo
  lexicon: HALOT
  rationale: 'Se conserva la ambigüedad referencial del pronombre ''su'' como en el inglés POB: puede leerse como referido a Yahvé, aunque el contexto inmediato también permite otra lectura. ''Delante de'' mantiene el paralelo con la frase anterior.'
theological_decisions:
- issue: Referencia de 'su pueblo' en וְלִפְנֵי עַמּוֹ
  english_pob_reading: '''his'' refers to the LORD'
  chosen_spanish_reading: '''su'' se entiende preferentemente como referido a Yahvé'
  alternative_spanish_readings:
  - '''su'' puede entenderse como referido a David'
  - el pronombre queda deliberadamente abierto
  rationale: La sintaxis favorece que el pronombre retome al referente más próximo y prominente del hemistiquio, Yahvé. Aun así, el español conserva la misma tensión interpretativa que el audit trail inglés, sin resolverla de forma artificial.
  doctrine_reference: Preservar la tensión textual documentada; no introducir una resolución dogmática no exigida por el hebreo.
translation_notes:
  revision_awareness: 'La propuesta sigue de cerca el texto hebreo y coincide sustancialmente con el audit trail inglés: mantiene el nombre divino como Yahvé, conserva el modismo de entrega ''en mi mano'' y respeta la posible ambigüedad de ''su pueblo'' sin forzar una aclaración inexistente en el original.'
  spanish_consistency_notes:
  - Se usa 'Yahvé' de manera consistente para יְהוָה.
  - Se mantiene el plural respetuoso 'ustedes' para el destinatario colectivo.
  - Se preserva la paralelismo preposicional con 'delante de' en ambas cláusulas finales.
  - No se añaden notas al pie porque la única tensión interpretativa documentada puede describirse en las decisiones léxicas y teológicas sin requerir anclaje textual.
