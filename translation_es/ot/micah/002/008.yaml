translation:
  language: es
  text: Pero recientemente mi pueblo se ha levantado como enemigo; de sobre el manto despojan la prenda a los que pasan seguros[a], a los que vuelven de la guerra.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: “a los que se apartan de la guerra” / “a los que son apartados de la batalla”. La frase final en hebreo es difícil y puede describir a no combatientes pacíficos más que a soldados que regresan a casa.'
    reason: alternative_reading
lexical_decisions:
- source_word: וְאֶתְמוּל
  english_pob_choice: But lately
  chosen_spanish: Pero recientemente
  alternatives_spanish:
  - Pero ayer
  - Recientemente
  lexicon: HALOT
  rationale: El adverbio señala un pasado reciente; en contexto profético, “recientemente” conserva la fuerza temporal y “pero” reproduce el matiz adversativo del ו inicial.
- source_word: עַמִּי
  english_pob_choice: my people
  chosen_spanish: mi pueblo
  alternatives_spanish:
  - mi gente
  - mi pueblo
  lexicon: HALOT
  rationale: “Mi pueblo” es la forma más directa y conserva el tono pactual del posesivo.
- source_word: לְאוֹיֵב
  english_pob_choice: as an enemy
  chosen_spanish: como un enemigo
  alternatives_spanish:
  - como enemigo
  - en calidad de enemigo
  lexicon: HALOT
  rationale: La ל predicativa/comparativa se rinde naturalmente en español con “como”, sin sugerir una transformación ontológica total.
- source_word: יְקוֹמֵם
  english_pob_choice: have risen up
  chosen_spanish: se ha levantado
  alternatives_spanish:
  - ha surgido
  - se ha alzado
  lexicon: HALOT
  rationale: El verbo קום en este contexto describe una acción hostil de levantarse/ponerse en contra; “se ha levantado” transmite bien ese valor en español bíblico moderno.
- source_word: מִמּוּל שַׂלְמָה
  english_pob_choice: from off the garment
  chosen_spanish: del manto
  alternatives_spanish:
  - de delante del manto
  - desde el manto
  lexicon: HALOT
  rationale: El hebreo expresa la acción de quitar desde/contra la prenda. En español, “del manto” integra de manera natural la imagen de despojo; “manto” corresponde al valor de prenda exterior de שַׂלְמָה.
- source_word: אֶדֶר
  english_pob_choice: garment
  chosen_spanish: la túnica
  alternatives_spanish:
  - el vestido
  - la prenda
  lexicon: HALOT
  rationale: En este paralelo vestuario, el segundo término puede funcionar como otra prenda. “Túnica” permite distinguir las dos piezas de ropa en un español claro, manteniendo la idea de despojar.
- source_word: תַּפְשִׁטוּן
  english_pob_choice: you strip
  chosen_spanish: despojan
  alternatives_spanish:
  - desnudan
  - arrancan
  lexicon: HALOT
  rationale: El hiphil de פשט indica quitar la ropa; “despojan” conserva la violencia y el carácter de expolio, con un uso natural en español.
- source_word: מֵעֹבְרִים בֶּטַח
  english_pob_choice: from those who pass by securely
  chosen_spanish: a los que pasan seguros
  alternatives_spanish:
  - a los que pasan con seguridad
  - a los transeúntes en paz
  lexicon: HALOT
  rationale: La construcción describe a personas que pasan sin temor. “Pasan seguros” conserva el adverbio de seguridad y suena fluido en español.
- source_word: שׁוּבֵי מִלְחָמָה
  english_pob_choice: those returning from war
  chosen_spanish: a los que vuelven de la guerra
  alternatives_spanish:
  - a los que regresan de la guerra
  - a los que vuelven de la batalla
  lexicon: HALOT
  rationale: 'Se sigue el sentido más directo de שוב con מלחמה: gente que regresa de la guerra. “De la guerra” mantiene la referencia bélica sin añadir interpretación.'
theological_decisions:
- issue: Interpretación de la frase final difícil שׁוּבֵי מִלְחָמָה
  english_pob_reading: those returning from war
  chosen_spanish_reading: a los que vuelven de la guerra
  alternative_spanish_readings:
  - a los que se apartan de la guerra
  - a los que rehúyen la guerra
  rationale: No se resuelve en silencio la ambigüedad interpretativa; se mantiene la lectura más directa y coherente con el contexto de abuso contra personas vulnerables, preservando la alternativa en nota.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it'
translation_notes:
  revision_awareness: 'La versión española sigue la revisión más reciente del inglés: conserva la relación comparativa/predicativa de לְאוֹיֵב como “como un enemigo” y restituye la imagen de despojo “del manto”, evitando omitir מִמּוּל שַׂלְמָה. Se mantiene, además, la nota sobre la ambigüedad final de שׁוּבֵי מִלְחָמָה.'
  spanish_consistency_notes:
  - Se usa “Yahvé” sólo cuando aparezca el nombre divino explícito; este versículo no lo contiene.
  - Se conserva un registro bíblico moderno y digno, sin arcaísmos innecesarios.
  - “Manto” y “túnica” se distinguen para reflejar el paralelismo de prendas en el hebreo.
  - La nota [a] se coloca en el grupo “pasan seguros” para vincularla con la cláusula ambigua completa.
