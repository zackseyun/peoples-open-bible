translation:
  language: es
  text: 'Y llevó la carta al rey de Israel, diciendo: «Y ahora, cuando esta carta llegue a ti, mira, he enviado a Naamán, mi siervo[a], a ti, para que lo cures de su lepra[b]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O “mi esclavo”. El hebreo עבד puede denotar esclavo, siervo o subordinado; aquí “mi siervo” encaja mejor con el contexto cortesano y diplomático.
    reason: lexical_alternative
  - marker: b
    text: O “su enfermedad de la piel”. El hebreo usa una expresión inusual para quitar la aflicción, literalmente algo como “recogerlo de su enfermedad de la piel”.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּבֵא
  english_pob_choice: And he brought
  chosen_spanish: Y llevó
  alternatives_spanish:
  - Y trajo
  - Y entregó
  lexicon: HALOT
  rationale: El verbo causativo de בוא con “la carta” como objeto se expresa naturalmente en español como “llevó” o “trajo”. “Llevó” conserva el movimiento de la carta hacia el rey sin forzar un tecnicismo administrativo.
- source_word: הַסֵּפֶר
  english_pob_choice: the letter
  chosen_spanish: la carta
  alternatives_spanish:
  - el documento
  - el escrito
  lexicon: HALOT
  rationale: En este contexto diplomático, סֵפֶר designa una comunicación escrita enviada de un rey a otro. “Carta” es el equivalente más claro y natural en español.
- source_word: וְעַתָּה
  english_pob_choice: And now
  chosen_spanish: Y ahora
  alternatives_spanish:
  - Ahora
  - Pues ahora
  lexicon: HALOT
  rationale: Mantiene el marcador discursivo del mensaje real y su tono formal.
- source_word: כְּבוֹא ... אֵלֶיךָ
  english_pob_choice: when this letter comes to you
  chosen_spanish: cuando esta carta llegue a ti
  alternatives_spanish:
  - cuando esta carta venga a ti
  - al llegar esta carta a ti
  lexicon: HALOT
  rationale: La construcción temporal se vierte de forma idiomática en español con “llegue a ti”, que comunica recepción del mensaje sin perder la referencia al texto que arriba al destinatario.
- source_word: הִנֵּה
  english_pob_choice: behold
  chosen_spanish: mira
  alternatives_spanish:
  - he aquí
  - observa
  lexicon: HALOT
  rationale: “Mira” conserva el llamado de atención del hebreo con un registro menos arcaico que “he aquí”, más apto para español contemporáneo sin perder solemnidad.
- source_word: שָׁלַחְתִּי
  english_pob_choice: I have sent
  chosen_spanish: yo he enviado
  alternatives_spanish:
  - he enviado
  - yo envié
  lexicon: HALOT
  rationale: En estilo epistolar, el perfecto español expresa bien la acción ya realizada con relevancia presente. “He enviado” preserva el valor resultativo del original.
- source_word: נַעֲמָן
  english_pob_choice: Naaman
  chosen_spanish: Naamán
  alternatives_spanish:
  - Naaman
  lexicon: Convención transliteración española
  rationale: Se adapta el nombre a la grafía habitual en español bíblico, con acento para la pronunciación.
- source_word: עַבְדִּי
  english_pob_choice: my servant
  chosen_spanish: mi esclavo
  alternatives_spanish:
  - mi siervo
  - mi servidor
  lexicon: HALOT
  rationale: El POB inglés preserva la fuerza léxica de עבד con “servant” sin suavizarlo a “officer”. En español, “esclavo” conserva esa fuerza semántica mejor que “siervo”, aunque resulte más duro; el contexto de dependencia cortesana no elimina el valor básico del término.
- source_word: וַאֲסַפְתּוֹ
  english_pob_choice: that you may cure him
  chosen_spanish: para que lo cures
  alternatives_spanish:
  - y lo cures
  - para que lo sanes
  lexicon: HALOT
  rationale: La revisión inglesa reconoció que el hebreo idiomático apunta a la curación, no a una traducción literal de “reunir”. En español, “cures” expresa con claridad el sentido funcional del mandato.
- source_word: מִצָּרַעְתּוֹ
  english_pob_choice: of his leprosy
  chosen_spanish: de su lepra
  alternatives_spanish:
  - de su enfermedad de la piel
  - de su afección cutánea
  lexicon: HALOT
  rationale: Se conserva la equivalencia tradicional “lepra”, tal como la POB inglesa dejó en la revisión final con nota lexical. Aunque “enfermedad de la piel” evita anacronismo médico, aquí la tradición bíblica española gana claridad y corresponde al sentido recibido del texto.
theological_decisions:
- issue: Equivalencia de צָרַעַת en un contexto narrativo de sanidad
  english_pob_reading: The main text says “leprosy,” with a note acknowledging the Hebrew literally says “gather him in from his skin disease,” using an unusual expression for removing the affliction.
  chosen_spanish_reading: “lepra” en el texto principal, con nota sobre el hebreo literal y su expresión inusual.
  alternative_spanish_readings:
  - enfermedad de la piel
  - afección cutánea
  rationale: Aunque el hebreo bíblico abarca más que la lepra moderna, en este versículo el POB revisado opta por una traducción funcional y tradicional en el texto principal. En español, “lepra” comunica con claridad la afección referida y permite reservar la observación filológica para la nota.
  doctrine_reference: 'Translation philosophy: original-language primacy with readable church use; lexical note on צָרַעַת'
translation_notes:
  revision_awareness: 'Se tomó en cuenta la revisión inglesa más reciente, que sustituyó la paráfrasis literal e inexacta “gather him in from his skin disease” por la equivalencia funcional “cure him of his leprosy”. La versión española sigue esa decisión: conserva la claridad del sentido en el texto principal y traslada la rareza idiomática del hebreo a una nota.'
  spanish_consistency_notes:
  - Se mantuvo “Yahvé” como preferencia general del proyecto, pero este versículo no contiene el nombre divino.
  - “Naamán” sigue la transliteración española habitual con acento prosódico.
  - Se preservó el registro de carta real con sintaxis solemne pero natural en español.
  - Las notas usan marcadores únicos y corresponden exactamente a los anclajes del texto.
