  - marker: b
    text: 'O: «de generación en generación te traerán regocijo». El griego dice literalmente «generaciones de generaciones te darán exultación».'
    reason: lexical_alternative
  revision_rationale: La revisión corrige la naturalidad de «Yahvé Dios», conserva mejor la textura poética de γενεαὶ γενεῶν, y reemplaza la expresión menos idiomática «te dará exultación» por una formulación fiel y legible en español. También preserva en nota la alternativa más idiomática, en línea con el audit trail inglés.
