revisions:
- from: Ahora bien, Ephrón estaba sentado entre los hijos de Het[a], y Ephrón el hitita respondió a Abraham en presencia de los hijos de Het, delante de todos los que entraban por la puerta de su ciudad, diciendo[b],
  to: Ahora bien, Ephrón estaba sentado entre los hijos de Het[a], y Ephrón el hitita respondió a Abraham a oídos de los hijos de Het, delante de todos los que entraban por la puerta de su ciudad, diciendo[b],
  rationale: Se hace una reparación mínima para reflejar mejor בְּאָזְנֵי con «a oídos de», preservando el matiz de habla pública y audible ante testigos, mientras se mantiene intacta la estructura general y las notas del borrador.
