translation:
  language: es
  text: ¡Canten a Dios[a]; canten alabanzas a su nombre. Levanten un canto para el que cabalga por los desiertos; Yah es su nombre[b]; júbilense delante de él.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Preparen el camino para el que cabalga por las estepas». El verbo hebreo puede significar «construir/preparar un camino», y la frase quizá evoca abrir una calzada para Dios.'
    reason: alternative_reading
  - marker: b
    text: 'O: «que cabalga sobre las nubes». Algunos intérpretes toman el sustantivo final en un sentido teofánico más elevado, aunque el uso hebreo usual es «desiertos» o «estepas».'
    reason: lexical_alternative
lexical_decisions:
- source_word: שִׁירוּ
  english_pob_choice: Sing
  chosen_spanish: Canten
  alternatives_spanish:
  - Canten alabanza
  - Canten un canto
  lexicon: HALOT
  rationale: El imperativo plural de שיר convoca a cantar; en español, «Canten» conserva la exhortación directa y el tono poético sin añadir contenido.
- source_word: לֵאלֹהִים
  english_pob_choice: to God
  chosen_spanish: a Dios
  alternatives_spanish:
  - a dioses
  lexicon: HALOT
  rationale: En este contexto salmódico, אֱלֹהִים se refiere al Dios de Israel; por eso corresponde el singular «Dios».
- source_word: זַמְּרוּ שְׁמוֹ
  english_pob_choice: sing praise to his name
  chosen_spanish: canten salmos a su nombre
  alternatives_spanish:
  - hagan música a su nombre
  - alaben su nombre con música
  lexicon: HALOT
  rationale: זמר en contextos de alabanza apunta a cantar con acompañamiento o hacer salmos. «Canten salmos» conserva la fuerza musical y el registro bíblico, sin perder el objeto «su nombre».
- source_word: סֹלּוּ
  english_pob_choice: Lift up a song
  chosen_spanish: Exalten un canto
  alternatives_spanish:
  - Preparen el camino
  - Levanten un canto
  lexicon: HALOT
  rationale: El verbo סלל puede significar «allanar/preparar un camino», pero la POB inglesa opta por una equivalencia poética orientada al canto. En español, «Exalten un canto» mantiene el paralelismo exhortativo y evita forzar una imagen vial aislada.
- source_word: לָרֹכֵב בָּעֲרָבוֹת
  english_pob_choice: for the one who rides through the deserts
  chosen_spanish: para el que cabalga por los desiertos
  alternatives_spanish:
  - para el que cabalga por las estepas
  - para el que cabalga sobre las nubes
  lexicon: HALOT
  rationale: רכב describe al que va montado/cabalga; «cabalga» es natural y fiel. עֲרָבוֹת se entiende lexicográficamente como desiertos/estepas; aquí se conserva la lectura usual «desiertos» siguiendo el inglés auditado.
- source_word: בְּיָהּ שְׁמוֹ
  english_pob_choice: Yah is his name
  chosen_spanish: Yah es su nombre
  alternatives_spanish:
  - Su nombre es Yah
  lexicon: HALOT
  rationale: יָהּ es la forma corta del nombre divino y debe transliterarse como «Yah», no sustituirse por «Señor». El orden español más natural es «Yah es su nombre».
- source_word: וְעִלְזוּ לְפָנָיו
  english_pob_choice: exult before him
  chosen_spanish: júbilense delante de él
  alternatives_spanish:
  - regocíjense delante de él
  - exulten delante de él
  lexicon: HALOT
  rationale: עלז expresa gozo exuberante; «júbilense» conserva el matiz intensivo y el tono elevado. Se eligió la forma pronominal para reflejar el llamado colectivo implícito del plural.
theological_decisions:
- issue: Tratamiento de יָהּ, la forma breve del nombre divino
  english_pob_reading: Yah
  chosen_spanish_reading: Yah
  alternative_spanish_readings:
  - el SEÑOR
  - Yavé
  rationale: El hebreo tiene la forma breve יָהּ, no el tetragrama completo. Por eso se translitera como «Yah» para respetar la forma concreta del texto y la distinción documentada por la POB inglesa.
  doctrine_reference: 'DOCTRINE.md: transliterar nombres; no aplicar el mascaramiento convencional cuando el texto presenta una forma nominal distinta'
- issue: ¿Cabalgar por los desiertos o sobre las nubes?
  english_pob_reading: through the deserts
  chosen_spanish_reading: por los desiertos
  alternative_spanish_readings:
  - sobre las nubes
  - por las estepas
  rationale: La POB inglesa privilegia el sentido léxico habitual de עֲרָבוֹת como desiertos/estepas, aunque reconoce la lectura teofánica alternativa. El español conserva esa decisión principal sin borrar la tensión interpretativa.
  doctrine_reference: HALOT; nota de alternativa de la POB inglesa
- issue: ¿Preparar el camino o levantar un canto?
  english_pob_reading: Lift up a song
  chosen_spanish_reading: Exalten un canto
  alternative_spanish_readings:
  - Preparen el camino
  - Levanten un canto
  rationale: Aunque סלל puede sugerir la preparación de un camino, la lectura auditada de la POB inglesa adopta una equivalencia poética para mantener el paralelismo del verso. El español sigue esa línea sin ocultar la posibilidad alternativa.
  doctrine_reference: HALOT; nota alternativa de la POB inglesa
translation_notes:
  revision_awareness: 'La POB inglesa quedó sin cambios en la última revisión; esta versión española sigue esa lectura estable y conserva las dos tensiones documentadas del verso: סֹלּוּ como posible preparación de camino frente a canto, y עֲרָבוֹת como desiertos/estepas frente a nubes.'
  spanish_consistency_notes:
  - Se translitera el nombre breve divino como «Yah» en coherencia con la política de nombres propios.
  - Se usa «Dios» para אֱלֹהִים porque el contexto es inequívocamente singular.
  - Se prefiere «canten salmos» para זמר en un contexto de alabanza, manteniendo lenguaje bíblico pero natural.
  - «Júbilense» preserva el matiz de gozo exuberante de עלז y armoniza con el paralelismo del verso.
