    rationale: El POB pide trabajar desde la evidencia fuente y preservar alternativas significativas documentadas. La nota actual cambia el contenido y pierde la alternativa sobre יְלִיד בַּיִת.
  - severity: medium
    issue: Falta la nota alternativa para לָבַז ('prey' en inglés auditado), que en español puede preservarse como 'presa' o similar
    rationale: La traducción principal 'botín' es defendible, pero el audit trail preservó una alternativa significativa para el término final y debe reflejarse también en español.
  - severity: low
    issue: La decisión de poner la nota [a] solo tras 'esclavo' no ancla bien una alternativa que afecta a toda la primera pregunta
    rationale: Si la nota explica una alternativa de la cláusula completa, el marcador debe colocarse en un punto que naturalmente remita a toda esa frase, por ejemplo al final de 'casa[a]'.
