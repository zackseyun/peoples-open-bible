translation:
  language: es
  text: Me entregué en pos de ella[a], y por edades eternas no me apartaré de ella[b]. En pureza la hallé, y desde el principio adquirí un corazón para ella[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo literalmente: ''di mi alma tras ella'', un modismo de búsqueda devota.'
    reason: lexical_alternative
  - marker: b
    text: O 'para siempre' o 'por siempre jamás'; el hebreo dice literalmente 'por edades eternas'.
    reason: lexical_alternative
  - marker: c
    text: El hebreo lee 'adquirí un corazón para ella desde el principio'. El paralelo griego difiere algo en esta cláusula, más como 'adquirí un corazón desde el principio junto con ello/ellos', pero ambos testimonios apoyan la idea de una disposición interior hacia la sabiduría desde el comienzo.
    reason: alternative_reading
lexical_decisions:
- source_word: נַפְשִׁי / τὴν ψυχήν μου
  english_pob_choice: my soul / myself
  chosen_spanish: mi alma
  alternatives_spanish:
  - yo mismo
  - mi vida
  - mi ser
  lexicon: HALOT; LSJ
  rationale: La imagen hebrea y el paralelo griego usan el lenguaje de ψυχή / נפש para la persona entera en una búsqueda devota. En español, 'mi alma' conserva el tono elevado y la fuerza interior del original mejor que una simple paráfrasis con 'yo mismo'.
- source_word: נָתַתִּי אַחֲרֶיהָ / κατεύθυνα εἰς αὐτήν
  english_pob_choice: I gave ... after her
  chosen_spanish: entregué ... tras ella
  alternatives_spanish:
  - me entregué a ella
  - la seguí con decisión
  - me dediqué a perseguirla
  lexicon: HALOT; LSJ
  rationale: '''Tras ella'' mantiene la imagen concreta de ir en pos de la sabiduría-personificada. ''Entregué'' conserva el gesto de dedicación personal sin volver la frase demasiado abstracta.'
- source_word: וּלְנֵצַח נְצָחִים
  english_pob_choice: for everlasting ages
  chosen_spanish: por edades eternas
  alternatives_spanish:
  - por los siglos de los siglos
  - para siempre jamás
  - por eternos siglos
  lexicon: HALOT
  rationale: La duplicación intensiva pide una expresión enfática. 'Edades eternas' refleja el plural intensificado sin imponer una fórmula litúrgica fija que no está en el hebreo.
- source_word: לֹא אַטֶּה מִמֶּנָּה
  english_pob_choice: I will not turn away from her
  chosen_spanish: no me apartaré de ella
  alternatives_spanish:
  - no me volveré de ella
  - no me desviaré de ella
  - no me apartaré de su lado
  lexicon: HALOT
  rationale: '''Apartarse'' expresa naturalmente la fidelidad y el giro de נטה en este contexto. Mantiene la relación personal con la sabiduría femenina sin endurecer el español.'
- source_word: וּבְטָהֳרָה / ἐν καθαρσμῷ
  english_pob_choice: In purity
  chosen_spanish: En pureza
  alternatives_spanish:
  - Con pureza
  - En limpieza ritual
  - En purificación
  lexicon: HALOT; LSJ
  rationale: '''Pureza'' es el equivalente más directo y digno para el estado o esfera indicada por el hebreo y el griego. ''Limpieza ritual'' sería demasiado específico para el texto.'
- source_word: מְצָאתִיהָ / εὗρον αὐτήν
  english_pob_choice: I found her
  chosen_spanish: la hallé
  alternatives_spanish:
  - la encontré
  - la descubrí
  lexicon: HALOT; LSJ
  rationale: '''Hallé'' suena más natural en registro bíblico español y conserva el valor de מצא sin añadir matices de descubrimiento no necesarios.'
- source_word: וְלֵב קָנִיתִי לָהּ / καρδίαν ἐκτησάμην
  english_pob_choice: I acquired a heart for her
  chosen_spanish: adquirí para ella un corazón
  alternatives_spanish:
  - me hice un corazón para ella
  - obtuve para ella un corazón
  - adquirí un corazón para ella
  lexicon: HALOT; LSJ
  rationale: 'La construcción conserva la rareza deliberada del original: no se sustituye por ''entendimiento'' para no borrar el antropologismo de לב / καρδία. ''Para ella'' mantiene el destinatario; ''un corazón'' conserva la literalidad que el POB inglés también preserva.'
- source_word: מִתְּחִלָּתָהּ / ἀπʼ ἀρχῆς
  english_pob_choice: from the beginning
  chosen_spanish: desde el principio
  alternatives_spanish:
  - desde el comienzo
  - desde el origen
  - desde el inicio
  lexicon: HALOT; LSJ
  rationale: Es la forma más natural y fiel en español para ἀπʼ ἀρχῆς / מִתְּחִלָּתָהּ. Mantiene la prioridad temporal y la idea de una disposición previa.
theological_decisions:
- issue: Sabiduría personificada en femenino
  english_pob_reading: Retain feminine pronouns ('her') throughout.
  chosen_spanish_reading: Mantener los femeninos ('ella') para la sabiduría.
  alternative_spanish_readings:
  - usar 'eso' o 'la sabiduría' repetidamente
  - neutralizar con 'ello'
  rationale: El hebreo y el griego presentan la sabiduría como figura femenina; conservar 'ella' preserva el recurso literario y el perfil teológico del texto sin aplanarlo a una abstracción.
  doctrine_reference: Principio de fidelidad al tropo literario del texto fuente.
- issue: Sentido de 'corazón' como disposición interior
  english_pob_reading: '''I acquired a heart for her'' with both witnesses supporting an inward disposition toward wisdom.'
  chosen_spanish_reading: '''Adquirí para ella un corazón'' como disposición interior hacia la sabiduría.'
  alternative_spanish_readings:
  - '''adquirí entendimiento para ella'''
  - '''gané un corazón para ella'''
  rationale: No conviene sustituir 'corazón' por 'entendimiento' porque el original conserva el antropologismo. La frase española resulta extraña, pero esa extrañeza está apoyada por la tensión textual del hebreo y el griego.
  doctrine_reference: Respeto por la tensión lexical documentada; no borrar imágenes antropológicas del texto.
translation_notes:
  revision_awareness: Se siguió el ajuste más reciente del POB inglés que suaviza 'my soul' a 'myself' en inglés por naturalidad, pero en español se mantuvo la imagen de 'mi alma' porque el hebreo נַפְשִׁי y el griego ψυχήν sostienen esa fuerza semántica y el español la puede expresar de modo natural y reverente. Se conservaron las demás decisiones centrales del audit trail, incluido el contraste entre los testigos hebreo y griego en la cláusula de 'corazón'.
  spanish_consistency_notes:
  - Se evitó 'SEÑOR' porque el versículo no contiene el tetragrámaton.
  - Se mantuvo 'ella' para la sabiduría por coherencia con la personificación femenina del hebreo.
  - '''Corazón'' se dejó literal para no borrar la tensión documentada con ''entendimiento''.'
  - '''Hallé'' y ''apartaré'' producen un registro bíblico claro sin caer en arcaísmo opaco.'
