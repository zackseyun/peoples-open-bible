base_translation:
  language: en
  yaml_path: translation/ot/isaiah/031/007.yaml
  text: For on that day each man will reject his idols of silver and his idols of gold[d][c][b][a], which your hands have made for you as a sin.
  footnotes:
  - marker: a
    text: Or 'will cast away' or 'will despise.' The Hebrew verb can express strong rejection or contempt.
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'each man'; the singular is distributive, meaning each person individually.
    reason: lexical_alternative
  - marker: c
    text: Or 'which your own hands made for yourselves.'
    reason: lexical_alternative
  - marker: d
    text: 'The final Hebrew word is simply ''sin,'' likely functioning appositionally: the idols are treated as sinful things. Or ''for sin'' / ''a sin.'''
    reason: lexical_alternative
