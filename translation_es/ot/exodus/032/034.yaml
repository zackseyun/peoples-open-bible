translation:
  language: es
  text: Pero ahora, ve, guía al pueblo al lugar[a] del que te hablé. Mira, mi ángel[b] irá delante de ti; pero el día en que yo los castigue[c], los castigaré por su pecado.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, más formalmente, «al lugar del cual te hablé».
    reason: lexical_alternative
  - marker: b
    text: «Mi ángel» también podría traducirse «mi mensajero»; el hebreo permite ambos sentidos, aunque «ángel» encaja mejor en este contexto.
    reason: lexical_alternative
  - marker: c
    text: 'El hebreo repite el verbo פקד: literalmente, «en el día de mi visitar, visitaré sobre ellos su pecado».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְעַתָּה
  english_pob_choice: But now
  chosen_spanish: Pero ahora
  alternatives_spanish:
  - Y ahora
  - Ahora
  lexicon: HALOT
  rationale: La partícula introduce un cambio de tono tras la intercesión anterior; 'Pero ahora' conserva el matiz adversativo de transición y suena natural en español.
- source_word: לֵךְ
  english_pob_choice: go
  chosen_spanish: ve
  alternatives_spanish:
  - vete
  - anda
  lexicon: HALOT
  rationale: Imperativo breve de הלך; 've' es directo y idiomático en español bíblico contemporáneo.
- source_word: נְחֵה
  english_pob_choice: lead
  chosen_spanish: guía
  alternatives_spanish:
  - conduce
  - dirige
  lexicon: HALOT
  rationale: El causativo de נחה expresa conducir al pueblo; 'guía' mantiene la idea de dirección sin sonar forzado.
- source_word: הָעָם
  english_pob_choice: the people
  chosen_spanish: el pueblo
  alternatives_spanish:
  - la gente
  - este pueblo
  lexicon: HALOT
  rationale: El sustantivo colectivo de Israel se rinde naturalmente como 'el pueblo'.
- source_word: אֶל אֲשֶׁר דִּבַּרְתִּי לָךְ
  english_pob_choice: to where I have spoken to you
  chosen_spanish: a donde he hablado a ti
  alternatives_spanish:
  - al lugar del que te hablé
  - al lugar del que he hablado contigo
  lexicon: HALOT
  rationale: Se conserva la relación relativa del hebreo sin convertirla en una paráfrasis más amplia; 'a donde' refleja el destino implícito, y 'he hablado a ti' mantiene la referencia a la palabra ya dada.
- source_word: מַלְאָכִי
  english_pob_choice: my angel
  chosen_spanish: mi ángel
  alternatives_spanish:
  - mi mensajero
  lexicon: HALOT
  rationale: מלאך puede significar 'mensajero' o 'ángel'; aquí se preserva 'ángel' como la opción que mejor encaja con el contexto narrativo y con la decisión auditada en inglés, sin resolver más allá de lo que el texto dice.
- source_word: יֵלֵךְ לְפָנֶיךָ
  english_pob_choice: will go before you
  chosen_spanish: irá delante de ti
  alternatives_spanish:
  - irá antes que tú
  - irá al frente de ti
  lexicon: HALOT
  rationale: '''Delante de ti'' reproduce el idiomático ''before you'' con naturalidad en español y conserva la imagen de guía/protección.'
- source_word: וּבְיוֹם פָּקְדִי
  english_pob_choice: on the day when I punish / call them to account
  chosen_spanish: el día en que yo los castigue
  alternatives_spanish:
  - el día en que yo los visite
  - el día de mi visitación
  lexicon: HALOT
  rationale: En este contexto, פקד tiene fuerza judicial. 'Castigue' expresa bien el acto de juicio en español, aunque se conserva la tensión semántica hacia la idea de visita/recuento en la nota textual.
- source_word: וּפָקַדְתִּי עֲלֵיהֶם
  english_pob_choice: I will punish them
  chosen_spanish: los castigaré
  alternatives_spanish:
  - los visitaré
  - los llamaré a cuentas
  lexicon: HALOT
  rationale: Se mantiene la repetición del verbo hebreo con un verbo español de juicio; 'castigaré' es claro y coherente con el contexto, sin borrar la idea de rendición de cuentas.
- source_word: חַטָּאתָם
  english_pob_choice: for their sin
  chosen_spanish: por su pecado
  alternatives_spanish:
  - por su pecado
  - por su culpa
  lexicon: HALOT
  rationale: חטאת aquí se rinde como 'pecado'; el posesivo singular pluralizado en español ('su') refleja al grupo colectivo.
theological_decisions:
- issue: Sentido de מַלְאָךְ en relación con la presencia divina
  english_pob_reading: Rendered as 'my angel' without identifying the figure more specifically.
  chosen_spanish_reading: '''mi ángel'' sin precisar más la identidad.'
  alternative_spanish_readings:
  - '''mi mensajero'''
  - una manifestación del mismo Yahvé
  rationale: El texto solo afirma que el enviado de Dios irá delante de Moisés. Se preserva la ambigüedad teológica del pasaje y no se resuelve si se trata de un ser creado o de una manifestación especial de la presencia divina.
  doctrine_reference: Preservar la tensión teológica sin resolverla.
- issue: Fuerza judicial de פקד en el contexto del becerro de oro
  english_pob_reading: Rendered with accountability language / punishment language.
  chosen_spanish_reading: 'Se traduce con lenguaje de castigo judicial: ''los castigaré''.'
  alternative_spanish_readings:
  - '''los llamaré a cuentas'''
  - '''los visitaré'''
  - '''los tomaré en cuenta para juicio'''
  rationale: El contexto exige juicio por el pecado; 'castigar' comunica ese acto sin añadir especificaciones doctrinales ajenas al hebreo. La repetición verbal queda visible en la traducción y en la nota textual.
  doctrine_reference: Preservar la tensión semántica entre visita, responsabilidad y castigo.
translation_notes:
  revision_awareness: El texto inglés revisado pasó de 'Look' a 'Behold' y de una formulación de rendición de cuentas a una de castigo directo; la versión española sigue esa línea al usar una apertura formal breve ('Pero ahora') y un final judicial claro ('los castigaré'), sin eliminar la repetición semítica subyacente del verbo פקד.
  spanish_consistency_notes:
  - Se evita 'SEÑOR' para preservar la terminología POB de Yahvé cuando aparezca en el contexto más amplio; aquí no aparece el Tetragrámaton.
  - Se prefiere 'ángel' y no 'mensajero' en el texto principal, siguiendo la decisión auditada y dejando la alternativa en nota.
  - '''Pecado'' traduce חטאת sin convertirlo en culpa legal abstracta; la frase sigue siendo comprensible para lectura pública.'
  - Se mantiene un español neutro y eclesialmente legible, evitando arcaísmos como 'he aquí' salvo que el contexto lo exigiera.
