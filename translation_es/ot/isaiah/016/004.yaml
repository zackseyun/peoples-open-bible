translation:
  language: es
  text: Que los expulsados[a] de Moab se alberguen contigo; sé un refugio para ellos del destructor. Porque el opresor[b] ha llegado a su fin; la destrucción ha cesado; los que pisotean han desaparecido del país.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, siguiendo otra comprensión común: «Que mis expulsados habiten contigo, oh Moab; sé un refugio para él del destructor». Esto refleja otra vocalización/división de las palabras iniciales.'
    reason: alternative_reading
  - marker: b
    text: O, «el extorsionador». El sustantivo hebreo es difícil y su sentido exacto se discute; «opresor» conserva bien el campo semántico en este contexto.
    reason: lexical_alternative
lexical_decisions:
- source_word: יָגוּרוּ בָךְ
  english_pob_choice: stay with you
  chosen_spanish: se alberguen contigo
  alternatives_spanish:
  - permanezcan contigo
  - habiten contigo
  - se queden contigo
  lexicon: HALOT
  rationale: גור expresa residir como forastero o buscar protección temporal. «Se alberguen contigo» conserva la idea de estancia protegida y suena natural en español, sin perder el matiz de refugio implícito en el contexto.
- source_word: נִדָּחַי מוֹאָב
  english_pob_choice: the outcasts of Moab
  chosen_spanish: los expulsados de Moab
  alternatives_spanish:
  - los desterrados de Moab
  - los dispersados de Moab
  - los fugitivos de Moab
  lexicon: HALOT
  rationale: נדח apunta a los que han sido arrojados fuera, expulsados o dispersados. «Expulsados» preserva bien la pasividad del participio y resulta claro para el lector español; «desterrados» también sería posible, pero puede sonar más jurídico que el hebreo aquí.
- source_word: הֱוִי סֵתֶר
  english_pob_choice: be a shelter
  chosen_spanish: sé un refugio
  alternatives_spanish:
  - sé un escondite
  - sé un amparo
  - sé un lugar de abrigo
  lexicon: HALOT
  rationale: סתר designa un lugar oculto o de protección. «Refugio» mantiene la imagen protectora de forma idiomática en español; «escondite» comunica ocultamiento, pero suena más limitado y menos solemne.
- source_word: מִפְּנֵי שׁוֹדֵד
  english_pob_choice: from the destroyer
  chosen_spanish: del destructor
  alternatives_spanish:
  - del devastador
  - del saqueador
  - del plunderer
  lexicon: HALOT
  rationale: שׁודד es un participio activo de despojar/devastar. «Destructor» reproduce la fuerza violenta del agente en un español claro; «saqueador» estrecha demasiado el campo semántico hacia el robo de bienes.
- source_word: אָפֵס
  english_pob_choice: has come to an end
  chosen_spanish: ha llegado a su fin
  alternatives_spanish:
  - ha cesado
  - ya no existe
  - se ha acabado
  lexicon: HALOT
  rationale: אפס expresa llegar a la nada, cesar o terminar. «Ha llegado a su fin» comunica bien el aspecto completado y evita una formulación demasiado literal o dura para el español actual.
- source_word: הַמֵּץ
  english_pob_choice: the oppressor
  chosen_spanish: el opresor
  alternatives_spanish:
  - el extorsionador
  - el aplastador
  - el que exige tributo
  lexicon: HALOT
  rationale: El sustantivo es difícil y puede referirse al opresor/extorsionador. «Opresor» encaja con el campo semántico del contexto y mantiene la ambigüedad documentada sin forzar una precisión que el hebreo no garantiza.
- source_word: כָּלָה שֹׁד
  english_pob_choice: destruction has ceased
  chosen_spanish: la destrucción ha cesado
  alternatives_spanish:
  - ha terminado la devastación
  - el saqueo ha concluido
  - se ha acabado la ruina
  lexicon: HALOT
  rationale: שׁד denota violencia, devastación o saqueo. «La destrucción ha cesado» conserva la paralelismo verbal del versículo y suena natural en español, sin reducir el término a mera rapiña.
- source_word: תַּמּוּ רֹמֵס
  english_pob_choice: those who trample have vanished
  chosen_spanish: los que aplastan han desaparecido
  alternatives_spanish:
  - los que pisan han desaparecido
  - los oprimidores han desaparecido
  - los que pisotean han cesado
  lexicon: HALOT
  rationale: El verbo está en plural y רמס puede tener sentido colectivo de pisotear/aplastar. «Los que aplastan» refleja ese plural y mantiene la imagen de violencia física sin imponer una singularidad no presente en el hebreo.
- source_word: מִן הָאָרֶץ
  english_pob_choice: from the land
  chosen_spanish: de la tierra
  alternatives_spanish:
  - del país
  - del territorio
  - del suelo
  lexicon: HALOT
  rationale: Aunque ארץ puede ser «tierra» o «país», el español «de la tierra» reproduce la amplitud semántica y permite conservar el tono poético del cierre; «del país» sería más político, pero menos abierto.
theological_decisions:
- issue: Alcance del destinatario inicial
  english_pob_reading: The verse addresses a feminine singular figure/location ('you') and petitions her to receive Moab's outcasts.
  chosen_spanish_reading: El verso se dirige a una destinataria femenina singular y le pide que acoja a los expulsados de Moab.
  alternative_spanish_readings:
  - 'Leer el inicio como: «Que mis expulsados habiten contigo, Moab» según otra vocalización/división'
  rationale: El hebreo masorético con la vocalización dada apunta al segundo femenino singular y al grupo como «expulsados de Moab». Esa lectura se mantiene en el texto principal; la alternativa debe preservarse como posibilidad textual distinta, no fundirse sin aviso en la redacción principal.
  doctrine_reference: Translation philosophy §3 (preservar tensiones interpretativas en notas)
- issue: Valor de סתר como imagen protectora
  english_pob_reading: be a shelter
  chosen_spanish_reading: sé un refugio
  alternative_spanish_readings:
  - sé un escondite
  - sé un amparo
  rationale: No hay aquí un término técnico doctrinal, sino una imagen de protección. «Refugio» transmite esa función con naturalidad y sin añadir connotaciones eclesiásticas ajenas al contexto.
  doctrine_reference: 'Principio terminológico POB: mantener la fuerza del hebreo sin reemplazo tradicional innecesario'
translation_notes:
  revision_awareness: Se ha revisado el versículo conforme al texto hebreo masorético y al expediente auditado en inglés. Se mantuvo la lectura principal con destinataria femenina singular, y se preservó en nota la alternativa de vocalización/división documentada por la POB inglesa. No se realizaron cambios respecto de una revisión previa no aportada; la redacción busca fidelidad semántica y claridad natural en español.
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando el texto hebreo lo requiera explícitamente; este versículo no contiene el nombre divino.
  - Se preserva «opresor» como traducción provisional de הַמֵּץ, con nota por la incertidumbre léxica.
  - Se mantiene el plural «los que aplastan» para reflejar תַּמּוּ, evitando singularizar el sujeto.
  - La nota a sigue la alternativa textual documentada por la POB inglesa y se ancla en la frase inicial.
