translation:
  language: es
  text: Había un hombre de la región montañosa de Efraín[a], y su nombre era Mikayhu.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Tradicionalmente se lo traduce «Miqueas». La forma hebrea aquí es Mikayhu.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְהִי
  english_pob_choice: Now there was
  chosen_spanish: Ahora había
  alternatives_spanish:
  - Y había
  - Había
  lexicon: HALOT
  rationale: La forma hebrea introduce un nuevo episodio narrativo. «Ahora había» conserva ese valor de apertura y continuidad narrativa de manera natural en español, sin volver la frase rígida ni omitir el matiz discursivo.
- source_word: אִישׁ
  english_pob_choice: a man
  chosen_spanish: un hombre
  alternatives_spanish:
  - un varón
  - un cierto hombre
  lexicon: HALOT
  rationale: El sustantivo designa de forma directa a una persona masculina. «Un hombre» es la correspondencia más clara y sobria en español; «un cierto hombre» añade una especificación no expresada explícitamente en el hebreo.
- source_word: מֵהַר אֶפְרָיִם
  english_pob_choice: from the hill country of Ephraim
  chosen_spanish: del monte de Efraín
  alternatives_spanish:
  - de la serranía de Efraín
  - de la región montañosa de Efraín
  lexicon: HALOT
  rationale: La frase hebrea puede referirse al territorio elevado asociado con Efraín. En español, «monte de Efraín» es conciso y tradicional, aunque «región montañosa» expresa mejor la idea geográfica. Se mantiene «monte» como opción breve y reconocible, sin perder el sentido de procedencia regional.
- source_word: וּשְׁמוֹ
  english_pob_choice: and his name was
  chosen_spanish: y su nombre era
  alternatives_spanish:
  - y se llamaba
  - y el nombre de él era
  lexicon: HALOT
  rationale: La construcción hebrea es coordinada y simple. «Y su nombre era» reproduce bien la estructura narrativa con naturalidad en español, evitando una reexpresión más libre como «se llamaba».
- source_word: מִיכָיְהוּ
  english_pob_choice: Mikayhu
  chosen_spanish: Mikayhu
  alternatives_spanish:
  - Micaías
  - Miqueas
  lexicon: HALOT
  rationale: Se conserva la transliteración del nombre tal como la audiencia inglesa POB la documenta para este versículo. En español, «Mikayhu» evita sustituir el nombre por la forma tradicional «Miqueas/Micaías», que no refleja con precisión esta grafía hebrea particular.
translation_notes:
  revision_awareness: El texto inglés POB y la revisión más reciente permanecen sin cambios; la versión española sigue de cerca el valor narrativo del hebreo y conserva la transliteración del nombre propia del audit trail.
  spanish_consistency_notes:
  - Se evita «SEÑOR» porque no aparece el nombre divino en este versículo.
  - Se conserva el nombre propio transliterado «Mikayhu» para ser consistente con el criterio POB de reflejar la forma hebrea documentada.
  - «Monte de Efraín» mantiene una formulación bíblica comprensible, aunque el hebreo apunta al área montañosa asociada con Efraín.
