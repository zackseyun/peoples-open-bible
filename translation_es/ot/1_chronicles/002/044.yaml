translation:
  language: es
  text: Sema engendró a Raham[a], padre de Jorkeam; y Requem engendró a Samay.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O bien: «Raham, fundador/antepasado de Jorkeam». La expresión hebrea «padre de» puede señalar una relación fundacional o ancestral, especialmente en genealogías vinculadas con clanes o asentamientos.'
    reason: lexical_alternative
lexical_decisions:
- source_word: הוֹלִיד
  english_pob_choice: fathered
  chosen_spanish: engendró
  alternatives_spanish:
  - fue padre de
  - procreó
  lexicon: HALOT
  rationale: En genealogías, el hifil de ילד indica paternidad/descentencia. «Engendró» conserva esa relación con naturalidad bíblica en español y evita el matiz más explicativo de «fue padre de».},{
translation_notes:
  revision_awareness: La versión inglesa POB mantiene una traducción breve y transparente («fathered» / «the father of») y deja abierta en nota la posibilidad genealógica-fundacional de «padre de». No hay revisiones aplicadas; se conserva esa misma tensión en español.
  spanish_consistency_notes:
  - 'Se mantiene la transliteración de los nombres propios según uso común en español bíblico: Sema, Raham, Jorkeam y Shammai.'
  - Se conserva «padre de» en la nota porque el hebreo אֲבִי puede referirse a paternidad literal o a ancestro/fundador.
