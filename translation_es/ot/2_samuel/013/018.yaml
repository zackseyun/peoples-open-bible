base_translation:
  language: en
  yaml_path: translation/ot/2_samuel/013/018.yaml
  text: Now she was wearing a richly ornamented robe[a], for this is how the virgin daughters of the king used to dress. Then his attendant put her outside and bolted the door behind her.
