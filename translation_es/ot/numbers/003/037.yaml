translation:
  language: es
  text: y los pilares del patio que lo rodean, y sus bases[a], y sus estacas, y sus cuerdas[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «zócalos» o «encajes» para «bases». El término hebreo puede referirse a bases estructurales, especialmente en descripciones del tabernáculo.
    reason: lexical_alternative
  - marker: b
    text: O «sogas» para «cuerdas».
    reason: lexical_alternative
lexical_decisions:
- source_word: עַמֻּדֵי
  english_pob_choice: pillars
  chosen_spanish: pilares
  alternatives_spanish:
  - postes
  - columnas
  lexicon: HALOT
  rationale: El plural en estado constructo designa los soportes verticales del recinto. «Pilares» conserva la fuerza arquitectónica de la imagen y es natural en español bíblico contemporáneo.
- source_word: הֶחָצֵר
  english_pob_choice: courtyard
  chosen_spanish: patio
  alternatives_spanish:
  - atrio
  - recinto
  lexicon: HALOT
  rationale: En el contexto del tabernáculo, «courtyard» apunta al área cercada exterior. «Patio» comunica bien en español moderno; «atrio» es posible, pero puede sonar más eclesiástico que descriptivo.
- source_word: סָבִיב
  english_pob_choice: surrounding
  chosen_spanish: alrededor
  alternatives_spanish:
  - rodeando
  - en torno
  lexicon: HALOT
  rationale: La idea es perimetral; en español, «alrededor» expresa de forma natural que los pilares rodeaban el patio.
- source_word: אַדְנֵיהֶם
  english_pob_choice: their bases
  chosen_spanish: sus bases
  alternatives_spanish:
  - sus zócalos
  - sus sockets
  lexicon: HALOT
  rationale: En listas del tabernáculo el término puede aludir a bases o encajes estructurales. «Bases» reproduce la opción POB en inglés y es suficientemente clara; «zócalos» o «sockets» resultarían más técnicos o menos naturales.
- source_word: יְתֵדֹתָם
  english_pob_choice: their pegs
  chosen_spanish: sus estacas
  alternatives_spanish:
  - sus clavijas
  - sus piquetes
  lexicon: HALOT
  rationale: Aunque el inglés POB usa «pegs», en español «estacas» comunica mejor el elemento de sujeción del recinto. Se evita «clavijas» por sonar demasiado pequeño o mecánico para este contexto.
- source_word: מֵיתְרֵיהֶם
  english_pob_choice: their cords
  chosen_spanish: sus cuerdas
  alternatives_spanish:
  - sus sogas
  - sus cordeles
  lexicon: HALOT
  rationale: «Cords» se rinde de forma directa con «cuerdas», manteniendo el par funcional con «estacas» y la imagen de sujeción del tabernáculo.
- source_word: וְ
  english_pob_choice: and
  chosen_spanish: y
  lexicon: HALOT
  rationale: Se conserva la repetición conjuntiva del hebreo para mantener el estilo enumerativo de la lista.
translation_notes:
  revision_awareness: 'El texto sigue de cerca el hebreo y la solución inglesa POB: inventario enumerativo, con terminología arquitectónica consistente. No se detectaron revisiones textuales o cambios de sentido en el pasaje base.'
  spanish_consistency_notes:
  - Se mantuvo el paralelismo de la lista con comas y la conjunción final «y».
  - Se prefirió «patio» por claridad moderna, pero se dejó constancia de la alternativa «atrio» en nota.
  - «Bases» y «estacas» conservan el tono funcional del mobiliario del tabernáculo sin añadir explicaciones al texto principal.
