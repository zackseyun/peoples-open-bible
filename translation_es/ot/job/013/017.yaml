translation:
  language: es
  text: Escuchen atentamente mi palabra, y que mi declaración[a] esté en sus oídos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «mi expresión» o «mi explicación» para «mi declaración».
    reason: lexical_alternative
lexical_decisions:
- source_word: שִׁמְעוּ שָׁמוֹעַ
  english_pob_choice: Listen carefully
  chosen_spanish: Escuchen atentamente
  alternatives_spanish:
  - Oigan con atención
  - Escuchen con atención
  - Oigan atentamente
  lexicon: HALOT
  rationale: El verbo finito más el infinitivo absoluto intensifican la orden. En español, «escuchen atentamente» comunica bien esa insistencia sin una repetición pesada o artificial.
- source_word: מִלָּתִי
  english_pob_choice: my word
  chosen_spanish: mi palabra
  alternatives_spanish:
  - mi palabra dada
  - mi dicho
  - mi discurso
  lexicon: HALOT
  rationale: מִלָּה puede significar «palabra» o «habla». «Mi palabra» preserva la forma singular y la apelación solemne del hebreo. «Mi discurso» suena más amplio de lo que exige el texto.
- source_word: וַאֲחֲוָתִי
  english_pob_choice: my declaration
  chosen_spanish: mi declaración
  alternatives_spanish:
  - mi exposición
  - mi explicación
  - lo que declaro
  lexicon: HALOT
  rationale: El sustantivo derivado de חוה aquí apunta a algo expuesto o declarado formalmente. «Mi declaración» conserva ese carácter deliberado y solemne; «mi explicación» sería más interpretativa.
- source_word: בְּאָזְנֵיכֶם
  english_pob_choice: in your ears
  chosen_spanish: en sus oídos
  alternatives_spanish:
  - ante sus oídos
  - para sus oídos
  - en su audición
  lexicon: HALOT
  rationale: La imagen hebrea es literalmente «en sus oídos». Mantenerla en español conserva la concreción y la fuerza retórica del hebreo. Se usa «sus» por concordancia con el plural de respeto general en español bíblico contemporáneo.
translation_notes:
  revision_awareness: La revisión auditada indica alto acuerdo y sin cambios necesarios; se mantiene la equivalencia óptima del inglés POB, pero con ajuste natural al español conservando la imagen hebrea de «en sus oídos».
  spanish_consistency_notes:
  - Se mantiene «Dios»/«Yahvé» fuera de este verso porque no aparecen en el texto fuente.
  - Se preserva la intensidad del infinitivo absoluto con un adverbio natural en español («atentamente»).
  - La preposición se mantiene literal como imagen corporal («en sus oídos»), coherente con el audit trail inglés.
