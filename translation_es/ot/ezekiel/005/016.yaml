revisions:
- from: Cuando envíe contra ellos las flechas mortales[a] del hambre, que son para destrucción, las cuales enviaré para destruirlos[b], entonces añadiré hambre sobre ustedes y quebrantaré para ustedes el bastón del pan.
  to: Cuando envíe contra ellos las flechas mortales[a] del hambre, que son para destrucción, que enviaré para destruirlos, entonces añadiré hambre sobre ustedes y quebraré para ustedes el sostén del pan[b].
  rationale: Se corrige el anclaje obligatorio de la nota [b] al sintagma que realmente explica el modismo hebreo. Además, se mejora la naturalidad del español con «que» en vez de «las cuales» y con «sostén del pan», que conserva la imagen de apoyo/sustento de מַטֵּה לָחֶם sin volverla opaca en español. Se mantiene la agencia divina directa y la imaginería de juicio del texto fuente.
