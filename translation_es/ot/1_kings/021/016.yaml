  yaml_path: translation/ot/1_kings/021/016.yaml
  text: And when Ahab heard that Naboth was dead[a], Ahab arose to go down to the vineyard of Naboth the Jezreelite[b], to take possession of it.
  footnotes:
  - marker: a
    text: Or 'had died.' The Hebrew can be rendered either as a resulting state ('was dead') or as the completed event ('had died').
    reason: lexical_alternative
  - marker: b
    text: Or 'to possess it' or 'to inherit it.' The Hebrew verb can denote taking possession, possessing, or inheriting, depending on context.
    reason: lexical_alternative
