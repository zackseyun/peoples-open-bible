review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien la estructura básica del hebreo: marco temporal («En sus días»), florecimiento del justo, abundancia de paz y duración poética «hasta que no haya luna». Sin embargo, se aparta del criterio principal documentado en el English POB para צַדִּיק, que eligió como lectura principal el sentido colectivo («the righteous»), dejando la lectura singular como alternativa en nota. En español, «el justo» desplaza indebidamente esa decisión hacia el singular en el texto principal.'
  spanish_quality_summary: El español es claro y natural en general. «y habrá abundancia de paz» fluye bien, y «hasta que no haya luna» es comprensible y poético. No obstante, la nota [b] sobre la cláusula nominal es metatraductológica y no necesaria para el lector final; además, la distribución de notas puede simplificarse para concentrarse en alternativas semánticas reales y en la imagen poética.
  glossary_alignment: 'No hay conflictos con la terminología base del proyecto. «Paz» para שָׁלוֹם y «florecerá» para יִפְרַח son adecuados. El ajuste clave es alinear צַדִּיק con la decisión auditada principal: «los justos» en el texto, con nota para la alternativa «el justo».'
  issues:
  - severity: high
    issue: La traducción principal de צַדִּיק como «el justo» no sigue la decisión principal auditada del POB.
    rationale: El registro inglés adoptó como lectura principal el sentido colectivo («the righteous») y reservó «the righteous one» como alternativa. El español invierte esa prioridad sin justificación suficiente.
  - severity: medium
    issue: La nota [b] explica una técnica de traducción en vez de aportar una alternativa o aclaración relevante para el lector bíblico.
    rationale: La elipsis del verbo en hebreo no necesita explicarse aquí en la edición final; basta con una redacción natural en español.
  - severity: low
    issue: La nota [c] sobre «abundancia» introduce opciones menos precisas que no están especialmente necesarias en español.
    rationale: «Abundancia» comunica bien רֹב. Si se mantiene una nota léxica, conviene enfocarla en שָׁלוֹם, como hace el English POB, no en una alternativa estilística poco significativa para רֹב.
  revised_spanish_text: En sus días los justos[a] florecerán, y habrá abundancia de paz[b] hasta que no haya luna[c].
