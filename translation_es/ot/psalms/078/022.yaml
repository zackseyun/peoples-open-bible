translation:
  language: es
  text: porque no creyeron a Dios, y no confiaron en su salvación[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «su liberación». El término hebreo puede referirse al rescate del peligro, así como a la salvación en un sentido más amplio.
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  english_pob_choice: because
  chosen_spanish: porque
  alternatives_spanish:
  - pues
  - ya que
  lexicon: HALOT
  rationale: Aquí introduce la causa de la reacción divina previa; «porque» expresa con naturalidad la relación causal en español sin perder el valor explicativo del hebreo.
- source_word: הֶאֱמִינוּ
  english_pob_choice: believe
  chosen_spanish: creyeron
  alternatives_spanish:
  - tuvieron fe
  - pusieron su confianza
  lexicon: HALOT
  rationale: El verbo en hifil de אמן apunta a creer/considerar verdadero. En español, «creer a Dios» preserva mejor la fuerza relacional del hebreo que «creer en Dios», y mantiene el contraste con el segundo verbo, בטח, que se vierte como confiar.
- source_word: בֵּאלֹהִים
  english_pob_choice: God
  chosen_spanish: a Dios
  alternatives_spanish:
  - en Dios
  lexicon: HALOT
  rationale: 'La construcción hebrea con ב admite una relación dirigida al objeto de fe. En español, con el verbo «creer», la preposición más natural y fiel al matiz de credibilidad es «a»: «creer a Dios».'
- source_word: בָטְחוּ
  english_pob_choice: trust
  chosen_spanish: confiaron
  alternatives_spanish:
  - depositaron su confianza
  - se apoyaron
  lexicon: HALOT
  rationale: בטח denota confianza/reliance. «Confiaron» es el equivalente más directo y mantiene la distinción lexical con «creyeron».
- source_word: בִּישׁוּעָתוֹ
  english_pob_choice: his salvation
  chosen_spanish: su salvación
  alternatives_spanish:
  - su liberación
  - su rescate
  lexicon: HALOT
  rationale: ישועה puede referirse a salvación o a liberación concreta. «Salvación» conserva el valor teológico más amplio y sigue el criterio POB, sin excluir el sentido histórico de rescate en el salmo.
theological_decisions:
- issue: Alcance de יְשׁוּעָה / ישועה
  english_pob_reading: salvation
  chosen_spanish_reading: salvación
  alternative_spanish_readings:
  - liberación
  - rescate
  rationale: El contexto histórico remite a rescates concretos, pero la palabra también tiene alcance teológico más amplio. «Salvación» preserva ambas capas sin estrechar indebidamente el sentido.
  doctrine_reference: Translation philosophy §5 (consistency of key terms, or documented exception)
translation_notes:
  revision_awareness: Se siguió la revisión auditada del POB en inglés que cambió «believe in God» por «believe God» para reflejar con mayor precisión la construcción hebrea y distinguirla de «trust in his salvation».
  spanish_consistency_notes:
  - Se mantuvo la distinción entre el acto de creer y el de confiar, reflejando los dos verbos hebreos diferentes.
  - Se prefirió «salvación» como término principal, con nota de alternativa «liberación/rescate» por la amplitud semántica de ישועה.
  - Se evitó la fórmula eclesiástica «creer en Dios» porque en este contexto oscurece la relación textual más precisa del hebreo.
