  to: Y sucedió en el noveno año de su reinado, en el décimo mes, el día diez del mes, que Nabucodonosor, rey de Babilonia, vino, él y todo su ejército, contra Jerusalén, y acampó contra ella, y construyeron contra ella una muralla de asedio[a] alrededor.
