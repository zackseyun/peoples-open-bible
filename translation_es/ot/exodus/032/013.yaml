review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura y el sentido del hebreo: imperativo de intercesión («Acuérdate»), nombres patriarcales con «Israel», «tus siervos», el juramento «por ti mismo», la promesa de multiplicar la descendencia, la tierra prometida y la herencia perpetua. La nota sobre «Israel/Jacob» también preserva la decisión auditada. Sin embargo, hay una incongruencia pronominal importante dentro de la cita: el hebreo tiene 2mp («vuestra descendencia» dirigido a Abraham, Isaac e Israel colectivamente), pero el español usa singular («tu descendencia») dos veces. Esto reduce la fidelidad gramatical al original y debe corregirse.'
  spanish_quality_summary: El español es claro, digno y muy legible. «Acuérdate», «por ti mismo» y «la heredarán para siempre» suenan naturales en registro bíblico moderno. La sintaxis de la promesa funciona bien. El único problema de calidad es la inconsistencia de número pronominal, que además puede distraer al lector. Corregido eso, el texto queda fuerte y natural.
  glossary_alignment: 'Buena alineación con la terminología del proyecto: «Israel» se conserva correctamente con nota alternativa; «siervos» está justificado contextualmente para עֲבָדֶיךָ; «descendencia» representa bien זרע; no hay conflicto con términos de alto perfil como Yahvé/Mesías. La excepción contextual «siervos» frente a «esclavos» está adecuadamente documentada.'
  issues:
  - severity: medium
    issue: Pronombre de segunda persona en singular donde el hebreo tiene plural
    rationale: זַרְעֲכֶם / לְזַרְעֲכֶם llevan sufijo 2mp, refiriéndose colectivamente a Abraham, Isaac e Israel. «Tu descendencia» debe ser «su descendencia» o, menos recomendable en un discurso a Dios, otra forma que preserve el plural/colectivo. En español, «su descendencia» encaja naturalmente en discurso indirecto dentro de la cita.
  - severity: low
    issue: Leve tensión estilística entre discurso directo y formulación de discurso referido
    rationale: 'Dentro de las comillas, «que dije que daría» funciona, pero con la corrección pronominal conviene mantener una formulación más claramente coherente: «que dije que daría a su descendencia». No es un error mayor, solo un ajuste de fluidez y concordancia.'
  revised_spanish_text: 'Acuérdate de Abraham, Isaac e Israel[a], tus siervos, a quienes juraste por ti mismo y les dijiste: «Multiplicaré su descendencia como las estrellas de los cielos, y toda esta tierra que dije que daría a su descendencia, y la heredarán para siempre».'
  revised_footnotes:
  - marker: a
    text: O «Jacob», el patriarca que después recibió el nombre de Israel. El hebreo aquí dice «Israel».
    reason: lexical_alternative
  revision_rationale: Se corrigió «tu descendencia» a «su descendencia» en ambas ocurrencias para reflejar fielmente el sufijo plural hebreo dirigido a los tres patriarcas colectivamente, sin perder naturalidad en español. Se mantuvo el resto del texto porque preserva bien el sentido fuente, la decisión teológica sobre «Israel» y la legibilidad bíblica en español.
