translation:
  language: es
  text: Desde allí partieron y acamparon al otro lado del Arnón[a], que está en el desierto que se extiende desde el límite de los amorreos[b]; pues el Arnón es el límite de Moab, entre Moab y los amorreos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'del otro lado del Arnón'. La expresión hebrea puede señalar el lado opuesto o la región al otro lado de un límite, según el punto de vista.
    reason: lexical_alternative
  - marker: b
    text: Literalmente, 'que sale del límite del amorreo'. El sentido es que el desierto se extiende desde el límite amorreo.
    reason: lexical_alternative
lexical_decisions:
- source_word: מִשָּׁם
  english_pob_choice: From there
  chosen_spanish: Desde allí
  alternatives_spanish:
  - De allí
  - Desde ese lugar
  lexicon: HALOT
  rationale: Expresa con naturalidad el punto de partida narrativo y conserva el avance secuencial del hebreo.
- source_word: נָסָעוּ
  english_pob_choice: they set out
  chosen_spanish: partieron
  alternatives_spanish:
  - se pusieron en camino
  - siguieron viaje
  lexicon: HALOT
  rationale: En contexto de viaje y cambio de campamento, 'partieron' comunica bien la acción de salir de un lugar para seguir la marcha.
- source_word: וַיַּחֲנוּ
  english_pob_choice: and camped
  chosen_spanish: acamparon
  alternatives_spanish:
  - y acamparon
  - y plantaron el campamento
  lexicon: HALOT
  rationale: '''Acamparon'' reproduce el acto de instalarse para pasar la noche o permanecer allí; ''acamparon'' es claro y directo en español.'
- source_word: מֵעֵבֶר אַרְנוֹן
  english_pob_choice: on the other side of the Arnon
  chosen_spanish: al otro lado del Arnón
  alternatives_spanish:
  - más allá del Arnón
  - del otro lado del Arnón
  lexicon: HALOT
  rationale: '''מֵעֵבֶר'' puede señalar el lado opuesto respecto de una referencia geográfica. ''Al otro lado de'' mantiene esa perspectiva sin cerrar innecesariamente la localización.'
- source_word: אֲשֶׁר בַּמִּדְבָּר
  english_pob_choice: which is in the wilderness
  chosen_spanish: que está en el desierto
  alternatives_spanish:
  - que se encuentra en el desierto
  lexicon: HALOT
  rationale: '''מִדְבָּר'' aquí nombra la región deshabitada o semidesértica; ''desierto'' es el equivalente más natural en español bíblico contemporáneo.'
- source_word: הַיֹּצֵא מִגְּבוּל הָאֱמֹרִי
  english_pob_choice: that extends from the border of the Amorites
  chosen_spanish: que sale del límite de los amorreos
  alternatives_spanish:
  - que se extiende desde el límite de los amorreos
  - que emerge del límite de los amorreos
  lexicon: HALOT
  rationale: El participio yָצָא conserva con más fuerza la idea de 'salir'. Aunque 'se extiende' sería más idiomático, aquí se mantiene la imagen geográfica del hebreo. 'Límite' traduce גְּבוּל de modo consistente.
- source_word: גְּבוּל
  english_pob_choice: border
  chosen_spanish: límite
  alternatives_spanish:
  - frontera
  - borde
  lexicon: HALOT
  rationale: '''Límite'' funciona bien para una demarcación territorial y evita la connotación moderna de frontera política estricta; además preserva la repetición del término en ambos miembros del verso.'
- source_word: הָאֱמֹרִי
  english_pob_choice: the Amorites
  chosen_spanish: los amorreos
  alternatives_spanish:
  - el amorreo
  lexicon: HALOT
  rationale: Aunque la forma hebrea es singular, el referente es colectivo; el plural español es natural para el pueblo/territorio en este contexto.
- source_word: כִּי
  english_pob_choice: for
  chosen_spanish: porque
  alternatives_spanish:
  - pues
  - ya que
  lexicon: HALOT
  rationale: Introduce la razón o explicación del dato geográfico anterior. 'Porque' expresa bien la relación causal/explanatoria en español.
- source_word: אַרְנוֹן גְּבוּל מוֹאָב
  english_pob_choice: the Arnon is the border of Moab
  chosen_spanish: el Arnón es el límite de Moab
  alternatives_spanish:
  - el Arnón es la frontera de Moab
  - el Arnón marca el límite de Moab
  lexicon: HALOT
  rationale: Se conserva la cláusula nominal del hebreo con un verbo copulativo implícito en español. 'Límite' mantiene la coherencia con גְּבוּל arriba.
- source_word: בֵּין מוֹאָב וּבֵין הָאֱמֹרִי
  english_pob_choice: between Moab and the Amorites
  chosen_spanish: entre Moab y los amorreos
  alternatives_spanish:
  - entre Moab y el amorreo
  lexicon: HALOT
  rationale: La construcción 'entre... y...' expresa la función de separación territorial. Se mantiene el plural colectivo 'los amorreos' por consistencia y naturalidad.
translation_notes:
  revision_awareness: La redacción sigue el sentido confirmado por la revisión más reciente del POB inglés, que prefirió 'on the other side of the Arnon' por precisión geográfica. En español se reflejó con 'al otro lado del Arnón', manteniendo la misma cautela de perspectiva. También se preservó la tensión léxica de הַיֹּצֵא mediante una nota que deja visible la alternativa más literal ('sale') junto con la interpretación geográfica ('se extiende').
  spanish_consistency_notes:
  - Se usa 'Yahvé' solo cuando aparece el nombre divino; en este versículo no aparece.
  - Se traduce מִדְבָּר como 'desierto' por ser el equivalente bíblico más natural en español, sin implicar necesariamente un desierto árido moderno.
  - Se mantiene 'Arnón' y no se latiniza el topónimo para conservar la forma bíblica estándar en español.
  - Se usa 'límite' de manera consistente para גְּבוּל en ambos miembros del versículo.
