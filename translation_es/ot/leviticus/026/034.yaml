translation:
  language: es
  text: Entonces la tierra recuperará[a] sus sábados[b] todos los días de su desolación, mientras ustedes estén en la tierra de sus enemigos; entonces la tierra descansará y recuperará[a] sus sábados[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «disfrutará de sus sábados» o «será compensada por sus sábados». El verbo hebreo expresa aquí que la tierra recibe lo que se le debía por los descansos sabáticos omitidos.
    reason: lexical_alternative
  - marker: b
    text: Literalmente, «sus sábados»; se refiere a sus descansos sabáticos, especialmente a los años sabáticos de la tierra en este contexto.
    reason: lexical_alternative
lexical_decisions:
- source_word: אָז
  english_pob_choice: Then
  chosen_spanish: Entonces
  alternatives_spanish:
  - En ese tiempo
  - Luego
  lexicon: HALOT
  rationale: Marca consecuencia temporal y resultado del juicio previo; «Entonces» es natural en español y conserva la relación consecutiva.
- source_word: תִּרְצֶה / וְהִרְצָת
  english_pob_choice: enjoy / enjoy
  chosen_spanish: disfrutará / disfrutará
  alternatives_spanish:
  - compensará / compensará
  - hará expiación por / hará expiación por
  - hará resarcimiento por / hará resarcimiento por
  lexicon: HALOT
  rationale: El verbo hebreo aquí tiene el sentido de que la tierra recibe lo debido respecto de sus sábados. Dado el audit trail inglés, «disfrutará» conserva la decisión publicada, aunque en español puede sonar más personal; se mantiene por fidelidad al rastro textual y se acompaña de nota explicativa.
- source_word: הָאָרֶץ
  english_pob_choice: the land
  chosen_spanish: la tierra
  alternatives_spanish:
  - el país
  - la región
  lexicon: HALOT
  rationale: En Levítico se refiere a la tierra del pacto, no a la tierra en sentido planetario. «La tierra» es el equivalente contextual más natural en español.
- source_word: שַׁבְּתֹתֶיהָ
  english_pob_choice: its Sabbaths
  chosen_spanish: sus sábados
  alternatives_spanish:
  - sus reposos sabáticos
  - sus descansos sabáticos
  lexicon: HALOT
  rationale: El término alude a los descansos sabáticos de la tierra, especialmente los años sabáticos en contexto. «Sábados» preserva la forma breve y reconocible del hebreo; se aclara con nota para evitar una lectura litúrgica estrecha.
- source_word: כֹּל יְמֵי הֳשַׁמָּה
  english_pob_choice: all the days of its desolation
  chosen_spanish: todos los días de su desolación
  alternatives_spanish:
  - durante todo el tiempo de su desolación
  - todos los días mientras esté desolada
  lexicon: HALOT
  rationale: Expresa la duración completa del estado arruinado de la tierra. «Su desolación» refleja el sufijo pronominal y suena idiomático en español.
- source_word: וְאַתֶּם בְּאֶרֶץ אֹיְבֵיכֶם
  english_pob_choice: while you are in the land of your enemies
  chosen_spanish: mientras ustedes estén en la tierra de sus enemigos
  alternatives_spanish:
  - mientras estén en la tierra de sus enemigos
  - y ustedes están en la tierra de sus enemigos
  lexicon: HALOT
  rationale: La cláusula funciona de manera circunstancial, indicando el período del exilio. «Mientras ustedes estén» comunica bien la simultaneidad temporal en español moderno.
- source_word: תִּשְׁבַּת
  english_pob_choice: will rest
  chosen_spanish: descansará
  alternatives_spanish:
  - reposará
  - cesará
  lexicon: HALOT
  rationale: Deriva de שבת y describe el cese de la actividad agrícola. «Descansará» es claro, digno y coherente con el tema sabático.
- source_word: וְהִרְצָת
  english_pob_choice: enjoy
  chosen_spanish: disfrutará
  alternatives_spanish:
  - compensará
  - resarcirá
  lexicon: HALOT
  rationale: Se conserva la misma raíz en ambas apariciones para reproducir la repetición del hebreo y el patrón del inglés auditado. La nota explica la tensión entre la forma publicada y el sentido compensatorio del contexto.
theological_decisions:
- issue: La relación de la tierra con sus sábados en el juicio del exilio
  english_pob_reading: The land receives compensation for neglected Sabbath rests during Israel's exile.
  chosen_spanish_reading: La tierra recibe, de manera figurada, lo debido por los sábados omitidos durante el exilio.
  alternative_spanish_readings:
  - La tierra disfruta de sus sábados
  - La tierra queda satisfecha con sus sábados
  rationale: El contexto de Levítico 26 es la sanción del pacto por no guardar los ritmos sabáticos. En español, «disfruta» se mantiene por fidelidad al texto inglés auditado, pero la lectura teológica se explica como retribución/compensación para evitar una personificación psicológica impropia.
  doctrine_reference: Levítico 26:34-35; cf. Levítico 25:2-4
translation_notes:
  revision_awareness: El inglés POB revisó la frase desde «make up for» a «enjoy» para reflejar más directamente el verbo hebreo. La versión española conserva esa decisión auditada con «disfrutará», pero añade una nota para preservar la tensión semántica del contexto, donde el sentido es de retribución/compensación por los sábados omitidos.
  spanish_consistency_notes:
  - Se usó «tierra» para הָאָרֶץ en sentido del territorio del pacto, no «mundo» ni «suelo».
  - Se mantuvo la repetición del verbo con el mismo lexema español («disfrutará») para reflejar la duplicación hebrea y el paralelismo del verso.
  - «Sábados» se conserva como equivalente breve de שַׁבְּתֹתֶיהָ, con aclaración de su alcance sabático en nota.
  - Se prefirió «descansará» para שבת porque describe naturalmente el cese de actividad de la tierra en español.
  - El pronombre de segunda persona plural se expresó con «ustedes» para una lectura neutral latinoamericana y eclesialmente amplia.
