  to: 'Nabucodonosor respondió y les dijo: «¿Es verdad[a], Sadrac, Mesac y Abed-nego, que ustedes no sirven a mi dios y no se postran ante la imagen de oro que he levantado?»'
  rationale: Se corrigió la persona gramatical para reflejar la segunda persona plural del original y del inglés POB. También se mejoró la naturalidad española con «les dijo» y se ancló la nota al pie directamente en «¿Es verdad[a]» para que corresponda con la palabra explicada.
