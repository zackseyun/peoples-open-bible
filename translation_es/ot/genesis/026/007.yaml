revisions:
- from: 'Y cuando los hombres del lugar preguntaron por su esposa[a], él dijo: «Es mi hermana», porque tenía miedo de decir: «Es mi esposa», no fuera que los hombres del lugar me mataran por causa de Rebeca, pues ella era de hermoso aspecto.'
  to: 'Cuando los hombres del lugar preguntaron por su esposa, él dijo: «Es mi hermana», porque tenía miedo de decir: «Es mi esposa», no fuera que[a] los hombres del lugar me mataran por causa de Rebeca, pues ella era de hermoso aspecto.'
  rationale: Se conserva la traducción base porque es fiel y natural, pero se corrige la ubicación de la nota al pie para que corresponda a פֶּן / «no fuera que», y se elimina la conjunción inicial «Y» para un español más fluido sin alterar el sentido del hebreo.
