  - severity: low
    issue: Nota al pie algo expansiva con «animadores»
    rationale: La nota inglesa habla de «musicians» o más ampliamente de entertainers/diversions. «Animadores» introduce un matiz moderno menos adecuado al tono y no es necesario para preservar la incertidumbre léxica.
