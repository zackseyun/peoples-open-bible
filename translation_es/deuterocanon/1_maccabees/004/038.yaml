translation:
  language: es
  text: Y vieron nuestro santuario devastado, y el altar profanado[a], y las puertas quemadas, y en los atrios plantas creciendo como en un matorral o como en una de las montañas, y las dependencias[b] derribadas.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: "contaminado ritualmente" para "profanado". El griego enfatiza la desacralización de lo que es santo.'
    reason: lexical_alternative
  - marker: b
    text: El término griego se refiere a habitaciones o dependencias asociadas al complejo del templo; el matiz arquitectónico exacto es incierto.
    reason: cultural_note
lexical_decisions:
- source_word: ἁγίασμα
  english_pob_choice: sanctuary
  chosen_spanish: santuario
  alternatives_spanish:
  - lugar santo
  - recinto santo
  lexicon: LSJ
  rationale: En este contexto del templo, ἁγίασμα designa el recinto sagrado más que una abstracción de santidad. 'Santuario' es el equivalente natural en español y conserva el sentido cultual.
- source_word: ἠρημωμένον
  english_pob_choice: laid waste
  chosen_spanish: devastado
  alternatives_spanish:
  - desolado
  - asolado
  lexicon: LSJ
  rationale: El participio expresa ruina y abandono. 'Devastado' comunica bien esa destrucción en español moderno sin perder fuerza.
- source_word: θυσιαστήριον
  english_pob_choice: altar
  chosen_spanish: altar
  lexicon: LSJ
  rationale: Término cultual directo y estable; no hay razón contextual para variar.
- source_word: βεβηλωμένον
  english_pob_choice: defiled
  chosen_spanish: profanado
  alternatives_spanish:
  - contaminado ritualmente
  - deshonrado
  lexicon: LSJ
  rationale: El griego enfatiza la profanación de lo sagrado. 'Profanado' mantiene ese matiz mejor que un simple daño material.
- source_word: πύλας
  english_pob_choice: gates
  chosen_spanish: puertas
  alternatives_spanish:
  - portones
  - entradas
  lexicon: LSJ
  rationale: En el español bíblico, 'puertas' reproduce con naturalidad las entradas del complejo del templo.
- source_word: κατακεκαυμένας
  english_pob_choice: burned down
  chosen_spanish: quemadas
  alternatives_spanish:
  - incendiadas
  - quemadas por completo
  lexicon: LSJ
  rationale: La forma perfecta intensiva indica destrucción por fuego ya consumada. 'Quemadas' es conciso y fiel; el contexto de ruina ya comunica la totalidad del daño.
- source_word: αὐλαῖς
  english_pob_choice: courts
  chosen_spanish: atrios
  alternatives_spanish:
  - patios
  - cortes
  lexicon: LSJ
  rationale: Para un recinto del templo, 'atrios' es un término culto y comprensible en español bíblico, equivalente a 'courts' sin recargarlo de tecnicismo.
- source_word: φυτὰ πεφυκότα
  english_pob_choice: plants growing
  chosen_spanish: plantas creciendo
  alternatives_spanish:
  - vegetación brotando
  - plantas que habían crecido
  lexicon: LSJ
  rationale: La frase subraya crecimiento descontrolado. 'Plantas creciendo' sigue de cerca el griego y mantiene la imagen de vegetación espontánea.
- source_word: δρυμῷ
  english_pob_choice: thicket
  chosen_spanish: matorral
  alternatives_spanish:
  - monte espeso
  - boscaje
  lexicon: LSJ
  rationale: La comparación apunta a vegetación silvestre y densa. 'Matorral' expresa bien esa idea en español actual.
- source_word: ὀρέων
  english_pob_choice: mountains
  chosen_spanish: montañas
  alternatives_spanish:
  - montes
  - cerros
  lexicon: LSJ
  rationale: El plural es directo; 'montañas' conserva la sencillez de la comparación del texto griego.
- source_word: παστοφόρια
  english_pob_choice: chambers
  chosen_spanish: cámaras
  alternatives_spanish:
  - habitaciones
  - dependencias
  lexicon: LSJ
  rationale: La revisión inglesa prefirió un término más directo que 'side chambers'. 'Cámaras' reproduce de forma sobria y suficientemente abierta las estancias asociadas al templo sin sobreespecificarlas.
- source_word: καθῃρημένα
  english_pob_choice: torn down
  chosen_spanish: derribadas
  alternatives_spanish:
  - demolidas
  - desmanteladas
  lexicon: LSJ
  rationale: El participio indica que esas estructuras habían sido abatidas o desmontadas. 'Derribadas' es natural en español y conserva la idea de ruina estructural.
theological_decisions:
- issue: Profanación del altar y del santuario
  english_pob_reading: sanctuary laid waste; the altar defiled
  chosen_spanish_reading: santuario devastado; el altar profanado
  alternative_spanish_readings:
  - santuario desolado; el altar contaminado ritualmente
  - santuario asolado; el altar mancillado
  rationale: Conviene conservar la doble idea de ruina material y desacralización. 'Profanado' mantiene el peso ritual del griego βεβηλωμένον y evita reducirlo a daño físico.
  doctrine_reference: Templo / santidad cultual
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión inglesa que cambió 'side chambers' por 'chambers'; por eso se optó por 'cámaras' sin añadir una aclaración interpretativa innecesaria. También se evitó traducir mecánicamente 'courts' como 'cortes' y se eligió 'atrios' por su naturalidad cultual en español.
  spanish_consistency_notes:
  - Se mantuvo el paralelo entre ruina material y profanación ritual.
  - Se evitó 'Señor' o máscaras del nombre divino, pues el versículo no contiene el nombre de Yahvé.
  - '''Santuario'' y ''atrio'' conservan el registro bíblico sin depender de calcos ingleses.'
  - Las notas al pie están ancladas explícitamente en el texto con [a] y [b].
