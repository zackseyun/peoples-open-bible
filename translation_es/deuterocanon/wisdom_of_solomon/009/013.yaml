translation:
  language: es
  text: Porque ¿qué hombre podrá conocer el consejo de Dios? ¿O quién podrá discernir lo que quiere el Señor?[a]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Porque ¿qué hombre podrá conocer el propósito de Dios? ¿O quién podrá pensar a fondo lo que el Señor quiere?»'
    reason: lexical_alternative
lexical_decisions:
- source_word: τίς γὰρ ἄνθρωπος
  english_pob_choice: For what man
  chosen_spanish: ¿qué hombre
  alternatives_spanish:
  - ¿qué ser humano
  - ¿qué persona
  lexicon: LSJ
  rationale: ἄνθρωπος es singular y genérico. En español, «qué hombre» conserva el paralelismo retórico y la fuerza de la pregunta mejor que una neutralización que suavice la forma del griego. Se mantiene el valor genérico sin perder naturalidad.
- source_word: γνώσεται
  english_pob_choice: can know
  chosen_spanish: podrá conocer
  alternatives_spanish:
  - podrá saber
  - llegará a conocer
  lexicon: LSJ
  rationale: En esta pregunta retórica, el futuro medio expresa capacidad real, no simple tiempo. «Podrá conocer» comunica adecuadamente la imposibilidad implícita y suena natural en español.
- source_word: βουλὴν
  english_pob_choice: the counsel
  chosen_spanish: el consejo
  alternatives_spanish:
  - el plan
  - el propósito
  - la intención
  lexicon: LSJ
  rationale: βουλή puede significar consejo, plan o propósito. Aquí se eligió «consejo» porque en español refleja mejor la idea de deliberación y designio divino que el griego transmite, y sigue de cerca la opción auditada del inglés POB.
- source_word: θεοῦ
  english_pob_choice: of God
  chosen_spanish: de Dios
  lexicon: LSJ
  rationale: Genitivo directo y transparente; no requiere matiz adicional en español.
- source_word: ἐνθυμηθήσεται
  english_pob_choice: can discern
  chosen_spanish: podrá discernir
  alternatives_spanish:
  - podrá reflexionar sobre
  - podrá pensar through
  lexicon: LSJ
  rationale: El verbo apunta a pensar interiormente, considerar o ponderar. En esta pregunta paralela, «podrá discernir» expresa la idea de captar con acierto lo que el Señor quiere, no solo de pensar en ello.
- source_word: τί θέλει
  english_pob_choice: what ... wills
  chosen_spanish: lo que quiere
  alternatives_spanish:
  - lo que desea
  - lo que quiere
  lexicon: LSJ
  rationale: θέλει expresa voluntad o deseo. «Quiere» es la forma más natural y fiel en español para esta pregunta sobre la voluntad divina; «desea» sería posible, pero suena menos directo aquí.
- source_word: ὁ κύριος
  english_pob_choice: the Lord
  chosen_spanish: el Señor
  alternatives_spanish:
  - el Señor
  lexicon: LSJ
  rationale: En este contexto sapiencial, κύριος se refiere a Dios. «Señor» es el término estándar y más reverente en español para este título, y preserva el registro elevado del verso.
theological_decisions:
- issue: Rendering of κύριος in a wisdom-text reference to God
  english_pob_reading: the Lord
  chosen_spanish_reading: el Señor
  alternative_spanish_readings:
  - Dios
  - el Maestro
  rationale: La frase final pregunta por la voluntad divina; en español bíblico, «el Señor» funciona como título reverente y comunica bien la referencia a Dios sin forzar una aclaración adicional. «Dios» sería comprensible, pero perdería el título usado en el audit trail inglés.
  doctrine_reference: DOCTRINE.md §Translation philosophy 6
- issue: Generic singular ανθρωπος and gendered Spanish
  english_pob_reading: man
  chosen_spanish_reading: hombre
  alternative_spanish_readings:
  - ser humano
  - persona
  rationale: El griego usa un singular genérico masculino. Se conserva «hombre» para respetar la forma y el paralelismo del original, manteniendo su sentido genérico por contexto.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4
- issue: Divine intentionality expressed by βουλή / θέλει
  english_pob_reading: counsel ... wills
  chosen_spanish_reading: consejo ... quiere
  alternative_spanish_readings:
  - propósito ... desea
  - plan ... quiere
  rationale: 'La combinación mantiene la tensión teológica del verso: el designio deliberado de Dios y su voluntad activa. «Consejo» y «quiere» preservan el peso del original sin introducir una explicación interpretativa mayor.'
  doctrine_reference: DOCTRINE.md §Translation philosophy 3, 6
translation_notes:
  revision_awareness: El texto griego coincide con el paquete fuente normalizado y el control cruzado indica alta concordancia; no se registraron revisiones aplicadas. La redacción española sigue el trazado auditado del inglés POB, pero ajusta la sintaxis para sonar natural en español sin perder las decisiones léxicas principales.
  spanish_consistency_notes:
  - Se mantiene un registro bíblico sobrio y contemporáneo.
  - Se conserva el singular genérico de ἄνθρωπος con «hombre».
  - «El Señor» se usa consistentemente para κύριος en esta unidad.
  - La nota [a] ofrece una alternativa lexical real donde el griego admite «βουλή» como «propósito» y «ἐνθυμηθήσεται» como «pensar a fondo».
