translation:
  language: es
  text: Dios escuchó la voz de Manoa, y el ángel de Dios vino otra vez a la mujer, mientras ella estaba sentada en el campo, y Manoa, su esposo, no estaba con ella.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: וַיִּשְׁמַע
  english_pob_choice: listened
  chosen_spanish: escuchó
  alternatives_spanish:
  - oyó
  lexicon: HALOT
  rationale: En este contexto, el verbo no solo indica percepción auditiva, sino respuesta atenta a la petición anterior. 'Escuchó' conserva ese matiz mejor que 'oyó'.
- source_word: בְּקוֹל
  english_pob_choice: to the voice of
  chosen_spanish: la voz de
  alternatives_spanish:
  - la petición de
  - al ruego de
  lexicon: HALOT
  rationale: La expresión hebrea literalmente habla de la 'voz' de Manoa. 'La voz de' mantiene la forma del giro idiomático sin convertirlo en una paráfrasis interpretativa.
- source_word: הָאֱלֹהִים
  english_pob_choice: God
  chosen_spanish: Dios
  alternatives_spanish:
  - los dioses
  lexicon: HALOT
  rationale: El referente es el Dios de Israel; el verbo singular y el contexto narrativo descartan un plural politeísta. 'Dios' es la correspondencia natural en español.
- source_word: מָנוֹחַ
  english_pob_choice: Manoah
  chosen_spanish: Manoa
  alternatives_spanish:
  - Manoaj
  lexicon: convención onomástica
  rationale: Los nombres propios se transliteran de forma estándar. 'Manoa' es la forma usable y reconocible en español para este personaje.
- source_word: מַלְאַךְ הָאֱלֹהִים
  english_pob_choice: the angel of God
  chosen_spanish: el ángel de Dios
  alternatives_spanish:
  - el mensajero de Dios
  lexicon: HALOT
  rationale: '''Ángel'' refleja el sentido narrativo sobrenatural del término en este pasaje. ''De Dios'' conserva el constructo sin cambiarlo por un título eclesiástico.'
- source_word: עוֹד
  english_pob_choice: again
  chosen_spanish: otra vez
  alternatives_spanish:
  - de nuevo
  - una vez más
  lexicon: HALOT
  rationale: Marca repetición de la venida del mensajero. 'Otra vez' es natural en español y mantiene la repetición enfatizada en el hebreo.
- source_word: הָאִשָּׁה
  english_pob_choice: the woman
  chosen_spanish: la mujer
  alternatives_spanish:
  - la esposa
  lexicon: HALOT
  rationale: La narración la identifica de manera consistente como 'la mujer'. Mantener ese término preserva la cohesión discursiva del relato.
- source_word: וְהִיא יוֹשֶׁבֶת
  english_pob_choice: while she was sitting
  chosen_spanish: mientras ella estaba sentada
  alternatives_spanish:
  - y ella estaba sentada
  - sentada
  lexicon: HALOT
  rationale: El participio expresa la circunstancia en curso. 'Mientras ella estaba sentada' reproduce esa acción de fondo con claridad natural en español.
- source_word: בַּשָּׂדֶה
  english_pob_choice: in the field
  chosen_spanish: en el campo
  alternatives_spanish:
  - en el campo abierto
  lexicon: HALOT
  rationale: '''Campo'' es la equivalencia natural en español para el espacio agrícola/rural indicado por el hebreo.'
- source_word: אִישָׁהּ
  english_pob_choice: her husband
  chosen_spanish: su esposo
  alternatives_spanish:
  - su marido
  - su hombre
  lexicon: HALOT
  rationale: Aunque el hebreo dice literalmente 'su hombre', en este contexto la relación idiomática es marital. 'Esposo' comunica con precisión la relación sin sonar anticuado.
- source_word: אֵין עִמָּהּ
  english_pob_choice: was not with her
  chosen_spanish: no estaba con ella
  alternatives_spanish:
  - no se encontraba con ella
  - no se hallaba con ella
  lexicon: HALOT
  rationale: La negación existencial con עִם expresa ausencia/presencia. 'No estaba con ella' es idiomático en español y conserva la sencillez del hebreo.
theological_decisions:
- issue: Rendering of הָאֱלֹהִים in this verse
  english_pob_reading: God
  chosen_spanish_reading: Dios
  alternative_spanish_readings:
  - los dioses
  rationale: El contexto y la sintaxis singular muestran que se trata del Dios único de Israel. Traducir 'Dios' evita una lectura politeísta que el texto no sostiene.
  doctrine_reference: Monoteísmo bíblico; uso singular de אֱלֹהִים en referencia al Dios de Israel
translation_notes:
  revision_awareness: The English POB draft was already marked unchanged on the latest revision pass, with high-agreement cross-check and no applied revisions. This Spanish draft follows that stable reading without introducing new textual changes.
  spanish_consistency_notes:
  - Se mantiene el nombre divino como 'Dios' en consonancia con el contexto inmediato, sin introducir una convención de máscara litúrgica.
  - Se usa 'ángel de Dios' y no 'mensajero' porque el pasaje narra una aparición sobrenatural; esto sigue la decisión auditada en inglés.
  - '''Mujer'' se conserva para הָאִשָּׁה según el flujo narrativo; ''esposa'' se reserva para אִישָׁהּ, donde el hebreo sí indica la relación marital.'
