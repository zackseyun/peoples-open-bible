    issue: '`desde el parto` para מִלֵּדָה'
    rationale: La POB inglesa revisada fijó 'from birth', no 'from giving birth'. En español, 'parto' enfoca más el acto de dar a luz que el estado/etapa de nacimiento como punto de privación. 'Nacimiento' preserva mejor la secuencia auditada.
  - severity: high
    issue: '`desde el seno` para מִבֶּטֶן'
    rationale: בטן aquí significa 'vientre/womb'. 'Seno' en español moderno normalmente no comunica con claridad el vientre materno y puede sugerir pecho o regazo, debilitando la referencia gestacional.
  - severity: low
