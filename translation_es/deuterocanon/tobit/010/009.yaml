translation:
  language: es
  text: 'Entonces su suegro le dijo[a]: «Quédate conmigo, y yo le enviaré aviso a tu padre, y le harán saber cómo estás».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'El verbo griego está en plural («le harán saber»), probablemente con sujeto indefinido: los mensajeros o quienes sean enviados con el aviso.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ὁ πενθερός
  english_pob_choice: his father-in-law
  chosen_spanish: su suegro
  alternatives_spanish:
  - su padre político
  - el padre de su esposa
  lexicon: LSJ
  rationale: πενθερός designa al suegro; en español «suegro» es la equivalencia natural y directa para la relación de afinidad, sin necesidad de expansión.
- source_word: Μεῖνον
  english_pob_choice: Stay
  chosen_spanish: Quédate
  alternatives_spanish:
  - Permanece
  - Quédate aquí
  lexicon: BDAG
  rationale: El imperativo de μένω pide permanecer junto al hablante; «Quédate» suena natural y conserva la fuerza directa de la petición.
- source_word: παρʼ ἐμοί
  english_pob_choice: with me
  chosen_spanish: conmigo
  alternatives_spanish:
  - a mi lado
  - en mi casa
  lexicon: BDAG
  rationale: La expresión indica permanecer en la compañía/presencia del hablante. «Conmigo» es breve, fiel y idiomático.
- source_word: κἀγὼ ἐξαποστελῶ
  english_pob_choice: and I will send word
  chosen_spanish: y yo enviaré palabra
  alternatives_spanish:
  - y yo enviaré
  - y yo despacharé un mensaje
  lexicon: BDAG
  rationale: ἐξαποστέλλω aquí tiene sentido comunicativo por el contexto inmediato. «Enviaré palabra» conserva esa función sin introducir un objeto no explicitado.
- source_word: δηλώσουσιν
  english_pob_choice: they will make known
  chosen_spanish: le harán saber
  alternatives_spanish:
  - le informarán
  - le darán a conocer
  lexicon: BDAG
  rationale: El verbo plural indica que otros transmitirán la noticia; «le harán saber» reproduce bien la idea de hacer conocer algo a alguien en español natural.
- source_word: τὰ κατὰ σέ
  english_pob_choice: the things concerning you
  chosen_spanish: lo que te concierne
  alternatives_spanish:
  - las cosas acerca de ti
  - tu situación
  lexicon: LSJ
  rationale: El giro griego es idiomático y amplio. En español, «lo que te concierne» mantiene la referencia general sin sonar forzado ni excesivamente literal.
translation_notes:
  revision_awareness: Se siguió el sentido del texto griego directamente, atendiendo al audit trail inglés. Se evitó traducir mecánicamente «they will make known» como un calco duro; en español se expresó con una construcción natural que conserva el sujeto plural implícito y el contenido comunicativo.
  spanish_consistency_notes:
  - Se mantuvo «suegro» para πενθερός, coherente con la relación de afinidad del contexto.
  - Se optó por «Enviaré palabra» en vez de una traducción más literal de ἐξαποστελῶ, porque el contexto ya explica que se trata de comunicar a Tobit padre.
  - «Lo que te concierne» preserva el alcance amplio de τὰ κατὰ σέ sin reducirlo a un detalle específico.
