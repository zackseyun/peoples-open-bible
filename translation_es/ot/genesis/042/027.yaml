translation:
  language: es
  text: Entonces uno de ellos abrió su saco para dar forraje a su asno en el lugar donde se alojaban, y vio su plata[b], y he aquí, allí estaba en la boca[a] de su bolsa.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'en la abertura de su bolsa' para 'en la boca de su bolsa'.
    reason: lexical_alternative
  - marker: b
    text: '''Plata'' aquí se refiere al dinero que había pagado.'
    reason: cultural_note
lexical_decisions:
- source_word: וַיִּפְתַּח
  english_pob_choice: opened
  chosen_spanish: abrió
  alternatives_spanish:
  - desató
  - destapó
  lexicon: HALOT
  rationale: פתח expresa la acción básica de abrir; 'abrió' es el equivalente natural y fiel en español narrativo.
- source_word: הָאֶחָד
  english_pob_choice: one of them
  chosen_spanish: uno de ellos
  alternatives_spanish:
  - uno
  lexicon: HALOT
  rationale: El hebreo dice literalmente 'el uno', pero el contexto son los hermanos; en español se requiere explicitar 'de ellos' para claridad sin añadir información nueva.
- source_word: שַׂקּוֹ
  english_pob_choice: his sack
  chosen_spanish: su saco
  alternatives_spanish:
  - su bolsa
  - su costal
  lexicon: HALOT
  rationale: שַׂק designa un saco; 'saco' mantiene la imagen concreta y la distingue de אַמְתַּחַת, que aparece después como 'bolsa'.
- source_word: לָתֵת מִסְפּוֹא
  english_pob_choice: to give fodder
  chosen_spanish: para dar forraje
  alternatives_spanish:
  - para dar alimento
  - para dar pasto
  lexicon: HALOT
  rationale: מִסְפּוֹא es alimento para animales; 'forraje' conserva el valor concreto de comida para bestias de carga.
- source_word: לַחֲמֹרוֹ
  english_pob_choice: to his donkey
  chosen_spanish: a su asno
  alternatives_spanish:
  - a su burro
  - para su asno
  lexicon: HALOT
  rationale: חֲמוֹר es 'asno'; 'asno' es preciso y digno, y en este contexto puede referirse al animal de carga.
- source_word: בַּמָּלוֹן
  english_pob_choice: at the lodging place
  chosen_spanish: en el lugar donde se alojaban
  alternatives_spanish:
  - en el alojamiento
  - en la posada
  lexicon: HALOT
  rationale: מָלוֹן indica un alto nocturno/lugar de alojamiento. 'Lugar donde se alojaban' evita la idea demasiado específica de una posada comercial.
- source_word: וַיַּרְא אֶת־כַּסְפּוֹ
  english_pob_choice: and he saw his silver
  chosen_spanish: y vio su plata
  alternatives_spanish:
  - y vio su dinero
  lexicon: HALOT
  rationale: כֶּסֶף significa literalmente 'plata' y, por extensión, dinero. 'Plata' preserva el concreto hebreo y el eco de pago devuelto.
- source_word: וְהִנֵּה
  english_pob_choice: and behold
  chosen_spanish: y he aquí
  alternatives_spanish:
  - y mira
  - y al verlo
  lexicon: HALOT
  rationale: La partícula introduce sorpresa o descubrimiento; 'he aquí' reproduce bien ese golpe narrativo en español bíblico moderno.
- source_word: הוּא
  english_pob_choice: it was
  chosen_spanish: estaba
  alternatives_spanish:
  - era
  - se hallaba
  lexicon: HALOT
  rationale: El referente es la plata; 'estaba' expresa el hallazgo de forma natural, manteniendo la localización dentro de la bolsa.
- source_word: בְּפִי
  english_pob_choice: in the mouth of
  chosen_spanish: en la boca de
  alternatives_spanish:
  - en la abertura de
  - en el borde de
  lexicon: HALOT
  rationale: El hebreo usa el modismo 'boca' para la abertura de un recipiente. 'Boca' preserva la imagen original de manera transparente.
- source_word: אַמְתַּחְתּוֹ
  english_pob_choice: his bag
  chosen_spanish: su bolsa
  alternatives_spanish:
  - su alforja
  - su bolsa de viaje
  lexicon: HALOT
  rationale: אַמְתַּחַת es un contenedor distinto de שַׂק; 'bolsa' es un equivalente natural en español y permite conservar la distinción terminológica.
translation_notes:
  revision_awareness: El texto sigue de cerca el hebreo de WLC y coincide sustancialmente con el auditable inglés POB. Se mantuvo la distinción entre שַׂק ('saco') y אַמְתַּחַת ('bolsa'), y se preservó el modismo 'boca' para la abertura del recipiente; la nota explica la alternativa semántica ya documentada en el inglés.
  spanish_consistency_notes:
  - Se usó 'Yahvé' por defecto en el proyecto, pero este versículo no contiene el nombre divino.
  - '''Plata'' se eligió para כֶּסֶף siguiendo el valor concreto de dinero/pago devuelto; la nota aclara el sentido cultural.'
  - '''Asno'' y ''forraje'' mantienen el registro narrativo concreto sin modernizar indebidamente el escenario antiguo.'
  - '''He aquí'' conserva la fuerza discursiva de וְהִנֵּה sin convertirlo en una paráfrasis interpretativa.'
