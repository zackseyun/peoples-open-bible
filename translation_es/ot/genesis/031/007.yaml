translation:
  language: es
  text: Sin embargo, tu padre me ha engañado[a] y ha cambiado mi salario diez veces[b], pero Dios no le permitió hacerme daño[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «me ha tratado burlonamente» o «me ha engañado con artimañas». El verbo hebreo puede denotar trato engañoso o burlón.
    reason: lexical_alternative
  - marker: b
    text: Hebreo «diez veces», un modismo para cambios repetidos, posiblemente no pensado como un número exacto.
    reason: cultural_note
  - marker: c
    text: Literalmente, «Dios no le dio hacerme daño», es decir, Dios no le concedió permiso para perjudicarme.
    reason: lexical_alternative
lexical_decisions:
- source_word: הֵתֶל
  english_pob_choice: has deceived me
  chosen_spanish: me ha engañado
  alternatives_spanish:
  - me ha decepcionado
  - me ha burlado
  lexicon: HALOT
  rationale: El verbo hebreo expresa trato engañoso o burlón; en este contexto, la acusación concreta es de engaño en el acuerdo laboral. «Me ha engañado» comunica bien ese sentido en español sin debilitar la fuerza personal de la queja.
- source_word: וְהֶחֱלִף
  english_pob_choice: changed
  chosen_spanish: ha cambiado
  alternatives_spanish:
  - ha alterado
  - ha variado
  lexicon: HALOT
  rationale: El verbo indica modificaciones repetidas de lo pactado. «Ha cambiado» es natural en español y conserva el matiz de alteración reiterada.
- source_word: מַשְׂכֻּרְתִּי
  english_pob_choice: my wages
  chosen_spanish: mi salario
  alternatives_spanish:
  - mi paga
  - mi compensación
  lexicon: HALOT
  rationale: El sustantivo se refiere al pago por trabajo. «Salario» es claro y digno en español moderno; mantiene el campo semántico laboral sin introducir un tecnicismo innecesario.
- source_word: עֲשֶׂרֶת מֹנִים
  english_pob_choice: ten times
  chosen_spanish: diez veces
  alternatives_spanish:
  - diez ocasiones
  - diez veces exactas
  lexicon: HALOT
  rationale: La expresión es idiomática y normalmente indica repetición, no necesariamente un conteo exacto. «Diez veces» preserva la forma y la fuerza idiomática en español.
- source_word: אֱלֹהִים
  english_pob_choice: God
  chosen_spanish: Dios
  alternatives_spanish:
  - el Dios verdadero
  lexicon: HALOT
  rationale: Aquí אֱלֹהִים designa al Dios verdadero en boca de Jacob; «Dios» es la equivalencia natural y fiel en español.
- source_word: לְהָרַע עִמָּדִי
  english_pob_choice: to harm me
  chosen_spanish: hacerme daño
  alternatives_spanish:
  - dañarme
  - tratarme mal
  lexicon: HALOT
  rationale: La construcción hebrea significa obrar mal o hacer daño a alguien. «Hacerme daño» es idiomático en español y conserva la idea de perjuicio real.
theological_decisions:
- issue: La idiomática hebrea «Dios no le dio» y su fuerza de restricción divina
  english_pob_reading: God actively withheld permission for Laban to harm Jacob
  chosen_spanish_reading: Dios retuvo activamente la posibilidad de que Labán le hiciera daño a Jacob
  alternative_spanish_readings:
  - Dios no le permitió hacerlo
  - Dios no lo entregó a él para dañarlo
  rationale: La cláusula hebrea presenta a Dios como soberano que impide el daño. «No le permitió» expresa con naturalidad esa restricción divina en español, sin exagerar más allá del texto.
  doctrine_reference: Translation philosophy §1, §3
translation_notes:
  revision_awareness: El borrador sigue la revisión más reciente del audit trail inglés, que corrigió el primer verbo de «mocked» a «deceived». Por eso se eligió «me ha engañado» y no una traducción centrada en burla. También se mantuvo la lectura de «ten times» como idiomática y la restricción divina como permiso negado.
  spanish_consistency_notes:
  - Se mantiene el nombre divino «Dios» porque el hebreo usa אֱלֹהִים en referencia al Dios verdadero.
  - Se evita «SEÑOR» porque no aparece el tetragrámaton en este versículo.
  - «Salario» y «hacerme daño» son más naturales en español que calcos demasiado literales, pero conservan el contenido legal y relacional del hebreo.
  - Las notas al pie conservan la tensión entre literalidad e idiomatismo sin borrar la posible ambigüedad del hebreo.
