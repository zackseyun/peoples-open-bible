  text: λεγούσης· Ὃ βλέπεις γράψον εἰς βιβλίον καὶ πέμψον ταῖς ἑπτὰ ἐκκλησίαις, εἰς Ἔφεσον καὶ εἰς Σμύρναν καὶ εἰς Πέργαμον καὶ εἰς Θυάτειρα καὶ εἰς Σάρδεις καὶ εἰς Φιλαδέλφειαν καὶ εἰς Λαοδίκειαν.
base_translation:
  language: en
  yaml_path: translation/nt/revelation/001/011.yaml
  text: 'saying[a], “What you see[b], write in a book and send it to the seven churches: to Ephesus and to Smyrna and to Pergamum and to Thyatira and to Sardis and to Philadelphia and to Laodicea.”'
  footnotes:
  - marker: a
    text: Or “in a scroll”; Greek βιβλίον can refer to a scroll or book/document.
    reason: lexical_alternative
  - marker: b
    text: Pergamum is traditionally rendered “Pergamos” in some older English versions.
    reason: alternative_reading
translation:
  language: ko
  text: '이르시되, 「네가 보는 것을 책에 기록하여 일곱 회중—에베소, 서머나, 버가모, 두아디라, 사데, 빌라델비아, 라오디게아—에게 보내라.」'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: βιβλίον
  english_pob_choice: book
  chosen_korean: 책
  alternatives_korean:
  - 두루마리
  lexicon: BDAG
  rationale: '헬라어 βιβλίον은 두루마리 형태이지만, 한국어 「책」은 일반적 통칭으로 자연스럽다. 본문의 임의 구분은 각주에 두지 않는다.'
