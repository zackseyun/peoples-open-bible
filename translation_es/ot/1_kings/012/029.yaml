translation:
  language: es
  text: Puso uno en Betel[a], y al otro lo colocó en Dan.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Es decir, uno de los dos becerros mencionados en el versículo anterior; alternativamente: «Puso un becerro en Betel, y al otro lo colocó en Dan».'
    reason: alternative_reading
lexical_decisions:
- source_word: וַיָּשֶׂם
  english_pob_choice: He set
  chosen_spanish: Puso
  alternatives_spanish:
  - colocó
  - puso
  - estableció
  lexicon: HALOT
  rationale: El verbo hebreo שׂוּם / שִׂים admite el sentido de poner, colocar o establecer. En español, «puso» transmite de manera natural y directa la acción de situar los objetos sin forzar un matiz demasiado técnico.
- source_word: אֶת הָאֶחָד
  english_pob_choice: one
  chosen_spanish: uno
  alternatives_spanish:
  - el uno
  - uno de ellos
  lexicon: HALOT
  rationale: El hebreo usa el marcador de objeto con «el uno» en contraste distributivo. Como el referente ya quedó claro por el contexto inmediato, «uno» reproduce bien la elipsis sin añadir «becerro» al texto principal.
- source_word: בְּבֵית אֵל
  english_pob_choice: in Bethel
  chosen_spanish: en Betel
  alternatives_spanish:
  - en Bet-el
  - en la casa de Dios
  lexicon: HALOT
  rationale: El topónimo se conserva como nombre propio establecido en español. Aunque etimológicamente significa «casa de Dios», aquí corresponde la transliteración del lugar, no una traducción explicativa en el texto principal.
- source_word: וְאֶת הָאֶחָד
  english_pob_choice: and the other
  chosen_spanish: y al otro
  alternatives_spanish:
  - y el otro
  - y uno
  lexicon: HALOT
  rationale: El hebreo mantiene el paralelismo distributivo con «el otro». En español, «al otro» fluye mejor en esta construcción con objeto directo implícito y conserva la oposición entre ambos ídolos.
- source_word: נָתַן
  english_pob_choice: he put
  chosen_spanish: lo puso
  alternatives_spanish:
  - lo colocó
  - lo estableció
  - lo dio
  lexicon: HALOT
  rationale: 'Aquí נָתַן es locativo: significa poner o colocar. «Lo puso» evita la repetición estilística de «puso» sin perder el sentido narrativo.'
- source_word: בְּדָן
  english_pob_choice: in Dan
  chosen_spanish: en Dan
  alternatives_spanish:
  - en Dan
  lexicon: HALOT
  rationale: Se conserva el nombre propio del lugar con la preposición simple «en», que corresponde de manera natural al hebreo בְּ.
theological_decisions:
- issue: Referencia implícita de «uno» y «el otro»
  english_pob_reading: The verse leaves the objects implicit, referring back to the two calves mentioned in the previous verse; the translation preserves the implicit reference rather than supplying 'calf' in the main text.
  chosen_spanish_reading: 'El texto español conserva la elipsis: «uno» y «al otro», sin añadir «becerro» en el cuerpo principal.'
  alternative_spanish_readings:
  - Puso un becerro en Betel, y al otro lo puso en Dan.
  - Puso uno en Betel, y el otro lo puso en Dan.
  rationale: El hebreo no repite el sustantivo; por fidelidad al texto fuente, la traducción española mantiene la referencia implícita. La nota permite aclarar el antecedente sin resolverlo dentro del versículo.
  doctrine_reference: Principio de primacía del texto original; no ampliar el contenido más allá de lo que el hebreo expresa explícitamente.
translation_notes:
  revision_awareness: El versículo presenta una construcción distributiva con dos objetos implícitos. La versión inglesa POB preserva la elipsis y ofrece una alternativa explícita en nota; la redacción española sigue esa misma estrategia y mantiene el paralelismo narrativo.
  spanish_consistency_notes:
  - Se usa «Betel» como topónimo establecido, no la glosa etimológica «casa de Dios» en el texto principal.
  - Se evita introducir «becerro» en el cuerpo del versículo para respetar la elipsis del hebreo y la decisión auditada de la POB inglesa.
  - Se mantiene «en Dan» y «en Betel» con la preposición simple «en» para reflejar בְּ de manera natural en español.
