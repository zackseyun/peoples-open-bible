source:
  edition: SBLGNT
  text: 'ἀνοῖξαι ὀφθαλμοὺς αὐτῶν, τοῦ ⸀ἐπιστρέψαι ἀπὸ σκότους εἰς φῶς καὶ τῆς ἐξουσίας τοῦ Σατανᾶ ἐπὶ τὸν θεόν, τοῦ λαβεῖν αὐτοὺς ἄφεσιν ἁμαρτιῶν καὶ κλῆρον ἐν τοῖς ἡγιασμένοις πίστει τῇ εἰς ἐμέ.'
base_translation:
  language: en
  yaml_path: translation/nt/acts/026/018.yaml
  text: to open their eyes[a], so that they may turn from darkness to light and from the authority of Satan to God[b], that they may receive forgiveness of sins and an inheritance among those who have been sanctified by faith in me.
  footnotes:
  - marker: a
    text: "Or 'the power of Satan' or 'the dominion of Satan.' The Greek term can denote authority, ruling power, or domain."
    reason: lexical_alternative
  - marker: b
    text: "Or 'among those who have been made holy.'"
    reason: lexical_alternative
translation:
  language: ko
  text: 이는 그들의 눈을 열어, 어둠에서 빛으로, 사탄의 권세에서 하나님께로 돌아오게 하여, 그들이 죄들의 용서와, 나를 믿는 믿음으로 거룩하게 된 자들 가운데서 기업을 받게 하려 함이다.〉
  philosophy: optimal-equivalence
theological_decisions:
- issue: '회심 사명의 핵심 구절: 어둠→빛, 사탄의 권세→하나님, 죄 용서·기업·믿음'
  chosen_reading: 어둠에서 빛으로, 사탄의 권세에서 하나님께로 돌아오게 하여 … 죄들의 용서와 … 기업을 받게
  alternative_readings:
  - 전향
  - 회개
  - 돌이킴
  rationale: ἐπιστρέψαι의 근본 의미 「돌아오다/돌이키다」를 보존하고, 어둠/빛, 사탄/하나님의 대비 구조를 살린다. 회심 사명의 완전한 신학적 구조를 평면화하지 않는다.
  doctrine_reference: 'DOCTRINE.md: Original-language primacy'
