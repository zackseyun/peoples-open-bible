translation:
  language: es
  text: Porque muchos son llamados[a][b], pero pocos son escogidos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «invitados»; en este contexto la palabra puede llevar el matiz de una invitación a un banquete.
    reason: lexical_alternative
  - marker: b
    text: O «elegidos».
    reason: lexical_alternative
lexical_decisions:
- source_word: πολλοὶ
  english_pob_choice: many
  chosen_spanish: muchos
  alternatives_spanish:
  - un gran número de
  - muchas personas
  lexicon: BDAG
  rationale: El adjetivo funciona sustantivado en plural; «muchos» conserva la concisión proverbial y el contraste con «pocos». Evita ampliar innecesariamente el sujeto.
- source_word: γάρ
  english_pob_choice: for
  chosen_spanish: porque
  alternatives_spanish:
  - pues
  - ya que
  lexicon: BDAG
  rationale: En español, «porque» expresa de forma natural la relación explicativa/razonadora de γάρ con el dicho precedente. Mantiene el enlace lógico sin volverlo más formal de lo necesario.
- source_word: κλητοὶ
  english_pob_choice: called
  chosen_spanish: llamados
  alternatives_spanish:
  - invitados
  - convocados
  lexicon: BDAG
  rationale: «Llamados» reproduce el valor básico de κλητοί y preserva su resonancia amplia en Mateo. Dado el contexto del banquete nupcial, «invitados» es una alternativa contextual válida, preservada en nota.
- source_word: ὀλίγοι
  english_pob_choice: few
  chosen_spanish: pocos
  alternatives_spanish:
  - no muchos
  - unos pocos
  lexicon: BDAG
  rationale: «Pocos» es el equivalente idiomático directo de ὀλίγοι y mantiene la simetría antitética con «muchos».
- source_word: ἐκλεκτοί
  english_pob_choice: chosen
  chosen_spanish: escogidos
  alternatives_spanish:
  - elegidos
  - electos
  lexicon: BDAG
  rationale: «Escogidos» conserva el sentido léxico transparente de ἐκλεκτοί sin importar de entrada el término teológico tradicional «electos». «Electos» queda como alternativa en nota para preservar la tensión lexical y doctrinal.
theological_decisions:
- issue: Renderizar ἐκλεκτοί en un dicho frecuentemente usado en debates sobre elección
  english_pob_reading: chosen
  chosen_spanish_reading: escogidos
  alternative_spanish_readings:
  - electos
  rationale: La forma griega admite tanto «escogidos» como el tecnicismo «electos». Se eligió «escogidos» por claridad y por mantener el valor léxico directo en el texto principal, sin cerrar la discusión doctrinal. La alternativa tradicional se preserva para que el lector vea la conexión con el lenguaje teológico posterior.
  doctrine_reference: Translation philosophy §3; principio POB de no imponer una terminología confesional cuando el griego permite más de una equivalencia legítima.
- issue: Renderizar κλητοί en el marco de la parábola del banquete
  english_pob_reading: called
  chosen_spanish_reading: llamados
  alternative_spanish_readings:
  - invitados
  rationale: Aunque el contexto del banquete hace posible «invitados», «llamados» mantiene mejor la amplitud del verbo/adjetivo y la correspondencia con el contraste del versículo. La nota conserva la matización contextual sin reducir el término solo a la escena del banquete.
  doctrine_reference: Translation philosophy §1 y §3; uso contextual del léxico sin pérdida de resonancia bíblica amplia.
translation_notes:
  revision_awareness: El borrador sigue el texto griego SBLGNT y el aparato auditado en inglés sin cambios de revisión adicionales en la última pasada; conserva la equivalencia óptima aceptada por el revisor y la correspondencia alta entre controles.
  spanish_consistency_notes:
  - Se usa «Yahvé» según el estándar del proyecto cuando aparezca el nombre divino; aquí no aplica.
  - Se mantiene «escogidos» en el texto principal para no bloquear la alternativa teológica «electos».
  - Los corchetes de nota aparecen únicamente en las palabras marcadas del texto español y con marcadores únicos.
  - 'La puntuación reproduce la oposición breve del griego: causa/explicación, contraste y cierre sentencioso.'
