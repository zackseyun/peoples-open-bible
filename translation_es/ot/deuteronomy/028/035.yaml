    issue: '''úlceras malignas'' para בִּשְׁחִין רָע'
    rationale: שְׁחִין denota una afección tipo boil/llaga/forúnculo; 'úlceras' cambia el cuadro léxico, y 'malignas' en español moderno introduce una connotación técnica no exigida por רָע, que aquí intensifica la gravedad ('grave', 'severo').
  - severity: medium
    issue: Nota [a] sobre 'te herirá' es innecesaria
    rationale: El inglés POB no preservó alternativa en nota para this item, y el español 'te herirá' no crea ambigüedad que requiera nota. Añadirla sobrecarga el verso sin necesidad.
  - severity: low
    issue: '''ser sanado'' es algo menos natural que ''curarte'''
    rationale: No es incorrecto y refleja bien el audit trail, pero en español corriente suena un poco más rígido. Puede mantenerse para conservar el foco pasivo en la condición incurable.
  revised_spanish_text: Yahvé te herirá con forúnculos graves en las rodillas y en las piernas[a], de las cuales no podrás ser sanado, desde la planta de tu pie hasta la coronilla de tu cabeza.
