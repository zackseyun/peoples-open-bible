  text: וַ/יְהִ֞י מִ/קֵּ֣ץ שְׁנַ֣יִם חֳדָשִׁ֗ים וַ/תָּ֨שָׁב֙ אֶל אָבִ֔י/הָ וַ/יַּ֣עַשׂ לָ֔/הּ אֶת נִדְר֖/וֹ אֲשֶׁ֣ר נָדָ֑ר וְ/הִיא֙ לֹא יָדְעָ֣ה אִ֔ישׁ וַ/תְּהִי חֹ֖ק בְּ/יִשְׂרָאֵֽל׀־־־־׃
base_translation:
  language: en
  yaml_path: translation/ot/judges/011/039.yaml
  text: 'And at the end of two months she returned to her father[a], and he did to her according to his vow that he had vowed. Now she had not known a man[b]. And it became a statute in Israel:'
  footnotes:
  - marker: a
    text: Or, 'he carried out on her the vow that he had made.' Interpreters differ on whether this means Jephthah sacrificed her or dedicated her to lifelong virginity; the Hebrew wording itself does not explicitly resolve the question here.
    reason: alternative_reading
  - marker: b
    text: Literally, 'she had not known a man,' a Hebrew idiom indicating that she had not had sexual relations.
    reason: lexical_alternative
