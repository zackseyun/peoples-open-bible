translation:
  language: es
  text: Y como los dedos de los pies eran en parte de hierro y en parte de barro[a], así una parte del reino será fuerte, y otra parte de él será quebradiza[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O "barro cocido", "cerámica" o "alfarería" para el término arameo traducido aquí como "barro".
    reason: lexical_alternative
  - marker: b
    text: O "frágil" o "quebrantable" para "quebradiza".
    reason: lexical_alternative
lexical_decisions:
- source_word: אֶצְבְּעָת רַגְלַיָּא
  english_pob_choice: the toes of the feet
  chosen_spanish: los dedos de los pies
  alternatives_spanish:
  - los dedos de los pies mismos
  - los dedos de sus pies
  lexicon: HALOT
  rationale: La construcción aramea nombra literalmente los dedos de los pies; en español, "dedos de los pies" conserva la imagen sin sonar forzado. No hace falta añadir un posesivo explícito, porque el contexto ya remite a la figura de la estatua.
- source_word: מנ/הון ... ו/מנ/הון
  english_pob_choice: partly ... and partly
  chosen_spanish: en parte ... y en parte
  alternatives_spanish:
  - parcialmente ... y parcialmente
  - una parte ... y otra parte
  lexicon: HALOT
  rationale: El hebreo/arameo expresa composición por porciones. "En parte ... y en parte" mantiene la repetición y su valor distributivo de manera natural en español.
- source_word: פַּרְזֶל
  english_pob_choice: iron
  chosen_spanish: hierro
  alternatives_spanish:
  - ferro
  lexicon: HALOT
  rationale: Es el equivalente directo y estándar para el metal de la visión.
- source_word: חֲסַף
  english_pob_choice: clay
  chosen_spanish: barro
  alternatives_spanish:
  - arcilla
  - barro de alfarero
  - loza
  lexicon: HALOT
  rationale: En Daniel 2 el término designa un material cerámico en contraste con el hierro. "Barro" comunica bien esa fragilidad en español bíblico general; "arcilla" también es posible, pero "barro" resulta más natural en esta imagen y conserva la oposición material.
- source_word: מִן קְצָת
  english_pob_choice: part
  chosen_spanish: una parte
  alternatives_spanish:
  - parte
  - algo de
  lexicon: HALOT
  rationale: 'La idea es distributiva: no todo el reino comparte la misma cualidad. "Una parte" reproduce con claridad la fracción mencionada por el arameo.'
- source_word: מַלְכוּתָא
  english_pob_choice: the kingdom
  chosen_spanish: el reino
  alternatives_spanish:
  - el reino real
  - el dominio
  lexicon: HALOT
  rationale: '"Reino" es la equivalencia natural y fiel para el término en este contexto de la visión estatutaria.'
- source_word: תֶּהֱוֵה
  english_pob_choice: will be
  chosen_spanish: será
  alternatives_spanish:
  - estará
  - llegará a ser
  lexicon: HALOT
  rationale: El verbo predice el estado futuro del reino; "será" es claro, sobrio y adecuado al estilo profético.
- source_word: תַקִּיפָה
  english_pob_choice: strong
  chosen_spanish: fuerte
  alternatives_spanish:
  - sólida
  - firme
  - poderosa
  lexicon: HALOT
  rationale: La raíz expresa fortaleza o firmeza. "Fuerte" comunica bien la idea en español y mantiene el contraste con la parte quebradiza.
- source_word: וּ/מִנַּהּ
  english_pob_choice: and part of it
  chosen_spanish: y otra parte de él
  alternatives_spanish:
  - y parte de él
  - y de él otra parte
  lexicon: HALOT
  rationale: La forma pronominal remite al reino y vuelve a dividirlo en porciones. "Otra parte de él" preserva el paralelismo con la primera mitad de la cláusula.
- source_word: תְבִירָה
  english_pob_choice: brittle
  chosen_spanish: quebradiza
  alternatives_spanish:
  - frágil
  - quebrantable
  - quebradiza
  lexicon: HALOT
  rationale: El término expresa algo propenso a romperse, más que ya roto. "Quebradiza" reproduce esa fragilidad estructural y mantiene la imagen material del hierro y el barro.
translation_notes:
  revision_awareness: El texto inglés auditado permanece sin cambios en la última revisión, con alta concordancia entre revisores y sin problemas reportados; esta versión española sigue ese estado estable y conserva las decisiones léxicas documentadas, adaptándolas al español natural sin alterar el sentido.
  spanish_consistency_notes:
  - Se usa "reino" de forma consistente para מַלְכוּתָא, en paralelo con el inglés auditado.
  - Se mantiene la doble estructura "en parte ... y en parte" para reflejar el paralelismo distributivo del arameo.
  - '"Barro" se eligió por claridad idiomática, pero se preserva la alternativa material en nota para no perder la tensión léxica con "arcilla".'
  - '"Quebradiza" conserva la noción de fragilidad física sin convertirla en una afirmación moral o doctrinal.'
