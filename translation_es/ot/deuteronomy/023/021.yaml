review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien el sentido básico del hebreo: permite cobrar interés al extranjero, lo prohíbe respecto al ''hermano'', conserva ''Yahvé'', y mantiene la cláusula de propósito y la referencia a la tierra. Sin embargo, la cláusula final ''que vas a entrar para poseerla'' no es español natural y debilita el sentido de movimiento hacia la tierra; conviene ajustarla a ''a la cual vas a entrar para poseerla'' o mejor ''en la cual estás entrando para poseerla''.'
  spanish_quality_summary: 'El texto es mayormente claro y fiel, pero presenta una construcción poco idiomática en español: ''la tierra que vas a entrar para poseerla''. También ''en todo el trabajo de tu mano'' es comprensible, aunque algo rígido; no requiere cambio obligatorio porque preserva bien la imagen hebrea y sigue siendo legible.'
  glossary_alignment: 'Buena alineación con el glosario del proyecto: יְהוָה = ''Yahvé'', נָכְרִי = ''extranjero'', אָחִיךָ = ''tu hermano'', y נשׁך = ''cobrar interés''. Las notas también siguen adecuadamente la justificación léxica inglesa. No obstante, una alternativa léxica listada contiene un error de idioma (''fellow israelita'') que no afecta el texto principal pero sí la calidad del registro.'
  issues:
  - severity: medium
    issue: Construcción no idiomática en la cláusula final
    rationale: El hebreo אֲשֶׁר אַתָּה בָא שָׁמָּה לְרִשְׁתָּהּ expresa entrada a la tierra con propósito de posesión. 'La tierra que vas a entrar para poseerla' suena gramaticalmente forzado en español. Una forma natural y fiel es 'la tierra en la cual estás entrando para poseerla'.
  - severity: low
    issue: Alternativa léxica mezclada de inglés y español
    rationale: En las alternatives_spanish de אָחִיךָ aparece 'a tu fellow israelita', lo cual es un descuido editorial. No cambia la traducción, pero debería corregirse en el registro interno.
