translation:
  language: es
  text: 'los que dicen[a]: «Con nuestra lengua prevaleceremos; nuestros labios están con nosotros[b]—¿quién es señor sobre nosotros[c]?».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «Por nuestra lengua prevaleceremos». El hebreo admite un valor instrumental del prefijo ל.
    reason: lexical_alternative
  - marker: b
    text: O «nuestros labios son nuestros» o «nuestros labios están de nuestro lado».
    reason: lexical_alternative
  - marker: c
    text: O «¿quién es amo sobre nosotros?».
    reason: alternative_reading
lexical_decisions:
- source_word: אֲשֶׁר
  english_pob_choice: who
  chosen_spanish: los que
  alternatives_spanish:
  - quien
  - quienes
  lexicon: HALOT
  rationale: En español, la cláusula relativa funciona con naturalidad como «los que», conservando la referencia a los impíos descritos previamente sin forzar un singular artificial.
- source_word: אָמְרוּ
  english_pob_choice: say
  chosen_spanish: dicen
  alternatives_spanish:
  - dijeron
  - han dicho
  lexicon: HALOT
  rationale: Aunque el verbo hebreo está en perfecto, en esta frase poética de caracterización se entiende como rasgo habitual; el presente español mantiene esa fuerza descriptiva sin alejarse del sentido.
- source_word: לִלְשֹׁנֵנוּ
  english_pob_choice: With our tongue
  chosen_spanish: con nuestra lengua
  alternatives_spanish:
  - por nuestra lengua
  - mediante nuestra lengua
  lexicon: HALOT
  rationale: Se conserva el valor instrumental/medio del prefijo ל en un español natural. «Lengua» reproduce la imagen concreta del hebreo mejor que una abstracción como «habla».
- source_word: נַגְבִּיר
  english_pob_choice: we will prevail
  chosen_spanish: prevaleceremos
  alternatives_spanish:
  - seremos fuertes
  - venceremos
  - nos impondrémos
  lexicon: HALOT
  rationale: El hifil de גבר expresa mostrarse fuerte o imponerse. «Prevaleceremos» recoge bien el matiz de triunfo/ventaja en un tono breve y poético.
- source_word: שְׂפָתֵינוּ
  english_pob_choice: our lips
  chosen_spanish: nuestros labios
  alternatives_spanish:
  - nuestra boca
  - nuestro hablar
  lexicon: HALOT
  rationale: Se mantiene la imagen corporal concreta del hebreo. «Labios» es la correspondencia más directa y conserva la fuerza retórica de la frase.
- source_word: אִתָּנוּ
  english_pob_choice: are with us
  chosen_spanish: están con nosotros
  alternatives_spanish:
  - son nuestros
  - están de nuestro lado
  - son para nosotros
  lexicon: HALOT
  rationale: Se preserva la literalidad relativa de «con nosotros», evitando una paráfrasis posesiva demasiado interpretativa. La expresión española sigue siendo comprensible en contexto como afirmación de autonomía y seguridad.
- source_word: מִי אָדוֹן לָנוּ
  english_pob_choice: who is lord over us?
  chosen_spanish: ¿quién es señor sobre nosotros?
  alternatives_spanish:
  - ¿quién es amo sobre nosotros?
  - ¿quién nos gobierna?
  - ¿quién es dueño sobre nosotros?
  lexicon: HALOT
  rationale: «Señor» reproduce el sentido de אָדוֹן como autoridad o dominio sin confundirlo con el nombre divino. Se evita «Señor» con mayúscula para no importar una connotación no presente aquí.
theological_decisions:
- issue: Título humano אָדוֹן en contexto de desafío rebelde
  english_pob_reading: who is lord over us?
  chosen_spanish_reading: ¿quién es señor sobre nosotros?
  alternative_spanish_readings:
  - ¿quién es amo sobre nosotros?
  - ¿quién es dueño sobre nosotros?
  rationale: El hebreo expresa la negación de toda autoridad humana sobre ellos. «Señor» en minúscula mantiene la fuerza de dominio sin sugerir el título divino Yahvé.
  doctrine_reference: Distinción entre uso común de אָדוֹן/κύριος como autoridad humana y su uso teológico para Dios.
translation_notes:
  revision_awareness: Se tuvo en cuenta que el audit trail inglés osciló entre «our lips are our own» y «our lips are with us», y finalmente volvió a una redacción más literal; por eso el español conserva «están con nosotros» para reflejar con precisión אִתָּנוּ, mientras que las notas recogen la alternativa posesiva implícita. También se mantuvo la elección de un equivalente verbal para נַגְבִּיר que exprese prevalencia, no solo fuerza abstracta.
  spanish_consistency_notes:
  - Se usa «Yahvé» en la tradición del proyecto cuando corresponda, pero aquí el versículo no contiene el nombre divino.
  - «Señor» se escribe en minúscula porque traduce אָדוֹן en sentido humano y no el título divino.
  - Se conserva la imagen concreta «lengua/labios» en lugar de abstraerla a «habla», siguiendo el valor retórico del hebreo.
  - La puntuación española mantiene el inciso final como pregunta retórica en estilo directo.
