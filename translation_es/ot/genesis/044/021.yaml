translation:
  language: es
  text: 'Entonces dijiste a tus siervos[a]: «Tráiganlo a mí, para que ponga mis ojos sobre él[b]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Siervos» refleja el valor contextual de עֲבָדֶיךָ en este diálogo cortesano; aquí no es necesario traducirlo como «esclavos».
    reason: lexical_alternative
  - marker: b
    text: 'La expresión hebrea dice literalmente: «poner mis ojos sobre él»; puede significar mirarlo, examinarlo o prestarle atención especial.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַתֹּאמֶר
  english_pob_choice: Then you said
  chosen_spanish: Entonces dijiste
  alternatives_spanish:
  - Y dijiste
  lexicon: HALOT
  rationale: El valor narrativo de la forma wayyiqtol se expresa bien con «entonces» en español, manteniendo la secuencia del discurso sin sonar mecánico.
- source_word: עֲבָדֶיךָ
  english_pob_choice: your servants
  chosen_spanish: tus siervos
  alternatives_spanish:
  - tus esclavos
  - tus servidores
  lexicon: HALOT
  rationale: En este contexto cortesano, el sentido relacional es el de personas subordinadas al interlocutor; «siervos» conserva esa relación sin cargar innecesariamente el matiz de esclavitud que no es el foco aquí.
- source_word: הוֹרִדֻהוּ
  english_pob_choice: Bring him down
  chosen_spanish: Traedlo hasta mí
  alternatives_spanish:
  - Bajadlo hasta mí
  - Hacedlo bajar hasta mí
  lexicon: HALOT
  rationale: El hebreo usa un causativo de ירד con fuerza direccional hacia el hablante. En español, «traedlo hasta mí» comunica de manera natural el movimiento hacia la persona que habla, sin perder la idea de hacerlo descender.
- source_word: אֵלַי
  english_pob_choice: to me
  chosen_spanish: hasta mí
  alternatives_spanish:
  - a mí
  - ante mí
  lexicon: HALOT
  rationale: La preposición expresa movimiento hacia la presencia del hablante. «Hasta mí» enfatiza la llegada personal y encaja con la orden anterior.
- source_word: וְאָשִׂימָה עֵינִי עָלָיו
  english_pob_choice: that I may set my eyes on him
  chosen_spanish: para que yo pueda poner mis ojos sobre él
  alternatives_spanish:
  - para que yo lo vea
  - para que yo le preste atención
  lexicon: HALOT
  rationale: Se conserva la imagen idiomática de «poner mis ojos sobre él», que puede implicar ver, inspeccionar o prestar atención especial. La construcción mantiene la tensión lexical que el inglés POB también preserva.
translation_notes:
  revision_awareness: El texto base inglés fue revisado de «so that» a «that» por registro; en español se mantiene una subordinación final natural («para que») y la imagen idiomática del hebreo, conforme al audit trail y al paralelo léxico de la nota inglesa.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como convención general del proyecto, pero este versículo no contiene el Tetragrámaton.
  - «Siervos» se usa aquí por el contexto relacional/cortesano, en línea con la decisión inglesa auditada.
  - Se conserva la metáfora corporal de «poner mis ojos sobre él» para no borrar la ambigüedad semántica documentada en el original.
