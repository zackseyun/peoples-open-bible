  - severity: medium
    issue: Los nombres 'Helá' y 'Naará' se apartan innecesariamente de la transliteración auditada.
    rationale: Aunque no son imposibles en español, la acentuación gráfica introduce una adaptación no exigida por el español y reduce la correspondencia visible con el nombre fuente y con la auditoría inglesa. 'Helah' y 'Naarah' son claros y más estables.
