  source_alignment_summary: 'El borrador refleja bien la estructura general del hebreo y mantiene la fuerza del juicio, pero falla en un punto lexical clave: colapsa אָלָה y קְלָלָה en la misma palabra «maldición», contradiciendo la decisión auditada en inglés de distinguirlas en el texto principal. También «han puesto sus rostros» suena poco natural en español para este modismo; conviene una forma más idiomática que preserve la imagen.'
  spanish_quality_summary: 'El texto es mayormente claro y digno, pero tiene dos problemas de legibilidad: «han puesto sus rostros» es un calco rígido, y la secuencia «para maldición, para horror, para maldición» suena defectuosa y repetitiva de manera no intencional. El resto del versículo fluye bien en español bíblico moderno.'
  glossary_alignment: 'No hay conflicto con los términos de proyecto como Yahvé/Mesías, pero sí con la política de transparencia lexical: debe preservarse la distinción entre אָלָה («juramento» con matiz imprecatorio) y קְלָלָה («maldición»). La nota existente es útil, pero debe acompañar una distinción también en el texto principal.'
  issues:
  - severity: high
    issue: Se tradujeron אָלָה y קְלָלָה ambas como «maldición».
    rationale: El hebreo usa dos términos distintos, y el English POB auditado decidió conservar la distinción en el texto principal como ‘an oath’ y ‘a curse’, con nota explicativa. El borrador español borra esa diferencia semántica y además produce una repetición confusa.
  - severity: medium
    issue: «que han puesto sus rostros» es un calco poco natural del modismo שָׂמוּ פְנֵיהֶם.
    rationale: Aunque intenta preservar la imagen hebrea, en español natural y digno suena extraño. «han vuelto su rostro» o «han puesto su rostro» preserva mejor la imagen sin pluralizar de manera torpe.
  - severity: low
    issue: La nota [a] está anclada en «tomaré» en vez de en la expresión correspondiente a אָלָה.
    rationale: La nota explica el sustantivo final אָלָה, no el verbo inicial ולקחתי. El anclaje debe moverse al término español que lo traduce.
