  text: 그러므로 여러분도 지금은 근심을 가지고 있지만, 내가 다시 여러분을 볼 것이며, 여러분의 마음은 기뻐할 것이고, 여러분의 기쁨을 아무도 여러분에게서 빼앗지 못할 것입니다.
  philosophy: optimal-equivalence
  footnotes:
