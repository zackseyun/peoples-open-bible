translation:
  language: es
  text: Y ahora[a], Israel, escucha los estatutos y los juicios[b] que yo les enseño a hacer, para que vivan y entren y tomen posesión de la tierra que Yahvé, el Dios de sus padres[c], les da.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'Ahora'.
    reason: lexical_alternative
  - marker: b
    text: O 'los decretos y las ordenanzas'.
    reason: lexical_alternative
  - marker: c
    text: 'Hebreo: ''YHWH''; tradicionalmente se vertía ''el SEÑOR''.'
    reason: alternative_reading
lexical_decisions:
- source_word: וְעַתָּה
  english_pob_choice: And now
  chosen_spanish: Y ahora
  alternatives_spanish:
  - Ahora
  - Y bien, ahora
  lexicon: HALOT
  rationale: Mantiene el giro discursivo y la transición exhortativa sin sonar artificial en español.
- source_word: שְׁמַע
  english_pob_choice: listen to
  chosen_spanish: escucha
  alternatives_spanish:
  - oye
  - presta atención a
  lexicon: HALOT
  rationale: En este contexto de exhortación directa, 'escucha' conserva la fuerza de atención obediente sin sobretraducir como 'obedece'.
- source_word: הַחֻקִּים
  english_pob_choice: the statutes
  chosen_spanish: los estatutos
  alternatives_spanish:
  - los decretos
  - las disposiciones
  lexicon: HALOT
  rationale: '''Estatutos'' es el equivalente español más estable para חֻקִּים en contextos legales del Pentateuco y preserva la distinción con מִשְׁפָּטִים.'
- source_word: הַמִּשְׁפָּטִים
  english_pob_choice: the judgments
  chosen_spanish: los juicios
  alternatives_spanish:
  - las ordenanzas
  - las normas
  lexicon: HALOT
  rationale: Se opta por 'juicios' para conservar el valor jurídico de מִשְׁפָּטִים, aunque en español moderno también podría entenderse como 'ordenanzas'.
- source_word: מְלַמֵּד
  english_pob_choice: I am teaching
  chosen_spanish: yo te enseño
  alternatives_spanish:
  - yo te estoy enseñando
  - yo instruyo
  lexicon: HALOT
  rationale: El participio hebreo expresa una acción en curso; en español, 'yo te enseño' comunica naturalmente esa instrucción presente sin forzar perífrasis.
- source_word: לַעֲשׂוֹת
  english_pob_choice: to do
  chosen_spanish: a hacer
  alternatives_spanish:
  - para hacer
  - para cumplir
  lexicon: HALOT
  rationale: '''A hacer'' reproduce de forma cercana la finalidad del infinitivo; evita añadir una interpretación más fuerte como ''cumplir''.'
- source_word: לְמַעַן תִּחְיוּ
  english_pob_choice: so that you may live
  chosen_spanish: para que vivas
  alternatives_spanish:
  - a fin de que vivan
  - para que tengan vida
  lexicon: HALOT
  rationale: Se mantiene la relación de propósito y el efecto vital de la obediencia; el singular cohesiona el uso vocativo directo con 'Israel'.
- source_word: וּבָאתֶם
  english_pob_choice: and go in
  chosen_spanish: y entres
  alternatives_spanish:
  - y entrarás
  - y vayas adentro
  lexicon: HALOT
  rationale: En español, con el sujeto colectivo dirigido a Israel, 'entres' fluye mejor en una exhortación directa y conserva la idea de entrada en la tierra.
- source_word: וִירִשְׁתֶּם
  english_pob_choice: take possession of
  chosen_spanish: tomes posesión de
  alternatives_spanish:
  - heredes
  - poseas
  lexicon: HALOT
  rationale: '''Tomes posesión de'' expresa la ocupación concreta de la tierra, equivalente al valor de ירשׁ en este contexto de promesa territorial.'
- source_word: הָאָרֶץ
  english_pob_choice: the land
  chosen_spanish: la tierra
  alternatives_spanish:
  - el país
  - la tierra prometida
  lexicon: HALOT
  rationale: '''La tierra'' conserva el término covenantal estándar del Pentateuco sin añadir una glosa explicativa no presente en el hebreo.'
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahveh
  lexicon: HALOT
  rationale: Se sigue la convención del proyecto para el nombre divino, evitando el sustituto litúrgico 'SEÑOR' y preservando el nombre propio del pacto.
- source_word: אֱלֹהֵי אֲבֹתֵיכֶם
  english_pob_choice: the God of your fathers
  chosen_spanish: el Dios de tus padres
  alternatives_spanish:
  - el Dios de vuestros padres
  - el Dios de tus antepasados
  lexicon: HALOT
  rationale: La forma singular dirigida a Israel refleja mejor la apelación inmediata del versículo; 'padres' conserva la fórmula ancestral del hebreo.
- source_word: נֹתֵן לָכֶם
  english_pob_choice: is giving to you
  chosen_spanish: te da
  alternatives_spanish:
  - está dándote
  - te está dando
  lexicon: HALOT
  rationale: El participio puede expresarse de manera natural en presente simple español, manteniendo la idea de acción presente y segura.
theological_decisions:
- issue: Nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahveh
  - SEÑOR
  rationale: Se conserva el nombre propio del pacto, en coherencia con la política del proyecto y con el valor explícito del Tetragrama en el hebreo.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Relación entre escuchar y hacer
  english_pob_reading: listen to ... to do
  chosen_spanish_reading: escucha ... a hacer
  alternative_spanish_readings:
  - escucha ... para hacer
  - obedece ... y haz
  rationale: El hebreo une atención y práctica; el español mantiene ambas sin colapsar el primer verbo en 'obedecer', dejando que la finalidad del texto haga la carga exhortativa.
  doctrine_reference: Contexto legal-exhortativo de Deuteronomio 4:1
- issue: '''Juicios'' para מִשְׁפָּטִים'
  english_pob_reading: judgments
  chosen_spanish_reading: juicios
  alternative_spanish_readings:
  - ordenanzas
  - normas
  rationale: Aunque 'juicios' puede sonar menos usual en español contemporáneo, conserva con mayor fidelidad la correspondencia formal con מִשְׁפָּטִים y su matiz jurídico.
  doctrine_reference: Lexical distinction חֻקִּים / מִשְׁפָּטִים
translation_notes:
  revision_awareness: El expediente inglés está en alto acuerdo y sin revisiones aplicadas; la versión española sigue ese estado estable, conservando las decisiones léxicas clave sin introducir variantes no atestiguadas.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' para el nombre divino, conforme al estándar del proyecto.
  - '''Estatutos'' y ''juicios'' preservan la distinción legal del hebreo.'
  - La formulación verbal usa segunda persona singular en español para reflejar la apelación directa a Israel como colectivo.
  - Se evita 'SEÑOR' por ser un sustituto litúrgico no usado en el texto principal del proyecto.
