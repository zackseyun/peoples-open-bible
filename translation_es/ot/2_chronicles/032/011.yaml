base_translation:
  language: en
  yaml_path: translation/ot/2_chronicles/032/011.yaml
  text: Is not Hezekiah misleading you[a], to give you over to die by famine and by thirst, saying, ‘Yahweh our God will deliver us from the hand of the king of Assyria’?”
  footnotes:
  - marker: a
    text: Or 'deceiving you' or 'enticing you.' The Hebrew verb can carry the sense of leading someone astray or persuading them wrongly.
    reason: lexical_alternative
