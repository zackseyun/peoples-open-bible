  lexicon: HALOT
  rationale: El sustantivo derivado de פקד en contexto de censo designa a los miembros ya contados. «Los contados» conserva el valor censal de forma natural en español sin añadir «varones» ni expandir el sentido del hebreo.
- source_word: לְמַטֵּה
  english_pob_choice: from the tribe of
  chosen_spanish: de la tribu de
  alternatives_spanish:
  - de la tribu de, pertenecientes a
  - para la tribu de
  - por tribu de
  lexicon: HALOT
  rationale: En la fórmula censal, ל con מַטֶּה marca afiliación tribal. En español, «de la tribu de» transmite esa pertenencia de manera idiomática y fiel al patrón del pasaje.
- source_word: אָשֵׁר
  english_pob_choice: Asher
  chosen_spanish: Asher
  alternatives_spanish:
  - Aser
  lexicon: Nombre propio
  rationale: Se mantiene el nombre tribal como transliteración directa. «Asher» corresponde al uso estándar y al valor propio del hebreo en este contexto.
- source_word: אֶחָד וְאַרְבָּעִים אֶלֶף וַחֲמֵשׁ מֵאוֹת
  english_pob_choice: forty-one thousand five hundred
