translation:
  language: es
  text: Y dijo que los destruiría, de no haber sido por Moisés, su escogido[a], que estuvo en la brecha delante de él para hacer volver su ira y no destruirlos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «estuvo en el hueco». La imagen hebrea es la de ocupar una abertura en un muro; aquí describe la intercesión de Moisés.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמֶר
  english_pob_choice: So he said
  chosen_spanish: Y dijo
  alternatives_spanish:
  - Entonces dijo
  - Así que dijo
  lexicon: HALOT
  rationale: La waw consecutiva avanza la narración; en español, «Y dijo» comunica bien la continuidad narrativa sin sobrecargar el verso.
- source_word: לְהַשְׁמִידָם
  english_pob_choice: he would destroy them
  chosen_spanish: los destruiría
  alternatives_spanish:
  - los iba a destruir
  - para destruirlos
  lexicon: HALOT
  rationale: El infinitivo con ל expresa la acción prevista o resultante; en español, el condicional reproduce bien la intención amenazada en un contexto contrafactual.
- source_word: לוּלֵי
  english_pob_choice: had not
  chosen_spanish: si no se hubiera
  alternatives_spanish:
  - de no haber sido que
  - a no ser que
  lexicon: HALOT
  rationale: לוּלֵי introduce una condición irreal o contrafactual. «Si no se hubiera» conserva esa fuerza en español claro y natural.
- source_word: מֹשֶׁה בְחִירוֹ
  english_pob_choice: Moses, his chosen one
  chosen_spanish: Moisés, su escogido
  alternatives_spanish:
  - Moisés, el que él escogió
  - Moisés, su elegido
  lexicon: HALOT
  rationale: בְחִירוֹ significa uno escogido por Dios. «Escogido» mantiene el matiz de elección divina sin cargarlo con un tecnicismo posterior.
- source_word: עָמַד בַּפֶּרֶץ
  english_pob_choice: stood in the breach
  chosen_spanish: se hubiera interpuesto
  alternatives_spanish:
  - hubiera estado en la brecha
  - hubiera estado en el muro roto
  lexicon: HALOT
  rationale: La imagen hebrea apunta a tomar posición en una abertura para detener el juicio; en español, «interponerse» comunica la función intercesora de forma idiomática, sin perder el sentido de mediación que el contexto exige.
- source_word: לְפָנָיו
  english_pob_choice: before him
  chosen_spanish: delante de él
  alternatives_spanish:
  - en su presencia
  - ante él
  lexicon: HALOT
  rationale: La referencia es a Yahvé en el contexto del juicio. «Delante de él» es natural y conserva la relación de presencia judicial/intercesora.
- source_word: לְהָשִׁיב
  english_pob_choice: to turn back
  chosen_spanish: para apartar
  alternatives_spanish:
  - para volver atrás
  - para hacer retroceder
  lexicon: HALOT
  rationale: El Hiphil de שוב expresa hacer volver o desviar. «Apartar» comunica con claridad la acción de desviar la ira en español contemporáneo.
- source_word: חֲמָתוֹ
  english_pob_choice: his wrath
  chosen_spanish: su ira
  alternatives_spanish:
  - su furor
  - su enojo
  lexicon: HALOT
  rationale: חֵמָה denota ira ardiente o furor. «Ira» es el equivalente más natural y digno en español, manteniendo el peso teológico del texto.
- source_word: מֵהַשְׁחִית
  english_pob_choice: from destroying
  chosen_spanish: de destruirlos
  alternatives_spanish:
  - para no destruirlos
  - de traer destrucción
  lexicon: HALOT
  rationale: La preposición מִן con infinitivo marca prevención o apartamiento de la destrucción. «De destruirlos» sigue de cerca la estructura y evita suavizar el juicio.
theological_decisions:
- issue: Lenguaje antropopático de la ira divina
  english_pob_reading: Retain 'his wrath' as stated in the text without softening it to a less personal abstraction.
  chosen_spanish_reading: Conservar «su ira» sin convertirla en una fórmula impersonal como «juicio».
  alternative_spanish_readings:
  - su furor
  - su juicio
  rationale: El texto presenta la ira de Dios como algo que se desvía por la intercesión de Moisés. Mantener ese lenguaje preserva la tensión teológica del pasaje.
  doctrine_reference: Translation philosophy §3 Preserve theological tension rather than resolve it.
- issue: Imagen intercesora de «estar en la brecha»
  english_pob_reading: Preserve the metaphor rather than paraphrasing it as merely 'interceded.'
  chosen_spanish_reading: Expresar la función con «se hubiera interpuesto» sin eliminar el trasfondo de mediación.
  alternative_spanish_readings:
  - hubiera estado en la brecha
  - hubiera intercedido
  rationale: El español necesita una formulación idiomática que haga clara la mediación de Moisés; «interponerse» conserva el acto de ponerse entre el juicio y el pueblo, aunque no reproduce palabra por palabra la metáfora física.
  doctrine_reference: 'Translation philosophy: optimal equivalence; original-language primacy over translation tradition.'
translation_notes:
  revision_awareness: Se corrigió la condición contrafactual para reflejar mejor el sentido hebreo de «si no se hubiera...», y se integró una nota con ancla visible en el texto para la alternativa metafórica «en la brecha».
  spanish_consistency_notes:
  - Se prefirió «Yahvé» no porque aparezca explícito en el versículo, sino por la política editorial del proyecto cuando el referente divino está claro en el contexto inmediato.
  - Se mantuvo «Moisés, su escogido» para conservar el matiz de elección divina y evitar un término demasiado eclesiástico.
  - Se optó por «ira» como equivalente de חֵמָה por su naturalidad y por no diluir el tono judicial del pasaje.
  - La nota [a] está anclada en «escogido[a]» para satisfacer el requisito de coincidencia exacta del marcador en el texto español.
