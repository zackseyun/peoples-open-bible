- from: Abre tu boca por el mudo[a], por el derecho de todos los que pasan.
  to: Abre tu boca por el mudo, por los derechos de todos los que están pereciendo[a].
  rationale: Se conserva la imagen concreta del hebreo ('Abre tu boca') y la defensa del vulnerable ('por el mudo'). Se ajusta אֶל־דִּין a 'por los derechos de' para un español más natural y forense. Se reemplaza 'los que pasan' por 'los que están pereciendo' porque comunica mejor la idea de personas que se desvanecen o perecen, evitando la lectura trivial de simple tránsito. La nota al pie se traslada a la frase final, donde está la verdadera dificultad léxica, y se corrige completamente al español.
