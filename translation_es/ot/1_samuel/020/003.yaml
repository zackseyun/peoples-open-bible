revisions:
- from: 'Pero David volvió a jurar y dijo[a]: «Tu padre ciertamente sabe que he hallado gracia en tus ojos, y él ha dicho: “Que Jonatán no sepa esto, para que no se entristezca”. Pero, por vida de Yahvé, y por vida de tu alma, no hay sino un paso entre yo y la muerte».'
  to: 'Pero David volvió a jurar y dijo[a]: «Tu padre ciertamente sabe que he hallado favor ante tus ojos, y ha dicho: “No dejes que Jonatán sepa esto, para que no se entristezca”. Pero, por vida de Yahvé y por vida de tu alma, no hay sino un paso entre mí y la muerte».'
  rationale: Se corrige un error gramatical importante («mí» por «yo»), se ajusta el modismo חֵן בְּעֵינֶיךָ a un español más natural («favor ante tus ojos»), y se mejora la cita del mandato negativo para reflejar mejor el sentido auditado sin apartarse del hebreo. Se conserva «Yahvé» y la solemnidad del juramento.
