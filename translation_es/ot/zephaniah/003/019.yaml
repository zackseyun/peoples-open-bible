  - severity: medium
    issue: La nota c está invertida y no corresponde al texto anclado.
    rationale: Si el texto dice «en toda la tierra», la nota «O “en toda la tierra”» no aporta alternativa. Debe distinguir entre la lectura principal distributiva y la alternativa más literal/global.
  - severity: low
