  to: Estos, que habían sido registrados por nombre, vinieron en los días de Ezequías, rey de Judá; y abatieron sus tiendas y a los meunitas[a] que fueron hallados allí, y los consagraron al exterminio[b] hasta este día. Luego se establecieron en su lugar, porque allí había pasto para sus rebaños.
  rationale: Reubiqué la nota textual al término pertinente («meunitas»), eliminé la duplicación de notas sobre la misma dificultad, reforcé וַיַּכּוּ con «abatieron» para acercarlo a «struck down», y mejoré la naturalidad de חרם con «los consagraron al exterminio», que conserva su fuerza técnica y suena mejor en español eclesial contemporáneo.
