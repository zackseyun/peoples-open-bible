translation:
  language: es
  text: Aunque paguen entre las naciones[a], ahora yo los reuniré; y comenzarán a ser disminuidos[b] a causa de la carga del rey y los príncipes[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «Aunque den entre las naciones»; el hebreo probablemente expresa pagar o contratar apoyo extranjero en este contexto.
    reason: lexical_alternative
  - marker: b
    text: El hebreo de «comenzarán a ser disminuidos» es difícil; también puede entenderse como «comenzarán a retorcerse un poco» o «se volverán pocos a causa de la carga/tributo».
    reason: alternative_reading
  - marker: c
    text: La expresión puede referirse al tributo o exacción opresiva impuesta por un soberano imperial y sus gobernantes.
    reason: cultural_note
lexical_decisions:
- source_word: יִתְנוּ בַגּוֹיִם
  english_pob_choice: they hire among the nations
  chosen_spanish: paguen entre las naciones
  alternatives_spanish:
  - den entre las naciones
  - hagan tratos entre las naciones
  - alquilen entre las naciones
  lexicon: HALOT
  rationale: El hebreo נתן en este contexto político puede implicar dar/pagar para obtener apoyo extranjero. En español, «paguen entre las naciones» conserva la idea de desembolso o entrega con una relación política, sin forzar una imagen demasiado específica. «Entre las naciones» mantiene el valor de ב con el plural.
- source_word: עַתָּה
  english_pob_choice: now
  chosen_spanish: ahora
  alternatives_spanish:
  - en este momento
  lexicon: HALOT
  rationale: Adverbio temporal directo y natural en español, apropiado para la inmediatez del juicio divino.
- source_word: אֲקַבְּצֵם
  english_pob_choice: I will gather them
  chosen_spanish: los reuniré
  alternatives_spanish:
  - los recogeré
  - los juntaré
  - los congregaré
  lexicon: HALOT
  rationale: קבץ se rinde de manera natural como «reunir». Conserva la neutralidad léxica del verbo, aunque el contexto sugiere reunión para juicio y no restauración.
- source_word: וַיָּחֵלּוּ
  english_pob_choice: they will begin to be diminished
  chosen_spanish: comenzarán a ser disminuidos
  alternatives_spanish:
  - comenzarán a disminuir
  - empezarán a menguar
  - serán reducidos
  lexicon: HALOT
  rationale: La forma es difícil y el contexto pide una lectura coherente con מעט. «Comenzarán a ser disminuidos» mantiene la idea de inicio de reducción y refleja la pasiva/medio-aparente del giro inglés aprobado por la auditoría.
- source_word: מְּעָט
  english_pob_choice: to diminish / a little
  chosen_spanish: disminuidos
  alternatives_spanish:
  - poco
  - por un poco
  - menguados
  lexicon: HALOT
  rationale: Aunque literalmente significa «poco» o «pequeño», aquí funciona en la expresión de volverse menos. En español, el sentido queda mejor integrado en «ser disminuidos» que con una traducción aislada de «poco».
- source_word: מִמַּשָּׂא
  english_pob_choice: because of the burden of
  chosen_spanish: por la carga de
  alternatives_spanish:
  - a causa de la carga de
  - por el tributo de
  - debido al peso de
  lexicon: HALOT
  rationale: מַשָּׂא puede ser «carga», «peso» o, en contextos políticos, tributo/exacción. «Carga» preserva la opresión del dominio imperial sin cerrar indebidamente la ambigüedad concreta.
- source_word: מֶלֶךְ שָׂרִים
  english_pob_choice: the king and princes
  chosen_spanish: el rey y de los príncipes
  alternatives_spanish:
  - el rey de príncipes
  - el rey y los oficiales
  - el gran rey y los príncipes
  lexicon: HALOT
  rationale: La expresión hebrea es compacta y difícil. Siguiendo la revisión inglesa más reciente, «el rey y de los príncipes» se entiende en español como una coordinación de autoridades opresoras, con el sentido de poder imperial y subordinados; la preposición repetida anterior evita una lectura demasiado extraña.
theological_decisions:
- issue: Si «reunirlos» implica restauración o juicio
  english_pob_reading: gathering for judgment
  chosen_spanish_reading: reunirlos para juicio, sin decirlo explícitamente
  alternative_spanish_readings:
  - reunirlos para restauración
  - congregarlos para volverlos a su tierra
  rationale: En el contexto inmediato de Oseas 8, el tema dominante son la infidelidad y la opresión extranjera. Por eso «los reuniré» debe leerse como un acto de juicio, no como promesa de restauración, aunque el texto español no añade una glosa interpretativa al verbo.
  doctrine_reference: Contexto profético de juicio en Oseas 8
translation_notes:
  revision_awareness: 'He tenido en cuenta la revisión más reciente del inglés POB, que ajustó la última cláusula hacia una mayor precisión léxica: «begin to be diminished» y «the king and princes». La versión española procura reflejar esa decisión sin forzar una interpretación más explicativa que el texto base.'
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» implícito en la voz divina sin añadirlo, porque el verso en hebreo usa primera persona sin el tetragrama explícito.
  - Se prefirió «reunir» para קבץ por consistencia con el uso habitual de la serie POB en contextos de juicio/restauración, dejando la interpretación al contexto.
  - Se evitó «tributo» como opción principal para no estrechar demasiado מַשָּׂא, aunque se reconoce como alternativa posible.
  - La coordinación «del rey y de los príncipes» sigue la revisión inglesa y mantiene la acumulación de autoridad opresora sin resolver artificialmente la sintaxis hebrea.
