  glossary_alignment: No hay conflicto con la terminología del proyecto. No aparece Yahvé ni otros términos sensibles del glosario. «Alma» sigue la revisión inglesa documentada para נַפְשִׁי, con una nota que conserva el rango semántico de nephesh. «Líbrame» es una opción española válida para וְהַצִּילֵנִי. «Me refugio en ti» preserva correctamente la metáfora de חסה.
