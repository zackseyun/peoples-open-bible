review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien el sentido general del hebreo: Moisés y Aarón son devueltos a la presencia del faraón, este ordena que vayan a servir a Yahvé, y pregunta por la identidad de los que irán. Sin embargo, la cláusula inicial pierde la voz pasiva/causativa-pasiva de וַיּוּשַׁב al usar el activo impersonal ''trajeron de vuelta''. Además, la coma en ''Yahvé, su Dios'' introduce una apposición menos natural que el posesivo directo del hebreo.'
  spanish_quality_summary: El español es claro y legible, con buen tono bíblico moderno. 'Ante el faraón' es aceptable, aunque 'al faraón' también sería más directo. La principal mejora estilística y de fidelidad es usar una forma pasiva natural en español ('fueron devueltos' / 'fueron llevados de vuelta') y quitar la coma innecesaria tras 'Yahvé'.
  glossary_alignment: 'Alineación general buena con la terminología del proyecto: יְהוָה se traduce correctamente como ''Yahvé'' y עִבְדוּ como ''sirvan''. No hay conflicto doctrinal. La única desalineación relevante está en la decisión léxica de וַיּוּשַׁב, donde la explicación afirma conservar pasividad pero la redacción española quedó activa.'
  issues:
  - severity: medium
    issue: La forma verbal inicial está en activo impersonal ('trajeron de vuelta') en vez de reflejar la pasiva del hebreo.
    rationale: 'וַיּוּשַׁב es hofal de שוב, con sentido causativo-pasivo: ''fueron hechos volver / fueron devueltos''. El inglés auditado también preserva esto con ''were brought back''. En español, ''trajeron de vuelta'' cambia la perspectiva sintáctica sin necesidad.'
  - severity: low
    issue: La puntuación en 'Yahvé[a], su Dios' suena menos natural y puede sugerir apposición explicativa.
    rationale: El hebreo une directamente 'Yahvé' con 'vuestro/su Dios' como complemento posesivo. En español de discurso directo aquí fluye mejor 'Yahvé su Dios' o más naturalmente 'Yahvé, el Dios de ustedes' si se quisiera explicitar, pero la opción mínima es quitar la coma.
  - severity: low
    issue: La nota al pie usa 'se permitirá ir', formulación ligeramente más interpretativa que el texto base.
    rationale: La nota inglesa habla de identificar con precisión quiénes serán permitidos para ir, pero en español puede mantenerse más pegada al valor idiomático sin introducir una construcción futura tan marcada.
  revised_spanish_text: 'Entonces Moisés y Aarón fueron devueltos al faraón, y él les dijo: «Vayan, sirvan a Yahvé[a] su Dios. ¿Quiénes son los que van?»'
