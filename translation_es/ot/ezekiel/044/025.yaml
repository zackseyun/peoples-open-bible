translation:
  language: es
  text: Y no se acercarán a un muerto para contaminarse; pero sí por su padre o su madre, por su hijo o su hija, por su hermano, o por una hermana que no haya estado unida a un hombre[a], podrán contaminarse.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, más idiomáticamente, «una hermana soltera».
    reason: lexical_alternative
lexical_decisions:
- source_word: מֵת אָדָם
  english_pob_choice: a dead person
  chosen_spanish: un muerto
  alternatives_spanish:
  - una persona muerta
  - el cadáver de una persona
  lexicon: HALOT
  rationale: La expresión hebrea apunta a un difunto concreto. En español, «un muerto» comunica con naturalidad la referencia a una persona fallecida sin forzar una construcción más explicativa que el texto no exige.
- source_word: יָבֹוא אֶל
  english_pob_choice: go near
  chosen_spanish: acercarse
  alternatives_spanish:
  - ir a
  - venir a
  - entrar en
  lexicon: HALOT
  rationale: En contexto sacerdotal e impuro, la idea no es simplemente ‘ir’, sino aproximarse al cadáver. «Acercarse» expresa mejor el valor ritual del verbo que una forma más literal pero menos idiomática.
- source_word: לְטָמְאָה
  english_pob_choice: to make themselves unclean
  chosen_spanish: para contaminarse
  alternatives_spanish:
  - para hacerse impuros
  - para volverse impuros
  lexicon: HALOT
  rationale: El infinitivo expresa el propósito o resultado de acercarse al muerto. «Contaminarse» conserva el campo de pureza/impureza y funciona de modo natural en español bíblico contemporáneo.
- source_word: כִּי אִם
  english_pob_choice: but
  chosen_spanish: pero sí
  alternatives_spanish:
  - excepto
  - sino
  lexicon: HALOT
  rationale: La fórmula introduce una excepción permisiva. «Pero sí» mantiene el contraste con la prohibición anterior y sugiere con claridad la lista de casos permitidos.
- source_word: לְאָב וּלְאֵם וּלְבֵן וּלְבַת לְאָח וּלְאָחוֹת
  english_pob_choice: for father or mother, for son or daughter, for brother, or for a sister
  chosen_spanish: por padre o madre, por hijo o hija, por hermano, o por una hermana
  alternatives_spanish:
  - por su padre y su madre, por su hijo y su hija, por su hermano y su hermana
  - por padre y madre, por hijo e hija, por hermano y hermana
  lexicon: HALOT
  rationale: Los lamed de la lista marcan las relaciones por las que se permite la excepción. En español, «por» conserva bien ese valor de motivo/ocasión. La serie mantiene el paralelismo del hebreo sin añadir posesivos innecesarios.
- source_word: אֲשֶׁר לֹא הָיְתָה לְאִישׁ
  english_pob_choice: who has not belonged to a man
  chosen_spanish: que no haya pertenecido a un hombre
  alternatives_spanish:
  - que no haya estado casada
  - que sea soltera
  - que no haya tenido esposo
  lexicon: HALOT
  rationale: El hebreo dice literalmente que ‘no ha estado para/en relación con un hombre’, una fórmula relacional y eufemística. «Pertenecido a un hombre» conserva esa tensión sin reducirla demasiado pronto a ‘soltera’ o ‘casada’.
- source_word: יִטַּמָּאוּ
  english_pob_choice: they may make themselves unclean
  chosen_spanish: podrán contaminarse
  alternatives_spanish:
  - podrán hacerse impuros
  - se contaminarán
  lexicon: HALOT
  rationale: El imperfecto tiene aquí fuerza permisiva dentro de una excepción legal. «Podrán contaminarse» evita convertirlo en mandato y mantiene el matiz de permiso.
theological_decisions:
- issue: Fuerza legal del verbo final יִטַּמָּאוּ
  english_pob_reading: permission ('they may make themselves unclean')
  chosen_spanish_reading: permiso ('podrán contaminarse')
  alternative_spanish_readings:
  - mandato ('se contaminarán')
  - futuro simple ('se contaminarán')
  rationale: El pasaje enumera excepciones a una prohibición. En español, el futuro de posibilidad «podrán» transmite mejor la licencia ritual que una forma declarativa o imperativa.
  doctrine_reference: Translation philosophy §1, §3, §6
- issue: Sentido de la cláusula final sobre la hermana
  english_pob_reading: a sister not attached to a man in marriage
  chosen_spanish_reading: una hermana que no ha quedado unida a un hombre en matrimonio
  alternative_spanish_readings:
  - una hermana soltera
  - una hermana no casada
  rationale: La formulación hebrea es relacional, no meramente sociológica. La redacción principal retiene esa relación sin añadir la especificación de ‘soltera’ como si fuera el término del texto.
  doctrine_reference: Translation philosophy §1, §3, §4, §6
- issue: Terminología de pureza ritual
  english_pob_reading: to make themselves unclean / may make themselves unclean
  chosen_spanish_reading: contaminarse / podrán contaminarse
  alternative_spanish_readings:
  - hacerse impuros / podrán hacerse impuros
  - volverse impuros / podrán volverse impuros
  rationale: «Contaminarse» es un término bíblico y lector-inteligible para la esfera de pureza ritual. Se evita suavizarlo con expresiones que, aunque correctas, diluyen el registro legal del capítulo.
  doctrine_reference: Translation philosophy §2, §5
translation_notes:
  revision_awareness: La base inglesa revisada cambió de «dead man» a «dead person» para reflejar mejor el alcance más amplio de מֵת אָדָם. En español, se eligió «un muerto» como equivalencia natural y amplia, sin marcar género humano específico ni introducir una paráfrasis explicativa. También se mantuvo el sentido permisivo del final y la lectura relacional de la hermana, con nota alternativa idiomática.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» reservado para el Tetragrámaton; este versículo no lo contiene.
  - Se conserva el registro legal-sacerdotal con «contaminarse» en lugar de una reformulación más general.
  - «Pertenecido a un hombre» preserva la tensión del hebreo; la nota ofrece la alternativa idiomática, pero no la sustituye en el texto principal.
  - La puntuación sigue el paralelismo hebreo con coma antes de la cláusula relativa y punto y coma antes de la excepción.
