translation:
  language: es
  text: 'Entonces el profeta se acercó al rey de Israel y le dijo: «Ve, fortalécete, y sabe y mira bien lo que debes hacer[a], porque al volver el año[b] el rey de Aram[c] subirá contra ti».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «lo que harás». El hebreo está literalmente en futuro, pero aquí probablemente expresa, en sentido práctico, lo que el rey debe hacer en preparación.
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: «al regreso» o «a la vuelta del año», un giro idiomático que a menudo señala la estación en que se reanudaban las campañas militares; algunas traducciones lo vierten más interpretativamente como «la próxima primavera».'
    reason: cultural_note
  - marker: c
    text: Tradicionalmente, «el rey de Siria»; el hebreo tiene «Aram».
    reason: alternative_reading
lexical_decisions:
- source_word: וַיִּגַּשׁ
  english_pob_choice: came near
  chosen_spanish: se acercó
  alternatives_spanish:
  - se aproximó
  - vino cerca
  lexicon: HALOT
  rationale: נגשׁ expresa acercarse físicamente; «se acercó» es natural en español y conserva el movimiento concreto sin volverse mecánico.
- source_word: הַנָּבִיא
  english_pob_choice: the prophet
  chosen_spanish: el profeta
  alternatives_spanish:
  - el enviado profeta
  lexicon: HALOT
  rationale: El sustantivo con artículo define a una figura conocida en la narración; «el profeta» es directo y fiel.
- source_word: מֶלֶךְ יִשְׂרָאֵל
  english_pob_choice: the king of Israel
  chosen_spanish: el rey de Israel
  alternatives_spanish:
  - el monarca de Israel
  lexicon: HALOT
  rationale: La cadena constructa se vierte de forma natural como «el rey de Israel».
- source_word: לֵךְ
  english_pob_choice: Go
  chosen_spanish: Ve
  alternatives_spanish:
  - Anda
  - Prosigue
  lexicon: HALOT
  rationale: Imperativo de הלך; «Ve» conserva la fuerza breve e inmediata del mandato.
- source_word: הִתְחַזַּק
  english_pob_choice: strengthen yourself
  chosen_spanish: fortalécete
  alternatives_spanish:
  - esfuérzate
  - ponte fuerte
  lexicon: HALOT
  rationale: El hitpael es reflexivo/incoativo; «fortalécete» preserva mejor esa idea que un simple «sé fuerte».
- source_word: וְדַע
  english_pob_choice: know
  chosen_spanish: sabe
  alternatives_spanish:
  - conoce
  - entiende
  lexicon: HALOT
  rationale: En imperativo, ידע puede significar conocer, saber o tomar nota; aquí «sabe» mantiene el núcleo verbal y la secuencia con «ve».
- source_word: וּרְאֵה
  english_pob_choice: see
  chosen_spanish: ve
  alternatives_spanish:
  - mira
  - observa
  lexicon: HALOT
  rationale: ראה literalmente es «ver»; en español el paralelo idiomático con «sabe y ve» preserva la pareja hebrea.
- source_word: אֵת אֲשֶׁר תַּעֲשֶׂה
  english_pob_choice: what you should do
  chosen_spanish: lo que harás
  alternatives_spanish:
  - lo que debes hacer
  - lo que debes de hacer
  lexicon: HALOT
  rationale: Aunque la forma hebrea es literalmente futura, el contexto de advertencia y preparación permite «lo que harás»; se anota la tensión porque el inglés POB también la registró como futura con sentido práctico.
- source_word: לִתְשׁוּבַת הַשָּׁנָה
  english_pob_choice: at the turn of the year
  chosen_spanish: al regreso del año
  alternatives_spanish:
  - al turno del año
  - cuando el año vuelva
  lexicon: HALOT
  rationale: La expresión conserva la idea idiomática de la vuelta/retorno del año. «Al regreso del año» es literal y transparente, aunque la nota documenta el valor estacional implícito.
- source_word: מֶלֶךְ אֲרָם
  english_pob_choice: the king of Aram
  chosen_spanish: el rey de Aram
  alternatives_spanish:
  - el rey de Siria
  lexicon: HALOT
  rationale: Se mantiene «Aram» por transparencia con el hebreo; se evita sustituirlo por «Siria» salvo nota textual.
- source_word: עֹלֶה עָלֶיךָ
  english_pob_choice: will come up against you
  chosen_spanish: subirá contra ti
  alternatives_spanish:
  - vendrá contra ti
  - atacará contra ti
  lexicon: HALOT
  rationale: עלה על en contexto militar expresa subir/marchar contra alguien; «subirá contra ti» conserva la imagen bélica y la fuerza predictiva del futuro.
theological_decisions:
- issue: Identidad histórica de Aram frente a la tradición «Siria»
  english_pob_reading: Traditionally 'the king of Syria'; Hebrew has 'Aram.'
  chosen_spanish_reading: el rey de Aram
  alternative_spanish_readings:
  - el rey de Siria
  rationale: Se sigue el hebreo directo para evitar una sustitución tradicional sin base inmediata en el texto fuente.
  doctrine_reference: Transparencia textual y toponimia bíblica
- issue: Valor aspectual de la forma verbal futura en «lo que harás»
  english_pob_reading: The Hebrew form is literally future, but here likely carries the practical sense of what the king ought to do in preparation.
  chosen_spanish_reading: lo que harás
  alternative_spanish_readings:
  - lo que debes hacer
  - lo que debes de hacer
  rationale: Se preserva la forma futura del hebreo y su tensión interpretativa; el contexto de prudencia se deja implícito sin convertirlo por completo en imperativo.
  doctrine_reference: Exégesis verbal y cuidado aspectual
translation_notes:
  revision_awareness: El texto inglés revisado cambió «is coming up» por «will come up» para reflejar mejor el sentido predictivo del hebreo. La versión española sigue ese ajuste con «subirá contra ti» y conserva la tensión verbal de «lo que harás» documentada en la auditoría.
  spanish_consistency_notes:
  - Se mantiene «Aram» de forma consistente, evitando la sustitución tradicional por «Siria».
  - Se conserva la secuencia verbal breve del mandato hebreo con «Ve, fortalécete, y sabe y ve».
  - La nota de pie a marca la tensión entre la forma futura hebrea y el sentido práctico contextual.
  - El marcador [b] está anclado en «al regreso del año» y [c] en «Aram»; todos los marcadores aparecen exactamente en el texto.
  - La puntuación y el registro son publicación-readables y neutrales para lectura eclesial.
