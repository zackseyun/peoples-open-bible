revisions:
- from: Entonces Natán fue a su casa[a], y Yahvé golpeó al niño[b] que la mujer de Urías había dado a luz para David[c], y enfermó gravemente.
  to: Entonces Natán fue a su casa, y Yahvé hirió[a] al niño que la mujer de Urías había dado a luz para David[b], y enfermó[c].
  rationale: Se corrigió la sobretraducción «gravemente» a «enfermó», se reubicaron las notas para que coincidan con los lugares pertinentes del texto y con el audit trail inglés, y se cambió «golpeó» por «hirió» para un español más natural sin perder la fuerza del hebreo. Se mantuvo «Yahvé» y «la mujer de Urías» conforme a la terminología y a la motivación narrativa documentada.
