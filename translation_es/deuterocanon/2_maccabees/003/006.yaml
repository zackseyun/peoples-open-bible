revisions:
- from: Y le informó que el tesoro en Jerusalén estaba lleno de inmensas sumas de dinero[a], de modo que la cantidad de los depósitos separados era innumerable, y que no pertenecían al reparto de los sacrificios[b], sino que era posible que estas cosas cayeran bajo la autoridad del rey[c].
  to: Y le informó que el tesoro en Jerusalén estaba lleno de inmensas sumas de dinero[a], de modo que la cantidad de los fondos separados era innumerable, y que no pertenecían a la cuenta de los sacrificios[b], sino que era posible que estas cosas cayeran bajo la autoridad del rey[c].
  rationale: Se revisa «reparto» a «cuenta» para reflejar con fidelidad λόγος en este contexto administrativo, conforme al audit trail inglés y al sentido griego. También se cambia «depósitos separados» por «fondos separados» para un español más natural sin perder la idea de sumas distintas mantenidas en el tesoro. Se armoniza la nota [a] con esa formulación.
