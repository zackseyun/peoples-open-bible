translation:
  language: es
  text: 'De Jedutún: los hijos de Jedutún —Gedalías[a], Zeri, Jesaías, Hasabías y Matitías, seis—, bajo la dirección de su padre Jedutún, quien profetizaba con la lira[b], dando gracias y alabanza a Yahvé.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El texto hebreo enumera aquí cinco nombres, pero luego dice «seis». Algunos intérpretes infieren que se omitió otro hijo de la lista, o que se cuenta al mismo Jedutún.
    reason: textual_variant
  - marker: b
    text: O «profetizando con la lira para acción de gracias y alabanza a Yahvé».
    reason: lexical_alternative
lexical_decisions:
- source_word: לִידוּתוּן
  english_pob_choice: Of Jeduthun
  chosen_spanish: De Jedutún
  alternatives_spanish:
  - Para Jedutún
  - Pertenecientes a Jedutún
  lexicon: HALOT
  rationale: El ל prefijado introduce la sección o encabezado de la división musical. En español, «De Jedutún» es natural y conserva el valor de pertenencia o adscripción del grupo.
- source_word: בְּנֵי יְדוּתוּן
  english_pob_choice: the sons of Jeduthun
  chosen_spanish: los hijos de Jedutún
  alternatives_spanish:
  - los descendientes de Jedutún
  - los hijos de Jedutún
  lexicon: HALOT
  rationale: Se conserva el lenguaje familiar del hebreo. En este contexto se refiere a la casa/linaje funcional dentro del orden musical.
- source_word: גְּדַלְיָהוּ וּצְרִי וִישַׁעְיָהוּ חֲשַׁבְיָהוּ וּמַתִּתְיָהוּ
  english_pob_choice: Gedaliah, Zeri, Jeshaiah, Hashabiah, and Mattithiah
  chosen_spanish: Gedalías, Zeri, Jesaías, Hasabías y Matitías
  alternatives_spanish:
  - Guedalías, Zeri, Yesaías, Jasabías y Matatías
  - Gedalías, Zeri, Jesaías, Hasabías y Matitías
  lexicon: HALOT
  rationale: Se transliteran los nombres propios con equivalentes usuales en español bíblico, manteniendo la identificación personal sin sobreexplicar.
- source_word: שִׁשָּׁה
  english_pob_choice: six
  chosen_spanish: seis
  alternatives_spanish:
  - seis
  lexicon: HALOT
  rationale: Se conserva el número explícito del texto hebreo, sin armonizarlo con la lista de cinco nombres.
- source_word: עַל יְדֵי אֲבִיהֶם
  english_pob_choice: under the direction of their father
  chosen_spanish: bajo la dirección de su padre
  alternatives_spanish:
  - por mano de su padre
  - bajo la mano de su padre
  lexicon: HALOT
  rationale: La expresión idiomática hebrea comunica supervisión o gobierno. «Bajo la dirección de» transmite ese sentido de manera clara y natural en español.
- source_word: בַּכִּנּוֹר
  english_pob_choice: with the lyre
  chosen_spanish: con el lira
  alternatives_spanish:
  - con la lira
  - en la lira
  - con el arpa
  lexicon: HALOT
  rationale: קִנּוֹר designa el instrumento de cuerdas conocido como «lira». En español, el sustantivo es femenino; la forma correcta es «con la lira».
- source_word: הַנִּבָּא
  english_pob_choice: who prophesied
  chosen_spanish: quien profetizaba
  alternatives_spanish:
  - quien profetizó
  - profetizando
  lexicon: HALOT
  rationale: Se conserva el valor profético del participio, importante teológicamente en Crónicas, donde la música del templo se describe como actividad inspirada.
- source_word: עַל הֹדוֹת וְהַלֵּל
  english_pob_choice: giving thanks and praise
  chosen_spanish: dando gracias y alabanza
  alternatives_spanish:
  - para dar gracias y alabar
  - en acción de gracias y alabanza
  lexicon: HALOT
  rationale: El hebreo expresa el contenido de la profecía musical. La combinación «dando gracias y alabanza» sigue de cerca el sentido y suena natural en español; puede entenderse como actividad litúrgica de gratitud y alabanza.
- source_word: לַיהוָה
  english_pob_choice: to the LORD
  chosen_spanish: a Yahvé
  alternatives_spanish:
  - a Yahvé
  lexicon: HALOT
  rationale: Se sigue la norma del proyecto de renderizar el Tetragrámaton como «Yahvé» en el texto principal, evitando el masking por «SEÑOR».
theological_decisions:
- issue: Mantener la categoría de profecía aplicada al canto/instrumentación del templo
  english_pob_reading: Retain 'prophesied' in the main text for נבא, even in a musical context.
  chosen_spanish_reading: Mantener «profetizaba» en el texto principal, aunque el contexto sea musical.
  alternative_spanish_readings:
  - cantaba de manera inspirada
  - hacía música inspirada
  - profetizaba al tocar la lira
  rationale: El cronista usa lenguaje profético para la actividad musical levítica. Traducirlo como profecía preserva la tensión teológica en vez de reducirla a mera ejecución musical.
  doctrine_reference: 'Translation philosophy §3: preservar la tensión teológica documentada.'
translation_notes:
  revision_awareness: La redacción sigue el pasaje hebreo y el expediente inglés revisado que conserva el número «seis», la lectura profética de נבא y la cláusula final en forma natural. Se ajustó el nombre divino a la convención española del proyecto y se corrigió la concordancia de género con «la lira».
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» conforme a la terminología del proyecto.
  - Se eligieron formas de nombres propios comúnmente reconocibles en español bíblico.
  - Se conservó el número «seis» aunque la lista visible contiene cinco nombres, evitando armonización.
  - «Profetizaba» preserva el peso teológico de נבא en un contexto musical.
  - 'Se corrigió la concordancia: «con la lira», no «con el lira».'
