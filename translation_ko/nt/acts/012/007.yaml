  yaml_path: translation/nt/acts/012/007.yaml
  text: And behold[a], an angel of the Lord stood near, and a light shone in the cell. Striking Peter on the side, he woke him, saying[b], “Get up quickly.” And his chains fell off from his hands.
  footnotes:
  - marker: a
    text: Or “stood by” or “appeared suddenly.” The Greek verb can emphasize sudden presence as well as standing near.
    reason: lexical_alternative
  - marker: b
    text: Or “room” or “chamber”; the Greek term is more general, but “cell” fits the prison setting in context.
    reason: lexical_alternative
translation:
  language: ko
  text: 그런데 보십시오, 주의 천사가 곁에 서더니 감방 안에 빛이 비쳤습니다. 천사가 베드로의 옆구리를 쳐서 깨우며 「급히 일어나거라」 하고 말하자, 그의 손에서 쇠사슬이 떨어졌습니다.
  philosophy: optimal-equivalence
