translation:
  text: And the beasts turned against the armed forces following them[a], and they trampled them and destroyed them.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the accompanying armed troops.' The Greek participle means 'following along' or 'accompanying.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀπέστρεψαν
  chosen: turned against
  alternatives:
  - turned back
  - were turned
  lexicon: LSJ
  rationale: The active plural verb with τὰ θηρία as subject indicates the beasts changed direction toward a new target. 'Turned against' makes the hostile redirection explicit in natural English.
- source_word: τὰ θηρία
  chosen: the beasts
  alternatives:
  - the animals
  lexicon: LSJ
  rationale: θηρία commonly denotes wild beasts; in this narrative context of elephants used for execution, 'beasts' preserves the force and danger better than the flatter 'animals'.
- source_word: ἐπὶ
  chosen: against
  alternatives:
  - upon
  - toward
  lexicon: LSJ
  rationale: With verbs of movement and hostile action, ἐπί here is best rendered 'against,' since the following clause shows the beasts attacking and killing the soldiers.
- source_word: τὰς συνεπομένας ἔνοπλους δυνάμεις
  chosen: the armed forces following along with them
  alternatives:
  - the accompanying armed troops
  - the armed forces that were following
  lexicon: LSJ
  rationale: συνεπομένας means accompanying or following along; ἔνοπλους δυνάμεις refers to armed forces/troops. The feminine participle agrees with δυνάμεις. 'Following along with them' preserves the participial nuance without over-specifying the antecedent beyond the Greek.
- source_word: κατεπάτουν
  chosen: trampled them down
  alternatives:
  - trampled them
  - crushed them underfoot
  lexicon: LSJ
  rationale: The imperfect depicts ongoing action. 'Trampled them down' conveys repeated crushing underfoot and keeps the vividness of the verb.
- source_word: ὠλέθρευον
  chosen: destroyed them
  alternatives:
  - killed them
  - wiped them out
  lexicon: LSJ
  rationale: The verb can denote destroying or causing ruin. 'Destroyed them' is broad enough to include lethal devastation while matching the Greek's severity.
