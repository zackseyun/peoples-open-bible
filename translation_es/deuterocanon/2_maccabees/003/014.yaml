    issue: «ansiedad» no es la mejor opción para ἀγωνία en este contexto
    rationale: Aunque es semánticamente posible, en español contemporáneo «ansiedad» suele evocar un estado interior o clínico. El griego aquí describe la aprensión colectiva de toda la ciudad; «inquietud» comunica mejor esa dimensión pública sin sobretraducir a «angustia».
  - severity: low
    issue: La nota al pie puede quedar mejor alineada con la litote y el nuevo sustantivo
    rationale: 'La explicación «gran perturbación pública» es entendible, pero puede precisarse más cerca del valor de la litote: «mucha inquietud en público» o «considerable inquietud pública».'
