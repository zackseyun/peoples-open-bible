translation:
  language: es
  text: Y había guerra entre Roboam y Jeroboam todos los días de su vida[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O bien, «todos los días de la vida de Roboam». Algunos intérpretes, a la luz del contexto circundante y de la discusión textual, entienden que el pronombre se refiere más bien a Abías (Abiam).
    reason: alternative_reading
lexical_decisions:
- source_word: וּ/מִלְחָמָה
  english_pob_choice: And there was war
  chosen_spanish: Y hubo guerra
  alternatives_spanish:
  - Y había guerra
  - Y hubo conflicto armado
  lexicon: HALOT
  rationale: מִלְחָמָה nombra guerra o combate; en español bíblico contemporáneo, «guerra» es la equivalencia más natural y fiel. El hebreo lleva una simple conjunción narrativa, por eso se conserva con «Y». El imperfectivo/estativo se vierte idiomáticamente con «hubo» para una afirmación histórica puntual.
- source_word: הָיְתָה
  english_pob_choice: there was
  chosen_spanish: hubo
  alternatives_spanish:
  - había
  - existió
  lexicon: HALOT
  rationale: La construcción existencial con היה en pasado se expresa de modo natural en español con «hubo». Mantiene la lectura histórica sin introducir una idea de continuidad que el verbo por sí solo no exige.
- source_word: בֵין ... וּ/בֵין
  english_pob_choice: between ... and
  chosen_spanish: entre ... y
  alternatives_spanish:
  - entre ... entre
  lexicon: HALOT
  rationale: La doble preposición marca a las dos partes en oposición. En español, «entre ... y» reproduce con claridad la relación binaria sin resultar forzado.
- source_word: רְחַבְעָם
  english_pob_choice: Rehoboam
  chosen_spanish: Roboam
  alternatives_spanish:
  - Rehoboam
  lexicon: convención transliterada
  rationale: Se usa la forma española bíblica establecida «Roboam», más reconocible y natural para lectores en español, sin alterar la identidad del nombre propio.
- source_word: יָרָבְעָם
  english_pob_choice: Jeroboam
  chosen_spanish: Jeroboam
  alternatives_spanish:
  - Jerooboam
  lexicon: convención transliterada
  rationale: Se conserva la forma española habitual «Jeroboam», que corresponde al nombre propio tradicionalmente recibido en español bíblico.
- source_word: כָּל יְמֵי
  english_pob_choice: all the days of
  chosen_spanish: todos los días de
  alternatives_spanish:
  - durante toda la vida de
  - a lo largo de
  lexicon: HALOT
  rationale: El hebreo usa un modismo temporal que señala toda la duración de una vida. «Todos los días de» preserva la forma del original y su sentido cronológico.
- source_word: חַיָּיו
  english_pob_choice: his life
  chosen_spanish: su vida
  alternatives_spanish:
  - su vida (de él)
  - su existencia
  lexicon: HALOT
  rationale: El sufijo masculino singular se traduce literalmente como «su vida». En español, el antecedente queda deliberadamente sin resolver en el texto principal para conservar la ambigüedad textual observada en el audit trail inglés.
theological_decisions:
- issue: Referente del pronombre en «su vida»
  english_pob_reading: Rendered literally as 'his life' without specifying the antecedent in the main text.
  chosen_spanish_reading: Se deja «su vida» sin aclarar el antecedente en el texto principal.
  alternative_spanish_readings:
  - la vida de Roboam
  - la vida de Abías
  rationale: El hebreo presenta un sufijo masculino singular que no explicita a quién se refiere. Dado que el contexto y la discusión textual permiten más de una identificación, se preserva la ambigüedad en vez de resolverla interpretativamente en el texto principal.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: La revisión más reciente indica que no hubo cambios necesarios y que el acuerdo con la revisión automática fue alto; por eso esta propuesta conserva la ambigüedad del referente pronominal y la sintaxis breve del versículo sin expandirla.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» solo cuando el texto fuente requiera el nombre divino; aquí no aparece.
  - Se ha preferido «Roboam» como forma española establecida para el nombre propio, en lugar de una transliteración más cercana al hebreo.
  - «Guerra» conserva la fuerza léxica de מִלְחָמָה sin suavizarla en «conflicto».
  - La puntuación y el orden siguen una prosa bíblica clara y sobria, apta para lectura pública.
