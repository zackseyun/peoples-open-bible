translation:
  language: es
  text: Yahvé vio que la maldad del hombre era grande en la tierra, y que toda inclinación de los pensamientos de su corazón era solamente mala[a] todo el día[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'la maldad de la humanidad'. Aquí אָדָם se refiere colectivamente al género humano.
    reason: lexical_alternative
  - marker: b
    text: O 'continuamente mala'. El hebreo dice literalmente 'solamente mala todo el día'.
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  - el SEÑOR
  lexicon: HALOT
  rationale: El Tetragrámaton se translitera como nombre propio divino, no como un sustituto titular. 'Yahvé' mantiene la decisión POB de preservar el nombre personal revelado a Israel y es natural en español bíblico moderno.
- source_word: רָעַת הָאָדָם
  english_pob_choice: the wickedness of man
  chosen_spanish: la maldad del hombre
  alternatives_spanish:
  - la maldad de la humanidad
  - la maldad de los seres humanos
  - la maldad del ser humano
  lexicon: HALOT
  rationale: '''Maldad'' comunica el peso moral de רָעָה/רָעַת en este contexto. ''Del hombre'' conserva el valor colectivo/genericamente representativo de אָדָם sin borrar el rasgo masculino del hebreo; la alternativa inclusiva queda implícita en la nota textual cuando conviene.'
- source_word: בָּאָרֶץ
  english_pob_choice: on the earth
  chosen_spanish: en la tierra
  alternatives_spanish:
  - sobre la tierra
  - en el mundo
  lexicon: HALOT
  rationale: En el contexto primevo de Génesis, אֶרֶץ abarca la tierra en sentido amplio. 'En la tierra' es idiomático en español y conserva mejor el alcance del hebreo que 'en el mundo'.
- source_word: יֵצֶר
  english_pob_choice: inclination
  chosen_spanish: inclinación
  alternatives_spanish:
  - impulso
  - disposición
  - intención
  lexicon: HALOT
  rationale: '''Inclinación'' reproduce bien la idea de disposición interna o impulso formativo del corazón, sin reducirla a mera cognición ni perder su sentido antropológico.'
- source_word: מַחְשְׁבֹת לִבּוֹ
  english_pob_choice: the thoughts of his heart
  chosen_spanish: los pensamientos de su corazón
  alternatives_spanish:
  - las intenciones de su corazón
  - los planes de su corazón
  - los pensamientos de su interior
  lexicon: HALOT
  rationale: La construcción hebrea une pensamiento y 'corazón' como centro interior de la persona. 'Los pensamientos de su corazón' conserva esa antropología bíblica sin reemplazarla por 'mente'.
- source_word: לִבּוֹ
  english_pob_choice: his heart
  chosen_spanish: su corazón
  alternatives_spanish:
  - su mente
  - su interior
  lexicon: HALOT
  rationale: Se mantiene 'corazón' porque en hebreo incluye pensamiento, voluntad y deseo; no conviene reducirlo a intelecto. En español es claro y fiel dentro de la imagen bíblica.
- source_word: רַק
  english_pob_choice: only
  chosen_spanish: solo
  alternatives_spanish:
  - únicamente
  - solamente
  - nada más que
  lexicon: HALOT
  rationale: '''Solo'' expresa la restricción absoluta del hebreo y encaja de manera natural en la sintaxis española de la cláusula.'
- source_word: רַע
  english_pob_choice: evil
  chosen_spanish: mal
  alternatives_spanish:
  - malo
  - malvado
  - maldad
  lexicon: HALOT
  rationale: Aquí el adjetivo apunta al mal moral como cualidad de la disposición interior. 'Mal' funciona con naturalidad en español tras 'era solo', y evita endurecer innecesariamente el paralelismo.
- source_word: כָּל הַיּוֹם
  english_pob_choice: all the day
  chosen_spanish: todo el día
  alternatives_spanish:
  - todo el tiempo
  - continuamente
  - a lo largo de todo el día
  lexicon: HALOT
  rationale: La locución hebrea expresa continuidad persistente. 'Todo el día' es la forma más directa y natural en español, y permite conservar el sabor idiomático sin sobreexplicar.
theological_decisions:
- issue: 'שם יהוה: nombre divino versus sustituto reverencial'
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Jehová
  - el SEÑOR
  rationale: Se sigue la política POB de no ocultar el Nombre divino tras un título. 'Yahvé' es la transliteración española estable del Tetragrámaton y preserva la referencia personal del texto hebreo.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: אָדָם como colectivo humano
  english_pob_reading: the wickedness of man
  chosen_spanish_reading: la maldad del hombre
  alternative_spanish_readings:
  - la maldad de la humanidad
  - la maldad del ser humano
  rationale: El hebreo usa אָדָם en sentido colectivo, pero el singular genérico conserva la representación antropológica del original. Se evita neutralizar el término sin necesidad textual; la opción inclusiva sigue siendo una alternativa legítima contextual.
  doctrine_reference: 'DOCTRINE.md Translation philosophy §4; Contested terms: אָדָם *adam*'
- issue: 'Última cláusula: posibilidad de continuidad adverbial'
  english_pob_reading: was only evil all the day
  chosen_spanish_reading: era solo mal todo el día
  alternative_spanish_readings:
  - era continuamente mal
  - era solo mal continuamente
  rationale: El hebreo literalmente dice 'solo mal todo el día'. Se mantiene la tensión entre literalidad e idiomaticidad sin convertirla totalmente en un adverbio interpretativo; la nota explica la lectura alternativa de continuidad.
  doctrine_reference: HALOT on רַק + כָּל הַיּוֹם; English POB footnote b
- issue: Antropología del 'corazón'
  english_pob_reading: the thoughts of his heart
  chosen_spanish_reading: los pensamientos de su corazón
  alternative_spanish_readings:
  - los pensamientos de su mente
  - los pensamientos de su interior
  rationale: '''Corazón'' retiene la antropología bíblica hebrea, donde el centro interior incluye pensamiento, voluntad y deseo. Traducirlo por ''mente'' reduciría indebidamente el alcance semántico.'
  doctrine_reference: DOCTRINE.md lexical principle on לֵב/לֵבָב
translation_notes:
  revision_awareness: 'La revisión más reciente indicó que no se requerían cambios. Esta versión mantiene el acuerdo observado: conserva Yahvé para יְהוָה, refleja el valor colectivo de אָדָם con una nota alternativa, y deja visible la tensión de רַק + כָּל הַיּוֹם entre literalidad (''solo mal todo el día'') y lectura adverbial (''continuamente mal'').'
  spanish_consistency_notes:
  - Se usa 'Yahvé' de manera consistente con el estándar POB para el Nombre divino.
  - '''Corazón'' se mantiene como término antropológico bíblico, no como simple sinónimo de mente.'
  - '''Maldad'' y ''mal'' diferencian el sustantivo moral de la cualidad final de la cláusula.'
  - La puntuación reproduce el flujo narrativo de una sola oración compuesta, con coma antes de la segunda cláusula y cierre final en español.
