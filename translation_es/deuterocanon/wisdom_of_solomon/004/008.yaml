translation:
  language: es
  text: Porque la vejez es honorable, no porque sea longeva ni porque se mida por el número de años;
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: γῆρας
  english_pob_choice: old age
  chosen_spanish: la vejez
  alternatives_spanish:
  - la edad avanzada
  - la ancianidad
  lexicon: LSJ
  rationale: γῆρας nombra la vejez como etapa de la vida, no a una persona anciana. En español, «la vejez» es la equivalente más natural y precisa para esa etapa, y conserva el contraste sapiencial del versículo.
- source_word: τίμιον
  english_pob_choice: honorable
  chosen_spanish: honorable
  alternatives_spanish:
  - preciosa
  - estimable
  - valiosa
  lexicon: LSJ
  rationale: Aquí τίμιον expresa valor moral y social, no precio material. «Honorable» reproduce bien esa dignidad ética en español y evita reducir el término a una idea de valor económico.
- source_word: οὐ τὸ πολύχρονον
  english_pob_choice: not because it is long-lived
  chosen_spanish: no por ser longeva
  alternatives_spanish:
  - no por su larga duración
  - no por ser de muchos años
  - no por la longevidad
  lexicon: LSJ
  rationale: La frase griega niega que la honra de la vejez provenga de la mera duración de la vida. «No por ser longeva» mantiene la relación causal negada y suena natural en español, sin perder el contraste con el mero tiempo vivido.
- source_word: ἀριθμῷ ἐτῶν
  english_pob_choice: by the number of years
  chosen_spanish: por el número de años
  alternatives_spanish:
  - según el número de años
  - por la cuenta de los años
  - por años contados
  lexicon: LSJ
  rationale: El dativo indica la medida o criterio de evaluación. «Por el número de años» conserva la idea de medición cuantitativa y resulta idiomático en español.
- source_word: μεμέτρηται
  english_pob_choice: is measured
  chosen_spanish: se mide
  alternatives_spanish:
  - ha sido medida
  - es medida
  - se calcula
  lexicon: LSJ
  rationale: 'El perfecto pasivo griego expresa un estado resultante: la vejez no queda definida por ese criterio numérico. En español, «se mide» comunica de forma natural ese valor de criterio o estándar sin sobrecargar el aspecto verbal.'
theological_decisions:
- issue: La base del honor en la vejez
  english_pob_reading: The verse states that the honor of old age does not consist in mere longevity or chronological count.
  chosen_spanish_reading: El honor de la vejez no consiste en la mera longevidad ni en el conteo cronológico de los años.
  alternative_spanish_readings:
  - El honor de la vejez no está en vivir muchos años.
  - La vejez no es honorable por el simple paso del tiempo.
  rationale: 'El griego sapiencial distingue entre la dignidad de la vejez y la cantidad de años vividos. La traducción preserva esa tensión: la vejez puede ser honorable, pero no porque automáticamente lo sea por duración o cómputo de años.'
  doctrine_reference: 'Translation philosophy: preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: 'La versión sigue de cerca la estructura del griego y el sentido auditado del inglés POB: una afirmación sobre la honra de la vejez con doble negación que excluye la mera duración y el conteo de años como criterio.'
  spanish_consistency_notes:
  - Se usó «vejez» para γῆρας porque nombra la etapa de vida y mantiene el paralelismo sapiencial.
  - Se evitó «SEÑOR» u այլ terminología teológica no pertinente; el versículo no contiene el nombre divino ni un título cristológico.
  - «Honorable» se conservó literalmente porque en español comunica dignidad moral con claridad y sin añadir matices no presentes en el griego.
  - La construcción «no por ser longeva» reproduce la negación causal de οὐ τὸ πολύχρονον de forma natural en español.
  - «Se mide» refleja el valor gnómico del perfecto pasivo μεμέτρηται sin forzar una perífrasis más pesada.
