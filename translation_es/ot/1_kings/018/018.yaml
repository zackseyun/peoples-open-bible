  to: 'Y él dijo: «Yo no he causado problemas a Israel,[a] sino tú y la casa de tu padre, porque han abandonado los mandamientos de Yahvé y has ido tras los Baales».[b]'
  rationale: Se corrige el verbo principal para reflejar mejor עָכַרְתִּי en español natural, se elimina la nota errónea sobre «a ti mismo», se mejora la fluidez repitiendo implícitamente la acusación con una construcción más clara, se conserva «Yahvé» según la política del proyecto, y se normaliza «Baales» para preservar el plural hebreo con mejor legibilidad. No se necesita nota sobre Yahvé aquí porque el español principal ya usa la forma doctrinal requerida y la nota inglesa respondía a una diferencia del texto inglés, no a una ambigüedad del español.
