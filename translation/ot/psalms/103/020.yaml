id: PSA.103.20
reference: Psalms 103:20
source:
  edition: WLC
  text: בָּרֲכ֥וּ יְהוָ֗ה מַלְאָ֫כָ֥י/ו גִּבֹּ֣רֵי כֹ֭חַ עֹשֵׂ֣י דְבָר֑/וֹ לִ֝/שְׁמֹ֗עַ בְּ/ק֣וֹל דְּבָרֽ/וֹ׃
translation:
  text: Bless Yahweh[a], his angels, mighty in strength, who do his word[b], obeying the voice of his word.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or more literally, 'listening to the voice of his word.'
    reason: lexical_alternative
  - marker: b
    text: Or 'who do his word by obeying the sound of his word'.
    reason: previous_rendering
lexical_decisions:
- source_word: בָּרֲכוּ
  chosen: Bless
  alternatives:
  - Praise
  lexicon: HALOT
  rationale: Imperative plural from ברך addressed to the angels. 'Bless' is the standard and contextually fitting rendering in Psalm 103, preserving the psalm's repeated summons to bless YHWH rather than shifting to the less specific 'praise'.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: מַלְאָכָיו
  chosen: his angels
  alternatives:
  - his messengers
  lexicon: HALOT
  rationale: In this poetic-heavenly context, מלאך clearly refers to heavenly beings rather than human envoys. 'His angels' is the most natural and contextually precise rendering.
- source_word: גִּבֹּרֵי כֹחַ
  chosen: mighty in strength
  alternatives:
  - mighty ones of strength
  - strong warriors
  - mighty heroes
  lexicon: HALOT
  rationale: The construct phrase literally denotes those mighty in power/strength. 'Mighty in strength' preserves the Hebrew sense without over-militarizing the expression with 'warriors' or making it wooden with 'mighty ones of strength.'
- source_word: עֹשֵׂי דְבָרוֹ
  chosen: who do his word
  alternatives:
  - doing his word
  - who carry out his command
  - who do what he says
  lexicon: HALOT
  rationale: The participial phrase describes the angels' characteristic action. 'Do his word' is slightly formal but preserves the Hebrew collocation and keeps the parallel with the repeated דְבָרוֹ. 'Command' is possible but narrows דָּבָר from 'word' to an interpretive subset.
- source_word: לִשְׁמֹעַ
  chosen: by obeying
  alternatives:
  - to hear
  - to listen to
  - in hearing
  lexicon: HALOT
  rationale: שׁמע in Hebrew often carries the sense of hearing with responsive obedience. Here, in relation to angels carrying out God's word, 'by obeying' brings out the functional sense in idiomatic English while still matching the context of action.
- source_word: בְּקוֹל דְּבָרוֹ
  chosen: the sound of his word
  alternatives:
  - the voice of his word
  - his spoken command
  lexicon: HALOT
  rationale: קוֹל is literally 'voice' or 'sound.' Because English 'voice of his word' is awkward, 'the sound of his word' preserves the auditory imagery. An alternative footnote preserves the more literal 'voice of his word.'
