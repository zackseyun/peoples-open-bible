translation:
  language: es
  text: 'Entonces Ehud vino a él mientras estaba sentado solo en su cámara fresca de la azotea[b], y Ehud dijo: «Tengo una palabra de Dios[a] para ti». Y se levantó de su asiento[c].'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «un mensaje de Dios».
    reason: lexical_alternative
  - marker: b
    text: O «cámara alta fresca».
    reason: lexical_alternative
  - marker: c
    text: Hebreo «del asiento»; «silla» o «trono» también son posibles según el contexto.
    reason: lexical_alternative
lexical_decisions:
- source_word: בָּא
  english_pob_choice: came
  chosen_spanish: vino
  alternatives_spanish:
  - llegó
  - se acercó
  lexicon: HALOT
  rationale: El verbo expresa llegada o movimiento hasta la persona; «vino» comunica el hecho narrativo de manera natural y sin añadir matices de dirección que el hebreo no exige.
- source_word: יֹשֵׁב
  english_pob_choice: was sitting
  chosen_spanish: estaba sentado
  alternatives_spanish:
  - estaba recostado
  - se hallaba sentado
  lexicon: HALOT
  rationale: El participio describe una acción en curso, de fondo. «Estaba sentado» conserva bien ese valor durativo en español.
- source_word: עֲלִיַּת הַמְּקֵרָה
  english_pob_choice: cool roof chamber
  chosen_spanish: cámara fresca de la azotea
  alternatives_spanish:
  - cuarto fresco de la azotea
  - aposento fresco sobre la azotea
  lexicon: HALOT
  rationale: עֲלִיָּה apunta a una habitación alta o de azotea, y הַמְּקֵרָה sugiere frescura/ventilación. «Cámara fresca de la azotea» preserva tanto la arquitectura como la sensación climática en un español natural y digno.
- source_word: אֲשֶׁר לֹו לְבַדּוֹ
  english_pob_choice: alone
  chosen_spanish: solo
  alternatives_spanish:
  - a solas
  - para él solo
  lexicon: HALOT
  rationale: La frase resalta privacidad y exclusividad de uso. «Solo» transmite el sentido inmediato con economía, mientras que el matiz de posesión privada queda implícito, como en el inglés POB.
- source_word: דְּבַר אֱלֹהִים
  english_pob_choice: a word from God
  chosen_spanish: una palabra de Dios
  alternatives_spanish:
  - un mensaje de Dios
  - la palabra de Dios
  lexicon: HALOT
  rationale: El hebreo permite un valor de «mensaje/palabra» divino. Se mantiene la estructura breve y literal con «una palabra de Dios», evitando convertirlo en una fórmula doctrinal más amplia de lo que el contexto exige.
- source_word: אֱלֹהִים
  english_pob_choice: God
  chosen_spanish: Dios
  alternatives_spanish:
  - dioses
  - lo divino
  lexicon: HALOT
  rationale: Aunque la forma es morfológicamente plural, el contexto exige el singular. En español, «Dios» es la opción correcta y transparente para este uso.
- source_word: וַיָּקָם
  english_pob_choice: he rose
  chosen_spanish: se levantó
  alternatives_spanish:
  - se puso de pie
  - se alzó
  lexicon: HALOT
  rationale: El verbo indica que pasó a estar en pie. «Se levantó» es la forma más natural y fiel en español bíblico contemporáneo.
- source_word: מֵעַל הַכִּסֵּא
  english_pob_choice: from his seat
  chosen_spanish: de su asiento
  alternatives_spanish:
  - del trono
  - de la silla
  lexicon: HALOT
  rationale: כִּסֵּא puede significar asiento, silla o trono. Aquí, por el entorno privado descrito, «asiento» es el término más sobrio y menos interpretativo; «trono» introduciría un matiz regio más fuerte de lo que el contexto inmediato demanda.
theological_decisions:
- issue: Valor de אֱלֹהִים en la declaración de Ehud
  english_pob_reading: God
  chosen_spanish_reading: Dios
  alternative_spanish_readings:
  - dioses
  - divinidad
  rationale: La forma plural hebrea funciona aquí con sentido singular en una expresión de mensaje divino. Se conserva «Dios» sin amplificar la frase; el relato cita las palabras de Ehud, no ofrece una evaluación teológica de su intención.
  doctrine_reference: Monoteísmo bíblico / uso singular contextual de אֱלֹהִים
- issue: Posible tensión entre 'palabra' y 'mensaje' en דְּבַר אֱלֹהִים
  english_pob_reading: a word from God
  chosen_spanish_reading: una palabra de Dios
  alternative_spanish_readings:
  - un mensaje de Dios
  - la palabra de Dios
  rationale: «Palabra» mantiene la correspondencia más cercana con דְּבַר y evita sobredeterminar la expresión. «Mensaje de Dios» sería viable, pero desplaza el peso lexical; «la palabra de Dios» sonaría demasiado formulada para una comunicación puntual.
  doctrine_reference: Teología del habla profética / comunicación divina puntual
translation_notes:
  revision_awareness: Se siguió de cerca el audit trail inglés de la POB y el texto hebreo, preservando la escena narrativa, la ambigüedad léxica de עֲלִיַּת הַמְּקֵרָה y la flexibilidad de כִּסֵּא sin cargar el pasaje con formulaciones más interpretativas que las del original.
  spanish_consistency_notes:
  - Se usó «Yahvé» como convención general del proyecto solo cuando corresponde al Tetragrámaton; aquí no aparece.
  - Se prefirió «Dios» para אֱלֹהִים por contexto singular.
  - Se mantuvo un registro narrativo sobrio y bíblico, evitando arcaísmos innecesarios y evitando también un español demasiado coloquial.
  - La puntuación conserva comillas angulares para el discurso directo según uso editorial en español.
