base_translation:
  language: en
  yaml_path: translation/ot/jeremiah/021/009.yaml
  text: The one who stays in this city will die by the sword[a], by famine, and by pestilence; but the one who goes out and defects to the Chaldeans who are besieging you will live[b], and his life will be to him as plunder.
  footnotes:
  - marker: a
    text: Or 'defects to the Chaldeans.' The Hebrew idiom 'falls over to' can denote going over to the enemy.
    reason: lexical_alternative
  - marker: b
    text: Literally, 'his life will be to him for plunder,' an idiom meaning he will escape with only his life.
    reason: lexical_alternative
