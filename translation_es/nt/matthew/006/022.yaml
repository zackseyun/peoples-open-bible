translation:
  language: es
  text: El ojo es la lámpara del cuerpo. Por tanto[a], si tu ojo es sano, todo tu cuerpo estará lleno de luz.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «simple», «claro» o «en buen estado»; la palabra griega también puede expresar la idea de algo no dividido y, en algunos contextos, generoso.
    reason: lexical_alternative
lexical_decisions:
- source_word: λύχνος
  english_pob_choice: lamp
  chosen_spanish: lámpara
  alternatives_spanish:
  - lámpara
  - luz
  lexicon: BDAG
  rationale: λύχνος nombra un objeto que da luz; en español, «lámpara» conserva mejor la imagen concreta que «luz» en abstracto y corresponde al valor metafórico del ojo como fuente de iluminación para el cuerpo.
- source_word: ὀφθαλμός
  english_pob_choice: eye
  chosen_spanish: ojo
  alternatives_spanish:
  - ojo
  lexicon: BDAG
  rationale: La traducción literal mantiene la imagen corporal y moral del pasaje sin forzar el sentido.
- source_word: σῶμα
  english_pob_choice: body
  chosen_spanish: cuerpo
  alternatives_spanish:
  - cuerpo
  lexicon: BDAG
  rationale: «Cuerpo» es el equivalente directo y conserva el alcance total de la metáfora.
- source_word: ἐὰν οὖν
  english_pob_choice: Therefore, if
  chosen_spanish: Por tanto, si
  alternatives_spanish:
  - Entonces, si
  - Así que, si
  lexicon: BDAG
  rationale: οὖν expresa inferencia; «Por tanto» mantiene la conexión lógica con la afirmación anterior en un español natural y bíblico.
- source_word: ἁπλοῦς
  english_pob_choice: healthy
  chosen_spanish: sano
  alternatives_spanish:
  - simple
  - claro
  - íntegro
  - generoso
  lexicon: BDAG
  rationale: En el contexto inmediato de la vista y la iluminación del cuerpo, ἁπλοῦς puede describir un ojo que funciona correctamente; «sano» expresa esa función sin introducir ambigüedad innecesaria. «Simple» sería demasiado opaco en español moderno, y «generoso» pertenece a extensiones semánticas menos probables aquí.
- source_word: ὅλον
  english_pob_choice: whole
  chosen_spanish: todo
  alternatives_spanish:
  - todo
  - entero
  lexicon: BDAG
  rationale: «Todo» transmite la totalidad del cuerpo de manera natural y fiel al griego.
- source_word: φωτεινὸν
  english_pob_choice: full of light
  chosen_spanish: lleno de luz
  alternatives_spanish:
  - luminoso
  - resplandeciente
  lexicon: BDAG
  rationale: La construcción predicativa pide una expresión idiomática en español; «lleno de luz» preserva la imagen de iluminación que afecta al cuerpo entero.
- source_word: ἔσται
  english_pob_choice: will be
  chosen_spanish: estará
  alternatives_spanish:
  - será
  lexicon: BDAG
  rationale: El futuro explícito del griego se mantiene con un futuro natural en español.
theological_decisions:
- issue: Sentido de ἁπλοῦς en la metáfora del ojo
  english_pob_reading: healthy in the main text, with footnoted alternatives single/clear/sound/generous
  chosen_spanish_reading: sano en el texto principal, con alternativas «simple», «claro», «íntegro» o «generoso» en nota
  alternative_spanish_readings:
  - simple
  - claro
  - íntegro
  - generoso
  rationale: El contexto inmediato habla del ojo como lámpara del cuerpo y prepara el contraste del versículo siguiente; por eso una traducción ligada al buen funcionamiento de la vista comunica mejor la metáfora. La nota conserva las otras posibilidades semánticas que el término puede tener en otros contextos, evitando borrar la tensión lexical.
  doctrine_reference: Translation philosophy §§1, 3, 6
translation_notes:
  revision_awareness: 'Coincide con el último pase de revisión: no se requieren cambios respecto del testimonio fuente y del auditable inglés POB. Se ha conservado la metáfora concreta («lámpara»), el futuro explícito y la ambigüedad lexical de ἁπλοῦς en nota.'
  spanish_consistency_notes:
  - Se mantiene «ojo» y «cuerpo» de modo literal para preservar la metáfora corporal.
  - «Por tanto» refleja la relación inferencial de οὖν sin volverla más explicativa de lo necesario.
  - La nota evita sustituir el sentido principal por una sola opción tradicional y conserva alternativas relevantes para el lector español.
