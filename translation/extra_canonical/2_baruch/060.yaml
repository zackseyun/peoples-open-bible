translation:
  text: |-
    1. And the fifth black waters that you saw raining—these are the deeds that the Amorites did, and the spells of their enchantments that they practiced, and the wickedness of their mysteries, and the mingling of their uncleanness.
    
    2. But Israel also was defiled with sins in the days of the judges, while they were seeing many signs that were done by him who made them.
