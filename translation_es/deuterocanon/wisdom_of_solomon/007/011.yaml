lexical_decisions:
- source_word: ἦλθεν
  english_pob_choice: came
  chosen_spanish: vinieron
  alternatives_spanish:
  - llegaron
  - vinieron a mí
  lexicon: BDAG
  rationale: El aoristo de ἔρχομαι se expresa de forma natural en español con un verbo de movimiento en plural, ya que el sujeto son "las cosas buenas". "Vinieron" conserva la sencillez del griego y el valor idiomático de llegada de bienes al hablante.
- source_word: τὰ ἀγαθὰ
  english_pob_choice: good things
  chosen_spanish: las cosas buenas
  alternatives_spanish:
  - los bienes
  - las bendiciones
  - los beneficios
  lexicon: BDAG
  rationale: El plural neutro es amplio y no debe reducirse solo a bienes materiales. "Las cosas buenas" mantiene la amplitud semántica de manera clara y pública en español.
- source_word: ὁμοῦ πάντα
  english_pob_choice: all ... together
  chosen_spanish: todas ... juntas
  alternatives_spanish:
  - todas ... al mismo tiempo
  - todas ... en conjunto
  lexicon: LSJ
  rationale: La combinación enfatiza totalidad y simultaneidad. En español, el adjetivo concordado "juntas" preserva ambos matices de forma idiomática.
- source_word: μετ’ αὐτῆς
  english_pob_choice: together with her
  chosen_spanish: con ella
  alternatives_spanish:
  - junto con ella
  - a la par de ella
  lexicon: BDAG
  rationale: El pronombre femenino se refiere a la Sabiduría personificada en el contexto inmediato. "Con ella" es la forma más natural en español y preserva la relación sin sobreexplicarla en el texto principal.
- source_word: ἀναρίθμητος πλοῦτος
  english_pob_choice: wealth beyond counting
  chosen_spanish: una riqueza sin número
  alternatives_spanish:
  - riqueza incontable
  - riquezas innumerables
  - riqueza inmensurable
  lexicon: LSJ
  rationale: ἀναρίθμητος significa literalmente "sin número" o "incontable". "Una riqueza sin número" conserva la hipérbole y deja abierta la posible idea de riqueza/rico caudal sin cerrar demasiado el campo semántico.
- source_word: ἐν ταῖς χερσὶν αὐτῆς
  english_pob_choice: in her hands was
  chosen_spanish: en sus manos había
  alternatives_spanish:
  - estaba en sus manos
  - en sus manos se hallaba
  lexicon: BDAG
  rationale: La frase es espacialmente concreta pero funciona idiomáticamente como posesión o agencia. "Había" en español fluye mejor que un calco rígido y mantiene la imagen de algo que está en poder de ella.
theological_decisions:
- issue: Referente del pronombre femenino αὐτῆς
  english_pob_reading: The pronoun refers to personified Wisdom from the immediate context.
  chosen_spanish_reading: El pronombre se refiere a la Sabiduría personificada del contexto inmediato.
  alternative_spanish_readings:
  - Un antecedente femenino genérico podría imaginarse, pero no encaja tan bien en el contexto.
  - Podría dejarse implícito sin identificación explícita en el texto principal.
  rationale: La personificación femenina de la Sabiduría es parte del tejido literario-teológico del pasaje. Mantener "ella" en el texto y explicarlo en nota preserva la tensión sin resolverla artificialmente ni borrar el rasgo personificado.
  doctrine_reference: Preservar la personificación literaria de la Sabiduría; primacía del original sobre la tradición de traducción.
translation_notes:
  revision_awareness: 'Coincide con la última pasada de revisión: no se requirieron cambios tras la colación del griego con el audit trail inglés; el sentido general y las alternativas léxicas permanecen estables.'
  spanish_consistency_notes:
  - Se usa "Sabiduría" con mayúscula en la nota para identificar el referente personificado.
  - '"Con ella" mantiene el paralelismo con el inglés auditado sin imponer lenguaje eclesiástico tradicional.'
  - La imagen de "manos" se conserva literal por fidelidad al griego, aunque el español usa una construcción natural con "había".
