translation:
  language: es
  text: 'Pero yo tomaré el reino de la mano de su hijo y te lo daré: las diez tribus.'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: וְלָקַחְתִּי
  english_pob_choice: But I will take
  chosen_spanish: Pero yo tomaré
  alternatives_spanish:
  - Y tomaré
  - Tomaré
  lexicon: HALOT
  rationale: El perfecto profético con waw funciona aquí como anuncio futuro. «Pero» conserva el contraste del contexto previo, y «tomaré» expresa el sentido sin sonar forzado. Se añade «yo» para claridad y énfasis natural en español.
- source_word: הַמְּלוּכָה
  english_pob_choice: the kingdom
  chosen_spanish: el reino
  alternatives_spanish:
  - la realeza
  - el poder real
  lexicon: HALOT
  rationale: En este contexto se refiere al dominio real que será quitado a la línea de Salomón. «Reino» es la forma más natural y fiel en español; «realeza» o «poder real» sonarían más abstractos o marcados.
- source_word: מִיַּד בְּנוֹ
  english_pob_choice: from the hand of his son
  chosen_spanish: de la mano de su hijo
  alternatives_spanish:
  - de entre las manos de su hijo
  - de la autoridad de su hijo
  lexicon: HALOT
  rationale: Se conserva la imagen idiomática de «mano» porque el hebreo expresa posesión/control mediante esa metáfora. En español suena natural en este tipo de contexto y mantiene la fuerza del giro original.
- source_word: וּנְתַתִּיהָ לְּךָ
  english_pob_choice: and give it to you
  chosen_spanish: y te lo daré
  alternatives_spanish:
  - y te lo entregaré
  - y lo pondré en tu mano
  lexicon: HALOT
  rationale: El sufijo femenino retoma «el reino»; en español el clítico neutro singular «lo» es la manera natural de referirse a ese antecedente. «Daré» preserva la promesa futura sin añadir matices no requeridos.
- source_word: אֵת עֲשֶׂרֶת הַשְּׁבָטִים
  english_pob_choice: the ten tribes
  chosen_spanish: las diez tribus
  alternatives_spanish:
  - es decir, las diez tribus
  - a saber, las diez tribus
  lexicon: HALOT
  rationale: 'El hebreo especifica qué es lo dado: diez tribus. En español, dejarlo como aposición simple tras la coma comunica esa especificación con naturalidad. Se evita sugerir que se entrega todo el reino sin matiz, pero no se fuerza una explicación más larga que el texto no exige.'
translation_notes:
  revision_awareness: 'La traducción sigue de cerca el hebreo y el audit trail inglés: conserva el contraste inicial con «Pero», mantiene la metáfora idiomática de «mano» para מִיַּד y refleja la aposición final con «las diez tribus» sin añadir interpretación doctrinal.'
  spanish_consistency_notes:
  - Se usa «reino» para הַמְּלוּכָה, coherente con el valor político-dinástico del pasaje.
  - Se mantiene «mano» en la locución idiomática para no diluir la imagen hebrea de control/posesión.
  - Se traduce el objeto implícito de נתן con «lo» para concordar con «el reino» y con el uso natural del español.
  - No se añaden notas de pie porque el español permite expresar la aposición final sin ambigüedad textual relevante.
