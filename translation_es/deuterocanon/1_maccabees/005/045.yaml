translation:
  language: es
  text: Y Judas reunió a todo Israel que estaba en Galaad, desde el más pequeño hasta el más grande, junto con sus mujeres, sus hijos y su bagaje, una compañía muy grande[a], para ir a la tierra de Judá.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «un campamento muy grande». El griego παρεμβολή puede significar «campamento», especialmente en contextos militares; aquí, sin embargo, se refiere de manera amplia al grupo reunido con familias y bagaje.
    reason: lexical_alternative
lexical_decisions:
- source_word: συνήγαγεν
  english_pob_choice: gathered
  chosen_spanish: reunió
  alternatives_spanish:
  - juntó
  - agregó
  - congregó
  lexicon: LSJ
  rationale: El verbo expresa la acción concreta de reunir personas. «Reunió» es natural en español y conserva la idea de convocar/poner juntos sin añadir un matiz eclesiástico o militar innecesario.
- source_word: πάντα Ἰσραὴλ τοὺς ἐν τῇ Γαλααδίτιδι
  english_pob_choice: all Israel who were in Gilead
  chosen_spanish: a todo Israel que estaba en Galaad
  alternatives_spanish:
  - a todos los israelitas que estaban en Galaad
  - a todo Israel en la tierra de Galaad
  lexicon: LSJ
  rationale: La construcción griega apunta al conjunto de Israelitas presentes allí, no a Israel como entidad abstracta. «Que estaba en Galaad» conserva la referencia local y la lectura colectiva.
- source_word: ἀπὸ μικροῦ ἕως μεγάλου
  english_pob_choice: from the least to the greatest
  chosen_spanish: desde el más pequeño hasta el más grande
  alternatives_spanish:
  - del menor al mayor
  - desde el menor hasta el mayor
  lexicon: LSJ
  rationale: La expresión es idiomática de totalidad de rango social o edad. En español, «desde el más pequeño hasta el más grande» comunica esa amplitud sin restringirla solo a edad.
- source_word: τὰς γυναῖκας αὐτῶν καὶ τὰ τέκνα αὐτῶν
  english_pob_choice: their wives and their children
  chosen_spanish: sus mujeres y sus hijos
  alternatives_spanish:
  - sus esposas y sus hijos
  - sus mujeres y sus niños
  lexicon: LSJ
  rationale: «Mujeres» refleja el griego γυναῖκας sin imponer un término más técnico que podría sonar interpretativo. «Esposas» es posible, pero «mujeres» mantiene la forma más cercana al original y la amplitud del grupo familiar.
- source_word: τὴν ἀποσκευὴν
  english_pob_choice: their baggage
  chosen_spanish: su bagaje
  alternatives_spanish:
  - sus pertenencias
  - sus provisiones
  - su equipaje
  lexicon: LSJ
  rationale: ἀποσκευή designa los bienes transportables que acompañan a un grupo en marcha. «Bagaje» es preciso y suficientemente amplio; «equipaje» puede sonar demasiado moderno o doméstico, y «provisiones» es más estrecho.
- source_word: παρεμβολὴν μεγάλην σφόδρα
  english_pob_choice: a very great company
  chosen_spanish: una compañía muy grande
  alternatives_spanish:
  - un campamento muy grande
  - una multitud muy grande
  - una compañía grandísima
  lexicon: LSJ
  rationale: El inglés POB optó por «company» para no fijar el sentido en «camp» exclusivamente. En español, «compañía» preserva ese valor de grupo reunido; «campamento» impondría un matiz militar/local que el contexto aquí no exige.
- source_word: ἐλθεῖν εἰς γῆν Ἰούδα
  english_pob_choice: to come into the land of Judah
  chosen_spanish: para venir a la tierra de Judá
  alternatives_spanish:
  - para entrar en la tierra de Judá
  - para ir a la tierra de Judá
  lexicon: LSJ
  rationale: El infinitivo expresa propósito. «Para venir a» sigue de cerca el griego εἰς con ἐλθεῖν y conserva la dirección del movimiento; «entrar» es válido, pero algo más interpretativo.
translation_notes:
  revision_awareness: La redacción sigue el estado revisado más reciente del audit trail inglés, que prefirió «company» en lugar de «assembly» para παρεμβολή por naturalidad contextual. La versión española adopta una solución equivalente («compañía») y mantiene el resto de la formulación sin ampliar ni suavizar el contenido del griego.
  spanish_consistency_notes:
  - Se mantuvo «Y Judas» para conservar la coordinación narrativa típica del relato.
  - «Galaad» se usó como forma geográfica estándar en español, coherente con el topónimo del texto fuente.
  - No se tradujo παρεμβολή por «campamento» en el texto principal para evitar fijar un matiz militar que el contexto inmediato no obliga.
  - Se conservó «tierra de Judá» como equivalente geográfico directo del griego γῆν Ἰούδα.
