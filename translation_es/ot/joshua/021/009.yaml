translation:
  language: es
  text: 'De la tribu de los hijos de Judá y de la tribu de los hijos de Simeón dieron estas ciudades[a], que se nombran[a]:'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «que son designadas» o «cuyos nombres son especificados». La expresión hebrea indica que las ciudades son nombradas individualmente en la lista que sigue.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּתְּנוּ
  english_pob_choice: they gave
  chosen_spanish: dieron
  alternatives_spanish:
  - entregaron
  - asignaron
  - concedieron
  lexicon: HALOT
  rationale: En este contexto de distribución de ciudades, נתן expresa la acción de entregar/asignar. «Dieron» es natural en español y conserva la sencillez del texto base sin introducir una explicación interpretativa adicional.
- source_word: מִמַּטֵּה
  english_pob_choice: from the tribe of
  chosen_spanish: desde la tribu de
  alternatives_spanish:
  - de la tribu de
  - de entre la tribu de
  - por parte de la tribu de
  lexicon: HALOT
  rationale: El hebreo usa מִן + מַטֶּה en un contexto tribal. En español, «desde la tribu de» mantiene la procedencia/participación de la tribu en la entrega y evita una redundancia rígida.
- source_word: בְּנֵי יְהוּדָה
  english_pob_choice: the sons of Judah
  chosen_spanish: los hijos de Judá
  alternatives_spanish:
  - los descendientes de Judá
  - la casa de Judá
  lexicon: HALOT
  rationale: Se conserva la expresión familiar literal del hebreo, como hace la POB en inglés, porque funciona aquí como designación tribal estable y no solo como referencia neutral a un grupo.
- source_word: וּמִמַּטֵּה בְּנֵי שִׁמְעוֹן
  english_pob_choice: and from the tribe of the sons of Simeon
  chosen_spanish: y desde la tribu de los hijos de Simeón
  alternatives_spanish:
  - y de la tribu de Simeón
  - y desde la tribu de los descendientes de Simeón
  lexicon: HALOT
  rationale: Se mantiene el paralelismo con la primera mitad del versículo y la misma fórmula tribal, preservando la simetría del hebreo.
- source_word: אֵת הֶעָרִים הָאֵלֶּה
  english_pob_choice: these cities
  chosen_spanish: estas ciudades
  alternatives_spanish:
  - estas urbes
  - estas poblaciones
  lexicon: HALOT
  rationale: עָרִים se traduce de forma estándar como «ciudades». «Estas ciudades» refleja con claridad el objeto entregado y mantiene la deixis del hebreo.
- source_word: אֲשֶׁר יִקְרָא אֶתְהֶן בְּשֵׁם
  english_pob_choice: which are called by name
  chosen_spanish: las cuales son llamadas por nombre
  alternatives_spanish:
  - las cuales son designadas por nombre
  - cuyos nombres son especificados
  lexicon: HALOT
  rationale: La expresión hebrea es idiomática y señala que las ciudades serán mencionadas individualmente en la lista siguiente. «Son llamadas por nombre» conserva la pasiva y la tensión semítica sin explicitar de más.
theological_decisions:
- issue: Expresión tribal de filiación ('hijos de Judá' / 'hijos de Simeón')
  english_pob_reading: The sons of Judah / the sons of Simeon
  chosen_spanish_reading: los hijos de Judá / los hijos de Simeón
  alternative_spanish_readings:
  - los descendientes de Judá / los descendientes de Simeón
  - la tribu de Judá / la tribu de Simeón
  rationale: No hay motivo para neutralizar la filiación tribal ni sustituirla por una paráfrasis moderna. La expresión literal conserva el patrón del hebreo y la decisión documental de la POB en inglés.
  doctrine_reference: Uso lexical-histórico; no doctrinal
- issue: Frase final sobre los nombres de las ciudades
  english_pob_reading: which are called by name
  chosen_spanish_reading: las cuales son llamadas por nombre
  alternative_spanish_readings:
  - las cuales son designadas por nombre
  - cuyos nombres son especificados
  rationale: Se evita convertir la frase en una interpretación demasiado explícita; el hebreo permite una formulación abierta que anticipa el listado de ciudades nombradas en el contexto inmediato.
  doctrine_reference: Uso contextual del texto narrativo
translation_notes:
  revision_awareness: La revisión más reciente indica que no hubo cambios necesarios y el estado de concordancia es alto; por ello, el borrador español sigue de cerca la lectura auditada del inglés POB y del hebreo sin introducir revisiones adicionales.
  spanish_consistency_notes:
  - Se mantuvo «hijos de» como equivalente de בְּנֵי para conservar la formulación tribal literal.
  - Se usó «ciudades» y no una generalización como «poblaciones», porque el contexto de Josué 21 trata de ciudades levíticas.
  - La frase final conserva la pasiva para reflejar la construcción hebrea y dejar abierta la ambigüedad lexical documentada.
  - Se evitó «SEÑOR» o cualquier sustitución teológica innecesaria, ya que no aparece el nombre divino en este versículo.
