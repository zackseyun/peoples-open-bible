translation:
  language: es
  text: Y cada uno de nosotros se apartó según la intención de su corazón malo[a], para servir a otros dioses, para hacer el mal a los ojos de Yahvé nuestro Dios.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «según el pensamiento de su corazón malo». El griego subraya la intención o disposición interior.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ᾠχόμεθα
  english_pob_choice: went off
  chosen_spanish: se apartó
  alternatives_spanish:
  - se fue
  - se alejó
  - partió
  lexicon: LSJ
  rationale: οἴχομαι expresa irse o alejarse; en español, «se apartó» comunica con naturalidad el movimiento de desviación hacia la desobediencia sin cargar el texto con un giro demasiado libre.
- source_word: ἕκαστος
  english_pob_choice: each
  chosen_spanish: cada uno de nosotros
  alternatives_spanish:
  - cada uno
  - todos nosotros, cada uno
  - cada uno de nosotros
  lexicon: LSJ
  rationale: Conserva el valor distributivo del griego y mantiene explícita la dimensión colectiva e individual a la vez.
- source_word: ἐν διανοίᾳ καρδίας αὐτοῦ τῆς πονηρᾶς
  english_pob_choice: in the intent of his evil heart
  chosen_spanish: en la intención de su corazón malo
  alternatives_spanish:
  - según el pensamiento de su corazón malo
  - en la mente de su corazón malo
  - en la disposición de su corazón malo
  lexicon: LSJ
  rationale: διάνοια combina pensamiento, intención y disposición interior; «intención» conserva bien el enfoque volitivo. Se mantiene «corazón» como sede interior. «Malo» reproduce πονηρός de forma directa y clara.
- source_word: ἐργάζεσθαι θεοῖς ἑτέροις
  english_pob_choice: to serve other gods
  chosen_spanish: para servir a otros dioses
  alternatives_spanish:
  - para trabajar para otros dioses
  - para prestar servicio a otros dioses
  - para actuar para otros dioses
  lexicon: LSJ
  rationale: Aunque ἐργάζομαι significa literalmente «trabajar/hacer», aquí con el dativo expresa servicio rendido a ídolos; «servir» captura la fuerza idiomática y el contexto de apostasía.
- source_word: ποιῆσαι τὰ κακὰ
  english_pob_choice: to do evil
  chosen_spanish: para hacer el mal
  alternatives_spanish:
  - para hacer cosas malas
  - para cometer el mal
  - para obrar el mal
  lexicon: LSJ
  rationale: τὰ κακὰ se expresa de modo natural como «el mal» en español bíblico moderno; «hacer» mantiene la relación con ποιῆσαι sin añadir intensidad no indicada.
- source_word: κατʼ ὀφθαλμοὺς Κυρίου θεοῦ ἡμῶν
  english_pob_choice: in the sight of the Lord our God
  chosen_spanish: ante los ojos de Yahvé nuestro Dios
  alternatives_spanish:
  - a los ojos de Yahvé nuestro Dios
  - en la presencia de Yahvé nuestro Dios
  - delante de Yahvé nuestro Dios
  lexicon: LSJ
  rationale: La expresión griega es un modismo de evaluación divina. «Ante los ojos de» mantiene la metáfora; se prefiere «Yahvé» por la norma del proyecto para יהוה / κύριος en contexto divino.
- source_word: Κυρίου
  english_pob_choice: Lord
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Señor
  - el Señor
  lexicon: LSJ
  rationale: Aunque la cita griega usa κύριος, en este contexto remite al nombre divino del pacto. El proyecto español usa «Yahvé» para reflejar el nombre y no ocultarlo bajo una máscara litúrgica.
theological_decisions:
- issue: Renderización de κύριος en contexto deuterocanónico griego
  english_pob_reading: Lord
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Señor
  - el Señor
  rationale: El referente es el Dios de Israel en un contexto de alianza y juicio moral; siguiendo la terminología del proyecto, el nombre divino se restituye como «Yahvé» en lugar de reemplazarlo por una forma de tratamiento.
  doctrine_reference: 'DOCTRINE.md: YHWH / κύριος → Yahvé'
- issue: Sentido del dativo con ἐργάζεσθαι θεοῖς ἑτέροις
  english_pob_reading: to serve other gods
  chosen_spanish_reading: para servir a otros dioses
  alternative_spanish_readings:
  - para hacer obras para otros dioses
  - para trabajar para otros dioses
  rationale: La cláusula describe idolatría activa y servidumbre religiosa, no mero desempeño laboral; «servir» expresa el acto de rendir culto o lealtad a dioses ajenos sin perder la fuerza del original.
  doctrine_reference: 'DOCTRINE.md: idolatría como servicio indebido a otros dioses'
translation_notes:
  revision_awareness: 'La revisión inglesa más reciente afinó la naturalidad sintáctica («each of us») y acercó el clausulado final al griego («to do evil»). La versión española adopta esa misma dirección: mantiene la distribución individual con «cada uno de nosotros» y la clausula moral breve con «hacer el mal», sin expandir el sentido más allá del original.'
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» conforme al estándar del proyecto para el nombre divino en el texto principal.
  - «Otros dioses» conserva el plural del griego θεοῖς ἑτέροις y evita singularizar indebidamente.
  - «Corazón malo» refleja πονηρᾶς con léxico claro y evita suavizar la evaluación moral.
  - La frase final conserva la metáfora judicial bíblica «ante los ojos de» para preservar el idiomismo semítico/griego.
