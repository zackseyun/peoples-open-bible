  text: תְּנָ֞/ה אֶת נָשַׁ֣/י וְ/אֶת יְלָדַ֗/י אֲשֶׁ֨ר עָבַ֧דְתִּי אֹֽתְ/ךָ֛ בָּ/הֵ֖ן וְ/אֵלֵ֑כָה כִּ֚י אַתָּ֣ה יָדַ֔עְתָּ אֶת עֲבֹדָתִ֖/י אֲשֶׁ֥ר עֲבַדְתִּֽי/ךָ־־־׃
base_translation:
  language: en
  yaml_path: translation/ot/genesis/030/026.yaml
  text: Give me my wives and my children[a], for whom I have served you, so that I may go[b]; for you know the service with which I have served you.
  footnotes:
