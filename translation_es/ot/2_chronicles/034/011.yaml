translation:
  language: es
  text: Y dieron a los artesanos y a los constructores para comprar piedras de cantera[a] y madera para los soportes[b] y para techar[c] los edificios que los reyes de Judá habían arruinado.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: También puede entenderse como «piedras labradas»; la expresión hebrea señala piedra extraída de cantera para construcción.
    reason: lexical_alternative
  - marker: b
    text: El término hebreo es incierto; puede referirse a elementos de unión, ensamblaje o soporte estructural.
    reason: lexical_alternative
  - marker: c
    text: También puede traducirse «para cubrir» o «para poner vigas»; el verbo admite un sentido de techado o recubrimiento en contexto constructivo.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּתְּנוּ
  english_pob_choice: they gave it
  chosen_spanish: Y dieron
  alternatives_spanish:
  - Y entregaron
  - Y dieron eso
  lexicon: HALOT
  rationale: El verbo נתן se traduce directamente como 'dar'. En español, el objeto implícito se recupera del contexto inmediato, por lo que 'Y dieron' mantiene naturalidad sin añadir información no explícita en el hebreo.
- source_word: לֶחָרָשִׁים
  english_pob_choice: craftsmen
  chosen_spanish: a los artesanos
  alternatives_spanish:
  - a los obreros especializados
  - a los oficiosos
  lexicon: HALOT
  rationale: חָרָשִׁים designa trabajadores hábiles o artesanos en sentido amplio. 'Artesanos' conserva esa amplitud y evita restringir indebidamente el término a un oficio específico.
- source_word: וְלַבֹּנִים
  english_pob_choice: builders
  chosen_spanish: y a los constructores
  alternatives_spanish:
  - y a los edificadores
  - y a los albañiles
  lexicon: HALOT
  rationale: El participio sustantivado de בנה se refiere a quienes construyen. 'Constructores' es claro en español moderno y mantiene la distinción con 'artesanos'.
- source_word: לִקְנוֹת
  english_pob_choice: to buy
  chosen_spanish: para comprar
  alternatives_spanish:
  - para adquirir
  lexicon: HALOT
  rationale: El infinitivo de קנה expresa compra/adquisición. 'Para comprar' es idiomático y directo, sin perder el valor concreto de la acción.
- source_word: אַבְנֵי מַחְצֵב
  english_pob_choice: quarried stone
  chosen_spanish: piedras de cantera[a]
  alternatives_spanish:
  - piedras labradas
  - piedras extraídas de cantera
  lexicon: HALOT
  rationale: La expresión apunta a piedra obtenida de cantera para construcción. 'Piedras de cantera' comunica bien el material y deja visible la opción léxica de 'hewn stone' como alternativa posible.
- source_word: וְעֵצִים
  english_pob_choice: timber
  chosen_spanish: madera
  alternatives_spanish:
  - madera de construcción
  - maderos
  lexicon: HALOT
  rationale: En contexto edilicio, עֵצִים puede referirse a madera para obra. 'Madera' es suficientemente claro en español; el contexto de construcción evita ambigüedad excesiva.
- source_word: לַמְחַבְּרוֹת
  english_pob_choice: for the supports
  chosen_spanish: para los soportes[b]
  alternatives_spanish:
  - para las uniones
  - para el ensamblaje
  lexicon: HALOT
  rationale: El sustantivo es difícil y puede aludir a elementos de unión o soporte estructural. Siguiendo la revisión inglesa, 'soportes' refleja un sentido estructural plausible sin forzar una especificación técnica más estrecha de lo que permite el hebreo.
- source_word: וּלְקָרוֹת
  english_pob_choice: for roofing
  chosen_spanish: para techar[c]
  alternatives_spanish:
  - para cubrir
  - para poner vigas
  lexicon: HALOT
  rationale: El verbo en este contexto puede implicar cubrir o techar la estructura. 'Para techar' es natural en español y conserva la función constructiva indicada por el hebreo y la POB inglesa.
- source_word: הַבָּתִּים
  english_pob_choice: the buildings
  chosen_spanish: las casas
  alternatives_spanish:
  - los edificios
  - las construcciones
  lexicon: HALOT
  rationale: Aunque בית puede referirse a edificios o casas, en español 'casas' sigue siendo una forma válida y bíblicamente transparente para los inmuebles/estructuras mencionados, sin perder la referencia al complejo edificado. La POB inglesa optó por 'buildings' por contexto; en español 'casas' conserva la lectura tradicional y la referencia arquitectónica.
- source_word: הִשְׁחִיתוּ
  english_pob_choice: had ruined
  chosen_spanish: habían destruido
  alternatives_spanish:
  - habían arruinado
  - habían dañado
  lexicon: HALOT
  rationale: El hiphil de שחת puede expresar arruinar o destruir. 'Habían destruido' es una traducción fuerte pero aún compatible con el contexto de deterioro causado por reyes anteriores; no se suaviza a 'dañado' porque el hebreo permite una acción más grave.
- source_word: מַלְכֵי יְהוּדָה
  english_pob_choice: the kings of Judah
  chosen_spanish: los reyes de Judá
  lexicon: HALOT
  rationale: Correspondencia directa del sintagma constructo, sin tensión especial.
theological_decisions:
- issue: Alcance de 'בתי' en un contexto de restauración del templo
  english_pob_reading: the buildings
  chosen_spanish_reading: las casas
  alternative_spanish_readings:
  - los edificios
  - las construcciones
  rationale: El hebreo usa בית en plural en un contexto de reparación de estructuras. La POB inglesa eligió 'buildings' para evitar la idea de viviendas ordinarias. En español, 'casas' mantiene una referencia amplia y bíblica a las estructuras, aunque 'edificios' sería más explícito. Se preserva la ambigüedad arquitectónica sin convertir el texto en una paráfrasis.
  doctrine_reference: None
- issue: Fuerza de שחת aplicado a la obra de los reyes de Judá
  english_pob_reading: had ruined
  chosen_spanish_reading: habían destruido
  alternative_spanish_readings:
  - habían arruinado
  - habían dañado
  rationale: 'No hay una cuestión doctrinal directa, pero sí una decisión semántica importante: el texto atribuye a reyes anteriores la ruina de las estructuras. ''Destruido'' mantiene la gravedad del daño sin introducir una explicación adicional. No se atenúa a ''dañado'', que sería demasiado débil.'
  doctrine_reference: None
translation_notes:
  revision_awareness: La revisión inglesa más reciente sustituyó 'joining work' por 'supports' para reflejar con mayor precisión el sustantivo hebreo de elementos estructurales. La versión española sigue esa decisión con 'soportes', manteniendo la ambigüedad necesaria. También se mantiene la lectura de 'roofing' como función constructiva, no como mera referencia a vigas sueltas.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' como forma estándar del nombre divino cuando aparezca en el pasaje, pero este versículo no contiene el Tetragrámaton en la traducción española directa.
  - Se usa 'artesanos' para חָרָשִׁים y 'constructores' para בֹּנִים, conservando la distinción de oficios.
  - Se opta por vocabulario de construcción claro y contemporáneo, evitando terminología eclesiástica no sustentada por el hebreo.
  - La puntuación y el orden de elementos siguen de cerca la sintaxis hebrea, pero con fluidez natural en español.
