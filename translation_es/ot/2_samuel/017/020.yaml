revisions:
- from: 'Los siervos de Absalón llegaron a la mujer de la casa y le dijeron: «¿Dónde están Ahimaaz y Jonatán?» La mujer les respondió: «Ya pasaron el arroyo de agua[a]». Ellos los buscaron, pero no los encontraron, y regresaron a Jerusalén.'
  to: 'Los siervos de Absalón llegaron a la casa de la mujer y dijeron[a]: «¿Dónde están Ahimaaz y Jonatán?». La mujer les respondió: «Cruzaron el arroyo de agua[b]». Ellos los buscaron, pero no los encontraron, y regresaron a Jerusalén.'
  rationale: Se ajustó la referencia locativa para reflejar mejor הַבַּיְתָה sin convertirla en una identificación posesiva de la mujer; se eliminó «ya» por añadir un matiz no necesario; y se cambió a «cruzaron» para representar con más precisión עָבְרוּ en relación con el curso de agua. Se mantuvo una nota léxica sobre la expresión hebrea inusual y se ancló correctamente en el texto revisado.
