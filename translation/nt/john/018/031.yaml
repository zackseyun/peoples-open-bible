id: JHN.18.31
reference: John 18:31
source:
  edition: SBLGNT
  text: εἶπεν οὖν αὐτοῖς ⸀ὁ Πιλᾶτος· Λάβετε αὐτὸν ὑμεῖς, καὶ κατὰ τὸν νόμον ὑμῶν κρίνατε αὐτόν. ⸀εἶπον αὐτῷ οἱ Ἰουδαῖοι· Ἡμῖν οὐκ ἔξεστιν ἀποκτεῖναι οὐδένα·
translation:
  text: So Pilate said to them[a], “Take him yourselves and judge him according to your law.” The Jews said to him, “It is not lawful for us to put anyone to death.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Greek 'The Jews' (hoi Ioudaioi); in this context, the reference is to the Jewish authorities or accusers speaking with Pilate, not to the Jewish people as a whole.
    reason: alternative_reading
lexical_decisions:
- source_word: οὖν
  chosen: So
  alternatives:
  - Therefore
  - Then
  lexicon: BDAG
  rationale: Rendered as a natural discourse connector in modern English. 'So' preserves the inferential/narrative flow without sounding overly formal.
- source_word: Λάβετε
  chosen: You take
  alternatives:
  - Take
  - Take him yourselves
  lexicon: BDAG
  rationale: The imperative is addressed emphatically to the Jewish leaders, reinforced by ὑμεῖς. 'You take' preserves that emphasis in idiomatic English; the object 'him' is supplied from αὐτόν.
- source_word: ὑμεῖς
  chosen: You
  alternatives:
  - yourselves
  lexicon: BDAG
  rationale: The explicit pronoun adds emphasis. English can reflect this by retaining 'You' rather than leaving the subject implicit. The stronger paraphrase 'yourselves' was not adopted in the main text to avoid overtranslation, though it is a plausible nuance.
- source_word: κατὰ τὸν νόμον ὑμῶν
  chosen: according to your law
  alternatives:
  - by your law
  - under your law
  lexicon: BDAG
  rationale: κατά with the accusative here expresses conformity or standard. 'According to your law' is the clearest natural rendering and preserves Pilate's distancing reference to their legal system.
- source_word: κρίνατε
  chosen: judge
  alternatives:
  - try
  - pass judgment on
  lexicon: BDAG
  rationale: κρίνω can mean judge, decide, or try in legal contexts. 'Judge' is broad enough to preserve the legal sense without narrowing it to a formal Roman-style trial; 'try' is possible but more interpretive.
- source_word: οἱ Ἰουδαῖοι
  chosen: The Jews
  alternatives:
  - the Jewish leaders
  - the Judeans
  lexicon: BDAG
  rationale: John's οἱ Ἰουδαῖοι is contextually complex and can denote Judeans or Jewish authorities in some passages. Here the immediate referent is the group addressing Pilate in the passion narrative. The formal rendering 'The Jews' follows the Greek expression directly; an alternative is preserved in a footnote because English readers may otherwise misread it as an undifferentiated reference to the entire Jewish people.
- source_word: ἔξεστιν
  chosen: It is not permitted
  alternatives:
  - It is not lawful
  - It is not allowed
  lexicon: BDAG
  rationale: ἔξεστιν denotes what is permitted or lawful. 'It is not permitted' communicates the sense clearly in contemporary English without unnecessary archaism. 'Lawful' is possible but can sound more technical or traditional.
- source_word: ἀποκτεῖναι
  chosen: to put ... to death
  alternatives:
  - to kill
  - to execute
  lexicon: BDAG
  rationale: ἀποκτείνω means to kill, but in this judicial setting 'put to death' best captures the legal-executive force implied by the exchange with Pilate. 'Execute' is possible but slightly more specific than the Greek itself requires.
- source_word: οὐδένα
  chosen: anyone
  alternatives:
  - no one
  lexicon: BDAG
  rationale: An indefinite object after the infinitive is most naturally rendered 'anyone' in English. This yields smooth modern style while preserving the universal scope of the denial.
