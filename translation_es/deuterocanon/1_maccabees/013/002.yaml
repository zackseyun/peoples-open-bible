translation:
  language: es
  text: Y vio que el pueblo [a]temblaba y [b]estaba temeroso, y subió a Jerusalén y reunió al pueblo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Temblaba» conserva el componente físico de ἔντρομος; también podría traducirse «estaba temblando».
    reason: lexical_alternative
  - marker: b
    text: «Estaba temeroso» refleja ἔκφοβος con un tono sobrio y sin exagerar el sentido con opciones como «aterrado» o «asustado».
    reason: lexical_alternative
lexical_decisions:
- source_word: ἔντρομος
  english_pob_choice: trembling
  chosen_spanish: tembloroso
  alternatives_spanish:
  - temblando
  - tremblando
  - temeroso
  lexicon: LSJ
  rationale: ἔντρομος describe a alguien sobrecogido hasta el punto de temblar. En español, «tembloroso» conserva el matiz físico y visible que el inglés POB preservó con «trembling», sin reducirlo a una mera emoción interior.
- source_word: ἔκφοβος
  english_pob_choice: fearful
  chosen_spanish: temeroso
  alternatives_spanish:
  - asustado
  - aterrado
  - temeroso
  lexicon: LSJ
  rationale: El segundo adjetivo intensifica el temor del pueblo. «Temeroso» mantiene el tono formal y la cercanía al campo semántico de φόβος, y evita exagerar el matiz con «aterrado», que sería más fuerte que la lectura inglesa revisada «fearful».
- source_word: ἀνέβη
  english_pob_choice: went up
  chosen_spanish: subió
  alternatives_spanish:
  - ascendió
  - fue hacia arriba
  lexicon: LSJ
  rationale: Para el viaje a Jerusalén, ἀνέβη conserva el valor idiomático y topográfico de «subir». «Subió» es la forma natural en español y mantiene el registro bíblico sin caer en un calco rígido.
- source_word: ἤθροισεν
  english_pob_choice: assembled
  chosen_spanish: reunió
  alternatives_spanish:
  - juntó
  - congregó
  - asambleó
  lexicon: LSJ
  rationale: El verbo significa juntar o reunir a un grupo. «Reunió» expresa bien la acción transitiva sobre «el pueblo» y suena más natural en español que «asambleó», que sería forzado.
- source_word: λαός
  english_pob_choice: people
  chosen_spanish: pueblo
  alternatives_spanish:
  - gente
  - pueblo
  - nación
  lexicon: LSJ
  rationale: Aquí λαός se refiere al colectivo del pueblo en sentido identitario y comunitario. «Pueblo» es la mejor equivalencia en español para conservar ese sentido, especialmente al aparecer dos veces en el versículo.
translation_notes:
  revision_awareness: La versión inglesa fue revisada de «afraid» a «fearful» para mantener un registro más formal junto con «trembling». La redacción española adopta esa misma preferencia de tono con «tembloroso y temeroso», evitando un debilitamiento coloquial del segundo adjetivo.
  spanish_consistency_notes:
  - 'Se mantiene la pareja adjetival con dos términos distintos para reflejar la intensificación del griego: ἔντρομος / ἔκφοβος.'
  - Se usa «Jerusalén» con preposición de movimiento («subió a Jerusalén») como equivalente idiomático del griego.
  - Se conserva «pueblo» como traducción de λαός en ambas apariciones para mantener la cohesión léxica del versículo.
