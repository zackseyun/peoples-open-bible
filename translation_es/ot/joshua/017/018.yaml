translation:
  language: es
  text: Pero la región montañosa[a] será tuya; porque es un bosque, y tú la despejarás, y sus confines[b] serán tuyos. Porque tú desposeerás a los cananeos[c], aunque tienen carros de hierro y aunque son fuertes.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «la montaña». En contexto territorial, הַר puede referirse a la región montañosa asignada a José.
    reason: lexical_alternative
  - marker: b
    text: O «sus extremos» o «sus límites exteriores». El hebreo se refiere a los bordes o confines del terreno boscoso.
    reason: lexical_alternative
  - marker: c
    text: 'Hebreo en singular colectivo: «el cananeo ... es fuerte».'
    reason: lexical_alternative
lexical_decisions:
- source_word: הַר
  english_pob_choice: the hill country
  chosen_spanish: la región montañosa
  alternatives_spanish:
  - el monte
  - la montaña
  - la zona montañosa
  lexicon: HALOT
  rationale: En contexto de reparto territorial, הַר puede referirse a una zona elevada y no a un solo pico. «La región montañosa» conserva ese sentido geográfico sin sonar artificial en español.
- source_word: יִהְיֶה לָּךְ
  english_pob_choice: will be yours
  chosen_spanish: será tuya
  alternatives_spanish:
  - te pertenecerá
  - será para ti
  lexicon: HALOT
  rationale: El hebreo expresa posesión/asignación. «Será tuya» es natural en español y mantiene la idea de posesión otorgada.
- source_word: כִּי
  english_pob_choice: for / because
  chosen_spanish: porque
  alternatives_spanish:
  - pues
  - ya que
  lexicon: HALOT
  rationale: Aquí introduce la razón de la afirmación anterior; «porque» refleja bien la fuerza causal que el audit trail inglés también corrigió frente a una lectura concesiva.
- source_word: יַעַר
  english_pob_choice: a forest
  chosen_spanish: un bosque
  alternatives_spanish:
  - una selva
  - arbolado
  lexicon: HALOT
  rationale: יַעַר denota terreno arbolado. «Bosque» es la opción directa y clara en español.
- source_word: וּבֵרֵאתוֹ
  english_pob_choice: you shall clear it
  chosen_spanish: la despejarás
  alternatives_spanish:
  - la cortarás
  - la limpiarás
  lexicon: HALOT
  rationale: El verbo en piel aquí se usa para despejar terreno boscoso. «Despejar» comunica la acción de dejar el terreno apto para habitar o cultivar, sin restringirlo indebidamente a talar árboles.
- source_word: תֹּצְאֹתָיו
  english_pob_choice: its farthest borders
  chosen_spanish: sus extremos
  alternatives_spanish:
  - sus confines
  - sus límites exteriores
  - sus bordes
  lexicon: HALOT
  rationale: El término puede referirse a extremos, confines o límites exteriores. «Sus extremos» preserva la amplitud semántica sin añadir una interpretación demasiado específica.
- source_word: תוֹרִישׁ
  english_pob_choice: you shall dispossess
  chosen_spanish: despojarás
  alternatives_spanish:
  - expulsarás
  - harás salir
  - desposeerás
  lexicon: HALOT
  rationale: El hifil de ירש expresa causar la pérdida de posesión. «Despojarás» mantiene el matiz de quitar posesión, más cercano a la fuerza legal-territorial del hebreo que un simple «expulsar».
- source_word: הַכְּנַעֲנִי
  english_pob_choice: the Canaanites
  chosen_spanish: los cananeos
  alternatives_spanish:
  - el cananeo
  lexicon: HALOT
  rationale: Aunque la forma hebrea es singular, funciona colectivamente para el pueblo. En español, el plural es más claro y conserva el sentido colectivo usado en el texto inglés auditado.
- source_word: רֶכֶב בַּרְזֶל
  english_pob_choice: iron chariots
  chosen_spanish: carros de hierro
  alternatives_spanish:
  - carros ferrados
  - carros blindados
  lexicon: HALOT
  rationale: La construcción designa carros equipados con hierro. «Carros de hierro» es la traducción directa y más transparente en español.
- source_word: חָזָק הוּא
  english_pob_choice: they are strong
  chosen_spanish: son fuertes
  alternatives_spanish:
  - es fuerte
  - son poderosos
  lexicon: HALOT
  rationale: Aunque el hebreo usa singular colectivo, en español el plural concuerda con «los cananeos» y comunica correctamente el sentido colectivo.
theological_decisions:
- issue: Singular colectivo aplicado al pueblo cananeo
  english_pob_reading: 'Render collectively as plural: ''the Canaanites ... they have ... they are strong.'''
  chosen_spanish_reading: 'Traducir colectivamente en plural: «los cananeos ... tienen ... son fuertes».'
  alternative_spanish_readings:
  - «el cananeo ... tiene ... es fuerte»
  rationale: No se trata de una diferencia doctrinal, sino de cómo expresar con claridad un singular étnico hebreo con valor colectivo. El plural español evita ambigüedad y conserva el referente grupal.
  doctrine_reference: claridad referencial; uso colectivo de etnónimos en hebreo
translation_notes:
  revision_awareness: El texto español sigue la revisión del audit trail inglés que prefirió el valor causal de כי en la primera cláusula («porque es un bosque») y mantiene la lectura colectiva para el pueblo cananeo. Se preserva la tensión léxica de הַר y תֹּצְאוֹת sin suavizarla en exceso.
  spanish_consistency_notes:
  - Se usa «Yahvé» como forma estándar del proyecto cuando el Tetragrámaton no aparece explícitamente en este versículo.
  - «Despojarás» conserva la fuerza jurídico-territorial de תוֹרִישׁ, evitando neutralizarlo como mero desplazamiento.
  - La elección de «región montañosa» mantiene el sentido territorial de הַר en un reparto de tierras.
  - Las notas al pie se anclan solo en los términos con alternativa real de traducción.
