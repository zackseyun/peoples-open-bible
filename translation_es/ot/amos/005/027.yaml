translation:
  language: es
  text: Por tanto, los exiliaré[a] más allá de Damasco —dice Yahvé, cuyo nombre es el Dios de las huestes.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «los llevaré al exilio». El hebreo expresa literalmente una acción causativa de llevar al exilio.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְ/הִגְלֵיתִ֥י
  english_pob_choice: I will send you into exile
  chosen_spanish: los haré ir al exilio
  alternatives_spanish:
  - los exiliaré
  - los llevaré al exilio
  lexicon: HALOT
  rationale: El hifil de גלה expresa causar el exilio. En español, «los haré ir al exilio» conserva la causalidad y suena natural; evita la rigidez de un calco y mantiene la fuerza judicial del verbo.
- source_word: אֶתְ/כֶ֖ם
  english_pob_choice: you
  chosen_spanish: los
  alternatives_spanish:
  - a ustedes
  - a vosotros
  lexicon: morfología verbal de objeto directo
  rationale: El sufijo de 2.ª persona plural masculino se refleja en español con objeto directo de tercera persona plural en la construcción verbal elegida; el contexto profético ya identifica a los destinatarios.
- source_word: מֵ/הָ֣לְאָה
  english_pob_choice: beyond
  chosen_spanish: más allá de
  alternatives_spanish:
  - más allá
  - al otro lado de
  lexicon: HALOT
  rationale: La idea espacial es de desplazamiento a un punto que queda más allá de Damasco. «Más allá de» reproduce bien esa relación sin añadir matices no explicitados.
- source_word: לְ/דַמָּ֑שֶׂק
  english_pob_choice: Damascus
  chosen_spanish: Damasco
  alternatives_spanish:
  - Damasco
  lexicon: nombre propio
  rationale: Nombre propio transliterado de forma estándar al español.
- source_word: אָמַ֛ר
  english_pob_choice: says
  chosen_spanish: dice
  alternatives_spanish:
  - declara
  - ha dicho
  lexicon: HALOT
  rationale: En fórmulas proféticas, el qatal funciona como fórmula de enunciación; «dice» mantiene la vivacidad oracular mejor que «dijo».
- source_word: יְהוָ֥ה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  lexicon: DOCTRINE.md — YHWH
  rationale: Se sigue el criterio del proyecto para el Tetragrámaton. «Yahvé» preserva el nombre divino sin sustituirlo por un título.
- source_word: אֱלֹהֵֽי צְבָא֖וֹת
  english_pob_choice: the God of hosts
  chosen_spanish: el Dios de los ejércitos
  alternatives_spanish:
  - el Dios de los ejércitos celestiales
  - el Dios de las huestes
  lexicon: HALOT
  rationale: Aunque el inglés POB usa «hosts», en español «ejércitos» comunica con claridad el título sin sonar arcaico o ambiguo. Se conserva la amplitud del hebreo צבאות sin restringirlo indebidamente.
- source_word: שְׁמֽ/וֹ
  english_pob_choice: whose name is
  chosen_spanish: cuyo nombre es
  alternatives_spanish:
  - cuyo nombre es
  - su nombre es
  lexicon: HALOT
  rationale: El hebreo clausula nominal final expresa posesión y predicación. «Cuyo nombre es» reproduce esa relación de manera idiomática en español y refleja la revisión inglesa que evita convertirla en una frase más pesada.
theological_decisions:
- issue: Traducción del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  rationale: Se mantiene la política del proyecto de transliterar el Nombre divino, evitando la sustitución reverencial por un título. «Yahvé» es la forma española más establecida en este marco editorial.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Título divino אֱלֹהֵי צְבָאוֹת
  english_pob_reading: the God of hosts
  chosen_spanish_reading: el Dios de los ejércitos
  alternative_spanish_readings:
  - el Dios de los ejércitos celestiales
  - el Dios de las huestes
  rationale: «Ejércitos» transmite de forma clara el valor de צבאות sin imponer una interpretación excesivamente litúrgica. Aunque «hosts» es el equivalente inglés tradicional, en español una opción más directa resulta más transparente para el lector contemporáneo.
  doctrine_reference: DOCTRINE.md Translation philosophy §1, §5
- issue: Fórmula final posesiva y predicativa
  english_pob_reading: whose name is the God of hosts
  chosen_spanish_reading: cuyo nombre es el Dios de los ejércitos
  alternative_spanish_readings:
  - cuyo nombre es el Dios de los ejércitos
  - su nombre es el Dios de los ejércitos
  rationale: La versión inglesa revisada conserva el valor del cierre hebreo. En español, «cuyo nombre es» retiene la relación gramatical sin forzar una estructura poco natural.
  doctrine_reference: Revisión auditada del cierre hebreo en el paquete de fuente
translation_notes:
  revision_awareness: 'La revisión inglesa más reciente ajustó el cierre para reflejar mejor el hebreo: «whose name is the God of hosts». La presente versión española sigue esa lectura y, además, opta por un equivalente natural para הִגְלֵיתִי que preserve la causatividad del verbo sin calco excesivo.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» para el Tetragrámaton, conforme al criterio editorial del proyecto.
  - Se traduce צבאות como «los ejércitos» para conservar transparencia en español, aunque el inglés auditable use «hosts».
  - La partícula inicial וְ se vertebra con «Por tanto» para reflejar continuidad discursiva con el juicio anterior.
  - Se conserva el matiz oracular con «dice» en lugar de una forma narrativa pasada.
