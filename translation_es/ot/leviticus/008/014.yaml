translation:
  language: es
  text: Entonces presentó el toro del sacrificio por el pecado[a], y Aarón y sus hijos pusieron las manos sobre la cabeza del toro del sacrificio por el pecado.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «hizo acercar» o «trajo adelante» para «presentó».
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּגֵּשׁ
  english_pob_choice: brought near
  chosen_spanish: hizo acercar
  alternatives_spanish:
  - presentó
  - trajo adelante
  lexicon: HALOT
  rationale: El hebreo en sentido sacrificial indica acercar o presentar la víctima. «Hizo acercar» conserva el valor ritual y evita un calco demasiado duro en español. Mantiene también la ambigüedad auditada entre acercar y presentar.
- source_word: פַּר
  english_pob_choice: bull
  chosen_spanish: toro
  alternatives_spanish:
  - buey
  - novillo
  lexicon: HALOT
  rationale: En contexto sacrificial, פַּר designa un macho bovino ofrecido en sacrificio. «Toro» es natural en español bíblico y suficientemente preciso; «novillo» sería posible en algunos contextos, pero aquí el texto no obliga a esa restricción.
- source_word: הַחַטָּאת
  english_pob_choice: sin offering
  chosen_spanish: el sacrificio por el pecado
  alternatives_spanish:
  - la ofrenda por el pecado
  - la ofrenda por el pecado
  lexicon: HALOT
  rationale: La forma puede referirse al pecado o a la ofrenda por el pecado; en legislación sacrificial el sentido cultual es claro. «Sacrificio por el pecado» expresa el valor ofrencial de modo transparente para el lector español y preserva la tensión léxica entre pecado y ofrenda.
- source_word: וַיִּסְמֹךְ
  english_pob_choice: laid
  chosen_spanish: pusieron
  alternatives_spanish:
  - impusieron
  - apoyaron
  lexicon: HALOT
  rationale: En contexto ritual סמך describe el acto de poner o apoyar la mano sobre la víctima. «Pusieron» es idiomático y suficientemente amplio para no añadir una explicación teológica no explicitada en el versículo.
- source_word: יְדֵיהֶם
  english_pob_choice: their hands
  chosen_spanish: las manos
  alternatives_spanish:
  - sus manos
  - la mano
  lexicon: HALOT
  rationale: El plural hebreo se conserva naturalmente en español. La formulación con artículo definido encaja bien con la referencia pronominal del sujeto plural sin recargar la frase.
- source_word: עַל רֹאשׁ
  english_pob_choice: on the head of
  chosen_spanish: sobre la cabeza de
  alternatives_spanish:
  - en la cabeza de
  - encima de la cabeza de
  lexicon: HALOT
  rationale: «Sobre la cabeza de» reproduce con claridad la relación espacial y ritual del hebreo. Es la opción más natural y fiel en español contemporáneo.
theological_decisions:
- issue: Sentido del gesto de imponer/poner las manos
  english_pob_reading: Render the action descriptively without importing a specific theological explanation such as transfer of guilt, identification, or consecration into the translation itself.
  chosen_spanish_reading: Describir el gesto sin introducir una explicación teológica específica como transferencia de culpa, identificación o consagración.
  alternative_spanish_readings:
  - Las manos fueron impuestas como identificación con la víctima
  - Hubo transferencia de culpa a la víctima
  - El animal fue consagrado explícitamente mediante la imposición de manos
  rationale: El versículo narra el acto ritual, pero no explica su mecanismo teológico. La redacción española conserva esa tensión doctrinal y evita resolverla por adelantado.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: La revisión más reciente indicó que no se requerían cambios; este borrador sigue ese estado de alta concordancia y mantiene la lectura auditada sin introducir novedades innecesarias.
  spanish_consistency_notes:
  - Se usa «Yahvé» como forma preferida del nombre divino solo cuando aparece el Tetragrámaton; aquí no aparece.
  - Se evita «ofrenda» aislada para חַטָּאת porque la combinación «sacrificio por el pecado» comunica mejor el valor cultual sin perder la referencia al pecado.
  - 'Se mantiene el orden narrativo del hebreo: acercamiento de la víctima y luego imposición de manos.'
  - No se introduce lenguaje de expiación, sustitución o transferencia que el texto no explicita.
