translation:
  language: es
  text: Así como escuchamos a Moisés en todo[a], así te escucharemos. Solo que Yahvé tu Dios esté contigo, como estuvo con Moisés.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'obedecimos a Moisés ... te obedeceremos'. El verbo hebreo שׁמע puede significar tanto 'escuchar' como 'obedecer', según el contexto.
    reason: lexical_alternative
lexical_decisions:
- source_word: שָׁמַעְנוּ / נִשְׁמַע
  english_pob_choice: listened / will listen
  chosen_spanish: escuchamos / escucharemos
  alternatives_spanish:
  - obedecimos / obedeceremos
  - hicimos caso / haremos caso
  lexicon: HALOT
  rationale: שמַע con אֶל puede expresar escuchar con la implicación de atender u obedecer. En español, 'escuchar' preserva el vínculo léxico con 'oír/atender' y deja la fuerza obediencial implícita, sin volverla más explícita de lo que exige el contexto.
- source_word: כְּכֹל אֲשֶׁר
  english_pob_choice: just as ... in everything
  chosen_spanish: así como ... en todo
  alternatives_spanish:
  - según todo lo que
  - tal como ... en todo lo que
  lexicon: HALOT
  rationale: La construcción compara de manera totalizante la relación con Moisés y con Josué. 'Así como' marca la comparación; 'en todo' conserva el alcance comprehensivo sin sonar rígido en español.
- source_word: אֶל / אֵלֶיךָ
  english_pob_choice: to Moses / to you
  chosen_spanish: a Moisés / a ti
  alternatives_spanish:
  - ante Moisés / ante ti
  lexicon: HALOT
  rationale: El hebreo retiene la dirección del verbo 'escuchar'. En español, 'escuchar a' comunica con naturalidad la relación personal y la atención dirigida al líder.
- source_word: רַק
  english_pob_choice: Only
  chosen_spanish: Solo que
  alternatives_spanish:
  - Solo
  - Sin embargo
  lexicon: HALOT
  rationale: רַק introduce una restricción o añadido de deseo. 'Solo que' funciona bien en español para presentar la petición subordinada sin perder el matiz de limitación.
- source_word: יִהְיֶה
  english_pob_choice: may ... be
  chosen_spanish: esté
  alternatives_spanish:
  - sea
  - pueda estar
  lexicon: HALOT
  rationale: Tras רַק, el imperfecto expresa un deseo. En español, 'esté' en subjuntivo transmite esa petición de presencia divina de forma natural y fiel al valor desiderativo.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahveh
  - SEÑOR
  lexicon: HALOT
  rationale: Se conserva el nombre divino del Tetragrámaton como 'Yahvé', conforme al criterio del proyecto, en lugar de sustituirlo por un título.
- source_word: אֱלֹהֶיךָ
  english_pob_choice: your God
  chosen_spanish: tu Dios
  alternatives_spanish:
  - tu Dios y Señor
  lexicon: HALOT
  rationale: La forma con sufijo de segunda persona singular se vierte de modo directo como 'tu Dios'.
- source_word: עִמָּךְ / עִם
  english_pob_choice: be with you / was with Moses
  chosen_spanish: contigo / con Moisés
  alternatives_spanish:
  - a tu lado / al lado de Moisés
  lexicon: HALOT
  rationale: '''Con'' es la equivalencia más natural para la presencia acompañante en este contexto de liderazgo y asistencia divina.'
- source_word: כַאֲשֶׁר
  english_pob_choice: just as
  chosen_spanish: como
  alternatives_spanish:
  - tal como
  - así como
  lexicon: HALOT
  rationale: Introduce la comparación entre la presencia de Yahvé con Josué y con Moisés. 'Como' es breve y exacto en la cláusula final.
theological_decisions:
- issue: Traducción del Nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahveh
  - SEÑOR
  rationale: El texto hebreo usa explícitamente el Tetragrama. En la línea del criterio doctrinal del proyecto, se conserva el nombre propio en español como 'Yahvé', evitando la sustitución por un título.
  doctrine_reference: 'DOCTRINE.md: יְהוָה / YHWH'
translation_notes:
  revision_awareness: 'Se corrigió el problema de validación anterior: el marcador [a] ahora aparece en el texto principal en el punto exacto donde aplica la alternativa léxica.'
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' para יְהוָה conforme al estándar del proyecto.
  - Se conserva la ambigüedad controlada de שׁמע mediante 'escuchamos/escucharemos' y una nota alternativa.
  - '''Contigo'' y ''con Moisés'' reflejan la presencia acompañante sin añadir glosas interpretativas.'
  - El registro es formal y publicable, evitando calcos innecesarios.
