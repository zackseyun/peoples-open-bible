  rationale: 'Se ajusta la redacción para mayor naturalidad y precisión frente al hebreo: «trataste con» expresa mejor עשה עם en español, y «para habitar en ella» conserva con más fidelidad la finalidad de לָשֶׁבֶת בּוֹ y su referencia a la casa.'
