translation:
  language: es
  text: 'diciendo: «A ti te daré la tierra de Canaán, la porción de su herencia[a]»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El hebreo cambia de singular («a ti») a plural («su herencia», es decir, la herencia de ustedes/vosotros), probablemente pasando del patriarca aludido a sus descendientes como herederos del pacto. «Porción» también puede traducirse «parte asignada» o «lote».
    reason: lexical_alternative
lexical_decisions:
- source_word: לֵאמֹר
  english_pob_choice: saying
  chosen_spanish: diciendo
  alternatives_spanish:
  - diciendo que
  - declarando
  lexicon: HALOT
  rationale: El infinitivo constructo introduce la continuación de la promesa previa; en español, «diciendo» conserva bien la función discursiva sin forzar una paráfrasis.
- source_word: לְךָ
  english_pob_choice: to you
  chosen_spanish: a ti
  alternatives_spanish:
  - para ti
  - a usted
  lexicon: HALOT
  rationale: El dativo de destinatario se expresa de forma natural en español con «a ti». Mantiene el énfasis personal de la promesa.
- source_word: אֶתֵּן
  english_pob_choice: I will give
  chosen_spanish: te daré
  alternatives_spanish:
  - daré
  - yo daré
  lexicon: HALOT
  rationale: El imperfecto de נתן en contexto promisorio lleva sentido futuro; «te daré» conserva esa fuerza y enlaza claramente el destinatario con el verbo.
- source_word: אֶרֶץ כְּנָעַן
  english_pob_choice: the land of Canaan
  chosen_spanish: la tierra de Canaán
  alternatives_spanish:
  - el país de Canaán
  - Canaán
  lexicon: HALOT
  rationale: «Tierra» reproduce mejor el valor territorial de אֶרֶץ que «país» en este contexto de promesa de heredad.
- source_word: חֶבֶל
  english_pob_choice: portion
  chosen_spanish: la porción
  alternatives_spanish:
  - el lote
  - la parte asignada
  - la línea de medida
  lexicon: HALOT
  rationale: En contextos de reparto de tierras, חֶבֶל funciona como porción asignada. «Porción» preserva la imagen de distribución hereditaria sin volver literal la idea de cuerda o línea.
- source_word: נַחֲלַתְכֶם
  english_pob_choice: your inheritance
  chosen_spanish: de tu herencia
  alternatives_spanish:
  - de vuestra herencia
  - de la herencia de ustedes
  - de tu posesión heredada
  lexicon: HALOT
  rationale: En español, la relación posesiva fluye mejor como complemento con «de tu herencia». Aunque el hebreo pasa a plural en el sufijo, el español puede dejar esa tensión implícita en la forma de la promesa a un destinatario singular sin explicitarla en el texto principal.
theological_decisions:
- issue: Tensión de número entre el destinatario singular y el posesivo plural en el hebreo
  english_pob_reading: 'Retain both numbers in translation: ''To you ... your inheritance.'''
  chosen_spanish_reading: «A ti ... de tu herencia»
  alternative_spanish_readings:
  - «A ti ... de vuestra herencia»
  - «A ti ... de la herencia de ustedes»
  - «A ti ... para ti y para tus descendientes»
  rationale: El hebreo presenta un paso de singular a plural que el inglés POB decidió conservar explícitamente. En español, sin embargo, una traducción directa con plural forzado puede sonar menos natural en una cita litúrgica breve. Se opta por mantener el destinatario singular en la frase principal y dejar la dimensión corporativa/covenantal en la herencia implícita del contexto, sin negar la referencia comunitaria del texto.
  doctrine_reference: Translation philosophy §3, Preserve theological tension rather than resolve it.
translation_notes:
  revision_awareness: El inglés POB revisó 'as the portion of your inheritance' a 'the portion of your inheritance' para reflejar más de cerca la apposición hebrea. La versión española sigue esa decisión con «la porción de tu herencia», evitando añadir una relación comparativa inexistente en el texto.
  spanish_consistency_notes:
  - Se mantiene «Canaán» como nombre propio territorial, no como glosa explicativa.
  - Se usa «tierra» para אֶרֶץ, en coherencia con el uso bíblico de territorio prometido.
  - La puntuación con comillas y dos puntos refleja la cita directa iniciada por el infinitivo hebreo.
  - No se introduce «Mesías», «SEÑOR» ni otras equivalencias no presentes en este versículo.
