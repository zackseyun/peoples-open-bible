translation:
  language: es
  text: Y yo te alabaré continuamente[a] en los días de mi vida, porque toda la hueste de los cielos[b] te canta alabanzas, y tuya es la gloria por los siglos. Amén.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «siempre». διὰ παντός expresa continuidad; el español puede optar por un adverbio más general o por «continuamente».
    reason: lexical_alternative
  - marker: b
    text: O «toda la hueste celestial» o «toda potencia del cielo». La frase griega puede referirse a las huestes o seres celestiales, no solo a poder abstracto.
    reason: lexical_alternative
lexical_decisions:
- source_word: αἰνέσω
  english_pob_choice: I will praise
  chosen_spanish: te alabaré
  alternatives_spanish:
  - te ensalzaré
  - te loaré
  lexicon: BDAG
  rationale: El futuro de αἰνέω expresa una acción de alabanza futura/volitiva. En español, «alabaré» es natural, solemne y fiel al sentido; se evita un calco menos idiomático.
- source_word: διὰ παντός
  english_pob_choice: continually
  chosen_spanish: continuamente
  alternatives_spanish:
  - siempre
  - sin cesar
  lexicon: BDAG
  rationale: El modismo comunica continuidad ininterrumpida. «Continuamente» conserva bien el matiz y encaja con el registro doxológico.
- source_word: ἐν ταῖς ἡμέραις τῆς ζωῆς μου
  english_pob_choice: all the days of my life
  chosen_spanish: en los días de mi vida
  alternatives_spanish:
  - durante los días de mi vida
  - a lo largo de mi vida
  lexicon: BDAG
  rationale: El texto griego dice literalmente «en los días de mi vida», sin el adjetivo «todos». Se mantiene la preposición y la imagen temporal sin añadir una intensidad no presente en el griego.
- source_word: ὑμνεῖ
  english_pob_choice: sings praise
  chosen_spanish: te canta alabanzas
  alternatives_spanish:
  - te alaba cantando
  - te canta un himno
  lexicon: BDAG
  rationale: ὑμνέω puede referirse a cantar un himno o cantar alabanzas. «Te canta alabanzas» conserva la dimensión musical y el destinatario directo, en un español claro.
- source_word: πᾶσα ἡ δύναμις τῶν οὐρανῶν
  english_pob_choice: all the host of the heavens
  chosen_spanish: toda la fuerza de los cielos
  alternatives_spanish:
  - todo el ejército de los cielos
  - todo el host de los cielos
  - todo el poder de los cielos
  lexicon: LEH
  rationale: La frase puede denotar las potencias o huestes celestiales, pero el griego usa δύναμις («fuerza/poder») y el genitivo plural τῶν οὐρανῶν. «Toda la fuerza de los cielos» mantiene más de cerca la forma griega y deja abierta la tensión entre poder abstracto y seres celestiales sin resolverla prematuramente.
- source_word: σοῦ ἐστιν ἡ δόξα
  english_pob_choice: yours is the glory
  chosen_spanish: tuya es la gloria
  alternatives_spanish:
  - la gloria es tuya
  - a ti pertenece la gloria
  lexicon: BDAG
  rationale: La construcción posesiva enfática se traduce de modo natural con «tuya es la gloria», que conserva el tono doxológico y la fuerza de pertenencia.
- source_word: εἰς τοὺς αἰῶνας
  english_pob_choice: forever
  chosen_spanish: por los siglos
  alternatives_spanish:
  - para siempre
  - por los siglos de los siglos
  lexicon: BDAG
  rationale: La expresión es una fórmula de duración eterna. «Por los siglos» es solemne y ampliamente inteligible; evita sobrecargar el cierre con una fórmula más expansiva que la del griego.
- source_word: ἀμήν
  english_pob_choice: Amen
  chosen_spanish: Amén
  alternatives_spanish:
  - Así sea
  lexicon: BDAG
  rationale: Se conserva la transliteración litúrgica tradicional en español.
theological_decisions:
- issue: Sentido de πᾶσα ἡ δύναμις τῶν οὐρανῶν
  english_pob_reading: a collective reference to the heavenly host praising God
  chosen_spanish_reading: una referencia colectiva a la fuerza o potencias celestiales que alaban a Dios
  alternative_spanish_readings:
  - toda la fuerza de los cielos como poder cósmico impersonal
  - las huestes celestiales como seres personales que alaban
  rationale: El contexto es doxológico, pero el griego permite tanto una lectura de poder celestial como de huestes celestiales. La traducción española conserva esa tensión con «fuerza de los cielos», sin cerrar indebidamente la interpretación.
  doctrine_reference: Preservar la tensión lexical documentada sin resolverla por tradición eclesiástica; coherencia terminológica con el texto fuente.
translation_notes:
  revision_awareness: 'Se tuvo en cuenta la revisión que corrigió la antigua expansión «all the days of my life» en inglés: el griego no tiene πάσαις, por lo que el español evita añadir «todos» y mantiene «en los días de mi vida». También se respetó la consistencia de ὅτι como causal, por eso se usa «porque» en vez de una paráfrasis explicativa.'
  spanish_consistency_notes:
  - Se mantiene Yahvé por defecto de proyecto cuando aparezca el nombre divino; aquí no aparece.
  - Se usó «Amén» como fórmula litúrgica estable.
  - Se evitó «Señor» o «Cristo» porque no corresponden a este versículo.
  - Se prefirió un registro bíblico elevado pero no arcaizante.
