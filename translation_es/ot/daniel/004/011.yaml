translation:
  language: es
  text: 'Clamó a gran voz y dijo así: «Derriben el árbol[a], y córtenle las ramas; arránquenle el follaje, y esparzan su fruto. Huyan las bestias de debajo de él[b], y las aves de sus ramas[b]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «corten el árbol».
    reason: lexical_alternative
  - marker: b
    text: La última cláusula es elíptica en arameo; el sentido es que las aves también deben huir de sus ramas.
    reason: lexical_alternative
lexical_decisions:
- source_word: קָרֵא בְחַיִל
  english_pob_choice: He cried aloud
  chosen_spanish: Gritó con fuerza
  alternatives_spanish:
  - Proclamó en voz alta
  - Clamó con fuerza
  lexicon: HALOT
  rationale: La expresión aramea comunica un llamado/proclamación en voz fuerte y con energía. En español, «gritó con fuerza» conserva el carácter sonoro e intenso sin sonar rígido.
- source_word: וְכֵן אָמַר
  english_pob_choice: and said thus
  chosen_spanish: y dijo así
  alternatives_spanish:
  - y dijo de este modo
  - y así dijo
  lexicon: HALOT
  rationale: כֵן introduce la fórmula de citación; «dijo así» mantiene el valor discursivo formal del hebreo/arameo y es natural en español bíblico contemporáneo.
- source_word: גֹּדּוּ
  english_pob_choice: Cut down the tree
  chosen_spanish: Corten el árbol
  alternatives_spanish:
  - Corten el árbol de raíz
  - Derriben el árbol
  lexicon: HALOT
  rationale: El imperativo exige la tala del árbol. «Corten» refleja el mandato directo y mantiene la primera orden sin añadir detalles no explícitos.
- source_word: אִילָנָא
  english_pob_choice: the tree
  chosen_spanish: el árbol
  alternatives_spanish:
  - el árbol aquel
  - ese árbol
  lexicon: HALOT
  rationale: Término arameo estándar para árbol; el contexto visionario hace inequívoca su referencia definida.
- source_word: וְקַצִּצוּ עַנְפוֹהִי
  english_pob_choice: and chop off its branches
  chosen_spanish: y corten sus ramas
  alternatives_spanish:
  - y talen sus ramas
  - y recorten sus ramas
  lexicon: HALOT
  rationale: El verbo pide cortar/seccionar las ramas. «Ramas» es el equivalente más claro de עֲנַף en este contexto, y «corten» mantiene la fuerza del paralelo imperativo.
- source_word: אַתַּרוּ עָפְיֵהּ
  english_pob_choice: strip off its foliage
  chosen_spanish: arranquen su follaje
  alternatives_spanish:
  - despojen su follaje
  - arranquen sus hojas
  lexicon: HALOT
  rationale: El verbo sugiere quitar o arrancar, y עָפְיֵהּ alude al conjunto de hojas/verdor. «Follaje» reproduce bien la idea colectiva y evita reducirlo a una sola hoja.
- source_word: וּבַדַּרוּ אִנְבֵּהּ
  english_pob_choice: and scatter its fruit
  chosen_spanish: y esparzan su fruto
  alternatives_spanish:
  - y dispersen su fruto
  - y arrojen su fruto
  lexicon: HALOT
  rationale: El verbo indica dispersar. «Esparzan» es natural en español y conserva la imagen de desordenar/sembrar el fruto del árbol.
- source_word: תְּנֻד חֵיוְתָא
  english_pob_choice: Let the beasts flee
  chosen_spanish: Hagan que las bestias huyan
  alternatives_spanish:
  - Dejen que las bestias huyan
  - Hagan huir a las bestias
  lexicon: HALOT
  rationale: La forma aramea tiene fuerza permisiva/jussiva en el contexto de expulsión. «Hagan que... huyan» comunica el efecto causado por la destrucción del árbol sin perder el matiz de desplazamiento forzado.
- source_word: מִן תַּחְתּוֹהִי
  english_pob_choice: from beneath it
  chosen_spanish: de debajo de él
  alternatives_spanish:
  - de debajo de su sombra
  - de bajo de él
  lexicon: HALOT
  rationale: Expresión espacial simple y directa. «De debajo de él» conserva la referencia al árbol y la relación de ubicación inferior.
- source_word: וְצִפְּרַיָּא מִן עַנְפוֹהִי
  english_pob_choice: and the birds from its branches
  chosen_spanish: y las aves de sus ramas
  alternatives_spanish:
  - y las aves de sus ramas también
  - y los pájaros de sus ramas
  lexicon: HALOT
  rationale: La cláusula final es elíptica en arameo; el sentido es paralelo al de las bestias, con las aves retirándose de las ramas. «Aves» mantiene un registro bíblico adecuado y «de sus ramas» conserva la imagen.
theological_decisions:
- issue: Fuerza imperativa y cláusula elíptica final
  english_pob_reading: Render the commands directly and supply the implied jussive verb in the final clause
  chosen_spanish_reading: Traducir los imperativos de forma directa y explicitar en español el efecto de retirada de las bestias, mientras la cláusula final queda paralela sin inventar un verbo adicional ajeno al texto
  alternative_spanish_readings:
  - Y las aves de sus ramas
  - Y que las aves huyan de sus ramas
  rationale: El arameo encadena órdenes y luego una cláusula elíptica. En español, una redacción fluida debe mostrar esa secuencia sin forzar una literalidad opaca ni añadir una interpretación doctrinal. La solución mantiene el paralelismo y la violencia del juicio sobre el árbol.
  doctrine_reference: Principios de claridad y fidelidad textual de POB; §6 de legibilidad y §5 de consistencia documentada
translation_notes:
  revision_awareness: 'La redacción sigue el estado más reciente del audit trail inglés: fórmula formal «said thus», imperativos diferenciados y cláusula final explicada por elipsis. Se conserva esa estructura en español con un registro bíblico moderno y transparente.'
  spanish_consistency_notes:
  - Se usa «árbol» para אִילָנָא y «ramas» para עַנְפוֹהִי, manteniendo el paralelismo del texto.
  - Se eligió «bestias» para חֵיוְתָא por su correspondencia con el tono bíblico y con la terminología usual de la POB.
  - «Aves» se usa en lugar de «pájaros» por registro más sobrio y literario.
  - No se introduce «SEÑOR» ni «Cristo»; el versículo no contiene esos términos.
  - Se preserva el carácter enérgico de la ordenanza sin suavizarla a una simple observación narrativa.
