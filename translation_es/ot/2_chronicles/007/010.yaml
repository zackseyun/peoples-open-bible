translation:
  language: es
  text: Y el vigésimo tercer día del séptimo mes, envió al pueblo a sus tiendas[a], gozosos y alegres de corazón, por la bondad que Yahvé había hecho por David, por Salomón y por Israel su pueblo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «a sus casas»; literalmente, «a sus tiendas».
    reason: lexical_alternative
lexical_decisions:
- source_word: וּבְיוֹם עֶשְׂרִים וּשְׁלֹשָׁה לַחֹדֶשׁ הַשְּׁבִיעִי
  english_pob_choice: And on the twenty-third day of the seventh month
  chosen_spanish: Y en el día veintitrés del séptimo mes
  alternatives_spanish:
  - El día veintitrés del séptimo mes
  - Y el veintitrés del séptimo mes
  lexicon: HALOT
  rationale: Conservo la secuencia narrativa con 'Y', y el valor temporal exacto con una expresión natural en español. 'Mes' reproduce לַחֹדֶשׁ sin necesidad de inversión artificial.
- source_word: שִׁלַּח
  english_pob_choice: he sent
  chosen_spanish: envió
  alternatives_spanish:
  - despidió
  - envió fuera
  lexicon: HALOT
  rationale: El verbo expresa despedir al pueblo para que regrese. 'Envió' mantiene la acción básica sin sobrecargar el texto; el complemento 'a sus tiendas' aclara el sentido de despedida.
- source_word: לְאָהֳלֵיהֶם
  english_pob_choice: to their tents
  chosen_spanish: a sus tiendas
  alternatives_spanish:
  - a sus casas
  - a sus hogares
  lexicon: HALOT
  rationale: Se conserva la imagen concreta de 'tiendas' por transparencia al hebreo. Aunque puede implicar 'hogares', el texto fuente usa la metáfora visible y no exige sustituirla en el cuerpo principal.
- source_word: שְׂמֵחִים
  english_pob_choice: rejoicing
  chosen_spanish: gozosos
  alternatives_spanish:
  - regocijados
  - alegres
  lexicon: HALOT
  rationale: '''Gozosos'' comunica bien el estado de alegría celebrativa del participio hebreo y se combina con la frase siguiente sin sonar forzado.'
- source_word: וְטוֹבֵי לֵב
  english_pob_choice: and glad of heart
  chosen_spanish: y alegres de corazón
  alternatives_spanish:
  - y de corazón contento
  - y gozosos de corazón
  lexicon: HALOT
  rationale: La expresión idiomática conserva la imagen del corazón como sede interna del júbilo. 'Alegres de corazón' suena natural y preserva la tensión lexical entre alegría externa e interior.
- source_word: עַל הַטּוֹבָה
  english_pob_choice: because of the goodness
  chosen_spanish: por la bondad
  alternatives_spanish:
  - a causa de la bondad
  - por el bien
  lexicon: HALOT
  rationale: La preposición עַל en este contexto expresa motivo/causa. 'Bondad' mantiene el sustantivo abstracto singular del hebreo y evita reducirlo a 'buenas cosas'.
- source_word: עָשָׂה
  english_pob_choice: had done
  chosen_spanish: había hecho
  alternatives_spanish:
  - había obrado
  - había realizado
  lexicon: HALOT
  rationale: Sigo el valor verbal directo del hebreo y también la revisión inglesa que prefirió 'had done' sobre una solución más interpretativa. 'Había hecho' conserva la amplitud benefactora del verbo.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  lexicon: HALOT
  rationale: Se conserva el nombre divino en transliteración española estándar del proyecto, en lugar de sustituirlo por un título. Esto mantiene visible el Tetragrama en el texto principal.
- source_word: לְדָוִיד וְלִשְׁלֹמֹה וּלְיִשְׂרָאֵל עַמּוֹ
  english_pob_choice: for David and for Solomon and for Israel his people
  chosen_spanish: para David, para Salomón y para Israel su pueblo
  alternatives_spanish:
  - a David, a Salomón y a Israel su pueblo
  - para David y para Salomón y para Israel, su pueblo
  lexicon: HALOT
  rationale: Repito 'para' para reflejar la serie de beneficiarios marcada por ל. 'Su pueblo' conserva la apposición de pacto sin añadir explicación ajena al texto.
theological_decisions:
- issue: Representación del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - el SEÑOR
  rationale: El hebreo usa el Tetragrama de forma directa; por tanto, se mantiene el nombre propio del pacto. En español del POB, 'Yahvé' es la forma adoptada para el texto principal, evitando la sustitución por un título.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Sentido benefactivo de עָשָׂה con objeto de bondad
  english_pob_reading: had done for
  chosen_spanish_reading: había hecho para
  alternative_spanish_readings:
  - había obrado para
  - había mostrado para
  rationale: El hebreo עָשָׂה לְ puede expresar acción hecha en favor de alguien. 'Había hecho para' preserva la estructura beneficiaria sin diluir la fuerza concreta del verbo.
  doctrine_reference: 2 Chronicles 7:10 source/English revision awareness
- issue: Imagen concreta de לְאָהֳלֵיהֶם
  english_pob_reading: to their tents
  chosen_spanish_reading: a sus tiendas
  alternative_spanish_readings:
  - a sus casas
  - a sus hogares
  rationale: No se neutraliza la imagen bíblica en el texto principal, porque el hebreo conserva la metáfora de las tiendas. La posible equivalencia idiomática queda, si es necesario, para nota, no para el cuerpo del verso.
  doctrine_reference: HALOT lexical range for אָהֶל
translation_notes:
  revision_awareness: La redacción sigue la revisión más reciente del audit trail inglés, que prefirió 'had done for' frente a 'had shown to' para reflejar más directamente עָשָׂה לְ. También mantiene la equivalencia transparente de לְאָהֳלֵיהֶם como 'a sus tiendas', con una nota opcional para el sentido idiomático.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' para יְהוָה en toda la serie de traducciones del proyecto.
  - Se usa 'para' de forma repetida ante la serie de beneficiarios para conservar el paralelismo hebreo.
  - Se preserva 'tiendas' como imagen concreta y no se sustituye por 'casas' en el texto principal.
  - '''Bondad'' traduce הַטּוֹבָה con un sustantivo abstracto singular, coherente con el audit trail inglés.'
