id: ACT.12.11
reference: Acts 12:11
source:
  edition: SBLGNT
  text: καὶ ὁ Πέτρος ⸂ἐν ἑαυτῷ γενόμενος⸃ εἶπεν· Νῦν οἶδα ἀληθῶς ὅτι ἐξαπέστειλεν ⸀ὁ κύριος τὸν ἄγγελον αὐτοῦ καὶ ἐξείλατό με ἐκ χειρὸς Ἡρῴδου καὶ πάσης τῆς προσδοκίας τοῦ λαοῦ τῶν Ἰουδαίων.
translation:
  text: And Peter[a], coming to himself, said[c][b], “Now I truly know that the Lord sent his angel and rescued me from Herod’s hand and from all the expectation of the people of the Jews.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “coming to his senses” or “having come to himself.”
    reason: lexical_alternative
  - marker: b
    text: The phrase “from Herod’s hand” means from Herod’s power or control.
    reason: cultural_note
  - marker: c
    text: Or “from all that the Jewish people were expecting.”
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐν ἑαυτῷ γενόμενος
  chosen: coming to himself
  alternatives:
  - coming to his senses
  - having come to himself
  lexicon: BDAG
  rationale: Idiomatic expression indicating Peter's return to full awareness after the visionary-like experience. 'Coming to himself' preserves the Greek imagery and is natural English; 'coming to his senses' is possible but slightly more interpretive.
- source_word: ἀληθῶς
  chosen: truly
  alternatives:
  - for certain
  - really
  lexicon: BDAG
  rationale: Conveys Peter's emphatic recognition. 'Truly' is concise and close to the adverb's force without sounding colloquial.
- source_word: ἐξαπέστειλεν
  chosen: sent
  alternatives:
  - sent out
  - dispatched
  lexicon: BDAG
  rationale: The compound verb can mean 'send out,' but in this context standard English 'sent' best conveys the action without unnecessary stiffness.
- source_word: κύριος
  chosen: the Lord
  alternatives:
  - Lord
  lexicon: BDAG
  rationale: Follows the project's default rendering for κύριος. In Acts this refers to the risen Lord/God in context; 'the Lord' is the natural English expression here.
- source_word: ἄγγελον
  chosen: angel
  alternatives:
  - messenger
  lexicon: BDAG
  rationale: In this narrative context a heavenly being is clearly intended, so 'angel' is required rather than the more general 'messenger'.
- source_word: ἐξείλατό με
  chosen: rescued me
  alternatives:
  - delivered me
  - took me out
  lexicon: BDAG
  rationale: The middle-form verb here denotes deliverance from danger. 'Rescued me' is clear modern English and captures the sense of saving intervention.
- source_word: ἐκ χειρὸς Ἡρῴδου
  chosen: from Herod’s hand
  alternatives:
  - from the hand of Herod
  - from Herod's power
  lexicon: BDAG
  rationale: The idiom 'from the hand of' denotes power or control. 'From Herod's hand' preserves the biblical idiom while remaining understandable.
- source_word: πάσης τῆς προσδοκίας
  chosen: all the expectation
  alternatives:
  - all the expectation for
  - all that was expected
  - all the eager expectation
  lexicon: BDAG
  rationale: προσδοκία denotes expectation or anticipation. The phrase refers to what the Jewish populace was expecting would happen to Peter. 'All the expectation' stays close to the Greek, though the sense is effectively the anticipated outcome.
- source_word: τοῦ λαοῦ τῶν Ἰουδαίων
  chosen: of the people of the Jews
  alternatives:
  - of the Jewish people
  - of the people, the Jews
  lexicon: BDAG
  rationale: A fairly literal rendering preserves the genitival structure and avoids prematurely smoothing Luke's phrasing. 'Jewish people' is possible, but the chosen wording keeps the source-text shape more visible for auditability.
