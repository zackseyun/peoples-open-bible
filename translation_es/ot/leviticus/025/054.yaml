translation:
  language: es
  text: Pero si no es redimido por estos medios[a], entonces saldrá en el año del Jubileo, él y sus hijos varones con él.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «por estos»; se refiere a las disposiciones de redención descritas en los versículos anteriores.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְאִם
  english_pob_choice: But if
  chosen_spanish: Pero si
  alternatives_spanish:
  - Y si
  - Si
  lexicon: HALOT
  rationale: La partícula condicional continúa la regulación previa y admite un matiz de contraste; en español, "Pero si" conserva bien ese giro sin sonar artificial.
- source_word: לֹא
  english_pob_choice: not
  chosen_spanish: 'no'
  alternatives_spanish:
  - no es
  - no será
  lexicon: HALOT
  rationale: Negación directa del participio/estado verbal siguiente; "no" mantiene la estructura legal del hebreo.
- source_word: יִגָּאֵל
  english_pob_choice: is redeemed
  chosen_spanish: es redimido
  alternatives_spanish:
  - es rescatado
  - es rescatado mediante pago
  lexicon: HALOT
  rationale: En este contexto jurídico de Levítico, "redimido" conserva el término técnico de rescate/recompra sin perder la carga legal-teológica del verbo גאל.
- source_word: בְּאֵלֶּה
  english_pob_choice: by these means
  chosen_spanish: por estos medios
  alternatives_spanish:
  - por estas cosas
  - con esto
  lexicon: HALOT
  rationale: La expresión apunta a los medios de redención mencionados en los versículos previos; "por estos medios" explicita el referente en español sin salir del sentido del texto.
- source_word: וְיָצָא
  english_pob_choice: then ... shall go out
  chosen_spanish: entonces él saldrá
  alternatives_spanish:
  - y saldrá
  - será liberado
  lexicon: HALOT
  rationale: '"Saldrá" reproduce el idiomático hebreo; se conserva el valor legal de salida/liberación, y "entonces" expresa la apódosis condicional.'
- source_word: בִּשְׁנַת הַיֹּבֵל
  english_pob_choice: in the year of Jubilee
  chosen_spanish: en el año del jubileo
  alternatives_spanish:
  - en el año del Jubileo
  lexicon: HALOT
  rationale: '"Jubileo" es el término establecido para יוֹבֵל en Levítico; el artículo en español puede omitirse o mantenerse, pero aquí la forma corriente es más natural.'
- source_word: הוּא
  english_pob_choice: he
  chosen_spanish: él
  alternatives_spanish:
  - él mismo
  lexicon: HALOT
  rationale: El pronombre independiente añade énfasis; en español puede expresarse de forma simple con "él" sin sobrecargar la frase.
- source_word: וּבָנָיו עִמּוֹ
  english_pob_choice: and his sons with him
  chosen_spanish: y sus hijos con él
  alternatives_spanish:
  - y sus hijos junto con él
  - y sus hijos irán con él
  lexicon: HALOT
  rationale: Aunque בנים es literalmente "hijos/varones hijos", en español "hijos" puede abarcar los descendientes varones sin crear dureza innecesaria; el contexto de la casa y la liberación compartida se mantiene con "con él".
theological_decisions:
- issue: Alcance de בָנָיו en español
  english_pob_reading: sons
  chosen_spanish_reading: hijos
  alternative_spanish_readings:
  - hijos varones
  - hijos
  rationale: El hebreo usa un masculino plural; sin embargo, en español "hijos" comunica naturalmente la descendencia masculina en un contexto familiar/legal y evita una formulación excesivamente rígida. No se pretende neutralizar el género, sino traducir el efecto comunicativo en español.
  doctrine_reference: DOCTRINE.md § Translation philosophy 4 (Gender-accurate over gender-neutral)
translation_notes:
  revision_awareness: Se siguió el pasaje hebreo base y el audit trail inglés sin cambios de revisión pendientes; la versión inglesa más reciente indica estabilidad textual y acuerdo alto, por lo que no se introdujeron enmiendas sustantivas.
  spanish_consistency_notes:
  - Se mantiene "redimido" como término técnico coherente con la serie legal de Levítico.
  - '"Jubileo" se conserva como nombre establecido del período legal.'
  - La estructura condicional "Pero si... entonces..." refleja bien la lógica del hebreo sin añadir interpretación.
  - Se evitó "SEÑOR" o sustituciones litúrgicas, ya que no aparece aquí el nombre divino ni κύριος.
