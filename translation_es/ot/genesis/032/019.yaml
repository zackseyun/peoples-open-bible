translation:
  language: es
  text: 'Entonces dirás: «Es un regalo[a] enviado a mi señor Esaú desde tu siervo Jacob; y mira[b], él también está detrás de nosotros».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O «presente» o «tributo» para «regalo» (hebreo: minḥah), un término usado aquí para un obsequio conciliador a Esaú.'
    reason: lexical_alternative
  - marker: b
    text: O «él viene después de nosotros».
    reason: lexical_alternative
lexical_decisions:
- source_word: וְאָֽמַרְתָּ
  english_pob_choice: Then you shall say
  chosen_spanish: Entonces dirás
  alternatives_spanish:
  - Y dirás
  - Luego dirás
  lexicon: HALOT
  rationale: La forma con waw tiene valor instructivo/secuencial en este contexto. «Entonces dirás» conserva esa fuerza y suena natural en español sin perder el tono de instrucción.
- source_word: לְעַבְדְּךָ לְיַעֲקֹב
  english_pob_choice: from your servant Jacob
  chosen_spanish: desde tu siervo Jacob
  alternatives_spanish:
  - de tu siervo Jacob
  - por tu siervo Jacob
  lexicon: HALOT
  rationale: La expresión es una fórmula de humildad de Jacob ante Esaú. «Tu siervo Jacob» preserva el valor deferencial de עבד; «desde» reproduce bien el punto de partida del envío en español, en línea con el reordenamiento adoptado por la POB en inglés.
- source_word: מִנְחָה
  english_pob_choice: gift
  chosen_spanish: regalo
  alternatives_spanish:
  - presente
  - tributo
  - ofrenda
  lexicon: HALOT
  rationale: En este pasaje no se trata de una ofrenda cultual sino de un obsequio conciliador. «Regalo» es claro y natural en español; «tributo» puede sugerir subordinación política excesiva, y «ofrenda» introduciría un matiz cultual no garantizado por el contexto.
- source_word: שְׁלוּחָה
  english_pob_choice: is sent
  chosen_spanish: enviado
  alternatives_spanish:
  - mandado
  - remitido
  - ha sido enviado
  lexicon: HALOT
  rationale: El participio pasivo describe al regalo como despachado. «Enviado» mantiene la pasividad y la concisión. Se prefiere la forma adjetival con «es» implícito en español por fluidez narrativa.
- source_word: לַאדֹנִי לְעֵשָׂו
  english_pob_choice: to my lord Esau
  chosen_spanish: a mi señor Esaú
  alternatives_spanish:
  - a mi amo Esaú
  - para mi señor Esaú
  lexicon: HALOT
  rationale: אָדוֹן aquí funciona como título de respeto social, no como afirmación doctrinal. «Mi señor» preserva la deferencia y evita la dureza de «amo», que en español moderno suele sonar más esclavista que el registro del relato.
- source_word: וְהִנֵּה
  english_pob_choice: and look
  chosen_spanish: y mira
  alternatives_spanish:
  - y he aquí
  - y observa
  lexicon: HALOT
  rationale: Como marcador discursivo de atención, «mira» comunica bien la exhortación a fijarse en lo que sigue. Es moderno y suficientemente solemne para el texto bíblico.
- source_word: גַם הוּא אַחֲרֵינוּ
  english_pob_choice: he also is behind us
  chosen_spanish: él también viene detrás de nosotros
  alternatives_spanish:
  - él también está detrás de nosotros
  - él también va detrás de nosotros
  lexicon: HALOT
  rationale: La frase puede leerse como ubicación estática o como movimiento posterior. El contexto narrativo favorece la idea de que Jacob sigue después de los rebaños; «viene detrás de nosotros» conserva la ambigüedad entre estar detrás y avanzar tras ellos, sin forzar una sola imagen.
theological_decisions:
- issue: Tratamiento del título de respeto אֲדֹנִי aplicado a Esaú
  english_pob_reading: my lord
  chosen_spanish_reading: mi señor
  alternative_spanish_readings:
  - mi amo
  - señor mío
  rationale: No hay aquí una afirmación de señorío divino, sino una fórmula de cortesía y sumisión retórica ante Esaú. «Mi señor» reproduce el registro relacional del hebreo y del inglés POB sin cargar el texto con un término más áspero o anacrónico.
  doctrine_reference: Sociolingüística bíblica / fórmulas de deferencia narrativa
- issue: Naturaleza de מִנְחָה en contexto narrativo
  english_pob_reading: gift
  chosen_spanish_reading: regalo
  alternative_spanish_readings:
  - presente
  - tributo
  - ofrenda
  rationale: La POB en inglés rechazó una lectura cultual aquí y entendió la entrega como un gesto conciliador. En español, «regalo» comunica ese gesto sin introducir una lectura litúrgica. Se evita «ofrenda» para no confundir el relato patriarcal con un acto sacrificial.
  doctrine_reference: Contexto narrativo frente a vocabulario cultual
- issue: Valor de אַחֲרֵינוּ
  english_pob_reading: behind us
  chosen_spanish_reading: detrás de nosotros
  alternative_spanish_readings:
  - tras nosotros
  - viene después de nosotros
  rationale: El hebreo puede apuntar tanto a posición espacial como a secuencia de marcha. La POB optó por mantener la lectura espacial con posible implicación dinámica. En español, «viene detrás de nosotros» preserva la tensión entre ambas posibilidades y evita cerrar indebidamente el sentido.
  doctrine_reference: Ambigüedad semántica preservada
translation_notes:
  revision_awareness: 'La redacción sigue la revisión más reciente del audit trail inglés, que reordenó la cláusula para reflejar mejor el hebreo: primero identifica el regalo, luego indica que fue enviado a Esaú desde Jacob. También conserva el marcador discursivo de atención en forma natural en español.'
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» como norma general de la plataforma, pero este versículo no contiene el nombre divino.
  - Se usó «mi señor» para אָדוֹן como título de respeto humano, no como sustituto reverencial del nombre divino.
  - La formulación «tu siervo Jacob» conserva la humildad explícita del hebreo y la sintaxis relacional del contexto.
  - Se evitó «ofrenda» para no trasladar el campo semántico cultual a un envío diplomático/narrativo.
