translation:
  language: es
  text: 'Ahora he venido por segunda vez acerca del sumo sacerdocio: primero[a], porque sinceramente tengo en mente los intereses del rey, y segundo, porque también considero los de mis propios conciudadanos; pues a causa de la necedad de los hombres mencionados antes'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El griego continúa en el versículo siguiente; la cláusula final aquí está incompleta en el fragmento fuente y se ha traducido para reflejar esa continuación.
    reason: textual_variant
lexical_decisions:
- source_word: δόξαν
  english_pob_choice: the high priesthood
  chosen_spanish: la honra del sumo sacerdocio
  alternatives_spanish:
  - el sumo sacerdocio
  - la dignidad del sumo sacerdocio
  - la gloria
  lexicon: LSJ
  rationale: El griego δόξαν aquí no apoya "sumo sacerdocio" como equivalente directo; sigue el valor de honra/gloria/estima. En español, "la honra del sumo sacerdocio" conserva el matiz de prestigio o dignidad al que se refiere la frase y evita borrar la tensión textual señalada en la revisión inglesa.
- source_word: δεύτερον νῦν ἐλήλυθα
  english_pob_choice: I have now come a second time
  chosen_spanish: Ahora he venido por segunda vez
  alternatives_spanish:
  - he venido ahora otra vez
  - he venido de nuevo por segunda vez
  lexicon: LSJ
  rationale: La secuencia temporal y ordinal se expresa con naturalidad en español con "ahora" y "por segunda vez", preservando νῦν y δεύτερον sin forzar un calco innecesario.
- source_word: ὑπὲρ τῶν ἀνηκόντων τῷ βασιλεῖ
  english_pob_choice: the interests of the king
  chosen_spanish: los intereses del rey
  alternatives_spanish:
  - las cosas que conciernen al rey
  - lo que pertenece al rey
  lexicon: LSJ
  rationale: '"Los intereses del rey" mantiene la fuerza pragmática de asuntos que le conciernen o pertenecen a su esfera, con un español idiomático que sigue la decisión inglesa.'
- source_word: γνησίως φρονῶν
  english_pob_choice: I sincerely have in mind
  chosen_spanish: sinceramente tengo en mente
  alternatives_spanish:
  - pienso con sinceridad
  - tengo sinceramente en cuenta
  lexicon: LSJ
  rationale: φρονῶν expresa una disposición mental o preocupación deliberada; "tener en mente" reproduce esa orientación mental, y γνησίως se refleja con "sinceramente".
- source_word: τῶν ἰδίων πολιτῶν
  english_pob_choice: my own fellow citizens
  chosen_spanish: mis propios conciudadanos
  alternatives_spanish:
  - mis propios ciudadanos
  - mis compatriotas
  lexicon: LSJ
  rationale: '"Conciudadanos" transmite πολῖται con precisión cívica; "propios" refleja ἰδίων. Se evita "compatriotas" porque introduce una carga nacional que el griego no exige.'
- source_word: στοχαζόμενος
  english_pob_choice: considering
  chosen_spanish: considero
  alternatives_spanish:
  - tengo en cuenta
  - me preocupo por
  - atiendo a
  lexicon: LSJ
  rationale: El participio tiene aquí un sentido de atención reflexiva o consideración. En español, "considero" enlaza bien con la estructura paralela y conserva la idea de deliberada atención.
- source_word: τῇ μὲν γὰρ τῶν προειρημένων
  english_pob_choice: by the folly of the men mentioned before
  chosen_spanish: pues a causa de la necedad de los hombres mencionados antes
  alternatives_spanish:
  - pues por la insensatez de los hombres antes mencionados
  - pues debido a la necedad de los ya citados
  lexicon: LSJ
  rationale: El segmento griego está truncado y funciona como inicio de una cláusula causal que continúa en el versículo siguiente. "A causa de la necedad" refleja la causalidad implícita y conserva el carácter incompleto del texto.
theological_decisions:
- issue: δόξαν en lugar de una lectura que introduzca 'sumo sacerdocio' como objeto explícito
  english_pob_reading: The English audit trail initially used 'the high priesthood,' but the revision removed that unsupported phrase because the Greek has δόξαν, not ἀρχιερωσύνη.
  chosen_spanish_reading: la honra del sumo sacerdocio
  alternative_spanish_readings:
  - la gloria
  - la dignidad
  - el sumo sacerdocio
  rationale: 'La revisión inglesa indica una corrección importante: el griego disponible no dice directamente ''sumo sacerdocio'' como objeto del verbo, sino δόξαν. Para no borrar esa tensión, el español conserva ''honra'' y vincula la frase al sumo sacerdocio de modo explicativo, no como equivalencia simple.'
  doctrine_reference: Principio de equivalencia auditada y respeto al dato textual griego
- issue: Carácter incompleto de la cláusula final
  english_pob_reading: The Greek sentence continues into the next verse; the final clause here is incomplete in the source excerpt and is rendered to reflect that continuation.
  chosen_spanish_reading: pues a causa de la necedad de los hombres mencionados antes
  alternative_spanish_readings:
  - pues por la necedad de los hombres antes mencionados
  - pues debido a la insensatez de los mencionados antes
  rationale: Como el versículo griego citado queda cortado, el español debe sonar completo en su sintaxis pero no cerrar artificialmente el sentido. Se deja la cláusula abierta, señalando en nota que continúa en el siguiente versículo.
  doctrine_reference: Respeto a la continuidad textual y a la delimitación versicular
translation_notes:
  revision_awareness: 'La revisión inglesa más reciente corrigió una sobrelectura: eliminó ''the high priesthood'' como equivalente directo de δόξαν, porque el griego visible no lo sostiene. Esta versión española sigue esa corrección y evita reintroducir el contenido descartado; al mismo tiempo conserva el tono causal y la incompletitud del segmento final, conforme al audit trail.'
  spanish_consistency_notes:
  - Se usa 'Yahvé' por norma del proyecto, pero este versículo no contiene el nombre divino.
  - Se mantiene 'sumo sacerdocio' solo dentro de una frase nominal de apoyo ('la honra del sumo sacerdocio'), no como traducción directa de δόξαν.
  - '''Conciudadanos'' se emplea para πολῖται, manteniendo el matiz cívico del griego.'
  - La cláusula final queda abierta para respetar que el texto griego citado continúa en el siguiente versículo.
