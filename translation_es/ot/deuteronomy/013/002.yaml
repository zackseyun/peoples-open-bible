review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español sigue bien el hebreo y el rastro de auditoría inglés en casi todos los puntos: «Si» refleja correctamente כִּי en sentido condicional; «un profeta o un soñador de sueños» preserva la disyunción y el giro hebreo; «y te da» representa bien וְנָתַן אֵלֶיךָ en secuencia condicional prospectiva; «una señal o un prodigio» mantiene la tensión teológica sin sobreinterpretar. La única corrección necesaria es estilística y de legibilidad: «en medio de ti» suena más individual que comunitario en español actual, mientras que el hebreo בְּקִרְבְּךָ aquí apunta al surgimiento dentro del pueblo. «Entre ustedes» comunica mejor el referente colectivo sin alterar el sentido.'
  spanish_quality_summary: 'El español es claro y digno, pero «en medio de ti» en combinación con el singular jurídico puede sonar algo rígido y menos natural para lectura amplia eclesial contemporánea. También conviene armonizar la nota al pie con la alternativa documentada en inglés: el texto base inglés ofrece la alternativa para toda la pareja «a sign or a portent», no solo para «prodigio». Una nota española más completa evita estrechar innecesariamente la alternativa léxica.'
  glossary_alignment: No hay conflictos con la terminología base del proyecto. No aparecen Yahvé, Mesías/Cristo, espíritu, esclavo, etc. Las elecciones «profeta», «soñador de sueños», «señal» y «prodigio» son compatibles con el glosario y con la racionalidad léxica documentada.
  issues:
  - severity: medium
    issue: «en medio de ti» suena menos natural y puede sugerir un referente individual más que comunitario
    rationale: בְּקִרְבְּךָ en este contexto legal dirigido a Israel señala surgimiento dentro de la comunidad. En español eclesial actual, «entre ustedes» comunica mejor esa dimensión colectiva que «en medio de ti», sin perder el valor del singular jurídico del original.
  - severity: low
    issue: La nota al pie reduce la alternativa léxica a «portento» solamente
    rationale: La auditoría inglesa conserva como alternativa «a sign or a portent». En español conviene reflejar la alternativa de la expresión completa, por ejemplo «O «una señal o un portento»», para no insinuar que solo מוֹפֵת varía mientras אוֹת queda fijo.
  revised_spanish_text: Si se levanta entre ustedes un profeta o un soñador de sueños, y te da una señal o un prodigio[a],
  revised_footnotes:
  - marker: a
    text: O «una señal o un portento».
    reason: lexical_alternative
  revision_rationale: Se ajusta una frase de ubicación para mejorar la legibilidad comunitaria en español sin apartarse del hebreo, y se amplía la nota léxica para reflejar con más fidelidad la alternativa documentada en la auditoría inglesa.
