translation:
  language: es
  text: Y en el momento en que comenzaron con cánticos y alabanza, Yahvé puso emboscadas[a] contra los amonitas, Moab y el monte de Seír, los que venían contra Judá[b], y fueron derribados.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «emboscadores» / «hombres en emboscada». El participio hebreo puede referirse a personas apostadas en emboscada o, de manera más general, a la emboscada misma.
    reason: lexical_alternative
  - marker: b
    text: O «que venían a Judá». En el contexto, el movimiento es hostil; por eso se usa «contra Judá» en el texto principal.
    reason: lexical_alternative
lexical_decisions:
- source_word: וּבְעֵת
  english_pob_choice: And at the time
  chosen_spanish: Y en el momento
  alternatives_spanish:
  - Y cuando
  - Al tiempo
  lexicon: HALOT
  rationale: La expresión temporal introduce el instante en que ocurre la acción siguiente. «En el momento» conserva la relación temporal sin sonar demasiado literal en español.
- source_word: הֵחֵלּוּ
  english_pob_choice: they began
  chosen_spanish: comenzaron
  alternatives_spanish:
  - empezaron
  lexicon: HALOT
  rationale: El verbo hebreo indica inicio de acción; «comenzaron» es natural y fiel al valor narrativo.
- source_word: בְרִנָּה וּתְהִלָּה
  english_pob_choice: with singing and praise
  chosen_spanish: con cánticos y alabanza
  alternatives_spanish:
  - con canto y alabanza
  - con júbilo y alabanza
  lexicon: HALOT
  rationale: רִנָּה puede abarcar grito jubiloso, canto o clamor; en este contexto de adoración, «cánticos» comunica bien el sentido litúrgico sin perder la dimensión sonora. תְהִלָּה se rinde con «alabanza».
- source_word: נָתַן יְהוָה
  english_pob_choice: the LORD set
  chosen_spanish: Yahvé puso
  alternatives_spanish:
  - Yahvé estableció
  - Yahvé dispuso
  lexicon: HALOT
  rationale: El hebreo usa el verbo dar/poner con el objeto implícito de emboscadas; «puso» refleja bien el giro idiomático en español y mantiene el sujeto divino explícito con Yahvé.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  lexicon: HALOT
  rationale: Se conserva el nombre divino según la guía del proyecto, evitando el reemplazo por una máscara reverencial.
- source_word: מְאָרְבִים
  english_pob_choice: ambushes
  chosen_spanish: emboscadas
  alternatives_spanish:
  - emboscados
  - hombres en emboscada
  lexicon: HALOT
  rationale: El participio puede entenderse como acción o como personas en emboscada. «Emboscadas» preserva la ambigüedad útil del hebreo y suena natural en español militar.
- source_word: עַל
  english_pob_choice: against
  chosen_spanish: contra
  alternatives_spanish:
  - sobre
  lexicon: HALOT
  rationale: En contexto bélico, la preposición expresa hostilidad dirigida; «contra» es la opción más clara.
- source_word: בְּנֵי עַמּוֹן מוֹאָב וְהַר שֵׂעִיר
  english_pob_choice: the Ammonites, Moab, and Mount Seir
  chosen_spanish: los amonitas, Moab y el monte de Seír
  alternatives_spanish:
  - los hijos de Amón, Moab y el monte de Seír
  - los amonitas, los moabitas y el monte de Seír
  lexicon: HALOT
  rationale: «Amonitas» es el equivalente natural de «hijos de Amón». Se mantiene «Moab» y «monte de Seír» como designaciones propias, tal como en el hebreo.
- source_word: הַבָּאִים לִיהוּדָה
  english_pob_choice: who were coming against Judah
  chosen_spanish: los que venían contra Judá
  alternatives_spanish:
  - los que venían a Judá
  - los que se acercaban a Judá
  lexicon: HALOT
  rationale: Aunque ל puede ser direccional «a», el contexto es hostil; «contra Judá» explicita el sentido militar que también guía la traducción inglesa.
- source_word: וַיִּנָּגֵפוּ
  english_pob_choice: and they were struck down
  chosen_spanish: y fueron derrotados
  alternatives_spanish:
  - y fueron golpeados
  - y fueron derribados
  lexicon: HALOT
  rationale: El nifal de נגף puede ser «ser herido/golpeado» o «ser derrotado». En español, «fueron derrotados» comunica el resultado bélico de forma clara, aunque la fuerza literal de «golpeados» queda detrás del pasivo hebreo.
theological_decisions:
- issue: Cómo expresar el nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Jehová
  - el SEÑOR
  rationale: El texto hebreo usa el Tetragrama directamente. La norma del proyecto pide «Yahvé» en el texto principal para preservar el nombre del pacto sin máscara reverencial.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Valor de מְאָרְבִים en la frase de acción divina
  english_pob_reading: ambushes
  chosen_spanish_reading: emboscadas
  alternative_spanish_readings:
  - emboscados
  - hombres en emboscada
  rationale: La forma participial admite lectura concreta o más abstracta. «Emboscadas» mantiene la tensión entre evento y agentes, sin imponer más precisión de la que el hebreo exige.
  doctrine_reference: HALOT lexical note; English POB footnote a
translation_notes:
  revision_awareness: 'Coincide con la última revisión registrada: no se requieren cambios sustanciales respecto del cierre de revisión; se conserva la lectura óptima y la nota de ambigüedad léxica sobre מְאָרְבִים y la dirección hostil de לִיהוּדָה.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como forma constante para יְהוָה.
  - Se usa «Judá» sin artículo, como nombre propio territorial.
  - «Monte de Seír» conserva la forma geográfica establecida.
  - 'La estructura de la oración conserva la secuencia narrativa del hebreo: tiempo → inicio de alabanza → acción divina → resultado bélico.'
