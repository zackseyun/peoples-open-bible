  verdict: revise
  source_alignment_summary: 'El borrador refleja bien el sentido básico del hebreo: título, nombre divino «Yahvé», restauración de Sion y la comparación con quienes sueñan. También preserva correctamente la alternativa semántica de שׁוּב ... שִׁיבַת צִיּוֹן mediante nota. Sin embargo, hay dos ajustes menores para mayor fidelidad y mejor español: el encabezado técnico שִׁיר הַמַּעֲלוֹת se vierte mejor como «Cántico de las subidas» o «Cántico de ascensos» que como «Cántico de ascenso», y en la nota alternativa «regresó a los cautivos» no representa bien la construcción hebrea; debe expresarse como «hizo volver a los cautivos» o similar.'
  spanish_quality_summary: El español es claro y eclesialmente legible, pero «Cántico de ascenso» suena algo poco idiomático y singulariza innecesariamente un título tradicional plural. «Éramos como los que sueñan» es natural y fiel. «Restauró la fortuna de Sion» es aceptable, aunque «fortunas» sería más idiomático en español bíblico contemporáneo al corresponder al inglés POB y al valor idiomático de la expresión.
  glossary_alignment: 'Buen alineamiento con la terminología del proyecto: יהוה -> «Yahvé» está correcto; צִיּוֹן -> «Sion» correcto. No hay conflictos mayores de glosario. Se recomienda ajustar el título a una formulación española más estable y la nota para que la alternativa semántica quede correctamente expresada.'
  issues:
  - severity: medium
    issue: «Cántico de ascenso» no representa de la mejor manera שִׁיר הַמַּעֲלוֹת
    rationale: El hebreo usa un plural/título técnico («de las subidas/ascensos»). En español, «de ascenso» suena abstracto y menos idiomático. Una forma como «Cántico de las subidas» preserva mejor la forma y la función del encabezado.
  - severity: low
    issue: La nota «regresó a los cautivos de Sion» está mal formulada
    rationale: שׁוּב con este complemento expresa ‘hacer volver’/‘traer de vuelta’ o ‘restaurar’, no simplemente ‘regresar a’. La alternativa española debe reflejar la transitividad correctamente.
  - severity: low
    issue: «la fortuna» es comprensible, pero «las fortunas» encaja mejor con el inglés POB y el modismo español
    rationale: En español bíblico moderno, «restauró las fortunas de Sion» suena más natural y reproduce mejor la expresión idiomática amplia sin limitarla a riqueza material.
  revised_spanish_text: Cántico de las subidas. Cuando Yahvé restauró las fortunas de Sion[a], éramos como los que sueñan.
