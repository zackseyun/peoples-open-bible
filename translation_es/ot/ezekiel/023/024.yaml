  - severity: medium
    issue: La nota [d] está anclada a 'el juicio' pero no refleja la alternativa auditada principal
    rationale: El inglés POB documenta como alternativa 'they will judge you according to their laws/standards' para la cláusula final. La nota española actual introduce 'pondré el caso delante de ellos' o 'les someteré la causa', que es posible pero no corresponde al foco documentado y desplaza la nota al lugar menos respaldado por el expediente.
  - severity: low
