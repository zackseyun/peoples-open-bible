    text: Or 'when you transgress the covenant of the LORD your God.' The Hebrew opening may be read temporally ('when') or conditionally ('if').
    reason: alternative_reading
  - marker: b
    text: Hebrew 'from off the good land,' an expression emphasizing removal from the land the LORD gave them.
    reason: lexical_alternative
