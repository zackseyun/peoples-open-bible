translation:
  language: es
  text: Mira[a], mi terror no te asustará, y mi mano[b] sobre ti no pesará.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «He aquí». El hebreo הִנֵּה introduce una llamada de atención enfática; «Mira» traduce ese valor en español actual sin perder solemnidad.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «mi presión sobre ti no pesará». El sustantivo hebreo אַכְפִּי es difícil; una traducción más literal conserva la imagen tradicional de una mano puesta sobre alguien, mientras que la alternativa expresa más directamente la idea probable de presión o peso.'
    reason: lexical_alternative
lexical_decisions:
- source_word: הִנֵּה
  english_pob_choice: Look
  chosen_spanish: Mira
  alternatives_spanish:
  - Mira, pues
  - Mira bien
  - He aquí
  lexicon: HALOT
  rationale: La partícula deíctica introduce una apelación directa y enfática. «Mira» conserva la fuerza de atención inmediata con español natural; «He aquí» sería más formal pero menos conversacional.
- source_word: אֵמָתִי
  english_pob_choice: my terror
  chosen_spanish: mi terror
  alternatives_spanish:
  - mi temor
  - mi espanto
  - mi pavor
  lexicon: HALOT
  rationale: El sustantivo expresa terror o espanto asociado con el hablante. «Mi terror» conserva mejor la intensidad objetiva del término que «mi temor», que sonaría más suave en español.
- source_word: תְבַעֲתֶךָ
  english_pob_choice: will not frighten you
  chosen_spanish: no te asustará
  alternatives_spanish:
  - no te aterrará
  - no te infundirá miedo
  - no te espantará
  lexicon: HALOT
  rationale: El verbo tiene la fuerza de aterrorizar o sobresaltar con intensidad. «No te asustará» es claro y natural en español; «aterrorará» sería más fuerte, pero menos idiomático aquí.
- source_word: אַכְפִּי
  english_pob_choice: my hand
  chosen_spanish: mi mano
  alternatives_spanish:
  - mi presión
  - mi peso
  - mi mano puesta sobre ti
  lexicon: HALOT
  rationale: Sigo la revisión del inglés POB que volvió a «my hand» por mayor cercanía lexical. En español, «mi mano» preserva la imagen tradicional y deja abierta la dificultad del sustantivo hebreo sin forzar una explicación interpretativa en el texto principal.
- source_word: עָלֶיךָ
  english_pob_choice: on you
  chosen_spanish: sobre ti
  alternatives_spanish:
  - en ti
  - contra ti
  - encima de ti
  lexicon: HALOT
  rationale: La preposición על con sufijo expresa colocación o presión sobre la persona. «Sobre ti» es natural y mantiene la imagen física de la mano posada.
- source_word: יִכְבָּד
  english_pob_choice: will not be heavy
  chosen_spanish: no pesará
  alternatives_spanish:
  - no será pesada
  - no te oprimirá
  - no te agobiará
  lexicon: HALOT
  rationale: El verbo כבד expresa ser pesado. «No pesará» conserva la metáfora de peso con buena fluidez en español, y se ajusta al paralelismo con la «mano sobre ti».
translation_notes:
  revision_awareness: La base inglesa pasó por una revisión que cambió «pressure» a «hand» para acercarse más a אַכְפִּי. La redacción española sigue esa revisión y mantiene la imagen de la mano, expresando en la segunda línea el efecto de peso con «no pesará».
  spanish_consistency_notes:
  - Se mantiene «Yahvé» en el proyecto cuando corresponda, pero aquí no aparece el Tetragrámaton.
  - Se evita «Señor» o fórmulas eclesiásticas no presentes en el hebreo.
  - La frase «mi mano sobre ti» conserva la imagen corporal del original y el paralelismo con «no pesará».
  - «Terror» se usa en sentido intensivo, no como miedo subjetivo atenuado.
