translation:
  language: es
  text: con quien mi mano quedará firme[a]; ciertamente[c][b], mi brazo lo fortalecerá.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «con él mi mano estará firme».'
    reason: alternative_reading
  - marker: b
    text: «Brazo» es una imagen poética de fuerza y poder.
