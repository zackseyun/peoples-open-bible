review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien el hebreo en lo principal: habitualidad de יוֹשֶׁבֶת, ubicación bajo la palmera, topónimos, sentido regional de בְּהַר אֶפְרָיִם, y la preservación formal de בְּנֵי יִשְׂרָאֵל como «los hijos de Israel». Sin embargo, omite en notas la alternativa importante ligada a לַמִּשְׁפָּט que el rastro inglés documenta («justicia» / «decisión legal»), y la nota [a] española no corresponde bien al punto léxico preservado en el audit trail.'
  spanish_quality_summary: El español es mayormente claro y digno, pero «subían a ella» suena poco natural en español bíblico moderno; «subían adonde ella estaba» preserva mejor el matiz topográfico sin torpeza. También el punto y coma antes de «y» es innecesario. «Para juicio» es aceptable, aunque conviene respaldarlo con una nota léxica como en inglés.
  glossary_alignment: 'Buena alineación con la terminología del proyecto: no hay nombres divinos ni términos doctrinales sensibles fuera de «los hijos de Israel», que se conserva correctamente. La principal falta de alineación es no trasladar la nota léxica inglesa sobre מִשְׁפָּט y, en cambio, introducir una nota [a] sobre «palmera de Débora» que no refleja una alternativa necesaria del audit trail.'
  issues:
  - severity: medium
    issue: La nota [a] sobre «la palmera de Débora» no refleja una alternativa significativa preservada por el audit trail inglés.
    rationale: El inglés no nota aquí una alternativa para «palm of Deborah»; la nota española propuesta añade una explicación secundaria y desplaza una nota más importante sobre «sons of Israel» o «judgment/justice/legal decision».
  - severity: medium
    issue: Falta nota para לַמִּשְׁפָּט.
    rationale: El audit trail inglés conserva explícitamente las alternativas «for justice» / «for a legal decision». En español debe preservarse una nota equivalente, especialmente porque «para juicio» puede sonar algo rígido o ambiguo.
  - severity: low
    issue: «subían a ella» es poco idiomático en español.
    rationale: Aunque literalmente cercano al hebreo, en español suena extraño referirse a una persona con ese complemento de movimiento. «subían adonde ella estaba» mantiene el sentido de עלה אֵלֶיהָ con mejor naturalidad.
  - severity: low
    issue: Puntuación algo forzada con punto y coma antes de «y».
    rationale: La frase fluye mejor con comas simples en español moderno y digno.
