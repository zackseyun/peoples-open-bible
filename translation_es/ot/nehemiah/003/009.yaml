translation:
  language: es
  text: Junto a ellos, Refaías, hijo de Hur, gobernante de la mitad del distrito[a] de Jerusalén, hizo reparaciones[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «provincia»; el término hebreo puede referirse a una subdivisión administrativa, pero «distrito» comunica mejor la idea en español actual.
    reason: lexical_alternative
  - marker: b
    text: O «fortaleció»; el verbo hebreo significa literalmente «hacer fuerte», pero en este capítulo se usa de manera idiomática para el trabajo de reparación del muro.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְעַל־יָדָם
  english_pob_choice: Next to them
  chosen_spanish: Junto a ellos
  alternatives_spanish:
  - Y junto a ellos
  - Al lado de ellos
  lexicon: HALOT
  rationale: El hebreo marca ubicación/posición contigua en la lista de obreros de Nehemías 3. «Junto a ellos» reproduce esa relación de vecindad de forma natural en español y conserva el sentido secuencial del catálogo.
- source_word: הֶחֱזִיק
  english_pob_choice: made repairs
  chosen_spanish: hizo reparaciones
  alternatives_spanish:
  - fortaleció
  - reparó
  lexicon: HALOT
  rationale: Aunque el verbo literalmente puede significar «fortalecer», en Nehemías 3 funciona idiomáticamente para el trabajo de reconstrucción del muro. «Hizo reparaciones» comunica esa función contextual sin borrar el matiz de restauración física.
- source_word: רְפָיָה
  english_pob_choice: Rephaiah
  chosen_spanish: Refaías
  alternatives_spanish:
  - Refaía
  lexicon: transliteración onomástica
  rationale: Se translitera el nombre propio al español con una forma bíblica legible y estable. «Refaías» preserva la identidad del personaje sin convertir el nombre en una paráfrasis.
- source_word: בֶן־חוּר
  english_pob_choice: son of Hur
  chosen_spanish: hijo de Hur
  alternatives_spanish:
  - descendiente de Hur
  lexicon: expresión genealógica
  rationale: La relación patronímica es directa y estándar. «Hijo de Hur» mantiene el vínculo familiar sin introducir una inferencia adicional.
- source_word: שַׂר
  english_pob_choice: ruler
  chosen_spanish: gobernante
  alternatives_spanish:
  - oficial
  - jefe
  - príncipe
  lexicon: HALOT
  rationale: En este contexto administrativo, שַׂר denota una persona con autoridad sobre una jurisdicción. «Gobernante» conserva la fuerza de liderazgo del término y encaja con la designación territorial que sigue.
- source_word: חֲצִי פֶּלֶךְ
  english_pob_choice: half the district
  chosen_spanish: la mitad del distrito
  alternatives_spanish:
  - la mitad de la provincia
  - la mitad de la región
  lexicon: HALOT
  rationale: פֶּלֶךְ aquí alude a una subdivisión administrativa. «Distrito» es más preciso y menos ambiguo que «provincia» en español actual, y «la mitad del distrito» reproduce la estructura del hebreo.
- source_word: יְרוּשָׁלִָם
  english_pob_choice: of Jerusalem
  chosen_spanish: de Jerusalén
  lexicon: topónimo
  rationale: Se mantiene el topónimo tradicional en español con la relación genitiva indicada por el hebreo.
translation_notes:
  revision_awareness: La revisión más reciente no introdujo cambios y el control cruzado informó alta concordancia; por tanto, no hay ajustes pendientes respecto del inglés POB ni de la base hebrea.
  spanish_consistency_notes:
  - Se preserva el valor idiomático de הֶחֱזִיק sin reducirlo a una equivalencia mecánica.
  - La fórmula genealógica y el título administrativo se mantienen separados para reflejar la sintaxis hebrea.
  - «Distrito» se usa de manera consistente para פֶּלֶךְ, con nota alternativa a «provincia» por si se desea una opción más tradicional.
