    rationale: La nota [a] en el texto está anclada a 'He aquí', pero explica 'Leb-kamai'; la nota [b] está anclada a 'Leb-kamai', pero explica la ambigüedad de רוּחַ. Esto incumple el requisito de que cada marcador aparezca en la frase pertinente.
  - severity: low
