translation:
  language: es
  text: 'Y también para el lado norte, en longitud: cortinas de cien codos de largo[b], sus veinte columnas y sus veinte bases de bronce, y los ganchos de las columnas y sus bandas[a] serán de plata.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'filletes'; el término hebreo se refiere a las piezas de unión o de contorno asociadas con las columnas.
    reason: lexical_alternative
  - marker: b
    text: El hebreo dice literalmente 'cien de largo'; 'codos' se suplió a partir de las medidas inmediatas del tabernáculo en este contexto.
    reason: cultural_note
lexical_decisions:
- source_word: וְכֵן
  english_pob_choice: And likewise
  chosen_spanish: Y también
  alternatives_spanish:
  - Y asimismo
  - Y de igual manera
  lexicon: HALOT
  rationale: Expresa la relación de correspondencia con el versículo anterior sin sonar forzado en español. 'También' conserva la idea de adición paralela que el inglés POB resolvió con 'likewise'.
- source_word: לִפְאַת צָפוֹן
  english_pob_choice: for the north side
  chosen_spanish: para el lado norte
  alternatives_spanish:
  - para el lado del norte
  - para el lado septentrional
  lexicon: HALOT
  rationale: פאה es 'lado' o 'extremo'; en español, 'lado norte' comunica con claridad el referente arquitectónico del atrio/tabernáculo sin añadir más interpretación de la necesaria.
- source_word: בָּאֹרֶךְ
  english_pob_choice: in length
  chosen_spanish: en longitud
  alternatives_spanish:
  - a lo largo
  - longitudinalmente
  lexicon: HALOT
  rationale: Mantiene la especificación dimensional de forma directa y formal. 'En longitud' refleja el valor adverbial del hebreo dentro de la descripción técnica.
- source_word: קְלָעִים
  english_pob_choice: hangings
  chosen_spanish: cortinas
  alternatives_spanish:
  - lienzos
  - pendones
  lexicon: HALOT
  rationale: En el contexto del atrio del tabernáculo, el término designa las telas colgantes del recinto. 'Cortinas' es la forma más natural y comprensible en español, aunque 'hangings' en inglés es más literal al elemento funcional.
- source_word: מֵאָה אֹרֶךְ
  english_pob_choice: a hundred cubits long
  chosen_spanish: de cien codos de largo[b]
  alternatives_spanish:
  - de cien codos en longitud
  - cien codos de largo
  lexicon: HALOT
  rationale: El hebreo es elíptico; el contexto de medidas del tabernáculo exige suplir 'codos' para la claridad. Se conserva la nota textual/cultural porque el POB inglés también la documenta.
- source_word: וְעַמֻּדָיו עֶשְׂרִים
  english_pob_choice: its twenty pillars
  chosen_spanish: sus veinte columnas
  alternatives_spanish:
  - sus veinte pilares
  - y sus veinte columnas
  lexicon: HALOT
  rationale: עמוד es literalmente 'columna' o 'pilar'. Elegí 'columnas' porque suena natural en español contemporáneo y conserva la función estructural del objeto; 'pilares' queda como alternativa válida.
- source_word: וְאַדְנֵיהֶם עֶשְׂרִים נְחֹשֶׁת
  english_pob_choice: their twenty bronze bases
  chosen_spanish: sus veinte bases de bronce
  alternatives_spanish:
  - sus veinte zócalos de bronce
  - sus veinte basas de bronce
  lexicon: HALOT
  rationale: אדן en el mobiliario del tabernáculo es la pieza de apoyo de la columna. 'Bases' comunica bien la función sin tecnicismo excesivo; 'de bronce' traduce נחשת de modo consistente con el contexto.
- source_word: וָוֵי הָעַמֻּדִים
  english_pob_choice: the hooks of the pillars
  chosen_spanish: los ganchos de las columnas
  alternatives_spanish:
  - los ganchos de los pilares
  - los clavos de las columnas
  lexicon: HALOT
  rationale: וָוִים son 'ganchos'; se mantiene la relación con las columnas/columnas de soporte. Esta elección evita imponer una pieza más específica que el hebreo no exige.
- source_word: וַחֲשֻׁקֵיהֶם
  english_pob_choice: their bands
  chosen_spanish: sus bandas[a]
  alternatives_spanish:
  - sus aros
  - sus abrazaderas
  lexicon: HALOT
  rationale: El término designa elementos que unen o rodean las columnas. 'Bandas' sigue la solución del inglés POB y preserva la amplitud semántica; la nota marca la alternativa léxica tradicional 'fillets' sin usar un término arcaico en el cuerpo del texto.
- source_word: כָּסֶף
  english_pob_choice: silver
  chosen_spanish: plata
  alternatives_spanish:
  - de plata
  - plateadas
  lexicon: HALOT
  rationale: Material del objeto; 'plata' es la equivalencia directa y natural en español.
theological_decisions:
- issue: Describir el lado norte del atrio/tabernáculo como una especificación arquitectónica repetida, no como una metáfora
  english_pob_reading: And likewise for the north side in length...
  chosen_spanish_reading: Y también para el lado norte, en longitud...
  alternative_spanish_readings:
  - Y asimismo para el lado norte...
  - Y de igual manera para el lado norte...
  rationale: El hebreo enumera medidas y materiales; no hay indicio de sentido figurado. La traducción conserva el carácter técnico y repetitivo del texto sin intensificar ni espiritualizar el pasaje.
  doctrine_reference: Éxodo 27:9-19; descripción del atrio del tabernáculo
- issue: Conservar la fuerza material de נְחֹשֶׁת como bronce, no como un término genérico
  english_pob_reading: bronze bases
  chosen_spanish_reading: bases de bronce
  alternative_spanish_readings:
  - bases de cobre
  - bases metálicas
  rationale: En la tradición de traducción bíblica, este contexto de utensilios del tabernáculo se entiende mejor con 'bronce'. Se mantiene la sustancia concreta del objeto y el tono reverente del inventario.
  doctrine_reference: Éxodo 25–27; vocabulario cultual del tabernáculo
translation_notes:
  revision_awareness: 'El inglés POB revisó la cláusula para eliminar ''with'' antes de ''its twenty pillars'', reflejando mejor la construcción hebrea sin verbo. La propuesta española sigue esa misma línea con una enumeración directa: ''sus veinte columnas y sus veinte bases de bronce''. También conserva la nota de medida implícita para ''cien codos'', tal como el audit trail inglés lo documenta.'
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' como norma general del proyecto, pero este versículo no contiene el nombre divino.
  - Se usa 'bronce' de forma consistente con el contexto del tabernáculo.
  - Se preserva la opción funcional 'cortinas' para קְלָעִים, más natural en español que un calco rígido.
  - No se introduce terminología litúrgica adicional; el versículo permanece como inventario arquitectónico.
