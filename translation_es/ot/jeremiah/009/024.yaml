translation:
  language: es
  text: Mira, vienen días —declara Yahvé— cuando castigaré a todos los circuncidados solo en la carne[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «a todos los circuncidados con incircuncisión», preservando de manera más formal la paradoja del hebreo.'
    reason: alternative_reading
lexical_decisions:
- source_word: הִנֵּה
  english_pob_choice: Look
  chosen_spanish: Mira
  alternatives_spanish:
  - Mira bien
  - Observa
  - He aquí
  lexicon: HALOT
  rationale: La partícula introduce una proclamación enfática. «Mira» conserva la fuerza deíctica en español moderno sin sonar arcaico como «He aquí».
- source_word: יָמִים בָּאִים
  english_pob_choice: days are coming
  chosen_spanish: vienen días
  alternatives_spanish:
  - los días vienen
  - se acercan días
  lexicon: HALOT
  rationale: La fórmula profética anuncia una acción futura inminente. «Vienen días» es natural en español y mantiene el paralelo verbal del hebreo.
- source_word: נְאֻם יְהוָה
  english_pob_choice: declares Yahweh
  chosen_spanish: declara Yahvé
  alternatives_spanish:
  - dice Yahvé
  - oráculo de Yahvé
  lexicon: HALOT
  rationale: Se conserva el registro solemne de la fórmula profética y el nombre divino Yahvé, conforme a la guía del proyecto.
- source_word: וּפָקַדְתִּי
  english_pob_choice: I will punish
  chosen_spanish: castigaré
  alternatives_spanish:
  - visitaré con juicio
  - tomaré cuenta de
  - castigaré judicialmente
  lexicon: HALOT
  rationale: En contexto judicial, פקד expresa visita punitiva. «Castigaré» comunica esa fuerza con claridad en español sin perder el matiz de juicio.
- source_word: עַל כָּל
  english_pob_choice: all who are
  chosen_spanish: a todos los
  alternatives_spanish:
  - contra todos los
  - sobre todos los
  lexicon: HALOT
  rationale: La construcción introduce al grupo objeto del castigo. «A todos los» es una solución natural en español para este marco acusativo.
- source_word: מוּל
  english_pob_choice: circumcised
  chosen_spanish: circuncidados
  alternatives_spanish:
  - circuncisos
  - los circuncidados
  lexicon: HALOT
  rationale: El participio funciona sustantivamente; «circuncidados» preserva la referencia física directa y el tono bíblico sin necesidad de explicitar más de lo que el hebreo dice.
- source_word: בְּעָרְלָה
  english_pob_choice: only in the flesh
  chosen_spanish: solo en la carne
  alternatives_spanish:
  - en la incircuncisión
  - en el prepucio
  - solo en el prepucio
  lexicon: HALOT
  rationale: 'La expresión hebrea es paradójica: físicamente circuncidados pero aún caracterizados por la carne no removida. «Solo en la carne» conserva la tensión y evita cerrar prematuramente el sentido con una paráfrasis interpretativa.'
theological_decisions:
- issue: Cómo rendir el sintagma paradójico מוּל בְּעָרְלָה sin resolverlo excesivamente
  english_pob_reading: all who are circumcised only in the flesh
  chosen_spanish_reading: a todos los circuncidados solo en la carne
  alternative_spanish_readings:
  - a todos los circuncidados y no circuncidados
  - a todos los circuncidados, pero aún incircuncisos
  - a todos los circuncidados solo en el prepucio
  rationale: 'Se preserva la tensión del hebreo: el juicio recae sobre quienes tienen la señal externa, pero carecen de la realidad que esa señal presupone. «Solo en la carne» mantiene el contraste sin introducir una interpretación más amplia que el texto inmediato no explicita.'
  doctrine_reference: Mantener la tensión lexicográfica y teológica del original; primacía del hebreo sobre la tradición interpretativa.
translation_notes:
  revision_awareness: La versión inglesa pasó de una formulación más literal y paradójica a «all who are circumcised only in the flesh» para sonar más natural y captar mejor el idiomа. La propuesta española sigue esa revisión y mantiene la ambigüedad controlada del original, sin traducirla como una explicación doctrinal completa.
  spanish_consistency_notes:
  - Se mantiene Yahvé para יְהוָה, conforme al estándar del proyecto.
  - Se conserva «carne» para בְּעָרְלָה por su valor de contraste físico y covenantal, sin sustituirlo por una explicación extensa.
  - «Circuncidados» se usa como sustantivo, en paralelo con el participio hebreo.
  - La puntuación con raya reproduce el tono oracular solemne del original y ayuda a separar la fórmula introductoria del anuncio judicial.
