review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien el sentido básico del arameo: Dios cambia los tiempos y las estaciones/ocasiones, quita y pone reyes, y da sabiduría y conocimiento. También conserva correctamente la afirmación fuerte de la soberanía divina sobre los gobernantes. Sin embargo, en español bíblico general «quita reyes y pone reyes» suena algo coloquial e impreciso para acciones regias; «depone reyes y establece reyes» o similar comunica mejor el valor de מְהַעְדֵּה / מְהָקֵים sin perder la fuerza directa. Además, la nota b está bien anclada, pero conviene mantenerla aunque el texto principal siga la redacción natural.'
  spanish_quality_summary: El español es claro y legible, pero «las estaciones» puede leerse primariamente como estaciones climáticas; la nota atenúa esa ambigüedad, así que puede mantenerse. El punto principal a mejorar es el registro de «quita» y «pone», que en este contexto suena menos digno y menos preciso que el resto del versículo. «A los que tienen entendimiento» es natural y fiel.
  glossary_alignment: No hay conflictos con la terminología base del proyecto. No aparecen Yahvé, Mesías, esclavo, etc. Las decisiones «sabiduría», «conocimiento» y «entendimiento» preservan bien la distinción léxica documentada. La revisión propuesta solo mejora la precisión y dignidad estilística de los verbos sobre los reyes.
  issues:
  - severity: medium
    issue: «quita reyes y pone reyes» suena demasiado coloquial
    rationale: Aunque es comprensible y bastante literal, en español eclesial y literario el par verbal resulta menos digno y algo impreciso para la acción de remover e instalar gobernantes. «Depone reyes y establece reyes» preserva mejor el sentido político del arameo y el tono del pasaje.
  - severity: low
    issue: «las estaciones» puede sugerir estaciones del año en sentido climático
    rationale: La nota al pie ya documenta correctamente la alternativa «tiempos señalados», por lo que no es un error grave. Se puede mantener si se conserva la nota, pues reproduce la pareja tradicional con «tiempos».
  revised_spanish_text: Él cambia los tiempos y las estaciones[a]; depone reyes y establece reyes; da sabiduría a los sabios y conocimiento a los que tienen entendimiento[b].
  revised_footnotes:
  - marker: a
    text: O «los tiempos señalados» para «las estaciones». La pareja aramea puede designar tanto tiempos en general como sus ocasiones fijadas o apropiadas.
    reason: lexical_alternative
  - marker: b
    text: Literalmente, «a los que conocen entendimiento».
    reason: lexical_alternative
  revision_rationale: 'Se revisa únicamente el par verbal sobre los reyes para elevar la precisión semántica y el registro en español: «depone ... y establece ...» comunica mejor la remoción e instalación de gobernantes que «quita ... y pone ...», sin suavizar la soberanía divina del texto. Se conserva «tiempos y estaciones» con nota, y se mantiene la nota literal final porque documenta una alternativa significativa del original.'
