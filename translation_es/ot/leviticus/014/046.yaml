    issue: La nota al pie está anclada en «cualquiera[a]» pero explica «que esté aislada/confinada/encerrada».
    rationale: El marcador debe aparecer exactamente en el lugar relevante del texto español. Tal como está, la nota parece comentar el sujeto genérico, no el estado de la casa.
  - severity: low
    issue: «Y cualquiera que entre» es menos idiomático que «Y todo el que entre» en registro legal/bíblico.
    rationale: Ambas opciones son fieles, pero «todo el que» fluye mejor en español eclesial neutral y preserva bien la generalidad jurídica del hebreo.
  revised_spanish_text: Y todo el que entre en la casa durante todos los días que esté aislada[a], será inmundo hasta la tarde.
