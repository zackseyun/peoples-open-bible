    issue: La cláusula final «adonde tu rostro está fijado» es poco natural en español.
    rationale: Aunque refleja literalmente la imagen hebrea, en español «rostro está fijado» no expresa con soltura la dirección hacia la que apunta la espada/personificación. «Donde esté dirigido tu rostro» conserva la imagen, la pasiva y el sentido direccional con mejor legibilidad.
  - severity: low
