translation:
  language: es
  text: Jugaba con leoncillos como con un cabrito,[b] y con osos como con terneros de Basán[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Griego: "y con osos como con corderos de ovejas", lo que hace más explícita la segunda comparación que el hebreo "terneros de Basán".'
    reason: alternative_reading
  - marker: b
    text: Basán era conocido por su ganado fuerte y bien alimentado; el hebreo probablemente evoca animales jóvenes domesticados mediante esa imagen regional.
    reason: cultural_note
lexical_decisions:
- source_word: לכפירים / ἐν λέουσιν
  english_pob_choice: with young lions
  chosen_spanish: con leoncillos
  alternatives_spanish:
  - con leones jóvenes
  - entre leoncillos
  lexicon: HALOT; LXX λέων
  rationale: כפירים designa leones jóvenes o leoncillos, no leones en sentido genérico. En español, 'leoncillos' conserva la idea de juventud y mantiene el paralelismo poético con el resto del verso. La preposición 'con' reproduce bien el valor asociativo/comparativo del hebreo y del griego.
- source_word: שחק
  english_pob_choice: played
  chosen_spanish: jugaba
  alternatives_spanish:
  - jugó
  - se divertía
  - retozaba
  lexicon: HALOT
  rationale: El verbo expresa una acción lúdica y sin tono frívolo. 'Jugaba' suena natural en español y conserva la imagen de desenvoltura ante animales peligrosos.
- source_word: כגדי
  english_pob_choice: as with a kid
  chosen_spanish: como con un cabrito
  alternatives_spanish:
  - como con un chivo joven
  - como con un cabrito pequeño
  lexicon: HALOT
  rationale: גדי es un cabrito, un animal joven de cabra. 'Cabrito' es claro y idiomático en español, y mantiene la comparación compacta del original. Se evita 'chivo' por ser menos específico en esta escena comparativa.
- source_word: ולדבים
  english_pob_choice: and with bears
  chosen_spanish: y con osos
  alternatives_spanish:
  - y con osas
  - y entre osos
  lexicon: HALOT
  rationale: דבים son osos; 'con osos' conserva la secuencia paralela y la sencillez del hebreo. El femenino no está exigido por el texto, así que se mantiene el sustantivo genérico.
- source_word: כבני בשן
  english_pob_choice: as with calves of Bashan
  chosen_spanish: como con crías de Basán
  alternatives_spanish:
  - como con terneros de Basán
  - como con los jóvenes de Basán
  - como con corderos de Basán
  lexicon: HALOT; Greek parallel
  rationale: El hebreo dice literalmente 'como los hijos/los jóvenes de Basán', y la revisión inglesa entendió el sentido como 'calves of Bashan'. 'Crías de Basán' preserva la forma hebrea y permite la referencia cultural a Basán como región de ganado robusto; no impone 'terneros' de manera más concreta que el hebreo. Se deja abierta la explicitación griega en nota.
theological_decisions:
- issue: Relación entre la lectura hebrea literal y la clarificación griega en el segundo miembro del verso
  english_pob_reading: Follow the extant Hebrew as primary while consulting the Greek to confirm the overall sense of fearless play with dangerous animals; the Greek makes the second comparison more explicit as lambs of sheep.
  chosen_spanish_reading: Mantener la lectura hebrea en el texto principal y aclarar en nota que el griego explicita la segunda comparación con 'corderos de ovejas'.
  alternative_spanish_readings:
  - 'Adoptar la lectura griega en el texto principal: ''como con corderos de ovejas'''
  - Fusionar ambas en el texto principal de manera expansiva
  rationale: El hebreo es la base principal cuando se conserva; el griego sirve como control y puede explicar el hebreo, pero no debe reemplazarlo sin necesidad. Para no borrar la tensión textual documentada, el texto principal conserva 'crías de Basán' y la nota expone la alternativa griega.
  doctrine_reference: 'PHILOSOPHY.md: translate from Hebrew where it survives; use Greek parallel as actual input'
translation_notes:
  revision_awareness: La versión inglesa revisó 'the young of Bashan' a 'calves of Bashan' por mayor precisión léxica y naturalidad. El español conserva la base hebrea de 'בני בשן' con una formulación igualmente natural y suficientemente abierta ('crías de Basán'), mientras la nota recoge la explicitación griega. No se siguió mecánicamente la primera redacción inglesa, sino la combinación del hebreo y el control griego.
  spanish_consistency_notes:
  - Se usa 'Yahvé' solo cuando el texto lo requiera; aquí no aparece el nombre divino.
  - Se mantiene 'Basán' como topónimo tradicional en español.
  - Se preserva el paralelismo poético con 'con... como con...' sin modernizarlo en exceso.
  - '''Cabrito'' y ''crías'' mantienen el registro bíblico claro y contemporáneo.'
