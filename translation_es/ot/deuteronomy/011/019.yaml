translation:
  language: es
  text: Y las enseñarás a tus hijos[a], hablando de ellas cuando te sientes en tu casa, cuando camines por el camino, cuando te acuestes y cuando te levantes.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O ‘tus hijos’. El hebreo usa un plural masculino que puede funcionar de manera representativa para los hijos en general.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְלִמַּדְתֶּם
  english_pob_choice: You shall teach
  chosen_spanish: las enseñarán
  alternatives_spanish:
  - las enseñarán diligentemente
  - y las enseñarán
  lexicon: HALOT
  rationale: El piel de למד expresa aquí ‘enseñar’; el español natural conserva la acción principal sin añadir intensidad no presente en el verbo. El sujeto plural se entiende por el contexto y el objeto antecedente se retoma con ‘las’ en concordancia con ‘cosas/palabras’ del contexto inmediato.
- source_word: אֹתָם
  english_pob_choice: them
  chosen_spanish: las
  alternatives_spanish:
  - las cosas
  - ellas
  lexicon: HALOT
  rationale: El pronombre masculino plural remite a las palabras/mandamientos del contexto. En español, ‘las’ evita especificar en exceso y mantiene la referencia implícita al contenido enseñado.
- source_word: אֶת־בְּנֵיכֶם
  english_pob_choice: to your children
  chosen_spanish: a sus hijos[a]
  alternatives_spanish:
  - a sus niños
  - a sus descendientes
  - a sus hijos e hijas
  lexicon: HALOT
  rationale: בנים puede funcionar de manera representativa para la descendencia. ‘Hijos’ es la forma más directa y natural en español; el marcador remite a la alternativa lexical de lectura representativa sin cargar el texto principal con una expansión interpretativa.
- source_word: לְדַבֵּר בָּם
  english_pob_choice: speaking of them
  chosen_spanish: hablando de ellas
  alternatives_spanish:
  - hablando de ellos
  - para hablar de ellas
  - hablándolas
  lexicon: HALOT
  rationale: El infinitivo constructo con ל indica la circunstancia o modo acompañante del enseñar. ‘Hablando de ellas’ comunica bien la referencia al contenido enseñado y preserva el vínculo con el objeto pronombre.
- source_word: בְּשִׁבְתְּךָ בְּבֵיתֶךָ
  english_pob_choice: when you sit in your house
  chosen_spanish: cuando te sientes en tu casa
  alternatives_spanish:
  - cuando estés sentado en tu casa
  - al sentarte en tu casa
  - cuando estés en casa
  lexicon: HALOT
  rationale: La construcción temporal con ב e infinitivo se expresa naturalmente con ‘cuando’. ‘Te sientes’ mantiene la acción concreta de sentarse y ‘en tu casa’ reproduce la localización sin perder claridad.
- source_word: וּבְלֶכְתְּךָ בַדֶּרֶךְ
  english_pob_choice: and when you walk on the road
  chosen_spanish: cuando camines por el camino
  alternatives_spanish:
  - y cuando camines por el camino
  - cuando vayas por el camino
  - cuando viajes por el camino
  lexicon: HALOT
  rationale: הלך es ‘caminar/ir’; ‘por el camino’ refleja בַדֶּרֶךְ con una expresión española idiomática y reverente. ‘Camines’ mantiene el paralelismo temporal con los demás miembros.
- source_word: וּבְשָׁכְבְּךָ
  english_pob_choice: and when you lie down
  chosen_spanish: cuando te acuestes
  alternatives_spanish:
  - y cuando te acuestes
  - cuando te eches
  - cuando te recuestes
  lexicon: HALOT
  rationale: Aunque שכב puede ser literalmente ‘acostarse/recostarse’, en español ‘te acuestes’ expresa de forma clara la acción habitual de ir a dormir y evita una calca poco natural.
- source_word: וּבְקוּמֶךָ
  english_pob_choice: and when you rise up
  chosen_spanish: y cuando te levantes
  alternatives_spanish:
  - cuando te levantes
  - y cuando despiertes
  - y cuando te pongas de pie
  lexicon: HALOT
  rationale: קום aquí alude a levantarse del descanso. ‘Te levantes’ conserva el paralelismo con ‘te acuestes’ y es la opción más natural y comprensible en español.
theological_decisions:
- issue: Valor representativo de בנים / género gramatical en la instrucción del pacto
  english_pob_reading: your children
  chosen_spanish_reading: sus hijos[a]
  alternative_spanish_readings:
  - sus hijos e hijas
  - sus descendientes
  - sus niños
  rationale: El texto hebreo usa un plural masculino que puede incluir representativamente a la descendencia completa. Mantener ‘hijos’ respeta la forma del texto y evita introducir una expansión explícita que no está en el hebreo; la nota conserva la tensión semántica para el lector español.
  doctrine_reference: DOCTRINE.md §Translation philosophy, point 4
translation_notes:
  revision_awareness: 'El pasaje coincide de forma alta con la revisión inglesa: no hay cambios sustantivos de contenido. La decisión principal en español fue conservar el paralelismo temporal del hebreo con verbos naturales (‘te sientes’, ‘camines’, ‘te acuestes’, ‘te levantes’) y tratar בְּנֵיכֶם como plural representativo con una nota breve.'
  spanish_consistency_notes:
  - Se mantiene ‘Yahvé’ solo cuando aparezca el nombre divino; aquí no hay ocurrencia.
  - Se usa ‘hijos’ en el texto principal por fidelidad al plural masculino representativo del hebreo, con nota para la posible lectura inclusiva.
  - Se evita ‘por el camino’ como calco rígido de ‘by the road’; ‘por el camino’ es idiomático en español y conserva el sentido.
  - ‘Hablando de ellas’ sigue la referencia a los mandamientos/palabras del contexto sin especificarla de más.
