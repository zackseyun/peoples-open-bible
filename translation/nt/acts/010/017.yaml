id: ACT.10.17
reference: Acts 10:17
source:
  edition: SBLGNT
  text: Ὡς δὲ ἐν ἑαυτῷ διηπόρει ὁ Πέτρος τί ἂν εἴη τὸ ὅραμα ὃ εἶδεν, ⸀ἰδοὺ οἱ ἄνδρες οἱ ἀπεσταλμένοι ⸀ὑπὸ τοῦ Κορνηλίου διερωτήσαντες τὴν οἰκίαν ⸀τοῦ Σίμωνος ἐπέστησαν ἐπὶ τὸν πυλῶνα,
translation:
  text: Now while Peter was inwardly perplexed as to what the vision that he had seen might mean[a], behold, the men who had been sent by Cornelius, having asked directions to Simon’s house[b], stood at the gate.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'what the vision he had seen might be.' The Greek can be rendered more literally this way, but here it likely refers to the vision’s meaning or significance.
    reason: lexical_alternative
  - marker: b
    text: Or, 'at the gateway.' The Greek term can refer to the gate or entrance area of a house.
    reason: lexical_alternative
lexical_decisions:
- source_word: Ὡς δὲ
  chosen: Now while
  alternatives:
  - As
  - And while
  - While
  lexicon: BDAG
  rationale: Introduces the temporal setting with mild narrative progression. 'Now while' captures both the connective δέ and the temporal force of ὡς in smooth English.
- source_word: ἐν ἑαυτῷ
  chosen: inwardly
  alternatives:
  - within himself
  - to himself
  lexicon: BDAG
  rationale: Idiomatic expression indicating internal reflection. 'Inwardly' is concise modern English and preserves the sense that Peter's puzzlement was internal.
- source_word: διηπόρει
  chosen: was ... perplexed
  alternatives:
  - was greatly puzzled
  - was at a loss
  - was wondering
  lexicon: BDAG
  rationale: The imperfect denotes ongoing perplexity rather than a momentary thought. 'Perplexed' preserves the stronger sense of uncertainty better than the weaker 'wondering'.
- source_word: τί ἂν εἴη
  chosen: what ... might mean
  alternatives:
  - what ... might be
  - what ... could be
  lexicon: BDAG
  rationale: Although literally 'what it might be,' in context Peter is trying to understand the significance of the vision. 'Might mean' communicates the intended sense in natural English without undue paraphrase.
- source_word: τὸ ὅραμα ὃ εἶδεν
  chosen: the vision he had seen
  alternatives:
  - the vision that he saw
  lexicon: BDAG
  rationale: Standard English relative-clause rendering. Past perfect 'had seen' fits the narrative sequence naturally.
- source_word: ἰδοὺ
  chosen: behold
  alternatives:
  - look
  - suddenly
  lexicon: BDAG
  rationale: Retained as a discourse marker signaling a notable development. 'Behold' preserves the narrative vividness better than omitting it, though it is somewhat elevated.
- source_word: οἱ ἄνδρες
  chosen: the men
  alternatives:
  - the menfolk
  - the persons
  lexicon: BDAG
  rationale: Straightforward rendering of ἄνδρες as adult males in context; gender-accurate and natural.
- source_word: οἱ ἀπεσταλμένοι ὑπὸ τοῦ Κορνηλίου
  chosen: sent by Cornelius
  alternatives:
  - who had been sent by Cornelius
  - commissioned by Cornelius
  lexicon: BDAG
  rationale: The participial phrase identifies the men. 'Sent by Cornelius' is concise and preserves the passive sense without overloading the sentence.
- source_word: διερωτήσαντες
  chosen: having asked for
  alternatives:
  - after inquiring for
  - having made inquiries about
  lexicon: BDAG
  rationale: 'Aorist participle prior to the main verb: they first asked directions, then arrived. ''Having asked for'' is idiomatic and sufficiently precise.'
- source_word: τὴν οἰκίαν τοῦ Σίμωνος
  chosen: Simon’s house
  alternatives:
  - the house of Simon
  - Simon's home
  lexicon: BDAG
  rationale: Possessive English is natural here. 'House' better matches οἰκία in this narrative setting than the more affective 'home'.
- source_word: ἐπέστησαν
  chosen: stood
  alternatives:
  - arrived
  - came up
  - presented themselves
  lexicon: BDAG
  rationale: In context the verb conveys taking one's stand at a location upon arrival. 'Stood' fits the following prepositional phrase and avoids overtranslation.
- source_word: ἐπὶ τὸν πυλῶνα
  chosen: at the gate
  alternatives:
  - at the gateway
  - at the gatepost
  - at the porch entrance
  lexicon: BDAG
  rationale: πυλών refers to a gate or gateway/entrance area. 'At the gate' is the clearest natural rendering in English, though 'gateway' is possible.
