base_translation:
  language: en
  yaml_path: translation/ot/hosea/009/009.yaml
  text: They have deeply corrupted themselves[a], as in the days of Gibeah; he will remember their iniquity[b]; he will punish their sins.
  footnotes:
  - marker: a
    text: Gibeah refers to the notorious outrage at Gibeah in Judges 19–21, invoked here as a comparison for Israel's corruption.
    reason: cross_reference
  - marker: b
    text: Or, more literally, 'They have gone deep; they have corrupted themselves/as in corruption.' The Hebrew is terse and idiomatic.
    reason: lexical_alternative
