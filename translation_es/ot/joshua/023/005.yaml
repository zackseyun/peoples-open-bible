base_translation:
  language: en
  yaml_path: translation/ot/joshua/023/005.yaml
  text: And Yahweh your God[a], he himself will drive them out from before you and dispossess them from before you, and you will take possession of their land[b], just as Yahweh your God spoke to you.
  footnotes:
