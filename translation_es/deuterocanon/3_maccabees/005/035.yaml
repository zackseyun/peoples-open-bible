  source_alignment_summary: 'El borrador conserva en general la estructura del griego: los judíos oyen lo procedente del rey, alaban a Dios y reconocen la ayuda recibida de él. Sin embargo, omite ἐπιφανῆ (''manifiesto'') en el texto principal, aunque sí aparece en las decisiones léxicas. Además, la puntuación y la cadena de títulos divinos pueden expresarse con mayor fidelidad y naturalidad en español.'
  spanish_quality_summary: 'El español es comprensible, pero ''lo que vino del rey'' suena algo físico y menos idiomático que ''lo que vino de parte del rey'' o ''lo que procedía del rey''. También hay una incoherencia importante entre las decisiones léxicas y el texto: el texto principal no incluye ''manifiesto''. ''El Rey de los que gobiernan'' es fiel al participio griego, aunque algo rígido; con la nota al pie funciona aceptablemente.'
  glossary_alignment: 'No hay conflicto con la terminología principal del proyecto: θεός = ''Dios'' y κύριος = ''Señor'' están bien. No aparece Yahvé ni Mesías. La decisión de mantener ''Rey de los que gobiernan'' con nota que preserve ''Rey de reyes'' es defendible y coherente con la auditoría inglesa, aunque la revisión inglesa posterior prefirió la forma idiomática.'
