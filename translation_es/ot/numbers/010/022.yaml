translation:
  language: es
  text: Entonces el estandarte[a] del campamento de los hijos de Efraín partió por sus divisiones[b], y sobre su división estaba Elishama, hijo de Ammihud.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: También puede entenderse como "señal" o "bandera"; aquí se opta por "estandarte" para reflejar mejor el emblema tribal bajo el que marchaba el campamento.
    reason: lexical_alternative
  - marker: b
    text: 'También: "según sus compañías" o "según sus huestes". El hebreo describe una organización ordenada de marcha, con matiz militar.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְנָסַע
  english_pob_choice: Then ... set out
  chosen_spanish: Entonces ... partió
  alternatives_spanish:
  - Entonces ... se puso en marcha
  - Y ... partió
  - Entonces ... salió
  lexicon: WLC / HALOT
  rationale: El waw consecutivo marca secuencia narrativa; en español, "Entonces" expresa bien la continuidad. Para el movimiento de una unidad tribal en marcha, "partió" es natural y fiel al contexto de desplazamiento campamental.
- source_word: דֶּגֶל
  english_pob_choice: banner
  chosen_spanish: estandarte
  alternatives_spanish:
  - bandera
  - señal
  - banner
  lexicon: HALOT
  rationale: El término alude al emblema tribal bajo el cual marchaba el campamento. "Estandarte" conserva la fuerza militar/tribal y evita la ambigüedad de "bandera" en un contexto antiguo.
- source_word: מַחֲנֵה
  english_pob_choice: camp
  chosen_spanish: campamento
  alternatives_spanish:
  - campamento
  - campa
  - campamento de
  lexicon: HALOT
  rationale: En construcción con דֶּגֶל, designa la unidad campamental de Israel. "Campamento" es claro y bíblicamente natural en español.
- source_word: בְנֵי אֶפְרַיִם
  english_pob_choice: the sons of Ephraim
  chosen_spanish: los hijos de Efraín
  alternatives_spanish:
  - los descendientes de Efraín
  - el pueblo de Efraín
  lexicon: HALOT
  rationale: Se mantiene la designación tribal transparente del hebreo. "Hijos de Efraín" corresponde de forma directa al giro מקור sin suavizarlo a una expresión más interpretativa.
- source_word: לְצִבְאֹתָם
  english_pob_choice: by their divisions
  chosen_spanish: por sus divisiones
  alternatives_spanish:
  - según sus compañías
  - por sus escuadrones
  - según sus huestes
  lexicon: HALOT
  rationale: La frase refleja la organización ordenada del campamento en grupos. "Por sus divisiones" conserva la idea de disposición militar/tribal sin forzar "compañías" o "huestes", que en español pueden sonar más interpretativas.
- source_word: וְעַל צְבָאוֹ
  english_pob_choice: and over its division was
  chosen_spanish: y sobre su división estaba
  alternatives_spanish:
  - y sobre su hueste estaba
  - y al frente de su división estaba
  - y sobre ella estaba
  lexicon: HALOT
  rationale: '"Sobre" preserva la relación de autoridad del hebreo עַל. "División" mantiene la correspondencia con צָבָא en este contexto de organización para la marcha, tal como la lectura auditada en inglés.'
- source_word: אֱלִישָׁמָע בֶּן עַמִּיהוּד
  english_pob_choice: Elishama son of Ammihud
  chosen_spanish: Elishama, hijo de Ammihud
  alternatives_spanish:
  - Elishama hijo de Ammihud
  - Elishama, el hijo de Ammihud
  lexicon: Transliteración convencional / fórmula genealógica
  rationale: Los nombres propios se transliteran de forma estándar. Se mantiene la fórmula genealógica "hijo de" como equivalente directo y transparente del hebreo.
translation_notes:
  revision_awareness: 'Concordancia alta con la revisión inglesa más reciente: no se aplicaron cambios de sentido, y se mantiene la estructura narrativa y la organización militar/tribal del texto fuente.'
  spanish_consistency_notes:
  - Se mantiene "hijos de" para el designador tribal, conforme a la transparencia del original.
  - Se usa "estandarte" en lugar de "bandera" por la carga militar/tribal del término hebreo.
  - '"División" traduce consistentemente צָבָא en este pasaje, evitando oscurecer la organización del campamento.'
  - Los nombres propios se conservan en transliteración estándar y no se traducen.
