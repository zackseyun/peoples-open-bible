lexical_decisions:
- source_word: וַיַּ֖עַן
  english_pob_choice: answered
  chosen_spanish: respondió
  alternatives_spanish:
  - contestó
  - respondió
  lexicon: HALOT
  rationale: El hebreo introduce la réplica de Job con el verbo de respuesta en la fórmula narrativa. En español, "respondió" transmite bien ese valor introductorio y suena natural junto con "y dijo".
- source_word: אִיּוֹב
  english_pob_choice: Job
  chosen_spanish: Job
  alternatives_spanish:
  - —
  lexicon: nombre propio
  rationale: Se conserva el nombre propio según la convención habitual en español bíblico.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  - Jehová
  lexicon: HALOT
  rationale: El hebreo usa el Tetragrámaton. Conforme a la terminología española del proyecto, se vierte como "Yahvé" para preservar el nombre divino en lugar de sustituirlo por un título.
- source_word: וַיֹּאמַר
  english_pob_choice: and said
  chosen_spanish: y dijo
  alternatives_spanish:
  - y habló
  - diciendo
  lexicon: HALOT
  rationale: La fórmula narrativa hebrea se conserva con "y dijo", que reproduce de forma fiel y natural la introducción del discurso.
theological_decisions:
- issue: Renderización del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - Jehová
  - el SEÑOR
  rationale: El versículo contiene explícitamente el Tetragrámaton. La pauta española del proyecto pide "Yahvé" como forma principal, manteniendo el nombre del pacto y evitando la sustitución por un título.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
translation_notes:
  revision_awareness: El inglés POB mantiene la nota sobre el nombre divino y no requiere otras variantes textuales; el español sigue esa decisión, ajustándola al término proyectado «Yahvé».
  spanish_consistency_notes:
  - 'Se conserva la estructura narrativa breve del hebreo: verbo de respuesta + nombre propio + nombre divino + verbo de habla.'
  - '"Yahvé" se usa de forma consistente para יְהוָה, en lugar de una sustitución reverencial.'
  - No se añade contenido interpretativo ajeno al verso.
