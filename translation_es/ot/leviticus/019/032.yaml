translation:
  language: es
  text: Te pondrás de pie ante las canas[a], y honrarás el rostro de un anciano[b], y temerás a tu Dios; yo soy Yahvé.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «en presencia de las canas»; el hebreo usa una expresión concreta para la vejez.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «honrarás la presencia de un anciano». El hebreo dice literalmente: «honrarás el rostro de un anciano».'
    reason: lexical_alternative
lexical_decisions:
- source_word: מִפְּנֵי
  english_pob_choice: before
  chosen_spanish: delante de
  alternatives_spanish:
  - en presencia de
  lexicon: HALOT
  rationale: Con תָּקוּם, la expresión idiomática señala levantarse ante alguien en señal de respeto. «Delante de» conserva bien la idea espacial y ceremonial en español natural.
- source_word: שֵׂיבָה
  english_pob_choice: gray hair
  chosen_spanish: las canas
  alternatives_spanish:
  - la vejez
  - el cabello cano
  - las canas de la vejez
  lexicon: HALOT
  rationale: El sustantivo hebreo es concreto y alude literalmente a la canicie, por extensión a la ancianidad. «Las canas» preserva la imagen física sin abstraerla demasiado.
- source_word: תָּקוּם
  english_pob_choice: you shall rise
  chosen_spanish: te levantarás
  alternatives_spanish:
  - te pondrás de pie
  - te alzarás
  lexicon: HALOT
  rationale: En español, «levantarse» expresa de manera natural el acto de ponerse de pie como señal de honra. Mantiene el valor imperativo/obligatorio del hebreo.
- source_word: וְהָדַרְתָּ
  english_pob_choice: and you shall honor
  chosen_spanish: y honrarás
  alternatives_spanish:
  - y mostrarás honor a
  - y rendirás honor a
  lexicon: HALOT
  rationale: El verbo implica dar honra o deferencia. «Honrarás» conserva bien el mandato ético sin introducir una carga cultual excesiva.
- source_word: פְּנֵי זָקֵן
  english_pob_choice: the face of an old man
  chosen_spanish: el rostro de un anciano
  alternatives_spanish:
  - la presencia de un anciano
  - el rostro de un hombre viejo
  - la presencia de un viejo
  lexicon: HALOT
  rationale: El hebreo dice literalmente «el rostro de un viejo/anciano». «Rostro» mantiene el hebraísmo de פָּנִים; «anciano» suena más natural en español que «viejo» y conserva el referente masculino singular del texto.
- source_word: וְיָרֵאתָ
  english_pob_choice: and you shall fear
  chosen_spanish: y temerás
  alternatives_spanish:
  - y reverenciarás
  - y respetarás
  lexicon: HALOT
  rationale: En el código de santidad, ירא conserva el peso de temor reverente ante Dios. «Temerás» mantiene esa tensión teológica mejor que una atenuación a «respetarás».
- source_word: מֵאֱלֹהֶיךָ
  english_pob_choice: your God
  chosen_spanish: a tu Dios
  alternatives_spanish:
  - ante tu Dios
  - de tu Dios
  lexicon: HALOT
  rationale: La relación posesiva de segunda persona singular se conserva de forma directa en español con «tu Dios». El complemento con «a» funciona naturalmente con «temer».
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  lexicon: Proyecto POB terminología estándar
  rationale: El Tetragrámaton se rinde según la convención del proyecto como «Yahvé» en el texto principal, manteniendo el nombre divino personal y no sustituyéndolo por un título.
theological_decisions:
- issue: Forma masculina de זָקֵן
  english_pob_reading: old man
  chosen_spanish_reading: anciano
  alternative_spanish_readings:
  - persona mayor
  - anciana
  - elder
  rationale: El hebreo está en masculino singular. Se conserva esa marca en el texto principal, sin neutralizarla, aunque el mandato funciona de manera representativa en su alcance ético.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4
- issue: Temor de Dios en el código de santidad
  english_pob_reading: fear your God
  chosen_spanish_reading: temerás a tu Dios
  alternative_spanish_readings:
  - reverenciarás a tu Dios
  - respetarás a tu Dios
  rationale: «Temerás» preserva la fuerza reverente y la seriedad pactal del mandato, en lugar de suavizarlo a un mero respeto social.
  doctrine_reference: DOCTRINE.md §Translation philosophy 3
- issue: Renderización del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - Jehová
  rationale: Se sigue la convención del POB en español para el nombre propio divino, manteniendo la transparencia frente al texto hebreo y evitando la sustitución por un título.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
translation_notes:
  revision_awareness: Revisado contra el último pase disponible; no se documentan cambios sustanciales posteriores, y la formulación española mantiene la equivalencia óptima con el hebreo y el audit trail en inglés.
  spanish_consistency_notes:
  - Se conserva «Yahvé» como forma estándar del nombre divino en español POB.
  - 'Se mantiene el paralelismo de los tres mandatos con verbos en futuro exhortativo: «te levantarás / honrarás / temerás».'
  - Se evita sustituir «rostro» por una paráfrasis que borre el hebraísmo de פָּנִים.
  - Se preserva la imagen concreta de «las canas» frente a una abstracción como «la vejez».
