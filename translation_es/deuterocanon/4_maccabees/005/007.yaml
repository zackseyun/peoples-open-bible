translation:
  language: es
  text: ¿Por qué, pues, aborreces[a] comer la carne de este animal, aunque la naturaleza la ha hecho[b] excelente en grado sumo?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Aborreces» conserva el sentido fuerte de βδελύττεις; también podría traducirse «detestas» o «te repugna».
    reason: lexical_alternative
  - marker: b
    text: 'El griego κεχαρισμένης permite un matiz de favor o concesión: «la ha hecho», «la ha dotado graciosamente» o «la ha favorecido».'
    reason: lexical_alternative
lexical_decisions:
- source_word: διὰ τί γὰρ
  english_pob_choice: For why
  chosen_spanish: ¿Por qué, pues,
  alternatives_spanish:
  - ¿Por qué, entonces,
  - ¿Por qué razón, pues,
  lexicon: LSJ
  rationale: Se conserva el valor explicativo y argumentativo de γάρ con «pues», mientras la pregunta directa mantiene el tono retórico del griego.
- source_word: τῆς φύσεως
  english_pob_choice: nature
  chosen_spanish: la naturaleza
  alternatives_spanish:
  - el orden natural
  - la constitución natural
  lexicon: LSJ
  rationale: «Naturaleza» expresa con claridad el genitivo que enmarca la cualidad innata o dada por naturaleza sin añadir una paráfrasis innecesaria.
- source_word: κεχαρισμένης
  english_pob_choice: has graciously made
  chosen_spanish: lo ha hecho[b]
  alternatives_spanish:
  - lo ha dotado graciosamente
  - lo ha favorecido
  - lo ha concedido
  lexicon: LSJ
  rationale: El participio perfecto de χαρίζομαι puede sugerir una concesión o favor recibido. En español, «lo ha hecho» comunica el estado resultante de manera natural; la nota preserva la posibilidad de un matiz más literal de concesión/favor.
- source_word: καλλίστην
  english_pob_choice: most excellent
  chosen_spanish: sumamente excelente
  alternatives_spanish:
  - la mejor
  - la más bella
  - la más excelente
  lexicon: LSJ
  rationale: Se mantiene el tono elevado del superlativo sin reducirlo a un adjetivo débil. «Sumamente excelente» refleja la fuerza encomiástica del término en contexto de alimento.
- source_word: τὴν τοῦδε τοῦ ζῴου σαρκοφαγίαν
  english_pob_choice: the eating of the flesh of this animal
  chosen_spanish: el comer de la carne de este animal
  alternatives_spanish:
  - la carne-comida de este animal
  - el consumo de la carne de este animal
  lexicon: LSJ
  rationale: «Sarcofagia» es literalmente «comer carne», y el español más idiomático es «el comer de la carne»; se conserva el sentido concreto de alimentación carnal sin calcar una forma extraña.
- source_word: βδελύττεις
  english_pob_choice: loathe
  chosen_spanish: aborreces
  alternatives_spanish:
  - detestas
  - aborreces profundamente
  - te repugna
  lexicon: LSJ
  rationale: El verbo expresa fuerte aversión; «aborrecer» es vigoroso, claro y adecuado para el reproche retórico del pasaje.
translation_notes:
  revision_awareness: La revisión inglesa pasó de «has made it most excellent» a «has graciously made it most excellent» para reflejar mejor κεχαρισμένης y de «eating the flesh» a «the eating of the flesh» para precisar σαρκοφαγία. El español sigue esa precisión con «el comer de la carne» y conserva un matiz de concesión en la nota sobre «lo ha hecho».
  spanish_consistency_notes:
  - Se usa «naturaleza» para τῆς φύσεως, en línea con el valor general del sustantivo en el contexto.
  - «Carne» se mantiene para σάρξ, sin sustituirla por «alimento» o «carne de res», porque el texto habla de carne en sentido literal.
  - Se evita «Cristo» u otra terminología teológica no presente en el versículo.
  - La puntuación reproduce el movimiento retórico de pregunta + contraste concesivo.
