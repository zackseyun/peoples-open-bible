review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien el sentido general del hebreo y sigue de cerca la auditoría inglesa: el vendedor no recuperará lo vendido aun si las partes siguen vivas; la visión sobre toda la multitud no será revertida; y nadie podrá asegurar su vida en su iniquidad. Sin embargo, hay dos detalles que conviene reparar: el doble uso de «no volverá» en español para la visión suena menos natural que en el primer miembro y deja más opaca la nota sobre revocación; además, la nota d en español dice «no se invertirá», formulación algo extraña para un juicio, mejor «no se revertirá».'
  spanish_quality_summary: El texto es claro, digno y ampliamente legible en español eclesial neutro. «El vendedor», «lo vendido» y «con vida» funcionan bien. La frase final «nadie fortalecerá su vida en su iniquidad» es fiel al esfuerzo del POB por conservar la metáfora, aunque algo dura; se sostiene por la nota explicativa. La mejora principal es hacer más idiomática la segunda ocurrencia de שוב con «no se volverá atrás» y pulir una nota.
  glossary_alignment: 'No hay conflictos con la terminología marco del proyecto. No aparecen Yahvé, Mesías, Espíritu, etc. Las decisiones léxicas principales están alineadas con la auditoría inglesa: הַמּוֹכֵר -> «el vendedor»; אֶל הַמִּמְכָּר -> «a lo vendido»; חָזוֹן -> «la visión»; בַּעֲוֹנוֹ -> «en su iniquidad».'
  issues:
