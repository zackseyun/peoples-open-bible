  text: אֲשֶׁ֨ר חֵ֤לֶב זְבָחֵ֨י/מוֹ֙ יֹאכֵ֔לוּ יִשְׁתּ֖וּ יֵ֣ין נְסִיכָ֑/ם יָק֨וּמוּ֙ וְ/יַעְזְרֻ/כֶ֔ם יְהִ֥י עֲלֵי/כֶ֖ם סִתְרָֽה׃
