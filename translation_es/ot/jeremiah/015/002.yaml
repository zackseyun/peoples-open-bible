base_translation:
  language: en
  yaml_path: translation/ot/jeremiah/015/002.yaml
  text: 'And it shall be[a], when they say to you, ‘Where shall we go?’ then you shall say to them, ‘Thus says Yahweh: Those for death, to death; and those for the sword, to the sword; and those for famine, to famine; and those for captivity[b], to captivity.’'
  footnotes:
  - marker: a
    text: Or, 'Whoever is for death, to death.' The Hebrew is terse and repetitive, preserving the fixed categories of judgment.
    reason: lexical_alternative
  - marker: b
    text: Or, 'captivity' may be rendered 'exile' in context.
    reason: lexical_alternative
