id: 2CO.11.20
reference: '2 Corinthians 11:20'
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: ἀνέχεσθε γὰρ εἴ τις ὑμᾶς καταδουλοῖ, εἴ τις κατεσθίει, εἴ τις λαμβάνει, εἴ τις ἐπαίρεται, εἴ τις ⸂εἰς πρόσωπον ὑμᾶς⸃ δέρει.
base_translation:
  language: en
  yaml_path: translation/nt/2_corinthians/011/020.yaml
  text: For you put up with it if someone enslaves you[a], if someone devours you, if someone takes from you, if someone exalts himself[b], if someone strikes you in the face.
translation:
  language: ko
  text: 여러분은 누가 여러분을 종으로 부리거나, 누가 여러분을 잡아먹거나, 누가 빼앗아 가거나, 누가 우쭐대거나, 누가 여러분의 뺨을 치더라도 참아 줍니다.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: καταδουλοῖ
  english_pob_choice: enslaves
  chosen_korean: 종으로 부리거나
  lexicon: BDAG
  rationale: 강조형 「철저히 종으로 만들다」. 「종으로 부리다」가 한국어에서 자연스럽다.
  alternatives_korean:
  - 노예로 삼거나
- source_word: κατεσθίει
  english_pob_choice: devours
  chosen_korean: 잡아먹거나
  lexicon: BDAG
  rationale: 강조형. 강한 비유적 어조 보존.
  alternatives_korean:
  - 삼키거나
- source_word: ἐπαίρεται
  english_pob_choice: exalts himself
  chosen_korean: 우쭐대거나
  lexicon: BDAG
  rationale: 중간태. 「우쭐대다」가 일상어로 강도를 살린다.
  alternatives_korean:
  - 스스로 높이거나
- source_word: εἰς πρόσωπον ... δέρει
  english_pob_choice: strikes in the face
  chosen_korean: 뺨을 치더라도
  lexicon: BDAG
  rationale: 「얼굴을 향해 친다」. 「뺨을 치다」가 모욕적 폭력의 함의를 살린다.
