translation:
  language: es
  text: Y tomaré al remanente de Judá, que ha vuelto su rostro para entrar en la tierra de Egipto, para habitar allí; y todos serán consumidos en la tierra de Egipto. Caerán a espada y por hambre; desde el más pequeño hasta el más grande, a espada y por hambre morirán; y serán para juramento[a], para horror, para maldición y para afrenta.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: También puede entenderse como «juramento de maldición» o «fórmula de maldición»; אָלָה suele referirse a un juramento que invoca una maldición.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְלָקַחְתִּי
  english_pob_choice: And I will take
  chosen_spanish: Y tomaré
  alternatives_spanish:
  - Y tomaré para mí
  - Y tomaré en mano
  lexicon: HALOT
  rationale: לקח en primera persona expresa acción directa de tomar; en español, «tomar» conserva la forma simple y no introduce una interpretación más fuerte como «apoderarme» o «arrebatar».
- source_word: שְׁאֵרִית יְהוּדָה
  english_pob_choice: the remnant of Judah
  chosen_spanish: al remanente de Judá
  alternatives_spanish:
  - al resto de Judá
  lexicon: HALOT
  rationale: «Remanente» es el equivalente bíblico más preciso para שְׁאֵרִית y mantiene el sentido de lo que queda tras juicio o catástrofe.
- source_word: אֲשֶׁר שָׂמוּ פְנֵיהֶם
  english_pob_choice: who have set their faces
  chosen_spanish: que han puesto sus rostros
  alternatives_spanish:
  - que se han resuelto
  - que han decidido
  lexicon: HALOT
  rationale: La imagen hebrea de «poner el rostro» se conserva porque tiene fuerza idiomática y profética; en español suena comprensible en contexto y evita aplanar la metáfora.
- source_word: לָבוֹא אֶרֶץ מִצְרַיִם
  english_pob_choice: to enter the land of Egypt
  chosen_spanish: para entrar en la tierra de Egipto
  alternatives_spanish:
  - para ir a la tierra de Egipto
  lexicon: HALOT
  rationale: «Entrar en la tierra de Egipto» refleja con claridad el movimiento direccional del hebreo; «tierra» mantiene el registro bíblico sin volverlo arcaizante en exceso.
- source_word: לָגוּר שָׁם
  english_pob_choice: to sojourn there
  chosen_spanish: para habitar allí
  alternatives_spanish:
  - para sojornar allí
  - para residir allí
  lexicon: HALOT
  rationale: Aunque לָגוּר puede implicar residencia de forastero, «sojornar» sería poco natural en español moderno; «habitar allí» comunica la permanencia prevista sin perder dignidad. Se evita «vivir» por ser demasiado plano.
- source_word: וְתַמּוּ כֹל
  english_pob_choice: and they will all be consumed
  chosen_spanish: y todos serán consumidos
  alternatives_spanish:
  - y todos acabarán
  - y todos perecerán
  lexicon: HALOT
  rationale: «Serán consumidos» reproduce bien תם en contexto de juicio y conserva el matiz de consumación/destrucción, alineado con la revisión inglesa más reciente.
- source_word: יִפֹּלוּ
  english_pob_choice: They will fall
  chosen_spanish: Caerán
  alternatives_spanish:
  - Serán derribados
  - Perecerán
  lexicon: HALOT
  rationale: «Caerán» mantiene la imagen concreta del verbo caer en contexto de juicio armado y de hambre, tal como en la traducción inglesa auditada.
- source_word: בַּחֶרֶב בָּרָעָב
  english_pob_choice: by the sword and by famine
  chosen_spanish: a espada y por hambre
  alternatives_spanish:
  - por la espada y por el hambre
  lexicon: HALOT
  rationale: Se conserva la fórmula profética de instrumentos de juicio; «a espada» es natural en español bíblico y «por hambre» refleja la segunda preposición con economía y claridad.
- source_word: מִקָּטֹן וְעַד גָּדוֹל
  english_pob_choice: from the least even to the greatest
  chosen_spanish: desde el más pequeño hasta el más grande
  alternatives_spanish:
  - desde el menor hasta el mayor
  lexicon: HALOT
  rationale: El merismo se expresa de manera transparente y natural en español. «Más pequeño / más grande» evita una posible lectura social demasiado específica sin base suficiente.
- source_word: יָמֻתוּ
  english_pob_choice: they will die
  chosen_spanish: morirán
  alternatives_spanish:
  - van a morir
  - perecerán
  lexicon: HALOT
  rationale: מות se traduce de forma directa con «morirán»; el verbo ordinario preserva el tono sobrio del juicio.
- source_word: לְאָלָה
  english_pob_choice: an oath
  chosen_spanish: para maldición[a]
  alternatives_spanish:
  - para juramento de maldición
  - para juramento
  lexicon: HALOT
  rationale: Áלָה puede denotar juramento imprecatorio o fórmula de maldición. En español, «maldición» comunica mejor el efecto discursivo para el lector, mientras la nota preserva la alternativa lexical de «juramento/fórmula de maldición».
- source_word: לְשַׁמָּה
  english_pob_choice: a horror
  chosen_spanish: para horror
  alternatives_spanish:
  - para desolación
  - para espanto
  lexicon: HALOT
  rationale: «Horror» retiene el carácter de objeto de asombro y espanto que la gente representa en juicio; evita reducirlo solo a un estado geográfico de desolación.
- source_word: לִקְלָלָה
  english_pob_choice: a curse
  chosen_spanish: para maldición
  alternatives_spanish:
  - para maldecimiento
  lexicon: HALOT
  rationale: קללה es la maldición propiamente dicha; se mantiene «maldición» para distinguirla de אָלָה y conservar el paralelismo hebreo.
- source_word: וּלְחֶרְפָּה
  english_pob_choice: and a reproach
  chosen_spanish: y para afrenta
  alternatives_spanish:
  - y para oprobio
  - y para reproche
  lexicon: HALOT
  rationale: חרפה entra bien en español como «afrenta» o «oprobio»; «afrenta» preserva la dimensión pública de vergüenza y deshonra sin sonar excesivamente abstracta.
theological_decisions:
- issue: Conservación de la fuerza del juicio profético
  english_pob_reading: Retained the repeated language of ending, falling, dying, and becoming a byword of judgment in direct terms.
  chosen_spanish_reading: Se conservaron en español las imágenes repetidas de consumación, caída, muerte y vergüenza pública sin suavizarlas.
  alternative_spanish_readings:
  - Se atenuaron con paráfrasis más suaves
  - Se resumió el juicio en una sola fórmula general
  rationale: El hebreo acumula expresiones de juicio; la traducción española mantiene esa repetición para no perder el énfasis retórico ni el peso profético del versículo.
  doctrine_reference: Translation philosophy §1, §5
- issue: Distinción entre אָלָה y קְלָלָה
  english_pob_reading: Rendered them separately as 'an oath' and 'a curse,' with explanatory footnote.
  chosen_spanish_reading: Se distinguieron como «maldición» y «maldición» en el texto, con nota para señalar que אָלָה también puede entenderse como fórmula/juramento de maldición.
  alternative_spanish_readings:
  - Traducir ambas como «maldición»
  - Traducir אָלָה como «juramento» en el texto principal
  rationale: En español, «maldición» comunica mejor el resultado y la función judicial del pasaje, pero se conserva una nota para no borrar la tensión lexical entre אָלָה y קְלָלָה.
  doctrine_reference: Translation philosophy §5
translation_notes:
  revision_awareness: La base inglesa revisada sustituyó «come to an end» por «be consumed» para reflejar más directamente יתמו y mantuvo la secuencia de juicio. La versión española sigue esa revisión con «serán consumidos» y conserva la estructura repetitiva del versículo.
  spanish_consistency_notes:
  - Se mantuvo «Judá» para יְהוּדָה y «Egipto» para מִצְרַיִם, con «tierra» como equivalente estable de אֶרֶץ en este contexto.
  - Se prefirió «espada» y «hambre» para la fórmula de juicio habitual en Jeremías, sin expandirla a interpretaciones como guerra o inanición.
  - Se tradujo «horror»/«afrenta» con términos españoles de vergüenza pública para preservar el eje honor-deshonra del hebreo.
