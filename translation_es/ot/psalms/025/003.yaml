translation:
  language: es
  text: Ciertamente, ninguno[a] de los que te esperan quedará avergonzado; quedarán avergonzados los que traicionan sin causa[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «los que esperan en ti». El verbo hebreo קוה lleva la idea de esperar con expectativa, incluso esperanza.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «los traicioneros en vano» / «los que traicionan por nada». רֵיקָם puede entenderse de más de una manera aquí; este borrador lo toma como «sin causa».'
    reason: lexical_alternative
lexical_decisions:
- source_word: גַּם
  english_pob_choice: Indeed
  chosen_spanish: Ciertamente
  alternatives_spanish:
  - Además
  - Sin duda
  lexicon: HALOT
  rationale: La partícula introduce énfasis afirmativo, no simple adición. «Ciertamente» comunica bien ese valor enfático en español natural y digno.
- source_word: כָּל
  english_pob_choice: none of
  chosen_spanish: ninguno de
  alternatives_spanish:
  - todos los que
  - ninguna persona de los
  lexicon: HALOT
  rationale: En combinación con la negación y el participio, el sentido global es universal negativo. «Ninguno de» preserva ese valor sin perder fluidez en español.
- source_word: קֹוֶיךָ
  english_pob_choice: those who wait for you
  chosen_spanish: los que te esperan
  alternatives_spanish:
  - los que esperan en ti
  - los que ponen su esperanza en ti
  lexicon: HALOT
  rationale: El verbo קוה implica esperar con expectativa. «Te esperan» mantiene la imagen básica de espera y deja oír la esperanza implícita; «esperan en ti» sería una alternativa válida pero más interpretativa.
- source_word: לֹא יֵבֹשׁוּ
  english_pob_choice: will be put to shame
  chosen_spanish: será avergonzado
  alternatives_spanish:
  - no será avergonzado
  - no sufrirá vergüenza
  - no quedará avergonzado
  lexicon: HALOT
  rationale: El hebreo expresa el resultado de quedar en vergüenza o deshonra. En español, la pasiva refleja «será avergonzado» conserva el valor resultativo y el paralelismo con la segunda cola.
- source_word: יֵבֹשׁוּ
  english_pob_choice: will be put to shame
  chosen_spanish: serán avergonzados
  alternatives_spanish:
  - quedarán avergonzados
  - serán puestos en vergüenza
  lexicon: HALOT
  rationale: Se mantiene la misma raíz y el mismo efecto verbal para conservar el contraste poético del versículo.
- source_word: הַבּוֹגְדִים
  english_pob_choice: those who deal treacherously
  chosen_spanish: los que traicionan
  alternatives_spanish:
  - los traicioneros
  - los que obran con traición
  lexicon: HALOT
  rationale: בגד denota actuar con infidelidad o traición. «Los que traicionan» reproduce mejor el valor verbal del participio que un adjetivo estático.
- source_word: רֵיקָם
  english_pob_choice: without cause
  chosen_spanish: sin causa
  alternatives_spanish:
  - en vano
  - por nada
  lexicon: HALOT
  rationale: En este contexto modifica a los traidores y expresa una traición inmotivada o injustificada. «Sin causa» sigue de cerca la decisión auditada en inglés y funciona de manera clara en español.
translation_notes:
  revision_awareness: 'El texto sigue el pasaje con alta concordancia con el audit trail inglés: conserva la partícula enfática inicial, mantiene el paralelismo verbal de בוש y adopta «sin causa» para רֵיקָם, como en la decisión auditada. No se aplicaron revisiones adicionales.'
  spanish_consistency_notes:
  - Se prefirió «Ciertamente» para גַּם por su valor enfático en español.
  - Se mantuvo el paralelismo de «será avergonzado / serán avergonzados» para reflejar la repetición hebrea.
  - «Los que te esperan» preserva la imagen básica de espera sin ocultar la posibilidad de esperanza implícita.
  - «Sin causa» se eligió para רֵיקָם por consistencia con el análisis léxico auditado.
