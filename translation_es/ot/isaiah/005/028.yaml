    rationale: La nota inglesa para דְּרֻכוֹת ofrece «are drawn» como alternativa a «are bent». En español, una alternativa apropiada sería «están tendidos» o «están preparados para disparar», no «están tensas» presentada como si fuera nota de otra frase.
  - severity: low
    issue: «como un torbellino» es aceptable, pero menos cercano que «como la tempestad» al valor de כַּסּוּפָה y al inglés auditado.
    rationale: סוּפָה puede abarcar tempestad, tormenta violenta o torbellino. El inglés principal usa «the whirlwind», con nota de alternativas. En español, «como la tempestad» conserva mejor el artículo y el campo semántico amplio.
