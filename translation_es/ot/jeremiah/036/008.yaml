    issue: «leyendo en el rollo» es poco idiomático en español
    rationale: Aunque el hebreo usa בַסֵּפֶר, en español la acción de leer un texto escrito públicamente se expresa de manera más natural como «leer del rollo». El expediente inglés documenta precisamente esta adaptación idiomática con «from the scroll». Mantener «en» produce rigidez innecesaria.
  revised_spanish_text: Y Baruc hijo de Nerías hizo conforme a todo lo que le había mandado Jeremías el profeta, leyendo del rollo las palabras de Yahvé en la casa de Yahvé.
