translation:
  language: es
  text: Despreciado y rechazado por los hombres[a], hombre de dolores[b] y familiarizado con la enfermedad[c]; y como alguien de quien los hombres esconden el rostro[d], fue despreciado, y no lo estimamos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «abandonado por los hombres». La frase hebrea es difícil; la traducción tradicional enfatiza el repudio social, mientras que «abandonado por los hombres» refleja más directamente la redacción subyacente.
    reason: alternative_reading
  - marker: b
    text: O «varón de dolores».
    reason: lexical_alternative
  - marker: c
    text: O «familiarizado con la aflicción». Más literalmente, «familiarizado con enfermedad» o «con la enfermedad».
    reason: lexical_alternative
  - marker: d
    text: 'El hebreo es elíptico: «como un ocultamiento del rostro respecto de él». La idea es que la gente apartaba el rostro de él.'
    reason: cultural_note
lexical_decisions:
- source_word: נִבְזֶה
  english_pob_choice: despised
  chosen_spanish: despreciado
  alternatives_spanish:
  - menospreciado
  - despectivamente tratado
  lexicon: HALOT
  rationale: El niphal de בזה expresa ser tenido en poco o tratado con desprecio. «Despreciado» conserva bien el valor pasivo/resultativo y suena natural en español bíblico contemporáneo.
- source_word: וַחֲדַל אִישִׁים
  english_pob_choice: rejected by men
  chosen_spanish: rechazado por los hombres
  alternatives_spanish:
  - desechado por los hombres
  - abandonado por los hombres
  - menospreciado por los hombres
  lexicon: HALOT
  rationale: La expresión es difícil. La traducción inglesa optó por «rejected by men» tras una revisión; en español, «rechazado por los hombres» refleja mejor la idea de apartamiento o exclusión social sin forzar una paráfrasis excesiva.
- source_word: אִישׁ מַכְאֹבוֹת
  english_pob_choice: a man of pains
  chosen_spanish: hombre de dolores
  alternatives_spanish:
  - hombre de sufrimientos
  - hombre de penas
  - hombre de dolores y sufrimientos
  lexicon: HALOT
  rationale: Aunque el inglés POB prefirió «pains» por precisión léxica, en español «hombre de dolores» es la forma más estable, clara y fiel al campo semántico de מַכְאֹבֹת, que incluye dolor, aflicción y sufrimiento. Se mantiene la tensión entre dolor físico y aflicción interior.
- source_word: וִידוּעַ חֹלִי
  english_pob_choice: acquainted with sickness
  chosen_spanish: familiarizado con la enfermedad
  alternatives_spanish:
  - acostumbrado a la enfermedad
  - conocedor de la enfermedad
  - acostumbrado al dolor
  lexicon: HALOT
  rationale: El participio pasivo de ידע con חֹלִי indica alguien conocido por o acostumbrado a la enfermedad/aflicción. «Familiarizado con la enfermedad» comunica esa idea en español sin perder el matiz corporal de חֹלִי.
- source_word: וּכְמַסְתֵּר פָּנִים מִמֶּנּוּ
  english_pob_choice: like one from whom people hide their faces
  chosen_spanish: como alguien de quien los hombres esconden el rostro
  alternatives_spanish:
  - como alguien ante quien se oculta el rostro
  - como una ocultación del rostro respecto de él
  - como quien hace que se oculte el rostro
  lexicon: HALOT
  rationale: La construcción es elíptica. En español se conserva el sentido social de rechazo y repulsión con una formulación idiomática. «Los hombres» mantiene el sujeto humano implícito que el hebreo no explicita de manera directa.
- source_word: וְלֹא חֲשַׁבְנֻהוּ
  english_pob_choice: we did not esteem him
  chosen_spanish: no lo estimamos
  alternatives_spanish:
  - no lo consideramos
  - no lo tuvimos en cuenta
  - no lo apreciamos
  lexicon: HALOT
  rationale: חשב en este contexto significa contar, considerar, estimar. «Estimar» preserva el tono evaluativo y confesional de la frase y corresponde bien al inglés POB.
theological_decisions:
- issue: Lectura mesiánica/siervo sufriente
  english_pob_reading: Retain the verse's portrait in its own literary terms without importing explicit christological identifiers into the translation.
  chosen_spanish_reading: Mantener el retrato del siervo sufriente en sus propios términos literarios, sin introducir identificadores cristológicos explícitos en el texto de traducción.
  alternative_spanish_readings:
  - Añadir una glosa cristológica en el cuerpo del versículo
  - Nombrar explícitamente al Mesías en la traducción
  rationale: El hebreo no añade aquí un identificador explícito; la traducción debe conservar esa sobriedad. La lectura cristológica queda disponible canónicamente, pero no debe imponerse como expansión del texto.
  doctrine_reference: Isaías 53; principios de traducción POB
- issue: Términos de sufrimiento corporales y sociales
  english_pob_reading: Use concrete terms ('pains,' 'sickness') rather than more interpretive abstractions.
  chosen_spanish_reading: Usar términos concretos («dolores», «enfermedad») en lugar de abstracciones interpretativas.
  alternative_spanish_readings:
  - «penas» y «tristezas»
  - «sufrimientos» y «aflicción»
  rationale: El hebreo combina dolor, aflicción y enfermedad. «Dolores» y «enfermedad» preservan esa tensión sin reducirla a un mero estado emocional ni a una enfermedad médica estricta.
  doctrine_reference: HALOT; Isaías 53:3
translation_notes:
  revision_awareness: La versión inglesa auditada revisó la primera redacción de «forsaken by men» a «rejected by men» por mayor precisión para חֲדַל אִישִׁים. El español adopta esa revisión y ajusta la formulación para mantener naturalidad y fidelidad al matiz social de rechazo. También conserva la estrategia revisada de términos concretos para dolor/enfermedad y la nota sobre la elipsis de «ocultar el rostro».
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando aparezca el Tetragrámaton; este versículo no lo contiene.
  - «Hombres» traduce אִישִׁים en sentido genérico de la comunidad humana, no varones específicamente.
  - «Dolores» se mantiene por consistencia con el campo semántico de מַכְאֹבֹת en Isaías 53.
  - No se introduce «Cristo» ni «Mesías» en el cuerpo del versículo para no exceder el hebreo.
  - «No lo estimamos» conserva el valor evaluativo de חָשַׁבְנוּהוּ sin añadir juicio moral explícito.
