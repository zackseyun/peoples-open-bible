translation:
  language: es
  text: 'Y ahora[a], oye la palabra de Yahvé: Tú dices: «No profetices contra Israel, y no prediques[b] contra la casa de Isaac».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O también: «Ahora». La abertura hebrea combina conjunción y adverbio temporal.'
    reason: alternative_reading
  - marker: b
    text: 'O también: «no derrames» o «no gotees palabras». El verbo hebreo significa literalmente «gotear» y se usa idiomáticamente para el habla profética.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְעַתָּה
  english_pob_choice: And now
  chosen_spanish: Y ahora
  alternatives_spanish:
  - Ahora
  - Y bien, ahora
  lexicon: HALOT
  rationale: Mantiene la transición inmediata del hebreo con la conjunción inicial y el adverbio temporal, en un español natural y sobrio.
- source_word: שְׁמַע
  english_pob_choice: hear
  chosen_spanish: oye
  alternatives_spanish:
  - oye ahora
  - escucha
  lexicon: HALOT
  rationale: El imperativo singular requiere una forma directa. «Oye» conserva la fuerza del mandato profético; «escucha» sería posible, pero menos incisivo aquí.
- source_word: דְּבַר יְהוָה
  english_pob_choice: the word of Yahweh
  chosen_spanish: la palabra de Yahvé
  alternatives_spanish:
  - el mensaje de Yahvé
  - la palabra del SEÑOR
  lexicon: HALOT
  rationale: «Palabra» preserva el peso revelatorio y profético del sustantivo דָּבָר. Se usa «Yahvé» según el criterio del proyecto para el nombre divino.
- source_word: אַתָּה אֹמֵר
  english_pob_choice: You say
  chosen_spanish: Tú dices
  alternatives_spanish:
  - dices
  - tú estás diciendo
  lexicon: HALOT
  rationale: La forma simple y directa refleja la cita de la orden de Amazías sin añadir matiz aspectual innecesario.
- source_word: לֹא תִנָּבֵא עַל יִשְׂרָאֵל
  english_pob_choice: Do not prophesy against Israel
  chosen_spanish: No profetices contra Israel
  alternatives_spanish:
  - No profetices a Israel
  - No anuncies contra Israel
  lexicon: HALOT
  rationale: «Profetices» conserva el verbo profético básico. «Contra» reproduce la fuerza adversativa de עַל en este contexto hostil.
- source_word: וְלֹא תַטִּיף
  english_pob_choice: and do not preach
  chosen_spanish: y no profetices[b]
  alternatives_spanish:
  - y no hables
  - y no derrames palabras
  lexicon: HALOT
  rationale: El hebreo usa un verbo idiomático para el discurso profético, literalmente relacionado con «gotear/derramar». En español, «profetices» comunica mejor la función en este paralelo, sin perder la referencia a una declaración pública y profética.
- source_word: עַל בֵּית יִשְׂחָק
  english_pob_choice: against the house of Isaac
  chosen_spanish: contra la casa de Isaac
  alternatives_spanish:
  - contra la familia de Isaac
  - acerca de la casa de Isaac
  lexicon: HALOT
  rationale: «Casa de Isaac» conserva la designación poética del reino del norte. «Contra» mantiene la misma carga adversativa del primer miembro.
theological_decisions:
- issue: Nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: Se sigue el criterio del proyecto de traducir el Tetragrámaton como «Yahvé», preservando el nombre pactal de Dios en lugar de ocultarlo tras una sustitución litúrgica.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Valor de עַל en contexto hostil
  english_pob_reading: against Israel / against the house of Isaac
  chosen_spanish_reading: contra Israel / contra la casa de Isaac
  alternative_spanish_readings:
  - acerca de Israel / acerca de la casa de Isaac
  - a Israel / a la casa de Isaac
  rationale: El contexto es una prohibición frente a la denuncia profética; por eso «contra» conserva la fuerza adversativa y evita suavizar la confrontación del pasaje.
  doctrine_reference: 'DOCTRINE.md Translation philosophy: original-language primacy over translation tradition'
- issue: Segundo verbo profético תַטִּיף
  english_pob_reading: and do not preach
  chosen_spanish_reading: y no profetices
  alternative_spanish_readings:
  - y no hables
  - y no pronuncies oráculos
  rationale: En español, repetir «profetices» en paralelo a la primera cláusula es más claro y conserva la naturaleza profética del verbo idiomático hebreo sin forzar un calco de «gotear».
  doctrine_reference: Lexical rationale from HALOT for נטף in prophetic speech
translation_notes:
  revision_awareness: 'La versión española sigue el consenso del audit trail inglés y la revisión más reciente sin cambios: mantiene el tono imperativo, la oposición marcada por עַל y el paralelismo profético entre «profetices» y el segundo verbo de denuncia. Se adapta el segundo miembro para evitar un calco poco natural en español, pero se preserva en nota la alternativa literal del verbo hebreo.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como forma estándar para יְהוָה.
  - Se usa «casa de Isaac» para conservar el eco poético del hebreo.
  - «Contra» se repite en ambos miembros para reflejar la misma oposición del original.
  - Se evita «SEÑOR» para no ocultar el nombre divino según la norma del proyecto.
