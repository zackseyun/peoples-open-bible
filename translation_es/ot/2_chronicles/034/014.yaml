    text: 'Hebreo: «por mano de Moisés», un modismo que significa «por medio de Moisés» o «dado por medio de Moisés».'
    reason: lexical_alternative
  revision_rationale: Se ajusta הַכֶּסֶף a «la plata» para seguir la elección léxica fuente/auditada; se mejora la naturalidad con «había sido traída»; y se elimina la coma antes de «por mano de Moisés» para una sintaxis española más limpia, manteniendo intacta la nota explicativa del modismo.
