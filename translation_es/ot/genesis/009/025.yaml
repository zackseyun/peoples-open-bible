translation:
  language: es
  text: 'Y dijo: «Canaán está maldito[a]; será para sus hermanos un esclavo de esclavos[b]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El texto menciona explícitamente a Canaán, no a Cam.
    reason: alternative_reading
  - marker: b
    text: O «será un esclavo de esclavos»; la expresión hebrea intensifica la idea de servidumbre extrema.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמֶר
  english_pob_choice: And he said
  chosen_spanish: Y dijo
  alternatives_spanish:
  - Entonces dijo
  lexicon: HALOT
  rationale: La forma wayyiqtol introduce discurso directo y avanza la narración. En español, «Y dijo» conserva la secuencia narrativa de manera natural y sobria.
- source_word: אָרוּר
  english_pob_choice: is cursed
  chosen_spanish: está maldito
  alternatives_spanish:
  - es maldito
  - maldito
  lexicon: HALOT
  rationale: El hebreo usa una cláusula nominal/predicativa. «Está maldito» expresa el estado declarado sin añadir matices ajenos y suena natural en español.
- source_word: כְּנָעַן
  english_pob_choice: Canaan
  chosen_spanish: Canaán
  lexicon: HALOT
  rationale: Nombre propio transliterado de forma estándar en español bíblico.
- source_word: עֶבֶד
  english_pob_choice: slave
  chosen_spanish: esclavo
  alternatives_spanish:
  - siervo
  - criado
  lexicon: HALOT
  rationale: En este contexto de maldición y sujeción extrema, el término fuerte «esclavo» comunica mejor el valor léxico de servidumbre forzada que «siervo».
- source_word: עֲבָדִים
  english_pob_choice: of slaves
  chosen_spanish: de esclavos
  alternatives_spanish:
  - de siervos
  lexicon: HALOT
  rationale: La repetición hebrea intensifica la idea de servidumbre extrema. «Esclavo de esclavos» se conserva en español como giro enfático y transparente.
- source_word: יִהְיֶה
  english_pob_choice: he shall be
  chosen_spanish: será
  alternatives_spanish:
  - ha de ser
  lexicon: HALOT
  rationale: El imperfecto aquí expresa resultado futuro dentro del oráculo. «Será» mantiene el valor profético de forma natural.
- source_word: לְאֶחָיו
  english_pob_choice: to his brothers
  chosen_spanish: para sus hermanos
  alternatives_spanish:
  - a sus hermanos
  lexicon: HALOT
  rationale: La preposición hebrea puede indicar relación/dirección en el marco de subordinación. En español, «para sus hermanos» refleja la orientación del estado de servicio y evita una lectura demasiado mecánica de la preposición.
theological_decisions:
- issue: Objeto de la maldición
  english_pob_reading: The text explicitly says Canaan, not Ham.
  chosen_spanish_reading: El texto dice explícitamente Canaán, no Cam.
  alternative_spanish_readings:
  - Interpretar la maldición como dirigida directamente a Cam
  rationale: Se preserva el referente explícito del hebreo sin importar lecturas tradicionales que desplacen el sujeto de la maldición. Es una restricción textual y teológica importante.
  doctrine_reference: Translation philosophy §1, §3
- issue: Intensificación de la servidumbre
  english_pob_reading: Use 'slave' in the main text; the Hebrew expression 'slave of slaves' intensifies extreme servitude.
  chosen_spanish_reading: Usar «esclavo» y conservar la intensificación «esclavo de esclavos».
  alternative_spanish_readings:
  - siervo de siervos
  - el más humilde de los siervos
  rationale: El hebreo subraya una condición de sujeción extrema; «esclavo» mantiene esa fuerza mejor que «siervo». La repetición conserva la intensidad retórica del original.
  doctrine_reference: Translation philosophy §1; Contested terms table on δοῦλος by analogy
translation_notes:
  revision_awareness: 'He tenido en cuenta las revisiones del audit trail: se descartó la paráfrasis interpretativa «el más bajo de los esclavos» por ser demasiado explicativa, y se restableció el valor fuerte de la servidumbre frente a una suavización con «siervo». Por eso la redacción española conserva la intensidad del hebreo con «esclavo de esclavos» y mantiene el referente explícito «Canaán».'
  spanish_consistency_notes:
  - Uso «Yahvé» solo cuando el hebreo presente el nombre divino; aquí no aplica.
  - Mantengo «esclavo» en lugar de «siervo» por coherencia con la fuerza léxica documentada para servidumbre extrema.
  - Conservo un registro bíblico claro y contemporáneo, sin arcaísmos innecesarios.
