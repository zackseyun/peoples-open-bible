    text: La expresión hebrea «en el día en que» es un modismo que significa «cuando» o «al tiempo que».
    reason: lexical_alternative
  - marker: c
    text: El nombre divino hebreo es YHWH; en esta traducción se vierte como «Yahvé».
    reason: alternative_reading
  revision_rationale: Se reemplaza «descendientes» por «generaciones» para reflejar con fidelidad la fórmula תוֹלְדוֹת de Génesis y evitar un español semánticamente impropio. Se reubica la nota sobre YHWH junto a «Yahvé» y se ajusta la nota del modismo temporal para mayor precisión. El resto del versículo puede mantenerse.
