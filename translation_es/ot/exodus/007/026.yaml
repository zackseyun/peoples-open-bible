revisions:
- from: 'Yahvé dijo a Moisés[a]: «Entra ante Faraón y dile: “Así dice Yahvé: Deja ir a mi pueblo, para que me sirvan[b]”».'
  to: 'Yahvé dijo a Moisés: «Ve ante Faraón y dile: “Así dice Yahvé: Deja ir a mi pueblo, para que me sirvan[a]”».'
  rationale: Se elimina una nota espuria sobre «Moisés» y se mejora la naturalidad de «Entra ante Faraón» a «Ve ante Faraón», sin perder el matiz de presentarse ante el rey. Se conserva la fórmula profética, el nombre «Yahvé», «mi pueblo» y la amplitud de «me sirvan» con la nota alternativa documentada.
