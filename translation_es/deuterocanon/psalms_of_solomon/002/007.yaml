revisions:
- from: Él les hizo según sus pecados[a], porque los abandonó en manos de los que prevalecían sobre ellos[b].
  to: Los trató conforme a sus pecados, porque los abandonó en manos de quienes prevalecían sobre ellos[a].
  rationale: Se corrige un calco antinatural en español («les hizo») por una formulación idiomática que conserva el sentido judicial de ἐποίησεν αὐτοῖς. Se mantiene «porque» siguiendo el estado final del audit trail inglés, y se conserva la imaginería «en manos de». La única nota necesaria es la alternativa para κατισχυόντων.
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T23:01:32Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura básica del griego: correspondencia judicial (κατὰ τὰς ἁμαρτίας αὐτῶν), acción divina sobre ellos (ἐποίησεν αὐτοῖς), abandono (ἐγκατέλειπεν), y la imaginería de entrega «en manos de» quienes prevalecen. Sin embargo, «Él les hizo según sus pecados» no es español natural ni comunica con suficiente claridad el sentido idiomático de ἐποίησεν αὐτοῖς, que aquí expresa trato o acción judicial hacia ellos, no simplemente «hacer».'
  spanish_quality_summary: La frase principal necesita reparación por legibilidad y naturalidad. «Él les hizo según sus pecados» suena incompleto y poco idiomático en español. «Los trató conforme a sus pecados» o «Actuó con ellos conforme a sus pecados» comunica mejor el sentido sin perder la fuerza judicial. El resto del versículo es claro y digno; «los abandonó en manos de los que prevalecían sobre ellos» es aceptable, aunque «en manos de quienes prevalecían sobre ellos» fluye mejor.
  glossary_alignment: 'No hay conflictos con la terminología base del proyecto. «Pecados», «abandonó» y «en manos de» están bien alineados. La principal cuestión es estilística-semántica con ἐποίησεν αὐτοῖς: el proyecto pide evitar calcos de madera cuando el español resulta antinatural.'
  issues:
