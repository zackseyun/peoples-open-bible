  to: 'Y Yahvé olió el aroma agradable[a], y Yahvé dijo en su corazón[b]: «No volveré a maldecir la tierra por causa del hombre[c], porque la inclinación del corazón del hombre es mala desde su juventud[d]. Y no volveré a destruir a todo ser viviente, como he hecho».'
  rationale: Se revisa «percibió» a «olió» para conservar el antropomorfismo explícito del hebreo y la decisión teológica auditada por POB. Se cambia «golpear» a «destruir» para reflejar mejor el sentido de juicio devastador sobre toda vida en este contexto. El resto del verso y las notas pueden mantenerse.
