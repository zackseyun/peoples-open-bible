review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien el sentido del hebreo: «Así ejecutaré» transmite adecuadamente וְעָשִׂיתִי en construcción idiomática con שְׁפָטִים; «juicios» preserva el registro profético; «y sabrán» mantiene la fórmula de reconocimiento; y «Yahvé» sigue correctamente la política del proyecto para יְהוָה. La única desviación relevante está en la nota: el texto principal usa «sobre Egipto», pero la nota ofrece «O “sobre”», cuando el verdadero alternante documentado por la evidencia es «en Egipto» como valor más literal de la preposición.'
  spanish_quality_summary: 'El español principal es claro, natural y digno: «Así ejecutaré juicios sobre Egipto, y sabrán que yo soy Yahvé». La sintaxis fluye bien en registro bíblico contemporáneo. No hay problema de legibilidad en el texto principal. Sí conviene corregir la nota para que no repita el mismo término del texto ni induzca confusión sobre la preposición hebrea.'
  glossary_alignment: 'Alineación sólida con la terminología del proyecto: יְהוָה → «Yahvé» en el texto principal; שְׁפָטִים → «juicios»; ידע en la fórmula de Ezequiel → «sabrán». No hay conflicto doctrinal ni terminológico aparte de la glosa errónea en la nota sobre בְּמִצְרַיִם.'
  issues:
  - severity: medium
    issue: La nota al pie para «sobre Egipto» está invertida/incorrecta.
    rationale: El texto principal ya dice «sobre Egipto», pero la nota dice «O “sobre”». Eso no presenta una alternativa real. Según la evidencia, la alternativa literal es «en Egipto», porque el hebreo usa una preposición locativa. La nota debe reflejar eso exactamente.
  revised_spanish_text: Así ejecutaré juicios[a] sobre Egipto, y sabrán que yo soy Yahvé.
  revised_footnotes:
  - marker: a
    text: O «en Egipto». El hebreo usa una preposición locativa; en español, el sentido de juicio punitivo puede expresarse naturalmente como «sobre Egipto».
    reason: alternative_reading
  revision_rationale: Se conserva el texto principal porque es fiel al hebreo y al criterio del proyecto. Solo se corrige la nota al pie para que la alternativa corresponda realmente al valor literal de la preposición hebrea y no repita la lectura ya elegida en el texto.
