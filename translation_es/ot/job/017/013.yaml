translation:
  language: es
  text: Si espero en el Seol[a] como mi casa, en la oscuridad he tendido mi lecho,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «la tumba» o «el reino de los muertos». El hebreo שְׁאוֹל designa el lugar de los muertos y es más amplio que un sitio de sepultura.
    reason: lexical_alternative
lexical_decisions:
- source_word: אִם
  english_pob_choice: If
  chosen_spanish: Si
  alternatives_spanish:
  - Cuando
  - Supongamos que
  lexicon: HALOT
  rationale: El hebreo introduce una cláusula condicional o hipotética; «Si» conserva esa fuerza sin convertirla indebidamente en temporal.
- source_word: אֲקַוֶּה
  english_pob_choice: I hope for
  chosen_spanish: espero
  alternatives_spanish:
  - aguardo
  - espero con anhelo
  lexicon: HALOT
  rationale: קוה en este contexto expresa espera expectante/esperanzada. «Espero» mantiene el matiz de anticipación y es natural en español.
- source_word: שְׁאוֹל
  english_pob_choice: Sheol
  chosen_spanish: el Seol
  alternatives_spanish:
  - la tumba
  - el reino de los muertos
  lexicon: HALOT
  rationale: Se preserva la transliteración para no reducir el concepto hebreo a «tumba» ni resolverlo doctrinalmente; el artículo español facilita la lectura sin borrar el término técnico.
- source_word: בֵּיתִי
  english_pob_choice: as my house
  chosen_spanish: sea mi casa
  alternatives_spanish:
  - sea mi hogar
  - sea mi morada
  lexicon: HALOT
  rationale: 'La relación hebrea entre Seol y «mi casa» se expresa naturalmente en español con un predicado nominal: «sea mi casa». Mantiene la imagen de lugar de residencia.'
- source_word: בַּחֹשֶׁךְ
  english_pob_choice: in the darkness
  chosen_spanish: en la oscuridad
  alternatives_spanish:
  - en tinieblas
  - en lo oscuro
  lexicon: HALOT
  rationale: La preposición con artículo se vierte de manera idiomática como «en la oscuridad», conservando la imagen de la esfera sombría asociada con la muerte.
- source_word: רִפַּדְתִּי
  english_pob_choice: I spread
  chosen_spanish: he tendido
  alternatives_spanish:
  - he preparado
  - he extendido
  lexicon: HALOT
  rationale: El verbo alude a extender o preparar un lecho. «He tendido» comunica bien la acción concreta y funciona con «lecho» en español.
- source_word: יְצוּעָי
  english_pob_choice: my bed
  chosen_spanish: mi lecho
  alternatives_spanish:
  - mi cama
  - mi descanso
  lexicon: HALOT
  rationale: «Lecho» preserva el registro poético y encaja con la imagen funeraria; «cama» suena más doméstico y menos acorde con el contexto.
theological_decisions:
- issue: Cómo traducir שְׁאוֹל sin domesticar el concepto
  english_pob_reading: Sheol
  chosen_spanish_reading: el Seol
  alternative_spanish_readings:
  - la tumba
  - el reino de los muertos
  rationale: Se mantiene el término técnico hebreo porque Job evoca la esfera de los muertos con mayor amplitud que un sepulcro físico. La transliteración conserva la tensión teológica y evita imponer una equivalencia más estrecha de la que el texto requiere.
  doctrine_reference: 'Translation philosophy: primacía de la fuente original y preservación de la tensión semántica; evitar sobre-interpretación doctrinal.'
translation_notes:
  revision_awareness: 'El borrador sigue de cerca el consenso del audit trail en inglés: condicional «If», valor expectante de קוה, transliteración de Sheol y la imagen concreta de tender un lecho en la oscuridad. No se registraron revisiones aplicadas en el pasaje fuente, por lo que la propuesta mantiene la lectura estable del original.'
  spanish_consistency_notes:
  - Se usa «Seol» de forma consistente para שְׁאוֹל, siguiendo la decisión POB de preservar el término técnico.
  - «Lecho» se escogió por registro poético y por coherencia con el contexto funerario.
  - La frase verbal «he tendido» refleja el perfecto hebreo con naturalidad en español sin perder la imagen física de extender un lecho.
