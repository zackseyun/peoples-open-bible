translation:
  language: es
  text: para Bilga[a], Samúa; para Semaías[b], Jehonatán.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: También puede entenderse «de Bilga ... de Semaías». El hebreo permite este matiz más formal en listas genealógicas o representativas.
