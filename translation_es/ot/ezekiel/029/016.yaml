    reason: lexical_alternative
  - marker: c
    text: Aquí se refleja אֲדֹנָי יְהוִה, literalmente «Señor Yahvé».
    reason: alternative_reading
  revision_rationale: Se ajustó el español para evitar redundancia ('ya no será más' > 'ya no será') y un calco poco idiomático ('haga venir a memoria' > 'recuerde'), manteniendo el sentido del hebreo, la crítica a la confianza en Egipto, y la política del proyecto de usar 'Yahvé' para el nombre divino.
