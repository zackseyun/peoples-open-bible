translation:
  language: es
  text: para transferir el reino de la casa de Saúl y para establecer el trono de David sobre Israel y sobre Judá[a], desde Dan hasta Beerseba.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «desde Dan hasta Beerseba», un modismo geográfico que significa toda la tierra, de norte a sur.'
    reason: cultural_note
lexical_decisions:
- source_word: לְהַעֲבִיר
  english_pob_choice: to transfer
  chosen_spanish: transferir
  alternatives_spanish:
  - quitar
  - hacer pasar
  lexicon: HALOT
  rationale: El hifil de עבר expresa hacer pasar algo de una situación o posesión a otra. En este contexto político, «transferir» comunica bien el cambio de soberanía sin añadir paráfrasis innecesaria.
- source_word: הַמַּמְלָכָה
  english_pob_choice: the kingdom
  chosen_spanish: el reino
  alternatives_spanish:
  - la realeza
  - el dominio real
  lexicon: HALOT
  rationale: El sustantivo designa aquí el reino como entidad de gobierno. «Reino» es natural en español y conserva el alcance político de la expresión.
- source_word: מִבֵּית שָׁאוּל
  english_pob_choice: from the house of Saul
  chosen_spanish: de la casa de Saúl
  alternatives_spanish:
  - de la familia de Saúl
  - de la dinastía de Saúl
  lexicon: HALOT
  rationale: «Casa de Saúl» conserva el modismo bíblico para una casa dinástica. «Casa» mantiene mejor la textura del hebreo que una abstracción como «dinastía».
- source_word: וּלְהָקִים
  english_pob_choice: and to establish
  chosen_spanish: y para establecer
  alternatives_spanish:
  - y para levantar
  - y para poner en pie
  lexicon: HALOT
  rationale: En este marco, הקים en hifil tiene valor de establecer o fijar en su lugar. «Establecer» es idiomático y fiel al sentido de instauración real.
- source_word: אֶת כִּסֵּא דָוִד
  english_pob_choice: the throne of David
  chosen_spanish: el trono de David
  alternatives_spanish:
  - el trono davídico
  - el reino de David
  lexicon: HALOT
  rationale: «Trono» conserva la imagen concreta del hebreo y el simbolismo de autoridad real. Se evita abstraerlo a «reino» para no perder el lenguaje imagético del texto.
- source_word: עַל יִשְׂרָאֵל וְעַל יְהוּדָה
  english_pob_choice: over Israel and over Judah
  chosen_spanish: sobre Israel y sobre Judá
  alternatives_spanish:
  - sobre Israel y Judá
  - para Israel y Judá
  lexicon: HALOT
  rationale: Se mantiene el doble עַל con «sobre ... y sobre ...» para reflejar el alcance político de ambos ámbitos, tal como lo hace la POB en inglés.
- source_word: מִדָּן וְעַד בְּאֵר שָׁבַע
  english_pob_choice: from Dan to Beer-sheba
  chosen_spanish: desde Dan hasta Beer-seba
  alternatives_spanish:
  - desde Dan hasta Beerseba
  - desde Dan a Beer-seba
  lexicon: HALOT
  rationale: Se conserva el modismo geográfico de norte a sur con una forma clara y reconocible en español. La transliteración «Beer-seba» mantiene el nombre propio en una forma legible.
theological_decisions:
- issue: Lenguaje dinástico y real sin abstracción excesiva
  english_pob_reading: Retain the concrete dynastic and royal terms rather than abstracting them to 'dynasty' and 'rule.'
  chosen_spanish_reading: Mantener «casa» y «trono» en lugar de convertirlos en «dinastía» o «gobierno»
  alternative_spanish_readings:
  - de la dinastía de Saúl y para establecer el gobierno de David
  - de la familia de Saúl y para instaurar su autoridad
  rationale: El hebreo emplea imágenes políticas concretas. Traducirlas de modo concreto preserva la resonancia bíblica sin introducir una lectura doctrinal adicional; el sentido histórico-político queda claro con «casa» y «trono».
  doctrine_reference: Translation philosophy §§1, 5
translation_notes:
  revision_awareness: La redacción sigue de cerca el texto hebreo y coincide sustancialmente con la lectura auditada en inglés; no se detectaron revisiones pendientes relevantes en el contexto proporcionado.
  spanish_consistency_notes:
  - Se usa «Yahvé» como forma base del proyecto, pero este versículo no contiene el nombre divino.
  - Se mantiene «Saúl», «David», «Israel», «Judá», «Dan» y «Beer-seba» como nombres propios bíblicos con transliteración estándar y legible.
  - Se preserva el paralelismo de «sobre Israel y sobre Judá» para reflejar la estructura del hebreo.
