  yaml_path: translation/nt/acts/002/034.yaml
  text: For David did not ascend into the heavens[a], but he himself says, ‘The Lord said to my Lord, “Sit at my right hand,”’
  footnotes:
  - marker: a
    text: Psalm 110:1. In the Hebrew text, the first 'Lord' represents the divine name YHWH; compare 'The LORD said to my Lord.'
