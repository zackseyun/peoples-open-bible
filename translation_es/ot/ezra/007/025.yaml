translation:
  language: es
  text: Y tú, Esdras, según la sabiduría de tu Dios que está en tu mano[a], nombra magistrados y jueces que juzguen a todo el pueblo que está más allá del Río[b], a todos los que conocen las leyes de tu Dios; y a los que no las conocen, enséñales.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «que posees». El giro arameo puede denotar posesión o autoridad encomendada.'
    reason: lexical_alternative
  - marker: b
    text: «Más allá del Río» es la designación administrativa persa del territorio al oeste del Éufrates.
    reason: cultural_note
lexical_decisions:
- source_word: כְּחָכְמַת אֱלָהָךְ
  english_pob_choice: according to the wisdom of your God
  chosen_spanish: según la sabiduría de tu Dios
  alternatives_spanish:
  - en conformidad con la sabiduría de tu Dios
  - de acuerdo con la sabiduría de tu Dios
  lexicon: HALOT
  rationale: כְּ expresa conformidad o acuerdo. «Según» conserva esa relación formal y suena natural en español, sin perder el vínculo directo con la sabiduría divina como norma de acción.
- source_word: דִּי בִידָךְ
  english_pob_choice: that is in your hand
  chosen_spanish: que está en tu mano
  alternatives_spanish:
  - que posees
  - que tienes
  lexicon: HALOT
  rationale: La imagen de «en tu mano» se mantiene porque es el giro arameo literal y puede indicar posesión o autoridad encomendada. «Está en tu mano» conserva la textura idiomática sin decidir de más.
- source_word: מֶנִּי
  english_pob_choice: appoint
  chosen_spanish: nombra
  alternatives_spanish:
  - designa
  - establece
  lexicon: HALOT
  rationale: En contexto administrativo, el verbo pide la designación de funcionarios. «Nombra» es el equivalente español más natural y preciso para la función.
- source_word: שָׁפְטִין וְדַיָּנִין
  english_pob_choice: magistrates and judges
  chosen_spanish: magistrados y jueces
  alternatives_spanish:
  - jueces y funcionarios
  - oficiales judiciales y jueces
  lexicon: HALOT
  rationale: Los dos sustantivos parecen distinguir dos clases de funcionarios judiciales. «Magistrados y jueces» mantiene la distinción y la cadencia administrativa del original.
- source_word: דִּי לֶהֱוֺן דאנין
  english_pob_choice: who may judge
  chosen_spanish: para que juzguen
  alternatives_spanish:
  - que puedan juzgar
  - que juzguen
  lexicon: HALOT
  rationale: El valor funcional/purpose del relativo se expresa bien con «para que». «Juzguen» conserva la acción principal sin volverla demasiado perifrática.
- source_word: לְכָל עַמָּה
  english_pob_choice: all the people
  chosen_spanish: a todo el pueblo
  alternatives_spanish:
  - a toda la gente
  - a todo el pueblo
  lexicon: HALOT
  rationale: El sustantivo colectivo en español puede rendirse de forma natural como «pueblo». Aquí se conserva el alcance colectivo del arameo sin fragmentarlo.
- source_word: דִּי בַּעֲבַר נַהֲרָה
  english_pob_choice: who are beyond the River
  chosen_spanish: que está más allá del Río
  alternatives_spanish:
  - que están al otro lado del Río
  - que están más allá del Río
  lexicon: HALOT
  rationale: «Más allá del Río» mantiene la designación imperial tradicional como título geográfico. Se capitaliza «Río» para reflejar su función de nombre geopolítico en el contexto persa, tal como el POB inglés conserva «Beyond the River».
- source_word: לְכָל יָדְעֵי דָּתֵי אֱלָהָךְ
  english_pob_choice: all who know the laws of your God
  chosen_spanish: a todos los que conocen las leyes de tu Dios
  alternatives_spanish:
  - a todos los que conocen la ley de tu Dios
  - a todos los que conocen los decretos de tu Dios
  lexicon: HALOT
  rationale: דָּתֵי es plural; por eso «leyes» preserva la pluralidad mejor que «ley». «Conocen» refleja el participio plural y mantiene la idea de pertenencia/saber efectivo respecto de la normativa divina.
- source_word: וְדִי לָא יָדַע
  english_pob_choice: and those who do not know them
  chosen_spanish: y a los que no las conocen
  alternatives_spanish:
  - y a los que no saben
  - y a quienes no las conocen
  lexicon: HALOT
  rationale: El objeto implícito son las «leyes» mencionadas antes; en español conviene explicitarlo con «las». «Conocen»/«no las conocen» reproduce el contraste del verbo ידע sin perder naturalidad.
- source_word: תְּהוֹדְעוּן
  english_pob_choice: you shall teach
  chosen_spanish: enséñales
  alternatives_spanish:
  - instrúyelos
  - haz que las conozcan
  lexicon: HALOT
  rationale: El causativo de ידע significa «hacer saber». En el contexto de leyes, «enseñar» expresa bien el sentido de instrucción normativa y preserva el matiz de comunicar conocimiento.
translation_notes:
  revision_awareness: Se integró la evidencia hebreo-aramea del texto base con el audit trail inglés. No fue necesario corregir el pasaje; se mantuvieron las decisiones principales del POB inglés, especialmente la conservación del idiomático «en tu mano», la distinción entre magistrados y jueces, el valor geopolítico de «más allá del Río» y el plural «leyes».
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como término por defecto en el proyecto, pero aquí el versículo usa «tu Dios» y no requiere el nombre divino explícito.
  - Se prefirió «pueblo» para el colectivo עַמָּה en un registro bíblico natural y comprensible.
  - Se conserva la distinción entre «conocen» y «no las conocen» para reflejar el contraste verbal del arameo.
  - La capitalización de «Río» se usa solo en la locución geopolítica fija de este pasaje.
