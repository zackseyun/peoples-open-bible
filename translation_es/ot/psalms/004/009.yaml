  yaml_path: translation/ot/psalms/004/009.yaml
  text: In peace I will both lie down and sleep[a], for you alone, O Yahweh[b], make me dwell in safety.
  footnotes:
  - marker: a
    text: Or 'In peace, together I will lie down and sleep'; the Hebrew adverb can mean 'together' or 'altogether,' but here it is rendered idiomatically as 'both ... and ...' with the two verbs.
