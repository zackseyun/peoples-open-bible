id: 1CO.14.16
reference: 1 Corinthians 14:16
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: ἐπεὶ ἐὰν ⸀εὐλογῇς ⸀πνεύματι, ὁ ἀναπληρῶν τὸν τόπον τοῦ ἰδιώτου πῶς ἐρεῖ τὸ Ἀμήν ἐπὶ τῇ σῇ εὐχαριστίᾳ; ἐπειδὴ τί λέγεις οὐκ οἶδεν·
base_translation:
  language: en
  yaml_path: translation/nt/1_corinthians/014/016.yaml
  text: Otherwise[a], if you bless in the spirit, how will the one filling the place of the uninstructed say the Amen at your thanksgiving[c][b], since he does not know what you are saying?
  footnotes:
  - marker: a
    text: Or 'of the outsider,' 'of the ordinary person,' or 'of the unlearned' for 'the uninstructed' (τοῦ ἰδιώτου).
    reason: lexical_alternative
  - marker: b
    text: Or 'with the spirit' for 'in the spirit'; the Greek does not require a more specific interpretation here.
    reason: alternative_reading
  - marker: c
    text: '''Thanksgiving'' here refers to giving thanks, not necessarily to the later technical term ''Eucharist.'''
    reason: cultural_note
translation:
  language: ko
  text: 그렇지 않으면, 당신이 영으로 축복할 때에, 알지 못하는 사람의 자리를 채운 사람이 어떻게 당신의 감사에 「아멘」 하고 말하겠습니까? 그는 당신이 무엇을 말하는지 모르기 때문입니다.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 헬라어 ἰδιώτης는 「가르침을 받지 않은 사람」 또는 「(공동체의 관행에) 익숙하지 않은 외부인」을 가리킨다.
    reason: lexical_alternative
  - marker: b
    text: 헬라어 εὐχαριστία는 「감사」이며, 후대의 전문 용어인 「성찬(에우카리스티아)」을 가리키는 것이 아니다.
    reason: cultural_note
lexical_decisions:
- source_word: ἰδιώτου
  english_pob_choice: the uninstructed
  chosen_korean: 알지 못하는 사람
  alternatives_korean:
  - 외부인
  - 문외한
  lexicon: BDAG
  rationale: 본 절의 ἰδιώτης는 회중 안에서 「방언의 의미를 모르는 자」를 가리킨다. 「문외한」보다 「알지 못하는 사람」이 본문의 인지적 결여를 더 명확히 드러낸다.
- source_word: εὐχαριστίᾳ
  english_pob_choice: thanksgiving
  chosen_korean: 감사
  alternatives_korean:
  - 감사기도
  lexicon: BDAG
  rationale: 후대의 전문 용어 「성찬」으로 좁히지 않는다.
