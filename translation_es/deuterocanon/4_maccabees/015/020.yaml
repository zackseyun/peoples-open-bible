translation:
  language: es
  text: viendo la carne de sus hijos cortada sobre la carne de sus hijos[a], y manos cercenadas sobre manos, y cabezas cercenadas sobre cabezas[b], y cadáveres cayendo sobre cadáveres, y viendo una fosa común de sus hijos[c],
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: La repetición de «carne ... carne» refleja el griego, que acumula imágenes corporales de forma intensamente retórica; se prefiere conservar esa aspereza en vez de suavizarla.
    reason: cultural_note
  - marker: b
    text: El verbo griego es raro y sumamente gráfico; también puede entenderse de forma más general como «cabezas cortadas» o «mutiladas».
    reason: lexical_alternative
  - marker: c
    text: También puede entenderse como «sepulcro común» o «tumba común»; el griego πολυάνδριον designa un lugar de enterramiento para muchos, no necesariamente una fosa moderna en sentido técnico.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐπὶ σαρξὶν τέκνων
  english_pob_choice: on the flesh of her children
  chosen_spanish: sobre la carne de sus hijos
  alternatives_spanish:
  - sobre los cuerpos de sus hijos
  - sobre la carne de sus hijos
  lexicon: LSJ
  rationale: ἐπί con dativo expresa aquí ubicación/superposición; «sobre» conserva esa relación espacial. σάρξ se entiende de modo literal como carne, no como “naturaleza humana”. τέκνων se vierte como «sus hijos» por el contexto materno del pasaje.
- source_word: σάρκας τέκνων ἀποκεκομμένας
  english_pob_choice: the flesh of her children cut away
  chosen_spanish: la carne de sus hijos cortada
  alternatives_spanish:
  - porciones de la carne de sus hijos cortadas
  - la carne de sus hijos cortada y arrancada
  lexicon: LSJ
  rationale: ἀποκεκομμένας indica algo cortado/separado. Mantengo la repetición de carne/hijos para preservar el efecto retórico áspero del griego.
- source_word: ἐπὶ χερσὶν χεῖρας ἀποτεμνομένας
  english_pob_choice: hands severed upon hands
  chosen_spanish: manos cercenadas sobre manos
  alternatives_spanish:
  - manos cortadas sobre manos
  - brazos, manos cercenadas
  lexicon: LSJ
  rationale: ἀποτεμνομένας significa «cortadas/severadas». «Cercenadas» conserva la violencia y la concisión. Mantengo la repetición de «manos ... manos» como en el griego.
- source_word: ἐπὶ κεφαλαῖς κεφαλὰς ἀποδειροτομουμένας
  english_pob_choice: heads struck off upon heads
  chosen_spanish: cabezas arrancadas sobre cabezas
  alternatives_spanish:
  - cabezas cercenadas sobre cabezas
  - cabezas cortadas sobre cabezas
  lexicon: LSJ
  rationale: El verbo compuesto es raro y violento; el audit trail inglés corrige una lectura errónea anterior y entiende aquí una decapitación/corte en el cuello, no un simple “escalpado”. «Arrancadas» intenta reflejar la brutalidad y la separación violenta sin introducir una explicación ajena al verso.
- source_word: ἐπὶ νεκροῖς νεκροὺς πίπτοντας
  english_pob_choice: corpses falling upon corpses
  chosen_spanish: cadáveres cayendo sobre cadáveres
  alternatives_spanish:
  - muertos cayendo sobre muertos
  - cuerpos muertos cayendo sobre cuerpos muertos
  lexicon: LSJ
  rationale: νεκροῖς/νεκρούς puede sostener «cadáveres» en español para la imagen física. Conservo la repetición para no suavizar la acumulación del texto.
- source_word: πολυάνδριον
  english_pob_choice: a mass grave
  chosen_spanish: una fosa común
  alternatives_spanish:
  - una tumba común
  - una fosa de muchos
  lexicon: LSJ
  rationale: polyándrion designa un sepulcro o lugar de enterramiento para muchos. «Fosa común» es la equivalencia natural en español y coincide con el sentido funerario colectivo del término.
- source_word: ὁρῶσα τῶν τέκνων
  english_pob_choice: seeing ... of her children
  chosen_spanish: viendo ... de sus hijos
  alternatives_spanish:
  - viendo a sus hijos
  - viendo entre sus hijos
  lexicon: LSJ
  rationale: 'El participio ὁρῶσα se conserva con «viendo» para mantener la perspectiva visual de la escena. τῶν τέκνων se integra con el sintagma anterior: «de sus hijos».'
translation_notes:
  revision_awareness: 'El inglés audit trail revisó una lectura anterior de ἀποδειροτομουμένας: ya no se toma como «scalped off» sino como «struck off»/cortadas en el cuello, y también fijó πολυάνδριον como «mass grave». La versión española sigue esa revisión, evitando una imagen de desollamiento y optando por un término funerario colectivo natural en español.'
  spanish_consistency_notes:
  - Se mantiene «carne» para σάρξ y se evita «naturaleza humana» porque el contexto es estrictamente corporal y sangriento.
  - Se usa «hijos» en vez de una perífrasis más explícita para conservar la compresión del griego.
  - Se conserva la repetición sintáctica («sobre ... sobre ...») como rasgo estilístico importante del original.
  - «Cadáveres» se usa por claridad contextual; no pretende borrar la fuerza de νεκροί, que también podría traducirse por «muertos».
