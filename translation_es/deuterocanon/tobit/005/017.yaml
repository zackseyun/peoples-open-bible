base_translation:
  language: en
  yaml_path: translation/deuterocanon/tobit/005/017.yaml
  text: They agreed to this[a]. Then he said to Tobiah, “Get ready for the journey, and may your journey be prosperous.” So his son prepared what was needed for the journey. Then his father said to him, “Go with the man, and may God, who dwells in heaven, make your journey prosper, and may his angel go with you.” So both went out to depart[b], and the boy’s dog went with them.
  footnotes:
  - marker: a
    text: Or, “may your journey prosper.” The Greek expresses a wish for success on the road.
    reason: lexical_alternative
  - marker: b
    text: “Angel” could more generally mean “messenger,” but in Tobit the heavenly sense is most likely.
    reason: alternative_reading
