review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura permisiva y la clasificación repetida del hebreo, pero falla en dos puntos importantes: «Estos de ellos» suena antinatural en español para la partitiva אֵלֶּה מֵהֶם, y «el langosta» tiene género incorrecto. Además, la decisión de transliterar הַסָּלְעָם como «salam» no sigue la preferencia documentada del POB inglés por una traducción tradicional con nota de incertidumbre; en español conviene conservar un equivalente tradicional inteligible con nota.'
  spanish_quality_summary: La redacción es generalmente clara, pero contiene una incorrección gramatical («el langosta») y una apertura poco idiomática («Estos de ellos»). «Ustedes pueden comer» es comprensible, aunque en este contexto legal suena más natural y digno «pueden comer». El resto de la lista es legible y bien ordenado.
  glossary_alignment: No hay conflictos con la terminología teológica global. En lo léxico, «langosta», «grillo» y «saltamontes» se alinean bien. La principal desviación es «salam», que introduce un transliterado no respaldado por la decisión inglesa auditada, la cual prefirió una identificación tradicional provisional con nota de cautela.
  issues:
  - severity: high
    issue: «el langosta» usa artículo masculino con un sustantivo femenino.
    rationale: «Langosta» es femenino en español cuando se refiere al insecto; la forma actual es gramaticalmente incorrecta.
  - severity: medium
    issue: «Estos de ellos» es una reproducción demasiado literal y poco natural de אֵלֶּה מֵהֶם.
    rationale: La partitiva hebrea debe sonar idiomática en español. «De estos pueden comer» o «De entre ellos pueden comer estos» preserva el sentido sin calco torpe.
  - severity: medium
    issue: «salam» no preserva la racionalidad léxica del POB inglés.
    rationale: La auditoría inglesa eligió «bald locust» como traducción principal con nota de incertidumbre, no transliteración. En español, una forma como «la langosta calva» con nota mantiene mejor la misma estrategia de traducción y la inteligibilidad.
  - severity: low
    issue: «ustedes pueden comer» puede simplificarse.
    rationale: El sujeto está implícito en el verbo y la omisión mejora la fluidez y el tono bíblico sin perder claridad.
  revised_spanish_text: 'De estos pueden comer: la langosta según su especie[a], y la langosta calva según su especie, y el grillo según su especie, y el saltamontes según su especie.'
