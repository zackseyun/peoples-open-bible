revisions:
- from: Sus piernas[a] son columnas de mármol, asentadas sobre bases de oro fino. Su apariencia es como el Líbano[b], escogido como los cedros.
  to: Sus piernas son columnas de mármol[a], asentadas sobre bases de oro fino. Su apariencia es como el Líbano[b], distinguido entre los cedros.
  rationale: 'Se conserva la traducción general del borrador, pero se corrigen dos puntos para ajustarla mejor al expediente auditado y al español natural: (1) la nota [a] ahora preserva la alternativa léxica principal de שֵׁשׁ («alabastro»), tal como lo hace la POB inglesa; (2) se reemplaza «escogido como los cedros» por «distinguido entre los cedros», que comunica mejor en español la excelencia selecta de בָּחוּר dentro de la imagen poética. Se retiró la nota sobre «muslos» porque no corresponde a la alternativa destacada en la auditoría inglesa y no es necesaria para la legibilidad del texto principal.'
