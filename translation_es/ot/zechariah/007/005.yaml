translation:
  language: es
  text: 'Habla a todo el pueblo de la tierra y a los sacerdotes,[a] diciendo: Cuando ayunaban y se lamentaban en el quinto mes y en el séptimo, durante estos setenta años, ¿de veras ayunaban para mí?'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «¿Fue para mí —de veras para mí— que ayunaban?». El hebreo usa una construcción enfática y termina con un pronombre independiente («yo/mí») para dar mayor énfasis.'
    reason: lexical_alternative
lexical_decisions:
- source_word: עַם הָאָרֶץ
  english_pob_choice: the people of the land
  chosen_spanish: todo el pueblo de la tierra
  alternatives_spanish:
  - el pueblo de la tierra
  - toda la gente de la tierra
  - los habitantes de la tierra
  lexicon: HALOT
  rationale: Conservo la expresión hebrea básica en una forma natural para el español. Añadir 'todo' refleja bien la amplitud de the people of the land y evita restringirla a una sola clase social sin base suficiente.
- source_word: הַכֹּהֲנִים
  english_pob_choice: the priests
  chosen_spanish: los sacerdotes
  alternatives_spanish:
  - los sacerdotes del culto
  - los ministros sacerdotales
  lexicon: HALOT
  rationale: '''סacerdotes'' es el equivalente directo y claro de כֹּהֲנִים en español bíblico contemporáneo.'
- source_word: צַמְתֶּם
  english_pob_choice: you fasted
  chosen_spanish: ayunaron
  alternatives_spanish:
  - ayunasteis
  - ustedes ayunaron
  lexicon: HALOT
  rationale: El verbo צום se rinde de manera natural como 'ayunar'. Opto por tercera persona en español para mantener la impersonalidad estilística del discurso citado y la fluidez de la frase, aunque el hebreo apunta al grupo interpelado.
- source_word: וְסָפוֹד
  english_pob_choice: and mourned
  chosen_spanish: y se lamentaron
  alternatives_spanish:
  - y lloraron
  - y hicieron duelo
  lexicon: HALOT
  rationale: '''ספד'' implica lamento o duelo ritual. ''Se lamentaron'' conserva mejor ese campo semántico que un simple ''lloraron'', y evita fijar un matiz más técnico de ''duelo'' si el español puede sonar demasiado formal.'
- source_word: בַּחֲמִישִׁי וּבַשְּׁבִיעִי
  english_pob_choice: in the fifth month and in the seventh
  chosen_spanish: en el quinto mes y en el séptimo
  alternatives_spanish:
  - en el quinto y en el séptimo mes
  - en el mes quinto y en el séptimo
  lexicon: HALOT
  rationale: Hago explícito 'mes' para que la referencia calendárica sea clara en español, siguiendo la decisión inglesa de suplir la unidad temporal implícita.
- source_word: וְזֶה שִׁבְעִים שָׁנָה
  english_pob_choice: for these seventy years
  chosen_spanish: durante estos setenta años
  alternatives_spanish:
  - por estos setenta años
  - en estos setenta años
  lexicon: HALOT
  rationale: '''Durante'' comunica de forma idiomática la duración continuada hasta el presente, preservando la fuerza del demostrativo ''estos''.'
- source_word: הֲצ֥וֹם צַמְתֻּנִי אָֽנִי
  english_pob_choice: was it really for me that you fasted
  chosen_spanish: ¿ayunaron de veras para mí?
  alternatives_spanish:
  - ¿ayunaron realmente para mí?
  - ¿fue para mí, de veras, que ayunaron?
  lexicon: HALOT
  rationale: El hebreo presenta una construcción enfática con infinitivo absoluto y un pronombre independiente final. En español, 'de veras' comunica bien la fuerza retórica sin volver la frase artificial. Conservo 'para mí' para mantener el destinatario del ayuno.
- source_word: אֱמֹר ... לֵאמֹר
  english_pob_choice: Speak ... saying
  chosen_spanish: Habla ... diciendo
  alternatives_spanish:
  - Di ... diciendo
  - Habla ... y di
  lexicon: HALOT
  rationale: Reproduzco la fórmula profética de mandato más verbo de habla, manteniendo un registro bíblico natural en español.
theological_decisions:
- issue: Alcance de la pregunta retórica sobre el ayuno
  english_pob_reading: The verse challenges the sincerity and God-directedness of the people's ritual fasting rather than denying that the fast occurred.
  chosen_spanish_reading: El versículo cuestiona si el ayuno fue realmente dirigido a Yahvé, sin negar que el ayuno y el luto hayan ocurrido.
  alternative_spanish_readings:
  - El versículo rechaza por completo esos ayunos como inválidos.
  - El versículo pregunta si el ayuno tuvo valor alguno delante de Dios.
  rationale: La construcción enfática debe conservarse como interrogación que pone a prueba la intención del pueblo. No conviene resolver la tensión ampliándola a un juicio doctrinal mayor que el del propio texto.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: La revisión más reciente indicó que no se necesitaban cambios; este borrador sigue de cerca la línea aprobada del inglés POB, adaptando la fuerza enfática al español con una formulación idiomática y manteniendo la misma lectura teológica.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' como forma preferida del nombre divino cuando corresponda; en este versículo no aparece explícitamente.
  - '''Sacerdotes'' se usa de modo estable para כֹּהֲנִים.'
  - '''Ayunar'' y ''lamentarse'' conservan el paralelo verbal del hebreo.'
  - La nota al pie queda anclada en 'de veras' para preservar la alternativa enfática documentada.
