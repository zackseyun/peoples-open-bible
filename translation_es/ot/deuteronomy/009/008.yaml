    issue: Calco no idiomático en «provocaron a Yahvé a ira»
    rationale: Aunque intenta reflejar el causativo hebreo, esa construcción no suena natural en español neutro. «Provocaron la ira de Yahvé» o «hasta provocar la ira de Yahvé» preserva mejor el sentido con buena legibilidad.
  - severity: low
    issue: La nota [a] no conserva todas las alternativas relevantes del rastro inglés
    rationale: La auditoría inglesa preserva «At Horeb» y «And at Horeb». En español conviene reflejar al menos «En Horeb» además de «Y en Horeb».
  - severity: low
    issue: «Hasta el punto de destruirlos» es válido pero algo explicativo
    rationale: Una formulación como «tanto que estaba dispuesto a destruirlos» o «lo suficiente como para destruirlos» transmite mejor la relación entre la ira y el infinitivo sin sonar tan analítica. Dado el contexto de amenaza, «estaba dispuesto a destruirlos» resulta claro y fiel.
  revised_spanish_text: Aun en Horeb ustedes provocaron la ira de Yahvé[a], y Yahvé se enojó con ustedes tanto que estaba dispuesto a destruirlos[b].
