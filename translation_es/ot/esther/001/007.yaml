translation:
  language: es
  text: Se servían bebidas en vasos de oro, y los vasos eran distintos unos de otros, y el vino real era abundante, según la generosidad del rey[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, más literalmente, «conforme a la mano del rey».
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהַשְׁקוֹת
  english_pob_choice: Drinks were served
  chosen_spanish: Se servían bebidas
  alternatives_spanish:
  - Había servicio de bebidas
  - Se daba de beber
  lexicon: HALOT
  rationale: La forma verbal en este contexto describe el servicio de bebidas en el banquete. «Se servían bebidas» conserva el sentido eventivo y la pasiva impersonal natural en español.
- source_word: בִּכְלֵי זָהָב
  english_pob_choice: in vessels of gold
  chosen_spanish: en vasos de oro
  alternatives_spanish:
  - en vasos de oro macizo
  - en recipientes de oro
  - en vasos dorados
  lexicon: HALOT
  rationale: כְלִי es un término amplio para recipiente/vaso/utensilio. «Vasos de oro» mantiene la cercanía al hebreo sin especificar indebidamente la forma exacta del recipiente.
- source_word: וְכֵלִים מִכֵּלִים שׁוֹנִים
  english_pob_choice: and the vessels differed from one another
  chosen_spanish: y los vasos eran distintos unos de otros
  alternatives_spanish:
  - y los vasos diferían unos de otros
  - y había vasos de distinta forma unos de otros
  - y los recipientes eran diferentes entre sí
  lexicon: HALOT
  rationale: La construcción enfatiza diversidad entre los vasos. «Distintos unos de otros» reproduce bien el valor distributivo sin volverlo torpe en español.
- source_word: וְיֵין מַלְכ֛וּת
  english_pob_choice: royal wine
  chosen_spanish: vino real
  alternatives_spanish:
  - vino del reino
  - vino regio
  - vino de la realeza
  lexicon: HALOT
  rationale: El genitivo expresa vino propio de la realeza o del ámbito real. «Vino real» es idiomático y fiel al matiz regia/cortesano.
- source_word: רָב
  english_pob_choice: was abundant
  chosen_spanish: era abundante
  alternatives_spanish:
  - había en abundancia
  - era mucho
  - estaba en abundancia
  lexicon: HALOT
  rationale: El adjetivo modifica la cantidad de vino. «Era abundante» transmite de forma natural la idea de provisión abundante.
- source_word: כְּיַד הַמֶּלֶךְ
  english_pob_choice: according to the king’s bounty
  chosen_spanish: conforme a la mano del rey
  alternatives_spanish:
  - según la mano del rey
  - conforme a la generosidad del rey
  - según lo que el rey proveía
  lexicon: HALOT
  rationale: Se conserva la imagen idiomática de «la mano» porque el hebreo la usa de manera concreta y el audit trail inglés la mantiene como frase alternativa más literal. En español, «conforme a la mano del rey» preserva la tensión entre literalidad e idiomatismo sin borrar el matiz de provisión/magnanimidad.
theological_decisions:
- issue: Valor idiomático de כְּיַד הַמֶּלֶךְ
  english_pob_reading: according to the king’s bounty / more literally, according to the king’s hand
  chosen_spanish_reading: conforme a la mano del rey
  alternative_spanish_readings:
  - según la generosidad del rey
  - según la provisión del rey
  rationale: El texto no requiere una paráfrasis explicativa; la imagen de la «mano» tiene fuerza semítica y el POB en inglés preserva la alternativa literal. Mantenerla en español evita borrar la tensión entre el modismo y su sentido de provisión generosa.
  doctrine_reference: N/A
translation_notes:
  revision_awareness: El inglés POB fue revisado para hacer más natural la relación entre los miembros de la frase y aclarar que el vino real era abundante; esta versión española sigue esa lectura revisada, manteniendo al mismo tiempo la alternativa literal del modismo final.
  spanish_consistency_notes:
  - Se conserva «mano» en el modismo final para no perder la imagen hebrea documentada.
  - «Vasos» se usa de forma uniforme para כְּלִים/בִּכְלֵי porque el hebreo no especifica una forma más precisa.
  - El orden de cláusulas sigue el paralelismo del hebreo y del inglés POB revisado.
