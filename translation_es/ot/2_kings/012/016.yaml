    reason: lexical_alternative
  revision_rationale: La revisión conserva todas las decisiones léxicas centrales del POB, pero mejora la naturalidad y la precisión sintáctica en español. «No les pedían cuentas» comunica con claridad el sentido administrativo de יְחַשְּׁבוּ; «en cuyas manos» recupera de forma inteligible el modismo hebreo עַל יָדָם, respaldado por nota; y «para darlo» aclara que esos hombres eran intermediarios que entregaban el dinero a los trabajadores. «Actuaban con fidelidad» sigue siendo una buena representación de כי באמונה הם עשים.
