  - severity: medium
    issue: «tu terror me espante» es menos preciso y algo menos digno
    rationale: El hebreo expresa un efecto de terror intenso. «Espante» puede sonar más débil o coloquial; «aterre» refleja mejor בעת. Además, usar «pavor» en el texto principal evita la repetición conceptual de «terror ... aterre» sin perder fuerza.
