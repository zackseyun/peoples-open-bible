translation:
  language: es
  text: 'Entonces Amós respondió y dijo a Amasías[a]: «No soy profeta, ni soy hijo de profeta; más bien, soy pastor de ganado y cuidador de higos de sicómoro[b]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «ni soy hijo de un profeta»; el modismo hebreo puede referirse a pertenencia a un gremio profético más que a descendencia literal.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «cuidador de higos de sicómoro», «preparador de higos de sicómoro» o «el que perfora higos de sicómoro»; el hebreo probablemente se refiere a cultivar o preparar el fruto del árbol de sicómoro.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּעַן / וַיֹּאמֶר
  english_pob_choice: answered and said
  chosen_spanish: respondió y dijo
  alternatives_spanish:
  - respondió
  - contestó y dijo
  lexicon: HALOT
  rationale: La fórmula hebrea narrativa se conserva con dos verbos, como en el POB inglés. 'Respondió y dijo' suena natural en español bíblico actual y mantiene el ritmo del original sin añadir contenido.
- source_word: לֹא נָבִיא אָנֹכִי
  english_pob_choice: I am not a prophet
  chosen_spanish: No soy profeta
  alternatives_spanish:
  - No soy un profeta
  - No soy profeta yo
  lexicon: HALOT
  rationale: La negación se mantiene de forma directa. Se omite el artículo para conservar el énfasis enfático del hebreo y la brevedad proverbial de la réplica.
- source_word: וְלֹא בֶן נָבִיא אָנֹכִי
  english_pob_choice: nor am I a son of a prophet
  chosen_spanish: ni soy hijo de profeta
  alternatives_spanish:
  - ni soy hijo de un profeta
  - ni soy profeta por linaje
  lexicon: HALOT
  rationale: Se preserva el modismo 'hijo de profeta' sin resolverlo como si fuera descendencia literal o pertenencia institucional. 'Hijo de profeta' es transparente y deja abierta la posible referencia a un gremio profético, como en el POB inglés.
- source_word: כִּי
  english_pob_choice: rather
  chosen_spanish: más bien
  alternatives_spanish:
  - pues
  - sino que
  lexicon: HALOT
  rationale: Aquí introduce contraste con las negaciones previas. 'Más bien' comunica bien el giro adversativo/expositivo sin forzar un 'sino que' que sonaría menos natural en esta secuencia.
- source_word: בוֹקֵר
  english_pob_choice: herdsman
  chosen_spanish: boyero
  alternatives_spanish:
  - vaquero
  - pastor de ganado
  - ganadero
  lexicon: HALOT
  rationale: '''Boyero'' transmite el oficio relacionado con ganado y conserva un registro sobrio. Evita ''pastor'', que en español bíblico suele sugerir ovejas y podría desviar el matiz del hebreo.'
- source_word: וּבוֹלֵס שִׁקְמִים
  english_pob_choice: a dresser of sycamore figs
  chosen_spanish: desgranador de higos de sicómoro
  alternatives_spanish:
  - preparador de higos de sicómoro
  - cultivador de higos de sicómoro
  - el que perfora higos de sicómoro
  lexicon: HALOT
  rationale: Se conserva el sustantivo de oficio con una equivalencia que refleja la acción especializada sin decidir de forma excesiva entre las opciones técnicas del hebreo. 'Desgranador' intenta reproducir la idea de manipulación/preparación del fruto; se deja abierta la ambigüedad documentada en el POB inglés sobre si implica preparar, pinzar o perforar los higos.
- source_word: שִׁקְמִים
  english_pob_choice: sycamore figs
  chosen_spanish: higos de sicómoro
  alternatives_spanish:
  - frutos de sicómoro
  - higos de sicómoro-común
  lexicon: HALOT
  rationale: '''Higos de sicómoro'' aclara que se trata del fruto y evita confundir el árbol con el sicómoro de otras tradiciones botánicas. Mantiene la imagen agrícola del texto.'
theological_decisions:
- issue: Si Amos se presenta como profeta por oficio o niega su condición profética en sentido absoluto
  english_pob_reading: The main text preserves the literal denial without resolving whether Amos means not by profession or not by status/origin.
  chosen_spanish_reading: El texto principal conserva la negación literal sin resolver si Amos niega ser profeta por profesión o por estatus/origen.
  alternative_spanish_readings:
  - Amos niega ser profeta institucional o gremial
  - Amos está describiendo solo su ocupación anterior antes del llamamiento divino
  rationale: El contexto inmediato muestra que Amos sí habla por mandato divino; por eso la traducción no debe suavizar ni explicar demasiado la tensión. Se preserva la paradoja para que el lector perciba la fuerza polémica de la respuesta.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: El inglés POB pasó por una revisión reciente en la que 'one who tends sycamore figs' fue ajustado a 'a dresser of sycamore figs'. La presente versión española sigue esa última decisión y la hace explícita con un giro de oficio equivalente ('desgranador de higos de sicómoro'), manteniendo la misma cautela ante la ambigüedad del verbo hebreo.
  spanish_consistency_notes:
  - Se usa 'Dios' / 'Yahvé' según la terminología estándar del proyecto; este verso no contiene el Tetragrámaton.
  - '''Profeta'' se mantiene como término técnico, sin reemplazarlo por fórmulas más devocionales.'
  - Se conservó el paralelismo negativo y la estructura de oficio para reflejar el hebreo sin expandir la frase.
