  text: אִישׁ֩ כִּֽי יִדֹּ֨ר נֶ֜דֶר לַֽ/יהוָ֗ה אֽוֹ הִשָּׁ֤בַע שְׁבֻעָה֙ לֶ/אְסֹ֤ר אִסָּר֙ עַל נַפְשׁ֔/וֹ לֹ֥א יַחֵ֖ל דְּבָר֑/וֹ כְּ/כָל הַ/יֹּצֵ֥א מִ/פִּ֖י/ו יַעֲשֶֽׂה־־־־׃
base_translation:
  language: en
  yaml_path: translation/ot/numbers/030/003.yaml
  text: If a man makes a vow to Yahweh[a], or swears an oath to bind himself with a binding obligation, he shall not break his word[b]; he shall do according to all that has gone out from his mouth.
  footnotes:
  - marker: a
    text: Or, 'to bind himself by an obligation.' The Hebrew expression is literally 'to bind a binding obligation upon himself.'
    reason: lexical_alternative
  - marker: b
    text: Literally, 'he shall not profane his word.'
    reason: lexical_alternative
  ai_draft:
    model_id: gpt-5.4
