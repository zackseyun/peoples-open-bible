base_translation:
  language: en
  yaml_path: translation/ot/jeremiah/026/018.yaml
  text: 'Micah the Morashtite prophesied in the days of Hezekiah king of Judah[a], and he said to all the people of Judah, saying, “Thus says Yahweh of Armies: Zion will be plowed like a field, and Jerusalem will become ruins[c][b], and the mountain of the house wooded heights.”'
  footnotes:
  - marker: a
    text: Or, “Thus says the LORD of hosts.”
    reason: lexical_alternative
  - marker: b
    text: That is, the temple mount.
    reason: cultural_note
  - marker: c
    text: Or, “will become forested high places.”
    reason: lexical_alternative
