translation:
  language: es
  text: Pero después de tres años[a], llegaron noticias a los que estaban con Judas de que Demetrio, hijo de Seleuco, había entrado por el puerto de Trípoli con una fuerza poderosa y una flota.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, más literalmente, «cayó sobre los que estaban con Judas»; es un giro idiomático que significa que les llegó la noticia o el informe.
    reason: lexical_alternative
lexical_decisions:
- source_word: Μετὰ δὲ τριετῆ χρόνον
  english_pob_choice: But after three years
  chosen_spanish: Pero después de tres años
  alternatives_spanish:
  - Y después de tres años
  - Ahora, después de tres años
  lexicon: LSJ
  rationale: μετά con acusativo indica tiempo posterior; τριετῆ χρόνον expresa un período de tres años. 'Pero' conserva el matiz transicional de δέ sin volver el español artificial.
- source_word: προσέπεσεν τοῖς περὶ τὸν Ἰούδαν
  english_pob_choice: news reached those around Judas
  chosen_spanish: llegó noticia a los de alrededor de Judas
  alternatives_spanish:
  - se informó a los que estaban con Judas
  - la noticia cayó sobre los de alrededor de Judas
  lexicon: LSJ
  rationale: προσπίπτω, literalmente 'caer sobre', aquí funciona idiomáticamente para la llegada de una noticia o reporte. 'Llegó noticia' comunica la función idiomática sin perder la fuerza del verbo; 'los de alrededor de Judas' refleja τοῖς περὶ τὸν Ἰούδαν.
- source_word: Δημήτριον τὸν τοῦ Σελεύκου
  english_pob_choice: Demetrius son of Seleucus
  chosen_spanish: Demetrio, hijo de Seleuco
  alternatives_spanish:
  - Demetrio, el hijo de Seleuco
  - Demetrio, descendiente de Seleuco
  lexicon: LSJ
  rationale: La construcción artículo + genitivo expresa filiación; 'hijo de' es la equivalencia natural y precisa en español. Los nombres propios se hispanizan de forma estándar.
- source_word: διὰ τοῦ κατὰ Τρίπολιν λιμένος εἰσπλεύσαντα
  english_pob_choice: had sailed in through the harbor at Tripolis
  chosen_spanish: había entrado por el puerto de Trípoli
  alternatives_spanish:
  - había navegado hacia adentro por el puerto de Trípoli
  - había llegado por mar al puerto de Trípoli
  lexicon: LSJ
  rationale: εἰσπλεύσαντα es participio de 'navegar/entrar por mar'; en español, 'había entrado por el puerto' comunica la llegada marítima. 'De Trípoli' se expresa como 'de Trípoli' / 'de Trípoli' según uso; 'puerto de Trípoli' mantiene la referencia geográfica y portuaria.
- source_word: μετὰ πλήθους ἰσχυροῦ καὶ στόλου
  english_pob_choice: with a strong force and a fleet
  chosen_spanish: con una fuerte fuerza y una flota
  alternatives_spanish:
  - con un numeroso contingente y una flota
  - con una gran fuerza y una flota
  lexicon: LSJ
  rationale: πλῆθος en contexto militar denota una masa de combatientes o tropa; en español 'fuerza' es más claro que 'multitud'. ἰσχυροῦ añade intensidad ('fuerte'), y στόλος es 'flota'.
translation_notes:
  revision_awareness: La revisión inglesa más reciente prefirió 'news reached' y 'sailed in through the harbor at Tripolis' para reflejar mejor el griego. La versión española adopta esa lectura idiomática con 'llegó noticia' y mantiene la llegada marítima con 'entró por el puerto de Trípoli'.
  spanish_consistency_notes:
  - Se mantiene 'Judas' y 'Demetrio, hijo de Seleuco' con sintaxis española natural.
  - '''Yahvé'' no aparece porque el versículo no contiene el nombre divino.'
  - Se evita 'SEÑOR' y 'Cristo' porque no hay base textual para esos términos.
  - '''fuerza'' se usa para πλῆθος en contexto militar, en línea con la lectura inglesa auditada.'
