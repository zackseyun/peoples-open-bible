    text: Varios nombres de este versículo son textualmente inciertos en el testimonio griego, y algunos pueden corresponder a la lista de levitas de Nehemías 8:7. El texto principal conserva formas mayormente cercanas al griego, salvo donde el paralelo hebreo ofrece una identificación especialmente fuerte.
    reason: textual_variant
