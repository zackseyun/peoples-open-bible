translation:
  language: es
  text: Pero Jasón seguía realizando una matanza entre sus propios conciudadanos sin piedad[a], sin comprender que la prosperidad contra los parientes[b] es la mayor calamidad, y pensando que estaba ganando trofeos sobre enemigos y no sobre sus propios compatriotas.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «sin miramientos», para el sentido de ἀφειδῶς.
    reason: lexical_alternative
  - marker: b
    text: Literalmente, «la prosperidad contra los parientes es la mayor calamidad»; el sentido es que el aparente éxito obtenido contra los propios parientes resulta ruinoso.
    reason: lexical_alternative
lexical_decisions:
- source_word: σφαγὰς
  english_pob_choice: slaughter
  chosen_spanish: matanza
  alternatives_spanish:
  - slaughter
  - masacre
  - carnicería
  lexicon: LSJ
  rationale: σφαγή nombra una matanza violenta; en español, «matanza» comunica la brutalidad sin introducir un matiz técnico más fuerte que el griego ni suavizarlo a «muerte» o «asesinato».
- source_word: τῆς πόλεως τῶν ἰδίων
  english_pob_choice: his own fellow citizens
  chosen_spanish: sus propios conciudadanos
  alternatives_spanish:
  - sus propios ciudadanos de la ciudad
  - sus propios paisanos
  lexicon: LSJ
  rationale: La secuencia une pertenencia cívica con posesión/reflexividad. «Conciudadanos» conserva el vínculo con la ciudad y «sus propios» reproduce ἰδίων.
- source_word: ἀφειδῶς
  english_pob_choice: merciless
  chosen_spanish: sin piedad
  alternatives_spanish:
  - sin miramientos
  - sin compasión
  - sin piedad alguna
  lexicon: LSJ
  rationale: El adverbio expresa actuar sin ahorrar ni perdonar; «sin piedad» es idiomático en español y mantiene la dureza de la acción.
- source_word: οὐ συννοῶν
  english_pob_choice: not understanding
  chosen_spanish: sin comprender
  alternatives_spanish:
  - sin darse cuenta
  - sin entender
  - no comprendiendo
  lexicon: LSJ
  rationale: El participio indica falta de comprensión activa. «Sin comprender» suena natural y preserva el valor cognitivo del griego.
- source_word: εὐημερίαν
  english_pob_choice: prosperity
  chosen_spanish: prosperidad
  alternatives_spanish:
  - éxito
  - buena fortuna
  - bienestar
  lexicon: LSJ
  rationale: En este contexto político-bélico, εὐημερίαν apunta a una situación favorable o prosperidad aparente; «prosperidad» sigue de cerca la revisión inglesa y mantiene el contraste moral del pasaje.
- source_word: δυσημερίαν
  english_pob_choice: calamity
  chosen_spanish: calamidad
  alternatives_spanish:
  - desgracia
  - desastre
  - desventura
  lexicon: LSJ
  rationale: La oposición con εὐημερίαν pide una palabra fuerte que exprese ruina o reverso negativo. «Calamidad» reproduce la gravedad de la inversión del sentido aparente.
- source_word: συγγενεῖς
  english_pob_choice: kinsmen
  chosen_spanish: los parientes
  alternatives_spanish:
  - los de su misma sangre
  - los consanguíneos
  - los familiares
  lexicon: LSJ
  rationale: El término remite a los de parentesco compartido. «Parientes» es claro y amplio; el artículo mantiene la referencia genérica del sustantivo griego.
- source_word: τὴν μεγίστην
  english_pob_choice: the greatest
  chosen_spanish: la mayor
  alternatives_spanish:
  - la más grande
  - la máxima
  - la gravísima
  lexicon: LSJ
  rationale: El superlativo griego debe quedar explícito. «La mayor» es la forma natural en español y conserva la escala absoluta del contraste.
- source_word: τρόπαια καταβάλλεσθαι
  english_pob_choice: winning trophies
  chosen_spanish: levantando trofeos
  alternatives_spanish:
  - alzando trofeos
  - erigiendo trofeos
  - obteniendo trofeos
  lexicon: LSJ
  rationale: La expresión alude al establecimiento de trofeos de victoria. «Levantando trofeos» preserva la imagen militar y evita reducirla a una simple idea abstracta de triunfo.
- source_word: πολεμίων
  english_pob_choice: enemies
  chosen_spanish: enemigos
  alternatives_spanish:
  - adversarios
  - fautores
  - contrarios
  lexicon: LSJ
  rationale: Término militar directo; «enemigos» es el equivalente normal y suficientemente fuerte.
- source_word: ὁμοεθνῶν
  english_pob_choice: his own countrymen
  chosen_spanish: sus propios compatriotas
  alternatives_spanish:
  - los de su misma nación
  - sus mismos paisanos
  - los de su propio pueblo
  lexicon: LSJ
  rationale: ὁμοεθνῶν subraya pertenencia a la misma etnia/nación. «Compatriotas» distingue bien este grupo de los συγγενεῖς anteriores y suena natural en español.
theological_decisions:
- issue: Reversión moral entre prosperidad aparente y calamidad real
  english_pob_reading: Render the sentence as a narrator's judgment that victory over one's own kin is actually disaster
  chosen_spanish_reading: 'Presentar la frase como juicio narrativo: una prosperidad ejercida contra los propios parientes es en realidad la mayor calamidad'
  alternative_spanish_readings:
  - una buena fortuna contra los parientes es la mayor desgracia
  - un éxito contra los parientes es la mayor ruina
  rationale: El griego formula una inversión evaluativa explícita. «Prosperidad» y «calamidad» mantienen la tensión moral sin borrar que el texto juzga como ruinoso lo que parece favorable.
  doctrine_reference: Conservar la tensión moral del texto; no suavizar la condena ni convertirla en mera descripción neutral.
translation_notes:
  revision_awareness: 'La redacción sigue el último estado revisado del contexto inglés: εὐημερίαν se refleja como «prosperidad», δυσημερίαν como «calamidad», y τρόπαια καταβάλλεσθαι se vierte de forma imagética como «levantando trofeos», manteniendo la lectura moral y militar del pasaje sin endurecerla ni suavizarla indebidamente.'
  spanish_consistency_notes:
  - Se mantuvo «Jasón» para el nombre propio conforme al uso bíblico español normal.
  - Se evitó «SEÑOR» u otras sustituciones irrelevantes porque el verso no contiene el nombre divino.
  - «Compatriotas» se reservó para ὁμοεθνῶν, distinguiéndolo de «parientes» para συγγενεῖς.
  - La puntuación reproduce una sola oración compleja con paralelismo y contraste, acorde con el griego.
