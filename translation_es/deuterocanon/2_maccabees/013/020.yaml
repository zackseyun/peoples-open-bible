revisions:
- from: Pero Judas seguía enviando a los de dentro lo que necesitaban[a].
  to: Pero Judas seguía haciéndoles llegar dentro[a] lo necesario a los que estaban dentro.
  rationale: Se revisa para reflejar más explícitamente la dirección hacia el interior de εἰσεπέμπεν y para usar 'lo necesario', que corresponde más de cerca a τὰ δέοντα. También se emplea 'a los que estaban dentro' por claridad general en español.
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T23:07:56Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien el sentido básico del griego: Judas enviaba repetidamente lo necesario a quienes estaban dentro. Sin embargo, omite de forma explícita el matiz de movimiento de εἰσεπέμπεν (''enviar adentro / hacer entrar''), ya que ''seguía enviando a los de dentro'' puede entenderse como simplemente enviarles algo sin destacar que se metía dentro del lugar sitiado. También conviene evitar que ''lo que necesitaban'' suene demasiado dependiente de la evaluación subjetiva de los destinatarios, cuando τὰ δέοντα es más bien ''lo necesario''.'
  spanish_quality_summary: El español es natural y claro, pero puede afinarse para mayor precisión espacial y mejor correspondencia con el griego. 'A los de dentro' suena idiomático, aunque 'a los que estaban dentro' es algo más amplio y claro para lectores generales. La nota está bien orientada, pero debe anclarse en el verbo revisado.
  glossary_alignment: 'No hay términos teológicos sensibles en este versículo. ''Judas'' está bien. La revisión propuesta mantiene el enfoque léxico del POB: imperfecto iterativo/continuo, referencia espacial de ἔνδον, y amplitud semántica de τὰ δέοντα sin sobreespecificar provisiones.'
  issues:
  - severity: medium
    issue: El verbo español no expresa claramente el sentido de 'enviar adentro' de εἰσεπέμπεν.
    rationale: El compuesto griego con εἰς añade dirección hacia el interior. 'Seguía enviando a los de dentro' comunica destinatario, pero no necesariamente la acción de introducir/envíar dentro del lugar.
  - severity: low
    issue: '''Lo que necesitaban'' es aceptable, pero ''lo necesario'' se ajusta mejor a τὰ δέοντα.'
    rationale: El griego apunta a 'las cosas necesarias' de manera más objetiva y menos interpretativa que 'lo que necesitaban', aunque ambas opciones son cercanas.
  revised_spanish_text: Pero Judas seguía haciéndoles llegar dentro[a] lo necesario a los que estaban dentro.
  revised_footnotes:
  - marker: a
    text: 'O: «seguía enviando dentro lo necesario». El imperfecto griego puede indicar una acción continua o repetida.'
    reason: alternative_reading
  revision_rationale: Se revisa para reflejar más explícitamente la dirección hacia el interior de εἰσεπέμπεν y para usar 'lo necesario', que corresponde más de cerca a τὰ δέοντα. También se emplea 'a los que estaban dentro' por claridad general en español.
