  text: Jehud, Bene-berak[a] y Gat-rimón[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebreo Bene-berak, un nombre de lugar formado por elementos que en otros contextos pueden significar 'hijos de Berak'; aquí el contexto exige el nombre establecido de la ciudad.
