translation:
  language: es
  text: Y los querubines extenderán sus alas hacia arriba, cubriendo por encima con sus alas el propiciatorio[a], y sus rostros estarán el uno frente al otro; los rostros de los querubines estarán hacia el propiciatorio.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O ‘tapa de expiación’. Hebreo kappóret designa la cubierta de oro del arca.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהָיוּ
  english_pob_choice: And ... shall be
  chosen_spanish: Y ... extenderán / estarán
  alternatives_spanish:
  - Y ... serán
  - Y ... habrán de
  lexicon: HALOT
  rationale: 'El hebreo funciona en contexto instructivo con valor descriptivo-prescriptivo. En español, el futuro simple expresa bien la instrucción tabernacular sin sonar mecánico. Se distribuye según la cláusula: acción de extender y estado/orientación de los rostros.'
- source_word: הַכְּרֻבִים
  english_pob_choice: the cherubim
  chosen_spanish: los querubines
  alternatives_spanish:
  - los querubines celestiales
  - los seres querubines
  lexicon: HALOT
  rationale: Se conserva el término transliterado tradicional 'querubines', que en español bíblico es claro y mantiene la referencia a seres sagrados del santuario, no a figuras decorativas.
- source_word: פֹּרְשֵׂי כְנָפַיִם
  english_pob_choice: spreading out their wings
  chosen_spanish: extenderán sus alas
  alternatives_spanish:
  - con sus alas extendidas
  - abriendo sus alas
  lexicon: HALOT
  rationale: El participio describe una postura continua de alas abiertas; 'extenderán sus alas' transmite el gesto de forma natural y fiel, con el matiz activo requerido por el contexto.
- source_word: לְמַעְלָה
  english_pob_choice: upward
  chosen_spanish: hacia arriba
  alternatives_spanish:
  - arriba
  - en alto
  lexicon: HALOT
  rationale: '''Hacia arriba'' conserva la orientación espacial exacta de las alas sin introducir un valor devocional ajeno al texto.'
- source_word: סֹכְכִים
  english_pob_choice: overshadowing
  chosen_spanish: cubriendo
  alternatives_spanish:
  - dando sombra
  - protegiendo con sombra
  lexicon: HALOT
  rationale: '''סכך'' implica cubrir con sombra; en español, ''cubriendo'' mantiene la acción visible y evita una metáfora demasiado interpretativa. El matiz de sombra queda implícito por el gesto de las alas sobre el propiciatorio.'
- source_word: בְּכַנְפֵיהֶם
  english_pob_choice: with their wings
  chosen_spanish: con sus alas
  alternatives_spanish:
  - por medio de sus alas
  - con sus plumas
  lexicon: HALOT
  rationale: Se usa 'alas' para naturalidad en español bíblico; 'con' expresa el medio instrumental. 'Plumas' no corresponde al término hebreo.
- source_word: עַל הַכַּפֹּרֶת
  english_pob_choice: the mercy seat
  chosen_spanish: el propiciatorio
  alternatives_spanish:
  - la tapa de expiación
  - la cubierta expiatoria
  lexicon: HALOT
  rationale: כַּפֹּרֶת designa la cubierta del arca con función cultual de expiación. 'Propiciatorio' es el término español bíblico consolidado y preserva mejor esa carga teológica que 'cubierta'.
- source_word: וּפְנֵיהֶם אִישׁ אֶל אָחִיו
  english_pob_choice: and their faces shall be toward one another
  chosen_spanish: y sus rostros estarán uno hacia el otro
  alternatives_spanish:
  - y sus rostros estarán el uno frente al otro
  - y sus rostros estarán mirándose mutuamente
  lexicon: HALOT
  rationale: La expresión idiomática hebrea indica reciprocidad; 'uno hacia el otro' conserva la imagen concreta sin explicar demasiado. 'Rostros' mantiene el paralelismo con la cláusula final.
- source_word: אֶל הַכַּפֹּרֶת יִהְיוּ פְּנֵי הַכְּרֻבִים
  english_pob_choice: the faces of the cherubim shall be toward the mercy seat
  chosen_spanish: los rostros de los querubines estarán hacia el propiciatorio
  alternatives_spanish:
  - los rostros de los querubines estarán dirigidos al propiciatorio
  - los rostros de los querubines serán hacia el propiciatorio
  lexicon: HALOT
  rationale: Se mantiene la repetición de 'rostros' para reflejar la sintaxis hebrea y la orientación concreta hacia el objeto sagrado. 'Estarán hacia' reproduce bien el valor posicional sin sobretraducir.
theological_decisions:
- issue: Rendering of כַּפֹּרֶת in tabernacle instructions
  english_pob_reading: mercy seat
  chosen_spanish_reading: propiciatorio
  alternative_spanish_readings:
  - tapa de expiación
  - cubierta expiatoria
  - asiento de misericordia
  rationale: En español, 'propiciatorio' es el equivalente bíblico más asentado para כַּפֹּרֶת y conserva la función cultual ligada a expiación y presencia divina. 'Asiento de misericordia' no corresponde al objeto y 'cubierta' pierde su carga teológica.
  doctrine_reference: 'DOCTRINE.md: Translation philosophy §1, §5; terminology for cultic objects'
- issue: Spatial description of the cherubim's wings and faces
  english_pob_reading: spread out their wings upward, overshadowing ... with their wings
  chosen_spanish_reading: extenderán sus alas hacia arriba, cubriendo con sus alas el propiciatorio
  alternative_spanish_readings:
  - con sus alas extendidas hacia arriba
  - dando sombra al propiciatorio con sus alas
  rationale: La escena es física y cultual; el español debe preservar la disposición espacial sin sustituirla por lenguaje devocional abstracto. 'Cubriendo' mantiene el acto visible y permite que el matiz de sombra quede implícito.
  doctrine_reference: 'DOCTRINE.md: Translation philosophy §1, §4'
translation_notes:
  revision_awareness: 'La versión inglesa revisada ajustó ''shall be spreading out'' a ''shall spread out'' y ''one toward another'' a ''toward one another''. La redacción española adopta una formulación natural y formal que conserva esos dos movimientos: acción puntual/descrita en futuro (''extenderán'') y reciprocidad espacial (''uno hacia el otro''). También se mantiene la equivalencia cultual de kappóret con ''propiciatorio'', siguiendo el valor tradicional español sin perder la referencia al objeto del arca.'
  spanish_consistency_notes:
  - Se mantiene 'querubines' para הַכְּרֻבִים de forma consistente con el uso bíblico en español.
  - Se prefiere 'propiciatorio' para כַּפֹּרֶת por ser el término técnico más estable en la tradición bíblica española y por su adecuación cultual.
  - Se conserva la repetición de 'rostros' para reflejar el paralelismo del hebreo.
  - No se introduce 'SEÑOR' ni otras sustituciones, porque no aparece el tetragrámaton en este versículo.
