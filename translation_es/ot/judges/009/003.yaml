translation:
  language: es
  text: 'Y los hermanos de su madre hablaron de él, a oídos de todos los líderes de Siquem[a], todas estas palabras[b], y sus corazones se volvieron tras Abimelec, porque decían: «Él es nuestro hermano».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «todos los señores de Siquem» o «todos los hombres principales de Siquem». La expresión hebrea se refiere a los hombres influyentes de la ciudad.
    reason: lexical_alternative
  - marker: b
    text: O «todas estas cosas». El hebreo puede significar «palabras» o «asuntos/hechos», pero aquí probablemente se refiere a la propuesta recién comunicada.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְדַבְּרוּ
  english_pob_choice: spoke
  chosen_spanish: hablaron
  alternatives_spanish:
  - dijeron
  - hablaron acerca de
  lexicon: HALOT
  rationale: El verbo de discurso en este contexto narra la presentación de la propuesta a los hombres de Siquem. «Hablaron» conserva el acto verbal sin sobrecargarlo con un matiz adicional. «Dijeron» sería posible, pero «hablaron» encaja mejor con el complemento siguiente y con el movimiento discursivo de la escena.
- source_word: אֲחֵי אִמּוֹ
  english_pob_choice: his mother’s brothers
  chosen_spanish: los hermanos de su madre
  alternatives_spanish:
  - los tíos maternos
  - los hermanos maternos
  lexicon: HALOT
  rationale: La relación es literalmente de varones emparentados por la madre; «los hermanos de su madre» mantiene la precisión genealógica sin introducir una categoría más interpretativa como «tíos maternos».
- source_word: עָלָיו
  english_pob_choice: about him
  chosen_spanish: de él
  alternatives_spanish:
  - acerca de él
  - sobre él
  lexicon: HALOT
  rationale: En español, «hablar de él» expresa con naturalidad el contenido del discurso. «Acerca de él» es más literal, pero menos fluido. No se añadió una idea de representación o defensa, porque el hebreo solo indica el tema del hablar.
- source_word: בְּאָזְנֵי
  english_pob_choice: in the hearing of
  chosen_spanish: en oídos de
  alternatives_spanish:
  - a oídos de
  - ante
  lexicon: HALOT
  rationale: La expresión hebrea es idiomática, «en los oídos de». En español, «en oídos de» reproduce la imagen y el sentido de audiencia. «A oídos de» es también posible, pero «en oídos de» mantiene más de cerca la forma figurada del original.
- source_word: כָּל בַּעֲלֵי שְׁכֶם
  english_pob_choice: all the leaders of Shechem
  chosen_spanish: todos los señores de Siquem
  alternatives_spanish:
  - todos los líderes de Siquem
  - todos los hombres principales de Siquem
  - todos los dueños de Siquem
  lexicon: HALOT
  rationale: בעלי aquí designa a los hombres influyentes o principales de la ciudad. «Señores» conserva la amplitud semántica de autoridad/posición social y refleja el valor político del grupo mejor que una traducción demasiado estrecha como «líderes»; además, el POB inglés dejó explícita la posibilidad de «lords/leading men».
- source_word: אֵת כָּל הַדְּבָרִים הָאֵלֶּה
  english_pob_choice: all these words
  chosen_spanish: estas palabras
  alternatives_spanish:
  - todas estas palabras
  - estas cosas
  - estos asuntos
  lexicon: HALOT
  rationale: El hebreo puede referirse a palabras o a asuntos; el contexto inmediato apunta al discurso/propuesta recién narrados. En español, «estas palabras» conserva la conexión verbal. Se omitió «todas» porque en español suena redundante junto a «estas» y no añade claridad.
- source_word: וַיֵּט לִבָּם
  english_pob_choice: their hearts turned
  chosen_spanish: su corazón se inclinó
  alternatives_spanish:
  - sus corazones se inclinaron
  - su corazón se volvió
  - sus corazones se volvieron
  lexicon: HALOT
  rationale: El hebreo usa un singular colectivo con sentido de disposición interior. «Se inclinó» reproduce bien la metáfora de dirección/afecto. Se mantuvo «corazón» en singular para respetar la forma hebrea y el efecto retórico colectivo.
- source_word: אַחֲרֵי אֲבִימֶלֶךְ
  english_pob_choice: after Abimelech
  chosen_spanish: tras Abimelec
  alternatives_spanish:
  - después de Abimelec
  - siguiendo a Abimelec
  - en pos de Abimelec
  lexicon: HALOT
  rationale: «Tras» conserva la metáfora espacial de seguimiento o adhesión. «Siguiendo a» explicita el sentido, pero pierde parte de la imagen. Se usa «Abimelec» como forma castellana del nombre propio.
- source_word: כִּי אָמְרוּ
  english_pob_choice: for they said
  chosen_spanish: porque dijeron
  alternatives_spanish:
  - pues dijeron
  - ya que dijeron
  lexicon: HALOT
  rationale: Aquí כִּי introduce la causa de la inclinación de su corazón. «Porque» expresa con naturalidad esa relación causal en español. «Pues» sería posible, pero menos transparente en lectura pública.
- source_word: אָחִינוּ הוּא
  english_pob_choice: He is our brother
  chosen_spanish: Él es nuestro hermano
  alternatives_spanish:
  - Es nuestro hermano
  - Es de nuestra familia
  lexicon: HALOT
  rationale: «Hermano» es la equivalencia directa y conserva el argumento de solidaridad de clan que motiva la adhesión a Abimelec. No se suavizó con «pariente» ni «familia», porque el hebreo usa una reivindicación de hermandad más fuerte y deliberada.
theological_decisions:
- issue: Término de afiliación política/afectiva frente a simple seguimiento
  english_pob_reading: their hearts turned after Abimelech
  chosen_spanish_reading: su corazón se inclinó tras Abimelec
  alternative_spanish_readings:
  - sus corazones se volvieron tras Abimelec
  - su corazón siguió a Abimelec
  rationale: La frase describe un cambio de lealtad interna más que una mera secuencia temporal. «Se inclinó tras» conserva tanto la metáfora del corazón como la idea de adhesión personal a Abimelec sin convertirla en una interpretación doctrinal o psicológica excesiva.
  doctrine_reference: No doctrinal issue; narrative allegiance language.
translation_notes:
  revision_awareness: Se tuvo en cuenta el audit trail inglés y su estado de alta concordancia; no se requirieron correcciones sustanciales. La única tensión relevante es la amplitud de בעלי שְׁכֶם y de דברים, resuelta en español manteniendo el sentido político y discursivo, con nota alternativa.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» como norma general del proyecto, pero este versículo no contiene el nombre divino.
  - Se usó «Abimelec» como forma española consistente del nombre propio.
  - Se prefirió un registro bíblico claro y moderno, evitando calcos innecesarios pero conservando las imágenes hebreas clave.
