review_pass:
  verdict: revise
  source_alignment_summary: El borrador refleja bien el rango de edad y el sentido de servicio levítico organizado. Sin embargo, «todo el que entra al servicio» suena algo forzado en español para הַבָּא, y «tabernáculo de reunión» se aparta de la elección auditada en inglés «tent of meeting» más de lo necesario. La nota alternativa también introduce «deber» y «para hacer la obra», que no coincide del todo con la revisión inglesa final.
  spanish_quality_summary: El texto es claro y digno, pero puede sonar más natural y más ajustado al hebreo con «todo el que se presenta al servicio» o «todo el que viene al servicio». Además, «tienda de reunión» preserva mejor el referente literal de אֹהֶל que «tabernáculo», evitando elevar el registro cultual más allá del original inmediato.
  glossary_alignment: 'No hay conflicto con términos teológicos mayores del glosario. La principal cuestión terminológica es אֹהֶל מוֹעֵד: el proyecto inglés auditado usa «tent of meeting», por lo que en español conviene «tienda de reunión» salvo razón fuerte en contra. «Servicio» para צָבָא y «obra» para עֲבֹדָה son defendibles y distinguen bien los dos términos.'
  issues:
  - severity: medium
    issue: «entra al servicio» es poco idiomático en español en este contexto
    rationale: Aunque «everyone who enters» está en el inglés POB, el hebreo participial הַבָּא también admite «el que viene/se presenta». En español bíblico natural, «se presenta al servicio» comunica mejor la incorporación al deber levítico.
  - severity: medium
    issue: «tabernáculo de reunión» se aleja de la imagen literal de אֹהֶל
    rationale: El hebreo dice literalmente «tienda de reunión». «Tabernáculo» es comprensible y tradicional, pero añade una formalización no requerida aquí y se aparta de la opción auditada en inglés.
  - severity: low
    issue: La nota al pie no refleja con precisión la alternativa inglesa auditada
    rationale: La nota actual añade «deber» y «para hacer la obra», mientras que la alternativa inglesa revisada preserva más bien «comes for duty / for the work». Conviene ajustar la redacción española para que sea paralela y clara.
  revised_spanish_text: desde los treinta años y en adelante, hasta los cincuenta años, todo el que se presenta[a] al servicio para la obra en la tienda de reunión—
  revised_footnotes:
  - marker: a
    text: 'O: «todo el que viene para el servicio, para la obra en la tienda de reunión».'
    reason: lexical_alternative
  revision_rationale: Se ajusta «entra» a «se presenta» para un español más natural en contexto censal y de deber levítico; se cambia «tabernáculo» por «tienda» para reflejar más directamente אֹהֶל y alinearse mejor con la auditoría inglesa; y se corrige la nota alternativa para que corresponda mejor a las opciones léxicas documentadas sin expansión innecesaria.
