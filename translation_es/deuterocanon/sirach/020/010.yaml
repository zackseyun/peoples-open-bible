translation:
  language: es
  text: Hay humillación[a] por causa de la gloria, y hay quien desde la humillación levanta la cabeza[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «menoscabo». El sustantivo griego puede denotar reducción, rebaja o humillación; el sentido es que algunos son rebajados de una manera que conduce a la honra.
    reason: lexical_alternative
  - marker: b
    text: 'Literalmente: «levanta la cabeza»; es un modismo de restauración, dignidad o confianza después de una condición baja.'
    reason: cultural_note
lexical_decisions:
- source_word: ἐλάττωσις
  english_pob_choice: humiliation
  chosen_spanish: humillación
  alternatives_spanish:
  - rebaja
  - abatimiento
  - menoscabo
  lexicon: LSJ
  rationale: El griego puede expresar reducción, abatimiento o humillación. En este contexto sapiencial, «humillación» conserva la idea de ser puesto en una condición baja y mantiene bien el contraste con «gloria». «Menoscabo» y «rebaja» suenan más abstractos; «abatimiento» es posible, pero menos directo para el español bíblico actual.
- source_word: ἕνεκεν
  english_pob_choice: for the sake of
  chosen_spanish: por causa de
  alternatives_spanish:
  - por motivo de
  - a causa de
  - en razón de
  lexicon: BDAG
  rationale: La preposición expresa causa o finalidad. «Por causa de» comunica de manera natural la relación entre la humillación y la gloria, sin volverla meramente explicativa.
- source_word: δόξης
  english_pob_choice: glory
  chosen_spanish: gloria
  alternatives_spanish:
  - honor
  - reputación
  - esplendor
  lexicon: LSJ
  rationale: «Gloria» conserva el alcance semántico amplio del griego y el contraste elevado con «humillación». «Honor» sería más estrecho; «reputación» desplaza demasiado el sentido hacia lo social.
- source_word: ἀπὸ ταπεινώσεως
  english_pob_choice: from humiliation
  chosen_spanish: desde la humillación
  alternatives_spanish:
  - a partir de la humillación
  - de la humillación
  - desde el abatimiento
  lexicon: LSJ
  rationale: Ἀπό marca el punto de partida o la condición desde la cual alguien se eleva. «Desde la humillación» conserva esa imagen de origen mejor que una formulación más interpretativa.
- source_word: ἦρεν κεφαλήν
  english_pob_choice: lifts up his head
  chosen_spanish: levanta la cabeza
  alternatives_spanish:
  - ha levantado la cabeza
  - alza la cabeza
  - levanta su cabeza
  lexicon: LSJ
  rationale: Es un modismo de restauración, confianza o dignidad. «Levanta la cabeza» mantiene la imagen concreta y su fuerza proverbial en español sin sobreexplicar el sentido.
- source_word: ἔστιν ὃς
  english_pob_choice: there is one who
  chosen_spanish: hay quien
  alternatives_spanish:
  - hay uno que
  - hay alguien que
  - existe quien
  lexicon: Greek grammar
  rationale: La construcción impersonal proverbial queda bien en español con «hay quien», que suena natural y conserva el valor generalizante del griego.
translation_notes:
  revision_awareness: Se siguió el texto griego de Swete con el audit trail en inglés. La revisión inglesa reciente ajustó el segundo miembro al presente proverbial («lifts up his head»); por eso el español usa «levanta» para reflejar el valor gnómico sin forzar un perfecto. Se conservó la antítesis humillación/gloria documentada por la nota inglesa.
  spanish_consistency_notes:
  - Se mantiene «gloria» para δόξα, conforme al criterio POB, y se explica su amplitud semántica en nota.
  - Se traduce el giro proverbial con una estructura natural en español («hay quien...»), sin perder el paralelismo del griego.
  - No se introduce lenguaje eclesiástico ajeno al texto; el registro busca ser bíblico y contemporáneo a la vez.
