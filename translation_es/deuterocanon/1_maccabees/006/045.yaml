  - severity: low
    issue: «por ambos lados» es menos idiomático en este contexto
    rationale: Para ἔνθα καὶ ἔνθα, en combinación con «se abrían ante él», una expresión como «a uno y otro lado» suena más natural y representa bien la apertura de la línea a ambos costados.
  revised_spanish_text: Y cargó con audacia hacia el medio de la falange[a], y seguía matando a derecha y a izquierda, y se abrían ante él a uno y otro lado.
