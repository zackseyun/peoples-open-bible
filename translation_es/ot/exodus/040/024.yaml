revisions:
- from: Puso la lámpara[a] en el tabernáculo de reunión, frente a la mesa, al lado sur del tabernáculo.
  to: Colocó el candelabro en la tienda de reunión, frente[a] a la mesa, en el lado sur del tabernáculo.
  rationale: Se corrige 'lámpara' a 'candelabro' para reflejar con fidelidad הַמְּנֹרָה; se distingue 'tienda de reunión' de 'tabernáculo' para respetar los dos términos hebreos del versículo; y se reubica la nota al término que realmente comenta, נֹכַח. La redacción resultante es natural, precisa y consistente con la terminología del proyecto.
  reviewer_model: gpt-5.4
