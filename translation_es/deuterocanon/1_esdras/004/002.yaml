translation:
  language: es
  text: y a todos los sátrapas, generales y gobernantes locales bajo su autoridad, desde la India hasta Etiopía, por todas las ciento veintisiete satrapías[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «por todas las ciento veintisiete provincias». El griego usa el término administrativo persa σατραπείαις, en consonancia con «sátrapas».'
    reason: lexical_alternative
lexical_decisions:
- source_word: σατράπαις
  english_pob_choice: satraps
  chosen_spanish: sátrapas
  alternatives_spanish:
  - gobernadores provinciales
  lexicon: LSJ
  rationale: Mantengo el título administrativo persa con transliteración naturalizada en español para conservar la especificidad del cargo y su vínculo con σατραπείαις.
- source_word: στρατηγοῖς
  english_pob_choice: generals
  chosen_spanish: generales
  alternatives_spanish:
  - comandantes
  - jefes militares
  lexicon: LSJ
  rationale: El sentido básico es militar; 'generales' es la equivalencia moderna más clara y preserva la distinción frente a los sátrapas y gobernantes locales.
- source_word: τοπάρχαις
  english_pob_choice: local rulers
  chosen_spanish: gobernantes locales
  alternatives_spanish:
  - gobernantes de distrito
  - toparcas
  lexicon: LSJ
  rationale: La expresión nombra autoridades sobre regiones menores o distritos. 'Gobernantes locales' comunica bien el cargo sin perder la idea administrativa, y evita un tecnicismo menos transparente.
- source_word: τοῖς ὑπʼ αὐτὸν
  english_pob_choice: under him
  chosen_spanish: bajo él
  alternatives_spanish:
  - sometidos a él
  - bajo su autoridad
  lexicon: LSJ
  rationale: La frase indica subordinación al rey. 'Bajo él' es breve, natural y fiel al encadenamiento de cargos subordinados.
- source_word: ἀπὸ τῆς Ἰνδικῆς μέχρι Αἰθιοπίας
  english_pob_choice: from India to Ethiopia
  chosen_spanish: desde la India hasta Etiopía
  alternatives_spanish:
  - desde la India hasta Etiopía
  - desde la India, hasta Etiopía
  lexicon: LSJ
  rationale: Sigo la fórmula geográfica estándar con una preposición distributiva natural en español, conservando la amplitud del dominio imperial.
- source_word: ἐν ταῖς ἑκατὸν εἴκοσι ἑπτὰ σατραπείαις
  english_pob_choice: throughout the one hundred twenty-seven satrapies
  chosen_spanish: en las ciento veintisiete satrapías
  alternatives_spanish:
  - a lo largo de las ciento veintisiete satrapías
  - por las ciento veintisiete satrapías
  lexicon: LSJ
  rationale: La revisión inglesa entiende ἐν con valor distributivo/abarcador; en español, 'en' mantiene esa relación sin sobreexplicar. Repetir 'satrapías' preserva el vínculo léxico con 'sátrapas'.
translation_notes:
  revision_awareness: La revisión inglesa cambió 'in the one hundred twenty-seven satrapies' por 'throughout the one hundred twenty-seven satrapies' para reflejar mejor el valor distributivo de ἐν. En español se optó por 'en las ciento veintisiete satrapías', que conserva la referencia espacial/administrativa sin forzar una paráfrasis.
  spanish_consistency_notes:
  - Se mantiene la correspondencia léxica sátrapas/satrapías para reflejar el enlace cognado del griego.
  - Se usa 'gobernantes locales' para τοπάρχαις, en continuidad con la decisión inglesa de evitar un tecnicismo opaco.
  - La capitalización de 'India' y 'Etiopía' sigue el uso español estándar.
  - No hay contenido teológico explícito en este versículo, por lo que no se añaden notas doctrinales.
