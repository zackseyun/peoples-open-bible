translation:
  language: es
  text: Mantén a muchos fuera de tu casa[a], y no admitas en tu casa a cualquier persona, porque muchos acechan[b], y muchos son engañadores.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'El testimonio hebreo es el principal aquí, pero el paralelo griego dice más bien: «Aloja a un forastero, y te trastornará en turbulencias y te enajenará de lo tuyo». Esto probablemente refleja una forma textual diferente o una expansión de la advertencia.'
    reason: alternative_reading
  - marker: b
    text: El texto hebreo de este versículo incluye palabras entre corchetes en la edición citada, lo que indica alguna reconstrucción o incertidumbre en la tradición manuscrita conservada.
    reason: textual_variant
lexical_decisions:
- source_word: מְנַע
  english_pob_choice: Keep ... out
  chosen_spanish: Mantén ... fuera
  alternatives_spanish:
  - Impide ... el acceso
  - Reprime ...
  lexicon: HALOT
  rationale: El imperativo expresa exclusión o restricción de acceso. «Mantén ... fuera» es natural en español moderno y conserva la idea de no admitir a muchos en la casa.
- source_word: רַבִּים
  english_pob_choice: many
  chosen_spanish: muchos
  alternatives_spanish:
  - multitud
  - numerosos
  lexicon: HALOT
  rationale: Es un cuantificador directo y se mantiene de forma consistente en ambas cláusulas.
- source_word: מִתּוֹךְ בֵּיתֶךָ
  english_pob_choice: out of your house
  chosen_spanish: fuera de tu casa
  alternatives_spanish:
  - desde dentro de tu casa
  - de en medio de tu casa
  lexicon: HALOT
  rationale: La imagen literal apunta a excluir del interior de la casa. «Fuera de tu casa» suena natural y conserva el escenario doméstico.
- source_word: וְלֹא כָל אִישׁ לְהָבִיא אֶל בַּיִת
  english_pob_choice: do not bring every person into your home
  chosen_spanish: no metas a cualquier persona en tu hogar
  alternatives_spanish:
  - no introduzcas a toda persona en tu casa
  - no admitas a cualquier persona en tu casa
  lexicon: HALOT
  rationale: La advertencia es contra la hospitalidad indiscriminada. «A cualquier persona» comunica bien el alcance general de אִישׁ sin volverlo torpe en español.
- source_word: אִישׁ
  english_pob_choice: person
  chosen_spanish: persona
  alternatives_spanish:
  - hombre
  - uno
  lexicon: HALOT
  rationale: Aunque el hebreo usa la forma masculina singular genérica, en español un genérico claro y fluido aquí es «persona». El sentido sigue siendo universal dentro de la instrucción sapiencial.
- source_word: אוֹרְבִים
  english_pob_choice: those who lie in wait
  chosen_spanish: acechan
  alternatives_spanish:
  - están al acecho
  - tienden emboscadas
  lexicon: HALOT
  rationale: El participio describe gente con intención hostil y oculta. «Acechan» conserva la imagen de estar al acecho sin sobrecargar el verso.
- source_word: נוֹכְלִים
  english_pob_choice: deceivers
  chosen_spanish: engañadores
  alternatives_spanish:
  - tramposos
  - embusteros
  - fraudulentos
  lexicon: HALOT
  rationale: El término remite a personas astutas y engañosas. «Engañadores» es amplio, fiel y idiomático en español.
theological_decisions:
- issue: Relación entre la versión hebrea y el paralelo griego
  english_pob_reading: The Hebrew text is primary, but the Greek parallel reads like an expanded warning about lodging an outsider who then throws one into turmoil and estranges one from one's own.
  chosen_spanish_reading: El texto principal sigue el hebreo transmitido, y la nota conserva el sentido ampliado del griego como lectura alternativa.
  alternative_spanish_readings:
  - «Aloja a un extranjero, y él te arrojará en turbulencias y te apartará de lo tuyo»
  - «Hospeda a un forastero, y te trastornará y te enajenará de tus bienes»
  rationale: La tradición hebrea es la base del texto principal, pero el paralelo griego ofrece una expansión importante que no debe borrarse. Por eso se mantiene como nota alternativa, no como redacción principal.
  doctrine_reference: Principio de crítica textual y preservación de variantes significativas
- issue: Advertencia sapiencial sobre hospitalidad indiscriminada
  english_pob_reading: Keep many out of your house, and do not bring every person into your home, for many lie in wait, and many are deceivers.
  chosen_spanish_reading: La advertencia se mantiene como instrucción prudencial, sin moralizar más allá del alcance del proverbio.
  alternative_spanish_readings:
  - leerla como prohibición absoluta de hospitalidad
  - leerla como consejo prudente contra la ingenuidad
  rationale: El verso expresa sabiduría práctica y cautela frente a personas peligrosas; no exige convertirlo en una norma universal contra toda hospitalidad. La formulación española conserva esa prudencia.
  doctrine_reference: Literatura sapiencial y prudencia moral
translation_notes:
  revision_awareness: Se siguió el hebreo como texto principal, en consonancia con el contexto auditado; el paralelo griego se preservó solo como lectura alternativa en nota, dado que amplía la advertencia sin desplazar la base hebrea. También se evitó una calca demasiado literal de «hombre» en español, optando por un genérico idiomático sin perder el alcance sapiencial.
  spanish_consistency_notes:
  - Se mantuvo «casa/hogar» con preferencia por «casa» en la imagen principal y «hogar» solo como variante posible, pero la redacción final usa «casa» por mayor cercanía al hebreo.
  - Se usó «engañadores» para conservar un registro claro y no excesivamente técnico.
  - No se introdujo «Mesías», «Yahvé» ni otros términos no presentes en este versículo.
  - La nota a preserva la tensión textual entre el hebreo y el griego sin fusionarlos en el cuerpo principal.
