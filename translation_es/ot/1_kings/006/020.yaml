base_translation:
  language: en
  yaml_path: translation/ot/1_kings/006/020.yaml
  text: In front of the inner sanctuary was twenty cubits in length[a], twenty cubits in width, and twenty cubits in its height. He overlaid it with pure gold[b], and he overlaid the cedar altar.
