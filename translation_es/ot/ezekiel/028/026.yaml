translation:
  language: es
  text: Habitarán en ella con seguridad, construirán casas y plantarán viñas. Habitarán con seguridad cuando yo ejecute juicios sobre todos los que están alrededor de ellos y los desprecian[a]. Entonces sabrán que yo soy Yahvé su Dios.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «los escarnecen».
    reason: lexical_alternative
lexical_decisions:
- source_word: וְיָשְׁבוּ עָלֶיהָ
  english_pob_choice: They will dwell on it
  chosen_spanish: Habitarán en ella
  alternatives_spanish:
  - Vivirán en ella
  - Se establecerán en ella
  lexicon: HALOT
  rationale: יׁשׁב expresa habitar, morar o establecerse; con el sufijo femenino singular referido a la tierra, «en ella» conserva la referencia espacial natural en español sin forzar un calco como «sobre ella».
- source_word: לָבֶטַח
  english_pob_choice: securely
  chosen_spanish: con seguridad
  alternatives_spanish:
  - seguramente
  - en seguridad
  lexicon: HALOT
  rationale: בטח comunica seguridad, ausencia de amenaza. «Con seguridad» es idiomático en español bíblico moderno y conserva la idea de vivir sin miedo; se repite en ambas mitades del versículo para mantener el énfasis.
- source_word: וּבָנוּ בָתִּים
  english_pob_choice: they will build houses
  chosen_spanish: construirán casas
  alternatives_spanish:
  - edificarán casas
  - construirán hogares
  lexicon: HALOT
  rationale: בָּתִּים son literalmente casas. «Construirán casas» es directo y formal; «hogares» suavizaría innecesariamente el sustantivo concreto.
- source_word: וְנָטְעוּ כְרָמִים
  english_pob_choice: plant vineyards
  chosen_spanish: plantarán viñas
  alternatives_spanish:
  - plantarán viñedos
  - plantarán viñas de vid
  lexicon: HALOT
  rationale: כְּרָמִים refiere a viñas o viñedos. En español bíblico, «plantarán viñas» es natural y suficientemente preciso para la imagen de prosperidad agrícola.
- source_word: וְיָשְׁבוּ לָבֶטַח
  english_pob_choice: They will dwell securely
  chosen_spanish: Habitarán con seguridad
  alternatives_spanish:
  - Vivirán con seguridad
  - Morarán con seguridad
  lexicon: HALOT
  rationale: Se conserva la repetición del verbo de habitar junto con el adverbial de seguridad, manteniendo el paralelismo y el peso retórico del hebreo.
- source_word: בַּעֲשׂוֹתִי שְׁפָטִים
  english_pob_choice: when I execute judgments
  chosen_spanish: cuando yo ejecute juicios
  alternatives_spanish:
  - cuando yo haga juicios
  - al ejecutar juicios
  lexicon: HALOT
  rationale: 'El infinitivo constructo con בּ puede marcar tiempo: «cuando». שְׁפָטִים aquí son actos judiciales divinos, por eso «juicios» preserva la forma plural y la acción de juicio sin convertirla en una abstracción general.'
- source_word: שְׁפָטִים
  english_pob_choice: judgments
  chosen_spanish: juicios
  alternatives_spanish:
  - sentencias
  - actos de juicio
  lexicon: HALOT
  rationale: En este contexto se trata de actos de sentencia contra los hostiles; «juicios» es la opción más directa y teológicamente transparente en español.
- source_word: בְּכֹל הַשָּׁאטִים אֹתָם
  english_pob_choice: on all those around them who treat them with contempt
  chosen_spanish: sobre todos los que, alrededor de ellos, los desprecian
  alternatives_spanish:
  - sobre todos los que los desprecian a su alrededor
  - sobre todos los que los desprecian y los rodean
  lexicon: HALOT
  rationale: שׁאט expresa desprecio, desdén o escarnio. «Los desprecian» comunica bien la hostilidad activa; el reordenamiento «alrededor de ellos» hace natural en español la relación espacial que el hebreo expresa con más compactación.
- source_word: מִסְּבִיבוֹתָם
  english_pob_choice: all around them
  chosen_spanish: alrededor de ellos
  alternatives_spanish:
  - en torno a ellos
  - por todas partes a su alrededor
  lexicon: HALOT
  rationale: La frase señala pueblos circundantes. «Alrededor de ellos» conserva el sentido geográfico sin añadir ambigüedad.
- source_word: וְיָדְעוּ כִּי אֲנִי יְהוָה אֱלֹהֵיהֶם
  english_pob_choice: Then they will know that I am Yahweh their God
  chosen_spanish: Entonces sabrán que yo soy Yahvé, su Dios
  alternatives_spanish:
  - Y sabrán que yo soy Yahvé, su Dios
  - Entonces reconocerán que yo soy Yahvé, su Dios
  lexicon: HALOT
  rationale: וְיָדְעוּ introduce conocimiento reconocido a partir de la acción de Dios. «Sabrán» mantiene la fórmula profética. יְהוָה se rinde como «Yahvé» según la convención del proyecto, y אֱלֹהֵיהֶם como «su Dios» para conservar el vínculo pactual.
theological_decisions:
- issue: Traducción del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - Jehová
  rationale: El texto hebreo nombra explícitamente a יְהוָה. En el marco del proyecto, se preserva el nombre propio divino como «Yahvé» en lugar de ocultarlo tras una mayúscula convencional o una forma confesional posterior.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Mantenimiento de la repetición de seguridad
  english_pob_reading: Preserve the repetition ('dwell securely' ... 'dwell securely')
  chosen_spanish_reading: Repetir «con seguridad» / «Habitarán con seguridad»
  alternative_spanish_readings:
  - condensar la segunda mención
  - variar con un sinónimo para evitar repetición
  rationale: El hebreo repite la fórmula para subrayar la restauración y el contraste con el juicio. La traducción conserva esa repetición en lugar de suavizarla estilísticamente.
  doctrine_reference: 'DOCTRINE.md Translation philosophy #5 (consistency of key terms)'
- issue: Valor de שְׁפָטִים en el contexto
  english_pob_reading: judgments
  chosen_spanish_reading: juicios
  alternative_spanish_readings:
  - sentencias
  - castigos
  rationale: Aquí el plural apunta a actos judiciales divinos sobre los hostiles circundantes. «Juicios» mantiene la carga forense y no reduce el pasaje a mera retribución emocional.
  doctrine_reference: HALOT; contexto profético-judicial de Ezequiel
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión más reciente del audit trail inglés, que reordenó la cláusula relativa para hacerla más natural sin cambiar el sentido. La versión española adopta ese orden natural («sobre todos los que, alrededor de ellos, los desprecian») y mantiene sin cambios sustantivos los núcleos léxicos y teológicos.
  spanish_consistency_notes:
  - Se usa «Yahvé» de manera consistente para יְהוָה, conforme al estándar del proyecto.
  - Se preserva la repetición de «con seguridad» para reflejar el paralelismo hebreo.
  - «Habitarán» se mantiene en ambas ocurrencias de וְיָשְׁבוּ para sostener la cohesión léxica.
  - «Juicios» y no «justicia» refleja aquí el carácter judicial/punitivo del contexto.
  - La nota al pie [a] se ancla en «desprecian» porque el hebreo admite matices de desprecio, escarnio o desdén.
