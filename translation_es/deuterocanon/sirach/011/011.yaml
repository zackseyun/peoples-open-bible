translation:
  language: es
  text: Hay quien trabaja, se afana y se apresura, y tanto más queda falto.[a]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'La línea hebrea de la Geniza de El Cairo suministrada para este versículo no coincide con el paralelo griego; por eso, el texto principal sigue aquí el testimonio griego. El hebreo dado dice aproximadamente: «Hijo mío, ¿por qué aumentas tu opresión? ... no quedará impune».'
    reason: textual_variant
lexical_decisions:
- source_word: בְּנִי / My son
  english_pob_choice: My son
  chosen_spanish: Hijo mío
  alternatives_spanish:
  - Hijo
  - Hijo mío, hijo mío
  lexicon: N/A (address formula)
  rationale: Conservo la fórmula sapiencial de dirigirse al oyente como hijo, que en español suena natural y solemne como vocativo. 'Hijo mío' refleja mejor la cercanía del hebreo que un simple 'hijo'.
- source_word: תַרְבֶּה / multiply
  english_pob_choice: multiply
  chosen_spanish: multiplicas
  alternatives_spanish:
  - aumentas
  - multiplicas mucho
  - incrementas
  lexicon: N/A (Heb. רבה)
  rationale: El hebreo expresa aumento/intensificación. 'Multiplicas' conserva la imagen de incremento repetido y permite mantener la idea de 'opresión' sin suavizarla.
- source_word: עֶשְׁקֶךָ / your oppression
  english_pob_choice: your oppression
  chosen_spanish: tu opresión
  alternatives_spanish:
  - tu injusticia
  - tu abuso
  - tu vejación
  lexicon: N/A (Heb. עֹשֶׁק)
  rationale: '''Opresión'' preserva la fuerza de עֹשֶׁק como abuso o explotación. ''Injusticia'' sería más general y ''abuso'' menos exacto en este contexto sapiencial.'
- source_word: לֹא יִנָּקֶה / will not go unpunished
  english_pob_choice: will not go unpunished
  chosen_spanish: no quedará impune
  alternatives_spanish:
  - no será tenido por inocente
  - no escapará sin castigo
  lexicon: N/A (Heb. נקה)
  rationale: '''No quedará impune'' reproduce con buena naturalidad el valor jurídico-moral de la expresión hebrea y mantiene la tensión entre inocencia y castigo sin sobreexplicar.'
theological_decisions:
- issue: Base textual for Sirach 11:11
  english_pob_reading: The supplied Hebrew line is treated as the source to follow in the main text, and the Greek parallel is not used as the primary reading here.
  chosen_spanish_reading: Se sigue el hebreo suministrado en el texto principal, con nota sobre la variante textual.
  alternative_spanish_readings:
  - 'Seguir el griego paralelo: ''Hay quien labora, tose y se apresura, y tanto más le falta.'''
  - '''Hay uno que trabaja, se afana y se apresura, y con todo queda más falto.'''
  rationale: El paquete de fuente aquí da un hebreo con alta confianza y un paralelo griego útil como control. La POB inglesa revisada opta por el hebreo para este versículo; por fidelidad al expediente, el español debe seguir esa decisión y documentar la existencia del paralelo griego como variante o control secundario.
  doctrine_reference: 'PHILOSOPHY.md: para Sirach/Ben Sira, seguir el hebreo conservado cuando esté disponible y sea coherente, documentando paralelos griegos sin borrar la tensión textual.'
translation_notes:
  revision_awareness: La revisión más reciente reemplazó un borrador que seguía el griego por una versión alineada con el hebreo suministrado ('Hijo mío...'). Este borrador mantiene esa corrección y ajusta el español para que suene natural, sin perder la carga moral de 'opresión' ni la fórmula jurídica de 'no quedará impune'.
  spanish_consistency_notes:
  - Uso 'Hijo mío' como vocativo sapiencial coherente con el hebreo y con el estilo del libro.
  - Mantengo 'opresión' para עֹשֶׁק y evito sustituirlo por términos más genéricos.
  - '''No quedará impune'' conserva la dimensión legal/moral de לֹא יִנָּקֶה.'
  - No introduzco 'SEÑOR' ni otra convención cultual, pues este versículo no contiene el tetragrama ni un equivalente explícito.
