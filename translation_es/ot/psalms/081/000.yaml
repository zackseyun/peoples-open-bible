translation:
  language: es
  text: 'Para el director del coro: según la Gitit[a]. De Asaf.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebreo Gittith. El término probablemente se refiere a un arreglo musical, un instrumento o el nombre de una melodía; su significado preciso es incierto. Entre las posibilidades, podría estar asociado con Gat.
    reason: lexical_alternative
lexical_decisions:
- source_word: לַמְנַצֵּחַ
  english_pob_choice: For the choir director
  chosen_spanish: Para el director del coro
  alternatives_spanish:
  - Para el músico director
  - Para el maestro de coro
  lexicon: HALOT
  rationale: En los encabezados de los salmos, esta forma con ל suele indicar dirección para quien supervisa la ejecución musical. «Director del coro» conserva la función y es natural en español bíblico contemporáneo.
- source_word: עַל
  english_pob_choice: according to
  chosen_spanish: según
  alternatives_spanish:
  - con arreglo a
  - sobre
  lexicon: HALOT
  rationale: En un superscrito que introduce un nombre de melodía o designación musical, la relación no es espacial. «Según» reproduce bien la función de referencia a un patrón musical sin forzar un significado literal de «sobre».
- source_word: הַגִּתִּית
  english_pob_choice: the Gittith
  chosen_spanish: la Guitit
  alternatives_spanish:
  - la guitit
  - la Guitita
  - el instrumento de Gat
  lexicon: HALOT
  rationale: 'Se mantiene la transliteración porque el referente exacto es incierto: puede ser un instrumento, una melodía o una designación asociada con Gat. La forma castellana «Guitit» preserva el término hebreo sin decidir indebidamente su sentido.'
- source_word: לְאָסָף
  english_pob_choice: Of Asaph
  chosen_spanish: De Asaf
  alternatives_spanish:
  - Para Asaf
  - Perteneciente a Asaf
  lexicon: HALOT
  rationale: En los encabezados de salmos, ל con un nombre propio puede señalar autoría, asociación o colección. «De Asaf» conserva esa ambigüedad mejor que optar por una sola lectura como «por» o «para».
translation_notes:
  revision_awareness: La revisión en inglés solo normalizó la mayúscula de the Gittith a the Gittith en el texto final; no alteró la sustancia. La presente versión conserva esa misma decisión de transliterar el término y mantener la ambigüedad del encabezado.
  spanish_consistency_notes:
  - Se usa «Yahvé» en este proyecto cuando aparece el nombre divino; aquí no aplica.
  - Se evitó «SEÑOR» para no enmascarar el término hebreo cuando no corresponde.
  - «Asaf» se mantiene como forma española estable del nombre propio.
  - La puntuación con dos puntos tras «coro» refleja el estilo de encabezado poético en español.
  - Se conservó la ambigüedad funcional del superscrito, sin añadir información de autoría más allá de lo que permite el hebreo.
