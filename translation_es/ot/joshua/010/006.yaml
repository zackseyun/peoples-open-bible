translation:
  language: es
  text: 'Entonces los hombres de Gibeón enviaron a Josué, al campamento de Gilgal, diciendo: «No apartes[a] tu mano de tus siervos. Sube pronto hacia nosotros, y sálvanos y ayúdanos, porque se han reunido contra nosotros todos los reyes de los amorreos que habitan en la región montañosa».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «No apartes tu mano de tus siervos», un giro idiomático que significa «no dejes de apoyarnos» o «no nos abandones».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּשְׁלְחוּ
  english_pob_choice: sent
  chosen_spanish: enviaron
  alternatives_spanish:
  - mandaron
  - despacharon
  lexicon: HALOT
  rationale: El verbo narrativo de envío se vierte de forma natural con «enviaron», manteniendo el avance secuencial del relato sin añadir matices innecesarios.
- source_word: אַנְשֵׁי גִבְעוֹן
  english_pob_choice: the men of Gibeon
  chosen_spanish: los hombres de Gibeón
  alternatives_spanish:
  - la gente de Gibeón
  - los representantes de Gibeón
  lexicon: HALOT
  rationale: אַנְשֵׁי es literalmente «hombres de». Se conserva esa forma masculina y concreta, como en la lectura inglesa auditada.
- source_word: אֶל יְהוֹשֻׁעַ
  english_pob_choice: to Joshua
  chosen_spanish: a Josué
  alternatives_spanish:
  - para Josué
  lexicon: HALOT
  rationale: La preposición de dirección se expresa simplemente con «a», que es la forma más directa y natural en español.
- source_word: אֶל הַמַּחֲנֶה הַגִּלְגָּלָה
  english_pob_choice: to the camp at Gilgal
  chosen_spanish: al campamento en Gilgal
  alternatives_spanish:
  - al campamento de Gilgal
  - al campamento de Gilgal allí
  lexicon: HALOT
  rationale: Se mantiene el referente locativo del campamento y la vinculación con Gilgal en un español idiomático. «En Gilgal» conserva la localización sin forzar el valor direccional del hebreo.
- source_word: אַל תֶּרֶף יָדֶיךָ מֵעֲבָדֶיךָ
  english_pob_choice: Do not withdraw your hand from your servants
  chosen_spanish: No apartes tu mano de tus siervos
  alternatives_spanish:
  - No retires tu mano de tus siervos
  - No retires tu ayuda de tus siervos
  - No abandones a tus siervos
  lexicon: HALOT
  rationale: Se conserva la imagen idiomática de la mano, que en español puede decirse con naturalidad como «apartar la mano». «Apartes» expresa la idea de cesar el apoyo sin perder la transparencia al hebreo.
- source_word: עֲבָדֶיךָ
  english_pob_choice: your servants
  chosen_spanish: tus siervos
  alternatives_spanish:
  - tus esclavos
  lexicon: HALOT
  rationale: Aquí el término es una autoidentificación deferente hacia Josué, no una referencia a esclavitud literal. «Siervos» mantiene el matiz de subordinación respetuosa que el contexto exige.
- source_word: עֲלֵה אֵלֵינוּ מְהֵרָה
  english_pob_choice: Come up to us quickly
  chosen_spanish: Sube a nosotros pronto
  alternatives_spanish:
  - Sube rápidamente a nosotros
  - Ven a nosotros pronto
  lexicon: HALOT
  rationale: «Sube» conserva el valor topográfico del verbo עלה desde la perspectiva de quienes hablan desde el campamento hacia la región alta. «Pronto» expresa la urgencia de מְהֵרָה.
- source_word: וְהוֹשִׁיעָה לָּנוּ
  english_pob_choice: save us
  chosen_spanish: y sálvanos
  alternatives_spanish:
  - y líbranos
  - y rescátanos
  lexicon: HALOT
  rationale: ישע en este contexto militar se traduce con «salvar»/«rescatar». Se conserva «sálvanos» por su relación directa con el léxico bíblico de liberación.
- source_word: וְעָזְרֵנוּ
  english_pob_choice: help us
  chosen_spanish: y ayúdanos
  alternatives_spanish:
  - y socórrenos
  - y danos ayuda
  lexicon: HALOT
  rationale: La petición paralela de ayuda se expresa con el verbo común y claro «ayúdanos», sin rebajar la fuerza de la súplica.
- source_word: כָּל מַלְכֵי הָאֱמֹרִי
  english_pob_choice: all the kings of the Amorites
  chosen_spanish: todos los reyes de los amorreos
  alternatives_spanish:
  - todos los reyes amorreos
  - todos los monarcas de los amorreos
  lexicon: HALOT
  rationale: Se conserva la estructura del hebreo y el término étnico tradicional «amorreos», con un orden español claro y formal.
- source_word: יֹשְׁבֵי הָהָר
  english_pob_choice: who live in the hill country
  chosen_spanish: que habitan en la región montañosa
  alternatives_spanish:
  - que viven en la región montañosa
  - habitantes de la región montañosa
  - que habitan en la serranía
  lexicon: HALOT
  rationale: El participio de residencia se vierte con «habitan». «Región montañosa» comunica el sentido de הָהָר como zona alta sin limitarlo a una sola montaña.
theological_decisions:
- issue: Tratamiento de יהוה / YHWH no aparece explícitamente en este versículo, pero el texto contiene una súplica de auxilio con lenguaje de alianza.
  english_pob_reading: The English POB does not mask YHWH here and keeps the verse's direct appeal to Joshua in the historical narrative.
  chosen_spanish_reading: No se introduce ninguna sustitución reverencial; el verso queda como petición directa a Josué dentro del relato histórico.
  alternative_spanish_readings:
  - Introducir una nota teológica sobre la ayuda divina implícita
  - Reformular la súplica con lenguaje devocional
  rationale: El hebreo no nombra a Yahvé en este versículo. Por tanto, no corresponde proyectar lenguaje teológico no explicitado en la línea principal. La forma directa preserva el nivel narrativo del pasaje.
  doctrine_reference: Transparencia textual / principio de no sobreinterpretación
- issue: עֲבָדֶיךָ como relación de subordinación respetuosa frente a Josué.
  english_pob_reading: your servants
  chosen_spanish_reading: tus siervos
  alternative_spanish_readings:
  - tus esclavos
  - tus servidores
  rationale: Aunque el término puede abarcar esclavo/siervo, aquí funciona como autoidentificación deferente. «Siervos» conserva la relación de dependencia sin introducir una esclavitud social que el contexto no enfatiza.
  doctrine_reference: Lexical force / deferential address
- issue: אַל תֶּרֶף יָדֶיךָ as idiom of support rather than literal hand withdrawal.
  english_pob_reading: Do not withdraw your hand from your servants
  chosen_spanish_reading: No apartes tu mano de tus siervos
  alternative_spanish_readings:
  - No retires tu mano de tus siervos
  - No abandones a tus siervos
  - No dejes de ayudarnos
  rationale: Se mantiene la imagen corporal y el sentido idiomático. «Apartes» comunica cese de apoyo, evitando una paráfrasis excesiva que borre la metáfora hebrea.
  doctrine_reference: Idiomatic preservation / semantic transparency
- issue: וְהוֹשִׁיעָה לָּנוּ and וְעָזְרֵנוּ as paired rescue-and-help request.
  english_pob_reading: save us and help us
  chosen_spanish_reading: sálvanos y ayúdanos
  alternative_spanish_readings:
  - líbranos y ayúdanos
  - rescátanos y socórrenos
  rationale: Se conserva la doble petición sin fusionarla. «Salvar» y «ayudar» reflejan dos verbos distintos del hebreo, manteniendo la acumulación retórica.
  doctrine_reference: Parallelism preservation
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión más reciente del inglés, que prefirió «withdraw your hand» sobre «relax your hand» por mayor precisión idiomática. La versión española conserva la imagen de la mano y la convierte en un equivalente natural («No apartes tu mano»), alineado con esa revisión.
  spanish_consistency_notes:
  - Se mantuvo «Josué» como forma española estable del nombre propio.
  - Se evitó traducir «Gilgal» o «amorreos» por perífrasis explicativas para no perder trazabilidad textual.
  - La nota al pie se ancla en «No apartes» para transparentar el hebraísmo sin sobrecargar el cuerpo del verso.
  - «Región montañosa» se eligió para reflejar el sentido geográfico de הָהָר sin sonar demasiado técnico.
