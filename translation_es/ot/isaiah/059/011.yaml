translation:
  language: es
  text: Todos nosotros gruñimos como osos, y como palomas gemimos continuamente; esperamos[a] justicia, pero no la hay; esperamos salvación[b], pero está lejos de nosotros.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «aguardamos justicia» / «buscamos justicia»; el verbo hebreo puede expresar tanto esperar como esperar con esperanza.
    reason: lexical_alternative
  - marker: b
    text: O «liberación» para «salvación».
    reason: lexical_alternative
lexical_decisions:
- source_word: נֶהֱמֶה
  english_pob_choice: growl
  chosen_spanish: gruñimos
  alternatives_spanish:
  - rugimos
  - gemimos
  lexicon: HALOT
  rationale: El verbo hebreo expresa un sonido fuerte y gutural de queja o gruñido; en español, «gruñimos» conserva mejor la imagen animal del símil con osos que «gemimos», y es más fiel al matiz sonoro que «rugimos».
- source_word: כַדֻּבִּים
  english_pob_choice: like bears
  chosen_spanish: como osos
  alternatives_spanish:
  - como osas
  - como osos salvajes
  lexicon: HALOT
  rationale: La comparación es directa y colectiva; «osos» reproduce con naturalidad el plural del hebreo y mantiene la imagen sin añadir especificaciones no presentes en el texto.
- source_word: כֻּלָּנוּ
  english_pob_choice: we all
  chosen_spanish: todos nosotros
  alternatives_spanish:
  - todos
  - nosotros todos
  lexicon: HALOT
  rationale: Se conserva el valor colectivo enfático de כֻּלָּנוּ; «todos nosotros» es natural en español y refleja el énfasis inclusivo del hebreo.
- source_word: וְכַיּוֹנִים
  english_pob_choice: and like doves
  chosen_spanish: y como palomas
  alternatives_spanish:
  - y como tórtolas
  - y como dove
  lexicon: HALOT
  rationale: «Palomas» comunica bien la imagen en español general y sigue de cerca el paralelismo del texto; «tórtolas» sería más específico, pero no necesario aquí.
- source_word: הָגֹה נֶהְגֶּה
  english_pob_choice: we moan continually
  chosen_spanish: gemimos continuamente
  alternatives_spanish:
  - gemimos y gemimos
  - seguimos gimiendo
  - lamentamos continuamente
  lexicon: HALOT
  rationale: La construcción de infinitivo absoluto + verbo finito intensifica la acción. «Gemimos continuamente» transmite la idea de repetición o continuidad sin sonar forzado en español, conservando el lamento insistente del hebreo.
- source_word: נְקַוֶּה
  english_pob_choice: we hope for
  chosen_spanish: esperamos
  alternatives_spanish:
  - esperamos en
  - aguardamos
  - anhelamos
  lexicon: HALOT
  rationale: En este contexto de expectativa frustrada, קוה puede expresar esperar/aguardar. «Esperamos» recoge el sentido básico y permite la nota sobre la alternativa de lectura esperanzada o de espera.
- source_word: לַמִּשְׁפָּט
  english_pob_choice: justice
  chosen_spanish: justicia
  alternatives_spanish:
  - juicio
  - fallo
  lexicon: HALOT
  rationale: Aquí מִשְׁפָּט apunta al orden justo o a la justicia vindicadora esperada, no solo a un veredicto judicial; por eso «justicia» es la opción más clara y adecuada.
- source_word: וָאַיִן
  english_pob_choice: but there is none
  chosen_spanish: y no hay ninguna
  alternatives_spanish:
  - pero no hay ninguna
  - y no existe
  lexicon: HALOT
  rationale: La cláusula expresa la ausencia decepcionante del resultado esperado. «Y no hay ninguna» mantiene la sencillez del hebreo; el matiz adversativo queda ya claro por el contraste del contexto.
- source_word: לִישׁוּעָה
  english_pob_choice: salvation
  chosen_spanish: salvación
  alternatives_spanish:
  - liberación
  - rescate
  lexicon: HALOT
  rationale: יִשׁוּעָה puede referirse a rescate concreto o a salvación en sentido amplio. «Salvación» conserva mejor la amplitud teológica del término en Isaías, sin excluir la idea de liberación.
- source_word: רָחֲקָה מִמֶּנּוּ
  english_pob_choice: it is far from us
  chosen_spanish: está lejos de nosotros
  alternatives_spanish:
  - permanece lejos de nosotros
  - se ha alejado de nosotros
  lexicon: HALOT
  rationale: La frase describe la lejanía de la salvación respecto de los hablantes. «Está lejos de nosotros» es una formulación natural y fiel que requiere menos añadidura que una traducción más literal.
theological_decisions:
- issue: Valor de יְשׁוּעָה en un lamento profético
  english_pob_reading: salvation
  chosen_spanish_reading: salvación
  alternative_spanish_readings:
  - liberación
  - rescate
  rationale: Se mantiene «salvación» para conservar la amplitud profética y teológica del término en Isaías. Aunque el contexto inmediato admite la noción de rescate, la formulación amplia evita reducir el alcance del texto.
  doctrine_reference: Translation philosophy §5; término no restringido por glosas doctrinales previas
- issue: Intensificación de הָגֹה נֶהְגֶּה
  english_pob_reading: we moan continually
  chosen_spanish_reading: gemimos continuamente
  alternative_spanish_readings:
  - gemimos y gemimos
  - seguimos gimiendo
  rationale: La construcción hebrea intensifica la acción; en español, «gemimos continuamente» comunica continuidad e insistencia sin perder dignidad estilística ni convertir la línea en una repetición mecánica.
  doctrine_reference: 'Poética hebrea: infinitivo absoluto con verbo finito'
translation_notes:
  revision_awareness: La redacción sigue de cerca el texto hebreo y toma en cuenta el ajuste reciente del POB inglés («moan continually») para reflejar mejor la intensificación del infinitivo absoluto con verbo finito, evitando una repetición demasiado literal en español.
  spanish_consistency_notes:
  - Se preserva «salvación» como término teológico amplio, coherente con el tratamiento del POB en inglés.
  - Se usa «justicia» para מִשְׁפָּט en un contexto de vindicación esperada.
  - Se mantiene un registro bíblico moderno y digno, evitando arcaísmos innecesarios.
  - Los corchetes de nota en el texto marcan solo alternativas relevantes, sin sobrecargar la línea principal.
