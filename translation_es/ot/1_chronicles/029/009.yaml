translation:
  language: es
  text: Entonces el pueblo se alegró por haber ofrecido voluntariamente[a], porque con corazón íntegro[b] habían ofrecido voluntariamente a Yahvé; y también David, el rey, se alegró con gran gozo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «por su ofrenda voluntaria»; el hebreo subraya el carácter libre y voluntario de la entrega.'
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: «con un corazón entero»; la expresión indica integridad, sinceridad y devoción no dividida.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּשְׂמְחוּ
  english_pob_choice: Then ... rejoiced
  chosen_spanish: se alegró
  alternatives_spanish:
  - se regocijó
  - se llenó de alegría
  lexicon: HALOT
  rationale: El verbo hebreo expresa alegría intensa en narración. «Se alegró» es natural en español y conserva el tono narrativo sin perder la fuerza del original.
- source_word: הָעָם
  english_pob_choice: the people
  chosen_spanish: el pueblo
  alternatives_spanish:
  - la gente
  - el pueblo reunido
  lexicon: HALOT
  rationale: En este contexto de comunidad congregada, «el pueblo» comunica bien la asamblea de Israel y mantiene la referencia colectiva.
- source_word: עַל הִתְנַדְּבָם
  english_pob_choice: because they had offered willingly
  chosen_spanish: por haber ofrecido voluntariamente
  alternatives_spanish:
  - porque se habían ofrecido voluntariamente
  - por su ofrenda voluntaria
  lexicon: HALOT
  rationale: La construcción expresa la causa del gozo y el verbo נדב enfatiza la ofrenda libre y voluntaria. «Ofrecido voluntariamente» preserva esa fuerza y su relación con la contribución cultual.
- source_word: בְּלֵב שָׁלֵם
  english_pob_choice: with a whole heart
  chosen_spanish: corazón íntegro
  alternatives_spanish:
  - con corazón entero
  - con un corazón completo
  - de corazón íntegro
  lexicon: HALOT
  rationale: La imagen hebrea de integridad e indivisión se conserva con «corazón íntegro». Es una forma natural en español y mantiene el matiz de sinceridad, unidad interior e integridad moral.
- source_word: הִתְנַדְּבוּ
  english_pob_choice: they had offered willingly
  chosen_spanish: se habían ofrecido voluntariamente
  alternatives_spanish:
  - habían ofrecido voluntariamente
  - se habían dado voluntariamente
  lexicon: HALOT
  rationale: Se repite el mismo verbo con el mismo sentido de ofrenda libre. En español, el reflexivo ayuda a expresar la entrega voluntaria sin añadir contenido ajeno al texto.
- source_word: לַיהוָה
  english_pob_choice: to Yahweh
  chosen_spanish: a Yahvé
  alternatives_spanish:
  - a Yahveh
  - al SEÑOR
  lexicon: HALOT
  rationale: El Tetragrama se vierte según la terminología del proyecto como «Yahvé», preservando el nombre divino del texto hebreo sin sustituirlo por un título genérico.
- source_word: וְגַם
  english_pob_choice: and ... also
  chosen_spanish: y también
  alternatives_spanish:
  - también
  - y además
  lexicon: HALOT
  rationale: La partícula añade a David al cuadro de gozo común; «y también» conserva la suma enfática de forma natural.
- source_word: דָּוִיד הַמֶּלֶךְ
  english_pob_choice: David the king
  chosen_spanish: David, el rey
  alternatives_spanish:
  - el rey David
  - David el rey
  lexicon: HALOT
  rationale: El hebreo presenta un aposición clara. «David, el rey» respeta esa estructura y suena natural en español.
- source_word: שָׂמַח שִׂמְחָה גְדוֹלָה
  english_pob_choice: rejoiced with great joy
  chosen_spanish: se alegró con gran gozo
  alternatives_spanish:
  - se regocijó con gran alegría
  - se alegró muchísimo
  lexicon: HALOT
  rationale: 'Se conserva el intensivo hebreo mediante una repetición afín de raíz/sentido: el verbo de alegría más el sustantivo «gozo». «Gran gozo» mantiene la fuerza enfática sin sonar forzado.'
theological_decisions:
- issue: Traducción del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahveh
  - SEÑOR
  rationale: Se sigue la convención del proyecto para el Nombre divino, preservando el Tetragrama como nombre propio y no como un sustituto titular. «Yahvé» es la forma establecida para la edición española.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Valor de בְּלֵב שָׁלֵם
  english_pob_reading: with a whole heart
  chosen_spanish_reading: corazón íntegro
  alternative_spanish_readings:
  - con corazón entero
  - con un corazón completo
  rationale: La frase no describe solo emoción, sino integridad y sinceridad indivisa ante Dios. «Corazón íntegro» conserva esa tensión ética y cultual sin reducirla a un mero sentimiento.
  doctrine_reference: 'DOCTRINE.md: Hebrew idioms — inner wholeness and undivided devotion'
translation_notes:
  revision_awareness: La versión inglesa auditada pasó de «given willingly» a «offered willingly» para reflejar mejor la ofrenda voluntaria; la redacción española ya incorpora «ofrecido voluntariamente» en ambas ocurrencias, manteniendo ese ajuste de sentido. También se preservó la estructura enfática final con un giro natural en español («gran gozo»).
  spanish_consistency_notes:
  - Se mantuvo Yahvé para יְהוָה, conforme al estándar del proyecto.
  - «Ofrecido voluntariamente» traduce consistentemente הִתְנַדְּבוּ / הִתְנַדְּבָם en ambas apariciones.
  - La cláusula final conserva la intensificación hebrea del cognado alegría/gozo sin una paráfrasis excesiva.
  - «Corazón íntegro» refleja la equivalencia funcional de בְּלֵב שָׁלֵם y evita el calco rígido.
