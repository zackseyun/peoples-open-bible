    changes_summary: Replaced 'what was spattered on it' with 'that on which it was spattered' to more directly reflect the Hebrew construction referring to the garment upon which the blood was spattered.
translation:
  language: es
  text: Todo lo que toque su carne quedará santo,[a] y si algo de su sangre salpica[b] sobre una vestidura, lavarás la parte de la vestidura sobre la cual salpique, en un lugar santo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'será santo'. El hebreo expresa que entra en un estado de santidad ritual por contacto con la ofrenda.
    reason: lexical_alternative
  - marker: b
    text: O 'es rociada' u 'asperjada'. El verbo hebreo puede denotar aspersión ritual, pero aquí 'salpica' encaja mejor porque la sangre cae sobre una vestidura y luego debe lavarse.
    reason: lexical_alternative
lexical_decisions:
- source_word: כֹּל אֲשֶׁר
  english_pob_choice: Anything that
  chosen_spanish: Todo lo que
  alternatives_spanish:
  - Cualquiera que
  - Todo aquello que
  lexicon: HALOT
  rationale: La construcción es inclusiva e indefinida. En español, 'Todo lo que' suena natural y conserva el alcance general del hebreo sin personalizarlo innecesariamente.
- source_word: יִגַּע בִּבְשָׂרָהּ
  english_pob_choice: touches its flesh
  chosen_spanish: toque su carne
  alternatives_spanish:
  - toque su cuerpo
  - toque su carne sacrificial
  lexicon: HALOT
  rationale: '''Carne'' preserva el término concreto בשר y mantiene el matiz cultual. ''Su'' refleja el sufijo femenino del sacrificio. ''Cuerpo'' sería menos preciso en este contexto sacrificial.'
- source_word: יִקְדָּשׁ
  english_pob_choice: shall become holy
  chosen_spanish: será santo
  alternatives_spanish:
  - quedará santo
  - será consagrado
  lexicon: HALOT
  rationale: En español, 'será santo' expresa el estado resultante sin introducir una ceremonia distinta. Aunque 'santo' puede sonar más adjetival que verbal, aquí comunica adecuadamente la santidad ritual conferida por contacto.
- source_word: יִזֶּה מִדָּמָהּ
  english_pob_choice: any of its blood is spattered
  chosen_spanish: algo de su sangre es rociado
  alternatives_spanish:
  - algo de su sangre es salpicado
  - algo de su sangre es asperjado
  lexicon: HALOT
  rationale: '''Rociado'' conserva la ambigüedad del verbo hebreo entre aspersión ritual y dispersión de gotas. Evita imponer un matiz accidental demasiado fuerte y sigue siendo comprensible en español bíblico moderno.'
- source_word: עַל הַבֶּגֶד
  english_pob_choice: on a garment
  chosen_spanish: sobre una vestidura
  alternatives_spanish:
  - sobre un vestido
  - sobre una prenda
  lexicon: HALOT
  rationale: '''Vestidura'' es más amplio y más digno que ''vestido'', y se ajusta mejor al lenguaje cultual. ''Prenda'' sería más coloquial.'
- source_word: אֲשֶׁר יִזֶּה עָלֶיהָ
  english_pob_choice: that on which it was spattered
  chosen_spanish: aquello sobre lo cual fue rociado
  alternatives_spanish:
  - lo que fue rociado sobre ella
  - aquello sobre el cual fue salpicado
  lexicon: HALOT
  rationale: La relativa hebrea apunta a la vestidura como el objeto afectado. 'Aquello sobre lo cual fue rociado' refleja la relación sintáctica sin perder claridad en español.
- source_word: תְּכַבֵּס
  english_pob_choice: you shall wash
  chosen_spanish: lavarás
  alternatives_spanish:
  - deberás lavar
  - la lavarás
  lexicon: HALOT
  rationale: El imperfecto yusivo/instructivo se puede verter naturalmente con futuro mandatorio en español. 'Lavarás' mantiene la fuerza legal directa del mandato.
- source_word: בְּמָקוֹם קָדֹשׁ
  english_pob_choice: in a holy place
  chosen_spanish: en un lugar santo
  alternatives_spanish:
  - en un lugar sagrado
  - en el lugar santo
  lexicon: HALOT
  rationale: La frase no exige 'el' lugar santo; 'un lugar santo' preserva el sentido de espacio consagrado sin sobreespecificar el recinto. 'Santo' conserva el registro bíblico.
theological_decisions:
- issue: Santidad por contacto con la ofrenda por el pecado
  english_pob_reading: Contact with the offering's flesh conveys sanctity/holy status to the thing or person touching it.
  chosen_spanish_reading: El contacto transmite santidad ritual al que toca la ofrenda.
  alternative_spanish_readings:
  - El contacto lo consagra moralmente
  - El contacto lo separa para uso sagrado
  rationale: El contexto es cultual y legal, no moral. 'Será santo' debe leerse como santidad ritual o de estado, no como transformación ética interior. La formulación española mantiene esa tensión sin resolverla de forma reductiva.
  doctrine_reference: Levítico 6:20; santidad ritual/cultual
translation_notes:
  revision_awareness: 'La redacción sigue el texto hebreo directo y toma en cuenta la revisión inglesa más reciente, que precisó la relación de la relativa: la vestidura es ‘aquello sobre lo cual fue rociado’. También se preserva la tensión léxica del verbo יזה sin forzar exclusivamente el sentido técnico de ‘asperjar’.'
  spanish_consistency_notes:
  - Se usa 'Yahvé' según la terminología base del proyecto, aunque este versículo no contiene el tetragrámaton.
  - Se traduce בשר como 'carne' por coherencia cultual con la ofrenda.
  - Se conserva el registro legal-litúrgico con futuro mandatorio ('lavarás').
  - '''Lugar santo'' se deja sin artículo definido para no sobrecargar la localización.'
