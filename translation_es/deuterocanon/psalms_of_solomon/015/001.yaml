translation:
  language: es
  text: Cuando estaba en angustia[a], invoqué el nombre del Señor; esperé ayuda de parte del Dios de Jacob[b], y fui salvo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Cuando estaba afligido».'
    reason: lexical_alternative
  - marker: b
    text: 'O: «puse mi esperanza en el auxilio del Dios de Jacob».'
    reason: lexical_alternative
lexical_decisions:
- source_word: Ἐν τῷ θλίβεσθαί με
  english_pob_choice: When I was in distress
  chosen_spanish: Cuando estaba en angustia
  alternatives_spanish:
  - Cuando estaba afligido
  - En mi aflicción
  lexicon: BDAG
  rationale: La construcción temporal con infinitivo articular se expresa naturalmente con «Cuando estaba…». θλίβω/θλίβομαι aquí comunica presión, aflicción o angustia; «angustia» es idiomático en español y conserva el sentido de opresión.
- source_word: ἐπεκαλεσάμην
  english_pob_choice: I called on
  chosen_spanish: invoqué
  alternatives_spanish:
  - llamé a
  - clamé a
  - invocé
  lexicon: BDAG
  rationale: El medio de ἐπικαλέομαι implica apelar o invocar en un contexto de oración. «Invoqué» conserva con precisión el carácter religioso de la apelación sin sonar rígido.
- source_word: τὸ ὄνομα Κυρίου
  english_pob_choice: the name of the Lord
  chosen_spanish: el nombre del Señor
  alternatives_spanish:
  - el nombre de Yahvé
  - el nombre del Señor Yahvé
  lexicon: BDAG
  rationale: La expresión es fórmula bíblica para invocar a Dios mismo. Aunque el proyecto prefiere «Yahvé» para יהוה, aquí el testimonio griego dice Κυρίου, y la traducción auditada en inglés usa «Lord»; «Señor» mantiene esa equivalencia sin forzar una identificación adicional no explicitada en el texto griego de esta línea.
- source_word: εἰς βοήθειαν
  english_pob_choice: for help
  chosen_spanish: ayuda
  alternatives_spanish:
  - para ayuda
  - en busca de ayuda
  - para socorro
  lexicon: BDAG
  rationale: La frase con εἰς expresa finalidad o dirección del acto de esperar. En español, «esperé ayuda» comunica de forma natural la orientación del verbo ἤλπισα hacia βοήθεια.
- source_word: ἤλπισα
  english_pob_choice: I hoped in
  chosen_spanish: esperé
  alternatives_spanish:
  - puse mi esperanza en
  - confié
  lexicon: BDAG
  rationale: Ἐλπίζω admite tanto «esperar» como «poner la esperanza». En este contexto, «esperé ayuda» preserva la idea de esperanza dirigida a un auxilio concreto y suena más natural que una construcción más pesada.
- source_word: τοῦ θεοῦ Ἰακώβ
  english_pob_choice: the God of Jacob
  chosen_spanish: del Dios de Jacob
  alternatives_spanish:
  - del Dios de Jacob
  - del Dios de Jacob
  lexicon: BDAG
  rationale: Se conserva el título bíblico fijo sin ampliarlo. «Del Dios de Jacob» reproduce la relación genitiva de manera transparente y mantiene la referencia pactal a Israel.
- source_word: ἐσώθην
  english_pob_choice: I was saved
  chosen_spanish: fui salvado
  alternatives_spanish:
  - fui librado
  - fui rescatado
  - fui salvo
  lexicon: BDAG
  rationale: σῴζω puede significar salvar o librar. Dado que la revisión inglesa favorece «was saved» frente a «was delivered», «fui salvado» sigue de cerca el valor verbal sin perder el matiz de rescate en contexto de aflicción.
theological_decisions:
- issue: Cómo reflejar Κυρίου en una traducción española donde el proyecto prefiere «Yahvé» para יהוה
  english_pob_reading: the name of the Lord
  chosen_spanish_reading: el nombre del Señor
  alternative_spanish_readings:
  - el nombre de Yahvé
  rationale: En esta línea el griego tiene Κυρίου, no el tetragrámaton escrito en hebreo. Por eso la traducción conserva «Señor», alineada con el valor del texto fuente y con la lectura auditada en inglés. No se introduce «Yahvé» porque aquí no hay una base textual directa para ello.
  doctrine_reference: Distinción entre el nombre divino revelado en hebreo y la cita griega de Κύριος
translation_notes:
  revision_awareness: 'La redacción sigue el ajuste final del audit trail inglés: εἰς βοήθειαν ἤλπισα se refleja como una esperanza dirigida a ayuda, no como «esperé en el Dios de Jacob para ayuda». Asimismo, ἐσώθην se toma en su valor más directo de salvación/rescate, coherente con la revisión que prefirió «was saved».'
  spanish_consistency_notes:
  - Se mantiene la fórmula bíblica «Dios de Jacob» sin expansión interpretativa.
  - «Señor» se reserva aquí para Κυρίου; no se sustituye por «Yahvé» porque el griego de esta línea no usa el tetragrámaton hebreo.
  - El registro es culto pero natural; se evita el calco rígido de la sintaxis griega.
