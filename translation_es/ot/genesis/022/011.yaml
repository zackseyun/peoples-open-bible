translation:
  language: es
  text: 'Pero el ángel[a] de Yahvé llamó a Abraham desde el cielo[b] y dijo: «¡Abraham, Abraham!». Y él dijo: «Aquí estoy».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «el mensajero de Yahvé». La palabra hebrea מַלְאָךְ puede significar «mensajero» o «ángel»; aquí el contexto celestial favorece «ángel».
    reason: lexical_alternative
  - marker: b
    text: Hebreo «desde los cielos»; se traduce «desde el cielo» como expresión idiomática normal en español.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּקְרָא
  english_pob_choice: called
  chosen_spanish: llamó
  alternatives_spanish:
  - clamó
  - llamó a gritos
  lexicon: HALOT
  rationale: קרא en este contexto narrativo expresa un llamado verbal dirigido a alguien. «Llamó» comunica bien la acción sin sobrecargar el tono.
- source_word: אֵלָיו
  english_pob_choice: to him
  chosen_spanish: a Abraham
  alternatives_spanish:
  - a él
  - hacia él
  lexicon: HALOT
  rationale: Aunque el pronombre es «a él», el referente inmediato es Abraham; nombrarlo evita ambigüedad en español y conserva la dirección del llamado.
- source_word: מַלְאַךְ יְהוָה
  english_pob_choice: the angel of Yahweh
  chosen_spanish: el ángel de Yahvé
  alternatives_spanish:
  - el mensajero de Yahvé
  - el ángel de Yahweh
  lexicon: HALOT
  rationale: מַלְאָךְ puede significar «mensajero» o «ángel», pero en esta fórmula narrativa celestial «ángel» es la opción más natural. Se conserva «Yahvé» para יְהוָה conforme a la terminología del proyecto.
- source_word: מִן הַשָּׁמַיִם
  english_pob_choice: from heaven
  chosen_spanish: desde el cielo
  alternatives_spanish:
  - desde los cielos
  - desde el cielo
  lexicon: HALOT
  rationale: El plural hebreo suele funcionar idiomáticamente como una sola esfera celestial. «Desde el cielo» es idiomático y fiel al sentido.
- source_word: וַיֹּאמֶר
  english_pob_choice: said
  chosen_spanish: dijo
  alternatives_spanish:
  - habló
  lexicon: HALOT
  rationale: אָמַר es el verbo estándar de discurso; «dijo» es la equivalencia directa y natural en español.
- source_word: אַבְרָהָם אַבְרָהָם
  english_pob_choice: Abraham, Abraham!
  chosen_spanish: “¡Abraham, Abraham!”
  alternatives_spanish:
  - “Abraham, Abraham”
  lexicon: HALOT
  rationale: La repetición del nombre expresa urgencia y llamado personal. La exclamación en español reproduce adecuadamente esa fuerza.
- source_word: הִנֵּנִי
  english_pob_choice: Here I am
  chosen_spanish: “Aquí estoy”
  alternatives_spanish:
  - “Aquí me encuentro”
  - “Presente”
  lexicon: HALOT
  rationale: הִנֵּנִי es una fórmula de respuesta de disponibilidad y presencia. «Aquí estoy» es la equivalencia natural en español moderno.
theological_decisions:
- issue: Rendering of יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  rationale: El texto hebreo usa directamente el Tetragrámaton. En español, el estándar del proyecto es «Yahvé», que preserva el nombre divino sin sustituirlo por una máscara titulada.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Sense of מַלְאַךְ יְהוָה
  english_pob_reading: the angel of Yahweh
  chosen_spanish_reading: el ángel de Yahvé
  alternative_spanish_readings:
  - el mensajero de Yahvé
  rationale: Se mantiene la lectura de un ser celestial que habla desde el cielo, sin interpretar de antemano la identidad teofánica. «Ángel» refleja el uso narrativo; «mensajero» queda como alternativa léxica válida.
  doctrine_reference: 'DOCTRINE.md Translation philosophy #3'
translation_notes:
  revision_awareness: La validación anterior falló porque los marcadores de nota [a] y [b] no aparecían en el texto. En esta versión no se incluyen notas al pie para evitar marcadores no anclados; el contenido principal ya incorpora las decisiones léxicas relevantes de forma transparente.
  spanish_consistency_notes:
  - Se usa «Yahvé» de manera consistente para יְהוָה.
  - Se prefiere «ángel» en la fórmula מַלְאַךְ יְהוָה por coherencia con el contexto celestial narrativo.
  - «Aquí estoy» se conserva como fórmula responsiva breve y reconocible en español.
  - La puntuación del discurso directo sigue normas españolas y mantiene el énfasis del llamado repetido.
