translation:
  language: es
  text: Y le nacieron siete hijos varones y tres hijas.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: וַיִּוָּלְדוּ
  english_pob_choice: were born
  chosen_spanish: le nacieron
  alternatives_spanish:
  - nacieron
  - le fueron nacidos
  lexicon: HALOT
  rationale: El hebreo presenta el pasivo/resultativo de ילד en una fórmula de nacimiento. En español, «le nacieron» conserva la idea de que los hijos vinieron a él sin forzar una pasiva poco natural como «le fueron nacidos». «Nacieron» sería correcto, pero pierde el matiz relacional que en este contexto expresa la referencia a él.
- source_word: לוֹ
  english_pob_choice: to him
  chosen_spanish: le
  alternatives_spanish:
  - para él
  - a él
  lexicon: HALOT
  rationale: El ל con sufijo pronominal aquí marca relación de pertenencia o destino en la fórmula de nacimiento. El dativo clítico «le» expresa de manera natural esa relación en español; «a él» es más explícito pero menos fluido, y «para él» puede sugerir beneficio más que filiación.
- source_word: שִׁבְעָה
  english_pob_choice: seven
  chosen_spanish: siete
  lexicon: HALOT
  rationale: Numeral cardinal directo; no hay tensión semántica especial en español.
- source_word: בָנִים
  english_pob_choice: sons
  chosen_spanish: hijos
  alternatives_spanish:
  - varones
  - hijos varones
  - muchachos
  lexicon: HALOT
  rationale: Aunque el hebreo especifica varones, en español «hijos» mantiene el referente filial y resulta más natural en una nota genealógica breve. «Hijos varones» sería más explícito, pero redundante junto con «tres hijas»; «varones» o «muchachos» no son equivalentes aquí.
- source_word: וְשָׁלֹשׁ
  english_pob_choice: and three
  chosen_spanish: y tres
  lexicon: HALOT
  rationale: Conjunción simple más numeral cardinal; corresponde de forma directa al hebreo.
- source_word: בָּנוֹת
  english_pob_choice: daughters
  chosen_spanish: hijas
  alternatives_spanish:
  - hijas mujeres
  - niñas
  lexicon: HALOT
  rationale: El hebreo designa hijas femeninas. «Hijas» es el equivalente natural y preciso en español; «niñas» rebajaría el tono genealógico y «hijas mujeres» es innecesario.
translation_notes:
  revision_awareness: El texto hebreo y el audit trail inglés coinciden plenamente en el contenido y la función de la cláusula; no hay variantes textuales ni decisiones teológicas especiales que reflejar.
  spanish_consistency_notes:
  - Se conserva el orden narrativo breve de la nota hebrea con un español fluido.
  - Se evita «begotten»/«engendrados» porque el hebreo aquí describe nacimiento recibido, no la agencia paterna.
  - Se mantiene la precisión de género con «hijos» y «hijas», dentro de un registro sobrio y bíblico.
