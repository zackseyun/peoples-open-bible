translation:
  language: es
  text: 'Y les dijo: «No tengan miedo; la paz estará con ustedes[a]. Pero bendigan a Dios por siempre».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «La paz esté con ustedes». El griego literalmente dice: «paz a ustedes será».'
    reason: lexical_alternative
lexical_decisions:
- source_word: Μὴ φοβεῖσθε
  english_pob_choice: Do not be afraid
  chosen_spanish: No tengan miedo
  alternatives_spanish:
  - No teman
  - No tengan temor
  lexicon: BDAG
  rationale: El imperativo negativo expresa prohibición y consuelo. En español, «no tengan miedo» comunica con naturalidad la misma fuerza exhortativa sin caer en un calco rígido.
- source_word: εἰρήνη ὑμῖν ἔσται
  english_pob_choice: peace be with you
  chosen_spanish: la paz esté con ustedes
  alternatives_spanish:
  - la paz será con ustedes
  - paz para ustedes
  - ustedes tendrán paz
  lexicon: BDAG
  rationale: La construcción griega tiene valor de promesa o saludo/benedición; en español, «la paz esté con ustedes» conserva esa ambigüedad reverente y suena más natural en registro bíblico que una paráfrasis excesiva.
- source_word: τὸν δὲ θεὸν
  english_pob_choice: But bless God
  chosen_spanish: Pero bendigan a Dios
  alternatives_spanish:
  - Y bendigan a Dios
  - Ahora bendigan a Dios
  lexicon: BDAG
  rationale: δὲ introduce un giro suave; «pero» mantiene el contraste discursivo entre el consuelo y la exhortación posterior. «Dios» conserva el sustantivo directo del griego sin añadir matices no presentes en el texto.
- source_word: εὐλογεῖτε
  english_pob_choice: bless
  chosen_spanish: bendigan
  alternatives_spanish:
  - alaben
  - bendigan alaben
  lexicon: BDAG
  rationale: En relación con Dios, εὐλογέω puede entenderse como «bendecir» o «alabar». «Bendigan» mantiene la correspondencia léxica con la tradición bíblica y permite que el objeto divino siga explícito.
- source_word: εἰς τὸν αἰῶνα
  english_pob_choice: forever
  chosen_spanish: por siempre
  alternatives_spanish:
  - para siempre
  - eternamente
  lexicon: BDAG
  rationale: La expresión adverbial indica duración continua. «Por siempre» es una solución idiomática, clara y fiel al sentido de permanencia.
theological_decisions:
- issue: Naturaleza de la paz prometida
  english_pob_reading: A promise of peace ('peace be with you') rather than only a conventional greeting
  chosen_spanish_reading: Una palabra de paz/consuelo más que un mero saludo convencional
  alternative_spanish_readings:
  - 'Un simple saludo: ''paz con ustedes'''
  - 'Una bendición declarativa: ''la paz será con ustedes'''
  rationale: El futuro griego ἔσται permite leer la frase como promesa de paz. En español, «la paz esté con ustedes» preserva la tensión entre fórmula de saludo y declaración de tranquilidad, sin resolverla de forma unilateral.
  doctrine_reference: Preserve theological tension rather than flattening it; original-language primacy over traditional phrasing.
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión más reciente del audit trail, que prefirió una formulación cercana a 'peace be with you' para reflejar con mayor naturalidad εἰρήνη ὑμῖν ἔσται. Por eso el español adopta una fórmula equivalente de bendición/paz, evitando una interpretación demasiado explícitamente futurista.
  spanish_consistency_notes:
  - Se mantiene el trato reverencial plural 'ustedes' para un auditorio colectivo.
  - Se usa 'Dios' sin artículo, acorde con el griego y la formulación breve del enunciado.
  - Se evita 'SEÑOR' porque el texto dice θεός, no κύριος.
  - El ritmo breve de la cláusula final conserva el cierre exhortativo del original.
