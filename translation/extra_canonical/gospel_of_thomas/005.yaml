translation:
  text: 'Jesus says: Know what is before your face[a], and what is hidden from you
    will be uncovered[c] to you. For there is nothing hidden that will not be made
    manifest[d].[b]'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: ‘Before your face’ is a literal rendering of the Coptic idiom (ⲛⲡⲙⲧⲟ ⲛⲡⲉⲕϩⲟ),
      meaning ‘right in front of you.’
    reason: cultural_note
  - marker: b
    text: 'POxy 654 adds: ‘and (nothing) buried which will not be raised up.’ The
      Nag Hammadi Coptic lacks this extra clause; this translation follows the Coptic.'
    reason: textual_variant
  - marker: c
    text: 'ϭⲱⲗⲡ literally ‘uncover’; alternatives: ‘reveal,’ ‘disclose.’'
    reason: lexical_alternative
  - marker: d
    text: ⲟⲩⲱⲛϩ ⲉⲃⲟⲗ means ‘become manifest/appear, come to light,’ not ‘live’ in
      this construction.
    reason: lexical_alternative
lexical_decisions:
- source_word: ⲥⲟⲟⲩⲛ
  chosen: know
  alternatives:
  - recognize
  - understand
  lexicon: Crum; Layton
  rationale: Imperative admonition fits Thomas’s gnomic style; “know” preserves terse
    force without interpretive expansion.
- source_word: ⲡⲉⲧⲉⲣⲉ ⲛⲡⲙⲧⲟ
  chosen: what is before
  alternatives:
  - what stands before
  - what is in front of
  lexicon: Crum (ⲙⲧⲟ ‘front, presence’)
  rationale: Relative construction with ⲛⲡⲙⲧⲟ denotes spatial ‘in front of’; “before”
    keeps the idiomatic starkness.
- source_word: ⲡⲉⲕϩⲟ
  chosen: your face
  alternatives:
  - your presence
  - your eyes
  lexicon: Crum
  rationale: Literal ‘face’ preserves Thomas’s concrete imagery and the idiom ‘before
    your face.’
- source_word: ⲡⲉⲧⲉⲣⲉϩⲱⲡ ⲉⲛⲧⲟⲕ
  chosen: what is hidden from you
  alternatives:
  - what has been concealed from you
  - what is covered from you
  lexicon: Crum (ϩⲱⲡ ‘hide, cover’)
  rationale: ϩⲱⲡ regularly means ‘hide/conceal’; ‘hidden’ is concise and idiomatic.
- source_word: ϭⲱⲗⲡ ⲉⲃⲟⲗ
  chosen: be uncovered
  alternatives:
  - be revealed
  - be disclosed
  lexicon: Crum; Layton
  rationale: ϭⲱⲗⲡ is literally ‘uncover’; the physical metaphor suits Thomas’s diction;
    ‘to you’ reflects ⲛⲁⲛⲧⲟⲕ.
- source_word: ⲙⲛⲗⲁⲁⲩ ⲅⲁⲣ
  chosen: for there is nothing
  alternatives:
  - for not any thing
  lexicon: Layton (syntax of negation with ⲙⲛ ⲗⲁⲁⲩ)
  rationale: Standard Coptic idiom for universal negation introducing a relative clause.
- source_word: ⲟⲩⲱⲛϩ ⲉⲃⲟⲗ
  chosen: be made manifest
  alternatives:
  - come to light
  - be revealed
  lexicon: Crum (ⲟⲩⲱⲛϩ II ‘appear, be manifest’)
  rationale: With ⲉⲃⲟⲗ the sense is ‘become manifest/appear,’ not ‘live’; ‘made manifest’
    keeps formulaic cadence without NT harmonization.
textual_note: 'Dialect: Sahidic with Lycopolitan spellings in the diplomatic line
  (e.g., ⲥⲟⲩⲱⲛ vs normalized ⲥⲟⲟⲩⲛ; ⲡⲉⲑⲏⲡ for normalized ⲡⲉⲧⲉⲣⲉϩⲱⲡ). No lacunae or
  restorations are indicated by Dilley for this saying. Syntax places the indirect
  object ⲛⲁⲛⲧⲟⲕ ‘to you (sg.)’ after the verb phrase ϭⲱⲗⲡ ⲉⲃⲟⲗ; address is singular.
  The negative scope is carried by final ⲁⲛ in the relative clause with ⲉⲣⲉ, yielding
  ‘there is nothing hidden that will not be made manifest.’'
