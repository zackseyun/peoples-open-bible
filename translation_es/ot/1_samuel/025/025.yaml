translation:
  language: es
  text: 'Te ruego, mi señor, no pongas tu corazón en este hombre indigno, en Nabal[a]; porque como es su nombre, así es él: Nabal es su nombre, y necedad está con él. Pero yo, tu sierva, no vi a los jóvenes de mi señor, a quienes enviaste.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El nombre «Nabal» suena en hebreo como una palabra relacionada con «necedad»; Abigail está haciendo un juego de palabras deliberado.
    reason: lexical_alternative
lexical_decisions:
- source_word: אַל נָא יָשִׂים אֲדֹנִי אֶת לִבּוֹ אֶל
  english_pob_choice: Please, my lord, do not set your heart on
  chosen_spanish: Te ruego, mi señor, no pongas tu corazón en
  alternatives_spanish:
  - Por favor, mi señor, no prestes atención a
  - Mi señor, no tomes a pecho a
  lexicon: HALOT
  rationale: Conservo la imagen hebrea de “poner el corazón hacia/algo” con una formulación natural en español. “Poner tu corazón en” mantiene el alcance de preocupación deliberada sin diluir la metáfora.
- source_word: אִישׁ הַבְּלִיַּעַל
  english_pob_choice: worthless man
  chosen_spanish: hombre indigno
  alternatives_spanish:
  - hombre sin valor
  - hombre perverso
  - sinvergüenza
  lexicon: HALOT
  rationale: El hebreo caracteriza moralmente al sujeto. “Indigno” comunica desvalía moral sin sonar excesivamente coloquial; evita convertir el término en un insulto más fuerte de lo que exige el contexto.
- source_word: נָבָל
  english_pob_choice: Nabal
  chosen_spanish: Nabal
  alternatives_spanish:
  - tonto (en nota)
  - Necio (como glosa)
  lexicon: HALOT
  rationale: Se conserva el nombre propio en el texto principal, porque el hebreo lo usa como nombre y a la vez permite un juego de palabras con necedad. La fuerza semántica se mantiene en la frase siguiente.
- source_word: כִּי כִשְׁמוֹ כֶּן הוּא
  english_pob_choice: for as his name is, so is he
  chosen_spanish: porque cual es su nombre, tal es él
  alternatives_spanish:
  - porque así como es su nombre, así es él
  - porque su nombre es así, y así es él
  lexicon: HALOT
  rationale: Mantengo el paralelismo proverbial del hebreo. “Cual... tal...” reproduce la relación directa entre nombre y carácter de manera compacta y transparente.
- source_word: וּנְבָלָה עִמּוֹ
  english_pob_choice: and folly is with him
  chosen_spanish: y necedad está con él
  alternatives_spanish:
  - y estupidez está con él
  - y vergüenza está con él
  - y necedad lo acompaña
  lexicon: HALOT
  rationale: “Necedad” preserva el vínculo de juego de palabras con Nabal sin sustituirlo por una paráfrasis. “Está con él” sigue de cerca la construcción hebrea y conserva la idea de compañía permanente.
- source_word: אֲמָתְךָ
  english_pob_choice: your servant
  chosen_spanish: tu sierva
  alternatives_spanish:
  - tu esclava
  - tu criada
  - tu servidora
  lexicon: HALOT
  rationale: El hebreo especifica una servidora femenina. “Sierva” mantiene la humildad formal y la precisión de género, con un registro bíblico claro para lector hispano.
- source_word: נַעֲרֵי
  english_pob_choice: the young men
  chosen_spanish: los jóvenes
  alternatives_spanish:
  - los muchachos
  - los servidores jóvenes
  - los mozos
  lexicon: HALOT
  rationale: “Jóvenes” refleja el valor léxico básico y conserva el tono narrativo. Evita cargar el texto con un término funcional (“mensajeros”) que no está explícito en el hebreo.
- source_word: אֲדֹנִי
  english_pob_choice: my lord
  chosen_spanish: mi señor
  alternatives_spanish:
  - mi maestro
  - mi amo
  lexicon: HALOT
  rationale: Es un tratamiento honorífico de respeto hacia David. “Mi señor” es el equivalente natural y digno en español; “amo” sería demasiado servil y “maestro” desplazaría el matiz social.
theological_decisions:
- issue: Juego de palabras entre Nabal y necedad/insensatez
  english_pob_reading: The name 'Nabal' sounds like the Hebrew word for 'foolish' or 'folly,' and Abigail's statement is a deliberate wordplay.
  chosen_spanish_reading: Se conserva Nabal como nombre propio y se traduce נְבָלָה como necedad, dejando visible el juego de palabras.
  alternative_spanish_readings:
  - Nabal ... y necedad lo acompaña (con nota explicativa amplia)
  - Nabal ... y vergüenza está con él
  rationale: El hebreo explota la semejanza entre el nombre y la palabra de la raíz correspondiente. Traducir el nombre destruiría el dato onomástico; traducir el sustantivo como necedad mantiene la tensión semántica y el recurso retórico.
  doctrine_reference: Ninguno; decisión lexical-literaria
- issue: Alcance moral de בְּלִיַּעַל
  english_pob_reading: worthless man
  chosen_spanish_reading: hombre indigno
  alternative_spanish_readings:
  - hombre perverso
  - hombre sin valor
  - hombre de Belial
  rationale: No se introduce “Belial” como nombre propio porque aquí funciona como calificación moral, no como designación personal. “Indigno” comunica la censura sin forzar un tecnicismo que el contexto no exige.
  doctrine_reference: Ninguno; decisión lexical-contextual
- issue: Autoidentificación humilde de Abigail
  english_pob_reading: your servant
  chosen_spanish_reading: tu sierva
  alternative_spanish_readings:
  - tu servidora
  - tu esclava
  rationale: El hebreo usa una forma femenina explícita. “Sierva” preserva la deferencia y el género con sobriedad; además evita que la frase pierda la relación social expresada en el original.
  doctrine_reference: Ninguno; decisión de cortesía narrativa
translation_notes:
  revision_awareness: La versión inglesa revisada atenuó 'your female servant' a 'your servant' por naturalidad. En español se mantiene explícitamente el femenino 'sierva' porque el hebreo אֲמָתְךָ lo marca de forma inequívoca y la naturalidad no exige neutralizar el género.
  spanish_consistency_notes:
  - Se usa «mi señor» para אֲדֹנִי, coherente con el tratamiento honorífico del contexto.
  - Se conserva «Nabal» como nombre propio en el texto principal y el juego de palabras se explica en nota.
  - «Necedad» se elige como equivalente principal de נְבָלָה para mantener la relación fonética y semántica con Nabal.
  - «Sierva» refleja mejor el femenino de אֲמָתְךָ que un genérico masculino o neutro.
  - «Jóvenes» sigue el valor léxico de נַעֲרֵי sin añadir una función no expresada explícitamente en el hebreo.
