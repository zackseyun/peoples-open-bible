translation:
  language: es
  text: Y lo recibió honrosamente[a], y lo presentó[b] a todos sus amigos[c], y le dio regalos, y mandó a sus amigos y a sus fuerzas que le obedecieran asimismo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Honrosamente» traduce el matiz de trato honorable; también podría entenderse «con honor» o «de manera distinguida».
    reason: lexical_alternative
  - marker: b
    text: O «lo introdujo». El verbo griego también puede denotar presentar públicamente a alguien o darlo a conocer ante otros.
    reason: lexical_alternative
  - marker: c
    text: «Amigos» puede tener en este contexto helenístico un matiz cortesano-político, refiriéndose al círculo del rey y no solo a compañeros personales.
    reason: cultural_note
lexical_decisions:
- source_word: ἐπεδέξατο
  english_pob_choice: received
  chosen_spanish: lo recibió
  alternatives_spanish:
  - lo acogió
  - lo aceptó
  lexicon: LSJ
  rationale: El verbo medio aquí expresa recibir o dar la bienvenida. «Lo recibió» conserva la sencillez del griego y funciona bien con el adverbio siguiente sin imponer una interpretación más fuerte.
- source_word: ἐνδόξως
  english_pob_choice: honorably
  chosen_spanish: honrosamente
  alternatives_spanish:
  - con honor
  - de manera distinguida
  - gloriosamente
  lexicon: LSJ
  rationale: El adverbio describe un trato honorable o distinguido. «Honrosamente» mantiene ese valor en un español natural y evita el calco demasiado solemne de «gloriosamente».
- source_word: συνέστησεν
  english_pob_choice: introduced
  chosen_spanish: lo presentó
  alternatives_spanish:
  - lo introdujo
  - lo dio a conocer
  - lo recomendó
  lexicon: LSJ
  rationale: En este contexto social-político, el verbo significa ponerlo delante de otros o presentarlo. «Lo presentó» preserva la amplitud del griego y es idiomático en español.
- source_word: φίλοις
  english_pob_choice: friends
  chosen_spanish: amigos
  alternatives_spanish:
  - cortesanos
  - aliados
  - compañeros
  lexicon: LSJ
  rationale: El griego dice literalmente «amigos». Se conserva el término básico en el texto principal, dejando la posible carga cortesana para nota, porque el propio texto no usa un título técnico explícito.
- source_word: δόματα
  english_pob_choice: gifts
  chosen_spanish: dones
  alternatives_spanish:
  - regalos
  - presentes
  lexicon: LSJ
  rationale: El plural indica obsequios o dones. «Dones» es fiel y suficientemente natural en registro bíblico, sin perder la idea de presentes concretos.
- source_word: δυνάμεσιν
  english_pob_choice: forces
  chosen_spanish: fuerzas
  alternatives_spanish:
  - tropas
  - fuerzas militares
  - poderes
  lexicon: LSJ
  rationale: Aquí el plural se refiere a fuerzas militares bajo autoridad del gobernante. «Fuerzas» conserva esa amplitud y evita reducirlo innecesariamente a «tropas».
- source_word: ὑπακούειν
  english_pob_choice: to obey
  chosen_spanish: obedecieran
  alternatives_spanish:
  - escucharan
  - se sometieran
  lexicon: LSJ
  rationale: El infinitivo expresa obedecer o hacer caso. En este mandato, «obedecieran» transmite correctamente la exigencia de sumisión práctica.
- source_word: ὡσαύτως
  english_pob_choice: likewise
  chosen_spanish: asimismo
  alternatives_spanish:
  - igualmente
  - de la misma manera
  lexicon: LSJ
  rationale: El adverbio indica que debían tratarlo del mismo modo. «Asimismo» expresa bien esa correspondencia en español formal y fluido.
translation_notes:
  revision_awareness: El texto griego y el audit trail inglés están en alto acuerdo. Se ha conservado la secuencia de acciones sin añadir contenido interpretativo, y se han mantenido las alternativas relevantes donde el español abre matices que el griego permite.
  spanish_consistency_notes:
  - Se mantiene «amigos» en el texto principal, conforme a la elección inglesa, sin sustituirlo por un término cortesano en la línea principal.
  - Se usa «dones» para δόματα, más acorde con registro bíblico que «regalos», pero sin perder el sentido de obsequios.
  - «Fuerzas» conserva el valor militar general de δυνάμεις sin especificar más de lo que el griego dice.
  - No hay nombres divinos ni cristológicos en este versículo, por lo que no se requieren decisiones terminológicas sobre Yahvé o Mesías.
