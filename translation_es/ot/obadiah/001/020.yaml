    text: O «esta hueste»; el término hebreo es difícil y también se ha entendido de otras maneras, incluso como «riqueza» o con sentidos semejantes.
    reason: lexical_alternative
  - marker: b
    text: Sefarad es un nombre de lugar incierto; algunos lo identifican con España, pero aquí se conserva el nombre hebreo.
    reason: cultural_note
