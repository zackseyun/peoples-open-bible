review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura y el sentido general del hebreo: siembran trigo, cosechan espinas, se agotan y no obtienen beneficio; además conserva correctamente Yahvé para יְהוָה y mantiene la ambigüedad de וּבֹשׁוּ mediante nota. Sin embargo, la cláusula imperativa en español no está bien lograda: ''Sean avergonzados'' suena pasiva y cambia el matiz de ''avergüéncense / avergüéncense de'' hacia ''sean puestos en vergüenza''. También la nota [a] está anclada en ''trigo'' cuando en realidad corresponde a וּבֹשׁוּ.'
  spanish_quality_summary: 'El español es mayormente claro y digno, pero hay dos problemas de legibilidad/fidelidad: 1) el imperativo exhortativo debe expresarse con un imperativo/reflexivo natural (''Avergüéncense'') y no con una pasiva perifrástica; 2) la nota debe colocarse junto al verbo ambiguo, no junto a ''trigo''. ''Productos'' es aceptable, aunque ''cosechas'' suena un poco más idiomático; aun así, no exige cambio porque el inglés auditado eligió ''produce''.'
  glossary_alignment: Buen alineamiento con el glosario del proyecto en 'Yahvé'. No hay otros términos doctrinales mayores en juego. La decisión sobre וּבֹשׁוּ debe ajustarse en la redacción española para corresponder mejor a la lectura imperativa documentada. La nota léxica sobre 'productos' no es necesaria porque el inglés no la preserva y no resuelve una ambigüedad nueva importante.
  issues:
  - severity: high
    issue: 'Imperativo mal expresado en español: ''Sean avergonzados'''
    rationale: La forma española propuesta suena como pasiva/jussiva ('be made ashamed') y no como exhortación directa 'be ashamed'. El hebreo, según el audit trail, se entiende mejor como imperativo 2mp; en español natural y fiel debe ser 'Avergüéncense'.
  - severity: high
    issue: Anclaje incorrecto de la nota [a]
    rationale: La nota explica la ambigüedad de וּבֹשׁוּ, pero está insertada tras 'trigo'. Debe anclarse en el verbo/segmento correspondiente a 'Avergüéncense'.
  - severity: medium
    issue: Nota [b] innecesaria sobre 'productos'
    rationale: El inglés POB no preservó esa nota y 'productos' no crea una ambigüedad española que requiera aclaración. Añade peso innecesario sin beneficio claro.
  revised_spanish_text: Han sembrado trigo, pero han segado espinas; se han agotado, pero no sacan provecho alguno. Avergüéncense[a] de sus productos, a causa del ardor de la ira de Yahvé.
  revised_footnotes:
