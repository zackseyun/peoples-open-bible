translation:
  language: es
  text: 'Los hijos de Merari[a], por sus clanes: Mahli y Mushi. Estos son los clanes de los levitas, según sus casas paternas.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «los clanes de Leví». El hebreo tiene el gentilicio singular «el levita», que puede funcionar de manera colectiva o referirse a Leví como ancestro tribal.
    reason: alternative_reading
lexical_decisions:
- source_word: וּבְנֵי
  english_pob_choice: The sons of
  chosen_spanish: Los hijos de
  alternatives_spanish:
  - Y los hijos de
  - Los descendientes de
  lexicon: HALOT
  rationale: En este contexto genealógico, בנים señala relación de filiación/linaje. En español, «hijos de» conserva con naturalidad esa estructura formal sin perder claridad. No se expresa el valor conjuntivo inicial porque funciona como continuación de la enumeración.
- source_word: מְרָרִי
  english_pob_choice: Merari
  chosen_spanish: Merari
  alternatives_spanish:
  - Merarí
  lexicon: HALOT
  rationale: Nombre propio transliterado. Se mantiene la forma simple y reconocible en español bíblico.
- source_word: לְמִשְׁפְּחֹתָם
  english_pob_choice: by their clans
  chosen_spanish: por sus clanes
  alternatives_spanish:
  - según sus clanes
  - de acuerdo con sus clanes
  - por sus familias
  lexicon: HALOT
  rationale: מִשְׁפָּחוֹת en listas tribales/censales apunta a unidades de parentesco subtribales; «clanes» comunica mejor ese valor que «familias». La preposición ל funciona aquí como clasificación, por lo que «por» reproduce bien el sentido distributivo/organizativo.
- source_word: מַחְלִי
  english_pob_choice: Mahli
  chosen_spanish: Mahli
  alternatives_spanish:
  - Majli
  lexicon: HALOT
  rationale: Nombre propio transliterado. Se conserva la forma breve y tradicionalmente entendible.
- source_word: וּמוּשִׁי
  english_pob_choice: and Mushi
  chosen_spanish: y Mushi
  alternatives_spanish:
  - e Mushi
  lexicon: HALOT
  rationale: Nombre propio coordinado con ו; en español la conjunción normal «y» es natural delante de Mushi. La forma con «e» sería posible, pero no necesaria aquí.
- source_word: אֵלֶּה הֵם
  english_pob_choice: These are
  chosen_spanish: Estos son
  alternatives_spanish:
  - Estos son ellos
  - Éstos son
  lexicon: HALOT
  rationale: La combinación demostrativo + pronombre copulativo introduce una identificación. «Estos son» es la equivalencia más natural y directa en español, manteniendo el tono presentacional de la lista.
- source_word: מִשְׁפְּחֹת
  english_pob_choice: the clans
  chosen_spanish: los clanes
  alternatives_spanish:
  - las familias
  lexicon: HALOT
  rationale: 'Se mantiene «clanes» por la misma razón que en la primera cláusula: en un contexto levítico-genealógico expresa mejor la subdivisión social/kinship que «familias», que es más general.'
- source_word: הַלֵּוִי
  english_pob_choice: the Levites
  chosen_spanish: los levitas
  alternatives_spanish:
  - el levita
  - Leví
  lexicon: HALOT
  rationale: Aunque la forma hebrea es singular con artículo, el contexto inmediato habla de «clanes» en plural y el propio audit trail inglés revisó esta expresión hacia el plural por exactitud contextual. En español, «los levitas» evita la literalidad opaca de «el levita» y expresa mejor la referencia colectiva.
- source_word: לְבֵית אֲבֹתָם
  english_pob_choice: by their fathers’ houses
  chosen_spanish: por las casas de sus padres
  alternatives_spanish:
  - según las casas de sus padres
  - por sus casas paternas
  - por las casas de sus antepasados
  lexicon: HALOT
  rationale: בית־אבות es una fórmula administrativa de linaje. «Casas de sus padres» conserva la estructura semítica sin volverla demasiado técnica; «por» mantiene el valor clasificatorio de ל, y «padres» resulta más fiel que una paráfrasis como «antepasados».
theological_decisions:
- issue: Referencia colectiva en הַלֵּוִי frente a la pluralidad de clanes
  english_pob_reading: the Levites
  chosen_spanish_reading: los levitas
  alternative_spanish_readings:
  - el levita
  - los hijos de Leví
  rationale: 'No hay una tensión doctrinal, sino una decisión gramatical y contextual: el singular hebreo funciona de modo colectivo/gentílico, pero el versículo enumera clanes en plural. «Los levitas» evita singularizar indebidamente la referencia y coincide con la revisión inglesa aprobada.'
  doctrine_reference: Números 3:20; uso colectivo de nombres tribales/gentílicos
- issue: Valor de מִשְׁפְּחֹת en registro tribal
  english_pob_reading: clans
  chosen_spanish_reading: clanes
  alternative_spanish_readings:
  - familias
  - linajes
  rationale: En genealogías israelitas, «clanes» preserva la unidad socio-tribal que el texto organiza, sin borrar la diferencia entre familia nuclear y unidad de parentesco más amplia. Esto evita una lectura demasiado moderna de «familias».
  doctrine_reference: Números 1–4; organización levítica/censal
translation_notes:
  revision_awareness: Se siguió el ajuste más reciente del audit trail inglés, que corrigió la referencia de «the Levite» a «the Levites» por precisión gramatical y contextual. La versión española refleja ese mismo criterio colectivo en «los levitas», manteniendo además la estructura genealógica del hebreo.
  spanish_consistency_notes:
  - Se usa «hijos de» para el patrón genealógico de בְּנֵי en lugar de «descendientes de», para conservar la relación filial formal del texto.
  - Se mantiene «clanes» de manera consistente para מִשְׁפָּחוֹת en contextos tribales/censales.
  - Se conserva la fórmula «por las casas de sus padres» como equivalente transparente de לְבֵית אֲבֹתָם.
  - Los nombres propios se transliteran sin castellanización excesiva, conforme al estándar del proyecto.
