translation:
  language: es
  text: Y hizo lo malo delante de Yahvé[a], y no se avergonzó de las palabras dichas por Jeremías el profeta, de la boca de Yahvé.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «no se humilló ante las palabras dichas por Jeremías el profeta, de la boca de Yahvé». El paralelo hebreo en 2 Crónicas 36:12 usa lenguaje de no humillarse, mientras que 1 Esdras aquí habla de no avergonzarse o no abochornarse.'
    reason: alternative_reading
lexical_decisions:
- source_word: ἐποίησεν τὸ πονηρόν
  english_pob_choice: did what was evil
  chosen_spanish: hizo lo malo
  alternatives_spanish:
  - hizo el mal
  - hizo lo que era malo
  - practicó el mal
  lexicon: LSJ
  rationale: La expresión griega es un modismo bíblico para conducta moralmente mala. "Hizo lo malo" conserva esa fuerza idiomática con español natural y breve, sin suavizar el juicio moral.
- source_word: ἐνώπιον Κυρίου
  english_pob_choice: before the Lord
  chosen_spanish: delante de Yahvé
  alternatives_spanish:
  - ante Yahvé
  - en presencia de Yahvé
  - a la vista de Yahvé
  lexicon: LSJ
  rationale: '"ἐνώπιον" significa "delante de" o "en presencia de". Se usa "Yahvé" conforme al criterio del proyecto para κύριος cuando el contexto remite al nombre divino, manteniendo la referencia explícita al Nombre y no ocultándolo como título genérico.'
- source_word: οὐκ ἐνετράπη
  english_pob_choice: he was not ashamed
  chosen_spanish: no se avergonzó
  alternatives_spanish:
  - no tuvo vergüenza
  - no se humilló
  - no quedó avergonzado
  lexicon: LSJ
  rationale: El verbo puede expresar la idea de avergonzarse o quedar abochornado. "No se avergonzó" es la forma más directa en español y preserva la tensión interpretativa con el paralelo hebreo, sin decidir de antemano por "humillarse".
- source_word: τῶν ῥηθέντων λόγων
  english_pob_choice: the words spoken
  chosen_spanish: las palabras dichas
  alternatives_spanish:
  - las palabras pronunciadas
  - las palabras que se dijeron
  - las palabras habladas
  lexicon: LSJ
  rationale: El participio pasivo con λόγοι se rinde de manera natural como "palabras dichas". Así se conserva el contenido verbal profético sin añadir matices no presentes en el griego.
- source_word: ὑπὸ Ἰερεμίου τοῦ προφήτου
  english_pob_choice: by Jeremiah the prophet
  chosen_spanish: por Jeremías el profeta
  alternatives_spanish:
  - por el profeta Jeremías
  - por Jeremías, el profeta
  lexicon: LSJ
  rationale: Se mantiene la estructura agente + nombre + título. "Jeremías el profeta" sigue de cerca el griego y resulta claro en español.
- source_word: ἐκ στόματος τοῦ κυρίου
  english_pob_choice: from the mouth of the Lord
  chosen_spanish: de parte de la boca de Yahvé
  alternatives_spanish:
  - de la boca de Yahvé
  - de parte de Yahvé
  - desde la boca de Yahvé
  lexicon: LSJ
  rationale: Se conserva la imagen concreta de "boca", porque es una fórmula profética fuerte de habla directa divina. Se añade "de parte de" para expresar con naturalidad en español la procedencia del mensaje sin borrar la metáfora. Se usa "Yahvé" por la misma razón que en κύριος.
theological_decisions:
- issue: Renderización de κύριος en un contexto griego deuterocanónico
  english_pob_reading: Lord
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Señor
  - el Señor
  rationale: Aunque el audit trail inglés conserva "Lord" por convención doctrinal, el proyecto español pide "Yahvé" cuando κύριος refleja el nombre divino o alude a él. Aquí la fórmula profética "de la boca de Yahvé" mantiene la referencia explícita al Nombre y no lo sustituye por un título genérico.
  doctrine_reference: 'DOCTRINE.md Contested terms: κύριος → Yahvé'
- issue: Nuance de οὐκ ἐνετράπη en relación con la advertencia profética
  english_pob_reading: he was not ashamed at the words spoken by Jeremiah the prophet
  chosen_spanish_reading: no se avergonzó de las palabras dichas por Jeremías el profeta
  alternative_spanish_readings:
  - no se humilló ante las palabras dichas por Jeremías el profeta
  - no quedó avergonzado por las palabras dichas por Jeremías el profeta
  rationale: El griego destaca la falta de vergüenza o de abatimiento ante la advertencia. Se evita imponer "humillarse" como lectura principal, aunque esa alternativa permanece viable por el paralelo hebreo de 2 Crónicas 36:12. La traducción sigue anclada en el griego de 1 Esdras.
  doctrine_reference: 'Translation philosophy: original-language primacy over translation tradition'
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión inglesa más reciente, que afinó la relación de ἐνετράπη con ἀπό para reflejar mejor la naturalidad y el valor semántico de la construcción. En español se reflejó como una falta de vergüenza ante las palabras proféticas, manteniendo la ambigüedad relevante entre vergüenza y humillación sin borrar el dato del paralelo hebreo.
  spanish_consistency_notes:
  - Se mantiene "Yahvé" para κύριος según la convención española del proyecto.
  - Se conserva la imagen profética de "boca" como fórmula de revelación directa.
  - '"No se avergonzó" queda como lectura principal; la nota preserva la alternativa "no se humilló".'
  - El tono es formal y publicable, sin calcos innecesarios ni arcaísmos.
  - '"Las palabras dichas" traduce de manera sencilla el participio pasivo con λόγοι.'
