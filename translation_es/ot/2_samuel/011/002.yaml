translation:
  language: es
  text: Entonces, al atardecer[a], David se levantó de su cama y caminó sobre el techo de la casa del rey[b]; y desde el techo vio a una mujer bañándose; y la mujer era muy hermosa de aspecto.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, más literalmente: «y sucedió al tiempo del atardecer».'
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: «la casa del rey»; «palacio» es una posible traducción contextual.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְהִי לְעֵת הָעֶרֶב
  english_pob_choice: Then at evening time
  chosen_spanish: Entonces, al atardecer
  alternatives_spanish:
  - Y sucedió al tiempo de la tarde
  - Y aconteció al atardecer
  lexicon: HALOT
  rationale: La construcción narrativa hebrea introduce la escena con avance temporal. «Entonces, al atardecer» conserva la progresión y el marco temporal sin forzar un calco pesado en español.
- source_word: וַיָּקָם
  english_pob_choice: arose
  chosen_spanish: se levantó
  alternatives_spanish:
  - se alzó
  - se puso de pie
  lexicon: HALOT
  rationale: El verbo קום se expresa de forma natural y directa con «se levantó», manteniendo el registro narrativo sin coloquialismo excesivo.
- source_word: מֵעַל מִשְׁכָּבוֹ
  english_pob_choice: from his bed
  chosen_spanish: de su cama
  alternatives_spanish:
  - de su lecho
  - del lugar donde estaba acostado
  lexicon: HALOT
  rationale: מִשְׁכָּב puede significar cama o lugar de reposo. «De su cama» es la opción más clara y natural en español, sin perder el sentido doméstico del contexto.
- source_word: וַיִּתְהַלֵּךְ
  english_pob_choice: walked
  chosen_spanish: caminó
  alternatives_spanish:
  - anduvo
  - paseó
  lexicon: HALOT
  rationale: El hitpael sugiere movimiento continuo o deambulante. La decisión inglesa de mantener un pasado simple apoya una secuencia narrativa; en español, «caminó» comunica bien la acción sin añadir interpretación ajena.
- source_word: עַל גַּג בֵּית הַמֶּלֶךְ
  english_pob_choice: on the roof of the king’s house
  chosen_spanish: sobre el techo de la casa del rey
  alternatives_spanish:
  - sobre la azotea del palacio
  - en el techo del palacio
  lexicon: HALOT
  rationale: «Casa del rey» sigue de cerca la forma hebrea בית המלך. Se evita sustituirlo sin necesidad por «palacio», porque el inglés POB documenta esa posibilidad como alternativa contextual, no como única lectura.
- source_word: וַיַּרְא אִשָּׁה רֹחֶצֶת
  english_pob_choice: he saw a woman bathing
  chosen_spanish: vio a una mujer bañándose
  alternatives_spanish:
  - vio a una mujer que se bañaba
  - vio a una mujer lavándose
  lexicon: HALOT
  rationale: El participio indica una acción en curso. «Bañándose» refleja esa continuidad de modo natural y evita sobreexplicar la escena.
- source_word: מֵעַל הַגָּג
  english_pob_choice: from the roof
  chosen_spanish: desde el techo
  alternatives_spanish:
  - desde arriba del techo
  - desde la azotea
  lexicon: HALOT
  rationale: 'La referencia espacial se integra de forma explícita con el verbo de percepción: David vio desde el techo. En español, «desde el techo» es claro y conserva la localización.'
- source_word: טוֹבַת מַרְאֶה מְאֹד
  english_pob_choice: very beautiful in appearance
  chosen_spanish: muy hermosa de aspecto
  alternatives_spanish:
  - muy hermosa
  - muy bella de apariencia
  lexicon: HALOT
  rationale: La frase hebrea enfatiza la belleza visible, literalmente «buena de apariencia». «Muy hermosa de aspecto» conserva ese matiz visual mejor que un simple «muy hermosa».
theological_decisions:
- issue: Ninguna decisión doctrinal adicional en este versículo; solo descripción narrativa.
  english_pob_reading: No theological decision recorded.
  chosen_spanish_reading: No se introduce interpretación doctrinal; se mantiene la descripción narrativa.
  alternative_spanish_readings:
  - No se requiere nota teológica.
  - El versículo se vierte sin carga doctrinal añadida.
  rationale: El texto describe acciones y apariencia. La traducción debe preservar el carácter narrativo sin añadir comentario interpretativo.
