id: 2TH.2.1
reference: 2 Thessalonians 2:1
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: Ἐρωτῶμεν δὲ ὑμᾶς, ἀδελφοί, ὑπὲρ τῆς παρουσίας τοῦ κυρίου ἡμῶν Ἰησοῦ Χριστοῦ καὶ ἡμῶν ἐπισυναγωγῆς ἐπ’ αὐτόν,
base_translation:
  language: en
  yaml_path: translation/nt/2_thessalonians/002/001.yaml
  text: Now we ask you[a], brothers, concerning the coming of our Lord Jesus Messiah and our gathering together to him[b],
translation:
  language: ko
  text: 형제[a] 여러분, 이제 우리는 우리 주 예수 메시아[b]의 재림과 우리가 그분께로 함께 모이는 일에 관하여 여러분에게 부탁드립니다.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 헬라어 ἀδελφοί는 남성 복수 호격이며, 바울의 용법상 회중 전체를 대표적으로 가리킨다. DOCTRINE.md의 성별 정확성 원칙에 따라 본문에서는 「형제」를 유지한다.
    reason: cultural_note
  - marker: b
    text: 또는 「예수 그리스도」. 본 번역은 칭호 Χριστός를 「메시아」로 옮긴다.
    reason: alternative_reading
lexical_decisions:
- source_word: Ἐρωτῶμεν
  english_pob_choice: we ask
  chosen_korean: 부탁드립니다
  alternatives_korean:
  - 청합니다
  - 간청합니다
  lexicon: BDAG
  rationale: 본문에서 ἐρωτάω는 명령이 아닌 목회적 호소를 도입한다. 합쇼체 격식에서 「부탁드립니다」가 그 어조를 잘 살린다.
- source_word: δὲ
  english_pob_choice: Now
  chosen_korean: 이제
  alternatives_korean:
  - 그런데
  - ''
  lexicon: BDAG
  rationale: 강한 대조가 아닌 화제 전환을 표시한다. 「이제」가 자연스럽다.
- source_word: ἀδελφοί
  english_pob_choice: brothers
  chosen_korean: 형제
  alternatives_korean:
  - 형제자매
  lexicon: BDAG
  rationale: 성별 정확성 원칙에 따라 본문은 「형제」를 유지하고 포용적 의미는 각주로 보충.
- source_word: ὑπὲρ
  english_pob_choice: concerning
  chosen_korean: 관하여
  alternatives_korean:
  - 대하여
  - 두고
  lexicon: BDAG
  rationale: 본문 정황에서 ὑπέρ는 논의 주제를 도입한다. 「관하여」가 적절하다.
- source_word: παρουσίας
  english_pob_choice: coming
  chosen_korean: 재림
  alternatives_korean:
  - 오심
  - 임재
  - 강림
  lexicon: BDAG
  rationale: '종말론적 그리스도의 도래를 가리키는 παρουσία는 한국어로 「재림」이 가장 통용된 등가어이며, 영어 POB의 「coming」을 잘 반영한다. 다른 정황(예: 2:8의 ἐπιφάνεια와 짝)에서는 「오심」으로 옮길 수 있으나, 본 절은 신학적 정형 표현이므로 「재림」을 채택한다.'
- source_word: ἐπισυναγωγῆς ἐπ’ αὐτόν
  english_pob_choice: gathering together to him
  chosen_korean: 그분께로 함께 모이는 일
  alternatives_korean:
  - 그분께로의 모임
  - 그분께로 모여드는 일
  lexicon: BDAG
  rationale: ἐπισυναγωγή의 합성적 「함께 모임」 의미와 ἐπί + 대격의 방향성을 「그분께로 함께 모이는 일」로 자연스럽게 표현한다.
- source_word: Ἰησοῦ Χριστοῦ
  english_pob_choice: Jesus Messiah
  chosen_korean: 예수 메시아
  alternatives_korean:
  - 예수 그리스도
  lexicon: BDAG
  rationale: 칭호 Χριστός는 「메시아」로 옮기는 본 번역의 일관 원칙.
theological_decisions:
- issue: παρουσία를 「재림」으로 옮기는 정책
  chosen_reading: 재림
  alternative_readings:
  - 오심
  - 임재
  rationale: 본문은 그리스도의 종말론적 도래를 명시적으로 가리키므로 한국어 신학 전통의 정착어 「재림」이 가장 명료하다. 「임재」는 정적 현존을 시사하므로 본 정황에 적합치 않다.
  doctrine_reference: 'KOREAN_PIPELINE Glossary: παρουσία(of the Lord) → 임재/재림 (case-by-case)'
- issue: 재림과 「함께 모임」의 관계
  chosen_reading: 두 요소를 단순 병렬로 보존
  alternative_readings:
  - 「그분의 재림 때의 우리의 모임」으로 한 사건으로 해석
  rationale: 헬라어 ὑπέρ + 두 속격 + καί 구조는 두 요소를 단순히 연결할 뿐 시간적·논리적 관계를 명시하지 않는다. 번역도 그 절제를 보존한다.
  doctrine_reference: 'Preserve theological tension'
