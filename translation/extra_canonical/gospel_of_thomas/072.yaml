translation:
  text: A man said to him[a], "Tell my brothers, so that they may divide my father's
    property with me." He said to him, "Man, who has made me a divider?" He turned
    to his disciples and said to them, "I am not a divider, am I?"
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Initial ⲡⲉϫⲉⲟⲩⲣⲱⲙⲉ (‘a man said’) is partially restored on NH II, 46; restoration
      brackets in Dilley’s printed text indicate minor loss.
    reason: lacuna_or_restoration
  - marker: b
    text: Printed text reads ⲛ̄ⲛⲁⲥⲛⲏⲩ (‘my brothers,’ plural); normalized line lists
      ⲛⲡⲁⲥⲟⲛ (‘my brother,’ sing.). Context favors plural, but either is grammatically
      possible.
    reason: textual_variant
  - marker: c
    text: ⲛⲡϩⲛⲁⲁⲩ can also mean ‘inheritance’ or ‘possessions’; ‘property’ is chosen
      to avoid legal connotations not explicit in the Coptic.
    reason: lexical_alternative
  - marker: d
    text: ⲕⲱⲧⲛⲧⲟϥ (normalized) vs. ⲕⲟⲧϥ (printed) reflects Sahidic/Lycopolitan orthographic
      variation of ‘turn (oneself).’
    reason: dialect_note
  - marker: e
    text: The particle ⲙⲏ may be read deictically (‘Look/Behold’) or, by influence
      of Greek μή, with prohibitive nuance (‘Do not [let it be] that I am…’). We render
      ‘Look’ but the clause is taken as a denial in context.
    reason: lexical_alternative
  - marker: f
    text: Compare Luke 12:13–14, where ‘judge’ (δικαστής) appears alongside ‘divider’;
      Thomas’s version retains only ‘divider.’
    reason: cross_reference
  - marker: g
    text: Or '"Look—I am not a divider."'.
    reason: previous_rendering
lexical_decisions:
- source_word: ⲡⲉϫⲉⲟⲩⲣⲱⲙⲉ ⲛⲁⲛⲧⲟϥ
  chosen: A man said to him
  alternatives:
  - A man spoke to him
  lexicon: Crum; Lambdin
  rationale: ⲡⲉϫⲉ + ⲛⲁⲛⲧⲟϥ is the standard “said to him.” ⲣⲱⲙⲉ is “man.” Retain plain
    diction.
- source_word: ϫⲱⲛⲧⲟⲥ (printed ⲛ̄ⲛⲁϫⲟⲟⲥ)
  chosen: tell
  alternatives:
  - say to
  - speak to
  lexicon: Crum s.v. ϫⲟⲟⲥ; Lambdin §37
  rationale: 'Imperative/request sense fits context: a petition to Jesus. “Tell” carries
    directive force without paraphrase.'
- source_word: ⲛⲡⲁⲥⲟⲛ / ⲛⲛⲁⲥⲛⲏⲩ
  chosen: my brothers
  alternatives:
  - my brother
  lexicon: Crum s.v. ⲥⲛⲏⲩ
  rationale: Printed text shows plural ⲛⲛⲁⲥⲛⲏⲩ; normalized line lists ⲛⲡⲁⲥⲟⲛ (sing.).
    The petition naturally targets multiple siblings. We translate the plural and
    note the variant.
- source_word: ϩⲓⲛⲁ ⲉⲣⲉⲛⲧⲟⲟⲩ ⲛⲁⲡⲱϣⲉ
  chosen: so that they may divide
  alternatives:
  - in order that they divide
  - that they should divide
  lexicon: Lambdin §146 (ϩⲓⲛⲁ); Crum s.v. ⲡⲱϣⲉ
  rationale: ϩⲓⲛⲁ + subjunctive gives purpose. ⲡⲱϣⲉ is “divide, apportion.”
- source_word: ⲛⲡϩⲛⲁⲁⲩ
  chosen: property
  alternatives:
  - inheritance
  - possessions
  lexicon: Crum s.v. ϩⲛⲁⲁⲩ
  rationale: Term denotes goods/estate. “Property” is neutral; “inheritance” is a
    possible nuance given the family context.
- source_word: ⲙⲛⲁⲛⲟⲕ
  chosen: with me
  alternatives: []
  lexicon: Crum s.v. ⲙⲛ
  rationale: Comitative preposition ⲙⲛ + pronoun; straightforward.
- source_word: ⲱ ⲡⲣⲱⲙⲉ ⲛⲓⲙ
  chosen: Man, who
  alternatives:
  - O man, who
  - Sir, who
  lexicon: Crum s.v. ⲣⲱⲙⲉ; Lambdin §108
  rationale: Vocative force from ⲱ; retain compact, slightly brusque address to preserve
    Thomas’s sharp tone.
- source_word: ⲉⲓⲣⲉ (ⲉⲧⲉⲣⲉ…ⲉⲓⲣⲉ)
  chosen: made/appointed
  alternatives:
  - set
  - established
  lexicon: Crum s.v. ⲉⲓⲣⲉ
  rationale: Covers ‘make, do, appoint.’ In context, “made/appointed me [as]” fits
    best.
- source_word: ⲛⲣⲉϥⲡⲱϣⲉ
  chosen: a divider
  alternatives:
  - one who divides
  - arbitrator
  lexicon: Crum s.v. ⲡⲱϣⲉ
  rationale: 'Agentive ⲛⲣⲉϥ- forms a “doer” noun: ‘divider.’ Avoid harmonizing to
    ‘judge’; Thomas’s wording is distinct.'
- source_word: ⲁⲛⲧⲟϥ ⲕⲱⲧⲛⲧⲟϥ (printed ⲁϥⲕⲟⲧϥ)
  chosen: he turned (toward)
  alternatives:
  - he turned himself
  - he turned to
  lexicon: Crum s.v. ⲕⲱⲧⲛ; Layton
  rationale: Reflexive compound ⲕⲱⲧⲛⲧⲟϥ indicates turning oneself; idiomatically ‘he
    turned to.’ Printed ⲕⲟⲧϥ reflects orthographic variation.
- source_word: ⲙⲁⲑⲏⲧⲏⲥ
  chosen: disciples
  alternatives: []
  lexicon: Crum s.v. ⲙⲁⲑⲏⲧⲏⲥ
  rationale: Greek loanword; standard rendering.
- source_word: ⲙⲏ
  chosen: Look—
  alternatives:
  - Do not
  - Behold—
  lexicon: Layton; Lambdin (particles)
  rationale: Deictic/exclamatory particle in Thomas often functions as ‘look/behold.’
    Some take it as Greek μή with prohibitive force; we retain deictic ‘Look—’ and
    note the nuance.
- source_word: ⲉⲣⲉⲁⲛⲟⲕ ϣⲱⲡⲉ
  chosen: that I am
  alternatives:
  - that I become
  - that I appear
  lexicon: Crum s.v. ϣⲱⲡⲉ; Lambdin §92
  rationale: ϣⲱⲡⲉ is ‘be/become;’ here copular sense fits. The clause depends on ⲙⲏ
    as an exclamatory ‘Look—that I am…’ with contextual negation.
- source_word: ⲛⲣⲉϥⲡⲱϣⲉ (final clause)
  chosen: a divider
  alternatives:
  - one who divides
  lexicon: Crum s.v. ⲡⲱϣⲉ
  rationale: Repeat of agentive; retain terse noun rather than paraphrase.
textual_note: 'Codex II, p. 46 shows restoration brackets at the start: [ⲡⲉ]ϫⲉⲟⲩⲣⲱⲙⲉ
  (and within ⲣⲱⲙⲉ), indicating minor loss. The printed line has ⲛ̄ⲛⲁⲥⲛⲏⲩ (‘my brothers,’
  plural), while the normalized lemmatization gives ⲛⲡⲁⲥⲟⲛ (singular). We translate
  the plural—both fit the scene—flagging the variation. Line 4 printed ⲁϥⲕⲟⲧϥ corresponds
  to normalized ⲕⲱⲧⲛⲧⲟϥ, a reflexive form typical of Sahidic/Lycopolitan variation;
  sense remains ‘he turned [to].’ The final clause begins with ⲙⲏ; Thomas often uses
  this particle deictically (‘Look/Behold’). The normalized text does not show an
  explicit ⲁⲛ negation, but the rhetorical context (“Who made me a divider?”) and
  common scholarly treatment support a construal equivalent to “I am not a divider.”
  We preserve the deictic ⲙⲏ in English and render the clause with negation; reviewers
  may wish to consider whether to read ⲙⲏ as prohibitive (‘Do not [let it be] that
  I am a divider’). No POxy Greek fragment overlaps Saying 72.'
