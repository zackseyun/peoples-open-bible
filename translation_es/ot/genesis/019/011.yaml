translation:
  language: es
  text: Y golpearon a los hombres que estaban a la entrada de la casa con ceguera[a], del menor al mayor, y se agotaron tratando de encontrar la puerta.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «con un deslumbramiento» o «con confusión visual»; el raro término hebreo puede sugerir más que una ceguera ordinaria.
    reason: lexical_alternative
lexical_decisions:
- source_word: הִכּוּ
  english_pob_choice: struck
  chosen_spanish: golpearon
  alternatives_spanish:
  - hirieron
  - azotaron
  - golpearon con fuerza
  lexicon: HALOT
  rationale: El verbo hebreo נכה en esta forma expresa una acción violenta de golpear. «Golpearon» conserva la fuerza causal de modo natural en español moderno sin introducir un matiz más técnico o arcaico que el texto no exige.
- source_word: הָאֲנָשִׁים
  english_pob_choice: the men
  chosen_spanish: los hombres
  alternatives_spanish:
  - las personas
  - los varones
  lexicon: HALOT
  rationale: El sustantivo masculino plural designa aquí al grupo masculino frente a la casa de Lot. «Hombres» es preciso y evita diluir el referente específico.
- source_word: אֲשֶׁר פֶּתַח הַבַּיִת
  english_pob_choice: who were at the entrance of the house
  chosen_spanish: que estaban a la entrada de la casa
  alternatives_spanish:
  - que estaban en el umbral de la casa
  - que estaban en la puerta de la casa
  lexicon: HALOT
  rationale: El hebreo describe la ubicación de los hombres. «A la entrada de la casa» es natural, reproduce el valor locativo de פֶּתַח y mantiene la continuidad del mismo término al final del versículo.
- source_word: בַּסַּנְוֵרִים
  english_pob_choice: with blindness
  chosen_spanish: con ceguera[a]
  alternatives_spanish:
  - con ceguedad[a]
  - con un deslumbramiento[a]
  - con confusión visual[a]
  lexicon: HALOT
  rationale: «Ceguera» es la equivalencia más clara y transparente para el efecto narrativo. Se conserva la tensión semántica del término raro mediante una nota, porque el hebreo puede implicar algo más que ceguera ordinaria.
- source_word: מִקָּטֹן וְעַד גָּדוֹל
  english_pob_choice: from the least to the greatest
  chosen_spanish: desde el más pequeño hasta el más grande
  alternatives_spanish:
  - del menor al mayor
  - desde el más joven hasta el más viejo
  lexicon: HALOT
  rationale: La expresión hebrea funciona como merismo inclusivo. «Desde el más pequeño hasta el más grande» comunica el alcance total del grupo en español claro, sin perder la idea de totalidad.
- source_word: וַיִּלְאוּ
  english_pob_choice: they wore themselves out
  chosen_spanish: se agotaron
  alternatives_spanish:
  - se cansaron
  - se fatigaron
  - se rindieron de cansancio
  lexicon: HALOT
  rationale: El verbo expresa agotamiento físico o desgaste por esfuerzo inútil. «Se agotaron» conserva esa fuerza de manera concisa y natural.
- source_word: לִמְצֹא
  english_pob_choice: trying to find
  chosen_spanish: tratando de encontrar
  alternatives_spanish:
  - para encontrar
  - buscando
  lexicon: HALOT
  rationale: El infinitivo de propósito en contexto comunica la finalidad de su esfuerzo. «Tratando de encontrar» hace explícita la acción en curso sin añadir contenido ajeno.
- source_word: הַפָּתַח
  english_pob_choice: the doorway
  chosen_spanish: la entrada
  alternatives_spanish:
  - el umbral
  - la puerta
  lexicon: HALOT
  rationale: פֶּתַח puede referirse a abertura, entrada o acceso. Aquí «la entrada» evita la repetición de «entrada de la casa» de modo poco natural y mantiene el sentido del lugar que ya no lograban localizar.
theological_decisions:
- issue: Naturaleza del castigo expresado por סַנְוֵרִים
  english_pob_reading: a divinely inflicted blindness
  chosen_spanish_reading: una ceguera infligida por Dios, sin precisar más su mecanismo
  alternative_spanish_readings:
  - un deslumbramiento divino
  - una confusión visual enviada por Dios
  rationale: El término hebreo es raro y puede sugerir más que ceguera ordinaria. La traducción principal conserva la lectura transparente del relato, pero la nota permite el rango semántico sin resolver indebidamente la tensión lexical.
  doctrine_reference: Preservar la tensión lexical y la agencia divina en el juicio narrado.
translation_notes:
  revision_awareness: 'El texto sigue de cerca el consenso alto del audit trail en inglés: mantiene la imagen de ceguera como traducción principal, conserva el merismo inclusivo y expresa el agotamiento con un verbo natural en español. No se introdujeron cambios de fondo respecto de la última revisión aprobada.'
  spanish_consistency_notes:
  - Se mantiene «entrada» para פֶּתַח en ambos extremos del versículo, evitando oscilaciones entre «puerta» y «entrada» sin razón exegética.
  - «Ceguera» se usa como término principal y se reserva la nota para las alternativas semánticas, de acuerdo con la cautela del original.
  - «Los hombres» conserva el referente masculino específico del hebreo sin recurrir a formas genéricas más amplias.
  - La construcción «se agotaron tratando de encontrar» preserva la relación de propósito del infinitivo hebreo y su resultado narrativo.
