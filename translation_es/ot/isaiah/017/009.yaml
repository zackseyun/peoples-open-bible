translation:
  language: es
  text: En aquel día sus ciudades fortificadas serán como los lugares abandonados del bosque y la cima del árbol[a], que abandonaron a causa de los hijos de Israel[b]; y será desolación.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: También puede entenderse como «la copa del árbol» o «la rama superior». El hebreo se refiere a la parte más alta del árbol.
    reason: lexical_alternative
  - marker: b
    text: 'O: «que abandonaron por causa de los hijos de Israel». La expresión hebrea también puede indicar retirada desde delante de la presencia de Israel.'
    reason: alternative_reading
lexical_decisions:
- source_word: בַּיּוֹם הַהוּא
  english_pob_choice: In that day
  chosen_spanish: En aquel día
  alternatives_spanish:
  - En ese día
  - Aquel día
  lexicon: HALOT
  rationale: Fórmula profética temporal estándar. «En aquel día» conserva el valor solemne y natural del hebreo sin sonar artificial en español.
- source_word: עָרֵי מָעֻזּוֹ
  english_pob_choice: his fortified cities
  chosen_spanish: sus ciudades fortificadas
  alternatives_spanish:
  - las ciudades de su fortaleza
  - sus ciudades de refugio/fortaleza
  lexicon: HALOT
  rationale: El hebreo dice literalmente «ciudades de su fortaleza», pero en español la construcción adjetival «ciudades fortificadas» comunica mejor la idea de ciudades fuertes o defensivas, manteniendo el sentido del poseedor singular implícito por el sufijo -וֹ.
- source_word: כַּעֲזוּבַת
  english_pob_choice: like the deserted places
  chosen_spanish: como los lugares abandonados
  alternatives_spanish:
  - como un abandono
  - como cosas abandonadas
  lexicon: HALOT
  rationale: La forma constructa femenina expresa estado/condición de abandono. «Lugares abandonados» preserva la imagen espacial y resulta claro en español.
- source_word: הַחֹרֶשׁ
  english_pob_choice: the forest
  chosen_spanish: del bosque
  alternatives_spanish:
  - de la selva
  - del monte arbolado
  lexicon: HALOT
  rationale: «Bosque» es el equivalente más natural y digno para חֹרֶשׁ en este contexto. Mantiene la imagen de crecimiento denso o arbolado sin sobreespecificar.
- source_word: וְהָאָמִיר
  english_pob_choice: the treetop
  chosen_spanish: la cima del árbol
  alternatives_spanish:
  - la copa del árbol
  - la rama más alta
  lexicon: HALOT
  rationale: El término hebreo puede referirse al punto más alto o a la copa/ramaje superior. «La cima del árbol» conserva la idea de altura extrema y deja espacio a la ambigüedad léxica del original.
- source_word: אֲשֶׁר עָזְבוּ
  english_pob_choice: which they abandoned
  chosen_spanish: que abandonaron
  alternatives_spanish:
  - que dejaron
  - que fueron abandonados
  lexicon: HALOT
  rationale: El verbo plural activo del hebreo se refleja de manera directa con «abandonaron», preservando el sujeto implícito plural y la fuerza verbal activa.
- source_word: מִפְּנֵי בְּנֵי יִשְׂרָאֵל
  english_pob_choice: because of the sons of Israel
  chosen_spanish: a causa de los hijos de Israel
  alternatives_spanish:
  - por temor a los hijos de Israel
  - delante de los hijos de Israel
  - ante los hijos de Israel
  lexicon: HALOT
  rationale: La POB en inglés revisó esta frase hacia un matiz causal. «A causa de» en español comunica bien el valor de retirada/huida ante la presencia de Israel sin forzar una sola interpretación. Se conserva «hijos de Israel» por corresponder al hebreo y al criterio de fidelidad formal.
- source_word: וְהָיְתָה שְׁמָמָה
  english_pob_choice: and it will be a desolation
  chosen_spanish: y habrá desolación
  alternatives_spanish:
  - y será una desolación
  - y quedará desolada
  lexicon: HALOT
  rationale: El hebreo expresa el resultado final de ruina. «Habrá desolación» es breve, fiel y natural; evita una paráfrasis excesiva y preserva el carácter conclusivo de la cláusula.
theological_decisions:
- issue: שְׁמָמָה como resultado de juicio y devastación
  english_pob_reading: and it will be a desolation
  chosen_spanish_reading: y habrá desolación
  alternative_spanish_readings:
  - y será una desolación
  - y quedará desolada
  rationale: No se atenúa el juicio implícito ni se lo moraliza. La formulación conserva el resultado objetivo de devastación que el hebreo declara, sin añadir agentes ni explicaciones no presentes en el verso.
  doctrine_reference: DOCTRINE.md §Juicio y lenguaje profético
- issue: בְּנֵי יִשְׂרָאֵל como ethnónimo masculino
  english_pob_reading: sons of Israel
  chosen_spanish_reading: los hijos de Israel
  alternative_spanish_readings:
  - el pueblo de Israel
  - los israelitas
  rationale: Se mantiene la forma masculina del hebreo y el eco bíblico tradicional del ethnónimo. En español «hijos de Israel» es inteligible y conserva la tensión formal del original.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión auditada del POB en inglés que prefirió un matiz causal para מִפְּנֵי y ajustó la última cláusula a una expresión más directa del resultado. La versión española sigue esa revisión, pero mantiene una formulación pública natural y lecturable.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» como norma del proyecto solo cuando aparezca el nombre divino; este verso no lo contiene.
  - Se eligió «hijos de Israel» para reflejar el plural masculino del hebreo y la consistencia del criterio POB.
  - «Bosque» y «cima del árbol» preservan la imagen vegetal sin introducir interpretaciones botánicas más específicas que el hebreo no exige.
