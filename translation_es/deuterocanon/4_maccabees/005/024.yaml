review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien la estructura y el sentido general del griego: παιδεύει como formación moral, εὐσεβείαν como piedad, σέβειν como adorar, y μόνον τὸν ὄντα θεὸν como el Dios que verdaderamente existe. Sin embargo, dos elecciones debilitan la alineación fina con la evidencia y con el rastro POB: ''disciplina'' para παιδεύει suena más correctivo que formativo, y ''sea justo'' para ἰσονομεῖν desplaza el matiz de equidad/imparcialidad hacia una justicia moral más genérica.'
  spanish_quality_summary: El español es claro y digno, pero 'disciplina en la justicia' resulta menos natural que 'forma en la justicia/rectitud', y 'sea justo en todos los asuntos de conducta' suena algo redundante y semánticamente difuso. 'Con debida majestad' fluye mejor que 'con majestad debida'. El resto es legible y apropiado para un registro bíblico moderno.
  glossary_alignment: 'Hay una leve desviación del criterio POB para δικαιοσύνη: el inglés auditado mantiene ''righteousness'' con alternativa ''justice''; en español, ''justicia'' es posible, pero aquí el contexto de formación ética favorece más ''rectitud'' en el texto principal, preservando ''justicia'' como alternativa. ''Piedad'' está bien alineado. No hay conflicto con la terminología teológica del proyecto.'
  issues:
  - severity: medium
    issue: παιδεύει traducido como 'disciplina'
    rationale: 'Aunque posible, ''disciplina'' en español se oye más punitivo/correctivo. El contexto y la decisión inglesa ''trains'' apuntan mejor a formación moral: ''forma'' o ''educa''.'
  - severity: medium
    issue: ἰσονομεῖν traducido como 'sea justo'
    rationale: El verbo apunta a equidad, imparcialidad o trato igualitario. 'Sea justo' es demasiado amplio y además se superpone con δικαιοσύνη del inicio. 'Actúe con equidad' o 'sea equitativo' preserva mejor el matiz.
  - severity: low
    issue: '''con majestad debida'' suena menos idiomático'
    rationale: La colocación natural en español formal es 'con debida majestad'.
  - severity: low
    issue: La nota [a] queda invertida respecto del rastro inglés
    rationale: El inglés principal usa 'righteousness' y deja 'justice' como alternativa. En español conviene reflejar esa lógica con 'rectitud' en texto principal y 'justicia' como alternativa, dado el uso contextual.
  revised_spanish_text: Y forma en la rectitud[a], para que uno actúe con equidad en todos los asuntos de conducta, y enseña piedad, para que uno adore solamente al Dios que verdaderamente existe[b] con debida majestad.
  revised_footnotes:
