base_translation:
  language: en
  yaml_path: translation/ot/jeremiah/040/008.yaml
  text: Then Ishmael son of Nethaniah[a], and Johanan and Jonathan the sons of Kareah, and Seraiah son of Tanhumeth, and the sons of Ephai the Netophathite[b], and Jezaniah son of the Maacathite—they and their men—came to Gedaliah at Mizpah.
  footnotes:
