translation:
  language: es
  text: Cobrad ánimo[a], pueblo mío, el memorial de Israel.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «recuerdo de Israel». El griego μνημόσυνον puede denotar tanto un memorial como un acto u objeto de recuerdo.
    reason: lexical_alternative
lexical_decisions:
- source_word: Θαρσεῖτε
  english_pob_choice: Take courage
  chosen_spanish: Cobrad ánimo
  alternatives_spanish:
  - Tened ánimo
  - Cobrad valor
  - Tened valor
  lexicon: BDAG
  rationale: El imperativo plural de θαρσέω expresa exhortación a la valentía o confianza. «Cobrad ánimo» conserva la fuerza directa del mandato y suena natural en español bíblico sin perder dignidad.
- source_word: λαός μου
  english_pob_choice: my people
  chosen_spanish: pueblo mío
  alternatives_spanish:
  - mi pueblo
  - oh pueblo mío
  lexicon: BDAG
  rationale: La relación posesiva y comunitaria se conserva con «pueblo mío». El orden pospuesto mantiene un tono solemne y cercano al registro profético, sin añadir una vocalización no presente en el griego.
- source_word: μνημόσυνον
  english_pob_choice: memorial
  chosen_spanish: memorial
  alternatives_spanish:
  - recuerdo
  - remembranza
  - monumento conmemorativo
  lexicon: BDAG
  rationale: «Memorial» preserva mejor el sustantivo concreto y formal del griego. «Recuerdo» sería más natural en español, pero atenúa la densidad nominal que el audit trail inglés también retuvo.
- source_word: Ἰσραήλ
  english_pob_choice: Israel
  chosen_spanish: Israel
  alternatives_spanish:
  - Israél
  lexicon: BDAG
  rationale: Nombre propio conservado según el uso bíblico estándar en español y la política del proyecto.
theological_decisions:
- issue: Sentido de la frase appositiva μνημόσυνον Ἰσραήλ
  english_pob_reading: 'Treat as a second vocative/appositional address: ''my people, the memorial of Israel'''
  chosen_spanish_reading: 'Tratarlo como un segundo sintagma vocativo/apposicional: «pueblo mío, memorial de Israel»'
  alternative_spanish_readings:
  - «pueblo mío, recuerdo de Israel»
  - «pueblo mío, oh memorial de Israel»
  rationale: El griego presenta una frase nominal sin verbo que puede leerse como aposición o apelativo añadido. La traducción conserva esa tensión en vez de resolverla interpretativamente, siguiendo la decisión auditada del POB en inglés.
  doctrine_reference: Preservar la tensión literaria y teológica sin armonizarla en exceso.
translation_notes:
  revision_awareness: El texto sigue la revisión auditada del inglés POB que añadió el artículo antes de «memorial» para reflejar más naturalmente el sintagma appositivo; en español, el sustantivo queda igualmente natural sin artículo expreso.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» como norma del proyecto solo cuando aparezca el tetragrámaton; aquí no aplica.
  - Se conservó el registro bíblico sobrio y directo, sin sustituir «memorial» por una paráfrasis explicativa.
  - La nota al pie responde a la alternativa lexical preservada por el inglés POB y a la ambigüedad propia de μνημόσυνον.
