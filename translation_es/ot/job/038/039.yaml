translation:
  language: es
  text: ¿Cazarás presa para la leona, y saciarás el apetito[a] de los cachorros de león?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «llenarás el hambre de los cachorros de león». El hebreo literalmente usa lenguaje de «llenar» su vida/apetito.'
    reason: lexical_alternative
lexical_decisions:
- source_word: הֲ/תָצוּד
  english_pob_choice: Do you hunt
  chosen_spanish: ¿Cazarás
  alternatives_spanish:
  - ¿Cazarás tú
  - ¿Huntarás
  lexicon: HALOT
  rationale: La forma interrogativa retórica pide una traducción natural en español. «Cazarás» conserva el valor de ‘hunt’ y mantiene el tono de pregunta dirigida a Job sin forzar una construcción más literal y menos idiomática.
- source_word: לְ/לָבִיא
  english_pob_choice: for the lioness
  chosen_spanish: para la leona
  alternatives_spanish:
  - para el león
  - para una leona
  lexicon: HALOT
  rationale: El contexto de provisión para crías hace más probable el sentido de hembra. «Leona» reproduce el matiz contextual que la POB inglesa documentó con «lioness», manteniendo la idea de provisión «para».
- source_word: טָרֶף
  english_pob_choice: prey
  chosen_spanish: presa
  alternatives_spanish:
  - alimento
  - caza
  lexicon: HALOT
  rationale: «Presa» conserva el matiz depredador de טָרֶף mejor que un término genérico como «alimento». En español es el equivalente más natural y preciso para lo cazado por un animal carnívoro.
- source_word: וְ/חַיַּת
  english_pob_choice: the appetite
  chosen_spanish: el apetito
  alternatives_spanish:
  - el hambre
  - la vida
  - el deseo
  lexicon: HALOT
  rationale: La POB inglesa entiende aquí una expresión idiomática relacionada con la necesidad de ser llenada. En español, «apetito» comunica bien esa fuerza interna de hambre/deseo sin perder la conexión con el verbo «llenar/satisfacer».
- source_word: כְּפִירִים
  english_pob_choice: of the young lions
  chosen_spanish: de los leoncillos
  alternatives_spanish:
  - de los cachorros de león
  - de los jóvenes leones
  lexicon: HALOT
  rationale: «Leoncillos» expresa de forma natural que son leones jóvenes y mantiene el tono evocativo del hebreo. También evita la posible dureza de una perífrasis más técnica.
- source_word: תְּמַלֵּא
  english_pob_choice: satisfy
  chosen_spanish: saciarás
  alternatives_spanish:
  - llenarás
  - satisfacerás
  lexicon: HALOT
  rationale: Aunque el hebreo literalmente dice ‘llenar’, la POB inglesa ya documenta la equivalencia idiomática ‘satisfy’. En español, «saciarás» conserva esa fuerza de colmar la necesidad de alimento/hambre con un verbo natural y preciso.
translation_notes:
  revision_awareness: La revisión más reciente indica que no hubo cambios; el verso se mantiene en alto acuerdo con la fuente y con la traducción inglesa auditada.
  spanish_consistency_notes:
  - Se usa «Yahvé» por defecto solo cuando el texto fuente lo exige; este verso no contiene el nombre divino.
  - Se preserva el paralelismo de caza/provisión con un español natural y sobrio.
  - «Presa» y «saciarás» mantienen la imaginería de alimento depredador sin añadir interpretación doctrinal.
  - La nota aclara la alternativa léxica de género en לָבִיא sin sobrecargar el texto principal.
