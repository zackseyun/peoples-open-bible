translation:
  language: es
  text: Entonces comenzó a reprochar a las ciudades en las que se habían hecho la mayoría de sus obras poderosas, porque no se arrepintieron.
  philosophy: optimal-equivalence
  footnotes: []
lexical_decisions:
- source_word: Τότε
  english_pob_choice: Then
  chosen_spanish: Entonces
  alternatives_spanish:
  - Luego
  - En aquel tiempo
  lexicon: BDAG
  rationale: Marca temporal y discursiva natural en español; conserva el avance narrativo sin añadir énfasis interpretativo.
- source_word: ἤρξατο ὀνειδίζειν
  english_pob_choice: he began to reproach
  chosen_spanish: empezó a reprochar
  alternatives_spanish:
  - comenzó a reprochar
  - empezó a reprender
  lexicon: BDAG
  rationale: Se conserva el valor incoativo de ἤρξατο con 'empezó a'. 'Reprochar' refleja ὀνειδίζω con fuerza de censura/vergüenza sin intensificarlo a una reprensión más formal de lo que exige el griego.
- source_word: τὰς πόλεις
  english_pob_choice: the cities
  chosen_spanish: las ciudades
  alternatives_spanish:
  - los pueblos
  - las poblaciones
  lexicon: BDAG
  rationale: πόλις se traduce de forma estándar por 'ciudad'; es transparente y respeta el referente geográfico del contexto.
- source_word: ἐν αἷς
  english_pob_choice: in which
  chosen_spanish: en las que
  alternatives_spanish:
  - donde
  lexicon: BDAG
  rationale: La relativa preposicional se vierte de modo formal y claro, manteniendo la relación gramatical del griego.
- source_word: ἐγένοντο
  english_pob_choice: had been done
  chosen_spanish: se habían hecho
  alternatives_spanish:
  - habían ocurrido
  - se habían realizado
  lexicon: BDAG
  rationale: Aquí γίνομαι se refiere a hechos que acontecieron; en español, 'se habían hecho' comunica de manera natural la pasiva/resultativa de las obras de Jesús y conserva la referencia a acciones previas.
- source_word: αἱ πλεῖσται
  english_pob_choice: most
  chosen_spanish: la mayoría de
  alternatives_spanish:
  - la mayor parte de
  - las más
  lexicon: BDAG
  rationale: '''La mayoría de'' expresa con precisión el superlativo plural y suena natural en español contemporáneo.'
- source_word: δυνάμεις
  english_pob_choice: mighty works
  chosen_spanish: obras poderosas
  alternatives_spanish:
  - milagros
  - obras de poder
  lexicon: BDAG
  rationale: 'Se preserva la amplitud semántica de δυνάμεις: no se reduce automáticamente a ''milagros'', aunque esa sea una alternativa interpretativa válida. ''Obras poderosas'' mantiene el énfasis en el poder divino y su relación con los hechos de Jesús.'
- source_word: ὅτι
  english_pob_choice: because
  chosen_spanish: porque
  alternatives_spanish:
  - pues
  - ya que
  lexicon: BDAG
  rationale: Introduce la razón del reproche de manera directa y natural en español.
- source_word: οὐ μετενόησαν
  english_pob_choice: they did not repent
  chosen_spanish: no se arrepintieron
  alternatives_spanish:
  - no cambiaron de mente
  - no volvieron en sí
  lexicon: BDAG
  rationale: μετανοέω se vierte aquí con el sentido espiritual y moral de 'arrepentirse', que corresponde al contexto de respuesta a las obras de Jesús. 'Cambiar de mente' sería demasiado analítico y menos idiomático en español bíblico contemporáneo.
theological_decisions:
- issue: Cómo renderizar δυνάμεις en un contexto de obras de Jesús
  english_pob_reading: mighty works
  chosen_spanish_reading: obras poderosas
  alternative_spanish_readings:
  - milagros
  - obras de poder
  rationale: La frase griega es amplia y resalta poder efectivo; 'obras poderosas' preserva esa amplitud sin imponer una categoría más estrecha. 'Milagros' es una interpretación legítima, pero menos transparente al término griego.
  doctrine_reference: Translation philosophy §1, §5
- issue: Cómo renderizar μετενόησαν
  english_pob_reading: they did not repent
  chosen_spanish_reading: no se arrepintieron
  alternative_spanish_readings:
  - no cambiaron de mente
  - no se volvieron
  rationale: El contexto exige una respuesta moral/espiritual a la revelación y a las obras de Jesús. 'Arrepentirse' conserva ese peso teológico y sigue siendo idiomático para lectores de español.
  doctrine_reference: Translation philosophy §6
translation_notes:
  revision_awareness: 'El audit trail inglés muestra una revisión relevante en la cláusula final: se descartó ''change their thinking'' en favor de ''repent'' para μετενόησαν. La versión española sigue esa revisión y evita una paráfrasis cognitiva. También se mantiene la amplitud de δυνάμεις con una expresión que no obliga a ''milagros'' como única opción.'
  spanish_consistency_notes:
  - Se usa 'Yahvé' como norma cuando corresponda, pero este versículo no contiene el tetragrámaton.
  - Se mantiene 'arrepintieron/arrepentirse' para μετανοέω en sentido espiritual, consistente con la política terminológica del proyecto.
  - '''Obras poderosas'' conserva la tensión entre potencia y milagro sin cerrar el término griego a una sola categoría.'
