translation:
  language: es
  text: De ellos saldrá acción de gracias[a] y el sonido de quienes se alegran; los multiplicaré, y no serán pocos; los honraré[b], y no serán insignificantes.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «el sonido de quienes celebran/juegan», pues el participio hebreo puede denotar risa festiva, juego o regocijo.
    reason: lexical_alternative
  - marker: b
    text: O «los haré honrados, y no serán pequeños». El hebreo usa términos que pueden aludir tanto al honor social como a la pequeñez/insignificancia.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְיָצָא
  english_pob_choice: will come
  chosen_spanish: saldrá
  alternatives_spanish:
  - vendrá
  - saldrá de entre ellos
  lexicon: HALOT
  rationale: El verbo con prefijo profético funciona con sentido futuro. En español, «saldrá» conserva la imagen de algo que emerge desde el pueblo, sin forzar una explicación añadida.
- source_word: מֵהֶם
  english_pob_choice: from them
  chosen_spanish: de ellos
  alternatives_spanish:
  - de entre ellos
  - desde ellos
  lexicon: HALOT
  rationale: Expresa origen o procedencia. «De ellos» es breve y natural, y mantiene la relación con lo que emerge del grupo restaurado.
- source_word: תּוֹדָה
  english_pob_choice: thanksgiving
  chosen_spanish: acción de gracias
  alternatives_spanish:
  - gratitud
  - alabanza
  lexicon: HALOT
  rationale: Aquí el sustantivo denota agradecimiento alabanza, no una ofrenda específica. «Acción de gracias» conserva ese valor verbal y resulta idiomático en español bíblico moderno.
- source_word: וְקוֹל
  english_pob_choice: and the sound of
  chosen_spanish: y la voz de
  alternatives_spanish:
  - y el sonido de
  - y el clamor de
  lexicon: HALOT
  rationale: El hebreo permite un campo amplio entre voz y sonido. En este contexto festivo, «la voz de» sigue de cerca la forma hebrea y suena natural unida al participio siguiente.
- source_word: מְשַׂחֲקִים
  english_pob_choice: those who rejoice
  chosen_spanish: quienes se alegran
  alternatives_spanish:
  - quienes celebran
  - quienes juegan
  - quienes hacen fiesta
  lexicon: HALOT
  rationale: El participio puede abarcar reír, jugar o celebrar con gozo. «Quienes se alegran» preserva la amplitud semántica y encaja bien con el paralelo de agradecimiento y restauración.
- source_word: וְהִרְבִּתִים
  english_pob_choice: I will multiply them
  chosen_spanish: los multiplicaré
  alternatives_spanish:
  - los aumentaré
  - los haré muchos
  lexicon: HALOT
  rationale: El hiphil de רבה comunica hacer numerosos. «Multiplicaré» es preciso, claro y conserva el tono de promesa de restauración.
- source_word: וְלֹא יִמְעָטוּ
  english_pob_choice: and they will not be few
  chosen_spanish: y no serán pocos
  alternatives_spanish:
  - y no disminuirán
  - y no se reducirán
  lexicon: HALOT
  rationale: 'El verbo מעט puede referirse a volverse pequeño o escaso. Dado el paralelismo con la multiplicación, la referencia numérica es la más directa: «no serán pocos».'
- source_word: וְהִכְבַּדְתִּים
  english_pob_choice: I will honor them
  chosen_spanish: los honraré
  alternatives_spanish:
  - los haré respetados
  - los haré importantes
  - los haré pesados
  lexicon: HALOT
  rationale: El hiphil de כבד puede significar hacer honorable, dar peso o dignidad. En este contexto de restauración y paralelismo con abundancia, «honraré» comunica bien la elevación de estatus.
- source_word: וְלֹא יִצְעָרוּ
  english_pob_choice: and they will not be insignificant
  chosen_spanish: y no serán insignificantes
  alternatives_spanish:
  - y no serán pequeños
  - y no serán menospreciados
  - y no quedarán rebajados
  lexicon: HALOT
  rationale: La forma verbal puede expresar ser pequeño, escaso o de poca importancia. «Insignificantes» reproduce la antítesis con «honraré» y mantiene la idea de dignidad social.
theological_decisions:
- issue: Naturaleza de las bendiciones de restauración prometidas
  english_pob_reading: Render the verse as describing concrete communal restoration expressed in praise, increase, and honor, without importing later ecclesiological or eschatological specifics.
  chosen_spanish_reading: Presentar el versículo como restauración concreta de la comunidad, expresada en gratitud, gozo, multiplicación y honor, sin añadir precisiones eclesiológicas o escatológicas posteriores.
  alternative_spanish_readings:
  - Leerlo sobre todo como bendición espiritual interior
  - Leerlo únicamente como exaltación político-nacional
  rationale: El hebreo habla directamente de acción de gracias, alegría, multiplicación y honor para el pueblo restaurado. La redacción española conserva ese carácter de restauración del pacto sin reducirlo a espiritualización ni imponer un marco doctrinal posterior.
  doctrine_reference: 'Afirmaciones; filosofía de traducción #1 y #3'
translation_notes:
  revision_awareness: 'La revisión más reciente no introdujo cambios: el pasaje quedó confirmado sin modificaciones necesarias, y la traducción española sigue la misma línea de lectura que el control cruzado calificó con alta concordancia.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como término por defecto cuando corresponda; este versículo no lo contiene.
  - Se usa «acción de gracias» para תּוֹדָה, evitando reducirlo a una ofrenda sacrificial.
  - Se preserva la tensión honor/insignificancia con «los honraré» / «no serán insignificantes», en paralelo con la duplicación de aumento y escasez.
  - Los marcadores de nota se colocan solo en palabras o frases con alternativa léxica relevante.
