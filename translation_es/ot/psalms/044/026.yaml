translation:
  language: es
  text: Porque nuestra alma[a] se ha hundido hasta el polvo[b]; nuestro vientre se aferra a la tierra.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «nuestra vida» o «nosotros mismos» para «nuestra alma».
    reason: lexical_alternative
  - marker: b
    text: O «se ha inclinado hasta el polvo» o «se ha postrado hasta el polvo».
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Ya que
  lexicon: HALOT
  rationale: El hebreo introduce la razón del clamor anterior. «Porque» expresa con naturalidad la fuerza causal sin perder el vínculo argumental del verso.
- source_word: שָׁחָה
  english_pob_choice: has sunk down
  chosen_spanish: se ha hundido
  alternatives_spanish:
  - se ha inclinado
  - se ha postrado
  - ha caído
  lexicon: HALOT
  rationale: El verbo admite la imagen de estar abatido o inclinado hacia abajo. «Se ha hundido» conserva la idea de descenso extremo y funciona bien con «en el polvo».
- source_word: לֶעָפָר
  english_pob_choice: to the dust
  chosen_spanish: en el polvo
  alternatives_spanish:
  - hasta el polvo
  - al polvo
  lexicon: HALOT
  rationale: עָפָר es «polvo». En español, «en el polvo» expresa el estado de humillación y el movimiento hacia abajo de manera natural y poética.
- source_word: נַפְשֵׁנוּ
  english_pob_choice: our soul
  chosen_spanish: nuestra alma
  alternatives_spanish:
  - nuestra vida
  - nosotros mismos
  lexicon: HALOT
  rationale: נֶפֶשׁ puede ser alma, vida o ser. Se mantiene «alma» para preservar el lenguaje antropológico poético que la POB inglesa decidió no reducir a «vida» ni a «nosotros mismos».
- source_word: דָּבְקָה
  english_pob_choice: clings
  chosen_spanish: se pega
  alternatives_spanish:
  - se adhiere
  - se aferra
  - se adosa
  lexicon: HALOT
  rationale: El verbo implica pegarse muy de cerca. «Se pega» reproduce la imagen corporal directa y el tono concreto del hebreo, sin suavizarla excesivamente.
- source_word: לָאָרֶץ
  english_pob_choice: to the earth
  chosen_spanish: a la tierra
  alternatives_spanish:
  - al suelo
  - al piso
  lexicon: HALOT
  rationale: אֶרֶץ puede ser tierra, suelo o país. Aquí, en paralelo con «polvo», «tierra» preserva el registro poético amplio y el paralelismo con el primer hemistiquio.
- source_word: בִּטְנֵנוּ
  english_pob_choice: our belly
  chosen_spanish: nuestro vientre
  alternatives_spanish:
  - nuestro abdomen
  - nuestra barriga
  - nuestro cuerpo
  lexicon: HALOT
  rationale: בֶּטֶן es literalmente vientre/barriga, y en poesía hebrea puede referirse al interior corporal. «Vientre» es fiel, solemne y más digno en español bíblico que «barriga».
theological_decisions:
- issue: Sentido antropológico de נַפְשֵׁנוּ
  english_pob_reading: our soul
  chosen_spanish_reading: nuestra alma
  alternative_spanish_readings:
  - nuestra vida
  - nosotros mismos
  rationale: 'Se mantiene la tensión semántica del hebreo: no se reduce a mera existencia física ni se explicita una antropología ajena al verso. «Alma» conserva el peso poético y teológico del lamento.'
  doctrine_reference: Translation philosophy §3, §6
- issue: Imagen corporal extrema en el segundo hemistiquio
  english_pob_reading: our belly clings to the earth
  chosen_spanish_reading: nuestro vientre se pega a la tierra
  alternative_spanish_readings:
  - nuestro cuerpo se adhiere a la tierra
  - nuestro vientre se aferra a la tierra
  rationale: La imagen hebrea es física y humillante; no debe suavizarse a un mero equivalente abstracto. «Vientre» mantiene el realismo corporal y el paralelismo con «polvo/tierra».
  doctrine_reference: Poetic register and bodily imagery in lament psalms
translation_notes:
  revision_awareness: 'El texto inglés auditado está en estado estable: la revisión más reciente indicó que no hacía falta ningún cambio y el control cruzado mostró acuerdo alto. La versión española sigue esa lectura estable, conservando tanto la imaginería de descenso al polvo como la tensión antropológica de נֶפֶשׁ.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma del proyecto cuando aparezca el nombre divino; este verso no lo contiene.
  - Se usa «alma» para נֶפֶשׁ, coherente con la decisión inglesa de conservar la amplitud antropológica del término.
  - Se evita suavizar el paralelismo corporal del segundo hemistiquio; «vientre» refleja mejor el hebreo que un término más abstracto.
  - La puntuación conserva el paralelismo poético con punto y coma entre hemistiquios.
