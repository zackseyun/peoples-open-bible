translation:
  language: es
  text: ¡Ánimo, padre![a] Y, cuando se reunieron,[b] él frotó sus ojos,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Griego literalmente: «Ten valor, padre» o «Ten ánimo, padre». También podría expresarse «Cobra ánimo, padre».'
    reason: lexical_alternative
  - marker: b
    text: La cláusula griega dice literalmente «cuando habían venido a estar juntos»; puede entenderse como su encuentro o reunión.
    reason: alternative_reading
lexical_decisions:
- source_word: Θάρσει
  english_pob_choice: Take courage
  chosen_spanish: ¡Ánimo!
  alternatives_spanish:
  - Ten valor
  - Ten ánimo
  - ¡Cobró valor!
  lexicon: LSJ
  rationale: El imperativo griego expresa aliento y exhortación. «¡Ánimo!» comunica de forma natural la fuerza de ánimo/reaseguro sin sonar rígido en español. Se conserva el tono de exhortación directa al padre.
- source_word: πάτερ
  english_pob_choice: father
  chosen_spanish: padre
  alternatives_spanish:
  - mi padre
  - padre mío
  lexicon: LSJ
  rationale: El vocativo griego no incluye posesivo explícito. En español, «padre» en vocativo es claro y fiel; añadir «mi» introduciría un matiz no presente en el texto.
- source_word: ὡς δὲ
  english_pob_choice: Then, when
  chosen_spanish: Y, cuando
  alternatives_spanish:
  - Entonces, cuando
  - Y cuando
  - Ahora bien, cuando
  lexicon: LSJ
  rationale: La expresión introduce la secuencia temporal. «Y, cuando» mantiene la relación narrativa sin sobrerrepresentar el valor consecutivo de forma artificial. La coma ayuda a reflejar la subordinación temporal.
- source_word: συνεδήχθησαν
  english_pob_choice: they had come together
  chosen_spanish: se reunieron
  alternatives_spanish:
  - vinieron juntos
  - se juntaron
  - se encontraron
  lexicon: LSJ
  rationale: El verbo apunta a un reunirse/venir juntos. En español, «se reunieron» es idiomático y conserva la idea de encuentro o reunión; evita una construcción más pesada como «habían venido juntos», que sería menos natural.
- source_word: διέτριψε
  english_pob_choice: he rubbed
  chosen_spanish: se frotó
  alternatives_spanish:
  - frotó
  - restregó
  - se talló
  lexicon: LSJ
  rationale: El verbo significa frotar. En el contexto de los ojos, «se frotó» expresa la acción de manera natural en español y conserva el gesto físico sin añadir interpretación médica.
- source_word: τοὺς ὀφθαλμοὺς αὐτοῦ
  english_pob_choice: his eyes
  chosen_spanish: los ojos
  alternatives_spanish:
  - sus ojos
  - los ojos de él
  lexicon: LSJ
  rationale: La referencia pronominal es clara por el contexto. «Los ojos» fluye bien en español con el verbo pronominal; la posesión queda implícita en el sujeto del verbo y en el contexto inmediato.
theological_decisions:
- issue: Si el vocativo debe sonar como consuelo o como exhortación física/moral
  english_pob_reading: Take courage, father.
  chosen_spanish_reading: ¡Ánimo, padre!
  alternative_spanish_readings:
  - Ten valor, padre
  - ¡Cobra ánimo, padre!
  rationale: No hay tensión doctrinal específica; la cuestión es de registro. «¡Ánimo!» comunica el apoyo y el impulso del imperativo griego sin cargarlo con una fórmula más arcaica.
  doctrine_reference: N/A
translation_notes:
  revision_awareness: 'Se tuvo en cuenta el audit trail inglés y la advertencia de revisión: la propuesta inglesa no requiere cambio sustancial, pero en español se ajustó la secuencia temporal y el verbo de reunión para mayor naturalidad sin perder el valor del griego.'
  spanish_consistency_notes:
  - Se mantiene «padre» en vocativo sin posesivo añadido, conforme al griego.
  - Se conserva el gesto físico de frotarse los ojos sin inferir una explicación médica que el texto no explicita.
  - Se usó puntuación exclamativa inicial para reflejar el tono de exhortación del imperativo griego.
  - La traducción evita «SEÑOR» u otra terminología no pertinente; el pasaje no contiene el tetragrámaton ni vocabulario cristológico.
