review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador conserva bien la estructura general del hebreo y la mayoría de las decisiones del POB inglés: «Yahvé», la metáfora matrimonial, «entristecida en espíritu» y «dice tu Dios» son fieles. Sin embargo, omite en el texto principal un elemento significativo del hebreo/POB inglés: כִּי תִמָּאֵס, «cuando es rechazada». Ese contenido fue desplazado a una nota, pero en el original forma parte de la línea principal. También «como a la esposa de la juventud» suena menos natural que una formulación que preserve mejor la comparación y admita el matiz de «esposa de juventud».'
  spanish_quality_summary: El español es claro y digno, pero la frase final queda incompleta por la omisión de «cuando es rechazada». Además, «como a la esposa de la juventud» resulta algo forzada; «como a una esposa de juventud cuando es rechazada» o «como a la esposa de la juventud cuando es rechazada» comunica mejor el sentido completo. Las notas son comprensibles, aunque la nota b debería reflejar la alternativa del POB inglés más directamente, incluyendo el matiz de rechazo/desprecio.
  glossary_alignment: 'Alineación buena con la terminología del proyecto: יהוה → «Yahvé» correctamente; אִשָּׁה → «esposa» con nota alternativa «mujer» correctamente; רוּחַ → «espíritu» correctamente. No hay conflicto terminológico mayor. La corrección requerida es de integridad semántica más que de glosario.'
  issues:
  - severity: high
    issue: Falta en el texto principal la cláusula כִּי תִמָּאֵס
    rationale: El hebreo y el POB inglés incluyen explícitamente «when she is rejected». En el borrador español ese contenido desaparece del texto y queda solo insinuado en la nota b, lo que reduce el sentido del original.
  - severity: medium
    issue: La formulación «como a la esposa de la juventud» suena algo rígida y no refleja del todo la compactación hebrea con claridad
    rationale: Aunque es defendible, en español natural conviene una redacción que mantenga la comparación y enlace con «cuando es rechazada» sin sonar truncada.
  - severity: low
    issue: La nota b no preserva plenamente la alternativa del POB inglés
    rationale: La nota actual habla de «tus años de juventud», pero no recoge la alternativa clave sobre «when she is rejected/despised», que es precisamente el punto sintáctico difícil documentado en inglés.
  revised_spanish_text: Porque Yahvé te ha llamado como a una esposa abandonada y entristecida en espíritu[a], como a una esposa de juventud cuando es rechazada[b], dice tu Dios.
