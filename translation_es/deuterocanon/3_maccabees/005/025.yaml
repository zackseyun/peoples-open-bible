translation:
  language: es
  text: Pero los judíos[a], durante aquel tiempo indiviso, unidos en el alma, extendiendo sus manos al cielo con cantos lúgubres y suplicación bañada en lágrimas, rogaban al Dios grandísimo que otra vez los ayudara sin demora.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «durante aquel tiempo ininterrumpido, unidos en el alma». La expresión griega es compacta y algo inusual, y puede leerse como continuidad temporal y como unidad interior comunitaria.'
    reason: lexical_alternative
lexical_decisions:
- source_word: οἱ δὲ Ἰουδαῖοι
  english_pob_choice: But the Jews
  chosen_spanish: Pero los judíos
  alternatives_spanish:
  - Y los judíos
  - Y los judíos, por su parte
  lexicon: NA
  rationale: Conserva el contraste discursivo de δέ con una conjunción adversativa natural en español, sin añadir interpretación.
- source_word: ἀμερῆ χρόνον
  english_pob_choice: that undivided time
  chosen_spanish: aquel tiempo indiviso
  alternatives_spanish:
  - aquel tiempo no dividido
  - aquel tiempo ininterrumpido
  lexicon: LSJ
  rationale: ἀμερῆ literalmente expresa algo no dividido. 'Indiviso' mantiene el matiz inusual y la continuidad temporal sin volverlo demasiado explicativo.
- source_word: ψυχοκοινούμενοι
  english_pob_choice: joined together in soul
  chosen_spanish: unidos en el alma
  alternatives_spanish:
  - unidos en espíritu
  - compartiendo una sola alma
  lexicon: LSJ
  rationale: El compuesto raro apunta a una unidad interior común. 'En el alma' conserva el ámbito interior sin forzar la frase a una fórmula teológica posterior.
- source_word: πολυδάκρυν ἱκετίαν
  english_pob_choice: tearful supplication
  chosen_spanish: suplicación bañada en lágrimas
  alternatives_spanish:
  - súplica llena de lágrimas
  - suplicación llorosa
  lexicon: LSJ
  rationale: La expresión enfatiza abundancia de lágrimas. 'Bañada en lágrimas' conserva la intensidad emotiva y la imaginería sin sonar áspera en español.
- source_word: ἐν μέλεσιν γοεροῖς
  english_pob_choice: with mournful songs
  chosen_spanish: con cantos lúgubres
  alternatives_spanish:
  - con melodías de lamento
  - con cantos de duelo
  lexicon: LSJ
  rationale: μέλεσιν remite a cantos o melodías; γοεροῖς añade tono de duelo/lamento. 'Lúgubres' es una equivalencia digna y clara para el registro litúrgico-poético.
- source_word: τείνοντες τὰς χεῖρας εἰς τὸν οὐρανόν
  english_pob_choice: stretching out their hands to heaven
  chosen_spanish: extendiendo sus manos al cielo
  alternatives_spanish:
  - alzando sus manos hacia el cielo
  - tendiendo sus manos al cielo
  lexicon: LSJ
  rationale: Es el gesto de oración hacia arriba. 'Al cielo' es natural en español y conserva el movimiento direccional de εἰς τὸν οὐρανόν.
- source_word: ἐδέοντο
  english_pob_choice: were begging
  chosen_spanish: pedían
  alternatives_spanish:
  - rogaban
  - suplicaban
  lexicon: LSJ
  rationale: El verbo expresa petición insistente. 'Pedían' evita sobrecargar el verso y permite que el resto de la cláusula sostenga la intensidad suplicante.
- source_word: τοῦ μεγίστου θεοῦ
  english_pob_choice: the greatest God
  chosen_spanish: al Dios grandísimo
  alternatives_spanish:
  - al Dios grandísimo
  - al Dios más grande
  - al Dios supremo
  lexicon: LSJ
  rationale: La forma griega es literalmente superlativa; 'grandísimo' preserva el valor morfológico y suena natural en español bíblico sin importar un título tradicional ajeno al texto.
- source_word: πάλιν
  english_pob_choice: again
  chosen_spanish: otra vez
  alternatives_spanish:
  - de nuevo
  - nuevamente
  lexicon: LSJ
  rationale: '''Otra vez'' expresa con claridad la repetición de la ayuda divina solicitada.'
- source_word: συντόμως
  english_pob_choice: without delay
  chosen_spanish: sin demora
  alternatives_spanish:
  - rápidamente
  - pronto
  lexicon: LSJ
  rationale: En un ruego urgente, 'sin demora' comunica mejor la prontitud pedida que un adverbio más general.
theological_decisions:
- issue: τοῦ μεγίστου θεοῦ como descripción divina
  english_pob_reading: the greatest God
  chosen_spanish_reading: al Dios grandísimo
  alternative_spanish_readings:
  - al Dios supremo
  - al Dios más grande
  rationale: Se mantiene el superlativo descriptivo del griego sin convertirlo en un título fijo no presente en el texto. 'Grandísimo' conserva la fuerza encomiástica y el tono orante.
  doctrine_reference: Translation philosophy §1, §6
translation_notes:
  revision_awareness: 'Se corrigió la ausencia del anclaje de nota al pie: el marcador [a] aparece ahora junto a «judíos». La redacción sigue de cerca el griego, preservando la rareza de ἀμερῆ y ψυχοκοινούμενοι y la secuencia de súplica, canto y petición urgente.'
  spanish_consistency_notes:
  - Se prefirió «Yahvé» según pauta general, pero este versículo no contiene el nombre divino explícito; por eso se tradujo θεοῦ como «Dios».
  - Se mantuvo «Dios grandísimo» para reflejar el superlativo griego μεγίστου sin introducir un título tradicional diferente.
  - La frase «unidos en el alma» conserva el matiz de ψυχοκοινούμενοι sin forzar «espíritu», ya que el compuesto apunta al ámbito del alma/vida común.
  - «Suplicación bañada en lágrimas» preserva πολυδάκρυν con un giro natural en español y deja visible la intensidad emocional del texto.
