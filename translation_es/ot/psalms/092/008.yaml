  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien la estructura y sentido del hebreo: circunstancia temporal («Cuando ... brotan»), imagen vegetal paralela («brotan ... florecen»), referencia colectiva a los impíos y fuerza teleológica/resultativa en לְהִשָּׁמְדָם. También conserva adecuadamente la tensión teológica entre prosperidad temporal y destrucción final. Sin embargo, hay un ajuste menor de fidelidad/estilo: «como hierba» es menos natural en este contexto poético que «como la hierba» en español bíblico corriente, y la nota a) no preserva con precisión la alternativa inglesa principal «all workers of wickedness flourish», pues «todos los que hacen el mal / la maldad» mezcla dos opciones y debilita el matiz de «workers of wickedness».'
  spanish_quality_summary: El español es claro, digno y ampliamente legible. La sintaxis fluye bien y evita calcos torpes. La principal mejora es pulir la naturalidad idiomática de la comparación vegetal («como la hierba») y hacer la nota léxica más exacta y limpia. El resto del verso está bien formulado para lectura pública.
  glossary_alignment: No hay conflictos con la terminología base del proyecto. «los impíos», «hacen el mal», «sean destruidos» y «para siempre» son compatibles con el registro previsto. La excepción contextual frente al inglés «workers of wickedness» está razonablemente justificada en español por naturalidad, aunque la nota debe conservar mejor la alternativa más literal («hacedores de maldad» o equivalente).
  issues:
  - severity: low
    issue: «como hierba» suena algo menos natural que «como la hierba» en español bíblico y general.
    rationale: El hebreo no exige artículo, pero en español la imagen comparativa habitual con materia vegetal suele leerse con más naturalidad con artículo definido, sin alterar el sentido.
  - severity: low
    issue: La nota [a] no reproduce con precisión la alternativa documentada «all workers of wickedness flourish».
    rationale: La formulación actual («todos los que hacen el mal / la maldad») mezcla glosas y no refleja claramente el valor más literal de פֹּעֲלֵי אָוֶן como «hacedores/obradores de maldad».
  revised_spanish_text: Cuando los impíos brotan como la hierba y florecen todos los que hacen el mal[a], es para que sean destruidos para siempre[b].
  revised_footnotes:
