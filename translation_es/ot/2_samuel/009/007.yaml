translation:
  language: es
  text: 'David le dijo: «No tengas miedo, porque ciertamente te mostraré bondad[a] por causa de Jonatán, tu padre, y te devolveré toda la tierra de Saúl, tu padre[b], y siempre comerás pan en mi mesa[c]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo hesed: también puede significar «amor leal», «amor fiel» o «lealtad de pacto», según el contexto.'
    reason: lexical_alternative
  - marker: b
    text: Hebreo «Saúl, tu padre»; «padre» puede significar un antepasado. Aquí Saúl es el abuelo de Mefiboset.
    reason: lexical_alternative
  - marker: c
    text: Hebreo «comer pan en mi mesa», un modismo para provisión continua y comunión de mesa.
    reason: cultural_note
lexical_decisions:
- source_word: אַל תִּירָא
  english_pob_choice: Do not be afraid
  chosen_spanish: No tengas miedo
  alternatives_spanish:
  - No temas
  lexicon: HALOT
  rationale: La negación exhortativa se expresa de forma natural en español con una fórmula de tranquilidad directa. «No tengas miedo» conserva el tono pastoral del hebreo sin sonar rígido.
- source_word: כִּי עָשֹׂה אֶעֱשֶׂה
  english_pob_choice: for I will surely show
  chosen_spanish: porque ciertamente te mostraré
  alternatives_spanish:
  - porque te mostraré con certeza
  - porque sin duda haré
  lexicon: HALOT
  rationale: La construcción infinitivo absoluto + verbo finito intensifica la acción. «Ciertamente» comunica bien esa certeza enfática en español, manteniendo el valor de seguridad sin literalismo pesado.
- source_word: חֶסֶד
  english_pob_choice: kindness
  chosen_spanish: bondad
  alternatives_spanish:
  - misericordia
  - lealtad amorosa
  - amor leal
  lexicon: HALOT
  rationale: En este contexto narrativo, el gesto concreto de David hacia Mefiboset se entiende como benevolencia efectiva. «Bondad» es clara y digna en español; se evita imponer de entrada una sola glosa técnica, aunque la trasfondo relacional del término sigue presente en la nota.
- source_word: בַּעֲבוּר יְהוֹנָתָן אָבִיךָ
  english_pob_choice: for the sake of Jonathan your father
  chosen_spanish: por amor de Jonatán, tu padre
  alternatives_spanish:
  - por causa de Jonatán, tu padre
  - en favor de Jonatán, tu padre
  lexicon: HALOT
  rationale: «Por amor de» comunica bien la motivación personal y relacional del hebreo, y en español suena natural y reverente. Mantiene tanto la causa como el vínculo afectivo y de pacto implícito en la escena.
- source_word: וַהֲשִׁבֹתִי לְךָ
  english_pob_choice: and I will restore to you
  chosen_spanish: y te devolveré
  alternatives_spanish:
  - y te restituiré
  - y te restauraré
  lexicon: HALOT
  rationale: El hebreo expresa hacer volver algo al destinatario. En español, «devolveré» comunica de manera directa y comprensible la restitución del patrimonio; «restituiré» sería más formal pero menos inmediato.
- source_word: כָּל שְׂדֵה שָׁאוּל
  english_pob_choice: all the land of Saul
  chosen_spanish: toda la tierra de Saúl
  alternatives_spanish:
  - todo el campo de Saúl
  - toda la hacienda de Saúl
  lexicon: HALOT
  rationale: Aunque שָׂדֶה es singular, el contexto apunta al patrimonio territorial/agrario de Saúl. «Tierra» evita estrechar indebidamente el sentido a un solo campo y funciona bien en español bíblico contemporáneo.
- source_word: שָׁאוּל אָבִיךָ
  english_pob_choice: Saul your father
  chosen_spanish: Saúl, tu padre
  alternatives_spanish:
  - Saúl, tu antepasado
  - Saúl, tu abuelo
  lexicon: HALOT
  rationale: Se mantiene la formulación del texto hebreo y del audit trail inglés. Aunque «padre» puede abarcar antepasado, aquí se conserva la expresión fuente sin aclaración interpretativa en el cuerpo del versículo.
- source_word: תֹּאכַל לֶחֶם
  english_pob_choice: you shall always eat bread
  chosen_spanish: comerás siempre pan
  alternatives_spanish:
  - comerás siempre
  - siempre comerás de pan
  lexicon: HALOT
  rationale: Se preserva el modismo hebreo de «comer pan», pero en español se ordena con naturalidad sintáctica. «Comerás siempre pan» conserva la imagen básica del alimento y del sostén continuo.
- source_word: עַל שֻׁלְחָנִי תָּמִיד
  english_pob_choice: at my table ... always
  chosen_spanish: en mi mesa
  alternatives_spanish:
  - a mi mesa
  - junto a mi mesa
  lexicon: HALOT
  rationale: «En mi mesa» comunica de forma natural la hospitalidad y provisión continuas implicadas por el hebreo. El adverbio «siempre» ya cubre la duración continua expresada por תָּמִיד.
theological_decisions:
- issue: Matiz de חֶסֶד como benevolencia de pacto
  english_pob_reading: Rendered as 'kindness' in the main text, with covenantal/loyal-love alternatives documented.
  chosen_spanish_reading: Se traduce como «bondad» en el texto principal, con alternativas que preservan el trasfondo de amor leal o lealtad de pacto.
  alternative_spanish_readings:
  - misericordia
  - lealtad amorosa
  - amor leal
  rationale: La escena narra un acto concreto de fidelidad de David hacia Mefiboset debido a Jonatán. «Bondad» es suficientemente amplio y natural para el cuerpo del texto, mientras que las alternativas documentan el espesor teológico y relacional del término hebreo.
  doctrine_reference: Translation philosophy §§1, 5, 6
- issue: Relación familiar en «Saúl, tu padre»
  english_pob_reading: Hebrew “Saul your father”; “father” can mean an ancestor, here Saul is Mephibosheth’s grandfather.
  chosen_spanish_reading: Se conserva «Saúl, tu padre» sin aclaración en el texto principal.
  alternative_spanish_readings:
  - Saúl, tu antepasado
  - Saúl, tu abuelo
  rationale: El audit trail inglés finalmente retuvo la forma literal de la fuente. En español, cambiar a «abuelo» introduciría una interpretación no explicitada en el hebreo del versículo; por eso se mantiene la formulación directa y se deja la ambigüedad controlada.
  doctrine_reference: Translation philosophy §§1, 5, 6
- issue: Modismo de mesa y provisión continua
  english_pob_reading: Hebrew “eat bread at my table,” an idiom for ongoing provision and table fellowship.
  chosen_spanish_reading: «Comerás siempre pan en mi mesa» mantiene el modismo y su valor de provisión continua y comunión de mesa.
  alternative_spanish_readings:
  - comerás siempre a mi mesa
  - siempre comerás de mi mesa
  rationale: La imagen de comer pan en la mesa real comunica inclusión, sustento y favor permanente. La formulación elegida suena natural en español y conserva la dimensión social del hebreo.
  doctrine_reference: Translation philosophy §§1, 5, 6
translation_notes:
  revision_awareness: Se corrigió la falla anterior asegurando que el único marcador de nota [a] aparezca explícitamente en el texto español. También se alineó la familia de Saúl con el texto hebreo y el audit trail revisado, evitando notas sin anclaje.
  spanish_consistency_notes:
  - Se usa «Jonatán» para Jonathan y «Saúl» para Saul, siguiendo la terminología bíblica habitual en español.
  - 'Se mantiene el tratamiento de segunda persona singular con verbos y posesivos coherentes: «te», «tu», «tengas», «mostraré», «devolveré».'
  - «En mi mesa» se deja sin nota separada porque la idea de provisión continua queda suficientemente integrada en la traducción principal.
  - No se introduce «Cristo» ni terminología eclesiástica ajena al texto.
  - La nota [a] está anclada directamente en «bondad[a]» para evitar referencias huérfanas.
