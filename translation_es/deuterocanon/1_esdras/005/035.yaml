  spanish_quality_summary: El español es claro y legible, pero «sirvientes del templo» suena algo doméstico y menos institucional en este contexto censal. «Servidores del templo» o «siervos del templo» encajan mejor con una categoría de servicio cultual. Además, la nota actual omite «hijos de» en la segunda alternativa y así no refleja exactamente la sintaxis del texto base.
  glossary_alignment: No hay conflicto con los términos doctrinales principales del proyecto. La decisión de no usar «esclavos» en el texto principal es coherente con la justificación inglesa, pero conviene mejorar la naturalidad española usando «servidores» para ἱερόδουλοι y mantener «sirvientes» para παῖδες si se desea conservar la distinción contextual. La nota debe reproducir fielmente «los hijos de los esclavos de Salomón».
  issues:
  - severity: medium
    issue: «sirvientes del templo» suena poco idiomático para una clase cultual institucional
    rationale: Aunque es comprensible, en español bíblico general «sirvientes» suele sonar más doméstico o coloquial. El griego ἱερόδουλοι designa personal adscrito al templo; «servidores del templo» comunica mejor esa función sin endurecer innecesariamente a «esclavos».
  - severity: medium
