translation:
  language: es
  text: en la región montañosa, y en la llanura baja[a], y en el Arabá[b], y en las laderas, y en la región desértica, y en el Néguev[c]—los hititas, los amorreos, y los cananeos, los perizitas, los hivitas y los jebuseos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «en la Shefelá», nombre de la región occidental de tierras bajas o piedemonte.
    reason: lexical_alternative
  - marker: b
    text: «Arabá» es un nombre regional para el valle del rift o la llanura desértica; también puede entenderse como «la llanura desértica».
    reason: lexical_alternative
  - marker: c
    text: O «en la región del sur»; el hebreo Néguev puede denotar tanto la región meridional como simplemente «sur».
    reason: lexical_alternative
lexical_decisions:
- source_word: בָּהָר
  english_pob_choice: in the hill country
  chosen_spanish: en la región montañosa
  alternatives_spanish:
  - en la montaña
  - en la región montañosa
  lexicon: HALOT
  rationale: El hebreo aquí nombra una zona territorial, no una sola montaña. «Región montañosa» conserva el valor geográfico regional con español natural y no fuerza un calco literal.
- source_word: וּבַשְּׁפֵלָה
  english_pob_choice: and in the lowland
  chosen_spanish: y en la llanura
  alternatives_spanish:
  - y en la Shefelá
  - y en la llanura
  - y en las tierras bajas
  lexicon: HALOT
  rationale: שְׁפֵלָה designa la franja baja occidental. «Llanura» comunica bien la idea en español, aunque «tierras bajas» también sería posible; se evita transliterar por no ser necesario para la inteligibilidad.
- source_word: וּבָעֲרָבָה
  english_pob_choice: and in the Arabah
  chosen_spanish: y en el Arabá
  alternatives_spanish:
  - y en el Arabá
  - y en el valle del Jordán
  - y en la llanura desértica
  lexicon: HALOT
  rationale: Aquí funciona como nombre geográfico. Se conserva como «Arabá» para mantener el valor de topónimo/región, en línea con el audit trail inglés.
- source_word: וּבָאֲשֵׁדוֹת
  english_pob_choice: and on the slopes
  chosen_spanish: y en las laderas
  alternatives_spanish:
  - y en las pendientes
  - y en las laderas
  lexicon: HALOT
  rationale: אֲשֵׁדוֹת se refiere a declives o laderas de terreno. «Laderas» suena natural en español y conserva la imagen topográfica.
- source_word: וּבַמִּדְבָּר
  english_pob_choice: and in the wilderness
  chosen_spanish: y en el desierto
  alternatives_spanish:
  - y en el desierto
  - y en el desierto/páramo
  - y en la estepa
  lexicon: HALOT
  rationale: Aunque מִדְבָּר puede abarcar más que arena literal, en esta lista territorial «desierto» comunica de modo claro la región inhóspita. En español, «desierto» puede cubrir ese campo semántico sin perder inteligibilidad.
- source_word: וּבַנֶּגֶב
  english_pob_choice: and in the Negev
  chosen_spanish: y en el Néguev
  alternatives_spanish:
  - y en el sur
  - y en la región del Néguev
  - y en el Néguev
  lexicon: HALOT
  rationale: נֶגֶב puede significar «sur» o el nombre de la región. Dado el catálogo geográfico, se conserva como topónimo «Néguev».
- source_word: הַחִתִּי
  english_pob_choice: the Hittites
  chosen_spanish: los hititas
  alternatives_spanish:
  - los hititas
  - el hitita
  lexicon: HALOT
  rationale: El plural es natural en español para etnónimos colectivos en listas de pueblos. Se evita el singular por chocar con el castellano idiomático y con el valor colectivo del hebreo.
- source_word: הָאֱמֹרִי
  english_pob_choice: the Amorites
  chosen_spanish: los amorreos
  alternatives_spanish:
  - los amorreos
  - el amorreo
  lexicon: HALOT
  rationale: Como en los demás etnónimos, el hebreo singular colectivo se vierte con plural idiomático en español.
- source_word: וְהַכְּנַעֲנִי
  english_pob_choice: and the Canaanites
  chosen_spanish: los cananeos
  alternatives_spanish:
  - los cananeos
  - el cananeo
  lexicon: HALOT
  rationale: Se mantiene el plural colectivo en español para reflejar el listado de pueblos.
- source_word: הַפְּרִזִּי
  english_pob_choice: the Perizzites
  chosen_spanish: los perizitas
  alternatives_spanish:
  - los perizitas
  - el perizita
  lexicon: HALOT
  rationale: «Perizitas» es la forma española habitual para este etnónimo colectivo y reproduce el plural natural de la lista.
- source_word: הַחִוִּי
  english_pob_choice: the Hivites
  chosen_spanish: los hivitas
  alternatives_spanish:
  - los hivitas
  - el hivita
  lexicon: HALOT
  rationale: Se usa el plural colectivo español para mantener la serie de pueblos y la naturalidad sintáctica.
- source_word: וְהַיְבוּסִי
  english_pob_choice: and the Jebusites
  chosen_spanish: los jebuseos
  alternatives_spanish:
  - los jebuseos
  - el jebuseo
  lexicon: HALOT
  rationale: El plural español expresa adecuadamente el etnónimo colectivo final de la lista.
translation_notes:
  revision_awareness: Se siguió el texto hebreo masorético (WLC) y se alineó con el audit trail inglés de la POB, conservando los nombres regionales donde funcionan como topónimos y usando equivalentes españoles naturales en los etnónimos colectivos. No hubo revisiones aplicadas en el pasaje fuente inglés.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» como terminología por defecto en la serie del proyecto, pero este versículo no contiene el nombre divino.
  - Se prefirieron etnónimos plurales en español para reflejar el valor colectivo del hebreo y la sintaxis enumerativa.
  - Se optó por «Arabá» y «Néguev» como topónimos reconocibles, con notas que conservan las alternativas semánticas del hebreo.
