base_translation:
  language: en
  yaml_path: translation/ot/2_chronicles/011/017.yaml
  text: So they strengthened the kingdom of Judah and strengthened Rehoboam son of Solomon for three years[a], because for three years they walked in the way of David and Solomon.
  footnotes:
