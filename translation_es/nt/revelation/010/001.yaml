translation:
  language: es
  text: Y vi a otro ángel poderoso que descendía del cielo, vestido con una nube, con el arco iris sobre su cabeza, y su rostro era como el sol, y sus pies como columnas de fuego.
  philosophy: optimal-equivalence
  footnotes: []
lexical_decisions:
- source_word: ἄλλον ἄγγελον
  english_pob_choice: another angel
  chosen_spanish: a otro ángel
  alternatives_spanish:
  - a otro mensajero
  lexicon: BDAG
  rationale: En el contexto visionario y celestial de Apocalipsis, ἄγγελος se entiende naturalmente como «ángel». «Mensajero» es posible en abstracto, pero aquí debilita la referencia visual y no sigue la lectura preferida del POB inglés.
- source_word: ἰσχυρὸν
  english_pob_choice: mighty
  chosen_spanish: poderoso
  alternatives_spanish:
  - fuerte
  - mighty
  lexicon: BDAG
  rationale: «Poderoso» comunica bien la fuerza extraordinaria del personaje en español contemporáneo sin sonar forzado. Conserva la cualidad destacada por ἰσχυρός.
- source_word: καταβαίνοντα ἐκ τοῦ οὐρανοῦ
  english_pob_choice: coming down from heaven
  chosen_spanish: que descendía del cielo
  alternatives_spanish:
  - que bajaba del cielo
  - descendiendo del cielo
  lexicon: BDAG
  rationale: «Descendía» mantiene el movimiento descendente de manera natural y digna en español. «Del cielo» refleja ἐκ τοῦ οὐρανοῦ sin necesidad de circunloquio.
- source_word: περιβεβλημένον νεφέλην
  english_pob_choice: clothed with a cloud
  chosen_spanish: vestido con una nube
  alternatives_spanish:
  - envuelto en una nube
  - robed with a cloud
  lexicon: BDAG
  rationale: El verbo περιβάλλω sugiere estar revestido o cubierto. «Vestido con una nube» conserva la imagen de cobertura personal y funciona mejor en español que una calca más pesada.
- source_word: ἡ ἶρις
  english_pob_choice: the rainbow
  chosen_spanish: el arco iris
  alternatives_spanish:
  - el arcoíris
  - un halo
  lexicon: BDAG
  rationale: La acepción usual de ἶρις es «arco iris», y en Apocalipsis la imagen coincide con 4:3. «Arco iris» es claro y fiel; no se adopta «halo» porque el POB inglés lo dejó solo como alternativa secundaria.
- source_word: ἐπὶ τὴν κεφαλὴν αὐτοῦ
  english_pob_choice: over his head
  chosen_spanish: sobre su cabeza
  alternatives_spanish:
  - encima de su cabeza
  - sobre la cabeza de él
  lexicon: BDAG
  rationale: «Sobre su cabeza» reproduce la relación espacial de ἐπί con acusativo de forma natural en español. Evita una literalidad innecesaria y mantiene la imagen visual.
- source_word: τὸ πρόσωπον αὐτοῦ ὡς ὁ ἥλιος
  english_pob_choice: his face was like the sun
  chosen_spanish: su rostro como el sol
  alternatives_spanish:
  - su cara como el sol
  - su rostro era como el sol
  lexicon: BDAG
  rationale: «Rostro» es más solemne y bíblico que «cara» en este contexto. Se omite el verbo en la frase nominal, como permite el español, sin perder la comparación con el sol.
- source_word: οἱ πόδες αὐτοῦ
  english_pob_choice: his feet
  chosen_spanish: sus pies
  alternatives_spanish:
  - sus pies y piernas
  - sus extremidades inferiores
  lexicon: BDAG
  rationale: «Pies» es la correspondencia normal de πόδες y conserva la imaginería apocalíptica. No se amplía a «piernas» porque el texto no lo exige.
- source_word: στῦλοι πυρός
  english_pob_choice: pillars of fire
  chosen_spanish: columnas de fuego
  alternatives_spanish:
  - pilares de fuego
  - columnas ígneas
  lexicon: BDAG
  rationale: «Columnas» transmite bien στῦλοι en español formal y mantiene la fuerza visual de la metáfora. «Pilares» sería posible, pero «columnas» es más común en el registro bíblico actual y más directo.
theological_decisions:
- issue: Identidad del ángel poderoso
  english_pob_reading: Render neutrally as 'another mighty angel' without identifying him as Messiah or a mere ordinary angel in the translation.
  chosen_spanish_reading: Presentar «a otro ángel poderoso» sin resolver si se trata de un ángel creado o de una manifestación mesiánica.
  alternative_spanish_readings:
  - a otro ángel fuerte
  - a otro mensajero poderoso
  - a un ángel/manifestación de Cristo
  rationale: El griego nombra simplemente a «otro ángel poderoso». La traducción debe preservar esa ambigüedad interpretativa y no decidirla en el texto principal.
  doctrine_reference: Preservar la tensión interpretativa sin imponer una conclusión doctrinal.
translation_notes:
  revision_awareness: No hay revisiones posteriores que alteren el sentido base; se sigue el texto griego SBLGNT y el audit trail inglés sin cambios sustantivos.
  spanish_consistency_notes:
  - Se mantiene «ángel» para ἄγγελος conforme al contexto visionario.
  - Se usa «cielo» para οὐρανός, siguiendo el valor espacial-teológico habitual.
  - «Arco iris» se conserva como imagen principal, coherente con Apocalipsis 4:3 y con la nota inglesa sobre ἶρις.
  - La comparación final conserva la metáfora con «columnas de fuego» sin suavizarla.
