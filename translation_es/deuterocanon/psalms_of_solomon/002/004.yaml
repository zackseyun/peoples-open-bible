    issue: Cierre incorrecto de la cita en el texto español
    rationale: La decisión auditada establece que la cita termina después de ἀπ' ἐμοῦ («de mí»). En el borrador, aunque hay un punto después de «mí», la cláusula siguiente queda antes de la comilla de cierre, lo que visualmente la mantiene dentro del discurso directo.
  - severity: medium
    issue: Desajuste entre anclaje y contenido de la nota a
    rationale: La nota [a] está anclada en «dijo», pero su contenido ofrece una alternativa para «la belleza de su gloria no les aprovechó». Las notas deben anclarse donde corresponden en el texto.
  - severity: medium
    issue: Falta la variante textual documentada sobre αὐτοῦ/‘her’
    rationale: 'El inglés POB conserva una nota textual importante: un manuscrito lee «her» en lugar de «his». El borrador español no la preserva, aunque sí preserva otras alternativas menos necesarias.'
  - severity: low
    issue: «Por causa de» es menos natural que «A causa de»
    rationale: No es error de fidelidad, pero una leve mejora de fluidez haría el español más natural sin alejarse del griego.
