translation:
  language: es
  text: Por tanto, mi pueblo va al destierro por falta de conocimiento; sus nobles[a] mueren de hambre, y su multitud está seca de sed.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'sus hombres distinguidos'; el hebreo literalmente dice 'su gloria, hombres de hambre', probablemente refiriéndose a las personas distinguidas o prominentes de la nación.
    reason: lexical_alternative
lexical_decisions:
- source_word: לָכֵן
  english_pob_choice: Therefore
  chosen_spanish: Por tanto
  alternatives_spanish:
  - Por eso
  - Así que
  lexicon: HALOT
  rationale: Introduce la consecuencia del juicio anterior con un conector natural en español; 'Por tanto' mantiene el valor inferencial y el tono profético formal.
- source_word: גָּלָה
  english_pob_choice: go into exile
  chosen_spanish: va al destierro
  alternatives_spanish:
  - es desterrado
  - va al exilio
  - es llevado al cautiverio
  lexicon: HALOT
  rationale: El hebreo expresa la idea de ir/ser llevado fuera de la tierra. 'Va al destierro' conserva el sentido de desplazamiento punitivo sin añadir explícitamente el agente.
- source_word: עַמִּי
  english_pob_choice: my people
  chosen_spanish: mi pueblo
  alternatives_spanish:
  - mi gente
  lexicon: HALOT
  rationale: Mantiene la fórmula pactual directa del discurso divino en español natural.
- source_word: מִבְּלִי דָעַת
  english_pob_choice: for lack of knowledge
  chosen_spanish: por falta de conocimiento
  alternatives_spanish:
  - sin conocimiento
  - porque no tienen conocimiento
  - por carecer de conocimiento
  lexicon: HALOT
  rationale: '''Por falta de'' reproduce bien la fuerza causal del idiomático מִבְּלִי. ''Conocimiento'' preserva la amplitud teológica del hebreo, que no se reduce solo a información intelectual.'
- source_word: כְבוֹדוֹ
  english_pob_choice: their honored men
  chosen_spanish: sus hombres honorables
  alternatives_spanish:
  - sus nobles
  - los honorables de ellos
  - su gloria
  lexicon: HALOT
  rationale: El hebreo literal 'su gloria' apunta aquí, por el contexto y la construcción siguiente, a las personas destacadas o nobles del pueblo. 'Hombres honorables' conserva esa referencia sin convertirla en una abstracción.
- source_word: מְתֵי רָעָב
  english_pob_choice: are dying of hunger
  chosen_spanish: mueren de hambre
  alternatives_spanish:
  - están muriendo de hambre
  - son hombres de hambre
  - mueren por el hambre
  lexicon: HALOT
  rationale: La construcción hebrea idiomática se refiere a personas abatidas por el hambre. 'Mueren de hambre' comunica la severidad del estado de manera sobria y fiel.
- source_word: הֲמוֹנוֹ
  english_pob_choice: their multitude
  chosen_spanish: su multitud
  alternatives_spanish:
  - su multitud de gente
  - sus masas
  - su muchedumbre
  lexicon: HALOT
  rationale: Conserva el sentido colectivo del término y el paralelismo con la primera cola del versículo.
- source_word: צִחֵה צָמָא
  english_pob_choice: is parched with thirst
  chosen_spanish: está reseca de sed
  alternatives_spanish:
  - está seca por la sed
  - está abrasada por la sed
  - se marchita de sed
  lexicon: HALOT
  rationale: '''Reseca de sed'' mantiene la imagen de desecación extrema del hebreo y funciona con el paralelismo poético; evita suavizar el cuadro de carencia física.'
theological_decisions:
- issue: Alcance de דָעַת ('knowledge')
  english_pob_reading: knowledge
  chosen_spanish_reading: conocimiento
  alternative_spanish_readings:
  - entendimiento
  - sabiduría
  rationale: Se conserva el término amplio 'conocimiento' para no estrechar el juicio profético a mera información. En Isaías, la falta de conocimiento implica una ruptura relacional y moral, no solo intelectual.
  doctrine_reference: Translation philosophy §3; preserve theological tension rather than resolve it.
- issue: ¿'Gloria' literal o referencia a personas prominentes?
  english_pob_reading: their honored men
  chosen_spanish_reading: sus hombres honorables
  alternative_spanish_readings:
  - su gloria
  - sus nobles
  rationale: Se evita dejar 'gloria' como abstracto literal porque el audit trail inglés ya documenta la lectura colectiva referida a personas prominentes. La opción española refleja esa decisión sin borrar la tensión entre literalidad y sentido contextual.
  doctrine_reference: Lexical/theological tension documented in the POB audit trail.
translation_notes:
  revision_awareness: 'El texto inglés auditado quedó sin cambios en la revisión más reciente (''unchanged: true''). La presente propuesta sigue esa lectura estable y conserva la nota interpretativa sobre la frase ''their honored men'' / ''sus hombres honorables''.'
  spanish_consistency_notes:
  - Se usa 'Yahvé' solo cuando el texto fuente lo requiera explícitamente; aquí no aparece el Tetragrámaton.
  - '''Destierro'' se prefirió sobre ''exilio'' por ser natural y solemne en español bíblico, sin perder el matiz de expulsión del territorio.'
  - Se mantuvo el paralelismo poético con dos miembros coordinados por 'y'.
