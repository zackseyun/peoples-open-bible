  text: Los inscritos de la tribu de Dan fueron sesenta y dos mil setecientos.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: פְּקֻדֵיהֶם
  english_pob_choice: those counted
  chosen_spanish: los contados
  alternatives_spanish:
  - los registrados
  - los contados de ellos
  - los enrolados
  lexicon: HALOT
  rationale: El sustantivo nominal derivado de פקד conserva aquí el sentido censal de personas contadas o registradas. «Los contados» reproduce con naturalidad el valor pasivo/resultativo sin añadir «varones» ni introducir una expansión que el hebreo no expresa en este miembro del versículo.
- source_word: לְמַטֵּה
  english_pob_choice: from the tribe of
  chosen_spanish: de la tribu de
  alternatives_spanish:
  - de parte de la tribu de
  - para la tribu de
  - por la tribu de
  lexicon: HALOT
  rationale: En esta fórmula censal, לְ con מַטֶּה marca afiliación tribal. En español, «de la tribu de» es la forma más natural y fiel al valor relacional del hebreo en este contexto.
- source_word: דָן
  english_pob_choice: Dan
  chosen_spanish: Dan
  lexicon: HALOT
  rationale: Se conserva el nombre propio tribal en su forma habitual en español.
- source_word: שְׁנַיִם וְשִׁשִּׁים אֶלֶף
  english_pob_choice: sixty-two thousand
  chosen_spanish: sesenta y dos mil
  alternatives_spanish:
  - dos y sesenta mil
  lexicon: HALOT
  rationale: El hebreo presenta la secuencia numérica semítica, pero en español la forma idiomática y más clara es invertir el orden a «sesenta y dos mil», como en la POB inglesa y en español estándar.
- source_word: וּשְׁבַע מֵאוֹת
  english_pob_choice: seven hundred
  chosen_spanish: setecientos
  alternatives_spanish:
  - siete cientos
  - siete ciento
  lexicon: HALOT
  rationale: La suma final de la cifra se expresa en español con el numeral compuesto natural «setecientos», que integra correctamente el complemento a la cifra principal.
theological_decisions:
- issue: Formulación censal sin alterar el alcance humano del conteo
  english_pob_reading: Those counted from the tribe of Dan were sixty-two thousand seven hundred.
  chosen_spanish_reading: Los contados de la tribu de Dan fueron sesenta y dos mil setecientos.
  alternative_spanish_readings:
  - Los registrados de la tribu de Dan fueron sesenta y dos mil setecientos.
  - Los varones contados de la tribu de Dan fueron sesenta y dos mil setecientos.
  rationale: El versículo participa de un censo militar/tribal; sin embargo, el hebreo no repite aquí el sustantivo «varones». La traducción mantiene el sentido censal general sin introducir una especificación no presente en este miembro del texto, preservando la sobriedad del registro numérico.
  doctrine_reference: Censo de Israel en Números 1; fidelidad al alcance referencial del texto sin expansión interpretativa
translation_notes:
  revision_awareness: 'La versión española sigue de cerca la decisión auditada en inglés: POB traduce פְּקֻדֵיהֶם como una expresión censal breve («those counted») y לְמַטֵּה como afiliación tribal («from the tribe of»). No hubo revisiones posteriores en el pass auditado, y la cifra compuesta se normaliza al orden idiomático del español sin perder contenido.'
  spanish_consistency_notes:
  - Se evita «SEÑOR» u otras convenciones de sustitución porque el versículo no contiene el nombre divino.
  - Se mantiene «tribu de» como fórmula estable del contexto censal de Números 1.
  - La cifra se ajusta a la sintaxis numérica natural del español para facilitar lectura pública sin alterar el dato cuantitativo.
