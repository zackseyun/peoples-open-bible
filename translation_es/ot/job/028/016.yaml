translation:
  language: es
  text: No puede ser valorada con el oro de Ofir, con precioso ónix[a] ni con zafiro[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «berilo»; la identificación precisa del término hebreo para esta gema es incierta.
    reason: lexical_alternative
  - marker: b
    text: O posiblemente «lapislázuli» para «zafiro», reflejando una clasificación mineral antigua y no la moderna.
    reason: lexical_alternative
lexical_decisions:
- source_word: תְסֻלֶּה
  english_pob_choice: be valued
  chosen_spanish: ser valorada
  alternatives_spanish:
  - ser apreciada
  - ser tasada
  - ser comparada
  lexicon: HALOT, BDB
  rationale: El verbo expresa una valoración o tasación de precio/valor en un contexto de bienes preciosos. «Ser valorada» conserva el sentido económico y comparativo del hebreo sin volverlo tosco en español.
- source_word: בְּכֶתֶם אוֹפִיר
  english_pob_choice: with the gold of Ophir
  chosen_spanish: con el oro de Ofir
  alternatives_spanish:
  - con el oro fino de Ofir
  - con el fino oro de Ofir
  - con el oro de Ofir
  lexicon: HALOT, BDB
  rationale: כֶּתֶם denota oro refinado o fino; en español «oro de Ofir» comunica bien la calidad y el origen. Se mantiene «con» para reflejar el valor comparativo instrumental del contexto, tal como el audit trail inglés ajustó la preposición a «with».
- source_word: שֹׁהַם
  english_pob_choice: onyx
  chosen_spanish: ónice
  alternatives_spanish:
  - ónix
  - berilo
  lexicon: HALOT, BDB
  rationale: El término hebreo identifica una gema cuya equivalencia exacta es incierta. «Ónice» es una forma natural y tradicional en español bíblico; se preserva la incertidumbre con nota, como hizo el POB inglés.
- source_word: יָקָר
  english_pob_choice: precious
  chosen_spanish: precioso
  alternatives_spanish:
  - valioso
  - costoso
  lexicon: HALOT, BDB
  rationale: El adjetivo califica la gema y destaca su gran valor. «Precioso» conserva el tono poético y gemológico del hebreo.
- source_word: סַפִּיר
  english_pob_choice: sapphire
  chosen_spanish: zafiro
  alternatives_spanish:
  - lapislázuli
  lexicon: HALOT, BDB
  rationale: Se mantiene el término tradicional en español. Dado que la identificación mineral antigua puede no coincidir con la clasificación moderna, la alternativa histórica se conserva en nota.
translation_notes:
  revision_awareness: El texto inglés revisado cambió la preposición de «in» a «with» para reflejar mejor el hebreo en un contexto de valoración. La redacción española sigue esa decisión con «con», manteniendo la fuerza comparativa del versículo.
  spanish_consistency_notes:
  - Se usó «Ofir» como forma habitual del topónimo en español bíblico.
  - Se evitó «SEÑOR» u otras sustituciones porque el verso no contiene el nombre divino.
  - Se mantuvo el paralelismo de materiales preciosos con dos notas léxicas, sin ampliar el sentido del hebreo.
