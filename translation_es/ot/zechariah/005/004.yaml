  language: en
  yaml_path: translation/ot/zechariah/005/004.yaml
  text: I have sent it out[a], declares Yahweh of hosts, and it will enter the house of the thief and the house of the one who swears falsely by my name, and it will remain within his house and consume it[b], both its timber and its stones.
  footnotes:
  - marker: a
    text: Or 'I have brought it forth.' The Hebrew verb can be rendered more literally this way, but here it carries the sense of sending the curse out to do its work.
    reason: lexical_alternative
  - marker: b
    text: Or 'and it will lodge' or 'spend the night.' The Hebrew verb suggests remaining in the house rather than merely entering it.
    reason: lexical_alternative
