- from: Ahora la tierra estaba corrompida delante de Dios[a], y la tierra estaba llena de violencia.
  to: Ahora la tierra estaba corrupta delante de Dios[a], y la tierra estaba llena de violencia.
  rationale: Se ajusta «estaba corrompida» a «estaba corrupta» para reflejar mejor el valor estativo del hebreo y la revisión auditada en inglés («was corrupt»). Se mantiene «delante de Dios» como traducción principal de לִפְנֵי הָאֱלֹהִים y se conserva la alternativa en nota con redacción editorial más natural. No se requieren cambios adicionales.
