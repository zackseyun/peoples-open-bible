translation:
  language: es
  text: Y yo misma[a] estableceré mi pacto contigo, y sabrás que yo soy Yahvé.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El hebreo usa un pronombre independiente enfático. Se refleja con «yo misma» para mantener ese énfasis, aunque en español suene marcado por género; no pretende introducir una lectura doctrinal sobre el género de Dios.
    reason: theological_note
lexical_decisions:
- source_word: וַהֲקִימוֹתִי
  english_pob_choice: will establish
  chosen_spanish: estableceré
  alternatives_spanish:
  - confirmaré
  - sostendré
  lexicon: HALOT
  rationale: El hiphil de קום expresa hacer que algo quede firme o quede establecido. En español, «estableceré» comunica de forma natural esa fijación del pacto sin perder la idea de que Dios lo hace permanecer.
- source_word: אֲנִי
  english_pob_choice: I myself
  chosen_spanish: yo misma
  alternatives_spanish:
  - yo
  - yo misma, ciertamente
  lexicon: HALOT
  rationale: El pronombre independiente añade énfasis. Como el hablante es Yahvé dirigido a Jerusalén, el femenino del destinatario no afecta al hablante; en español, «yo misma» reproduce el énfasis, aunque suena marcado. Se conserva por fidelidad al valor enfático del hebreo.
- source_word: בְּרִיתִי
  english_pob_choice: my covenant
  chosen_spanish: mi pacto
  alternatives_spanish:
  - mi alianza
  - mi tratado
  lexicon: HALOT
  rationale: בְּרִית designa el vínculo pactal divino-humano. «Pacto» es claro y natural en español bíblico contemporáneo; «alianza» puede sonar más general o político y «tratado» estrecha demasiado el sentido.
- source_word: אִתָּךְ
  english_pob_choice: with you
  chosen_spanish: contigo
  alternatives_spanish:
  - con ustedes
  - con vos
  lexicon: HALOT
  rationale: La preposición marca relación de pacto. «Contigo» es la forma natural en español para un complemento con segunda persona singular femenina implícita en el contexto de Jerusalén.
- source_word: וְיָדַעַתְּ
  english_pob_choice: and you will know
  chosen_spanish: y sabrás
  alternatives_spanish:
  - y conocerás
  - entonces sabrás
  lexicon: HALOT
  rationale: El perfecto con waw en discurso profético tiene valor prospectivo. «Sabrás» expresa bien el resultado futuro sin añadir el matiz interpretativo de «entonces» en el texto principal.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  - Jehová
  lexicon: HALOT
  rationale: Se conserva el nombre divino en transliteración española según la convención del proyecto. «Yahvé» evita la sustitución por un título y mantiene el carácter personal del nombre del pacto.
theological_decisions:
- issue: Nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - Jehová
  rationale: El texto hebreo usa el Tetragrámaton directamente. Se mantiene como nombre propio transliterado en español para preservar la identidad revelada de Dios, no una sustitución reverencial.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Énfasis del pronombre independiente אֲנִי
  english_pob_reading: I myself
  chosen_spanish_reading: yo misma
  alternative_spanish_readings:
  - yo
  - yo misma, ciertamente
  rationale: El hebreo destaca la iniciativa personal de Yahvé. En español, el pronombre enfático se conserva para no diluir la fuerza discursiva del original, aunque la marca femenina es estilística y no debe leerse como referencia de género del sujeto divino.
  doctrine_reference: DOCTRINE.md Translation philosophy §1, §5
translation_notes:
  revision_awareness: El pasaje coincide con el audit trail inglés de alta concordancia y no requiere revisión textual adicional; la única decisión sensible es cómo reflejar en español el énfasis del pronombre independiente sin perder naturalidad.
  spanish_consistency_notes:
  - Se usa «Yahvé» como forma normal del nombre divino, coherente con el proyecto.
  - Se prefiere «pacto» para בְּרִית, en continuidad con la decisión inglesa de «covenant».
  - Se conserva la futura prospectiva con «sabrás» para וְיָדַעַתְּ.
  - La nota a pie de página marca la tensión entre fidelidad al énfasis hebreo y naturalidad del español.
