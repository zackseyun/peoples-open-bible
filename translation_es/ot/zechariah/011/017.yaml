translation:
  language: es
  text: ¡Ay del pastor inútil[a], que abandona al rebaño! Una espada contra su brazo y contra su ojo derecho. Su brazo se secará por completo, y su ojo derecho se oscurecerá totalmente.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «pastor idolátrico». El término hebreo puede significar «inútil», «vano» o «idolátrico/vacío».
    reason: lexical_alternative
lexical_decisions:
- source_word: הוֹי
  english_pob_choice: Woe
  chosen_spanish: ¡Ay de!
  alternatives_spanish:
  - ¡Ay!
  - ¡Ay del!
  - ¡Ay de aquel!
  lexicon: HALOT
  rationale: La interjección profética expresa denuncia y lamento. En español, «¡Ay de!» conserva mejor el tono oracular que un simple «Woe», y encaja con la cadencia bíblica sin volverse arcaica en exceso.
- source_word: רֹעִי הָאֱלִיל
  english_pob_choice: the worthless shepherd
  chosen_spanish: el pastor inútil
  alternatives_spanish:
  - el pastor vano
  - el pastor idolátrico
  - el pastor vacío
  lexicon: HALOT
  rationale: 'אֱלִיל puede comunicar inutilidad, vaciedad o connotación idolátrica. La opción «inútil» recoge la fuerza despectiva y funcional del contexto: un pastor fracasado que no cumple su oficio. Se evita una traducción mecánica que pudiera sonar opaca para el lector español.'
- source_word: עֹזְבִי הַצֹּאן
  english_pob_choice: who abandons the flock
  chosen_spanish: que abandona al rebaño
  alternatives_spanish:
  - que deja al rebaño
  - que desampara al rebaño
  - que abandona las ovejas
  lexicon: HALOT
  rationale: El participio caracteriza al pastor por su conducta continua. «Abandona al rebaño» reproduce esa cualidad y mantiene la imagen pastoral con naturalidad en español.
- source_word: חֶרֶב עַל זְרוֹעוֹ וְעַל עֵין יְמִינוֹ
  english_pob_choice: A sword is against his arm and against his right eye
  chosen_spanish: Espada contra su brazo y contra su ojo derecho
  alternatives_spanish:
  - Una espada sobre su brazo y sobre su ojo derecho
  - Espada está contra su brazo y contra su ojo derecho
  lexicon: HALOT
  rationale: El hebreo es una declaración oracular sin verbo expreso. En español, la elipsis funciona bien con «Espada contra...», que conserva la dureza del anuncio y evita añadir un verbo que el texto no exige. «Contra» mantiene el sentido de hostilidad/judgmento.
- source_word: זְרוֹעוֹ יָבוֹשׁ תִּיבָשׁ
  english_pob_choice: His arm will utterly wither
  chosen_spanish: Su brazo se secará por completo
  alternatives_spanish:
  - Su brazo se marchitará del todo
  - Su brazo se agostará por completo
  - Su brazo se secará totalmente
  lexicon: HALOT
  rationale: El infinitivo absoluto intensifica la certeza y la totalidad de la acción. «Se secará por completo» comunica el desecamiento con fuerza idiomática en español y preserva la intensificación sin sobretraducir a una metáfora distinta.
- source_word: וְעֵין יְמִינוֹ כָּהֹה תִכְהֶה
  english_pob_choice: and his right eye will be completely dimmed
  chosen_spanish: y su ojo derecho se oscurecerá totalmente
  alternatives_spanish:
  - y su ojo derecho se debilitará en su vista
  - y su ojo derecho se pondrá completamente turbio
  - y su ojo derecho se apagará por completo
  lexicon: HALOT
  rationale: כהה denota volverse oscuro/débil en brillo o claridad. «Se oscurecerá» conserva la imagen visual sin exceder el hebreo hacia «ceguera» total, y «totalmente» reproduce la intensificación del doblete verbal.
theological_decisions:
- issue: Sentido de אֱלִיל en una metáfora de liderazgo
  english_pob_reading: worthless shepherd, with a footnote preserving "idol shepherd" as a lexical alternative
  chosen_spanish_reading: pastor inútil, con nota que preserve "pastor idolátrico" como alternativa léxica
  alternative_spanish_readings:
  - pastor vano
  - pastor vacío
  - pastor idolátrico
  rationale: El contexto inmediato enfatiza la denuncia contra un dirigente que abandona al rebaño. Por eso, la lectura principal en español es funcional y moral («inútil»). Pero como el término hebreo también puede insinuar vaciedad o idolatría, se conserva la tensión en nota para no borrar la posibilidad semántica más fuerte.
  doctrine_reference: Translation philosophy §§1, 5
translation_notes:
  revision_awareness: 'La versión inglesa más reciente ajustó el orden de los adverbios para reflejar con mayor naturalidad la intensificación hebrea: «utterly wither» y «completely dimmed». En español se reflejó esa duplicación enfática con «por completo» y «totalmente», evitando suavizar el paralelismo. Se mantuvo además la ambigüedad léxica de אֱלִיל en nota.'
  spanish_consistency_notes:
  - Se usa «Yahvé» en este proyecto cuando el texto contiene el nombre divino, pero este versículo no lo presenta.
  - Se eligió «rebaño» para mantener una imagen pastoral clara y ampliamente inteligible en español.
  - Se evitó «SEÑOR» o fórmulas eclesiásticas no presentes en el hebreo.
  - «Espada contra...» conserva la brevedad oracular del hebreo sin añadir verbos innecesarios.
