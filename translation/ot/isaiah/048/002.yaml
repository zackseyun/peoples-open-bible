id: ISA.48.2
reference: Isaiah 48:2
source:
  edition: WLC
  text: כִּֽי מֵ/עִ֤יר הַ/קֹּ֨דֶשׁ֙ נִקְרָ֔אוּ וְ/עַל אֱלֹהֵ֥י יִשְׂרָאֵ֖ל נִסְמָ֑כוּ יְהוָ֥ה צְבָא֖וֹת שְׁמֽ/וֹ־־׃ס
translation:
  text: For they are called from the holy city[a], and they lean on the God of Israel; Yahweh of hosts is his name.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'they are called from the holy city.' The Hebrew may emphasize either their designation by the city or their origin from it.
    reason: alternative_reading
lexical_decisions:
- source_word: כִּי
  chosen: For
  alternatives:
  - because
  - indeed
  lexicon: HALOT
  rationale: Introduces the reason or ground for the preceding accusation; 'for' preserves the explanatory force in context better than the more ambiguous 'indeed'.
- source_word: מֵעִיר הַקֹּדֶשׁ
  chosen: by the holy city
  alternatives:
  - from the holy city
  - out of the holy city
  lexicon: HALOT
  rationale: The preposition מִן with קרא in the passive can indicate source or designation. Here the sense is that they derive their identity/name from the holy city, so 'by the holy city' idiomatically conveys naming/designation while staying close to the Hebrew. The more literal 'from the holy city' is viable and preserved in a footnote.
- source_word: נִקְרָאוּ
  chosen: are called
  alternatives:
  - are named
  - call themselves
  lexicon: HALOT
  rationale: Niphal of קרא naturally means 'be called/named.' 'Are called' is the most straightforward rendering. 'Call themselves' would overinterpret the passive as reflexive.
- source_word: וְעַל
  chosen: and
  alternatives:
  - and upon
  lexicon: HALOT
  rationale: The conjunction plus preposition introduces the second clause. In English the preposition is carried by the verb phrase 'lean on,' so a simple 'and' is sufficient and natural.
- source_word: אֱלֹהֵי יִשְׂרָאֵל
  chosen: the God of Israel
  lexicon: HALOT
  rationale: Standard construct rendering; definite in sense.
- source_word: נִסְמָכוּ
  chosen: they lean on
  alternatives:
  - they rely on
  - they support themselves on
  lexicon: HALOT
  rationale: 'Niphal of סמך here conveys dependence/reliance. ''Lean on'' preserves the metaphor and the likely ironic tone: they profess dependence on God while lacking truth and righteousness in the surrounding context.'
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: צְבָאוֹת
  chosen: of hosts
  alternatives:
  - of armies
  lexicon: HALOT
  rationale: In the title יְהוָה צְבָאוֹת, 'hosts' is the established and suitably broad rendering, encompassing heavenly armies without narrowing the sense.
- source_word: שְׁמוֹ
  chosen: is his name
  alternatives:
  - is his Name
  lexicon: HALOT
  rationale: A standard Hebrew naming formula. Lowercase 'name' fits readable modern English while preserving the formulaic declaration.
