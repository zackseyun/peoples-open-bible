translation:
  language: es
  text: Queden avergonzados y se aterren mucho[a] todos mis enemigos; vuelvan atrás y queden avergonzados en un instante.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «sean avergonzados ... regresen y sean avergonzados de repente»'
    reason: lexical_alternative
lexical_decisions:
- source_word: יֵבֹשׁוּ
  english_pob_choice: let ... be ashamed
  chosen_spanish: queden avergonzados
  alternatives_spanish:
  - sean avergonzados
  - queden puestos en vergüenza
  lexicon: HALOT
  rationale: El hebreo expresa vergüenza/deshonra; en este contexto poético-jussivo, 'queden avergonzados' comunica bien la petición sin añadir matices ajenos. 'Sean avergonzados' también sería posible, pero 'queden' suena más natural en español bíblico contemporáneo.
- source_word: וְיִבָּהֲלוּ
  english_pob_choice: and greatly terrified
  chosen_spanish: y muy aterrados
  alternatives_spanish:
  - y muy atemorizados
  - y profundamente consternados
  lexicon: HALOT
  rationale: בהל comunica sobresalto, terror o desorientación repentina. 'Aterrados' conserva la fuerza emocional de 'terrified'; se coordina bien con el intensificador siguiente y evita suavizar el impacto.
- source_word: מְאֹד
  english_pob_choice: greatly
  chosen_spanish: muy
  alternatives_spanish:
  - sumamente
  - en gran manera
  lexicon: HALOT
  rationale: Como intensificador, 'muy' es natural y fiel en español. 'Sumamente' sería más marcado, pero no necesario; 'en gran manera' suena más tradicional y menos directo.
- source_word: כָּל אֹיְבָי
  english_pob_choice: all my enemies
  chosen_spanish: todos mis enemigos
  alternatives_spanish:
  - cada uno de mis enemigos
  lexicon: HALOT
  rationale: La construcción normal de totalización se vierte de forma directa. 'Todos mis enemigos' mantiene el poseedor y la amplitud del sujeto sin forzar el español.
- source_word: יָשֻׁבוּ
  english_pob_choice: let them turn back
  chosen_spanish: vuelvan atrás
  alternatives_spanish:
  - regresen
  - retrocedan
  lexicon: HALOT
  rationale: שוב aquí tiene el sentido de volver/retroceder ante el conflicto. 'Vuelvan atrás' preserva la dirección de repliegue que el POB inglés captó con 'turn back'.
- source_word: יֵבֹשׁוּ
  english_pob_choice: and be ashamed
  chosen_spanish: y queden avergonzados
  alternatives_spanish:
  - y sean avergonzados
  - y queden puestos en vergüenza
  lexicon: HALOT
  rationale: La repetición de בוש se conserva para reflejar el paralelismo hebreo y la insistencia poética. 'Queden avergonzados' funciona de manera consistente con la primera aparición.
- source_word: רָגַע
  english_pob_choice: in an instant
  chosen_spanish: de repente
  alternatives_spanish:
  - en un instante
  - en un momento
  lexicon: HALOT
  rationale: Como adverbio de rapidez/súbita irrupción, 'de repente' comunica bien la abrupta inversión del estado de los enemigos. 'En un instante' también es válido, pero 'de repente' suena más fluido al final del verso.
translation_notes:
  revision_awareness: 'Se corrigió el problema de validación anterior: el marcador [a] ahora aparece explícitamente en el texto español junto a la frase correspondiente. Se mantuvo la lectura de petición/jussivo y la repetición de «avergonzados» para reflejar el paralelismo hebreo.'
  spanish_consistency_notes:
  - Se preservó la secuencia paralela de dos peticiones con la repetición de בוש.
  - No se introdujo vocabulario eclesiástico ajeno al hebreo; el registro es bíblico pero natural en español.
  - El adverbio final se resolvió como una expresión breve y idiomática para mantener el cierre abrupto del verso.
