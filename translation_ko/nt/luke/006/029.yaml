  text: τῷ τύπτοντί σε ἐπὶ τὴν σιαγόνα πάρεχε καὶ τὴν ἄλλην, καὶ ἀπὸ τοῦ αἴροντός σου τὸ ἱμάτιον καὶ τὸν χιτῶνα μὴ κωλύσῃς.
base_translation:
  language: en
  yaml_path: translation/nt/luke/006/029.yaml
  text: To the one who strikes you on the cheek[a], offer the other also; and from the one who takes away your cloak[c][b], do not withhold your tunic also.
  footnotes:
  - marker: a
    text: Or 'on the jaw.'
    reason: lexical_alternative
  - marker: b
    text: Traditional English often reads 'turn the other also,' but the Greek here more literally says 'offer/present the other also.'
    reason: alternative_reading
  - marker: c
    text: The 'cloak' is the outer garment (ἱμάτιον); the 'tunic' is the inner garment (χιτών).
    reason: cultural_note
translation:
