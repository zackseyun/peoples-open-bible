translation:
  language: es
  text: 'y diciendo: «Si tú eres el Rey de los judíos[a], sálvate».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «de los judeanos». El griego Ἰουδαίων puede referirse a los judíos o a los judeanos según el contexto.'
    reason: lexical_alternative
lexical_decisions:
- source_word: καὶ
  english_pob_choice: and
  chosen_spanish: y
  alternatives_spanish:
  - e
  lexicon: BDAG
  rationale: Conjunción coordinante sencilla que enlaza esta cláusula participial con la acción narrativa anterior. En español, 'y' es la opción natural; 'e' no es necesaria porque la siguiente palabra no exige ajuste fonético.
- source_word: λέγοντες
  english_pob_choice: saying
  chosen_spanish: diciendo
  alternatives_spanish:
  - mientras decían
  - hablando
  lexicon: BDAG
  rationale: El participio presente masculino plural se vierte con un gerundio que conserva el valor de acción concomitante. 'Diciendo' mantiene la forma participial sin añadir explícitamente la burla, que el contexto ya proporciona.
- source_word: Εἰ
  english_pob_choice: If
  chosen_spanish: Si
  alternatives_spanish:
  - Ya que
  lexicon: BDAG
  rationale: La frase introduce un desafío condicional; 'Si' conserva mejor la fuerza retadora que 'Ya que', que haría la afirmación más asertiva de lo que el griego permite.
- source_word: σὺ εἶ
  english_pob_choice: you are
  chosen_spanish: tú eres
  alternatives_spanish:
  - eres tú
  - tú mismo eres
  lexicon: BDAG
  rationale: El pronombre explícito se conserva con 'tú' para reflejar el énfasis del griego, sin volver la frase artificial. 'Tú eres' comunica bien la focalización.
- source_word: ὁ βασιλεὺς
  english_pob_choice: the King
  chosen_spanish: el Rey
  alternatives_spanish:
  - el rey
  lexicon: BDAG
  rationale: Se mantiene el título real con mayúscula en español por tratarse de un apelativo dirigido a Jesús en este contexto de pasión. 'Rey' traduce con claridad el valor titulado del sustantivo.
- source_word: τῶν Ἰουδαίων
  english_pob_choice: of the Jews
  chosen_spanish: de los judíos
  alternatives_spanish:
  - de los judeanos
  lexicon: BDAG
  rationale: En el contexto de la pasión y la burla ante un marco romano, 'judíos' reproduce el uso convencional del título en los Evangelios. 'Judeanos' queda como alternativa posible porque Ἰουδαίων puede tener matiz étnico-regional.
- source_word: σῶσον
  english_pob_choice: save
  chosen_spanish: sálvate
  alternatives_spanish:
  - salva
  - rescátate
  lexicon: BDAG
  rationale: El imperativo aoristo con sentido reflexivo exige una forma pronominal en español. 'Sálvate' conserva el campo semántico de σῴζω y su enlace con el uso lucano de 'salvar'.
- source_word: σεαυτόν
  english_pob_choice: yourself
  chosen_spanish: a ti mismo
  alternatives_spanish:
  - a ti
  - a ti mismo
  lexicon: BDAG
  rationale: El reflexivo directo se expresa de manera natural y enfática con 'a ti mismo'. La duplicación pronominal refleja el énfasis del griego sin sonar forzada.
theological_decisions:
- issue: Título mock-royal βασιλεὺς τῶν Ἰουδαίων en el contexto de la crucifixión
  english_pob_reading: the King of the Jews
  chosen_spanish_reading: el Rey de los judíos
  alternative_spanish_readings:
  - el rey de los judíos
  - el Rey de los judeanos
  rationale: Conservar 'Rey de los judíos' mantiene la carga irónica y acusatoria del título en la escena de la pasión. No se suaviza ni se explica la frase, porque el texto la usa como burla y desafío frente a la cruz.
  doctrine_reference: 'Translation philosophy: original-language primacy; preserve theological tension rather than resolve it'
translation_notes:
  revision_awareness: No se introducen cambios respecto al sentido del griego ni al registro de la POB en inglés; la única decisión abierta es Ἰουδαίων, que se conserva en la lectura principal como 'judíos' y se documenta con una alternativa léxica en nota.
  spanish_consistency_notes:
  - Se conserva el tratamiento de 'Yahvé' como norma del proyecto, aunque este versículo no contiene el nombre divino.
  - Se usa 'Rey' con mayúscula para respetar el título aplicado a Jesús en la escena, coherente con el tono narrativo y la práctica del proyecto.
  - El reflexivo 'sálvate a ti mismo' evita una traducción demasiado literal ('salva tú mismo') y suena natural en español, sin perder el imperativo directo.
