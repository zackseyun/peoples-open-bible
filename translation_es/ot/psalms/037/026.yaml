  to: Todo el día es bondadoso y presta, y su descendencia es una bendición[a].
  rationale: Se corrige el futuro por un presente gnómico más fiel al hebreo y al English POB («are a blessing»), se mueve el marcador de nota a la cláusula que realmente comenta, y se ajusta la nota para preservar la alternativa auditada («are blessed») junto con la literalidad hebrea.
