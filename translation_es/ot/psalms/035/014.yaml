  to: Andaba como si fuera mi amigo[a], como si fuera mi hermano; me inclinaba sombrío[b], como quien hace duelo por una madre[c].
  rationale: Se ajusta קֹדֵר de 'en penumbra' a 'sombrío' para reflejar mejor el sentido idiomático de semblante abatido en duelo. Se cambia 'me paseaba' por 'andaba' para evitar un matiz demasiado ligero. Se corrige la nota c para no introducir 'su madre', ya que el hebreo dice simplemente 'madre/una madre'.
