translation:
  language: es
  text: Y cuando llegó a Jerusalén y fue recibido cortésmente por el sumo sacerdote de la ciudad, expuso la manifestación[a] que había tenido lugar, explicó con qué propósito estaba allí, e inquirió si en verdad estas cosas eran así.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «la información que había salido a la luz»; el término griego también puede denotar una divulgación o algo dado a conocer.
    reason: lexical_alternative
lexical_decisions:
- source_word: παραγενηθεὶς
  english_pob_choice: when he arrived
  chosen_spanish: cuando llegó
  alternatives_spanish:
  - cuando arribó
  - habiendo llegado
  lexicon: LSJ
  rationale: El participio aoristo señala llegada/presencia; «cuando llegó» transmite bien el valor temporal en español natural sin perder la referencia al arribo a Jerusalén.
- source_word: φιλοφρόνως
  english_pob_choice: courteously
  chosen_spanish: cortésmente
  alternatives_spanish:
  - amablemente
  - con amabilidad
  - benignamente
  lexicon: LSJ
  rationale: El adverbio indica una recepción cordial o amable. «Cortésmente» conserva el registro formal de la narración y refleja una acogida respetuosa.
- source_word: ἀποδεχθεὶς
  english_pob_choice: was received
  chosen_spanish: fue recibido
  alternatives_spanish:
  - fue acogido
  - fue aceptado
  lexicon: LSJ
  rationale: El pasivo significa recibir/acoger. «Fue recibido» sigue de cerca el sentido básico y combina bien con el adverbio anterior.
- source_word: ἀνέθετο
  english_pob_choice: he reported
  chosen_spanish: expuso
  alternatives_spanish:
  - relató
  - informó
  - presentó
  lexicon: LSJ
  rationale: Aquí el verbo introduce la presentación de su relato. «Expuso» comunica una exposición formal y evita sobrecargar el texto con un giro demasiado técnico.
- source_word: περὶ τοῦ γεγονότος ἐμφανισμοῦ
  english_pob_choice: the manifestation that had taken place
  chosen_spanish: la manifestación que había tenido lugar
  alternatives_spanish:
  - la manifestación que había ocurrido
  - la revelación que había tenido lugar
  - la información que había salido a la luz
  lexicon: LSJ
  rationale: Se conserva «manifestación» para reflejar ἐμφανισμός, tal como la revisión inglesa optó por ese término, y el participio perfecto con «que había tenido lugar» reproduce el evento ya realizado. No se reduce a «información» para no perder la tensión léxica del griego.
- source_word: καί τινος ἕνεκεν πάρεστι
  english_pob_choice: for what reason he was present
  chosen_spanish: con qué propósito estaba allí
  alternatives_spanish:
  - por qué estaba allí
  - con qué motivo había venido
  - para qué estaba presente
  lexicon: LSJ
  rationale: La cláusula explica la razón de su presencia. «Con qué propósito estaba allí» suena natural en español y mantiene la idea de finalidad/presencia sin forzar la sintaxis.
- source_word: διεσάφησεν
  english_pob_choice: explained
  chosen_spanish: explicó
  alternatives_spanish:
  - aclaró
  - dejó en claro
  - expuso con claridad
  lexicon: LSJ
  rationale: El verbo significa hacer claro o explícito. «Explicó» es la correspondencia más directa y adecuada en la secuencia narrativa.
- source_word: ἐπυνθάνετο
  english_pob_choice: inquired
  chosen_spanish: inquirió
  alternatives_spanish:
  - preguntó
  - se informó
  - indagó
  lexicon: LSJ
  rationale: El imperfecto medio expresa una indagación sostenida o formal. «Inquirió» preserva el registro elevado de la escena y coincide con la solución inglesa.
- source_word: ταῖς ἀληθείαις
  english_pob_choice: truly
  chosen_spanish: en verdad
  alternatives_spanish:
  - de veras
  - realmente
  - ciertamente
  lexicon: LSJ
  rationale: El dativo funciona adverbialmente con el sentido de «en realidad / verdaderamente». «En verdad» expresa bien la comprobación de la veracidad de lo dicho.
- source_word: ταῦτα οὕτως ἔχοντα τυγχάνει
  english_pob_choice: these things were truly so
  chosen_spanish: estas cosas eran así
  alternatives_spanish:
  - estas cosas estaban realmente así
  - esto era verdaderamente cierto
  - las cosas sucedían así
  lexicon: LSJ
  rationale: La expresión pregunta si los hechos corresponden a lo reportado. «Eran así» mantiene la sencillez idiomática y la referencia factual, sin añadir matices ajenos.
theological_decisions:
- issue: ἐμφανισμός como «manifestación» frente a «información/disclosure»
  english_pob_reading: the manifestation that had taken place
  chosen_spanish_reading: la manifestación que había tenido lugar
  alternative_spanish_readings:
  - la información que había salido a la luz
  - la revelación que había tenido lugar
  rationale: La revisión inglesa prefirió «manifestation» para reflejar más directamente ἐμφανισμός. En español se conserva «manifestación» para no diluir la correspondencia léxica, aunque en este contexto no implica necesariamente una teofanía; puede referirse al hecho de haberse hecho visible o conocido.
  doctrine_reference: No doctrinal issue; lexical correspondence to the Greek term.
translation_notes:
  revision_awareness: La redacción sigue la última revisión inglesa que sustituyó «disclosure» por «manifestation» para reflejar con mayor precisión ἐμφανισμός. También conserva el cierre interrogativo sobre si los hechos eran realmente así, manteniendo el matiz de investigación formal del griego.
  spanish_consistency_notes:
  - Se usó «Yahvé» solo cuando corresponde; este versículo no contiene el nombre divino.
  - Se mantuvo «sumo sacerdote» como término eclesiástico-bíblico estándar para ἀρχιερεύς.
  - Se preservó el orden narrativo del griego sin calcar estructuras innecesarias.
  - No se introdujeron equivalentes tradicionales que oscurecieran la correspondencia léxica con el texto fuente.
