translation:
  text: And Joakim the high priest and the council of the sons of Israel[a], who dwelt in Jerusalem, came to see the good things that the Lord had done for Israel[b], and to see Judith and speak peaceably with her.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the Israelites.' The Greek reads 'the sons of Israel,' a traditional covenantal designation for the people.
    reason: lexical_alternative
  - marker: b
    text: Literally 'speak peace with her,' that is, speak with her in peace or offer peaceful congratulations.
    reason: lexical_alternative
lexical_decisions:
- source_word: Ἰωακειὶμ
  chosen: Joakim
  alternatives:
  - Jehoiakim
  - Joiakim
  rationale: Personal names are transliterated rather than translated. 'Joakim' closely reflects the Greek form in Swete.
- source_word: ὁ ἱερεὺς ὁ μέγας
  chosen: the high priest
  alternatives:
  - the great priest
  lexicon: LSJ
  rationale: This is the standard Greek expression for the chief priestly office; 'high priest' is the natural and established English equivalent.
- source_word: ἡ γερουσία
  chosen: the council
  alternatives:
  - the senate
  - the eldership
  lexicon: LSJ
  rationale: The term denotes a body of elders or governing council. 'Council' is clear modern English and fits the institutional sense without sounding anachronistically Roman like 'senate.'
- source_word: τῶν υἱῶν Ἰσραήλ
  chosen: of the sons of Israel
  alternatives:
  - of Israel
  - of the Israelites
  lexicon: LSJ
  rationale: The Greek explicitly says 'sons of Israel.' Per gender-accurate policy, the masculine form is preserved where it is part of the traditional ethnic designation, even though it refers corporately to the people.
- source_word: οἱ κατοικοῦντες ἐν Ἰερουσαλήμ
  chosen: who lived in Jerusalem
  alternatives:
  - dwelling in Jerusalem
  - who were residing in Jerusalem
  lexicon: LSJ
  rationale: This participial phrase most naturally modifies the immediately preceding group, identifying the council as those resident in Jerusalem. 'Lived in' is readable modern English.
- source_word: τοῦ θεάσασθαι
  chosen: to see
  alternatives:
  - to behold
  - to look upon
  lexicon: LSJ
  rationale: The infinitive expresses purpose. While the verb can carry a more vivid sense of beholding, 'to see' is sufficiently natural in English here and pairs well with the following infinitive.
- source_word: τὰ ἀγαθὰ
  chosen: the good things
  alternatives:
  - the blessings
  - the good deeds
  - the benefits
  lexicon: LSJ
  rationale: The phrase is broad and refers to the beneficial acts or outcomes the Lord brought about for Israel. 'Good things' stays close to the Greek without over-interpreting.
- source_word: Κύριος
  chosen: the Lord
  alternatives:
  - Lord
  lexicon: LSJ
  rationale: Per doctrine, κύριος is rendered 'Lord.' The article is natural in English in this narrative context.
- source_word: τοῦ ἰδεῖν
  chosen: to see
  alternatives:
  - to meet with
  - to look upon
  lexicon: LSJ
  rationale: A second purpose infinitive parallel to the first. 'To see Judith' is the plain sense.
- source_word: λαλῆσαι μετʼ αὐτῆς εἰρήνην
  chosen: speak peace with her
  alternatives:
  - speak peacefully with her
  - greet her in peace
  - speak words of peace with her
  lexicon: LSJ
  rationale: 'The Greek is somewhat idiomatic: literally ''speak peace with her.'' Retaining ''peace'' preserves the Semitic-flavored expression and likely sense of speaking in peace/congratulation, while remaining understandable in English.'
