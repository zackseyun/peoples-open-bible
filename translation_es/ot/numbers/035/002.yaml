  to: Ordena a los hijos de Israel que den a los levitas[a], de la heredad de su posesión, ciudades para habitar; y ustedes darán a los levitas tierras de pastoreo[b] alrededor de las ciudades.
  rationale: Se reubica la nota cultural al término que realmente traduce מִגְרָשׁ y se ajusta «vosotros daréis» a «ustedes darán» para cumplir mejor con el español neutral latinoamericano sin perder la segunda persona plural del hebreo. También se suaviza «terrenos de pasto» a «tierras de pastoreo» por mayor naturalidad eclesial y correspondencia con la nota.
