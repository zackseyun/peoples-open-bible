translation:
  language: es
  text: Pero, al no poder soportar su arrogancia, se propuso privarnos tanto de nuestra posición como de nuestra vida[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «privarnos tanto de nuestra autoridad como de nuestro espíritu/aliento». El griego ἀρχή puede significar «gobierno», «cargo» o «autoridad», y πνεῦμα puede significar «espíritu», «aliento» o «vida».'
    reason: lexical_alternative
lexical_decisions:
- source_word: οὐκ ἐνέγκας
  english_pob_choice: unable to bear
  chosen_spanish: al no poder soportar
  alternatives_spanish:
  - al no tolerar
  - incapaz de soportar
  lexicon: LSJ
  rationale: El participio aoristo expresa la incapacidad de soportar algo; en español, «al no poder soportar» conserva la fuerza causal y resulta natural. «Tolerar» es posible, pero «soportar» reproduce mejor el peso de la reacción hostil.
- source_word: τὴν ὑπερηφανίαν
  english_pob_choice: his arrogance
  chosen_spanish: su arrogancia
  alternatives_spanish:
  - su orgullo
  - su altivez
  lexicon: LSJ
  rationale: ὑπερηφανία comunica orgullo desmedido y ofensivo; «arrogancia» es el equivalente más directo y negativo en español. Se mantiene el posesivo «su» como en la lectura inglesa, sin añadir matices no exigidos por el griego.
- source_word: ἐπετήδευσεν
  english_pob_choice: he made it his aim
  chosen_spanish: se propuso
  alternatives_spanish:
  - se empeñó en
  - hizo de ello su propósito
  lexicon: LSJ
  rationale: El verbo implica una acción deliberada, perseguida con intención. «Se propuso» transmite ese propósito sin sobretraducir ni sugerir éxito garantizado.
- source_word: τῆς ἀρχῆς
  english_pob_choice: our position
  chosen_spanish: nuestra posición
  alternatives_spanish:
  - nuestro cargo
  - nuestra autoridad
  - nuestro gobierno
  lexicon: LSJ
  rationale: ἀρχή puede referirse a gobierno, cargo o autoridad. Dado el contexto de corte y amenaza política, «posición» preserva la amplitud semántica que la traducción inglesa también quiso conservar.
- source_word: στερῆσαι
  english_pob_choice: to deprive
  chosen_spanish: privarnos
  alternatives_spanish:
  - despojarnos
  - quitarnos
  lexicon: LSJ
  rationale: στερέω expresa privar o despojar. En español, «privarnos» mantiene el sentido objetivo de quitar algo a alguien y encaja con la estructura verbal de la frase.
- source_word: ἡμᾶς
  english_pob_choice: us
  chosen_spanish: nos
  alternatives_spanish:
  - a nosotros
  lexicon: LSJ
  rationale: Pronombre de objeto directo en primera persona plural; «nos» es la forma natural y fiel en español.
- source_word: καὶ τοῦ πνεύματος
  english_pob_choice: and our life
  chosen_spanish: como de nuestra vida
  alternatives_spanish:
  - y de nuestro espíritu
  - y de nuestro aliento
  - y de nuestra vida
  lexicon: LSJ
  rationale: En este contexto de amenaza política y mortal, πνεῦμα puede entenderse como vida o aliento vital. Se opta por «vida» siguiendo la decisión auditada en inglés, porque evita introducir una lectura espiritual abstracta que el contexto no requiere.
theological_decisions:
- issue: Sentido de πνεῦμα en un contexto de peligro mortal
  english_pob_reading: life/life-breath rather than an abstract 'spirit'
  chosen_spanish_reading: vida, no un «espíritu» abstracto
  alternative_spanish_readings:
  - espíritu
  - aliento
  - aliento vital
  rationale: La frase contrasta la pérdida de posición con la pérdida de la vida; por eso «vida» comunica mejor el sentido probable de πνεῦμα en este pasaje. Así se evita importar una connotación antropológica o pneumatológica ajena al contexto.
  doctrine_reference: Translation philosophy §1, §3
- issue: Matiz de ἀρχή en un marco cortesano
  english_pob_reading: our position
  chosen_spanish_reading: nuestra posición
  alternative_spanish_readings:
  - nuestro cargo
  - nuestra autoridad
  - nuestro gobierno
  rationale: El término griego puede abarcar cargo, autoridad o dominio. «Posición» preserva esa amplitud y mantiene la ambigüedad funcional que el auditable inglés también retuvo.
  doctrine_reference: LSJ semantic range; court-context reading
translation_notes:
  revision_awareness: La redacción sigue el último pase revisado del audit trail inglés, que eliminó el énfasis interpretativo añadido a «life». En español se refleja esa misma cautela, evitando intensificadores como «misma» o «muy» y conservando una formulación sobria y directa.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» en el proyecto como norma general, pero este versículo no la contiene.
  - Se eligió «vida» para πνεῦμα por coherencia con la lectura contextual auditada; no se usó «espíritu» en el cuerpo del texto.
  - «Posición» conserva la amplitud de ἀρχή sin forzar un término técnico de autoridad o cargo.
  - La puntuación y el orden de la frase buscan ser naturales en español sin perder la estructura causal del participio griego.
