  glossary_alignment: 'No hay conflictos con la terminología base del proyecto. Las decisiones principales son compatibles con el POB: ''Bienaventurado'', ''pequeños'', ''roca''. La única omisión relevante es la alternativa léxica preservada en la auditoría inglesa para עֹלָלַיִךְ, que debe mantenerse en nota en español.'
