- from: Entonces tomarás el aceite de la unción y ungirás el tabernáculo y todo lo que está en él[a], y lo consagrarás junto con todos sus utensilios[b]; y será santo.
  to: Entonces tomarás el aceite de la unción[a] y ungirás el tabernáculo y todo lo que está en él, y lo consagrarás, y todos sus utensilios, y será santo[b].
  rationale: Se corrigieron los anclajes de las notas para que correspondan a las palabras comentadas en la fuente y en el POB inglés. También se eliminó 'junto con', que añadía un matiz no requerido por el hebreo, y se simplificó la puntuación. Se mantuvo 'santo' sin intensificarlo, conforme a קֹדֶשׁ.
