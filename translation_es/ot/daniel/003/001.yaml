translation:
  language: es
  text: El rey Nabucodonosor hizo una imagen de oro[a], de sesenta codos[b] de alto y seis codos de ancho. La erigió en la llanura de Dura, en la provincia de Babilonia.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «estatua de oro». El término arameo puede denotar una imagen o una estatua; «ídolo» también es posible a la luz del contexto posterior, pero el texto principal conserva la formulación más neutral del verso.
    reason: lexical_alternative
  - marker: b
    text: El codo era una unidad antigua de longitud, aproximadamente la distancia del codo a la punta de los dedos.
    reason: cultural_note
lexical_decisions:
- source_word: מַלְכָּא
  english_pob_choice: King
  chosen_spanish: el rey
  alternatives_spanish:
  - rey
  lexicon: HALOT
  rationale: 'En español, el título funciona mejor con artículo en una narración histórica: «El rey Nabucodonosor». Conserva el valor apposicional del hebreo/aramaico y la naturalidad del registro.'
- source_word: עֲבַד
  english_pob_choice: made
  chosen_spanish: hizo
  alternatives_spanish:
  - fabricó
  - construyó
  lexicon: HALOT
  rationale: El verbo aramaico significa de forma amplia «hacer». «Hizo» reproduce bien la acción sin sobreespecificar el método de producción, como en el criterio del POB inglés.
- source_word: צְלֵם
  english_pob_choice: image
  chosen_spanish: imagen
  alternatives_spanish:
  - estatua
  - ídolo
  lexicon: HALOT
  rationale: «Imagen» mantiene la neutralidad léxica del texto, como la traducción inglesa auditada. «Ídolo» anticiparía la función cultual; «estatua» es posible, pero algo más estrecha.
- source_word: דִּי דְהַב
  english_pob_choice: of gold
  chosen_spanish: de oro
  alternatives_spanish:
  - dorada
  lexicon: HALOT
  rationale: La construcción genitiva se expresa de modo directo con «de oro», preservando el sentido material del original. «Dorada» podría sugerir cobertura superficial y no está exigida por el texto.
- source_word: רוּמֵהּ
  english_pob_choice: its height
  chosen_spanish: de alto
  alternatives_spanish:
  - de altura
  lexicon: HALOT
  rationale: En español, al hablar de dimensiones, «de alto» resulta más natural que una repetición literal de «su altura». Mantiene la fuerza dimensional del arameo.
- source_word: אַמִּין שִׁתִּין
  english_pob_choice: sixty cubits
  chosen_spanish: sesenta codos
  alternatives_spanish:
  - sesenta codos de altura
  lexicon: HALOT
  rationale: «Codos» traduce la unidad antigua de medida; se conserva la cifra sin explicarla en el cuerpo del texto, como en el POB inglés.
- source_word: פְּתָיֵהּ
  english_pob_choice: its width
  chosen_spanish: de ancho
  alternatives_spanish:
  - de anchura
  - de ancho
  lexicon: HALOT
  rationale: «De ancho» es la forma más natural en español contemporáneo para la dimensión horizontal; preserva el sentido de breadth/width del original.
- source_word: אַמִּין שִׁת
  english_pob_choice: six cubits
  chosen_spanish: seis codos
  alternatives_spanish:
  - seis codos de ancho
  lexicon: HALOT
  rationale: Se mantiene la medida literal y su correspondencia con la anchura ya indicada, sin añadir elementos ajenos al arameo.
- source_word: אֲקִימֵהּ
  english_pob_choice: He set it up
  chosen_spanish: La erigió
  alternatives_spanish:
  - la levantó
  - la colocó
  lexicon: HALOT
  rationale: «Erigió» comunica con precisión la instalación de una estructura monumental y conserva el tono formal del pasaje. «La levantó» es posible, pero menos específico en este contexto.
- source_word: בְּבִקְעַת
  english_pob_choice: in the plain
  chosen_spanish: en la llanura
  alternatives_spanish:
  - en el valle
  - en la planicie
  lexicon: HALOT
  rationale: «Llanura» reproduce bien el sentido de una extensión nivelada apta para un gran monumento y coincide con la opción inglesa por «plain».
- source_word: דּוּרָא
  english_pob_choice: Dura
  chosen_spanish: Dura
  alternatives_spanish:
  - —
  lexicon: HALOT
  rationale: Nombre propio transliterado. No se traduce.
- source_word: בִּמְדִינַת בָּבֶל
  english_pob_choice: in the province of Babylon
  chosen_spanish: en la provincia de Babilonia
  alternatives_spanish:
  - en la provincia de Babilonia
  lexicon: HALOT
  rationale: «Provincia» refleja el valor administrativo de מְדִינָה. «Babilonia» conserva el nombre geográfico/político del dominio imperial tal como lo hace el POB inglés.
theological_decisions:
- issue: Si צְלֵם debe explicitarse como objeto idolátrico
  english_pob_reading: image
  chosen_spanish_reading: imagen
  alternative_spanish_readings:
  - ídolo
  - estatua
  rationale: El verso describe el objeto por su material y tamaño, pero no lo califica todavía como ídolo. «Imagen» conserva la neutralidad textual y deja que el contexto posterior determine su función religiosa.
  doctrine_reference: Principio de neutralidad lexical en traducción bíblica; Daniel 3:1 en su contexto narrativo inmediato
- issue: Cómo reflejar la unidad de medida antigua sin sobredocumentarla en el texto principal
  english_pob_reading: sixty cubits / six cubits
  chosen_spanish_reading: sesenta codos / seis codos
  alternative_spanish_readings:
  - sesenta codos de altura / seis codos de ancho
  rationale: La medida antigua se mantiene literal en el texto principal, mientras que la explicación cultural puede reservarse para una nota si el proyecto la incorpora en esta sección. Así se preserva la transparencia del dato bíblico.
  doctrine_reference: Política de medidas antiguas del proyecto POB
translation_notes:
  revision_awareness: La versión inglesa auditada mantiene «image of gold» por neutralidad léxica y no introduce «idol». También conserva la estructura dimensional directa («its height sixty cubits and its width six cubits») y usa «set it up» para la instalación del monumento. La presente versión española sigue esas decisiones, ajustando solo el orden y la sintaxis para naturalidad idiomática sin alterar el alcance semántico.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» en general como norma del proyecto, pero este versículo no contiene el tetragrámaton ni una cita de κύριος.
  - Se conserva «imagen» y no «ídolo» en el cuerpo del texto, siguiendo la neutralidad léxica auditada.
  - Se usan «codos» para la unidad de medida y una nota cultural para su aclaración, en paralelo con el POB inglés.
  - «Provincia de Babilonia» conserva el matiz administrativo del original arameo.
