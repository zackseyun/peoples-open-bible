  to: Y sus niños pequeños perdieron el ánimo[a], y las mujeres y los jóvenes iban desfalleciendo a causa de la sed, y caían en las plazas de la ciudad y en los pasajes de las puertas[b], y ya no quedaba fuerza en ellos.
