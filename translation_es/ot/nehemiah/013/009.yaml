    rationale: La auditoría inglesa documenta explícitamente que לְבוֹנָה no es incienso genérico sino «frankincense». En español, «franquincienso» preserva mejor esa precisión cultual.
  - severity: low
    issue: «Las cámaras» es algo rígido en español contemporáneo.
    rationale: Aunque no es incorrecto, en contexto de dependencias del templo puede sonar menos natural que «las habitaciones» o «las salas». No obstante, puede conservarse si se privilegia el registro formal.
