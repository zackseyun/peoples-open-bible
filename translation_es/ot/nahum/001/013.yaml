review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador conserva bien el sentido básico del hebreo: marcador temporal («Y ahora»), acción divina futura, el sufijo de tercera persona en «su yugo», y la imagen paralela de yugo/vínculos. También preserva correctamente la reserva exegética de no identificar al opresor. Sin embargo, «romperé tus ligaduras» para אֲנַתֵּק/מוֹסְרֹתַיִךְ atenúa el matiz de arrancar/desprender y resulta menos ajustado que una formulación como «arrancaré tus cadenas/ataduras».'
  spanish_quality_summary: El español es claro y digno, pero «de sobre ti» suena algo forzado en español actual; «de encima de ti» transmite mejor la imagen sin perder fidelidad. Además, «ligaduras» es comprensible pero algo libresco y menos natural que «cadenas» o «ataduras» en este contexto de opresión. La combinación «quebraré… y romperé» también repite una idea demasiado cercana donde el hebreo distingue entre quebrar y arrancar/desprender.
  glossary_alignment: No hay conflicto con los términos de proyecto. La decisión sobre «su yugo» está bien alineada con la auditoría inglesa. La nota léxica para מֹטֵהוּ también está bien conservada.
  issues:
  - severity: medium
    issue: «de sobre ti» es poco natural en español
    rationale: Aunque refleja literalmente מֵעָלַיִךְ, en español bíblico moderno suena rígido. «De encima de ti» conserva la imaginería de una carga puesta sobre la destinataria y mejora la legibilidad.
  - severity: medium
    issue: «romperé tus ligaduras» no refleja bien el matiz de אֲנַתֵּק
    rationale: נתק en piel aquí expresa arrancar, desprender o hacer saltar las ataduras, no simplemente romperlas. Una forma como «arrancaré tus cadenas/ataduras» preserva mejor la distinción verbal del hebreo y del POB inglés («tear off»).
  - severity: low
    issue: «ligaduras» es menos idiomático que otras opciones
    rationale: Es entendible, pero en español general «cadenas» o «ataduras» suena más natural para la metáfora de opresión y empareja mejor con «yugo».
  revised_spanish_text: Y ahora quebraré su yugo[a] de encima de ti, y arrancaré tus cadenas.
  revised_footnotes:
