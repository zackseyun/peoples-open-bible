base_translation:
  language: en
  yaml_path: translation/ot/psalms/018/007.yaml
  text: In my distress I call on Yahweh[a], and to my God I cry for help. He hears my voice from his temple[b], and my cry before him comes into his ears.
  footnotes:
  - marker: a
    text: Or 'He will hear my voice from his temple ... my cry before him will come into his ears.' The Hebrew imperfects can be read with future force.
    reason: alternative_reading
  - marker: b
    text: '''Temple'' may also be rendered ''palace'' or ''sanctuary''; the Hebrew can denote the dwelling place of a king or of God.'
    reason: lexical_alternative
