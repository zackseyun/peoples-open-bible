revisions:
- from: 'Entonces todo el pueblo dijo a Samuel[a]: «Ruega a Yahvé tu Dios por tus siervos, y no nos dejes morir, porque hemos añadido a todos nuestros pecados este mal: pedir para nosotros un rey».'
  to: 'Entonces todo el pueblo dijo a Samuel[a]: «Ruega a Yahvé tu Dios por tus siervos, y no nos dejes morir, porque hemos añadido a todos nuestros pecados este mal: pedir un rey para nosotros».'
  rationale: 'Se hace un ajuste menor de naturalidad en español: «pedir un rey para nosotros» expresa con más fluidez el infinitivo hebreo con לָנוּ sin alterar el sentido ni el énfasis confesional. Se conserva la nota léxica alternativa porque el sentido intercesor de הִתְפַּלֵּל sigue siendo pertinente.'
