id: TIT.2.14
reference: Titus 2:14
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: ὃς ἔδωκεν ἑαυτὸν ὑπὲρ ἡμῶν ἵνα λυτρώσηται ἡμᾶς ἀπὸ πάσης ἀνομίας καὶ καθαρίσῃ ἑαυτῷ λαὸν περιούσιον, ζηλωτὴν καλῶν ἔργων.
base_translation:
  language: en
  yaml_path: translation/nt/titus/002/014.yaml
  text: who gave himself for us[a], so that he might redeem us from all lawlessness and purify for himself a people for his own possession, zealous for good works.
  footnotes:
  - marker: a
    text: Or 'a treasured people' or 'a special people.' The Greek 'a people for his own possession' preserves the covenantal sense of a people specially belonging to him.
    reason: lexical_alternative
translation:
  language: ko
  text: 그분은 우리를 위하여 자기 자신을 내주셨습니다. 우리를 모든 불법에서 구속하시고, 우리를 깨끗하게 하여 자기에게 속한 백성[a], 곧 선한 일에 열심을 내는 백성이 되게 하시려는 것입니다.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 또는 「귀중한 백성」, 「특별한 백성」. 헬라어 「자기에게 속한 백성」은 그분께 특별히 속한 언약 백성의 의미를 보존한다.
    reason: lexical_alternative
lexical_decisions:
- source_word: ὃς ἔδωκεν ἑαυτὸν ὑπὲρ ἡμῶν
  english_pob_choice: who gave himself for us
  chosen_korean: 그분은 우리를 위하여 자기 자신을 내주셨습니다
  alternatives_korean:
  - 그분이 우리를 위해 자신을 주셨습니다
  - 자신을 우리를 위하여 바치셨습니다
  lexicon: BDAG
  rationale: 관계절을 독립 문장으로 옮긴다. 「내주다」가 대속적 헌신의 어감을 잘 살린다.
- source_word: λυτρώσηται
  english_pob_choice: redeem
  chosen_korean: 구속하시고
  alternatives_korean:
  - 속량하시고
  - 풀어내시고
  lexicon: BDAG
  rationale: λυτρόω는 「몸값을 치르고 풀어내다」. 한국 교회 전통의 「구속(救贖)」이 정립된 등가어.
- source_word: ἀπὸ πάσης ἀνομίας
  english_pob_choice: from all lawlessness
  chosen_korean: 모든 불법에서
  alternatives_korean:
  - 모든 불의에서
  - 모든 무법에서
  lexicon: BDAG
  rationale: ἀνομία는 「율법 없음·불법」. 「불법」이 정립된 등가어.
- source_word: καθαρίσῃ ἑαυτῷ
  english_pob_choice: purify for himself
  chosen_korean: 깨끗하게 하여 자기에게 속한
  alternatives_korean:
  - 자기를 위해 정결케 하시고
  - 자신을 위해 깨끗하게 하시고
  lexicon: BDAG
  rationale: καθαρίζω + 재귀 여격. 정결과 소유 귀속이 한 동작으로 이루어지므로 「깨끗하게 하여 자기에게 속한 백성」으로 자연스럽게 결합.
- source_word: λαὸν περιούσιον
  english_pob_choice: a people for his own possession
  chosen_korean: 자기에게 속한 백성
  alternatives_korean:
  - 자기 소유의 백성
  - 특별한 보배가 된 백성
  lexicon: BDAG
  rationale: περιούσιος(70인역 출 19:5 등에서 「귀중한 보배의 백성」). 언약적 소유관계를 살리며 한국어로 자연스러운 「자기에게 속한 백성」.
- source_word: ζηλωτὴν καλῶν ἔργων
  english_pob_choice: zealous for good works
  chosen_korean: 선한 일에 열심을 내는 백성
  alternatives_korean:
  - 선한 일에 열정을 가진 백성
  - 선한 일을 열심히 하는 백성
  lexicon: BDAG
  rationale: ζηλωτής는 「열심당원·열정가」. 「열심을 내다」가 한국 교회의 정립된 표현.
