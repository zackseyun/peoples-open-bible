translation:
  language: es
  text: El temor de Yahvé añade días[a], pero los años de los impíos se acortarán.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «prolonga los días». El hebreo dice literalmente «añade», con «días» como objeto.
    reason: lexical_alternative
lexical_decisions:
- source_word: יִרְאַת
  english_pob_choice: fear of
  chosen_spanish: temor de
  alternatives_spanish:
  - miedo de
  - reverencia por
  lexicon: HALOT
  rationale: En Proverbios, la construcción con יִרְאָה y el nombre divino expresa una actitud reverente y obediente; en español, «temor de» conserva el giro idiomático y el peso teológico sin suavizarlo a «reverencia», que podría perder la fuerza de la expresión.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  lexicon: HALOT
  rationale: El Tetragrámaton se vierte como «Yahvé» conforme a la decisión terminológica del proyecto, preservando el nombre propio divino en lugar de sustituirlo por un título.
- source_word: תּוֹסִיף
  english_pob_choice: adds
  chosen_spanish: añade
  alternatives_spanish:
  - incrementa
  - prolonga
  lexicon: HALOT
  rationale: El verbo hiphil de יסף significa «añadir/aumentar». «Añade» reproduce con naturalidad la idea verbal y mantiene la imagen concreta de sumar días.
- source_word: יָמִים
  english_pob_choice: days
  chosen_spanish: días
  alternatives_spanish:
  - largos días
  - longevidad
  lexicon: HALOT
  rationale: El hebreo dice literalmente «días». Se conserva esa concreción para respetar el paralelismo con «años» en el segundo hemistiquio.
- source_word: וּ/שְׁנ֖וֹת
  english_pob_choice: but the years of
  chosen_spanish: pero los años de
  alternatives_spanish:
  - y los años de
  lexicon: HALOT
  rationale: Aunque la conjunción es formalmente «y», el paralelismo adversativo del proverbio pide en español «pero» para expresar con claridad el contraste entre ambos miembros.
- source_word: רְשָׁעִים
  english_pob_choice: the wicked
  chosen_spanish: los malvados
  alternatives_spanish:
  - los impíos
  - los perversos
  lexicon: HALOT
  rationale: «Los malvados» comunica el valor moral del término con buena inteligibilidad en español. Se evita «impíos» por sonar más eclesiástico y menos directo en lectura proverbial.
- source_word: תִּקְצֹרְנָה
  english_pob_choice: will be cut short
  chosen_spanish: serán acortados
  alternatives_spanish:
  - serán cortados
  - se acortarán
  lexicon: HALOT
  rationale: El verbo קצר en esta forma femenina plural concuerda con «años» y expresa un resultado pasivo/estado reducido. «Serán acortados» conserva la pasividad implícita y el sentido proverbial sin volverlo demasiado literal en español.
theological_decisions:
- issue: Naturaleza general del proverbio sobre duración de la vida
  english_pob_reading: Render as a general wisdom principle without making it an absolute guarantee.
  chosen_spanish_reading: Se traduce como principio sapiencial general, no como promesa mecánica e incondicional para cada caso individual.
  alternative_spanish_readings:
  - Tratarl0 como garantía absoluta de larga vida para todo el que teme a Yahvé
  - Interpretarlo como una regla estadística sin fuerza moral
  rationale: 'El hebreo presenta un patrón moral típico de la literatura sapiencial: el temor de Yahvé conduce a vida, mientras la maldad tiende a acortar los años. La traducción mantiene esa afirmación sin borrar la tensión con otros pasajes bíblicos donde los justos sufren o mueren jóvenes.'
  doctrine_reference: Preservar la tensión teológica de la sabiduría bíblica.
translation_notes:
  revision_awareness: El texto inglés auditado no requiere cambios; se mantiene la equivalencia óptima con la misma observación léxica sobre תּוֹסִיף y una advertencia sapiencial sobre el alcance general del proverbio.
  spanish_consistency_notes:
  - Se usó «Yahvé» de forma consistente con el estándar del proyecto para יהוה.
  - Se conservó la concreción «días / años» para reflejar el paralelismo hebreo.
  - Se prefirió «malvados» por claridad bíblica y registro neutral latinoamericano.
  - La nota al pie se ancla en «añade días» para reflejar la alternativa lexical del hebreo literal.
