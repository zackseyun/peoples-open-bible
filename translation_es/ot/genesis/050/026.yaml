base_translation:
  language: en
  yaml_path: translation/ot/genesis/050/026.yaml
  text: So Joseph died at the age of a hundred and ten years[c][b][a], and they embalmed him and placed him in a coffin in Egypt.
  footnotes:
  - marker: a
    text: Or 'And Joseph died at the age of a hundred and ten years.' The opening conjunction can be rendered simply as 'And'; 'So' reflects the concluding narrative flow.
    reason: lexical_alternative
  - marker: b
    text: Or 'they mummified him.' The Hebrew verb refers to embalming, especially in an Egyptian setting.
    reason: cultural_note
  - marker: c
    text: The Hebrew word here is the same noun used elsewhere for a chest or ark; in this burial context it means 'coffin.'
    reason: lexical_alternative
