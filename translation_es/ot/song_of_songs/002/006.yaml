translation:
  language: es
  text: Su mano izquierda está debajo de mi cabeza[a], y su mano derecha me abraza.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O “su brazo izquierdo ... su brazo derecho”, ya que los términos hebreos para “izquierda” y “derecha” pueden designar el lado correspondiente o la mano/el brazo según el contexto.
    reason: lexical_alternative
lexical_decisions:
- source_word: שְׂמֹאלוֹ
  english_pob_choice: his left hand
  chosen_spanish: su mano izquierda
  alternatives_spanish:
  - su brazo izquierdo
  - su izquierda
  lexicon: HALOT
  rationale: El hebreo puede referirse al lado o a la mano correspondiente; en este contexto corporal, “mano izquierda” conserva la imagen explícita que la POB en inglés también hizo explícita, y suena natural en español.
- source_word: תַּחַת
  english_pob_choice: under
  chosen_spanish: debajo de
  alternatives_spanish:
  - bajo
  - bajo de
  lexicon: HALOT
  rationale: La preposición indica ubicación inferior. “Debajo de” es claro y idiomático en español moderno.
- source_word: לְרֹאשִׁי
  english_pob_choice: my head
  chosen_spanish: mi cabeza
  alternatives_spanish:
  - mi cabeza
  - mi cabeza
  lexicon: HALOT
  rationale: רֹאשׁ es literalmente “cabeza”. En español, “mi cabeza” mantiene la imagen concreta del cuerpo y evita una construcción rígida.
- source_word: וִימִינוֹ
  english_pob_choice: and his right hand
  chosen_spanish: y su mano derecha
  alternatives_spanish:
  - y su brazo derecho
  - y su derecha
  lexicon: HALOT
  rationale: Como con “izquierda”, el hebreo permite mano o lado correspondiente. “Mano derecha” preserva el paralelismo y la concreción corporal.
- source_word: תְּחַבְּקֵנִי
  english_pob_choice: embraces me
  chosen_spanish: me abraza
  alternatives_spanish:
  - me estrecha
  - me rodea con sus brazos
  lexicon: HALOT
  rationale: El verbo חבק significa “abrazar”. El presente en español reproduce bien el valor vívido del imperfecto poético sin añadir matices no presentes en el hebreo.
translation_notes:
  revision_awareness: El texto hebreo y la auditoría inglesa muestran consenso alto y no registran revisiones textuales o de sentido; se mantiene la imagen poética sin expansión interpretativa.
  spanish_consistency_notes:
  - Se mantiene “mano izquierda / mano derecha” para conservar la simetría con la POB en inglés y la imagen corporal del hebreo.
  - Se evita “SEÑOR” o cualquier sustitución teológica, porque no hay el nombre divino en este versículo.
  - El tiempo presente en español transmite adecuadamente el imperfecto poético hebreo en un contexto descriptivo.
