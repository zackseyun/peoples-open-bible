id: ISA.12.5
reference: Isaiah 12:5
source:
  edition: WLC
  text: זַמְּר֣וּ יְהוָ֔ה כִּ֥י גֵא֖וּת עָשָׂ֑ה מידעת זֹ֖את בְּ/כָל הָ/אָֽרֶץ־׃
translation:
  text: Sing praise to Yahweh[a], for he has done gloriously; let this be made known in all the earth.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'for he has acted majestically' or 'for he has done excellent things.'
    reason: lexical_alternative
lexical_decisions:
- source_word: זַמְּרוּ
  chosen: Sing praise
  alternatives:
  - Sing
  - Make music
  - Sing psalms
  lexicon: HALOT
  rationale: Piel imperative plural of זמר calls for musical praise. 'Sing praise' captures both the verbal act of singing and its doxological object more naturally than bare 'sing' in English.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: כִּי
  chosen: for
  alternatives:
  - because
  - indeed
  lexicon: HALOT
  rationale: Introduces the reason for the imperative; 'for' is the most natural concise English connector here.
- source_word: גֵאוּת
  chosen: glorious things
  alternatives:
  - majesty
  - excellence
  - proudly
  - majestically
  lexicon: HALOT
  rationale: The noun denotes exaltation, majesty, or excellence. In this collocation with עשה ('do/make'), English idiom favors an object phrase such as 'glorious things' rather than the more wooden 'he has done majesty.' This preserves the sense of acts displaying divine exaltedness.
- source_word: עָשָׂה
  chosen: he has done
  alternatives:
  - he has acted
  - he has made
  lexicon: HALOT
  rationale: Common verb עשה with completed aspect; 'has done' is straightforward and idiomatic with the preceding noun.
- source_word: מידעת
  chosen: let this be made known
  alternatives:
  - this is made known
  - make this known
  - this has become known
  lexicon: HALOT
  rationale: 'The ketiv-like form reflects ידע in a passive/causative sense in context. Given the surrounding imperatives and the parallel summons to proclamation, an English jussive/passive sense fits best: ''let this be made known.'''
- source_word: זֹאת
  chosen: this
  alternatives:
  - it
  lexicon: HALOT
  rationale: Demonstrative points to the LORD's glorious deed(s) just mentioned; 'this' preserves the deictic force.
- source_word: בְּכָל הָאָרֶץ
  chosen: in all the earth
  alternatives:
  - throughout all the earth
  - in all the land
  lexicon: HALOT
  rationale: אָרֶץ here is best taken globally, not merely as 'land,' because the hymn celebrates the LORD's renown universally. 'In all the earth' is both natural and faithful.
