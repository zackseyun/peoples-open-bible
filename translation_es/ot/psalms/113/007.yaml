translation:
  language: es
  text: Él levanta al pobre del polvo; levanta al necesitado del montón de cenizas[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «del montón de desechos»; אַשְׁפֹּת puede referirse a un lugar de cenizas o residuos, imagen de extrema humillación.
