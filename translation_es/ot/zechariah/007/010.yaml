    rationale: El hebreo lleva sufijo plural de segunda persona; 'en sus corazones' preserva mejor el número y la fuerza distributiva/collectiva del original y del POB inglés ('in your hearts').
  - severity: medium
    issue: La nota [a] está anclada en 'viuda' pero comenta el verbo 'opriman'
    rationale: La nota no corresponde al término marcado en el texto, lo que rompe la disciplina de anclaje de notas y puede confundir al lector.
