translation:
  language: es
  text: Sé pronto para oír[c], y con paciencia[a][b] da una respuesta.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «con longitud de espíritu», un modismo para paciencia o templanza.'
    reason: lexical_alternative
  - marker: b
    text: También puede entenderse como «con paciencia devuelve una palabra» o «responde con un dicho». La frase hebrea es muy concisa; «da una respuesta» expresa el sentido probable en el contexto.
    reason: alternative_reading
  - marker: c
    text: El paralelo griego de este versículo difiere notablemente del hebreo conservado y parece reflejar otra forma textual; aquí se sigue como texto principal el testimonio hebreo superviviente.
    reason: textual_variant
lexical_decisions:
- source_word: הֱיֶה מְמַהֵר
  english_pob_choice: Be quick
  chosen_spanish: Sé pronto
  alternatives_spanish:
  - Sé rápido
  - Apresúrate a
  lexicon: HALOT
  rationale: La forma exhortativa pide prontitud o disposición inmediata. «Sé pronto» conserva la fuerza imperativa en español natural y digno, sin volver la frase artificial.
- source_word: לְהַאֲזִין
  english_pob_choice: to listen
  chosen_spanish: escuchar
  alternatives_spanish:
  - oír atentamente
  - dar oído
  lexicon: HALOT
  rationale: El verbo implica atención activa, no solo percepción auditiva. «Escuchar» transmite mejor esa receptividad exigida por el contexto sapiencial.
- source_word: וּבְאֶרֶךְ רוּחַ
  english_pob_choice: with patience
  chosen_spanish: con paciencia
  alternatives_spanish:
  - con longanimidad
  - con longanimidad de espíritu
  - con un espíritu paciente
  lexicon: HALOT
  rationale: El hebreo dice literalmente «con longitud de espíritu», un modismo de paciencia y dominio propio. «Con paciencia» es la equivalencia española más clara y fiel; la nota preserva el matiz idiomático.
- source_word: הָשֵׁב פִּתְגָּם
  english_pob_choice: give a reply
  chosen_spanish: da una respuesta
  alternatives_spanish:
  - responde
  - devuelve una palabra
  - da una réplica
  lexicon: HALOT
  rationale: La construcción pide una respuesta hablada o réplica breve. «Da una respuesta» mantiene la relación con «escuchar» y evita una traducción demasiado libre o demasiado técnica.
translation_notes:
  revision_awareness: La base inglesa revisó «answer» por «reply» para acercarse más a פִּתְגָּם como respuesta hablada/saying. En español, «respuesta» conserva ese ajuste y mantiene un registro formal y natural.
  spanish_consistency_notes:
  - Se prefiere «escuchar» para לְהַאֲזִין por su valor de atención activa.
  - «Con paciencia» traduce el modismo hebreo sin perder la nota explicativa.
  - No se introdujo lenguaje eclesiástico no motivado por la fuente; la línea sigue la lectura hebrea prioritaria, con nota del divergente paralelo griego.
