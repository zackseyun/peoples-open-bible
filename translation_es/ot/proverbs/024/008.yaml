translation:
  language: es
  text: Quien planea hacer el mal[a], lo llamarán maquinador.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Quien maquina el mal será llamado hombre de maquinaciones»'
    reason: lexical_alternative
lexical_decisions:
- source_word: מְחַשֵּׁב
  english_pob_choice: plans
  chosen_spanish: planea
  alternatives_spanish:
  - proyecta
  - maquina
  - traza
  lexicon: HALOT
  rationale: El participio expresa una acción deliberada de pensar y diseñar. «Planea» mantiene la intención consciente con un español natural, sin cargar el verbo con una tonalidad más fuerte que el hebreo exige.
- source_word: לְהָרֵעַ
  english_pob_choice: to do evil
  chosen_spanish: hacer el mal
  alternatives_spanish:
  - hacer daño
  - obrar mal
  - practicar el mal
  lexicon: HALOT
  rationale: La construcción final indica propósito o contenido moral. «Hacer el mal» es amplio y fiel, y conserva tanto la idea ética como la de daño potencial sin restringirla solo a lesión física.
- source_word: לוֹ
  english_pob_choice: to him
  chosen_spanish: a ese
  alternatives_spanish:
  - a él
  - lo
  - a tal persona
  lexicon: HALOT
  rationale: El sufijo pronominal introduce a la persona señalada por el predicado siguiente. «A ese» refleja la referencia anafórica y suena natural en español antes del apodo o calificación.
- source_word: בַּעַל
  english_pob_choice: master of
  chosen_spanish: maestro de
  alternatives_spanish:
  - dueño de
  - hombre de
  - caracterizado por
  lexicon: HALOT
  rationale: En construcciones de estado constructo, בַּעַל puede señalar a alguien caracterizado por algo. «Maestro de» conserva la fuerza del inglés POB sin implicar posesión literal; aquí funciona como etiqueta de rasgo o reputación.
- source_word: מְזִמּוֹת
  english_pob_choice: schemes
  chosen_spanish: intrigas
  alternatives_spanish:
  - planes
  - maquinaciones
  - designios
  lexicon: HALOT
  rationale: En literatura sapiencial, מְזִמּוֹת suele tener matiz negativo de astucia o maniobra oculta. «Intrigas» recoge ese matiz mejor que «planes», y evita suavizar la carga moral del término.
- source_word: יִקְרָאוּ
  english_pob_choice: they will call
  chosen_spanish: lo llamarán
  alternatives_spanish:
  - le llamarán
  - se le llamará
  - será llamado
  lexicon: HALOT
  rationale: La forma verbal hebrea es activa en tercera persona plural. «Lo llamarán» preserva esa voz activa y resulta idiomático en español; «será llamado» sería más pasivo que el hebreo, aunque posible como alternativa.
translation_notes:
  revision_awareness: La versión inglesa revisada eliminó la construcción torpe «to him they will call» y la sustituyó por un orden más natural. En español se siguió el mismo principio, manteniendo la agencia activa del hebreo y el valor nominal de בַּעַל מְזִמּוֹת sin traducirlo como una mera descripción verbal.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» como norma del proyecto solo cuando aparece el nombre divino; este versículo no lo contiene.
  - Se eligió un equivalente de matiz negativo para מְזִמּוֹת, en línea con la valoración sapiencial del contexto.
  - La estructura «a ese lo llamarán» conserva la referencia del sufijo לוֹ y la voz activa de יִקְרָאוּ.
