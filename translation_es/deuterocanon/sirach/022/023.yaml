    rationale: Aunque ἐν πτωχείᾳ significa literalmente 'en pobreza', en español neutro y bíblico legible la forma no marcada es 'en la pobreza'. La ausencia del artículo hace que la frase suene truncada o calcada.
  revised_spanish_text: Gana confianza[a] con tu prójimo en la pobreza, para que en sus bienes[b] seas saciado junto con él. En tiempo de angustia permanece con él, para que heredes con él en su herencia.
