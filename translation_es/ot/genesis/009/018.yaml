translation:
  language: es
  text: Los hijos de Noé que salieron del arca fueron Sem, Cam y Jafet; y Cam fue el padre de Canaán.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: וַיִּהְיוּ
  english_pob_choice: were
  chosen_spanish: fueron
  alternatives_spanish:
  - eran
  - resultaron ser
  lexicon: HALOT
  rationale: El hebreo funciona aquí como una cópula en pasado que introduce la identificación del sujeto; «fueron» comunica ese enlace sin sugerir necesariamente un cambio de estado.
- source_word: בְנֵי נֹחַ
  english_pob_choice: the sons of Noah
  chosen_spanish: los hijos de Noé
  alternatives_spanish:
  - los hijos de Noé
  lexicon: HALOT
  rationale: «בְנֵי» nombra literalmente a los hijos; en español, «los hijos de Noé» es natural y fiel al parentesco expresado por el constructo.
- source_word: הַיֹּצְאִים
  english_pob_choice: who came out
  chosen_spanish: que salieron
  alternatives_spanish:
  - que salían
  - los que salieron
  lexicon: HALOT
  rationale: El participio con artículo describe a los hijos de Noé como los que salieron del arca; «que salieron» conserva la relación atributiva de forma clara y idiomática.
- source_word: מִן הַתֵּבָה
  english_pob_choice: of the ark
  chosen_spanish: del arca
  alternatives_spanish:
  - de la arca
  - desde el arca
  lexicon: HALOT
  rationale: El hebreo expresa procedencia; en español, el compuesto «salieron del arca» integra naturalmente la idea de salida desde el interior del arca.
- source_word: שֵׁם וְחָם וָיָפֶת
  english_pob_choice: Shem, Ham, and Japheth
  chosen_spanish: Sem, Cam y Jafet
  alternatives_spanish:
  - Shem, Ham y Jafet
  lexicon: HALOT
  rationale: Se usan las formas españolas habituales de los nombres bíblicos para facilitar la lectura, manteniendo la identidad personal del texto fuente.
- source_word: וְחָם הוּא אֲבִי כְנָעַן
  english_pob_choice: and Ham was the father of Canaan
  chosen_spanish: y Cam fue el padre de Canaán
  alternatives_spanish:
  - y Cam era el padre de Canaán
  - y Cam, padre de Canaán
  lexicon: HALOT
  rationale: La cláusula nominal se traduce de modo directo para conservar la identificación narrativa de Cam respecto de Canaán, sin suavizar la relación genealógica explícita del hebreo.
theological_decisions:
- issue: Relación genealógica de Cam y Canaán
  english_pob_reading: Retain the explicit clause 'and Ham was the father of Canaan' in the main text as a narrative identification.
  chosen_spanish_reading: Mantener explícitamente «y Cam fue el padre de Canaán» como identificación narrativa.
  alternative_spanish_readings:
  - y Cam era el padre de Canaán
  - y Cam, padre de Canaán
  rationale: El hebreo pone esa relación de manera frontal y prepara el desarrollo narrativo posterior. La redacción española la preserva sin añadir inferencias étnicas o doctrinales no expresadas aquí.
  doctrine_reference: Translation philosophy §§1, 3, 5
translation_notes:
  revision_awareness: El borrador sigue de cerca el sentido y la estructura del hebreo, en concordancia con el control auditado del inglés POB, sin requerir notas textuales adicionales ni revisiones pendientes en este versículo.
  spanish_consistency_notes:
  - Se mantiene «Noé» con acento gráfico y los nombres propios bíblicos en su forma española usual.
  - 'Se conserva el orden narrativo del original: identificación de los hijos, procedencia desde el arca y cláusula genealógica final.'
  - No se introduce una nota sobre el arca porque la frase española integra naturalmente el valor de מִן הַתֵּבָה.
