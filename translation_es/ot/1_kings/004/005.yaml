translation:
  language: es
  text: Azarías hijo de Natán estaba a cargo de los gobernadores, y Zabud hijo de Natán era sacerdote[a] y amigo del rey.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O posiblemente 'ministro principal' o 'consejero real' para 'sacerdote' en este contexto de corte.
    reason: lexical_alternative
lexical_decisions:
- source_word: עֲזַרְיָהוּ
  english_pob_choice: Azariahu
  chosen_spanish: Azarías
  alternatives_spanish:
  - Azaríahu
  lexicon: nombre propio
  rationale: En español bíblico, la forma más reconocible y natural del nombre es Azarías. La forma hebrea más cercana, Azaríahu, se conserva como alternativa, pero el uso común y legible favorece Azarías.
- source_word: בֶן
  english_pob_choice: son of
  chosen_spanish: hijo de
  alternatives_spanish:
  - descendiente de
  lexicon: HALOT
  rationale: En listas genealógicas y administrativas, 'hijo de' reproduce con naturalidad la relación filial/identificadora del hebreo.
- source_word: עַל
  english_pob_choice: was over
  chosen_spanish: estaba sobre
  alternatives_spanish:
  - estaba a cargo de
  - supervisaba
  lexicon: HALOT
  rationale: La preposición indica autoridad o supervisión sobre funcionarios. 'Estaba sobre' mantiene esa relación formal con buena naturalidad en español; 'estaba a cargo de' es una alternativa explicativa.
- source_word: הַנִּצָּבִים
  english_pob_choice: the governors
  chosen_spanish: los gobernadores
  alternatives_spanish:
  - los oficiales
  - los prefectos
  - los administradores
  lexicon: HALOT
  rationale: En este contexto administrativo salomónico, 'gobernadores' comunica adecuadamente la función de supervisión regional o administrativa sin exceder la evidencia del texto.
- source_word: זָבוּד
  english_pob_choice: Zabud
  chosen_spanish: Zabud
  alternatives_spanish:
  - Zabúd
  lexicon: nombre propio
  rationale: Nombre propio transliterado; se conserva la forma tradicionalizada 'Zabud' por claridad y uso.
- source_word: כֹּהֵן
  english_pob_choice: priest
  chosen_spanish: sacerdote
  alternatives_spanish:
  - ministro principal
  - consejero real
  lexicon: HALOT
  rationale: El sentido básico de כֹּהֵן es 'sacerdote'. Aunque el contexto cortesano admite una posible lectura de alto funcionario, no se sustituye en el texto principal por un cargo interpretativo; esa tensión se preserva en nota.
- source_word: רֵעֶה הַמֶּלֶךְ
  english_pob_choice: the king’s friend
  chosen_spanish: amigo del rey
  alternatives_spanish:
  - amigo del rey
  - confidente del rey
  - compañero del rey
  lexicon: HALOT
  rationale: La expresión denota un vínculo cercano con el rey, más que una amistad informal moderna. 'Amigo del rey' conserva la literalidad y la carga idiomática del hebreo, sin convertirla en una paráfrasis.
theological_decisions:
- issue: Sentido de כֹּהֵן en un contexto cortesano-administrativo
  english_pob_reading: Rendered as 'priest' in the main text, with possible 'chief minister/royal adviser' nuance preserved in a footnote.
  chosen_spanish_reading: Se traduce 'sacerdote' en el texto principal, con la posible acepción de alto funcionario de corte preservada en nota.
  alternative_spanish_readings:
  - ministro principal
  - consejero real
  rationale: No hay razón doctrinal para desviar el sentido básico de la palabra. Dado que el contexto de la corte sugiere una posible función oficial más amplia, la alternativa se documenta sin reemplazar el término fuente.
  doctrine_reference: Philosophy §§1, 3, 5
translation_notes:
  revision_awareness: La revisión reciente del inglés cambió la puntuación para reflejar que ambos cargos pertenecen naturalmente a Zabud; por eso el español mantiene una sola coordinación con 'y' entre 'sacerdote' y 'amigo del rey', sin coma disyuntiva.
  spanish_consistency_notes:
  - Se preserva la secuencia de dos funcionarios con sus respectivos vínculos patronímicos.
  - '''Yahvé'' no aparece en este versículo.'
  - Se mantiene un estilo bíblico claro y contemporáneo, evitando calcos innecesarios.
  - La nota conserva la tensión léxica de כֹּהֵן en contexto cortesano sin sobreinterpretar el oficio.
