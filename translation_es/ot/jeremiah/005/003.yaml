revisions:
- from: Oh Yahvé[a], ¿acaso tus ojos no están sobre la fidelidad? Tú los golpeaste, pero no sintieron dolor; los consumiste, pero se negaron a aceptar disciplina. Endurecieron[b] su rostro más que la roca; se negaron a volver[c].
  to: Yahvé, ¿acaso tus ojos no están sobre la fidelidad? Tú los golpeaste, pero no sintieron dolor[a]; los consumiste, pero se negaron a aceptar disciplina. Hicieron sus rostros más duros que la roca; se negaron a volver[b].
  rationale: Se quitó la nota redundante sobre «Yahvé» y se eliminó la interjección «Oh» para un español más natural sin perder el vocativo. Se ajustó «Endurecieron su rostro más que la roca» a «Hicieron sus rostros más duros que la roca» para reflejar mejor el plural hebreo, el comparativo y la imagen idiomática. Se conservaron las decisiones clave de fidelidad, disciplina y volver/arrepetirse, y se mantuvo nota léxica sobre la ambigüedad de חָלוּ.
  reviewer_model: gpt-5.4
