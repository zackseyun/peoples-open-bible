base_translation:
  language: en
  yaml_path: translation/ot/numbers/031/003.yaml
  text: So Moses spoke to the people[a], saying, “Arm men from among you for the army, and let them be against Midian, to execute Yahweh’s vengeance on Midian.”
  footnotes:
