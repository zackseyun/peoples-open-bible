translation:
  language: es
  text: Y guarda el encargo de Yahvé, tu Dios, andando en sus caminos y guardando sus estatutos, sus mandamientos, sus juicios y sus testimonios, como está escrito en la Ley de Moisés, para que actúes con sabiduría en todo lo que hagas y adondequiera que te vuelvas.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: וְשָׁמַרְתָּ
  english_pob_choice: And keep
  chosen_spanish: Y guarda
  alternatives_spanish:
  - Y guardarás
  - Y observa
  lexicon: HALOT
  rationale: El perfecto exhortativo hebreo introduce una amonestación continua; en español, el imperativo comunica mejor la fuerza directiva. 'Guardar' conserva el sentido de observar fielmente una obligación del pacto.
- source_word: מִשְׁמֶרֶת
  english_pob_choice: the charge
  chosen_spanish: la carga
  alternatives_spanish:
  - el encargo
  - la obligación
  - lo que ha de guardarse
  lexicon: HALOT
  rationale: El sustantivo expresa una responsabilidad confiada o encomendada. 'Carga' es una solución menos idiomática que 'encargo', pero permite conservar la idea de deber confiado; aun así, en estilo bíblico castellano 'encargo' también sería viable. Aquí se privilegia la lectura de obligación confiada dentro del marco del pacto.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  lexicon: HALOT
  rationale: Se conserva el nombre divino revelado, conforme a la política del proyecto, sin sustituirlo por un título. 'Yahvé' es la forma establecida en el texto español del POB.
- source_word: אֱלֹהֶיךָ
  english_pob_choice: your God
  chosen_spanish: tu Dios
  alternatives_spanish:
  - tu Dios, el cual es
  lexicon: HALOT
  rationale: Corresponde directamente al posesivo de segunda persona singular en la fórmula de alianza.
- source_word: לָלֶכֶת בִּדְרָכָיו
  english_pob_choice: by walking in his ways
  chosen_spanish: andando en sus caminos
  alternatives_spanish:
  - para andar en sus caminos
  - siguiendo sus caminos
  lexicon: HALOT
  rationale: El infinitivo explica el modo de guardar la carga. 'Andando en sus caminos' preserva la metáfora hebrea y suena natural en español.
- source_word: לִשְׁמֹר
  english_pob_choice: and by keeping
  chosen_spanish: y guardando
  alternatives_spanish:
  - y para guardar
  - y observando
  lexicon: HALOT
  rationale: Mantiene la serie de infinitivos de medio o modo. 'Guardar' conserva la fuerza de obediencia vigilante del original.
- source_word: חֻקֹּתָיו
  english_pob_choice: his statutes
  chosen_spanish: sus estatutos
  alternatives_spanish:
  - sus decretos
  lexicon: HALOT
  rationale: '''Estatutos'' es el equivalente tradicional y preciso para חֻקִּים en listas legales del Pentateuco y la historia deuteronomista.'
- source_word: מִצְוֺתָיו
  english_pob_choice: his commandments
  chosen_spanish: sus mandamientos
  alternatives_spanish:
  - sus órdenes
  - sus preceptos
  lexicon: HALOT
  rationale: '''Mandamientos'' preserva la distinción léxica y el registro bíblico habitual.'
- source_word: מִשְׁפָּטָיו
  english_pob_choice: his judgments
  chosen_spanish: sus juicios
  alternatives_spanish:
  - sus ordenanzas
  - sus decisiones legales
  lexicon: HALOT
  rationale: '''Juicios'' refleja el campo semántico de decisiones legales o normas judiciales y distingue este término de ''estatutos'' y ''mandamientos''.'
- source_word: עֵדְוֺתָיו
  english_pob_choice: his testimonies
  chosen_spanish: sus testimonios
  alternatives_spanish:
  - sus testimonios de pacto
  - sus estipulaciones-testimonio
  lexicon: HALOT
  rationale: '''Testimonios'' conserva la nota de testimonio de pacto, reconocible en español bíblico y útil para mantener la diferencia con los otros términos legales.'
- source_word: כַּכָּתוּב
  english_pob_choice: as it is written
  chosen_spanish: como está escrito
  alternatives_spanish:
  - según está escrito
  - tal como está escrito
  lexicon: HALOT
  rationale: Es la traducción natural de la fórmula escritural que introduce la norma de la Torá.
- source_word: בְּתוֹרַת מֹשֶׁה
  english_pob_choice: in the Law of Moses
  chosen_spanish: en la Ley de Moisés
  alternatives_spanish:
  - en la instrucción de Moisés
  - en la ley de Moisés
  lexicon: HALOT
  rationale: '''Ley de Moisés'' es la forma establecida y clara para el corpus normativo mosaico en este contexto.'
- source_word: לְמַעַן תַּשְׂכִּיל
  english_pob_choice: so that you may act wisely
  chosen_spanish: para que actúes con sabiduría
  alternatives_spanish:
  - para que prosperes
  - para que procedas sabiamente
  lexicon: HALOT
  rationale: El hifil de שׂכל puede expresar actuar con prudencia/sabiduría o tener éxito por ello. En este contexto, la revisión inglesa prefirió 'act wisely'; en español, 'actúes con sabiduría' conserva mejor la idea de conducta sabia sin imponer la noción de prosperidad material.
- source_word: אֵת כָּל אֲשֶׁר תַּעֲשֶׂה
  english_pob_choice: in all that you do
  chosen_spanish: en todo lo que hagas
  alternatives_spanish:
  - en todo cuanto hagas
  - en todo lo que realices
  lexicon: HALOT
  rationale: Reproduce el alcance total del sintagma hebreo de manera idiomática y sobria.
- source_word: וְאֵת כָּל אֲשֶׁר תִּפְנֶה שָׁם
  english_pob_choice: and wherever you turn
  chosen_spanish: y adondequiera que te vuelvas
  alternatives_spanish:
  - y dondequiera que te vuelvas
  - y hacia dondequiera que te dirijas
  lexicon: HALOT
  rationale: '''Volverse'' conserva la imagen de orientarse o dirigirse hacia algún lado. Se evita reducir el hebreo a mera locomoción; la formulación mantiene el matiz direccional.'
theological_decisions:
- issue: Nombre divino יְהוָה en un mandato de alianza
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - Jehová
  rationale: El texto hebreo usa explícitamente el Tetragrámaton, y el proyecto pide preservarlo en español como nombre propio. 'Yahvé' mantiene esa decisión auditada y evita la sustitución por un título.
  doctrine_reference: 'DOCTRINE.md contested terms: יְהוָה / YHWH'
- issue: Sentido de לְמַעַן תַּשְׂכִּיל
  english_pob_reading: so that you may act wisely
  chosen_spanish_reading: para que actúes con sabiduría
  alternative_spanish_readings:
  - para que prosperes
  - para que tengas éxito
  rationale: La revisión inglesa corrigió de 'prosper' a 'act wisely'. En español, 'actúes con sabiduría' sigue esa corrección y evita cargar el verso con una lectura de prosperidad ajena al contexto de obediencia deuteronomista.
  doctrine_reference: 'Principio lexical-teológico: sabiduría práctica ligada a la fidelidad al pacto'
translation_notes:
  revision_awareness: 'La versión inglesa auditada pasó de ''prosper'' a ''act wisely'' tras revisión, y también consolidó ''Yahweh'' para el nombre divino. La redacción española refleja esa revisión: mantiene el nombre propio Yahvé y opta por una equivalencia que exprese conducta sabia en lugar de prosperidad material.'
  spanish_consistency_notes:
  - Se mantiene la serie legal tripartita/cuatripartita con estatutos, mandamientos, juicios y testimonios, sin fusionar términos.
  - 'Se conserva el paralelismo de medios mediante gerundios: andando... y guardando...'
  - Se evita 'SEÑOR' para no enmascarar el nombre divino.
  - '''Adondequiera que te vuelvas'' conserva la orientación direccional del hebreo final.'
