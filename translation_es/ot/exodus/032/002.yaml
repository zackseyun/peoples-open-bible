revisions:
- from: 'Y Aarón les dijo[a]: «Quítense los anillos de oro que están en las orejas de sus esposas, de sus hijos y de sus hijas, y tráiganmelos».'
  to: 'Y Aarón les dijo[a]: «Quítenles los anillos de oro que están en las orejas a sus esposas, a sus hijos varones y a sus hijas, y tráiganmelos».'
  rationale: Se cambia «Quítense» por «Quítenles» para reflejar correctamente que los destinatarios deben quitar los anillos de sus familiares, no de sí mismos. Se ajusta «sus hijos» a «sus hijos varones» para preservar el contraste explícito con «sus hijas» en el hebreo. La nota se corrige en paralelo para evitar la misma ambigüedad reflexiva.
