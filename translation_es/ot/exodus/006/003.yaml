    reason: alternative_reading
  - marker: b
    text: 'Hebreo: «El Shaddai»; tradicionalmente se traduce «Dios Todopoderoso».'
    reason: lexical_alternative
  revision_rationale: 'Se conserva el texto principal casi intacto porque representa aceptablemente el hebreo y la política terminológica del proyecto. Se corrigen las notas para alinearlas con la evidencia y con la auditoría inglesa: la alternativa interpretativa relevante se mueve a [a], y la nota léxica de El Shaddai queda como [b]. Se elimina la nota [c] por ser redundante y estar mal focalizada.'
