base_translation:
  language: en
  yaml_path: translation/ot/leviticus/020/019.yaml
  text: You shall not uncover the nakedness of your mother's sister or of your father's sister[a], for he has laid bare his own flesh[b]; they shall bear their iniquity.
  footnotes:
  - marker: a
    text: Or 'for he has exposed his close relative' / 'for he has laid bare his kin.' The Hebrew 'his own flesh' uses kinship language literally.
    reason: lexical_alternative
  - marker: b
    text: '''They shall bear their iniquity'' can also mean ''they shall bear their guilt'' or ''they shall bear the punishment for their iniquity.'''
    reason: lexical_alternative
