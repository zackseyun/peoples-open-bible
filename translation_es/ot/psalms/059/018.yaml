revisions:
- from: Oh mi fortaleza[a], a ti cantaré alabanzas, porque Dios es mi baluarte, el Dios de mi amor leal.
  to: Oh, fuerza mía, a ti cantaré alabanzas, porque Dios es mi baluarte, el Dios de mi amor fiel.[a]
