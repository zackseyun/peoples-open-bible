id: 1TH.3.11
reference: 1 Thessalonians 3:11
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: Αὐτὸς δὲ ὁ θεὸς καὶ πατὴρ ἡμῶν καὶ ὁ κύριος ἡμῶν ⸀Ἰησοῦς κατευθύναι τὴν ὁδὸν ἡμῶν πρὸς ὑμᾶς·
base_translation:
  language: en
  yaml_path: translation/nt/1_thessalonians/003/011.yaml
  text: Now may our God and Father himself[a], and our Lord Jesus[b], direct our way to you.
  footnotes:
  - marker: a
    text: 'Greek: ''may ... direct'' uses a singular verb with the coordinated subjects ''our God and Father'' and ''our Lord Jesus.'''
    reason: cross_reference
  - marker: b
    text: Or 'make straight our path to you.'
    reason: lexical_alternative
translation:
  language: ko
  text: 이제 우리의 하나님 아버지 친히와 우리 주 예수께서 우리의 길을[b] 여러분에게로 곧게 인도해 주시기를 빕니다[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 헬라어에서 「하나님 아버지」와 「주 예수」 두 주어가 단수 동사 하나로 묶여 있다.
    reason: cross_reference
  - marker: b
    text: 또는 「우리의 길을 곧게 펴 주시기를」.
    reason: lexical_alternative
lexical_decisions:
- source_word: Αὐτὸς ... ὁ θεὸς καὶ πατὴρ ἡμῶν
  english_pob_choice: our God and Father himself
  chosen_korean: 우리의 하나님 아버지 친히
  alternatives_korean:
  - 우리 하나님 아버지께서 친히
  - 우리의 하나님이자 아버지 자신께서
  lexicon: BDAG
  rationale: αὐτός의 강조를 「친히」로 살리고, 동격 「하나님—아버지」를 자연스러운 한국어로 묶는다.
- source_word: κατευθύναι τὴν ὁδὸν ἡμῶν
  english_pob_choice: direct our way
  chosen_korean: 우리의 길을 ... 곧게 인도해 주시기를
  alternatives_korean:
  - 우리의 길을 곧게 펴 주시기를
  - 우리의 발길을 인도해 주시기를
  lexicon: BDAG
  rationale: κατευθύνω의 「곧게 함·인도함」 두 의미를 함께 담는다. 「곧게 인도하다」가 자연스럽다.
- source_word: κατευθύναι (기원법)
  english_pob_choice: may ... direct
  chosen_korean: ... 빕니다
  alternatives_korean:
  - ... 기원합니다
  - ... 바랍니다
  lexicon: BDAG
  rationale: 기원법(optative)을 한국어 종결 「~ 빕니다」로 자연스럽게 옮긴다. 합쇼체 격식 유지.
theological_decisions:
- issue: 두 주어와 단수 동사의 신학적 함의
  chosen_reading: 본문 그대로 두 주어를 보존하고 단수 동사를 한국어 종결로 묶음
  alternative_readings:
  - 두 주어를 「하나님과 주 예수께서」로 묶어 표시
  rationale: 헬라어 본문은 「하나님 아버지」와 「주 예수」를 두 주어로 나란히 두면서도 단수 동사 하나로 묶는다. 본 번역은 본문의 두 주어 구조를 보존하고 각주로 동사 단수의 함의를 밝힌다. 특정 신학 체계로 좁히지 않는다.
  doctrine_reference: 'DOCTRINE.md: Preserve theological tension rather than resolve it'
