review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la lista territorial del hebreo: Galaad, el territorio asociado a Gesur y Maacá, todo el monte Hermón, todo Basán, hasta Salecá. Sin embargo, omite la nota léxica preservada en el rastro inglés sobre גְּבוּל como «territorio» frente a «frontera/borde», y además el español pluraliza los gentilicios («gesureos», «maacateos»), alejándose de la decisión documentada de conservar el singular gentilicio colectivo ligado a «territorio».'
  spanish_quality_summary: 'El español es claro y natural, pero puede afinarse para alinearse mejor con la lógica sintáctica del original y del POB: «el gesureo y el maacateo» suena algo inusual, pero es defendible en español bíblico si se conserva con una nota aclaratoria; alternativamente, se puede mantener un giro natural con nota. Dado el mandato de preservar la rationale documentada, conviene ajustar el texto para reflejar el singular colectivo. La nota actual sobre Hermón es buena, aunque puede pulirse levemente.'
  glossary_alignment: No hay términos teológicos mayores en juego. Los topónimos «Galaad», «Hermón», «Basán» y «Salecá» son adecuados. El punto clave de glosario/lexicografía es גְּבוּל = «territorio», con nota alternativa «frontera/borde», que debe preservarse también en español.
  issues:
  - severity: medium
    issue: Falta la nota léxica sobre «territorio»/«frontera» para גְּבוּל.
    rationale: El rastro inglés preserva explícitamente la alternativa «border» y explica por qué aquí significa «territory». La revisión española debe conservar esa información, especialmente porque en español «territorio» también implica una decisión interpretativa.
  - severity: medium
    issue: Los gentilicios «los gesureos y de los maacateos» no siguen la decisión documentada de reflejar el singular gentilicio colectivo del hebreo.
    rationale: El inglés auditado escogió «the Geshurite and the Maacathite» para conservar la forma hebrea. Aunque el plural suena más natural en español, aquí conviene priorizar la rationale documentada y sostenerla con una nota aclaratoria si hace falta.
  - severity: low
    issue: La nota de Hermón puede expresarse con estilo más natural en español.
    rationale: La nota actual es fiel, pero «macizo o región montañosa de Hermón» puede afinarse a «macizo o zona montañosa de Hermón» para mayor fluidez.
