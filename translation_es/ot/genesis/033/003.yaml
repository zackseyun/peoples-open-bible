translation:
  language: es
  text: Y él mismo iba delante de ellos y se inclinó a tierra siete veces[a], hasta que llegó cerca de su hermano.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «se postró»; el verbo hebreo puede denotar un acto completo de reverencia corporal.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהוּא
  english_pob_choice: And he himself
  chosen_spanish: Y él mismo
  alternatives_spanish:
  - Y él
  - Entonces él
  lexicon: HALOT
  rationale: El pronombre independiente añade énfasis; «él mismo» conserva la prominencia de la acción personal de Jacob sin volverla artificial en español.
- source_word: עָבַר לִפְנֵיהֶם
  english_pob_choice: went on ahead of them
  chosen_spanish: pasó delante de ellos
  alternatives_spanish:
  - iba delante de ellos
  - avanzó delante de ellos
  lexicon: HALOT
  rationale: En este contexto, el verbo expresa que Jacob tomó la delantera frente a su grupo. «Pasó delante de ellos» mantiene el orden y la relación espacial sin forzar un giro más interpretativo.
- source_word: וַיִּשְׁתַּחוּ
  english_pob_choice: bowed down
  chosen_spanish: se inclinó
  alternatives_spanish:
  - se postró
  - se prosternó
  lexicon: HALOT
  rationale: El verbo puede indicar una postración completa o un acto de homenaje. «Se inclinó» preserva la acción corporal sin especificar más de lo que el contexto exige; la nota a pie recoge la alternativa más fuerte.
- source_word: אַרְצָה
  english_pob_choice: to the ground
  chosen_spanish: hasta el suelo
  alternatives_spanish:
  - a tierra
  - hasta la tierra
  lexicon: HALOT
  rationale: La forma direccional señala movimiento hacia el suelo. «Hasta el suelo» comunica la imagen concreta de manera natural en español.
- source_word: שֶׁבַע פְּעָמִים
  english_pob_choice: seven times
  chosen_spanish: siete veces
  alternatives_spanish:
  - por siete ocasiones
  lexicon: HALOT
  rationale: Expresión numérica directa; se conserva sin paráfrasis.
- source_word: עַד גִּשְׁתּוֹ עַד אָחִיו
  english_pob_choice: until he came near to his brother
  chosen_spanish: hasta acercarse a su hermano
  alternatives_spanish:
  - hasta que se acercó a su hermano
  - hasta llegar junto a su hermano
  lexicon: HALOT
  rationale: La construcción de límite con infinitivo expresa la culminación del gesto repetido. «Hasta acercarse» mantiene el sentido de aproximación y evita separar indebidamente el segundo עַד.
translation_notes:
  revision_awareness: 'Se corrigió el problema de validación anterior: la marca de nota [a] ahora aparece exactamente en el texto español, anclada en la frase correspondiente.'
  spanish_consistency_notes:
  - Se prefirió «Yahvé» en este proyecto cuando aparezca el nombre divino, pero este versículo no lo contiene.
  - «Se inclinó» conserva la ambigüedad entre reverencia y postración plena, coherente con la nota lexical.
  - La puntuación y el orden de cláusulas siguen de cerca el hebreo y el inglés auditado, sin depender mecánicamente del inglés.
