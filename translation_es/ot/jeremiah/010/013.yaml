translation:
  language: es
  text: Al sonido de su voz, hay un estruendo de aguas en los cielos, y él hace subir nubes[a] desde los confines de la tierra; hace relámpagos para la lluvia, y saca el viento de sus almacenes.[b]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'vapores' o 'neblinas'.
    reason: lexical_alternative
  - marker: b
    text: O 'A la voz de su dar, hay una multitud de aguas en los cielos'; el hebreo es una expresión condensada y suele expresarse de manera más idiomática en español.
    reason: lexical_alternative
lexical_decisions:
- source_word: לְקוֹל
  english_pob_choice: At the sound of
  chosen_spanish: Al sonido de
  alternatives_spanish:
  - A la voz de
  - Cuando truena
  lexicon: HALOT
  rationale: לְקוֹל en este contexto funciona de manera circunstancial/temporal. En español, 'Al sonido de' conserva el sentido de percepción sonora y evita una calca rígida.
- source_word: תִּתּוֹ
  english_pob_choice: his voice
  chosen_spanish: su voz
  alternatives_spanish:
  - su dar
  - su acción de dar
  lexicon: HALOT
  rationale: El hebreo procede de נתן ('dar'), pero la expresión idiomática se entiende en conjunto como 'el sonido de su voz'. 'Su voz' mantiene el efecto antropomórfico y la fluidez natural del español.
- source_word: הֲמוֹן מַיִם
  english_pob_choice: a roar of waters
  chosen_spanish: un estruendo de aguas
  alternatives_spanish:
  - un tumulto de aguas
  - un abundancia de aguas
  lexicon: HALOT
  rationale: הֲמוֹן puede denotar ruido, tumulto o abundancia. En este marco de tormenta, el valor acústico es principal; 'estruendo' conserva la fuerza sonora del hebreo.
- source_word: בַּשָּׁמַיִם
  english_pob_choice: in the heavens
  chosen_spanish: en los cielos
  alternatives_spanish:
  - en el cielo
  - en los cielos
  lexicon: HALOT
  rationale: '''Cielos'' preserva el registro elevado y el plural hebreo. También funciona bien en español bíblico sin ocultar la imaginería cósmica.'
- source_word: וַיַּעֲלֶה
  english_pob_choice: he makes ... rise
  chosen_spanish: hace subir
  alternatives_spanish:
  - hace ascender
  - causa que suban
  lexicon: HALOT
  rationale: El hifil es causativo. 'Hace subir' es natural en español y conserva la idea de acción divina eficaz.
- source_word: נְשִׂאִים
  english_pob_choice: clouds
  chosen_spanish: nubes
  alternatives_spanish:
  - vapores
  - neblinas
  lexicon: HALOT
  rationale: En contexto meteorológico, el término apunta a masas nubosas o vaporosas. 'Nubes' es la opción más clara y readable para el español moderno.
- source_word: מִקְצֵה אֶרֶץ
  english_pob_choice: from the ends of the earth
  chosen_spanish: desde los confines de la tierra
  alternatives_spanish:
  - desde los extremos de la tierra
  - desde el otro extremo de la tierra
  lexicon: HALOT
  rationale: La frase es un idiomático de alcance lejano. 'Confines de la tierra' preserva el tono bíblico sin perder inteligibilidad.
- source_word: בְּרָקִים לַמָּטָר עָשָׂה
  english_pob_choice: he makes lightning for the rain
  chosen_spanish: hace relámpagos para la lluvia
  alternatives_spanish:
  - hace relámpagos con la lluvia
  - hace rayos para la lluvia
  lexicon: HALOT
  rationale: El hebreo une fenómenos de tormenta con una preposición final/relacional. 'Para la lluvia' reproduce esa relación sin forzar una explicación meteorológica más precisa de lo que el texto exige.
- source_word: וַיּוֹצֵא רוּחַ
  english_pob_choice: and brings out the wind
  chosen_spanish: y saca el viento
  alternatives_spanish:
  - y trae el viento
  - y hace salir el viento
  lexicon: HALOT
  rationale: רוּחַ aquí es claramente 'viento' por el contexto. 'Saca' refleja bien el movimiento desde un lugar de reserva.
- source_word: מֵאֹצְרֹתָיו
  english_pob_choice: from his storehouses
  chosen_spanish: de sus depósitos
  alternatives_spanish:
  - de sus almacenes
  - de sus tesoros
  lexicon: HALOT
  rationale: אֹצָר puede ser tesoro, depósito o almacén. En lenguaje español actual, 'depósitos' comunica la imagen de reservas celestiales sin sonar excesivamente arcaico.
theological_decisions:
- issue: Lenguaje de teofanía y agencia divina personal
  english_pob_reading: Retain personal divine agency throughout ('his voice,' 'he makes,' 'brings out')
  chosen_spanish_reading: 'Mantener la agencia personal de Dios en toda la línea: ''su voz'', ''hace subir'', ''hace relámpagos'', ''saca el viento''.'
  alternative_spanish_readings:
  - Describir solo el fenómeno meteorológico sin sujeto divino explícito
  - Usar una formulación impersonal
  rationale: El verso atribuye directamente a Dios el dominio sobre la tormenta. El español conserva esa afirmación teológica sin diluirla en descripción naturalista.
  doctrine_reference: Providencia divina / teofanía en la poesía profética
translation_notes:
  revision_awareness: La versión en inglés POB ya opta por una equivalencia óptima con fuerte preservación de la imagen meteorológica y de la agencia divina; esta propuesta española sigue esa línea, manteniendo el paralelismo y las decisiones léxicas principales sin introducir reinterpretaciones. No se documentan revisiones posteriores en el paquete, y el dictamen de control cruzado indica alto acuerdo.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' no requerido aquí porque el versículo usa referencia pronominal.
  - '''Cielos'' y ''confines de la tierra'' conservan el registro poético bíblico.'
  - '''Relámpagos'' se usa para ברקים por claridad natural en español, sin desplazar el sentido de fenómenos eléctricos de tormenta.'
  - '''Depósitos'' traduce el sentido de almacén/reserva de אֹצְרֹתָיו y evita una espiritualización innecesaria.'
