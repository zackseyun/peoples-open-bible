translation:
  language: es
  text: Su ofrenda fue un plato de plata[a], que pesaba ciento treinta siclos, un tazón de plata[b] de setenta siclos, según el siclo del santuario[c]; ambos estaban llenos de flor de harina mezclada con aceite para ofrenda vegetal.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O también «una fuente de plata»; קַעֲרָה puede designar un recipiente poco profundo.
    reason: lexical_alternative
  - marker: b
    text: O también «un cuenco de plata»; מִזְרָק es un vaso ritual para uso cultual.
    reason: lexical_alternative
  - marker: c
    text: Es decir, según el peso estándar del santuario.
    reason: cultural_note
lexical_decisions:
- source_word: קָרְבָּנוֹ
  english_pob_choice: His offering was
  chosen_spanish: Su ofrenda fue
  alternatives_spanish:
  - Su regalo fue
  - Su ofrenda
  lexicon: HALOT
  rationale: קָרְבָּן designa una ofrenda presentada en contexto cultual. «Ofrenda» conserva el sentido sacrificial y es natural en español; se añadió «fue» para mantener el estilo inventarial del hebreo y del inglés POB.
- source_word: קַעֲרַת כֶּסֶף אַחַת
  english_pob_choice: one silver plate
  chosen_spanish: un plato de plata
  alternatives_spanish:
  - una fuente de plata
  - un plato/una bandeja de plata
  lexicon: HALOT
  rationale: קַעֲרָה puede referirse a un recipiente poco profundo, como plato, fuente o bandeja. «Plato de plata» sigue la decisión inglesa de «plate» y es claro para el lector español; la nota recoge la alternativa lexical válida.
- source_word: שְׁלֹשִׁים וּמֵאָה מִשְׁקָלָהּ
  english_pob_choice: its weight one hundred thirty shekels
  chosen_spanish: de peso de ciento treinta siclos
  alternatives_spanish:
  - que pesaba ciento treinta siclos
  - su peso era de ciento treinta siclos
  lexicon: HALOT
  rationale: El hebreo expresa literalmente «ciento treinta, su peso». «De peso de ciento treinta siclos» mantiene la estructura nominal de inventario y conserva la medida sin forzar una paráfrasis excesiva.
- source_word: מִזְרָק אֶחָד כֶּסֶף
  english_pob_choice: one silver basin
  chosen_spanish: una palangana de plata
  alternatives_spanish:
  - un cuenco de plata
  - una vasija de plata
  lexicon: HALOT
  rationale: מִזְרָק es un recipiente usado en contexto ritual; «palangana» aproxima su forma funcional y distingue este vaso del plato. La alternativa «cuenco» queda documentada por si se prefiere una equivalencia más general.
- source_word: שִׁבְעִים שֶׁקֶל
  english_pob_choice: of seventy shekels
  chosen_spanish: de setenta siclos
  alternatives_spanish:
  - de peso de setenta siclos
  - que pesaba setenta siclos
  lexicon: HALOT
  rationale: Se conserva la misma construcción breve del hebreo, aplicada al segundo recipiente. «Siclos» traduce la unidad monetario-pesada de forma estable y legible en español bíblico.
- source_word: בְּשֶׁקֶל הַקֹּדֶשׁ
  english_pob_choice: according to the shekel of the sanctuary
  chosen_spanish: según el siclo del santuario
  alternatives_spanish:
  - conforme al siclo del santuario
  - según la norma de peso del santuario
  lexicon: HALOT
  rationale: La frase indica el estándar de peso del santuario. «Según el siclo del santuario» conserva la forma del original; la nota aclara que se trata de una medida patrón, no de una moneda distinta.
- source_word: שְׁנֵיהֶם
  english_pob_choice: both of them
  chosen_spanish: ambos
  alternatives_spanish:
  - los dos
  - ambos recipientes
  lexicon: HALOT
  rationale: El pronombre dual se refiere a los dos vasos. «Ambos» es conciso y suficientemente claro en español en este contexto inventarial.
- source_word: מְלֵאִים
  english_pob_choice: were full of
  chosen_spanish: estaban llenos de
  alternatives_spanish:
  - eran llenos de
  - se hallaban llenos de
  lexicon: HALOT
  rationale: El predicado hebreo se vierte naturalmente con una cópula en español. «Estaban llenos de» conserva el estado resultante sin añadir matices interpretativos.
- source_word: סֹלֶת
  english_pob_choice: fine flour
  chosen_spanish: flor de harina
  alternatives_spanish:
  - harina fina
  - harina selecta
  lexicon: HALOT
  rationale: «Flor de harina» es la equivalencia bíblica tradicional y exacta para סֹלֶת. Aunque la expresión no es literal en sentido moderno, transmite con precisión la harina refinada usada en ofrendas.
- source_word: בְּלוּלָה בַשֶּׁמֶן
  english_pob_choice: mixed with oil
  chosen_spanish: mezclada con aceite
  alternatives_spanish:
  - meneada con aceite
  - amasada con aceite
  lexicon: HALOT
  rationale: El participio pasivo indica harina preparada mediante mezcla con aceite. «Mezclada con aceite» es natural y fiel; evita términos menos comunes sin perder la imagen de preparación ritual.
- source_word: לְמִנְחָה
  english_pob_choice: for a grain offering
  chosen_spanish: para ofrenda vegetal
  alternatives_spanish:
  - para ofrenda de cereal
  - para una ofrenda de grano
  lexicon: HALOT
  rationale: En contexto sacerdotal, מִנְחָה es la ofrenda vegetal o de cereal. «Ofrenda vegetal» conserva la categoría cultual y evita el equívoco de «ofrenda» genérica; se ofrece la alternativa «de cereal» por claridad para lectores que prefieran una glosa más explícita.
theological_decisions:
- issue: Naturaleza de מִנְחָה en contexto sacrificial
  english_pob_reading: for a grain offering
  chosen_spanish_reading: para ofrenda vegetal
  alternative_spanish_readings:
  - para ofrenda de cereal
  - para una ofrenda
  rationale: El contexto de Números 7 es una lista cultual; la mִנְחָה no es una ofrenda cualquiera, sino la ofrenda vegetal de harina y aceite. «Ofrenda vegetal» preserva la distinción teológica y ritual que la POB inglesa marcó con «grain offering».
  doctrine_reference: Éxodo 29; Levítico 2; Números 7
translation_notes:
  revision_awareness: 'Se respetó la revisión inglesa que suavizó la fórmula de medida a «according to the shekel of the sanctuary»; en español se mantuvo «según el siclo del santuario», que comunica con naturalidad el mismo estándar sin perder la referencia cultual. También se preservó la estructura inventarial del hebreo: dos vasos, sus materiales, pesos y contenido.'
  spanish_consistency_notes:
  - Se usó «Yahvé» solo cuando el texto lo requiriera; este versículo no lo contiene.
  - Se mantuvo «siclo» como unidad de peso en coherencia con el inventario bíblico.
  - «Ofrenda vegetal» se empleó para מִנְחָה en continuidad con la terminología cultual del proyecto.
  - Se eligió «plato» y «palangana» para distinguir los dos recipientes sin forzar una identificación más precisa que la que permite el hebreo.
