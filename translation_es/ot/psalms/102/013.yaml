translation:
  language: es
  text: Pero tú, oh Yahvé, te sientas entronizado[a] para siempre, y tu recuerdo[b] es de generación en generación.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «te sientas para siempre». El verbo hebreo literalmente significa «sentarse» y también puede llevar el sentido de estar entronizado en contextos reales.
    reason: lexical_alternative
  - marker: b
    text: O «tu memorial» o «tu renombre». El sustantivo hebreo puede referirse al recuerdo, al memorial conmemorativo o a la fama perdurable.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְאַתָּה
  english_pob_choice: But you
  chosen_spanish: Pero tú
  alternatives_spanish:
  - Y tú
  lexicon: HALOT
  rationale: La partícula וְ con el pronombre independiente expresa contraste fuerte con la fragilidad humana del contexto previo. En español, «Pero tú» comunica mejor ese giro adversativo que un simple «Y tú».
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  - el SEÑOR
  lexicon: HALOT
  rationale: Se conserva el nombre divino propio del Tetragrámaton, conforme al criterio del proyecto. «Yahvé» es la forma española establecida aquí para evitar la sustitución por un título.
- source_word: לְעוֹלָם
  english_pob_choice: forever
  chosen_spanish: para siempre
  alternatives_spanish:
  - para siempre, por la eternidad
  lexicon: HALOT
  rationale: El valor es duración sin límite. «Para siempre» es natural en español bíblico moderno y comunica bien la permanencia indefinida.
- source_word: תֵּשֵׁב
  english_pob_choice: sit enthroned
  chosen_spanish: estás sentado
  alternatives_spanish:
  - te sientas entronizado
  - permaneces sentado
  lexicon: HALOT
  rationale: El verbo básico es «sentarse / estar sentado». En español, «estás sentado» conserva el sentido literal y deja visible la posible lectura de entronización sin imponer una paráfrasis más fuerte que el hebreo en esta línea.
- source_word: וְזִכְרְךָ
  english_pob_choice: your remembrance
  chosen_spanish: tu recuerdo
  alternatives_spanish:
  - tu memorial
  - tu fama
  - tu renombre
  lexicon: HALOT
  rationale: זֵכֶר / זִכְר puede abarcar recuerdo, memorial o renombre. «Tu recuerdo» preserva la amplitud semántica y funciona bien en paralelo con la permanencia divina.
- source_word: לְדֹר וָדֹר
  english_pob_choice: from generation to generation
  chosen_spanish: de generación en generación
  alternatives_spanish:
  - para generación y generación
  - de una generación a otra
  lexicon: HALOT
  rationale: La expresión idiomática se reproduce con la forma española establecida y natural, manteniendo el sentido distributivo y continuo del hebreo.
theological_decisions:
- issue: Cómo reflejar la posible entronización implícita en תֵּשֵׁב sin sobretraducir
  english_pob_reading: sit enthroned forever
  chosen_spanish_reading: estás sentado para siempre
  alternative_spanish_readings:
  - estás entronizado para siempre
  - reinas para siempre
  rationale: La POB inglesa opta por explicitar el matiz real de ישב en contexto divino, pero el hebreo dice literalmente «sentarse». En español, «estás sentado» preserva la base textual y evita imponer una lectura más interpretativa; el lector sigue percibiendo la permanencia soberana por el contexto y la continuidad con «para siempre».
  doctrine_reference: Salmo poético sobre la permanencia soberana de Yahvé; principio de equivalencia óptima y control de sobreexplicación.
- issue: Cómo traducir זֵכֶר en un paralelismo que puede significar recuerdo, memorial o renombre
  english_pob_reading: your remembrance
  chosen_spanish_reading: tu recuerdo
  alternative_spanish_readings:
  - tu memorial
  - tu renombre
  - tu fama
  rationale: El audit trail inglés reconoce varias posibilidades. «Tu recuerdo» mantiene la referencia al campo semántico de memoria/recordación sin forzar «memorial» ni «renombre», que introducen un matiz más específico que el texto no exige aquí.
  doctrine_reference: Poética hebrea y polisemia léxica; preservación de alternativas sin borrar la tensión semántica.
translation_notes:
  revision_awareness: La versión inglesa más reciente cambió «endures from generation to generation» por «is from generation to generation» para acercarse más al hebreo. Esta versión española sigue esa misma cautela y evita añadir un verbo interpretativo como «perdura» o «permanece» en la segunda cola, usando la construcción simple «es de generación en generación» en un marco poético más natural con «tu recuerdo».
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como forma española del Tetragrámaton, en continuidad con el criterio del proyecto.
  - Se evita «SEÑOR» como sustituto del nombre divino para no perder la referencia nominal explícita.
  - «Para siempre» y «de generación en generación» conservan el tono poético y la extensión temporal del hebreo sin arcaizar en exceso.
  - La elección de «estás sentado» deja abierta la lectura de entronización, que puede explicitarse en nota sin invadir el texto principal.
  - «Tu recuerdo» conserva la polisemia de זֵכֶר mejor que una opción más cerrada como «tu fama» o «tu memorial».
