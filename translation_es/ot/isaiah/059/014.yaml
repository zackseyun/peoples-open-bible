review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura y el sentido general del hebreo: משפט / צדקה se distinguen adecuadamente, מֵרָחוֹק תעמד se expresa con distancia mantenida, y לא תוכל לבוא se conserva como exclusión. Sin embargo, hay dos desajustes con la pista auditada: la nota [a] está anclada en el lugar equivocado y da una alternativa para הֻסַּג en vez de preservar la alternativa inglesa sobre כָשְׁלָה + בָרְחוֹב; además, «honradez» para נְכֹחָה estrecha demasiado el campo semántico de ‘uprightness/what is right’.'
  spanish_quality_summary: El español es legible y natural, pero «es echada atrás» suena menos idiomático y más tosco que «es hecha retroceder» o «es rechazada». «La rectitud queda lejos» funciona, y «la verdad tropieza en la calle» es clara. Para mantener la personificación abstracta del verso, «la rectitud» encaja mejor que «la honradez» en la última cláusula.
  glossary_alignment: No hay conflicto con la terminología troncal del proyecto. La distinción conceptual entre «justicia» y «rectitud» sigue la decisión POB para מִשְׁפָּט / צְדָקָה. Conviene también usar «rectitud» para נְכֹחָה, porque corresponde mejor al valor de ‘uprightness/what is right’ que «honradez», que en español sugiere más específicamente honestidad personal.
  issues:
  - severity: high
    issue: Las notas al pie no corresponden a las alternativas auditadas en inglés.
    rationale: 'El English POB tiene dos alternativas: una para «has stumbled in the street» → «has fallen in the public square», y otra para נְכֹחָה → «what is right». El borrador, en cambio, pone [a] sobre «es echada atrás» con una alternativa de הֻסַּג, y [b] solo cubre «plaza pública». Esto altera la evidencia documentada y ancla mal las notas.'
  - severity: medium
    issue: «Honradez» no preserva bien el campo semántico de נְכֹחָה.
    rationale: נְכֹחָה denota rectitud, lo recto, lo correcto, no solo honradez. «Honradez» reduce la abstracción personificada a una virtud de honestidad personal y se aparta de la decisión inglesa «uprightness» con alternativa «what is right».
  - severity: low
    issue: «Es echada atrás» es menos natural en español bíblico contemporáneo.
    rationale: Aunque no es incorrecto, suena algo forzado. «Es hecha retroceder» expresa mejor el pasivo de הֻסַּג + אָחוֹר y mantiene la imagen de retroceso sin dureza innecesaria.
  revised_spanish_text: La justicia es hecha retroceder, y la rectitud queda lejos; porque la verdad tropieza en la calle[a], y la rectitud no puede entrar[b].
  revised_footnotes:
  - marker: a
    text: 'O: «la verdad ha caído en la plaza pública».'
    reason: lexical_alternative
  - marker: b
    text: 'O: «lo recto no puede entrar».'
    reason: lexical_alternative
