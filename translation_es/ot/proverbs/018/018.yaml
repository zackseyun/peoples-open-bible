  glossary_alignment: No hay conflicto con la terminología base del proyecto. «La suerte» es una buena equivalencia contextual para הַגּוֹרָל en español bíblico. «Los poderosos» representa bien עֲצוּמִים. No se observan problemas terminológicos teológicos.
