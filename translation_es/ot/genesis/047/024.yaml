translation:
  language: es
  text: 'Y en la cosecha,[a] darán una quinta parte a Faraón, y cuatro partes serán para ustedes: para semilla para el campo, para su alimento, para los que están en sus casas, y para alimento de sus pequeños.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «y cuatro manos»; un giro idiomático que significa las cuatro porciones restantes, es decir, cuatro quintas partes.'
    reason: lexical_alternative
lexical_decisions:
- source_word: בַּתְּבוּאֹת
  english_pob_choice: at the harvest
  chosen_spanish: en la cosecha
  alternatives_spanish:
  - al tiempo de la cosecha
  - en la recolección
  lexicon: HALOT
  rationale: תְּבוּאָה se refiere al producto/cosecha. En este marco administrativo, el sentido temporal de la recolección se comunica de forma natural con «en la cosecha» sin volver el texto forzado.
- source_word: וּנְתַתֶּם חֲמִישִׁית לְפַרְעֹה
  english_pob_choice: you shall give a fifth to Pharaoh
  chosen_spanish: darán una quinta parte a Faraón
  alternatives_spanish:
  - deberán dar una quinta parte a Faraón
  - entregarán una quinta parte a Faraón
  lexicon: HALOT
  rationale: חֲמִישִׁית expresa una quinta parte. En español, «una quinta parte» conserva la medida y suena natural. El verbo en futuro mantiene el valor directivo del hebreo en este contexto legal.
- source_word: וְאַרְבַּע הַיָּדֹת
  english_pob_choice: four parts
  chosen_spanish: cuatro partes
  alternatives_spanish:
  - cuatro porciones
  - las cuatro partes
  lexicon: HALOT
  rationale: El hebreo dice literalmente «cuatro manos», un giro idiomático que señala las cuatro porciones restantes. Seguir el sentido con «cuatro partes» evita una literalidad opaca y preserva la distribución de cinco partes.
- source_word: יִהְיֶה לָכֶם
  english_pob_choice: shall be yours
  chosen_spanish: serán para ustedes
  alternatives_spanish:
  - les pertenecerán
  - les corresponderán
  lexicon: HALOT
  rationale: La idea es de asignación/posesión de lo restante. «Serán para ustedes» es claro y conserva el valor distributivo sin añadir matices ajenos.
- source_word: לְזֶרַע הַשָּׂדֶה
  english_pob_choice: for seed of the field
  chosen_spanish: para semilla del campo
  alternatives_spanish:
  - para semilla para el campo
  - para sembrar el campo
  lexicon: HALOT
  rationale: La expresión apunta al grano reservado para la siembra futura. «Semilla del campo» sigue de cerca la estructura hebrea y mantiene el referente agrícola.
- source_word: וּלְאָכְלְכֶם
  english_pob_choice: for your food
  chosen_spanish: para su alimento
  alternatives_spanish:
  - para comer
  - para su comida
  lexicon: HALOT
  rationale: El sustantivo verbal de אכל funciona aquí como provisión para comer. «Para su alimento» es idiomático en español y conserva la función de sustento.
- source_word: וְלַאֲשֶׁר בְּבָתֵּיכֶם
  english_pob_choice: for those in your households
  chosen_spanish: para los de sus casas
  alternatives_spanish:
  - para los que están en sus casas
  - para los miembros de sus casas
  lexicon: HALOT
  rationale: La frase relativa no se refiere a objetos de la casa, sino a las personas que pertenecen al ámbito doméstico. «Los de sus casas» es breve y natural en español, sin perder el sentido de grupo familiar/hogar.
- source_word: וְלֶאֱכֹל לְטַפְּכֶם
  english_pob_choice: and for food for your little ones
  chosen_spanish: y para alimento de sus pequeños
  alternatives_spanish:
  - y para que coman sus pequeños
  - y para alimentar a sus pequeños
  lexicon: HALOT
  rationale: טַף suele referirse a niños pequeños o dependientes. «Sus pequeños» preserva el tono familiar y la referencia a los menores, mientras «para alimento de» refleja la construcción hebrea de provisión para comer.
translation_notes:
  revision_awareness: 'La redacción española sigue la revisión más reciente del contexto inglés: se prefiere «cuatro partes» en vez de «cuatro quintas partes» para no introducir explícitamente una fracción que el hebreo expresa de modo idiomático, y se conserva la equivalencia cercana de «seed of the field» como «semilla del campo».'
  spanish_consistency_notes:
  - Se mantiene «Faraón» como nombre propio histórico, conforme al uso del contexto.
  - Se evita «SEÑOR» o cualquier sustitución teológica innecesaria, porque el versículo no contiene el nombre divino.
  - «Pequeños» reproduce con dignidad el matiz de טַף sin forzar «niños» si el contexto incluye dependientes además de menores.
