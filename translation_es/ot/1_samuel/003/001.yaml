translation:
  language: es
  text: Ahora el muchacho Samuel estaba ministrando a Yahvé delante de Elí,[a] y la palabra de Yahvé era rara en aquellos días; las visiones no eran frecuentes.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: "no había visión frecuente" o "la visión no irrumpía / no se difundía". La expresión hebrea es idiomática y comunica que las visiones reveladoras eran infrecuentes, no ampliamente manifiestas.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְ/הַ/נַּעַר
  english_pob_choice: Now the boy
  chosen_spanish: Y el joven Samuel
  alternatives_spanish:
  - Y el muchacho Samuel
  - Ahora el joven Samuel
  lexicon: HALOT
  rationale: הַנַּעַר describe a Samuel todavía en etapa juvenil. En español, 'joven' mantiene la referencia de edad sin sonar infantil de más; se conservó el nombre propio para naturalidad narrativa. Se omitió un equivalente explícito de 'Now' porque el valor discursivo de waw se integra bien con la coordinación española.
- source_word: מְשָׁרֵת
  english_pob_choice: was ministering
  chosen_spanish: estaba ministrando
  alternatives_spanish:
  - estaba sirviendo
  - ministraba
  lexicon: HALOT
  rationale: El participio expresa acción continua. 'Ministrando' preserva el matiz cultual/religioso que el inglés POB quiso retener; 'sirviendo' sería más general y menos marcado en contexto del santuario.
- source_word: אֶת יְהוָה
  english_pob_choice: to Yahweh
  chosen_spanish: a Yahvé
  alternatives_spanish:
  - a Yahvé Dios
  - delante de Yahvé
  lexicon: HALOT
  rationale: El objeto directo con מְשָׁרֵת se expresa naturalmente en español con 'a'. Se mantiene 'Yahvé' según la norma del proyecto para el Tetragrámaton, evitando el disfraz litúrgico 'SEÑOR'.
- source_word: לִפְנֵי עֵלִי
  english_pob_choice: before Eli
  chosen_spanish: delante de Elí
  alternatives_spanish:
  - en presencia de Elí
  - ante Elí
  lexicon: HALOT
  rationale: לִפְנֵי literalmente es 'delante de / en presencia de'. 'Delante de Elí' conserva la imagen espacial y puede implicar la supervisión de Elí sin explicitarla más de lo que el hebreo dice.
- source_word: וּ/דְבַר יְהוָה
  english_pob_choice: and the word of Yahweh
  chosen_spanish: y la palabra de Yahvé
  alternatives_spanish:
  - y la palabra de Yahvé
  - y la palabra de Yahvé
  lexicon: HALOT
  rationale: Se mantiene la construcción de posesión mediante 'de Yahvé', que es idiomática y transparente en español, y conserva el lenguaje revelacional del texto.
- source_word: יָקָר
  english_pob_choice: was rare
  chosen_spanish: era rara
  alternatives_spanish:
  - era preciosa
  - era escasa
  lexicon: HALOT
  rationale: En este contexto, יָקָר no comunica valor afectivo sino escasez/infrecuencia de la palabra revelada. 'Era rara' reproduce esa tensión semántica con claridad, sin pasar a una paráfrasis explicativa.
- source_word: בַּ/יָּמִ֣ים הָ/הֵ֔ם
  english_pob_choice: in those days
  chosen_spanish: en aquellos días
  alternatives_spanish:
  - en esos días
  - durante aquellos días
  lexicon: HALOT
  rationale: Equivalente temporal natural y solemne en español bíblico moderno.
- source_word: אֵין חָזוֹן נִפְרָץ
  english_pob_choice: visions were not widespread
  chosen_spanish: no había visión extendida
  alternatives_spanish:
  - las visiones no eran frecuentes
  - no se difundía la visión
  lexicon: HALOT
  rationale: La expresión idiomática hebrea combina negación de presencia y la idea de 'romperse/expandirse'. 'No había visión extendida' intenta conservar la tensión literal de נִפְרָץ ('extendida/abierta/expandida') sin borrar la dificultad del hebreo; las alternativas explicitan el sentido contextual de escasez revelacional.
theological_decisions:
- issue: Renderización del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: El proyecto establece 'Yahvé' como forma principal para el Tetragrámaton. Se evita 'SEÑOR' por ser una convención de ocultamiento, no una transliteración auditable, y 'Jehová' no se adopta por no corresponder al estándar del proyecto.
  doctrine_reference: 'DOCTRINE.md: contested terms — יְהוָה / YHWH'
- issue: Valor de אֵין חָזוֹן נִפְרָץ
  english_pob_reading: visions were not widespread
  chosen_spanish_reading: no había visión extendida
  alternative_spanish_readings:
  - las visiones no eran frecuentes
  - no se abría la visión
  rationale: 'Se preserva la ambigüedad idiomática del hebreo: no se trata solo de ''pocas visiones'', sino de la falta de una revelación abierta o difundida. La formulación española mantiene esa tensión sin convertirla en glosa interpretativa.'
  doctrine_reference: Notas lexicográficas del POB sobre חָזוֹן / נִפְרָץ
translation_notes:
  revision_awareness: 'Coincide con la última revisión del inglés POB: no se introducen cambios doctrinales ni textuales adicionales. La traducción española sigue la misma decisión central sobre la escasez de visión reveladora y el uso del nombre divino.'
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' de forma consistente con la política del proyecto para יְהוָה.
  - '''Ministrando'' conserva el matiz cultual que el inglés POB señaló; no se rebaja a un servicio genérico.'
  - La última cláusula conserva una cierta extrañeza controlada para no borrar la tensión del hebreo sobre חָזוֹן נִפְרָץ.
  - La puntuación separa los dos miembros principales del versículo de manera legible en español moderno.
