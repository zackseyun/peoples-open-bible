translation:
  language: es
  text: «Si este asunto ha venido de parte de mi señor el rey[a], ¿no has dado a conocer a tus siervos quién se sentará en el trono de mi señor el rey después de él?»
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «este hecho» o «esta materia».'
    reason: lexical_alternative
lexical_decisions:
- source_word: אִם
  english_pob_choice: If
  chosen_spanish: Si
  alternatives_spanish:
  - Si es que
  - Acaso si
  lexicon: HALOT
  rationale: Introduce la protasis condicional o retórica con una forma natural en español sin añadir interpretación extra.
- source_word: מֵאֵת
  english_pob_choice: has come from
  chosen_spanish: ha venido de parte de
  alternatives_spanish:
  - ha venido de
  - proviene de
  lexicon: HALOT
  rationale: Mantiene la idea de procedencia o autorización vinculada al rey; «de parte de» comunica bien la fuente/origen en registro cortesano.
- source_word: אֲדֹנִי הַמֶּלֶךְ
  english_pob_choice: my lord the king
  chosen_spanish: mi señor el rey
  alternatives_spanish:
  - mi señor, el rey
  - mi amo el rey
  lexicon: HALOT
  rationale: Conserva el tratamiento deferente de corte; «señor» es más natural que «amo» en español para el protocolo real, sin perder la reverencia.
- source_word: נִהְיָה
  english_pob_choice: has come
  chosen_spanish: ha venido
  alternatives_spanish:
  - ha sucedido
  - ha llegado a ser
  lexicon: HALOT
  rationale: En combinación con מֵאֵת expresa que el asunto procede del rey; «ha venido» mantiene esa relación de origen sin forzar un significado causal diferente.
- source_word: הַדָּבָר הַזֶּה
  english_pob_choice: this thing
  chosen_spanish: este asunto
  alternatives_spanish:
  - esta cosa
  - este hecho
  - este asunto / esta materia
  lexicon: HALOT
  rationale: «Asunto» suena más natural en español y conserva la amplitud semántica de דבר en este contexto de decisión/acción real.
- source_word: וְלֹא הוֹדַעְתָּ
  english_pob_choice: have you not made known
  chosen_spanish: ¿no has dado a conocer
  alternatives_spanish:
  - ¿no has informado
  - ¿no lo has comunicado
  lexicon: HALOT
  rationale: El hifil de ידע tiene valor de hacer saber/informar; «dar a conocer» conserva el matiz formal y retórico de la pregunta.
- source_word: עֲבָדֶיךָ
  english_pob_choice: your servants
  chosen_spanish: tus siervos
  alternatives_spanish:
  - tus servidores
  - tus esclavos
  lexicon: HALOT
  rationale: En la fórmula de corte, «siervos» comunica subordinación respetuosa mejor que «esclavos», que sería demasiado fuerte para el matiz protocolar.
- source_word: מִי יֵשֵׁב
  english_pob_choice: who will sit
  chosen_spanish: quién se sentará
  alternatives_spanish:
  - quién ha de sentarse
  - quién ocupará
  lexicon: HALOT
  rationale: Preserva la imagen hebrea de sentarse en el trono, en vez de reducirla a «reinar».
- source_word: עַל כִּסֵּא
  english_pob_choice: on the throne of
  chosen_spanish: en el trono de
  alternatives_spanish:
  - sobre el trono de
  - en el trono
  lexicon: HALOT
  rationale: La locución española natural para la entronización es «en el trono de», que mantiene la imagen regia del original.
- source_word: אַחֲרָיו
  english_pob_choice: after him
  chosen_spanish: después de él
  alternatives_spanish:
  - en su lugar
  - tras él
  lexicon: HALOT
  rationale: Refiere a la sucesión inmediata del rey; «después de él» es directo y evita volverlo demasiado interpretativo.
theological_decisions:
- issue: עבד en una pregunta de corte real
  english_pob_reading: your servants
  chosen_spanish_reading: tus siervos
  alternative_spanish_readings:
  - tus esclavos
  - tus servidores
  rationale: La expresión no destaca esclavitud chattel sino una fórmula de deferencia ante el rey. «Siervos» conserva subordinación y respeto sin imponer una carga sociológica ajena al contexto.
  doctrine_reference: DOCTRINE.md Translation philosophy §1; tratamiento contextual de términos de servidumbre
- issue: Referencia sucesoria al trono
  english_pob_reading: who will sit on the throne of my lord the king after him
  chosen_spanish_reading: quién se sentará en el trono de mi señor el rey después de él
  alternative_spanish_readings:
  - quién reinará después de él
  - quién ocupará el trono después de él
  rationale: La formulación hebrea conserva la imagen concreta de sentarse en el trono; la traducción española mantiene esa concreción para no borrar la metáfora regia.
  doctrine_reference: Principio de mantener la imagen del texto cuando no hay necesidad de abstracción
translation_notes:
  revision_awareness: Se corrige el fallo anterior asegurando que el marcador de nota [a] aparece exactamente en el texto español, anclado en «rey[a]». No se introducen notas sin anclaje.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma del proyecto sólo cuando aparezca el tetragrámaton; aquí no aplica.
  - Se usa «siervos» por el matiz cortesano documentado, no «esclavos».
  - Se preserva la imagen de entronización «sentarse en el trono» sin convertirla en una paráfrasis genérica de reinar.
