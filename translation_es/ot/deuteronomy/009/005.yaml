translation:
  language: es
  text: No es por tu justicia ni por la rectitud de tu corazón que entras a poseer su tierra, sino por la maldad de estas naciones Yahvé tu Dios las expulsa[a] de delante de ti, y para confirmar la palabra que Yahvé juró a tus padres, a Abraham, a Isaac[c][b] y a Jacob.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «las desposee de delante de ti». El verbo hebreo puede enfatizar que les hace perder la posesión de la tierra, no solo que las expulsa.
    reason: lexical_alternative
  - marker: b
    text: O «la promesa que Yahvé juró». Aquí «palabra» tiene el sentido de una palabra empeñada en contexto de juramento.
    reason: lexical_alternative
  - marker: c
    text: 'El hebreo «tus padres» se refiere específicamente a los patriarcas nombrados aquí: Abraham, Isaac y Jacob.'
    reason: cultural_note
lexical_decisions:
- source_word: בְצִדְקָתְךָ
  english_pob_choice: because of your righteousness
  chosen_spanish: por tu justicia
  alternatives_spanish:
  - por causa de tu justicia
  - por tu rectitud
  lexicon: HALOT
  rationale: צְדָקָה en este contexto expresa justicia/rectitud moral o condición correcta. Con la negación inicial, el valor es causal; en español, «por tu justicia» comunica de modo natural que no es esa la base de la posesión de la tierra.
- source_word: וּבְיֹשֶׁר לְבָבְךָ
  english_pob_choice: or the uprightness of your heart
  chosen_spanish: ni por la rectitud de tu corazón
  alternatives_spanish:
  - ni por la integridad de tu corazón
  - ni por la rectitud de tu interior
  lexicon: HALOT
  rationale: יֹשֶׁר es «rectitud/uprightness», y unido a לֵבָב conserva el idiomático hebreo del corazón como centro moral. En español, «rectitud de tu corazón» mantiene el paralelo con «justicia» y suena natural.
- source_word: בָא לָרֶשֶׁת
  english_pob_choice: you are going in to possess
  chosen_spanish: entras a poseer
  alternatives_spanish:
  - vas a entrar para poseer
  - entras para tomar posesión de
  lexicon: HALOT
  rationale: בוא con infinitivo indica entrada orientada a la posesión. «Entras a poseer» conserva el movimiento hacia la tierra y la finalidad sin volver la frase pesada en español.
- source_word: אַרְצָם
  english_pob_choice: their land
  chosen_spanish: su tierra
  alternatives_spanish:
  - la tierra de ellos
  - su país
  lexicon: HALOT
  rationale: אֶרֶץ aquí es «tierra» en sentido territorial. El posesivo singular en español es natural aunque el referente plural sea «las naciones».
- source_word: בְרִשְׁעַת
  english_pob_choice: because of the wickedness of
  chosen_spanish: por la maldad de
  alternatives_spanish:
  - por causa de la impiedad de
  - a causa de la maldad de
  lexicon: HALOT
  rationale: רִשְׁעָה designa maldad/impiedad/guilt. «Maldad» es la opción más clara y directa en español para este contexto de juicio.
- source_word: הַגּוֹיִם הָאֵלֶּה
  english_pob_choice: these nations
  chosen_spanish: estas naciones
  alternatives_spanish:
  - estos pueblos
  - estas gentes
  lexicon: HALOT
  rationale: גּוֹיִם suele significar naciones; «estas naciones» es la correspondencia más precisa y idiomática.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  - Jehová
  lexicon: HALOT
  rationale: 'Se sigue el criterio del proyecto para el Nombre divino: transliterar יְהוָה como «Yahvé» en el texto principal, preservando el nombre propio del pacto en vez de una sustitución titulada.'
- source_word: מוֹרִישָׁם מִפָּנֶיךָ
  english_pob_choice: is driving them out before you
  chosen_spanish: las desaloja de delante de ti
  alternatives_spanish:
  - las expulsa de delante de ti
  - las desposee de delante de ti
  lexicon: HALOT
  rationale: El hifil de ירשׁ puede expresar causar la pérdida de posesión. «Desaloja» comunica la expulsión efectiva y evita un calco áspero, conservando el sentido de desposesión del territorio.
- source_word: וּלְמַעַן הָקִים
  english_pob_choice: and in order to confirm
  chosen_spanish: y para confirmar
  alternatives_spanish:
  - y para establecer
  - y con el fin de confirmar
  lexicon: HALOT
  rationale: לְמַעַן marca finalidad, y הקים con דָּבָר en contexto de pacto puede significar establecer/confirmar. «Confirmar» recoge bien el valor de ratificar lo jurado.
- source_word: הַדָּבָר אֲשֶׁר נִשְׁבַּע
  english_pob_choice: the word that Yahweh swore
  chosen_spanish: la palabra que Yahvé juró
  alternatives_spanish:
  - la promesa que Yahvé juró
  - el dicho que Yahvé juró
  lexicon: HALOT
  rationale: דָּבָר en contexto de juramento funciona como palabra comprometida/promesa. «Palabra» conserva cercanía al hebreo y, en español bíblico moderno, sigue siendo comprensible con la claridad del contexto.
- source_word: לַאֲבֹתֶיךָ
  english_pob_choice: to your fathers
  chosen_spanish: a tus padres
  alternatives_spanish:
  - a tus antepasados
  - a tus padres patriarcas
  lexicon: HALOT
  rationale: Aunque el hebreo dice literalmente «padres», en español «padres» puede sonar ambiguo sin el contexto inmediato. Dado que los nombres patriarcales siguen enseguida, «tus padres» es fiel y natural; la nota preserva la referencia específica a los patriarcas.
theological_decisions:
- issue: Motivos de la entrada y posesión de la tierra
  english_pob_reading: 'The verse presents two stated grounds: not Israel''s righteousness, but the wickedness of the nations and the LORD''s faithfulness to his sworn word to the patriarchs.'
  chosen_spanish_reading: 'El versículo presenta dos razones explícitas: no la justicia de Israel, sino la maldad de las naciones y la fidelidad de Yahvé a su palabra jurada a los patriarcas.'
  alternative_spanish_readings:
  - Una lectura que destaque solo la maldad de las naciones
  - Una lectura que destaque solo la promesa jurada
  rationale: El hebreo incluye ambas cláusulas de propósito/causa y no permite reducir el sentido a una sola motivación. La traducción mantiene esa tensión teológica sin resolverla artificialmente.
  doctrine_reference: Preservar la tensión textual entre juicio sobre las naciones y cumplimiento del juramento patriarcal.
- issue: Nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - Jehová
  rationale: Se sigue la convención del proyecto para el Nombre divino. En un pasaje de juramento y pacto, la transliteración preserva el carácter personal del Nombre revelado.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
translation_notes:
  revision_awareness: La revisión más reciente indicó que no se requerían cambios; esta versión sigue el acuerdo alto con el texto fuente y conserva las decisiones auditadas sobre causa, propósito, desposesión y juramento.
  spanish_consistency_notes:
  - Se usa «Yahvé» para יְהוָה de manera consistente con el estándar del proyecto.
  - Se mantiene «justicia/rectitud» para צְדָקָה/יֹשֶׁר con un paralelismo claro en español.
  - «Desaloja» se eligió para מוֹרִישָׁם para expresar desposesión/expulsión sin perder naturalidad.
  - «Palabra» conserva la posible tensión entre ‘word’ y ‘promise’, indicada en la nota.
  - 'La secuencia de notas respeta las marcas del texto: [a], [c][b].'
