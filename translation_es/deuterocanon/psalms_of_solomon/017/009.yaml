review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja correctamente la estructura temporal de ἐν τῷ ἐπαναστῆναι como «cuando», el sentido oposicional de αὐτοῖς como «contra ellos», y mantiene el singular masculino de ἄνθρωπον con «un hombre». «Extranjero» transmite bien ἀλλότριον. El único punto mejorable es γένους ἡμῶν: «raza» calca el inglés auditado, pero en español bíblico actual suena menos natural y puede introducir connotaciones modernas innecesarias; «linaje» preserva mejor la idea genealógica/colectiva del griego.'
  spanish_quality_summary: La frase es clara y digna, pero «extranjero a nuestra raza» suena algo forzada en español. «Extranjero a nuestro linaje» o «ajeno a nuestro linaje» es más idiomático y mantiene el matiz de pertenencia étnico-genealógica. El resto del texto es natural y bien formado.
  glossary_alignment: 'No hay conflictos con la terminología teológica del proyecto. La decisión relevante es léxica: para γένος, «linaje» encaja mejor en español que «raza» sin apartarse del valor documentado en el audit trail.'
  issues:
  - severity: medium
    issue: «extranjero a nuestra raza» es poco natural en español y connota categorías modernas
    rationale: Aunque sigue de cerca el cambio inglés a «race», el griego γένους ἡμῶν denota grupo de origen/linaje. En español eclesial general, «linaje» comunica ese valor con más fidelidad estilística y menos ambigüedad contemporánea.
  - severity: low
    issue: La nota al pie no aporta una alternativa real
    rationale: La nota repite exactamente el texto principal. Si se conserva, debería ofrecer una variante genuina; de lo contrario, debe omitirse.
  revised_spanish_text: cuando un hombre extranjero a nuestro linaje se levantó contra ellos.
  revision_rationale: Se reemplaza «raza» por «linaje» para expresar de manera más natural y precisa en español el valor de γένους ἡμῶν como pertenencia genealógica o de pueblo. También se elimina la nota, porque no preserva una alternativa distinta sino que duplica el texto principal.
