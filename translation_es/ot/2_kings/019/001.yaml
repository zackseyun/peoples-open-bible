    text: «Saco» aquí traduce la prenda de duelo del hebreo שָּׂק; no se refiere a un saco común, sino a una tela áspera usada en señal de lamento y humillación. Alternativamente, puede expresarse como «cilicio».
    reason: lexical_and_cultural_note
  revision_rationale: La revisión conserva íntegramente el sentido del hebreo y las decisiones del POB, pero mejora la naturalidad del español. «Y cuando...» transmite mejor la fórmula narrativa que «Y aconteció que...», y «se cubrió con saco» suena más claro y idiomático que «se cubrió de saco». Se reduce además la aparatosa doble nota a una sola nota útil y suficiente.
