revisions:
- from: Y si su esposo la oye y no le dice nada, y no anula su voto, entonces todos sus votos permanecerán firmes, y toda obligación vinculante que ella ha impuesto sobre sí misma permanecerá firme.
  to: Y si su esposo oye y no le dice nada, y no anula su voto, entonces todos sus votos permanecerán firmes, y toda obligación vinculante con la que ella se ha ligado permanecerá firme.
  rationale: Se corrige «la oye» a «oye» para una lectura jurídica más natural en español, y se reemplaza «que ella ha impuesto sobre sí misma» por «con la que ella se ha ligado» para reflejar mejor la metáfora hebrea de auto-vinculación sin perder claridad ni dignidad estilística.
