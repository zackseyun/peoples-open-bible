translation:
  language: es
  text: Hombres[a], ¿no es grande el rey, y no son muchos los hombres, y no tiene fuerza el vino? ¿Quién, pues, es el que gobierna sobre ellos[b], o quién es el que tiene dominio sobre ellos? ¿No son las mujeres?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «y no es fuerte el vino». El verbo griego puede verterse de modo más directo como «es fuerte» en lugar de «tiene fuerza».'
    reason: lexical_alternative
  - marker: b
    text: El griego usa aquí «hombres» porque el argumento contrasta a los hombres con las mujeres en la cláusula siguiente; un valor más genérico como «personas» es posible léxicamente, pero menos adecuado en este contexto.
    reason: lexical_alternative
lexical_decisions:
- source_word: Ἄνδρες
  english_pob_choice: Men
  chosen_spanish: Hombres
  alternatives_spanish:
  - Varones
  - Hombres, vosotros
  lexicon: LSJ
  rationale: Es un vocativo plural directo de ἀνήρ, por lo que conviene conservar el apelativo masculino. En español, «Hombres» comunica el llamado retórico sin forzar un giro litúrgico o explicativo.
- source_word: μέγας
  english_pob_choice: great
  chosen_spanish: grande
  alternatives_spanish:
  - mighty
  - importante
  lexicon: LSJ
  rationale: En el contexto de la realeza y la comparación retórica, «grande» reproduce con sobriedad la amplitud semántica de μέγας sin añadir un matiz interpretativo como «poderoso».
- source_word: πολλοί
  english_pob_choice: many
  chosen_spanish: muchos
  alternatives_spanish:
  - numerosos
  lexicon: LSJ
  rationale: Es una cantidad simple; «muchos» es la equivalencia más natural y directa en español.
- source_word: ἄνθρωποι
  english_pob_choice: men
  chosen_spanish: los hombres
  alternatives_spanish:
  - las personas
  - los seres humanos
  lexicon: LSJ
  rationale: Aunque ἄνθρωποι puede ser genérico, aquí el contraste inmediato con γυναῖκες favorece una referencia masculina. «Los hombres» preserva el argumento de género del pasaje, como en la decisión inglesa.
- source_word: οἶνος
  english_pob_choice: wine
  chosen_spanish: el vino
  lexicon: LSJ
  rationale: Correspondencia léxica estándar; no hay razón contextual para variar.
- source_word: ἰσχύει
  english_pob_choice: has strength
  chosen_spanish: tiene fuerza
  alternatives_spanish:
  - es fuerte
  - prevalece
  lexicon: LSJ
  rationale: «Tiene fuerza» conserva bien la idea de potencia/fortaleza y suena natural en la pregunta retórica. También deja abierta la alternativa textual de «es fuerte», señalada por el inglés.
- source_word: δεσπόζων
  english_pob_choice: the one who rules over
  chosen_spanish: el que domina sobre
  alternatives_spanish:
  - el que rige sobre
  - el amo de
  lexicon: LSJ
  rationale: δεσπόζω expresa ejercicio de señorío o dominio; «domina sobre» mantiene el matiz de autoridad activa sin introducir un registro demasiado técnico.
- source_word: κυριεύων
  english_pob_choice: the one who has mastery over
  chosen_spanish: el que ejerce dominio sobre
  alternatives_spanish:
  - el que tiene dominio sobre
  - el que se enseñorea de
  lexicon: LSJ
  rationale: κυριεύω comparte el campo semántico de dominio y señorío. «Ejerce dominio sobre» conserva la diferenciación retórica respecto de δεσπόζων, igual que la auditoría inglesa que distinguió entre rule over y mastery.
- source_word: γυναῖκες
  english_pob_choice: women
  chosen_spanish: las mujeres
  alternatives_spanish:
  - las esposas
  lexicon: LSJ
  rationale: El sustantivo plural significa normalmente «mujeres»; no hay indicio suficiente para restringirlo a «esposas».
theological_decisions:
- issue: Contraste de género en la argumentación
  english_pob_reading: Retain 'men' and 'women' rather than neutralizing to 'people' and 'women.'
  chosen_spanish_reading: Conservar «hombres» y «mujeres» en el contraste retórico.
  alternative_spanish_readings:
  - Neutralizar ἄνθρωποι como «personas»
  - usar «humanos»
  rationale: El pasaje construye una secuencia de preguntas que contrasta explícitamente categorías masculinas y femeninas. Neutralizar ἄνθρωποι borraría esa lógica retórica y debilitaría el argumento, por lo que conviene mantener la referencia de género.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4
- issue: Matiz de los participios δεσπόζων / κυριεύων
  english_pob_reading: Differentiate them as 'rules over' and 'has mastery over.'
  chosen_spanish_reading: Diferenciarlos como «domina sobre» y «ejerce dominio sobre».
  alternative_spanish_readings:
  - traducir ambos como «domina sobre»
  - usar «señorea sobre» y «domina sobre»
  rationale: El griego usa dos participios cercanos para dar fuerza retórica. Mantener dos giros cercanos pero no idénticos conserva el paralelismo y evita aplanar la redundancia expresiva del original.
  doctrine_reference: DOCTRINE.md §Translation philosophy 5
translation_notes:
  revision_awareness: 'La base inglesa pasó por una revisión menor: se ajustó la segunda cláusula de κυριεύων de «masters them» a «has mastery over them» para hacer más natural el paralelo formal. La propuesta española refleja esa diferenciación con «domina sobre» / «ejerce dominio sobre», manteniendo la tensión retórica del original griego y el asentamiento final del audit trail.'
  spanish_consistency_notes:
  - Se usa «mujeres» y no «esposas», porque el griego no restringe el sentido.
  - Se conserva «hombres» para ἄνδρες y ἄνθρωποι por la fuerza del contraste con «mujeres».
  - «El vino» y «tiene fuerza» mantienen el campo semántico de ἰσχύει sin exageración interpretativa.
  - No se emplea «SEÑOR» ni términos eclesiásticos para δεσπόζω/κυριεύω; el pasaje no trata del nombre divino ni de una fórmula litúrgica.
