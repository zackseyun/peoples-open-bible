    text: Or 'the islands' or 'the distant shores'; the Hebrew term often refers broadly to maritime lands or coastlands.
    reason: lexical_alternative
  - marker: b
    text: Or 'because he has beautified you' or 'because he has honored you.'
    reason: lexical_alternative
