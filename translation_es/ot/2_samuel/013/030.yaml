translation:
  language: es
  text: 'Mientras ellos iban por el camino[a], llegó a David el reporte, diciendo: «Absalón ha matado a todos los hijos del rey, y no ha quedado de ellos ni uno».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «la noticia llegó a David»; el término hebreo también puede expresar un reporte no verificado o un rumor.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְהִי הֵמָּה בַדֶּרֶךְ
  english_pob_choice: While they were on the way
  chosen_spanish: Mientras ellos iban por el camino
  alternatives_spanish:
  - Mientras estaban en el camino
  - Cuando iban por el camino
  lexicon: HALOT
  rationale: La construcción narrativa hebrea introduce una circunstancia temporal. «Mientras» conserva la relación de simultaneidad, y «iban por el camino» suena natural en español sin perder el sentido direccional de בַדֶּרֶךְ.
- source_word: הַשְּׁמֻעָה
  english_pob_choice: the report
  chosen_spanish: el informe
  alternatives_spanish:
  - la noticia
  - el rumor
  lexicon: HALOT
  rationale: En este contexto la palabra designa una comunicación que llega a David antes de quedar aclarada la situación. «Informe» preserva mejor ese carácter de noticia transmitida, sin cerrar indebidamente el matiz de posible versión no verificada. Se evita «noticia» por ser más neutral y «rumor» por ser más interpretativo.
- source_word: בָאָה אֶל דָּוִד
  english_pob_choice: came to David
  chosen_spanish: llegó a David
  alternatives_spanish:
  - vino a David
  - alcanzó a David
  lexicon: HALOT
  rationale: El verbo femenino singular con la noticia como sujeto se rinde de forma idiomática con «llegó a David». Mantiene la sencillez del hebreo y el movimiento hacia David.
- source_word: לֵאמֹר
  english_pob_choice: saying
  chosen_spanish: diciendo
  alternatives_spanish:
  - que
  - y dijo
  lexicon: HALOT
  rationale: Es la introducción normal de discurso directo. «Diciendo» conserva la estructura de cita del hebreo sin añadir contenido interpretativo.
- source_word: הִכָּה
  english_pob_choice: has struck down
  chosen_spanish: ha derribado
  alternatives_spanish:
  - ha golpeado
  - ha matado
  lexicon: HALOT
  rationale: נכה puede expresar golpear y, en contextos letales, herir de muerte. «Ha derribado» conserva la fuerza del acto violento sin traducir de manera demasiado específica como «ha matado», que estrecharía el verbo más allá de la forma hebrea. El contexto inmediato aclara que se trata de una agresión mortal.
- source_word: כָּל בְּנֵי הַמֶּלֶךְ
  english_pob_choice: all the king’s sons
  chosen_spanish: a todos los hijos del rey
  alternatives_spanish:
  - a todos los hijos del rey
  - a todos los hijos del monarca
  lexicon: HALOT
  rationale: Se mantiene la referencia precisa a בני המלך como hijos varones del rey. «Hijos» es el equivalente directo y natural en español; «del rey» conserva la relación posesiva.
- source_word: וְלֹא נוֹתַר מֵהֶם אֶחָד
  english_pob_choice: and not one of them is left
  chosen_spanish: y no quedó de ellos ni uno
  alternatives_spanish:
  - y no quedó ninguno de ellos
  - y no permaneció de ellos ni uno
  lexicon: HALOT
  rationale: El nifal de יתר expresa que no quedó/restó nadie. «No quedó de ellos ni uno» es idiomático en español y preserva el énfasis absoluto del hebreo, equivalente al inglés POB sin rigidizar el tiempo verbal.
theological_decisions:
- issue: 'Valor de הַשְּׁמֻעָה: noticia, informe o rumor'
  english_pob_reading: the report ... the Hebrew term can also carry the sense of an unverified report or rumor
  chosen_spanish_reading: el informe ... el término hebreo también puede llevar el sentido de una versión no verificada o rumor
  alternative_spanish_readings:
  - la noticia
  - el rumor
  rationale: 'No se borra la tensión léxica del hebreo: la palabra puede ser noticia, informe o rumor. Se opta por «informe» para señalar una comunicación transmitida sin imponer plena verificación, y se conserva en nota la alternativa de rumor/no verificada siguiendo el audit trail inglés.'
  doctrine_reference: Lexicografía hebrea; matiz narrativo de שְׁמוּעָה
translation_notes:
  revision_awareness: El texto español sigue de cerca el sentido del WLC y la decisión inglesa de mantener el carácter circuntancial de la escena y el matiz no plenamente verificado de הַשְּׁמֻעָה. No se registran revisiones previas en el paquete auditado, y el borrador refleja el acuerdo alto indicado por la revisión más reciente.
  spanish_consistency_notes:
  - Se usa «David» y no una forma hebraizante del nombre propio, conforme al estándar del proyecto.
  - Se mantiene «hijos del rey» para conservar la precisión del hebreo y del contexto narrativo.
  - La negación absoluta final («no quedó ... ni uno») reproduce el cierre enfático del original.
  - Se evita «SEÑOR» u այլ terminología teológica no pertinente al versículo.
  - La puntuación española de la cita directa y del inciso narrativo sigue un registro bíblico moderno y legible.
