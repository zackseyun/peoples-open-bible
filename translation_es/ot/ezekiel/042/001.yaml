translation:
  language: es
  text: Entonces me sacó al atrio exterior por el camino hacia el norte[a], y me llevó a la cámara que estaba enfrente del área separada[b] y enfrente del edificio al norte.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «el camino, camino del norte», una expresión direccional idiomática.'
    reason: lexical_alternative
  - marker: b
    text: O «el lugar separado». El término hebreo se refiere a un área distinta y apartada en la visión del templo de Ezequiel.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיּוֹצִאֵנִי
  english_pob_choice: Then he brought me out
  chosen_spanish: Entonces me sacó
  alternatives_spanish:
  - Entonces me llevó fuera
  - Entonces me hizo salir
  lexicon: HALOT
  rationale: El Hiphil de יצא expresa causar que alguien salga; en español, «sacar» comunica esa acción con naturalidad y conserva el movimiento narrativo del verbo.
- source_word: הֶחָצֵר הַחִיצוֹנָה
  english_pob_choice: the outer court
  chosen_spanish: el atrio exterior
  alternatives_spanish:
  - el patio exterior
  - la corte exterior
  lexicon: HALOT
  rationale: חָצֵר puede ser «patio» o «atrio». En un contexto de visión del templo, «atrio» es claro y respeta el ámbito arquitectónico; «exterior» refleja הַחִיצוֹנָה.
- source_word: הַדֶּרֶךְ דֶּרֶךְ הַצָּפוֹן
  english_pob_choice: by the way toward the north
  chosen_spanish: por el camino hacia el norte
  alternatives_spanish:
  - por el camino del norte
  - por el camino norte
  lexicon: HALOT
  rationale: La repetición de דֶּרֶךְ es una expresión idiomática direccional. Se la vierte de modo fluido en español como «por el camino hacia el norte», sin perder la idea de ruta.
- source_word: וַיְבִאֵנִי
  english_pob_choice: and he brought me to
  chosen_spanish: y me llevó a
  alternatives_spanish:
  - y me condujo a
  - y me trajo a
  lexicon: HALOT
  rationale: El Hiphil de בוא puede significar «llevar/conducir»; «me llevó a» mantiene la progresión espacial sin añadir matices internos que el hebreo no exige aquí.
- source_word: הַלִּשְׁכָּה
  english_pob_choice: the chamber
  chosen_spanish: la cámara
  alternatives_spanish:
  - la habitación
  - el aposento
  lexicon: HALOT
  rationale: לִשְׁכָּה en descripciones del templo designa una sala o cámara. «Cámara» es un término arquitectónico adecuado y suficientemente digno en español.
- source_word: נֶגֶד
  english_pob_choice: opposite
  chosen_spanish: enfrente de
  alternatives_spanish:
  - opuesta a
  - frente a
  lexicon: HALOT
  rationale: «Enfrente de» expresa bien la correspondencia espacial directa. Se mantiene para ambas ocurrencias de נֶגֶד sin introducir una interpretación más técnica que la del texto.
- source_word: הַגִּזְרָה
  english_pob_choice: the separate area
  chosen_spanish: el área separada
  alternatives_spanish:
  - el lugar apartado
  - la zona separada
  lexicon: HALOT
  rationale: En la visión de Ezequiel, גִּזְרָה designa un sector distinguido o apartado del complejo. «Área separada» conserva la idea de separación sin fijar un término más técnico de lo que el texto requiere.
- source_word: הַבִּנְיָן
  english_pob_choice: the building
  chosen_spanish: el edificio
  alternatives_spanish:
  - la construcción
  - la estructura
  lexicon: HALOT
  rationale: בִּנְיָן es un término general para edificio/estructura. «Edificio» funciona bien en la descripción arquitectónica y resulta natural en español.
- source_word: אֶל הַצָּפוֹן
  english_pob_choice: to the north
  chosen_spanish: hacia el norte
  alternatives_spanish:
  - al norte
  - en dirección norte
  lexicon: HALOT
  rationale: La frase final es direccional. «Hacia el norte» conserva la orientación sin forzar una relación local distinta de la que el hebreo indica.
theological_decisions:
- issue: Terminología del espacio apartado de la visión del templo
  english_pob_reading: the separate area
  chosen_spanish_reading: el área separada
  alternative_spanish_readings:
  - el lugar apartado
  - la zona separada
  rationale: No hay necesidad de resolver el término hacia una denominación litúrgica o técnica tradicional. Se preserva la idea de un sector diferenciado dentro de la arquitectura visionaria.
  doctrine_reference: Ezequiel 42:1; visión del templo en Ezequiel 40–48
translation_notes:
  revision_awareness: La redacción sigue de cerca el texto hebreo y la decisión auditada en inglés de tratar la expresión repetida דֶּרֶךְ como una fórmula direccional idiomática. También conserva la equivalencia espacial de נֶגֶד y la referencia a la גִּזְרָה como un sector separado, sin ampliar el sentido más allá del respaldo léxico disponible. La frase final se entiende como dirección («hacia el norte»), en línea con la revisión inglesa que prefirió una formulación direccional natural.
  spanish_consistency_notes:
  - Se usó «atrio» para הֶחָצֵר en un contexto de templo, manteniendo coherencia arquitectónica con el resto de Ezequiel 40–48.
  - Se evitó «Señor» o sustitución reverencial porque no aparece el tetragrámaton ni un término divino en este versículo.
  - «Cámara» se prefirió por consistencia con vocabulario arquitectónico bíblico en español, aunque «habitación» sería posible en un registro menos técnico.
  - La nota [a] en el texto marca la ambigüedad idiomática del hebreo repetido; la nota [b] preserva la alternativa lexicográfica para גִּזְרָה.
