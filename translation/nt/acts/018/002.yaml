id: ACT.18.2
reference: Acts 18:2
source:
  edition: SBLGNT
  text: καὶ εὑρών τινα Ἰουδαῖον ὀνόματι Ἀκύλαν, Ποντικὸν τῷ γένει, προσφάτως ἐληλυθότα ἀπὸ τῆς Ἰταλίας καὶ Πρίσκιλλαν γυναῖκα αὐτοῦ διὰ τὸ ⸀διατεταχέναι Κλαύδιον χωρίζεσθαι πάντας τοὺς Ἰουδαίους ⸀ἀπὸ τῆς Ῥώμης, προσῆλθεν αὐτοῖς,
translation:
  text: And he found a Jew named Aquila[a], a native of Pontus, who had recently come from Italy with Priscilla his wife because Claudius had ordered all the Jews to leave Rome; and he went to them.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or "all the Jews to be expelled from Rome." The Greek more literally speaks of being separated from Rome; the main text uses the natural English "leave Rome."
    reason: lexical_alternative
lexical_decisions:
- source_word: εὑρών
  chosen: found
  alternatives:
  - met
  - came upon
  lexicon: BDAG
  rationale: Aorist participle introducing the next action by Paul. 'Found' is the plain sense and fits the narrative sequence without unnecessary paraphrase.
- source_word: τινα Ἰουδαῖον
  chosen: a Jew
  alternatives:
  - a Jewish man
  lexicon: BDAG
  rationale: Indefinite τις with Ἰουδαῖον identifies an individual by ethnic-religious identity. 'A Jew' is the most direct and natural rendering.
- source_word: ὀνόματι Ἀκύλαν
  chosen: named Aquila
  alternatives:
  - by name Aquila
  lexicon: BDAG
  rationale: Standard idiom for introducing a person's name. 'Named Aquila' is idiomatic modern English while remaining close to the Greek.
- source_word: Ποντικὸν τῷ γένει
  chosen: a native of Pontus
  alternatives:
  - Pontian by birth
  - of Pontian origin
  lexicon: BDAG
  rationale: The phrase denotes geographic origin or birth. 'A native of Pontus' is clear and natural.
- source_word: προσφάτως ἐληλυθότα ἀπὸ τῆς Ἰταλίας
  chosen: who had recently come from Italy
  alternatives:
  - recently arrived from Italy
  - lately come from Italy
  lexicon: BDAG
  rationale: Perfect participle with adverb indicates a recent prior arrival with present relevance. 'Had recently come' preserves the anterior sense relative to the main verb.
- source_word: καὶ Πρίσκιλλαν γυναῖκα αὐτοῦ
  chosen: with Priscilla his wife
  alternatives:
  - and Priscilla his wife
  - together with Priscilla his wife
  lexicon: BDAG
  rationale: Although καί can be rendered simply 'and,' English idiom prefers 'with' here to show that Priscilla accompanied Aquila in the recent arrival from Italy. This reflects the syntactic attachment without awkwardness.
- source_word: διὰ τὸ διατεταχέναι Κλαύδιον
  chosen: because Claudius had ordered
  alternatives:
  - because Claudius had commanded
  - on account of Claudius's decree
  lexicon: BDAG
  rationale: διά with the articular infinitive expresses cause. διατάσσω here refers to an official order. 'Ordered' is accessible modern English and fits the imperial context.
- source_word: χωρίζεσθαι πάντας τοὺς Ἰουδαίους ἀπὸ τῆς Ῥώμης
  chosen: all the Jews to leave Rome
  alternatives:
  - all the Jews to depart from Rome
  - all the Jews to be expelled from Rome
  lexicon: BDAG
  rationale: The passive/middle infinitive χωρίζεσθαι with ἀπό conveys separation from Rome. 'To leave Rome' is natural English and captures the result of Claudius's order. 'Be expelled' is interpretive and stronger than the Greek wording, so it is preserved as an alternative rather than chosen for the main text.
- source_word: προσῆλθεν αὐτοῖς
  chosen: he went to them
  alternatives:
  - he approached them
  - he came to them
  lexicon: BDAG
  rationale: προσέρχομαι commonly means to go or come to someone. 'He went to them' fits the narrative movement from Paul's perspective in context and reads naturally in English.
