translation:
  language: es
  text: Un testigo falso no quedará sin castigo[a], y el que exhala mentiras[b] perecerá.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «no será absuelto» / «no será tenido por inocente». El verbo hebreo puede destacar tanto la falta de absolución como la certeza del castigo.'
    reason: lexical_alternative
  - marker: b
    text: 'Lit.: «exhala mentiras». La expresión pinta las mentiras saliendo con la misma facilidad que el aliento.'
    reason: lexical_alternative
lexical_decisions:
- source_word: עֵד
  english_pob_choice: witness
  chosen_spanish: testigo
  alternatives_spanish:
  - testigo judicial
  - declarante
  lexicon: HALOT
  rationale: El sustantivo tiene sentido forense/legal. «Testigo» es la equivalencia natural en español y conserva el matiz judicial del proverbio.
- source_word: שְׁקָרִים
  english_pob_choice: 'false'
  chosen_spanish: falso
  alternatives_spanish:
  - de mentiras
  - mentiroso
  - engañoso
  lexicon: HALOT
  rationale: 'En constricción con «testigo», el plural abstracto funciona como adjetivo: un testigo caracterizado por falsedad. «Falso» preserva la construcción idiomática sin sobretraducirla.'
- source_word: לֹא יִנָּקֶה
  english_pob_choice: will not go unpunished
  chosen_spanish: no quedará sin castigo
  alternatives_spanish:
  - no será absuelto
  - no será tenido por inocente
  - no quedará sin culpa
  lexicon: HALOT
  rationale: El nifal de נקה puede implicar ser absuelto o quedar limpio; en este contexto sapiencial se subraya la consecuencia penal. «No quedará sin castigo» comunica bien la idea en español.
- source_word: וְיָפִיחַ
  english_pob_choice: one who breathes out
  chosen_spanish: el que exhala
  alternatives_spanish:
  - el que pronuncia
  - el que arroja
  - el que deja salir
  lexicon: HALOT
  rationale: El verbo conserva la imagen vívida de sacar palabras como aliento. «Exhala» mantiene la metáfora de manera comprensible en español.
- source_word: כְּזָבִים
  english_pob_choice: lies
  chosen_spanish: mentiras
  alternatives_spanish:
  - falsedades
  - engaños
  - falacias
  lexicon: HALOT
  rationale: El plural significa mentiras/falsedades. «Mentiras» es claro y natural; también conserva la fuerza directa del proverbio.
- source_word: יֹאבֵד
  english_pob_choice: will perish
  chosen_spanish: perecerá
  alternatives_spanish:
  - será destruido
  - se arruinará
  - morirá
  lexicon: HALOT
  rationale: El qal de אבד expresa perecer/perderse/ser destruido. «Perecerá» es breve, solemne y adecuado para la literatura sapiencial.
translation_notes:
  revision_awareness: Alineado con el texto hebreo masorético y con la lectura auditada de la POB en inglés; se conservó la imagen verbal de «exhalar» y la alternativa forense de לֹא יִנָּקֶה en nota.
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando el texto lo requiera; este versículo no contiene el nombre divino.
  - Se mantuvo el contraste sapiencial directo entre el testigo falso y el que exhala mentiras, sin suavizar la advertencia penal.
  - «Perecerá» se eligió por su tono bíblico y porque evita introducir un sujeto distinto del hebreo.
  - La nota [a] preserva la tensión léxica entre absolución y castigo que el audit trail inglés documenta.
