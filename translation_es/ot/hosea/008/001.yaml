base_translation:
  language: en
  yaml_path: translation/ot/hosea/008/001.yaml
  text: Put the trumpet to your mouth! Like an eagle over the house of Yahweh[c][b][a], because they have transgressed my covenant and rebelled against my law.
  footnotes:
  - marker: a
    text: Or 'like a vulture.' The Hebrew נֶשֶׁר can refer more broadly to a large bird of prey.
    reason: lexical_alternative
  - marker: b
    text: Or 'they have transgressed/broken my covenant.' Literally, 'they have crossed my covenant.'
    reason: lexical_alternative
  - marker: c
    text: Or 'my instruction.' Hebrew תּוֹרָה can mean 'law,' 'instruction,' or 'teaching.'
    reason: lexical_alternative
