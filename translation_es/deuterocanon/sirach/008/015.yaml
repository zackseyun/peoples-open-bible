    rationale: Aunque la revisión inglesa resolvió la dificultad hacia «set himself», en español «sentarse» sugiere sentarse físicamente y no colocarse hostilmente al acecho. «Se ponga» o «se coloque» preserva mejor la amenaza implícita.
  - severity: low
    issue: «de un burlador» es menos preciso que «ante un burlador»
    rationale: El hebreo מִפְּנֵי expresa relación de presencia/enfrente. «Apartarse de» es natural, pero «ante» mantiene mejor el matiz de no ceder terreno frente a él.
