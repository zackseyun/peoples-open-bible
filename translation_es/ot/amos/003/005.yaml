translation:
  language: es
  text: ¿Acaso cae un ave en una trampa en la tierra, cuando no hay un lazo[a] para ella? ¿Acaso se levanta una trampa del suelo sin haber atrapado nada?[b]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «cebo / gatillo»; el término hebreo detrás de «lazo» puede referirse más específicamente a lo que atrae o acciona la trampa.
    reason: lexical_alternative
  - marker: b
    text: Literalmente, «y para capturar no captura»; es una construcción enfática hebrea que significa «ciertamente no atrapa nada» o «sin atrapar nada».
    reason: lexical_alternative
lexical_decisions:
- source_word: צִפּוֹר
  english_pob_choice: bird
  chosen_spanish: ave
  alternatives_spanish:
  - pájaro
  - ave pequeña
  lexicon: HALOT
  rationale: El término hebreo es genérico, no una especie concreta. «Ave» conserva ese alcance general en un español digno y natural; «pájaro» también sería posible, pero «ave» suena más neutro y literario.
- source_word: פַּח
  english_pob_choice: trap
  chosen_spanish: trampa
  alternatives_spanish:
  - trampa de caza
  - lazo
  lexicon: HALOT
  rationale: פַּח designa un artefacto para atrapar. En español «trampa» es claro y natural en ambos miembros del paralelismo. Se evita «lazo» como equivalente principal para no confundirlo con מוֹקֵשׁ.
- source_word: הָאָרֶץ
  english_pob_choice: on the ground
  chosen_spanish: sobre el suelo
  alternatives_spanish:
  - en el suelo
  - sobre la tierra
  lexicon: HALOT
  rationale: La imagen es concreta y física. «Sobre el suelo» reproduce bien la ubicación del artefacto sin sonar demasiado literal o abstracto.
- source_word: מוֹקֵשׁ
  english_pob_choice: snare
  chosen_spanish: lazo
  alternatives_spanish:
  - cebo
  - dispositivo de activación
  - trampa
  lexicon: HALOT
  rationale: 'El POB en inglés distingue מוֹקֵשׁ de פַּח: aquí no se trata del «trap» en general, sino del elemento que engancha o activa la captura. «Lazo» mantiene la idea de un medio de apriete o captura y deja abierta la nota sobre la posible referencia más específica a cebo o gatillo.'
- source_word: אֵין לָהּ
  english_pob_choice: there is no snare for it
  chosen_spanish: no haya un lazo para ella
  alternatives_spanish:
  - no tenga cebo
  - no haya nada puesto para ella
  lexicon: HALOT
  rationale: La construcción niega la presencia de aquello que hace posible la captura. Se conserva la referencia pronominal con «para ella», siguiendo el género gramatical de «ave» y manteniendo la economía del hebreo.
- source_word: יַעֲלֶה
  english_pob_choice: spring up
  chosen_spanish: se levanta
  alternatives_spanish:
  - se alza
  - sube
  lexicon: HALOT
  rationale: En este contexto la acción es la de una trampa que emerge o se acciona desde el suelo. «Se levanta» comunica bien ese movimiento sin forzar un tecnicismo mecánico.
- source_word: הָאֲדָמָה
  english_pob_choice: from the ground
  chosen_spanish: del suelo
  alternatives_spanish:
  - de la tierra
  - del terreno
  lexicon: HALOT
  rationale: «Suelo» empareja naturalmente con la primera mitad del versículo y mantiene el relieve físico de la imagen. Evita una duplicación innecesaria con «tierra» si ya aparece antes «suelo».
- source_word: וְלָכוֹד לֹא יִלְכּוֹד
  english_pob_choice: when it has caught nothing at all
  chosen_spanish: sin haber atrapado nada
  alternatives_spanish:
  - y no atrapa nada
  - sin atrapar absolutamente nada
  lexicon: HALOT
  rationale: 'El hebreo usa una construcción enfática: literalmente «y para capturar no captura». En español se vierte con una frase natural que conserva la idea intensiva: la trampa se acciona sin lograr atrapar nada.'
theological_decisions:
- issue: Imagen proverbial de causa y efecto aplicada al juicio divino en el contexto inmediato
  english_pob_reading: The verse functions as a rhetorical image rather than a doctrinal statement, and the translation preserves the concrete trap imagery and the implied cause-effect logic.
  chosen_spanish_reading: El versículo se entiende como una imagen retórica, no como una afirmación doctrinal directa; por eso se conserva la escena concreta de la trampa y su lógica de causa y efecto.
  alternative_spanish_readings:
  - tomarlo como una afirmación más abstracta sobre destino
  - suavizar la imagen hacia una mera metáfora general
  rationale: En Amós 3:5 la fuerza está en la pregunta retórica y en la analogía visible. La traducción mantiene el sentido proverbial sin convertirlo en explicación teológica ni debilitar su impacto.
  doctrine_reference: Exégesis profética y uso de preguntas retóricas en Amós 3:5
translation_notes:
  revision_awareness: 'Se mantuvo la alta concordancia del POB inglés con el hebreo: pájaro/ave general, distinción entre trampa y lazo, y la intensificación final mediante una construcción española idiomática equivalente. No se aplicaron revisiones posteriores; el pasaje quedó estable en la última pasada.'
  spanish_consistency_notes:
  - Se usó «ave» como término genérico, coherente con el hebreo צִפּוֹר.
  - Se distinguió «trampa» de «lazo» para preservar la diferencia entre פַּח y מוֹקֵשׁ.
  - Se evitó «SEÑOR» y no aparece vocabulario teológico no presente en el versículo.
  - La repetición de «suelo» mantiene la simetría de la imagen y la claridad en español.
