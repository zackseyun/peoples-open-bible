id: MRK.11.26
reference: Mark 11:26
source:
  edition: robinson-pierpont-2005-byzantine
  text: Εἰ δὲ ὑμεῖς οὐκ ἀφίετε, οὐδὲ ὁ πατὴρ ὑμῶν ὁ ἐν τοῖς οὐρανοῖς ἀφήσει τὰ παραπτώματα
    ὑμῶν.
  language: Greek
translation:
  text: But[a] if you do not forgive, neither will your Father who is in heaven forgive
    your trespasses.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: This verse is absent from the earliest Greek manuscripts (including the
      4th-century Sinaiticus and Vaticanus) and early Coptic versions, but is present
      in the Byzantine majority tradition, the Latin tradition, and most Syriac witnesses.
      It was likely added by later scribes to harmonize with Jesus's words in Matthew
      6:15.
    reason: textual_critical
lexical_decisions:
- source_word: ἀφίημι
  chosen: forgive
  alternatives:
  - pardon
  - let go
  - remit
  lexicon: BDAG
  rationale: In the context of interpersonal offenses and divine judgment, 'forgive'
    is the standard and most accurate rendering for releasing someone from moral or
    legal obligation.
- source_word: παράπτωμα
  chosen: trespasses
  alternatives:
  - sins
  - transgressions
  - wrongdoings
  lexicon: BDAG
  rationale: Captures the nuance of a false step or deviation from the right path,
    distinguishing it from the more general word for sin (hamartia) while maintaining
    traditional English biblical resonance.
