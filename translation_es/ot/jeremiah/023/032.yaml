translation:
  language: es
  text: He aquí[a], yo estoy contra los que profetizan sueños mentirosos —declara Yahvé—, y los cuentan y hacen errar a mi pueblo con sus mentiras y con su imprudencia[b], aunque yo no los envié ni les di mandato. No le serán de ningún provecho a este pueblo, declara Yahvé.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «Mira». El hebreo introduce una declaración solemne de oposición; «He aquí» conserva mejor el tono profético.
    reason: alternative_reading
  - marker: b
    text: O «con su temeridad», «con su desenfreno» o «con su ligereza». El hebreo פַחֲזוּתָם es difícil y describe conducta irresponsable o presuntuosa.
    reason: lexical_alternative
lexical_decisions:
- source_word: הִנְנִי
  english_pob_choice: Behold, I am
  chosen_spanish: He aquí, yo estoy
  alternatives_spanish:
  - Mira, yo estoy
  - He aquí que yo estoy
  lexicon: HALOT
  rationale: La fórmula introduce una declaración solemne e inmediata de juicio. «He aquí» conserva mejor el tono profético que un marcador discursivo más neutro.
- source_word: עַל
  english_pob_choice: against
  chosen_spanish: contra
  alternatives_spanish:
  - sobre
  - acerca de
  lexicon: HALOT
  rationale: En la construcción הִנְנִי עַל, el sentido es de oposición hostil o intervención judicial; «contra» lo expresa con naturalidad en español.
- source_word: נִבְּאֵי חֲלֹמֹות שֶׁקֶר
  english_pob_choice: those who prophesy lying dreams
  chosen_spanish: los que profetizan sueños mentirosos
  alternatives_spanish:
  - los profetas de sueños falsos
  - los que profetizan sueños falsos
  lexicon: HALOT
  rationale: Se mantiene la construcción participial referida a un grupo por su actividad. «Sueños mentirosos» conserva más directamente שֶׁקֶר como cualidad de mentira/engaño, sin forzar una paráfrasis doctrinal.
- source_word: וַיְסַפְּרוּם
  english_pob_choice: and who tell them
  chosen_spanish: y los cuentan
  alternatives_spanish:
  - y los relatan
  - y los refieren
  lexicon: HALOT
  rationale: El sufijo pronominal remite a los sueños; «los cuentan» es natural en español para narrar sueños y mantiene el objeto expreso.
- source_word: וַיַּתְעוּ
  english_pob_choice: lead my people astray
  chosen_spanish: hacen errar a mi pueblo
  alternatives_spanish:
  - desvían a mi pueblo
  - engañan a mi pueblo
  lexicon: HALOT
  rationale: El verbo en causativo comunica hacer salir del camino. «Hacen errar» conserva tanto la idea de engaño como de desvío.
- source_word: בְּשִׁקְרֵיהֶם
  english_pob_choice: by their lies
  chosen_spanish: con sus mentiras
  alternatives_spanish:
  - por sus mentiras
  - mediante sus mentiras
  lexicon: HALOT
  rationale: La preposición instrumental puede darse como «con» o «por»; aquí «con sus mentiras» suena natural y conserva el medio por el cual engañan.
- source_word: וּבְפַחֲזוּתָם
  english_pob_choice: and their recklessness
  chosen_spanish: con su ligereza
  alternatives_spanish:
  - con su imprudencia
  - con su temeridad
  - con su desenfreno
  lexicon: HALOT
  rationale: El término hebreo es difícil y puede aludir a conducta presuntuosa, precipitada o irresponsable. «Ligereza» mantiene esa nota de falta de seriedad sin sobreespecificar.
- source_word: וְאָנֹכִי לֹא שְׁלַחְתִּים וְלֹא צִוִּיתִים
  english_pob_choice: though I did not send them or command them
  chosen_spanish: pero yo no los envié ni les di mandato
  alternatives_spanish:
  - pero yo no los envié ni los mandé
  - y yo no los envié ni les mandé
  lexicon: HALOT
  rationale: «Dar mandato» expresa el acto de comisión divina con claridad y dignidad; «enviar» conserva la dimensión de envío profético. El contraste adversativo respeta la fuerza del hebreo frente a sus afirmaciones falsas.
- source_word: וְהוֹעֵיל לֹא יוֹעִילוּ
  english_pob_choice: They do not profit this people at all
  chosen_spanish: y de ningún provecho serán para este pueblo
  alternatives_spanish:
  - y no beneficiarán en nada a este pueblo
  - y no servirán de nada a este pueblo
  lexicon: HALOT
  rationale: La construcción intensiva comunica inutilidad absoluta. «De ningún provecho serán» preserva el énfasis y suena apropiado en registro bíblico contemporáneo.
- source_word: לָעָם הַזֶּה
  english_pob_choice: this people
  chosen_spanish: este pueblo
  alternatives_spanish:
  - esta gente
  - esta nación
  lexicon: HALOT
  rationale: «Pueblo» refleja mejor el uso profético y el vínculo de alianza que «gente» o «nación».
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahveh
  lexicon: HALOT
  rationale: Se sigue el default del proyecto para el nombre divino, conservando el Tetragrámaton en forma auditable y no sustituida por «SEÑOR».
theological_decisions:
- issue: Nombre divino יְהוָה en fórmula profética
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahveh
  - SEÑOR
  rationale: El texto hebreo usa directamente el Nombre. En español, «Yahvé» mantiene la distinción del nombre de pacto y evita la máscara litúrgica «SEÑOR», conforme al marco doctrinal del proyecto.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Valor de פַחֲזוּתָם
  english_pob_reading: their recklessness
  chosen_spanish_reading: su ligereza
  alternative_spanish_readings:
  - su imprudencia
  - su temeridad
  - su desenfreno
  rationale: El hebreo es semánticamente difícil y admite varias matizaciones. «Ligereza» conserva la idea de conducta irresponsable o frívola sin fijarla indebidamente en un solo matiz moral.
  doctrine_reference: HALOT; revisión auditada del término difícil
- issue: Carácter de la frase final intensiva
  english_pob_reading: They do not profit this people at all
  chosen_spanish_reading: de ningún provecho serán para este pueblo
  alternative_spanish_readings:
  - no beneficiarán en nada a este pueblo
  - no servirán de nada a este pueblo
  rationale: La construcción hebrea intensifica la negación. La formulación elegida mantiene la fuerza absoluta del rechazo divino y su tono profético.
  doctrine_reference: HALOT; ver intensificación hebrea de infinitivo absoluto + verbo finito
translation_notes:
  revision_awareness: 'Se tuvo en cuenta la revisión auditada del inglés POB: se mantuvo el paralelismo de dos medios («con sus mentiras y con su ligereza») y se evitó añadir un equivalente de «So» al final; la conclusión se expresó como afirmación directa de inutilidad, siguiendo el hebreo intensivo.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como forma constante para יְהוָה.
  - Se conserva «pueblo» para עָם en registro profético.
  - «Hacen errar» reproduce el matiz causativo de causar extravío sin reducirlo solo a engaño intelectual.
  - «Sueños mentirosos» preserva la carga literal de שֶׁקֶר como sustantivo calificativo, en línea con la nota auditada del inglés.
