  from: We cannot go down unless our youngest brother is with us; then we will go down
  to: We cannot go down. If our youngest brother is with us, then we will go down
  rationale: 'The draft combines the initial statement (לֹא נוּכַל לָרֶדֶת) with the following condition (אִם יֵשׁ...) to form an ''unless'' clause. This is a good dynamic choice in isolation. However, the draft then also translates the subsequent result clause (וְיָרַדְנוּ) as ''then we will go down,'' which becomes tautological and awkward in English after the ''unless'' construction. The Hebrew presents these as two distinct rhetorical steps: a firm refusal, followed by the one condition that would change it. Separating the clauses as suggested (''We cannot go down. If...'') would be more faithful to the source''s structure and would resolve the English awkwardness.'
