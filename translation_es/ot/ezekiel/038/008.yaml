  language: en
  yaml_path: translation/ot/ezekiel/038/008.yaml
  text: After many days you will be summoned[a]; in the latter years you will come into a land restored from the sword, gathered from many peoples, upon the mountains of Israel, which had been a continual waste; but it was brought out from the peoples[b], and all of them will dwell securely.
  footnotes:
