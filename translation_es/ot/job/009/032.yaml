translation:
  language: es
  text: Porque él no es un hombre como yo[a], para que yo le responda, para que comparezcamos juntos ante el tribunal.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «para que yo le responda, para que comparezcamos juntos para juicio».'
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Ya que
  lexicon: HALOT
  rationale: Introduce la explicación de Job respecto de la imposibilidad que acaba de expresar. «Porque» conserva el valor causal/explicativo del hebreo y suena natural en español bíblico contemporáneo.
- source_word: לֹא אִישׁ
  english_pob_choice: he is not a man
  chosen_spanish: no es un hombre
  alternatives_spanish:
  - no es humano
  - no es una persona
  lexicon: HALOT
  rationale: «אִישׁ» aquí mantiene el contraste antropológico y forense entre Dios y un ser humano. «Hombre» preserva la forma masculina singular y la fuerza del contraste con el hablante.
- source_word: כָּמֹנִי
  english_pob_choice: like me
  chosen_spanish: como yo
  alternatives_spanish:
  - semejante a mí
  - igual que yo
  lexicon: HALOT
  rationale: La comparación directa es simple y personal; «como yo» reproduce bien la relación de semejanza sin añadir matices no presentes en el hebreo.
- source_word: אֶעֱנֶנּוּ
  english_pob_choice: that I should answer him
  chosen_spanish: para que yo le responda
  alternatives_spanish:
  - para que yo le conteste
  - para que yo le dé პასუხa
  lexicon: HALOT
  rationale: En este contexto legal, ענה significa responder en litigio o debate. «Responder» conserva mejor la resonancia forense que una formulación más libre.
- source_word: נָבוֹא יַחְדָּו
  english_pob_choice: that we should come together
  chosen_spanish: para que vengamos juntos
  alternatives_spanish:
  - para que nos presentemos juntos
  - para que acudamos juntos
  lexicon: HALOT
  rationale: El plural incluye a Job y a Dios en la escena judicial. «Vengamos juntos» expresa la comparecencia mutua de manera natural en español y conserva la idea de reunión compartida.
- source_word: יַחְדָּו
  english_pob_choice: together
  chosen_spanish: juntos
  alternatives_spanish:
  - juntamente
  - en conjunto
  lexicon: HALOT
  rationale: Adverbio que refuerza la mutualidad de la comparecencia. «Juntos» es la forma más clara y idiomática en español.
- source_word: בַּמִּשְׁפָּט
  english_pob_choice: in court
  chosen_spanish: en juicio
  alternatives_spanish:
  - en el tribunal
  - para juicio
  - en pleito
  lexicon: HALOT
  rationale: מִשְׁפָּט puede referirse al juicio/causa legal además del acto de juzgar. «En juicio» preserva la amplitud del término y mantiene el tono forense sin imponer una imagen institucional más específica que el hebreo.
theological_decisions:
- issue: Imposibilidad de litigar con Dios como igual
  english_pob_reading: 'Render the verse as a legal impossibility: God is not a human peer with whom Job can litigate in court.'
  chosen_spanish_reading: 'El versículo se traduce como una imposibilidad jurídica: Dios no es un hombre par suyo con quien Job pueda entrar en litigio.'
  alternative_spanish_readings:
  - Dios no es un ser humano con quien Job pueda pleitear
  - Job no puede comparecer con Dios como iguales
  rationale: El hebreo usa lenguaje de litigio, pero no exige una formulación doctrinal más amplia. «En juicio» mantiene la metáfora legal y la tensión entre la criatura y Dios sin convertirla en una paráfrasis abstracta.
  doctrine_reference: Translation philosophy §§1, 3, 6
- issue: Valor de אִישׁ en contraste con el hablante
  english_pob_reading: Use 'man' in the main text.
  chosen_spanish_reading: Usar «hombre» en el texto principal.
  alternative_spanish_readings:
  - persona
  - ser humano
  rationale: La forma hebrea es masculina singular y la comparación es personal y judicial. «Hombre» conserva esa precisión sin neutralizar indebidamente el contraste.
  doctrine_reference: Translation philosophy §4
translation_notes:
  revision_awareness: Revisado contra el texto hebreo WLC y el audit trail inglés; no se detectaron cambios textuales adicionales en la última pasada, por lo que la redacción española sigue de cerca la estructura forense del original.
  spanish_consistency_notes:
  - Se mantiene «Dios» para אֱלֹהִים por coherencia con el paquete terminológico del proyecto.
  - Se evita «SEÑOR» porque el verso no contiene יהוה ni una cita directa del nombre divino.
  - «Juicio» conserva el campo semántico de מִשְׁפָּט sin sobrerdeterminarlo como tribunal institucional.
