translation:
  language: es
  text: Abraham dio a Isaac todo lo que tenía[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, más literalmente: «todo lo que era suyo».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּתֵּן
  english_pob_choice: gave
  chosen_spanish: dio
  alternatives_spanish:
  - entregó
  - le dio
  lexicon: HALOT / נתן
  rationale: El verbo básico נתן se traduce naturalmente con 'dar'. En español narrativo, 'dio' conserva el tiempo pasado simple y la naturalidad de la acción sin añadir matices de transferencia legal que el hebreo no exige aquí.
- source_word: אַבְרָהָם
  english_pob_choice: Abraham
  chosen_spanish: Abraham
  lexicon: Nombre propio
  rationale: Se mantiene la transliteración estándar del nombre propio.
- source_word: כָּל אֲשֶׁר לוֹ
  english_pob_choice: all that he had
  chosen_spanish: todo lo que tenía
  alternatives_spanish:
  - todo lo que era suyo
  - todo lo que poseía
  - todo lo que tenía para sí
  lexicon: HALOT / כָּל אֲשֶׁר לְ
  rationale: La frase hebrea significa 'todo lo que le pertenecía'. En español, 'todo lo que tenía' reproduce bien el alcance total de la posesión de Abraham con una formulación natural y fiel al registro del texto.
- source_word: לְיִצְחָק
  english_pob_choice: to Isaac
  chosen_spanish: a Isaac
  alternatives_spanish:
  - para Isaac
  lexicon: Preposición ל + nombre propio
  rationale: La ל marca aquí al destinatario. 'A Isaac' expresa con claridad el objeto indirecto en español y corresponde al valor básico del hebreo.
translation_notes:
  revision_awareness: La revisión inglesa pasó de 'everything he had' a 'all that he had' para ajustar el hebreo כָּל אֲשֶׁר־לוֹ a una forma más formal y literal. La versión española conserva esa misma relación semántica con 'todo lo que tenía', evitando una paráfrasis más amplia.
  spanish_consistency_notes:
  - Se mantiene 'Abraham' y 'Isaac' como nombres propios estándar.
  - Se evita 'entregó' porque podría sonar más jurídico o solemne de lo que exige el hebreo narrativo simple.
  - La nota al pie preserva la alternativa más literal que el audit trail inglés documenta.
