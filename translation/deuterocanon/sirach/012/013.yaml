translation:
  text: Do not set him beside you[a], lest he push you aside and stand in your place.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Greek: ''Who will pity a snake-charmer bitten by a snake, and all who approach wild beasts?'' The Greek witness reflects a substantially different reading at this point.'
    reason: alternative_reading
lexical_decisions:
- source_word: אַל תַּעֲמִידֵהוּ
  chosen: Do not set him up
  alternatives:
  - Do not station him
  - Do not place him
  - Do not let him stand
  lexicon: HALOT
  rationale: From עמד in the Hiphil, meaning to cause to stand or set in position. 'Set him up' fits the warning against giving an enemy a position or standing near oneself, while remaining idiomatic in English.
- source_word: אֶצְלֶךָ
  chosen: beside you
  alternatives:
  - near you
  - with you
  - at your side
  lexicon: HALOT
  rationale: אצל commonly denotes proximity. 'Beside you' preserves the spatial metaphor and fits the social/political sense of placing someone close.
- source_word: לָמָּה
  chosen: lest
  alternatives:
  - otherwise
  - for why
  - so that not
  lexicon: HALOT
  rationale: Although literally 'why?', in context it introduces the undesirable consequence to be avoided. English 'lest' captures the warning force naturally without over-paraphrase.
- source_word: יֶהְדָּפְךָ
  chosen: he push you aside
  alternatives:
  - he drive you away
  - he thrust you out
  - he pursue you
  lexicon: HALOT
  rationale: From הדף, to push, thrust, or drive away. Given the parallel with 'take your place,' the sense is displacement rather than pursuit. 'Push you aside' conveys both physical and figurative removal.
- source_word: וְיֲַעמֹד
  chosen: and take
  alternatives:
  - and stand
  - and establish himself
  - and remain standing
  lexicon: HALOT
  rationale: Literally 'and he will stand,' but in context with תַּחְתֶּיךָ the idiomatic sense is that he stands in the position that was yours. Rendering as 'take' makes the implied displacement explicit while staying close to the Hebrew image.
- source_word: תַּחְתֶּיךָ
  chosen: your place beneath you
  alternatives:
  - under you
  - in your stead
  - below you
  lexicon: HALOT
  rationale: תחת can mean 'under' spatially or 'in place of' contextually. Here the warning is about replacement in status or position. 'Your place beneath you' preserves the Hebrew's spatial wording while signaling substitution.
