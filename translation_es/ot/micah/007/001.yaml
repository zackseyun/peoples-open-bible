    issue: La nota [a] repite la lectura principal en vez de preservar la alternativa documentada.
    rationale: El inglés POB da como alternativa 'Alas for me!'; en español la nota debería ofrecer una alternativa real, p. ej. '¡Ay de mí!' / '¡Ay por mí!' según la elección principal, no duplicar exactamente el texto base.
  - severity: medium
    issue: '''Higo temprano'' no transmite con suficiente precisión el matiz de ''first-ripe fig''.'
    rationale: La decisión inglesa subraya el valor de בִּכּוּרָה como 'first-ripe', probablemente un higo temprano apreciado. 'Primer higo maduro' preserva mejor ese matiz sin volverse oscuro.
  - severity: low
    issue: '''No hay racimo que comer'' es menos idiomático en español.'
    rationale: '''No hay racimo para comer'' suena más natural y conserva el mismo sentido de escasez.'
