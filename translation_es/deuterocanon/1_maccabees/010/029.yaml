translation:
  language: es
  text: Y concederemos[a] muchas remisiones, y les daremos dones. Y ahora los libero y eximo a todos los judíos de los impuestos, del gravamen[b] de la sal, y de los tributos de la corona[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'También: «exenciones» para ἀφέματα πολλά; el sentido aquí es de alivio o remisión de cargas fiscales.'
    reason: lexical_alternative
  - marker: b
    text: La expresión τιμῆς τοῦ ἁλός probablemente alude a una tasa o cargo vinculado con la sal.
    reason: cultural_note
  - marker: c
    text: «Tributos de la corona» traduce στεφάνων, literalmente «coronas», término usado para un tributo real o su equivalente monetario.
    reason: cultural_note
lexical_decisions:
- source_word: ἀφήσομεν
  english_pob_choice: we will grant
  chosen_spanish: concederemos
  alternatives_spanish:
  - otorgaremos
  - concederemos una remisión
  lexicon: LSJ
  rationale: En este contexto fiscal-administrativo, ἀφήσομεν introduce concesiones oficiales, no una acción sobre personas. «Concederemos» comunica el carácter formal de la medida sin perder naturalidad en español.
- source_word: ἀφέματα
  english_pob_choice: remissions
  chosen_spanish: remisiones
  alternatives_spanish:
  - exenciones
  - condonaciones
  - perdones
  lexicon: LSJ
  rationale: El sustantivo se refiere aquí a la liberación de cargas o deudas. «Remisiones» conserva el valor administrativo y evita la lectura religiosa de «perdones».
- source_word: δόματα
  english_pob_choice: gifts
  chosen_spanish: dones
  alternatives_spanish:
  - regalos
  - obsequios
  lexicon: LSJ
  rationale: «Dones» expresa bien lo que el rey otorga y mantiene un registro algo más solemne que «regalos», adecuado al tono oficial del pasaje.
- source_word: ἀπολύω
  english_pob_choice: I release
  chosen_spanish: los libero
  alternatives_spanish:
  - los suelto
  - los despido
  lexicon: BDAG
  rationale: El verbo tiene aquí fuerza jurídica de liberación o relevo de obligaciones. «Los libero» conserva esa formalidad y encaja con el decreto.
- source_word: ἀφίημι
  english_pob_choice: exempt
  chosen_spanish: eximo
  alternatives_spanish:
  - remito
  - libero
  lexicon: BDAG
  rationale: Con complemento fiscal, ἀφίημι significa dejar libre de cargas. «Eximo» hace explícita la exención de impuestos y tributos sin sobrecargar el sentido.
- source_word: φόρων
  english_pob_choice: taxes
  chosen_spanish: impuestos
  alternatives_spanish:
  - tributos
  - tasas
  lexicon: LSJ
  rationale: «Impuestos» es el equivalente contemporáneo más claro para pagos obligatorios al estado.
- source_word: τιμῆς τοῦ ἁλός
  english_pob_choice: salt duty
  chosen_spanish: gravamen de la sal
  alternatives_spanish:
  - impuesto de la sal
  - tributo de la sal
  lexicon: LSJ
  rationale: La expresión sugiere un cobro o carga relacionada con la sal. «Gravamen de la sal» preserva la ambigüedad del griego y el carácter fiscal, sin fijar indebidamente la naturaleza exacta del cargo.
- source_word: στεφάνων
  english_pob_choice: crown levies
  chosen_spanish: tributos de la corona
  alternatives_spanish:
  - cargas de la corona
  - impuestos de la corona
  - tributos coronarios
  lexicon: LSJ
  rationale: En contexto helenístico, στεφάνων puede referir tributo real o su equivalente monetario. «Tributos de la corona» mantiene la referencia al poder real y comunica la carga fiscal en español.
translation_notes:
  revision_awareness: Se corrigió la validación anterior asegurando que cada marcador de nota aparezca exactamente en el texto español. Además, se ajustó el primer verbo para que la nota [a] ancle de forma explícita la alternativa lexical correspondiente.
  spanish_consistency_notes:
  - Se mantuvo el registro administrativo-fiscal de todo el versículo.
  - «Eximo» y «libero» se diferenciaron para reflejar dos verbos griegos distintos.
  - Se prefirió un equivalente claro y neutral para φόρων y στεφάνων, sin introducir terminología eclesiástica.
  - Las notas [a] y [b] están ancladas en el texto y no se reutilizan.
