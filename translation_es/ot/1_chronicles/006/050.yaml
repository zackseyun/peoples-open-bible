review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura general del hebreo: reparto por sorteo desde las tribus de Judá, Simeón y Benjamín, seguido de la referencia a las ciudades nombradas. Sin embargo, «E hicieron por sorteo» no representa fielmente וַיִּתְּנוּ en este contexto distributivo; el sentido es «asignaron» o «dieron en asignación», no simplemente «hicieron». Además, «que fueron llamadas por nombre» introduce una pasiva no presente en el hebreo/POB y suena menos natural en español que una formulación activa o una alternativa explicativa en nota.'
  spanish_quality_summary: 'La redacción actual es comprensible pero tiene dos problemas de naturalidad: «E hicieron por sorteo» es poco idiomático y opaco, y «que fueron llamadas por nombre» suena forzado. También conviene evitar la conjunción inicial «E» aquí, ya que no hay razón fonética para preferirla sobre «Y». Una revisión mínima puede conservar el apego formal al hebreo y mejorar bastante la legibilidad.'
  glossary_alignment: La terminología tribal («tribu», «hijos de Judá/Simeón/Benjamín») está bien alineada con el proyecto y con el rastro léxico inglés. No hay términos teológicos conflictivos. La principal desalineación es léxica-sintáctica en וַיִּתְּנוּ y en la cláusula formulaica אֲשֶׁר יִקְרְאוּ אֶתְהֶם בְּשֵׁמוֹת.
  issues:
  - severity: high
    issue: «E hicieron por sorteo» para וַיִּתְּנוּ בַגּוֹרָל
    rationale: נתן en este contexto de distribución de ciudades significa asignar/dar en reparto. «Hicieron por sorteo» no expresa el objeto distribuido y oscurece el sentido administrativo presente en el hebreo y en el English POB («They assigned by lot»).
  - severity: medium
    issue: Uso de pasiva en «que fueron llamadas por nombre»
    rationale: El hebreo usa un verbo activo plural «llamaron»; la pasiva no es necesaria y en español suena más rígida. Una forma como «que llamaron por nombre» preserva mejor la forma verbal y la relación con la nota alternativa.
  - severity: low
    issue: Conjunción inicial «E»
    rationale: En español moderno corresponde «Y» antes de «asignaron». «E» solo se usa antes de sonido /i/; aquí no aplica.
  revised_spanish_text: Y asignaron por sorteo, de la tribu de los hijos de Judá[a], y de la tribu de los hijos de Simeón, y de la tribu de los hijos de Benjamín, estas ciudades, que llamaron por nombre.
  revised_footnotes:
  - marker: a
    text: 'O, más dinámicamente: «estas ciudades, que están listadas por nombre». El hebreo usa literalmente el verbo «llamar» con «por nombres», una fórmula que introduce el listado nominal que sigue.'
    reason: lexical_alternative
  revision_rationale: Se reemplaza «hicieron» por «asignaron» para reflejar fielmente el valor distributivo de נתן en contexto de reparto por sorteo. Se cambia la pasiva «fueron llamadas» por el activo «llamaron» para seguir mejor la forma hebrea y mejorar la naturalidad del español. Se ajusta «E» a «Y» por norma ortográfica y fonética del español.
