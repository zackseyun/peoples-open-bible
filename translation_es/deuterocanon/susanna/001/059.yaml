translation:
  language: es
  text: 'Entonces Daniel le dijo: «Tú también has mentido bien contra tu propia cabeza; porque el ángel de Dios está al lado, con la espada para partirte en dos, para que los destruya[a]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El pronombre final en griego es plural, indicando que la destrucción amenazada se extiende a ambos ancianos, no solo al que está siendo interpelado en ese momento.
    reason: alternative_reading
lexical_decisions:
- source_word: Ὀρθῶς
  english_pob_choice: rightly
  chosen_spanish: con justicia
  alternatives_spanish:
  - rectamente
  - bien
  - correctamente
  lexicon: LSJ
  rationale: 'El adverbio expresa una ironía judicial: la mentira ha recaído sobre el culpable con justo juicio. «Con justicia» conserva mejor en español esa fuerza evaluativa que un simple «correctamente» o «bien».'
- source_word: ἔψευσαι
  english_pob_choice: have lied
  chosen_spanish: has mentido
  alternatives_spanish:
  - has dicho falsedad
  - has hablado falsamente
  lexicon: BDAG
  rationale: 'El aoristo medio de ψεύδομαι se traduce de forma natural en español como una acusación directa en perfecto: «has mentido».'
- source_word: εἰς τὴν σεαυτοῦ κεφαλήν
  english_pob_choice: against your own head
  chosen_spanish: contra tu propia cabeza
  alternatives_spanish:
  - sobre tu propia cabeza
  - para tu propio mal
  lexicon: LSJ
  rationale: 'La imagen idiomática se mantiene de manera literal y comprensible: el daño o culpa vuelve sobre el mismo sujeto. «Contra tu propia cabeza» conserva la concreción del griego.'
- source_word: μένει
  english_pob_choice: stands by
  chosen_spanish: está al lado
  alternatives_spanish:
  - permanece
  - está esperando
  - está de pie
  lexicon: BDAG
  rationale: El verbo aquí expresa permanencia y disponibilidad inmediata para actuar. «Está al lado» refleja esa presencia cercana sin introducir la idea de espera, que la revisión inglesa decidió atenuar.
- source_word: ὁ ἄγγελος τοῦ θεοῦ
  english_pob_choice: the angel of God
  chosen_spanish: el ángel de Dios
  alternatives_spanish:
  - el ángel de Yahvé
  - el mensajero de Dios
  lexicon: BDAG
  rationale: Se conserva la designación formal del texto griego. En este versículo la expresión es genérica y no requiere sustituirla por Yahvé.
- source_word: τὴν ῥομφαίαν ἔχων
  english_pob_choice: holding the sword
  chosen_spanish: con la espada
  alternatives_spanish:
  - portando la espada
  - teniendo la espada
  lexicon: BDAG
  rationale: El participio se vierte de forma natural en español como una frase adjetival instrumental. «Con la espada» mantiene la imagen sin pesadez sintáctica.
- source_word: πρίσαι
  english_pob_choice: to split you in two
  chosen_spanish: para partirte en dos
  alternatives_spanish:
  - para dividirte en dos
  - para seccionarte en dos
  lexicon: LSJ
  rationale: El verbo literalmente tiene la idea de «serrar». «Partirte en dos» comunica la violencia de la imagen en un español claro y sobrio.
- source_word: μέσον
  english_pob_choice: in two
  chosen_spanish: en dos
  alternatives_spanish:
  - por la mitad
  - por en medio
  lexicon: LSJ
  rationale: 'Se mantiene la complementación natural con el verbo de división: «en dos».'
- source_word: ἐξολεθρεύσῃ
  english_pob_choice: destroy
  chosen_spanish: destruya
  alternatives_spanish:
  - aniquile
  - arrase
  - extermine
  lexicon: BDAG
  rationale: El verbo denota destrucción completa. «Destruya» es suficientemente solemne y evita matices excesivamente coloquiales o técnicos.
- source_word: ὑμᾶς
  english_pob_choice: you
  chosen_spanish: os
  alternatives_spanish:
  - los destruya a ustedes
  - los destruya
  lexicon: BDAG
  rationale: El pronombre plural del griego se refleja explícitamente en español con «os», para conservar la extensión del juicio a los dos ancianos, como indica la nota inglesa.
theological_decisions:
- issue: Alcance plural de ὑμᾶς al final de la frase
  english_pob_reading: retain singular address in the speech while translating the final object idiomatically as 'you' and noting the plural force
  chosen_spanish_reading: mantener la dirección singular a un interlocutor y hacer explícito en el final el plural con «os»
  alternative_spanish_readings:
  - «para que te destruya»
  - «para que os destruya a ambos»
  rationale: El texto dirige la reprensión al hombre presente, pero el cierre pasa al plural y abarca a los dos ancianos. El español puede preservar esa tensión sin suavizarla ni resolverla, usando «te» en la acusación y «os» en la conclusión.
  doctrine_reference: Preservar la tensión textual documentada; no armonizar indebidamente el número gramatical.
translation_notes:
  revision_awareness: 'La redacción española sigue el último estado auditado del inglés POB: se prefirió una formulación más formal para la apertura («Tú también») y una equivalencia menos interpretativa para μένει. La versión española refleja esa misma economía, evitando añadir la idea de espera y conservando el alcance plural del cierre.'
  spanish_consistency_notes:
  - Se usa «Dios» para θεοῦ y no se introduce una equivalencia litúrgica distinta.
  - Se conserva el tono judicial e irónico del griego con «con justicia».
  - 'La imagen violenta de πρίσαι/μέσον se mantiene literal y clara: «partirte en dos».'
  - El pronombre plural final se hace visible con «os» para no perder la lectura documentada.
