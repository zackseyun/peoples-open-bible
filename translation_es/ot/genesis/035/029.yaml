translation:
  language: es
  text: Entonces Isaac exhaló su último aliento y murió[a], y fue reunido con su pueblo, anciano y colmado de días. Y Esaú y Jacob, sus hijos, lo enterraron.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «fue reunido con sus antepasados / parientes». La expresión hebrea es una fórmula convencional de muerte y puede implicar más que el entierro físico.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּגְוַע
  english_pob_choice: breathed his last
  chosen_spanish: exhaló su último aliento
  alternatives_spanish:
  - expiró
  - entregó el espíritu
  lexicon: HALOT
  rationale: גוּע en avisos de muerte suele expresar la expiración o el último aliento. «Exhaló su último aliento» conserva el matiz idiomático y evita confundirlo con el verbo siguiente «murió».
- source_word: וַיָּמָת
  english_pob_choice: died
  chosen_spanish: murió
  alternatives_spanish:
  - falleció
  - estaba muerto
  lexicon: HALOT
  rationale: מוּת es el verbo normal para morir. «Murió» reproduce con claridad la secuencia hebrea sin añadir explicación.
- source_word: וַיֵּאָסֶף אֶל־עַמָּיו
  english_pob_choice: was gathered to his people
  chosen_spanish: fue reunido con su pueblo
  alternatives_spanish:
  - fue reunido con sus parientes
  - fue reunido con sus antepasados
  lexicon: HALOT
  rationale: La expresión es una fórmula convencional de muerte. «Con su pueblo» mantiene la forma y la ambigüedad teológica/familiar del hebreo; «reunido» preserva el pasivo y el carácter formular.
- source_word: זָקֵן
  english_pob_choice: old
  chosen_spanish: viejo
  alternatives_spanish:
  - anciano
  - de edad avanzada
  lexicon: HALOT
  rationale: Adjetivo directo en la nota mortuoria. «Viejo» es claro y natural en español, sin perder la fuerza descriptiva.
- source_word: וּשְׂבַע יָמִים
  english_pob_choice: full of days
  chosen_spanish: lleno de días
  alternatives_spanish:
  - saciado de días
  - colmado de días
  lexicon: HALOT
  rationale: Se trata de un modismo patriarcal de plenitud vital. «Lleno de días» conserva la textura idiomática del hebreo mejor que una paráfrasis explicativa.
- source_word: וַיִּקְבְּרוּ אֹתוֹ
  english_pob_choice: buried him
  chosen_spanish: lo enterraron
  alternatives_spanish:
  - lo sepultaron
  - lo inhumaron
  lexicon: HALOT
  rationale: קבר significa enterrar. «Lo enterraron» es directo y comprensible, y mantiene el estilo narrativo simple del relato.
- source_word: עֵשָׂו וְיַעֲקֹב בָּנָיו
  english_pob_choice: Esau and Jacob, his sons
  chosen_spanish: Esaú y Jacob, sus hijos
  alternatives_spanish:
  - sus hijos Esaú y Jacob
  - Esaú y Jacob, los hijos de él
  lexicon: HALOT
  rationale: La aposición identifica a los que lo enterraron. Se conserva el orden natural en español y la relación filial explícita.
theological_decisions:
- issue: Sentido de «fue reunido con su pueblo»
  english_pob_reading: Retained as a literal formula without specifying whether it refers to burial, reunion with ancestors, or an afterlife state.
  chosen_spanish_reading: Se mantiene como fórmula literal, sin decidir si alude a sepultura familiar, reunión con los antepasados o a un estado posterior a la muerte.
  alternative_spanish_readings:
  - fue enterrado con los suyos
  - fue reunido con sus antepasados
  - pasó a la presencia de sus mayores
  rationale: El hebreo deja abierta la referencia exacta, y la traducción no debe resolverla. «Con su pueblo» preserva la tensión lexical y teológica documentada en el texto fuente y en el audit trail inglés.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: 'El pasaje coincide plenamente con el audit trail inglés más reciente: no hubo revisiones aplicadas y el control cruzado indicó alta concordancia (agreement_score 1.0). La redacción española sigue la misma segmentación semántica y conserva la ambigüedad de la fórmula de muerte.'
  spanish_consistency_notes:
  - Se prefirió «Yahvé» como término por defecto para el nombre divino, pero este versículo no lo contiene.
  - Se mantuvo «hijos» para בָּנָיו, de acuerdo con el contexto inmediato y la apposición explicativa del hebreo.
  - La secuencia verbal reproduce el encadenamiento narrativo breve del hebreo sin introducir conectores interpretativos adicionales.
