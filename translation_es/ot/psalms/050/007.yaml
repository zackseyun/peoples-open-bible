translation:
  language: es
  text: 'Escucha[a], mi pueblo, y hablaré; Israel, y testificaré contra ti: yo soy Dios, tu Dios.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, «y daré testimonio contra ti». El verbo hebreo tiene fuerza legal-testimonial.
    reason: lexical_alternative
lexical_decisions:
- source_word: שִׁמְעָה
  english_pob_choice: Hear
  chosen_spanish: Escucha
  alternatives_spanish:
  - Oye
  - Oíd
  lexicon: HALOT
  rationale: El imperativo pide atención activa. «Escucha» conserva el llamado solemne y resulta natural en español; «Oíd» sonaría más arcaico y «oye» demasiado coloquial para este contexto judicial-covenantal.
- source_word: עַמִּי
  english_pob_choice: my people
  chosen_spanish: mi pueblo
  alternatives_spanish:
  - mi gente
  - mi pueblo, mi pueblo
  lexicon: HALOT
  rationale: La forma posesiva expresa pertenencia y relación de pacto. «Pueblo» conserva mejor el matiz colectivo y bíblico que «gente».
- source_word: וַאֲדַבֵּרָה
  english_pob_choice: and I will speak
  chosen_spanish: y hablaré
  alternatives_spanish:
  - y hablaré yo
  - y que yo hable
  lexicon: HALOT
  rationale: El cohortativo hebreo aporta intención o resolución. En español, «hablaré» transmite con sobriedad ese impulso volitivo sin sobrecargar la frase; no hace falta explicitar más la modalidad.
- source_word: יִשְׂרָאֵל
  english_pob_choice: Israel
  chosen_spanish: oh Israel
  alternatives_spanish:
  - Israel
  - ¡Israel!
  lexicon: HALOT
  rationale: El hebreo funciona como vocativo en aposición. «Oh Israel» reproduce la apelación directa con tono formal y evita que suene como un mero sujeto añadido.
- source_word: וְאָעִידָה בָּךְ
  english_pob_choice: and I will testify against you
  chosen_spanish: y testificaré contra ti
  alternatives_spanish:
  - y daré testimonio contra ti
  - y seré testigo contra ti
  lexicon: HALOT
  rationale: El verbo עוּד aquí tiene fuerza legal-testimonial. «Testificaré contra ti» conserva el valor forense y la oposición implícita de בְּ + sufijo; «daré testimonio» sería posible, pero «testificaré» mantiene mejor la formulación bíblica sin volverla eclesiástica.
- source_word: אֱלֹהִים
  english_pob_choice: God
  chosen_spanish: Dios
  alternatives_spanish:
  - el Dios
  - divinidad
  lexicon: HALOT
  rationale: Aquí el término es singular de referencia divina. «Dios» es la equivalencia directa y evita introducir artículos o matices innecesarios.
- source_word: אֱלֹהֶיךָ
  english_pob_choice: your God
  chosen_spanish: tu Dios
  alternatives_spanish:
  - el Dios tuyo
  - tu propio Dios
  lexicon: HALOT
  rationale: La forma con sufijo de segunda persona mantiene el lenguaje de pacto. «Tu Dios» es la traducción natural y precisa.
- source_word: אָנֹכִי
  english_pob_choice: I am
  chosen_spanish: yo soy
  alternatives_spanish:
  - soy yo
  - yo
  lexicon: HALOT
  rationale: La identificación enfática hebrea exige una cópula implícita en español. «Yo soy» conserva el énfasis de la autodeclaración y se integra bien con la frase nominal siguiente.
theological_decisions:
- issue: 'Identificación divina enfática: אֱלֹהִים אֱלֹהֶיךָ אָנֹכִי'
  english_pob_reading: I am God, your God
  chosen_spanish_reading: yo soy Dios, tu Dios
  alternative_spanish_readings:
  - Dios, tu Dios, soy yo
  - yo soy Dios—tu Dios
  rationale: El hebreo es una identificación enfática y relacional, no una mera ecuación conceptual. «Yo soy Dios, tu Dios» preserva la solemnidad, la autoafirmación divina y la fórmula de pacto sin introducir palabras ajenas al texto.
  doctrine_reference: Affirmations; Translation philosophy §§1, 6
- issue: Valor legal-testimonial de וְאָעִידָה בָּךְ
  english_pob_reading: and I will testify against you
  chosen_spanish_reading: y testificaré contra ti
  alternative_spanish_readings:
  - y daré testimonio contra ti
  - y seré testigo contra ti
  rationale: El contexto es de acusación y juicio pactual. La lectura elegida mantiene la dimensión forense que el POB inglés marcó con «testify against you» y evita suavizar el pasaje hacia una simple advertencia.
  doctrine_reference: Legal/forensic imagery in prophetic covenant lawsuit passages
translation_notes:
  revision_awareness: El texto inglés auditado pasó de omitir el vocativo explícito a añadir «O» antes de Israel para reflejar mejor la apelación directa. En español se ha resuelto de forma equivalente con «oh Israel», manteniendo el tono vocativo y la solemnidad del llamado. También se ha preservado la decisión del POB de entender el verbo final en sentido forense.
  spanish_consistency_notes:
  - Se mantuvo «Dios» para אֱלֹהִים por tratarse de una referencia singular al hablante divino.
  - Se evitó «SEÑOR» porque el hebreo aquí dice אֱלֹהִים, no יהוה.
  - Se prefirió «testificar» sobre «ser testigo» por su mayor cercanía al acto judicial implícito.
  - Se usó «oh Israel» para reflejar el vocativo sin caer en arcaísmo excesivo.
