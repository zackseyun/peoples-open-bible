translation:
  language: es
  text: ¿Por qué se da[a] luz al afligido[b], y vida a los amargados de alma[c]?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «¿Por qué da él luz…?». El hebreo tiene un verbo activo singular («da») pero no expresa el sujeto; en contexto probablemente se implica a Dios, aunque no se lo nombra.'
    reason: alternative_reading
  - marker: b
    text: 'O: «al miserable». El hebreo עָמֵל permite un matiz más amplio y también puede referirse al agobiado, atribulado o afligido.'
    reason: alternative_reading
  - marker: c
    text: 'O: «amargados en el alma» o «amargados de espíritu». Se conserva «alma» porque נָפֶשׁ aquí designa el interior de la persona.'
    reason: lexical_alternative
lexical_decisions:
- source_word: לָמָּה
  english_pob_choice: Why
  chosen_spanish: ¿Por qué
  alternatives_spanish:
  - ¿Por qué razón
  - ¿A qué viene que
  lexicon: HALOT
  rationale: La pregunta interrogativa abre el lamento con naturalidad en español y conserva la fuerza directa del hebreo.
- source_word: יִתֵּן
  english_pob_choice: is given
  chosen_spanish: se da
  alternatives_spanish:
  - da
  - es dado
  lexicon: HALOT
  rationale: El hebreo usa una forma verbal activa sin sujeto explícito. En español, la pasiva refleja mantiene el sujeto implícito y evita introducir prematuramente a Dios como agente explícito.
- source_word: לְעָמֵל
  english_pob_choice: to the troubled
  chosen_spanish: al afligido
  alternatives_spanish:
  - al atribulado
  - al miserable
  - al fatigado
  lexicon: HALOT
  rationale: עָמֵל puede abarcar dolor, miseria o aflicción. En este contexto de lamento, 'afligido' comunica sufrimiento real sin estrechar demasiado el matiz.
- source_word: אוֹר
  english_pob_choice: light
  chosen_spanish: luz
  alternatives_spanish:
  - claridad
  - resplandor
  lexicon: HALOT
  rationale: Se conserva la imagen poética literal de 'luz', que en el contexto funciona como metáfora de existencia continuada.
- source_word: וְחַיִּים
  english_pob_choice: and life
  chosen_spanish: y vida
  alternatives_spanish:
  - y vivir
  lexicon: HALOT
  rationale: Aunque el hebreo es morfológicamente plural, el sentido idiomático es 'vida'. 'Vida' suena natural y preserva el paralelismo con 'luz'.
- source_word: לְמָרֵי נָפֶשׁ
  english_pob_choice: to the bitter in soul
  chosen_spanish: a los amargados de alma
  alternatives_spanish:
  - a los amargados en el alma
  - a los de alma amarga
  - a los amargados de espíritu
  lexicon: HALOT
  rationale: La expresión hebrea significa literalmente 'a los amargos de alma'. 'Amargados de alma' conserva el giro idiomático y la intensidad emocional sin sustituir 'alma' por 'espíritu', ya que נֶפֶשׁ aquí apunta al interior de la persona.
theological_decisions:
- issue: Sujeto implícito de יִתֵּן
  english_pob_reading: Leave the giver implicit by using English passive ('is given').
  chosen_spanish_reading: Mantener el dador implícito mediante la pasiva refleja 'se da'.
  alternative_spanish_readings:
  - ¿Por qué da Dios luz...?
  - ¿Por qué él da luz...?
  rationale: El hebreo no nombra al dador. La pasiva refleja en español preserva esa indeterminación y, con ella, la tensión del lamento de Job, sin resolverla demasiado pronto.
  doctrine_reference: 'Translation philosophy #3: Preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: Coincide con la última revisión disponible, que no introdujo cambios y fue marcada como de alta concordancia.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' cuando el contexto requiera el nombre divino; aquí el verso no lo nombra explícitamente.
  - Se preserva el paralelismo poético entre 'luz' y 'vida' sin explicitar la metáfora.
  - Se usa 'alma' para נֶפֶשׁ por la evidencia contextual, evitando 'espíritu' en ausencia de una señal más fuerte.
