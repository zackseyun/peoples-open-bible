id: 1TH.2.10
reference: 1 Thessalonians 2:10
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: ὑμεῖς μάρτυρες καὶ ὁ θεός, ὡς ὁσίως καὶ δικαίως καὶ ἀμέμπτως ὑμῖν τοῖς πιστεύουσιν ἐγενήθημεν,
base_translation:
  language: en
  yaml_path: translation/nt/1_thessalonians/002/010.yaml
  text: You are witnesses[a], and God also, how devoutly and righteously and blamelessly we behaved toward you who believe[b],
  footnotes:
  - marker: a
    text: Or 'holily' for 'devoutly.' The Greek term emphasizes pious conduct before God.
    reason: lexical_alternative
  - marker: b
    text: Or 'among you who believe' instead of 'toward you who believe.'
    reason: lexical_alternative
translation:
  language: ko
  text: 여러분이 증인이며 하나님도 증인이십니다. 우리가 믿는 여러분에게[b] 얼마나 거룩하고[a] 의롭고 흠 없이 행하였는지를.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 또는 「경건하게」. 헬라어 ὁσίως는 하나님 앞에서의 경건한 행실을 강조한다.
    reason: lexical_alternative
  - marker: b
    text: 또는 「믿는 여러분 가운데서」.
    reason: lexical_alternative
lexical_decisions:
- source_word: ὑμεῖς μάρτυρες καὶ ὁ θεός
  english_pob_choice: You are witnesses, and God also
  chosen_korean: 여러분이 증인이며 하나님도 증인이십니다
  alternatives_korean:
  - 여러분과 하나님이 증인이십니다
  lexicon: BDAG
  rationale: 한국어 합쇼체에서는 두 주어를 분리해 「~이며 ~이십니다」로 명확히 한다. 하나님께는 경어 「~이십니다」를 사용한다.
- source_word: ὁσίως
  english_pob_choice: devoutly
  chosen_korean: 거룩하고
  alternatives_korean:
  - 경건하게
  - 신실하게
  lexicon: BDAG
  rationale: ὅσιος는 하나님 앞에서의 거룩·경건. 「거룩하고」가 한국 교회 전통에서 표준 등가어이며 「의롭고」와 짝을 이룬다.
- source_word: ἀμέμπτως
  english_pob_choice: blamelessly
  chosen_korean: 흠 없이
  alternatives_korean:
  - 책망 없이
  - 비난 받을 일 없이
  lexicon: BDAG
  rationale: 「흠 없이」가 한국 교회 전통의 표준 등가어이며 간결하다.
- source_word: ὑμῖν τοῖς πιστεύουσιν
  english_pob_choice: toward you who believe
  chosen_korean: 믿는 여러분에게
  alternatives_korean:
  - 믿는 여러분 가운데서
  - 신자인 여러분에게
  lexicon: BDAG
  rationale: 여격을 「~에게」로 옮겨 행위의 대상을 명확히 한다.
