translation:
  language: es
  text: Yahvé será temible[a] contra ellos, porque hará que se consuman todos los dioses de la tierra; y se postrarán ante él, cada uno desde su propio lugar, todas las costas[b] de las naciones.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «será para temor». El hebreo expresa que Yahvé inspira temor o sobrecogimiento.
    reason: lexical_alternative
  - marker: b
    text: O «todas las islas de las naciones». «Costas» o «costas lejanas» es un término profético común para pueblos y regiones marítimas distantes.
    reason: lexical_alternative
lexical_decisions:
- source_word: נוֹרָא / נורא
  english_pob_choice: fearsome
  chosen_spanish: temible
  alternatives_spanish:
  - terrible
  - imponente
  - digno de temor
  lexicon: HALOT
  rationale: El adjetivo predicativo expresa que Yahvé inspira temor y sobrecogimiento. «Temible» conserva ese valor activo en español moderno sin sonar arcaico como «terrible» ni suavizar demasiado el matiz como podría hacerlo «imponente».
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  lexicon: HALOT
  rationale: Se conserva el nombre propio del pacto en lugar de sustituirlo por un título. «Yahvé» es la forma estándar del proyecto en español y corresponde al Tetragrámaton.
- source_word: עֲלֵיהֶם
  english_pob_choice: against them
  chosen_spanish: contra ellos
  alternatives_spanish:
  - sobre ellos
  - contra ellas
  lexicon: HALOT
  rationale: En este contexto de juicio, la preposición no es meramente espacial sino adversativa. «Contra ellos» comunica esa oposición con naturalidad en español.
- source_word: רָזָה
  english_pob_choice: will make ... waste away
  chosen_spanish: hará que se consuman
  alternatives_spanish:
  - hará que se enflaquezcan
  - hará que se marchiten
  - hará que se desvanezcan
  lexicon: HALOT
  rationale: El verbo hebreo alude literalmente a volverse flaco o consumido. En español, «hará que se consuman» preserva la imagen de agotamiento/declive sin forzar una traducción demasiado corporal o extraña en el contexto de los dioses de la tierra.
- source_word: אֵת כָּל אֱלֹהֵי הָאָרֶץ
  english_pob_choice: all the gods of the earth
  chosen_spanish: todos los dioses de la tierra
  alternatives_spanish:
  - todos los dioses del mundo
  - todos los dioses del país
  lexicon: HALOT
  rationale: Se mantiene la formulación directa «dioses», porque el texto polémico los nombra así. «Tierra» conserva el alcance universal del hebreo frente a opciones más restringidas como «país».
- source_word: וְיִשְׁתַּחֲווּ לוֹ
  english_pob_choice: will bow down to him
  chosen_spanish: se postrarán ante él
  alternatives_spanish:
  - se inclinarán ante él
  - lo adorarán
  - se arrodillarán ante él
  lexicon: HALOT
  rationale: El verbo combina postración física y, por contexto, homenaje culto. «Se postrarán ante él» mantiene la fuerza corporal y reverencial sin reducir el sentido a una sola palabra litúrgica.
- source_word: אִישׁ מִמְּקוֹמוֹ
  english_pob_choice: each from his own place
  chosen_spanish: cada uno desde su propio lugar
  alternatives_spanish:
  - cada uno en su lugar
  - cada persona desde su lugar
  lexicon: HALOT
  rationale: La expresión distributiva individualiza la respuesta de adoración y conserva el valor de מִן («desde»). «Desde su propio lugar» refleja la dispersión geográfica sugerida por el hebreo.
- source_word: כֹּל אִיֵּי הַגּוֹיִם
  english_pob_choice: all the coastlands of the nations
  chosen_spanish: todas las costas de las naciones
  alternatives_spanish:
  - todas las islas de las naciones
  - todos los litorales de las naciones
  - todas las costas de los pueblos
  lexicon: HALOT
  rationale: «אִיִּים» puede significar islas o costas, y en la poesía profética suele funcionar como término para regiones lejanas y marítimas. «Costas» permite una lectura amplia y idiomática en español, siguiendo la decisión inglesa de «coastlands».
theological_decisions:
- issue: Cómo expresar el juicio sobre «todos los dioses de la tierra» sin suavizar la polémica del texto
  english_pob_reading: Retain 'all the gods of the earth' as the text's polemical language about the nations' deities, with Yahweh causing them to 'waste away.'
  chosen_spanish_reading: Mantener «todos los dioses de la tierra» y «hará que se consuman», sin reinterpretar el texto como una paráfrasis doctrinal.
  alternative_spanish_readings:
  - traducirlo como «todos los ídolos de la tierra»
  - parafrasear como «destruirá toda religión falsa»
  rationale: El hebreo dice «dioses», y la fuerza profética del versículo se apoya en ese lenguaje polémico. La traducción española debe preservar esa formulación para no introducir una explicación teológica posterior que el texto no explicita.
  doctrine_reference: Affirmations; Translation philosophy §§1, 3
- issue: 'Cómo entender el alcance del último miembro: adoración universal sin convertirlo en peregrinación centralizada'
  english_pob_reading: Translate 'each from his own place' to preserve the dispersed-worship picture.
  chosen_spanish_reading: Traducir «cada uno desde su propio lugar» para conservar la imagen de adoración dispersa.
  alternative_spanish_readings:
  - «cada uno en su lugar»
  - interpretarlo como peregrinación hacia Sion
  rationale: La preposición מִן indica procedencia. El texto presenta a las naciones adorando a Yahvé desde sus diversos lugares, y no exige una lectura de peregrinación cultual a un punto central.
  doctrine_reference: Translation philosophy §§1, 3, 4
translation_notes:
  revision_awareness: 'El borrador sigue la última revisión inglesa: el sujeto explícito del verbo final se conserva como «se postrarán» con valor plural, y el sintagma final queda en aposición al cierre («todas las costas de las naciones»). También se mantuvo la distinción entre el juicio sobre «los dioses de la tierra» y la adoración universal posterior.'
  spanish_consistency_notes:
  - Se respetó el nombre divino como «Yahvé», conforme al estándar del proyecto.
  - Se evitó «SEÑOR» para no ocultar el Tetragrámaton.
  - «Costas» reproduce el valor profético amplio de אִיִּים, no solo islas literales.
  - «Se postrarán» conserva el matiz corporal y cultual de וְיִשְׁתַּחֲווּ.
  - 'La puntuación refleja la revisión inglesa: primera cláusula, razón con punto y coma, luego la cláusula final con aposición.'
  - No se introdujo vocabulario eclesiástico no apoyado por el hebreo.
