translation:
  language: es
  text: Un corazón torcido no hallará bien, y el que es perverso en su lengua[a] caerá en calamidad.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «y el que es perverso en su hablar cae en desgracia».'
    reason: lexical_alternative
lexical_decisions:
- source_word: עִקֶּשׁ
  english_pob_choice: crooked
  chosen_spanish: torcido
  alternatives_spanish:
  - corrupto
  - perverso
  - desviado
  lexicon: HALOT
  rationale: El adjetivo expresa una deformidad moral de la persona interior. En español, 'torcido' conserva la imagen concreta y funciona bien con 'corazón' sin imponer una interpretación más fuerte que el hebreo.
- source_word: לֵב
  english_pob_choice: heart
  chosen_spanish: corazón
  alternatives_spanish:
  - mente
  - interior
  - ser interior
  lexicon: HALOT
  rationale: En la sabiduría hebrea, לֵב designa la sede interior de pensamiento, voluntad y disposición moral. 'Corazón' preserva ese antropologismo bíblico y es idiomático en español.
- source_word: יִמְצָא טוֹב
  english_pob_choice: does not find good
  chosen_spanish: no hallará bien
  alternatives_spanish:
  - no encontrará bien
  - no prosperará
  - no obtendrá bien
  lexicon: HALOT
  rationale: La combinación verbal puede implicar alcanzar beneficio, bienestar o resultado favorable. 'Hallará bien' mantiene la correspondencia léxica sin expandirla a una paráfrasis como 'prosperará'.
- source_word: נֶהְפָּךְ
  english_pob_choice: perverse
  chosen_spanish: perverso
  alternatives_spanish:
  - torcido
  - desviado
  - corrupto
  lexicon: HALOT
  rationale: La forma pasiva/participial sugiere alguien 'vuelto' o 'deformado' en el uso de la lengua. 'Perverso' corresponde al giro de la POB inglesa y mantiene el peso moral del término.
- source_word: בִּלְשׁוֹנוֹ
  english_pob_choice: in his tongue
  chosen_spanish: en su lengua
  alternatives_spanish:
  - en su hablar
  - con su lengua
  - en su habla
  lexicon: HALOT
  rationale: El hebreo dice literalmente 'en su lengua', y en español 'lengua' puede funcionar metonímicamente para el habla. Se conserva la imagen concreta que el texto ofrece.
- source_word: יִפּוֹל בְּרָעָה
  english_pob_choice: falls into trouble
  chosen_spanish: caerá en calamidad
  alternatives_spanish:
  - caerá en trouble
  - caerá en mal
  - caerá en desgracia
  - caerá en ruina
  lexicon: HALOT
  rationale: רָעָה aquí apunta a daño, desgracia o calamidad, más que al mal moral que el sujeto comete. 'Calamidad' preserva el sentido de consecuencia adversa y mantiene la opción alternativa señalada en la nota inglesa.
translation_notes:
  revision_awareness: La versión inglesa más reciente ajustó 'twisted in his tongue' a 'perverse in his tongue' por naturalidad y formalidad. La presente redacción española sigue esa decisión con 'perverso', pero mantiene la imagen hebrea de la lengua como sede/metonimia del habla.
  spanish_consistency_notes:
  - Se mantiene 'corazón' para לֵב según el uso antropológico bíblico.
  - Se conserva el valor moral de עִקֶּשׁ y נֶהְפָּךְ sin fusionarlos en una sola idea demasiado libre.
  - '''Lengua'' se usa en sentido metonímico para speech/habla, coherente con el texto fuente.'
  - '''Calamidad'' traduce רָעָה en su sentido de desastre o mal sobrevenido, evitando la ambigüedad de ''mal'' en español.'
