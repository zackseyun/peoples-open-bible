revisions:
- from: Harás una abertura[a] para el arca, y la terminarás a un codo desde arriba. Pondrás la puerta del arca en su costado. La harás con niveles inferiores, segundos y terceros.
  to: Harás un techo[a] para el arca, y la terminarás a un codo desde arriba.[b] Pondrás la puerta del arca en su costado. La harás con nivel inferior, segundo y tercero.[c]
  rationale: Se revisa «abertura» a «techo» para seguir la decisión principal documentada para צֹהַר, manteniendo las alternativas en nota. Se añade una nota para la cláusula difícil sobre «a un codo desde arriba», en línea con el audit trail inglés. También se corrige la enumeración final a una forma española más natural y más ajustada al sentido de tres niveles distintos.
