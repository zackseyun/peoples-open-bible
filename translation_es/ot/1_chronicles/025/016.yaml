translation:
  language: es
  text: El noveno fue Matanyahu[a], sus hijos y sus hermanos, doce.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebreo Mattanyahu; en muchas versiones tradicionales se vierte como «Matanías».
    reason: lexical_alternative
lexical_decisions:
- source_word: הַתְּשִׁיעִי
  english_pob_choice: The ninth was
  chosen_spanish: El noveno fue
  alternatives_spanish:
  - El noveno
  - El noveno era
  lexicon: HALOT
  rationale: El hebreo presenta un ordinal con artículo dentro de una lista abreviada; en español, la forma con copulativa implícita se vuelve natural y fiel al valor enumerativo del texto.
- source_word: מַתַּנְיָהוּ
  english_pob_choice: Mattanyahu
  chosen_spanish: Matanías
  alternatives_spanish:
  - Mataniahu
  - Mattanyahu
  lexicon: HALOT
  rationale: El nombre hebreo tiene la forma Mattanyahu; en español conviene una transliteración bíblica legible y reconocible, preservando la base hebrea sin forzar una forma inglesa.
- source_word: בָּנָיו
  english_pob_choice: his sons
  chosen_spanish: sus hijos
  alternatives_spanish:
  - sus hijos varones
  - sus hijos e hijas
  lexicon: HALOT
  rationale: El hebreo significa literalmente 'sus hijos' en este contexto genealógico/listado. En español, 'hijos' comunica el parentesco de modo natural; la referencia masculina queda ya implícita en el hebreo y no exige ampliación.
- source_word: וְאֶחָיו
  english_pob_choice: and his brothers
  chosen_spanish: y sus hermanos
  alternatives_spanish:
  - y sus parientes
  - y sus hermanos de clan
  lexicon: HALOT
  rationale: La acepción básica es 'hermanos'. Aunque en algunos contextos pueda ampliarse a parientes, aquí la lectura directa es la más segura y mantiene la tersura del registro.
- source_word: שְׁנֵים עָשָׂר
  english_pob_choice: twelve
  chosen_spanish: doce
  alternatives_spanish:
  - eran doce en total
  - doce en conjunto
  lexicon: HALOT
  rationale: El cardinal funciona como cierre del enunciado y suma total de los mencionados. En español se mantiene la brevedad del hebreo con 'doce'.
translation_notes:
  revision_awareness: El texto inglés revisado añadió 'was' para hacer natural la elipsis del original; en español se refleja con la cópula 'fue', conservando el estilo telegráfico del registro de nombres.
  spanish_consistency_notes:
  - 'Se preserva el orden breve de lista del hebreo: ordinal + nombre + descendencia + total.'
  - Se evita 'SEÑOR' o terminología doctrinal ajena porque el versículo es un registro nominal sin contenido teológico directo.
  - Se usa 'Matanías' como forma española bíblica estable, con nota sobre la forma hebrea más directa.
