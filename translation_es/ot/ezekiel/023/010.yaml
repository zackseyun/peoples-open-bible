translation:
  language: es
  text: Ellos descubrieron su desnudez[a]; tomaron a sus hijos y a sus hijas, y la mataron a espada. Así llegó a ser motivo de burla entre las mujeres[b], y ejecutaron sentencias contra ella[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «dejaron al descubierto su desnudez»; el modismo hebreo también puede implicar exposición pública de la vergüenza.
    reason: lexical_alternative
  - marker: b
    text: O «se volvió notoria entre las mujeres»; literalmente, «llegó a ser un nombre entre las mujeres».
    reason: lexical_alternative
  - marker: c
    text: O «llevaron a cabo juicios contra ella».
    reason: lexical_alternative
lexical_decisions:
- source_word: גִּלּוּ עֶרְוָתָהּ
  english_pob_choice: uncovered her nakedness
  chosen_spanish: descubrieron su desnudez
  alternatives_spanish:
  - dejaron al descubierto su desnudez
  - descubrieron su vergüenza
  lexicon: HALOT
  rationale: El hebreo usa un modismo sexual/judicial que literalmente dice ‘descubrir la desnudez’. En español, «descubrieron su desnudez» conserva la imagen y la fuerza del modismo sin volverlo torpe. «Vergüenza» sería más interpretativo y menos concreto.
- source_word: בָּנֶיהָ וּבְנוֹתֶיהָ לָקָחוּ
  english_pob_choice: they took her sons and her daughters
  chosen_spanish: tomaron a sus hijos y a sus hijas
  alternatives_spanish:
  - se llevaron a sus hijos y a sus hijas
  - capturaron a sus hijos y a sus hijas
  lexicon: HALOT
  rationale: לקח es un verbo amplio (‘tomar’). Aquí el contexto sugiere despojo/cautiverio, pero el hebreo no especifica más. «Tomaron» respeta el alcance del original sin añadir una precisión no explicitada.
- source_word: וְאוֹתָהּ בַּחֶרֶב הָרָגוּ
  english_pob_choice: they killed her with the sword
  chosen_spanish: la mataron a espada
  alternatives_spanish:
  - la mataron con la espada
  - la hicieron morir a espada
  lexicon: HALOT
  rationale: הרג expresa ‘matar’ de forma directa. «A espada» es una construcción natural en español bíblico y moderno que conserva el instrumento de la muerte sin sobrecargar la frase.
- source_word: וַתְּהִי שֵׁם לַנָּשִׁים
  english_pob_choice: she became a byword among women
  chosen_spanish: llegó a ser un nombre entre las mujeres
  alternatives_spanish:
  - llegó a ser un proverbio entre las mujeres
  - llegó a ser famosa entre las mujeres
  lexicon: HALOT
  rationale: שֵׁם significa literalmente ‘nombre’, y el hebreo dice ‘ser un nombre entre…’. Se conserva esa base literal porque la POB inglesa también retuvo la frase de ‘name’ en su nota. En español, «un nombre entre las mujeres» mantiene el eco idiomático que luego puede entenderse como reputación o notoriedad.
- source_word: לַנָּשִׁים
  english_pob_choice: among women
  chosen_spanish: entre las mujeres
  alternatives_spanish:
  - para las mujeres
  - en medio de las mujeres
  lexicon: HALOT
  rationale: El ל relacional aquí expresa el ámbito en que circula el ‘nombre’. «Entre» comunica mejor ese uso idiomático en español que un simple «para».
- source_word: וּשְׁפוּטִים עָשׂוּ בָהּ
  english_pob_choice: they executed judgments on her
  chosen_spanish: ejecutaron juicios sobre ella
  alternatives_spanish:
  - aplicaron juicios contra ella
  - llevaron a cabo sentencias contra ella
  lexicon: HALOT
  rationale: שְׁפוּטִים son actos de juicio o sentencias ejecutadas. «Ejecutaron juicios» preserva la raíz judicial y la pluralidad del sustantivo, siguiendo la decisión inglesa de no reducirlo a un castigo genérico.
theological_decisions:
- issue: Imagen sexual de juicio en la metáfora de Oholá/Samaria
  english_pob_reading: Retain the exposure/nakedness idiom rather than replacing it with an abstract term like 'shame.'
  chosen_spanish_reading: Conservar el modismo de desnudez descubierta en vez de sustituirlo por una abstracción como «vergüenza» o «humillación».
  alternative_spanish_readings:
  - la avergonzaron públicamente
  - exhibieron su deshonra
  rationale: El pasaje mantiene el lenguaje sexualizado del juicio profético. La traducción debe conservar esa tensión retórica porque forma parte del modo en que Ezequiel presenta la infidelidad y el castigo; suavizarla debilitaría el impacto del texto.
  doctrine_reference: Translation philosophy §§1, 3, 6
- issue: Fuerza judicial del cierre del versículo
  english_pob_reading: Translate as 'they executed judgments on her.'
  chosen_spanish_reading: 'Traducirlo con lenguaje judicial explícito: «ejecutaron juicios sobre ella».'
  alternative_spanish_readings:
  - la castigaron
  - le impusieron sentencia
  rationale: El hebreo usa el sustantivo de ‘juicios/sentencias’, no solo una idea general de violencia. Mantener ese campo semántico preserva que la destrucción presentada aquí es acto de juicio divino, no mera agresión militar.
  doctrine_reference: Translation philosophy §§1, 5
translation_notes:
  revision_awareness: La revisión más reciente indica que no se requirieron cambios y que hubo alto grado de acuerdo; por eso este borrador sigue de cerca la lectura ya auditada, manteniendo tanto el modismo de desnudez como la formulación judicial final.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma del proyecto, pero este versículo no contiene el nombre divino.
  - Se preserva la metáfora profética sin domesticarla a un lenguaje abstracto.
  - «Juicios» y no «sentencias» en el texto principal para conservar la pluralidad y la correspondencia con el hebreo.
  - La nota de «nombre entre las mujeres» ayuda a no perder el eco idiomático del hebreo mientras el lector español recibe una formulación publicable.
