translation:
  language: es
  text: Así tomaron las provisiones del pueblo en sus manos[a], junto con sus trompetas. Y él envió a todo hombre de Israel, cada uno a su tienda; pero retuvo a los trescientos hombres. Y el campamento de Madián estaba más abajo que él, en el valle.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «sus cuernos» o «sus cuernos de carnero»; el término hebreo se refiere a un cuerno usado como instrumento de señal.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּקְחוּ
  english_pob_choice: they took
  chosen_spanish: tomaron
  alternatives_spanish:
  - recibieron
  - tomaron en sus manos
  lexicon: HALOT
  rationale: El hebreo narra una acción simple en pasado. «Tomaron» conserva la fuerza directa de לקח sin añadir matices ajenos.
- source_word: צֵדָה
  english_pob_choice: provisions
  chosen_spanish: provisiones
  alternatives_spanish:
  - alimentos
  - suministros
  lexicon: HALOT
  rationale: «Provisiones» comunica el sentido de abastecimiento para marcha o campaña militar, mejor que un término demasiado restringido como «alimentos».
- source_word: הָעָם
  english_pob_choice: the people
  chosen_spanish: el pueblo
  alternatives_spanish:
  - la gente
  - las tropas
  lexicon: HALOT
  rationale: Aunque el contexto militar apunta a combatientes, el hebreo dice literalmente «el pueblo». En español, «el pueblo» preserva esa amplitud sin forzar el texto a «tropas».
- source_word: בְּיָדָם
  english_pob_choice: in their hands
  chosen_spanish: en sus manos
  alternatives_spanish:
  - en la mano de ellos
  - en su poder
  lexicon: HALOT
  rationale: Se mantiene el giro concreto del hebreo. En español funciona de manera natural y conserva la imagen física de cargar o portar.
- source_word: שׁוֹפְרֹתֵיהֶם
  english_pob_choice: their trumpets
  chosen_spanish: sus trompetas
  alternatives_spanish:
  - sus cuernos
  - sus cuernos de carnero
  lexicon: HALOT
  rationale: El hebreo se refiere a un cuerno usado como instrumento de señal. «Trompetas» es la equivalencia más idiomática y clara en español moderno, sin perder la función militar.
- source_word: שִׁלַּח
  english_pob_choice: he sent
  chosen_spanish: despidió
  alternatives_spanish:
  - envió
  - mandó
  lexicon: HALOT
  rationale: Aunque el verbo básico es «enviar», aquí el contexto es de dar salida/dismissal a los demás hombres. «Despidió» expresa mejor el valor contextual que en español suele implicar el acto de mandarlos a casa.
- source_word: כָּל אִישׁ יִשְׂרָאֵל ... אִישׁ לְאֹהָלָיו
  english_pob_choice: every man of Israel, each to his tent
  chosen_spanish: todo hombre de Israel, cada uno a su tienda
  alternatives_spanish:
  - cada hombre de Israel, cada uno a su tienda
  - todos los hombres de Israel, cada uno a su tienda
  lexicon: HALOT
  rationale: Se conserva la formulación masculina singular distributiva del hebreo. «A su tienda» mantiene la imagen idiomática tradicional sin suavizarla a una paráfrasis general.
- source_word: וּבִשְׁלֹשׁ מֵאוֹת הָאִישׁ הֶחֱזִיק
  english_pob_choice: but retained the three hundred men
  chosen_spanish: pero retuvo a los trescientos hombres
  alternatives_spanish:
  - pero mantuvo a los trescientos hombres
  - y conservó a los trescientos hombres
  lexicon: HALOT
  rationale: הֶחֱזִיק aquí tiene el sentido de mantener consigo o conservar. «Retuvo» refleja bien la idea de que Gideón conservó este grupo reducido mientras despidió al resto.
- source_word: מַחֲנֵה מִדְיָן
  english_pob_choice: the camp of Midian
  chosen_spanish: el campamento de Madián
  alternatives_spanish:
  - el campamento madianita
  - la tienda de Madián
  lexicon: HALOT
  rationale: «Campamento» es natural en español y corresponde al contexto militar. «Madián» sigue la forma española usual del nombre propio.
- source_word: מִתַּחַת
  english_pob_choice: below
  chosen_spanish: debajo
  alternatives_spanish:
  - abajo
  - más abajo
  lexicon: HALOT
  rationale: «Debajo» conserva la relación espacial inferior expresada por el hebreo y encaja bien con la descripción topográfica.
- source_word: בָּעֵמֶק
  english_pob_choice: in the valley
  chosen_spanish: en el valle
  alternatives_spanish:
  - en el valle ancho
  - en la hondonada
  lexicon: HALOT
  rationale: «Valle» es la traducción más clara y directa del término, y mantiene la correspondencia con el contraste topográfico del versículo.
translation_notes:
  revision_awareness: 'El texto español sigue de cerca el hebreo de WLC y coincide con el sentido ya auditado en la POB inglesa: provisiones, cuernos/trompetas, despedir al resto del pueblo y retener a los trescientos. No se requieren ajustes de revisión respecto del pasaje base.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» solo cuando el texto lo requiera; este versículo no lo contiene.
  - Se preserva el valor militar y distributivo de las expresiones hebreas sin convertir «el pueblo» en un término más interpretativo.
  - Se conserva la imagen de «su tienda» por fidelidad al hebreo y por naturalidad bíblica en español.
  - La nota sobre שׁוֹפָר se ancla en la frase «trompetas» para reflejar la alternativa léxica del audit trail inglés.
