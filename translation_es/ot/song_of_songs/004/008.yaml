translation:
  language: es
  text: Ven conmigo desde el Líbano, mi novia; ven conmigo desde el Líbano. Mira[a] desde la cima de Amaná, desde la cima de Senir[b] y Hermón, desde las guaridas de los leones, desde los montes de los leopardos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O ‘mira desde la cima de Amaná, desde la cima de Senir y Hermón’. El verbo hebreo aquí es difícil y puede referirse a mirar desde las alturas de la montaña más que a descender de ellas.
    reason: lexical_alternative
  - marker: b
    text: Senir es un nombre antiguo para parte de la cordillera del Hermón.
    reason: cultural_note
lexical_decisions:
- source_word: אִתִּי
  english_pob_choice: with me
  chosen_spanish: conmigo
  alternatives_spanish:
  - conmigo, junto a mí
  lexicon: HALOT
  rationale: La forma con sufijo de 1ª persona expresa compañía e invitación directa; en español natural, ‘conmigo’ comunica mejor esa cercanía que una solución literal como ‘con mí’.
- source_word: מִלְּבָנוֹן
  english_pob_choice: from Lebanon
  chosen_spanish: desde el Líbano
  alternatives_spanish:
  - del Líbano
  lexicon: HALOT
  rationale: El prefijo מִן indica origen o punto de partida. ‘Desde el Líbano’ conserva mejor la perspectiva espacial y poética que ‘del Líbano’.
- source_word: כַּלָּה
  english_pob_choice: my bride
  chosen_spanish: mi novia
  alternatives_spanish:
  - mi esposa
  - mi prometida
  lexicon: HALOT
  rationale: En el Cantar el término puede referirse a la amada en contexto nupcial. ‘Mi novia’ mantiene la relación afectiva sin imponer una precisión marital que el contexto poético no obliga a fijar aquí.
- source_word: תָּבֹואִי
  english_pob_choice: come
  chosen_spanish: ven
  alternatives_spanish:
  - vendrás
  - debes venir
  lexicon: HALOT
  rationale: La forma tiene fuerza exhortativa en el contexto. ‘Ven’ refleja mejor el llamado amoroso que una traducción futurista o demasiado modal.
- source_word: תָּשׁוּרִי
  english_pob_choice: look
  chosen_spanish: mira
  alternatives_spanish:
  - mira hacia afuera
  - contempla
  lexicon: HALOT
  rationale: Sigo la revisión inglesa más reciente, que entiende el verbo como ‘look’. En español ‘mira’ preserva la ambigüedad verbal entre mirar desde las alturas y la orientación espacial, sin resolver indebidamente el hebreo difícil.
- source_word: מֵרֹאשׁ
  english_pob_choice: from the summit of
  chosen_spanish: desde la cima de
  alternatives_spanish:
  - desde la cumbre de
  - desde la cabeza de
  lexicon: HALOT
  rationale: ‘Cima’ es el equivalente idiomático más natural para montes; mantiene el sentido topográfico de רֹאשׁ sin calco.
- source_word: אֲמָנָה
  english_pob_choice: Amanah
  chosen_spanish: Amaná
  alternatives_spanish:
  - Amanah
  lexicon: HALOT
  rationale: Nombre propio transliterado al español con adaptación gráfica mínima para la acentuación y lectura natural.
- source_word: שְׂנִיר
  english_pob_choice: Senir
  chosen_spanish: Senir
  alternatives_spanish:
  - Sinir
  lexicon: HALOT
  rationale: Nombre propio conservado en transliteración estándar.
- source_word: חֶרְמוֹן
  english_pob_choice: Hermon
  chosen_spanish: Hermón
  alternatives_spanish:
  - Jermón
  lexicon: HALOT
  rationale: Nombre propio conservado; la acentuación española normaliza la lectura, manteniendo la referencia geográfica.
- source_word: מִמְּעֹנוֹת אֲרָיוֹת
  english_pob_choice: from lions’ dens
  chosen_spanish: desde las guaridas de los leones
  alternatives_spanish:
  - desde las madrigueras de los leones
  - desde los refugios de los leones
  lexicon: HALOT
  rationale: ‘Guaridas’ conserva el matiz de lugares salvajes y peligrosos. Uso el plural ‘leones’ porque el hebreo es plural; el genitivo español reproduce bien la imagen.
- source_word: מֵהַרְרֵי נְמֵרִים
  english_pob_choice: from mountains of leopards
  chosen_spanish: desde los montes de las leopardas
  alternatives_spanish:
  - desde los montes de los leopardos
  - desde los montes de leopardo
  lexicon: HALOT
  rationale: El hebreo usa un plural de animales; ‘leopardas’ sigue el valor genérico del español poético para un plural de especie, y conserva el paralelismo imagístico con ‘leones’.
theological_decisions:
- issue: Tratamiento del nombre divino implícito
  english_pob_reading: No aparece YHWH ni κύριος en este verso; el texto es un llamado amoroso y geográfico.
  chosen_spanish_reading: No se introduce ninguna referencia divina en el texto principal.
  alternative_spanish_readings:
  - Agregar una nota devocional que conecte el pasaje con la protección de Dios
  rationale: El verso no contiene léxico divino explícito ni alusión inmediata que justifique introducirlo en la traducción. Mantener el enfoque en la voz poética respeta la evidencia textual.
  doctrine_reference: Sola scriptura / fidelidad contextual al texto base
translation_notes:
  revision_awareness: La versión inglesa auditada pasó de ‘Descend’ a ‘Look’ para תָּשׁוּרִי; esta traducción sigue esa revisión y preserva la ambigüedad reconocida en la nota inglesa. También conserva la repetición enfática de ‘conmigo desde el Líbano’ y la secuencia de topónimos y paisajes peligrosos.
  spanish_consistency_notes:
  - Se evita ‘SEÑOR’ porque no hay nombre divino en el verso.
  - Se mantiene la estructura repetida para reflejar el paralelismo hebreo.
  - ‘Hermón’ y ‘Amaná’ se adaptan a una ortografía española legible, sin alterar la identidad de los nombres.
  - ‘Leopardas’ es una solución estilística para mantener el plural y la imaginería; puede revisarse si se prefiere una forma más explícitamente no marcada como género.
