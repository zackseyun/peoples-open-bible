translation:
  language: es
  text: antes de que vaya —y no regrese— a la tierra de oscuridad y sombra profunda[a]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, tradicionalmente: «la tierra de oscuridad y sombra de muerte».'
    reason: lexical_alternative
lexical_decisions:
- source_word: בְּטֶרֶם
  english_pob_choice: before
  chosen_spanish: antes de que
  alternatives_spanish:
  - antes
  - antes de
  lexicon: HALOT
  rationale: La partícula temporal expresa anterioridad. En español, «antes de que» introduce con naturalidad la cláusula verbal siguiente y conserva la relación temporal del hebreo sin añadir contenido interpretativo.
- source_word: אֵלֵךְ
  english_pob_choice: I go
  chosen_spanish: yo vaya / vaya
  alternatives_spanish:
  - yo vaya
  - yo vaya a
  - parta
  lexicon: HALOT
  rationale: 'El verbo הלך en qal 1cs es un movimiento simple: «ir». Aquí, tras «antes de que», el subjuntivo español es lo más natural. Se evita «muera» para no intensificar más allá del hebreo, aunque el contexto alude a la muerte.'
- source_word: וְלֹא אָשׁוּב
  english_pob_choice: and do not return
  chosen_spanish: y no regrese
  alternatives_spanish:
  - y no vuelva
  - y no retorne
  - y no regrese nunca
  lexicon: HALOT
  rationale: שׁוב significa «volver/regresar». «No regrese» mantiene el valor simple del verbo y suena natural en la construcción temporal. Se evita «nunca» porque el hebreo no lo dice de manera explícita.
- source_word: אֶל
  english_pob_choice: to
  chosen_spanish: a
  alternatives_spanish:
  - hacia
  - a la
  lexicon: HALOT
  rationale: La preposición de dirección se expresa de forma idiomática con «a» en español.
- source_word: אֶרֶץ
  english_pob_choice: the land
  chosen_spanish: la tierra
  alternatives_spanish:
  - la región
  - el país
  - la tierra
  lexicon: HALOT
  rationale: En este contexto poético puede referirse a un ámbito/terraza funeraria o al dominio de los muertos. «La tierra» es natural en español y mantiene el sentido amplio del término sin forzar una especificación no explícita.
- source_word: חֹשֶׁךְ
  english_pob_choice: darkness
  chosen_spanish: oscuridad
  alternatives_spanish:
  - tinieblas
  - sombras
  lexicon: HALOT
  rationale: El sustantivo básico es «oscuridad». «Tinieblas» también sería posible y más solemne, pero «oscuridad» es claro y directo.
- source_word: צַלְמָוֶת
  english_pob_choice: deep shadow
  chosen_spanish: sombra profunda
  alternatives_spanish:
  - sombra de muerte
  - tinieblas profundas
  - profunda oscuridad
  lexicon: HALOT
  rationale: El término tiene una tensión lexical entre el tradicional «sombra de muerte» y el sentido idiomático de oscuridad muy densa. Se traduce como «sombra profunda» para preservar la fuerza poética y la ambigüedad, sin imponer de entrada la lectura tradicional ni perder el paralelismo con «oscuridad».
theological_decisions:
- issue: Valor de צַלְמָוֶת en contexto de muerte poética
  english_pob_reading: deep shadow, with a footnote preserving the traditional 'shadow of death'
  chosen_spanish_reading: sombra profunda, con nota que preserve «sombra de muerte»
  alternative_spanish_readings:
  - sombra de muerte
  - tinieblas profundas
  - profunda oscuridad
  rationale: El hebreo permite tanto una lectura de oscuridad intensa como la forma tradicional asociada con la muerte. La línea española principal mantiene la ambigüedad poética y la nota conserva la alternativa tradicional documentada por la POB en inglés.
  doctrine_reference: Translation philosophy §§1, 3
translation_notes:
  revision_awareness: El pasaje coincide sustancialmente con el audit trail en inglés y no requiere cambios revisionales adicionales; se mantiene la solución optimizada para conservar la ambigüedad de צַלְמָוֶת y la sintaxis temporal del versículo.
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando el hebreo o el contexto lo exijan; aquí no aparece el Tetragrámaton.
  - «Oscuridad» y «sombra profunda» mantienen el paralelismo poético del hebreo.
  - 'La nota conserva la alternativa tradicional documentada por la POB: «sombra de muerte».'
