  glossary_alignment: 'No hay términos del glosario mayor en juego aquí. La principal alineación léxica problemática es interna al registro POB: חִכֵּךְ debe seguir la elección contextual principal ''tu boca'', con ''tu paladar'' reservado como alternativa explicativa, para concordar con la racionalidad lexical ya documentada.'
