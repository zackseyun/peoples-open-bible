  glossary_alignment: 'No hay términos del glosario mayor en juego. La decisión principal es onomástica y gentilicia: ''horeo'' alinea mejor con el uso bíblico español; los nombres propios deben conservarse como Seir, Lotan, Shobal, Zibeon y Anah, salvo necesidad fuerte de hispanización, que aquí no existe.'
