translation:
  language: es
  text: Pero acerca de estas cosas, no te avergüences[a], y no hagas acepción de personas[b], y así peques[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El texto griego paralelo de la Septuaginta presenta aquí una redacción sustancialmente distinta, con varias exhortaciones sobre discreción y trato humano; para la línea principal se sigue el hebreo de la genizá de El Cairo.
    reason: textual_variant
  - marker: b
    text: 'O: «no muestres favoritismo». La expresión hebrea literalmente dice «no levantes la cara».'
    reason: lexical_alternative
  - marker: c
    text: La cláusula final también puede entenderse como «para no pecar» o «de modo que peques». El hebreo es breve y deja la relación exacta algo abierta.
    reason: alternative_reading
lexical_decisions:
- source_word: אך על אלה
  english_pob_choice: But concerning these things
  chosen_spanish: Pero acerca de estas cosas
  alternatives_spanish:
  - Solo acerca de estas cosas
  - Mas sobre estas cosas
  lexicon: HALOT
  rationale: El hebreo introduce una restricción o delimitación con énfasis. «Pero acerca de estas cosas» conserva ese valor discursivo de transición y referencia sin forzar un giro más literal que sonaría duro en español.
- source_word: אל תבוש
  english_pob_choice: do not be ashamed
  chosen_spanish: no te avergüences
  alternatives_spanish:
  - no te sientas avergonzado
  - no te cubras de vergüenza
  lexicon: HALOT
  rationale: בוש expresa vergüenza/disgracia moral o social. «No te avergüences» es natural en español y mantiene la fuerza ética del mandato.
- source_word: ואל תשא פנים
  english_pob_choice: do not show partiality
  chosen_spanish: no hagas acepción de personas
  alternatives_spanish:
  - no muestres favoritismo
  - no hagas favoritismo
  lexicon: HALOT
  rationale: La expresión hebrea idiomática significa tratar con parcialidad. En español bíblico y comprensible, «hacer acepción de personas» comunica bien la idea ética sin perder el matiz judicial/moral del giro.
- source_word: וחטא
  english_pob_choice: and sin
  chosen_spanish: y no peques
  alternatives_spanish:
  - y pecarás
  - y así pecas
  - lest you sin
  lexicon: HALOT
  rationale: El hebreo es muy breve y puede leerse como consecuencia o advertencia vinculada a la parcialidad. En español, «y no peques» expresa con naturalidad el valor admonitorio que el contexto requiere, sin cerrar de manera excesiva la relación sintáctica.
theological_decisions:
- issue: Relación entre la parcialidad y el pecado en la clausula final
  english_pob_reading: do not show partiality so as to sin
  chosen_spanish_reading: no hagas acepción de personas, y no peques
  alternative_spanish_readings:
  - no hagas acepción de personas, para no pecar
  - no hagas acepción de personas, de modo que no peques
  - no hagas acepción de personas y pecarás
  rationale: El hebreo y el contexto permiten o bien una relación de resultado/propósito o una advertencia abreviada. Mantener una formulación admonitoria breve en español preserva esa tensión sin imponer una sola sintaxis explicativa.
  doctrine_reference: DOCTRINE.md §Translation philosophy 3 (preserve theological tension rather than resolve it)
translation_notes:
  revision_awareness: Se tomó en cuenta la revisión inglesa más reciente, que amplía אך על אלה como «But concerning these things» y vuelve más natural la relación final como advertencia contra el pecado. La versión española sigue el hebreo base, pero adopta una forma fluida que conserva el sentido exhortativo y deja abierta la relación exacta entre parcialidad y pecado.
  spanish_consistency_notes:
  - Se usa «acerca de» para el valor delimitador de על אלה sin volverlo excesivamente literal.
  - Se evitó «SEÑOR» o terminología no pertinente; no hay léxico divino en el versículo.
  - «Hacer acepción de personas» se mantiene como equivalente bíblico reconocible y auditable para נשא פנים.
  - La cláusula final conserva una ambigüedad leve entre advertencia y consecuencia, acorde con la economía del hebreo.
