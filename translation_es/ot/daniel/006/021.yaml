    rationale: La auditoría inglesa preserva explícitamente la alternativa léxica de עֲבֵד. Aunque el texto principal debe seguir con «siervo», la alternativa significativa debe conservarse también en español.
  - severity: low
    issue: «Constantemente» es aceptable, pero «continuamente» alinea mejor con la decisión inglesa y el matiz de continuidad habitual.
    rationale: No es un error de sentido, pero un ajuste menor mejora la correspondencia con בִּתְדִירָא y con la documentación del POB.
