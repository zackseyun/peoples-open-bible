lexical_decisions:
- source_word: ἐχάρημεν
  english_pob_choice: We rejoiced
  chosen_spanish: Nos alegramos
  alternatives_spanish:
  - Nos regocijamos
  - Nos gozamos
  lexicon: LSJ
  rationale: El aoristo de χαίρω expresa una acción pasada simple. En español, «nos alegramos» conserva el tiempo pasado y un tono natural y digno para correspondencia oficial; «nos regocijamos» sería más elevado, pero menos natural aquí.
- source_word: καὶ νῦν
  english_pob_choice: And now
  chosen_spanish: Y ahora
  alternatives_spanish:
  - Así que ahora
  - Ahora bien
  lexicon: LSJ
  rationale: La secuencia enlace + adverbio temporal se rinde de forma directa para mantener el movimiento epistolar del griego.
- source_word: ἐμείνατε
  english_pob_choice: continue
  chosen_spanish: permanezcan
  alternatives_spanish:
  - continúen
  - persistan
  lexicon: LSJ
  rationale: El imperativo de μένω puede expresarse con «permanezcan» en español, conservando la idea de mantenerse en un estado ya existente. «Continúen» sería más dinámico, pero menos literal respecto a μένω.
- source_word: ἔτι
  english_pob_choice: still
  chosen_spanish: todavía
  alternatives_spanish:
  - aún
  - siempre
  lexicon: LSJ
  rationale: Marca continuidad. «Todavía» reproduce bien el matiz de persistencia en español moderno.
- source_word: τοῦ συντηρῆσαι
  english_pob_choice: to keep
  chosen_spanish: guardar
  alternatives_spanish:
  - mantener
  - conservar
  lexicon: LSJ
  rationale: El infinitivo articular expresa el contenido de la exhortación. «Guardar» funciona bien con «fidelidad» y preserva la idea de observar/retener lealtad sin reducirla a mera emoción.
- source_word: πρὸς ἡμᾶς
  english_pob_choice: with us
  chosen_spanish: con nosotros
  alternatives_spanish:
  - hacia nosotros
  - para con nosotros
  lexicon: LSJ
  rationale: La relación política/de alianza se expresa de forma natural en español con «con nosotros», manteniendo la orientación relacional sin forzar un matiz técnico.
- source_word: πίστιν
  english_pob_choice: faith
  chosen_spanish: fidelidad
  alternatives_spanish:
  - fe
  - lealtad
  lexicon: BDAG
  rationale: En este contexto diplomático, πίστις no significa principalmente creencia religiosa sino confianza leal/constancia en la alianza. «Fidelidad» comunica ese valor con claridad en español, sin borrar la tensión entre fe y lealtad.
theological_decisions:
- issue: Valor de πίστις en contexto político de alianza
  english_pob_reading: faith
  chosen_spanish_reading: fidelidad
  alternative_spanish_readings:
  - fe
  - lealtad
  rationale: Aunque el POB inglés conserva «faith» en el texto principal y reserva alternativas en nota, en español «fe» suena más religioso que el contexto permite. Para no desdibujar el sentido relacional y diplomático del pasaje, se adopta «fidelidad» en el texto principal, dejando abierta la alternativa de «lealtad» en nota.
  doctrine_reference: 'DOCTRINE.md Contested terms: πίστις; preserve contextual force and note alternatives where needed'
translation_notes:
  revision_awareness: 'Se siguió el contexto auditado del griego de Swete y el trazado léxico inglés, pero se ajustó πίστις al español por exigencia del contexto político: «fidelidad» comunica mejor la relación de alianza que «fe» sin perder la tensión semántica documentada. No se registran revisiones adicionales en la fuente auditada.'
  spanish_consistency_notes:
  - Se mantiene un tono formal y epistolar, apto para un decreto o carta real.
  - Se evita «SEÑOR» u otras sustituciones no pertinentes, ya que no hay aquí un término divino.
  - «con nosotros» y «fidelidad» trabajan juntos para reflejar la relación bilateral de alianza.
  - La puntuación separa las dos cláusulas como en el griego y en el inglés auditado.
