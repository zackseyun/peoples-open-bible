translation:
  language: es
  text: Entonces, en verdad, algunos[a], habiendo suscitado una revuelta contra la armonía común, valiéndose de calamidades[b] de muchas maneras.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «habiendo suscitado una revolución contra la concordia común». El participio νεωτερίσαντες puede tener un sentido político más fuerte que «habiendo suscitado una revuelta».'
    reason: lexical_alternative
  - marker: b
    text: 'O: «aprovechándose de desgracias de muchas maneras». El griego dice literalmente «valiéndose de calamidades».'
    reason: lexical_alternative
lexical_decisions:
- source_word: τότε δὴ
  english_pob_choice: Then indeed
  chosen_spanish: Entonces, en verdad
  alternatives_spanish:
  - Entonces
  - En aquel tiempo, en verdad
  lexicon: LSJ
  rationale: La combinación marca transición temporal con énfasis; «entonces, en verdad» conserva ambos matices sin sonar forzado en español.
- source_word: τινες
  english_pob_choice: some
  chosen_spanish: algunos
  alternatives_spanish:
  - ciertas personas
  - algunas personas
  lexicon: LSJ
  rationale: El plural indefinido se expresa naturalmente como «algunos», manteniendo la referencia no específica.
- source_word: πρὸς τὴν κοινὴν ... ὁμόνοιαν
  english_pob_choice: against the common harmony
  chosen_spanish: contra la armonía común
  alternatives_spanish:
  - hacia la concordia común
  - contra la unidad común
  lexicon: LSJ
  rationale: Con νεωτερίσαντες, πρός funciona en sentido adversativo; «armonía común» reproduce el valor de ὁμόνοια sin imponer terminología posterior ajena al griego.
- source_word: νεωτερίσαντες
  english_pob_choice: having stirred up revolt
  chosen_spanish: habiendo promovido una rebelión
  alternatives_spanish:
  - habiendo suscitado un levantamiento
  - habiendo provocado una revolución
  - habiendo innovado
  lexicon: LSJ
  rationale: El verbo puede implicar disturbio político o rebelión, no mera novedad. «Promovido una rebelión» conserva ese peso sin sobrecargar el español.
- source_word: πολυτρόπως
  english_pob_choice: in many ways
  chosen_spanish: de muchas maneras
  alternatives_spanish:
  - varias veces
  - por muchos medios
  lexicon: LSJ
  rationale: El adverbio indica multiplicidad de modos; «de muchas maneras» es claro y fiel.
- source_word: ἐχρήσαντο συμφοραῖς
  english_pob_choice: made use of calamities
  chosen_spanish: se sirvieron de calamidades
  alternatives_spanish:
  - usaron calamidades
  - aprovecharon calamidades
  - se valieron de calamidades
  lexicon: LSJ
  rationale: χράομαι con dativo expresa «hacer uso de»; «se sirvieron de» conserva bien esa construcción y deja visible el tono oportunista. «Calamidades» reproduce un registro formal cercano a συμφοραῖς.
translation_notes:
  revision_awareness: He revisado la redacción inglesa más reciente («stirred up revolt» / «calamities») y he mantenido la distinción léxica entre νεωτερίσαντες y συμφοραῖς, evitando suavizar el matiz político o el carácter adverso del segundo término. También he preservado la ambigüedad útil entre rebelión/revolución en la nota.
  spanish_consistency_notes:
  - Se mantiene «armonía común» como equivalente de κοινὴ ὁμόνοια, evitando «concordia» en el texto principal para conservar la fuerza semántica de la imagen griega.
  - «Calamidades» se usa en el texto principal por su registro formal; la nota ofrece «desgracias» como alternativa más cotidiana, sin borrar el tono del original.
  - La puntuación y el orden reflejan la estructura participial del griego, con una oración principal breve y compacta.
