translation:
  language: es
  text: Si sus hijos varones se multiplican, será para la espada, y sus descendientes no se saciarán de pan[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «no quedarán satisfechos con pan». La expresión hebrea es literalmente «no serán llenados/satisfechos [con] pan», un modismo que indica falta de alimento suficiente.
    reason: lexical_alternative
lexical_decisions:
- source_word: אִם
  english_pob_choice: If
  chosen_spanish: Si
  alternatives_spanish:
  - Cuando
  - Aunque
  lexicon: HALOT
  rationale: La cláusula abre una condición; «Si» reproduce de manera directa la estructura condicional del hebreo y conserva la relación protasis-apódosis del verso.
- source_word: יִרְבּוּ
  english_pob_choice: multiply
  chosen_spanish: se multiplican
  alternatives_spanish:
  - se hacen muchos
  - aumentan
  lexicon: HALOT
  rationale: רבה expresa aumento numérico. «Se multiplican» es natural en español bíblico moderno y mantiene la idea de hacerse numerosos.
- source_word: בָנָיו
  english_pob_choice: his sons
  chosen_spanish: sus hijos
  alternatives_spanish:
  - sus hijos varones
  - sus hijos
  lexicon: HALOT
  rationale: El hebreo dice literalmente «sus hijos/varones». En español, «hijos» comunica el referente filial de forma natural; se evita una formulación pesada, pero se conserva el sentido familiar masculino en el contexto de descendencia del varón.
- source_word: לְמוֹ חָרֶב
  english_pob_choice: it is for the sword
  chosen_spanish: será para la espada
  alternatives_spanish:
  - estará destinado a la espada
  - será para la espada
  lexicon: HALOT
  rationale: La preposición y el sustantivo forman una expresión de destino o resultado. «Será para la espada» refleja esa orientación sin añadir interpretación excesiva; en español funciona como equivalente idiomático de muerte violenta por la espada.
- source_word: וְצֶאֱצָאָיו
  english_pob_choice: his descendants
  chosen_spanish: sus descendientes
  alternatives_spanish:
  - su posteridad
  - su prole
  lexicon: HALOT
  rationale: צֶאֱצָאִים designa la descendencia más amplia, no solo los hijos inmediatos. «Descendientes» preserva ese alcance genealógico en español actual.
- source_word: לֹא יִשְׂבְּעוּ
  english_pob_choice: will not be satisfied
  chosen_spanish: no se saciarán
  alternatives_spanish:
  - no quedarán satisfechos
  - no se llenarán
  lexicon: HALOT
  rationale: שבע significa «estar satisfecho / saciado». «No se saciarán» conserva el verbo de saciedad y resulta más idiomático que un giro literal rígido en español.
- source_word: לָחֶם
  english_pob_choice: bread
  chosen_spanish: de pan
  alternatives_spanish:
  - de alimento
  - de comida
  lexicon: HALOT
  rationale: El hebreo es literalmente «pan», con fuerza metonímica para comida en general. Se mantiene «pan» por fidelidad imagística, y el verbo «saciarse de» lo integra de forma natural.
translation_notes:
  revision_awareness: 'La redacción sigue de cerca el hebreo y el audit trail en inglés: condicional con «Si», destino con «será para la espada», y saciedad con «no se saciarán». Se evitó suavizar la imagen de juicio y privación alimentaria.'
  spanish_consistency_notes:
  - Se mantiene «espada» sin ampliar a «violencia» para respetar la imagen literal del hebreo.
  - «Descendientes» conserva el alcance más amplio de צֶאֱצָאִים.
  - No se añadió nota textual porque el versículo, en esta forma, no presenta una variante que requiera marcaje en el texto español.
