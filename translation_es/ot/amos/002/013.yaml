translation:
  language: es
  text: ¡Mira![a] Yo estoy presionando debajo de ustedes,[b] como presiona una carreta cuando está llena de gavillas.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Miren». La partícula hebrea introduce una proclamación enfática.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «Yo estoy haciendo peso debajo de ustedes» o «Yo presionaré debajo de ustedes». El hebreo transmite la idea de presión o peso, y la forma verbal puede entenderse como anuncio vívido en presente o como sentido futuro inminente.'
    reason: lexical_alternative
lexical_decisions:
- source_word: הִנֵּה
  english_pob_choice: Look
  chosen_spanish: ¡Mira!
  alternatives_spanish:
  - ¡Miren!
  - ¡Véanlo!
  lexicon: HALOT
  rationale: La partícula introduce una proclamación enfática. «¡Mira!» conserva ese tono de llamada atencional de manera natural en español moderno y mantiene la fuerza deíctica sin recurrir a un arcaísmo.
- source_word: אָנֹכִי
  english_pob_choice: I
  chosen_spanish: Yo
  alternatives_spanish:
  - Yo mismo
  - soy yo
  lexicon: HALOT
  rationale: El pronombre independiente añade énfasis al sujeto. En español, antepuesto y explícito, «Yo» transmite bien esa fuerza sin necesidad de sobrecargar la frase.
- source_word: מֵעִיק
  english_pob_choice: am pressing down
  chosen_spanish: estoy aplastando
  alternatives_spanish:
  - estoy oprimiendo
  - estoy presionando hacia abajo
  - voy a aplastar
  lexicon: HALOT
  rationale: El verbo hebreo en hifil expresa presión o carga. En español, «aplastar» comunica con claridad la imagen de opresión/peso del contexto y encaja con la comparación del carro cargado. Se evita «presionar» por sonar más abstracto y menos imagético aquí.
- source_word: תַּחְתֵּיכֶם
  english_pob_choice: beneath you
  chosen_spanish: los
  alternatives_spanish:
  - debajo de ustedes
  - bajo ustedes
  - en su lugar
  lexicon: HALOT
  rationale: La revisión inglesa reciente privilegia la idea de presión ejercida sobre el objeto implicado por תַּחְתֵּיכֶם. En español, el objeto directo «los» integra de forma natural esa relación y hace explícito que el juicio recae sobre Israel, sin reproducir una literalidad espacial que resulte confusa.
- source_word: כַּאֲשֶׁר
  english_pob_choice: as
  chosen_spanish: como
  alternatives_spanish:
  - tal como
  - igual que
  lexicon: HALOT
  rationale: Introduce la comparación de manera breve y natural. «Como» conserva la sencillez del hebreo y el paralelismo del verso.
- source_word: תָּעִיק
  english_pob_choice: presses down
  chosen_spanish: aplasta
  alternatives_spanish:
  - oprime
  - presiona
  - hace crujir
  lexicon: HALOT
  rationale: Se repite la idea de presión del primer hemistiquio. «Aplasta» mantiene la repetición semántica en español y resulta coherente con la imagen de una carga excesiva.
- source_word: הָעֲגָלָה
  english_pob_choice: a cart
  chosen_spanish: un carro
  alternatives_spanish:
  - una carreta
  - un carro de carga
  - un carreton
  lexicon: HALOT
  rationale: «Carro» es amplio y comprensible en español bíblico contemporáneo. Puede abarcar el vehículo de carga implícito en la comparación sin sonar demasiado técnico.
- source_word: הַמְלֵאָה לָהּ
  english_pob_choice: when it is full
  chosen_spanish: cuando va lleno
  alternatives_spanish:
  - cuando está lleno
  - cargado hasta el tope
  - cuando está completamente cargado
  lexicon: HALOT
  rationale: La frase hebrea expresa el estado de llenura/carga del carro. «Va lleno» suena natural en español para un vehículo en movimiento y conserva la imagen dinámica del texto.
- source_word: עָמִיר
  english_pob_choice: sheaves
  chosen_spanish: gavillas
  alternatives_spanish:
  - gavillas de grano
  - manojos de cereal
  - haces de espigas
  lexicon: HALOT
  rationale: «Gavillas» es el equivalente agrícola más común y preciso en español para los haces de grano. Conserva la imagen concreta del campo y el peso de la carga.
theological_decisions:
- issue: Forma del juicio divino expresada por presión física
  english_pob_reading: I am pressing down beneath you / I am pressing you down
  chosen_spanish_reading: Yo los estoy aplastando
  alternative_spanish_readings:
  - Yo los estoy presionando
  - Yo los estoy oprimiendo
  rationale: El verso presenta una metáfora de juicio mediante presión y peso. «Aplastar» conserva la contundencia de la imagen sin perder la relación con la carga del carro, y evita una expresión espacial confusa en español.
  doctrine_reference: Juicio de Yahvé sobre Israel en Amos 2:13; cf. el paralelismo metafórico del mismo verso.
translation_notes:
  revision_awareness: La revisión inglesa más reciente corrigió una literalidad espacial problemática en תַּחְתֵּיכֶם, abandonando «in your place» y volviendo a «beneath you» para preservar con mayor fidelidad la imagen de presión. En español, opté por no traducir de modo calco esa espacialidad, sino por explicitar el objeto («los») y conservar la metáfora de juicio con un verbo de peso («aplastar»), manteniendo el paralelismo con el carro cargado de gavillas.
  spanish_consistency_notes:
  - Se usa «Mira» para הִנֵּה, coherente con el tono exhortativo/atencional de la serie.
  - Se evita «SEÑOR» porque el verso no contiene el tetragrámaton ni κύριος.
  - Se conserva un registro bíblico moderno y claro, sin arcaísmos innecesarios.
  - «Gavillas» mantiene una imagen agrícola transparente y común en español.
  - La repetición semántica de presión/peso entre los dos hemistiquios se mantiene con «aplastando» / «aplasta».
