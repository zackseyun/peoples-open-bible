translation:
  language: es
  text: Porque tú tienes autoridad sobre la vida y la muerte, y haces bajar hasta las puertas del Hades[a] y haces subir[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «las puertas del sepulcro» o «las puertas del mundo de los muertos». El griego dice «Hades», el ámbito de los muertos.
    reason: lexical_alternative
  - marker: b
    text: O «levantas» o «resucitas». El griego simplemente dice «haces subir», en paralelo con «haces bajar» en la cláusula anterior.
    reason: alternative_reading
lexical_decisions:
- source_word: ἐξουσίαν
  english_pob_choice: authority
  chosen_spanish: autoridad
  alternatives_spanish:
  - poder
  - dominio
  lexicon: BDAG
  rationale: «Autoridad» expresa el derecho soberano o control legítimo implicado por ἐξουσία, no solo capacidad o fuerza. En español suena natural y conserva la dimensión de gobierno divino sobre vida y muerte.
- source_word: ζωῆς καὶ θανάτου
  english_pob_choice: life and death
  chosen_spanish: la vida y la muerte
  alternatives_spanish:
  - vida y muerte
  lexicon: BDAG
  rationale: La pareja genitiva se rinde de forma directa sin expansión. El artículo definido en español hace fluida la enumeración y conserva el contraste total del original.
- source_word: κατάγεις
  english_pob_choice: bring down
  chosen_spanish: haces bajar
  alternatives_spanish:
  - haces descender
  - bajas
  lexicon: BDAG
  rationale: El verbo indica causar que algo descienda. «Haces bajar» mantiene el movimiento vertical y funciona con naturalidad en español, sin perder la imagen concreta.
- source_word: πύλας ᾅδου
  english_pob_choice: the gates of Hades
  chosen_spanish: las puertas del Hades
  alternatives_spanish:
  - las puertas del sepulcro
  - las puertas del mundo de los muertos
  lexicon: BDAG
  rationale: Se conserva «Hades» para reflejar el término griego específico y evitar aplanarlo como «sepulcro» o reinterpretarlo demasiado. «Puertas» mantiene la metáfora concreta de acceso al ámbito de los muertos.
- source_word: ἀνάγεις
  english_pob_choice: bring up
  chosen_spanish: haces subir
  alternatives_spanish:
  - haces ascender
  - levantas
  lexicon: BDAG
  rationale: El verbo contrapone el descenso anterior. «Haces subir» preserva la simetría con «haces bajar» y no añade explícitamente la idea de resurrección, que el griego aquí no formula de manera técnica.
theological_decisions:
- issue: Renderización de ᾅδης
  english_pob_reading: Hades
  chosen_spanish_reading: Hades
  alternative_spanish_readings:
  - sepulcro
  - mundo de los muertos
  rationale: El griego nombra directamente ᾅδης, el ámbito de los muertos. Mantener «Hades» conserva la precisión léxica y evita sustituir el término por una paráfrasis interpretativa. La nota permite alternativas legítimas sin borrar la tensión del original.
  doctrine_reference: Primacía del idioma original sobre la tradición de traducción; precisión léxica en vocabulario del ámbito de los muertos.
- issue: Fuerza de ἀνάγεις frente a lenguaje de resurrección
  english_pob_reading: bring up
  chosen_spanish_reading: haces subir
  alternative_spanish_readings:
  - levantas
  - resucitas
  rationale: «Haces subir» sigue de cerca el paralelo con «haces bajar» y conserva la ambigüedad controlada del verbo griego. «Resucitas» sería doctrinalmente más específico de lo que exige la forma verbal aquí, por lo que se evita para no resolver indebidamente la tensión textual.
  doctrine_reference: Preservar la tensión teológica en lugar de resolverla prematuramente.
translation_notes:
  revision_awareness: La redacción sigue el texto griego de forma directa y refleja el ajuste del audit trail inglés que eliminó «again» porque no está presente en el griego. Por eso se mantiene un simple paralelo verbal entre «haces bajar» y «haces subir», sin añadir idea de repetición.
  spanish_consistency_notes:
  - Se usa «Hades» de manera consistente como transliteración del término griego ᾅδης, en línea con la política del proyecto.
  - Se prefiere «haces bajar / haces subir» para conservar el paralelismo verbal del griego y una sintaxis natural en español.
  - Se evita «Señor» o sustituciones litúrgicas, porque el texto no contiene κύριος y el término clave es la autoridad divina sobre vida y muerte.
