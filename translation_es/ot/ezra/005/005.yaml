translation:
  language: es
  text: Pero el ojo de su Dios estaba puesto sobre los ancianos de los judíos[a], y no los hicieron parar hasta que un decreto[b] llegara a Darío; entonces enviarían de vuelta una carta[c] acerca de este asunto.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «estaba velando por los ancianos de los judíos».'
    reason: lexical_alternative
  - marker: b
    text: 'O: «una decisión» u «una orden».'
    reason: lexical_alternative
  - marker: c
    text: 'O: «una respuesta por escrito» o «un escrito oficial».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְעֵין
  english_pob_choice: But the eye
  chosen_spanish: Pero el ojo
  alternatives_spanish:
  - Y el ojo
  - Pero la mirada
  lexicon: HALOT
  rationale: Conserva la metáfora concreta de 'ojo' en vez de sustituirla por una abstracción como 'cuidado' o 'providencia'. 'Pero' comunica bien el contraste discursivo con la oposición previa.
- source_word: אֱלָהֲהֹם
  english_pob_choice: of their God
  chosen_spanish: de su Dios
  alternatives_spanish:
  - de Dios
  lexicon: HALOT
  rationale: 'El sufijo pronominal del arameo es explícito y debe reflejarse: es el Dios perteneciente a esos ancianos. ''Su Dios'' mantiene esa relación de pertenencia.'
- source_word: הֲוָת עַל
  english_pob_choice: was on
  chosen_spanish: estaba sobre
  alternatives_spanish:
  - estaba encima de
  - estaba vigilando sobre
  lexicon: HALOT
  rationale: '''Estaba sobre'' conserva la imagen espacial del original y sugiere vigilancia sin borrar la metáfora. ''Vigilando sobre'' sería más interpretativo.'
- source_word: שָׂבֵי יְהוּדָיֵא
  english_pob_choice: the elders of the Jews
  chosen_spanish: los ancianos de los judíos
  alternatives_spanish:
  - los ancianos judíos
  - los líderes de los judíos
  lexicon: HALOT
  rationale: שָׂבֵי designa específicamente 'ancianos', no un término genérico de liderazgo. Se preserva la estructura de relación en español con 'de los judíos'.
- source_word: וְלָא בַטִּלוּ הִמּוֹ
  english_pob_choice: and they did not make them stop
  chosen_spanish: y no los hicieron parar
  alternatives_spanish:
  - y no los detuvieron
  - y no los hicieron cesar
  lexicon: HALOT
  rationale: 'El verbo tiene fuerza causativa: no simplemente ''no pararon'', sino ''no los hicieron parar''. ''Hicieron parar'' refleja esa causación con naturalidad en español.'
- source_word: עַד טַעְמָא
  english_pob_choice: until a decree
  chosen_spanish: hasta que un decreto
  alternatives_spanish:
  - hasta que una decisión
  - hasta que una orden
  lexicon: HALOT
  rationale: En contexto administrativo persa, טַעַם se refiere a una decisión/decreto oficial. 'Decreto' es la opción más clara y fiel en español.
- source_word: לְדָרְיָוֶשׁ יְהָךְ
  english_pob_choice: should go to Darius
  chosen_spanish: fuera a Darío
  alternatives_spanish:
  - llegara a Darío
  - debiera ir a Darío
  lexicon: HALOT
  rationale: El imperfecto expresa acción pendiente o futura en el marco narrativo. 'Fuera a Darío' conserva esa proyección sin convertirla en acción ya cumplida.
- source_word: וֶאֱדַיִן
  english_pob_choice: then
  chosen_spanish: entonces
  alternatives_spanish:
  - y entonces
  - después
  lexicon: HALOT
  rationale: Marca la secuencia de acciones de manera directa y fluida en español.
- source_word: יְתִיבוּן
  english_pob_choice: they would send back
  chosen_spanish: ellos enviarían de vuelta
  alternatives_spanish:
  - ellos devolverían
  - ellos responderían
  lexicon: HALOT
  rationale: El verbo puede expresar regresar/volver a enviar. 'Enviarían de vuelta' conserva el movimiento de retorno y se ajusta al contexto de una respuesta escrita.
- source_word: נִשְׁתְּוָנָא
  english_pob_choice: a letter
  chosen_spanish: una carta
  alternatives_spanish:
  - una misiva
  - un escrito oficial
  lexicon: HALOT
  rationale: En el contexto de la correspondencia administrativa, 'carta' es natural en español y suficientemente precisa. El matiz oficial queda sugerido por el contexto narrativo.
- source_word: עַל דְּנָה
  english_pob_choice: concerning this matter
  chosen_spanish: acerca de este asunto
  alternatives_spanish:
  - sobre esto
  - respecto de este asunto
  lexicon: HALOT
  rationale: La expresión demostrativa se vuelve una referencia clara y natural en español. 'Asunto' ayuda a explicitar el referente administrativo implícito.
theological_decisions:
- issue: Metáfora antropomórfica de la supervisión divina
  english_pob_reading: Retain the metaphor 'the eye of their God was on' in the main text
  chosen_spanish_reading: Mantener 'el ojo de su Dios estaba sobre' en el texto principal
  alternative_spanish_readings:
  - su Dios los vigilaba
  - su Dios los cuidaba
  rationale: El texto usa una imagen corporal concreta para la providencia divina. En español conviene conservarla para no suavizar la fuerza literaria ni borrar la tensión entre imagen y significado.
  doctrine_reference: Transparencia léxica y teológica; providencia divina en lenguaje figurado
- issue: Valor de טַעַם en contexto imperial
  english_pob_reading: until a decree should go to Darius
  chosen_spanish_reading: hasta que un decreto fuera a Darío
  alternative_spanish_readings:
  - hasta que una decisión llegara a Darío
  - hasta que una orden fuera a Darío
  rationale: En el marco persa, el término apunta a una determinación oficial. 'Decreto' evita trivializar el término como mera opinión y conserva su peso administrativo.
  doctrine_reference: Contexto histórico-administrativo del texto bíblico
- issue: Direccionalidad del cierre narrativo
  english_pob_reading: then they would send back a letter concerning this matter
  chosen_spanish_reading: entonces ellos enviarían de vuelta una carta acerca de este asunto
  alternative_spanish_readings:
  - entonces responderían por escrito sobre esto
  - entonces devolverían una carta sobre este asunto
  rationale: La frase final describe la respuesta formal tras la decisión. 'Enviarían de vuelta' mantiene el vínculo con el movimiento de respuesta sin imponer una equivalencia demasiado libre.
  doctrine_reference: Fidelidad semántica en correspondencia oficial
translation_notes:
  revision_awareness: El contexto auditado muestra una revisión reciente sin cambios sustantivos y un veredicto de concordancia moderada con observaciones menores. Se ha mantenido la metáfora central, la causalidad del verbo en la forma negativa, el sentido administrativo de טַעַם y la referencia concreta a correspondencia escrita, sin introducir paráfrasis no sustentadas.
  spanish_consistency_notes:
  - Se usa 'Dios' para אֱלֹהִים y el posesivo 'su' para reflejar el sufijo arameo.
  - Se conserva la metáfora de 'ojo' en lugar de neutralizarla como 'cuidado' o 'providencia'.
  - Se mantiene 'ancianos' para שָׂבֵי y 'judíos' como complemento de relación.
  - '''Decreto'' se usa como término administrativo; no se traduce como simple ''pensamiento''.'
  - '''Carta'' se elige por claridad en español, con nota alternativa para el matiz de escrito oficial.'
