translation:
  language: es
  text: Dios, desde el principio, creó al hombre, y lo puso en manos de su propia violencia[a]; lo entregó en manos de su propia inclinación.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Griego: «y lo dejó en manos de su propio consejo». La primera cláusula hebrea después de «creó al hombre» es textualmente difícil; el griego apoya el sentido más amplio de autodirección humana.'
    reason: alternative_reading
lexical_decisions:
- source_word: אֱלֹהִים / God
  english_pob_choice: God
  chosen_spanish: Dios
  alternatives_spanish:
  - el Dios
  - él
  lexicon: HALOT / contexto bíblico
  rationale: El sujeto explícito es Dios; en español, «Dios» conserva la referencia directa y evita ocultar el sujeto como haría una convención de mayúsculas.
- source_word: מִבְּרֵאשִׁית
  english_pob_choice: from the beginning
  chosen_spanish: desde el principio
  alternatives_spanish:
  - desde el comienzo
  - en el principio
  lexicon: HALOT
  rationale: «Desde el principio» comunica bien la idea temporal de מִן + רֵאשִׁית y corresponde al valor temporal apoyado por el paralelo griego ἐξ ἀρχῆς.
- source_word: בָּרָא
  english_pob_choice: created
  chosen_spanish: creó
  alternatives_spanish:
  - hizo
  - formó
  lexicon: HALOT
  rationale: «Creó» preserva el peso teológico del verbo ברא cuando Dios es el sujeto.
- source_word: אָדָם
  english_pob_choice: man
  chosen_spanish: al hombre
  alternatives_spanish:
  - a la humanidad
  - al ser humano
  lexicon: HALOT
  rationale: El singular hebreo funciona como representante de la humanidad; «al hombre» mantiene esa forma representativa y la economía del texto, aunque puede abarcar a la humanidad en sentido colectivo.
- source_word: וַיְשִׁיתֵהוּ
  english_pob_choice: placed him
  chosen_spanish: lo puso
  alternatives_spanish:
  - lo colocó
  - lo estableció
  lexicon: HALOT
  rationale: «Puso» es una forma natural en español para el valor de שית con complemento de localización o disposición; conserva la imagen de situar a la criatura en una condición determinada.
- source_word: בְּיַד
  english_pob_choice: in the hand of
  chosen_spanish: en manos de
  alternatives_spanish:
  - en la mano de
  - bajo el poder de
  lexicon: HALOT
  rationale: La expresión idiomática «en manos de» mantiene la imagen hebrea de control/poder sin sonar forzada en español.
- source_word: חוֹתְפוֹ
  english_pob_choice: his own violence
  chosen_spanish: su propia violencia
  alternatives_spanish:
  - su propio impulso
  - su propia fuerza
  - su propia inclinación
  lexicon: HALOT / lectura difícil del hebreo
  rationale: La tradición auditada del POB pasó de una lectura de autogobierno interior a «violence» por revisión; en español, «violencia» refleja la dureza del término tal como quedó resuelto en la revisión más reciente, sin borrar que el hebreo es difícil y que el griego paralelo sugiere un matiz de consejo o autodirección.
- source_word: יִצְרוֹ
  english_pob_choice: his own inclination
  chosen_spanish: su propia inclinación
  alternatives_spanish:
  - su propio impulso
  - su propia disposición
  - su propio designio
  lexicon: HALOT
  rationale: «Inclinación» es el equivalente más natural para יצר en un contexto sapiencial y mantiene la idea de una disposición interna.
- source_word: וַיִּתְּנֵהוּ
  english_pob_choice: he gave him over
  chosen_spanish: lo entregó
  alternatives_spanish:
  - lo entregó en manos de
  - lo dio
  lexicon: HALOT
  rationale: «Entregó» comunica la fuerza de נתן con ביד y preserva el sentido de dejar a alguien bajo la esfera de algo o alguien.
theological_decisions:
- issue: Relación entre la creación divina y la autodeterminación moral humana
  english_pob_reading: The verse emphasizes that God created man and entrusted him to his own inner moral direction, without importing a stronger claim about absolute autonomy.
  chosen_spanish_reading: El versículo afirma que Dios creó al ser humano y lo dejó/entregó a su propia disposición interior, sin convertir eso en una doctrina de autonomía absoluta.
  alternative_spanish_readings:
  - Dios lo dejó a su propio consejo
  - Dios lo entregó a su propio impulso malo
  rationale: 'La redacción española conserva la tensión del texto: Dios es el creador y, después de crear, el ser humano queda bajo una forma de autogobierno o disposición propia. No se fuerza el versículo hacia una doctrina cerrada de libre albedrío absoluto ni hacia una lectura exclusivamente negativa del impulso humano.'
  doctrine_reference: Preservar la tensión teológica sin resolverla artificialmente.
- issue: Valor de חוֹתְפוֹ en la tradición auditada
  english_pob_reading: The Hebrew first clause after 'created man' is textually difficult; the Greek supports the broader sense of human self-direction.
  chosen_spanish_reading: «Su propia violencia» deja visible la dureza del hebreo y la revisión reciente del POB, mientras el paralelo griego recuerda la posibilidad de un trasfondo de autodirección.
  alternative_spanish_readings:
  - su propia inclinación
  - su propio impulso
  - su propio consejo
  rationale: La elección mantiene la tensión entre la revisión inglesa más reciente y el trasfondo griego/hebreo, evitando suavizar el término hasta perder la rareza textual.
  doctrine_reference: La dificultad textual debe permanecer auditable.
translation_notes:
  revision_awareness: Este borrador toma en cuenta la revisión más reciente del POB, que sustituyó una lectura de impulso por «violencia» para חוֹתְפוֹ, y conserva el equivalente de יִצְרוֹ como «inclinación». También integra el paralelo griego, que habla de dejar al ser humano en la mano de su propio consejo, para no borrar la tensión textual.
  spanish_consistency_notes:
  - Se mantiene «Dios» para אֱלֹהִים y no se usa una convención de ocultamiento nominal.
  - Se conserva el paralelismo sintáctico entre la acción creadora y la entrega a una condición humana interna.
  - «En manos de» preserva la imaginería hebrea de poder/control de forma idiomática en español.
  - La frase «su propia violencia» se entiende como traducción marcada de una lectura difícil, no como interpretación suavizada.
