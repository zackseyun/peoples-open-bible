translation:
  language: es
  text: 'Entonces él dijo[a]: «Abre la ventana hacia el oriente», y la abrió. Entonces Eliseo dijo: «Dispara», y disparó. Y dijo: «Flecha de victoria de Yahvé, flecha de victoria contra Aram. Porque derrotarás a Aram en Afec hasta destruirlo».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «una flecha de salvación de Yahvé, una flecha de salvación contra Aram». El término hebreo puede significar también «salvación» o «liberación».
    reason: lexical_alternative
lexical_decisions:
- source_word: פְּתַח הַחַלּוֹן קֵדְמָה
  english_pob_choice: Open the window eastward
  chosen_spanish: Abre la ventana hacia el oriente
  alternatives_spanish:
  - Abre la ventana al este
  - Abre la ventana orientada al este
  lexicon: HALOT
  rationale: פּתח es un mandato simple de abrir. קֵדְמָה es direccional; «hacia el oriente» conserva el movimiento indicado por el hebreo sin convertirlo en un adjetivo fijo.
- source_word: יְרֵה
  english_pob_choice: Shoot
  chosen_spanish: Dispara
  alternatives_spanish:
  - Tira
  - Lanza
  lexicon: HALOT
  rationale: En un contexto de arco y flecha, el imperativo requiere un verbo natural en español. «Dispara» comunica el acto de soltar la flecha sin añadir un objeto explícito que el hebreo no pone.
- source_word: חֵץ תְּשׁוּעָה לַיהוָה
  english_pob_choice: Yahweh’s arrow of victory
  chosen_spanish: Flecha de victoria de Yahvé
  alternatives_spanish:
  - Flecha de salvación de Yahvé
  - Flecha de liberación de Yahvé
  lexicon: HALOT
  rationale: 'תְּשׁוּעָה puede significar salvación, liberación o victoria. En este signo militar, «victoria» expresa mejor el resultado bélico inmediato. El genitivo con לְ se vierte como posesión/relación natural en español: «de Yahvé».'
- source_word: וְחֵץ תְּשׁוּעָה בַאֲרָם
  english_pob_choice: the arrow of victory over Aram
  chosen_spanish: flecha de victoria contra Aram
  alternatives_spanish:
  - flecha de victoria sobre Aram
  - flecha de salvación contra Aram
  lexicon: HALOT
  rationale: La segunda frase explica la primera en aposición. En contexto bélico, בְּ con Aram se entiende adversativamente; «contra Aram» mantiene esa fuerza y suena natural en español.
- source_word: אֲרָם
  english_pob_choice: Aram
  chosen_spanish: Aram
  alternatives_spanish:
  - Siria
  lexicon: HALOT
  rationale: Se conserva el nombre histórico-geográfico «Aram» para respetar la terminología propia del texto y no sustituirla por un equivalente tradicional externo.
- source_word: וְהִכִּיתָ אֶת אֲרָם
  english_pob_choice: For you will strike Aram
  chosen_spanish: Porque herirás a Aram
  alternatives_spanish:
  - Y golpearás a Aram
  - Y derrotarás a Aram
  lexicon: HALOT
  rationale: נכה en este uso conserva la imagen concreta de golpear/herir. «Herirás» reproduce el verbo sin adelantar una lectura demasiado interpretativa como «derrotarás».
- source_word: בַּאֲפֵק
  english_pob_choice: at Aphek
  chosen_spanish: en Afec
  alternatives_spanish:
  - en Aphek
  - en Afec
  lexicon: HALOT
  rationale: Se usa la forma castellana «Afec» para el topónimo bíblico, manteniendo el nombre propio reconocible en español. La preposición «en» es la más natural con un lugar de combate.
- source_word: עַד כַּלֵּה
  english_pob_choice: until you have destroyed it
  chosen_spanish: hasta acabar con él
  alternatives_spanish:
  - hasta destruirlo
  - hasta ponerle fin
  lexicon: HALOT
  rationale: כלה expresa llevar algo a su fin; en este contexto, la destrucción total del enemigo. «Acabar con él» conserva la idea de consumación bélica sin sonar excesivamente técnico o arcaizante.
theological_decisions:
- issue: Traducción del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - el SEÑOR
  rationale: La política española del proyecto usa «Yahvé» como forma principal del nombre divino, evitando el masking tradicional con mayúsculas. Esto mantiene visible el nombre propio del pacto.
  doctrine_reference: 'DOCTRINE.md: יְהוָה / YHWH → Yahvé'
- issue: Sentido de תְּשׁוּעָה en un oráculo militar
  english_pob_reading: victory
  chosen_spanish_reading: victoria
  alternative_spanish_readings:
  - salvación
  - liberación
  rationale: Aunque תְּשׁוּעָה puede abarcar salvación o liberación, el gesto profético trata de guerra y derrota de Aram. «Victoria» comunica mejor el sentido inmediato sin negar que la victoria proviene de Yahvé.
  doctrine_reference: HALOT / contexto narrativo de guerra
- issue: Fuerza de בַּאֲפֵק en contexto de batalla
  english_pob_reading: at Aphek
  chosen_spanish_reading: en Afec
  alternative_spanish_readings:
  - en Aphek
  - en Afec
  rationale: No hay tensión doctrinal; la decisión es de claridad toponímica y fluidez. «En Afec» es idiomático y reconoce el escenario histórico del combate.
  doctrine_reference: Toponimia bíblica
translation_notes:
  revision_awareness: 'La versión inglesa revisada eliminó «even» para hacer más natural la aposición de la segunda frase. En español se reproduce esa misma relación con yuxtaposición directa: «Flecha de victoria de Yahvé, flecha de victoria contra Aram», sin elemento equivalente a «even», preservando la lectura revisada y el paralelismo hebreo. También se mantiene el valor militar de תְּשׁוּעָה con una nota alternativa para no borrar su amplitud semántica.'
  spanish_consistency_notes:
  - Se conserva «Yahvé» conforme al estándar español del proyecto.
  - Se traduce el nombre propio como «Aram» y el topónimo como «Afec» para mantener consistencia bíblica en español.
  - «Dispara» evita el calco rígido de «Shoot» y sigue siendo fiel al contexto de arco y flecha.
  - La nota [a] queda anclada en «victoria» para reflejar la alternativa semántica principal de תְּשׁוּעָה.
