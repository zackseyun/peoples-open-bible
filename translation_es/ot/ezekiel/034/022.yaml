translation:
  language: es
  text: Salvaré a mi rebaño, y ya no serán presa[a], y juzgaré entre oveja y oveja[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «ya no estarán para el botín» o «ya no quedarán como despojo».'
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: «entre oveja y oveja»; es decir, entre una oveja y otra dentro del rebaño.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהוֹשַׁעְתִּי
  english_pob_choice: I will save
  chosen_spanish: Salvaré
  alternatives_spanish:
  - Libraré
  - Rescataré
  lexicon: HALOT
  rationale: El hifil de ישׁע expresa acción efectiva de salvación o liberación por parte de Yahvé. «Salvaré» conserva bien el peso teológico y la naturalidad en español, sin estrechar el sentido solo a rescate físico.
- source_word: לְצֹאנִי
  english_pob_choice: my flock
  chosen_spanish: mi rebaño
  alternatives_spanish:
  - mis ovejas
  - mi rebaño de ovejas
  lexicon: HALOT
  rationale: צֹאן es un sustantivo colectivo para ganado menor; en este contexto pastoril, «rebaño» comunica el conjunto de forma natural en español. Se conserva el posesivo de primera persona.
- source_word: וְלֹא תִהְיֶינָה עוֹד לָבַז
  english_pob_choice: and they will no longer be prey
  chosen_spanish: y ya no será presa
  alternatives_spanish:
  - y ya no estarán para el botín
  - y ya no serán botín
  - y ya no quedarán como despojo
  lexicon: HALOT
  rationale: La expresión hebrea indica que el rebaño ya no quedará «para botín/despojo». En español, «ser presa» conserva la idea de vulnerabilidad ante depredación y ataque, mientras mantiene una frase breve y natural. El singular «será» refleja el rebaño como colectivo.
- source_word: וְשָׁפַטְתִּי
  english_pob_choice: and I will judge
  chosen_spanish: y juzgaré
  alternatives_spanish:
  - y gobernaré
  - y decidiré
  lexicon: HALOT
  rationale: שׁפט aquí no solo implica gobernar en sentido general, sino ejercer juicio entre miembros del rebaño. «Juzgaré» preserva esa fuerza legal y discriminatoria.
- source_word: בֵּין שֶׂה לָשֶׂה
  english_pob_choice: between sheep and sheep
  chosen_spanish: entre oveja y oveja
  alternatives_spanish:
  - entre una oveja y otra
  - entre ovejas y ovejas
  lexicon: HALOT
  rationale: 'El hebreo es distributivo y singular: «entre oveja y oveja». Mantener la repetición preserva el énfasis en el juicio interno dentro del rebaño, sin suavizarlo a una formulación más explicativa.'
theological_decisions:
- issue: Salvación divina bajo la metáfora del pastor
  english_pob_reading: I will save my flock
  chosen_spanish_reading: Salvaré a mi rebaño
  alternative_spanish_readings:
  - Libraré a mi rebaño
  - Rescataré a mi rebaño
  rationale: La versión española mantiene a Yahvé como agente directo de la salvación y conserva el tono del pasaje sin introducir una paráfrasis doctrinal. «Salvaré» sostiene tanto la liberación inmediata como la resonancia bíblica más amplia.
  doctrine_reference: 'Translation philosophy: original-language primacy; preserve theological weight without paraphrase.'
- issue: Juicio dentro del mismo rebaño
  english_pob_reading: I will judge between sheep and sheep
  chosen_spanish_reading: juzgaré entre oveja y oveja
  alternative_spanish_readings:
  - juzgaré entre una oveja y otra
  - juzgaré entre ovejas y ovejas
  rationale: 'Se conserva la tensión del texto: Dios no solo salva frente a enemigos externos, sino que también discierne y juzga entre los miembros del rebaño. No se resuelve esa tensión con una explicación interpretativa dentro del versículo.'
  doctrine_reference: 'Translation philosophy: preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: El texto inglés de referencia y el control de revisión más reciente coinciden sin cambios; no hubo revisiones aplicadas. La redacción española sigue esa lectura estable y conserva las tensiones léxicas señaladas en el audit trail.
  spanish_consistency_notes:
  - Se usó «Yahvé» según el estándar del proyecto para el nombre divino implícito en el discurso profético.
  - «Rebaño» se eligió por naturalidad en español y mantiene el sentido colectivo de צֹאן.
  - Se conservó la repetición distributiva «oveja y oveja» para no diluir el juicio interno del pasaje.
  - «Presa» transmite de forma breve la idea de botín/despojo sin perder la imagen de vulnerabilidad.
