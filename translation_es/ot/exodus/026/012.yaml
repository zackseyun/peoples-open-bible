translation:
  language: es
  text: Y el excedente que queda de las cortinas de la tienda[a], la media cortina que queda[b], colgará sobre la parte trasera del tabernáculo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «el sobrante que queda de las cortinas de la tienda».
    reason: alternative_reading
  - marker: b
    text: El hebreo distingue entre «la tienda» (la cubierta) y «el tabernáculo» (la estructura de morada).
    reason: cultural_note
lexical_decisions:
- source_word: סֶרַח
  english_pob_choice: excess
  chosen_spanish: excedente
  alternatives_spanish:
  - sobrante
  - exceso
  - desprendimiento que sobresale
  lexicon: HALOT
  rationale: El sustantivo expresa lo que sobra o sobresale. «Excedente» conserva la idea de material remanente y de algo que queda proyectado, sin forzar una interpretación demasiado técnica o demasiado libre.
- source_word: הָעֹדֵף
  english_pob_choice: that remains
  chosen_spanish: que queda
  alternatives_spanish:
  - que permanece
  - que остается
  - que sobra
  lexicon: HALOT
  rationale: El participio comunica el sentido de residuo o resto. «Que queda» es natural en español y mantiene la repetición enfática de la idea de lo que permanece sobrante.
- source_word: יְרִיעֹת
  english_pob_choice: curtains
  chosen_spanish: cortinas
  alternatives_spanish:
  - paños
  - paneles
  - lienzos
  lexicon: HALOT
  rationale: En el contexto del tabernáculo se trata de grandes cubiertas de tela. «Cortinas» es el equivalente más claro y fiel en español para este uso arquitectónico-cultual.
- source_word: הָאֹהֶל
  english_pob_choice: the tent
  chosen_spanish: la tienda
  alternatives_spanish:
  - la tienda del tabernáculo
  - el toldo
  lexicon: HALOT
  rationale: Aquí אֹהֶל designa la cubierta de tienda, distinta del מִשְׁכָּן mencionado al final. «Tienda» preserva esa distinción terminológica sin confundirla con el tabernáculo mismo.
- source_word: חֲצִי הַיְרִיעָה
  english_pob_choice: the half curtain
  chosen_spanish: la media cortina
  alternatives_spanish:
  - la mitad de la cortina
  - media de la cortina
  lexicon: HALOT
  rationale: La construcción apunta a la mitad de una cortina. «Media cortina» es breve y natural en español, y mantiene la referencia a una unidad parcial de tela.
- source_word: הָעֹדֶפֶת
  english_pob_choice: that remains over
  chosen_spanish: que queda
  alternatives_spanish:
  - que queda encima
  - que se extiende
  - que sobra
  lexicon: HALOT
  rationale: El participio femenino retoma la idea de sobrante/reste. «Que queda» conserva el paralelismo con la primera cláusula y evita introducir un matiz más interpretativo que el hebreo no exige.
- source_word: תִּסְרַח
  english_pob_choice: shall hang
  chosen_spanish: se extenderá
  alternatives_spanish:
  - colgará
  - se colgará
  - sobresaldrá
  lexicon: HALOT
  rationale: El verbo describe el movimiento o disposición del sobrante sobre la estructura. «Se extenderá» transmite tanto el caer/henderse sobre la parte posterior como el carácter de cobertura, manteniendo el registro digno de la descripción técnica.
- source_word: עַל אֲחֹרֵי
  english_pob_choice: over the back of
  chosen_spanish: sobre la parte trasera de
  alternatives_spanish:
  - sobre la espalda de
  - por detrás de
  - sobre la parte posterior de
  lexicon: HALOT
  rationale: La expresión indica ubicación en la zona posterior. «Parte trasera» comunica la orientación espacial con claridad en español y evita una imagen corporal poco natural para el objeto.
- source_word: הַמִּשְׁכָּן
  english_pob_choice: the tabernacle
  chosen_spanish: el tabernáculo
  alternatives_spanish:
  - el santuario portátil
  - la morada
  lexicon: HALOT
  rationale: מִשְׁכָּן es el término técnico para la estructura sagrada. «Tabernáculo» es el equivalente tradicional y preciso en español, adecuado al contexto cultual.
theological_decisions:
- issue: Distinción entre «tienda» y «tabernáculo»
  english_pob_reading: The Hebrew distinguishes between 'the tent' (the covering layer) and 'the tabernacle' (the dwelling structure).
  chosen_spanish_reading: El hebreo distingue entre «la tienda» (la cubierta) y «el tabernáculo» (la estructura de morada).
  alternative_spanish_readings:
  - la tienda y el santuario
  - el techo y el tabernáculo
  rationale: Mantener esa diferencia evita borrar una precisión estructural del texto. En español, «tienda» para אֹהֶל y «tabernáculo» para מִשְׁכָּן conservan la relación sin mezclar los dos referentes.
  doctrine_reference: Éxodo 26:1-14; distinción cultual del tabernáculo
translation_notes:
  revision_awareness: La redacción sigue la revisión más reciente del inglés POB, que prefirió «excess that remains» y «curtains of the tent» sobre formulaciones más literales pero menos naturales. En español se reflejó esa misma preferencia con «excedente que queda» y «cortinas de la tienda», manteniendo además la distinción técnica entre אֹהֶל y מִשְׁכָּן.
  spanish_consistency_notes:
  - Se mantiene «tabernáculo» para מִשְׁכָּן de forma consistente con el término técnico del proyecto.
  - Se usa «tienda» para אֹהֶל para preservar la diferencia con «tabernáculo».
  - Se evita «SEÑOR» u otra máscara divina porque no aparece el Tetragrámaton en este versículo.
  - La repetición de «que queda» refleja el paralelo del hebreo entre סֶרַח y עֹדֵף.
