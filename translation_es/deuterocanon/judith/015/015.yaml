translation:
  language: es
  text: Y la coronaron con una guirnalda de olivo[a], ella y las mujeres que estaban con ella. Y ella iba delante de todo el pueblo en la danza[b], guiando a todas las mujeres, y todos los hombres de Israel la seguían, armados, con guirnaldas y con himnos en sus bocas.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literalmente, «la coronaron el olivo»; el griego probablemente significa que la adornaron con una guirnalda de olivo, como adorno festivo o de victoria.
    reason: lexical_alternative
  - marker: b
    text: También puede traducirse «en danza» o «en una procesión de danza»; χορεία puede referirse tanto a la acción de bailar como a una danza coral organizada.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐστεφανώσαντο
  english_pob_choice: they crowned
  chosen_spanish: la coronaron
  alternatives_spanish:
  - la guirnaldaron
  - le pusieron una corona
  lexicon: LSJ
  rationale: El verbo griego expresa adornar con corona o guirnalda. «La coronaron» es natural en español y conserva el acto de investirla festivamente sin implicar entronización real.
- source_word: τὴν ἐλαίαν
  english_pob_choice: with an olive wreath
  chosen_spanish: con una corona de olivo
  alternatives_spanish:
  - con una guirnalda de olivo
  - con el olivo
  lexicon: LSJ
  rationale: El texto dice literalmente «el olivo», pero en este contexto ceremonial con στεφανόω se entiende una corona o guirnalda de olivo. «Corona de olivo» hace explícito el objeto implícito sin perder la imagen festiva.
- source_word: αὐτὴ καὶ αἱ μετʼ αὐτῆς
  english_pob_choice: she and the women with her
  chosen_spanish: ella y las mujeres con ella
  alternatives_spanish:
  - ella y las que iban con ella
  - ella y sus compañeras
  lexicon: LSJ
  rationale: La frase incluye a Judith junto con las mujeres que la acompañaban. «Las mujeres con ella» conserva el referente femenino explícito y evita una generalización innecesaria.
- source_word: προῆλθεν
  english_pob_choice: she went before
  chosen_spanish: iba delante de
  alternatives_spanish:
  - avanzaba delante de
  - pasaba delante de
  lexicon: LSJ
  rationale: El verbo señala que ella iba al frente de la procesión. «Iba delante de» refleja mejor el valor de liderazgo procesional que «salió» o una simple idea de movimiento.
- source_word: ἐν χορείᾳ
  english_pob_choice: in the dance
  chosen_spanish: en la danza
  alternatives_spanish:
  - en un baile
  - en una procesión de danza
  lexicon: LSJ
  rationale: χορεία puede referirse al baile o a una formación coral/danzada. «En la danza» preserva la concreción festiva y deja abierta la amplitud semántica del griego.
- source_word: ἡγουμένη
  english_pob_choice: leading
  chosen_spanish: guiando
  alternatives_spanish:
  - dirigiendo
  - encabezando
  lexicon: LSJ
  rationale: El participio describe a Judith como la que va al frente. «Guiando» es idiomático y mantiene la idea de liderazgo visible en la procesión.
- source_word: ἐνωπλισμένοι
  english_pob_choice: armed
  chosen_spanish: armado
  alternatives_spanish:
  - armados
  - preparado para el combate
  lexicon: LSJ
  rationale: El participio significa armado o provisto de armas. En español, el plural gramatical con «todo hombre de Israel» pide concordancia natural; la forma estándar sería «armados», pero aquí se conserva el valor del adjetivo con la marca de procesión militar/festiva.
- source_word: μετὰ στεφάνων
  english_pob_choice: with wreaths
  chosen_spanish: con coronas
  alternatives_spanish:
  - con guirnaldas
  - con wreaths
  lexicon: LSJ
  rationale: En contexto celebrativo, στεφάνων son coronas o guirnaldas festivas, no coronas reales. «Coronas» es claro en español; sin embargo, se mantiene «corona de olivo» arriba para no perder la imagen concreta del primer hemistiquio.
- source_word: ὕμνων ἐν τῷ στόματι αὐτῶν
  english_pob_choice: with hymns in their mouths
  chosen_spanish: con himnos en la boca
  alternatives_spanish:
  - cantando himnos
  - con cantos en la boca
  lexicon: LSJ
  rationale: La imagen griega es concreta y debe conservarse. «Con himnos en la boca» reproduce el giro casi literal y mantiene el tono vívido del original.
theological_decisions:
- issue: 'Sentido de la procesión: danza festiva versus simple avance militar'
  english_pob_reading: in the dance; leading all the women; every man of Israel followed, armed, with wreaths and with hymns in their mouths
  chosen_spanish_reading: en la danza, guiando a todas las mujeres, y todo hombre de Israel seguía, armado, con coronas y con himnos en la boca
  alternative_spanish_readings:
  - en un baile
  - en una procesión de danza
  - marchaba al frente
  rationale: El griego une celebración, danza y una marcha ordenada. La traducción conserva esa tensión sin reducirla a un desfile militar ni a un baile aislado; así se respeta la escena litúrgico-festiva y la participación del pueblo entero.
  doctrine_reference: N/A
translation_notes:
  revision_awareness: 'La redacción sigue la revisión más reciente del audit trail, que corrigió «went out» por «went before» para reflejar προῆλθεν como avance al frente de la procesión. Se mantuvo la estructura festiva completa: coronación con olivo, liderazgo de Judith, seguimiento de los varones y el detalle vívido de los himnos en la boca.'
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando el texto base lo exige; aquí no aparece.
  - Se mantiene «corona de olivo» y no «corona real» porque el contexto es ceremonial, no monárquico.
  - Se eligió «himnos» siguiendo el audit trail inglés y para conservar la imagen cultual del griego.
  - «Armado» conserva la fuerza de ἐνωπλισμένοι sin añadir material inexistente.
