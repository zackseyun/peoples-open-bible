  to: Me postraré hacia tu templo santo y daré gracias a tu nombre por tu amor constante y tu fidelidad, porque has engrandecido tu palabra sobre todo tu nombre[a].
  rationale: Se cambia «gran amor» por «amor constante» para reflejar mejor חֶסֶד y la decisión léxica del POB. Se mantiene la cláusula difícil final cercana al hebreo masorético. La nota se reubica al final de la cláusula pertinente y se ajusta levemente a un español más preciso.
