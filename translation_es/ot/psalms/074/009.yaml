translation:
  language: es
  text: No vemos nuestras señales[a]; ya no hay profeta, y ninguno entre nosotros sabe hasta cuándo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O “nuestros estandartes” o “nuestros símbolos”; el término hebreo puede denotar señales visibles o emblemas, pero aquí no se especifica con precisión su referente.
    reason: lexical_alternative
lexical_decisions:
- source_word: אֹתֹתֵינוּ
  english_pob_choice: our signs
  chosen_spanish: nuestras señales
  alternatives_spanish:
  - nuestros estandartes
  - nuestros símbolos
  lexicon: HALOT
  rationale: אֹת puede significar “señal”, “marca” o “símbolo”. En este lamento, el audit trail inglés preserva la amplitud del término. “Señales” es la opción más general y transparente en español, sin fijar indebidamente si alude a emblemas, señales visibles de favor divino u այլ referentes.
- source_word: לֹא רָאִינוּ
  english_pob_choice: we do not see
  chosen_spanish: No vemos
  alternatives_spanish:
  - No hemos visto
  lexicon: HALOT
  rationale: El perfecto hebreo funciona aquí como queja de estado presente. “No vemos” comunica mejor la ausencia actual en un español natural y mantiene el tono lamentativo del verso.
- source_word: אֵין עוֹד
  english_pob_choice: there is no longer
  chosen_spanish: ya no hay
  alternatives_spanish:
  - no hay más
  - ya no existe
  lexicon: HALOT
  rationale: La expresión indica cese o ausencia continuada. “Ya no hay” es idiomática en español y conserva la idea de que algo que estaba presente ahora ha cesado.
- source_word: נָבִיא
  english_pob_choice: prophet
  chosen_spanish: profeta
  alternatives_spanish:
  - vidente
  lexicon: HALOT
  rationale: '“Profeta” es la equivalencia estándar y la más fiel aquí. El singular tras אֵין puede entenderse de modo genérico: no hay profeta alguno.'
- source_word: וְלֹא אִתָּנוּ יֹדֵעַ
  english_pob_choice: and none among us knows
  chosen_spanish: y ninguno entre nosotros sabe
  alternatives_spanish:
  - y no hay entre nosotros quien sepa
  - y nadie entre nosotros entiende
  lexicon: HALOT
  rationale: La construcción es elíptica. “Ninguno entre nosotros sabe” reproduce bien la idea de ausencia total de conocimiento dentro de la comunidad, sin sobreinterpretar el verbo como “entiende”.
- source_word: עַד מָה
  english_pob_choice: how long
  chosen_spanish: hasta cuándo
  alternatives_spanish:
  - hasta qué tiempo
  - cuánto falta
  lexicon: HALOT
  rationale: En contextos de lamento, עַד מָה es un modismo para “hasta cuándo”. Es la equivalencia natural en español y conserva la carga de desesperación temporal.
theological_decisions:
- issue: Referente de “nuestras señales”
  english_pob_reading: Kept the expression broad as 'our signs' without specifying temple symbols, festivals, or military standards.
  chosen_spanish_reading: Mantuve la expresión amplia como “nuestras señales”, sin precisar qué clase de señal es.
  alternative_spanish_readings:
  - nuestros estandartes
  - las señales de la presencia de Dios entre nosotros
  rationale: El hebreo no identifica el referente con precisión. Mantener la amplitud evita resolver la tensión del texto y respeta la ambigüedad documentada por el POB inglés.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: El texto inglés auditado no requirió revisiones adicionales; el punto principal de decisión sigue siendo la amplitud semántica de אֹתֹתֵינוּ y la sintaxis elíptica de la segunda mitad del verso.
  spanish_consistency_notes:
  - Usé “Yahvé” solo cuando el hebreo lo exigiera; este verso no contiene el nombre divino.
  - Conservé “profeta” como término estándar y no lo sustituí por “vidente” porque el contexto no lo pide.
  - Mantuve el registro sobrio y poético, evitando explicitar interpretaciones no presentes en el hebreo.
