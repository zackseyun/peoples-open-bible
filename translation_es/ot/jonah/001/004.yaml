  text: But Yahweh hurled a great wind onto the sea[a], and there was a great storm on the sea[b], so that the ship seemed about to be broken up.
  footnotes:
  - marker: a
    text: Or 'And the LORD hurled a great wind onto the sea.' The Hebrew waw can be rendered simply as 'and'; 'but' was chosen to reflect the narrative contrast after Jonah's flight.
    reason: lexical_alternative
  - marker: b
    text: Literally, 'the ship thought to be broken.' This is a Hebrew personification meaning the ship seemed likely to break apart.
    reason: lexical_alternative
