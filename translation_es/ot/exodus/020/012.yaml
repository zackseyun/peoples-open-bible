review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien el sentido básico del hebreo: imperativo de honrar a los padres, propósito/resultado de larga vida, referencia a la tierra dada por Yahvé. También mantiene correctamente «Yahvé». Sin embargo, «sobre la tierra» en español tiende a sonar más general (''sobre la faz de la tierra'') que la referencia contextual a la tierra/land dada a Israel. Dado que el propio rastro inglés documenta «the land» como lectura principal y deja la preposición como nota alternativa, conviene ajustar el texto principal a «en la tierra» para mejor fidelidad contextual en español, conservando la nota sobre el hebreo literal.'
  spanish_quality_summary: El español es claro y digno. «Honra a tu padre y a tu madre» es excelente. «Se prolonguen tus días» es comprensible, aunque algo más formal; funciona bien por resonancia bíblica. El punto menos natural/preciso es «sobre la tierra», que en español sugiere universalidad o superficie física más que territorio pactal. «En la tierra» lee mejor y evita ambigüedad sin perder la nota literal.
  glossary_alignment: 'Alineación buena con la terminología del proyecto: יְהוָה → «Yahvé», אֱלֹהֶיךָ → «tu Dios». No hay conflicto con términos doctrinales clave. La única corrección recomendada es contextual-lexical para הָאֲדָמָה: mantener «tierra»/«land» pero con la preposición española más natural «en».'
  issues:
  - severity: medium
    issue: «sobre la tierra» en el texto principal suena menos fiel al referente contextual de הָאֲדָמָה
    rationale: Aunque עַל es literalmente «sobre», en español esta formulación sugiere 'sobre la faz de la tierra' o una ubicación superficial. Aquí el contexto «que Yahvé tu Dios te da» apunta a la tierra dada a Israel. «En la tierra» comunica mejor el sentido principal documentado en el POB, mientras la literalidad preposicional puede preservarse en nota.
  - severity: low
    issue: La nota c habla de «matiz de עַל», pero el texto principal ya prioriza demasiado la literalidad preposicional
    rationale: La estrategia del POB inglés usa la nota para conservar la alternativa; en español conviene invertir esa prioridad y dejar la opción más idiomática/contextual en el cuerpo del texto.
  revised_spanish_text: Honra a tu padre y a tu madre[a][b], para que se prolonguen tus días en la tierra[c] que Yahvé tu Dios te da.
  revised_footnotes:
  - marker: a
    text: «Honra» traduce el imperativo hebreo con la fuerza de dar peso y valor a los padres, no solo mostrarles cortesía.
    reason: lexical_alternative
  - marker: b
    text: «Se prolonguen tus días» conserva el modismo hebreo para una vida larga; no es una afirmación sobre la extensión literal de cada día.
    reason: cultural_note
  - marker: c
    text: El hebreo dice literalmente «sobre la tierra»; en español también podría traducirse así, pero «en la tierra» expresa con más naturalidad el sentido contextual de la tierra que Dios da.
    reason: lexical_alternative
  revision_rationale: Se ajusta únicamente la preposición en el texto principal de «sobre la tierra» a «en la tierra» para reflejar mejor en español el referente contextual de הָאֲדָמָה como la tierra dada por Dios, manteniendo en nota la literalidad de עַל. El resto del versículo ya es fiel, claro y alineado con la terminología del proyecto.
