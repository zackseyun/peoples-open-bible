translation:
  language: es
  text: Entonces se acercaron[a] todos los jefes de las fuerzas, y Yohanan hijo de Kareah, y Yizaniah hijo de Hoshaiah, y todo el pueblo, desde el más pequeño hasta el más grande[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «todos los capitanes de las fuerzas» o «todos los oficiales del ejército».
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: «desde el más pequeño hasta el más grande», un giro idiomático que significa a toda la comunidad, sin excepción.'
    reason: cultural_note
lexical_decisions:
- source_word: וַיִּגְּשׁוּ
  english_pob_choice: approached
  chosen_spanish: se acercaron
  alternatives_spanish:
  - se aproximaron
  - vinieron cerca
  lexicon: HALOT
  rationale: El verbo expresa movimiento hacia alguien o algo; en español, «se acercaron» comunica con naturalidad la idea de aproximación sin añadir matices ajenos al hebreo.
- source_word: כָּל שָׂרֵי הַחֲיָלִים
  english_pob_choice: all the commanders of the forces
  chosen_spanish: todos los jefes de las fuerzas
  alternatives_spanish:
  - todos los comandantes de las fuerzas
  - todos los capitanes de las fuerzas
  - todos los oficiales del ejército
  lexicon: HALOT
  rationale: שָׂרֵי señala autoridades o jefes; חֲיָלִים remite a fuerzas militares. «Jefes de las fuerzas» conserva el sentido militar sin forzar un tecnicismo menos natural en español.
- source_word: וְיוֹחָנָן בֶּן־קָרֵחַ
  english_pob_choice: along with Yohanan son of Kareah
  chosen_spanish: Yohanan hijo de Kareah
  alternatives_spanish:
  - Johanan hijo de Kareah
  lexicon: HALOT
  rationale: Se mantiene la transliteración cercana al hebreo «Yohanan», y la fórmula genealógica «hijo de» refleja con fidelidad el מקור del texto.
- source_word: וִיזַנְיָה בֶּן־הוֹשַׁעְיָה
  english_pob_choice: Yizaniah son of Hoshaiah
  chosen_spanish: Yizaniah hijo de Hoshaiah
  alternatives_spanish:
  - Jezanías hijo de Hoshaiah
  - Yezanías hijo de Hoshaiah
  lexicon: HALOT
  rationale: La forma hebrea favorece una transliteración cercana como «Yizaniah». Se conserva el nombre propio sin acomodarlo a una forma tradicional que no sigue tan de cerca el original.
- source_word: וְכָל הָעָם
  english_pob_choice: and all the people
  chosen_spanish: y todo el pueblo
  alternatives_spanish:
  - y toda la gente
  - y toda la población
  lexicon: HALOT
  rationale: «הָעָם» es el término ordinario para el conjunto del pueblo; «todo el pueblo» es la equivalencia directa y sobria en español.
- source_word: מִקָּטֹן וְעַד גָּדוֹל
  english_pob_choice: from the least to the greatest
  chosen_spanish: desde el más pequeño hasta el más grande
  alternatives_spanish:
  - del más pequeño al más grande
  - desde el menor hasta el mayor
  - de pequeño a grande
  lexicon: HALOT
  rationale: Se conserva el merismo hebreo que abarca a todos los miembros de la comunidad. En español, «desde el más pequeño hasta el más grande» reproduce bien la amplitud social y mantiene la imagen literal del texto.
theological_decisions:
- issue: Alcance inclusivo del merismo social
  english_pob_reading: an idiom meaning everyone across the whole community
  chosen_spanish_reading: un giro idiomático que abarca a toda la comunidad, sin limitarse a edad o estatura
  alternative_spanish_readings:
  - una expresión de todos, sin excepción
  - un modo de decir desde los más humildes hasta los más prominentes
  rationale: El hebreo usa una pareja extrema para incluir a todos. En español conviene explicitar en nota que no describe tamaño físico, sino totalidad social.
  doctrine_reference: Hermenéutica del merismo; cf. uso idiomático bíblico de expresiones de totalidad
translation_notes:
  revision_awareness: No se detectaron revisiones aplicadas en el audit trail; se sigue la lectura de alta concordancia (0.95) con ajustes mínimos de estilo español y mantenimiento de los nombres propios transliterados de forma cercana al hebreo.
  spanish_consistency_notes:
  - Se usa «Yahvé» como norma del proyecto solo cuando el texto lo exige; aquí no aparece el tetragrámaton.
  - Se prefirió «Yohanan» y «Yizaniah» para mantener la cercanía al hebreo, en línea con la política POB de transliteración.
  - Se mantuvo el merismo «desde el más pequeño hasta el más grande» porque el texto hebreo lo apoya claramente y la nota aclara su sentido idiomático.
