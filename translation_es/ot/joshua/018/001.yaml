revisions:
- from: Entonces toda la congregación de los hijos de Israel se reunió en Silo y establecieron allí la tienda de reunión[a][b], y la tierra fue sometida delante de ellos.
  to: Entonces toda la congregación de los hijos de Israel[a] se reunió en Silo y estableció allí la tienda de reunión, y la tierra fue sometida delante de ellos[b].
  rationale: Se corrigió la concordancia verbal ('estableció') para ajustarla al sujeto singular 'toda la congregación'. También se reubicaron las notas al pie para que el marcador sobre 'los hijos de Israel' aparezca en esa expresión y la alternativa 'fue conquistada' se ancle en la cláusula sobre la tierra, conforme al contenido de cada nota y a la disciplina del proyecto.
