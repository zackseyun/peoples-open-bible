lexical_decisions:
- source_word: וַ/עֲזַרְיָה
  english_pob_choice: Azariah
  chosen_spanish: Azarías
  alternatives_spanish:
  - Azaryah
  lexicon: HALOT
  rationale: Nombre propio hebreo; en español bíblico se adapta con la forma tradicional y reconocible «Azarías», que preserva la identificación del personaje sin traducir el nombre.
- source_word: הוֹלִיד
  english_pob_choice: fathered
  chosen_spanish: engendró
  alternatives_spanish:
  - fue padre de
  - dio origen a
  lexicon: HALOT
  rationale: En genealogías, el hiphil de ילד expresa causar el nacimiento. En español, «engendró» transmite con precisión la relación genealógica y mantiene la concisión del verbo inglés «fathered» sin perder el matiz de paternidad biológica.
- source_word: שְׂרָיָה
  english_pob_choice: Seraiah
  chosen_spanish: Seraías
  alternatives_spanish:
  - Seraía
  lexicon: HALOT
  rationale: Nombre propio hebreo transliterado/adaptado a la forma usual en español bíblico, «Seraías».
- source_word: וּ/שְׂרָיָה
  english_pob_choice: and Seraiah
  chosen_spanish: y Seraías
  alternatives_spanish:
  - e Seraías
  lexicon: HALOT
  rationale: La conjunción coordinante ו se rinde naturalmente como «y»; se conserva el paralelismo genealógico del hebreo.
- source_word: יְהוֹצָדָק
  english_pob_choice: Jehozadak
  chosen_spanish: Jehozadac
  alternatives_spanish:
  - Jehozadak
  - Jozadac
  lexicon: HALOT
  rationale: Nombre propio; se sigue la forma española bíblica inteligible «Jehozadac», que refleja el final consonántico adaptado al español y mantiene la referencia al mismo personaje.
translation_notes:
  revision_awareness: El inglés POB mantuvo una traducción genealógica directa («fathered») sin notas; el español conserva esa línea con «engendró», evitando una paráfrasis más libre. No se detectan revisiones pendientes ni tensiones textuales en este versículo.
  spanish_consistency_notes:
  - Se mantiene un registro bíblico sobrio y legible para una genealogía.
  - Los nombres propios se adaptan de forma consistente al español bíblico usual.
  - No se añade puntuación interpretativa ni glosas innecesarias, dado que el hebreo presenta una simple cadena genealógica.
