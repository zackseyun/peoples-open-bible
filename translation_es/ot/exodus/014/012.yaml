review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador conserva bien la estructura retórica, la cita introducida por «diciendo», el sentido idiomático de חֲדַל מִמֶּנּוּ y la comparación final. Sin embargo, hay un desajuste importante en דִּבַּרְנוּ אֵלֶיךָ: el hebreo es singular («te / a ti»), dirigido a Moisés, mientras que el borrador dice «les hablamos», cambiando el referente. También conviene ajustar «Déjennos» al singular por coherencia con el vocativo implícito a Moisés.'
  spanish_quality_summary: El español es generalmente claro y digno. No obstante, «les hablamos» introduce confusión referencial, y «Déjennos» en plural rompe la coherencia con el objeto singular hebreo. La frase comparativa final es legible; «mejor es para nosotros» es aceptable aunque algo más rígido que «es mejor para nosotros».
  glossary_alignment: No hay conflictos con la terminología teológica del proyecto. «Palabra» para דָּבָר y «servir a los egipcios» son adecuados. «Desierto» para בַּמִּדְבָּר es aceptable en español bíblico. El problema principal es gramatical y de fidelidad al número/persona, no de glosario.
  issues:
  - severity: high
    issue: Cambio indebido de objeto singular a plural en «les hablamos».
    rationale: דִּבַּרְנוּ אֵלֶיךָ significa «te hablamos / te dijimos», dirigido a Moisés en singular masculino. «Les hablamos» altera el referente y la escena discursiva.
  - severity: medium
    issue: Incoherencia de número en «Déjennos».
    rationale: La cita va dirigida al mismo interlocutor singular implícito en אֵלֶיךָ y en el imperativo חֲדַל. En español debe ser «Déjanos» o similar, no plural.
  - severity: low
    issue: La nota léxica sobre חֲדַל מִמֶּנּוּ puede simplificarse.
    rationale: La explicación actual contiene una formulación castellana poco natural («deja de [estar] de nosotros»). Conviene expresar el literal de manera más limpia y clara.
  revised_spanish_text: '¿No es esta la palabra que te hablamos en Egipto[a], diciendo: «Déjanos[b], y sirvamos a los egipcios»? Porque mejor es para nosotros servir a los egipcios que morir en el desierto.'
  revised_footnotes:
