translation:
  language: es
  text: Al entrar en la casa[a], salúdenla.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «saluden a los de la casa»; el griego dice «salúdenla», refiriéndose a la casa, probablemente como metonimia de quienes viven en ella.
    reason: lexical_alternative
lexical_decisions:
- source_word: εἰσερχόμενοι
  english_pob_choice: As you enter
  chosen_spanish: Al entrar
  alternatives_spanish:
  - Cuando entren
  - Mientras entran
  lexicon: BDAG
  rationale: El participio presente funciona de manera adverbial con el imperativo; en español, una construcción temporal breve y natural como "Al entrar" conserva la simultaneidad sin volver la frase artificial.
- source_word: οἰκίαν
  english_pob_choice: the house
  chosen_spanish: la casa
  alternatives_spanish:
  - el hogar
  - la casa/los de la casa
  lexicon: BDAG
  rationale: '"οἰκία" puede designar la casa física o la casa como grupo doméstico. "La casa" mantiene el referente concreto del texto griego y deja abierta la extensión metonímica al conjunto de sus habitantes.'
- source_word: ἀσπάσασθε
  english_pob_choice: greet
  chosen_spanish: salúdenla
  alternatives_spanish:
  - saluden
  - denle saludos
  - salúdenla cordialmente
  lexicon: BDAG
  rationale: El imperativo aoristo de segunda plural pide una acción directa. "Salúdenla" expresa con naturalidad el mandato en español y conserva el matiz de saludo inicial; "saluden" sería posible, pero menos explícito respecto del objeto pronominal griego.
- source_word: αὐτήν
  english_pob_choice: it
  chosen_spanish: la
  alternatives_spanish:
  - a ella
  - al hogar
  - a los de la casa
  lexicon: BDAG
  rationale: El pronombre femenino singular concuerda con "casa". En español conviene mantener la referencia gramatical directa con "la", sin resolver en el cuerpo del texto la posible referencia metonímica a quienes viven allí.
theological_decisions:
- issue: Metonimia entre la casa y sus habitantes
  english_pob_reading: Retain the metonymic 'greet it' in the main text
  chosen_spanish_reading: Mantener "la casa"/"la" en el texto principal y aclarar la posible referencia a los habitantes en nota
  alternative_spanish_readings:
  - saluden a los de la casa
  - saluden al hogar
  rationale: El griego dice literalmente que se salude a la casa; preservar esa forma respeta la prioridad del original y evita introducir una expansión interpretativa en el texto principal. La nota puede explicar que la casa funciona probablemente como metonimia de quienes viven en ella.
  doctrine_reference: Translation philosophy §§1, 3, 5
translation_notes:
  revision_awareness: No se registran revisiones aplicadas en el expediente inglés; el pasaje quedó sin cambios tras la última pasada, y el veredicto de revisión fue de alta concordancia.
  spanish_consistency_notes:
  - Se mantuvo 'casa' para οἰκία y no 'hogar' en el texto principal, siguiendo el referente concreto del griego.
  - Se conservó el pronombre femenino singular implícito en 'salúdenla' para reflejar αὐτήν.
  - La nota usa 'hogar' como alternativa estilística, no como sustituto del referente griego principal.
