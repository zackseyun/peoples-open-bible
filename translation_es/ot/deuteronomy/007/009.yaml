review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura principal del hebreo: exhortación directiva, uso de Yahvé, énfasis en ''él es Dios'', fidelidad divina, pacto, y la relación con los que lo aman y guardan sus mandamientos. Sin embargo, la elección ''la fidelidad'' para חֶסֶד estrecha demasiado el sentido y además duplica semánticamente ''el Dios fiel'', debilitando el binomio hebreo ''el pacto y el hesed''.'
  spanish_quality_summary: El español es claro y legible, pero 'guarda el pacto y la fidelidad' suena algo extraño en español bíblico natural, porque parece que Dios guarda su propia fidelidad como un segundo objeto abstracto. 'Amor constante' o 'amor leal' expresa mejor el objeto coordinado con 'pacto' y suena más idiomático. El resto del verso está bien construido.
  glossary_alignment: Se respeta correctamente 'Yahvé'. 'Pacto' y 'mandamientos' están bien. No hay conflicto terminológico mayor salvo חֶסֶד, donde el inglés auditado prefirió 'steadfast love' y la nota preserva los matices de lealtad pactual; en español conviene un equivalente amoroso-relacional, no solo 'fidelidad'.
  issues:
  - severity: medium
    issue: חֶסֶד fue vertido como 'fidelidad'
    rationale: Aunque incluye parte del campo semántico, aquí el hebreo coordina 'el pacto y el hesed'. En español 'guardar el pacto y la fidelidad' resulta menos natural y reduce el matiz afectivo-relacional documentado por el POB ('steadfast love'). 'Amor constante' preserva mejor el equilibrio entre constancia y amor.
  - severity: low
    issue: La nota b queda desalineada con la mejor opción española
    rationale: Si el texto principal cambia a 'amor constante', la nota debe explicar que חֶסֶד también puede implicar lealtad pactual, bondad misericordiosa o fidelidad, en lugar de justificar específicamente 'fidelidad'.
  revised_spanish_text: Sabe[a], pues, que Yahvé tu Dios, él es Dios, el Dios fiel, que guarda el pacto y el amor constante[b] para los que lo aman y para los que guardan sus mandamientos, hasta mil generaciones[c].
  revised_footnotes:
