    rationale: El griego τί αὐτῷ ποιήσωσιν, en dependencia de ἐβουλεύσαντο, apunta a qué debían hacer con el altar, no meramente a un futuro narrativo.
  - severity: medium
    issue: La nota al pie incluye «desecrado», que no es español estándar.
    rationale: Es un calco/forma incorrecta. Debe sustituirse por alternativas españolas válidas y naturales.
