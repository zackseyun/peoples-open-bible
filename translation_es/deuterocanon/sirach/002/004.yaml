translation:
  language: es
  text: Acepta todo lo que venga sobre ti[a], y sé paciente en tu humillación.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: “en tu quebranto”; griego paralelo: “en los cambios de tu humillación”. El texto principal sigue el sentido probable con ambos testigos a la vista.'
    reason: alternative_reading
lexical_decisions:
- source_word: כָּל הַבָּא עָלֶיךָ / πᾶν ὃ ἐὰν ἐπαχθῇ σοι
  english_pob_choice: whatever comes upon you
  chosen_spanish: todo lo que venga sobre ti
  alternatives_spanish:
  - todo lo que te sobrevenga
  - cualquier cosa que venga sobre ti
  - todo lo que sea puesto sobre ti
  lexicon: HALOT; LXX Swete 1909
  rationale: La hebreo dice literalmente 'todo lo que venga sobre ti'; el griego paralelo refuerza la idea de algo que sobreviene o es traído sobre una persona. En español, 'todo lo que venga sobre ti' conserva la amplitud abierta y suena natural.
- source_word: קַבֵּל
  english_pob_choice: accept
  chosen_spanish: acepta
  alternatives_spanish:
  - recibe
  - acoge
  - da por aceptado
  lexicon: HALOT
  rationale: '''Aceptar'' expresa bien la exhortación a recibir circunstancias sin resistirse. ''Recibe'' es posible, pero en español aquí suena menos directo; ''acoge'' añadiría una matización demasiado positiva.'
- source_word: וּבְשִׁבְרְךָ / ἐν ἀλλάγμασιν ταπεινώσεώς σου
  english_pob_choice: be patient in your humiliation
  chosen_spanish: sé paciente en tu humillación
  alternatives_spanish:
  - sé paciente en tu quebranto
  - sé paciente en tus quebrantos
  - sé paciente en las mudanzas de tu humillación
  lexicon: HALOT; LSJ
  rationale: El hebreo permite una idea de 'quebrantamiento/brokenness', mientras que el griego habla de 'cambios/reversiones de tu humillación'. El español principal sigue la línea revisada del POB inglés ('in your humiliation') porque es la forma más clara y fiel al estado de abatimiento expresado por ambos testigos, sin forzar una lectura de 'cambios' que no queda natural en español.
- source_word: הַאֲרֵךְ רוּחַ
  english_pob_choice: be patient
  chosen_spanish: sé paciente
  alternatives_spanish:
  - sé longánime
  - ten paciencia
  - persevera con paciencia
  lexicon: HALOT
  rationale: El modismo hebreo significa literalmente 'alarga el espíritu', es decir, sé paciente / longánime. 'Sé paciente' es la equivalencia moderna más clara y comunica bien el mandato.
theological_decisions:
- issue: Cómo manejar la tensión entre el hebreo ('quebrantamiento') y el paralelo griego ('cambios de tu humillación') en la segunda cláusula
  english_pob_reading: '''be patient in your humiliation'' with a footnote noting Hebrew ''in your brokenness'' and Greek ''in the changes of your humiliation'''
  chosen_spanish_reading: '''sé paciente en tu humillación'' con nota que explicita el hebreo ''en tu quebranto'' y el griego ''en los cambios de tu humillación'''
  alternative_spanish_readings:
  - sé paciente en tu quebranto
  - sé paciente en los cambios de tu humillación
  rationale: La política del proyecto pide traducir desde el testigo original disponible y usar el paralelo griego como insumo real. Aquí el hebreo apunta a quebranto, mientras que el griego amplía la imagen hacia cambios/reversiones ligados a la humillación. El texto principal debe ser legible en español y no ocultar la tensión; por eso se mantiene 'humillación' y se deja el matiz alternativo en nota.
  doctrine_reference: 'PHILOSOPHY.md: traducir desde hebreo donde sobrevive Sirácides; usar el griego paralelo como insumo real; preservar honestamente la incertidumbre de la fuente.'
translation_notes:
  revision_awareness: El audit trail inglés revisó la segunda cláusula desde 'in the changes of your humiliation' a 'in your humiliation' para mayor precisión y naturalidad. El español sigue esa revisión, pero conserva en la nota la tensión con el hebreo y el griego para no perder transparencia textual.
  spanish_consistency_notes:
  - Se usa 'Yahvé' no aplica en este versículo.
  - Se conserva un registro moderno y digno, evitando calcos como 'recibir' en exceso.
  - '''Humillación'' se elige para reflejar el estado de abatimiento común al hebreo y al griego, mientras que la nota mantiene ''quebranto'' como alternativa lexicalmente plausible.'
