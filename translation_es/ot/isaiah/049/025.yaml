  language: en
  yaml_path: translation/ot/isaiah/049/025.yaml
  text: 'For thus says Yahweh: Even the captives of the mighty will be taken away[a], and the prey of the ruthless will escape; and I myself will contend with the one who contends with you[b], and I myself will save your children.'
