  source_review: state/reviews/gemini/vertex_gap_closure_2026_04/extra_canonical/2_baruch/069/003.job-75873.json
  category: grammar
  from: that were going to be
  to: that are to be
  rationale: The Syriac active participle 'ʿatīdān' with the infinitive 'l-mehwā'
    indicates future or destined events ('are to be' or 'will be'). Translating it
    as past tense ('were going to be') creates an awkward tense clash with the present
    tense main verb 'stand' ('qāymān').
- timestamp: '2026-04-28T09:36:33Z'
  adjudicator: claude-opus-4-7
  reviewer_model: gemini-3.1-pro-preview
  source_review: state/reviews/gemini/vertex_full_book_qc_2026_04/extra_canonical/2_baruch/069/003.job-77385.json
  category: awkward_english
  from: that are to be before him stand
  to: that are to be stand before him
  rationale: The phrase 'before him' almost certainly modifies the main verb 'stand'
    rather than the infinitive 'to be'. The current word order awkwardly suggests
    the events are destined 'to be before him', whereas 'stand before him' clearly
    conveys the intended meaning of God's omniscience.
