translation:
  language: es
  text: Y después de decir estas cosas[a], el hombre santo noblemente se entregó a las torturas, y se mantuvo firme por medio de la razón por la ley, hasta las torturas de la muerte.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El verbo griego traducido aquí como «se entregó a las torturas» es raro y difícil; también puede sugerir que afrontó la muerte o el suplicio en confrontación directa.
    reason: lexical_alternative
lexical_decisions:
- source_word: καὶ ταῦτα εἰπὼν
  english_pob_choice: And after saying these things
  chosen_spanish: Y después de decir estas cosas
  alternatives_spanish:
  - Y habiendo dicho estas cosas
  - Y cuando hubo dicho estas cosas
  lexicon: LSJ
  rationale: La construcción participial se vierte de modo natural en español con una secuencia temporal clara, sin perder el orden de los hechos.
- source_word: ὁ ἱερὸς ἀνὴρ
  english_pob_choice: the holy man
  chosen_spanish: el hombre santo
  alternatives_spanish:
  - el hombre sagrado
  - el hombre consagrado
  lexicon: LSJ
  rationale: ἱερός describe aquí santidad o carácter consagrado, no un oficio cultual. Hombre conserva ἀνήρ con referencia masculina precisa.
- source_word: εὐγενῶς
  english_pob_choice: nobly
  chosen_spanish: noblemente
  alternatives_spanish:
  - con valor
  - con noble porte
  lexicon: LSJ
  rationale: El adverbio expresa una conducta de nobleza o elevación moral; 'noblemente' preserva bien ese tono.
- source_word: ταῖς βασάνοις
  english_pob_choice: to the tortures
  chosen_spanish: a los tormentos
  alternatives_spanish:
  - a las torturas
  - bajo los tormentos
  lexicon: LSJ
  rationale: En este contexto martirial, βάσανοι señala tormentos/torturas. 'Tormentos' suena natural en español y conserva el peso del sufrimiento.
- source_word: ἐναντεθάνει
  english_pob_choice: gave himself over to the tortures
  chosen_spanish: se entregó a los tormentos
  alternatives_spanish:
  - se enfrentó a los tormentos
  - murió afrontando los tormentos
  lexicon: LSJ
  rationale: El verbo compuesto es raro y difícil; puede implicar confrontación directa con el suplicio o una entrega deliberada al mismo. 'Se entregó' mantiene la acción sin sobreprecisar el matiz.
- source_word: μέχρι τῶν θανάτου βασάνων
  english_pob_choice: even to the tortures of death
  chosen_spanish: hasta los tormentos de la muerte
  alternatives_spanish:
  - hasta los tormentos mortales
  - hasta el punto de muerte
  lexicon: LSJ
  rationale: La frase intensifica el alcance del padecimiento. 'Tormentos de la muerte' conserva el genitivo y la gravedad retórica del griego.
- source_word: ἀντέστη
  english_pob_choice: stood firm
  chosen_spanish: se mantuvo firme
  alternatives_spanish:
  - resistió
  - se opuso
  lexicon: LSJ
  rationale: ἀνθίστημι expresa resistencia o mantenerse contra algo. 'Se mantuvo firme' comunica resistencia y constancia en un español idiomático.
- source_word: τῷ λογισμῷ
  english_pob_choice: by reason
  chosen_spanish: por la razón
  alternatives_spanish:
  - por su razón
  - con la razón
  lexicon: LSJ
  rationale: En 4 Macabeos λογισμός tiene carga filosófica y psicológica como facultad rectora de la razón. 'Por la razón' preserva ese principio rector sin volverlo demasiado técnico.
- source_word: διὰ τὸν νόμον
  english_pob_choice: for the law
  chosen_spanish: para la ley
  alternatives_spanish:
  - por la ley
  - a causa de la ley
  lexicon: LSJ
  rationale: '''Para la ley'' transmite la finalidad o causa moral de su firmeza y mantiene la referencia directa al mandato divino.'
theological_decisions:
- issue: Valor de λογισμός en un contexto filosófico-martirial
  english_pob_reading: by reason
  chosen_spanish_reading: por la razón
  alternative_spanish_readings:
  - por su razón
  - con la razón
  rationale: 4 Macabeos subraya el gobierno de la razón sobre el dolor y las pasiones. 'Por la razón' conserva el campo conceptual de la facultad racional sin añadir terminología filosófica posterior.
  doctrine_reference: DOCTRINE.md §Translation philosophy 1, 5, 6
- issue: Referencia masculina de ἀνήρ
  english_pob_reading: the holy man
  chosen_spanish_reading: el hombre santo
  alternative_spanish_readings:
  - la persona santa
  rationale: El griego usa ἀνήρ, término masculino adulto. 'El hombre santo' respeta esa referencia y evita neutralizar indebidamente el sujeto.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4
- issue: Intensificación martirial de βασάνοι θανάτου
  english_pob_reading: even to the tortures of death
  chosen_spanish_reading: hasta los tormentos de la muerte
  alternative_spanish_readings:
  - hasta los tormentos mortales
  - hasta morir
  rationale: La expresión griega acumula sufrimiento e intensidad. La versión española conserva el paralelismo y no lo reduce a una simple mención de la muerte.
  doctrine_reference: DOCTRINE.md §Translation philosophy 1, 6
translation_notes:
  revision_awareness: Se corrigió el problema previo asegurando que el marcador de nota [a] aparezca exactamente en el texto español. La redacción mantiene el valor raro de ἐναντεθάνει sin forzar una interpretación excesiva, y conserva la lectura revisada de τῷ λογισμῷ como referencia al principio de la razón.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' solo cuando el texto lo requiera; este versículo no contiene el nombre divino explícito.
  - '''Tormentos'' se usa de forma consistente para βασάνοις en este pasaje martirial.'
  - '''Razón'' se preserva para λογισμός según la línea auditada del POB en inglés.'
  - Se conservó la referencia masculina de ἀνήρ con 'hombre santo'.
