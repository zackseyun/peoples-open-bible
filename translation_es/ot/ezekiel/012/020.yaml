translation:
  language: es
  text: Y las ciudades habitadas serán devastadas, y la tierra será una desolación; entonces sabrán que yo soy Yahvé[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «YHWH». Tradicionalmente se vierte «el SEÑOR» en muchas traducciones.'
    reason: alternative_reading
lexical_decisions:
- source_word: הֶעָרִים
  english_pob_choice: the cities
  chosen_spanish: las ciudades
  alternatives_spanish:
  - los pueblos
  - las urbes
  lexicon: HALOT
  rationale: עִיר puede referirse a ciudad o poblado; en este contexto de juicio profético, “ciudades” conserva la amplitud natural y suena más directo en español bíblico contemporáneo.
- source_word: הַנּוֹשָׁבוֹת
  english_pob_choice: inhabited
  chosen_spanish: habitadas
  alternatives_spanish:
  - pobladas
  - asentadas
  lexicon: HALOT
  rationale: El participio de ישׁב indica que las ciudades están pobladas o habitadas. “Habitadas” reproduce bien el contraste con la ruina venidera y es idiomático en español.
- source_word: תֶּחֱרַבְנָה
  english_pob_choice: will be laid waste
  chosen_spanish: quedarán arruinadas
  alternatives_spanish:
  - serán devastadas
  - quedarán en ruinas
  lexicon: HALOT
  rationale: חרב expresa quedar arruinado o devastado. “Quedarán arruinadas” mantiene el resultado de destrucción sin volver la frase demasiado técnica o forzada en español.
- source_word: הָאָרֶץ
  english_pob_choice: the land
  chosen_spanish: la tierra
  alternatives_spanish:
  - el país
  - el territorio
  lexicon: HALOT
  rationale: Aquí אֶרֶץ se refiere al ámbito territorial afectado por el juicio. “La tierra” preserva esa amplitud y funciona de manera natural en español.
- source_word: שְׁמָמָה
  english_pob_choice: a desolation
  chosen_spanish: una desolación
  alternatives_spanish:
  - un desierto
  - una ruina
  lexicon: HALOT
  rationale: El sustantivo nombra un estado de devastación. “Una desolación” conserva la fuerza nominal que el inglés POB también quiso preservar.
- source_word: תִהְיֶה
  english_pob_choice: will become
  chosen_spanish: será
  alternatives_spanish:
  - llegará a ser
  - vendrá a ser
  lexicon: HALOT
  rationale: En español, con “una desolación”, “será” transmite de forma natural el estado resultante sin perder el sentido de transformación implícito en היה.
- source_word: וִידַעְתֶּם
  english_pob_choice: then you will know
  chosen_spanish: entonces sabrán
  alternatives_spanish:
  - y sabrán
  - así sabrán
  lexicon: HALOT
  rationale: La secuencia profética expresa consecuencia. “Entonces” hace explícito ese resultado sin añadir contenido ajeno al hebreo.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: Se mantiene el nombre propio divino y la política del proyecto de traducir יְהוָה como “Yahvé”, en vez de sustituirlo por un título.
theological_decisions:
- issue: Uso del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: El versículo termina con la fórmula de reconocimiento divina. Traducir el Tetragrama como “Yahvé” conserva el nombre del pacto y evita la sustitución tradicional por un título.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
translation_notes:
  revision_awareness: Se siguió el estado más reciente del expediente en alto acuerdo; no se detectaron revisiones pendientes ni cambios necesarios respecto del sentido base. La redacción española conserva la estructura profética del hebreo y la decisión doctrinal de rendir el Nombre divino como Yahvé.
  spanish_consistency_notes:
  - Se mantiene “Yahvé” como equivalente constante de יְהוָה.
  - Se eligió “la tierra” para אֶרֶץ por el contexto territorial del juicio.
  - Se conservó el valor consecuencial de וִידַעְתֶּם con “entonces”.
  - La nota [a] marca el nombre hebreo sin ocultar el Tetragrama.
