translation:
  language: es
  text: o su tío, o el hijo de su tío[a], podrá redimirlo; o uno de sus parientes cercanos de su clan podrá redimirlo; o si prospera[b], podrá redimirse.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literalmente, 'hijo de su tío'; es decir, su primo.
    reason: lexical_alternative
  - marker: b
    text: 'O: «si alcanza recursos suficientes». El hebreo dice literalmente: «si su mano prospera/alcanza».'
    reason: lexical_alternative
lexical_decisions:
- source_word: דֹדוֹ
  english_pob_choice: his uncle
  chosen_spanish: su tío
  alternatives_spanish:
  - su tío paterno
  - su pariente cercano
  lexicon: HALOT
  rationale: En este contexto legal de parentesco, דּוֹד designa al tío. 'Su tío' es claro y fiel; 'tío paterno' añade precisión pero no está exigido por el texto.
- source_word: בֶן דֹּדוֹ
  english_pob_choice: his uncle’s son
  chosen_spanish: el hijo de su tío
  alternatives_spanish:
  - su primo
  - el hijo de su tío
  lexicon: HALOT
  rationale: La expresión hebrea es literalmente 'hijo de su tío'. Se conserva esa transparencia en español, como hizo el POB en inglés, y se evita imponer 'primo' en el texto principal.
- source_word: יִגְאָלֶנּוּ
  english_pob_choice: may redeem him
  chosen_spanish: podrá redimirlo
  alternatives_spanish:
  - puede redimirlo
  - lo redimirá
  lexicon: HALOT
  rationale: '''Redimir'' mantiene el término jurídico-teológico de גאל en esta sección. ''Podrá'' expresa bien el valor casuístico/permisivo del hebreo.'
- source_word: מִשְּׁאֵר בְּשָׂרוֹ
  english_pob_choice: one of his close relatives
  chosen_spanish: uno de sus parientes cercanos
  alternatives_spanish:
  - uno de sus parientes de sangre
  - uno de sus parientes más cercanos
  lexicon: HALOT
  rationale: El modismo alude a parientes cercanos por sangre. 'Parientes cercanos' comunica el sentido sin calc ar 'carne' en un español natural, preservando la proximidad kinshipal.
- source_word: מִמִּשְׁפַּחְתּוֹ
  english_pob_choice: from his clan
  chosen_spanish: de su clan
  alternatives_spanish:
  - de su familia
  - de su linaje
  lexicon: HALOT
  rationale: '''Clan'' refleja mejor el grupo de parentesco más amplio que ''familia'' en este marco legal israelita. Se mantiene la distinción social sugerida por מִשְׁפָּחָה.'
- source_word: הִשִּׂיגָה יָדוֹ
  english_pob_choice: if he prospers
  chosen_spanish: si prospera
  alternatives_spanish:
  - si alcanza recursos suficientes
  - si su mano prospera
  lexicon: HALOT
  rationale: El inglés del POB optó por una equivalencia idiomática más natural; en español, 'si prospera' transmite la misma idea de adquirir medios suficientes sin forzar la imagen de la mano en el cuerpo del texto.
- source_word: וְנִגְאָל
  english_pob_choice: he may redeem himself
  chosen_spanish: podrá redimirse a sí mismo
  alternatives_spanish:
  - podrá ser redimido
  - podrá redimirse
  lexicon: HALOT
  rationale: El verbo no es formalmente reflexivo, pero el contexto indica auto-redención por medios propios. 'Redimirse a sí mismo' preserva la idea contextual y la claridad en español.
theological_decisions:
- issue: Terminología de גאל en la ley de rescate familiar
  english_pob_reading: Use 'redeem' consistently for גאל in this legal context.
  chosen_spanish_reading: Usar 'redimir' de manera consistente para גאל en este contexto legal.
  alternative_spanish_readings:
  - rescatar
  - comprarlo de vuelta
  rationale: '''Redimir'' conserva la red conceptual de la legislación del rescate familiar y evita reducir el acto a una transacción meramente comercial.'
  doctrine_reference: Translation philosophy §5
- issue: Tratamiento de la cláusula final sobre recursos adquiridos
  english_pob_reading: 'Retain the hand-idiom in a readable form: ''if he prospers.'''
  chosen_spanish_reading: 'Preferir una equivalencia idiomática: ''si prospera''.'
  alternative_spanish_readings:
  - si su mano prospera
  - si alcanza medios suficientes
  rationale: En español, 'si prospera' comunica el resultado del modismo hebreo con naturalidad. La alternativa literal 'su mano prospera' es posible, pero aquí sonaría demasiado dura para publicación.
  doctrine_reference: Translation philosophy §1, §6
translation_notes:
  revision_awareness: El contexto inglés fue revisado para hacer más natural 'close relatives' y 'if he prospers'. La versión española sigue esa línea de equivalencia óptima, pero conserva la transparencia del parentesco ('hijo de su tío') y del verbo jurídico 'redimir'.
  spanish_consistency_notes:
  - Se mantuvo 'redimir' para גאל, coherente con la terminología legal del capítulo.
  - '''Clan'' se usó para מִשְׁפָּחָה, evitando confundir el grupo amplio de parentesco con ''familia'' en sentido nuclear.'
  - La nota sobre 'hijo de su tío' preserva la alternativa 'primo' sin imponerla en el texto principal.
  - La cláusula final se tradujo idiomáticamente como 'si prospera', con nota que conserva la imagen hebrea de la mano.
