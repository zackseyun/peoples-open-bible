translation:
  language: es
  text: Ella dejará su memoria para maldición, y su oprobio no será borrado.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: καταλείψει
  english_pob_choice: will leave
  chosen_spanish: dejará
  alternatives_spanish:
  - abandonará
  - dejará atrás
  lexicon: BDAG
  rationale: El futuro de καταλείπω expresa aquí lo que quedará después de ella. «Dejará» conserva la idea de permanencia resultante sin sonar forzado en español.
- source_word: εἰς κατάραν
  english_pob_choice: for a curse
  chosen_spanish: como maldición
  alternatives_spanish:
  - para maldición
  - en maldición
  lexicon: BDAG
  rationale: La preposición εἰς marca resultado u उद्देश्य; en español, «como maldición» comunica que su memoria queda constituida en maldición, con un giro natural y fiel al efecto del griego.
- source_word: τὸ μνημόσυνον αὐτῆς
  english_pob_choice: her memory
  chosen_spanish: su memoria
  alternatives_spanish:
  - su recuerdo
  - su remembranza
  - su memorial
  lexicon: BDAG
  rationale: μνημόσυνον puede ser «recuerdo» o «memorial», pero aquí apunta a la memoria perdurable de su nombre/reputación. «Su memoria» preserva ese sentido en español contemporáneo.
- source_word: τὸ ὄνειδος αὐτῆς
  english_pob_choice: her disgrace
  chosen_spanish: su oprobio
  alternatives_spanish:
  - su vergüenza
  - su deshonra
  - su afrenta
  lexicon: BDAG
  rationale: ὄνειδος denota reproche público, vergüenza o deshonra. «Oprobio» mantiene el peso social y moral del término y encaja bien con el registro sapiencial.
- source_word: οὐκ ἐξαλειφθήσεται
  english_pob_choice: will not be wiped away
  chosen_spanish: no será borrado
  alternatives_spanish:
  - no será borrado de un solo trazo
  - no será eliminado
  - no será borrado/quitado
  lexicon: BDAG
  rationale: ἐξαλείφω significa literalmente «borrar, borrar por frotamiento». «No será borrado» conserva la metáfora de eliminación escrita/visible de manera clara y sobria en español.
theological_decisions:
- issue: Duración de la vergüenza pública en un dicho sapiencial
  english_pob_reading: Retain the verse's stark statement of enduring public disgrace without softening or expanding it.
  chosen_spanish_reading: Mantener la afirmación tajante de que la memoria queda como maldición y el oprobio no se borra, sin suavizarla ni añadir explicación teológica externa.
  alternative_spanish_readings:
  - Atenuarlo como mera mala fama
  - Explicitarlo como juicio divino directo
  rationale: El griego presenta una sentencia sapiencial sobre la permanencia del deshonor; la traducción conserva esa severidad sin introducir doctrinas o matices que el texto no expresa en esta cláusula.
  doctrine_reference: Principios de traducción §§1, 3, 6
translation_notes:
  revision_awareness: El texto griego y el control inglés muestran acuerdo alto y no registran revisiones aplicadas; por ello la versión española sigue de cerca el sentido asentado sin introducir variantes textuales ni ajustes interpretativos adicionales.
  spanish_consistency_notes:
  - Se emplea «memoria» para μνημόσυνον, en continuidad con el inglés POB y con sentido natural en español.
  - Se evita «SEÑOR» u otras sustituciones porque el verso no contiene el nombre divino ni cita directa de κύριος.
  - Se mantiene un registro sobrio y sapiencial, sin arcaísmos innecesarios, para conservar la fuerza proverbial del enunciado.
