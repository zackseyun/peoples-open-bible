translation:
  language: es
  text: Sin embargo, no entrará al velo[a] o se acercará al altar, porque hay un defecto[b] en él, para que no profane mis santuarios[c]; porque yo soy Yahvé, quien los santifica.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «la cortina». El término hebreo se refiere al velo del santuario interior.
    reason: lexical_alternative
  - marker: b
    text: O «tiene una mancha». El hebreo habla de un defecto físico que descalifica para este acercamiento sacerdotal, no de una falla moral.
    reason: lexical_alternative
  - marker: c
    text: Hebreo «mis santuarios» (plural); algunas traducciones suavizan esto a «mi santuario».
    reason: lexical_alternative
lexical_decisions:
- source_word: אַךְ
  english_pob_choice: However
  chosen_spanish: Sin embargo
  alternatives_spanish:
  - Pero
  - No obstante
  lexicon: HALOT
  rationale: El hebreo introduce una restricción o excepción; «sin embargo» conserva el matiz adversativo de forma natural en español moderno y evita el valor demasiado abierto de «solo».
- source_word: הַפָּרֹכֶת
  english_pob_choice: the veil
  chosen_spanish: el velo
  alternatives_spanish:
  - la cortina
  - el velo del santuario
  lexicon: HALOT
  rationale: En contexto sacerdotal se refiere al velo interior del santuario. «Velo» preserva la terminología cultual tradicional y resulta breve; «cortina» es posible, pero menos marcada litúrgicamente.
- source_word: יָבֹא
  english_pob_choice: go in
  chosen_spanish: entrará
  alternatives_spanish:
  - irá
  - ingresará
  lexicon: HALOT
  rationale: Con la preposición אֶל y el contexto del santuario, el sentido es entrar en esa zona. «Entrará» comunica con claridad el movimiento hacia adentro sin calco innecesario.
- source_word: הַמִּזְבֵּחַ
  english_pob_choice: the altar
  chosen_spanish: el altar
  lexicon: HALOT
  rationale: Es la correspondencia directa y normal para el altar sacrificial en contexto levítico.
- source_word: יִגַּשׁ
  english_pob_choice: come near
  chosen_spanish: se acercará
  alternatives_spanish:
  - se aproximará
  - se acercará a
  lexicon: HALOT
  rationale: En lenguaje sacerdotal, נגשׁ expresa aproximación ritual. «Se acercará» es idiomático y mantiene el registro reverente sin perder precisión.
- source_word: מ֣וּם בּוֹ
  english_pob_choice: there is a defect in him
  chosen_spanish: hay un defecto en él
  alternatives_spanish:
  - tiene una mancha
  - hay una imperfección en él
  - tiene un defecto
  lexicon: HALOT
  rationale: «Defecto» preserva la idea de descalificación ritual sin sugerir falla moral. Se mantiene la tensión del POB inglés frente a alternativas como «mancha», que en español puede sonar más estigmatizante o menos exacta.
- source_word: יְחַלֵּל
  english_pob_choice: profane
  chosen_spanish: profane
  alternatives_spanish:
  - contamine
  - profan(e)
  - deshonre
  lexicon: HALOT
  rationale: En la semántica de santidad levítica, חלל significa tratar como común lo santo. «Profane» es el equivalente técnico más fiel y transparente en español bíblico.
- source_word: מִקְדָּשַׁי
  english_pob_choice: my sanctuaries
  chosen_spanish: mis santuarios
  alternatives_spanish:
  - mi santuario
  - mis lugares santos
  lexicon: HALOT
  rationale: El hebreo es plural con sufijo de primera persona singular. Se conserva el plural explícito con «santuarios», siguiendo la decisión auditada del POB inglés y evitando aplanar la forma a singular.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  lexicon: HALOT
  rationale: 'Se sigue la convención del proyecto para el Nombre divino: transliteración «Yahvé» en lugar de la sustitución por «Señor». Esto preserva el nombre personal revelado en el texto.'
- source_word: מְקַדְּשָׁם
  english_pob_choice: who sanctifies them
  chosen_spanish: que los santifico
  alternatives_spanish:
  - que los santifica
  - que los consagra
  lexicon: HALOT
  rationale: Se conserva la relación con los «santuarios» plurales mediante el pronombre «los». El hebreo puede referirse gramaticalmente a los lugares sagrados; «santifico» mantiene el lenguaje de santidad sin imponer una paráfrasis más fuerte.
theological_decisions:
- issue: Referente del sufijo en מְקַדְּשָׁם
  english_pob_reading: them refers to 'my sanctuaries'
  chosen_spanish_reading: los refiere a «mis santuarios»
  alternative_spanish_readings:
  - los refiere a los sacerdotes
  - los refiere al pueblo
  rationale: La antecedente más cercano y gramaticalmente natural es el sustantivo plural «mis santuarios». La sintaxis inmediata trata del acceso al espacio santo, por lo que esta lectura es la más sólida en el contexto.
  doctrine_reference: Levítico 21:23; nota textual/gramatical del POB
- issue: Valor de מוּם en una ley de santidad sacerdotal
  english_pob_reading: defect
  chosen_spanish_reading: defecto
  alternative_spanish_readings:
  - mancha
  - imperfección
  rationale: La restricción es ritual y cultual, no moral. «Defecto» evita sugerir culpa ética o menosprecio personal, y mantiene la descalificación para el acceso sacerdotal según el texto.
  doctrine_reference: Translation philosophy §3, §6
translation_notes:
  revision_awareness: Seguí la revisión auditada del POB inglés que sustituyó la coordinación negativa pesada por una coordinación más natural con «o». También conservé el plural de «mis santuarios» y la decisión de traducir el Nombre divino como Yahvé. En español mantuve el paralelismo del hebreo sin añadir explicaciones que no estén motivadas por el texto.
  spanish_consistency_notes:
  - Se usó «Yahvé» de forma coherente con el estándar del proyecto para יְהוָה.
  - Se preservó el plural de מִקְדָּשַׁי como «mis santuarios», según el audit trail inglés.
  - Se mantuvo la distinción ritual de מוּם como «defecto», no como juicio moral.
  - «Profane» se conserva como verbo técnico de santidad, evitando sustituirlo por un término más general.
  - La coordinación negativa se formuló con «ni», natural en español y consistente con la intención revisada del inglés.
