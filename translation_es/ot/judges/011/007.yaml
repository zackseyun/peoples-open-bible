    issue: «vienen ahora a mí» para בָּאתֶם אֵלַי עַתָּה
    rationale: Aunque el español presente puede sonar natural, aquí reduce el matiz de acción ya realizada que la auditoría inglesa expresó con present perfect. «han venido a mí ahora» mantiene mejor la acusación de Jefté sin perder naturalidad.
  - severity: medium
    issue: «en apuro» es demasiado coloquial para el registro meta
    rationale: La cláusula כַּאֲשֶׁר צַר לָכֶם habla de estar en estrechez o angustia. «En apuro» comunica la idea, pero en español bíblico neutral suena más informal que «en angustia» o «en dificultad».
  - severity: low
    issue: El enlace «¿Y por qué...?» es aceptable, pero puede elevarse ligeramente
    rationale: «Entonces, ¿por qué...?» refleja bien el valor inferencial de וּמַדּוּעַ y enlaza con mayor claridad la acusación previa y la pregunta subsiguiente.
