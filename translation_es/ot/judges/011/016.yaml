translation:
  language: es
  text: Pues, cuando subieron de Egipto, Israel fue por el desierto hasta el Mar Rojo[a] y llegó a Cades.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Otra posibilidad de traducción para «Mar Rojo» es «Mar de Juncos».
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Porque cuando
  lexicon: HALOT
  rationale: Aquí כִּי introduce el fundamento o trasfondo de la afirmación previa. En español, «porque» conserva esa relación explicativa; la cláusula temporal siguiente lleva la referencia de tiempo al evento de subir de Egipto.
- source_word: בַּעֲלוֹתָם מִמִּצְרָיִם
  english_pob_choice: when they came up from Egypt
  chosen_spanish: cuando subieron de Egipto
  alternatives_spanish:
  - al subir de Egipto
  - cuando salieron de Egipto
  lexicon: HALOT
  rationale: El infinitivo con prefijo temporal expresa el momento de la acción. «Subieron de Egipto» mantiene la imagen bíblica de ascenso/salida sin forzar una paráfrasis más amplia.
- source_word: וַיֵּלֶךְ
  english_pob_choice: went through
  chosen_spanish: fue por
  alternatives_spanish:
  - anduvo por
  - fue a través de
  lexicon: HALOT
  rationale: En este contexto narrativo, הלך indica desplazamiento por una región. «Fue por el desierto» suena natural en español y conserva la idea de tránsito sin añadir un complemento demasiado interpretativo.
- source_word: יִשְׂרָאֵל
  english_pob_choice: Israel
  chosen_spanish: Israel
  alternatives_spanish:
  - el pueblo de Israel
  lexicon: HALOT
  rationale: Se mantiene el nombre propio tal como en el hebreo. Aunque funcione colectivamente, en español el singular es normal y fiel al original.
- source_word: בַּמִּדְבָּר
  english_pob_choice: through the wilderness
  chosen_spanish: por el desierto
  alternatives_spanish:
  - en el desierto
  - a través del desierto
  lexicon: HALOT
  rationale: מִדְבָּר puede rendirse por «desierto» o «desierto/estepa». Aquí «desierto» comunica el ámbito geográfico de forma clara y respeta el movimiento implícito en el verbo.
- source_word: עַד יַם סוּף
  english_pob_choice: as far as the Red Sea
  chosen_spanish: hasta el Mar Rojo
  alternatives_spanish:
  - hasta el mar de Juncos
  - hasta el Mar de Juncos
  lexicon: HALOT
  rationale: Se conserva la forma tradicional y reconocible «Mar Rojo» en el texto principal, mientras que la alternativa lexical «mar de Juncos» se mantiene implícita en la documentación por el valor posible de יַם סוּף.
- source_word: וַיָּבֹא
  english_pob_choice: came
  chosen_spanish: llegó
  alternatives_spanish:
  - vino
  - arribó
  lexicon: HALOT
  rationale: בוא expresa llegada/arribo. «Llegó» es natural en español y conserva la secuencia narrativa del movimiento sin recargarla.
- source_word: קָדֵשָׁה
  english_pob_choice: to Kadesh
  chosen_spanish: a Cades
  alternatives_spanish:
  - a Cades-barnea
  lexicon: HALOT
  rationale: El nombre propio se adapta al uso español bíblico como «Cades». El hebreo aquí nombra Cades sin añadir «Barnea», por eso se conserva la forma breve en el texto principal.
translation_notes:
  revision_awareness: La revisión más reciente indica que no hubo cambios necesarios; este borrador sigue de cerca el texto hebreo y el audit trail inglés, manteniendo la decisión tradicional-documentada para יַם סוּף y la referencia breve a Cades.
  spanish_consistency_notes:
  - Se usa «desierto» como equivalente estable de מִדְבָּר en estilo bíblico contemporáneo.
  - Se mantiene «Mar Rojo» por consistencia con la tradición española y la decisión auditada en inglés, con nota alternativa para יַם סוּף.
  - «Cades» se conserva como topónimo bíblico breve, coherente con el hebreo de esta línea.
