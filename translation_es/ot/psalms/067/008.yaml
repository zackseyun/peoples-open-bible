translation:
  language: es
  text: Dios nos bendecirá[a], y todos los confines de la tierra le temerán.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O ‘lo reverenciarán’ o ‘estarán en asombro ante él’. El verbo hebreo puede abarcar tanto temor como reverencia reverente en relación con Dios.
    reason: lexical_alternative
lexical_decisions:
- source_word: יְבָרְכֵנוּ
  english_pob_choice: will bless us
  chosen_spanish: nos bendecirá
  alternatives_spanish:
  - que nos bendiga
  - nos bendice
  lexicon: HALOT
  rationale: El piel de ברך con sufijo de 1.ª plural expresa ‘bendecirnos’. En este contexto poético, el imperfecto se entiende con valor prospectivo o de certeza; por eso ‘nos bendecirá’ comunica bien la confianza declarativa del verso. Se evita una forma más optativa si se quiere mantener el paralelismo con la segunda cláusula.
- source_word: אֱלֹהִים
  english_pob_choice: God
  chosen_spanish: Dios
  alternatives_spanish:
  - el Dios
  lexicon: HALOT
  rationale: Aunque אֱלֹהִים tiene forma plural, el verbo singular indica un referente singular. En español, ‘Dios’ es la forma natural y fiel al referente singular sin añadir artículo innecesario.
- source_word: וְיִירְאוּ
  english_pob_choice: and ... will fear
  chosen_spanish: y ... le temerán
  alternatives_spanish:
  - y ... lo reverenciarán
  - y ... le rendirán reverencia
  - y ... estarán sobrecogidos por él
  lexicon: HALOT
  rationale: ירא ante Dios abarca temor reverente y sobrecogimiento. Se conserva ‘temerán’ para mantener la fuerza léxica primaria y la tensión teológica del término, en vez de suavizarlo a una sola idea de respeto.
- source_word: אֹתוֹ
  english_pob_choice: him
  chosen_spanish: le
  alternatives_spanish:
  - lo
  lexicon: HALOT
  rationale: El pronombre retoma a אֱלֹהִים como referente personal singular. En español, el dativo ‘le’ funciona naturalmente con ‘temer’ y mantiene la referencia personal.
- source_word: כָּל אַפְסֵי אָרֶץ
  english_pob_choice: all the ends of the earth
  chosen_spanish: todos los confines de la tierra
  alternatives_spanish:
  - todas las extremidades de la tierra
  - todas las regiones remotas de la tierra
  - los confines de toda la tierra
  lexicon: HALOT
  rationale: La locución constructa es un modismo para los extremos o regiones más lejanas de la tierra. ‘Confines de la tierra’ preserva la imagen poética y es idiomático en español; el ‘todos’ de כָּל se expresa de manera natural como ‘todos los’.
theological_decisions:
- issue: Valor de ירא aplicado a Dios
  english_pob_reading: fear him
  chosen_spanish_reading: le temerán
  alternative_spanish_readings:
  - lo reverenciarán
  - estarán en asombro ante él
  - le rendirán reverencia
  rationale: 'La decisión mantiene el peso bíblico de ירא: no mero respeto, sino temor reverente y reconocimiento de la majestad divina. En español, ‘temerán’ preserva mejor esa tensión que una paráfrasis que la reduzca.'
  doctrine_reference: Translation philosophy §§3, 6
translation_notes:
  revision_awareness: El texto inglés auditado se mantiene sin revisiones aplicadas; esta propuesta sigue el acuerdo alto del control cruzado y conserva la fuerza de ‘fear’ en la segunda cláusula, expresando el primer verbo con un futuro declarativo equivalente en español.
  spanish_consistency_notes:
  - Se usa ‘Dios’ para אֱלֹהִים con referente singular, coherente con el verbo singular hebreo.
  - Se evita ‘SEÑOR’ porque el hebreo aquí dice אֱלֹהִים, no el Tetragrámaton.
  - ‘Confines de la tierra’ conserva el idiomatismo poético de אַפְסֵי אָרֶץ.
  - La nota al pie se ancla en ‘temerán’ para preservar la alternativa semántica de reverencia sin reemplazar el término principal.
