translation:
  language: es
  text: Él edificará una casa para mi nombre[a], y será para mí hijo, y yo seré su padre; y estableceré el trono de su reino sobre Israel para siempre.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'templo para mi nombre'. El hebreo dice literalmente 'casa para mi nombre'.
    reason: lexical_alternative
lexical_decisions:
- source_word: בַּיִת
  english_pob_choice: house
  chosen_spanish: casa
  alternatives_spanish:
  - templo
  lexicon: HALOT
  rationale: Conservo el sentido básico de בַּיִת como 'casa' en el texto principal, como hace la POB en inglés, porque preserva la expresión hebrea 'casa para mi nombre' sin adelantar demasiado la interpretación cultual. En este contexto alude al templo, pero 'casa' mantiene la formulación original y la tensión semántica.
- source_word: לִשְׁמִי
  english_pob_choice: for my name
  chosen_spanish: para mi nombre
  alternatives_spanish:
  - para honra de mi nombre
  - en nombre de mi nombre
  lexicon: HALOT
  rationale: '''Para mi nombre'' reproduce de manera directa el modismo hebreo y mantiene el vínculo teológico con la presencia y el honor de Yahvé. ''Para el nombre de mi nombre'' sería artificial en español, así que ''para mi nombre'' conserva fidelidad y naturalidad.'
- source_word: לְבֵן
  english_pob_choice: a son
  chosen_spanish: por hijo
  alternatives_spanish:
  - como hijo
  - un hijo
  lexicon: HALOT
  rationale: El hebreo expresa una relación de filiación/covenio mediante la construcción con ל. En español, 'me será por hijo' comunica esa relación de manera idiomática y cercana al paralelismo hebreo. 'Como hijo' suavizaría un poco la fórmula; 'un hijo' sería menos relacional.
- source_word: לְאָב
  english_pob_choice: a father
  chosen_spanish: por padre
  alternatives_spanish:
  - como padre
  - un padre
  lexicon: HALOT
  rationale: Mantengo el paralelismo con 'por hijo'. 'Me seré por padre' es gramaticalmente estable y refleja la fórmula relacional sin reinterpretarla como mero trato afectivo.
- source_word: וַהֲכִינוֹתִי
  english_pob_choice: I will establish
  chosen_spanish: afirmaré
  alternatives_spanish:
  - estableceré
  - confirmaré
  lexicon: HALOT
  rationale: כּון en hifil expresa hacer firme, asegurar o establecer. 'Afirmaré' comunica bien la estabilidad dinástica en español y evita la redundancia de 'estableceré' con 'trono' y 'reino'. Mantiene la fuerza de la promesa real.
- source_word: כִּסֵּא מַלְכוּתֹו
  english_pob_choice: the throne of his kingdom
  chosen_spanish: el trono de su reino
  alternatives_spanish:
  - su trono real
  - el trono de su realeza
  lexicon: HALOT
  rationale: Sigo de cerca la estructura hebrea para retener tanto 'trono' como la dimensión dinástica de 'reino'. 'Su trono real' sería más idiomático pero menos transparente respecto a la combinación de términos del original.
- source_word: עַל יִשְׂרָאֵל
  english_pob_choice: over Israel
  chosen_spanish: sobre Israel
  alternatives_spanish:
  - para Israel
  - en Israel
  lexicon: HALOT
  rationale: '''Sobre Israel'' refleja el valor de עַל en un contexto de gobierno/regencia. Conserva la imagen de autoridad real sin diluirla en una relación más vaga como ''para Israel''.'
- source_word: עַד עוֹלָם
  english_pob_choice: forever
  chosen_spanish: para siempre
  alternatives_spanish:
  - eternamente
  - por siempre
  lexicon: HALOT
  rationale: '''Para siempre'' es la forma natural en español para expresar perpetuidad y conserva el alcance de עַד עוֹלָם. Es la opción más clara y bíblicamente reconocible sin depender de una fórmula arcaica.'
theological_decisions:
- issue: Fórmula padre-hijo de pacto aplicada inmediatamente a Salomón sin borrar su resonancia dinástica más amplia
  english_pob_reading: 'Retain the relational language straightforwardly: ''he will be a son to me, and I will be a father to him.'''
  chosen_spanish_reading: 'Conservar la fórmula relacional tal como está: ''él me será por hijo, y yo le seré por padre''.'
  alternative_spanish_readings:
  - lo trataré como hijo
  - será para mí como hijo y yo para él como padre
  rationale: El hebreo presenta una relación de filiación y paternidad en términos de pacto, no una mera comparación afectiva. Mantener la construcción directa preserva la referencia inmediata a Salomón y, a la vez, la resonancia canónica posterior sin resolverla artificialmente.
  doctrine_reference: Preservar la tensión teológica sin explicitar una identificación cristológica en el verso.
translation_notes:
  revision_awareness: 'La versión española sigue el acuerdo alto del audit trail inglés: conserva ''casa/house'' en el texto principal, mantiene la fórmula relacional padre-hijo y traduce עַד עוֹלָם con una expresión natural de perpetuidad. No se aplicaron revisiones posteriores en el paquete fuente.'
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' en el sistema terminológico del proyecto, pero este versículo solo contiene la expresión 'mi nombre', por lo que no requiere explícitamente el nombre divino.
  - '''Casa'' se usa en el cuerpo principal con nota alternativa ''templo'' para respetar la ambigüedad lexical documentada.'
  - '''Por hijo / por padre'' conserva la sintaxis relacional y evita una paráfrasis interpretativa.'
  - '''Afirmaré'' y ''para siempre'' ofrecen un español natural sin perder la fuerza del hebreo.'
