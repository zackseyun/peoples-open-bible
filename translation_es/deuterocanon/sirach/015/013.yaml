translation:
  language: es
  text: Yahvé odia el mal y la abominación[a], y no lo permitirá a quienes lo temen.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Paralelo griego: «y no es amado/aceptable para los que lo temen». El testigo hebreo, en cambio, dice: «y no lo permitirá a quienes lo temen».'
    reason: alternative_reading
lexical_decisions:
- source_word: רָעָה
  english_pob_choice: evil
  chosen_spanish: el mal
  alternatives_spanish:
  - la maldad
  - el mal moral
  - la calamidad
  lexicon: HALOT
  rationale: En este paralelismo con תוֹעֵבָה, la referencia es moral; «el mal» conserva la generalidad y la fuerza del hebreo sin introducir una especificación no requerida.
- source_word: תוֹעֵבָה
  english_pob_choice: abomination
  chosen_spanish: la abominación
  alternatives_spanish:
  - lo detestable
  - la cosa detestable
  - la repugnancia
  lexicon: HALOT
  rationale: «Abominación» conserva el peso fuerte del término y corresponde bien al paralelo griego βδέλυγμα, manteniendo el registro bíblico y la gravedad del rechazo divino.
- source_word: שָׂנֵא
  english_pob_choice: hates
  chosen_spanish: odia
  alternatives_spanish:
  - detesta
  - aborrece
  - ha odiado
  lexicon: HALOT
  rationale: «Odia» expresa de forma directa y natural la afirmación gnómica del hebreo; evita suavizar el verbo y mantiene la intensidad del original.
- source_word: יְהֹוָה
  english_pob_choice: the LORD
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el SEÑOR
  - Jehová
  lexicon: Project terminology default
  rationale: El proyecto pide «Yahvé» para el Tetragrama en español, en lugar de una máscara convencional como «SEÑOR», de modo que la identificación del nombre divino permanezca visible.
- source_word: וְלֹא יְאַנֶּנָּה
  english_pob_choice: he will not permit it
  chosen_spanish: no lo permitirá
  alternatives_spanish:
  - no lo permitirá suceder
  - no lo dejará acontecer
  - no permitirá eso
  lexicon: HALOT
  rationale: El hebreo apunta a la idea de permitir o causar que ocurra; «no lo permitirá» conserva esa fuerza con naturalidad en español y mantiene el pronombre singular referido al mal/la abominación.
- source_word: לִירֵאָיו
  english_pob_choice: to those who fear him
  chosen_spanish: a los que lo temen
  alternatives_spanish:
  - para los que lo reverencian
  - entre los que lo temen
  - a los que le temen
  lexicon: HALOT
  rationale: «Temen» reproduce la expresión bíblica estable para reverencia a Dios. Se usa el complemento pronominal coherente con «Yahvé» en español y con el sentido relacional del hebreo.
theological_decisions:
- issue: Diferencia entre el hebreo conservado y el paralelo griego en el segundo colon
  english_pob_reading: 'Follow the Hebrew main text: ''he will not permit it to those who fear him'' with a footnoted Greek alternative.'
  chosen_spanish_reading: 'Seguir el hebreo principal: «no lo permitirá a los que lo temen», con nota sobre la lectura griega alternativa.'
  alternative_spanish_readings:
  - «y no es agradable a los que lo temen»
  - «y no es aceptable para los que lo temen»
  rationale: 'En Sirácides, cuando el hebreo está conservado y es de alta confianza, la práctica del proyecto es seguirlo en el texto principal y conservar honestamente la divergencia griega en nota. Aquí la diferencia no es menor: el hebreo habla de impedir/permitir, mientras el griego habla de ser agradable/aceptable.'
  doctrine_reference: 'PHILOSOPHY.md: traducir Sirach desde el hebreo donde se conserva; usar el paralelo griego como testigo real y preservar la incertidumbre honestamente.'
- issue: Nombre divino en el texto español
  english_pob_reading: Per doctrine, the Tetragrammaton is rendered 'the LORD' rather than transliterated.
  chosen_spanish_reading: Usar «Yahvé» en el texto principal.
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: La norma de terminología del proyecto para español pide «Yahvé» como representación principal de יהוה. Esto mantiene la transparencia textual y evita enmascarar el nombre propio divino.
  doctrine_reference: Project terminology defaults for יהוה / YHWH.
translation_notes:
  revision_awareness: El borrador refleja la revisión más reciente del audit trail inglés, que prefirió «permitirlo» sobre una formulación más coloquial, y traslada esa decisión al español con «no lo permitirá» para mantener el matiz formal y cercano al hebreo. La nota conserva la divergencia sustantiva con el griego.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» según la terminología proyectual en español.
  - Se conserva el pronombre singular «lo» para referirse al mal/la abominación, como en el hebreo.
  - «Los que lo temen» traduce la expresión reverencial sin recargarla con paráfrasis.
  - La nota al pie marca la alternativa griega sin desplazar la lectura principal hebrea.
