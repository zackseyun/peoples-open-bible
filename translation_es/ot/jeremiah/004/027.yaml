revisions:
- from: 'Porque así ha dicho Yahvé: toda la tierra será una desolación[a][b], y no haré un fin completo.'
  to: 'Porque así dice Yahvé: todo el país será una desolación[a], pero no haré una destrucción completa[b].'
  rationale: Se ajusta la fórmula profética a «así dice», se alinea הָאָרֶץ con la preferencia contextual del POB mediante «todo el país», y se reemplaza la construcción poco natural «haré un fin completo» por «haré una destrucción completa», manteniendo en nota la alternativa más literal y la tensión teológica del hebreo.
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T22:34:01Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador conserva bien la estructura básica del hebreo y usa correctamente «Yahvé». Sin embargo, se aparta del dictamen auditado del English POB en dos puntos significativos: traduce כֹה אָמַר como «así ha dicho» en vez de la fórmula profética más fiel y natural «así dice», y toma כָּל הָאָרֶץ como «toda la tierra» cuando el POB documentó preferencia por «toda la tierra/land» en sentido territorial, mejor expresado aquí como «todo el país» o «toda la tierra» con nota inversa. Además, «y no haré un fin completo» es demasiado calcado y poco idiomático en español.'
  spanish_quality_summary: 'El texto es comprensible, pero «así ha dicho» suena menos idiomático para fórmula profética actual, y «haré un fin completo» resulta antinatural en español eclesial general. Una leve reformulación puede preservar el sentido y la tensión teológica sin perder dignidad: «pero no acabaré del todo con él» o «pero no haré una destrucción completa». Dado el mandato de no parafrasear en exceso, conviene mantener el sustantivo con una opción más natural como «no haré una destrucción completa».'
  glossary_alignment: Alineación correcta en «Yahvé». No hay otros términos del glosario principal en disputa. La principal desalineación es con la decisión documentada de הָאָרֶץ como «land» contextual, no la lectura más amplia «earth/tierra» adoptada por el borrador como texto principal.
  issues:
  - severity: medium
    issue: Fórmula profética «así ha dicho»
    rationale: כֹה אָמַר en oráculos proféticos se vierte de forma más natural y estándar como «así dice». «Ha dicho» no es imposible, pero aquí se aparta de la convención bíblica y de la decisión auditada del POB.
  - severity: high
    issue: «toda la tierra» como texto principal
    rationale: El English POB documentó preferencia por «land» debido al contexto de juicio sobre Judá. En español, «toda la tierra» favorece lectura global. Es mejor poner «todo el país» en el texto y dejar «toda la tierra» en nota alternativa.
  - severity: high
    issue: «y no haré un fin completo» es español poco natural
    rationale: Aunque intenta conservar el sustantivo hebreo, en español suena forzado y poco legible. Debe repararse con una formulación fiel pero idiomática, p. ej. «pero no haré una destrucción completa», preservando la tensión de juicio no total.
  - severity: low
    issue: Orden y contenido de notas
    rationale: 'Las notas actuales invierten la preferencia auditada: la nota de אֶרֶץ defiende «tierra» en vez de registrar «tierra» como alternativa frente a una lectura principal territorial. También conviene anclar la nota sobre «destrucción completa» al segundo miembro, no a «desolación».'
  revised_spanish_text: 'Porque así dice Yahvé: todo el país será una desolación[a], pero no haré una destrucción completa[b].'
  revised_footnotes:
  - marker: a
    text: O «toda la tierra». El hebreo אֶרֶץ puede significar «país/territorio» o «tierra»; aquí se prefiere «país» porque el contexto se centra en Judá bajo juicio, aunque las imágenes circundantes pueden evocar una devastación más amplia.
    reason: alternative_reading
  - marker: b
    text: O «no haré un fin completo» / «no lo destruiré por completo». El hebreo conserva la tensión entre un juicio devastador y la negativa de Yahvé a llevarlo hasta la aniquilación total.
    reason: lexical_alternative
  revision_rationale: Se ajusta la fórmula profética a «así dice», se alinea הָאָרֶץ con la preferencia contextual del POB mediante «todo el país», y se reemplaza la construcción poco natural «haré un fin completo» por «haré una destrucción completa», manteniendo en nota la alternativa más literal y la tensión teológica del hebreo.
