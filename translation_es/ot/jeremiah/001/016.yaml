    text: Or 'I will speak my judgments against them concerning all their evil.' The Hebrew verb is literally 'speak,' but here likely carries the sense of formally pronouncing judgment.
    reason: lexical_alternative
  - marker: b
    text: '''The works of their own hands'' refers to idols they themselves made.'
    reason: cultural_note
