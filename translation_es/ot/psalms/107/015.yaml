translation:
  language: es
  text: Que den gracias a Yahvé por su amor constante y por sus hechos maravillosos para los hijos del ser humano.[a]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebreo 'para los hijos de Adán'; alternativamente, 'para la humanidad' o tradicionalmente 'para los hijos de los hombres'.
    reason: lexical_alternative
lexical_decisions:
- source_word: יוֹדוּ
  english_pob_choice: Let them give thanks
  chosen_spanish: Den gracias
  alternatives_spanish:
  - Que den gracias
  - Alaben
  - Reconozcan
  lexicon: HALOT
  rationale: El verbo en jussivo plural pide un valor exhortativo. En español, "Den gracias" comunica de manera natural la invitación al agradecimiento sin perder la fuerza imperativa del hebreo.
- source_word: לַיהוָה
  english_pob_choice: to Yahweh
  chosen_spanish: a Yahvé
  alternatives_spanish:
  - a Yahvé
  - al SEÑOR
  lexicon: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
  rationale: Se sigue el criterio del proyecto de traducir el nombre divino con "Yahvé" en el texto principal, manteniendo el nombre pactual y evitando la convención de ocultamiento con "SEÑOR".
- source_word: חַסְדּוֹ
  english_pob_choice: his steadfast love
  chosen_spanish: su amor constante
  alternatives_spanish:
  - su amor leal
  - su misericordia
  - su amor fiel
  lexicon: HALOT
  rationale: '"חסד" expresa amor leal, estable y pactual. "Amor constante" conserva esa fidelidad continua de forma clara y natural en español, sin reducirlo solo a "misericordia".'
- source_word: וְנִפְלְאוֹתָיו
  english_pob_choice: and for his wondrous deeds
  chosen_spanish: y por sus obras maravillosas
  alternatives_spanish:
  - y por sus maravillas
  - y por sus actos maravillosos
  - y por sus obras portentosas
  lexicon: HALOT
  rationale: El sustantivo derivado de פלא se refiere a acciones extraordinarias de Dios. "Obras maravillosas" mantiene el carácter activo y laudatorio del paralelo hebreo.
- source_word: לִבְנֵי אָדָם
  english_pob_choice: to the children of man
  chosen_spanish: para los hijos de los hombres
  alternatives_spanish:
  - para la humanidad
  - para los seres humanos
  - para los hijos del hombre
  lexicon: HALOT
  rationale: Se conserva el idiomático "hijos de los hombres" para reflejar con fidelidad la construcción hebrea בני אדם. "Para" expresa aquí el destinatario/beneficiario de las obras maravillosas, como en el contexto del versículo.
theological_decisions:
- issue: Nombre divino יהוה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahvé
  - SEÑOR
  rationale: El texto hebreo usa el Tetragrámaton. La política del proyecto en español pide "Yahvé" en el cuerpo del texto, preservando la referencia al nombre revelado de Dios y la transparencia textual.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Sentido relacional de חסד
  english_pob_reading: steadfast love
  chosen_spanish_reading: amor constante
  alternative_spanish_readings:
  - amor leal
  - amor fiel
  - misericordia
  rationale: No se aplana חסד a una sola categoría devocional. "Amor constante" intenta sostener a la vez la idea de lealtad pactual, continuidad y benevolencia, en un español comprensible.
  doctrine_reference: 'DOCTRINE.md Translation philosophy #4; Contested terms: חֶסֶד'
translation_notes:
  revision_awareness: El contexto inglés y la revisión más reciente muestran alta concordancia y ninguna modificación necesaria; el español sigue la misma lectura sin introducir cambios de sentido.
  spanish_consistency_notes:
  - Se mantiene "Yahvé" conforme al estándar del proyecto para יהוה.
  - Se traduce חסד con una expresión relacional y pactual, no con un término eclesiástico más estrecho.
  - Se preserva el paralelismo hebreo con dos miembros coordinados por "y por".
  - La frase "hijos de los hombres" conserva el idiomatismo bíblico y la referencia colectiva a בני אדם.
