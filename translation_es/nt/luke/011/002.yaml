    changes_summary: Replaced 'may your name be kept holy' with the more natural and traditional 'hallowed be your name,' which closely reflects ἁγιασθήτω without unnecessary expansion. Simplified 'May your kingdom come' to 'Your kingdom come' for closer correspondence to the Greek imperative style.
translation:
  language: es
  text: 'Y les dijo[a]: «Cuando oren, digan: “Padre, santificado sea tu nombre[b]. Venga tu reino”»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Algunas tradiciones españolas leen «Padre nuestro», influidas por el paralelo de Mateo 6:9, pero el griego aquí dice simplemente «Padre».
    reason: alternative_reading
  - marker: b
    text: 'O: «que tu nombre sea santificado».'
    reason: lexical_alternative
lexical_decisions:
- source_word: εἶπεν δὲ αὐτοῖς
  english_pob_choice: And he said to them
  chosen_spanish: Y les dijo
  alternatives_spanish:
  - Entonces les dijo
  - Y él les dijo
  lexicon: BDAG
  rationale: Mantiene el verbo de habla directo y natural en español; el pronombre sujeto puede omitirse porque está implícito en la forma verbal.
- source_word: Ὅταν προσεύχησθε
  english_pob_choice: When you pray
  chosen_spanish: Cuando oren
  alternatives_spanish:
  - Cuando oréis
  - Siempre que oren
  lexicon: BDAG
  rationale: Ὅταν introduce una condición temporal general. «Cuando oren» comunica bien la instrucción sin forzar una repetición explícita.
- source_word: λέγετε
  english_pob_choice: say
  chosen_spanish: digan
  alternatives_spanish:
  - decid
  - sigan diciendo
  lexicon: BDAG
  rationale: El imperativo plural pide una fórmula de oración; «digan» es claro y natural en español actual.
- source_word: Πάτερ
  english_pob_choice: Father
  chosen_spanish: Padre
  alternatives_spanish:
  - Padre nuestro
  lexicon: BDAG
  rationale: El griego aquí dice simplemente «Padre», sin el añadido «nuestro». La forma breve se conserva en el texto principal.
- source_word: ἁγιασθήτω τὸ ὄνομά σου
  english_pob_choice: hallowed be your name
  chosen_spanish: santificado sea tu nombre
  alternatives_spanish:
  - sea santificado tu nombre
  - hágase santo tu nombre
  lexicon: BDAG
  rationale: La pasiva imperativa expresa una petición respecto del nombre de Dios. «Santificado sea» preserva la fuerza tradicional y la relación con ἁγιασθήτω sin introducir una paráfrasis excesiva.
- source_word: τὸ ὄνομά σου
  english_pob_choice: your name
  chosen_spanish: tu nombre
  alternatives_spanish:
  - tu nombre, tu reputación
  - tu nombre y tu honor
  lexicon: BDAG
  rationale: Se conserva la expresión literal, que en contexto bíblico incluye identidad, reputación y honor de Dios.
- source_word: ἐλθέτω ἡ βασιλεία σου
  english_pob_choice: Your kingdom come
  chosen_spanish: Venga tu reino
  alternatives_spanish:
  - Que venga tu reino
  - Llega tu reino
  lexicon: BDAG
  rationale: El aoristo imperativo de ἐλθέτω funciona como petición; «Venga tu reino» reproduce bien la concisión y el tono orante del griego.
theological_decisions:
- issue: 'Dirección de la oración: Padre sin ''nuestro'''
  english_pob_reading: Father
  chosen_spanish_reading: Padre
  alternative_spanish_readings:
  - Padre nuestro
  rationale: El texto griego base leído aquí contiene solo Πάτερ. Se evita armonizar con Mateo 6:9 o con la tradición litúrgica.
  doctrine_reference: Primacía del texto fuente sobre la tradición de traducción.
- issue: ἁγιασθήτω τὸ ὄνομά σου
  english_pob_reading: hallowed be your name
  chosen_spanish_reading: santificado sea tu nombre
  alternative_spanish_readings:
  - sea santificado tu nombre
  - que tu nombre sea santificado
  rationale: La formulación conserva la petición pasiva y el sentido de tratar el nombre de Dios como santo, sin sugerir que le falte santidad intrínseca.
  doctrine_reference: 'Tensión teológica preservada: el nombre de Dios ya es santo, pero se pide que sea reconocido como tal.'
translation_notes:
  revision_awareness: Se siguió el texto griego de Lucas 11:2 y el audit trail inglés, preservando la forma breve Πάτερ y la petición pasiva ἁγιασθήτω con una solución española natural y tradicional.
  spanish_consistency_notes:
  - Se mantuvo un tono bíblico sobrio y publicable.
  - Se evitó introducir 'nuestro' para no armonizar con Mateo.
  - Se conservaron las dos peticiones del versículo en forma concisa y orante.
