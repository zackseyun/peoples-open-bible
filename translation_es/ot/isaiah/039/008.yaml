  yaml_path: translation/ot/isaiah/039/008.yaml
  text: Then Hezekiah said to Isaiah[a], “The word of Yahweh that you have spoken is good.” And he said[b], “For there will be peace and truth in my days.”
  footnotes:
  - marker: a
    text: Or, more literally, 'And he said, “For there will be peace and truth/faithfulness in my days.”' The Hebrew may present Hezekiah's words directly rather than summarizing his reasoning.
    reason: alternative_reading
  - marker: b
    text: '''Stability'' renders Hebrew אֱמֶת here in the sense of firmness, reliability, or security; traditionally, ''truth.'''
    reason: lexical_alternative
