translation:
  language: es
  text: Y cuando Moisés entraba en la tienda[a], descendía la columna de nube y se detenía a la entrada de la tienda, y hablaba con Moisés.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, más explícitamente: «y Yahvé hablaba con Moisés». El hebreo deja implícito el sujeto en esta cláusula, aunque el contexto lo identifica como Yahvé.'
    reason: alternative_reading
lexical_decisions:
- source_word: וְהָיָה
  english_pob_choice: And whenever
  chosen_spanish: Y cuando
  alternatives_spanish:
  - Y sucedía que cuando
  - Y acontecía que cuando
  lexicon: HALOT
  rationale: La construcción hebrea introduce una circunstancia habitual/repetida en narrativa. En español, "Y cuando" comunica de forma natural esa iteración sin sobrecargar con una fórmula más mecánica.
- source_word: כְּבֹא
  english_pob_choice: entered
  chosen_spanish: entraba
  alternatives_spanish:
  - entró
  - iba a entrar
  lexicon: HALOT
  rationale: El infinitivo constructo con כ marca temporalidad de acción repetida. "Entraba" preserva bien el valor iterativo en español narrativo.
- source_word: הָאֹהֱלָה / הָאֹהֶל
  english_pob_choice: the tent
  chosen_spanish: la tienda
  alternatives_spanish:
  - la tienda del encuentro
  - la tienda
  lexicon: HALOT
  rationale: El texto hebreo dice simplemente "la tienda". En español bíblico actual, "tienda" es más natural que "carpa" para este contexto litúrgico/narrativo; además evita añadir explícitamente "del encuentro" que el verso no formula.
- source_word: יֵרֵד
  english_pob_choice: would descend
  chosen_spanish: descendía
  alternatives_spanish:
  - descendería
  - bajaba
  lexicon: HALOT
  rationale: El yiqtol expresa acción habitual en pasado. "Descendía" mantiene la repetición y el movimiento vertical de forma clara y digna.
- source_word: עַמּוּד הֶעָנָן
  english_pob_choice: the pillar of cloud
  chosen_spanish: la columna de nube
  alternatives_spanish:
  - el pilar de nube
  - la columna de la nube
  lexicon: HALOT
  rationale: '"Columna de nube" conserva la imagen concreta del constructo hebreo y suena natural en español bíblico contemporáneo.'
- source_word: וְעָמַד
  english_pob_choice: and stand
  chosen_spanish: se detenía
  alternatives_spanish:
  - se ponía en pie
  - quedaba de pie
  lexicon: HALOT
  rationale: En este contexto espacial, "se detenía" comunica el asentarse/posarse en un lugar. En español, evita una literalidad que sonaría extraña si se tradujera simplemente como "se ponía de pie" aplicada a la nube.
- source_word: פֶּתַח הָאֹהֶל
  english_pob_choice: at the entrance of the tent
  chosen_spanish: a la entrada de la tienda
  alternatives_spanish:
  - en la entrada de la tienda
  - junto a la entrada de la tienda
  lexicon: HALOT
  rationale: '"Entrada" es el equivalente natural de פתח en este sentido espacial y preserva la imagen del umbral/apertura de la tienda.'
- source_word: וְדִבֶּר
  english_pob_choice: and he would speak
  chosen_spanish: y hablaba
  alternatives_spanish:
  - y él hablaba
  - y el SEÑOR hablaba
  lexicon: HALOT
  rationale: El verbo aparece con sujeto implícito. "Hablaba" mantiene la impersonalidad relativa del hebreo y deja el referente para el contexto, como en el audit trail en inglés.
- source_word: עִם מֹשֶׁה
  english_pob_choice: with Moses
  chosen_spanish: con Moisés
  alternatives_spanish:
  - a Moisés
  lexicon: HALOT
  rationale: עִם normalmente significa "con"; en este marco comunica comunicación personal y recíproca mejor que una dirección más unilateral.
theological_decisions:
- issue: Sujeto implícito de «y hablaba con Moisés»
  english_pob_reading: Retain the implicit masculine singular as 'he,' with the referent understood from context to be the LORD.
  chosen_spanish_reading: Mantener el sujeto implícito en «y hablaba con Moisés», entendiendo por el contexto que se trata de Yahvé.
  alternative_spanish_readings:
  - y Yahvé hablaba con Moisés
  - y el SEÑOR hablaba con Moisés
  rationale: El hebreo no nombra el sujeto en la cláusula final. Conservar esa omisión preserva la forma del texto y evita resolver de antemano una tensión que el original deja abierta, aunque el contexto identifique al hablante como Yahvé.
  doctrine_reference: Primacía del texto original; preservar tensiones gramaticales y teológicas donde el hebreo las mantiene.
translation_notes:
  revision_awareness: 'Coincide con el sentido habitual y reiterativo del hebreo, con una única decisión de tensión teológica: el sujeto final permanece implícito en el texto principal, como en el original y en el audit trail en inglés.'
  spanish_consistency_notes:
  - Se usó «tienda» para mantener la imagen del hebreo simple y coherente con el contexto inmediato.
  - Se evitó «SEÑOR» como máscara del nombre divino; la nota explicita la identificación contextual con Yahvé.
  - «Hablaba» conserva el carácter no puntual y repetido del imperfecto hebreo en un marco narrativo habitual.
