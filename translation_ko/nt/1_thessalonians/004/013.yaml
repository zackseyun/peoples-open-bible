id: 1TH.4.13
reference: 1 Thessalonians 4:13
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: Οὐ θέλομεν δὲ ὑμᾶς ἀγνοεῖν, ἀδελφοί, περὶ τῶν ⸀κοιμωμένων, ἵνα μὴ λυπῆσθε καθὼς καὶ οἱ λοιποὶ οἱ μὴ ἔχοντες ἐλπίδα.
base_translation:
  language: en
  yaml_path: translation/nt/1_thessalonians/004/013.yaml
  text: But we do not want you to be uninformed[a], brothers, about those who have fallen asleep, so that you may not grieve as the rest do[b], who have no hope.
  footnotes:
  - marker: a
    text: Or 'those who sleep'; here Paul uses 'sleep' as a metaphor for believers who have died.
    reason: lexical_alternative
  - marker: b
    text: '''Brothers'' here addresses the congregation and likely includes both men and women.'
    reason: cultural_note
translation:
  language: ko
  text: 형제[b] 여러분, 우리는 여러분이 잠든 자들[a]에 관하여 모르고 있기를 원하지 않습니다. 이는 여러분이 소망 없는 나머지 사람들처럼 슬퍼하지 않게 하려 함입니다.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 또는 「잠자는 자들」. 바울은 본 문맥에서 「잠」을 죽은 신자들에 대한 비유로 사용한다.
    reason: lexical_alternative
  - marker: b
    text: 여기서 「형제」는 회중을 가리키며 남녀 모두를 포함할 가능성이 크다.
    reason: cultural_note
lexical_decisions:
- source_word: τῶν κοιμωμένων
  english_pob_choice: those who have fallen asleep
  chosen_korean: 잠든 자들
  alternatives_korean:
  - 자고 있는 자들
  - 이미 죽은 신자들
  lexicon: BDAG
  rationale: 본 비유 어휘를 보존한다. 「잠든」이 한국어 합쇼체 산문에서 자연스럽고 비유성을 살린다.
- source_word: μὴ λυπῆσθε
  english_pob_choice: may not grieve
  chosen_korean: 슬퍼하지 않게
  alternatives_korean:
  - 통탄하지 않게
  - 비탄에 빠지지 않게
  lexicon: BDAG
  rationale: λυπέω의 「슬퍼함」 기본 의미가 가장 자연스럽다.
- source_word: οἱ λοιποὶ οἱ μὴ ἔχοντες ἐλπίδα
  english_pob_choice: the rest ... who have no hope
  chosen_korean: 소망 없는 나머지 사람들
  alternatives_korean:
  - 소망이 없는 다른 사람들
  - 희망 없는 그 밖의 사람들
  lexicon: BDAG
  rationale: λοιποί의 「나머지·다른 사람들」 의미. 1:3 「소망」 어휘와 일관성 유지.
