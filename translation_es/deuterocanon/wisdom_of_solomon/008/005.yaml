translation:
  language: es
  text: Y si la riqueza es una posesión deseable en la vida, ¿qué hay más rico que la sabiduría, que lleva a cabo todas las cosas[a]?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'que realiza todas las cosas' o 'que produce todas las cosas'. La expresión griega es amplia y destaca la eficacia de la sabiduría en todo.
    reason: lexical_alternative
lexical_decisions:
- source_word: πλοῦτός
  english_pob_choice: wealth
  chosen_spanish: riqueza
  alternatives_spanish:
  - bienes
  - riquezas
  lexicon: LSJ
  rationale: El término griego designa riqueza o abundancia material. En español, 'riqueza' reproduce bien el campo semántico y mantiene el paralelo retórico con la comparación posterior de 'más rico'.
- source_word: ἐπιθυμητὸν
  english_pob_choice: desirable
  chosen_spanish: deseable
  alternatives_spanish:
  - digno de desear
  - codiciable
  lexicon: LSJ
  rationale: El adjetivo expresa algo que es deseado. 'Deseable' es natural en español y conserva el matiz valorativo sin intensificarlo como 'codiciable'.
- source_word: κτῆμα
  english_pob_choice: possession
  chosen_spanish: bien
  alternatives_spanish:
  - posesión
  - propiedad
  lexicon: LSJ
  rationale: Aunque el griego apunta a algo adquirido o poseído, en español 'bien' suena más idiomático dentro de la expresión 'un bien deseable en la vida' y evita rigidez. Se mantiene la idea de algo poseído/obtenido, sin perder naturalidad.
- source_word: ἐν βίῳ
  english_pob_choice: in life
  chosen_spanish: en la vida
  alternatives_spanish:
  - en esta vida
  - para la vida
  lexicon: LSJ
  rationale: La frase sitúa la evaluación en la esfera de la vida humana ordinaria. 'En la vida' es breve, fiel y natural en español.
- source_word: τί ... πλουσιώτερον
  english_pob_choice: what is richer than
  chosen_spanish: ¿qué hay más rico que?
  alternatives_spanish:
  - ¿qué es más rico que?
  - ¿qué supera en riqueza a?
  lexicon: LSJ
  rationale: El comparativo conserva la metáfora de riqueza. La construcción interrogativa '¿qué hay más rico que?' suena fluida en español y mantiene el enlace verbal con 'riqueza'.
- source_word: σοφίας
  english_pob_choice: wisdom
  chosen_spanish: sabiduría
  alternatives_spanish:
  - sabiduría
  lexicon: LSJ
  rationale: La traducción estándar y consistente de σοφία es 'sabiduría'. Se conserva el término tradicional y claro en español.
- source_word: τῆς τὰ πάντα ἐργαζομένης
  english_pob_choice: which accomplishes all things
  chosen_spanish: la cual realiza todas las cosas
  alternatives_spanish:
  - la cual obra todas las cosas
  - la cual lleva a cabo todas las cosas
  - la cual produce todas las cosas
  lexicon: LSJ
  rationale: 'El participio ἐργαζομένης es amplio: trabajar, obrar, realizar, producir, llevar a cabo. ''Realiza todas las cosas'' preserva la amplitud y suena más natural que un calco literal. Se evita cerrar indebidamente el sentido a ''creación'' o a una sola esfera de acción.'
theological_decisions:
- issue: Alcance de la acción de la sabiduría en τὰ πάντα ἐργαζομένης
  english_pob_reading: Render broadly as 'which accomplishes all things' without narrowing to creation alone.
  chosen_spanish_reading: '''la cual realiza todas las cosas'', sin restringirlo a creación, ni a un solo tipo de obra'
  alternative_spanish_readings:
  - la cual obra todas las cosas
  - la cual produce todas las cosas
  rationale: El griego presenta una eficacia amplia de la sabiduría, pero no obliga a precisar metafísicamente el modo exacto de esa acción. La traducción conserva la tensión teológica y no la reduce a una sola lectura doctrinal.
  doctrine_reference: Preservar la amplitud semántica y la tensión teológica del participio griego.
translation_notes:
  revision_awareness: La revisión inglesa pasó de 'works all things' a 'accomplishes all things' por fluidez formal; por eso el español evita tanto un calco rígido como una restricción doctrinal, y opta por 'realiza todas las cosas' con una nota que conserva la alternativa de 'produce' para reflejar la amplitud del participio ἐργαζομένης.
  spanish_consistency_notes:
  - Se usa 'sabiduría' de manera consistente para σοφία.
  - Se conserva el paralelismo léxico entre 'riqueza' y 'más rico'.
  - No se introduce 'Cristo', 'Mesías' ni vocabulario ajeno al pasaje.
  - La nota al pie acompaña la alternativa lexical sin duplicar marcadores.
  - El estilo es formal pero natural para lectura eclesial en español.
