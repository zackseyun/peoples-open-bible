  lexicon: BDAG
  rationale: 'μένω는 요한복음의 핵심 동사로, 15:1-11에 10회 반복되며 지속적·관계적 거주를 가리킨다. 한국어 「거하다」로 통일하여 어휘유희와 신학적 무게를 보존한다.'
