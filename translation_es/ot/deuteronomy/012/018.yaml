revisions:
- from: 'Sino que lo comerás delante de Yahvé tu Dios, en el lugar que Yahvé tu Dios escoja: tú, tu hijo, tu hija, tu esclavo, tu esclava y el levita que está dentro de tus puertas; y te alegrarás delante de Yahvé tu Dios en todo aquello a lo que pongas la mano.[a][b]'
  to: 'Sino que lo comerás delante de Yahvé tu Dios, en el lugar que Yahvé tu Dios escoja: tú, tu hijo, tu hija, tu esclavo, tu esclava y el levita que está dentro de tus puertas[a]; y te alegrarás delante de Yahvé tu Dios en todo aquello a que pongas mano[b].'
  rationale: 'Se mantiene la fidelidad general del borrador, pero se ajustan dos puntos para mejorar el español sin perder cercanía al hebreo: se ancla la nota cultural en «puertas[a]» y se simplifica la cláusula final a «en todo aquello a que pongas mano[b]», que preserva mejor la imagen sin la torpeza de «a lo que pongas la mano».'
  reviewer_model: gpt-5.4
