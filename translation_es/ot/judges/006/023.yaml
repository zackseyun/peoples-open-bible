    rationale: Aunque comprensible, no suena tan natural ni tan digno como «La paz sea contigo», que expresa mejor una fórmula de bendición y tranquilidad en español.
  - severity: medium
    issue: La nota al pie contiene el anglicismo «reassurance».
    rationale: La nota debe estar íntegramente en español. Debe explicarse como «tranquilidad», «consuelo» o «palabra de tranquilidad/aseguramiento».
