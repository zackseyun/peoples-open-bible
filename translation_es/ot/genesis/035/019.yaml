translation:
  language: es
  text: Entonces Raquel murió y fue sepultada en el camino a Efrata (es decir[a], Belén).
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Efrata» también puede verterse «Efratá».
    reason: lexical_alternative
lexical_decisions:
- source_word: וַתָּמָת
  english_pob_choice: died
  chosen_spanish: murió
  alternatives_spanish:
  - falleció
  - pasó a mejor vida
  lexicon: HALOT
  rationale: El hebreo indica muerte física simple y directa. «Murió» comunica ese sentido con naturalidad y sin eufemismo, siguiendo la fuerza del inglés POB «died».
- source_word: רָחֵל
  english_pob_choice: Rachel
  chosen_spanish: Raquel
  alternatives_spanish:
  - Rachel
  lexicon: Nombre propio bíblico estándar
  rationale: En español bíblico, el nombre se adapta como «Raquel», forma estable y reconocible, equivalente funcional del transliterado inglés.
- source_word: וַתִּקָּבֵר
  english_pob_choice: was buried
  chosen_spanish: fue sepultada
  alternatives_spanish:
  - fue enterrada
  - fue sepultada allí
  lexicon: HALOT
  rationale: 'El nifal expresa pasivo: «fue sepultada» mantiene la voz pasiva y un registro digno. «Enterrada» es posible, pero «sepultada» refleja mejor el matiz bíblico/formal del acto funerario.'
- source_word: בְּדֶרֶךְ
  english_pob_choice: on the way
  chosen_spanish: en el camino de
  alternatives_spanish:
  - sobre el camino de
  - por el camino de
  - a la orilla del camino hacia
  lexicon: HALOT
  rationale: La preposición con דֶּרֶךְ señala ubicación en una ruta. «En el camino de» conserva la relación locativa y suena natural en español; «hacia» se reserva para dirección, no ubicación.
- source_word: אֶפְרָתָה
  english_pob_choice: Ephrath
  chosen_spanish: Efrata
  alternatives_spanish:
  - Efratá
  - Ephrata
  lexicon: Topónimo bíblico
  rationale: Se usa la forma española habitual del topónimo, adaptada a la ortografía del español bíblico. El inglés POB ofrece «Ephrath» con la variante «Ephrathah»; en español, «Efrata» conserva la referencia sin forzar transliteración inglesa.
- source_word: הִוא
  english_pob_choice: that is
  chosen_spanish: es decir
  alternatives_spanish:
  - esto es
  - o sea
  lexicon: HALOT
  rationale: La partícula funciona appositivamente, identificando Efrata con Belén. «Es decir» reproduce con claridad esa función explicativa sin añadir contenido.
- source_word: בֵּית לָחֶם
  english_pob_choice: Bethlehem
  chosen_spanish: Belén
  alternatives_spanish:
  - Bet-léhem
  - Beth-lehem
  lexicon: Topónimo bíblico
  rationale: «Belén» es el nombre español tradicional y claro del lugar. Se prefiere a transliteraciones más crudas porque el texto ya está explicando la identidad del sitio, no introduciendo un nuevo término técnico.
translation_notes:
  revision_awareness: No se detectaron revisiones textuales ni cambios editoriales en el paquete base; la redacción sigue de cerca el hebreo y mantiene la aclaración appositiva presente en el inglés POB.
  spanish_consistency_notes:
  - Se preservó el paralelo narrativo simple del hebreo con dos verbos en pasado unidos por «y».
  - Se mantuvo la aclaración entre paréntesis para reflejar la glosa identificadora de הִוא.
  - No se introdujo una referencia doctrinal, porque el versículo no contiene una decisión teológica explícita.
