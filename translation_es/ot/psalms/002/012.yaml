base_translation:
  language: en
  yaml_path: translation/ot/psalms/002/012.yaml
  text: Kiss the son[a], lest he be angry and you perish in the way, for his anger burns quickly[c][b]. Blessed are all who take refuge in him.
  footnotes:
  - marker: a
    text: Or 'Pay homage to the son.' The verb literally means 'kiss' and can denote an act of submission or homage in a royal setting.
    reason: lexical_alternative
  - marker: b
    text: Hebrew bar is unusual here. It is commonly taken as 'son,' fitting Psalm 2:7, but some propose alternatives such as 'purity' or 'purely.'
    reason: alternative_reading
  - marker: c
    text: Or 'for his anger is kindled but a little' / 'for his anger will blaze in a little while.' The Hebrew expression is compact and may emphasize either suddenness or brevity.
    reason: lexical_alternative
