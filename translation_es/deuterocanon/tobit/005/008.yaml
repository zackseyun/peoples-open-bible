translation:
  language: es
  text: 'Y le dijo: «Ve, y no te demores[a]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Griego: «Ve, y no te demores». El material paralelo semítico de esta sección es más amplio en los versículos vecinos, pero este mandato en sí es directo y no cambia de manera material la traducción aquí.'
    reason: cross_reference
lexical_decisions:
- source_word: Πορεύου
  english_pob_choice: Go
  chosen_spanish: Ve
  alternatives_spanish:
  - Anda
  - Ve de camino
  - Ponte en marcha
  lexicon: BDAG
  rationale: El imperativo breve de πορεύομαι pide una orden directa de partida. «Ve» conserva la concisión y la inmediatez del griego mejor que opciones más explicativas.
- source_word: μὴ χρονίσῃς
  english_pob_choice: do not delay
  chosen_spanish: no te demores
  alternatives_spanish:
  - no tardes
  - no te detengas
  - no te retrases
  lexicon: BDAG
  rationale: χρονίζω expresa la idea de demorarse o tardar. «No te demores» suena natural en español y preserva la prohibición de prolongar la salida sin introducir un matiz ajeno.
- source_word: καὶ
  english_pob_choice: and
  chosen_spanish: y
  alternatives_spanish:
  - entonces
  - así que
  lexicon: BDAG
  rationale: La conjunción enlaza las dos órdenes sin añadir relación temporal o consecutiva fuerte. «Y» mantiene la coordinación simple del texto griego.
- source_word: εἶπεν αὐτῷ
  english_pob_choice: he said to him
  chosen_spanish: le dijo
  alternatives_spanish:
  - le habló
  - le respondió
  lexicon: BDAG
  rationale: La fórmula narrativa estándar se expresa de modo más natural en español como «le dijo». Conserva la relación dativa sin recargar la frase.
translation_notes:
  revision_awareness: El pasaje coincide plenamente con el texto griego proporcionado; no se observaron revisiones aplicadas en el audit trail inglés y no fue necesario introducir variantes textuales adicionales.
  spanish_consistency_notes:
  - Se usó «Ve» para mantener la brevedad del imperativo griego.
  - Se prefirió «no te demores» por ser idiomático y fiel al valor de χρονίζω.
  - Se mantuvo un registro sobrio y bíblico, sin añadir glosas interpretativas en el cuerpo principal.
