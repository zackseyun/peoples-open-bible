translation:
  language: es
  text: Entonces los cinco hombres fueron y llegaron a Laís[a], y vieron al pueblo que estaba en ella, viviendo seguros, conforme a la costumbre de los sidonios, tranquilos y seguros. Y no había quien los humillara en nada, poseyendo autoridad[b]; y estaban lejos de los sidonios, y no tenían trato con nadie[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Laish».'
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo difícil: «y no había quien humillara una cosa en la tierra, poseyendo autoridad». El sentido probable es que no había gobernante ni opresor que los avergonzara o dominara.'
    reason: source_note
  - marker: c
    text: 'O: «no tenían alianza/trato con nadie».'
    reason: lexical_alternative
lexical_decisions:
- source_word: לָיְשָׁה
  english_pob_choice: Laish
  chosen_spanish: Laís
  alternatives_spanish:
  - Laish
  - Lesem
  lexicon: HALOT
  rationale: Es nombre propio de lugar; se conserva transliterado. La acentuación española ayuda a la lectura sin cambiar la forma del topónimo.
- source_word: יוֹשֶׁבֶת לָבֶטַח
  english_pob_choice: dwelling securely
  chosen_spanish: habitaban seguro
  alternatives_spanish:
  - habitaban con seguridad
  - vivían seguros
  - moraban seguros
  lexicon: HALOT
  rationale: La idea es una permanencia estable en seguridad, no solo ausencia momentánea de peligro. 'Habitando seguro' conserva el matiz de residencia estable y protección.
- source_word: כְּמִשְׁפַּט צִדֹנִים
  english_pob_choice: according to the custom of the Sidonians
  chosen_spanish: conforme a la costumbre de los sidonios
  alternatives_spanish:
  - según la costumbre de los sidonios
  - al modo de los sidonios
  - según el uso de los sidonios
  lexicon: HALOT
  rationale: מִשְׁפָּט aquí expresa patrón o costumbre social, no un juicio jurídico. 'Costumbre' es la equivalencia más natural y fiel en español.
- source_word: שֹׁקֵט וּבֹטֵחַ
  english_pob_choice: quiet and secure
  chosen_spanish: quietos y confiados
  alternatives_spanish:
  - quietos y seguros
  - tranquilos y seguros
  - reposados y confiados
  lexicon: HALOT
  rationale: Se conserva la doble caracterización. 'Confiados' comunica la estabilidad sin forzar una repetición mecánica de 'seguro' ya presente en el verso.
- source_word: מַכְלִים דָּבָר
  english_pob_choice: to humiliate them in anything
  chosen_spanish: los humillara en nada
  alternatives_spanish:
  - los avergonzara en nada
  - los humillara en alguna cosa
  - los afrentara en nada
  lexicon: HALOT
  rationale: 'El hifil de כלם lleva el sentido de causar vergüenza o humillación. La construcción española mantiene el negativo absoluto del hebreo: no había quien ejerciera tal humillación en ningún asunto.'
- source_word: יוֹרֵשׁ עֶצֶר
  english_pob_choice: possessing authority
  chosen_spanish: poseyendo autoridad
  alternatives_spanish:
  - con autoridad
  - ejerciendo dominio
  - detentando poder
  lexicon: HALOT
  rationale: La expresión es difícil. Se preserva el valor funcional sin decidir demasiado la reconstrucción exacta, como hace el texto inglés auditado.
- source_word: וּרְחֹקִים הֵמָּה מִצִּדֹנִים
  english_pob_choice: they were far from the Sidonians
  chosen_spanish: estaban lejos de los sidonios
  alternatives_spanish:
  - estaban distantes de los sidonios
  - estaban alejados de los sidonios
  lexicon: HALOT
  rationale: Traducción espacial directa, conservando la explicación de su aislamiento respecto de Sidón.
- source_word: וְדָבָר אֵין לָהֶם עִם אָדָם
  english_pob_choice: they had no dealings with anyone
  chosen_spanish: no tenían trato con nadie
  alternatives_spanish:
  - no tenían relación con nadie
  - no tenían asunto con nadie
  - no tenían vínculo con nadie
  lexicon: HALOT
  rationale: El modismo indica ausencia de relaciones, tratos o acuerdos. 'Trato con nadie' suena natural en español y conserva el alcance general del hebreo.
theological_decisions:
- issue: El sentido de la frase קשה/ambiguo יוֹרֵשׁ עֶצֶר
  english_pob_reading: likely that no ruler or oppressor was present to shame or dominate them; rendered cautiously as 'possessing authority'
  chosen_spanish_reading: poseyendo autoridad
  alternative_spanish_readings:
  - ejerciendo dominio
  - con poder para dominar
  - como gobernante
  rationale: No se sobreinterpreta la construcción difícil. Se mantiene una formulación abierta que deja visible la tensión semántica, como en el audit trail inglés.
  doctrine_reference: No aplica; decisión lexical/semántica, no doctrinal.
- issue: 'La repetición de seguridad: לָבֶטַח / שֹׁקֵט וּבֹטֵחַ'
  english_pob_reading: dwelling securely ... quiet and secure
  chosen_spanish_reading: habitando seguro ... quietos y confiados
  alternative_spanish_readings:
  - viviendo seguros ... tranquilos y seguros
  - morando con seguridad ... reposados y seguros
  rationale: Se conserva el énfasis acumulativo del hebreo sin borrar la repetición por estilización excesiva. 'Confiados' ayuda a distinguir el segundo miembro.
  doctrine_reference: No aplica; énfasis estilístico y semántico del texto.
translation_notes:
  revision_awareness: 'Se siguió el audit trail inglés de POB con acuerdo alto y sin revisiones aplicadas. La draft española conserva las tres zonas difíciles señaladas por el inglés: el topónimo Laish, la expresión כְּמִשְׁפַּט צִדֹנִים como ''costumbre'', y la frase ambigua יוֹרֵשׁ עֶצֶר mediante una solución cauta.'
  spanish_consistency_notes:
  - Se usa 'Yahvé' por norma del proyecto, pero este versículo no lo contiene.
  - Se mantiene 'sidonios' en minúscula por ser etnónimo común en español.
  - '''Laís'' se acentúa para lectura natural; el nombre propio permanece inequívocamente identificable con Laish.'
  - '''Confiados'' evita repetir de forma plana ''seguros'' y conserva el paralelismo semántico.'
  - '''No tenían trato con nadie'' sigue el idioma natural español y no introduce una relación más específica que el hebreo.'
