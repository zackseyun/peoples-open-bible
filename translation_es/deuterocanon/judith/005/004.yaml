translation:
  language: es
  text: ¿Y por qué se negaron a venir a encontrarme[a], a diferencia de todos los que habitan en el occidente?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, más literalmente: «se hicieron los sordos para no venir a encontrarme».'
    reason: lexical_alternative
lexical_decisions:
- source_word: διὰ τί
  english_pob_choice: why
  chosen_spanish: ¿Y por qué...?
  alternatives_spanish:
  - ¿Y por qué razón...?
  - ¿Y a causa de qué...?
  lexicon: LSJ
  rationale: Expresa la pregunta directa de causa en español natural y fiel al valor interrogativo del griego.
- source_word: κατενωτίσαντο
  english_pob_choice: refuse
  chosen_spanish: se negaron
  alternatives_spanish:
  - rehusaron
  - no hicieron caso
  - se hicieron los sordos
  lexicon: LSJ
  rationale: El griego tiene matiz de ‘dar oído’/‘hacer caso’, pero con el infinitivo siguiente funciona idiomáticamente como negativa o rechazo. ‘Se negaron’ conserva el sentido claro sin perder la tensión del término, mientras que la alternativa literal se reserva para nota.
- source_word: τοῦ μὴ ἐλθεῖν
  english_pob_choice: to come
  chosen_spanish: venir
  alternatives_spanish:
  - no venir
  - dejar de venir
  - acudir
  lexicon: LSJ
  rationale: 'El infinitivo articular con μή expresa el contenido de la negativa: no venir. En español, ‘venir’ dentro de ‘se negaron a venir’ reproduce bien la construcción.'
- source_word: εἰς ἀπάντησίν μοι
  english_pob_choice: to meet me
  chosen_spanish: a reunirse conmigo
  alternatives_spanish:
  - a encontrarme
  - para encontrarse conmigo
  - a verme
  lexicon: LSJ
  rationale: ἀπάντησις denota encuentro o reunión; ‘reunirse conmigo’ comunica el encuentro personal de forma clara y digna en español, sin alejarse del sentido de ‘to meet me’.
- source_word: παρὰ πάντας
  english_pob_choice: unlike all
  chosen_spanish: a diferencia de todos
  alternatives_spanish:
  - contrario a todos
  - más que todos
  - por encima de todos
  lexicon: LSJ
  rationale: La preposición παρά con acusativo introduce contraste comparativo. ‘A diferencia de todos’ transmite esa oposición de manera natural.
- source_word: τοὺς κατοικοῦντας ἐν δυσμαῖς
  english_pob_choice: who dwell in the west
  chosen_spanish: los que habitan en el occidente
  alternatives_spanish:
  - los que moran en el oeste
  - los habitantes del occidente
  - los que viven en el oeste
  lexicon: LSJ
  rationale: ‘Occidente’ preserva el registro literario y geográfico de la expresión, y ‘habitan’ mantiene un tono más formal que ‘viven’ sin exagerar.
translation_notes:
  revision_awareness: La redacción sigue de cerca el griego de Swete y el ajuste reciente del inglés POB, evitando añadir ‘salir’ porque no está explícito en el texto fuente; también conserva el contraste comparativo de παρά con una fórmula española natural.
  spanish_consistency_notes:
  - Se mantiene ‘Yahvé’ como término de proyecto cuando aparezca el nombre divino; aquí no ocurre.
  - Se evitó ‘SEÑOR’ porque el versículo no contiene el tetragrámaton ni κύριος.
  - ‘Occidente’ se eligió por claridad y tono bíblico-literario; ‘oeste’ queda como alternativa más llana en la nota.
  - La nota reproduce la tensión léxica del verbo griego sin sustituirla por una traducción completamente idiomática.
