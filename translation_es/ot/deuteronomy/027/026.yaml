revisions:
- from: 'Maldito[a] el que no sostiene las palabras de esta ley, para hacerlas. Y todo el pueblo dirá: «Amén».'
  to: 'Maldito el que no mantiene vigentes[a] las palabras de esta ley al ponerlas por obra. Y todo el pueblo dirá: «Amén».'
  rationale: Se ajusta el infinitivo para reflejar el sentido modal/práctico del hebreo, no una finalidad. También se traslada la nota al verbo יָקִים, en línea con la auditoría inglesa, y se escoge una formulación española más natural que preserve la diferencia entre «mantener en vigor» y «poner por obra».
