  text: 오히려 우리 주이시며 구주이신 예수 메시아의 은혜와 그분을 아는 지식 안에서 자라가십시오. 그분께 영원의 날까지 그리고 지금도 영광이 있기를. 아멘.
  philosophy: optimal-equivalence
