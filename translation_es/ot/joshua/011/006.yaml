translation:
  language: es
  text: 'Yahvé dijo a Josué: «No les tengas miedo, porque mañana, a esta hora, yo entrego a todos ellos como caídos[a] delante de Israel. A sus caballos los desjarretarás, y sus carros los quemarás con fuego».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «como hombres caídos» o «como muertos en batalla»; es decir, entregados para que Israel los derribe.'
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: Se conserva el nombre propio del pacto según el criterio del proyecto; en español, «Yahvé» evita la convención de ocultarlo con un título y mantiene la correspondencia directa con el hebreo.
- source_word: אַל תִּירָא
  english_pob_choice: Do not fear
  chosen_spanish: No temas
  alternatives_spanish:
  - No tengas miedo
  - No te asustes
  lexicon: HALOT
  rationale: «Temer» reproduce con precisión el verbo hebreo ירא y suena natural y digno en español bíblico contemporáneo.
- source_word: מִפְּנֵיהֶם
  english_pob_choice: because of them / before Israel
  chosen_spanish: ante ellos
  alternatives_spanish:
  - por causa de ellos
  - delante de ellos
  lexicon: HALOT
  rationale: La frase hebrea con ירא + מִפְּנֵי expresa temor ante la presencia o frente a la amenaza de alguien; en español, «ante ellos» conserva el valor relacional sin sobreparafrasear.
- source_word: מָחָר כָּעֵת הַזֹּאת
  english_pob_choice: tomorrow at this time
  chosen_spanish: mañana, a esta hora
  alternatives_spanish:
  - mañana, a esta misma hora
  - mañana, aproximadamente a esta hora
  lexicon: HALOT
  rationale: Es el equivalente idiomático natural en español y mantiene la referencia temporal precisa del hebreo.
- source_word: אָנֹכִי נֹתֵן
  english_pob_choice: I am giving
  chosen_spanish: yo entrego
  alternatives_spanish:
  - yo estoy entregando
  - yo daré
  lexicon: HALOT
  rationale: El participio con pronombre independiente comunica inminencia y acción divina en curso/promesa. «Entrego» conserva la vivacidad y evita una futura más plana; en contexto, la idea es de poner en manos de Israel a los enemigos.
- source_word: אֶת כֻּלָּם חֲלָלִים
  english_pob_choice: all of them over ... as slain men
  chosen_spanish: a todos ellos como muertos[b]
  alternatives_spanish:
  - a todos ellos como caídos
  - a todos ellos como cadáveres
  lexicon: HALOT
  rationale: חֲלָלִים designa a los caídos en batalla; «muertos» es comprensible, pero se ancla con nota porque el sentido militar es más fuerte que el mero fallecimiento. Se evita una paráfrasis excesiva manteniendo la estructura de entrega + estado de los enemigos.
- source_word: לִפְנֵי יִשְׂרָאֵל
  english_pob_choice: before Israel
  chosen_spanish: delante de Israel
  alternatives_spanish:
  - ante Israel
  - en presencia de Israel
  lexicon: HALOT
  rationale: Conserva la imagen espacial del hebreo y la vuelve natural en español. No se sustituye por «a Israel» para no perder la construcción idiomática del texto.
- source_word: תְּעַקֵּר
  english_pob_choice: hamstring
  chosen_spanish: desjarretarás
  alternatives_spanish:
  - les cortarás los tendones
  - los inutilizarás
  lexicon: HALOT
  rationale: El verbo describe incapacitar a los caballos cortándoles los tendones de las patas. «Desjarretar» es el equivalente español preciso y tradicionalmente disponible para esa acción militar.
- source_word: מַרְכְּבֹתֵיהֶם
  english_pob_choice: their chariots
  chosen_spanish: sus carros
  alternatives_spanish:
  - sus carros de guerra
  - sus cuadrigas
  lexicon: HALOT
  rationale: En contexto bélico, «carros» comunica el término con naturalidad; «carros de guerra» sería una expansión aceptable pero no necesaria.
- source_word: תִּשְׂרֹף בָּאֵשׁ
  english_pob_choice: burn ... with fire
  chosen_spanish: los quemarás en el fuego
  alternatives_spanish:
  - los quemarás con fuego
  - los incendiarás
  lexicon: HALOT
  rationale: Se conserva la redundancia enfática del hebreo («quemar... con fuego»). «En el fuego» suena bíblico y directo en español, sin suavizar el énfasis.
theological_decisions:
- issue: Nombre divino YHWH
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - Jehová
  rationale: Se mantiene el nombre de pacto de forma explícita, conforme a la política del proyecto y a la transparencia frente al hebreo.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
translation_notes:
  revision_awareness: La redacción sigue el pasaje hebreo directamente y refleja la revisión del audit trail que corrigió una paráfrasis causal indebida en la prohibición inicial; se preserva el mandato simple «No temas» y la lectura dinámica pero fiel de la entrega inmediata de los enemigos. También se tuvo en cuenta que el inglés POB eligió una formulación literal para חֲלָלִים, pero en español se requiere una nota para evitar perder el matiz militar.
  spanish_consistency_notes:
  - Se usa «Yahvé» para יהוה, coherente con el estándar del proyecto.
  - Se traduce ירא con «temas/temer» y no con una perífrasis más débil.
  - «Desjarretarás» conserva la fuerza técnica de תְּעַקֵּר mejor que «cripplar» o «inutilizar».
  - «Carros» es suficiente en contexto y evita añadir información no presente en el hebreo.
  - La nota para חֲלָלִים resuelve la tensión entre literalidad y claridad sin borrar el matiz de combate.
