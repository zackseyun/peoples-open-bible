lexical_decisions:
- source_word: ἔτους
  english_pob_choice: in the ... year
  chosen_spanish: en el año ...
  alternatives_spanish:
  - del año ...
  - año ...
  lexicon: LSJ
  rationale: El griego usa un genitivo de datación; en español la fórmula más natural y fiel es una expresión temporal con 'en el año', que reproduce el valor cronológico sin forzar un genitivo ajeno al español.
- source_word: ὀγδοηκοστοῦ καὶ ὀγδόου
  english_pob_choice: the eighty-eighth
  chosen_spanish: ochenta y ocho
  alternatives_spanish:
  - el octogésimo octavo
  - ochenta y octavo
  lexicon: LSJ
  rationale: La construcción griega expresa el ordinal analíticamente con el sentido de 'octogésimo octavo'. En español, dentro de una fórmula de datación breve, 'ochenta y ocho' resulta natural y exacto, y evita una rigidez innecesaria.
- source_word: Ἱεροσολύμοις
  english_pob_choice: Jerusalem
  chosen_spanish: Jerusalén
  alternatives_spanish:
  - en Jerusalén
  - en la ciudad de Jerusalén
  lexicon: LSJ
  rationale: El topónimo griego plural se vierte de manera estándar como 'Jerusalén' en español; el valor locativo de ἐν se conserva con 'en'.
