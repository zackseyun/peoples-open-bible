revisions:
- from: 'Mira[a], yo estoy contra ti, oh habitante del valle, oh roca de la llanura, dice Yahvé: ustedes que dicen: «¿Quién descenderá contra nosotros? y ¿quién entrará en nuestros lugares de morada[b]?».'
  to: 'Mira, yo estoy contra ti, habitante del valle, roca de la llanura, dice Yahvé, ustedes que dicen: «¿Quién descenderá contra nosotros[a]? ¿Y quién entrará en nuestras moradas[b]?».'
  rationale: Se reubica la nota [a] en la cláusula que realmente comenta, se simplifica בִּמְעוֹנוֹתֵינוּ a 'moradas' para mayor naturalidad y fidelidad, y se pule la puntuación para un español más claro y digno sin perder la tensión entre la ciudad personificada y la voz plural de sus habitantes.
