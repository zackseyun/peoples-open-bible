base_translation:
  language: en
  yaml_path: translation/ot/1_samuel/010/019.yaml
  text: But today you have rejected your God[a], who himself saves you from all your calamities and distresses, and you have said to him, ‘No[b], but set a king over us.’ So now present yourselves before Yahweh by your tribes and by your thousands.
  footnotes:
  - marker: a
    text: Or 'from all your calamities and distresses.' The Hebrew terms can refer to evils suffered, calamities, troubles, or afflictions.
    reason: lexical_alternative
  - marker: b
    text: Or 'by your clans' or 'by your units of a thousand.' The Hebrew 'thousands' can denote social or military subdivisions, not only a literal number.
    reason: lexical_alternative
