revisions:
- from: Entonces el sacerdote mandará lavar la cosa[a] en la que está la infección, y la pondrá en cuarentena[b] por siete días, una segunda vez.
  to: Entonces el sacerdote mandará que laven la cosa[a] en la que está la infección, y la aislará[b] por siete días, una segunda vez.
  rationale: Se ajusta la sintaxis para reflejar mejor el plural implícito del hebreo después de «mandará», y se reemplaza el tecnicismo «poner en cuarentena» por «aislar», más natural en español para un objeto, manteniendo en nota la alternativa más literal de confinamiento. También se depura la nota para evitar una alternativa demasiado débil.
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T21:28:49Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien la secuencia del hebreo: mandato del sacerdote, lavado del objeto afectado, y nuevo encierro por siete días. También preserva la amplitud de אֵת אֲשֶׁר בּוֹ הַנָּגַע mediante «la cosa». Sin embargo, «mandará lavar» en español suele implicar causativo (''hará que la laven'') y atenúa el plural implícito de וְכִבְּסוּ menos claramente que «mandará que laven». Además, «pondrá en cuarentena» suena algo moderno/técnico para un objeto, y la nota alternativa introduce «la pondrá aparte», que no refleja bien הִסְגִּיר.'
  spanish_quality_summary: El español es claro y legible, pero puede sonar un poco rígido y técnico. «La cosa» es fiel pero algo tosco; aun así es defendible por la amplitud del hebreo y se puede sostener con nota. La mejora principal es hacer más natural la estructura verbal y usar «la aislará» en el texto principal, que mantiene claridad sin el tecnicismo de «cuarentena» aplicado a un objeto.
  glossary_alignment: No hay conflictos con la terminología doctrinal del proyecto. «Infección» concuerda con el rastro inglés para הַנָּגַע en este contexto de objeto. «Sacerdote» es correcto. No hay términos divinos o mesiánicos en juego.
  issues:
  - severity: medium
    issue: «mandará lavar» no refleja óptimamente el plural implícito de וְכִבְּסוּ
    rationale: Tras «el sacerdote mandará», el hebreo usa un verbo plural ('y lavarán'). En español, «mandará que laven» conserva mejor que otros harán la acción, sin especificar agentes indebidos.
  - severity: medium
    issue: «la pondrá en cuarentena» suena demasiado técnico para un objeto
    rationale: Aunque el inglés auditado usa 'quarantine', en español bíblico-natural aplicado a una prenda u objeto resulta más idiomático «la aislará», con nota para la alternativa más literal «la encerrará».
  - severity: low
    issue: La nota b incluye «la pondrá aparte», alternativa poco precisa
    rationale: הִסְגִּיר significa encerrar/aislar para observación, no simplemente apartar. Conviene limitar las alternativas a «aislar» y «encerrar».
  revised_spanish_text: Entonces el sacerdote mandará que laven la cosa[a] en la que está la infección, y la aislará[b] por siete días, una segunda vez.
  revised_footnotes:
  - marker: a
    text: O “el artículo en el que está la infección”. La expresión hebrea es deliberadamente amplia y se refiere al objeto afectado que está siendo examinado.
    reason: lexical_alternative
  - marker: b
    text: O “la encerrará”. Más literalmente, “la pondrá bajo encierro”.
    reason: lexical_alternative
  revision_rationale: Se ajusta la sintaxis para reflejar mejor el plural implícito del hebreo después de «mandará», y se reemplaza el tecnicismo «poner en cuarentena» por «aislar», más natural en español para un objeto, manteniendo en nota la alternativa más literal de confinamiento. También se depura la nota para evitar una alternativa demasiado débil.
