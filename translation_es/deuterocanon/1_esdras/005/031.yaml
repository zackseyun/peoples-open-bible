  text: los hijos de Iaeir[a], los hijos de Daisan, los hijos de Noeba, los hijos de Chaseba, los hijos de Kazera, los hijos de Ozeiou, los hijos de Finoe, los hijos de Asara, los hijos de Basthai, los hijos de Asana, los hijos de Manei, los hijos de Nafeisei, los hijos de Acuf, los hijos de Ajeiba, los hijos de Asour, los hijos de Farakem,
  philosophy: optimal-equivalence
