translation_notes:
  revision_awareness: El texto fuente hebreo contiene dos nombres propios seguidos de dos gentilicios. La versión inglesa de POB conserva esa estructura breve en apposición; la versión española sigue la misma línea y solo añade una nota para transparentar la alternativa semántica de procedencia ('de Anatot' / 'de Hushá') documentada en el audit trail.
  spanish_consistency_notes:
  - Se mantiene el orden de la lista nominal tal como aparece en el hebreo.
  - Se usan gentilicios breves en minúscula para reflejar el valor descriptivo del hebreo.
  - Se transliteran los nombres propios sin intentar explicar etimologías no requeridas por el contexto.
