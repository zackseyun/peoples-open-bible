translation:
  language: es
  text: 'Entonces Yahvé se apareció a Abram y le dijo: «A tu descendencia[a] daré esta tierra». Y allí edificó un altar a Yahvé, quien se le había aparecido.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «simiente». El hebreo usa una forma singular que puede funcionar colectivamente y referirse a la descendencia como grupo.
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: Se conserva el nombre divino del Tetragrama como transliteración reverente y auditable. En español, "Yahvé" es la forma consistente con el proyecto; evita la sustitución por un título y mantiene el nombre personal del pacto.
- source_word: וַיֵּרָא
  english_pob_choice: appeared
  chosen_spanish: se apareció
  alternatives_spanish:
  - fue visto
  - se reveló
  lexicon: HALOT
  rationale: El nifal de ראה aquí indica manifestación visible a Abram. "Se apareció" comunica bien esa acción narrativa sin convertirla en una paráfrasis más interpretativa.
- source_word: אֶל־אַבְרָם
  english_pob_choice: to Abram
  chosen_spanish: a Abram
  alternatives_spanish:
  - para Abram
  - hacia Abram
  lexicon: HALOT
  rationale: La preposición direccional se expresa naturalmente en español con "a" cuando introduce el destinatario de la aparición.
- source_word: לְזַרְעֲךָ
  english_pob_choice: to your offspring
  chosen_spanish: a tu descendencia
  alternatives_spanish:
  - a tu simiente
  - a tus descendientes
  lexicon: HALOT
  rationale: זֶרַע es singular en forma pero colectivo en sentido. "Descendencia" preserva el valor colectivo en español y suena más natural que "simiente", sin cerrar la tensión entre singular gramatical y sentido grupal.
- source_word: אֶתֵּן
  english_pob_choice: I will give
  chosen_spanish: daré
  alternatives_spanish:
  - voy a dar
  - les daré
  lexicon: HALOT
  rationale: El imperfecto en discurso directo expresa promesa futura. "Daré" mantiene el valor promesal con una forma simple y fiel.
- source_word: הָאָרֶץ הַזֹּאת
  english_pob_choice: this land
  chosen_spanish: esta tierra
  alternatives_spanish:
  - este país
  - esta región
  lexicon: HALOT
  rationale: En contexto patriarcal, אֶרֶץ se traduce mejor como "tierra", término covenantal y geográfico más natural para el español bíblico contemporáneo que "país".
- source_word: וַיִּבֶן שָׁם מִזְבֵּחַ
  english_pob_choice: So there he built an altar
  chosen_spanish: Y allí edificó un altar
  alternatives_spanish:
  - Y allí construyó un altar
  - Entonces allí levantó un altar
  lexicon: HALOT
  rationale: '"Edificó" conserva el registro bíblico sin sonar arcaizante de forma excesiva y corresponde bien a la acción de erigir un altar; "allí" preserva el marcador locativo.'
- source_word: לַיהוָה
  english_pob_choice: to Yahweh
  chosen_spanish: a Yahvé
  alternatives_spanish:
  - para Yahvé
  lexicon: HALOT
  rationale: La lamed aquí marca dedicación/dirección del altar. En español, "a Yahvé" comunica esa orientación de manera directa y coherente con la terminología del nombre divino.
- source_word: הַנִּרְאֶה אֵלָיו
  english_pob_choice: who had appeared to him
  chosen_spanish: quien se le había aparecido
  alternatives_spanish:
  - quien se apareció a él
  - el que se le aparecía
  lexicon: HALOT
  rationale: El participio con artículo identifica a Yahvé como el que ya había aparecido a Abram. El pluscuamperfecto en español refleja bien la anterioridad relativa respecto de la edificación del altar.
theological_decisions:
- issue: Renderización del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - Jehová
  rationale: El texto hebreo usa explícitamente el Tetragrama. Se mantiene el nombre propio divino en español para preservar la identificación del Dios que se aparece a Abram, sin ocultarlo tras un título.
  doctrine_reference: 'DOCTRINE.md: Contested terms — YHWH -> Yahweh (adapted to Spanish as Yahvé)'
- issue: Sentido colectivo de זֶרַע en la promesa
  english_pob_reading: offspring
  chosen_spanish_reading: descendencia
  alternative_spanish_readings:
  - simiente
  - descendientes
  rationale: La forma hebrea es singular, pero el sentido es colectivo. "Descendencia" conserva esa tensión sin resolverla prematuramente ni individualizarla de manera indebida.
  doctrine_reference: Translation philosophy §3 Preserve theological tension rather than resolve it
translation_notes:
  revision_awareness: El contexto auditado muestra alta concordancia y ninguna revisión aplicada en la última pasada; la versión española sigue de cerca las decisiones inglesas sobre el nombre divino, la manifestación de Yahvé y la colectividad de זרע, adaptándolas a un español natural y publicable.
  spanish_consistency_notes:
  - Se mantiene "Yahvé" de forma uniforme para יְהוָה.
  - Se usa "descendencia" para preservar el valor colectivo de זרע.
  - El orden narrativo "Entonces... y allí..." refleja la secuencia del hebreo sin sobretraducción.
  - Se conserva el registro bíblico con "edificó un altar" en lugar de una paráfrasis más libre.
