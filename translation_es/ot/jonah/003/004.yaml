- from: 'Jonás comenzó a entrar en la ciudad, a la distancia de un día de camino[a], y proclamó diciendo: «Aún cuarenta días[b], y Nínive será trastornada».'
  to: 'Jonás comenzó a entrar en la ciudad, una jornada de camino, y clamó y dijo: «Aún cuarenta días[a], y Nínive será trastornada[b]».'
  rationale: Se corrigen los anclajes de notas para que correspondan a las frases adecuadas, se mejora la naturalidad de la expresión idiomática espacial con «una jornada de camino», y se preserva mejor la fuerza narrativa del hebreo con «clamó y dijo». La nota de נֶהְפָּכֶת se ajusta para ofrecer una alternativa real y reflejar la ambigüedad léxica documentada por el POB.
