translation:
  language: es
  text: 'Antiguamente en Israel[a], cuando un hombre iba a consultar a Dios, decía: «Vengan y vayamos al vidente», porque al que hoy se le llama profeta, antiguamente se le llamaba vidente.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O «En otro tiempo en Israel, cuando un hombre iba a buscar a Dios, decía: “Vengan, vayamos al vidente”».'
    reason: lexical_alternative
lexical_decisions:
- source_word: לְפָנִים
  english_pob_choice: Formerly
  chosen_spanish: Antiguamente
  alternatives_spanish:
  - En otro tiempo
  - Antes
  lexicon: HALOT
  rationale: Adverbio temporal que marca una práctica anterior; «antiguamente» reproduce bien el contraste con «hoy» al final del versículo y suena natural en español bíblico moderno.
- source_word: בְּיִשְׂרָאֵל
  english_pob_choice: in Israel
  chosen_spanish: en Israel
  alternatives_spanish:
  - dentro de Israel
  lexicon: HALOT
  rationale: Expresión locativa directa; no requiere ampliación.
- source_word: כֹּה אָמַר
  english_pob_choice: he would say
  chosen_spanish: decía
  alternatives_spanish:
  - solía decir
  - así decía
  lexicon: HALOT
  rationale: Aquí introduce una costumbre reiterada en el pasado; «decía» comunica esa habitualidad de forma natural sin perder el valor reportivo del hebreo.
- source_word: הָאִישׁ
  english_pob_choice: a man
  chosen_spanish: un hombre
  alternatives_spanish:
  - alguien
  - la persona
  lexicon: HALOT
  rationale: El singular es genérico. Se conserva la forma masculina genérica porque el texto describe una práctica habitual y no un enunciado inclusivo focalizado.
- source_word: בְּלֶכְתּוֹ
  english_pob_choice: when a man went
  chosen_spanish: cuando un hombre iba
  alternatives_spanish:
  - al ir
  - cuando iba
  lexicon: HALOT
  rationale: El infinitivo con sufijo funciona temporalmente; «cuando... iba» refleja con claridad el valor aspectual y evita un calco forzado.
- source_word: לִדְרֹשׁ אֱלֹהִים
  english_pob_choice: to inquire of God
  chosen_spanish: a consultar a Dios
  alternatives_spanish:
  - a inquirir de Dios
  - a buscar a Dios
  lexicon: HALOT
  rationale: «דרש» en este contexto denota buscar orientación divina, probablemente mediante mediación profética. «Consultar a Dios» transmite la función de pedir guía sin desplazar el foco hacia una devoción general ni usar una construcción poco natural en español.
- source_word: לְכוּ וְנֵלְכָה
  english_pob_choice: Come, and let us go
  chosen_spanish: Vengan, y vayamos
  alternatives_spanish:
  - Vengan, vamos
  - Vengan, vayamos
  lexicon: HALOT
  rationale: Se conserva el par imperativo + cohortativo. «Vengan, y vayamos» reproduce el impulso exhortativo y la cadencia del hebreo en español digno y natural.
- source_word: עַד הָרֹאֶה
  english_pob_choice: to the seer
  chosen_spanish: al vidente
  alternatives_spanish:
  - al que ve
  - al vidente/profeta
  lexicon: HALOT
  rationale: «רֹאֶה» es el título técnico antiguo para el profeta como «vidente». Se prefiere «vidente» para conservar el término histórico y la distinción lexical frente a «profeta».
- source_word: לַנָּבִיא
  english_pob_choice: the prophet
  chosen_spanish: profeta
  alternatives_spanish:
  - el profeta
  lexicon: HALOT
  rationale: Término estándar para נביא; en español puede omitirse el artículo en esta segunda mención para fluidez, sin cambiar el sentido.
- source_word: הַיּוֹם
  english_pob_choice: of today
  chosen_spanish: hoy
  alternatives_spanish:
  - en la actualidad
  - de hoy
  lexicon: HALOT
  rationale: Contrasta con «antiguamente» y expresa la perspectiva retrospectiva del narrador de forma clara y breve.
- source_word: יִקָּרֵא
  english_pob_choice: was called
  chosen_spanish: se le llama
  alternatives_spanish:
  - era llamado
  - se llamaba
  lexicon: HALOT
  rationale: Aunque el hebreo tiene forma imperfecta pasiva, el sentido es una nota explicativa desde el punto de vista narrativo. «Se le llama» conserva la pasiva impersonal y el matiz de denominación tradicional sin sonar rígido.
- source_word: הָרֹאֶה
  english_pob_choice: the seer
  chosen_spanish: vidente
  alternatives_spanish:
  - el vidente
  - el que ve
  lexicon: HALOT
  rationale: Se mantiene la misma solución lexical que para el título anterior, para conservar cohesión terminológica en la frase final.
theological_decisions:
- issue: 'Término histórico para el funcionario profético: רֹאֶה / נָבִיא'
  english_pob_reading: he who is called a prophet today was formerly called a seer
  chosen_spanish_reading: al que hoy se le llama profeta, antiguamente se le llamaba vidente
  alternative_spanish_readings:
  - el que hoy es llamado profeta, antiguamente era llamado vidente
  - al profeta de hoy se le llamaba vidente
  rationale: El versículo explica un cambio de denominación, no una redefinición doctrinal del profeta. La solución conserva ambas etiquetas y su contraste temporal, evitando fusionarlas o sustituir «vidente» por «profeta» en ambos lugares.
  doctrine_reference: Translation philosophy §1; distinción léxica profética en el texto
- issue: Valor de דָּרַשׁ אֱלֹהִים en contexto narrativo
  english_pob_reading: to inquire of God
  chosen_spanish_reading: a consultar a Dios
  alternative_spanish_readings:
  - a buscar a Dios
  - a inquirir de Dios
  rationale: En este contexto, la acción se entiende como acudir para recibir guía divina, probablemente por mediación del vidente. «Consultar a Dios» preserva ese valor sin introducir una doctrina adicional ni una formulación demasiado técnica.
  doctrine_reference: Translation philosophy §1
translation_notes:
  revision_awareness: 'La redacción española sigue de cerca la última revisión inglesa: mantiene el contraste temporal entre «antiguamente» y «hoy», conserva la estructura explicativa final sobre el cambio de título, y refleja el valor habitual del verbo en pasado («decía») sin perder la fuerza del hebreo. También preserva la distinción entre el título antiguo «vidente» y el término más general «profeta».'
  spanish_consistency_notes:
  - Se usa «Yahvé» por defecto cuando el tetragrámaton aparezca, pero este versículo no contiene el nombre divino explícito; aquí corresponde «Dios» para אֱלֹהִים.
  - Se mantiene «vidente» para רֹאֶה en ambas ocurrencias, a fin de conservar la cohesión terminológica.
  - La estructura «al que hoy se le llama... antiguamente se le llamaba...» intenta reproducir la explicación retrospectiva del narrador sin sobrerelaborarla.
  - Se conserva el masculino genérico «un hombre» porque el hebreo es singular masculino genérico y el contexto es proverbial/habitual.
