translation:
  language: es
  text: Cualquier herida la puede curar un ser vivo,[a] pero hay dolor peor que dolor.[b]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'El paralelo griego de Swete dice: «y de tus hijos guárdate», lo cual difiere mucho del hebreo conservado y puede reflejar otra forma textual.'
    reason: alternative_reading
  - marker: b
    text: El hebreo de este versículo es difícil y probablemente está dañado en partes. La frase final se vierte por sentido a partir del hebreo conservado; en términos más literales, algo así como «hay un golpe de/que un golpe …».
    reason: textual_variant
lexical_decisions:
- source_word: כל
  english_pob_choice: any
  chosen_spanish: Toda
  alternatives_spanish:
  - Cualquier
  - Toda clase de
  lexicon: HALOT
  rationale: En español, «toda herida» comunica de modo natural el valor distributivo/general del hebreo sin sonar forzado; «cualquier» también sería posible, pero «toda» mantiene mejor el tono proverbial.
- source_word: נכה
  english_pob_choice: wound
  chosen_spanish: herida
  alternatives_spanish:
  - herida
  - lesión
  - golpe
  lexicon: HALOT
  rationale: «Herida» reproduce la idea de una lesión sufrida y resulta más idiomática en español que «golpe» en la primera cola, reservando la tensión del proverbio para la segunda.
- source_word: תאכל
  english_pob_choice: may heal / may eat away
  chosen_spanish: puede curarla
  alternatives_spanish:
  - puede sanarla
  - puede consumirla
  - la puede curar
  lexicon: HALOT
  rationale: Dado el estado difícil del hebreo y la revisión inglesa hacia «heal», elegí una forma española que expresa la capacidad de sanar sin añadir más de lo que el contexto permite. El objeto implícito se vuelve explícito en español para que la frase sea legible.
- source_word: חיה
  english_pob_choice: a living creature
  chosen_spanish: un ser vivo
  alternatives_spanish:
  - un ser viviente
  - un animal
  - lo vivo
  lexicon: HALOT
  rationale: «Un ser vivo» conserva la imagen concreta de una entidad viva y evita interpretaciones más estrechas como «animal».
- source_word: אך
  english_pob_choice: but
  chosen_spanish: pero
  alternatives_spanish:
  - mas
  - sin embargo
  - aunque
  lexicon: HALOT
  rationale: «Pero» expresa con claridad el giro adversativo del proverbio en español contemporáneo.
- source_word: מכה
  english_pob_choice: pain / blow
  chosen_spanish: dolor
  alternatives_spanish:
  - golpe
  - herida
  - aflicción
  lexicon: HALOT
  rationale: La revisión inglesa optó por «pain» para evitar una traducción rígida de la imagen. «Dolor» refleja mejor el contraste de intensidad en español y no obliga a una equivalencia física demasiado estrecha.
- source_word: ממכה
  english_pob_choice: than a blow
  chosen_spanish: peor que dolor
  alternatives_spanish:
  - más grave que dolor
  - más doloroso que dolor
  - peor que otro dolor
  lexicon: HALOT
  rationale: La comparación en el hebreo es difícil; el español conserva el paralelismo enfático con repetición («dolor peor que dolor») para no borrar la tensión textual, siguiendo la revisión inglesa que también suavizó la imagen de «blow worse than a blow».
- source_word: תנעם
  english_pob_choice: worse than
  chosen_spanish: peor
  alternatives_spanish:
  - más grave
  - más doloroso
  - más penoso
  lexicon: HALOT
  rationale: El verbo hebreo es incierto y el contexto favorece una lectura comparativa de gravedad/intensidad, no de «agradable». «Peor» mantiene la fuerza proverbial con naturalidad en español.
theological_decisions:
- issue: Reconstrucción de un hebreo difícil y posible discrepancia textual con el griego
  english_pob_reading: The Hebrew is difficult and likely damaged in places; the Greek parallel reads, 'and from your children guard yourself,' which differs sharply from the extant Hebrew.
  chosen_spanish_reading: El versículo se traduce siguiendo el hebreo conservado, con una nota sobre la lectura griega alternativa de guardarse de los hijos.
  alternative_spanish_readings:
  - Y de tus hijos guárdate.
  - Y de tus hijos protégente.
  - Y de tus hijos cuídate.
  rationale: La forma griega ofrece un contenido muy distinto al hebreo. Para no borrar esa tensión documental, la lectura principal sigue el hebreo difícil y la nota conserva la alternativa griega, que debe quedar visible como variante textual relevante.
  doctrine_reference: Crítica textual de Sirácides / Ben Sira; respeto al testimonio plural de las fuentes
- issue: Tensión semántica entre metáfora física y contraste proverbial
  english_pob_reading: Any wound a living creature may heal, but there is pain worse than pain.
  chosen_spanish_reading: Toda herida puede curarla un ser vivo, pero hay dolor peor que dolor.
  alternative_spanish_readings:
  - Toda herida puede sanarla un ser vivo, pero hay dolor más doloroso que dolor.
  - Toda herida puede curarse en un ser vivo, pero hay dolor peor que dolor.
  rationale: La formulación española procura mantener la concisión proverbial y la rareza del original sin convertirla en una paráfrasis explicativa. «Dolor peor que dolor» preserva la repetición enfática que el hebreo y la revisión inglesa dejan en tensión.
  doctrine_reference: Poética sapiencial; preservación del paralelismo y de la dificultad textual
translation_notes:
  revision_awareness: La versión inglesa revisada corrigió una traducción más literal («eat away», «blow worse than a blow») hacia una lectura de sentido más natural («heal», «pain worse than pain»). La redacción española sigue esa revisión, pero conserva la nota sobre la dureza textual y la discrepancia del griego para no borrar la incertidumbre del original.
  spanish_consistency_notes:
  - Se mantiene «herida» para נכה y «dolor» para la segunda cola, evitando repetir «golpe» dos veces y reflejando la decisión inglesa revisada.
  - Se usa «Yahvé» como convención general del proyecto solo cuando corresponda; este versículo no contiene el nombre divino.
  - La puntuación mantiene el paralelismo breve y proverbial del hebreo, con coma antes de la oposición adversativa.
