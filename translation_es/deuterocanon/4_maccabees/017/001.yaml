translation:
  language: es
  text: Y algunos de los guardias del rey[a] también decían que, cuando ella también estaba a punto de ser apresada para la muerte[b], se arrojó sobre la pira[c], para que no tocaran ninguna parte de su cuerpo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'escoltas' o, más literalmente, 'portadores de lanza'. El término griego se refiere a guardias reales.
    reason: lexical_alternative
  - marker: b
    text: El versículo presenta esto como un informe atribuido a algunos de los guardias, no como una afirmación narratorial sin matices. La expresión también puede entenderse literalmente como 'ser apresada para la muerte'.
    reason: alternative_reading
  - marker: c
    text: '''Pira'' traduce πυρά, que aquí no es fuego genérico sino una pira de ejecución o funeraria.'
    reason: lexical_alternative
lexical_decisions:
- source_word: τῶν δορυφόρων
  english_pob_choice: the king’s guards
  chosen_spanish: los guardias del rey
  alternatives_spanish:
  - los escoltas del rey
  - los portadores de lanza
  - los guardias
  lexicon: LSJ
  rationale: δόρυφόρος puede designar literalmente a un 'portador de lanza', pero en este contexto se refiere a la guardia real asociada con la ejecución. En español, 'guardias del rey' comunica de forma natural la función institucional y mantiene el matiz de servicio real sin caer en un calco innecesario.
- source_word: συλλαμβάνεσθαι
  english_pob_choice: to be seized
  chosen_spanish: ser tomada
  alternatives_spanish:
  - ser apresada
  - ser arrestada
  - ser capturada
  lexicon: BDAG
  rationale: El verbo pasivo aquí expresa que iba a ser físicamente llevada o aprehendida. 'Ser tomada' conserva esa pasividad y evita introducir un registro jurídico moderno que 'ser arrestada' podría sugerir.
- source_word: πρὸς θάνατον
  english_pob_choice: for death
  chosen_spanish: para muerte
  alternatives_spanish:
  - para morir
  - para la muerte
  - para ejecución
  lexicon: LSJ
  rationale: La expresión griega es breve y telegráfica; 'para muerte' reproduce esa concisión y deja que el contexto indique que se trata de una ejecución. Se evita ampliar demasiado el sentido con 'ejecución' en el texto principal.
- source_word: ψαύσειέν τι τοῦ σώματος αὐτῆς
  english_pob_choice: might not touch any part of her body
  chosen_spanish: no tocaran ninguna parte de su cuerpo
  alternatives_spanish:
  - no le tocaran el cuerpo
  - no hicieran contacto con ninguna parte de su cuerpo
  - no tocaran su cuerpo
  lexicon: BDAG
  rationale: ψαύω significa 'tocar' o 'rozar/poner la mano sobre'. 'No tocaran ninguna parte de su cuerpo' conserva el énfasis en evitar incluso el menor contacto físico, como en el inglés auditado.
- source_word: ἑαυτὴν ἔρριψεν
  english_pob_choice: she threw herself
  chosen_spanish: se arrojó
  alternatives_spanish:
  - se lanzó
  - se tiró
  - se precipitó
  lexicon: BDAG
  rationale: El verbo reflexivo es enérgico y deliberado. 'Se arrojó' es un español natural y solemne que conserva la fuerza del acto sin sonar demasiado coloquial como 'se tiró'.
- source_word: κατὰ τῆς πυρᾶς
  english_pob_choice: onto the pyre
  chosen_spanish: sobre la pira
  alternatives_spanish:
  - encima de la pira
  - hacia la pira
  - sobre la hoguera
  lexicon: LSJ
  rationale: πυρά alude a una pira funeraria o de ejecución, no meramente a fuego en general. 'Pira' preserva esa especificidad; 'sobre' reproduce de manera idiomática la idea de caer o lanzarse encima.
theological_decisions:
- issue: 'Tipo de enunciación: testimonio reportado, no narración omnisciente'
  english_pob_reading: The verse presents this as a report from some of the guards, not as an unqualified narrator statement.
  chosen_spanish_reading: La frase 'y algunos de los guardias del rey también decían' deja claro que se trata de un informe atribuido a ciertos testigos, no de una afirmación narratorial absoluta.
  alternative_spanish_readings:
  - Presentarlo como relato directo e impersonal sin marcar la fuente
  - Convertirlo en una afirmación narrativa sin el matiz de 'decían'
  rationale: El griego ἔλεγον δὲ καὶ τῶν δορυφόρων τινὲς marca explícitamente la fuente. En español se conserva ese distanciamiento para no borrar la tensión textual entre testimonio y narración.
  doctrine_reference: Preservar la forma del testimonio según el texto fuente; primacía del original sobre la armonización narrativa.
translation_notes:
  revision_awareness: 'Coincido con el control de revisión más reciente: no se requieren cambios respecto del enfoque auditado, y la lectura española mantiene las decisiones léxicas y narrativas esenciales del expediente inglés.'
  spanish_consistency_notes:
  - Se mantiene 'guardias del rey' para δορυφόρων, coherente con la guardia real del contexto.
  - Se conserva 'pira' para πυρά y no 'hoguera', por la especificidad ritual/ejecutiva del término.
  - Se evita 'Cristo' o terminología doctrinal ajena al versículo.
  - La puntuación y el orden conservan el carácter reportado de la frase con 'decían'.
