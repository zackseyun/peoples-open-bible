revisions:
- from: Así que vi que no hay nada mejor que alegrarse el hombre[a] en sus obras, porque esa es su porción. Porque, ¿quién podrá llevarlo a ver qué habrá después de él?
  to: Así que vi que no hay nada mejor que el hombre se alegre en sus obras, porque esa es su porción. Porque, ¿quién podrá llevarlo a ver qué habrá después de él[a]?
  rationale: Se corrige la sintaxis principal para lograr un español natural y fiel al valor evaluativo del hebreo, y se mueve la nota al pie a la frase final que realmente explica. También se ajusta la nota para reflejar la alternativa léxica documentada por la POB inglesa, sin duplicar innecesariamente la lectura principal.
