revisions:
- from: Y cuando se cumplan los días de su purificación[a], ya sea por un hijo o por una hija, traerá un cordero de un año para holocausto y un pichón de paloma o una tórtola para expiación[b], a la entrada del tabernáculo de reunión, al sacerdote.
  to: Y cuando se cumplan los días de su purificación, ya sea por un hijo o por una hija, traerá un cordero de un año para holocausto y un pichón de paloma o una tórtola como ofrenda por el pecado[a], al sacerdote, a la entrada del tabernáculo de reunión.
  rationale: Se reemplaza «para expiación» por «como ofrenda por el pecado» para conservar el valor técnico de חַטָּאת en el texto principal, tal como documenta la auditoría POB, y se preserva la alternativa contextual «ofrenda de purificación» en nota. Se elimina la nota innecesaria sobre «purificación» y se ajusta el orden final para mejor fluidez en español sin perder el sentido del hebreo.
  reviewer_model: gpt-5.4
