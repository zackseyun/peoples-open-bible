base_translation:
  language: en
  yaml_path: translation/ot/1_samuel/002/010.yaml
  text: Yahweh’s adversaries will be shattered[a]; he will thunder against them from heaven. Yahweh will judge the ends of the earth[c][b]; he will give strength to his king and lift up the horn of his anointed.
  footnotes:
  - marker: a
    text: Or, “those who contend with him” for “the LORD’s adversaries.”
    reason: lexical_alternative
  - marker: b
    text: Hebrew “in heaven”; rendered “from heaven” in English to express the source of the thunder.
    reason: lexical_alternative
  - marker: c
    text: Or, “his anointed one.” Hebrew מְשִׁיחוֹ (meshicho) can denote the LORD’s anointed king and also carries messianic significance.
    reason: alternative_reading
