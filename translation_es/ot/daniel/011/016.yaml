translation:
  language: es
  text: Y el que viene contra él hará según su voluntad[a], y nadie se levantará delante de él. Se establecerá en la Tierra Hermosa[b], y será consumida en su mano[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «según su deseo». El hebreo puede expresar voluntad o deseo; aquí se traduce con «voluntad» por ser más natural en español y más cercano al registro del contexto.
    reason: lexical_alternative
  - marker: b
    text: O «la Tierra gloriosa». La expresión hebrea denota una tierra de belleza o esplendor y, en Daniel, se refiere a la tierra de Israel/Judá.
    reason: lexical_alternative
  - marker: c
    text: O «y se consumirá en su mano» / «y quedará destruida en su mano». La frase hebrea es breve y puede enfatizar tanto poder destructor bajo su control como el hecho de que la tierra llegue a la ruina.
    reason: alternative_reading
lexical_decisions:
- source_word: וְיַעַשׂ
  english_pob_choice: will do
  chosen_spanish: hará
  alternatives_spanish:
  - actuará
  - hará lo que quiera
  lexicon: HALOT
  rationale: עשה expresa la acción general de hacer/obrar. En español, «hará» conserva la amplitud semántica sin volver el verso más pesado que el hebreo.
- source_word: הַבָּא אֵלָיו
  english_pob_choice: the one who comes against him
  chosen_spanish: el que viene contra él
  alternatives_spanish:
  - el que viene hacia él
  - el que se acerca a él
  lexicon: HALOT
  rationale: En este contexto bélico, el movimiento «hacia él» tiene fuerza adversativa. «Contra él» comunica esa oposición sin apartarse del valor contextual del hebreo.
- source_word: כִּרְצוֹנוֹ
  english_pob_choice: as he pleases
  chosen_spanish: según su voluntad
  alternatives_spanish:
  - como le place
  - a su gusto
  lexicon: HALOT
  rationale: רָצוֹן es «voluntad/deseo». «Según su voluntad» mantiene el sentido de acción sin restricción; es más sobrio y transparente que una paráfrasis idiomática excesiva.
- source_word: וְאֵין עוֹמֵד לְפָנָיו
  english_pob_choice: and no one will stand before him
  chosen_spanish: y nadie se mantendrá delante de él
  alternatives_spanish:
  - y nadie podrá resistirle
  - y no habrá quien se ponga delante de él
  lexicon: HALOT
  rationale: La imagen hebrea de «estar de pie delante» funciona como resistir o hacer frente. «Se mantendrá delante de él» preserva la metáfora y el matiz de oposición militar.
- source_word: וְיַעֲמֹד
  english_pob_choice: He will stand
  chosen_spanish: Se mantendrá
  alternatives_spanish:
  - Se establecerá
  - Tomará posición
  lexicon: HALOT
  rationale: עמד puede ser simplemente «estar/ponerse de pie», pero aquí sugiere establecer presencia en un territorio. «Se mantendrá» conserva el verbo sin forzar una interpretación más específica.
- source_word: בְּאֶרֶץ הַצְּבִי
  english_pob_choice: in the Beautiful Land
  chosen_spanish: en la Hermosa Tierra
  alternatives_spanish:
  - en la Tierra gloriosa
  - en la tierra hermosa
  lexicon: HALOT
  rationale: צְבִי denota belleza, esplendor o deleite. «Hermosa Tierra» preserva el carácter descriptivo del título y sigue de cerca la decisión inglesa, dejando la identificación geográfica para el contexto y la nota.
- source_word: וְכָלָה בְיָדוֹ
  english_pob_choice: and it will be consumed in his hand
  chosen_spanish: y será consumida en su mano
  alternatives_spanish:
  - y se consumirá en su mano
  - y quedará destruida en su mano
  lexicon: HALOT
  rationale: כָלָה puede expresar consumirse, acabarse o ser destruido. La forma pasiva «será consumida» sigue de cerca la revisión inglesa y conserva la ambigüedad entre destrucción y consumación bajo su control.
theological_decisions:
- issue: Sentido de la expresión territorial «la Hermosa Tierra»
  english_pob_reading: A designation for the land of Israel/Judah within Daniel's vision.
  chosen_spanish_reading: Una designación geográfica de la tierra de Israel/Judá dentro de la visión de Daniel.
  alternative_spanish_readings:
  - Una referencia más general a la «tierra gloriosa» sin identificación explícita.
  - Un título poético para la tierra deseable o hermosa.
  rationale: La frase funciona como nombre descriptivo en el relato visionario. Mantenerla como «Hermosa Tierra» preserva el tono del original sin sobredeterminar la interpretación en el texto principal.
  doctrine_reference: 'Principio POB: primacía del texto fuente y preservación de la tensión semántica cuando el hebreo es compacto.'
- issue: Valor de la clausula final sobre consumición/destrucción
  english_pob_reading: The Hebrew phrase is compact and may emphasize either destructive power under his control or the land's being brought to ruin.
  chosen_spanish_reading: La expresión final se deja con una pasiva que puede insinuar que la tierra llega a su ruina bajo su poder.
  alternative_spanish_readings:
  - «y tendrá destrucción en su mano»
  - «y él traerá destrucción»
  rationale: El hebreo es elíptico; la revisión inglesa prefirió mantener el sentido verbal de consumación. La pasiva española conserva esa tensión entre destrucción ejercida y resultado padecido.
  doctrine_reference: 'Criterio POB: no resolver innecesariamente ambigüedades léxicas o sintácticas que el texto fuente mantiene abiertas.'
translation_notes:
  revision_awareness: La versión inglesa revisada pasó de «with destruction in his hand» a «and it will be consumed in his hand» para reflejar más de cerca וְכָלָה בְיָדוֹ. La versión española sigue esa revisión con una pasiva verbal («será consumida») que conserva el sentido de consumación/ruina y evita fijar prematuramente un sujeto explícito.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como default del proyecto solo cuando corresponde; este versículo no contiene el Tetragrámaton.
  - Se usa «Hermosa Tierra» de forma consistente con la decisión inglesa «Beautiful Land», evitando sustituirla por un término eclesiástico tradicional sin apoyo textual.
  - Se conserva la tensión entre destrucción activa y consumación pasiva en la cláusula final, alineada con el audit trail inglés.
  - «Contra él» se eligió por el contexto hostil; no se traduce mecánicamente como un simple movimiento neutral hacia alguien.
