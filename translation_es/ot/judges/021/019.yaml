translation:
  language: es
  text: 'Y dijeron: «Mira, hay una fiesta de Yahvé en Silo, de año en año[a], que está al norte de Betel, al oriente del camino principal que sube de Betel a Siquem, y al sur de Lebona».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebraísmo: «de días a días», es decir, «de año en año»; indica una recurrencia anual.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמְרוּ
  english_pob_choice: And they said
  chosen_spanish: Y dijeron
  alternatives_spanish:
  - Y dijeron entonces
  - Y respondieron
  lexicon: HALOT
  rationale: Se conserva el verbo narrativo simple del hebreo para un arranque directo y natural en español, sin añadir matices no explícitos en el texto.
- source_word: הִנֵּה
  english_pob_choice: Look
  chosen_spanish: Mira
  alternatives_spanish:
  - Mira
  - He aquí
  lexicon: HALOT
  rationale: «Mira» transmite bien el valor deíctico e introductorio de atención; es más natural en español moderno que un calco más solemne.
- source_word: חַג
  english_pob_choice: a feast
  chosen_spanish: una fiesta
  alternatives_spanish:
  - una fiesta
  - una celebración
  - una solemnidad
  lexicon: HALOT
  rationale: En este contexto cultual, «fiesta» comunica el carácter festivo y religioso del término sin forzar una terminología eclesiástica ajena al contexto hebreo.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahvé
  lexicon: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
  rationale: Se sigue el estándar del proyecto para el nombre divino, preservando el nombre propio del pacto en lugar de sustituirlo por un título.
- source_word: בְּשִׁלֹה
  english_pob_choice: in Shiloh
  chosen_spanish: en Silo
  alternatives_spanish:
  - en Silo
  lexicon: HALOT
  rationale: Se usa la forma toponímica española habitual «Silo», manteniendo la referencia geográfica reconocible para lectores en español.
- source_word: מִיָּמִים יָמִימָה
  english_pob_choice: from year to year
  chosen_spanish: de año en año
  alternatives_spanish:
  - cada año
  - año tras año
  lexicon: HALOT
  rationale: La idiomática hebrea expresa recurrencia anual; «de año en año» reproduce esa periodicidad de modo natural y fiel.
- source_word: מִצְּפוֹנָה לְבֵית אֵל
  english_pob_choice: north of Bethel
  chosen_spanish: al norte de Betel
  alternatives_spanish:
  - al norte de Betel
  - al norte de Betel
  lexicon: HALOT
  rationale: La relación espacial se expresa con una construcción española estándar y clara, conservando el valor direccional del hebreo.
- source_word: מִזְרְחָה הַשֶּׁמֶשׁ
  english_pob_choice: east
  chosen_spanish: al oriente
  alternatives_spanish:
  - al este
  - hacia el oriente
  lexicon: HALOT
  rationale: «Al oriente» conserva el matiz geográfico tradicional del hebreo y evita una redundancia con «sale el sol» que el contexto no requiere.
- source_word: לִמְסִלָּה
  english_pob_choice: of the highway
  chosen_spanish: del camino principal
  alternatives_spanish:
  - del camino
  - de la calzada
  - de la carretera
  lexicon: HALOT
  rationale: מְסִלָּה puede denotar una vía importante o elevada; «camino principal» comunica bien la idea sin sonar demasiado moderno o técnico.
- source_word: הָעֹלָה
  english_pob_choice: that goes up
  chosen_spanish: que sube
  alternatives_spanish:
  - que asciende
  - que va subiendo
  lexicon: HALOT
  rationale: Se conserva el verbo de movimiento ascendente, que en este pasaje forma parte de la descripción topográfica del camino.
- source_word: מִבֵּית אֵל שְׁכֶמָה
  english_pob_choice: from Bethel to Shechem
  chosen_spanish: de Betel a Siquem
  alternatives_spanish:
  - de Betel a Siquem
  - desde Betel hacia Siquem
  lexicon: HALOT
  rationale: La dirección del trayecto se expresa con claridad natural en español, manteniendo la orientación geográfica del hebreo.
- source_word: וּמִנֶּגֶב לִלְבוֹנָה
  english_pob_choice: and south of Lebonah
  chosen_spanish: y al sur de Lebona
  alternatives_spanish:
  - y al sur de Lebona
  lexicon: HALOT
  rationale: Se conserva la última coordenada geográfica con una preposición española directa y transparente.
theological_decisions:
- issue: Renderización del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahvé
  rationale: Se aplica el término base del proyecto para el tetragrámaton. No se usa «Señor» como sustituto porque aquí no hay una razón textual que obligue a ocultar el nombre propio.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Valor de חַג en contexto cultual
  english_pob_reading: a feast of Yahweh
  chosen_spanish_reading: una fiesta de Yahvé
  alternative_spanish_readings:
  - una fiesta de Yahvé
  - una celebración de Yahvé
  rationale: El contexto narrativo describe una observancia festiva ligada a Yahvé; «fiesta» mantiene el matiz cultual y es plenamente entendible en español bíblico contemporáneo.
  doctrine_reference: HALOT lexical range for חַג
translation_notes:
  revision_awareness: El texto inglés y la evaluación de revisión indican alta concordancia y ningún cambio aplicado en la última pasada; se mantuvo la estructura informativa y la triangulación geográfica del versículo sin introducir paráfrasis.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» conforme al estándar del proyecto para יְהוָה.
  - 'Se eligieron topónimos españoles consolidados: Silo, Betel, Siquem y Lebona.'
  - 'Se preservó la secuencia espacial del hebreo: norte de Betel, oriente del camino, sur de Lebona.'
  - La puntuación y el estilo buscan ser publicados y claramente legibles para una audiencia eclesial amplia.
