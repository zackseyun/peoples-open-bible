lexical_decisions:
- source_word: ὅσα
  english_pob_choice: what
  chosen_spanish: lo que
  alternatives_spanish:
  - todo lo que
  - cuanto
  lexicon: BDAG
  rationale: El neutro plural relativo introduce el contenido conocido. En español, «lo que» transmite de manera natural esa referencia global sin endurecer el verso con una construcción demasiado pesada.
- source_word: τε
  english_pob_choice: both
  chosen_spanish: tanto... como
  alternatives_spanish:
  - y
  - también
  lexicon: LSJ
  rationale: El enclítico coordina la pareja κρυπτὰ καὶ ἐμφανῆ. En español, la correlación «tanto... como» expresa mejor ese valor conjuntivo que un simple «y».
- source_word: κρυπτὰ
  english_pob_choice: what is hidden
  chosen_spanish: lo oculto
  alternatives_spanish:
  - las cosas ocultas
  - lo escondido
  lexicon: LSJ
  rationale: κρυπτός significa oculto o escondido. «Lo oculto» conserva la amplitud del término y evita sugerir una secrecía intencional más fuerte de la que pide el griego.
- source_word: ἐμφανῆ
  english_pob_choice: what is manifest
  chosen_spanish: lo manifiesto
  alternatives_spanish:
  - lo evidente
  - lo patente
  lexicon: LSJ
  rationale: ἐμφανής denota lo visible, manifiesto o evidente. «Lo manifiesto» mantiene un registro formal y corresponde de cerca al matiz del original, siguiendo la revisión inglesa hacia «manifest».
- source_word: ἔγνων
  english_pob_choice: I came to know
  chosen_spanish: llegué a conocer
  alternatives_spanish:
  - conocí
  - supe
  lexicon: BDAG
  rationale: El aoristo de γινώσκω puede expresar el llegar a conocer o aprender. «Llegué a conocer» reproduce mejor ese matiz ingressivo que un simple «conocí».
translation_notes:
  revision_awareness: El texto inglés auditado fue revisado de «plain» a «manifest» para acercarlo más a ἐμφανῆ; por eso se prefirió «lo manifiesto» en español, manteniendo también una alternativa en nota para el matiz de «conocí».
  spanish_consistency_notes:
  - Se usó un registro formal y bíblico sin depender de fórmulas eclesiásticas heredadas cuando el griego ofrece una correspondencia más directa.
  - Se evitó traducir mecánicamente desde el inglés; la correlación «tanto... como» refleja mejor el τε griego.
  - La nota alternativa está anclada correctamente en el texto con [a].
