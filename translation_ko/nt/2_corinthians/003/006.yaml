id: 2CO.3.6
reference: 2 Corinthians 3:6
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: ὃς καὶ ἱκάνωσεν ἡμᾶς διακόνους καινῆς διαθήκης, οὐ γράμματος ἀλλὰ πνεύματος, τὸ γὰρ γράμμα ἀποκτέννει, τὸ δὲ πνεῦμα ζῳοποιεῖ.
base_translation:
  language: en
  yaml_path: translation/nt/2_corinthians/003/006.yaml
  text: who also made us competent as servants of a new covenant, not of the letter but of the Spirit; for the letter kills, but the Spirit gives life.
  footnotes:
  - marker: a
    text: Or “spirit” in both places.
    reason: alternative_reading
  - marker: b
    text: Or “ministers” for “servants.”
    reason: lexical_alternative
  - marker: c
    text: “Letter” may also be understood as “written code.”
    reason: lexical_alternative
translation:
  language: ko
  text: 하나님께서 또한 우리를 새 언약의 일꾼으로 감당하게 하셨으니, 곧 문자가 아니라 영의 일꾼입니다. 문자는 죽이고, 영은 살립니다.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ἱκάνωσεν
  english_pob_choice: made us competent
  chosen_korean: 감당하게 하다
  alternatives_korean:
  - 자격을 주다
  - 충분하게 하다
  lexicon: BDAG
  rationale: 3:5의 ἱκανότης와 어근을 공유. 「감당하게 하다」로 연결.
- source_word: διακόνους
  english_pob_choice: servants
  chosen_korean: 일꾼
  alternatives_korean:
  - 사역자
  - 봉사자
  lexicon: BDAG
  rationale: διάκονος는 본 장의 핵심 어휘. 「일꾼」으로 통일하되 직제적 「집사」와 구별한다.
- source_word: καινῆς διαθήκης
  english_pob_choice: new covenant
  chosen_korean: 새 언약
  alternatives_korean: []
  lexicon: BDAG
  rationale: 예레미야 31장의 새 언약 정형. 「새 언약」.
- source_word: γράμματος / πνεύματος
  english_pob_choice: letter / Spirit
  chosen_korean: 문자 / 영
  alternatives_korean:
  - 글자 / 성령
  lexicon: BDAG
  rationale: γράμμα는 「쓰인 문자」, πνεῦμα는 「영」. 두 명사를 구별된 단어로 보존하여 바울의 대비를 살린다. 「영」은 1세기 비-대문자화 원칙을 따라 자동 「성령」으로 격상하지 않는다.
- source_word: ἀποκτέννει / ζῳοποιεῖ
  english_pob_choice: kills / gives life
  chosen_korean: 죽이다 / 살리다
  alternatives_korean: []
  lexicon: BDAG
  rationale: 평행 대구 보존.
theological_decisions:
- issue: 3:6 τὸ γὰρ γράμμα ἀποκτέννει, τὸ δὲ πνεῦμα ζῳοποιεῖ 해석
  chosen_reading: 문자는 죽이고, 영은 살립니다 (γράμμα와 πνεῦμα를 구별된 명사로 보존; 「영」은 대문자 「성령」으로 자동 격상하지 않음)
  alternative_readings:
  - 글자(율법 조문)는 죽이고, 성령은 살립니다
  - 율법은 죽이고, 성령은 살리십니다
  rationale: 바울의 대비는 (1) 토라의 문자/조문 vs 영적 실재, (2) 옛 언약의 문자적 외형 vs 새 언약의 내적 영, (3) 모세 언약(돌판) vs 새 언약(마음 판) 등으로 다양하게 읽혀 왔다. 한국 전통 번역들은 「영」을 「성령」으로 자동 격상해 왔으나, 본 절의 πνεῦμα는 (a) 인격적 성령 (b) 새 언약의 영적 차원 (c) 율법의 영적 본의 등 여러 층위로 작동한다. DOCTRINE.md의 1세기 비-대문자화 원칙에 따라 「영」으로 보존하여 해석의 폭을 닫지 않는다. γράμμα도 「조문」/「율법」으로 해석적 확장 없이 「문자」로 보존한다.
  doctrine_reference: DOCTRINE.md §1 source-primacy; preserve interpretive ambiguity where the source preserves it
