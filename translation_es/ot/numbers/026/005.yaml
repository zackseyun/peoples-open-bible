translation:
  language: es
  text: 'Rubén[a], el primogénito de Israel: los hijos de Rubén: de Hanoch, el clan de los hanoquitas; de Pallu, el clan de los palluitas.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, de manera más formal: «los hijos de Rubén: Hanoch, el clan de los hanoquitas; de Pallu, el clan de los palluitas».»'
    reason: lexical_alternative
lexical_decisions:
- source_word: בְּכֹר
  english_pob_choice: the firstborn
  chosen_spanish: el primogénito
  alternatives_spanish:
  - el primero nacido
  - el hijo primogénito
  lexicon: HALOT
  rationale: «Primogénito» comunica en español el valor de estatus y prioridad familiar de בְּכֹר sin añadir «hijo», que no está explícito en el hebreo y en español puede sonar innecesario.
- source_word: בְּנֵי רְאוּבֵן
  english_pob_choice: the sons of Reuben
  chosen_spanish: los hijos de Rubén
  alternatives_spanish:
  - los descendientes de Rubén
  - los hijos varones de Rubén
  lexicon: HALOT
  rationale: En un contexto genealógico y censal, בְּנֵי introduce la línea masculina de descendencia. «Hijos» conserva la forma literal y es idiomática en español bíblico sin forzar una paráfrasis más amplia.
- source_word: חֲנוֹךְ
  english_pob_choice: Hanoch
  chosen_spanish: Hanoch
  alternatives_spanish:
  - Hanoc
  lexicon: conventional transliteration
  rationale: Se conserva la transliteración habitual del nombre propio en español bíblico. «Hanoch» es reconocible y mantiene continuidad con el uso bíblico común.
- source_word: מִשְׁפַּחַת
  english_pob_choice: clan of
  chosen_spanish: el clan de
  alternatives_spanish:
  - la familia de
  - la casa de
  lexicon: HALOT
  rationale: En listas tribales, מִשְׁפָּחָה designa una subdivisión de parentesco dentro de la tribu. «Clan» reproduce mejor esa unidad social que «familia» en español moderno.
- source_word: הַחֲנֹכִי
  english_pob_choice: the Hanochites
  chosen_spanish: los hanoquitas
  alternatives_spanish:
  - los hanojitas
  - el clan hanoquita
  lexicon: gentilic form
  rationale: La forma gentilicia indica el grupo descendiente de Hanoch. En español, el plural en -itas es la manera más natural de expresar ese etnónimo/clan, manteniendo la relación derivativa.
- source_word: לְפַלּוּא
  english_pob_choice: of Pallu
  chosen_spanish: de Pallú
  alternatives_spanish:
  - de Pallu
  - para Pallú
  lexicon: HALOT
  rationale: El ל prefijado funciona aquí de manera genealógica, equivalente a «de/from». «De Pallú» refleja esa relación de procedencia dentro de la lista.
- source_word: הַפַּלֻּאִי
  english_pob_choice: the Palluites
  chosen_spanish: los palluitas
  alternatives_spanish:
  - los palluítas
  - el clan de Pallú
  lexicon: gentilic form
  rationale: La forma gentilicia final nombra al clan descendiente de Pallú. «Palluitas» conserva el valor colectivo y la derivación del nombre propio en un español claro y natural.
theological_decisions:
- issue: Término de estatus familiar para Reubén
  english_pob_reading: the firstborn of Israel
  chosen_spanish_reading: el primogénito de Israel
  alternative_spanish_readings:
  - el primero de Israel
  - el hijo mayor de Israel
  rationale: No hay tensión doctrinal; la decisión es lexical. «Primogénito» preserva la prioridad de Reubén como nacido primero y como portador de un estatus específico en la familia de Israel.
  doctrine_reference: Génesis 49:3; 1 Crónicas 5:1
- issue: Estructura genealógica abreviada
  english_pob_reading: 'the sons of Reuben: of Hanoch, the clan of the Hanochites; of Pallu, the clan of the Palluites'
  chosen_spanish_reading: 'los hijos de Rubén: de Hanoch, el clan de los hanoquitas; de Pallú, el clan de los palluitas'
  alternative_spanish_readings:
  - los hijos de Rubén eran Hanoch...
  - 'los descendientes de Rubén: Hanoch...'
  rationale: Se conserva la concisión del hebreo y del POB inglés, evitando añadir verbos o explicaciones que no están en el texto. La puntuación con dos puntos reproduce la secuencia listativa y la relación clan-fundador.
  doctrine_reference: Números 26:5-7
translation_notes:
  revision_awareness: La redacción sigue la revisión inglesa más reciente al mantener la estructura genealógica tersa, sin añadir verbos como «eran» ni expansiones como «de donde vino». También conserva el patrón repetido «de ... el clan de ...» para reflejar la lista del hebreo con la misma concisión auditada.
  spanish_consistency_notes:
  - Se usa «Rubén» como forma tradicional del nombre propio, y «primogénito» para בְּכֹר conforme al valor de estatus, no simplemente cronológico.
  - Se mantiene «hijos» para בְּנֵי en un contexto censal-genealógico, sin convertirlo en una paráfrasis más amplia.
  - «Clan» se reserva para מִשְׁפַּחַת a fin de distinguir la subdivisión tribal de una familia nuclear.
  - Los etnónimos «hanoquitas» y «palluitas» siguen el patrón colectivo español para gentilicios bíblicos, evitando mezclar formas inglesas con español.
  - La puntuación con dos puntos busca conservar la parataxis del hebreo y la organización del POB inglés.
