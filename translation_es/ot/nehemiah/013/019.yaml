base_translation:
  language: en
  yaml_path: translation/ot/nehemiah/013/019.yaml
  text: And it happened that[a], when the gates of Jerusalem grew dark before the Sabbath, I said that the doors should be shut, and I said that they should not open them until after the Sabbath[c][b]. And I stationed some of my young men at the gates so that no load might come in on the Sabbath day.
  footnotes:
  - marker: a
    text: Or, more literally, 'when the gates of Jerusalem cast shadows before the Sabbath,' an idiom referring to the approach of evening.
    reason: lexical_alternative
  - marker: b
    text: Or 'some of my servants' or 'some of my attendants'; the Hebrew can refer to members of Nehemiah's personal retinue.
    reason: lexical_alternative
  - marker: c
    text: '''Load'' may refer specifically to goods being carried in for trade, as the surrounding context concerns Sabbath commerce.'
    reason: lexical_alternative
