lexical_decisions:
- source_word: וַיְדַבֵּר
  english_pob_choice: spoke
  chosen_spanish: habló
  alternatives_spanish:
  - dijo
  lexicon: HALOT
  rationale: El verbo de habla introduce una nueva acción narrativa y, en español, «habló» conserva el tono formal de discurso divino mejor que una opción más general como «dijo».
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: Se conserva el nombre propio divino del hebreo, conforme al criterio del proyecto, sin sustituirlo por un título. «Yahvé» es la forma establecida en español del transliterado del Tetragrámaton.
- source_word: אֶל
  english_pob_choice: to
  chosen_spanish: a
  alternatives_spanish:
  - para
  lexicon: HALOT
  rationale: La preposición marca destinatario del habla; en español, «a» es la equivalencia natural y adecuada para el registro bíblico.
- source_word: מֹשֶׁה
  english_pob_choice: Moses
  chosen_spanish: Moisés
  lexicon: HALOT
  rationale: Nombre propio bíblico estándar en español.
- source_word: וְאֶל
  english_pob_choice: and to
  chosen_spanish: y a
  alternatives_spanish:
  - y para
  lexicon: HALOT
  rationale: Se mantiene la coordinación explícita del hebreo entre ambos destinatarios sin sobrecargar el español.
- source_word: אַהֲרֹן
  english_pob_choice: Aaron
  chosen_spanish: Aarón
  lexicon: HALOT
  rationale: Nombre propio bíblico estándar en español.
- source_word: לֵאמֹר
  english_pob_choice: saying
  chosen_spanish: diciendo
  alternatives_spanish:
  - para decir
  lexicon: HALOT
  rationale: El infinitivo constructo funciona como marcador de introducción del discurso; «diciendo» preserva ese valor formal y naturalidad en español.
- source_word: אֲלֵהֶם
  english_pob_choice: to them
  chosen_spanish: a ellos
  alternatives_spanish:
  - a ambos
  - para ellos
  lexicon: HALOT
  rationale: Se conserva la explicitación del objeto pronominal, que en hebreo señala que la palabra va dirigida a ambos destinatarios mencionados.
theological_decisions:
- issue: Traducción del Tetragrámaton יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: El texto hebreo usa directamente el nombre divino. Conforme al criterio del POB, se lo traduce por transliteración del nombre propio, no por una sustitución titulada. En español, «Yahvé» es la forma natural y reverente equivalente a «Yahweh».
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
translation_notes:
  revision_awareness: El seguimiento de revisión inglés indica sin cambios y alto acuerdo; por tanto, esta propuesta española sigue de cerca el sentido auditado, sin introducir variantes textuales ni ajustes interpretativos nuevos.
  spanish_consistency_notes:
  - Se mantiene el nombre divino como «Yahvé» de forma consistente con los principios del proyecto.
  - La coordinación «a Moisés y a Aarón» refleja el paralelismo hebreo y evita fusionar indebidamente los destinatarios.
  - La frase final «diciendo a ellos» conserva el valor explícito de אֲלֵהֶם, aunque en español pudiera omitirse estilísticamente.
