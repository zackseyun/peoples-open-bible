translation:
  language: es
  text: 'Y dijeron a Faraón[a]: «Hemos venido para habitar como extranjeros en la tierra, porque no hay pasto para los rebaños[b] que pertenecen a tus siervos, pues la hambruna es grave en la tierra de Canaán. Y ahora, te rogamos, permite que tus siervos habiten en la tierra de Gosén».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «para vivir como residentes temporales en la tierra».'
    reason: lexical_alternative
  - marker: b
    text: 'O: «para el ganado pequeño»; el hebreo צֹאן puede referirse colectivamente a ovejas y cabras.'
    reason: lexical_alternative
lexical_decisions:
- source_word: לָגוּר
  english_pob_choice: to sojourn
  chosen_spanish: habitar como extranjeros
  alternatives_spanish:
  - sojornar
  - residir temporalmente
  - vivir como residentes temporales
  lexicon: HALOT
  rationale: גור expresa residencia temporaria con matiz de extranjería. En español, «habitar como extranjeros» conserva ese sentido sin importar un calco poco natural como «sojornar». También mantiene la tensión entre permanencia y temporalidad documentada por el inglés POB.
- source_word: בָּאָרֶץ
  english_pob_choice: in the land
  chosen_spanish: en la tierra
  alternatives_spanish:
  - en el país
  lexicon: HALOT
  rationale: אֶרֶץ aquí designa territorio de manera amplia. «Tierra» conserva la forma bíblica natural en español y el valor geográfico general del hebreo.
- source_word: מִרְעֶה
  english_pob_choice: pasture
  chosen_spanish: pasto
  alternatives_spanish:
  - pastura
  - pastizal
  - forraje
  lexicon: HALOT
  rationale: El sustantivo señala el lugar o recurso de pastoreo. «Pasto» es claro y natural en español para este contexto agrícola; «pastura» o «pastizal» también son posibles, pero «pasto» evita sobreespecificar.
- source_word: לַצֹּאן
  english_pob_choice: for the flocks
  chosen_spanish: para los rebaños
  alternatives_spanish:
  - para el rebaño
  - para las ovejas y las cabras
  lexicon: HALOT
  rationale: צֹאן es colectivo y puede abarcar pequeños ganados. El plural «rebaños» sigue la revisión inglesa que subrayó el sentido colectivo plural y suena natural en español.
- source_word: אֲשֶׁר לַעֲבָדֶיךָ
  english_pob_choice: that belong to your servants
  chosen_spanish: que pertenecen a tus siervos
  alternatives_spanish:
  - que son de tus siervos
  - de tus siervos
  lexicon: HALOT
  rationale: La frase marca posesión. «Pertenecen a tus siervos» expresa esa relación sin perder el tono deferente ante Faraón. Opté por «siervos» aquí porque el énfasis es cortesano y no la condición servil como tal.
- source_word: כָבֵד הָרָעָב
  english_pob_choice: the famine is severe
  chosen_spanish: el hambre es pesada
  alternatives_spanish:
  - el hambre es severa
  - la hambruna es grave
  - el hambre es muy intensa
  lexicon: HALOT
  rationale: כָבֵד significa literalmente «pesado» y aquí califica la intensidad de la escasez. Mantener «pesada» conserva la metáfora hebrea que el inglés POB también quiso respetar con «severe» como equivalencia dinámica.
- source_word: יֵשְׁבוּ נָא
  english_pob_choice: please let your servants dwell
  chosen_spanish: te rogamos, permite que tus siervos habiten
  alternatives_spanish:
  - por favor, deja que tus siervos habiten
  - permite que tus siervos se establezcan
  lexicon: HALOT
  rationale: El jussivo con נָא expresa petición cortés. En español, «te rogamos, permite que...» reproduce mejor esa súplica formal que un simple «por favor» y conserva el sentido de residencia de ישב con «habiten».
- source_word: עֲבָדֶיךָ
  english_pob_choice: your servants
  chosen_spanish: tus siervos
  alternatives_spanish:
  - tus esclavos
  - tus servidores
  lexicon: HALOT
  rationale: En este contexto de deferencia ante el rey, «siervos» comunica la autoidentificación cortesana. «Esclavos» sería demasiado fuerte para la intención pragmática del discurso, aunque el término hebreo puede abarcar ese campo en otros contextos.
- source_word: אֶרֶץ גֹּשֶׁן
  english_pob_choice: the land of Goshen
  chosen_spanish: la tierra de Gosén
  alternatives_spanish:
  - Gosén
  lexicon: HALOT
  rationale: Conservar la construcción «tierra de Gosén» refleja el hebreo constructo y mantiene explícita la localización.
theological_decisions:
- issue: Traducción del tono de petición reverente ante Faraón
  english_pob_reading: please let your servants dwell
  chosen_spanish_reading: te rogamos, permite que tus siervos habiten
  alternative_spanish_readings:
  - por favor, deja que tus siervos habiten
  - te suplicamos, permite que tus siervos vivan
  rationale: El hebreo combina una forma volitiva con una partícula de cortesía. La opción elegida conserva reverencia y súplica sin intensificar de más la emoción ni suavizar el ruego.
  doctrine_reference: Pragmática bíblica; cortesía cortesana en narrativa del Pentateuco
- issue: Relación entre «siervos» y el posible matiz de esclavitud
  english_pob_reading: your servants
  chosen_spanish_reading: tus siervos
  alternative_spanish_readings:
  - tus esclavos
  - tus servidores
  rationale: En este pasaje la auto-designación funciona como fórmula de humildad política ante Faraón. «Siervos» evita imponer la fuerza semántica de esclavitud donde el foco narrativo está en la subordinación respetuosa.
  doctrine_reference: Semántica de עבד en contexto narrativo y cortesano
- issue: Metáfora de «pesado» aplicada al hambre
  english_pob_reading: the famine is severe
  chosen_spanish_reading: el hambre es pesada
  alternative_spanish_readings:
  - la hambruna es grave
  - el hambre es severa
  rationale: La metáfora hebrea de peso se conserva para no borrar el paralelismo léxico del original. Aunque «severa» comunica el sentido, «pesada» mantiene el color del hebreo y la tensión semántica entre literalidad e idiomaticidad.
  doctrine_reference: Ética de traducción poética/prosaica; preservación de metáfora léxica
translation_notes:
  revision_awareness: El inglés POB fue revisado de «flock» a «flocks» para reflejar mejor el plural colectivo de צֹאן. La presente versión española sigue esa decisión con «rebaños». También se conserva la equivalencia óptima entre «sojourn» y una expresión española que mantenga temporalidad y extranjería sin calco torpe.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» como término estándar de la serie, pero este versículo no contiene el nombre divino.
  - Se evitó «SEÑOR» como sustituto devocional porque el hebreo no lo exige aquí.
  - «Gosén» conserva la forma española habitual del topónimo bíblico.
  - Se prefirió lenguaje natural de narrativa bíblica moderna, sin caer en paráfrasis libres.
