revisions:
- from: Sus caminos son caminos de agradabilidad[a], y todas sus sendas son paz.
  to: Sus caminos son caminos de placer, y todas sus sendas son paz[a].
  rationale: Se reemplaza «agradabilidad» por «placer» para lograr un español más natural y literario, manteniendo el sustantivo abstracto de נֹעַם. Se conserva «paz» para שָׁלוֹם con las mismas alternativas del POB inglés, pero se corrige el anclaje de la nota para que recaiga sobre «paz», que es el término comentado.
