translation:
  language: es
  text: Den gracias al Dios[a] del cielo, porque su amor leal permanece para siempre.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «su amor leal es para siempre». El hebreo חֶסֶד puede abarcar amor leal, bondad de pacto y fidelidad duradera.'
    reason: lexical_alternative
lexical_decisions:
- source_word: הוֹדוּ
  english_pob_choice: Give thanks
  chosen_spanish: Den gracias
  alternatives_spanish:
  - Alaben
  - Den alabanza
  lexicon: HALOT
  rationale: El imperativo plural de ידה en este refrán convoca a la comunidad a expresar gratitud o alabanza. «Den gracias» conserva el valor exhortativo y el tono litúrgico del paralelo inglés sin endurecerlo en un calco.
- source_word: לְאֵל
  english_pob_choice: to the God
  chosen_spanish: al Dios
  alternatives_spanish:
  - a Dios
  - al Dios poderoso
  lexicon: HALOT
  rationale: אֵל puede significar «Dios» o «mighty one». Aquí, con la especificación «del cielo», el artículo y la forma titulativa «el Dios» son naturales en español y preservan el matiz definido del hebreo.
- source_word: הַשָּׁמָיִם
  english_pob_choice: of heaven
  chosen_spanish: del cielo
  alternatives_spanish:
  - de los cielos
  - del firmamento
  lexicon: HALOT
  rationale: Aunque el hebreo es plural, en español «cielo» comunica con claridad el ámbito celestial de Dios. «Del cielo» mantiene la referencia teológica sin sonar forzado.
- source_word: כִּי
  english_pob_choice: for
  chosen_spanish: porque
  alternatives_spanish:
  - pues
  - ya que
  lexicon: HALOT
  rationale: En el refrán de Salmo 136, כִּי introduce la base del llamado a dar gracias. «Porque» expresa de modo natural esa relación causal en español.
- source_word: לְעוֹלָם
  english_pob_choice: endures forever
  chosen_spanish: para siempre
  alternatives_spanish:
  - por la eternidad
  - eternamente
  lexicon: HALOT
  rationale: La cláusula hebrea comunica duración indefinida. En español, «para siempre» es la forma más natural y fiel para este estribillo, sin añadir una paráfrasis verbal innecesaria.
- source_word: חַסְדּוֹ
  english_pob_choice: his steadfast love
  chosen_spanish: su amor leal
  alternatives_spanish:
  - su amor fiel
  - su misericordia
  - su amor de pacto
  lexicon: HALOT
  rationale: חֶסֶד abarca amor leal, bondad pactal y fidelidad relacional. «Amor leal» conserva esa tensión entre afecto y fidelidad mejor que «misericordia», y evita reducir el término a una sola faceta.
theological_decisions:
- issue: Renderización de חֶסֶד en el estribillo de Salmo 136
  english_pob_reading: his steadfast love endures forever
  chosen_spanish_reading: su amor leal para siempre
  alternative_spanish_readings:
  - su misericordia para siempre
  - su fidelidad del pacto para siempre
  rationale: El hebreo enfatiza el amor fiel y duradero de Yahvé. «Amor leal» conserva la dimensión relacional y covenantal, sin estrechar el término a compasión בלבד ni volverlo demasiado abstracto.
  doctrine_reference: Translation philosophy §5 (consistencia de términos clave, o excepción documentada)
translation_notes:
  revision_awareness: Sin cambios aplicados en la última revisión; el texto fue confirmado como de alta concordancia y sin problemas pendientes.
  spanish_consistency_notes:
  - Se mantiene «Dios» para אֵל según el contexto y la formulación titulativa.
  - Se traduce חֶסֶד con «amor leal» para conservar el peso pactal del término en el salmo.
  - Se evita «SEÑOR» porque el hebreo aquí no contiene יהוה, sino אֵל con la especificación «del cielo».
