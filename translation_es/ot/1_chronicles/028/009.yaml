translation:
  language: es
  text: Y tú, Salomón, hijo mío, conoce al Dios de tu padre y sírvele con corazón íntegro y con un alma dispuesta, porque Yahvé examina todos los corazones y entiende toda intención de los pensamientos. Si lo buscas, él se dejará hallar[a] por ti; pero si lo abandonas, te rechazará para siempre[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «será hallado por ti». El verbo hebreo está en forma pasiva/reflexiva.
    reason: lexical_alternative
  - marker: b
    text: O «te desechará para siempre».
    reason: lexical_alternative
lexical_decisions:
- source_word: דַּע
  english_pob_choice: know
  chosen_spanish: conoce
  alternatives_spanish:
  - reconoce
  - llega a conocer
  lexicon: HALOT
  rationale: El imperativo pide conocimiento personal y relacional del Dios del padre, no mera información. «Conoce» conserva esa fuerza covenantal sin añadir explicaciones.
- source_word: אֱלֹהֵי אָבִיךָ
  english_pob_choice: the God of your father
  chosen_spanish: el Dios de tu padre
  alternatives_spanish:
  - el Dios de tu padre, tu Dios paterno
  - el Dios del padre de ti
  lexicon: HALOT
  rationale: La construcción se vierte de manera natural en español y mantiene la continuidad familiar y pactal del encargo de David a Salomón.
- source_word: וְעָבְדֵהוּ
  english_pob_choice: and serve him
  chosen_spanish: y sírvele
  alternatives_spanish:
  - y adóralo
  - y préstale servicio
  lexicon: HALOT
  rationale: עבד aplicado a Dios incluye servicio obediente y culto. «Sírvele» conserva esa amplitud sin reducirlo solo a «adorar».
- source_word: בְּלֵב שָׁלֵם
  english_pob_choice: with a whole heart
  chosen_spanish: con corazón íntegro
  alternatives_spanish:
  - con corazón entero
  - con corazón perfecto
  lexicon: HALOT
  rationale: שָׁלֵם expresa totalidad e integridad. «Íntegro» comunica bien la idea de plenitud y evita que «perfecto» suene a impecabilidad sin pecado.
- source_word: וּבְנֶפֶשׁ חֲפֵצָה
  english_pob_choice: and a willing soul
  chosen_spanish: y con un alma dispuesta
  alternatives_spanish:
  - y con un alma voluntaria
  - y con un alma deseosa
  lexicon: HALOT
  rationale: נֶפֶשׁ nombra el ser interior/persona, y חֲפֵצָה comunica disposición o voluntad. «Alma dispuesta» preserva el matiz volitivo de forma natural en español.
- source_word: כִּי כָל לְבָבוֹת דּוֹרֵשׁ יְהוָה
  english_pob_choice: for the LORD searches all hearts
  chosen_spanish: porque Yahvé examina todos los corazones
  alternatives_spanish:
  - porque Yahvé busca todos los corazones
  - porque Yahvé sondea todos los corazones
  lexicon: HALOT
  rationale: דָּרַשׁ aquí no es «buscar» en sentido de necesitar hallar, sino escrutar/examinar. «Examina» transmite bien el valor de investigación penetrante.
- source_word: וְכָל יֵצֶר מַחֲשָׁבוֹת מֵבִין
  english_pob_choice: and understands every intention of the thoughts
  chosen_spanish: y entiende toda intención de los pensamientos
  alternatives_spanish:
  - y discierne toda inclinación de los pensamientos
  - y comprende toda formación de los pensamientos
  lexicon: HALOT
  rationale: יֵצֶר apunta a intención, inclinación o configuración interior. «Intención de los pensamientos» conserva la estructura del hebreo y su fuerza interior sin forzar un giro más interpretativo.
- source_word: אִם תִּדְרְשֶׁנּוּ
  english_pob_choice: If you seek him
  chosen_spanish: Si lo buscas
  alternatives_spanish:
  - Si lo consultas
  - Si le buscas
  lexicon: HALOT
  rationale: En este contexto pactal, דרשׁ significa buscar a Dios con devoción y dependencia. «Buscarlo» es la opción española más clara y fiel.
- source_word: יִמָּצֵא לָךְ
  english_pob_choice: he will let himself be found by you
  chosen_spanish: él se dejará hallar por ti
  alternatives_spanish:
  - será hallado por ti
  - lo encontrarás
  lexicon: HALOT
  rationale: 'El nifal de מצא sugiere una pasividad/reflexividad: Dios se deja encontrar. «Se dejará hallar» preserva esa tensión sin borrar la iniciativa divina.'
- source_word: תַּעַזְבֶנּוּ
  english_pob_choice: if you forsake him
  chosen_spanish: si lo abandonas
  alternatives_spanish:
  - si lo dejas
  - si lo desamparas
  lexicon: HALOT
  rationale: עזב en contextos de pacto expresa abandonar o dejar de lado la lealtad. «Abandonas» es claro y conserva la gravedad moral del acto.
- source_word: יַזְנִיחֲךָ לָעַד
  english_pob_choice: he will cast you off forever
  chosen_spanish: te rechazará para siempre
  alternatives_spanish:
  - te arrojará para siempre
  - te desechará para siempre
  lexicon: HALOT
  rationale: El hifil de זנח comunica rechazo/castigo fuera. «Rechazará» mantiene la severidad del juicio; «para siempre» reproduce לָעַד de modo directo.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: 'Se sigue el criterio editorial del proyecto para el Tetragrámaton: usar «Yahvé» como nombre divino transliterado, evitando la sustitución por un título.'
theological_decisions:
- issue: Lenguaje antropológico de corazón y alma
  english_pob_reading: Retained 'heart' and 'soul' rather than reducing both to psychological categories such as 'mind.'
  chosen_spanish_reading: Se mantienen «corazón» y «alma» como dos centros del ser interior.
  alternative_spanish_readings:
  - con toda la mente
  - con plena disposición interior
  rationale: El hebreo distingue לֵב y נֶפֶשׁ. La traducción conserva esa distinción para no reducir la exhortación a una sola categoría psicológica.
  doctrine_reference: Translation philosophy §§1, 6
- issue: Accesibilidad divina en יִמָּצֵא לָךְ
  english_pob_reading: Rendered 'he will let himself be found by you' in the main text.
  chosen_spanish_reading: «Él se dejará hallar por ti» mantiene la idea de que Dios se hace encontrable por su propia disposición.
  alternative_spanish_readings:
  - será hallado por ti
  - lo encontrarás
  rationale: La forma pasiva/reflexiva del hebreo sugiere que el hallazgo depende de la auto-revelación de Dios, no solo del esfuerzo humano. La redacción española conserva esa tensión.
  doctrine_reference: Translation philosophy §3
- issue: Severidad de la advertencia pactal
  english_pob_reading: Rendered יַזְנִיחֲךָ לָעַד as 'he will cast you off forever.'
  chosen_spanish_reading: «te rechazará para siempre» conserva la amonestación solemne sin suavizarla.
  alternative_spanish_readings:
  - te abandonará para siempre
  - te desechará para siempre
  rationale: El texto formula una advertencia severa dentro del marco de fidelidad al pacto. La traducción debe preservar ese peso sin amortiguarlo ni resolverlo dogmáticamente más allá del pasaje.
  doctrine_reference: Translation philosophy §3
translation_notes:
  revision_awareness: El texto sigue de cerca la última revisión en inglés, que permaneció sin cambios. Se mantuvieron las decisiones auditadas sobre דרשׁ, יִמָּצֵא y זנח, y se ajustó la dicción al español natural sin perder la estructura semántica del hebreo.
  spanish_consistency_notes:
  - Se usa «Yahvé» para יְהוָה conforme al estándar del proyecto.
  - Se conserva «corazón»/«alma» para distinguir לֵב y נֶפֶשׁ.
  - «Sírvele» refleja el valor amplio de עבד sin reducirlo a adoración litúrgica.
  - «Se dejará hallar» preserva la tensión pasiva/reflexiva de יִמָּצֵא.
  - La advertencia final se mantiene fuerte con «rechazará para siempre».
