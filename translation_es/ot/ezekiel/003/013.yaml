translation:
  language: es
  text: y el sonido de las alas de los seres vivientes, que se tocaban unas con otras[a], y el sonido de las ruedas junto a ellos[b], y el sonido de un gran estruendo[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literalmente, «tocando, cada una a su hermana»; un giro hebreo que expresa correspondencia o contacto mutuo.
    reason: alternative_reading
  - marker: b
    text: O «frente a ellos» para «junto a ellos».
    reason: alternative_reading
  - marker: c
    text: O «un gran ruido» o «un gran retumbar».
    reason: alternative_reading
lexical_decisions:
- source_word: קוֹל
  english_pob_choice: sound
  chosen_spanish: sonido
  alternatives_spanish:
  - voz
  - ruido
  lexicon: HALOT
  rationale: קוֹל puede significar voz, sonido o ruido. Aquí introduce tres elementos auditivos de una visión, no habla, por lo que 'sonido' es la opción más natural y amplia en español.
- source_word: כַּנְפֵי
  english_pob_choice: wings
  chosen_spanish: alas
  alternatives_spanish:
  - alas de
  lexicon: HALOT
  rationale: El constructo plural se refiere a las alas pertenecientes a los seres vivientes; 'alas' comunica de manera clara y directa el sustantivo que describe la imagen.
- source_word: הַחַיּוֹת
  english_pob_choice: the living creatures
  chosen_spanish: los seres vivientes
  alternatives_spanish:
  - las criaturas vivientes
  - los seres vivos
  lexicon: HALOT
  rationale: En Ezequiel 1 y 3, חַיּוֹת designa a los seres celestiales de la visión. 'Seres vivientes' conserva el sentido establecido y evita una identificación más precisa de la que el texto no da.
- source_word: מַשִּׁיקוֹת
  english_pob_choice: touching
  chosen_spanish: tocándose
  alternatives_spanish:
  - rozándose
  - uniéndose
  - besándose
  lexicon: HALOT
  rationale: El verbo transmite la idea de tocarse o juntarse. En contexto de alas, 'tocándose' reproduce bien la imagen sin volverla extraña en español; 'besándose' sería demasiado literal y engañoso.
- source_word: אִשָּׁה אֶל אֲחוֹתָהּ
  english_pob_choice: one another
  chosen_spanish: la una a la otra
  alternatives_spanish:
  - cada una a su hermana
  - una con otra
  lexicon: HALOT
  rationale: Literalmente es un giro hebreo idiomático, 'mujer a su hermana', que expresa correspondencia mutua. Como el referente son las alas, no personas femeninas, 'la una a la otra' transmite la relación recíproca sin confusión; la literalidad queda preservada en la nota.
- source_word: הָאוֹפַנִּים
  english_pob_choice: the wheels
  chosen_spanish: las ruedas
  alternatives_spanish:
  - los ruedas
  lexicon: HALOT
  rationale: En la visión del trono de Ezequiel, אוֹפַנִּים se refiere a las ruedas asociadas con los seres vivientes. 'Las ruedas' es el equivalente natural en español.
- source_word: לְעֻמָּתָם
  english_pob_choice: beside them
  chosen_spanish: junto a ellos
  alternatives_spanish:
  - frente a ellos
  - opuestas a ellos
  - al lado de ellos
  lexicon: HALOT
  rationale: La frase indica una relación espacial con los seres vivientes. 'Junto a ellos' es claro, natural y compatible con el contexto; 'frente a ellos' o 'opuestas a ellos' son posibles pero menos fluidas aquí.
- source_word: רַעַשׁ גָּדוֹל
  english_pob_choice: a great rumbling
  chosen_spanish: un gran estruendo
  alternatives_spanish:
  - un gran ruido
  - un gran retumbar
  - un gran estrépito
  lexicon: HALOT
  rationale: רַעַשׁ puede denotar temblor, sacudida o ruido tumultuoso. En este contexto auditivo, 'estruendo' expresa un sonido poderoso y retumbante sin concretarlo indebidamente como un evento sísmico.
theological_decisions:
- issue: Naturaleza de los seres vivientes y la escena visionaria
  english_pob_reading: The verse describes auditory elements of Ezekiel's vision without specifying a doctrinal interpretation beyond the imagery itself.
  chosen_spanish_reading: El versículo describe elementos sonoros de la visión de Ezequiel sin añadir una identificación doctrinal de los seres vivientes más allá de la imagen.
  alternative_spanish_readings:
  - El versículo describe a los ángeles
  - El versículo describe seres simbólicos
  rationale: El texto no define la identidad de los seres vivientes en este versículo; por fidelidad al alcance de la fuente, la traducción conserva la imagen abierta de la visión sin interpretarla teológicamente.
  doctrine_reference: Hermenéutica de la visión profética; no dogmatizar donde el texto no especifica
translation_notes:
  revision_awareness: Se revisó a partir del texto hebreo WLC y del audit trail en inglés POB. La versión inglesa ya había estabilizado la lectura de מַשִּׁיקוֹת como 'touching', el giro idiomático de אִשָּׁה אֶל אֲחוֹתָהּ como 'one another', לְעֻמָּתָם como 'beside them', y רַעַשׁ גָּדוֹל como 'a great rumbling'. La presente propuesta adapta esas decisiones al español conservando la misma fuerza semántica y las notas de alternativa donde el español puede sugerir otras opciones.
  spanish_consistency_notes:
  - Se mantiene 'sonido' de forma consistente para קוֹל en la secuencia auditiva.
  - '''Seres vivientes'' conserva la terminología establecida de Ezequiel.'
  - La relación recíproca se expresa con 'la una a la otra' para reflejar el hebreo sin introducir interpretación.
  - '''Junto a ellos'' se usa para una relación espacial neutra y fluida en español.'
  - '''Estruendo'' preserva la intensidad acústica de רַעַשׁ גָּדוֹל.'
