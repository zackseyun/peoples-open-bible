revisions:
- from: y las manifestaciones[a] que vinieron de los cielos a favor de los que con noble empeño[b] actuaron con valentía por el judaísmo, de modo que, aunque eran pocos, saquearon toda la tierra y pusieron en fuga a las hordas bárbaras[c],
  to: y las apariciones[a] que vinieron del cielo a los que combatieron noblemente por el judaísmo[b], de modo que, aunque eran pocos, saquearon toda la tierra y pusieron en fuga a las hordas bárbaras[c],
  rationale: 'Se ajustó el texto para reflejar mejor la fuente griega y la auditoría inglesa: «del cielo» por ἐξ οὐρανοῦ, «a los que» para evitar una expansión interpretativa, y «combatieron noblemente» para conservar el matiz militar de ἀνδραγαθήσασιν con una expresión natural en español. También se alineó ἐπιφανείας con la elección principal de la POB («apariciones») y se añadió la nota cultural sobre «judaísmo» presente en la auditoría inglesa.'
