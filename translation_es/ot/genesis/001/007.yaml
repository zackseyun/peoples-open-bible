translation:
  language: es
  text: Así, Dios hizo la expansión[a] y separó las aguas que estaban debajo de la expansión de las aguas que estaban encima de la expansión. Y así fue.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O «firmamento» (tradicional); también posible: «bóveda».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּעַשׂ
  english_pob_choice: made
  chosen_spanish: hizo
  alternatives_spanish:
  - hizo
  - formó
  lexicon: HALOT
  rationale: עשה expresa aquí la acción creativa de Dios de manera directa. En español, «hizo» comunica con naturalidad ese acto sin añadir la idea más específica de «formó», que sería más interpretativa.
- source_word: אֱלֹהִים
  english_pob_choice: God
  chosen_spanish: Dios
  alternatives_spanish:
  - Dios
  lexicon: HALOT
  rationale: En Génesis 1, אֱלֹהִים con verbo singular se refiere al único Creador. «Dios» es el equivalente directo y estándar en español.
- source_word: הָרָקִיעַ
  english_pob_choice: the expanse
  chosen_spanish: la expansión
  alternatives_spanish:
  - la expansión
  - el firmamento
  - la bóveda
  lexicon: HALOT
  rationale: רָקִיעַ alude a algo extendido o despliegue. «Expansión» conserva mejor esa imagen en español moderno que «firmamento», que suena más tradicional y puede fijar una cosmología más específica de la que el hebreo por sí mismo no exige.
- source_word: וַיַּבְדֵּל
  english_pob_choice: separated
  chosen_spanish: separó
  alternatives_spanish:
  - separó
  - dividió
  lexicon: HALOT
  rationale: בדל significa separar o dividir. «Separó» corresponde bien al patrón narrativo de Génesis 1 y suena natural en español.
- source_word: בֵּין ... וּבֵין
  english_pob_choice: from ...
  chosen_spanish: de ...
  alternatives_spanish:
  - de ...
  - entre ... y ...
  lexicon: HALOT
  rationale: La construcción hebrea marca distinción entre dos conjuntos. En español, «separó X de Y» expresa esa relación de manera idiomática y clara.
- source_word: הַמַּיִם
  english_pob_choice: the waters
  chosen_spanish: las aguas
  alternatives_spanish:
  - las aguas
  - el agua
  lexicon: HALOT
  rationale: Aunque מים puede funcionar como sustantivo colectivo, la forma plural hebrea y el estilo literario del pasaje se reflejan mejor con «las aguas».
- source_word: אֲשֶׁר מִתַּחַת לָרָקִיעַ
  english_pob_choice: that were under the expanse
  chosen_spanish: que estaban debajo de la expansión
  alternatives_spanish:
  - que estaban debajo de la expansión
  - que estaban bajo la expansión
  lexicon: HALOT
  rationale: מִתַּחַת indica posición inferior. «Debajo de» conserva el contraste vertical con «encima de/arriba de» y es claro en español.
- source_word: אֲשֶׁר מֵעַל לָרָקִיעַ
  english_pob_choice: that were above the expanse
  chosen_spanish: que estaban encima de la expansión
  alternatives_spanish:
  - que estaban encima de la expansión
  - que estaban sobre la expansión
  lexicon: HALOT
  rationale: מֵעַל expresa posición superior. «Encima de» mantiene el paralelo con «debajo de» y evita una lectura más rígida de altura física que no añade el hebreo.
- source_word: וַיְהִי כֵן
  english_pob_choice: And it was so
  chosen_spanish: Y así fue
  alternatives_spanish:
  - Y así fue
  - Y fue así
  - Y sucedió así
  lexicon: HALOT
  rationale: La fórmula hebrea marca el cumplimiento de la palabra divina. «Y así fue» conserva ese refrán narrativo con naturalidad en español.
theological_decisions:
- issue: Traducción de רָקִיעַ en un contexto cosmológico
  english_pob_reading: the expanse
  chosen_spanish_reading: la expansión
  alternative_spanish_readings:
  - el firmamento
  - la bóveda
  rationale: '«Expansión» mantiene la tensión interpretativa del hebreo: comunica algo extendido sin imponer la imagen tradicional de una cúpula sólida ni una reconstrucción cosmológica más precisa de la que el texto especifica.'
  doctrine_reference: Translation philosophy §§1, 3, 6
translation_notes:
  revision_awareness: Se siguió el acuerdo alto del audit trail en inglés y no hubo revisiones aplicadas en la última pasada; la presente propuesta mantiene la misma opción semántica central para רָקִיעַ y la fórmula de cierre de Génesis 1:7.
  spanish_consistency_notes:
  - Se usó «expansión» para רָקִיעַ de forma consistente con la línea terminológica del proyecto.
  - Se mantuvo «las aguas» para reflejar la forma hebrea plural y el estilo de Génesis 1.
  - Se evitó «SEÑOR» para יהוה porque este versículo no lo contiene.
  - La puntuación y el flujo narrativo buscan sonar bíblicos pero en español moderno y claro.
