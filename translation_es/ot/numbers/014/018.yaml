revisions:
- from: Yahvé es lento para la ira y abundante en amor constante[a], perdonando la iniquidad y la transgresión, pero de ningún modo dejará sin castigo[d][c][b]; visita la iniquidad de los padres sobre los hijos hasta la tercera y la cuarta generación.
  to: Yahvé es tardo para la ira y abundante en amor constante[a], perdonando la iniquidad y la transgresión, pero de ningún modo dejará sin castigo[d][c][b], visitando la iniquidad de los padres sobre los hijos hasta la tercera y la cuarta generación.
  rationale: Se ajusta «lento para la ira» a «tardo para la ira» por mayor naturalidad y resonancia bíblica en español, y se elimina el punto y coma para mantener el flujo sintáctico del original y del POB inglés revisado. Se conservan las decisiones léxicas principales y las notas existentes.
