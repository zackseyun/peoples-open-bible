translation:
  language: es
  text: Por eso, dense prisa, y envíen a algunos, para que nosotros también sepamos cuál es su propósito[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literalmente, algo como «de qué clase son en mente/opinión». El giro griego es idiomático y se refiere a la disposición, resolución o intención de ustedes.
    reason: lexical_alternative
lexical_decisions:
- source_word: διὸ
  english_pob_choice: Therefore
  chosen_spanish: Por eso
  alternatives_spanish:
  - Por tanto
  - Así que
  lexicon: LSJ
  rationale: La conjunción inferencial introduce una consecuencia directa; «Por eso» mantiene el enlace lógico con español natural y digno, sin sobreactuar la formalidad.
- source_word: σπεύσατε
  english_pob_choice: hurry
  chosen_spanish: apresuraos
  alternatives_spanish:
  - daos prisa
  - hacedlo pronto
  lexicon: LSJ
  rationale: El imperativo aoristo pide acción inmediata. «Apresuraos» conserva urgencia y tono elevado, más cercano al registro bíblico que una expresión demasiado coloquial.
- source_word: πέμψατέ τινας
  english_pob_choice: send some men
  chosen_spanish: enviad a algunos
  alternatives_spanish:
  - enviad a algunos hombres
  - mandad a algunos
  lexicon: LSJ
  rationale: 'τινας es indefinido plural: «a algunos» mantiene la indefinición del griego sin imponer «hombres» donde el texto no lo dice explícitamente. El complemento de dirección con «a» es natural en español.'
- source_word: ὅπως
  english_pob_choice: so that
  chosen_spanish: para que
  alternatives_spanish:
  - a fin de que
  lexicon: LSJ
  rationale: Introduce finalidad; «para que» es la equivalencia normal y clara en español bíblico contemporáneo.
- source_word: καὶ ἡμεῖς
  english_pob_choice: we too
  chosen_spanish: nosotros también
  alternatives_spanish:
  - también nosotros
  - nosotros asimismo
  lexicon: LSJ
  rationale: «καὶ» con el pronombre añade inclusión. «Nosotros también» conserva esa intensificación de manera natural.
- source_word: ἐπιγνῶμεν
  english_pob_choice: may learn
  chosen_spanish: conozcamos
  alternatives_spanish:
  - lleguemos a saber
  - sepamos
  lexicon: LSJ
  rationale: El aoristo subjuntivo expresa llegar a saber/constatar. «Conozcamos» funciona bien en español y evita forzar un matiz excesivamente técnico.
- source_word: ὁποῖοί ἐστε γνώμης
  english_pob_choice: what your intention is
  chosen_spanish: cuál es vuestro propósito
  alternatives_spanish:
  - qué intención tenéis
  - cuál es vuestra disposición
  lexicon: LSJ
  rationale: La locución idiomática apunta a disposición, intención o resolución. «Propósito» comunica bien la fuerza práctica del griego y suena natural en español sin perder el matiz de discernir su postura.
translation_notes:
  revision_awareness: 'La versión inglesa POB siguió una equivalencia óptima: resolvió el idiomatismo griego ὁποῖοί ἐστε γνώμης como «what your intention is». La propuesta española conserva esa decisión semántica con una formulación natural («cuál es vuestro propósito») y mantiene el valor inferencial de διὸ y la urgencia del imperativo σπεύσατε.'
  spanish_consistency_notes:
  - Se evitó «SEÑOR» o terminología no pertinente porque el versículo no contiene lenguaje divino.
  - Se conservó el registro bíblico sobrio sin calcos como «qué clase de mente sois», salvo la nota explicativa.
  - «Nosotros también» refleja mejor el καὶ inclusivo que una simple adición estilística.
