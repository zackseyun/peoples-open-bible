id: GAL.1.8
reference: Galatians 1:8
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: ἀλλὰ καὶ ἐὰν ἡμεῖς ἢ ἄγγελος ἐξ οὐρανοῦ ⸀εὐαγγελίζηται ⸀ὑμῖν παρ’ ὃ εὐηγγελισάμεθα ὑμῖν, ἀνάθεμα ἔστω.
base_translation:
  language: en
  yaml_path: translation/nt/galatians/001/008.yaml
  text: But even if we or an angel from heaven should proclaim good news to you contrary to what we proclaimed to you[c][b][a], let him be accursed.
  footnotes:
  - marker: a
    text: 'Or ''should preach the gospel to you.'' The Greek uses the verb ''proclaim good news.'''
    reason: lexical_alternative
  - marker: b
    text: 'Or ''different from what we proclaimed to you'' or ''beyond what we proclaimed to you.'''
    reason: lexical_alternative
  - marker: c
    text: 'Or ''let him be anathema'' or ''let him be under a curse.'''
    reason: lexical_alternative
translation:
  language: ko
  text: 그러나 우리든지 하늘에서 온 천사든지, 우리가 여러분에게 전한 복음과 다른 것을 전한다면, 그는 저주받을 것입니다[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 헬라어 ἀνάθεμα ἔστω. 「저주 아래 놓이라」, 「아나테마가 되라」. 본 번역은 그 무게를 약화시키지 않는다.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀνάθεμα ἔστω
  english_pob_choice: let him be accursed
  chosen_korean: 저주받을 것입니다
  alternatives_korean:
  - 저주 아래 있으라
  - 아나테마가 되라
  lexicon: BDAG
  rationale: 한국 전통 번역의 「저주를 받을지어다」를 현대 합쇼체로 옮기되, 강도를 약화시키지 않는다. ἀνάθεμα는 신적 단죄에 넘겨짐을 뜻한다.
theological_decisions:
- issue: ἀνάθεμα ἔστω의 강도 보존
  chosen_reading: 저주받을 것입니다
  alternative_readings:
  - 저주를 받게 되기를 빕니다
  - 심판을 받을 것입니다
  rationale: 북극성 원칙에 따라 바울의 논쟁적 강도를 약화시키지 않는다. ἀνάθεμα는 거룩한 단죄에 넘겨짐을 뜻하는 강한 표현이며, 한국어 「저주받을 것입니다」가 그 무게를 보존한다.
  doctrine_reference: DOCTRINE.md §5; KOREAN_PIPELINE.md north-star
