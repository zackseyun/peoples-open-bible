revisions:
- from: Allí recordarán sus caminos y todos sus hechos con los que se contaminaron[a][b], y se aborrecerán a sí mismos a su propia vista por todas las maldades que han hecho.
  to: Allí recordarán sus caminos y todos sus hechos con los cuales se contaminaron[a], y se aborrecerán a sí mismos a su propia vista[b] por todas las maldades que han hecho.
  rationale: Se corrige la ubicación de la nota [b] para que corresponda a בִּפְנֵיכֶם, y se suaviza levemente la construcción relativa con 'con los cuales' para mejorar la naturalidad sin cambiar el sentido. No se requieren cambios doctrinales ni léxicos mayores.
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T23:20:46Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español transmite bien la estructura y el sentido general del hebreo: recuerdo retrospectivo en el lugar de restauración, memoria de caminos y hechos, contaminación moral por esos actos, y autoaborrecimiento por las maldades cometidas. Sin embargo, la colocación de las notas no sigue el contenido del texto base auditado: la nota sobre בִּפְנֵיכֶם (''literalmente en sus caras / en su propio parecer'') está anclada erróneamente en ''se contaminaron'' en vez de en la expresión correspondiente a ''a su propia vista''.'
  spanish_quality_summary: El español es mayormente claro y digno, pero conviene un pequeño ajuste. 'Con los que se contaminaron' suena menos natural que 'con los cuales se contaminaron' o 'por los cuales se contaminaron'; aun así es comprensible. El problema principal es técnico-semántico de notas, no de legibilidad. 'A su propia vista' es aceptable, aunque 'ante sus propios ojos' sería más idiomático. También es preferible mantener el futuro en segunda persona plural de trato reverente/contextual impersonal con 'recordarán... se contaminaron... han hecho' solo si el contexto usa 'ustedes'; aquí no hay conflicto interno.
  glossary_alignment: No hay conflicto con la terminología del proyecto. No aparece Yahvé, Mesías, Cristo ni otros términos de glosario sensible. 'Se aborrecerán a sí mismos' preserva bien la fuerza de וּנְקֹטֹתֶם. 'Caminos', 'hechos', 'maldades' y 'contaminaron' son compatibles con las decisiones léxicas auditadas.
  issues:
  - severity: medium
    issue: La nota [b] está anclada en la frase equivocada.
    rationale: La nota [b] explica בִּפְנֵיכֶם, literalmente 'en sus caras', con sentido 'a su propia vista / ante sus propios ojos'. En el borrador, [b] aparece junto a 'se contaminaron', pero debe colocarse en la expresión equivalente a 'a su propia vista'.
  - severity: low
    issue: La formulación 'con los que se contaminaron' es algo rígida.
    rationale: No es infiel, pero en español bíblico claro suena mejor 'con los cuales se contaminaron' o 'por los cuales se contaminaron'. Es una mejora estilística menor, no un error de traducción.
  revised_spanish_text: Allí recordarán sus caminos y todos sus hechos con los cuales se contaminaron[a], y se aborrecerán a sí mismos a su propia vista[b] por todas las maldades que han hecho.
  revised_footnotes:
  - marker: a
    text: O «sentirán repugnancia de sí mismos» / «se verán llenos de asco de sí mismos». El verbo hebreo expresa un fuerte autoaborrecimiento.
    reason: lexical_alternative
  - marker: b
    text: Literalmente «en sus caras»; el sentido es «a su propia vista» o «ante sus propios ojos».
    reason: lexical_alternative
  revision_rationale: Se corrige la ubicación de la nota [b] para que corresponda a בִּפְנֵיכֶם, y se suaviza levemente la construcción relativa con 'con los cuales' para mejorar la naturalidad sin cambiar el sentido. No se requieren cambios doctrinales ni léxicos mayores.
