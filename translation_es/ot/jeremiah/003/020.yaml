translation:
  language: es
  text: Ciertamente[a], como una mujer traiciona a su compañero, así me han traicionado, casa de Israel, declara Yahvé.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, «como una esposa traiciona a su esposo». El hebreo dice literalmente «una mujer» y «su compañero», pero el contexto más amplio usa una imagen matrimonial para la infidelidad de Israel.
    reason: alternative_reading
lexical_decisions:
- source_word: אָכֵן
  english_pob_choice: Surely
  chosen_spanish: Ciertamente
  alternatives_spanish:
  - Sin duda
  - Verdaderamente
  lexicon: HALOT
  rationale: La partícula introduce una afirmación enfática. «Ciertamente» conserva el tono solemne y natural del hebreo sin sonar excesivamente arcaico.
- source_word: בָּגְדָה / בְּגַדְתֶּם
  english_pob_choice: betrays / have betrayed
  chosen_spanish: traiciona / me han traicionado
  alternatives_spanish:
  - ha sido infiel / han sido infieles
  - ha obrado con deslealtad / han obrado con deslealtad
  lexicon: HALOT
  rationale: בגד expresa traición, deslealtad o infidelidad relacional/covenantal. «Traiciona» y «me han traicionado» comunican bien la ruptura moral y relacional en español contemporáneo.
- source_word: אִשָּׁה
  english_pob_choice: a woman
  chosen_spanish: una mujer
  alternatives_spanish:
  - una esposa
  lexicon: HALOT
  rationale: El hebreo dice literalmente «una mujer». Mantenerlo evita especificar «esposa» en el texto principal sin apoyo explícito inmediato.
- source_word: מֵרֵעָהּ
  english_pob_choice: her companion
  chosen_spanish: su compañero
  alternatives_spanish:
  - su amiga
  - su esposo
  - su amante
  lexicon: HALOT
  rationale: 'רֵעַ tiene un campo amplio: compañero, asociado, amigo. «Su compañero» preserva esa amplitud y no fuerza una relación marital en el cuerpo principal.'
- source_word: כֵּן
  english_pob_choice: so
  chosen_spanish: así
  alternatives_spanish:
  - de la misma manera
  - de igual modo
  lexicon: HALOT
  rationale: Marca la comparación entre la imagen y la acusación a Israel. «Así» es breve, idiomático y fiel.
- source_word: בִּי
  english_pob_choice: me
  chosen_spanish: me
  alternatives_spanish:
  - contra mí
  lexicon: HALOT
  rationale: Con בגד, el complemento adversativo queda naturalmente expresado en español con el verbo «traicionar»; no hace falta añadir «contra» en la frase principal.
- source_word: בֵּית יִשְׂרָאֵל
  english_pob_choice: house of Israel
  chosen_spanish: casa de Israel
  alternatives_spanish:
  - casa de Israel, pueblo de Israel
  - Israel
  lexicon: HALOT
  rationale: «Casa de Israel» preserva el designativo colectivo y pactal del hebreo, sin reducirlo a un simple «Israel».
- source_word: נְאֻם יְהוָה
  english_pob_choice: declares Yahweh
  chosen_spanish: declara Yahvé
  alternatives_spanish:
  - dice Yahvé
  - oráculo de Yahvé
  lexicon: HALOT
  rationale: Se conserva la fórmula profética con el nombre divino explícito «Yahvé», conforme al estándar del proyecto.
theological_decisions:
- issue: 'Imagen relacional: mujer/compañero frente a esposa/esposo'
  english_pob_reading: The verse compares Israel's covenant treachery to a woman's betrayal of her companion without explicitly specifying 'husband' in the main text.
  chosen_spanish_reading: El texto principal conserva «una mujer» y «su compañero» sin convertir la comparación en «esposa/esposo».
  alternative_spanish_readings:
  - como una esposa traiciona a su esposo
  rationale: Jeremías 3 emplea imaginería matrimonial para la infidelidad de Israel, pero aquí el hebreo usa אִשָּׁה y רֵעַ. Para no resolver la tensión lexical con una especificación más fuerte que la del original, la traducción principal mantiene la formulación más cercana al hebreo y deja abierta la lectura contextual marital.
  doctrine_reference: Principio de primacía del texto original; preservar tensiones léxicas y teológicas sin sobreespecificar.
translation_notes:
  revision_awareness: El texto sigue el acuerdo alto del audit trail inglés y adopta la revisión más reciente al mantener la dirección explícita «oh casa de Israel». Se conserva el nombre divino «Yahvé» y la comparación relacional amplia del hebreo, sin introducir «esposa/esposo» en el cuerpo principal.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» en lugar de «SEÑOR» según la convención del proyecto.
  - «Casa de Israel» conserva la fórmula colectiva y profética del hebreo.
  - La elección de «traicionado»/«traiciona» sigue la fuerza de בגד y evita suavizarla a mera «infidelidad» en el texto principal.
  - El marcador de nota al pie [a] aparece solo una vez y corresponde a la alternativa de lectura relacional/matrimonial.
