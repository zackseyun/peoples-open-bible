  rationale: 'Se hicieron ajustes menores para mejorar la naturalidad del español y afinar la correspondencia con los matices del griego y la auditoría inglesa: «asestado un gran golpe a la tierra» por una construcción más idiomática, y «habéis tomado control de» para expresar dominio efectivo sin introducir un matiz innecesario de posesión. También se alinearon mejor las notas con las alternativas semánticas documentadas.'
