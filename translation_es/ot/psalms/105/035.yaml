- from: Y se comió toda la vegetación[b][a] de su tierra, y se comió el fruto de su suelo.
  to: Y comió toda la vegetación[a] en su tierra,[b] y comió el fruto de su suelo.[c]
  rationale: Se corrige la preposición para reflejar mejor el valor locativo del hebreo, se reubican y completan las notas conforme al expediente inglés, y se sustituye 'se comió' por 'comió' para un español más sobrio y adecuado al registro del proyecto.
