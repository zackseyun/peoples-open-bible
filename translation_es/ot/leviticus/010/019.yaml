translation:
  language: es
  text: 'Y Aarón dijo a Moisés: «He aquí, hoy presentaron su ofrenda por el pecado[a] y su holocausto delante de Yahvé, y me han sucedido tales cosas[b]. Si hubiera comido hoy la ofrenda por el pecado, ¿habría sido bueno a los ojos de Yahvé[c]?»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O también «ofrenda por la purificación». El hebreo חַטָּאת puede referirse al pecado o al sacrificio asociado con la purificación del pecado o de la impureza; en Levítico, «ofrenda por el pecado» es la traducción convencional.
    reason: lexical_alternative
  - marker: b
    text: Lit. «y cosas como estas me sucedieron». Aarón alude a las calamidades de aquel día, especialmente la muerte de sus hijos.
    reason: cultural_note
  - marker: c
    text: O «¿habría agradado a Yahvé?».
    reason: lexical_alternative
lexical_decisions:
- source_word: הֵן
  english_pob_choice: Behold
  chosen_spanish: He aquí
  alternatives_spanish:
  - Mira
  - Mira bien
  - He ahí
  lexicon: HALOT
  rationale: La partícula introduce la explicación de Aarón con valor de atención inmediata. «He aquí» conserva ese matiz solemne sin caer en un calco demasiado moderno o coloquial.
- source_word: הִקְרִיבוּ
  english_pob_choice: presented
  chosen_spanish: presentaron
  alternatives_spanish:
  - ofrecieron
  - trajeron
  lexicon: HALOT
  rationale: En contexto sacrificial, el verbo indica llevar una ofrenda al acto cultual. «Presentaron» sigue bien el sentido ritual y evita repetir el verbo «ofrecer» de modo innecesario en español.
- source_word: חַטָּאתָם
  english_pob_choice: their sin offering
  chosen_spanish: su ofrenda por el pecado
  alternatives_spanish:
  - su ofrenda por la purificación
  - su sacrificio por el pecado
  lexicon: HALOT
  rationale: 'Se conserva la lectura sacrificial. «Ofrenda por el pecado» es comprensible y reconoce la tensión lexical: חַטָּאת puede referirse tanto al pecado como a la ofrenda asociada con la expiación/purificación.'
- source_word: עֹלָתָם
  english_pob_choice: their burnt offering
  chosen_spanish: su holocausto
  alternatives_spanish:
  - su ofrenda quemada
  - su ofrenda quemada totalmente
  lexicon: HALOT
  rationale: «Holocausto» es el término técnico tradicional en español bíblico para la ofrenda totalmente quemada; mantiene la distinción cultual del texto.
- source_word: לִפְנֵי יְהוָה
  english_pob_choice: before Yahweh
  chosen_spanish: delante de Yahvé
  alternatives_spanish:
  - en presencia de Yahvé
  - ante Yahvé
  lexicon: HALOT
  rationale: 'Se sigue la convención del proyecto para el nombre divino: «Yahvé». «Delante de» reproduce el valor cultual de presentación ante la presencia divina.'
- source_word: וַתִּקְרֶאנָה אֹתִי כָּאֵלֶּה
  english_pob_choice: such things as these have happened to me
  chosen_spanish: me han sucedido tales cosas
  alternatives_spanish:
  - me han ocurrido cosas como estas
  - me han sobrevenido tales cosas
  lexicon: HALOT
  rationale: La construcción hebrea alude a calamidades concretas ya ocurridas, especialmente la muerte de sus hijos. «Me han sucedido tales cosas» refleja el sentido eventivo sin explicar de más en el texto principal.
- source_word: וְאָכַלְתִּי
  english_pob_choice: If I had eaten
  chosen_spanish: Si hubiera comido
  alternatives_spanish:
  - y hubiera comido
  - si comiera
  lexicon: HALOT
  rationale: Aunque la forma hebrea es una waw + qatal, el contexto exige un valor contrafactual. En español, la condicional compuesta expresa mejor la fuerza retórica.
- source_word: חַטָּאת
  english_pob_choice: the sin offering
  chosen_spanish: la ofrenda por el pecado
  alternatives_spanish:
  - la ofrenda por la purificación
  - el sacrificio por el pecado
  lexicon: HALOT
  rationale: Se mantiene la misma decisión terminológica que en la primera ocurrencia para preservar consistencia y la referencia sacrificial específica.
- source_word: הַיִּיטַב בְּעֵינֵי יְהוָה
  english_pob_choice: would it have been good in the sight of Yahweh
  chosen_spanish: ¿habría sido bueno a los ojos de Yahvé?
  alternatives_spanish:
  - ¿habría agradado a Yahvé?
  - ¿habría sido correcto delante de Yahvé?
  lexicon: HALOT
  rationale: La idiomática hebrea de aprobación divina se conserva con «a los ojos de Yahvé», que es natural en español bíblico y refleja la imagen original de valoración.
theological_decisions:
- issue: Sentido de la pregunta retórica de Aarón sobre comer la ofrenda
  english_pob_reading: Aaron argues that, given the calamity that had befallen him that day, eating the sin offering would not have been acceptable before the LORD.
  chosen_spanish_reading: Aarón razona que, por las calamidades de aquel día, comer la ofrenda no habría sido apropiado delante de Yahvé.
  alternative_spanish_readings:
  - Aarón solo expresa su dolor personal sin implicar una impropiedad ritual
  - Aarón pregunta si, en su estado presente, podía consumir correctamente la ofrenda
  rationale: 'La traducción conserva la tensión del hebreo y del auditor inglés: la pregunta es retórica y vinculada a los hechos dolorosos del día, sin resolver de forma excesiva si el problema es ceremonial, emocional o ambos.'
  doctrine_reference: Preservar la tensión teológica sin cerrarla artificialmente.
translation_notes:
  revision_awareness: Se tomó en cuenta la revisión más reciente del POB inglés, que elevó el registro de «Look» a «Behold», afinó «things like these» como «such things as these», y prefirió «in the sight of the LORD»; la versión española refleja ese tono formal con «He aquí», «tales cosas» y «a los ojos de Yahvé».
  spanish_consistency_notes:
  - Se usa «Yahvé» de manera consistente para el nombre divino, conforme a la convención del proyecto.
  - 'Se conserva la terminología sacrificial específica: «ofrenda por el pecado» y «holocausto».'
  - La pregunta final se mantiene en forma retórica y condicional para no resolver indebidamente la ambigüedad del hebreo.
