base_translation:
  language: en
  yaml_path: translation/ot/joshua/024/032.yaml
  text: And the bones of Joseph[a], which the sons of Israel had brought up from Egypt, they buried at Shechem, in the portion of the field that Jacob had bought from the sons of Hamor, the father of Shechem, for a hundred qesitahs[c][b]; and it became an inheritance for the sons of Joseph.
  footnotes:
  - marker: a
    text: Or 'parcel of the field.' The Hebrew term refers to a plot or portion of land.
    reason: lexical_alternative
  - marker: b
    text: '''Qesitahs'' is an ancient term for a unit of value or money; its exact equivalent is uncertain.'
    reason: cultural_note
  - marker: c
    text: Or possibly 'the founder/chief ancestor of Shechem,' if 'father' is used in a broader ancestral sense.
    reason: lexical_alternative
