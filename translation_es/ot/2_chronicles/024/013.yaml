translation:
  language: es
  text: Así, los obreros trabajaron, y la obra de reparación avanzó[a] por su mano; restauraron la casa de Dios a su condición adecuada[b] y la fortalecieron.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «la restauración de la obra avanzó por sus manos». El hebreo usa אֲרוּכָה, un término que puede significar sanidad o restauración, aplicado aquí a la reparación de un edificio.
    reason: lexical_alternative
  - marker: b
    text: O «pusieron la casa de Dios sobre su base correcta» o «a su forma original».
    reason: lexical_alternative
lexical_decisions:
- source_word: וַֽ/יַּעֲשׂוּ֙ עֹשֵׂ֣י הַ/מְּלָאכָ֔ה
  english_pob_choice: the workmen labored
  chosen_spanish: los obreros trabajaron
  alternatives_spanish:
  - los trabajadores trabajaron
  - los artesanos laboraron
  - los hombres de la obra laboraron
  lexicon: HALOT
  rationale: El hebreo combina el verbo hacer con el participio 'los que hacen la obra', una expresión idiomática. 'Los obreros trabajaron' comunica la actividad intensa y evita un calco torpe como 'los hacedores de la obra hicieron'.
- source_word: וַ/תַּ֧עַל אֲרוּכָ֛ה לַ/מְּלָאכָ֖ה
  english_pob_choice: the repair work progressed
  chosen_spanish: la obra de reparación avanzó
  alternatives_spanish:
  - la restauración avanzó
  - hubo reparación para la obra
  - la obra fue restaurada
  lexicon: HALOT
  rationale: אֲרוּכָה puede significar sanidad, restauración o reparación. En este contexto de reparación del templo, 'obra de reparación' conserva el sentido concreto, y 'avanzó' expresa היטב el valor de עלה como progreso exitoso.
- source_word: בְּ/יָדָ֑/ם
  english_pob_choice: by their hand
  chosen_spanish: por su mano
  alternatives_spanish:
  - por sus manos
  - bajo su mano
  - por medio de ellos
  lexicon: HALOT
  rationale: La expresión hebrea es idiomática para agencia o instrumentación. 'Por su mano' mantiene la imagen concreta del original y su fuerza formal en español bíblico.
- source_word: וַֽ/יַּעֲמִ֜ידוּ
  english_pob_choice: they restored
  chosen_spanish: restauraron
  alternatives_spanish:
  - la restablecieron
  - la pusieron en pie
  - la establecieron
  lexicon: HALOT
  rationale: El hifil de עמד literalmente es 'hacer estar en pie', pero aquí el contexto es de reparación estructural. 'Restauraron' transmite el sentido de reestablecer la construcción sin perder la idea de volverla a su condición debida.
- source_word: בֵּ֧ית הָֽ/אֱלֹהִ֛ים
  english_pob_choice: the house of God
  chosen_spanish: la casa de Dios
  alternatives_spanish:
  - el templo de Dios
  - la casa de Yahvé
  lexicon: HALOT
  rationale: Se conserva la designación literal 'casa de Dios' como en el hebreo, en lugar de sustituirla por 'templo' sin necesidad. 'Dios' traduce אֱלֹהִים de manera directa en este contexto.
- source_word: עַל מַתְכֻּנְתּ֖/וֹ
  english_pob_choice: to its proper condition
  chosen_spanish: a su condición adecuada
  alternatives_spanish:
  - según su forma original
  - a su debida medida
  - a su debida estructura
  lexicon: HALOT
  rationale: מַתְכֻּנֶת señala un arreglo, forma o condición prescrita. 'Condición adecuada' refleja que el templo fue devuelto al estado que correspondía, sin forzar una sola imagen técnica.
- source_word: וַֽ/יְאַמְּצֻֽ/הוּ
  english_pob_choice: and strengthened it
  chosen_spanish: y la укрепaron
  alternatives_spanish:
  - y la fortalecieron
  - y la reforzaron
  - y la hicieron firme
  lexicon: HALOT
  rationale: El sentido es fortalecer o hacer firme una estructura. En español, 'la укрепaron' contiene un error tipográfico no deseado; la forma prevista es 'la fortalecieron'. Esto debe corregirse en la versión final, manteniendo el valor de אמץ como fortalecimiento físico.
theological_decisions:
- issue: Cómo traducir בית האלהים sin introducir un término eclesial posterior
  english_pob_reading: the house of God
  chosen_spanish_reading: la casa de Dios
  alternative_spanish_readings:
  - el templo de Dios
  - la casa de Yahvé
  rationale: El pasaje habla de la estructura sagrada reparada; 'casa de Dios' sigue de cerca el hebreo y evita imponer 'templo' como equivalente obligatorio. 'Yahvé' sería posible por el nombre divino, pero aquí el sustantivo del hebreo es 'Dios', no el Tetragrámaton.
  doctrine_reference: Terminología del santuario/templo en la narrativa histórica del AT; fidelidad léxica al hebreo.
translation_notes:
  revision_awareness: Se tuvo en cuenta el audit trail inglés y la ausencia de cambios en la última pasada. La única corrección necesaria es eliminar un error tipográfico accidental en el borrador español y dejar la frase final como 'y la fortalecieron'.
  spanish_consistency_notes:
  - Se mantuvo 'casa de Dios' como calco semántico fiel al hebreo.
  - Se conservó 'por su mano' para reflejar la idiomática בְּיָדָם.
  - Se evitó 'SEÑOR' y no se introdujo terminología litúrgica no respaldada por el hebreo.
  - La última cláusula debe leerse 'y la fortalecieron', no con el error tipográfico incluido accidentalmente en el borrador.
