  verdict: revise
  source_alignment_summary: 'El borrador español sigue bien la secuencia del hebreo: salida de Etam, cambio de dirección hacia Pi-hahirot, referencia espacial respecto de Baal-zefón, y campamento delante de Migdol. Sin embargo, «volvieron a Pi-hahirot» en español sugiere con fuerza un regreso a un lugar ya visitado, mientras que el hebreo וַיָּשָׁב en este contexto itinerario, según el propio expediente inglés, apunta más a un cambio de rumbo que a retorno pleno. Conviene ajustar esa expresión para reflejar mejor el matiz de ‘turned back’.'
  spanish_quality_summary: El español es claro y natural. Los topónimos están bien conservados y la sintaxis general es fluida. La principal mejora de legibilidad y precisión consiste en reemplazar «volvieron a» por una formulación que exprese cambio de dirección, como «dieron vuelta hacia». La nota también debe alinearse con ese ajuste.
  glossary_alignment: 'No hay conflictos con la terminología troncal del proyecto. Los topónimos se transliteran apropiadamente: Etam, Pi-hahirot, Baal-zefón, Migdol. La decisión léxica problemática no es glosarial sino semántica: שׁוב aquí debe sonar a reversión de ruta más que a regreso a un punto previo.'
  issues:
  - severity: medium
    issue: «volvieron a Pi-hahirot» sugiere retorno a un lugar previo
    rationale: El hebreo וַיָּשָׁב puede significar ‘volver/retornar’ o ‘dar vuelta/volver atrás’, y el expediente inglés documenta que aquí probablemente describe un cambio de ruta. En español, «volvieron a X» normalmente implica que ya estaban allí antes, lo cual puede distorsionar la geografía narrativa.
  - severity: low
    issue: La nota al pie reproduce la ambigüedad, pero anclada a «volvieron» no ayuda a preservar el matiz principal
    rationale: Si el texto principal se corrige hacia ‘dieron vuelta hacia’, la nota debe presentar como alternativa ‘regresaron’ o ‘volvieron’, dejando claro que la opción adoptada busca expresar el cambio de dirección.
  revised_spanish_text: Partieron de Etam y dieron vuelta hacia Pi-hahirot[a], que está frente a Baal-zefón, y acamparon delante de Migdol.
  revised_footnotes:
  - marker: a
    text: O «regresaron»; el verbo hebreo puede denotar volver o cambiar de dirección, pero aquí probablemente describe un cambio de ruta.
    reason: lexical_alternative
