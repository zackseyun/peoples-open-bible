    reason: alternative_reading
  revision_rationale: Se ajusta la sintaxis para un español más natural («Así les ha hecho Betel»), se mejora la fluidez con «su gran maldad», y se reemplaza «será completamente cortado» por «será totalmente destruido», que comunica mejor en español el sentido principal documentado por el POB para נִדְמֹה נִדְמָה, manteniendo en nota las alternativas semánticas preservadas por la auditoría inglesa.
