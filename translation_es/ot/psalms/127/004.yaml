review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien el símil hebreo básico: כְּ/חִצִּים = «Como flechas», בְּ/יַד גִּבּוֹר = «en la mano de un guerrero», y כֵּן = «así son». Sin embargo, «los hijos de la juventud» no preserva con suficiente claridad la fuerza idiomática documentada en el audit trail inglés («the sons of one''s youth»), y en español puede sonar abstracto o ambiguo, como si «la juventud» fuera una cualidad más que una etapa vital del padre.'
  spanish_quality_summary: 'El español es claro en la primera mitad, pero «los hijos de la juventud» resulta poco natural y menos legible en español eclesial general. Una formulación como «los hijos de la juventud de uno» sería demasiado literal; por claridad y fidelidad al sentido, conviene explicitar la referencia temporal: «los hijos nacidos en la juventud». También debe ajustarse la nota para mantener la alternativa del inglés sin repetir exactamente la nueva redacción.'
  glossary_alignment: 'No hay conflicto con la terminología base del proyecto. «Guerrero» para גִּבּוֹר es acertado. El punto principal es la decisión sobre בְּנֵי הַנְּעוּרִים: el borrador usa «hijos», que en español puede funcionar genéricamente, pero el audit trail pide preservar el masculino; «hijos» sigue siendo aceptable aquí, especialmente dado el contexto. La corrección necesaria es idiomática-semántica, no terminológica mayor.'
  issues:
  - severity: medium
    issue: «los hijos de la juventud» suena poco idiomático y ambiguo en español
    rationale: 'Aunque refleja de cerca la forma del hebreo, no comunica bien el sentido explicado en el POB inglés: hijos/sons nacidos durante la juventud. La frase española puede interpretarse de manera abstracta o poco natural.'
  - severity: low
    issue: La nota al pie actual repite una alternativa que debería pasar al texto principal
    rationale: Si el mejor español para preservar el sentido es «hijos nacidos en la juventud», esa formulación ya no debe quedar solo como alternativa en nota; la nota debe ofrecer una alternativa más literal, anclada en el mismo lugar.
  revised_spanish_text: Como flechas en la mano de un guerrero[a], así son los hijos nacidos en la juventud.
  revised_footnotes:
  - marker: a
    text: O, más literalmente, «los hijos de la juventud».
    reason: lexical_alternative
  revision_rationale: Se cambia «los hijos de la juventud» por «los hijos nacidos en la juventud» para expresar con español natural el sentido idiomático de בְּנֵי הַנְּעוּרִים, en línea con la revisión inglesa «the sons of one's youth». Se conserva «hijos» para no neutralizar indebidamente el masculino del hebreo, y se mueve la formulación más literal a nota al pie como alternativa.
