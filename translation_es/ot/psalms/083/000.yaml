translation:
  language: es
  text: Un cántico. Un salmo de Asaf[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «para Asaf». La preposición hebrea puede indicar autoría, asociación o dedicación en los encabezados de los salmos.
