translation:
  language: es
  text: 'Y sus asentamientos fueron Etam[a], Ain, Rimmon, Tochen y Ashan: cinco ciudades.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «sus aldeas». El término hebreo puede referirse a asentamientos menores o a recintos habitados.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְחַצְרֵיהֶם
  english_pob_choice: their settlements
  chosen_spanish: sus asentamientos
  alternatives_spanish:
  - sus aldeas
  - sus poblados
  - sus villorrios
  - sus recintos
  lexicon: HALOT
  rationale: חָצֵר puede referirse a un asentamiento, aldea o recinto habitado. En esta lista topográfica, «asentamientos» comunica bien el sentido amplio y natural en español sin reducirlo indebidamente a un tipo menor de población.
- source_word: עֵיטָם
  english_pob_choice: Etam
  chosen_spanish: Etam
  lexicon: transliteración de nombre propio
  rationale: Es un topónimo; se conserva en transliteración para mantener la identificación geográfica.
- source_word: עַיִן
  english_pob_choice: Ain
  chosen_spanish: Ain
  alternatives_spanish:
  - Ayin
  lexicon: transliteración de nombre propio
  rationale: Aunque el sustantivo común puede significar «fuente» u «ojo», aquí funciona como nombre de lugar en una lista de ciudades, por lo que se translitera.
- source_word: רִמּוֹן
  english_pob_choice: Rimmon
  chosen_spanish: Rimón
  alternatives_spanish:
  - Rimón
  - Rimón
  lexicon: transliteración de nombre propio
  rationale: Se conserva el topónimo. En español bíblico es natural adaptar la terminación a «-ón» para reflejar la pronunciación y la forma tradicional de transliteración.
- source_word: תֹכֶן
  english_pob_choice: Tochen
  chosen_spanish: Toquén
  alternatives_spanish:
  - Tojén
  - Token
  lexicon: transliteración de nombre propio
  rationale: Es un nombre de lugar; se translitera de forma legible en español. «Toquén» evita una lectura mecánica del inglés y busca una adaptación fonética sobria.
- source_word: עָשָׁן
  english_pob_choice: Ashan
  chosen_spanish: Asán
  alternatives_spanish:
  - Asán
  - Asán
  lexicon: transliteración de nombre propio
  rationale: Topónimo conservado en transliteración. La forma con acento ayuda a la lectura en español y refleja la prosodia habitual de nombres bíblicos adaptados.
- source_word: עָרִים חָמֵשׁ
  english_pob_choice: five cities
  chosen_spanish: cinco ciudades
  alternatives_spanish:
  - cinco poblados
  - cinco poblaciones
  - cinco localidades
  lexicon: HALOT
  rationale: עִיר suele significar «ciudad» o «población». «Ciudades» preserva la fuerza lexical convencional y reproduce el cierre resumido del versículo.
translation_notes:
  revision_awareness: 'El texto en inglés POB ya había sido revisado y mantenido sin cambios en la última pasada, con acuerdo alto del cotejo cruzado. La versión española sigue ese mismo análisis léxico: conserva la lista de topónimos, mantiene el resumen numérico final y solo ajusta la forma española de transliteración y el valor amplio de חַצְרֵיהֶם.'
  spanish_consistency_notes:
  - Se mantiene el orden de los lugares tal como aparece en el hebreo y en el audit trail inglés.
  - «Asentamientos» se usa como término amplio; la nota conserva la alternativa «aldeas» para reflejar la tensión léxica.
  - Se evita traducir los topónimos comunes como palabras del léxico (por ejemplo, עַיִן como «fuente») porque aquí son nombres propios.
  - La puntuación con dos puntos antes de «cinco ciudades» reproduce el cierre resumitivo del hebreo y del inglés POB.
