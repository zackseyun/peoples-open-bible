    issue: 'Forma del nombre real: ''Jehosafat'''
    rationale: Aunque refleja más de cerca el hebreo Yehoshafat, en español bíblico la forma asentada y más legible es 'Josafat'. Usarla mejora la recepción eclesial sin pérdida de fidelidad.
  - severity: medium
    issue: Transliteración de עֲזוּבָה como 'Azubá'
    rationale: La adaptación con acento gráfico no está motivada por una política documentada y se aparta del audit trail inglés 'Azubah'. 'Azubah' preserva mejor el nombre propio sin ambigüedad.
  - severity: medium
    issue: Transliteración de שִׁלְחִי como 'Siljí'
    rationale: El cambio de 'Shilhi' a 'Siljí' introduce una hispanización parcial poco consistente. 'Shilhi' conserva mejor la forma del nombre según el audit trail y evita una adaptación ad hoc.
  revised_spanish_text: Y Josafat reinó sobre Judá. Tenía treinta y cinco años cuando comenzó a reinar, y reinó veinticinco años en Jerusalén. Y el nombre de su madre fue Azubah, hija de Shilhi.
  revision_rationale: 'Se corrigen únicamente las formas de nombres propios para mejorar consistencia con el audit trail y la legibilidad bíblica en español: ''Jehosafat'' a ''Josafat'', ''Azubá'' a ''Azubah'' y ''Siljí'' a ''Shilhi''. El resto del texto ya refleja bien el sentido del hebreo y mantiene un español natural.'
