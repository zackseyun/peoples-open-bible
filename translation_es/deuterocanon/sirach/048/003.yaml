translation:
  language: es
  text: Por su palabra[a] contuvo los cielos, e hizo descender fuego tres veces[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Griego paralelo: «Por la palabra del Señor cerró el cielo». El hebreo conservado es más comprimido en este punto; por eso el texto principal sigue el testimonio hebreo, mientras la nota preserva la formulación más explícita del griego.'
    reason: alternative_reading
  - marker: b
    text: Literalmente, «tres fuegos»; probablemente significa que hizo descender fuego en tres ocasiones.
    reason: lexical_alternative
lexical_decisions:
- source_word: בדבר
  english_pob_choice: By his word
  chosen_spanish: Por su palabra
  alternatives_spanish:
  - Con su palabra
  - Por la palabra
  lexicon: HALOT
  rationale: El hebreo permite un valor instrumental de ב con דבר; en español, 'por su palabra' comunica de manera natural la idea de medio o causa, y conserva la relación con la palabra pronunciada.
- source_word: אל
  english_pob_choice: his
  chosen_spanish: su
  alternatives_spanish:
  - de Dios
  - del Señor
  - — (implícito)
  lexicon: HALOT
  rationale: Como en el inglés POB, el poseedor se entiende por el contexto de Elías. 'Su' mantiene la referencia implícita sin introducir explícitamente 'Dios' o 'el Señor' en el texto principal.
- source_word: עצר
  english_pob_choice: restrained
  chosen_spanish: contuvo
  alternatives_spanish:
  - restringió
  - cerró
  - detuvo
  lexicon: HALOT
  rationale: '''Contuvo'' transmite bien la idea de retener o mantener bajo control el cielo/heaven(s) para que no derrame lluvia, con un español más natural que un calco rígido.'
- source_word: שמים
  english_pob_choice: the heavens
  chosen_spanish: los cielos
  alternatives_spanish:
  - los cielos
  - el cielo
  - el firmamento
  lexicon: HALOT
  rationale: '''Los cielos'' conserva el registro bíblico y el plural formal del hebreo, y evita reducir de entrada el sentido a solo ''el cielo'' meteorológico.'
- source_word: ויורד
  english_pob_choice: brought down
  chosen_spanish: trajo
  alternatives_spanish:
  - hizo descender
  - hizo bajar
  - bajó
  lexicon: HALOT
  rationale: 'El verbo es causativo: hizo venir fuego hacia abajo. ''Trajo'' es breve y natural en español, y en contexto comunica el descenso del fuego sin añadir volumen innecesario.'
- source_word: שלוש אשות
  english_pob_choice: fire three times
  chosen_spanish: fuego tres veces
  alternatives_spanish:
  - tres fuegos
  - fuego en tres ocasiones
  lexicon: HALOT
  rationale: La forma hebrea literal 'tres fuegos' puede sonar extraña en español. Siguiendo el sentido que el inglés POB ya señaló, 'fuego tres veces' expresa que ocurrió en tres ocasiones, sin perder la base textual.
theological_decisions:
- issue: Si mencionar explícitamente a Yahvé/Señor en la primera cláusula siguiendo el paralelo griego
  english_pob_reading: Kept the Hebrew-centered rendering 'By his word' in the main text
  chosen_spanish_reading: Se mantiene una referencia implícita en 'Por su palabra'
  alternative_spanish_readings:
  - Por la palabra de Yahvé
  - Por la palabra del Señor
  - Por la palabra
  rationale: El hebreo transmitido es más comprimido y el contexto de Sirácides ya sitúa la acción de Elías bajo autoridad divina. Para respetar la primacía del testimonio hebreo, el texto principal no explicita 'Yahvé'; la alternativa griega queda reflejada en nota.
  doctrine_reference: Primacía del testimonio original con transparencia ante variantes y expansiones interpretativas.
translation_notes:
  revision_awareness: El pasaje presenta una divergencia relevante entre el hebreo conservado y el paralelo griego. La redacción española sigue el hebreo como texto base, pero registra la expansión griega en nota para que la elección sea auditable.
  spanish_consistency_notes:
  - Se mantiene 'los cielos' para sostener el registro bíblico y la correspondencia con la forma plural hebrea.
  - Se evita introducir 'Yahvé' en el texto principal porque el testimonio hebreo no lo expresa de manera explícita en esta línea.
  - '''Por su palabra'' conserva la instrumentación del hebreo sin traducir mecánicamente el inglés.'
