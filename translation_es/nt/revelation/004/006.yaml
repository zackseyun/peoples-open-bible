  text: καὶ ἐνώπιον τοῦ θρόνου ὡς θάλασσα ὑαλίνη ὁμοία κρυστάλλῳ. Καὶ ἐν μέσῳ τοῦ θρόνου καὶ κύκλῳ τοῦ θρόνου τέσσαρα ζῷα γέμοντα ὀφθαλμῶν ἔμπροσθεν καὶ ὄπισθεν·
base_translation:
  language: en
  yaml_path: translation/nt/revelation/004/006.yaml
  text: And before the throne was something like a sea of glass[a], like crystal. And in the midst of the throne and around the throne were four living creatures[c][b], full of eyes in front and behind.
  footnotes:
  - marker: a
    text: 'Or ''a glassy sea.'' The Greek presents a comparison: ''something like a sea of glass.'''
    reason: lexical_alternative
  - marker: b
    text: Or 'four living beings.' The Greek word does not mean the hostile 'beasts' of later Revelation passages.
    reason: lexical_alternative
  - marker: c
    text: The phrase 'in the midst of the throne and around the throne' is spatially difficult; the Greek likely reflects visionary perspective and is left intentionally close to the source.
    reason: alternative_reading
