revisions:
- from: Así que Manoah tomó el cabrito y la ofrenda vegetal[a], y los ofreció sobre la roca a Yahvé; y él hizo algo maravilloso, mientras Manoah y su esposa observaban.
  to: Entonces Manoá tomó el cabrito y la ofrenda vegetal[a], y los ofreció sobre la roca a Yahvé; y él hizo algo maravilloso, mientras Manoá y su esposa observaban.
  rationale: Se corrige el nombre propio a «Manoá» para español natural y consistente, se mejora el arranque narrativo con «Entonces», y se ajusta la nota a una formulación filológica más natural en español («elíptico»). Se conserva la ambigüedad deliberada del sujeto implícito y la terminología principal del borrador.
  reviewer_model: gpt-5.4
