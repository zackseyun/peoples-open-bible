translation:
  language: es
  text: Y acontecerá después que derramaré mi Espíritu[a] sobre toda carne[b]; y sus hijos y sus hijas profetizarán, sus hombres mayores soñarán sueños, sus hombres jóvenes verán visiones.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Mi Espíritu» también podría traducirse «mi espíritu», pero el contexto de empoderamiento profético favorece la referencia al Espíritu divino.
    reason: alternative_reading
  - marker: b
    text: O «sobre toda humanidad» / «sobre todas las personas»; el hebreo dice «sobre toda carne».
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהָיָה
  english_pob_choice: And it will happen
  chosen_spanish: Y acontecerá
  alternatives_spanish:
  - Y sucederá
  - Y será
  lexicon: HALOT
  rationale: La fórmula hebrea introduce un evento futuro de modo idiomático. «Acontecerá» conserva el tono formulístico y es natural en español bíblico sin volverse arcaizante.
- source_word: אַחֲרֵי כֵן
  english_pob_choice: afterward
  chosen_spanish: después de eso
  alternatives_spanish:
  - después
  - luego
  - más adelante
  lexicon: HALOT
  rationale: La expresión marca secuencia temporal. «Después de eso» es clara y mantiene la referencia anafórica del hebreo sin añadir contenido.
- source_word: אֶשְׁפּוֹךְ
  english_pob_choice: I will pour out
  chosen_spanish: derramaré
  alternatives_spanish:
  - verteré
  - derramaré por completo
  lexicon: HALOT
  rationale: El verbo conserva la metáfora concreta de un derramamiento. En español, «derramaré» comunica bien la imagen y la acción divina de impartir el Espíritu.
- source_word: רוּחִי
  english_pob_choice: my Spirit
  chosen_spanish: mi Espíritu
  alternatives_spanish:
  - mi espíritu
  lexicon: HALOT
  rationale: El contexto de profecía, sueños y visiones señala al Espíritu divino. Se mantiene la mayúscula por convención editorial en español para distinguirlo del sentido de «espíritu» humano.
- source_word: עַל כָּל בָּשָׂר
  english_pob_choice: on all flesh
  chosen_spanish: sobre toda carne
  alternatives_spanish:
  - sobre toda humanidad
  - sobre todas las personas
  lexicon: HALOT
  rationale: Se preserva la imagen hebrea de בָּשָׂר como «carne», manteniendo su amplitud semántica y la tensión entre literalidad y universalidad sin diluirla en una paráfrasis.
- source_word: וְנִבְּאוּ
  english_pob_choice: will prophesy
  chosen_spanish: profetizarán
  alternatives_spanish:
  - hablarán proféticamente
  - pronunciarán profecías
  lexicon: HALOT
  rationale: El verbo denota el ejercicio profético. «Profetizarán» es directo y fiel al valor verbal sin necesidad de circunloquio.
- source_word: בְּנֵיכֶם וּבְנוֹתֵיכֶם
  english_pob_choice: your sons and your daughters
  chosen_spanish: sus hijos y sus hijas
  alternatives_spanish:
  - vuestros hijos y vuestras hijas
  - sus descendientes
  lexicon: HALOT
  rationale: Se conservan ambos términos de género como en el hebreo. En este contexto, el destinatario se entiende por el discurso; «sus» mantiene fluidez en español bíblico contemporáneo.
- source_word: זִקְנֵיכֶם
  english_pob_choice: your old men
  chosen_spanish: sus ancianos
  alternatives_spanish:
  - sus hombres mayores
  - sus viejos
  lexicon: HALOT
  rationale: Aunque el paralelo con «sus jóvenes» apunta a edad, «ancianos» es el equivalente español más natural y digno. No se elige «elders» como cargo porque aquí la oposición etaria es primaria.
- source_word: חֲלֹמוֹת יַחֲלֹמוּן
  english_pob_choice: will dream dreams
  chosen_spanish: soñarán sueños
  alternatives_spanish:
  - tendrán sueños
  - soñarán
  lexicon: HALOT
  rationale: Se conserva el paralelismo intensivo del hebreo con el cognado. «Soñarán sueños» es suficientemente literal en español y retiene el énfasis formal del original.
- source_word: בַּחוּרֵיכֶם
  english_pob_choice: your young men
  chosen_spanish: sus jóvenes
  alternatives_spanish:
  - sus muchachos
  - sus varones jóvenes
  lexicon: HALOT
  rationale: El término contrasta con «sus ancianos» y se refiere a varones jóvenes. «Jóvenes» es la forma más natural en español y no añade restricción innecesaria.
- source_word: חֶזְיֹנוֹת יִרְאוּ
  english_pob_choice: will see visions
  chosen_spanish: verán visiones
  alternatives_spanish:
  - contemplarán visiones
  - tendrán visiones
  lexicon: HALOT
  rationale: Se preserva la expresión profética estándar. «Verán visiones» mantiene la forma verbal del hebreo y la simetría con «soñarán sueños».
theological_decisions:
- issue: רוּחִי como Espíritu divino o espíritu humano
  english_pob_reading: my Spirit
  chosen_spanish_reading: mi Espíritu
  alternative_spanish_readings:
  - mi espíritu
  rationale: El flujo del versículo describe una efusión divina que produce profecía, sueños y visiones; por eso el referente es el Espíritu de Dios. La mayúscula ayuda a evitar una lectura de mera disposición interior.
  doctrine_reference: Translation philosophy §3
- issue: כָּל בָּשָׂר y su alcance
  english_pob_reading: all flesh
  chosen_spanish_reading: toda carne
  alternative_spanish_readings:
  - toda la humanidad
  - todas las personas
  rationale: Se conserva la amplitud y la tensión del hebreo sin resolver de antemano si el énfasis es universalidad absoluta o toda clase de personas. «Toda carne» deja visible la metáfora original.
  doctrine_reference: Translation philosophy §3
- issue: Predicación profética para hijos, hijas, ancianos y jóvenes
  english_pob_reading: your sons and your daughters... your old men... your young men
  chosen_spanish_reading: sus hijos y sus hijas... sus ancianos... sus jóvenes
  alternative_spanish_readings:
  - sus hijos e hijas... sus mayores... sus muchachos
  rationale: El texto distribuye el don profético en ambos sexos y en distintas edades. La traducción conserva esa inclusión explícita sin neutralizar ni ampliar indebidamente el alcance social del pasaje.
  doctrine_reference: Joel 3:1; Translation philosophy §3
translation_notes:
  revision_awareness: Se revisó el texto inglés auditado y se mantuvo su lectura principal, incluyendo la distinción de «my Spirit» y la preservación de «all flesh». No hubo cambios posteriores en la revisión inglesa, por lo que la propuesta española sigue de cerca las decisiones aprobadas y solo adapta la formulación a un español natural y publicable.
  spanish_consistency_notes:
  - Se usa «Espíritu» con mayúscula para el referente divino, coherente con la decisión exegética del contexto.
  - Se preserva la metáfora de «toda carne» para mantener la amplitud semántica del hebreo.
  - Se mantiene el paralelismo poético entre «soñarán sueños» y «verán visiones».
  - La construcción con «sus» en la serie final es idiomática en español y no altera el valor posesivo del hebreo en este contexto.
