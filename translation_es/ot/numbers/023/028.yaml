revisions:
- from: Entonces Balac llevó a Balaam a la cima de Peor[a], que domina la llanura del Jesimón.
  to: Entonces Balac llevó a Balaam a la cima de Peor[a], que da hacia el Jesimón.
  rationale: Se revisa la cláusula final para eliminar «la llanura», que no está en el hebreo, y para representar de manera más fiel y natural la combinación de הַנִּשְׁקָף עַל פְּנֵי con «que da hacia el Jesimón». Se conserva la ambigüedad de הַיְשִׁימֹן en nota, en línea con la POB inglesa.
