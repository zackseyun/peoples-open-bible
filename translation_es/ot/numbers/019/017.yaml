revisions:
- from: Y para el impuro tomarán polvo[a] del quemado[b] de la ofrenda de purificación[c], y echará sobre él[d] agua viva[e] en un recipiente.
  to: Y para el impuro tomarán polvo[a] de la quema de la ofrenda de purificación[b], y pondrá sobre él[c] agua viva[d] en un recipiente.
  rationale: Se corrige 'del quemado' a 'de la quema' para reflejar con más fidelidad y naturalidad el sustantivo hebreo שׂרפת. También se ajusta 'echará' a 'pondrá' para seguir mejor el valor de וְנָתַן en este registro legal-ritual. Las notas se simplifican y se reordenan para que correspondan exactamente a los anclajes y a las decisiones léxicas principales.
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T23:32:31Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura básica del hebreo: plural inicial ''tomarán'' para לָקְחוּ, singular posterior para וְנָתַן, ''polvo'' para עפר, ''agua viva'' para מַיִם חַיִּים, y mantiene correctamente la función ritual de חטאת como ''ofrenda de purificación''. También preserva las alternativas importantes en notas. Sin embargo, ''del quemado'' no representa bien שׂרפת como sustantivo de proceso (''la quema'' / ''la combustión'') y suena poco natural; además, la secuencia ''polvo ... del quemado de la ofrenda'' es torpe en español.'
  spanish_quality_summary: 'La legibilidad general es aceptable, pero el texto principal contiene una formulación poco idiomática: ''del quemado'' suena forzada y casi coloquial, no digna ni clara. ''Echará sobre él agua viva'' es posible, pero ''pondrá ... sobre él'' o ''echará ... sobre él'' ambos sirven; aquí conviene priorizar estabilidad formal con ''pondrá''. También mejora la naturalidad decir ''polvo de la quema de la ofrenda de purificación''.'
  glossary_alignment: 'Buena alineación con la terminología del proyecto: no hay términos de alto riesgo mal resueltos. ''Ofrenda de purificación'' concuerda con la decisión teológica documentada; ''agua viva'' conserva la literalidad aprobada; ''impuro'' es una opción válida y más natural que ''inmundo''. La principal desviación es estilística/lexical en שׂרפת -> ''quemado'', que no sigue bien la racionalidad documentada de ''the burning''.'
  issues:
  - severity: medium
    issue: '''del quemado'' para שׂרפת'
    rationale: El hebreo designa el acto/proceso de quemar ('burning'), no un participio sustantivado extraño. En español bíblico claro, 'de la quema' representa mejor el constructo y evita una expresión poco natural.
  - severity: low
    issue: Nota b no corresponde exactamente al problema léxico principal
    rationale: La alternativa tradicional relevante es principalmente 'ofrenda por el pecado'; 'del quemado de la ofrenda por el pecado' mezcla dos decisiones. Si se corrige el texto a 'quema', la nota debe ajustarse para no presentar 'quemado' como si fuera la alternativa principal.
  - severity: low
    issue: '''echará'' es posible, pero ''pondrá'' refleja mejor וְנָתַן en registro formal'
    rationale: No es un error de sentido, pero 'poner' sigue más de cerca la elección auditada y suena más estable en una ley ritual.
  revised_spanish_text: Y para el impuro tomarán polvo[a] de la quema de la ofrenda de purificación[b], y pondrá sobre él[c] agua viva[d] en un recipiente.
  revised_footnotes:
  - marker: a
    text: Lit., “polvo”; el hebreo usa עפר, no el término habitual para “cenizas”.
    reason: lexical_alternative
  - marker: b
    text: O, más tradicionalmente, “de la quema de la ofrenda por el pecado”. En este contexto, חטאת puede referirse funcionalmente a una ofrenda de purificación.
    reason: theological_note
  - marker: c
    text: El pronombre hebreo es singular masculino y probablemente remite al polvo tomado previamente.
    reason: source_note
  - marker: d
    text: Lit., “agua viva”; es decir, agua fresca o que fluye.
    reason: lexical_alternative
