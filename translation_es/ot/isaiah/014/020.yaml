revisions:
- from: No serás unido[a] con ellos en sepultura, porque destruiste tu tierra; has matado a tu pueblo. La descendencia de los malhechores nunca será nombrada.
  to: No te unirás con ellos en el entierro, porque destruiste tu tierra; has matado a tu pueblo. La descendencia[a] de los malhechores nunca será nombrada.
  rationale: Se reemplazó "No serás unido[a] con ellos en sepultura" por "No te unirás con ellos en el entierro" para lograr un español más natural y alinear mejor קְבוּרָה con la decisión auditada "burial". Se eliminó la nota sobre יחד, ya que la redacción revisada ya expresa bien ese sentido sin necesidad de aclaración. Se añadió en cambio la nota léxica requerida para זֶרַע מְרֵעִים, preservando las alternativas importantes del POB auditado.
