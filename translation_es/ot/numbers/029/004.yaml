    rationale: 'El hebreo usa לְ en ambas frases; en español, mantener «por» en ambas partes da una frase más fluida y coherente: «por cada cordero, por los siete corderos».'
  revised_spanish_text: y un décimo[a] por cada cordero, por los siete corderos.
