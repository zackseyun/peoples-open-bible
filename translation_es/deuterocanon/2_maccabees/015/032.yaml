translation:
  language: es
  text: Y después de mostrar la cabeza del impío[a] Nicánor y la mano de ese blasfemo[b], que había extendido contra la santa casa del Todopoderoso y se había jactado sobremanera,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «del contaminado Nicánor». El adjetivo griego es un término fuerte de reproche religioso y moral; «impío» busca expresar esa fuerza de manera idiomática en español.
    reason: lexical_alternative
  - marker: b
    text: O «de ese ultrajador». El término griego puede denotar habla injuriosa o difamatoria en general; «blasfemo» se elige aquí porque el contexto trata de impiedad contra el templo.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐπιδειξάμενος
  english_pob_choice: after displaying
  chosen_spanish: y después de mostrar
  alternatives_spanish:
  - y habiendo mostrado
  - y al mostrar públicamente
  lexicon: BDAG
  rationale: El participio aoristo tiene valor secuencial en la narración; en español, 'después de mostrar' reproduce bien la sucesión de acciones sin sonar forzado.
- source_word: μιεροῦ
  english_pob_choice: accursed
  chosen_spanish: impío
  alternatives_spanish:
  - maldito
  - contaminado
  - profano
  lexicon: LSJ
  rationale: El adjetivo es fuertemente peyorativo y religioso. En español, 'impío' comunica la censura moral y sacra con naturalidad; 'maldito' sería más intenso pero podría sonar interpretativamente más cerrado.
- source_word: δυσφήμου
  english_pob_choice: blasphemer
  chosen_spanish: blasfemo
  alternatives_spanish:
  - ultrajador
  - maldiciente
  - difamador
  lexicon: LSJ
  rationale: El término puede aludir a habla injuriosa o irreverente; aquí, por el contexto de insolencia contra el templo, 'blasfemo' preserva la fuerza religiosa que destacó la POB en inglés.
- source_word: ἐκτείνας
  english_pob_choice: had stretched out
  chosen_spanish: había extendido
  alternatives_spanish:
  - había alargado
  - había tendido
  lexicon: BDAG
  rationale: El pluscuamperfecto español aclara que la acción de extender la mano precedió al acto de mostrarla, manteniendo la relación temporal del inglés auditado.
- source_word: ἐπὶ τὸν ἅγιον τοῦ παντοκράτορος οἶκον
  english_pob_choice: against the holy house of the Almighty
  chosen_spanish: contra la santa casa del Todopoderoso
  alternatives_spanish:
  - contra la casa santa del Todopoderoso
  - contra el santo templo del Todopoderoso
  lexicon: LSJ
  rationale: ἐπί con acusativo se entiende adversativamente por el contexto hostil; 'casa' mantiene el lenguaje del templo. 'Todopoderoso' traduce παντοκράτορος como título divino reverente, siguiendo el criterio del POB en inglés.
- source_word: ἐμεγαλαύχησεν
  english_pob_choice: boasted greatly
  chosen_spanish: se jactó sobremanera
  alternatives_spanish:
  - se jactó mucho
  - se vanaglorió sobremanera
  lexicon: LSJ
  rationale: El verbo expresa alarde arrogante; 'se jactó sobremanera' conserva el matiz de vanagloria sin perder naturalidad en español.
theological_decisions:
- issue: Tratamiento del título divino παντοκράτωρ
  english_pob_reading: the Almighty
  chosen_spanish_reading: el Todopoderoso
  alternative_spanish_readings:
  - el Omnipotente
  - el All-Ruler
  rationale: Se traduce el título divino en lugar de transliterarlo. 'Todopoderoso' es la equivalencia española más estable y comprensible para παντοκράτωρ, coherente con el uso reverente del texto.
  doctrine_reference: 'DOCTRINE.md: Translate titles; transliterate names.'
- issue: Valor religioso-moral de μιεροῦ y δυσφήμου
  english_pob_reading: accursed ... blasphemer
  chosen_spanish_reading: impío ... blasfemo
  alternative_spanish_readings:
  - maldito ... ultrajador
  - profano ... injuriador
  rationale: 'La POB en inglés distingue dos matices: reproche religioso fuerte y ofensa contra lo sagrado. En español, ''impío'' y ''blasfemo'' preservan esa tensión sin neutralizarla ni sobrecargarla con un tecnicismo.'
  doctrine_reference: LSJ / contexto de profanación del templo
translation_notes:
  revision_awareness: 'El pasaje presenta alta concordancia entre el texto griego y la traducción auditada en inglés. Se conservaron las decisiones léxicas principales del POB: secuencia narrativa del participio, reproche fuerte para μιεροῦ, valor religioso de δυσφήμου, sentido adversativo de ἐπὶ con acusativo, y el título divino παντοκράτωρ como traducción reverente. No se requirieron correcciones sustantivas respecto del último pase de revisión.'
  spanish_consistency_notes:
  - Se usa 'Todopoderoso' para παντοκράτωρ conforme al criterio POB de traducir títulos divinos.
  - Se conserva 'casa' y no 'templo' para mantener la imagen del original, aunque el referente es el templo.
  - '''Impío'' y ''blasfemo'' se emplean con carga religiosa fuerte; no se suavizan a términos puramente morales o civiles.'
  - La puntuación y el orden de la oración siguen la progresión narrativa del griego y del inglés auditado.
