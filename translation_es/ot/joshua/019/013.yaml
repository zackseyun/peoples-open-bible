translation:
  language: es
  text: Desde allí pasó al oriente[a], hacia el nacimiento del sol, a Gat-hefer, a Ét-kazin[b], y salió a Rimón[c], que se extiende hasta Nea.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «al este». El hebreo usa dos expresiones direccionales, literalmente «hacia el oriente, hacia el naciente», probablemente para intensificar la indicación.'
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: «Ét-kazin»; algunos entienden la forma como «Itá-kazin».'
    reason: alternative_reading
  - marker: c
    text: 'El hebreo de esta cláusula es difícil: «Rimón, el marcado, hasta Nea» o algo semejante. Muchos entienden que el límite se extendía de Rimón a Nea.'
    reason: alternative_reading
lexical_decisions:
- source_word: וּמִשָּׁם
  english_pob_choice: From there
  chosen_spanish: Desde allí
  alternatives_spanish:
  - Y desde allí
  - Desde ese lugar
  lexicon: HALOT
  rationale: La expresión hebrea marca continuación espacial en una lista de límites. «Desde allí» conserva la secuencia sin añadir énfasis innecesario al conector.
- source_word: עָבַר
  english_pob_choice: it passed
  chosen_spanish: pasó
  alternatives_spanish:
  - cruzó
  - siguió
  lexicon: HALOT
  rationale: En fórmulas de fronteras, עבר describe el trazado de la línea. «Pasó» es natural en español y refleja el movimiento del límite.
- source_word: קֵדְמָה מִזְרָחָה
  english_pob_choice: eastward, toward the sunrise
  chosen_spanish: al oriente, hacia el nacimiento del sol
  alternatives_spanish:
  - hacia el oriente
  - al este, hacia el amanecer
  lexicon: HALOT
  rationale: Se conservan las dos direcciones hebreas como en el inglés auditado. «Al oriente» y «hacia el nacimiento del sol» reproducen la duplicación enfática sin reducirla a una sola noción.
- source_word: גִּתָּה חֵפֶר
  english_pob_choice: Gath-hepher
  chosen_spanish: Gat-hefer
  alternatives_spanish:
  - Gat-Hefer
  - Gath-hefer
  lexicon: HALOT
  rationale: Se mantiene el topónimo con transliteración estándar en español bíblico, usando «Gat» para adaptar la forma de manera legible.
- source_word: עִתָּה קָצִין
  english_pob_choice: Eth-kazin
  chosen_spanish: Ét-kazin
  alternatives_spanish:
  - Itta-kazin
  - Eth-kazin
  lexicon: HALOT
  rationale: El texto masorético puede leerse como un solo nombre propio. «Ét-kazin» sigue la decisión inglesa y se adapta a la acentuación española.
- source_word: וְיָצָא
  english_pob_choice: and went out
  chosen_spanish: y salió
  alternatives_spanish:
  - y se extendió
  - y llegó
  lexicon: HALOT
  rationale: En descripciones de límites, יצא indica que la línea sale o continúa hacia otro punto. «Salió» conserva la imagen espacial de forma concisa.
- source_word: רִמּוֹן
  english_pob_choice: Rimmon
  chosen_spanish: Rimón
  alternatives_spanish:
  - Rimmon
  lexicon: HALOT
  rationale: Se translitera el topónimo al uso español, con acento gráfico para reflejar la pronunciación natural del nombre.
- source_word: הַמְּתֹאָר
  english_pob_choice: which extends
  chosen_spanish: que se extiende
  alternatives_spanish:
  - que está marcado
  - que se describe
  lexicon: HALOT
  rationale: La forma participial es difícil. Siguiendo el criterio inglés de entenderla en sentido de límite, «que se extiende» expresa bien la continuación territorial sin forzar una lectura demasiado interpretativa.
- source_word: הַנֵּעָה
  english_pob_choice: Neah
  chosen_spanish: Nea
  alternatives_spanish:
  - Neah
  lexicon: HALOT
  rationale: Topónimo final adaptado al español con una forma breve y legible, manteniendo la identificación geográfica.
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión inglesa más reciente, que prefirió «extends» sobre «stretches» para un registro ligeramente más formal; por eso se tradujo con «se extiende». También se respetó la lectura de doble dirección en el inicio y la dificultad textual de la cláusula final.
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando el hebreo presenta el nombre divino; aquí no aparece.
  - Se mantuvo la lógica de lista de fronteras con verbos de movimiento simples, sin expandir el texto.
  - Los topónimos se conservaron como nombres propios transliterados, con adaptación gráfica al español cuando ayuda a la lectura.
