lexical_decisions:
- source_word: וַיְהִי
  english_pob_choice: Now ... came
  chosen_spanish: Ahora ... vino
  alternatives_spanish:
  - Y sucedió que ... vino
  - Entonces ... vino
  - Ahora ... llegó
  lexicon: HALOT
  rationale: La forma narrativa con waw consecutivo introduce el desarrollo del relato. En español, «Ahora» cumple la función discursiva de transición sin la rigidez de una calca; «vino» reproduce el movimiento de llegada de la palabra con naturalidad y fidelidad.
- source_word: דְבַר
  english_pob_choice: the word
  chosen_spanish: la palabra
  alternatives_spanish:
  - el mensaje
  - una palabra
  lexicon: HALOT
  rationale: En la fórmula profética דְבַר יְהוָה, «la palabra» conserva la correspondencia formal con el hebreo y mantiene el enlace textual con la revelación profética. «Mensaje» sería posible, pero diluye el eco bíblico de la expresión fija.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  - el SEÑOR
  lexicon: HALOT
  rationale: El nombre divino יְהוָה se vierte como «Yahvé» conforme al criterio del proyecto para preservar el nombre propio del pacto. No se usa la sustitución tradicional «el SEÑOR», porque el texto fuente contiene explícitamente el Tetragrámaton.
- source_word: אֵלַי
  english_pob_choice: to me
  chosen_spanish: a mí
  alternatives_spanish:
  - hacia mí
  - para mí
  lexicon: HALOT
  rationale: La preposición אֶל con sufijo de primera persona singular se expresa de manera directa y natural en español como «a mí». La forma tónica con pronombre refuerza el destinatario del habla divina.
- source_word: לֵאמֹר
  english_pob_choice: saying
  chosen_spanish: diciendo
  alternatives_spanish:
  - y dijo
  - en estos términos
  lexicon: HALOT
  rationale: El infinitivo constructo לֵאמֹר introduce discurso directo. «Diciendo» conserva la fórmula hebrea sin añadir contenido interpretativo y prepara de forma transparente la cita que sigue.
theological_decisions:
- issue: Renderizado del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - el SEÑOR
  rationale: La fuente hebrea usa el Tetragrámaton. En la tradición del POB en español, «Yahvé» preserva el nombre propio de Dios y evita sustituirlo por un título. La decisión sigue el valor confesional y textual del nombre revelado, no una paráfrasis reverencial.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
translation_notes:
  revision_awareness: 'El contexto inglés del POB no requiere revisiones textuales aquí: hay alto acuerdo entre los controles y no se documentan cambios posteriores. La presente versión española sigue ese perfil estable, manteniendo la fórmula profética y el nombre divino sin suavizarlos.'
  spanish_consistency_notes:
  - 'Se mantiene el orden y la economía de la fórmula hebrea: sujeto implícito, movimiento verbal y complemento preposicional.'
  - «Yahvé» se usa de manera consistente con la política del proyecto para יהוה, sin sustituirlo por una mayúscula reverencial.
  - «Diciendo» conserva la apertura de discurso directo sin convertirla en una paráfrasis explicativa.
  - La puntuación con dos puntos prepara la cita siguiente y corresponde al valor introductorio de לֵאמֹר.
