translation:
  language: es
  text: Y que estas palabras mías, con las cuales he suplicado delante de Yahvé, estén cerca[a] de Yahvé nuestro Dios día y noche, para que sostenga la causa[b] de su siervo y la causa de su pueblo Israel, según lo que cada día requiera[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «estén próximas a Yahvé nuestro Dios». El hebreo expresa que estas palabras de oración permanezcan cerca de Dios continuamente.
    reason: lexical_alternative
  - marker: b
    text: O «haga justicia por» / «haga valer el derecho de». El hebreo usa un modismo jurídico que se refiere a sostener la causa o el derecho de alguien.
    reason: lexical_alternative
  - marker: c
    text: 'Hebreo: «la palabra de un día en su día», es decir, lo que cada día requiere.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְיִהְיוּ
  english_pob_choice: And may ... be
  chosen_spanish: Y que ... estén
  alternatives_spanish:
  - Y que ... sean
  - Y estén
  lexicon: HALOT
  rationale: El hebreo expresa un deseo o petición, no una mera futura. En español, «Y que ... estén» conserva el matiz optativo de la oración de Salomón con registro natural y digno.
- source_word: דְבָרַי אֵלֶּה
  english_pob_choice: these words of mine
  chosen_spanish: estas palabras mías
  alternatives_spanish:
  - estas mis palabras
  - estas palabras de mí
  lexicon: HALOT
  rationale: La construcción posesiva se vuelve más natural en español como «estas palabras mías», manteniendo el énfasis en que son las propias palabras de Salomón.
- source_word: אֲשֶׁר הִתְחַנַּנְתִּי
  english_pob_choice: with which I have pleaded
  chosen_spanish: con las cuales he suplicado
  alternatives_spanish:
  - con las cuales he implorado
  - con las cuales he rogado
  lexicon: HALOT
  rationale: El hitpael de חנן comunica súplica intensa. «Suplicado» preserva mejor esa intensidad que un «orar» más general.
- source_word: לִפְנֵי יְהוָה
  english_pob_choice: before Yahweh
  chosen_spanish: delante de Yahvé
  alternatives_spanish:
  - en presencia de Yahvé
  - ante Yahvé
  lexicon: HALOT
  rationale: «Delante de Yahvé» reproduce bien el idiomático «before Yahweh» en un registro bíblico claro. Se usa Yahvé según la pauta del proyecto para el Tetragrámaton.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  - el SEÑOR
  lexicon: HALOT
  rationale: Se mantiene el nombre divino con la forma del proyecto «Yahvé», evitando la sustitución por un título. Esto preserva el valor propio del nombre revelado.
- source_word: קְרֹבִים אֶל יְהוָה אֱלֹהֵינוּ
  english_pob_choice: be near Yahweh our God
  chosen_spanish: estén cerca de Yahvé nuestro Dios
  alternatives_spanish:
  - estén próximos a Yahvé nuestro Dios
  - permanezcan cerca de Yahvé nuestro Dios
  lexicon: HALOT
  rationale: «Cerca de» expresa con naturalidad la cercanía solicitada para estas palabras de súplica. «Estén cerca» conserva el matiz relacional y continuo del hebreo.
- source_word: יוֹמָם וָלָיְלָה
  english_pob_choice: day and night
  chosen_spanish: día y noche
  alternatives_spanish:
  - de día y de noche
  - continuamente
  lexicon: HALOT
  rationale: La expresión idiomática se vierte de forma directa y natural. «Día y noche» mantiene la idea de continuidad sin expandir el sentido.
- source_word: לַעֲשׂוֹת מִשְׁפַּט
  english_pob_choice: that he may uphold the cause
  chosen_spanish: para que haga justicia
  alternatives_spanish:
  - para que haga valer el derecho
  - para que defienda la causa
  lexicon: HALOT
  rationale: 'El hebreo משפט aquí tiene sentido jurídico: actuar para que se haga justicia o se sostenga la causa. «Haga justicia» es más conciso en español y conserva el trasfondo legal.'
- source_word: עַבְדּוֹ
  english_pob_choice: his servant
  chosen_spanish: a su siervo
  alternatives_spanish:
  - a su esclavo
  - a su servidor
  lexicon: HALOT
  rationale: Aunque el sustantivo puede tener fuerza de esclavitud, en esta oración real dirigida a Dios el uso establecido y contextual es «siervo». Mantiene la relación de servicio sin oscurecer el tono devocional.
- source_word: וּמִשְׁפַּט עַמּוֹ יִשְׂרָאֵל
  english_pob_choice: and the cause of his people Israel
  chosen_spanish: y a su pueblo Israel
  alternatives_spanish:
  - y la causa de su pueblo Israel
  - y al pueblo Israel
  lexicon: HALOT
  rationale: El paralelismo con la primera cláusula sugiere repetir la idea de justicia/caso, pero en español la doble mención de «justicia» sería pesada. «Y a su pueblo Israel» fluye mejor, aunque la nota explica que el sentido jurídico permanece implícito en el verbo.
- source_word: דְּבַר יוֹם בְּיוֹמוֹ
  english_pob_choice: as each day requires
  chosen_spanish: según lo que cada día requiera
  alternatives_spanish:
  - como cada día requiera
  - según la necesidad de cada día
  lexicon: HALOT
  rationale: La expresión hebrea significa lo que corresponde o se necesita para cada día. «Según lo que cada día requiera» conserva el valor distributivo sin caer en una versión demasiado literal.
theological_decisions:
- issue: Nombre divino יהוה / YHWH
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Jehová
  - el SEÑOR
  rationale: 'Se sigue la norma del proyecto para el Tetragrámaton: usar el nombre propio divino en lugar de sustituirlo por un título. «Yahvé» mantiene la continuidad con la política textual auditada y evita la máscara litúrgica.'
  doctrine_reference: 'DOCTRINE.md Contested terms: יהוה YHWH'
- issue: ידבר משפט / משפט in the legal-cause idiom
  english_pob_reading: uphold the cause
  chosen_spanish_reading: haga justicia
  alternative_spanish_readings:
  - haga valer el derecho
  - defienda la causa
  rationale: El verbo + sustantivo forman un modismo jurídico que no se agota en «juicio» o «sentencia». «Haga justicia» comunica la acción de hacer valer el derecho y preservar la causa, sin borrar el trasfondo legal.
  doctrine_reference: 'HALOT: משפט as legal/cause idiom in royal-prayer context'
- issue: עבדו in address to God
  english_pob_reading: his servant
  chosen_spanish_reading: su siervo
  alternative_spanish_readings:
  - su esclavo
  - su servidor
  rationale: En la oración de Salomón ante Yahvé, la relación de servicio reverente es la lectura contextual más clara en español. No se adopta «esclavo» porque aquí no parece ser el foco semántico principal.
  doctrine_reference: 'HALOT: עבד in courtly/devotional register'
translation_notes:
  revision_awareness: 'La redacción toma en cuenta la revisión más reciente del audit trail inglés: se mantuvo la estructura con «para que» y el registro formal, pero se ajustó al español natural. También se preservó la equivalencia funcional de los modismos legales y del nombre divino según la política del proyecto.'
  spanish_consistency_notes:
  - Se usa «Yahvé» de manera consistente para יְהוָה.
  - «Siervo» se conserva en el registro reverente de la oración real, coherente con el uso auditado en inglés.
  - El modismo משפט se trata como causa/derecho/justicia, no como mera sentencia judicial.
  - La nota c preserva el matiz distributivo de «cada día» sin convertirlo en una paráfrasis libre.
