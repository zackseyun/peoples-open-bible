translation:
  language: es
  text: Dios mira desde el cielo a los hijos del hombre[a], para ver si hay alguien que tenga entendimiento, que busque a Dios.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «la humanidad». La expresión hebrea «los hijos del hombre» es un giro colectivo para los seres humanos.
    reason: lexical_alternative
lexical_decisions:
- source_word: אֱלֹהִים
  english_pob_choice: God
  chosen_spanish: Dios
  alternatives_spanish:
  - el Dios
  - Deidad
  lexicon: HALOT
  rationale: El hebreo usa el plural morfológico para el único Dios de Israel; en español, el equivalente natural y fiel es "Dios".
- source_word: מִשָּׁמַיִם
  english_pob_choice: from heaven
  chosen_spanish: desde el cielo
  alternatives_spanish:
  - desde los cielos
  - desde el cielo alto
  lexicon: HALOT
  rationale: '"Cielo" comunica de modo natural el valor idiomático del plural hebreo sin perder la imagen de altura y procedencia.'
- source_word: הִשְׁקִיף
  english_pob_choice: looks down
  chosen_spanish: mira
  alternatives_spanish:
  - mira hacia abajo
  - contempla desde arriba
  lexicon: HALOT
  rationale: El verbo hebreo expresa mirar desde arriba hacia abajo; "mira desde el cielo" conserva la imagen sin forzar una duplicación poco natural en español.
- source_word: עַל
  english_pob_choice: 'on'
  chosen_spanish: sobre
  alternatives_spanish:
  - contra
  - hacia
  lexicon: HALOT
  rationale: '"Sobre" reproduce la dirección de la mirada divina hacia la humanidad sin introducir matiz hostil.'
- source_word: בְּנֵי אָדָם
  english_pob_choice: the children of man
  chosen_spanish: los hijos de Adán
  alternatives_spanish:
  - la humanidad
  - los seres humanos
  - los hijos del hombre
  lexicon: HALOT
  rationale: Mantengo el giro colectivo y su forma semítica. "Hijos de Adán" conserva mejor la literalidad y el eco antropológico que una abstracción como "humanidad"; además evita sustituir la expresión documentada por una neutralización interpretativa.
- source_word: לִרְאוֹת
  english_pob_choice: to see
  chosen_spanish: para ver
  alternatives_spanish:
  - para observar
  - para mirar
  lexicon: HALOT
  rationale: La finalidad es directa; "para ver" es la equivalencia más natural y transparente.
- source_word: הֲיֵשׁ
  english_pob_choice: whether there is anyone
  chosen_spanish: si hay alguien
  alternatives_spanish:
  - si existe alguien
  - si hubiera alguien
  lexicon: HALOT
  rationale: La construcción interrogativa-existencial en español se expresa con claridad mediante "si hay alguien".
- source_word: מַשְׂכִּיל
  english_pob_choice: who has understanding
  chosen_spanish: con entendimiento
  alternatives_spanish:
  - prudente
  - sabio
  - que tiene entendimiento
  lexicon: HALOT
  rationale: Opto por una formulación nominal breve que conserve el valor de discernimiento/insight del participio sin sobrecargar la frase con una relativa innecesaria.
- source_word: דֹּרֵשׁ
  english_pob_choice: who seeks
  chosen_spanish: que busque
  alternatives_spanish:
  - que busca
  - que procura
  lexicon: HALOT
  rationale: Aquí el sentido es disposicional. En español, el subjuntivo en la subordinada interrogativa reproduce bien la idea de búsqueda buscada por Dios.
- source_word: אֶת אֱלֹהִים
  english_pob_choice: God
  chosen_spanish: a Dios
  alternatives_spanish:
  - de Dios
  - a Yahvé
  lexicon: HALOT
  rationale: El objeto directo en español requiere la preposición personal; mantengo "Dios" porque el hebreo no introduce aquí el nombre divino, solo el objeto de la búsqueda.
theological_decisions:
- issue: Expresión colectiva bְּנֵי אָדָם y posible neutralización inclusiva
  english_pob_reading: the children of man
  chosen_spanish_reading: los hijos de Adán
  alternative_spanish_readings:
  - la humanidad
  - los seres humanos
  - los hijos del hombre
  rationale: Sigo la decisión inglesa de conservar la forma masculina/genericidad del hebreo y evitar una abstracción que borre el giro semítico. "Hijos de Adán" mantiene la tensión entre literalidad e idiomatismo sin imponer una paráfrasis más neutra.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4; Contested terms table for אָדָם
- issue: Presencia implícita del nombre divino en מִשָּׁמַיִם y הִשְׁקִיף
  english_pob_reading: God looks down from heaven
  chosen_spanish_reading: Dios mira desde el cielo
  alternative_spanish_readings:
  - Dios mira desde los cielos
  - Yahvé mira desde el cielo
  rationale: El hebreo del versículo no usa יהוה, sino אֱלֹהִים; por eso no introduzco "Yahvé". La imagen de inspección divina queda preservada con "mira desde el cielo".
  doctrine_reference: DOCTRINE.md §Nomenclature for divine names
translation_notes:
  revision_awareness: La revisión inglesa más reciente quedó sin cambios y con acuerdo alto; por ello no se incorporan variantes textuales adicionales ni ajustes por revisión. La draft española sigue de cerca esa lectura estable, preservando la imaginería y la amplitud colectiva del hebreo.
  spanish_consistency_notes:
  - Se mantiene "Dios" para אֱלֹהִים, en línea con la convención del proyecto.
  - Se conserva el valor colectivo de בְּנֵי אָדָם con una forma semítica en español, sin reemplazarla por una abstracción.
  - '"Desde el cielo" reproduce el hebreo idiomático de manera natural en español.'
  - La subordinada final "para ver si hay alguien..." refleja la finalidad y la duda existencial del original.
