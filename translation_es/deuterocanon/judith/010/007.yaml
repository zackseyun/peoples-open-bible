translation:
  language: es
  text: Pero cuando la vieron, y su rostro había cambiado y su vestido había sido alterado, se maravillaron muchísimo[a] de su belleza.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El griego dice literalmente que “se maravillaron de su belleza muy grandemente”, con una intensificación doble (ἐπὶ πολὺ σφόδρα).
    reason: lexical_alternative
lexical_decisions:
- source_word: ὡς δὲ εἶδον αὐτήν
  english_pob_choice: But when they saw her
  chosen_spanish: Pero cuando la vieron
  alternatives_spanish:
  - Y cuando la vieron
  - Ahora bien, cuando la vieron
  lexicon: LSJ
  rationale: ὡς con el aoristo introduce una cláusula temporal, y δέ aporta transición suave o contraste leve. 'Pero cuando' conserva ese matiz narrativo en español sin forzar una traducción más pesada.
- source_word: ἦν ἠλλοιωμένον τὸ πρόσωπον αὐτῆς
  english_pob_choice: her face had been changed
  chosen_spanish: su rostro había sido cambiado
  alternatives_spanish:
  - su rostro estaba cambiado
  - su apariencia había cambiado
  lexicon: LSJ
  rationale: ἠλλοιωμένον expresa alteración o cambio. 'Rostro' mantiene la referencia cercana a πρόσωπον, y la pasiva perifrástica 'había sido cambiado' sigue de cerca la construcción sin perder naturalidad.
- source_word: τὴν στολὴν μεταβεβληκυῖαν
  english_pob_choice: her clothing altered
  chosen_spanish: su vestidura alterada
  alternatives_spanish:
  - su ropa cambiada
  - su atuendo alterado
  lexicon: LSJ
  rationale: στολή puede significar vestido, prenda o vestidura; 'vestidura' conserva un registro digno y algo más preciso que 'ropa' para este contexto narrativo. 'Alterada' refleja μεταβεβληκυῖαν, la idea de cambio de estado o aspecto.
- source_word: ἐθαύμασαν
  english_pob_choice: they marveled
  chosen_spanish: se maravillaron
  alternatives_spanish:
  - se asombraron
  - quedaron admirados
  lexicon: LSJ
  rationale: El verbo expresa asombro admirativo. 'Se maravillaron' es natural en español y conserva la intensidad de la reacción.
- source_word: ἐπὶ τῷ κάλλει αὐτῆς
  english_pob_choice: at her beauty
  chosen_spanish: de su belleza
  alternatives_spanish:
  - por su belleza
  - ante su belleza
  lexicon: LSJ
  rationale: Con un verbo de admiración, el griego usa ἐπί con dativo. En español, 'de su belleza' comunica la causa o motivo del asombro de manera idiomática; también puede entenderse como admiración dirigida a ese rasgo.
- source_word: ἐπὶ πολὺ σφόδρα
  english_pob_choice: very greatly
  chosen_spanish: muchísimo
  alternatives_spanish:
  - muy grandemente
  - en extremo
  lexicon: LSJ
  rationale: La doble intensificación del griego pide un equivalente enfático. 'Muchísimo' transmite esa fuerza en español contemporáneo sin sonar redundante; el adverbio conserva la idea de intensidad muy alta.
translation_notes:
  revision_awareness: Se corrigió la validación anterior anclando la nota [a] en el texto principal junto a 'se maravillaron', donde corresponde la alternativa intensiva del griego. Se mantiene la lectura base del audit trail inglés, pero el español refleja explícitamente la doble intensificación con 'muchísimo'.
  spanish_consistency_notes:
  - Se preservó el registro narrativo sobrio y digno del relato de Judit.
  - Se evitó traducir mecánicamente desde el inglés cuando el español requería una estructura más natural, especialmente en la intensificación final.
  - Se mantuvo 'vestidura' en lugar de un término más coloquial para respetar el tono del pasaje.
