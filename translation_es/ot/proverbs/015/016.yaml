review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja correctamente la estructura comparativa del hebreo: ''Mejor es poco... que gran tesoro...''. Conserva bien ''el temor de Yahvé'' para בְּיִרְאַת יְהוָה y usa ''Yahvé'' conforme al proyecto. También mantiene la relación entre la riqueza abundante y el desorden que la acompaña. Sin embargo, la nota al pie no preserva plenamente la alternativa documentada en el rastro inglés, porque omite la opción equivalente a ''and trouble with it'' y solo ofrece una alternativa parcial (''y confusión en él'').'
  spanish_quality_summary: El texto principal es claro, natural y digno en español eclesial general. 'Mejor es poco con el temor de Yahvé que gran tesoro con turbación' suena proverbial y comprensible. La única reparación necesaria es la nota al pie, para mejorar fidelidad léxica y claridad idiomática en español.
  glossary_alignment: 'Cumple bien con la terminología del proyecto: יְהוָה → ''Yahvé''; la fórmula sapiencial permanece como ''el temor de Yahvé'' sin paráfrasis reductiva. No hay conflictos relevantes con otras directrices léxicas del glosario.'
  issues:
  - severity: medium
    issue: La nota al pie no conserva adecuadamente las alternativas léxicas auditadas para וּמְהוּמָה בּוֹ.
    rationale: El rastro inglés documenta 'and trouble with it' y 'and confusion in it'. La nota española solo da 'y confusión en él', que además introduce un 'y' no reflejado en el texto principal y pierde la alternativa de 'trouble/disturbance'. Debe ampliarse y adaptarse mejor al español.
  revised_spanish_text: Mejor es poco con el temor de Yahvé que gran tesoro con turbación[a].
  revised_footnotes:
  - marker: a
    text: O 'con disturbio' o 'con confusión en él'. El término hebreo puede denotar turbación, disturbio o confusión.
    reason: lexical_alternative
  revision_rationale: Se mantiene intacto el texto principal porque es fiel y natural. Solo se revisa la nota al pie para reflejar mejor las alternativas léxicas documentadas para מְהוּמָה y la posible relación de בּוֹ con el tesoro, usando formulaciones más naturales en español.
