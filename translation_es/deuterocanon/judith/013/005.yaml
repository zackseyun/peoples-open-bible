translation:
  language: es
  text: Y todos se alejaron de su presencia[a], y no quedó nadie en el dormitorio, desde el menor hasta el mayor.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «de delante de él». El griego expresa literalmente «de delante de él».
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀπῆλθοσαν
  english_pob_choice: went away
  chosen_spanish: se alejaron
  alternatives_spanish:
  - se fueron
  - partieron
  - salieron
  lexicon: BDAG
  rationale: El aoristo de ἀπέρχομαι expresa salida o retirada. «Se alejaron» conserva el movimiento de apartarse del lugar y suena natural en español sin añadir matices que el griego no exige.
- source_word: ἐκ προσώπου
  english_pob_choice: from his presence
  chosen_spanish: de su presencia
  alternatives_spanish:
  - de delante de él
  - de ante su rostro
  lexicon: LSJ
  rationale: La expresión es idiomática y literalmente significa «de delante de». En español, «de su presencia» comunica la misma idea con mayor naturalidad, sin perder el valor relacional del giro.
- source_word: οὐδεὶς κατελείφθη
  english_pob_choice: no one was left
  chosen_spanish: no quedó nadie
  alternatives_spanish:
  - no fue dejado nadie
  - nadie permaneció
  lexicon: BDAG
  rationale: La pasiva de καταλείπω indica que el lugar quedó vacío. «No quedó nadie» es una forma idiomática y clara en español, equivalente a la ausencia total de personas en el cuarto.
- source_word: ἐν τῷ κοιτῶνι
  english_pob_choice: in the bedroom
  chosen_spanish: en el dormitorio
  alternatives_spanish:
  - en la alcoba
  - en el cuarto de dormir
  lexicon: LSJ
  rationale: κοιτών designa un espacio para dormir, una cámara o habitación privada. «Dormitorio» es contemporáneo, comprensible y suficientemente preciso; «alcoba» sería más literario o regional.
- source_word: ἀπὸ μικροῦ ἕως μεγάλου
  english_pob_choice: from the least to the greatest
  chosen_spanish: desde el menor hasta el mayor
  alternatives_spanish:
  - desde el más pequeño hasta el más grande
  - de pequeño a grande
  lexicon: LSJ
  rationale: Es un merismo que abarca a todos sin excepción. «Desde el menor hasta el mayor» conserva esa amplitud y evita reducir el sentido a edad únicamente; «más pequeño/más grande» puede sonar más físico que social.
theological_decisions:
- issue: 'Merismo inclusivo: ἀπὸ μικροῦ ἕως μεγάλου'
  english_pob_reading: from the least to the greatest
  chosen_spanish_reading: desde el menor hasta el mayor
  alternative_spanish_readings:
  - desde el más pequeño hasta el más grande
  - de pequeño a grande
  rationale: El giro no señala necesariamente edad, sino totalidad de estatus o rango. La formulación elegida mantiene esa cobertura inclusiva sin restringir el referente.
  doctrine_reference: No doctrinal issue; discourse totality/merism
translation_notes:
  revision_awareness: La revisión inglesa reciente ajustó ἐκ προσώπου de «from before him» a «from his presence» por mayor naturalidad, sin cambiar el sentido. La versión española adopta una solución igualmente natural («de su presencia») y conserva en nota la literalidad subyacente.
  spanish_consistency_notes:
  - Se mantuvo un registro sobrio y publicable, evitando calcos como «de delante de él» en el texto principal.
  - No se introdujo terminología eclesiástica ajena al griego; «dormitorio» refleja el sentido espacial de κοιτών.
  - «Menor/mayor» conserva el merismo inclusivo y es coherente con el estilo POB en pasajes de enumeración total.
