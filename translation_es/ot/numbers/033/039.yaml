lexical_decisions:
- source_word: וְ/אַהֲרֹן
  english_pob_choice: And Aaron
  chosen_spanish: Y Aarón
  alternatives_spanish:
  - Ahora Aarón
  lexicon: HALOT
  rationale: Se conserva la conjunción narrativa ו como «Y», y el nombre propio se translitera como «Aarón», conforme a la política de nombres personales.
- source_word: בֶּן שָׁלֹשׁ וְעֶשְׂרִים וּמְאַת שָׁנָה
  english_pob_choice: was one hundred twenty-three years old
  chosen_spanish: tenía ciento veintitrés años
  alternatives_spanish:
  - era un hijo de ciento veintitrés años
  - tenía 123 años
  lexicon: HALOT
  rationale: El hebreo usa el giro idiomático בן + número + שנה para expresar edad. En español, «tenía ... años» transmite con naturalidad ese valor sin forzar una traducción literal ajena al uso.
- source_word: בְּ/מֹתוֹ
  english_pob_choice: when he died
  chosen_spanish: cuando murió
  alternatives_spanish:
  - al morir
  - en su muerte
  lexicon: HALOT
  rationale: La preposición ב con el sustantivo verbal de «muerte» y sufijo se entiende temporalmente; en español, «cuando murió» es la forma más clara y fiel al sentido.
- source_word: בְּ/הֹר הָהָר
  english_pob_choice: on Mount Hor
  chosen_spanish: en el monte Hor
  alternatives_spanish:
  - sobre el monte Hor
  - en el monte del Hor
  lexicon: HALOT
  rationale: El topónimo הֹר הָהָר se rinde como «monte Hor». En español, la preposición «en» expresa bien el lugar del fallecimiento y evita una literalidad incómoda.
