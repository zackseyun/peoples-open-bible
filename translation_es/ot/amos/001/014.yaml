base_translation:
  language: en
  yaml_path: translation/ot/amos/001/014.yaml
  text: I will kindle a fire in the wall of Rabbah[a], and it will consume her citadels, with a battle cry on the day of war[c][b], with a storm on the day of tempest.
  footnotes:
  - marker: a
    text: Or 'her palaces' or 'her strongholds' for 'her citadels.'
    reason: lexical_alternative
  - marker: b
    text: '''Battle cry'' translates a Hebrew term that can also mean a loud shout of alarm, sometimes associated with a trumpet blast.'
    reason: lexical_alternative
  - marker: c
    text: The storm imagery may echo the LORD's judgment as a divine warrior, while still fitting the immediate picture of wartime destruction.
    reason: cross_reference
