translation:
  language: es
  text: Palabras de odio me rodean, y luchan[a] contra mí sin causa.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «me hacen guerra». El verbo hebreo puede expresar una imagen de combate más fuerte que «luchan».'
    reason: lexical_alternative
lexical_decisions:
- source_word: דִבְרֵי
  english_pob_choice: Words of
  chosen_spanish: Palabras de
  alternatives_spanish:
  - palabras de
  - dichos de
  - expresiones de
  lexicon: HALOT
  rationale: El constructo plural de דָּבָר aquí funciona como sustantivo en relación con el siguiente término. «Palabras de» conserva la relación constructiva y resulta natural en español poético.
- source_word: שִׂנְאָה
  english_pob_choice: hatred
  chosen_spanish: odio
  alternatives_spanish:
  - odio
  - hostilidad
  - aborrecimiento
  lexicon: HALOT
  rationale: Aunque «odio» no reproduce exactamente el mismo matiz abstracto que «hatred» en inglés, es la opción más natural y contundente en español para un sustantivo personalizado de enemistad. «Hostilidad» sería más interpretativo y menos directo.
- source_word: סְבָב֑וּ/נִי
  english_pob_choice: surround me
  chosen_spanish: me rodean
  alternatives_spanish:
  - me rodean
  - me cercan
  - me rodearon
  lexicon: HALOT
  rationale: El verbo expresa rodear/encerrar. En poesía española, «me rodean» comunica bien la imagen de presión hostil y mantiene el efecto vívido del presente en la traducción inglesa.
- source_word: וַיִּֽלָּחֲמ֥וּ/נִי
  english_pob_choice: they fight against me
  chosen_spanish: pelean contra mí
  alternatives_spanish:
  - pelean contra mí
  - luchan contra mí
  - me hacen guerra
  lexicon: HALOT
  rationale: El verbo puede intensificar la imagen hacia combate. «Pelean contra mí» conserva la oposición directa sin forzar el nivel militar de «hacen guerra». Se deja abierta la intensidad del hebreo.
- source_word: חִנָּם
  english_pob_choice: without cause
  chosen_spanish: sin causa
  alternatives_spanish:
  - sin causa
  - sin razón
  - gratuitamente
  lexicon: HALOT
  rationale: «Sin causa» es una equivalencia directa y bíblicamente reconocible para la idea de injusticia gratuita. Mantiene la carga moral del adverbio hebreo.
translation_notes:
  revision_awareness: La versión inglesa revisada se mantuvo sin cambios sustanciales; en español se ajustó la selección léxica para lograr naturalidad poética sin perder la imagen de hostilidad acumulativa ni la fuerza de חִנָּם.
  spanish_consistency_notes:
  - Se evitó «SEÑOR» y otras convenciones no presentes en este versículo.
  - Se mantuvo un registro poético sobrio y directo, acorde al hebreo.
  - Se preservó la alternancia verbal con presente para transmitir la vividez del reproche en el poema.
