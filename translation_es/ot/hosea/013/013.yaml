translation:
  language: es
  text: Los dolores de parto de una mujer que da a luz[a] le sobrevienen; él es un hijo insensato[b], porque a su debido tiempo no se presenta en la apertura del vientre.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «dolores de nacimiento».'
    reason: lexical_alternative
  - marker: b
    text: 'Literalmente: «no está en el mishbar de los hijos», un modismo para no salir al nacer; algunos traducen «en la boca/apertura del vientre».'
    reason: lexical_alternative
lexical_decisions:
- source_word: חֶבְלֵי
  english_pob_choice: labor pains
  chosen_spanish: dolores de parto
  alternatives_spanish:
  - dolores de alumbramiento
  - dolores del parto
  lexicon: HALOT
  rationale: En este contexto con יולדה, el término señala dolores de parto, no cuerdas literales. ‘Dolores de parto’ comunica con naturalidad el valor idiomático y conserva la imagen obstétrica.
- source_word: יֹלֵדָה
  english_pob_choice: a woman giving birth
  chosen_spanish: una mujer que da a luz
  alternatives_spanish:
  - una mujer en parto
  - una mujer en trabajo de parto
  lexicon: HALOT
  rationale: El participio describe a la mujer en el acto de dar a luz. ‘Que da a luz’ es preciso, digno y más natural en español que una perífrasis demasiado técnica.
- source_word: יָבֹאוּ לוֹ
  english_pob_choice: come upon him
  chosen_spanish: le sobrevienen
  alternatives_spanish:
  - le llegan
  - caen sobre él
  lexicon: HALOT
  rationale: La construcción idiomática expresa llegada repentina e ineludible. ‘Le sobrevienen’ conserva el golpe de la imagen sin forzar una interpretación punitiva adicional.
- source_word: בֵן לֹא חָכָם
  english_pob_choice: an unwise son
  chosen_spanish: un hijo insensato
  alternatives_spanish:
  - un hijo sin sabiduría
  - un hijo necio
  lexicon: HALOT
  rationale: La frase es predicativa y tiene tono evaluativo. ‘Insensato’ refleja bien la valoración del original y mantiene el paralelismo con la imaginería del nacimiento.
- source_word: כִּי עֵת
  english_pob_choice: at the proper time
  chosen_spanish: a su debido tiempo
  alternatives_spanish:
  - en el momento oportuno
  - cuando llega el tiempo
  lexicon: HALOT
  rationale: La revisión inglesa privilegia el matiz de tiempo debido/propio, no solo cronológico. ‘A su debido tiempo’ lo expresa de forma idiomática y fiel.
- source_word: יַעֲמֹד
  english_pob_choice: does not present himself
  chosen_spanish: no se presenta
  alternatives_spanish:
  - no se pone de pie
  - no permanece
  lexicon: HALOT
  rationale: Aunque literalmente ‘estar de pie’, aquí el verbo funciona dentro de la metáfora obstétrica como no salir al momento decisivo. ‘No se presenta’ comunica esa acción implícita en español sin perder el cuadro.
- source_word: בְּמִשְׁבַּר בָּנִים
  english_pob_choice: at the opening of the womb
  chosen_spanish: en la abertura del vientre
  alternatives_spanish:
  - en la abertura del útero
  - en el momento de abrirse el vientre
  lexicon: HALOT
  rationale: La expresión es difícil y probablemente alude al lugar o momento del nacimiento. ‘Abertura del vientre’ conserva la concreción corporal del hebreo mejor que una paráfrasis más abstracta.
theological_decisions:
- issue: Mantenimiento de la metáfora obstétrica sin explicitar el referente
  english_pob_reading: Retain the metaphor without explicitly naming Ephraim/Israel in the translation.
  chosen_spanish_reading: Conservar la metáfora sin añadir ‘Efraín’ o ‘Israel’ en el texto principal.
  alternative_spanish_readings:
  - Efraín es como un hijo insensato...
  - Israel es como un hijo insensato...
  rationale: El hebreo usa imágenes y pronombres de tercera persona sin nombrar explícitamente al sujeto. El contexto más amplio lo identifica, pero el verso aislado debe conservar la metáfora y no incorporar explicación interpretativa al cuerpo del texto.
  doctrine_reference: Translation philosophy §1, §3
translation_notes:
  revision_awareness: La redacción española sigue la revisión más reciente del inglés POB al preferir una formulación que refleje ‘at the proper time’ con ‘a su debido tiempo’ y mantenga el cierre obstétrico con ‘la abertura del vientre’.
  spanish_consistency_notes:
  - Se conserva ‘hijo’ para reflejar בֵן y mantener la metáfora familiar del versículo.
  - Se prefiere ‘dolores de parto’ como término bíblicamente transparente y natural en español.
  - No se nombra explícitamente a Efraín/Israel en el texto principal para respetar la economía del hebreo y la decisión teológica auditada.
  - ‘Abertura del vientre’ mantiene la tensión del giro hebreo difícil sin sustituirlo por una explicación excesivamente interpretativa.
