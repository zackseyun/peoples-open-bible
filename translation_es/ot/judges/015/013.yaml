  yaml_path: translation/ot/judges/015/013.yaml
  text: They said to him[a], “No, but we will surely bind you and hand you over into their hand[b]; yet we will certainly not put you to death.” So they bound him with two new ropes and brought him up from the rock.
  footnotes:
