base_translation:
  language: en
  yaml_path: translation/ot/2_chronicles/029/016.yaml
  text: Then the priests went into the inner part of the house of Yahweh to cleanse it[a], and they brought out to the court of the house of Yahweh all the uncleanness that they found in the temple of Yahweh[c][b]. Then the Levites received it to carry it out to the Kidron Valley.
  footnotes:
  - marker: a
    text: Or 'sanctuary of the LORD' for 'temple of the LORD' (Hebrew הֵיכָל).
    reason: lexical_alternative
  - marker: b
    text: 'Kidron Valley: traditionally also rendered ''brook Kidron.'''
    reason: lexical_alternative
  - marker: c
    text: Or 'to carry it out to the Kidron Valley, outside.'.
    reason: previous_rendering
