id: NUM.14.41
reference: Numbers 14:41
source:
  edition: WLC
  text: וַ/יֹּ֣אמֶר מֹשֶׁ֔ה לָ֥/מָּה זֶּ֛ה אַתֶּ֥ם עֹבְרִ֖ים אֶת פִּ֣י יְהוָ֑ה וְ/הִ֖וא לֹ֥א תִצְלָֽח־׃
translation:
  text: But Moses said[c][b][a], “Why is this that you are transgressing the command of Yahweh? It will not succeed.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''the mouth of the LORD,'' an idiom meaning what the LORD has spoken or commanded.'
    reason: lexical_alternative
  - marker: b
    text: Or 'the word of the LORD.'
    reason: alternative_reading
  - marker: c
    text: Or 'it will not prosper.'
    reason: alternative_reading
lexical_decisions:
- source_word: וַיֹּאמֶר
  chosen: But Moses said
  alternatives:
  - And Moses said
  - So Moses said
  lexicon: HALOT
  rationale: The waw-consecutive introduces the next event in narrative sequence. 'But' fits the adversative sense in context, since Moses is responding with a warning against the people's intended action.
- source_word: לָמָה זֶּה
  chosen: Why is this
  alternatives:
  - Why
  - Why then
  - Why is it that
  lexicon: HALOT
  rationale: The combination is slightly emphatic or idiomatic, not merely a bare 'why.' 'Why is this' preserves the force of the Hebrew expression while remaining natural English.
- source_word: אַתֶּם עֹבְרִים
  chosen: you are transgressing
  alternatives:
  - you are crossing over
  - you are going beyond
  - you are violating
  lexicon: HALOT
  rationale: עבר with the object 'the mouth/command of the LORD' is idiomatic for overstepping or violating a command, not literal movement. 'Transgressing' preserves the moral-covenantal force.
- source_word: אֶת פִּי יְהוָה
  chosen: the command of the LORD
  alternatives:
  - the word of the LORD
  - the mouth of the LORD
  lexicon: HALOT
  rationale: Literally 'the mouth of the LORD,' a Hebrew idiom for what the LORD has spoken or commanded. In this context, where Israel is disobeying a divine directive, 'the command of the LORD' best conveys the sense. 'the LORD' follows the project's default rendering for יְהוָה.
- source_word: וְהִוא
  chosen: It
  alternatives:
  - and it
  - and this
  - and that
  lexicon: HALOT
  rationale: The feminine pronoun likely refers to the attempted action/enterprise implied by the context. English requires an impersonal rendering; 'It' is the most natural equivalent.
- source_word: לֹא תִצְלָח
  chosen: will not succeed
  alternatives:
  - will not prosper
  - will not turn out well
  lexicon: HALOT
  rationale: צלח here refers to prospering or succeeding in an undertaking. 'Will not succeed' is clear modern English and fits the warning about the impending military action.
