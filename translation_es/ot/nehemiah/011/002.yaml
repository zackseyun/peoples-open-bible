review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien el sentido básico del hebreo: el pueblo bendijo a los hombres que se ofrecieron voluntariamente para residir en Jerusalén. Conserva correctamente ‘el pueblo’, el masculino específico de הָאֲנָשִׁים, y la idea reflexiva/voluntaria de הַמִּתְנַדְּבִים. Sin embargo, las notas no siguen con precisión la huella de auditoría inglesa: la nota principal del inglés está anclada a toda la expresión de autoofrecimiento para vivir en Jerusalén y ofrece ‘who volunteered to live in Jerusalem’, mientras que en español se dividió en dos notas distintas y se introdujo una alternativa para ‘bendijo’ no preservada por la POB inglesa.'
  spanish_quality_summary: El español es claro y digno. ‘Bendijo’ y ‘se ofrecieron voluntariamente’ son naturales y fieles. No obstante, ‘para habitar en Jerusalén’ suena algo más elevado que el inglés auditado y el hebreo contextual; ‘para vivir en Jerusalén’ es más idiomático y ajusta mejor la decisión léxica documentada para לָשֶׁבֶת. También conviene simplificar las notas para evitar sobrecargar el versículo con alternativas no necesarias.
  glossary_alignment: No hay términos del glosario principal en conflicto. Se respeta la decisión de mantener ‘hombres’ para הָאֲנָשִׁים. La mejor alineación con la auditoría POB sería mantener ‘bendijo’, usar ‘para vivir’, y conservar una sola nota léxica en la frase verbal de voluntariado.
  issues:
  - severity: medium
    issue: Las notas al pie no coinciden con la auditoría inglesa
    rationale: La POB inglesa solo conserva una nota alternativa para toda la expresión ‘who willingly offered themselves to live in Jerusalem’. El borrador español añade una nota distinta para ‘bendijo’ y separa la alternativa del voluntariado, lo cual altera innecesariamente el aparato documentado.
  - severity: low
    issue: ‘Habitar’ es menos idiomático que ‘vivir’ para לָשֶׁבֶת en este contexto
    rationale: Aunque ‘habitar’ no es incorrecto, la decisión inglesa documentada eligió ‘to live’ por naturalidad contextual. En español, ‘para vivir en Jerusalén’ comunica mejor la residencia asumida sin sonar arcaizante.
  revised_spanish_text: Y el pueblo bendijo a todos los hombres que se ofrecieron voluntariamente para vivir en Jerusalén[a].
  revised_footnotes:
  - marker: a
    text: O ‘que se ofrecieron como voluntarios para vivir en Jerusalén’.
    reason: lexical_alternative
  revision_rationale: Se elimina la nota sobre ‘bendijo’ porque no está sustentada por la auditoría inglesa y no es necesaria para la claridad. Se unifica la alternativa léxica en una sola nota anclada al sintagma completo de voluntariado, en paralelo con la POB inglesa. Además, se cambia ‘habitar’ por ‘vivir’ para alinearse mejor con la decisión léxica documentada para לָשֶׁבֶת y con el español natural.
