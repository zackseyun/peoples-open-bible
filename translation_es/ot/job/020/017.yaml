revisions:
- from: No mirará[a] los arroyos, los ríos que fluyen con miel y cuajada.
  to: No mirará[a] arroyos, ríos y torrentes de miel y cuajada.
  rationale: La revisión preserva mejor la acumulación poética del hebreo con tres términos acuáticos naturales en español, mejora la fluidez de la imagen de abundancia con 'de miel y cuajada', y corrige la nota para mantener la negación original y ofrecer alternativas léxicas útiles sin perder legibilidad.
  reviewer_model: gpt-5.4
