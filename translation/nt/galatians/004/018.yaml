  chosen_reading: 'passive: the Galatians being eagerly sought by others'
  alternative_readings:
  - 'middle/reflexive: to be zealous'
  - 'active in sense: to show zeal'
  rationale: 'The immediate context (vv.17–18) repeatedly uses ζηλόω language for others'' pursuit of the Galatians, especially the false teachers who ''are zealous for you'' with bad motives. Reading the infinitive passively keeps v.18 as the positive counterpart: it is good for them to be eagerly sought, provided the motive is good, and not only during Paul''s visits.'
