translation:
  language: es
  text: Y entristecido[a], lloré y oré en angustia, diciendo,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'El texto griego es breve aquí: «Y entristecido, lloré y oré en angustia, diciendo». La tradición semítica ampliada desarrolla el lamento en líneas posteriores; esta cláusula inicial queda bien representada por el griego.'
    reason: textual_variant
lexical_decisions:
- source_word: λυπηθεὶς
  english_pob_choice: being grieved
  chosen_spanish: estando afligido
  alternatives_spanish:
  - estando apenado
  - estando entristecido
  - en mi aflicción
  lexicon: BDAG
  rationale: El participio aoristo de λυπέω expresa un estado de dolor o pena. «Estando afligido» conserva el matiz de condición emocional previa a las acciones siguientes y suena natural en español bíblico contemporáneo.
- source_word: ἔκλαυσα
  english_pob_choice: I wept
  chosen_spanish: lloré
  alternatives_spanish:
  - lloré amargamente
  - sollozé
  - lloraba
  lexicon: BDAG
  rationale: κλαίω se refiere a llorar. «Lloré» es la equivalencia directa y no añade intensidad no explicitada por el griego, aunque en español «llorar» cubre adecuadamente el sentido de lamento.
- source_word: προσηυξάμην
  english_pob_choice: I prayed
  chosen_spanish: oré
  alternatives_spanish:
  - oré a Dios
  - oraba
  - presenté mi oración
  lexicon: BDAG
  rationale: El verbo medio de προσεύχομαι se traduce de manera natural como «orar». Aquí mantiene la simplicidad del griego y evita introducir una intensificación no presente en el texto base.
- source_word: μετʼ ὀδύνης
  english_pob_choice: in anguish
  chosen_spanish: en angustia
  alternatives_spanish:
  - con dolor
  - con angustia
  - en dolor
  lexicon: BDAG
  rationale: ὀδύνη denota dolor profundo, angustia o pena intensa. «En angustia» reproduce bien el impacto emocional en español y encaja con la construcción verbal sin sobretraducirla.
- source_word: λέγων
  english_pob_choice: saying
  chosen_spanish: diciendo
  alternatives_spanish:
  - y diciendo
  - al decir
  lexicon: BDAG
  rationale: El participio introduce la cita inmediata de la oración. «Diciendo» sigue la función narrativa del griego y conserva el enlace con las palabras que siguen en el contexto.
translation_notes:
  revision_awareness: La redacción sigue de cerca la lectura revisada del inglés POB, especialmente el valor participial de λυπηθείς («estando afligido») y la brevedad del segmento griego frente a la expansión de la tradición semítica paralela.
  spanish_consistency_notes:
  - Se mantiene «orar» para προσεύχομαι en lugar de «rezar», por coherencia con el registro bíblico y con la transparencia terminológica del proyecto.
  - Se eligió «angustia» para ὀδύνη, evitando suavizar el término a «tristeza» o «dolor» sin necesidad.
  - La nota textual indica que la ampliación semítica es una tradición paralela y no la base principal de la traducción.
