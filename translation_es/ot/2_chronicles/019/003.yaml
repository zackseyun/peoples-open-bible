  text: אֲבָ֕ל דְּבָרִ֥ים טוֹבִ֖ים נִמְצְא֣וּ עִמָּ֑/ךְ כִּֽי בִעַ֤רְתָּ הָ/אֲשֵׁרוֹת֙ מִן הָ/אָ֔רֶץ וַ/הֲכִינ֥וֹתָ לְבָבְ/ךָ֖ לִ/דְרֹ֥שׁ הָֽ/אֱלֹהִֽים־־׃
base_translation:
  language: en
  yaml_path: translation/ot/2_chronicles/019/003.yaml
  text: Nevertheless[a], good things have been found in you[b], because you have removed the Asherah poles from the land and have set your heart to seek God.
