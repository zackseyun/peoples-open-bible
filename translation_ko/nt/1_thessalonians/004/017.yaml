id: 1TH.4.17
reference: 1 Thessalonians 4:17
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: ἔπειτα ἡμεῖς οἱ ζῶντες οἱ περιλειπόμενοι ἅμα σὺν αὐτοῖς ἁρπαγησόμεθα ἐν νεφέλαις εἰς ἀπάντησιν τοῦ κυρίου εἰς ἀέρα· καὶ οὕτως πάντοτε σὺν κυρίῳ ἐσόμεθα.
base_translation:
  language: en
  yaml_path: translation/nt/1_thessalonians/004/017.yaml
  text: Then we who are alive[a], who remain, will be caught up together with them in the clouds to meet the Lord in the air[b]; and so we will always be with the Lord.
  footnotes:
  - marker: a
    text: Or 'will be snatched up.' The Greek verb emphasizes sudden, forceful action.
    reason: lexical_alternative
  - marker: b
    text: Or 'for a meeting with the Lord.' The phrase can denote going out to meet someone, but the verse itself does not specify the larger sequence beyond this encounter.
    reason: alternative_reading
translation:
  language: ko
  text: 그 후에 살아 남아 있는 우리는 그들과 함께 구름 속으로 채어 올려져[a] 공중에서 주님을 만나 뵙게 될 것입니다[b]. 그리하여 우리는 영원토록 주님과 함께 있을 것입니다.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 또는 「낚아채어 들려질 것이며」. 헬라어 동사는 갑작스럽고 강력한 행위를 강조한다.
    reason: lexical_alternative
  - marker: b
    text: 또는 「주님을 영접하기 위하여」. 본 구절은 누군가를 마중 나가는 의미를 담을 수 있으나, 본 절 자체는 그 만남 이후의 더 큰 순서를 명시하지 않는다.
    reason: alternative_reading
lexical_decisions:
- source_word: ἔπειτα
  english_pob_choice: Then
  chosen_korean: 그 후에
  alternatives_korean:
  - 그다음에
  - 이어서
  lexicon: BDAG
  rationale: 시간적 순서를 명확히 한다.
- source_word: ἅμα σὺν αὐτοῖς
  english_pob_choice: together with them
  chosen_korean: 그들과 함께
  alternatives_korean:
  - 그들과 더불어 함께
  - 그들과 동시에
  lexicon: BDAG
  rationale: ἅμα는 「동시에·함께」. 잠든 자들의 일어남과 살아 남은 자들의 채어 올려짐이 같은 사건임을 보존.
- source_word: ἁρπαγησόμεθα
  english_pob_choice: will be caught up
  chosen_korean: 채어 올려져
  alternatives_korean:
  - 낚아채어 들려져
  - 끌어 올려져
  lexicon: BDAG
  rationale: 글로사리 정책에 따라 ἁρπάζω의 강력하고 갑작스러운 행위 의미를 「채어 올려지다」로 보존한다. 한국어 「채다」는 「갑자기 빠르게 잡아채다」의 의미를 담는다. 본 어휘는 라틴어 raptura의 어원으로, 흔히 말하는 「휴거」 본문의 핵심 동사이며 약화시키지 않는다.
- source_word: ἐν νεφέλαις
  english_pob_choice: in the clouds
  chosen_korean: 구름 속으로
  alternatives_korean:
  - 구름들 가운데
  - 구름 위로
  lexicon: BDAG
  rationale: 「속으로」가 채어 올려지는 방향성을 함께 담는다.
- source_word: εἰς ἀπάντησιν τοῦ κυρίου
  english_pob_choice: to meet the Lord
  chosen_korean: 주님을 만나 뵙게 될 것입니다
  alternatives_korean:
  - 주님을 영접하기 위하여
  - 주님과 만나기 위하여
  lexicon: BDAG
  rationale: ἀπάντησις는 마중 나감의 의미. 본문 어휘를 그대로 담는 「만나 뵙다」 경어형을 채택해 합쇼체를 유지한다.
- source_word: εἰς ἀέρα
  english_pob_choice: in the air
  chosen_korean: 공중에서
  alternatives_korean:
  - 대기 가운데
  - 하늘 공기 가운데
  lexicon: BDAG
  rationale: 한국 교회 전통의 「공중」 어휘.
- source_word: πάντοτε σὺν κυρίῳ ἐσόμεθα
  english_pob_choice: we will always be with the Lord
  chosen_korean: 우리는 영원토록 주님과 함께 있을 것입니다
  alternatives_korean:
  - 우리는 언제나 주님과 함께 있을 것입니다
  - 우리는 항상 주님과 더불어 있을 것입니다
  lexicon: BDAG
  rationale: πάντοτε의 종말론적 영속성을 「영원토록」으로 강조한다. 본 절은 종말적 영원성을 가리키므로 단순 「언제나」보다 「영원토록」이 적합하다.
theological_decisions:
- issue: ἁρπαγησόμεθα(채어 올려짐)의 번역 강도
  chosen_reading: 「채어 올려져」
  alternative_readings:
  - 끌어 올려져
  - 들려져
  - 휴거되어
  rationale: 헬라어 ἁρπάζω는 갑작스럽고 강력한 행위(잡아챔·낚아챔)를 가리킨다. 본 번역은 글로사리 정책과 북극성 원칙에 따라 그 강도를 약화시키지 않고 「채어 올려지다」로 보존한다. 한국 교회 전통의 「휴거」는 라틴어 raptura에서 온 음역으로 본문 동사의 갑작스러움·강력함을 한국어 독자가 직접 들을 수 없게 한다. 본 번역은 본문 동사의 운동성을 그대로 살려 한국어 독자가 본문의 무게를 직접 체감하도록 한다. 그 신학적 함의(흔히 「휴거」로 부르는 사건)는 부정하지 않는다.
  doctrine_reference: 'KOREAN_PIPELINE.md Glossary — ἁρπάζω → 채어 올려지다; DOCTRINE.md: Render eschatological language faithfully and clearly; don''t soften ἁρπαγησόμεθα'
