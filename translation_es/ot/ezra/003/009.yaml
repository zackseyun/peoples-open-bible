translation:
  language: es
  text: Entonces Jesúa, sus hijos y sus hermanos, y Cadmiel y sus hijos, los hijos de Judá[a], se presentaron juntos como uno solo para supervisar a los que hacían el trabajo en la casa de Dios, junto con los hijos de Henadad, sus hijos y sus hermanos, los levitas.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «los hijos de Judá». Algunas versiones antiguas y traducciones modernas leen «los hijos de Hodavías».'
    reason: textual_variant
lexical_decisions:
- source_word: וַיַּעֲמֹד
  english_pob_choice: stood
  chosen_spanish: se puso en pie
  alternatives_spanish:
  - se levantó
  - estuvo de pie
  lexicon: HALOT
  rationale: El verbo expresa la acción concreta de ponerse de pie o asumir una posición. En español, «se puso en pie» conserva ese valor corporal y resulta natural en este contexto de disposición para una tarea.
- source_word: יֵשׁוּעַ
  english_pob_choice: Jeshua
  chosen_spanish: Jesúa
  alternatives_spanish:
  - Jesúa
  - Josué
  lexicon: HALOT
  rationale: Como nombre propio en Esdras, se translitera en vez de traducirse. «Jesúa» es la forma castellana habitual para este personaje en este libro y evita confundirlo con Josué hijo de Nun.
- source_word: בָּנָיו וְאֶחָיו
  english_pob_choice: his sons and his brothers
  chosen_spanish: sus hijos y sus hermanos
  alternatives_spanish:
  - sus hijos y sus parientes
  - sus hijos y sus hermanos
  lexicon: HALOT
  rationale: El hebreo usa términos de parentesco masculinos explícitos. «Hijos» y «hermanos» preservan esa estructura genealógica sin suavizarla a un término más general.
- source_word: קַדְמִיאֵל וּבָנָיו
  english_pob_choice: and Kadmiel and his sons
  chosen_spanish: y Cadmiel y sus hijos
  alternatives_spanish:
  - y Kadmiel y sus hijos
  - y Cadmiel con sus hijos
  lexicon: HALOT
  rationale: Se mantiene la coordinación simple del hebreo. «Cadmiel» sigue la transliteración castellana más reconocible, y «sus hijos» refleja el paralelismo con Jesúa.
- source_word: בְּנֵי יְהוּדָה
  english_pob_choice: the sons of Judah
  chosen_spanish: los hijos de Judá
  alternatives_spanish:
  - los hijos de Judá
  - los hijos de Hodavías
  - los judeanos
  lexicon: HALOT
  rationale: Se traduce directamente el texto masorético tal como está en la base hebrea. Se conserva la forma «Judá» porque el audit trail inglés también opta por el texto masorético y solo señala la variante en nota.
- source_word: כְּאֶחָד
  english_pob_choice: together as one
  chosen_spanish: como uno solo
  alternatives_spanish:
  - unánimemente
  - como uno
  lexicon: HALOT
  rationale: La expresión subraya unidad de acción. «Como uno solo» transmite bien la fuerza idiomática y evita una traducción demasiado abstracta.
- source_word: לְנַצֵּחַ
  english_pob_choice: to oversee
  chosen_spanish: para supervisar
  alternatives_spanish:
  - para vigilar
  - para dirigir
  lexicon: HALOT
  rationale: 'En este contexto la raíz no es musical sino administrativa: dirigir/supervisar el trabajo. «Supervisar» es claro en español y conserva el sentido de responsabilidad sobre otros.'
- source_word: עַל עֹשֵׂה הַמְּלָאכָה
  english_pob_choice: those doing the work
  chosen_spanish: a los que hacían la obra
  alternatives_spanish:
  - a los que trabajaban
  - a los obreros
  lexicon: HALOT
  rationale: El participio singular funciona colectivamente. «Los que hacían la obra» conserva el matiz verbal del hebreo y evita reducirlo a un sustantivo más interpretativo.
- source_word: בְּבֵית הָאֱלֹהִים
  english_pob_choice: in the house of God
  chosen_spanish: en la casa de Dios
  alternatives_spanish:
  - en la casa de Dios
  - en el templo de Dios
  lexicon: HALOT
  rationale: Se mantiene la expresión bíblica «casa de Dios», transparente y fiel al original, sin sustituirla por una equivalencia más explicativa.
- source_word: בְּנֵי חֵנָדָד בְּנֵיהֶם וַאֲחֵיהֶם הַלְוִיִּם
  english_pob_choice: along with the sons of Henadad, their sons and their brothers, the Levites
  chosen_spanish: junto con los hijos de Henadad, sus hijos y sus hermanos, los levitas
  alternatives_spanish:
  - junto con los hijos de Henadad, sus hijos y sus hermanos, los levitas
  - incluyendo a los hijos de Henadad, sus hijos y sus hermanos, los levitas
  lexicon: HALOT
  rationale: La lista final se entiende como una incorporación al grupo anterior. «Junto con» hace explícita esa inclusión sin alterar la estructura enumerativa del hebreo, y «los levitas» conserva la identificación final del grupo.
theological_decisions:
- issue: Variante textual en בני יהודה
  english_pob_reading: Translate the Masoretic Text directly as 'the sons of Judah.' Some ancient versions and modern translations read 'the sons of Hodaviah.'
  chosen_spanish_reading: Traducir directamente «los hijos de Judá» y señalar la variante en nota.
  alternative_spanish_readings:
  - los hijos de Hodavías
  rationale: La base hebrea proporcionada es la lectura masorética, y el criterio del proyecto favorece la primacía del texto fuente. La variante queda documentada para auditabilidad sin imponerla al texto principal.
  doctrine_reference: Primacía del texto fuente; preservación de variantes textuales sin resolverlas por tradición
- issue: Sentido de לְנַצֵּחַ en un contexto no musical
  english_pob_reading: to oversee
  chosen_spanish_reading: para supervisar
  alternative_spanish_readings:
  - para dirigir
  - para administrar
  rationale: No se trata de liderazgo musical; la raíz describe control o dirección sobre el trabajo. «Supervisar» evita una lectura litúrgica indebida y refleja la función administrativa del pasaje.
  doctrine_reference: Lectura contextual del léxico hebreo; evitar imporner sentidos posteriores
translation_notes:
  revision_awareness: Se siguió el texto hebreo masorético provisto y el audit trail inglés sin cambios aplicados en la última revisión; no se requirieron enmiendas adicionales.
  spanish_consistency_notes:
  - Se usa «Jesúa» para el nombre propio, conforme al uso castellano bíblico en Esdras.
  - Se conserva «casa de Dios» en vez de una paráfrasis como «templo» para mantener la fórmula del hebreo.
  - «Levitas» se mantiene como gentilicium religioso establecido en español bíblico.
  - La nota textual se ancla en «Judá[a]» para reflejar la variante documentada sin interrumpir la lectura principal.
