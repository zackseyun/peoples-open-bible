translation:
  language: es
  text: En la angustia llamaste, y yo te libré; te respondí en el escondite[a] del trueno; te puse a prueba en las aguas de Meribá[b]. Selah
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «en el lugar secreto del trueno» o «desde el escondite del trueno». La imagen hebrea probablemente evoca la presencia oculta de Dios en la tormenta.
    reason: lexical_alternative
  - marker: b
    text: Meribá remite al episodio del desierto en que Dios probó a Israel e Israel contendió por el agua (Éx 17:1–7; Nm 20:1–13).
    reason: cross_reference
lexical_decisions:
- source_word: בַּצָּרָה
  english_pob_choice: In distress
  chosen_spanish: En la angustia
  alternatives_spanish:
  - En la aflicción
  - En la tribulación
  lexicon: HALOT
  rationale: צָרָה expresa aflicción, angustia o adversidad. «Angustia» comunica bien el estado de presión o aflicción sin añadir una clase específica de problema que el hebreo no precisa.
- source_word: קָרָאתָ
  english_pob_choice: you called
  chosen_spanish: llamaste
  alternatives_spanish:
  - clamaste
  - gritaste
  lexicon: HALOT
  rationale: קרא aquí significa llamar o clamar en busca de ayuda. «Llamaste» conserva la relación directa con el verbo hebreo y evita intensificar innecesariamente el matiz con una paráfrasis más fuerte.
- source_word: וָאֲחַלְּצֶךָּ
  english_pob_choice: and I rescued you
  chosen_spanish: y yo te libré
  alternatives_spanish:
  - y te rescaté
  - y te saqué
  lexicon: HALOT
  rationale: חלץ puede significar librar, rescatar o sacar de peligro. «Te libré» es natural en español bíblico actual y conserva el valor de liberación sin perder la fuerza verbal del hebreo.
- source_word: אֶעֶנְךָ
  english_pob_choice: I answered you
  chosen_spanish: te respondí
  alternatives_spanish:
  - te contesté
  - te atendí
  lexicon: HALOT
  rationale: ענה aquí es responder. «Te respondí» es directo y refleja bien la estructura hebrea; en español mantiene el paralelismo con la primera persona divina.
- source_word: בְּסֵתֶר רַעַם
  english_pob_choice: in the hiding place of thunder
  chosen_spanish: en el escondite del trueno
  alternatives_spanish:
  - en el lugar secreto del trueno
  - desde el escondite del trueno
  lexicon: HALOT
  rationale: סֵתֶר es un lugar escondido o cubierto. «Escondite» conserva la imagen de ocultamiento y, con «trueno», mantiene la posible alusión teofánica sin resolverla de modo interpretativo. Se conserva «del trueno» para reflejar el hebreo y su tensión poética.
- source_word: אֶבְחָנְךָ
  english_pob_choice: I tested you
  chosen_spanish: te puse a prueba
  alternatives_spanish:
  - te probé
  - te examiné
  lexicon: HALOT
  rationale: בחן significa probar, examinar o poner a prueba. «Te puse a prueba» es una forma clara y idiomática en español que conserva el sentido de prueba evaluativa.
- source_word: עַל מֵי מְרִיבָה
  english_pob_choice: at the waters of Meribah
  chosen_spanish: junto a las aguas de Meribá
  alternatives_spanish:
  - junto a las aguas de Meriba
  - en las aguas de Meribá
  lexicon: HALOT
  rationale: עַל en este contexto locativo puede expresarse como proximidad o relación con el episodio. «Junto a las aguas de Meribá» es idiomático en español y mantiene la alusión al relato del desierto.
- source_word: סֶלָה
  english_pob_choice: Selah
  chosen_spanish: Selah
  lexicon: HALOT
  rationale: El término es incierto y se translitera, siguiendo la práctica de no conjeturar una traducción no segura.
theological_decisions:
- issue: Imagen de la presencia divina en el trueno
  english_pob_reading: The verse is rendered as God's direct address recalling Israel's cry, deliverance, answer in storm-theophany, and testing at Meribah, without expanding the allusions beyond the text.
  chosen_spanish_reading: El verso mantiene el habla directa de Dios y la imagen del escondite del trueno sin fijar la referencia histórica exacta.
  alternative_spanish_readings:
  - en el lugar secreto del trueno
  - desde el escondite del trueno
  - en la nube del trueno
  rationale: El hebreo permite una imagen de presencia divina oculta asociada al trueno, pero no obliga a resolverla solo como Sinaí. La traducción conserva la ambigüedad teológica y poética.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
- issue: Sentido de la prueba en Meribá
  english_pob_reading: The verse ... testing at Meribah
  chosen_spanish_reading: «Te puse a prueba» deja abierta la función de la prueba como examen y refutación, no solo castigo.
  alternative_spanish_readings:
  - te castigué
  - te examiné
  rationale: בחן puede implicar probar la calidad o examinar. La formulación elegida evita reducir el episodio a un solo matiz y preserva la tensión bíblica entre prueba y disciplina.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: Concordancia alta con el audit trail inglés; se conservaron la secuencia verbal, la imagen teofánica de «trueno» y la alusión a Meribá sin ampliar el sentido más allá del hebreo. No se reportan revisiones aplicadas en el paquete fuente.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» fuera del versículo porque el texto hebreo usa primera persona divina y no el tetragrámaton explícito en esta línea.
  - «Meribá» se translitera con acento gráfico para lectura española, manteniendo el nombre propio bíblico.
  - Se prefirió un español bíblico moderno y natural, evitando calcos como «respondí a ti» o «en el lugar secreto del trueno» que sonaban menos idiomáticos.
