revisions:
- from: Hay un don[a] que no te aprovechará, y hay un don cuya retribución es doble.
  to: Hay un regalo[a] que no te aprovechará, y hay un regalo cuya retribución es doble.
  rationale: Se reemplaza «don» por «regalo» para reflejar mejor δόσις en español natural y evitar la connotación de don espiritual o capacidad especial. Se ajusta la nota para usar «retorno» en lugar de «devolución», más cercano al valor amplio de ἀνταπόδομα.
