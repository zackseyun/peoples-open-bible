translation:
  language: es
  text: Y llegó Ragüel a su casa[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «a su propia casa». El reflexivo griego ἑαυτοῦ permite explicitar la posesión, pero el español breve «su casa» resulta más natural aquí.'
    reason: lexical_alternative
lexical_decisions:
- source_word: καὶ
  english_pob_choice: And
  chosen_spanish: Y
  alternatives_spanish:
  - Entonces
  lexicon: BDAG
  rationale: La conjunción simple mantiene la parataxis narrativa del griego sin añadir una relación temporal más fuerte de la que el texto da.
- source_word: ἦλθεν
  english_pob_choice: came
  chosen_spanish: llegó
  alternatives_spanish:
  - vino
  - entró
  lexicon: BDAG
  rationale: El aoristo de ἔρχομαι expresa llegada en la secuencia narrativa; «llegó» suena natural en español y conserva el sentido de movimiento sin sobretraducir como «entró».
- source_word: Ῥαγουὴλ
  english_pob_choice: Raguel
  chosen_spanish: Ragüel
  alternatives_spanish:
  - Raguel
  - Reuel
  lexicon: standard transliteration
  rationale: Se conserva el nombre propio en forma castellana de uso bíblico, acercándose a la forma griega Ῥαγουήλ y facilitando la lectura en español.
- source_word: εἰς
  english_pob_choice: into
  chosen_spanish: a
  alternatives_spanish:
  - dentro de
  - hacia
  lexicon: BDAG
  rationale: La preposición con acusativo indica movimiento hacia el interior; en español, «a su casa» transmite de forma natural ese desplazamiento sin forzar una duplicación como «entró en».
- source_word: τὴν οἰκίαν
  english_pob_choice: his house
  chosen_spanish: su casa
  alternatives_spanish:
  - su hogar
  - la casa
  lexicon: BDAG
  rationale: οἰκία se refiere aquí al lugar físico al que llega Ragüel. «Casa» conserva la concreción del griego y es idiomática en español.
- source_word: ἑαυτοῦ
  english_pob_choice: his
  chosen_spanish: su
  alternatives_spanish:
  - su propia
  lexicon: BDAG
  rationale: El genitivo reflexivo remite a Ragüel. En español, el posesivo simple basta en este contexto; añadir «propia» introduciría un énfasis que el griego no exige.
translation_notes:
  revision_awareness: El texto griego y el testimonio inglés concordan plenamente; la única cuestión auditada es la forma de reflejar el reflexivo ἑαυτοῦ sin perder naturalidad en español.
  spanish_consistency_notes:
  - Se mantiene un registro bíblico sobrio y moderno.
  - Se evita «entró» para no duplicar el valor de εἰς.
  - El nombre propio se adapta a la ortografía española sin alterar la identidad del referente.
