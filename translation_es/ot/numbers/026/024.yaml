lexical_decisions:
- source_word: לְ/יָשׁוּב
  english_pob_choice: of Jashub
  chosen_spanish: de Jashub
  alternatives_spanish:
  - para Jashub
  lexicon: HALOT
  rationale: En esta fórmula censal, la preposición לְ delante de un nombre propio introduce al antepasado epónimo del que deriva la designación del clan. En español, «de Jashub» reproduce de forma natural esa relación de pertenencia/origen sin forzar el valor direccional de la preposición.
- source_word: מִשְׁפַּחַת
  english_pob_choice: the clan of
  chosen_spanish: la familia de
  alternatives_spanish:
  - el clan de
  lexicon: HALOT
  rationale: En español, «clan» es comprensible, pero «familia» conserva mejor la amplitud semántica de מִשְׁפָּחָה y suena más natural en una lista genealógica. Dado que el inglés POB eligió «clan» por precisión administrativa, aquí se mantiene la idea de grupo de descendencia con «familia de», sin perder el sentido tribal.
- source_word: הַ/יָּשׁוּבִי
  english_pob_choice: the Jashubites
  chosen_spanish: los yashubitas
  alternatives_spanish:
  - la familia yashubita
  lexicon: HALOT
  rationale: El gentilicio hebreo designa al grupo descendiente de Jashub. En español, «yashubitas» sigue el patrón natural de gentilicios de linaje y conserva la referencia al nombre propio, evitando una paráfrasis más larga.
- source_word: לְ/שִׁמְרֹן
  english_pob_choice: of Shimron
  chosen_spanish: de Shimrón
  alternatives_spanish:
  - para Shimrón
  lexicon: HALOT
  rationale: Se mantiene el mismo tratamiento que con Jashub para conservar la paralelismo de la lista y la relación epónima entre el nombre y el grupo descendiente.
- source_word: הַ/שִּׁמְרֹנִי
  english_pob_choice: the Shimronites
  chosen_spanish: los shimronitas
  alternatives_spanish:
  - la familia shimronita
  lexicon: HALOT
  rationale: Como con el primer gentilicio, «shimronitas» expresa de modo conciso el grupo familiar/tribal derivado de Shimrón y respeta la repetición formal del pasaje.
translation_notes:
  revision_awareness: El texto inglés de referencia no presenta notas ni revisiones aplicadas; el hebreo muestra una fórmula repetitiva de filiación tribal sin variantes textuales relevantes en el expediente proporcionado. La traducción española sigue ese paralelismo de forma estrecha y transparente.
  spanish_consistency_notes:
  - 'Se conserva la transliteración de los nombres propios según el uso habitual en español bíblico: Jashub, Shimrón.'
  - Para los gentilicios se opta por minúsculas y forma plural masculina genérica («yashubitas», «shimronitas»), coherente con listas genealógicas de grupos.
  - Se evita «SEÑOR» u otra sustitución porque el versículo no contiene el tetragrámaton ni lenguaje divino.
