translation:
  language: es
  text: Y devuelve a nuestros vecinos, siete veces, en su regazo[a], el oprobio con que te afrentaron, oh Señor.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «en su seno». El hebreo usa una imagen corporal para decir que la afrenta vuelva sobre ellos.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהָשֵׁב
  english_pob_choice: repay
  chosen_spanish: devuelve
  alternatives_spanish:
  - paga de vuelta
  - retribuye
  - recompensa
  lexicon: HALOT
  rationale: El imperativo causativo de שוב aquí expresa hacer que algo vuelva sobre alguien. En español, «devuelve» conserva la idea de retorno y permite un tono natural en la poesía. «Recompensa» o «retribuye» suenan más abstractos y pueden diluir el golpe del ruego imprecatorio.
- source_word: לִשְׁכֵנֵינוּ
  english_pob_choice: our neighbors
  chosen_spanish: a nuestros vecinos
  alternatives_spanish:
  - a nuestros vecinos cercanos
  - a los pueblos vecinos
  - a quienes habitan a nuestro alrededor
  lexicon: HALOT
  rationale: שָׁכֵן nombra al vecino o al que habita cerca. «Vecinos» preserva la forma léxica sin sobreespecificar «naciones» en el cuerpo del verso. El dativo con «a» refleja el movimiento de devolver algo a alguien.
- source_word: שִׁבְעָתַיִם
  english_pob_choice: sevenfold
  chosen_spanish: siete veces
  alternatives_spanish:
  - en siete pliegos
  - siete pliegues
  - siete doblemente
  lexicon: HALOT
  rationale: La forma adverbial intensiva puede expresarse como «siete veces» en español natural. «Siete veces» mantiene la intensidad numérica sin introducir una fórmula idiomática menos clara para lectores modernos. No se opta por «séptuple» porque suena más técnico y menos transparente.
- source_word: אֶל חֵיקָם
  english_pob_choice: into their lap
  chosen_spanish: en su seno
  alternatives_spanish:
  - en su regazo
  - en su pecho
  - en su pecho/ regazo
  lexicon: HALOT
  rationale: חֵיק puede significar seno, regazo o pecho. La imagen hebrea es la de que la ofensa vuelva sobre ellos. «En su seno» preserva la metáfora en español bíblico sin sonar tan coloquial como «regazo» ni tan anatómico como «pecho».
- source_word: חֶרְפָּתָם
  english_pob_choice: the reproach
  chosen_spanish: el oprobio
  alternatives_spanish:
  - el reproche
  - la afrenta
  - la vergüenza
  lexicon: HALOT
  rationale: El término hebreo cubre reproche, afrenta y deshonra. «Oprobio» comunica bien la fuerza deshonrosa del insulto público y funciona en paralelo con el verbo siguiente. «Reproche» es más formalmente cercano al cognado, pero en español puede sonar más débil o más discursivo que el contexto exige.
- source_word: אֲשֶׁר חֵרְפוּךָ
  english_pob_choice: with which they reproached you
  chosen_spanish: con que te han deshonrado
  alternatives_spanish:
  - con que te han reprochado
  - con que te han afrentado
  - con que te han ultrajado
  lexicon: HALOT
  rationale: Para preservar el enlace semántico con חֶרְפָּה, se traduce el verbo con una expresión que conserve la idea de insulto/afrenta contra Dios. «Deshonrado» expresa bien el efecto social y teológico del agravio, aunque «reprochado» sería la opción más cognada. Aquí se busca una equivalencia idiomática que no pierda la carga ofensiva del hebreo.
- source_word: אֲדֹנָי
  english_pob_choice: O Lord
  chosen_spanish: oh Señor
  alternatives_spanish:
  - Señor
  - oh, Señor
  - Señor mío
  lexicon: HALOT
  rationale: אֲדֹנָי es el título divino. En español, «oh Señor» marca con naturalidad la vocación directa en oración poética. No se usa «Yahvé» aquí porque el hebreo presenta el título אֲדֹנָי y no el Tetragrámaton.
theological_decisions:
- issue: Petición imprecatoria y fuerza retributiva
  english_pob_reading: Retain the prayer for divine repayment in direct terms without softening it.
  chosen_spanish_reading: Conservar una súplica directa para que Dios devuelva la afrenta sobre los ofensores, sin convertirla en una petición abstracta de justicia.
  alternative_spanish_readings:
  - Hazles justicia
  - págales según su culpa
  - retribúyelos con justicia
  rationale: El verso es una súplica imprecatoria y debe conservar su fuerza. «Devuelve... siete veces» mantiene el tono de retribución solicitada por el salmista. Evito suavizarlo con lenguaje genérico de justicia porque eso resolvería la tensión retórica del texto en vez de dejarla visible.
  doctrine_reference: 'Translation philosophy: Preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: 'Tomé en cuenta las revisiones del inglés POB sobre el orden de «to our neighbors» y «into their lap», pero en español opté por una estructura más natural: «a nuestros vecinos siete veces en su seno». Así se conserva el objeto indirecto, la intensificación numérica y la imagen corporal sin un orden forzado. También respeté la decisión de mantener la retribución imprecatoria explícita.'
  spanish_consistency_notes:
  - He mantenido «Señor» como vocativo para אֲדֹנָי, coherente con el tratamiento del título divino en este contexto.
  - He evitado introducir «Cristo», «SEÑOR» o sustituciones litúrgicas que no corresponden al hebreo de este verso.
  - «Vecinos» conserva la ambigüedad contextual entre vecinos literales y pueblos circundantes, como en el inglés auditado.
  - La nota al pie ofrece la alternativa «regazo» para reflejar el campo semántico de חֵיק sin imponerla en el texto principal.
