translation:
  language: es
  text: Por tanto, he aquí que vienen días —declara Yahvé— en que castigaré sus imágenes talladas[a], y en toda su tierra gemirán los heridos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «sus ídolos». El hebreo designa específicamente imágenes cultuales talladas.
    reason: lexical_alternative
lexical_decisions:
- source_word: לָכֵן
  english_pob_choice: Therefore
  chosen_spanish: Por tanto
  alternatives_spanish:
  - Por eso
  - Así que
  lexicon: HALOT
  rationale: Expresa con naturalidad la relación inferencial con el juicio precedente sin perder el valor conclusivo del hebreo.
- source_word: הִנֵּה
  english_pob_choice: behold
  chosen_spanish: he aquí
  alternatives_spanish:
  - mira
  - he aquí
  lexicon: HALOT
  rationale: Conserva el deíctico profético y su tono solemne en un español bíblico todavía claro.
- source_word: יָמִים בָּאִים
  english_pob_choice: days are coming
  chosen_spanish: vienen días
  alternatives_spanish:
  - se acercan días
  - los días vienen
  lexicon: HALOT
  rationale: Mantiene el anuncio profético de futuro cercano con una formulación natural en español.
- source_word: נְאֻם יְהוָה
  english_pob_choice: declares Yahweh
  chosen_spanish: declara Yahvé
  alternatives_spanish:
  - dice Yahvé
  - oráculo de Yahvé
  lexicon: HALOT
  rationale: Sigue el nombre divino establecido por el proyecto y conserva la fórmula profética autoritativa con una equivalencia idiomática directa.
- source_word: וּפָקַדְתִּי עַל
  english_pob_choice: I will punish
  chosen_spanish: castigaré
  alternatives_spanish:
  - visitaré con castigo
  - pediré cuenta de
  lexicon: HALOT
  rationale: En contexto de juicio, פקד על expresa intervención punitiva; 'castigaré' comunica esa fuerza judicial de modo natural sin suavizarla.
- source_word: פְּסִילֶיהָ
  english_pob_choice: her carved images
  chosen_spanish: sus imágenes talladas
  alternatives_spanish:
  - sus ídolos
  - sus imágenes esculpidas
  lexicon: HALOT
  rationale: '''Imágenes talladas'' preserva el sentido concreto de פסילים como objetos cultuales labrados, evitando sustituirlo sin necesidad por el más interpretativo ''ídolos''.'
- source_word: וּבְכָל אַרְצָהּ
  english_pob_choice: throughout all her land
  chosen_spanish: por toda su tierra
  alternatives_spanish:
  - en toda su tierra
  - a lo largo de toda su tierra
  lexicon: HALOT
  rationale: Reproduce el alcance distributivo del juicio sobre todo el territorio con una expresión idiomática y fluida.
- source_word: יֶאֱנֹק
  english_pob_choice: will groan
  chosen_spanish: gemirá
  alternatives_spanish:
  - se lamentará
  - gimirá
  lexicon: HALOT
  rationale: El verbo denota gemido o quejido bajo sufrimiento; 'gemirá' conserva bien ese valor y suena natural en español bíblico.
- source_word: חָלָל
  english_pob_choice: the wounded
  chosen_spanish: el herido
  alternatives_spanish:
  - el herido de muerte
  - el muerto
  - los heridos
  lexicon: HALOT
  rationale: Sigue la revisión inglesa que entiende כאן חָלָל como un lesionado/vivo que gime; en español el singular colectivo se mantiene como 'el herido' para reflejar la forma hebrea sin forzar pluralización.
theological_decisions:
- issue: Nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: Se mantiene el Tetragrámaton como nombre propio divino, conforme al estándar del proyecto y sin ocultarlo tras un título en mayúsculas.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
translation_notes:
  revision_awareness: La redacción sigue la revisión más reciente del contexto inglés, que corrigió el matiz de חָלָל de 'los muertos' a 'el herido' para reflejar mejor a la persona sufriente que gime. También conserva la decisión revisada de verter פְּסִילִים como 'imágenes talladas' en vez de 'ídolos', con nota alternativa cuando el contexto español podría sugerir la lectura más interpretativa.
  spanish_consistency_notes:
  - Se usa 'Yahvé' de manera consistente para יְהוָה, no 'SEÑOR'.
  - Se mantiene el tono profético-formal de 'he aquí' y 'declara Yahvé'.
  - '''Imágenes talladas'' preserva el matiz material del término hebreo sin borrar la posible referencia cultual.'
  - '''El herido'' sigue la forma singular hebrea y la revisión inglesa; no se pluraliza innecesariamente.'
