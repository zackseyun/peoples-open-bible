  to: Terah tomó a Abram, su hijo, a Lot, hijo de Harán, su nieto[a], y a Sarai, su nuera, la esposa de Abram, su hijo; y salieron con ellos de Ur de los caldeos para ir a la tierra de Canaán. Llegaron hasta Harán y se establecieron allí[b].
