    rationale: '''Contó'' en español puede evocar narrar una historia. Aquí se trata de transmitir verbalmente lo dicho por Mardoqueo. ''Le dijo ... las palabras de Mardoqueo'' preserva mejor tanto el verbo de comunicación como la literalidad de דִּבְרֵי.'
