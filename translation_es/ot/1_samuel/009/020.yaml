translation:
  language: es
  text: Y en cuanto a las asnas que se te perdieron hace tres días, no pongas tu corazón en ellas, porque han sido halladas. ¿Y para quién es todo lo deseable de Israel[a]? ¿No es para ti y para toda la casa de tu padre[b]?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, «¿Y para quién es todo lo deseable en Israel?». La expresión hebrea puede referirse tanto a lo que Israel desea como a lo que es precioso o deseable en Israel.
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: «la casa de tu padre», expresión de hogar/clan más amplia que la familia nuclear inmediata.'
    reason: cultural_note
lexical_decisions:
- source_word: אֲתֹנוֹת
  english_pob_choice: donkeys
  chosen_spanish: asnas
  alternatives_spanish:
  - burras
  - burros (en sentido genérico)
  lexicon: HALOT
  rationale: El hebreo designa asnas, es decir, hembras del asno. En español, «asnas» conserva esa precisión sin sonar excesivamente técnica; mantiene el referente animal del texto y evita masculinizarlo sin necesidad.
- source_word: הָאֹבְדוֹת
  english_pob_choice: that were lost
  chosen_spanish: que se te perdieron
  alternatives_spanish:
  - las perdidas
  - que habían desaparecido
  lexicon: HALOT
  rationale: La forma hebrea presenta a las asnas como perdidas/missing. «Se te perdieron» comunica bien el estado resultante y conserva el vínculo con la segunda persona del original.
- source_word: הַיּוֹם שְׁלֹשֶׁת הַיָּמִים
  english_pob_choice: three days ago
  chosen_spanish: hace tres días
  alternatives_spanish:
  - desde hace tres días
  - tres días atrás
  lexicon: HALOT
  rationale: La expresión hebrea se entiende idiomáticamente como referencia a un hecho ocurrido tres días antes. «Hace tres días» es la equivalencia natural en español.
- source_word: אַל תָּשֶׂם אֶת־לִבְּךָ לָהֶם
  english_pob_choice: do not set your heart on them
  chosen_spanish: no pongas tu corazón en ellas
  alternatives_spanish:
  - no te preocupes por ellas
  - no dirijas tu corazón hacia ellas
  lexicon: HALOT
  rationale: Se conserva el idioma hebreo del corazón como centro de atención y preocupación. «No pongas tu corazón en ellas» es transparente y sigue de cerca la imagen original sin volverla meramente explicativa.
- source_word: נִמְצָאוּ
  english_pob_choice: they have been found
  chosen_spanish: ya fueron halladas
  alternatives_spanish:
  - han sido halladas
  - fueron encontradas
  lexicon: HALOT
  rationale: 'El nifal perfecto transmite un resultado presente: las asnas ya están encontradas. «Ya fueron halladas» expresa con naturalidad ese valor resultativo en español.'
- source_word: חֶמְדַּת יִשְׂרָאֵל
  english_pob_choice: the desire of Israel
  chosen_spanish: todo lo deseable de Israel
  alternatives_spanish:
  - el deseo de Israel
  - todo lo precioso de Israel
  lexicon: HALOT
  rationale: 'La frase hebrea es comprimida y ambigua: puede referirse a lo que Israel desea o a lo que es deseable/precioso en Israel. «Todo lo deseable de Israel» preserva esa tensión mejor que una resolución interpretativa más específica.'
- source_word: הֲל֣וֹא
  english_pob_choice: Is it not
  chosen_spanish: ¿No es
  alternatives_spanish:
  - ¿Acaso no es?
  - ¿No es así?
  lexicon: HALOT
  rationale: La partícula introduce una pregunta retórica que espera asentimiento. «¿No es» mantiene la forma interrogativa y el tono persuasivo del hebreo.
- source_word: בֵּית אָבִיךָ
  english_pob_choice: your father's house
  chosen_spanish: la casa de tu padre
  alternatives_spanish:
  - la familia de tu padre
  - tu casa paterna
  lexicon: HALOT
  rationale: Se conserva la expresión hebrea de unidad doméstica y clan. «La casa de tu padre» es más fiel que reducirla a «familia», aunque la idea social sea más amplia que la familia nuclear.
theological_decisions:
- issue: Sentido de «todo lo deseable de Israel»
  english_pob_reading: A deliberately elevated, somewhat ambiguous rhetorical statement pointing to Saul and his family as the object/recipient of Israel's longing or what is desirable in Israel, without over-specifying kingship in the translation.
  chosen_spanish_reading: Una afirmación retórica elevada y ambigua que apunta a Saúl y a su casa como destinatarios de lo que Israel anhela o considera precioso, sin introducir explícitamente la idea de la realeza en el texto principal.
  alternative_spanish_readings:
  - una referencia directa al reino que Israel desea
  - una afirmación de que todo lo valioso en Israel pertenece a la casa de Saúl
  rationale: El hebreo es breve y cargado de matiz. Como el contexto inmediato sugiere la futura designación de Saúl, pero el versículo no dice explícitamente «reino» ni «rey», conviene preservar la ambigüedad en lugar de resolverla de antemano en la traducción.
  doctrine_reference: Preservar la tensión interpretativa donde el texto no la resuelve explícitamente.
translation_notes:
  revision_awareness: La revisión más reciente no introdujo cambios; el pasaje presenta alto grado de acuerdo y no requiere ajustes adicionales respecto del audit trail inglés.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como convención general del proyecto, pero este versículo no contiene el nombre divino.
  - Se usa «asnas» para reflejar con precisión el femenino del hebreo, en lugar del genérico «burros» o «asnos».
  - Se conserva la ambigüedad de חֶמְדַּת יִשְׂרָאֵל mediante una frase española igualmente abierta.
  - «La casa de tu padre» se preserva como unidad social/clánica, no como simple familia nuclear.
