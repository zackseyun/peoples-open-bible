translation:
  language: es
  text: La lengua de los sabios presenta bien el conocimiento[a], pero la boca de los necios derrama[b] insensatez.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O ‘usa bien el conocimiento’, ‘adorna el conocimiento’ o ‘hace atractivo el conocimiento’. El verbo hebreo es causativo (‘hace bueno’) y puede referirse tanto al uso beneficioso del conocimiento como a presentarlo bien.
    reason: lexical_alternative
  - marker: b
    text: O ‘brota’ o ‘fluye abundantemente’. El verbo sugiere algo que sale en abundancia.
    reason: lexical_alternative
lexical_decisions:
- source_word: לְשׁוֹן
  english_pob_choice: tongue
  chosen_spanish: lengua
  alternatives_spanish:
  - lengua
  - lenguaje
  - habla
  lexicon: HALOT
  rationale: ‘לְשׁוֹן’ nombra literalmente la lengua como órgano, y en proverbios conserva la imagen concreta del habla. En español, ‘lengua’ mantiene ese paralelismo sin sonar tan arcaico como ‘lengua’ en algunos registros bíblicos.
- source_word: חֲכָמִים
  english_pob_choice: the wise
  chosen_spanish: los sabios
  alternatives_spanish:
  - los sabios
  - las personas sabias
  - los prudentes
  lexicon: HALOT
  rationale: El plural sustantivado describe una clase de personas caracterizadas por sabiduría. ‘Los sabios’ es natural en español y preserva la categoría proverbial sin introducir un masculino específicamente restrictivo.
- source_word: תֵּיטִיב
  english_pob_choice: makes ... good
  chosen_spanish: hace bueno
  alternatives_spanish:
  - mejora
  - usa bien
  - adorna
  lexicon: HALOT
  rationale: 'El הִפְעִיל de יטב tiene fuerza causativa: ‘hacer bueno’ algo. ‘Hace bueno el conocimiento’ conserva esa causalidad y deja abierta la idea de usarlo bien o presentarlo bien, tal como indica el audit trail.'
- source_word: דָּעַת
  english_pob_choice: knowledge
  chosen_spanish: conocimiento
  alternatives_spanish:
  - entendimiento
  - conocimiento
  lexicon: HALOT
  rationale: En el paralelismo con ‘insensatez’, ‘conocimiento’ comunica bien el sentido epistémico y sapiencial del término. ‘Conocimiento’ es el equivalente más transparente en español moderno.
- source_word: וּפִי
  english_pob_choice: but the mouth
  chosen_spanish: pero la boca
  alternatives_spanish:
  - pero la boca
  - y la boca
  lexicon: HALOT
  rationale: Aunque el hebreo solo trae la conjunción, el contraste entre los dos hemistiquios exige ‘pero’ en español para reproducir la antítesis poética. ‘Boca’ conserva la imagen paralela a ‘lengua’.
- source_word: כְסִילִים
  english_pob_choice: fools
  chosen_spanish: necios
  alternatives_spanish:
  - necios
  - fools
  - insensatos
  lexicon: HALOT
  rationale: ‘כְסִילִים’ es un término sapiencial para quienes carecen de juicio moral e intelectual. ‘Necios’ funciona bien en español bíblico actual; además, mantiene la dureza evaluativa del proverbio.
- source_word: יַבִּיעַ
  english_pob_choice: pours out
  chosen_spanish: derrama
  alternatives_spanish:
  - derrama
  - brota
  - fluye abundantemente
  lexicon: HALOT
  rationale: El verbo presenta salida abundante e incontrolada. ‘Derrama’ comunica bien esa imagen en español y puede funcionar tanto con líquidos como con palabras; se evita un giro excesivamente explicativo.
- source_word: אִוֶּלֶת
  english_pob_choice: folly
  chosen_spanish: insensatez
  alternatives_spanish:
  - insensatez
  - necedad
  - fatuidad
  lexicon: HALOT
  rationale: ‘אִוֶּלֶת’ designa la cualidad abstracta del necio. ‘Insensatez’ expresa bien esa cualidad en español contemporáneo y mantiene el tono evaluativo del proverbio.
translation_notes:
  revision_awareness: Se corrigió la validación anterior incluyendo en el texto principal los marcadores [a] y [b] exactamente donde corresponden. La redacción conserva la antítesis sapiencial y la imagen corporal del hebreo.
  spanish_consistency_notes:
  - Se usó ‘Yahvé’ solo cuando el texto lo requiera; este verso no contiene el nombre divino.
  - ‘Sabios’ y ‘necios’ siguen la terminología sapiencial española habitual sin perder el matiz moral-intelectual.
  - Se mantuvo ‘lengua’ / ‘boca’ para conservar el paralelismo concreto del hebreo.
  - ‘Hace bueno el conocimiento’ conserva la fuerza causativa del verbo hebreo, con nota de alternativas para no ocultar la tensión semántica.
