review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien el sentido del hebreo y del POB inglés: vocativo ''hijo de hombre'', ''la casa de Israel'', lectura contextual de הַבַּיִת como ''el templo'', finalidad en ''para que se avergüencen'', y continuación exhortativa en וּמָדְדוּ. Sin embargo, la nota [b] está mal anclada semánticamente: en el POB inglés la nota b corresponde a תָּכְנִית (''plan/pattern/design''), no a ''se avergüencen''. Además, para español natural y más claro, ''y que midan el plano'' expresa mejor el jussivo/exhortativo y el valor arquitectónico de תָּכְנִית que ''y midan el diseño''.'
  spanish_quality_summary: El español es claro y digno, pero requiere un ajuste menor. 'Declara el templo a la casa de Israel' funciona, aunque suena algo literal; sigue siendo aceptable por fidelidad al orden auditado. La mejora principal es cambiar 'el diseño' por 'el plano', que en español bíblico-moderno comunica mejor la idea arquitectónica concreta, y usar 'y que midan' para una exhortación más natural tras la cláusula final. También conviene corregir las notas al pie para que correspondan a los anclajes reales del texto.
  glossary_alignment: 'La terminología principal está alineada con el proyecto: ''hijo de hombre'', ''casa de Israel'', ''templo'', ''iniquidades''. No hay conflictos con los glosarios mayores. La excepción relevante es תָּכְנִית: el borrador escogió ''diseño'', pero ''plano'' se ajusta mejor al rationale auditado (''architectural layout / blueprint-like form'') y a la legibilidad en español.'
  issues:
  - severity: medium
    issue: La nota [b] del borrador comenta 'para que sientan vergüenza', pero en el POB inglés la nota b pertenece a תָּכְנִית ('plan/pattern/design').
    rationale: Se altera la trazabilidad del audit trail y se documenta una alternativa distinta de la preservada por el POB. Las notas deben seguir el sentido y la ubicación del aparato auditado, salvo necesidad nueva del español.
  - severity: medium
    issue: '''el diseño'' es menos preciso que ''el plano'' para תָּכְנִית en este contexto arquitectónico.'
    rationale: El término hebreo apunta al trazado/disposición del templo. 'Diseño' puede sonar más abstracto o estético; 'plano' comunica mejor la idea concreta de layout.
  - severity: low
    issue: '''y midan'' es comprensible, pero ''y que midan'' suena más natural en español como exhortación dependiente tras ''para que...''.'
    rationale: Ayuda a reflejar el valor jussivo/exhortativo sin sugerir un imperativo independiente brusco.
  revised_spanish_text: En cuanto a ti[a], hijo de hombre, declara el templo a la casa de Israel, para que se avergüencen de sus iniquidades; y que midan el plano[b].
