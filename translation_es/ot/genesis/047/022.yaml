translation:
  language: es
  text: Solo la tierra de los sacerdotes no la compró, porque los sacerdotes tenían una asignación[a] de parte de Faraón, y comían su asignación que Faraón les había dado. Por eso no vendieron su tierra.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'una asignación fija', 'una porción' o 'una ración' de parte de Faraón. Aquí חֹק / חֻקָּם se refiere a una provisión asignada, no principalmente a un estatuto legal.
    reason: lexical_alternative
lexical_decisions:
- source_word: רַק
  english_pob_choice: Only
  chosen_spanish: Solo
  alternatives_spanish:
  - Únicamente
  - Solo y no otra cosa
  lexicon: HALOT
  rationale: Marca una excepción restringida respecto de lo anterior. "Solo" conserva bien el valor restrictivo en español actual sin sonar forzado.
- source_word: אַדְמַת הַכֹּהֲנִים
  english_pob_choice: the land of the priests
  chosen_spanish: la tierra de los sacerdotes
  alternatives_spanish:
  - la tierra de los sacerdotes
  - la tierra sacerdotal
  lexicon: HALOT
  rationale: El constructo hebreo indica la tierra perteneciente a los sacerdotes. "La tierra de los sacerdotes" es transparente y mantiene la relación posesiva sin introducir una paráfrasis.
- source_word: קָנָה
  english_pob_choice: buy
  chosen_spanish: compró
  alternatives_spanish:
  - adquirió
  - compró
  lexicon: HALOT
  rationale: En el contexto económico de la hambruna, el verbo denota compra de tierras. "Compró" es el equivalente natural y preciso en español.
- source_word: חֹק / חֻקָּם
  english_pob_choice: allotment
  chosen_spanish: asignación
  alternatives_spanish:
  - asignación fija
  - porción asignada
  - ración
  lexicon: HALOT
  rationale: Sigo la decisión inglesa de entender חֹק / חֻקָּם como provisión asignada, no como estatuto legal. "Asignación" comunica bien una provisión establecida por Faraón y evita el sentido jurídico primario de "ley" o "estatuto".
- source_word: מֵאֵת פַּרְעֹה
  english_pob_choice: from Pharaoh
  chosen_spanish: de parte de Faraón
  alternatives_spanish:
  - de Faraón
  - procedente de Faraón
  lexicon: HALOT
  rationale: מֵאֵת expresa procedencia/origen. "De parte de" explicita en español la idea de provisión proveniente de Faraón sin añadir contenido ajeno.
- source_word: וְאָכְלוּ אֶת חֻקָּם
  english_pob_choice: and they ate their allotment
  chosen_spanish: y comían su asignación
  alternatives_spanish:
  - y comían su porción
  - y consumían su ración
  lexicon: HALOT
  rationale: Conservo el verbo concreto "comían" y armonizo el sustantivo con la decisión anterior para mantener la repetición intencional del hebreo.
- source_word: אֲשֶׁר נָתַן לָהֶם פַּרְעֹה
  english_pob_choice: that Pharaoh gave them
  chosen_spanish: que Faraón les había dado
  alternatives_spanish:
  - que Faraón les dio
  - que les había dado Faraón
  lexicon: HALOT
  rationale: El pluscuamperfecto en español refleja bien la relación temporal de una provisión ya establecida antes del evento narrado.
- source_word: עַל כֵּן
  english_pob_choice: Therefore
  chosen_spanish: Por eso
  alternatives_spanish:
  - Por tanto
  - Así que
  lexicon: HALOT
  rationale: Introduce la conclusión lógica de manera natural en español. "Por eso" conserva la causalidad y el flujo narrativo.
- source_word: מָכְרוּ
  english_pob_choice: sell
  chosen_spanish: vendieron
  alternatives_spanish:
  - vendieron
  - enajenaron
  lexicon: HALOT
  rationale: Verbo comercial directo y natural; encaja con el contexto de la compra de tierras.
- source_word: אַדְמָתָם
  english_pob_choice: their land
  chosen_spanish: su tierra
  alternatives_spanish:
  - su tierra
  - su propiedad
  lexicon: HALOT
  rationale: Refiere a su terreno/propiedad agraria. "Su tierra" es la forma más natural en español y preserva la referencia territorial.
theological_decisions:
- issue: 'Sentido de חֹק / חֻקָּם: provisión asignada o estatuto legal'
  english_pob_reading: The Hebrew refers to an assigned provision rather than primarily to a legal statute.
  chosen_spanish_reading: asignación / provisión asignada
  alternative_spanish_readings:
  - estatuto
  - ley
  - decreto
  rationale: No se debe aplanar el término a "ley" en español, porque el contexto describe sustento económico provisto por Faraón. Mantener "asignación" preserva la tensión léxica entre norma y provisión, pero aquí favorece claramente la segunda.
  doctrine_reference: Lexical note on חֹק / חֻקָּם in context; no doctrinal controversy.
translation_notes:
  revision_awareness: El audit trail inglés indica alta concordancia y ninguna revisión aplicada; esta propuesta sigue de cerca esa lectura, preservando la excepción inicial y la interpretación de חֹק / חֻקָּם como provisión asignada.
  spanish_consistency_notes:
  - Se usa «Faraón» de forma consistente para פַּרְעֹה.
  - Se mantiene «asignación» para חֹק / חֻקָּם a lo largo del versículo para preservar la repetición hebrea.
  - Se opta por «su tierra» en el cierre para una lectura natural en español sin perder el sentido de posesión territorial.
