review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja con fidelidad el hebreo: וַיַּעֲזֹב = ‘abandonó’, יְהוָה = ‘Yahvé’, אֱלֹהֵי אֲבֹתָיו = ‘el Dios de sus padres’, y וְלֹא הָלַךְ בְּדֶרֶךְ יְהוָה = ‘y no anduvo en el camino de Yahvé’. La metáfora de ‘andar/camino’ preserva bien el modismo pactual.'
  spanish_quality_summary: 'El texto principal es natural, claro y digno en español. La única reparación necesaria está en la nota a: usa ‘SEÑOR’, lo cual contradice la política terminológica del proyecto para יהוה en español. Conviene ajustar esa nota para que la alternativa cite ‘Yahvé’/‘Jehová’ o explique que ‘SEÑOR’ corresponde a una convención tradicional, no a la forma principal del proyecto.'
  glossary_alignment: 'El cuerpo del versículo está bien alineado con el glosario del proyecto: ‘Yahvé’ para יהוה, ‘padres’ para אֲבֹתָיו, y ‘anduvo’/‘camino’ para el idiomatismo de הלך/דרך. La desalineación está solo en la nota alternativa que propone ‘SEÑOR’, en tensión con la directriz de no enmascarar el nombre divino en el texto español del proyecto.'
  issues:
  - severity: medium
    issue: La nota a propone ‘abandonó al SEÑOR’ como alternativa.
    rationale: Aunque el inglés auditado conserva ‘the LORD’ como alternativa idiomática inglesa, en español el proyecto exige ‘Yahvé’ en el texto principal y desalienta ‘SEÑOR’ como convención de enmascaramiento del Tetragrámaton. La nota, tal como está, introduce una alternativa terminológicamente desalineada.
  revised_spanish_text: Abandonó a Yahvé[a], el Dios de sus padres[b], y no anduvo en el camino de Yahvé.
  revised_footnotes:
  - marker: a
    text: 'O: «dejó a Yahvé»; tradicionalmente, «abandonó al SEÑOR».'
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: «el Dios de sus padres»; alternativamente, «el Dios de sus antepasados».'
    reason: lexical_alternative
  revision_rationale: Se conserva íntegro el texto principal porque es fiel y natural. Solo se ajusta la nota a para evitar que ‘SEÑOR’ aparezca como alternativa no contextualizada al nombre divino, manteniendo a la vez la información tradicional como nota secundaria y no como preferencia del proyecto.
