translation:
  language: es
  text: Y si no se les adelanta rápidamente[a], harán cosas mayores que estas[b], y no podrá detenerlos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «se anticipa a ellos rápidamente» o «los toma por delante rápidamente»; el verbo griego sugiere actuar antes que ellos o frustrarlos de antemano.
    reason: lexical_alternative
  - marker: b
    text: 'Literalmente: «cosas mayores que estas»; en contexto puede implicar acciones más serias o más extensas.'
    reason: lexical_alternative
lexical_decisions:
- source_word: προκαταλάβῃ
  english_pob_choice: get ahead of
  chosen_spanish: adelanta
  alternatives_spanish:
  - anticipa
  - se adelanta a
  - preemplace
  lexicon: LSJ
  rationale: El verbo griego expresa la idea de actuar antes que otros o de frustrarlos anticipadamente. «Adelanta» conserva esa noción de anticipación en un español natural; «se adelanta a» sería más explícito, pero algo más pesado, y «preemplace» suena demasiado técnico.
- source_word: διὰ τάχους
  english_pob_choice: quickly
  chosen_spanish: rápidamente
  alternatives_spanish:
  - con rapidez
  - sin demora
  - velozmente
  lexicon: LSJ
  rationale: La expresión idiomática pide una marca de prontitud. «Rápidamente» comunica bien la urgencia sin forzar el registro.
- source_word: μείζονα τούτων
  english_pob_choice: greater things than these
  chosen_spanish: cosas mayores que estas
  alternatives_spanish:
  - cosas más grandes que estas
  - cosas peores que estas
  - cosas más graves que estas
  lexicon: LSJ
  rationale: «Mayores» refleja de modo directo el comparativo griego. Aunque el contexto puede implicar algo más serio o más dañino, la forma española mantiene la tensión lexical sin resolverla demasiado pronto.
- source_word: κατασχεῖν
  english_pob_choice: restrain
  chosen_spanish: detenerlos
  alternatives_spanish:
  - refrenarlos
  - contenerlos
  - retenerlos
  lexicon: LSJ
  rationale: En este contexto político-militar, el sentido es impedir que actúen o avancen. «Detenerlos» es claro y natural en español; «refrenarlos» es posible, pero más marcado y menos inmediato.
- source_word: οὐ δυνήσεται
  english_pob_choice: he will not be able
  chosen_spanish: no podrá
  alternatives_spanish:
  - no será capaz de
  - no podrá hacerlo
  lexicon: LSJ
  rationale: El futuro de δύναμαι expresa incapacidad futura. «No podrá» es la equivalencia más idiomática y concisa.
translation_notes:
  revision_awareness: Fuente griega controlada con alta concordancia con el texto inglés auditado; no se registran revisiones aplicadas en el paquete y el dictamen de revisión fue de ‘sin cambios’.
  spanish_consistency_notes:
  - Se conservó el valor comparativo de μείζονα sin convertirlo explícitamente en «peores» o «más graves», para no cerrar una tensión contextual que el inglés POB también deja abierta.
  - Se evitó «SEÑOR» y otras convenciones de máscara teológica porque este versículo no contiene el tetragrámaton ni una cita divina directa.
  - El registro busca ser bíblico y publicable en español neutral, con sintaxis moderna y sin calco rígido.
