review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español sigue bien la estructura y el sentido general del griego: Judith avanza, saca la cabeza de la bolsa, la muestra, identifica a Holofernes con su rango, señala el κωνώπιον y atribuye la muerte a la acción del Señor por medio de una mujer. Sin embargo, dos elecciones no preservan del todo la fuerza del original y del audit trail: «lo hirió» debilita ἐπάταξεν, que aquí expresa un golpe decisivo y mortal, y «el Señor» no sigue la preferencia terminológica del proyecto para κύριος/YHWH cuando se refiere al Dios de Israel.'
  spanish_quality_summary: 'El español es mayormente claro y digno, pero «saliendo adelante» suena algo forzado; «adelantándose» o «avanzando» es más natural. «Miren» funciona, aunque «He aquí» encaja mejor con el registro solemne y con la repetición de ἰδοὺ. «Dosel» y «yacía» son buenas opciones. «En medio de sus borracheras» comunica la idea, pero «en su embriaguez» es más idiomático y evita un matiz coloquial. La sintaxis necesita un pequeño ajuste en «se la mostró» para explicitar mejor el complemento indirecto: «la mostró a ellos / se la mostró a ellos»; lo más natural es reformular la oración completa.'
  glossary_alignment: 'Hay una desviación relevante del glosario del proyecto: ὁ κύριος, referido al Dios de Israel, debe ir como «Yahvé» en el texto principal, no «el Señor», salvo razón documentada de excepción, que aquí no queda justificada. El resto de la terminología está bien alineado: «Asur» para Ἀσσούρ, «comandante en jefe» para ἀρχιστρατήγου, y «por mano de una mujer» preserva bien ἐν χειρὶ θηλείας.'
  issues:
  - severity: high
    issue: «el Señor» en lugar de «Yahvé»
    rationale: Las instrucciones del proyecto establecen «Yahvé» como forma por defecto en el texto principal para el nombre/título divino cuando se refiere al Dios de Israel. La justificación dada en el borrador apela a costumbre española, pero no supera la directriz explícita del proyecto.
  - severity: medium
    issue: «lo hirió» debilita ἐπάταξεν
    rationale: En este contexto, el verbo no describe una simple herida sino un golpe decisivo que resulta en la muerte de Holofernes. «Lo derribó» o «lo abatió» preserva mejor la fuerza semántica y la decisión teológica ya documentada en inglés («struck him down»).
  - severity: medium
    issue: «saliendo adelante» suena poco natural en español
    rationale: Aunque intenta reflejar προελθοῦσα, la expresión no es idiomática. «Adelantándose» conserva el movimiento hacia delante y mejora la fluidez.
  - severity: low
    issue: Falta nota para la alternativa léxica de κωνώπιον preservada en el audit trail inglés
    rationale: El inglés conserva la alternativa «mosquito net / bed-curtain» en nota. Como «dosel» es una opción interpretativa válida pero no exhaustiva, conviene mantener una nota española equivalente para preservar la evidencia léxica.
