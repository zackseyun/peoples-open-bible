base_translation:
  language: en
  yaml_path: translation/ot/judges/014/017.yaml
  text: She wept before him the seven days that they had the feast[a]. And on the seventh day he told her, because she pressed him hard[b]; then she told the riddle to the sons of her people.
  footnotes:
