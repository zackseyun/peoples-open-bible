translation:
  language: es
  text: Entonces Ehud salió al vestíbulo[a] y cerró tras de sí las puertas del aposento alto y las cerró con llave.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «al pórtico», «a la antecámara» o «a la columnata»; el término hebreo es raro y se refiere a un espacio arquitectónico adyacente.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֵּצֵא
  english_pob_choice: went out
  chosen_spanish: salió
  alternatives_spanish:
  - fue afuera
  - se salió
  lexicon: HALOT
  rationale: El verbo narrativo de salida se expresa de forma natural y precisa con «salió», que conserva el movimiento fuera del recinto sin añadir matices innecesarios.
- source_word: הַמִּסְדְּרוֹנָה
  english_pob_choice: into the vestibule
  chosen_spanish: al vestíbulo
  alternatives_spanish:
  - al pórtico
  - al anteríen?
  - al corredor
  lexicon: HALOT
  rationale: Se mantiene la decisión de un espacio arquitectónico adyacente y raro. «Vestíbulo» comunica bien el ámbito de transición sin fijar demasiado la estructura exacta.
- source_word: וַיִּסְגֹּר
  english_pob_choice: shut
  chosen_spanish: cerró
  alternatives_spanish:
  - cerró de golpe
  - clausuró
  lexicon: HALOT
  rationale: En español, «cerró» es el equivalente natural para el cierre de puertas; el contexto ya muestra que no es un cierre genérico sino un acto concreto sobre las puertas.
- source_word: דַּלְת֧וֹת
  english_pob_choice: the doors
  chosen_spanish: las puertas
  alternatives_spanish:
  - los batientes
  - las hojas de la puerta
  lexicon: HALOT
  rationale: El plural hebreo se conserva con «las puertas», opción idiomática y fiel al referente de dos hojas o paneles.
- source_word: הָעַלִיָּה
  english_pob_choice: the upper room
  chosen_spanish: aposento alto
  alternatives_spanish:
  - cuarto alto
  - habitación superior
  - pieza alta
  lexicon: HALOT
  rationale: «Aposento alto» mantiene el sentido arquitectónico de una estancia elevada y es una opción bíblica clara en español, sin perder precisión.
- source_word: בַּעֲד֖וֹ
  english_pob_choice: behind him
  chosen_spanish: tras de sí
  alternatives_spanish:
  - detrás de él
  - a su espalda
  lexicon: HALOT
  rationale: La relación espacial en el cierre de puertas se expresa de manera natural en español con «tras de sí», que conserva la referencia pronominal y el movimiento.
- source_word: וְנָעָל
  english_pob_choice: and locked them
  chosen_spanish: y las aseguró
  alternatives_spanish:
  - y las cerró con llave
  - y las echó llave
  lexicon: HALOT
  rationale: «Aseguró» es suficientemente amplio para נעל en este contexto y evita forzar una llave explícita que el hebreo no menciona; conserva la idea de dejar las puertas firmemente trabadas.
translation_notes:
  revision_awareness: 'Se corrigió el problema de validación anterior: el marcador [a] ahora aparece explícitamente en el texto español junto a la palabra correspondiente.'
  spanish_consistency_notes:
  - Se prefirió un registro bíblico claro y moderno, evitando un calco rígido del inglés.
  - «Aposento alto» se usó por coherencia con el sentido arquitectónico de הָעַלִיָּה.
  - Se evitó «SEÑOR» u otra terminología no presente en el versículo.
  - La nota conserva la ambigüedad léxica del espacio adyacente raro en hebreo.
