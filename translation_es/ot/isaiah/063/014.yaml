    rationale: נִהַגְתָּ suele expresar conducir/dirigir; «condujiste» refleja mejor la imagen de pastoreo y éxodo, aunque «guiaste» no es incorrecto.
  revised_spanish_text: Como el ganado que baja al valle[a], el Espíritu de Yahvé les dio descanso; así condujiste a tu pueblo, para hacerte un nombre glorioso[b].
  revised_footnotes:
