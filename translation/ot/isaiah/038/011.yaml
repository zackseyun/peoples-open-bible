theological_decisions:
- issue: Rendering of the divine name form יָהּ rather than יְהוָה
  chosen_reading: Yah, Yah
  alternative_readings:
  - the LORD, the LORD
  - Yahweh, Yahweh
  rationale: The doctrine table gives 'the LORD' as the default for יְהוָה, but this verse uses the shorter poetic form יָהּ twice. Preserving 'Yah' reflects the actual Hebrew form and avoids conflating it with the full tetragrammaton. The repetition is retained for poetic emphasis.
  doctrine_reference: 'DOCTRINE.md: Original-language primacy over translation tradition; Contested terms table for יְהוָה applies specifically to YHWH'
