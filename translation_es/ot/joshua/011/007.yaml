review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la secuencia y el sentido general del hebreo: Josué y todo el pueblo de guerra vienen contra ellos, de repente, junto a las aguas de Merom, y los atacan. Sin embargo, hay un problema claro de concordancia verbal en la última cláusula: וַיִּפְּלוּ es plural (''cayeron''), no singular. Dado que el sujeto compuesto es ''Josué y todo el pueblo de guerra con él'', el español debe mantener el plural.'
  spanish_quality_summary: El español es generalmente claro y digno, pero 'vino ... y cayó' suena gramaticalmente defectuoso por el cambio injustificado a singular con un sujeto compuesto. 'Pueblo de guerra' es una opción algo rígida pero defendible por fidelidad al rastro léxico del POB; no exige rechazo. La puntuación con comas alrededor de 'y todo el pueblo...' es aceptable, aunque puede aligerarse.
  glossary_alignment: No hay términos teológicos sensibles aquí. 'Josué' es correcto. La decisión de mantener 'pueblo de guerra' sigue la revisión inglesa 'people of war' y conserva el valor colectivo de עַם sin introducir 'ejército'. 'Merom' está bien. La nota al pie [a] está mal formulada porque ofrece como alternativa exactamente la misma expresión ya usada en el texto; debe ofrecer la opción léxica real preservada por el inglés ('pueblo guerrero' o similar) y la tradicional 'hombres de guerra'.
  issues:
  - severity: high
    issue: Concordancia verbal incorrecta en 'cayó sobre ellos'
    rationale: El hebreo וַיִּפְּלוּ está en plural, y el sujeto explícito es compuesto ('Josué y todo el pueblo de guerra con él'). En español estándar debe ser 'cayeron sobre ellos'.
  - severity: medium
    issue: La nota al pie [a] repite el texto principal en lugar de dar una alternativa real
    rationale: El texto principal ya dice 'pueblo de guerra'; la nota 'O «el pueblo de guerra»...' no informa nada. Debe reflejar una alternativa léxica significativa, en paralelo con el audit trail inglés.
  - severity: low
    issue: '''Pueblo de guerra'' es algo poco idiomático en español'
    rationale: Aunque es comprensible y bastante literal, suena rígido. Aun así, puede mantenerse por fidelidad al razonamiento léxico documentado, siempre que la lectura general sea fluida.
  revised_spanish_text: Entonces Josué[a] y todo el pueblo de guerra con él vinieron contra ellos de repente, junto a las aguas de Merom, y cayeron sobre ellos.
  revised_footnotes:
  - marker: a
    text: O «todo el pueblo guerrero», tradicionalmente «los hombres de guerra».
    reason: lexical_alternative
  revision_rationale: Se corrigió la concordancia verbal al plural para reflejar fielmente el hebreo y el sujeto compuesto. También se reparó la nota al pie para que ofrezca una alternativa léxica real en vez de repetir el texto principal. Se mantuvo 'pueblo de guerra' por continuidad con la decisión léxica auditada y por fidelidad al valor colectivo de עַם הַמִּלְחָמָה.
