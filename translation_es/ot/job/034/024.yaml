  rationale: 'Se ajusta la redacción para un español más natural y eclesialmente legible, manteniendo el mismo sentido auditado: Dios actúa contra los poderosos sin necesidad de pesquisa previa y coloca a otros en reemplazo. «Sin indagar» evita el calco rígido «sin investigación», y «destroza» conserva la fuerza de juicio de יָרֹעַ sin sugerir innecesariamente desmembramiento literal.'
  reviewer_model: gpt-5.4
