translation:
  language: es
  text: Y vi hasta que salieron cuernos[a] para esos corderos, y los cuervos derribaron sus cuernos. Y vi hasta que brotó un gran cuerno sobre uno de esos corderos[b][c], y se abrieron sus ojos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El etíope usa literalmente 'cuernos' incluso para estos animales; la imagen es simbólica de fuerza o autoridad, no una precisión zoológica.
    reason: lexical_alternative
  - marker: b
    text: 'La frase final puede implicar una percepción restaurada o una comprensión renovada dentro de la visión: literalmente, ''se abrieron sus ojos''.'
    reason: lexical_alternative
  - marker: c
    text: 'O: «esos venados».'
    reason: previous_rendering
lexical_decisions:
- source_word: መኃስእ
  english_pob_choice: those lambs
  chosen_spanish: esos corderos
  alternatives_spanish:
  - esos animales jóvenes
  - esos corderillos
  lexicon: Leslau, Comparative Dictionary of Ge'ez; English POB audit trail correction
  rationale: El contexto del Apocalipsis de los Animales pide mantener el código zoomórfico del rebaño. En español, 'corderos' es la equivalencia directa y natural para el animal joven del rebaño; 'deer' del borrador inglés anterior fue corregido en la revisión auditada, y no corresponde aquí.
- source_word: አቅርንት
  english_pob_choice: horns
  chosen_spanish: cuernos
  alternatives_spanish:
  - astas
  - cornamenta
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: '''Cuernos'' conserva el símbolo apocalíptico de poder/autoridad y reproduce la imagen del texto sin zoologizarla ni suavizarla con una perífrasis.'
- source_word: ቋንት
  english_pob_choice: ravens
  chosen_spanish: cuervos
  alternatives_spanish:
  - cornejas
  - córvidos
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: '''Cuervos'' es la imagen castellana más estable y clara para el ave carroñera hostil del visionario; mantiene el tono simbólico mejor que un término genérico.'
- source_word: ያወድቅዎሙ
  english_pob_choice: cast down
  chosen_spanish: derribaron
  alternatives_spanish:
  - hicieron caer
  - tumbaron
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El verbo causativo pide una acción enérgica y visible. 'Derribaron' preserva la fuerza de la escena y funciona bien con 'cuernos' en español.
- source_word: በቈለ
  english_pob_choice: sprouted
  chosen_spanish: brotó
  alternatives_spanish:
  - creció
  - surgió
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: '''Brotó'' mantiene la imagen orgánica de emerger como un vástago o retoño, sin perder el matiz visionario del cuerno que aparece.'
- source_word: ፩ቀርን ዓቢይ
  english_pob_choice: one great horn
  chosen_spanish: un gran cuerno
  alternatives_spanish:
  - un cuerno grande
  - un cuerno poderoso
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: '''Gran cuerno'' conserva la elevación retórica del texto y refleja bien la combinación numeral + adjetivo con su peso simbólico.'
- source_word: አባግዕ
  english_pob_choice: sheep
  chosen_spanish: corderos
  alternatives_spanish:
  - ovejas
  - rebaño
  lexicon: Dillmann, Lexicon Linguae Aethiopicae; contextual correction from the audit trail
  rationale: Aunque el etíope puede designar 'ovejas' en el marco general, aquí el contexto inmediato y la revisión auditada favorecen 'corderos' para los animales jóvenes del pasaje. Esto preserva la coherencia interna del capítulo y evita una imagen demasiado general.
- source_word: ተከሥተ አዕይንቲሆሙ
  english_pob_choice: their eyes were opened
  chosen_spanish: se abrieron sus ojos
  alternatives_spanish:
  - les fueron abiertos los ojos
  - recobraron la vista
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La pasiva se conserva de modo directo. 'Se abrieron sus ojos' mantiene la ambigüedad apocalíptica entre visión, revelación y percepción dentro de la escena.
theological_decisions:
- issue: Si identificar en el texto principal a la figura simbolizada por el gran cuerno nuevo
  english_pob_reading: Translate descriptively without identifying the figure in the main text
  chosen_spanish_reading: Traducción descriptiva sin identificación explícita
  alternative_spanish_readings:
  - un cuerno que representa a Judas Macabeo
  - el Mesías / el Cristo
  rationale: El versículo presenta la imagen, no su explicación histórica. La traducción debe conservar la forma visionaria y dejar la identificación para notas o comentario, evitando resolver una tensión interpretativa que el texto no resuelve aquí.
  doctrine_reference: Preserve theological tension rather than resolve it
translation_notes:
  revision_awareness: Se siguió la corrección auditada frente al borrador anterior que leía 'deer'; la revisión confirma que መኃስእ en este contexto debe reflejar animales jóvenes del rebaño, por lo que se adoptó 'corderos' en el texto principal. También se preservó el valor simbólico de 'cuernos' y la apertura de los ojos sin añadir identificación histórica al gran cuerno.
  spanish_consistency_notes:
  - Se mantiene 'cuernos' para el símbolo apocalíptico de poder, en coherencia con la POB en inglés.
  - Se usa 'corderos' para መኃስእ en consonancia con la corrección auditada del pasaje y la lógica zoomórfica del capítulo.
  - '''Se abrieron sus ojos'' conserva la pasiva y la ambigüedad revelatoria del original.'
  - No se introduce 'Cristo' ni otra identificación teológica en el texto principal, porque el pasaje no la explicita.
