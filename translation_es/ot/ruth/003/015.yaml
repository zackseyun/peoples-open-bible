translation:
  language: es
  text: 'Entonces él dijo: «Trae el manto que está sobre ti y sostenlo extendido». Ella lo sostuvo, y él midió seis medidas de cebada[a] y las puso sobre ella[b]. Luego él entró en la ciudad.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «seis cebadas»; la unidad no está expresada, por lo que en español se suministra «medidas» para que el sentido sea claro.'
    reason: lexical_alternative
  - marker: b
    text: 'Algunas versiones antiguas y muchas traducciones leen: «Entonces ella entró en la ciudad». El texto masorético dice: «Entonces él entró en la ciudad».'
    reason: textual_variant
lexical_decisions:
- source_word: הָבִי
  english_pob_choice: Bring
  chosen_spanish: Trae
  alternatives_spanish:
  - Tráelo aquí
  - Dame
  lexicon: HALOT
  rationale: El imperativo femenino singular pide que Rut presente el manto. «Trae» es natural en español y conserva la fuerza de la orden sin volverla más interpretativa de lo necesario.
- source_word: הַמִּטְפַּחַת
  english_pob_choice: the cloak
  chosen_spanish: el manto
  alternatives_spanish:
  - el chal
  - la capa
  - el envoltorio
  lexicon: HALOT
  rationale: El término designa una prenda exterior o un lienzo que puede servir para sostener grano. «Manto» comunica una prenda amplia y apta para cargar, evitando la posible limitación de «velo».
- source_word: וְאֶחֳזִי בָהּ
  english_pob_choice: and hold it out
  chosen_spanish: y agárralo
  alternatives_spanish:
  - y sostenlo
  - y sujétalo
  - y extiéndelo
  lexicon: HALOT
  rationale: El verbo אחז expresa tomar o sujetar. Como el contexto muestra que la prenda iba a recibir cebada, «agárralo» conserva la acción concreta sin añadir más de lo que dice el hebreo.
- source_word: וַיָּמָד
  english_pob_choice: he measured
  chosen_spanish: midió
  alternatives_spanish:
  - midió y apartó
  - mide
  lexicon: HALOT
  rationale: מדד/מודד se refiere a medir o dosificar. «Midió» mantiene la idea de una cantidad deliberada de grano.
- source_word: שֵׁשׁ שְׂעֹרִים
  english_pob_choice: six measures of barley
  chosen_spanish: seis medidas de cebada
  alternatives_spanish:
  - seis porciones de cebada
  - seis de cebada
  - seis seás de cebada
  lexicon: HALOT
  rationale: El hebreo dice literalmente «seis cebadas», omitiendo la unidad. En español hace falta completar el sentido; «medidas» conserva la cautela del inglés POB y evita especificar una unidad que el texto no nombra.
- source_word: וַיָּשֶׁת עָלֶיהָ
  english_pob_choice: and put it on her
  chosen_spanish: y la puso sobre ella
  alternatives_spanish:
  - y la colocó sobre ella
  - y la cargó sobre ella
  - y la puso encima de ella
  lexicon: HALOT
  rationale: El objeto implícito es la cebada medida en la prenda. «La puso sobre ella» mantiene la imagen física del grano colocado sobre Rut, sin resolver de más si va sobre la persona o sobre el manto que ella sostiene.
- source_word: וַיָּבֹא הָעִיר
  english_pob_choice: Then he went into the city
  chosen_spanish: Luego él entró en la ciudad
  alternatives_spanish:
  - Luego ella entró en la ciudad
  lexicon: HALOT
  rationale: El verbo masculino del texto masorético apunta a «él». «Entró en la ciudad» sigue el hebreo; se evita corregir el sujeto según una reconstrucción narrativa. La alternativa queda registrada por la variante textual conocida.
theological_decisions:
- issue: 'Sujeto del último miembro: וַיָּבֹא הָעִיר'
  english_pob_reading: Then he went into the city
  chosen_spanish_reading: Luego él entró en la ciudad
  alternative_spanish_readings:
  - Luego ella entró en la ciudad
  rationale: No es una cuestión doctrinal, pero sí una variante textual e interpretativa importante. El texto masorético presenta verbo masculino; por fidelidad al original se mantiene «él» en el texto principal, dejando constancia de la lectura alternativa transmitida por otras versiones antiguas y traducciones.
  doctrine_reference: Transparencia textual; fidelidad al testimonio masorético
translation_notes:
  revision_awareness: 'El texto base en inglés sigue de cerca el hebreo y ya documenta dos decisiones clave: añadir una unidad implícita para «seis cebadas» y conservar la variante textual del sujeto final. La redacción española sigue esas mismas decisiones, manteniendo la transparencia textual y evitando introducir especificaciones no atestiguadas. No hay revisiones previas aplicadas en el paquete fuente.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» solo cuando aparezca el nombre divino; este versículo no lo contiene.
  - «Manto» se usa como equivalente funcional de הַמִּטְפַּחַת, sin reducirlo a un simple velo.
  - Se conserva el sujeto masculino del final según el texto masorético, con nota de variante.
  - La puntuación y el diálogo siguen un estilo bíblico moderno, claro y publicable en español.
