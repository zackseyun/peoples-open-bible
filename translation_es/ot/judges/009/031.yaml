translation:
  language: es
  text: 'Y envió mensajeros a Abimelec en secreto[a], diciendo: «Mira, Gaal hijo de Ebed y sus hermanos han venido a Siquem, y mira, están asediando la ciudad en contra tuya».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «secretamente». El hebreo indica una acción oculta; el contexto puede sugerir también una maniobra encubierta o estratégica, pero no exige especificar más.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּשְׁלַח
  english_pob_choice: And he sent
  chosen_spanish: Y envió
  alternatives_spanish:
  - Entonces envió
  - Y mandó
  lexicon: HALOT
  rationale: El waw narrativo se vierte naturalmente con un perfecto simple en español. «Y envió» conserva el avance narrativo sin añadir una temporalidad explícita que el hebreo no exige.
- source_word: מַלְאָכִים
  english_pob_choice: messengers
  chosen_spanish: mensajeros
  alternatives_spanish:
  - enviados
  - embajadores
  lexicon: HALOT
  rationale: En este contexto político y militar se trata de agentes humanos portadores de un mensaje, no de seres celestiales. «Mensajeros» es la opción más directa y transparente.
- source_word: בְּתָרְמָה
  english_pob_choice: secretly
  chosen_spanish: secretamente
  alternatives_spanish:
  - en secreto
  - con astucia
  - engañosamente
  lexicon: HALOT
  rationale: La frase indica una acción oculta o encubierta al enviar el mensaje. «Secretamente» comunica bien ese matiz en español sin cargarlo más allá de lo que el contexto obliga. Se mantiene la tensión entre ocultamiento y posible maniobra estratégica.
- source_word: לֵאמֹר
  english_pob_choice: saying
  chosen_spanish: diciendo
  alternatives_spanish:
  - para decir
  - y dijo
  lexicon: HALOT
  rationale: Es la introducción estándar del discurso directo. «Diciendo» conserva la forma narrativa de manera natural en español.
- source_word: הִנֵּה
  english_pob_choice: Look
  chosen_spanish: Mira
  alternatives_spanish:
  - Mira, pues
  - He aquí
  - Observa
  lexicon: HALOT
  rationale: La partícula funciona como llamada de atención dentro del reporte. «Mira» reproduce esa fuerza discursiva con claridad y sin arcaísmo.
- source_word: גַעַל בֶּן עֶבֶד
  english_pob_choice: Gaal son of Ebed
  chosen_spanish: Gaal hijo de Ebed
  alternatives_spanish:
  - Gaal, hijo de Ebed
  - Gaal el hijo de Ebed
  lexicon: HALOT
  rationale: Se conserva la construcción filial con nombres propios transliterados. «Hijo de» es la forma natural y fiel en español.
- source_word: וְאֶחָיו
  english_pob_choice: and his brothers
  chosen_spanish: y sus hermanos
  alternatives_spanish:
  - y sus parientes
  - y sus hermanos de clan
  lexicon: HALOT
  rationale: El hebreo dice literalmente «sus hermanos». Aunque en contexto pueda referirse a allegados o asociados, en la traducción se preserva el término fuente antes que generalizarlo.
- source_word: בָּאִים שְׁכֶמָה
  english_pob_choice: have come to Shechem
  chosen_spanish: han venido a Siquem
  alternatives_spanish:
  - han llegado a Siquem
  - vienen a Siquem
  lexicon: HALOT
  rationale: El participio con terminación direccional puede verse como llegada con relevancia actual. «Han venido» refleja bien ese valor perfectivo y resulta natural en español.
- source_word: וְהִנָּם
  english_pob_choice: and look, they are
  chosen_spanish: y mira
  alternatives_spanish:
  - y he aquí
  - y de hecho
  lexicon: HALOT
  rationale: La segunda partícula retoma el recurso de atención. En español puede integrarse de forma sobria con «y mira», evitando duplicar innecesariamente la marcación enfática.
- source_word: צָרִים אֶת הָעִיר עָלֶיךָ
  english_pob_choice: they are besieging the city against you
  chosen_spanish: están sitiando la ciudad contra ti
  alternatives_spanish:
  - están acosando la ciudad contra ti
  - están presionando la ciudad contra ti
  - están poniendo la ciudad en tu contra
  lexicon: HALOT
  rationale: 'Se mantiene la lectura formal adoptada en el inglés revisado: el verbo puede tener el sentido de «sitio/asedio» o de presión hostil. Dado que la revisión del POB privilegió «besieging», «sitiando» preserva el registro y la conexión con el hebreo, sin cerrar del todo la posible tensión contextual con una incitación política.'
translation_notes:
  revision_awareness: El texto en inglés pasó por una revisión que sustituyó una paráfrasis interpretativa por una lectura más formal de צָרִים, pasando de «stirring up the city» a «besieging the city». La versión española sigue esa decisión revisada y conserva, mediante la nota, la posible amplitud semántica del verbo en contexto.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma del proyecto solo cuando aparezca el nombre divino; en este versículo no se aplica.
  - Se traduce el verbo clave con «sitiando» para respetar la revisión formal del POB en inglés, evitando debilitarlo con una paráfrasis libre.
  - «Secretamente» lleva nota porque el hebreo admite «en secreto» y porque en español ambas formas son posibles según el matiz que se quiera destacar.
  - 'Los nombres propios se transliteran de manera uniforme: Abimelec, Gaal, Ebed, Siquem.'
