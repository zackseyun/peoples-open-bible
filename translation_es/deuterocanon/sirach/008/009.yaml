revisions:
- from: No te jactes[a] sobre uno que está muriendo; recuerda[b] que todos nosotros estamos siendo recogidos.
  to: No te jactes[a] de alguien que se está muriendo; recuerda que todos nosotros estamos siendo reunidos.[b][c]
  rationale: Se ajusta la sintaxis para un español más natural ('de alguien que se está muriendo'), se cambia 'recogidos' por 'reunidos' para preservar mejor la metáfora hebrea con buena legibilidad, y se añade la nota de variante textual griega exigida por el audit trail inglés.
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T23:44:49Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue correctamente el hebreo base frente a la variante griega y preserva bien la estructura imperativa: prohibición + motivo recordatorio. ''No te jactes'' refleja adecuadamente תתהלל y ''uno que está muriendo'' conserva el participio de גֹּוֵעַ. Sin embargo, ''sobre uno que está muriendo'' suena menos natural que ''de quien se está muriendo'' o ''por alguien que se está muriendo''; además, para נֶאֱסָפִים, ''estamos siendo recogidos'' preserva la metáfora pero resulta poco idiomático en español bíblico legible. ''Estamos siendo reunidos'' mantiene mejor la imagen de אסף sin sugerir recolección de objetos.'
  spanish_quality_summary: 'La redacción es generalmente clara, pero tiene dos tropiezos de naturalidad: ''sobre uno que está muriendo'' es un calco poco fluido, y ''siendo recogidos'' suena mecánico y objetual. Una leve revisión mejora la dignidad y legibilidad sin perder literalidad. También conviene añadir en notas la variante griega, ya que el inglés la preserva y es una decisión textual significativa del registro.'
  glossary_alignment: 'No hay conflictos con la terminología troncal del proyecto. Las decisiones léxicas principales son aceptables. La mejoría propuesta afecta solo la naturalidad semántica de עַל y la imagen de נֶאֱסָפִים: ''de alguien que se está muriendo'' para el primero y ''estamos siendo reunidos'' para el segundo.'
  issues:
  - severity: medium
    issue: La preposición 'sobre' en 'No te jactes ... sobre uno que está muriendo' suena calcada y poco natural en español.
    rationale: Aunque עַל puede equivaler a 'over', en español con 'jactarse' se prefiere una construcción más idiomática como 'de alguien' o una reformulación semejante. La meta es conservar el sentido de gloriarse ante la muerte ajena sin madera sintáctica.
  - severity: medium
    issue: '''Estamos siendo recogidos'' para נֶאֱסָפִים conserva la metáfora pero suena poco idiomático y demasiado material.'
    rationale: En español, 'recoger' aplicado a personas en este contexto puede sugerir rescate o recolección. 'Reunidos' refleja mejor el campo semántico de אסף y mantiene el eufemismo de muerte con más dignidad y claridad.
  - severity: medium
    issue: Falta la nota sobre la fuerte divergencia de la tradición griega paralela.
    rationale: El audit trail inglés conserva esta nota textual como información significativa sobre la elección del hebreo Cairo Geniza como base. Debe preservarse también en español.
  revised_spanish_text: No te jactes[a] de alguien que se está muriendo; recuerda que todos nosotros estamos siendo reunidos.[b][c]
