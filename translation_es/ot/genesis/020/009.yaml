translation:
  language: es
  text: 'Entonces Abimelec llamó a Abraham y le dijo: «¿Qué nos has hecho? ¿Y en qué he pecado contra ti[a], para que hayas traído sobre mí y sobre mi reino un gran pecado? Has hecho conmigo cosas que no se deben hacer[b]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «¿qué pecado he cometido contra ti?»'
    reason: lexical_alternative
  - marker: b
    text: 'O: «cosas que no deben hacerse».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּקְרָא
  english_pob_choice: called
  chosen_spanish: llamó
  alternatives_spanish:
  - convocó
  - mandó llamar
  lexicon: HALOT
  rationale: קרא con לְ + persona expresa llamar a alguien; «llamó» conserva la naturalidad narrativa sin añadir un matiz oficial más fuerte que el hebreo exige.
- source_word: מֶה עָשִׂיתָ לָּנוּ
  english_pob_choice: What have you done to us?
  chosen_spanish: ¿Qué has hecho con nosotros?
  alternatives_spanish:
  - ¿Qué nos has hecho?
  - ¿Qué hiciste con nosotros?
  lexicon: HALOT
  rationale: La pregunta directa reproduce el tono acusatorio y el perfecto puede verterse de forma natural en español con presente perfecto, manteniendo el impacto actual de la acción.
- source_word: וּמֶה חָטָאתִי לָךְ
  english_pob_choice: how have I sinned against you
  chosen_spanish: ¿en qué he pecado contra ti?
  alternatives_spanish:
  - ¿cómo he pecado contra ti?
  - ¿qué pecado he cometido contra ti?
  lexicon: HALOT
  rationale: חטא aquí conserva fuerza moral-religiosa; «pecado contra ti» mantiene esa tensión mejor que un simple «agraviado». En español, «en qué» suena más natural que un literal «cómo».
- source_word: הֵבֵאתָ עָלַי וְעַל מַמְלַכְתִּי
  english_pob_choice: you have brought ... on me and on my kingdom
  chosen_spanish: has traído sobre mí y sobre mi reino
  alternatives_spanish:
  - has acarreado sobre mí y sobre mi reino
  - has puesto sobre mí y sobre mi reino
  lexicon: HALOT
  rationale: El hiphil de בוא expresa traer/causar que algo venga sobre alguien; «traído sobre» conserva esa imagen y el encaje con la consecuencia lamentada.
- source_word: חֲטָאָה גְדֹלָה
  english_pob_choice: a great sin
  chosen_spanish: un gran pecado
  alternatives_spanish:
  - un gran pecado/guilt
  - una gran culpa
  lexicon: HALOT
  rationale: El sustantivo חטאה admite «pecado», «culpa» u «ofensa»; aquí «un gran pecado» conserva el peso ético y la correspondencia con la traducción inglesa auditada.
- source_word: מַמְלַכְתִּי
  english_pob_choice: my kingdom
  chosen_spanish: mi reino
  alternatives_spanish:
  - mi reino
  - mi dominio
  lexicon: HALOT
  rationale: La referencia es al ámbito real de Abimelec; «reino» es la forma más clara y estable en español.
- source_word: מַעֲשִׂים אֲשֶׁר לֹא יֵעָשׂוּ
  english_pob_choice: things that should not be done
  chosen_spanish: cosas que no se deben hacer
  alternatives_spanish:
  - cosas que no deben hacerse
  - cosas que no se hacen
  lexicon: HALOT
  rationale: La construcción pasiva/normativa expresa lo impropio o indebido; «no se deben hacer» transmite bien la prohibición implícita sin volverla demasiado técnica.
- source_word: עָשִׂיתָ עִמָּדִי
  english_pob_choice: You have done to me
  chosen_spanish: Has hecho conmigo
  alternatives_spanish:
  - Has actuado conmigo
  - Has procedido conmigo
  lexicon: HALOT
  rationale: La locución עשה עם/עמד se entiende aquí como «tratar/deal with»; «has hecho conmigo» mantiene el tono acusatorio y enlaza con «cosas que no se deben hacer».
theological_decisions:
- issue: Relación entre «pecado» y «contra ti» en una acusación interpersonal
  english_pob_reading: how have I sinned against you
  chosen_spanish_reading: ¿en qué he pecado contra ti?
  alternative_spanish_readings:
  - ¿cómo he pecado contra ti?
  - ¿qué pecado he cometido contra ti?
  rationale: El hebreo חטא conserva fuerza moral ante la persona ofendida. La formulación elegida evita neutralizar la carga ética y preserva la acusación directa de Abimelec.
  doctrine_reference: Ética bíblica del pecado como ofensa real ante Dios y ante el prójimo (cf. uso relacional de חטא en narrativas del AT).
- issue: Alcance de «un gran pecado» sobre el rey y el reino
  english_pob_reading: you have brought a great sin on me and on my kingdom
  chosen_spanish_reading: has traído sobre mí y sobre mi reino un gran pecado
  alternative_spanish_readings:
  - has acarreado sobre mí y sobre mi reino una gran culpa
  - has puesto sobre mí y sobre mi reino un grave pecado
  rationale: 'Se conserva que la consecuencia no es meramente política sino moral: la acción de Abraham habría expuesto a Abimelec y a su reino a culpa grave. «Pecado» mantiene la tensión teológica mejor que una neutralización administrativa.'
  doctrine_reference: Responsabilidad moral colectiva en narrativas del Pentateuco; culpa y consecuencias que abarcan al gobernante y su esfera.
translation_notes:
  revision_awareness: 'Se respetó el estado de alta concordancia del audit trail inglés: no se requirieron cambios respecto a la lectura base, pero se corrigió la formulación española para anclar explícitamente las notas [a] y [b] en el texto traducido.'
  spanish_consistency_notes:
  - Se mantuvo «Abimelec», «Abraham», «mi reino» y el lenguaje de culpa/pecado conforme al registro bíblico.
  - Se prefirió un español natural pero no suavizado, conservando la acusación directa y la fuerza normativa del cierre.
  - Las notas de alternativa quedan exactamente ancladas en las frases marcadas con [a] y [b].
