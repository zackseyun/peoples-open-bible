base_translation:
  language: en
  yaml_path: translation/ot/deuteronomy/001/003.yaml
  text: And it happened in the fortieth year[a], in the eleventh month, on the first day of the month[b], that Moses spoke to the sons of Israel according to all that Yahweh had commanded him to them.
  footnotes:
