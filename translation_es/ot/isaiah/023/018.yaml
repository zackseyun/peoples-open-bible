revisions:
- from: Y sus mercancías y sus ganancias serán cosa santa para Yahvé[a]; no serán guardadas ni acaparadas, porque sus mercancías serán para los que habitan delante de Yahvé, para comer hasta saciarse y para cobertura durable[b].
  to: Y su mercancía y sus salarios serán santas para Yahvé[a]; no serán almacenados ni acaparados, porque su mercancía será para los que habitan delante de Yahvé, para comer hasta saciarse y para ropa duradera[b].
  rationale: La revisión mejora la fidelidad léxica ('salarios' en vez de 'ganancias'), elimina una alternativa engañosa en la nota ('alquiler'), y hace más natural el español ('serán santas', 'ropa duradera') sin apartarse del sentido del hebreo ni de la decisión documentada en el POB sobre la dificultad del sintagma final.
