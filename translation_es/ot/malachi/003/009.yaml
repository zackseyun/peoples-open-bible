  verdict: revise
  source_alignment_summary: 'El borrador español sigue bien el sentido básico del hebreo y la revisión inglesa: una maldición presente sobre el pueblo por robar a Dios, con alcance corporativo. Sin embargo, la cláusula final הַגּוֹי כֻּלּוֹ queda algo truncada en español como «toda la nación», y conviene explicitar mejor su relación con la segunda persona plural sin caer en una construcción torpe.'
  spanish_quality_summary: 'El texto es claro y legible, pero «Con maldición están ustedes malditos» suena algo rígido; aun así es defendible por la repetición enfática hebrea. El problema principal de naturalidad y fidelidad está al final: «toda la nación» queda suelto, mientras que «toda la nación de ustedes» comunica mejor el matiz colectivo dirigido a los oyentes y sigue siendo comprensible en español eclesial.'
  glossary_alignment: No hay conflictos con la terminología base del proyecto. «Dios» no aparece explícitamente en el texto fuente; el pronombre de primera persona queda bien preservado como «a mí me». La decisión de mantener «maldición / malditos» y «robar» está alineada con el rastro léxico auditado.
  issues:
  - severity: medium
    issue: La frase final «toda la nación» no refleja plenamente la combinación de identidad corporativa y dirección en segunda persona de הַגּוֹי כֻּלּוֹ.
    rationale: El inglés POB preserva deliberadamente ambas dimensiones con «the whole nation of you». En español, dejar solo «toda la nación» comunica corporatividad, pero pierde el vínculo explícito con «ustedes». Una leve expansión lo recupera sin forzar demasiado la sintaxis.
  - severity: low
    issue: La nota al pie usa «y aun así» como alternativa conjuntiva, pero la revisión auditada prioriza el valor causal.
    rationale: La alternativa puede mantenerse como posibilidad léxica, pero conviene que la nota refleje también la lectura «bajo una maldición» sin enfatizar indebidamente el adversativo como si fuera preferido.
  revised_spanish_text: 'Con maldición están ustedes malditos[a], porque a mí me están robando: toda la nación de ustedes.'
