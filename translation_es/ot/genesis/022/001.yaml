- from: 'Después de estas cosas, Dios probó a Abraham[a] y le dijo: «¡Abraham!». Y él dijo: «Aquí estoy[b]» .'
  to: 'Después de estas cosas, Dios probó a Abraham[a] y le dijo: «¡Abraham!». Él respondió: «Aquí estoy»'
  rationale: Se conserva el sentido fuente y la decisión léxico-teológica principal, pero se elimina una nota interpretativa no sustentada, se corrige la puntuación, y se suaviza ligeramente la respuesta para un español más natural sin perder fidelidad.
