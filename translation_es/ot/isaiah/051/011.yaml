review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español sigue bien el sentido del hebreo y del audit trail inglés: los redimidos de Yahvé regresan a Sion, con gozo duradero, y la pena desaparece. Sin embargo, hay dos desajustes relevantes. Primero, el texto principal dice «Yahvé», pero el borrador real dice «Yahvé» solo en las decisiones léxicas; en el texto puesto arriba sí aparece «Yahvé», así que eso está bien. El problema principal está en בְּרִנָּה: el inglés escogió ''with singing'' con nota alternativa, mientras que el español principal puso «con júbilo», que pierde el matiz más concreto de canto/proclamación sonora. Segundo, la nota [b] no refleja bien la alternativa inglesa: «O “los alcanzará el gozo”» cambia número y estructura, y además omite con claridad la idea de ''dar alcance / sobrepasar / alcanzar persiguiendo'' aplicada a ambos sustantivos personificados.'
  spanish_quality_summary: El español es claro, natural y de buen registro bíblico. «Sion», «gozo eterno», «sobre sus cabezas» y «huirán» funcionan bien. Aun así, «con júbilo» en el texto principal es menos fiel que «con cantos» o «con canto», y la nota [b] necesita mejor redacción para ser precisa y elegante en español. También conviene hacer que la nota [a] preserve más directamente la alternativa entre canto y gritos jubilosos.
  glossary_alignment: 'La terminología central está mayormente alineada con el proyecto: יְהוָה → «Yahvé», צִיּוֹן → «Sion», פְדוּיֵי → «los redimidos». No hay conflictos doctrinales mayores. La única desviación lexical importante es בְּרִנָּה, donde el español debería reflejar mejor el valor de canto/clamor jubiloso preservado en el POB inglés.'
  issues:
  - severity: medium
    issue: בְּרִנָּה se tradujo como «con júbilo» en el texto principal
    rationale: Aunque semánticamente cercano, pierde el matiz más específico de canto o clamor jubiloso que el inglés preserva con 'with singing' y una nota alternativa. «Con cantos» o «con canto» es más fiel y natural.
  - severity: medium
    issue: La nota [b] no representa con precisión la alternativa inglesa ni la imagen verbal
    rationale: «O “los alcanzará el gozo”» cambia la estructura plural del hebreo y reduce el paralelismo «alegría y gozo». La explicación también suena torpe con «alcanzar hasta». Debe explicarse que el verbo significa literalmente 'dar alcance, alcanzar, sobrepasar/overtake'.
  revised_spanish_text: Y los redimidos de Yahvé volverán y vendrán a Sion con cantos[a]; el gozo eterno estará sobre sus cabezas; alegría y gozo los alcanzarán[b]; la tristeza y el gemido huirán.
  revised_footnotes:
  - marker: a
    text: O «con gritos de júbilo»; el término hebreo puede denotar clamores jubilantes además de canto.
    reason: lexical_alternative
  - marker: b
    text: O «alegría y gozo darán alcance a ellos» o «los sobrepasarán»; el verbo hebreo literalmente significa «dar alcance, alcanzar, alcanzar a alguien», y aquí presenta al gozo como si los persiguiera hasta alcanzarlos.
    reason: lexical_alternative
  revision_rationale: Se ajusta בְּרִנָּה a «con cantos» para reflejar mejor la elección principal del POB inglés y el valor sonoro del hebreo, dejando «gritos de júbilo» como alternativa en nota. También se corrige la nota [b] para conservar el paralelismo de «alegría y gozo» y explicar con mayor precisión la imagen de יַשִּׂיגוּן como 'dar alcance / alcanzar persiguiendo'. El resto del versículo puede mantenerse.
