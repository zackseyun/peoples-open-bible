  yaml_path: translation/deuterocanon/2_maccabees/001/033.yaml
  text: But when the matter became known and it was reported to the king of the Persians that[a], in the place where the priests who had been taken away had hidden the fire, water had appeared, from which also those with Nehemiah purified the sacrifices[c][b],
  footnotes:
  - marker: a
    text: Or 'the deported priests' for 'the priests who had been taken away.' The Greek participle indicates priests removed from their land, likely in exile.
    reason: lexical_alternative
  - marker: b
    text: Or 'Nehemiah and his companions' for 'those around Nehemiah.' The Greek idiom refers to the group associated with him.
    reason: lexical_alternative
  - marker: c
    text: The phrase 'from which' most naturally refers to the water that had appeared, implying that the water was used in the ritual purification of the sacrifices.
    reason: cross_reference
