revisions:
- from: 'Y se le dijo al rey de Jericó[a]: «Mira, hombres han venido esta noche desde los israelitas para reconocer la tierra».'
  to: 'Y se le dijo al rey de Jericó[a]: «Mira, han venido aquí esta noche unos hombres de entre los israelitas para explorar la tierra».'
  rationale: Se corrige «desde los israelitas» a «de entre los israelitas» para reflejar con fidelidad y naturalidad el sentido partitivo de מִבְּנֵי יִשְׂרָאֵל. Se mejora la sintaxis española con «han venido aquí esta noche unos hombres» y se ajusta «para reconocer» a «para explorar» para alinear mejor el texto con el valor léxico documentado de לַחְפֹּר y con la nota alternativa «espiar».
