  yaml_path: translation/ot/exodus/030/023.yaml
  text: 'And you[a], take for yourself the finest spices: five hundred shekels of flowing myrrh, and half as much—two hundred fifty—of fragrant cinnamon, and two hundred fifty of fragrant cane[b],'
  footnotes:
