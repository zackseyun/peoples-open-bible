translation:
  language: es
  text: de hombres por tu mano[a], oh, Yahvé, de hombres del mundo, cuya porción está en esta vida. Tú llenas su vientre con tu tesoro guardado; quedan satisfechos con hijos[c][b], y dejan su abundancia a sus hijos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «de hombres, por tu mano» / «de hombres de tu mano». La sintaxis hebrea es comprimida y puede entenderse de más de una manera.
    reason: alternative_reading
  - marker: b
    text: 'Hebreo: «hijos». El término está en plural masculino y probablemente destaca descendencia varonil numerosa como señal de prosperidad.'
    reason: lexical_alternative
  - marker: c
    text: O «a sus pequeños». El hebreo se refiere más específicamente a niños pequeños.
    reason: lexical_alternative
lexical_decisions:
- source_word: מִמְתִים
  english_pob_choice: from men
  chosen_spanish: de hombres
  alternatives_spanish:
  - de mortales
  - de los muertos
  lexicon: HALOT
  rationale: El contexto paralelo con «de hombres del mundo» favorece entender la expresión como seres humanos, no como los muertos. «De hombres» conserva el plural masculino y la paralelismo del hebreo sin forzar una interpretación más precisa de la que el verso da.
- source_word: יָדְךָ
  english_pob_choice: by your hand
  chosen_spanish: por tu mano
  alternatives_spanish:
  - de tu mano
  lexicon: HALOT
  rationale: La construcción hebrea es comprimida y puede expresar agencia o procedencia. En español, «por tu mano» comunica de forma natural la idea instrumental/agencial y preserva la ambigüedad respetada por el POB inglés.
- source_word: יְהוָה
  english_pob_choice: O Yahweh
  chosen_spanish: oh Yahvé
  alternatives_spanish:
  - oh Yahweh
  - SEÑOR
  lexicon: HALOT
  rationale: Se conserva el nombre divino como «Yahvé», conforme a la terminología del proyecto. «Oh» reproduce la interpelación vocativa de manera sobria y litúrgicamente readable en español.
- source_word: מֵחֶלֶד
  english_pob_choice: of the world
  chosen_spanish: del mundo
  alternatives_spanish:
  - de la era
  - del mundo pasajero
  lexicon: HALOT
  rationale: Aquí חֶלֶד se refiere al ámbito de la vida temporal humana. «Del mundo» expresa esa esfera presente y limitada de manera natural en español, sin añadir matices no explicitados por el hebreo.
- source_word: חֶלְקָם בַּחַיִּים
  english_pob_choice: whose portion is in this life
  chosen_spanish: cuya porción está en esta vida
  alternatives_spanish:
  - cuya parte está entre los vivos
  - su porción está en la vida presente
  lexicon: HALOT
  rationale: «Porción» mantiene el lenguaje patrimonial del hebreo. «Está en esta vida» explicita el sentido temporal que el POB inglés deja claro, sin introducir una oposición doctrinal sobre el más allá que el verso no formula.
- source_word: וּצְפִינְךָ
  english_pob_choice: your stored-up treasure
  chosen_spanish: tu tesoro guardado
  alternatives_spanish:
  - lo que has guardado
  - tu provisión escondida
  lexicon: HALOT
  rationale: La raíz sugiere algo escondido, reservado o acumulado. «Tesoro guardado» conserva la idea de abundancia reservada por Dios y suena natural en español, evitando especificar más de lo que el término requiere.
- source_word: תְּמַלֵּא בִטְנָם
  english_pob_choice: You fill their belly
  chosen_spanish: tú llenas su vientre
  alternatives_spanish:
  - tú llenas su barriga
  - tú llenas su interior
  lexicon: HALOT
  rationale: «Vientre» mantiene la imagen concreta del hebreo y funciona bien en español bíblico contemporáneo. Se evita «estómago» por sonar demasiado clínico y «interior» por perder la imagen corporal.
- source_word: יִשְׂבְּעוּ בָנִים
  english_pob_choice: they are satisfied with sons
  chosen_spanish: quedan satisfechos con hijos
  alternatives_spanish:
  - se sacian con hijos varones
  - quedan satisfechos con hijos varones
  lexicon: HALOT
  rationale: El hebreo dice literalmente «hijos» en masculino plural, pero en español «hijos» puede funcionar como genérico familiar y mantiene la referencia a descendencia numerosa. Se conserva la tensión de género sin introducir una explicación innecesaria en el texto principal.
- source_word: וְהִנִּיחוּ יִתְרָם
  english_pob_choice: they leave their abundance
  chosen_spanish: dejan su abundancia
  alternatives_spanish:
  - dejan su sobrante
  - dejan lo que les sobra
  lexicon: HALOT
  rationale: יִתֶר expresa resto, excedente o abundancia. «Abundancia» comunica bien el resultado de prosperidad acumulada y se integra de forma fluida con la frase siguiente.
- source_word: לְעוֹלְלֵיהֶם
  english_pob_choice: to their children
  chosen_spanish: a sus pequeños
  alternatives_spanish:
  - a sus niños
  - a sus hijitos
  lexicon: HALOT
  rationale: El término apunta más específicamente a niños pequeños. Se opta por «sus pequeños» para preservar esa nota semántica que el POB inglés también documenta en nota, sin perder naturalidad en español.
theological_decisions:
- issue: Relación de los enemigos con la providencia divina en «de hombres por tu mano»
  english_pob_reading: The phrase is rendered to show these men as operating under God's hand, without specifying whether they are instruments of judgment or merely subject to his rule.
  chosen_spanish_reading: La frase presenta a esos hombres en relación con la mano de Dios, sin precisar si son instrumentos de juicio o simplemente están bajo su gobierno.
  alternative_spanish_readings:
  - de hombres, por tu mano
  - de hombres de tu mano
  rationale: El hebreo es sintácticamente comprimido y admite más de una construcción. La redacción española mantiene la soberanía divina sin resolver la tensión interpretativa ni cargar el verso con una afirmación doctrinal más fuerte que la del texto.
  doctrine_reference: Preservar la tensión teológica en vez de resolverla
- issue: Prosperidad temporal de los impíos
  english_pob_reading: The verse is rendered as describing the wicked as having their portion in the present life, without denying future judgment or making an explicit eschatological contrast in the main text.
  chosen_spanish_reading: Se expresa que su porción pertenece a la vida presente, sin negar ni afirmar explícitamente en el verso la retribución futura.
  alternative_spanish_readings:
  - su porción está entre los vivos
  - su parte está en la vida
  rationale: El texto contrasta la prosperidad presente con la esperanza del salmista, pero no desarrolla por sí mismo una escatología completa. La traducción conserva ese alcance limitado.
  doctrine_reference: No importar afirmaciones doctrinales que el texto no dice
translation_notes:
  revision_awareness: El borrador sigue el pasaje inglés auditado, sin cambios de revisión aplicados en la fuente; se mantiene la misma lectura de la sintaxis comprimida, de la referencia temporal («esta vida») y del par «hijos / pequeños» con nota explicativa.
  spanish_consistency_notes:
  - Se usa «Yahvé» para el nombre divino conforme al estándar del proyecto.
  - Se conserva la distinción entre «hijos» en el texto principal y «pequeños» en nota, como reflejo de la tensión léxica del hebreo.
  - «Porción» y «esta vida» mantienen el valor temporal sin ampliar el verso hacia una formulación escatológica explícita.
  - La puntuación y el vocativo siguen un español bíblico contemporáneo, legible para uso eclesial.
