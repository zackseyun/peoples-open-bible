lexical_decisions:
- source_word: שִׁיר
  english_pob_choice: song
  chosen_spanish: cántico
  alternatives_spanish:
  - canción
  - canto
  lexicon: HALOT
  rationale: El hebreo designa una composición cantada; en español, «cántico» funciona bien en un encabezado poético y conserva un tono más bíblico y litúrgico que «canción», sin perder inteligibilidad.
- source_word: מִזְמ֣וֹר
  english_pob_choice: psalm
  chosen_spanish: salmo
  alternatives_spanish:
  - poema cantado
  - salmo musical
  lexicon: HALOT
  rationale: Es el término técnico de los encabezados de Salmos; «salmo» mantiene el valor de género ya establecido en español bíblico y evita una paráfrasis innecesaria.
- source_word: לְ/אָסָֽף
  english_pob_choice: of Asaph
  chosen_spanish: de Asaf
  alternatives_spanish:
  - para Asaf
  - perteneciente a Asaf
  lexicon: HALOT
  rationale: La preposición ל en encabezados puede indicar autoría, asociación o dedicación. «De Asaf» preserva esa amplitud sin decidir más de lo que el hebreo obliga, y en español es la opción más natural en un título.
theological_decisions:
- issue: Valor de la preposición ל en el encabezado
  english_pob_reading: Or 'for Asaph.' The Hebrew preposition can indicate authorship, association, or dedication in psalm headings.
  chosen_spanish_reading: «De Asaf» conserva la relación sin fijar de manera exclusiva autoría o dedicación.
  alternative_spanish_readings:
  - «Para Asaf»
  - «Asaf» sin preposición
  rationale: El texto hebreo deja abierta la relación de ל con Asaf; por eso la traducción no debe cerrarla. «De Asaf» es la formulación española más equilibrada para mantener la ambigüedad documentada.
  doctrine_reference: Encabezados de Salmos; no implica una afirmación doctrinal específica, sino una decisión de relación textual.
translation_notes:
  revision_awareness: 'El marcador de nota se coloca en «Asaf», no en «cántico», para alinearse con el audit trail inglés: la nota explica la preposición ל asociada a Asaf, no el sustantivo inicial.'
  spanish_consistency_notes:
  - Se mantiene la distinción entre el término genérico «cántico» y el técnico «salmo».
  - Se usa «Asaf» como forma estándar en español bíblico para el nombre propio.
  - La puntuación reproduce un encabezado breve y solemne, adecuada para una superscripción poética.
