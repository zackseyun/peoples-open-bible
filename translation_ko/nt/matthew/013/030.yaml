source:
  edition: SBLGNT
  text: ἄφετε συναυξάνεσθαι ἀμφότερα ⸀μέχρι τοῦ θερισμοῦ· καὶ ἐν καιρῷ τοῦ θερισμοῦ ἐρῶ τοῖς θερισταῖς· Συλλέξατε πρῶτον τὰ ζιζάνια καὶ δήσατε αὐτὰ εἰς δέσμας πρὸς τὸ κατακαῦσαι αὐτά, τὸν δὲ σῖτον ⸀συναγάγετε εἰς τὴν ἀποθήκην μου.
base_translation:
  language: en
  yaml_path: translation/nt/matthew/013/030.yaml
  text: 'Let both grow together until the harvest[a], and at the time of harvest I will tell the reapers, ‘First collect the weeds and tie them into bundles to burn them, but gather the wheat into my storehouse.’'
  footnotes:
  - marker: a
    text: Or 'darnel weeds'; traditionally 'tares.'
    reason: lexical_alternative
translation:
  language: ko
  text: '추수 때까지 둘 다 함께 자라도록 두어라. 추수 때에 내가 추수꾼들에게 말하리라. 「먼저 가라지를 모아, 태우려고 단으로 묶고, 밀은 내 곳간에 모으라.」」」'
  philosophy: optimal-equivalence
theological_decisions:
- issue: 가라지 비유 — 종말론적 분리의 「추수 때까지 함께 자라도록」
  chosen_reading: 「추수 때까지 둘 다 함께 자라도록 두어라」
  alternative_readings:
  - 교회 정화 명령으로 해석하여 「뽑아 모으라」 식으로 옮김
  rationale: 본문은 종말 이전 교회·세상에서 의인과 악인이 함께 존재함을 인내하라는 명령이다. 13:36-43에서 예수님 자신이 풀이하시므로 본문 자체는 강한 종말론적 미결정성을 보존해야 한다. 한국 전통 번역의 「함께 자라도록 두라」를 유지한다.
  doctrine_reference: 'DOCTRINE.md: §5'
