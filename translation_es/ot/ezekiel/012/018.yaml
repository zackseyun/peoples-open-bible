translation:
  language: es
  text: Hijo de hombre[a], come tu pan con temblor[b], y bebe tu agua con estremecimiento[c] y angustia.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: También puede entenderse como 'ser humano'; la expresión hebrea אָדָם mantiene aquí la fórmula profética característica de Ezequiel.
    reason: alternative_reading
  - marker: b
    text: O 'con estremecimiento'; el hebreo רַעַשׁ puede denotar temblor, sacudida o conmoción.
    reason: lexical_alternative
  - marker: c
    text: O 'con temblor y angustia'; los dos sustantivos hebreos que describen la manera de beber se superponen en la idea de agitación y temor.
    reason: lexical_alternative
lexical_decisions:
- source_word: בֶּן אָדָם
  english_pob_choice: Son of man
  chosen_spanish: Hijo de hombre
  alternatives_spanish:
  - Ser humano
  - Hombre mortal
  lexicon: HALOT
  rationale: Conserva la fórmula profética fija de Ezequiel y el paralelismo literal del hebreo. 'Hijo de hombre' es natural en español bíblico y evita suavizar el vocativo con una interpretación más explicativa.
- source_word: לַחְמְךָ
  english_pob_choice: your bread
  chosen_spanish: tu pan
  alternatives_spanish:
  - tu alimento
  - tu comida
  lexicon: HALOT
  rationale: לֶחֶם es literalmente 'pan', aunque pueda abarcar alimento en general. En español, 'pan' mantiene la imagen concreta del acto simbólico y corresponde bien al valor básico del término.
- source_word: בְּרַעַשׁ
  english_pob_choice: with trembling
  chosen_spanish: con temblor
  alternatives_spanish:
  - con quiebre
  - con sacudida
  - con estremecimiento
  lexicon: HALOT
  rationale: רַעַשׁ puede significar sacudir, temblar o estremecerse. 'Temblor' reproduce el sentido corporal de la acción y funciona de manera clara en español sin borrar la tensión emocional.
- source_word: תֹּאכֵל
  english_pob_choice: eat
  chosen_spanish: come
  alternatives_spanish:
  - comerás
  - has de comer
  lexicon: HALOT
  rationale: En este contexto el imperfecto hebreo tiene fuerza de mandato. 'Come' expresa de forma directa la instrucción profética.
- source_word: וּמֵימֶיךָ
  english_pob_choice: and your water
  chosen_spanish: y bebe tu agua
  alternatives_spanish:
  - y tu bebida
  - y tus aguas
  lexicon: HALOT
  rationale: El hebreo dice literalmente 'tus aguas', pero en español la forma natural y clara es 'agua' en singular. Se conserva la imagen concreta del sustento líquido.
- source_word: בְּרָגְזָה
  english_pob_choice: with quaking
  chosen_spanish: con agitación
  alternatives_spanish:
  - con quiebranto
  - con temblor
  - con inquietud
  lexicon: HALOT
  rationale: רָגְזָה expresa agitación, conmoción o estremecimiento. 'Agitación' permite distinguir este segundo término de 'temblor' y mantiene el matiz de perturbación visible sin convertirlo en una repetición exacta.
- source_word: וּבִדְאָגָה
  english_pob_choice: and anxiety
  chosen_spanish: y angustia
  alternatives_spanish:
  - y ansiedad
  - y preocupación
  - y desasosiego
  lexicon: HALOT
  rationale: דְאָגָה alude a preocupación ansiosa y aprensión. 'Angustia' comunica bien el peso interior del término en español bíblico contemporáneo y evita reducirlo a un tecnicismo psicológico.
theological_decisions:
- issue: Tono del mandato simbólico en la acción profética
  english_pob_reading: A concrete prophetic sign-act is described with bodily distress while eating and drinking.
  chosen_spanish_reading: Se presenta una acción profética concreta, corporal y afligida al comer y beber.
  alternative_spanish_readings:
  - Se describe una escena meramente emocional
  - Se suaviza la dureza del signo
  rationale: El versículo no es una exhortación general, sino una señal corporal cargada de amenaza y aflicción. La traducción conserva esa dureza sin explicarla en exceso.
  doctrine_reference: Ezequiel 12:18; teología profética del signo-acto
translation_notes:
  revision_awareness: El auditable inglés POB pasó de 'shaking' a 'quaking' para distinguir mejor la segunda expresión de movimiento respecto de 'trembling'. En español, se optó por 'agitación' para בְּרָגְזָה y 'angustia' para וּבִדְאָגָה, manteniendo la diferenciación entre el movimiento exterior y la aflicción interior sin duplicar el mismo término.
  spanish_consistency_notes:
  - Se mantiene 'Hijo de hombre' para la fórmula profética de Ezequiel, en coherencia con el tratamiento habitual del libro.
  - '''Pan'' se usa para לֶחֶם por su concreción; no se expande a ''alimento'' para no debilitar la imagen del sign-act.'
  - Se evita 'SEÑOR' o términos de sustitución no presentes en este versículo.
  - La pareja 'temblor / agitación' conserva el paralelismo y la distinción semántica de los dos sustantivos hebreos para el modo de comer y beber.
