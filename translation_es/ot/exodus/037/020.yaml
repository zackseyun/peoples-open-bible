translation:
  language: es
  text: 'Y en el candelabro había cuatro copas en forma de flores de almendro[a]: sus brotes y sus flores.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'También puede entenderse: «cuatro copas en forma de almendra, sus nudos y sus flores» o «cuatro copas en forma de almendra, sus nudos y sus flores».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וּ/בַ/מְּנֹרָה
  english_pob_choice: And on the lampstand were
  chosen_spanish: Y en el candelabro había
  alternatives_spanish:
  - Y sobre el candelabro había
  - Y en la menorá había
  lexicon: HALOT
  rationale: El hebreo indica ubicación respecto del objeto; en español, para esta pieza del tabernáculo, "candelabro" comunica con claridad la מנורה y evita una transliteración innecesaria. "Había" refleja con naturalidad la construcción existencial del hebreo.
- source_word: אַרְבָּעָה
  english_pob_choice: four
  chosen_spanish: cuatro
  lexicon: HALOT
  rationale: Número cardinal directo y sin tensión semántica.
- source_word: גְבִעִים
  english_pob_choice: cups
  chosen_spanish: copas
  alternatives_spanish:
  - tazas
  - cuencos
  lexicon: HALOT
  rationale: El término alude a piezas ornamentales con forma de recipiente. "Copas" es natural en español y conserva la imagen de recipiente decorativo mejor que opciones más genéricas.
- source_word: מְשֻׁקָּדִים
  english_pob_choice: shaped like almond blossoms
  chosen_spanish: en forma de flores de almendro
  alternatives_spanish:
  - con forma de flores de almendro
  - almendrado
  - en forma de almendra
  lexicon: HALOT
  rationale: La forma participial describe un diseño ornamental ligado al almendro/almendra. "En forma de flores de almendro" mantiene la imagen floral explícita y evita una traducción demasiado técnica o ambigua.
- source_word: כַּפְתֹּרֶיהָ
  english_pob_choice: its buds
  chosen_spanish: sus botones
  alternatives_spanish:
  - sus nudos
  - sus brotes
  - sus nudos ornamentales
  lexicon: HALOT
  rationale: כפתור en el contexto del candelabro denota protuberancias ornamentales. "Botones" preserva la forma compacta y el tono vegetal/ornamental sin forzar "nudos", que en español puede sonar menos visual aquí.
- source_word: וּפְרָחֶיהָ
  english_pob_choice: and its flowers
  chosen_spanish: y sus flores
  alternatives_spanish:
  - y sus floraciones
  - y sus florones
  lexicon: HALOT
  rationale: El hebreo habla de flores/blossoms. "Flores" es la equivalencia más clara y directa en español, y mantiene la serie ornamental con "botones".
translation_notes:
  revision_awareness: 'Se siguió el sentido revisado de la POB inglesa: la relación final es apposicional, por lo que en español se evitó añadir una preposición equivalente a «with» antes de «sus botones y sus flores».'
  spanish_consistency_notes:
  - Se emplea "candelabro" para מנורה, conforme al uso estándar en español bíblico para este objeto del santuario.
  - Se evitó "SEÑOR" u otras convenciones de ocultamiento del nombre divino porque el versículo no contiene el Tetragrámaton.
  - '"Copas" conserva el valor de גְבִעִים como piezas ornamentales, coherente con el audit trail inglés.'
  - La nota al pie recoge la alternativa lexical principal sin duplicar innecesariamente variantes menores.
