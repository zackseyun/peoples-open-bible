- from: Mejor vivir en un rincón de la azotea que con una mujer pendenciera en una casa compartida[a].
  to: Mejor vivir en un rincón de la azotea que con una mujer contenciosa en una casa compartida[a].
  rationale: 'Se realiza una reparación menor para mejorar la precisión y la legibilidad panhispánica: «contenciosa» representa mejor la idea de una mujer dada a contiendas en un registro bíblico digno, y la nota aclara más directamente el sentido de una casa compartida con otros.'
