lexical_decisions:
- source_word: הַשִּׁשִּׁי
  english_pob_choice: the sixth
  chosen_spanish: el sexto
  alternatives_spanish:
  - el sexto lote
  - el sexto en la lista
  lexicon: HALOT
  rationale: El hebreo usa un ordinal con artículo en una lista elíptica. En español, «el sexto» conserva la concisión del texto y deja implícito, como en el POB inglés, que el contexto de los lotes está sobreentendido.
- source_word: בֻקִּיָּהוּ
  english_pob_choice: Bukkiah
  chosen_spanish: Bukkías
  alternatives_spanish:
  - Bucquías
  - Bukías
  lexicon: N/A (nombre propio transliterado)
  rationale: Se translitera el nombre propio. «Bukkías» conserva la forma hebrea sin castellanizarlo excesivamente y mantiene la transparencia auditable del nombre.
- source_word: בָּנָיו
  english_pob_choice: his sons
  chosen_spanish: sus hijos
  alternatives_spanish:
  - sus hijos varones
  - sus hijos
  lexicon: HALOT
  rationale: El hebreo significa literalmente «sus hijos»; en español, «hijos» comunica de manera natural la relación filial y puede abarcar el valor masculino del contexto genealógico sin forzar una perífrasis innecesaria.
- source_word: וְאֶחָיו
  english_pob_choice: and his brothers
  chosen_spanish: y sus hermanos
  alternatives_spanish:
  - y sus hermanos
  - y sus parientes cercanos
  lexicon: HALOT
  rationale: Se conserva «hermanos» como la correspondencia más directa al hebreo. En este registro administrativo/musical podría incluir asociados varones o parientes, pero el término básico es «hermanos».
- source_word: שְׁנֵים עָשָׂר
  english_pob_choice: twelve
  chosen_spanish: doce
  alternatives_spanish:
  - eran doce
  - sumaban doce
  lexicon: HALOT
  rationale: El cardinal cierra la lista en aposición, sin verbo explícito en hebreo. «Doce» preserva esa tersura y evita añadir un verbo que el texto no expresa.
translation_notes:
  revision_awareness: 'Se siguió el mismo equilibrio del POB inglés: mantener la brevedad del listado hebreo, sin expandir innecesariamente el verbo implícito; la única nota refleja la alternativa contextual más explícita documentada en el audit trail inglés.'
  spanish_consistency_notes:
  - Se mantuvo el nombre propio transliterado de forma consistente con la política POB.
  - Se evitó introducir «lote» en el texto principal para respetar la elipsis del hebreo y la decisión auditada en inglés.
  - «Hijos» y «hermanos» conservan el paralelismo genealógico/listado del original sin reescrituras explicativas.
