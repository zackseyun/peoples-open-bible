    text: 'Hebreo: «Neco»; en algunas traducciones en inglés aparece «Necho».'
    reason: lexical_alternative
  revision_rationale: Se reubicó la nota al nombre «Neco», que es el elemento al que realmente se refiere. También se mejoró la sintaxis de la primera cláusula para un español más natural y se ajustó la expresión del cambio de nombre a una forma más idiomática, sin alterar el sentido del hebreo ni las decisiones léxicas auditadas.
