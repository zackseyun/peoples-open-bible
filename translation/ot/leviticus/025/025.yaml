id: LEV.25.25
reference: Leviticus 25:25
source:
  edition: WLC
  text: כִּֽי יָמ֣וּךְ אָחִ֔י/ךָ וּ/מָכַ֖ר מֵ/אֲחֻזָּת֑/וֹ וּ/בָ֤א גֹֽאֲל/וֹ֙ הַ/קָּרֹ֣ב אֵלָ֔י/ו וְ/גָאַ֕ל אֵ֖ת מִמְכַּ֥ר אָחִֽי/ו־׃
translation:
  text: If your brother becomes poor and sells some of his property[b][a], then his nearest kinsman-redeemer shall come and redeem what his brother has sold.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'his nearest kinsman-redeemer may come and redeem.' The Hebrew term refers to a close relative with the right and duty to reclaim family property.
    reason: lexical_alternative
  - marker: b
    text: '''Inherited property'' refers to a hereditary family landholding within Israel.'
    reason: cultural_note
lexical_decisions:
- source_word: יָמוּךְ
  chosen: becomes poor
  alternatives:
  - becomes impoverished
  - falls into poverty
  lexicon: HALOT
  rationale: The verb denotes becoming economically reduced or impoverished. 'Becomes poor' is natural modern English and fits the legal-economic context.
- source_word: אָחִיךָ
  chosen: your brother
  alternatives:
  - your kinsman
  - your fellow Israelite
  lexicon: HALOT
  rationale: Literally 'your brother.' In Levitical law this can extend to a fellow Israelite, but the translation keeps the familial term in line with gender-accurate policy and the source wording.
- source_word: מָכַר
  chosen: sells
  alternatives:
  - has sold
  - must sell
  lexicon: HALOT
  rationale: Basic sense is 'sell.' English present 'sells' works idiomatically in the conditional protasis; the legal scenario is general rather than tied to a single past event.
- source_word: מֵאֲחֻזָּתוֹ
  chosen: some of his inherited property
  alternatives:
  - part of his possession
  - some of his property holding
  - some of his hereditary land
  lexicon: HALOT
  rationale: אֲחֻזָּה in this context refers to a hereditary landholding within Israel's tribal allotment system, not merely generic property. 'Inherited property' communicates the covenantal-land background accessibly.
- source_word: גֹאֲלוֹ
  chosen: his redeemer
  alternatives:
  - his kinsman-redeemer
  - the one with redemption rights
  lexicon: HALOT
  rationale: The participial noun from גאל denotes the relative with the duty/right to redeem family property. 'Redeemer' is concise and accurate; the kinship element is made explicit by the following 'nearest.'
- source_word: הַקָּרֹב אֵלָיו
  chosen: his nearest
  alternatives:
  - the nearest relative to him
  - the close one to him
  lexicon: HALOT
  rationale: This phrase qualifies the redeemer as the closest eligible relative. Rendering it with 'nearest' preserves the legal priority of kinship without cumbersome repetition.
- source_word: וּבָא
  chosen: may come
  alternatives:
  - comes
  - shall come
  lexicon: HALOT
  rationale: In this casuistic law, the verb describes what is permitted/expected in the event described. 'May come' captures the legal possibility without overstating as an absolute prediction.
- source_word: וְגָאַל
  chosen: redeem
  alternatives:
  - buy back
  - reclaim
  lexicon: HALOT
  rationale: The verb גאל is a key covenant-legal term for redemption by a family redeemer. 'Redeem' preserves that legal-theological resonance better than the more commercial 'buy back.'
- source_word: אֵת מִמְכַּר אָחִיו
  chosen: what his brother has sold
  alternatives:
  - the sale of his brother
  - his brother's sold property
  lexicon: HALOT
  rationale: מִמְכָּר refers to the thing sold or the sale transaction. In English, 'what his brother has sold' is the clearest idiomatic rendering and points to the alienated property.
