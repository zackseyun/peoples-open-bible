translation:
  language: es
  text: Harás una mesa de madera de acacia[a], de dos codos de largo, de un codo de ancho y de un codo y medio de alto.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, más literalmente, «y harás». La conjunción hebrea enlaza esta instrucción con los mandatos anteriores.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְעָשִׂיתָ
  english_pob_choice: You shall make
  chosen_spanish: Harás
  alternatives_spanish:
  - Y harás
  - Harás, pues
  lexicon: HALOT
  rationale: La forma verbal hebrea funciona como mandato/instrucción en serie. En español, el futuro exhortativo "Harás" comunica bien el valor directivo sin añadir una conjunción inicial que no es necesaria para la fluidez.
- source_word: שֻׁלְחָן
  english_pob_choice: a table
  chosen_spanish: una mesa
  alternatives_spanish:
  - un tablero
  - una mesa de culto
  lexicon: HALOT
  rationale: '"Mesa" es el equivalente natural y claro para el mueble descrito. Mantiene la referencia cultual sin sobreespecificar más allá del texto.'
- source_word: עֲצֵי שִׁטִּים
  english_pob_choice: of acacia wood
  chosen_spanish: de madera de acacia
  alternatives_spanish:
  - de acacia
  - de madera de acacia-árbol
  lexicon: HALOT
  rationale: La cadena constructa expresa material; en español, "madera de acacia" es natural y precisa. Evita una formulación demasiado literal que sonaría extraña.
- source_word: אַמָּתַיִם
  english_pob_choice: two cubits
  chosen_spanish: de dos codos
  alternatives_spanish:
  - dos codos
  - de dos codos de longitud
  lexicon: HALOT
  rationale: Se conserva la unidad antigua "codo" por fidelidad cultural y para no convertir medidas. La preposición "de" encaja con la fórmula dimensional en español.
- source_word: אָרְכּוֹ
  english_pob_choice: its length
  chosen_spanish: de largo
  alternatives_spanish:
  - en su longitud
  - de longitud
  lexicon: HALOT
  rationale: Aunque el hebreo usa un sustantivo con sufijo, en español la expresión adjetival "de largo" resulta más idiomática y suficientemente exacta en una lista de dimensiones.
- source_word: וְאַמָּה
  english_pob_choice: one cubit
  chosen_spanish: de un codo
  alternatives_spanish:
  - un codo
  - de un codo de ancho
  lexicon: HALOT
  rationale: Se mantiene la unidad y la estructura dimensional breve. "De un codo" es natural en español dentro de la secuencia de medidas.
- source_word: רָחְבּוֹ
  english_pob_choice: its width
  chosen_spanish: de ancho
  alternatives_spanish:
  - en su anchura
  - ancho
  lexicon: HALOT
  rationale: '"De ancho" comunica el valor dimensional con claridad y evita una rigidez innecesaria frente al sustantivo hebreo con sufijo.'
- source_word: וְאַמָּה וָחֵצִי
  english_pob_choice: and a cubit and a half
  chosen_spanish: y de un codo y medio
  alternatives_spanish:
  - y un codo y medio
  - y de codo y medio
  lexicon: HALOT
  rationale: Se conserva la medida compuesta con naturalidad en español. El valor queda explícito sin alterar la secuencia numérica del hebreo.
- source_word: קֹמָתוֹ
  english_pob_choice: its height
  chosen_spanish: de alto
  alternatives_spanish:
  - en altura
  - de su altura
  lexicon: HALOT
  rationale: En una especificación de dimensiones de un mueble, "de alto" es la forma más natural en español y transmite fielmente la altura del objeto.
translation_notes:
  revision_awareness: Se siguió el pasaje base con alta concordancia con la revisión más reciente; no se reportaron cambios necesarios. La versión española mantiene la fuerza instructiva del hebreo y conserva las medidas tradicionales sin convertirlas.
  spanish_consistency_notes:
  - Se usó "codos" como unidad tradicional, coherente con la práctica de la POB de preservar medidas antiguas.
  - Se eligió "madera de acacia" para reflejar la cadena constructa hebrea con naturalidad en español.
  - Se evitó añadir artículos o conectores no exigidos por el sentido, salvo donde la sintaxis española lo requiere.
