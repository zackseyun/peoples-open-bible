translation:
  language: es
  text: En el año dieciocho de su reinado, cuando ya había limpiado la tierra y la casa[a], envió a Safán hijo de Azalía, a Maasías, gobernador de la ciudad, y a Joah hijo de Joacaz, el cronista, para reparar la casa de Yahvé su Dios.[b]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «la tierra y el templo»; el hebreo dice literalmente «la tierra y la casa».
    reason: lexical_alternative
  - marker: b
    text: O «fortalecer»; en contexto, esto significa reparar o restaurar el edificio del templo.
    reason: lexical_alternative
lexical_decisions:
- source_word: וּבִשְׁנַת
  english_pob_choice: Now in the ... year
  chosen_spanish: Ahora, en el ... año
  alternatives_spanish:
  - Y en el ... año
  - En el ... año
  lexicon: HALOT
  rationale: La partícula conjuntiva con valor narrativo se vierte de modo natural como continuidad temporal. «Ahora, en» conserva el arranque secuencial sin sonar forzado en español.
- source_word: שְׁמוֹנֶה עֶשְׂרֵה
  english_pob_choice: eighteenth
  chosen_spanish: dieciocho
  alternatives_spanish:
  - decimoctavo
  - dieciochoavo
  lexicon: HALOT
  rationale: 'En español, el regnal year formula se expresa de forma más natural con cardinal seguido de «año»: «en el año dieciocho». El valor sigue siendo el mismo que el ordinal inglés.'
- source_word: לְמָלְכֹו
  english_pob_choice: of his reign
  chosen_spanish: de su reinado
  alternatives_spanish:
  - de su reino
  - de su gobierno
  lexicon: HALOT
  rationale: «Reinado» comunica directamente la fórmula regnal y evita ambigüedad política. Mantiene el referente al período de gobierno de Josías.
- source_word: לְטַהֵר
  english_pob_choice: when he had cleansed
  chosen_spanish: cuando había limpiado
  alternatives_spanish:
  - después de haber limpiado
  - cuando hubo purificado
  lexicon: HALOT
  rationale: El infinitivo con ל se entiende aquí en relación temporal con la acción principal. «Había limpiado» conserva el sentido de acción previa; «limpiado» refleja el campo semántico de purificación del país y del templo sin introducir un giro más interpretativo de lo necesario.
- source_word: הָאָרֶץ וְהַבָּיִת
  english_pob_choice: the land and the house
  chosen_spanish: la tierra y la casa
  alternatives_spanish:
  - la tierra y el templo
  - el país y la casa
  lexicon: HALOT
  rationale: Se conserva «casa» para mantener la literalidad hebrea y la conexión con la frase posterior «la casa de Yahvé». «Tierra» reproduce הָאָרֶץ de manera directa; la nota puede aclarar la posible referencia al templo.
- source_word: שָׁלַח
  english_pob_choice: he sent
  chosen_spanish: envió
  alternatives_spanish:
  - mandó
  - despachó
  lexicon: HALOT
  rationale: Verbo narrativo directo y natural. «Envió» conserva el simple hecho de comisionar a estos funcionarios.
- source_word: שָׁפָן בֶּן אֲצַלְיָהוּ
  english_pob_choice: Shaphan son of Azaliah
  chosen_spanish: Safán hijo de Azalía
  alternatives_spanish:
  - Safán, hijo de Azalías
  - Safán hijo de Azalías
  lexicon: HALOT
  rationale: Los nombres propios se transliteran con grafía española habitual. «Hijo de» refleja la relación patronímica sin calco extraño.
- source_word: מַעֲשֵׂיָהוּ
  english_pob_choice: Maaseiah
  chosen_spanish: Maasías
  alternatives_spanish:
  - Maseías
  - Maaséyah
  lexicon: HALOT
  rationale: Nombre propio transliterado en forma española reconocible y consistente con el uso bíblico en castellano.
- source_word: שַׂר הָעִיר
  english_pob_choice: the governor of the city
  chosen_spanish: gobernador de la ciudad
  alternatives_spanish:
  - príncipe de la ciudad
  - funcionario de la ciudad
  lexicon: HALOT
  rationale: שַׂר designa un oficial o jefe; en este contexto administrativo, «gobernador» expresa mejor la autoridad civil que una traducción demasiado literal o arcaizante.
- source_word: יוֹאָח בֶּן יוֹאָחָז
  english_pob_choice: Joah son of Joahaz
  chosen_spanish: Joah hijo de Joacaz
  alternatives_spanish:
  - Joah hijo de Joahaz
  - Joacaz
  lexicon: HALOT
  rationale: El antropónimo se adapta a la forma castellana habitual «Joacaz» para el nombre padre, manteniendo la identificación bíblica clara para lectores en español.
- source_word: הַמַּזְכִּיר
  english_pob_choice: the recorder
  chosen_spanish: el registrador
  alternatives_spanish:
  - el secretario
  - el cronista
  lexicon: HALOT
  rationale: El título oficial refiere a un funcionario de registros o secretario de estado. «Registrador» conserva la idea funcional y evita cargar el término con connotaciones modernas ajenas.
- source_word: לְחַזֵּק
  english_pob_choice: to repair
  chosen_spanish: para reparar
  alternatives_spanish:
  - para fortalecer
  - para restaurar
  lexicon: HALOT
  rationale: Aunque el verbo significa literalmente «fortalecer», en contexto edilicio alude a reparar/restaurar. «Reparar» es la equivalencia contextual más clara en español.
- source_word: בֵּית יְהוָה אֱלֹהָיו
  english_pob_choice: the house of Yahweh his God
  chosen_spanish: la casa de Yahvé, su Dios
  alternatives_spanish:
  - la casa de Yahvé, el Dios de él
  - el templo de Yahvé, su Dios
  lexicon: HALOT
  rationale: Se mantiene «casa» para reflejar בֵּית y la conexión interna con «la casa» previa. «Yahvé» sigue el estándar del proyecto para יְהוָה; «su Dios» expresa el sufijo posesivo referido a Josías.
theological_decisions:
- issue: Renderización del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahveh
  - SEÑOR
  rationale: El texto hebreo usa el Tetragrámaton directamente. Conforme al estándar del proyecto, se preserva el nombre divino en forma audible «Yahvé», evitando la sustitución litúrgica por «SEÑOR» y manteniendo la transparencia con la fuente.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Sentido de הַמַּזְכִּיר
  english_pob_reading: the recorder
  chosen_spanish_reading: el registrador
  alternative_spanish_readings:
  - el secretario
  - el cronista
  rationale: Se conserva el valor de oficio real/administrativo sin introducir un cargo eclesiástico o literario moderno. «Registrador» comunica el papel de funcionario de memoria documental del reino.
  doctrine_reference: Lexical decision under royal offices; no doctrinal locus
- issue: Sentido de לְחַזֵּק en un contexto arquitectónico
  english_pob_reading: to repair
  chosen_spanish_reading: para reparar
  alternative_spanish_readings:
  - para fortalecer
  - para restaurar
  rationale: 'La traducción sigue la lectura contextual del inglés POB: el verbo literal es «fortalecer», pero aquí se refiere a la rehabilitación del edificio. Se mantiene la tensión lexical mediante la nota implícita en la decisión léxica, sin perder claridad en español.'
  doctrine_reference: Lexical/contextual decision; no doctrinal locus
translation_notes:
  revision_awareness: 'Alineado con la revisión más reciente del inglés POB: se mantiene la lectura óptima «house»/«casa» y el valor contextual de לְחַזֵּק como «repair». No se incorporaron cambios de revisión adicionales porque el pasaje quedó sin modificaciones en el último pase.'
  spanish_consistency_notes:
  - Se usa «Yahvé» para el Tetragrámaton conforme al estándar del proyecto.
  - Se conserva «casa» para בַּיִת a fin de mantener la correspondencia con la frase final «la casa de Yahvé».
  - 'Los nombres propios se adaptan a grafía castellana bíblica habitual: Safán, Azalía, Maasías, Joah, Joacaz.'
  - «Registrador» se emplea como título administrativo; no debe entenderse como simple oficio moderno de archivo.
  - La puntuación y el orden de los miembros siguen de cerca la sintaxis hebrea, con ajuste natural al español.
