revisions:
- from: Y prepararon el altar sobre sus bases[a], porque el temor estaba sobre ellos a causa de los pueblos de las tierras; y ofrecieron sobre él holocaustos a Yahvé[b], holocaustos por la mañana y por la tarde.
  to: Entonces colocaron el altar sobre sus bases[a], porque el temor estaba sobre ellos[b] por causa de los pueblos de las tierras, y ofrecieron sobre él holocaustos a Yahvé, holocaustos por la mañana y por la tarde.
  rationale: Se ajusta וַיָּכִינוּ a «colocaron» para reflejar mejor la reinstalación física del altar sobre sus bases. Se mejora la nota [b] para preservar la formulación más literal del hebreo y luego explicarla. También se hace más natural el arranque narrativo en español con «Entonces».
  reviewer_model: gpt-5.4
