revisions:
- from: Y el maná cesó al día siguiente[a], después de que habían comido del fruto de la tierra. Ya no hubo más maná para los hijos de Israel[b], y comieron del producto de la tierra de Canaán aquel año.
  to: Y el maná cesó al día siguiente, después de que comieron del producto[a] de la tierra. Ya no hubo maná para los hijos de Israel[b], y comieron del producto de la tierra de Canaán aquel año.
  rationale: Se corrige el anclaje de la nota [a] para que coincida con la expresión que realmente explica, se mejora la naturalidad temporal con «después de que comieron», se elimina la redundancia de «ya no hubo más», y se usa «producto» para armonizar mejor con la nota léxica y el sentido agrícola del hebreo.
