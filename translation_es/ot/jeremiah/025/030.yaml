translation:
  language: es
  text: 'Y tú profetizarás contra ellos todas estas palabras, y les dirás: «Yahvé rugirá desde lo alto, y desde su santa morada dará su voz; ciertamente rugirá contra su pastizal[a]. Gritará como los que pisan uvas[b], contra todos los habitantes de la tierra[c]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «sobre su morada». El hebreo נָוֶה puede significar «pastizal», «morada» o «habitación».
    reason: lexical_alternative
  - marker: b
    text: O «los que pisan uvas». El verbo alude al lagar y a la vendimia.
    reason: lexical_alternative
  - marker: c
    text: O «a todos los habitantes de la tierra». La preposición puede leerse de manera más neutra como «a», aunque el contexto de juicio apoya «contra».
    reason: alternative_reading
lexical_decisions:
- source_word: תִּנָּבֵא
  english_pob_choice: you shall prophesy
  chosen_spanish: profetizarás
  alternatives_spanish:
  - hablarás como profeta
  - proclamarás
  lexicon: HALOT
  rationale: El nifal de נבא es el verbo normal para ejercer profecía. «Profetizarás» conserva el registro profético mejor que «proclamarás», que suena más general.
- source_word: אֲלֵיהֶם ... אֵת כָּל הַדְּבָרִים הָאֵלֶּה
  english_pob_choice: all these words against them
  chosen_spanish: contra ellos todas estas palabras
  alternatives_spanish:
  - para ellos todas estas palabras
  - todas estas cosas contra ellos
  lexicon: HALOT
  rationale: Aunque אֲלֵיהֶם puede ser «a/para ellos», aquí el contexto es de juicio y la dirección es adversativa. «Contra ellos» mantiene ese valor sin perder el objeto directo «todas estas palabras».
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  - el SEÑOR
  lexicon: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
  rationale: Se usa «Yahvé» para el Tetragrama, siguiendo el estándar del proyecto de preservar el nombre divino en vez de sustituirlo por un título.
- source_word: מִמָּרוֹם
  english_pob_choice: from on high
  chosen_spanish: desde lo alto
  alternatives_spanish:
  - desde el cielo
  - desde la altura
  lexicon: HALOT
  rationale: «Desde lo alto» conserva la imagen espacial elevada sin añadir especificación que el hebreo no exige.
- source_word: יִשְׁאָג
  english_pob_choice: will roar
  chosen_spanish: rugirá
  alternatives_spanish:
  - bramará
  - emitirá un rugido
  lexicon: HALOT
  rationale: El verbo evoca el rugido de un león; «rugirá» preserva esa fuerza imagética para el juicio divino.
- source_word: מִמְּעוֹן קָדְשׁוֹ
  english_pob_choice: from his holy dwelling
  chosen_spanish: desde su santa morada
  alternatives_spanish:
  - desde su santa habitación
  - desde su santo habitáculo
  lexicon: HALOT
  rationale: «Morada» comunica bien מָעוֹן en español y «santa» mantiene el carácter sagrado del lugar.
- source_word: יִתֵּן קוֹל֔וֹ
  english_pob_choice: he will give his voice
  chosen_spanish: dará su voz
  alternatives_spanish:
  - alzará su voz
  - emitirá su voz
  lexicon: HALOT
  rationale: La locución hebrea es literalmente «dar su voz». «Dará su voz» conserva esa forma sin volverla demasiado idiomática.
- source_word: שָׁאֹג יִשְׁאַג
  english_pob_choice: he will surely roar
  chosen_spanish: ciertamente rugirá
  alternatives_spanish:
  - rugirá con fuerza
  - rugiendo, rugirá
  lexicon: HALOT
  rationale: El infinitivo absoluto refuerza la acción; «ciertamente» refleja esa intensificación de manera natural en español.
- source_word: עַל נָוֵהוּ
  english_pob_choice: against his pasture
  chosen_spanish: sobre su pastizal
  alternatives_spanish:
  - contra su morada
  - sobre su pasto
  lexicon: HALOT
  rationale: El sustantivo נָוֶה admite «pastizal», «habitación» o «morada». Se mantiene la imagen pastoril que armoniza con el símil del león y el contexto de juicio. «Sobre» reproduce de forma más neutral la preposición עַל, que puede llevar fuerza adversativa o locativa.
- source_word: הֵידָד
  english_pob_choice: a shout
  chosen_spanish: Gritará
  alternatives_spanish:
  - Dará un grito
  - Lanzará un clamor
  lexicon: HALOT
  rationale: הֵידָד es un grito fuerte, a menudo asociado con vendimia o batalla. En castellano, «gritará» funciona con naturalidad como equivalente del clamor vibrante del pasaje.
- source_word: כְּדֹרְכִים
  english_pob_choice: like those who tread grapes
  chosen_spanish: como los que pisan uvas
  alternatives_spanish:
  - como pisadores de uvas
  - como los vendimiadores que pisan
  lexicon: HALOT
  rationale: El participio se refiere específicamente a quienes pisan uvas en el lagar. «Pisan uvas» explicita la imagen cultural para el lector moderno.
- source_word: יַעֲנֶה
  english_pob_choice: he will answer
  chosen_spanish: Gritará
  alternatives_spanish:
  - Responderá
  - Contestará
  lexicon: HALOT
  rationale: Aquí el hebreo puede expresar una respuesta clamada o un grito correlativo, no necesariamente un «responder» verbal a alguien. Se integra en la misma línea de «gritará» para conservar la imagen sonora sin forzar la sintaxis.
- source_word: אֶל כָּל יֹשְׁבֵי הָאָרֶץ
  english_pob_choice: against all the inhabitants of the earth
  chosen_spanish: contra todos los habitantes de la tierra
  alternatives_spanish:
  - a todos los habitantes de la tierra
  - contra todos los que habitan la tierra
  lexicon: HALOT
  rationale: Aunque אֶל suele ser «a», el contexto del oráculo de juicio favorece la dirección contra los destinatarios. «Habitantes de la tierra» es una fórmula natural y amplia para el alcance universal.
theological_decisions:
- issue: El nombre divino יְהוָה en un oráculo de juicio
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - el SEÑOR
  rationale: Se preserva el nombre personal de Dios como exige la política del proyecto, evitando el sustituto tradicional «SEÑOR».
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
translation_notes:
  revision_awareness: 'El inglés POB pasó por una revisión menor en la segunda mitad del verso: cambió «He will answer with a shout» por «He will shout» para reflejar mejor el valor léxico de יַעֲנֶה. La presente versión española evita ese problema traduciendo el efecto sonoro con «Gritará» y manteniendo el paralelismo intensificado de «ciertamente rugirá».'
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» de forma consistente para יְהוָה, conforme al criterio del proyecto.
  - Se conservó la distinción entre «rugirá» y «gritará» para reflejar dos verbos hebreos distintos y no aplanar la imaginería.
  - «Habitantes de la tierra» preserva el universalismo del cierre sin introducir términos teológicos ajenos al texto.
