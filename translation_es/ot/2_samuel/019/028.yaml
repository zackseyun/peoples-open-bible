translation:
  language: es
  text: Él difamó a tu siervo ante mi señor el rey, pero mi señor el rey es como el ángel de Dios[a]; haz lo que es bueno a tus ojos[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O ‘como un ángel de Dios’, es decir, uno con discernimiento excepcional.
    reason: lexical_alternative
  - marker: b
    text: 'Modismo hebreo: ‘a tus ojos’; es decir, ‘como te parezca’ o ‘como juzgues conveniente’.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְרַגֵּל
  english_pob_choice: He slandered
  chosen_spanish: difamó
  alternatives_spanish:
  - habló mal de
  - calumnió
  - inició rumores contra
  lexicon: HALOT, BDB
  rationale: El contexto no sugiere espionaje literal, sino una denuncia hostil o desacreditación ante el rey. 'Difamó' conserva esa fuerza adversarial en español moderno sin introducir una paráfrasis excesiva.
- source_word: בְּעַבְדְּךָ
  english_pob_choice: your servant
  chosen_spanish: tu esclavo
  alternatives_spanish:
  - tu siervo
  lexicon: HALOT, BDB
  rationale: POB documenta 'slave' para עבד cuando se busca fuerza léxica; en español, 'esclavo' refleja mejor ese valor básico que 'siervo'. Aunque en fórmulas cortesanas puede sonar deferencial, se conserva el término más fuerte para no suavizar el original sin base textual suficiente.
- source_word: אֶל אֲדֹנִי הַמֶּלֶךְ
  english_pob_choice: to my lord the king
  chosen_spanish: ante mi señor el rey
  alternatives_spanish:
  - a mi señor el rey
  - contra mi señor el rey
  - delante de mi señor el rey
  lexicon: HALOT, BDB
  rationale: El hebreo marca dirección 'hacia' el rey; en este contexto judicial/cortesano, 'ante mi señor el rey' comunica con naturalidad el ámbito de la acusación sin convertirlo en un simple 'a'. Se evita 'contra' porque intensifica más de lo que exige la preposición.
- source_word: וַאדֹנִי הַמֶּלֶךְ
  english_pob_choice: but my lord the king
  chosen_spanish: pero mi señor el rey
  alternatives_spanish:
  - y mi señor el rey
  - ahora mi señor el rey
  lexicon: HALOT, BDB
  rationale: La conjunción introduce contraste entre la difamación y el juicio de David. 'Pero' reproduce mejor ese giro discursivo que un 'y' meramente aditivo.
- source_word: כְּמַלְאַךְ הָאֱלֹהִים
  english_pob_choice: like the angel of God
  chosen_spanish: como el ángel de Dios
  alternatives_spanish:
  - como un ángel de Dios
  - como mensajero de Dios
  lexicon: HALOT, BDB
  rationale: Se conserva la comparación literal porque el hebreo usa una imagen reconocible sin explicarla. 'El ángel de Dios' mantiene la formulación bíblica y no resuelve de antemano la posible idea de discernimiento excepcional.
- source_word: וַעֲשֵׂה
  english_pob_choice: do
  chosen_spanish: haz
  alternatives_spanish:
  - y haz
  - así que haz
  lexicon: HALOT, BDB
  rationale: El imperativo se expresa de forma directa en español. Se omite cualquier conector añadido, siguiendo la revisión inglesa que retiró 'so' por no estar explícito en el hebreo.
- source_word: הַטּוֹב
  english_pob_choice: what is good
  chosen_spanish: lo que es bueno
  alternatives_spanish:
  - el bien
  - lo bueno
  lexicon: HALOT, BDB
  rationale: Como sustantivización del adjetivo, 'lo que es bueno' reproduce con claridad el valor evaluativo sin volverlo abstracto.
- source_word: בְּעֵינֶיךָ
  english_pob_choice: in your eyes
  chosen_spanish: en tus ojos
  alternatives_spanish:
  - a tu parecer
  - como te parezca
  lexicon: HALOT, BDB
  rationale: Se mantiene la metáfora hebrea de la percepción/juicio con una traducción literal y transparente. El español admite esta expresión, y preserva la tensión idiomática documentada por POB.
theological_decisions:
- issue: Interpretación de כְּמַלְאַךְ הָאֱלֹהִים
  english_pob_reading: Translated literally as 'like the angel of God' rather than resolving the phrase to 'wise/discerning' in the main text
  chosen_spanish_reading: como el ángel de Dios
  alternative_spanish_readings:
  - como un ángel de Dios
  - como alguien con discernimiento divino
  rationale: Se preserva la imagen bíblica sin convertirla en explicación. El pasaje no obliga a elegir entre una lectura literal y una inferida; por eso la principal mantiene el símil y deja al lector la implicación de discernimiento excepcional.
  doctrine_reference: 'Translation philosophy: original-language primacy; preserve tension rather than flattening imagery into interpretation.'
translation_notes:
  revision_awareness: 'La redacción española sigue la revisión más reciente del POB en inglés, que eliminó ''so'' para no añadir un conector no explícito. Por eso el imperativo queda desnudo: ''haz lo que es bueno en tus ojos''.'
  spanish_consistency_notes:
  - Se mantiene 'Dios' para הָאֱלֹהִים y 'ángel de Dios' sin reinterpretar la comparación.
  - Se evita 'SEÑOR' como sustituto de YHWH porque aquí no aparece el tetragrámaton sino אֲדֹנִי/אָדוֹנִי en fórmula cortesana.
  - '''Tu esclavo'' conserva la fuerza léxica de עבד conforme al criterio POB cuando no hay razón contextual suficiente para suavizarlo.'
  - La expresión final conserva el hebraísmo 'en tus ojos' por transparencia auditiva y para reflejar el modismo señalado en la auditoría.
