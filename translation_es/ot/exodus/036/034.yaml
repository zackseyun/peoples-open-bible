  glossary_alignment: No hay términos de glosario mayor implicados. «Recubrió de oro» funciona bien para צפה. «Barras» y «anillos» concuerdan con el audit trail. La excepción recomendada es sustituir «marcos» por «armazones», manteniendo «tablas» como alternativa en nota.
