lexical_decisions:
- source_word: לַמְנַצֵּחַ
  english_pob_choice: For the choirmaster
  chosen_spanish: Para el director musical
  alternatives_spanish:
  - Para el maestro de coro
  - Para el músico principal
  - Al director
  lexicon: HALOT
  rationale: En un encabezado de salmo, el término señala a la persona encargada de la ejecución musical. 'Director musical' comunica la función con naturalidad en español y evita el arcaísmo de una traducción literal como 'jefe músico'.
- source_word: מִזְמוֹר
  english_pob_choice: A psalm
  chosen_spanish: Salmo
  alternatives_spanish:
  - Canto
  - Poema
  - Melodía
  lexicon: HALOT
  rationale: Es el rótulo genérico del género poético-musical. 'Salmo' es el equivalente estable y claro en español bíblico.
- source_word: לְדָוִד
  english_pob_choice: of David
  chosen_spanish: de David
  alternatives_spanish:
  - por David
  - para David
  - perteneciente a David
  lexicon: HALOT
  rationale: La preposición לְ en los encabezados puede indicar autoría, asociación o dedicación. 'De David' conserva esa amplitud sin resolver indebidamente la relación exacta.
theological_decisions:
- issue: Relación entre el encabezado y David
  english_pob_reading: of David
  chosen_spanish_reading: de David
  alternative_spanish_readings:
  - por David
  - para David
  rationale: El hebreo no obliga a fijar estrictamente autoría o dedicación. 'De David' preserva la tensión documental y evita añadir una precisión histórica no demostrada por el encabezado mismo.
  doctrine_reference: Preservar ambigüedad textual cuando el original la mantiene.
translation_notes:
  revision_awareness: La nota se coloca al final de 'David', siguiendo la revisión auditada que corrigió la ubicación del marcador para que explique לְדָוִד y no 'director musical'.
  spanish_consistency_notes:
  - Se mantiene 'salmo' como término técnico del encabezado.
  - Se evita 'SEÑOR' porque aquí no aparece el nombre divino, sino una indicación musical y la relación con David.
  - La frase es breve y publicable, con registro digno y contemporáneo.
