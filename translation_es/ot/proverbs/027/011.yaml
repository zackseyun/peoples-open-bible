translation:
  language: es
  text: Sé sabio[b], hijo mío, y alegra mi corazón, para que pueda responder[a] al que me reprocha.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebreo literalmente, «y pueda devolver una palabra al que me reprocha»; es decir, «responder al que me reprocha».
    reason: lexical_alternative
  - marker: b
    text: 'Otra posibilidad: «Llega a ser sabio». El imperativo hebreo puede enfatizar tanto un estado («sé sabio») como la búsqueda o adquisición de la sabiduría.'
    reason: lexical_alternative
lexical_decisions:
- source_word: חֲכַם
  english_pob_choice: Be wise
  chosen_spanish: Sé sabio
  alternatives_spanish:
  - Hazte sabio
  - Llega a ser sabio
  - Sé prudente
  lexicon: HALOT
  rationale: El imperativo masculino singular de חכם admite tanto un estado como un proceso. En español, «sé sabio» conserva la exhortación directa y natural, sin añadir de más la idea de proceso que tendría «hazte sabio».
- source_word: בְּנִי
  english_pob_choice: my son
  chosen_spanish: hijo mío
  alternatives_spanish:
  - mi hijo
  - hijo mío
  lexicon: HALOT
  rationale: La forma con sufijo de primera persona singular significa literalmente «mi hijo». «Hijo mío» suena más idiomático y afectuoso en español que «mi hijo» en este tipo de exhortación sapiencial.
- source_word: וְשַׂמַּח לִבִּי
  english_pob_choice: make my heart glad
  chosen_spanish: alegra mi corazón
  alternatives_spanish:
  - y regocija mi corazón
  - y haz alegre mi corazón
  - y me alegra
  lexicon: HALOT
  rationale: El hifil expresa causación; «alegra mi corazón» mantiene la imagen concreta del hebreo. No se reduce a «me alegra», para no perder el objeto específico «corazón».
- source_word: וְאָשִׁיבָה
  english_pob_choice: that I may answer
  chosen_spanish: para que yo pueda responder
  alternatives_spanish:
  - y yo responderé
  - para responder
  - de modo que pueda responder
  lexicon: HALOT
  rationale: El cohortativo de שוב en la expresión «volver una palabra» funciona aquí como propósito/resulta-do. «Para que yo pueda responder» comunica el sentido idiomático sin literalismo rígido.
- source_word: חֹרְפִי
  english_pob_choice: the one who reproaches me
  chosen_spanish: al que me afrenta
  alternatives_spanish:
  - al que me reprocha
  - al que me insulta
  - al que me afrenta
  lexicon: HALOT
  rationale: El participio activo con sufijo denota a quien reprende/insulta/afrenta al hablante. «Afronta» conserva la fuerza hostil de חרף y suena natural en español bíblico contemporáneo.
- source_word: דָבָר
  english_pob_choice: answer
  chosen_spanish: responder
  alternatives_spanish:
  - dar respuesta
  - decir palabra
  - responder
  lexicon: HALOT
  rationale: En el modismo con שוב, דבר significa una respuesta verbal. En español, el verbo «responder» expresa de forma natural el valor idiomático sin forzar una traducción palabra por palabra.
translation_notes:
  revision_awareness: 'El borrador sigue de cerca el hebreo y el audit trail inglés: conserva el paralelismo exhortativo, la imagen de alegrar el corazón y el sentido idiomático de «volver una palabra» = responder. Se adopta una formulación española más natural que el inglés base, sin borrar las alternativas documentadas.'
  spanish_consistency_notes:
  - Se usa «sabio» para חכם, conforme al valor sapiencial del verso.
  - Se mantiene la imagen de «corazón» para לִבִּי, evitando una paráfrasis psicológica.
  - Se traduce el cohortativo final con una cláusula final de propósito («para que»), coherente con la revisión inglesa y con el sentido resultativo del hebreo.
  - Se preserva el tono exhortativo de proverbio y un registro bíblico moderno, no arcaizante.
