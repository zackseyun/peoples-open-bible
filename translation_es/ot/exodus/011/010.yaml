revisions:
- from: Y Moisés y Aarón hicieron todas estas señales delante de Faraón[a], y Yahvé endureció el corazón de Faraón[b], y no dejó salir de su tierra a los hijos de Israel[c].
  to: Y Moisés y Aarón hicieron todas estas señales delante de Faraón[a], y Yahvé endureció el corazón de Faraón[b], y no dejó salir a los hijos de Israel[c] de su tierra.
  rationale: Se ajusta el orden de los complementos en la cláusula final para que el español suene más natural y claro, manteniendo intacto el sentido del hebreo. También debe entenderse corregida la intención de la nota c, para que funcione como nota de alternativa léxica y no como repetición defectuosa de la lectura principal.
