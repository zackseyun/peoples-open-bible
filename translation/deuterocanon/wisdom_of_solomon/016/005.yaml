translation:
  text: For even when a terrible fury of wild beasts came upon them[a], and they were being destroyed by the bites of crooked serpents, your wrath did not remain to the end;
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'crooked snakes' or 'winding serpents.' The Greek adjective literally means 'crooked' or 'bent'; here it likely describes the serpents' twisting form rather than a moral quality.
    reason: lexical_alternative
lexical_decisions:
- source_word: δεινὸς
  chosen: terrible
  alternatives:
  - fearful
  - dreadful
  - severe
  lexicon: LSJ
  rationale: Conveys the intensity of the attack in natural modern English without overstating beyond the adjective's force.
- source_word: θηρίων θυμός
  chosen: rage of wild animals
  alternatives:
  - fury of beasts
  - anger of animals
  lexicon: LSJ
  rationale: θηρίων refers to wild beasts/animals, and θυμός here denotes violent fury. 'Rage of wild animals' is vivid and idiomatic while staying close to the Greek.
- source_word: ἐπῆλθεν
  chosen: came upon
  alternatives:
  - came against
  - fell upon
  lexicon: LSJ
  rationale: A standard rendering for an attack or calamity overtaking someone; it preserves the sense of something coming upon them.
- source_word: δήγμασίν
  chosen: bites
  alternatives:
  - stings
  - wounds from biting
  lexicon: LSJ
  rationale: The noun denotes bites; 'bites' is the plain and accurate English equivalent.
- source_word: σκολιῶν ὄφεων
  lemma: σκολιός
  chosen: twisting snakes
  alternatives:
  - crooked snakes
  - serpents that coil
  - winding snakes
  lexicon: LSJ
  rationale: σκολιός literally means crooked/bent. In this context of serpents, 'twisting' communicates the physical image naturally in English without importing moral connotations.
- source_word: διεφθείροντο
  chosen: were being destroyed
  alternatives:
  - were perishing
  - were being ruined
  - were being killed
  lexicon: LSJ
  rationale: The imperfect/passive sense suggests an ongoing destructive process. 'Were being destroyed' preserves that aspect and the severity of the affliction.
- source_word: οὐ μέχρι τέλους ἔμεινεν
  chosen: did not remain to the end
  alternatives:
  - did not continue to the end
  - did not last to the end
  - did not persist to the end
  lexicon: LSJ
  rationale: This keeps the temporal expression close to the Greek while allowing the next verse to explain the temporary nature of the judgment.
- source_word: ἡ ὀργή σου
  chosen: your wrath
  alternatives:
  - your anger
  lexicon: LSJ
  rationale: ὀργή is stronger than ordinary irritation; 'wrath' better matches the solemn register and judicial sense of divine anger in context.
