revisions:
- from: Pero si son profetas[a], y si la palabra de Yahvé está con ellos, que ahora[s] rueguen a Yahvé de los ejércitos[b] para que los utensilios restantes en la casa de Yahvé, en la casa del rey de Judá[c] y en Jerusalén no vayan a Babilonia.
  to: Pero si son profetas[a], y si la palabra de Yahvé está con ellos, que ahora rueguen a Yahvé de los ejércitos para que los utensilios restantes en la casa de Yahvé, en la casa del rey de Judá[c], y en Jerusalén no vayan a Babilonia[b].
  rationale: 'La traducción base es fiel, pero requiere una reparación menor obligatoria: eliminar el marcador huérfano [s] y restaurar la nota auditada sobre el hebreo literal «venir a Babilonia». También se reordena la puntuación para mayor naturalidad en español y para que cada marcador corresponda exactamente a una nota válida.'
