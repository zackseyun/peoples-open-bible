translation:
  language: es
  text: En aquel tiempo —declara Yahvé— sacarán los huesos de los reyes de Judá, los huesos de sus funcionarios, los huesos de los sacerdotes, los huesos de los profetas y los huesos de los habitantes de Jerusalén de sus sepulcros.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: בָּעֵת הַהִיא
  english_pob_choice: At that time
  chosen_spanish: En aquel tiempo
  alternatives_spanish:
  - En ese tiempo
  - Entonces
  lexicon: HALOT
  rationale: La expresión temporal deíctica se conserva de forma natural en español con «En aquel tiempo», que mantiene el valor introductorio y profético del hebreo sin sonar forzado.
- source_word: נְאֻם יְהוָה
  english_pob_choice: declares Yahweh
  chosen_spanish: declara Yahvé
  alternatives_spanish:
  - dice Yahvé
  - oráculo de Yahvé
  lexicon: HALOT
  rationale: La fórmula profética se rinde con un verbo de enunciación solemne y breve. Se usa «Yahvé» por la directriz del proyecto para יְהוָה, y «declara» preserva el registro formal del hebreo y del inglés auditado.
- source_word: וְיֹצִיאוּ
  english_pob_choice: they will bring out
  chosen_spanish: sacarán
  alternatives_spanish:
  - traerán fuera
  - sacarán afuera
  lexicon: HALOT
  rationale: El hebreo causativo expresa que los huesos serán extraídos de las tumbas. «Sacarán» es idiomático, directo y mantiene el matiz de desenterrar o extraer sin añadir interpretación excesiva.
- source_word: עַצְמוֹת
  english_pob_choice: bones
  chosen_spanish: los huesos
  alternatives_spanish:
  - los restos
  - los cadáveres
  lexicon: HALOT
  rationale: Se conserva el sustantivo concreto «huesos», porque el hebreo lo repite con fuerza retórica. «Restos» suavizaría indebidamente la imagen.
- source_word: מַלְכֵי יְהוּדָה
  english_pob_choice: the kings of Judah
  chosen_spanish: los reyes de Judá
  alternatives_spanish:
  - los monarcas de Judá
  - los reyes del reino de Judá
  lexicon: HALOT
  rationale: Construcción nominal directa y transparente; «reyes de Judá» refleja fielmente el hebreo sin necesidad de expansión.
- source_word: שָׂרָיו
  english_pob_choice: its officials
  chosen_spanish: sus funcionarios
  alternatives_spanish:
  - sus príncipes
  - sus oficiales
  - sus jefes
  lexicon: HALOT
  rationale: Aunque שָׂרִים puede ser «príncipes» o «gobernantes», el contexto político-administrativo favorece «funcionarios» en español contemporáneo. El posesivo «sus» retoma Judá de manera natural.
- source_word: הַכֹּהֲנִים
  english_pob_choice: the priests
  chosen_spanish: los sacerdotes
  alternatives_spanish:
  - los curas
  lexicon: HALOT
  rationale: «Sacerdotes» es el equivalente bíblico y eclesial adecuado para el oficio cultual hebreo.
- source_word: הַנְּבִיאִים
  english_pob_choice: the prophets
  chosen_spanish: los profetas
  alternatives_spanish:
  - los anunciadores
  lexicon: HALOT
  rationale: Término estándar y directo, sin necesidad de variación.
- source_word: יוֹשְׁבֵי יְרוּשָׁלִָם
  english_pob_choice: the inhabitants of Jerusalem
  chosen_spanish: los habitantes de Jerusalén
  alternatives_spanish:
  - los residentes de Jerusalén
  - los que habitan en Jerusalén
  lexicon: HALOT
  rationale: El participio sustantivado se traduce con «habitantes», que es natural en español y preserva el sentido colectivo de los que viven en la ciudad.
- source_word: מִקִּבְרֵיהֶם
  english_pob_choice: from their graves
  chosen_spanish: de sus sepulcros
  alternatives_spanish:
  - de sus tumbas
  - desde sus sepulcros
  - de sus enterramientos
  lexicon: HALOT
  rationale: «Sepulcros» comunica el lugar de enterramiento con solemnidad literaria y evita la repetición demasiado prosaica de «graves» en español. El sentido de separación desde el lugar funerario queda claro en el contexto de «sacarán».
theological_decisions:
- issue: Renderización del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Señor
  - Yahweh
  rationale: La política del proyecto pide transliterar el Tetragrama como «Yahvé» en el texto principal. Esto conserva el nombre propio divino en vez de sustituirlo por un título.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Fórmula profética נְאֻם יְהוָה
  english_pob_reading: declares Yahweh
  chosen_spanish_reading: declara Yahvé
  alternative_spanish_readings:
  - oráculo de Yahvé
  - dice Yahvé
  rationale: Se mantiene el carácter formal de la fórmula profética sin convertirla en una perífrasis más interpretativa. «Declara» refleja adecuadamente el tono de anuncio autorizado.
  doctrine_reference: 'DOCTRINE.md Translation philosophy: original-language primacy; preserve prophetic register'
- issue: Repetición retórica de «huesos»
  english_pob_reading: Repeat 'the bones of' for each group
  chosen_spanish_reading: Repetir «los huesos de» antes de cada grupo
  alternative_spanish_readings:
  - Reducir la lista a una sola ocurrencia
  - Usar pronombres elípticos
  rationale: La repetición del hebreo intensifica la imagen de profanación. En español se conserva la repetición para no borrar ese efecto retórico y teológico.
  doctrine_reference: 'DOCTRINE.md Translation philosophy: original-language primacy; consistency of key terms'
translation_notes:
  revision_awareness: El inglés auditado mantiene alta concordancia con el hebreo y no presenta revisiones pendientes. La versión española sigue esa misma lectura, con ajuste terminológico para el nombre divino y con preservación de la repetición enfática de «los huesos de».
  spanish_consistency_notes:
  - Se mantiene «Yahvé» para יְהוָה, conforme a la terminología del proyecto.
  - Se conserva la repetición de «los huesos» para reflejar la intensificación del hebreo.
  - «Sepulcros» se usa como equivalente digno y claro de קברים en este contexto funerario.
