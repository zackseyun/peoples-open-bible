translation:
  language: es
  text: y nuestro nombre será olvidado con el tiempo, y nadie recordará nuestras obras; y nuestra vida pasará como la huella[a] de una nube, y será dispersada como niebla[b], ahuyentada por los rayos del sol y cargada por su calor.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «el rastro de una nube» para ἴχνη νεφέλης; la imagen es la de una marca efímera que desaparece rápidamente.
    reason: lexical_alternative
  - marker: b
    text: O «se desvanecerá» para διασκεδασθήσεται, aunque «será dispersada» conserva mejor el movimiento pasivo de la imagen griega.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐπιλησθήσεται
  english_pob_choice: will be forgotten
  chosen_spanish: será olvidado
  alternatives_spanish:
  - será dejado en el olvido
  - será olvidado por completo
  lexicon: BDAG
  rationale: El pasivo futuro expresa que el nombre queda sujeto al olvido. En español, «será olvidado» reproduce bien la pasividad y suena natural en el registro sapiencial.
- source_word: ἐν χρόνῳ
  english_pob_choice: in time
  chosen_spanish: con el tiempo
  alternatives_spanish:
  - en el tiempo
  - a su debido tiempo
  lexicon: LSJ
  rationale: La expresión señala el paso del tiempo en general, no un momento preciso. «Con el tiempo» es idiomático en español y conserva esa amplitud temporal.
- source_word: μνημονεύσει
  english_pob_choice: will remember
  chosen_spanish: recordará
  alternatives_spanish:
  - hará memoria de
  - se acordará de
  lexicon: BDAG
  rationale: Aquí el verbo contrasta con «será olvidado» y alude a la memoria de las acciones. «Recordará» mantiene la idea principal con fluidez natural; «hará memoria de» suena más marcado y menos corriente.
- source_word: τῶν ἔργων ἡμῶν
  english_pob_choice: our works
  chosen_spanish: nuestras obras
  alternatives_spanish:
  - nuestras acciones
  - nuestras obras hechas
  lexicon: BDAG
  rationale: «Obras» conserva el vínculo léxico con ἔργα y funciona bien en un pasaje reflexivo. «Acciones» suavizaría el paralelismo con el original.
- source_word: παρελεύσεται
  english_pob_choice: will pass by
  chosen_spanish: pasará
  alternatives_spanish:
  - pasará de largo
  - pasará y se irá
  lexicon: BDAG
  rationale: El verbo indica pasar o transcurrir. En español, «pasará» es suficiente y elegante; el contexto simulado añade la sensación de fugacidad sin sobretraducir.
- source_word: ὁ βίος ἡμῶν
  english_pob_choice: our life
  chosen_spanish: nuestra vida
  alternatives_spanish:
  - nuestra existencia
  - nuestro tiempo de vida
  lexicon: BDAG
  rationale: βίος se refiere aquí a la vida terrenal o duración de la vida. «Nuestra vida» es la forma más directa y clara en español.
- source_word: ἴχνη νεφέλης
  english_pob_choice: the trace of a cloud
  chosen_spanish: la huella de una nube
  alternatives_spanish:
  - el rastro de una nube
  - la marca de una nube
  lexicon: LSJ
  rationale: La imagen describe algo momentáneo que deja un indicio apenas visible. «Huella» comunica bien ese carácter fugaz en español; la alternativa «rastro» es posible, pero «huella» conserva mejor la impresión visual.
- source_word: ὁμίχλη
  english_pob_choice: mist
  chosen_spanish: niebla
  alternatives_spanish:
  - bruma
  - vaho
  lexicon: LSJ
  rationale: El término griego designa una vaporosidad ligera que se dispersa. «Niebla» es comprensible y literaria; «bruma» sería una alternativa más suave, pero menos directa en este contexto.
- source_word: διασκεδασθήσεται
  english_pob_choice: will be scattered
  chosen_spanish: será dispersada
  alternatives_spanish:
  - será esparcida
  - se desvanecerá
  lexicon: BDAG
  rationale: El pasivo futuro indica dispersión o disgregación. «Será dispersada» preserva con precisión la forma pasiva del original.
- source_word: διωχθεῖσα
  english_pob_choice: driven off
  chosen_spanish: ahuyentada
  alternatives_spanish:
  - expulsada
  - echada
  lexicon: LSJ
  rationale: El participio expresa que la niebla es apartada por una fuerza externa. «Ahuyentada» transmite bien ese impulso causativo en español sin perder la imagen.
- source_word: ἀκτίνων ἡλίου
  english_pob_choice: the sun’s rays
  chosen_spanish: los rayos del sol
  alternatives_spanish:
  - los rayos solares
  - las radiaciones del sol
  lexicon: LSJ
  rationale: Es una construcción posesiva simple y natural en español. «Los rayos del sol» conserva la claridad imagética.
- source_word: βαρυνθεῖσα
  english_pob_choice: weighed down
  chosen_spanish: abatida
  alternatives_spanish:
  - agobiada
  - aplastada
  lexicon: LSJ
  rationale: El participio literalmente sugiere «hecha pesada». En el contexto de la niebla bajo el calor, «abatida» comunica bien la acción del calor sobre algo que se debilita y cede; «agobiada» sería más interpretativo.
- source_word: ὑπὸ θερμότητος αὐτοῦ
  english_pob_choice: by its heat
  chosen_spanish: por su calor
  alternatives_spanish:
  - por el calor de él
  - por su temperatura
  lexicon: LSJ
  rationale: El pronombre remite al sol. En español, «por su calor» es claro, breve y fiel a la imagen física.
theological_decisions:
- issue: No hay una decisión doctrinal disputada en este versículo; el reto es principalmente imagético y léxico.
  english_pob_reading: The verse presents a meditation on the transience of human reputation, memory, and life through natural similes.
  chosen_spanish_reading: El versículo presenta una meditación sobre la fugacidad del nombre, la memoria de las obras y la vida humana mediante símiles naturales.
  alternative_spanish_readings:
  - La frase podría entenderse más moralmente como una censura de la vanagloria humana.
  - También podría leerse simplemente como una observación poética sin carga exhortativa directa.
  rationale: La traducción debe conservar el tono sapiencial y contemplativo del griego. No hay necesidad de cargar el texto con una interpretación doctrinal adicional; basta con reflejar la imagen de fugacidad y desaparición.
  doctrine_reference: Sabiduría sapiencial / antropología bíblica de la fugacidad humana
translation_notes:
  revision_awareness: La versión inglesa auditada fue revisada para sustituir 'tracks of a cloud' por 'the trace of a cloud', con el fin de acercarse más al singular de ἴχνη; la presente traducción opta por 'la huella de una nube' para mantener esa correspondencia singular y la naturalidad en español. Se preservó el paralelismo de dos miembros finales con imágenes de dispersión y abatimiento, sin añadir explicaciones interpretativas no presentes en el original.
  spanish_consistency_notes:
  - Se mantiene 'obras' para τὰ ἔργα, en consonancia con la opción léxica inglesa y con el tono sapiencial del pasaje.
  - 'Se conserva la progresión imagética: olvido del nombre, memoria de las obras, paso de la vida, huella de nube, dispersión de la niebla, sin introducir intensificación teológica ajena al texto.'
  - El marcador [a] se ancla en 'huella de una nube' por la alternativa lexical más relevante; [b] se ancla en 'será dispersada' por la alternativa verbal principal.
