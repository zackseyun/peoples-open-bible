  lexicon: LSJ
  rationale: λογισμός conserva la idea de razonamiento deliberativo, y εὐσέβεια se vierte como «piedad» para mantener el vínculo temático del libro entre razón y reverencia hacia Dios.
- source_word: φιλοσοφοῦντες
  english_pob_choice: by philosophizing
  chosen_spanish: filosofando
  alternatives_spanish:
  - practicando la filosofía
  - viviendo filosóficamente
  lexicon: LSJ
  rationale: El participio debe preservarse de forma explícita; «filosofando» reproduce el medio o modo sin diluir la terminología filosófica del griego.
- source_word: χαλεπωτέρων
  english_pob_choice: more severe
