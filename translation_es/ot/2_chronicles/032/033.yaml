translation:
  language: es
  text: Y Ezequías durmió con sus padres, y lo sepultaron en la parte alta de los sepulcros de los hijos[a] de David. Y toda Judá y los habitantes de Jerusalén le rindieron honor al morir, y Manasés, su hijo, reinó en su lugar.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «los sepulcros de los descendientes de David»; «hijos de David» aquí se refiere a la línea real davídica.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּשְׁכַּב
  english_pob_choice: slept
  chosen_spanish: se acostó
  alternatives_spanish:
  - durmió
  - se durmió
  - murió
  lexicon: HALOT
  rationale: El hebreo usa un eufemismo funerario. En español, «se acostó» conserva mejor la fórmula narrativa y la alusión indirecta a la muerte, sin volverla demasiado rígida o extraña.
- source_word: עִם אֲבֹתָיו
  english_pob_choice: with his fathers
  chosen_spanish: con sus padres
  alternatives_spanish:
  - con sus antepasados
  - con sus padres ancestrales
  lexicon: HALOT
  rationale: «Padres» mantiene la forma hebrea de la fórmula dinástica y funciona bien en español bíblico. «Antepasados» explicita el sentido, pero suaviza la expresión tradicional.
- source_word: וַיִּקְבְּרֻהוּ
  english_pob_choice: they buried him
  chosen_spanish: lo sepultaron
  alternatives_spanish:
  - lo enterraron
  - fue sepultado
  lexicon: HALOT
  rationale: El verbo hebreo es activo plural. «Lo sepultaron» preserva esa voz y encaja con el registro solemne del relato; «fue sepultado» pierde el sujeto implícito.
- source_word: בְּמַעֲלֵה
  english_pob_choice: in the upper part of
  chosen_spanish: en la parte alta de
  alternatives_spanish:
  - en la subida de
  - en el lugar alto de
  lexicon: HALOT
  rationale: La expresión es topográfica y algo ambigua. «En la parte alta de» conserva la cautela del inglés POB sin forzar una reconstrucción arquitectónica.
- source_word: קִבְרֵי בְנֵי דָוִיד
  english_pob_choice: the tombs of the sons of David
  chosen_spanish: los sepulcros de los hijos de David
  alternatives_spanish:
  - las tumbas de los descendientes de David
  - los sepulcros de la dinastía de David
  lexicon: HALOT
  rationale: «Hijos de David» sigue de cerca el hebreo y conserva la referencia dinástica. «Sepulcros» es una opción digna y bíblica en español; la nota aclara el sentido de linaje sin borrar la literalidad.
- source_word: וְכָבוֹד עָשׂוּ לוֹ
  english_pob_choice: honored him
  chosen_spanish: le rindieron honor
  alternatives_spanish:
  - le hicieron honor
  - lo honraron
  lexicon: HALOT
  rationale: El hebreo dice literalmente «hicieron honor a él». «Le rindieron honor» reproduce el valor idiomático con naturalidad en español y conserva la solemnidad del gesto público.
- source_word: בְמוֹתוֹ
  english_pob_choice: at his death
  chosen_spanish: a su muerte
  alternatives_spanish:
  - cuando murió
  - al morir
  lexicon: HALOT
  rationale: «A su muerte» es breve, formal y ajustado al sentido temporal del hebreo, sin desplazar el foco al momento narrativo de un modo demasiado explicativo.
- source_word: כָּל יְהוּדָה וְיֹשְׁבֵי יְרוּשָׁלִָם
  english_pob_choice: all Judah and the inhabitants of Jerusalem
  chosen_spanish: toda Judá y los habitantes de Jerusalén
  alternatives_spanish:
  - todo Judá y los residentes de Jerusalén
  - toda Judá y los moradores de Jerusalén
  lexicon: HALOT
  rationale: «Habitantes» es la manera más directa y formal de representar el participio hebreo. Mantiene el alcance público del homenaje.
- source_word: וַיִּמְלֹךְ ... תַּחְתָּיו
  english_pob_choice: reigned in his place
  chosen_spanish: reinó ... en su lugar
  alternatives_spanish:
  - reinó en su lugar
  - comenzó a reinar en su lugar
  - reinó en vez de él
  lexicon: HALOT
  rationale: La fórmula de sucesión se expresa de modo natural con «en su lugar». «Comenzó a reinar» añade algo que el texto no dice explícitamente.
theological_decisions:
- issue: Eufemismo funerario real
  english_pob_reading: Retain the idiom 'slept with his fathers' rather than flattening it to 'died.'
  chosen_spanish_reading: Conservar una fórmula eufemística («se acostó con sus padres») en vez de reemplazarla por «murió».
  alternative_spanish_readings:
  - murió con sus padres
  - falleció
  rationale: El hebreo usa una fórmula real estereotipada que enlaza la muerte con la línea dinástica. La traducción debe preservar esa continuidad literaria y no despojar el texto de su tono funerario tradicional.
  doctrine_reference: Translation philosophy §1, §6
- issue: Sentido dinástico de «hijos de David»
  english_pob_reading: Keep 'sons of David' in the main text, with explanatory footnote noting the dynastic sense 'descendants of David.'
  chosen_spanish_reading: Mantener «hijos de David» en el texto principal, con nota que aclare el sentido de linaje dinástico.
  alternative_spanish_readings:
  - descendientes de David
  rationale: La frase hebrea es literal, pero en este contexto alude a la línea real davídica. La nota permite transparencia sin borrar el vínculo formal con el original.
  doctrine_reference: Translation philosophy §3, §5
translation_notes:
  revision_awareness: 'La versión española sigue el estado revisado del texto fuente: el auditor inglés mantuvo intactas sus decisiones y no hubo cambios posteriores en la revisión más reciente. Por eso no se introducen ajustes textuales adicionales ni se atenúan las tensiones léxicas documentadas.'
  spanish_consistency_notes:
  - Se usa «Yahvé» para el nombre divino solo cuando aparece en el texto fuente; este versículo no lo contiene, así que no se introduce.
  - Se mantiene el paralelismo narrativo y funerario del hebreo sin transformar la frase en una paráfrasis moderna.
  - «Hijos de David» se conserva en la nota como linaje real, en línea con el análisis auditado del inglés POB.
  - La elección de «sepulcros» respeta el registro bíblico español y evita una opción demasiado moderna o demasiado doméstica.
