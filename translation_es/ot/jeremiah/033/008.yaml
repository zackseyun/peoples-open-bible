    issue: «Los limpiaré» para וְטִהַרְתִּים
    rationale: Aunque es posible, en español suena más físico y menos cultual/moral que «los purificaré». Dado el contexto de iniquidad y perdón, «purificaré» representa mejor טהר sin perder naturalidad.
  - severity: low
    issue: Puntuación con punto y coma
    rationale: El punto y coma no es incorrecto, pero una simple coma fluye mejor en español bíblico moderno y mantiene el paralelismo de la frase.
  - severity: low
    issue: Redacción de la nota b
    rationale: La nota «O «culpas» / «iniquidades»» es menos precisa porque una de las opciones ya es la lectura principal. Es preferible ofrecer solo la alternativa real o explicar el valor plural de עָוֹן con mayor limpieza.
