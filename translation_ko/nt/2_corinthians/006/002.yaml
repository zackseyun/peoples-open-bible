  yaml_path: translation/nt/2_corinthians/006/002.yaml
  text: For he says, "At an acceptable time I listened to you, and in a day of salvation I helped you." Behold, now is the acceptable time; behold, now is the day of salvation.
  footnotes:
  - marker: a
    text: Or “I heard you favorably.” The verb can carry the sense of hearing with acceptance or response.
    reason: lexical_alternative
  - marker: b
    text: Or “now is the favorable time … now is the day of salvation.” Traditional English often uses the definite article here.
    reason: alternative_reading
