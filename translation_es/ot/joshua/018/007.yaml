  source_alignment_summary: 'El borrador español refleja bien el sentido del hebreo y del POB inglés: no hay porción territorial para los levitas entre las tribus, porque el sacerdocio de Yahvé es su heredad; Gad, Rubén y la media tribu de Manasés ya recibieron su heredad al este del Jordán por medio de Moisés. También preserva correctamente ''Yahvé'' para יְהוָה y ''siervo'' para עֶבֶד en el título honorífico. Sin embargo, la nota al pie está mal anclada: el marcador [a] aparece tras ''entre ustedes'', pero la nota explica el singular de ''נַחֲלָתוֹ / su heredad'', por lo que debe ir junto a esa expresión.'
  spanish_quality_summary: El español es claro, digno y ampliamente legible. 'Parte', 'entre ustedes', 'sacerdocio', 'han recibido', 'al otro lado del Jordán' y 'siervo de Yahvé' funcionan bien. 'Heredad' es aceptable y bíblicamente natural. La principal corrección necesaria es de formato y correspondencia semántica de la nota. Opcionalmente, 'que les dio' fluye un poco mejor que 'la cual les dio' en español moderno.
  glossary_alignment: 'La terminología del proyecto está bien respetada: יְהוָה → ''Yahvé''; כְהֻנַּת יְהוָה → ''el sacerdocio de Yahvé''; עֶבֶד יְהוָה → ''siervo de Yahvé''. No hay conflicto doctrinal. La decisión de mantener ''su heredad'' para el singular colectivo es defendible en español, siempre que la nota esté correctamente ubicada.'
  issues:
