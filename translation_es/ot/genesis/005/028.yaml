lexical_decisions:
- source_word: וַיְחִי
  english_pob_choice: lived
  chosen_spanish: vivió
  alternatives_spanish:
  - vivió por
  - estuvo vivo
  lexicon: HALOT
  rationale: En fórmulas genealógicas, חיה expresa la duración de vida hasta el evento siguiente. «Vivió» es la equivalencia natural y concisa en español para ese uso.
- source_word: לֶמֶךְ
  english_pob_choice: Lamech
  chosen_spanish: Lamec
  alternatives_spanish:
  - Lamech
  lexicon: Convención bíblica española
  rationale: En español bíblico, el nombre se adapta usualmente como «Lamec», manteniendo la identificación del personaje sin depender de la grafía inglesa.
- source_word: שְׁתַּיִם וּשְׁמֹנִים ... וּמְאַת שָׁנָה
  english_pob_choice: one hundred and eighty-two years
  chosen_spanish: ciento ochenta y dos años
  alternatives_spanish:
  - ciento ochenta y dos años
  - ciento ochenta y dos
  lexicon: HALOT
  rationale: La secuencia hebrea numérica se reordena en español al orden cardinal natural. «Años» se expresa en plural por la idiomaticidad del español, aunque el hebreo use singular en esta construcción.
- source_word: וַיּוֹלֶד
  english_pob_choice: fathered
  chosen_spanish: engendró
  alternatives_spanish:
  - fue padre de
  - tuvo un hijo
  lexicon: HALOT
  rationale: ילד en hifil con sujeto masculino indica «engendrar/father». «Engendró» conserva el valor genealógico técnico y es el equivalente más preciso y tradicional en español bíblico.
- source_word: בֵּן
  english_pob_choice: a son
  chosen_spanish: un hijo
  alternatives_spanish:
  - un hijo varón
  - un hijo
  lexicon: HALOT
  rationale: Aunque el inglés explicita «a son», en español bíblico «un hijo» es natural y suficiente; el artículo indefinido refleja que todavía no se nombra al descendiente.
