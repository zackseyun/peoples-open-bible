translation:
  language: es
  text: Así que los entregaste en manos[a] de sus adversarios, que los oprimían. Pero en el tiempo de su angustia clamaron a ti, y tú escuchaste desde los cielos; y conforme a tus abundantes misericordias les diste libertadores[b], que los salvaron de la mano de sus adversarios.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El hebreo dice literalmente «en mano de», una imagen de poder y dominio; en español se expresa de forma natural como «en manos de».
    reason: source_note
  - marker: b
    text: O «salvadores». El hebreo usa un término del campo de «salvar» para agentes humanos que Dios levantó para rescatar al pueblo.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַתִּתְּנֵם
  english_pob_choice: you gave them
  chosen_spanish: los entregaste
  alternatives_spanish:
  - los diste
  - los pusiste en poder de
  lexicon: HALOT
  rationale: En este contexto נתן expresa entregar a alguien al poder de otro. «Los entregaste» comunica esa cesión de control con naturalidad en español y conserva la fuerza relacional del verbo.
- source_word: בְּיַד
  english_pob_choice: into the hand of
  chosen_spanish: en mano de
  alternatives_spanish:
  - en poder de
  - en la mano de
  lexicon: HALOT
  rationale: La imagen hebrea de «mano» es concreta y repetida en el versículo. «En mano de» mantiene el giro idiomático sin volverlo rígido; la forma más extendida en español sería «en manos de», pero aquí el singular reproduce mejor el hebreo y el paralelismo con la frase final.
- source_word: צָרֵיהֶם
  english_pob_choice: their adversaries
  chosen_spanish: sus adversarios
  alternatives_spanish:
  - sus enemigos
  - sus opresores
  lexicon: HALOT
  rationale: «Adversarios» preserva el matiz de hostilidad/oposición sin absorberlo en el verbo siguiente «oprimían». Mantiene la distinción léxica del hebreo entre el sustantivo y la acción posterior.
- source_word: וַיָּצֵרוּ לָהֶם
  english_pob_choice: who oppressed them
  chosen_spanish: que los oprimían
  alternatives_spanish:
  - que los angustiaban
  - que los hostigaban
  - y los afligían
  lexicon: HALOT
  rationale: El verbo de la raíz צרר/צור aquí expresa presión, aflicción o acoso. «Oprimían» es la opción más idiomática en español y corresponde al sentido histórico de subyugación que el POB inglés también documenta.
- source_word: וּבְעֵת צָרָתָם
  english_pob_choice: But in the time of their distress
  chosen_spanish: Pero en el tiempo de su angustia
  alternatives_spanish:
  - Y en el tiempo de su angustia
  - Pero cuando estaban angustiados
  - Y en su tiempo de aflicción
  lexicon: HALOT
  rationale: «Angustia» traduce bien צָרָה en un registro bíblico claro y moderno. Se conserva el valor temporal y el contraste narrativo introducido por «Pero».
- source_word: יִצְעֲקוּ אֵלֶיךָ
  english_pob_choice: they cried out to you
  chosen_spanish: clamaron a ti
  alternatives_spanish:
  - gritaron a ti
  - te invocaron
  - clamaron hacia ti
  lexicon: HALOT
  rationale: En contextos de aflicción, צעק/זעק implica un clamor intenso. «Clamaron» preserva esa urgencia y suena digno en español bíblico sin suavizar el ruego.
- source_word: מִשָּׁמַיִם תִּשְׁמָע
  english_pob_choice: you heard from heaven
  chosen_spanish: escuchaste desde los cielos
  alternatives_spanish:
  - escuchaste desde el cielo
  - oíste desde los cielos
  lexicon: HALOT
  rationale: «Desde los cielos» conserva el plural hebreo y la ubicación trascendente del acto divino. «Escuchaste» da un matiz relacional un poco más pleno que «oíste», sin cambiar el sentido.
- source_word: וּכְרַחֲמֶיךָ הָרַבִּים
  english_pob_choice: according to your abundant mercies
  chosen_spanish: conforme a tus abundantes misericordias
  alternatives_spanish:
  - según tus muchas misericordias
  - de acuerdo con tus abundantes compasiones
  - conforme a tu abundante misericordia
  lexicon: HALOT
  rationale: Se conserva el plural de רחמים con «misericordias» y el intensificador הָרַבִּים con «abundantes». «Conforme a» refleja la medida o norma de la acción divina.
- source_word: מֹשִׁיעִים
  english_pob_choice: deliverers
  chosen_spanish: libertadores
  alternatives_spanish:
  - salvadores
  - rescatadores
  lexicon: HALOT
  rationale: El hebreo nombra agentes humanos levantados por Dios para rescatar. «Libertadores» comunica bien esa función histórica y evita confundirlos con un título absoluto aplicado a Dios o al Mesías.
- source_word: וְיוֹשִׁיעוּם
  english_pob_choice: who saved them
  chosen_spanish: que los salvaron
  alternatives_spanish:
  - y los libraron
  - que los rescataron
  lexicon: HALOT
  rationale: La forma verbal mantiene el verbo del mismo campo semántico de ישׁע. «Salvaron» es una correspondencia directa y natural en español, ligada al sustantivo anterior «libertadores».
- source_word: מִיַּד צָרֵיהֶם
  english_pob_choice: from the hand of their adversaries
  chosen_spanish: de la mano de sus adversarios
  alternatives_spanish:
  - del poder de sus adversarios
  - de la mano de sus enemigos
  lexicon: HALOT
  rationale: Se repite la imagen de «mano» para conservar la estructura hebrea y la cohesión interna del verso. «De la mano de» es fiel y claro en español.
theological_decisions:
- issue: Cómo traducir מֹשִׁיעִים en un contexto de rescate histórico
  english_pob_reading: deliverers
  chosen_spanish_reading: libertadores
  alternative_spanish_readings:
  - salvadores
  - rescatadores
  rationale: El contexto describe agentes humanos que Dios concede para librar al pueblo; no se trata de un título exclusivo de Dios. «Libertadores» preserva esa mediación humana sin borrar la relación con el verbo salvar.
  doctrine_reference: Translation philosophy §5 (consistency of key terms, or documented exception)
- issue: Mantener la repetición de «mano» como imagen de poder y dominio
  english_pob_reading: into the hand of ... from the hand of
  chosen_spanish_reading: en mano de ... de la mano de
  alternative_spanish_readings:
  - en poder de ... del poder de
  - en manos de ... de manos de
  rationale: La imagen corporal de «mano» forma parte de la retórica del texto y del paralelismo entre opresión y rescate. Conservarla en español ayuda a no diluir la tensión histórica y teológica del versículo.
  doctrine_reference: Translation philosophy §3 (lexical transparency and auditable imagery)
- issue: Pluralidad de רחמים y su intensidad
  english_pob_reading: your abundant mercies
  chosen_spanish_reading: tus abundantes misericordias
  alternative_spanish_readings:
  - tu abundante misericordia
  - tus muchas misericordias
  rationale: El hebreo usa plural de compasión/ternura con un modificador de abundancia. Mantener el plural en español conserva mejor el peso afectivo y retórico del original.
  doctrine_reference: Translation philosophy §5 (consistency of key terms, or documented exception)
translation_notes:
  revision_awareness: El testimonio de revisión indica acuerdo alto y sin cambios necesarios; esta versión sigue de cerca el trazo del texto hebreo y la auditoría inglesa, manteniendo la repetición de «mano», el contraste opresión/clamor/respuesta, y la alternativa léxica para מֹשִׁיעִים.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» solo cuando el texto hebreo lo requiera explícitamente; en este versículo el referente pronominal a Dios no exige sustituir el tetragrámaton por un nombre en el español.
  - «Cielos» se conserva en plural por fidelidad al hebreo, aunque en español también sería posible el singular.
  - Se evita «siervos» o vocabulario eclesial tradicional no sustentado por el contexto; el pasaje habla de libertadores humanos.
  - La estructura con dos cláusulas de entrega/rescate preserva el paralelismo narrativo del hebreo.
