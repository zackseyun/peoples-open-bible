translation:
  language: es
  text: 'Y Moisés dijo al faraón[a]: «Hazme este honor: ¿cuándo rogaré por ti, por tus siervos y por tu pueblo, para eliminar las ranas de ti y de tus casas? Solo en el Nilo quedarán».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, más interpretativamente, «Fija el tiempo para mí» o «Ten este honor sobre mí». El modismo hebreo es difícil; Moisés está invitando a Faraón a decir cuándo debe interceder.
    reason: lexical_alternative
lexical_decisions:
- source_word: הִתְפָּאֵר עָלַי
  english_pob_choice: Have this honor over me
  chosen_spanish: Hazte este honor conmigo
  alternatives_spanish:
  - Hazme este honor
  - Ten este honor sobre mí
  - Concédeme este honor
  lexicon: HALOT
  rationale: La expresión hebrea es idiomática y difícil. La POB inglesa mantiene la idea de conceder a Faraón una prerrogativa respecto de Moisés. En español, «Hazte este honor conmigo» conserva el gesto idiomático y la deferencia retórica sin perder legibilidad; «sobre mí» suena más rígido, y «fíjate la hora» sería más interpretativo que el texto base.
- source_word: לְמָתַי
  english_pob_choice: when
  chosen_spanish: ¿cuándo
  alternatives_spanish:
  - ¿para cuándo
  - ¿hasta cuándo
  lexicon: HALOT
  rationale: El hebreo pregunta por el momento elegido para la intercesión. «¿Cuándo?» es natural en español y transmite la invitación a fijar el tiempo.
- source_word: אַעְתִּיר
  english_pob_choice: I plead
  chosen_spanish: rogaré
  alternatives_spanish:
  - intercederé
  - suplicaré
  - oraré
  lexicon: HALOT
  rationale: El verbo hifil de עתר expresa súplica insistente, especialmente dirigida a Dios. «Rogaré» comunica bien la intensidad de la intercesión sin introducir tecnicismos, y en contexto mantiene la voz personal de Moisés.
- source_word: לְךָ וְלַעֲבָדֶיךָ וּלְעַמְּךָ
  english_pob_choice: for you, for your servants, and for your people
  chosen_spanish: por ti, por tus siervos y por tu pueblo
  alternatives_spanish:
  - por ti, por tus esclavos y por tu pueblo
  - por ti, por tus servidores y por tu pueblo
  lexicon: HALOT
  rationale: Se conserva la repetición del preposicional para reflejar el alcance de la intercesión. Para עֲבָדֶיךָ, el español bíblico y de lectura eclesial permite «siervos»; aquí se opta por ello porque el texto habla de los subordinados de Faraón en su corte y la forma es más transparente para el lector contemporáneo que «esclavos».
- source_word: לְהַכְרִית
  english_pob_choice: to cut off
  chosen_spanish: para acabar con
  alternatives_spanish:
  - para cortar
  - para destruir
  - para eliminar
  lexicon: HALOT
  rationale: כרת tiene fuerza literal de «cortar», pero en este contexto la función semántica es eliminar la plaga. «Acabar con» comunica el resultado con naturalidad en español; se preserva la imaginería de terminación sin una calca dura. La frase siguiente «quitándolas» ayuda a mantener la concreción del acto.
- source_word: הַצֲפַרְדְּעִים
  english_pob_choice: the frogs
  chosen_spanish: las ranas
  alternatives_spanish:
  - las ranas del Nilo
  - los sapos
  lexicon: HALOT
  rationale: El término de la plaga se vierte por el animal más común en español bíblico. Aunque en algunas tradiciones se dice «sapos», «ranas» es la opción más directa y neutral para צפרדעים.
- source_word: מִמְּךָ וּמִבָּתֶּיךָ
  english_pob_choice: from you and from your houses
  chosen_spanish: de ti y de tus casas
  alternatives_spanish:
  - de ti y de tus hogares
  - de ti y de tus palacios
  lexicon: HALOT
  rationale: Se conserva la distinción entre la persona de Faraón y sus casas. «Casas» sigue de cerca el hebreo y puede incluir la residencia y sus dependencias; por eso no se reemplaza por un término más interpretativo.
- source_word: רַק
  english_pob_choice: Only
  chosen_spanish: Solo
  alternatives_spanish:
  - Solo que
  - Excepto
  lexicon: HALOT
  rationale: Marca la excepción final con naturalidad en español y preserva el contraste del versículo.
- source_word: בַּיְאֹר
  english_pob_choice: in the Nile
  chosen_spanish: en el Nilo
  alternatives_spanish:
  - en el río
  - en el Nilo mismo
  lexicon: HALOT
  rationale: En Éxodo, יְאֹר se refiere específicamente al Nilo. Se explicita en español como «el Nilo» por fidelidad contextual y claridad histórica.
- source_word: תִּשָּׁאַרְנָה
  english_pob_choice: shall they remain
  chosen_spanish: quedarán
  alternatives_spanish:
  - permanecerán
  - serán dejadas
  lexicon: HALOT
  rationale: El nifal expresa permanencia o quedar atrás. «Quedarán» es natural y breve en español; el contexto ya deja claro que se trata de las ranas que no serán retiradas del río.
translation_notes:
  revision_awareness: 'La redacción española sigue la última revisión inglesa, que prefirió «Have this honor over me» por ser más natural sin perder el sentido de conceder a Faraón la iniciativa sobre el momento. Se mantiene esa decisión en español, pero con una formulación idiomática equivalente. También se preserva la secuencia retórica del hebreo: invitación a fijar el tiempo, alcance de la intercesión y excepción final en el Nilo.'
  spanish_consistency_notes:
  - Se usa «Moisés» y «faraón» en minúscula cuando no funciona como nombre propio en estilo bíblico español del proyecto; aquí se mantiene «faraón» por tratarse del título del personaje en discurso directo.
  - Se evita «SEÑOR» porque no aparece el tetragrámaton en este versículo.
  - Se prefiere «siervos» como opción contextual para עֲבָדֶיךָ, sin convertir el término en una lectura doctrinalmente cargada.
  - «Nilo» se usa con artículo por ser el río conocido en el contexto egipcio del relato.
