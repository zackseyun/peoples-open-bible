translation:
  language: es
  text: Y el hombre[a] llamó a su esposa Eva, porque ella era madre de todo lo vivo[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Adán». El hebreo dice literalmente «el hombre» (ha''adam), con artículo.'
    reason: alternative_reading
  - marker: b
    text: 'O: «madre de todos los vivientes» / «madre de todos los seres vivientes». El hebreo dice literalmente «madre de todo lo vivo».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּקְרָא
  english_pob_choice: called
  chosen_spanish: llamó
  alternatives_spanish:
  - nombró
  lexicon: HALOT
  rationale: En español, ‘llamó’ comunica de manera natural el acto de dar nombre y conserva el valor verbal directo del hebreo, como el inglés POB ‘called’. ‘Nombró’ también sería posible, pero suena más explícitamente técnico.
- source_word: הָאָדָם
  english_pob_choice: the man
  chosen_spanish: el hombre
  alternatives_spanish:
  - Adán
  lexicon: HALOT
  rationale: El hebreo lleva el artículo definido, por lo que aquí corresponde ‘el hombre’ y no el nombre propio ‘Adán’. Esto preserva el matiz descriptivo del original.
- source_word: שֵׁם
  english_pob_choice: name
  chosen_spanish: el nombre
  alternatives_spanish:
  - nombre
  lexicon: HALOT
  rationale: Se mantiene la estructura idiomática del hebreo ‘llamar el nombre de…’, naturalizada en español como ‘llamó… al nombre de…’.
- source_word: אִשְׁתּוֹ
  english_pob_choice: his wife's
  chosen_spanish: de su esposa
  alternatives_spanish:
  - de su mujer
  lexicon: HALOT
  rationale: Aquí אִשָּׁה se refiere específicamente a la esposa del hombre. ‘Esposa’ es claro y fiel; ‘mujer’ sería más literal pero menos preciso en español actual.
- source_word: חַוָּה
  english_pob_choice: Eve
  chosen_spanish: Eva
  alternatives_spanish:
  - Javá
  - Havá
  lexicon: HALOT
  rationale: Se usa la forma tradicional española del nombre propio. Es el equivalente establecido y plenamente reconocible en español bíblico.
- source_word: כִּי
  english_pob_choice: because
  chosen_spanish: porque
  alternatives_spanish:
  - pues
  lexicon: HALOT
  rationale: ‘Porque’ expresa con claridad la relación causal del hebreo.
- source_word: הִוא
  english_pob_choice: she
  chosen_spanish: ella
  lexicon: HALOT
  rationale: Pronombre femenino singular directo y natural en español.
- source_word: הָיְתָה
  english_pob_choice: was
  chosen_spanish: era
  alternatives_spanish:
  - fue
  lexicon: HALOT
  rationale: ‘Era’ expresa mejor el estado o cualidad que sirve de base al nombre, sin sugerir un cambio puntual. Conserva la lectura del inglés POB.
- source_word: אֵם
  english_pob_choice: mother
  chosen_spanish: madre
  lexicon: HALOT
  rationale: Traducción directa y estable del sustantivo.
- source_word: כָּל
  english_pob_choice: all
  chosen_spanish: todo
  alternatives_spanish:
  - todos
  lexicon: HALOT
  rationale: En la frase siguiente, ‘todo lo vivo’ conserva la idea colectiva sin forzar un plural personal que no está explícito en el hebreo.
- source_word: חָי
  english_pob_choice: the living
  chosen_spanish: lo vivo
  alternatives_spanish:
  - los vivientes
  - todo ser viviente
  lexicon: HALOT
  rationale: Se eligió una forma que refleje el sustantivo/adjetivo substantivado del hebreo sin cerrar indebidamente la amplitud del referente. ‘Lo vivo’ conserva la concisión del original y deja abierta la tensión interpretativa.
theological_decisions:
- issue: ¿Traducir הָאָדָם como nombre propio ‘Adán’ o como ‘el hombre’ con artículo?
  english_pob_reading: the man
  chosen_spanish_reading: el hombre
  alternative_spanish_readings:
  - Adán
  rationale: El artículo definido del hebreo favorece la lectura descriptiva. Mantener ‘el hombre’ preserva el detalle gramatical y evita introducir de inmediato un nombre propio donde el texto no lo da explícitamente.
  doctrine_reference: 'DOCTRINE.md: אָדָם según contexto; conservar el dato gramatical cuando el artículo es significativo'
- issue: Alcance de ‘mother of all the living’
  english_pob_reading: Retain the broad phrase without narrowing it in translation
  chosen_spanish_reading: madre de todo lo vivo
  alternative_spanish_readings:
  - madre de todos los vivientes
  - madre de todos los seres vivientes
  rationale: La frase española mantiene la amplitud del hebreo sin decidir si se refiere solo a humanos, a seres vivos en general o a una fórmula más amplia de linaje/vida. Así se conserva la tensión exegética documentada.
  doctrine_reference: 'DOCTRINE.md: preservar la tensión teológica cuando el hebreo permanece abierto'
translation_notes:
  revision_awareness: El contexto inglés indica high_agreement y revisión final sin cambios sustanciales; se conserva la decisión principal sobre הָאָדָם como ‘el hombre’ y se mantiene la amplitud de la cláusula final sin resolverla más allá del hebreo.
  spanish_consistency_notes:
  - Se mantuvo ‘el hombre’ para reflejar el artículo hebreo.
  - Se usó ‘Eva’ como forma española estándar del nombre propio.
  - ‘lo vivo’ preserva la concisión y la amplitud semántica del hebreo.
  - Las notas a y b corresponden a alternativas documentadas en el POB inglés y se anclan en el texto principal.
