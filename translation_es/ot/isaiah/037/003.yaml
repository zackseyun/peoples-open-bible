base_translation:
  language: en
  yaml_path: translation/ot/isaiah/037/003.yaml
  text: 'And they said to him[a], “Thus says Hezekiah: This day is a day of distress, rebuke, and disgrace, for children have come to the point of birth[b], and there is no strength to give birth.”'
  footnotes:
  - marker: a
    text: Or “a day of distress, reproof, and contempt.”
    reason: lexical_alternative
  - marker: b
    text: Literally, “children have come to the birthstool/breaking point.” The Hebrew is a metaphor of labor reaching delivery with no strength left for birth.
    reason: cultural_note
