translation:
  language: es
  text: 'De los hijos de Coat: Uriel, el jefe[a], y 120 de sus hermanos.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O ‘sus parientes’; ‘hermanos’ aquí probablemente se refiere a miembros del mismo clan coatita, no necesariamente sólo a hermanos biológicos.
    reason: lexical_alternative
lexical_decisions:
- source_word: לִ/בְנֵי
  english_pob_choice: For the sons of
  chosen_spanish: De los hijos de
  alternatives_spanish:
  - Para los hijos de
  - De los descendientes de
  lexicon: HALOT
  rationale: El prefijo ל en esta lista genealógica/organizativa introduce el grupo al que pertenece el contingente. En español, ‘De los hijos de’ expresa con naturalidad la pertenencia del grupo sin forzar un dativo artificial. Se conserva ‘hijos’ porque el hebreo בני funciona aquí como designación de linaje/clan, y el contexto deja claro el sentido colectivo.
- source_word: קְהָת
  english_pob_choice: Kohath
  chosen_spanish: Coat
  alternatives_spanish:
  - Kohat
  - Qehat
  lexicon: HALOT
  rationale: Nombre propio levítico tradicionalmente asentado en español bíblico como ‘Coat’. Se prefiere la forma histórica española más reconocible para lectores eclesiales, sin alterar la referencia al linaje.
- source_word: אוּרִיאֵל
  english_pob_choice: Uriel
  chosen_spanish: Uriel
  alternatives_spanish:
  - Uríel
  lexicon: HALOT
  rationale: Nombre propio transliterado de manera estándar. ‘Uriel’ es claro en español y mantiene la correspondencia directa con el hebreo.
- source_word: הַ/שָּׂר
  english_pob_choice: the chief
  chosen_spanish: el jefe
  alternatives_spanish:
  - el líder
  - el príncipe
  lexicon: HALOT
  rationale: שַׂר puede significar jefe, líder, oficial o príncipe. En una lista administrativa de levitas, ‘el jefe’ comunica bien la función de cabeza del contingente sin introducir una connotación monárquica que ‘príncipe’ podría sugerir. ‘Jefe’ también resulta más natural que un calco rígido en español.
- source_word: וְ/אֶחָי/ו
  english_pob_choice: and his brothers
  chosen_spanish: y sus hermanos
  alternatives_spanish:
  - y sus parientes
  - y sus correligionarios
  lexicon: HALOT
  rationale: Se mantiene la forma literal ‘hermanos’ porque el hebreo dice ‘sus hermanos’. En este contexto, como en el POB inglés, el término puede abarcar miembros del mismo clan, no sólo hermanos biológicos. El español conserva esa ambigüedad contextual sin explicitar de más en el texto principal.
- source_word: מֵאָה וְ/עֶשְׂרִים
  english_pob_choice: '120'
  chosen_spanish: '120'
  alternatives_spanish:
  - ciento veinte
  lexicon: HALOT
  rationale: Se emplea numeral para una lista censal/administrativa, con máxima legibilidad. No cambia el sentido y evita innecesaria pesadez en español.
translation_notes:
  revision_awareness: La versión inglesa auditada se mantiene sin cambios sustantivos en esta pasaje; la cruzada de revisión señala alta concordancia y sólo una cuestión menor de matiz léxico para ‘brothers’. La propuesta española conserva esa misma tensión semántica entre literalidad y sentido de clan.
  spanish_consistency_notes:
  - Se conserva el nombre levítico tradicional ‘Coat’ para coherencia con la tradición bíblica en español y con la identidad del linaje.
  - Se mantiene ‘hermanos’ con nota, siguiendo la decisión inglesa de preservar el término literal y dejar que el contexto de clan haga su trabajo semántico.
  - El número se presenta como ‘120’ por economía y claridad en un listado genealógico-administrativo.
