translation:
  language: es
  text: Si entra[a] solo, solo saldrá; si está casado[b], su esposa saldrá con él.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literalmente, «con su גַּף»; es un modismo hebreo que significa que entró solo, sin compañía.
    reason: lexical_alternative
  - marker: b
    text: Más literalmente, «si es marido de una mujer», es decir, «si está casado».
    reason: lexical_alternative
lexical_decisions:
- source_word: בְּגַפּוֹ
  english_pob_choice: by himself
  chosen_spanish: solo
  alternatives_spanish:
  - por sí mismo
  - solamente
  lexicon: HALOT
  rationale: El modismo hebreo indica que entra sin compañía ni dependientes. En español, «solo» comunica de manera natural esa idea legal sin volverlo calco. Mantiene la simetría con «solo saldrá».
- source_word: יָבֹא
  english_pob_choice: comes in
  chosen_spanish: entra
  alternatives_spanish:
  - viene
  - ingresa
  lexicon: HALOT
  rationale: En este contexto jurídico de servicio/esclavitud, el verbo marca la entrada en una condición o casa. «Entra» es más natural en español que «viene», y conserva la relación con el paralelo «saldrá».
- source_word: יֵצֵא
  english_pob_choice: shall go out
  chosen_spanish: saldrá
  alternatives_spanish:
  - saldrá afuera
  - partirá
  - se irá
  lexicon: HALOT
  rationale: El hebreo usa una fórmula legal de salida, con sentido de salir de la condición de servicio. «Saldrá» preserva ese paralelismo y suena idiomático en español.
- source_word: בַּעַל אִשָּׁה
  english_pob_choice: if he is married
  chosen_spanish: está casado
  alternatives_spanish:
  - es marido de mujer
  - es esposo de una mujer
  - si es casado
  lexicon: HALOT
  rationale: La auditoría inglesa ya reconoce que la expresión es idiomática y permite una lectura natural. En español, «está casado» transmite el valor resultante del hebreo sin la literalidad extraña de «el marido de una mujer».
- source_word: וְיָצְאָה אִשְׁתּוֹ עִמּוֹ
  english_pob_choice: then his wife shall go out with him
  chosen_spanish: su esposa saldrá con él
  alternatives_spanish:
  - y su mujer saldrá con él
  - entonces su esposa saldrá con él
  lexicon: HALOT
  rationale: La forma verbal femenina singular se refleja con «saldrá». «Esposa» es un equivalente claro y digno para אִשְׁתּוֹ; «con él» conserva la idea de acompañamiento en la salida.
translation_notes:
  revision_awareness: La revisión inglesa sustituyó la expresión literal «the husband of a wife» por «if he is married». La versión española sigue esa decisión auditada, optando por una formulación natural y precisa, sin perder el valor idiomático del hebreo. No se registran otros cambios sustantivos en el texto base.
  spanish_consistency_notes:
  - Se mantiene «saldrá» para reflejar el paralelismo legal con «entra»/«saldrá».
  - Se prefiere «esposa» frente a «mujer» por claridad referencial en español moderno, sin añadir interpretación doctrinal.
  - El adverbio «solo» cubre tanto la idea de estar sin compañía como la de ir sin dependientes, que es el alcance contextual del modismo hebreo.
