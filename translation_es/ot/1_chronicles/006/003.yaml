  rationale: En una lista genealógica, בְנֵי en constructo expresa de manera natural la relación filial inmediata; en español, «hijos de» conserva mejor esa precisión que «descendientes de». Se mantiene también la conexión narrativa del ו inicial con «Y».
- source_word: קְהָת
  english_pob_choice: Kohath
  chosen_spanish: Coat
  alternatives_spanish:
  - Kohat
  - Quehat
  lexicon: HALOT
  rationale: Se usa la forma castellana tradicional y ampliamente reconocible «Coat» para el nombre propio de la genealogía. No se traduce como término común porque el hebreo presenta un nombre personal.
- source_word: עַמְרָם
  english_pob_choice: Amram
  chosen_spanish: Amram
  alternatives_spanish:
  - Amrán
  lexicon: HALOT
  rationale: Nombre propio transliterado de forma estándar y reconocible en español bíblico.
- source_word: יִצְהָר
  english_pob_choice: Izhar
  chosen_spanish: Izhar
  alternatives_spanish:
  - Isar
  - Izar
  lexicon: HALOT
  rationale: Se conserva la transliteración estándar del nombre propio para evitar perder identidad genealógica y mantener consistencia con el texto fuente.
- source_word: חֶבְרוֹן
  english_pob_choice: Hebron
  chosen_spanish: Hebrón
  alternatives_spanish:
  - Hebron
  lexicon: HALOT
  rationale: Aunque Hebrón es también nombre de ciudad, aquí funciona como nombre personal; en español se mantiene la forma onomástica habitual con tilde para la pronunciación.
- source_word: עֻזִּיאֵל
  english_pob_choice: Uzziel
  chosen_spanish: Uzziel
  alternatives_spanish:
  - Uziel
  lexicon: HALOT
  rationale: Nombre propio preservado por transliteración; se evita adaptar más allá de lo necesario para no diluir la forma hebrea.
