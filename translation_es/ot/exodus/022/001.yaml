review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura legal del hebreo: condición, hallazgo del ladrón en el acto de irrumpir, golpe mortal y exención de culpa legal. Sin embargo, introduce expansión interpretativa en «mientras se introduce a robar», que añade explícitamente el propósito «a robar», y la cláusula final «no hay sangre culpable sobre él» no comunica bien el idiomatismo jurídico hebreo אֵין לוֹ דָּמִים, que se refiere a culpa de sangre/bloodguilt, no a «sangre culpable».'
  spanish_quality_summary: El español es mayormente claro y digno, pero «es hallado» suena algo rígido, y «no hay sangre culpable sobre él» resulta poco natural y semánticamente confuso en español. Una redacción como «no hay culpa de sangre para él» o «no recae sobre él culpa de sangre» preserva mejor el valor legal y la legibilidad. También conviene evitar una expansión demasiado libre del escenario de allanamiento.
  glossary_alignment: No hay términos del glosario mayor comprometidos. La decisión clave es mantener el tecnicismo legal «culpa de sangre» para דמים en vez de una frase poco idiomática. «Ladrón» está bien para הַגַּנָּב.
  issues:
  - severity: medium
    issue: «mientras se introduce a robar» sobretraduce בַּמַּחְתֶּרֶת
    rationale: El hebreo alude al acto de irrumpir o al allanamiento/break-in, probablemente por apertura clandestina de una pared. Añadir «a robar» explicita una finalidad no expresada en ese término concreto, aunque sea inferible por «el ladrón».
  - severity: high
    issue: «no hay sangre culpable sobre él» no refleja bien el idiomatismo legal
    rationale: אֵין לוֹ דָּמִים habla de ausencia de culpa legal por derramamiento de sangre. «Sangre culpable» no es una formulación natural en español y puede entenderse como describiendo la sangre misma, no la responsabilidad jurídica.
  - severity: low
    issue: «es hallado» es comprensible pero algo acartonado
    rationale: «Es encontrado» o mantener «es hallado» son ambas posibles; no es error, pero la frase completa mejora más con un ajuste del entorno y de la cláusula final.
  revised_spanish_text: Si el ladrón es hallado en el acto de irrumpir[a] y es herido de modo que muera[b], no hay culpa de sangre para él.
