translation:
  language: es
  text: Pero yo[a] andaré en mi integridad; redímeme y sé misericordioso conmigo[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «en cuanto a mí».'
    reason: lexical_alternative
  - marker: b
    text: 'O: «muéstrame tu gracia» o «ten gracia de mí»; también «ten misericordia de mí».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַאֲנִי
  english_pob_choice: But as for me
  chosen_spanish: Pero yo
  alternatives_spanish:
  - Pero en cuanto a mí
  - Y yo
  - Mas yo
  lexicon: HALOT
  rationale: La partícula conjuntiva con el pronombre independiente marca contraste enfático. En español, «Pero yo» comunica de forma natural esa oposición personal sin perder el énfasis del hebreo.
- source_word: בְּתֻמִּי
  english_pob_choice: in my integrity
  chosen_spanish: en mi integridad
  alternatives_spanish:
  - en mi blamelessness
  - en mi inocencia
  lexicon: HALOT
  rationale: תֹּם/תֻּם expresa rectitud íntegra, completitud moral o conducta intachable. «Integridad» es el equivalente natural en español y evita sugerir sin pecado absoluto, manteniendo la fuerza ética del término.
- source_word: אֵלֵךְ
  english_pob_choice: I will walk
  chosen_spanish: andaré
  alternatives_spanish:
  - caminaré
  - viviré
  - andaré yo
  lexicon: HALOT
  rationale: הלך funciona aquí como metáfora del modo de vida. «Andaré» conserva la imagen bíblica del caminar y su sentido de conducta continua, mientras suena natural en español.
- source_word: פְּדֵנִי
  english_pob_choice: redeem me
  chosen_spanish: redímeme
  alternatives_spanish:
  - rescátame
  - líbrame
  - rácatame
  lexicon: HALOT
  rationale: פּדה tiene el peso de redimir o rescatar de una situación de aflicción o esclavitud. «Redímeme» conserva mejor esa densidad lexical y teológica que un verbo más general como «líbrame».
- source_word: וְחָנֵּנִי
  english_pob_choice: and be gracious to me
  chosen_spanish: y ten gracia de mí
  alternatives_spanish:
  - y sé gracioso conmigo
  - y muéstrame gracia
  - y ten misericordia de mí
  lexicon: HALOT
  rationale: חנן expresa mostrar favor o gracia. «Ten gracia de mí» preserva el campo semántico de gracia/favor, aunque suena más solemne; se evita «misericordia» para no desplazar el matiz de favor gratuito.
theological_decisions:
- issue: Sentido de «integridad» en la autoafirmación del salmista
  english_pob_reading: The verse speaks of covenantal integrity/uprightness, not a claim of absolute sinlessness.
  chosen_spanish_reading: El verso habla de integridad/uprightness de pacto, no de impecabilidad absoluta.
  alternative_spanish_readings:
  - El verso podría leerse como una afirmación de inocencia absoluta
  - El verso podría sonar como una declaración de perfección moral
  rationale: En el contexto del salmo, el hablante contrasta su conducta con la de los impíos y pide vindicación y gracia. «Integridad» mantiene la afirmación moral sin borrar la tensión teológica ni convertirla en una doctrina de perfección sin pecado.
  doctrine_reference: Preservar la tensión teológica del texto; no resolverla mediante una paráfrasis devocional.
translation_notes:
  revision_awareness: 'Coincide con la última pasada revisada: el hebreo y el audit trail inglés apoyan la lectura adversativa de וַאֲנִי, el valor ético de תֻּם, el idiomatismo de הָלַךְ para la conducta, y el peso redentor/gracioso de פָּדָה y חָנַן. No se documentan revisiones posteriores que exijan cambiar esta propuesta.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma del proyecto, pero este versículo no contiene el tetragrámaton.
  - Se usa «integridad» para תֻם, en línea con el sentido moral sostenido por la nota inglesa.
  - 'Se conserva el paralelismo verbal con dos imperativos implícitos en hebreo: «redímeme» / «ten gracia de mí».'
  - La frase «andaré» reproduce el hebraísmo sin convertirlo en una paráfrasis como «viviré».
