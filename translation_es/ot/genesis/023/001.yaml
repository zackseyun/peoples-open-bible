- from: Ahora la vida de Sara fue de ciento veintisiete años[a]; estos fueron los años de la vida de Sara.
  to: Ahora la vida de Sara fue ciento veintisiete años[a]; estos fueron los años de la vida de Sara.
  rationale: Se hizo una reparación mínima para mejorar la naturalidad y dignidad del español, eliminando la preposición «de» en «fue de ciento veintisiete años». Esto preserva más de cerca la estructura nominal del hebreo y del inglés auditado, sin alterar el sentido ni la nota existente.
