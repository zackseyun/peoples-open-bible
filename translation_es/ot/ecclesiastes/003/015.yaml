translation:
  language: es
  text: Lo que ha sido ya es,[a] y lo que ha de ser ya ha sido; y Dios busca lo que ha sido echado fuera.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Dios busca lo perseguido», o «Dios llama el pasado a cuentas». El hebreo de la cláusula final es difícil y puede referirse tanto a lo que ha sido echado fuera o dejado atrás como a lo que es perseguido.'
    reason: alternative_reading
lexical_decisions:
- source_word: מַה שֶּׁהָיָה
  english_pob_choice: What has been
  chosen_spanish: Lo que ha sido
  alternatives_spanish:
  - Lo que ha acontecido
  - Aquello que ha sido
  lexicon: HALOT
  rationale: La expresión introduce una generalización sobre la realidad o los acontecimientos. «Lo que ha sido» conserva el valor abstracto y totalizante del hebreo sin añadir matices interpretativos.
- source_word: כְּבָר
  english_pob_choice: already
  chosen_spanish: ya
  alternatives_spanish:
  - ya mismo
  - desde antes
  lexicon: HALOT
  rationale: כְּבָר indica anterioridad consumada. «Ya» es la forma más natural en español y mantiene la brevedad aforística del verso.
- source_word: הוּא
  english_pob_choice: is
  chosen_spanish: fue
  alternatives_spanish:
  - es
  - está
  lexicon: HALOT
  rationale: Aunque el hebreo usa una cláusula nominal con valor presente, el paralelismo con la segunda mitad del verso en español se expresa con pasado perfecto simple para conservar la idea de consumación previa y la cadencia del dicho.
- source_word: וַאֲשֶׁר לִהְיוֹת
  english_pob_choice: what is to be
  chosen_spanish: lo que ha de ser
  alternatives_spanish:
  - lo que será
  - lo que está por ser
  lexicon: HALOT
  rationale: La frase apunta a lo venidero. «Lo que ha de ser» conserva la orientación futura y el tono proverbial, evitando sobreexplicar la construcción infinitiva hebrea.
- source_word: הָאֱלֹהִים
  english_pob_choice: God
  chosen_spanish: Dios
  alternatives_spanish:
  - el Dios
  lexicon: HALOT
  rationale: En Eclesiastés, הָאֱלֹהִים designa al Dios verdadero. «Dios» es la equivalencia normal y clara en español.
- source_word: יְבַקֵּשׁ
  english_pob_choice: seeks
  chosen_spanish: busca
  alternatives_spanish:
  - busca de nuevo
  - reclama
  - exige
  lexicon: HALOT
  rationale: El verbo בקשׁ puede ser «buscar», con posibles matices de exigir o requerir. «Busca» preserva el núcleo léxico y deja abierta la tensión interpretativa que el hebreo permite.
- source_word: אֶת נִרְדָּף
  english_pob_choice: what has been driven away
  chosen_spanish: lo perseguido
  alternatives_spanish:
  - lo que ha sido echado fuera
  - lo que ha sido apartado
  - lo perseguido / lo perseguido y lo perdido
  lexicon: HALOT
  rationale: 'נִרְדָּף es semánticamente difícil: puede leerse como «lo perseguido» o como algo que ha sido empujado/alejado. Se optó por «lo perseguido» porque refleja de forma concisa la forma pasiva/resultado del participio y preserva la ambigüedad principal del texto.'
theological_decisions:
- issue: 'Sentido de la cláusula final: יְבַקֵּשׁ אֶת נִרְדָּף'
  english_pob_reading: God seeks what has been driven away / what is pursued; the Hebrew is difficult and may also imply God calls the past to account.
  chosen_spanish_reading: Dios busca lo perseguido
  alternative_spanish_readings:
  - Dios busca lo que ha sido apartado
  - Dios busca lo que ha sido echado fuera
  - Dios llama a cuentas el pasado
  rationale: La cláusula es compacta y admite más de una lectura. La versión española conserva la ambigüedad sin resolverla en una interpretación doctrinal o filosófica. Se deja abierta tanto la idea de buscar lo perseguido como la de recuperar lo apartado, en línea con la nota inglesa.
  doctrine_reference: 'Translation philosophy §3: preservar la tensión teológica en lugar de resolverla.'
translation_notes:
  revision_awareness: El texto hebreo y el auditor inglés coinciden en que la cláusula final es difícil y admite varias interpretaciones. La versión española mantiene esa tensión semántica sin añadir glosas explicativas al cuerpo del versículo, y conserva la brevedad proverbial del original.
  spanish_consistency_notes:
  - Se usó «Dios» de manera directa, sin mascar el nombre divino, de acuerdo con la política del proyecto para אֱלֹהִים en este contexto.
  - Se eligió un registro sobrio y bíblico en español moderno, evitando el calco duro de la sintaxis hebrea.
  - Se mantuvo una equivalencia funcional entre «what has been already is» y «lo que ha sido, ya fue», privilegiando la naturalidad del español con paralelo semántico.
  - La nota de pie de página conserva la ambigüedad principal del hebreo y la del texto inglés auditado.
