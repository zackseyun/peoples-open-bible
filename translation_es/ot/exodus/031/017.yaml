  to: Es una señal perpetua entre mí y los hijos de Israel[a], porque en seis días Yahvé hizo los cielos y la tierra, y en el séptimo día cesó[b] y recobró aliento[c].
  rationale: Se corrige un error gramatical claro («entre mí»), se mejora la naturalidad y fidelidad funcional de וַיִּנָּפַשׁ con «recobró aliento», y se reubican las notas para anclarlas a las expresiones pertinentes sin alterar las decisiones léxicas centrales del POB.
