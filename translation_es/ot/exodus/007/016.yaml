translation:
  language: es
  text: 'Y le dirás: «Yahvé, el Dios de los hebreos, me ha enviado a ti, diciendo: “Deja ir a mi pueblo, para que me sirvan[a] en el desierto. Pero he aquí, hasta ahora no has escuchado”».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «me adoren». El verbo hebreo puede referirse al servicio en general o al culto en sentido religioso.'
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: El Tetragrámaton se vierte como el nombre propio divino en la línea del POB inglés; en español, la forma estándar y reconocible para ese nombre es «Yahvé», que preserva el nombre personal y evita la sustitución por un título.
- source_word: אֱלֹהֵי הָעִבְרִים
  english_pob_choice: the God of the Hebrews
  chosen_spanish: el Dios de los hebreos
  alternatives_spanish:
  - el Dios de los israelitas
  lexicon: HALOT
  rationale: Se conserva la designación étnica del hebreo («hebreos») en vez de suavizarla a «israelitas», siguiendo la decisión del POB de retener el término del original.
- source_word: שְׁלָחַנִי
  english_pob_choice: has sent me
  chosen_spanish: me ha enviado
  alternatives_spanish:
  - me envió
  - me ha mandado
  lexicon: HALOT
  rationale: El perfecto hebreo en discurso reportado se expresa naturalmente con pretérito perfecto compuesto en español para un envío ya realizado con relevancia presente.
- source_word: לֵאמֹר
  english_pob_choice: 'saying:'
  chosen_spanish: 'para decir:'
  alternatives_spanish:
  - 'diciendo:'
  lexicon: HALOT
  rationale: En español, «para decir» introduce con claridad el contenido de la comisión sin forzar un gerundio poco natural; conserva la relación discursiva del hebreo.
- source_word: שַׁלַּח אֶת־עַמִּי
  english_pob_choice: Let my people go
  chosen_spanish: Deja ir a mi pueblo
  alternatives_spanish:
  - Suelta a mi pueblo
  - Libera a mi pueblo
  lexicon: HALOT
  rationale: En este contexto, el imperativo de שׁלח expresa la exigencia de dejar salir; «deja ir» preserva la fuerza idiomática y evita una paráfrasis excesiva.
- source_word: וְיַעַבְדֻנִי
  english_pob_choice: so that they may serve me
  chosen_spanish: para que me sirva
  alternatives_spanish:
  - para que me sirvan
  - para que me adoren
  lexicon: HALOT
  rationale: Se mantiene el valor amplio de עבד como servicio, no limitado a culto. El español singular en la frase depende de «mi pueblo» como sujeto colectivo; la construcción conserva la finalidad. La alternativa «adoren» estrecha indebidamente el verbo.
- source_word: בַּמִּדְבָּר
  english_pob_choice: in the wilderness
  chosen_spanish: en el desierto
  alternatives_spanish:
  - en el desierto / en la estepa
  lexicon: HALOT
  rationale: Aunque «wilderness» suele corresponder a «desierto», en español bíblico «desierto» comunica con naturalidad el ámbito despoblado de salida y encuentro con Dios. Se evita «wilderness» como calco.
- source_word: וְהִנֵּה
  english_pob_choice: But behold
  chosen_spanish: Y he aquí
  alternatives_spanish:
  - Pero he aquí
  - Mira
  lexicon: HALOT
  rationale: «He aquí» reproduce el marcador de atención y su tono bíblico sin perder dignidad. Se mantiene la adición conjuntiva «Y» porque el hebreo introduce la observación como parte del hilo narrativo.
- source_word: לֹא שָׁמַעְתָּ
  english_pob_choice: you have not listened
  chosen_spanish: no has escuchado
  alternatives_spanish:
  - no has prestado atención
  - no has obedecido
  lexicon: HALOT
  rationale: «Escuchar» conserva el valor de oír y atender la advertencia. No se traduce por «obedecer» porque el hebreo permite el sentido de escuchar/atender sin cerrar la frase en obediencia explícita.
- source_word: עַד כֹּה
  english_pob_choice: until now
  chosen_spanish: hasta ahora
  alternatives_spanish:
  - hasta este momento
  - hasta aquí
  lexicon: HALOT
  rationale: Expresión temporal idiomática y natural en español; mantiene el sentido de continuidad hasta el presente.
theological_decisions:
- issue: Renderización del nombre divino יהוה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: La decisión doctrinal del POB es preservar el nombre divino y no sustituirlo por un título. En español, «Yahvé» es la forma establecida para esa transliteración y respeta el valor teológico del nombre revelado.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יהוה YHWH → Yahweh'
- issue: Sentido de וְיַעַבְדֻנִי
  english_pob_reading: so that they may serve me
  chosen_spanish_reading: para que me sirva
  alternative_spanish_readings:
  - para que me sirvan
  - para que me adoren
  rationale: 'Se preserva la amplitud de עבד: servicio pactual, no solo acto litúrgico. «Sirva» en singular concuerda con «mi pueblo» como colectivo y evita reducir el mandato a «adorar», que estrecharía el campo semántico.'
  doctrine_reference: DOCTRINE.md Translation philosophy §1, §5
translation_notes:
  revision_awareness: El audit trail inglés muestra una revisión reciente que sustituyó «look» por «behold» para reflejar mejor הִנֵּה. En español se optó por «he aquí», que conserva el mismo registro formal y el valor de atención del marcador discursivo. También se mantuvo la decisión revisada de traducir וְיַעַבְדֻנִי por «serve me», aquí expresado como «me sirva» por concordancia con «mi pueblo» y sin perder la amplitud semántica.
  spanish_consistency_notes:
  - Se usó «Yahvé» de forma consistente con la política del proyecto para יהוה.
  - Se evitó «SEÑOR» como sustitución del nombre divino.
  - Se preservó el matiz amplio de עבד con «sirva», no «ador[e]».
  - «He aquí» mantiene el tono bíblico-formal del hebreo הִנֵּה.
  - La puntuación en español organiza la cita directa y el discurso reportado de modo natural y publicable.
