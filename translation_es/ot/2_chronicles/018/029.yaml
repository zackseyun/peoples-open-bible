translation:
  language: es
  text: 'Entonces el rey de Israel dijo a Josafat: «Disfrázate[a] y entra en la batalla; pero tú, ponte tus vestiduras». Así el rey de Israel se disfrazó, y entraron en la batalla.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, «disfrázate». El hebreo es breve y puede sonar abrupto, pero en esta revisión se mantiene el imperativo dirigido a Josafat, en consonancia con la forma verbal y con la cláusula siguiente.
    reason: lexical_alternative
lexical_decisions:
- source_word: הִתְחַפֵּשׂ
  english_pob_choice: Disguise yourself
  chosen_spanish: Desfigúrate
  alternatives_spanish:
  - Disfrázate
  - Cámbiate de apariencia
  lexicon: HALOT
  rationale: El hebreo es una forma directa y breve en contexto imperativo. En español, «desfigúrate» conserva la idea de alterar el propio aspecto para no ser reconocido, sin añadir más contenido que el texto no exige. «Disfrázate» es posible, pero puede sonar más moderno y menos literal; aquí se prefiere una opción que mantenga la fuerza del mandato y la tensión narrativa.
- source_word: וָבֹא
  english_pob_choice: and go
  chosen_spanish: y entra
  alternatives_spanish:
  - y ve
  - y ven
  lexicon: HALOT
  rationale: El verbo בוא con «en la batalla» expresa movimiento hacia adentro del conflicto. «Entra» comunica bien la idea de ingresar al combate y mantiene la relación con el imperativo anterior. «Ve» sería más natural en algunos contextos, pero pierde un poco la imagen de entrada al escenario bélico.
- source_word: בַּמִּלְחָמָה
  english_pob_choice: into the battle
  chosen_spanish: en la batalla
  alternatives_spanish:
  - a la batalla
  - dentro de la batalla
  lexicon: HALOT
  rationale: La preposición hebrea permite un valor locativo y direccional. En español, «en la batalla» conserva la naturalidad y el sentido de estar dentro del conflicto; «a la batalla» enfatizaría más el desplazamiento que el contexto inmediato ya sugiere.
- source_word: לְבַשׁ בְּגָדֶיךָ
  english_pob_choice: put on your robes
  chosen_spanish: ponte tus ropas
  alternatives_spanish:
  - ponte tus vestiduras
  - vístete con tus ropas
  lexicon: HALOT
  rationale: בְּגָדִים es el término general para prendas/vestiduras. El contexto real es real y narrativo, y la POB inglesa especifica «robes» por la dignidad regia de Josafat; en español, «ropas» mantiene esa dignidad sin sobreespecificar litúrgicamente. «Vestiduras» sería más solemne, pero puede sonar excesivamente eclesiástico.
- source_word: וְאַתָּה
  english_pob_choice: but you
  chosen_spanish: pero tú
  alternatives_spanish:
  - y tú
  - mientras tú
  lexicon: HALOT
  rationale: 'El contraste es importante: uno irá disfrazado y el otro permanecerá visible con su atuendo real. «Pero tú» expresa de forma clara esa oposición en español y refleja la función contrastiva del hebreo en este contexto.'
- source_word: וַיִּתְחַפֵּשׂ
  english_pob_choice: disguised himself
  chosen_spanish: se disfrazó
  alternatives_spanish:
  - se desfiguró
  - cambió de apariencia
  lexicon: HALOT
  rationale: Aquí el narrador confirma la acción sobre el rey de Israel. «Se disfrazó» es la correspondencia natural en español y retiene la continuidad semántica con el mandato previo. «Se desfiguró» podría sonar demasiado fuerte o físico.
- source_word: וַיָּבֹאוּ
  english_pob_choice: they went
  chosen_spanish: ellos entraron
  alternatives_spanish:
  - fueron
  - se fueron
  lexicon: HALOT
  rationale: El plural incluye a los dos reyes y marca el movimiento conjunto hacia la batalla. «Entraron» sigue la imagen direccional de בוא y enlaza con «en la batalla». «Fueron» es más general, pero menos preciso.
- source_word: מֶלֶךְ יִשְׂרָאֵל
  english_pob_choice: the king of Israel
  chosen_spanish: el rey de Israel
  alternatives_spanish:
  - Israel’s king
  lexicon: HALOT
  rationale: Se mantiene el título de manera directa y consistente en ambas ocurrencias. Es la forma más clara y fiel en español.
- source_word: יְהוֹשָׁפָט
  english_pob_choice: Jehoshaphat
  chosen_spanish: Josafat
  alternatives_spanish:
  - Jehosafat
  lexicon: HALOT
  rationale: En español bíblico, «Josafat» es la forma tradicional y ampliamente reconocible del nombre. Se conserva la equivalencia onomástica estándar en lugar de transliterar de modo más rígido.
theological_decisions:
- issue: Tensión gramatical del mandato inicial y su referente
  english_pob_reading: The English audit trail initially surfaced a first-person sense, but the latest revision corrected it to a second-person imperative addressed to Jehoshaphat; the narrative then shows the king of Israel disguising himself.
  chosen_spanish_reading: 'Se refleja el imperativo dirigido a Josafat: «Desfigúrate y entra en la batalla»; luego la narración confirma que el rey de Israel fue quien se disfrazó.'
  alternative_spanish_readings:
  - «Me disfrazaré y entraré en la batalla»
  - «Disfrazarte y entra en la batalla»
  rationale: 'El hebreo y la revisión inglesa más reciente coinciden en que הִתְחַפֵּשׂ está dirigido a Josafat, no al rey de Israel. La traducción española debe conservar esa tensión: una orden al aliado, seguida por la acción real del rey de Israel. No se suaviza la aparente discordancia entre mandato y narración porque es parte del efecto del texto.'
  doctrine_reference: Crítica textual y coherencia narrativa; sin implicación doctrinal directa.
translation_notes:
  revision_awareness: Tomé en cuenta la revisión más reciente del texto base inglés, que corrigió la lectura del primer mandato para que fuera un imperativo dirigido a Josafat, y mantuve la confirmación narrativa posterior de que el rey de Israel fue quien se disfrazó.
  spanish_consistency_notes:
  - Se usa «rey de Israel» de forma uniforme para la misma expresión hebrea.
  - Se mantiene «Josafat» como forma estándar española del nombre propio.
  - Se preserva la diferencia entre el mandato al interlocutor y la acción posterior del rey de Israel.
  - «En la batalla» se repite para mantener el paralelismo con el movimiento narrativo del hebreo.
