  text: ἀλλὰ καθὼς γέγραπται· Ἃ ὀφθαλμὸς οὐκ εἶδεν καὶ οὖς οὐκ ἤκουσεν καὶ ἐπὶ καρδίαν ἀνθρώπου οὐκ ἀνέβη, ⸀ὅσα ἡτοίμασεν ὁ θεὸς τοῖς ἀγαπῶσιν αὐτόν.
base_translation:
  language: en
  yaml_path: translation/nt/1_corinthians/002/009.yaml
  text: But just as it is written[a], “What no eye has seen, and no ear has heard[b], and what has not entered into the heart of man—what God has prepared for those who love him.”
  footnotes:
  - marker: a
    text: Or “has not entered the human heart” or “has not occurred to anyone.”
    reason: lexical_alternative
  - marker: b
    text: “Man’s heart” uses “man” in a generic sense, referring to humanity.
    reason: cultural_note
translation:
  language: ko
  text: 그러나 기록된 바, 「눈으로 보지 못한 것, 귀로 듣지 못한 것, 사람의 마음에 떠오르지 못한 것, 곧 하나님께서 자기를 사랑하는 자들에게 예비하신 모든 것이다」 한 것과 같습니다.
  philosophy: optimal-equivalence
