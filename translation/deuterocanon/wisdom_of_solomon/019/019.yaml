translation:
  text: For land animals were changed into creatures of the water[a], and swimming creatures moved onto the land.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'land creatures were transformed into aquatic creatures, and creatures that swim crossed over onto the land.'
    reason: lexical_alternative
lexical_decisions:
- source_word: χερσαῖα
  chosen: land animals
  alternatives:
  - land creatures
  - things of the dry land
  - terrestrial creatures
  lexicon: LSJ
  rationale: The adjective/substantive denotes things belonging to dry land. In this context of contrasting habitats, 'land animals' communicates the sense naturally in English while preserving the creaturely contrast with aquatic life.
- source_word: ἔνυδρα
  chosen: creatures of the water
  alternatives:
  - water creatures
  - aquatic creatures
  lexicon: LSJ
  rationale: The term denotes beings associated with water. 'Creatures of the water' is clear and slightly more formal/literary than 'water creatures,' fitting the elevated style of Wisdom while preserving the habitat contrast.
- source_word: μετεβάλλετο
  chosen: were changed
  alternatives:
  - were transformed
  - were altered
  lexicon: LSJ
  rationale: The imperfect middle/passive indicates undergoing change. 'Were changed' is straightforward and avoids overstating the mode of transformation beyond the Greek.
- source_word: νηκτά
  chosen: swimming creatures
  alternatives:
  - things that swim
  - swimmers
  - aquatic creatures
  lexicon: LSJ
  rationale: The substantive adjective refers to creatures characterized by swimming. 'Swimming creatures' preserves the participial force and keeps the parallel with 'land animals.'
- source_word: μετέβαινεν
  chosen: moved onto
  alternatives:
  - crossed onto
  - went over onto
  - passed onto
  lexicon: LSJ
  rationale: The verb means to go over or change place. In context, 'moved onto the land' expresses relocation from one domain to another in idiomatic English without losing the sense of transition.
- source_word: γῆς
  chosen: the land
  alternatives:
  - dry land
  - earth
  - ground
  lexicon: LSJ
  rationale: Given the explicit contrast with water, 'the land' best captures the domain contrast. 'Dry land' is possible, but the prior use of χερσαῖα already supplies the dry-land idea.
