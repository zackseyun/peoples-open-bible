revisions:
- from: 'Si digo: “No lo recordaré[a], ni hablaré más en su nombre”, entonces en mi corazón hay como un fuego ardiente, encerrado en mis huesos; me canso de contenerlo[c][b], y no puedo.'
  to: 'Si digo[a]: “No lo mencionaré, ni hablaré más en su nombre[b]”, entonces es en mi corazón como un fuego ardiente, encerrado en mis huesos; me canso de contenerlo[c], y no puedo.'
  rationale: Se cambia 'recordaré' por 'mencionaré' para seguir la decisión léxica documentada y el paralelismo del hebreo. Se reubican y limpian las notas para que el texto principal sea más fiel y natural. También se corrige la nota sobre el referente implícito y el uso de 'Yahvé' en español.
