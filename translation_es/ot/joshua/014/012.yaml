translation:
  language: es
  text: Ahora, dame esta región montañosa[a], de la que Yahvé habló aquel día, porque tú mismo oíste aquel día que los anaceos están allí, con ciudades grandes y fortificadas. Tal vez Yahvé esté conmigo, y los expulsaré, tal como Yahvé dijo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «este monte». El hebreo הָהָר puede referirse tanto a un monte aislado como a una región montañosa; aquí probablemente se refiere al sentido regional más amplio.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְעַתָּה
  english_pob_choice: Now
  chosen_spanish: Ahora
  alternatives_spanish:
  - Y ahora
  lexicon: HALOT
  rationale: Marcador discursivo que introduce la petición presente de Caleb. «Ahora» suena natural en español y conserva el valor temporal e inmediato sin forzar un calco.
- source_word: תְּנָה לִּי
  english_pob_choice: give me
  chosen_spanish: dame
  alternatives_spanish:
  - concédeme
  - entrégame
  lexicon: HALOT
  rationale: El imperativo de נתן con complemento indirecto expresa una petición directa. «Dame» preserva esa franqueza mejor que una formulación más interpretativa.
- source_word: אֶת הָהָר הַזֶּה
  english_pob_choice: this hill country
  chosen_spanish: este monte[a]
  alternatives_spanish:
  - esta región montañosa
  - esta cordillera
  lexicon: HALOT
  rationale: הָהָר puede referirse a un monte individual o a una zona montañosa. Para una lectura más fiel al hebreo, se mantiene «monte» y se deja abierta la posible extensión regional en la nota.
- source_word: אֲשֶׁר דִּבֶּר יְהוָה
  english_pob_choice: that Yahweh spoke about
  chosen_spanish: del que Yahvé habló
  alternatives_spanish:
  - que Yahvé habló
  - del que Yahvé habló acerca de
  lexicon: HALOT
  rationale: דִּבֶּר es «habló»; el relativo español «del que» evita añadir explícitamente «prometió» y conserva el valor lexical de «hablar» sin perder el referente del monte.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: Se mantiene la transliteración del Nombre divino según la convención del proyecto, evitando la sustitución por un título. Esto preserva la forma nominal del texto fuente.
- source_word: בַּיּוֹם הַהוּא
  english_pob_choice: on that day
  chosen_spanish: aquel día
  alternatives_spanish:
  - ese día
  - en aquel día
  lexicon: HALOT
  rationale: Expresión temporal de referencia retrospectiva. «Aquel día» resulta idiomático en español y conserva la anáfora del texto.
- source_word: כִּי אַתָּה שָׁמַעְתָּ
  english_pob_choice: because you yourself heard
  chosen_spanish: porque tú mismo oíste
  alternatives_spanish:
  - porque tú oíste
  - ya que tú mismo escuchaste
  lexicon: HALOT
  rationale: כִּי introduce la razón. El pronombre enfático אַתָּה se refleja con «tú mismo», y «oíste» corresponde de manera directa a שָׁמַעְתָּ.
- source_word: כִּי עֲנָקִים שָׁם
  english_pob_choice: that the Anakim are there
  chosen_spanish: que allí estaban los anaceos
  alternatives_spanish:
  - que allí están los anaceos
  - que allí estaban los anaquitas
  lexicon: HALOT
  rationale: Se conserva el etnónimo con una forma española transparente, «anaceos», siguiendo la tradición de transliteración del nombre del grupo. El adverbio «allí» explicita la localización del lugar mencionado.
- source_word: וְעָרִים גְּדֹלֹות בְּצֻרוֹת
  english_pob_choice: with great fortified cities
  chosen_spanish: y que había ciudades grandes y fortificadas
  alternatives_spanish:
  - y ciudades grandes y fortificadas
  - y había ciudades grandes fortificadas
  lexicon: HALOT
  rationale: La coordinación hebrea admite una versión natural en español con verbo elíptico explícito. «Grandes y fortificadas» reproduce los dos adjetivos sin reordenarlos de forma innecesaria.
- source_word: אוּלַי
  english_pob_choice: Perhaps
  chosen_spanish: Tal vez
  alternatives_spanish:
  - Quizá
  - Quizás
  lexicon: HALOT
  rationale: Expresa posibilidad con modestia y esperanza. «Tal vez» es natural en español y mantiene la reserva del original.
- source_word: יְהוָה אוֹתִי
  english_pob_choice: the LORD will be with me
  chosen_spanish: Yahvé esté conmigo
  alternatives_spanish:
  - Yahvé estará conmigo
  - Yahvé me acompañe
  lexicon: HALOT
  rationale: El hebreo es elíptico; en contexto se entiende presencia y ayuda divina. En español, «esté conmigo» conserva esa apertura sin resolverla completamente con una certeza excesiva.
- source_word: וְהוֹרַשְׁתִּים
  english_pob_choice: I will drive them out
  chosen_spanish: los desalojaré
  alternatives_spanish:
  - los expulsaré
  - los sacaré de allí
  lexicon: HALOT
  rationale: El hiphil de ירשׁ aquí implica desplazar a los habitantes y desposeerlos del territorio. «Desalojaré» comunica la acción de removerlos del lugar con claridad moderna, sin añadir un matiz más fuerte de expulsión si no es necesario.
- source_word: כַּאֲשֶׁר דִּבֶּר יְהוָה
  english_pob_choice: just as Yahweh said
  chosen_spanish: como Yahvé habló
  alternatives_spanish:
  - tal como Yahvé dijo
  - según habló Yahvé
  lexicon: HALOT
  rationale: כַּאֲשֶׁר marca comparación de conformidad. «Como Yahvé habló» conserva el verbo lexical «hablar» y mantiene la referencia al dicho previo sin sobretraducirlo como «prometió».
theological_decisions:
- issue: Representación del Nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - Jehová
  rationale: El texto hebreo usa directamente el Tetragrama. La traducción española conserva el Nombre como «Yahvé», siguiendo la política del proyecto y evitando la sustitución por un título que borre la forma del original.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Sentido de אוּלַי יְהוָה אוֹתִי
  english_pob_reading: Perhaps Yahweh will be with me
  chosen_spanish_reading: Tal vez Yahvé esté conmigo
  alternative_spanish_readings:
  - Quizá Yahvé estará conmigo
  - Tal vez Yahvé me ayude
  rationale: El hebreo presenta una posibilidad esperanzada y una cláusula elíptica de presencia divina. «Esté conmigo» preserva esa tensión entre confianza y no presunción, sin convertirla prematuramente en una afirmación cerrada de ayuda garantizada.
  doctrine_reference: 'DOCTRINE.md Translation philosophy #3: preserve theological tension rather than resolve it'
translation_notes:
  revision_awareness: Se revisó el paquete fuente hebreo y el audit trail inglés. La decisión principal fue mantener el Nombre divino como «Yahvé», conservar la ambigüedad de הָהָר con una nota, y reflejar la cláusula elíptica de confianza con una formulación española natural. No se adoptaron las revisiones porque el pasaje ya estaba en alto acuerdo y sin cambios necesarios.
  spanish_consistency_notes:
  - Se usa «Yahvé» de forma consistente para יְהוָה.
  - Se mantiene un registro sobrio y bíblico, sin arcaísmos innecesarios.
  - El etnónimo se vertió como «anaceos» para un español eclesial comprensible; se conserva la referencia histórica del grupo.
  - La puntuación y el orden favorecen fluidez en español sin apartarse del hebreo.
