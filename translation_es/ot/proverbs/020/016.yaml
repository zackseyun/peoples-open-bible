revisions:
- from: Toma su prenda[a], porque ha salido fiador por un extraño[b]; y mantenlo en prenda por los extranjeros.
  to: Toma su prenda, porque ha salido fiador por un extraño[a]; y tómalo como garantía por los extranjeros.
  rationale: Se conserva el sentido legal y proverbial del hebreo, pero se reemplaza «mantenlo en prenda» por «tómalo como garantía» para lograr un español más natural. También se corrige la nota para que refleje la ambigüedad real de la cláusula final, conforme al rastro de auditoría en inglés. La nota cultural sobre «ha salido fiador» no es indispensable si solo se conserva una nota; el sentido queda claro en el texto.
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T22:30:23Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español capta bien la estructura y el sentido jurídico del hebreo: imperativo inicial, causa introducida por כִּי, y segunda orden paralela sobre tomar garantía debido a haberse hecho fiador por personas ajenas. Sin embargo, la segunda cola en español suena poco natural con «mantenlo en prenda», y la nota [a] no refleja la nota auditada en inglés, que trata de una lectura alternativa de la cláusula final, no de la primera.'
  spanish_quality_summary: «Toma su prenda… ha salido fiador por un extraño» es claro y fiel. Pero «mantenlo en prenda por los extranjeros» resulta forzado en español y puede sonar como retener físicamente a la persona, aunque el hebreo sí admite el sufijo personal. Una formulación como «tómalo como garantía por los extranjeros» conserva mejor la fuerza proverbial y la naturalidad jurídica en español. También conviene corregir la nota [a] para alinearla con la ambigüedad real de la cláusula final.
  glossary_alignment: No hay términos del glosario mayor en juego. Las decisiones «prenda», «fiador», «extraño» y «extranjeros» son básicamente adecuadas. «Extraño» / «extranjeros» preserva la distinción entre זָר y נָכְרִים, aunque «extraño» aquí significa persona ajena, no rara; sigue siendo aceptable en registro sapiencial.
  issues:
  - severity: medium
    issue: La nota [a] está anclada en «prenda» pero su contenido no corresponde a la evidencia auditada.
    rationale: La nota inglesa [a] explica una lectura alternativa de la cláusula final («Take a pledge from him for foreigners»), no una alternativa léxica principal para בגדו ni la primera cola. Debe rehacerse para reflejar la ambigüedad del final y mantenerse anclada en un lugar pertinente del texto revisado.
  - severity: medium
    issue: «Mantenlo en prenda» es español poco idiomático y ambiguo.
    rationale: Aunque intenta reflejar el sufijo personal de חבלהו, en español suena antinatural. «Tómalo como garantía» o «retenlo como garantía» comunica mejor la acción legal sin perder la referencia personal admitida por el hebreo y por la revisión inglesa.
  - severity: low
    issue: «por los extranjeros» puede sonar levemente duro, pero es aceptable.
    rationale: Corresponde bien a וּבְעַד נכרים. No requiere cambio necesario, aunque el conjunto mejora si se integra con una segunda cola más idiomática.
  revised_spanish_text: Toma su prenda, porque ha salido fiador por un extraño[a]; y tómalo como garantía por los extranjeros.
  revised_footnotes:
  - marker: a
    text: 'O: «Toma una garantía de él por los extranjeros». El hebreo de la cláusula final es conciso y puede enfocarse ya sea en la prenda como garantía, o en tomar garantía de la persona misma.'
    reason: alternative_reading
  revision_rationale: Se conserva el sentido legal y proverbial del hebreo, pero se reemplaza «mantenlo en prenda» por «tómalo como garantía» para lograr un español más natural. También se corrige la nota para que refleje la ambigüedad real de la cláusula final, conforme al rastro de auditoría en inglés. La nota cultural sobre «ha salido fiador» no es indispensable si solo se conserva una nota; el sentido queda claro en el texto.
