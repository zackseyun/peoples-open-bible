translation:
  language: es
  text: Esposa[a] de noble carácter, ¿quién puede hallarla? Su valor está muy por encima de las joyas[b][c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Mujer de noble carácter»; el hebreo puede referirse más generalmente a una mujer, aunque el contexto del hogar favorece «esposa».'
    reason: lexical_alternative
  - marker: b
    text: פְּנִינִים también puede traducirse «perlas» o, tradicionalmente, «rubíes»; la gema exacta es incierta.
    reason: lexical_alternative
  - marker: c
    text: 'O: «Su valor es muy superior al de las joyas».'
    reason: lexical_alternative
lexical_decisions:
- source_word: אֵשֶׁת
  english_pob_choice: wife of
  chosen_spanish: Mujer de
  alternatives_spanish:
  - Esposa de
  - Mujer casada de
  lexicon: HALOT
  rationale: El hebreo está en constructo con אִשָּׁה y el contexto del hogar puede sugerir esposa; sin embargo, en español una traducción directa como «esposa de» suena forzada aquí. «Mujer de» conserva la apertura semántica del original y la nota puede explicar que el contexto favorece la lectura doméstica/matrimonial.
- source_word: חַיִל
  english_pob_choice: noble character
  chosen_spanish: noble carácter
  alternatives_spanish:
  - valor
  - excelencia
  - fortaleza
  - virtud sobresaliente
  lexicon: HALOT
  rationale: חַיִל abarca fuerza, capacidad, valor y excelencia. «Noble carácter» recoge en español una cualidad moral y de excelencia personal sin reducirla a una sola faceta; mantiene una solución idiomática cercana a la lectura óptima del POB en inglés.
- source_word: מִי יִמְצָא
  english_pob_choice: who can find?
  chosen_spanish: ¿quién la hallará?
  alternatives_spanish:
  - ¿quién puede hallarla?
  - ¿quién la encontrará?
  lexicon: HALOT
  rationale: La forma verbal expresa rareza retórica más que simple futuro. «¿Quién la hallará?» conserva el tono proverbial y la idea de dificultad para encontrarla, sin introducir matices de posibilidad demasiado explícitos.
- source_word: וְרָחֹק
  english_pob_choice: is far beyond
  chosen_spanish: está muy por encima de
  alternatives_spanish:
  - está muy lejos de
  - está muy por encima en valor de
  lexicon: HALOT
  rationale: El adjetivo predicativo comunica distancia/comparación de superioridad. «Está muy por encima de» expresa con naturalidad la comparación de valor en español y evita una literalidad áspera como «está lejos de».
- source_word: פְּנִינִים
  english_pob_choice: jewels
  chosen_spanish: las joyas
  alternatives_spanish:
  - las perlas
  - los rubíes
  - las gemas
  lexicon: HALOT
  rationale: El término exacto es incierto; puede referirse a piedras preciosas u ornamentos valiosos. «Joyas» preserva la indeterminación y el valor precioso sin fijar erróneamente una gema específica.
- source_word: מִכְרָהּ
  english_pob_choice: her value
  chosen_spanish: su valor
  alternatives_spanish:
  - su precio
  - su worth
  lexicon: HALOT
  rationale: El sustantivo denota precio/valuación. «Su valor» comunica de manera natural la estimación comparativa del proverbio en español y evita una lectura mercantilista excesiva.
translation_notes:
  revision_awareness: 'Coincide con la evaluación reciente de alta concordancia y sin cambios sustanciales: se mantiene la lectura óptima-equivalente, con una sola adaptación principal al español para naturalidad («mujer de» en lugar de «esposa de») y se preserva la ambigüedad léxica de פְּנִינִים mediante nota.'
  spanish_consistency_notes:
  - Se usó «Yahvé»/«Mesías»/«esclavo» según los estándares del proyecto cuando correspondan; este versículo no los contiene.
  - Se mantuvo el paralelismo proverbial y el comparativo de valor sin añadir glosas interpretativas al texto principal.
  - Las notas a,b,c se anclan en los segmentos correspondientes y conservan alternativas relevantes del POB en inglés.
