revisions:
- from: Y ahora he escogido y consagrado esta casa[a], para que mi nombre esté allí para siempre[b], y mis ojos y mi corazón estarán allí todos los días.
  to: Y ahora he escogido y consagrado esta casa[a], para que mi nombre esté allí para siempre[b], y mis ojos y mi corazón estarán allí siempre.
  rationale: Se cambia «todos los días» por «siempre» para expresar mejor la continuidad permanente de כָּל הַיָּמִים en español natural y en línea con la auditoría inglesa. También se pule la nota de «consagrado» para un español más idiomático sin cambiar el sentido léxico.
