review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien la estructura básica del hebreo: muerte del padre en el desierto, exclusión de la rebelión de Coré, contraste con su propia falta, y ausencia de descendencia masculina. Sin embargo, hay dos desajustes significativos con la evidencia fuente y la auditoría POB: (1) בַּמִּדְבָּר fue auditado como ''wilderness'' y en este proyecto conviene evitar una nota que repita la misma forma elegida; en español ''desierto'' es posible, pero la nota actual es internamente defectuosa porque ofrece como alternativa exactamente la misma lectura. (2) וּבָנִים לֹא הָיוּ לוֹ significa específicamente ''no tenía hijos varones / no tuvo hijos varones'', no ''no tuvo hijos'' en sentido general, ya que el punto legal del contexto depende de la falta de hijos varones mientras sí había hijas. Además, las notas b/c están invertidas respecto del contenido y crean confusión.'
  spanish_quality_summary: El español es generalmente claro y digno, pero requiere pequeños ajustes para mejorar precisión y naturalidad contextual. 'Nuestro padre murió en el desierto' suena natural. 'Entre la asamblea' y 'en la compañía de Coré' son legibles. 'Murió en su propio pecado' es aceptable como mantenimiento de la ambigüedad. La principal dificultad de legibilidad/precisión está en 'no tuvo hijos', que en español normalmente incluye hijas y contradice el contexto inmediato del pasaje. También deben corregirse las notas para que no dupliquen la lectura elegida ni desordenen las alternativas.
  glossary_alignment: Alinea bien con la terminología del proyecto en 'Yahvé'. 'Coré' es forma española estándar y adecuada. 'Asamblea' para עֵדָה es aceptable. La decisión sobre בְחֶטְאוֹ puede mantenerse como 'en su propio pecado', con nota alternativa causal. El punto que sí rompe la racionalidad léxica documentada es בָנִים -> 'hijos' sin marcar el valor masculino específico; debe traducirse 'hijos varones' o 'hijos' con nota aclaratoria, pero aquí la mejor solución es explicitar 'hijos varones'.
  issues:
  - severity: medium
    issue: La nota [a] ofrece como alternativa exactamente la misma lectura elegida ('desierto').
    rationale: Una nota léxica debe preservar una alternativa real o aclarar una ambigüedad; tal como está, es un error editorial.
  - severity: high
    issue: '''Y no tuvo hijos'' borra la especificidad de וּבָנִים y entra en tensión con el contexto, donde sí había hijas.'
    rationale: El pasaje trata precisamente del problema de no haber dejado hijos varones. En español, 'hijos' sin más suele incluir ambos sexos, por lo que induce un sentido falso.
  - severity: medium
    issue: Las notas [b] y [c] están mal organizadas respecto de las alternativas de בְחֶטְאוֹ.
    rationale: La nota [b] propone una formulación extraña ('porque de su pecado') y la [c] repite una alternativa demasiado cercana; conviene simplificarlas en una sola nota clara sobre 'en / por / a causa de'.
  revised_spanish_text: Nuestro padre murió en el desierto[a], y no estaba entre la asamblea de los que se juntaron contra Yahvé en la compañía de Coré, sino que murió en su propio pecado[b], y no tuvo hijos varones.
  revised_footnotes:
  - marker: a
    text: O «en el yermo». El hebreo מִדְבָּר se refiere a la región despoblada del éxodo; «desierto» es una equivalencia española natural, aunque «yermo» también es posible.
    reason: lexical_alternative
  - marker: b
    text: O «en su pecado», «por su pecado» o «a causa de su pecado». El hebreo no especifica el pecado concreto; solo afirma que su muerte no fue parte de la rebelión de Coré.
    reason: alternative_reading
  revision_rationale: 'Se corrige la referencia a בָנִים para expresar explícitamente ''hijos varones'', que es el sentido necesario en contexto. También se reparan las notas: [a] ahora ofrece una alternativa real para מִדְבָּר, y [b] reúne de forma clara las posibilidades de בְחֶטְאוֹ sin duplicación ni formulaciones confusas. El resto del texto puede mantenerse porque conserva bien el sentido del hebreo y la terminología del proyecto.'
