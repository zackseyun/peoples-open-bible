translation:
  language: es
  text: Los que acampan junto a él son la tribu de Simeón[a], y el líder de los hijos de Simeón es Shelumiel hijo de Zurisaday.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «junto a ello» o «junto a este». La preposición hebrea puede indicar proximidad dentro de la disposición del campamento.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהַחֹנִם
  english_pob_choice: Those camping
  chosen_spanish: Los que acampan
  alternatives_spanish:
  - Los acampados
  - Y los que acampan
  lexicon: HALOT
  rationale: El participio hebreo funciona de manera sustantiva para designar al grupo que está acampado. «Los que acampan» conserva ese valor verbal-sustantivo en un español natural y digno.
- source_word: עָלָיו
  english_pob_choice: next to him
  chosen_spanish: junto a él
  alternatives_spanish:
  - al lado de él
  - junto a él
  lexicon: HALOT
  rationale: En el contexto del orden del campamento, la preposición עַל con sufijo señala proximidad espacial, no una relación literal de ‘sobre’. El pronombre masculino se conserva como en la revisión inglesa más reciente.
- source_word: מַטֵּה שִׁמְעוֹן
  english_pob_choice: the tribe of Simeon
  chosen_spanish: la tribu de Simeón
  alternatives_spanish:
  - la vara de Simeón
  - el bastón de Simeón
  lexicon: HALOT
  rationale: Aquí מַטֶּה se usa en sentido tribal/censal, no como objeto físico. «Tribu» comunica el sentido contextual reconocido por el auditorio bíblico y por la tradición de traducción auditada.
- source_word: וְנָשִׂיא
  english_pob_choice: and the leader
  chosen_spanish: y el líder
  alternatives_spanish:
  - y el príncipe
  - y el jefe
  lexicon: HALOT
  rationale: נָשִׂיא designa al jefe reconocido de la tribu. «Líder» evita matices monárquicos o eclesiásticos no presentes en el texto y mantiene claridad moderna.
- source_word: לִבְנֵי שִׁמְעוֹן
  english_pob_choice: of the sons of Simeon
  chosen_spanish: de los hijos de Simeón
  alternatives_spanish:
  - de los descendientes de Simeón
  - del pueblo de Simeón
  lexicon: HALOT
  rationale: Se conserva la expresión masculina plural del hebreo. «Hijos de Simeón» sigue el patrón del original sin neutralizarlo, y es plenamente inteligible en español bíblico contemporáneo.
- source_word: שְׁלֻמִיאֵל
  english_pob_choice: Shelumiel
  chosen_spanish: Shelumiel
  lexicon: Transliteración estándar
  rationale: Nombre propio transliterado sin traducir, conforme a la política del proyecto.
- source_word: בֶּן צוּרִי שַׁדָּי
  english_pob_choice: son of Zurishaddai
  chosen_spanish: hijo de Zurisaday
  alternatives_spanish:
  - hijo de Zurisaddai
  - hijo de Zurisaday
  lexicon: HALOT + transliteración onomástica
  rationale: Se mantiene la construcción patronímica directa. El nombre padre se adapta a una transliteración española legible como un solo nombre propio, evitando calco innecesario.
theological_decisions:
- issue: Referencia pronominal de עָלָיו en la disposición del campamento
  english_pob_reading: next to him
  chosen_spanish_reading: junto a él
  alternative_spanish_readings:
  - junto a ello
  - al lado de él
  rationale: La revisión inglesa reciente corrige el referente al masculino singular. En español se mantiene esa lectura para reflejar con precisión el antecedente masculino implícito en el pasaje, sin convertirlo en un neutro poco natural.
  doctrine_reference: DOCTRINE.md §Textual and referential precision
- issue: Expresión genealógica masculina en לִבְנֵי שִׁמְעוֹן
  english_pob_reading: sons of Simeon
  chosen_spanish_reading: hijos de Simeón
  alternative_spanish_readings:
  - descendientes de Simeón
  - personas de Simeón
  rationale: Se preserva la forma masculina plural del hebreo, como hizo la POB inglesa. No se neutraliza a «descendientes» porque el texto fuente conserva la referencia kinship masculina y la genealogía tribal.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4 (Gender-accurate over gender-neutral)
translation_notes:
  revision_awareness: La redacción sigue la revisión inglesa más reciente, que cambió el referente de la preposición de «it» a «him» para reflejar el singular masculino del hebreo. También conserva la lectura auditada de מַטֵּה como «tribu» y de נָשִׂיא como «líder».
  spanish_consistency_notes:
  - Se usa «Yahvé» según la norma del proyecto solo cuando el texto fuente lo requiere; este versículo no contiene el nombre divino.
  - Se transliteran los nombres propios sin traducirlos.
  - Se mantiene el orden sintáctico natural del español, pero sin ampliar el contenido del hebreo.
  - Se conserva la estructura tribal y genealógica del versículo sin introducir lenguaje eclesiástico.
