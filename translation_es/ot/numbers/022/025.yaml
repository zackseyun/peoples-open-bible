translation:
  language: es
  text: Cuando la asna vio al ángel de Yahvé[a], se apretó contra el muro y apretó el pie de Balaam contra el muro; entonces él la golpeó otra vez.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «el mensajero de Yahvé». En este contexto, el ser es claramente sobrenatural, por eso se usa «ángel» en el texto principal.
    reason: lexical_alternative
lexical_decisions:
- source_word: הָאָתוֹן
  english_pob_choice: the donkey
  chosen_spanish: la asna
  alternatives_spanish:
  - la burra
  - la hembra del asno
  lexicon: HALOT
  rationale: אָתוֹן designa una asna, es decir, una burra hembra. En español, «asna» es preciso y conserva el sexo del animal sin depender de una nota. «Burra» también sería natural, pero «asna» mantiene mejor el registro bíblico digno.
- source_word: מַלְאַךְ יְהוָה
  english_pob_choice: the angel of Yahweh
  chosen_spanish: el ángel de Yahvé
  alternatives_spanish:
  - el mensajero de Yahvé
  lexicon: HALOT
  rationale: מַלְאַךְ puede significar «mensajero» o «ángel», pero en este contexto narrativo se trata claramente de un ser sobrenatural. Por la convención del proyecto, יְהוָה se vierte «Yahvé» y no se oculta con «SEÑOR».
- source_word: וַתִּלָּחֵץ אֶל הַקִּיר
  english_pob_choice: she pressed herself against the wall
  chosen_spanish: se apretó contra el muro
  alternatives_spanish:
  - se pegó al muro
  - se presionó contra el muro
  lexicon: HALOT
  rationale: El verbo expresa un movimiento de compresión o estrechamiento contra una superficie. «Se apretó contra el muro» es natural en español y conserva la idea de quedar encajada junto a la pared.
- source_word: הַקִּיר
  english_pob_choice: the wall
  chosen_spanish: el muro
  alternatives_spanish:
  - la pared
  lexicon: HALOT
  rationale: קִיר es «muro»/«pared». Aquí «muro» funciona bien en español narrativo y puede sonar más concreto que «pared» en una escena exterior o de camino.
- source_word: וַתִּלְחַץ אֶת רֶגֶל בִּלְעָם אֶל הַקִּיר
  english_pob_choice: and pressed Balaam’s foot against the wall
  chosen_spanish: y apretó el pie de Balaam contra el muro
  alternatives_spanish:
  - y prensó el pie de Balaam contra el muro
  - y oprimió el pie de Balaam contra el muro
  lexicon: HALOT
  rationale: El mismo campo verbal de לחץ se mantiene en español con «apretó», que enlaza de manera directa con la cláusula anterior. רֶגֶל aquí se entiende como «pie» en la escena de ser atrapado contra el muro, siguiendo el sentido contextual del original y del inglés auditado.
- source_word: וַיֹּסֶף לְהַכֹּתָהּ
  english_pob_choice: so he struck her again
  chosen_spanish: entonces él la golpeó otra vez
  alternatives_spanish:
  - y continuó golpeándola
  - y volvió a golpearla
  lexicon: HALOT
  rationale: יָסַף + infinitivo expresa repetición o continuación. «La golpeó otra vez» comunica con claridad la acción reiterada en esta narración breve sin sobreinterpretar la intensidad.
theological_decisions:
- issue: Rendering of the divine name יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: El texto hebreo usa el Tetragrámaton directamente. Conforme al estándar del proyecto, se conserva el nombre divino como «Yahvé» para mantener la transparencia textual y la continuidad teológica.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
translation_notes:
  revision_awareness: 'La redacción sigue de cerca el hebreo masorético de Números 22:25 y armoniza con el audit trail inglés: mantiene el referente sobrenatural de מַלְאַךְ, conserva la repetición verbal de לחץ con una solución española natural, y preserva el nombre divino según la convención del proyecto. No se registran revisiones posteriores que alteren el sentido.'
  spanish_consistency_notes:
  - Se usó «Yahvé» de manera consistente con la política del proyecto para יְהוָה.
  - «Asna» mantiene la especificidad sexual del sustantivo hebreo הָאָתוֹן.
  - «Muro» se emplea de forma uniforme para הַקִּיר en ambas apariciones.
  - El pie de Balaam se tradujo con «pie» conforme al contexto inmediato.
  - La nota al pie preserva la alternativa léxica documentada sin introducir una lectura doctrinal distinta.
