translation:
  language: es
  text: Todas las ciudades que ustedes den a los levitas serán cuarenta y ocho ciudades, ellas y sus pastizales[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «terrenos comunes» o «tierra abierta» para la zona que rodea las ciudades.
