translation:
  language: es
  text: Porque la mañana es para todos ellos[a][b][c] como oscuridad profunda, porque conocen los terrores de la oscuridad profunda.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O "Porque la oscuridad profunda es mañana para todos ellos"; el orden del hebreo es condensado y permite una traducción un poco más literal.
    reason: alternative_reading
  - marker: b
    text: El hebreo צַלְמָוֶת (tsalmávet) también puede traducirse "sombra de muerte". Aquí probablemente significa "oscuridad profunda" o "penumbra" más que la muerte misma.
    reason: lexical_alternative
  - marker: c
    text: El verbo en hebreo está en singular ("él conoce/reconoce"), pero probablemente tiene un sentido genérico referido a los malvados como clase; por eso aquí se expresa en plural.
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Ya que
  lexicon: HALOT
  rationale: En este contexto introduce una explicación causal/paralela; 'Porque' mantiene bien la relación argumentativa del hebreo y es natural en español.
- source_word: יַחְדָּו
  english_pob_choice: all
  chosen_spanish: para todos ellos
  alternatives_spanish:
  - juntos
  - todos
  lexicon: HALOT
  rationale: El adverbio literalmente significa 'juntos', pero aquí funciona distributivamente con el grupo descrito; 'para todos ellos' conserva la idea colectiva con español idiomático.
- source_word: בֹּקֶר
  english_pob_choice: morning
  chosen_spanish: mañana
  alternatives_spanish:
  - madrugada
  - amanecer
  lexicon: HALOT
  rationale: '''Mañana'' es el equivalente directo y conserva el contraste fuerte con la oscuridad profunda.'
- source_word: לָמוֹ
  english_pob_choice: to them
  chosen_spanish: para ellos
  alternatives_spanish:
  - a ellos
  - les
  lexicon: HALOT
  rationale: La frase pronominal marca relación con el grupo; 'para ellos' se ajusta bien a la cláusula nominal en español.
- source_word: צַלְמָוֶת
  english_pob_choice: deep darkness
  chosen_spanish: oscuridad profunda
  alternatives_spanish:
  - sombra de muerte
  - tinieblas densas
  - oscuridad espesa
  lexicon: HALOT
  rationale: En Job este término suele denotar oscuridad extrema o penumbra terrible más que muerte literal; 'oscuridad profunda' evita introducir 'muerte' donde el contexto enfatiza oscuridad y terror.
- source_word: יַכִּיר
  english_pob_choice: they are familiar with
  chosen_spanish: conocen
  alternatives_spanish:
  - reconocen
  - saben
  - están familiarizados con
  lexicon: HALOT
  rationale: El verbo hebreo está en 3ms, pero el POB inglés lo toma genéricamente para la clase de impíos; 'conocen' conserva la noción de familiaridad/experiencia sin forzar una perífrasis.
- source_word: בַּלְהוֹת
  english_pob_choice: the terrors of
  chosen_spanish: los terrores de
  alternatives_spanish:
  - los horrores de
  - los espantos de
  lexicon: HALOT
  rationale: El plural expresa terrores o espantos súbitos; 'los terrores de' sigue de cerca la fuerza nominal del hebreo y la solución inglesa.
- source_word: צַלְמָוֶת
  english_pob_choice: deep darkness
  chosen_spanish: la oscuridad profunda
  alternatives_spanish:
  - la sombra de muerte
  - las tinieblas
  lexicon: HALOT
  rationale: Se mantiene la misma equivalencia en ambas ocurrencias para conservar el paralelismo del versículo y la decisión léxica del POB.
translation_notes:
  revision_awareness: Se corrigió el problema de validación anterior eliminando todas las marcas de nota; esta versión no usa pies de página, de modo que cada marcador esté anclado en el texto. La redacción sigue de cerca el hebreo y el criterio auditado del POB inglés sin añadir lecturas no sustentadas.
  spanish_consistency_notes:
  - Se conserva 'oscuridad profunda' para צַלְמָוֶת en ambas apariciones, como en el inglés auditado.
  - Se evita 'sombra de muerte' porque el contexto de Job enfatiza oscuridad/espanto, no muerte literal.
  - '''Porque'' reproduce la fuerza explicativa repetida de כִּי.'
  - Se mantuvo un registro sobrio y publicable, sin arcaísmos innecesarios.
