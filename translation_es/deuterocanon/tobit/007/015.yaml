translation:
  language: es
  text: 'Y comenzaron a comer. Entonces Ragüel llamó a Edna, su esposa, y le dijo: «Hermana[a], prepara la otra habitación[b] y hazla entrar».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Hermana» es un vocativo literal de parentesco dirigido a la esposa, preservando el modo de hablar del griego; funciona como trato afectuoso doméstico.
    reason: cultural_note
  - marker: b
    text: O «la otra cámara». El griego ταμεῖον puede referirse a una habitación interior o a una cámara.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἤρξαντο ἐσθίειν
  english_pob_choice: they began to eat
  chosen_spanish: comenzaron a comer
  alternatives_spanish:
  - empezaron a comer
  - comenzaron a comer
  lexicon: BDAG
  rationale: La construcción inceptiva ἄρχομαι + infinitivo pide expresar el inicio de la acción. «Comenzaron a comer» conserva ese valor y suena natural en español; «empezaron» sería equivalente pero menos sobrio.
- source_word: ἐκάλεσεν
  english_pob_choice: called
  chosen_spanish: llamó
  alternatives_spanish:
  - llamó
  - convocó
  lexicon: BDAG
  rationale: El contexto doméstico indica un simple llamado a Edna, no una convocatoria formal. «Llamó» reproduce mejor la neutralidad del verbo.
- source_word: Ἔδναν τὴν γυναῖκα αὐτοῦ
  english_pob_choice: Edna his wife
  chosen_spanish: Edna, su esposa
  alternatives_spanish:
  - Edna, su mujer
  - Edna, su esposa
  lexicon: BDAG
  rationale: «Esposa» mantiene la relación conyugal con registro digno y claro. «Mujer» sería posible, pero en español puede sonar más coloquial o ambiguo.
- source_word: Ἀδελφή
  english_pob_choice: Sister
  chosen_spanish: Hermana
  alternatives_spanish:
  - Hermana
  - Mi hermana
  lexicon: BDAG
  rationale: Se conserva el vocativo literal de parentesco que el griego usa como trato cariñoso hacia la esposa. «Hermana» preserva esa tensión semítica sin sustituirla por una equivalencia idiomática no atestiguada.
- source_word: τὸ ἕτερον ταμεῖον
  english_pob_choice: the other room
  chosen_spanish: la otra habitación
  alternatives_spanish:
  - la otra habitación
  - la otra cámara
  - la otra estancia
  lexicon: LSJ
  rationale: ταμεῖον puede ser cuarto interior, cámara o habitación. En este contexto narrativo, «habitación» es claro y natural en español, y «otra» refleja ἕτερον.
- source_word: εἴσαγε αὐτήν
  english_pob_choice: bring her in
  chosen_spanish: tráela
  alternatives_spanish:
  - tráela
  - llévala adentro
  lexicon: BDAG
  rationale: El imperativo pide introducirla en el espacio preparado. En español, el complemento implícito ya queda entendido por «la otra habitación»; «tráela» es breve y fiel. «Llévala adentro» explicita más de lo que el griego dice de forma directa.
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión inglesa que eliminó 'there' para acercarse más al griego, por lo que en español se evitó añadir un equivalente explícito como «allí» o «adentro» en el verbo final.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma del proyecto cuando corresponda, pero este versículo no contiene el tetragrámaton.
  - «Ragüel» sigue la forma española habitual del nombre bíblico y evita una transliteración innecesariamente dura.
  - Se conservó un registro narrativo sobrio y bíblico sin recurrir a calcos arcaizantes.
