translation:
  language: es
  text: He puesto a Yahvé[a] siempre delante de mí; porque él está a mi derecha, no vacilaré[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebreo YHWH; alternativamente transliterado «Yahweh».
    reason: alternative_reading
  - marker: b
    text: 'O: «no seré movido». El hebreo puede expresar no tambalearse ni ser desplazado de una posición segura.'
    reason: lexical_alternative
lexical_decisions:
- source_word: שִׁוִּ֬יתִי
  english_pob_choice: I have set
  chosen_spanish: He puesto
  alternatives_spanish:
  - Puse
  - He establecido
  - Mantengo delante de mí
  lexicon: HALOT
  rationale: El hebreo expresa una acción deliberada y asentada; en español, «he puesto» conserva bien el valor de decisión previa con efecto continuo, sin volver el verso demasiado rígido.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  lexicon: HALOT
  rationale: Se conserva el nombre divino propio del Tetragrámaton, conforme al criterio POB de no sustituirlo por un título. «Yahvé» es la forma castellana estable y eclesialmente legible para ese nombre.
- source_word: לְנֶגְדִּי
  english_pob_choice: before me
  chosen_spanish: delante de mí
  alternatives_spanish:
  - ante mí
  - frente a mí
  - en mi presencia
  lexicon: HALOT
  rationale: La imagen espacial hebrea indica estar en la línea de visión o presencia del hablante. «Delante de mí» reproduce bien ese sentido en español natural.
- source_word: תָמִיד
  english_pob_choice: continually
  chosen_spanish: siempre
  alternatives_spanish:
  - continuamente
  - sin cesar
  - permanentemente
  lexicon: HALOT
  rationale: Aquí funciona como adverbio de constancia. «Siempre» es más fluido en español bíblico actual y conserva la idea de continuidad.
- source_word: מִימִינִי
  english_pob_choice: at my right hand
  chosen_spanish: a mi derecha
  alternatives_spanish:
  - a mi diestra
  - a mi mano derecha
  - a mi lado derecho
  lexicon: HALOT
  rationale: La expresión hebrea apunta a la posición de apoyo y protección. En español, «a mi derecha» comunica esa imagen con naturalidad; se evita «diestra» por ser más marcado o arcaizante.
- source_word: בַּל אֶמּוֹט
  english_pob_choice: I will not be shaken
  chosen_spanish: no seré sacudido
  alternatives_spanish:
  - no vacilaré
  - no seré removido
  - no vacilaré ni caeré
  lexicon: HALOT
  rationale: El hebreo alude a ser conmovido o perder firmeza desde una posición segura. «No seré sacudido» conserva la metáfora de inestabilidad sin imponer una interpretación más específica que la del texto.
theological_decisions:
- issue: Renderización del nombre divino YHWH
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - el SEÑOR
  rationale: El texto hebreo usa יְהוָה directamente, y el proyecto POB evita sustituirlo por un título. En español, «Yahvé» mantiene el nombre personal del pacto y sigue la convención editorial del proyecto.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Imagen de estabilidad final
  english_pob_reading: I will not be shaken
  chosen_spanish_reading: no seré sacudido
  alternative_spanish_readings:
  - no seré movido
  - no vacilaré
  - no titubearé
  rationale: La metáfora hebrea permite hablar de no ser sacudido o desestabilizado. «No seré sacudido» mantiene la imagen física de firmeza y evita una traducción demasiado interpretativa.
  doctrine_reference: Lexical force of מוט in poetry; preserve instability imagery
translation_notes:
  revision_awareness: 'El pasaje coincide con la revisión final del contexto inglés: no hubo cambios en la última pasada, y el acuerdo de revisión fue alto. La versión española sigue esa decisión estable sin introducir nuevas ambigüedades.'
  spanish_consistency_notes:
  - Se mantuvo el nombre divino como «Yahvé» y no como sustituto litúrgico.
  - Se conservó la imagen poética de estabilidad con «no seré sacudido», dejando la alternativa más literal en nota.
  - El tono es bíblico y claro para lectura pública, sin calcos innecesarios del inglés.
