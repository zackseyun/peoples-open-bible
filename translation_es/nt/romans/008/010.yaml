    text: O ‘está sujeto a muerte’ o ‘es mortal’.
    reason: lexical_alternative
  - marker: c
    text: O ‘por causa de la rectitud’.
    reason: lexical_alternative
  revision_rationale: Se mantiene el texto principal porque es fiel al griego y al expediente POB. Solo se corrige la nota [c] para que preserve una alternativa léxica real y útil en español, en vez de repetir exactamente la misma formulación del texto principal.
