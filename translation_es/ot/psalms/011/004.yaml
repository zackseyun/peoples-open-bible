review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien la estructura y el sentido del hebreo: mantiene Yahvé, conserva la yuxtaposición entre templo santo y trono en los cielos, retiene la imagen antropomórfica de ojos/párpados, y traduce adecuadamente בחן como ''examinan''. Sin embargo, la nota d no es fiel al audit trail inglés: el alternativo literal documentado es ''los hijos/niños del hombre'' o ''los hijos del hombre'', no ''los hijos de Adán'', que introduce una especificación no exigida por בְּנֵי אָדָם.'
  spanish_quality_summary: El español es claro, digno y natural. 'Yahvé está en su santo templo; Yahvé—su trono está en los cielos' funciona bien en registro bíblico moderno, y 'Sus ojos ven; sus párpados examinan...' preserva el paralelismo. La única reparación necesaria es en las notas para evitar una alternativa engañosa y alinear mejor las glosas con el expediente inglés.
  glossary_alignment: 'Buena alineación general con la terminología del proyecto: יְהוָה -> ''Yahvé''; הֵיכָל -> ''templo''; שׁמים -> ''los cielos''; עפעפיו -> ''párpados''; בני אדם -> ''los hijos del hombre''. La excepción problemática es la nota ''los hijos de Adán'', que no corresponde al valor lexical preferido ni al rationale documentado para בְּנֵי אָדָם.'
  issues:
  - severity: medium
    issue: La nota [d] propone 'los hijos de Adán' como alternativa.
    rationale: בְּנֵי אָדָם aquí expresa humanidad/colectivo humano ('children/sons of man'), no requiere identificar אָדָם como nombre propio 'Adán'. Esa nota puede sesgar la interpretación y se aparta del audit trail inglés.
  - severity: low
    issue: La nota [a] menciona 'contexto poético y cultual', mientras el rationale inglés subraya también la tensión con el trono celestial.
    rationale: No es un error de traducción, pero conviene reflejar más de cerca que 'templo' se eligió por el uso en Salmos y por preservar la imagen sagrada sin reducirla a estructura terrenal.
  revised_spanish_text: Yahvé está en su santo templo[a]; Yahvé—su trono está en los cielos. Sus ojos ven[b]; sus párpados examinan[c] a los hijos del hombre[d].
  revised_footnotes:
  - marker: a
    text: O 'santuario' o 'palacio' para הֵיכָל; aquí se prefiere 'templo' por el uso en los Salmos y por el contexto sagrado de la imagen.
    reason: lexical_alternative
  - marker: b
    text: O 'Sus ojos contemplan'.
    reason: lexical_alternative
  - marker: c
    text: O 'sus párpados prueban'.
    reason: lexical_alternative
  - marker: d
    text: O 'los hijos del ser humano'; más ampliamente, 'la humanidad' o 'los seres humanos'.
    reason: lexical_alternative
  revision_rationale: Se mantiene el texto principal, que es fiel y legible. Solo se corrigen las notas para eliminar la alternativa engañosa 'los hijos de Adán' y alinear mejor las explicaciones léxicas con el expediente fuente y la filosofía del proyecto.
