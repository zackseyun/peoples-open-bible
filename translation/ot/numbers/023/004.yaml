id: NUM.23.4
reference: Numbers 23:4
source:
  edition: WLC
  text: וַ/יִּקָּ֥ר אֱלֹהִ֖ים אֶל בִּלְעָ֑ם וַ/יֹּ֣אמֶר אֵלָ֗י/ו אֶת שִׁבְעַ֤ת הַֽ/מִּזְבְּחֹת֙ עָרַ֔כְתִּי וָ/אַ֛עַל פָּ֥ר וָ/אַ֖יִל בַּ/מִּזְבֵּֽחַ־־׃
translation:
  text: And God met with Balaam[a], and he said to him, “I have arranged the seven altars and offered a bull and a ram on the altar.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'God encountered Balaam'; the Hebrew verb can denote an encounter and in some contexts carries a nuance of happening upon.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּקָּר
  chosen: met with
  alternatives:
  - came upon
  - encountered
  - happened upon
  lexicon: HALOT
  rationale: The verb from קרה here can denote an encounter or meeting. In this context, with God as subject and Balaam as object, 'met with' is natural English and preserves the sense of divine encounter without implying mere accident. 'Happened upon' would sound too chance-like in English, though the Hebrew root can sometimes carry that nuance.
- source_word: אֱלֹהִים
  chosen: God
  lexicon: HALOT
  rationale: With a singular verb and the clear referent in context, the plural form functions as the singular divine title, best rendered 'God'.
- source_word: בִּלְעָם
  chosen: Balaam
  rationale: Personal name transliterated by standard English convention, in keeping with the translation philosophy.
- source_word: וַיֹּאמֶר אֵלָיו
  chosen: and he said to him
  alternatives:
  - and said to him
  lexicon: HALOT
  rationale: The subject of 'said' is Balaam, not God, as shown by the first-person speech that follows ('I have arranged... I offered...'). English keeps the pronoun for clarity.
- source_word: אֶת שִׁבְעַת הַמִּזְבְּחֹת
  chosen: the seven altars
  alternatives:
  - seven altars
  lexicon: HALOT
  rationale: The direct-object marker plus definite noun phrase indicates a specific set already known in context, so 'the seven altars' is preferable.
- source_word: עָרַכְתִּי
  chosen: I have arranged
  alternatives:
  - I arranged
  - I set in order
  - I prepared
  lexicon: HALOT
  rationale: ערך commonly means to arrange or set in order. 'Have arranged' fits the completed action with present relevance in Balaam's report to God. 'Prepared' is possible but less precise.
- source_word: וָאַעַל
  chosen: and offered
  alternatives:
  - and caused to go up
  - and sacrificed
  lexicon: HALOT
  rationale: עלה in sacrificial contexts idiomatically means to offer up. 'Offered' is clear modern English and sufficiently reflects the sacrificial act. 'Sacrificed' is possible, but 'offered' better matches the idiom with the following animals and altar.
- source_word: פָּר
  chosen: a bull
  alternatives:
  - a young bull
  - an ox
  lexicon: HALOT
  rationale: '''Bull'' is the standard rendering for פר in sacrificial contexts. ''Young bull'' may be more specific in some contexts, but the Hebrew here does not require that nuance.'
- source_word: וָאַיִל
  chosen: and a ram
  lexicon: HALOT
  rationale: Standard rendering of איל in sacrificial contexts.
- source_word: בַּמִּזְבֵּחַ
  chosen: on the altar
  alternatives:
  - on each altar
  - upon the altar
  lexicon: HALOT
  rationale: The singular with article is best rendered straightforwardly as 'on the altar.' In context this likely refers distributively to the altar(s) just mentioned, but the Hebrew singular should not be expanded in the main text to 'each altar' without necessity.
