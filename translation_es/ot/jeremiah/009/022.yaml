translation:
  language: es
  text: 'Así dice Yahvé[a]: No se gloríe el sabio en su sabiduría, ni se gloríe el fuerte en su fuerza; no se gloríe el rico en sus riquezas.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «YHWH»; tradicionalmente se traduce «el SEÑOR».'
    reason: alternative_reading
lexical_decisions:
- source_word: כֹּה אָמַר יְהוָה
  english_pob_choice: Thus says Yahweh
  chosen_spanish: Así dice Yahvé
  alternatives_spanish:
  - Así ha dicho Yahvé
  - Esto dice Yahvé
  lexicon: HALOT
  rationale: La fórmula profética pide una equivalencia natural en español. «Así dice» conserva el tono oracular y el presente proclamativo del hebreo, mientras que «Yahvé» sigue el criterio del proyecto para el Tetragrámaton.
- source_word: אַל יִתְהַלֵּל
  english_pob_choice: Let not ... boast
  chosen_spanish: No se gloríe
  alternatives_spanish:
  - No se jacte
  - No presuma
  lexicon: HALOT
  rationale: El hitpael aquí expresa autoexaltación/boast. «No se gloríe» mantiene el valor reflexivo y el registro bíblico sin volverlo arcaico de más; «jactarse» también sería posible, pero «gloriarse» sostiene mejor el paralelismo solemne.
- source_word: חָכָם
  english_pob_choice: the wise man
  chosen_spanish: el sabio
  alternatives_spanish:
  - el hombre sabio
  - el que es sabio
  lexicon: HALOT
  rationale: El adjetivo funciona sustantivado. «El sabio» es más natural en español que «el hombre sabio» y conserva el sentido representativo del singular.
- source_word: בְּחָכְמָתוֹ
  english_pob_choice: in his wisdom
  chosen_spanish: en su sabiduría
  alternatives_spanish:
  - por su sabiduría
  - a causa de su sabiduría
  lexicon: HALOT
  rationale: La preposición ב admite esfera o base del orgullo. «En su sabiduría» preserva la relación semántica directa y el paralelismo con las dos cláusulas siguientes; el marcador [a] mantiene visible la nota sobre el nombre divino en el texto fuente.
- source_word: הַגִּבּוֹר
  english_pob_choice: the mighty man
  chosen_spanish: el valiente
  alternatives_spanish:
  - el poderoso
  - el guerrero
  lexicon: HALOT
  rationale: En este contexto, junto a sabiduría y riquezas, el sustantivo señala la fuerza/capacidad humana por la que alguien se enorgullece. «El valiente» transmite esa idea de vigor personal sin restringirla sólo al ámbito militar; «el poderoso» sería posible, pero menos idiomático aquí.
- source_word: בִּגְבוּרָתוֹ
  english_pob_choice: in his might
  chosen_spanish: en su valentía
  alternatives_spanish:
  - en su fuerza
  - en su poder
  lexicon: HALOT
  rationale: Para mantener la correspondencia con «el valiente», «valentía» expresa la cualidad de גבורה en español de manera clara y paralela. Aunque «fuerza» o «poder» son alternativas legítimas, esta opción reproduce mejor la tríada retórica de cualidades humanas.
- source_word: עָשִׁיר
  english_pob_choice: the rich man
  chosen_spanish: el rico
  alternatives_spanish:
  - el hombre rico
  - el adinerado
  lexicon: HALOT
  rationale: El adjetivo sustantivado se vierte con naturalidad como «el rico». Mantiene la estructura breve y la simetría de las tres prohibiciones.
- source_word: בְּעָשְׁרוֹ
  english_pob_choice: in his riches
  chosen_spanish: en sus riquezas
  alternatives_spanish:
  - por sus riquezas
  - a causa de sus riquezas
  lexicon: HALOT
  rationale: «Riquezas» reproduce el valor del sustantivo y el paralelismo con «sabiduría» y «valentía». El plural español refleja bien el carácter acumulativo del término.
theological_decisions:
- issue: Tratamiento del nombre divino יְהוָה
  english_pob_reading: Yahweh (with an English footnote noting the Hebrew form)
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - Yahveh
  rationale: Se sigue el criterio del proyecto para el nombre pactual de Dios. «Yahvé» es la forma establecida en el texto español principal; no se usa «SEÑOR» como sustituto ocultador. La nota al pie conserva la transparencia textual sobre la forma hebrea.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH'
translation_notes:
  revision_awareness: El audit trail inglés no requirió revisiones textuales; la concordancia general fue alta y el sentido del verso es estable. La principal decisión de trasvase fue mantener la fórmula profética y la tríada paralela con un español natural, sin suavizar la fuerza reflexiva de los verbos de orgullo.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» de forma coherente con el estándar del proyecto para יְהוָה.
  - 'Se conservó el paralelismo triádico: sabio/sabiduría, valiente/valentía, rico/riquezas.'
  - «Gloriarse» se usa de manera uniforme para reflejar el verbo de autoexaltación del hebreo.
  - La nota al pie está anclada sólo en la mención del nombre divino, como en el audit trail inglés.
