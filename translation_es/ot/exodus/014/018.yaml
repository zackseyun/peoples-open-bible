revisions:
- from: Y los egipcios sabrán que yo soy Yahvé[a], cuando sea glorificado[b] en Faraón, en sus carros y en sus jinetes.
  to: Y los egipcios sabrán que yo soy Yahvé[a], cuando yo obtenga gloria por medio de Faraón, por medio de sus carros y de sus jinetes[b].
  rationale: Se corrige la asignación de notas para que cada marcador corresponda a su comentario. Se reemplaza «en» por «por medio de» para reflejar mejor el valor contextual de ב en la cadena referente a Faraón, sus carros y sus jinetes. También se adopta «cuando yo obtenga gloria» como texto principal por ser más natural en español y por seguir la preferencia principal documentada en el POB inglés, manteniendo la alternativa pasiva en nota.
  reviewer_model: gpt-5.4
