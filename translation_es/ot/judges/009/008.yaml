translation:
  language: es
  text: 'Cierta vez, los árboles fueron a ungir un rey para que reinara sobre ellos[a], y dijeron al olivo: «Reina sobre nosotros».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'El hebreo usa una forma verbal intensiva («yendo fueron»), un modismo que enfatiza la acción; alternativamente: «Los árboles ciertamente fueron» o «Los árboles se pusieron en marcha para ungir un rey que reinara sobre ellos».'
    reason: lexical_alternative
lexical_decisions:
- source_word: הָלֹוךְ הָלְכוּ
  english_pob_choice: once went
  chosen_spanish: una vez fueron
  alternatives_spanish:
  - fueron y fueron
  - ciertamente fueron
  - se pusieron en marcha
  lexicon: HALOT
  rationale: La forma intensiva del hebreo expresa énfasis en la acción. En español, «una vez fueron» comunica con naturalidad el movimiento narrativo marcado sin repetir mecánicamente el verbo ni perder el matiz enfático.
- source_word: הָעֵצִים
  english_pob_choice: the trees
  chosen_spanish: los árboles
  alternatives_spanish:
  - los árboles/las maderas
  lexicon: HALOT
  rationale: El sustantivo plural se refiere claramente a árboles dentro de la parábola. «Árboles» es la equivalencia natural y readable en español.
- source_word: לִמְשֹׁחַ
  english_pob_choice: to anoint
  chosen_spanish: ungir
  alternatives_spanish:
  - anotar
  - consagrar
  - nombrar por unción
  lexicon: HALOT
  rationale: «Ungir» conserva la imagen concreta de la unción, que es importante en el trasfondo real y simbólico del acto. «Nombrar» suavizaría indebidamente el verbo original.
- source_word: עֲלֵיהֶם
  english_pob_choice: over themselves
  chosen_spanish: sobre sí mismos
  alternatives_spanish:
  - para sí mismos
  lexicon: HALOT
  rationale: Con מלך y על, el sentido es de dominio «sobre». En español, «sobre sí mismos» reproduce bien la fuerza reflexiva y relacional de la construcción.
- source_word: מֶלֶךְ
  english_pob_choice: a king
  chosen_spanish: un rey
  alternatives_spanish:
  - un monarca
  - un soberano
  lexicon: HALOT
  rationale: El contexto narrativo y la fórmula política del pasaje favorecen «rey» como equivalente directo y natural.
- source_word: וַיֹּאמְרוּ
  english_pob_choice: and they said
  chosen_spanish: y dijeron
  alternatives_spanish:
  - y hablaron
  - y les dijeron
  lexicon: HALOT
  rationale: La forma narrativa פשוט/wayyiqtol de אמר se vierte con el pasado simple «dijeron», que mantiene el flujo del relato.
- source_word: לַזַּיִת
  english_pob_choice: to the olive tree
  chosen_spanish: al olivo
  alternatives_spanish:
  - al árbol de olivo
  - al olivo
  lexicon: HALOT
  rationale: En español, «olivo» funciona naturalmente para el árbol personificado en la fábula y evita la pesadez de una perífrasis más literal.
- source_word: מלוכ/ה
  english_pob_choice: Reign
  chosen_spanish: Reina
  alternatives_spanish:
  - Reina como rey
  - Gobierna
  lexicon: HALOT
  rationale: El imperativo del verbo מלך se expresa de modo directo con «Reina». Mantiene la personificación y el tono de mandato del original.
- source_word: עָלֵינוּ
  english_pob_choice: over us
  chosen_spanish: sobre nosotros
  alternatives_spanish:
  - para nosotros
  lexicon: HALOT
  rationale: La preposición על con מלך indica dominio sobre sujetos; «sobre nosotros» conserva ese matiz de autoridad y sujeción.
translation_notes:
  revision_awareness: Coincide con el expediente inglés POB en el tratamiento del hebreo intensivo de הלך, de משח como «ungir», de עלֵיהֶם como relación de dominio «sobre», y de מְלֹכָה como mandato de reinar. No se registraron revisiones posteriores en el pasaje fuente; se mantiene el acuerdo alto del control cruzado.
  spanish_consistency_notes:
  - Se preserva el registro narrativo sobrio y la personificación de la parábola.
  - Se evita «SEÑOR» u otras sustituciones no pertinentes; no hay léxico divino en este versículo.
  - «Olivo» se usa de manera idiomática en español para la entidad personificada sin perder el referente arbóreo.
