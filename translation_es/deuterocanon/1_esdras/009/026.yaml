translation:
  language: es
  text: 'De Israel[a], de los hijos de Forós: Jerma y Jezias y Melcheias y Mielos y Eleazar y Asebeias y Bannaias.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Algunos nombres de este versículo probablemente corresponden a formas hebreas conocidas por la lista paralela de Esdras 10, como Parosh para Forós y Benaía para Bannaias. Como aquí 1 Esdras se traduce desde el griego, se conservan en el texto principal las formas griegas de los nombres.
    reason: alternative_reading
lexical_decisions:
- source_word: ἐκ τοῦ Ἰσραὴλ
  english_pob_choice: From Israel
  chosen_spanish: De Israel
  alternatives_spanish:
  - Desde Israel
  - Entre Israel
  lexicon: LSJ
  rationale: La preposición ἐκ conserva aquí el valor de procedencia o extracción dentro de una lista genealógica; en español, 'De Israel' reproduce esa relación de manera natural y concisa sin introducir matices no presentes.
- source_word: ἐκ τῶν υἱῶν Φορός
  english_pob_choice: from the sons of Phoros
  chosen_spanish: de los hijos de Phoros
  alternatives_spanish:
  - de los descendientes de Phoros
  - de la familia de Phoros
  lexicon: LSJ
  rationale: υἱῶν en listas genealógicas puede equivaler a 'hijos' o, por extensión, a descendientes. Se mantiene 'hijos' para conservar la estructura formal del griego y seguir el audit trail inglés.
- source_word: Φορός
  english_pob_choice: Phoros
  chosen_spanish: Phoros
  alternatives_spanish:
  - Parosh
  lexicon: LSJ
  rationale: La fuente primaria es el griego, y la forma Φορός se translitera como 'Phoros'. Aunque el paralelo hebreo apunta a 'Parosh', el texto base aquí es 1 Esdras en griego.
- source_word: Ἰερμὰ
  english_pob_choice: Jerma
  chosen_spanish: Jerma
  alternatives_spanish:
  - Jermas
  - Ramía
  lexicon: LSJ
  rationale: Nombre propio transliterado desde el griego. Se conserva la forma breve y directa del testimonio griego, sin normalizarlo a un equivalente hebreo hipotético.
- source_word: Ἰεζείας
  english_pob_choice: Jezias
  chosen_spanish: Jezias
  alternatives_spanish:
  - Jezías
  - Iezias
  lexicon: LSJ
  rationale: La transliteración 'Jezias' refleja fielmente la forma griega y resulta legible en español. Se evita sustituirla por una forma hebraizante no atestiguada en este versículo.
- source_word: Μελχείας
  english_pob_choice: Melcheias
  chosen_spanish: Melcheias
  alternatives_spanish:
  - Melquías
  - Melchias
  lexicon: LSJ
  rationale: Se conserva la transliteración del griego, incluyendo el elemento -eias, porque el testimonio griego es el ancla textual y no justifica reemplazarlo por una forma hebrea normalizada.
- source_word: Μίηλος
  english_pob_choice: Mielos
  chosen_spanish: Mielos
  alternatives_spanish:
  - Mielus
  - Milo
  lexicon: LSJ
  rationale: Nombre propio raro; la transliteración simple 'Mielos' preserva la forma griega sin conjeturar una adaptación más conocida que no está exigida por el texto.
- source_word: Ἐλεάζαρος
  english_pob_choice: Eleazar
  chosen_spanish: Eleazar
  alternatives_spanish:
  - Eleázaro
  - Eleazaros
  lexicon: LSJ
  rationale: Eleazar es la forma española establecida y reconocible para este nombre bíblico, compatible con el griego Ἐλεάζαρος y más natural que una transliteración rígida.
- source_word: Ἀσεβείας
  english_pob_choice: Asebeias
  chosen_spanish: Asebeias
  alternatives_spanish:
  - Asebias
  - Hasabía
  lexicon: LSJ
  rationale: Se traslada directamente la forma griega. Aunque el paralelo hebreo puede sugerir otra base semítica, el testimonio griego no autoriza reemplazarla en el texto principal.
- source_word: Βανναίας
  english_pob_choice: Bannaias
  chosen_spanish: Bannaias
  alternatives_spanish:
  - Benaía
  - Banaias
  lexicon: LSJ
  rationale: Se mantiene la transliteración del griego. 'Benaía' sería una alineación hebrea posible, pero aquí la forma documental del libro en griego debe conservarse.
theological_decisions:
- issue: Tratamiento de nombres propios frente al paralelo hebreo
  english_pob_reading: Because 1 Esdras is translated here from its Greek text, the Greek name-forms are retained in the main text.
  chosen_spanish_reading: Porque 1 Esdras se traduce aquí desde su texto griego, se retienen en el texto principal las formas griegas de los nombres.
  alternative_spanish_readings:
  - Sustituir por las formas hebreas paralelas del libro de Esdras
  - Hibridar los nombres griegos con equivalentes hebreos conocidos
  rationale: 'La decisión teológica/textual es de fidelidad documental: el libro en esta edición se presenta como traducción del griego, no como reconstrución del hebreo subyacente. Por eso no se corrigen los nombres con el paralelo de Esdras 10 en la línea principal.'
  doctrine_reference: Principio de primacía del testimonio textual base y de transparencia filológica en la traducción bíblica
translation_notes:
  revision_awareness: No se aplicaron revisiones al borrador previo; se mantiene la concordancia alta con el audit trail inglés y con el testimonio griego base.
  spanish_consistency_notes:
  - Se conserva 'Phoros' y no 'Parosh' en el texto principal por fidelidad al griego.
  - Se usa 'hijos' para υἱῶν por consistencia con listas genealógicas y con el audit trail inglés.
  - Se transliteran los nombres propios de manera uniforme y sin latinización excesiva.
  - La nota al pie marca explícitamente la alternativa hebrea solo como lectura relacionada, no como reemplazo del texto base.
