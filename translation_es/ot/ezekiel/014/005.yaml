translation:
  language: es
  text: para que yo aprese a la casa de Israel en su corazón[a], porque todos se han extrañado de mí por medio de sus ídolos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «en su corazón» o «por medio de su corazón». La expresión hebrea es difícil y puede indicar la esfera o el medio por el cual Yahvé apresa a Israel.'
    reason: lexical_alternative
lexical_decisions:
- source_word: לְמַעַן
  english_pob_choice: so that
  chosen_spanish: para que
  alternatives_spanish:
  - a fin de que
  - con el propósito de que
  lexicon: HALOT
  rationale: Expresa con naturalidad en español el valor purposivo del hebreo sin añadir matiz interpretativo extra.
- source_word: תְּפֹשׂ
  english_pob_choice: I may seize
  chosen_spanish: yo atrape
  alternatives_spanish:
  - yo tome
  - yo me apodere de
  - yo capture
  lexicon: HALOT
  rationale: El verbo busca conservar la fuerza de 'seize/catch'. 'Atrape' comunica la imagen de tomar con firmeza sin sonar demasiado técnico o jurídico en español.
- source_word: אֶת בֵּית יִשְׂרָאֵל
  english_pob_choice: the house of Israel
  chosen_spanish: la casa de Israel
  alternatives_spanish:
  - Israel
  - el pueblo de Israel
  lexicon: HALOT
  rationale: Mantiene la expresión corporativa del texto, importante para la carga pactual del hebreo.
- source_word: בְּלִבָּם
  english_pob_choice: in their heart
  chosen_spanish: en su corazón
  alternatives_spanish:
  - en su corazón colectivo
  - por su corazón
  - en sus corazones
  lexicon: HALOT
  rationale: En español, el singular colectivo 'su corazón' suena natural y conserva la ambigüedad de esfera/medio señalada en el audit trail. No se fuerza una aclaración que el hebreo no resuelve del todo.
- source_word: נָזֹרוּ
  english_pob_choice: have become estranged
  chosen_spanish: se han alejado
  alternatives_spanish:
  - se han apartado
  - se han vuelto extraños
  - se han enajenado
  lexicon: HALOT
  rationale: '''Alejado'' refleja el movimiento de apartarse y mantiene el sentido relacional de ruptura. Se evita ''extraños'' por sonar más interpretativo en español, aunque la idea de extrañamiento está presente.'
- source_word: מֵעָלַי
  english_pob_choice: from me
  chosen_spanish: de mí
  alternatives_spanish:
  - de mi lado
  - de mi presencia
  - de seguirme
  lexicon: HALOT
  rationale: Reproduce de forma directa la separación de Yahvé sin expandir el sentido.
- source_word: בְּגִלּוּלֵיהֶם
  english_pob_choice: through their idols
  chosen_spanish: por medio de sus ídolos
  alternatives_spanish:
  - por sus ídolos
  - mediante sus ídolos
  - a causa de sus ídolos
  lexicon: HALOT
  rationale: '''Por medio de'' conserva el valor instrumental del prefijo בְּ tal como lo explica el audit trail. ''Ídolos'' mantiene el tono despectivo de גִלּוּלִים.'
- source_word: כֻּלָּם
  english_pob_choice: all of them
  chosen_spanish: todos
  alternatives_spanish:
  - todos ellos
  - cada uno de ellos
  lexicon: HALOT
  rationale: La totalidad queda explícita en 'todos'; el contexto ya identifica al sujeto colectivo.
theological_decisions:
- issue: Imagen de Dios tomando al pueblo a nivel interior
  english_pob_reading: so that I may seize the house of Israel in their heart
  chosen_spanish_reading: para que yo atrape a la casa de Israel en su corazón
  alternative_spanish_readings:
  - para que yo tome a la casa de Israel en su corazón
  - para que yo me apodere de la casa de Israel en su corazón
  - para que yo atrape a la casa de Israel por medio de su corazón
  rationale: Se conserva la metáfora fuerte y algo difícil del hebreo. No se suaviza a una mera persuasión interior, porque el contexto presenta una acción judicial y confrontativa de Yahvé.
  doctrine_reference: 'Translation philosophy: preserve theological tension rather than resolve it'
- issue: Naturaleza de la separación de Israel
  english_pob_reading: have become estranged from me through their idols
  chosen_spanish_reading: se han alejado de mí por medio de sus ídolos
  alternative_spanish_readings:
  - se han apartado de mí por medio de sus ídolos
  - se han vuelto extraños a mí por medio de sus ídolos
  - se han enajenado de mí por medio de sus ídolos
  rationale: '''Se han alejado'' comunica la ruptura relacional y es idiomático en español. Se mantiene el nexo instrumental con los ídolos para reflejar que ellos son el medio/ocasión de la ruptura.'
  doctrine_reference: 'Translation philosophy: readable modern Spanish without flattening covenantal estrangement'
translation_notes:
  revision_awareness: 'El borrador sigue de cerca el último estado revisado del audit trail inglés: mantiene el problema idiomático de בְּלִבָּם, la lectura relacional de נָזֹרוּ y el valor instrumental de בְּגִלּוּלֵיהֶם, sin resolver la tensión del pasaje mediante paráfrasis explicativas.'
  spanish_consistency_notes:
  - Se usa 'Yahvé' según la convención del proyecto cuando el hebreo subyacente remite al nombre divino.
  - Se prefiere 'casa de Israel' para conservar el carácter corporativo pactal.
  - '''Ídolos'' traduce גִלּוּלִים con el matiz despectivo esperado en Ezequiel.'
  - No se usa 'Mesías/Cristo' en este versículo; no aplica.
  - El singular 'su corazón' conserva la referencia colectiva sin forzar pluralización innecesaria.
