  source_alignment_summary: 'El borrador refleja bien la estructura y el sentido general del hebreo: negación existencial, falta de confiabilidad en el habla, corrupción interior, metáfora de la garganta como sepulcro abierto y habla lisonjera. Sin embargo, la nota [a] no preserva correctamente la alternativa documentada en el POB inglés: la cuestión es el número/persona de «בפיהו» («en su boca / en la boca de él»), no un matiz de «fiable/estable».'
  spanish_quality_summary: 'El español principal es claro, natural y digno. «Su interior», «sepulcro abierto» y «halagan» funcionan bien. Hay solo ajustes menores: conviene corregir la nota [a] para que trate la variante singular «en su boca / en la boca de él», y puede mejorarse ligeramente la nota [c] a un español más idiomático.'
  glossary_alignment: 'No hay conflictos con la terminología base del proyecto. Las decisiones léxicas principales son adecuadas: «destrucción», «sepulcro», «garganta», «lengua». «Fiable» en el texto es aceptable, aunque «digno de confianza» o «confiable» también serían posibles; no exige cambio. El problema principal es de fidelidad de nota, no de glosario.'
  issues:
  - severity: medium
    issue: La nota [a] está mal enfocada
    rationale: El POB inglés documenta como alternativa «in his mouth» si se retiene más estrictamente el singular inicial. La nota española actual habla del matiz léxico de «fiable/estable», que corresponde a נְכוֹנָה, no a בְּפִיהוּ.
  - severity: low
    issue: La nota [c] puede sonar poco idiomática
    rationale: «Con su lengua hablan suavemente» es comprensible, pero «hablan con suavidad» o «hablan con palabras suaves» suena más natural en español sin perder el sentido.
  revised_spanish_text: Porque no hay nada fiable en su boca[a]; su interior es destrucción[b]. Su garganta es un sepulcro abierto; con su lengua halagan[c].
