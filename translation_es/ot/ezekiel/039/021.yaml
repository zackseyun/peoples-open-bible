review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español sigue bien el hebreo y el rastro POB en casi todo: וְנָתַתִּי = «pondré», כְּבוֹדִי = «mi gloria», בַּגּוֹיִם = «entre las naciones», וְרָאוּ כָל־הַגּוֹיִם = «y todas las naciones verán», מִשְׁפָּטִי = «mi juicio», y יָדִי = «mi mano» están bien resueltos. También preserva correctamente la imagen literal de «mano». Sin embargo, la colocación de las notas está invertida respecto del contenido: la nota sobre la alternativa léxica de «mi justicia...» corresponde a «mi juicio», no a «las naciones»; y la nota cultural sobre «mi mano» debe anclarse en «mano», no en «he ejecutado».'
  spanish_quality_summary: El español es claro, natural y digno. No suena acartonado. La frase «mi juicio que he ejecutado» funciona, aunque «que ejecuté» o «que he llevado a cabo» también serían posibles. «Mi mano que he puesto sobre ellas» es comprensible, pero «que he puesto sobre ellas» suena algo menos idiomático en español que la formulación inglesa; aun así, es aceptable y fiel al hebreo. La reparación necesaria es principalmente de anclaje y correspondencia de notas.
  glossary_alignment: No hay conflicto con la terminología del proyecto. No aparece Yahvé en este versículo. «gloria», «juicio» y «mano» respetan bien las decisiones léxicas y teológicas auditadas. Se conserva la metáfora de «mano» en vez de aplanarla a «poder».
  issues:
  - severity: medium
    issue: Las notas al pie están ancladas a las palabras equivocadas.
    rationale: La nota [a] explica una alternativa para מִשְׁפָּטִי («mi justicia...»), pero está colocada tras «las naciones». La nota [b] explica el hebraísmo de «mi mano», pero está colocada tras «he ejecutado». Esto altera la trazabilidad del razonamiento léxico y cultural.
  - severity: low
    issue: La formulación «mi mano que he puesto sobre ellas» es algo rígida en español.
    rationale: Aunque fiel al hebreo y aceptable, la construcción puede sonar menos natural que otras opciones como «mi mano que puse sobre ellas» o «mi mano que descargué sobre ellas». No obstante, dado que el POB quiere preservar la imagen literal y evitar sobreinterpretar, no exige cambio.
  revised_spanish_text: Y pondré mi gloria entre las naciones, y todas las naciones verán mi juicio[a] que he ejecutado, y mi mano[b] que he puesto sobre ellas.
  revised_footnotes:
  - marker: a
    text: O «mi justicia que he hecho/llevado a cabo».
    reason: lexical_alternative
  - marker: b
    text: «Mi mano» es un hebraísmo para la acción activa o el poder de Dios, especialmente en juicio.
    reason: cultural_note
  revision_rationale: Se conserva íntegramente la traducción principal porque es sustancialmente fiel al hebreo y al POB inglés. Solo se corrigen los anclajes de las notas para que la alternativa léxica recaiga sobre «mi juicio» y la nota cultural recaiga sobre «mi mano», en conformidad con la evidencia fuente y la disciplina editorial del proyecto.
