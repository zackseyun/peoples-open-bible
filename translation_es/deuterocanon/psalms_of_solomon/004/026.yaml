  glossary_alignment: 'Está alineado con los defaults del proyecto: uso de «Yahvé», mantenimiento de «temen» en lugar de parafrasear, y «Bienaventurados» para el tono sapiencial. La única desalineación real está en las alternativas léxicas de la nota, que deben expresarse en español.'
