translation:
  language: es
  text: Entonces partieron del monte Hor por el camino del mar Rojo[a], para rodear la tierra de Edom, y el pueblo se impacientó[b] en el camino.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O «por el camino hacia el mar de Juncos». Hebreo: yam suph.'
    reason: lexical_alternative
  - marker: b
    text: O «el pueblo se desanimó» o «perdió el ánimo en el camino».
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּסְעוּ
  english_pob_choice: they set out
  chosen_spanish: partieron
  alternatives_spanish:
  - se pusieron en marcha
  - salieron de viaje
  lexicon: HALOT
  rationale: נסע en fórmulas de itinerario expresa salir de un campamento y continuar el trayecto. «Partieron» conserva ese valor de movimiento iniciado, con español natural y digno.
- source_word: מֵהֹר הָהָר
  english_pob_choice: from Mount Hor
  chosen_spanish: el monte Hor
  alternatives_spanish:
  - Hor el monte
  - monte Hor
  lexicon: HALOT
  rationale: Es un topónimo establecido. En español bíblico fluido, «el monte Hor» mantiene la identificación del lugar sin calco forzado.
- source_word: דֶּרֶךְ יַם סוּף
  english_pob_choice: by the way of the Red Sea
  chosen_spanish: por el camino del mar Rojo
  alternatives_spanish:
  - por el camino al mar de Reeds
  - por la ruta del mar Rojo
  lexicon: HALOT
  rationale: דֶּרֶךְ indica ruta o camino. Se conserva la designación tradicional «mar Rojo» en el texto principal, y la alternativa léxica queda documentada en nota.
- source_word: לִסְבֹב
  english_pob_choice: to go around
  chosen_spanish: para rodear
  alternatives_spanish:
  - para bordear
  - para dar la vuelta a
  lexicon: HALOT
  rationale: 'El infinitivo expresa finalidad: tomar esa ruta con el propósito de evitar/rodear Edom. «Para rodear» es natural y conserva el sentido direccional.'
- source_word: אֶרֶץ אֱדוֹם
  english_pob_choice: the land of Edom
  chosen_spanish: la tierra de Edom
  alternatives_spanish:
  - el territorio de Edom
  - la tierra de los edomitas
  lexicon: HALOT
  rationale: אֶרֶץ con nombre propio puede ser «tierra» o «territorio». Se prefirió «tierra» por cercanía al patrón bíblico y buena inteligibilidad en español.
- source_word: וַתִּקְצַר נֶפֶשׁ הָעָם
  english_pob_choice: the people became impatient
  chosen_spanish: el ánimo del pueblo se impacientó
  alternatives_spanish:
  - el pueblo se desanimó
  - el pueblo perdió el ánimo
  - el alma del pueblo se acortó
  lexicon: HALOT
  rationale: קצר נפש es idiomático y puede denotar impaciencia, desaliento o hastío. «El ánimo del pueblo se impacientó» preserva el valor afectivo sin borrar la tensión léxica del hebreo.
- source_word: בַּדָּרֶךְ
  english_pob_choice: on the way
  chosen_spanish: en el camino
  alternatives_spanish:
  - por el camino
  - sobre el camino
  lexicon: HALOT
  rationale: La preposición admite lectura locativa y, por contexto, también puede sugerir que el trayecto fue la causa de la reacción. «En el camino» mantiene la lectura directa y sobria.
translation_notes:
  revision_awareness: La revisión más reciente indica acuerdo alto y sin cambios necesarios; esta propuesta mantiene el sentido auditado del texto base y conserva la alternativa léxica de yam suph en nota.
  spanish_consistency_notes:
  - Se usa «Yahvé» como forma estándar del proyecto solo cuando aparezca el nombre divino; en este versículo no aparece.
  - Se mantuvo «mar Rojo» en el texto principal por consistencia con la decisión inglesa auditada, sin suprimir la alternativa «mar de Reeds» en nota.
  - «El ánimo» evita una traducción excesivamente literal de נֶפֶשׁ y funciona bien en español contemporáneo sin perder la tensión semántica del hebreo.
