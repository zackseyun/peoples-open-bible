  to: Y en cuanto a mí[a], en el primer año de Darío el medo[b], yo me puse en pie para fortalecerlo y ser para él una fortaleza.
  rationale: Se corrige ‘el meda’ a ‘el medo’ por ser la forma española natural y reconocible del gentilicio. Se mantiene el resto del versículo porque representa fielmente el hebreo y la decisión inglesa de conservar la imagen nominal ‘fortaleza’. También se mejora la nota [a] para que documente una alternativa más literal y no una simple repetición del texto principal.
