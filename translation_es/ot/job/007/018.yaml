translation:
  language: es
  text: ¿Para qué lo atiendes cada mañana[a], y lo pones a prueba cada momento[b]?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O “lo visitas cada mañana”. El verbo hebreo puede significar “visitar”, “atender” o “tomar nota de”.
    reason: lexical_alternative
  - marker: b
    text: O “lo examinas cada momento”.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַתִּפְקְדֶנּוּ
  english_pob_choice: you attend to him
  chosen_spanish: te ocupas de él
  alternatives_spanish:
  - lo visitas
  - prestas atención a él
  - lo tomas en cuenta
  lexicon: HALOT
  rationale: 'פקד tiene un campo semántico amplio: visitar, atender, tomar nota de, encomendar. En este contexto de queja, junto con “lo pruebas”, la idea no es una visita benevolente sino una atención insistente o continua. “Te ocupas de él” comunica esa atención recurrente sin suavizarla ni forzar un sentido técnico de ‘visitar’.'
- source_word: לִבְקָרִים
  english_pob_choice: every morning
  chosen_spanish: cada mañana
  alternatives_spanish:
  - mañana tras mañana
  - en las mañanas
  - cada amanecer
  lexicon: HALOT
  rationale: בקרים expresa repetición de tiempo, y con ל marca recurrencia. “Cada mañana” conserva el valor iterativo de manera natural en español y encaja bien con el paralelismo del verso.
- source_word: לִרְגָעִים
  english_pob_choice: every moment
  chosen_spanish: cada momento
  alternatives_spanish:
  - en cada instante
  - momento tras momento
  - a cada instante
  lexicon: HALOT
  rationale: רגעים alude a instantes breves; con ל indica repetición continua. “Cada momento” mantiene la continuidad insistente del hebreo y suena claro y digno en español.
- source_word: תִּבְחָנֶנּוּ
  english_pob_choice: test him
  chosen_spanish: lo pruebas
  alternatives_spanish:
  - lo examinas
  - lo pones a prueba
  - lo sondeas
  lexicon: HALOT
  rationale: בחן significa probar, examinar o poner a prueba con el matiz de escrutinio. “Lo pruebas” conserva la dureza de la queja de Job y deja abierta la idea de examen/probación sin volverlo explicativo de más.
- source_word: נּוּ / him
  english_pob_choice: him
  chosen_spanish: lo
  alternatives_spanish:
  - a él
  - al hombre
  - a este ser humano
  lexicon: HALOT
  rationale: El sufijo pronominal masculino singular remite al ser humano mencionado en el verso anterior. “Lo” mantiene la referencia singular y el tono directo de la acusación/queja del texto.
theological_decisions:
- issue: Tono de la acción divina
  english_pob_reading: Render God's action as close, continual scrutiny without softening it into purely benevolent care.
  chosen_spanish_reading: Presentar la acción divina como atención continua y prueba insistente, sin convertirla en cuidado devocional benigno.
  alternative_spanish_readings:
  - acento en una visita cariñosa de Dios
  - acento en una providencia protectora
  rationale: En el contexto de Job, el verso es una queja; por eso la traducción debe conservar el peso de la vigilancia y la prueba repetidas. “Te ocupas de él” y “lo pruebas” mantienen esa tensión teológica sin resolverla a favor de una lectura consoladora.
  doctrine_reference: Translation philosophy §3, Preserve theological tension rather than resolve it.
translation_notes:
  revision_awareness: 'El pasaje muestra alto acuerdo con el texto fuente y con la revisión inglesa: no se reportan cambios aplicados en la última pasada, y la solución española conserva la misma tensión retórica de vigilancia y prueba continuas.'
  spanish_consistency_notes:
  - Se mantiene el tratamiento singular de segunda persona y el objeto singular masculino para reflejar el sufijo hebreo.
  - Se conserva un registro sobrio y bíblico, evitando una paráfrasis devocional que atenúe la queja de Job.
  - Las notas usan alternativas reales del campo semántico de פקד y בחן, coherentes con el audit trail inglés.
