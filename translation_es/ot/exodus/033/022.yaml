translation:
  language: es
  text: Y cuando pase mi gloria[a], te pondré en una hendidura de la roca, y te cubriré con mi mano hasta que yo haya pasado.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «en la hendidura de la roca». El hebreo puede reflejar un artículo definido o indefinido en la expresión correspondiente a «hendidura».
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהָיָה
  english_pob_choice: And when
  chosen_spanish: Y cuando
  alternatives_spanish:
  - y será que
  - y acontecerá que
  lexicon: HALOT
  rationale: En este contexto, וְהָיָה introduce la circunstancia temporal de lo que sigue; en español, 'Y cuando' comunica de manera natural esa relación temporal sin endurecer el hebreo con una fórmula más arcaica.
- source_word: בַּעֲבֹר
  english_pob_choice: passes by
  chosen_spanish: pase
  alternatives_spanish:
  - esté pasando
  - pasa
  lexicon: HALOT
  rationale: El infinitivo constructo con ב expresa temporalidad ('cuando ... pase'). En español, el subjuntivo 'pase' transmite adecuadamente la acción circunstancial y conserva la relación con la cláusula siguiente.
- source_word: כְּבֹדִי
  english_pob_choice: my glory
  chosen_spanish: mi gloria
  alternatives_spanish:
  - mi esplendor
  - mi honor
  lexicon: HALOT
  rationale: En este contexto teofánico, כבוד se refiere a la manifestación visible de la presencia divina. 'Mi gloria' es la equivalencia más precisa y reconocible en español.
- source_word: וְשַׂמְתִּיךָ
  english_pob_choice: I will put you
  chosen_spanish: te pondré
  alternatives_spanish:
  - te colocaré
  - te situaré
  lexicon: HALOT
  rationale: שׂים conserva la idea concreta de poner/colocar. 'Te pondré' es natural en español y mantiene la acción directa de Dios sobre Moisés.
- source_word: בְּנִקְרַת הַצּוּר
  english_pob_choice: in a cleft of the rock
  chosen_spanish: en una hendidura de la roca
  alternatives_spanish:
  - en una grieta de la roca
  - en un hueco de la roca
  - en la hendidura de la roca
  lexicon: HALOT
  rationale: נִקְרָה indica una hendidura, grieta o cavidad. El español 'hendidura' preserva el sentido físico del término y, como el inglés POB, puede leerse con artículo indefinido sin forzar un equivalente teológico o literario distinto.
- source_word: הַצּוּר
  english_pob_choice: the rock
  chosen_spanish: la roca
  alternatives_spanish:
  - la peña
  - el peñasco
  lexicon: HALOT
  rationale: El artículo definido del hebreo es explícito. 'La roca' es la opción más clara y fiel en español para este referente concreto.
- source_word: וְשַׂכֹּתִי
  english_pob_choice: I will cover
  chosen_spanish: te cubriré
  alternatives_spanish:
  - te resguardaré
  - te protegeré
  lexicon: HALOT
  rationale: סכך expresa cubrir o resguardar. 'Te cubriré' mantiene la imagen corporal y narrativa del texto, sin interpretarla de manera abstracta.
- source_word: כַפִּי
  english_pob_choice: my hand
  chosen_spanish: con mi mano
  alternatives_spanish:
  - con mi palma
  - con mi mano protectora
  lexicon: HALOT
  rationale: כף puede significar palma, pero en el lenguaje antropomórfico aplicado a Dios, 'mano' es la forma más natural y estable en español. La preposición instrumental 'con' hace explícito el medio de la cobertura.
- source_word: עָלֶיךָ
  english_pob_choice: you
  chosen_spanish: te
  alternatives_spanish:
  - sobre ti
  - encima de ti
  lexicon: HALOT
  rationale: El על del hebreo queda integrado en la construcción verbal española 'te cubriré con mi mano', que comunica la relación espacial sin sonar rígida o redundante.
- source_word: עַד עָבְרִי
  english_pob_choice: until I have passed by
  chosen_spanish: hasta que yo haya pasado
  alternatives_spanish:
  - hasta que pase yo
  - hasta que yo pase
  lexicon: HALOT
  rationale: עַד con infinitivo + sufijo marca el límite temporal de la acción. El pluscuamperfecto de subjuntivo compuesto 'haya pasado' transmite bien la anterioridad completada respecto de la cobertura.
theological_decisions:
- issue: Lenguaje antropomórfico de Dios ('mi mano')
  english_pob_reading: Retain the concrete anthropomorphic expression 'my hand' in the main text.
  chosen_spanish_reading: Conservar 'mi mano' en el texto principal.
  alternative_spanish_readings:
  - mi poder
  - mi protección
  - mi amparo
  rationale: El hebreo presenta la imagen corporal directamente; la traducción debe preservar esa concreción narrativa en lugar de sustituirla por una explicación abstracta. 'Con mi mano' mantiene la fuerza de la imagen y evita atenuar el antropomorfismo.
  doctrine_reference: Translation philosophy §§1, 3, 6
- issue: Valor teofánico de 'gloria'
  english_pob_reading: '''my glory'' refers to the manifested divine glory, not merely honor or reputation.'
  chosen_spanish_reading: '''mi gloria'' como manifestación visible de la presencia divina.'
  alternative_spanish_readings:
  - mi honor
  - mi esplendor
  rationale: En Éxodo 33, כבוד no es simple reputación humana; designa la presencia gloriosa de Yahvé. 'Mi gloria' conserva la carga teofánica y el vínculo con la terminología bíblica habitual.
  doctrine_reference: Translation philosophy §§2, 5
translation_notes:
  revision_awareness: La revisión inglesa más reciente no introdujo cambios; el texto se mantiene en alto acuerdo con el auditor. La presente redacción conserva la decisión principal sobre la imagen antropomórfica y la alternativa léxica de 'cleft/hendidura' reflejada en la nota.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' como forma estándar del proyecto solo cuando el hebreo lo exige; aquí el versículo usa lenguaje de primera persona divina sin el Tetragrámaton explícito, por lo que no aparece un nombre divino en la línea principal.
  - '''Mi gloria'' y ''mi mano'' conservan la imaginería teofánica concreta del hebreo.'
  - La nota sobre 'hendidura' preserva la alternativa documental equivalente a la del inglés POB, adaptada al español.
