    issue: Faltan notas para alternativas léxicas preservadas en el POB inglés
    rationale: La auditoría inglesa conserva como significativas la alternativa «viento / aliento» para רוּחַ y «nombre de gloria» para שֵׁם תִּפְאָרֶת. El español no debe perder esas alternativas sin motivo.
  - severity: low
