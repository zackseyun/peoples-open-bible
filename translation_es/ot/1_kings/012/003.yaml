translation:
  language: es
  text: 'Así que enviaron y lo mandaron llamar[a], y Jeroboam y toda la asamblea[b] de Israel vinieron y hablaron con Roboam, diciendo:'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «lo convocaron». El hebreo dice literalmente «enviaron y llamaron por él», es decir, hicieron que Jeroboam compareciera.
    reason: lexical_alternative
  - marker: b
    text: O «congregación». Aquí se trata del cuerpo reunido de Israel en sentido público-político.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּשְׁלְחוּ
  english_pob_choice: they sent
  chosen_spanish: enviaron
  alternatives_spanish:
  - mandaron
  - enviaron a llamar
  lexicon: HALOT
  rationale: שׁלח en este contexto introduce una acción de convocatoria. «Enviaron» reproduce el movimiento causal sin añadir un objeto explícito que el hebreo no expresa de manera directa.
- source_word: וַיִּקְרְאוּ לוֹ
  english_pob_choice: called for him
  chosen_spanish: a llamarlo
  alternatives_spanish:
  - lo llamaron
  - lo convocaron
  lexicon: HALOT
  rationale: קרא con ל puede significar llamar a alguien o hacerle venir. Dado el paralelismo con «enviaron», «a llamarlo» conserva el sentido idiomático de requerir su presencia, no solo de pronunciar su nombre.
- source_word: וַיָּבֹאוּ
  english_pob_choice: came
  chosen_spanish: vinieron
  alternatives_spanish:
  - llegaron
  - vinieron y llegaron
  lexicon: HALOT
  rationale: בוא es el verbo básico de movimiento hacia un lugar. «Vinieron» sigue de cerca la secuencia narrativa y suena natural en español.
- source_word: יָרָבְעָם
  english_pob_choice: Jeroboam
  chosen_spanish: Jeroboam
  alternatives_spanish:
  - Jerooboam
  lexicon: Transliteración convencional
  rationale: Nombre propio tradicionalmente transliterado como «Jeroboam» en español bíblico; no requiere adaptación teológica especial.
- source_word: וְכָל־קְהַל יִשְׂרָאֵל
  english_pob_choice: and all the assembly of Israel
  chosen_spanish: toda la asamblea de Israel
  alternatives_spanish:
  - toda la congregación de Israel
  - todo el conjunto de Israel
  lexicon: HALOT
  rationale: קהל designa una reunión o asamblea convocada. «Asamblea» conserva el sentido público-político señalado por la auditoría inglesa y evita el matiz eclesial más fuerte de «congregación».
- source_word: וַיְדַבְּרוּ אֶל־רְחַבְעָם
  english_pob_choice: spoke to Rehoboam
  chosen_spanish: hablaron a Roboam
  alternatives_spanish:
  - se dirigieron a Roboam
  - dijeron a Roboam
  lexicon: HALOT
  rationale: דבר אל se rinde naturalmente como «hablaron a». «Hablaron a Roboam» preserva la introducción narrativa del discurso sin colapsarla en la cita directa.
- source_word: לֵאמֹר
  english_pob_choice: saying,
  chosen_spanish: 'diciendo[c]:'
  alternatives_spanish:
  - 'y dijeron:'
  - 'diciendo:'
  lexicon: HALOT
  rationale: La fórmula לֵאמֹר introduce la cita que sigue. «Diciendo» mantiene la estructura discursiva y enlaza con la oración siguiente sin sobreinterpretar el contenido.
theological_decisions:
- issue: קהל como término de reunión pública vs. matiz eclesial
  english_pob_reading: '''Assembly'' could also be rendered ''congregation,'' but here it refers to the gathered body of Israel in a public-political sense.'
  chosen_spanish_reading: «Asamblea»
  alternative_spanish_readings:
  - congregación
  - reunión
  rationale: En este contexto narrativo-político, «asamblea» conserva mejor la idea de un cuerpo reunido para tratar un asunto nacional. «Congregación» podría sugerir un uso litúrgico más específico que el hebreo aquí no exige.
  doctrine_reference: Uso contextual de קהל en el Pentateuco y la historia deuteronomista; distinción entre cuerpo civil reunido y asamblea cultual.
translation_notes:
  revision_awareness: La redacción sigue de cerca el texto hebreo y coincide con la decisión inglesa auditada de mantener la idiomaticidad de וַיִּקְרְאוּ לוֹ como convocatoria, no mera mención verbal. Se preserva además la distinción contextual de קהל como asamblea pública, sin adoptar automáticamente el término eclesial «congregación».
  spanish_consistency_notes:
  - Se usa «Roboam» como forma española estable del nombre, en coherencia con el uso bíblico hispano.
  - Se evita introducir «SEÑOR» u otra terminología teológica no presente en el versículo.
  - La puntuación conserva la apertura de discurso con dos puntos, alineada con la función de לֵאמֹר.
