  text: 'And they said to him[a], “A man came up to meet us and said to us, ‘Go, return to the king who sent you, and speak to him: Thus says Yahweh, “Is it because there is no God in Israel that you are sending to inquire of Baal-zebub, the god of Ekron? Therefore the bed to which you have gone up—you will not come down from it[b], for you will surely die.”’”'
