translation:
  language: es
  text: Pero en el cuarto año todo su fruto será santo,[a] para alabanza a Yahvé.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, más formalmente, «santo, alabanzas a Yahvé» o «santo, para dar alabanza a Yahvé». La expresión hebrea es rara y puede resaltar una alabanza celebratoria ofrecida con el fruto.
    reason: lexical_alternative
lexical_decisions:
- source_word: וּבַשָּׁנָה
  english_pob_choice: But in the year
  chosen_spanish: Pero en el año
  alternatives_spanish:
  - Y en el año
  - En el año
  lexicon: HALOT
  rationale: El ו inicial funciona aquí con valor de enlace contrastivo respecto de los años anteriores en el contexto inmediato; «Pero» conserva ese matiz mejor que una simple «Y». «En el año» mantiene la referencia temporal directa del hebreo.
- source_word: הָרְבִיעִת
  english_pob_choice: the fourth
  chosen_spanish: el cuarto
  alternatives_spanish:
  - la cuarta
  lexicon: HALOT
  rationale: El adjetivo ordinal concuerda naturalmente con «año» en español; la forma masculina «cuarto» sigue el referente implícito de «año» y evita una discordancia innecesaria.
- source_word: יִהְיֶה
  english_pob_choice: shall be
  chosen_spanish: será
  alternatives_spanish:
  - estará
  lexicon: HALOT
  rationale: La cópula futura expresa bien la instrucción legal. «Será» resulta más natural que «estará» para un estado designado de la cosecha.
- source_word: כָּל פִּרְיוֹ
  english_pob_choice: all its fruit
  chosen_spanish: todo su fruto
  alternatives_spanish:
  - todo el fruto de él
  - todo su producto
  lexicon: HALOT
  rationale: «Todo su fruto» reproduce la totalidad del producto del árbol con un español claro y fiel. «Fruto» conserva la imagen agrícola del hebreo.
- source_word: קֹדֶשׁ
  english_pob_choice: holy
  chosen_spanish: santo
  alternatives_spanish:
  - consagrado
  - apartado
  lexicon: HALOT
  rationale: En español bíblico, «santo» comunica tanto la cualidad sacra como la separación para Dios. «Consagrado» explicaría el sentido, pero estrecha el eco teológico del término.
- source_word: הִלּוּלִים
  english_pob_choice: for giving praise
  chosen_spanish: para dar alabanza
  alternatives_spanish:
  - para alabanza
  - en alabanza
  lexicon: HALOT
  rationale: La forma rara hebrea apunta a celebración/alabanza más que a un sustantivo técnico de ofrenda. «Para dar alabanza» preserva el valor verbal y evita imponer una noción de ofrenda que el hebreo no exige.
- source_word: לַיהוָה
  english_pob_choice: to Yahweh
  chosen_spanish: a Yahvé
  alternatives_spanish:
  - para Yahvé
  - de Yahvé
  lexicon: HALOT
  rationale: Se mantiene el nombre divino del proyecto en la forma principal española, «Yahvé», por fidelidad al Tetragrámaton. La preposición «a» conserva la orientación/dedicación implícita en ל.
theological_decisions:
- issue: Naturaleza de la frase cultual rara קֹדֶשׁ הִלּוּלִים
  english_pob_reading: holy, for giving praise to Yahweh
  chosen_spanish_reading: santo, para dar alabanza a Yahvé
  alternative_spanish_readings:
  - santo, para alabanza a Yahvé
  - santo, alabanzas a Yahvé
  rationale: La frase hebrea es rara y puede sugerir una dedicación celebratoria del fruto a Dios. En español, «para dar alabanza» conserva esa apertura semántica sin convertir el sintagma en una ofrenda técnica que el texto no nombra explícitamente.
  doctrine_reference: 'Translation philosophy: optimal equivalence; preserve lexical tension rather than resolving it prematurely'
translation_notes:
  revision_awareness: La redacción sigue la revisión más reciente del audit trail inglés, que ajustó la frase de «an offering of praise» a «for giving praise» porque הִלּוּלִים denota alabanza/celebración más que el término específico para una ofrenda. La versión española mantiene esa decisión y evita sobreinterpretar el sustantivo raro.
  spanish_consistency_notes:
  - Se usa «Yahvé» de manera consistente para el nombre divino.
  - «Santo» se conserva como término cultual fuerte, no se suaviza a «consagrado» en el texto principal.
  - Se prefiere una estructura sintáctica directa y bíblica, sin calco rígido de la forma inglesa.
  - La nota al pie recoge alternativas reales de traducción donde el hebreo admite más de una lectura en español.
