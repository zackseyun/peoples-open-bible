translation:
  language: es
  text: Y le devolvió los cautivos[a] que antes había llevado cautivos de la tierra de Judá, y se volvió y se fue a su propia tierra[b], y ya no volvió a entrar en sus fronteras.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El griego dice literalmente «la cautividad», pero aquí se refiere al grupo de personas llevadas cautivas; por eso se traduce «los cautivos».
    reason: lexical_alternative
  - marker: b
    text: La expresión griega «no añadió aún venir» es un giro idiomático que significa que no volvió a venir, es decir, que ya no volvió a entrar en su territorio.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀπέδωκεν
  english_pob_choice: returned
  chosen_spanish: le devolvió
  alternatives_spanish:
  - le dio de vuelta
  - le restituyó
  lexicon: BDAG
  rationale: El verbo expresa devolver algo que antes se había tomado. En español, «devolvió» comunica con naturalidad esa restitución y conserva la relación con el objeto directo humano.
- source_word: τὴν αἰχμαλωσίαν
  english_pob_choice: the captives
  chosen_spanish: los cautivos
  alternatives_spanish:
  - la cautividad
  - los prisioneros
  lexicon: LSJ
  rationale: Aunque literalmente puede significar «la cautividad», aquí el referente concreto son las personas llevadas cautivas; «los cautivos» preserva ese sentido concreto.
- source_word: ᾐχμαλώτευσεν
  english_pob_choice: had ... taken captive
  chosen_spanish: había capturado
  alternatives_spanish:
  - había llevado cautivos
  - había apresado
  lexicon: LSJ
  rationale: El verbo mantiene el campo léxico de cautiverio. «Había capturado» es natural en español y conserva la relación con «cautivos».
- source_word: τὸ πρότερον
  english_pob_choice: formerly
  chosen_spanish: antes
  alternatives_spanish:
  - anteriormente
  - previamente
  lexicon: BDAG
  rationale: Marca anterioridad relativa de forma concisa y comprensible en español.
- source_word: γῆς Ἰούδα
  english_pob_choice: the land of Judah
  chosen_spanish: la tierra de Judá
  alternatives_spanish:
  - Judá
  - el territorio de Judá
  lexicon: LSJ
  rationale: Se conserva explícitamente γῆ, «tierra», porque el griego nombra el ámbito geográfico, no solo la región como nombre propio.
- source_word: ἀποστρέψας
  english_pob_choice: he turned back
  chosen_spanish: se volvió
  alternatives_spanish:
  - volvió atrás
  - se dio media vuelta
  lexicon: BDAG
  rationale: El participio introduce el movimiento de regreso. «Se volvió» es idiomático en español y mantiene la secuencia narrativa.
- source_word: ἀπῆλθεν εἰς τὴν γῆν αὐτοῦ
  english_pob_choice: went away to his own land
  chosen_spanish: fue a su propia tierra
  alternatives_spanish:
  - se fue a su tierra
  - partió a su país
  lexicon: BDAG
  rationale: Se conserva el sentido de marcha/departida y la posesión de αὐτοῦ. «Su propia tierra» reproduce con naturalidad el énfasis posesivo.
- source_word: οὐ προσέθετο ἔτι ἐλθεῖν
  english_pob_choice: he no longer came again
  chosen_spanish: ya no volvió a venir
  alternatives_spanish:
  - ya no siguió viniendo
  - no regresó más
  lexicon: BDAG
  rationale: La construcción idiomática indica repetición o continuación interrumpida. «Ya no volvió a venir» expresa bien esa idea en español sin volverse mecánico.
- source_word: τὰ ὅρια αὐτῶν
  english_pob_choice: their borders
  chosen_spanish: sus fronteras
  alternatives_spanish:
  - sus límites
  - su territorio
  lexicon: LSJ
  rationale: ὅρια puede referirse a límites territoriales. «Fronteras» funciona bien en un contexto político-militar y conserva la imagen de límite externo.
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión inglesa más reciente, que ajustó la última cláusula de un giro más analítico a «no volvió a venir otra vez». En español se resolvió con una formulación idiomática equivalente, «ya no volvió a venir», manteniendo el valor iterativo/repetitivo del griego sin sobretraducirlo.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» fuera del versículo porque no aparece ningún tetragrámaton ni referencia divina explícita en el texto.
  - Se prefirió «cautivos» frente a «cautividad» para conservar el referente humano del sustantivo griego.
  - Se evitó «SEÑOR» o fórmulas tradicionales de sustitución porque no corresponden a este pasaje.
  - «Fronteras» se eligió por la combinación de límite territorial y contexto bélico, aunque «territorio» también sería posible.
