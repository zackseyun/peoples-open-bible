translation:
  language: es
  text: Y Yahvé será un baluarte[b] para el oprimido[a], un baluarte en tiempos de angustia.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «para el quebrantado» o «para el abatido». El hebreo denota a quien está aplastado, oprimido o postrado.
    reason: lexical_alternative
  - marker: b
    text: O «refugio» o «refugio elevado». El término hebreo sugiere un lugar seguro y elevado de protección.
    reason: lexical_alternative
lexical_decisions:
- source_word: וִיהִי
  english_pob_choice: And Yahweh will be
  chosen_spanish: Y Yahvé será
  alternatives_spanish:
  - Y sea Yahvé
  - Y Yahvé estará
  lexicon: HALOT
  rationale: El hebreo con imperfecto/jusivo en este contexto poético puede conservarse en español como declaración futura o como valor volitivo. Dado el ajuste final del POB inglés hacia una lectura declarativa, «será» reproduce bien ese sentido sin perder el tono solemne.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: Se preserva el nombre propio divino según la convención del proyecto. «Yahvé» corresponde al Tetragrámaton y evita la sustitución por un título.
- source_word: מִשְׂגָּב
  english_pob_choice: stronghold
  chosen_spanish: baluarte
  alternatives_spanish:
  - refugio
  - fortaleza
  - refugio elevado
  lexicon: HALOT
  rationale: El término hebreo designa un lugar alto y seguro de protección. «Baluarte» comunica defensa y seguridad en español natural; se evita «refugio» como opción más general y menos marcadamente defensiva.
- source_word: לַדָּךְ
  english_pob_choice: for the oppressed
  chosen_spanish: para el oprimido
  alternatives_spanish:
  - para el quebrantado
  - para el abatido
  - para el pisoteado
  lexicon: HALOT
  rationale: Se sigue la elección inglesa por «oppressed», que recoge el matiz social de דך. «Oprimido» es el equivalente más claro y bíblicamente inteligible en español contemporáneo.
- source_word: לְעִתּוֹת
  english_pob_choice: in times of
  chosen_spanish: en tiempos de
  alternatives_spanish:
  - en ocasiones de
  - en temporadas de
  - en épocas de
  lexicon: HALOT
  rationale: La construcción temporal con ל se expresa de modo natural como «en tiempos de», preservando el sentido distributivo de ocasiones repetidas.
- source_word: בַּצָּרָה
  english_pob_choice: trouble
  chosen_spanish: angustia
  alternatives_spanish:
  - aflicción
  - tribulación
  - apuro
  lexicon: HALOT
  rationale: Aunque el inglés usa «trouble», el hebreo apunta a aflicción/estrechez. «Angustia» mantiene el campo semántico de presión y aflicción en español sin caer en una banalidad demasiado coloquial.
theological_decisions:
- issue: Renderizado del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: Se conserva la decisión doctrinal del POB de transliterar el Tetragrámaton en lugar de ocultarlo tras un título. En español, «Yahvé» es la forma estándar interna del proyecto.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Valor verbal de וִיהִי en un verso poético
  english_pob_reading: And Yahweh will be a stronghold
  chosen_spanish_reading: Yahvé será un baluarte
  alternative_spanish_readings:
  - Yahvé sea un baluarte
  - Que Yahvé sea un baluarte
  rationale: Aunque la forma hebrea puede tener matiz jussivo, la revisión inglesa optó por una lectura declarativa. En español se conserva ese valor con «será», sin introducir una súplica que el estado final del audit trail ya no privilegia.
  doctrine_reference: 'Applied revision note: changed ''May the LORD be'' to ''And the LORD will be'' to preserve the verse''s declarative sense.'
translation_notes:
  revision_awareness: El texto inglés revisado pasó de una formulación volitiva («May the LORD be») a una declarativa («And the LORD will be»). La versión española sigue esa decisión revisada y conserva la repetición retórica de מִשְׂגָּב con un solo equivalente consistente.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como forma estable para יְהוָה.
  - Se conserva la repetición de מִשְׂגָּב con el mismo término «baluarte» para reflejar el paralelismo hebreo.
  - «Oprimido» y «angustia» reproducen el contraste social y situacional del hebreo sin sobreexplicar el verso.
