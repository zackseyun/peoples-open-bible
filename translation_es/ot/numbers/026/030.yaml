review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura del hebreo: fórmula introductoria, ''hijos de Gilead'', dos fundadores de clan y sus gentilicios. También preserva la nota sobre el valor genealógico amplio de ''hijos''. Sin embargo, hay un problema de legibilidad y consistencia onomástica en español bíblico: ''Gilead'' debería ajustarse a la forma española ampliamente reconocida ''Galaad'', más natural y church-readable, especialmente porque la propia alternativa léxica ya la reconoce. El resto del sentido fuente queda intacto.'
  spanish_quality_summary: 'El español es claro y mayormente natural. ''El clan de'' funciona bien para מִשְׁפַּחַת. No obstante, ''Gilead'' suena anglicado en un texto bíblico español; ''Galaad'' mejora la legibilidad sin perder precisión. También conviene capitalizar de modo uniforme los gentilicios derivados de nombres propios en este registro: ''iezeritas'' y ''helekitas'' pueden mantenerse en minúscula como nombres de grupo, pero el punto principal de calidad es la forma ''Galaad''.'
  glossary_alignment: No hay términos teológicos del glosario principal en juego. La revisión propuesta mantiene la transliteración auditada de Iezer y Helek, conserva 'hijos' para בְּנֵי, y preserva 'clan' para מִשְׁפַּחַת. La única desviación necesaria es adoptar la forma española establecida 'Galaad' para גִלְעָד por legibilidad y uso bíblico estándar en español.
  issues:
