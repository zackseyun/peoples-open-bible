base_translation:
  language: en
  yaml_path: translation/ot/1_kings/014/005.yaml
  text: And Yahweh said to Ahijah[a], “Behold, Jeroboam’s wife is coming to inquire of you concerning her son, for he is sick. Thus and thus you shall say to her. And when she comes[b], she will be disguising herself.”
  footnotes:
  - marker: a
    text: 'Hebrew: ''thus and thus''—an idiom meaning a specific message whose content is not yet stated explicitly.'
    reason: lexical_alternative
  - marker: b
    text: Or 'she will pretend to be another woman.' The Hebrew verb conveys making oneself unrecognized or disguised.
    reason: lexical_alternative
