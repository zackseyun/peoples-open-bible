translation:
  language: es
  text: 'Para el director del coro: según Mahalath[a]. Maskil[b] de David[c].'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O posiblemente un término musical o litúrgico; el sentido de «Mahalath» es incierto.
    reason: lexical_alternative
  - marker: b
    text: «Maskil» es un término técnico en los encabezamientos de salmos, quizá con la idea de una composición instructiva o contemplativa.
    reason: lexical_alternative
  - marker: c
    text: El hebreo «de David» puede indicar autoría, asociación, dedicación o afiliación de colección.
    reason: alternative_reading
lexical_decisions:
- source_word: לַמְנַצֵּחַ
  english_pob_choice: For the choir director
  chosen_spanish: Para el director del coro
  alternatives_spanish:
  - Para el director musical
  - Para el maestro de coro
  lexicon: HALOT
  rationale: En los encabezamientos de salmos, el término señala al responsable de la ejecución musical. «Director del coro» comunica bien la función en español moderno sin volver el tono arcaico.
- source_word: עַל
  english_pob_choice: according to
  chosen_spanish: según
  alternatives_spanish:
  - sobre
  - al ritmo de
  - con la melodía de
  lexicon: HALOT
  rationale: En encabezamientos musicales, la preposición introduce probablemente una indicación de melodía, estilo o uso. «Según» preserva esa apertura sin precisar indebidamente el valor técnico.
- source_word: מָחֲלַת
  english_pob_choice: Mahalath
  chosen_spanish: Mahalath
  alternatives_spanish:
  - Mahalat
  - enfermedad
  lexicon: HALOT
  rationale: Se mantiene la transliteración porque el referente es incierto y probablemente designa una melodía o término musical. Traducirlo como «enfermedad» sería especulativo.
- source_word: מַשְׂכִּיל
  english_pob_choice: A Maskil
  chosen_spanish: Maskil
  alternatives_spanish:
  - Un salmo contemplativo
  - Un canto instructivo
  lexicon: HALOT
  rationale: Es un término técnico de los encabezamientos de salmos. La transliteración conserva la categoría sin fingir una precisión que el hebreo no permite.
- source_word: לְדָוִד
  english_pob_choice: of David
  chosen_spanish: de David
  alternatives_spanish:
  - por David
  - para David
  - perteneciente a David
  lexicon: HALOT
  rationale: La preposición puede indicar autoría, asociación, dedicación o afiliación de colección. «De David» mantiene esa ambigüedad documentada sin sobreinterpretarla.
theological_decisions:
- issue: Naturaleza del encabezamiento y atribución davídica
  english_pob_reading: Render the heading as part of the canonical verse and preserve the ambiguity of לְדָוִד with 'of David.'
  chosen_spanish_reading: Tratar el encabezamiento como parte del versículo canónico y conservar la ambigüedad de לְדָוִד con «de David».
  alternative_spanish_readings:
  - Tomarlo como una nota editorial no traducida
  - Traducir לְדָוִד como «por David»
  rationale: El texto hebreo presenta el encabezamiento como parte del verso. Traducirlo respeta la forma canónica del salmo, y «de David» evita afirmar autoría de manera más fuerte de lo que exige el hebreo.
  doctrine_reference: Translation philosophy §§1, 3, 5
translation_notes:
  revision_awareness: Se siguió el estado de revisión más reciente, que indicó que los marcadores debían ubicarse junto a sus respectivos términos; por eso [a] acompaña a «Mahalath», [b] a «Maskil» y [c] a «David».
  spanish_consistency_notes:
  - Se mantiene el tratamiento de encabezamientos salmódicos como parte del texto canónico.
  - Se conserva la transliteración de los términos técnicos y del topónimo/título incierto donde el audit trail no autoriza una traducción segura.
  - «de David» mantiene la ambigüedad de לְדָוִד sin resolverla en exceso.
