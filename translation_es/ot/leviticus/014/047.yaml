  source_alignment_summary: 'El borrador refleja bien la estructura legal del hebreo: dos participios sustantivados genéricos, ambos con obligación de lavar la ropa. También conserva correctamente la amplitud de וְהַשֹּׁכֵב frente a la alternativa más estrecha «duerma». Sin embargo, «vestidos» en español moderno puede sonar más estrecho o ambiguo que el hebreo בְּגָדָיו y que el inglés auditado «his clothes».'
  spanish_quality_summary: La redacción es clara y digna, pero «sus vestidos» resulta menos natural y potencialmente menos preciso en español bíblico contemporáneo que «su ropa». Además, el anclaje de la nota está colocado sobre «vestidos», aunque la nota trata de «se acueste»; conviene mover el marcador al verbo correspondiente.
  glossary_alignment: No hay términos del glosario principal en juego como Yahvé, Mesías o Espíritu. La decisión verbal «se acueste» está bien alineada con la justificación léxica documentada. Se recomienda ajustar «vestidos» a «ropa» por fidelidad semántica y naturalidad española.
  issues:
  - severity: medium
    issue: «Sus vestidos» no es la mejor equivalencia para בְּגָדָיו en este contexto.
    rationale: El hebreo se refiere de manera amplia a la ropa o prendas de la persona. En español actual, «vestidos» puede interpretarse como una clase específica de prenda o sonar demasiado calcado/bíblico. «Su ropa» comunica mejor el sentido general y sigue siendo digno.
  - severity: medium
    issue: La nota [a] está anclada en «vestidos», pero su contenido explica «se acueste».
    rationale: Los marcadores deben aparecer en la palabra o frase relevante. Mantener el anclaje actual crea confusión editorial y no sigue la disciplina requerida de notas.
  revised_spanish_text: Y el que se acueste[a] en la casa lavará su ropa, y el que coma en la casa lavará su ropa.
  revised_footnotes:
  - marker: a
    text: O «quien duerma en la casa». El verbo hebreo puede significar «acostarse» o «dormir»; aquí se prefiere «se acueste» por ser más amplio y ajustarse al contexto legal.
    reason: lexical_alternative
