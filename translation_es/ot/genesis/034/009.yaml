translation:
  language: es
  text: 'Emparéntense con nosotros[a]: dennos a sus hijas[b], y tomen a nuestras hijas para ustedes[b].'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, más formalmente: «Hagan matrimonios con nosotros». El verbo hebreo expresa entrar mutuamente en alianzas matrimoniales.'
    reason: lexical_alternative
  - marker: b
    text: Es decir, en matrimonio; el sentido matrimonial rige tanto «dennos a sus hijas» como «tomen a nuestras hijas para ustedes» en este versículo.
    reason: cultural_note
lexical_decisions:
- source_word: וְהִתְחַתְּנוּ אֹתָנוּ
  english_pob_choice: Intermarry with us
  chosen_spanish: Hacer alianzas matrimoniales con nosotros
  alternatives_spanish:
  - Intercasarse con nosotros
  - Entrar en matrimonio con nosotros
  lexicon: HALOT
  rationale: El hitpael de חתן expresa aquí una relación matrimonial recíproca, no solo un acto unilateral de dar en matrimonio. En español, "hacer alianzas matrimoniales" conserva el sentido mutuo y suena natural; "intercasarse" es posible pero menos usual.
- source_word: בְּנֹתֵיכֶם
  english_pob_choice: your daughters
  chosen_spanish: sus hijas
  alternatives_spanish:
  - vuestras hijas
  - las hijas de ustedes
  lexicon: HALOT
  rationale: Es un plural constructo con sufijo de 2mp; "sus hijas" comunica de modo claro y neutral la referencia plural en español.
- source_word: תִּתְּנוּ לָנוּ
  english_pob_choice: give ... to us
  chosen_spanish: den sus hijas a nosotros
  alternatives_spanish:
  - den a sus hijas en matrimonio a nosotros
  - entreguen sus hijas a nosotros
  lexicon: HALOT
  rationale: נתן con este contexto implica dar en matrimonio. Se mantiene la forma breve y directa del hebreo, apoyada por el inicio de la cláusula, sin añadir una explicación interpretativa en el cuerpo principal.
- source_word: וְאֶת בְּנֹתֵינוּ תִּקְחוּ לָכֶם
  english_pob_choice: and take our daughters for yourselves
  chosen_spanish: y tomen nuestras hijas para ustedes
  alternatives_spanish:
  - y tomen nuestras hijas como esposas para ustedes
  - y se casen con nuestras hijas
  lexicon: HALOT
  rationale: לקח con "hijas" aquí significa tomarlas en matrimonio. "Tomen nuestras hijas para ustedes" conserva la correspondencia verbal y la reciprocidad del hebreo; las alternativas explicitan el sentido matrimonial, pero son más interpretativas.
translation_notes:
  revision_awareness: Coincide con el pasaje base sin revisiones relevantes; se preserva la reciprocidad matrimonial del hebreo y la opción más formal documentada en la nota.
  spanish_consistency_notes:
  - Se evitó "SEÑOR" u այլ sustituciones innecesarias porque no aparece el tetragrámaton en este versículo.
  - Se mantuvo un registro claro y publicable, con tono bíblico contemporáneo y sin calco áspero.
  - Las notas distinguen entre la formulación breve del texto principal y la explicitación del sentido matrimonial documentado por el audit trail en inglés.
