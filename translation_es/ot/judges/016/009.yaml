translation:
  language: es
  text: 'Ahora bien, la emboscada estaba esperando en la habitación interior[a], y ella le dijo: «¡Los filisteos sobre ti, Sansón!». Pero él rompió las ataduras, como se rompe un hilo de estopa[b] cuando huele fuego, y su fuerza no fue conocida.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «el que estaba al acecho estaba en la habitación»; el participio hebreo singular puede funcionar de manera colectiva para los atacantes ocultos.
    reason: lexical_alternative
  - marker: b
    text: 'Literalmente: «como se rompe un hilo de estopa cuando huele fuego».'
    reason: lexical_alternative
lexical_decisions:
- source_word: הָאֹרֵב
  english_pob_choice: the ambush
  chosen_spanish: el de la emboscada
  alternatives_spanish:
  - la emboscada
  - el que estaba al acecho
  - los hombres en emboscada
  lexicon: HALOT
  rationale: El participio singular puede funcionar colectivamente. En español, «el de la emboscada» conserva esa referencia colectiva sin decidir indebidamente entre singular o plural, y mantiene la idea táctica de estar al acecho.
- source_word: יֹשֵׁב
  english_pob_choice: was waiting
  chosen_spanish: estaba
  alternatives_spanish:
  - estaba esperando
  - estaba sentado
  - permanecía
  lexicon: HALOT
  rationale: En contexto de emboscada, el verbo no describe mera postura física sino permanencia/espera encubierta. «Estaba» junto con el sustantivo previo comunica esa función sin forzar un calco.
- source_word: בַּחֶדֶר
  english_pob_choice: in the inner room
  chosen_spanish: en la habitación interior
  alternatives_spanish:
  - en la habitación
  - en la cámara
  - en el cuarto interior
  lexicon: HALOT
  rationale: חֶדֶר designa una habitación o cámara interior. «Habitación interior» es natural en español y conserva la especificación espacial del hebreo y del contexto clandestino.
- source_word: פְּלִשְׁתִּים עָלֶיךָ
  english_pob_choice: The Philistines are upon you
  chosen_spanish: ¡Los filisteos sobre ti!
  alternatives_spanish:
  - ¡Los filisteos están sobre ti!
  - ¡Los filisteos te atacan!
  - ¡Los filisteos contra ti!
  lexicon: HALOT
  rationale: La exclamación reproduce el grito de alarma idiomático de עַל en contexto de ataque. Se omite «están» para mantener brevedad y urgencia en español, sin perder el sentido de amenaza inminente.
- source_word: וַיְנַתֵּק
  english_pob_choice: snapped
  chosen_spanish: rompió
  alternatives_spanish:
  - desgarró
  - quebró
  - arrancó
  lexicon: HALOT
  rationale: En español, «rompió» transmite de forma clara el sentido de ruptura brusca del verbo, especialmente en paralelo con la comparación del hilo de estopa que se deshace al fuego.
- source_word: הַיְתָרִים
  english_pob_choice: the cords
  chosen_spanish: las ataduras
  alternatives_spanish:
  - los cordones
  - las cuerdas
  - los lazos
  lexicon: HALOT
  rationale: Aquí el término se refiere a los vínculos con que fue sujetado Sansón. «Ataduras» es más general que «cuerdas» y evita limitar innecesariamente el material exacto, preservando la función de restricción.
- source_word: פְּתִיל הַנְּעֹרֶת
  english_pob_choice: a thread of tow
  chosen_spanish: un hilo de estopa
  alternatives_spanish:
  - una hebra de estopa
  - un hilo de lino cardado
  - un hilo de fibra
  lexicon: HALOT
  rationale: פְּתִיל es «hilo» o «hebra», y נְעֹרֶת alude a fibra de lino/estopa. «Hilo de estopa» es una equivalencia idiomática clara en español que conserva la fragilidad y combustibilidad de la imagen.
- source_word: בַּהֲרִיחוֹ אֵשׁ
  english_pob_choice: when it smells fire
  chosen_spanish: cuando huele el fuego
  alternatives_spanish:
  - al oler el fuego
  - cuando percibe el fuego
  - cuando siente el fuego
  lexicon: HALOT
  rationale: Se conserva la imagen sensorial inusual del hebreo. «Huele el fuego» mantiene la literalidad auditable y el efecto figurativo del texto, sin suavizarlo a «cuando se acerca al fuego».
- source_word: וְלֹא נוֹדַע כֹּחוֹ
  english_pob_choice: and his strength was not known
  chosen_spanish: y no se supo de dónde venía su fuerza
  alternatives_spanish:
  - y su fuerza no fue conocida
  - y no se conoció su fuerza
  - y su fuerza no fue descubierta
  lexicon: HALOT
  rationale: 'El Niphal de ידע expresa que la fuerza no llegó a conocerse. En español, «no se supo de dónde venía su fuerza» comunica el resultado narrativo: la fuente de su fuerza permaneció oculta, sin perder la idea de desconocimiento.'
theological_decisions:
- issue: 'El final del versículo: conocimiento de la fuerza de Sansón'
  english_pob_reading: his strength was not known
  chosen_spanish_reading: no se supo de dónde venía su fuerza
  alternative_spanish_readings:
  - su fuerza no fue conocida
  - su fuerza no fue descubierta
  rationale: 'No hay una afirmación doctrinal explícita, pero sí una tensión narrativa: el texto no solo dice que la fuerza era desconocida en abstracto, sino que su origen quedó oculto. La formulación elegida preserva esa reserva sin añadir explicación no presente en el hebreo.'
  doctrine_reference: N/A
translation_notes:
  revision_awareness: 'Se tuvo en cuenta la revisión más reciente del POB en inglés: se omitió «for her» porque el hebreo no añade un objeto explícito; se mantuvo la comparación con tow/estopa; y se conservó el cierre literal «not known» en lugar de interpretaciones más libres. La versión española sigue esa línea auditada, pero adapta la sintaxis para que suene natural y publicable en español.'
  spanish_consistency_notes:
  - Se usó «Yahvé» por defecto en este proyecto cuando el texto lo requiera; este versículo no contiene el nombre divino.
  - Se prefirió «estopa» para נְעֹרֶת por su correspondencia tradicional y clara en español, sin perder la imagen de fibra seca y combustible.
  - Se evitó una traducción demasiado interpretativa de «el de la emboscada» para no borrar el posible valor colectivo del participio hebreo.
  - «Filisteos sobre ti» conserva el grito idiomático de alarma sin convertirlo en paráfrasis explicativa.
