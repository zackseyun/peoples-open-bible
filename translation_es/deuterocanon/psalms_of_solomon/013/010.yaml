review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien el sentido básico del griego: ἁμαρτωλοὶ = «pecadores», εἰς ἀπώλειαν = «a la destrucción», y la segunda cláusula comunica correctamente que no quedará recuerdo alguno de ellos. Sin embargo, «serán llevados a la destrucción» suena algo menos preciso que una formulación de remoción/pérdida, y «ya más» no es la opción más natural en español bíblico actual para ἔτι en esta construcción negativa.'
  spanish_quality_summary: El texto es comprensible y mayormente digno, pero tiene una aspereza de estilo en la colocación del marcador («serán [a] llevados») y una frase menos idiomática en «ya más memoria». «No se hallará más memoria de ellos» o «no se hallará ya memoria de ellos» suena más natural; además conviene anclar la nota al verbo completo.
  glossary_alignment: No hay términos del glosario maestro en conflicto. «Pecadores» alinea bien con ἁμαρτωλοὶ. No hay problemas de nombres divinos ni títulos mesiánicos. La decisión sobre μνημόσυνον como «memoria» es aceptable, aunque «recuerdo» o «memorial» podrían aparecer en nota si se quisiera; no es necesario para fidelidad mínima.
  issues:
  - severity: medium
    issue: «serán llevados a la destrucción» no es la mejor realización española de ἀρθήσονται en este contexto
    rationale: El griego pasivo de αἴρω expresa ser quitados/removidos/llevados. «Serán llevados» es posible, pero en español puede sonar demasiado físico o neutral. «Serán quitados para destrucción» sería más literal, pero menos natural; «serán llevados a la destrucción» es entendible, aunque conviene una pequeña mejora de fluidez y de anclaje de la nota.
  - severity: low
    issue: La nota [a] está insertada en una posición poco natural
    rationale: El marcador entre auxiliar y participio («serán [a] llevados») interrumpe la lectura. Debe ir tras la frase o palabra relevante completa.
  - severity: medium
    issue: «ya más» suena poco idiomático en este registro
    rationale: Para οὐχ ... ἔτι, el español natural aquí es «ya no» o «más». Dado que la cláusula ya contiene negación, «no se hallará más memoria de ellos» reproduce bien «no... any longer» sin forzar la sintaxis.
  revised_spanish_text: Pero los pecadores serán llevados[a] a la destrucción, y no se hallará más memoria de ellos.
  revised_footnotes:
  - marker: a
    text: O «serán tomados» / «serán removidos».
    reason: lexical_alternative
  revision_rationale: Se conserva la estructura y el sentido del borrador, pero se mejora la naturalidad española moviendo el marcador de nota al verbo completo y sustituyendo «ya más» por «más», que expresa de forma idiomática la negación continuada de ἔτι en esta cláusula. No se requiere una revisión mayor ni adjudicación adicional.
