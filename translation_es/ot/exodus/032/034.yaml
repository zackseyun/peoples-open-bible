  text: וְ/עַתָּ֞ה לֵ֣ךְ נְחֵ֣ה אֶת הָ/עָ֗ם אֶ֤ל אֲשֶׁר דִּבַּ֨רְתִּי֙ לָ֔/ךְ הִנֵּ֥ה מַלְאָכִ֖/י יֵלֵ֣ךְ לְ/פָנֶ֑י/ךָ וּ/בְ/י֣וֹם פָּקְדִ֔/י וּ/פָקַדְתִּ֥י עֲלֵי/הֶ֖ם חַטָּאתָֽ/ם׀־־׃
base_translation:
  language: en
  yaml_path: translation/ot/exodus/032/034.yaml
  text: But now go[a], lead the people to where I have spoken to you. Behold, my angel will go before you; but on the day when I punish[c][b], I will punish them for their sin.
  footnotes:
  - marker: a
    text: Or, more formally, 'to the place of which I have spoken to you.'
    reason: lexical_alternative
  - marker: b
    text: '''My angel'' could also be rendered ''my messenger''; the Hebrew term can denote either, though ''angel'' best fits this context.'
    reason: lexical_alternative
  - marker: c
    text: 'Hebrew repeats the verb פקד (''visit/attend/call to account''): literally, ''on the day of my visiting, I will visit upon them their sin.'''
    reason: lexical_alternative
