translation:
  language: es
  text: Y toda nación recta fue turbada[a], temiendo sus propias calamidades[b], y se prepararon para perecer[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «fue perturbada». El griego ἐταράχθη también puede traducirse como «fue trastornada» o «fue sacudida».
    reason: lexical_alternative
  - marker: b
    text: O «sus propios males» o «los desastres que les sobrevendrían». La frase τὰ ἑαυτῶν κακά se refiere a los daños o calamidades que temían que vinieran sobre ellos.
    reason: lexical_alternative
  - marker: c
    text: O «para ser destruidos». El infinitivo ἀπολέσθαι puede destacar tanto el perecer como el ser destruido.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐταράχθη
  english_pob_choice: was thrown into turmoil
  chosen_spanish: fue sumida en tumulto
  alternatives_spanish:
  - fue perturbada
  - fue turbada
  - fue sacudida
  lexicon: BDAG
  rationale: El pasivo de ταράσσω expresa agitación intensa. «Fue sumida en tumulto» conserva la fuerza del pasivo y la perturbación colectiva mejor que un simple «fue turbada».
- source_word: δίκαιον
  english_pob_choice: righteous
  chosen_spanish: justa
  alternatives_spanish:
  - recta
  - righteous (sin traducir)
  lexicon: BDAG
  rationale: Aquí δίκαιος puede entenderse como ‘justo’ o ‘righteous’. En español, «justa» mantiene la resonancia moral y la relación con la familia δικαιο-/justicia, sin sonar tan eclesiástico como «recta».
- source_word: πᾶν ἔθνος
  english_pob_choice: every ... nation
  chosen_spanish: toda nación
  alternatives_spanish:
  - cada nación
  - todos los pueblos
  - toda gente
  lexicon: BDAG
  rationale: La construcción singular con πᾶν se vierte naturalmente como «toda nación». «Toda» preserva el alcance distributivo y «nación» reproduce el valor básico de ἔθνος.
- source_word: φοβούμενοι
  english_pob_choice: fearing
  chosen_spanish: temiendo
  alternatives_spanish:
  - con temor de
  - al temer
  lexicon: BDAG
  rationale: El participio expresa la circunstancia o motivo de la agitación. «Temiendo» es natural en español y conserva el vínculo causal con lo anterior.
- source_word: τὰ ἑαυτῶν κακά
  english_pob_choice: their own calamities
  chosen_spanish: sus propias calamidades
  alternatives_spanish:
  - sus propios males
  - los males que les sobrevendrían
  - sus desgracias
  lexicon: BDAG
  rationale: κακά aquí apunta a males o desastres que amenazan. «Calamidades» comunica con claridad la idea de ruina inminente sin reducirla a simple ‘males’ genéricos.
- source_word: ἡτοιμάσθησαν
  english_pob_choice: they prepared
  chosen_spanish: se prepararon
  alternatives_spanish:
  - se dispusieron
  - se aprestaron
  - se hicieron listos
  lexicon: BDAG
  rationale: 'La forma aorista funciona de modo intransitivo/reflexivo: se hicieron listos o se prepararon. «Se prepararon» es breve, idiomático y fiel al matiz.'
- source_word: ἀπολέσθαι
  english_pob_choice: to perish
  chosen_spanish: para perecer
  alternatives_spanish:
  - para ser destruidos
  - para morir
  - para perder la vida
  lexicon: BDAG
  rationale: El infinitivo medio puede expresar ‘perecer’ o ‘ser destruido’. «Perecer» mantiene la gravedad y deja abierta la amplitud semántica del griego.
theological_decisions:
- issue: Matiz de δίκαιον en relación con la nación afectada
  english_pob_reading: moral-religious 'righteous'
  chosen_spanish_reading: «justa» con peso moral y relacional
  alternative_spanish_readings:
  - «recta»
  - «righteous» no traducido
  - «inocente»
  rationale: La POB inglesa preserva el peso moral de δίκαιος sin reducirlo a legalidad. En español, «justa» comunica ese campo semántico y mantiene la conexión con justicia/rectitud sin forzar una paráfrasis.
  doctrine_reference: 'DOCTRINE.md: los términos de la familia δικαιο- deben conservar su peso teológico y no aplastarse en un sentido meramente legal.'
translation_notes:
  revision_awareness: 'El borrador sigue de cerca la lectura auditada del inglés POB y mantiene sus tres tensiones léxicas principales: ἐταράχθη/ταράσσω, δίκαιον/δίκαιος y ἀπολέσθαι. No se detectaron revisiones posteriores que alteren el sentido base; por eso la traducción conserva el mismo perfil semántico, adaptado a un español natural y publicable.'
  spanish_consistency_notes:
  - Se usó «Yahvé» solo cuando el texto fuente lo requiera; este versículo no contiene el nombre divino.
  - Se mantuvo «justa» para δίκαιον y no se sustituyó por una formulación eclesiástica más libre.
  - «Perecer» se eligió para conservar la ambigüedad entre muerte y destrucción, como en la nota inglesa.
  - El orden sintáctico sigue el griego y la POB inglesa, pero con ajuste a la fluidez normal del español.
