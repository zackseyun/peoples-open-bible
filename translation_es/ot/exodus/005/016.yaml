translation:
  language: es
  text: 'No se da paja a tus siervos, y nos dicen: «¡Hagan ladrillos!». Y he aquí, tus siervos son golpeados, pero la culpa es de tu propio pueblo.[a]'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, más formalmente: «y tu pueblo ha pecado». La cláusula hebrea está condensada y puede traducirse más literalmente de ese modo, pero en contexto probablemente indica que la culpa recae sobre la gente del faraón.'
    reason: lexical_alternative
lexical_decisions:
- source_word: תֶּבֶן
  english_pob_choice: straw
  chosen_spanish: paja
  alternatives_spanish:
  - rastrojo
  - paja cortada
  lexicon: HALOT
  rationale: En el contexto de fabricación de ladrillos, la equivalencia natural en español es 'paja'. Aunque 'rastrojo' o 'paja cortada' pueden precisar el material, 'paja' comunica con claridad el insumo que faltaba sin introducir una especificación no requerida por el texto.
- source_word: אֵין נִתָּן
  english_pob_choice: is given
  chosen_spanish: no se da
  alternatives_spanish:
  - no se está dando
  - no ha sido dada
  lexicon: HALOT
  rationale: La construcción negativa con pasivo expresa ausencia de suministro. 'No se da' conserva la impersonalidad del hebreo y suena natural en español; 'no se está dando' enfatiza el proceso, pero resulta algo más pesado.
- source_word: לַעֲבָדֶיךָ / עֲבָדֶיךָ
  english_pob_choice: your servants
  chosen_spanish: tus esclavos
  alternatives_spanish:
  - tus siervos
  - tus servidores
  lexicon: HALOT
  rationale: Aunque el inglés POB opta por 'servants' por la cortesía del discurso, el hebreo עֲבָדֶיךָ en este marco de opresión tiene fuerza de subordinación real. 'Esclavos' preserva mejor la carga social del pasaje; 'siervos' suavizaría indebidamente la relación de dominio.
- source_word: לְבֵנִים
  english_pob_choice: bricks
  chosen_spanish: ladrillos
  alternatives_spanish:
  - adobes
  - ladrillos de barro
  lexicon: HALOT
  rationale: '''Ladrillos'' es el equivalente directo y natural en español. ''Adobes'' o ''ladrillos de barro'' podrían ser más técnicos, pero el texto simplemente exige la producción de ladrillos.'
- source_word: אֹמְרִים לָנוּ עֲשׂוּ
  english_pob_choice: they say to us, ‘Make bricks!’
  chosen_spanish: 'dicen a nosotros: «¡Hagan ladrillos!»'
  alternatives_spanish:
  - 'nos dicen: «¡Hagan ladrillos!»'
  - 'nos ordenan: «¡Hagan ladrillos!»'
  lexicon: HALOT
  rationale: El hebreo presenta discurso directo con imperativo. Mantener 'dicen a nosotros' reproduce el valor sintáctico básico; en español, 'nos dicen' sería más idiomático, pero aquí se conserva la proximidad al original sin perder claridad. Se explicita 'ladrillos' para resolver la elipsis del mandato.
- source_word: וְהִנֵּה
  english_pob_choice: behold
  chosen_spanish: Y he aquí
  alternatives_spanish:
  - Y mira
  - Y behold
  lexicon: HALOT
  rationale: La partícula introduce una apelación enfática a lo evidente. 'Y he aquí' mantiene un registro digno y bíblico en español, análogo al 'behold' del POB inglés, sin caer en un calco ajeno al español contemporáneo.
- source_word: מֻכִּים
  english_pob_choice: are being beaten
  chosen_spanish: son golpeados
  alternatives_spanish:
  - están siendo golpeados
  - son azotados
  lexicon: HALOT
  rationale: El participio pasivo comunica que reciben violencia. 'Son golpeados' es claro y suficientemente fuerte; 'están siendo golpeados' enfatiza la acción en curso, pero en español suena más perifrástico. 'Azotados' sería más específico, pero el hebreo es más general.
- source_word: וְחָטָאת עַמֶּךָ
  english_pob_choice: but the fault is with your own people
  chosen_spanish: pero la culpa está sobre tu propio pueblo
  alternatives_spanish:
  - pero tu pueblo ha pecado
  - pero tu propio pueblo es culpable
  lexicon: HALOT
  rationale: La cláusula es comprimida y admite una tensión entre una traducción más literal ('tu pueblo ha pecado') y la fuerza contextual de atribuir responsabilidad a los egipcios. 'La culpa está sobre tu propio pueblo' conserva la imputación de responsabilidad sin forzar una formulación doctrinalmente más pesada.
theological_decisions:
- issue: Responsabilidad implícita en וְחָטָאת עַמֶּךָ
  english_pob_reading: but the fault is with your own people
  chosen_spanish_reading: pero la culpa está sobre tu propio pueblo
  alternative_spanish_readings:
  - pero tu pueblo ha pecado
  - pero tu propio pueblo es culpable
  rationale: El hebreo es sintético y admite una lectura más literal ('tu pueblo ha pecado'), pero el contexto del reclamo apunta a la culpabilidad de los capataces y funcionarios de Faraón, no del pueblo israelita. La redacción escogida preserva esa imputación contextual sin borrar la ambigüedad gramatical del hebreo.
  doctrine_reference: Éxodo 5:16; POB note on contextual blame rather than a wooden literalization
- issue: Registro reverencial de וְהִנֵּה
  english_pob_reading: behold
  chosen_spanish_reading: Y he aquí
  alternative_spanish_readings:
  - Y mira
  - Y he aquí, observa
  rationale: La partícula no introduce una doctrina, pero sí una intensificación retórica. 'Y he aquí' conserva el tono solemne del texto y la función de señalar lo evidente en la denuncia.
  doctrine_reference: Uso discursivo de הִנֵּה en narrativa hebrea
translation_notes:
  revision_awareness: Esta redacción sigue de cerca el texto hebreo WLC y toma en cuenta la auditoría inglesa del POB, especialmente la decisión revisada de usar un equivalente más solemne para הִנֵּה y la nota contextual sobre וְחָטָאת עַמֶּךָ. Frente al inglés, se ha preservado el contraste discursivo y se ha ajustado 'servants' a 'esclavos' para reflejar mejor la carga semántica del hebreo en este pasaje de opresión.
  spanish_consistency_notes:
  - Se mantiene 'Y he aquí' para reflejar el tono de הִנֵּה de forma consistente con el registro bíblico del proyecto.
  - Se usa 'ladrillos' para לְבֵנִים por claridad y naturalidad en español.
  - Se eligió 'esclavos' para עֲבָדֶיךָ por la fuerza contextual de subordinación, aunque el inglés POB suaviza con 'servants'.
  - La nota a pie conserva la alternativa literal y la lectura contextual, sin borrar la tensión del hebreo comprimido.
