translation:
  language: es
  text: 'Ahora bien, dime: ¿debajo de qué árbol los sorprendiste hablando uno con otro? Y él respondió: «Debajo de una encina»[a].'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O simplemente, «roble». El griego nombra una clase específica de roble (πρῖνος), y se conserva la traducción más precisa en el texto principal porque en la interrogación de Daniel importa el árbol exacto.
    reason: lexical_alternative
lexical_decisions:
- source_word: νῦν οὖν
  english_pob_choice: Now then
  chosen_spanish: Ahora pues
  alternatives_spanish:
  - Pues ahora
  - Ahora entonces
  lexicon: LSJ
  rationale: La combinación griega marca transición lógica e inmediata. «Ahora pues» conserva ese valor inferencial y mantiene un tono natural y digno en español.
- source_word: λέγε μοι
  english_pob_choice: tell me
  chosen_spanish: dime
  alternatives_spanish:
  - háblame
  - dime a mí
  lexicon: LSJ
  rationale: Es una petición directa de respuesta. «Dime» reproduce mejor la naturalidad imperativa que un giro más literal como «di a mí».
- source_word: Ὑπὸ τί δένδρον
  english_pob_choice: under what tree
  chosen_spanish: debajo de qué árbol
  alternatives_spanish:
  - bajo qué árbol
  - bajo cuál árbol
  lexicon: LSJ
  rationale: La pregunta pide identificar un árbol concreto. «Debajo de qué árbol» es claro y conserva la estructura interrogativa sin rigidez innecesaria.
- source_word: κατέλαβες
  english_pob_choice: did you catch
  chosen_spanish: los sorprendiste
  alternatives_spanish:
  - los atrapaste
  - los hallaste
  lexicon: LSJ
  rationale: En este contexto judicial, el verbo indica haberlos encontrado en el acto. «Los sorprendiste» preserva la idea de captarlos mientras hacían algo, sin introducir fuerza física indebida.
- source_word: ὁμιλοῦντας
  english_pob_choice: talking
  chosen_spanish: hablando
  alternatives_spanish:
  - conversando
  - platicando
  lexicon: LSJ
  rationale: El participio describe que estaban en conversación. «Hablando» es el equivalente más natural y directo en español.
- source_word: ἀλλήλοις
  english_pob_choice: with one another
  chosen_spanish: uno con otro
  alternatives_spanish:
  - entre sí
  - el uno con el otro
  lexicon: LSJ
  rationale: El pronombre recíproco expresa interacción mutua. «Uno con otro» conserva esa reciprocidad de forma clara y idiomática.
- source_word: πρῖνον
  english_pob_choice: holm oak
  chosen_spanish: encina
  alternatives_spanish:
  - roble
  - árbol de encina
  lexicon: LSJ
  rationale: El griego designa una especie concreta de roble. En español, «encina» comunica bien la idea de un árbol específico de esa clase; puede entenderse como la opción más natural y precisa para lectores generales.
translation_notes:
  revision_awareness: El texto griego presenta alta concordancia con el extracto normalizado; no se requieren revisiones textuales ni ajustes por variantes en este versículo.
