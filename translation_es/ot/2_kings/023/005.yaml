translation:
  language: es
  text: Y él hizo cesar a los sacerdotes[a] que los reyes de Judá habían nombrado para quemar incienso en los lugares altos, en las ciudades de Judá y alrededor de Jerusalén[b], y también a los que quemaban incienso a Baal, al sol, a la luna, a las constelaciones[c] y a todo el ejército de los cielos[d].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «los sacerdotes paganos». El término hebreo se refiere a sacerdotes vinculados con culto ilegítimo o idolátrico, no a los sacerdotes legítimos de Yahvé.
    reason: lexical_alternative
  - marker: b
    text: O «en los alrededores de Jerusalén». El hebreo indica las zonas circundantes.
    reason: lexical_alternative
  - marker: c
    text: O «a los signos del zodíaco». El término hebreo probablemente se refiere a constelaciones o agrupaciones astrales.
    reason: lexical_alternative
  - marker: d
    text: 'Hebreo: «el ejército de los cielos»; también puede leerse «la hueste celestial». Aquí alude a los cuerpos celestes venerados en el culto astral.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהִשְׁבִּ֣ית
  english_pob_choice: he put an end to
  chosen_spanish: puso fin a
  alternatives_spanish:
  - abolíó
  - hizo cesar
  - eliminó
  lexicon: HALOT
  rationale: El hifil de שׁבת indica causar que algo cese. «Puso fin a» conserva bien el valor causativo sin añadir una connotación administrativa o jurídica más fuerte que el hebreo.
- source_word: הַכְּמָרִ֗ים
  english_pob_choice: the priests
  chosen_spanish: los sacerdotes
  alternatives_spanish:
  - los sacerdotes idólatras
  - los sacerdotes paganos
  lexicon: HALOT
  rationale: El término hebreo designa funcionarios cultuales vinculados aquí al culto ilegítimo, pero la revisión inglesa retiró el calificativo interpretativo. En español, «sacerdotes» mantiene la neutralidad del texto base y deja que el contexto de Josías indique su carácter ilícito.
- source_word: אֲשֶׁ֤ר נָֽתְנוּ֙ מַלְכֵ֣י יְהוּדָ֔ה
  english_pob_choice: whom the kings of Judah had appointed
  chosen_spanish: que los reyes de Judá habían nombrado
  alternatives_spanish:
  - que los reyes de Judá habían establecido
  - que los reyes de Judá habían puesto
  lexicon: HALOT
  rationale: נָתַן en esta construcción significa instalar o nombrar para un cargo. «Habían nombrado» comunica con naturalidad la acción previa en relación con la reforma de Josías.
- source_word: וַ/יְקַטֵּ֤ר
  english_pob_choice: to burn incense
  chosen_spanish: quemar incienso
  alternatives_spanish:
  - ofrecer incienso
  - hacer humo de incienso
  lexicon: HALOT
  rationale: קטר se refiere aquí a quemar incienso. «Quemar incienso» es la expresión natural y precisa en español religioso.
- source_word: בַּ/בָּמוֹת֙
  english_pob_choice: at the high places
  chosen_spanish: en los lugares altos
  alternatives_spanish:
  - en los altos
  - en los santuarios altos
  lexicon: HALOT
  rationale: «Lugares altos» es la traducción habitual y fiel de בָּמוֹת. Conserva el sentido cultual específico sin reinterpretarlo como una simple elevación geográfica.
- source_word: בְּ/עָרֵ֣י יְהוּדָ֔ה וּ/מְסִבֵּ֖י יְרוּשָׁלִָ֑ם
  english_pob_choice: in the cities of Judah and around Jerusalem
  chosen_spanish: en las ciudades de Judá y alrededor de Jerusalén
  alternatives_spanish:
  - en las ciudades de Judá y en los alrededores de Jerusalén
  - en las ciudades de Judá y en torno a Jerusalén
  lexicon: HALOT
  rationale: מְסִבֵּי expresa lo que rodea o circunda. «Alrededor de Jerusalén» es breve, natural y conserva la imagen espacial del hebreo.
- source_word: וְ/אֶת הַֽ/מְקַטְּרִ֣ים
  english_pob_choice: and also those who burned incense
  chosen_spanish: y también a los que quemaban incienso
  alternatives_spanish:
  - y también a los que ofrecían incienso
  - y también a quienes quemaban incienso
  lexicon: HALOT
  rationale: El participio añade otro grupo caracterizado por esa práctica. «Y también a los que quemaban incienso» refleja la coordinación con el objeto anterior y el matiz de grupo continuado.
- source_word: לַ/בַּ֗עַל
  english_pob_choice: to Baal
  chosen_spanish: a Baal
  alternatives_spanish:
  - para Baal
  - a el Baal
  lexicon: HALOT
  rationale: Baal es nombre propio de la deidad; en español culto y bíblico, «a Baal» es la forma más directa y estable.
- source_word: לַ/שֶּׁ֤מֶשׁ וְ/לַ/יָּרֵ֨חַ֙
  english_pob_choice: to the sun, to the moon
  chosen_spanish: al sol, a la luna
  alternatives_spanish:
  - al sol y a la luna
  - al sol, y a la luna
  lexicon: HALOT
  rationale: El hebreo repite la preposición, marcando objetos de culto separados. Mantener «al sol, a la luna» conserva esa lista cultual y su cadencia.
- source_word: וְ/לַ/מַּזָּל֔וֹת
  english_pob_choice: to the constellations
  chosen_spanish: a las constelaciones
  alternatives_spanish:
  - a los signos del zodíaco
  - a las estrellas
  lexicon: HALOT
  rationale: מַזָּלוֹת probablemente alude a constelaciones o agrupaciones astrales. «Constelaciones» es claro y no sobreespecifica el referente antiguo.
- source_word: וּ/לְ/כֹ֖ל צְבָ֥א הַ/שָּׁמָֽיִם
  english_pob_choice: and to all the host of the heavens
  chosen_spanish: y a todo el ejército de los cielos
  alternatives_spanish:
  - y a todo el ejército del cielo
  - y a toda la hueste celestial
  lexicon: HALOT
  rationale: צְבָא הַשָּׁמַיִם es una expresión fija para los cuerpos celestes concebidos como un conjunto. «Ejército de los cielos» conserva la metáfora bíblica y su resonancia tradicional en español.
theological_decisions:
- issue: Cómo renderizar הַכְּמָרִים sin introducir una etiqueta interpretativa ausente del texto revisado en inglés
  english_pob_reading: the priests
  chosen_spanish_reading: los sacerdotes
  alternative_spanish_readings:
  - los sacerdotes idólatras
  - los sacerdotes paganos
  rationale: La revisión inglesa retiró «idolatrous» por considerarlo interpretativo. En español, mantener solo «sacerdotes» respeta esa decisión y evita cerrar prematuramente la tensión semántica; el contexto narrativo de la reforma de Josías ya muestra que se trata de un culto ilegítimo.
  doctrine_reference: 2 Reyes 23; reforma de Josías y distinción entre culto legítimo e ilegítimo
- issue: Cómo traducir צְבָא הַשָּׁמַיִם sin perder la imagen bíblica y sin banalizarla como simple astronomía
  english_pob_reading: the host of the heavens
  chosen_spanish_reading: el ejército de los cielos
  alternative_spanish_readings:
  - la hueste celestial
  - el ejército del cielo
  rationale: «Ejército de los cielos» reproduce la metáfora del hebreo y mantiene la referencia al culto astral denunciado por el pasaje. En español es una fórmula bíblica comprensible y suficientemente solemne.
  doctrine_reference: Deuteronomio 4:19; 2 Reyes 21:3-5; 23:5
translation_notes:
  revision_awareness: He seguido la revisión inglesa más reciente al no calificar explícitamente a הַכְּמָרִים como «idólatras». También he preservado la lista cultual y el matiz del culto astral, incluyendo la metáfora «ejército de los cielos» en lugar de normalizarla como simple referencia astronómica.
  spanish_consistency_notes:
  - «Yahvé» no aparece en este versículo, por lo que no se requiere decisión sobre el nombre divino.
  - He mantenido «Baal» sin artículos o glosas adicionales para conservar el nombre propio y la estructura de lista del hebreo.
  - He usado «quemar incienso» de modo uniforme para קטר, siguiendo la decisión léxica del audit trail inglés.
  - La frase «alrededor de Jerusalén» lleva nota porque el español permite una alternativa natural en plural («alrededores»), pero la forma elegida es más breve y fiel al hebreo.
  - No se ha introducido vocabulario de interpretación doctrinal que no esté sostenido por el contexto inmediato o por la revisión inglesa.
