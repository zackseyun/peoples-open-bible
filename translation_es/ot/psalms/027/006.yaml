source:
  edition: WLC
  text: וְ/עַתָּ֨ה יָר֪וּם רֹאשִׁ֡/י עַ֤ל אֹֽיְבַ֬/י סְֽבִיבוֹתַ֗/י וְ/אֶזְבְּחָ֣ה בְ֭/אָהֳל/וֹ זִבְחֵ֣י תְרוּעָ֑ה אָשִׁ֥ירָה וַ֝/אֲזַמְּרָ֗ה לַ/יהוָֽה׃
base_translation:
  language: en
  yaml_path: translation/ot/psalms/027/006.yaml
  text: And now my head will be lifted up above my enemies around me[a], and I will offer in his tent sacrifices of joyful shouting; I will sing, yes[b], I will make music to Yahweh.
  footnotes:
  - marker: a
    text: Or 'sacrifices with shouts of joy.' The Hebrew phrase can emphasize either the character of the sacrifices or the accompanying acclamation.
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'in his tent'; the pronoun most naturally refers to the LORD.
    reason: alternative_reading
  ai_draft:
    model_id: gpt-5.4
    model_version: gpt-5.4-2026-03-05
