translation:
  language: es
  text: Así murió allí Moisés, siervo de Yahvé, en la tierra de Moab[a], conforme a la palabra de Yahvé.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literalmente, 'sobre la boca de Yahvé'; el modismo también puede entenderse como 'por mandato de Yahvé'.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּמָת
  english_pob_choice: died
  chosen_spanish: murió
  alternatives_spanish:
  - y murió
  - así murió
  lexicon: HALOT
  rationale: La forma narrativa waw-consecutiva introduce el siguiente evento; en español, el pasado simple comunica de manera natural y fiel la secuencia. 'Murió' conserva el sentido básico de מות sin añadir matices ausentes en el hebreo.
- source_word: שָׁם
  english_pob_choice: there
  chosen_spanish: allí
  alternatives_spanish:
  - ahí
  - allá
  lexicon: HALOT
  rationale: El adverbio retoma el lugar mencionado previamente. 'Allí' preserva la referencia deíctica con registro natural y digno.
- source_word: מֹשֶׁה
  english_pob_choice: Moses
  chosen_spanish: Moisés
  lexicon: uso propio bíblico estándar
  rationale: Nombre propio bíblico establecido en español.
- source_word: עֶבֶד יְהוָה
  english_pob_choice: the servant of Yahweh
  chosen_spanish: el esclavo de Yahvé
  alternatives_spanish:
  - el siervo de Yahvé
  lexicon: HALOT
  rationale: La POB inglesa preserva la fuerza léxica de עֶבֶד; por coherencia con la política terminológica del proyecto, 'esclavo' mantiene el valor básico del término y evita suavizarlo a 'siervo'. El contexto honorífico de Moisés sigue siendo compatible con ese lexema, y la ambivalencia servidor/esclavo no se borra.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  lexicon: convención del proyecto
  rationale: Se conserva el nombre divino en transliteración según el estándar español del proyecto, en lugar de sustituirlo por 'SEÑOR'.
- source_word: בְּאֶרֶץ מוֹאָב
  english_pob_choice: in the land of Moab
  chosen_spanish: en la tierra de Moab
  alternatives_spanish:
  - en la tierra de Moabita
  - en Moab
  lexicon: HALOT
  rationale: '''Tierra'' reproduce fielmente la construcción hebrea y mantiene la referencia geográfica explícita. ''Moab'' se conserva como nombre de región/pueblo sin alterar la sintaxis.'
- source_word: עַל פִּי יְהוָה
  english_pob_choice: according to the word of Yahweh
  chosen_spanish: conforme a la palabra de Yahvé
  alternatives_spanish:
  - según la palabra de Yahvé
  - por mandato de Yahvé
  - 'literalmente: sobre la boca de Yahvé'
  lexicon: HALOT
  rationale: La POB inglesa opta por el sentido idiomático del hebreo. En español, 'conforme a la palabra de Yahvé' preserva la idea normativa de la expresión y suena natural. Se mantiene la tensión entre la lectura idiomática y la imaginería literal sin imponer una sola paráfrasis.
theological_decisions:
- issue: Nombre divino יהוה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - Yahweh
  rationale: El versículo usa explícitamente el Tetragrama. El proyecto pide mantener el nombre divino en transliteración; en español, 'Yahvé' es la forma preferida por la convención del proyecto y preserva la identidad personal del Dios del pacto.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Valor de עֶבֶד aplicado a Moisés
  english_pob_reading: servant
  chosen_spanish_reading: esclavo
  alternative_spanish_readings:
  - siervo
  - servidor
  rationale: Aunque el contexto es honorífico, la POB inglesa conservó la carga léxica de 'slave'. En español, 'esclavo' es la equivalencia más directa para עֶבֶד y evita desdibujar la fuerza semántica del término; el honor se deriva del contexto narrativo, no de suavizar la palabra.
  doctrine_reference: DOCTRINE.md Translation philosophy §1; Contested terms on δοῦλος/servant-slave context dependence (applied analogically to Hebrew עֶבֶד)
- issue: Expresión עַל פִּי יְהוָה
  english_pob_reading: according to the word of Yahweh
  chosen_spanish_reading: conforme a la palabra de Yahvé
  alternative_spanish_readings:
  - por mandato de Yahvé
  - según la palabra de Yahvé
  - 'literalmente: sobre la boca de Yahvé'
  rationale: La lectura idiomática evita una literalidad extraña en español, pero no borra el trasfondo hebreo de 'sobre la boca'. Se conserva el sentido de autoridad/mandato sin introducir una traducción más interpretativa que la inglesa.
  doctrine_reference: DOCTRINE.md Translation philosophy §2 sobre idiomatismo controlado
translation_notes:
  revision_awareness: 'El texto inglés revisado eliminó una coma innecesaria tras ''Moses'' y mantuvo intacto el sentido. La versión española sigue esa misma lectura fluida, sin coma tras ''Moisés'', y conserva todos los elementos semánticos del hebreo: muerte, lugar, título de Moisés, nombre divino y el modismo final.'
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' de forma uniforme para יהוה.
  - Se conserva 'esclavo' en línea con la preferencia terminológica del proyecto cuando el contexto no exige suavizar el término.
  - '''Tierra de Moab'' reproduce la estructura constructa del hebreo con claridad natural en español.'
  - La nota al pie marca la alternativa idiomática del cierre sin desplazar la traducción principal.
