revisions:
- from: ¡Ay de los que descienden a Egipto para ayuda[a], que se apoyan en caballos y confían en carros porque son muchos, y en jinetes porque son muy fuertes[b], pero no miran al Santo de Israel ni buscan a Yahvé[c]!
  to: ¡Ay de los que descienden a Egipto en busca de ayuda, que se apoyan[a] en caballos y confían en carros porque son muchos, y en jinetes porque son muy fuertes[b], pero no miran al Santo de Israel ni buscan a Yahvé[c]!
  rationale: 'Se corrigen dos problemas de fidelidad editorial en las notas: el anclaje de [a] ahora corresponde al verbo שׁען, y [c] explica con precisión la relación entre יְהוָה/YHWH y la traducción «Yahvé». Además, se mejora la naturalidad de «para ayuda» a «en busca de ayuda» sin alterar el sentido fuente.'
