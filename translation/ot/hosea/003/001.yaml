theological_decisions:
- issue: Identity of the woman in Hosea's enacted sign
  chosen_reading: Render the phrase generically as 'a woman' rather than explicitly identifying her as Gomer in the translation.
  alternative_readings:
  - Render as 'your wife' or otherwise imply a return to Gomer
  rationale: The Hebrew of this verse does not explicitly name Gomer or say 'your wife.' Since interpreters differ on whether Hosea is commanded to return to Gomer or to love another symbolic woman, the translation preserves the text's own level of specificity and does not resolve the debate in the main text.
  doctrine_reference: Preserve theological tension rather than resolve it.
- issue: Concessive force of Israel's apostasy in relation to the LORD's love
  chosen_reading: Use 'though they turn to other gods' to express the contrast.
  alternative_readings:
  - Use a simple coordinate 'and they turn to other gods'
  rationale: The comparison highlights the striking contrast between the LORD's covenant love and Israel's infidelity. The concessive English rendering makes explicit what is strongly implied by the Hebrew discourse relation without adding new doctrinal content.
  doctrine_reference: Optimal equivalence; preserve source meaning in readable modern English.
