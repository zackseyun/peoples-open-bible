base_translation:
  language: en
  yaml_path: translation/ot/jeremiah/015/001.yaml
  text: Then Yahweh said to me[a], “Even if Moses and Samuel were to stand before me, my soul would not be toward this people. Send them away from before me[b], and let them go out.”
  footnotes:
