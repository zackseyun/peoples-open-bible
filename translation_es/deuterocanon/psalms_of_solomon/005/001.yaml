translation:
  language: es
  text: Oh Señor Dios, alabaré tu nombre con júbilo, en medio de los que conocen[a] tus juicios justos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «los que entienden tus juicios justos».
    reason: lexical_alternative
lexical_decisions:
- source_word: Κύριε
  english_pob_choice: Lord
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Señor
  - Soberano
  lexicon: BDAG
  rationale: En este contexto de invocación directa, el griego κύριε corresponde a la dirección a Dios. Dado el estándar del proyecto para יהוה/YHWH, la forma española base es «Yahvé», manteniendo la apelación reverente sin enmascarar el nombre divino.
- source_word: ὁ θεός
  english_pob_choice: God
  chosen_spanish: Dios
  alternatives_spanish:
  - el Dios
  lexicon: BDAG
  rationale: 'Aposición en vocativo: «Yahvé Dios». «Dios» comunica de forma natural y fiel el título divino en español.'
- source_word: αἰνέσω
  english_pob_choice: I will praise
  chosen_spanish: alabaré
  alternatives_spanish:
  - te alabaré
  - cantaré alabanzas
  lexicon: BDAG
  rationale: El futuro expresa resolución del hablante. «Alabaré» conserva el sentido declarativo y el registro bíblico sin sonar forzado en español.
- source_word: τῷ ὀνόματί σου
  english_pob_choice: your name
  chosen_spanish: tu nombre
  alternatives_spanish:
  - tu nombre revelado
  - tu nombre
  lexicon: BDAG
  rationale: Se conserva el modismo bíblico normal de «nombre» como referencia a la persona, fama y revelación de Dios.
- source_word: ἐν ἀγαλλιάσει
  english_pob_choice: with exultation
  chosen_spanish: con júbilo
  alternatives_spanish:
  - con exultación
  - con regocijo
  lexicon: BDAG
  rationale: «Júbilo» reproduce bien la intensidad gozosa de ἀγαλλίασις en un español culto y claro; «exultación» sería más literal pero menos natural.
- source_word: ἐν μέσῳ
  english_pob_choice: in the midst of
  chosen_spanish: en medio de
  alternatives_spanish:
  - entre
  - en medio de
  lexicon: BDAG
  rationale: La frase mantiene el valor locativo/comunitario del griego con una equivalencia directa y idiomática.
- source_word: ἐπισταμένων
  english_pob_choice: those who know
  chosen_spanish: los que conocen
  alternatives_spanish:
  - los que entienden
  - los que están familiarizados con
  lexicon: BDAG
  rationale: El participio de ἐπίσταμαι puede abarcar conocer/entender. «Los que conocen» preserva la amplitud semántica y mantiene el paralelismo con la nota alternativa inglesa.
- source_word: τὰ κρίματά σου
  english_pob_choice: your judgments
  chosen_spanish: tus juicios
  alternatives_spanish:
  - tus sentencias
  - tus decretos
  lexicon: BDAG
  rationale: «Juicios» retiene el campo semántico judicial del sustantivo κρίματα y su resonancia bíblica. «Sentencias» o «decretos» estrecharían o desplazarían el sentido.
- source_word: τὰ δίκαια
  english_pob_choice: righteous
  chosen_spanish: justos
  alternatives_spanish:
  - rectos
  - righteous
  lexicon: BDAG
  rationale: 'Se aplica al sustantivo precedente: «juicios justos». En español, «justos» es la forma más directa y comprensible para expresar el valor moral/legal de δίκαια.'
theological_decisions:
- issue: Tratamiento del nombre divino al inicio del versículo
  english_pob_reading: O Lord God
  chosen_spanish_reading: Oh Yahvé Dios
  alternative_spanish_readings:
  - Oh Señor Dios
  - Oh Dios Yahvé
  rationale: El griego tiene Κύριε ὁ θεός, pero el proyecto pide no ocultar יהוה/YHWH bajo una convención de máscara. Como aquí la invocación es a Dios en lenguaje de oración, se conserva la dirección reverente y se usa «Yahvé» como equivalente de nombre divino del proyecto, seguido de «Dios» como aposición.
  doctrine_reference: Éxodo 3:15; Salmo 83:18; convención editorial POB sobre יהוה/YHWH
- issue: Sentido de κρίματα δίκαια
  english_pob_reading: your righteous judgments
  chosen_spanish_reading: tus juicios justos
  alternative_spanish_readings:
  - tus justos juicios
  - tus decisiones justas
  rationale: La combinación mantiene la dimensión judicial y moral sin desdibujar la fuerza del término griego. «Juicios justos» conserva el paralelismo y evita reducir κρίματα a simples 'decretos'.
  doctrine_reference: Salmos 19:9; Salmos 119:137; Romanos 2:5
translation_notes:
  revision_awareness: El texto griego y la auditoría inglesa presentan alta concordancia y no requieren cambios textuales; la principal decisión española es la representación del vocativo divino conforme a la convención del proyecto y la selección de un equivalente natural para ἐν ἀγαλλιάσει.
  spanish_consistency_notes:
  - Se conserva el tono de oración directa y la sintaxis breve del original.
  - «Juicios justos» mantiene el paralelismo semántico de κρίματα τὰ δίκαια sin añadir explicación interpretativa.
  - La puntuación española sigue una sola cláusula principal con incisos preposicionales, como en el griego.
