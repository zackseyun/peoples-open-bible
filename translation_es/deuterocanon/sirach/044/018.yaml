translation:
  language: es
  text: Se hizo con él un pacto perpetuo, para que no fuera destruida toda carne[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Griego: «para que no fuera borrada toda carne por un diluvio». Esto hace explícito el marco del diluvio de Noé.'
    reason: alternative_reading
lexical_decisions:
- source_word: באות עולם
  english_pob_choice: an everlasting covenant
  chosen_spanish: un pacto perpetuo
  alternatives_spanish:
  - un pacto eterno
  - un pacto de eternidad
  lexicon: HALOT
  rationale: «באות עולם» expresa duración continua; en español, «pacto perpetuo» conserva la fuerza durativa y el peso pactual sin sonar artificial. «Eterno» también es posible, pero «perpetuo» refleja bien el matiz de continuidad documentado por el hebreo.
- source_word: נכרת עמו
  english_pob_choice: was cut with him
  chosen_spanish: se estableció con él
  alternatives_spanish:
  - fue cortado con él
  - se hizo con él
  lexicon: HALOT
  rationale: El hebreo usa el idiomático כרת para pactos, literalmente «cortar». En español, una calca como «fue cortado con él» sería poco natural; «se estableció con él» conserva el hecho pactal de forma clara y digna, sin perder la relación de pacto documentada por la fuente.
- source_word: לבלתי השחית
  english_pob_choice: that all flesh might not be destroyed
  chosen_spanish: para que no fuera destruida
  alternatives_spanish:
  - a fin de que no fuera destruida
  - para no destruir
  lexicon: HALOT
  rationale: La cláusula de propósito se expresa de manera natural con «para que no». El verbo hebreo indica destrucción; «fuera destruida» mantiene esa voz pasiva y el valor resultativo del original.
- source_word: כל בשר
  english_pob_choice: all flesh
  chosen_spanish: toda carne
  alternatives_spanish:
  - todo ser viviente
  - toda la humanidad
  lexicon: HALOT
  rationale: Se preserva la expresión bíblica «carne» porque el texto hebreo la emplea y porque, en el contexto del diluvio, abarca a la creación viviente en general. «Toda carne» conserva mejor la textura de la fuente que una paráfrasis explicativa.
theological_decisions:
- issue: Si explicitar o no el diluvio en el texto principal a partir del griego
  english_pob_reading: Keep the Hebrew's broader wording in the main text without naming the flood explicitly; note the Greek specifies being blotted out by a flood.
  chosen_spanish_reading: Mantener en el texto principal la formulación hebrea amplia, sin nombrar el diluvio; explicitarlo solo en nota.
  alternative_spanish_readings:
  - para que no fuera destruida toda carne por un diluvio
  - para que no fuera borrada toda carne por las aguas
  rationale: El hebreo conservado no nombra el diluvio, mientras que el griego sí aclara el medio de destrucción. Para respetar la prioridad del testigo hebreo, el cuerpo del texto sigue su formulación; la nota recoge la precisión griega sin sobreescribir la fuente hebrea.
  doctrine_reference: 'PHILOSOPHY.md: traducir desde el hebreo donde se conserva; usar el paralelo griego como testimonio real sin desplazar innecesariamente el hebreo existente.'
translation_notes:
  revision_awareness: La versión en inglés revisó la frase para quitar «again» porque no está en el hebreo, y mantuvo la imagen de un pacto «cut with him». En español se evitó añadir una repetición inexistente y se resolvió el idiomático «cut a covenant» con una formulación natural («se estableció con él») sin perder el sentido pactal. También se preservó la diferencia entre el hebreo, que no explicita el diluvio, y el griego, que sí lo hace, trasladando esa precisión a la nota.
  spanish_consistency_notes:
  - «Pacto» se usa para ברית en lugar de «alianza» para mantener una terminología bíblica precisa y consistente con la tradición de la obra.
  - Se mantuvo «carne» por fidelidad léxica a כל בשר y por su valor técnico bíblico, aunque suene más literal que «seres vivientes».
  - La nota con el griego se ancla en el término «toda carne» para señalar la lectura alternativa sin alterar el texto principal.
