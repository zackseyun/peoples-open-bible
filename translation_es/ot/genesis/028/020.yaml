  to: 'Entonces Jacob hizo un voto[a], diciendo: «Si Dios está conmigo y me guardará[b] en este camino[c] por donde voy[d], y me dará pan para comer y ropa para ponerme»,'
  rationale: Se corrige la prótasis condicional a un español natural y fiel («Si Dios está conmigo»), se mejora la relativa de movimiento («por donde voy»), y se hace más idiomática la finalidad de la ropa («ropa para ponerme») sin apartarse del sentido del hebreo ni de las decisiones léxicas auditadas.
