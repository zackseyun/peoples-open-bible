id: OBA.1.12
reference: Obadiah 1:12
source:
  edition: WLC
  text: וְ/אַל תֵּ֤רֶא בְ/יוֹם אָחִ֨י/ךָ֙ בְּ/י֣וֹם נָכְר֔/וֹ וְ/אַל תִּשְׂמַ֥ח לִ/בְנֵֽי יְהוּדָ֖ה בְּ/י֣וֹם אָבְדָ֑/ם וְ/אַל תַּגְדֵּ֥ל פִּ֖י/ךָ בְּ/י֥וֹם צָרָֽה־־־־־׃
translation:
  text: Do not look on your brother in the day of his misfortune[a], and do not rejoice over the sons of Judah in the day of their destruction[c][b]; and do not make your mouth great in the day of distress.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'look on'—the Hebrew verb is literally 'see,' but here carries the sense of looking on with malicious satisfaction, hence 'gloat over.'
    reason: lexical_alternative
  - marker: b
    text: Or 'the day of his calamity' or possibly 'the day he became a stranger/foreigner.'
    reason: lexical_alternative
  - marker: c
    text: Hebrew 'make your mouth great,' that is, speak boastfully or arrogantly.
    reason: lexical_alternative
lexical_decisions:
- source_word: תֵּרֶא
  chosen: gloat over
  alternatives:
  - look on
  - stare at
  lexicon: HALOT
  rationale: Although the verb is literally 'see/look,' in this prohibition context with repeated 'in the day of' clauses and parallel commands against rejoicing and boasting, the sense is not mere visual perception but malicious looking-on. 'Gloat over' brings out the idiomatic force in natural English without over-paraphrasing.
- source_word: אָחִיךָ
  chosen: your brother
  alternatives:
  - your kinsman
  lexicon: HALOT
  rationale: Literal 'your brother' is retained. In context Edom addresses Judah/Israel as a brother nation descended from Esau and Jacob. The familial term carries rhetorical and covenantal weight, so it should not be flattened in the main text.
- source_word: נָכְרוֹ
  chosen: his misfortune
  alternatives:
  - his estrangement
  - his calamity
  - the day he became a stranger
  lexicon: HALOT
  rationale: The noun from נכר can denote foreignness/estrangement, but in this context of national disaster and parallel terms 'destruction' and 'distress,' it refers to the day when he became alienated/overrun—effectively his calamity or misfortune. 'Misfortune' is idiomatic and preserves the adversity sense without over-specifying.
- source_word: תִּשְׂמַח
  chosen: rejoice
  alternatives:
  - be glad
  lexicon: HALOT
  rationale: Standard rendering of שמח. 'Rejoice' fits the elevated prophetic tone and parallels the prior prohibition naturally.
- source_word: לִבְנֵי יְהוּדָה
  chosen: over the sons of Judah
  alternatives:
  - over the people of Judah
  - over the children of Judah
  lexicon: HALOT
  rationale: The Hebrew is explicitly 'sons of Judah.' Per gender-accurate philosophy, the masculine form is preserved rather than neutralized. Here it refers corporately to the people of Judah, but the literal familial-national expression is maintained in the main text.
- source_word: אָבְדָם
  chosen: their destruction
  alternatives:
  - their perishing
  - their ruin
  lexicon: HALOT
  rationale: From אבד, denoting perishing/ruin. 'Destruction' best matches the national catastrophe in context and reads naturally in English.
- source_word: תַּגְדֵּל פִּיךָ
  chosen: make your mouth great
  alternatives:
  - boast loudly
  - speak arrogantly
  - open your mouth wide
  lexicon: HALOT
  rationale: The Hebrew idiom is literally 'make your mouth great,' referring to arrogant, boastful speech. The literal image is preserved in the main text for transparency, while an explanatory alternative is preserved in a footnote.
- source_word: צָרָה
  chosen: distress
  alternatives:
  - trouble
  - calamity
  lexicon: HALOT
  rationale: צָרָה commonly denotes distress, trouble, or adversity. 'Distress' fits the solemn prophetic register and avoids redundancy with the earlier disaster terms.
