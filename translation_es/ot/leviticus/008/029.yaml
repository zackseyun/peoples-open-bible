translation:
  language: es
  text: Entonces Moisés tomó el pecho y lo meció como ofrenda mecida delante de Yahvé. Era la porción de Moisés, del carnero de la investidura[a], tal como Yahvé había mandado a Moisés.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, «del carnero de la consagración».
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּקַּח
  english_pob_choice: Then Moses took
  chosen_spanish: Entonces Moisés tomó
  alternatives_spanish:
  - Y Moisés tomó
  - Así Moisés tomó
  lexicon: HALOT
  rationale: El wayyiqtol avanza la narración; «Entonces» conserva la secuencia narrativa en español sin añadir interpretación. «Tomó» mantiene el sentido simple de קָחַ / לָקַח.
- source_word: הֶחָזֶה
  english_pob_choice: the breast
  chosen_spanish: el pecho
  alternatives_spanish:
  - el pecho sacrificial
  - el busto
  lexicon: HALOT
  rationale: En contexto sacrificial, חָזֶה designa la porción anatómica del animal. «Pecho» es natural en español y comunica la pieza ritual sin introducir un tecnicismo innecesario.
- source_word: וַיְנִיפֵהוּ תְנוּפָה
  english_pob_choice: waved it as a wave offering
  chosen_spanish: lo meció como ofrenda mecida
  alternatives_spanish:
  - lo presentó como ofrenda mecida
  - lo agitó como ofrenda mecida
  lexicon: HALOT
  rationale: La combinación verbal-nominal preserva el juego cultual de נוּף y תְּנוּפָה. «Meció» expresa el movimiento ritual de manera idiomática; «ofrenda mecida» mantiene el término técnico sin sustituirlo por una paráfrasis más general.
- source_word: לִפְנֵי יְהוָה
  english_pob_choice: before Yahweh
  chosen_spanish: delante de Yahvé
  alternatives_spanish:
  - en presencia de Yahvé
  - ante Yahvé
  lexicon: HALOT
  rationale: La frase cultual se rinde con la preposición española más directa para presentación ritual. «Delante de Yahvé» conserva el carácter de acción efectuada en su presencia.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahveh
  lexicon: HALOT
  rationale: Se mantiene el nombre divino como transliteración del Tetragrámaton, conforme a la terminología base del proyecto en español. «Yahvé» es la forma adoptada para la lectura pública y evita la sustitución por un título.
- source_word: מֵאֵיל הַמִּלֻּאִים
  english_pob_choice: from the ram of ordination
  chosen_spanish: del carnero de la investidura[a]
  alternatives_spanish:
  - del carnero de la ordenación
  - del carnero de la consagración
  lexicon: HALOT
  rationale: אֵיל es «carnero». En el contexto sacerdotal de Levítico 8, מִלֻּאִים alude a la instalación/consagración ritual; «investidura» comunica la idea de incorporación oficial al cargo sin perder el matiz ceremonial. Se conserva la alternativa léxica en nota porque el inglés POB documenta «ordination» / «consecration».
- source_word: לְמֹשֶׁה הָיָה לְמָנָה
  english_pob_choice: It was Moses' portion
  chosen_spanish: Era la porción de Moisés
  alternatives_spanish:
  - Le correspondía a Moisés
  - Era su parte
  lexicon: HALOT
  rationale: מָנָה expresa una porción asignada. «Era la porción de Moisés» mantiene la idea de asignación y posesión sin forzar una estructura posesiva ajena al hebreo.
- source_word: כַּאֲשֶׁר צִוָּה יְהוָה אֶת מֹשֶׁה
  english_pob_choice: just as Yahweh had commanded Moses
  chosen_spanish: tal como Yahvé había mandado a Moisés
  alternatives_spanish:
  - como Yahvé había mandado a Moisés
  - tal como Yahvé mandó a Moisés
  lexicon: HALOT
  rationale: La fórmula concluye con cumplimiento exacto de mandato divino. «Había mandado» refleja bien la anterioridad lógica del mandato respecto del acto narrado, mientras que «tal como» conserva el valor comparativo-formulario de כַּאֲשֶׁר.
theological_decisions:
- issue: Nombre divino YHWH / יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahveh
  rationale: Se preserva el nombre propio del pacto y no se sustituye por un título. La forma «Yahvé» es la convención base del proyecto en español y mantiene la distinción entre el nombre divino y otros títulos.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: מִלֻּאִים en el contexto de instalación sacerdotal
  english_pob_reading: ordination
  chosen_spanish_reading: investidura
  alternative_spanish_readings:
  - ordenación
  - consagración
  rationale: El contexto de Levítico 8 es la instalación ritual de Aarón y sus hijos en el sacerdocio. «Investidura» comunica esa incorporación oficial y ceremonial; «ordenación» y «consagración» quedan como alternativas posibles, pero pueden sonar demasiado eclesiales o demasiado genéricas según el lector.
  doctrine_reference: 'DOCTRINE.md: Priestly installation terminology in Leviticus'
- issue: תְּנוּפָה como terminología sacrificial
  english_pob_reading: wave offering
  chosen_spanish_reading: ofrenda mecida
  alternative_spanish_readings:
  - ofrenda elevada
  - ofrenda agitada
  rationale: Se mantiene la naturaleza técnica del rito sin sustituirla por una explicación. «Ofrenda mecida» conserva el vínculo semántico entre el gesto y la ofrenda, evitando una reducción interpretativa.
  doctrine_reference: 'DOCTRINE.md: Sacrificial technical terms'
translation_notes:
  revision_awareness: El inglés POB fue revisado solo en la puntuación del apóstrofo, sin cambios de sentido. La versión española sigue de cerca el audit trail inglés y ajusta únicamente la idiomaticidad y la terminología cultual al español, preservando el paralelismo entre el gesto ritual, la porción asignada y la fórmula de obediencia final.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» conforme al estándar del proyecto en español.
  - Se conservan términos cultuales específicos («ofrenda mecida», «investidura») para no diluir el léxico ritual.
  - La nota[a] se ancla en el sintagma «carnero de la investidura» y recoge la alternativa lexical documentada por el inglés POB.
  - El tono es formal y apto para lectura pública, sin calcar estructuras inglesas innecesarias.
