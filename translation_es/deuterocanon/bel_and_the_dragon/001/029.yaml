translation:
  language: es
  text: 'Y fueron al rey y dijeron: «Entréganos a Daniel; si no, te mataremos a ti y a los de tu casa[a]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Griego: «tu casa». Aquí la expresión puede referirse no solo a la vivienda, sino a los miembros de la casa o del círculo doméstico.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐλθόντες πρὸς τὸν βασιλέα
  english_pob_choice: they came to the king
  chosen_spanish: y fueron al rey
  alternatives_spanish:
  - y vinieron al rey
  - y llegaron al rey
  lexicon: LSJ
  rationale: El participio aoristo se vierte de manera natural en español como una acción previa coordinada con el verbo principal. «Fueron al rey» comunica el movimiento hacia el rey sin sonar forzado y mantiene la secuencia narrativa.
- source_word: Παράδος
  english_pob_choice: Hand ... over
  chosen_spanish: Entréganos
  alternatives_spanish:
  - Dánoslo
  - Ríndenos
  lexicon: LSJ
  rationale: El imperativo de παραδίδωμι requiere en español una orden de entrega o puesta a disposición. «Entréganos» conserva la fuerza directa del mandato; «dánoslo» sería más llano pero menos preciso, y «ríndenos» suena más militar.
- source_word: ἡμῖν
  english_pob_choice: to us
  chosen_spanish: nos
  alternatives_spanish:
  - a nosotros
  lexicon: LSJ
  rationale: El dativo de destinatario queda expresado de forma natural en el clítico de objeto indirecto español. Añadir «a nosotros» sería posible, pero menos fluido.
- source_word: τὸν Δανιήλ
  english_pob_choice: Daniel
  chosen_spanish: a Daniel
  alternatives_spanish:
  - Daniel
  lexicon: LSJ
  rationale: El nombre propio se conserva en la forma española usual. La preposición «a» marca con claridad el objeto directo personal en español.
- source_word: εἰ δὲ μή
  english_pob_choice: otherwise
  chosen_spanish: si no
  alternatives_spanish:
  - de lo contrario
  - si no lo haces
  lexicon: LSJ
  rationale: La amenaza condicional se expresa con la locución española directa «si no», que preserva el valor de ultimátum del griego sin añadir explicaciones.
- source_word: ἀποκτενοῦμέν
  english_pob_choice: we will kill
  chosen_spanish: te mataremos
  alternatives_spanish:
  - te daremos muerte
  - te haremos morir
  lexicon: LSJ
  rationale: ἀποκτείνω se traduce aquí con el verbo común y directo «matar», que reproduce la amenaza sin embellecerla ni introducir una formulación legal o eufemística.
- source_word: σε
  english_pob_choice: you
  chosen_spanish: te
  alternatives_spanish:
  - a ti
  lexicon: LSJ
  rationale: El pronombre de objeto directo se expresa con el clítico español. El contexto muestra que la amenaza va dirigida al rey.
- source_word: τὸν οἶκόν σου
  english_pob_choice: your household
  chosen_spanish: a tu casa
  alternatives_spanish:
  - a tu hogar
  - a tu familia
  lexicon: LSJ
  rationale: οἶκος puede referirse al edificio o al grupo doméstico. En español, «casa» mantiene la ambigüedad controlada del griego y permite que el contexto de amenaza incluya a los de su casa; «familia» estrecharía demasiado el sentido y «hogar» sonaría menos concreto.
theological_decisions:
- issue: Alcance de οἶκος en la amenaza
  english_pob_reading: your household
  chosen_spanish_reading: a tu casa
  alternative_spanish_readings:
  - a tu familia
  - a tu hogar
  rationale: La POB inglesa optó por «your household» para recoger el sentido ampliado de οἶκος sin reducirlo al edificio. En español, «casa» conserva mejor esa oscilación entre casa física y casa como casa-dinastía/doméstico, y evita restringir el texto solo a parentesco biológico.
  doctrine_reference: Translation philosophy §5 (consistency of key terms, or documented exception)
translation_notes:
  revision_awareness: La versión inglesa auditada no recibió cambios en la última pasada, y la concordancia general fue alta; por eso la redacción española sigue de cerca las decisiones léxicas ya justificadas, sin introducir una reinterpretación nueva.
  spanish_consistency_notes:
  - Se mantiene «Daniel» como nombre propio estándar.
  - Se conserva la amenaza en segunda persona singular, coherente con el trato directo al rey.
  - «Casa» se usa con valor amplio, en paralelo al inglés «household», para no estrechar indebidamente οἶκος.
  - No se emplea «SEÑOR» ni terminología litúrgica ajena al pasaje, ya que el texto no contiene referencias al nombre divino.
