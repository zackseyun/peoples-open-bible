id: EZK.33.22
reference: Ezekiel 33:22
source:
  edition: WLC
  text: וְ/יַד יְהוָה֩ הָיְתָ֨ה אֵלַ֜/י בָּ/עֶ֗רֶב לִ/פְנֵי֙ בּ֣וֹא הַ/פָּלִ֔יט וַ/יִּפְתַּ֣ח אֶת פִּ֔/י עַד בּ֥וֹא אֵלַ֖/י בַּ/בֹּ֑קֶר וַ/יִּפָּ֣תַח פִּ֔/י וְ/לֹ֥א נֶאֱלַ֖מְתִּי עֽוֹד־־־׃פ
translation:
  text: Now the hand of Yahweh had been upon me in the evening[a], before the fugitive came, and he opened my mouth until he came to me in the morning. So my mouth was opened, and I was no longer mute.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'before the survivor came.' The Hebrew term refers to one who has escaped and survived.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְיַד יְהוָה
  chosen: the hand of the LORD
  alternatives:
  - the LORD's hand
  lexicon: HALOT
  rationale: Idiomatic prophetic expression for YHWH's powerful action or influence upon the prophet. 'The hand of the LORD' preserves the established Hebrew idiom while keeping the covenant name rendered per doctrine as 'the LORD.'
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: הָיְתָה אֵלַי
  chosen: had been upon me
  alternatives:
  - was upon me
  - came upon me
  lexicon: HALOT
  rationale: With 'hand' as subject and the temporal frame extending from evening to morning, English past perfect ('had been') best reflects prior state relative to the fugitive's arrival. 'Upon me' matches the Hebrew preposition and prophetic idiom.
- source_word: בָּעֶרֶב
  chosen: in the evening
  alternatives:
  - at evening
  - that evening
  lexicon: HALOT
  rationale: Straightforward temporal expression; 'in the evening' is natural modern English.
- source_word: לִפְנֵי בּוֹא הַפָּלִיט
  chosen: before the fugitive came
  alternatives:
  - before the survivor came
  - before the escapee came
  lexicon: HALOT
  rationale: הַפָּלִיט denotes one who has escaped, here the messenger who survived Jerusalem's fall. 'Fugitive' is concise and traditional without overstating moral culpability; 'survivor' is possible but less tied to the verbal root of escape.
- source_word: וַיִּפְתַּח אֶת פִּי
  chosen: he opened my mouth
  alternatives:
  - he enabled me to speak
  lexicon: HALOT
  rationale: The subject is naturally the LORD from the preceding clause. The literal idiom 'opened my mouth' should be retained because it connects directly with Ezekiel's prior muteness and the repeated wording later in the verse.
- source_word: עַד בּוֹא אֵלַי בַּבֹּקֶר
  chosen: until he came to me in the morning
  alternatives:
  - by the time he came to me in the morning
  lexicon: HALOT
  rationale: עַד marks the endpoint of the divinely imposed condition; 'until' preserves that temporal progression. The repeated subject most naturally refers to the fugitive.
- source_word: וַיִּפָּתַח פִּי
  chosen: my mouth was opened
  alternatives:
  - my mouth opened
  lexicon: HALOT
  rationale: The Niphal form is well represented by an English passive. Repeating 'mouth' preserves the Hebrew emphasis and ties the clause to the earlier divine action.
- source_word: וְלֹא נֶאֱלַמְתִּי עוֹד
  chosen: and I was no longer mute
  alternatives:
  - and I was not mute anymore
  - and I was no longer silenced
  lexicon: HALOT
  rationale: The verb denotes being mute or unable to speak. 'No longer mute' is concise, natural, and fits the narrative context of Ezekiel's restored speech.
