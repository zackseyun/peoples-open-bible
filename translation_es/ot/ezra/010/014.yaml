translation:
  language: es
  text: Por favor, que nuestros líderes[a] representen a toda la asamblea, y que todos los que en nuestras ciudades han tomado esposas extranjeras[b] vengan en tiempos señalados, con ellos los ancianos de cada ciudad y sus jueces, hasta que la ardiente ira de nuestro Dios sea apartada de nosotros en este asunto.[c]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «dirigentes» u «oficiales». El hebreo שָׂרִים se refiere a quienes ejercen autoridad o función administrativa dentro de la comunidad.
    reason: lexical_alternative
  - marker: b
    text: O «han tomado mujeres extranjeras». El hebreo dice literalmente «ha hecho habitar / ha asentado mujeres extranjeras», un modismo para tomar mujeres en matrimonio e introducirlas en el hogar.
    reason: lexical_alternative
  - marker: c
    text: O «hasta que la ardiente ira de nuestro Dios sea apartada de nosotros con respecto a este asunto».
    reason: alternative_reading
lexical_decisions:
- source_word: יַעֲמְדוּ נָא
  english_pob_choice: Please let ... stand
  chosen_spanish: que se pongan en pie
  alternatives_spanish:
  - que estén en pie
  - que se presenten
  lexicon: HALOT
  rationale: El hebreo usa un jussivo con נָא, que expresa ruego o solicitud respetuosa. En español, «que se pongan en pie» conserva la fuerza exhortativa sin sonar rígido.
- source_word: שָׂרֵינוּ
  english_pob_choice: our leaders
  chosen_spanish: nuestros jefes
  alternatives_spanish:
  - nuestros líderes
  - nuestros oficiales
  lexicon: HALOT
  rationale: שָׂרִים puede abarcar jefes, funcionarios o líderes. «Jefes» comunica bien la función de dirección administrativa del contexto, y mantiene un registro sobrio y bíblico.
- source_word: לְכָל הַקָּהָל
  english_pob_choice: for the whole assembly
  chosen_spanish: delante de toda la asamblea
  alternatives_spanish:
  - para toda la asamblea
  - en favor de toda la asamblea
  lexicon: HALOT
  rationale: La frase indica representación ante la comunidad reunida. «Delante de» expresa con naturalidad la comparecencia pública implícita en el contexto judicial y comunitario.
- source_word: הַהֹשִׁיב נָשִׁים נָכְרִיּוֹת
  english_pob_choice: who has taken foreign wives
  chosen_spanish: han tomado mujeres extranjeras
  alternatives_spanish:
  - han tomado esposas extranjeras
  - han hecho habitar mujeres extranjeras
  lexicon: HALOT
  rationale: Sigo la observación del POB de que el hebreo usa un giro idiomático con ישׁב para referirse a tomar mujeres en el hogar como esposas. En español, «han tomado mujeres extranjeras» conserva la referencia sin forzar una explicación dentro del texto.
- source_word: נָשִׁים נָכְרִיּוֹת
  english_pob_choice: foreign wives
  chosen_spanish: mujeres extranjeras
  alternatives_spanish:
  - esposas extranjeras
  - mujeres foráneas
  lexicon: HALOT
  rationale: El hebreo dice literalmente «mujeres extranjeras». Aunque el contexto matrimonial es claro, el español mantiene mejor la correspondencia léxica con «mujeres» y evita añadir una palabra interpretativa en el cuerpo principal.
- source_word: יָבֹא
  english_pob_choice: let ... come
  chosen_spanish: que vengan
  alternatives_spanish:
  - que venga
  - vendrán
  lexicon: HALOT
  rationale: Aunque la forma verbal es singular en el hebreo, funciona distributivamente con «todos los que». En español, el plural concuerda naturalmente con el sujeto colectivo y mantiene el tono de instrucción.
- source_word: לְעִתִּים מְזֻמָּנִים
  english_pob_choice: at appointed times
  chosen_spanish: en tiempos señalados
  alternatives_spanish:
  - en tiempos fijados
  - en momentos designados
  lexicon: HALOT
  rationale: La expresión apunta a ocasiones oficialmente determinadas. «Tiempos señalados» conserva el carácter formal y calendarizado del hebreo sin sonar técnico en exceso.
- source_word: וְעִמָּהֶם זִקְנֵי עִיר וָעִיר וְשֹׁפְטֶיהָ
  english_pob_choice: with them the elders of each city and its judges
  chosen_spanish: junto con ellos los ancianos de cada ciudad y sus jueces
  alternatives_spanish:
  - con ellos los ancianos de cada ciudad y sus jueces
  - y con ellos los ancianos y jueces de cada ciudad
  lexicon: HALOT
  rationale: La construcción distributiva «ciudad y ciudad» se vierte naturalmente como «cada ciudad». «Ancianos» y «jueces» conservan la estructura judicial local del pasaje.
- source_word: עַד לְהָשִׁיב
  english_pob_choice: until ... is turned back
  chosen_spanish: hasta que ... sea apartado
  alternatives_spanish:
  - hasta que ... sea alejado
  - hasta que ... se vuelva atrás
  lexicon: HALOT
  rationale: El infinitivo con שוב y el objeto «ardor de la ira» expresa la remoción de la ira divina. «Sea apartado» comunica ese resultado sin atribuir de más el agente en español.
- source_word: חֲרוֹן אַף אֱלֹהֵינוּ
  english_pob_choice: the burning anger of our God
  chosen_spanish: el ardor de la ira de nuestro Dios
  alternatives_spanish:
  - la ardiente ira de nuestro Dios
  - el furor de nuestro Dios
  lexicon: HALOT
  rationale: El hebreo combina la imagen de calor/ardor con la expresión idiomática de ira. «Ardor de la ira» preserva la metáfora y mantiene la tensión semántica entre imagen e idiomatismo.
- source_word: מִמֶּנּוּ
  english_pob_choice: from us
  chosen_spanish: de nosotros
  alternatives_spanish:
  - de en medio de nosotros
  - de nuestra comunidad
  lexicon: HALOT
  rationale: El sufijo plural refiere colectivamente a la comunidad bajo juicio. «De nosotros» mantiene la referencia comunitaria en una forma natural para el español.
- source_word: עַד לַדָּבָר הַזֶּה
  english_pob_choice: in this matter
  chosen_spanish: en este asunto
  alternatives_spanish:
  - respecto de este asunto
  - sobre este asunto
  lexicon: HALOT
  rationale: La frase final delimita el caso en discusión. «En este asunto» es una forma clara y digna en español actual.
theological_decisions:
- issue: Cómo rendir la ira divina sin suavizarla ni sobredeterminarlarla
  english_pob_reading: the burning anger of our God
  chosen_spanish_reading: el ardor de la ira de nuestro Dios
  alternative_spanish_readings:
  - la ira de nuestro Dios
  - el furor de nuestro Dios
  rationale: El hebreo expresa una reacción divina intensa ante la infidelidad comunitaria. La versión española conserva tanto la imagen de ardor como el carácter real de la ira, sin convertirla en una categoría abstracta ni atenuarla.
  doctrine_reference: Translation philosophy §§1, 3, 6
- issue: Alcance de la responsabilidad comunitaria
  english_pob_reading: our leaders ... the whole assembly ... from us in this matter
  chosen_spanish_reading: nuestros jefes ... toda la asamblea ... de nosotros en este asunto
  alternative_spanish_readings:
  - nuestros líderes ... la asamblea ... de nuestra comunidad
  rationale: El pasaje no describe solo una situación individual, sino un caso que afecta a toda la comunidad. El español mantiene los posesivos y las referencias comunitarias para que esa dimensión corporativa siga visible.
  doctrine_reference: Translation philosophy §§2, 4
translation_notes:
  revision_awareness: La traducción sigue de cerca el paquete fuente hebreo y toma en cuenta la revisión del POB en inglés que suavizó la coordinación antes de «with them». También incorpora la nota del POB sobre el giro idiomático de הַהֹשִׁיב נָשִׁים נָכְרִיּוֹת, sin forzar el texto español a una glosa extensa. En esta versión se decidió explicitar la metáfora de חֲרוֹן אַף como «ardor de la ira», porque el español puede conservar la imagen con buena claridad.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como convención general del proyecto, pero en este versículo el texto hebreo dice אֱלֹהֵינוּ, por lo que corresponde «nuestro Dios».
  - Se prefirió «mujeres extranjeras» en el cuerpo principal para respetar el hebreo, aunque la nota inglesa habla del sentido marital implícito.
  - La sintaxis española conserva el tono exhortativo y judicial del pasaje, evitando una paráfrasis devocional.
  - No se usó «Cristo», «SEÑOR» ni terminología eclesiástica ajena al contexto del texto.
