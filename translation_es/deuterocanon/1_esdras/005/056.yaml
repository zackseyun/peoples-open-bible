  to: Y pusieron a los levitas[a] desde los veinte años en adelante sobre las obras de Yahvé. Y se levantó Jesúa con sus hijos y hermanos, y Kadmiel su hermano, y los hijos de Jesúa hijo de Henadad[b], y los hijos de Judá hijo de Eliadún, junto con sus hijos y hermanos; todos los levitas, unidos, como supervisores de la obra[c], llevando adelante las obras[d] en la casa de Yahvé. Y los constructores edificaron el templo de Yahvé.
