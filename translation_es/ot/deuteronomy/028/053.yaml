revisions:
- from: Y comerás el fruto de tu vientre[a], la carne de tus hijos y de tus hijas[b], que Yahvé tu Dios te habrá dado, en el sitio de la siega y en la angustia con que tu enemigo te oprimirá.
  to: Y comerás el fruto de tu vientre[a], la carne de tus hijos e hijas, que Yahvé tu Dios te dio, en el sitio y en la angustia[b] con que tu enemigo te oprimirá.
  rationale: Se corrige el error grave 'siega' por 'sitio', se mejora la naturalidad de 'tus hijos e hijas', se ajusta el tiempo verbal a 'te dio' para reflejar mejor la cláusula relativa hebrea, y se reubica la nota [b] al término correspondiente a וּבְמָצוֹק, en línea con el audit trail inglés. Se mantiene 'Yahvé' según la política del proyecto y 'carne' por su fuerza literal.
