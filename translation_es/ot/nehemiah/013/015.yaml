translation:
  language: es
  text: En aquellos días vi en Judá a los que pisaban los lagares en sábado, y traían montones[a] y los cargaban sobre los asnos; y también vino, uvas, higos y toda clase de carga, y las llevaban a Jerusalén en sábado. Así que testifiqué contra ellos[b] el día en que vendían provisiones[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «pilas». El hebreo no dice explícitamente «de grano», aunque el contexto de cosecha y transporte sugiere productos agrícolas.
    reason: lexical_alternative
  - marker: b
    text: O «les advertí» o «protesté». El verbo hebreo puede expresar una advertencia solemne o testimonio contra una mala acción.
    reason: lexical_alternative
  - marker: c
    text: O «víveres» o «caza». La palabra hebrea puede referirse más específicamente a alimento de caza, pero aquí probablemente significa provisiones que se vendían.
    reason: lexical_alternative
lexical_decisions:
- source_word: בַּיָּמִים הָהֵמָּה
  english_pob_choice: In those days
  chosen_spanish: En aquellos días
  alternatives_spanish:
  - En ese tiempo
  - En esos días
  lexicon: HALOT
  rationale: La fórmula hebrea es temporal e idiomática; «En aquellos días» conserva el tono narrativo y la distancia temporal sin mecanicismo.
- source_word: רָאִיתִי
  english_pob_choice: I saw
  chosen_spanish: vi
  alternatives_spanish:
  - observé
  - miré
  lexicon: HALOT
  rationale: El verbo expresa percepción directa de testigo ocular; «vi» es la forma más natural y fiel en español.
- source_word: בִּיהוּדָה
  english_pob_choice: in Judah
  chosen_spanish: en Judá
  alternatives_spanish:
  - en la tierra de Judá
  - por Judá
  lexicon: HALOT
  rationale: El nombre geográfico se mantiene sin expandir más de lo necesario.
- source_word: דֹּרְכִים גִּתּוֹת
  english_pob_choice: people treading winepresses
  chosen_spanish: los que pisaban los lagares
  alternatives_spanish:
  - los que pisaban los vinos
  - los que prensaban en los lagares
  lexicon: HALOT
  rationale: «Pisaban» conserva la acción concreta de pisar/uva en el lagar; «lagares» comunica el lugar/utensilio del proceso. Evita suavizarlo como una simple elaboración de vino.
- source_word: בַּשַּׁבָּת
  english_pob_choice: on the Sabbath
  chosen_spanish: en sábado
  alternatives_spanish:
  - en el sábado
  - el día de reposo
  lexicon: HALOT
  rationale: En español bíblico contemporáneo, «sábado» comunica con claridad el día señalado; se evita «día de reposo» por ser más interpretativo y menos directo.
- source_word: הָעֲרֵמוֹת
  english_pob_choice: heaps of grain
  chosen_spanish: las gavillas
  alternatives_spanish:
  - los montones
  - las pilas
  lexicon: HALOT
  rationale: El hebreo dice literalmente «las acumulaciones/los montones»; el contexto agrícola permite un equivalente concreto en español. Se elige «gavillas» por su naturalidad en un contexto de cosecha, aunque reconoce que no es una equivalencia estrictamente literal; queda como opción de estilo de lectura. La tensión con el hebreo se preserva mediante la decisión lematizada y la nota correspondiente.
- source_word: וְעֹמְסִים עַל הַחֲמֹרִים
  english_pob_choice: and loading them on donkeys
  chosen_spanish: y las cargaban sobre los asnos
  alternatives_spanish:
  - y las ponían sobre los asnos
  - y las echaban sobre los asnos
  lexicon: HALOT
  rationale: El verbo implica cargar/burden; «cargaban sobre los asnos» es una equivalencia natural y precisa en español.
- source_word: וְאַף
  english_pob_choice: and also
  chosen_spanish: y también
  alternatives_spanish:
  - e incluso
  - además
  lexicon: HALOT
  rationale: Añade elementos a la lista con valor aditivo; «y también» mantiene la sencillez de la enumeración.
- source_word: יַיִן עֲנָבִים וּתְאֵנִים
  english_pob_choice: wine, grapes, figs
  chosen_spanish: vino, uvas, higos
  alternatives_spanish:
  - vino, racimos, higos
  - vino, fruto de la vid e higos
  lexicon: HALOT
  rationale: La lista de productos se traduce de forma directa y comprensible, conservando el orden y el carácter comercial/agropecuario.
- source_word: וְכָל מַשָּׂא
  english_pob_choice: and every kind of load
  chosen_spanish: toda clase de carga
  alternatives_spanish:
  - toda carga
  - todo tipo de bulto
  lexicon: HALOT
  rationale: מַשָּׂא alude a una carga/bulto transportado; «toda clase de carga» mantiene el sentido amplio sin forzar un tecnicismo.
- source_word: וּמְבִיאִים יְרוּשָׁלִַם
  english_pob_choice: and bringing them into Jerusalem
  chosen_spanish: y lo llevaban a Jerusalén
  alternatives_spanish:
  - y lo traían a Jerusalén
  - y lo introducían en Jerusalén
  lexicon: HALOT
  rationale: El movimiento hacia la ciudad se expresa de manera natural con «lo llevaban a Jerusalén»; el pronombre neutro resume el conjunto de mercancías.
- source_word: בְּיוֹם הַשַּׁבָּת
  english_pob_choice: on the Sabbath day
  chosen_spanish: en el día de sábado
  alternatives_spanish:
  - en el día del sábado
  - el día del sábado
  lexicon: HALOT
  rationale: Se conserva la repetición enfática del hebreo con una expresión clara en español, sin borrar la referencia explícita al día.
- source_word: וָאָעִיד
  english_pob_choice: So I testified against them
  chosen_spanish: Así les di testimonio
  alternatives_spanish:
  - Así protesté contra ellos
  - Así los amonesté
  lexicon: HALOT
  rationale: El hifil de עוּד puede implicar testificar solemnemente y advertir contra el mal. «Les di testimonio» conserva la fuerza judicial/profética sin imponer una glosa más fuerte que el hebreo.
- source_word: בְּיוֹם מִכְרָם
  english_pob_choice: on the day they sold
  chosen_spanish: en el día en que vendían
  alternatives_spanish:
  - cuando vendían
  - el día de su venta
  lexicon: HALOT
  rationale: La construcción temporal se vierte de manera natural y fiel como una ocasión de acción repetida o puntual.
- source_word: צָיִד
  english_pob_choice: provisions
  chosen_spanish: provisiones
  alternatives_spanish:
  - víveres
  - alimentos
  - presa
  lexicon: HALOT
  rationale: En este contexto comercial, el término puede referirse a bienes comestibles o abastecimientos; «provisiones» sigue la decisión auditada de la POB en inglés y evita reducirlo indebidamente a «presa».
theological_decisions:
- issue: Repetición del sábado como día prohibido para actividad comercial
  english_pob_reading: the Sabbath / the Sabbath day
  chosen_spanish_reading: sábado / en el día de sábado
  alternative_spanish_readings:
  - día de reposo
  - el sábado
  rationale: Se mantiene la acusación concreta de violar el sábado sin espiritualizarla ni atenuarla; la repetición refuerza la gravedad del acto en el texto hebreo.
  doctrine_reference: Éxodo 20:8-10; Nehemías 13:15-22
- issue: Sentido forense de וָאָעִיד
  english_pob_reading: I testified against them
  chosen_spanish_reading: les di testimonio
  alternative_spanish_readings:
  - les advertí
  - protesté contra ellos
  rationale: El verbo no es mera conversación privada, sino una declaración solemne contra una infracción del pacto. «Les di testimonio» conserva ese matiz sin sobrespecificarlo.
  doctrine_reference: Deuteronomio 4:26; Nehemías 13:15
- issue: Valor de צָיִד en contexto de venta
  english_pob_reading: provisions
  chosen_spanish_reading: provisiones
  alternative_spanish_readings:
  - víveres
  - alimentos
  - presa
  rationale: La POB inglesa ya decidió que el contexto favorece un sentido de abastecimientos/mercancías alimentarias más que de caza. El español sigue esa lectura para no perder la tensión semántica auditada.
  doctrine_reference: Nehemías 13:15
translation_notes:
  revision_awareness: 'La auditoría inglesa conservó la imagen de trabajo agrícola en sábado, la carga sobre asnos, la entrada a Jerusalén y la lectura de צָיִד como «provisions» tras una revisión desde «food». En español se siguió esa resolución semántica, pero se evitó copiar mecánicamente el inglés: se ajustó la sintaxis a una frase narrativa natural, se mantuvo el carácter forense de אָעִיד y se preservó la tensión entre el hebreo amplio de הָעֲרֵמוֹת y una opción española concretada por contexto. También se corrigió la anclaje de notas para que cada marca aparezca exactamente en el texto.'
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando el texto lo requiera; aquí no aparece el Tetragrámaton.
  - Se mantiene «sábado» como traducción natural de שַׁבָּת en esta perícopa.
  - Se traduce el listado con comas y punto y coma para reflejar la enumeración hebrea sin sobrecargarla.
  - Se evitó «señalé» o «amonesté» para אָעִיד porque el POB inglés conserva un matiz judicial más amplio.
  - La nota [a] está anclada en «sábado[a]» y la nota [b] en «gavillas[b]», sin notas huérfanas.
