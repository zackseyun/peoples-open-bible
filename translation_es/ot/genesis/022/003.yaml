translation:
  language: es
  text: Abraham se levantó temprano por la mañana, ensilló su asno, tomó consigo a dos de sus jóvenes[a] y a Isaac, su hijo, partió la leña para una ofrenda quemada, y se levantó y fue al lugar que Dios le había dicho.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Jóvenes» puede entenderse también como «sirvientes» o «asistentes»; el hebreo נְעָרִים admite esas alternativas según el contexto.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּשְׁכֵּם
  english_pob_choice: rose early
  chosen_spanish: se levantó muy de madrugada
  alternatives_spanish:
  - se levantó temprano
  - se levantó de mañana
  lexicon: HALOT
  rationale: El verbo expresa levantarse temprano con énfasis narrativo en la prontitud. «Muy de madrugada» conserva ese énfasis en un español natural y digno.
- source_word: בַּבֹּקֶר
  english_pob_choice: in the morning
  chosen_spanish: muy de madrugada
  alternatives_spanish:
  - por la mañana
  - en la mañana
  lexicon: HALOT
  rationale: En español, la combinación con el verbo anterior suena más natural si se integra como una sola indicación temporal intensificada. La duplicación literal «en la mañana» sería menos idiomática.
- source_word: וַיַּחֲבֹשׁ אֶת־חֲמֹרוֹ
  english_pob_choice: saddled his donkey
  chosen_spanish: aparejó su asno
  alternatives_spanish:
  - ensilló su asno
  - ató su asno para viajar
  lexicon: HALOT
  rationale: חבש aquí es preparar al animal para el viaje, no sólo colocar una silla. «Aparejó» transmite mejor la preparación completa y evita una imagen demasiado específica que el hebreo no exige.
- source_word: שְׁנֵי נְעָרָיו
  english_pob_choice: two of his young men
  chosen_spanish: dos de sus jóvenes
  alternatives_spanish:
  - dos de sus muchachos
  - dos de sus servidores
  - dos de sus asistentes
  lexicon: HALOT
  rationale: POB opta por «young men» para no sobrecargar con un oficio servil que el contexto no determina. «Jóvenes» conserva la amplitud semántica de נְעָרִים; la nota aclara la alternativa servil/atendencial.
- source_word: יִצְחָק בְּנוֹ
  english_pob_choice: Isaac his son
  chosen_spanish: Isaac, su hijo
  alternatives_spanish:
  - su hijo Isaac
  lexicon: HALOT
  rationale: Se mantiene la relación filial explícita sin forzar el orden hebreo. La apposición con coma es natural en español y preserva la prominencia de Isaac.
- source_word: וַיְבַקַּע עֲצֵי עֹלָה
  english_pob_choice: split the wood for a burnt offering
  chosen_spanish: partió la leña para el holocausto
  alternatives_spanish:
  - cortó la leña para el holocausto
  - partió la madera para el holocausto
  lexicon: HALOT
  rationale: בקע significa partir o rajar. «Leña» es un término natural en español para wood preparada para fuego; «holocausto» conserva el valor sacrificial de עֹלָה en una forma tradicional y comprensible, sin sustituirlo por una paráfrasis.
- source_word: עֹלָה
  english_pob_choice: burnt offering
  chosen_spanish: holocausto
  alternatives_spanish:
  - ofrenda quemada
  - ofrenda totalmente quemada
  lexicon: HALOT
  rationale: Aunque «holocausto» puede sonar histórico-litúrgico, es el equivalente tradicional más conciso para עֹלָה en español bíblico. Aquí preserva el término sacrificial técnico mejor que una explicación más larga.
- source_word: וַיָּקָם וַיֵּלֶךְ
  english_pob_choice: and arose and went
  chosen_spanish: y se levantó y fue
  alternatives_spanish:
  - y se puso en camino
  - y salió y fue
  lexicon: HALOT
  rationale: Se conservan los dos verbos consecutivos para reflejar el ritmo narrativo hebreo. «Fue» mantiene la sencillez del desplazamiento sin añadir matices no presentes en el texto.
- source_word: הַמָּקוֹם
  english_pob_choice: the place
  chosen_spanish: el lugar
  alternatives_spanish:
  - el sitio
  lexicon: HALOT
  rationale: «Lugar» es la equivalencia directa y natural del sustantivo con artículo.
- source_word: אֲשֶׁר אָמַר לוֹ הָאֱלֹהִים
  english_pob_choice: that God had told him
  chosen_spanish: que Dios le había dicho
  alternatives_spanish:
  - que Dios le había hablado
  - que Dios le había ordenado
  lexicon: HALOT
  rationale: אמר con dativo puede ser «decir» en español y abarca la instrucción divina sin añadir el matiz más fuerte de «ordenó». El pretérito pluscuamperfecto refleja correctamente la anterioridad narrativa.
theological_decisions:
- issue: Nombre divino en el relato
  english_pob_reading: God
  chosen_spanish_reading: Dios
  alternative_spanish_readings:
  - el Dios
  rationale: El hebreo usa הָאֱלֹהִים con artículo, pero en narrativa referida al Dios de Israel el español bíblico claro y estándar es «Dios». No hay aquí indicio de un problema textual o doctrinal que requiera otra solución.
  doctrine_reference: Terminología consistente para אֱלֹהִים en relato narrativo; transparencia textual sin máscara reverencial.
- issue: עֹלָה como término sacrificial
  english_pob_reading: burnt offering
  chosen_spanish_reading: holocausto
  alternative_spanish_readings:
  - ofrenda quemada
  - ofrenda totalmente quemada
  rationale: La lectura inglesa mantiene el término sacrificial técnico. En español, «holocausto» es la correspondencia bíblica tradicional breve y exacta para עֹלָה, sin reemplazarlo por una explicación interpretativa.
  doctrine_reference: Consistencia de vocabulario sacrificial; equivalencia funcional con atención al registro bíblico.
translation_notes:
  revision_awareness: 'La versión inglesa auditada muestra una revisión menor: se añadió «the» antes de «wood» para reflejar más plenamente el hebreo. En español se refleja con el artículo definido «la leña». No se observan otros cambios sustantivos en el sentido del versículo.'
  spanish_consistency_notes:
  - Se mantiene «Dios» para הָאֱלֹהִים conforme al uso narrativo del POB.
  - Se conserva el registro sacrificial con «holocausto» para עֹלָה.
  - La secuencia verbal hebrea se preserva con «se levantó y fue» para no colapsar el movimiento narrativo.
  - «Aparejó» evita la imagen demasiado específica de «ensilló» y comunica mejor la preparación del animal para viajar.
