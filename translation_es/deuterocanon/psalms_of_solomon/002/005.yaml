revisions:
- from: Fue despreciado[a] delante de Dios; fue deshonrado[b] hasta el fin.
  to: Eso[a] fue despreciado delante de Dios; eso fue deshonrado hasta el fin.
  rationale: Se introduce 'Eso' para reflejar explícitamente el sujeto no personal establecido por el audit trail inglés y evitar una lectura masculina equivocada. Se mantiene 'delante de Dios' y 'hasta el fin' por fidelidad al griego y a la revisión inglesa final. Se elimina la nota redundante que solo repetía el texto principal.
