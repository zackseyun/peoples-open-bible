translation:
  language: es
  text: desde los treinta años y en adelante, hasta los cincuenta años, todo el que se presenta[a] al servicio para la obra en la tienda de reunión—
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «todo el que viene para el servicio, para la obra en la tienda de reunión».'
    reason: lexical_alternative
lexical_decisions:
- source_word: מִבֶּן שְׁלֹשִׁים שָׁנָה וָמַעְלָה
  english_pob_choice: from thirty years old and upward
  chosen_spanish: desde los treinta años y en adelante
  alternatives_spanish:
  - desde la edad de treinta años y en adelante
  - a partir de los treinta años y en adelante
  lexicon: HALOT
  rationale: La construcción hebrea marca un mínimo de edad. «Desde los treinta años y en adelante» reproduce ese límite de forma natural en español y conserva el valor idiomático sin sobrerrepresentar la estructura literal de «hijo de treinta años».
- source_word: וְעַד בֶּן חֲמִשִּׁים שָׁנָה
  english_pob_choice: up to fifty years old
  chosen_spanish: hasta los cincuenta años
  alternatives_spanish:
  - hasta la edad de cincuenta años
  - incluso hasta los cincuenta años
  lexicon: HALOT
  rationale: La frase completa el rango de edad. En español, «hasta los cincuenta años» es claro y fiel al límite superior sin añadir matices innecesarios.
- source_word: כָּל הַבָּא
  english_pob_choice: everyone who enters
  chosen_spanish: todo el que entra
  alternatives_spanish:
  - todo el que viene
  - todos los que entran
  lexicon: HALOT
  rationale: El participio de בוא señala al que entra o se presenta. «Todo el que entra» comunica bien la idea de ingreso al turno o al ámbito de servicio, y mantiene la generalidad del hebreo.
- source_word: לַצָּבָא
  english_pob_choice: the service
  chosen_spanish: al servicio
  alternatives_spanish:
  - al deber
  - al ejército
  lexicon: HALOT
  rationale: En Números 4 צָבָא no funciona principalmente como «ejército» en sentido militar, sino como servicio ordenado o cuerpo asignado. «Al servicio» sigue esa lectura y evita una militarización innecesaria.
- source_word: לַעֲבֹדָה
  english_pob_choice: for the work
  chosen_spanish: para la obra
  alternatives_spanish:
  - para el trabajo
  - para el servicio
  lexicon: HALOT
  rationale: עֲבֹדָה denota labor/servicio. «Para la obra» conserva el sentido de tarea asignada y distingue esta palabra de צָבָא, evitando fusionar dos términos hebreos distintos en una sola idea.
- source_word: בְּאֹהֶל מוֹעֵד
  english_pob_choice: in the tent of meeting
  chosen_spanish: en el tabernáculo de reunión
  alternatives_spanish:
  - en la tienda de reunión
  - en el santuario de reunión
  lexicon: HALOT
  rationale: «Ohel mo'ed» es el designación técnica del tabernáculo. «Tabernáculo de reunión» es una equivalencia reverente y entendible en español que preserva el referente cultual del texto.
theological_decisions:
- issue: Término técnico del santuario (אֹהֶל מוֹעֵד)
  english_pob_reading: in the tent of meeting
  chosen_spanish_reading: en el tabernáculo de reunión
  alternative_spanish_readings:
  - en la tienda de reunión
  - en el lugar de reunión
  rationale: No hay tensión doctrinal, pero sí una decisión terminológica. «Tabernáculo de reunión» mantiene el valor técnico del lugar santo y su función de encuentro, con un registro más eclesial y reconocible en español.
  doctrine_reference: Éxodo 25–40; Números 4
- issue: Sentido de צָבָא en contexto levítico
  english_pob_reading: the service
  chosen_spanish_reading: el servicio
  alternative_spanish_readings:
  - la milicia
  - el ejército
  rationale: Aunque צָבָא puede significar «ejército», aquí el contexto levítico exige un sentido de servicio organizado. Traducirlo como «servicio» evita una lectura militar literal que el contexto no pide.
  doctrine_reference: Números 4:3, 23, 30, 35, 39
translation_notes:
  revision_awareness: Seguí el pasaje final revisado del audit trail inglés, que prefirió «for the work» sobre una expansión más interpretativa. En español, eso se refleja con «para la obra», manteniendo la relación directa entre los dos sustantivos hebreos sin añadir explicación implícita.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» implícito solo cuando aparezca en el contexto; este versículo no lo contiene.
  - Se prefirió «tabernáculo de reunión» como forma técnica consistente con el repertorio bíblico español del proyecto.
  - «Servicio» y «obra» se distinguen de manera deliberada para preservar la diferencia entre צָבָא y עֲבֹדָה.
  - La nota alternativa ofrece la posibilidad semántica de «deber» para לַצָּבָא, sin imponerla en el texto principal.
