base_translation:
  language: en
  yaml_path: translation/ot/zephaniah/001/001.yaml
  text: 'The word of Yahweh that came to Zephaniah son of Cushi[a], son of Gedaliah, son of Amariah, son of Hezekiah, in the days of Josiah son of Amon[b], king of Judah:'
  footnotes:
  - marker: a
    text: Hezekiah may refer to King Hezekiah, which would make Zephaniah of royal descent, but the text itself does not explicitly identify him as the king.
    reason: cross_reference
  - marker: b
    text: Cushi can also be understood as 'Cushite,' but here it is rendered as a personal name within the genealogy.
    reason: lexical_alternative
