translation:
  language: es
  text: Y en aquel día haré para ellos un pacto con las fieras del campo[a], con las aves de los cielos[b] y con los seres que se arrastran sobre la tierra; y quebraré el arco, la espada y la guerra de la tierra[c], y los haré reposar seguros.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Lit. «cortar un pacto». El hebreo usa «cortar» como modismo común para hacer un pacto.
    reason: lexical_alternative
  - marker: b
    text: O «las aves del cielo».
    reason: lexical_alternative
  - marker: c
    text: O «de la tierra» en sentido más amplio, «de la tierra entera».
    reason: lexical_alternative
lexical_decisions:
- source_word: וְכָרַתִּי
  english_pob_choice: I will make
  chosen_spanish: haré
  alternatives_spanish:
  - cortaré
  - estableceré
  lexicon: HALOT
  rationale: 'El hebreo כרת ברית es un modismo fijo: literalmente, «cortar un pacto». En español, «haré un pacto» comunica con naturalidad el acto pactal sin perder el sentido teológico; «cortaré» conservaría la metáfora pero sonaría menos idiomático en español moderno.'
- source_word: לָהֶם
  english_pob_choice: for them
  chosen_spanish: para ellos
  alternatives_spanish:
  - con ellos
  lexicon: HALOT
  rationale: La preposición ל indica beneficio/dirección («para/por»). «Para ellos» mantiene la distinción frente a עִם, que en el versículo introduce los grupos con los que se establece la relación.
- source_word: בְּרִית
  english_pob_choice: a covenant
  chosen_spanish: un pacto
  alternatives_spanish:
  - una alianza
  - un convenio
  lexicon: HALOT
  rationale: «Pacto» es el equivalente español más claro y teológicamente estable para בְּרִית. «Alianza» puede sonar más político o menos bíblico en algunos contextos; «convenio» no refleja bien la carga bíblica.
- source_word: בַּיּוֹם הַהוּא
  english_pob_choice: on that day
  chosen_spanish: en aquel día
  alternatives_spanish:
  - en ese día
  - aquel día
  lexicon: HALOT
  rationale: «En aquel día» conserva el valor profético-formal de la expresión hebrea y es natural en español bíblico contemporáneo.
- source_word: חַיַּת הַשָּׂדֶה
  english_pob_choice: the wild animals of the field
  chosen_spanish: las fieras del campo
  alternatives_spanish:
  - los animales salvajes del campo
  - las bestias del campo
  lexicon: HALOT
  rationale: חַיָּה puede ser animal o bestia. «Fieras» preserva el tono bíblico y la fuerza del hebreo, y «del campo» traduce bien הַשָּׂדֶה. «Bestias» es posible, pero en español suena más arcaizante o técnico.
- source_word: עוֹף הַשָּׁמַיִם
  english_pob_choice: the birds of the heavens
  chosen_spanish: las aves de los cielos
  alternatives_spanish:
  - las aves del cielo
  - las aves del firmamento
  lexicon: HALOT
  rationale: עוֹף abarca aves/animales voladores; «aves» es la equivalencia más natural. «De los cielos» sigue de cerca el plural hebreo y conserva el registro bíblico; «del cielo» sería más idiomático, pero perdería algo de la forma del original.
- source_word: רֶמֶשׂ הָאֲדָמָה
  english_pob_choice: the creeping things of the ground
  chosen_spanish: los reptiles de la tierra
  alternatives_spanish:
  - los animales que se arrastran sobre la tierra
  - los seres que se arrastran del suelo
  lexicon: HALOT
  rationale: רֶמֶשׂ designa criaturas que se arrastran. «Reptiles» en español bíblico amplio puede funcionar como término genérico para seres rastreros; «de la tierra» traduce אֲדָמָה con un término más general que «suelo» o «tierra cultivable», y mantiene el paralelismo con los otros ámbitos creados. Se deja abierta la tensión con la posible amplitud taxonómica del hebreo.
- source_word: וְקֶשֶׁת וְחֶרֶב וּמִלְחָמָה
  english_pob_choice: bow and sword and war
  chosen_spanish: el arco, la espada y la guerra
  alternatives_spanish:
  - el arco, la espada y la batalla
  - el arco y la espada, y la guerra
  lexicon: HALOT
  rationale: 'Se conservan los tres elementos como una acumulación poética: dos armas concretas y luego la guerra en sentido general. «Arco» y «espada» son los equivalentes directos; «guerra» retiene la abstracción final del hebreo.'
- source_word: אֶשְׁבּוֹר
  english_pob_choice: I will break
  chosen_spanish: quebraré
  alternatives_spanish:
  - romperé
  - haré pedazos
  lexicon: HALOT
  rationale: שבר significa romper/quebrar. «Quebraré» es claro en español y mantiene el valor directo del verbo sin exagerar la imagen.
- source_word: מִן הָאָרֶץ
  english_pob_choice: from the land
  chosen_spanish: de la tierra
  alternatives_spanish:
  - de la tierra cultivada
  - del país
  - de la tierra prometida
  lexicon: HALOT
  rationale: Aunque el contexto sugiere sentido territorial, aquí se opta por «tierra» porque el paralelismo con los animales y el cierre cósmico favorece un término más amplio, y porque el hebreo puede resonar también con la creación/territorio. Se conserva la tensión entre «land» y «earth» en español sin decidirla demasiado estrechamente.
- source_word: וְהִשְׁכַּבְתִּים
  english_pob_choice: I will make them lie down
  chosen_spanish: los haré dormir
  alternatives_spanish:
  - los haré acostarse
  - haré que se recuesten
  lexicon: HALOT
  rationale: El hiphil es causativo. «Los haré dormir» comunica el resultado de seguridad y reposo en un español natural; «acostarse» o «recostarse» son posibles, pero menos fluidos en la clausula final.
- source_word: לָבֶטַח
  english_pob_choice: in safety
  chosen_spanish: seguros
  alternatives_spanish:
  - en seguridad
  - con seguridad
  lexicon: HALOT
  rationale: El adverbio hebreo expresa seguridad/ausencia de temor. «Seguros» funciona de manera natural en español con el verbo de reposo y preserva la idea de seguridad estable.
theological_decisions:
- issue: Relación entre los beneficiarios del pacto y los compañeros del pacto
  english_pob_reading: The verse says God makes a covenant 'for them' with the animals, indicating the restored people benefit from a divinely established peace with creation.
  chosen_spanish_reading: Dios hace el pacto para ellos, con las criaturas mencionadas, de modo que el pueblo recibe el beneficio de una paz restaurada con la creación.
  alternative_spanish_readings:
  - Dios hace un pacto con ellos y con las criaturas
  - Dios hace un pacto directamente entre ellos y los animales
  rationale: 'Se mantiene la distinción entre לָהֶם y עִם: el pacto es «para ellos», mientras que las criaturas son las compañeras explícitas de esa nueva relación de paz. Esto evita borrar la sintaxis hebrea y la lectura de restauración relacional.'
  doctrine_reference: Restauración escatológica y paz entre el pueblo de Dios y la creación; cf. el motivo profético de armonía creadora.
- issue: Alcance de מִן הָאָרֶץ
  english_pob_reading: Rendered as 'land' rather than 'earth.'
  chosen_spanish_reading: Se traduce «de la tierra» para conservar una resonancia amplia, sin cerrar el pasaje solo al territorio ni solo al globo terráqueo.
  alternative_spanish_readings:
  - de la tierra/país
  - del país
  - de la tierra (territorio)
  rationale: El contexto inmediato es de restauración, paz y seguridad; sin embargo, el hebreo permite una amplitud que no conviene estrechar demasiado. «Tierra» en español deja oír tanto el sentido territorial como el de la creación, manteniendo la tensión interpretativa.
  doctrine_reference: Lectura profética de restauración que puede abarcar tanto el territorio de Israel como un eco creacional más amplio.
translation_notes:
  revision_awareness: Se siguió el estado revisado más reciente sin cambios sustanciales; la presente redacción mantiene el acuerdo alto del expediente inglés y conserva las decisiones léxicas y teológicas más relevantes, con adaptación natural al español.
  spanish_consistency_notes:
  - Se usa «pacto» para בְּרִית de manera consistente con el registro bíblico.
  - Se conserva «Yahvé» como norma general del proyecto, pero este versículo no contiene el Tetragrámaton.
  - Se mantiene la distinción entre «para ellos» y las frases con «con» para no borrar la sintaxis hebrea.
  - Se opta por un español bíblico moderno, evitando tanto arcaísmos excesivos como paráfrasis amplias.
