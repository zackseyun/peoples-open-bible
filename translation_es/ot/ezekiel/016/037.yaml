translation:
  language: es
  text: Por tanto, he aquí que estoy reuniendo a todos tus amantes, con quienes hallaste placer[a], y a todos los que amaste, junto con todos los que aborreciste; y los reuniré contra ti de todas partes, y descubriré tu desnudez[b] delante de ellos[c], y verán toda tu desnudez.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: “en quienes te deleitaste”. El verbo hebreo puede denotar tomar placer o deleitarse.'
    reason: lexical_alternative
  - marker: b
    text: 'Lenguaje profético de vergüenza: “descubrir la desnudez” expresa exposición pública y humillación.'
    reason: cultural_note
  - marker: c
    text: Es decir, se convoca para el juicio a todas las categorías de sus parejas ilícitas y también a sus enemigos.
    reason: cultural_note
lexical_decisions:
- source_word: לָכֵן
  english_pob_choice: Therefore
  chosen_spanish: Por tanto
  alternatives_spanish:
  - Por eso
  - Así que
  lexicon: HALOT
  rationale: Introduce la consecuencia del juicio anterior con tono inferencial y profético; “Por tanto” conserva la fuerza judicial de la conexión lógica sin sonar demasiado coloquial.
- source_word: הִנְנִי
  english_pob_choice: behold, I am
  chosen_spanish: he aquí que estoy
  alternatives_spanish:
  - mira, estoy
  - he aquí, estoy
  lexicon: HALOT
  rationale: La partícula anuncia solemnidad e inmediatez. “He aquí que estoy” mantiene el tono oracular del hebreo sin resultar forzado en español.
- source_word: מְקַבֵּץ
  english_pob_choice: am gathering
  chosen_spanish: estoy reuniendo
  alternatives_spanish:
  - estoy juntando
  - reúno
  lexicon: HALOT
  rationale: El participio con הִנְנִי expresa acción inminente o segura. “Estoy reuniendo” comunica proceso en curso y conserva el valor aspectual.
- source_word: מְאַהֲבַיִךְ
  english_pob_choice: your lovers
  chosen_spanish: tus amantes
  alternatives_spanish:
  - tus amadores
  - tus amantes sexuales
  lexicon: HALOT
  rationale: En Ezequiel 16 la imagen es metafórica, sexual y de infidelidad de pacto. “Amantes” reproduce la carga acusatoria y evita suavizarla con “aliados” o “amigos”.
- source_word: אֲשֶׁר עָרַבְתְּ עֲלֵיהֶם
  english_pob_choice: with whom you found pleasure
  chosen_spanish: con quienes hallaste placer
  alternatives_spanish:
  - en quienes te deleitaste
  - con quienes te complaciste
  lexicon: HALOT
  rationale: El verbo aquí expresa tomar placer o deleite. “Hallaste placer” sigue de cerca la decisión inglesa y mantiene la ambigüedad entre agrado y deseo sin explicitar más de lo que el hebreo warrants.
- source_word: וְאֵת כָּל אֲשֶׁר אָהַבְתְּ
  english_pob_choice: and all whom you loved
  chosen_spanish: y a todos los que amaste
  alternatives_spanish:
  - y a todos a quienes amaste
  - y también a todos los que amaste
  lexicon: HALOT
  rationale: Conserva el segundo grupo como objeto personal del amor, de forma directa y natural en español.
- source_word: עַל כָּל אֲשֶׁר שָׂנֵאת
  english_pob_choice: along with all whom you hated
  chosen_spanish: junto con todos los que aborreciste
  alternatives_spanish:
  - así como todos los que odiaste
  - junto a todos los que odiaste
  lexicon: HALOT
  rationale: La preposición funciona de manera inclusiva en la lista. “Junto con” transmite la adición; “aborreciste” conserva una intensidad adecuada al registro profético.
- source_word: וְקִבַּצְתִּי אֹתָם עָלַיִךְ מִסָּבִיב
  english_pob_choice: and I will gather them against you from every side
  chosen_spanish: y los reuniré contra ti de todos lados
  alternatives_spanish:
  - y los reuniré contra ti desde todos lados
  - y los juntar é contra ti por todas partes
  lexicon: HALOT
  rationale: En contexto judicial, עָלַיִךְ es adversativo, no solo direccional. “Contra ti” preserva el sentido de juicio; “de todos lados” refleja מִסָּבִיב con naturalidad.
- source_word: וְגִלֵּיתִי עֶרְוָתֵךְ
  english_pob_choice: and I will uncover your nakedness
  chosen_spanish: y descubriré tu desnudez
  alternatives_spanish:
  - y descubriré tu vergüenza
  - y pondré al descubierto tu desnudez
  lexicon: HALOT
  rationale: “Descubrir” conserva el verbo figurado de exposición vergonzosa. “Desnudez” mantiene el lenguaje concreto de vergüenza profética sin neutralizarlo.
- source_word: אֲלֵהֶם
  english_pob_choice: to them
  chosen_spanish: delante de ellos
  alternatives_spanish:
  - ante ellos
  - en su presencia
  lexicon: HALOT
  rationale: Aunque literalmente es “a ellos”, en español la exposición se expresa naturalmente como ocurrida en su presencia. “Delante de ellos” hace explícita la escena sin alterar el referente.
- source_word: וְרָאוּ אֶת כָּל עֶרְוָתֵךְ
  english_pob_choice: and they will see all your nakedness
  chosen_spanish: y verán toda tu desnudez
  alternatives_spanish:
  - y verán toda tu vergüenza
  - y verán toda tu desnudez
  lexicon: HALOT
  rationale: Retiene la repetición enfática de עֶרְוָה y el efecto de humillación pública. “Toda tu desnudez” es literal, enfático y coherente con el registro del pasaje.
theological_decisions:
- issue: Metáfora profética de vergüenza sexual en el juicio sobre Jerusalén
  english_pob_reading: Retain the concrete language of 'lovers' and 'nakedness' rather than softening into purely political terms.
  chosen_spanish_reading: Conservar “amantes” y “desnudez” en lugar de neutralizarlos como “aliados” o “deshonra”.
  alternative_spanish_readings:
  - aliados y vergüenza
  - socios y humillación
  rationale: El capítulo usa deliberadamente imaginería conyugal y sexual para denunciar la infidelidad de pacto y la exposición pública. Mantener esa concreción preserva la fuerza retórica y teológica del texto.
  doctrine_reference: Translation philosophy §§1, 3, 6
translation_notes:
  revision_awareness: El estado de revisión más reciente indica que no se hicieron cambios adicionales y que existe alto acuerdo entre revisores; este borrador sigue de cerca la lectura inglesa auditada sin introducir ampliaciones no sustentadas.
  spanish_consistency_notes:
  - Se mantiene “Yahvé” solo cuando el nombre divino aparece explícitamente; este versículo no lo contiene.
  - 'Se preserva el paralelismo acumulativo de los tres grupos: amantes, amados y aborrecidos.'
  - Se evita suavizar el lenguaje sexual y judicial del pasaje, en línea con la filosofía de equivalencia óptima del POB.
  - La repetición de “desnudez” reproduce el énfasis hebreo de עֶרְוָה sin sustituirlo por un eufemismo.
