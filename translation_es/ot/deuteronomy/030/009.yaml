review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador conserva bien la estructura y el sentido global del hebreo: abundancia en el trabajo, en la descendencia, en el ganado y en la tierra, y el retorno del gozo de Yahvé sobre Israel. También respeta correctamente Yahvé y «tus padres». Sin embargo, dos giros principales reproducen demasiado literalmente el inglés/hebreo y suenan poco idiomáticos en español: «gozarse sobre ti» y «se gozó sobre tus padres».'
  spanish_quality_summary: La redacción es generalmente clara y digna, pero «la obra de tu mano» suena algo rígido y, sobre todo, «volverá a gozarse sobre ti» no es español natural en registro bíblico moderno. «Se alegrará por ti»/«se regocijará por ti» comunica mejor el sentido de שושׂ על sin perder fidelidad. El resto del verso es legible y adecuado.
  glossary_alignment: 'Alineación buena con la terminología del proyecto: יְהוָה -> «Yahvé» correctamente; אֲבֹתֶיךָ -> «tus padres» preservado conforme a la política gender-accurate. No hay conflictos teológicos relevantes. La elección «ganado» para בְהֶמְתְּךָ y «suelo» para אַדְמָתְךָ es aceptable. La nota sobre «tus padres» también está bien encaminada.'
  issues:
  - severity: medium
    issue: «volverá a gozarse sobre ti» es poco natural en español
    rationale: Aunque intenta reflejar לָשׂוּשׂ עָלֶיךָ de forma formal, «gozarse sobre» no es una construcción idiomática en español contemporáneo y dificulta la lectura sin aportar precisión necesaria.
  - severity: medium
    issue: «como se gozó sobre tus padres» repite el mismo problema idiomático
    rationale: La frase suena forzada y puede distraer del paralelismo del verso. «como se alegró por tus padres» o «como se regocijó por tus padres» preserva mejor el sentido en español.
  - severity: low
    issue: La explicación de la nota b («padres fundadores») es algo interpretativa
    rationale: El inglés auditado habla de «forefathers or ancestors of Israel». «Padres fundadores» estrecha la referencia más de lo necesario; conviene una formulación más directa como «los antepasados de Israel».
  revised_spanish_text: Yahvé tu Dios te hará abundar en toda la obra de tu mano[a], en el fruto de tu vientre, en el fruto de tu ganado y en el fruto de tu suelo, para bien; porque Yahvé volverá a alegrarse por ti para bien[b], como se alegró por tus padres.
  revised_footnotes:
  - marker: a
    text: O «te dará en abundancia» / «te prosperará»; el verbo hebreo expresa causar abundancia o excedente.
    reason: lexical_alternative
  - marker: b
    text: Hebreo «tus padres»; es decir, los antepasados de Israel.
    reason: lexical_alternative
  revision_rationale: 'Se ajusta únicamente la expresión de gozo divino para lograr español natural y fiel: «alegrarse por» transmite bien el sentido de regocijarse sobre alguien sin el calco poco idiomático «gozarse sobre». También se suaviza la nota b para evitar una interpretación demasiado estrecha. El resto del borrador puede mantenerse.'
