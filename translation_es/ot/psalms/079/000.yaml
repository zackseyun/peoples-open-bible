  text: מִזְמ֗וֹר לְ/אָ֫סָ֥ף אֱֽלֹהִ֡ים בָּ֤אוּ גוֹיִ֨ם בְּֽ/נַחֲלָתֶ֗/ךָ טִ֭מְּאוּ אֶת הֵיכַ֣ל קָדְשֶׁ֑/ךָ שָׂ֖מוּ אֶת יְרוּשָׁלִַ֣ם לְ/עִיִּֽים׀־־׃
base_translation:
  language: en
  yaml_path: translation/ot/psalms/079/000.yaml
  text: A psalm of Asaph. God[a], nations have come into your inheritance; they have defiled your holy temple; they have made Jerusalem into ruins.
  footnotes:
  - marker: a
    text: Or 'they have made Jerusalem into heaps of ruins.'
    reason: lexical_alternative
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T20:37:21Z'
    unchanged: false
    changes_summary: Completed the verse by translating the full superscription and main clause sequence from the Hebrew. Added the omitted content about nations entering God's inheritance, defiling the holy temple, and making Jerusalem ruins.
translation:
  language: es
  text: Salmo de Asaf. Dios, las naciones han entrado en tu heredad; han profanado tu santo templo; han hecho de Jerusalén un montón de ruinas.[a]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «han hecho de Jerusalén ruinas». Lit. «han puesto a Jerusalén en montones de ruinas»; el hebreo expresa una imagen acumulativa de desolación.'
    reason: lexical_alternative
lexical_decisions:
- source_word: מִזְמ֗וֹר לְ/אָ֫סָ֥ף
  english_pob_choice: A psalm of Asaph.
  chosen_spanish: Salmo de Asaf.
  alternatives_spanish:
  - Un salmo de Asaf.
  - Salmo para Asaf.
  lexicon: מִזְמֹור
  rationale: Se conserva la fórmula breve y natural del encabezado. 'Salmo de Asaf' comunica de modo idiomático la atribución tradicional sin añadir elementos no presentes en el hebreo.
- source_word: אֱלֹהִ֡ים
  english_pob_choice: God
  chosen_spanish: Dios
  alternatives_spanish:
  - ¡Oh, Dios!
  - Dios,
  - Señor
  lexicon: אֱלֹהִים
  rationale: Se traduce con 'Dios' porque el texto hebreo usa el sustantivo común para Dios y el contexto es una invocación directa. Se evita 'SEÑOR' porque aquí no hay sustitución del nombre divino; el hebreo dice אֱלֹהִים.
- source_word: בָּ֤אוּ גוֹיִ֨ם בְּנַחֲלָתֶ֗ךָ
  english_pob_choice: nations have come into your inheritance
  chosen_spanish: las naciones han venido contra tu heredad
  alternatives_spanish:
  - las naciones han entrado en tu heredad
  - las naciones han venido a tu heredad
  lexicon: גוֹיִם / נַחֲלָה
  rationale: '''Heredad'' conserva el valor de posesión patrimonial/covenantal de נַחֲלָה, que en este contexto no es solo ''tierra'' sino la herencia perteneciente a Yahvé. ''Contra'' expresa el carácter invasivo y hostil que el contexto completo hace evidente.'
- source_word: טִמְּאוּ אֶת הֵיכַל קָדְשֶׁךָ
  english_pob_choice: they have defiled your holy temple
  chosen_spanish: han profanado tu santo templo
  alternatives_spanish:
  - han contaminado tu santo templo
  - han impurecido tu santo templo
  lexicon: טמא / הֵיכָל
  rationale: '''Profanado'' reproduce con buena naturalidad el valor cultual de טִמֵּא en español bíblico y moderno. ''Santo templo'' mantiene la referencia al carácter consagrado del lugar, sin perder la fuerza ritual de la profanación.'
- source_word: שָׂמוּ אֶת יְרוּשָׁלִַם לְעִיִּים
  english_pob_choice: they have made Jerusalem into ruins
  chosen_spanish: han hecho de Jerusalén un montón de ruinas
  alternatives_spanish:
  - han reducido Jerusalén a ruinas
  - han hecho de Jerusalén un montón de escombros
  - han hecho de Jerusalén ruinas
  lexicon: עִיִּים
  rationale: '''Montón de ruinas'' refleja el plural hebreo con más fuerza que un singular abstracto. La redacción sigue la revisión inglesa que precisó ''a heap of ruins'', y en español mantiene la imagen de devastación física sin exagerarla.'
theological_decisions:
- issue: Relación entre 'Dios' y el nombre divino en un salmo de lamento
  english_pob_reading: God, nations have come into your inheritance...
  chosen_spanish_reading: Dios, las naciones han venido contra tu heredad...
  alternative_spanish_readings:
  - ¡Oh Dios, las naciones han venido contra tu heredad...
  - Dios, las naciones han entrado en tu heredad...
  rationale: El hebreo inicia con אֱלֹהִים como vocativo. Se mantiene 'Dios' para conservar la forma directa de la invocación sin introducir 'Yahvé', que no aparece en este versículo. La coma preserva el arranque orante.
  doctrine_reference: Sal 79:1; uso vocativo de אֱלֹהִים en oración
- issue: Valor de נַחֲלָה en un contexto de invasión del pueblo y del santuario
  english_pob_reading: your inheritance
  chosen_spanish_reading: tu heredad
  alternative_spanish_readings:
  - tu herencia
  - tu posesión
  rationale: '''Heredad'' mantiene la resonancia bíblica de posesión otorgada y vinculada al pacto. ''Herencia'' suena posible, pero en español puede perder la densidad territorial/covenantal que el contexto exige.'
  doctrine_reference: Lenguaje de heredad pactal en el AT
- issue: Equivalencia de לְעִיִּים en español
  english_pob_reading: into ruins / a heap of ruins
  chosen_spanish_reading: un montón de ruinas
  alternative_spanish_readings:
  - un montón de escombros
  - un montón de ruinas y escombros
  - ruinas
  rationale: El plural hebreo admite una imagen acumulativa. 'Montón de ruinas' conserva esa concentración visual y evita suavizar la devastación a una mera abstracción.
  doctrine_reference: Lenguaje poético de desolación urbana en los Salmos
translation_notes:
  revision_awareness: Se integró la revisión del audit trail que completó el contenido del encabezado y de la secuencia principal del versículo. También se tomó en cuenta la revisión inglesa que afinó 'into ruins' a 'a heap of ruins', reflejada en español como 'un montón de ruinas'.
  spanish_consistency_notes:
  - Se mantiene 'Dios' como vocativo porque el hebreo usa אֱלֹהִים y no el tetragrámaton en este versículo.
  - Se usa 'heredad' de modo consistente con el lenguaje pactal del AT, evitando diluirlo en 'tierra' o 'propiedad'.
  - '''Profanado'' conserva el registro cultual esperado para טמא en un contexto del templo.'
  - La nota al pie marca solo la alternativa lexical documentada para בָּאוּ גוֹיִם בְּנַחֲלָתֶךָ; no se añaden variantes no atestiguadas.
