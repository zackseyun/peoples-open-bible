    text: «Has abierto tu boca a Yahvé» es un modismo hebreo para hacer un voto solemne hablado.
    reason: cultural_note
  - marker: b
    text: O «contra los amonitas»; el hebreo dice literalmente «de/sobre los hijos de Amón».
    reason: lexical_alternative
  revision_rationale: 'Se reubican y corrigen las notas para reflejar la auditoría inglesa y la disciplina de anclaje: el modismo del voto recibe la nota cultural pertinente, y la alternativa léxica se ancla en «hijos de Amón». Además, se mejora la naturalidad y claridad de עֲשֵׂה לִי con «haz conmigo» sin perder la fuerza del hebreo ni resolver la tensión teológica del pasaje.'
