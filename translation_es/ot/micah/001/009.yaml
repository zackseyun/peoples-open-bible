translation:
  language: es
  text: Porque su herida[a] es incurable, pues ha llegado hasta Judá; ha llegado hasta la puerta de mi pueblo[b], hasta Jerusalén.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «sus heridas son incurables»; la forma hebrea de «heridas» es plural, aunque el sentido puede ser colectivo.
    reason: lexical_alternative
  - marker: b
    text: O «ha tocado la puerta de mi pueblo».
    reason: lexical_alternative
lexical_decisions:
- source_word: אֲנוּשָׁה
  english_pob_choice: incurable
  chosen_spanish: incurable
  alternatives_spanish:
  - grave
  - desesperada
  - inremediable
  lexicon: HALOT
  rationale: El adjetivo describe una condición que no puede sanar; en español, «incurable» conserva con precisión el valor médico-propético y encaja con «herida» sin añadir matices no requeridos.
- source_word: מַכּוֹתֶיהָ
  english_pob_choice: her wound
  chosen_spanish: su herida
  alternatives_spanish:
  - sus heridas
  - su golpe
  lexicon: HALOT
  rationale: Aunque la forma hebrea es plural, el contexto permite un sentido colectivo. En español, el singular «herida» mantiene la imagen de una calamidad única y personificada, como en la decisión inglesa de sentido colectivo.
- source_word: בָאָה
  english_pob_choice: it has come
  chosen_spanish: ha llegado
  alternatives_spanish:
  - ha venido
  - vino
  lexicon: HALOT
  rationale: El verbo perfecto expresa una acción ya avanzada con efecto presente. «Ha llegado» comunica bien la aproximación del juicio en español natural.
- source_word: עַד יְהוּדָה
  english_pob_choice: as far as Judah
  chosen_spanish: hasta Judá
  alternatives_spanish:
  - a Judá
  - hasta el límite de Judá
  lexicon: HALOT
  rationale: «Hasta» reproduce la idea de extensión o límite expresada por עַד y suena idiomático en español.
- source_word: נָגַע
  english_pob_choice: it has reached
  chosen_spanish: ha alcanzado
  alternatives_spanish:
  - ha tocado
  - ha llegado
  lexicon: HALOT
  rationale: El verbo puede significar tocar, alcanzar o llegar. Aquí «ha alcanzado» conserva la imagen de contacto con el límite sin forzar un matiz más concreto que el hebreo.
- source_word: שַׁעַר
  english_pob_choice: the gate
  chosen_spanish: la puerta
  alternatives_spanish:
  - la puerta de la ciudad
  - el portón
  lexicon: HALOT
  rationale: En español moderno «puerta» comunica de forma clara la metáfora de acceso/umbral; «puerta de la ciudad» sería una amplificación interpretativa. Se conserva la concreción del término hebreo sin excesiva explicación.
- source_word: עַמִּי
  english_pob_choice: my people
  chosen_spanish: mi pueblo
  alternatives_spanish:
  - mi gente
  - mi nación
  lexicon: HALOT
  rationale: La forma con sufijo de primera persona exige conservar la posesión. «Mi pueblo» refleja mejor el tono profético y pactual que «mi nación».
- source_word: יְרוּשָׁלִָם
  english_pob_choice: Jerusalem
  chosen_spanish: Jerusalén
  alternatives_spanish:
  - Jerusalem
  lexicon: Standard Spanish proper name
  rationale: Se usa la forma habitual en español bíblico y eclesial.
theological_decisions:
- issue: Sujeto personificado y alternancia entre herida y calamidad
  english_pob_reading: The verse speaks of the personified afflicted city/nation, rendered with impersonal English for the calamity.
  chosen_spanish_reading: El versículo conserva la personificación de la ciudad/nación afligida mediante «su herida», pero luego usa un verbo con sujeto implícito que en español queda naturalmente como el avance de la calamidad.
  alternative_spanish_readings:
  - Porque ella está incurable de sus heridas
  - Porque su herida es incurable, porque ella ha llegado...
  rationale: El hebreo alterna entre formas feminas/personificadas y una secuencia que puede entenderse de manera impersonal. La redacción española mantiene la tensión sin explicitar demasiado el sujeto, para no borrar la personificación ni sonar artificial.
  doctrine_reference: Profecía de juicio; personificación poética del pueblo/capital afligida
- issue: Plural hebreo en «heridas» frente a singular colectivo
  english_pob_reading: Or 'her wounds are incurable'; the Hebrew form for 'wounds' is plural, though the sense may be collective.
  chosen_spanish_reading: «Su herida» en el texto principal, con nota sobre la posible lectura plural «sus heridas».
  alternative_spanish_readings:
  - sus heridas
  - su herida
  rationale: El español necesita decidir entre naturalidad y correspondencia morfológica. Se privilegia el singular colectivo para una lectura fluida, pero se deja constancia de la alternativa plural por transparencia textual.
  doctrine_reference: Plural de intensidad/colectivo en hebreo bíblico
translation_notes:
  revision_awareness: 'Coincide con la revisión más reciente del POB inglés: no se detectaron cambios necesarios en el sentido base. La versión española refleja esa estabilidad textual y conserva las dos tensiones principales del hebreo: el plural colectivo de «heridas» y la posible alternancia entre «alcanzar» y «tocar» la puerta.'
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» por norma del proyecto solo cuando aparezca el nombre divino; en este versículo no aplica.
  - Se prefirió «mi pueblo» frente a «mi gente» por resonancia pactual y por concordancia con el audit trail inglés.
  - «Jerusalén» se conserva como nombre propio estándar en español.
  - La puntuación y el orden de cláusulas siguen una cadencia bíblica natural en español sin calcar el inglés.
