translation:
  language: es
  text: Estos son los estatutos que Yahvé mandó a Moisés respecto a un hombre y su mujer[a][b], y respecto a un padre y su hija, en su juventud, en la casa de su padre.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, más literalmente: «entre un hombre y su mujer, y entre un padre y su hija».'
    reason: lexical_alternative
  - marker: b
    text: «En su juventud» se refiere al período cuando la hija todavía vive en la casa de su padre.
    reason: cultural_note
lexical_decisions:
- source_word: אֵלֶּה
  english_pob_choice: These are
  chosen_spanish: Estas son
  alternatives_spanish:
  - Estas
  lexicon: HALOT
  rationale: El hebreo introduce una formulación resumidora en plural deíctico; en español, 'Estas son' evita una frase nominal elíptica poco natural y conserva el valor deíctico.
- source_word: הַחֻקִּים
  english_pob_choice: the statutes
  chosen_spanish: las leyes
  alternatives_spanish:
  - los estatutos
  - las ordenanzas
  lexicon: HALOT
  rationale: חֻקִּים apunta a disposiciones normativas fijas. 'Leyes' comunica bien el registro jurídico en español y es más natural para lectores amplios; 'estatutos' se reserva si se quisiera mantener un eco técnico más estrecho.
- source_word: צִוָּה
  english_pob_choice: commanded
  chosen_spanish: mandó
  alternatives_spanish:
  - ordenó
  - comandó
  lexicon: HALOT
  rationale: El verbo de mandato se expresa con claridad y naturalidad en español mediante 'mandó'. Conserva la fuerza normativa sin sonar forzado.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  lexicon: HALOT
  rationale: 'Se conserva el nombre divino en forma española establecida en el proyecto: ''Yahvé'', en vez de sustituirlo por un título como ''el SEÑOR''.'
- source_word: אֶת מֹשֶׁה
  english_pob_choice: Moses
  chosen_spanish: a Moisés
  alternatives_spanish:
  - Moisés
  lexicon: HALOT
  rationale: El objeto directo del verbo de mandato es Moisés; en español, la preposición 'a' hace explícita la relación sintáctica de forma idiomática.
- source_word: בֵּין אִישׁ לְאִשְׁתּוֹ
  english_pob_choice: concerning a man and his wife
  chosen_spanish: entre un hombre y su mujer
  alternatives_spanish:
  - entre un marido y su mujer
  - concerniente a un hombre y su mujer
  lexicon: HALOT
  rationale: Se conserva el valor literal de בֵּין ('entre'), que la POB inglesa interpretó de manera más funcional como 'concerning'. 'Hombre' mantiene el paralelismo legal del hebreo; 'mujer' traduce el sustantivo relacional sin necesidad de explicar 'esposa'.
- source_word: בֵּין אָב לְבִתּוֹ
  english_pob_choice: and concerning a father and his daughter
  chosen_spanish: entre un padre y su hija
  alternatives_spanish:
  - concerniente a un padre y su hija
  lexicon: HALOT
  rationale: Se mantiene el paralelismo con la primera frase y la literalidad de בֵּין. 'Hija' reproduce el vínculo familiar-jurídico sin añadir matices no presentes en el hebreo.
- source_word: בִּנְעֻרֶיהָ
  english_pob_choice: in her youth
  chosen_spanish: en su juventud
  alternatives_spanish:
  - cuando era joven
  - durante su juventud
  lexicon: HALOT
  rationale: La expresión señala el período de juventud de la hija. 'En su juventud' es natural en español y conserva la referencia temporal; no se explicita 'muchacha' para no estrechar indebidamente el sentido.
- source_word: בֵּית אָבִיהָ
  english_pob_choice: in her father's house
  chosen_spanish: en la casa de su padre
  alternatives_spanish:
  - en casa de su padre
  - en la casa paterna
  lexicon: HALOT
  rationale: La construcción apunta al ámbito doméstico bajo autoridad paterna. 'En la casa de su padre' conserva el sentido relacional y legal del hebreo de modo transparente.
theological_decisions:
- issue: Uso del nombre divino יהוה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - el SEÑOR
  rationale: El texto hebreo contiene el Tetragrama de manera directa; la versión española debe preservar el nombre propio del pacto. 'Yahvé' es la forma de uso estable en el proyecto español y evita la sustitución por un título.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Valor relacional de בֵּין en un resumen legal
  english_pob_reading: concerning a man and his wife / and concerning a father and his daughter
  chosen_spanish_reading: entre un hombre y su mujer / entre un padre y su hija
  alternative_spanish_readings:
  - concerniente a un hombre y su mujer / concerniente a un padre y su hija
  rationale: La POB inglesa suaviza בֵּין con 'concerning' para inglés natural. En español, mantener 'entre' preserva la estructura hebrea y deja visible la relación jurídica subyacente sin perder inteligibilidad.
  doctrine_reference: DOCTRINE.md Translation philosophy §4
translation_notes:
  revision_awareness: La revisión más reciente indica que no se requirieron cambios y el cotejo cruzado mostró alto acuerdo; por eso el borrador sigue de cerca el hebreo y la lectura auditada en inglés, conservando las decisiones clave del nombre divino y de la estructura relacional legal.
  spanish_consistency_notes:
  - Se usa 'Yahvé' de forma consistente para יְהוָה.
  - Se prefirió 'leyes' por naturalidad española, aunque 'estatutos' queda reflejado en las decisiones léxicas.
  - Se conservó la repetición de 'entre' para reflejar la estructura hebrea y la tensión jurídica del pasaje.
  - La nota al pie mantiene la alternativa literal que la POB inglesa documentó como más literal.
