  text: 그러나 모두가 예언한다면, 어떤 믿지 않는 자나 알지 못하는 사람이 들어올 때에 그는 모두에게서 책망을 받고, 모두에게서 살펴짐을 받습니다.
  philosophy: optimal-equivalence
