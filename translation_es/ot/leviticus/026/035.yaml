  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura hebrea: totalidad temporal («Todos los días de»), desolación de la tierra, descanso/reposo de la tierra, y la cláusula temporal final sobre habitar en ella. Sin embargo, no preserva con exactitud la segunda persona plural de בְּשַׁבְּתֹתֵיכֶם / בְּשִׁבְתְּכֶם, porque usa «sus» y «habitabais», combinación pronominal inconsistente en español moderno y menos clara para lector eclesial general.'
  spanish_quality_summary: 'El español es mayormente claro, pero «durante sus sábados» introduce ambigüedad posesiva y la mezcla «sus… habitabais» es estilísticamente defectuosa. Además, los marcadores de notas a y b están invertidos respecto al rastro inglés: la nota sobre «sus sábados» debe anclarse en «sábados», y la alternativa formal debe anclarse en la cláusula verbal principal. Conviene modernizar a «ustedes» para neutralidad latinoamericana amplia.'
  glossary_alignment: 'No hay conflicto con la terminología base del proyecto. «Reposará»/«reposo» preserva bien שׁבת. La referencia a los «sábados» de la tierra debe mantenerse con nota aclaratoria, pero con posesivo de segunda persona plural coherente en español: «sus sábados» junto con «ustedes vivían en ella» o similar.'
  issues:
  - severity: medium
    issue: Inconsistencia de persona y registro en «sus sábados… habitabais».
    rationale: El hebreo tiene segunda persona plural en ambas expresiones. En español neutral moderno, mezclar posesivo de «ustedes» con verbo de «vosotros» resulta poco natural y confuso.
  - severity: medium
    issue: Anclaje de notas no corresponde al contenido del rastro inglés.
    rationale: La nota equivalente a English footnote b explica «your Sabbaths» y debe ir sobre «sábados». La nota de alternativa formal corresponde a la cláusula con «reposará»/«el reposo».
  - severity: low
    issue: «Habitabais» suena peninsular/arcaizante para el objetivo latinoamericano amplio.
    rationale: La guía pide español neutral latinoamericano y legible en iglesia amplia; «mientras ustedes vivían en ella» es más natural sin perder dignidad.
  revised_spanish_text: Todos los días de su desolación reposará[a]—el reposo que no tuvo durante sus sábados[b], mientras ustedes vivían en ella.
  revised_footnotes:
