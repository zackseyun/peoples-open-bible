translation:
  language: es
  text: Yo soy Rafael, uno de los siete ángeles santos que presentan las oraciones de los consagrados[a] y entran ante la gloria del Santo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O ‘los santos’. La expresión griega significa literalmente ‘los santos’ o ‘los consagrados’, es decir, el pueblo santo de Dios.
    reason: lexical_alternative
lexical_decisions:
- source_word: Ῥαφαήλ
  english_pob_choice: Raphael
  chosen_spanish: Rafael
  alternatives_spanish:
  - Raphael
  lexicon: nombre propio transliterado
  rationale: Se conserva el nombre propio mediante transliteración adaptada al uso español, manteniendo la identificación del ángel sin traducirlo.
- source_word: εἷς ἐκ τῶν ἑπτὰ
  english_pob_choice: one of the seven
  chosen_spanish: uno de los siete
  alternatives_spanish:
  - uno entre los siete
  - uno de entre los siete
  lexicon: expresión partitiva
  rationale: La construcción partitiva se reproduce de forma natural en español y preserva la especificidad numérica del texto griego.
- source_word: ἁγίων ἀγγέλων
  english_pob_choice: holy angels
  chosen_spanish: ángeles santos
  alternatives_spanish:
  - ángeles sagrados
  lexicon: ἅγιος
  rationale: ‘Santos’ refleja directamente ἅγιος y mantiene el orden natural del español sin perder la referencia a la santidad de estos seres.
- source_word: προσαναφέρουσιν
  english_pob_choice: present
  chosen_spanish: presentan
  alternatives_spanish:
  - ofrecen
  - llevan
  lexicon: προσαναφέρω
  rationale: ‘Presentan’ comunica la idea de llevar ante la presencia divina sin forzar un matiz sacrificial que el contexto no exige explícitamente.
- source_word: τὰς προσευχὰς
  english_pob_choice: the prayers
  chosen_spanish: las oraciones
  alternatives_spanish:
  - las plegarias
  - las súplicas
  lexicon: προσευχή
  rationale: ‘Oraciones’ es un equivalente claro y natural en español para προσευχή, manteniendo la referencia amplia a la comunicación devocional con Dios.
- source_word: τῶν ἁγίων
  english_pob_choice: the holy ones
  chosen_spanish: de los santos
  alternatives_spanish:
  - de los santos de Dios
  - de los fieles
  lexicon: ἅγιος
  rationale: Aunque el contexto puede leerse como ‘los santos’ en español, se conserva la misma fuerza del término griego y su uso bíblico común; la alternativa ‘los santos’ es idiomática y no añade una distinción no presente en el griego.
- source_word: εἰσπορεύονται ἐνώπιον
  english_pob_choice: enter before
  chosen_spanish: entran delante de
  alternatives_spanish:
  - entran ante
  - entran en la presencia de
  lexicon: εἰσπορεύομαι + ἐνώπιον
  rationale: ‘Entran delante de’ conserva la idea de acceso a la presencia superior con un giro español fluido; evita expandir el texto a ‘en la presencia de’ más de lo necesario.
- source_word: τῆς δόξης
  english_pob_choice: the glory
  chosen_spanish: de la gloria
  alternatives_spanish:
  - de la majestad
  - de la gloria divina
  lexicon: δόξα
  rationale: ‘Gloria’ mantiene visible el sustantivo griego y su valor bíblico de resplandor/presencia exaltada.
- source_word: τοῦ ἁγίου
  english_pob_choice: the Holy One
  chosen_spanish: del Santo
  alternatives_spanish:
  - del Santo Dios
  - del Santo Uno
  lexicon: ὁ ἅγιος como título divino
  rationale: El griego singular con artículo funciona reverencialmente como título divino. En español, ‘el Santo’ es conciso y mantiene esa referencia sin añadir explicación interpretativa en el texto principal.
theological_decisions:
- issue: Referencia de ‘el Santo’ al final de la frase
  english_pob_reading: A divine title referring to God
  chosen_spanish_reading: Título divino referido a Dios
  alternative_spanish_readings:
  - adjetivo sustantivado con referencia implícita
  - circunloquio reverencial sin titularidad explícita
  rationale: El contexto de corte celestial y el paralelo con la gloria indican que la expresión apunta a Dios. ‘El Santo’ conserva la ambigüedad reverencial del griego y evita resolverla con una paráfrasis más explícita de lo que el texto exige.
  doctrine_reference: Mantener la tensión textual y la reverencia del original; no expandir más allá del griego.
- issue: Traducción de τῶν ἁγίων
  english_pob_reading: the holy ones
  chosen_spanish_reading: de los santos
  alternative_spanish_readings:
  - de los santos de Dios
  - de los consagrados
  rationale: Aunque ‘santos’ puede asociarse también a un uso eclesial posterior, en español es la forma más directa y bíblica para reflejar τῶν ἁγίων; aquí no introduce una doctrina ajena al pasaje.
  doctrine_reference: Primacía del término original con equivalencia idiomática natural en español.
translation_notes:
  revision_awareness: Este borrador sigue de cerca el texto griego de Swete y el expediente auditado en inglés. Se conserva la estructura de una afirmación identificativa seguida de dos participios coordinados. La única decisión interpretativa destacada es la frase final, donde τοῦ ἁγίου se traduce reverencialmente como ‘el Santo’ para reflejar un título divino sin sobreexplicación. No se registran revisiones previas en el expediente inglés, y el borrador español no introduce cambios sustantivos respecto del sentido auditado.
  spanish_consistency_notes:
  - Se mantiene ‘santos’ para ἅγιοι/ἅγιοι ἄγγελοι en todo el versículo para preservar la red semántica del término.
  - Se usa ‘gloria’ de manera uniforme para δόξα, evitando equivalentes interpretativos como ‘presencia gloriosa’.
  - ‘Rafael’ se adapta a la ortografía española estándar; no se castellaniza de forma arcaica ni se deja la grafía inglesa.
  - El marcador de nota a se coloca en el nombre propio siguiendo el patrón auditado en inglés para la alternativa lexical sobre ‘the holy ones’.
