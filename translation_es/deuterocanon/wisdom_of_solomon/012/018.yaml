    reason: lexical_alternative
  revision_rationale: Se corrigen los anclajes de notas para que correspondan al término explicado. Se sustituye «mansedumbre» por «gentileza» para reflejar mejor ἐπιείκεια, preservando la alternativa «clemencia» en nota. Se cambia «gran indulgencia» por «gran moderación» para representar mejor φειδώ como contención/mesura. Se mantiene «dueño de la fuerza» y «tuya es la capacidad» porque preservan la distinción léxica del griego y son comprensibles en español bíblico moderno. Se suaviza «cuando tú quieres» a «cuando quieres» por naturalidad.
