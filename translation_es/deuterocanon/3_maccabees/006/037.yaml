translation:
  language: es
  text: Y se acercaron al rey, pidiendo que los dejaran ir a sus propios hogares[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «a sus propios lugares». La expresión griega εἰς τὰ ἴδια puede referirse de manera más amplia a lo que pertenece a alguien; aquí probablemente significa volver a casa.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐνέτυχον
  english_pob_choice: approached
  chosen_spanish: se acercaron
  alternatives_spanish:
  - se presentaron ante
  - se dirigieron a
  - acudieron a
  lexicon: LSJ
  rationale: El verbo puede expresar acercarse, presentarse ante alguien o interceder/pedir audiencia. «Se acercaron» conserva la idea de acceso directo al rey sin forzar un matiz jurídico más preciso de lo que exige el contexto.
- source_word: τῷ βασιλεῖ
  english_pob_choice: the king
  chosen_spanish: al rey
  alternatives_spanish:
  - al rey
  lexicon: LSJ
  rationale: La referencia es literal al monarca; «rey» comunica sin añadir un título interpretativo.
- source_word: τὴν ἀπόλυσιν
  english_pob_choice: release
  chosen_spanish: su liberación
  alternatives_spanish:
  - su libertad
  - su despedida
  - su puesta en libertad
  lexicon: LSJ
  rationale: ἀπόλυσις denota liberación o envío fuera. «Liberación» mantiene el valor de dejarles ir sin insinuar una emancipación jurídica más amplia.
- source_word: αὐτῶν
  english_pob_choice: their
  chosen_spanish: su
  alternatives_spanish:
  - de ellos
  - de estas personas
  lexicon: Greek grammar
  rationale: En español, el posesivo «su» naturaliza la relación con «liberación» y preserva el vínculo genitivo con ellos.
- source_word: εἰς τὰ ἴδια
  english_pob_choice: to their own homes
  chosen_spanish: para volver a sus propios hogares
  alternatives_spanish:
  - a sus propios lugares
  - a lo suyo
  - a lo que les pertenecía
  lexicon: LSJ
  rationale: El giro idiomático puede significar «a lo suyo» o «a su propia casa/lugar». Aquí el contexto favorece el regreso al hogar; «volver a sus propios hogares» comunica el sentido idiomático con claridad en español.
- source_word: αἰτούμενοι
  english_pob_choice: asking for
  chosen_spanish: pidiendo
  alternatives_spanish:
  - solicitando
  - rogando
  - solicitando que
  lexicon: LSJ
  rationale: 'El participio explica la acción concomitante: al acercarse, lo hacen solicitando su liberación. «Pidiendo» es natural y fiel al valor requestivo.'
translation_notes:
  revision_awareness: Traducción basada directamente en el griego de Swete (1909) y cotejada con el audit trail inglés. No se detectan cambios textuales en la revisión más reciente; la decisión principal es conservar el matiz idiomático de εἰς τὰ ἴδια con una formulación española natural.
  spanish_consistency_notes:
  - Se mantiene un registro sobrio y bíblico en español moderno.
  - Se evita «SEÑOR» porque el verso no contiene el nombre divino ni una cita del Tetragrámaton.
  - «Liberación» se usa en sentido contextual de dejar ir, no como terminología doctrinal.
  - La nota al pie preserva la alternativa lexical documentada en el inglés POB.
