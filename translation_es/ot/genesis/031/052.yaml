revisions:
- from: Este montículo es un testigo[a], y la piedra erguida es un testigo, de que yo no pasaré este montículo hacia ti[b], y de que tú no pasarás este montículo y esta piedra erguida hacia mí para mal[c].
  to: 'Este montículo es un testigo[a], y la piedra erguida es un testigo: yo no cruzaré este montículo hacia ti[b], y tú no cruzarás este montículo y esta piedra erguida hacia mí para mal[c].'
  rationale: Se reemplazó «de que» por dos puntos para introducir de manera natural en español el contenido atestiguado por los marcadores del pacto. También se cambió «pasaré / pasarás este montículo» por «cruzaré / cruzarás este montículo» para representar mejor el sentido de עבר como cruce del límite. Se conservaron «montículo», «piedra erguida» y «para mal» por ser fieles y comprensibles.
