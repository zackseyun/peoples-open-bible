translation:
  language: es
  text: 'Mis entrañas, mis entrañas: ¡me retuerzo de dolor! ¡Oh paredes de mi corazón![a] Mi corazón se agita dentro de mí; no puedo callar, porque mi alma[b] ha oído el sonido de la trompeta, el grito de guerra[c].'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «las paredes de mi corazón». Se conserva la imagen corporal literal; algunos la interpretan como «las cámaras de mi corazón».'
    reason: lexical_alternative
  - marker: b
    text: 'También puede entenderse «alma mía, has oído»; el hebreo puede leerse como autoapóstrofe o como sujeto enfático: «mi alma ha oído».'
    reason: lexical_alternative
  - marker: c
    text: 'También posible: «la alarma de guerra» o «el grito de batalla» para el cierre de la línea.'
    reason: lexical_alternative
lexical_decisions:
- source_word: מֵעַי
  english_pob_choice: my inward parts
  chosen_spanish: mis entrañas
  alternatives_spanish:
  - mis partes internas
  - mi interior
  - mis vísceras
  lexicon: HALOT
  rationale: מֵעֶה nombra literalmente las partes internas/entrañas. En español, «entrañas» conserva mejor la imagen corporal y el tono poético que «interior», y evita la rareza de «bowels». La repetición se mantiene para reproducir la intensidad emocional del hebreo.
- source_word: אחולה
  english_pob_choice: I writhe in pain
  chosen_spanish: me retuerzo de dolor
  alternatives_spanish:
  - estoy en angustia
  - me retuerzo
  - estoy adolorido
  lexicon: HALOT
  rationale: La forma expresa sufrimiento convulsivo o de retorcimiento. «Me retuerzo de dolor» preserva el componente físico y afectivo mejor que una frase más abstracta como «estoy en angustia».
- source_word: קִירוֹת לִבִּי
  english_pob_choice: the walls of my heart
  chosen_spanish: las paredes de mi corazón
  alternatives_spanish:
  - las cámaras de mi corazón
  - las murallas de mi corazón
  lexicon: HALOT
  rationale: קִירוֹת significa «paredes». La imagen se conserva de manera transparente en español con «paredes de mi corazón», manteniendo el carácter sorprendente de la metáfora corporal. «Paredes» es más natural que «murallas» aquí.
- source_word: הֹמֶה לִּי לִבִּי
  english_pob_choice: My heart pounds within me
  chosen_spanish: Mi corazón se agita dentro de mí
  alternatives_spanish:
  - Mi corazón late con violencia dentro de mí
  - Mi corazón retumba dentro de mí
  - Mi corazón está en tumulto dentro de mí
  lexicon: HALOT
  rationale: המה denota agitación, rumor o tumulto. «Se agita» comunica ese movimiento interno de manera natural en español y mantiene la ambivalencia entre latido, tumulto y ruido sin forzar una interpretación única.
- source_word: לֹא אַחֲרִישׁ
  english_pob_choice: I cannot keep silent
  chosen_spanish: no callaré
  alternatives_spanish:
  - no puedo callar
  - no guardaré silencio
  - no me quedaré callado
  lexicon: HALOT
  rationale: El hebreo expresa la imposibilidad de permanecer callado. En español, «no callaré» es breve, solemne y suficientemente cercano, sin introducir una perífrasis que debilite la fuerza del lamento. La forma negativa futurizada conserva bien el tono profético.
- source_word: כִּי
  english_pob_choice: for
  chosen_spanish: porque
  alternatives_spanish:
  - pues
  - ya que
  lexicon: HALOT
  rationale: Introduce la razón de la imposibilidad de callar. «Porque» es la conexión causal más clara y natural en español contemporáneo.
- source_word: ק֤וֹל שׁוֹפָר
  english_pob_choice: the sound of the trumpet
  chosen_spanish: el sonido de la trompeta
  alternatives_spanish:
  - la voz de la trompeta
  - el toque de trompeta
  - el sonido del cuerno
  lexicon: HALOT
  rationale: קול es «sonido/voz» y שׁוֹפָר designa el cuerno de carnero usado como trompeta. «El sonido de la trompeta» conserva ambos elementos de modo claro y bíblico. Se evita «cuerno» para no oscurecer la recepción en español general.
- source_word: נַפְשִׁי
  english_pob_choice: my soul
  chosen_spanish: mi alma
  alternatives_spanish:
  - mi vida
  - mi ser
  - yo
  lexicon: HALOT
  rationale: En este contexto, נֶפֶשׁ puede ser «alma» o «vida». Dado el registro poético y la tradición bíblica en español, «mi alma» comunica bien el sujeto interior que ha oído. No se marca aquí la opción de auto-dirigirse a «alma mía» porque el hebreo y el flujo de la línea favorecen la lectura simple de sujeto interno.
- source_word: תְּרוּעַת מִלְחָמָה
  english_pob_choice: the battle cry
  chosen_spanish: el grito de guerra
  alternatives_spanish:
  - el alarido de guerra
  - el toque de guerra
  - la alarma de guerra
  lexicon: HALOT
  rationale: תְּרוּעָה puede ser clamor, alarma o grito jubiloso/estruendoso según contexto. Aquí, unido a מִלְחָמָה, el sentido natural es el clamor asociado al combate. «Grito de guerra» conserva la fuerza y resulta idiomático en español.
translation_notes:
  revision_awareness: 'El texto español sigue la lectura revisada del audit trail: mantiene la exclamación vocativa («¡Oh paredes de mi corazón!») y evita una fórmula que atribuya un destinatario explícito a ‘mi alma’; en cambio, presenta el sujeto interno de manera directa, acorde con la última revisión inglesa y con la puntuación poética del hebreo.'
  spanish_consistency_notes:
  - Se usa «entrañas» para מֵעַי en coherencia con otros pasajes poéticos donde el POB preserva imaginería corporal visceral.
  - «Mi alma» se mantiene como equivalente estable de נַפְשִׁי cuando el contexto no requiere distinguir ‘vida’ o ‘yo’.
  - «Grito de guerra» se elige por claridad en español, pero la nota conserva la alternativa semántica de ‘alarma de guerra’.
