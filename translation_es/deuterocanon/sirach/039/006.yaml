revisions:
- from: Si el gran Yahvé[a] quiere, será llenado con un espíritu de entendimiento; él mismo hará llover[b] palabras de sabiduría, y en oración dará gracias al Señor.
  to: Si el gran Yahvé quiere, será lleno de un espíritu de entendimiento; él mismo hará llover[a] palabras de sabiduría, y en oración dará gracias a Yahvé[b].
  rationale: Se corrige la incoherencia terminológica usando «Yahvé» también para Κυρίῳ al final del versículo, en línea con la política del proyecto y sin razón contextual para una excepción. Se elimina la nota mal anclada sobre «Yahvé» y se mantienen solo notas que corresponden a alternativas léxicas reales del griego. Además, se mejora la naturalidad española con «será lleno de» sin perder el pasivo ni el sentido de πνεύματι συνέσεως.
