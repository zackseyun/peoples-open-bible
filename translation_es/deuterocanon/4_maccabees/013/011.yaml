translation:
  language: es
  text: 'Y uno dijo[a]: «Ten valor, hermano»; y otro dijo: «Resiste noblemente».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Literalmente: «el uno decía ... pero el otro ...», indicando hablantes sucesivos entre los hermanos.'
