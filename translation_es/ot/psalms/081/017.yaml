revisions:
- from: Pero él lo alimentaría con lo más fino del trigo[a], y con miel de la roca yo te saciaría.
  to: Pero él lo alimentaría con el mejor trigo[a], y con miel de la peña yo te saciaría.
  rationale: Se ajusta 'con lo más fino del trigo' a 'con el mejor trigo' para lograr un español más natural sin perder el valor idiomático de חֵלֶב. Se cambia 'miel de la roca' por 'miel de la peña' para una imagen más idiomática y literariamente adecuada en español bíblico. Se corrige y mejora la nota al pie para explicar con claridad la alternativa literal y el sentido del modismo hebreo.
