    text: 'O: «¿Por qué has pensado/ideado tal cosa contra el pueblo de Dios?»'
    reason: lexical_alternative
  - marker: b
    text: 'O: «el rey es como uno culpable»; es decir, su propio juicio implica culpa por no hacer volver al desterrado.'
    reason: alternative_reading
