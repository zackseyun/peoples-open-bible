review_pass:
  verdict: revise
  source_alignment_summary: El borrador español comunica correctamente la imagen principal de trazar una vía para la llegada/avance de la espada hacia Rabá y Judá/Jerusalén. Sin embargo, adopta en el texto principal la lectura adversativa «contra» donde el POB inglés mantuvo como principal la lectura direccional «to ... and to ...», relegando «against» a nota. Dado el expediente auditado, el español debe preservar esa misma prioridad semántica en el texto y dejar el matiz hostil en nota.
  spanish_quality_summary: El español es claro y legible, pero «para que venga la espada contra...» interpreta más de lo necesario. «Pondrás un camino para que venga la espada a...» suena natural y más fiel al equilibrio del hebreo y del POB inglés. «Jerusalén fortificada» funciona bien en español.
  glossary_alignment: 'No hay conflictos con la terminología del proyecto. Los nombres propios «Rabá», «amonitas», «Judá» y «Jerusalén» están bien. La cuestión principal no es glosarial sino sintáctico-semántica: mantener en el texto principal el valor de destino («a») y no adelantar como principal la alternativa «contra».'
  issues:
  - severity: medium
    issue: El texto principal usa «contra» para ambos destinos.
    rationale: El POB inglés decidió como lectura principal «to Rabbah ... and to Judah», con «against» en nota como alternativa. El español debe reflejar esa jerarquía interpretativa en vez de convertir la alternativa en texto principal.
  - severity: low
    issue: La decisión léxica española para אֵת רַבַּת בְּנֵי עַמּוֹן justifica «contra» como elección principal.
    rationale: Eso contradice la pista de auditoría inglesa, que preserva el matiz hostil como posibilidad, no como lectura principal. Conviene ajustar también la racionalidad de la revisión, aunque no es necesario reproducir todas las decisiones léxicas en la salida.
  revised_spanish_text: Pondrás un camino para que venga la espada a Rabá de los amonitas[b][a], y a Judá en Jerusalén fortificada.
  revised_footnotes:
  - marker: a
    text: 'También puede entenderse: «contra Rabá de los amonitas, y contra Judá en Jerusalén fortificada». La construcción hebrea admite movimiento hacia o avance hostil contra esos lugares.'
    reason: alternative_reading
  - marker: b
    text: Rabá era la ciudad principal de los amonitas.
    reason: cultural_note
  revision_rationale: 'Se revisa para alinear el español con la decisión principal documentada por el POB inglés: los dos lugares son destinos/objetivos de la llegada de la espada, mientras que el matiz adversativo «contra» se conserva como lectura alternativa en nota. El resto del versículo ya era claro y fiel.'
