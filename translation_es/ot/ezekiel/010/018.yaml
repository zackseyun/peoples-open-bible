revisions:
- from: Entonces la gloria de Yahvé salió de sobre el umbral de la casa y se puso sobre los querubines[a].
  to: Entonces la gloria de Yahvé salió de encima del umbral de la casa y se detuvo sobre los querubines[a].
  rationale: Se reemplaza «de sobre» por «de encima de» para una expresión espacial más natural en español, manteniendo el sentido de מֵעַל. Se cambia «se puso sobre» por «se detuvo sobre» para reflejar mejor וַיַּעֲמֹד (‘se paró/estuvo’) en el contexto visionario. Se conserva «Yahvé», «la casa» y la nota alternativa «el templo» conforme al rastro auditado.
  reviewer_model: gpt-5.4
