review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien el hebreo y el rastro del POB inglés en la imagen de «lámpara», la pregunta retórica de frecuencia y el sujeto implícito de la cláusula final. Sin embargo, hay dos desajustes importantes: el inicio exclamativo «¡Cuán a menudo...» no corresponde a la interrogación retórica del hebreo, y en español la última pregunta con «Les asigna» introduce un objeto explícito «les» que no está en el original y enturbia la referencia del sujeto implícito.'
  spanish_quality_summary: El español es generalmente claro y digno, pero la puntuación y sintaxis iniciales deben reflejar pregunta, no exclamación. Además, la secuencia de notas [a][b] no respeta el orden del POB inglés anclado en «put out[c][b][a]», y conviene ajustar las notas para que el marcador del valor alternativo de חֲבָלִים no repita «dolores» como alternativa de «dolores».
  glossary_alignment: No hay conflictos con la terminología de proyecto. «Lámpara», «malvados», «ira» y el sujeto implícito son defendibles. «Dolores» para חֲבָלִים es aceptable, aunque la nota debe presentar mejor las alternativas «penas» o «dolores de parto».
  issues:
  - severity: medium
    issue: La primera cláusula usa exclamación en lugar de pregunta retórica.
    rationale: כַּמָּה introduce aquí una pregunta retórica de frecuencia. «¡Cuán a menudo...!» suena exclamativo en español y cambia el tono argumentativo del versículo.
  - severity: medium
    issue: El orden de marcadores de notas no sigue el audit trail inglés.
    rationale: El POB inglés ancla tres notas en «put out[c][b][a]». En español deberían aparecer juntas en el punto correspondiente y en orden secuencial propio del registro, no solo [a][b] en otro orden conceptual.
  - severity: low
    issue: «¿Les asigna dolores...?» añade un dativo no expresado en hebreo.
    rationale: El original dice simplemente «aporta/reparte dolores/penas en su ira». Añadir «les» puede hacer pensar que el objeto indirecto está explícito. «¿Reparte dolores...?» o «¿asigna dolores...?» preserva mejor la elipsis.
  - severity: low
    issue: La nota c repite la palabra principal como alternativa.
    rationale: Si el texto principal ya dice «dolores», la nota no debería ofrecer «dolores» otra vez; debe aportar alternativas reales, como «penas» o «dolores de parto».
