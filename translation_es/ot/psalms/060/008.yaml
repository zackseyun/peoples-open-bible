  yaml_path: translation/ot/psalms/060/008.yaml
  text: 'God has spoken in his holiness: “I will exult[a]; I will divide up Shechem[b], and measure out the Valley of Succoth.”'
  footnotes:
  - marker: a
    text: Or, 'God has spoken in his holy place,' or 'by his holiness.' The Hebrew phrase can denote God's holiness itself or the sphere of his holy presence.
    reason: lexical_alternative
  - marker: b
    text: Some understand 'I will exult' as the psalmist's response to God's speech rather than part of God's own declaration.
    reason: alternative_reading
