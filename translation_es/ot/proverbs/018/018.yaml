  source_alignment_summary: 'El borrador español refleja fielmente el hebreo y la decisión auditada en inglés: מִדְיָנִים como «disputas», יַשְׁבִּית como «pone fin a», הַגּוֹרָל como «la suerte», y el segundo colon como resolución entre partes poderosas. Aunque יַפְרִיד literalmente puede sugerir «separa/divide», la revisión inglesa documentó con razón «decides between» por el contexto arbitral, y «decide entre los poderosos» transmite bien ese sentido en español.'
