    text: Or 'a great banquet.' The Hebrew idiom uses a verb-noun pairing for preparing a substantial meal.
    reason: lexical_alternative
  - marker: b
    text: Or 'to their lord.' The expression likely refers to the king of Aram.
    reason: lexical_alternative
  - marker: c
    text: '''Aram'' is the Hebrew name often rendered ''Syria'' in older English translations.'
    reason: alternative_reading
