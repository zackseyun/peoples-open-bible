translation:
  language: es
  text: No temas[a], porque yo estoy contigo; no mires alrededor con angustia, porque yo soy tu Dios. Yo te fortaleceré; ciertamente te ayudaré[b]; ciertamente te sostendré con mi diestra justa.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «no te desmayes»; el verbo hebreo probablemente lleva la idea de mirar alrededor con alarma o inquietud.'
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: «con la diestra de mi justicia».'
    reason: alternative_reading
lexical_decisions:
- source_word: אַל תִּירָא
  english_pob_choice: Do not fear
  chosen_spanish: No temas
  alternatives_spanish:
  - No tengas miedo
  - No temas; no te asustes
  lexicon: HALOT
  rationale: El verbo ירא aquí expresa prohibición directa de temer. «No temas» es breve, natural en español bíblico y conserva la fuerza imperativa. «No tengas miedo» es equivalente, pero menos concentrado.
- source_word: כִּי עִמְּךָ אָ֔נִי
  english_pob_choice: for I am with you
  chosen_spanish: porque yo estoy contigo
  alternatives_spanish:
  - porque estoy con ustedes
  - ya que yo estoy contigo
  lexicon: HALOT
  rationale: La partícula כִּי introduce la base de la exhortación; «porque» conserva la relación causal. «Estoy contigo» expresa presencia cercana de forma idiomática y fiel al hebreo.
- source_word: אַל תִּשְׁתָּע
  english_pob_choice: do not look around in dread
  chosen_spanish: no te inquietes
  alternatives_spanish:
  - no te desmayes
  - no mires alrededor con angustia
  lexicon: HALOT
  rationale: El verbo שׁעה en este contexto puede implicar mirar alrededor con alarma o angustia. En español, «no te inquietes» transmite la inquietud interna que resulta de ese movimiento de alarma sin forzar una imagen poco natural. «No te desmayes» es una opción tradicional, pero atenúa la posible fuerza visual del verbo.
- source_word: אֲנִי אֱלֹהֶיךָ
  english_pob_choice: I am your God
  chosen_spanish: yo soy tu Dios
  alternatives_spanish:
  - yo soy tu Dios [con pacto]
  - yo soy tu Dios
  lexicon: HALOT
  rationale: Se mantiene la identificación sencilla y pactual. «Dios» refleja el sentido singular de אֱלֹהִים aquí sin añadir matices no explicitados en el texto.
- source_word: אִמַּצְתִּיךָ
  english_pob_choice: I will strengthen you
  chosen_spanish: yo te fortaleceré
  alternatives_spanish:
  - yo te haré fuerte
  - yo te fortaleceré
  lexicon: HALOT
  rationale: אָמַץ comunica fortalecer o dar fuerza. En esta secuencia de promesas, el futuro español preserva el tono de aseguramiento profético, igual que la lectura inglesa auditada.
- source_word: אַף
  english_pob_choice: surely
  chosen_spanish: ciertamente
  alternatives_spanish:
  - sí,
  - también
  - de veras
  lexicon: HALOT
  rationale: Aquí אַף intensifica la promesa. «Ciertamente» reproduce bien el énfasis sin sonar mecánico y permite repetir el refuerzo retórico en ambas cláusulas.
- source_word: עֲזַרְתִּיךָ
  english_pob_choice: I will help you
  chosen_spanish: te ayudaré
  alternatives_spanish:
  - te asistiré
  - te socorreré
  lexicon: HALOT
  rationale: עזר significa ayudar. «Ayudar» es la opción más directa y clara en español; mantiene el paralelismo con las otras promesas.
- source_word: תְּמַכְתִּיךָ
  english_pob_choice: I will uphold you
  chosen_spanish: te sostendré
  alternatives_spanish:
  - te apoyaré
  - te afirmaré
  - te mantendré
  lexicon: HALOT
  rationale: תמך expresa sostener o dar apoyo firme. «Sostendré» conserva la imagen de soporte estable y combina bien con el paralelismo poético.
- source_word: בִּימִין
  english_pob_choice: with ... right hand
  chosen_spanish: con mi diestra
  alternatives_spanish:
  - con mi mano derecha
  - por mi diestra
  lexicon: HALOT
  rationale: La preposición ב aquí es instrumental; «con» funciona de manera natural en español. «Diestra» es una forma digna y bíblica para «right hand», sin perder claridad.
- source_word: צִדְקִי
  english_pob_choice: my righteous right hand
  chosen_spanish: mi diestra justa
  alternatives_spanish:
  - mi diestra de justicia
  - mi diestra recta
  lexicon: HALOT
  rationale: El sustantivo/adjetivo צֶדֶק/צִדְקִי se conserva con «justa», que comunica rectitud y justicia a la vez. «Mi diestra justa» respeta la unión atributiva sin introducir una perífrasis más interpretativa.
theological_decisions:
- issue: 'Cómo expresar el final del versículo: בִּימִין צִדְקִי'
  english_pob_reading: with my righteous right hand
  chosen_spanish_reading: con mi diestra justa
  alternative_spanish_readings:
  - con la diestra de mi justicia
  - con mi diestra de justicia
  rationale: El hebreo admite una lectura más formal como «la diestra de mi justicia», pero en español esa forma puede sonar pesada o abstracta. «Mi diestra justa» conserva la idea de una acción poderosa, recta y fiel de Dios sin desplazar el foco hacia una fórmula demasiado explicativa. Se mantiene la tensión entre justicia y derecho/poder, en línea con el audit trail inglés.
  doctrine_reference: Translation philosophy §§1, 3, 6
- issue: El valor aspectual de los tres verbos de promesa
  english_pob_reading: future promises ('I will strengthen/help/uphold you')
  chosen_spanish_reading: futuro de promesa ('te fortaleceré / te ayudaré / te sostendré')
  alternative_spanish_readings:
  - presente de certeza ('te fortalezco / te ayudo / te sostengo')
  - pasado de seguridad ('te he fortalecido / te he ayudado / te he sostenido')
  rationale: Aunque las formas hebreas no son uniformemente futuras, en este contexto profético funcionan como garantías divinas. El futuro en español preserva el impulso de promesa pastoral y la serie paralela de seguridades.
  doctrine_reference: Translation philosophy §§1, 6
translation_notes:
  revision_awareness: La revisión más reciente indica que no hubo cambios respecto del estado anterior; el cotejo externo reportó alta concordancia y acuerdo total con el texto inglés auditado.
  spanish_consistency_notes:
  - Se usa «Yahvé» como forma estándar del proyecto sólo cuando el hebreo lo exige explícitamente; este versículo no contiene el Tetragrámaton, así que no aparece aquí.
  - Se prefirió «diestra» por su registro bíblico y su naturalidad en español culto.
  - Se mantuvo la repetición enfática de «ciertamente» para reflejar el אַף hebreo y el paralelismo del versículo.
  - «No te inquietes» conserva la posible imagen de alarma de תִּשְׁתָּע sin caer en una paráfrasis excesiva.
