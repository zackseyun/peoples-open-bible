review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien el sentido básico del hebreo: los de Judá capturaron vivos a diez mil, los llevaron a lo alto de un peñasco/acantilado, los arrojaron, y todos murieron despedazados. Sin embargo, las notas al pie están mal ancladas: [a] aparece sobre «peña» pero su contenido corresponde a una alternativa léxica de סלע, mientras que [b] aparece también sobre «peña» aunque su contenido explica נבקעו, que debe anclarse en el resultado final. Además, la nota b actual dice «Lit.: y todos ellos quedaron partidos o abiertos», pero el hebreo literal afecta específicamente al verbo final («fueron partidos/abiertos»), no a toda la cláusula con «y todos ellos».'
  spanish_quality_summary: El español es claro, natural y digno. «Capturaron vivos a diez mil», «a la cima de la peña» y «quedaron destrozados» leen bien. El punto y coma antes de «y todos ellos» no es necesario; una coma coordina mejor la secuencia narrativa hebrea. También conviene mover la nota [b] a «destrozados» para evitar confusión de referencia.
  glossary_alignment: 'No hay términos teológicos de proyecto implicados. Las decisiones léxicas principales concuerdan con el expediente inglés: שָׁבוּ = «capturaron», חַיִּים = «vivos», לראשׁ = «a la cima de», סלע = «peña» con alternativas en nota, נבקעו = «quedaron destrozados» con literal preservado en nota. La única corrección necesaria es de anclaje y forma de nota, no de glosario.'
  issues:
  - severity: medium
    issue: La nota [b] está anclada a «peña» pero explica el verbo final נִבְקָעוּ.
    rationale: El lector entenderá erróneamente que la nota comenta «peña» en vez de «quedaron destrozados». Las notas deben aparecer en la palabra o frase relevante.
  - severity: low
    issue: La redacción de la nota [b] no refleja con precisión el alcance del literal.
    rationale: '«Lit.: y todos ellos quedaron partidos o abiertos» mezcla la conjunción y el pronombre con el verbo explicado. Es más preciso: «Lit.: ‘fueron partidos’ o ‘fueron abiertos’».'
  - severity: low
    issue: El punto y coma antes de la última coordinación suena algo rígido.
    rationale: El hebreo usa simple coordinación con waw; en español una coma mantiene mejor el flujo narrativo sin cambiar el sentido.
  revised_spanish_text: Y los hijos de Judá capturaron vivos a diez mil, los llevaron a la cima de la peña[a], y los arrojaron desde la cima de la peña, y todos ellos quedaron destrozados[b].
  revised_footnotes:
  - marker: a
    text: 'O: «la roca» o «el peñasco» para el término hebreo selaʿ.'
    reason: lexical_alternative
  - marker: b
    text: 'Lit.: «fueron partidos» o «fueron abiertos».'
    reason: lexical_alternative
  revision_rationale: Se conserva el texto principal casi intacto, pero se corrige el anclaje de la nota sobre נִבְקָעוּ para que aparezca en «destrozados», se precisa su redacción literal, y se suaviza la puntuación para reflejar mejor la coordinación hebrea.
