translation:
  language: es
  text: 'Entonces él devolvió las mil cien piezas de plata a su madre, y su madre dijo: «Yo había dedicado solemnemente la plata a Yahvé, de mi mano[a], para mi hijo, para hacer una imagen tallada y una imagen fundida[b]; así que ahora te la devuelvo».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebreo «de mi mano», un modismo que expresa posesión personal o intervención directa.
    reason: cultural_note
  - marker: b
    text: O «una imagen de metal fundido».
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּשֶׁב
  english_pob_choice: returned
  chosen_spanish: devolvió
  alternatives_spanish:
  - la restituyó
  - la regresó
  lexicon: HALOT
  rationale: El causativo de שוב expresa la acción de hacer volver o restituir. En español, «devolvió» comunica de forma natural la restitución sin perder el sentido de dar de vuelta lo tomado.
- source_word: אֶלֶף וּמֵאָה הַכֶּסֶף
  english_pob_choice: the eleven hundred pieces of silver
  chosen_spanish: los mil cien piezas[b] de plata
  alternatives_spanish:
  - los mil cien siclos de plata
  - los mil cien piezas de plata
  lexicon: HALOT
  rationale: El hebreo dice literalmente «mil cien de plata»; la POB inglesa evita fijar «shekels» con demasiada certeza. En español, «piezas de plata» mantiene esa prudencia y el valor idiomático del sintagma.
- source_word: לְאִמּוֹ
  english_pob_choice: to his mother
  chosen_spanish: a su madre
  alternatives_spanish:
  - para su madre
  lexicon: HALOT
  rationale: Preposición de destinatario directa y natural en español.
- source_word: הַקְדֵּשׁ הִקְדַּשְׁתִּי
  english_pob_choice: I had solemnly dedicated
  chosen_spanish: había dedicado solemnemente
  alternatives_spanish:
  - había consagrado solemnemente
  - había dedicado por completo
  lexicon: HALOT
  rationale: El infinitivo absoluto intensifica el verbo finito. «Dedicado solemnemente» conserva la fuerza enfática y el matiz cultual de apartar algo para uso sagrado.
- source_word: לַיהוָה
  english_pob_choice: to Yahweh
  chosen_spanish: a Yahvé
  alternatives_spanish:
  - a Yahveh
  - al SEÑOR
  lexicon: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
  rationale: 'Se sigue la directriz del proyecto: יהוה se traduce «Yahvé» en el texto principal para preservar el nombre divino, en vez de ocultarlo tras una convención litúrgica.'
- source_word: מִיָּדִי
  english_pob_choice: from my hand
  chosen_spanish: de mi mano
  alternatives_spanish:
  - de mi propia mano
  - por mi mano
  lexicon: HALOT
  rationale: Se conserva el giro idiomático de posesión/agency con una fórmula transparente en español. «De mi mano» mantiene la cercanía al hebreo y la lectura auditada de la POB inglesa.
- source_word: לִבְנִי
  english_pob_choice: for my son
  chosen_spanish: para mi hijo
  alternatives_spanish:
  - a favor de mi hijo
  - en beneficio de mi hijo
  lexicon: HALOT
  rationale: El lamed expresa finalidad o beneficio. «Para mi hijo» es la forma más directa y acorde al flujo sintáctico del verso.
- source_word: לַעֲשׂוֹת
  english_pob_choice: to make
  chosen_spanish: para hacer
  alternatives_spanish:
  - para fabricar
  lexicon: HALOT
  rationale: Infinitivo de propósito; «para hacer» reproduce de manera sobria la relación sintáctica del hebreo.
- source_word: פֶּסֶל
  english_pob_choice: a carved image
  chosen_spanish: una imagen tallada
  alternatives_spanish:
  - un ídolo tallado
  - una imagen esculpida
  lexicon: HALOT
  rationale: «Imagen tallada» conserva el carácter material y artesanal del objeto sin recurrir a un tecnicismo arcaico. Además evita resolver de antemano el objeto con un término más interpretativo como «ídolo».
- source_word: וּמַסֵּכָה
  english_pob_choice: and a cast image
  chosen_spanish: y una imagen fundida
  alternatives_spanish:
  - y una imagen vaciada
  - y una imagen moldeada
  lexicon: HALOT
  rationale: La POB inglesa preserva la alternativa «molten image». En español, «fundida» mantiene la referencia a metal vertido/fundido y es la opción idiomática más cercana y reconocible.
- source_word: וְעַתָּה
  english_pob_choice: so now
  chosen_spanish: así que ahora
  alternatives_spanish:
  - y ahora
  - ahora pues
  lexicon: HALOT
  rationale: La conexión discursiva indica consecuencia y transición. «Así que ahora» refleja bien el valor inferencial y narrativo.
- source_word: אֲשִׁיבֶנּוּ לָךְ
  english_pob_choice: I return it to you
  chosen_spanish: te la devuelvo
  alternatives_spanish:
  - te lo devuelvo
  - te la regreso
  lexicon: HALOT
  rationale: El verbo en contexto comunica la restitución inmediata. Se usa «te la devuelvo» porque el referente en español es «la plata», y así se mantiene concordancia y naturalidad.
theological_decisions:
- issue: Nombre divino יהוה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahveh
  - el SEÑOR
  rationale: La directriz del proyecto exige traducir el Tetragrámaton como «Yahvé» en el texto principal. Esto preserva el nombre propio de Dios y evita la convención de sustitución litúrgica.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Tensión teológica entre dedicación sagrada e intención idolátrica
  english_pob_reading: I had solemnly dedicated the silver to Yahweh ... to make a carved image and a cast image
  chosen_spanish_reading: había dedicado solemnemente la plata a Yahvé ... para hacer una imagen tallada y una imagen fundida
  alternative_spanish_readings:
  - había consagrado la plata a Yahvé ...
  - había apartado la plata para Yahvé ...
  rationale: 'Se conserva la tensión textual sin armonizarla: el verbo de consagración se mantiene junto con el propósito idolátrico posterior. La traducción no corrige la contradicción interna del relato.'
  doctrine_reference: 'DOCTRINE.md Translation philosophy #3: Preserve theological tension rather than resolve it'
translation_notes:
  revision_awareness: La versión inglesa auditada fue revisada y quedó sin cambios en el último pase. El acuerdo de revisión es alto y no hubo correcciones aplicadas, así que la redacción española sigue de cerca la decisión inglesa establecida, especialmente en el tratamiento de YHWH, la tensión teológica del verso y la prudencia con la unidad monetaria.
  spanish_consistency_notes:
  - Se usa «Yahvé» para יהוה de acuerdo con la política del proyecto.
  - Se conserva el paralelismo «imagen tallada / imagen fundida» para reflejar פֶּסֶל / מַסֵּכָה.
  - «De mi mano» se mantiene como giro idiomático transparente y auditado.
  - 'La concordancia pronominal se ajusta al referente femenino implícito de «la plata» en español: «te la devuelvo».'
