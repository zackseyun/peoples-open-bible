  verdict: revise
  source_alignment_summary: 'El borrador capta bien la estructura del griego: imperativo dirigido a Dios, dos participios coordinados con objeto implícito hecho explícito como «nos», y la idea de arrogancia en ἐν ὑπερηφανίᾳ. Sin embargo, «Tortura» sobretraduce βάσανισον en español contemporáneo, donde suele sugerir específicamente tortura física o interrogatorio, más fuerte y más estrecho que el valor léxico documentado por el POB («Torment / Afflict / Punish»).'
  spanish_quality_summary: La redacción es clara y legible, pero «Tortura» suena demasiado cruda y menos natural en un registro bíblico digno. «Atormenta» conserva mejor la intensidad sin la sobreespecificación moderna. También conviene evitar la nota con «Atormenta» como alternativa si pasa a ser la lectura principal.
  glossary_alignment: No hay conflictos con la terminología principal del proyecto. «Nos oprimen», «nos ultrajan» y «soberbia» están bien alineados. La única corrección necesaria es la elección de βάσανισον.
  issues:
