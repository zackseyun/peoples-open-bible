theological_decisions:
- issue: Whether to render ἐν τῇ σαρκί interpretively as 'in the sinful nature' or more transparently as 'in the flesh'
  chosen_reading: in the flesh
  alternative_readings:
  - in the sinful nature
  - in our fallen human condition
  rationale: Because σάρξ is listed in DOCTRINE.md as context-dependent and this verse participates in Paul’s broader flesh/Spirit contrast, the main text preserves the literal term 'flesh' while a footnote can clarify the metaphorical sense. This avoids prematurely resolving Paul’s anthropology into a single doctrinal formula.
  doctrine_reference: 'DOCTRINE.md: σάρξ = ''flesh'' (literal) / ''sinful nature'' (metaphorical), context-dependent; preserve theological tension where ambiguity remains.'
