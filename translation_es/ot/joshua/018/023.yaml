translation:
  language: es
  text: Avvim[a], Parah y Ofra.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El hebreo הָעַוִּים también puede entenderse como “los Avvim”. En esta lista territorial se toma como nombre de una ciudad, no como designación étnica.
    reason: alternative_reading
lexical_decisions:
- source_word: הָעַוִּים
  english_pob_choice: Avvim
  chosen_spanish: Avvim
  alternatives_spanish:
  - los Avvim
  - Awwim
  lexicon: HALOT
  rationale: Se trata de un nombre de lugar en una lista territorial; por eso se conserva por transliteración. El artículo hebreo no se refleja como artículo español, siguiendo el tratamiento de topónimos y manteniendo la lectura toponímica que el audit trail inglés documenta.
- source_word: הַפָּרָה
  english_pob_choice: Parah
  chosen_spanish: Parah
  alternatives_spanish:
  - la Parah
  - Para
  lexicon: HALOT
  rationale: Nombre propio geográfico. En español, la transliteración breve y estable 'Parah' comunica mejor el topónimo que una traducción o una forma con artículo, que no es necesaria en la lista.
- source_word: עָפְרָה
  english_pob_choice: Ophrah
  chosen_spanish: Ofra
  alternatives_spanish:
  - Ofrá
  - Ophrah
  lexicon: HALOT
  rationale: Topónimo; se adapta a una transliteración española natural y legible, 'Ofra', para evitar depender de la ortografía inglesa. La vocalización tradicional no exige conservar la grafía inglesa cuando el valor es el mismo nombre propio.
- source_word: וְ
  english_pob_choice: and
  chosen_spanish: y
  alternatives_spanish:
  - e
  lexicon: grammatical conjunction
  rationale: La conjunción coordinante simplemente enumera los lugares. En español se vierte con 'y' en una serie nominal normal.
translation_notes:
  revision_awareness: 'El inglés POB mantiene la misma decisión de base que la revisión más reciente: tratar הָעַוִּים como topónimo en una lista territorial, sin cambios textuales adicionales. La presente versión traslada esa decisión al español con transliteración estable y naturalizada.'
  spanish_consistency_notes:
  - Se conserva el orden de la lista y la puntuación simple de enumeración.
  - Se evita traducir los nombres como sustantivos comunes, porque el contexto es un inventario territorial de topónimos.
  - La nota a pie reproduce la ambigüedad documentada en el inglés POB para הָעַוִּים.
  - Se usa 'Ofra' como forma española legible del topónimo, manteniendo la referencia al mismo nombre propio.
