  rationale: El criterio del POB prioriza la transparencia respecto de la forma griega. «Joakim» refleja mejor Ἰωακείμ y evita sustituir el nombre por una forma tradicional posterior.
  doctrine_reference: 'DOCTRINE.md: Translate titles; transliterate names.'
