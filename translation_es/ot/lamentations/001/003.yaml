review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura y el sentido general del hebreo: exilio de Judá por aflicción y opresión, residencia entre las naciones, falta de descanso y captura por sus perseguidores en un lugar de estrechez. Sin embargo, hay dos desajustes menores con la línea auditada: «perseguidores» debilita la imagen concreta de «pursuers / רֹדְפֶיהָ», y «lugares estrechos» suena algo forzado en español; una forma más natural que preserve la imagen es «angosturas», ya respaldada por la nota. También conviene armonizar el tiempo verbal de «הִשִּׂיגוּהָ» con el inglés auditado y el aspecto resultativo del hebreo mediante «la han alcanzado».'
  spanish_quality_summary: 'El texto es claro y digno, pero presenta leves roces de naturalidad: «ella» es innecesario en español, «perseguidores» tiende a sonar más abstracto que físico, y «entre los lugares estrechos» resulta pesado. «Servidumbre» funciona bien en registro bíblico moderno. La lectura mejora con una redacción más fluida y poética sin perder literalidad.'
  glossary_alignment: No hay términos del glosario principal en conflicto. «Judá», «naciones» y la ausencia de enmascaramiento del nombre divino no plantean problemas aquí. La elección «servidumbre» concuerda con la revisión inglesa documentada. La única mejora léxica importante es acercar רֹדְפֶיהָ a «los que la persiguen» o «sus perseguidores» en sentido de persecución física; para español bíblico natural, «todos los que la persiguen» o «todos sus perseguidores» pueden servir, pero el contexto de alcance favorece una formulación más dinámica.
  issues:
  - severity: medium
    issue: «Todos sus perseguidores» no transmite tan bien la imagen concreta de perseguidores que van detrás de ella.
    rationale: רֹדְפֶיהָ y la decisión inglesa «All her pursuers» enfatizan la persecución/cacería. «Perseguidores» en español puede sonar más general o ideológico.
  - severity: medium
    issue: «entre los lugares estrechos» es poco natural en español.
    rationale: Aunque es semánticamente cercano, la expresión suena calcada. «entre las angosturas» preserva mejor la imagen poética y coincide con la alternativa ya documentada en nota.
  - severity: low
    issue: El pronombre explícito «ella» es innecesario.
    rationale: En español el sujeto ya está claro por el contexto y el verbo; omitirlo mejora el flujo sin pérdida de sentido.
  - severity: low
    issue: «la alcanzaron» podría afinarse a «la han alcanzado».
    rationale: La línea inglesa auditada usa perfecto («have overtaken»), y el perfecto compuesto en español ayuda a mantener el matiz resultativo de la captura en la secuencia poética.
  revised_spanish_text: Judá ha ido al destierro[a] por causa de aflicción y por causa de gran servidumbre; habita entre las naciones y no encuentra descanso. Todos los que la persiguen la han alcanzado entre las angosturas[b].
  revised_footnotes:
