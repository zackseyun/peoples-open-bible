- from: Y en los días de aquellos reyes, el Dios del cielo establecerá un reino[a] que nunca será destruido, y el reino no será entregado a otro pueblo. Desmenuzará y pondrá fin a todos estos reinos[b], y él permanecerá para siempre.
  to: Y en los días de aquellos reyes[a], el Dios del cielo establecerá un reino que nunca será destruido, y el reino no será entregado a otro pueblo. Aplastará[b] y pondrá fin a todos estos reinos, y este permanecerá para siempre.
  rationale: Se corrigieron los anclajes de las notas para que correspondan a las palabras que explican; se sustituyó 'Desmenuzará' por 'Aplastará' para una expresión más natural y fuerte en español; y se cambió 'y él permanecerá para siempre' por 'y este permanecerá para siempre' para evitar un pronombre personal innecesario y reflejar mejor el referente del reino.
