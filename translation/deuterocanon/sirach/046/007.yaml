  chosen_reading: Main text follows the Hebrew as primary but incorporates the Greek purpose clauses ('to keep the people from sin and to silence wicked grumbling') because they appear to preserve the fuller sense of the verse.
  alternative_readings:
  - 'A shorter rendering limited to the surviving Hebrew: ''Also, because he fully followed God, and in the days of Moses showed loyalty, he and Caleb son of Jephunneh, by standing firm in the assembly''s rebellion.'''
  - A Greek-led rendering with 'enemy' in the main text.
  rationale: Project policy gives Hebrew primacy in Sirach where extant, but the prompt explicitly requires using the Greek parallel as actual translation input. Since the Hebrew here is marked 'minor_mismatch' and appears compressed, the Greek likely preserves clauses that clarify the action and purpose. The main text therefore blends the witnesses transparently rather than pretending either alone is unproblematic.
