id: MRK.5.29
reference: Mark 5:29
source:
  edition: SBLGNT
  text: καὶ ⸀εὐθὺς ἐξηράνθη ἡ πηγὴ τοῦ αἵματος αὐτῆς, καὶ ἔγνω τῷ σώματι ὅτι ἴαται ἀπὸ τῆς μάστιγος.
translation:
  text: And immediately the flow of her blood dried up[b][a], and she knew in her body that she had been healed of the affliction.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the fountain of her blood dried up.' The Greek uses a vivid image of a spring or source.
    reason: lexical_alternative
  - marker: b
    text: Or 'from the scourge' or 'from the plague.' Here the term refers to her painful affliction.
    reason: lexical_alternative
lexical_decisions:
- source_word: εὐθὺς
  chosen: immediately
  alternatives:
  - at once
  - instantly
  lexicon: BDAG
  rationale: Standard Markan adverb indicating immediacy; 'immediately' is natural modern English and preserves the narrative urgency.
- source_word: ἐξηράνθη
  chosen: dried up
  alternatives:
  - was dried up
  - ceased
  lexicon: BDAG
  rationale: The passive of ξηραίνω literally means 'was dried up.' 'Dried up' is idiomatic in English for the cessation of a flow and preserves the vivid bodily imagery better than the more interpretive 'ceased.'
- source_word: πηγὴ τοῦ αἵματος αὐτῆς
  chosen: the source of her bleeding
  alternatives:
  - the fountain of her blood
  - the flow of her blood
  lexicon: BDAG
  rationale: πηγή is literally 'spring/source/fountain.' In this context it refers to the bodily source of hemorrhaging. 'Source of her bleeding' preserves the metaphor while using accessible English; 'fountain of her blood' is too literal and unnatural, while 'flow' shifts from source to result.
- source_word: ἔγνω τῷ σώματι
  chosen: she knew in her body
  alternatives:
  - she felt in her body
  - she knew by her body
  lexicon: BDAG
  rationale: 'ἔγνω is ''knew/recognized,'' not merely ''felt,'' though bodily perception is clearly involved. The dative τῷ σώματι is best rendered instrumentally/locatively as embodied awareness: ''in her body.'' This preserves both cognition and physical perception.'
- source_word: ἴαται
  chosen: she had been healed
  alternatives:
  - she is healed
  - she was healed
  lexicon: BDAG
  rationale: Perfect tense of ἰάομαι emphasizes a completed healing with abiding result. English pluperfect after a past verb ('she knew ... that she had been healed') best conveys the aspectual relationship in context.
- source_word: ἀπὸ τῆς μάστιγος
  chosen: from the affliction
  alternatives:
  - from the plague
  - from the scourge
  lexicon: BDAG
  rationale: μάστιξ can mean whip/scourge and by extension severe suffering, plague, or affliction. Here it refers to her debilitating condition, not a literal whipping. 'Affliction' communicates the sense clearly without archaic overtones; 'scourge' is possible but more metaphorical and less transparent to modern readers.
