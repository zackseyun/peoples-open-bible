revisions:
- from: 'Entonces los hombres dijeron a Lot: «¿A quién más tienes aquí? Un suegro, tus hijos, tus hijas y todo lo que es tuyo en la ciudad[a]; sácalo de este lugar».'
  to: 'Entonces los hombres dijeron a Lot[a]: «¿A quién más tienes aquí? Un yerno[b], tus hijos, tus hijas y todos los tuyos en la ciudad[c]; sácalos de este lugar».'
  rationale: 'Se corrige el error grave «suegro» → «yerno», se añade una nota para preservar la alternativa léxica documentada de חָתָן, y se ajusta la frase sobre «todos los tuyos en la ciudad» para reflejar la decisión contextual del POB inglés de que se trata de personas, no de posesiones impersonales. En consecuencia, el mandato final pasa correctamente a plural: «sácalos». Se mantiene «los hombres» conforme al hebreo y al principio de primacía del original. No se requiere adjudicación adicional porque la corrección es clara y de bajo riesgo doctrinal.'
  reviewer_model: gpt-5.4
