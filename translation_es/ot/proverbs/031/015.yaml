translation:
  language: es
  text: Se levanta cuando aún es de noche, y da comida a su hogar, y porción[a] a sus sirvientas.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «y una porción asignada a sus sirvientas». El hebreo de חֹק también puede significar una cuota prescrita, un debido fijo o una asignación establecida.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַתָּקָם
  english_pob_choice: She rises
  chosen_spanish: Se levanta
  alternatives_spanish:
  - Se pone de pie
  - Se alza
  - Se despierta y se levanta
  lexicon: HALOT
  rationale: El wayyiqtol de קום en esta descripción proverbial expresa una acción habitual y vívida. «Se levanta» comunica de forma natural en español ese inicio temprano, sin volverlo excesivamente interpretativo.
- source_word: בְּעוֹד לַיְלָה
  english_pob_choice: while it is still night
  chosen_spanish: cuando aún es de noche
  alternatives_spanish:
  - mientras todavía es de noche
  - antes del amanecer
  - cuando todavía es noche
  lexicon: HALOT
  rationale: La frase hebrea indica que la acción ocurre en plena oscuridad o muy temprano. «Cuando aún es de noche» conserva el valor temporal sin precisar más de lo que el hebreo exige.
- source_word: וַתִּתֵּן
  english_pob_choice: and gives
  chosen_spanish: y da
  alternatives_spanish:
  - y proporciona
  - y reparte
  - y entrega
  lexicon: HALOT
  rationale: נתן es el verbo común «dar». En español, «da» mantiene la sencillez y el paralelismo del verso, tal como el texto poético lo presenta.
- source_word: טֶרֶף
  english_pob_choice: food
  chosen_spanish: comida
  alternatives_spanish:
  - alimento
  - provisión
  - presa
  lexicon: HALOT
  rationale: Aunque טֶרֶף puede significar literalmente «presa», aquí el contexto doméstico y el paralelo con el abastecimiento de la casa apuntan a provisión alimentaria. «Comida» es claro y no introduce la imagen de caza.
- source_word: לְבֵיתָהּ
  english_pob_choice: to her household
  chosen_spanish: a su casa
  alternatives_spanish:
  - a su hogar
  - a su familia
  - a su casa-hogar
  lexicon: HALOT
  rationale: בַּיִת puede abarcar la casa como unidad doméstica y sus miembros. «A su casa» conserva esa amplitud de manera natural; «hogar» sería posible, pero menos literal.
- source_word: וְחֹק
  english_pob_choice: and portions
  chosen_spanish: y porción
  alternatives_spanish:
  - y ración
  - y una porción asignada
  - y cuota
  lexicon: HALOT
  rationale: חֹק puede referirse a una porción prescrita, fija o asignada. Para no perder esa tensión, se usa «porción» y se conserva una nota que explicita el sentido de asignación.
- source_word: לְנַעֲרֹתֶיהָ
  english_pob_choice: to her servant girls
  chosen_spanish: a sus doncellas
  alternatives_spanish:
  - a sus sirvientas
  - a sus jóvenes servidumbres
  - a sus mujeres servidoras
  lexicon: HALOT
  rationale: נַעֲרוֹת son jóvenes mujeres en servicio. «Doncellas» mantiene el rasgo femenino y el estatus de servicio con un registro bíblico comprensible en español; se evita «siervas» porque puede sonar menos preciso para el matiz de jóvenes atendientes.
translation_notes:
  revision_awareness: 'Se siguió el audit trail inglés de la POB y se mantuvo la misma tensión léxica principal en חֹק: una provisión concreta para las jóvenes de la casa, con posibilidad de entenderla como porción o asignación fija. No se detectaron revisiones aplicadas en el pasaje base.'
  spanish_consistency_notes:
  - Se prefirió un español natural y sobrio, sin introducir lenguaje eclesiástico ajeno al contexto doméstico del proverbio.
  - 'Se mantuvo la distribución poética de las acciones en series coordinadas: levantarse, dar comida, dar porción.'
  - «Casa» traduce aquí la unidad doméstica sin excluir a las personas que la componen.
