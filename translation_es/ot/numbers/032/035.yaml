  spanish_consistency_notes:
  - Se mantiene el orden coordinado de la lista con repeticiones de «y» para reflejar la cadencia del hebreo.
  - Se preserva el carácter toponímico de los tres nombres sin añadir significado explicativo no presente en el texto fuente.
  - Se usa «Atrot-shofán» como transliteración funcional en español, sin sustituirla por una forma eclesiástica tradicional no documentada en el audit trail.
