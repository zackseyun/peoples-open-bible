revisions:
- from: Pero Simón, el ya mencionado[a], que se había convertido en delator contra los fondos y la patria, seguía difamando a Onias, como si éste hubiera incitado a Heliodoro y se hubiera hecho autor de estos males.
  to: Pero el ya mencionado Simón[a], que se había convertido en delator de los fondos y de la patria, seguía difamando a Onías, como si este hubiera incitado a Heliodoro y hubiera llegado a ser el autor de estos males[b].
  rationale: Se reordenó la frase inicial para que προειρημένος suene natural en español; se cambió 'delator contra' por 'delator de' para expresar de modo idiomático la denuncia hostil implicada por ἐνδείκτης con sus genitivos; se ajustó 'Onias' a 'Onías' según la ortografía española usual; y se añadió una nota para preservar la alternativa léxica documentada para τῶν κακῶν δημιουργός. También se pulió 'se hubiera hecho autor' a 'hubiera llegado a ser el autor' para mayor fluidez.
