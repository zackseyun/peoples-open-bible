    reason: lexical_alternative
  - marker: b
    text: O «extirpar al pueblo» o «desarraigar al pueblo».
    reason: lexical_alternative
  revision_rationale: Se corrigió la colocación de la nota [b] para que corresponda al infinitivo ἐξᾶραι, conforme al expediente inglés y al griego fuente. También se ajustó «hostil contra Israel» a «hostil a Israel» por naturalidad idiomática. No fue necesario cambiar el resto del versículo.
