lexical_decisions:
- source_word: מִשָּׁם
  english_pob_choice: From there
  chosen_spanish: De allí
  alternatives_spanish:
  - Desde allí
  - De ese lugar
  lexicon: HALOT
  rationale: El adverbio señala continuidad narrativa desde el lugar anterior. «De allí» es natural en español y conserva con precisión el valor direccional de salida.
- source_word: נָסָעוּ
  english_pob_choice: they set out
  chosen_spanish: partieron
  alternatives_spanish:
  - se pusieron en camino
  - salieron
  - viajaron
  lexicon: HALOT
  rationale: En contexto de desplazamiento campamental, el verbo expresa salir de un punto para seguir el trayecto. «Partieron» mantiene el matiz de salida con buena fluidez en español.
- source_word: וַיַּחֲנוּ
  english_pob_choice: and camped
  chosen_spanish: acamparon
  alternatives_spanish:
  - acamparon y se establecieron
  - plantaron el campamento
  lexicon: HALOT
  rationale: חנה indica instalar el campamento. «Acamparon» reproduce el sentido básico sin cargar un matiz técnico o militar excesivo.
- source_word: בְּנַחַל
  english_pob_choice: by the Wadi
  chosen_spanish: junto al valle
  alternatives_spanish:
  - junto al wadi
  - en el valle
  - junto al torrente
  lexicon: HALOT
  rationale: נחל puede referirse a un cauce estacional, barranca o valle con arroyo. En español, «valle» preserva la amplitud semántica de manera inteligible; se evita fijarlo sólo como «arroyo» o «río».
- source_word: זָרֶד
  english_pob_choice: Zered
  chosen_spanish: Zered
  alternatives_spanish:
  - Sared
  lexicon: HALOT
  rationale: Es un nombre propio de lugar. Se translitera como en el texto inglés auditado, sin traducirlo.
translation_notes:
  revision_awareness: El texto inglés auditado fue revisado de «in the Wadi Zered» a «by the Wadi Zered» para reflejar con más naturalidad la preposición hebrea. La versión española sigue esa decisión con «junto al», que expresa cercanía al cauce/valle sin implicar estar dentro de él.
  spanish_consistency_notes:
  - Se mantiene el tono narrativo breve y sobrio propio del pasaje.
  - Se evita «SEÑOR» u otra terminología innecesaria, pues el versículo no contiene el nombre divino.
  - «Zered» se conserva como transliteración estable para consistencia con nombres propios bíblicos.
