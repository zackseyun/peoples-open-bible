translation:
  language: es
  text: Si un hombre entrega a su vecino un asno, o un buey, o una oveja[a], o cualquier animal para guardarlo, y muere, o se lesiona[b], o es llevado cautivo, sin que nadie lo haya visto[c],
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «una oveja o una cabra»; el hebreo שֶׂה puede referirse de manera más amplia a un animal del rebaño.
    reason: lexical_alternative
  - marker: b
    text: Literalmente, «se rompe».
    reason: lexical_alternative
  - marker: c
    text: Es decir, no hay testigo ocular de lo que ocurrió.
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  english_pob_choice: If
  chosen_spanish: Si
  alternatives_spanish:
  - Cuando
  lexicon: HALOT
  rationale: En la ley casuística, כִּי introduce una condición; en español jurídico-bíblico, «Si» expresa mejor esa apertura condicional que «Cuando».
- source_word: יִתֵּן
  english_pob_choice: gives
  chosen_spanish: entrega
  alternatives_spanish:
  - da
  - confía
  lexicon: HALOT
  rationale: Aunque el hebreo dice literalmente «da», en este contexto legal implica poner algo bajo custodia. «Entrega» conserva la acción y sugiere mejor la transferencia de responsabilidad.
- source_word: אִישׁ
  english_pob_choice: a man
  chosen_spanish: un hombre
  alternatives_spanish:
  - alguien
  lexicon: HALOT
  rationale: Se conserva el singular masculino explícito del hebreo, como hace la POB inglesa, en vez de neutralizarlo.
- source_word: אֶל רֵעֵהוּ
  english_pob_choice: his neighbor
  chosen_spanish: a su vecino
  alternatives_spanish:
  - a su prójimo
  - a su compañero
  lexicon: HALOT
  rationale: רֵעַ denota a una persona cercana en relación social; «vecino» es una equivalencia natural y bíblicamente comprensible en español sin añadir intimidad excesiva.
- source_word: חֲמוֹר
  english_pob_choice: donkey
  chosen_spanish: asno
  alternatives_spanish:
  - burro
  - donkey
  lexicon: HALOT
  rationale: «Asno» es el equivalente bíblico más preciso y digno en español; «burro» es más coloquial.
- source_word: שׁוֹר
  english_pob_choice: ox
  chosen_spanish: buey
  alternatives_spanish:
  - toro
  - ganado
  lexicon: HALOT
  rationale: En la tradición bíblica española, «buey» comunica bien el bovino de trabajo que el hebreo designa aquí; mantiene la referencia legal a un animal doméstico valioso.
- source_word: שֶׂה
  english_pob_choice: sheep
  chosen_spanish: oveja
  alternatives_spanish:
  - cordero
  - cabra
  lexicon: HALOT
  rationale: שֶׂה puede referirse a una cría o integrante del rebaño, de oveja o cabra. «Oveja» funciona como término específico natural, mientras la nota preserva la amplitud léxica.
- source_word: וְכָל בְּהֵמָה
  english_pob_choice: or any animal
  chosen_spanish: o cualquier animal
  alternatives_spanish:
  - o cualquier bestia
  - o cualquier ganado
  lexicon: HALOT
  rationale: Se sigue la amplitud de la POB inglesa. «Animal» es claro y no estrecha indebidamente el sentido de בְּהֵמָה en este pasaje de custodia de bienes.
- source_word: לִשְׁמֹר
  english_pob_choice: to keep
  chosen_spanish: para guardarlo
  alternatives_spanish:
  - para custodiarlo
  - para cuidarlo
  lexicon: HALOT
  rationale: El infinitivo expresa finalidad y responsabilidad de custodia. «Guardarlo» conserva la idea de vigilancia/custodia y suena natural en español legal.
- source_word: וּמֵת
  english_pob_choice: and it dies
  chosen_spanish: y muere
  alternatives_spanish:
  - y se muere
  lexicon: HALOT
  rationale: La forma verbal simple transmite adecuadamente la pérdida del animal sin añadidos interpretativos.
- source_word: נִשְׁבַּר
  english_pob_choice: is injured
  chosen_spanish: se lesiona
  alternatives_spanish:
  - se rompe
  - queda herido
  lexicon: HALOT
  rationale: El hebreo significa literalmente «es quebrado». La POB inglesa eligió una equivalencia idiomática por un animal; en español «se lesiona» preserva el daño corporal sin sonar mecánico.
- source_word: נִשְׁבָּה
  english_pob_choice: is carried off
  chosen_spanish: es llevado
  alternatives_spanish:
  - es arrebatado
  - es llevado cautivo
  lexicon: HALOT
  rationale: La POB inglesa preserva una lectura amplia de captura o sustracción. «Es llevado» mantiene esa amplitud sin restringirlo a robo simple; la nota puede recordar la idea de ser «llevado/capturado».
- source_word: אֵין רֹאֶה
  english_pob_choice: with no one seeing it
  chosen_spanish: sin que nadie lo vea
  alternatives_spanish:
  - sin testigo
  - sin que haya testigo ocular
  lexicon: HALOT
  rationale: La expresión hebrea dice literalmente que «no hay quien vea». «Sin que nadie lo vea» reproduce bien la ausencia de testigos oculares en español natural.
translation_notes:
  revision_awareness: La POB inglesa se mantuvo sin cambios en su última revisión y alcanzó alta concordancia; esta versión española sigue de cerca la estructura casuística y conserva las mismas ambigüedades léxicas relevantes (especialmente שֶׂה, נִשְׁבַּר y נִשְׁבָּה) sin suavizarlas indebidamente.
  spanish_consistency_notes:
  - Se usó «Yahvé» solo cuando el texto fuente lo requiera; este versículo no contiene el nombre divino.
  - Se mantuvo un estilo legal casuístico breve y directo, acorde con el hebreo.
  - No se añadió terminología eclesiástica ajena al pasaje.
  - Las notas preservan la alternativa de שֶׂה y la literalidad de נִשְׁבַּר, como en el audit trail inglés.
