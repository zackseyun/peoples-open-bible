  to: Él se aferró[a] a Yahvé; no se apartó de seguirlo, y guardó sus mandamientos, que Yahvé había mandado a Moisés.
  rationale: Se reemplaza «se mantuvo fiel» por «se aferró a Yahvé» para reflejar más directamente דבק y alinearse mejor con la decisión lexical del POB («held fast») y su alternativa documentada («clung to»). La nota se ajusta para explicar el matiz de lealtad de alianza sin desplazar al margen la opción más cercana al hebreo. No se requieren más cambios.
