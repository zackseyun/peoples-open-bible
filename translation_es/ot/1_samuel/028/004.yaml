translation:
  language: es
  text: Los filisteos se reunieron, vinieron y acamparon en Sunem[a], y Saúl reunió a todo Israel, y acamparon en Gilboa[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'asentaron campamento' en ambas apariciones de 'acamparon'.
    reason: lexical_alternative
  - marker: b
    text: '''En Gilboa'' también puede traducirse ''sobre Gilboa'' o ''en el monte Gilboa'', porque el nombre puede referirse a la región montañosa de Gilboa.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּקָּבְצוּ
  english_pob_choice: gathered
  chosen_spanish: se reunieron
  alternatives_spanish:
  - se juntaron
  - se congregaron
  - se reunieron juntos
  lexicon: HALOT
  rationale: קבץ expresa reunir o juntar tropas; 'se reunieron' comunica bien el movimiento colectivo sin forzar un tecnicismo militar que el hebreo no explicita.
- source_word: פְלִשְׁתִּים
  english_pob_choice: the Philistines
  chosen_spanish: los filisteos
  alternatives_spanish:
  - los Filisteos
  lexicon: HALOT
  rationale: Nombre étnico/nacional estándar en español bíblico; se mantiene el artículo natural para un grupo conocido.
- source_word: וַיָּבֹאוּ
  english_pob_choice: came
  chosen_spanish: vinieron
  alternatives_spanish:
  - llegaron
  - avanzaron
  lexicon: HALOT
  rationale: בוא aquí marca movimiento narrativo simple. 'Vinieron' conserva la progresión sin añadir matiz militar no requerido.
- source_word: וַיַּחֲנוּ
  english_pob_choice: camped
  chosen_spanish: acamparon
  alternatives_spanish:
  - acamparon allí
  - se instalaron en campamento
  - plantaron el campamento
  lexicon: HALOT
  rationale: חנה denota tender campamento; 'acamparon' es natural en español y mantiene la imagen militar/campamental.
- source_word: בְשׁוּנֵם
  english_pob_choice: at Shunem
  chosen_spanish: en Sunem
  alternatives_spanish:
  - en Shunem
  - en la ciudad de Sunem
  lexicon: HALOT
  rationale: El hebreo nombra el lugar con prefijo locativo; en español bíblico 'en Sunem' es la forma más directa y natural. Se conserva la transliteración común 'Sunem' en lugar de adaptar al inglés 'Shunem'.
- source_word: וַיִּקְבֹּץ
  english_pob_choice: gathered
  chosen_spanish: reunió
  alternatives_spanish:
  - juntó
  - convocó
  - mustered
  lexicon: HALOT
  rationale: El mismo verbo קבץ se aplica a Saúl. 'Reunió' mantiene la correspondencia léxica con la primera cláusula y funciona bien en español con sujeto singular.
- source_word: כָּל יִשְׂרָאֵל
  english_pob_choice: all Israel
  chosen_spanish: a todo Israel
  alternatives_spanish:
  - a todo el Israel
  - a todos los israelitas
  - a todo el pueblo de Israel
  lexicon: HALOT
  rationale: La construcción hebrea es colectiva y no restringe explícitamente a varones. 'A todo Israel' conserva el alcance total; el 'a' refleja el objeto directo personal en español con Saúl como sujeto.
- source_word: וַיַּחֲנוּ
  english_pob_choice: they camped
  chosen_spanish: acamparon
  alternatives_spanish:
  - se acamparon
  - levantaron campamento
  - acamparon allí
  lexicon: HALOT
  rationale: Se preserva el mismo verbo de campamento que al inicio del verso, coherente con la narrativa militar y natural en español.
- source_word: בַּגִּלְבֹּעַ
  english_pob_choice: at Gilboa
  chosen_spanish: en Gilboa
  alternatives_spanish:
  - en el monte Gilboa
  - en los montes de Gilboa
  - sobre Gilboa
  lexicon: HALOT
  rationale: El hebreo nombra Gilboa sin añadir 'monte'. 'En Gilboa' respeta la forma breve del texto; la topografía de colinas puede explicarse en nota sin introducirla en la traducción principal.
translation_notes:
  revision_awareness: La versión en inglés POB fue revisada con acuerdo alto y sin cambios sustantivos. No hay revisiones aplicadas; el español sigue el mismo valor semántico y la misma secuencia narrativa, con adaptación natural al español y conservación de las alternativas léxicas documentadas en las notas.
  spanish_consistency_notes:
  - 'Se mantiene la secuencia verbal del hebreo: reunión, llegada, acampamiento; luego la reunión de Saúl y el acampamiento de Israel.'
  - Se conserva la misma raíz verbal en español para ambos casos mediante 'reunieron/reunió' y 'acamparon'.
  - Se usa 'Sunem' como forma española estable y 'Gilboa' sin añadir 'monte' en el texto principal.
  - No se introduce lenguaje militar más específico que el requerido por el hebreo.
  - La puntuación refleja dos cláusulas coordinadas con punto y coma para claridad narrativa.
