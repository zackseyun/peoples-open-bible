translation:
  language: es
  text: 'Así dice Yahvé: He aquí, un pueblo viene de la tierra del norte, y una gran nación es levantada desde los confines[a] de la tierra.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O “desde los extremos de la tierra” o “desde las partes remotas de la tierra”. La expresión hebrea se refiere a las extremidades o regiones más lejanas.
    reason: lexical_alternative
lexical_decisions:
- source_word: כֹּה אָמַר יְהוָה
  english_pob_choice: Thus says Yahweh
  chosen_spanish: Así dice Yahvé
  alternatives_spanish:
  - Así dice el Yahvé
  - Así ha dicho Yahvé
  lexicon: HALOT
  rationale: La fórmula profética se conserva con una construcción natural en español. 'Así dice' reproduce el presente profético del hebreo y el tono solemne de declaración divina; 'Yahvé' sigue el principio del proyecto para el Tetragrámaton.
- source_word: הִנֵּה
  english_pob_choice: Behold
  chosen_spanish: Miren
  alternatives_spanish:
  - He aquí
  - Vean
  lexicon: HALOT
  rationale: El hebreo llama la atención del oyente con inmediatez profética. 'Miren' conserva ese valor exhortativo en español actual sin perder dignidad; 'He aquí' sería más tradicional, pero menos natural.
- source_word: עַם
  english_pob_choice: a people
  chosen_spanish: un pueblo
  alternatives_spanish:
  - una gente
  - una nación
  lexicon: HALOT
  rationale: עַם designa un grupo humano/pueblo. 'Un pueblo' mantiene la amplitud del término y la distinción frente a גוֹי en la línea paralela.
- source_word: בָּא
  english_pob_choice: is coming
  chosen_spanish: viene
  alternatives_spanish:
  - está viniendo
  - está llegando
  lexicon: HALOT
  rationale: El verbo en contexto profético expresa cercanía e inminencia. 'Viene' suena más natural en español y conserva el valor de movimiento hacia el oyente.
- source_word: מֵאֶרֶץ צָפוֹן
  english_pob_choice: from the land of the north
  chosen_spanish: de la tierra del norte
  alternatives_spanish:
  - de la región del norte
  - de la tierra del septentrión
  lexicon: HALOT
  rationale: Se preservan tanto 'tierra' como la referencia direccional 'del norte'. 'Tierra del norte' refleja bien el hebreo sin sobreinterpretar el lugar exacto.
- source_word: וְגוֹי גָּדוֹל
  english_pob_choice: and a great nation
  chosen_spanish: y una nación grande
  alternatives_spanish:
  - y una gran nación
  - y un pueblo grande
  lexicon: HALOT
  rationale: גוֹי suele tener matiz político/étnico amplio; 'nación' mantiene esa fuerza y distingue la segunda cola de 'pueblo'. Se conserva también el orden adjetival del hebreo con naturalidad en español.
- source_word: יֵעֹר
  english_pob_choice: is stirred up
  chosen_spanish: es despertada
  alternatives_spanish:
  - es despertado
  - es alzada
  - es agitada
  lexicon: HALOT
  rationale: El niphal de עור expresa ser despertado/roused para acción. 'Es despertada' transmite el pasivo con claridad y evita una paráfrasis excesiva; se conserva la imagen de movilización.
- source_word: מִיַּרְכְּתֵי אָרֶץ
  english_pob_choice: from the farthest parts of the earth
  chosen_spanish: desde los confines de la tierra
  alternatives_spanish:
  - desde las partes más remotas de la tierra
  - desde los extremos de la tierra
  lexicon: HALOT
  rationale: ירכתי apunta a extremidades o confines lejanos. 'Confines de la tierra' es una equivalencia idiomática clara en español que preserva la idea de lejanía extrema.
theological_decisions:
- issue: Renderización del nombre divino YHWH
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - el SEÑOR
  rationale: El texto hebreo contiene el Tetragrámaton y la política del proyecto pide 'Yahvé' en el cuerpo principal. Se evita la sustitución por 'SEÑOR' para no ocultar el nombre propio del pacto.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Valor semántico de גוֹי frente a עַם
  english_pob_reading: a people / a great nation
  chosen_spanish_reading: un pueblo / una nación grande
  alternative_spanish_readings:
  - un pueblo / un gran pueblo
  - una gente / una gran gente
  rationale: 'Se conserva la distinción del paralelismo hebreo: עַם como ''pueblo'' y גוֹי como ''nación''. Esto evita aplanar dos términos distintos y mantiene el matiz de entidad colectiva y política.'
  doctrine_reference: Jeremiah 6:22 parallelism; lexical distinction in Hebrew
translation_notes:
  revision_awareness: El borrador sigue la revisión más reciente del audit trail al usar una pasiva directa para יֵעוֹר, pero en español opta por 'es despertada' para mantener naturalidad y conservar el matiz de movilización sin introducir una perífrasis progresiva.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' como forma principal para el nombre divino, conforme al estándar del proyecto.
  - Se preserva la distinción paralela entre 'pueblo' y 'nación' para reflejar עַם / גוֹי.
  - '''Desde los confines de la tierra'' recoge la nota textual/lexical sobre la expresión de lejanía extrema y se marca con nota al pie.'
  - El tono es formal y profético, sin arcaísmos innecesarios, y evita calcos ingleses como 'behold'.
