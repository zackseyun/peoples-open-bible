  - severity: medium
    issue: «Se constriñe en su propio modo de vida» es poco natural en español.
    rationale: Aunque intenta reflejar la auto-coacción del griego, la expresión resulta rígida. «Refrena su propia manera de vivir» o similar comunica mejor el sentido de dominar la inclinación personal.
  - severity: low
