    reason: alternative_reading
  - marker: b
    text: 'O: «atados» o «amarrados», describiendo odres reparados al ser sujetos después de haberse rajado.'
    reason: lexical_alternative
  revision_rationale: Se corrigió el principal problema de fidelidad trasladando la nota al verbo difícil וַיִּצְטַיָּרוּ y ajustando su traducción a «se aprovisionaron», que preserva mejor la decisión auditada inglesa «made provisions» que el previo «se prepararon». Se mantuvo «con astucia» para בְּעָרְמָה. También se refinó «rotos» a «rajados» para reflejar mejor «split open», conservando «remendados» con nota alternativa sobre «atados/amarrados».
