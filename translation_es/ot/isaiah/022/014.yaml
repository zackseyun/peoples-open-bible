translation:
  language: es
  text: 'Yahvé de los Ejércitos ha revelado en mis oídos: «Ciertamente, esta iniquidad no será expiada[a] hasta que ustedes mueran», dice el Señor Dios, Yahvé de los Ejércitos[b].'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: la fórmula de juramento equivale literalmente a «si esta iniquidad será expiada para ustedes», un giro que aquí expresa negación enfática: «ciertamente no será expiada».'
    reason: lexical_alternative
  - marker: b
    text: O «Yahvé de las Huestes»; también, para la cláusula completa, «el Señor Dios, Yahvé de las Huestes».
    reason: lexical_alternative
lexical_decisions:
- source_word: וְנִגְלָה
  english_pob_choice: has revealed
  chosen_spanish: ha revelado
  alternatives_spanish:
  - se ha revelado
  - fue revelado
  lexicon: HALOT
  rationale: El nifal aquí funciona como fórmula de revelación profética; en español, "ha revelado" comunica con naturalidad que Yahvé es el sujeto de la acción, como en el audit trail inglés.
- source_word: בְאָזְנַי
  english_pob_choice: in my ears
  chosen_spanish: en mis oídos
  alternatives_spanish:
  - en mi oído
  - para mis oídos
  lexicon: HALOT
  rationale: Conserva la imagen concreta del hebreo y la solemnidad de una revelación directamente oída.
- source_word: יְהוָה צְבָאֹות
  english_pob_choice: the LORD of Armies
  chosen_spanish: Yahvé de los Ejércitos
  alternatives_spanish:
  - Yahvé de las Huestes
  - el Señor de los Ejércitos
  lexicon: HALOT
  rationale: Se mantiene el nombre divino como "Yahvé" según el criterio del proyecto, y צְבָאֹות se vierte por sentido como "de los Ejércitos" para preservar transparencia semántica.
- source_word: אִם
  english_pob_choice: Surely
  chosen_spanish: Ciertamente
  alternatives_spanish:
  - Seguro que
  - De veras
  lexicon: HALOT
  rationale: En una fórmula de juramento, אִם introduce una negación enfática implícita; en español se expresa mejor con un adverbio de certeza y la negación explícita, sin perder el valor idiomático.
- source_word: יְכֻפַּר
  english_pob_choice: will not be atoned for
  chosen_spanish: no será expiada
  alternatives_spanish:
  - no será perdonada
  - no se hará expiación por
  lexicon: HALOT
  rationale: El pasivo de כפר conserva el campo sacrificial de la expiación. "Expiada" es más preciso que "perdonada" para no reducir el término a solo absolución subjetiva.
- source_word: הֶעָוֹן הַזֶּה
  english_pob_choice: this iniquity
  chosen_spanish: esta iniquidad
  alternatives_spanish:
  - esta culpa
  - este pecado
  lexicon: HALOT
  rationale: '"Iniquidad" mantiene el peso moral del sustantivo hebreo y corresponde bien al registro profético del versículo.'
- source_word: עַד תְּמֻתוּן
  english_pob_choice: until you die
  chosen_spanish: hasta que ustedes mueran
  alternatives_spanish:
  - hasta que mueran
  - hasta su muerte
  lexicon: HALOT
  rationale: Se expresa con claridad el plural de segunda persona; "ustedes" evita ambigüedad en español y conserva el tono directo de amonestación.
- source_word: אָמַר אֲדֹנָי יְהוִה צְבָאֹות
  english_pob_choice: says the Lord GOD of Armies
  chosen_spanish: dice el Señor Yahvé de los Ejércitos
  alternatives_spanish:
  - dice el Señor Dios de los Ejércitos
  - declara el Señor Yahvé de los Ejércitos
  lexicon: HALOT
  rationale: La combinación אֲדֹנָי + יְהוִה se vierte de forma diferenciada como "Señor Yahvé" para respetar ambos elementos hebreos sin crear una repetición artificial.
theological_decisions:
- issue: Tratamiento de יהוה / YHWH
  english_pob_reading: Yahweh is rendered as the divine name rather than masked by 'the LORD'.
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Señor
  - el SEÑOR
  rationale: El proyecto pide traducir directamente el Nombre divino como "Yahvé"; se mantiene esa decisión en español para transparencia y coherencia con la teología del texto hebreo.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Fuerza de la fórmula de juramento con אִם
  english_pob_reading: '''Surely this iniquity will not be atoned for...'' rather than a literal conditional.'
  chosen_spanish_reading: Ciertamente, esta iniquidad no será expiada...
  alternative_spanish_readings:
  - Si esta iniquidad es expiada...
  - Ojalá esta iniquidad sea expiada...
  rationale: El hebreo emplea una elipsis juramentaria que expresa negación enfática. En español conviene hacer explícita esa fuerza para no leerla como condicional ordinaria.
  doctrine_reference: Hebrew oath-formula conventions in prophetic denunciation
- issue: Distinción entre אֲדֹנָי y יְהוִה
  english_pob_reading: the Lord GOD
  chosen_spanish_reading: el Señor Yahvé
  alternative_spanish_readings:
  - el Señor Dios
  - el Señor Dios Yahvé
  rationale: La combinación refleja dos formas distintas del texto hebreo. "Señor Yahvé" preserva la distinción mejor que una duplicación sonora o una normalización devocional.
  doctrine_reference: Hebrew divine-name usage and reverential title conventions
translation_notes:
  revision_awareness: El texto inglés revisado eliminó 'for you' por ajuste de naturalidad, pero el hebreo sigue llevando לָכֶם. En español se ha optado por expresar el objeto implícito de la expiación de forma idiomática sin añadirlo explícitamente, conservando la fuerza colectiva del reproche. También se preservó la distinción entre יְהוָה y אֲדֹנָי mediante 'Yahvé' y 'Señor'.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' para יְהוָה, no 'SEÑOR'.
  - '''Ejércitos'' traduce צְבָאֹות de forma transparente y consistente.'
  - '''Expiada'' conserva el lenguaje sacrificial de כפר.'
  - La cita usa comillas angulares españolas y puntuación conforme al uso moderno.
