lexical_decisions:
- source_word: גַּם
  english_pob_choice: too
  chosen_spanish: también
  alternatives_spanish:
  - además
  - igualmente
  lexicon: HALOT
  rationale: גַּם añade a Job al grupo de quienes poseen la misma capacidad intelectual; «también» expresa esa inclusión de manera natural en español.
- source_word: לִי לֵבָב
  english_pob_choice: I have a mind
  chosen_spanish: tengo entendimiento
  alternatives_spanish:
  - tengo corazón
  - tengo mente
  - tengo inteligencia
  lexicon: HALOT
  rationale: לֵבָב literalmente es «corazón», pero aquí designa la facultad de entender o pensar. En español, «entendimiento» conserva la fuerza cognitiva sin sonar artificial; se preserva la nota alternativa por la tensión lexical.
- source_word: כְּמוֹכֶם
  english_pob_choice: like you
  chosen_spanish: como ustedes
  alternatives_spanish:
  - igual que ustedes
  - como vosotros
  lexicon: HALOT
  rationale: La comparación directa con los interlocutores requiere un español claro y natural; «como ustedes» mantiene el paralelismo de la fuente.
- source_word: לֹא נֹפֵל אָנֹכִי מִכֶּם
  english_pob_choice: I am not inferior to you
  chosen_spanish: no soy inferior a ustedes
  alternatives_spanish:
  - no estoy por debajo de ustedes
  - no les soy inferior
  lexicon: HALOT
  rationale: El hebreo usa el modismo de «caer de» alguien para expresar inferioridad. En español, «no soy inferior a ustedes» comunica el sentido comparativo con claridad y sin perder la carga idiomática.
- source_word: וְאֶת מִי אֵין כְּמוֹ אֵלֶּה
  english_pob_choice: And who does not know such things as these?
  chosen_spanish: ¿Y quién no sabe cosas como estas?
  alternatives_spanish:
  - ¿Y quién no conoce cosas como estas?
  - ¿Y quién no tiene cosas como estas?
  lexicon: HALOT
  rationale: La cláusula es elíptica e idiomática; el sentido en contexto es desestimar como obvio y común lo que dicen los amigos. «Sabe» expresa bien ese conocimiento general sin forzar una literalidad oscura.
translation_notes:
  revision_awareness: El texto hebreo y el audit trail inglés están en alto acuerdo. Se mantiene la tensión léxica entre «corazón» y el sentido cognitivo, pero se optó por un español más natural y publicable. No se requieren revisiones textuales adicionales.
  spanish_consistency_notes:
  - Se usa «ustedes» para un registro neutro latinoamericano y coherente con el resto de la serie.
  - Se evita «SEÑOR» u այլ terminología no presente en el versículo.
  - La nota a conserva la alternativa literal documentada por el POB inglés y explica el valor antropológico de לֵבָב.
