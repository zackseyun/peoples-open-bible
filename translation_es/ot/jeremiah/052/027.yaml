revisions:
- from: Y el rey de Babilonia los hirió de muerte en Ribla, en la tierra de Hamat. Así, Judá fue llevada al destierro lejos de su tierra.
  to: Y el rey de Babilonia los hirió y les dio muerte en Ribla, en la tierra de Hamat. Así, Judá fue llevado al destierro de su tierra.
  rationale: Se revisó para preservar mejor la secuencia de dos verbos del hebreo, mejorar la concordancia e idiomaticidad con 'Judá', y eliminar el matiz añadido de 'lejos' que no está en el original.
