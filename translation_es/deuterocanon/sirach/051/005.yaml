review_pass:
  verdict: revise
  source_alignment_summary: El borrador español no sigue la fuente hebrea principal ni el rastro de auditoría del POB en inglés. El hebreo conservado dice 'de labios de maldad ... de los que untan/confeccionan mentiras ... y de las flechas de una lengua engañosa', mientras que el borrador adopta la lectura griega paralela en el texto principal e incluso añade material de la cláusula previa ('desde la profundidad del vientre del Hades') ausente del texto hebreo dado para este versículo. El POB inglés explícitamente sigue el hebreo en el texto principal y relega el griego a nota.
  spanish_quality_summary: El español del borrador es gramatical, pero no es fiel al versículo fuente ni a la política textual del proyecto. Además, 'untan mentiras' en la nota es algo torpe; en el texto principal conviene una formulación natural y fiel como 'los que traman mentiras' o conservar la metáfora con nota si se desea. La línea poética funciona bien en español con 'labios', 'flechas' y 'lengua'.
  glossary_alignment: 'No hay términos teológicos mayores en juego, pero sí una desviación grave de la decisión lexical/documental: debe privilegiarse el hebreo extante. ''Lengua'' y ''labios'' concuerdan con la imaginería del POB. Para טֹפְלֵי שֶׁקֶר, una solución española natural es ''los que traman mentiras'', mientras la nota preserve que el griego lee ''una lengua impura y una palabra falsa''.'
  issues:
  - severity: high
    issue: Se usó la lectura griega paralela como texto principal en lugar del hebreo conservado.
    rationale: La evidencia fuente y el POB inglés establecen que, donde sobrevive el hebreo de Sirácides, debe seguirse en el texto principal; la variante griega va en nota.
  - severity: high
    issue: El borrador incluye 'desde la profundidad del vientre del Hades', material que no pertenece al texto hebreo proporcionado para este versículo.
    rationale: Esa frase procede de la línea griega y además refleja arrastre contextual de la cláusula anterior; no corresponde al contenido del versículo a traducir según la fuente principal dada.
  - severity: medium
    issue: La nota al pie invierte la relación textual, presentando el hebreo como variante y el griego como principal.
    rationale: Esto contradice la auditoría inglesa y la política editorial documentada.
  - severity: medium
    issue: La representación española de טֹפְלֵי שֶׁקֶר necesita mejor equilibrio entre fidelidad y legibilidad.
    rationale: Una traducción demasiado literal como 'los que untan mentiras' suena extraña; 'los que traman mentiras' o 'los que urden mentiras' comunica bien el sentido, mientras la nota puede preservar la metáfora de 'smear/plaster' si hiciera falta.
