    text: Or, more dynamically, 'to your homes.' The Hebrew reads 'to your tents,' an idiom for dispersing to one's own place.
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'Each man to your tents, O Israel' uses a masculine singular noun distributively.
    reason: cultural_note
