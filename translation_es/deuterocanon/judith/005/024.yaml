translation:
  language: es
  text: Por tanto, ciertamente subiremos[a], y serán alimento[b] para todo tu ejército, amo Holofernes.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'marcharemos' o 'ascenderemos'. El griego expresa un movimiento ascendente en contexto militar.
    reason: lexical_alternative
  - marker: b
    text: O 'presa' o 'algo para ser devorado'; el griego dice literalmente 'para devoramiento'.
    reason: lexical_alternative
lexical_decisions:
- source_word: διὸ δὴ
  english_pob_choice: Therefore ... indeed
  chosen_spanish: Por tanto, ciertamente
  alternatives_spanish:
  - Así que, ciertamente
  - Por ello, sin duda
  lexicon: LSJ
  rationale: διό expresa conclusión causal y δή añade énfasis; 'Por tanto, ciertamente' conserva ambas fuerzas en un español natural y solemne.
- source_word: ἀναβησόμεθα
  english_pob_choice: we will ... go up
  chosen_spanish: subiremos
  alternatives_spanish:
  - iremos a subir
  - marcharemos hacia arriba
  lexicon: LSJ
  rationale: El futuro de ἀναβαίνω en contexto militar puede ser 'subir' o 'avanzar'. 'Subiremos' mantiene la imagen direccional sin volverla artificial en español.
- source_word: ἔσονται
  english_pob_choice: they will become
  chosen_spanish: serán
  alternatives_spanish:
  - se volverán
  - llegarán a ser
  lexicon: LSJ
  rationale: El griego usa un futuro de 'ser' con valor resultativo. En español, 'serán para devorar' comunica el resultado sin forzar una perífrasis innecesaria.
- source_word: εἰς κατάβρωμα
  english_pob_choice: food
  chosen_spanish: para devorar
  alternatives_spanish:
  - presa
  - alimento
  - comida
  lexicon: LSJ
  rationale: κατάβρωμα denota aquello que es comido o devorado. La frase 'para devorar' preserva la fuerza imagística y el matiz de presa/víctima que 'alimento' suavizaría demasiado.
- source_word: πάσης τῆς στρατειᾶς σου
  english_pob_choice: all your army
  chosen_spanish: todo tu ejército
  alternatives_spanish:
  - todo tu hoste
  - toda tu fuerza
  lexicon: LSJ
  rationale: στρατειά significa ejército o hueste. 'Todo tu ejército' refleja de modo claro y natural el conjunto total indicado por πάσης.
- source_word: δέσποτα
  english_pob_choice: master
  chosen_spanish: señor
  alternatives_spanish:
  - amo
  - soberano
  lexicon: LSJ
  rationale: δέσποτα es un vocativo de autoridad. En español, 'señor' reproduce la deferencia y evita importar el peso doctrinal de 'Señor' como traducción fija de κύριος.
- source_word: Ὀλοφέρνη
  english_pob_choice: Holofernes
  chosen_spanish: Holofernes
  lexicon: transliteration
  rationale: Nombre propio transliterado de forma estándar.
theological_decisions:
- issue: Vocativo de autoridad en δέσποτα
  english_pob_reading: master
  chosen_spanish_reading: señor
  alternative_spanish_readings:
  - amo
  - soberano
  rationale: El griego no usa κύριος, por lo que no corresponde cargar el término con la convención bíblica habitual de 'Señor'. 'Señor' aquí funciona como tratamiento de respeto y autoridad, sin implicación doctrinal adicional.
  doctrine_reference: 'DOCTRINE.md: Translate titles; preserve distinctions between κύριος and other address terms'
translation_notes:
  revision_awareness: Se tomó en cuenta la revisión inglesa más reciente, que ajustó la frase de posesión para reflejar con mayor precisión πάσης τῆς στρατειᾶς σου ('todo/all tu ejército'). Por eso se eligió 'todo tu ejército'.
  spanish_consistency_notes:
  - Se mantuvo el tratamiento de respeto 'señor' para δέσποτα, distinguiéndolo de 'Señor' reservado normalmente para κύριος.
  - '''Subiremos'' conserva la dirección ascendente del verbo griego sin introducir un matiz de ataque no explicitado en la forma verbal.'
  - La expresión 'para devorar' intenta preservar el sentido resultativo e imagístico de κατάβρωμα sin desdibujarlo en una mera equivalencia funcional.
