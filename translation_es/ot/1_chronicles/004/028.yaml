revisions:
- from: Habitaron en Beer-seba[a], Molada y Hazar-Sual[b].
  to: Habitaron en Beerseba[a], Moladá y Hazar-sual.
  rationale: 'Se conserva «Habitaron» por su buena correspondencia con וַיֵּשְׁבוּ. Se normalizan los topónimos a formas españolas más coherentes y trazables al hebreo: «Beerseba» como forma común y clara en español, «Moladá» para reflejar mejor מוֹלָדָה, y «Hazar-sual» con minúscula tras guion según uso ortográfico general y transliteración estable. Se elimina la nota problemática sobre Hazar-sual para evitar perpetuar la desalineación del rastro inglés, manteniendo solo una nota realmente útil para una variante ortográfica conocida.'
