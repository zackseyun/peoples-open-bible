revisions:
- from: Recuerda la ira en los días de tu fin[a], y el tiempo de venganza en el apartamiento del rostro[b].
  to: Recuerda la ira[a] en los días de tu fin, y el tiempo de venganza al apartarse el rostro[b].
  rationale: Se ajusta la cláusula final a 'al apartarse el rostro' para conservar la imagen del griego y la impersonalidad teológica del original, pero con mejor naturalidad en español que 'en el apartamiento del rostro'. También se corrige la nota b para que la explicación literal sea más coherente y legible en español.
