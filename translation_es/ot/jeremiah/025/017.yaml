translation:
  language: es
  text: Tomé la copa de la mano de Yahvé y hice beber[a][b] a todas las naciones a las que Yahvé me había enviado.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: “de la mano de Yahvé”, un giro idiomático que expresa recepción directa de él.'
    reason: cultural_note
  - marker: b
    text: 'O “y di a beber a todas las naciones”; el verbo hebreo es causativo: “hizo/causó beber”.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וָאֶקַּח
  english_pob_choice: So I took
  chosen_spanish: Tomé
  alternatives_spanish:
  - Entonces tomé
  - Y tomé
  lexicon: HALOT
  rationale: El wayyiqtol narra acción consecutiva; en español, el perfecto simple suele expresar mejor la secuencia narrativa sin añadir un conector innecesario.
- source_word: הַכּוֹס
  english_pob_choice: the cup
  chosen_spanish: la copa
  alternatives_spanish:
  - el cáliz
  - la taza
  lexicon: HALOT
  rationale: כּוֹס es “copa”; “cáliz” suena más litúrgico y puede cargar matices no pedidos por el hebreo.
- source_word: מִיַּד יְהוָה
  english_pob_choice: from the hand of Yahweh
  chosen_spanish: de la mano de Yahvé
  alternatives_spanish:
  - de Yahvé
  - de la mano del Señor
  lexicon: HALOT
  rationale: Se conserva la imagen idiomática de “mano”, que en el original expresa recepción directa; se usa Yahvé por la convención doctrinal del proyecto.
- source_word: וָאַשְׁקֶה
  english_pob_choice: and made ... drink
  chosen_spanish: y di a beber
  alternatives_spanish:
  - y hice beber
  - y causé que bebieran
  lexicon: HALOT
  rationale: El hiphil es causativo. “Di a beber” suena natural en español y mantiene la idea de hacer beber sin sobrerrepresentar con una perífrasis pesada.
- source_word: כָּל הַגּוֹיִם
  english_pob_choice: all the nations
  chosen_spanish: a todas las naciones
  alternatives_spanish:
  - a todos los pueblos
  - a todas las gentes
  lexicon: HALOT
  rationale: En este contexto oracular, גּוֹיִם refiere a las naciones extranjeras; “naciones” conserva mejor el registro bíblico y político del pasaje.
- source_word: אֲשֶׁר שְׁלָחַנִי יְהוָה אֲלֵיהֶם
  english_pob_choice: to whom Yahweh had sent me
  chosen_spanish: a las cuales Yahvé me había enviado
  alternatives_spanish:
  - a quienes Yahvé me había enviado
  - adonde Yahvé me había enviado
  lexicon: HALOT
  rationale: La relativa modifica a “las naciones”; en español, “a las cuales” mantiene la referencia formal al antecedente y evita ambigüedad de persona.
theological_decisions:
- issue: Renderización del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Jehová
  - el SEÑOR
  rationale: 'Se sigue la directriz del proyecto para el Tetragrámaton: transliteración del nombre propio divino en lugar de una sustitución titular.'
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Valor causativo del verbo hiphil שׁקה
  english_pob_reading: made ... drink
  chosen_spanish_reading: di a beber
  alternative_spanish_readings:
  - hice beber
  - causé que bebieran
  rationale: El hebreo no dice solo ‘dar bebida’, sino provocar que beban. La opción española conserva ese sentido causal sin perder fluidez.
  doctrine_reference: HALOT, שׁקה (causative hiphil)
translation_notes:
  revision_awareness: 'El texto inglés auditado fue revisado para aclarar que el relativo final se une a “the nations”. La versión española sigue esa misma estructura: la cláusula “a las cuales Yahvé me había enviado” queda pegada a “todas las naciones”, sin coma intermedia, para evitar ambigüedad.'
  spanish_consistency_notes:
  - Se mantiene Yahvé como forma del nombre divino en todo el registro, en coherencia con la convención del proyecto.
  - Se usa “copa” para כּוֹס y no “cáliz”, evitando una carga litúrgica no exigida por el contexto.
  - La construcción “di a beber” conserva el valor causativo del hiphil de manera idiomática.
  - El relativo “a las cuales” preserva el antecedente plural femenino “naciones” y reproduce la relación sintáctica del hebreo.
