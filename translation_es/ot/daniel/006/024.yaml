translation:
  language: es
  text: Entonces el rey se alegró muchísimo por causa de él, y ordenó que Daniel fuera sacado del foso[a]. Así Daniel fue sacado del foso, y no se halló en él ningún daño, porque había confiado en su Dios[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «del foso de los leones» o «de la guarida». El sustantivo arameo denota un recinto semejante a un foso; en este contexto es el lugar donde estaban los leones.
    reason: lexical_alternative
  - marker: b
    text: O «porque había creído en su Dios». El verbo puede significar «confiar» o «creer»; aquí se elige «confiado» para destacar la dependencia personal de Daniel en el contexto.
    reason: lexical_alternative
lexical_decisions:
- source_word: בֵּאדַיִן
  english_pob_choice: Then
  chosen_spanish: Entonces
  alternatives_spanish:
  - Luego
  - En ese momento
  lexicon: HALOT
  rationale: Marcador discursivo que introduce la secuencia narrativa; «Entonces» conserva el flujo temporal de manera natural en español.
- source_word: מַלְכָּא
  english_pob_choice: the king
  chosen_spanish: el rey
  alternatives_spanish:
  - el rey mismo
  lexicon: HALOT
  rationale: Forma enfática definida; «el rey» es la traducción directa y natural.
- source_word: שַׂגִּיא טְאֵב
  english_pob_choice: was very glad
  chosen_spanish: se alegró muchísimo
  alternatives_spanish:
  - se regocijó grandemente
  - estuvo muy complacido
  lexicon: HALOT
  rationale: La combinación intensifica la respuesta emocional del rey; «se alegró muchísimo» expresa bien la fuerza sin sonar arcaica.
- source_word: עֲלֹוהִי
  english_pob_choice: because of him
  chosen_spanish: por causa de él
  alternatives_spanish:
  - a causa de él
  - por él
  lexicon: HALOT
  rationale: La preposición con sufijo expresa la ocasión o motivo de la alegría del rey en relación con Daniel. «Por causa de él» mantiene esa relación causal de forma clara.
- source_word: וּלְדָנִיֵּאל אֲמַר
  english_pob_choice: and he ordered that Daniel
  chosen_spanish: y ordenó que Daniel
  alternatives_spanish:
  - y dijo acerca de Daniel
  - y mandó respecto de Daniel
  lexicon: HALOT
  rationale: Aunque literalmente puede leerse «y a Daniel dijo», el infinitivo siguiente muestra valor de mandato; en español conviene explicitarlo como orden.
- source_word: לְהַנְסָקָה
  english_pob_choice: be brought up
  chosen_spanish: fuera traído de vuelta
  alternatives_spanish:
  - fuera sacado
  - fuera levantado
  lexicon: HALOT
  rationale: El causativo de נסק indica subir/extraer. Dado que Daniel estaba abajo en el foso, «fuera traído de vuelta» comunica la acción de ser sacado hacia arriba sin perder naturalidad.
- source_word: מִן גֻּבָּא
  english_pob_choice: from the pit
  chosen_spanish: desde el foso
  alternatives_spanish:
  - desde la fosa
  - desde el pozo
  lexicon: HALOT
  rationale: El término arameo designa una cavidad tipo foso; en este contexto es el foso de los leones. «Foso» conserva mejor la imagen contextual que «pozo».
- source_word: וְהֻסַּק
  english_pob_choice: was brought up
  chosen_spanish: fue traído
  alternatives_spanish:
  - fue levantado
  - fue sacado
  lexicon: HALOT
  rationale: La pasiva causativa retoma la orden anterior; «fue traído» enlaza de modo natural con «fuera traído de vuelta».
- source_word: וְכָל חֲבָל לָא הִשְׁתְּכַח בֵּהּ
  english_pob_choice: and no kind of harm was found on him
  chosen_spanish: y no se halló en él ningún daño
  alternatives_spanish:
  - y no se encontró en él ningún perjuicio
  - y no se halló en él lesión alguna
  lexicon: HALOT
  rationale: חבל denota daño, perjuicio o lesión. «Ningún daño» refleja el alcance total de כל y conserva el examen de si se encontró algo en él.
- source_word: דִּי
  english_pob_choice: because
  chosen_spanish: porque
  alternatives_spanish:
  - ya que
  - puesto que
  lexicon: HALOT
  rationale: Introduce la causa de la preservación de Daniel; «porque» es la forma más directa y natural.
- source_word: הֵימִן
  english_pob_choice: he had trusted
  chosen_spanish: había confiado
  alternatives_spanish:
  - había creído
  - había depositado su confianza
  lexicon: HALOT
  rationale: El verbo puede significar confiar o creer; se elige «confiado» para destacar la dependencia personal de Daniel en Dios, como en el texto inglés POB.
- source_word: בֵּאלָהֵהּ
  english_pob_choice: in his God
  chosen_spanish: en su Dios
  alternatives_spanish:
  - en el Dios de él
  - en su propio Dios
  lexicon: HALOT
  rationale: La preposición más el sufijo posesivo expresan relación personal con Dios; «su Dios» es la forma natural en español y preserva esa relación.
theological_decisions:
- issue: Fundamento de la liberación de Daniel
  english_pob_reading: because he had trusted in his God
  chosen_spanish_reading: porque había confiado en su Dios
  alternative_spanish_readings:
  - porque había creído en su Dios
  - porque había puesto su confianza en su Dios
  rationale: El texto atribuye la preservación de Daniel a su confianza en Dios. La traducción mantiene esa causalidad sin ampliar el enunciado a una explicación doctrinal que el versículo no desarrolla.
  doctrine_reference: Preservar la tensión teológica sin resolverla artificialmente.
translation_notes:
  revision_awareness: 'Se siguió el audit trail inglés sin depender mecánicamente de él: se mantuvo la secuencia narrativa, el valor causal de עֲלֹוהִי/דִּי, y la ambigüedad léxica de גֻּבָּא/הֵימִן; no se introdujeron añadidos doctrinales ni se suavizó la referencia al foso.'
  spanish_consistency_notes:
  - Se usó «Dios» para אֱלָהֵהּ y «confiado» para הֵימִן, en continuidad con el valor relacional del texto.
  - «Foso» se prefirió a «den» por ser término transparente en español y por corresponder al entorno narrativo de Daniel 6.
  - La construcción pasiva perifrástica «fue traído» mantiene fluidez y evita un calco duro del arameo.
