translation:
  language: es
  text: Ellos vienen contra nosotros con gran insolencia y anarquía[a], para exterminarnos a nosotros, a nuestras esposas y a nuestros hijos, y para despojarnos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «con una gran multitud de insolencia y de anarquía». La construcción griega puede expresarse más literalmente, pero el texto principal comunica el sentido de manera más natural en español.
    reason: lexical_alternative
lexical_decisions:
- source_word: αὐτοὶ ἔρχονται πρὸς ἡμᾶς
  english_pob_choice: They are coming against us
  chosen_spanish: Ellos vienen contra nosotros
  alternatives_spanish:
  - Vienen hacia nosotros
  - Están avanzando contra nosotros
  lexicon: LSJ
  rationale: πρός con ἡμᾶς en este contexto militar expresa hostilidad dirigida; «contra nosotros» conserva ese matiz adversativo de manera natural en español.
- source_word: πλήθει
  english_pob_choice: with a great multitude
  chosen_spanish: con una gran multitud
  alternatives_spanish:
  - en gran multitud
  - con mucha gente
  lexicon: LSJ
  rationale: El dativo indica circunstancia o acompañamiento; «con una gran multitud» sigue de cerca la relación de la construcción y sugiere gran número sin sonar forzado.
- source_word: ὕβρεως
  english_pob_choice: insolence
  chosen_spanish: insolencia
  alternatives_spanish:
  - arrogancia
  - violencia insolente
  lexicon: LSJ
  rationale: ὕβρις combina arrogancia violenta y desprecio abusivo; «insolencia» preserva bien el componente moral y de desafío ofensivo.
- source_word: ἀνομίας
  english_pob_choice: lawlessness
  chosen_spanish: iniquidad
  alternatives_spanish:
  - desafuero
  - ilegalidad
  lexicon: LSJ
  rationale: Aunque el sentido literal es «sin ley», en español bíblico «iniquidad» comunica la oposición moral y judicial al orden debido; se evita una traducción demasiado jurídica o moderna que debilitaría el peso ético del término.
- source_word: τοῦ ἐξᾶραι ἡμᾶς
  english_pob_choice: to wipe out us
  chosen_spanish: para exterminarnos
  alternatives_spanish:
  - para destruirnos
  - para borrarnos de la tierra
  lexicon: LSJ
  rationale: El infinitivo articular expresa propósito; ἐξαίρω aquí implica sacar de en medio hasta eliminar. «Exterminarnos» comunica la intención de aniquilación total con fuerza adecuada en español.
- source_word: τὰς γυναῖκας ἡμῶν καὶ τὰ τέκνα ἡμῶν
  english_pob_choice: our wives and our children
  chosen_spanish: a nuestras mujeres y a nuestros hijos
  alternatives_spanish:
  - a nuestras esposas y a nuestros hijos
  - a nuestras mujeres casadas y a nuestros hijos
  lexicon: LSJ
  rationale: Aunque el inglés POB tomó «wives» por el contexto, el griego dice literalmente «mujeres»; en español, «nuestras mujeres» mantiene la forma del texto sin imponer una glosa interpretativa no explicitada en el griego.
- source_word: τοῦ σκυλεῦσαι ἡμᾶς
  english_pob_choice: to plunder us
  chosen_spanish: y para despojarnos
  alternatives_spanish:
  - y para saquearnos
  - y para despojarnos del botín
  lexicon: LSJ
  rationale: σκυλεύω significa despojar tras la victoria; «despojarnos» conserva la imagen de quitar bienes o botín, y en español permite unir con naturalidad la serie de propósitos.
translation_notes:
  revision_awareness: La traducción inglesa revisó «in a great mass» por «with a great multitude» para ajustar πλήθει a un inglés más natural y más cercano al griego. La versión española sigue esa misma línea, usando «con una gran multitud» para reflejar el dativo de manera fluida.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma del proyecto, pero este versículo no contiene el nombre divino.
  - Se conserva un registro formal y bíblico sin recurrir a calcos rígidos.
  - Se evita traducir ἀνομία con un término exclusivamente legalista; se eligió «iniquidad» para mantener el alcance moral en español.
  - Se conserva la coordinación final «y para despojarnos» para reflejar el segundo infinitivo de propósito.
