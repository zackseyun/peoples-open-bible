translation:
  language: es
  text: Los días que Jeroboam reinó fueron veintidós años. Luego descansó con sus padres[a], y Nadab su hijo llegó a ser rey en su lugar.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, de manera más tradicional, «durmió con sus padres». El hebreo es un modismo de muerte en una fórmula de sucesión real.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהַיָּמִים אֲשֶׁר
  english_pob_choice: The days that
  chosen_spanish: Los días en que
  alternatives_spanish:
  - Ahora, los días en que
  - Y los días en que
  lexicon: HALOT
  rationale: En un resumen de reinado, la expresión hebrea introduce la duración del período. En español, «Los días en que» conserva el valor temporal de la fórmula sin volverla forzada ni excesivamente literal.
- source_word: מָלַךְ
  english_pob_choice: reigned
  chosen_spanish: reinó
  alternatives_spanish:
  - fue rey
  - gobernó
  lexicon: HALOT
  rationale: En contexto real, מלך designa el ejercicio del reinado. «Reinó» es la forma española más natural y precisa para una nota cronística.
- source_word: עֶשְׂרִים וּשְׁתַּיִם שָׁנָה
  english_pob_choice: twenty-two years
  chosen_spanish: veintidós años
  alternatives_spanish:
  - veinte y dos años
  lexicon: HALOT
  rationale: La cifra se expresa en español moderno de manera idiomática, sin perder el valor numérico del hebreo.
- source_word: וַיִּשְׁכַּב עִם אֲבֹתָיו
  english_pob_choice: he lay down with his fathers
  chosen_spanish: se acostó con sus padres[a]
  alternatives_spanish:
  - durmió con sus padres
  - murió y fue reunido con sus padres
  lexicon: HALOT
  rationale: Se preserva el modismo hebreo de la fórmula real. «Se acostó con sus padres» mantiene la imagen verbal sin sustituirla por una explicación interpretativa. En español, «acostó» puede sonar más natural que una traducción literal de «yació», pero sigue siendo suficientemente transparente para el lector.
- source_word: נָדָב בְּנוֹ
  english_pob_choice: Nadab his son
  chosen_spanish: Nadab su hijo
  alternatives_spanish:
  - su hijo Nadab
  lexicon: HALOT
  rationale: Ambas estructuras son válidas. Se elige el orden más fluido en español, conservando la relación filial explícita del hebreo.
- source_word: וַיִּמְלֹךְ
  english_pob_choice: became king
  chosen_spanish: reinó
  alternatives_spanish:
  - llegó a ser rey
  - fue rey
  lexicon: HALOT
  rationale: En una fórmula sucesoria, el hebreo marca la entronización del sucesor. «Reinó» comunica con claridad el cambio de gobierno y evita introducir una perífrasis innecesaria.
- source_word: תַּחְתָּיו
  english_pob_choice: in his place
  chosen_spanish: en su lugar
  alternatives_spanish:
  - después de él
  - en vez de él
  lexicon: HALOT
  rationale: En contextos dinásticos, תחתיו señala sucesión/reemplazo. «En su lugar» es la equivalencia española más clara y corriente.
theological_decisions:
- issue: Modismo de muerte en fórmula real
  english_pob_reading: Retain the Hebrew idiom 'lay down with his fathers' rather than reducing it to 'died.'
  chosen_spanish_reading: Conservar el modismo «se acostó con sus padres» en lugar de explicitarlo como «murió».
  alternative_spanish_readings:
  - se durmió con sus padres
  - murió
  rationale: La frase no formula una doctrina desarrollada sobre el más allá; es una fórmula narrativa real. Mantener el modismo preserva la textura del texto y evita añadir una interpretación que el hebreo no exige.
  doctrine_reference: Philosophía de traducción §3, §6
translation_notes:
  revision_awareness: Se siguió el texto hebreo masorético y el audit trail inglés sin cambios sustantivos. La única tensión relevante es la fórmula idiomática de muerte, que en español se ha conservado como modismo para mantener la imagen original y la trazabilidad lexical.
  spanish_consistency_notes:
  - Se emplea «Jeroboam» como nombre propio estándar, conforme al uso bíblico habitual en español.
  - Se usa «reinó» para מָלַךְ y «en su lugar» para תַּחְתָּיו, manteniendo la fórmula regnal.
  - Se evita «SEÑOR» u այլ sustituciones teológicas, ya que el versículo no contiene el nombre divino.
