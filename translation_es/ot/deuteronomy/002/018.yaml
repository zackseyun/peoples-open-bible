translation:
  language: es
  text: Estás cruzando hoy la frontera de Moab en Ar[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «la frontera de Moab, es decir, Ar». El hebreo repite el marcador de objeto antes de «Ar», lo que puede indicar una aposición que identifica la región o ciudad fronteriza de Moab.'
    reason: lexical_alternative
lexical_decisions:
- source_word: אַתָּה
  english_pob_choice: You
  chosen_spanish: Tú
  alternatives_spanish:
  - Usted
  - Tú mismo
  lexicon: HALOT
  rationale: El hebreo usa el pronombre masculino singular en dirección corporativa a Israel; en español, «tú» conserva la fuerza directa del singular sin añadir expansión interpretativa. «Usted» sería demasiado formal y menos natural en este discurso.
- source_word: עֹבֵר
  english_pob_choice: are crossing
  chosen_spanish: estás cruzando
  alternatives_spanish:
  - cruzas
  - vas a cruzar
  - estás pasando
  lexicon: HALOT
  rationale: El participio qal con אַתָּה expresa acción en curso o inminente; el presente progresivo español transmite mejor esa inmediatez que un simple presente. «Cruzar» mantiene el sentido territorial del contexto.
- source_word: הַיּוֹם
  english_pob_choice: today
  chosen_spanish: hoy
  alternatives_spanish:
  - este día
  lexicon: HALOT
  rationale: «Hoy» es la equivalencia natural y directa del adverbio temporal, sin perder el énfasis del texto.
- source_word: גְּבוּל
  english_pob_choice: border
  chosen_spanish: límite
  alternatives_spanish:
  - frontera
  - territorio
  lexicon: HALOT
  rationale: En este contexto geográfico, el hebreo puede referirse a la línea fronteriza o al borde territorial. «Límite» permite abarcar esa amplitud con español natural; la nota conserva la alternativa appositiva identificada por el análisis del objeto repetido.
- source_word: מוֹאָב
  english_pob_choice: Moab
  chosen_spanish: Moab
  lexicon: HALOT
  rationale: Nombre propio transliterado de forma estándar.
- source_word: עָר
  english_pob_choice: Ar
  chosen_spanish: Ar
  lexicon: HALOT
  rationale: Nombre propio transliterado; se conserva como designación geográfica.
- source_word: אֶת ... אֶת
  english_pob_choice: the border of Moab at Ar
  chosen_spanish: el límite de Moab, en Ar
  alternatives_spanish:
  - el límite de Moab, es decir, Ar
  - el límite de Moab, o sea, Ar
  lexicon: HALOT
  rationale: La repetición de אֶת sugiere una relación appositiva entre «el límite de Moab» y «Ar». El español «en Ar» comunica la localización sin exagerar la explicación; la nota recoge la lectura alternativa explícita del hebreo.
theological_decisions:
- issue: Dirección singular a Israel
  english_pob_reading: Retain singular 'you' without explanatory expansion
  chosen_spanish_reading: Mantener el singular directo («Tú») sin expandirlo a plural o glosa
  alternative_spanish_readings:
  - Ustedes están cruzando hoy...
  - Tú (Israel) estás cruzando hoy...
  rationale: El hebreo trata a Israel como un interlocutor singular. En español, mantener «Tú» preserva la retórica del texto sin introducir aclaraciones no exigidas por la fuente.
  doctrine_reference: Translation philosophy §1, §6
translation_notes:
  revision_awareness: El texto inglés auditado fue revisado y quedó sin cambios; la versión española sigue su lectura de alta concordancia, pero traduce גְּבוּל con «límite» por ser más amplio y natural en español, y conserva la nota appositiva sobre Ar.
  spanish_consistency_notes:
  - Se mantiene el tratamiento directo singular para reflejar el hebreo.
  - «Límite» evita estrechar indebidamente גְּבוּל a una mera línea política; la nota aclara la posible lectura de borde/región.
  - Los nombres propios se transliteran consistentemente como Moab y Ar.
  - La puntuación y el uso de la coma buscan reflejar una posible aposición sin sobreinterpretarla.
