review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español sigue correctamente la primacía del hebreo: conserva el sentido exhortativo plural de אהללה נא como «Alabemos ahora», mantiene «nuestros padres» para אבותינו, y refleja el plural de בדורותם con «en sus generaciones». También preserva la variante griega en nota. Sin embargo, «hombres de amor leal» suena poco natural en español e introduce una construcción demasiado calcada para אנשי חסד.'
  spanish_quality_summary: La frase es comprensible, pero «a los hombres de amor leal» resulta rígida y poco idiomática en español eclesial general. Una formulación como «hombres fieles en el amor» conserva mejor la carga de חסד con lectura natural. Además, en la nota conviene omitir la preposición antes de «hombres gloriosos» para sonar más natural en español.
  glossary_alignment: No hay conflictos con la terminología marco del proyecto. La decisión clave es כיצד verter חסד. El borrador intenta preservar «amor leal», lo cual es teológicamente defendible, pero en esta sintaxis nominal aplicada a personas queda poco natural. «Fieles en el amor» mantiene la noción de fidelidad/lealtad amorosa sin perder legibilidad. «Padres» se alinea bien con אבותינו y no debe neutralizarse a «antepasados» en el texto principal.
  issues:
  - severity: medium
    issue: «hombres de amor leal» es un calco poco natural
    rationale: Aunque intenta reflejar חסד, la construcción nominal no suena idiomática en español y puede distraer al lector. Se puede conservar el contenido semántico con una formulación más natural.
  - severity: low
    issue: La nota griega suena algo forzada en «a hombres gloriosos»
    rationale: En español, «Alabemos ahora a hombres gloriosos» es posible, pero «Alabemos ahora hombres gloriosos» o mantener la estructura principal revisada mejora la fluidez. La nota debe ser clara y natural.
  revised_spanish_text: Alabemos ahora a los hombres fieles en el amor[a], a nuestros padres en sus generaciones.
  revised_footnotes:
  - marker: a
    text: 'Griego: «Alabemos ahora a hombres gloriosos, y a nuestros padres en su generación». El hebreo dice «hombres de amor leal».'
    reason: alternative_reading
  revision_rationale: Se ajusta la expresión principal para que el español sea más natural sin abandonar la prioridad del hebreo ni la carga semántica de חסד. «Hombres fieles en el amor» comunica lealtad y amor pactal con mejor legibilidad que el calco «hombres de amor leal». Se conserva la variante griega en nota.
