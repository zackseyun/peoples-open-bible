review_pass:
  verdict: revise
  source_alignment_summary: El borrador sigue correctamente el hebreo como testimonio principal y conserva bien la diferencia sustancial del griego en nota. Sin embargo, 'Reconoce' para דע desplaza el sentido simple de imperativo cognitivo/exhortativo ('sabe/conoce'), y la construcción 'a tu prójimo como a un hombre como tú' introduce una duplicación de 'como' que no refleja con naturalidad איש כמוך. También conviene anclar ambas notas en la misma frase relevante, como en el rastro inglés.
  spanish_quality_summary: El español es mayormente claro y eclesialmente legible, pero la redacción principal suena algo forzada. 'Sabe que tu prójimo es un hombre como tú' es más natural, fiel y digno que 'Reconoce a tu prójimo como a un hombre como tú'. 'Lo que te pongan delante' es comprensible, pero 'lo que está puesto delante de ti' reproduce mejor el valor estático de ששם לפניך y mantiene buen español.
  glossary_alignment: '''Prójimo'' alinea bien con רעך. No hay términos del glosario mayor en juego. La decisión de mantener ''hombre'' en el texto principal está en línea con la política de precisión de género documentada. La nota sobre la variante griega debe conservarse.'
  issues:
  - severity: medium
    issue: דע traducido como 'Reconoce'
    rationale: El hebreo usa un imperativo básico de ידע. 'Reconoce' añade matiz de re-identificación o admisión práctica; 'Sabe' o 'Conoce' preserva mejor la fuerza directa documentada en el POB inglés.
  - severity: high
    issue: 'Construcción española poco natural: ''a tu prójimo como a un hombre como tú'''
    rationale: Esta sintaxis no expresa con claridad 'tu prójimo es un hombre como tú'. Introduce torpeza estilística y puede oscurecer la relación predicativa del hebreo.
  - severity: low
    issue: Ubicación de notas no paralela al audit trail inglés
    rationale: La nota inclusiva y la nota de variante griega en inglés se anclan a la frase sobre 'tu prójimo... como tú'. En español conviene marcar ambas allí para reflejar mejor la documentación y evitar asociar la nota griega con 'delante'.
  - severity: low
    issue: '''te pongan delante'' cambia levemente el aspecto de la frase'
    rationale: El hebreo/inglés describen lo que está puesto o servido ante la persona. 'Te pongan' suena más prospectivo/subjuntivo. 'está puesto delante de ti' o 'te ponen delante' sería más exacto.
  revised_spanish_text: Sabe que tu prójimo es un hombre como tú[a][b], y come lo que está puesto delante de ti.
