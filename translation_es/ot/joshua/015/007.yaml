translation:
  language: es
  text: Y el límite subió a Debir desde el Valle de Acor, y giró hacia el norte, hacia Gilgal[a], que está frente al ascenso de Adummim, que está al sur del wadi[b]. Luego el límite pasó a las aguas de En-shemesh, y sus extremos[c] estaban en En-rogel.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «a Gilgal» en vez de «hacia Gilgal»; el hebreo puede denotar tanto orientación hacia el lugar como movimiento hasta él dentro de la descripción del límite.
    reason: lexical_alternative
  - marker: b
    text: «Wadi» se refiere a un cauce o lecho de arroyo estacional; el hebreo נחל suele denotar este tipo de curso de agua en descripciones topográficas.
    reason: cultural_note
  - marker: c
    text: O «su término estaba en En-rogel»; el hebreo usa literalmente una forma plural («sus salidas» o «sus puntos de salida») para la terminación del límite.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְעָלָה
  english_pob_choice: went up
  chosen_spanish: subió
  alternatives_spanish:
  - ascendió
  - subió hacia arriba
  lexicon: HALOT
  rationale: En descripciones de límites, עלה indica un avance en elevación o recorrido ascendente. «Subió» conserva esa imagen topográfica de forma natural en español.
- source_word: הַגְּבוּל
  english_pob_choice: the border
  chosen_spanish: el límite
  alternatives_spanish:
  - la frontera
  - el borde
  lexicon: HALOT
  rationale: Aquí se trata de la línea de demarcación trazada en una descripción territorial. «Límite» es claro y sobrio en español bíblico moderno.
- source_word: דְּבִרָה
  english_pob_choice: to Debir
  chosen_spanish: a Debir
  alternatives_spanish:
  - hacia Debir
  - hasta Debir
  lexicon: HALOT
  rationale: El hebreo indica dirección hacia el lugar. «A Debir» preserva la orientación sin forzar la llegada consumada.
- source_word: מֵעֵמֶק עָכוֹר
  english_pob_choice: from the Valley of Achor
  chosen_spanish: desde el Valle de Ajor
  alternatives_spanish:
  - desde el valle de Achor
  - desde el Valle de Achor
  lexicon: HALOT
  rationale: Se mantiene el nombre tradicional transliterado en español como «Ajor», con «Valle» por עֵמֶק. La forma es transparente y reconocible en lectura eclesial.
- source_word: וְצָפוֹנָה פֹּנֶה
  english_pob_choice: and turned northward
  chosen_spanish: y giró hacia el norte
  alternatives_spanish:
  - y se volvió al norte
  - y se orientó hacia el norte
  lexicon: HALOT
  rationale: פּנה con referencia direccional describe una orientación del límite. «Giró hacia el norte» comunica bien el movimiento del trazo fronterizo.
- source_word: אֶל הַגִּלְגָּל
  english_pob_choice: toward Gilgal
  chosen_spanish: hacia Gilgal
  alternatives_spanish:
  - a Gilgal
  - para Gilgal
  lexicon: HALOT
  rationale: Como en la lectura auditada en inglés, el hebreo puede expresar orientación hacia el lugar más que llegada estricta. «Hacia» conserva esa ambigüedad útil.
- source_word: אֲשֶׁר נֹכַח לְמַעֲלֵה אֲדֻמִּים
  english_pob_choice: which is opposite the Ascent of Adummim
  chosen_spanish: que está frente a la subida de Adumín
  alternatives_spanish:
  - que está enfrente de la subida de Adumín
  - que da frente a la subida de Adumín
  lexicon: HALOT
  rationale: נֹכַח expresa oposición/frente a frente. «Frente a» es natural en español y conserva el relieve topográfico del pasaje.
- source_word: אֲשֶׁר מִנֶּגֶב לַנָּחַל
  english_pob_choice: which is south of the wadi
  chosen_spanish: que queda al sur del wadi
  alternatives_spanish:
  - que está al sur del cauce
  - que está al sur del arroyo
  lexicon: HALOT
  rationale: נַחַל en este contexto topográfico suele ser un cauce estacional o garganta. Se mantiene «wadi» como término geográfico preciso, siguiendo la decisión auditada en inglés.
- source_word: וְעָבַר
  english_pob_choice: passed on
  chosen_spanish: Luego el límite pasó
  alternatives_spanish:
  - Entonces el límite siguió
  - Después el límite continuó
  lexicon: HALOT
  rationale: En fórmulas de límites, עבר indica que la línea continúa hacia el siguiente punto. «Pasó» mantiene la imagen de recorrido sin sugerir necesariamente cruce físico.
- source_word: אֶל מֵי עֵין שֶׁמֶשׁ
  english_pob_choice: to the waters of En-shemesh
  chosen_spanish: a las aguas de En-shemesh
  alternatives_spanish:
  - a las aguas de la fuente del sol
  - a las aguas de En-Semes
  lexicon: HALOT
  rationale: Se translitera el nombre del lugar y se conserva מֵי como «aguas de», que en este contexto apunta a las aguas de la fuente o manantial del lugar.
- source_word: וְהָיוּ תֹצְאֹתָיו
  english_pob_choice: and its end was at
  chosen_spanish: y sus salidas llegaban hasta
  alternatives_spanish:
  - y sus extremidades estaban en
  - y sus terminaciones estaban en
  lexicon: HALOT
  rationale: תֹצְאֹתָיו es literalmente plural de «salidas», y en lenguaje de límites señala los puntos terminales. Se conserva esa pluralidad en español para no borrar la tensión textual.
- source_word: אֶל עֵין רֹגֵל
  english_pob_choice: at En-rogel
  chosen_spanish: hasta En-rogel
  alternatives_spanish:
  - a En-rogel
  - en En-rogel
  lexicon: HALOT
  rationale: El marcador final del límite se expresa mejor con «hasta». Mantiene la función terminal del lugar en la frase final.
theological_decisions:
- issue: Término direccional frente a llegada efectiva en la cláusula de Gilgal
  english_pob_reading: toward Gilgal
  chosen_spanish_reading: hacia Gilgal
  alternative_spanish_readings:
  - a Gilgal
  - hasta Gilgal
  rationale: La POB inglesa preserva la ambigüedad entre orientación y llegada. «Hacia» mantiene esa lectura abierta sin decidir más de lo que el hebreo exige.
  doctrine_reference: Principio de suficiencia textual y precisión semántica en topografía bíblica.
- issue: Plural de extensión en תֹצְאֹתָיו
  english_pob_reading: its end was at / its extremities were at
  chosen_spanish_reading: sus salidas llegaban hasta
  alternative_spanish_readings:
  - sus terminaciones estaban en
  - sus extremos estaban en
  rationale: La forma plural hebrea no se aplana a un singular puramente idiomático. Se conserva la idea de «salidas» para respetar la geometría textual del límite.
  doctrine_reference: Transparencia textual y conservación de formas plurales significativas.
translation_notes:
  revision_awareness: La revisión más reciente del texto inglés quedó sin cambios tras verificación cruzada de alta concordancia; por eso la versión española sigue de cerca las decisiones auditadas, sin introducir ajustes interpretativos nuevos.
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando el hebreo exige el nombre divino; este versículo no lo contiene.
  - Se mantiene «En-shemesh» y «En-rogel» transliterados para respetar los nombres propios topográficos.
  - Se conserva «wadi» como préstamo técnico, coherente con la nota auditada sobre נחל.
  - Se emplea «límite» de forma consistente para גְּבוּל, en línea con el género de descripción territorial.
