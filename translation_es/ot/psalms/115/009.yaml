lexical_decisions:
- source_word: יִשְׂרָאֵל
  english_pob_choice: Israel
  chosen_spanish: Israel
  alternatives_spanish:
  - Israel
  lexicon: HALOT
  rationale: Es el nombre propio del pueblo del pacto; se conserva sin traducir, como en el audit trail inglés.
- source_word: בְּטַח
  english_pob_choice: trust
  chosen_spanish: confía
  alternatives_spanish:
  - pon tu confianza en
  - ten confianza en
  - refúgiate en
  lexicon: HALOT
  rationale: El imperativo singular dirigido a Israel se expresa naturalmente en español con «confía», que conserva el valor exhortativo directo sin añadir paráfrasis.
- source_word: בַּיהוָה
  english_pob_choice: in Yahweh
  chosen_spanish: en Yahvé
  alternatives_spanish:
  - en Yahvé
  lexicon: HALOT
  rationale: El texto hebreo contiene explícitamente el nombre divino YHWH; siguiendo el criterio del proyecto, se vierte como «Yahvé» y no se oculta tras «Señor».
- source_word: עֶזְרָם
  english_pob_choice: their help
  chosen_spanish: su ayuda
  alternatives_spanish:
  - su auxilio
  - el que les ayuda
  lexicon: HALOT
  rationale: El sustantivo predicativo se mantiene como «ayuda», que es cercano al hebreo y preserva la imagen sin convertirla en una glosa más interpretativa como «auxilio» o «ayudador».
- source_word: וּמָגִנָּם
  english_pob_choice: and their shield
  chosen_spanish: y su escudo
  alternatives_spanish:
  - y su protector
  lexicon: HALOT
  rationale: Se conserva la metáfora concreta de «escudo», evitando la abstracción de «protector» para no borrar la imagen militar del hebreo.
- source_word: הוּא
  english_pob_choice: he is
  chosen_spanish: él es
  alternatives_spanish:
  - él
  lexicon: HALOT
  rationale: El pronombre independiente funciona de modo predicativo y enfático; en español se expresa con «él es» para preservar la copulativa implícita del hebreo.
theological_decisions:
- issue: Traducción del nombre divino YHWH
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Señor
  - Yahweh
  rationale: El hebreo tiene יהוה, el Tetragrámaton. La política del proyecto pide «Yahvé» en el texto principal para mantener auditable el nombre del pacto, en lugar de reemplazarlo por un título tradicional.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יהוה / YHWH → Yahvé'
translation_notes:
  revision_awareness: El audit trail inglés no requiere cambios revisados; la equivalencia alta confirma que no hay variantes textuales o decisiones doctrinales adicionales que incorporar. Se mantiene la estructura sintética del versículo y la metáfora de ayuda/escudo.
  spanish_consistency_notes:
  - Se usa «Yahvé» de forma consistente con el default del proyecto para יהוה.
  - Se preserva la imagen concreta «escudo» y la relación posesiva plural «su ayuda y su escudo» para reflejar el sufijo de 3mp del hebreo.
  - El imperativo singular se dirige corporativamente a Israel, como en el inglés POB.
