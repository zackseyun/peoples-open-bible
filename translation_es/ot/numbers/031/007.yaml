translation:
  language: es
  text: Así libraron guerra contra Madián[a], tal como Yahvé había mandado a Moisés, y mataron a todos los varones.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «combatieron contra Madián». El verbo hebreo puede denotar participación militar o guerra.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּצְבְּאוּ
  english_pob_choice: they waged war
  chosen_spanish: hicieron guerra
  alternatives_spanish:
  - combatieron
  - pelearon
  - libraron guerra
  lexicon: HALOT
  rationale: El verbo hebreo, en este contexto, denota acción militar contra un enemigo. «Hicieron guerra» conserva ese matiz bélico con una fórmula natural en español y evita debilitarlo a un simple «pelearon».
- source_word: עַל
  english_pob_choice: against
  chosen_spanish: contra
  alternatives_spanish:
  - sobre
  - en
  lexicon: HALOT
  rationale: Con un verbo de acción militar y un objeto colectivo, la preposición marca oposición hostil; «contra» expresa mejor ese valor que «sobre» o «en».
- source_word: מִדְיָן
  english_pob_choice: Midian
  chosen_spanish: Madián
  alternatives_spanish:
  - Madián
  lexicon: transliteración convencional española
  rationale: Se translitera el nombre propio en forma usual en español bíblico. «Madián» es clara y reconocible para lectores de habla hispana.
- source_word: כַּאֲשֶׁר
  english_pob_choice: just as
  chosen_spanish: tal como
  alternatives_spanish:
  - así como
  - como
  lexicon: HALOT
  rationale: La expresión introduce conformidad con el mandato divino. «Tal como» mantiene esa correspondencia con un español fluido y preciso.
- source_word: צִוָּה
  english_pob_choice: had commanded
  chosen_spanish: había mandado
  alternatives_spanish:
  - había ordenado
  - había comandado
  lexicon: HALOT
  rationale: «Mandar» en español bíblico conserva bien el sentido de dar una orden. El pluscuamperfecto refleja que el mandato precedía a la acción.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  - el SEÑOR
  lexicon: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
  rationale: Se preserva el nombre divino como nombre propio en español, conforme a la norma del proyecto, en lugar de sustituirlo por un título.
- source_word: אֶת מֹשֶׁה
  english_pob_choice: Moses
  chosen_spanish: a Moisés
  alternatives_spanish:
  - Moisés
  lexicon: HALOT
  rationale: 'El marcador de objeto directo se integra de forma idiomática en español: «había mandado a Moisés». Esto comunica con naturalidad que Moisés es el destinatario del mandato.'
- source_word: וַיַּהַרְגוּ
  english_pob_choice: they killed
  chosen_spanish: mataron
  alternatives_spanish:
  - dieron muerte a
  - sacrificaron
  lexicon: HALOT
  rationale: El verbo hebreo significa directamente «matar». «Mataron» es la equivalencia más clara y directa en español.
- source_word: כָּל
  english_pob_choice: every
  chosen_spanish: todo
  alternatives_spanish:
  - cada
  - todo el
  lexicon: HALOT
  rationale: Con el sustantivo singular «varón», «todo» expresa adecuadamente la totalidad del referente, sin introducir un plural innecesario.
- source_word: זָכָר
  english_pob_choice: male
  chosen_spanish: varón
  alternatives_spanish:
  - macho
  - hombre
  - males
  lexicon: HALOT
  rationale: Aunque el inglés POB opta por «male» para precisión biológica, en español bíblico «varón» mantiene el rasgo de sexo masculino con dignidad y naturalidad, sin caer en la dureza de «macho» ni restringirlo solo a edad adulta como «hombre».
theological_decisions:
- issue: Nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Jehová
  - el SEÑOR
  rationale: Se sigue la directriz doctrinal del proyecto de preservar el nombre divino como nombre propio, no como sustitución por un título. «Yahvé» es la forma objetivo del español del proyecto.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Referencia de género en זָכָר
  english_pob_reading: male
  chosen_spanish_reading: varón
  alternative_spanish_readings:
  - hombre
  - macho
  rationale: El hebreo señala sexo masculino de manera general. «Varón» mantiene esa referencia sin estrecharla a la sola idea de adulto masculino ni desplazar el registro bíblico.
  doctrine_reference: 'DOCTRINE.md Translation philosophy §4: Gender-accurate over gender-neutral'
translation_notes:
  revision_awareness: 'El borrador coincide con el cierre de revisión más reciente: no se requieren cambios respecto al texto fuente ni al consenso del control cruzado, que reporta alta concordancia.'
  spanish_consistency_notes:
  - Se usa «Yahvé» de forma consistente con la política del proyecto para יהוה.
  - Se prefiere «varón» para זָכָר por precisión de género y naturalidad bíblica en español.
  - El tono es sobrio y publicable, sin agregar matices no presentes en el hebreo.
  - La nota textual/lexical conserva la alternativa de traducción militar señalada en el audit trail inglés.
