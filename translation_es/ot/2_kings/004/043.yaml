revisions:
- from: 'Pero su siervo[a] dijo: «¿Cómo he de poner esto delante de cien hombres?» Y él dijo: «Dáselo al pueblo, y que coman[b], porque así ha dicho Yahvé: “Comerán y sobrará”».'
  to: 'Pero su siervo[a] dijo: «¿Cómo he de poner esto delante de cien hombres?». Y él dijo: «Dáselo al pueblo, y que coman[b], porque así dice Yahvé: “Comerán y quedará de sobra”».'
  rationale: 'Se ajustó la fórmula profética a «así dice Yahvé» por ser la forma más natural y reconocible en español bíblico para כֹּה אָמַר יְהוָה. También se cambió «Comerán y sobrará» por «Comerán y quedará de sobra» para hacer explícito el sentido del modismo hebreo: después de comer, aún quedará alimento. Además, se limpió la redacción de la nota b para que suene natural en español sin perder la explicación lexical.'
