- from: Entra en la peña y escóndete en el polvo, a causa del terror de Yahvé[a][b] y de la esplendidez de su majestad[c].
  to: Entra en la peña y escóndete en el polvo, de delante del terror de Yahvé[a][b] y del esplendor de su majestad[c].
  rationale: Se corrigió «a causa de» a «de delante de» para preservar el matiz espacial/presencial de מִפְּנֵי, explícitamente enfatizado en la evidencia fuente y en el audit trail inglés. Se sustituyó «esplendidez» por «esplendor» por mayor naturalidad y mejor correspondencia léxica con הָדָר. Se mantuvieron «peña», «terror» y «Yahvé», que son fieles y legibles. Las notas se simplificaron para que apoyen el texto revisado sin duplicaciones innecesarias.
