  glossary_alignment: No hay términos del glosario principal en disputa. Los nombres propios «Pérez» y «Hezrón» están bien. La nota sobre תּוֹלְדוֹת está bien encaminada; conviene mantener una alternativa más natural en español como «la genealogía de Pérez» en vez de «la línea familiar de Pérez», aunque esta última no es errónea.
