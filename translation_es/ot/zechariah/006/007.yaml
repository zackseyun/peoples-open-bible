translation:
  language: es
  text: 'Y los fuertes[a] salieron y buscaron ir, para recorrer toda la tierra[b]. Y él dijo: «Vayan, recorran toda la tierra[b]», y recorrieron toda la tierra[b].'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O “los de color bayo” (tradicionalmente, una designación de color para los caballos o equipos); el hebreo, tal como está puntuado en el Texto Masorético, se lee más naturalmente como “los fuertes”.
    reason: alternative_reading
  - marker: b
    text: O “la región” o “el país”; el hebreo אֶרֶץ puede significar “tierra”, “región” o “país”, según el contexto.
    reason: lexical_alternative
lexical_decisions:
- source_word: הָאֲמֻצִּים
  english_pob_choice: the strong ones
  chosen_spanish: los fuertes
  alternatives_spanish:
  - los poderosos
  - los bayo(s) / los de color bayo
  lexicon: HALOT
  rationale: La vocalización masorética favorece el sentido relacionado con אמצ, “ser fuerte / vigoroso”, así que “los fuertes” comunica con naturalidad la fuerza del grupo. Se preserva la alternativa tradicional de color en nota porque el contexto inmediato de carros/caballos permite esa lectura histórica, aunque no es la lectura principal de la forma puntuada.
- source_word: יָצְאוּ
  english_pob_choice: came out
  chosen_spanish: salieron
  alternatives_spanish:
  - fueron
  - se fueron
  lexicon: HALOT
  rationale: יצא expresa salir o ir fuera. “Salieron” conserva el movimiento narrativo sin sobrecargar el verso.
- source_word: וַיְבַקְשׁוּ
  english_pob_choice: sought
  chosen_spanish: buscaron
  alternatives_spanish:
  - intentaron
  - deseaban
  lexicon: HALOT
  rationale: בקש puede denotar búsqueda o intento. “Buscaron” mantiene la fuerza verbal concreta que el español conserva bien en este contexto.
- source_word: לָלֶכֶת
  english_pob_choice: to go
  chosen_spanish: ir
  alternatives_spanish:
  - marchar
  - partir
  lexicon: HALOT
  rationale: הלך en infinitivo básico se traduce de manera directa como “ir”. Es la opción más sobria y fiel.
- source_word: לְהִתְהַלֵּךְ
  english_pob_choice: to walk throughout
  chosen_spanish: recorrer
  alternatives_spanish:
  - andar por
  - patrullar
  lexicon: HALOT
  rationale: El hitpael de הלך sugiere desplazamiento repetido o de cobertura de un área. “Recorrer” transmite ese ir de un lado a otro sin sonar forzado en español.
- source_word: בָּאָרֶץ
  english_pob_choice: throughout the earth
  chosen_spanish: la tierra
  alternatives_spanish:
  - la tierra entera
  - el país / la región
  lexicon: HALOT
  rationale: אֶרֶץ puede significar “tierra” o “país/región”. En este contexto visionario, el alcance es amplio; “la tierra” mantiene la ambigüedad productiva entre “tierra” y “mundo” sin imponer una expansión interpretativa excesiva.
- source_word: וַיֹּאמֶר
  english_pob_choice: he said
  chosen_spanish: él dijo
  alternatives_spanish:
  - dijo
  lexicon: HALOT
  rationale: El verbo es masculino singular con sujeto implícito. “Él dijo” lo explicita levemente para la claridad en español, como hace la traducción inglesa.
- source_word: לְכוּ
  english_pob_choice: Go
  chosen_spanish: Vayan
  alternatives_spanish:
  - Vayan adelante
  - Procedan
  lexicon: HALOT
  rationale: Imperativo plural de הלך. “Vayan” es la forma natural y directa en español.
- source_word: הִתְהַלְּכוּ
  english_pob_choice: walk throughout
  chosen_spanish: recorran
  alternatives_spanish:
  - anden por
  - patrullen
  lexicon: HALOT
  rationale: Se mantiene la misma raíz y el matiz distributivo/iterativo del verbo con “recorran”, que suena natural y conserva el movimiento extendido por toda la zona.
- source_word: וַתִּתְהַלַּכְנָה
  english_pob_choice: they walked throughout
  chosen_spanish: recorrieron
  alternatives_spanish:
  - anduvieron por
  - patrullaron
  lexicon: HALOT
  rationale: La forma femenina plural concuerda con el referente implícito del grupo/carros en la visión. En español no es necesario marcar género aquí; “recorrieron” preserva la repetición verbal y el sentido de desplazamiento extensivo.
theological_decisions:
- issue: Alcance de אֶרֶץ en la visión
  english_pob_reading: throughout the earth
  chosen_spanish_reading: la tierra
  alternative_spanish_readings:
  - la tierra entera
  - el país / la región
  rationale: La escena es visionaria y global en su impulso, pero en español “la tierra” permite conservar esa amplitud sin forzar una elección más específica que el contexto inmediato no exige. La ambigüedad entre tierra/territorio permanece disponible.
  doctrine_reference: Zacarías 6:1-8; traducción con respeto al alcance contextual de אֶרֶץ
- issue: Identidad de הָאֲמֻצִּים
  english_pob_reading: the strong ones
  chosen_spanish_reading: los fuertes
  alternative_spanish_readings:
  - los bayo(s) / los de color bayo
  - los poderosos
  rationale: La lectura principal sigue la vocalización masorética y evita borrar la tensión textual con la tradición de colores equinos. La nota preserva la alternativa histórica sin convertirla en lectura principal.
  doctrine_reference: 'Principios de traducción POB: fidelidad a la forma puntuada y preservación de variantes relevantes'
translation_notes:
  revision_awareness: 'El borrador sigue de cerca el consenso del audit trail inglés y no introduce cambios sustantivos respecto de la última revisión: mantiene la lectura principal de הָאֲמֻצִּים como fuerza, conserva la ambigüedad de אֶרֶץ, y reproduce el paralelismo verbal de “ir/recorrer” con un español natural y publicable.'
  spanish_consistency_notes:
  - Se usa “Yahvé” para el nombre divino cuando aparezca, pero este versículo no lo contiene.
  - Se prefiere “la tierra” para אֶרֶץ en consonancia con el rango semántico documentado, sin cerrar la posibilidad de “territorio”.
  - Se mantiene el paralelismo léxico entre “ir” y “recorrer” para reflejar la repetición hebrea de הלך/התהלך.
  - Se evita “SEÑOR” o formulaciones litúrgicas no presentes en el texto fuente.
