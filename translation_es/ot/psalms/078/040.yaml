translation:
  language: es
  text: ¡Cuántas veces[a] se rebelaron contra él en el desierto, y lo entristecieron[b] en el yermo!
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «¡Cuántas veces se rebelaron contra él en el desierto!». La expresión inicial puede enfatizar actos repetidos de rebelión.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «y lo afligieron» o «y le causaron dolor» en el yermo.'
    reason: lexical_alternative
lexical_decisions:
- source_word: כַּמָּה
  english_pob_choice: How often
  chosen_spanish: ¡Cuántas veces!
  alternatives_spanish:
  - ¿Cuántas veces?
  - ¡Cuán a menudo!
  lexicon: HALOT
  rationale: La expresión interrogativa/exclamativa de frecuencia en hebreo pide un valor repetido, no un número literal. «¡Cuántas veces!» comunica bien la queja retrospectiva del salmo en español natural.
- source_word: יַמְרוּהוּ
  english_pob_choice: they rebelled against him
  chosen_spanish: se rebelaron contra él
  alternatives_spanish:
  - lo provocaron
  - fueron rebeldes contra él
  lexicon: HALOT
  rationale: El Hiphil de מרה con sufijo de 3ms expresa defiance/rebelión dirigida a Dios. «Se rebelaron contra él» mantiene la fuerza semántica y la transparencia del verbo.
- source_word: בַמִּדְבָּר
  english_pob_choice: in the wilderness
  chosen_spanish: en el desierto
  alternatives_spanish:
  - en el yermo
  - en la estepa
  lexicon: HALOT
  rationale: En español bíblico, «desierto» es la opción más natural y conocida para el ámbito geográfico del éxodo. Aunque «wilderness» sugiere un matiz bíblico amplio, «desierto» comunica bien el lugar sin sonar forzado.
- source_word: יַעֲצִיבוּהוּ
  english_pob_choice: and grieved him
  chosen_spanish: y lo entristecieron
  alternatives_spanish:
  - y lo afligieron
  - y le causaron dolor
  - y lo hicieron sufrir
  lexicon: HALOT
  rationale: El verbo causativo de עצב puede significar causar pena, dolor o aflicción. «Lo entristecieron» conserva el valor afectivo-personal del texto, evitando a la vez una formulación demasiado abstracta.
- source_word: בִּישִׁימוֹן
  english_pob_choice: in the wasteland
  chosen_spanish: en la estepa
  alternatives_spanish:
  - en el wasteland
  - en el yermo
  - en la tierra desolada
  lexicon: HALOT
  rationale: יׁשִימוֹן designa una región árida y desolada distinta de מִדְבָּר. «Estepa» permite distinguir el paralelo poético en español y suena más natural que repetir «desierto».
theological_decisions:
- issue: Lenguaje antropopático para la respuesta divina en יַעֲצִיבוּהוּ
  english_pob_reading: Retain the personal-emotive expression 'grieved him' in the main text.
  chosen_spanish_reading: 'Mantener una expresión afectiva personal: «lo entristecieron».'
  alternative_spanish_readings:
  - lo afligieron
  - le causaron dolor
  - lo vexaron
  rationale: El hebreo presenta un lenguaje relacional real, no una mera fórmula impersonal. «Lo entristecieron» preserva la tensión teológica y emocional del texto, sin suavizarla en exceso ni volverla artificial en español.
  doctrine_reference: Translation philosophy §3 (Preserve theological tension rather than resolve it)
translation_notes:
  revision_awareness: 'El registro inglés indica alta concordancia, sin revisiones aplicadas en la última pasada. La redacción española sigue esa lectura estable y conserva las dos ambigüedades principales del hebreo: frecuencia reiterativa en כַּמָּה y la fuerza afectiva de יַעֲצִיבוּהוּ.'
  spanish_consistency_notes:
  - Se mantiene «él» en minúscula por referencia anafórica dentro del verso.
  - Se distingue «desierto» de «estepa» para reflejar el paralelismo entre מִדְבָּר y יְשִׁימוֹן.
  - Se usó «lo entristecieron» para reflejar el tono relacional del verbo causativo sin perder naturalidad en español.
