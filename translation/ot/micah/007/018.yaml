theological_decisions:
- issue: Rendering of חֶסֶד
  chosen_reading: steadfast love
  alternative_readings:
  - mercy
  - covenant love
  - lovingkindness
  rationale: The verse grounds divine forgiveness in God's character. 'Steadfast love' best preserves the covenantal and loyal dimensions of חֶסֶד without reducing it to mere sentiment or a single act of mercy. This avoids importing a narrower doctrinal nuance while retaining theological depth.
  doctrine_reference: Translation philosophy §5; readable modern English §6
- issue: Maintaining distinction between עָוֹן and פֶּשַׁע
  chosen_reading: iniquity ... transgression
  alternative_readings:
  - sin ... sin
  - guilt ... rebellion
  rationale: The Hebrew uses two distinct terms for human wrongdoing. Preserving that distinction reflects the source text's texture and avoids unnecessary flattening. The translation does not force a systematic theological distinction beyond what the Hebrew itself signals.
  doctrine_reference: Translation philosophy §1 and §5
