translation:
  language: es
  text: 'Y cuando salí y los despedí, me fui de allí y les dije: «Miren, voy a mi morada en Hebrón».


    Y después mis compañeros se apartaron de mí, y llegué al cedro donde se me había hablado; y me senté allí y ayuné siete días.'
  philosophy: optimal-equivalence
  footnotes: []
lexical_decisions:
- source_word: ܫ̇ܪܝܘ ܐܢܘܢ
  english_pob_choice: dismissed them
  chosen_spanish: los despedí
  alternatives_spanish:
  - los dejé
  - los envié
  lexicon: Payne Smith
  rationale: El verbo expresa la acción de dejarlos ir o darles por terminada la reunión. «Los despedí» conserva el matiz formal y narrativo del inglés POB sin volverlo demasiado coloquial.
- source_word: ܠܕܝܪܝ ܠܚܒܪܘܢ
  english_pob_choice: to my dwelling in Hebron
  chosen_spanish: a mi morada en Hebrón
  alternatives_spanish:
  - a mi casa en Hebrón
  - a mi alojamiento en Hebrón
  - a Hebrón
  lexicon: Payne Smith
  rationale: El siriaco sugiere un sustantivo de morada o vivienda unido al topónimo. «Morada» conserva ese detalle semítico mejor que reducirlo a solo el lugar.
- source_word: ܚܒܪܐ
  english_pob_choice: my companions
  chosen_spanish: mis compañeros
  alternatives_spanish:
  - mis amigos
  - los que estaban conmigo
  lexicon: Payne Smith
  rationale: El término apunta a asociados o acompañantes. «Compañeros» es la opción más natural y fiel en español sin intensificar indebidamente la cercanía afectiva.
- source_word: ܐܪܙܐ
  english_pob_choice: the cedar
  chosen_spanish: el cedro
  alternatives_spanish:
  - el árbol de cedro
  - el árbol
  lexicon: Payne Smith
  rationale: El texto nombra el árbol de manera concreta. Mantener «cedro» preserva la especificidad del lugar de encuentro y evita una generalización innecesaria.
- source_word: ܕܐܬܡܠܠ ܥܡܝ
  english_pob_choice: where he had spoken with me
  chosen_spanish: donde me había hablado
  alternatives_spanish:
  - donde se me había dirigido
  - donde me había hablado allí
  lexicon: Payne Smith
  rationale: La construcción verbal admite una traducción directa y natural en español. «Me había hablado» conserva el carácter de comunicación personal y solemne.
- source_word: ܬܡܢ
  english_pob_choice: there
  chosen_spanish: allí
  alternatives_spanish:
  - ahí
  - en aquel lugar
  lexicon: Payne Smith
  rationale: El adverbio refuerza la localización del cedro y del episodio. En español, «allí» reproduce ese valor sin redundancia excesiva.
theological_decisions:
- issue: La referencia a la «morada» y al cedro como lugar de revelación no debe diluirse en una localización genérica.
  english_pob_reading: to my dwelling in Hebron ... came to the cedar where he had spoken with me
  chosen_spanish_reading: a mi morada en Hebrón ... llegué al cedro donde me había hablado
  alternative_spanish_readings:
  - a Hebrón ... llegué al lugar donde me había hablado
  - a mi alojamiento en Hebrón ... llegué al árbol donde me había hablado
  rationale: 'El siríaco conserva una concreción espacial y narrativa: una morada concreta en Hebrón y un cedro concreto vinculado a la palabra recibida. La traducción mantiene ambas coordenadas para no borrar la escena de retiro y oración.'
  doctrine_reference: Criterio POB de preservar detalles narrativos y topográficos del texto fuente cuando tienen función interpretativa.
translation_notes:
  revision_awareness: La redacción sigue la revisión más reciente del POB en cuanto a no duplicar «allí» dentro de la cláusula «donde me había hablado», pero mantiene el valor locativo del siriaco mediante el adverbio «allí» en español. También toma en cuenta la preferencia auditada por reflejar la concreción de «dwelling» y «cedar» sin convertir el pasaje en una paráfrasis.
  spanish_consistency_notes:
  - «Yahvé» no aparece en este versículo; no se requiere decisión terminológica divina explícita.
  - Se conserva «Hebrón» con acento español estándar.
  - «Ayuné siete días» mantiene el perfecto simple narrativo adecuado al español bíblico moderno.
  - El anclaje [a] se ubica solo en la frase relevante dentro de la cláusula relativa.
