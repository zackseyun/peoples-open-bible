    rationale: El POB inglés documenta explícitamente la alternativa ‘is deserted by his friend’. Esa información auditada debería conservarse en español, especialmente porque la redacción española puede introducir una lectura demasiado activa.
  revised_spanish_text: La riqueza añade muchos amigos, pero el pobre queda separado[a] de su amigo.
  revised_footnotes:
  - marker: a
    text: O «es abandonado por su amigo». El verbo hebreo puede expresar separación sin precisar si el pobre se aparta o si es abandonado; el contexto sugiere fuertemente abandono social.
    reason: lexical_alternative
  revision_rationale: Se cambia «se separa» por «queda separado» para reflejar mejor la ambigüedad del nifal hebreo sin atribuir claramente la iniciativa al pobre. Se reemplaza la nota sobre «riqueza» por una nota en el verbo, porque esa es la alternativa léxica significativa documentada en la auditoría inglesa y la que más afecta la interpretación del proverbio.
