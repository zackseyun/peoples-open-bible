translation:
  language: es
  text: Y cuando el rey dio su aprobación[a] y él tomó control del cargo, inmediatamente desvió a sus compatriotas al modo de vida griego.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literalmente, «el carácter griego» o «el sello griego»; la expresión se refiere a adoptar patrones y costumbres culturales griegos.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐπινεύσαντος
  english_pob_choice: had given his approval
  chosen_spanish: hubo dado su aprobación
  alternatives_spanish:
  - hubo consentido
  - hubo asentido
  - hubo aprobado
  lexicon: LSJ
  rationale: El participio genitivo absoluto expresa una acción anterior a la principal. «Dar su aprobación» conserva el matiz de asentimiento oficial del rey sin caer en un calco pesado de «asentir con la cabeza».
- source_word: ἀρχῆς
  english_pob_choice: the office
  chosen_spanish: el cargo
  alternatives_spanish:
  - el oficio
  - el poder
  - la autoridad
  lexicon: LSJ
  rationale: En este contexto político, junto con κρατήσας, ἀρχῆς se refiere al puesto gobernante que obtuvo Jasón. «Cargo» es natural en español y mantiene la idea de una posición oficial concreta.
- source_word: κρατήσας
  english_pob_choice: had gained control
  chosen_spanish: hubo obtenido el control
  alternatives_spanish:
  - hubo tomado posesión
  - hubo llegado a dominar
  - hubo asegurado el poder
  lexicon: LSJ
  rationale: El participio expresa haber alcanzado dominio efectivo. «Obtenido el control» conserva la fuerza de adquirir poder operativo sobre el cargo sin exagerar el matiz.
- source_word: εὐθέως
  english_pob_choice: immediately
  chosen_spanish: inmediatamente
  alternatives_spanish:
  - al instante
  - enseguida
  - sin demora
  lexicon: LSJ
  rationale: Marca la rapidez de la acción posterior; «inmediatamente» es claro y fiel al adverbio.
- source_word: ὁμοφύλους
  english_pob_choice: his countrymen
  chosen_spanish: a sus compatriotas
  alternatives_spanish:
  - a sus propios pueblos
  - a sus correligionarios
  - a sus compatriotas judíos
  lexicon: LSJ
  rationale: El término denota personas del mismo pueblo o linaje. «Compatriotas» comunica bien esa relación colectiva sin añadir más especificación que la que el griego exige por sí mismo.
- source_word: μετέστησε
  english_pob_choice: turned ... to
  chosen_spanish: volvió ... hacia
  alternatives_spanish:
  - trasladó ... a
  - desvió ... hacia
  - los orientó hacia
  lexicon: LSJ
  rationale: El verbo indica hacer pasar a una nueva orientación o estado. «Volvió ... hacia» preserva la idea de redirigir a otros hacia una nueva forma de vida, conforme al contexto de helenización.
- source_word: Ἑλληνικὸν χαρακτῆρα
  english_pob_choice: the Greek way of life
  chosen_spanish: el modo de vida griego
  alternatives_spanish:
  - el carácter griego
  - las costumbres griegas
  - la forma griega de vivir
  lexicon: LSJ
  rationale: Literalmente significa algo como «carácter/sello griego», pero aquí remite a la adopción de patrones culturales helenísticos. «Modo de vida griego» conserva la dimensión cultural y evita que «carácter» se entienda solo en sentido psicológico.
theological_decisions:
- issue: Cómo traducir Ἑλληνικὸν χαρακτῆρα sin reducirlo a rasgo moral individual
  english_pob_reading: the Greek way of life
  chosen_spanish_reading: el modo de vida griego
  alternative_spanish_readings:
  - el carácter griego
  - las costumbres griegas
  rationale: La frase describe un proceso de helenización cultural, no simplemente una cualidad interior. La lectura elegida mantiene la fuerza histórica y social del texto sin volverlo doctrinalmente más específico de lo que es.
  doctrine_reference: Translation philosophy §1, §6
- issue: Relación temporal de los participios con la acción principal
  english_pob_reading: And when the king had given his approval, and he had gained control of the office, he immediately turned...
  chosen_spanish_reading: Y cuando el rey hubo dado su aprobación, y él hubo obtenido el control del cargo, inmediatamente volvió...
  alternative_spanish_readings:
  - Y cuando el rey dio su aprobación, y él obtuvo el control del cargo, inmediatamente volvió...
  - Y habiendo dado el rey su aprobación, y habiendo obtenido él el control del cargo, inmediatamente volvió...
  rationale: El español con «hubo + participio» reproduce la anterioridad marcada por el genitivo absoluto y mantiene el encadenamiento narrativo de acciones previas a la posterior transformación de sus compatriotas.
  doctrine_reference: Translation philosophy §1, §6
translation_notes:
  revision_awareness: La redacción sigue la revisión más reciente del POB en inglés, que prefirió una formulación más formal y natural para μετέστησε y ὁμοφύλους. En español se refleja con «volvió a sus compatriotas hacia», manteniendo la idea de redirección cultural sin forzar un calco. También se conservó el valor temporal de las acciones previas mediante «hubo dado» y «hubo obtenido».
  spanish_consistency_notes:
  - Se usó «Dios»/«Yahvé» solo donde correspondiera; aquí no aplica.
  - Se evitó «SEÑOR» como sustituto de un nombre divino porque el texto no lo contiene.
  - Se mantuvo el registro bíblico sobrio y moderno, sin arcaísmos innecesarios.
  - «Compatriotas» comunica el sentido étnico-colectivo de ὁμοφύλους sin sobreinterpretar como «judíos» explícitos.
