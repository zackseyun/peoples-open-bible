  text: לֹֽא תִשְׁתַּחֲוֶ֤ה לֵ/אלֹֽהֵי/הֶם֙ וְ/לֹ֣א תָֽעָבְדֵ֔/ם וְ/לֹ֥א תַעֲשֶׂ֖ה כְּ/מַֽעֲשֵׂי/הֶ֑ם כִּ֤י הָרֵס֙ תְּהָ֣רְסֵ֔/ם וְ/שַׁבֵּ֥ר תְּשַׁבֵּ֖ר מַצֵּבֹתֵי/הֶֽם־׃
