revisions:
- from: 'Jehú hijo de Hanani, el vidente, salió a encontrarlo y dijo al rey Josafat[a]: «¿Acaso debes ayudar al malo y amar a los que odian a Yahvé? Por[b] esto, sobre ti hay ira de parte de Yahvé».'
  to: 'Jehú hijo de Hanani, el vidente, salió a encontrarlo[a] y dijo al rey Josafat: «¿Acaso debes ayudar al malo y amar a los que odian a Yahvé? Por eso, hay ira sobre ti[b] de la presencia de Yahvé».'
  rationale: Se reubica la nota [a] al modismo que realmente explica; se cambia 'Por esto' a 'Por eso' para mayor naturalidad; y se revisa la cláusula final para reflejar mejor מִלִּפְנֵי יְהוָה con 'de la presencia de Yahvé', preservando la imagen fuente y la rationale documentada. También se ordena 'hay ira sobre ti' para español más natural sin perder la fuerza concreta del hebreo.
  reviewer_model: gpt-5.4
