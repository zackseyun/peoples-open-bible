translation:
  language: es
  text: No les teman[a], porque Yahvé, el Dios de ustedes, es el que combate por ustedes.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «No tengan miedo de ellos».'
    reason: lexical_alternative
lexical_decisions:
- source_word: לֹא
  english_pob_choice: Do not
  chosen_spanish: 'No'
  alternatives_spanish:
  - No les
  lexicon: HALOT
  rationale: La negación hebrea introduce aquí una prohibición con el imperfecto siguiente; en español, «No» conserva esa fuerza directiva de manera natural.
- source_word: תִּירָאוּם
  english_pob_choice: fear them
  chosen_spanish: les tengan miedo
  alternatives_spanish:
  - los teman
  - les teman
  - tengan miedo de ellos
  lexicon: HALOT
  rationale: El verbo ירא puede expresarse en español tanto como «temer» como «tener miedo». Aquí «les tengan miedo» mantiene el valor de temor/afecto de miedo y suena más natural en un mandato dirigido a un grupo.
- source_word: כִּי
  english_pob_choice: for
  chosen_spanish: porque
  alternatives_spanish:
  - pues
  - ya que
  lexicon: HALOT
  rationale: La partícula introduce la razón de la prohibición; «porque» comunica con claridad esa relación causal en español.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  lexicon: HALOT
  rationale: Se conserva el nombre divino del Tetragrámaton como «Yahvé», siguiendo la convención terminológica del proyecto en español y evitando la sustitución por un título.
- source_word: אֱלֹהֵיכֶם
  english_pob_choice: your God
  chosen_spanish: su Dios
  alternatives_spanish:
  - vuestro Dios
  - tu Dios
  lexicon: HALOT
  rationale: El sufijo plural de segunda persona exige referencia plural; en español, «su Dios» preserva el plural sin sonar forzado, dentro de un registro reverente y neutral.
- source_word: הוּא
  english_pob_choice: is the one who
  chosen_spanish: es el que
  alternatives_spanish:
  - es quien
  - él es quien
  lexicon: HALOT
  rationale: El pronombre enfático se reproduce de forma natural con «es el que», que mantiene la focalización del hebreo sin caer en un calco rígido.
- source_word: הַנִּלְחָם
  english_pob_choice: fights
  chosen_spanish: pelea
  alternatives_spanish:
  - lucha
  - combate
  - está peleando
  lexicon: HALOT
  rationale: El participio expresa acción característica; «pelea» comunica esa idea de manera directa y corriente en español, conservando el sentido de batalla por su pueblo.
- source_word: לָכֶם
  english_pob_choice: for you
  chosen_spanish: por ustedes
  alternatives_spanish:
  - a favor de ustedes
  - para ustedes
  lexicon: HALOT
  rationale: La preposición ל indica beneficio/partidario; «por ustedes» transmite bien la idea de actuar en favor de otro y resulta idiomática en español.
theological_decisions:
- issue: Nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - el SEÑOR
  rationale: El texto hebreo usa directamente el Tetragrámaton. Se conserva el nombre propio divino como «Yahvé» para mantener la transparencia del original y evitar una sustitución litúrgica.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Referencia de posesión en אֱלֹהֵיכֶם
  english_pob_reading: your God
  chosen_spanish_reading: su Dios
  alternative_spanish_readings:
  - vuestro Dios
  - su Dios
  rationale: Aunque la forma hebrea es plural, el referente es singular. En español, «su Dios» preserva la referencia plural de los destinatarios sin introducir una forma regionalmente marcada.
  doctrine_reference: HALOT / gramática de concordancia pronominal en contextos de destinatario plural
translation_notes:
  revision_awareness: 'Coincide con el sentido del auditable inglés POB: prohibición directa, explicación causal con כִּי, nombre divino como Yahvé y participio con valor de acción característica. No se observaron revisiones posteriores que obliguen a ajustar la lectura base.'
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» según la terminología por defecto del proyecto para el nombre divino.
  - Se evitó «SEÑOR» como sustituto del Tetragrámaton.
  - «Su Dios» conserva la referencia plural implícita en el sufijo hebreo sin regionalismos.
  - El participio hebreo se reflejó con un presente simple español («pelea») para expresar acción característica.
