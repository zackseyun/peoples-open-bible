theological_decisions:
- issue: Whether the verse should be rendered in a way that implies almsgiving earns salvation
  chosen_reading: Retain the text's direct claim that almsgiving rescues from death, without expanding it into a systematic doctrinal statement.
  alternative_readings:
  - Interpret 'death' metaphorically as temporal danger only
  - Soften the statement to 'may rescue from death'
  rationale: The Greek states the claim straightforwardly. The translation should neither dilute the wording nor import later doctrinal harmonization. Using 'rescues' rather than 'saves' helps preserve the text's own language without overstating later theological categories.
  doctrine_reference: DOCTRINE.md §Translation philosophy 1, 3
