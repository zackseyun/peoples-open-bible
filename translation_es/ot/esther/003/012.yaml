  text: וַ/יִּקָּרְאוּ֩ סֹפְרֵ֨י הַ/מֶּ֜לֶךְ בַּ/חֹ֣דֶשׁ הָ/רִאשׁ֗וֹן בִּ/שְׁלוֹשָׁ֨ה עָשָׂ֣ר יוֹם֮ בּ/וֹ֒ וַ/יִּכָּתֵ֣ב כְּֽ/כָל אֲשֶׁר צִוָּ֣ה הָמָ֡ן אֶ֣ל אֲחַשְׁדַּרְפְּנֵֽי הַ֠/מֶּלֶךְ וְֽ/אֶל הַ/פַּח֞וֹת אֲשֶׁ֣ר עַל מְדִינָ֣ה וּ/מְדִינָ֗ה וְ/אֶל שָׂ֤רֵי עַם֙ וָ/עָ֔ם מְדִינָ֤ה וּ/מְדִינָה֙ כִּ/כְתָבָ֔/הּ וְ/עַ֥ם וָ/עָ֖ם כִּ/לְשׁוֹנ֑/וֹ בְּ/שֵׁ֨ם הַ/מֶּ֤לֶךְ אֲחַשְׁוֵרֹשׁ֙ נִכְתָּ֔ב וְ/נֶחְתָּ֖ם בְּ/טַבַּ֥עַת הַ/מֶּֽלֶךְ־־־־׀־־׃
