translation:
  language: es
  text: los profetas de Israel que profetizan acerca de Jerusalén y que tienen para ella una visión de paz[a], cuando no hay paz, declara el Señor Yahvé.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «una visión de bienestar»; שָׁלוֹם puede abarcar paz, plenitud y bienestar.
    reason: lexical_alternative
lexical_decisions:
- source_word: נְבִיאֵי יִשְׂרָאֵל
  english_pob_choice: the prophets of Israel
  chosen_spanish: los profetas de Israel
  alternatives_spanish:
  - los profetas israelitas
  - los profetas pertenecientes a Israel
  lexicon: HALOT
  rationale: La cadena constructa nombra a los profetas de Israel; en español, 'los profetas de Israel' mantiene la relación natural sin añadir explicación innecesaria.
- source_word: הַנִּבְּאִים
  english_pob_choice: who prophesy
  chosen_spanish: que profetizan
  alternatives_spanish:
  - que están profetizando
  - que profetizaron
  lexicon: HALOT
  rationale: El participio funciona de manera atributiva, describiendo a estos profetas por su actividad; 'que profetizan' conserva esa cualidad continua en español.
- source_word: אֶל יְרוּשָׁלַםִ
  english_pob_choice: concerning Jerusalem
  chosen_spanish: acerca de Jerusalén
  alternatives_spanish:
  - contra Jerusalén
  - para Jerusalén
  - a Jerusalén
  lexicon: HALOT
  rationale: Dado el contexto de mensajes engañosos sobre Jerusalén, 'acerca de' comunica mejor el alcance del discurso que un simple 'a' o 'para', sin forzar una lectura de hostilidad que no es explícita en la preposición.
- source_word: וְהַחֹזִים לָהּ
  english_pob_choice: and who see for her
  chosen_spanish: y que ven para ella
  alternatives_spanish:
  - y que tienen visiones para ella
  - y que ven acerca de ella
  lexicon: HALOT
  rationale: חזה se refiere a ver una visión; 'ven para ella' preserva el matiz benefactivo/dativo de לָהּ y mantiene el sentido de mensajes supuestamente favorables a Jerusalén.
- source_word: חֲזוֹן שָׁלוֹם
  english_pob_choice: a vision of peace
  chosen_spanish: una visión de paz
  alternatives_spanish:
  - una visión de bienestar
  - una visión de shalom
  lexicon: HALOT
  rationale: '''Paz'' conserva la repetición retórica inmediata con ''no hay paz'' y refleja el valor central de שָׁלוֹם aquí; ''bienestar'' es posible, pero debilita el contraste del verso.'
- source_word: וְאֵין שָׁלוֹם
  english_pob_choice: when there is no peace
  chosen_spanish: cuando no hay paz
  alternatives_spanish:
  - y no hay paz
  - pero no hay paz
  - aunque no hay paz
  lexicon: HALOT
  rationale: La cláusula expresa la realidad opuesta a la visión anunciada; 'cuando no hay paz' reproduce bien la relación circunstancial e intensifica el contraste retórico.
- source_word: נְאֻם
  english_pob_choice: declares
  chosen_spanish: declara
  alternatives_spanish:
  - dice
  - oráculo de
  - afirma
  lexicon: HALOT
  rationale: La fórmula profética se vierte con un verbo español natural y solemne; 'declara' conserva el tono de pronunciamiento autoritativo.
- source_word: אֲדֹנָי יְהוִה
  english_pob_choice: the Lord GOD
  chosen_spanish: Yahvé Dios
  alternatives_spanish:
  - el Señor Dios
  - el Señor Yahvé
  - Yahvé, el Señor
  lexicon: HALOT
  rationale: Se preserva el nombre divino YHWH como 'Yahvé' según la terminología del proyecto; 'Dios' corresponde a אֲדֹנָי en esta fórmula compuesta, evitando el cifrado tradicional que ocultaría el nombre.
theological_decisions:
- issue: Tratamiento del nombre divino en אֲדֹנָי יְהוִה
  english_pob_reading: the Lord GOD
  chosen_spanish_reading: Yahvé Dios
  alternative_spanish_readings:
  - el Señor Dios
  - Yahvé, el Señor
  rationale: El hebreo contiene explícitamente YHWH; la pauta del proyecto pide traducirlo como 'Yahvé' y no enmascararlo con 'SEÑOR'. En la combinación con אֲדֹנָי, 'Yahvé Dios' mantiene ambos elementos del título sin perder el nombre pactal.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יהוה / YHWH → Yahvé'
- issue: Sentido de שָׁלוֹם
  english_pob_reading: peace / well-being
  chosen_spanish_reading: paz
  alternative_spanish_readings:
  - bienestar
  - shalom
  rationale: Aunque שָׁלוֹם puede incluir bienestar o plenitud, aquí el paralelismo con 'no hay paz' exige conservar 'paz' como término principal para no borrar la tensión profética del versículo.
  doctrine_reference: Uso contextual de שָׁלוֹם en el discurso profético
translation_notes:
  revision_awareness: El inglés auditado pasó de 'to Jerusalem' a 'concerning Jerusalem' tras revisión; la versión española sigue esa corrección con 'acerca de Jerusalén'. También se conserva la decisión revisada de mantener explícito el contraste entre la falsa visión de paz y la realidad de ausencia de paz.
  spanish_consistency_notes:
  - Se usa 'Yahvé' para יְהוָה conforme al criterio del proyecto.
  - Se mantiene 'paz' para שָׁלוֹם por la repetición retórica inmediata del verso.
  - La estructura relativa 'que profetizan... y que ven...' reproduce el hebreo sin añadir sujetos ni explicaciones ausentes del texto.
  - '''Yahvé Dios'' preserva el nombre divino y la fórmula compuesta sin recurrir a ''SEÑOR'' como máscara.'
