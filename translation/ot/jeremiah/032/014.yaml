id: JER.32.14
reference: Jeremiah 32:14
source:
  edition: WLC
  text: כֹּֽה אָמַר֩ יְהוָ֨ה צְבָא֜וֹת אֱלֹהֵ֣י יִשְׂרָאֵ֗ל לָק֣וֹחַ אֶת הַ/סְּפָרִ֣ים הָ/אֵ֡לֶּה אֵ֣ת סֵפֶר֩ הַ/מִּקְנָ֨ה הַ/זֶּ֜ה וְ/אֵ֣ת הֶ/חָת֗וּם וְ/אֵ֨ת סֵ֤פֶר הַ/גָּלוּי֙ הַ/זֶּ֔ה וּ/נְתַתָּ֖/ם בִּ/כְלִי חָ֑רֶשׂ לְמַ֥עַן יַעַמְד֖וּ יָמִ֥ים רַבִּֽים־־־׃ס
translation:
  text: 'Thus says Yahweh of hosts[a], the God of Israel: Take these documents, this deed of purchase, both the sealed copy and this open copy, and put them in an earthenware vessel[b], so that they may last for many days.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'these scrolls.' The Hebrew term can refer broadly to written documents; in this context they are legal transaction records.
    reason: lexical_alternative
  - marker: b
    text: Or 'this unsealed document' for 'this open copy.' The Hebrew contrasts an open document with the sealed one.
    reason: alternative_reading
lexical_decisions:
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Follows the project's default rendering for the divine name, preserving the covenant name in traditional small-caps English form rather than transliteration.
- source_word: צְבָאוֹת
  chosen: of hosts
  alternatives:
  - of armies
  lexicon: HALOT
  rationale: Retains the established sense of YHWH's sovereign command over heavenly and earthly forces. 'Hosts' is concise and natural in this title formula.
- source_word: לָק֣וֹחַ
  chosen: Take
  alternatives:
  - Receive
  lexicon: HALOT
  rationale: The infinitive functions as an imperative-like instruction in context. 'Take' is the plain and natural English equivalent.
- source_word: הַסְּפָרִים הָאֵלֶּה
  chosen: these documents
  alternatives:
  - these scrolls
  - these deeds
  lexicon: HALOT
  rationale: סְפָרִים broadly denotes written documents. In this legal-property context, 'documents' best covers the set without prematurely narrowing every occurrence to 'scrolls' or 'deeds'.
- source_word: סֵפֶר הַמִּקְנָה
  chosen: this deed of purchase
  alternatives:
  - this purchase document
  - this deed
  lexicon: HALOT
  rationale: The phrase refers specifically to the legal record of the land transaction. 'Deed of purchase' communicates both documentary and legal force in clear modern English.
- source_word: הֶחָתוּם
  chosen: the sealed copy
  alternatives:
  - the sealed document
  - the sealed one
  lexicon: HALOT
  rationale: The adjective 'sealed' refers to one version of the purchase document. 'Copy' is supplied in English to make explicit the relation between the sealed and open forms mentioned in the verse.
- source_word: סֵפֶר הַגָּלוּי
  chosen: this open copy
  alternatives:
  - this unsealed document
  - this open document
  lexicon: HALOT
  rationale: גָּלוּי here contrasts with the sealed version and denotes an open/unsealed document. 'Open copy' preserves the contrast and reads naturally alongside 'sealed copy'.
- source_word: בִּכְלִי חָרֶשׂ
  chosen: in an earthenware vessel
  alternatives:
  - in a clay jar
  - in a pottery vessel
  lexicon: HALOT
  rationale: The phrase denotes a container made of fired clay. 'Earthenware vessel' is slightly more formal but fits the legal-preservation context and avoids over-specifying shape.
- source_word: לְמַעַן יַעַמְדוּ
  chosen: so that they may last
  alternatives:
  - so that they may remain
  - so that they may stand
  lexicon: HALOT
  rationale: The idiom concerns continued preservation over time, not literal standing. 'May last' expresses the intended result in idiomatic English.
- source_word: יָמִים רַבִּים
  chosen: for many days
  alternatives:
  - a long time
  - many days
  lexicon: HALOT
  rationale: A fairly literal rendering that remains natural in English and preserves the temporal idiom without unnecessary paraphrase.
