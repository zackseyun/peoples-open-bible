  text: And along the border of Ephraim[a], from the east side to the west side, Reuben[b], one portion.
  footnotes:
  - marker: a
    text: Literally, 'Reuben, one.' The word 'portion' is supplied in English because the chapter uses 'one' elliptically for one tribal allotment.
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'to the side of the sea'; here 'sea' functions as the standard Hebrew term for the west.
    reason: cultural_note
