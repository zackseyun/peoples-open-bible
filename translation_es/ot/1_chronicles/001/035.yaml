  source_alignment_summary: 'El borrador sigue bien la estructura y el sentido del hebreo: una fórmula genealógica sencilla, «Los hijos de Esaú», seguida por cinco nombres. «Elifaz», «Reuel» y «Jalam» son aceptables. La nota sobre «Reuel/Raguel» preserva correctamente la alternativa documentada. Sin embargo, dos nombres necesitan ajuste para mayor fidelidad al uso bíblico español y a la base hebrea/auditada: «Jeús» es una forma poco estable aquí y conviene «Jeús»? No; la forma española más reconocible y alineada con la transliteración auditada «Jeush» es «Jeús/Jehús», pero en biblias españolas de Crónicas el nombre suele aparecer como «Jeús». Aun así, el problema principal es «Coré», que en español identifica normalmente el nombre קֹרַח en otros contextos, pero aquí la auditoría inglesa preserva transliteración directa del nombre individual «Korah» y el proyecto pide trabajar desde la evidencia fuente; en español moderno y neutral, «Córaj» sería demasiado innovador. Dado el uso bíblico español
