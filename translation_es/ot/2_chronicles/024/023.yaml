translation:
  language: es
  text: Al giro[a] del año, subió contra él el ejército de Aram[b]. Llegaron a Judá y a Jerusalén, y destruyeron a todos los jefes del pueblo de entre el pueblo; y enviaron todo su botín[c] al rey de Damasco.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «al final del año»; el hebreo expresa el giro o ciclo anual.
    reason: lexical_alternative
  - marker: b
    text: «Aram» es el nombre hebreo que a menudo se vierte «Siria».
    reason: cultural_note
  - marker: c
    text: O «todo su despojo».
    reason: lexical_alternative
lexical_decisions:
- source_word: לִתְקוּפַת הַשָּׁנָה
  english_pob_choice: At the turn of the year
  chosen_spanish: Al volver el año
  alternatives_spanish:
  - Al final del año
  - Cuando el año daba vuelta
  lexicon: HALOT
  rationale: תְּקוּפָה expresa la idea de giro, vuelta o ciclo. En español, «al volver el año» conserva el sentido idiomático del giro anual sin volverlo rígido ni demasiado interpretativo.
- source_word: עָלָה עָלָיו
  english_pob_choice: came up against him
  chosen_spanish: subió contra él
  alternatives_spanish:
  - vino contra él
  - marchó contra él
  lexicon: HALOT
  rationale: El hebreo usa el verbo de «subir» con la preposición contra en un contexto militar. «Subió contra él» mantiene el giro original y la imagen de ataque.
- source_word: חֵיל אֲרָם
  english_pob_choice: the army of Aram
  chosen_spanish: el ejército de Aram
  alternatives_spanish:
  - la fuerza de Aram
  - el ejército sirio
  lexicon: HALOT
  rationale: חֵיל se refiere a una fuerza militar o ejército. Se conserva «Aram» por consistencia con la política del proyecto de transliterar el nombre bíblico, no sustituirlo por una etiqueta geopolítica posterior.
- source_word: וַיָּבֹאוּ אֶל יְהוּדָה וִירוּשָׁלַם
  english_pob_choice: They came to Judah and Jerusalem
  chosen_spanish: Llegaron a Judá y a Jerusalén
  alternatives_spanish:
  - Entraron en Judá y en Jerusalén
  - Invadieron Judá y Jerusalén
  lexicon: HALOT
  rationale: בוא puede significar venir o llegar/entrar. «Llegaron a» es natural en español y deja que el contexto bélico aporte la fuerza de invasión sin sobretraducir el verbo.
- source_word: וַיַּשְׁחִיתוּ
  english_pob_choice: destroyed
  chosen_spanish: destruyeron
  alternatives_spanish:
  - arrasaron
  - aniquilaron
  lexicon: HALOT
  rationale: שׁחת en este contexto describe devastación contra personas. «Destruyeron» comunica la gravedad sin añadir matices más fuertes que el hebreo no exige.
- source_word: כָּל שָׂרֵי הָעָם
  english_pob_choice: all the leaders of the people
  chosen_spanish: a todos los jefes del pueblo
  alternatives_spanish:
  - a todos los príncipes del pueblo
  - a todos los oficiales del pueblo
  lexicon: HALOT
  rationale: שָׂרִים puede abarcar jefes, gobernantes u oficiales. «Jefes» es claro y digno en español; «príncipes» puede sugerir hijos de realeza y «oficiales» suena demasiado administrativo.
- source_word: מֵעָם
  english_pob_choice: from among the people
  chosen_spanish: sacándolos de entre el pueblo
  alternatives_spanish:
  - de entre el pueblo
  - desde el pueblo
  lexicon: HALOT
  rationale: La preposición מן con עָם marca separación respecto del conjunto del pueblo. «De entre el pueblo» conserva esa relación; se explicita con «sacándolos» para que el español refleje la idea de extracción implicada por el contexto.
- source_word: וְכָל שְׁלָלָם
  english_pob_choice: all their spoil
  chosen_spanish: todo su botín
  alternatives_spanish:
  - todo su despojo
  - todo su pillaje
  lexicon: HALOT
  rationale: שָׁלָל es el botín o despojo tomado en guerra. «Botín» es el equivalente más natural y transparente en español bíblico contemporáneo.
- source_word: שִׁלְּחוּ לְמֶלֶךְ דַּרְמָשֶׂק
  english_pob_choice: sent ... to the king of Damascus
  chosen_spanish: enviaron ... al rey de Damasco
  alternatives_spanish:
  - mandaron ... al rey de Damasco
  - enviaron ... al rey que estaba en Damasco
  lexicon: HALOT
  rationale: La construcción se entiende como el envío del botín al monarca asociado con Damasco. «Rey de Damasco» sigue la forma tradicional de designar al gobernante allí establecido.
theological_decisions:
- issue: Identidad de Aram
  english_pob_reading: '"Aram" is the Hebrew name often rendered "Syria."'
  chosen_spanish_reading: Conservar «Aram» sin sustituirlo por «Siria».
  alternative_spanish_readings:
  - «Siria» como equivalencia cultural
  - «los sirios» en vez de «Aram»
  rationale: El texto hebreo nombra Aram, no una designación geopolítica posterior. La transliteración preserva la referencia histórica y la coherencia terminológica del proyecto.
  doctrine_reference: Terminología histórica y textual; fidelidad al nombre bíblico
- issue: Sujeto y alcance de la destrucción
  english_pob_reading: destroyed all the leaders of the people from among the people
  chosen_spanish_reading: destruyeron a todos los jefes del pueblo, sacándolos de entre el pueblo
  alternative_spanish_readings:
  - destruyeron a todos los jefes del pueblo
  - eliminaron a todos los jefes del pueblo de entre el pueblo
  rationale: El hebreo puede leerse como destrucción de los jefes o como su eliminación/extracción del cuerpo del pueblo. El español mantiene la tensión con un verbo principal fuerte y una frase explicativa que conserva la separación «de entre el pueblo».
  doctrine_reference: Precisión semántica y ambigüedad léxica del hebreo
translation_notes:
  revision_awareness: 'El borrador sigue de cerca el consenso del audit trail inglés: mantiene la idiomaticidad temporal de לִתְקוּפַת הַשָּׁנָה, conserva el nombre propio Aram y refleja la fuerza militar de los verbos sin aumentar indebidamente el nivel de paráfrasis. No se registraron revisiones divergentes en el pasaje base, y el texto español no introduce cambios textuales respecto del análisis auditado.'
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando aparezca el nombre divino; aquí no ocurre.
  - Se mantiene «Aram» por consistencia con el estándar del proyecto.
  - «Jefes» evita la posible ambigüedad de «príncipes» en contexto no monárquico.
  - «Botín» comunica bien שָׁלָל en español bíblico contemporáneo.
