translation:
  language: es
  text: Clamo a ti, pero no me respondes; estoy de pie[a], y tú solo me miras.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «Estuve de pie, y me miraste atentamente». El hebreo puede leerse con sentido de pasado y con el matiz de una mirada atenta o considerada.
    reason: lexical_alternative
lexical_decisions:
- source_word: אֲשַׁוַּע
  english_pob_choice: I cry out
  chosen_spanish: Clamo
  alternatives_spanish:
  - Grito
  - Clamo en voz alta
  - Te imploro
  lexicon: HALOT
  rationale: El piel de שׁוע expresa un clamor intenso de auxilio o apelación urgente. «Clamo» conserva esa fuerza sin añadir contenido que el hebreo no especifica.
- source_word: אֵלֶיךָ
  english_pob_choice: to you
  chosen_spanish: a ti
  alternatives_spanish:
  - hacia ti
  - para ti
  lexicon: HALOT
  rationale: La preposición אֶל con sufijo de segunda persona se expresa naturalmente en español con «a ti» en lenguaje de súplica y oración.
- source_word: תַעֲנֵנִי
  english_pob_choice: you do not answer me
  chosen_spanish: no me respondes
  alternatives_spanish:
  - no me contestas
  - no me das respuesta
  lexicon: HALOT
  rationale: ענה en qal significa «responder/contestar». «No me respondes» es directo, claro y mantiene la queja del versículo sin intensificarla.
- source_word: עָמַדְתִּי
  english_pob_choice: I stand
  chosen_spanish: me detengo
  alternatives_spanish:
  - estoy de pie
  - estoy parado
  - me mantengo en pie
  lexicon: HALOT
  rationale: Aunque el perfecto puede leerse con matiz pasado, en español conviene una forma breve y poética que mantenga la imagen de Job que permanece ante Dios. «Me detengo» preserva la escena sin imponer demasiado la temporalidad.
- source_word: וַתִּתְבֹּנֶן
  english_pob_choice: you only look at
  chosen_spanish: tú solo miras hacia mí
  alternatives_spanish:
  - tú me miras
  - tú consideras mi caso
  - tú observas atentamente
  lexicon: HALOT
  rationale: התבונן puede significar mirar atentamente o considerar. En este lamento, la idea es que Dios observa sin intervenir. «Solo miras hacia mí» conserva ese contraste con la falta de respuesta y deja abierta la posible atención activa o contemplativa.
- source_word: בִּי
  english_pob_choice: at me
  chosen_spanish: hacia mí
  alternatives_spanish:
  - en mí
  - sobre mí
  - a mí
  lexicon: HALOT
  rationale: Con התבונן, el complemento se vuelve más natural en español como dirección de la mirada. «Hacia mí» mantiene la orientación visual sin endurecerla.
theological_decisions:
- issue: El matiz de observación divina sin respuesta
  english_pob_reading: Retain the complaint as unanswered prayer and divine observation without adding accusation beyond the text
  chosen_spanish_reading: Conservar la lamentación como oración sin respuesta y observación divina, sin convertirla en una acusación más fuerte que el hebreo
  alternative_spanish_readings:
  - Clamo a ti, pero no me salvas; me miras y me ignoras
  - Te grito, y tú no me haces caso
  rationale: El hebreo dice que Job clama y no recibe respuesta, y que Dios lo mira. No añade explícitamente «salvas» ni «ignoras». La redacción española mantiene la tensión teológica y el tono de queja sin resolverla ni exagerarla.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: 'El texto sigue de cerca la decisión inglesa POB de mantener la tensión del lamento: clamor sin respuesta y mirada divina sin intervención. Se evita introducir «salvar», «hacer caso» o «ignorar» como explicaciones interpretativas no explícitas en el hebreo. También se respeta la ambigüedad temporal de עָמַדְתִּי y el posible matiz de observación atenta de וַתִּתְבֹּנֶן.'
  spanish_consistency_notes:
  - Se usó «Yahvé» solo cuando corresponde al tetragrámaton; aquí el versículo no lo contiene, así que se mantiene el pronombre «tú».
  - Se prefirió «clamo» sobre «suplico» para conservar la intensidad lexical del piel de שׁוע.
  - Se evitó «Señor» como sustituto devocional no presente en el hebreo.
  - La nota al pie marca la alternativa temporal y semántica del último hemistiquio sin duplicar el contenido del texto principal.
