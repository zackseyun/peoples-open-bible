  yaml_path: translation/ot/proverbs/030/015.yaml
  text: 'The leech has two daughters: “Give[a], give.” Three things are never satisfied; four never say[c][b], “Enough.”'
  footnotes:
  - marker: a
    text: Or, “For the leech there are two daughters.” The Hebrew opens with a topic-marking construction that can be rendered more formally.
    reason: lexical_alternative
  - marker: b
    text: “Give, give” may represent the daughters’ cry for more; some take it more interpretively as “More, more.”
    reason: lexical_alternative
  - marker: c
    text: Or, “four do not say, ‘It is enough.’” The final word is understood here as an idiom of sufficiency rather than the more common noun sense “wealth.”
    reason: lexical_alternative
