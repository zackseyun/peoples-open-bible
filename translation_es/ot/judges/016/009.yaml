base_translation:
  language: en
  yaml_path: translation/ot/judges/016/009.yaml
  text: Now the ambush was waiting in the inner room[a], and she said to him, “The Philistines are upon you, Samson!” But he snapped the cords as a strand of tow snaps when it smells fire[b], and his strength was not known.
  footnotes:
  - marker: a
    text: Or “the one lying in wait was in the room”; the Hebrew singular participle may function collectively for the concealed attackers.
    reason: lexical_alternative
  - marker: b
    text: Literally, “as a thread of tow is snapped when it smells fire.”
    reason: lexical_alternative
