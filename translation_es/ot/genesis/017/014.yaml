translation:
  language: es
  text: Y el varón incircunciso que no haya sido circuncidado en la carne de su prepucio, esa persona[a][b] será cortada de entre su pueblo; ha quebrantado mi pacto.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «alma»; el hebreo usa נֶפֶשׁ, que aquí puede referirse a la persona misma.
    reason: lexical_alternative
  - marker: b
    text: «Será cortada» conserva el idiomático hebreo de sanción del pacto; el texto no especifica aquí si se trata de exclusión comunitaria, muerte u otra forma de juicio.
    reason: theological_note
lexical_decisions:
- source_word: וְעָרֵל זָכָר
  english_pob_choice: an uncircumcised male
  chosen_spanish: el varón incircunciso
  alternatives_spanish:
  - un hombre incircunciso
  - un varón sin circuncidar
  lexicon: HALOT
  rationale: עָרֵל designa a alguien no circuncidado; con זָכָר se trata de un varón. «Varón incircunciso» conserva el rasgo de pacto sin perder la naturalidad del español bíblico contemporáneo.
- source_word: אֲשֶׁר לֹא יִמּוֹל
  english_pob_choice: who is not circumcised
  chosen_spanish: que no sea circuncidado
  alternatives_spanish:
  - que no está circuncidado
  - que no se circuncide
  - que no haya sido circuncidado
  lexicon: HALOT
  rationale: El nifal de מול funciona aquí con sentido pasivo/reflexivo dentro de una condición legal. «Sea circuncidado» mantiene ese valor normativo sin decidir innecesariamente entre aspecto perfectivo o durativo.
- source_word: אֶת בְּשַׂר עָרְלָתוֹ
  english_pob_choice: in the flesh of his foreskin
  chosen_spanish: en la carne de su prepucio
  alternatives_spanish:
  - la carne de su prepucio
  - en la carne de su incircuncisión
  - en su prepucio
  lexicon: HALOT
  rationale: La frase hebrea es concreta y anatómica. «Prepucio» comunica el referente de עָרְלָה con precisión en español; «en la carne de» conserva la concreción física del original y evita suavizar el término.
- source_word: וְנִכְרְתָה הַנֶּפֶשׁ הַהִוא
  english_pob_choice: that person shall be cut off
  chosen_spanish: esa persona será cortada
  alternatives_spanish:
  - esa alma será cortada
  - esa persona será extirpada
  - será cortada de entre su pueblo
  lexicon: HALOT
  rationale: נפש puede significar «persona», «vida» o «alma». Aquí el sentido jurídico-covenantal apunta al individuo bajo sanción; «persona» evita cargar el texto con una antropología más estrecha. Se conserva el idiomático «será cortada» para no resolver la gravedad de la fórmula.
- source_word: מֵעַמֶּיהָ
  english_pob_choice: from his people
  chosen_spanish: de entre su pueblo
  alternatives_spanish:
  - de su pueblo
  - de entre sus parientes
  - de su comunidad
  lexicon: HALOT
  rationale: עַם en este contexto es la comunidad del pacto. «De entre su pueblo» reproduce bien el hebraísmo y deja abierta la amplitud de la sanción, como hace el inglés POB con «from his people».
- source_word: אֶת בְּרִיתִי
  english_pob_choice: my covenant
  chosen_spanish: mi pacto
  alternatives_spanish:
  - mi alianza
  - mi convenio
  lexicon: HALOT
  rationale: בְּרִית es el término técnico de pacto en Génesis 17. «Pacto» es la opción más estable y transparente en español para este uso teológico.
- source_word: הֵפַר
  english_pob_choice: he has broken
  chosen_spanish: ha quebrantado
  alternatives_spanish:
  - ha roto
  - ha violado
  - ha anulado
  lexicon: HALOT
  rationale: הפר expresa quebrantar, violar o anular un pacto. «Ha quebrantado» conserva la fuerza jurídica y suena natural en español bíblico sin suavizar el acto de ruptura.
theological_decisions:
- issue: Sentido de כרת / «cut off»
  english_pob_reading: Retain the idiom 'shall be cut off' without specifying whether it means excommunication, childlessness, or death.
  chosen_spanish_reading: Conservar la fórmula «será cortada» sin precisar si implica exclusión, muerte o otra sanción.
  alternative_spanish_readings:
  - será excluida de su pueblo
  - será condenada a muerte
  - será eliminada
  rationale: La expresión hebrea es deliberadamente densa y no se agota en una sola explicación. Mantenerla abierta preserva la tensión legal y teológica que el texto deja sin resolver de modo explícito.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
- issue: Valor de נפש en la sanción
  english_pob_reading: Translate as 'person' rather than 'soul'
  chosen_spanish_reading: Traducir como «persona» en vez de «alma».
  alternative_spanish_readings:
  - alma
  - ser viviente
  - vida
  rationale: Aquí נפש señala al sujeto sometido a la sanción del pacto, no una parte inmaterial del ser humano. «Persona» comunica con claridad el referente jurídico y evita introducir una antropología no exigida por el pasaje.
  doctrine_reference: 'Translation philosophy §1 and §6: original-language primacy; readable modern Spanish.'
translation_notes:
  revision_awareness: Coincide con el sentido del auditrastro inglés y no introduce cambios de lectura respecto del último pase; se mantiene la ambigüedad inherente de כרת y la concreción anatómica de בְּשַׂר עָרְלָתוֹ.
  spanish_consistency_notes:
  - Se mantiene «pacto» para בְּרִית por coherencia terminológica.
  - Se usa «Yahvé» solo cuando aparezca el nombre divino; este versículo no lo contiene.
  - «Persona» se reserva para נפש en contextos jurídicos/covenantales como este.
  - Se conserva el tono legal y solemne sin recurrir a una paraphrasis explicativa.
