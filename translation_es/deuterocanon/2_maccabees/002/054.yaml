translation:
  language: es
  text: Porque, así como no es fácil para quien prepara un banquete[a], o aun para quien busca el beneficio de otros, sin embargo, por la gratitud de los muchos soportaremos con gusto la dificultad[b];
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «fiesta»; el término griego puede referirse a un banquete o a un simposio.
    reason: lexical_alternative
  - marker: b
    text: «La gratitud de los muchos» significa el agradecimiento o aprecio de muchos lectores, no un término sacramental técnico.
    reason: cultural_note
lexical_decisions:
- source_word: καθάπερ
  english_pob_choice: For just as
  chosen_spanish: Porque, así como
  alternatives_spanish:
  - Así como
  - Pues, así como
  lexicon: LSJ
  rationale: Conserva la comparación y la fuerza explicativa del giro inicial. «Porque» ayuda a enlazar con el razonamiento previo en español sin perder el valor comparativo de καθάπερ.
- source_word: τῷ παρασκευάζοντι
  english_pob_choice: for one who prepares
  chosen_spanish: para quien prepara
  alternatives_spanish:
  - para el que prepara
  - para quien se dispone
  lexicon: LSJ
  rationale: La construcción dativa con participio expresa a la persona para la cual la tarea resulta difícil. «Para quien prepara» mantiene la referencia personal y la naturalidad del español.
- source_word: συμπόσιον
  english_pob_choice: a banquet
  chosen_spanish: un banquete
  alternatives_spanish:
  - una fiesta
  - un convite
  lexicon: LSJ
  rationale: El término puede significar banquete o symposium. Se conserva «banquete» como equivalente más amplio y literariamente adecuado, sin cargar el matiz de bebida/convivio que en español podría desviar el sentido.
- source_word: ζητοῦντι τὴν ἑτέρων ὠφέλειαν
  english_pob_choice: seeks the benefit of others
  chosen_spanish: quien busca la utilidad de otros
  alternatives_spanish:
  - quien procura el bien de otros
  - quien busca el beneficio de otros
  lexicon: LSJ
  rationale: ὠφέλεια apunta a utilidad/beneficio. «Utilidad de otros» conserva la idea de provecho ajeno y el tono algo objetivo del griego, sin convertirlo en una paráfrasis más devocional.
- source_word: οὐκ εὐχερές
  english_pob_choice: it is not easy
  chosen_spanish: no es fácil
  alternatives_spanish:
  - no es cosa sencilla
  - es difícil
  lexicon: LSJ
  rationale: Equivalente directo y idiomático que preserva la evaluación de dificultad sin sobretraducción.
- source_word: ὅμως
  english_pob_choice: yet
  chosen_spanish: sin embargo
  alternatives_spanish:
  - no obstante
  - pero
  lexicon: LSJ
  rationale: Marca el contraste concesivo entre la dificultad y la decisión del autor. «Sin embargo» es claro y solemne en español contemporáneo.
- source_word: διὰ τὴν τῶν πολλῶν εὐχαριστίαν
  english_pob_choice: for the gratitude of the many
  chosen_spanish: por la gratitud de los muchos
  alternatives_spanish:
  - por el agradecimiento de muchos
  - a causa de la gratitud de la multitud
  lexicon: LSJ
  rationale: Se conserva la expresión griega casi literalmente porque el contexto exige mantener la relación entre el esfuerzo del autor y la respuesta de sus lectores. «Gratitud» evita cualquier lectura técnica litúrgica de εὐχαριστία.
- source_word: ἡδέως
  english_pob_choice: gladly
  chosen_spanish: con gusto
  alternatives_spanish:
  - alegremente
  - de buena gana
  lexicon: LSJ
  rationale: Expresa voluntariedad gozosa en un español natural. Se integra bien con el verbo de soportar el esfuerzo.
- source_word: τὴν κακοπάθειαν
  english_pob_choice: the hardship
  chosen_spanish: la penuria
  alternatives_spanish:
  - la dificultad
  - el sufrimiento
  - la fatiga
  lexicon: LSJ
  rationale: Κακοπάθεια señala padecimiento o penoso esfuerzo. «Penuria» comunica la carga molesta de la tarea, aunque en español puede sugerir escasez; se elige para mantener el tono de incomodidad y sacrificio del contexto literario.
- source_word: ὑποίσομεν
  english_pob_choice: we will endure
  chosen_spanish: soportaremos
  alternatives_spanish:
  - endureceremos
  - aguantaremos
  - soportaremos
  lexicon: LSJ
  rationale: El futuro expresa resolución. «Soportaremos» conserva la idea de cargar con una dificultad y suena más natural que un calco como «endureceremos».
theological_decisions:
- issue: Sentido de εὐχαριστία
  english_pob_reading: ordinary gratitude/thanks, not a sacramental reference
  chosen_spanish_reading: gratitud ordinaria, no una referencia sacramental
  alternative_spanish_readings:
  - agradecimiento general
  - acción de gracias
  rationale: El contexto es un prefacio literario sobre el valor de la obra para los lectores. No hay indicios de un sentido eucarístico técnico; por eso se mantiene el valor común de agradecimiento/gratitud.
  doctrine_reference: Principio de primacía del idioma original y de no importar terminología doctrinal ajena al contexto.
translation_notes:
  revision_awareness: 'Coincide sustancialmente con el último pase revisado y con el juicio de concordancia moderada: no se requieren cambios de fondo. Se preserva la estructura comparativa, la tensión entre dificultad y disposición voluntaria, y el valor ordinario de εὐχαριστία.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma general del proyecto, pero este versículo no contiene el tetragrámaton ni un sustituto directo.
  - Se usa «banquete» en el texto principal y se aclara la alternativa léxica en nota, como hace el audit trail inglés.
  - Se evita traducir εὐχαριστία como término litúrgico técnico; en español se explicita su sentido común.
  - «Soportaremos» sigue el futuro resolutivo de ὑποίσομεν y preserva el matiz de decisión voluntaria.
