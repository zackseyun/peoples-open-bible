base_translation:
  language: en
  yaml_path: translation/ot/nehemiah/002/001.yaml
  text: And it happened in the month of Nisan[a], in the twentieth year of King Artaxerxes, when wine was before him, that I took up the wine and gave it to the king. Now I had not been sad in his presence.
  footnotes:
