translation:
  text: 'Jesus said[1], "From Adam until John the Baptist, among the offspring of
    women, there is no one higher than John the Baptist, so that his eyes will not
    be cast down. But I have said: whoever among you becomes a child will know the
    kingdom[4][3][2], and will become higher than John."'
  philosophy: formal
  drafter_model: gemini-3.1-pro-preview
  drafter_label: gemini_3_1_pro_thomas_redraft
  drafted_at: '2026-04-22T09:24:23Z'
  footnotes:
  - marker: '1'
    text: The Coptic ⲛⲟⲩⲱϭⲡ is a contraction of the negative Third Future ⲛⲛⲉⲩⲟⲩⲱϭⲡ
      ('they will not be cast down', referring to the plural 'eyes').
    reason: dialect_note
  - marker: '2'
    text: Grammatically, 'his' refers to John the Baptist. Because there is no one
      higher than him, he does not need to lower his eyes in deference to anyone.
    reason: cultural_note
  - marker: '3'
    text: The preposition ⲁ in ⲁ ⲓⲱϩⲁⲛⲛⲏⲥ ('than John') is a phonetic or dialectal
      variant of the comparative ⲉ ('than').
    reason: dialect_note
  - marker: '4'
    text: Compare with Matthew 11:11 and Luke 7:28. Thomas adds 'From Adam' and 'so
      that his eyes will not be cast down,' and shifts the second half from 'the least
      in the kingdom of heaven is greater' to 'whoever among you becomes a child will
      know the kingdom, and will become higher.'
    reason: cross_reference
lexical_decisions:
- source_word: ϫⲡⲟ
  chosen: offspring
  rationale: Translates the Greek γεννητοῖς (born). In Coptic, it literally means
    'offspring' or 'progeny'.
  lexicon: Crum 778b
  alternatives:
  - those born
- source_word: ϫⲟⲥⲉ
  chosen: higher
  rationale: Qualitative of ϫⲓⲥⲉ, meaning 'to be high' or 'exalted'. Used here in
    a comparative sense.
  lexicon: Crum 788a
  alternatives:
  - greater
  - more exalted
- source_word: ⲟⲩⲱϭⲡ
  chosen: cast down
  rationale: Literally 'to break' or 'crush', but when used with 'eyes' (ⲃⲁⲗ), it
    means to lower or cast down the eyes in deference or shame.
  lexicon: Crum 508a
  alternatives:
  - lowered
  - broken
- source_word: ⲕⲟⲩⲉⲓ
  chosen: child
  rationale: Means 'small' or 'little', often used substantivally for 'child' or 'little
    one'.
  lexicon: Crum 130a
  alternatives:
  - little one
  - small
theological_decisions:
- issue: Translation of ⲕⲟⲩⲉⲓ
  chosen_reading: child
  rationale: While it can mean 'small' or 'little one', 'child' captures the Thomasine
    theme of returning to a state of unified childhood (cf. Saying 22).
  alternatives_noted:
  - little one
  - small
drafter_notes: The translation preserves the distinct Thomasine additions and shifts
  compared to the Synoptic parallels, particularly the phrase about John's eyes not
  being cast down and the emphasis on 'knowing' the kingdom by becoming a child.
