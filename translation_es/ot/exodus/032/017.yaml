revisions:
- from: 'Cuando Josué oyó el sonido del pueblo mientras gritaba[a], dijo a Moisés: «Hay sonido de guerra en el campamento».'
  to: 'Cuando Josué oyó el sonido del pueblo en su griterío[a], dijo a Moisés: «Se oye sonido de guerra en el campamento».'
  rationale: Se reemplazó «mientras gritaba» por «en su griterío» para representar de forma más natural en español el clamor colectivo expresado por בְּרֵעֹה, manteniendo la alternativa en nota. También se ajustó «Hay sonido de guerra» a «Se oye sonido de guerra» para lograr una frase española más idiomática sin perder la imagen auditiva de קוֹל מִלְחָמָה.
