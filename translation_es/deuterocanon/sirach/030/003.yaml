translation:
  language: es
  text: El que instruye a su hijo provocará celos en el enemigo[a], y en presencia de sus amigos se alegrará por él.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «hará que el enemigo tenga envidia». El verbo griego puede denotar provocar celos o envidia.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ὁ διδάσκων
  english_pob_choice: He who instructs
  chosen_spanish: El que instruye
  alternatives_spanish:
  - El que enseña
  - Quien forma
  lexicon: BDAG
  rationale: El participio sustantivado expresa una acción continua; «instruye» conserva mejor el matiz de formación/educación activa que «enseña», que en español puede sonar más escolar y menos formativo.
- source_word: τὸν υἱὸν αὐτοῦ
  english_pob_choice: his son
  chosen_spanish: a su hijo
  alternatives_spanish:
  - a su niño
  - a su descendiente
  lexicon: BDAG
  rationale: El griego es masculino singular, y «hijo» reproduce con precisión el término sin neutralizarlo.
- source_word: παραζηλώσει
  english_pob_choice: will provoke ... to jealousy
  chosen_spanish: provocará a celos
  alternatives_spanish:
  - hará envidiar
  - despertará celo en
  lexicon: BDAG
  rationale: El verbo puede significar suscitar celos o envidia; «a celos» reproduce de forma natural la fuerza afectiva del verbo sin convertirlo en una explicación interpretativa.
- source_word: τὸν ἐχθρόν
  english_pob_choice: the enemy
  chosen_spanish: al enemigo
  alternatives_spanish:
  - a un enemigo
  - al adversario
  lexicon: BDAG
  rationale: El singular con artículo permite un valor representativo; «enemigo» conserva la oposición personal del texto.
- source_word: ἔναντι φίλων
  english_pob_choice: in the presence of friends
  chosen_spanish: delante de los amigos
  alternatives_spanish:
  - en presencia de amigos
  - ante los amigos
  lexicon: BDAG
  rationale: «Delante de» comunica con claridad el sentido locativo/social de ἔναντι en español corriente, sin perder dignidad.
- source_word: ἐπʼ αὐτῷ
  english_pob_choice: over him
  chosen_spanish: por él
  alternatives_spanish:
  - a causa de él
  - sobre él
  lexicon: BDAG
  rationale: Con ἀγαλλιάσεται, la preposición expresa ocasión o motivo del gozo; «por él» es una solución breve y natural en español.
- source_word: ἀγαλλιάσεται
  english_pob_choice: he will rejoice
  chosen_spanish: se alegrará
  alternatives_spanish:
  - se regocijará
  - exultará
  lexicon: BDAG
  rationale: «Se alegrará» es idiomático y fiel al sentido de gozo jubiloso sin cargar el español con un arcaísmo innecesario.
translation_notes:
  revision_awareness: La versión inglesa auditada se mantuvo sin cambios en la revisión más reciente; el pasaje presenta acuerdo alto con la fuente griega, con una única oscilación lexical en παραζηλώσει (celos/envidia).
  spanish_consistency_notes:
  - Se mantuvo «hijo» por la precisión del griego masculino singular.
  - Se prefirió «instruye» frente a «enseña» para reflejar mejor la formación parental continua.
  - Se evitó «Cristo», «SEÑOR» u այլ terminología no presente en este versículo.
  - La nota textual/lexical se ancló en «celos» porque el español también admite la alternativa «envidia».
