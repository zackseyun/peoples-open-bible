translation:
  language: es
  text: y los dos riñones, y la grasa que está sobre ellos, la cual está sobre los lomos, y el apéndice[a] sobre el hígado, con los riñones, lo retirará.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «el lóbulo sobre el hígado». El término hebreo para esta parte anatómica es incierto; se usa «apéndice» en el texto principal para evitar fingir una precisión mayor de la que permite la evidencia.
    reason: lexical_alternative
lexical_decisions:
- source_word: שְׁתֵּי הַכְּלָיֹת
  english_pob_choice: the two kidneys
  chosen_spanish: los dos riñones
  alternatives_spanish:
  - la pareja de riñones
  - los dos órganos renales
  lexicon: HALOT
  rationale: כְּלָיֹת designa anatómicamente los riñones. En español, «riñones» es claro, natural y fiel al registro sacrificial del texto.
- source_word: הַחֵלֶב
  english_pob_choice: the fat
  chosen_spanish: la grasa
  alternatives_spanish:
  - el sebo
  - la grasa de sebo
  lexicon: HALOT
  rationale: En contextos sacrificiales, חֵלֶב refiere a la porción grasa reservada. «Grasa» comunica bien el sentido en español actual sin introducir tecnicismo innecesario.
- source_word: אֲשֶׁר עֲלֵהֶן
  english_pob_choice: that is on them
  chosen_spanish: que está sobre ellos
  alternatives_spanish:
  - que está encima de ellos
  - que va sobre ellos
  lexicon: HALOT
  rationale: La cláusula relativa especifica la ubicación de la grasa respecto de los riñones. «Que está sobre ellos» conserva la relación espacial de forma natural.
- source_word: הַכְּסָלִים
  english_pob_choice: the loins
  chosen_spanish: los lomos
  alternatives_spanish:
  - los flancos
  - la región lumbar
  lexicon: HALOT
  rationale: כְּסָלִים apunta a la zona de los lomos o flancos. «Lomos» mantiene el registro anatómico-sacrificial y es una opción estable en español bíblico.
- source_word: הַיֹּתֶרֶת
  english_pob_choice: the appendage
  chosen_spanish: la apófisis
  alternatives_spanish:
  - el apéndice
  - el lóbulo
  lexicon: HALOT
  rationale: El término hebreo es anatómicamente incierto. «Apófisis» intenta reflejar una prolongación o saliente sin fingir precisión donde el hebreo no la ofrece; se evita así sobreinterpretar el pasaje.
- source_word: עַל הַכָּבֵד
  english_pob_choice: on the liver
  chosen_spanish: sobre el hígado
  alternatives_spanish:
  - en el hígado
  - junto al hígado
  lexicon: HALOT
  rationale: La preposición עַל expresa ubicación anatómica. «Sobre el hígado» es la forma más directa y fiel al hebreo.
- source_word: עַל הַכְּלָיוֹת
  english_pob_choice: with the kidneys
  chosen_spanish: con los riñones
  alternatives_spanish:
  - junto con los riñones
  - además de los riñones
  lexicon: HALOT
  rationale: 'Sigo la revisión inglesa que prefirió «with» para el sentido procedimental: la apófisis se retira juntamente con los riñones. «Con los riñones» comunica ese valor operativo en español.'
- source_word: יְסִירֶנָּה
  english_pob_choice: he shall remove
  chosen_spanish: la quitará
  alternatives_spanish:
  - la removerá
  - la apartará
  lexicon: HALOT
  rationale: El hifil de סור indica retirar o quitar en una instrucción ritual. «La quitará» es claro, formal y conserva el valor prescriptivo.
theological_decisions:
- issue: Valor ritual de la instrucción sacrificial
  english_pob_reading: he shall remove
  chosen_spanish_reading: la quitará
  alternative_spanish_readings:
  - la removerá
  - la apartará
  rationale: 'No hay una decisión doctrinal compleja, pero sí una instrucción cultual precisa: se trata de retirar ciertas porciones para el rito. «La quitará» preserva ese carácter normativo sin añadir interpretación.'
  doctrine_reference: Levítico 3:4; procedimiento del sacrificio de paz/ofrenda de comunión
- issue: Término anatómico incierto para הַיֹּתֶרֶת
  english_pob_reading: the appendage
  chosen_spanish_reading: la apófisis
  alternative_spanish_readings:
  - el apéndice
  - el lóbulo
  rationale: La POB inglesa conserva la incertidumbre con «appendage». En español, «apófisis» mantiene la idea de una prolongación anatómica sin resolver artificialmente la identificación exacta del término.
  doctrine_reference: Lexicografía y cautela exegética en Levítico 3:4
translation_notes:
  revision_awareness: La base inglesa revisada sustituyó «along with» por «with» en la frase final, buscando un matiz ligeramente más formal y literal. En español se refleja ese ajuste con «con los riñones», manteniendo el sentido procedimental de retirada conjunta. También se conserva la cautela léxica de la POB respecto de הַיֹּתֶרֶת, evitando una identificación anatómica excesiva.
  spanish_consistency_notes:
  - Se mantiene «riñones» para כְּלָיֹת, en línea con el valor anatómico estándar.
  - Se traduce חֵלֶב por «grasa», no por «sebo», para una lectura pública más clara.
  - «Lomos» reproduce el registro bíblico de כְּסָלִים sin perder inteligibilidad.
  - Se conserva la incertidumbre de הַיֹּתֶרֶת con un término anatómico aproximado y nota explicativa.
  - «Con los riñones» refleja la relación procedimental final, no mera localización espacial.
