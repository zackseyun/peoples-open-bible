    rationale: En español, parece que se escribe «sobre ellos» como referente externo, en vez de inscribir sobre los mismos palos. «Sobre los cuales escribes» expresa mejor la relación relativa del hebreo.
  - severity: low
    issue: «Delante de sus ojos» es comprensible pero menos natural que «ante sus ojos».
    rationale: Ambas son fieles, pero «ante sus ojos» es más idiomática y elegante en español bíblico moderno.
