translation:
  language: es
  text: 'Entonces el filisteo dijo: «Yo he desafiado[a] las filas[b] de Israel este día[c]. Denme un hombre, y peleemos juntos».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El verbo hebreo también puede traducirse «he provocado», «he insultado» o «he mofado de»; «he desafiado» encaja mejor con el reto militar en este contexto.
    reason: lexical_alternative
  - marker: b
    text: O «las líneas de batalla de Israel» o, por extensión, «los ejércitos de Israel».
    reason: lexical_alternative
  - marker: c
    text: Literalmente «este día»; muchas versiones traducen «hoy».
    reason: lexical_alternative
lexical_decisions:
- source_word: הַפְּלִשְׁתִּי
  english_pob_choice: the Philistine
  chosen_spanish: el filisteo
  alternatives_spanish:
  - el filisteo guerrero
  - el filisteo campeón
  lexicon: HALOT
  rationale: El sustantivo con artículo identifica al personaje por su afiliación filistea. En español, «el filisteo» conserva la referencia directa sin importar un título como «campeón», que no está en la palabra hebrea.
- source_word: חֵרַפְתִּי
  english_pob_choice: I have defied
  chosen_spanish: he desafiado
  alternatives_spanish:
  - he retado
  - he ultrajado
  - he despreciado
  lexicon: HALOT
  rationale: En este contexto de desafío militar, el verbo expresa una provocación hostil y pública. «Desafiado» transmite bien el tono de reto y afrenta sin suavizarlo excesivamente.
- source_word: מַעַרְכ֥וֹת
  english_pob_choice: the ranks
  chosen_spanish: las filas
  alternatives_spanish:
  - las líneas de batalla
  - los escuadrones
  - los ejércitos
  lexicon: HALOT
  rationale: El plural hebreo se refiere a formaciones militares ordenadas. «Filas» es natural en español y conserva la imagen de disposición bélica; «ejércitos» sería más amplio de lo que la forma hebrea sugiere.
- source_word: הַיּוֹם הַזֶּה
  english_pob_choice: this day
  chosen_spanish: este día
  alternatives_spanish:
  - hoy
  lexicon: HALOT
  rationale: Se mantiene la fuerza demostrativa del hebreo. «Este día» suena algo más solemne y reproduce mejor la formulación enfática del original.
- source_word: תְּנוּ לִי אִישׁ
  english_pob_choice: Give me a man
  chosen_spanish: Denme un hombre
  alternatives_spanish:
  - Entréguenme un hombre
  - Envíenme un hombre
  - Provéanme un hombre
  lexicon: HALOT
  rationale: El hebreo dice literalmente «denme un hombre»; el plural responde al grupo al que se dirige el filisteo. En español, el plural «Denme» conserva la fuerza imperativa del desafío y evita un singular artificial.
- source_word: וְנִלָּחֲמָה
  english_pob_choice: and let us fight
  chosen_spanish: y peleemos
  alternatives_spanish:
  - y luchemos
  - y combatamos
  - y vayamos a pelear
  lexicon: HALOT
  rationale: El cohortativo expresa invitación/desafío a combatir. «Peleemos» es idiomático y suficientemente fuerte para la escena de duelo.
- source_word: יָחַד
  english_pob_choice: together
  chosen_spanish: juntos
  alternatives_spanish:
  - uno contra otro
  - cara a cara
  lexicon: HALOT
  rationale: «Juntos» reproduce de forma natural la idea de combate mutuo. En contexto, no sugiere cooperación, sino enfrentamiento directo entre dos combatientes.
translation_notes:
  revision_awareness: La versión española sigue de cerca el texto hebreo y el análisis auditado en inglés, con ajuste idiomático mínimo para que el desafío resulte natural en español. Se preserva la tensión semántica de חרף como afrenta militar, y de מערכות como formaciones/rangos militares, sin ampliar innecesariamente a «ejércitos» en el texto principal.
  spanish_consistency_notes:
  - Se usa «filisteo» como designación étnica/identificadora, no como nombre propio.
  - Se conserva el matiz de reto público y hostil en «desafiado».
  - «Este día» mantiene la deixis enfática del hebreo.
  - La nota de «un hombre» aclara el sentido representativo sin sobretraducir el texto principal.
