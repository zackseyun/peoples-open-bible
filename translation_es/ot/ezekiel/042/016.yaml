    rationale: Aunque puede calcar el inglés «by the measuring reed», en español suena mejor «según la caña de medir» o la repetición instrumental «con la caña de medir». Dado que la nota ya explica la dificultad textual, «según la caña de medir» preserva mejor la función de la frase final.
  - severity: medium
    issue: «todo alrededor» no suena natural en español bíblico actual
    rationale: Para סָבִיב, «por todo alrededor» o «alrededor» encaja mejor con la descripción del perímetro. La opción actual es comprensible, pero torpe.
  - severity: low
    issue: La nota al pie puede pulirse estilísticamente
    rationale: «Versiones antiguas» y «medidas circundantes» puede expresarse con más naturalidad como «las medidas de los versículos 16–19» o similar, sin cambiar el contenido.
