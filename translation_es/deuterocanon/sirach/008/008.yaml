translation:
  language: es
  text: No avergüences a un anciano[a]; recuerda que tú también serás contado entre los ancianos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'La tradición griega lee en cambio: «No pases por alto el discurso de los sabios, y ocúpate de sus proverbios; porque de ellos aprenderás instrucción y cómo servir a los grandes». El testimonio hebreo aquí preserva una exhortación distinta sobre honrar al anciano.'
    reason: alternative_reading
lexical_decisions:
- source_word: μὴ παρίδῃς / אַל תְּבַיֵּשׁ
  english_pob_choice: Do not shame / Do not disregard
  chosen_spanish: No desprecies
  alternatives_spanish:
  - No avergüences
  - No desprecies ni ignores
  - No pases por alto
  lexicon: HALOT; LXX Swete 1909
  rationale: 'El hebreo base prohíbe avergonzar al anciano; el paralelo griego prohíbe pasar por alto el dicho de los sabios. «No desprecies» puede abarcar ambas líneas de sentido en español: no humillar a la persona y no tratar con desdén su palabra.'
- source_word: אֱנוֹשׁ יָשִׁישׁ
  english_pob_choice: old man / old
  chosen_spanish: el anciano
  alternatives_spanish:
  - el hombre viejo
  - el hombre anciano
  - la persona de edad avanzada
  lexicon: HALOT
  rationale: Aunque el inglés conservó la singularidad concreta, en español «el anciano» comunica con naturalidad la combinación de hombre/persona de edad avanzada sin sonar torpe. Evita además una construcción pesada como «hombre viejo».
- source_word: דִּיֲהִגָּמָה / παροιμίαι
  english_pob_choice: discourse / proverbs
  chosen_spanish: dicho... proverbios
  alternatives_spanish:
  - enseñanza... refranes
  - palabra... proverbios
  - discurso... proverbios
  lexicon: LSJ; HALOT; contexto sapiencial
  rationale: El hebreo y el griego no coinciden aquí; por eso se eligió un término amplio, «dicho», para reflejar la tradición sapiencial sin sobreespecificar. «Proverbios» representa bien παροιμίαι y mantiene el tono literario.
- source_word: μὴ παρίδῃς ... καὶ ἐν ταῖς παροιμίαις αὐτῶν ἀναστρέφου
  english_pob_choice: Do not disregard the discourse of the wise, and occupy yourself with their proverbs
  chosen_spanish: No desprecies el dicho de los sabios, y revuélvete en sus proverbios
  alternatives_spanish:
  - No desprecies el discurso de los sabios, y anda entre sus proverbios
  - No ignores el dicho de los sabios, y ocúpate de sus proverbios
  lexicon: LSJ
  rationale: «Revuélvete en» intenta dar la idea de ἀναστρέφου como moverse/habitar entre, no simplemente leer ocasionalmente. Aunque es una solución estilísticamente marcada, preserva la fuerza del imperativo y la imagen de convivencia con la sabiduría.
- source_word: παιδείαν
  english_pob_choice: instruction
  chosen_spanish: instrucción
  alternatives_spanish:
  - disciplina
  - formación
  - enseñanza
  lexicon: LSJ; HALOT
  rationale: «Instrucción» es el equivalente más natural y amplio en español para παιδεία en contexto sapiencial, sin perder el matiz formativo que el término puede tener.
- source_word: λειτουργῆσαι μεγιστᾶσιν
  english_pob_choice: serve great men
  chosen_spanish: servir a los grandes
  alternatives_spanish:
  - servir a los grandes hombres
  - prestar servicio a los poderosos
  - desempeñar servicio ante los grandes
  lexicon: LSJ
  rationale: La expresión griega apunta a prestar servicio a personas de alta posición. «Los grandes» mantiene la concisión y la ambigüedad respetuosa del original sin imponer una lectura más específica que el texto no exige.
theological_decisions:
- issue: Elegir entre el hebreo conservado y el paralelo griego muy divergente
  english_pob_reading: Primary text follows the Hebrew; Greek is preserved in a footnote as an alternative tradition.
  chosen_spanish_reading: El texto principal sigue el hebreo; la nota conserva la tradición griega alternativa.
  alternative_spanish_readings:
  - Traducir hacia el sentido griego sobre atender a los sabios
  - Fusionar ambas tradiciones en el cuerpo principal
  rationale: El expediente fuente indica que el hebreo es el testimonio principal y el griego funciona como paralelo/lectura alternativa. Por eso el cuerpo español sigue la admonición sobre el anciano, pero la nota reproduce la tradición griega para no borrar la tensión textual documentada.
  doctrine_reference: PHILOSOPHY.md 'What we are translating'
translation_notes:
  revision_awareness: Se revisó el pasaje a la luz del expediente de revisión más reciente; el estado indica que no hubo cambios necesarios y el consenso fue alto, con solo una discrepancia menor relacionada con la divergencia hebreo/griego.
  spanish_consistency_notes:
  - Se mantuvo un registro auditable de la variante griega en nota, sin mezclarla indebidamente con el cuerpo principal.
  - Se evitó «SEÑOR» y otras convenciones de ocultamiento divino porque este versículo no contiene el tetragrámaton ni un equivalente directo.
  - Se prefirió un español sobrio y publicable, aunque la imagen «revuélvete en» conserva conscientemente la fuerza del verbo griego ἀναστρέφου.
