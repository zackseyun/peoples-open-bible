translation:
  language: es
  text: También renuncio a la autoridad sobre la ciudadela[a] de Jerusalén, y se la entrego al sumo sacerdote, para que nombre en ella a los hombres que él mismo elija para guardarla.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, «el Acra», usando la transliteración tradicional del nombre de la fortaleza.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀφίημι
  english_pob_choice: I also relinquish
  chosen_spanish: renuncio
  alternatives_spanish:
  - relinquyo
  - dejo
  lexicon: BDAG
  rationale: En este contexto administrativo de transferencia de control, ἀφίημι expresa ceder o abandonar un derecho/autoridad, no perdonar. «Renuncio» comunica con naturalidad la idea de desistir de la autoridad sobre la fortaleza, manteniendo el matiz de cesión.
- source_word: ἐξουσίαν
  english_pob_choice: authority over
  chosen_spanish: autoridad sobre
  alternatives_spanish:
  - jurisdicción sobre
  - control sobre
  - poder sobre
  lexicon: BDAG
  rationale: «Autoridad sobre» conserva el valor jurídico-administrativo de ἐξουσία sin exagerar el matiz de fuerza. Es la correspondencia más clara y transparente en español.
- source_word: ἄκρας
  english_pob_choice: the citadel
  chosen_spanish: la acrópolis
  alternatives_spanish:
  - la ciudadela
  - la fortaleza
  - el Acra
  lexicon: LSJ
  rationale: El griego alude a la fortaleza jerusalemita conocida como ἄκρα/Acra. «Acrópolis» funciona en español como designación de una elevación fortificada urbana, pero no borra la realidad histórica del lugar; se mantiene el sentido de fortaleza dominante. La alternativa transliterada «el Acra» queda fuera del texto principal por menor transparencia.
- source_word: δίδωμι
  english_pob_choice: I give it
  chosen_spanish: la entrego
  alternatives_spanish:
  - la doy
  - la concedo
  - la pongo en manos
  lexicon: BDAG
  rationale: «Entrego» expresa mejor el traspaso formal de la fortaleza/autoridad que un simple «doy», y corresponde al acto de cesión que la frase desarrolla.
- source_word: ἀρχιερεῖ
  english_pob_choice: the high priest
  chosen_spanish: el sumo sacerdote
  alternatives_spanish:
  - el jefe sacerdote
  lexicon: BDAG
  rationale: «Sumo sacerdote» es el equivalente bíblico natural en español para ἀρχιερεύς en contexto judío-cultual y político.
- source_word: ὅπως ἂν καταστῇ
  english_pob_choice: so that he may appoint
  chosen_spanish: para que establezca
  alternatives_spanish:
  - para que ponga
  - para que asigne
  - para que designe
  lexicon: BDAG
  rationale: Aquí καθίστημι tiene el sentido de colocar o constituir personas en una función. «Establezca» conserva esa idea de nombrar/poner a alguien en un puesto con tono formal y administrativo.
- source_word: ἄνδρας
  english_pob_choice: men
  chosen_spanish: a los hombres
  alternatives_spanish:
  - a los varones
  - a las personas
  lexicon: BDAG
  rationale: El griego usa un plural masculino explícito, y el contexto sugiere varones encargados de la guardia. Se conserva esa precisión con «los hombres».
- source_word: οὓς ἂν ἐκλέξηται αὐτός
  english_pob_choice: whom he himself chooses
  chosen_spanish: que él mismo elija
  alternatives_spanish:
  - que él mismo seleccione
  - que él mismo escoga
  lexicon: BDAG
  rationale: Se preserva el énfasis de αὐτός con «él mismo», indicando discreción personal del sumo sacerdote en la selección.
- source_word: τοῦ φυλάσσειν αὐτήν
  english_pob_choice: to guard it
  chosen_spanish: para guardarla
  alternatives_spanish:
  - para custodiarla
  - para protegerla
  - para vigilarla
  lexicon: BDAG
  rationale: 'φυλάσσω aquí significa proteger/guardar una fortaleza. «Guardarla» es la opción más directa y natural en español; el pronombre femenino retoma «la acrópolis». '
theological_decisions:
- issue: 'Nombrar ἄκρα/Acra en español: común vs. transliterado'
  english_pob_reading: the citadel (with footnote noting 'the Acra')
  chosen_spanish_reading: la acrópolis (con nota que remite al nombre histórico Acra)
  alternative_spanish_readings:
  - la ciudadela
  - el Acra
  - la fortaleza
  rationale: El texto griego designa una fortaleza concreta de Jerusalén. En español, «acrópolis» ofrece una imagen funcional de una altura fortificada y permite lectura fluida, mientras la nota conserva la identificación histórica tradicional con Acra. No se sustituye por una fórmula eclesiástica ni se diluye el referente topográfico.
  doctrine_reference: Principio POB de transparencia histórica y legibilidad moderna; preservar el referente geográfico sin ocultarlo tras un término religioso tradicional.
translation_notes:
  revision_awareness: La base inglesa fue revisada de «release» a «relinquish» para ἀφίημι; por eso el español evita cualquier matiz de simple soltar y opta por un verbo de cesión voluntaria de autoridad («renuncio»). También se tuvo en cuenta la nota inglesa sobre la transliteración tradicional del nombre de la fortaleza, que aquí se conserva como alternativa en nota.
  spanish_consistency_notes:
  - Se mantiene «sumo sacerdote» para ἀρχιερεύς, conforme al uso bíblico estándar en español.
  - Se conserva la distinción entre la fortaleza/Acra como lugar específico y la autoridad sobre ella como dominio transferido.
  - El pronombre femenino «la» en «guardarla» retoma «la acrópolis» de manera consistente.
