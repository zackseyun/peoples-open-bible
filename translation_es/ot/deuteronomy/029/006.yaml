translation:
  language: es
  text: Cuando ustedes llegaron a este lugar[a], Sihón, rey de Hesbón, y Og, rey de Basán, salieron a encontrarnos en batalla, y los derribamos[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «y ustedes llegaron a este lugar». La forma narrativa hebrea puede leerse con coordinación simple o con sentido temporal.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «y los derrotamos». El verbo hebreo significa literalmente «golpear»; a menudo, en contextos militares, se refiere a una derrota.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַתָּבֹאוּ
  english_pob_choice: When you came
  chosen_spanish: Cuando ustedes llegaron
  alternatives_spanish:
  - y ustedes llegaron
  - entonces ustedes llegaron
  lexicon: HALOT
  rationale: El wayyiqtol narra una acción pasada en secuencia. En español, 'cuando' reproduce bien la relación temporal que el inglés POB también destacó, y 'ustedes' hace explícito el sujeto plural sin perder la dirección al pueblo.
- source_word: אֶל הַמָּקוֹם הַזֶּה
  english_pob_choice: to this place
  chosen_spanish: a este lugar
  alternatives_spanish:
  - a este sitio
  - hasta este lugar
  lexicon: HALOT
  rationale: מָקוֹם es 'lugar'. 'A este lugar' conserva la referencia espacial directa de אֶל y suena natural en español.
- source_word: וַיֵּצֵא
  english_pob_choice: came out
  chosen_spanish: salieron
  alternatives_spanish:
  - salió
  - vinieron fuera
  lexicon: HALOT
  rationale: Aunque el hebreo singular/dual aparente acompaña a los dos reyes nombrados, el sentido narrativo es que ambos reyes salen. 'Salieron' expresa claramente el movimiento de salida sin forzar un calco.
- source_word: סִיחֹן מֶלֶךְ חֶשְׁבּוֹן
  english_pob_choice: Sihon king of Heshbon
  chosen_spanish: Sihón, rey de Hesbón
  alternatives_spanish:
  - Sihón, el rey de Hesbón
  - Sijón, rey de Hesbón
  lexicon: HALOT
  rationale: Se translitera el nombre propio con acento español. 'Rey de Hesbón' mantiene la aposición breve del hebreo y la convención del POB de traducir el título.
- source_word: וְעוֹג מֶלֶךְ הַבָּשָׁן
  english_pob_choice: and Og king of Bashan
  chosen_spanish: y Og, rey de Basán
  alternatives_spanish:
  - y Og, el rey de Basán
  - y Og, rey del Basán
  lexicon: HALOT
  rationale: Se conserva la paralelidad con la frase anterior. 'Basán' es la forma castellana usual del topónimo, y el título 'rey' se mantiene traducido.
- source_word: לִקְרָאתֵנוּ
  english_pob_choice: to meet us
  chosen_spanish: a encontrarnos
  alternatives_spanish:
  - para encontrarnos
  - a salir a nuestro encuentro
  lexicon: HALOT
  rationale: La expresión idiomática 'salir al encuentro' es natural en español. Opto por 'a encontrarnos' porque resume bien el valor de לקראת/קרא en este contexto de aproximación hostil, sin añadir demasiado al texto principal.
- source_word: לַמִּלְחָמָה
  english_pob_choice: in battle
  chosen_spanish: en batalla
  alternatives_spanish:
  - para la guerra
  - en guerra
  lexicon: HALOT
  rationale: מִלְחָמָה puede ser 'guerra' o 'batalla'. Aquí el POB inglés eligió 'in battle', y 'en batalla' reproduce esa idea de enfrentamiento armado con una formulación natural y digna.
- source_word: וַנַּכֵּם
  english_pob_choice: and we struck them down
  chosen_spanish: y los derrotamos
  alternatives_spanish:
  - y los golpeamos
  - y los derribamos
  lexicon: HALOT
  rationale: נכה literalmente es 'golpear/abatir'. En este contexto militar, 'derrotamos' comunica el resultado bélico de manera clara en español. Se conserva la fuerza de victoria sin volverlo excesivamente coloquial.
theological_decisions:
- issue: El modo de expresar el combate y la victoria sobre Sihón y Og
  english_pob_reading: and we struck them down
  chosen_spanish_reading: y los derrotamos
  alternative_spanish_readings:
  - y los golpeamos
  - y los abatimos
  rationale: 'No hay cambio doctrinal, pero sí una decisión semántica relevante: el hebreo usa נכה con objeto directo, literalmente ''golpear'', y el POB inglés aclara que en contexto significa derrota militar. En español, ''derrotamos'' comunica ese resultado sin perder el carácter bélico del relato.'
  doctrine_reference: Narrativa histórica de Deuteronomio; victoria concedida por Yahvé en la historia de Israel.
translation_notes:
  revision_awareness: Se tomó en cuenta la revisión inglesa que prefirió 'in battle' sobre 'for battle' por ser más natural, y se reflejó en 'en batalla'. También se respetó la decisión auditada de mantener el sentido concreto de נכה sin suavizarlo a una simple mención abstracta de victoria.
  spanish_consistency_notes:
  - Se mantuvo 'Yahvé' en otras partes del proyecto según la terminología por defecto, aunque este versículo no lo contiene.
  - 'Se usaron transliteraciones coherentes para nombres propios: Sihón, Hesbón y Basán.'
  - Se evitó 'SEÑOR' o 'Cristo', que no pertenecen a este versículo.
  - La nota de batalla conserva la tensión semántica entre 'encontrarse' y 'enfrentarse' sin borrarla.
