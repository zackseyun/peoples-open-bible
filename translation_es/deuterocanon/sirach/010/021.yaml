translation:
  language: es
  text: Entre los hermanos, su jefe es honrado[a], y el que teme a Dios entre su pueblo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Paralelo griego: «Rico y honrado y pobre: su jactancia es el temor del Señor». El hebreo y el griego difieren sustancialmente aquí; el texto principal sigue el hebreo conservado.'
    reason: alternative_reading
lexical_decisions:
- source_word: בֵּין
  english_pob_choice: among
  chosen_spanish: entre
  alternatives_spanish:
  - en medio de
  - entre medio de
  lexicon: HALOT
  rationale: La preposición introduce el ámbito social dentro de un grupo; «entre» reproduce bien ese valor relacional en español y suena natural.
- source_word: אַחִים
  english_pob_choice: brothers
  chosen_spanish: hermanos
  alternatives_spanish:
  - hermanos y hermanas
  - parientes
  - sibilings
  lexicon: HALOT
  rationale: El plural masculino hebreo se conserva como «hermanos», siguiendo la decisión auditada de mantener la fuerza gramatical del original sin ampliar innecesariamente a un inclusivo no explicitado.
- source_word: רֹאשָׁם
  english_pob_choice: their chief
  chosen_spanish: su cabeza
  alternatives_spanish:
  - su jefe
  - su líder
  - su principal
  lexicon: HALOT
  rationale: Rōʾsh significa literalmente «cabeza»; en sentido social puede aludir al líder. Aquí se preserva la metáfora concreta con «cabeza», que también permite mantener la relación de imagen del hebreo.
- source_word: נִכְבָּד
  english_pob_choice: is honored
  chosen_spanish: es honrada
  alternatives_spanish:
  - es estimada
  - es gloriosa
  - es tenida en honor
  lexicon: HALOT
  rationale: El nifal expresa ser honrado o tenido en estima. «Es honrada» conserva ese valor pasivo y respeta el paralelismo con la afirmación proverbial.
- source_word: וִירֵא אֱלֹהִים
  english_pob_choice: one who fears God
  chosen_spanish: el que teme a Dios
  alternatives_spanish:
  - quien teme a Dios
  - el temeroso de Dios
  - el que reverencia a Dios
  lexicon: HALOT
  rationale: La frase hebrea es singular y caracteriza a una persona. «El que teme a Dios» es idiomático en español y preserva el sentido proverbial sin diluir el verbo «temer».
- source_word: בְּעַמּוֹ
  english_pob_choice: among his people
  chosen_spanish: entre su pueblo
  alternatives_spanish:
  - en medio de su pueblo
  - con su pueblo
  lexicon: HALOT
  rationale: La preposición con עַם tiene aquí un sentido locativo-social. «Entre su pueblo» mantiene el paralelismo con «entre los hermanos» y comunica bien la ubicación social.
theological_decisions:
- issue: Divergencia sustancial entre el hebreo y el paralelo griego
  english_pob_reading: 'La lectura principal sigue el hebreo conservado; el griego ofrece una forma muy distinta: «Rico y honrado y pobre, su gloria es el temor del Señor».'
  chosen_spanish_reading: La lectura principal sigue el hebreo conservado; la variante griega se registra en nota.
  alternative_spanish_readings:
  - '«Rico y honrado y pobre: su gloria es el temor del Señor»'
  - «Rico, honrado y pobre; su jactancia es el temor de Yahvé»
  rationale: En Sirácida, el principio de trabajo es traducir desde el hebreo donde se conserva, sin ocultar las diferencias relevantes con el griego. Dado que aquí la discrepancia es marcada, la nota preserva la alternativa griega de manera transparente.
  doctrine_reference: 'PHILOSOPHY.md: traducir desde el hebreo cuando se conserva; documentar honestamente la discrepancia textual'
translation_notes:
  revision_awareness: La revisión más reciente indicó que no eran necesarios cambios; por eso se mantiene la opción de traducir desde el hebreo con la variante griega documentada en nota.
  spanish_consistency_notes:
  - Se conserva «Dios» para אֱלֹהִים, conforme a los parámetros del proyecto.
  - Se evita «SEÑOR» como sustituto del Nombre divino en el texto principal, ya que el hebreo base aquí usa אֱלֹהִים y el griego paralelo presenta κύριος solo en la variante textual.
  - La puntuación con dos miembros coordinados mantiene la brevedad proverbial del verso.
