base_translation:
  language: en
  yaml_path: translation/ot/exodus/025/031.yaml
  text: And you shall make a lampstand of pure gold[a]. The lampstand shall be made of hammered work; its base and its shaft, its cups, its buds[b], and its flowers shall be of one piece with it.
  footnotes:
  - marker: a
    text: Or 'beaten work.' The Hebrew emphasizes that the lampstand was to be formed by hammering, apparently from a single piece rather than assembled from separate parts.
    reason: lexical_alternative
  - marker: b
    text: '''Its buds'' may also be rendered ''its knobs.'' The Hebrew refers to ornamental rounded projections in the lampstand''s floral design.'
    reason: lexical_alternative
