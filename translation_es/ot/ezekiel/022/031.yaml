base_translation:
  language: en
  yaml_path: translation/ot/ezekiel/022/031.yaml
  text: So I poured out my indignation on them[a]; with the fire of my wrath I consumed them. I have put their way on their own heads[c][b], declares the Lord GOD.
  footnotes:
