translation:
  language: es
  text: Entonces Moisés hizo acercarse[a] a los hijos de Aarón, y los vistió con túnicas, y les ciñó ceñidores, y les puso turbantes[b], tal como Yahvé había mandado a Moisés.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «presentó». El verbo hebreo puede significar «traer cerca» o «presentar» en un contexto ritual.
    reason: lexical_alternative
  - marker: b
    text: O «tocados». El término hebreo designa la cobertura de la cabeza de estos sacerdotes, distinta de la del sumo sacerdote.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּקְרֵב
  english_pob_choice: brought ... near
  chosen_spanish: hizo acercarse
  alternatives_spanish:
  - presentó
  - hizo venir adelante
  lexicon: HALOT
  rationale: El verbo causativo conserva el sentido ritual de acercar para una acción cultual. «Hizo acercarse» reproduce bien esa idea sin convertirla en una mera presentación administrativa.
- source_word: בְּנֵי אַהֲרֹן
  english_pob_choice: Aaron’s sons
  chosen_spanish: los hijos de Aarón
  alternatives_spanish:
  - los hijos de Aarón
  lexicon: HALOT
  rationale: En español, la construcción posesiva natural y fiel es «los hijos de Aarón»; mantiene el parentesco masculino explícito del hebreo.
- source_word: וַיַּלְבִּשֵׁם
  english_pob_choice: clothed them
  chosen_spanish: los vistió
  alternatives_spanish:
  - los cubrió con vestidos
  - les puso vestiduras
  lexicon: HALOT
  rationale: El hebreo indica vestir a alguien con una prenda; «los vistió» es la forma más directa y digna en español para la investidura sacerdotal.
- source_word: כֻּתֳּנֹת
  english_pob_choice: tunics
  chosen_spanish: túnicas
  alternatives_spanish:
  - túnicas
  - vestiduras
  - ropas
  lexicon: HALOT
  rationale: «Túnicas» es el equivalente normal para כֻּתֹּנֶת en contexto sacerdotal y conserva la referencia a una prenda básica de tipo camisa larga.
- source_word: וַיַּחְגֹּר אֹתָם אַבְנֵט
  english_pob_choice: girded them with sashes
  chosen_spanish: les ciñó fajas
  alternatives_spanish:
  - les ciñó cinturones
  - les puso fajas
  lexicon: HALOT
  rationale: El verbo חגר pide una acción de ceñir. «Les ciñó fajas» mantiene la imagen corporal y el tono formal; «fajas» evita introducir la idea moderna de un cinturón rígido.
- source_word: אַבְנֵט
  english_pob_choice: sashes
  chosen_spanish: fajas
  alternatives_spanish:
  - sashes
  - bandas
  lexicon: HALOT
  rationale: En español bíblico y litúrgico, «faja» puede transmitir la prenda textil que se ciñe a la cintura. Se evita «cinturón» porque sugiere otra clase de objeto.
- source_word: וַיַּחֲבֹשׁ לָהֶם מִגְבָּעֹות
  english_pob_choice: bound caps on them
  chosen_spanish: les ajustó gorros
  alternatives_spanish:
  - les puso gorros
  - les ciñó gorros
  - les ató gorros
  lexicon: HALOT
  rationale: El hebreo describe fijar el tocado sobre ellos. «Les ajustó gorros» comunica esa acción de manera natural en español, sin perder el matiz de colocar firmemente la cobertura de la cabeza.
- source_word: מִגְבָּעֹות
  english_pob_choice: caps
  chosen_spanish: gorros
  alternatives_spanish:
  - capas
  - tocados
  - sombreros
  lexicon: HALOT
  rationale: «Gorros» es una solución sobria para el tocado sacerdotal de los hijos de Aarón, distinta del turbante del sumo sacerdote, y resulta más inteligible que «capas» o «sombreros».
- source_word: כַּאֲשֶׁר צִוָּה יְהוָה אֶת מֹשֶׁה
  english_pob_choice: just as Yahweh had commanded Moses
  chosen_spanish: tal como Yahvé había mandado a Moisés
  alternatives_spanish:
  - como Yahvé había mandado a Moisés
  - tal como Yahvé ordenó a Moisés
  lexicon: HALOT
  rationale: La fórmula de obediencia se conserva con un pasado perfecto para reflejar la anterioridad del mandato respecto de la ejecución. «Mandado» reproduce bien el peso normativo del hebreo.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: 'Se sigue el criterio del proyecto para el Tetragrámaton: «Yahvé» preserva el nombre divino en lugar de sustituirlo por un título.'
theological_decisions:
- issue: Uso del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: El texto hebreo nombra explícitamente a יְהוָה; por coherencia con la política del proyecto, se mantiene el nombre propio divino en español. «Yahvé» es la forma adoptada para reflejar el Tetragrámaton sin ocultarlo.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
translation_notes:
  revision_awareness: Se siguió el último pase de revisión inglés que prefirió «girded them with sashes» por corresponder más de cerca a וַיַּחְגֹּר; en español se reflejó con «les ciñó fajas». También se mantuvo la decisión doctrinal de rendir יְהוָה como «Yahvé».
  spanish_consistency_notes:
  - Se conserva el paralelismo verbal del hebreo con cuatro acciones coordinadas por «y».
  - «Moisés» y «Aarón» siguen las formas españolas establecidas para los nombres propios.
  - Se usa «Yahvé» de forma consistente con el proyecto, no una sustitución reverencial.
  - «Túnicas», «fajas» y «gorros» mantienen distinción entre las tres prendas sacerdotales mencionadas.
