    rationale: 'El English POB conserva una nota para אֹצְרוֹתַיִךְ: «your wealth» / «your storehouses». El español debe preservar esa alternativa significativa.'
  - severity: high
    issue: La nota «O «sus príncipes»» está anclada en la frase equivocada
