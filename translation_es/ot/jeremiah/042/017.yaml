revisions:
- from: Entonces, todos los hombres que han puesto su rostro para ir a Egipto a sojornar allí morirán[a] a espada, de hambre y de peste[b]. Ninguno de ellos tendrá sobreviviente ni escapado[c], a causa del mal que yo estoy trayendo sobre ellos.
  to: Entonces, todos los hombres que han resuelto ir a Egipto para residir allí como forasteros morirán a espada, de hambre y de peste. Ninguno de ellos tendrá sobreviviente ni fugitivo[a] ante el desastre que yo estoy trayendo sobre ellos.
  rationale: Se corrige el borrador para ajustarlo mejor al hebreo y a la auditoría inglesa, a la vez que se mejora la naturalidad del español. «Han resuelto ir» comunica el modismo de firme determinación sin calco duro; «residir allí como forasteros» conserva el matiz de גּוּר mejor que «sojornar» para un lector amplio; «fugitivo» sustituye el poco natural «escapado»; y «ante el desastre» recupera el valor contextual de רָעָה como calamidad traída por Dios, sin suavizar la agencia divina.
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T22:42:07Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador conserva bien la estructura general del hebreo: consecuencia introductoria, referencia específica a «todos los hombres», resolución firme de ir a Egipto, la triada de juicio y la agencia divina directa. Sin embargo, varias decisiones no preservan con suficiente fidelidad el sentido documentado: «han puesto su rostro» suena poco idiomático en español y no refleja bien el plural del modismo; «escapado» es una forma poco natural para פָלִיט; y «a causa del mal» desvía מִפְּנֵי הָרָעָה del sentido contextual de calamidad/desastre y además cambia el matiz de ‘escapar de’ a un giro causal menos preciso.'
  spanish_quality_summary: El texto es comprensible, pero contiene formulaciones poco naturales o poco dignas para el registro bíblico en español neutral. «Sojornar» es aceptable pero marcado; «han puesto su rostro» y «escapado» afectan la fluidez; la puntuación y el ritmo mejoran si se formula «han puesto sus rostros para ir a Egipto a residir allí como forasteros» o similar. La mejor reparación es mantener el tono formal sin calcos duros.
  glossary_alignment: 'No hay conflictos con términos troncales del glosario como Yahvé/Mesías. Sí hay desalineación con la justificación lexical inglesa en dos puntos clave: פָלִיט debe representarse con un término natural como «fugitivo» o «el que escape», y רָעָה en este contexto debe ser «desastre» o «calamidad», no «mal».'
  issues:
  - severity: medium
    issue: «que han puesto su rostro»
    rationale: El hebreo שָׂמוּ אֶת־פְּנֵיהֶם es plural y un modismo de resolución firme. En español, «poner su rostro» resulta poco natural; «han puesto sus rostros» sería más literal pero sigue sonando rígido. Conviene una formulación idiomática que preserve el tono, como «han puesto su rostro resueltamente» o mejor «han decidido firmemente»; si se preserva la imagen, debe sonar natural.
  - severity: medium
    issue: «a sojornar allí»
    rationale: Refleja el matiz de גּוּר, pero «sojornar» es poco común en español general. Puede mantenerse si el proyecto tolera un registro más formal, pero una opción más clara es «a residir allí como forasteros», que explicita el matiz documentado.
  - severity: high
    issue: «sobreviviente ni escapado»
    rationale: «Escapado» no es una elección natural en español bíblico o estándar para פָלִיט. El par hebreo pide algo como «superviviente ni fugitivo» o «sobreviviente ni quien escape». La forma actual suena torpe y debilita la legibilidad.
  - severity: high
    issue: «a causa del mal» para מִפְּנֵי הָרָעָה
    rationale: En este contexto profético רָעָה significa calamidad/desastre, no mal moral. Además, מִפְּנֵי aquí encaja mejor con «delante de / de / de entre / ante» en la idea de no escapar de la calamidad, no simplemente «a causa de». La traducción actual altera el sentido contextual y la nota teológica auditada.
  - severity: low
    issue: Distribución de notas al pie
    rationale: La nota [a] repite exactamente la expresión ya usada en el texto, por lo que no aporta alternativa real. Además, la nota [b] sobre la triada es prescindible en español si no marca una ambigüedad; conviene conservar solo notas útiles y alineadas con la auditoría.
  revised_spanish_text: Entonces, todos los hombres que han resuelto ir a Egipto para residir allí como forasteros morirán a espada, de hambre y de peste. Ninguno de ellos tendrá sobreviviente ni fugitivo[a] ante el desastre que yo estoy trayendo sobre ellos.
  revised_footnotes:
