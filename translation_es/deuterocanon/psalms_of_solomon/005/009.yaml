translation:
  language: es
  text: Y si no nos haces volver[a], no nos apartaremos[b], sino que vendremos a ti.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «nos restauras» o «nos vuelves».'
    reason: lexical_alternative
  - marker: b
    text: 'O: «no nos mantendremos apartados» o «no nos quedaremos lejos».'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐὰν μὴ
  english_pob_choice: if ... not
  chosen_spanish: si no
  alternatives_spanish:
  - a menos que
  lexicon: BDAG
  rationale: La construcción condicional negativa se expresa de manera directa y natural en español con «si no», preservando el tono de súplica sin compactarlo indebidamente en una sola locución concesiva.
- source_word: ἐπιστρέψῃς
  english_pob_choice: turn us back
  chosen_spanish: nos vuelves
  alternatives_spanish:
  - nos haces volver
  - nos restituyes
  - nos restauras
  lexicon: BDAG / uso salmódico
  rationale: El griego con objeto personal y sujeto divino mantiene el movimiento de retorno. En español, «volver» reproduce con sobriedad la idea de hacer regresar, sin fijar de entrada una lectura más doctrinal como «convertir» o una más interpretativa como «restaurar» dentro del texto principal.
- source_word: οὐκ ἀφεξόμεθα
  english_pob_choice: we will not stay away
  chosen_spanish: no nos apartaremos
  alternatives_spanish:
  - no nos quedaremos lejos
  - no nos mantendremos apartados
  - no nos retiraremos
  lexicon: LSJ
  rationale: El verbo indica no alejarse ni mantenerse fuera. «Apartarnos» comunica esa distancia relacional en un registro más bíblico y poético que «quedarnos lejos», y evita una formulación demasiado coloquial.
- source_word: ἀλλʼ
  english_pob_choice: rather
  chosen_spanish: sino que
  alternatives_spanish:
  - pero
  - más bien
  lexicon: BDAG
  rationale: La partícula adversativa marca contraste y avance del pensamiento. «Sino que» mantiene el paralelo con la primera cláusula y suena natural en español cuando introduce una acción afirmativa en oposición a la negativa previa.
- source_word: ἐπὶ σὲ ἥξομεν
  english_pob_choice: we will come to you
  chosen_spanish: vendremos a ti
  alternatives_spanish:
  - iremos a ti
  - nos acercaremos a ti
  - llegaremos a ti
  lexicon: BDAG
  rationale: ἥκω expresa venir/llegar. «Vendremos a ti» conserva la dirección personal del verbo y la cercanía relacional del ruego; «llegaremos a ti» sería posible, pero pierde algo del tono de visita/aproximación implícito en el contexto.
theological_decisions:
- issue: 'ἐπιστρέφω con objeto personal dirigido a Dios: ¿‘restaurar’, ‘volver’, o ‘convertir’ en sentido doctrinal?'
  english_pob_reading: turn us back
  chosen_spanish_reading: nos vuelves
  alternative_spanish_readings:
  - nos restauras
  - nos haces volver
  - nos conviertes
  rationale: El audit trail inglés evitó ‘convert’ por su carga doctrinal y también discutió ‘restore’ como lectura idiomática salmódica. En español, el texto principal conserva la petición abierta con «nos vuelves», suficiente para expresar el retorno solicitado sin cerrar la tensión entre regreso, restauración y conversión. Se mantiene así la ambigüedad controlada del original.
  doctrine_reference: Preservar la tensión lexical sin resolverla en una formulación dogmática fija.
translation_notes:
  revision_awareness: El inglés auditado pasó por un ciclo relevante entre «restore us» y «turn us back». Dado que el último pass volvió a «turn us back», el español principal evita fijar «restaurar» en el texto y opta por una forma transparente de retorno («nos vuelves»), dejando en nota las alternativas idiomáticas posibles. También se reflejó la preferencia final por un contraste simple con «but»; en español se optó por «sino que» para preservar el paralelismo sin perder naturalidad.
  spanish_consistency_notes:
  - Se usa «ti» después de preposición, conforme al español estándar.
  - Se evitó «SEÑOR» o sustituciones de nombre divino porque el verso no contiene el Tetragrámaton ni κύριος.
  - «No nos apartaremos» mantiene el valor relacional de ἀφεξόμεθα sin introducir una lectura ascética o moral ajena al contexto.
  - El registro es bíblico y poético, pero no arcaizante.
