base_translation:
  language: en
  yaml_path: translation/ot/2_chronicles/019/006.yaml
  text: And he said to the judges[a], “See what you are doing, for you are not judging for man, but for Yahweh[b], and he is with you in the matter of judgment.”
  footnotes:
  - marker: a
    text: Or 'for humankind.' Hebrew 'for man' uses the singular אָדָם as a generic contrast to the LORD.
    reason: lexical_alternative
  - marker: b
    text: Or 'in the matter of justice.' The Hebrew phrase can refer either to the act of judging or to judicial matters generally.
    reason: lexical_alternative
