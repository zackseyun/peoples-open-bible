translation:
  language: es
  text: Porque tú odias la disciplina[a][b], y echas mis palabras detrás de ti.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Porque» refleja el valor explicativo/adversativo posible de la conjunción hebrea; también podría leerse «Pero tú odias la disciplina».
    reason: lexical_alternative
  - marker: b
    text: «Disciplina» también puede traducirse como «instrucción», «corrección» o «reprensión», según el alcance de מוּסָר.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְאַתָּה
  english_pob_choice: For you
  chosen_spanish: Porque tú
  alternatives_spanish:
  - Pero tú
  - Y tú
  lexicon: HALOT
  rationale: El hebreo introduce un contraste/continuación enfática con el pronombre explícito. En español, «Porque tú» mantiene el enlace explicativo-adversativo que la POB inglesa resolvió con «For you», sin perder el énfasis directo del sujeto.
- source_word: שָׂנֵאתָ
  english_pob_choice: hate
  chosen_spanish: aborreces
  alternatives_spanish:
  - odias
  - detestas
  - aborreciste
  lexicon: HALOT
  rationale: El perfecto hebreo funciona aquí como acusación caracterizadora. «Aborreces» comunica el estado moral continuo con un registro digno y natural en español; evita un pasado simple que debilitaría la fuerza proverbial del reproche.
- source_word: מוּסָר
  english_pob_choice: discipline
  chosen_spanish: disciplina
  alternatives_spanish:
  - instrucción
  - corrección
  - reprensión
  lexicon: HALOT
  rationale: El término hebreo puede abarcar instrucción correctiva, corrección y reprensión. «Disciplina» conserva bien el sentido formativo y correctivo que la POB inglesa documentó, sin estrecharlo a una sola faceta.
- source_word: וַתַּשְׁלֵךְ
  english_pob_choice: you cast
  chosen_spanish: echas
  alternatives_spanish:
  - arrojas
  - lanzas
  - echaste
  lexicon: HALOT
  rationale: El verbo expresa la imagen concreta de arrojar o lanzar algo fuera de consideración. «Echas» reproduce esa acción con naturalidad en español; mantiene el tono acusatorio y el presente gnómico/poético que la POB inglesa preserva con «cast».
- source_word: דְּבָרַי
  english_pob_choice: my words
  chosen_spanish: mis palabras
  alternatives_spanish:
  - mis dichos
  - mis mandatos
  - mis palabras de instrucción
  lexicon: HALOT
  rationale: 'La forma posesiva plural es directa: «mis palabras». No se amplía a «mandatos» ni a «instrucción» para no introducir una interpretación que el hebreo no exige en este punto.'
- source_word: אַחֲרֶיךָ
  english_pob_choice: behind you
  chosen_spanish: detrás de ti
  alternatives_spanish:
  - a tus espaldas
  - tras de ti
  lexicon: HALOT
  rationale: La imagen espacial debe conservarse de modo transparente. «Detrás de ti» reproduce el hebreo literalmente y evita el matiz de secreto o doblez que en español puede sugerir «a tus espaldas».
translation_notes:
  revision_awareness: La versión inglesa auditada pasó de «throw my words behind you» a «cast my words behind you» para elevar el registro sin cambiar el sentido. La redacción española adopta desde el inicio un verbo equivalente de registro digno («echas») que conserva la imagen concreta del hebreo.
  spanish_consistency_notes:
  - Se mantiene «tú/ti» en segunda persona singular para reflejar el hebreo.
  - Se preserva la metáfora espacial «detrás de ti» sin domesticarla.
  - No se introduce «Señor» ni «Yahvé» porque el versículo no contiene el nombre divino explícito.
  - La combinación verbal en presente se usa para el tono acusatorio poético, en línea con la lectura caracterizadora del perfecto hebreo.
