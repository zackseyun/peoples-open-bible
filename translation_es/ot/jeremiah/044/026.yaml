review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura del hebreo: conector inferencial, llamado profético a oír, destinatario corporativo en Egipto, juramento por el gran nombre, negación enfática de uso futuro del nombre divino en fórmulas de juramento, y alcance geográfico total. Sin embargo, hay dos problemas de fidelidad formal: (1) el texto usa segunda persona plural ''habitáis'' después de ''todo Judá'', creando discordancia; conviene mantener el relativo participial con tercera plural o reformular corporativamente. (2) La fórmula final חַי אֲדֹנָי יְהוִה no se expresa mejor con signos de exclamación; es fórmula de juramento, no exclamación emotiva. Además, las notas están mal ancladas: la nota [a] sobre la alternativa de ''mi nombre...'' está colocada en ''Yahvé'' en vez de junto a la frase pertinente, y [b] duplica innecesariamente la misma cuestión.'
  spanish_quality_summary: 'El español es en general claro y digno, pero mezcla registro peninsular (''oíd'', ''habitáis'') con un objetivo de español neutral latinoamericano. ''Oigan'' suena más neutro y eclesialmente legible. ''Todo Judá que habitáis'' es gramaticalmente torpe. ''Será invocado mi nombre'' es entendible, pero en español resulta más natural ''mi nombre ya no será invocado por...'' manteniendo el énfasis. La fórmula de juramento final suena mejor como cita sobria sin exclamaciones: ''Vive el Señor Yahvé''.'
  glossary_alignment: Se mantiene bien 'Yahvé' para יהוה y 'palabra' para דְבַר. La decisión 'Señor Yahvé' para אֲדֹנָי יְהוִה es defendible dentro del estándar del proyecto, ya que no oculta el nombre divino. No obstante, la anotación de alternativas debe corresponder a שְׁמִי נִקְרָא בְּפִי, no al primer 'Yahvé'.
  issues:
  - severity: medium
    issue: Discordancia en 'todo Judá que habitáis'
    rationale: El hebreo tiene un colectivo 'todo Judá' seguido de participio plural 'los que habitan'; en español, combinar singular colectivo con segunda persona plural produce una construcción poco natural y gramaticalmente inestable.
  - severity: medium
    issue: Registro no neutral en 'oíd'/'habitáis'
    rationale: El encargo pide español neutral latinoamericano. Las formas en -d y -áis son marcadamente peninsulares.
  - severity: low
    issue: Signos de exclamación en la fórmula de juramento
    rationale: חַי אֲדֹנָי יְהוִה introduce una fórmula solemne de juramento, no una exclamación emocional; la puntuación sobria es más fiel al tono.
  - severity: high
    issue: Notas mal ancladas y duplicadas
    rationale: La nota [a] trata la cláusula 'mi nombre ya no será...' pero está colocada en 'Yahvé'. La [b] repite sustancialmente el mismo punto. Los marcadores deben aparecer exactamente donde corresponde la nota.
  revised_spanish_text: 'Por tanto, oigan la palabra de Yahvé, todo Judá, los que habitan en la tierra de Egipto: He aquí, he jurado por mi gran nombre, dice Yahvé, que mi nombre ya no será invocado[a] por la boca de ningún hombre de Judá en toda la tierra de Egipto, diciendo: «Vive el Señor Yahvé».

