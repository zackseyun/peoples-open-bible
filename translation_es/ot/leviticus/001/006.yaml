  verdict: revise
  source_alignment_summary: 'El borrador sigue bien el hebreo: וְהִפְשִׁיט = quitar la piel/desollar; הָעֹלָה = la ofrenda quemada; וְנִתַּח ... לִנְתָחֶיהָ = cortar/dividir el animal en sus secciones rituales. Sin embargo, la expresión española ''en sus piezas'' suena poco natural y algo calcada; el sentido resultativo se expresa mejor como ''en sus partes''.'
  spanish_quality_summary: '''Entonces desollará la ofrenda quemada'' es claro y digno. El principal problema de legibilidad es ''la cortará en sus piezas'', que en español eclesial general suena forzado. También la nota a no aporta una alternativa real, pues repite la misma formulación en lugar de reflejar el inglés ''flay''.'
  glossary_alignment: No hay conflicto con la terminología troncal del proyecto. 'Ofrenda quemada' es una decisión documentada y defendible frente a 'holocausto'. 'Desollará' refleja bien la fuerza de פשט. Conviene ajustar la nota léxica para preservar la alternativa inglesa 'flay' como 'despellejará' o 'le quitará la piel'.
  issues:
  - severity: medium
    issue: La frase 'en sus piezas' es poco idiomática en español.
    rationale: Aunque formalmente cercana al hebreo y al inglés, en español natural de amplio registro bíblico se entiende mejor 'en sus partes' o 'en sus secciones'. Preserva el sentido ritual sin sonar calcado.
  - severity: medium
    issue: La nota [a] repite el mismo texto en vez de ofrecer una alternativa léxica.
    rationale: La auditoría inglesa conserva una alternativa real ('flay'). En español, la nota debe reflejar una opción distinta como 'despellejará' o 'le quitará la piel'.
  - severity: low
    issue: La redacción de la nota [b] puede ajustarse para acompañar el cambio principal.
    rationale: Si el texto principal pasa a 'en sus partes', la nota debe citar esa formulación exacta para mantener coherencia.
