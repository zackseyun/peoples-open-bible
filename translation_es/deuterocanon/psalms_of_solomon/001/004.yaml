translation:
  language: es
  text: Su riqueza se extendió por toda la tierra[a], y su gloria llegó hasta el fin de la tierra[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «por todo el país» o «por todo el territorio». γῆ puede significar «tierra» o «país/territorio».
    reason: lexical_alternative
  - marker: b
    text: O «su renombre llegó hasta el extremo de la tierra». δόξα puede referirse a gloria, honor o reputación; y la expresión también puede traducirse «hasta el extremo de la tierra».
    reason: lexical_alternative
lexical_decisions:
- source_word: ὁ πλοῦτος
  english_pob_choice: wealth
  chosen_spanish: riqueza
  alternatives_spanish:
  - riquezas
  - bienes
  lexicon: LSJ
  rationale: πλοῦτος expresa riqueza en sentido colectivo y abstracto. En español, «riqueza» conserva ese valor general y suena natural en un registro bíblico digno.
- source_word: διεδόθη
  english_pob_choice: was spread
  chosen_spanish: se extendió
  alternatives_spanish:
  - fue esparcida
  - se difundió
  lexicon: LSJ
  rationale: El pasivo de διαδίδωμι indica propagación amplia. «Se extendió» comunica bien esa expansión sin introducir un matiz comercial extraño.
- source_word: εἰς πᾶσαν τὴν γῆν
  english_pob_choice: throughout all the land
  chosen_spanish: por toda la tierra
  alternatives_spanish:
  - por toda la tierra habitable
  - por toda la región
  lexicon: LSJ
  rationale: γῆ puede significar «tierra» o «tierra/país». Aquí se conserva el paralelismo con la segunda cola, donde el alcance llega hasta el extremo de la tierra, y en español «tierra» mantiene esa amplitud.
- source_word: ἡ δόξα
  english_pob_choice: glory
  chosen_spanish: gloria
  alternatives_spanish:
  - renombre
  - esplendor
  lexicon: LSJ
  rationale: «Gloria» preserva el registro elevado y puede abarcar tanto honor/reputación como magnificencia visible, tal como permite δόξα.
- source_word: ἕως ἐσχάτου τῆς γῆς
  english_pob_choice: to the end of the earth
  chosen_spanish: hasta el fin de la tierra
  alternatives_spanish:
  - hasta el extremo de la tierra
  - hasta los confines de la tierra
  lexicon: LSJ
  rationale: La expresión es idiomática y poética; «hasta el fin de la tierra» refleja bien el alcance máximo sin añadir explicación interpretativa.
theological_decisions:
- issue: Repetición de γῆ en dos miembros paralelos
  english_pob_reading: The first colon renders γῆ as 'land,' the second as 'earth,' to preserve the poetic escalation and avoid flattening both uses into identical English.
  chosen_spanish_reading: Se traduce ambas ocurrencias con «tierra», porque en español esa repetición conserva naturalmente el paralelismo y la amplitud del movimiento poético.
  alternative_spanish_readings:
  - «tierra» / «mundo»
  - «región» / «tierra»
  rationale: El griego usa la misma palabra en ambos miembros, pero el español puede mantener el efecto retórico con la misma voz. Aquí no hay necesidad de diferenciar artificialmente entre «land» y «earth»; la intensificación queda clara por la segunda cola («hasta el fin de la tierra»).
  doctrine_reference: Poética semítica/grecojudía; paralelismo retórico
translation_notes:
  revision_awareness: 'El inglés auditado atravesó una revisión sobre la cláusula final: se eliminó y luego se restauró el verbo implícito «reached» para hacer completa la frase. El griego, sin embargo, presenta un paralelismo con elipsis verbal en la segunda cola. En español, el texto se mantiene fluido sin añadir verbo en la segunda parte, respetando esa elipsis poética.'
  spanish_consistency_notes:
  - Se prefirió «tierra» para γῆ por coherencia con el paralelismo y el registro bíblico.
  - Se usó «gloria» para δόξα, dejando abierta la gama entre honor, reputación y esplendor.
  - La segunda cola conserva la estructura breve del griego y no añade un verbo explícito.
