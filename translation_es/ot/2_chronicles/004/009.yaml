translation:
  language: es
  text: Hizo el atrio de los sacerdotes[a], y el gran atrio, y puertas para el atrio; y recubrió sus puertas[b] con bronce[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «el patio de los sacerdotes». El hebreo חָצֵר puede referirse a un patio o atrio; se mantiene «atrio» por ser el término más asentado en español para el espacio del templo.
    reason: lexical_alternative
  - marker: b
    text: Hebreo «sus puertas»; en español también podría suavizarse a «sus puertas» con referencia colectiva al atrio, o interpretarse como «las puertas de este». Se conserva la forma posesiva para reflejar más de cerca el sufijo plural hebreo.
    reason: lexical_alternative
  - marker: c
    text: O «cobre». נְחֹשֶׁת puede abarcar cobre o bronce; se prefiere «bronce» en este contexto de ornamentos y utensilios del templo.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּעַשׂ
  english_pob_choice: And he made
  chosen_spanish: Hizo
  alternatives_spanish:
  - Y hizo
  - Construyó
  lexicon: HALOT
  rationale: עשה es un verbo amplio. En este contexto de construcción del templo, «hizo» es natural en español, breve y fiel, sin añadir matiz técnico que el hebreo no exige.
- source_word: חֲצַר הַכֹּהֲנִים
  english_pob_choice: the court of the priests
  chosen_spanish: el atrio de los sacerdotes
  alternatives_spanish:
  - el patio de los sacerdotes
  - el atrio sacerdotal
  lexicon: HALOT
  rationale: חָצֵר designa un recinto/corte en contexto cultual. «Atrio» es el término español más transparente y bíblico para este espacio; «de los sacerdotes» conserva la relación constructa sin forzar un adjetivo no explícito.
- source_word: וְהָעֲזָרָה הַגְּדוֹלָה
  english_pob_choice: and the great court
  chosen_spanish: y el gran atrio
  alternatives_spanish:
  - y el gran patio
  - y el gran recinto
  lexicon: HALOT
  rationale: עֲזָרָה aquí es un ámbito del templo. «Atrio» armoniza con la arquitectura sagrada en español y «gran» refleja directamente גְּדוֹלָה sin debilitar el calificativo.
- source_word: וּדְלָתוֹת לָעֲזָרָה
  english_pob_choice: and doors for the court
  chosen_spanish: y puertas para el atrio
  alternatives_spanish:
  - y puertas para el atrio
  - y portones para el atrio
  lexicon: HALOT
  rationale: דֶּלֶת normalmente significa «puerta»; aunque puede abarcar una entrada, no hace falta subirlo a «portones» sin necesidad. En español, «puertas» mantiene la literalidad y la claridad.
- source_word: וְדַלְתוֹתֵיהֶם
  english_pob_choice: their doors
  chosen_spanish: sus puertas
  alternatives_spanish:
  - las puertas de ellos
  - sus mismas puertas
  lexicon: HALOT
  rationale: El sufijo hebreo es plural de tercera persona, pero en español «sus puertas» suena más natural que repetir «de ellos». Conserva la referencia posesiva sin perder legibilidad.
- source_word: צִפָּה
  english_pob_choice: he overlaid
  chosen_spanish: recubrió
  alternatives_spanish:
  - revistió
  - forró
  lexicon: HALOT
  rationale: צפה en este tipo de obra indica cubrir con metal. «Recubrió» expresa bien la acción de revestir sin sonar demasiado técnico; evita la posible ambigüedad de «cubrió».
- source_word: נְחֹשֶׁת
  english_pob_choice: bronze
  chosen_spanish: bronce
  alternatives_spanish:
  - cobre
  lexicon: HALOT
  rationale: En el contexto del mobiliario y la obra del templo, «bronce» es la equivalencia estable y adecuada en español, aunque el hebreo pueda abarcar una gama cobre/bronce.
translation_notes:
  revision_awareness: El texto base y la auditoría inglesa muestran alta concordancia y no requieren revisión sustantiva. La única decisión de estilo fue mantener una formulación española directa y natural, sin perder las relaciones constructas ni el valor material de los términos técnicos.
  spanish_consistency_notes:
  - Se conserva «atrio» para חָצֵר/עֲזָרָה según el contexto cultual, evitando alternar con «patio» salvo en nota.
  - Se traduce el posesivo plural hebreo con «sus» para fluidez, sin implicar cambio de referente.
  - Se mantiene la equivalencia material «bronce» como en la auditoría inglesa, con nota de alternativa «cobre».
