review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura y el sentido general del hebreo: la comparación de una fuente de agua dañada con un justo que cede frente al malvado. ''Manantial'' por מַעְיָן, ''enturbiado'' por נִרְפָּשׂ, ''fuente'' por מָקוֹר y ''cede ante'' por מָט לִפְנֵי están bien alineados. Sin embargo, ''corrompida'' para מָשְׁחָת es menos natural en español cuando se habla de agua; la evidencia y la nota inglesa favorecen una idea de contaminación/daño del agua más que corrupción moral. Además, falta conservar la alternativa léxica documentada en la nota inglesa sobre ''pisoteado/barroso'' y ''tambalea''.'
  spanish_quality_summary: El español es claro, digno y ampliamente legible. El paralelismo 'manantial / fuente' suena natural. La única mejora estilística importante es sustituir 'fuente corrompida' por una formulación más idiomática para agua, como 'fuente contaminada', que transmite mejor la imagen sin sonar forzada. También conviene añadir una nota para preservar la alternativa exegética auditada.
  glossary_alignment: No hay términos del glosario mayor en juego salvo la preferencia por conservar el masculino representativo; 'el justo' lo hace bien. 'El malvado' es aceptable para רָשָׁע, aunque 'el impío' sería posible; no hace falta cambiarlo. La decisión principal es ajustar מָשְׁחָת a un equivalente de contaminación más natural en español y preservar la alternativa inglesa en nota.
  issues:
  - severity: medium
    issue: '''corrompida'' suena poco natural para una fuente de agua'
    rationale: Aunque מָשְׁחָת puede denotar corrupción o ruina, en esta imagen acuática el español idiomático comunica mejor el sentido con 'contaminada', 'dañada' o similar. 'Fuente corrompida' puede leerse como calco semántico y perder claridad.
  - severity: medium
    issue: Falta la nota con la alternativa léxica preservada por el English POB
    rationale: 'El rastro de auditoría inglés conserva una variante significativa: ''spring trampled muddy ... who totters before the wicked''. La revisión española debe reflejar esa alternativa en una nota, especialmente porque ''enturbiado'' deja fuera el matiz posible de ''pisoteado/revuelto''.'
  revised_spanish_text: Como un manantial enturbiado y una fuente contaminada es el justo que cede ante el malvado.[a]
  revised_footnotes:
  - marker: a
    text: 'O: "Como un manantial pisoteado y revuelto, y una fuente corrompida, es el justo que tambalea ante el malvado".'
    reason: lexical_alternative
  revision_rationale: Se cambia 'corrompida' por 'contaminada' para expresar de forma más natural en español la imagen de una fuente dañada/poluta. Se añade una nota para conservar la alternativa léxica y exegética documentada en el English POB respecto de נִרְפָּשׂ y מָט, así como la variante 'corrompida' para מָשְׁחָת dentro de esa alternativa. No se requieren cambios mayores de estructura ni de sentido.
