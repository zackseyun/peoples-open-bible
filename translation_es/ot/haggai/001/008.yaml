  glossary_alignment: 'Buena alineación con la terminología del proyecto: יְהוָה → «Yahvé»; הַבָּיִת → «la casa» con nota aclaratoria sobre «el templo»; וְאֶכָּבֵד → «sea glorificado» con alternativa «seré honrado». La única desalineación relevante es que הָהָר no refleja la decisión auditada de un sentido más amplio/colectivo.'
