translation:
  language: es
  text: Y los hijos de Israel hicieron conforme a la palabra de Moisés[a], y pidieron a los egipcios artículos de plata, artículos de oro y ropa.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'solicitaron'. Las versiones antiguas a menudo traducen 'tomaron prestado', pero el verbo hebreo aquí normalmente significa 'pedir' o 'solicitar'.
    reason: lexical_alternative
lexical_decisions:
- source_word: וּבְנֵי יִשְׂרָאֵל
  english_pob_choice: the sons of Israel
  chosen_spanish: los hijos de Israel
  alternatives_spanish:
  - los israelitas
  - los niños de Israel
  lexicon: HALOT
  rationale: La expresión hebrea es literalmente filial/corporativa. 'Hijos de Israel' preserva la forma del original mejor que 'israelitas', que es más natural pero menos transparente. 'Niños' no corresponde al sentido.
- source_word: עָשׂוּ
  english_pob_choice: did
  chosen_spanish: hicieron
  alternatives_spanish:
  - actuaron
  - cumplieron
  lexicon: HALOT
  rationale: El verbo básico עשה aquí expresa la acción simple de obedecer/realizar. 'Hicieron' reproduce ese valor sin añadir matices que el hebreo no exige.
- source_word: כִּדְבַר מֹשֶׁה
  english_pob_choice: according to the word of Moses
  chosen_spanish: conforme a la palabra de Moisés
  alternatives_spanish:
  - según la palabra de Moisés
  - como Moisés dijo
  - conforme al mandato de Moisés
  lexicon: HALOT
  rationale: דבר puede significar 'palabra', 'asunto' o 'mandato'. 'Conforme a la palabra de Moisés' mantiene la sustantivación del hebreo y suena natural en español. 'Mandato' sería posible, pero interpreta más de lo que el sintagma exige.
- source_word: וַיִּשְׁאֲלוּ
  english_pob_choice: asked
  chosen_spanish: pidieron
  alternatives_spanish:
  - solicitaron
  - preguntaron
  - prestaron/“tomaron prestado”
  lexicon: HALOT
  rationale: שאל significa fundamentalmente 'pedir' o 'solicitar'. 'Pidieron' es el equivalente más directo en español y evita la vieja traducción 'tomaron prestado', que no refleja bien el verbo en sí. También evita cargar el texto con una interpretación moral no explicitada en esta cláusula.
- source_word: מִמִּצְרַיִם
  english_pob_choice: the Egyptians
  chosen_spanish: a los egipcios
  alternatives_spanish:
  - de los egipcios
  - desde Egipto
  lexicon: HALOT
  rationale: Aunque la forma hebrea es 'de/desde Egipto', el contexto señala a las personas egipcias como quienes entregan los objetos. 'A los egipcios' hace explícito el objeto humano implícito y resulta natural en español.
- source_word: כְּלֵי כֶסֶף
  english_pob_choice: articles of silver
  chosen_spanish: artículos de plata
  alternatives_spanish:
  - objetos de plata
  - utensilios de plata
  - vasijas de plata
  lexicon: HALOT
  rationale: כְּלִי es un término amplio para objetos, utensilios o artículos. 'Artículos de plata' conserva esa amplitud sin restringir innecesariamente el campo semántico a vasos o utensilios específicos.
- source_word: וּכְלֵי זָהָב
  english_pob_choice: articles of gold
  chosen_spanish: artículos de oro
  alternatives_spanish:
  - objetos de oro
  - utensilios de oro
  - vasijas de oro
  lexicon: HALOT
  rationale: Se mantiene la misma solución que para כְּלֵי כֶסֶף, por consistencia y por la amplitud del sustantivo hebreo.
- source_word: וּשְׂמָלֹת
  english_pob_choice: clothing
  chosen_spanish: ropa
  alternatives_spanish:
  - vestidos
  - vestiduras
  - prendas de vestir
  lexicon: HALOT
  rationale: שִׂמְלָה abarca ropa o prendas de vestir. 'Ropa' es claro y moderno en español; 'vestiduras' puede sonar más litúrgico o arcaizante y 'vestidos' estrecha demasiado el referente.
theological_decisions:
- issue: Sentido de וַיִּשְׁאֲלוּ en el contexto del éxodo
  english_pob_reading: asked
  chosen_spanish_reading: pidieron
  alternative_spanish_readings:
  - solicitaron
  - prestaron
  - tomaron prestado
  rationale: La decisión sigue el sentido básico del verbo שאל ('pedir/solicitar') y evita importar al texto una lectura interpretativa como 'tomaron prestado'. La narración posterior puede describir el resultado como despojo, pero aquí la cláusula se mantiene en su valor léxico inmediato.
  doctrine_reference: 'Principios de traducción POB: transparencia léxica y no retroproyección interpretativa'
translation_notes:
  revision_awareness: El texto sigue de cerca el cierre estable del registro inglés auditado, sin cambios de sustancia respecto a la decisión léxica principal para שאל. Se conserva la transparencia del original hebreo y la equivalencia óptima del POB en español.
  spanish_consistency_notes:
  - Se usa 'hijos de Israel' para reflejar la fórmula hebrea corporativa, en línea con la transparencia del POB.
  - Se mantiene 'Yahvé' como norma general del proyecto, pero este versículo no contiene el nombre divino.
  - '''Artículos de plata/oro'' conserva la amplitud de כְּלִי sin especificar indebidamente el tipo de objeto.'
  - '''Ropa'' traduce el campo amplio de שְׂמָלֹת sin volverlo excesivamente solemne.'
