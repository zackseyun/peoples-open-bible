revisions:
- from: 'Y tú, hijo de hombre, profetiza contra Gog, y di: Así dice el Señor Yahvé: He aquí, estoy contra ti, Gog, príncipe de Rosh[a], Mesec y Tubal.'
  to: 'Y tú, hijo de hombre, profetiza contra Gog y di: Así dice el Señor Yahvé: He aquí, estoy contra ti, Gog, príncipe de Rosh[a], Mésec y Tubal.'
  rationale: 'Se mantiene la lectura principal del expediente auditado («Rosh») y la política del proyecto para «Yahvé». Solo se corrigen detalles de estilo y ortografía española: se elimina una coma innecesaria, se normaliza «Mésec» y se afina la nota para reflejar mejor la alternativa interpretativa sin introducir una glosa española poco natural.'
