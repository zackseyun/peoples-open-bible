revisions:
- from: En el año dieciocho de Jeroboam[a], Abías comenzó a reinar sobre Judá.
  to: En el año dieciocho del rey Jeroboam[a], Abías comenzó a reinar sobre Judá.
  rationale: Se añade 'del rey' para reflejar explícitamente לַמֶּלֶךְ en la fórmula regnal. Se conserva 'comenzó a reinar' como una opción española natural que mantiene el matiz de inicio del reinado, aunque no sea una réplica literal de 'became king'. La nota textual ya era adecuada y se mantiene sin cambios.
