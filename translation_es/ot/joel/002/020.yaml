translation:
  language: es
  text: Y alejaré de ustedes al del norte[a], y lo arrojaré a una tierra árida y desolada; su frente hacia el mar oriental y su parte posterior hacia el mar occidental[b]. Subirá su hedor, y subirá su fetidez, porque ha hecho grandes cosas[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, «el ejército del norte». El hebreo dice singularmente «el del norte», una expresión personificada.
    reason: lexical_alternative
  - marker: b
    text: «El mar oriental» probablemente alude al Mar Muerto, y «el mar occidental» al Mediterráneo.
    reason: cultural_note
  - marker: c
    text: O, «porque ha actuado con arrogancia». El hebreo dice literalmente «porque ha hecho grandes cosas», una expresión que aquí probablemente tiene sentido negativo por el contexto.
    reason: alternative_reading
lexical_decisions:
- source_word: הַצְּפוֹנִי
  english_pob_choice: the northerner
  chosen_spanish: el nortista
  alternatives_spanish:
  - el del norte
  - el ejército del norte
  lexicon: HALOT
  rationale: El hebreo es singular y personificado. «Nortista» conserva esa forma singular sin convertirlo prematuramente en «ejército», y evita una construcción demasiado interpretativa en el texto principal.
- source_word: אַרְחִיק
  english_pob_choice: I will remove ... far
  chosen_spanish: quitaré de sobre ustedes
  alternatives_spanish:
  - alejaré de ustedes
  - removeré de ustedes
  lexicon: HALOT
  rationale: El verbo causativo expresa alejar/poner lejos. En español, «quitaré de sobre ustedes» comunica la acción de apartar o retirar con naturalidad, manteniendo el sentido direccional del hebreo.
- source_word: וְהִדַּחְתִּיו
  english_pob_choice: I will drive him
  chosen_spanish: lo arrojaré
  alternatives_spanish:
  - lo empujaré
  - lo desterraré
  lexicon: HALOT
  rationale: נדח en causativo tiene fuerza de empujar/expulsar. «Arrojaré» preserva la violencia imagética y encaja bien con el paralelo de expulsión hacia una tierra desolada.
- source_word: אֶרֶץ צִיָּה וּשְׁמָמָה
  english_pob_choice: a dry and desolate land
  chosen_spanish: una tierra árida y desolada
  alternatives_spanish:
  - una tierra seca y desolada
  - una tierra reseca y devastada
  lexicon: HALOT
  rationale: «Árida» refleja צִיָּה, y «desolada» refleja שְׁמָמָה. La combinación mantiene la doble cualidad del hebreo con español claro y digno.
- source_word: פָּנָיו
  english_pob_choice: his front
  chosen_spanish: su frente
  alternatives_spanish:
  - su cara
  - su parte delantera
  lexicon: HALOT
  rationale: En el paralelismo con «su parte posterior», «su frente» preserva la metáfora corporal sin forzar una lectura militar explícita.
- source_word: הַיָּם הַקַּדְמֹנִי
  english_pob_choice: the eastern sea
  chosen_spanish: el mar oriental
  alternatives_spanish:
  - el mar del oriente
  - el mar del este
  lexicon: HALOT
  rationale: El hebreo dice literalmente «el mar oriental». Se conserva la dirección en el texto principal; la identificación geográfica puede quedar para nota.
- source_word: סֹפוֹ
  english_pob_choice: his rear
  chosen_spanish: su parte posterior
  alternatives_spanish:
  - su extremo
  - su retaguardia
  lexicon: HALOT
  rationale: En contraste con «su frente», esta expresión debe sonar natural en español. «Parte posterior» conserva la imagen del cuerpo y el paralelismo.
- source_word: הַיָּם הָאַחֲרוֹן
  english_pob_choice: the western sea
  chosen_spanish: el mar occidental
  alternatives_spanish:
  - el mar del occidente
  - el mar último
  lexicon: HALOT
  rationale: El hebreo significa literalmente «el mar último/trasero», una forma direccional hacia el oeste. «Occidental» transmite la orientación sin sobreinterpretar.
- source_word: בָאְשׁוֹ
  english_pob_choice: his stench
  chosen_spanish: su hedor
  alternatives_spanish:
  - su pestilencia
  - su mal olor
  lexicon: HALOT
  rationale: «Hedor» reproduce bien el sentido negativo y fuerte del término hebreo para mal olor.
- source_word: צַחֲנָתוֹ
  english_pob_choice: his foul smell
  chosen_spanish: su peste
  alternatives_spanish:
  - su mal olor
  - su fetidez
  lexicon: HALOT
  rationale: El segundo término de la pareja intensifica el mal olor. «Peste» mantiene un registro fuerte en español y ayuda a distinguirlo del primer sustantivo sin perder el paralelismo.
- source_word: כִּי הִגְדִּיל לַעֲשׂוֹת
  english_pob_choice: because he has done great things
  chosen_spanish: porque ha hecho grandes cosas
  alternatives_spanish:
  - porque ha actuado con arrogancia
  - porque se ha engrandecido al obrar
  lexicon: HALOT
  rationale: Se conserva el giro hebreo literal para no borrar la tensión semántica del idiom. El contexto negativo deja ver que «grandes cosas» tiene fuerza irónica o desbordada, sin resolverla en el texto principal.
theological_decisions:
- issue: Identidad del «nortista»
  english_pob_reading: A personified hostile invader/army removed by God
  chosen_spanish_reading: Un invasor personificado, removido por Dios
  alternative_spanish_readings:
  - un ejército del norte
  - el viento del norte
  - una plaga de langostas personificada
  rationale: El singular con miembros corporales («su frente... su parte posterior») favorece una figura personificada. La traducción mantiene esa ambigüedad controlada sin imponer una identificación histórica específica.
  doctrine_reference: Principio de preservación de la ambigüedad textual en profecía.
- issue: Fuerza de «ha hecho grandes cosas»
  english_pob_reading: Retain the Hebrew idiom in the main text, with contextual possibility of arrogant/excessive action noted
  chosen_spanish_reading: Retener el modismo hebreo en el texto principal
  alternative_spanish_readings:
  - porque ha actuado con arrogancia
  - porque ha hecho cosas enormes
  rationale: El hebreo puede sonar positivo o negativo según el contexto. Aquí, como el sujeto es juzgado, el contexto inclina hacia sentido negativo, pero la forma literal conserva la tensión y evita una paráfrasis cerrada.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: No se registraron revisiones aplicadas en el pasaje base; la coincidencia con la auditoría inglesa es alta y el borrador actual sigue de cerca el análisis léxico y teológico documentado.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» fuera del versículo porque no aparece el Tetragrámaton en este texto.
  - Se prefirió una solución de persona singular para הַצְּפוֹנִי, coherente con la auditoría inglesa.
  - Se conservaron dos términos distintos para el mal olor («hedor» / «peste») para reflejar el paralelismo hebreo.
  - Se evitó introducir «Mesías» o terminología cristológica ajena al verso.
  - La puntuación y el orden buscan legibilidad pública en español sin perder el paralelismo de las dos mitades del versículo.
