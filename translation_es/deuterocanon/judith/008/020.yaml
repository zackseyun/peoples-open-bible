translation:
  language: es
  text: Pero no hemos reconocido[a] otro dios sino a él; por eso esperamos que no nos desatienda[b], ni a nuestro pueblo[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «hemos conocido» o «hemos admitido» otro dios sino a él.
    reason: lexical_alternative
  - marker: b
    text: O «no nos pase por alto».
    reason: lexical_alternative
  - marker: c
    text: Griego «nuestro γένος», es decir, nuestro linaje, estirpe o pueblo; «nuestro pueblo» es una traducción más natural en español.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐπέγνωμεν
  english_pob_choice: have acknowledged
  chosen_spanish: hemos reconocido
  alternatives_spanish:
  - hemos conocido
  - hemos reconocido plenamente
  lexicon: BDAG
  rationale: ἐπιγινώσκω puede expresar conocer, reconocer o reconocer plenamente. En este contexto confesional, «hemos reconocido» conserva la idea de adhesión exclusiva sin añadir una paráfrasis más amplia que el griego no exige.
- source_word: ἕτερον θεὸν
  english_pob_choice: no other god
  chosen_spanish: otro dios
  alternatives_spanish:
  - ningún otro dios
  - otro dios más
  lexicon: LSJ
  rationale: La construcción niega la existencia/reconocimiento de cualquier deidad adicional. En español, «otro dios» dentro de una negación previa comunica bien la exclusividad monoteísta; la negación se mantiene con «no hemos reconocido».
- source_word: πλὴν αὐτοῦ
  english_pob_choice: except him
  chosen_spanish: sino a él
  alternatives_spanish:
  - excepto él
  - aparte de él
  lexicon: BDAG
  rationale: πλήν marca excepción. «Sino a él» suena natural en español y conserva la exclusión tajante del enunciado.
- source_word: ὅθεν
  english_pob_choice: therefore
  chosen_spanish: por eso
  alternatives_spanish:
  - por tanto
  - por lo cual
  lexicon: LSJ
  rationale: Aquí introduce una inferencia. «Por eso» expresa la relación causal/consecutiva de manera clara y sobria en español contemporáneo.
- source_word: ἐλπίζομεν
  english_pob_choice: we hope
  chosen_spanish: esperamos
  alternatives_spanish:
  - confiamos
  - tenemos esperanza
  lexicon: BDAG
  rationale: El verbo puede ser esperanza o expectativa. «Esperamos» preserva el tono de confianza del texto sin convertirlo en certeza absoluta.
- source_word: οὐχ ὑπερόψεται
  english_pob_choice: he will not disregard
  chosen_spanish: no nos desdeñe
  alternatives_spanish:
  - no nos desprecie
  - no nos ignore
  lexicon: LSJ
  rationale: ὑπεροράω puede implicar pasar por alto, despreciar o tratar con desdén. «Desdeñar» conserva ese matiz de desconsideración mejor que un simple «ignorar».
- source_word: ἡμᾶς
  english_pob_choice: us
  chosen_spanish: nos
  alternatives_spanish:
  - a nosotros
  lexicon: BDAG
  rationale: Pronombre objeto directo normal en español; mantiene la referencia al pueblo que habla.
- source_word: ἀπὸ τοῦ γένους ἡμῶν
  english_pob_choice: nor our people
  chosen_spanish: ni a nuestro pueblo
  alternatives_spanish:
  - ni a nuestra gente
  - ni a nuestra descendencia
  lexicon: LSJ
  rationale: γένος puede significar linaje, estirpe o pueblo-grupo. En este contexto, «nuestro pueblo» comunica el sentido colectivo y ancestral sin el posible malentendido contemporáneo de «raza».
theological_decisions:
- issue: Exclusividad del único Dios
  english_pob_reading: no other god except him
  chosen_spanish_reading: no hemos reconocido otro dios sino a él
  alternative_spanish_readings:
  - no hemos adorado otro dios sino a él
  - no conocemos otro dios sino a él
  rationale: El griego habla de reconocimiento/conocimiento exclusivo, no explícitamente de adoración. La redacción española conserva esa tensión y el carácter confesional sin introducir una precisión doctrinal que el texto no formula de manera directa.
  doctrine_reference: DOCTRINE.md §Translation philosophy 1, 3
- issue: Sentido de γένος
  english_pob_reading: our people
  chosen_spanish_reading: nuestro pueblo
  alternative_spanish_readings:
  - nuestra estirpe
  - nuestro linaje
  rationale: Se preserva la dimensión colectiva y de ascendencia del término, pero se evita «raza», que en español actual puede sonar ambiguo o cargado. «Nuestro pueblo» mantiene la referencia comunitaria y es publicable.
  doctrine_reference: DOCTRINE.md §Translation philosophy 6
translation_notes:
  revision_awareness: El texto español sigue el estado revisado del audit trail inglés, que prefirió una solución más natural para γένος («our people») en lugar de «our race». También conserva la distinción del griego entre reconocimiento exclusivo de Dios y la inferencia confiada de que no despreciará al grupo que habla.
  spanish_consistency_notes:
  - Se mantuvo «Dios» para θεός, sin sustituirlo por una perífrasis más eclesiástica.
  - Se usó «hemos reconocido» como equivalente confesional de ἐπέγνωμεν, coherente con el valor relacional del verbo.
  - Se evitó «SEÑOR» porque el texto griego aquí usa θεός, no κύριος.
  - «Nuestro pueblo» refleja el valor colectivo de γένος y evita el posible anacronismo de «raza» en español actual.
  - La puntuación separa con punto y coma la inferencia introducida por ὅθεν, como en la estructura del original.
