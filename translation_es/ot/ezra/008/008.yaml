translation:
  language: es
  text: 'Y de los hijos de Sefatía: Zebadías hijo de Micael[a], y con él ochenta varones.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El hebreo «hijos de» puede designar una línea clánica más amplia, es decir, «descendientes de», no necesariamente hijos inmediatos.
    reason: lexical_alternative
lexical_decisions:
- source_word: וּ/מִ/בְּנֵי
  english_pob_choice: And from the sons of
  chosen_spanish: Y de los hijos de
  alternatives_spanish:
  - Y de los descendientes de
  - Y de la familia de
  lexicon: HALOT
  rationale: En este contexto genealógico-listado, «hijos de» conserva la forma hebrea convencional y puede abarcar una línea clanica amplia, no solo hijos inmediatos. «De los hijos de» mantiene la estructura del original y su lectura auditada.
- source_word: שְׁפַטְיָה
  english_pob_choice: Shephatiah
  chosen_spanish: Sefatías
  alternatives_spanish:
  - Shefatías
  lexicon: Convención onomástica bíblica en español
  rationale: Se translitera el nombre propio a una forma natural en español, procurando una grafía reconocible y lectura fluida en registro bíblico.
- source_word: זְבַדְיָה
  english_pob_choice: Zebadiah
  chosen_spanish: Zebadías
  alternatives_spanish:
  - Zebadía
  lexicon: Convención onomástica bíblica en español
  rationale: Nombre propio transliterado de manera estable al español; se conserva la terminación -ías, habitual en nombres hebreos en traducciones bíblicas.
- source_word: בֶּן
  english_pob_choice: son of
  chosen_spanish: hijo de
  alternatives_spanish:
  - descendiente de
  lexicon: HALOT
  rationale: En aposición inmediata a un nombre paterno, el sentido genealógico directo es «hijo de». Es la opción más natural y precisa en español.
- source_word: מִיכָאֵל
  english_pob_choice: Michael
  chosen_spanish: Micael
  alternatives_spanish:
  - Miguel
  lexicon: Convención onomástica bíblica en español
  rationale: Se conserva el nombre en transliteración como nombre hebreo, en vez de sustituirlo por la forma tradicional «Miguel», para mantener la correspondencia con el texto fuente.
- source_word: וְ/עִמּוֹ
  english_pob_choice: and with him
  chosen_spanish: y con él
  alternatives_spanish:
  - con él
  lexicon: HALOT
  rationale: Se retiene la conjunción para reproducir la estructura enumerativa del pasaje. «Con él» refleja el valor pronominal del hebreo sin sobrerrepresentación.
- source_word: שְׁמֹנִים
  english_pob_choice: eighty
  chosen_spanish: ochenta
  lexicon: HALOT
  rationale: Número cardinal directo y transparente.
- source_word: הַ/זְּכָרִים
  english_pob_choice: males
  chosen_spanish: varones
  alternatives_spanish:
  - males
  - hombres
  lexicon: HALOT
  rationale: Aunque el hebreo dice literalmente «los varones/los masculinos», en español bíblico «varones» comunica de forma digna y natural el valor de sexo masculino mejor que «males», que resulta demasiado técnico.
translation_notes:
  revision_awareness: El texto español sigue de cerca el auditable English POB, pero ajusta la onomástica a formas españolas publicables y mantiene la ambigüedad clanica de «hijos de» mediante nota, igual que el original inglés.
  spanish_consistency_notes:
  - 'Se mantiene el patrón genealógico «de los hijos de ...: ... hijo de ...» para conservar la estructura del hebreo.'
  - «Varones» evita la frialdad de «males» y preserva el rasgo sexual señalado por el hebreo.
  - No se introduce «descendientes» en el cuerpo para no borrar la forma tradicional del linaje, pero se explica en la nota.
  - Se conserva «y con él» para reflejar la adición enumerativa del versículo.
