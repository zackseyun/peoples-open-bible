  text: וַ/יִּ֜מַח אֶֽת כָּל הַ/יְק֣וּם אֲשֶׁ֣ר עַל פְּנֵ֣י הָֽ/אֲדָמָ֗ה מֵ/אָדָ֤ם עַד בְּהֵמָה֙ עַד רֶ֨מֶשׂ֙ וְ/עַד ע֣וֹף הַ/שָּׁמַ֔יִם וַ/יִּמָּח֖וּ מִן הָ/אָ֑רֶץ וַ/יִשָּׁ֧אֶר אַךְ נֹ֛חַ וַֽ/אֲשֶׁ֥ר אִתּ֖/וֹ בַּ/תֵּבָֽה־־׀׀־־־־־־׃
base_translation:
  language: en
  yaml_path: translation/ot/genesis/007/023.yaml
  text: He blotted out every living thing that was on the face of the ground[a], from man to livestock to creeping things and to the birds of the heavens. They were blotted out from the earth, and only Noah was left[c][b], and those who were with him in the ark.
  footnotes:
  - marker: a
    text: Or 'wiped out' for the verb translated 'blotted out'; the Hebrew verb carries the imagery of wiping away or erasing.
    reason: lexical_alternative
  - marker: b
    text: '''From man'' translates Hebrew adam here in a representative sense for humanity; ''from humankind'' is also possible.'
    reason: lexical_alternative
  - marker: c
    text: Or 'the birds of the sky.'
    reason: lexical_alternative
