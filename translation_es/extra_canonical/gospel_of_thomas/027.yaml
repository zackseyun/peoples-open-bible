base_translation:
  language: en
  yaml_path: translation/extra_canonical/gospel_of_thomas/027.yaml
  text: If you do not fast the world[a], you will not find the kingdom; and if you do not make the Sabbath a Sabbath[e][d][c][b], you will not see the Father.
  footnotes:
  - marker: a
    text: “Fast to the world” renders Coptic ⲉ with its directional sense. Many translators smooth this to “fast from the world,” but both Coptic and the Greek witness preserve the odd prepositional choice; the strangeness is likely deliberate.
    reason: lexical_alternative
  - marker: b
    text: Greek POxy 1 reads “the kingdom of God,” whereas NH Coptic has simply “the kingdom.” This draft follows the Coptic base text.
    reason: textual_variant
  - marker: c
    text: “Make the Sabbath a Sabbath” is a literal predicate-accusative. It likely means to let the Sabbath truly be what it is (i.e., keep/observe it as such), but the rendering keeps Thomas’s compressed style.
    reason: cultural_note
  - marker: d
    text: One manuscript line shows the orthography ⲥⲁⲙⲃⲁⲧⲟⲛ (mb) before normalization to ⲥⲁⲃⲃⲁⲧⲟⲛ (bb), a common mb/bb alternation in Sahidic/Lycopolitan hands.
    reason: dialect_note
  - marker: e
    text: Or 'fast to the world'.
    reason: previous_rendering
