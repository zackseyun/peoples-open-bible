    issue: La cláusula circunstancial וְהָאִישׁ está traducida como coordinación principal («y el hombre… iba…»).
    rationale: El hebreo aquí describe una circunstancia acompañante del avance del filisteo; la resolución documentada en el POB inglés («with the man») refleja mejor la sintaxis y el sentido narrativo.
  - severity: medium
    issue: La nota [b] en español no preserva la alternativa léxica de צִנָּה.
    rationale: La nota inglesa [b] explica que «shield» puede referirse específicamente a un escudo grande. La nota española actual habla de la continuidad de «acercándose a David», repitiendo información ya cubierta por [a] y omitiendo la observación léxica relevante.
