translation:
  language: es
  text: Disciplínanos según tu voluntad[a], y no nos entregues a las naciones[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «castíganos» o «instrúyenos». El verbo griego incluye tanto corrección como instrucción formativa.
    reason: lexical_alternative
  - marker: b
    text: El griego dice literalmente «no des a las naciones»; «nos» está implícito por el contexto.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐν θελήματί σου
  english_pob_choice: according to your will
  chosen_spanish: según tu voluntad
  alternatives_spanish:
  - en tu voluntad
  - de acuerdo con tu voluntad
  lexicon: BDAG
  rationale: La preposición ἐν con dativo expresa aquí conformidad o acuerdo con la voluntad de Dios; en español, «según tu voluntad» comunica esa relación con naturalidad y sin perder el matiz de conformidad.
- source_word: παιδεύσον
  english_pob_choice: discipline
  chosen_spanish: corrígenos
  alternatives_spanish:
  - disciplínanos
  - castíganos
  - instrúyenos
  lexicon: BDAG
  rationale: παιδεύω combina corrección, formación y disciplina. «Corrígenos» preserva la fuerza correctiva de la súplica en español natural; se mantiene la tensión lexical con posibles matices formativos en la nota.
- source_word: δῷς
  english_pob_choice: give us over
  chosen_spanish: no nos entregues
  alternatives_spanish:
  - no nos des
  - no nos abandones
  - no nos pongas
  lexicon: BDAG
  rationale: Aunque el griego dice literalmente «dar», el contexto pide la idea de ser puestos en manos de otro poder. «Entregues» expresa bien esa cesión a las naciones en español.
- source_word: ἔθνεσιν
  english_pob_choice: the nations
  chosen_spanish: a las naciones
  alternatives_spanish:
  - a los pueblos
  - a los gentiles
  - a las naciones extranjeras
  lexicon: BDAG
  rationale: En este contexto judío, ἔθνη se refiere a naciones externas/opresoras. «Las naciones» conserva la transparencia del término sin estrecharlo indebidamente a «gentiles».
translation_notes:
  revision_awareness: La revisión más reciente eliminó el añadido explícito «tú mismo/yourself» porque no está expresado en el griego; por eso la forma española evita cualquier refuerzo pronominal no justificado y conserva solo la súplica imperativa directa.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como forma por defecto para el nombre divino en el proyecto, pero aquí el versículo no contiene el tetragrámaton sino un vocativo implícito a Dios, por lo que se traduce con «tu»/«nos» sin introducir un nombre divino inexistente en el texto.
  - Se usa un registro bíblico sobrio y moderno, evitando calcos como «en tu voluntad» que sonarían menos naturales en español.
  - Se conserva «las naciones» para reflejar el valor contextual de ἔθνη sin cargar innecesariamente una lectura polémica o confesional específica.
