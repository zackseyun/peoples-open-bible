theological_decisions:
- issue: Whether the verse teaches salvation by works or describes the kind of person God receives without ethnic partiality
  chosen_reading: The translation preserves the text's statement that in every nation the person who fears God and does what is righteous is acceptable to him, without importing a doctrinal explanation beyond the verse itself.
  alternative_readings:
  - A stronger merit-based reading ('earns acceptance by God')
  - A more interpretive covenantal reading ('shows evidence of saving faith')
  rationale: The Greek states divine acceptance in relation to fearing God and doing righteousness, in the context of Peter's declaration that God shows no partiality across nations. 'Acceptable to him' is faithful to the wording while avoiding interpretive expansions that would resolve broader theological debates not explicit in this verse.
  doctrine_reference: Preserve theological tension rather than resolve it.
