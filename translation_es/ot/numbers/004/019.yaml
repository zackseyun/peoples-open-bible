base_translation:
  language: en
  yaml_path: translation/ot/numbers/004/019.yaml
  text: 'But do this for them[b][a], so that they may live and not die when they come near the most holy things: Aaron and his sons shall come and appoint each man to his service and to his burden.'
  footnotes:
  - marker: a
    text: Or 'the Holy of Holies' / 'the most holy place.' Here the phrase likely refers to the holiest sacred objects rather than the inner sanctuary itself, given the context of carrying duties.
    reason: alternative_reading
  - marker: b
    text: Hebrew 'man by man,' a distributive expression meaning each individual was assigned his own service and load.
    reason: lexical_alternative
