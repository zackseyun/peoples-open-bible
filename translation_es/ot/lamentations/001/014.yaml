translation:
  language: es
  text: El yugo de mis transgresiones está atado por su mano[a]; se entrelazan[b], han subido sobre mi cuello; ha hecho desfallecer mi fuerza. El Señor me ha entregado en manos[c] de las que no puedo levantarme.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «es vigilado»; el verbo hebreo es raro y difícil. El contexto favorece el sentido de que el yugo está atado o sujetado.
    reason: lexical_alternative
  - marker: b
    text: O «están entretejidas» o «están enredadas». El hebreo usa un verbo raro con sentido de entrelazamiento.
    reason: lexical_alternative
  - marker: c
    text: El hebreo dice «en manos»; la expresión deja indefinidos a los opresores.
    reason: lexical_alternative
lexical_decisions:
- source_word: נִשְׂקַד
  english_pob_choice: is bound
  chosen_spanish: está atado
  alternatives_spanish:
  - está sujeto
  - está fijado
  lexicon: HALOT
  rationale: El verbo es raro y difícil; en este contexto, con la imagen del yugo y del cuello, conviene expresar la idea de estar asegurado o fijado como carga opresiva. «Está atado» conserva bien la metáfora y evita decidir más de lo que el hebreo permite.
- source_word: עֹל
  english_pob_choice: yoke
  chosen_spanish: yugo
  alternatives_spanish:
  - carga
  - yugo opresivo
  lexicon: HALOT
  rationale: «Yugo» es el equivalente natural y tradicional para la imagen de opresión, esclavitud o sujeción. Mantiene la fuerza metafórica del hebreo.
- source_word: פְּשָׁעַי
  english_pob_choice: my transgressions
  chosen_spanish: mis rebeliones
  alternatives_spanish:
  - mis transgresiones
  - mis ofensas
  lexicon: HALOT
  rationale: פֶּשַׁע expresa a menudo rebelión contra autoridad legítima. En español, «rebeliones» comunica mejor ese peso moral y relacional que un mero “incumplimientos”, y mantiene la tensión de culpa y resistencia contra Yahvé.
- source_word: בְּיָדוֹ
  english_pob_choice: by his hand
  chosen_spanish: por su mano
  alternatives_spanish:
  - en su mano
  - mediante su mano
  lexicon: HALOT
  rationale: El hebreo permite una relación de agencia. «Por su mano» suena natural en español y conserva la idea de acción divina o del agente referido por el sufijo, sin borrar la imagen corporal.
- source_word: יִשְׂתָּרְגוּ
  english_pob_choice: they are woven together
  chosen_spanish: se entrelazan
  alternatives_spanish:
  - están entretejidas
  - se enredan
  lexicon: HALOT
  rationale: El verbo es raro y su sentido apunta a entrelazarse o entretejerse. «Se entrelazan» es claro en español y mantiene la imagen de varias hebras/uniones formando el yugo.
- source_word: עָלוּ עַל צַוָּארִי
  english_pob_choice: they have come up upon my neck
  chosen_spanish: se han subido sobre mi cuello
  alternatives_spanish:
  - han subido hasta mi cuello
  - se han puesto sobre mi cuello
  lexicon: HALOT
  rationale: La imagen es física y ascendente; «se han subido sobre mi cuello» conserva el movimiento y la carga sobre el cuello. «Cuello» es preferible a «nuca» aquí por fidelidad literal al hebreo.
- source_word: הִכְשִׁיל כֹּחִי
  english_pob_choice: he has made my strength fail
  chosen_spanish: ha hecho caer mi fuerza
  alternatives_spanish:
  - ha hecho flaquear mi fuerza
  - ha derribado mi fuerza
  lexicon: HALOT
  rationale: El hiphil de כשל conserva la idea de hacer tropezar o caer. «Ha hecho caer mi fuerza» mantiene ese matiz verbal y suena más cercano a la metáfora del derribo que una simple debilitación abstracta.
- source_word: אֲדֹנָי
  english_pob_choice: The Lord
  chosen_spanish: El Señor
  alternatives_spanish:
  - El Soberano
  - El Dueño
  lexicon: HALOT
  rationale: Como título divino, «Señor» es la forma española estable y reverente. En este contexto no se reemplaza por «Yahvé» porque el hebreo presenta אֲדֹנָי, y el audit trail en inglés también lo trata como título divino. Se mantiene la mayúscula por referencia a Dios.
- source_word: בִּידֵי
  english_pob_choice: into hands
  chosen_spanish: en manos
  alternatives_spanish:
  - en las manos
  - en poder de manos
  lexicon: HALOT
  rationale: El hebreo carece de artículo, y la expresión deja indefinidos a los agentes. «En manos» conserva esa indefinición en español mejor que especificar «las manos».
- source_word: לֹא אוּכַל קוּם
  english_pob_choice: from which I cannot rise
  chosen_spanish: no podré levantarme
  alternatives_spanish:
  - no puedo levantarme
  - no lograré alzarme
  lexicon: HALOT
  rationale: קוּם aquí expresa levantarse de la postración o la opresión, no solo ponerse de pie. «No podré levantarme» comunica la imposibilidad resultante de la entrega a otros y suena natural en español bíblico contemporáneo.
theological_decisions:
- issue: Referente de los pronombres de tercera persona singulares en la primera mitad del verso
  english_pob_reading: The pronouns are rendered as referring to God/the Lord as the acting judge.
  chosen_spanish_reading: Los pronombres se dejan como «su» y «ha», entendidos de manera coherente con la acción de Dios como juez, sin forzar una aclaración explícita que el hebreo no formula.
  alternative_spanish_readings:
  - Tomarlos de forma impersonal.
  - Referirlos al yugo mismo en parte del verso.
  rationale: El versículo culmina con la entrega por parte del Señor, y el contexto de Lamentaciones atribuye el sufrimiento al juicio divino. A la vez, el hebreo mantiene cierta tensión referencial. El español conserva esa tensión sin resolverla más allá del texto.
  doctrine_reference: Preservar la tensión teológica del texto sin sobreespecificarla.
translation_notes:
  revision_awareness: Esta versión sigue el pasaje ya auditado como sin cambios en la última revisión, y conserva la interpretación principal del yugo, el entrelazamiento de las rebeliones y la entrega del hablante por parte del Señor. Se ajusta el español para lograr fluidez publicable sin perder el valor literal ni las tensiones léxicas señaladas en el audit trail inglés.
  spanish_consistency_notes:
  - Se mantiene «Señor» para אֲדֹנָי como título divino, coherente con el tratamiento auditado en inglés.
  - Se traduce el sufijo de agencia con «su mano»/«su» sin nombrar explícitamente a Yahvé, respetando la ambigüedad referencial del hebreo.
  - «Rebeliones» se usa como opción más fuerte que «transgresiones» para reflejar פֶּשַׁע, pero se preserva la alternativa en nota.
  - «En manos» conserva la indefinición del plural hebreo.
  - La imagen de yugo/cuello/fuerza caída se conserva de forma bastante literal para no suavizar la metáfora del sufrimiento.
