translation:
  language: es
  text: Otoniel, hijo de Cenaz, hermano[a] de Caleb, la capturó[b], y le dio a su hija Acsa como esposa.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O posiblemente "pariente de Caleb", pues "hermano" a veces puede usarse en sentido más amplio para un familiar cercano; el sentido llano es "hermano".
    reason: lexical_alternative
  - marker: b
    text: Es decir, la ciudad de Quiriat-sefer/Debir mencionada en el versículo anterior.
    reason: cross_reference
lexical_decisions:
- source_word: וַיִּלְכְּדָהּ
  english_pob_choice: captured it
  chosen_spanish: la capturó
  alternatives_spanish:
  - la tomó
  - la conquistó
  - la apresó
  lexicon: HALOT
  rationale: El verbo לכד comunica la idea de tomar o capturar una ciudad en contexto militar. En español, "la capturó" conserva ese sentido con naturalidad y sin debilitar la fuerza bélica del hebreo. El pronombre femenino "la" mantiene la referencia a la ciudad del versículo anterior.
- source_word: עָתְנִיאֵל
  english_pob_choice: Othniel
  chosen_spanish: Otoniel
  alternatives_spanish:
  - Otniel
  lexicon: transliteración tradicional española
  rationale: Se usa la forma habitual en español bíblico "Otoniel", que es reconocible y fluida para lectura eclesial.
- source_word: בֶּן קְנַז
  english_pob_choice: son of Kenaz
  chosen_spanish: hijo de Cenaz
  alternatives_spanish:
  - hijo de Quenaz
  lexicon: transliteración tradicional española
  rationale: Se conserva la relación filial directa. "Cenaz" sigue la adaptación española común del nombre propio, evitando una transliteración más áspera.
- source_word: אֲחִי כָלֵב
  english_pob_choice: Caleb’s brother
  chosen_spanish: hermano de Caleb
  alternatives_spanish:
  - pariente de Caleb
  lexicon: HALOT
  rationale: El sentido básico del constructo es "hermano de Caleb". Aunque puede existir una extensión semántica a "pariente", aquí no hay presión contextual para debilitar el término, y la lectura llana respeta el audit trail inglés.
- source_word: וַיִּתֶּן לוֹ
  english_pob_choice: and he gave him
  chosen_spanish: y él le dio
  alternatives_spanish:
  - y le dio
  - entonces le dio
  lexicon: HALOT
  rationale: Se mantiene la narrativa simple del wayyiqtol. El sujeto implícito se entiende por el contexto previo; el pronombre explícito "él" mejora la claridad en español sin añadir información.
- source_word: אֶת עַכְסָה בִתּוֹ
  english_pob_choice: his daughter Achsah
  chosen_spanish: a su hija Axsá
  alternatives_spanish:
  - a su hija Acsa
  - a la hija Axsá
  lexicon: HALOT
  rationale: Se conserva la relación posesiva con "su hija". "Axsá" ofrece una adaptación española clara del nombre propio, manteniendo la identidad del personaje sin depender de la grafía inglesa.
- source_word: לְאִשָּׁה
  english_pob_choice: as a wife
  chosen_spanish: como esposa
  alternatives_spanish:
  - por esposa
  - en matrimonio
  lexicon: HALOT
  rationale: La expresión española más natural y precisa es "como esposa". Conserva el valor idiomático del hebreo de dar en matrimonio sin volver la frase pesada.
theological_decisions:
- issue: Relación posible entre "hermano" y "pariente" en אֲחִי כָלֵב
  english_pob_reading: The plain sense is 'brother,' though a broader kinship sense is possible.
  chosen_spanish_reading: 'Lectura principal: "hermano de Caleb"; posibilidad reconocida de parentesco más amplio.'
  alternative_spanish_readings:
  - pariente de Caleb
  - consanguíneo de Caleb
  rationale: Se retiene la lectura principal porque el texto no exige suavizar el parentesco. A la vez, se documenta la alternativa semántica para no borrar la tensión lexical señalada por el audit trail inglés.
  doctrine_reference: Ninguna; decisión lexical-histórica, no doctrinal.
translation_notes:
  revision_awareness: Se siguió el estado de revisión más reciente, que indica que no fueron necesarios cambios adicionales; el borrador mantiene alta concordancia con el audit trail inglés y conserva la nota de alternativa lexical para אֲחִי.
  spanish_consistency_notes:
  - Se mantiene "Yahvé" solo cuando el texto hebreo lo exija explícitamente; aquí no aparece.
  - Se eligió "Otoniel", "Cenaz" y "Axsá" como formas españolas estables y legibles para nombres propios.
  - Se conserva el pronombre femenino de objeto directo en "la capturó" para reflejar que el referente es la ciudad del versículo previo.
  - No se introduce vocabulario eclesiástico no requerido; la frase marital se expresa con "como esposa" por claridad y fidelidad.
