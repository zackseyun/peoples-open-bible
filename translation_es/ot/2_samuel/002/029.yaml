translation:
  language: es
  text: Y Abner y sus hombres viajaron por el Arabá toda aquella noche, cruzaron el Jordán, pasaron por todo el Bitrón[a] y llegaron a Mahanaim.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O posiblemente «por toda la región del barranco o cañón»; el término hebreo «Bitrón» puede ser un nombre de lugar o una designación geográfica descriptiva.
    reason: lexical_alternative
lexical_decisions:
- source_word: בָּעֲרָבָה
  english_pob_choice: through the Arabah
  chosen_spanish: por el Arabá
  alternatives_spanish:
  - por la llanura
  - por la región del Arabá
  lexicon: HALOT
  rationale: El hebreo señala un recorrido geográfico; en español, «Arabá» conserva el posible valor de topónimo o región específica, tal como el inglés POB retuvo «the Arabah». Usé «por» para expresar tránsito por la zona sin forzar un calco rígido.
- source_word: כֹּל הַלַּיְלָה הַהוּא
  english_pob_choice: all that night
  chosen_spanish: toda esa noche
  alternatives_spanish:
  - toda la noche
  - durante toda esa noche
  lexicon: HALOT
  rationale: La construcción hebrea marca duración completa. «Toda esa noche» refleja con naturalidad el demostrativo del original y evita perder la referencia a una noche concreta.
- source_word: וַיַּעַבְרוּ אֶת־הַיַּרְדֵּן
  english_pob_choice: crossed the Jordan
  chosen_spanish: cruzaron el Jordán
  alternatives_spanish:
  - pasaron el Jordán
  - cruzaron a través del Jordán
  lexicon: HALOT
  rationale: «Cruzar» es el equivalente natural para עבר con objeto directo en este contexto narrativo. «El Jordán» mantiene el nombre del río como en español bíblico y moderno.
- source_word: כָּל הַבִּתְרוֹן
  english_pob_choice: all the Bithron
  chosen_spanish: todo el Bitrón
  alternatives_spanish:
  - toda la región del Bitrón
  - todo el valle dividido
  lexicon: HALOT
  rationale: Como el inglés POB retiene «Bithron» por la incertidumbre entre topónimo y descripción geográfica, el español conserva «Bitrón» para no decidir prematuramente el referente. «Todo» refleja el hebreo כָּל sin convertir el término en una paráfrasis interpretativa.
- source_word: מַחֲנָיִם
  english_pob_choice: Mahanaim
  chosen_spanish: Mahanaim
  alternatives_spanish:
  - Majanaim
  lexicon: HALOT
  rationale: Es un nombre propio de lugar. Conservar «Mahanaim» mantiene la forma internacionalmente reconocible y sigue el criterio de transliteración del POB.
- source_word: וַאֲנָשָׁיו
  english_pob_choice: his men
  chosen_spanish: sus hombres
  alternatives_spanish:
  - los hombres con él
  - sus soldados
  lexicon: HALOT
  rationale: La expresión es literalmente «sus hombres». En este contexto militar, «sus hombres» es fiel y natural; «soldados» introduciría un matiz interpretativo no explicitado por el hebreo.
- source_word: הָלְכוּ / וַיֵּלְכוּ / וַיָּבֹאוּ
  english_pob_choice: traveled ... went through ... came
  chosen_spanish: viajaron ... pasaron por ... llegaron
  alternatives_spanish:
  - caminaron ... fueron ... arribaron
  - se desplazaron ... atravesaron ... vinieron
  lexicon: HALOT
  rationale: 'He mantenido la progresión verbal del relato con verbos españoles naturales: «viajaron» para el trayecto inicial, «pasaron por» para el tramo regional y «llegaron» para la meta. Esto conserva el movimiento narrativo sin uniformarlo.'
translation_notes:
  revision_awareness: El texto sigue el consenso alto del auditor inglés y no introduce revisiones respecto del pasaje base. Se preserva la ambigüedad del topónimo/descriptor en הַבִּתְרוֹן, alineado con la nota crítica inglesa. No se requieren ajustes textuales adicionales.
  spanish_consistency_notes:
  - Se usa «Yahvé» como forma base cuando aparezca el nombre divino; en este versículo no aparece.
  - Se mantiene «Mahanaim» como nombre propio transliterado, coherente con el criterio del proyecto.
  - «Arabá» se trata como región geográfica, no como «desierto» o «llanura» genérica, para respetar la fuerza toponímica del hebreo.
